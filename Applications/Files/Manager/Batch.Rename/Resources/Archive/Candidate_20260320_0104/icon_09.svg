<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0500"/>
  <!-- Wave transform: batch process -->
  <!-- Input wave (jagged/irregular) -->
  <path d="M160 400 L240 340 L320 460 L400 340 L480 460" stroke="#E64A19" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Transform arrow -->
  <path d="M512 512 L640 512" stroke="#FF8A65" stroke-width="32" stroke-linecap="round"/>
  <path d="M610 470 L650 512 L610 554" stroke="#FF8A65" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Output wave (smooth/uniform) -->
  <path d="M660 400 Q720 340 780 400 Q840 460 900 400" stroke="#FF8A65" stroke-width="36" stroke-linecap="round" fill="none"/>
  <!-- Input files (bottom left) -->
  <rect x="160" y="560" width="100" height="120" rx="10" fill="#E64A19" opacity="0.6"/>
  <rect x="280" y="560" width="100" height="120" rx="10" fill="#E64A19" opacity="0.6"/>
  <rect x="400" y="560" width="100" height="120" rx="10" fill="#E64A19" opacity="0.6"/>
  <!-- Output files (bottom right) - uniform -->
  <rect x="640" y="560" width="100" height="120" rx="10" fill="#FF8A65" opacity="0.8"/>
  <rect x="760" y="560" width="100" height="120" rx="10" fill="#FF8A65" opacity="0.8"/>
</svg>