<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D4D"/>
      <stop offset="100%" stop-color="#001A1A"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CC"/>
      <stop offset="100%" stop-color="#00A896"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil / forge icon -->
  <ellipse cx="256" cy="360" rx="130" ry="20" fill="#001A1A" opacity="0.5"/>
  <rect x="176" y="300" width="160" height="60" rx="6" fill="#00333D" stroke="#00E5CC" stroke-width="2"/>
  <rect x="156" y="316" width="200" height="28" rx="4" fill="#004455" stroke="#00E5CC" stroke-width="1.5"/>
  <rect x="206" y="256" width="100" height="60" rx="6" fill="#00333D" stroke="#00E5CC" stroke-width="2"/>
  <!-- Hammer -->
  <rect x="320" y="120" width="48" height="90" rx="8" fill="url(#tealGrad)" filter="url(#glow)" transform="rotate(-35 344 165)"/>
  <rect x="310" y="200" width="16" height="120" rx="6" fill="#006666" transform="rotate(-35 318 260)"/>
  <!-- Spark effects -->
  <circle cx="262" cy="252" r="6" fill="#00E5CC" filter="url(#glow)" opacity="0.9"/>
  <line x1="262" y1="240" x2="255" y2="225" stroke="#00E5CC" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="268" y1="240" x2="278" y2="220" stroke="#00E5CC" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="244" x2="240" y2="238" stroke="#00E5CC" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="270" y1="248" x2="288" y2="244" stroke="#00E5CC" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <!-- Layout symbol (L shape) on the anvil -->
  <rect x="216" y="268" width="14" height="36" rx="2" fill="#00E5CC" filter="url(#glow)"/>
  <rect x="216" y="290" width="36" height="14" rx="2" fill="#00E5CC" filter="url(#glow)"/>
  <!-- Title -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#00E5CC" font-weight="700" filter="url(#glow)" letter-spacing="2">FORGE</text>
  <line x1="156" y1="448" x2="356" y2="448" stroke="#00E5CC" stroke-width="1" opacity="0.3"/>
  <!-- Small grid icon top left -->
  <rect x="88" y="88" width="80" height="80" rx="6" fill="none" stroke="#00E5CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="115" y1="88" x2="115" y2="168" stroke="#00E5CC" stroke-width="1" opacity="0.3"/>
  <line x1="142" y1="88" x2="142" y2="168" stroke="#00E5CC" stroke-width="1" opacity="0.3"/>
  <line x1="88" y1="115" x2="168" y2="115" stroke="#00E5CC" stroke-width="1" opacity="0.3"/>
  <line x1="88" y1="142" x2="168" y2="142" stroke="#00E5CC" stroke-width="1" opacity="0.3"/>
</svg>
