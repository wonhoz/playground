<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07ic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- Background: sky blue -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07ic)"/>

  <!-- Pipeline: files flowing through a pipe and converting -->
  <!-- Input pipe (left) -->
  <rect x="100" y="430" width="200" height="80" rx="10" fill="#0369A1"/>
  <rect x="100" y="430" width="200" height="80" rx="10" fill="none" stroke="#7DD3FC" stroke-width="4"/>

  <!-- Input files entering pipe -->
  <rect x="108" y="318" width="80" height="96" rx="8" fill="white" opacity="0.9"/>
  <polygon points="168,318 168,354 188,354" fill="#BAE6FD"/>
  <rect x="116" y="370" width="64" height="12" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="116" y="390" width="48" height="10" rx="3" fill="#93C5FD" opacity="0.5"/>
  <text x="148" y="426" font-family="Arial Black,Arial" font-size="18" fill="#FDE047">SVG</text>

  <rect x="210" y="318" width="80" height="96" rx="8" fill="white" opacity="0.9"/>
  <polygon points="270,318 270,354 290,354" fill="#BAE6FD"/>
  <rect x="218" y="370" width="64" height="12" rx="3" fill="#3B82F6" opacity="0.7"/>
  <text x="250" y="426" font-family="Arial Black,Arial" font-size="18" fill="#4ADE80">PNG</text>

  <!-- Arrow going right through pipe -->
  <line x1="300" y1="470" x2="500" y2="470" stroke="#7DD3FC" stroke-width="16" stroke-linecap="round"/>
  <polygon points="490,440 540,470 490,500" fill="#7DD3FC"/>

  <!-- Central converter box -->
  <rect x="520" y="380" width="200" height="180" rx="20" fill="#0C4A6E"/>
  <rect x="534" y="394" width="172" height="152" rx="14" fill="#075985"/>
  <!-- Gear/cog symbol inside -->
  <circle cx="620" cy="470" r="50" fill="#0284C7"/>
  <circle cx="620" cy="470" r="35" fill="#0C4A6E"/>
  <!-- Gear teeth -->
  <rect x="608" y="418" width="24" height="16" rx="4" fill="#0284C7"/>
  <rect x="608" y="516" width="24" height="16" rx="4" fill="#0284C7"/>
  <rect x="568" y="458" width="16" height="24" rx="4" fill="#0284C7"/>
  <rect x="636" y="458" width="16" height="24" rx="4" fill="#0284C7"/>
  <rect x="576" y="428" width="16" height="16" rx="3" fill="#0284C7"/>
  <rect x="628" y="508" width="16" height="16" rx="3" fill="#0284C7"/>
  <rect x="576" y="508" width="16" height="16" rx="3" fill="#0284C7"/>
  <rect x="628" y="428" width="16" height="16" rx="3" fill="#0284C7"/>
  <!-- Circle center -->
  <circle cx="620" cy="470" r="16" fill="#7DD3FC"/>
  <!-- Lightning bolt inside -->
  <text x="620" y="480" font-family="Arial,sans-serif" font-size="20" fill="#0C4A6E" text-anchor="middle" font-weight="bold">⚙</text>

  <!-- Output pipe (right) -->
  <rect x="730" y="430" width="200" height="80" rx="10" fill="#0369A1"/>
  <rect x="730" y="430" width="200" height="80" rx="10" fill="none" stroke="#7DD3FC" stroke-width="4"/>

  <!-- Arrow from converter to output pipe -->
  <line x1="720" y1="470" x2="730" y2="470" stroke="#7DD3FC" stroke-width="16" stroke-linecap="round"/>

  <!-- Output files emerging -->
  <rect x="750" y="318" width="80" height="96" rx="8" fill="#FEF3C7" opacity="0.9"/>
  <polygon points="810,318 810,354 830,354" fill="#FCD34D"/>
  <rect x="758" y="370" width="64" height="12" rx="3" fill="#F97316" opacity="0.7"/>
  <text x="790" y="426" font-family="Arial Black,Arial" font-size="18" fill="#F97316">ICO</text>

  <rect x="850" y="318" width="80" height="96" rx="8" fill="#FEF3C7" opacity="0.9"/>
  <polygon points="910,318 910,354 930,354" fill="#FCD34D"/>
  <rect x="858" y="370" width="64" height="12" rx="3" fill="#F97316" opacity="0.7"/>
  <text x="890" y="426" font-family="Arial Black,Arial" font-size="18" fill="#8B5CF6">PNG</text>

  <!-- Falling arrows from pipes to files (top) -->
  <line x1="148" y1="414" x2="148" y2="320" stroke="#FDE047" stroke-width="6" stroke-linecap="round" stroke-dasharray="8,6"/>
  <line x1="250" y1="414" x2="250" y2="320" stroke="#FDE047" stroke-width="6" stroke-linecap="round" stroke-dasharray="8,6"/>
  <line x1="790" y1="430" x2="790" y2="414" stroke="#FDE047" stroke-width="6" stroke-linecap="round" stroke-dasharray="8,6"/>
  <line x1="890" y1="430" x2="890" y2="414" stroke="#FDE047" stroke-width="6" stroke-linecap="round" stroke-dasharray="8,6"/>

  <!-- Bottom annotation -->
  <rect x="240" y="620" width="544" height="60" rx="14" fill="#0C4A6E"/>
  <text x="512" y="658" font-family="Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Batch Conversion Pipeline</text>

  <!-- File count -->
  <text x="512" y="740" font-family="Consolas,monospace" font-size="32" fill="white" text-anchor="middle" opacity="0.8">SVG/PNG/JPG/BMP → ICO</text>

  <!-- Progress dots -->
  <circle cx="432" cy="820" r="18" fill="white" opacity="0.9"/>
  <circle cx="472" cy="820" r="18" fill="white" opacity="0.9"/>
  <circle cx="512" cy="820" r="18" fill="white" opacity="0.9"/>
  <circle cx="552" cy="820" r="18" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="592" cy="820" r="18" fill="#7DD3FC" opacity="0.3"/>
</svg>
