<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Key unlocking prompt/knowledge -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#1A1205"/>
  <!-- Key shape -->
  <circle cx="380" cy="400" r="140" fill="none" stroke="#FFB300" stroke-width="48"/>
  <circle cx="380" cy="400" r="60" fill="#FFB300"/>
  <rect x="480" y="376" width="280" height="48" rx="8" fill="#FFB300"/>
  <rect x="700" y="424" width="48" height="80" rx="8" fill="#FFB300"/>
  <rect x="640" y="424" width="48" height="60" rx="8" fill="#FFB300"/>
  <!-- Text/prompt lines radiating from key -->
  <rect x="200" y="600" width="560" height="20" rx="10" fill="#FFB300" opacity="0.7"/>
  <rect x="240" y="640" width="480" height="20" rx="10" fill="#FFB300" opacity="0.5"/>
  <rect x="220" y="680" width="520" height="20" rx="10" fill="#FFB300" opacity="0.4"/>
  <rect x="260" y="720" width="440" height="20" rx="10" fill="#FFB300" opacity="0.3"/>
</svg>
