<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A001A"/>
  <!-- Layer 2: 재활용통 + 폴더들이 빨려들어가는 -->
  <!-- 재활용통 본체 -->
  <rect x="312" y="480" width="400" height="460" rx="20" fill="#1A0A2A" stroke="#9C27B0" stroke-width="12"/>
  <!-- 재활용통 뚜껑 -->
  <rect x="260" y="420" width="504" height="80" rx="16" fill="#2A0A3A" stroke="#9C27B0" stroke-width="12"/>
  <!-- 재활용 화살표 (큰) -->
  <text x="512" y="760" font-size="220" fill="#9C27B0" text-anchor="middle">♻</text>
  <!-- 빨려들어가는 폴더들 (위에서) -->
  <!-- 폴더 1 (크고 가까운) -->
  <rect x="350" y="220" width="220" height="160" rx="12" fill="#D81B60" opacity="0.9"/>
  <rect x="350" y="196" width="100" height="32" rx="8" fill="#E91E63" opacity="0.9"/>
  <text x="460" y="318" font-size="52" fill="white" text-anchor="middle" font-family="monospace">bin</text>
  <!-- 화살표 (폴더→통) -->
  <line x1="460" y1="380" x2="460" y2="430" stroke="#9C27B0" stroke-width="12" stroke-dasharray="16,8"/>
  <polygon points="440,425 460,460 480,425" fill="#9C27B0"/>
  <!-- 폴더 2 (작고 먼) -->
  <rect x="700" y="150" width="160" height="120" rx="10" fill="#D81B60" opacity="0.6"/>
  <rect x="700" y="130" width="72" height="26" rx="6" fill="#E91E63" opacity="0.6"/>
  <text x="780" y="226" font-size="40" fill="white" text-anchor="middle" font-family="monospace">obj</text>
  <!-- 폴더 3 (더 작음) -->
  <rect x="140" y="170" width="140" height="106" rx="10" fill="#D81B60" opacity="0.5"/>
  <rect x="140" y="152" width="62" height="24" rx="6" fill="#E91E63" opacity="0.5"/>
  <!-- Layer 3: 공간 절약 표시 -->
  <rect x="80" y="100" width="240" height="70" rx="16" fill="#1A0A2A" stroke="#7B1FA2" stroke-width="4"/>
  <text x="200" y="146" font-size="40" fill="#CE93D8" text-anchor="middle" font-family="monospace">2.3 GB</text>
</svg>
