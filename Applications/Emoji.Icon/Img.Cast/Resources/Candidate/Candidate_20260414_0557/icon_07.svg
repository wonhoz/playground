<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="stackArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg7)"/>

  <!-- Input stack (left side) — rotated file cards layered -->
  <!-- Card 3 (bottom/back) -->
  <rect x="100" y="220" width="280" height="340" rx="22" fill="#B3E5FC" stroke="#0277BD" stroke-width="14" transform="rotate(12, 240, 390)"/>
  <rect x="120" y="240" width="240" height="170" rx="14" fill="#81D4FA" stroke="#0277BD" stroke-width="10" transform="rotate(12, 240, 390)"/>
  <rect x="120" y="425" width="240" height="52" rx="16" fill="#74C0FC" stroke="#0277BD" stroke-width="10" transform="rotate(12, 240, 390)"/>
  <text x="240" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle" transform="rotate(12, 240, 462)">BMP</text>

  <!-- Card 2 (middle) -->
  <rect x="105" y="215" width="280" height="340" rx="22" fill="#E1F5FE" stroke="#0277BD" stroke-width="14" transform="rotate(5, 245, 385)"/>
  <rect x="125" y="235" width="240" height="170" rx="14" fill="#B3E5FC" stroke="#0277BD" stroke-width="10" transform="rotate(5, 245, 385)"/>
  <circle cx="215" cy="295" r="36" fill="#29B6F6" stroke="#0277BD" stroke-width="8" transform="rotate(5, 245, 385)"/>
  <polygon points="175,380 220,330 250,360 280,340 325,380" fill="#29B6F6" stroke="#0277BD" stroke-width="6" stroke-linejoin="round" transform="rotate(5, 245, 385)"/>
  <rect x="125" y="420" width="240" height="52" rx="16" fill="#29B6F6" stroke="#0277BD" stroke-width="10" transform="rotate(5, 245, 385)"/>
  <text x="245" y="457" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle" transform="rotate(5, 245, 457)">PNG</text>

  <!-- Card 1 (top/front) -->
  <rect x="110" y="210" width="280" height="340" rx="22" fill="#FFFFFF" stroke="#0277BD" stroke-width="16"/>
  <rect x="130" y="230" width="240" height="170" rx="14" fill="#E1F5FE" stroke="#0277BD" stroke-width="10"/>
  <text x="250" y="338" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#29B6F6" text-anchor="middle">&lt;/&gt;</text>
  <rect x="130" y="415" width="240" height="52" rx="16" fill="#0277BD" stroke="#01579B" stroke-width="10"/>
  <text x="250" y="452" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">SVG</text>

  <!-- Center arrow -->
  <rect x="412" y="360" width="130" height="44" rx="18" fill="url(#stackArrow)" stroke="#0277BD" stroke-width="12"/>
  <polygon points="542,332 628,382 542,432" fill="#0277BD" stroke="#01579B" stroke-width="12" stroke-linejoin="round"/>

  <!-- Output stack (right side) — neat ICO files -->
  <!-- Card back -->
  <rect x="638" y="224" width="280" height="340" rx="22" fill="#B3E5FC" stroke="#0277BD" stroke-width="14" transform="rotate(-8, 778, 394)"/>
  <rect x="648" y="228" width="266" height="170" rx="14" fill="#81D4FA" stroke="#0277BD" stroke-width="10" transform="rotate(-8, 778, 394)"/>
  <!-- ICO size dots -->
  <rect x="668" y="248" width="36" height="36" rx="6" fill="#0277BD" stroke="#01579B" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="714" y="244" width="44" height="44" rx="6" fill="#0277BD" stroke="#01579B" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="770" y="248" width="36" height="36" rx="6" fill="#29B6F6" stroke="#0277BD" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="668" y="294" width="60" height="60" rx="8" fill="#29B6F6" stroke="#0277BD" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="740" y="298" width="54" height="54" rx="8" fill="#0277BD" stroke="#01579B" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="804" y="290" width="38" height="38" rx="6" fill="#29B6F6" stroke="#0277BD" stroke-width="6" transform="rotate(-8, 778, 394)"/>
  <rect x="648" y="418" width="266" height="52" rx="16" fill="#74C0FC" stroke="#0277BD" stroke-width="10" transform="rotate(-8, 778, 394)"/>

  <!-- Card front -->
  <rect x="638" y="220" width="280" height="340" rx="22" fill="#FFFFFF" stroke="#0277BD" stroke-width="16"/>
  <rect x="648" y="230" width="266" height="170" rx="14" fill="#E1F5FE" stroke="#0277BD" stroke-width="10"/>
  <!-- ICO multi-size representation -->
  <rect x="668" y="250" width="32" height="32" rx="6" fill="#0277BD" stroke="#01579B" stroke-width="5"/>
  <rect x="710" y="246" width="42" height="42" rx="6" fill="#0277BD" stroke="#01579B" stroke-width="5"/>
  <rect x="762" y="250" width="32" height="32" rx="6" fill="#29B6F6" stroke="#0277BD" stroke-width="5"/>
  <rect x="810" y="248" width="24" height="24" rx="4" fill="#0277BD" stroke="#01579B" stroke-width="4"/>
  <rect x="668" y="292" width="56" height="56" rx="8" fill="#29B6F6" stroke="#0277BD" stroke-width="5"/>
  <rect x="734" y="296" width="50" height="50" rx="8" fill="#0277BD" stroke="#01579B" stroke-width="5"/>
  <rect x="794" y="290" width="48" height="48" rx="7" fill="#29B6F6" stroke="#0277BD" stroke-width="5"/>
  <rect x="648" y="415" width="266" height="52" rx="16" fill="#0277BD" stroke="#01579B" stroke-width="12"/>
  <text x="781" y="452" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">ICO</text>

  <!-- CONVERT badge -->
  <rect x="262" y="650" width="500" height="80" rx="32" fill="#29B6F6" stroke="#0277BD" stroke-width="14"/>
  <text x="512" y="706" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">CONVERT</text>

  <!-- Title -->
  <rect x="212" y="840" width="600" height="88" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="902" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
</svg>
