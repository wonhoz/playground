<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Folder chain (PATH order) -->
  <!-- Arrow connector -->
  <line x1="285" y1="400" x2="430" y2="400" stroke="#D97706" stroke-width="14"/>
  <polygon points="430,380 468,400 430,420" fill="#D97706"/>
  <line x1="578" y1="400" x2="720" y2="400" stroke="#D97706" stroke-width="14"/>
  <polygon points="720,380 758,400 720,420" fill="#D97706"/>
  <!-- Folder 1 -->
  <rect x="160" y="340" width="200" height="160" rx="14" fill="#F59E0B"/>
  <rect x="160" y="310" width="100" height="50" rx="12" fill="#FBBF24"/>
  <text x="260" y="436" font-family="Arial,sans-serif" font-size="40" fill="#FFFFFF" font-weight="bold" text-anchor="middle">bin</text>
  <circle cx="348" cy="420" r="18" fill="#22C55E"/>
  <!-- Folder 2 -->
  <rect x="478" y="340" width="200" height="160" rx="14" fill="#F59E0B"/>
  <rect x="478" y="310" width="100" height="50" rx="12" fill="#FBBF24"/>
  <text x="578" y="436" font-family="Arial,sans-serif" font-size="40" fill="#FFFFFF" font-weight="bold" text-anchor="middle">lib</text>
  <circle cx="666" cy="420" r="18" fill="#22C55E"/>
  <!-- Folder 3 (broken) -->
  <rect x="758" y="340" width="200" height="160" rx="14" fill="#FCA5A5"/>
  <rect x="758" y="310" width="100" height="50" rx="12" fill="#FCD3D3"/>
  <text x="858" y="436" font-family="Arial,sans-serif" font-size="40" fill="#DC2626" font-weight="bold" text-anchor="middle">old</text>
  <circle cx="858" cy="500" r="28" fill="#EF4444"/>
  <text x="858" y="512" font-family="Arial,sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold" text-anchor="middle">✗</text>
  <!-- Drag handles -->
  <text x="230" y="564" font-family="Arial,sans-serif" font-size="36" fill="#D97706" text-anchor="middle">⠿⠿</text>
  <text x="548" y="564" font-family="Arial,sans-serif" font-size="36" fill="#D97706" text-anchor="middle">⠿⠿</text>
  <text x="828" y="564" font-family="Arial,sans-serif" font-size="36" fill="#D97706" text-anchor="middle">⠿⠿</text>
  <!-- Label -->
  <text x="512" y="750" font-family="Arial,sans-serif" font-size="60" fill="#B45309" font-weight="bold" text-anchor="middle">PATH Chain</text>
  <text x="512" y="820" font-family="Arial,sans-serif" font-size="44" fill="#F59E0B" text-anchor="middle">순서·유효성 관리</text>
</svg>
