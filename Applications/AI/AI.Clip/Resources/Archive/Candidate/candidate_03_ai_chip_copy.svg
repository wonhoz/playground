<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051520"/>
      <stop offset="100%" stop-color="#0a2a1a"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="copyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <filter id="chipGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- AI Chip -->
  <rect x="140" y="160" width="180" height="180" rx="16" fill="#0a1f15" stroke="url(#chipGrad)" stroke-width="3"/>
  <!-- Chip inner grid -->
  <rect x="160" y="180" width="140" height="140" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
  <line x1="207" y1="180" x2="207" y2="320" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="254" y1="180" x2="254" y2="320" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="180" x2="300" y2="320" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="227" x2="320" y2="227" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="274" x2="320" y2="274" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <!-- Chip pins top -->
  <rect x="180" y="148" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="210" y="148" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="240" y="148" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="270" y="148" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <!-- Chip pins bottom -->
  <rect x="180" y="352" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="210" y="352" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="240" y="352" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <rect x="270" y="352" width="10" height="14" rx="3" fill="url(#chipGrad)"/>
  <!-- Chip pins left -->
  <rect x="128" y="185" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="128" y="215" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="128" y="245" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="128" y="275" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="128" y="305" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <!-- Chip pins right -->
  <rect x="320" y="185" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="320" y="215" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="320" y="245" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="320" y="275" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <rect x="320" y="305" width="14" height="10" rx="3" fill="url(#chipGrad)"/>
  <!-- Center AI core -->
  <rect x="205" y="215" width="52" height="70" rx="8" fill="url(#chipGrad)" fill-opacity="0.3" stroke="url(#chipGrad)" stroke-width="2" filter="url(#chipGlow)"/>
  <circle cx="231" cy="250" r="18" fill="url(#chipGrad)" fill-opacity="0.5" filter="url(#chipGlow)"/>
  <!-- Copy icon overlay (bottom right) -->
  <rect x="310" y="290" width="110" height="140" rx="10" fill="#051520" stroke="url(#copyGrad)" stroke-width="2.5" opacity="0.95"/>
  <rect x="330" y="310" width="110" height="140" rx="10" fill="#051520" stroke="url(#copyGrad)" stroke-width="2.5" opacity="0.7"/>
  <line x1="325" y1="345" x2="408" y2="345" stroke="#00b4d8" stroke-width="2" opacity="0.7"/>
  <line x1="325" y1="368" x2="400" y2="368" stroke="#00b4d8" stroke-width="2" opacity="0.7"/>
  <line x1="325" y1="391" x2="390" y2="391" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
</svg>