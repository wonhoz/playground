<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000820"/>
      <stop offset="100%" stop-color="#001028"/>
    </linearGradient>
    <linearGradient id="neon_green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00FFCC"/>
    </linearGradient>
    <linearGradient id="neon_pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0088"/>
      <stop offset="100%" stop-color="#FF44CC"/>
    </linearGradient>
    <radialGradient id="ball_neon" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCFFEE"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid floor -->
  <line x1="60" y1="400" x2="452" y2="400" stroke="#00FF88" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="420" x2="452" y2="420" stroke="#00FF88" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="440" x2="452" y2="440" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="380" x2="100" y2="460" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="380" x2="180" y2="460" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="260" y1="380" x2="260" y2="460" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="340" y1="380" x2="340" y2="460" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="420" y1="380" x2="420" y2="460" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <!-- Neon flag pin -->
  <line x1="360" y1="360" x2="360" y2="180" stroke="#00FF88" stroke-width="4"/>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <line x1="360" y1="360" x2="360" y2="180" stroke="#00FF88" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <polygon points="360,180 410,200 360,220" fill="url(#neon_pink)"/>
  <!-- Hole neon circle -->
  <ellipse cx="360" cy="362" rx="22" ry="9" fill="#000820" stroke="#00FF88" stroke-width="2"/>
  <!-- Neon ball -->
  <circle cx="120" cy="356" r="26" fill="url(#ball_neon)" stroke="#00FFCC" stroke-width="3"/>
  <!-- Trajectory dots -->
  <circle cx="160" cy="320" r="5" fill="#00FF88" opacity="0.7"/>
  <circle cx="210" cy="290" r="5" fill="#00FF88" opacity="0.6"/>
  <circle cx="265" cy="270" r="5" fill="#00FFCC" opacity="0.6"/>
  <circle cx="310" cy="280" r="5" fill="#00FFCC" opacity="0.7"/>
  <!-- Score display -->
  <rect x="150" y="90" width="212" height="70" rx="10" fill="#000820" stroke="#FF0088" stroke-width="2"/>
  <text x="256" y="118" text-anchor="middle" fill="#FF44CC" font-size="14" font-family="monospace">HOLE  3</text>
  <text x="256" y="146" text-anchor="middle" fill="#00FFCC" font-size="28" font-family="monospace" font-weight="bold">-2  BIRDIE</text>
</svg>
