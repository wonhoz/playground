<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2b)"/>

  <!-- Layer 2: 밝기 밀도 스케일 (메인 심볼) -->
  <!-- 어두운 쪽 → 밝은 쪽 문자 스케일 -->
  <rect x="130" y="200" width="764" height="544" rx="20" fill="#0A0F1A"/>
  <rect x="130" y="200" width="764" height="544" rx="20" fill="none" stroke="#1E293B" stroke-width="4"/>

  <!-- 헤더 -->
  <rect x="130" y="200" width="764" height="52" rx="20" fill="#1E293B"/>
  <rect x="130" y="232" width="764" height="20" fill="#1E293B"/>
  <text x="512" y="232" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#4B5563">Brightness  →  Character Density</text>

  <!-- 밝기 그라데이션 바 -->
  <defs>
    <linearGradient id="brt_grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect x="160" y="276" width="704" height="36" rx="8" fill="url(#brt_grad)"/>
  <text x="160" y="338" font-family="Consolas,monospace" font-size="22" fill="#374151">0.0</text>
  <text x="830" y="338" font-family="Consolas,monospace" font-size="22" fill="#E5E7EB">1.0</text>
  <text x="512" y="338" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#9CA3AF">brightness</text>

  <!-- 문자 밀도 표시 (큰 텍스트로) -->
  <g font-family="Consolas,monospace" font-weight="bold">
    <!-- @  가장 밀 (어둠) -->
    <text x="175" y="430" font-size="90" fill="#FFFFFF">@</text>
    <text x="175" y="470" font-size="20" fill="#6B7280">darkest</text>

    <text x="290" y="410" font-size="80" fill="#DDDDDD">#</text>
    <text x="380" y="390" font-size="70" fill="#BBBBBB">%</text>
    <text x="460" y="375" font-size="62" fill="#999999">*</text>
    <text x="535" y="365" font-size="54" fill="#777777">+</text>
    <text x="605" y="356" font-size="46" fill="#555555">-</text>
    <text x="668" y="348" font-size="38" fill="#333333">:</text>
    <text x="722" y="342" font-size="32" fill="#222222">.</text>

    <!-- 공백 (가장 밝음) -->
    <text x="780" y="370" font-size="24" fill="#111111">□</text>
    <text x="780" y="470" font-size="20" fill="#374151">lightest</text>
  </g>

  <!-- Layer 3: 샘플 변환 결과 (하단) -->
  <rect x="130" y="768" width="764" height="100" rx="16" fill="#060B14"/>
  <g font-family="Consolas,monospace" font-size="22">
    <text x="160" y="800">
      <tspan fill="#FFF">@</tspan><tspan fill="#EEE">@</tspan><tspan fill="#CCC">#</tspan><tspan fill="#AAA">%</tspan><tspan fill="#888">*</tspan><tspan fill="#666">+</tspan><tspan fill="#444">-</tspan><tspan fill="#222">.</tspan><tspan fill="#111"> </tspan><tspan fill="#222">.</tspan><tspan fill="#444">-</tspan><tspan fill="#666">+</tspan><tspan fill="#888">*</tspan><tspan fill="#AAA">%</tspan><tspan fill="#CCC">#</tspan><tspan fill="#EEE">@</tspan><tspan fill="#FFF">@</tspan>
    </text>
    <text x="160" y="836" fill="#4B5563">Char density mapped from pixel brightness</text>
  </g>
</svg>
