<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 프리뷰 분할창 에디터+렌더 | 공간/장면 | #0D1117 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0D1117"/>
  <!-- Layer 2: Split-view editor window -->
  <!-- Window chrome -->
  <rect x="160" y="220" width="704" height="560" rx="12" fill="#161B22" stroke="#30363D" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="160" y="220" width="704" height="36" rx="12" fill="#21262D"/>
  <circle cx="192" cy="238" r="7" fill="#FF5F56"/>
  <circle cx="216" cy="238" r="7" fill="#FEBC2E"/>
  <circle cx="240" cy="238" r="7" fill="#27C93F"/>
  <text x="512" y="244" font-family="monospace" font-size="14" fill="#8B949E" text-anchor="middle">document.md — Mark.View</text>
  <!-- Divider line -->
  <line x1="512" y1="256" x2="512" y2="780" stroke="#30363D" stroke-width="2"/>
  <!-- Left panel: Markdown source -->
  <text x="176" y="288" font-family="monospace" font-size="11" fill="#8B949E">Markdown</text>
  <text x="180" y="320" font-family="monospace" font-size="14" fill="#79C0FF"># 제목</text>
  <text x="180" y="344" font-family="monospace" font-size="14" fill="#C9D1D9">**굵게** _기울기_</text>
  <text x="180" y="368" font-family="monospace" font-size="14" fill="#A5D6FF">## 목차</text>
  <text x="180" y="392" font-family="monospace" font-size="14" fill="#C9D1D9">- 항목 1</text>
  <text x="180" y="412" font-family="monospace" font-size="14" fill="#C9D1D9">- 항목 2</text>
  <rect x="180" y="428" width="300" height="56" rx="4" fill="#0D1117"/>
  <text x="192" y="452" font-family="monospace" font-size="12" fill="#3FB950">```python</text>
  <text x="192" y="468" font-family="monospace" font-size="12" fill="#FFA657">print("hello")</text>
  <text x="192" y="484" font-family="monospace" font-size="12" fill="#3FB950">```</text>
  <text x="180" y="516" font-family="monospace" font-size="13" fill="#C9D1D9">| 이름 | 값 |</text>
  <text x="180" y="534" font-family="monospace" font-size="13" fill="#C9D1D9">|------|-----|</text>
  <text x="180" y="552" font-family="monospace" font-size="13" fill="#C9D1D9">| A    | 100 |</text>
  <!-- Right panel: Rendered HTML -->
  <text x="524" y="288" font-family="monospace" font-size="11" fill="#8B949E">Preview</text>
  <text x="528" y="320" font-family="Arial,sans-serif" font-size="20" fill="#E6EDF3" font-weight="bold">제목</text>
  <text x="528" y="350" font-family="Arial,sans-serif" font-size="14" fill="#C9D1D9"><tspan font-weight="bold">굵게</tspan> <tspan font-style="italic">기울기</tspan></text>
  <text x="528" y="378" font-family="Arial,sans-serif" font-size="17" fill="#E6EDF3" font-weight="bold">목차</text>
  <text x="528" y="400" font-family="Arial,sans-serif" font-size="13" fill="#C9D1D9">• 항목 1</text>
  <text x="528" y="418" font-family="Arial,sans-serif" font-size="13" fill="#C9D1D9">• 항목 2</text>
  <rect x="528" y="428" width="300" height="56" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="540" y="460" font-family="monospace" font-size="13" fill="#FFA657">print("hello")</text>
  <!-- Table rendered -->
  <rect x="528" y="500" width="280" height="68" rx="4" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <line x1="528" y1="524" x2="808" y2="524" stroke="#30363D" stroke-width="1"/>
  <text x="560" y="518" font-family="Arial,sans-serif" font-size="12" fill="#E6EDF3">이름</text>
  <text x="700" y="518" font-family="Arial,sans-serif" font-size="12" fill="#E6EDF3">값</text>
  <text x="560" y="548" font-family="Arial,sans-serif" font-size="12" fill="#C9D1D9">A</text>
  <text x="700" y="548" font-family="Arial,sans-serif" font-size="12" fill="#C9D1D9">100</text>
  <!-- Layer 3: Sync indicator -->
  <circle cx="512" cy="780" r="0"/>
</svg>
