<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- SVG angle brackets -->
  <path d="M80 256 L160 180 L160 332 Z" fill="none" stroke="url(#fire)" stroke-width="5" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M432 256 L352 180 L352 332 Z" fill="none" stroke="url(#fire)" stroke-width="5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Path letters in center -->
  <path d="M200 200 C200 160 250 160 250 200 C250 240 200 240 200 280 L250 280" stroke="url(#metal)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Flame particles -->
  <ellipse cx="256" cy="360" rx="20" ry="40" fill="url(#fire)" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="256" cy="340" rx="12" ry="28" fill="#ffd700" opacity="0.6" filter="url(#glow)"/>
  <ellipse cx="240" cy="380" rx="10" ry="20" fill="#ff4500" opacity="0.5" filter="url(#glow)"/>
  <ellipse cx="272" cy="375" rx="10" ry="22" fill="#ff8c00" opacity="0.5" filter="url(#glow)"/>
  <!-- Path indicator line glowing -->
  <path d="M170 256 C210 200 300 310 340 256" stroke="url(#fire)" stroke-width="3" fill="none" filter="url(#glow)"/>
</svg>