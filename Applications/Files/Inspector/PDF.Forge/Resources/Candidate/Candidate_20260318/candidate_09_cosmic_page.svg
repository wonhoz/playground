<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a0804"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="cosmicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#EF4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebulablur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Cosmic nebula background -->
  <ellipse cx="200" cy="200" rx="180" ry="150" fill="#F97316" fill-opacity="0.06" filter="url(#nebulablur)"/>
  <ellipse cx="330" cy="300" rx="160" ry="130" fill="#EF4444" fill-opacity="0.05" filter="url(#nebulablur)"/>

  <!-- Stars -->
  <circle cx="60" cy="70" r="1.5" fill="white" fill-opacity="0.6"/>
  <circle cx="160" cy="50" r="1" fill="#F97316" fill-opacity="0.7"/>
  <circle cx="420" cy="60" r="1.5" fill="white" fill-opacity="0.5"/>
  <circle cx="460" cy="120" r="1" fill="white" fill-opacity="0.6"/>
  <circle cx="80" cy="400" r="1.5" fill="#F97316" fill-opacity="0.5"/>
  <circle cx="440" cy="430" r="1" fill="white" fill-opacity="0.4"/>
  <circle cx="490" cy="250" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="30" cy="250" r="1.5" fill="#EF4444" fill-opacity="0.5"/>

  <!-- Cosmic ring (solar corona) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#F97316" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.12"/>

  <!-- Orbital rings around document -->
  <ellipse cx="256" cy="256" rx="160" ry="50" fill="none" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35" transform="rotate(-20 256 256)" filter="url(#softglow)"/>
  <ellipse cx="256" cy="256" rx="140" ry="45" fill="none" stroke="#EF4444" stroke-width="1" stroke-opacity="0.25" transform="rotate(40 256 256)"/>

  <!-- Orbital particles -->
  <circle cx="385" cy="190" r="6" fill="#F97316" filter="url(#glow)"/>
  <circle cx="125" cy="322" r="5" fill="#EF4444" filter="url(#glow)"/>
  <circle cx="310" cy="395" r="4" fill="#F97316" filter="url(#softglow)"/>

  <!-- Main document (cosmic) -->
  <rect x="170" y="130" width="172" height="252" rx="8" fill="#120604" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glow)"/>
  <!-- Doc corner fold -->
  <polygon points="312,130 342,130 342,160" fill="#0a0304" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="312" y1="130" x2="342" y2="160" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Cosmic document content (stars and nebula inside page) -->
  <rect x="180" y="140" width="152" height="95" rx="4" fill="#1a0806" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Mini cosmic inside doc -->
  <circle cx="256" cy="188" r="35" fill="#F97316" fill-opacity="0.08" filter="url(#glow)"/>
  <circle cx="256" cy="188" r="25" fill="#EF4444" fill-opacity="0.1"/>
  <circle cx="256" cy="188" r="12" fill="#F97316" fill-opacity="0.25" filter="url(#softglow)"/>
  <circle cx="256" cy="188" r="5" fill="#EF4444" fill-opacity="0.5"/>
  <!-- Mini stars in doc panel -->
  <circle cx="200" cy="165" r="1.5" fill="#F97316" fill-opacity="0.6"/>
  <circle cx="215" cy="150" r="1" fill="white" fill-opacity="0.4"/>
  <circle cx="300" cy="160" r="1.5" fill="#F97316" fill-opacity="0.5"/>
  <circle cx="315" cy="175" r="1" fill="white" fill-opacity="0.35"/>

  <!-- PDF label -->
  <rect x="185" y="250" width="55" height="16" rx="8" fill="#F97316" fill-opacity="0.55" filter="url(#softglow)"/>

  <!-- Doc text lines -->
  <rect x="185" y="278" width="152" height="7" rx="3.5" fill="#F97316" fill-opacity="0.45" filter="url(#softglow)"/>
  <rect x="185" y="292" width="135" height="6" rx="3" fill="#EF4444" fill-opacity="0.38"/>
  <rect x="185" y="305" width="148" height="6" rx="3" fill="#F97316" fill-opacity="0.42"/>
  <rect x="185" y="318" width="120" height="6" rx="3" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="185" y="340" width="152" height="7" rx="3.5" fill="#F97316" fill-opacity="0.45"/>
  <rect x="185" y="354" width="140" height="6" rx="3" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="185" y="367" width="148" height="6" rx="3" fill="#F97316" fill-opacity="0.4"/>

  <!-- Sun corona rays from behind document -->
  <g stroke="#F97316" stroke-width="1.5" stroke-opacity="0.2" filter="url(#softglow)">
    <line x1="170" y1="256" x2="50" y2="256"/>
    <line x1="342" y1="256" x2="462" y2="256"/>
    <line x1="256" y1="130" x2="256" y2="40"/>
    <line x1="256" y1="382" x2="256" y2="472"/>
    <line x1="188" y1="158" x2="130" y2="110"/>
    <line x1="324" y1="158" x2="382" y2="110"/>
    <line x1="188" y1="354" x2="130" y2="402"/>
    <line x1="324" y1="354" x2="382" y2="402"/>
  </g>
</svg>
