<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74D7F7"/>
      <stop offset="100%" stop-color="#3AB4E8"/>
    </linearGradient>
    <linearGradient id="blurGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B0C8D8"/>
      <stop offset="100%" stop-color="#8BAFC2"/>
    </linearGradient>
    <linearGradient id="sharpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <clipPath id="leftClip">
      <rect x="112" y="200" width="288" height="384"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="400" y="200" width="288" height="384"/>
    </clipPath>
    <filter id="blurFx">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- 이미지 프레임 배경 -->
  <rect x="112" y="200" width="576" height="384" rx="24" fill="#E8F5FB"/>

  <!-- 좌측 흐릿한 이미지 -->
  <g clip-path="url(#leftClip)" filter="url(#blurFx)">
    <rect x="112" y="200" width="288" height="384" fill="#B8D4E4"/>
    <!-- 산 실루엣 흐릿하게 -->
    <polygon points="160,520 240,340 320,520" fill="#8BAFC2"/>
    <polygon points="260,520 370,370 440,520" fill="#9BBDCE"/>
    <circle cx="220" cy="310" r="60" fill="#D4E8F4" opacity="0.6"/>
    <!-- 픽셀 노이즈 효과 -->
    <rect x="130" y="250" width="20" height="20" fill="#A0BDD0" opacity="0.4"/>
    <rect x="150" y="270" width="20" height="20" fill="#C0D8E8" opacity="0.4"/>
    <rect x="170" y="250" width="20" height="20" fill="#90ADBF" opacity="0.4"/>
    <rect x="300" y="430" width="20" height="20" fill="#A8C2D4" opacity="0.4"/>
  </g>

  <!-- 우측 선명한 이미지 -->
  <g clip-path="url(#rightClip)">
    <rect x="400" y="200" width="288" height="384" fill="#FFF0E6"/>
    <!-- 선명한 산 실루엣 -->
    <polygon points="400,560 490,370 570,560" fill="#FF7043"/>
    <polygon points="520,560 640,390 720,560" fill="#FF8C5A"/>
    <!-- 선명한 하늘 -->
    <rect x="400" y="200" width="288" height="200" fill="#87CEEB"/>
    <circle cx="460" cy="270" r="50" fill="#FFD700"/>
    <!-- 선명한 나무들 -->
    <rect x="430" y="460" width="18" height="60" fill="#5D4037"/>
    <polygon points="439,390 410,470 468,470" fill="#2E7D32"/>
    <polygon points="439,360 405,450 473,450" fill="#388E3C"/>
    <rect x="560" y="480" width="18" height="40" fill="#5D4037"/>
    <polygon points="569,420 540,490 598,490" fill="#2E7D32"/>
  </g>

  <!-- 분할선 -->
  <rect x="396" y="188" width="8" height="408" rx="4" fill="white"/>
  <!-- 슬라이더 핸들 -->
  <circle cx="400" cy="392" r="28" fill="white" opacity="0.95"/>
  <polygon points="378,392 394,374 394,410" fill="#3AB4E8"/>
  <polygon points="422,392 406,374 406,410" fill="#3AB4E8"/>

  <!-- 레이블 -->
  <rect x="128" y="548" width="120" height="36" rx="18" fill="white" opacity="0.7"/>
  <text x="188" y="571" font-family="Arial" font-size="22" font-weight="bold" fill="#5A8A9F" text-anchor="middle">BEFORE</text>
  <rect x="452" y="548" width="124" height="36" rx="18" fill="white" opacity="0.7"/>
  <text x="514" y="571" font-family="Arial" font-size="22" font-weight="bold" fill="#FF6B35" text-anchor="middle">AFTER</text>

  <!-- 하단 텍스트 -->
  <text x="512" y="680" font-family="Arial Black, Arial" font-size="52" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">Brush.Scale</text>
</svg>