<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01010a"/>
      <stop offset="100%" stop-color="#04040f"/>
    </linearGradient>
    <radialGradient id="galaxyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8cc" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffaa44" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#9933ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#220066" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Galaxy glow -->
  <ellipse cx="256" cy="256" rx="180" ry="120" fill="url(#galaxyCore)" opacity="0.4" transform="rotate(-20,256,256)"/>
  <!-- Spiral arms as word blocks -->
  <rect x="280" y="200" width="65" height="13" rx="4" fill="#ff9f43" opacity="0.85" transform="rotate(-20,312,206)"/>
  <rect x="330" y="230" width="50" height="11" rx="3" fill="#ffeaa7" opacity="0.75" transform="rotate(-10,355,235)"/>
  <rect x="350" y="268" width="45" height="10" rx="3" fill="#fdcb6e" opacity="0.65" transform="rotate(5,372,273)"/>
  <rect x="300" y="316" width="55" height="12" rx="4" fill="#ff7675" opacity="0.75" transform="rotate(20,327,322)"/>
  <rect x="245" y="336" width="65" height="13" rx="4" fill="#fd79a8" opacity="0.8" transform="rotate(30,277,342)"/>
  <rect x="182" y="325" width="55" height="12" rx="4" fill="#a29bfe" opacity="0.8" transform="rotate(20,209,331)"/>
  <rect x="136" y="285" width="50" height="11" rx="3" fill="#74b9ff" opacity="0.7" transform="rotate(10,161,290)"/>
  <rect x="128" y="238" width="48" height="10" rx="3" fill="#55efc4" opacity="0.65" transform="rotate(-5,152,243)"/>
  <rect x="162" y="198" width="58" height="12" rx="4" fill="#00cec9" opacity="0.75" transform="rotate(-15,191,204)"/>
  <rect x="218" y="175" width="62" height="13" rx="4" fill="#6c5ce7" opacity="0.8" transform="rotate(-20,249,181)"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="30" fill="#ffe8cc" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="white" opacity="0.95" filter="url(#glow)"/>
  <!-- Word at core -->
  <rect x="232" y="250" width="48" height="12" rx="4" fill="#1a1a1a" opacity="0.8"/>
</svg>