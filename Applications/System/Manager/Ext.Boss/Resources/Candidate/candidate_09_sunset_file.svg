<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f57f17"/>
      <stop offset="50%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun rays -->
  <circle cx="256" cy="180" r="70" fill="url(#sunGrad)" opacity="0.3"/>
  <circle cx="256" cy="180" r="45" fill="url(#sunGrad)" opacity="0.5"/>
  <circle cx="256" cy="180" r="25" fill="url(#sunGrad)"/>
  <!-- Horizon line -->
  <rect x="0" y="300" width="512" height="212" fill="#e91e63" opacity="0.3" rx="0"/>
  <!-- File shape -->
  <rect x="140" y="200" width="180" height="230" rx="14" fill="url(#fileGrad)"/>
  <polygon points="278,200 320,242 278,242" fill="#fff9c4" opacity="0.6"/>
  <polygon points="278,200 320,200 320,242" fill="white" opacity="0.8"/>
  <!-- File ext block -->
  <rect x="158" y="310" width="85" height="32" rx="8" fill="#f57f17"/>
  <text x="200" y="332" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">.EXT</text>
  <!-- File lines -->
  <rect x="158" y="355" width="144" height="10" rx="5" fill="#f57f17" opacity="0.3"/>
  <rect x="158" y="372" width="120" height="10" rx="5" fill="#f57f17" opacity="0.25"/>
  <!-- Link arrow -->
  <path d="M320 315 Q390 315 390 370" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <polygon points="380,365 400,365 390,385" fill="white" opacity="0.7"/>
  <!-- App box -->
  <rect x="355" y="370" width="80" height="70" rx="12" fill="white" opacity="0.85"/>
  <text x="395" y="413" font-family="Arial" font-size="28" text-anchor="middle">⚙</text>
</svg>
