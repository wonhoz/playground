<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <radialGradient id="spot10" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FF8F00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg10)"/>
  <!-- Spotlight glow overlay -->
  <rect width="1024" height="1024" rx="200" fill="url(#spot10)"/>
  <!-- Spotlight beam rays (from upper-left) -->
  <polygon points="130,130 420,512 130,700" fill="#FFD600" opacity="0.12"/>
  <polygon points="130,130 560,420 200,130" fill="#FF8F00" opacity="0.10"/>
  <polygon points="130,130 500,550 130,800" fill="#FFD600" opacity="0.08"/>
  <!-- Layer 2: Main ∑ character (large, glowing) -->
  <!-- Glow shadow -->
  <text x="520" y="540" text-anchor="middle" dominant-baseline="middle" font-size="480" font-family="Segoe UI,Arial,sans-serif" font-weight="bold" fill="#FFD600" opacity="0.25">∑</text>
  <!-- Main char -->
  <text x="512" y="530" text-anchor="middle" dominant-baseline="middle" font-size="480" font-family="Segoe UI,Arial,sans-serif" font-weight="bold" fill="#E65100">∑</text>
  <!-- Layer 3: Small chars in corners (dimmer, suggesting more chars) -->
  <text x="188" y="230" text-anchor="middle" dominant-baseline="middle" font-size="110" font-family="Segoe UI,Arial,sans-serif" fill="#0097A7" opacity="0.5">©</text>
  <text x="836" y="820" text-anchor="middle" dominant-baseline="middle" font-size="110" font-family="Segoe UI,Arial,sans-serif" fill="#00838F" opacity="0.4">→</text>
  <text x="820" y="220" text-anchor="middle" dominant-baseline="middle" font-size="90" font-family="Segoe UI,Arial,sans-serif" fill="#0097A7" opacity="0.35">★</text>
  <!-- Sparkle dots around the ∑ -->
  <circle cx="290" cy="360" r="16" fill="#FFD600" opacity="0.8"/>
  <circle cx="340" cy="280" r="10" fill="#FF8F00" opacity="0.7"/>
  <circle cx="750" cy="340" r="14" fill="#FFD600" opacity="0.7"/>
  <circle cx="820" cy="460" r="10" fill="#FF8F00" opacity="0.6"/>
  <circle cx="680" cy="820" r="12" fill="#FFD600" opacity="0.5"/>
</svg>
