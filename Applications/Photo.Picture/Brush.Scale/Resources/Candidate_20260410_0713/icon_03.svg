<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- 배경 장식 원들 -->
  <circle cx="150" cy="180" r="90" fill="rgba(255,255,255,0.08)"/>
  <circle cx="870" cy="820" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="820" cy="200" r="60" fill="rgba(255,255,255,0.06)"/>

  <!-- 메인 텍스트 ×4 -->
  <text x="512" y="470" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="320" fill="white">×4</text>

  <!-- 업스케일 화살표들 (아래에서 위로) -->
  <g fill="rgba(255,255,255,0.75)" stroke="none">
    <!-- 왼쪽 화살표 -->
    <polygon points="248,730 200,730 224,650"/>
    <rect x="210" y="730" width="28" height="80" fill="rgba(255,255,255,0.75)"/>
    <!-- 중앙 화살표 -->
    <polygon points="524,710 476,710 500,630"/>
    <rect x="486" y="710" width="28" height="100" fill="rgba(255,255,255,0.75)"/>
    <!-- 오른쪽 화살표 -->
    <polygon points="800,730 752,730 776,650"/>
    <rect x="762" y="730" width="28" height="80" fill="rgba(255,255,255,0.75)"/>
  </g>

  <!-- 배율 레이블 -->
  <text x="512" y="880" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="56" fill="rgba(255,255,255,0.72)">AI Upscale</text>

  <!-- 상단 해상도 힌트 -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="rgba(255,255,255,0.5)">1x</text>
  <text x="824" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="42" fill="rgba(255,255,255,0.8)">4K</text>
  <!-- 연결 화살표 -->
  <line x1="240" y1="178" x2="775" y2="178" stroke="rgba(255,255,255,0.3)" stroke-width="6" stroke-dasharray="18,10"/>
  <polygon points="790,178 758,162 758,194" fill="rgba(255,255,255,0.5)"/>
</svg>
