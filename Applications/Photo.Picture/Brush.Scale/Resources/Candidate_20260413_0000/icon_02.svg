<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal · 기하학 추상 · 픽셀 그리드 → 스무스 그라데이션 -->
  <defs>
    <linearGradient id="grad02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B9D"/>
      <stop offset="0.5" stop-color="#FFD93D"/>
      <stop offset="1" stop-color="#06D6A0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFF7E0"/>
  <!-- 큰 배경 프레임 -->
  <rect x="120" y="150" width="784" height="720" rx="50" fill="#FFFFFF" stroke="#2C3E50" stroke-width="16"/>
  <!-- 왼쪽: 4x4 픽셀 그리드 -->
  <g transform="translate(170 220)">
    <rect x="0" y="0" width="360" height="360" fill="#F0F0F0" stroke="#2C3E50" stroke-width="8"/>
    <g>
      <rect x="0" y="0" width="90" height="90" fill="#FF6B9D"/>
      <rect x="90" y="0" width="90" height="90" fill="#FF8FA3"/>
      <rect x="180" y="0" width="90" height="90" fill="#FFB366"/>
      <rect x="270" y="0" width="90" height="90" fill="#FFD93D"/>
      <rect x="0" y="90" width="90" height="90" fill="#FF8FA3"/>
      <rect x="90" y="90" width="90" height="90" fill="#FFB366"/>
      <rect x="180" y="90" width="90" height="90" fill="#FFD93D"/>
      <rect x="270" y="90" width="90" height="90" fill="#B0E080"/>
      <rect x="0" y="180" width="90" height="90" fill="#FFB366"/>
      <rect x="90" y="180" width="90" height="90" fill="#FFD93D"/>
      <rect x="180" y="180" width="90" height="90" fill="#B0E080"/>
      <rect x="270" y="180" width="90" height="90" fill="#06D6A0"/>
      <rect x="0" y="270" width="90" height="90" fill="#FFD93D"/>
      <rect x="90" y="270" width="90" height="90" fill="#B0E080"/>
      <rect x="180" y="270" width="90" height="90" fill="#06D6A0"/>
      <rect x="270" y="270" width="90" height="90" fill="#1ABC9C"/>
    </g>
  </g>
  <!-- 화살표 -->
  <g transform="translate(550 400)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#9B59B6"/>
    <path d="M 70 -24 L 140 14 L 70 52 Z" fill="#9B59B6" stroke="#6C3483" stroke-width="10"/>
  </g>
  <!-- 오른쪽: 스무스 그라데이션 -->
  <rect x="704" y="220" width="180" height="360" rx="8" fill="url(#grad02)" stroke="#2C3E50" stroke-width="8"/>
  <!-- 하단 "UPSCALE" -->
  <text x="512" y="810" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="#2C3E50" text-anchor="middle">UPSCALE</text>
</svg>
