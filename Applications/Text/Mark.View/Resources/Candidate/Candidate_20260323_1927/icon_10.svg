<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_mv10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_mv10)"/>
  <!-- "MD" 큰 텍스트 -->
  <text x="330" y="540" font-family="'Arial Black', sans-serif" font-size="280" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">MD</text>
  <!-- 오른쪽 화살표 -->
  <line x1="510" y1="512" x2="620" y2="512" stroke="white" stroke-width="44" stroke-linecap="round"/>
  <polygon points="614,476 678,512 614,548" fill="white"/>
  <!-- 오른쪽 렌더 아이콘들 모음 -->
  <!-- 제목 H 아이콘 -->
  <rect x="690" y="290" width="120" height="80" rx="16" fill="white" opacity="0.95"/>
  <text x="750" y="348" font-family="'Arial Black', sans-serif" font-size="60" font-weight="900" fill="#D97706" text-anchor="middle">H</text>
  <!-- Bold B 아이콘 -->
  <rect x="830" y="290" width="100" height="80" rx="16" fill="white" opacity="0.9"/>
  <text x="880" y="347" font-family="'Georgia', serif" font-size="58" font-weight="900" fill="#92400E" text-anchor="middle">B</text>
  <!-- 목록 아이콘 -->
  <rect x="690" y="388" width="240" height="100" rx="16" fill="white" opacity="0.85"/>
  <circle cx="720" cy="418" r="10" fill="#D97706"/>
  <rect x="740" y="411" width="168" height="16" rx="5" fill="#FDE68A"/>
  <circle cx="720" cy="458" r="10" fill="#D97706"/>
  <rect x="740" y="451" width="140" height="16" rx="5" fill="#FDE68A"/>
  <!-- 링크 아이콘 -->
  <rect x="690" y="506" width="240" height="80" rx="16" fill="white" opacity="0.8"/>
  <text x="810" y="558" font-family="Arial" font-size="40" fill="#1D4ED8" text-anchor="middle" text-decoration="underline">link</text>
  <!-- 코드 아이콘 -->
  <rect x="690" y="604" width="240" height="80" rx="16" fill="#1C1917" opacity="0.9"/>
  <text x="810" y="652" font-family="'Courier New', monospace" font-size="34" fill="#4ADE80" text-anchor="middle">code</text>
</svg>
