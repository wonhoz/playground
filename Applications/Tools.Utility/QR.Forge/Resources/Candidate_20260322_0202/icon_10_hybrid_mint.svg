  <!-- 스마트폰 외곽 -->
  <rect x="300" y="60" width="424" height="760" rx="50" fill="url(#phoneBg)"/>
  <!-- 폰 하이라이트 -->
  <rect x="304" y="64" width="416" height="752" rx="48" fill="none" stroke="#4DB6AC" stroke-width="3" opacity="0.6"/>
  <!-- 폰 그림자 -->
  <rect x="312" y="820" width="400" height="8" rx="4" fill="#00695C" opacity="0.4"/>

  <!-- 폰 스크린 -->
  <rect x="320" y="110" width="384" height="660" rx="20" fill="url(#screenBg)"/>

  <!-- 카메라/노치 -->
  <rect x="460" y="80" width="104" height="18" rx="9" fill="#00332E"/>
  <circle cx="540" cy="89" r="6" fill="#004D45"/>

  <!-- 홈버튼 라인 -->
  <rect x="430" y="826" width="164" height="6" rx="3" fill="#00897B" opacity="0.5"/>

  <!-- 폰 스크린 안에 QR 코드 -->
  <!-- QR 코드 패널 -->
  <rect x="340" y="180" width="344" height="344" rx="14" fill="#FFFFFF"/>
  <rect x="340" y="180" width="344" height="344" rx="14" fill="none" stroke="#26A69A" stroke-width="2" opacity="0.5"/>

  <!-- 좌상 코너 파인더 -->
  <rect x="358" y="198" width="90" height="90" rx="8" fill="url(#mintGrad)"/>
  <rect x="368" y="208" width="70" height="70" rx="5" fill="#FFFFFF"/>
  <rect x="378" y="218" width="50" height="50" rx="4" fill="url(#mintGrad)"/>

