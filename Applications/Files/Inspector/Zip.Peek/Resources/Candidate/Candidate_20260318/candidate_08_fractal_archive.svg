<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Sierpinski triangle fractal (self-similar compression) -->
  <!-- Level 0 (outer outline) -->
  <polygon points="256,40 462,392 50,392" fill="none" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.6" filter="url(#softglow)"/>

  <!-- Level 1 triangles -->
  <polygon points="256,40 359,216 153,216" fill="none" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.55"/>
  <polygon points="153,216 256,392 50,392" fill="none" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.55"/>
  <polygon points="359,216 462,392 256,392" fill="none" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Level 2 triangles -->
  <!-- Top triangle subdivisions -->
  <polygon points="256,40 307,128 205,128" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="205,128 256,216 153,216" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="307,128 359,216 256,216" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Bottom-left triangle subdivisions -->
  <polygon points="153,216 204,304 102,304" fill="none" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.45"/>
  <polygon points="102,304 153,392 50,392" fill="none" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.45"/>
  <polygon points="204,304 256,392 153,392" fill="none" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Bottom-right triangle subdivisions -->
  <polygon points="359,216 410,304 308,304" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.45"/>
  <polygon points="308,304 359,392 256,392" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.45"/>
  <polygon points="410,304 462,392 359,392" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Level 3 (finer) - top sub-triangles -->
  <polygon points="256,40 281,84 231,84" fill="#EAB308" fill-opacity="0.1" stroke="#EAB308" stroke-width="1" stroke-opacity="0.5" filter="url(#softglow)"/>
  <polygon points="231,84 256,128 205,128" fill="#FBBF24" fill-opacity="0.08" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="281,84 307,128 256,128" fill="#EAB308" fill-opacity="0.08" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <!-- A few more level 3 in other triangles -->
  <polygon points="153,216 178,260 128,260" fill="#EAB308" fill-opacity="0.1" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="359,216 384,260 334,260" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Filled core triangles (inverted) to suggest compression -->
  <polygon points="153,216 256,216 204,128" fill="#EAB308" fill-opacity="0.06"/>
  <polygon points="256,392 153,392 204,304" fill="#FBBF24" fill-opacity="0.06"/>
  <polygon points="256,392 359,392 308,304" fill="#EAB308" fill-opacity="0.06"/>

  <!-- Archive node glows at vertices -->
  <circle cx="256" cy="40" r="7" fill="#EAB308" filter="url(#glow)"/>
  <circle cx="462" cy="392" r="7" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="50" cy="392" r="7" fill="#FBBF24" filter="url(#glow)"/>

  <!-- Mid-point nodes -->
  <circle cx="359" cy="216" r="5" fill="#EAB308" filter="url(#softglow)"/>
  <circle cx="153" cy="216" r="5" fill="#F59E0B" filter="url(#softglow)"/>
  <circle cx="256" cy="392" r="5" fill="#EAB308" filter="url(#softglow)"/>
</svg>
