<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a10"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#8E54E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- PCB-style circuit traces -->
  <!-- Main signal path -->
  <path d="M80,256 L140,256 L140,160 L220,160 L220,200 L300,200 L300,160 L380,160 L380,256 L440,256" fill="none" stroke="url(#pathGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Secondary paths -->
  <path d="M140,256 L140,350 L220,350 L220,300 L300,300 L300,350 L380,350 L380,256" fill="none" stroke="#4776E6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Vertical branch -->
  <path d="M220,160 L220,110 L300,110 L300,160" fill="none" stroke="#ee0979" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" filter="url(#glow)"/>

  <!-- Component nodes -->
  <!-- Resistor at (220,160) -->
  <rect x="205" y="152" width="30" height="16" rx="4" fill="#1a2a3a" stroke="#00ff88" stroke-width="2"/>
  <line x1="210" y1="160" x2="215" y2="155" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="215" y1="155" x2="220" y2="165" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="220" y1="165" x2="225" y2="155" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="225" y1="155" x2="230" y2="165" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="230" y1="165" x2="235" y2="160" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Capacitor at (300,200) -->
  <line x1="300" y1="185" x2="300" y2="193" stroke="#56CCF2" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="290" y1="193" x2="310" y2="193" stroke="#56CCF2" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="290" y1="197" x2="310" y2="197" stroke="#56CCF2" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="300" y1="197" x2="300" y2="205" stroke="#56CCF2" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- IC chip at center -->
  <rect x="215" y="235" width="82" height="42" rx="6" fill="#1a2a3a" stroke="#ffd200" stroke-width="2"/>
  <!-- IC pins -->
  <line x1="228" y1="235" x2="228" y2="226" stroke="#ffd200" stroke-width="2"/>
  <line x1="244" y1="235" x2="244" y2="226" stroke="#ffd200" stroke-width="2"/>
  <line x1="260" y1="235" x2="260" y2="226" stroke="#ffd200" stroke-width="2"/>
  <line x1="276" y1="235" x2="276" y2="226" stroke="#ffd200" stroke-width="2"/>
  <line x1="228" y1="277" x2="228" y2="286" stroke="#ffd200" stroke-width="2"/>
  <line x1="244" y1="277" x2="244" y2="286" stroke="#ffd200" stroke-width="2"/>
  <line x1="260" y1="277" x2="260" y2="286" stroke="#ffd200" stroke-width="2"/>
  <line x1="276" y1="277" x2="276" y2="286" stroke="#ffd200" stroke-width="2"/>
  <!-- IC label dot -->
  <circle cx="223" cy="243" r="3" fill="#ffd200" opacity="0.7"/>

  <!-- Junction dots -->
  <circle cx="140" cy="256" r="6" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="380" cy="256" r="6" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="220" cy="160" r="6" fill="#56CCF2" filter="url(#glow)"/>
  <circle cx="300" cy="160" r="6" fill="#56CCF2" filter="url(#glow)"/>

  <!-- Input/Output connectors -->
  <rect x="60" y="248" width="28" height="16" rx="4" fill="#2a3a4a" stroke="#00ff88" stroke-width="2"/>
  <line x1="63" y1="252" x2="63" y2="260" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="252" x2="70" y2="260" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <line x1="77" y1="252" x2="77" y2="260" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>

  <rect x="424" y="248" width="28" height="16" rx="4" fill="#2a3a4a" stroke="#8E54E9" stroke-width="2"/>
  <circle cx="438" cy="256" r="4" fill="#8E54E9" opacity="0.8"/>

  <!-- Signal flow arrows -->
  <polygon points="172,153 180,160 172,167" fill="#00ff88" opacity="0.8"/>
  <polygon points="324,153 332,160 324,167" fill="#56CCF2" opacity="0.8"/>
</svg>
