<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 민트 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 파일 카드 (대각선) -->
  <rect x="120" y="200" width="520" height="660" rx="32" fill="#00695C" transform="rotate(-5 380 530)"/>
  <rect x="130" y="210" width="520" height="660" rx="32" fill="#00838F" transform="rotate(-2 390 540)"/>
  <rect x="140" y="220" width="520" height="660" rx="32" fill="#26C6DA"/>
  <!-- 파일 내용 -->
  <text x="400" y="370" font-family="'Segoe UI', sans-serif" font-size="56" fill="white" text-anchor="middle">installer.zip</text>
  <!-- 해시값 줄들 -->
  <text x="400" y="460" font-family="'Consolas', monospace" font-size="36" fill="#B2EBF2" text-anchor="middle">5d41402abc4b</text>
  <text x="400" y="510" font-family="'Consolas', monospace" font-size="36" fill="#B2EBF2" text-anchor="middle">2af4b28f3c9e</text>
  <text x="400" y="560" font-family="'Consolas', monospace" font-size="36" fill="#B2EBF2" text-anchor="middle">7f1a0d8c2e4b</text>
  <text x="400" y="610" font-family="'Consolas', monospace" font-size="36" fill="#B2EBF2" text-anchor="middle">3c9a5f2d1e8b</text>
  <!-- Layer 3: 체크마크 배지 (우하단) -->
  <circle cx="780" cy="740" r="180" fill="#E91E63"/>
  <circle cx="780" cy="740" r="140" fill="#C2185B"/>
  <!-- X 마크 (불일치 시뮬레이션 → 아이콘 다양성) -->
  <polyline points="692,740 740,788 868,680" fill="none" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- SHA-256 레이블 -->
  <rect x="580" y="880" width="300" height="72" rx="16" fill="#6A1B9A"/>
  <text x="730" y="932" font-family="'Consolas', monospace" font-weight="700" font-size="48" fill="white" text-anchor="middle">SHA-256</text>
</svg>
