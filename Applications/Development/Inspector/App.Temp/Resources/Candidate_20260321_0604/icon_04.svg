<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-04">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="bg-grad-04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2A3A"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg-grad-04)"/>
  <g clip-path="url(#bg-clip-04)">
