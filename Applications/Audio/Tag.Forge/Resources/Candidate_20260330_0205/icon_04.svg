<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="anvil4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 딥 오렌지-레드 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg4)"/>
  <!-- 불꽃 효과 (배경) -->
  <ellipse cx="512" cy="900" rx="400" ry="120" fill="#FF6F00" opacity="0.3"/>
  <ellipse cx="512" cy="850" rx="280" ry="80" fill="#FF8F00" opacity="0.4"/>

  <!-- Layer 2: 모루 (Forge) -->
  <!-- 모루 받침 -->
  <rect x="240" y="720" width="544" height="80" rx="12" fill="url(#anvil4)"/>
  <!-- 모루 기둥 -->
  <rect x="370" y="650" width="280" height="80" rx="0" fill="#546E7A"/>
  <!-- 모루 상판 -->
  <rect x="200" y="580" width="624" height="80" rx="16" fill="url(#anvil4)"/>

  <!-- 망치 (대각선 동적) -->
  <g transform="rotate(-35 512 400)">
    <rect x="460" y="180" width="60" height="300" rx="12" fill="#8D6E63"/>
    <rect x="380" y="140" width="220" height="100" rx="16" fill="#5D4037"/>
  </g>

  <!-- Layer 3: 음표 (단조되는 대상) — 모루 위 -->
  <text x="512" y="570" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="120" fill="#FFD740" text-anchor="middle" dominant-baseline="middle">♪</text>
  <!-- 불꽃 파티클 -->
  <circle cx="420" cy="520" r="14" fill="#FFD740" opacity="0.9"/>
  <circle cx="600" cy="500" r="10" fill="#FF8F00" opacity="0.8"/>
  <circle cx="350" cy="480" r="8" fill="#FFD740" opacity="0.7"/>
  <circle cx="650" cy="540" r="12" fill="#FF6F00" opacity="0.8"/>
  <!-- 배지 -->
  <rect x="240" y="840" width="544" height="66" rx="18" fill="#FF6F00" opacity="0.9"/>
  <text x="512" y="874" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="white" text-anchor="middle" dominant-baseline="middle">Forge Your Tags</text>
</svg>
