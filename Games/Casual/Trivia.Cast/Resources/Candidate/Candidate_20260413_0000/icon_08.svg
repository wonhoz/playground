<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: metaphor · 레이어드 · 카테고리 카드 팬 (과학/역사/음악/영화) -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE4EC"/>
      <stop offset="1" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg08)"/>
  <!-- 카드 팬 (부채꼴) -->
  <g transform="translate(512 720)">
    <!-- 카드 1: 역사 (가장 왼쪽) -->
    <g transform="rotate(-36)">
      <rect x="-110" y="-520" width="220" height="420" rx="24" fill="#06D6A0" stroke="#056B4F" stroke-width="14"/>
      <text x="0" y="-300" font-family="Arial Black" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">HIST</text>
      <text x="0" y="-220" font-family="Arial Black" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">📜</text>
      <circle cx="0" cy="-440" r="30" fill="#FFFFFF"/>
      <text x="0" y="-420" font-family="Arial Black" font-weight="900" font-size="44" fill="#056B4F" text-anchor="middle">?</text>
    </g>
    <!-- 카드 2: 과학 -->
    <g transform="rotate(-12)">
      <rect x="-110" y="-540" width="220" height="420" rx="24" fill="#3A86FF" stroke="#0D47A1" stroke-width="14"/>
      <text x="0" y="-320" font-family="Arial Black" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">SCI</text>
      <text x="0" y="-240" font-family="Arial Black" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">🔬</text>
      <circle cx="0" cy="-460" r="30" fill="#FFFFFF"/>
      <text x="0" y="-440" font-family="Arial Black" font-weight="900" font-size="44" fill="#0D47A1" text-anchor="middle">?</text>
    </g>
    <!-- 카드 3: 음악 -->
    <g transform="rotate(12)">
      <rect x="-110" y="-540" width="220" height="420" rx="24" fill="#FF6B9D" stroke="#880E4F" stroke-width="14"/>
      <text x="0" y="-320" font-family="Arial Black" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">MUS</text>
      <text x="0" y="-240" font-family="Arial Black" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">🎵</text>
      <circle cx="0" cy="-460" r="30" fill="#FFFFFF"/>
      <text x="0" y="-440" font-family="Arial Black" font-weight="900" font-size="44" fill="#880E4F" text-anchor="middle">?</text>
    </g>
    <!-- 카드 4: 영화 -->
    <g transform="rotate(36)">
      <rect x="-110" y="-520" width="220" height="420" rx="24" fill="#FFD93D" stroke="#B88A00" stroke-width="14"/>
      <text x="0" y="-300" font-family="Arial Black" font-weight="900" font-size="70" fill="#5C4000" text-anchor="middle">FILM</text>
      <text x="0" y="-220" font-family="Arial Black" font-weight="900" font-size="110" fill="#5C4000" text-anchor="middle">🎬</text>
      <circle cx="0" cy="-440" r="30" fill="#FFFFFF"/>
      <text x="0" y="-420" font-family="Arial Black" font-weight="900" font-size="44" fill="#B88A00" text-anchor="middle">?</text>
    </g>
  </g>
  <!-- 상단 라벨 -->
  <rect x="222" y="90" width="580" height="120" rx="40" fill="#4A148C"/>
  <text x="512" y="178" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFD93D" text-anchor="middle">12 CATEGORIES</text>
</svg>
