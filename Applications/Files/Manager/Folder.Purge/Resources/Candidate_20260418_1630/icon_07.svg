<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 레이어드 폴더들 — 뒤에서 앞으로 -->

    <!-- Layer 5 (가장 뒤, 점선 = 삭제됨) -->
    <rect x="80" y="120" width="700" height="520" rx="24" fill="none" stroke="#CE93D8" stroke-width="6" stroke-dasharray="20,12" opacity="0.6"/>
    <rect x="80" y="90" width="200" height="40" rx="14" fill="none" stroke="#CE93D8" stroke-width="6" stroke-dasharray="20,12" opacity="0.6"/>
    <!-- X 아이콘 -->
    <line x1="696" y1="166" x2="748" y2="218" stroke="#CE93D8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="748" y1="166" x2="696" y2="218" stroke="#CE93D8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

    <!-- Layer 4 (점선 = 삭제됨) -->
    <rect x="110" y="160" width="700" height="520" rx="24" fill="none" stroke="#BA68C8" stroke-width="6" stroke-dasharray="20,12" opacity="0.65"/>
    <rect x="110" y="130" width="200" height="40" rx="14" fill="none" stroke="#BA68C8" stroke-width="6" stroke-dasharray="20,12" opacity="0.65"/>
    <line x1="726" y1="206" x2="778" y2="258" stroke="#BA68C8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="778" y1="206" x2="726" y2="258" stroke="#BA68C8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

    <!-- Layer 3 (점선 = 삭제됨) -->
    <rect x="140" y="200" width="700" height="520" rx="24" fill="none" stroke="#AB47BC" stroke-width="6" stroke-dasharray="20,12" opacity="0.7"/>
    <rect x="140" y="170" width="200" height="40" rx="14" fill="none" stroke="#AB47BC" stroke-width="6" stroke-dasharray="20,12" opacity="0.7"/>
    <line x1="756" y1="246" x2="808" y2="298" stroke="#AB47BC" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="808" y1="246" x2="756" y2="298" stroke="#AB47BC" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

    <!-- Layer 2 — 실선 (유지) -->
    <rect x="170" y="240" width="700" height="520" rx="24" fill="#FF8F00" opacity="0.85"/>
    <rect x="170" y="210" width="200" height="40" rx="14" fill="#FF8F00" opacity="0.85"/>
    <text x="520" y="520" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📁</text>
    <text x="520" y="610" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">Source</text>

    <!-- Layer 1 (메인, 앞) — 실선 -->
    <rect x="200" y="280" width="700" height="520" rx="24" fill="#7B1FA2"/>
    <rect x="200" y="250" width="200" height="40" rx="14" fill="#7B1FA2"/>
    <text x="550" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📁</text>
    <text x="550" y="630" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFD600" text-anchor="middle">Main</text>
    <text x="550" y="690" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#CE93D8" text-anchor="middle">핵심 폴더만 유지</text>

    <!-- 화살표 레이블 -->
    <rect x="200" y="880" width="624" height="64" rx="20" fill="#4A148C"/>
    <text x="512" y="922" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFD600" text-anchor="middle">불필요 레이어 제거</text>
  </g>
</svg>
