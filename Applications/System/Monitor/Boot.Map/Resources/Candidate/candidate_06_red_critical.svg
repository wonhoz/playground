<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180000"/>
      <stop offset="100%" stop-color="#280500"/>
    </linearGradient>
    <linearGradient id="bar_ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44FF66"/>
      <stop offset="100%" stop-color="#22AA44"/>
    </linearGradient>
    <linearGradient id="bar_warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF6600"/>
    </linearGradient>
    <linearGradient id="bar_err" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline view with critical path -->
  <line x1="80" y1="400" x2="440" y2="400" stroke="#553333" stroke-width="2"/>
  <!-- Service bars - color coded -->
  <rect x="88" y="150" width="180" height="30" rx="5" fill="url(#bar_ok)"/>
  <text x="96" y="170" font-family="monospace" font-size="13" fill="#001500">kernel ✓</text>

  <rect x="88" y="195" width="240" height="30" rx="5" fill="url(#bar_warn)"/>
  <text x="96" y="215" font-family="monospace" font-size="13" fill="#150800">drivers ⚠</text>

  <rect x="88" y="240" width="160" height="30" rx="5" fill="url(#bar_ok)"/>
  <text x="96" y="260" font-family="monospace" font-size="13" fill="#001500">storage ✓</text>

  <rect x="88" y="285" width="320" height="30" rx="5" fill="url(#bar_err)"/>
  <text x="96" y="305" font-family="monospace" font-size="13" fill="white">network ✗ SLOW</text>

  <rect x="88" y="330" width="200" height="30" rx="5" fill="url(#bar_ok)"/>
  <text x="96" y="350" font-family="monospace" font-size="13" fill="#001500">services ✓</text>

  <!-- Alert icon -->
  <polygon points="256,70 310,160 202,160" fill="#FF4444" opacity="0.9"/>
  <text x="256" y="145" font-family="Arial" font-size="50" font-weight="bold" fill="white" text-anchor="middle">!</text>
</svg>