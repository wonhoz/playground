<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00401E"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (TOP 가로 / TIN 세로, 교차점 T=(0,0), 상단 배치) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="155" width="196" height="196" fill="#00251A" rx="10"/>
  <rect x="612" y="155" width="196" height="196" fill="#00251A" rx="10"/>
  <rect x="412" y="355" width="196" height="196" fill="#00251A" rx="10"/>
  <rect x="612" y="355" width="196" height="196" fill="#00251A" rx="10"/>
  <!-- 흰 셀 -->
  <rect x="212" y="155" width="196" height="196" fill="#E0F2F1" stroke="#80CBC4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="155" width="196" height="196" fill="white" stroke="#80CBC4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="155" width="196" height="196" fill="white" stroke="#80CBC4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="355" width="196" height="196" fill="white" stroke="#80CBC4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="555" width="196" height="196" fill="white" stroke="#80CBC4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- 글자 (TOP 가로 / TIN 세로) -->
  <text x="312" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#FFD600">T</text>
  <text x="512" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#00897B">O</text>
  <text x="712" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#00897B">P</text>
  <text x="312" y="452" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#00897B">I</text>
  <text x="312" y="652" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#00897B">N</text>
  <!-- Layer 3: 큰 금색 별 (하단) -->
  <polygon points="512,730 545,820 640,820 564,878 592,968 512,914 432,968 460,878 384,820 479,820" fill="#FFD600" stroke="#FF8F00" stroke-width="6"/>
  <!-- 작은 별들 -->
  <polygon points="200,780 210,810 244,810 217,830 227,860 200,840 173,860 183,830 156,810 190,810" fill="#FFD600" opacity="0.8"/>
  <polygon points="824,780 834,810 868,810 841,830 851,860 824,840 797,860 807,830 780,810 814,810" fill="#FFD600" opacity="0.8"/>
</svg>
