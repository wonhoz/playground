<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: hybrid · 중앙심볼 · Ctrl+C 키캡 + PATH -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE66D"/>
      <stop offset="1" stop-color="#FFAA5C"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg05)"/>
  <!-- Ctrl 키 -->
  <g>
    <rect x="110" y="380" width="320" height="320" rx="44" fill="#2C3E50" stroke="#0F1A24" stroke-width="16"/>
    <rect x="142" y="408" width="256" height="256" rx="30" fill="#34495E"/>
    <text x="270" y="585" font-family="Arial Black, sans-serif" font-weight="900" font-size="150" fill="#FFFFFF" text-anchor="middle">Ctrl</text>
  </g>
  <!-- + 기호 -->
  <g>
    <circle cx="512" cy="540" r="54" fill="#FFFFFF" stroke="#2C3E50" stroke-width="12"/>
    <rect x="486" y="510" width="52" height="60" rx="4" fill="none"/>
    <path d="M 480 540 L 544 540 M 512 508 L 512 572" stroke="#FF6B35" stroke-width="24" stroke-linecap="round"/>
  </g>
  <!-- C 키 -->
  <g>
    <rect x="594" y="380" width="320" height="320" rx="44" fill="#FF6B35" stroke="#A8421D" stroke-width="16"/>
    <rect x="626" y="408" width="256" height="256" rx="30" fill="#FF8A5B"/>
    <text x="754" y="605" font-family="Arial Black, sans-serif" font-weight="900" font-size="220" fill="#FFFFFF" text-anchor="middle">C</text>
  </g>
  <!-- 상단 PATH 배지 -->
  <rect x="340" y="150" width="344" height="130" rx="40" fill="#FFFFFF" stroke="#2C3E50" stroke-width="14"/>
  <text x="512" y="248" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#2C3E50" text-anchor="middle">PATH</text>
  <!-- 하단 경로 힌트 -->
  <text x="512" y="840" font-family="Consolas, monospace" font-weight="700" font-size="68" fill="#2C3E50" text-anchor="middle">C:\docs\file.txt</text>
</svg>
