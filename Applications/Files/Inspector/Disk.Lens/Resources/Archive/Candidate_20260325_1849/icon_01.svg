<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 회백 배경 (트리맵 뷰어 UI) -->
  <rect width="1024" height="1024" rx="190" fill="#F1F5F9"/>

  <!-- 앱 타이틀바 -->
  <rect x="140" y="110" width="744" height="54" rx="10" fill="#CBD5E1"/>
  <circle cx="180" cy="137" r="12" fill="#FF5F57"/>
  <circle cx="220" cy="137" r="12" fill="#FFBD2E"/>
  <circle cx="260" cy="137" r="12" fill="#27C840"/>
  <text x="512" y="148" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="28" fill="#64748B">Disk.Lens — C:\</text>

  <!-- Layer 2: 트리맵 타일들 (3열×3행 이내, 크기 다양하게) -->
  <!-- 큰 타일 1 (좌상단 넓은) -->
  <rect x="140" y="180" width="380" height="320" rx="8" fill="#3B82F6"/>
  <text x="330" y="360" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="38" font-weight="bold" fill="white">Windows</text>
  <text x="330" y="402" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="30" fill="rgba(255,255,255,0.85)">42.8 GB</text>

  <!-- 큰 타일 2 (우상단) -->
  <rect x="526" y="180" width="358" height="320" rx="8" fill="#8B5CF6"/>
  <text x="705" y="360" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="38" font-weight="bold" fill="white">Users</text>
  <text x="705" y="402" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="30" fill="rgba(255,255,255,0.85)">28.3 GB</text>

  <!-- 중간 타일들 -->
  <rect x="140" y="506" width="250" height="200" rx="8" fill="#10B981"/>
  <text x="265" y="610" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" font-weight="bold" fill="white">Program</text>
  <text x="265" y="646" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="26" fill="rgba(255,255,255,0.85)">14.2 GB</text>

  <rect x="396" y="506" width="244" height="200" rx="8" fill="#F59E0B"/>
  <text x="518" y="610" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" font-weight="bold" fill="white">Games</text>
  <text x="518" y="646" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="26" fill="rgba(255,255,255,0.85)">18.5 GB</text>

  <rect x="646" y="506" width="238" height="200" rx="8" fill="#EF4444"/>
  <text x="765" y="610" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" font-weight="bold" fill="white">Temp</text>
  <text x="765" y="646" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="26" fill="rgba(255,255,255,0.85)">5.1 GB</text>

  <!-- 작은 타일들 -->
  <rect x="140" y="712" width="480" height="130" rx="8" fill="#06B6D4"/>
  <text x="380" y="787" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" font-weight="bold" fill="white">Downloads  (8.9 GB)</text>

  <rect x="626" y="712" width="258" height="130" rx="8" fill="#EC4899"/>
  <text x="755" y="787" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="30" font-weight="bold" fill="white">기타 (2.1 GB)</text>

  <!-- Layer 3: 상태바 -->
  <rect x="140" y="858" width="744" height="66" rx="10" fill="#CBD5E1"/>
  <text x="512" y="900" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" fill="#475569">총 119.9 GB · 폴더 2,847개</text>
</svg>
