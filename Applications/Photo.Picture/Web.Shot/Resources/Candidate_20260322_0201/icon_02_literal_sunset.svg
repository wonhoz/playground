<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0A00"/>

  <!-- 카메라 바디 (메인 오브젝트) -->
  <rect x="130" y="320" width="764" height="440" rx="32" fill="#2A1200"/>
  <rect x="130" y="320" width="764" height="440" rx="32" fill="none" stroke="#FF6B2B" stroke-width="6"/>

  <!-- 카메라 상단 뷰파인더 -->
  <rect x="310" y="260" width="240" height="80" rx="16" fill="#2A1200" stroke="#FF6B2B" stroke-width="6"/>

  <!-- 셔터 버튼 -->
  <circle cx="730" cy="295" r="38" fill="#FF6B2B"/>
  <circle cx="730" cy="295" r="26" fill="#FF4500"/>

  <!-- 렌즈 (중앙) -->
  <circle cx="430" cy="540" r="150" fill="#1A0800"/>
  <circle cx="430" cy="540" r="150" fill="none" stroke="#FF6B2B" stroke-width="10"/>
  <circle cx="430" cy="540" r="110" fill="#0D0500"/>
  <circle cx="430" cy="540" r="110" fill="none" stroke="#FF8C42" stroke-width="6"/>
  <circle cx="430" cy="540" r="70"  fill="#050200"/>
  <circle cx="430" cy="540" r="70"  fill="none" stroke="#FF6B2B" stroke-width="4"/>

  <!-- 렌즈 반사광 -->
  <ellipse cx="398" cy="508" rx="22" ry="14" fill="#FF8C42" opacity="0.5" transform="rotate(-35 398 508)"/>

  <!-- 브라우저 창이 렌즈에 비치는 모습 (렌즈 안) -->
  <clipPath id="lens-clip">
    <circle cx="430" cy="540" r="58"/>
  </clipPath>
  <g clip-path="url(#lens-clip)">
    <rect x="380" y="490" width="100" height="100" fill="#1A0D00"/>
    <!-- URL 바 미니어처 -->
    <rect x="382" y="492" width="96" height="14" rx="4" fill="#FF6B2B" opacity="0.6"/>
    <!-- 페이지 내용 -->
    <rect x="384" y="510" width="90" height="6" rx="2" fill="#FF8C42" opacity="0.5"/>
    <rect x="384" y="520" width="80" height="6" rx="2" fill="#FF8C42" opacity="0.4"/>
    <rect x="384" y="530" width="85" height="6" rx="2" fill="#FF8C42" opacity="0.4"/>
    <rect x="384" y="540" width="70" height="6" rx="2" fill="#FF8C42" opacity="0.3"/>
    <rect x="384" y="552" width="88" height="6" rx="2" fill="#FF8C42" opacity="0.3"/>
    <rect x="384" y="562" width="75" height="6" rx="2" fill="#FF8C42" opacity="0.3"/>
  </g>

  <!-- 우측: PNG 파일 변환 화살표 -->
  <g transform="translate(660, 490)">
    <!-- 화살표 -->
    <path d="M0,50 L80,50" stroke="#FF6B2B" stroke-width="10" stroke-linecap="round"/>
    <path d="M60,28 L84,50 L60,72" fill="none" stroke="#FF6B2B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- PNG 텍스트 -->
    <rect x="90" y="20" width="90" height="60" rx="8" fill="#FF4500" opacity="0.9"/>
    <text x="135" y="58" font-family="monospace" font-size="22" font-weight="bold" fill="white" text-anchor="middle">PNG</text>
  </g>

  <!-- 플래시 번개 아이콘 (우상단) -->
  <polygon points="770,350 748,420 772,420 750,490 800,402 774,402 796,350" fill="#FEBC2E"/>
</svg>
