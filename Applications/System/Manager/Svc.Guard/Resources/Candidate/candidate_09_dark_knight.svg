<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <linearGradient id="blue_accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0044FF"/>
      <stop offset="100%" stop-color="#0088FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield main (dark metallic) -->
  <path d="M 256,72 L 404,134 L 404,272 Q 404,380 256,444 Q 108,380 108,272 L 108,134 Z" fill="url(#shield)"/>
  <!-- Shield edge highlight top -->
  <path d="M 256,72 L 404,134 L 388,148 L 256,96 L 124,148 L 108,134 Z" fill="white" opacity="0.07"/>
  <!-- Shield border orange accent -->
  <path d="M 256,72 L 404,134 L 404,272 Q 404,380 256,444 Q 108,380 108,272 L 108,134 Z" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <!-- Vertical divider line -->
  <line x1="256" y1="140" x2="256" y2="428" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Horizontal band -->
  <path d="M 120,240 L 392,240 L 392,284 Q 360,300 256,306 Q 152,300 120,284 Z" fill="url(#accent)" opacity="0.15"/>
  <line x1="120" y1="240" x2="392" y2="240" stroke="url(#accent)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="120" y1="284" x2="392" y2="284" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Eye / core light -->
  <ellipse cx="256" cy="262" rx="24" ry="18" fill="url(#blue_accent)" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="256" cy="262" rx="14" ry="10" fill="white" opacity="0.8" filter="url(#glow)"/>
  <!-- Small service gear symbols in quadrants -->
  <circle cx="188" cy="196" r="18" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="188" cy="196" r="8" fill="#333"/>
  <circle cx="324" cy="196" r="18" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="324" cy="196" r="8" fill="#333"/>
  <circle cx="188" cy="338" r="18" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="188" cy="338" r="8" fill="#333"/>
  <circle cx="324" cy="338" r="18" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="324" cy="338" r="8" fill="#333"/>
  <!-- Bottom text -->
  <text x="256" y="460" font-family="'Segoe UI', sans-serif" font-size="12" fill="#FF6622" text-anchor="middle" letter-spacing="3" filter="url(#glow)">GUARDIAN</text>
</svg>
