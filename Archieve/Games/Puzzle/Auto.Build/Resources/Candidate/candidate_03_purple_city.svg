<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d001a"/>
      <stop offset="100%" stop-color="#1a0033"/>
    </linearGradient>
    <linearGradient id="bld1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC66FF"/>
      <stop offset="100%" stop-color="#7700CC"/>
    </linearGradient>
    <linearGradient id="bld2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF66CC"/>
      <stop offset="100%" stop-color="#AA0077"/>
    </linearGradient>
    <radialGradient id="star" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#CC66FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#CC66FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="150" r="200" fill="url(#star)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="380" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="430" cy="120" r="2" fill="white" opacity="0.5"/>
  <circle cx="70" cy="150" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="460" cy="200" r="2" fill="white" opacity="0.4"/>
  <!-- Buildings -->
  <rect x="90" y="280" width="70" height="140" rx="4" fill="url(#bld1)" opacity="0.8"/>
  <rect x="170" y="220" width="60" height="200" rx="4" fill="url(#bld2)" opacity="0.85"/>
  <rect x="240" y="170" width="80" height="250" rx="4" fill="url(#bld1)" opacity="0.9"/>
  <rect x="330" y="240" width="65" height="180" rx="4" fill="url(#bld2)" opacity="0.8"/>
  <!-- Windows -->
  <rect x="100" y="295" width="12" height="14" rx="2" fill="#FFD4FF" opacity="0.7"/>
  <rect x="120" y="295" width="12" height="14" rx="2" fill="#FFD4FF" opacity="0.5"/>
  <rect x="100" y="320" width="12" height="14" rx="2" fill="#FFD4FF" opacity="0.6"/>
  <rect x="252" y="185" width="14" height="16" rx="2" fill="#FFD4FF" opacity="0.7"/>
  <rect x="276" y="185" width="14" height="16" rx="2" fill="#FFD4FF" opacity="0.5"/>
  <rect x="252" y="215" width="14" height="16" rx="2" fill="#FFD4FF" opacity="0.6"/>
  <rect x="276" y="215" width="14" height="16" rx="2" fill="#FFD4FF" opacity="0.4"/>
  <!-- Auto gear -->
  <circle cx="400" cy="100" r="40" fill="#CC66FF" opacity="0.3" stroke="#CC66FF" stroke-width="2"/>
  <circle cx="400" cy="100" r="18" fill="#0d001a" stroke="#CC66FF" stroke-width="2"/>
  <circle cx="400" cy="100" r="8" fill="#CC66FF"/>
  <rect x="393" y="54" width="14" height="16" rx="3" fill="#CC66FF"/>
  <rect x="393" y="130" width="14" height="16" rx="3" fill="#CC66FF"/>
  <rect x="354" y="93" width="16" height="14" rx="3" fill="#CC66FF"/>
  <rect x="430" y="93" width="16" height="14" rx="3" fill="#CC66FF"/>
</svg>