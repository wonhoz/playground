<!-- Locale.Forge icon_07: 격자 테이블 (grid table: key-value pairs) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0F1A"/>
  <!-- Table border -->
  <rect x="180" y="240" width="664" height="540" rx="16" fill="none" stroke="#5C6BC0" stroke-width="32"/>
  <!-- Header row -->
  <rect x="180" y="240" width="664" height="100" rx="16" fill="#3949AB"/>
  <!-- Vertical divider (key | value) -->
  <line x1="430" y1="240" x2="430" y2="780" stroke="#5C6BC0" stroke-width="24"/>
  <!-- Horizontal row dividers -->
  <line x1="180" y1="440" x2="844" y2="440" stroke="#5C6BC0" stroke-width="20"/>
  <line x1="180" y1="560" x2="844" y2="560" stroke="#5C6BC0" stroke-width="20"/>
  <line x1="180" y1="680" x2="844" y2="680" stroke="#5C6BC0" stroke-width="20"/>
  <!-- Key dots (left column) -->
  <circle cx="305" cy="500" r="22" fill="#7986CB"/>
  <circle cx="305" cy="620" r="22" fill="#7986CB"/>
  <circle cx="305" cy="730" r="22" fill="#7986CB"/>
  <!-- Value bars (right column) -->
  <rect x="460" y="478" width="200" height="44" rx="10" fill="#5C6BC0"/>
  <rect x="460" y="598" width="280" height="44" rx="10" fill="#5C6BC0"/>
  <rect x="460" y="708" width="160" height="44" rx="10" fill="#5C6BC0"/>
</svg>
