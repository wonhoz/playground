<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="dg-bg-clip-01">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="dg-bg-01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#231560"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#dg-bg-01)"/>

  <g clip-path="url(#dg-bg-clip-01)">
    <!-- 엣지들 (시안) -->
    <!-- 중앙 → 상좌 -->
    <line x1="512" y1="512" x2="310" y2="310" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 상우 -->
    <line x1="512" y1="512" x2="714" y2="310" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 하좌 -->
    <line x1="512" y1="512" x2="310" y2="714" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 하우 -->
    <line x1="512" y1="512" x2="714" y2="714" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 상 -->
    <line x1="512" y1="512" x2="512" y2="264" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 하 -->
    <line x1="512" y1="512" x2="512" y2="760" stroke="#00BCD4" stroke-width="40" stroke-linecap="round"/>
    <!-- 중앙 → 좌 -->
    <line x1="512" y1="512" x2="264" y2="512" stroke="#00BCD4" stroke-width="36" stroke-linecap="round"/>
    <!-- 중앙 → 우 -->
    <line x1="512" y1="512" x2="760" y2="512" stroke="#00BCD4" stroke-width="36" stroke-linecap="round"/>

    <!-- 서브 엣지들 (희미) -->
    <line x1="310" y1="310" x2="220" y2="240" stroke="#00BCD4" stroke-width="24" stroke-linecap="round" opacity="0.5"/>
    <line x1="714" y1="310" x2="800" y2="240" stroke="#00BCD4" stroke-width="24" stroke-linecap="round" opacity="0.5"/>
    <line x1="310" y1="714" x2="220" y2="800" stroke="#00BCD4" stroke-width="24" stroke-linecap="round" opacity="0.5"/>
    <line x1="714" y1="714" x2="800" y2="800" stroke="#00BCD4" stroke-width="24" stroke-linecap="round" opacity="0.5"/>

    <!-- 서브-서브 엣지 -->
    <line x1="310" y1="310" x2="310" y2="220" stroke="#00BCD4" stroke-width="20" stroke-linecap="round" opacity="0.35"/>
    <line x1="714" y1="310" x2="714" y2="220" stroke="#00BCD4" stroke-width="20" stroke-linecap="round" opacity="0.35"/>

    <!-- 노드들 (화이트 원) -->
    <!-- 중앙 메인 노드 -->
    <circle cx="512" cy="512" r="62" fill="#FFFFFF"/>
    <circle cx="512" cy="512" r="38" fill="#1A1040"/>

    <!-- 1차 노드들 -->
    <circle cx="310" cy="310" r="46" fill="#FFFFFF"/>
    <circle cx="310" cy="310" r="28" fill="#231560"/>
    <circle cx="714" cy="310" r="46" fill="#FFFFFF"/>
    <circle cx="714" cy="310" r="28" fill="#231560"/>
    <circle cx="310" cy="714" r="46" fill="#FFFFFF"/>
    <circle cx="310" cy="714" r="28" fill="#231560"/>
    <circle cx="714" cy="714" r="46" fill="#FFFFFF"/>
    <circle cx="714" cy="714" r="28" fill="#231560"/>
    <circle cx="512" cy="264" r="40" fill="#FFFFFF"/>
    <circle cx="512" cy="264" r="24" fill="#231560"/>
    <circle cx="512" cy="760" r="40" fill="#FFFFFF"/>
    <circle cx="512" cy="760" r="24" fill="#231560"/>
    <circle cx="264" cy="512" r="40" fill="#FFFFFF"/>
    <circle cx="264" cy="512" r="24" fill="#231560"/>
    <circle cx="760" cy="512" r="40" fill="#FFFFFF"/>
    <circle cx="760" cy="512" r="24" fill="#231560"/>

    <!-- 2차 노드들 (작음) -->
    <circle cx="220" cy="240" r="26" fill="#00BCD4" opacity="0.8"/>
    <circle cx="800" cy="240" r="26" fill="#00BCD4" opacity="0.8"/>
    <circle cx="220" cy="800" r="26" fill="#00BCD4" opacity="0.8"/>
    <circle cx="800" cy="800" r="26" fill="#00BCD4" opacity="0.8"/>
    <circle cx="310" cy="220" r="22" fill="#00BCD4" opacity="0.6"/>
    <circle cx="714" cy="220" r="22" fill="#00BCD4" opacity="0.6"/>
  </g>
</svg>
