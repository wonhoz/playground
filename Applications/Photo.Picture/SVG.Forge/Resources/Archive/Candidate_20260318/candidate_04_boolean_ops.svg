<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 불리언 연산 (Unite, Subtract, Intersect, Difference) -->
  <!-- Unite (합집합) -->
  <text x="118" y="84" text-anchor="middle" font-size="11" fill="#C084FC" opacity="0.8" font-weight="bold">UNITE</text>
  <circle cx="105" cy="118" r="34" fill="#C084FC" opacity="0.4" stroke="#C084FC" stroke-width="1.5"/>
  <circle cx="131" cy="118" r="34" fill="#C084FC" opacity="0.4" stroke="#C084FC" stroke-width="1.5"/>
  <circle cx="105" cy="118" r="34" fill="none" stroke="#C084FC" stroke-width="1.5"/>
  <circle cx="131" cy="118" r="34" fill="none" stroke="#C084FC" stroke-width="1.5"/>
  <!-- Unite 결과 -->
  <path d="M105,84 A34,34 0 0,0 71,118 A34,34 0 0,0 105,152 A34,34 0 0,0 131,152 A34,34 0 0,0 165,118 A34,34 0 0,0 131,84 A34,34 0 0,1 105,84 Z" fill="#C084FC" filter="url(#glow)" opacity="0.8"/>
  <!-- Subtract (차집합) -->
  <text x="256" y="84" text-anchor="middle" font-size="11" fill="#C084FC" opacity="0.8" font-weight="bold">SUBTRACT</text>
  <circle cx="243" cy="118" r="34" fill="#C084FC" opacity="0.7" stroke="#C084FC" stroke-width="1.5"/>
  <circle cx="269" cy="118" r="34" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <!-- Intersect (교집합) -->
  <text x="394" y="84" text-anchor="middle" font-size="11" fill="#C084FC" opacity="0.8" font-weight="bold">INTERSECT</text>
  <circle cx="381" cy="118" r="34" fill="#C084FC" opacity="0.2" stroke="#C084FC" stroke-width="1.5"/>
  <circle cx="407" cy="118" r="34" fill="#C084FC" opacity="0.2" stroke="#C084FC" stroke-width="1.5"/>
  <!-- 교차 영역 강조 -->
  <clipPath id="c1"><circle cx="381" cy="118" r="34"/></clipPath>
  <circle cx="407" cy="118" r="34" fill="#C084FC" filter="url(#glow)" opacity="0.85" clip-path="url(#c1)"/>
  <!-- 화살표들 (위에서 아래로 변환) -->
  <path d="M118,165 L118,200" stroke="#C084FC" stroke-width="2" opacity="0.6"/>
  <polygon points="113,196 123,196 118,206" fill="#C084FC" opacity="0.6"/>
  <path d="M256,165 L256,200" stroke="#C084FC" stroke-width="2" opacity="0.6"/>
  <polygon points="251,196 261,196 256,206" fill="#C084FC" opacity="0.6"/>
  <path d="M394,165 L394,200" stroke="#C084FC" stroke-width="2" opacity="0.6"/>
  <polygon points="389,196 399,196 394,206" fill="#C084FC" opacity="0.6"/>
  <!-- 결과 도형들 -->
  <!-- Unite 결과 -->
  <path d="M84,210 Q84,245 118,245 Q152,245 152,210 Q152,190 131,182 Q118,178 105,182 Q84,190 84,210 Z" fill="#C084FC" filter="url(#glow)" opacity="0.8"/>
  <!-- Subtract 결과 -->
  <path d="M222,210 A34,34 0 1,1 256,244 A34,34 0 0,1 222,210 Z" fill="#C084FC" opacity="0.7"/>
  <circle cx="270" cy="210" r="22" fill="#0a0514" opacity="0.9"/>
  <!-- Intersect 결과 -->
  <ellipse cx="394" cy="218" rx="20" ry="28" fill="#C084FC" filter="url(#glow)" opacity="0.85"/>
  <!-- 중앙 설명 영역 -->
  <rect x="80" y="300" width="352" height="160" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">BOOLEAN OPERATIONS</text>
  <line x1="80" y1="336" x2="432" y2="336" stroke="#3a0a5a" stroke-width="1" opacity="0.5"/>
  <!-- 설명들 -->
  <rect x="100" y="350" width="80" height="22" rx="4" fill="#C084FC" opacity="0.2"/>
  <text x="140" y="365" text-anchor="middle" font-size="10" fill="#C084FC" opacity="0.9">Union</text>
  <rect x="196" y="350" width="80" height="22" rx="4" fill="#A855F7" opacity="0.2"/>
  <text x="236" y="365" text-anchor="middle" font-size="10" fill="#A855F7" opacity="0.9">Subtract</text>
  <rect x="292" y="350" width="80" height="22" rx="4" fill="#7C3AED" opacity="0.2"/>
  <text x="332" y="365" text-anchor="middle" font-size="10" fill="#7C3AED" opacity="0.9">Intersect</text>
  <text x="256" y="408" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">벡터 도형 불리언 연산</text>
  <text x="256" y="430" text-anchor="middle" font-size="11" fill="#888" opacity="0.6">Pathfinder Operations</text>
  <text x="256" y="450" text-anchor="middle" font-size="11" fill="#C084FC" opacity="0.7" font-weight="bold">SVG.Forge — Boolean Tool</text>
</svg>
