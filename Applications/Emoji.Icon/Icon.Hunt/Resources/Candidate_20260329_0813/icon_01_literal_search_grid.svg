<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 코발트 블루 그라디언트 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2980"/>
      <stop offset="100%" stop-color="#26D0CE"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="430" cy="430" r="240"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg1)"/>

  <!-- 돋보기 유리 (원형 배경) -->
  <circle cx="430" cy="430" r="260" fill="#FFFFFF" fill-opacity="0.12" stroke="#F5D020" stroke-width="64"/>

  <!-- 아이콘 그리드 (돋보기 내부, 4×4 작은 아이콘 카드들) -->
  <g clip-path="url(#circleClip)">
    <!-- 그리드 배경 -->
    <rect x="190" y="190" width="480" height="480" fill="#0D1B4B" fill-opacity="0.6" rx="16"/>

    <!-- Row1 -->
    <rect x="218" y="218" width="90" height="90" rx="12" fill="#F5D020" fill-opacity="0.85"/>
    <rect x="326" y="218" width="90" height="90" rx="12" fill="#26D0CE" fill-opacity="0.85"/>
    <rect x="434" y="218" width="90" height="90" rx="12" fill="#FF6B9D" fill-opacity="0.85"/>
    <rect x="542" y="218" width="90" height="90" rx="12" fill="#7B61FF" fill-opacity="0.85"/>

    <!-- Row2 -->
    <rect x="218" y="326" width="90" height="90" rx="12" fill="#26D0CE" fill-opacity="0.85"/>
    <rect x="326" y="326" width="90" height="90" rx="12" fill="#FF8C42" fill-opacity="0.85"/>
    <rect x="434" y="326" width="90" height="90" rx="12" fill="#F5D020" fill-opacity="0.85"/>
    <rect x="542" y="326" width="90" height="90" rx="12" fill="#4CAF50" fill-opacity="0.85"/>

    <!-- Row3 -->
    <rect x="218" y="434" width="90" height="90" rx="12" fill="#7B61FF" fill-opacity="0.85"/>
    <rect x="326" y="434" width="90" height="90" rx="12" fill="#FF6B9D" fill-opacity="0.85"/>
    <rect x="434" y="434" width="90" height="90" rx="12" fill="#FF8C42" fill-opacity="0.85"/>
    <rect x="542" y="434" width="90" height="90" rx="12" fill="#26D0CE" fill-opacity="0.85"/>

    <!-- Row4 -->
    <rect x="218" y="542" width="90" height="90" rx="12" fill="#4CAF50" fill-opacity="0.85"/>
    <rect x="326" y="542" width="90" height="90" rx="12" fill="#F5D020" fill-opacity="0.85"/>
    <rect x="434" y="542" width="90" height="90" rx="12" fill="#7B61FF" fill-opacity="0.85"/>
    <rect x="542" y="542" width="90" height="90" rx="12" fill="#FF6B9D" fill-opacity="0.85"/>

    <!-- 각 카드 내 심볼 (간단한 도형) -->
    <circle cx="263" cy="263" r="22" fill="#1A2980"/>
    <rect x="350" y="247" width="42" height="28" rx="6" fill="#1A2980"/>
    <polygon points="479,243 503,283 455,283" fill="#1A2980"/>
    <circle cx="587" cy="263" r="18" fill="#1A2980"/>
    <rect x="242" y="358" width="42" height="28" rx="6" fill="#1A2980"/>
    <circle cx="371" cy="371" r="22" fill="#1A2980"/>
  </g>

  <!-- 돋보기 렌즈 테두리 (골든) -->
  <circle cx="430" cy="430" r="260" fill="none" stroke="#F5D020" stroke-width="64"/>
  <!-- 렌즈 반사광 -->
  <ellipse cx="340" cy="320" rx="70" ry="40" fill="#FFFFFF" fill-opacity="0.18" transform="rotate(-30 340 320)"/>

  <!-- 돋보기 손잡이 -->
  <line x1="632" y1="632" x2="810" y2="810" stroke="#F5D020" stroke-width="88" stroke-linecap="round"/>
  <!-- 손잡이 하이라이트 -->
  <line x1="632" y1="632" x2="810" y2="810" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-dasharray="40 160"/>
</svg>
