<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="jt5-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <filter id="jt5-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#jt5-clip)">
    <!-- Background: Vivid Teal -->
    <rect width="1024" height="1024" fill="#007B7B"/>
    <!-- Subtle pattern -->
    <rect width="1024" height="1024" fill="#009090" opacity="0.3"/>
    <circle cx="512" cy="512" r="420" fill="#007070" opacity="0.4"/>

    <!-- Large {} symbol background, decorative -->
    <text x="80" y="750" font-family="monospace" font-size="700" fill="#005E5E" opacity="0.35" font-weight="bold">{}</text>

    <!-- Floating data type symbols (white) -->
    <g filter="url(#jt5-glow)" fill="#FFFFFF">
      <!-- { } -->
      <text x="240" y="400" font-family="monospace" font-size="120" font-weight="bold" opacity="0.95">{}</text>
      <!-- [ ] -->
      <text x="590" y="380" font-family="monospace" font-size="110" font-weight="bold" opacity="0.9">[]</text>
      <!-- "" -->
      <text x="280" y="600" font-family="monospace" font-size="110" font-weight="bold" opacity="0.88">""</text>
      <!-- 123 -->
      <text x="590" y="580" font-family="monospace" font-size="100" font-weight="bold" opacity="0.85">123</text>
      <!-- true -->
      <text x="310" y="750" font-family="monospace" font-size="80" font-weight="bold" opacity="0.75">true</text>
      <!-- null -->
      <text x="590" y="730" font-family="monospace" font-size="80" font-weight="bold" opacity="0.65">null</text>
    </g>

    <!-- Accent color chips behind symbols -->
    <rect x="236" y="296" width="200" height="120" rx="18" fill="#00CCCC" opacity="0.2"/>
    <rect x="580" y="274" width="200" height="120" rx="18" fill="#00AAAA" opacity="0.2"/>
    <rect x="272" y="500" width="180" height="120" rx="18" fill="#00BBBB" opacity="0.2"/>
    <rect x="574" y="484" width="200" height="110" rx="18" fill="#00AAAA" opacity="0.2"/>

    <!-- Corner decorative dots -->
    <circle cx="210" cy="800" r="28" fill="#005E5E" opacity="0.5"/>
    <circle cx="820" cy="780" r="20" fill="#005E5E" opacity="0.4"/>
    <circle cx="800" cy="220" r="24" fill="#005E5E" opacity="0.35"/>
    <circle cx="220" cy="240" r="18" fill="#005E5E" opacity="0.35"/>
  </g>
</svg>
