<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#2E7D32" stroke-width="16"/>

  <!-- Header: SELECT CATEGORY -->
  <rect x="112" y="152" width="800" height="72" rx="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="12"/>
  <text x="512" y="203" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#A5D6A7" text-anchor="middle">SELECT CATEGORY</text>

  <!-- Category option rows -->
  <!-- Row 1: SCIENCE (selected, green highlight) -->
  <rect x="112" y="248" width="800" height="70" rx="16" fill="#E8F5E9" stroke="#4CAF50" stroke-width="14"/>
  <rect x="124" y="260" width="48" height="46" rx="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="8"/>
  <text x="148" y="292" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">S</text>
  <text x="280" y="296" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1B5E20">SCIENCE</text>
  <text x="890" y="296" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#4CAF50" text-anchor="end">10 Q</text>

  <!-- Row 2: HISTORY -->
  <rect x="112" y="334" width="800" height="70" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <rect x="124" y="346" width="48" height="46" rx="10" fill="#FF6B35" stroke="#BF360C" stroke-width="8"/>
  <text x="148" y="378" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">H</text>
  <text x="280" y="382" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575">HISTORY</text>
  <text x="890" y="382" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9E9E9E" text-anchor="end">10 Q</text>

  <!-- Row 3: IT -->
  <rect x="112" y="420" width="800" height="70" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <rect x="124" y="432" width="48" height="46" rx="10" fill="#9B59B6" stroke="#4A148C" stroke-width="8"/>
  <text x="148" y="464" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">I</text>
  <text x="280" y="468" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575">IT</text>
  <text x="890" y="468" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9E9E9E" text-anchor="end">10 Q</text>

  <!-- Row 4: SPORTS -->
  <rect x="112" y="506" width="800" height="70" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <rect x="124" y="518" width="48" height="46" rx="10" fill="#3A86FF" stroke="#1565C0" stroke-width="8"/>
  <text x="148" y="550" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">S</text>
  <text x="280" y="554" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575">SPORTS</text>
  <text x="890" y="554" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9E9E9E" text-anchor="end">10 Q</text>

  <!-- More indicator -->
  <text x="512" y="648" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9E9E9E" text-anchor="middle">+ 8 MORE CATEGORIES</text>

  <!-- CATEGORY badge -->
  <rect x="128" y="752" width="768" height="116" rx="36" fill="#1B5E20" stroke="#0A3A0A" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="76" fill="#69F0AE" text-anchor="middle">CATEGORY</text>
</svg>
