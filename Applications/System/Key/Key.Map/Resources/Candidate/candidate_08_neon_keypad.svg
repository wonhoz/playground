<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a000a"/>
    </linearGradient>
    <linearGradient id="keyNeon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a001a"/>
      <stop offset="100%" stop-color="#0a000a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3x4 numpad layout -->
  <!-- Row 1 -->
  <rect x="96" y="70" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="96" y="70" width="80" height="70" rx="10" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.8"/>
  <text x="136" y="115" text-anchor="middle" font-family="monospace" font-size="24" fill="#ff00ff">7</text>
  <rect x="192" y="70" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="192" y="70" width="80" height="70" rx="10" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.8"/>
  <text x="232" y="115" text-anchor="middle" font-family="monospace" font-size="24" fill="#ff00ff">8</text>
  <rect x="288" y="70" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="288" y="70" width="80" height="70" rx="10" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.8"/>
  <text x="328" y="115" text-anchor="middle" font-family="monospace" font-size="24" fill="#ff00ff">9</text>
  <!-- Row 2 -->
  <rect x="96" y="152" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="96" y="152" width="80" height="70" rx="10" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  <text x="136" y="197" text-anchor="middle" font-family="monospace" font-size="24" fill="#00ffff">4</text>
  <rect x="192" y="152" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="192" y="152" width="80" height="70" rx="10" fill="none" stroke="#00ffff" stroke-width="4" opacity="0.9"/>
  <text x="232" y="197" text-anchor="middle" font-family="monospace" font-size="24" fill="#00ffff">5</text>
  <rect x="288" y="152" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="288" y="152" width="80" height="70" rx="10" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  <text x="328" y="197" text-anchor="middle" font-family="monospace" font-size="24" fill="#00ffff">6</text>
  <!-- Row 3 -->
  <rect x="96" y="234" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="96" y="234" width="80" height="70" rx="10" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.8"/>
  <text x="136" y="279" text-anchor="middle" font-family="monospace" font-size="24" fill="#ffff00">1</text>
  <rect x="192" y="234" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="192" y="234" width="80" height="70" rx="10" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.8"/>
  <text x="232" y="279" text-anchor="middle" font-family="monospace" font-size="24" fill="#ffff00">2</text>
  <rect x="288" y="234" width="80" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="288" y="234" width="80" height="70" rx="10" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.8"/>
  <text x="328" y="279" text-anchor="middle" font-family="monospace" font-size="24" fill="#ffff00">3</text>
  <!-- Row 4 (bottom) - special key mapped -->
  <rect x="96" y="316" width="176" height="70" rx="10" fill="url(#keyNeon)"/>
  <rect x="96" y="316" width="176" height="70" rx="10" fill="none" stroke="#00ff00" stroke-width="3" opacity="0.9"/>
  <text x="184" y="361" text-anchor="middle" font-family="monospace" font-size="20" fill="#00ff00">MACRO</text>
  <rect x="288" y="316" width="80" height="70" rx="10" fill="#00ff00" opacity="0.2"/>
  <rect x="288" y="316" width="80" height="70" rx="10" fill="none" stroke="#00ff00" stroke-width="3" opacity="0.9"/>
  <text x="328" y="361" text-anchor="middle" font-family="monospace" font-size="20" fill="#00ff00">↵</text>
  <!-- Remap arrow (right side) -->
  <text x="412" y="190" text-anchor="middle" font-family="Arial" font-size="28" fill="#ff00ff" opacity="0.5">→</text>
  <text x="412" y="220" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff00ff" opacity="0.5">5</text>
  <text x="412" y="238" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.5">→F5</text>
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="14" letter-spacing="3" fill="#ff00ff" opacity="0.5">NEON KEYPAD</text>
</svg>
