    <circle cx="442" cy="722" r="42" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="15 10" opacity="0.5"/>
    <text x="442" y="730" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="36" fill="#FFFFFF" opacity="0.5">?</text>
    <!-- Layer 3: 전략 화살표 -->
    <path d="M 340 340 Q 460 390 538 420" fill="none" stroke="#FDE68A" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
