<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0500"/>
      <stop offset="100%" stop-color="#2D0D00"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil/forge base -->
  <ellipse cx="256" cy="390" rx="110" ry="24" fill="#3D0D00" opacity="0.8"/>
  <rect x="186" y="340" width="140" height="55" rx="8" fill="#2A0700"/>
  <!-- Main anvil -->
  <path d="M 140 280 L 140 340 L 372 340 L 372 280 Q 372 260 352 260 L 160 260 Q 140 260 140 280 Z" fill="#1A0500"/>
  <!-- Pixel art being forged -->
  <rect x="180" y="170" width="32" height="32" rx="3" fill="#FF4500"/>
  <rect x="216" y="170" width="32" height="32" rx="3" fill="#FF8C00"/>
  <rect x="252" y="170" width="32" height="32" rx="3" fill="#FFD700"/>
  <rect x="288" y="170" width="32" height="32" rx="3" fill="#FF8C00"/>
  <rect x="180" y="206" width="32" height="32" rx="3" fill="#FF8C00"/>
  <rect x="216" y="206" width="32" height="32" rx="3" fill="#FFD700"/>
  <rect x="252" y="206" width="32" height="32" rx="3" fill="#FF4500"/>
  <rect x="288" y="206" width="32" height="32" rx="3" fill="#FF8C00"/>
  <!-- Hammer -->
  <rect x="296" y="90" width="30" height="60" rx="6" fill="#888" transform="rotate(-30 311 120)"/>
  <rect x="283" y="78" width="56" height="26" rx="6" fill="#666" transform="rotate(-30 311 91)"/>
  <!-- Sparks -->
  <circle cx="240" cy="155" r="5" fill="#FFD700" opacity="0.9"/>
  <circle cx="270" cy="145" r="4" fill="#FF8C00" opacity="0.8"/>
  <circle cx="220" cy="140" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="300" cy="150" r="4" fill="#FF4500" opacity="0.8"/>
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FF8C00">MOSAIC.FORGE</text>
