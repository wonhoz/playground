<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="rain08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- 배경 안개 효과 -->
  <rect x="0" y="500" width="1024" height="524" rx="0" fill="#1E293B" opacity="0.4" clip-path="url(#clip08)"/>
  <g clip-path="url(#clip08)">
    <!-- Layer 2: 빗발치는 총알 빗 (대각선 줄기들) -->
    <!-- 긴 총알 빗줄기들 — 다양한 투명도로 원근감 -->
    <g filter="url(#glow08)">
      <!-- 앞열 (굵고 선명) -->
      <line x1="80" y1="180" x2="280" y2="900" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
      <line x1="220" y1="150" x2="420" y2="870" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <line x1="380" y1="120" x2="580" y2="840" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <line x1="540" y1="140" x2="740" y2="860" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <line x1="700" y1="160" x2="900" y2="880" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <line x1="860" y1="180" x2="1020" y2="800" stroke="#22D3EE" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <!-- 중간열 -->
      <line x1="140" y1="120" x2="300" y2="750" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <line x1="300" y1="100" x2="460" y2="730" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
      <line x1="460" y1="80" x2="620" y2="710" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <line x1="620" y1="100" x2="780" y2="730" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
      <line x1="780" y1="120" x2="940" y2="750" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <!-- 뒷열 (흐릿하게) -->
      <line x1="160" y1="60" x2="280" y2="600" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="350" y1="40" x2="470" y2="580" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="540" y1="60" x2="660" y2="600" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="730" y1="40" x2="850" y2="580" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    </g>
    <!-- 총알 머리 부분들 (빛나는 원) -->
    <circle cx="80" cy="180" r="8" fill="#22D3EE" opacity="0.9"/>
    <circle cx="220" cy="150" r="8" fill="#22D3EE" opacity="0.85"/>
    <circle cx="380" cy="120" r="8" fill="#22D3EE" opacity="0.8"/>
    <circle cx="540" cy="140" r="8" fill="#22D3EE" opacity="0.85"/>
    <circle cx="700" cy="160" r="8" fill="#22D3EE" opacity="0.8"/>
    <circle cx="860" cy="180" r="7" fill="#22D3EE" opacity="0.75"/>

    <!-- Layer 3: 중앙 회피하는 플레이어 -->
    <!-- 플레이어 삼각형 우주선 -->
    <polygon points="512,760 462,860 562,860" fill="#22D3EE"/>
    <polygon points="512,760 462,860 562,860" fill="#FFFFFF" opacity="0.3"/>
    <!-- 엔진 분사 -->
    <ellipse cx="512" cy="880" rx="20" ry="30" fill="#FDE68A" opacity="0.8"/>
    <!-- 총알 회피 공간 (빗줄기가 플레이어 주변 비어있음 — 배경색 원) -->
    <circle cx="512" cy="820" r="80" fill="#0F172A" opacity="0.8"/>
    <!-- 광환 -->
    <circle cx="512" cy="820" r="85" fill="none" stroke="#22D3EE" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
