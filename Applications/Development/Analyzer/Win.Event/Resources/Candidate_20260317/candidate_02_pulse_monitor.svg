<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#041a04"/>
      <stop offset="100%" stop-color="#020f02"/>
    </radialGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen02">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="screenGlow02">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="screenGrad02" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001800"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
    <linearGradient id="ecgGrad02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00FF41" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00FF41" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg02)"/>

  <!-- Monitor frame outer bezel -->
  <rect x="30" y="50" width="452" height="360" rx="16" ry="16" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="3"/>

  <!-- Monitor screen -->
  <rect x="44" y="64" width="424" height="332" rx="8" ry="8" fill="url(#screenGrad02)"/>

  <!-- Scanlines effect -->
  <g opacity="0.08">
    <rect x="44" y="64" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="72" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="80" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="88" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="96" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="104" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="112" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="120" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="128" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="136" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="144" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="152" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="160" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="168" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="176" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="184" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="192" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="200" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="208" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="216" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="224" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="232" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="240" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="248" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="256" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="264" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="272" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="280" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="288" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="296" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="304" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="312" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="320" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="328" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="336" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="344" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="352" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="360" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="368" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="376" width="424" height="2" fill="#00FF41"/>
    <rect x="44" y="384" width="424" height="2" fill="#00FF41"/>
  </g>

  <!-- Grid on screen -->
  <g stroke="#003300" stroke-width="1" opacity="0.5">
    <line x1="44" y1="150" x2="468" y2="150"/>
    <line x1="44" y1="230" x2="468" y2="230"/>
    <line x1="44" y1="310" x2="468" y2="310"/>
    <line x1="150" y1="64" x2="150" y2="396"/>
    <line x1="256" y1="64" x2="256" y2="396"/>
    <line x1="362" y1="64" x2="362" y2="396"/>
  </g>

  <!-- Center baseline -->
  <line x1="44" y1="230" x2="468" y2="230" stroke="#00FF41" stroke-width="0.5" opacity="0.2"/>

  <!-- ECG pulse waveform - main event trace -->
  <!-- Segment 1: flat, then ERROR spike -->
  <polyline points="44,230 100,230 110,228 115,210 120,140 125,320 128,250 132,230 145,230 155,228 160,210 165,155 170,310 174,242 178,230"
    fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glowGreen02)"/>
  <!-- Segment 2: WARN bump -->
  <polyline points="178,230 210,230 218,225 222,200 226,230 232,230 240,228 244,205 248,230 260,230"
    fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glowGreen02)"/>
  <!-- Segment 3: flat INFO -->
  <polyline points="260,230 290,230 295,225 300,220 305,230 320,230"
    fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glowGreen02)"/>
  <!-- Segment 4: AUDIT then ERROR -->
  <polyline points="320,230 350,230 356,222 360,160 364,300 368,238 372,230 400,230 408,220 412,145 416,315 420,245 424,230 468,230"
    fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glowGreen02)"/>

  <!-- Cursor/active point glow -->
  <circle cx="424" cy="230" r="4" fill="#00FF41" filter="url(#screenGlow02)"/>
  <circle cx="424" cy="230" r="2" fill="#AAFFAA"/>

  <!-- Header bar -->
  <rect x="44" y="64" width="424" height="30" fill="#001200" opacity="0.8"/>
  <text x="56" y="83" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#00FF41" filter="url(#glow02)">WIN.EVENT PULSE MONITOR</text>
  <circle cx="440" cy="79" r="5" fill="#00FF41" filter="url(#glow02)"/>
  <text x="450" y="83" font-family="monospace" font-size="10" fill="#00AA20">LIVE</text>

  <!-- Status indicators -->
  <g font-family="'Consolas','Courier New',monospace" font-size="10">
    <text x="56" y="115" fill="#FF3333" filter="url(#glow02)">ERR: 2</text>
    <text x="56" y="130" fill="#FF8C00" filter="url(#glow02)">WRN: 5</text>
    <text x="56" y="145" fill="#4A9EFF" filter="url(#glow02)">INF: 42</text>
    <text x="56" y="160" fill="#9B59B6" filter="url(#glow02)">AUD: 8</text>
  </g>

  <!-- Heart rate display -->
  <text x="420" y="115" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="28" font-weight="bold" fill="#00FF41" filter="url(#glowGreen02)">72</text>
  <text x="420" y="132" text-anchor="end" font-family="monospace" font-size="10" fill="#00AA20">evt/min</text>

  <!-- Bottom status bar -->
  <rect x="44" y="370" width="424" height="26" fill="#001200" opacity="0.8"/>
  <text x="56" y="387" font-family="'Consolas','Courier New',monospace" font-size="10" fill="#00FF41" opacity="0.8">SYS: NORMAL</text>
  <text x="256" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FF41" opacity="0.8">2026-03-17 21:25:40</text>
  <text x="455" y="387" text-anchor="end" font-family="monospace" font-size="10" fill="#00FF41" opacity="0.8">CH: 4</text>

  <!-- Monitor stand -->
  <rect x="220" y="410" width="72" height="16" rx="4" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="2"/>
  <rect x="190" y="424" width="132" height="12" rx="6" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="2"/>

  <!-- Title below -->
  <text x="256" y="470" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" fill="#00FF41" filter="url(#glow02)" opacity="0.8">PULSE MONITOR</text>
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="9" fill="#008F11" opacity="0.7">EVENT HEALTH MONITOR</text>
</svg>
