<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clean keyboard body -->
  <rect x="56" y="160" width="400" height="240" rx="20" fill="white" stroke="#bae6fd" stroke-width="2.5"/>
  <!-- Shadow -->
  <rect x="60" y="172" width="396" height="236" rx="18" fill="#f0f9ff" opacity="0.5"/>
  <!-- Key rows clean -->
  <!-- Row 1 -->
  <rect x="76" y="180" width="40" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="88" y="203" font-family="sans-serif" font-size="13" fill="#64748b">Ctrl</text>
  <rect x="122" y="180" width="40" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="135" y="203" font-family="sans-serif" font-size="13" fill="#64748b">Alt</text>
  <rect x="168" y="175" width="48" height="44" rx="8" fill="url(#blue)"/>
  <text x="176" y="202" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Shift</text>
  <rect x="222" y="175" width="40" height="44" rx="8" fill="url(#blue)"/>
  <text x="235" y="202" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">F</text>
  <rect x="268" y="180" width="40" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="280" y="203" font-family="sans-serif" font-size="14" fill="#94a3b8">5</text>
  <rect x="314" y="180" width="40" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="322" y="203" font-family="sans-serif" font-size="13" fill="#94a3b8">Esc</text>
  <rect x="360" y="180" width="80" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="376" y="203" font-family="sans-serif" font-size="13" fill="#94a3b8">Enter</text>
  <!-- Row 2 -->
  <rect x="76" y="226" width="52" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="86" y="249" font-family="sans-serif" font-size="13" fill="#94a3b8">Tab</text>
  <rect x="134" y="226" width="36" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="146" y="249" font-family="sans-serif" font-size="14" fill="#94a3b8">Q</text>
  <rect x="176" y="226" width="36" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="188" y="249" font-family="sans-serif" font-size="14" fill="#94a3b8">W</text>
  <rect x="218" y="226" width="36" height="36" rx="8" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="230" y="249" font-family="sans-serif" font-size="14" fill="#0284c7" font-weight="bold">E</text>
  <rect x="260" y="226" width="36" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="272" y="249" font-family="sans-serif" font-size="14" fill="#94a3b8">R</text>
  <rect x="302" y="226" width="36" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="314" y="249" font-family="sans-serif" font-size="14" fill="#94a3b8">T</text>
  <!-- Row 3 -->
  <rect x="76" y="272" width="200" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="152" y="295" font-family="sans-serif" font-size="13" fill="#cbd5e1">Space</text>
  <!-- Binding chip top-left -->
  <rect x="56" y="60" width="184" height="68" rx="14" fill="white" stroke="#bae6fd" stroke-width="2"/>
  <rect x="72" y="76" width="40" height="28" rx="6" fill="#0ea5e9" opacity="0.8"/>
  <text x="78" y="95" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Alt</text>
  <text x="122" y="88" font-family="sans-serif" font-size="11" fill="#64748b">+</text>
  <rect x="132" y="76" width="40" height="28" rx="6" fill="#0ea5e9" opacity="0.8"/>
  <text x="140" y="95" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">F4</text>
  <text x="74" y="119" font-family="sans-serif" font-size="11" fill="#94a3b8">Close Window</text>
  <!-- Binding chip top-right -->
  <rect x="274" y="60" width="182" height="68" rx="14" fill="white" stroke="#bae6fd" stroke-width="2"/>
  <rect x="290" y="76" width="52" height="28" rx="6" fill="url(#blue)"/>
  <text x="296" y="95" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Ctrl</text>
  <text x="352" y="88" font-family="sans-serif" font-size="11" fill="#64748b">+</text>
  <rect x="362" y="76" width="28" height="28" rx="6" fill="url(#blue)"/>
  <text x="370" y="95" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">S</text>
  <text x="292" y="119" font-family="sans-serif" font-size="11" fill="#94a3b8">Save File</text>
  <!-- Arrow connectors -->
  <line x1="148" y1="128" x2="148" y2="175" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="365" y1="128" x2="365" y2="175" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Bottom status -->
  <rect x="56" y="424" width="400" height="44" rx="12" fill="white" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="72" y="448" font-family="sans-serif" font-size="13" fill="#0ea5e9">Hotkey.Map</text>
  <text x="200" y="448" font-family="sans-serif" font-size="12" fill="#94a3b8">|  12 bindings active</text>
</svg>
