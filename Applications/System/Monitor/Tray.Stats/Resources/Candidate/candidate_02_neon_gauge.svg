<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0533"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#8338EC"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A86FF"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer ring CPU -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="#1A0533" stroke-width="22"/>
  <path d="M 116 220 A 140 140 0 1 1 396 220" fill="none" stroke="url(#arc1)" stroke-width="18" stroke-linecap="round" filter="url(#neon)"/>
  <!-- Inner ring MEM -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="#0D0D0D" stroke-width="18"/>
  <path d="M 156 220 A 100 100 0 0 1 356 220" fill="none" stroke="url(#arc2)" stroke-width="14" stroke-linecap="round" filter="url(#neon)"/>
  <!-- Center values -->
  <text x="256" y="200" text-anchor="middle" font-family="Segoe UI" font-size="52" font-weight="700" fill="#FF006E" filter="url(#neon)">72%</text>
  <text x="256" y="245" text-anchor="middle" font-family="Segoe UI" font-size="26" fill="#8338EC" opacity="0.9">CPU</text>
  <!-- Legend -->
  <rect x="100" y="400" width="18" height="18" rx="4" fill="#FF006E" filter="url(#neon)"/>
  <text x="126" y="414" font-family="Segoe UI" font-size="24" fill="#E0E0E0">CPU  </text>
  <rect x="260" y="400" width="18" height="18" rx="4" fill="#3A86FF" filter="url(#neon)"/>
  <text x="286" y="414" font-family="Segoe UI" font-size="24" fill="#E0E0E0">MEM</text>
</svg>
