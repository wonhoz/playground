<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#110000"/>
    </linearGradient>
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#EF4444;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F87171;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 레이저 소스 장치 -->
  <rect x="52" y="130" width="55" height="42" rx="8" fill="#2d0a0a" stroke="#EF4444" stroke-width="2" opacity="0.9"/>
  <rect x="52" y="210" width="55" height="42" rx="8" fill="#2d0a0a" stroke="#EF4444" stroke-width="2" opacity="0.9"/>
  <rect x="52" y="290" width="55" height="42" rx="8" fill="#2d0a0a" stroke="#EF4444" stroke-width="2" opacity="0.9"/>
  <!-- 레이저 포트 -->
  <circle cx="107" cy="151" r="5" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <circle cx="107" cy="231" r="5" fill="#F87171" opacity="0.9" filter="url(#glow)"/>
  <circle cx="107" cy="311" r="5" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이저 빔 1 -->
  <rect x="107" y="148" width="300" height="5" rx="2.5" fill="url(#laserGrad)" filter="url(#laserGlow)"/>
  <!-- 레이저 빔 2 -->
  <rect x="107" y="228" width="300" height="5" rx="2.5" fill="url(#beam2)" filter="url(#laserGlow)"/>
  <!-- 레이저 빔 3 -->
  <rect x="107" y="308" width="300" height="5" rx="2.5" fill="url(#laserGrad)" filter="url(#laserGlow)"/>
  <!-- 폴더 (왼쪽) -->
  <rect x="160" y="115" width="140" height="220" rx="12" fill="#4a0a0a" stroke="#DC2626" stroke-width="2" opacity="0.85"/>
  <polygon points="160,115 220,115 234,132 300,132 300,145 160,145" fill="#3a0808" opacity="0.9"/>
  <!-- 폴더 내 파일들 -->
  <line x1="185" y1="170" x2="275" y2="170" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="190" x2="255" y2="190" stroke="#F87171" stroke-width="2" opacity="0.55"/>
  <line x1="185" y1="210" x2="262" y2="210" stroke="#DC2626" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="250" x2="275" y2="250" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="270" x2="248" y2="270" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="290" x2="260" y2="290" stroke="#DC2626" stroke-width="2" opacity="0.5"/>
  <!-- 레이저 충격 지점 (폴더 위) -->
  <circle cx="160" cy="151" r="12" fill="#EF4444" opacity="0.7" filter="url(#laserGlow)"/>
  <circle cx="160" cy="231" r="12" fill="#F87171" opacity="0.7" filter="url(#laserGlow)"/>
  <circle cx="160" cy="311" r="12" fill="#EF4444" opacity="0.7" filter="url(#laserGlow)"/>
  <!-- 삭제 X 표시들 -->
  <line x1="178" y1="167" x2="195" y2="175" stroke="#FEE2E2" stroke-width="2.5" opacity="0.8"/>
  <line x1="195" y1="167" x2="178" y2="175" stroke="#FEE2E2" stroke-width="2.5" opacity="0.8"/>
  <line x1="178" y1="247" x2="195" y2="255" stroke="#FEE2E2" stroke-width="2.5" opacity="0.8"/>
  <line x1="195" y1="247" x2="178" y2="255" stroke="#FEE2E2" stroke-width="2.5" opacity="0.8"/>
  <!-- 우측 삭제 완료 영역 -->
  <rect x="308" y="115" width="90" height="220" rx="8" fill="#030508" stroke="#EF4444" stroke-width="1.5" opacity="0.5" stroke-dasharray="8,5"/>
  <text x="353" y="230" text-anchor="middle" font-family="Arial" font-size="30" fill="#EF4444" opacity="0.5">✓</text>
  <text x="353" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#DC2626" opacity="0.5">ERASED</text>
</svg>