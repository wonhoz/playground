<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg18)"/>
  <!-- Layer 2: Cookie cutter / stamp pressing down on image -->
  <!-- Image "dough" (flat rectangle with faint grid) -->
  <rect x="130" y="500" width="764" height="340" rx="14" fill="#FFECB3"/>
  <rect x="130" y="500" width="764" height="340" rx="14" fill="none" stroke="#FFA000" stroke-width="6"/>
  <!-- Faint grid lines on "dough" -->
  <line x1="310" y1="500" x2="310" y2="840" stroke="#FFD54F" stroke-width="4"/>
  <line x1="512" y1="500" x2="512" y2="840" stroke="#FFD54F" stroke-width="4"/>
  <line x1="714" y1="500" x2="714" y2="840" stroke="#FFD54F" stroke-width="4"/>
  <line x1="130" y1="620" x2="894" y2="620" stroke="#FFD54F" stroke-width="4"/>
  <line x1="130" y1="720" x2="894" y2="720" stroke="#FFD54F" stroke-width="4"/>
  <!-- Cookie cutter handle (top part) -->
  <rect x="380" y="160" width="264" height="80" rx="20" fill="#FF8F00"/>
  <rect x="440" y="220" width="144" height="40" rx="10" fill="#E65100"/>
  <!-- Cutter outline (stamp ring coming down) -->
  <rect x="280" y="240" width="464" height="300" rx="20" fill="none" stroke="#E65100" stroke-width="20"/>
  <!-- ICO shape cut out (the "cookie" shape — shown as cut in dough) -->
  <rect x="300" y="260" width="424" height="280" rx="16" fill="#FFA000" opacity="0.7"/>
  <text x="340" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white">ICO</text>
  <!-- Layer 3: Already stamped cutouts (showing previous cuts in dough) -->
  <rect x="148" y="518" width="140" height="110" rx="8" fill="#FF8F00" opacity="0.5"/>
  <text x="158" y="586" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="700" fill="white">PNG</text>
  <rect x="730" y="518" width="140" height="110" rx="8" fill="#FF8F00" opacity="0.5"/>
  <text x="744" y="586" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="700" fill="white">SVG</text>
</svg>
