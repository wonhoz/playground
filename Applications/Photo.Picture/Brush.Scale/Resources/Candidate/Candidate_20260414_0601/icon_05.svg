<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="crystalG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg5)"/>

  <!-- White card -->
  <rect x="80" y="100" width="864" height="720" rx="32" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>

  <!-- LEFT: Blurry pixel grid (before) -->
  <text x="220" y="165" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#9B59B6" text-anchor="middle">BEFORE</text>
  <!-- Big fuzzy squares -->
  <rect x="100" y="180" width="90" height="90" rx="8" fill="#CE93D8" stroke="#4A148C" stroke-width="6"/>
  <rect x="196" y="180" width="90" height="90" rx="8" fill="#AB47BC" stroke="#4A148C" stroke-width="6"/>
  <rect x="292" y="180" width="90" height="90" rx="8" fill="#CE93D8" stroke="#4A148C" stroke-width="6"/>
  <rect x="100" y="276" width="90" height="90" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="6"/>
  <rect x="196" y="276" width="90" height="90" rx="8" fill="#CE93D8" stroke="#4A148C" stroke-width="6"/>
  <rect x="292" y="276" width="90" height="90" rx="8" fill="#AB47BC" stroke="#4A148C" stroke-width="6"/>
  <rect x="100" y="372" width="90" height="90" rx="8" fill="#AB47BC" stroke="#4A148C" stroke-width="6"/>
  <rect x="196" y="372" width="90" height="90" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="6"/>
  <rect x="292" y="372" width="90" height="90" rx="8" fill="#CE93D8" stroke="#4A148C" stroke-width="6"/>
  <rect x="100" y="468" width="90" height="90" rx="8" fill="#CE93D8" stroke="#4A148C" stroke-width="6"/>
  <rect x="196" y="468" width="90" height="90" rx="8" fill="#AB47BC" stroke="#4A148C" stroke-width="6"/>
  <rect x="292" y="468" width="90" height="90" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="6"/>

  <!-- Center UPSCALE arrow -->
  <rect x="408" y="365" width="80" height="46" rx="18" fill="#9B59B6" stroke="#4A148C" stroke-width="12"/>
  <polygon points="488,338 566,388 488,438" fill="#7B1FA2" stroke="#4A148C" stroke-width="12" stroke-linejoin="round"/>
  <!-- 4x label on arrow -->
  <rect x="398" y="430" width="100" height="52" rx="16" fill="#7B1FA2" stroke="#4A148C" stroke-width="10"/>
  <text x="448" y="467" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">4x</text>

  <!-- RIGHT: Crystal/sharp polygon geometry (after) -->
  <text x="780" y="165" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#7B1FA2" text-anchor="middle">AFTER</text>
  <!-- Crystal diamond shapes (precise, small, detailed) -->
  <!-- Top cluster -->
  <polygon points="640,200 670,240 640,280 610,240" fill="#9B59B6" stroke="#4A148C" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="690,190 720,220 690,250 660,220" fill="#CE93D8" stroke="#4A148C" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="740,210 778,255 740,300 702,255" fill="#7B1FA2" stroke="#4A148C" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="800,195 832,228 800,261 768,228" fill="#AB47BC" stroke="#4A148C" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="840,220 864,248 840,276 816,248" fill="#9B59B6" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="880,200 906,228 880,256 854,228" fill="#CE93D8" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/>
  <!-- Middle cluster -->
  <polygon points="620,310 660,370 620,430 580,370" fill="#7B1FA2" stroke="#4A148C" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="680,290 720,340 680,390 640,340" fill="#9B59B6" stroke="#4A148C" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="740,310 780,360 740,410 700,360" fill="#AB47BC" stroke="#4A148C" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="808,300 848,348 808,396 768,348" fill="#7B1FA2" stroke="#4A148C" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="868,320 900,358 868,396 836,358" fill="#CE93D8" stroke="#4A148C" stroke-width="6" stroke-linejoin="round"/>
  <!-- Bottom cluster -->
  <polygon points="634,448 676,502 634,556 592,502" fill="#AB47BC" stroke="#4A148C" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="704,432 746,480 704,528 662,480" fill="#7B1FA2" stroke="#4A148C" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="774,450 814,496 774,542 734,496" fill="#9B59B6" stroke="#4A148C" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="840,440 878,484 840,528 802,484" fill="#CE93D8" stroke="#4A148C" stroke-width="6" stroke-linejoin="round"/>

  <!-- ENHANCE badge -->
  <rect x="242" y="620" width="540" height="82" rx="28" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="677" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">ENHANCE</text>

  <!-- Title -->
  <rect x="162" y="836" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="900" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
