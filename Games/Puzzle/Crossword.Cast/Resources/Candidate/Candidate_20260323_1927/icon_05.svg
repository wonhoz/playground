  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg5)"/>

  <!-- 클로즈업 격자 카드 -->
  <rect x="190" y="230" width="644" height="560" rx="24" fill="white" stroke="#1E40AF" stroke-width="10"/>

  <!-- 번호 1: "1 □ □ □ □" -->
  <text x="230" y="340" font-family="Arial Black" font-size="68" font-weight="900" fill="#1E40AF">1</text>

  <!-- 빈칸 4개 (행 1) -->
  <rect x="310" y="268" width="90" height="90" rx="8" fill="white" stroke="#1E40AF" stroke-width="7"/>
  <rect x="412" y="268" width="90" height="90" rx="8" fill="white" stroke="#1E40AF" stroke-width="7"/>
  <rect x="514" y="268" width="90" height="90" rx="8" fill="white" stroke="#1E40AF" stroke-width="7"/>
  <rect x="616" y="268" width="90" height="90" rx="8" fill="white" stroke="#1E40AF" stroke-width="7"/>

