<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 스페이스 -->
  <rect width="1024" height="1024" rx="180" fill="#050A20"/>
  <!-- 별들 -->
  <circle cx="200" cy="200" r="3" fill="white" opacity="0.6"/>
  <circle cx="800" cy="300" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="600" r="2" fill="white" opacity="0.7"/>
  <circle cx="900" cy="700" r="3" fill="white" opacity="0.6"/>
  <circle cx="700" cy="150" r="2" fill="white" opacity="0.5"/>
  <!-- Layer 2: 우주선 + 궤도 경로 편집 -->
  <!-- 타원 궤도 -->
  <ellipse cx="512" cy="480" rx="360" ry="240" fill="none" stroke="#00E5FF" stroke-width="5" stroke-dasharray="20,10" opacity="0.8"/>
  <!-- 행성 (목적지) -->
  <circle cx="152" cy="480" r="60" fill="#FF6D00"/>
  <circle cx="152" cy="480" r="48" fill="#FF8F00"/>
  <circle cx="152" cy="480" r="36" fill="#FFA726"/>
  <!-- 궤도 링 (행성 주위) -->
  <ellipse cx="152" cy="480" rx="90" ry="28" fill="none" stroke="#FF8F00" stroke-width="5" opacity="0.7"/>
  <!-- 우주선 -->
  <polygon points="872,480 820,450 820,510" fill="white"/>
  <rect x="812" y="456" width="40" height="48" rx="6" fill="#90CAF9"/>
  <!-- 경로 조절 노드들 -->
  <circle cx="512" cy="240" r="16" fill="#00E5FF"/>
  <circle cx="512" cy="240" r="10" fill="white"/>
  <circle cx="512" cy="720" r="16" fill="#00E5FF"/>
  <circle cx="512" cy="720" r="10" fill="white"/>
  <!-- Layer 3: UI 텍스트 -->
  <text x="512" y="850" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#00E5FF" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
