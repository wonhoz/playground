<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D1A"/>
      <stop offset="100%" stop-color="#001433"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#0050C8"/>
    </linearGradient>
    <radialGradient id="radar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0"/>
      <stop offset="80%" stop-color="#1E90FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar/scan circles -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1E90FF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1E90FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#1E90FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#1E90FF" stroke-width="2" opacity="0.7"/>
  <!-- Radar crosshairs -->
  <line x1="256" y1="66" x2="256" y2="446" stroke="#1E90FF" stroke-width="1" opacity="0.2"/>
  <line x1="66" y1="256" x2="446" y2="256" stroke="#1E90FF" stroke-width="1" opacity="0.2"/>
  <!-- Radar sweep sector -->
  <path d="M256 256 L256 116 A140 140 0 0 1 374 326 Z" fill="#1E90FF" opacity="0.08"/>
  <line x1="256" y1="256" x2="374" y2="326" stroke="#00BFFF" stroke-width="2.5" opacity="0.8"/>
  <!-- Port dots (active) -->
  <circle cx="320" cy="156" r="8" fill="#00BFFF"/>
  <circle cx="340" cy="290" r="8" fill="#1E90FF"/>
  <circle cx="180" cy="310" r="8" fill="#00BFFF"/>
  <!-- Port dots (inactive) -->
  <circle cx="200" cy="180" r="5" fill="#1E90FF" opacity="0.4"/>
  <circle cx="370" cy="200" r="5" fill="#1E90FF" opacity="0.4"/>
  <circle cx="160" cy="240" r="5" fill="#1E90FF" opacity="0.4"/>
  <!-- Port label -->
  <text x="328" y="148" font-family="Consolas" font-size="10" fill="#00BFFF">:80</text>
  <text x="348" y="282" font-family="Consolas" font-size="10" fill="#1E90FF">:443</text>
  <text x="148" y="306" font-family="Consolas" font-size="10" fill="#00BFFF">:22</text>
  <!-- Central eye/monitor -->
  <circle cx="256" cy="256" r="20" fill="url(#blue)"/>
  <circle cx="256" cy="256" r="10" fill="#000D1A"/>
  <circle cx="256" cy="256" r="5" fill="#00BFFF"/>
</svg>