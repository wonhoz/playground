  <text x="230" y="640" font-family="Arial Black" font-size="68" font-weight="900" fill="#059669">3</text>

  <rect x="310" y="568" width="80" height="80" rx="8" fill="white" stroke="#059669" stroke-width="7"/>
  <rect x="402" y="568" width="80" height="80" rx="8" fill="white" stroke="#059669" stroke-width="7"/>
  <rect x="494" y="568" width="80" height="80" rx="8" fill="white" stroke="#059669" stroke-width="7"/>
  <rect x="586" y="568" width="80" height="80" rx="8" fill="white" stroke="#059669" stroke-width="7"/>
