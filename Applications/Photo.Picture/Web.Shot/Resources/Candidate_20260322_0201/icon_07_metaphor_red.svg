<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 비비드레드 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0505"/>

  <!-- 대각선·동적 패턴: 웹페이지가 사진으로 변환되는 순간 -->

  <!-- 대각선 에너지 라인들 -->
  <line x1="0" y1="1024" x2="1024" y2="0" stroke="#FF1744" stroke-width="3" opacity="0.2"/>
  <line x1="0" y1="800" x2="800" y2="0" stroke="#FF1744" stroke-width="2" opacity="0.15"/>
  <line x1="224" y1="1024" x2="1024" y2="224" stroke="#FF1744" stroke-width="2" opacity="0.15"/>

  <!-- 좌측: 브라우저 (기울어진 역동적 배치) -->
  <g transform="translate(200, 400) rotate(-8)">
    <rect x="-200" y="-260" width="400" height="520" rx="16" fill="#2A0808"/>
    <rect x="-200" y="-260" width="400" height="520" rx="16" fill="none" stroke="#FF4444" stroke-width="5"/>
    <!-- 타이틀바 -->
    <rect x="-200" y="-260" width="400" height="50" rx="16" fill="#CC0000"/>
    <rect x="-200" y="-230" width="400" height="20" fill="#CC0000"/>
    <!-- URL -->
    <rect x="-140" y="-250" width="240" height="26" rx="13" fill="#1A0505"/>
    <text x="0" y="-231" font-family="monospace" font-size="14" fill="#FF8888" text-anchor="middle">https://site.com</text>
    <!-- 내용 -->
    <rect x="-180" y="-192" width="360" height="70" rx="6" fill="#200606"/>
    <rect x="-180" y="-108" width="300" height="12" rx="3" fill="#3A0A0A"/>
    <rect x="-180" y="-88" width="340" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="-70" width="310" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="-42" width="360" height="50" rx="6" fill="#200606"/>
    <rect x="-180" y="20" width="280" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="38" width="330" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="56" width="300" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="82" width="360" height="50" rx="6" fill="#200606"/>
    <rect x="-180" y="146" width="260" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="164" width="310" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="182" width="290" height="10" rx="3" fill="#2A0808"/>
    <rect x="-180" y="208" width="360" height="40" rx="6" fill="#200606"/>
  </g>

  <!-- 중앙 변환 번개 효과 -->
  <g transform="translate(512, 512)">
    <!-- 플래시 링 -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FF1744" stroke-width="12" opacity="0.6"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#FF4444" stroke-width="8" opacity="0.5"/>
    <!-- 번개 볼트 -->
    <polygon points="16,-70 -12,-8 8,-8 -16,70 12,8 -8,8" fill="#FF6B6B"/>
    <!-- 방사 스파크 -->
    <line x1="0" y1="-90" x2="0" y2="-108" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="90" x2="0" y2="108" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
    <line x1="-90" y1="0" x2="-108" y2="0" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="108" y2="0" stroke="#FF1744" stroke-width="6" stroke-linecap="round"/>
    <line x1="-63" y1="-63" x2="-76" y2="-76" stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="63" y1="-63" x2="76" y2="-76" stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="-63" y1="63" x2="-76" y2="76" stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="63" y1="63" x2="76" y2="76" stroke="#FF4444" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 우측: 스크린샷 사진 (기울어진 역동적 배치) -->
  <g transform="translate(824, 560) rotate(6)">
    <rect x="-170" y="-200" width="340" height="400" rx="12" fill="#2A0808"/>
    <rect x="-170" y="-200" width="340" height="400" rx="12" fill="none" stroke="#FF6B6B" stroke-width="5"/>
    <!-- 이미지 내용 (스크린샷처럼) -->
    <rect x="-150" y="-180" width="300" height="200" rx="6" fill="#200606"/>
    <!-- 브라우저 UI 미니어처 -->
    <rect x="-150" y="-180" width="300" height="30" rx="6" fill="#CC0000" opacity="0.7"/>
    <rect x="-100" y="-173" width="200" height="16" rx="8" fill="#1A0505" opacity="0.7"/>
    <!-- 페이지 내용 미니어처 -->
    <rect x="-140" y="-138" width="280" height="60" rx="4" fill="#3A0A0A"/>
    <rect x="-140" y="-64" width="220" height="8" rx="2" fill="#3A0A0A"/>
    <rect x="-140" y="-50" width="260" height="8" rx="2" fill="#3A0A0A"/>
    <rect x="-140" y="-36" width="240" height="8" rx="2" fill="#3A0A0A"/>
    <!-- 파일 정보 -->
    <rect x="-150" y="40" width="300" height="40" rx="6" fill="#FF1744" opacity="0.8"/>
    <text x="0" y="67" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">screenshot.png</text>
    <!-- 크기 정보 -->
    <text x="0" y="120" font-family="monospace" font-size="14" fill="#FF8888" text-anchor="middle">1280 × 5400 px</text>
    <text x="0" y="154" font-family="monospace" font-size="14" fill="#FF6666" text-anchor="middle">2.4 MB</text>
    <text x="0" y="178" font-family="monospace" font-size="14" fill="#FF4444" text-anchor="middle">Full Page</text>
  </g>
</svg>
