<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg07" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2e0808"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </radialGradient>
    <linearGradient id="origami_front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#CC3300"/>
    </linearGradient>
    <linearGradient id="origami_side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4757"/>
      <stop offset="100%" stop-color="#AA1122"/>
    </linearGradient>
    <linearGradient id="origami_top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8866"/>
      <stop offset="100%" stop-color="#FF5533"/>
    </linearGradient>
    <linearGradient id="origami_fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9966"/>
      <stop offset="100%" stop-color="#FF6644"/>
    </linearGradient>
    <filter id="glow07">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paper_shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg07)" rx="48"/>

  <!-- 오리가미 클립보드 - 3D 종이 접기 스타일 -->

  <!-- 메인 클립보드 앞면 -->
  <polygon points="148,155 364,155 364,390 148,390"
           fill="url(#origami_front)" filter="url(#paper_shadow)" opacity="0.95"/>

  <!-- 종이 접기 - 상단 우측 코너 접힘 -->
  <polygon points="314,155 364,155 364,205"
           fill="url(#origami_fold)" opacity="0.9"/>
  <!-- 접힘 그림자 선 -->
  <line x1="314" y1="155" x2="364" y2="205" stroke="#CC2200" stroke-width="2" opacity="0.7"/>

  <!-- 오리가미 측면 (3D 효과 - 우측) -->
  <polygon points="364,155 400,130 400,365 364,390"
           fill="url(#origami_side)" opacity="0.8"/>

  <!-- 오리가미 상단 (3D 효과) -->
  <polygon points="148,155 364,155 400,130 184,130"
           fill="url(#origami_top)" opacity="0.85"/>

  <!-- 클립보드 클립 (오리가미 스타일 - 접힌 종이 클립) -->
  <!-- 클립 본체 -->
  <polygon points="220,130 292,130 292,165 220,165"
           fill="#FF4757" opacity="0.95" filter="url(#glow07)"/>
  <!-- 클립 접힘 효과 -->
  <line x1="220" y1="148" x2="292" y2="148" stroke="#CC1122" stroke-width="1.5" opacity="0.6"/>
  <!-- 클립 3D 상단 -->
  <polygon points="220,130 292,130 310,115 238,115"
           fill="#FF8877" opacity="0.85"/>
  <!-- 클립 3D 우측 -->
  <polygon points="292,130 310,115 310,152 292,165"
           fill="#CC2233" opacity="0.8"/>

  <!-- 내부 텍스트 라인 (접힌 종이 느낌) -->
  <line x1="178" y1="210" x2="328" y2="210" stroke="#FF8866" stroke-width="2" opacity="0.6"/>
  <line x1="178" y1="235" x2="328" y2="235" stroke="#FF8866" stroke-width="2" opacity="0.6"/>
  <line x1="178" y1="260" x2="310" y2="260" stroke="#FF8866" stroke-width="2" opacity="0.55"/>
  <line x1="178" y1="285" x2="318" y2="285" stroke="#FF8866" stroke-width="2" opacity="0.55"/>
  <line x1="178" y1="310" x2="300" y2="310" stroke="#FF8866" stroke-width="2" opacity="0.5"/>
  <line x1="178" y1="335" x2="313" y2="335" stroke="#FF8866" stroke-width="2" opacity="0.5"/>
  <line x1="178" y1="360" x2="298" y2="360" stroke="#FF8866" stroke-width="2" opacity="0.45"/>

  <!-- 오리가미 접기 선들 (앞면) -->
  <line x1="148" y1="280" x2="364" y2="280" stroke="#CC4422" stroke-width="1" opacity="0.35" stroke-dasharray="8,6"/>
  <line x1="256" y1="155" x2="256" y2="390" stroke="#CC4422" stroke-width="1" opacity="0.25" stroke-dasharray="8,6"/>

  <!-- 하단 우측 코너 접힘 -->
  <polygon points="334,390 364,390 364,360"
           fill="#CC3300" opacity="0.8"/>
  <line x1="334" y1="390" x2="364" y2="360" stroke="#AA2200" stroke-width="1.5" opacity="0.7"/>

  <!-- 장식 - 오리가미 새 실루엣 (작은) -->
  <path d="M 88 95 L 110 75 L 125 90 L 110 78 L 96 100 Z"
        fill="#FF6B35" opacity="0.6" filter="url(#glow07)"/>
  <path d="M 110 78 L 95 85 L 110 75 Z"
        fill="#FF4757" opacity="0.7"/>

  <!-- 오른쪽 작은 오리가미 -->
  <path d="M 420 380 L 442 360 L 457 375 L 442 363 L 428 385 Z"
        fill="#FF6B35" opacity="0.5" filter="url(#glow07)"/>

  <!-- AI 텍스트 -->
  <text x="256" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="22"
        font-weight="bold" fill="#FF8866" opacity="0.9" filter="url(#glow07)">AI.Clip</text>

  <!-- 빛 효과 -->
  <ellipse cx="240" cy="230" rx="80" ry="50" fill="#ffffff" opacity="0.04"/>
</svg>
