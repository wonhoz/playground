<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Batch.Rename - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; color: #aaa; margin-bottom: 24px; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; background: #111; }
  .item span { font-size: 0.72rem; color: #888; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Batch.Rename — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_blue_files.svg"><span>01 Blue Files</span></div>
  <div class="item"><img src="candidate_02_orange_pencil.svg"><span>02 Orange Pencil</span></div>
  <div class="item"><img src="candidate_03_green_tag.svg"><span>03 Green Tag</span></div>
  <div class="item"><img src="candidate_04_purple_regex.svg"><span>04 Purple Regex</span></div>
  <div class="item"><img src="candidate_05_red_scissors.svg"><span>05 Red Scissors</span></div>
  <div class="item"><img src="candidate_06_teal_folder.svg"><span>06 Teal Folder</span></div>
  <div class="item"><img src="candidate_07_yellow_stamp.svg"><span>07 Yellow Stamp</span></div>
  <div class="item"><img src="candidate_08_pink_magic.svg"><span>08 Pink Magic</span></div>
  <div class="item"><img src="candidate_09_silver_chain.svg"><span>09 Silver Chain</span></div>
  <div class="item"><img src="candidate_10_rainbow_files.svg"><span>10 Rainbow Files</span></div>
</div>
</body>
</html>
