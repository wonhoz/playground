<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg03" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0C0C24"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>
    <clipPath id="frame03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <g clip-path="url(#frame03)">
    <!-- Layer 2: Scattered alphabet letters forming a crossword-like pattern -->

    <!-- Background dim letters -->
    <text x="142" y="220" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">P</text>
    <text x="358" y="220" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">Z</text>
    <text x="574" y="220" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">Q</text>
    <text x="790" y="220" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">X</text>
    <text x="880" y="390" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">V</text>
    <text x="142" y="800" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">B</text>
    <text x="880" y="730" font-family="'Segoe UI',Arial" font-size="80" font-weight="900" fill="#2A2A44" text-anchor="middle">K</text>

    <!-- Main horizontal word: CROSS (centered, row ~400) -->
    <!-- Each letter in a subtle cell -->
    <!-- C -->
    <rect x="82" y="355" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="156" y="461" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#FFD700" text-anchor="middle">C</text>
    <!-- R -->
    <rect x="238" y="355" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="312" y="461" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#FFD700" text-anchor="middle">R</text>
    <!-- O (intersection with down word — highlighted) -->
    <rect x="394" y="355" width="148" height="148" rx="10" fill="#1E2A10"/>
    <rect x="394" y="355" width="148" height="148" rx="10" fill="none" stroke="#AAFF44" stroke-width="5"/>
    <text x="468" y="461" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#AAFF44" text-anchor="middle">O</text>
    <!-- S -->
    <rect x="550" y="355" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="624" y="461" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#FFD700" text-anchor="middle">S</text>
    <!-- S -->
    <rect x="706" y="355" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="780" y="461" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#FFD700" text-anchor="middle">S</text>

    <!-- Horizontal arrow indicator -->
    <line x1="60" y1="429" x2="874" y2="429" stroke="#FFD700" stroke-width="3" stroke-dasharray="8,12" opacity="0.4"/>

    <!-- Main vertical word: ORBIT (col at O position = 394-542) -->
    <!-- O already drawn above -->
    <!-- R -->
    <rect x="394" y="203" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="468" y="309" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#00CFFF" text-anchor="middle">W</text>
    <!-- B (below O) -->
    <rect x="394" y="507" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="468" y="613" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#00CFFF" text-anchor="middle">R</text>
    <!-- I -->
    <rect x="394" y="659" width="148" height="148" rx="10" fill="#1C1C34" stroke="#333" stroke-width="2"/>
    <text x="468" y="765" font-family="'Segoe UI',Arial" font-size="110" font-weight="900" fill="#00CFFF" text-anchor="middle">D</text>

    <!-- Vertical arrow indicator -->
    <line x1="468" y1="140" x2="468" y2="865" stroke="#00CFFF" stroke-width="3" stroke-dasharray="8,12" opacity="0.4"/>

    <!-- Layer 3: Direction labels -->
    <text x="156" y="310" font-family="'Segoe UI',Arial" font-size="36" font-weight="700" fill="#FFD700" text-anchor="middle" opacity="0.7">→ ACROSS</text>
    <text x="900" y="429" font-family="'Segoe UI',Arial" font-size="36" font-weight="700" fill="#00CFFF" text-anchor="middle" opacity="0.7" transform="rotate(90 900 429)">↓ DOWN</text>

    <!-- Crossword pattern dots at corners -->
    <rect x="82" y="203" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="706" y="203" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="82" y="659" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="706" y="659" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="238" y="203" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="550" y="203" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="238" y="507" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="550" y="507" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="238" y="659" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="550" y="659" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
    <rect x="706" y="507" width="148" height="148" rx="10" fill="#181828" stroke="#222" stroke-width="2"/>
  </g>
</svg>
