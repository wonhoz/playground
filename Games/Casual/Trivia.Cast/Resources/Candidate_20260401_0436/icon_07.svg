<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#311B92"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8BBD9"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Brain silhouette (simplified) -->
  <!-- Left hemisphere -->
  <ellipse cx="440" cy="460" rx="220" ry="200" fill="url(#brain)"/>
  <!-- Right hemisphere -->
  <ellipse cx="640" cy="460" rx="200" ry="200" fill="#F06292"/>
  <!-- Brain division line -->
  <line x1="540" y1="280" x2="540" y2="640" stroke="#311B92" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <!-- Brain fold lines (left) -->
  <path d="M 280 400 Q 340 380 380 420 Q 420 460 380 500" fill="none" stroke="#C2185B" stroke-width="10" stroke-linecap="round"/>
  <path d="M 300 500 Q 360 480 400 520" fill="none" stroke="#C2185B" stroke-width="10" stroke-linecap="round"/>
  <!-- Brain fold lines (right) -->
  <path d="M 760 400 Q 700 380 660 420 Q 620 460 660 500" fill="none" stroke="#C2185B" stroke-width="10" stroke-linecap="round"/>
  <!-- Brain stem -->
  <rect x="490" y="620" width="100" height="80" rx="20" fill="#F48FB1"/>
  <!-- Layer 3: Lightning bolt (knowledge surge) -->
  <polygon points="620,180 560,420 612,420 545,680 700,360 640,360 720,180" fill="#FFD700" stroke="#FF8F00" stroke-width="8"/>
  <!-- Sparkles from bolt -->
  <circle cx="740" cy="200" r="14" fill="#FFD700"/>
  <circle cx="780" cy="260" r="10" fill="#FFF176"/>
  <circle cx="760" cy="320" r="12" fill="#FFD700"/>
  <!-- ? marks in brain -->
  <text x="390" y="490" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Georgia,serif" font-weight="bold" fill="#311B92" opacity="0.5">?</text>
  <!-- ! answer emerging -->
  <text x="390" y="490" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Georgia,serif" font-weight="bold" fill="white" opacity="0.3">!</text>
</svg>
