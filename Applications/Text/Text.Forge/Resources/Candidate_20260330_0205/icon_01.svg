<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 진청 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg1)"/>

  <!-- Layer 2: 도구 탭 패널 -->
  <!-- 앱 창 틀 -->
  <rect x="80" y="140" width="864" height="744" rx="20" fill="#1976D2" opacity="0.6"/>

  <!-- 탭 바 (상단) -->
  <rect x="80" y="140" width="864" height="82" rx="20" fill="#0D47A1"/>

  <!-- 탭들 (8개) -->
  <!-- 선택된 탭 (JSON) -->
  <rect x="96" y="148" width="130" height="64" rx="12" fill="#FF8F00"/>
  <text x="161" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="34" fill="white" text-anchor="middle" dominant-baseline="middle">JSON</text>
  <!-- 나머지 탭들 -->
  <rect x="242" y="156" width="96" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="290" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">ENC</text>
  <rect x="354" y="156" width="96" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="402" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">HASH</text>
  <rect x="466" y="156" width="76" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="504" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">JWT</text>
  <rect x="558" y="156" width="80" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="598" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">REGEX</text>
  <rect x="654" y="156" width="70" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="689" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">TIME</text>
  <rect x="740" y="156" width="70" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="775" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">CASE</text>
  <rect x="826" y="156" width="70" height="48" rx="10" fill="white" opacity="0.2"/>
  <text x="861" y="183" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">GEN</text>

  <!-- Layer 3: JSON 내용 미리보기 -->
  <rect x="96" y="242" width="832" height="60" rx="8" fill="#1A3A6A"/>
  <text x="120" y="274" font-family="'Courier New',monospace" font-size="36" fill="#FFB74D">{"name":</text>
  <text x="410" y="274" font-family="'Courier New',monospace" font-size="36" fill="#A5D6A7"> "TextForge"</text>
  <rect x="96" y="318" width="832" height="60" rx="8" fill="#1A3A6A" opacity="0.7"/>
  <text x="120" y="350" font-family="'Courier New',monospace" font-size="36" fill="#FFB74D"> "tools":</text>
  <text x="368" y="350" font-family="'Courier New',monospace" font-size="36" fill="#81D4FA"> [8]</text>
  <rect x="96" y="394" width="832" height="60" rx="8" fill="#1A3A6A" opacity="0.5"/>
  <text x="120" y="426" font-family="'Courier New',monospace" font-size="36" fill="#FFB74D"> "version":</text>
  <text x="418" y="426" font-family="'Courier New',monospace" font-size="36" fill="#A5D6A7"> "2.0.0"</text>

  <!-- 변환 버튼 -->
  <rect x="360" y="660" width="304" height="80" rx="18" fill="#FF8F00"/>
  <text x="512" y="702" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" dominant-baseline="middle">▶ Format</text>
</svg>
