<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 밝은 하늘-민트 그라데이션 -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <linearGradient id="serverBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg05)"/>

  <!-- 서버 아이콘 (중앙 상단) -->
  <!-- 서버 몸체 -->
  <rect x="300" y="200" width="424" height="340" rx="28" fill="url(#serverBody)" stroke="white" stroke-width="14"/>
  <!-- 서버 랙 슬롯 1 -->
  <rect x="336" y="240" width="352" height="56" rx="12" fill="#42A5F5" stroke="white" stroke-width="6"/>
  <circle cx="624" cy="268" r="12" fill="#69FF47"/>
  <circle cx="660" cy="268" r="12" fill="#69FF47"/>
  <!-- 서버 랙 슬롯 2 -->
  <rect x="336" y="312" width="352" height="56" rx="12" fill="#42A5F5" stroke="white" stroke-width="6"/>
  <circle cx="624" cy="340" r="12" fill="#FFD600"/>
  <circle cx="660" cy="340" r="12" fill="#69FF47"/>
  <!-- 서버 랙 슬롯 3 -->
  <rect x="336" y="384" width="352" height="56" rx="12" fill="#42A5F5" stroke="white" stroke-width="6"/>
  <circle cx="624" cy="412" r="12" fill="#69FF47"/>
  <circle cx="660" cy="412" r="12" fill="#69FF47"/>
  <!-- 포트들 -->
  <rect x="336" y="460" width="80" height="40" rx="8" fill="#0D47A1" stroke="#90CAF9" stroke-width="4"/>
  <rect x="432" y="460" width="80" height="40" rx="8" fill="#0D47A1" stroke="#90CAF9" stroke-width="4"/>
  <rect x="528" y="460" width="80" height="40" rx="8" fill="#0D47A1" stroke="#90CAF9" stroke-width="4"/>

  <!-- 신호 파형 (서버 위) -->
  <path d="M200,170 Q230,120 260,170 Q290,220 320,170 Q350,120 380,170 Q410,220 440,170 Q470,120 500,170 Q530,220 560,170 Q590,120 620,170 Q650,220 680,170 Q710,120 740,170 Q770,220 800,170 Q830,120 860,170"
        fill="none" stroke="#00ACC1" stroke-width="20" stroke-linecap="round"/>

  <!-- 파형 위 두번째 (얇게) -->
  <path d="M220,155 Q242,128 264,155 Q286,182 308,155 Q330,128 352,155 Q374,182 396,155 Q418,128 440,155 Q462,182 484,155 Q506,128 528,155 Q550,182 572,155 Q594,128 616,155 Q638,182 660,155 Q682,128 704,155 Q726,182 748,155 Q770,128 792,155"
        fill="none" stroke="#80DEEA" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- SSE 뱃지 -->
  <rect x="148" y="600" width="220" height="100" rx="18" fill="#FF6D00"/>
  <text x="258" y="666" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="900" fill="white">SSE</text>

  <!-- WS 뱃지 -->
  <rect x="656" y="600" width="220" height="100" rx="18" fill="#1565C0"/>
  <text x="766" y="666" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="900" fill="white">WS</text>

  <!-- 연결선: 서버 → SSE 뱃지 -->
  <path d="M390,540 Q300,570 258,600" fill="none" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" stroke-dasharray="16 10"/>
  <!-- 연결선: 서버 → WS 뱃지 -->
  <path d="M634,540 Q724,570 766,600" fill="none" stroke="#1565C0" stroke-width="12" stroke-linecap="round" stroke-dasharray="16 10"/>

  <!-- 하단 설명 텍스트 -->
  <rect x="260" y="748" width="504" height="68" rx="18" fill="white" opacity="0.85"/>
  <text x="512" y="794" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="bold" fill="#006064">Real-time Testing</text>

  <!-- 코너 장식 점들 -->
  <circle cx="148" cy="148" r="18" fill="#00ACC1" opacity="0.5"/>
  <circle cx="876" cy="148" r="18" fill="#00ACC1" opacity="0.5"/>
  <circle cx="148" cy="876" r="18" fill="#00ACC1" opacity="0.5"/>
  <circle cx="876" cy="876" r="18" fill="#00ACC1" opacity="0.5"/>
</svg>
