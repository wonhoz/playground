<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#2a1500"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#cc4400"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2a8a82"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe66d"/>
      <stop offset="100%" style="stop-color:#ccaa00"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#4a9a70"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stacked blocks (stable) -->
  <rect x="148" y="360" width="216" height="64" rx="8" fill="url(#b4)" stroke="#2a7a50" stroke-width="2"/>
  <rect x="164" y="296" width="184" height="64" rx="8" fill="url(#b3)" stroke="#998800" stroke-width="2"/>
  <rect x="180" y="232" width="152" height="64" rx="8" fill="url(#b2)" stroke="#1a6860" stroke-width="2"/>
  <rect x="200" y="168" width="112" height="64" rx="8" fill="url(#b1)" stroke="#993300" stroke-width="2"/>
  <!-- Toppling block (tilted) -->
  <g transform="translate(256, 136) rotate(20) translate(-60,-32)">
    <rect x="0" y="0" width="120" height="64" rx="8" fill="#ff4444" stroke="#cc0000" stroke-width="2"/>
  </g>
  <!-- Crash particles -->
  <rect x="80" y="200" width="20" height="20" rx="4" fill="#ff6b35" transform="rotate(25 90 210)" opacity="0.7"/>
  <rect x="380" y="220" width="16" height="16" rx="3" fill="#ffe66d" transform="rotate(-15 388 228)" opacity="0.7"/>
  <rect x="60" y="320" width="14" height="14" rx="3" fill="#4ecdc4" transform="rotate(40 67 327)" opacity="0.6"/>
  <rect x="400" y="300" width="18" height="18" rx="4" fill="#a8e6cf" transform="rotate(-30 409 309)" opacity="0.6"/>
  <!-- Ground -->
  <rect x="60" y="424" width="392" height="12" rx="4" fill="#cc6600" opacity="0.6"/>
</svg>