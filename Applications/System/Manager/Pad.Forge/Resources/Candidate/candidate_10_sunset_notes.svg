<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#F7931E"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="padSunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFF8F0" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bindStrip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun setting behind notepad -->
  <circle cx="256" cy="320" r="100" fill="#FFDD00" opacity="0.6"/>
  <circle cx="256" cy="320" r="80" fill="#FFB800" opacity="0.4"/>
  <!-- Sun rays -->
  <line x1="256" y1="200" x2="256" y2="180" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="330" y1="246" x2="346" y2="234" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="356" y1="320" x2="376" y2="320" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="182" y1="246" x2="166" y2="234" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="156" y1="320" x2="136" y2="320" stroke="#FFDD00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Notepad over the sun -->
  <rect x="120" y="100" width="240" height="300" rx="14" fill="url(#padSunset)" stroke="rgba(255,100,0,0.3)" stroke-width="2"/>
  <!-- Binding strip -->
  <rect x="116" y="96" width="248" height="26" rx="12" fill="url(#bindStrip)"/>
  <!-- Spiral holes -->
  <circle cx="156" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="194" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="232" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="270" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="308" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="346" cy="109" r="6" fill="#FFFFFF" opacity="0.8"/>
  <!-- Warm golden ruled lines -->
  <line x1="138" y1="148" x2="342" y2="148" stroke="#FFB347" stroke-width="1.5" opacity="0.6"/>
  <line x1="138" y1="168" x2="342" y2="168" stroke="#FFB347" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="188" x2="342" y2="188" stroke="#FFB347" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="208" x2="342" y2="208" stroke="#FFB347" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="228" x2="342" y2="228" stroke="#FFB347" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="248" x2="342" y2="248" stroke="#FFB347" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="268" x2="342" y2="268" stroke="#FFB347" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="288" x2="342" y2="288" stroke="#FFB347" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="308" x2="342" y2="308" stroke="#FFB347" stroke-width="1.5" opacity="0.3"/>
  <line x1="138" y1="328" x2="342" y2="328" stroke="#FFB347" stroke-width="1.5" opacity="0.3"/>
  <line x1="138" y1="348" x2="342" y2="348" stroke="#FFB347" stroke-width="1.5" opacity="0.3"/>
  <!-- Handwritten style text -->
  <text x="148" y="143" font-family="serif" font-size="14" fill="#D2691E" font-style="italic">Today's notes...</text>
  <rect x="148" y="162" width="120" height="5" rx="2.5" fill="#D2691E" opacity="0.4"/>
  <rect x="148" y="182" width="140" height="5" rx="2.5" fill="#D2691E" opacity="0.3"/>
</svg>
