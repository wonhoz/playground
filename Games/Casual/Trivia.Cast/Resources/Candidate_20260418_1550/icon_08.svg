<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </radialGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 중앙 TRIVIA 라벨 -->
    <circle cx="512" cy="480" r="180" fill="#FFD600"/>
    <text x="512" y="500" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="80" fill="#0D0D1A" text-anchor="middle">TRIVIA</text>
    <text x="512" y="560" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#B71C1C" text-anchor="middle">CAST</text>

    <!-- 12개 카테고리 이모지 원형 배치 -->
    <!-- 상단 (0°) -->
    <circle cx="512" cy="160" r="56" fill="#1565C0"/>
    <text x="512" y="186" font-family="'Segoe UI',Arial,sans-serif" font-size="64" text-anchor="middle">⚗️</text>

    <!-- 30° -->
    <circle cx="672" cy="206" r="50" fill="#6A1B9A"/>
    <text x="672" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">📜</text>

    <!-- 60° -->
    <circle cx="800" cy="340" r="50" fill="#00695C"/>
    <text x="800" y="364" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">💻</text>

    <!-- 90° (우측) -->
    <circle cx="840" cy="480" r="56" fill="#E65100"/>
    <text x="840" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="64" text-anchor="middle">⚽</text>

    <!-- 120° -->
    <circle cx="800" cy="620" r="50" fill="#B71C1C"/>
    <text x="800" y="644" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">🎬</text>

    <!-- 150° -->
    <circle cx="672" cy="754" r="50" fill="#880E4F"/>
    <text x="672" y="778" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">🎵</text>

    <!-- 180° (하단) -->
    <circle cx="512" cy="800" r="56" fill="#FF6F00"/>
    <text x="512" y="826" font-family="'Segoe UI',Arial,sans-serif" font-size="64" text-anchor="middle">🍕</text>

    <!-- 210° -->
    <circle cx="352" cy="754" r="50" fill="#1B5E20"/>
    <text x="352" y="778" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">🌍</text>

    <!-- 240° -->
    <circle cx="224" cy="620" r="50" fill="#0277BD"/>
    <text x="224" y="644" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">➕</text>

    <!-- 270° (좌측) -->
    <circle cx="184" cy="480" r="56" fill="#AD1457"/>
    <text x="184" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="64" text-anchor="middle">🎨</text>

    <!-- 300° -->
    <circle cx="224" cy="340" r="50" fill="#37474F"/>
    <text x="224" y="364" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">🎮</text>

    <!-- 330° -->
    <circle cx="352" cy="206" r="50" fill="#F57F17"/>
    <text x="352" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="56" text-anchor="middle">💡</text>

    <!-- 연결선 (중심→외곽, 얇게) -->
    <line x1="512" y1="300" x2="512" y2="216" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="651" y1="341" x2="640" y2="248" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="712" y1="480" x2="784" y2="480" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="651" y1="619" x2="762" y2="606" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="512" y1="660" x2="512" y2="744" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="373" y1="619" x2="354" y2="706" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="312" y1="480" x2="240" y2="480" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
    <line x1="373" y1="341" x2="364" y2="248" stroke="#FFD600" stroke-width="3" opacity="0.3"/>
  </g>
</svg>
