<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bgCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFFAFE"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background – light cyan -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgCyan)"/>

  <g clip-path="url(#clip02)">
    <!-- Layer 2: Disk usage ring (donut chart) -->
    <!-- Outer circle (background) -->
    <circle cx="512" cy="480" r="300" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="512" cy="480" r="300" fill="none" stroke="#E0FAFC" stroke-width="70"/>

    <!-- BEFORE: Used portion (red/orange ~75%) -->
    <circle cx="512" cy="480" r="300" fill="none" stroke="#F87171" stroke-width="70"
            stroke-dasharray="1414 472"
            stroke-dashoffset="0"
            transform="rotate(-90 512 480)"/>

    <!-- AFTER: Clean portion (green ~25%) -->
    <circle cx="512" cy="480" r="300" fill="none" stroke="#22C55E" stroke-width="70"
            stroke-dasharray="471 1415"
            stroke-dashoffset="-1413"
            transform="rotate(-90 512 480)"/>

    <!-- Inner hole -->
    <circle cx="512" cy="480" r="200" fill="url(#bgCyan)"/>

    <!-- Layer 3: Center text - before/after -->
    <text x="512" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0E7490">Clean</text>
    <text x="512" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#0E7490">25% free</text>

    <!-- Legend bottom -->
    <rect x="220" y="840" width="32" height="32" rx="6" fill="#F87171"/>
    <text x="264" y="866" font-family="Arial, sans-serif" font-size="30" fill="#0E7490">Junk</text>
    <rect x="450" y="840" width="32" height="32" rx="6" fill="#22C55E"/>
    <text x="494" y="866" font-family="Arial, sans-serif" font-size="30" fill="#0E7490">Clean</text>

    <!-- Arrow down (cleaning action) -->
    <path d="M660,800 L720,800 L720,760 L760,820 L720,880 L720,840 L660,840 Z" fill="#06B6D4" opacity="0.7"/>
  </g>
</svg>
