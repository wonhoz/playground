<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Magnifier circle -->
  <circle cx="460" cy="460" r="230" fill="none" stroke="#2E7D32" stroke-width="60"/>
  <circle cx="460" cy="460" r="170" fill="#0A1400"/>
  <!-- Hex digits inside -->
  <!-- "0F" pattern using rectangles (no text) -->
  <!-- "0" shape -->
  <rect x="330" y="380" width="60" height="160" rx="10" fill="#4CAF50"/>
  <rect x="330" y="380" width="110" height="30" rx="8" fill="#4CAF50"/>
  <rect x="330" y="510" width="110" height="30" rx="8" fill="#4CAF50"/>
  <rect x="380" y="380" width="60" height="160" rx="10" fill="#4CAF50"/>
  <!-- "F" shape -->
  <rect x="470" y="380" width="30" height="160" rx="8" fill="#4CAF50"/>
  <rect x="470" y="380" width="90" height="28" rx="8" fill="#4CAF50"/>
  <rect x="470" y="452" width="70" height="24" rx="8" fill="#4CAF50"/>
  <!-- Magnifier handle -->
  <line x1="645" y1="645" x2="790" y2="790" stroke="#2E7D32" stroke-width="56" stroke-linecap="round"/>
</svg>