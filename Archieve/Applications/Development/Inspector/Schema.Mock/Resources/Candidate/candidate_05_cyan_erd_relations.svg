<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001A1F"/>
      <stop offset="100%" stop-color="#00121A"/>
    </linearGradient>
    <linearGradient id="entity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Relation lines -->
  <g stroke="#00BCD4" stroke-width="2.5" fill="none" opacity="0.5">
    <line x1="196" y1="160" x2="256" y2="230"/>
    <line x1="316" y1="160" x2="256" y2="230"/>
    <line x1="256" y1="302" x2="160" y2="380"/>
    <line x1="256" y1="302" x2="352" y2="380"/>
  </g>
  <!-- Entity boxes -->
  <!-- Users table (center) -->
  <rect x="176" y="230" width="160" height="72" rx="8" fill="url(#entity)" opacity="0.85"/>
  <rect x="176" y="230" width="160" height="24" rx="8" fill="#00838F"/>
  <rect x="176" y="246" width="160" height="8" fill="#00838F"/>
  <rect x="192" y="236" width="80" height="8" rx="3" fill="white" opacity="0.8"/>
  <g fill="url(#cyan)" opacity="0.7">
    <rect x="192" y="264" width="50" height="8" rx="3"/>
    <rect x="192" y="280" width="70" height="8" rx="3" opacity="0.6"/>
    <rect x="192" y="288" width="56" height="8" rx="3" opacity="0.5"/>
  </g>
  <!-- Orders table (top-left) -->
  <rect x="90" y="100" width="130" height="60" rx="8" fill="url(#entity)" opacity="0.75"/>
  <rect x="90" y="100" width="130" height="22" rx="8" fill="#006064"/>
  <rect x="90" y="114" width="130" height="8" fill="#006064"/>
  <rect x="104" y="106" width="66" height="8" rx="3" fill="white" opacity="0.8"/>
  <g fill="url(#cyan)" opacity="0.6">
    <rect x="104" y="130" width="44" height="7" rx="3"/>
    <rect x="104" y="141" width="56" height="7" rx="3" opacity="0.5"/>
  </g>
  <!-- Products table (top-right) -->
  <rect x="292" y="100" width="130" height="60" rx="8" fill="url(#entity)" opacity="0.75"/>
  <rect x="292" y="100" width="130" height="22" rx="8" fill="#006064"/>
  <rect x="292" y="114" width="130" height="8" fill="#006064"/>
  <rect x="306" y="106" width="74" height="8" rx="3" fill="white" opacity="0.8"/>
  <g fill="url(#cyan)" opacity="0.6">
    <rect x="306" y="130" width="48" height="7" rx="3"/>
    <rect x="306" y="141" width="60" height="7" rx="3" opacity="0.5"/>
  </g>
  <!-- Reviews (bottom-left) -->
  <rect x="90" y="370" width="130" height="60" rx="8" fill="url(#entity)" opacity="0.65"/>
  <rect x="90" y="370" width="130" height="22" rx="8" fill="#006064"/>
  <rect x="90" y="384" width="130" height="8" fill="#006064"/>
  <rect x="104" y="376" width="60" height="8" rx="3" fill="white" opacity="0.8"/>
  <!-- Payments (bottom-right) -->
  <rect x="292" y="370" width="130" height="60" rx="8" fill="url(#entity)" opacity="0.65"/>
  <rect x="292" y="370" width="130" height="22" rx="8" fill="#006064"/>
  <rect x="292" y="384" width="130" height="8" fill="#006064"/>
  <rect x="306" y="376" width="68" height="8" rx="3" fill="white" opacity="0.8"/>
</svg>
