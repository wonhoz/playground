<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="512" cy="512" r="512" fill="url(#bg1)"/>
  <!-- Keyboard key big -->
  <rect x="200" y="180" width="340" height="280" rx="32" fill="#10B981"/>
  <rect x="220" y="200" width="300" height="240" rx="24" fill="#34D399"/>
  <text x="370" y="360" font-family="Arial,sans-serif" font-size="120" fill="#FFFFFF" font-weight="bold" text-anchor="middle">F5</text>
  <!-- Waveform / pulse signal -->
  <!-- base line -->
  <line x1="190" y1="590" x2="834" y2="590" stroke="#10B981" stroke-width="6"/>
  <!-- key DOWN pulse -->
  <polyline points="190,590 340,590 340,480 410,480 410,590 580,590 580,460 670,460 670,590 834,590"
    fill="none" stroke="#059669" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- DOWN/UP labels -->
  <text x="375" y="445" font-family="Arial,sans-serif" font-size="38" fill="#047857" font-weight="bold" text-anchor="middle">▼</text>
  <text x="625" y="430" font-family="Arial,sans-serif" font-size="38" fill="#047857" font-weight="bold" text-anchor="middle">▲</text>
  <!-- Label -->
  <text x="512" y="760" font-family="Arial,sans-serif" font-size="60" fill="#065F46" font-weight="bold" text-anchor="middle">Key Test</text>
  <text x="512" y="830" font-family="Arial,sans-serif" font-size="44" fill="#6EE7B7" text-anchor="middle">입력 진단</text>
</svg>
