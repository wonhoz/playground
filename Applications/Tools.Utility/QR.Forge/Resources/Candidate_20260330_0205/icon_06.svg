<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 연초록 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg6)"/>

  <!-- Layer 2: QR 코드 (큰, 컬러풀) -->
  <!-- 파인더 좌상 — 파랑 -->
  <rect x="140" y="140" width="220" height="220" rx="14" fill="#1565C0"/>
  <rect x="164" y="164" width="172" height="172" rx="8" fill="#E8F5E9"/>
  <rect x="190" y="190" width="120" height="120" rx="6" fill="#1565C0"/>

  <!-- 파인더 우상 — 초록 -->
  <rect x="664" y="140" width="220" height="220" rx="14" fill="#2E7D32"/>
  <rect x="688" y="164" width="172" height="172" rx="8" fill="#E8F5E9"/>
  <rect x="714" y="190" width="120" height="120" rx="6" fill="#2E7D32"/>

  <!-- 파인더 좌하 — 주황 -->
  <rect x="140" y="664" width="220" height="220" rx="14" fill="#E65100"/>
  <rect x="164" y="688" width="172" height="172" rx="8" fill="#E8F5E9"/>
  <rect x="190" y="714" width="120" height="120" rx="6" fill="#E65100"/>

  <!-- 타이밍 패턴 (가로/세로 교차) -->
  <rect x="380" y="140" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="452" y="140" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="524" y="140" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="596" y="140" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="140" y="380" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="140" y="452" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="140" y="524" width="36" height="36" rx="4" fill="#1A1A1A"/>
  <rect x="140" y="596" width="36" height="36" rx="4" fill="#1A1A1A"/>

  <!-- 중앙 데이터 모듈 (컬러풀) -->
  <rect x="380" y="380" width="36" height="36" rx="4" fill="#7B1FA2"/>
  <rect x="452" y="380" width="36" height="36" rx="4" fill="#1565C0"/>
  <rect x="524" y="380" width="36" height="36" rx="4" fill="#2E7D32"/>
  <rect x="596" y="380" width="36" height="36" rx="4" fill="#E65100"/>
  <rect x="668" y="380" width="36" height="36" rx="4" fill="#7B1FA2"/>
  <rect x="380" y="452" width="36" height="36" rx="4" fill="#E65100"/>
  <rect x="452" y="452" width="36" height="36" rx="4" fill="#2E7D32"/>
  <rect x="524" y="452" width="36" height="36" rx="4" fill="#1565C0"/>
  <rect x="668" y="452" width="36" height="36" rx="4" fill="#2E7D32"/>
  <rect x="380" y="524" width="36" height="36" rx="4" fill="#2E7D32"/>
  <rect x="524" y="524" width="36" height="36" rx="4" fill="#7B1FA2"/>
  <rect x="596" y="524" width="36" height="36" rx="4" fill="#E65100"/>
  <rect x="668" y="524" width="36" height="36" rx="4" fill="#1565C0"/>
  <rect x="380" y="596" width="36" height="36" rx="4" fill="#1565C0"/>
  <rect x="452" y="596" width="36" height="36" rx="4" fill="#7B1FA2"/>
  <rect x="596" y="596" width="36" height="36" rx="4" fill="#2E7D32"/>
  <rect x="668" y="596" width="36" height="36" rx="4" fill="#E65100"/>
  <rect x="452" y="668" width="36" height="36" rx="4" fill="#1565C0"/>
  <rect x="524" y="668" width="36" height="36" rx="4" fill="#E65100"/>
  <rect x="596" y="668" width="36" height="36" rx="4" fill="#7B1FA2"/>
  <rect x="668" y="668" width="36" height="36" rx="4" fill="#2E7D32"/>

  <!-- Layer 3: 중앙 QR.Forge 로고 + 하단 내보내기 배지 -->
  <rect x="432" y="432" width="160" height="160" rx="12" fill="white" stroke="#1A1A1A" stroke-width="4"/>
  <text x="512" y="492" font-family="'Courier New',monospace" font-weight="900" font-size="30" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">QR</text>
  <text x="512" y="532" font-family="'Courier New',monospace" font-weight="700" font-size="22" fill="#546E7A" text-anchor="middle" dominant-baseline="middle">Forge</text>

  <!-- 하단 내보내기 배지 -->
  <rect x="200" y="870" width="624" height="68" rx="18" fill="#2E7D32"/>
  <text x="512" y="906" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="32" fill="white" text-anchor="middle" dominant-baseline="middle">PNG  ·  PDF  ·  SVG</text>
</svg>
