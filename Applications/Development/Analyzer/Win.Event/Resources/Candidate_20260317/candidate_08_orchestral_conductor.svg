<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg08" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a1e00"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </radialGradient>
    <radialGradient id="batonGrad08" cx="20%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="batonGlow08">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong08">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="staffGrad08" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg08)"/>

  <!-- Ambient glow from baton tip -->
  <circle cx="330" cy="110" r="80" fill="#FFD700" filter="url(#glowStrong08)" opacity="0.12"/>

  <!-- Music staff lines - representing event streams -->
  <!-- Error stream (red) -->
  <line x1="30" y1="180" x2="482" y2="180" stroke="#FF4500" stroke-width="2.5" filter="url(#glow08)" opacity="0.8"/>
  <!-- Warning stream (orange) -->
  <line x1="30" y1="220" x2="482" y2="220" stroke="#FF8C00" stroke-width="2" filter="url(#glow08)" opacity="0.7"/>
  <!-- Info stream (blue) -->
  <line x1="30" y1="260" x2="482" y2="260" stroke="#1E90FF" stroke-width="2" filter="url(#glow08)" opacity="0.7"/>
  <!-- Audit stream (purple) -->
  <line x1="30" y1="300" x2="482" y2="300" stroke="#9B59B6" stroke-width="2" filter="url(#glow08)" opacity="0.7"/>
  <!-- System stream (gold) -->
  <line x1="30" y1="340" x2="482" y2="340" stroke="#FFD700" stroke-width="1.5" filter="url(#glow08)" opacity="0.5"/>

  <!-- Staff line labels -->
  <g font-family="monospace" font-size="9" filter="url(#glow08)">
    <text x="15" y="184" fill="#FF4500" text-anchor="middle">ERR</text>
    <text x="15" y="224" fill="#FF8C00" text-anchor="middle">WRN</text>
    <text x="15" y="264" fill="#4A9EFF" text-anchor="middle">INF</text>
    <text x="15" y="304" fill="#C080FF" text-anchor="middle">AUD</text>
    <text x="15" y="344" fill="#FFD700" text-anchor="middle">SYS</text>
  </g>

  <!-- Musical notes / event symbols on the staff -->
  <!-- ERROR events (filled ovals + stems = notes) -->
  <g filter="url(#glow08)">
    <!-- Note 1: ERROR -->
    <ellipse cx="80" cy="183" rx="9" ry="7" fill="#FF4500" transform="rotate(-15, 80, 183)"/>
    <line x1="89" y1="180" x2="89" y2="155" stroke="#FF4500" stroke-width="2"/>

    <!-- Note 2: ERROR (with flag) -->
    <ellipse cx="160" cy="183" rx="9" ry="7" fill="#FF4500" transform="rotate(-15, 160, 183)"/>
    <line x1="169" y1="180" x2="169" y2="150" stroke="#FF4500" stroke-width="2"/>
    <path d="M169,150 Q188,155 182,165" fill="none" stroke="#FF4500" stroke-width="2"/>

    <!-- Note 3: ERROR -->
    <ellipse cx="390" cy="183" rx="9" ry="7" fill="#FF4500" transform="rotate(-15, 390, 183)"/>
    <line x1="399" y1="180" x2="399" y2="152" stroke="#FF4500" stroke-width="2"/>
  </g>

  <!-- WARN events -->
  <g filter="url(#glow08)">
    <ellipse cx="110" cy="223" rx="8" ry="6" fill="#FF8C00" transform="rotate(-15, 110, 223)"/>
    <line x1="118" y1="220" x2="118" y2="194" stroke="#FF8C00" stroke-width="2"/>

    <ellipse cx="200" cy="223" rx="8" ry="6" fill="#FF8C00" transform="rotate(-15, 200, 223)"/>
    <line x1="208" y1="220" x2="208" y2="194" stroke="#FF8C00" stroke-width="2"/>

    <ellipse cx="290" cy="223" rx="8" ry="6" fill="#FF8C00" transform="rotate(-15, 290, 223)"/>
    <line x1="298" y1="220" x2="298" y2="194" stroke="#FF8C00" stroke-width="2"/>

    <ellipse cx="440" cy="223" rx="8" ry="6" fill="#FF8C00" transform="rotate(-15, 440, 223)"/>
    <line x1="448" y1="220" x2="448" y2="194" stroke="#FF8C00" stroke-width="2"/>
  </g>

  <!-- INFO events - many notes (quarter notes) -->
  <g filter="url(#glow08)">
    <ellipse cx="60" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 60, 263)"/>
    <line x1="68" y1="260" x2="68" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="100" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 100, 263)"/>
    <line x1="108" y1="260" x2="108" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="140" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 140, 263)"/>
    <line x1="148" y1="260" x2="148" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="180" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 180, 263)"/>
    <line x1="188" y1="260" x2="188" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="220" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 220, 263)"/>
    <line x1="228" y1="260" x2="228" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="260" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 260, 263)"/>
    <line x1="268" y1="260" x2="268" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="340" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 340, 263)"/>
    <line x1="348" y1="260" x2="348" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="380" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 380, 263)"/>
    <line x1="388" y1="260" x2="388" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="420" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 420, 263)"/>
    <line x1="428" y1="260" x2="428" y2="234" stroke="#1E90FF" stroke-width="2"/>

    <ellipse cx="460" cy="263" rx="8" ry="6" fill="#1E90FF" transform="rotate(-15, 460, 263)"/>
    <line x1="468" y1="260" x2="468" y2="234" stroke="#1E90FF" stroke-width="2"/>
  </g>

  <!-- AUDIT events -->
  <g filter="url(#glow08)">
    <ellipse cx="130" cy="303" rx="8" ry="6" fill="#9B59B6" transform="rotate(-15, 130, 303)"/>
    <line x1="138" y1="300" x2="138" y2="274" stroke="#9B59B6" stroke-width="2"/>

    <ellipse cx="240" cy="303" rx="8" ry="6" fill="#9B59B6" transform="rotate(-15, 240, 303)"/>
    <line x1="248" y1="300" x2="248" y2="274" stroke="#9B59B6" stroke-width="2"/>

    <ellipse cx="360" cy="303" rx="8" ry="6" fill="#9B59B6" transform="rotate(-15, 360, 303)"/>
    <line x1="368" y1="300" x2="368" y2="274" stroke="#9B59B6" stroke-width="2"/>

    <ellipse cx="460" cy="303" rx="8" ry="6" fill="#9B59B6" transform="rotate(-15, 460, 303)"/>
    <line x1="468" y1="300" x2="468" y2="274" stroke="#9B59B6" stroke-width="2"/>
  </g>

  <!-- Conductor's baton (conducting position) -->
  <!-- Arm/hand -->
  <line x1="185" y1="128" x2="215" y2="108" stroke="#DAA520" stroke-width="6" stroke-linecap="round" filter="url(#glow08)"/>
  <!-- Baton shaft -->
  <line x1="215" y1="108" x2="348" y2="88" stroke="url(#batonGrad08)" stroke-width="4" stroke-linecap="round" filter="url(#batonGlow08)"/>
  <!-- Baton tip (glowing orb) -->
  <circle cx="350" cy="87" r="8" fill="#FFD700" filter="url(#batonGlow08)"/>
  <circle cx="350" cy="87" r="4" fill="#FFFFFF"/>
  <!-- Baton handle -->
  <ellipse cx="210" cy="110" rx="10" ry="7" fill="#B8860B" stroke="#FFD700" stroke-width="1.5" filter="url(#glow08)"/>

  <!-- Baton arc / motion trail -->
  <path d="M210,110 Q290,70 350,87" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <path d="M210,115 Q285,140 330,160" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Musical dynamics markings -->
  <g font-family="serif" font-size="16" fill="#FFD700" filter="url(#glow08)" opacity="0.8" font-style="italic">
    <text x="58" y="372">p</text>
    <text x="140" y="372">mf</text>
    <text x="230" y="372">f</text>
    <text x="300" y="372">ff</text>
    <text x="370" y="372">fff</text>
    <text x="440" y="372">!</text>
  </g>

  <!-- Time signature on staff -->
  <g font-family="serif" font-size="32" fill="#FFD700" filter="url(#glow08)" opacity="0.7">
    <text x="34" y="272">4</text>
    <text x="34" y="308">4</text>
  </g>

  <!-- Treble clef style bracket -->
  <path d="M52,155 Q42,195 48,235 Q54,275 48,315 Q42,355 52,395" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>

  <!-- Title and labels -->
  <text x="256" y="52" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFD700" filter="url(#batonGlow08)">ORCHESTRAL CONDUCTOR</text>
  <text x="256" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#DAA520" opacity="0.8">EVENT FLOW ORCHESTRATION</text>

  <!-- Bottom description -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFD700" opacity="0.5">CONDUCTING THE EVENT SYMPHONY</text>

  <!-- Footer stats -->
  <g font-family="monospace" font-size="9" fill="#B8860B" opacity="0.6">
    <text x="60" y="445">ERR: ♩ ♩ ♩</text>
    <text x="175" y="445">WARN: ♩ ♩ ♩ ♩</text>
    <text x="300" y="445">INFO: ♩♩♩♩♩♩♩♩♩♩</text>
    <text x="440" y="445">AUD: ♩♩♩♩</text>
  </g>
</svg>
