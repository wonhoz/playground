<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 따뜻한 갈색-크림 -->
  <defs>
    <linearGradient id="bg_dg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#A1887F"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_dg04)"/>

  <!-- ===== 아래로 뻗는 뿌리 ===== -->
  <!-- 메인 뿌리 줄기 -->
  <path d="M512,570 L512,680" stroke="url(#trunkGrad)" stroke-width="40" stroke-linecap="round"/>

  <!-- 뿌리 1레벨 분기 -->
  <path d="M512,660 Q420,700 340,760" fill="none" stroke="#5D4037" stroke-width="28" stroke-linecap="round"/>
  <path d="M512,660 Q604,700 684,760" fill="none" stroke="#5D4037" stroke-width="28" stroke-linecap="round"/>

  <!-- 뿌리 2레벨 분기 -->
  <path d="M340,760 Q280,800 220,840" fill="none" stroke="#6D4C41" stroke-width="18" stroke-linecap="round"/>
  <path d="M340,760 Q360,810 380,860" fill="none" stroke="#6D4C41" stroke-width="16" stroke-linecap="round"/>
  <path d="M684,760 Q744,800 804,840" fill="none" stroke="#6D4C41" stroke-width="18" stroke-linecap="round"/>
  <path d="M684,760 Q664,810 644,860" fill="none" stroke="#6D4C41" stroke-width="16" stroke-linecap="round"/>

  <!-- 뿌리 3레벨 (얇게) -->
  <path d="M220,840 Q180,870 150,900" fill="none" stroke="#8D6E63" stroke-width="10" stroke-linecap="round"/>
  <path d="M220,840 Q200,878 190,910" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>
  <path d="M804,840 Q844,870 874,900" fill="none" stroke="#8D6E63" stroke-width="10" stroke-linecap="round"/>
  <path d="M804,840 Q824,878 834,910" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>
  <path d="M380,860 L360,920" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>
  <path d="M644,860 L664,920" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>

  <!-- ===== 위로 자라는 나무 (패키지) ===== -->
  <!-- 메인 줄기 -->
  <path d="M512,570 L512,360" stroke="url(#trunkGrad)" stroke-width="40" stroke-linecap="round"/>

  <!-- 가지들 -->
  <path d="M512,460 Q420,420 340,360" fill="none" stroke="#4E342E" stroke-width="28" stroke-linecap="round"/>
  <path d="M512,460 Q604,420 684,360" fill="none" stroke="#4E342E" stroke-width="28" stroke-linecap="round"/>
  <path d="M512,400 Q460,360 420,310" fill="none" stroke="#5D4037" stroke-width="20" stroke-linecap="round"/>
  <path d="M512,400 Q564,360 604,310" fill="none" stroke="#5D4037" stroke-width="20" stroke-linecap="round"/>

  <!-- 패키지 잎들 — 초록 원형 클러스터 -->
  <!-- 왼쪽 가지 끝 -->
  <circle cx="320" cy="350" r="64" fill="#2E7D32" opacity="0.9"/>
  <circle cx="350" cy="310" r="44" fill="#388E3C"/>
  <circle cx="290" cy="300" r="38" fill="#43A047"/>
  <circle cx="358" cy="360" r="30" fill="#66BB6A"/>

  <!-- 오른쪽 가지 끝 -->
  <circle cx="704" cy="350" r="64" fill="#2E7D32" opacity="0.9"/>
  <circle cx="674" cy="310" r="44" fill="#388E3C"/>
  <circle cx="734" cy="300" r="38" fill="#43A047"/>
  <circle cx="666" cy="360" r="30" fill="#66BB6A"/>

  <!-- 중앙 상단 잎들 -->
  <circle cx="420" cy="295" r="48" fill="#388E3C" opacity="0.85"/>
  <circle cx="604" cy="295" r="48" fill="#388E3C" opacity="0.85"/>
  <circle cx="512" cy="250" r="56" fill="#2E7D32"/>

  <!-- 패키지 레이블 (잎 위) -->
  <text x="320" y="358" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="white">NuGet</text>
  <text x="704" y="358" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="white">npm</text>
  <text x="512" y="258" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="white">pip</text>

  <!-- 지면선 -->
  <line x1="200" y1="570" x2="824" y2="570" stroke="#8D6E63" stroke-width="14" stroke-linecap="round" opacity="0.6"/>

  <!-- 중앙 줄기 루트 -->
  <circle cx="512" cy="570" r="36" fill="#3E2723" stroke="#8D6E63" stroke-width="10"/>

  <!-- 하단 타이틀 -->
  <text x="512" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="900" fill="#3E2723" opacity="0.8">Dep.Graph</text>
  <text x="512" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#5D4037" opacity="0.7">NuGet · npm · pip</text>
</svg>
