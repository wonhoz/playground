<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02jt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02jt)"/>

  <!-- 에디터 상단 바 -->
  <rect x="140" y="130" width="744" height="50" rx="10" fill="rgba(0,0,0,0.35)"/>
  <circle cx="188" cy="155" r="12" fill="#FF5F57"/>
  <circle cx="228" cy="155" r="12" fill="#FFBD2E"/>
  <circle cx="268" cy="155" r="12" fill="#27C840"/>

  <!-- Layer 2: JSON 코드 라인들 (코드 에디터 스타일) -->
  <!-- 줄 배경 -->
  <rect x="140" y="196" width="744" height="610" rx="0" fill="rgba(0,0,0,0.25)"/>

  <!-- 줄 1: { -->
  <text x="180" y="262" font-family="Consolas, 'Courier New', monospace"
        font-size="52" fill="#D4D4D4">{</text>

  <!-- 줄 2: "name": "Alice" -->
  <text x="220" y="336" font-family="Consolas, monospace" font-size="50">
    <tspan fill="#9CDCFE">"name"</tspan>
    <tspan fill="#D4D4D4">: </tspan>
    <tspan fill="#CE9178">"Alice"</tspan>
  </text>

  <!-- 줄 3: "age": 30 -->
  <text x="220" y="410" font-family="Consolas, monospace" font-size="50">
    <tspan fill="#9CDCFE">"age"</tspan>
    <tspan fill="#D4D4D4">: </tspan>
    <tspan fill="#B5CEA8">30</tspan>
  </text>

  <!-- 줄 4: "city": "Seoul" -->
  <text x="220" y="484" font-family="Consolas, monospace" font-size="50">
    <tspan fill="#9CDCFE">"city"</tspan>
    <tspan fill="#D4D4D4">: </tspan>
    <tspan fill="#CE9178">"Seoul"</tspan>
  </text>

  <!-- 줄 5: "score": true -->
  <text x="220" y="558" font-family="Consolas, monospace" font-size="50">
    <tspan fill="#9CDCFE">"ok"</tspan>
    <tspan fill="#D4D4D4">: </tspan>
    <tspan fill="#569CD6">true</tspan>
  </text>

  <!-- 줄 6: } -->
  <text x="180" y="632" font-family="Consolas, monospace" font-size="52"
        fill="#D4D4D4">}</text>

  <!-- Layer 3: 하단 스테이터스 -->
  <rect x="140" y="810" width="744" height="80" rx="12" fill="rgba(0,0,0,0.4)"/>
  <text x="230" y="862" font-family="Consolas, monospace" font-size="40" fill="#4EC9B0">
    {} JSON  ·  5 nodes
  </text>
</svg>
