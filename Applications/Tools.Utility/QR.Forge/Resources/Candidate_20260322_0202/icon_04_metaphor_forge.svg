<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1200"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="qrAnvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3000"/>
      <stop offset="100%" stop-color="#2A1A00"/>
    </linearGradient>
    <filter id="spark">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="140" fill="url(#bg4)"/>

  <!-- 불꽃 파티클 (배경) -->
  <circle cx="640" cy="200" r="8" fill="#FF6600" opacity="0.7" filter="url(#spark)"/>
  <circle cx="680" cy="150" r="5" fill="#FFAA00" opacity="0.6" filter="url(#spark)"/>
  <circle cx="720" cy="220" r="6" fill="#FF4400" opacity="0.5" filter="url(#spark)"/>
  <circle cx="760" cy="170" r="4" fill="#FFCC00" opacity="0.8" filter="url(#spark)"/>
  <circle cx="800" cy="240" r="7" fill="#FF8800" opacity="0.6" filter="url(#spark)"/>
