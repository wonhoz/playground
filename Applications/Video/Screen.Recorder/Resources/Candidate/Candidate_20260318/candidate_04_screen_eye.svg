<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 눈 모양 (스크린 + 눈) -->
  <path d="M 80 256 Q 256 120 432 256 Q 256 392 80 256 Z" fill="#EF4444" opacity="0.05"/>
  <path d="M 80 256 Q 256 120 432 256 Q 256 392 80 256 Z" fill="none" stroke="#EF4444" stroke-width="3" filter="url(#glow)"/>
  <!-- 동공 (녹화 버튼) -->
  <circle cx="256" cy="256" r="55" fill="#EF4444" opacity="0.12" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="36" fill="#EF4444" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="22" fill="#EF4444" opacity="0.95" filter="url(#glow)"/>
  <!-- 반사광 -->
  <circle cx="238" cy="240" r="7" fill="white" opacity="0.3"/>
  <!-- 커서 표시 -->
  <path d="M 356 166 L 356 196 L 370 182 Z" fill="#EF4444" opacity="0.6"/>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">SCREEN EYE</text>
</svg>
