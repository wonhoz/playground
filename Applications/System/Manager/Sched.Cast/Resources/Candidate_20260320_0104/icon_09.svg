<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- 큐 줄 - 작업들 대기 -->
  <!-- 작업 박스들 (오른쪽에서 왼쪽으로 크기 축소) -->
  <rect x="600" y="260" width="200" height="80" rx="14" fill="#01579B" stroke="#29B6F6" stroke-width="10"/>
  <rect x="600" y="380" width="200" height="80" rx="14" fill="#01579B" stroke="#29B6F6" stroke-width="10"/>
  <rect x="600" y="500" width="200" height="80" rx="14" fill="#01579B" stroke="#29B6F6" stroke-width="10"/>
  <rect x="600" y="620" width="200" height="80" rx="14" fill="#01579B" stroke="#29B6F6" stroke-width="10"/>
  <!-- 박스 내 줄 -->
  <line x1="620" y1="300" x2="780" y2="300" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <line x1="620" y1="420" x2="780" y2="420" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <line x1="620" y1="540" x2="780" y2="540" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <line x1="620" y1="660" x2="780" y2="660" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <!-- 화살표들 -->
  <line x1="560" y1="300" x2="610" y2="300" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="560" y1="420" x2="610" y2="420" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="560" y1="540" x2="610" y2="540" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="560" y1="660" x2="610" y2="660" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <!-- 화살표 머리 -->
  <polygon points="605,285 625,300 605,315" fill="#29B6F6"/>
  <polygon points="605,405 625,420 605,435" fill="#29B6F6"/>
  <polygon points="605,525 625,540 605,555" fill="#29B6F6"/>
  <polygon points="605,645 625,660 605,675" fill="#29B6F6"/>
  <!-- 실행 영역 -->
  <rect x="200" y="380" width="300" height="240" rx="24" fill="#29B6F6" stroke="#29B6F6" stroke-width="10"/>
  <!-- 실행 아이콘 (재생 버튼) -->
  <polygon points="290,430 290,570 430,500" fill="#000A10"/>
</svg>
