<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A0A00"/>
  <!-- Layer 2: 다방향 단어들 (TextOrientation.Mixed) -->
  <!-- 가로 방향 단어들 -->
  <text x="512" y="200" font-size="96" fill="#F59E0B" text-anchor="middle" font-weight="bold" font-family="Arial">design</text>
  <text x="200" y="440" font-size="72" fill="#FBBF24" text-anchor="middle" font-weight="bold" font-family="Arial">create</text>
  <text x="820" y="520" font-size="68" fill="#F59E0B" text-anchor="middle" font-weight="bold" font-family="Arial">build</text>
  <text x="512" y="780" font-size="88" fill="#FCD34D" text-anchor="middle" font-weight="bold" font-family="Arial">explore</text>
  <!-- 수직 방향 단어들 (rotate) -->
  <text transform="rotate(-90, 140, 512)" x="140" y="512" font-size="56" fill="#FDE68A" text-anchor="middle" font-family="Arial">visual</text>
  <text transform="rotate(90, 884, 512)" x="884" y="512" font-size="56" fill="#FDE68A" text-anchor="middle" font-family="Arial">color</text>
  <text transform="rotate(-90, 240, 300)" x="240" y="300" font-size="44" fill="#F59E0B" text-anchor="middle" font-family="Arial">idea</text>
  <text transform="rotate(90, 784, 700)" x="784" y="700" font-size="44" fill="#FBBF24" text-anchor="middle" font-family="Arial">word</text>
  <!-- 대각선 방향 단어들 -->
  <text transform="rotate(-30, 760, 240)" x="760" y="240" font-size="48" fill="#FCD34D" text-anchor="middle" font-family="Arial">trend</text>
  <text transform="rotate(30, 260, 750)" x="260" y="750" font-size="48" fill="#FBBF24" text-anchor="middle" font-family="Arial">data</text>
  <text transform="rotate(45, 820, 300)" x="820" y="300" font-size="40" fill="#FDE68A" text-anchor="middle" font-family="Arial">insight</text>
  <text transform="rotate(-45, 200, 720)" x="200" y="720" font-size="40" fill="#F59E0B" text-anchor="middle" font-family="Arial">story</text>
  <!-- 작은 단어들 (여러 방향) -->
  <text x="512" y="570" font-size="40" fill="#92400E" text-anchor="middle" font-family="Arial">theme · mask · export</text>
  <text x="512" y="930" font-size="36" fill="#78350F" text-anchor="middle" font-family="Arial">freq · count · min</text>
  <!-- Layer 3: 배경 패턴 점들 (방향 힌트) -->
  <circle cx="140" cy="440" r="8" fill="#F59E0B" opacity="0.4"/>
  <circle cx="884" cy="440" r="8" fill="#F59E0B" opacity="0.4"/>
  <circle cx="760" cy="200" r="6" fill="#FBBF24" opacity="0.4"/>
  <circle cx="260" cy="800" r="6" fill="#FBBF24" opacity="0.4"/>
  <circle cx="820" cy="260" r="5" fill="#FCD34D" opacity="0.4"/>
  <circle cx="200" cy="760" r="5" fill="#FCD34D" opacity="0.4"/>
</svg>
