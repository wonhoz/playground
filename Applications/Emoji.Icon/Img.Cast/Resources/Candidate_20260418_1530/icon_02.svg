<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: 드롭존 박스 -->
    <rect x="130" y="340" width="764" height="400" rx="32" fill="none" stroke="#43A047" stroke-width="12" stroke-dasharray="24,14"/>
    <rect x="130" y="340" width="764" height="400" rx="32" fill="#43A047" opacity="0.07"/>

    <!-- 드롭존 중앙 텍스트 -->
    <text x="512" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="100" text-anchor="middle">📂</text>
    <text x="512" y="636" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#2E7D32" text-anchor="middle">여기에 드롭</text>
    <text x="512" y="696" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#81C784" text-anchor="middle">SVG · PNG · JPG · ICO · WEBP</text>

    <!-- Layer 3: 내려오는 파일 아이콘들 -->
    <!-- SVG 파일 -->
    <rect x="174" y="140" width="148" height="170" rx="16" fill="#5C6BC0" transform="rotate(-12 248 225)"/>
    <text x="248" y="220" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle" transform="rotate(-12 248 220)">SVG</text>
    <line x1="248" y1="310" x2="248" y2="350" stroke="#5C6BC0" stroke-width="8" stroke-dasharray="10,6" stroke-linecap="round"/>

    <!-- PNG 파일 -->
    <rect x="416" y="110" width="148" height="170" rx="16" fill="#26A69A"/>
    <text x="490" y="210" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">PNG</text>
    <line x1="490" y1="285" x2="490" y2="350" stroke="#26A69A" stroke-width="8" stroke-dasharray="10,6" stroke-linecap="round"/>

    <!-- JPG 파일 -->
    <rect x="658" y="130" width="148" height="170" rx="16" fill="#EF6C00" transform="rotate(10 732 215)"/>
    <text x="732" y="220" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle" transform="rotate(10 732 220)">JPG</text>
    <line x1="732" y1="310" x2="732" y2="350" stroke="#EF6C00" stroke-width="8" stroke-dasharray="10,6" stroke-linecap="round"/>

    <!-- 타이틀 -->
    <rect x="230" y="820" width="564" height="80" rx="24" fill="#2E7D32"/>
    <text x="512" y="874" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
  </g>
</svg>
