<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: metaphor · 대각선/동적 · 방송 타워에서 이미지 포맷 "cast" -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E3F2FD"/>
      <stop offset="1" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- 캐스트 웨이브 (3개 호) -->
  <g fill="none" stroke-linecap="round">
    <path d="M 360 260 Q 512 180 664 260" stroke="#FF6B9D" stroke-width="32"/>
    <path d="M 300 340 Q 512 200 724 340" stroke="#FFD93D" stroke-width="32"/>
    <path d="M 240 420 Q 512 220 784 420" stroke="#06D6A0" stroke-width="32"/>
  </g>
