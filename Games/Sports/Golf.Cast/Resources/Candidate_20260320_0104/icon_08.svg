<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 별 퍼펙트 샷: 별 + 공 -->
  <!-- large star burst (background glow) -->
  <circle cx="512" cy="512" r="200" fill="#388E3C" opacity="0.12"/>
  <!-- 8-point star -->
  <polygon points="
    512,180 548,450 800,400 580,520
    820,620 548,574 600,840 512,620
    424,840 476,574 204,620 444,520
    224,400 476,450 512,180"
    fill="#388E3C" opacity="0.5"/>
  <!-- 4 bright rays -->
  <polygon points="512,200 532,490 512,820 492,490" fill="#81C784" opacity="0.25"/>
  <polygon points="200,512 490,492 820,512 490,532" fill="#81C784" opacity="0.25"/>
  <!-- golf ball center -->
  <circle cx="512" cy="512" r="110" fill="#81C784"/>
  <!-- dimple grid on ball -->
  <circle cx="480" cy="482" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="512" cy="474" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="544" cy="482" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="470" cy="510" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="502" cy="506" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="534" cy="506" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="480" cy="536" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="512" cy="540" r="10" fill="#388E3C" opacity="0.45"/>
  <circle cx="544" cy="536" r="10" fill="#388E3C" opacity="0.45"/>
  <!-- sparkles -->
  <circle cx="340" cy="310" r="12" fill="#81C784" opacity="0.8"/>
  <circle cx="684" cy="310" r="12" fill="#81C784" opacity="0.8"/>
  <circle cx="340" cy="714" r="12" fill="#81C784" opacity="0.8"/>
  <circle cx="684" cy="714" r="12" fill="#81C784" opacity="0.8"/>
</svg>
