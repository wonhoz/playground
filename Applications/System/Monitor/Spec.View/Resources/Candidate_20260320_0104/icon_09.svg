<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 반도체+뷰: semiconductor wafer being inspected -->
  <!-- Wafer circle -->
  <circle cx="512" cy="512" r="280" fill="#2E7D32" opacity="0.2"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="#2E7D32" stroke-width="16"/>
  <!-- Die grid on wafer -->
  <line x1="280" y1="380" x2="744" y2="380" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="430" x2="744" y2="430" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="480" x2="744" y2="480" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="530" x2="744" y2="530" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="580" x2="744" y2="580" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="630" x2="744" y2="630" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="380" y1="280" x2="380" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="430" y1="280" x2="430" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="480" y1="280" x2="480" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="530" y1="280" x2="530" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="580" y1="280" x2="580" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <line x1="630" y1="280" x2="630" y2="744" stroke="#2E7D32" stroke-width="3" opacity="0.6"/>
  <!-- Highlighted die (focused chip) -->
  <rect x="480" y="480" width="100" height="100" rx="6" fill="#81C784" opacity="0.5"/>
  <rect x="480" y="480" width="100" height="100" rx="6" fill="none" stroke="#81C784" stroke-width="6"/>
  <!-- Magnifier over focused die -->
  <circle cx="530" cy="530" r="80" fill="none" stroke="#81C784" stroke-width="12"/>
  <line x1="594" y1="594" x2="720" y2="720" stroke="#81C784" stroke-width="20" stroke-linecap="round"/>
  <!-- Crosshair on lens -->
  <line x1="450" y1="530" x2="610" y2="530" stroke="#81C784" stroke-width="4" stroke-dasharray="12 8" opacity="0.6"/>
  <line x1="530" y1="450" x2="530" y2="610" stroke="#81C784" stroke-width="4" stroke-dasharray="12 8" opacity="0.6"/>
</svg>