<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B4A"/>
      <stop offset="100%" stop-color="#060E2E"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FA8DA"/>
      <stop offset="100%" stop-color="#7986CB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <g stroke="#1A237E" stroke-width="1" opacity="0.4">
    <line x1="80" y1="100" x2="432" y2="100"/>
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="220" x2="432" y2="220"/>
    <line x1="80" y1="280" x2="432" y2="280"/>
    <line x1="80" y1="340" x2="432" y2="340"/>
    <line x1="80" y1="400" x2="432" y2="400"/>
    <line x1="80" y1="100" x2="80" y2="420"/>
    <line x1="140" y1="100" x2="140" y2="420"/>
    <line x1="200" y1="100" x2="200" y2="420"/>
    <line x1="260" y1="100" x2="260" y2="420"/>
    <line x1="320" y1="100" x2="320" y2="420"/>
    <line x1="380" y1="100" x2="380" y2="420"/>
    <line x1="432" y1="100" x2="432" y2="420"/>
  </g>
  <!-- Schema entities on blueprint -->
  <!-- Main table box -->
  <rect x="100" y="120" width="160" height="100" rx="6" fill="none" stroke="url(#light)" stroke-width="3"/>
  <line x1="100" y1="148" x2="260" y2="148" stroke="url(#light)" stroke-width="2"/>
  <rect x="110" y="128" width="80" height="10" rx="3" fill="url(#light)" opacity="0.8"/>
  <g fill="url(#light)" opacity="0.5">
    <rect x="110" y="158" width="60" height="8" rx="3"/>
    <rect x="110" y="174" width="74" height="8" rx="3"/>
    <rect x="110" y="190" width="50" height="8" rx="3"/>
  </g>
  <!-- Foreign key arrow -->
  <line x1="260" y1="170" x2="330" y2="170" stroke="url(#blue)" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="330,165 342,170 330,175" fill="url(#blue)"/>
  <!-- Related table -->
  <rect x="342" y="140" width="70" height="60" rx="6" fill="none" stroke="url(#blue)" stroke-width="2.5"/>
  <line x1="342" y1="158" x2="412" y2="158" stroke="url(#blue)" stroke-width="2"/>
  <rect x="350" y="146" width="46" height="8" rx="3" fill="url(#blue)" opacity="0.7"/>
  <g fill="url(#blue)" opacity="0.5">
    <rect x="350" y="168" width="40" height="6" rx="3"/>
    <rect x="350" y="180" width="34" height="6" rx="3"/>
  </g>
  <!-- Another entity -->
  <rect x="100" y="280" width="130" height="80" rx="6" fill="none" stroke="url(#light)" stroke-width="2.5"/>
  <line x1="100" y1="302" x2="230" y2="302" stroke="url(#light)" stroke-width="2"/>
  <rect x="110" y="288" width="68" height="8" rx="3" fill="url(#light)" opacity="0.7"/>
  <g fill="url(#light)" opacity="0.5">
    <rect x="110" y="312" width="54" height="7" rx="3"/>
    <rect x="110" y="326" width="66" height="7" rx="3"/>
    <rect x="110" y="340" width="44" height="7" rx="3"/>
  </g>
  <!-- Connection line -->
  <path d="M 180 220 L 180 280" stroke="url(#light)" stroke-width="2" stroke-dasharray="5,4" fill="none"/>
  <!-- Mock fill icon -->
  <circle cx="350" cy="340" r="60" fill="none" stroke="url(#blue)" stroke-width="4"/>
  <polygon points="335,318 335,362 375,340" fill="url(#blue)" opacity="0.8"/>
  <rect x="302" y="388" width="96" height="16" rx="6" fill="url(#blue)" opacity="0.4"/>
</svg>
