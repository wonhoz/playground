<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>
  <!-- PC / monitor shape -->
  <rect x="220" y="188" width="584" height="348" rx="24" fill="#2C3E50" stroke="#1A252F" stroke-width="16"/>
  <rect x="244" y="212" width="536" height="300" rx="12" fill="#1E1E1E"/>
  <!-- Screen content: system cleaning in progress -->
  <text x="512" y="318" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#06D6A0" text-anchor="middle">CLEANING</text>
  <!-- Progress bar on screen -->
  <rect x="280" y="342" width="464" height="28" rx="14" fill="#333" stroke="#555" stroke-width="6"/>
  <rect x="280" y="342" width="330" height="28" rx="14" fill="#06D6A0"/>
  <text x="512" y="414" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFD93D" text-anchor="middle">71%</text>
  <!-- Sparkle effects around monitor (after clean) -->
  <text x="158" y="258" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#FFD93D">✦</text>
  <text x="806" y="232" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#06D6A0">✦</text>
  <text x="168" y="486" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#E91E63">✦</text>
  <text x="820" y="476" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#3A86FF">✦</text>
  <!-- Monitor stand -->
  <rect x="476" y="536" width="72" height="54" rx="4" fill="#455A64" stroke="#1A252F" stroke-width="12"/>
  <rect x="408" y="582" width="208" height="24" rx="12" fill="#455A64" stroke="#1A252F" stroke-width="12"/>
  <!-- SYS CLEAN badge -->
  <rect x="172" y="748" width="680" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">SYS CLEAN</text>
</svg>
