  <rect x="234" y="250" width="44" height="10" rx="4" fill="#ffab40"/>
  <!-- Signal rings -->
  <path d="M170 130 Q198 100 256 95 Q314 100 342 130" stroke="#ff6d00" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M140 160 Q192 110 256 105 Q320 110 372 160" stroke="#ff6d00" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M110 195 Q184 120 256 115 Q328 120 402 195" stroke="#ff6d00" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Dot at top -->
