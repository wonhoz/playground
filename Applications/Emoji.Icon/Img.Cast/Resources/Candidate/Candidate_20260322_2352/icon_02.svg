<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E3A8A"/>
  <!-- Layer 2: Multi-size icon grid -->
  <!-- 256x256 (large) -->
  <rect x="140" y="160" width="320" height="320" rx="28" fill="#93C5FD" opacity="0.9"/>
  <rect x="155" y="175" width="290" height="290" rx="20" fill="#DBEAFE"/>
  <text x="300" y="335" font-family="Arial,sans-serif" font-size="22" fill="#1E3A8A" text-anchor="middle" opacity="0.7">256×256</text>
  <!-- 64x64 (medium-large) -->
  <rect x="490" y="160" width="200" height="200" rx="22" fill="#60A5FA" opacity="0.85"/>
  <rect x="502" y="172" width="176" height="176" rx="16" fill="#BFDBFE"/>
  <text x="590" y="267" font-family="Arial,sans-serif" font-size="17" fill="#1E3A8A" text-anchor="middle" opacity="0.7">64×64</text>
  <!-- 32x32 (medium) -->
  <rect x="714" y="160" width="148" height="148" rx="16" fill="#3B82F6" opacity="0.8"/>
  <rect x="724" y="170" width="128" height="128" rx="12" fill="#93C5FD"/>
  <text x="788" y="242" font-family="Arial,sans-serif" font-size="14" fill="#1E3A8A" text-anchor="middle" opacity="0.7">32×32</text>
  <!-- 16x16 (small) -->
  <rect x="814" y="322" width="100" height="100" rx="12" fill="#1D4ED8" opacity="0.8"/>
  <rect x="822" y="330" width="84" height="84" rx="9" fill="#60A5FA"/>
  <text x="864" y="376" font-family="Arial,sans-serif" font-size="12" fill="#DBEAFE" text-anchor="middle">16×16</text>
  <!-- 128x128 -->
  <rect x="490" y="380" width="240" height="240" rx="22" fill="#2563EB" opacity="0.85"/>
  <rect x="503" y="393" width="214" height="214" rx="16" fill="#93C5FD"/>
  <text x="610" y="508" font-family="Arial,sans-serif" font-size="18" fill="#1E3A8A" text-anchor="middle" opacity="0.7">128×128</text>
  <!-- Layer 3: "ICO" label -->
  <rect x="140" y="540" width="320" height="80" rx="18" fill="#1D4ED8"/>
  <text x="300" y="592" font-family="Arial,sans-serif" font-size="48" fill="white" text-anchor="middle" font-weight="900">ICO</text>
  <!-- Bottom label -->
  <text x="512" y="730" font-family="Consolas,monospace" font-size="22" fill="#93C5FD" text-anchor="middle" opacity="0.8">7 sizes packed</text>
</svg>