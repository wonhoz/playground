<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0A18"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <filter id="neon02">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- 그린 삼각형 (좌하단) -->
  <polygon points="200,750 390,390 580,750" fill="none" stroke="#00FF14" stroke-width="52" stroke-linejoin="round" filter="url(#neon02)"/>
  <polygon points="200,750 390,390 580,750" fill="none" stroke="#00FF14" stroke-width="26" stroke-linejoin="round"/>
  <!-- 퍼플 원 (우상단) -->
  <circle cx="700" cy="340" r="170" fill="none" stroke="#BF5FFF" stroke-width="52" filter="url(#neon02)"/>
  <circle cx="700" cy="340" r="170" fill="none" stroke="#BF5FFF" stroke-width="26"/>
  <!-- 오렌지 사각형 (중앙 우측) -->
  <rect x="570" y="580" width="240" height="220" rx="12" fill="none" stroke="#FF6B00" stroke-width="52" filter="url(#neon02)"/>
  <rect x="570" y="580" width="240" height="220" rx="12" fill="none" stroke="#FF6B00" stroke-width="26"/>
  <!-- 핑크 오각형 (좌상단) -->
  <polygon points="200,300 255,135 330,300 165,200 290,200" fill="none" stroke="#FF2D78" stroke-width="38" stroke-linejoin="round" filter="url(#neon02)"/>
  <polygon points="200,300 255,135 330,300 165,200 290,200" fill="none" stroke="#FF2D78" stroke-width="18" stroke-linejoin="round"/>
  <!-- 노랑 다이아몬드 -->
  <polygon points="512,200 600,330 512,460 424,330" fill="none" stroke="#FFE600" stroke-width="38" stroke-linejoin="round" filter="url(#neon02)"/>
  <polygon points="512,200 600,330 512,460 424,330" fill="none" stroke="#FFE600" stroke-width="18" stroke-linejoin="round"/>
</svg>