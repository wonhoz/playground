<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#0F172A"/>
  <!-- Layer 2: HTTP method badges (vertical stack) -->
  <!-- GET -->
  <rect x="230" y="210" width="560" height="120" rx="20" fill="#065F46"/>
  <text x="512" y="292" font-family="Consolas,monospace" font-size="70" fill="#10B981" text-anchor="middle" font-weight="900">GET</text>
  <!-- POST -->
  <rect x="230" y="360" width="560" height="120" rx="20" fill="#1E3A8A"/>
  <text x="512" y="442" font-family="Consolas,monospace" font-size="70" fill="#60A5FA" text-anchor="middle" font-weight="900">POST</text>
  <!-- DELETE -->
  <rect x="230" y="510" width="560" height="120" rx="20" fill="#7F1D1D"/>
  <text x="512" y="592" font-family="Consolas,monospace" font-size="60" fill="#FCA5A5" text-anchor="middle" font-weight="900">DELETE</text>
  <!-- Layer 3: Method count and PUT hint at bottom -->
  <rect x="230" y="656" width="250" height="72" rx="20" fill="#292524"/>
  <text x="355" y="700" font-family="Consolas,monospace" font-size="48" fill="#D97706" text-anchor="middle" font-weight="800">PUT</text>
  <rect x="510" y="656" width="280" height="72" rx="20" fill="#1C1917"/>
  <text x="650" y="700" font-family="Consolas,monospace" font-size="44" fill="#6B7280" text-anchor="middle" font-weight="700">PATCH</text>
</svg>