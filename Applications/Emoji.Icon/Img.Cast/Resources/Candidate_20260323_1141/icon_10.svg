<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#006064"/>
  <!-- Layer 2: Large image frame -->
  <rect x="160" y="220" width="700" height="480" rx="16" fill="#00838F"/>
  <!-- Inner small frame -->
  <rect x="300" y="340" width="380" height="260" rx="12" fill="#00ACC1"/>
  <!-- Corner handles -->
  <circle cx="160" cy="220" r="28" fill="#FFD700"/>
  <circle cx="860" cy="220" r="28" fill="#FFD700"/>
  <circle cx="160" cy="700" r="28" fill="#FFD700"/>
  <circle cx="860" cy="700" r="28" fill="#FFD700"/>
  <!-- Layer 3: Size label -->
  <rect x="300" y="780" width="424" height="68" rx="34" fill="#FFD700"/>
  <text x="512" y="826" font-family="Arial" font-size="38" font-weight="bold" fill="#006064" text-anchor="middle">256 × 256 px</text>
</svg>