<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021A0A"/>
      <stop offset="100%" stop-color="#043A16"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Waveform bars -->
  <g fill="url(#wave)">
    <rect x="100" y="226" width="12" height="60" rx="6"/>
    <rect x="118" y="210" width="12" height="92" rx="6"/>
    <rect x="136" y="195" width="12" height="122" rx="6"/>
    <rect x="154" y="180" width="12" height="152" rx="6"/>
    <rect x="172" y="200" width="12" height="112" rx="6"/>
    <rect x="190" y="215" width="12" height="82" rx="6"/>
    <rect x="208" y="188" width="12" height="136" rx="6"/>
    <rect x="226" y="172" width="12" height="168" rx="6"/>
    <rect x="244" y="195" width="12" height="122" rx="6"/>
    <rect x="262" y="215" width="12" height="82" rx="6"/>
    <rect x="280" y="185" width="12" height="142" rx="6"/>
    <rect x="298" y="168" width="12" height="176" rx="6"/>
    <rect x="316" y="192" width="12" height="128" rx="6"/>
    <rect x="334" y="210" width="12" height="92" rx="6"/>
    <rect x="352" y="198" width="12" height="116" rx="6"/>
    <rect x="370" y="222" width="12" height="68" rx="6"/>
