<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Commute.Buddy - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #ffffff; }
    p.desc { text-align: center; color: #888888; margin-bottom: 28px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
    .item img { width: 160px; height: 160px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #aaaaaa; text-align: center; word-break: break-all; }
    .item .num { font-size: 0.85rem; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Commute.Buddy — 아이콘 후보 10종</h1>
  <p class="desc">통근 경로·시간 추적 도우미</p>
  <div class="grid">
    <div class="item">
      <img src="candidate_01_subway_route.svg" alt="01"/>
      <span class="num">01</span>
      <span>Subway Route</span>
    </div>
    <div class="item">
      <img src="candidate_02_bus_green.svg" alt="02"/>
      <span class="num">02</span>
      <span>Bus Green</span>
    </div>
    <div class="item">
      <img src="candidate_03_clock_path.svg" alt="03"/>
      <span class="num">03</span>
      <span>Clock Path</span>
    </div>
    <div class="item">
      <img src="candidate_04_orange_car.svg" alt="04"/>
      <span class="num">04</span>
      <span>Orange Car</span>
    </div>
    <div class="item">
      <img src="candidate_05_night_commute.svg" alt="05"/>
      <span class="num">05</span>
      <span>Night Commute</span>
    </div>
    <div class="item">
      <img src="candidate_06_train_purple.svg" alt="06"/>
      <span class="num">06</span>
      <span>Train Purple</span>
    </div>
    <div class="item">
      <img src="candidate_07_heatmap_route.svg" alt="07"/>
      <span class="num">07</span>
      <span>Heatmap Route</span>
    </div>
    <div class="item">
      <img src="candidate_08_bicycle_teal.svg" alt="08"/>
      <span class="num">08</span>
      <span>Bicycle Teal</span>
    </div>
    <div class="item">
      <img src="candidate_09_stats_chart.svg" alt="09"/>
      <span class="num">09</span>
      <span>Stats Chart</span>
    </div>
    <div class="item">
      <img src="candidate_10_minimal_pin.svg" alt="10"/>
      <span class="num">10</span>
      <span>Minimal Pin</span>
    </div>
  </div>
</body>
</html>
