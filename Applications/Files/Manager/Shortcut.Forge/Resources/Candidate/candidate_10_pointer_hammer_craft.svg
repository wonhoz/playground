<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a001a"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="pointer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8ff"/>
      <stop offset="100%" stop-color="#90a4ae"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <radialGradient id="magic" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b1fa2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- magic aura -->
  <circle cx="256" cy="280" r="140" fill="url(#magic)" filter="url(#glow)"/>
  <!-- cursor pointer -->
  <path d="M130 160 L130 340 L178 294 L220 378 L250 363 L208 279 L276 279 Z" fill="url(#pointer)"/>
  <path d="M130 160 L130 340 L178 294 L220 378 L250 363 L208 279 L276 279 Z" fill="none" stroke="#7b1fa2" stroke-width="5"/>
  <!-- hammer striking -->
  <rect x="290" y="120" width="85" height="52" rx="12" fill="url(#hammer)" transform="rotate(-45 332 146)"/>
  <rect x="348" y="168" width="16" height="120" rx="6" fill="url(#handle)" transform="rotate(-45 356 228)"/>
  <ellipse cx="305" cy="130" rx="20" ry="7" fill="white" opacity="0.3" transform="rotate(-45 305 130)"/>
  <!-- impact sparks -->
  <circle cx="270" cy="282" r="8" fill="#ce93d8" filter="url(#glow)"/>
  <line x1="262" y1="274" x2="250" y2="262" stroke="#e1bee7" stroke-width="3"/>
  <line x1="278" y1="274" x2="290" y2="262" stroke="#ce93d8" stroke-width="3"/>
  <line x1="270" y1="272" x2="270" y2="258" stroke="white" stroke-width="2"/>
  <line x1="262" y1="285" x2="250" y2="292" stroke="#b39ddb" stroke-width="2"/>
  <line x1="278" y1="285" x2="290" y2="292" stroke="#ce93d8" stroke-width="2"/>
</svg>
