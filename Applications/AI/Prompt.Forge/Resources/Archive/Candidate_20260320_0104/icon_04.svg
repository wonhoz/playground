<!-- Prompt.Forge icon_04: 십자선 정밀 (crosshair: precision targeting) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#150A20"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#7B1FA2" stroke-width="32"/>
  <!-- Inner ring -->
  <circle cx="512" cy="512" r="150" fill="none" stroke="#9C27B0" stroke-width="28"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="40" fill="#BA68C8"/>
  <!-- Crosshair lines (with gap at center) -->
  <line x1="160" y1="512" x2="340" y2="512" stroke="#BA68C8" stroke-width="28" stroke-linecap="round"/>
  <line x1="684" y1="512" x2="864" y2="512" stroke="#BA68C8" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="160" x2="512" y2="340" stroke="#BA68C8" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="684" x2="512" y2="864" stroke="#BA68C8" stroke-width="28" stroke-linecap="round"/>
  <!-- Corner tick marks -->
  <line x1="280" y1="280" x2="320" y2="280" stroke="#7B1FA2" stroke-width="20" stroke-linecap="round"/>
  <line x1="280" y1="280" x2="280" y2="320" stroke="#7B1FA2" stroke-width="20" stroke-linecap="round"/>
  <line x1="744" y1="280" x2="704" y2="280" stroke="#7B1FA2" stroke-width="20" stroke-linecap="round"/>
  <line x1="744" y1="280" x2="744" y2="320" stroke="#7B1FA2" stroke-width="20" stroke-linecap="round"/>
</svg>
