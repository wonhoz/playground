<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002219"/>
      <stop offset="100%" stop-color="#00140F"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1DE9B6"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circular recurring arrows -->
  <path d="M 256 100 A 160 160 0 1 1 116 256" fill="none" stroke="url(#mint)" stroke-width="24" stroke-linecap="round"/>
  <!-- Arrow head 1 (top) -->
  <polygon points="256,80 232,120 280,120" fill="url(#mint)"/>
  <!-- Arrow head 2 (left) -->
  <polygon points="96,256 136,232 136,280" fill="url(#mint)" opacity="0.7"/>
  <!-- Clock center -->
  <circle cx="256" cy="260" r="70" fill="#002219" stroke="url(#arrow)" stroke-width="8"/>
  <line x1="256" y1="260" x2="256" y2="214" stroke="url(#arrow)" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="290" y2="278" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="260" r="8" fill="url(#mint)"/>
  <!-- Schedule list -->
  <g fill="url(#mint)" opacity="0.5">
    <rect x="344" y="160" width="100" height="10" rx="4"/>
    <rect x="344" y="184" width="76" height="10" rx="4"/>
    <rect x="344" y="208" width="90" height="10" rx="4"/>
    <rect x="344" y="232" width="60" height="10" rx="4"/>
  </g>
  <!-- List dots -->
  <g fill="url(#arrow)" opacity="0.7">
    <circle cx="336" cy="165" r="5"/>
    <circle cx="336" cy="189" r="5"/>
    <circle cx="336" cy="213" r="5"/>
    <circle cx="336" cy="237" r="5"/>
  </g>
</svg>
