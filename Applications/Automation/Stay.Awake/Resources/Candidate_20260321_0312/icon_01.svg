<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 크림 아이보리 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#FFF8EC"/>

  <!-- Layer 2: 받침 접시 (레이어드 구조의 바닥) -->
  <ellipse cx="512" cy="760" rx="280" ry="44" fill="#D4956A"/>
  <ellipse cx="512" cy="748" rx="260" ry="36" fill="#E8B08A"/>

  <!-- 컵 몸통 (윗부분 약간 좁은 사다리꼴) -->
  <path d="M 300,380 L 330,750 L 694,750 L 724,380 Z" fill="#C4733A"/>
  <!-- 컵 내부 상단 타원 (커피 표면) -->
  <ellipse cx="512" cy="380" rx="212" ry="56" fill="#6B3A1F"/>
  <!-- 커피 표면 반사 하이라이트 -->
  <ellipse cx="460" cy="370" rx="80" ry="22" fill="#8B5030" opacity="0.6"/>
  <!-- 컵 외곽 테두리 -->
  <path d="M 300,380 L 330,750 L 694,750 L 724,380 Z" fill="none" stroke="#A85C2A" stroke-width="12"/>
  <!-- 컵 상단 테두리 링 -->
  <ellipse cx="512" cy="380" rx="212" ry="56" fill="none" stroke="#A85C2A" stroke-width="12"/>

  <!-- 컵 손잡이 -->
  <path d="M 720,420 Q 870,420 870,540 Q 870,660 720,660" fill="none" stroke="#C4733A" stroke-width="50" stroke-linecap="round"/>
  <path d="M 720,420 Q 850,420 850,540 Q 850,640 720,640" fill="none" stroke="#E8B08A" stroke-width="18" stroke-linecap="round"/>

  <!-- 컵 줄무늬 장식 (레이어드 디테일) -->
  <path d="M 316,520 L 330,680" stroke="#B5662E" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 694,520 L 680,680" stroke="#B5662E" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Layer 3: 스팀 (비비드 오렌지 곡선 3줄) -->
  <path d="M 430,330 Q 400,270 430,210 Q 460,150 430,90"
        fill="none" stroke="#FF6B00" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <path d="M 512,310 Q 542,250 512,190 Q 482,130 512,70"
        fill="none" stroke="#FF8C00" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <path d="M 594,330 Q 624,270 594,210 Q 564,150 594,90"
        fill="none" stroke="#FF6B00" stroke-width="22" stroke-linecap="round" opacity="0.9"/>

  <!-- 스팀 글로우 (부드럽게) -->
  <path d="M 512,310 Q 542,250 512,190 Q 482,130 512,70"
        fill="none" stroke="#FFB04A" stroke-width="40" stroke-linecap="round" opacity="0.2"/>
</svg>
