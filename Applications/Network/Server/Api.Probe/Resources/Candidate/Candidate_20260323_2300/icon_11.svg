<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C0519"/>
      <stop offset="100%" stop-color="#280010"/>
    </linearGradient>
    <clipPath id="clip11"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg11)"/>
  <g clip-path="url(#clip11)">
    <!-- Layer 2: 텍스트 에디터 창 -->
    <rect x="180" y="240" width="664" height="560" rx="24" fill="#6B0226" stroke="#F9A8D4" stroke-width="7"/>
    <!-- 창 타이틀 바 -->
    <rect x="180" y="240" width="664" height="58" rx="24" fill="#881337"/>
    <rect x="180" y="266" width="664" height="32" fill="#881337"/>
    <text x="512" y="270" font-family="'Segoe UI', sans-serif" font-size="26" fill="#FCE7F3" text-anchor="middle" dominant-baseline="middle">Environment Variables</text>
    <!-- 줄 번호 컬럼 -->
    <rect x="180" y="298" width="60" height="502" fill="#590220"/>
    <text x="210" y="350" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">1</text>
    <text x="210" y="416" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">2</text>
    <text x="210" y="482" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="210" y="548" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">4</text>
    <text x="210" y="614" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">5</text>
    <text x="210" y="680" font-family="'Courier New', monospace" font-size="26" fill="#9F1239" text-anchor="middle" dominant-baseline="middle">6</text>
    <!-- 변수 텍스트 라인들 -->
    <text x="260" y="350" font-family="'Courier New', monospace" font-size="34" fill="#F9A8D4" dominant-baseline="middle">{{BASE_URL}}</text>
    <text x="260" y="416" font-family="'Courier New', monospace" font-size="34" fill="#FDE68A" dominant-baseline="middle">{{API_KEY}}</text>
    <text x="260" y="482" font-family="'Courier New', monospace" font-size="34" fill="#F9A8D4" dominant-baseline="middle">{{TOKEN}}</text>
    <text x="260" y="548" font-family="'Courier New', monospace" font-size="34" fill="#FDE68A" dominant-baseline="middle">{{HOST}}</text>
    <text x="260" y="614" font-family="'Courier New', monospace" font-size="34" fill="#F9A8D4" dominant-baseline="middle">{{VERSION}}</text>
    <!-- 커서 깜빡이 라인 -->
    <text x="260" y="680" font-family="'Courier New', monospace" font-size="34" fill="#F9A8D4" dominant-baseline="middle">{{ENV}}</text>
    <rect x="488" y="662" width="4" height="36" fill="#FFFFFF"/>
    <!-- Layer 3: 하이라이트 효과 (선택된 줄) -->
    <rect x="240" y="396" width="590" height="52" rx="6" fill="#FFFFFF" opacity="0.07"/>
  </g>
</svg>
