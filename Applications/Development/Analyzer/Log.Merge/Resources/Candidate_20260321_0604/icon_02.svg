    <linearGradient id="lm-bg-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2535"/>
      <stop offset="100%" stop-color="#252D40"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
