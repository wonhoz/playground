<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141420"/>
    </linearGradient>
    <filter id="neon"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Maze walls (dark grey) -->
  <rect x="70" y="70" width="372" height="372" rx="12" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Inner maze structure -->
  <line x1="70" y1="194" x2="194" y2="194" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="194" y1="70" x2="194" y2="194" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="194" y1="318" x2="318" y2="318" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="318" y1="194" x2="318" y2="318" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="318" y1="194" x2="442" y2="194" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="194" y1="318" x2="194" y2="442" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <!-- Colorful solution paths through maze -->
  <path d="M85,132 L160,132 L160,70" stroke="#ef4444" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#neon)" opacity="0.9"/>
  <path d="M256,85 L256,160 L380,160 L380,85" stroke="#22c55e" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#neon)" opacity="0.9"/>
  <path d="M85,380 L160,380 L160,256 L256,256 L256,380 L380,380 L380,256 L442,256" stroke="#3b82f6" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#neon)" opacity="0.9"/>
  <path d="M256,442 L256,380" stroke="#f59e0b" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#neon)" opacity="0.9"/>
  <!-- Entry/exit dots -->
  <circle cx="85" cy="132" r="12" fill="#ef4444" filter="url(#neon)"/>
  <circle cx="160" cy="70" r="12" fill="#ef4444" filter="url(#neon)"/>
  <circle cx="256" cy="85" r="12" fill="#22c55e" filter="url(#neon)"/>
  <circle cx="380" cy="85" r="12" fill="#22c55e" filter="url(#neon)"/>
  <circle cx="85" cy="380" r="12" fill="#3b82f6" filter="url(#neon)"/>
  <circle cx="442" cy="256" r="12" fill="#3b82f6" filter="url(#neon)"/>
  <circle cx="256" cy="442" r="12" fill="#f59e0b" filter="url(#neon)"/>
</svg>
