<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | DEC/HEX/OCT/BIN 4줄 변환 결과 표 | 레이어드 | 라임 배경 + 컬러풀 줄 -->
  <defs>
    <linearGradient id="bgLime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8E063"/>
      <stop offset="100%" stop-color="#56AB2F"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 라임 그린 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgLime)"/>

  <!-- Layer 2: 카드 메인 패널 -->
  <rect x="100" y="148" width="824" height="728" rx="28" fill="white" opacity="0.95"/>

  <!-- 패널 상단 헤더 -->
  <rect x="100" y="148" width="824" height="80" rx="28" fill="#2E7D32"/>
  <rect x="100" y="196" width="824" height="32" fill="#2E7D32"/>
  <text x="512" y="190" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="46" font-weight="bold" fill="white" letter-spacing="4">Quick.Calc</text>

  <!-- Layer 3: 4줄 진법 변환 결과 -->

  <!-- DEC 줄 -->
  <rect x="120" y="260" width="784" height="108" rx="14" fill="#E3F2FD"/>
  <text x="160" y="315" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#1565C0">DEC</text>
  <text x="860" y="315" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="56" font-weight="bold" fill="#1A237E">255</text>

  <!-- HEX 줄 -->
  <rect x="120" y="390" width="784" height="108" rx="14" fill="#FFF3E0"/>
  <text x="160" y="445" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#E65100">HEX</text>
  <text x="860" y="445" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="56" font-weight="bold" fill="#BF360C">0xFF</text>

  <!-- OCT 줄 -->
  <rect x="120" y="520" width="784" height="108" rx="14" fill="#F3E5F5"/>
  <text x="160" y="575" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#6A1B9A">OCT</text>
  <text x="860" y="575" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="56" font-weight="bold" fill="#4A148C">0377</text>

  <!-- BIN 줄 -->
  <rect x="120" y="650" width="784" height="108" rx="14" fill="#E8F5E9"/>
  <text x="160" y="705" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#2E7D32">BIN</text>
  <text x="860" y="705" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#1B5E20">1111 1111</text>

  <!-- 좌측 컬러 바 강조 -->
  <rect x="120" y="260" width="8" height="108" rx="4" fill="#1565C0"/>
  <rect x="120" y="390" width="8" height="108" rx="4" fill="#E65100"/>
  <rect x="120" y="520" width="8" height="108" rx="4" fill="#6A1B9A"/>
  <rect x="120" y="650" width="8" height="108" rx="4" fill="#2E7D32"/>

  <!-- 하단 워드 사이즈 힌트 -->
  <text x="512" y="828" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="32" fill="#388E3C" opacity="0.8">8 · 16 · 32 · 64 bit</text>
</svg>
