  <circle cx="400" cy="380" r="180" fill="none" stroke="#2E7D32" stroke-width="60"/>
  <circle cx="400" cy="380" r="90" fill="#2E7D32"/>
  <!-- Key shaft -->
  <rect x="520" y="356" width="280" height="48" rx="12" fill="#4CAF50"/>
  <!-- Key teeth -->
  <rect x="640" y="404" width="40" height="60" rx="8" fill="#4CAF50"/>
  <rect x="720" y="404" width="36" height="44" rx="8" fill="#4CAF50"/>
  <rect x="764" y="404" width="36" height="54" rx="8" fill="#4CAF50"/>
  <!-- Inner ring -->
  <circle cx="400" cy="380" r="50" fill="#050A00"/>
  <circle cx="400" cy="380" r="30" fill="#4CAF50"/>
</svg>