<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <linearGradient id="snake1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="snake2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="snake3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid cells as squares -->
  <rect x="70" y="70" width="372" height="372" rx="10" fill="#ffffff05" stroke="#ffffff10" stroke-width="1"/>
  <!-- Snake body segments - red snake -->
  <rect x="80" y="80" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.9" filter="url(#glow)"/>
  <rect x="144" y="80" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.75"/>
  <rect x="208" y="80" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.6"/>
  <rect x="208" y="144" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.5"/>
  <rect x="272" y="144" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.4"/>
  <rect x="336" y="144" width="56" height="56" rx="8" fill="url(#snake1)" opacity="0.9" filter="url(#glow)"/>
  <!-- Snake body segments - green snake -->
  <rect x="80" y="208" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.9" filter="url(#glow)"/>
  <rect x="80" y="272" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.75"/>
  <rect x="80" y="336" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.6"/>
  <rect x="144" y="336" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.5"/>
  <rect x="208" y="336" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.4"/>
  <rect x="272" y="336" width="56" height="56" rx="8" fill="url(#snake2)" opacity="0.9" filter="url(#glow)"/>
  <!-- Snake body segments - blue snake -->
  <rect x="336" y="208" width="56" height="56" rx="8" fill="url(#snake3)" opacity="0.9" filter="url(#glow)"/>
  <rect x="336" y="272" width="56" height="56" rx="8" fill="url(#snake3)" opacity="0.75"/>
  <rect x="272" y="272" width="56" height="56" rx="8" fill="url(#snake3)" opacity="0.6"/>
  <rect x="272" y="208" width="56" height="56" rx="8" fill="url(#snake3)" opacity="0.5"/>
  <!-- Head circles (eyes) -->
  <circle cx="108" cy="108" r="8" fill="#ffffff80"/>
  <circle cx="364" cy="172" r="8" fill="#ffffff80"/>
  <circle cx="300" cy="364" r="8" fill="#ffffff80"/>
</svg>
