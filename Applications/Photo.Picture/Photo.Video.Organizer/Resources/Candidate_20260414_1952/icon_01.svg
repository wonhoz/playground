  <!-- 06 폴더 -->
  <rect x="526" y="296" width="360" height="60" rx="12" fill="#FFECB3" opacity="0.9"/>
  <text x="574" y="337" font-family="Segoe UI, sans-serif" font-size="40" fill="#BF360C">📁 06</text>
  <!-- 07 폴더 -->
