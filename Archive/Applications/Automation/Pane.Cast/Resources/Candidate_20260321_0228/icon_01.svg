<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark indigo -->
  <rect width="1024" height="1024" rx="200" fill="#0C0C22"/>
  <!-- Pane grid: 2x2 split layout with thick separators -->
  <!-- Outer rounded frame -->
  <rect x="160" y="200" width="704" height="624" rx="28" fill="#141430" stroke="#1E1E50" stroke-width="10"/>
  <!-- Vertical divider -->
  <rect x="494" y="200" width="20" height="624" fill="#00BCD4"/>
  <!-- Horizontal divider (only right half) -->
  <rect x="514" y="490" width="350" height="18" fill="#00BCD4"/>
  <!-- Top-left pane accent line (active) -->
  <rect x="180" y="218" width="290" height="14" rx="4" fill="#00E5FF" opacity="0.7"/>
  <!-- Bottom-right pane accent line -->
  <rect x="534" y="528" width="308" height="12" rx="4" fill="#FFFFFF" opacity="0.35"/>
  <!-- Top-right title bar line -->
  <rect x="534" y="218" width="308" height="14" rx="4" fill="#80DEEA" opacity="0.5"/>
  <!-- Top-left large bright indicator bar (main pane) -->
  <rect x="180" y="252" width="160" height="62" rx="8" fill="#00BCD4" opacity="0.9"/>
  <!-- Small row bars in top-left -->
  <rect x="180" y="334" width="200" height="16" rx="4" fill="#4DD0E1" opacity="0.5"/>
  <rect x="180" y="364" width="140" height="16" rx="4" fill="#4DD0E1" opacity="0.3"/>
</svg>
