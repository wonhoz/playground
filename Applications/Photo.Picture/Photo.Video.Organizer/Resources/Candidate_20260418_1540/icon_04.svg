    <rect x="716" y="192" width="68" height="218" rx="8" fill="#AD1457"/>
    <rect x="796" y="200" width="72" height="210" rx="8" fill="#E65100"/>
    <rect x="880" y="205" width="60" height="205" rx="8" fill="#1A237E"/>

