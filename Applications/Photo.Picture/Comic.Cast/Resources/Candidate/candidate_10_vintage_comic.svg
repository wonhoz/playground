<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vintage paper texture -->
  <rect x="55" y="55" width="402" height="402" rx="12" fill="url(#paper)" stroke="#BF360C" stroke-width="6"/>
  <!-- Torn edge effect -->
  <path d="M55,200 L75,195 L60,210 L80,205 L65,220 L85,215 L70,230 L55,230 Z" fill="#FFE082"/>
  <path d="M55,320 L75,315 L60,330 L80,325 L65,340 L85,335 L70,350 L55,350 Z" fill="#FFE082"/>
  <!-- Comic title banner -->
  <rect x="55" y="55" width="402" height="64" rx="12" fill="#BF360C" stroke="#BF360C"/>
  <text x="256" y="98" text-anchor="middle" font-family="Impact, Arial Black" font-size="32" fill="white" letter-spacing="3">COMIC CAST</text>
  <!-- Panel divider -->
  <line x1="256" y1="119" x2="256" y2="457" stroke="#BF360C" stroke-width="4"/>
  <line x1="55" y1="290" x2="457" y2="290" stroke="#BF360C" stroke-width="4"/>
  <!-- Panel 1: Photo icon -->
  <rect x="75" y="130" width="160" height="140" rx="4" fill="#E3F2FD"/>
  <circle cx="155" cy="178" r="35" fill="#FF9800"/>
  <circle cx="155" cy="178" r="24" fill="#FFD54F"/>
  <path d="M105,240 Q155,215 205,240 L205,270 H105 Z" fill="#4CAF50"/>
  <!-- Panel 2: Arrow transform -->
  <text x="346" y="215" text-anchor="middle" font-size="64" fill="#BF360C">⟹</text>
  <!-- Panel 3: Cartoon output -->
  <rect x="75" y="302" width="160" height="140" rx="4" fill="#FFF9C4"/>
  <circle cx="155" cy="348" r="32" fill="#FFCC80" stroke="#BF360C" stroke-width="3"/>
  <circle cx="143" cy="342" r="5" fill="#BF360C"/>
  <circle cx="167" cy="342" r="5" fill="#BF360C"/>
  <path d="M142,360 Q155,372 168,360" stroke="#BF360C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Panel 4: caption -->
  <rect x="276" y="302" width="160" height="140" rx="4" fill="#F3E5F5"/>
  <ellipse cx="356" cy="360" rx="62" ry="38" fill="white" stroke="#BF360C" stroke-width="3"/>
  <text x="356" y="356" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#BF360C">INSTANT</text>
  <text x="356" y="373" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#BF360C">TOON!</text>
  <polygon points="324,390 300,415 348,398" fill="white" stroke="#BF360C" stroke-width="3"/>
</svg>
