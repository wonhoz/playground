<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="node1" cx="40%" cy="40%" r="60%"><stop offset="0%" style="stop-color:#34d399"/><stop offset="100%" style="stop-color:#059669"/></radialGradient>
    <radialGradient id="node2" cx="40%" cy="40%" r="60%"><stop offset="0%" style="stop-color:#60a5fa"/><stop offset="100%" style="stop-color:#1d4ed8"/></radialGradient>
    <radialGradient id="node3" cx="40%" cy="40%" r="60%"><stop offset="0%" style="stop-color:#f472b6"/><stop offset="100%" style="stop-color:#be185d"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multiple orbital paths -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#34d39930" stroke-width="2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#60a5fa30" stroke-width="2"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#f472b630" stroke-width="2"/>
  <!-- Central body -->
  <circle cx="256" cy="256" r="32" fill="url(#node1)" filter="url(#glow)"/>
  <circle cx="248" cy="248" r="10" fill="#ffffff40"/>
  <!-- First orbit craft -->
  <circle cx="316" cy="256" r="14" fill="url(#node2)" filter="url(#glow)"/>
  <!-- Second orbit craft -->
  <circle cx="256" cy="366" r="12" fill="url(#node3)" filter="url(#glow)"/>
  <!-- Third orbit craft (multiple) -->
  <circle cx="426" cy="256" r="10" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="190" cy="108" r="10" fill="#e2e8f0" filter="url(#glow)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="90" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="70" cy="430" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="450" cy="410" r="1" fill="#fff" opacity="0.5"/>
  <!-- Connecting gravity lines -->
  <line x1="256" y1="256" x2="316" y2="256" stroke="#34d39930" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="256" y1="256" x2="256" y2="366" stroke="#60a5fa30" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="256" y1="256" x2="426" y2="256" stroke="#f472b630" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
