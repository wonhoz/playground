<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Text lines in background -->
  <rect x="60" y="80" width="390" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <rect x="60" y="108" width="340" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <rect x="60" y="136" width="370" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <rect x="60" y="164" width="310" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <rect x="60" y="192" width="360" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <!-- Highlighted diff rows -->
  <rect x="60" y="218" width="390" height="26" rx="6" fill="#7F1D1D" opacity="0.7"/>
  <rect x="68" y="224" width="250" height="12" rx="6" fill="#FCA5A5"/>
  <rect x="60" y="252" width="390" height="26" rx="6" fill="#14532D" opacity="0.7"/>
  <rect x="68" y="258" width="280" height="12" rx="6" fill="#86EFAC"/>
  <rect x="60" y="286" width="330" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <rect x="60" y="314" width="350" height="12" rx="6" fill="#065F46" opacity="0.7"/>
  <!-- Magnifier circle -->
  <circle cx="300" cy="290" r="130" fill="url(#lensGrad)" stroke="#34D399" stroke-width="5"/>
  <circle cx="300" cy="290" r="128" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.5"/>
  <!-- Magnifier handle -->
  <line x1="395" y1="385" x2="450" y2="440" stroke="url(#handleGrad)" stroke-width="18" stroke-linecap="round"/>
  <!-- Zoomed content inside lens -->
  <clipPath id="lensClip">
    <circle cx="300" cy="290" r="122"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <rect x="190" y="240" width="220" height="30" rx="4" fill="#7F1D1D" opacity="0.9"/>
    <rect x="200" y="248" width="160" height="14" rx="7" fill="#FCA5A5"/>
    <rect x="190" y="278" width="220" height="30" rx="4" fill="#14532D" opacity="0.9"/>
    <rect x="200" y="286" width="180" height="14" rx="7" fill="#86EFAC"/>
  </g>
</svg>
