<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080010"/>
      <stop offset="100%" stop-color="#14002A"/>
    </linearGradient>
    <radialGradient id="vortex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1D1148" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="playerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#vortex)"/>
  <!-- Vortex spiral rings -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-dasharray="20,15" opacity="0.7"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#6D28D9" stroke-width="2" stroke-dasharray="16,12" opacity="0.6"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#5B21B6" stroke-width="2" stroke-dasharray="12,10" opacity="0.5"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#4C1D95" stroke-width="1.5" stroke-dasharray="8,8" opacity="0.5"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.6"/>
  <!-- Bullets orbiting on rings -->
  <!-- Ring 170 -->
  <ellipse cx="426" cy="256" rx="12" ry="7" fill="#EF4444" transform="rotate(0,256,256)"/>
  <ellipse cx="86" cy="256" rx="12" ry="7" fill="#EF4444" transform="rotate(0,256,256)"/>
  <ellipse cx="256" cy="86" rx="7" ry="12" fill="#F97316" transform="rotate(0,256,256)"/>
  <!-- Ring 110 -->
  <ellipse cx="366" cy="256" rx="10" ry="6" fill="#EF4444" transform="rotate(45,256,256)"/>
  <ellipse cx="146" cy="256" rx="10" ry="6" fill="#F97316" transform="rotate(45,256,256)"/>
  <ellipse cx="256" cy="146" rx="6" ry="10" fill="#EF4444" transform="rotate(45,256,256)"/>
  <ellipse cx="256" cy="366" rx="6" ry="10" fill="#F97316" transform="rotate(45,256,256)"/>
  <!-- Player in vortex center, glowing -->
  <circle cx="256" cy="256" r="30" fill="#FDE68A" opacity="0.15"/>
  <polygon points="256,218 236,270 256,256 276,270" fill="url(#playerGrad)" stroke="#FEF9C3" stroke-width="2"/>
  <!-- Core spark -->
  <circle cx="256" cy="256" r="12" fill="white" opacity="0.9"/>
  <circle cx="256" cy="256" r="6" fill="#FDE68A"/>
  <!-- Title -->
  <text x="256" y="460" font-family="monospace" font-size="15" fill="#A78BFA" text-anchor="middle" font-weight="bold">DODGE BLITZ</text>
  <text x="256" y="482" font-family="monospace" font-size="11" fill="#7C3AED" text-anchor="middle">VORTEX MODE</text>
</svg>
