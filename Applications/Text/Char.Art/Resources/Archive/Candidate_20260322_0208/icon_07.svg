    <text x="262" y="278">@  #  *  .  @  #  *  .  @  #  *</text>
    <text x="254" y="298">.  @  *  #  .  @  *  #  .  @  *  #</text>
    <text x="248" y="318">*  .  @  #  *  .  @  #  *  .  @  #  *</text>
    <text x="244" y="338">#  *  .  @  #  *  .  @  #  *  .  @  #  *</text>
    <text x="242" y="358">@  #  *  .  @  #  *  .  @  #  *  .  @  #</text>
    <text x="240" y="378">.  @  *  #  .  @  *  #  .  @  *  #  .  @  *</text>
    <text x="240" y="398">*  .  @  #  *  .  @  #  *  .  @  #  *  .  @</text>
    <text x="240" y="418">#  *  .  @  #  *  .  @  #  *  .  @  #  *  .</text>
    <text x="240" y="438">@  #  *  .  @  #  *  .  @  #  *  .  @  #  *</text>
    <text x="240" y="458">.  @  *  #  .  @  *  #  .  @  *  #  .  @  *</text>
    <text x="240" y="478">*  .  @  #  *  .  @  #  *  .  @  #  *  .  @</text>
    <text x="240" y="498">#  *  .  @  #  *  .  @  #  *  .  @  #  *  .</text>
    <text x="240" y="518">@  #  *  .  @  #  *  .  @  #  *  .  @  #  *</text>
    <text x="240" y="538">.  @  *  #  .  @  *  #  .  @  *  #  .  @  *</text>
    <text x="240" y="558">*  .  @  #  *  .  @  #  *  .  @  #  *  .  @</text>
    <text x="240" y="578">#  *  .  @  #  *  .  @  #  *  .  @  #  *  .</text>
    <text x="240" y="598">@  #  *  .  @  #  *  .  @  #  *  .  @  #  *</text>
    <text x="242" y="618">.  @  *  #  .  @  *  #  .  @  *  #  .  @</text>
    <text x="244" y="638">*  .  @  #  *  .  @  #  *  .  @  #  *  .</text>
    <text x="248" y="658">#  *  .  @  #  *  .  @  #  *  .  @</text>
    <text x="254" y="678">@  #  *  .  @  #  *  .  @  *  #</text>
    <text x="262" y="698">.  @  *  #  .  @  *  #  .  @</text>
  </g>

  <!-- 렌즈 반사광 -->
  <ellipse cx="430" cy="390" rx="80" ry="50" fill="white" opacity="0.08" transform="rotate(-30 430 390)"/>

  <!-- 렌즈 내부 조리개 링 -->
  <circle cx="512" cy="490" r="130" fill="none" stroke="#2A4ABA" stroke-width="4" opacity="0.6"/>
  <circle cx="512" cy="490" r="70" fill="none" stroke="#4A6ADA" stroke-width="3" opacity="0.5"/>

  <!-- 렌즈 중앙 포인트 -->
