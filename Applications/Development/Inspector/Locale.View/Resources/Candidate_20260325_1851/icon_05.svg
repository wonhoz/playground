<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: hybrid | 돋보기 + 날짜 포맷이 선명하게 보임 | 대각선/동적 | 산호 배경 + 흰 돋보기 + 민트 텍스트 -->
  <defs>
    <linearGradient id="bgCoral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7F7F"/>
      <stop offset="100%" stop-color="#FF4757"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F0FFF8" stop-opacity="0.98"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="450" cy="430" r="270"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgCoral)"/>

  <!-- 배경 장식 - 작은 언어 코드들 (흩어진) -->
  <text x="130" y="200" font-family="Consolas" font-size="52" fill="white" opacity="0.18" transform="rotate(-15, 130, 200)">de-DE</text>
  <text x="650" y="160" font-family="Consolas" font-size="44" fill="white" opacity="0.15" transform="rotate(10, 650, 160)">fr-FR</text>
  <text x="750" y="700" font-family="Consolas" font-size="48" fill="white" opacity="0.18" transform="rotate(-8, 750, 700)">zh-CN</text>
  <text x="100" y="750" font-family="Consolas" font-size="40" fill="white" opacity="0.15" transform="rotate(12, 100, 750)">ar-SA</text>

  <!-- Layer 2: 돋보기 테두리 -->
  <circle cx="450" cy="430" r="290" fill="none" stroke="white" stroke-width="64"/>

  <!-- 돋보기 렌즈 내부 (흰 원) -->
  <circle cx="450" cy="430" r="270" fill="url(#lensGrad)"/>

  <!-- Layer 3: 렌즈 안의 날짜 포맷 내용 -->
  <g clip-path="url(#lensClip)">
    <!-- 배경 줄 -->
    <rect x="180" y="290" width="540" height="56" rx="8" fill="#E8F5E9"/>
    <rect x="180" y="378" width="540" height="56" rx="8" fill="#E3F2FD"/>
    <rect x="180" y="466" width="540" height="56" rx="8" fill="#FCE4EC"/>
    <rect x="180" y="554" width="540" height="56" rx="8" fill="#FFF8E1"/>

    <text x="450" y="320" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="38" font-weight="bold" fill="#2E7D32">2026-03-25</text>
    <text x="450" y="408" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="38" font-weight="bold" fill="#1565C0">03/25/2026</text>
    <text x="450" y="496" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="38" font-weight="bold" fill="#AD1457">25.03.2026</text>
    <text x="450" y="584" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="38" font-weight="bold" fill="#E65100">2026年3月25日</text>
  </g>

  <!-- 돋보기 손잡이 -->
  <line x1="688" y1="668" x2="840" y2="820" stroke="white" stroke-width="72" stroke-linecap="round"/>
  <line x1="688" y1="668" x2="840" y2="820" stroke="#FF8C8C" stroke-width="44" stroke-linecap="round"/>
</svg>
