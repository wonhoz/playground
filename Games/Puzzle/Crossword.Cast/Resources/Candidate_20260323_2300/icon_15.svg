    <line x1="512" y1="260" x2="512" y2="820" stroke="#22D3EE" stroke-width="8" stroke-dasharray="20,15" stroke-linecap="round"/>
    <!-- 뇌 주름들 (좌) -->
    <path d="M 330 380 Q 370 360, 410 390 Q 450 420, 430 460" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    <path d="M 280 500 Q 320 480, 360 510 Q 400 540, 380 580" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    <path d="M 310 640 Q 360 620, 400 650 Q 440 680, 420 710" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    <!-- 뇌 주름들 (우) -->
    <path d="M 694 380 Q 654 360, 614 390 Q 574 420, 594 460" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    <path d="M 744 500 Q 704 480, 664 510 Q 624 540, 644 580" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    <path d="M 714 640 Q 664 620, 624 650 Q 584 680, 604 710" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>

    <!-- Layer 3: 단어들 뇌 주변에 흩뿌려짐 -->
    <!-- 단어 태그들 (뇌 바깥 + 뇌 위) -->
    <!-- 상단 -->
    <rect x="380" y="130" width="264" height="60" fill="rgba(34,211,238,0.2)" stroke="#22D3EE" stroke-width="4" rx="12"/>
    <text x="512" y="163" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#22D3EE" text-anchor="middle" dominant-baseline="middle">PUZZLE</text>

    <!-- 좌상 떠다니는 단어 -->
    <rect x="100" y="220" width="160" height="50" fill="rgba(167,243,208,0.2)" stroke="#A7F3D0" stroke-width="3" rx="10"/>
    <text x="180" y="247" font-family="Arial Black, sans-serif" font-size="30" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">THINK</text>

    <!-- 우상 떠다니는 단어 -->
    <rect x="764" y="220" width="160" height="50" fill="rgba(167,243,208,0.2)" stroke="#A7F3D0" stroke-width="3" rx="10"/>
    <text x="844" y="247" font-family="Arial Black, sans-serif" font-size="30" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">CLUE</text>

    <!-- 좌측 -->
    <rect x="100" y="450" width="130" height="50" fill="rgba(34,211,238,0.2)" stroke="#22D3EE" stroke-width="3" rx="10"/>
    <text x="165" y="477" font-family="Arial Black, sans-serif" font-size="28" fill="#22D3EE" text-anchor="middle" dominant-baseline="middle">WORD</text>

    <!-- 우측 -->
    <rect x="794" y="450" width="130" height="50" fill="rgba(34,211,238,0.2)" stroke="#22D3EE" stroke-width="3" rx="10"/>
    <text x="859" y="477" font-family="Arial Black, sans-serif" font-size="28" fill="#22D3EE" text-anchor="middle" dominant-baseline="middle">HINT</text>

    <!-- 하단 좌 -->
    <rect x="100" y="700" width="180" height="50" fill="rgba(167,243,208,0.2)" stroke="#A7F3D0" stroke-width="3" rx="10"/>
    <text x="190" y="727" font-family="Arial Black, sans-serif" font-size="28" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">ACROSS</text>

    <!-- 하단 우 -->
    <rect x="744" y="700" width="180" height="50" fill="rgba(167,243,208,0.2)" stroke="#A7F3D0" stroke-width="3" rx="10"/>
    <text x="834" y="727" font-family="Arial Black, sans-serif" font-size="28" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">DOWN</text>

    <!-- 하단 중앙 -->
    <rect x="350" y="860" width="324" height="64" fill="rgba(34,211,238,0.25)" stroke="#22D3EE" stroke-width="5" rx="14"/>
    <text x="512" y="895" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">BRAIN GAME</text>

    <!-- 연결선들 (뇌 → 단어) -->
    <line x1="460" y1="260" x2="380" y2="190" stroke="#22D3EE" stroke-width="4" stroke-dasharray="10,8" opacity="0.6"/>
    <line x1="564" y1="260" x2="644" y2="190" stroke="#22D3EE" stroke-width="4" stroke-dasharray="10,8" opacity="0.6"/>
    <line x1="280" y1="500" x2="230" y2="477" stroke="#A7F3D0" stroke-width="3" stroke-dasharray="8,6" opacity="0.5"/>
    <line x1="744" y1="500" x2="794" y2="477" stroke="#A7F3D0" stroke-width="3" stroke-dasharray="8,6" opacity="0.5"/>
  </g>
</svg>
