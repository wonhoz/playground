<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Key.Map - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 140px; height: 140px; border-radius: 20px; border: 1px solid #333; background: #111; }
  .item span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>Key.Map — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_keyboard_remap.svg"><span>01<br>Keyboard Remap</span></div>
  <div class="item"><img src="candidate_02_arrows_cross.svg"><span>02<br>Arrows Cross</span></div>
  <div class="item"><img src="candidate_03_circuit_keys.svg"><span>03<br>Circuit Keys</span></div>
  <div class="item"><img src="candidate_04_hotkey_combo.svg"><span>04<br>Hotkey Combo</span></div>
  <div class="item"><img src="candidate_05_fingerprint_key.svg"><span>05<br>Fingerprint Key</span></div>
  <div class="item"><img src="candidate_06_swap_keys.svg"><span>06<br>Swap Keys</span></div>
  <div class="item"><img src="candidate_07_macro_chain.svg"><span>07<br>Macro Chain</span></div>
  <div class="item"><img src="candidate_08_neon_keypad.svg"><span>08<br>Neon Keypad</span></div>
  <div class="item"><img src="candidate_09_layout_map.svg"><span>09<br>Layout Map</span></div>
  <div class="item"><img src="candidate_10_glitch_remap.svg"><span>10<br>Glitch Remap</span></div>
</div>
</body>
</html>
