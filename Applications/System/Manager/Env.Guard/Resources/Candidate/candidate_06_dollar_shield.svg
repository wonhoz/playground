<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="shield_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ab2f"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 70 L400 130 L400 270 C400 360 330 425 256 450 C182 425 112 360 112 270 L112 130 Z" fill="url(#shield_g)" opacity="0.3"/>
  <path d="M256 70 L400 130 L400 270 C400 360 330 425 256 450 C182 425 112 360 112 270 L112 130 Z" stroke="url(#shield_g)" stroke-width="7" fill="none"/>
  <!-- Dollar sign (env variable prefix) -->
  <text x="256" y="300" font-family="monospace" font-size="150" text-anchor="middle" fill="url(#shield_g)" font-weight="bold" opacity="0.9">$</text>
  <!-- Env variable snippets -->
  <text x="256" y="460" font-family="monospace" font-size="22" text-anchor="middle" fill="white" opacity="0.7">$ENV_GUARD</text>
</svg>
