<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: metaphor · 레이어드 · 폴더→메뉴→터미널 3단 흐름 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E1BEE7"/>
  <!-- Step 1: 폴더 (뒷편) -->
  <g transform="translate(80 180) rotate(-4)">
    <path d="M 0 0 L 120 0 L 160 40 L 280 40 L 280 260 L 0 260 Z" fill="#FFD93D" stroke="#4A148C" stroke-width="16" stroke-linejoin="round"/>
    <circle cx="160" cy="170" r="34" fill="#FFFFFF" stroke="#4A148C" stroke-width="8"/>
    <text x="160" y="184" font-family="Arial" font-weight="900" font-size="50" fill="#4A148C" text-anchor="middle">+</text>
  </g>
  <!-- Step 2: 컨텍스트 메뉴 (중간) -->
  <g transform="translate(290 260) rotate(3)">
    <rect x="0" y="0" width="380" height="440" rx="24" fill="#FFFFFF" stroke="#4A148C" stroke-width="14"/>
    <rect x="20" y="30" width="340" height="60" rx="10" fill="#F3E5F5"/>
    <text x="40" y="76" font-family="Consolas, monospace" font-size="34" fill="#4A148C">Open</text>
    <rect x="20" y="100" width="340" height="60" rx="10" fill="#F3E5F5"/>
    <text x="40" y="146" font-family="Consolas, monospace" font-size="34" fill="#4A148C">Cut</text>
    <rect x="20" y="170" width="340" height="80" rx="12" fill="#FFD93D" stroke="#E65100" stroke-width="8"/>
    <text x="40" y="225" font-family="Consolas, monospace" font-weight="700" font-size="38" fill="#3E2723">Claude Code</text>
    <rect x="20" y="260" width="340" height="60" rx="10" fill="#F3E5F5"/>
    <text x="40" y="306" font-family="Consolas, monospace" font-size="34" fill="#4A148C">Copy path</text>
    <rect x="20" y="330" width="340" height="60" rx="10" fill="#F3E5F5"/>
    <text x="40" y="376" font-family="Consolas, monospace" font-size="34" fill="#4A148C">Properties</text>
    <!-- 화살표 -->
    <circle cx="330" cy="210" r="20" fill="#E65100"/>
    <path d="M 320 200 L 340 210 L 320 220 Z" fill="#FFFFFF"/>
  </g>
  <!-- Step 3: 터미널 (앞편) -->
  <g transform="translate(540 460) rotate(-2)">
    <rect x="0" y="0" width="440" height="460" rx="28" fill="#1A1A1A" stroke="#4A148C" stroke-width="16"/>
    <rect x="0" y="0" width="440" height="64" rx="28" fill="#E65100"/>
    <rect x="0" y="36" width="440" height="28" fill="#E65100"/>
    <circle cx="40" cy="32" r="12" fill="#FF5252"/>
    <circle cx="72" cy="32" r="12" fill="#FFD93D"/>
    <circle cx="104" cy="32" r="12" fill="#4CAF50"/>
    <text x="30" y="140" font-family="Consolas, monospace" font-weight="700" font-size="40" fill="#06D6A0">$ claude</text>
    <text x="30" y="200" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFD93D">&gt; Welcome!</text>
    <text x="30" y="254" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFFFFF">&gt; Reading</text>
    <text x="30" y="308" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFFFFF">  files...</text>
    <text x="30" y="380" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FF6B9D">&gt; Ready ✓</text>
    <rect x="30" y="400" width="22" height="40" fill="#06D6A0"/>
  </g>
  <!-- 상단 라벨 -->
  <rect x="322" y="90" width="380" height="100" rx="36" fill="#4A148C"/>
  <text x="512" y="160" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#FFD93D" text-anchor="middle">3-STEP FLOW</text>
</svg>
