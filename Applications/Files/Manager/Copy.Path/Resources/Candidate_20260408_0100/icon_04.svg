<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background: purple -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <!-- Central clipboard (target) -->
  <rect x="390" y="400" width="244" height="296" rx="20" fill="#FCD34D"/>
  <rect x="440" y="360" width="144" height="76" rx="14" fill="#B45309"/>
  <rect x="464" y="374" width="96" height="48" rx="8" fill="#FCD34D"/>
  <circle cx="512" cy="398" r="14" fill="#B45309"/>
  <!-- Lines on clipboard -->
  <line x1="420" y1="500" x2="614" y2="500" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="420" y1="530" x2="580" y2="530" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="420" y1="560" x2="598" y2="560" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="420" y1="590" x2="560" y2="590" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>

  <!-- Converging arrows from 5 directions -->
  <!-- Top-left -->
  <line x1="180" y1="200" x2="390" y2="430" stroke="white" stroke-width="12" stroke-linecap="round" stroke-dasharray="20,10"/>
  <polygon points="372,420 408,440 382,460" fill="white"/>

  <!-- Top-right -->
  <line x1="844" y1="200" x2="634" y2="430" stroke="#A5F3FC" stroke-width="12" stroke-linecap="round" stroke-dasharray="20,10"/>
  <polygon points="652,420 618,440 644,460" fill="#A5F3FC"/>

  <!-- Left -->
  <line x1="110" y1="548" x2="390" y2="548" stroke="#6EE7B7" stroke-width="12" stroke-linecap="round" stroke-dasharray="20,10"/>
  <polygon points="374,520 410,548 374,576" fill="#6EE7B7"/>

  <!-- Bottom-left -->
  <line x1="180" y1="820" x2="390" y2="660" stroke="#FCA5A5" stroke-width="12" stroke-linecap="round" stroke-dasharray="20,10"/>
  <polygon points="372,668 408,648 400,678" fill="#FCA5A5"/>

  <!-- Bottom-right -->
  <line x1="844" y1="820" x2="634" y2="660" stroke="#C4B5FD" stroke-width="12" stroke-linecap="round" stroke-dasharray="20,10"/>
  <polygon points="652,668 618,648 626,678" fill="#C4B5FD"/>

  <!-- Labels at arrow sources -->
  <rect x="100" y="158" width="160" height="36" rx="8" fill="white" opacity="0.2"/>
  <text x="180" y="183" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle">full\path</text>

  <rect x="764" y="158" width="160" height="36" rx="8" fill="#A5F3FC" opacity="0.25"/>
  <text x="844" y="183" font-family="Consolas,monospace" font-size="22" fill="#A5F3FC" text-anchor="middle">full/path</text>

  <rect x="30" y="530" width="120" height="36" rx="8" fill="#6EE7B7" opacity="0.25"/>
  <text x="90" y="555" font-family="Consolas,monospace" font-size="22" fill="#6EE7B7" text-anchor="middle">file.txt</text>

  <rect x="80" y="820" width="160" height="36" rx="8" fill="#FCA5A5" opacity="0.25"/>
  <text x="160" y="845" font-family="Consolas,monospace" font-size="22" fill="#FCA5A5" text-anchor="middle">C#: \\path</text>

  <rect x="764" y="820" width="160" height="36" rx="8" fill="#C4B5FD" opacity="0.25"/>
  <text x="844" y="845" font-family="Consolas,monospace" font-size="22" fill="#C4B5FD" text-anchor="middle">file:///</text>
</svg>
