<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hologram jump projection -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Projector base platform -->
  <rect x="350" y="780" width="324" height="60" rx="12" fill="#001428"/>
  <rect x="350" y="780" width="324" height="60" rx="12" fill="none" stroke="#00B0FF" stroke-width="4" opacity="0.6"/>
  <!-- Projection beams from base -->
  <polygon points="400,780 512,300 624,780" fill="#00B0FF" opacity="0.04"/>
  <line x1="400" y1="780" x2="512" y2="300" stroke="#00E5FF" stroke-width="3" opacity="0.4"/>
  <line x1="624" y1="780" x2="512" y2="300" stroke="#00E5FF" stroke-width="3" opacity="0.4"/>
  <!-- Hologram figure (jumping, semi-transparent) -->
  <!-- Outer glow silhouette -->
  <circle cx="512" cy="390" r="68" fill="#00B0FF" opacity="0.07"/>
  <!-- Head -->
  <circle cx="512" cy="390" r="52" fill="none" stroke="#00E5FF" stroke-width="6" opacity="0.7"/>
  <circle cx="512" cy="390" r="52" fill="#00B0FF" opacity="0.07"/>
  <!-- Body -->
  <line x1="512" y1="442" x2="512" y2="580" stroke="#00E5FF" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Arms raised in jump -->
  <line x1="512" y1="490" x2="420" y2="440" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="490" x2="604" y2="440" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Legs tucked (jump position) -->
  <line x1="498" y1="580" x2="442" y2="640" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="442" y1="640" x2="400" y2="610" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="526" y1="580" x2="582" y2="640" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="582" y1="640" x2="624" y2="610" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Scan lines through hologram -->
  <line x1="420" y1="360" x2="604" y2="360" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="390" x2="604" y2="390" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="420" x2="604" y2="420" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="500" x2="604" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.25"/>
  <line x1="420" y1="540" x2="604" y2="540" stroke="#00E5FF" stroke-width="2" opacity="0.2"/>
  <!-- Emitter dot on base -->
  <circle cx="512" cy="810" r="14" fill="#00E5FF" opacity="0.8"/>
  <circle cx="512" cy="810" r="8" fill="#80D8FF"/>
</svg>
