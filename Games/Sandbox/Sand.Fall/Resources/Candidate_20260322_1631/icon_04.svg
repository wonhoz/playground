<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0C08"/>
      <stop offset="100%" stop-color="#080408"/>
    </radialGradient>
    <clipPath id="frame04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <g clip-path="url(#frame04)">
    <!-- Layer 2: Material interactions (3 zones) -->

    <!-- ZONE 1 (left): Wood burning → turning to Ash -->
    <!-- Wood (brown log) -->
    <rect x="80" y="680" width="200" height="70" rx="10" fill="#7A3A10"/>
    <rect x="80" y="680" width="200" height="22" rx="10" fill="#9A5020" opacity="0.5"/>
    <!-- Fire consuming wood -->
    <ellipse cx="180" cy="600" rx="60" ry="90" fill="#FF4500" opacity="0.9"/>
    <ellipse cx="180" cy="580" rx="40" ry="68" fill="#FF8800" opacity="0.9"/>
    <ellipse cx="180" cy="558" rx="22" ry="46" fill="#FFC800" opacity="0.9"/>
    <ellipse cx="155" cy="615" rx="35" ry="55" fill="#FF3300" opacity="0.85"/>
    <ellipse cx="205" cy="618" rx="30" ry="50" fill="#FF5500" opacity="0.8"/>
    <!-- Ash (gray debris below right) -->
    <ellipse cx="180" cy="755" rx="60" ry="18" fill="#444" opacity="0.7"/>
    <ellipse cx="180" cy="748" rx="40" ry="12" fill="#555" opacity="0.6"/>
    <!-- Smoke -->
    <ellipse cx="175" cy="480" rx="30" ry="24" fill="#333" opacity="0.5"/>
    <ellipse cx="185" cy="440" rx="22" ry="18" fill="#3A3A3A" opacity="0.38"/>
    <ellipse cx="170" cy="405" rx="16" ry="13" fill="#333" opacity="0.25"/>
    <!-- Zone label -->
    <text x="180" y="825" font-family="'Segoe UI',Arial" font-size="26" fill="#FF8800" text-anchor="middle" font-weight="700">🔥 → ⬛</text>
    <text x="180" y="858" font-family="'Segoe UI',Arial" font-size="22" fill="#888" text-anchor="middle">불 → 재</text>

    <!-- Divider line -->
    <line x1="344" y1="150" x2="344" y2="870" stroke="#333" stroke-width="2" stroke-dasharray="8,12"/>

    <!-- ZONE 2 (center): Water + Fire interaction (steam rising) -->
    <!-- Water (blue pool) -->
    <rect x="378" y="720" width="268" height="100" rx="8" fill="#1A5ABB" opacity="0.85"/>
    <rect x="378" y="720" width="268" height="28" rx="8" fill="#4488EE" opacity="0.4"/>
    <!-- Fire entering water -->
    <ellipse cx="512" cy="640" rx="45" ry="70" fill="#FF5500" opacity="0.75"/>
    <ellipse cx="512" cy="622" rx="28" ry="52" fill="#FF9900" opacity="0.75"/>
    <!-- Steam rising (gray puffs) -->
    <ellipse cx="512" cy="550" rx="50" ry="40" fill="#888" opacity="0.55"/>
    <ellipse cx="490" cy="490" rx="38" ry="32" fill="#999" opacity="0.45"/>
    <ellipse cx="530" cy="430" rx="32" ry="26" fill="#888" opacity="0.35"/>
    <ellipse cx="508" cy="375" rx="26" ry="21" fill="#777" opacity="0.28"/>
    <ellipse cx="520" cy="325" rx="20" ry="16" fill="#888" opacity="0.20"/>
    <!-- Zone label -->
    <text x="512" y="880" font-family="'Segoe UI',Arial" font-size="26" fill="#4488EE" text-anchor="middle" font-weight="700">💧 + 🔥 → 💨</text>
    <text x="512" y="913" font-family="'Segoe UI',Arial" font-size="22" fill="#888" text-anchor="middle">물 + 불 → 증기</text>

    <!-- Divider line -->
    <line x1="680" y1="150" x2="680" y2="870" stroke="#333" stroke-width="2" stroke-dasharray="8,12"/>

    <!-- ZONE 3 (right): Sand falling onto stone structure -->
    <!-- Stone structure (gray blocks) -->
    <rect x="720" y="640" width="60" height="180" fill="#666"/>
    <rect x="824" y="700" width="120" height="120" fill="#666"/>
    <!-- Sand accumulated on stone -->
    <ellipse cx="750" cy="638" rx="50" ry="18" fill="#E0B040" opacity="0.9"/>
    <ellipse cx="750" cy="626" rx="30" ry="12" fill="#ECC050" opacity="0.9"/>
    <!-- Sand grains falling -->
    <circle cx="750" cy="300" r="8" fill="#F0C040" opacity="0.9"/>
    <circle cx="748" cy="345" r="7" fill="#ECC050" opacity="0.85"/>
    <circle cx="752" cy="390" r="8" fill="#F0C040" opacity="0.8"/>
    <circle cx="747" cy="435" r="7" fill="#ECC050" opacity="0.75"/>
    <circle cx="753" cy="480" r="8" fill="#F0C040" opacity="0.7"/>
    <circle cx="749" cy="525" r="7" fill="#ECC050" opacity="0.6"/>
    <circle cx="751" cy="570" r="8" fill="#F0C040" opacity="0.5"/>
    <circle cx="748" cy="610" r="7" fill="#ECC050" opacity="0.4"/>
    <!-- Sand on right stone -->
    <ellipse cx="884" cy="698" rx="60" ry="16" fill="#E0B040" opacity="0.85"/>
    <!-- Zone label -->
    <text x="862" y="880" font-family="'Segoe UI',Arial" font-size="26" fill="#ECC050" text-anchor="middle" font-weight="700">🟡 + 🪨</text>
    <text x="862" y="913" font-family="'Segoe UI',Arial" font-size="22" fill="#888" text-anchor="middle">모래 + 돌</text>

    <!-- Layer 3: Title -->
    <text x="512" y="160" font-family="'Segoe UI',Arial" font-size="64" font-weight="900" fill="#2A1408" text-anchor="middle" opacity="0.9">MATERIAL</text>
    <text x="512" y="225" font-family="'Segoe UI',Arial" font-size="64" font-weight="900" fill="#2A1408" text-anchor="middle" opacity="0.9">INTERACTIONS</text>
  </g>
</svg>
