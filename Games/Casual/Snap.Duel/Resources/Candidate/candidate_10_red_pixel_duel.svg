<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel art duel scene (each block 16x16) -->
  <!-- Left pixel fighter (red) -->
  <!-- Head -->
  <rect x="112" y="144" width="48" height="48" rx="4" fill="#f44336"/>
  <rect x="120" y="160" width="12" height="12" rx="2" fill="#ffcdd2"/><!-- left eye -->
  <rect x="140" y="160" width="12" height="12" rx="2" fill="#ffcdd2"/><!-- right eye -->
  <rect x="120" y="176" width="32" height="6" rx="2" fill="#b71c1c"/><!-- mouth -->
  <!-- Body -->
  <rect x="112" y="192" width="48" height="48" rx="4" fill="#e53935"/>
  <!-- Arms -->
  <rect x="80" y="192" width="32" height="16" rx="4" fill="#e53935"/>
  <rect x="160" y="192" width="32" height="16" rx="4" fill="#e53935"/>
  <!-- Weapon (right arm extended toward center) -->
  <rect x="192" y="196" width="48" height="8" rx="4" fill="#ef5350"/>
  <rect x="240" y="192" width="16" height="16" rx="2" fill="#ffcdd2"/>
  <!-- Legs -->
  <rect x="112" y="240" width="20" height="48" rx="4" fill="#c62828"/>
  <rect x="140" y="240" width="20" height="48" rx="4" fill="#c62828"/>
  <!-- Right pixel fighter (blue) -->
  <rect x="352" y="144" width="48" height="48" rx="4" fill="#1565c0"/>
  <rect x="360" y="160" width="12" height="12" rx="2" fill="#bbdefb"/>
  <rect x="380" y="160" width="12" height="12" rx="2" fill="#bbdefb"/>
  <rect x="360" y="176" width="32" height="6" rx="2" fill="#0d47a1"/>
  <rect x="352" y="192" width="48" height="48" rx="4" fill="#1976d2"/>
  <rect x="320" y="192" width="32" height="16" rx="4" fill="#1976d2"/>
  <rect x="400" y="192" width="32" height="16" rx="4" fill="#1976d2"/>
  <!-- Left arm weapon -->
  <rect x="272" y="196" width="48" height="8" rx="4" fill="#42a5f5"/>
  <rect x="256" y="192" width="16" height="16" rx="2" fill="#bbdefb"/>
  <rect x="352" y="240" width="20" height="48" rx="4" fill="#0d47a1"/>
  <rect x="380" y="240" width="20" height="48" rx="4" fill="#0d47a1"/>
  <!-- Clash spark in center -->
  <rect x="248" y="192" width="16" height="16" rx="2" fill="#ffd600" opacity="0.95"/>
  <rect x="240" y="200" width="32" height="8" rx="2" fill="#ffd600" opacity="0.7"/>
  <rect x="248" y="184" width="16" height="8" rx="2" fill="#ffd600" opacity="0.7"/>
  <!-- Ground line -->
  <rect x="80" y="290" width="352" height="6" rx="3" fill="#3a0000" opacity="0.8"/>
  <!-- Score / HUD bottom -->
  <rect x="80" y="330" width="140" height="32" rx="8" fill="#1a0000" stroke="#f44336" stroke-width="1.5"/>
  <text x="150" y="351" font-family="monospace" font-size="14" fill="#ef5350" text-anchor="middle" font-weight="bold">P1: 0.14s</text>
  <rect x="292" y="330" width="140" height="32" rx="8" fill="#001030" stroke="#1565c0" stroke-width="1.5"/>
  <text x="362" y="351" font-family="monospace" font-size="14" fill="#42a5f5" text-anchor="middle" font-weight="bold">P2: 0.22s</text>
  <!-- Title -->
  <text x="256" y="425" font-family="monospace" font-size="13" fill="#ff1744" text-anchor="middle" letter-spacing="1" opacity="0.6">P1 WINS THIS ROUND</text>
  <text x="256" y="462" font-family="sans-serif" font-size="22" fill="#f44336" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.9">SNAP.DUEL</text>
</svg>
