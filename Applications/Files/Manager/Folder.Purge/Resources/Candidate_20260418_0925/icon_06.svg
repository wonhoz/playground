<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 황토-크림 배경 (먼지 쌓인 느낌) -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#EFEBE9"/>
    </linearGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <g clip-path="url(#clip06)">
    <!-- Layer 2: 거미줄에 잡힌 낡은 폴더들 -->
    <!-- 거미줄 (방사형 + 동심원) -->
    <!-- 중앙점 -->
    <circle cx="512" cy="400" r="6" fill="#A1887F" opacity="0.5"/>
    <!-- 방사선 -->
    <line x1="512" y1="400" x2="180" y2="160" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="512" y2="100" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="844" y2="160" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="880" y2="400" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="844" y2="640" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="180" y2="640" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="400" x2="144" y2="400" stroke="#BCAAA4" stroke-width="3" opacity="0.5"/>
    <!-- 동심원 -->
    <circle cx="512" cy="400" r="120" fill="none" stroke="#BCAAA4" stroke-width="3" opacity="0.4"/>
    <circle cx="512" cy="400" r="220" fill="none" stroke="#BCAAA4" stroke-width="3" opacity="0.3"/>
    <circle cx="512" cy="400" r="320" fill="none" stroke="#BCAAA4" stroke-width="3" opacity="0.25"/>

    <!-- 낡은 폴더들 (거미줄에 걸린) -->
    <!-- 폴더 1 (좌상, 먼지낀 회색) -->
    <rect x="130" y="100" width="200" height="160" rx="18" fill="#8D6E63" opacity="0.8"/>
    <rect x="130" y="72" width="80" height="36" rx="10" fill="#8D6E63" opacity="0.8"/>
    <text x="230" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="70" text-anchor="middle">📁</text>
    <text x="230" y="246" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#D7CCC8" text-anchor="middle">2년 전</text>

    <!-- 폴더 2 (우상) -->
    <rect x="700" y="100" width="200" height="160" rx="18" fill="#795548" opacity="0.8"/>
    <rect x="700" y="72" width="80" height="36" rx="10" fill="#795548" opacity="0.8"/>
    <text x="800" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="70" text-anchor="middle">📁</text>
    <text x="800" y="246" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#D7CCC8" text-anchor="middle">3년 전</text>

    <!-- 폴더 3 (중앙) — 가장 크고 먼지 낀 -->
    <rect x="360" y="260" width="304" height="240" rx="24" fill="#6D4C41" opacity="0.9"/>
    <rect x="360" y="230" width="120" height="44" rx="12" fill="#6D4C41" opacity="0.9"/>
    <text x="512" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="100" text-anchor="middle">📁</text>
    <text x="512" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#BCAAA4" text-anchor="middle">Legacy Project</text>
    <text x="512" y="514" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#A1887F" text-anchor="middle">5년 전 · 1.2 GB</text>

    <!-- Layer 3: 가위 (청소 도구) — 대각선으로 등장 -->
    <!-- 가위 블레이드 1 -->
    <path d="M680 600 Q780 680 880 760" stroke="#4CAF50" stroke-width="30" stroke-linecap="round" fill="none"/>
    <!-- 가위 블레이드 2 -->
    <path d="M680 760 Q780 680 880 600" stroke="#4CAF50" stroke-width="30" stroke-linecap="round" fill="none"/>
    <!-- 가위 중심 -->
    <circle cx="780" cy="680" r="24" fill="#2E7D32"/>
    <!-- 가위 손잡이 -->
    <circle cx="660" cy="580" r="36" fill="none" stroke="#4CAF50" stroke-width="20"/>
    <circle cx="660" cy="780" r="36" fill="none" stroke="#4CAF50" stroke-width="20"/>

    <!-- 하단 삭제 후 초록 결과 -->
    <rect x="140" y="840" width="744" height="90" rx="28" fill="#2E7D32"/>
    <text x="512" y="896" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">✂ 낡은 폴더 정리!</text>
  </g>
</svg>
