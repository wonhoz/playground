<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3d2000"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4823c"/>
      <stop offset="50%" stop-color="#a05c1e"/>
      <stop offset="100%" stop-color="#7a3e0a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Guitar upper bout -->
  <ellipse cx="256" cy="200" rx="105" ry="120" fill="url(#body)"/>
  <!-- Guitar waist -->
  <rect x="188" y="200" width="136" height="70" fill="#a05c1e"/>
  <!-- Guitar lower bout -->
  <ellipse cx="256" cy="330" rx="130" ry="150" fill="url(#body)"/>
  <!-- Shine -->
  <ellipse cx="256" cy="265" rx="130" ry="200" fill="url(#shine)"/>
  <!-- Sound hole -->
  <circle cx="256" cy="295" r="42" fill="#3d2000"/>
  <circle cx="256" cy="295" r="38" fill="#1a0a00"/>
  <!-- Rosette rings -->
  <circle cx="256" cy="295" r="42" fill="none" stroke="#d4823c" stroke-width="3"/>
  <circle cx="256" cy="295" r="36" fill="none" stroke="#ffaa44" stroke-width="2"/>
  <circle cx="256" cy="295" r="30" fill="none" stroke="#d4823c" stroke-width="2"/>
  <!-- Bridge -->
  <rect x="222" y="360" width="68" height="18" rx="5" fill="#5a2a00"/>
  <!-- Neck -->
  <rect x="238" y="60" width="36" height="155" rx="10" fill="#8b4e10"/>
  <!-- Headstock -->
  <rect x="233" y="48" width="46" height="30" rx="8" fill="#6b3a0a"/>
  <!-- Tuning pegs -->
  <circle cx="243" cy="52" r="5" fill="#c8a060"/>
  <circle cx="256" cy="52" r="5" fill="#c8a060"/>
  <circle cx="269" cy="52" r="5" fill="#c8a060"/>
  <!-- Strings -->
  <line x1="241" y1="78" x2="241" y2="360" stroke="#ddd" stroke-width="1.5" opacity="0.7"/>
  <line x1="249" y1="78" x2="249" y2="360" stroke="#ddd" stroke-width="1.5" opacity="0.7"/>
  <line x1="256" y1="78" x2="256" y2="360" stroke="#ddd" stroke-width="2" opacity="0.7"/>
  <line x1="263" y1="78" x2="263" y2="360" stroke="#ddd" stroke-width="2" opacity="0.7"/>
  <line x1="270" y1="78" x2="270" y2="360" stroke="#ddd" stroke-width="1.5" opacity="0.7"/>
  <!-- Frets -->
  <rect x="238" y="115" width="36" height="4" rx="2" fill="#c0a060"/>
  <rect x="238" y="140" width="36" height="4" rx="2" fill="#c0a060"/>
  <rect x="238" y="165" width="36" height="4" rx="2" fill="#c0a060"/>
  <!-- Music notes floating -->
  <text x="370" y="160" font-size="55" fill="#ffaa44" opacity="0.7">♪</text>
  <text x="90" y="240" font-size="45" fill="#d4823c" opacity="0.6">♫</text>
</svg>