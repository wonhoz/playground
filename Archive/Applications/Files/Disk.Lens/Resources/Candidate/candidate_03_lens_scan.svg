<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#050D13"/>
    </radialGradient>
    <radialGradient id="lensGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#0080FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#003080" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="120" x2="160" y2="400" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="120" x2="200" y2="400" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="256" y1="120" x2="256" y2="400" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="312" y1="120" x2="312" y2="400" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="352" y1="120" x2="352" y2="400" stroke="#00F5FF" stroke-width="0.5" opacity="0.2"/>
  <!-- Main lens circle -->
  <circle cx="256" cy="240" r="145" fill="url(#lensGrad)" stroke="#00F5FF" stroke-width="4" opacity="0.85" filter="url(#glow)"/>
  <!-- Inner rings -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="240" r="75" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.3"/>
  <!-- Crosshair -->
  <line x1="116" y1="240" x2="396" y2="240" stroke="#00F5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="100" x2="256" y2="380" stroke="#00F5FF" stroke-width="1.5" opacity="0.5"/>
  <!-- Scan line -->
  <rect x="111" y="215" width="290" height="3" fill="url(#scanLine)" opacity="0.9" filter="url(#glow)"/>
  <!-- Handle -->
  <line x1="360" y1="350" x2="430" y2="420" stroke="#00F5FF" stroke-width="14" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <!-- Data points -->
  <circle cx="190" cy="200" r="6" fill="#00F5FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="290" cy="270" r="8" fill="#FFD700" opacity="0.9" filter="url(#glow)"/>
  <circle cx="240" cy="290" r="5" fill="#FF6B6B" opacity="0.9" filter="url(#glow)"/>
  <circle cx="310" cy="190" r="6" fill="#92FE9D" opacity="0.9" filter="url(#glow)"/>
  <!-- Label -->
  <text x="256" y="462" text-anchor="middle" fill="#00F5FF" font-family="Arial" font-size="20" font-weight="bold" letter-spacing="3" opacity="0.9">DISK.LENS</text>
</svg>
