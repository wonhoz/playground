  <ellipse cx="313" cy="115" rx="9" ry="15" fill="none" stroke="#E3F2FD" stroke-width="4" transform="rotate(-20 313 115)"/>
  <polygon points="217,396 214,378 228,385" fill="#E3F2FD"/>
