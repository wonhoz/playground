  <text x="200" y="264" font-family="Arial,sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">README.md ●</text>
  <!-- Line numbers -->
  <rect x="120" y="274" width="50" height="506" fill="#1E1E1E"/>
