<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#080018"/>
    </linearGradient>
    <radialGradient id="wormGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#8B5CF6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 웜홀 입구 링들 (왼쪽) -->
  <ellipse cx="150" cy="256" rx="80" ry="26" fill="none" stroke="#6D28D9" stroke-width="2" opacity="0.4"/>
  <ellipse cx="150" cy="256" rx="64" ry="21" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.55"/>
  <ellipse cx="150" cy="256" rx="48" ry="16" fill="none" stroke="#8B5CF6" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="150" cy="256" rx="30" ry="10" fill="none" stroke="#A78BFA" stroke-width="3.5" opacity="0.85" filter="url(#glow)"/>
  <ellipse cx="150" cy="256" rx="16" ry="5" fill="#8B5CF6" opacity="0.7" filter="url(#glow)"/>
  <!-- 웜홀 출구 링들 (오른쪽) -->
  <ellipse cx="362" cy="256" rx="80" ry="26" fill="none" stroke="#6D28D9" stroke-width="2" opacity="0.4"/>
  <ellipse cx="362" cy="256" rx="64" ry="21" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.55"/>
  <ellipse cx="362" cy="256" rx="48" ry="16" fill="none" stroke="#8B5CF6" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="362" cy="256" rx="30" ry="10" fill="none" stroke="#C4B5FD" stroke-width="3.5" opacity="0.85" filter="url(#glow)"/>
  <ellipse cx="362" cy="256" rx="16" ry="5" fill="#A78BFA" opacity="0.7" filter="url(#glow)"/>
  <!-- 글로우 -->
  <circle cx="150" cy="256" r="90" fill="url(#wormGrad)"/>
  <circle cx="362" cy="256" r="90" fill="url(#wormGrad)" opacity="0.8"/>
  <!-- 바로가기 경로 (웜홀 내부 통과) -->
  <path d="M 150,256 Q 256,220 362,256" fill="none" stroke="#C4B5FD" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <path d="M 150,256 Q 256,292 362,256" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>
  <polygon points="353,248 364,256 353,264" fill="#C4B5FD" opacity="0.9" filter="url(#glow)"/>
  <!-- 소스 (상단) -->
  <rect x="210" y="90" width="92" height="108" rx="10" fill="#2E1065" stroke="#7C3AED" stroke-width="2" opacity="0.9"/>
  <polygon points="210,90 248,90 260,104 302,104 302,118 210,118" fill="#1E0A5C" opacity="0.9"/>
  <line x1="228" y1="136" x2="284" y2="136" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="228" y1="152" x2="270" y2="152" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="228" y1="168" x2="276" y2="168" stroke="#7C3AED" stroke-width="2" opacity="0.45"/>
  <!-- 소스→웜홀 화살표 -->
  <line x1="256" y1="198" x2="256" y2="238" stroke="#A78BFA" stroke-width="2" opacity="0.6" stroke-dasharray="5,4"/>
  <polygon points="250,234 256,242 262,234" fill="#A78BFA" opacity="0.7"/>
  <!-- 타겟 (하단) -->
  <rect x="210" y="314" width="92" height="108" rx="10" fill="#2E1065" stroke="#C4B5FD" stroke-width="2" opacity="0.85"/>
  <polygon points="210,314 248,314 260,328 302,328 302,342 210,342" fill="#1E0A5C" opacity="0.9"/>
  <line x1="228" y1="360" x2="284" y2="360" stroke="#C4B5FD" stroke-width="2" opacity="0.6"/>
  <line x1="228" y1="376" x2="265" y2="376" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
  <!-- 웜홀→타겟 화살표 -->
  <line x1="256" y1="270" x2="256" y2="312" stroke="#C4B5FD" stroke-width="2" opacity="0.6" stroke-dasharray="5,4"/>
  <polygon points="250,308 256,316 262,308" fill="#C4B5FD" opacity="0.7"/>
</svg>