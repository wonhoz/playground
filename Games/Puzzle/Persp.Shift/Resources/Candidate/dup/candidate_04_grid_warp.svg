<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Warped grid lines (perspective) -->
  <!-- Horizontal lines warped toward vanishing point -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#ff6b00" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="230" x2="412" y2="230" stroke="#ff6b00" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="260" x2="392" y2="260" stroke="#ff7a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="290" x2="432" y2="290" stroke="#ff7a1a" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="320" x2="452" y2="320" stroke="#ff8c33" stroke-width="2.5" opacity="0.8"/>
  <line x1="40" y1="350" x2="472" y2="350" stroke="#ff9500" stroke-width="3" opacity="0.9"/>
  <!-- Vertical lines converging to vanishing point -->
  <line x1="256" y1="100" x2="130" y2="420" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="100" x2="175" y2="420" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="100" x2="220" y2="420" stroke="#ff7a1a" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="100" x2="256" y2="420" stroke="#ff8c33" stroke-width="2.5" opacity="0.8"/>
  <line x1="256" y1="100" x2="292" y2="420" stroke="#ff7a1a" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="100" x2="337" y2="420" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="100" x2="382" y2="420" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
  <!-- Vanishing point -->
  <circle cx="256" cy="100" r="8" fill="#ff9500"/>
  <circle cx="256" cy="100" r="20" fill="none" stroke="#ff9500" stroke-width="2" opacity="0.6"/>
  <!-- Puzzle piece overlay -->
  <path d="M196 260 Q196 230 226 230 Q226 210 256 210 Q256 210 256 230 Q286 230 286 260 Q286 290 256 290 Q256 310 226 310 Q226 290 196 290 Z" fill="#ff6b00" opacity="0.25" stroke="#ff9500" stroke-width="2"/>
</svg>
