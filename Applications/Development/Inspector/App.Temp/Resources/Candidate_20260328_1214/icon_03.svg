<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#A5D6A7"/>
    </linearGradient>
    <linearGradient id="scopeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004D40"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="lensGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEE58"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="shadow03">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#004D40" flood-opacity="0.4"/>
    </filter>
    <filter id="lensBlur">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg03)" rx="120"/>

  <!-- Decorative dots -->
  <circle cx="160" cy="160" r="40" fill="rgba(255,255,255,0.35)"/>
  <circle cx="864" cy="160" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="160" cy="864" r="28" fill="rgba(255,255,255,0.25)"/>

  <!-- Layer 2: Microscope body -->
  <g filter="url(#shadow03)">
    <!-- Base -->
    <ellipse cx="480" cy="840" rx="200" ry="38" fill="#004D40"/>
    <!-- Vertical arm -->
    <rect x="445" y="440" width="70" height="400" rx="35" fill="url(#scopeGrad)"/>
    <!-- Horizontal arm -->
    <rect x="370" y="390" width="260" height="70" rx="35" fill="url(#scopeGrad)"/>
    <!-- Eyepiece -->
    <rect x="570" y="230" width="60" height="180" rx="30" fill="#00796B"/>
    <ellipse cx="600" cy="225" rx="48" ry="28" fill="#00897B"/>
    <!-- Objective lens tube -->
    <rect x="420" y="440" width="100" height="180" rx="20" fill="#00796B"/>
    <!-- Lens bottom (glowing) -->
    <circle cx="470" cy="640" r="70" fill="url(#lensGlow)" filter="url(#lensBlur)"/>
    <circle cx="470" cy="640" r="56" fill="#FFF9C4" stroke="#FFB300" stroke-width="10"/>
    <!-- Stage platform -->
    <rect x="330" y="670" width="280" height="24" rx="12" fill="#00695C"/>
  </g>

  <!-- Layer 3: EXE on slide under lens -->
  <rect x="372" y="694" width="196" height="100" rx="12" fill="rgba(255,255,255,0.92)" stroke="#FFB300" stroke-width="6"/>
  <text x="470" y="752" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#E65100" text-anchor="middle" dominant-baseline="middle">.EXE</text>

  <!-- Crosshair in lens -->
  <line x1="470" y1="600" x2="470" y2="680" stroke="rgba(0,77,64,0.5)" stroke-width="4"/>
  <line x1="430" y1="640" x2="510" y2="640" stroke="rgba(0,77,64,0.5)" stroke-width="4"/>
  <circle cx="470" cy="640" r="20" fill="none" stroke="rgba(0,77,64,0.5)" stroke-width="4"/>

  <!-- Label -->
  <text x="512" y="930" font-family="Arial,sans-serif" font-size="62" font-weight="bold" fill="#004D40" text-anchor="middle">INSPECT</text>
</svg>
