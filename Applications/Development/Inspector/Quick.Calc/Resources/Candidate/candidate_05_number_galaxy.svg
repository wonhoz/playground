<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000005"/>
      <stop offset="100%" stop-color="#05001a"/>
    </linearGradient>
    <radialGradient id="galaxyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#ffd200" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#8E54E9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000005" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Galaxy spiral arms (abstract) -->
  <path d="M256,256 Q320,200 380,240 Q420,260 400,310 Q370,360 310,350 Q260,340 240,300" fill="none" stroke="#8E54E9" stroke-width="18" opacity="0.15"/>
  <path d="M256,256 Q190,310 135,270 Q95,245 115,195 Q145,145 205,158 Q255,168 268,210" fill="none" stroke="#4776E6" stroke-width="18" opacity="0.15"/>

  <!-- Galaxy core glow -->
  <circle cx="256" cy="256" r="120" fill="url(#galaxyCore)"/>
  <circle cx="256" cy="256" r="30" fill="#ffffff" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="12" fill="#ffffff" filter="url(#glow)"/>

  <!-- Orbiting number particles -->
  <!-- Orbit ring 1 -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="326" cy="256" r="9" fill="#ee0979" filter="url(#glow)"/>
  <circle cx="186" cy="256" r="9" fill="#56CCF2" filter="url(#glow)"/>
  <circle cx="256" cy="186" r="9" fill="#ffd200" filter="url(#glow)"/>
  <circle cx="256" cy="326" r="9" fill="#56ab2f" filter="url(#glow)"/>

  <!-- Orbit ring 2 -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="376" cy="256" r="11" fill="#8E54E9" filter="url(#glow)"/>
  <circle cx="136" cy="256" r="11" fill="#f7971e" filter="url(#glow)"/>
  <circle cx="256" cy="136" r="11" fill="#56CCF2" filter="url(#glow)"/>
  <circle cx="256" cy="376" r="11" fill="#ee0979" filter="url(#glow)"/>
  <!-- Diagonal orbit positions -->
  <circle cx="341" cy="171" r="8" fill="#ffd200" opacity="0.8" filter="url(#glow)"/>
  <circle cx="171" cy="341" r="8" fill="#56ab2f" opacity="0.8" filter="url(#glow)"/>
  <circle cx="171" cy="171" r="8" fill="#ff6a00" opacity="0.8" filter="url(#glow)"/>
  <circle cx="341" cy="341" r="8" fill="#8E54E9" opacity="0.8" filter="url(#glow)"/>

  <!-- Background stars -->
  <circle cx="100" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="400" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="430" cy="420" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="460" cy="200" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="50" cy="250" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="60" r="1" fill="#ffd200" opacity="0.7"/>
  <circle cx="380" cy="450" r="1.5" fill="#56CCF2" opacity="0.6"/>
  <circle cx="460" cy="350" r="1" fill="#8E54E9" opacity="0.7"/>
  <circle cx="60" cy="150" r="2" fill="#ee0979" opacity="0.5"/>

  <!-- Math operator symbols as star dots -->
  <circle cx="200" cy="200" r="5" fill="#ffd200" opacity="0.6" filter="url(#glow)"/>
  <line x1="197" y1="200" x2="203" y2="200" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="197" x2="200" y2="203" stroke="#ffd200" stroke-width="1.5" opacity="0.6"/>

  <circle cx="312" cy="200" r="5" fill="#ee0979" opacity="0.6" filter="url(#glow)"/>
  <line x1="309" y1="200" x2="315" y2="200" stroke="#ee0979" stroke-width="1.5" opacity="0.6"/>

  <circle cx="200" cy="312" r="5" fill="#56CCF2" opacity="0.6" filter="url(#glow)"/>
  <line x1="197" y1="310" x2="203" y2="310" stroke="#56CCF2" stroke-width="1.5" opacity="0.6"/>
  <line x1="197" y1="314" x2="203" y2="314" stroke="#56CCF2" stroke-width="1.5" opacity="0.6"/>

  <circle cx="312" cy="312" r="5" fill="#56ab2f" opacity="0.6" filter="url(#glow)"/>
  <line x1="309" y1="308" x2="315" y2="316" stroke="#56ab2f" stroke-width="1.5" opacity="0.6"/>
  <line x1="315" y1="308" x2="309" y2="316" stroke="#56ab2f" stroke-width="1.5" opacity="0.6"/>
</svg>
