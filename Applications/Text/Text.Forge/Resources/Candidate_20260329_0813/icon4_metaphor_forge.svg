<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - deep night sky with fire glow -->
  <defs>
    <radialGradient id="bg4" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#3D1A00"/>
      <stop offset="45%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="fire_core" cx="50%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FF3D00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="fire_glow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#FF5722" flood-opacity="0.85"/>
    </filter>
    <filter id="ember">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#FFD54F" flood-opacity="1.0"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg4)"/>
  <rect width="1024" height="1024" rx="180" fill="url(#fire_core)"/>

  <!-- Layer 2: Main Object - Forge furnace scene -->
  <!-- Forge body / furnace structure -->
  <rect x="262" y="480" width="500" height="320" rx="20" fill="#1C1008"/>
  <!-- Forge arch opening (fire chamber) -->
  <ellipse cx="512" cy="480" rx="200" ry="120" fill="#0A0500"/>
  <!-- Arch brick outline -->
  <path d="M312,480 Q312,260 512,260 Q712,260 712,480" fill="none" stroke="#3D2008" stroke-width="28"/>

  <!-- Fire flames inside furnace -->
  <!-- Core flame (bright) -->
  <ellipse cx="512" cy="520" rx="110" ry="160" fill="#FF6D00" filter="url(#fire_glow)" opacity="0.85"/>
  <!-- Inner flame (yellow-white) -->
  <ellipse cx="512" cy="540" rx="65" ry="110" fill="#FFD54F" opacity="0.7"/>
  <!-- Tip flame -->
  <ellipse cx="512" cy="390" rx="35" ry="80" fill="#FF8C00" opacity="0.6"/>

  <!-- Forge platform/hearth -->
  <rect x="262" y="780" width="500" height="34" rx="10" fill="#2A1808"/>
  <rect x="220" y="810" width="584" height="28" rx="10" fill="#1E1206"/>
  <rect x="180" y="836" width="664" height="22" rx="10" fill="#161004"/>

  <!-- Left and right brick pillars -->
  <rect x="262" y="480" width="70" height="300" rx="0" fill="#251408"/>
  <rect x="692" y="480" width="70" height="300" rx="0" fill="#251408"/>

  <!-- Mortar/brick texture lines on pillars -->
  <line x1="262" y1="540" x2="332" y2="540" stroke="#1A0D00" stroke-width="3"/>
  <line x1="262" y1="600" x2="332" y2="600" stroke="#1A0D00" stroke-width="3"/>
  <line x1="262" y1="660" x2="332" y2="660" stroke="#1A0D00" stroke-width="3"/>
  <line x1="692" y1="540" x2="762" y2="540" stroke="#1A0D00" stroke-width="3"/>
  <line x1="692" y1="600" x2="762" y2="600" stroke="#1A0D00" stroke-width="3"/>
  <line x1="692" y1="660" x2="762" y2="660" stroke="#1A0D00" stroke-width="3"/>

  <!-- Layer 3: Detail - Code symbols being forged in fire -->
  <!-- Text glowing in the flames -->
  <text x="418" y="530" font-family="Consolas, monospace" font-size="96" font-weight="bold"
        fill="#FFFFFF" filter="url(#fire_glow)" opacity="0.9">Tx</text>

  <!-- Floating ember code symbols -->
  <!-- Rising embers as code chars -->
  <text x="360" y="350" font-family="Consolas, monospace" font-size="52" font-weight="bold"
        fill="#FFA000" opacity="0.7">{}</text>
  <text x="560" y="310" font-family="Consolas, monospace" font-size="46" font-weight="bold"
        fill="#4FC3F7" opacity="0.6">#</text>
  <text x="640" y="360" font-family="Consolas, monospace" font-size="44" font-weight="bold"
        fill="#CE93D8" opacity="0.55">.*</text>
  <text x="266" y="400" font-family="Consolas, monospace" font-size="40" font-weight="bold"
        fill="#80DEEA" opacity="0.5">[]</text>

  <!-- Ember particles -->
  <circle cx="460" cy="260" r="8" fill="#FFD54F" filter="url(#ember)"/>
  <circle cx="520" cy="225" r="6" fill="#FF8C00" filter="url(#ember)"/>
  <circle cx="575" cy="255" r="9" fill="#FFD54F" filter="url(#ember)"/>
  <circle cx="410" cy="210" r="5" fill="#FFA000" opacity="0.8"/>
  <circle cx="620" cy="220" r="7" fill="#FF8C00" opacity="0.75"/>
  <circle cx="490" cy="185" r="4" fill="#FFD54F" opacity="0.7"/>
  <circle cx="545" cy="170" r="6" fill="#FFE082" opacity="0.65"/>
  <circle cx="480" cy="145" r="4" fill="#FF8C00" opacity="0.55"/>
</svg>
