<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic.Forge - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    color: #FF6B6B;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: #252525;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: #FF6B6B;
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 12px;
    color: #ccc;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Mosaic.Forge</h1>
<p class="subtitle">이미지 모자이크·픽셀 아트 생성기 — Icon Candidates (10)</p>
<div class="grid">
  <div class="card">
    <img src="candidate_01_pixel_grid.svg" alt="01 pixel_grid">
    <div class="card-num">#01</div>
    <div class="card-name">pixel_grid</div>
  </div>
  <div class="card">
    <img src="candidate_02_rainbow_tiles.svg" alt="02 rainbow_tiles">
    <div class="card-num">#02</div>
    <div class="card-name">rainbow_tiles</div>
  </div>
  <div class="card">
    <img src="candidate_03_forge_hammer.svg" alt="03 forge_hammer">
    <div class="card-num">#03</div>
    <div class="card-name">forge_hammer</div>
  </div>
  <div class="card">
    <img src="candidate_04_ocean_mosaic.svg" alt="04 ocean_mosaic">
    <div class="card-num">#04</div>
    <div class="card-name">ocean_mosaic</div>
  </div>
  <div class="card">
    <img src="candidate_05_golden_portrait.svg" alt="05 golden_portrait">
    <div class="card-num">#05</div>
    <div class="card-name">golden_portrait</div>
  </div>
  <div class="card">
    <img src="candidate_06_neon_mosaic.svg" alt="06 neon_mosaic">
    <div class="card-num">#06</div>
    <div class="card-name">neon_mosaic</div>
  </div>
  <div class="card">
    <img src="candidate_07_earth_terrain.svg" alt="07 earth_terrain">
    <div class="card-num">#07</div>
    <div class="card-name">earth_terrain</div>
  </div>
  <div class="card">
    <img src="candidate_08_stained_glass.svg" alt="08 stained_glass">
    <div class="card-num">#08</div>
    <div class="card-name">stained_glass</div>
  </div>
  <div class="card">
    <img src="candidate_09_retro_camera.svg" alt="09 retro_camera">
    <div class="card-num">#09</div>
    <div class="card-name">retro_camera</div>
  </div>
  <div class="card">
    <img src="candidate_10_crystal_pixel.svg" alt="10 crystal_pixel">
    <div class="card-num">#10</div>
    <div class="card-name">crystal_pixel</div>
  </div>
</div>
</body>
</html>
