    <text x="299" y="492" font-family="'Segoe UI',Arial" font-size="88" font-weight="900" fill="#2ECC71" text-anchor="middle">I</text>

    <rect x="373" y="392" width="136" height="136" rx="7" fill="#1A3A2A"/>
    <rect x="373" y="392" width="136" height="136" rx="7" fill="none" stroke="#2ECC71" stroke-width="4"/>
    <text x="441" y="492" font-family="'Segoe UI',Arial" font-size="88" font-weight="900" fill="#2ECC71" text-anchor="middle">N</text>

    <rect x="515" y="392" width="136" height="136" rx="7" fill="#111"/>
    <rect x="657" y="392" width="136" height="136" rx="7" fill="#111"/>
