  <rect x="200" y="280" width="624" height="70" rx="8" fill="#CE93D8"/>
  <rect x="200" y="358" width="624" height="70" rx="8" fill="#CE93D8" opacity="0.8"/>
  <rect x="200" y="436" width="624" height="70" rx="8" fill="#CE93D8" opacity="0.6"/>
  <rect x="200" y="514" width="624" height="70" rx="8" fill="#4A148C"/>
  <rect x="200" y="592" width="624" height="70" rx="8" fill="#4A148C" opacity="0.8"/>
  <rect x="200" y="670" width="624" height="70" rx="8" fill="#4A148C" opacity="0.5"/>
  <!-- Pixel grid overlay (vertical segments) -->
  <line x1="276" y1="280" x2="276" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="352" y1="280" x2="352" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="428" y1="280" x2="428" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="504" y1="280" x2="504" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="580" y1="280" x2="580" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="656" y1="280" x2="656" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <line x1="732" y1="280" x2="732" y2="740" stroke="#030005" stroke-width="4" opacity="0.4"/>
  <!-- Highlight blocks (selected pixels) -->
  <rect x="204" y="284" width="68" height="62" rx="4" fill="#CE93D8" stroke="#030005" stroke-width="4"/>
  <rect x="432" y="440" width="68" height="62" rx="4" fill="#030005" stroke="#CE93D8" stroke-width="4"/>
  <rect x="584" y="518" width="68" height="62" rx="4" fill="#CE93D8" stroke="#030005" stroke-width="4"/>
