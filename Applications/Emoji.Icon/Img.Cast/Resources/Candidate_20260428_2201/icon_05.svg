<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF59D"/>
      <stop offset="1" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="cham" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E91E63"/>
      <stop offset="0.33" stop-color="#FF9800"/>
      <stop offset="0.66" stop-color="#4CAF50"/>
      <stop offset="1" stop-color="#2196F3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g5)"/>
  <!-- branch -->
  <path d="M 80 720 Q 320 700 540 660 Q 760 620 920 540" stroke="#5D4037" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- chameleon body -->
  <g>
    <!-- tail curl -->
    <path d="M 760 540 Q 880 540 880 660 Q 880 760 780 760 Q 720 760 720 700" stroke="url(#cham)" stroke-width="48" fill="none" stroke-linecap="round"/>
    <!-- body -->
    <path d="M 230 600 Q 200 480 320 460 Q 480 430 620 470 Q 760 510 770 580 Q 760 650 600 660 Q 440 670 320 660 Q 240 650 230 600 Z" fill="url(#cham)" stroke="#3E2723" stroke-width="14"/>
    <!-- legs -->
    <path d="M 320 660 L 320 770 M 290 770 L 350 770" stroke="#3E2723" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M 540 660 L 540 770 M 510 770 L 570 770" stroke="#3E2723" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- head bump (eye area) -->
    <ellipse cx="240" cy="540" rx="80" ry="70" fill="url(#cham)" stroke="#3E2723" stroke-width="14"/>
    <!-- crest -->
    <path d="M 220 470 L 240 420 L 260 470" stroke="#3E2723" stroke-width="12" fill="#FFEB3B"/>
    <!-- eye (file icon dot) -->
    <circle cx="220" cy="540" r="32" fill="#FFFFFF" stroke="#3E2723" stroke-width="10"/>
    <circle cx="220" cy="540" r="14" fill="#3E2723"/>
    <!-- mouth -->
    <path d="M 170 580 L 220 580" stroke="#3E2723" stroke-width="10" stroke-linecap="round"/>
    <!-- tongue with file -->
    <path d="M 175 580 Q 90 600 70 540" stroke="#E91E63" stroke-width="14" fill="none" stroke-linecap="round"/>
    <rect x="40" y="500" width="80" height="60" rx="8" fill="#FFFFFF" stroke="#3E2723" stroke-width="8"/>
    <text x="80" y="544" font-family="Verdana, sans-serif" font-size="26" font-weight="900" text-anchor="middle" fill="#3E2723">SVG</text>
  </g>
</svg>
