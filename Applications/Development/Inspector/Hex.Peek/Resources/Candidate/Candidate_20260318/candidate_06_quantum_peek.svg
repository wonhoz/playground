<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000f0a"/>
      <stop offset="100%" stop-color="#001a10"/>
    </linearGradient>
    <radialGradient id="quantum" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#quantum)"/>
  <!-- Quantum orbital paths -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4" transform="rotate(120 256 256)"/>
  <!-- Nucleus (central hex data display) -->
  <circle cx="256" cy="256" r="50" fill="#001a10" stroke="#10B981" stroke-width="2"/>
  <text x="256" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">FF A3</text>
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#34D399">4B 0E</text>
  <text x="256" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">C2 88</text>
  <!-- Orbiting electrons (byte values) -->
  <!-- Orbit 1 electrons -->
  <circle cx="76" cy="256" r="10" fill="#10B981" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="76" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="white">A0</text>
  <circle cx="436" cy="256" r="10" fill="#059669" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="436" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="white">3B</text>
  <!-- Orbit 2 electrons (rotated 60°) -->
  <circle cx="346" cy="152" r="10" fill="#10B981" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="346" y="156" text-anchor="middle" font-family="monospace" font-size="7" fill="white">D1</text>
  <circle cx="166" cy="360" r="10" fill="#059669" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="166" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="white">88</text>
  <!-- Orbit 3 electrons (rotated 120°) -->
  <circle cx="346" cy="360" r="10" fill="#10B981" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="346" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="white">5F</text>
  <circle cx="166" cy="152" r="10" fill="#059669" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="166" y="156" text-anchor="middle" font-family="monospace" font-size="7" fill="white">C7</text>
  <!-- Labels -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="12" fill="#10B981" opacity="0.7">QUANTUM BYTE</text>
</svg>
