<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#0F0A1E"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="160" cy="70" r="3" fill="white" opacity="0.9"/>
  <circle cx="320" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="420" cy="100" r="2" fill="white" opacity="0.8"/>
  <circle cx="440" cy="60" r="3" fill="white" opacity="0.6"/>
  <circle cx="380" cy="140" r="2" fill="white" opacity="0.9"/>
  <circle cx="70" cy="150" r="2" fill="white" opacity="0.7"/>
  <circle cx="460" cy="200" r="2" fill="white" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="370" cy="130" r="55" fill="url(#moon)"/>
  <circle cx="395" cy="110" r="45" fill="#0F0A1E" opacity="0.85"/>
  <!-- Open book / manga on a desk -->
  <rect x="70" y="300" width="372" height="20" rx="4" fill="#1E1B4B" opacity="0.8"/>
  <!-- Left page -->
  <path d="M100 200 Q100 180 120 180 L248 180 L248 295 Q190 290 120 295 Q100 292 100 280 Z" fill="#F8F4FF" opacity="0.92"/>
  <!-- Right page -->
  <path d="M264 180 L392 180 Q412 180 412 200 L412 280 Q412 292 392 295 Q322 290 264 295 Z" fill="#F8F4FF" opacity="0.88"/>
  <!-- Spine glow -->
  <rect x="248" y="180" width="16" height="115" fill="#818CF8"/>
  <!-- Comic panels on left -->
  <rect x="115" y="196" width="60" height="55" rx="3" fill="#818CF8" opacity="0.3"/>
  <rect x="182" y="196" width="56" height="55" rx="3" fill="#818CF8" opacity="0.3"/>
  <rect x="115" y="259" width="123" height="26" rx="3" fill="#818CF8" opacity="0.3"/>
  <!-- Image on right -->
  <rect x="278" y="196" width="120" height="85" rx="3" fill="#818CF8" opacity="0.3"/>
  <!-- Moon reflection in book -->
  <circle cx="335" cy="235" r="28" fill="#F59E0B" opacity="0.15"/>
  <!-- Reading lamp glow -->
  <circle cx="256" cy="290" r="40" fill="#F59E0B" opacity="0.08"/>
  <!-- Stars sparkle near moon -->
  <polygon points="370,90 372,96 378,96 373,100 375,106 370,102 365,106 367,100 362,96 368,96" fill="#FFF9C4" opacity="0.8" transform="scale(0.7) translate(160,50)"/>
</svg>
