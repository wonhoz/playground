<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: metaphor · 실루엣/캐릭터 · 파일에 번개 아이콘이 붙어 즉시 실행 -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE082"/>
      <stop offset="1" stop-color="#FFAB00"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg08)"/>
  <!-- 큰 파일 -->
  <g>
    <path d="M 220 180 L 620 180 L 780 340 L 780 860 L 220 860 Z" fill="#FFFFFF" stroke="#4E342E" stroke-width="20" stroke-linejoin="round"/>
    <path d="M 620 180 L 620 340 L 780 340" fill="none" stroke="#4E342E" stroke-width="20" stroke-linejoin="round"/>
    <!-- 파일 내용 줄 -->
    <rect x="280" y="420" width="440" height="18" rx="8" fill="#4E342E"/>
    <rect x="280" y="460" width="380" height="18" rx="8" fill="#4E342E"/>
    <rect x="280" y="500" width="420" height="18" rx="8" fill="#4E342E"/>
    <rect x="280" y="540" width="350" height="18" rx="8" fill="#4E342E"/>
    <rect x="280" y="580" width="400" height="18" rx="8" fill="#4E342E"/>
    <rect x="280" y="620" width="300" height="18" rx="8" fill="#4E342E"/>
    <!-- 프롬프트 라인 -->
    <text x="280" y="740" font-family="Consolas, monospace" font-weight="700" font-size="54" fill="#E65100">&gt;_ claude</text>
  </g>
  <!-- 번개 배지 (우상단) -->
  <g transform="translate(680 100)">
    <circle cx="80" cy="80" r="110" fill="#4A148C" stroke="#FFD93D" stroke-width="14"/>
    <path d="M 74 20 L 130 20 L 96 82 L 138 82 L 60 170 L 94 100 L 50 100 Z" fill="#FFD93D" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round"/>
  </g>
  <!-- 하단 라벨 -->
  <rect x="222" y="890" width="580" height="110" rx="40" fill="#4E342E"/>
  <text x="512" y="965" font-family="Arial Black, sans-serif" font-weight="900" font-size="74" fill="#FFD93D" text-anchor="middle">INSTANT CLAUDE</text>
</svg>
