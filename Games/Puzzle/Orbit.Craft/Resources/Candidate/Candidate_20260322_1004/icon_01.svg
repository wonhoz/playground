<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- LAYER 1: 배경 -->
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#060C1F"/>
    </radialGradient>
    <radialGradient id="planet01" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="60%" stop-color="#E05A00"/>
      <stop offset="100%" stop-color="#8B2A00"/>
    </radialGradient>
    <radialGradient id="target01" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC6600"/>
    </radialGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg01)"/>

  <!-- 별들 -->
  <circle cx="210" cy="200" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="350" cy="160" r="1.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="780" cy="220" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="860" cy="310" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="150" cy="400" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="900" cy="700" r="2.2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="820" cy="820" r="1.8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="280" cy="840" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="170" cy="750" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="440" cy="880" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="600" cy="180" r="1.8" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="930" cy="500" r="1.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="95" cy="580" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="480" cy="920" r="1.5" fill="#FFEEAA" opacity="0.4"/>

  <!-- LAYER 2: 메인 오브젝트 -->

  <!-- 중간 중력 행성 (크고 어두운 행성) -->
  <circle cx="580" cy="540" r="105" fill="url(#planet01)" filter="url(#softglow)"/>
  <!-- 행성 표면 디테일 -->
  <ellipse cx="555" cy="510" rx="60" ry="18" fill="#FF6A00" opacity="0.4" transform="rotate(-20,555,510)"/>
  <ellipse cx="600" cy="570" rx="45" ry="12" fill="#8B2A00" opacity="0.35" transform="rotate(10,600,570)"/>

  <!-- 목표 행성 (작고 골드) -->
  <circle cx="720" cy="280" r="68" fill="url(#target01)" filter="url(#softglow)"/>
  <!-- 목표 행성 링 -->
  <ellipse cx="720" cy="280" rx="100" ry="22" fill="none" stroke="#FFD700" stroke-width="5" opacity="0.7" transform="rotate(-15,720,280)"/>

  <!-- 궤도 안착 궤도선 (목표 행성 주위) -->
  <ellipse cx="720" cy="280" rx="115" ry="115" fill="none" stroke="#FFD700" stroke-width="3" stroke-dasharray="12 8" opacity="0.5"/>

  <!-- 중력에 의해 휘어지는 우주선 경로 (곡선) -->
  <!-- 발사 시점: 좌하단 → 중력 행성 근처 → 목표 행성 궤도 -->
  <path d="M 260 780 Q 400 680 490 590 Q 560 530 600 440 Q 650 340 720 300"
        fill="none" stroke="#FF6B35" stroke-width="4" stroke-dasharray="16 10" opacity="0.8"/>
  <!-- 경로 끝 화살 방향 -->
  <path d="M 700 292 L 720 272 L 736 296" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 발사 지점 표시 -->
  <circle cx="260" cy="780" r="10" fill="#FF6B35" opacity="0.6"/>
  <circle cx="260" cy="780" r="18" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.4"/>

  <!-- LAYER 3: 우주선 (궤도 안착, 목표 행성 주변) -->
  <!-- 우주선 본체 (목표 궤도 위) - 행성에서 약 115px 거리 -->
  <g transform="translate(720, 168) rotate(30)">
    <!-- 우주선 동체 -->
    <ellipse cx="0" cy="0" rx="14" ry="28" fill="#E8F4FF"/>
    <!-- 노즐 -->
    <path d="M -7 18 L 0 32 L 7 18 Z" fill="#AACCFF"/>
    <!-- 엔진 화염 -->
    <path d="M -5 30 Q 0 48 5 30" fill="#FFD700" opacity="0.9"/>
    <path d="M -3 30 Q 0 40 3 30" fill="#FF8C00" opacity="0.7"/>
    <!-- 날개 -->
    <path d="M -14 4 L -26 18 L -10 14 Z" fill="#AACCFF"/>
    <path d="M 14 4 L 26 18 L 10 14 Z" fill="#AACCFF"/>
    <!-- 창문 -->
    <circle cx="0" cy="-8" r="6" fill="#00CCFF" opacity="0.85"/>
  </g>

  <!-- 중력 장 표시 (행성 주위 희미한 링) -->
  <circle cx="580" cy="540" r="145" fill="none" stroke="#FF8C42" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 12"/>
  <circle cx="580" cy="540" r="185" fill="none" stroke="#FF8C42" stroke-width="1" opacity="0.12" stroke-dasharray="6 14"/>

  <!-- 목표 표시 (체크마크 느낌) -->
  <circle cx="720" cy="280" r="130" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.35" stroke-dasharray="10 10"/>

  <!-- 빛나는 별 포인트 장식 -->
  <g transform="translate(200, 250)" opacity="0.6">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#FFEEAA"/>
  </g>
  <g transform="translate(850, 650)" opacity="0.4">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#FFEEAA"/>
  </g>
</svg>
