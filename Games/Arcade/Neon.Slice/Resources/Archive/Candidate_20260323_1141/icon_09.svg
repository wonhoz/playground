<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 마젠타 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0015"/>
  <!-- Layer 2: 다이아몬드 + 슬라이스 (레이어드) -->
  <!-- 대각선 슬라이스 라인 (전체 가로지름) -->
  <line x1="160" y1="160" x2="864" y2="864" stroke="#FF00FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="160" x2="864" y2="864" stroke="#FF00FF" stroke-width="50" stroke-linecap="round" opacity="0.2"/>
  <!-- 슬라이스된 다이아몬드 상반부 -->
  <polygon points="512,160 760,440 512,490 264,440" fill="#E040FB" opacity="0.9"/>
  <!-- 슬라이스된 다이아몬드 하반부 (아래로 떨어지는) -->
  <polygon points="512,540 760,500 512,864 264,500" fill="#7B1FA2" opacity="0.85"/>
  <!-- 광채 효과 -->
  <line x1="512" y1="160" x2="512" y2="320" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="512" y1="160" x2="612" y2="300" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="512" y1="160" x2="412" y2="300" stroke="white" stroke-width="3" opacity="0.4"/>
  <!-- Layer 3: 보석 아이콘 + 포인트 -->
  <circle cx="512" cy="515" r="20" fill="#FF00FF" opacity="0.9"/>
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#E040FB" text-anchor="middle">GEM CUT</text>
</svg>
