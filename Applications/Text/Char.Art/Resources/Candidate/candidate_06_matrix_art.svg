<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000A00"/>
      <stop offset="100%" stop-color="#001500"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dense character art grid forming a heart shape -->
  <!-- Top row sparse -->
  <text x="130" y="108" font-family="monospace" font-size="16" fill="#00CC33" opacity="0.4">*</text>
  <text x="155" y="108" font-family="monospace" font-size="16" fill="#00FF41" opacity="0.6">@</text>
  <text x="180" y="108" font-family="monospace" font-size="16" fill="#00CC33" opacity="0.5">#</text>
  <text x="310" y="108" font-family="monospace" font-size="16" fill="#00FF41" opacity="0.6">@</text>
  <text x="335" y="108" font-family="monospace" font-size="16" fill="#00CC33" opacity="0.5">#</text>
  <text x="360" y="108" font-family="monospace" font-size="16" fill="#00FF41" opacity="0.4">*</text>
  <!-- Heart rows in bright green -->
  <text x="100" y="140" font-family="monospace" font-size="16" fill="#00FF41">@@@@</text>
  <text x="200" y="140" font-family="monospace" font-size="16" fill="#00CC33">####</text>
  <text x="300" y="140" font-family="monospace" font-size="16" fill="#00FF41">@@@@</text>
  <text x="80" y="164" font-family="monospace" font-size="16" fill="#00FF41">@@@@@@</text>
  <text x="196" y="164" font-family="monospace" font-size="16" fill="#00CC33">########</text>
  <text x="316" y="164" font-family="monospace" font-size="16" fill="#00FF41">@@@@@@</text>
  <text x="80" y="188" font-family="monospace" font-size="16" fill="#00FF41">@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
  <text x="80" y="212" font-family="monospace" font-size="16" fill="#39FF14">**************************</text>
  <text x="96" y="236" font-family="monospace" font-size="16" fill="#00FF41">######################</text>
  <text x="112" y="260" font-family="monospace" font-size="16" fill="#00CC33">##################</text>
  <text x="128" y="284" font-family="monospace" font-size="16" fill="#00FF41">##############</text>
  <text x="144" y="308" font-family="monospace" font-size="16" fill="#39FF14">##########</text>
  <text x="168" y="332" font-family="monospace" font-size="16" fill="#00FF41">######</text>
  <text x="236" y="352" font-family="monospace" font-size="16" fill="#00CC33">##</text>
  <!-- Label -->
  <text x="256" y="415" font-family="monospace" font-size="16" fill="#00FF41" text-anchor="middle">char by char</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#00FF41" text-anchor="middle">Char.Art</text>
</svg>
