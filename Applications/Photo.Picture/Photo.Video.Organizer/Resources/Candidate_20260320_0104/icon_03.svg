<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Sorted Stack: organized media -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Stack of organized cards/photos -->
  <!-- Bottom card (shadow) -->
  <rect x="240" y="580" width="560" height="160" rx="20" fill="#2D0060" transform="rotate(-6 512 660)"/>
  <!-- Middle card -->
  <rect x="240" y="560" width="560" height="160" rx="20" fill="#4A148C" transform="rotate(-2 512 640)"/>
  <!-- Top card -->
  <rect x="240" y="540" width="560" height="160" rx="20" fill="#7B1FA2"/>
  <!-- Landscape photo lines on top card -->
  <rect x="270" y="566" width="200" height="108" rx="10" fill="#CE93D8" opacity="0.3"/>
  <circle cx="320" cy="596" r="18" fill="#CE93D8" opacity="0.7"/>
  <path d="M270 640 L350 610 L420 650 L470 620 L500 640 L500 674 L270 674 Z" fill="#CE93D8" opacity="0.5"/>
  <!-- Sort arrow indicator -->
  <path d="M512 200 L590 330 L512 310 L512 420 L434 420 L434 310 L356 330 Z" fill="#CE93D8"/>
  <!-- Checkmark on sorted stack -->
  <circle cx="720" cy="610" r="60" fill="#CE93D8"/>
  <path d="M688 610 L710 634 L756 584" stroke="#080010" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
