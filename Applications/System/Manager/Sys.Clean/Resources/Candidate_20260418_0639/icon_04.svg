<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="vortex04" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: 소용돌이 (청소 흡입) -->
  <circle cx="512" cy="512" r="240" fill="url(#vortex04)"/>
  <!-- 소용돌이 원호들 -->
  <path d="M 512 280 A 230 230 0 0 1 742 512" fill="none" stroke="#42A5F5" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <path d="M 742 512 A 200 200 0 0 1 512 712" fill="none" stroke="#42A5F5" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <path d="M 512 712 A 160 160 0 0 1 312 512" fill="none" stroke="#90CAF9" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <!-- 중앙 흡입구 -->
  <circle cx="512" cy="512" r="70" fill="#E3F2FD"/>
  <circle cx="512" cy="512" r="44" fill="#1565C0"/>
  <!-- Layer 3: 날아오는 쓰레기들 (소용돌이로 빨려들어가는) -->
  <!-- 파일 아이콘들 -->
  <rect x="240" y="240" width="90" height="70" rx="10" fill="#FF8F00" opacity="0.85" transform="rotate(20 285 275)"/>
  <text x="285" y="284" font-family="Arial, sans-serif" font-size="30" fill="white" text-anchor="middle">tmp</text>
  <rect x="680" y="220" width="90" height="70" rx="10" fill="#EF5350" opacity="0.8" transform="rotate(-15 725 255)"/>
  <text x="725" y="264" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">log</text>
  <rect x="200" y="640" width="90" height="70" rx="10" fill="#AB47BC" opacity="0.8" transform="rotate(10 245 675)"/>
  <text x="245" y="684" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">cache</text>
  <rect x="700" y="660" width="80" height="64" rx="10" fill="#26A69A" opacity="0.8" transform="rotate(-20 740 692)"/>
  <text x="740" y="701" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle">reg</text>
  <!-- 화살표 (소용돌이 방향) -->
  <polygon points="512,286 498,316 526,316" fill="#FDD835" opacity="0.9"/>
