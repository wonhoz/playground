<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 노랑+라임 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A825"/>
      <stop offset="100%" style="stop-color:#8BC34A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: 사진 더미(왼쪽) → 정돈된 앨범 선반(오른쪽) -->
  <!-- 왼쪽: 흩어진 사진 더미 -->
  <g>
    <rect x="80" y="380" width="200" height="140" rx="12" fill="white" opacity="0.85" transform="rotate(-12 180 450)"/>
    <rect x="90" y="390" width="180" height="100" rx="8" fill="#FFCC80" transform="rotate(-12 180 450)"/>
    <rect x="100" y="440" width="200" height="140" rx="12" fill="white" opacity="0.85" transform="rotate(8 200 510)"/>
    <rect x="110" y="450" width="180" height="100" rx="8" fill="#B2DFDB" transform="rotate(8 200 510)"/>
    <rect x="70" y="500" width="200" height="140" rx="12" fill="white" opacity="0.8" transform="rotate(-4 170 570)"/>
    <rect x="80" y="510" width="180" height="100" rx="8" fill="#F48FB1" transform="rotate(-4 170 570)"/>
  </g>
  <!-- 중앙 화살표 -->
  <path d="M 330 500 L 490 500" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M 460 466 L 500 500 L 460 534" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 오른쪽: 앨범 선반 (수직 탭 폴더들) -->
  <!-- 선반 배경 -->
  <rect x="520" y="260" width="384" height="560" rx="20" fill="white" opacity="0.92"/>
  <!-- 선반 구분선 -->
  <line x1="540" y1="340" x2="884" y2="340" stroke="#EEE" stroke-width="4"/>
  <line x1="540" y1="440" x2="884" y2="440" stroke="#EEE" stroke-width="4"/>
  <line x1="540" y1="540" x2="884" y2="540" stroke="#EEE" stroke-width="4"/>
  <line x1="540" y1="640" x2="884" y2="640" stroke="#EEE" stroke-width="4"/>
  <line x1="540" y1="740" x2="884" y2="740" stroke="#EEE" stroke-width="4"/>
  <!-- 연도/월별 탭 -->
  <rect x="540" y="270" width="64" height="64" rx="10" fill="#FFA000"/>
  <text x="572" y="312" font-family="Segoe UI, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">24</text>
  <text x="650" y="306" font-family="Segoe UI, sans-serif" font-size="40" font-weight="bold" fill="#E65100">2024</text>
  <text x="830" y="306" font-family="Consolas, monospace" font-size="30" fill="#888">47 files</text>
  <rect x="540" y="354" width="64" height="64" rx="10" fill="#66BB6A"/>
  <text x="572" y="396" font-family="Segoe UI, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">05</text>
  <text x="650" y="390" font-family="Segoe UI, sans-serif" font-size="40" fill="#2E7D32">2024-05</text>
  <text x="830" y="390" font-family="Consolas, monospace" font-size="30" fill="#888">12 files</text>
  <rect x="540" y="454" width="64" height="64" rx="10" fill="#42A5F5"/>
  <text x="572" y="496" font-family="Segoe UI, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">06</text>
  <text x="650" y="490" font-family="Segoe UI, sans-serif" font-size="40" fill="#1565C0">2024-06</text>
  <text x="830" y="490" font-family="Consolas, monospace" font-size="30" fill="#888">18 files</text>
  <rect x="540" y="554" width="64" height="64" rx="10" fill="#FF7043"/>
  <text x="572" y="596" font-family="Segoe UI, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">07</text>
  <text x="650" y="590" font-family="Segoe UI, sans-serif" font-size="40" fill="#BF360C">2024-07</text>
  <text x="830" y="590" font-family="Consolas, monospace" font-size="30" fill="#888">17 files</text>
  <!-- Layer 3: 체크 완료 표시 -->
  <text x="512" y="890" font-family="Segoe UI, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">✓ 47 files sorted!</text>
