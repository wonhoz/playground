<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="n1-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="n1-glow1" cx="38%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n1-glow2" cx="62%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#FF2D78" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#n1-clip)">
    <!-- Background: near-black -->
    <rect width="1024" height="1024" fill="#06080F"/>
    <!-- Grid lines (cyberpunk) -->
    <g stroke="#00CFFF" stroke-width="0.8" opacity="0.08">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="682" x2="1024" y2="682"/>
      <line x1="0" y1="852" x2="1024" y2="852"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="682" y1="0" x2="682" y2="1024"/>
      <line x1="852" y1="0" x2="852" y2="1024"/>
    </g>

    <!-- Glow halos for each half -->
    <ellipse cx="380" cy="512" rx="280" ry="280" fill="url(#n1-glow1)"/>
    <ellipse cx="644" cy="512" rx="280" ry="280" fill="url(#n1-glow2)"/>

    <!-- LEFT HALF (cyan) — clipped to left side -->
    <clipPath id="n1-left">
      <rect x="0" y="0" width="512" height="1024"/>
    </clipPath>
    <g clip-path="url(#n1-left)">
      <!-- Outer glow ring -->
      <circle cx="512" cy="512" r="240" fill="#00FFFF" opacity="0.08"/>
      <circle cx="512" cy="512" r="200" fill="none" stroke="#00FFFF" stroke-width="6" opacity="0.30"/>
      <!-- Body -->
      <circle cx="512" cy="512" r="190" fill="#001F2F" stroke="#00FFFF" stroke-width="4" opacity="0.95"/>
      <!-- Highlight -->
      <ellipse cx="450" cy="440" rx="60" ry="40" fill="#00FFFF" opacity="0.18"/>
    </g>

    <!-- RIGHT HALF (pink) — clipped to right side -->
    <clipPath id="n1-right">
      <rect x="512" y="0" width="512" height="1024"/>
    </clipPath>
    <g clip-path="url(#n1-right)">
      <circle cx="512" cy="512" r="200" fill="none" stroke="#FF2D78" stroke-width="6" opacity="0.30"/>
      <circle cx="512" cy="512" r="190" fill="#2A0015" stroke="#FF2D78" stroke-width="4" opacity="0.95"/>
      <ellipse cx="574" cy="440" rx="60" ry="40" fill="#FF2D78" opacity="0.18"/>
    </g>

    <!-- Slice line (vertical white streak) -->
    <line x1="512" y1="260" x2="512" y2="762"
          stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
    <!-- Slice sparks -->
    <circle cx="512" cy="512" r="10" fill="#FFFFFF" opacity="0.95"/>
    <line x1="490" y1="490" x2="460" y2="460" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
    <line x1="534" y1="490" x2="564" y2="460" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
    <line x1="490" y1="534" x2="460" y2="564" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.50"/>
    <line x1="534" y1="534" x2="564" y2="564" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.50"/>

    <!-- Small particles -->
    <circle cx="430" cy="510" r="5" fill="#00FFFF" opacity="0.70"/>
    <circle cx="400" cy="490" r="4" fill="#00FFFF" opacity="0.55"/>
    <circle cx="594" cy="510" r="5" fill="#FF2D78" opacity="0.70"/>
    <circle cx="624" cy="490" r="4" fill="#FF2D78" opacity="0.55"/>
    <circle cx="440" cy="550" r="3" fill="#00FFFF" opacity="0.45"/>
    <circle cx="584" cy="550" r="3" fill="#FF2D78" opacity="0.45"/>
  </g>
</svg>
