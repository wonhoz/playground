<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: vivid blue -->
  <rect width="1024" height="1024" rx="190" fill="#2563EB"/>

  <!-- Clipboard shadow -->
  <rect x="256" y="278" width="512" height="556" rx="32" fill="#1D4ED8" opacity="0.5"/>

  <!-- Clipboard body -->
  <rect x="244" y="262" width="512" height="556" rx="32" fill="white"/>

  <!-- Clipboard clip bar -->
  <rect x="370" y="198" width="284" height="110" rx="20" fill="#1E40AF"/>
  <rect x="410" y="216" width="204" height="72" rx="12" fill="#3B82F6"/>
  <circle cx="512" cy="252" r="22" fill="white"/>

  <!-- Path row 1: blue highlight -->
  <rect x="282" y="374" width="440" height="48" rx="10" fill="#DBEAFE"/>
  <text x="298" y="409" font-family="Consolas,monospace" font-size="32" fill="#1E3A5F" font-weight="bold">C:\Users\admin\</text>

  <!-- Path row 2 -->
  <rect x="282" y="436" width="440" height="48" rx="10" fill="#F8FAFF"/>
  <text x="298" y="471" font-family="Consolas,monospace" font-size="30" fill="#4B5563">Documents\</text>

  <!-- Path row 3: highlighted filename -->
  <rect x="282" y="498" width="440" height="48" rx="10" fill="#DBEAFE"/>
  <text x="298" y="533" font-family="Consolas,monospace" font-size="32" fill="#1E3A5F" font-weight="bold">report.pdf</text>

  <!-- Divider line -->
  <line x1="282" y1="566" x2="724" y2="566" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Copied indicator row -->
  <rect x="282" y="578" width="440" height="40" rx="8" fill="#F0FDF4"/>
  <text x="298" y="607" font-family="Consolas,monospace" font-size="26" fill="#15803D">Copied!</text>

  <!-- Green copy badge bottom-right -->
  <circle cx="714" cy="766" r="88" fill="#22C55E"/>
  <circle cx="714" cy="766" r="72" fill="#16A34A"/>
  <!-- Copy icon: two overlapping pages -->
  <rect x="670" y="728" width="52" height="64" rx="8" fill="white" opacity="0.6"/>
  <rect x="690" y="708" width="52" height="64" rx="8" fill="white"/>
  <line x1="706" y1="732" x2="730" y2="732" stroke="#15803D" stroke-width="5" stroke-linecap="round"/>
  <line x1="706" y1="749" x2="730" y2="749" stroke="#15803D" stroke-width="5" stroke-linecap="round"/>
  <line x1="706" y1="766" x2="730" y2="766" stroke="#15803D" stroke-width="5" stroke-linecap="round"/>
</svg>
