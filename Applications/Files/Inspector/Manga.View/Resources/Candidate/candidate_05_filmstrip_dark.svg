<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="film" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Film strip body -->
  <rect x="60" y="140" width="392" height="232" rx="10" fill="url(#film)"/>
  <!-- Film sprocket holes top -->
  <rect x="80" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="128" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="176" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="224" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="272" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="320" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="368" y="150" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <!-- Film sprocket holes bottom -->
  <rect x="80" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="128" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="176" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="224" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="272" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="320" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <rect x="368" y="344" width="24" height="18" rx="4" fill="#0d0d1a"/>
  <!-- Film frames -->
  <rect x="72" y="182" width="100" height="148" rx="4" fill="#0d0d1a"/>
  <rect x="184" y="182" width="100" height="148" rx="4" fill="#0d0d1a"/>
  <rect x="296" y="182" width="100" height="148" rx="4" fill="#0d0d1a"/>
  <!-- Content in frames - gradient fills -->
  <rect x="76" y="186" width="92" height="140" rx="3" fill="url(#glow)" opacity="0.7"/>
  <rect x="188" y="186" width="92" height="140" rx="3" fill="#533483" opacity="0.9"/>
  <rect x="300" y="186" width="92" height="140" rx="3" fill="url(#glow)" opacity="0.4"/>
  <!-- Character silhouettes in frames -->
  <circle cx="122" cy="230" r="18" fill="white" opacity="0.6"/>
  <rect x="110" y="250" width="24" height="40" rx="5" fill="white" opacity="0.6"/>
  <circle cx="234" cy="230" r="18" fill="white" opacity="0.4"/>
  <rect x="222" y="250" width="24" height="40" rx="5" fill="white" opacity="0.4"/>
  <circle cx="346" cy="230" r="18" fill="white" opacity="0.2"/>
  <rect x="334" y="250" width="24" height="40" rx="5" fill="white" opacity="0.2"/>
  <!-- Page number / title at bottom -->
  <text x="256" y="470" font-family="Arial" font-size="28" fill="url(#glow)" text-anchor="middle" font-weight="bold" opacity="0.9">MANGA VIEWER</text>
</svg>
