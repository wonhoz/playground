<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#1A0000"/>
  <!-- 문서들 병합 -->
  <!-- 왼쪽 문서 -->
  <rect x="180" y="280" width="220" height="280" rx="14" fill="#B71C1C" opacity="0.7"/>
  <rect x="208" y="316" width="140" height="12" rx="3" fill="#EF9A9A" opacity="0.5"/>
  <rect x="208" y="340" width="100" height="12" rx="3" fill="#EF9A9A" opacity="0.35"/>
  <!-- 오른쪽 문서 -->
  <rect x="624" y="280" width="220" height="280" rx="14" fill="#B71C1C" opacity="0.7"/>
  <rect x="652" y="316" width="140" height="12" rx="3" fill="#EF9A9A" opacity="0.5"/>
  <rect x="652" y="340" width="100" height="12" rx="3" fill="#EF9A9A" opacity="0.35"/>
  <!-- 병합 화살표 왼쪽→중앙 -->
  <line x1="400" y1="420" x2="500" y2="420" stroke="#EF9A9A" stroke-width="20" stroke-linecap="round"/>
  <polygon points="500,390 560,420 500,450" fill="#EF9A9A"/>
  <!-- 병합 화살표 오른쪽→중앙 -->
  <line x1="624" y1="420" x2="524" y2="420" stroke="#EF9A9A" stroke-width="20" stroke-linecap="round"/>
  <polygon points="524,390 464,420 524,450" fill="#EF9A9A"/>
  <!-- 결과 문서 -->
  <rect x="410" y="600" width="204" height="160" rx="14" fill="#B71C1C"/>
  <rect x="440" y="636" width="130" height="12" rx="3" fill="#EF9A9A" opacity="0.7"/>
  <rect x="440" y="660" width="100" height="12" rx="3" fill="#EF9A9A" opacity="0.5"/>
  <rect x="440" y="684" width="115" height="12" rx="3" fill="#EF9A9A" opacity="0.4"/>
  <!-- 위쪽 화살표 연결 -->
  <line x1="512" y1="600" x2="512" y2="560" stroke="#EF9A9A" stroke-width="14" stroke-linecap="round"/>
  <line x1="460" y1="540" x2="512" y2="560" stroke="#EF9A9A" stroke-width="14" stroke-linecap="round"/>
  <line x1="564" y1="540" x2="512" y2="560" stroke="#EF9A9A" stroke-width="14" stroke-linecap="round"/>
</svg>