<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f57f17"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </radialGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="40%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Impact burst rays -->
  <line x1="256" y1="256" x2="256" y2="60" stroke="#ffff00" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="256" x2="410" y2="130" stroke="#ffff00" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <line x1="256" y1="256" x2="460" y2="256" stroke="#ffff00" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="410" y2="382" stroke="#ffff00" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <line x1="256" y1="256" x2="256" y2="452" stroke="#ffff00" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="256" x2="102" y2="382" stroke="#ff6d00" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <line x1="256" y1="256" x2="52" y2="256" stroke="#ff6d00" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="102" y2="130" stroke="#ff6d00" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <!-- Diagonal shorter rays -->
  <line x1="256" y1="256" x2="340" y2="90" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="450" y2="175" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="440" y2="340" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="340" y2="430" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="172" y2="430" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="72" y2="340" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="62" y2="175" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="256" x2="172" y2="90" stroke="#ffab00" stroke-width="4" opacity="0.6"/>
  <!-- Burst center -->
  <circle cx="256" cy="256" r="80" fill="url(#burst)"/>
  <!-- Fist text/icon in center -->
  <text x="256" y="240" font-family="Arial" font-size="72" text-anchor="middle">👊</text>
  <!-- POW text -->
  <text x="256" y="295" font-family="Arial" font-size="42" font-weight="900" fill="white" text-anchor="middle" stroke="#ff1744" stroke-width="2">POW!</text>
</svg>
