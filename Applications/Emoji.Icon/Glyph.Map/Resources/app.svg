<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0A2A"/>
      <stop offset="100%" stop-color="#050010"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Central large emoji -->
  <text x="256" y="296" text-anchor="middle" fill="white" font-size="160" font-family="Segoe UI Emoji">&#x1F600;</text>
  <!-- Orbiting small emojis -->
  <text x="256" y="115" text-anchor="middle" fill="white" font-size="40" font-family="Segoe UI Emoji">&#x1F31F;</text>
  <text x="390" y="200" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x2665;</text>
  <text x="420" y="330" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x1F525;</text>
  <text x="340" y="430" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x2605;</text>
  <text x="172" y="430" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x1F4A1;</text>
  <text x="92" y="330" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x2714;</text>
  <text x="122" y="200" text-anchor="middle" fill="white" font-size="36" font-family="Segoe UI Emoji">&#x1F680;</text>
  <!-- Orbit ring -->
