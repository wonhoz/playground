<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B6FF6E"/>
      <stop offset="1" stop-color="#00C9A0"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="190" fill="url(#bg10)"/>
  <!-- big diamond outer -->
  <polygon points="512,160 864,512 512,864 160,512" fill="#0E2BFF" stroke="#FFFFFF" stroke-width="20"/>
  <polygon points="512,240 784,512 512,784 240,512" fill="#3858FF"/>
  <!-- 4-direction arrows inside -->
  <g fill="#FFE74A" stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round">
    <!-- up -->
    <polygon points="512,330 580,420 540,420 540,500 484,500 484,420 444,420"/>
    <!-- down -->
    <polygon points="512,694 580,604 540,604 540,524 484,524 484,604 444,604"/>
    <!-- left -->
    <polygon points="330,512 420,580 420,540 500,540 500,484 420,484 420,444"/>
    <!-- right -->
    <polygon points="694,512 604,580 604,540 524,540 524,484 604,484 604,444"/>
  </g>
  <!-- center node -->
  <circle cx="512" cy="512" r="20" fill="#FFFFFF"/>
</svg>
