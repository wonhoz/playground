<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002244"/>
      <stop offset="100%" stop-color="#001133"/>
    </linearGradient>
    <linearGradient id="rootNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="midNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="leafNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Connector lines -->
  <line x1="256" y1="126" x2="256" y2="178" stroke="#0ea5e9" stroke-width="2.5"/>
  <line x1="256" y1="178" x2="150" y2="218" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="256" y1="178" x2="362" y2="218" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="150" y1="258" x2="90" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="150" y1="258" x2="210" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="362" y1="258" x2="302" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="362" y1="258" x2="422" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="90" y1="348" x2="70" y2="400" stroke="#22c55e" stroke-width="1"/>
  <line x1="90" y1="348" x2="110" y2="400" stroke="#22c55e" stroke-width="1"/>
  <line x1="302" y1="348" x2="290" y2="400" stroke="#22c55e" stroke-width="1"/>
  <!-- Root node -->
  <rect x="196" y="96" width="120" height="32" rx="8" fill="url(#rootNode)"/>
  <text x="256" y="117" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">{ object }</text>
  <!-- Level 2 nodes -->
  <rect x="92" y="218" width="116" height="30" rx="7" fill="url(#midNode)"/>
  <text x="150" y="238" text-anchor="middle" font-family="monospace" font-size="12" fill="white">"user": {}</text>
  <rect x="304" y="218" width="116" height="30" rx="7" fill="url(#midNode)"/>
  <text x="362" y="238" text-anchor="middle" font-family="monospace" font-size="12" fill="white">"data": []</text>
  <!-- Level 3 nodes -->
  <rect x="56" y="310" width="68" height="28" rx="6" fill="url(#leafNode)"/>
  <text x="90" y="329" text-anchor="middle" font-family="monospace" font-size="11" fill="white">"name"</text>
  <rect x="170" y="310" width="80" height="28" rx="6" fill="url(#leafNode)"/>
  <text x="210" y="329" text-anchor="middle" font-family="monospace" font-size="11" fill="white">"email"</text>
  <rect x="264" y="310" width="76" height="28" rx="6" fill="url(#leafNode)"/>
  <text x="302" y="329" text-anchor="middle" font-family="monospace" font-size="11" fill="white">[0]: {}</text>
  <rect x="388" y="310" width="68" height="28" rx="6" fill="url(#leafNode)"/>
  <text x="422" y="329" text-anchor="middle" font-family="monospace" font-size="11" fill="white">[1]: {}</text>
  <!-- Level 4 -->
  <rect x="46" y="400" width="48" height="22" rx="5" fill="#166534"/>
  <text x="70" y="416" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">"John"</text>
  <rect x="100" y="400" width="20" height="22" rx="5" fill="#166534"/>
  <text x="110" y="416" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">30</text>
  <rect x="266" y="400" width="48" height="22" rx="5" fill="#166534"/>
  <text x="290" y="416" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">"id"</text>
</svg>
