<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0005"/>
  <!-- 템플릿 격자 복제 -->
  <!-- 원본 (왼쪽 위, 강조) -->
  <rect x="180" y="180" width="240" height="240" rx="20" fill="#880E4F" opacity="0.8"/>
  <rect x="200" y="200" width="200" height="200" rx="14" fill="none" stroke="#F48FB1" stroke-width="20"/>
  <circle cx="300" cy="300" r="50" fill="#F48FB1" opacity="0.7"/>
  <!-- 복제본들 -->
  <rect x="460" y="180" width="240" height="240" rx="20" fill="#880E4F" opacity="0.4"/>
  <rect x="180" y="460" width="240" height="240" rx="20" fill="#880E4F" opacity="0.4"/>
  <rect x="460" y="460" width="240" height="240" rx="20" fill="#880E4F" opacity="0.4"/>
  <!-- 복사 화살표들 -->
  <path d="M430 300 L460 300" stroke="#F48FB1" stroke-width="16" stroke-linecap="round"/>
  <path d="M300 430 L300 460" stroke="#F48FB1" stroke-width="16" stroke-linecap="round"/>
  <path d="M450 430 L580 580" stroke="#F48FB1" stroke-width="14" stroke-linecap="round" stroke-dasharray="14 8" opacity="0.6"/>
  <!-- 우측하단 더 많은 패턴 암시 -->
  <rect x="740" y="460" width="140" height="140" rx="14" fill="#880E4F" opacity="0.2"/>
  <rect x="460" y="740" width="140" height="140" rx="14" fill="#880E4F" opacity="0.2"/>
  <rect x="740" y="740" width="140" height="140" rx="14" fill="#880E4F" opacity="0.1"/>
</svg>
