<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg7)"/>

  <!-- Back card (folder structure) -->
  <rect x="140" y="200" width="720" height="560" rx="28" fill="#B3E5FC" stroke="#0277BD" stroke-width="14" transform="rotate(-6, 500, 480)"/>

  <!-- Middle card -->
  <rect x="145" y="195" width="720" height="560" rx="28" fill="#E1F5FE" stroke="#0277BD" stroke-width="14" transform="rotate(-2, 505, 475)"/>

  <!-- Front white card -->
  <rect x="150" y="190" width="720" height="560" rx="28" fill="#FFFFFF" stroke="#0277BD" stroke-width="16"/>

  <!-- Photo thumbnail grid on front card -->
  <rect x="178" y="218" width="150" height="120" rx="12" fill="#B3E5FC" stroke="#0277BD" stroke-width="10"/>
  <polygon points="184,326 222,278 248,302 272,268 318,326" fill="#0277BD" stroke="#0277BD" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="296" cy="254" r="18" fill="#FFD93D" stroke="#0277BD" stroke-width="5"/>

  <rect x="346" y="218" width="150" height="120" rx="12" fill="#B3E5FC" stroke="#0277BD" stroke-width="10"/>
  <!-- Video thumbnail -->
  <circle cx="421" cy="278" r="42" fill="#0277BD" stroke="#01579B" stroke-width="8"/>
  <polygon points="406,260 406,296 446,278" fill="#FFFFFF"/>

  <rect x="514" y="218" width="150" height="120" rx="12" fill="#B3E5FC" stroke="#0277BD" stroke-width="10"/>
  <polygon points="520,326 558,282 582,302 608,270 658,326" fill="#29B6F6" stroke="#0277BD" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="632" cy="256" r="18" fill="#FFD93D" stroke="#0277BD" stroke-width="5"/>

  <rect x="682" y="218" width="160" height="120" rx="12" fill="#B3E5FC" stroke="#0277BD" stroke-width="10"/>
  <circle cx="762" cy="278" r="42" fill="#29B6F6" stroke="#0277BD" stroke-width="8"/>
  <polygon points="747,260 747,296 787,278" fill="#FFFFFF"/>

  <!-- EXIF badge row -->
  <rect x="178" y="358" width="664" height="72" rx="24" fill="#0277BD" stroke="#01579B" stroke-width="12"/>
  <text x="510" y="409" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">EXIF DATE READ</text>

  <!-- Folder path display -->
  <rect x="178" y="450" width="310" height="60" rx="16" fill="#29B6F6" stroke="#0277BD" stroke-width="10"/>
  <text x="333" y="490" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">2024/01/15</text>

  <rect x="502" y="450" width="340" height="60" rx="16" fill="#0288D1" stroke="#0277BD" stroke-width="10"/>
  <text x="672" y="490" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">2024/03/28</text>

  <!-- Arrow -->
  <rect x="226" y="532" width="100" height="36" rx="14" fill="#0277BD" stroke="#01579B" stroke-width="10"/>
  <polygon points="326,516 376,550 326,584" fill="#0277BD" stroke="#01579B" stroke-width="10" stroke-linejoin="round"/>

  <!-- Output folder -->
  <rect x="384" y="524" width="420" height="64" rx="20" fill="#01579B" stroke="#0277BD" stroke-width="12"/>
  <text x="594" y="566" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">📁 FOLDER DONE</text>

  <!-- ORGANIZE badge (floating top-right) -->
  <rect x="730" y="120" width="240" height="80" rx="28" fill="#29B6F6" stroke="#0277BD" stroke-width="14"/>
  <text x="850" y="173" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">AUTO</text>

  <!-- Title -->
  <rect x="112" y="840" width="800" height="96" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="906" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>
</svg>
