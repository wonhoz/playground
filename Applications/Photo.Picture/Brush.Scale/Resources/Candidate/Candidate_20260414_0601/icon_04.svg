<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="lensG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFECB3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF8E1" stop-opacity="0.7"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="440" cy="420" r="240"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg4)"/>

  <!-- White card (full image) -->
  <rect x="70" y="120" width="740" height="560" rx="28" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>

  <!-- Blurry/pixelated background image on card -->
  <rect x="86" y="136" width="708" height="528" rx="18" fill="#FFE0B2"/>
  <!-- Big blurry pixel blocks -->
  <rect x="86" y="136" width="177" height="176" rx="4" fill="#FF9800" opacity="0.5"/>
  <rect x="263" y="136" width="177" height="176" rx="4" fill="#FFB300" opacity="0.4"/>
  <rect x="440" y="136" width="177" height="176" rx="4" fill="#FF6B35" opacity="0.5"/>
  <rect x="617" y="136" width="177" height="176" rx="4" fill="#FF9800" opacity="0.4"/>
  <rect x="86" y="312" width="177" height="176" rx="4" fill="#FFB300" opacity="0.4"/>
  <rect x="263" y="312" width="177" height="176" rx="4" fill="#FF6B35" opacity="0.5"/>
  <rect x="440" y="312" width="177" height="176" rx="4" fill="#FF9800" opacity="0.4"/>
  <rect x="617" y="312" width="177" height="176" rx="4" fill="#FFB300" opacity="0.5"/>
  <rect x="86" y="488" width="177" height="176" rx="4" fill="#FF6B35" opacity="0.5"/>
  <rect x="263" y="488" width="177" height="176" rx="4" fill="#FF9800" opacity="0.4"/>
  <rect x="440" y="488" width="177" height="176" rx="4" fill="#FFB300" opacity="0.5"/>
  <rect x="617" y="488" width="177" height="176" rx="4" fill="#FF6B35" opacity="0.4"/>

  <!-- Sharp detail inside lens (clipped) -->
  <g clip-path="url(#lensClip)">
    <!-- Sharp image content -->
    <rect x="200" y="180" width="480" height="480" fill="#FFF7E0"/>
    <polygon points="200,650 310,430 400,520 500,380 580,460 660,330 750,500 780,650" fill="#FF5722" stroke="#E65100" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="200,650 310,540 400,580 500,500 580,540 660,470 750,560 780,650" fill="#FF7043" stroke="#E65100" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="660" cy="330" r="44" fill="#FFD93D" stroke="#E65100" stroke-width="8"/>
    <!-- Sparkle detail lines -->
    <line x1="550" y1="360" x2="550" y2="375" stroke="#E65100" stroke-width="6" stroke-linecap="round"/>
    <line x1="541" y1="367" x2="559" y2="367" stroke="#E65100" stroke-width="6" stroke-linecap="round"/>
    <line x1="545" y1="357" x2="555" y2="377" stroke="#E65100" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Magnifying glass rim -->
  <circle cx="440" cy="420" r="240" fill="none" stroke="#E65100" stroke-width="18"/>
  <circle cx="440" cy="420" r="240" fill="url(#lensG)" opacity="0.25"/>
  <!-- Glass shine -->
  <ellipse cx="360" cy="300" rx="60" ry="30" fill="#FFFFFF" opacity="0.5" transform="rotate(-30 360 300)"/>

  <!-- Handle -->
  <rect x="630" y="610" width="280" height="60" rx="24" fill="#E65100" stroke="#BF360C" stroke-width="14" transform="rotate(35 630 610)"/>

  <!-- SHARP badge -->
  <rect x="730" y="140" width="240" height="90" rx="28" fill="#FF5722" stroke="#BF360C" stroke-width="14"/>
  <text x="850" y="202" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">AI</text>

  <!-- UPSCALE badge -->
  <rect x="700" y="260" width="270" height="90" rx="28" fill="#FF9800" stroke="#E65100" stroke-width="14"/>
  <text x="835" y="322" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SHARP</text>

  <!-- Title -->
  <rect x="162" y="840" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="905" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
