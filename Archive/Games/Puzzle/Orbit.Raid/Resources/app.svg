<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Central planet -->
  <circle cx="256" cy="256" r="55" fill="#1a2266" stroke="#3344cc" stroke-width="3"/>
  <!-- Orbit rings with puzzle pieces as raid targets -->
  <ellipse cx="256" cy="256" rx="110" ry="110" fill="none" stroke="#2233aa" stroke-width="1.5" stroke-dasharray="20,10"/>
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="none" stroke="#1a2266" stroke-width="1.5" stroke-dasharray="20,10"/>
  <!-- Puzzle block enemies on inner orbit -->
  <rect x="340" y="240" width="36" height="36" rx="6" fill="#ff4444" stroke="#ff6666" stroke-width="2"/>
  <line x1="358" y1="240" x2="358" y2="276" stroke="#ff2222" stroke-width="1"/>
  <line x1="340" y1="258" x2="376" y2="258" stroke="#ff2222" stroke-width="1"/>
  <rect x="230" y="124" width="36" height="36" rx="6" fill="#ff8844" stroke="#ffaa66" stroke-width="2"/>
  <rect x="130" y="240" width="36" height="36" rx="6" fill="#ff4488" stroke="#ff66aa" stroke-width="2"/>
  <!-- Outer orbit enemies -->
  <rect x="390" y="170" width="28" height="28" rx="5" fill="#aa44ff" stroke="#cc66ff" stroke-width="2"/>
  <rect x="390" y="330" width="28" height="28" rx="5" fill="#aa44ff" stroke="#cc66ff" stroke-width="2"/>
  <rect x="94" y="170" width="28" height="28" rx="5" fill="#4488ff" stroke="#66aaff" stroke-width="2"/>
  <rect x="94" y="330" width="28" height="28" rx="5" fill="#4488ff" stroke="#66aaff" stroke-width="2"/>
  <!-- Defense turret on planet -->
  <line x1="256" y1="256" x2="330" y2="210" stroke="#44ff88" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="10" fill="#44ff88"/>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#4466ff">ORBIT.RAID</text>
</svg>
