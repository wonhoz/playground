<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="broom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="bristle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#8d5a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Broom handle -->
  <line x1="320" y1="100" x2="160" y2="380" stroke="url(#broom)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Broom head -->
  <ellipse cx="148" cy="395" rx="90" ry="28" fill="url(#bristle)" transform="rotate(-35 148 395)" filter="url(#glow)"/>
  <!-- Bristle lines -->
  <line x1="108" y1="415" x2="120" y2="440" stroke="#5d3a1a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="128" y1="422" x2="138" y2="448" stroke="#5d3a1a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="425" x2="155" y2="452" stroke="#5d3a1a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="168" y1="420" x2="172" y2="447" stroke="#5d3a1a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="185" y1="410" x2="188" y2="436" stroke="#5d3a1a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Dust particles -->
  <circle cx="95" cy="450" r="8" fill="#90caf9" opacity="0.7" filter="url(#glow)"/>
  <circle cx="115" cy="465" r="5" fill="#64b5f6" opacity="0.6"/>
  <circle cx="75" cy="460" r="6" fill="#42a5f5" opacity="0.5"/>
  <circle cx="140" cy="472" r="4" fill="#90caf9" opacity="0.6"/>
  <!-- Stars/sparkles -->
  <path d="M380 160 L388 180 L408 180 L392 194 L398 214 L380 202 L362 214 L368 194 L352 180 L372 180 Z" fill="#fff176" opacity="0.9" filter="url(#glow)"/>
  <path d="M350 250 L354 260 L365 260 L356 267 L359 278 L350 272 L341 278 L344 267 L335 260 L346 260 Z" fill="#f9a825" opacity="0.8"/>
  <!-- Sweep motion lines -->
  <path d="M70 430 Q130 440 200 430" stroke="#90caf9" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="8,4"/>
  <path d="M60 450 Q130 458 210 448" stroke="#64b5f6" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="6,4"/>
</svg>