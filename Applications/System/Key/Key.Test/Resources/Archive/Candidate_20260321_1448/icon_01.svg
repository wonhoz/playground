<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1kt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>
    <clipPath id="c1kt"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1kt)"/>
  <circle cx="512" cy="512" r="380" fill="#1A1A30" opacity="0.4" clip-path="url(#c1kt)"/>

  <!-- Layer 2: 104키 ANSI 레이아웃 + 진단 색상 (공간/장면) -->
  <!-- 키보드 외곽 -->
  <rect x="148" y="310" width="728" height="390" rx="20" fill="#111120" stroke="#2A2A3A" stroke-width="4"/>

  <!-- F열 (상단) — 테스트됨 (녹색) -->
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="168" y="326" width="34" height="28" rx="5"/>
    <rect x="220" y="326" width="34" height="28" rx="5"/>
    <rect x="260" y="326" width="34" height="28" rx="5"/>
    <rect x="300" y="326" width="34" height="28" rx="5"/>
    <rect x="340" y="326" width="34" height="28" rx="5"/>
    <rect x="396" y="326" width="34" height="28" rx="5"/>
