<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- retro newspaper style grid -->
  <rect x="72" y="72" width="368" height="368" rx="8" fill="none" stroke="#f97316" stroke-width="8"/>
  <rect x="72" y="72" width="184" height="184" rx="0" fill="#f97316" opacity="0.2"/>
  <rect x="256" y="256" width="184" height="184" rx="0" fill="#f97316" opacity="0.2"/>
  <!-- grid lines -->
  <g stroke="#f97316" stroke-width="4" opacity="0.6">
    <line x1="256" y1="72" x2="256" y2="440"/>
    <line x1="72" y1="256" x2="440" y2="256"/>
    <line x1="164" y1="72" x2="164" y2="440"/>
    <line x1="348" y1="72" x2="348" y2="440"/>
    <line x1="72" y1="164" x2="440" y2="164"/>
    <line x1="72" y1="348" x2="440" y2="348"/>
  </g>
  <!-- highlighted word -->
  <rect x="72" y="164" width="368" height="92" rx="0" fill="#f97316" opacity="0.25"/>
  <!-- letters -->
  <text x="118" y="210" font-family="'Courier New',monospace" font-size="68" font-weight="bold" fill="#fed7aa" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="210" y="210" font-family="'Courier New',monospace" font-size="68" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">R</text>
  <text x="302" y="210" font-family="'Courier New',monospace" font-size="68" font-weight="bold" fill="#fed7aa" text-anchor="middle" dominant-baseline="central">O</text>
  <text x="394" y="210" font-family="'Courier New',monospace" font-size="68" font-weight="bold" fill="#fed7aa" text-anchor="middle" dominant-baseline="central">S</text>
</svg>
