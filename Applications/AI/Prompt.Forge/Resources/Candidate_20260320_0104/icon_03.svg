<!-- Prompt.Forge icon_03: 올가미 포획 (lasso rope: capture idea) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#150A20"/>
  <!-- Lasso loop (oval) -->
  <ellipse cx="480" cy="460" rx="280" ry="220" fill="none" stroke="#9C27B0" stroke-width="36" stroke-linecap="round"/>
  <!-- Rope tail (goes up and to right) -->
  <path d="M680 340 Q750 260 780 180" fill="none" stroke="#9C27B0" stroke-width="36" stroke-linecap="round"/>
  <!-- Rope knot (small circle) -->
  <circle cx="680" cy="340" r="28" fill="#7B1FA2" stroke="#9C27B0" stroke-width="20"/>
  <!-- Captured idea (central sparkle dot) -->
  <circle cx="480" cy="460" r="52" fill="#BA68C8"/>
  <!-- Small sparkle lines from center -->
  <line x1="480" y1="390" x2="480" y2="350" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <line x1="550" y1="420" x2="578" y2="400" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <line x1="550" y1="500" x2="578" y2="520" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <line x1="480" y1="530" x2="480" y2="570" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <line x1="410" y1="500" x2="382" y2="520" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <line x1="410" y1="420" x2="382" y2="400" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
</svg>
