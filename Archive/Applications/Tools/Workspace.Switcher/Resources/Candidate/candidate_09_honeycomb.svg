<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="hexActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="hexNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 벌집 육각형 배열 (7셀) -->
  <!-- 중앙 (활성) -->
  <polygon points="256,160 308,190 308,250 256,280 204,250 204,190" fill="url(#hexActive)" stroke="#fbbf24" stroke-width="3" filter="url(#glow)"/>
  <text x="256" y="218" font-family="Arial" font-weight="bold" font-size="14" fill="#fff8e1" text-anchor="middle">ACTIVE</text>
  <text x="256" y="236" font-family="Arial" font-size="12" fill="#fef3c7" text-anchor="middle">Desk 1</text>
  <!-- 위 -->
  <polygon points="256,72 308,102 308,162 256,192 204,162 204,102" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="256" y="140" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 2</text>
  <!-- 오른쪽 위 -->
  <polygon points="360,116 412,146 412,206 360,236 308,206 308,146" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="184" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 3</text>
  <!-- 오른쪽 아래 -->
  <polygon points="360,248 412,278 412,338 360,368 308,338 308,278" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="316" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 4</text>
  <!-- 아래 -->
  <polygon points="256,292 308,322 308,382 256,412 204,382 204,322" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="256" y="370" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 5</text>
  <!-- 왼쪽 아래 -->
  <polygon points="152,248 204,278 204,338 152,368 100,338 100,278" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="152" y="316" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 6</text>
  <!-- 왼쪽 위 -->
  <polygon points="152,116 204,146 204,206 152,236 100,206 100,146" fill="url(#hexNormal)" stroke="#475569" stroke-width="1.5"/>
  <text x="152" y="184" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Desk 7</text>
</svg>
