<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WiFi.Cast - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { font-size: 1.4rem; color: #888; margin-bottom: 20px; letter-spacing: 0.05em; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; }
  .item { background: #242424; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item img { width: 100%; aspect-ratio: 1; display: block; border-radius: 8px; }
  .item p { margin: 10px 0 0; font-size: 0.72rem; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>WiFi.Cast — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_wifi_blue.svg"/><p>01 WiFi Blue</p></div>
  <div class="item"><img src="candidate_02_signal_green.svg"/><p>02 Signal Green</p></div>
  <div class="item"><img src="candidate_03_antenna_orange.svg"/><p>03 Antenna Orange</p></div>
  <div class="item"><img src="candidate_04_spectrum_purple.svg"/><p>04 Spectrum Purple</p></div>
  <div class="item"><img src="candidate_05_radar_cyan.svg"/><p>05 Radar Cyan</p></div>
  <div class="item"><img src="candidate_06_heatmap_red.svg"/><p>06 Heatmap Red</p></div>
  <div class="item"><img src="candidate_07_router_teal.svg"/><p>07 Router Teal</p></div>
  <div class="item"><img src="candidate_08_lock_wifi_gold.svg"/><p>08 Lock WiFi Gold</p></div>
  <div class="item"><img src="candidate_09_network_indigo.svg"/><p>09 Network Indigo</p></div>
  <div class="item"><img src="candidate_10_scan_neon.svg"/><p>10 Scan Neon</p></div>
</div>
</body>
</html>
