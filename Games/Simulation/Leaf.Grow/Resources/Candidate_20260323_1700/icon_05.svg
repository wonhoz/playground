<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#3E2723"/>
  <!-- Layer 2: 성장 단계별 원형 프레임 4개 (2×2) -->
  <!-- 프레임 1: 씨앗 (좌상) -->
  <circle cx="256" cy="256" r="200" fill="#2E1B0E" stroke="#8D6E63" stroke-width="10"/>
  <ellipse cx="256" cy="290" rx="50" ry="36" fill="#6D4C41"/>
  <ellipse cx="256" cy="290" rx="30" ry="20" fill="#8D6E63"/>
  <!-- 프레임 2: 새싹 (우상) -->
  <circle cx="768" cy="256" r="200" fill="#1A2A1A" stroke="#4CAF50" stroke-width="10"/>
  <line x1="768" y1="400" x2="768" y2="270" stroke="#6D4C41" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="768" cy="234" rx="64" ry="48" fill="#4CAF50"/>
  <ellipse cx="728" cy="256" rx="44" ry="32" fill="#66BB6A"/>
  <ellipse cx="808" cy="256" rx="44" ry="32" fill="#66BB6A"/>
  <!-- 프레임 3: 어린 나무 (좌하) -->
  <circle cx="256" cy="768" r="200" fill="#1A2A1A" stroke="#66BB6A" stroke-width="10"/>
  <line x1="256" y1="920" x2="256" y2="720" stroke="#795548" stroke-width="24" stroke-linecap="round"/>
  <line x1="256" y1="780" x2="160" y2="660" stroke="#8D6E63" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="760" x2="352" y2="640" stroke="#8D6E63" stroke-width="14" stroke-linecap="round"/>
  <circle cx="160" cy="634" r="48" fill="#43A047"/>
  <circle cx="352" cy="614" r="48" fill="#4CAF50"/>
  <circle cx="256" cy="700" r="36" fill="#66BB6A"/>
  <!-- 프레임 4: 성숙한 나무+꽃 (우하) -->
  <circle cx="768" cy="768" r="200" fill="#1A2A1A" stroke="#FF80AB" stroke-width="10"/>
  <line x1="768" y1="940" x2="768" y2="700" stroke="#5D4037" stroke-width="28" stroke-linecap="round"/>
  <line x1="768" y1="760" x2="640" y2="620" stroke="#6D4C41" stroke-width="18" stroke-linecap="round"/>
  <line x1="768" y1="740" x2="896" y2="600" stroke="#6D4C41" stroke-width="18" stroke-linecap="round"/>
  <line x1="640" y1="620" x2="596" y2="536" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
  <line x1="640" y1="620" x2="674" y2="528" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
  <line x1="896" y1="600" x2="862" y2="512" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
  <line x1="896" y1="600" x2="940" y2="518" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
  <circle cx="596" cy="510" r="38" fill="#43A047"/>
  <circle cx="674" cy="502" r="34" fill="#4CAF50"/>
  <circle cx="862" cy="488" r="38" fill="#43A047"/>
  <circle cx="940" cy="498" r="34" fill="#4CAF50"/>
  <!-- Layer 3: 꽃 포인트 -->
  <circle cx="634" cy="496" r="18" fill="#FF80AB"/>
  <circle cx="900" cy="476" r="18" fill="#FF80AB"/>
  <circle cx="256" cy="840" r="14" fill="#FFEB3B"/>
</svg>
