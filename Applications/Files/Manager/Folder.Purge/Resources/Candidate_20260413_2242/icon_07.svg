<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="128" width="872" height="546" rx="48" fill="#FFFFFF" stroke="#01579B" stroke-width="16"/>
  <!-- VS artifacts label badges (targeted for deletion) -->
  <!-- bin folder -->
  <rect x="112" y="175" width="180" height="90" rx="24" fill="#D32F2F" stroke="#B71C1C" stroke-width="14"/>
  <text x="202" y="234" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">bin</text>
  <!-- obj folder -->
  <rect x="312" y="175" width="180" height="90" rx="24" fill="#D32F2F" stroke="#B71C1C" stroke-width="14"/>
  <text x="402" y="234" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">obj</text>
  <!-- .vs folder -->
  <rect x="512" y="175" width="180" height="90" rx="24" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="602" y="234" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">.vs</text>
  <!-- node_modules -->
  <rect x="712" y="175" width="220" height="90" rx="24" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="822" y="234" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">node_m</text>
  <!-- Downward arrows pointing to deletion zone -->
  <line x1="202" y1="265" x2="202" y2="340" stroke="#D32F2F" stroke-width="14" stroke-linecap="round"/>
  <path d="M 170,316 L 202,360 L 234,316 Z" fill="#D32F2F"/>
  <line x1="402" y1="265" x2="402" y2="340" stroke="#D32F2F" stroke-width="14" stroke-linecap="round"/>
  <path d="M 370,316 L 402,360 L 434,316 Z" fill="#D32F2F"/>
  <line x1="512" y1="265" x2="512" y2="340" stroke="#E65100" stroke-width="14" stroke-linecap="round"/>
  <path d="M 480,316 L 512,360 L 544,316 Z" fill="#E65100"/>
  <line x1="700" y1="265" x2="700" y2="340" stroke="#E65100" stroke-width="14" stroke-linecap="round"/>
  <path d="M 668,316 L 700,360 L 732,316 Z" fill="#E65100"/>
  <!-- Delete zone (red rectangle) -->
  <rect x="112" y="370" width="830" height="230" rx="28" fill="#FFEBEE" stroke="#D32F2F" stroke-width="16"/>
  <!-- Trash can icon inside zone -->
  <text x="512" y="488" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#D32F2F" text-anchor="middle">DELETED</text>
  <rect x="136" y="560" width="780" height="20" rx="10" fill="#D32F2F" opacity="0.3"/>
  <!-- VS ARTIFACTS badge -->
  <rect x="112" y="758" width="464" height="104" rx="36" fill="#01579B" stroke="#003A72" stroke-width="14"/>
  <text x="344" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">VS ART</text>
  <!-- DELETE badge -->
  <rect x="592" y="758" width="356" height="104" rx="36" fill="#D32F2F" stroke="#B71C1C" stroke-width="14"/>
  <text x="770" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">DEL</text>
</svg>
