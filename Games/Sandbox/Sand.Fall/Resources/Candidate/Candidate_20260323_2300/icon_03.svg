<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </radialGradient>
    <clipPath id="clip03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <g clip-path="url(#clip03)">
    <!-- Layer 2: 삼각형 구성 — 모래(좌하), 물(우하), 불(상) -->
    <!-- 모래 삼각형 (좌하) -->
    <path d="M512 512 L240 820 L512 820 Z" fill="#D97706" opacity="0.95"/>
    <!-- 물 삼각형 (우하) -->
    <path d="M512 512 L512 820 L784 820 Z" fill="#22D3EE" opacity="0.90"/>
    <!-- 불 삼각형 (상) -->
    <path d="M512 512 L240 820 L784 820 Z" fill="none" stroke="#1E3A5F" stroke-width="10"/>
    <path d="M512 200 L240 820 L784 820 Z" fill="none" stroke="#1E4060" stroke-width="4" opacity="0.3"/>
    <!-- 불꽃 (상단) -->
    <path d="M512 230 Q480 320 510 380 Q470 310 450 400 Q430 480 512 510 Q594 480 574 400 Q554 310 514 380 Q544 320 512 230 Z"
          fill="#F97316" opacity="0.95"/>
    <path d="M512 280 Q492 350 512 395 Q532 350 512 280 Z" fill="#FDE68A" opacity="0.90"/>
    <!-- 모래 알갱이 (좌하 삼각형 내) -->
    <circle cx="340" cy="680" r="14" fill="#FDE68A" opacity="0.85"/>
    <circle cx="380" cy="730" r="11" fill="#FDE68A" opacity="0.75"/>
    <circle cx="310" cy="760" r="10" fill="#FBBF24" opacity="0.80"/>
    <circle cx="420" cy="770" r="9" fill="#FDE68A" opacity="0.70"/>
    <circle cx="350" cy="800" r="8" fill="#FDE68A" opacity="0.65"/>
    <!-- 물방울 (우하 삼각형 내) -->
    <circle cx="660" cy="660" r="14" fill="#7DD3FC" opacity="0.85"/>
    <circle cx="630" cy="720" r="11" fill="#BAE6FD" opacity="0.80"/>
    <circle cx="700" cy="740" r="10" fill="#7DD3FC" opacity="0.75"/>
    <circle cx="650" cy="780" r="9" fill="#E0F2FE" opacity="0.70"/>
    <circle cx="690" cy="800" r="8" fill="#7DD3FC" opacity="0.65"/>
    <!-- 구분선 -->
    <line x1="512" y1="512" x2="512" y2="820" stroke="#FFFFFF" stroke-width="4" opacity="0.4"/>
    <!-- Layer 3: 원소 라벨 (중앙 삼각형 꼭짓점 표시) -->
    <circle cx="512" cy="512" r="28" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="512" cy="512" r="16" fill="#FFFFFF" opacity="0.30"/>
    <text x="512" y="862" text-anchor="middle" font-family="monospace" font-size="48" fill="#FFFFFF" opacity="0.6">SAND · WATER · FIRE</text>
  </g>
</svg>
