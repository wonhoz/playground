<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 핫핑크 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0015"/>
  <!-- Layer 2: 빠른 이동 잔상 (속도감) -->
  <!-- 잔상들 (점점 투명해짐) -->
  <polygon points="200,600 160,680 240,680" fill="#FF4081" opacity="0.15"/>
  <polygon points="270,570 230,650 310,650" fill="#FF4081" opacity="0.25"/>
  <polygon points="340,550 300,630 380,630" fill="#FF4081" opacity="0.35"/>
  <polygon points="410,530 370,610 450,610" fill="#FF4081" opacity="0.5"/>
  <polygon points="480,510 440,590 520,590" fill="#FF4081" opacity="0.65"/>
  <polygon points="550,490 510,570 590,570" fill="#FF4081" opacity="0.8"/>
  <polygon points="620,470 580,550 660,550" fill="#FF4081" opacity="0.9"/>
  <!-- 현재 플레이어 (우측, 밝음) -->
  <polygon points="720,450 660,540 780,540" fill="#FF4081"/>
  <polygon points="720,450 660,540 780,540" fill="none" stroke="#FF80AB" stroke-width="6"/>
  <rect x="676" y="500" width="88" height="32" rx="6" fill="#E91E63"/>
  <!-- 속도선들 (수평) -->
  <line x1="160" y1="490" x2="660" y2="490" stroke="#FF4081" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  <line x1="180" y1="510" x2="640" y2="510" stroke="#FF4081" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  <line x1="160" y1="530" x2="660" y2="530" stroke="#FF4081" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  <!-- 피한 총알들 -->
  <rect x="760" y="300" width="20" height="44" rx="6" fill="#FFFF00"/>
  <rect x="840" y="380" width="20" height="44" rx="6" fill="#FFFF00"/>
  <!-- Layer 3: -->
  <text x="512" y="200" font-family="Arial Black,Arial" font-size="76" font-weight="900" fill="#FF4081" text-anchor="middle">DODGE!</text>
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FFFF00" text-anchor="middle">BLITZ</text>
</svg>
