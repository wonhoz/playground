<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgPuzzle" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0E2020"/>
      <stop offset="100%" stop-color="#071414"/>
    </linearGradient>
    <!-- 퍼즐 조각 색상들 -->
    <linearGradient id="piece1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E84444"/>
    </linearGradient>
    <linearGradient id="piece2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#2AB5AB"/>
    </linearGradient>
    <linearGradient id="piece3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="100%" stop-color="#F5D000"/>
    </linearGradient>
    <linearGradient id="piece4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="100%" stop-color="#6BD9A0"/>
    </linearGradient>
    <filter id="pieceShadow">
      <feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#00000055"/>
    </filter>
    <filter id="puzzleGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgPuzzle)"/>

  <!-- 배경 격자 -->
  <line x1="512" y1="230" x2="512" y2="794" stroke="#0D2020" stroke-width="2" opacity="0.6"/>
  <line x1="230" y1="512" x2="794" y2="512" stroke="#0D2020" stroke-width="2" opacity="0.6"/>

  <!-- Layer2: 4개 퍼즐 조각 (합체 모습) -->

  <!-- 퍼즐 조각 1 (좌상 - 빨강) -->
  <!-- 기본 사각형 + 돌출/홈 -->
  <path d="
    M 245 245
    L 490 245
    L 490 320
    Q 510 320 530 300 Q 550 280 530 260 Q 510 240 490 260
    L 490 245
    L 490 490
    Q 490 510 470 530 Q 450 550 430 530 Q 410 510 430 490
    Q 410 490 245 490
    Z"
    fill="url(#piece1)" filter="url(#pieceShadow)"/>
  <text x="360" y="390" font-family="monospace" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">app</text>

  <!-- 퍼즐 조각 2 (우상 - 청록) -->
  <path d="
    M 534 245
    L 779 245
    L 779 490
    L 534 490
    Q 534 510 514 530 Q 494 550 474 530 Q 454 510 474 490
    L 534 490
    L 534 320
    Q 514 320 494 300 Q 474 280 494 260 Q 514 240 534 260
    Z"
    fill="url(#piece2)" filter="url(#pieceShadow)"/>
  <text x="656" y="390" font-family="monospace" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">api</text>

  <!-- 퍼즐 조각 3 (좌하 - 노랑) -->
  <path d="
    M 245 534
    L 430 534
    Q 450 534 470 514 Q 490 494 470 474 Q 450 454 430 474
    Q 410 454 245 534
    L 245 534
    L 245 779
    L 490 779
    L 490 534
    Z"
    fill="url(#piece3)" filter="url(#pieceShadow)"/>
  <text x="360" y="670" font-family="monospace" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">db</text>

  <!-- 퍼즐 조각 4 (우하 - 연두) -->
  <path d="
    M 534 534
    L 779 534
    L 779 779
    L 534 779
    L 534 534
    Q 514 534 494 514 Q 474 494 494 474 Q 514 454 534 474
    Z"
    fill="url(#piece4)" filter="url(#pieceShadow)"/>
  <text x="656" y="670" font-family="monospace" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">sys</text>

  <!-- Layer3: 중앙 합체 글로우 -->
  <circle cx="512" cy="512" r="40" fill="#FFFFFF" opacity="0.08" filter="url(#puzzleGlow)"/>

  <!-- 중앙 병합 아이콘 -->
  <circle cx="512" cy="512" r="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="512" y="520" font-family="sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">⇔</text>

  <!-- 퍼즐 외곽 글로우 -->
  <rect x="242" y="242" width="540" height="540" rx="8" fill="none" stroke="#4ECDC4" stroke-width="3" opacity="0.3" filter="url(#puzzleGlow)"/>
</svg>
