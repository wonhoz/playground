<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <radialGradient id="lens" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 렌즈 바디 -->
  <circle cx="215" cy="215" r="145" fill="url(#lens)" stroke="url(#ring)" stroke-width="16"/>
  <circle cx="215" cy="215" r="100" fill="none" stroke="#424242" stroke-width="8"/>
  <!-- 반사광 -->
  <ellipse cx="175" cy="170" rx="40" ry="28" fill="white" opacity="0.08" transform="rotate(-30 175 170)"/>
  <!-- 손잡이 -->
  <rect x="320" y="310" width="130" height="38" rx="19" fill="url(#ring)" transform="rotate(45 320 310)"/>
  <!-- 이모지 팝업들 -->
  <text x="100" y="110" font-size="48" font-family="Segoe UI Emoji">😎</text>
  <text x="330" y="110" font-size="48" font-family="Segoe UI Emoji">🏆</text>
  <text x="80" y="370" font-size="40" font-family="Segoe UI Emoji">💎</text>
  <text x="360" y="410" font-size="40" font-family="Segoe UI Emoji">⚡</text>
</svg>