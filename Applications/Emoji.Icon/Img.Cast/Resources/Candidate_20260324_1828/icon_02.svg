<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="frameGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0FDFA"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg02)"/>
  <!-- 큰 이미지 프레임 -->
  <rect x="172" y="175" width="680" height="490" rx="28" fill="url(#frameGrad)" stroke="#CCFBF1" stroke-width="8"/>
  <!-- 이미지 프레임 내부 — 산 풍경 아이콘 -->
  <rect x="192" y="195" width="640" height="450" rx="18" fill="#D1FAE5"/>
  <!-- 하늘 -->
  <rect x="192" y="195" width="640" height="250" rx="18" fill="#BAE6FD"/>
  <!-- 태양 -->
  <circle cx="700" cy="300" r="58" fill="#FCD34D"/>
  <!-- 산 -->
  <polygon points="192,445 370,250 548,445" fill="#10B981"/>
  <polygon points="400,445 570,280 740,445" fill="#059669"/>
  <polygon points="500,445 680,310 832,445" fill="#34D399"/>
  <!-- 눈 덮인 산봉우리 -->
  <polygon points="370,250 340,310 400,310" fill="white" opacity="0.9"/>
  <polygon points="570,280 545,335 595,335" fill="white" opacity="0.9"/>
  <!-- 포맷 배지들 (아래) -->
  <rect x="172" y="694" width="148" height="66" rx="20" fill="#F97316"/>
  <text x="246" y="737" font-family="Arial Black" font-weight="900" font-size="36" fill="white" text-anchor="middle">SVG</text>
  <rect x="334" y="694" width="148" height="66" rx="20" fill="#0284C7"/>
  <text x="408" y="737" font-family="Arial Black" font-weight="900" font-size="36" fill="white" text-anchor="middle">PNG</text>
  <rect x="496" y="694" width="148" height="66" rx="20" fill="#16A34A"/>
  <text x="570" y="737" font-family="Arial Black" font-weight="900" font-size="36" fill="white" text-anchor="middle">JPG</text>
  <rect x="658" y="694" width="194" height="66" rx="20" fill="#7C3AED"/>
  <text x="755" y="737" font-family="Arial Black" font-weight="900" font-size="36" fill="white" text-anchor="middle">ICO</text>
  <!-- 변환 화살표 (프레임 안 오른쪽 하단) -->
  <circle cx="800" cy="590" r="52" fill="#0F766E" opacity="0.8"/>
  <polygon points="800,562 830,590 800,618 812,590" fill="white"/>
  <polygon points="786,574 812,590 786,606 795,590" fill="#CCFBF1"/>
</svg>
