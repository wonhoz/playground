<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FFE4E6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Toggle switch panel -->
  <rect x="170" y="200" width="684" height="560" rx="36" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="8"/>
  <!-- Title -->
  <text x="512" y="275" font-family="Arial,sans-serif" font-size="52" fill="#DC2626" font-weight="bold" text-anchor="middle">Context Menu</text>
  <!-- Toggle rows -->
  <!-- ON row 1 -->
  <text x="210" y="365" font-family="Arial,sans-serif" font-size="44" fill="#374151">Open</text>
  <rect x="620" y="330" width="120" height="52" rx="26" fill="#22C55E"/>
  <circle cx="714" cy="356" r="22" fill="#FFFFFF"/>
  <!-- OFF row 2 -->
  <text x="210" y="445" font-family="Arial,sans-serif" font-size="44" fill="#9CA3AF">Delete</text>
  <rect x="620" y="410" width="120" height="52" rx="26" fill="#D1D5DB"/>
  <circle cx="646" cy="436" r="22" fill="#FFFFFF"/>
  <!-- ON row 3 -->
  <text x="210" y="525" font-family="Arial,sans-serif" font-size="44" fill="#374151">Copy path</text>
  <rect x="620" y="490" width="120" height="52" rx="26" fill="#22C55E"/>
  <circle cx="714" cy="516" r="22" fill="#FFFFFF"/>
  <!-- OFF row 4 -->
  <text x="210" y="605" font-family="Arial,sans-serif" font-size="44" fill="#9CA3AF">Send to</text>
  <rect x="620" y="570" width="120" height="52" rx="26" fill="#D1D5DB"/>
  <circle cx="646" cy="596" r="22" fill="#FFFFFF"/>
  <!-- ON row 5 -->
  <text x="210" y="685" font-family="Arial,sans-serif" font-size="44" fill="#374151">Properties</text>
  <rect x="620" y="650" width="120" height="52" rx="26" fill="#22C55E"/>
  <circle cx="714" cy="676" r="22" fill="#FFFFFF"/>
</svg>
