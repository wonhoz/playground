    <rect x="820" y="656" width="100" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="3"/>
    <rect x="84" y="280" width="140" height="36" rx="18" fill="#312E81" stroke="#6366F1" stroke-width="4"/>
    <rect x="84" y="336" width="100" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="3"/>
    <!-- Sparkle cross shapes -->
    <line x1="880" y1="160" x2="880" y2="200" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="860" y1="180" x2="900" y2="180" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="160" y1="620" x2="160" y2="660" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
