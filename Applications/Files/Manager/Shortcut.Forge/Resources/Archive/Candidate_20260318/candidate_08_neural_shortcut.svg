<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#080018"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EDE9FE"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 신경망 (바로가기 학습 표현) -->
  <!-- 입력층 → 은닉층 → 화살표(출력) -->
  <!-- 입력 연결선 -->
  <line x1="100" y1="160" x2="210" y2="175" stroke="#7C3AED" stroke-width="1.2" opacity="0.45"/>
  <line x1="100" y1="160" x2="210" y2="245" stroke="#7C3AED" stroke-width="1.2" opacity="0.45"/>
  <line x1="100" y1="256" x2="210" y2="175" stroke="#8B5CF6" stroke-width="1.5" opacity="0.55"/>
  <line x1="100" y1="256" x2="210" y2="245" stroke="#8B5CF6" stroke-width="1.5" opacity="0.55"/>
  <line x1="100" y1="256" x2="210" y2="325" stroke="#7C3AED" stroke-width="1.2" opacity="0.45"/>
  <line x1="100" y1="352" x2="210" y2="245" stroke="#7C3AED" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="352" x2="210" y2="325" stroke="#8B5CF6" stroke-width="1.5" opacity="0.55"/>
  <!-- 은닉층 → 출력 -->
  <line x1="210" y1="175" x2="330" y2="220" stroke="#A78BFA" stroke-width="1.5" opacity="0.55"/>
  <line x1="210" y1="245" x2="330" y2="220" stroke="#C4B5FD" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="210" y1="325" x2="330" y2="220" stroke="#A78BFA" stroke-width="1.5" opacity="0.55"/>
  <line x1="210" y1="175" x2="330" y2="300" stroke="#8B5CF6" stroke-width="1.2" opacity="0.45"/>
  <line x1="210" y1="245" x2="330" y2="300" stroke="#C4B5FD" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="210" y1="325" x2="330" y2="300" stroke="#A78BFA" stroke-width="1.5" opacity="0.55"/>
  <!-- 출력 → 바로가기 화살표 -->
  <line x1="330" y1="220" x2="380" y2="256" stroke="#C4B5FD" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="330" y1="300" x2="380" y2="256" stroke="#A78BFA" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <!-- 입력 노드들 -->
  <circle cx="100" cy="160" r="14" fill="url(#nodeGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="100" cy="256" r="16" fill="url(#nodeGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="100" cy="352" r="14" fill="url(#nodeGrad)" opacity="0.85" filter="url(#glow)"/>
  <!-- 노드 라벨 -->
  <text x="100" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508">src</text>
  <text x="100" y="259" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508">dir</text>
  <text x="100" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508">app</text>
  <!-- 은닉층 노드들 -->
  <circle cx="210" cy="175" r="12" fill="#8B5CF6" opacity="0.85" filter="url(#glow)"/>
  <circle cx="210" cy="245" r="15" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>
  <circle cx="210" cy="325" r="12" fill="#8B5CF6" opacity="0.85" filter="url(#glow)"/>
  <!-- 출력 노드들 -->
  <circle cx="330" cy="220" r="14" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>
  <circle cx="330" cy="300" r="14" fill="#C4B5FD" opacity="0.9" filter="url(#glow)"/>
  <!-- 바로가기 출력 노드 -->
  <circle cx="380" cy="256" r="22" fill="#7C3AED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="380" cy="256" r="14" fill="#C4B5FD" opacity="1" filter="url(#glow)"/>
  <!-- 바로가기 화살표 심볼 -->
  <path d="M 372,252 L 382,252 L 382,248 L 390,256 L 382,264 L 382,260 L 372,260 Z" fill="#030508" opacity="0.9"/>
  <!-- 출력 화살표 (전체 링크) -->
  <line x1="402" y1="256" x2="445" y2="256" stroke="#C4B5FD" stroke-width="3" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="438,248 448,256 438,264" fill="#C4B5FD" opacity="0.8" filter="url(#glow)"/>
  <!-- 바로가기 타겟 파일 -->
  <rect x="448" y="232" width="40" height="50" rx="6" fill="#2E1065" stroke="#A78BFA" stroke-width="1.5" opacity="0.9"/>
  <polygon points="448,232 468,232 468,218 488,232" fill="#4C1D95" opacity="0.8"/>
  <line x1="456" y1="250" x2="480" y2="250" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
  <line x1="456" y1="262" x2="474" y2="262" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
</svg>