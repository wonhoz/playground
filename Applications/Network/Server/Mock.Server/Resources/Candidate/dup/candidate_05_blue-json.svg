<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- JSON structure -->
  <text x="80" y="150" font-family="monospace" font-size="52" font-weight="bold" fill="url(#bracket)">{</text>
  <text x="120" y="210" font-family="monospace" font-size="18" fill="#90E0EF">"status"<tspan fill="#AAAAAA">: </tspan><tspan fill="#48CAE4">"200 OK"</tspan></text>
  <text x="120" y="248" font-family="monospace" font-size="18" fill="#90E0EF">"mock"<tspan fill="#AAAAAA">: </tspan><tspan fill="#FF9F1C">true</tspan></text>
  <text x="120" y="286" font-family="monospace" font-size="18" fill="#90E0EF">"data"<tspan fill="#AAAAAA">: </tspan><tspan fill="#90E0EF">[...]</tspan></text>
  <text x="120" y="324" font-family="monospace" font-size="18" fill="#90E0EF">"delay"<tspan fill="#AAAAAA">: </tspan><tspan fill="#FF9F1C">0</tspan></text>
  <text x="80" y="374" font-family="monospace" font-size="52" font-weight="bold" fill="url(#bracket)">}</text>
  <!-- Server badge top right -->
  <rect x="340" y="90" width="102" height="40" rx="12" fill="#0096C7" opacity="0.85"/>
  <text x="391" y="116" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#FFFFFF">SERVER</text>
  <!-- Decorative dots -->
  <circle cx="430" cy="250" r="6" fill="#48CAE4" opacity="0.6"/>
  <circle cx="450" cy="280" r="4" fill="#48CAE4" opacity="0.4"/>
  <circle cx="420" cy="300" r="5" fill="#48CAE4" opacity="0.5"/>
</svg>