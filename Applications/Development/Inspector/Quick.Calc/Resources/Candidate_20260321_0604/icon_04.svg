<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="qc-bg-clip-04">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="qc-bg-grad-04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#FFBB00"/>
    </linearGradient>
    <filter id="glow-qc-04">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 (비비드 옐로) -->
  <rect width="1024" height="1024" rx="180" fill="url(#qc-bg-grad-04)"/>
  <g clip-path="url(#qc-bg-clip-04)">
    <!-- 배경 방사 광 -->
    <circle cx="512" cy="440" r="320" fill="#FFEE80" opacity="0.3"/>
    <!-- 번개 (다크) -->
    <polygon points="570,200 370,520 490,520 430,830 670,440 540,440" fill="#1A1000" filter="url(#glow-qc-04)"/>
    <!-- 번개 외곽 하이라이트 -->
    <polygon points="570,200 370,520 490,520 430,830 670,440 540,440" fill="none" stroke="#FFF8CC" stroke-width="6" opacity="0.5"/>
    <!-- 숫자들 (번개 주변) -->
    <!-- 숫자 "4" (왼쪽) -->
    <line x1="200" y1="360" x2="200" y2="440" stroke="#1A1000" stroke-width="16" stroke-linecap="round"/>
    <line x1="200" y1="360" x2="260" y2="430" stroke="#1A1000" stroke-width="16" stroke-linecap="round"/>
    <line x1="160" y1="430" x2="300" y2="430" stroke="#1A1000" stroke-width="16" stroke-linecap="round"/>
    <line x1="260" y1="360" x2="260" y2="500" stroke="#1A1000" stroke-width="16" stroke-linecap="round"/>
    <!-- 숫자 "2" (우상단) -->
    <path d="M 750 300 Q 750 260 790 260 Q 830 260 830 300 Q 830 340 750 380 L 750 420 L 840 420" fill="none" stroke="#1A1000" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 숫자 "=" (우하단) -->
    <rect x="740" y="640" width="110" height="16" rx="6" fill="#1A1000"/>
    <rect x="740" y="668" width="110" height="16" rx="6" fill="#1A1000"/>
    <!-- 숫자 "+" (좌하단) -->
    <rect x="190" y="650" width="100" height="16" rx="6" fill="#1A1000"/>
    <rect x="232" y="608" width="16" height="100" rx="6" fill="#1A1000"/>
    <!-- 번개 끝 전기 파티클 -->
    <circle cx="430" cy="830" r="24" fill="#FFFFFF" opacity="0.6" filter="url(#glow-qc-04)"/>
    <circle cx="430" cy="830" r="12" fill="#FFFACC" opacity="0.9"/>
    <!-- 속도 라인 -->
    <line x1="160" y1="500" x2="300" y2="510" stroke="#8A7000" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="160" y1="530" x2="280" y2="536" stroke="#8A7000" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="700" y1="500" x2="850" y2="510" stroke="#8A7000" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="720" y1="530" x2="850" y2="536" stroke="#8A7000" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
