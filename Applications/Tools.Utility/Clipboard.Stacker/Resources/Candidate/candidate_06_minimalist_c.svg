<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#dde6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2255ff"/>
      <stop offset="100%" stop-color="#1133cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Big C letter -->
  <text x="260" y="310" text-anchor="middle" font-family="Arial Black" font-size="300" fill="url(#accent)" opacity="0.12">C</text>
  <!-- Stacked documents -->
  <rect x="130" y="300" width="180" height="140" rx="10" fill="white" stroke="#ccd4ff" stroke-width="2"/>
  <rect x="118" y="285" width="180" height="140" rx="10" fill="white" stroke="#bbccee" stroke-width="2"/>
  <rect x="106" y="270" width="180" height="140" rx="10" fill="white" stroke="#aabbdd" stroke-width="2"/>
  <!-- Text lines on front card -->
  <rect x="120" y="292" width="120" height="8" rx="3" fill="#2255ff" opacity="0.6"/>
  <rect x="120" y="310" width="100" height="7" rx="3" fill="#aaaacc" opacity="0.7"/>
  <rect x="120" y="326" width="130" height="7" rx="3" fill="#aaaacc" opacity="0.7"/>
  <rect x="120" y="342" width="90" height="7" rx="3" fill="#aaaacc" opacity="0.6"/>
  <!-- Clipboard icon top right -->
  <rect x="316" y="220" width="100" height="130" rx="10" fill="white" stroke="#2255ff" stroke-width="3"/>
  <rect x="346" y="208" width="40" height="24" rx="8" fill="#2255ff"/>
  <rect x="354" y="202" width="24" height="14" rx="5" fill="#1144cc"/>
  <!-- Stack count -->
  <circle cx="416" cy="350" r="22" fill="url(#accent)"/>
  <text x="416" y="358" text-anchor="middle" font-family="Arial Black" font-size="20" fill="#fff">3</text>
</svg>