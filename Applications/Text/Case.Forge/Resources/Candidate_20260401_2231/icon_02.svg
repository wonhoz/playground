<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (deep orange-brown) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg02cf)"/>

  <!-- Layer 2: "camelCase" text with highlight on uppercase C -->
  <!-- Lowercase "camel" -->
  <text x="140" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="200" font-weight="bold"
    fill="white" opacity="0.9">camel</text>
  <!-- "C" highlighted in yellow — PascalCase boundary indicator -->
  <text x="140" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="200" font-weight="bold"
    fill="#FFF176">C</text>
  <text x="282" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="200" font-weight="bold"
    fill="white" opacity="0.9">ase</text>

  <!-- Layer 3: Underline decoration + small case labels -->
  <rect x="140" y="720" width="744" height="12" rx="6" fill="#FFF176" opacity="0.5"/>

  <!-- Small floating labels showing other cases -->
  <rect x="140" y="780" width="240" height="52" rx="14" fill="white" opacity="0.15"/>
  <text x="260" y="817" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white"
    text-anchor="middle">snake_case</text>

  <rect x="400" y="780" width="240" height="52" rx="14" fill="white" opacity="0.15"/>
  <text x="520" y="817" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white"
    text-anchor="middle">kebab-case</text>

  <rect x="660" y="780" width="224" height="52" rx="14" fill="white" opacity="0.15"/>
  <text x="772" y="817" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white"
    text-anchor="middle">PascalCase</text>

  <!-- Subtle background text -->
  <text x="512" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="160"
    fill="white" text-anchor="middle" opacity="0.06">FORGE</text>
</svg>
