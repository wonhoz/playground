<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="clip1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="clip2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="clip3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#e84393"/>
    </linearGradient>
    <linearGradient id="clip4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of clipboard cards -->
  <!-- Card 4 (bottom) -->
  <rect x="136" y="330" width="240" height="140" rx="12" fill="url(#clip4)" opacity="0.7" transform="rotate(6, 256, 400)"/>
  <!-- Card 3 -->
  <rect x="136" y="310" width="240" height="140" rx="12" fill="url(#clip3)" opacity="0.8" transform="rotate(-4, 256, 380)"/>
  <!-- Card 2 -->
  <rect x="136" y="290" width="240" height="140" rx="12" fill="url(#clip2)" opacity="0.88" transform="rotate(2, 256, 360)"/>
  <!-- Card 1 (top) -->
  <rect x="136" y="200" width="240" height="140" rx="12" fill="url(#clip1)"/>
  <!-- Clipboard clip on top card -->
  <rect x="218" y="186" width="76" height="28" rx="8" fill="#0067b8"/>
  <rect x="238" y="180" width="36" height="14" rx="7" fill="#1a1a2e"/>
  <!-- Lines on top card -->
  <rect x="156" y="225" width="160" height="10" rx="4" fill="white" opacity="0.5"/>
  <rect x="156" y="243" width="130" height="10" rx="4" fill="white" opacity="0.4"/>
  <rect x="156" y="261" width="148" height="10" rx="4" fill="white" opacity="0.45"/>
  <rect x="156" y="279" width="100" height="10" rx="4" fill="white" opacity="0.35"/>
  <!-- Stack count indicator -->
  <circle cx="380" cy="220" r="24" fill="#0984e3"/>
  <rect x="370" y="214" width="20" height="12" rx="4" fill="white" opacity="0.9"/>
</svg>