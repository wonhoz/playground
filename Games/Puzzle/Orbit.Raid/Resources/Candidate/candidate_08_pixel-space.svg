<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#000020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel enemy (invader style) -->
  <g fill="#ff3333">
    <!-- Row 1 pixels (head) -->
    <rect x="200" y="100" width="24" height="24"/>
    <rect x="248" y="100" width="24" height="24"/>
    <rect x="296" y="100" width="24" height="24"/>
    <!-- Row 2 pixels -->
    <rect x="176" y="124" width="24" height="24"/>
    <rect x="200" y="124" width="24" height="24"/>
    <rect x="224" y="124" width="24" height="24"/>
    <rect x="248" y="124" width="24" height="24"/>
    <rect x="272" y="124" width="24" height="24"/>
    <rect x="296" y="124" width="24" height="24"/>
    <rect x="320" y="124" width="24" height="24"/>
    <!-- Row 3 pixels -->
    <rect x="152" y="148" width="24" height="24"/>
    <rect x="200" y="148" width="24" height="24"/>
    <rect x="224" y="148" width="24" height="24"/>
    <rect x="248" y="148" width="24" height="24"/>
    <rect x="272" y="148" width="24" height="24"/>
    <rect x="296" y="148" width="24" height="24"/>
    <rect x="344" y="148" width="24" height="24"/>
    <!-- Row 4 (legs) -->
    <rect x="200" y="172" width="24" height="24"/>
    <rect x="224" y="172" width="24" height="24"/>
    <rect x="272" y="172" width="24" height="24"/>
    <rect x="296" y="172" width="24" height="24"/>
    <!-- Row 5 (feet) -->
    <rect x="176" y="196" width="24" height="24"/>
    <rect x="224" y="196" width="24" height="24"/>
    <rect x="272" y="196" width="24" height="24"/>
    <rect x="320" y="196" width="24" height="24"/>
  </g>
  <!-- Orbit arc puzzle element -->
  <ellipse cx="256" cy="320" rx="140" ry="50" fill="none" stroke="#4466ff" stroke-width="3" stroke-dasharray="15,10"/>
  <!-- Player ship (pixel) -->
  <g fill="#44aaff">
    <rect x="244" y="400" width="24" height="24"/>
    <rect x="220" y="424" width="72" height="24"/>
    <rect x="196" y="448" width="120" height="16"/>
  </g>
  <!-- Bullet -->
  <rect x="252" y="370" width="8" height="24" fill="#ffffff"/>
  <text x="256" y="500" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#ff3333">ORBIT.RAID</text>
</svg>
