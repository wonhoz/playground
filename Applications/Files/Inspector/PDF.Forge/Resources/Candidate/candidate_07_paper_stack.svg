<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1E2D40"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multi-page stack with perspective -->
  <!-- Page 4 (bottom) -->
  <rect x="180" y="160" width="200" height="250" rx="8" fill="#2A3A4A" transform="rotate(8, 280, 285)"/>
  <!-- Page 3 -->
  <rect x="175" y="155" width="200" height="250" rx="8" fill="#334455" transform="rotate(4, 275, 280)"/>
  <!-- Page 2 -->
  <rect x="170" y="150" width="200" height="250" rx="8" fill="#3D5068" transform="rotate(1, 270, 275)"/>
  <!-- Page 1 (top - main) -->
  <rect x="160" y="140" width="200" height="255" rx="8" fill="#EEF2F7"/>
  <!-- Fold corner on top page -->
  <polygon points="300,140 360,140 360,200 300,140" fill="#DDE2EC"/>
  <polygon points="300,140 360,200 300,200" fill="#C8D0E0"/>
  <!-- PDF stamp on top page -->
  <rect x="170" y="160" width="80" height="44" rx="6" fill="#E53935"/>
  <text x="210" y="191" font-family="sans-serif" font-size="26" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PDF</text>
  <!-- Lines on top page -->
  <rect x="170" y="220" width="130" height="6" rx="3" fill="#AAAAAA"/>
  <rect x="170" y="234" width="140" height="6" rx="3" fill="#BBBBBB"/>
  <rect x="170" y="248" width="120" height="6" rx="3" fill="#BBBBBB"/>
  <rect x="170" y="262" width="130" height="6" rx="3" fill="#AAAAAA"/>
  <rect x="170" y="285" width="110" height="6" rx="3" fill="#BBBBBB"/>
  <rect x="170" y="299" width="130" height="6" rx="3" fill="#BBBBBB"/>
  <rect x="170" y="313" width="100" height="6" rx="3" fill="#BBBBBB"/>
  <rect x="170" y="327" width="120" height="6" rx="3" fill="#AAAAAA"/>
  <rect x="170" y="341" width="130" height="6" rx="3" fill="#BBBBBB"/>
  <!-- Pen/editing tool overlay -->
  <line x1="340" y1="330" x2="420" y2="420" stroke="#88AADD" stroke-width="8" stroke-linecap="round"/>
  <rect x="340" y="310" width="28" height="50" rx="6" fill="#88AADD" transform="rotate(-45, 354, 335)"/>
  <polygon points="320,360 340,330 360,360" fill="#AABBEE" transform="rotate(-45, 340, 345)"/>
</svg>
