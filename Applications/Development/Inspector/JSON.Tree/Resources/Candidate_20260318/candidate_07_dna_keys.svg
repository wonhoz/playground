<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040c08"/>
      <stop offset="100%" stop-color="#081808"/>
    </linearGradient>
    <linearGradient id="strand1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="strand2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- DNA double helix: left strand -->
  <path d="M200,60 Q180,100 200,140 Q220,180 200,220 Q180,260 200,300 Q220,340 200,380 Q180,420 200,460" fill="none" stroke="url(#strand1)" stroke-width="4"/>
  <!-- DNA right strand -->
  <path d="M312,60 Q332,100 312,140 Q292,180 312,220 Q332,260 312,300 Q292,340 312,380 Q332,420 312,460" fill="none" stroke="url(#strand2)" stroke-width="4"/>
  <!-- Base pairs (JSON key-value rungs) -->
  <line x1="200" y1="80" x2="312" y2="80" stroke="#10B981" stroke-width="3" opacity="0.7"/>
  <text x="204" y="77" font-family="monospace" font-size="9" fill="#34D399">"name"</text>
  <text x="268" y="77" font-family="monospace" font-size="9" fill="#6EE7B7">"JSON"</text>
  <line x1="200" y1="120" x2="312" y2="120" stroke="#059669" stroke-width="3" opacity="0.6"/>
  <text x="204" y="117" font-family="monospace" font-size="9" fill="#34D399">"ver"</text>
  <text x="264" y="117" font-family="monospace" font-size="9" fill="#6EE7B7">"1.0"</text>
  <line x1="200" y1="160" x2="312" y2="160" stroke="#10B981" stroke-width="3" opacity="0.7"/>
  <text x="204" y="157" font-family="monospace" font-size="9" fill="#34D399">"data"</text>
  <text x="264" y="157" font-family="monospace" font-size="9" fill="#6EE7B7">{ }</text>
  <line x1="200" y1="200" x2="312" y2="200" stroke="#059669" stroke-width="3" opacity="0.6"/>
  <text x="204" y="197" font-family="monospace" font-size="9" fill="#34D399">"cnt"</text>
  <text x="264" y="197" font-family="monospace" font-size="9" fill="#6EE7B7">42</text>
  <line x1="200" y1="240" x2="312" y2="240" stroke="#10B981" stroke-width="3" opacity="0.7"/>
  <text x="204" y="237" font-family="monospace" font-size="9" fill="#34D399">"ok"</text>
  <text x="264" y="237" font-family="monospace" font-size="9" fill="#6EE7B7">true</text>
  <line x1="200" y1="280" x2="312" y2="280" stroke="#059669" stroke-width="3" opacity="0.6"/>
  <text x="204" y="277" font-family="monospace" font-size="9" fill="#34D399">"list"</text>
  <text x="264" y="277" font-family="monospace" font-size="9" fill="#6EE7B7">[ ]</text>
  <line x1="200" y1="320" x2="312" y2="320" stroke="#10B981" stroke-width="3" opacity="0.7"/>
  <text x="204" y="317" font-family="monospace" font-size="9" fill="#34D399">"val"</text>
  <text x="264" y="317" font-family="monospace" font-size="9" fill="#6EE7B7">null</text>
  <line x1="200" y1="360" x2="312" y2="360" stroke="#059669" stroke-width="3" opacity="0.5"/>
  <text x="204" y="357" font-family="monospace" font-size="9" fill="#34D399">"id"</text>
  <text x="264" y="357" font-family="monospace" font-size="9" fill="#6EE7B7">007</text>
  <line x1="200" y1="400" x2="312" y2="400" stroke="#10B981" stroke-width="3" opacity="0.4"/>
  <text x="204" y="397" font-family="monospace" font-size="9" fill="#34D399" opacity="0.7">"tag"</text>
  <text x="264" y="397" font-family="monospace" font-size="9" fill="#6EE7B7" opacity="0.7">"x"</text>
  <line x1="200" y1="440" x2="312" y2="440" stroke="#059669" stroke-width="3" opacity="0.3"/>
  <!-- Label -->
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="11" fill="#34D399" opacity="0.6">DNA KEYS</text>
</svg>
