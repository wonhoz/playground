<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#3D0066"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF80FF"/>
      <stop offset="100%" stop-color="#AA00FF"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radial edges -->
  <line x1="256" y1="256" x2="256" y2="80" stroke="#9C27B0" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="256" y1="256" x2="420" y2="160" stroke="#9C27B0" stroke-width="3"/>
  <line x1="256" y1="256" x2="430" y2="310" stroke="#9C27B0" stroke-width="3"/>
  <line x1="256" y1="256" x2="360" y2="432" stroke="#9C27B0" stroke-width="3"/>
  <line x1="256" y1="256" x2="152" y2="432" stroke="#9C27B0" stroke-width="3"/>
  <line x1="256" y1="256" x2="82" y2="310" stroke="#9C27B0" stroke-width="3"/>
  <line x1="256" y1="256" x2="92" y2="160" stroke="#9C27B0" stroke-width="3"/>
  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="256" cy="80" r="26" fill="#4A0080" stroke="#FF80FF" stroke-width="3"/>
  <circle cx="420" cy="160" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <circle cx="430" cy="310" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <circle cx="360" cy="432" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <circle cx="152" cy="432" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <circle cx="82" cy="310" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <circle cx="92" cy="160" r="22" fill="#4A0080" stroke="#CE93D8" stroke-width="2"/>
  <!-- Node labels -->
  <text x="256" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF80FF">API</text>
  <text x="420" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">UI</text>
  <text x="430" y="315" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">DB</text>
  <text x="360" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">IO</text>
  <text x="152" y="437" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">Net</text>
  <text x="82" y="315" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">Log</text>
  <text x="92" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#CE93D8">Auth</text>
  <!-- Center node -->
  <circle cx="256" cy="256" r="44" fill="url(#center)" stroke="white" stroke-width="4"/>
  <text x="256" y="261" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">CORE</text>
</svg>
