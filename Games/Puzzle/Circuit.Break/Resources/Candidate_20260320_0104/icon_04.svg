<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A08"/>
  <!-- 스위치 ON 연결: 토글 스위치 -->
  <!-- 스위치 트랙 -->
  <rect x="220" y="420" width="584" height="184" rx="92" fill="#00897B" opacity="0.5"/>
  <rect x="220" y="420" width="584" height="184" rx="92" fill="none" stroke="#4DB6AC" stroke-width="10"/>
  <!-- 스위치 손잡이 (오른쪽 = ON) -->
  <circle cx="712" cy="512" r="100" fill="#4DB6AC"/>
  <circle cx="712" cy="512" r="76" fill="#00897B"/>
  <!-- ON 표시 (가운데 선) -->
  <line x1="712" y1="468" x2="712" y2="556" stroke="#4DB6AC" stroke-width="18" stroke-linecap="round"/>
  <!-- 왼쪽 OFF 영역 -->
  <circle cx="312" cy="512" r="74" fill="#020A08" opacity="0.5"/>
  <!-- OFF 표시 (원형) -->
  <circle cx="312" cy="512" r="36" fill="none" stroke="#00897B" stroke-width="14"/>
  <!-- 연결 전류 흐름 -->
  <polyline points="160,512 220,512" stroke="#4DB6AC" stroke-width="16" fill="none" stroke-linecap="round"/>
  <polyline points="804,512 864,512" stroke="#4DB6AC" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 회로 연결 표시 -->
  <polyline points="160,512 160,300 360,300" stroke="#4DB6AC" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="864,512 864,300 664,300" stroke="#4DB6AC" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="160,512 160,724 360,724" stroke="#00897B" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <polyline points="864,512 864,724 664,724" stroke="#00897B" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- 전구 아이콘 (켜짐) -->
  <circle cx="512" cy="240" r="60" fill="#4DB6AC" opacity="0.3"/>
  <circle cx="512" cy="240" r="40" fill="#4DB6AC" opacity="0.6"/>
  <circle cx="512" cy="240" r="20" fill="#4DB6AC"/>
</svg>
