<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 화이트 배경 -->
  <rect width="1024" height="1024" rx="180" fill="#FAFAFA"/>
  <!-- Layer 2: 구름 실루엣 안에 단어들 -->
  <!-- 구름 모양 (원들로 구성) -->
  <circle cx="512" cy="420" r="220" fill="#E3F2FD"/>
  <circle cx="300" cy="460" r="160" fill="#E3F2FD"/>
  <circle cx="724" cy="460" r="160" fill="#E3F2FD"/>
  <circle cx="380" cy="380" r="140" fill="#E3F2FD"/>
  <circle cx="640" cy="380" r="150" fill="#E3F2FD"/>
  <!-- 구름 아웃라인 -->
  <circle cx="512" cy="420" r="220" fill="none" stroke="#1565C0" stroke-width="6"/>
  <circle cx="300" cy="460" r="160" fill="none" stroke="#1565C0" stroke-width="6"/>
  <circle cx="724" cy="460" r="160" fill="none" stroke="#1565C0" stroke-width="6"/>
  <circle cx="380" cy="380" r="140" fill="none" stroke="#1565C0" stroke-width="6"/>
  <circle cx="640" cy="380" r="150" fill="none" stroke="#1565C0" stroke-width="6"/>
  <!-- 하단 직사각형으로 아래 정리 -->
  <rect x="140" y="500" width="744" height="120" fill="#E3F2FD"/>
  <!-- 구름 안 단어들 -->
  <text x="512" y="440" font-family="Arial Black,Arial" font-size="108" font-weight="900" fill="#1565C0" text-anchor="middle">WORD</text>
  <text x="300" y="530" font-family="Arial" font-size="64" font-weight="700" fill="#0288D1" text-anchor="middle">tag</text>
  <text x="730" y="530" font-family="Arial" font-size="60" font-weight="700" fill="#0288D1" text-anchor="middle">text</text>
  <text x="420" y="370" font-family="Arial" font-size="40" fill="#42A5F5" text-anchor="middle">freq</text>
  <text x="640" y="360" font-family="Arial" font-size="44" fill="#64B5F6" text-anchor="middle">data</text>
  <!-- Layer 3: 하단 그림자 + 텍스트 -->
  <rect x="200" y="690" width="624" height="90" rx="12" fill="#1565C0"/>
  <text x="512" y="749" font-family="Arial Black,Arial" font-size="52" font-weight="900" fill="white" text-anchor="middle">CLOUD</text>
</svg>
