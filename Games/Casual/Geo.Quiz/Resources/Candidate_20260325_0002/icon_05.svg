<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="skyGrad05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#skyGrad05)"/>

  <!-- Post/pole -->
  <rect x="488" y="350" width="48" height="520" rx="10" fill="#546E7A"/>
  <rect x="490" y="350" width="44" height="520" rx="8" fill="#78909C"/>

  <!-- Sign 1 - pointing left (Seoul?) -->
  <rect x="195" y="345" width="340" height="115" rx="18" fill="#FFFFFF" stroke="#37474F" stroke-width="10"/>
  <!-- Left arrow -->
  <polygon points="222,402 255,372 255,392 295,392 295,412 255,412 255,432" fill="#1565C0"/>
  <text x="430" y="423" font-size="68" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="end" fill="#1A237E">Seoul?</text>

  <!-- Sign 2 - pointing right (Paris?) -->
  <rect x="490" y="490" width="340" height="115" rx="18" fill="#FFFDE7" stroke="#37474F" stroke-width="10"/>
  <text x="500" y="562" font-size="68" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="start" fill="#B71C1C">Paris?</text>
  <!-- Right arrow -->
  <polygon points="802,548 769,518 769,538 730,538 730,558 769,558 769,578" fill="#C62828"/>

  <!-- Sign 3 - pointing left (Tokyo?) -->
  <rect x="195" y="635" width="340" height="115" rx="18" fill="#F3E5F5" stroke="#37474F" stroke-width="10"/>
  <polygon points="222,692 255,662 255,682 295,682 295,702 255,702 255,722" fill="#6A1B9A"/>
  <text x="430" y="710" font-size="68" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="end" fill="#4A148C">Tokyo?</text>

  <!-- Small globe at bottom -->
  <circle cx="512" cy="230" r="120" fill="#1565C0" stroke="#0D47A1" stroke-width="10"/>
  <ellipse cx="512" cy="230" rx="120" ry="35" fill="none" stroke="#64B5F6" stroke-width="6"/>
  <ellipse cx="512" cy="230" rx="60" ry="120" fill="none" stroke="#64B5F6" stroke-width="6"/>
  <!-- Simplified continents on globe -->
  <circle cx="480" cy="215" r="22" fill="#4CAF50" opacity="0.9"/>
  <circle cx="535" cy="208" r="18" fill="#66BB6A" opacity="0.9"/>
  <circle cx="555" cy="240" r="14" fill="#81C784" opacity="0.9"/>
</svg>
