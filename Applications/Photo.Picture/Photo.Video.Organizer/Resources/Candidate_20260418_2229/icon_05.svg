<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background cream warm -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: Bookshelf with photo albums by date -->
  <!-- Shelf board -->
  <rect x="100" y="740" width="824" height="30" rx="8" fill="#8D6E63"/>
  <!-- Album spines on shelf -->
  <!-- 2024 section -->
  <rect x="130" y="580" width="80" height="160" rx="8" fill="#E53935"/>
  <text x="170" y="672" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(90 170 672)">2024</text>
  <rect x="220" y="600" width="60" height="140" rx="8" fill="#EF9A9A"/>
  <rect x="290" y="590" width="60" height="150" rx="8" fill="#FFCDD2"/>
  <!-- 2025 section -->
  <rect x="380" y="560" width="80" height="180" rx="8" fill="#1565C0"/>
  <text x="420" y="652" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(90 420 652)">2025</text>
  <rect x="470" y="580" width="65" height="160" rx="8" fill="#BBDEFB"/>
  <rect x="545" y="595" width="55" height="145" rx="8" fill="#90CAF9"/>
  <!-- 2026 section -->
  <rect x="630" y="550" width="80" height="190" rx="8" fill="#2E7D32"/>
  <text x="670" y="648" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(90 670 648)">2026</text>
  <rect x="720" y="575" width="55" height="165" rx="8" fill="#A5D6A7"/>
  <rect x="785" y="600" width="45" height="140" rx="8" fill="#C8E6C9"/>
  <!-- Layer 3: Year labels on shelf section dividers -->
  <rect x="120" y="730" width="100" height="20" rx="4" fill="#795548"/>
  <rect x="370" y="730" width="100" height="20" rx="4" fill="#795548"/>
  <rect x="620" y="730" width="100" height="20" rx="4" fill="#795548"/>
  <!-- Title -->
  <rect x="200" y="820" width="624" height="80" rx="16" fill="#5D4037"/>
  <text x="512" y="874" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFF8E1" text-anchor="middle">Photo Library</text>
  <!-- Decorative camera on top -->
  <rect x="410" y="180" width="204" height="150" rx="22" fill="#795548"/>
  <circle cx="512" cy="255" r="60" fill="#EFEBE9"/>
  <circle cx="512" cy="255" r="44" fill="#A1887F"/>
  <circle cx="512" cy="255" r="28" fill="#4E342E"/>
  <rect x="546" y="185" width="56" height="26" rx="10" fill="#5D4037"/>
</svg>
