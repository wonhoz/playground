<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150804"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="laserBeam" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F97316" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#EF4444" stop-opacity="1"/>
      <stop offset="70%" stop-color="#F97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1008"/>
      <stop offset="100%" stop-color="#180804"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Laser apparatus (top) -->
  <rect x="30" y="50" width="90" height="50" rx="8" fill="#2a0c04" stroke="#F97316" stroke-width="2" stroke-opacity="0.7" filter="url(#softglow)"/>
  <rect x="80" y="60" width="30" height="30" rx="5" fill="#F97316" fill-opacity="0.2" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Lens -->
  <circle cx="120" cy="75" r="12" fill="#1a0604" stroke="#F97316" stroke-width="2" filter="url(#softglow)"/>
  <circle cx="120" cy="75" r="7" fill="#F97316" fill-opacity="0.3"/>
  <circle cx="120" cy="75" r="3" fill="#EF4444"/>

  <!-- Laser beam horizontal -->
  <rect x="132" y="67" width="350" height="16" fill="url(#laserBeam)" filter="url(#laserGlow)"/>
  <line x1="132" y1="75" x2="482" y2="75" stroke="#EF4444" stroke-width="3" stroke-opacity="0.9" filter="url(#glow)"/>
  <line x1="132" y1="75" x2="482" y2="75" stroke="white" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Document layers (being laser-cut) -->
  <!-- Page 1 (top, partially cut) -->
  <rect x="140" y="140" width="232" height="300" rx="6" fill="url(#docGrad)" stroke="#F97316" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Cut line through document -->
  <line x1="140" y1="220" x2="372" y2="220" stroke="#F97316" stroke-width="3" stroke-opacity="0.9" filter="url(#glow)"/>
  <line x1="140" y1="220" x2="372" y2="220" stroke="white" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Page cut apart (top half slides) -->
  <rect x="148" y="148" width="216" height="68" rx="4" fill="#2a1008" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Laser cutting burning edge effect -->
  <path d="M140,218 Q180,215 220,220 Q260,225 300,218 Q340,213 372,220"
    fill="none" stroke="#F97316" stroke-width="4" stroke-opacity="0.7" filter="url(#glow)"/>
  <path d="M140,222 Q180,225 220,220 Q260,215 300,222 Q340,227 372,220"
    fill="none" stroke="#EF4444" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Document content lines -->
  <line x1="165" y1="165" x2="350" y2="165" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="180" x2="335" y2="180" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="165" y1="195" x2="345" y2="195" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="245" x2="350" y2="245" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="260" x2="330" y2="260" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="165" y1="275" x2="350" y2="275" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="290" x2="315" y2="290" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.28"/>
  <line x1="165" y1="315" x2="350" y2="315" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="330" x2="340" y2="330" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="165" y1="345" x2="350" y2="345" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="165" y1="360" x2="320" y2="360" stroke="#EF4444" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="165" y1="375" x2="350" y2="375" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="165" y1="390" x2="340" y2="390" stroke="#EF4444" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="165" y1="410" x2="350" y2="410" stroke="#F97316" stroke-width="1" stroke-opacity="0.25"/>

  <!-- PDF label on doc -->
  <rect x="165" y="153" width="50" height="13" rx="6.5" fill="#F97316" fill-opacity="0.5" filter="url(#softglow)"/>

  <!-- Burn sparks at cut line -->
  <g filter="url(#glow)">
    <circle cx="200" cy="220" r="3.5" fill="#F97316"/>
    <circle cx="240" cy="218" r="3" fill="#EF4444"/>
    <circle cx="280" cy="222" r="3.5" fill="#F97316"/>
    <circle cx="320" cy="219" r="3" fill="#DC2626"/>
    <circle cx="155" cy="225" r="2.5" fill="#F97316"/>
    <circle cx="365" cy="216" r="2.5" fill="#EF4444"/>
  </g>

  <!-- Right-side laser guide rail -->
  <rect x="470" y="45" width="15" height="420" rx="7.5" fill="#2a0c04" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>
</svg>
