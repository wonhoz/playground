<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 민트 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#E0F7FA"/>
  <!-- Layer 2: SVG → ICO 변환 화살표 메인 -->
  <rect x="80" y="340" width="280" height="120" rx="20" fill="#00ACC1"/>
  <text x="220" y="422" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="88" fill="white" text-anchor="middle">SVG</text>
  <rect x="664" y="340" width="280" height="120" rx="20" fill="#FF6F00"/>
  <text x="804" y="422" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="88" fill="white" text-anchor="middle">ICO</text>
  <!-- 화살표 -->
  <line x1="378" y1="400" x2="646" y2="400" stroke="#F57C00" stroke-width="36" stroke-linecap="round"/>
  <polygon points="646,360 646,440 730,400" fill="#F57C00"/>
  <!-- Layer 3: 포맷 힌트 텍스트 -->
  <text x="512" y="580" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#00838F" text-anchor="middle">PNG · JPG · BMP</text>
  <line x1="200" y1="600" x2="824" y2="600" stroke="#80DEEA" stroke-width="6" stroke-linecap="round"/>
  <text x="512" y="680" font-family="'Segoe UI', Arial, sans-serif" font-size="60" fill="#4DD0E1" text-anchor="middle">드래그 한 번으로 변환</text>
</svg>
