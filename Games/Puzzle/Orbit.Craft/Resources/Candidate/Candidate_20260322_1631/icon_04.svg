<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120A30"/>
      <stop offset="100%" stop-color="#060318"/>
    </radialGradient>
    <radialGradient id="planetCore04" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#80FFDC"/>
      <stop offset="100%" stop-color="#006644"/>
    </radialGradient>
    <clipPath id="frame04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Deep purple space background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#frame04)">
    <!-- Layer 2: Gravity field rings expanding from planet center -->
    <!-- The planet is at center, gravity waves expand outward -->
    <!-- Ring 1 (innermost) -->
    <circle cx="512" cy="512" r="70" fill="none" stroke="#00FFC0" stroke-width="10" opacity="0.9"/>
    <!-- Ring 2 -->
    <circle cx="512" cy="512" r="145" fill="none" stroke="#00FFC0" stroke-width="8" opacity="0.72"/>
    <!-- Ring 3 -->
    <circle cx="512" cy="512" r="220" fill="none" stroke="#00FFB0" stroke-width="7" opacity="0.55"/>
    <!-- Ring 4 -->
    <circle cx="512" cy="512" r="295" fill="none" stroke="#00EEA0" stroke-width="6" opacity="0.40"/>
    <!-- Ring 5 -->
    <circle cx="512" cy="512" r="370" fill="none" stroke="#00CC88" stroke-width="5" opacity="0.28"/>
    <!-- Ring 6 (outermost) -->
    <circle cx="512" cy="512" r="445" fill="none" stroke="#00AA70" stroke-width="4" opacity="0.18"/>

    <!-- Radial gravity lines (8 directions) -->
    <line x1="512" y1="67" x2="512" y2="135" stroke="#00FFC0" stroke-width="3" opacity="0.4"/>
    <line x1="512" y1="889" x2="512" y2="957" stroke="#00FFC0" stroke-width="3" opacity="0.4"/>
    <line x1="67" y1="512" x2="135" y2="512" stroke="#00FFC0" stroke-width="3" opacity="0.4"/>
    <line x1="889" y1="512" x2="957" y2="512" stroke="#00FFC0" stroke-width="3" opacity="0.4"/>
    <line x1="190" y1="190" x2="240" y2="240" stroke="#00FFC0" stroke-width="3" opacity="0.3"/>
    <line x1="784" y1="784" x2="834" y2="834" stroke="#00FFC0" stroke-width="3" opacity="0.3"/>
    <line x1="834" y1="190" x2="784" y2="240" stroke="#00FFC0" stroke-width="3" opacity="0.3"/>
    <line x1="190" y1="834" x2="240" y2="784" stroke="#00FFC0" stroke-width="3" opacity="0.3"/>

    <!-- Central planet (target) -->
    <circle cx="512" cy="512" r="68" fill="#006644" opacity="0.95"/>
    <circle cx="512" cy="512" r="58" fill="url(#planetCore04)"/>
    <ellipse cx="496" cy="497" rx="22" ry="15" fill="white" opacity="0.25"/>

    <!-- Layer 3: Probe (gold) being pulled into orbit — showing 3 positions -->
    <!-- Position 1 (far, entering gravity field) -->
    <polygon points="870,200 855,230 885,230" fill="#FFF0A0" opacity="0.6"/>
    <!-- Arrow from pos 1 to center -->
    <line x1="862" y1="215" x2="750" y2="370" stroke="#FFD060" stroke-width="4" stroke-dasharray="10,14" stroke-linecap="round" opacity="0.4"/>

    <!-- Position 2 (mid, being curved by gravity) -->
    <polygon points="690,330 675,362 708,360" fill="#FFF0A0" opacity="0.8"/>
    <!-- Curved path -->
    <path d="M700,345 Q680,390 650,430" fill="none" stroke="#FFD060" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

    <!-- Position 3 (in orbit, success) -->
    <polygon points="620,640 605,668 635,665" fill="#FFF0A0"/>
    <!-- Full orbit arc -->
    <path d="M630,654 A170,170 0 0 1 692,342" fill="none" stroke="#FFD060" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- "GRAVITY PULL" label -->
    <text x="512" y="970" font-family="'Segoe UI',Arial" font-size="42" font-weight="900" fill="#004433" text-anchor="middle" opacity="0.85">GRAVITY PUZZLE</text>
  </g>
</svg>
