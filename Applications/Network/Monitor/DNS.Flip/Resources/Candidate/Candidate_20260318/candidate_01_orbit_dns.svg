<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 궤도 링들 -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="140" ry="45" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.2"/>
  <!-- 중앙 글로브 -->
  <circle cx="256" cy="256" r="60" fill="#0EA5E9" opacity="0.15"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)"/>
  <!-- 글로브 경선 -->
  <ellipse cx="256" cy="256" rx="25" ry="50" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="206" y1="256" x2="306" y2="256" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="214" y1="222" x2="298" y2="222" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <line x1="214" y1="290" x2="298" y2="290" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <!-- 회전 화살표 (궤도 위) -->
  <path d="M 436 256 A 180 60 0 0 1 76 256" fill="none" stroke="#0EA5E9" stroke-width="3" stroke-dasharray="20,8" filter="url(#glow)"/>
  <polygon points="76,244 65,256 76,268" fill="#0EA5E9" filter="url(#glow)"/>
  <!-- DNS 텍스트 배지 -->
  <rect x="200" y="340" width="112" height="36" rx="18" fill="#0EA5E9" opacity="0.2"/>
  <rect x="200" y="340" width="112" height="36" rx="18" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="256" y="363" text-anchor="middle" fill="#38BDF8" font-size="16" font-family="monospace" font-weight="bold">DNS</text>
  <!-- 서버 노드 (궤도 위) -->
  <circle cx="436" cy="256" r="12" fill="#0EA5E9" opacity="0.9" filter="url(#glow)"/>
  <circle cx="76" cy="256" r="10" fill="#38BDF8" opacity="0.7"/>
  <!-- 빛 장식 -->
  <circle cx="150" cy="130" r="3" fill="#0EA5E9" opacity="0.6" filter="url(#glow)"/>
  <circle cx="380" cy="390" r="4" fill="#38BDF8" opacity="0.5"/>
  <circle cx="400" cy="140" r="2" fill="#0EA5E9" opacity="0.7"/>
</svg>