<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="100%" stop-color="#15002e"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#784ba0"/>
      <stop offset="100%" stop-color="#2b86c5"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0"/>
      <stop offset="100%" stop-color="#00d9f5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bezier curves forming a flower/art -->
  <path d="M256 256 C256 100 400 100 400 256 C400 412 256 412 256 256" stroke="url(#c1)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M256 256 C100 256 100 100 256 100 C412 100 412 256 256 256" stroke="url(#c2)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M256 256 C256 412 112 412 112 256 C112 100 256 100 256 256" stroke="url(#c3)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M256 256 C412 256 412 400 256 400 C100 400 100 256 256 256" stroke="url(#c1)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- Diagonal beziers -->
  <path d="M100 100 C200 80 300 180 400 400" stroke="url(#c2)" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)"/>
  <path d="M400 100 C300 80 200 180 100 400" stroke="url(#c3)" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)"/>
  <!-- Center node -->
  <circle cx="256" cy="256" r="14" fill="white" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="8" fill="url(#c1)"/>
</svg>