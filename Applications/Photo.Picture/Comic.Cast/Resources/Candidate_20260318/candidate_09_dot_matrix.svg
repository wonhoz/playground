<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 도트 매트릭스 (얼굴 형태의 하프톤) -->
  <!-- 큰 원들 (어두운 부분 = 눈/윤곽) -->
  <circle cx="185" cy="185" r="12" fill="#FB923C" opacity="0.8" filter="url(#glow)"/>
  <circle cx="327" cy="185" r="12" fill="#FB923C" opacity="0.8" filter="url(#glow)"/>
  <!-- 중간 원들 (코 주변) -->
  <circle cx="256" cy="230" r="9" fill="#FDBA74" opacity="0.6"/>
  <circle cx="220" cy="250" r="7" fill="#FB923C" opacity="0.5"/>
  <circle cx="292" cy="250" r="7" fill="#FB923C" opacity="0.5"/>
  <!-- 입 (곡선 배치 점들) -->
  <circle cx="195" cy="295" r="8" fill="#FB923C" opacity="0.7" filter="url(#glow)"/>
  <circle cx="222" cy="315" r="9" fill="#FDBA74" opacity="0.7"/>
  <circle cx="256" cy="320" r="8" fill="#FB923C" opacity="0.7"/>
  <circle cx="290" cy="315" r="9" fill="#FDBA74" opacity="0.7"/>
  <circle cx="317" cy="295" r="8" fill="#FB923C" opacity="0.7" filter="url(#glow)"/>
  <!-- 윤곽 (경계 점들) -->
  <circle cx="140" cy="220" r="7" fill="#FDBA74" opacity="0.5"/>
  <circle cx="130" cy="260" r="8" fill="#FB923C" opacity="0.5"/>
  <circle cx="135" cy="300" r="7" fill="#FDBA74" opacity="0.45"/>
  <circle cx="372" cy="220" r="7" fill="#FDBA74" opacity="0.5"/>
  <circle cx="382" cy="260" r="8" fill="#FB923C" opacity="0.5"/>
  <circle cx="377" cy="300" r="7" fill="#FDBA74" opacity="0.45"/>
  <!-- 배경 점들 (밝은 영역) -->
  <circle cx="185" cy="145" r="5" fill="#FDBA74" opacity="0.35"/>
  <circle cx="256" cy="135" r="5" fill="#FB923C" opacity="0.3"/>
  <circle cx="327" cy="145" r="5" fill="#FDBA74" opacity="0.35"/>
  <circle cx="145" cy="180" r="5" fill="#FB923C" opacity="0.3"/>
  <circle cx="367" cy="180" r="5" fill="#FDBA74" opacity="0.3"/>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#FB923C" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">DOT MATRIX</text>
</svg>