<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 힌트 번호판 — 가로/세로 힌트 클루 보드 | 대각선/동적 | #002A1A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#002A1A"/>
  <!-- Layer 2: Crossword clue board -->
  <!-- Board frame -->
  <rect x="180" y="180" width="664" height="620" rx="16" fill="#0A3A24" stroke="#22AA6A" stroke-width="4"/>
  <!-- Board header -->
  <rect x="180" y="180" width="664" height="60" rx="16" fill="#1A5A3A"/>
  <rect x="180" y="216" width="664" height="24" fill="#1A5A3A"/>
  <text x="512" y="220" font-family="monospace" font-size="20" fill="#4ADE80" text-anchor="middle" font-weight="bold">CLUE BOARD</text>
  <!-- Divider between across and down -->
  <line x1="512" y1="252" x2="512" y2="780" stroke="#0E4A2A" stroke-width="3"/>
  <!-- ACROSS header -->
  <text x="346" y="280" font-family="monospace" font-size="16" fill="#22AA6A" text-anchor="middle" font-weight="bold">가로 (ACROSS)</text>
  <line x1="196" y1="288" x2="496" y2="288" stroke="#0E4A2A" stroke-width="2"/>
  <!-- ACROSS clues -->
  <text x="200" y="320" font-family="serif" font-size="15" fill="#86EFAC">1.  문서 작성 프로그램</text>
  <text x="200" y="348" font-family="serif" font-size="15" fill="#86EFAC">4.  인터넷 연결 장치</text>
  <text x="200" y="376" font-family="serif" font-size="15" fill="#86EFAC">7.  지구 위성의 이름</text>
  <text x="200" y="404" font-family="serif" font-size="15" fill="#86EFAC">9.  프로그래밍 기초</text>
  <text x="200" y="432" font-family="serif" font-size="14" fill="#4ADE80">11. 영화 상영 장소  ✓</text>
  <text x="200" y="460" font-family="serif" font-size="15" fill="#86EFAC">13. 물이 끓는 온도</text>
  <text x="200" y="488" font-family="serif" font-size="15" fill="#86EFAC">15. 세계 최고 산 이름</text>
  <text x="200" y="516" font-family="serif" font-size="14" fill="#4ADE80">17. 태양계 행성 수  ✓</text>
  <text x="200" y="544" font-family="serif" font-size="15" fill="#86EFAC">19. 서울의 강 이름</text>
  <text x="200" y="572" font-family="serif" font-size="15" fill="#86EFAC">20. 가장 작은 단위</text>
  <!-- DOWN header -->
  <text x="678" y="280" font-family="monospace" font-size="16" fill="#22AA6A" text-anchor="middle" font-weight="bold">세로 (DOWN)</text>
  <line x1="528" y1="288" x2="828" y2="288" stroke="#0E4A2A" stroke-width="2"/>
  <!-- DOWN clues -->
  <text x="528" y="320" font-family="serif" font-size="15" fill="#86EFAC">2.  지도의 방향 표시</text>
  <text x="528" y="348" font-family="serif" font-size="15" fill="#86EFAC">3.  전기 발생 장치</text>
  <text x="528" y="376" font-family="serif" font-size="14" fill="#4ADE80">5.  빛의 속도 단위  ✓</text>
  <text x="528" y="404" font-family="serif" font-size="15" fill="#86EFAC">6.  한국의 국화</text>
  <text x="528" y="432" font-family="serif" font-size="15" fill="#86EFAC">8.  산소의 원소기호</text>
  <text x="528" y="460" font-family="serif" font-size="15" fill="#86EFAC">10. 물질의 세 가지 상태</text>
  <text x="528" y="488" font-family="serif" font-size="15" fill="#86EFAC">12. 원소 주기율표</text>
  <text x="528" y="516" font-family="serif" font-size="14" fill="#4ADE80">14. 대한민국 수도  ✓</text>
  <text x="528" y="544" font-family="serif" font-size="15" fill="#86EFAC">16. 가장 긴 강의 이름</text>
  <text x="528" y="572" font-family="serif" font-size="15" fill="#86EFAC">18. 빛의 7가지 색</text>
  <!-- Current focused clue highlight at bottom -->
  <rect x="196" y="595" width="632" height="60" rx="10" fill="#1A5A3A" stroke="#4ADE80" stroke-width="3"/>
  <text x="512" y="618" font-family="serif" font-size="14" fill="#4ADE80" text-anchor="middle">현재 입력: 11번 가로 →</text>
  <text x="512" y="642" font-family="serif" font-size="15" fill="white" text-anchor="middle">영화 상영 장소  (4글자: _ _ _ _)</text>
  <!-- Layer 3: Pencil icon decoration -->
  <text x="830" y="800" font-family="Arial,sans-serif" font-size="32" fill="#22AA6A" opacity="0.5">✏</text>
</svg>
