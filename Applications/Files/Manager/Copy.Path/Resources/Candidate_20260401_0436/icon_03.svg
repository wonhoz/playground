<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Folder icon (left) -->
  <!-- Folder tab -->
  <rect x="120" y="310" width="180" height="50" rx="16" fill="url(#folder)"/>
  <!-- Folder body -->
  <rect x="120" y="350" width="380" height="280" rx="20" fill="url(#folder)"/>
  <!-- Folder inner shadow -->
  <rect x="140" y="370" width="340" height="240" rx="12" fill="#FFB300" opacity="0.5"/>
  <!-- Path arrow going right -->
  <line x1="510" y1="490" x2="670" y2="490" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <polygon points="670,490 640,464 640,516" fill="white"/>
  <!-- Dashes before arrow -->
  <line x1="510" y1="490" x2="540" y2="490" stroke="white" stroke-width="14" stroke-dasharray="22 14" stroke-linecap="round"/>
  <!-- Layer 3: Clipboard (right) -->
  <rect x="680" y="340" width="220" height="300" rx="16" fill="white" opacity="0.95"/>
  <!-- Clipboard top clip -->
  <rect x="750" y="322" width="80" height="42" rx="12" fill="#BDBDBD"/>
  <rect x="768" y="312" width="44" height="28" rx="14" fill="#FF6F00"/>
  <!-- Lines on clipboard -->
  <rect x="704" y="420" width="172" height="14" rx="7" fill="#FF8F00" opacity="0.6"/>
  <rect x="704" y="456" width="140" height="14" rx="7" fill="#FF8F00" opacity="0.5"/>
  <rect x="704" y="492" width="160" height="14" rx="7" fill="#FF8F00" opacity="0.4"/>
  <!-- Check mark (copied!) -->
  <circle cx="790" cy="570" r="38" fill="#4CAF50"/>
  <polyline points="768,572 782,586 814,554" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Path text at bottom -->
  <text x="512" y="890" text-anchor="middle" dominant-baseline="middle" font-size="78" font-family="Consolas,monospace" fill="white" opacity="0.85">C:\Path → 📋</text>
</svg>
