<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 물수제비 바운스: 돌+물 튀기기 -->
  <!-- water surface -->
  <path d="M160 680 Q512 640 864 680" fill="none" stroke="#388E3C" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- bounce arc 1 (tallest, leftmost) -->
  <path d="M240 680 Q340 460 440 680" fill="none" stroke="#81C784" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- bounce arc 2 -->
  <path d="M440 680 Q520 540 600 680" fill="none" stroke="#81C784" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- bounce arc 3 (shortest) -->
  <path d="M600 680 Q655 610 710 680" fill="none" stroke="#81C784" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- ball at each bounce point -->
  <circle cx="340" cy="462" r="36" fill="#81C784"/>
  <circle cx="328" cy="450" r="5" fill="#388E3C" opacity="0.5"/>
  <circle cx="350" cy="450" r="5" fill="#388E3C" opacity="0.5"/>
  <circle cx="520" cy="542" r="28" fill="#81C784" opacity="0.85"/>
  <circle cx="655" cy="612" r="20" fill="#81C784" opacity="0.7"/>
  <!-- water splash rings at bounce points -->
  <ellipse cx="440" cy="680" rx="44" ry="14" fill="none" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <ellipse cx="600" cy="680" rx="32" ry="10" fill="none" stroke="#81C784" stroke-width="3" opacity="0.4"/>
  <ellipse cx="710" cy="680" rx="22" ry="7" fill="none" stroke="#81C784" stroke-width="2" opacity="0.3"/>
</svg>
