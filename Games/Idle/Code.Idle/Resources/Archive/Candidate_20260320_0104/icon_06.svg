<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Robot head -->
  <rect x="340" y="260" width="344" height="280" rx="36" fill="#1B5E20" fill-opacity="0.85" stroke="#66BB6A" stroke-width="14"/>
  <!-- Robot eyes -->
  <rect x="390" y="320" width="100" height="80" rx="12" fill="#A5D6A7"/>
  <rect x="534" y="320" width="100" height="80" rx="12" fill="#A5D6A7"/>
  <rect x="410" y="340" width="60" height="40" rx="6" fill="#1B5E20"/>
  <rect x="554" y="340" width="60" height="40" rx="6" fill="#1B5E20"/>
  <!-- Robot mouth/code display -->
  <rect x="380" y="440" width="264" height="50" rx="8" fill="#000A05"/>
  <rect x="392" y="452" width="70" height="14" rx="4" fill="#66BB6A"/>
  <rect x="476" y="452" width="50" height="14" rx="4" fill="#A5D6A7"/>
  <rect x="540" y="452" width="90" height="14" rx="4" fill="#66BB6A" fill-opacity="0.7"/>
  <!-- Robot antenna -->
  <line x1="512" y1="260" x2="512" y2="200" stroke="#1B5E20" stroke-width="20"/>
  <circle cx="512" cy="190" r="22" fill="#66BB6A"/>
  <!-- Code output arrow -->
  <line x1="512" y1="540" x2="512" y2="660" stroke="#66BB6A" stroke-width="20" stroke-linecap="round"/>
  <polygon points="512,700 472,650 552,650" fill="#66BB6A"/>
  <!-- Code blocks produced -->
  <rect x="360" y="720" width="100" height="24" rx="8" fill="#1B5E20" fill-opacity="0.8"/>
  <rect x="480" y="720" width="80" height="24" rx="8" fill="#66BB6A" fill-opacity="0.6"/>
  <rect x="580" y="720" width="100" height="24" rx="8" fill="#A5D6A7" fill-opacity="0.5"/>
  <rect x="380" y="762" width="60" height="24" rx="8" fill="#66BB6A" fill-opacity="0.5"/>
  <rect x="460" y="762" width="120" height="24" rx="8" fill="#1B5E20" fill-opacity="0.6"/>
</svg>