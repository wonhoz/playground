<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03045E"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <clipPath id="c1e"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1e)"/>
  <circle cx="200" cy="820" r="300" fill="#0077B6" opacity="0.15" clip-path="url(#c1e)"/>

  <!-- Layer 2: 구름 형태 안에 크기 다른 단어들 (중앙심볼, Ocean 팔레트) -->
  <!-- 구름 실루엣 (여러 원의 합) -->
  <circle cx="512" cy="500" r="240" fill="#023E8A" opacity="0.5"/>
  <circle cx="340" cy="540" r="170" fill="#0077B6" opacity="0.45"/>
  <circle cx="680" cy="540" r="170" fill="#0077B6" opacity="0.45"/>
  <circle cx="440" cy="420" r="140" fill="#0096C7" opacity="0.35"/>
  <circle cx="590" cy="420" r="140" fill="#0096C7" opacity="0.35"/>

  <!-- 구름 외곽 (선) -->
  <circle cx="512" cy="500" r="240" fill="none" stroke="#00B4D8" stroke-width="3" opacity="0.4"/>
  <circle cx="340" cy="540" r="170" fill="none" stroke="#00B4D8" stroke-width="3" opacity="0.35"/>
  <circle cx="680" cy="540" r="170" fill="none" stroke="#00B4D8" stroke-width="3" opacity="0.35"/>

  <!-- 단어들 (빈도수 → 크기) -->
  <!-- 가장 큰 단어 (1위) -->
  <text x="512" y="525" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="88" font-weight="700" fill="#CAF0F8">cloud</text>

  <!-- 2~3위 -->
  <text x="340" y="468" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="52" font-weight="600" fill="#90E0EF">word</text>
  <text x="700" y="472" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="52" font-weight="600" fill="#90E0EF">text</text>

  <!-- 4~6위 -->
  <text x="430" y="590" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="38" font-weight="600" fill="#00B4D8">data</text>
  <text x="600" y="596" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="38" font-weight="600" fill="#00B4D8">font</text>
  <text x="512" y="440" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="34" font-weight="500" fill="#48CAE4">freq</text>

  <!-- 소형 단어들 -->
  <text x="280" y="520" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" fill="#0096C7">art</text>
  <text x="740" y="520" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" fill="#0096C7">size</text>
  <text x="360" y="570" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#0077B6">rank</text>
  <text x="670" y="574" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#0077B6">mask</text>
  <text x="350" y="610" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#005F8A">skia</text>
  <text x="660" y="614" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#005F8A">png</text>
  <text x="512" y="620" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#004D70">svg</text>

  <!-- Layer 3: 하단 -->
  <rect x="300" y="750" width="424" height="52" rx="14" fill="#03045E" opacity="0.85"/>
  <text x="512" y="782" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" fill="#90E0EF">Word Cloud</text>
</svg>
