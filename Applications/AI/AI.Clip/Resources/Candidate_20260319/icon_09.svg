<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Clipboard with translate/language symbol -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#002233"/>
  <!-- Clipboard outline -->
  <rect x="250" y="200" width="440" height="560" rx="28" fill="#003344" stroke="#00ACC1" stroke-width="26"/>
  <rect x="360" y="170" width="220" height="68" rx="16" fill="#00ACC1"/>
  <!-- Globe / translate icon inside -->
  <circle cx="470" cy="480" r="160" fill="none" stroke="#00ACC1" stroke-width="20"/>
  <!-- Latitude lines -->
  <ellipse cx="470" cy="480" rx="160" ry="60" fill="none" stroke="#00ACC1" stroke-width="14" opacity="0.7"/>
  <!-- Longitude line -->
  <line x1="470" y1="320" x2="470" y2="640" stroke="#00ACC1" stroke-width="14" opacity="0.7"/>
  <!-- Horizontal equator -->
  <line x1="310" y1="480" x2="630" y2="480" stroke="#00ACC1" stroke-width="14" opacity="0.7"/>
  <!-- Translate arrows -->
  <path d="M580 380 Q640 360 660 420" fill="none" stroke="#FF6E40" stroke-width="18" stroke-linecap="round"/>
  <path d="M655 390 L660 420 L630 410" fill="none" stroke="#FF6E40" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
