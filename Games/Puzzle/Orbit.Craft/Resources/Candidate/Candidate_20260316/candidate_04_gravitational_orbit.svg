<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#00010a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="gravity_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#fbbf24"/>
      <stop offset="70%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#7c2d12"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </radialGradient>
    <filter id="coreglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gravitational distortion rings -->
  <ellipse cx="256" cy="256" rx="60" ry="60" fill="none" stroke="#fbbf2420" stroke-width="3"/>
  <ellipse cx="256" cy="256" rx="90" ry="90" fill="none" stroke="#fbbf2415" stroke-width="2.5"/>
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="none" stroke="#fbbf2412" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="155" ry="155" fill="none" stroke="#fbbf2408" stroke-width="1.5"/>
  <ellipse cx="256" cy="256" rx="190" ry="190" fill="none" stroke="#fbbf2405" stroke-width="1"/>
  <!-- Gravitational lensing (bent lines) -->
  <path d="M70,140 Q130,200 200,256 Q170,280 70,370" stroke="#ffffff08" stroke-width="2" fill="none"/>
  <path d="M442,140 Q382,200 312,256 Q342,280 442,370" stroke="#ffffff08" stroke-width="2" fill="none"/>
  <!-- Core (black hole / massive star) -->
  <circle cx="256" cy="256" r="36" fill="url(#gravity_core)" filter="url(#coreglow)"/>
  <!-- Orbiting bodies at different radii -->
  <circle cx="376" cy="256" r="16" fill="url(#orb)" filter="url(#sm)"/>
  <circle cx="256" cy="136" r="12" fill="#f472b6" filter="url(#sm)"/>
  <circle cx="136" cy="256" r="10" fill="#a3e635" filter="url(#sm)"/>
  <circle cx="386" cy="170" r="7" fill="#e2e8f0" filter="url(#sm)"/>
  <!-- Star field -->
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="420" cy="100" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="400" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="460" cy="400" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="450" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="380" cy="440" r="1.5" fill="#fff" opacity="0.6"/>
</svg>
