<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric stack layers -->
  <!-- Layer 5 (bottom) -->
  <polygon points="256,370 100,310 256,250 412,310" fill="#1a2a3a" stroke="#334466" stroke-width="2"/>
  <polygon points="100,310 100,340 256,400 256,370" fill="#0d1a2a" stroke="#223355" stroke-width="2"/>
  <polygon points="256,370 412,310 412,340 256,400" fill="#111a2a" stroke="#223355" stroke-width="2"/>
  <!-- Layer 4 -->
  <polygon points="256,320 100,260 256,200 412,260" fill="#1a3a3a" stroke="#336666" stroke-width="2"/>
  <polygon points="100,260 100,310 256,370 256,320" fill="#0d2a2a" stroke="#225555" stroke-width="2"/>
  <polygon points="256,320 412,260 412,310 256,370" fill="#112a2a" stroke="#225555" stroke-width="2"/>
  <!-- Text on layer 4 -->
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="14" fill="#33aaaa" opacity="0.7">Hello World</text>
  <!-- Layer 3 -->
  <polygon points="256,270 100,210 256,150 412,210" fill="#1a3a2a" stroke="#336644" stroke-width="2"/>
  <polygon points="100,210 100,260 256,320 256,270" fill="#0d2a1a" stroke="#225533" stroke-width="2"/>
  <polygon points="256,270 412,210 412,260 256,320" fill="#112a1a" stroke="#225533" stroke-width="2"/>
  <text x="256" y="220" text-anchor="middle" font-family="monospace" font-size="14" fill="#33aa66" opacity="0.7">https://...</text>
  <!-- Layer 2 -->
  <polygon points="256,220 100,160 256,100 412,160" fill="#2a3a1a" stroke="#446633" stroke-width="2"/>
  <polygon points="100,160 100,210 256,270 256,220" fill="#1a2a0d" stroke="#335522" stroke-width="2"/>
  <polygon points="256,220 412,160 412,210 256,270" fill="#1a2a11" stroke="#335522" stroke-width="2"/>
  <text x="256" y="170" text-anchor="middle" font-family="monospace" font-size="14" fill="#88aa33" opacity="0.7">echo $var</text>
  <!-- Layer 1 (top) - highlighted -->
  <polygon points="256,170 100,110 256,50 412,110" fill="#2a2a5a" stroke="#6666ee" stroke-width="3"/>
  <polygon points="100,110 100,160 256,220 256,170" fill="#1a1a4a" stroke="#5555cc" stroke-width="2"/>
  <polygon points="256,170 412,110 412,160 256,220" fill="#1a1a4a" stroke="#5555cc" stroke-width="2"/>
  <text x="256" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="#aaaaff">Ctrl+V item</text>
  <!-- Stack counter badge -->
  <circle cx="420" cy="440" r="36" fill="#2255ff"/>
  <text x="420" y="448" text-anchor="middle" font-family="Arial Black" font-size="28" fill="#fff">5</text>
</svg>