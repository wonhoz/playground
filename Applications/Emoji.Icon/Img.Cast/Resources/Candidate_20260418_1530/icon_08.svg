<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: 좌측 입력 포맷 블록들 -->
    <rect x="100" y="220" width="300" height="100" rx="20" fill="#5C6BC0"/>
    <text x="250" y="284" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">SVG</text>
    <rect x="100" y="350" width="300" height="100" rx="20" fill="#EC407A"/>
    <text x="250" y="414" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">PNG</text>
    <rect x="100" y="480" width="300" height="100" rx="20" fill="#8D6E63"/>
    <text x="250" y="544" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">BMP</text>
    <rect x="100" y="610" width="300" height="100" rx="20" fill="#546E7A"/>
    <text x="250" y="674" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">WEBP</text>

    <!-- Layer 2: 중앙 ↔ 화살표 (큰) -->
    <circle cx="512" cy="460" r="110" fill="#00897B"/>
    <text x="512" y="498" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">↔</text>

    <!-- 우측 출력 포맷 블록들 -->
    <rect x="624" y="220" width="300" height="100" rx="20" fill="#EF6C00"/>
    <text x="774" y="284" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">ICO</text>
    <rect x="624" y="350" width="300" height="100" rx="20" fill="#26A69A"/>
    <text x="774" y="414" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">PNG</text>
    <rect x="624" y="480" width="300" height="100" rx="20" fill="#AB47BC"/>
    <text x="774" y="544" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">JPG</text>
    <rect x="624" y="610" width="300" height="100" rx="20" fill="#1565C0"/>
    <text x="774" y="674" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">WEBP</text>

    <!-- Layer 3: 타이틀 -->
    <rect x="230" y="790" width="564" height="80" rx="24" fill="#00695C"/>
    <text x="512" y="844" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>

    <text x="512" y="950" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#4DB6AC" text-anchor="middle">원클릭 포맷 변환</text>
