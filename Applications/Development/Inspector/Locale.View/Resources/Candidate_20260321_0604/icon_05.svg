<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="lv5-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <radialGradient id="lv5-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7040CC"/>
      <stop offset="100%" stop-color="#3A1A80"/>
    </radialGradient>
    <filter id="lv5-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#lv5-clip)">
    <!-- Background: Vivid Purple -->
    <rect width="1024" height="1024" fill="url(#lv5-bg)"/>

    <!-- Globe (white) -->
    <g filter="url(#lv5-glow)">
      <circle cx="460" cy="500" r="210" fill="#2A1870" stroke="#FFFFFF" stroke-width="12"/>
      <!-- Globe equator -->
      <ellipse cx="460" cy="500" rx="210" ry="55" fill="none" stroke="#FFFFFF" stroke-width="7" opacity="0.7"/>
      <!-- Globe meridian -->
      <ellipse cx="460" cy="500" rx="55" ry="210" fill="none" stroke="#FFFFFF" stroke-width="7" opacity="0.7"/>
      <!-- Globe second meridian -->
      <ellipse cx="460" cy="500" rx="145" ry="210" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.4"/>
      <!-- Globe poles -->
      <circle cx="460" cy="292" r="8" fill="#FFFFFF" opacity="0.8"/>
      <circle cx="460" cy="708" r="8" fill="#FFFFFF" opacity="0.8"/>
      <!-- Simplified continent shapes on globe -->
      <path d="M 380 440 Q 400 420 430 425 Q 450 435 445 460 Q 430 475 410 470 Q 385 460 Z" fill="#FFFFFF" opacity="0.7"/>
      <path d="M 460 415 Q 510 410 530 430 Q 535 450 515 465 Q 490 470 465 455 Z" fill="#FFFFFF" opacity="0.65"/>
      <path d="M 390 490 Q 420 480 445 490 Q 450 515 430 530 Q 405 530 390 515 Z" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <!-- Calendar (red/pink) overlaid on globe, upper right -->
    <g filter="url(#lv5-glow)" transform="translate(590, 280)">
      <rect x="0" y="0" width="200" height="200" rx="18" fill="#CC1A40" stroke="#FF6080" stroke-width="3"/>
      <!-- Calendar header -->
      <rect x="0" y="0" width="200" height="52" rx="18" fill="#EE2A50"/>
      <rect x="0" y="34" width="200" height="18" fill="#EE2A50"/>
      <!-- Header rings -->
      <rect x="55" y="-10" width="14" height="28" rx="7" fill="#FFFFFF" opacity="0.9"/>
      <rect x="131" y="-10" width="14" height="28" rx="7" fill="#FFFFFF" opacity="0.9"/>
      <text x="100" y="34" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">March</text>
      <!-- Calendar days grid -->
      <g font-family="monospace" font-size="18" fill="#FFFFFF">
        <text x="18" y="80">S</text><text x="46" y="80">M</text><text x="74" y="80">T</text><text x="102" y="80">W</text><text x="130" y="80">T</text><text x="158" y="80">F</text>
        <text x="18" y="108">1</text><text x="46" y="108">2</text><text x="74" y="108">3</text><text x="102" y="108">4</text><text x="130" y="108">5</text>
        <text x="18" y="136">7</text><text x="46" y="136">8</text><text x="74" y="136">9</text>
      </g>
      <!-- Highlight today -->
      <circle cx="152" cy="126" r="13" fill="#FFFFFF"/>
      <text x="152" y="131" font-family="monospace" font-size="16" fill="#CC1A40" text-anchor="middle" font-weight="bold">6</text>
    </g>

    <!-- Clock (teal accent) overlaid bottom right -->
    <g filter="url(#lv5-glow)" transform="translate(630, 560)">
      <circle cx="80" cy="80" r="80" fill="#0A3A50" stroke="#00D4D4" stroke-width="8"/>
      <!-- Clock ticks -->
      <g stroke="#FFFFFF" stroke-width="4" opacity="0.6">
        <line x1="80" y1="10" x2="80" y2="22"/>
        <line x1="80" y1="138" x2="80" y2="150"/>
        <line x1="10" y1="80" x2="22" y2="80"/>
        <line x1="138" y1="80" x2="150" y2="80"/>
      </g>
      <!-- Clock hands -->
      <line x1="80" y1="80" x2="80" y2="40" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <line x1="80" y1="80" x2="110" y2="95" stroke="#00D4D4" stroke-width="6" stroke-linecap="round"/>
      <circle cx="80" cy="80" r="7" fill="#FFFFFF"/>
    </g>

    <!-- Connection line between calendar and clock -->
    <line x1="690" y1="490" x2="710" y2="565" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

    <!-- Corner accents -->
    <circle cx="220" cy="800" r="22" fill="#FFFFFF" opacity="0.1"/>
    <circle cx="800" cy="800" r="18" fill="#FFFFFF" opacity="0.1"/>
  </g>
</svg>
