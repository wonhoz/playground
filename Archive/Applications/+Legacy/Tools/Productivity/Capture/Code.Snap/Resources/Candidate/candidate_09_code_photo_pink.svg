<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120008"/>
      <stop offset="100%" stop-color="#0D0005"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Photo frame -->
  <rect x="110" y="135" width="292" height="260" rx="12" fill="white" opacity="0.95"/>
  <rect x="120" y="145" width="272" height="220" rx="8" fill="url(#photo)"/>
  <!-- Colorful syntax highlight -->
  <rect x="134" y="162" width="80" height="10" rx="3" fill="#F48FB1"/>
  <rect x="222" y="162" width="60" height="10" rx="3" fill="#CE93D8"/>
  <rect x="146" y="180" width="70" height="10" rx="3" fill="#F48FB1" opacity="0.9"/>
  <rect x="222" y="180" width="90" height="10" rx="3" fill="#FF80AB"/>
  <rect x="134" y="198" width="110" height="10" rx="3" fill="#CE93D8" opacity="0.85"/>
  <rect x="146" y="216" width="80" height="10" rx="3" fill="#F48FB1" opacity="0.8"/>
  <rect x="134" y="234" width="100" height="10" rx="3" fill="#FF80AB" opacity="0.75"/>
  <rect x="146" y="252" width="75" height="10" rx="3" fill="#F48FB1" opacity="0.7"/>
  <rect x="134" y="270" width="90" height="10" rx="3" fill="#CE93D8" opacity="0.65"/>
  <rect x="146" y="288" width="110" height="10" rx="3" fill="#FF80AB" opacity="0.6"/>
  <rect x="134" y="306" width="60" height="10" rx="3" fill="#F48FB1" opacity="0.55"/>
  <rect x="134" y="324" width="80" height="10" rx="3" fill="#CE93D8" opacity="0.5"/>
  <!-- Filename caption -->
  <rect x="120" y="355" width="272" height="30" rx="0" fill="white" opacity="0.9"/>
  <text x="256" y="375" text-anchor="middle" font-size="14" fill="#880E4F" font-family="Courier New" font-weight="bold">snapshot_001.png</text>
  <!-- Camera icon bottom right -->
  <circle cx="380" cy="430" r="30" fill="#AD1457"/>
  <circle cx="380" cy="430" r="18" fill="#880E4F" stroke="#F48FB1" stroke-width="2"/>
  <circle cx="380" cy="430" r="8" fill="#F48FB1"/>
</svg>
