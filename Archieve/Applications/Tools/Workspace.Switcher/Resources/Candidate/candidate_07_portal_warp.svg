<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <radialGradient id="portal1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#4c1d95" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portal2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="60%" stop-color="#164e63" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#164e63" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 포탈 1 (왼쪽, 보라) -->
  <ellipse cx="160" cy="256" rx="72" ry="100" fill="url(#portal1)" filter="url(#glow)"/>
  <ellipse cx="160" cy="256" rx="72" ry="100" fill="none" stroke="#a78bfa" stroke-width="4" filter="url(#glow)"/>
  <ellipse cx="160" cy="256" rx="56" ry="80" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <ellipse cx="160" cy="256" rx="36" ry="54" fill="none" stroke="#6d28d9" stroke-width="1.5" opacity="0.4"/>
  <!-- 포탈 2 (오른쪽, 시안) -->
  <ellipse cx="352" cy="256" rx="72" ry="100" fill="url(#portal2)" filter="url(#glow)"/>
  <ellipse cx="352" cy="256" rx="72" ry="100" fill="none" stroke="#22d3ee" stroke-width="4" filter="url(#glow)"/>
  <ellipse cx="352" cy="256" rx="56" ry="80" fill="none" stroke="#0891b2" stroke-width="2" opacity="0.6"/>
  <ellipse cx="352" cy="256" rx="36" ry="54" fill="none" stroke="#0e7490" stroke-width="1.5" opacity="0.4"/>
  <!-- 전이 중인 창 아이콘 (중간) -->
  <rect x="214" y="224" width="84" height="64" rx="8" fill="#1e1a3a" stroke="#a78bfa" stroke-width="2" opacity="0.9" filter="url(#glow2)"/>
  <rect x="214" y="224" width="84" height="18" rx="8" fill="#4c1d95" opacity="0.9"/>
  <!-- 스트림 파티클들 -->
  <circle cx="220" cy="256" r="4" fill="#a78bfa" opacity="0.8" filter="url(#glow2)"/>
  <circle cx="240" cy="248" r="3" fill="#818cf8" opacity="0.6"/>
  <circle cx="272" cy="260" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="292" cy="252" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow2)"/>
  <!-- 레이블 -->
  <text x="160" y="380" font-family="Arial" font-size="13" fill="#a78bfa" text-anchor="middle">Desk 1</text>
  <text x="352" y="380" font-family="Arial" font-size="13" fill="#22d3ee" text-anchor="middle">Desk 2</text>
</svg>
