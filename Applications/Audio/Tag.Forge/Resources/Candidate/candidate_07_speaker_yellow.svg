<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1400"/>
      <stop offset="100%" stop-color="#3A2E00"/>
    </linearGradient>
    <linearGradient id="speaker" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speaker body -->
  <rect x="160" y="180" width="80" height="152" rx="10" fill="url(#speaker)"/>
  <!-- Speaker horn -->
  <polygon points="240,210 340,155 340,357 240,300" fill="#FF8F00"/>
  <!-- Speaker cone detail -->
  <circle cx="200" cy="256" r="32" fill="#E65100" opacity="0.6"/>
  <circle cx="200" cy="256" r="18" fill="#FF8F00" opacity="0.8"/>
  <circle cx="200" cy="256" r="8" fill="#1A1400"/>
  <!-- Sound waves -->
  <g fill="none" stroke="#FFD740" stroke-linecap="round">
    <path d="M358 195 Q390 228 390 256 Q390 284 358 317" stroke-width="8" opacity="0.7"/>
    <path d="M372 178 Q415 215 415 256 Q415 297 372 334" stroke-width="6" opacity="0.5"/>
    <path d="M386 160 Q440 202 440 256 Q440 310 386 352" stroke-width="5" opacity="0.3"/>
  </g>
  <!-- Tag label below speaker -->
  <rect x="140" y="362" width="232" height="72" rx="12" fill="#2A2400" stroke="#FFD740" stroke-width="2.5"/>
  <text x="160" y="385" font-family="monospace" font-size="11" fill="#FFD740" opacity="0.7">♪ Title:</text>
  <rect x="225" y="375" width="130" height="8" rx="4" fill="#FF8F00" opacity="0.5"/>
  <text x="160" y="405" font-family="monospace" font-size="11" fill="#FFD740" opacity="0.7">♪ Artist:</text>
  <rect x="230" y="395" width="100" height="8" rx="4" fill="#FF8F00" opacity="0.5"/>
  <!-- Wrench/edit -->
  <g transform="translate(115,200) rotate(-30)" fill="#FFD740" opacity="0.7">
    <rect x="-4" y="-30" width="8" height="38" rx="3"/>
    <rect x="-10" y="-38" width="20" height="12" rx="4"/>
    <rect x="-10" y="8" width="20" height="12" rx="4"/>
  </g>
</svg>
