  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#4527A0" stroke-width="16"/>

  <!-- Left: UNKNOWN — big ? -->
