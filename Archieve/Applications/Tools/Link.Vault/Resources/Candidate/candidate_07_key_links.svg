<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Key shape -->
  <circle cx="180" cy="220" r="80" fill="url(#key)" stroke="#ffe082" stroke-width="5"/>
  <circle cx="180" cy="220" r="44" fill="#2e7d32"/>
  <rect x="240" y="208" width="200" height="24" rx="12" fill="url(#key)"/>
  <rect x="380" y="232" width="24" height="36" rx="6" fill="url(#key)"/>
  <rect x="336" y="232" width="24" height="28" rx="6" fill="url(#key)"/>
  <!-- Chain links below -->
  <ellipse cx="170" cy="330" rx="36" ry="20" fill="none" stroke="#a5d6a7" stroke-width="8"/>
  <ellipse cx="230" cy="330" rx="36" ry="20" fill="none" stroke="#a5d6a7" stroke-width="8"/>
  <ellipse cx="290" cy="330" rx="36" ry="20" fill="none" stroke="#a5d6a7" stroke-width="8"/>
  <ellipse cx="200" cy="330" rx="20" ry="36" fill="none" stroke="#a5d6a7" stroke-width="8"/>
  <ellipse cx="260" cy="330" rx="20" ry="36" fill="none" stroke="#a5d6a7" stroke-width="8"/>
  <!-- Sparkles -->
  <circle cx="380" cy="160" r="6" fill="#fff9c4"/>
  <circle cx="400" cy="140" r="4" fill="#fff9c4"/>
  <circle cx="420" cy="165" r="5" fill="#fff9c4"/>
  <circle cx="360" cy="145" r="3" fill="#fff9c4"/>
</svg>
