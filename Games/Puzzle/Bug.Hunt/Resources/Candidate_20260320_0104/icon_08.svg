<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Spider web -->
  <!-- Radial lines -->
  <line x1="512" y1="512" x2="512" y2="200" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="724" y2="300" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="800" y2="512" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="724" y2="724" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="512" y2="824" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="300" y2="724" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="224" y2="512" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <line x1="512" y1="512" x2="300" y2="300" stroke="#E65100" stroke-width="12" stroke-opacity="0.6"/>
  <!-- Concentric web rings -->
  <circle cx="512" cy="512" r="100" fill="none" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
