<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0015"/>
      <stop offset="100%" stop-color="#080008"/>
    </radialGradient>
    <linearGradient id="strand1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0088"/>
      <stop offset="100%" stop-color="#FF44CC"/>
    </linearGradient>
    <linearGradient id="strand2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC00FF"/>
