<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 밝은 스카이 블루 배경 -->
  <defs>
    <linearGradient id="bg07" x1="0%" y1="30%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <g clip-path="url(#clip07)">
    <!-- Layer 2: 임시 파일들이 쏟아지는 이미지 (대각선/동적) -->

    <!-- 쏟아지는 임시 파일들 (다양한 크기/각도) -->
    <!-- tmp 파일 1 -->
    <rect x="100" y="130" width="170" height="110" rx="12" fill="#F44336" transform="rotate(-12 185 185)"/>
    <text x="185" y="180" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" text-anchor="middle" transform="rotate(-12 185 180)">~tmp.001</text>
    <text x="185" y="212" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#FFCDD2" text-anchor="middle" transform="rotate(-12 185 212)">1.2 GB</text>

    <!-- tmp 파일 2 -->
    <rect x="350" y="100" width="170" height="110" rx="12" fill="#EF5350" transform="rotate(8 435 155)"/>
    <text x="435" y="150" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" text-anchor="middle" transform="rotate(8 435 150)">cache.db</text>
    <text x="435" y="182" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#FFCDD2" text-anchor="middle" transform="rotate(8 435 182)">856 MB</text>

    <!-- 레지스트리 항목 3 -->
    <rect x="600" y="120" width="190" height="110" rx="12" fill="#3F51B5" transform="rotate(-6 695 175)"/>
    <text x="695" y="165" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(-6 695 165)">HKLM oops</text>
    <text x="695" y="197" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#C5CAE9" text-anchor="middle" transform="rotate(-6 695 197)">47 errors</text>

    <!-- 로그 파일 4 -->
    <rect x="820" y="160" width="160" height="100" rx="12" fill="#FF7043" transform="rotate(14 900 210)"/>
    <text x="900" y="205" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="24" fill="#FFFFFF" text-anchor="middle" transform="rotate(14 900 205)">setup.log</text>
    <text x="900" y="234" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#FFCCBC" text-anchor="middle" transform="rotate(14 900 234)">234 MB</text>

    <!-- 더 작은 조각들 -->
    <rect x="190" y="280" width="120" height="70" rx="10" fill="#E53935" opacity="0.8" transform="rotate(-18 250 315)"/>
    <text x="250" y="318" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" transform="rotate(-18 250 318)">~tmp.log</text>
    <rect x="730" y="280" width="130" height="70" rx="10" fill="#7B1FA2" opacity="0.8" transform="rotate(10 795 315)"/>
    <text x="795" y="318" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" transform="rotate(10 795 318)">crash.dmp</text>

    <!-- 수직 청소 화살표 (중앙 아래쪽) -->
    <line x1="512" y1="420" x2="512" y2="560" stroke="#00838F" stroke-width="20" stroke-linecap="round"/>
    <path d="M452 540 L512 620 L572 540" fill="#00838F"/>
    <!-- 청소 이모지 -->
    <text x="512" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🧹</text>

    <!-- Layer 3: 하단 결과 (깨끗해진 상태) -->
    <rect x="130" y="650" width="764" height="120" rx="32" fill="#00695C"/>
    <text x="512" y="710" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#A7FFEB" text-anchor="middle">모두 청소됨</text>
    <text x="512" y="756" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">✅ 3.2 GB 확보!</text>

    <!-- 타이틀 -->
    <rect x="230" y="858" width="564" height="78" rx="22" fill="#00838F"/>
    <text x="512" y="910" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SYS.CLEAN</text>
  </g>
</svg>
