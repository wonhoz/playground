<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Filing cabinet drawers with music note handles -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0A1010"/>
  <!-- Cabinet body -->
  <rect x="180" y="160" width="664" height="704" rx="20" fill="#102020" stroke="#26A69A" stroke-width="20"/>
  <!-- Drawer 1 -->
  <rect x="200" y="190" width="624" height="148" rx="12" fill="#0D1818" stroke="#26A69A" stroke-width="14"/>
  <!-- Drawer 1 handle = mini music note -->
  <rect x="486" y="246" width="16" height="56" rx="6" fill="#26A69A"/>
  <ellipse cx="478" cy="302" rx="26" ry="18" fill="#26A69A" transform="rotate(-12, 478, 302)"/>
  <path d="M502 246 L542 234 L542 250 L502 262 Z" fill="#26A69A"/>
  <!-- Drawer 1 label -->
  <rect x="240" y="226" width="200" height="16" rx="8" fill="#26A69A" opacity="0.6"/>
  <rect x="240" y="252" width="150" height="14" rx="7" fill="#26A69A" opacity="0.4"/>
  <!-- Drawer 2 -->
  <rect x="200" y="356" width="624" height="148" rx="12" fill="#0D1818" stroke="#26A69A" stroke-width="14"/>
  <rect x="486" y="412" width="16" height="56" rx="6" fill="#26A69A"/>
  <ellipse cx="478" cy="468" rx="26" ry="18" fill="#26A69A" transform="rotate(-12, 478, 468)"/>
  <path d="M502 412 L542 400 L542 416 L502 428 Z" fill="#26A69A"/>
  <rect x="240" y="392" width="220" height="16" rx="8" fill="#26A69A" opacity="0.6"/>
  <rect x="240" y="418" width="170" height="14" rx="7" fill="#26A69A" opacity="0.4"/>
  <!-- Drawer 3 (open/active — pulled out) -->
  <rect x="180" y="522" width="664" height="148" rx="12" fill="#143028" stroke="#4DB6AC" stroke-width="18"/>
  <!-- Tag cards visible inside open drawer -->
  <rect x="220" y="552" width="100" height="90" rx="10" fill="#004D40" stroke="#26A69A" stroke-width="10"/>
  <rect x="332" y="552" width="100" height="90" rx="10" fill="#004D40" stroke="#26A69A" stroke-width="10"/>
  <rect x="444" y="552" width="100" height="90" rx="10" fill="#004D40" stroke="#26A69A" stroke-width="10"/>
  <rect x="556" y="552" width="100" height="90" rx="10" fill="#004D40" stroke="#4DB6AC" stroke-width="12"/>
  <!-- Active card mini note -->
  <rect x="578" y="572" width="10" height="44" rx="5" fill="#4DB6AC"/>
  <ellipse cx="572" cy="616" rx="18" ry="13" fill="#4DB6AC" transform="rotate(-12,572,616)"/>
  <!-- Drawer 4 -->
  <rect x="200" y="688" width="624" height="148" rx="12" fill="#0D1818" stroke="#26A69A" stroke-width="14"/>
  <rect x="486" y="744" width="16" height="56" rx="6" fill="#26A69A" opacity="0.7"/>
  <ellipse cx="478" cy="800" rx="26" ry="18" fill="#26A69A" opacity="0.7" transform="rotate(-12, 478, 800)"/>
</svg>
