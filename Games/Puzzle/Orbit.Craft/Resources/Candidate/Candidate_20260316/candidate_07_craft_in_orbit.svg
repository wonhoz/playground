<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <radialGradient id="earth" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="40%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </radialGradient>
    <linearGradient id="solarPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="400" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="200" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="70" cy="400" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="440" cy="440" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="150" cy="460" r="1" fill="#fff" opacity="0.4"/>
  <!-- Earth -->
  <circle cx="256" cy="300" r="90" fill="url(#earth)" filter="url(#glow)"/>
  <!-- Atmosphere glow -->
  <circle cx="256" cy="300" r="100" fill="none" stroke="#4ade8020" stroke-width="6"/>
  <!-- Orbital path -->
  <ellipse cx="256" cy="260" rx="170" ry="60" fill="none" stroke="#ffffff20" stroke-width="1.5" stroke-dasharray="8,5"/>
  <!-- Space station / craft in orbit -->
  <g transform="translate(90 240)">
    <!-- Main body -->
    <rect x="-16" y="-8" width="32" height="16" rx="4" fill="#cbd5e1" filter="url(#sm)"/>
    <!-- Solar panels left -->
    <rect x="-46" y="-4" width="28" height="8" rx="2" fill="url(#solarPanel)" filter="url(#sm)"/>
    <!-- Solar panels right -->
    <rect x="18" y="-4" width="28" height="8" rx="2" fill="url(#solarPanel)" filter="url(#sm)"/>
    <!-- Connecting struts -->
    <line x1="-18" y1="0" x2="-18" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <line x1="18" y1="0" x2="18" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <!-- Module -->
    <circle cx="0" cy="0" r="7" fill="#f1f5f9" filter="url(#sm)"/>
  </g>
  <!-- Trajectory arrow -->
  <path d="M200,240 Q256,190 320,230" stroke="#ffffff30" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <polygon points="320,230 304,218 316,236" fill="#ffffff40"/>
</svg>
