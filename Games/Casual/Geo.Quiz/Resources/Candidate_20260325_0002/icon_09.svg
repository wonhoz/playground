<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#C62828"/>

  <!-- Tick mark lines around timer -->
  <line x1="512" y1="195" x2="512" y2="235" stroke="#FFCDD2" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="789" x2="512" y2="829" stroke="#FFCDD2" stroke-width="12" stroke-linecap="round"/>
  <line x1="195" y1="512" x2="235" y2="512" stroke="#FFCDD2" stroke-width="12" stroke-linecap="round"/>
  <line x1="789" y1="512" x2="829" y2="512" stroke="#FFCDD2" stroke-width="12" stroke-linecap="round"/>
  <line x1="273" y1="273" x2="301" y2="301" stroke="#FFCDD2" stroke-width="10" stroke-linecap="round"/>
  <line x1="723" y1="723" x2="751" y2="751" stroke="#FFCDD2" stroke-width="10" stroke-linecap="round"/>
  <line x1="751" y1="273" x2="723" y2="301" stroke="#FFCDD2" stroke-width="10" stroke-linecap="round"/>
  <line x1="301" y1="723" x2="273" y2="751" stroke="#FFCDD2" stroke-width="10" stroke-linecap="round"/>

  <!-- Timer outer ring -->
  <circle cx="512" cy="512" r="310" fill="#B71C1C" stroke="#FFFFFF" stroke-width="22"/>

  <!-- Globe inside timer -->
  <circle cx="512" cy="512" r="270" fill="#1565C0"/>
  <!-- Globe latitude lines -->
  <ellipse cx="512" cy="512" rx="270" ry="75" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <ellipse cx="512" cy="512" rx="270" ry="165" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <!-- Globe longitude lines -->
  <ellipse cx="512" cy="512" rx="90" ry="270" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <ellipse cx="512" cy="512" rx="190" ry="270" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <!-- Globe continents -->
  <circle cx="462" cy="480" r="48" fill="#4CAF50" opacity="0.88"/>
  <circle cx="548" cy="468" r="38" fill="#66BB6A" opacity="0.88"/>
  <circle cx="590" cy="510" r="30" fill="#81C784" opacity="0.88"/>
  <circle cx="432" cy="560" r="28" fill="#4CAF50" opacity="0.75"/>

  <!-- "15" number big and centered -->
  <text x="512" y="580" font-size="240" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.95">15</text>

  <!-- Timer hand/arrow -->
  <line x1="512" y1="512" x2="680" y2="350" stroke="#FFD600" stroke-width="18" stroke-linecap="round"/>
  <circle cx="512" cy="512" r="18" fill="#FFD600"/>

  <!-- "sec" label -->
  <text x="512" y="680" font-size="80" font-family="Arial Black, sans-serif" font-weight="700" text-anchor="middle" fill="#FFCDD2">sec</text>
</svg>
