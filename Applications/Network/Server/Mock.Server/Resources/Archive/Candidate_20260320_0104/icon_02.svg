<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050510"/>
  <!-- Puppet server box -->
  <rect x="350" y="480" width="324" height="220" rx="20" fill="#283593"/>
  <rect x="374" y="510" width="276" height="14" rx="7" fill="#5C6BC0"/>
  <rect x="374" y="540" width="200" height="14" rx="7" fill="#5C6BC0" opacity="0.6"/>
  <!-- Puppet cross bar (controller) -->
  <rect x="300" y="220" width="424" height="20" rx="10" fill="#5C6BC0"/>
  <rect x="498" y="220" width="20" height="60" rx="8" fill="#5C6BC0"/>
  <!-- Puppet strings -->
  <line x1="340" y1="240" x2="390" y2="480" stroke="#5C6BC0" stroke-width="4" opacity="0.7" stroke-dasharray="12,8"/>
  <line x1="512" y1="280" x2="512" y2="480" stroke="#5C6BC0" stroke-width="4" opacity="0.7" stroke-dasharray="12,8"/>
  <line x1="684" y1="240" x2="634" y2="480" stroke="#5C6BC0" stroke-width="4" opacity="0.7" stroke-dasharray="12,8"/>
  <!-- Server status lights -->
  <circle cx="650" cy="530" r="14" fill="#5C6BC0" opacity="0.8"/>
  <circle cx="690" cy="530" r="14" fill="#283593" opacity="0.5"/>
  <!-- Hands on crossbar -->
  <circle cx="340" cy="220" r="22" fill="#5C6BC0"/>
  <circle cx="684" cy="220" r="22" fill="#5C6BC0"/>
</svg>