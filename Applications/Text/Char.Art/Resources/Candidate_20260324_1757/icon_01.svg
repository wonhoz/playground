<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c_ca01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background (matrix black) -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A0A"/>
  <!-- Layer 2: ASCII character grid forming a smiley face -->
  <g clip-path="url(#c_ca01)" font-family="Courier New, monospace" font-size="72" fill="#22C55E" font-weight="700">
    <!-- Row 1 -->
    <text x="148" y="260">@</text><text x="228" y="260">%</text><text x="308" y="260">@</text><text x="388" y="260">%</text><text x="468" y="260">@</text><text x="548" y="260">%</text><text x="628" y="260">@</text><text x="708" y="260">%</text><text x="788" y="260">@</text>
    <!-- Eyes row -->
    <text x="148" y="380">%</text><text x="228" y="380">@</text>
    <text x="308" y="380" fill="#86EFAC">█</text>
    <text x="388" y="380">@</text><text x="468" y="380">%</text><text x="548" y="380">@</text>
    <text x="628" y="380" fill="#86EFAC">█</text>
    <text x="708" y="380">%</text><text x="788" y="380">@</text>
    <!-- Nose row -->
    <text x="148" y="500">@</text><text x="228" y="500">%</text><text x="308" y="500">@</text><text x="388" y="500">%</text>
    <text x="468" y="500" fill="#86EFAC">o</text>
    <text x="548" y="500">%</text><text x="628" y="500">@</text><text x="708" y="500">%</text><text x="788" y="500">@</text>
    <!-- Smile row -->
    <text x="148" y="620">%</text><text x="228" y="620">@</text>
    <text x="308" y="620" fill="#4ADE80">\</text>
    <text x="388" y="620">%</text><text x="468" y="620">@</text><text x="548" y="620">%</text>
    <text x="628" y="620" fill="#4ADE80">/</text>
    <text x="708" y="620">@</text><text x="788" y="620">%</text>
    <!-- Row 5 -->
    <text x="148" y="740">@</text><text x="228" y="740">%</text><text x="308" y="740">@</text>
    <text x="388" y="740" fill="#4ADE80">\</text>
    <text x="468" y="740">%</text>
    <text x="548" y="740" fill="#4ADE80">/</text>
    <text x="628" y="740">@</text><text x="708" y="740">%</text><text x="788" y="740">@</text>
    <!-- Bottom row -->
    <text x="148" y="860">%</text><text x="228" y="860">@</text><text x="308" y="860">%</text><text x="388" y="860">@</text><text x="468" y="860">%</text><text x="548" y="860">@</text><text x="628" y="860">%</text><text x="708" y="860">@</text><text x="788" y="860">%</text>
  </g>
  <!-- Layer 3: Bright highlight circle for the smile -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#16A34A" stroke-width="8" opacity="0.4"/>
</svg>
