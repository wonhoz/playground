<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1020"/>
  <!-- Layer 2: URL 입력창 + SEND 버튼 -->
  <!-- 메서드 선택 드롭다운 -->
  <rect x="60" y="160" width="180" height="88" rx="12" fill="#1F6FEB"/>
  <text x="150" y="216" font-size="48" fill="white" text-anchor="middle" font-weight="bold" font-family="monospace">GET</text>
  <!-- URL 입력창 -->
  <rect x="256" y="160" width="708" height="88" rx="12" fill="#161B22" stroke="#30363D" stroke-width="6"/>
  <text x="290" y="216" font-size="36" fill="#58A6FF" font-family="monospace">https://api.example.com/users</text>
  <!-- SEND 버튼 -->
  <rect x="60" y="276" width="904" height="100" rx="16" fill="#238636"/>
  <text x="512" y="342" font-size="64" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">▶  SEND</text>
  <!-- 응답 패널 -->
  <rect x="60" y="420" width="904" height="520" rx="20" fill="#161B22" stroke="#30363D" stroke-width="6"/>
  <!-- 상태바 -->
  <rect x="60" y="420" width="904" height="72" rx="20" fill="#1A2E1A"/>
  <rect x="60" y="472" width="904" height="20" fill="#1A2E1A"/>
  <text x="100" y="468" font-size="44" fill="#3FB950" font-family="monospace">Status: 200 OK</text>
  <text x="600" y="468" font-size="44" fill="#6E7681" font-family="monospace">124ms</text>
  <!-- JSON 응답 -->
  <text x="100" y="560" font-size="38" fill="#7EE787" font-family="monospace">{</text>
  <text x="120" y="608" font-size="38" fill="#79C0FF" font-family="monospace">  "id": 1,</text>
  <text x="120" y="656" font-size="38" fill="#79C0FF" font-family="monospace">  "name": "Alice",</text>
  <text x="120" y="704" font-size="38" fill="#79C0FF" font-family="monospace">  "role": "admin"</text>
  <text x="100" y="752" font-size="38" fill="#7EE787" font-family="monospace">}</text>
  <!-- Layer 3: 헤더 탭들 -->
  <rect x="100" y="800" width="160" height="48" rx="8" fill="#21262D"/>
  <text x="180" y="832" font-size="32" fill="#E6EDF3" text-anchor="middle" font-family="monospace">Headers</text>
  <rect x="280" y="800" width="140" height="48" rx="8" fill="#1F6FEB"/>
  <text x="350" y="832" font-size="32" fill="white" text-anchor="middle" font-family="monospace">Body</text>
</svg>
