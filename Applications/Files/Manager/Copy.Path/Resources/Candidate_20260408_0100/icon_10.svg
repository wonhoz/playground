<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>

  <!-- Background: hot pink -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>

  <!-- Central folder icon -->
  <!-- Folder body -->
  <path d="M344,424 L344,680 Q344,704 368,704 L656,704 Q680,704 680,680 L680,456 Q680,432 656,432 L520,432 L492,424 Z" fill="white" opacity="0.95"/>
  <!-- Folder tab -->
  <path d="M368,416 L368,432 L520,432 L492,424 L368,424 Q344,424 344,448" fill="white" opacity="0.7"/>

  <!-- Radiating arrows: 6 directions with different colors -->
  <!-- Top: blue -->
  <line x1="512" y1="416" x2="512" y2="220" stroke="#3B82F6" stroke-width="16" stroke-linecap="round"/>
  <polygon points="474,236 512,176 550,236" fill="#3B82F6"/>
  <rect x="458" y="148" width="108" height="40" rx="8" fill="#3B82F6"/>
  <text x="512" y="174" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle">C:\</text>

  <!-- Top-right: green -->
  <line x1="624" y1="440" x2="782" y2="260" stroke="#22C55E" stroke-width="16" stroke-linecap="round"/>
  <polygon points="772,234 810,286 756,280" fill="#22C55E"/>
  <rect x="796" y="210" width="108" height="40" rx="8" fill="#22C55E"/>
  <text x="850" y="236" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle">C:/</text>

  <!-- Right: yellow -->
  <line x1="680" y1="560" x2="870" y2="560" stroke="#FDE047" stroke-width="16" stroke-linecap="round"/>
  <polygon points="852,524 912,560 852,596" fill="#FDE047"/>
  <rect x="888" y="534" width="110" height="40" rx="8" fill="#FDE047"/>
  <text x="943" y="560" font-family="Consolas,monospace" font-size="20" fill="#78350F" text-anchor="middle">file.txt</text>

  <!-- Bottom-right: orange -->
  <line x1="624" y1="664" x2="782" y2="810" stroke="#FB923C" stroke-width="16" stroke-linecap="round"/>
  <polygon points="756,808 810,788 790,840" fill="#FB923C"/>
  <rect x="796" y="820" width="120" height="40" rx="8" fill="#FB923C"/>
  <text x="856" y="846" font-family="Consolas,monospace" font-size="18" fill="white" text-anchor="middle">C:\\</text>

  <!-- Bottom: purple -->
  <line x1="512" y1="704" x2="512" y2="870" stroke="#A855F7" stroke-width="16" stroke-linecap="round"/>
  <polygon points="474,852 512,910 550,852" fill="#A855F7"/>
  <rect x="430" y="880" width="164" height="40" rx="8" fill="#A855F7"/>
  <text x="512" y="906" font-family="Consolas,monospace" font-size="18" fill="white" text-anchor="middle">file:///</text>

  <!-- Bottom-left: teal -->
  <line x1="396" y1="664" x2="242" y2="810" stroke="#14B8A6" stroke-width="16" stroke-linecap="round"/>
  <polygon points="218,808 272,788 252,840" fill="#14B8A6"/>
  <rect x="108" y="820" width="130" height="40" rx="8" fill="#14B8A6"/>
  <text x="173" y="846" font-family="Consolas,monospace" font-size="18" fill="white" text-anchor="middle">/c/path</text>

  <!-- Left: light blue (top-left done, now left) -->
  <line x1="344" y1="560" x2="154" y2="560" stroke="#60A5FA" stroke-width="16" stroke-linecap="round"/>
  <polygon points="172,524 112,560 172,596" fill="#60A5FA"/>
