<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#040e12"/>
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 입력 파일 (왼쪽) -->
  <rect x="55" y="220" width="70" height="88" rx="7" fill="#06B6D4" opacity="0.85"/>
  <polygon points="55,220 87,220 87,196 125,220" fill="#22D3EE" opacity="0.8"/>
  <line x1="68" y1="244" x2="117" y2="244" stroke="#E0F7FA" stroke-width="2" opacity="0.7"/>
  <line x1="68" y1="258" x2="104" y2="258" stroke="#E0F7FA" stroke-width="2" opacity="0.6"/>
  <line x1="68" y1="272" x2="110" y2="272" stroke="#E0F7FA" stroke-width="1.5" opacity="0.5"/>
  <!-- 입력 광선 -->
  <rect x="125" y="259" width="100" height="4" rx="2" fill="#22D3EE" opacity="0.7" filter="url(#glow)"/>
  <!-- 프리즘 (중앙) -->
  <polygon points="225,155 355,256 225,357" fill="url(#prismGrad)" stroke="#67E8F9" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <!-- 프리즘 내부 패턴 -->
  <polygon points="225,155 355,256 225,210" fill="white" opacity="0.12"/>
  <line x1="225" y1="255" x2="290" y2="255" stroke="#67E8F9" stroke-width="1" opacity="0.4"/>
  <!-- 출력 복사본 3개 (오른쪽) -->
  <!-- 복사본 1 (상) -->
  <line x1="355" y1="230" x2="400" y2="180" stroke="#67E8F9" stroke-width="3" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <rect x="400" y="155" width="60" height="75" rx="6" fill="#06B6D4" opacity="0.75"/>
  <polygon points="400,155 428,155 428,133 460,155" fill="#22D3EE" opacity="0.7"/>
  <line x1="411" y1="176" x2="452" y2="176" stroke="#E0F7FA" stroke-width="1.5" opacity="0.6"/>
  <line x1="411" y1="188" x2="442" y2="188" stroke="#E0F7FA" stroke-width="1.5" opacity="0.5"/>
  <!-- 복사본 2 (중) -->
  <line x1="355" y1="256" x2="410" y2="256" stroke="#22D3EE" stroke-width="3.5" opacity="0.85" stroke-linecap="round" filter="url(#glow)"/>
  <rect x="410" y="231" width="60" height="75" rx="6" fill="#0891B2" opacity="0.8"/>
  <polygon points="410,231 438,231 438,209 470,231" fill="#06B6D4" opacity="0.75"/>
  <line x1="421" y1="252" x2="462" y2="252" stroke="#E0F7FA" stroke-width="1.5" opacity="0.65"/>
  <line x1="421" y1="264" x2="452" y2="264" stroke="#E0F7FA" stroke-width="1.5" opacity="0.55"/>
  <!-- 복사본 3 (하) -->
  <line x1="355" y1="282" x2="400" y2="332" stroke="#06B6D4" stroke-width="3" opacity="0.75" stroke-linecap="round" filter="url(#glow)"/>
  <rect x="400" y="308" width="60" height="75" rx="6" fill="#06B6D4" opacity="0.7"/>
  <polygon points="400,308 428,308 428,286 460,308" fill="#22D3EE" opacity="0.65"/>
  <line x1="411" y1="329" x2="452" y2="329" stroke="#E0F7FA" stroke-width="1.5" opacity="0.55"/>
  <!-- 중복 강조 표시 -->
  <circle cx="450" cy="190" r="12" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.7"/>
  <text x="450" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#67E8F9" opacity="0.9">×2</text>
  <!-- 하단 설명 -->
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="11" fill="#06B6D4" opacity="0.5">COPIES DETECTED</text>
</svg>