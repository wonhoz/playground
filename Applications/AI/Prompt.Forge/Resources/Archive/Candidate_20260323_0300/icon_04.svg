  <rect x="390" y="294" width="170" height="46" rx="23" fill="#0891B2" opacity="0.8"/>
  <text x="475" y="324" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">📝 요약</text>
  <rect x="580" y="306" width="160" height="46" rx="23" fill="#7C3AED" opacity="0.7"/>
  <text x="660" y="336" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">🎭 롤플레이</text>
  <rect x="200" y="392" width="150" height="46" rx="23" fill="#0369A1" opacity="0.75"/>
