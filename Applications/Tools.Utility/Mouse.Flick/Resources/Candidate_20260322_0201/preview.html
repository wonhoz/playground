<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mouse.Flick — Icon Candidates (20260322_0201)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111118;
    color: #E0E0E0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 32px 24px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 14px;
    color: #666680;
  }
  .header .concept-note {
    margin-top: 12px;
    font-size: 13px;
    color: #8888AA;
    max-width: 700px;
    margin-inline: auto;
    line-height: 1.6;
    background: #1A1A24;
    border: 1px solid #2A2A3A;
    border-radius: 8px;
    padding: 12px 18px;
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto 48px;
  }

  .card {
    background: #1A1A24;
    border: 1px solid #2A2A3A;
    border-radius: 16px;
    padding: 20px 16px 18px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .card:hover {
    transform: scale(1.07);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    border-color: #4A4A6A;
    z-index: 10;
    position: relative;
  }

  .card .icon-wrap {
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111118;
    border-radius: 12px;
    overflow: hidden;
  }
  .card .icon-wrap img {
    width: 200px;
    height: 200px;
    object-fit: contain;
  }

  .card .filename {
    font-size: 11px;
    font-family: 'Consolas', monospace;
    color: #666680;
    text-align: center;
    word-break: break-all;
    line-height: 1.4;
  }

  .badge-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-literal  { background: #1A3A6A; color: #80B4FF; border: 1px solid #2A5A9A; }
  .badge-metaphor { background: #2A1A4A; color: #C080FF; border: 1px solid #5A3A8A; }
  .badge-hybrid   { background: #1A3A2A; color: #80FFC0; border: 1px solid #2A6A4A; }

  .concept {
    font-size: 12px;
    color: #9090B0;
    text-align: center;
    line-height: 1.5;
  }

  .palette {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* ─── Size Preview ─── */
  .size-section {
    max-width: 1400px;
    margin: 0 auto;
  }
  .size-section h2 {
    font-size: 18px;
    color: #CCCCDD;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2A2A3A;
  }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }

  .size-card {
    background: #1A1A24;
    border: 1px solid #2A2A3A;
    border-radius: 12px;
    padding: 16px;
  }
  .size-card .label {
    font-size: 12px;
    color: #666680;
    margin-bottom: 10px;
    font-family: monospace;
  }
  .size-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }
  .size-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .size-item span {
    font-size: 10px;
    color: #555570;
    font-family: monospace;
  }

  .size-bg-dark  { background: #111118; }
  .size-bg-mid   { background: #2A2A3A; }
  .size-bg-light { background: #E8E8F0; }

  @media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .size-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .size-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Mouse.Flick — Icon Candidates</h1>
  <div class="subtitle">Generated: 2026-03-22 02:01 KST &nbsp;|&nbsp; 10 candidates &nbsp;|&nbsp; literal 3 / metaphor 4 / hybrid 3</div>
  <div class="concept-note">
    <strong>핵심 메시지:</strong> 마우스 제스처로 원하는 동작을 쉽게 할 수 있다는 것이 한 눈에 뚜렷하게 보이게 만들자.<br/>
    마우스 우클릭 드래그 → 방향(R/L/U/D) 인식 → 키 조합(Alt+Left, Ctrl+W 등) 자동 실행
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="size-section">
  <h2>크기별 미리보기 (상위 5개)</h2>
  <div class="size-grid" id="sizeGrid"></div>
</div>

<script>
const icons = [
  {
    file: "icon_01_literal_neon_purple.svg",
    type: "literal",
    concept: "마우스 + RD 제스처 궤적\n키콤보 레이블 표시",
    palette: ["#2A1A4E", "#9B59F5", "#D580FF", "#FF80FF"]
  },
  {
    file: "icon_02_literal_deep_blue.svg",
    type: "literal",
    concept: "L자 제스처 궤적\n커서 이동 + Alt+Left",
    palette: ["#0A1628", "#1A6EFF", "#5AA0FF", "#A0C8FF"]
  },
  {
    file: "icon_03_literal_emerald.svg",
    type: "literal",
    concept: "Z자 제스처 궤적\n격자 배경 + Ctrl+Z",
    palette: ["#061812", "#00E87A", "#66FFB0", "#004A28"]
  },
  {
    file: "icon_04_metaphor_coral.svg",
    type: "metaphor",
    concept: "손 실루엣 + 스와이프\n제스처의 직관적 표현",
    palette: ["#150808", "#FF6B4A", "#FF9070", "#FFAA90"]
  },
  {
    file: "icon_05_metaphor_dark_slate.svg",
    type: "metaphor",
    concept: "마우스 중앙심볼 + 4방향\n방향별 동작 카드 연결",
    palette: ["#141820", "#718096", "#63B3ED", "#68D391"]
  },
  {
    file: "icon_06_metaphor_golden.svg",
    type: "metaphor",
    concept: "원형 제스처 + 번개\n즉각 실행의 에너지 표현",
    palette: ["#1E1600", "#FFD700", "#FFA500", "#FFF0A0"]
  },
  {
    file: "icon_07_metaphor_cyan.svg",
    type: "metaphor",
    concept: "커서 이동 잔상 궤적\nRU 제스처 → Ctrl+T",
    palette: ["#001820", "#00E5FF", "#00B8CC", "#80F0FF"]
  },
  {
    file: "icon_08_hybrid_raspberry.svg",
    type: "hybrid",
    concept: "마우스 중심 + 4방향 확산\n각 방향별 키콤보 표시",
    palette: ["#200818", "#E81068", "#FF4096", "#FF80B8"]
  },
  {
    file: "icon_09_hybrid_ice_blue.svg",
    type: "hybrid",
    concept: "마우스 실루엣 + 제스처 경로\nRU → Ctrl+T 변환 흐름",
    palette: ["#0E1E2C", "#B8D8F0", "#6AACD0", "#A0D8F0"]
  },
  {
    file: "icon_10_hybrid_mocha_brown.svg",
    type: "hybrid",
    concept: "데스크탑 장면 + 제스처\n화면 위에서 R → Alt+Left",
    palette: ["#0C0804", "#D4956A", "#A0622A", "#5A3A1A"]
  }
];

function typeBadge(type) {
  const map = {
    literal:  ["badge-literal",  "Literal"],
    metaphor: ["badge-metaphor", "Metaphor"],
    hybrid:   ["badge-hybrid",   "Hybrid"]
  };
  const [cls, label] = map[type];
  return `<span class="badge ${cls}">${label}</span>`;
}

const grid = document.getElementById("grid");
icons.forEach((ic, i) => {
  const card = document.createElement("div");
  card.className = "card";

  const swatches = ic.palette.map(c =>
    `<div class="swatch" style="background:${c}" title="${c}"></div>`
  ).join("");

  const conceptLines = ic.concept.split("\n").map(l => `<span>${l}</span>`).join("<br/>");

  card.innerHTML = `
    <div class="icon-wrap">
      <img src="${ic.file}" alt="${ic.file}" loading="lazy"/>
    </div>
    <div class="badge-row">${typeBadge(ic.type)}<span class="badge" style="background:#1A1A2A;color:#666680;border:1px solid #2A2A3A;">#${String(i+1).padStart(2,"0")}</span></div>
    <div class="concept">${conceptLines}</div>
    <div class="palette">${swatches}</div>
    <div class="filename">${ic.file}</div>
  `;
  grid.appendChild(card);
});

// Size preview (top 5)
const sizeGrid = document.getElementById("sizeGrid");
const top5 = icons.slice(0, 5);
top5.forEach(ic => {
  const card = document.createElement("div");
  card.className = "size-card";
  card.innerHTML = `
    <div class="label">${ic.file.replace(".svg","")}</div>
    <div class="size-row">
      <div class="size-item size-bg-dark" style="padding:8px;border-radius:8px;">
        <img src="${ic.file}" width="256" height="256" style="display:block;"/>
        <span>256px</span>
      </div>
      <div class="size-item size-bg-dark" style="padding:6px;border-radius:6px;">
        <img src="${ic.file}" width="64" height="64" style="display:block;"/>
        <span>64px</span>
      </div>
      <div class="size-item size-bg-dark" style="padding:4px;border-radius:4px;">
        <img src="${ic.file}" width="32" height="32" style="display:block;"/>
        <span>32px</span>
      </div>
      <div class="size-item size-bg-dark" style="padding:3px;border-radius:3px;">
        <img src="${ic.file}" width="16" height="16" style="display:block;"/>
        <span>16px</span>
      </div>
    </div>
  `;
  sizeGrid.appendChild(card);
});
</script>
</body>
</html>
