<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 프리즘분리색: prism splitting light into color bands -->
  <!-- Prism triangle -->
  <polygon points="512,220 740,700 284,700" fill="#4A148C"/>
  <polygon points="512,220 740,700 512,700" fill="#4A148C" opacity="0.5"/>
  <!-- Prism edges -->
  <polygon points="512,220 740,700 284,700" fill="none" stroke="#CE93D8" stroke-width="8"/>
  <!-- Input light beam (left) -->
  <line x1="180" y1="460" x2="390" y2="460" stroke="#CE93D8" stroke-width="14" stroke-linecap="round"/>
  <!-- Output color beams (right, diverging) -->
  <line x1="680" y1="460" x2="844" y2="380" stroke="#CE93D8" stroke-width="10" stroke-linecap="round"/>
  <line x1="680" y1="480" x2="844" y2="430" stroke="#CE93D8" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="682" y1="500" x2="844" y2="490" stroke="#CE93D8" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <line x1="686" y1="520" x2="844" y2="555" stroke="#4A148C" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <line x1="690" y1="540" x2="844" y2="620" stroke="#4A148C" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Prism refraction point glow -->
  <circle cx="512" cy="460" r="20" fill="#CE93D8" opacity="0.4"/>
  <!-- Pixel blocks along output bands -->
  <rect x="720" y="358" width="20" height="20" rx="3" fill="#CE93D8"/>
  <rect x="760" y="408" width="20" height="20" rx="3" fill="#CE93D8" opacity="0.8"/>
  <rect x="790" y="468" width="20" height="20" rx="3" fill="#CE93D8" opacity="0.6"/>
  <rect x="770" y="540" width="20" height="20" rx="3" fill="#4A148C"/>
  <rect x="740" y="606" width="20" height="20" rx="3" fill="#4A148C" opacity="0.8"/>
</svg>