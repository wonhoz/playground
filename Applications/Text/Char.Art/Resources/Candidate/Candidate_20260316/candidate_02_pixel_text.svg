  <rect x="262" y="168" width="22" height="22" rx="2" fill="#AA44FF"/>
  <rect x="284" y="168" width="22" height="22" rx="2" fill="#AA44FF"/>
  <rect x="306" y="168" width="22" height="22" rx="2" fill="#AA44FF"/>
  <rect x="328" y="168" width="22" height="22" rx="2" fill="#AA44FF"/>
  <rect x="350" y="168" width="22" height="22" rx="2" fill="#7711CC"/>
  <!-- Row 5 -->
  <rect x="130" y="194" width="22" height="22" rx="2" fill="#7711CC"/>
