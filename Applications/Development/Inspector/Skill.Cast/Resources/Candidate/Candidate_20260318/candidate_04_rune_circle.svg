  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Rune circle with skills -->
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.4"/>
  <!-- Rune notches on outer circle -->
  <line x1="256" y1="51" x2="256" y2="65" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="399" y1="109" x2="391" y2="121" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="457" y1="256" x2="443" y2="256" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="399" y1="403" x2="391" y2="391" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="461" x2="256" y2="447" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="113" y1="403" x2="121" y2="391" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="55" y1="256" x2="69" y2="256" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
  <line x1="113" y1="109" x2="121" y2="121" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
