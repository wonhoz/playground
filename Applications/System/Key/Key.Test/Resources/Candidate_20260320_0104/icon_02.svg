  <rect x="540" y="560" width="320" height="220" rx="20" fill="#33691E" opacity="0.5"/>
  <rect x="540" y="560" width="320" height="220" rx="20" fill="none" stroke="#33691E" stroke-width="14"/>
  <!-- Keys -->
  <rect x="566" y="590" width="56" height="44" rx="8" fill="#080A00"/>
  <rect x="634" y="590" width="56" height="44" rx="8" fill="#080A00"/>
  <rect x="702" y="590" width="56" height="44" rx="8" fill="#080A00"/>
