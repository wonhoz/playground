<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg07" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </radialGradient>
    <filter id="dangerGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="safeGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg07)"/>
  <!-- 총알들 (빨간 원들, 위험 구역 형성) -->
  <!-- 위쪽 밀집 구역 -->
  <circle cx="192" cy="200" r="52" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="316" cy="180" r="48" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="440" cy="200" r="52" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="654" cy="180" r="50" fill="#DC2626" filter="url(#dangerGlow)"/>
  <circle cx="778" cy="200" r="48" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="870" cy="220" r="44" fill="#DC2626" filter="url(#dangerGlow)"/>
  <!-- 왼쪽 밀집 구역 -->
  <circle cx="168" cy="400" r="50" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="148" cy="560" r="52" fill="#DC2626" filter="url(#dangerGlow)"/>
  <circle cx="168" cy="720" r="48" fill="#EF4444" filter="url(#dangerGlow)"/>
  <!-- 오른쪽 밀집 구역 -->
  <circle cx="856" cy="400" r="50" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="876" cy="560" r="52" fill="#DC2626" filter="url(#dangerGlow)"/>
  <circle cx="856" cy="720" r="48" fill="#EF4444" filter="url(#dangerGlow)"/>
  <!-- 아래쪽 밀집 구역 -->
  <circle cx="192" cy="840" r="50" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="340" cy="856" r="46" fill="#DC2626" filter="url(#dangerGlow)"/>
  <circle cx="680" cy="856" r="48" fill="#EF4444" filter="url(#dangerGlow)"/>
  <circle cx="830" cy="840" r="50" fill="#DC2626" filter="url(#dangerGlow)"/>
  <!-- 중앙 위험 구역 총알 (고 밀도) -->
  <circle cx="330" cy="380" r="44" fill="#F87171" opacity="0.8"/>
  <circle cx="700" cy="380" r="44" fill="#F87171" opacity="0.8"/>
  <circle cx="330" cy="660" r="44" fill="#F87171" opacity="0.8"/>
  <circle cx="700" cy="660" r="44" fill="#F87171" opacity="0.8"/>
  <!-- 안전 통로 표시 (밝은 흰/초록 경로) -->
  <path d="M430 320 Q512 320 590 320 Q590 512 590 700 Q512 700 430 700 Q430 512 430 320 Z" fill="#DCFCE7" opacity="0.65" filter="url(#safeGlow)"/>
  <!-- 안전 통로 테두리 -->
  <rect x="422" y="312" width="180" height="396" rx="12" fill="none" stroke="#22C55E" stroke-width="8" stroke-dasharray="20 10" opacity="0.8"/>
  <!-- 중앙 플레이어 다이아몬드 -->
  <polygon points="512,448 576,512 512,576 448,512" fill="#0891B2"/>
  <polygon points="512,468 556,512 512,556 468,512" fill="#22D3EE"/>
  <polygon points="512,492 532,512 512,532 492,512" fill="#67E8F9"/>
  <!-- 하이라이트 -->
  <polygon points="512,492 532,512 512,510 500,500" fill="white" opacity="0.5"/>
  <!-- SAFE 라벨 -->
  <text x="512" y="306" font-family="Arial Black" font-weight="900" font-size="32" fill="#16A34A" text-anchor="middle" opacity="0.9">SAFE</text>
  <text x="512" y="726" font-family="Arial Black" font-weight="900" font-size="32" fill="#16A34A" text-anchor="middle" opacity="0.9">ZONE</text>
</svg>
