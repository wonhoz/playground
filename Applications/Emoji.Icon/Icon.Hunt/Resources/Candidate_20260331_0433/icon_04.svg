<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 보물상자 몸통 -->
  <rect x="212" y="520" width="600" height="380" rx="24" fill="#795548"/>
  <rect x="212" y="520" width="600" height="80" rx="24" fill="#5D4037"/>
  <!-- 상자 뚜껑 (열린 상태) -->
  <path d="M212,520 Q212,340 512,300 Q812,340 812,520 Z" fill="#8D6E63"/>
  <!-- 상자 경첩 -->
  <circle cx="512" cy="520" r="28" fill="#FFD700"/>
  <!-- 상자 잠금 장식 -->
  <rect x="468" y="560" width="88" height="60" rx="16" fill="#FFD700"/>
  <circle cx="512" cy="590" r="16" fill="#FF8F00"/>
  <!-- Layer 3: 쏟아지는 아이콘 박스들 -->
  <rect x="320" y="180" width="100" height="100" rx="16" fill="#E91E63" transform="rotate(-15 370 230)"/>
  <text x="370" y="248" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" transform="rotate(-15 370 230)">★</text>
  <rect x="500" y="140" width="100" height="100" rx="16" fill="#1565C0" transform="rotate(8 550 190)"/>
  <text x="550" y="208" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" transform="rotate(8 550 190)">♥</text>
  <rect x="650" y="200" width="100" height="100" rx="16" fill="#00695C" transform="rotate(20 700 250)"/>
  <text x="700" y="268" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" transform="rotate(20 700 250)">◆</text>
  <!-- 반짝임 효과 -->
  <text x="300" y="380" font-size="72" text-anchor="middle" fill="#FFD700">✦</text>
  <text x="724" y="440" font-size="56" text-anchor="middle" fill="#FFC107">✦</text>
</svg>
