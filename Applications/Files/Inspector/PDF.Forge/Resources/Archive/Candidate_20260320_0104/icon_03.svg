<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#1A0000"/>
  <!-- 페이지 -->
  <rect x="320" y="220" width="280" height="380" rx="16" fill="#B71C1C"/>
  <rect x="356" y="268" width="180" height="14" rx="3" fill="#EF9A9A" opacity="0.6"/>
  <rect x="356" y="298" width="140" height="14" rx="3" fill="#EF9A9A" opacity="0.4"/>
  <rect x="356" y="328" width="160" height="14" rx="3" fill="#EF9A9A" opacity="0.3"/>
  <!-- 가위 -->
  <!-- 가위 왼쪽 날 -->
  <line x1="340" y1="650" x2="680" y2="490" stroke="#EF9A9A" stroke-width="20" stroke-linecap="round"/>
  <!-- 가위 오른쪽 날 -->
  <line x1="340" y1="800" x2="680" y2="650" stroke="#EF9A9A" stroke-width="20" stroke-linecap="round"/>
  <!-- 가위 손잡이 왼쪽 -->
  <ellipse cx="310" cy="630" rx="50" ry="36" fill="none" stroke="#B71C1C" stroke-width="22"/>
  <!-- 가위 손잡이 오른쪽 -->
  <ellipse cx="310" cy="816" rx="50" ry="36" fill="none" stroke="#B71C1C" stroke-width="22"/>
  <!-- 가위 중심 나사 -->
  <circle cx="500" cy="594" r="18" fill="#EF9A9A"/>
  <!-- 자르는 선 표시 -->
  <line x1="320" y1="560" x2="760" y2="560" stroke="#EF9A9A" stroke-width="6" stroke-dasharray="20 12" opacity="0.6"/>
</svg>