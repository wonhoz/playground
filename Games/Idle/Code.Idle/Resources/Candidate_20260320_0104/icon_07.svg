<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Coin stack -->
  <ellipse cx="512" cy="720" rx="160" ry="40" fill="#1B5E20"/>
  <rect x="352" y="640" width="320" height="80" rx="8" fill="#1B5E20"/>
  <ellipse cx="512" cy="640" rx="160" ry="40" fill="#66BB6A" fill-opacity="0.7"/>
  <rect x="352" y="560" width="320" height="80" rx="8" fill="#1B5E20" fill-opacity="0.9"/>
  <ellipse cx="512" cy="560" rx="160" ry="40" fill="#66BB6A" fill-opacity="0.6"/>
  <rect x="352" y="480" width="320" height="80" rx="8" fill="#1B5E20" fill-opacity="0.8"/>
  <ellipse cx="512" cy="480" rx="160" ry="40" fill="#A5D6A7" fill-opacity="0.5"/>
  <!-- Code symbol on coin -->
  <text x="512" y="496" font-family="Arial" font-size="44" font-weight="bold" fill="#1B5E20" text-anchor="middle">&lt;/&gt;</text>
  <!-- Falling code -->
  <rect x="300" y="220" width="80" height="18" rx="7" fill="#66BB6A" fill-opacity="0.8"/>
  <rect x="420" y="260" width="60" height="18" rx="7" fill="#A5D6A7" fill-opacity="0.7"/>
  <rect x="560" y="200" width="90" height="18" rx="7" fill="#66BB6A" fill-opacity="0.7"/>
  <rect x="680" y="250" width="70" height="18" rx="7" fill="#1B5E20" fill-opacity="0.9"/>
  <!-- Down arrows (falling) -->
  <polygon points="340,340 314,300 366,300" fill="#66BB6A" fill-opacity="0.5"/>
  <polygon points="512,370 486,330 538,330" fill="#A5D6A7" fill-opacity="0.5"/>
  <polygon points="684,350 658,310 710,310" fill="#66BB6A" fill-opacity="0.5"/>
</svg>