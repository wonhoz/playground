<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Dictionary A-Z index tabs -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0F"/>
  <!-- Book body -->
  <rect x="200" y="220" width="520" height="600" rx="14" fill="#263238"/>
  <rect x="200" y="220" width="520" height="600" rx="14" fill="none" stroke="#37474F" stroke-width="8"/>
  <!-- Book spine -->
  <rect x="200" y="220" width="60" height="600" rx="8" fill="#37474F"/>
  <!-- Index tabs on right side -->
  <rect x="700" y="240" width="80" height="56" rx="8" fill="#37474F"/>
  <rect x="700" y="308" width="80" height="56" rx="8" fill="#546E7A" opacity="0.8"/>
  <rect x="700" y="376" width="80" height="56" rx="8" fill="#37474F"/>
  <rect x="700" y="444" width="80" height="56" rx="8" fill="#546E7A" opacity="0.8"/>
  <rect x="700" y="512" width="80" height="56" rx="8" fill="#80CBC4" opacity="0.7"/>
  <rect x="700" y="580" width="80" height="56" rx="8" fill="#37474F"/>
  <rect x="700" y="648" width="80" height="56" rx="8" fill="#546E7A" opacity="0.7"/>
  <rect x="700" y="716" width="80" height="40" rx="8" fill="#37474F"/>
  <!-- Tab labels (abstract bars) -->
  <rect x="714" y="262" width="50" height="10" rx="3" fill="#546E7A" opacity="0.6"/>
  <rect x="714" y="330" width="50" height="10" rx="3" fill="#80CBC4" opacity="0.7"/>
  <rect x="714" y="398" width="50" height="10" rx="3" fill="#546E7A" opacity="0.6"/>
  <rect x="714" y="466" width="50" height="10" rx="3" fill="#546E7A" opacity="0.6"/>
  <rect x="714" y="534" width="50" height="10" rx="3" fill="#B0BEC5" opacity="0.8"/>
  <rect x="714" y="602" width="50" height="10" rx="3" fill="#546E7A" opacity="0.6"/>
  <rect x="714" y="670" width="50" height="10" rx="3" fill="#546E7A" opacity="0.5"/>
  <!-- Content lines in book -->
  <rect x="280" y="310" width="380" height="12" rx="4" fill="#37474F" opacity="0.7"/>
  <rect x="280" y="340" width="300" height="10" rx="4" fill="#37474F" opacity="0.5"/>
  <rect x="280" y="370" width="360" height="10" rx="4" fill="#37474F" opacity="0.5"/>
  <rect x="280" y="430" width="380" height="12" rx="4" fill="#546E7A" opacity="0.6"/>
  <rect x="280" y="460" width="280" height="10" rx="4" fill="#37474F" opacity="0.5"/>
  <rect x="280" y="490" width="340" height="10" rx="4" fill="#37474F" opacity="0.4"/>
  <!-- Active tab marker (active entry) -->
  <rect x="692" y="508" width="88" height="64" rx="8" fill="none" stroke="#80CBC4" stroke-width="4"/>
</svg>
