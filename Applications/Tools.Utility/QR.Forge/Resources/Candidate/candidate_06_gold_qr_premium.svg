<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#0D0803"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative border -->
  <rect x="30" y="30" width="452" height="452" rx="60" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.4"/>
  <!-- QR corners with gold -->
  <rect x="90" y="90" width="128" height="128" rx="12" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <rect x="114" y="114" width="80" height="80" rx="6" fill="url(#gold)"/>
  <rect x="294" y="90" width="128" height="128" rx="12" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <rect x="318" y="114" width="80" height="80" rx="6" fill="url(#gold)"/>
  <rect x="90" y="294" width="128" height="128" rx="12" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <rect x="114" y="318" width="80" height="80" rx="6" fill="url(#gold)"/>
  <!-- Center shine star -->
  <circle cx="256" cy="360" r="30" fill="url(#shine)" opacity="0.8"/>
  <polygon points="256,330 262,350 284,350 267,363 273,384 256,371 239,384 245,363 228,350 250,350" fill="url(#gold)"/>
  <!-- Data dots -->
  <rect x="294" y="294" width="20" height="20" rx="3" fill="url(#gold)"/>
  <rect x="322" y="294" width="20" height="20" rx="3" fill="url(#gold)" opacity="0.6"/>
  <rect x="350" y="294" width="20" height="20" rx="3" fill="url(#gold)"/>
  <rect x="294" y="322" width="20" height="20" rx="3" fill="url(#gold)" opacity="0.6"/>
</svg>
