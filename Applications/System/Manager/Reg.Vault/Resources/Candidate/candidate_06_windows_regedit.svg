<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="50%" style="stop-color:#004A8C"/>
      <stop offset="100%" style="stop-color:#001E3C"/>
    </linearGradient>
    <linearGradient id="win" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CCDDFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Windows logo -->
  <rect x="110" y="160" width="110" height="110" rx="6" fill="url(#win)" opacity="0.9"/>
  <rect x="232" y="160" width="110" height="110" rx="6" fill="url(#win)" opacity="0.9"/>
  <rect x="110" y="282" width="110" height="110" rx="6" fill="url(#win)" opacity="0.9"/>
  <rect x="232" y="282" width="110" height="110" rx="6" fill="url(#win)" opacity="0.9"/>
  <!-- Vault circle overlay -->
  <circle cx="350" cy="170" r="80" fill="#002060" stroke="#FFFFFF" stroke-width="4" opacity="0.95"/>
  <!-- Lock in circle -->
  <rect x="324" y="175" width="52" height="42" rx="7" fill="#FFFFFF"/>
  <path d="M333 175 L333 158 A 17 17 0 0 1 367 158 L367 175" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <circle cx="350" cy="196" r="7" fill="#002060"/>
  <rect x="346" y="196" width="8" height="12" rx="3" fill="#002060"/>
  <!-- Corner bookmark for registry -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="white" opacity="0.8">Reg.Vault</text>
</svg>
