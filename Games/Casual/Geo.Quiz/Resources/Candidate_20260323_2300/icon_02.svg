<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- 4 flag grid cells -->
  <!-- Top-left: Japan-like (white+red) -->
  <rect x="170" y="200" width="290" height="195" rx="12" fill="#F8FAFC"/>
  <circle cx="315" cy="297" r="58" fill="#DC2626"/>
  <!-- Top-right: France-like (blue/white/red) -->
  <rect x="474" y="200" width="290" height="195" rx="12" fill="#FAFAFA"/>
  <rect x="474" y="200" width="97" height="195" rx="0" fill="#2563EB"/>
  <rect x="474" y="200" width="12" height="195" rx="12" fill="#2563EB"/>
  <rect x="667" y="200" width="97" height="195" rx="0" fill="#DC2626"/>
  <rect x="752" y="200" width="12" height="195" rx="12" fill="#DC2626"/>
  <!-- Bottom-left: Brazil-like (green+yellow diamond) -->
  <rect x="170" y="413" width="290" height="195" rx="12" fill="#15803D"/>
  <polygon points="315,438 440,510 315,583 190,510" fill="#FDE047"/>
  <circle cx="315" cy="510" r="38" fill="#1D4ED8"/>
  <!-- Bottom-right: UK-like (navy+cross) -->
  <rect x="474" y="413" width="290" height="195" rx="12" fill="#1E3A8A"/>
  <line x1="474" y1="510" x2="764" y2="510" stroke="white" stroke-width="32"/>
  <line x1="619" y1="413" x2="619" y2="608" stroke="white" stroke-width="32"/>
  <line x1="474" y1="413" x2="764" y2="608" stroke="#DC2626" stroke-width="14"/>
  <line x1="764" y1="413" x2="474" y2="608" stroke="#DC2626" stroke-width="14"/>
  <!-- Grid divider -->
  <rect x="447" y="195" width="14" height="425" rx="7" fill="#1E293B"/>
  <rect x="165" y="383" width="604" height="14" rx="7" fill="#1E293B"/>
  <!-- Highlight box (quiz selected) -->
  <rect x="164" y="194" width="302" height="207" rx="16" fill="none" stroke="#FDE68A" stroke-width="12"/>
  <!-- Bottom panel: score bar -->
  <rect x="165" y="650" width="604" height="115" rx="16" fill="#1E3A8A" opacity="0.8"/>
  <text x="467" y="690" font-size="38" font-weight="bold" font-family="system-ui,sans-serif" fill="#FDE68A" text-anchor="middle">국기 퀴즈</text>
  <text x="467" y="738" font-size="30" font-family="system-ui,sans-serif" fill="#93C5FD" text-anchor="middle">어느 나라의 국기일까요?</text>
</svg>
