<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: sky blue -->
  <rect width="1024" height="1024" rx="190" fill="#0EA5E9"/>

  <!-- Circular countdown timer (prominent) -->
  <circle cx="512" cy="340" r="220" fill="#0284C7"/>
  <circle cx="512" cy="340" r="190" fill="#0369A1"/>
  <!-- Timer arc (progress ~60%) -->
  <circle cx="512" cy="340" r="180" fill="none" stroke="#F9FAFB" stroke-width="22" stroke-dasharray="679" stroke-dashoffset="0" opacity="0.2"/>
  <circle cx="512" cy="340" r="180" fill="none" stroke="#FDE047" stroke-width="22" stroke-dasharray="679" stroke-dashoffset="271" stroke-linecap="round" transform="rotate(-90 512 340)"/>
  <!-- Timer number -->
  <text x="512" y="360" font-family="Arial Black,Arial" font-size="120" fill="white" font-weight="900" text-anchor="middle">9</text>
  <text x="512" y="408" font-family="Arial,sans-serif" font-size="28" fill="#BAE6FD" text-anchor="middle">seconds</text>

  <!-- Question card below timer -->
  <rect x="140" y="600" width="744" height="340" rx="20" fill="white" opacity="0.97"/>

  <!-- Question text -->
  <text x="512" y="654" font-family="Arial,sans-serif" font-size="22" fill="#6B7280" text-anchor="middle">태양계에서 가장 큰 행성은?</text>

  <!-- 4 answer buttons -->
  <rect x="156" y="676" width="330" height="58" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="3"/>
  <text x="321" y="711" font-family="Arial,sans-serif" font-size="20" fill="#1E3A5F" text-anchor="middle">A. 목성</text>

  <rect x="538" y="676" width="330" height="58" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="703" y="711" font-family="Arial,sans-serif" font-size="20" fill="#374151" text-anchor="middle">B. 토성</text>

  <rect x="156" y="748" width="330" height="58" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="321" y="783" font-family="Arial,sans-serif" font-size="20" fill="#374151" text-anchor="middle">C. 천왕성</text>

  <rect x="538" y="748" width="330" height="58" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="703" y="783" font-family="Arial,sans-serif" font-size="20" fill="#374151" text-anchor="middle">D. 해왕성</text>

  <!-- Progress row -->
  <text x="160" y="848" font-family="Arial,sans-serif" font-size="20" fill="#374151">Q 7/20</text>
  <rect x="240" y="832" width="400" height="14" rx="6" fill="#E5E7EB"/>
  <rect x="240" y="832" width="140" height="14" rx="6" fill="#7C3AED"/>
  <text x="724" y="848" font-family="Arial,sans-serif" font-size="20" fill="#F97316">🔥 5</text>
  <text x="848" y="848" font-family="Arial,sans-serif" font-size="20" fill="#374151">850pts</text>
</svg>
