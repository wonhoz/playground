<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>
    <filter id="shadow05">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg05)" rx="120"/>

  <!-- Layer 2: Bar chart (purple) behind star -->
  <rect x="200" y="520" width="100" height="330" fill="#7C3AED" rx="12" opacity="0.85"/>
  <rect x="340" y="400" width="100" height="450" fill="#6D28D9" rx="12" opacity="0.85"/>
  <rect x="480" y="470" width="100" height="380" fill="#7C3AED" rx="12" opacity="0.85"/>
  <rect x="620" y="340" width="100" height="510" fill="#5B21B6" rx="12" opacity="0.85"/>
  <rect x="760" y="430" width="100" height="420" fill="#7C3AED" rx="12" opacity="0.85"/>

  <!-- Baseline -->
  <line x1="160" y1="855" x2="900" y2="855" stroke="#5B21B6" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

  <!-- Layer 3: Big star (white) in center -->
  <!-- 5-point star centered at 512,430, radius ~280 -->
  <polygon
    points="512,140 578,336 790,336 624,454 686,650 512,530 338,650 400,454 234,336 446,336"
    fill="white" opacity="0.96" filter="url(#shadow05)"/>

  <!-- "TOP" text inside star -->
  <text x="512" y="420" font-family="'Segoe UI', Arial Black, sans-serif" font-size="120"
    font-weight="900" text-anchor="middle" fill="#FF6B9D" letter-spacing="-4">TOP</text>
</svg>
