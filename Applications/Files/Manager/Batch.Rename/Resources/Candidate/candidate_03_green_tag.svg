<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a0a"/>
      <stop offset="100%" stop-color="#003316"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44FF88"/>
      <stop offset="100%" stop-color="#00AA44"/>
    </linearGradient>
    <linearGradient id="file" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22CC66"/>
      <stop offset="100%" stop-color="#007733"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File -->
  <rect x="110" y="140" width="180" height="232" rx="10" fill="url(#file)" opacity="0.7"/>
  <polygon points="260,140 290,140 290,170" fill="#001a0a" opacity="0.4"/>
  <polygon points="260,140 260,170 290,170" fill="#007733" opacity="0.8"/>
  <!-- File text lines -->
  <line x1="134" y1="190" x2="265" y2="190" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="134" y1="213" x2="265" y2="213" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="134" y1="236" x2="220" y2="236" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Name/label tag -->
  <path d="M280,280 L400,280 L430,310 L400,340 L280,340 L280,280 Z" fill="url(#tag)" opacity="0.95"/>
  <circle cx="298" cy="310" r="10" fill="#001a0a"/>
  <line x1="318" y1="295" x2="415" y2="295" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="318" y1="313" x2="395" y2="313" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="318" y1="331" x2="405" y2="331" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Stack tags -->
  <path d="M280,370 L400,370 L430,400 L400,430 L280,430 L280,370 Z" fill="url(#tag)" opacity="0.7"/>
  <circle cx="298" cy="400" r="10" fill="#001a0a"/>
  <line x1="318" y1="386" x2="415" y2="386" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="318" y1="404" x2="390" y2="404" stroke="white" stroke-width="3" opacity="0.5"/>
  <!-- Regex cursor -->
  <rect x="130" y="340" width="140" height="36" rx="6" fill="#001a0a" opacity="0.7" stroke="#44FF88" stroke-width="1.5"/>
  <text x="146" y="365" font-family="monospace" font-size="18" fill="#44FF88" opacity="0.9">*.txt → *.md</text>
</svg>