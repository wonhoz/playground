<!-- Locale.Forge icon_01: 지구본 + 언어 태그 (globe with language tag) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0F1A"/>
  <!-- Globe outline -->
  <circle cx="512" cy="490" r="240" fill="none" stroke="#5C6BC0" stroke-width="36"/>
  <!-- Latitude lines -->
  <ellipse cx="512" cy="490" rx="240" ry="90" fill="none" stroke="#5C6BC0" stroke-width="22"/>
  <!-- Vertical meridian -->
  <path d="M512 250 Q620 370 620 490 Q620 610 512 730 Q404 610 404 490 Q404 370 512 250Z" fill="none" stroke="#5C6BC0" stroke-width="22"/>
  <!-- Language tag ribbon -->
  <rect x="570" y="620" width="210" height="80" rx="16" fill="#5C6BC0"/>
  <rect x="570" y="620" width="40" height="80" rx="8" fill="#3949AB"/>
  <!-- Tag notch -->
  <polygon points="752,620 780,660 752,700" fill="#0D0F1A"/>
</svg>
