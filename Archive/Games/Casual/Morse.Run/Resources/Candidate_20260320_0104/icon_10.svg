<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Cipher-style dots and dashes forming a path -->
  <!-- Row 1 -->
  <circle cx="200" cy="300" r="30" fill="#F57F17"/>
  <rect x="268" y="272" width="110" height="56" rx="28" fill="#F57F17"/>
  <circle cx="428" cy="300" r="30" fill="#FFD54F"/>
  <circle cx="508" cy="300" r="30" fill="#FFD54F"/>
  <rect x="576" y="272" width="180" height="56" rx="28" fill="#F57F17"/>
  <!-- Arrow connecting to run path -->
  <path d="M512 420 L512 580" stroke="#FFD54F" stroke-width="16" stroke-dasharray="20,12"/>
  <!-- Runner footprint trail -->
  <ellipse cx="420" cy="680" rx="30" ry="16" fill="#F57F17" fill-opacity="0.7" transform="rotate(-20,420,680)"/>
  <ellipse cx="500" cy="720" rx="30" ry="16" fill="#FFD54F" fill-opacity="0.7" transform="rotate(15,500,720)"/>
  <ellipse cx="580" cy="680" rx="30" ry="16" fill="#F57F17" fill-opacity="0.7" transform="rotate(-20,580,680)"/>
  <ellipse cx="660" cy="720" rx="30" ry="16" fill="#FFD54F" fill-opacity="0.7" transform="rotate(15,660,720)"/>
  <!-- Decode arrow -->
  <polygon points="760,680 700,650 700,710" fill="#FFD54F" fill-opacity="0.7"/>
  <!-- Row 2 dots as decoded -->
  <circle cx="200" cy="820" r="22" fill="#F57F17" fill-opacity="0.5"/>
  <rect x="252" y="800" width="80" height="44" rx="22" fill="#F57F17" fill-opacity="0.5"/>
  <circle cx="372" cy="820" r="22" fill="#FFD54F" fill-opacity="0.5"/>
  <circle cx="432" cy="820" r="22" fill="#FFD54F" fill-opacity="0.5"/>
  <circle cx="492" cy="820" r="22" fill="#F57F17" fill-opacity="0.5"/>
</svg>