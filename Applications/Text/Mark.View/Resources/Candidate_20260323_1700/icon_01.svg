  <rect x="80" y="340" width="860" height="90" rx="18" fill="#58A6FF"/>
  <rect x="80" y="594" width="860" height="90" rx="18" fill="#58A6FF"/>
  <rect x="240" y="140" width="90" height="744" rx="18" fill="#58A6FF"/>
  <rect x="694" y="140" width="90" height="744" rx="18" fill="#58A6FF"/>
  <!-- Layer 3: 하단 텍스트 라인 (문서 느낌) -->
  <rect x="140" y="870" width="440" height="30" rx="6" fill="#E6EDF3" opacity="0.4"/>
  <rect x="140" y="914" width="300" height="30" rx="6" fill="#E6EDF3" opacity="0.25"/>
</svg>
