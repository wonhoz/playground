<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a0a2a"/>
      <stop offset="100%" stop-color="#1a0020"/>
    </radialGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="pink2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative hexagons background -->
  <polygon points="100,80 140,80 160,115 140,150 100,150 80,115" fill="none" stroke="#c026d3" stroke-width="1" opacity="0.3"/>
  <polygon points="370,80 410,80 430,115 410,150 370,150 350,115" fill="none" stroke="#c026d3" stroke-width="1" opacity="0.3"/>
  <polygon points="60,350 100,350 120,385 100,420 60,420 40,385" fill="none" stroke="#a21caf" stroke-width="1" opacity="0.2"/>
  <polygon points="400,350 440,350 460,385 440,420 400,420 380,385" fill="none" stroke="#a21caf" stroke-width="1" opacity="0.2"/>
  <!-- Main panel -->
  <rect x="80" y="120" width="352" height="272" rx="20" fill="#1e0028" stroke="url(#pink)" stroke-width="2.5"/>
  <!-- Panel header -->
  <rect x="80" y="120" width="352" height="48" rx="20" fill="#2d0040"/>
  <rect x="80" y="148" width="352" height="20" fill="#2d0040"/>
  <circle cx="110" cy="144" r="10" fill="#ff6ec7" opacity="0.7"/>
  <circle cx="136" cy="144" r="10" fill="#e879f9" opacity="0.5"/>
  <text x="162" y="149" font-family="monospace" font-size="14" fill="#f0abfc" opacity="0.8">Hex Inspector</text>
  <!-- Byte display panels -->
  <rect x="100" y="184" width="72" height="48" rx="8" fill="#3d0050" stroke="#c026d3" stroke-width="1.5"/>
  <text x="116" y="204" font-family="monospace" font-size="12" fill="#f0abfc" opacity="0.6">byte 0</text>
  <text x="110" y="224" font-family="monospace" font-size="20" font-weight="bold" fill="#ff6ec7">4D</text>
  <rect x="184" y="184" width="72" height="48" rx="8" fill="#3d0050" stroke="#c026d3" stroke-width="1.5"/>
  <text x="200" y="204" font-family="monospace" font-size="12" fill="#f0abfc" opacity="0.6">byte 1</text>
  <text x="194" y="224" font-family="monospace" font-size="20" font-weight="bold" fill="#e879f9">5A</text>
  <rect x="268" y="184" width="72" height="48" rx="8" fill="#3d0050" stroke="#a21caf" stroke-width="1.5"/>
  <text x="284" y="204" font-family="monospace" font-size="12" fill="#f0abfc" opacity="0.6">byte 2</text>
  <text x="278" y="224" font-family="monospace" font-size="20" font-weight="bold" fill="#c084fc">90</text>
  <rect x="352" y="184" width="72" height="48" rx="8" fill="#3d0050" stroke="#a21caf" stroke-width="1.5"/>
  <text x="368" y="204" font-family="monospace" font-size="12" fill="#f0abfc" opacity="0.6">byte 3</text>
  <text x="362" y="224" font-family="monospace" font-size="20" font-weight="bold" fill="#ff6ec7">00</text>
  <!-- Decoded text section -->
  <rect x="100" y="248" width="68" height="28" rx="6" fill="#c026d3" opacity="0.2"/>
  <text x="108" y="267" font-family="monospace" font-size="15" fill="#ff6ec7">MZ</text>
  <text x="178" y="267" font-family="monospace" font-size="13" fill="#f0abfc" opacity="0.7">= DOS/PE magic number</text>
  <!-- Progress bar -->
  <rect x="100" y="294" width="312" height="8" rx="4" fill="#3d0050"/>
  <rect x="100" y="294" width="180" height="8" rx="4" fill="url(#pink)"/>
  <text x="100" y="320" font-family="monospace" font-size="13" fill="#c026d3" opacity="0.8">Offset: 0x0000  |  Position: 57%</text>
  <!-- Bit pattern -->
  <text x="100" y="348" font-family="monospace" font-size="13" fill="#a21caf">0100 1101</text>
  <text x="196" y="348" font-family="monospace" font-size="13" fill="#c026d3" opacity="0.7">0101 1010</text>
  <text x="292" y="348" font-family="monospace" font-size="13" fill="#a21caf" opacity="0.6">1001 0000</text>
  <!-- Bottom label -->
  <text x="100" y="376" font-family="monospace" font-size="13" fill="#f0abfc" opacity="0.5">Type: Executable  |  EXE format</text>
</svg>
