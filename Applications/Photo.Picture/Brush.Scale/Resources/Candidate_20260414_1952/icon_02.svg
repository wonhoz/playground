<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 주황+노랑 그라데이션 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 돋보기 크게 -->
  <!-- 돋보기 원 -->
  <circle cx="450" cy="450" r="260" fill="white" opacity="0.2" stroke="white" stroke-width="40"/>
  <circle cx="450" cy="450" r="220" fill="white" opacity="0.9"/>
  <!-- 돋보기 손잡이 -->
  <line x1="660" y1="660" x2="810" y2="810" stroke="white" stroke-width="60" stroke-linecap="round"/>
  <!-- Layer 3: 배율 텍스트 (돋보기 안) -->
  <text x="450" y="400" font-family="Segoe UI, sans-serif" font-size="120" font-weight="bold" fill="#CC5500" text-anchor="middle">4x</text>
  <line x1="280" y1="430" x2="620" y2="430" stroke="#FF8C00" stroke-width="8"/>
  <text x="310" y="512" font-family="Segoe UI, sans-serif" font-size="68" font-weight="bold" fill="#FF6600">2x</text>
  <text x="490" y="512" font-family="Segoe UI, sans-serif" font-size="68" font-weight="bold" fill="#FF6600">8x</text>
  <!-- 업스케일 화살표 (상단) -->
  <path d="M 450 210 L 450 130 M 420 160 L 450 130 L 480 160" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 하단 텍스트 -->
  <text x="512" y="870" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Upscale</text>
</svg>
