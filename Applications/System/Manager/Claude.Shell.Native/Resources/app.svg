<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <clipPath id="c1"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Sky blue background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g1)"/>
  <g clip-path="url(#c1)">
    <!-- Layer 2: Context menu card -->
    <rect x="160" y="220" width="560" height="420" rx="24" fill="white"/>
    <!-- Highlighted first item: CLAUDE -->
    <rect x="176" y="236" width="528" height="120" rx="14" fill="#0284C7"/>
    <text x="440" y="318" font-family="Arial Black,Arial,sans-serif" font-size="96" fill="white" font-weight="900" text-anchor="middle">CLAUDE</text>
    <!-- Second item: CODE 열기 -->
    <rect x="176" y="364" width="528" height="100" rx="10" fill="#F0F9FF"/>
    <text x="440" y="432" font-family="Arial,sans-serif" font-size="82" fill="#0369A1" font-weight="bold" text-anchor="middle">CODE 열기</text>
    <!-- Divider -->
    <line x1="192" y1="472" x2="704" y2="472" stroke="#E0E0E0" stroke-width="4"/>
    <!-- Third item -->
    <text x="440" y="584" font-family="Arial,sans-serif" font-size="80" fill="#94A3B8" text-anchor="middle">권한 건너뜀</text>
    <!-- Layer 3: Mouse right-click cursor -->
    <polygon points="720,380 720,600 778,548 810,630 858,608 826,524 906,514" fill="#0C4A6E"/>
    <polygon points="720,380 720,600 778,548 810,630 858,608 826,524 906,514" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    <!-- Right-click indicator dot -->
    <circle cx="870" cy="430" r="28" fill="#F59E0B"/>
    <text x="870" y="447" font-family="Arial Black,Arial,sans-serif" font-size="28" fill="white" font-weight="900" text-anchor="middle">R</text>
  </g>
</svg>
