<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <clipPath id="c2"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Mint green background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g2)"/>
  <g clip-path="url(#c2)">
    <!-- Layer 2: Question box (top) -->
    <rect x="130" y="170" width="764" height="170" rx="24" fill="#065F46"/>
    <!-- Q label -->
    <rect x="148" y="188" width="90" height="90" rx="14" fill="#10B981"/>
    <text x="193" y="254" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">Q</text>
    <!-- Question dots -->
    <rect x="256" y="218" width="360" height="16" rx="8" fill="#34D399" opacity="0.7"/>
    <rect x="256" y="246" width="240" height="16" rx="8" fill="#34D399" opacity="0.5"/>
    <!-- Timer bar -->
    <rect x="148" y="302" width="728" height="22" rx="11" fill="#064E3B"/>
    <rect x="148" y="302" width="440" height="22" rx="11" fill="#F59E0B"/>
    <!-- Layer 3: 2×2 answer grid -->
    <!-- A (top-left, highlighted correct) -->
    <rect x="130" y="374" width="368" height="200" rx="20" fill="#059669"/>
    <text x="186" y="432" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#A7F3D0" font-weight="900">A</text>
    <rect x="196" y="450" width="240" height="16" rx="8" fill="#A7F3D0" opacity="0.7"/>
    <rect x="196" y="476" width="180" height="16" rx="8" fill="#A7F3D0" opacity="0.5"/>
    <!-- Checkmark on A -->
    <text x="460" y="490" font-family="Arial,sans-serif" font-size="96" fill="#34D399">✓</text>
    <!-- B (top-right) -->
    <rect x="526" y="374" width="368" height="200" rx="20" fill="#D1FAE5"/>
    <text x="582" y="432" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#059669" font-weight="900">B</text>
    <rect x="592" y="450" width="240" height="16" rx="8" fill="#6EE7B7" opacity="0.6"/>
    <rect x="592" y="476" width="180" height="16" rx="8" fill="#6EE7B7" opacity="0.4"/>
    <!-- C (bottom-left) -->
    <rect x="130" y="590" width="368" height="200" rx="20" fill="#D1FAE5"/>
    <text x="186" y="648" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#059669" font-weight="900">C</text>
    <rect x="196" y="666" width="240" height="16" rx="8" fill="#6EE7B7" opacity="0.6"/>
    <rect x="196" y="692" width="180" height="16" rx="8" fill="#6EE7B7" opacity="0.4"/>
    <!-- D (bottom-right) -->
    <rect x="526" y="590" width="368" height="200" rx="20" fill="#D1FAE5"/>
    <text x="582" y="648" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#059669" font-weight="900">D</text>
    <rect x="592" y="666" width="240" height="16" rx="8" fill="#6EE7B7" opacity="0.6"/>
    <rect x="592" y="692" width="180" height="16" rx="8" fill="#6EE7B7" opacity="0.4"/>
    <!-- Score bar -->
    <text x="512" y="876" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#065F46" font-weight="900" text-anchor="middle">점수: 100</text>
  </g>
</svg>
