<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dodge.Blitz | 총구 화염 — 발사 순간 | 대각선/동적 | #100A00 -->
  <defs>
    <radialGradient id="muzzleGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="muzzleGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#100A00"/>
  <!-- Layer 2: Multiple muzzle flash / guns pointing diagonally -->
  <!-- Bullet trails (from multiple directions) -->
  <!-- Bullet 1: top-left -->
  <line x1="160" y1="220" x2="480" y2="490" stroke="#FCD34D" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="160" cy="220" rx="60" ry="30" fill="url(#muzzleGrad)" transform="rotate(45 160 220)" filter="url(#muzzleGlow)" opacity="0.9"/>
  <!-- Bullet 2: top-right -->
  <line x1="864" y1="260" x2="560" y2="490" stroke="#F97316" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="864" cy="260" rx="60" ry="30" fill="url(#muzzleGrad)" transform="rotate(-45 864 260)" filter="url(#muzzleGlow)" opacity="0.8"/>
  <!-- Bullet 3: right -->
  <line x1="880" y1="512" x2="590" y2="512" stroke="#EF4444" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="880" cy="512" rx="60" ry="30" fill="url(#muzzleGrad)" filter="url(#muzzleGlow)" opacity="0.8"/>
  <!-- Bullet 4: bottom-right -->
  <line x1="864" y1="764" x2="560" y2="540" stroke="#FCD34D" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="864" cy="764" rx="60" ry="30" fill="url(#muzzleGrad)" transform="rotate(45 864 764)" filter="url(#muzzleGlow)" opacity="0.8"/>
  <!-- Bullet 5: bottom-left -->
  <line x1="160" y1="804" x2="464" y2="540" stroke="#F97316" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="160" cy="804" rx="60" ry="30" fill="url(#muzzleGrad)" transform="rotate(-45 160 804)" filter="url(#muzzleGlow)" opacity="0.8"/>
  <!-- Bullet 6: left -->
  <line x1="144" y1="512" x2="434" y2="512" stroke="#EF4444" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="144" cy="512" rx="60" ry="30" fill="url(#muzzleGrad)" filter="url(#muzzleGlow)" opacity="0.8"/>
  <!-- Player diamond dodging (center, trail visible) -->
  <polygon points="512,420 590,512 512,604 434,512" fill="#00FFCC" opacity="0.25"/>
  <polygon points="480,390 560,480 480,570 400,480" fill="#00FFCC" opacity="0.2"/>
  <polygon points="448,360 528,450 448,540 368,450" fill="#00FFCC" opacity="0.1"/>
  <!-- Layer 3: Current player position (dodged left-down) -->
  <polygon points="460,620 540,700 460,780 380,700" fill="none" stroke="#00FFCC" stroke-width="6" filter="url(#muzzleGlow)" opacity="0.9"/>
</svg>
