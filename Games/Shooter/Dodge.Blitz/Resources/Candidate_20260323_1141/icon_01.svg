<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 블랙 -->
  <rect width="1024" height="1024" rx="180" fill="#070010"/>
  <!-- Layer 2: 플레이어 + 날아오는 총알들 -->
  <!-- 플레이어 (중앙 아래 사각 우주선) -->
  <polygon points="512,740 460,820 564,820" fill="#00E5FF"/>
  <rect x="484" y="760" width="56" height="40" rx="6" fill="#00ACC1"/>
  <!-- 플레이어 엔진 불꽃 -->
  <polygon points="490,820 512,870 534,820" fill="#FF6D00" opacity="0.8"/>
  <!-- 총알들 (위에서 아래로 날아옴) -->
  <!-- 탄알 1 (바로 위) -->
  <rect x="500" y="580" width="24" height="48" rx="8" fill="#FF4081"/>
  <rect x="500" y="570" width="24" height="16" rx="4" fill="#FF80AB"/>
  <!-- 탄알 2 (왼쪽) -->
  <rect x="320" y="500" width="24" height="48" rx="8" fill="#FF4081"/>
  <rect x="320" y="490" width="24" height="16" rx="4" fill="#FF80AB"/>
  <!-- 탄알 3 (오른쪽) -->
  <rect x="700" y="540" width="24" height="48" rx="8" fill="#FF4081"/>
  <rect x="700" y="530" width="24" height="16" rx="4" fill="#FF80AB"/>
  <!-- 탄알 4 (멀리 위) -->
  <rect x="200" y="300" width="20" height="40" rx="6" fill="#FF8A80" opacity="0.7"/>
  <rect x="580" y="250" width="20" height="40" rx="6" fill="#FF8A80" opacity="0.6"/>
  <rect x="800" y="320" width="20" height="40" rx="6" fill="#FF8A80" opacity="0.7"/>
  <rect x="420" y="200" width="20" height="40" rx="6" fill="#FF8A80" opacity="0.5"/>
  <!-- 탄알 꼬리들 -->
  <line x1="512" y1="580" x2="512" y2="540" stroke="#FF4081" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
  <line x1="332" y1="500" x2="332" y2="460" stroke="#FF4081" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  <line x1="712" y1="540" x2="712" y2="500" stroke="#FF4081" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  <!-- Layer 3: 점수 UI -->
  <text x="512" y="180" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#00E5FF" text-anchor="middle">DODGE!</text>
  <text x="512" y="940" font-family="Arial Black,Arial" font-size="60" font-weight="900" fill="#FF4081" text-anchor="middle">BLITZ</text>
</svg>
