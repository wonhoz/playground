<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg11)"/>
  <!-- 돋보기 원형 -->
  <circle cx="440" cy="430" r="260" fill="white" opacity="0.12"/>
  <circle cx="440" cy="430" r="260" fill="none" stroke="white" stroke-width="70"/>
  <!-- 돋보기 안 내용 (프롬프트 텍스트) -->
  <clipPath id="lens11">
    <circle cx="440" cy="430" r="222"/>
  </clipPath>
  <g clip-path="url(#lens11)">
    <rect x="218" y="208" width="444" height="444" fill="#1E3A8A"/>
    <!-- 검색 텍스트 줄들 -->
    <rect x="250" y="270" width="200" height="20" rx="6" fill="#60A5FA"/>
    <rect x="250" y="306" width="360" height="18" rx="6" fill="#93C5FD" opacity="0.8"/>
    <rect x="250" y="338" width="320" height="18" rx="6" fill="#93C5FD" opacity="0.6"/>
    <rect x="250" y="370" width="340" height="18" rx="6" fill="#93C5FD" opacity="0.7"/>
    <!-- 하이라이트된 검색 결과 -->
    <rect x="250" y="406" width="380" height="30" rx="8" fill="#FDE68A" opacity="0.3"/>
    <rect x="252" y="408" width="376" height="26" rx="6" fill="none" stroke="#FDE68A" stroke-width="3"/>
    <rect x="262" y="414" width="240" height="14" rx="5" fill="#FDE68A"/>
    <!-- 더 많은 결과 -->
    <rect x="250" y="452" width="300" height="16" rx="6" fill="#93C5FD" opacity="0.5"/>
    <rect x="250" y="476" width="350" height="16" rx="6" fill="#93C5FD" opacity="0.4"/>
    <rect x="250" y="500" width="280" height="16" rx="6" fill="#93C5FD" opacity="0.45"/>
    <rect x="250" y="524" width="320" height="16" rx="6" fill="#93C5FD" opacity="0.35"/>
    <rect x="250" y="548" width="360" height="16" rx="6" fill="#93C5FD" opacity="0.3"/>
    <rect x="250" y="572" width="290" height="16" rx="6" fill="#93C5FD" opacity="0.25"/>
    <rect x="250" y="596" width="330" height="16" rx="6" fill="#93C5FD" opacity="0.2"/>
    <rect x="250" y="620" width="310" height="16" rx="6" fill="#93C5FD" opacity="0.15"/>
  </g>
  <!-- 돋보기 손잡이 -->
  <line x1="647" y1="637" x2="840" y2="830" stroke="white" stroke-width="80" stroke-linecap="round"/>
  <!-- 손잡이 그림자 -->
  <line x1="651" y1="641" x2="844" y2="834" stroke="#1D4ED8" stroke-width="50" stroke-linecap="round" opacity="0.4"/>
</svg>
