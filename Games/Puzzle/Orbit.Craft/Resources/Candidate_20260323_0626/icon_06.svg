<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbit.Craft | 연필로 궤도 그리기 — 플레이어가 설계하는 궤도 | 실루엣 | #FFF4E8 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF4E8"/>
  <!-- Layer 2: Pencil drawing an orbital path -->
  <!-- Graph paper grid -->
  <line x1="200" y1="200" x2="200" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="260" y1="200" x2="260" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="320" y1="200" x2="320" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="380" y1="200" x2="380" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="440" y1="200" x2="440" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="500" y1="200" x2="500" y2="800" stroke="#E8DCCC" stroke-width="2"/>
  <line x1="560" y1="200" x2="560" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="620" y1="200" x2="620" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="680" y1="200" x2="680" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="740" y1="200" x2="740" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="800" y1="200" x2="800" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="200" x2="800" y2="200" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="260" x2="800" y2="260" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="320" x2="800" y2="320" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="380" x2="800" y2="380" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="440" x2="800" y2="440" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="500" x2="800" y2="500" stroke="#E8DCCC" stroke-width="2"/>
  <line x1="200" y1="560" x2="800" y2="560" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="620" x2="800" y2="620" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="680" x2="800" y2="680" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="740" x2="800" y2="740" stroke="#E0D4C4" stroke-width="1"/>
  <line x1="200" y1="800" x2="800" y2="800" stroke="#E0D4C4" stroke-width="1"/>
  <!-- Planet (center) -->
  <circle cx="460" cy="500" r="50" fill="#CC6600" stroke="#884400" stroke-width="4"/>
  <ellipse cx="460" cy="500" rx="60" ry="18" fill="none" stroke="#884400" stroke-width="3" opacity="0.5"/>
  <!-- Orbit path being drawn (dashed, partial - design in progress) -->
  <!-- Completed portion of orbit (dark pencil line) -->
  <path d="M 460 340 A 200 120 0 0 1 660 500 A 200 120 0 0 1 460 660" stroke="#2A2A2A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Incomplete / sketchy portion -->
  <path d="M 460 660 A 200 120 0 0 1 260 500 A 200 120 0 0 1 460 340" stroke="#2A2A2A" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="12,8" opacity="0.5"/>
  <!-- Satellite on orbit (pencil drawn dot) -->
  <circle cx="660" cy="500" r="16" fill="#2244AA" stroke="#1122AA" stroke-width="3"/>
  <circle cx="660" cy="500" r="8" fill="#88AAFF"/>
  <!-- Tiny antenna lines on satellite -->
  <line x1="660" y1="484" x2="660" y2="470" stroke="#1122AA" stroke-width="2"/>
  <line x1="660" y1="470" x2="650" y2="462" stroke="#1122AA" stroke-width="2"/>
  <line x1="660" y1="470" x2="670" y2="462" stroke="#1122AA" stroke-width="2"/>
  <!-- Layer 3: Pencil tool silhouette drawing the orbit -->
  <!-- Pencil body -->
  <rect x="700" y="240" width="28" height="120" rx="4" fill="#FFD700" stroke="#AA8800" stroke-width="2" transform="rotate(45 714 300)"/>
  <!-- Pencil tip -->
  <polygon points="714,338 728,362 700,362" fill="#FFEEAA" stroke="#AA8800" stroke-width="2" transform="rotate(45 714 300)"/>
  <polygon points="714,356 728,372 700,372" fill="#2A2A2A" transform="rotate(45 714 300)"/>
  <!-- Eraser end -->
  <rect x="700" y="224" width="28" height="18" rx="3" fill="#FF8888" stroke="#AA4444" stroke-width="2" transform="rotate(45 714 300)"/>
  <!-- Design notes annotation -->
  <text x="240" y="330" font-family="serif" font-size="13" fill="#8A6A4A" font-style="italic">periapsis: 340km</text>
  <text x="640" y="740" font-family="serif" font-size="13" fill="#8A6A4A" font-style="italic">eccentricity: 0.2</text>
</svg>
