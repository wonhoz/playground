  <polygon points="256,80 278,190 380,190 300,248 330,360 256,298 182,360 212,248 132,190 234,190" fill="url(#gold)"/>
  <!-- Inner star highlight -->
  <polygon points="256,110 272,190 340,190 284,228 306,314 256,272 206,314 228,228 172,190 240,190" fill="#fff8c0" opacity="0.4"/>
  <!-- Runner silhouette over star -->
  <circle cx="256" cy="218" r="18" fill="#1a1a3a"/>
  <path d="M256 236 L244 280 L252 280 L256 258 L268 278 L276 274 L264 234Z" fill="#1a1a3a"/>
  <path d="M256 248 L238 240 L241 232 L258 242Z" fill="#1a1a3a"/>
  <path d="M256 248 L274 236 L272 228 L254 242Z" fill="#1a1a3a"/>
  <!-- Speed lines radiating -->
  <line x1="256" y1="80" x2="256" y2="60" stroke="#ffdd44" stroke-width="4" opacity="0.7"/>
  <line x1="340" y1="115" x2="355" y2="100" stroke="#ffdd44" stroke-width="3" opacity="0.6"/>
  <line x1="380" y1="200" x2="400" y2="198" stroke="#ffdd44" stroke-width="3" opacity="0.6"/>
  <line x1="355" y1="295" x2="372" y2="310" stroke="#ffdd44" stroke-width="3" opacity="0.5"/>
  <line x1="172" y1="115" x2="157" y2="100" stroke="#ffdd44" stroke-width="3" opacity="0.6"/>
  <line x1="132" y1="200" x2="112" y2="198" stroke="#ffdd44" stroke-width="3" opacity="0.6"/>
  <line x1="157" y1="295" x2="140" y2="310" stroke="#ffdd44" stroke-width="3" opacity="0.5"/>
  <!-- "1" medal text suggestion -->
