<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2e1f00"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe57f"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd600" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="180" fill="url(#halo)"/>
  <!-- Left wing -->
  <path d="M236 210 Q190 175 140 165 Q110 160 88 170 Q110 195 140 200 Q180 206 220 218 Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M236 220 Q190 220 140 240 Q110 250 88 265 Q112 260 145 250 Q185 240 228 235 Z" fill="#ff8f00" opacity="0.7"/>
  <!-- Right wing -->
  <path d="M276 210 Q322 175 372 165 Q402 160 424 170 Q402 195 372 200 Q332 206 292 218 Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M276 220 Q322 220 372 240 Q402 250 424 265 Q400 260 367 250 Q327 240 284 235 Z" fill="#ff8f00" opacity="0.7"/>
  <!-- Trophy cup -->
  <path d="M208 150 Q208 260 256 275 Q304 260 304 150 Z" fill="url(#trophy)"/>
  <path d="M208 150 L304 150" stroke="#ffe57f" stroke-width="3"/>
  <!-- Handles -->
  <path d="M208 175 Q180 190 185 215 Q190 235 208 230" stroke="#ffd600" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M304 175 Q332 190 327 215 Q322 235 304 230" stroke="#ffd600" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Trophy base -->
  <rect x="234" y="275" width="44" height="16" rx="4" fill="#f9a825"/>
  <rect x="218" y="287" width="76" height="16" rx="6" fill="#ff8f00"/>
  <!-- Star on trophy -->
  <polygon points="256,175 262,192 280,192 266,202 271,220 256,210 241,220 246,202 232,192 250,192" fill="#ffe57f" opacity="0.9"/>
  <!-- Title -->
  <text x="256" y="455" font-family="sans-serif" font-size="24" fill="#ffd600" text-anchor="middle" font-weight="bold" letter-spacing="4" opacity="0.9">SKY.DRIFT</text>
</svg>
