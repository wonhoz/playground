<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_pf03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <clipPath id="c_pf03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Hot pink background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_pf03)"/>
  <g clip-path="url(#c_pf03)">
    <!-- Layer 2: Anvil shape -->
    <!-- Anvil body -->
    <rect x="252" y="520" width="520" height="280" rx="40" fill="#1E1B4B"/>
    <!-- Anvil top (narrower) -->
    <rect x="332" y="400" width="360" height="160" rx="28" fill="#312E81"/>
    <!-- Anvil horn (left protrusion) -->
    <path d="M252 600 Q180 580 160 640 Q180 700 252 680 Z" fill="#1E1B4B"/>
    <!-- Layer 3: Hammer + sparks -->
    <!-- Hammer handle -->
    <line x1="640" y1="200" x2="520" y2="380" stroke="#92400E" stroke-width="52" stroke-linecap="round"/>
    <!-- Hammer head -->
    <rect x="580" y="140" width="200" height="120" rx="24" fill="#B45309" transform="rotate(-35 680 200)"/>
    <rect x="580" y="140" width="200" height="120" rx="24" fill="#D97706" transform="rotate(-35 680 200) translate(0 -8)"/>
    <!-- Impact sparks -->
    <circle cx="520" cy="400" r="32" fill="#FCD34D"/>
    <line x1="520" y1="368" x2="520" y2="310" stroke="#FDE68A" stroke-width="20" stroke-linecap="round"/>
    <line x1="552" y1="378" x2="600" y2="330" stroke="#FDE68A" stroke-width="16" stroke-linecap="round"/>
    <line x1="488" y1="378" x2="440" y2="330" stroke="#FDE68A" stroke-width="16" stroke-linecap="round"/>
    <line x1="560" y1="408" x2="622" y2="400" stroke="#FEF08A" stroke-width="14" stroke-linecap="round"/>
    <line x1="480" y1="408" x2="418" y2="400" stroke="#FEF08A" stroke-width="14" stroke-linecap="round"/>
    <!-- Glow dots -->
    <circle cx="460" cy="300" r="14" fill="#FEF08A"/>
    <circle cx="570" cy="290" r="10" fill="#FCD34D"/>
    <circle cx="630" cy="340" r="12" fill="#FEF08A"/>
  </g>
</svg>
