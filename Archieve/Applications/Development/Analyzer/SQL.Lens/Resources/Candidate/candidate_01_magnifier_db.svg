<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#1F6FEB"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D8B40"/>
      <stop offset="100%" style="stop-color:#1A5C1D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Database cylinders -->
  <ellipse cx="200" cy="160" rx="80" ry="22" fill="url(#db)"/>
  <rect x="120" y="160" width="160" height="60" fill="#1A5C1D"/>
  <ellipse cx="200" cy="220" rx="80" ry="22" fill="url(#db)"/>
  <rect x="120" y="220" width="160" height="50" fill="#1A5C1D"/>
  <ellipse cx="200" cy="270" rx="80" ry="22" fill="url(#db)"/>
  <!-- DB lines -->
  <line x1="120" y1="190" x2="280" y2="190" stroke="#3D8B40" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="245" x2="280" y2="245" stroke="#3D8B40" stroke-width="1" opacity="0.5"/>
  <!-- Magnifier -->
  <circle cx="310" cy="260" r="110" fill="none" stroke="url(#lens)" stroke-width="16"/>
  <circle cx="310" cy="260" r="90" fill="#0D1117" opacity="0.8"/>
  <!-- SQL text inside lens -->
  <text x="310" y="250" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="32" fill="#58A6FF">SQL</text>
  <text x="310" y="282" text-anchor="middle" font-family="monospace" font-size="14" fill="#3D8B40">ANALYZE</text>
  <!-- Handle -->
  <line x1="396" y1="346" x2="450" y2="400" stroke="url(#lens)" stroke-width="20" stroke-linecap="round"/>
</svg>
