<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- web/spider graph edges -->
  <g stroke="#a78bfa" stroke-width="2" opacity="0.5">
    <line x1="256" y1="256" x2="256" y2="100"/>
    <line x1="256" y1="256" x2="392" y2="180"/>
    <line x1="256" y1="256" x2="420" y2="320"/>
    <line x1="256" y1="256" x2="340" y2="430"/>
    <line x1="256" y1="256" x2="172" y2="430"/>
    <line x1="256" y1="256" x2="92" y2="320"/>
    <line x1="256" y1="256" x2="120" y2="180"/>
    <!-- cross connections -->
    <line x1="256" y1="100" x2="392" y2="180"/>
    <line x1="392" y1="180" x2="420" y2="320"/>
    <line x1="420" y1="320" x2="340" y2="430"/>
    <line x1="172" y1="430" x2="92" y2="320"/>
    <line x1="92" y1="320" x2="120" y2="180"/>
    <line x1="120" y1="180" x2="256" y2="100"/>
  </g>
  <!-- center node -->
  <circle cx="256" cy="256" r="36" fill="#5b21b6" stroke="#c4b5fd" stroke-width="4"/>
  <text x="256" y="256" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">DEP</text>
  <!-- outer nodes -->
  <circle cx="256" cy="100" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="392" cy="180" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="420" cy="320" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="340" cy="430" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="172" cy="430" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="92" cy="320" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="120" cy="180" r="20" fill="#4c1d95" stroke="#8b5cf6" stroke-width="3"/>
</svg>
