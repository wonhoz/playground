<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tag.Forge - Icon Candidates</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { color: #e0e0e0; font-size: 22px; margin-bottom: 8px; letter-spacing: 0.5px; }
    p  { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #555; transform: translateY(-3px); }
    .card img { width: 120px; height: 120px; border-radius: 20px; }
    .card span {
      color: #aaa;
      font-size: 11px;
      text-align: center;
      word-break: break-all;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Tag.Forge — Icon Candidates</h1>
  <p>오디오 파일 ID3 태그 편집기 | 총 10개 후보 아이콘</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_golden_tag.svg"/><span>01 · Golden Tag</span></div>
    <div class="card"><img src="candidate_02_blue_waveform.svg"/><span>02 · Blue Waveform</span></div>
    <div class="card"><img src="candidate_03_purple_vinyl.svg"/><span>03 · Purple Vinyl</span></div>
    <div class="card"><img src="candidate_04_orange_forge.svg"/><span>04 · Orange Forge</span></div>
    <div class="card"><img src="candidate_05_green_mp3.svg"/><span>05 · Green MP3</span></div>
    <div class="card"><img src="candidate_06_red_metadata.svg"/><span>06 · Red Metadata</span></div>
    <div class="card"><img src="candidate_07_cyan_neon.svg"/><span>07 · Cyan Neon</span></div>
    <div class="card"><img src="candidate_08_teal_headphone.svg"/><span>08 · Teal Headphone</span></div>
    <div class="card"><img src="candidate_09_pink_album.svg"/><span>09 · Pink Album</span></div>
    <div class="card"><img src="candidate_10_dark_equalizer.svg"/><span>10 · Dark Equalizer</span></div>
  </div>
</body>
</html>
