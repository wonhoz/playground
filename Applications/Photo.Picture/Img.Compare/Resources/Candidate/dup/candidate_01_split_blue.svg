<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="before" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="after" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Before 패널 -->
  <rect x="50" y="80" width="192" height="300" rx="12" fill="url(#before)"/>
  <!-- Before 풍경 -->
  <rect x="50" y="280" width="192" height="100" rx="0" fill="#263238"/>
  <ellipse cx="130" cy="250" rx="50" ry="50" fill="#455A64"/>
  <ellipse cx="190" cy="260" rx="40" ry="40" fill="#37474F"/>
  <!-- After 패널 -->
  <rect x="270" y="80" width="192" height="300" rx="12" fill="url(#after)"/>
  <!-- After 밝은 풍경 -->
  <rect x="270" y="280" width="192" height="100" rx="0" fill="#1565C0"/>
  <ellipse cx="350" cy="240" rx="55" ry="55" fill="#64B5F6"/>
  <ellipse cx="420" cy="255" rx="42" ry="42" fill="#42A5F5"/>
  <circle cx="420" cy="130" r="32" fill="#FFD54F"/>
  <!-- 중앙 구분선 -->
  <rect x="246" y="70" width="20" height="330" rx="10" fill="white"/>
  <!-- 화살표 핸들 -->
  <circle cx="256" cy="235" r="28" fill="white"/>
  <polygon points="244,235 228,220 228,250" fill="#1565C0"/>
  <polygon points="268,235 284,220 284,250" fill="#1565C0"/>
  <!-- 레이블 -->
  <text x="146" y="410" font-size="22" text-anchor="middle" fill="#B0BEC5" font-family="Segoe UI">BEFORE</text>
  <text x="366" y="410" font-size="22" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI">AFTER</text>
</svg>