<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0010"/>
      <stop offset="100%" stop-color="#200020"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f06292" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f06292" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#burst)"/>
  <!-- Burst rays -->
  <line x1="256" y1="256" x2="256" y2="60"  stroke="#f06292" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="256" y2="452" stroke="#f06292" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="60"  y2="256" stroke="#f06292" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="452" y2="256" stroke="#f06292" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="117" y2="117" stroke="#f06292" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="395" y2="117" stroke="#f06292" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="117" y2="395" stroke="#f06292" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="395" y2="395" stroke="#f06292" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <!-- Countdown number -->
  <circle cx="256" cy="256" r="100" fill="#1a0020" stroke="#f06292" stroke-width="4"/>
  <text x="256" y="300" font-family="sans-serif" font-size="100" fill="#f06292" text-anchor="middle" font-weight="bold" filter="url(#glow)">3</text>
  <!-- Ring progress -->
  <!-- circumference of r=120 = 754 -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#f06292" stroke-width="6"
          stroke-dasharray="565 189" stroke-dashoffset="0" opacity="0.8"
          transform="rotate(-90 256 256)" filter="url(#glow)"/>
  <!-- Countdown dots -->
  <circle cx="176" cy="420" r="12" fill="#f06292" filter="url(#glow)"/>
  <circle cx="216" cy="430" r="12" fill="#f06292" opacity="0.6"/>
  <circle cx="256" cy="434" r="12" fill="#880e4f" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="490" font-family="sans-serif" font-size="20" fill="#f06292" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.85">SNAP.DUEL</text>
</svg>
