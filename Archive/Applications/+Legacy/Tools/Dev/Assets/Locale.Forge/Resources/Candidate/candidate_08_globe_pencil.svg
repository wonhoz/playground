<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <radialGradient id="globe" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="220" cy="240" r="160" fill="url(#globe)" stroke="#90caf9" stroke-width="4"/>
  <!-- Globe lines -->
  <ellipse cx="220" cy="240" rx="160" ry="50" fill="none" stroke="#bbdefb" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="220" cy="240" rx="80" ry="160" fill="none" stroke="#bbdefb" stroke-width="2.5" opacity="0.5"/>
  <line x1="220" y1="80" x2="220" y2="400" stroke="#bbdefb" stroke-width="2.5" opacity="0.6"/>
  <line x1="60" y1="240" x2="380" y2="240" stroke="#bbdefb" stroke-width="2.5" opacity="0.6"/>
  <!-- Pencil overlaid -->
  <rect x="340" y="100" width="48" height="260" rx="10" fill="#ffd54f" stroke="#ffe082" stroke-width="3" transform="rotate(25, 364, 230)"/>
  <polygon points="354,344 394,332 374,372" fill="#ff7043" transform="rotate(25, 364, 355)"/>
  <rect x="340" y="96" width="48" height="22" rx="8" fill="#b0bec5" transform="rotate(25, 364, 107)"/>
  <line x1="364" y1="96" x2="364" y2="360" stroke="#ffca28" stroke-width="2" stroke-dasharray="10,8" opacity="0.4" transform="rotate(25, 364, 228)"/>
</svg>
