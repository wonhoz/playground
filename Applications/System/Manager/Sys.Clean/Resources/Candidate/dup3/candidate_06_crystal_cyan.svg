<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001520"/>
      <stop offset="100%" stop-color="#003344"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="50%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Crystal/diamond shape -->
  <polygon points="256,100 370,220 256,420 142,220" fill="url(#crystal)" opacity="0.9"/>
  <!-- Inner facets -->
  <polygon points="256,100 370,220 256,240" fill="#E0F7FA" opacity="0.3"/>
  <polygon points="256,100 256,240 142,220" fill="#B2EBF2" opacity="0.2"/>
  <polygon points="256,420 370,220 256,240" fill="#006064" opacity="0.4"/>
  <polygon points="256,420 256,240 142,220" fill="#004D40" opacity="0.3"/>
  <!-- Horizontal divider line -->
  <line x1="142" y1="220" x2="370" y2="220" stroke="#E0F7FA" stroke-width="2" opacity="0.6"/>
  <!-- Center lines -->
  <line x1="256" y1="100" x2="256" y2="420" stroke="#E0F7FA" stroke-width="1.5" opacity="0.3"/>
  <!-- Sparkle on crystal -->
  <g fill="white" opacity="0.9">
    <polygon points="256,135 259,148 272,148 262,156 266,169 256,161 246,169 250,156 240,148 253,148"/>
  </g>
  <!-- Clean bubbles -->
  <circle cx="190" cy="310" r="12" fill="none" stroke="#80DEEA" stroke-width="3" opacity="0.7"/>
  <circle cx="322" cy="310" r="10" fill="none" stroke="#80DEEA" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="340" r="8" fill="none" stroke="#80DEEA" stroke-width="2.5" opacity="0.7"/>
  <circle cx="175" cy="270" r="6" fill="none" stroke="#80DEEA" stroke-width="2" opacity="0.5"/>
  <circle cx="338" cy="275" r="6" fill="none" stroke="#80DEEA" stroke-width="2" opacity="0.5"/>
</svg>
