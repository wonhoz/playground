<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080300"/>
      <stop offset="100%" stop-color="#100500"/>
    </linearGradient>
    <linearGradient id="tower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Spiral tower levels (Babel) -->
  <!-- Level 1 (widest, bottom) -->
  <ellipse cx="256" cy="420" rx="140" ry="22" fill="#92400E" opacity="0.8"/>
  <rect x="116" y="398" width="280" height="30" fill="url(#tower)" rx="4"/>
  <text x="256" y="417" text-anchor="middle" font-family="monospace" font-size="10" fill="#FDE68A">Hello Hola Bonjour Hallo</text>
  <!-- Level 2 -->
  <ellipse cx="256" cy="370" rx="120" ry="18" fill="#B45309" opacity="0.7"/>
  <rect x="136" y="350" width="240" height="26" fill="#B45309" rx="4"/>
  <text x="256" y="367" text-anchor="middle" font-family="monospace" font-size="10" fill="#FEF3C7">こんにちは  안녕하세요</text>
  <!-- Level 3 -->
  <ellipse cx="256" cy="326" rx="100" ry="15" fill="#D97706" opacity="0.7"/>
  <rect x="156" y="308" width="200" height="24" fill="#D97706" rx="4"/>
  <text x="256" y="324" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a0800">Привет · Γεια · مرحبا</text>
  <!-- Level 4 -->
  <ellipse cx="256" cy="286" rx="80" ry="12" fill="#F59E0B" opacity="0.7"/>
  <rect x="176" y="270" width="160" height="22" fill="#F59E0B" rx="4"/>
  <text x="256" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a0800">नमस्ते · ОЮМ</text>
  <!-- Level 5 -->
  <ellipse cx="256" cy="250" rx="62" ry="10" fill="#FCD34D" opacity="0.7"/>
  <rect x="194" y="236" width="124" height="20" fill="#FCD34D" rx="4"/>
  <text x="256" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a0800">ก สวัสดี</text>
  <!-- Level 6 -->
  <ellipse cx="256" cy="218" rx="46" ry="8" fill="#FDE68A" opacity="0.7"/>
  <rect x="210" y="206" width="92" height="18" fill="#FDE68A" rx="4"/>
  <text x="256" y="219" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a0800">שָׁלוֹם</text>
  <!-- Level 7 (tip) -->
  <ellipse cx="256" cy="190" rx="30" ry="6" fill="#FEF3C7" opacity="0.7"/>
  <rect x="226" y="180" width="60" height="16" fill="#FEF3C7" rx="4"/>
  <text x="256" y="192" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a0800">語 · 字</text>
  <!-- Spire -->
  <polygon points="256,90 240,180 272,180" fill="#FEF3C7" opacity="0.6"/>
  <!-- Sky around tower -->
  <circle cx="130" cy="150" r="2" fill="#FDE68A" opacity="0.4"/>
  <circle cx="390" cy="120" r="2" fill="#F59E0B" opacity="0.4"/>
  <circle cx="420" cy="200" r="1.5" fill="#FDE68A" opacity="0.3"/>
  <circle cx="80" cy="220" r="1.5" fill="#F59E0B" opacity="0.3"/>
  <text x="256" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#F59E0B" opacity="0.6">BABEL SPIRAL</text>
</svg>
