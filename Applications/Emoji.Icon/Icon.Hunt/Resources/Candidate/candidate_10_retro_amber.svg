<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 레트로 TV 프레임 -->
  <rect x="70" y="80" width="372" height="280" rx="30" fill="#2C1810" stroke="url(#amber)" stroke-width="6"/>
  <rect x="90" y="100" width="332" height="240" rx="16" fill="#1A0F08"/>
  <!-- 화면 내 이모지 그리드 -->
  <text x="140" y="190" font-size="55" text-anchor="middle" font-family="Segoe UI Emoji">😀</text>
  <text x="256" y="190" font-size="55" text-anchor="middle" font-family="Segoe UI Emoji">😎</text>
  <text x="372" y="190" font-size="55" text-anchor="middle" font-family="Segoe UI Emoji">🤩</text>
  <text x="198" y="268" font-size="55" text-anchor="middle" font-family="Segoe UI Emoji">🔥</text>
  <text x="314" y="268" font-size="55" text-anchor="middle" font-family="Segoe UI Emoji">⭐</text>
  <!-- 스캔라인 효과 -->
  <rect x="90" y="100" width="332" height="240" rx="16" fill="none" stroke="#FFD54F" stroke-width="1" opacity="0.1"/>
  <!-- 하단 컨트롤 -->
  <rect x="70" y="380" width="372" height="80" rx="20" fill="#2C1810" stroke="url(#amber)" stroke-width="4"/>
  <circle cx="180" cy="420" r="22" fill="url(#amber)"/>
  <text x="180" y="428" font-size="22" text-anchor="middle" fill="#3E2723" font-family="sans-serif">🔎</text>
  <rect x="230" y="406" width="180" height="28" rx="14" fill="#1A0F08" stroke="#FFB300" stroke-width="2"/>
</svg>