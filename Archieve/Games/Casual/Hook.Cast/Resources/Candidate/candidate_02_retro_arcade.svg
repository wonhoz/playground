<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#4a0080"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines (retro) -->
  <line x1="0" y1="300" x2="512" y2="300" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="350" x2="512" y2="350" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="400" x2="512" y2="400" stroke="#ff00ff" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="300" x2="256" y2="500" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="300" x2="256" y2="500" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  <line x1="412" y1="300" x2="256" y2="500" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  <!-- Hook neon outline -->
  <path d="M200 80 L200 310 Q200 390 270 390 Q340 390 340 320 Q340 270 295 260" fill="none" stroke="url(#neon)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Neon point -->
  <circle cx="295" cy="258" r="12" fill="#00ffff" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="120" cy="100" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="380" cy="150" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="440" cy="80" r="4" fill="#ff00ff" opacity="0.7"/>
  <circle cx="80" cy="200" r="2" fill="#00ffff" opacity="0.7"/>
  <!-- CAST text -->
  <text x="256" y="470" font-family="monospace" font-size="52" font-weight="bold" fill="url(#neon)" text-anchor="middle" opacity="0.9">CAST</text>
</svg>
