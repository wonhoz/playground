<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
<!-- 컨셉: 앵커 고정 점 -->
<!-- 앵커 링 (상단) -->
<circle cx="512" cy="280" r="80" fill="none" stroke="#42A5F5" stroke-width="40"/>
<circle cx="512" cy="280" r="36" fill="#42A5F5"/>
<!-- 앵커 수직선 -->
<line x1="512" y1="360" x2="512" y2="640" stroke="#42A5F5" stroke-width="40" stroke-linecap="round"/>
<!-- 앵커 수평선 -->
<line x1="300" y1="480" x2="724" y2="480" stroke="#42A5F5" stroke-width="40" stroke-linecap="round"/>
<!-- 앵커 좌측 곡선 -->
<path d="M 300 480 Q 200 480 200 600 Q 200 720 340 760" fill="none" stroke="#42A5F5" stroke-width="40" stroke-linecap="round"/>
<!-- 앵커 우측 곡선 -->
<path d="M 724 480 Q 824 480 824 600 Q 824 720 684 760" fill="none" stroke="#42A5F5" stroke-width="40" stroke-linecap="round"/>
<!-- 앵커 끝 원점들 -->
<circle cx="340" cy="760" r="30" fill="#1565C0"/>
<circle cx="684" cy="760" r="30" fill="#1565C0"/>
<!-- 핀 / 고정 표시 -->
<circle cx="512" cy="760" r="24" fill="#42A5F5" opacity="0.5"/>
</svg>
