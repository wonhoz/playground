<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1d)"/>

  <!-- Layer 2: MD 렌더링 문서 미리보기 (레이어드) -->
  <!-- 문서 창 -->
  <rect x="155" y="195" width="714" height="590" rx="18" fill="#181825"/>
  <rect x="155" y="195" width="714" height="590" rx="18" fill="none" stroke="#313244" stroke-width="4"/>

  <!-- 창 상단 -->
  <rect x="155" y="195" width="714" height="44" rx="18" fill="#1E1E2E"/>
  <rect x="155" y="219" width="714" height="20" fill="#1E1E2E"/>
  <circle cx="196" cy="218" r="8" fill="#FF5F57"/>
  <circle cx="222" cy="218" r="8" fill="#FFBD2E"/>
  <circle cx="248" cy="218" r="8" fill="#28CA42"/>
  <text x="520" y="225" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#585B70">README.md</text>

  <!-- H1 제목 -->
  <text x="194" y="292" font-family="Segoe UI,sans-serif" font-size="30" font-weight="700" fill="#89B4FA">Mark.View</text>
  <line x1="194" y1="300" x2="828" y2="300" stroke="#3A3A4D" stroke-width="2"/>

  <!-- H2 -->
  <text x="194" y="338" font-family="Segoe UI,sans-serif" font-size="22" font-weight="600" fill="#CBA6F7">Features</text>
  <line x1="194" y1="344" x2="600" y2="344" stroke="#3A3A4D" stroke-width="1"/>

  <!-- 본문 텍스트 -->
  <text x="194" y="374" font-family="Segoe UI,sans-serif" font-size="16" fill="#CDD6F4">A fast Markdown viewer with multiple themes.</text>

  <!-- 코드블록 -->
  <rect x="194" y="390" width="600" height="70" rx="8" fill="#181825" stroke="#3A3A4D" stroke-width="2"/>
  <text x="214" y="416" font-family="Consolas,monospace" font-size="16" fill="#FAB387">var</text>
  <text x="246" y="416" font-family="Consolas,monospace" font-size="16" fill="#CDD6F4"> html = renderer.</text>
  <text x="460" y="416" font-family="Consolas,monospace" font-size="16" fill="#A6E3A1">Render</text>
  <text x="534" y="416" font-family="Consolas,monospace" font-size="16" fill="#CDD6F4">(md);</text>
  <text x="214" y="446" font-family="Consolas,monospace" font-size="16" fill="#6C7086">// 6 themes supported</text>

  <!-- 리스트 -->
  <circle cx="204" cy="486" r="5" fill="#89B4FA"/>
  <text x="220" y="492" font-family="Segoe UI,sans-serif" font-size="16" fill="#CDD6F4">Dark · GitHub · Nord</text>
  <circle cx="204" cy="516" r="5" fill="#89B4FA"/>
  <text x="220" y="522" font-family="Segoe UI,sans-serif" font-size="16" fill="#CDD6F4">Dracula · Sepia · Light</text>

  <!-- 인용구 -->
  <rect x="194" y="540" width="8" height="50" rx="4" fill="#89B4FA"/>
  <text x="214" y="560" font-family="Segoe UI,sans-serif" font-size="15" fill="#888AA8">Live preview &amp; theme switch</text>
  <text x="214" y="582" font-family="Segoe UI,sans-serif" font-size="15" fill="#888AA8">while reading documents.</text>

  <!-- Layer 3: 테마 스와치 힌트 (하단) -->
  <rect x="194" y="610" width="80" height="22" rx="6" fill="#1E1E2E" stroke="#CBA6F7" stroke-width="2"/>
  <text x="234" y="625" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#CBA6F7">Dark</text>
  <rect x="284" y="610" width="80" height="22" rx="6" fill="#0d1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="324" y="625" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#58A6FF">GitHub</text>
  <rect x="374" y="610" width="80" height="22" rx="6" fill="#2e3440" stroke="#88C0D0" stroke-width="2"/>
  <text x="414" y="625" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#88C0D0">Nord</text>
  <rect x="464" y="610" width="80" height="22" rx="6" fill="#282a36" stroke="#FF79C6" stroke-width="2"/>
  <text x="504" y="625" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#FF79C6">Dracula</text>
  <rect x="554" y="610" width="80" height="22" rx="6" fill="#f4ecd8" stroke="#7C4B00" stroke-width="2"/>
  <text x="594" y="625" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#7C4B00">Sepia</text>
</svg>
