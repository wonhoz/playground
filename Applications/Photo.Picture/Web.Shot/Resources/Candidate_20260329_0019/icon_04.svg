<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | URL 주소 → 이미지 변환 흐름 — 디지털 현상 은유 | 기하학 추상 | 보라+노랑+파랑 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#4A148C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Input: URL pill -->
  <rect x="80" y="350" width="360" height="100" rx="50" fill="#4527A0" filter="url(#sh4)"/>
  <text x="260" y="388" font-family="Consolas, monospace" font-size="20" fill="#CE93D8"
        text-anchor="middle">https://</text>
  <text x="260" y="416" font-family="Consolas, monospace" font-size="22" fill="white"
        text-anchor="middle">example.com</text>

  <!-- Processing: chain of gears -->
  <!-- Gear 1 -->
  <circle cx="520" cy="400" r="60" fill="#7B1FA2" filter="url(#sh4)"/>
  <circle cx="520" cy="400" r="44" fill="#9C27B0"/>
  <circle cx="520" cy="400" r="20" fill="#CE93D8"/>
  <!-- Gear teeth (simplified) -->
  <rect x="506" y="336" width="28" height="20" rx="6" fill="#7B1FA2"/>
  <rect x="506" y="444" width="28" height="20" rx="6" fill="#7B1FA2"/>
  <rect x="456" y="386" width="20" height="28" rx="6" fill="#7B1FA2"/>
  <rect x="564" y="386" width="20" height="28" rx="6" fill="#7B1FA2"/>
  <!-- Text inside gear -->
  <text x="520" y="400" font-family="Arial, sans-serif" font-size="20" fill="#4527A0"
        text-anchor="middle" dominant-baseline="middle">CDP</text>

  <!-- Arrow from URL to gear -->
  <line x1="440" y1="400" x2="460" y2="400" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
  <polygon points="460,380 500,400 460,420" fill="#FFD740"/>

  <!-- Arrow from gear to output -->
  <line x1="580" y1="400" x2="600" y2="400" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
  <polygon points="600,380 640,400 600,420" fill="#FFD740"/>

  <!-- Output: PNG image card -->
  <rect x="640" y="280" width="320" height="260" rx="18" fill="#1565C0" filter="url(#sh4)"/>
  <polygon points="904,280 960,336 904,336" fill="#90CAF9"/>
  <!-- Image content inside -->
  <rect x="660" y="360" width="280" height="16" rx="6" fill="white" opacity="0.5"/>
  <rect x="660" y="388" width="280" height="80" rx="8" fill="#90CAF9" opacity="0.4"/>
  <rect x="660" y="480" width="240" height="12" rx="5" fill="white" opacity="0.4"/>
  <rect x="660" y="502" width="260" height="12" rx="5" fill="white" opacity="0.3"/>
  <!-- PNG badge -->
  <rect x="660" y="292" width="80" height="30" rx="8" fill="#FF6F00"/>
  <text x="700" y="307" font-family="Arial Black, sans-serif" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">PNG</text>

  <!-- PDF output (slightly offset) -->
  <rect x="680" y="580" width="260" height="200" rx="18" fill="#C62828" filter="url(#sh4)" opacity="0.9"/>
  <polygon points="888,580 940,632 888,632" fill="#EF9A9A"/>
  <rect x="698" y="646" width="220" height="12" rx="5" fill="white" opacity="0.5"/>
  <rect x="698" y="670" width="200" height="12" rx="5" fill="white" opacity="0.4"/>
  <rect x="698" y="694" width="220" height="12" rx="5" fill="white" opacity="0.5"/>
  <!-- PDF badge -->
  <rect x="698" y="592" width="70" height="30" rx="8" fill="#FF6F00"/>
  <text x="733" y="607" font-family="Arial Black, sans-serif" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">PDF</text>

  <!-- Arrow to PDF -->
  <path d="M800,540 Q820,560 800,580" fill="none" stroke="#FFD740" stroke-width="10" stroke-linecap="round"/>
  <polygon points="796,580 810,610 784,610" fill="#FFD740"/>

  <!-- Batch indicator -->
  <rect x="80" y="600" width="350" height="120" rx="18" fill="white" filter="url(#sh4)" opacity="0.9"/>
  <text x="255" y="634" font-family="Arial Black, sans-serif" font-size="22" fill="#4527A0"
        text-anchor="middle">배치 처리</text>
  <text x="255" y="660" font-family="Consolas, monospace" font-size="17" fill="#7B1FA2"
        text-anchor="middle">URL × 50</text>
  <text x="255" y="690" font-family="Arial, sans-serif" font-size="17" fill="#546E7A"
        text-anchor="middle">→ PNG × 50</text>
</svg>
