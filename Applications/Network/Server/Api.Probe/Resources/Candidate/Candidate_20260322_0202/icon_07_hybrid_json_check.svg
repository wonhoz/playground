<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 골든/앰버 -->
  <rect width="1024" height="1024" rx="180" fill="#1C1206"/>
  <rect x="24" y="24" width="976" height="976" rx="160" fill="#2D1E08"/>

  <!-- 거대한 JSON 중괄호 배경 -->
  <text x="130" y="700" font-family="'Courier New', monospace" font-size="700" fill="#3D2A0A" opacity="0.5" dominant-baseline="middle">{</text>
  <text x="620" y="700" font-family="'Courier New', monospace" font-size="700" fill="#3D2A0A" opacity="0.5" dominant-baseline="middle">}</text>

  <!-- JSON 콘텐츠 (중앙) -->
  <text x="512" y="280" font-family="'Courier New', monospace" font-size="32" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">{</text>
  <text x="512" y="330" font-family="'Courier New', monospace" font-size="26" fill="#FCD34D" text-anchor="middle" dominant-baseline="middle">"method": <tspan fill="#F87171">"GET"</tspan>,</text>
  <text x="512" y="375" font-family="'Courier New', monospace" font-size="26" fill="#FCD34D" text-anchor="middle" dominant-baseline="middle">"url": <tspan fill="#86EFAC">"/api/check"</tspan>,</text>
  <text x="512" y="420" font-family="'Courier New', monospace" font-size="26" fill="#FCD34D" text-anchor="middle" dominant-baseline="middle">"status": <tspan fill="#4ADE80">200</tspan>,</text>
  <text x="512" y="465" font-family="'Courier New', monospace" font-size="26" fill="#FCD34D" text-anchor="middle" dominant-baseline="middle">"ok": <tspan fill="#67E8F9">true</tspan></text>
  <text x="512" y="510" font-family="'Courier New', monospace" font-size="32" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">}</text>

  <!-- 거대 체크마크 오버레이 -->
  <circle cx="512" cy="680" r="170" fill="#78350F" opacity="0.9"/>
  <circle cx="512" cy="680" r="160" fill="#92400E"/>
  <polyline points="418,682 484,750 614,612" stroke="#FCD34D" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 200 OK 배지 (체크 위) -->
  <rect x="382" y="780" width="260" height="56" rx="12" fill="#78350F"/>
  <rect x="386" y="784" width="252" height="48" rx="10" fill="#F59E0B"/>
  <text x="512" y="808" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="900" fill="#1C1206" text-anchor="middle" dominant-baseline="middle">200 OK</text>

  <!-- 상단 타이틀 -->
  <text x="512" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">Api</text>
  <text x="512" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#D97706" text-anchor="middle" dominant-baseline="middle">Probe</text>

  <!-- 상태 코드들 (하단 좌우) -->
  <text x="120" y="900" font-family="'Courier New', monospace" font-size="30" fill="#EF4444" opacity="0.7">404</text>
  <text x="860" y="900" font-family="'Courier New', monospace" font-size="30" fill="#EF4444" opacity="0.7">500</text>
  <text x="250" y="930" font-family="'Courier New', monospace" font-size="24" fill="#6B7280" opacity="0.5">NOT FOUND</text>
  <text x="770" y="930" font-family="'Courier New', monospace" font-size="24" fill="#6B7280" opacity="0.5">ERROR</text>
</svg>
