<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Radar scan circular sweep -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030005"/>
  <!-- Radar rings -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#00695C" stroke-width="6" opacity="0.5"/>
  <circle cx="512" cy="512" r="270" fill="none" stroke="#00695C" stroke-width="5" opacity="0.4"/>
  <circle cx="512" cy="512" r="180" fill="none" stroke="#00695C" stroke-width="4" opacity="0.4"/>
  <circle cx="512" cy="512" r="90" fill="none" stroke="#00695C" stroke-width="4" opacity="0.4"/>
  <!-- Crosshair lines -->
  <line x1="152" y1="512" x2="872" y2="512" stroke="#004D40" stroke-width="3" opacity="0.4"/>
  <line x1="512" y1="152" x2="512" y2="872" stroke="#004D40" stroke-width="3" opacity="0.4"/>
  <!-- Radar sweep sector (wedge) -->
  <path d="M 512,512 L 872,512 A 360 360 0 0 0 620,186 Z" fill="#00695C" opacity="0.15"/>
  <line x1="512" y1="512" x2="872" y2="512" stroke="#26A69A" stroke-width="5" opacity="0.9"/>
  <line x1="512" y1="512" x2="620" y2="186" stroke="#26A69A" stroke-width="4" opacity="0.6"/>
  <!-- Sweep glow edge -->
  <line x1="512" y1="512" x2="872" y2="512" stroke="#80CBC4" stroke-width="3" opacity="0.7"/>
  <!-- Target blips -->
  <circle cx="680" cy="320" r="14" fill="#80CBC4" opacity="0.9"/>
  <circle cx="680" cy="320" r="22" fill="none" stroke="#26A69A" stroke-width="4" opacity="0.6"/>
  <circle cx="320" cy="660" r="10" fill="#00897B" opacity="0.7"/>
  <circle cx="320" cy="660" r="18" fill="none" stroke="#00695C" stroke-width="3" opacity="0.5"/>
  <circle cx="760" cy="600" r="8" fill="#00897B" opacity="0.6"/>
  <circle cx="400" cy="280" r="7" fill="#00695C" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="12" fill="#26A69A"/>
  <circle cx="512" cy="512" r="6" fill="#80CBC4"/>
</svg>
