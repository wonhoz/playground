    <line x1="430" y1="358" x2="300" y2="500" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>
    <!-- 루트 → 하 -->
    <line x1="512" y1="358" x2="512" y2="500" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>
    <!-- 루트 → 우하1 -->
    <line x1="594" y1="358" x2="724" y2="500" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>

    <!-- 하위 박스들 (Level 2) -->
    <rect x="210" y="500" width="180" height="90" rx="14" fill="#1A0A00"/>
    <rect x="222" y="512" width="156" height="66" rx="10" fill="#2C1000"/>
    <circle cx="276" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="300" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="324" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>

    <rect x="422" y="500" width="180" height="90" rx="14" fill="#1A0A00"/>
    <rect x="434" y="512" width="156" height="66" rx="10" fill="#2C1000"/>
    <circle cx="488" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="512" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="536" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>

    <rect x="634" y="500" width="180" height="90" rx="14" fill="#1A0A00"/>
    <rect x="646" y="512" width="156" height="66" rx="10" fill="#2C1000"/>
    <circle cx="700" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="724" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="748" cy="545" r="9" fill="#FFFFFF" opacity="0.55"/>

    <!-- Level 2 → Level 3 -->
    <line x1="300" y1="590" x2="270" y2="690" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.75"/>
    <line x1="300" y1="590" x2="360" y2="690" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.75"/>
    <line x1="512" y1="590" x2="480" y2="690" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.75"/>
    <line x1="512" y1="590" x2="544" y2="690" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.75"/>
    <line x1="724" y1="590" x2="724" y2="690" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.75"/>

    <!-- Level 3 박스들 (작음) -->
    <rect x="228" y="690" width="84" height="54" rx="10" fill="#1A0A00" opacity="0.9"/>
    <rect x="326" y="690" width="84" height="54" rx="10" fill="#1A0A00" opacity="0.9"/>
    <rect x="438" y="690" width="84" height="54" rx="10" fill="#1A0A00" opacity="0.9"/>
    <rect x="502" y="690" width="84" height="54" rx="10" fill="#1A0A00" opacity="0.9"/>
    <rect x="682" y="690" width="84" height="54" rx="10" fill="#1A0A00" opacity="0.9"/>
