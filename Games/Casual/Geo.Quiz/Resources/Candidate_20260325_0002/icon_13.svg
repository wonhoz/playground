<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="white"/>
  <rect width="1024" height="1024" rx="190" fill="none" stroke="#1565C0" stroke-width="20"/>
  <!-- Layer 2: 퀴즈 카드 -->
  <rect x="222" y="200" width="580" height="580" rx="30" fill="white" stroke="#90CAF9" stroke-width="8"/>
  <!-- 카드 그림자 -->
  <rect x="238" y="216" width="580" height="580" rx="30" fill="#90CAF9" opacity="0.3"/>
  <rect x="222" y="200" width="580" height="580" rx="30" fill="white" stroke="#1565C0" stroke-width="6"/>
  <!-- 국기 영역 (상단) -->
  <rect x="262" y="240" width="500" height="260" rx="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="4"/>
  <!-- 단순 국기 (3색 가로 줄무늬) -->
  <rect x="262" y="240" width="500" height="87" rx="0" fill="#1565C0"/>
  <rect x="262" y="327" width="500" height="86" fill="white"/>
  <rect x="262" y="413" width="500" height="87" fill="#C62828"/>
  <!-- 국기 라운드 모서리 클립 -->
  <rect x="262" y="240" width="500" height="260" rx="12" fill="none" stroke="#E0E0E0" stroke-width="4"/>
  <!-- 물음표 영역 (하단) -->
  <text x="512" y="680" text-anchor="middle" font-family="Arial Black" font-size="200" font-weight="900" fill="#1565C0">?</text>
  <!-- Layer 3: 카드 장식 -->
  <rect x="262" y="525" width="500" height="5" fill="#E3F2FD"/>
</svg>