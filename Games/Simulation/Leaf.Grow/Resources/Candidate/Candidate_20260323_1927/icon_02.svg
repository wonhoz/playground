<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_lg02" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
