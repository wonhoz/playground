<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel art plane (each rect = 1 pixel block, scale 16px) -->
  <!-- Centered at ~256,220, each block 16x16 -->
  <!-- Row layout (pixel grid): fuselage, wings, tail, cockpit -->
  <!-- Fuselage center column -->
  <rect x="248" y="144" width="16" height="16" fill="#ff6d00"/> <!-- nose -->
  <rect x="248" y="160" width="16" height="16" fill="#ff6d00"/>
  <rect x="248" y="176" width="16" height="16" fill="#ff8f00"/> <!-- cockpit -->
  <rect x="248" y="192" width="16" height="16" fill="#ff6d00"/>
  <rect x="248" y="208" width="16" height="16" fill="#ff6d00"/>
  <rect x="248" y="224" width="16" height="16" fill="#e65100"/> <!-- body -->
  <rect x="248" y="240" width="16" height="16" fill="#e65100"/>
  <rect x="248" y="256" width="16" height="16" fill="#bf360c"/> <!-- tail -->
  <!-- Wings row (y=208) -->
  <rect x="184" y="208" width="16" height="16" fill="#ff8f00" opacity="0.9"/>
  <rect x="200" y="208" width="16" height="16" fill="#ff8f00"/>
  <rect x="216" y="208" width="16" height="16" fill="#ff8f00"/>
  <rect x="232" y="208" width="16" height="16" fill="#ff8f00"/>
  <!-- right wing -->
  <rect x="264" y="208" width="16" height="16" fill="#ff8f00"/>
  <rect x="280" y="208" width="16" height="16" fill="#ff8f00"/>
  <rect x="296" y="208" width="16" height="16" fill="#ff8f00"/>
  <rect x="312" y="208" width="16" height="16" fill="#ff8f00" opacity="0.9"/>
  <!-- Wing row 2 (y=224) smaller -->
  <rect x="216" y="224" width="16" height="16" fill="#ff6d00" opacity="0.85"/>
  <rect x="232" y="224" width="16" height="16" fill="#ff6d00"/>
  <rect x="264" y="224" width="16" height="16" fill="#ff6d00"/>
  <rect x="280" y="224" width="16" height="16" fill="#ff6d00" opacity="0.85"/>
  <!-- Tail fins (y=256) -->
  <rect x="232" y="256" width="16" height="16" fill="#bf360c"/>
  <rect x="264" y="256" width="16" height="16" fill="#bf360c"/>
  <!-- Cockpit highlight -->
  <rect x="252" y="179" width="8" height="8" fill="#fff9c4" opacity="0.9"/>
  <!-- Engine exhaust pixels -->
  <rect x="248" y="272" width="16" height="16" fill="#ff6d00" opacity="0.7"/>
  <rect x="248" y="288" width="16" height="16" fill="#ff8f00" opacity="0.5"/>
  <rect x="248" y="304" width="16" height="16" fill="#ffd600" opacity="0.35"/>
  <rect x="248" y="320" width="16" height="16" fill="#ffd600" opacity="0.18"/>
  <!-- Stars pixels -->
  <rect x="96"  y="96"  width="8" height="8" fill="white" opacity="0.7"/>
  <rect x="400" y="80"  width="8" height="8" fill="white" opacity="0.7"/>
  <rect x="144" y="352" width="8" height="8" fill="white" opacity="0.5"/>
  <rect x="368" y="368" width="8" height="8" fill="white" opacity="0.5"/>
  <!-- Title pixel text -->
  <text x="256" y="455" font-family="monospace" font-size="22" fill="#ff8f00" text-anchor="middle" letter-spacing="4" opacity="0.9">SKY.DRIFT</text>
</svg>
