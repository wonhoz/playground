<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 광합성: 태양 → 잎 -->
  <!-- sun (top-left area) -->
  <circle cx="310" cy="310" r="90" fill="#66BB6A" opacity="0.9"/>
  <!-- sun rays -->
  <g stroke="#66BB6A" stroke-width="8" stroke-linecap="round" opacity="0.6">
    <line x1="310" y1="190" x2="310" y2="160"/>
    <line x1="404" y1="216" x2="422" y2="194"/>
    <line x1="434" y1="310" x2="464" y2="310"/>
    <line x1="404" y1="404" x2="422" y2="426"/>
    <line x1="216" y1="404" x2="198" y2="426"/>
    <line x1="186" y1="310" x2="156" y2="310"/>
    <line x1="216" y1="216" x2="198" y2="194"/>
  </g>
  <!-- arrow from sun to leaf -->
  <path d="M420 380 Q512 430 540 500" fill="none" stroke="#66BB6A" stroke-width="10" stroke-linecap="round" stroke-dasharray="16 10" opacity="0.7"/>
  <polygon points="530,510 558,490 556,524" fill="#66BB6A" opacity="0.7"/>
  <!-- large leaf (bottom-right) -->
  <path d="M560 520 Q700 440 730 580 Q660 660 560 640 Q470 660 430 580 Q460 440 560 520Z" fill="#2E7D32"/>
  <!-- midrib -->
  <line x1="560" y1="520" x2="560" y2="650" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <!-- veins -->
  <line x1="560" y1="560" x2="620" y2="590" stroke="#66BB6A" stroke-width="4" opacity="0.7"/>
  <line x1="560" y1="595" x2="610" y2="620" stroke="#66BB6A" stroke-width="4" opacity="0.7"/>
  <line x1="560" y1="560" x2="500" y2="590" stroke="#66BB6A" stroke-width="4" opacity="0.7"/>
  <line x1="560" y1="595" x2="510" y2="620" stroke="#66BB6A" stroke-width="4" opacity="0.7"/>
  <!-- stem -->
  <line x1="560" y1="650" x2="560" y2="760" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
</svg>
