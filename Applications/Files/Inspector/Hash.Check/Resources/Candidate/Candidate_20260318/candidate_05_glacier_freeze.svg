<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#061410"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="iceGrad1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="iceGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a1e"/>
      <stop offset="100%" stop-color="#030508"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iceglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ocean water -->
  <rect x="0" y="310" width="512" height="202" fill="url(#seaGrad)"/>
  <!-- Water surface line -->
  <path d="M0,310 Q64,300 128,310 Q192,320 256,310 Q320,300 384,310 Q448,320 512,310" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M0,318 Q80,308 160,318 Q240,328 320,318 Q400,308 480,318" fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Underwater portion (hash data frozen) -->
  <!-- Large submerged glacier mass -->
  <polygon points="140,310 120,370 100,400 120,430 180,460 256,470 332,460 392,430 412,400 392,370 372,310"
    fill="#051a12" fill-opacity="0.7" stroke="#10B981" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Hash lines frozen in ice (underwater) -->
  <line x1="160" y1="340" x2="350" y2="340" stroke="#10B981" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="150" y1="360" x2="360" y2="360" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="145" y1="380" x2="365" y2="380" stroke="#10B981" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="155" y1="400" x2="355" y2="400" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="170" y1="420" x2="340" y2="420" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.15"/>
  <line x1="200" y1="440" x2="312" y2="440" stroke="#34D399" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Above-water glacier peaks -->
  <!-- Main peak -->
  <polygon points="256,55 310,180 360,310 256,280 152,310 202,180" fill="url(#iceGrad1)" stroke="#6EE7B7" stroke-width="2" stroke-opacity="0.7" filter="url(#glow)"/>
  <!-- Secondary left peak -->
  <polygon points="160,120 190,220 240,310 160,295 100,310 130,220" fill="url(#iceGrad2)" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Secondary right peak -->
  <polygon points="352,110 382,215 420,310 352,300 290,310 320,215" fill="url(#iceGrad2)" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Ice facets (crystalline structure = immutable hash) -->
  <line x1="256" y1="55" x2="310" y2="180" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="256" y1="55" x2="202" y2="180" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="256" y1="140" x2="310" y2="180" stroke="#34D399" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="256" y1="140" x2="202" y2="180" stroke="#34D399" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="256" y1="55" x2="256" y2="280" stroke="#6EE7B7" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Lock icon on glacier (immutability) -->
  <rect x="232" y="175" width="48" height="38" rx="5" fill="#061a12" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
  <path d="M244,175 L244,163 A12,12 0 0,1 268,163 L268,175" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="256" cy="194" r="6" fill="#10B981"/>
  <line x1="256" y1="200" x2="256" y2="207" stroke="#10B981" stroke-width="2.5"/>

  <!-- Snowflakes / frost crystals -->
  <g fill="none" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.5">
    <line x1="80" y1="100" x2="80" y2="130"/>
    <line x1="65" y1="115" x2="95" y2="115"/>
    <line x1="68" y1="103" x2="92" y2="127"/>
    <line x1="92" y1="103" x2="68" y2="127"/>
  </g>
  <g fill="none" stroke="#34D399" stroke-width="1.2" stroke-opacity="0.4">
    <line x1="430" y1="130" x2="430" y2="155"/>
    <line x1="417.5" y1="142.5" x2="442.5" y2="142.5"/>
    <line x1="420" y1="133" x2="440" y2="153"/>
    <line x1="440" y1="133" x2="420" y2="153"/>
  </g>
</svg>
