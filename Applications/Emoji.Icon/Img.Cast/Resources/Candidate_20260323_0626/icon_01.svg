<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 마법 지팡이 변환 | 실루엣/캐릭터 | #0A0A14 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A0A14"/>
  <!-- Layer 2: Wand with transformation sparkle -->
  <!-- Wand body -->
  <line x1="320" y1="760" x2="640" y2="380" stroke="#C084FC" stroke-width="22" stroke-linecap="round"/>
  <!-- Wand tip glow -->
  <circle cx="640" cy="380" r="36" fill="#F0ABFC" opacity="0.4"/>
  <circle cx="640" cy="380" r="22" fill="#F0ABFC" opacity="0.8"/>
  <!-- Transformation: PNG → ICO arrow with formats -->
  <!-- Source: PNG box -->
  <rect x="180" y="260" width="130" height="90" rx="12" fill="#1E3A5F" stroke="#3B82F6" stroke-width="3"/>
  <text x="245" y="314" font-family="Arial,sans-serif" font-size="28" fill="#60A5FA" text-anchor="middle" font-weight="bold">PNG</text>
  <!-- Arrow -->
  <line x1="320" y1="305" x2="420" y2="305" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
  <polygon points="420,292 445,305 420,318" fill="#A78BFA"/>
  <!-- Result: ICO box -->
  <rect x="450" y="260" width="130" height="90" rx="12" fill="#1E3A1E" stroke="#4ADE80" stroke-width="3"/>
  <text x="515" y="314" font-family="Arial,sans-serif" font-size="28" fill="#4ADE80" text-anchor="middle" font-weight="bold">ICO</text>
  <!-- Layer 3: Sparkles around wand tip -->
  <circle cx="700" cy="320" r="8" fill="#FCD34D"/>
  <circle cx="740" cy="370" r="6" fill="#F0ABFC"/>
  <circle cx="690" cy="430" r="7" fill="#4ADE80"/>
  <line x1="700" y1="300" x2="700" y2="340" stroke="#FCD34D" stroke-width="2"/>
  <line x1="680" y1="320" x2="720" y2="320" stroke="#FCD34D" stroke-width="2"/>
  <line x1="726" y1="346" x2="754" y2="394" stroke="#F0ABFC" stroke-width="2"/>
</svg>
