<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="100%" stop-color="#00001a"/>
    </linearGradient>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="o" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="y" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="v" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input: white hex data beam -->
  <line x1="60" y1="256" x2="200" y2="256" stroke="white" stroke-width="6" opacity="0.8"/>
  <!-- Hex labels on input beam -->
  <text x="80" y="248" font-family="monospace" font-size="9" fill="#E0E0E0" opacity="0.5">FF</text>
  <text x="110" y="248" font-family="monospace" font-size="9" fill="#E0E0E0" opacity="0.5">4A</text>
  <text x="140" y="248" font-family="monospace" font-size="9" fill="#E0E0E0" opacity="0.5">B2</text>
  <!-- Prism triangle -->
  <polygon points="200,150 200,362 310,256" fill="#0a0a20" stroke="#6366F1" stroke-width="2.5"/>
  <!-- Prism sheen -->
  <line x1="200" y1="150" x2="310" y2="256" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Dispersed rays (rainbow) -->
  <line x1="310" y1="256" x2="452" y2="170" stroke="url(#v)" stroke-width="7"/>
  <line x1="310" y1="256" x2="452" y2="198" stroke="url(#b)" stroke-width="7"/>
  <line x1="310" y1="256" x2="452" y2="226" stroke="url(#g)" stroke-width="7"/>
  <line x1="310" y1="256" x2="452" y2="254" stroke="url(#y)" stroke-width="7"/>
  <line x1="310" y1="256" x2="452" y2="282" stroke="url(#o)" stroke-width="7"/>
  <line x1="310" y1="256" x2="452" y2="310" stroke="url(#r)" stroke-width="7"/>
  <!-- Hex labels on output rays -->
  <text x="400" y="166" font-family="monospace" font-size="8" fill="#8B5CF6" opacity="0.8">F0 hex</text>
  <text x="400" y="194" font-family="monospace" font-size="8" fill="#3B82F6" opacity="0.8">C2 int</text>
  <text x="400" y="222" font-family="monospace" font-size="8" fill="#22C55E" opacity="0.8">4B bit</text>
  <text x="400" y="250" font-family="monospace" font-size="8" fill="#EAB308" opacity="0.8">88 chr</text>
  <text x="400" y="278" font-family="monospace" font-size="8" fill="#F97316" opacity="0.8">3F flt</text>
  <text x="400" y="306" font-family="monospace" font-size="8" fill="#EF4444" opacity="0.8">A0 str</text>
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="12" fill="#6366F1" opacity="0.7">PRISM DECODE</text>
</svg>
