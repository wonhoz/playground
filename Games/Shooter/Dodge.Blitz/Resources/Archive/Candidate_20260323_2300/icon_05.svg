<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
    <linearGradient id="shield05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <filter id="impact05">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <g clip-path="url(#clip05)">
    <!-- Layer 2: 방패 메인 -->
    <path d="M 512 180 L 760 280 L 760 520 Q 760 700 512 820 Q 264 700 264 520 L 264 280 Z" fill="url(#shield05)"/>
    <!-- 방패 테두리 -->
    <path d="M 512 180 L 760 280 L 760 520 Q 760 700 512 820 Q 264 700 264 520 L 264 280 Z" fill="none" stroke="#FFFFFF" stroke-width="16"/>
    <!-- 방패 중앙 크로스 -->
    <rect x="490" y="310" width="44" height="340" rx="8" fill="#065F46"/>
    <rect x="350" y="450" width="324" height="44" rx="8" fill="#065F46"/>
    <!-- 방패 광택 -->
    <path d="M 370 250 Q 512 210 660 260 L 640 300 Q 512 260 384 290 Z" fill="#FFFFFF" opacity="0.3"/>

    <!-- Layer 3: 총알 충돌 이펙트 -->
    <!-- 메인 총알 충돌 (방패 오른쪽 중앙) -->
    <g filter="url(#impact05)">
      <!-- 충돌 화염 -->
      <circle cx="760" cy="460" r="60" fill="#FDE68A" opacity="0.9"/>
      <circle cx="760" cy="460" r="40" fill="#FFFFFF" opacity="0.8"/>
    </g>
    <!-- 파편 파티클들 -->
    <ellipse cx="810" cy="400" rx="8" ry="18" fill="#FDE68A" transform="rotate(-45 810 400)"/>
    <ellipse cx="840" cy="460" rx="8" ry="18" fill="#FDE68A" transform="rotate(0 840 460)"/>
    <ellipse cx="810" cy="520" rx="8" ry="18" fill="#FDE68A" transform="rotate(45 810 520)"/>
    <ellipse cx="850" cy="380" rx="6" ry="14" fill="#FFFFFF" transform="rotate(-60 850 380)"/>
    <ellipse cx="870" cy="480" rx="6" ry="14" fill="#FFFFFF" transform="rotate(10 870 480)"/>
    <ellipse cx="840" cy="560" rx="6" ry="14" fill="#FFFFFF" transform="rotate(50 840 560)"/>
    <!-- 충돌 스파크 선들 -->
    <line x1="760" y1="460" x2="860" y2="380" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
    <line x1="760" y1="460" x2="900" y2="460" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
    <line x1="760" y1="460" x2="860" y2="540" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
    <!-- 작은 총알들 다가오는 중 -->
    <ellipse cx="900" cy="350" rx="10" ry="18" fill="#A7F3D0" opacity="0.8" transform="rotate(30 900 350)"/>
    <ellipse cx="930" cy="500" rx="10" ry="18" fill="#A7F3D0" opacity="0.6" transform="rotate(-10 930 500)"/>
  </g>
</svg>
