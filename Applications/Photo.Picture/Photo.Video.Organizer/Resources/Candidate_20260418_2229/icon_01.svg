<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background sky blue -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: Calendar/folder structure -->
  <!-- Main folder -->
  <path d="M180 380 L180 760 L844 760 L844 380 L500 380 L470 320 L180 320 Z" fill="#FF8F00" opacity="0.9"/>
  <rect x="180" y="380" width="664" height="380" rx="0" fill="#FFCC02" opacity="0.85"/>
  <!-- Calendar grid inside folder -->
  <rect x="220" y="420" width="584" height="300" rx="12" fill="#FFFFFF" opacity="0.9"/>
  <!-- Month header -->
  <rect x="220" y="420" width="584" height="60" rx="12" fill="#1565C0"/>
  <text x="512" y="463" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">2026 / 04</text>
  <!-- Date cells 3x3 grid -->
  <rect x="240" y="500" width="80" height="60" rx="8" fill="#BBDEFB"/>
  <text x="280" y="540" font-family="Arial, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">12</text>
  <rect x="340" y="500" width="80" height="60" rx="8" fill="#BBDEFB"/>
  <text x="380" y="540" font-family="Arial, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">13</text>
  <rect x="440" y="500" width="80" height="60" rx="8" fill="#BBDEFB"/>
  <text x="480" y="540" font-family="Arial, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">14</text>
  <rect x="540" y="500" width="80" height="60" rx="8" fill="#1565C0"/>
  <text x="580" y="540" font-family="Arial, sans-serif" font-size="34" fill="#FFFFFF" text-anchor="middle">15</text>
  <rect x="640" y="500" width="80" height="60" rx="8" fill="#BBDEFB"/>
  <text x="680" y="540" font-family="Arial, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">16</text>
  <!-- Photo thumbnail row -->
  <rect x="240" y="580" width="115" height="100" rx="8" fill="#FF8F00" opacity="0.8"/>
  <polygon points="298 600 264 650 332 650" fill="#FFFFFF" opacity="0.7"/>
  <rect x="370" y="580" width="115" height="100" rx="8" fill="#66BB6A" opacity="0.8"/>
  <circle cx="428" cy="610" r="20" fill="#FFCA28" opacity="0.8"/>
  <polygon points="428 625 398 665 458 665" fill="#FFFFFF" opacity="0.7"/>
  <rect x="500" y="580" width="115" height="100" rx="8" fill="#AB47BC" opacity="0.8"/>
  <!-- Layer 3: Camera icon floating -->
  <rect x="700" y="200" width="150" height="110" rx="18" fill="#1565C0"/>
  <circle cx="775" cy="255" r="32" fill="#E3F2FD"/>
  <circle cx="775" cy="255" r="22" fill="#90CAF9"/>
  <rect x="730" y="195" width="50" height="18" rx="8" fill="#0D47A1"/>
</svg>
