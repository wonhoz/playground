<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120828"/>
      <stop offset="100%" stop-color="#0A0418"/>
    </linearGradient>
    <filter id="key_glow8">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ring_glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep indigo -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg8)"/>

  <!-- N-Key Rollover: multiple keys pressed simultaneously, concentric rings emanating -->

  <!-- === Center cluster of pressed keys === -->
  <!-- Key 1: center (Space-ish, wide) -->
  <rect x="312" y="462" width="400" height="100" rx="12" fill="#2A1050" stroke="#9B59FF" stroke-width="3" filter="url(#key_glow8)"/>
  <text x="512" y="523" text-anchor="middle" font-family="Consolas,monospace" font-size="34" fill="#C890FF" font-weight="bold">SPACE</text>

  <!-- Key 2: upper-left -->
  <rect x="232" y="340" width="140" height="100" rx="12" fill="#1E0C40" stroke="#7B68EE" stroke-width="2.5" filter="url(#key_glow8)"/>
  <text x="302" y="401" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#9B80FF" font-weight="bold">A</text>

  <!-- Key 3: upper-right -->
  <rect x="652" y="340" width="140" height="100" rx="12" fill="#1E0C40" stroke="#7B68EE" stroke-width="2.5" filter="url(#key_glow8)"/>
  <text x="722" y="401" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#9B80FF" font-weight="bold">D</text>

  <!-- Key 4: far left -->
  <rect x="118" y="462" width="140" height="100" rx="12" fill="#180A38" stroke="#5B48BE" stroke-width="2.5" filter="url(#key_glow8)"/>
  <text x="188" y="523" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#8070EE" font-weight="bold">W</text>

  <!-- Key 5: far right -->
  <rect x="766" y="462" width="140" height="100" rx="12" fill="#180A38" stroke="#5B48BE" stroke-width="2.5" filter="url(#key_glow8)"/>
  <text x="836" y="523" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#8070EE" font-weight="bold">S</text>

  <!-- Key 6: below center-left -->
  <rect x="292" y="584" width="140" height="100" rx="12" fill="#140838" stroke="#4A38A8" stroke-width="2" filter="url(#key_glow8)"/>
  <text x="362" y="645" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#7060D0" font-weight="bold">↑</text>

  <!-- Key 7: below center-right -->
  <rect x="592" y="584" width="140" height="100" rx="12" fill="#140838" stroke="#4A38A8" stroke-width="2" filter="url(#key_glow8)"/>
  <text x="662" y="645" text-anchor="middle" font-family="Consolas,monospace" font-size="48" fill="#7060D0" font-weight="bold">→</text>

  <!-- === Concentric rings radiating from center === -->
  <!-- Ring 1 (innermost) -->
  <ellipse cx="512" cy="512" rx="200" ry="180" fill="none" stroke="#9B59FF" stroke-width="3" opacity="0.6" filter="url(#ring_glow)"/>
  <!-- Ring 2 -->
  <ellipse cx="512" cy="512" rx="310" ry="280" fill="none" stroke="#7B48CC" stroke-width="2.5" opacity="0.4" filter="url(#ring_glow)"/>
  <!-- Ring 3 -->
  <ellipse cx="512" cy="512" rx="420" ry="380" fill="none" stroke="#5B38AA" stroke-width="2" opacity="0.25"/>
  <!-- Ring 4 (outermost, very faint) -->
  <ellipse cx="512" cy="512" rx="490" ry="450" fill="none" stroke="#3B2888" stroke-width="1.5" opacity="0.15"/>

  <!-- Title top -->
  <text x="512" y="200" text-anchor="middle" font-family="Consolas,monospace" font-size="36" fill="#4A38A8" letter-spacing="3">N-KEY ROLLOVER</text>
  <text x="512" y="244" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#3A2888">Simultaneous Input Test</text>

  <!-- Counter display -->
  <rect x="402" y="730" width="220" height="80" rx="16" fill="#1E1050" stroke="#7B68EE" stroke-width="2"/>
  <text x="512" y="764" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#6050A0">MAX KEYS</text>
  <text x="512" y="800" text-anchor="middle" font-family="Consolas,monospace" font-size="40" font-weight="bold" fill="#BB99FF" filter="url(#key_glow8)">7</text>

  <!-- Bottom label -->
  <text x="512" y="888" text-anchor="middle" font-family="Consolas,monospace" font-size="30" font-weight="bold" fill="#5B48BE" letter-spacing="4">KEY.TEST</text>
</svg>
