<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#00BFA5"/>

  <!-- Main: Large @ symbol -->
  <text x="512" y="620" font-family="'Courier New', monospace" font-size="480" font-weight="900"
        text-anchor="middle" fill="white">@</text>

  <!-- Detail: Surrounding ASCII chars -->
  <text x="230" y="280" font-family="'Courier New', monospace" font-size="110" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.55)">#</text>
  <text x="800" y="260" font-family="'Courier New', monospace" font-size="100" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.45)">$</text>
  <text x="195" y="760" font-family="'Courier New', monospace" font-size="105" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.50)">%</text>
  <text x="820" y="780" font-family="'Courier New', monospace" font-size="95" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.40)">.</text>
  <text x="330" y="900" font-family="'Courier New', monospace" font-size="90" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.45)">*</text>
  <text x="700" y="890" font-family="'Courier New', monospace" font-size="100" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.50)">#</text>
  <text x="512" y="200" font-family="'Courier New', monospace" font-size="90" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.40)">$</text>
</svg>
