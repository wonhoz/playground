  <text x="140" y="213" text-anchor="middle" font-family="monospace" font-size="6" fill="#818CF8">obj</text>
  <circle cx="370" cy="204" r="20" fill="#1e1b4b" stroke="#818CF8" stroke-width="2"/>
  <text x="370" y="201" text-anchor="middle" font-family="monospace" font-size="9" fill="#A5B4FC">[ ]</text>
  <text x="370" y="213" text-anchor="middle" font-family="monospace" font-size="6" fill="#818CF8">arr</text>
  <!-- L2 nodes -->
  <circle cx="90" cy="304" r="16" fill="#1e1b4b" stroke="#6366F1" stroke-width="1.5"/>
