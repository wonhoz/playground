<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <radialGradient id="clockFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg5)"/>

  <!-- White card -->
  <rect x="70" y="100" width="884" height="720" rx="32" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>

  <!-- Large clock face (center-left) -->
  <circle cx="340" cy="420" r="240" fill="url(#clockFace)" stroke="#4A148C" stroke-width="16"/>
  <circle cx="340" cy="420" r="220" fill="none" stroke="#9B59B6" stroke-width="8" stroke-dasharray="18,12"/>
  <!-- Hour markers -->
  <rect x="326" y="192" width="28" height="54" rx="8" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <rect x="326" y="594" width="28" height="54" rx="8" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <rect x="112" y="406" width="54" height="28" rx="8" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <rect x="514" y="406" width="54" height="28" rx="8" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <!-- Clock hands -->
  <rect x="328" y="260" width="24" height="160" rx="10" fill="#7B1FA2" stroke="#4A148C" stroke-width="6" transform="rotate(30, 340, 420)"/>
  <rect x="328" y="300" width="24" height="200" rx="10" fill="#4A148C" stroke="#4A148C" stroke-width="6" transform="rotate(-20, 340, 420)"/>
  <!-- Center dot -->
  <circle cx="340" cy="420" r="22" fill="#9B59B6" stroke="#4A148C" stroke-width="10"/>

  <!-- Calendar icon (top-right of clock) -->
  <rect x="560" y="130" width="340" height="290" rx="20" fill="#F3E5F5" stroke="#4A148C" stroke-width="14"/>
  <!-- Calendar header -->
  <rect x="560" y="130" width="340" height="80" rx="20" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <rect x="560" y="175" width="340" height="35" fill="#9B59B6"/>
  <text x="730" y="183" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">2024</text>
  <!-- Calendar hooks -->
  <rect x="614" y="120" width="24" height="40" rx="8" fill="#4A148C" stroke="#4A148C" stroke-width="8"/>
  <rect x="862" y="120" width="24" height="40" rx="8" fill="#4A148C" stroke="#4A148C" stroke-width="8"/>
  <!-- Calendar day grid (dots) -->
  <circle cx="616" cy="254" r="16" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <circle cx="672" cy="254" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="728" cy="254" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="784" cy="254" r="16" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <circle cx="840" cy="254" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="616" cy="308" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="672" cy="308" r="26" fill="#7B1FA2" stroke="#4A148C" stroke-width="8"/>
  <circle cx="728" cy="308" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="784" cy="308" r="16" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <circle cx="840" cy="308" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="616" cy="362" r="16" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>
  <circle cx="672" cy="362" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="728" cy="362" r="26" fill="#7B1FA2" stroke="#4A148C" stroke-width="8"/>
  <circle cx="784" cy="362" r="16" fill="#CE93D8" stroke="#4A148C" stroke-width="5"/>
  <circle cx="840" cy="362" r="16" fill="#9B59B6" stroke="#4A148C" stroke-width="6"/>

  <!-- Files streaming from clock to calendar -->
  <rect x="580" y="465" width="110" height="60" rx="14" fill="#CE93D8" stroke="#4A148C" stroke-width="10"/>
  <text x="635" y="502" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#4A148C" text-anchor="middle">JPG</text>
  <rect x="710" y="480" width="110" height="60" rx="14" fill="#CE93D8" stroke="#4A148C" stroke-width="10"/>
  <text x="765" y="517" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#4A148C" text-anchor="middle">MP4</text>
  <rect x="840" y="465" width="110" height="60" rx="14" fill="#9B59B6" stroke="#4A148C" stroke-width="10"/>
  <text x="895" y="502" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">MOV</text>

  <!-- Flow lines -->
  <line x1="575" y1="450" x2="730" y2="416" stroke="#9B59B6" stroke-width="8" stroke-dasharray="14,8" stroke-linecap="round"/>
  <line x1="705" y1="465" x2="730" y2="416" stroke="#9B59B6" stroke-width="8" stroke-dasharray="14,8" stroke-linecap="round"/>

  <!-- DATE badge -->
  <rect x="100" y="696" width="824" height="80" rx="28" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="752" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">DATE ORGANIZER</text>

  <!-- Title -->
  <rect x="112" y="824" width="800" height="96" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="890" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>
</svg>
