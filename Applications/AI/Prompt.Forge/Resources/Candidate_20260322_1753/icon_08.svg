<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 따뜻한 아이보리/크림 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#FEF3C7"/>
  <!-- Layer 2: 쌓인 카드들 -->
  <!-- 뒤 카드들 -->
  <rect x="220" y="380" width="500" height="320" rx="20" fill="#FCD34D" transform="rotate(6 470 540)"/>
  <rect x="220" y="370" width="500" height="320" rx="20" fill="#FDE68A" transform="rotate(2 470 530)"/>
  <!-- 메인 카드 -->
  <rect x="212" y="260" width="520" height="380" rx="20" fill="white"/>
  <!-- Layer 3: 카드 내용 + 큰 골드 별 -->
  <!-- 카드 헤더 스트라이프 -->
  <rect x="212" y="260" width="520" height="56" rx="20" fill="#FFFBEB"/>
  <rect x="212" y="294" width="520" height="22" fill="#FFFBEB"/>
  <!-- 제목 -->
  <text x="392" y="298" font-family="sans-serif" font-size="20" fill="#92400E" font-weight="bold">My Prompts</text>
  <!-- 텍스트 줄들 -->
  <rect x="252" y="340" width="360" height="16" rx="4" fill="#E5E7EB"/>
  <rect x="252" y="368" width="300" height="16" rx="4" fill="#E5E7EB"/>
  <rect x="252" y="396" width="340" height="16" rx="4" fill="#E5E7EB"/>
  <!-- 태그 -->
  <rect x="252" y="428" width="80" height="26" rx="13" fill="#FEF3C7"/>
  <text x="292" y="446" font-family="sans-serif" font-size="14" fill="#92400E" text-anchor="middle">writing</text>
  <rect x="342" y="428" width="70" height="26" rx="13" fill="#FEF3C7"/>
  <text x="377" y="446" font-family="sans-serif" font-size="14" fill="#92400E" text-anchor="middle">GPT</text>
  <!-- 큰 골드 별 (즐겨찾기) -->
  <text x="786" y="730" font-family="sans-serif" font-size="180" fill="#F59E0B" text-anchor="middle" opacity="0.95">★</text>
  <!-- 작은 별들 주변에 -->
  <text x="200" y="750" font-family="sans-serif" font-size="40" fill="#FCD34D">★</text>
  <text x="820" y="280" font-family="sans-serif" font-size="28" fill="#FCD34D">✦</text>
</svg>
