<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 유니코드 그리드 -->
  <rect x="100" y="120" width="312" height="260" rx="8" fill="#FBBF24" opacity="0.05"/>
  <rect x="100" y="120" width="312" height="260" rx="8" fill="none" stroke="#FBBF24" stroke-width="2" filter="url(#glow)"/>
  <!-- 그리드 라인 -->
  <line x1="178" y1="120" x2="178" y2="380" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="120" x2="256" y2="380" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="334" y1="120" x2="334" y2="380" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="185" x2="412" y2="185" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="250" x2="412" y2="250" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="315" x2="412" y2="315" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <!-- 셀 내 이모지 -->
  <text x="139" y="165" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">😀</text>
  <text x="217" y="165" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🌟</text>
  <text x="295" y="165" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🎨</text>
  <text x="373" y="165" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🔥</text>
  <text x="139" y="230" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">💎</text>
  <text x="217" y="230" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">⚡</text>
  <text x="295" y="230" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🌈</text>
  <text x="373" y="230" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">✨</text>
  <!-- 레이블 -->
  <text x="256" y="440" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">UNICODE GRID</text>
</svg>
