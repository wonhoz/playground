    <rect x="515" y="108" width="136" height="136" rx="7" fill="none" stroke="#2ECC71" stroke-width="4"/>
    <text x="583" y="208" font-family="'Segoe UI',Arial" font-size="88" font-weight="900" fill="#2ECC71" text-anchor="middle">E</text>

    <rect x="657" y="108" width="136" height="136" rx="7" fill="#111"/> <!-- black -->
    <rect x="799" y="108" width="136" height="136" rx="7" fill="#111"/> <!-- black -->

    <!-- Row 1: ■-■-E-■-■-■ -->
    <rect x="89" y="250" width="136" height="136" rx="7" fill="#111"/>
    <rect x="231" y="250" width="136" height="136" rx="7" fill="#111"/>
    <rect x="373" y="250" width="136" height="136" rx="7" fill="#1A3A2A"/>
