<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07 | Hybrid | 중앙 심볼 | 카메라 렌즈 안에 ASCII 문자들이 소용돌이치는 모습 -->
  <!-- 색조: 코발트 블루 + 화이트/실버 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="128" fill="#050A1F"/>

  <defs>
    <radialGradient id="lensGrad07" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A3A8F"/>
      <stop offset="70%" stop-color="#0A1A4F"/>
      <stop offset="100%" stop-color="#050A1F"/>
    </radialGradient>
    <clipPath id="lensClip07">
      <circle cx="512" cy="490" r="260"/>
    </clipPath>
  </defs>

  <!-- 카메라 바디 -->
  <rect x="180" y="340" width="664" height="400" rx="40" fill="#0D1A3A" stroke="#2A4ABA" stroke-width="8"/>
  <!-- 카메라 상단 돌출부 (뷰파인더) -->
  <rect x="360" y="288" width="180" height="60" rx="12" fill="#0D1A3A" stroke="#2A4ABA" stroke-width="6"/>
  <!-- 셔터 버튼 -->
  <circle cx="640" cy="318" r="28" fill="#2A4ABA" stroke="#4A6ADA" stroke-width="4"/>
  <circle cx="640" cy="318" r="16" fill="#4A6ADA"/>

  <!-- 렌즈 링 -->
  <circle cx="512" cy="490" r="278" fill="none" stroke="#2A4ABA" stroke-width="20"/>
  <circle cx="512" cy="490" r="268" fill="none" stroke="#4A6ADA" stroke-width="6"/>

  <!-- 렌즈 내부 -->
  <circle cx="512" cy="490" r="260" fill="url(#lensGrad07)"/>

  <!-- 렌즈 안의 ASCII 문자 격자 -->
