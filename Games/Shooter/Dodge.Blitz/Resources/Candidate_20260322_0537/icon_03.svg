  <circle cx="520" cy="230" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="680" cy="195" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="820" cy="250" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="190" cy="350" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="340" cy="420" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="900" cy="380" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="160" cy="650" r="3" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="870" cy="720" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="710" cy="840" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="290" cy="800" r="3" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="460" cy="870" r="2" fill="#FFFFFF" opacity="0.3"/>

