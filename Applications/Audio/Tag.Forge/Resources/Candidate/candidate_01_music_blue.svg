<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Music note -->
  <g fill="url(#note)">
    <!-- Note head left -->
    <ellipse cx="182" cy="330" rx="38" ry="28" transform="rotate(-15 182 330)"/>
    <!-- Note head right -->
    <ellipse cx="310" cy="295" rx="38" ry="28" transform="rotate(-15 310 295)"/>
    <!-- Stem left -->
    <rect x="212" y="165" width="12" height="170" rx="6"/>
    <!-- Stem right -->
    <rect x="340" y="128" width="12" height="170" rx="6"/>
    <!-- Beam -->
    <polygon points="212,165 352,128 352,148 212,185"/>
  </g>
  <!-- Tag/label -->
  <path d="M148 385 L148 430 Q148 445 163 445 L295 445 Q310 445 318 435 L348 400 Q358 388 348 376 L318 341 Q310 331 295 331 L163 331 Q148 331 148 346 Z" fill="#1565C0" opacity="0.85"/>
  <circle cx="175" cy="388" r="9" fill="#0D1B3E" stroke="#90CAF9" stroke-width="3"/>
  <line x1="175" y1="397" x2="175" y2="400" stroke="#90CAF9" stroke-width="3"/>
  <!-- Tag lines (ID3 fields) -->
  <rect x="195" y="345" width="115" height="8" rx="4" fill="#90CAF9" opacity="0.7"/>
  <rect x="195" y="362" width="90" height="8" rx="4" fill="#90CAF9" opacity="0.5"/>
  <rect x="195" y="379" width="100" height="8" rx="4" fill="#90CAF9" opacity="0.7"/>
  <rect x="195" y="396" width="75" height="8" rx="4" fill="#90CAF9" opacity="0.5"/>
  <!-- Pen/edit icon -->
  <g transform="translate(360,340)">
    <rect x="-8" y="-40" width="16" height="52" rx="4" fill="#FFD54F" transform="rotate(30)"/>
    <polygon points="-8,12 8,12 0,28" fill="#FFC107" transform="rotate(30)"/>
    <rect x="-8" y="-50" width="16" height="14" rx="3" fill="#BDBDBD" transform="rotate(30)"/>
  </g>
</svg>
