<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <radialGradient id="lens07" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B2DFDB" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#26C6DA" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 폴더 (중앙 아래) -->
  <rect x="340" y="540" width="340" height="260" rx="20" fill="#FFA726"/>
  <rect x="340" y="490" width="180" height="70" rx="14" fill="#FF8F00"/>
  <!-- 폴더 내부 (빈 폴더) -->
  <rect x="368" y="568" width="284" height="204" rx="14" fill="#FFCC02" opacity="0.35"/>
  <text x="512" y="688" font-family="Arial Black, Arial, sans-serif" font-size="88" fill="#E65100" text-anchor="middle" opacity="0.6">∅</text>
  <!-- Layer 3: 돋보기 (중앙 위, 크게) -->
  <!-- 돋보기 렌즈 -->
  <circle cx="440" cy="440" r="200" fill="url(#lens07)" stroke="#2E7D32" stroke-width="24"/>
  <!-- 돋보기 손잡이 -->
  <rect x="590" y="570" width="32" height="180" rx="16" fill="#1B5E20" transform="rotate(45 606 660)"/>
  <!-- 체크마크 (돋보기 안) -->
  <circle cx="440" cy="440" r="130" fill="#4CAF50" opacity="0.9"/>
  <path d="M 360 445 L 418 508 L 530 378" fill="none" stroke="white" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
