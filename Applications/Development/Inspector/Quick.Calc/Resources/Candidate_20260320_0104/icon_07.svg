<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050010"/>
  <!-- Bit shift: bits moving right -->
  <!-- Bit row 1 (original) -->
  <rect x="140" y="320" width="64" height="64" rx="12" fill="#9575CD"/>
  <rect x="220" y="320" width="64" height="64" rx="12" fill="#4527A0" opacity="0.5"/>
  <rect x="300" y="320" width="64" height="64" rx="12" fill="#9575CD"/>
  <rect x="380" y="320" width="64" height="64" rx="12" fill="#9575CD"/>
  <rect x="460" y="320" width="64" height="64" rx="12" fill="#4527A0" opacity="0.5"/>
  <rect x="540" y="320" width="64" height="64" rx="12" fill="#9575CD"/>
  <rect x="620" y="320" width="64" height="64" rx="12" fill="#4527A0" opacity="0.5"/>
  <rect x="700" y="320" width="64" height="64" rx="12" fill="#9575CD"/>
  <!-- Shift arrows -->
  <path d="M512 440 L700 530" stroke="#9575CD" stroke-width="20" stroke-linecap="round"/>
  <polygon points="688,510 724,534 700,558" fill="#9575CD"/>
  <path d="M350 440 L140 530" stroke="#4527A0" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <polygon points="154,508 118,530 152,554" fill="#4527A0" opacity="0.5"/>
  <!-- Bit row 2 (shifted right) -->
  <rect x="220" y="600" width="64" height="64" rx="12" fill="#4527A0" opacity="0.3"/>
  <rect x="300" y="600" width="64" height="64" rx="12" fill="#9575CD" opacity="0.7"/>
  <rect x="380" y="600" width="64" height="64" rx="12" fill="#4527A0" opacity="0.3"/>
  <rect x="460" y="600" width="64" height="64" rx="12" fill="#9575CD" opacity="0.7"/>
  <rect x="540" y="600" width="64" height="64" rx="12" fill="#9575CD" opacity="0.7"/>
  <rect x="620" y="600" width="64" height="64" rx="12" fill="#4527A0" opacity="0.3"/>
  <rect x="700" y="600" width="64" height="64" rx="12" fill="#9575CD" opacity="0.7"/>
  <rect x="780" y="600" width="64" height="64" rx="12" fill="#4527A0" opacity="0.3"/>
</svg>
