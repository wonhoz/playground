<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001400"/>
      <stop offset="100%" stop-color="#000a00"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b9f6ca"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Split screen line -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#00e676" stroke-width="3" opacity="0.4"/>
  <!-- Left side -->
  <rect x="80" y="100" width="160" height="240" rx="14" fill="#001a00" stroke="#00c853" stroke-width="2"/>
  <text x="160" y="145" font-family="monospace" font-size="13" fill="#00c853" text-anchor="middle">PLAYER 1</text>
  <!-- P1 avatar (simple face) -->
  <circle cx="160" cy="200" r="36" fill="#00c853" opacity="0.2" stroke="#00c853" stroke-width="2"/>
  <circle cx="148" cy="192" r="6" fill="#00c853"/>
  <circle cx="172" cy="192" r="6" fill="#00c853"/>
  <path d="M145 216 Q160 228 175 216" stroke="#00c853" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- P1 score bar -->
  <rect x="100" y="260" width="120" height="12" rx="6" fill="#001400"/>
  <rect x="100" y="260" width="96" height="12" rx="6" fill="url(#left)"/>
  <text x="160" y="296" font-family="monospace" font-size="13" fill="#69f0ae" text-anchor="middle">WIN: 7</text>
  <text x="160" y="316" font-family="monospace" font-size="11" fill="#a5d6a7" text-anchor="middle">0.18s avg</text>
  <!-- Right side -->
  <rect x="272" y="100" width="160" height="240" rx="14" fill="#001a00" stroke="#00e676" stroke-width="2"/>
  <text x="352" y="145" font-family="monospace" font-size="13" fill="#00e676" text-anchor="middle">PLAYER 2</text>
  <circle cx="352" cy="200" r="36" fill="#00e676" opacity="0.2" stroke="#00e676" stroke-width="2"/>
  <circle cx="340" cy="192" r="6" fill="#00e676"/>
  <circle cx="364" cy="192" r="6" fill="#00e676"/>
  <path d="M337 216 Q352 228 367 216" stroke="#00e676" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="292" y="260" width="120" height="12" rx="6" fill="#001400"/>
  <rect x="292" y="260" width="60" height="12" rx="6" fill="url(#right)"/>
  <text x="352" y="296" font-family="monospace" font-size="13" fill="#b9f6ca" text-anchor="middle">WIN: 4</text>
  <text x="352" y="316" font-family="monospace" font-size="11" fill="#a5d6a7" text-anchor="middle">0.24s avg</text>
  <!-- VS badge center -->
  <circle cx="256" cy="360" r="28" fill="#001400" stroke="#00e676" stroke-width="2.5"/>
  <text x="256" y="367" font-family="sans-serif" font-size="18" fill="#00ff41" text-anchor="middle" font-weight="bold">VS</text>
  <!-- Title -->
  <text x="256" y="462" font-family="monospace" font-size="20" fill="#00c853" text-anchor="middle" letter-spacing="4" opacity="0.9">SNAP.DUEL</text>
</svg>
