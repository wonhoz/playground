  <!-- Neon glow lines -->
  <line x1="256" y1="145" x2="256" y2="175" stroke="#FF00FF" stroke-width="2" opacity="0.4"/>
  <line x1="378" y1="200" x2="360" y2="222" stroke="#FF00FF" stroke-width="2" opacity="0.4"/>
  <line x1="405" y1="330" x2="385" y2="318" stroke="#FF00FF" stroke-width="2" opacity="0.4"/>
