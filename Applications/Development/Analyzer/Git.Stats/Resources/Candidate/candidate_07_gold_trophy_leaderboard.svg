  <!-- Rank numbers -->
  <text x="130" y="340" text-anchor="middle" fill="#1A1A1A" font-size="32" font-family="monospace" font-weight="bold">2</text>
  <text x="256" y="260" text-anchor="middle" fill="#1A1A1A" font-size="36" font-family="monospace" font-weight="bold">1</text>
  <text x="382" y="380" text-anchor="middle" fill="#1A1A1A" font-size="32" font-family="monospace" font-weight="bold">3</text>
