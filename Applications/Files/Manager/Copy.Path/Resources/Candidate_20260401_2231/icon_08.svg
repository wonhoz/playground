<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B9F6CA"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (lime-dark green) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg08cp2)"/>

  <!-- Layer 2: URL bar / browser address bar style -->
  <!-- Browser-like header bar -->
  <rect x="88" y="200" width="848" height="120" rx="24" fill="white" opacity="0.95"/>
  <!-- Lock icon -->
  <text x="148" y="276" font-size="72">🔒</text>
  <!-- URL text -->
  <text x="240" y="276" font-family="'Courier New',monospace" font-size="56" font-weight="bold"
    fill="#2E7D32">file:///</text>
  <text x="570" y="276" font-family="'Courier New',monospace" font-size="56" fill="#1565C0"
    >C:/folder</text>

  <!-- Second line continuation -->
  <rect x="88" y="340" width="848" height="100" rx="20" fill="white" opacity="0.9"/>
  <text x="140" y="406" font-family="'Courier New',monospace" font-size="56" fill="#1565C0"
    >/file.txt</text>

  <!-- Arrow showing path → URL conversion -->
  <rect x="88" y="120" width="380" height="68" rx="18" fill="#1B5E20" opacity="0.8"/>
  <text x="278" y="165" font-family="'Courier New',monospace" font-size="48" fill="white"
    text-anchor="middle">C:\folder\file</text>

  <path d="M468 154 L608 154" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M594 138 L612 154 L594 170" fill="none" stroke="white" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"/>
  <text x="700" y="172" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="#B9F6CA"
    opacity="0.9">→ URL</text>

  <!-- Layer 3: Additional format pills -->
  <rect x="88" y="500" width="200" height="72" rx="36" fill="#1B5E20" opacity="0.8"/>
  <text x="188" y="545" font-family="'Courier New',monospace" font-size="44" fill="#B9F6CA" text-anchor="middle">unix</text>

  <rect x="308" y="500" width="200" height="72" rx="36" fill="#1B5E20" opacity="0.8"/>
  <text x="408" y="545" font-family="'Courier New',monospace" font-size="44" fill="#B9F6CA" text-anchor="middle">UNC</text>

  <rect x="528" y="500" width="200" height="72" rx="36" fill="#1B5E20" opacity="0.8"/>
  <text x="628" y="545" font-family="'Courier New',monospace" font-size="44" fill="#B9F6CA" text-anchor="middle">C#</text>

  <rect x="748" y="500" width="188" height="72" rx="36" fill="#1B5E20" opacity="0.8"/>
  <text x="842" y="545" font-family="'Courier New',monospace" font-size="44" fill="#B9F6CA" text-anchor="middle">name</text>

  <!-- Big URL label -->
  <text x="512" y="720" font-family="'Courier New',monospace" font-size="120" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">file://</text>

  <text x="512" y="880" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.85">COPY · PATH</text>
</svg>
