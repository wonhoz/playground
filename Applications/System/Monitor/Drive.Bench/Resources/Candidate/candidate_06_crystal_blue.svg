<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#051220"/>
    </linearGradient>
    <linearGradient id="ssd_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2040"/>
      <stop offset="100%" stop-color="#051530"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88CCFF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 2.5" SSD body -->
  <rect x="120" y="110" width="272" height="190" rx="16" fill="url(#ssd_body)" stroke="#1A4060" stroke-width="2.5"/>
  <!-- Label area -->
  <rect x="136" y="126" width="240" height="120" rx="10" fill="#051220"/>
  <!-- Circuit pattern -->
  <line x1="150" y1="160" x2="220" y2="160" stroke="#0A4080" stroke-width="1.5"/>
  <line x1="220" y1="160" x2="220" y2="190" stroke="#0A4080" stroke-width="1.5"/>
  <line x1="220" y1="190" x2="320" y2="190" stroke="#0A4080" stroke-width="1.5"/>
  <line x1="320" y1="190" x2="320" y2="150" stroke="#0A4080" stroke-width="1.5"/>
  <line x1="320" y1="150" x2="350" y2="150" stroke="#0A4080" stroke-width="1.5"/>
  <!-- Chip dots -->
  <circle cx="220" cy="160" r="4" fill="#0088FF" filter="url(#glow)"/>
  <circle cx="220" cy="190" r="4" fill="#0088FF" filter="url(#glow)"/>
  <circle cx="320" cy="190" r="4" fill="#0088FF" filter="url(#glow)"/>
  <circle cx="320" cy="150" r="4" fill="#0088FF" filter="url(#glow)"/>
  <!-- SATA data + power -->
  <rect x="136" y="292" width="80" height="18" rx="3" fill="#0A2040" stroke="#1A4060" stroke-width="1.5"/>
  <rect x="228" y="292" width="130" height="18" rx="3" fill="#0A2040" stroke="#1A4060" stroke-width="1.5"/>
  <!-- Crystal speed gems -->
  <polygon points="256,340 280,365 256,395 232,365" fill="url(#crystal)" filter="url(#glow)"/>
  <polygon points="256,348 274,365 256,387 238,365" fill="#AADDFF" opacity="0.5"/>
  <!-- Speed rings -->
  <circle cx="256" cy="365" r="45" fill="none" stroke="#0066CC" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="365" r="58" fill="none" stroke="#0044AA" stroke-width="1.5" opacity="0.3"/>
  <text x="256" y="455" font-family="Arial" font-size="24" font-weight="bold" fill="#44AAFF" text-anchor="middle" filter="url(#glow)">DRIVE·BENCH</text>
</svg>
