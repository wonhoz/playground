<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 버전 히스토리 v1→v2→v3 | 레이어드 | #0F172A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F172A"/>
  <!-- Layer 2: Version cards stack -->
  <!-- v1 (oldest, background) -->
  <rect x="220" y="540" width="600" height="200" rx="16" fill="#1E293B" transform="rotate(-3 520 640)"/>
  <text x="280" y="620" font-family="Consolas,monospace" font-size="16" fill="#475569" transform="rotate(-3 520 640)">v1.0 — 기본 프롬프트</text>
  <text x="280" y="650" font-family="Consolas,monospace" font-size="14" fill="#334155" transform="rotate(-3 520 640)">역할: 어시스턴트</text>
  <!-- v2 (mid) -->
  <rect x="200" y="440" width="620" height="200" rx="16" fill="#334155" transform="rotate(-1 510 540)"/>
  <text x="260" y="520" font-family="Consolas,monospace" font-size="16" fill="#94A3B8" transform="rotate(-1 510 540)">v2.0 — 개선된 프롬프트</text>
  <text x="260" y="548" font-family="Consolas,monospace" font-size="14" fill="#64748B" transform="rotate(-1 510 540)">역할: {{role}} (변수)</text>
  <!-- v3 (current, front) -->
  <rect x="180" y="320" width="660" height="220" rx="16" fill="#4338CA" stroke="#818CF8" stroke-width="3"/>
  <text x="240" y="370" font-family="Consolas,monospace" font-size="16" fill="#A5B4FC">v3.0 — 최신 (현재)</text>
  <rect x="220" y="388" width="560" height="50" rx="8" fill="#312E81"/>
  <text x="252" y="419" font-family="Consolas,monospace" font-size="15" fill="#C7D2FE">당신은 {{role}}입니다. {{task}}를 도와주세요.</text>
  <text x="240" y="464" font-family="Consolas,monospace" font-size="14" fill="#818CF8">태그: ai, code-review, v3</text>
  <text x="240" y="492" font-family="Consolas,monospace" font-size="13" fill="#6366F1">수정: 2026-03-22</text>
  <!-- Layer 3: Version badges -->
  <rect x="700" y="628" width="80" height="34" rx="10" fill="#1E293B"/>
  <text x="740" y="650" font-family="Consolas,monospace" font-size="14" fill="#475569" text-anchor="middle">v1</text>
  <rect x="700" y="528" width="80" height="34" rx="10" fill="#334155"/>
  <text x="740" y="550" font-family="Consolas,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">v2</text>
  <rect x="700" y="360" width="80" height="34" rx="10" fill="#4338CA"/>
  <text x="740" y="382" font-family="Consolas,monospace" font-size="16" fill="#A5B4FC" text-anchor="middle" font-weight="bold">v3</text>
  <!-- Arrow up (versioning up) -->
  <line x1="740" y1="560" x2="740" y2="398" stroke="#6366F1" stroke-width="3" stroke-dasharray="8,5"/>
</svg>
