<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="bar_high" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="bar_mid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="bar_low" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- App window -->
  <rect x="46" y="66" width="420" height="390" rx="12" fill="#1C2333" stroke="#374151" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="46" y="66" width="420" height="38" rx="12" fill="#252D3D"/>
  <rect x="46" y="88" width="420" height="16" fill="#252D3D"/>
  <circle cx="74" cy="85" r="7" fill="#FF5F57"/>
  <circle cx="98" cy="85" r="7" fill="#FFBD2E"/>
  <circle cx="122" cy="85" r="7" fill="#28C940"/>
  <text x="266" y="90" font-family="Arial" font-size="13" fill="#9CA3AF" text-anchor="middle" font-weight="bold">Mem.Lens — Process Monitor</text>
  <!-- Column headers -->
  <rect x="46" y="104" width="420" height="28" fill="#1E2535"/>
  <text x="68" y="123" font-family="Arial" font-size="11" fill="#6B7280" font-weight="bold">PROCESS</text>
  <text x="290" y="123" font-family="Arial" font-size="11" fill="#6B7280" font-weight="bold">MEM</text>
  <text x="355" y="123" font-family="Arial" font-size="11" fill="#6B7280" font-weight="bold">USAGE</text>
  <text x="445" y="123" font-family="Arial" font-size="11" fill="#6B7280" font-weight="bold" text-anchor="end">%</text>
  <!-- Row 1 - chrome high -->
  <rect x="46" y="132" width="420" height="32" fill="#1a2030" opacity="0.5"/>
  <circle cx="64" cy="148" r="8" fill="#EA4335" opacity="0.8"/>
  <text x="80" y="153" font-family="Arial" font-size="12" fill="#E5E7EB">chrome.exe</text>
  <text x="290" y="153" font-family="Arial" font-size="12" fill="#F87171">4,820 MB</text>
  <rect x="340" y="140" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="140" width="76" height="14" rx="3" fill="url(#bar_high)"/>
  <text x="445" y="153" font-family="Arial" font-size="12" fill="#F87171" text-anchor="end">84%</text>
  <!-- Row 2 - teams -->
  <rect x="46" y="164" width="420" height="32" fill="white" opacity="0.02"/>
  <circle cx="64" cy="180" r="8" fill="#6264A7" opacity="0.8"/>
  <text x="80" y="185" font-family="Arial" font-size="12" fill="#E5E7EB">Teams.exe</text>
  <text x="290" y="185" font-family="Arial" font-size="12" fill="#FCD34D">2,240 MB</text>
  <rect x="340" y="172" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="172" width="55" height="14" rx="3" fill="url(#bar_mid)"/>
  <text x="445" y="185" font-family="Arial" font-size="12" fill="#FCD34D" text-anchor="end">61%</text>
  <!-- Row 3 - code -->
  <rect x="46" y="196" width="420" height="32" fill="#1a2030" opacity="0.5"/>
  <circle cx="64" cy="212" r="8" fill="#007ACC" opacity="0.8"/>
  <text x="80" y="217" font-family="Arial" font-size="12" fill="#E5E7EB">Code.exe</text>
  <text x="290" y="217" font-family="Arial" font-size="12" fill="#FCD34D">1,850 MB</text>
  <rect x="340" y="204" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="204" width="46" height="14" rx="3" fill="url(#bar_mid)"/>
  <text x="445" y="217" font-family="Arial" font-size="12" fill="#FCD34D" text-anchor="end">51%</text>
  <!-- Row 4 - slack -->
  <rect x="46" y="228" width="420" height="32" fill="white" opacity="0.02"/>
  <circle cx="64" cy="244" r="8" fill="#4A154B" opacity="0.8"/>
  <text x="80" y="249" font-family="Arial" font-size="12" fill="#E5E7EB">slack.exe</text>
  <text x="290" y="249" font-family="Arial" font-size="12" fill="#34D399">980 MB</text>
  <rect x="340" y="236" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="236" width="24" height="14" rx="3" fill="url(#bar_low)"/>
  <text x="445" y="249" font-family="Arial" font-size="12" fill="#34D399" text-anchor="end">27%</text>
  <!-- Row 5 - dotnet -->
  <rect x="46" y="260" width="420" height="32" fill="#1a2030" opacity="0.5"/>
  <circle cx="64" cy="276" r="8" fill="#512BD4" opacity="0.8"/>
  <text x="80" y="281" font-family="Arial" font-size="12" fill="#E5E7EB">dotnet.exe</text>
  <text x="290" y="281" font-family="Arial" font-size="12" fill="#34D399">740 MB</text>
  <rect x="340" y="268" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="268" width="18" height="14" rx="3" fill="url(#bar_low)"/>
  <text x="445" y="281" font-family="Arial" font-size="12" fill="#34D399" text-anchor="end">20%</text>
  <!-- Row 6 - explorer -->
  <rect x="46" y="292" width="420" height="32" fill="white" opacity="0.02"/>
  <circle cx="64" cy="308" r="8" fill="#0078D7" opacity="0.8"/>
  <text x="80" y="313" font-family="Arial" font-size="12" fill="#E5E7EB">explorer.exe</text>
  <text x="290" y="313" font-family="Arial" font-size="12" fill="#34D399">320 MB</text>
  <rect x="340" y="300" width="90" height="14" rx="3" fill="#374151"/>
  <rect x="340" y="300" width="8" height="14" rx="3" fill="url(#bar_low)"/>
  <text x="445" y="313" font-family="Arial" font-size="12" fill="#34D399" text-anchor="end">9%</text>
  <!-- Divider -->
  <line x1="46" y1="324" x2="466" y2="324" stroke="#374151" stroke-width="1"/>
  <!-- Status bar -->
  <rect x="46" y="414" width="420" height="42" rx="12" fill="#1a2030"/>
  <rect x="46" y="414" width="420" height="16" fill="#1a2030"/>
  <text x="70" y="440" font-family="Arial" font-size="11" fill="#6B7280">Total: 32 GB</text>
  <text x="200" y="440" font-family="Arial" font-size="11" fill="#F87171">Used: 21.7 GB</text>
  <text x="340" y="440" font-family="Arial" font-size="11" fill="#34D399">Free: 10.3 GB</text>
</svg>
