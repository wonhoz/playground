<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001100"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Matrix falling chars -->
  <text x="70" y="80" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.9">1</text>
  <text x="70" y="100" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.7">0</text>
  <text x="70" y="120" font-family="monospace" font-size="14" fill="#00CC00" opacity="0.5">1</text>
  <text x="70" y="140" font-family="monospace" font-size="14" fill="#009900" opacity="0.3">0</text>
  <text x="100" y="100" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.9">A</text>
  <text x="100" y="120" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.7">N</text>
  <text x="100" y="140" font-family="monospace" font-size="14" fill="#00CC00" opacity="0.5">S</text>
  <text x="100" y="160" font-family="monospace" font-size="14" fill="#009900" opacity="0.3">I</text>
  <text x="130" y="80" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.9">█</text>
  <text x="130" y="100" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.7">▓</text>
  <text x="130" y="120" font-family="monospace" font-size="14" fill="#00CC00" opacity="0.5">▒</text>
  <text x="130" y="140" font-family="monospace" font-size="14" fill="#009900" opacity="0.3">░</text>
  <!-- Central ANSI art block -->
  <rect x="140" y="180" width="232" height="160" rx="8" fill="#001A00" stroke="#00FF00" stroke-width="2"/>
  <text x="160" y="215" font-family="monospace" font-size="16" fill="#FF5555">■■</text>
  <text x="200" y="215" font-family="monospace" font-size="16" fill="#55FF55">■■</text>
  <text x="240" y="215" font-family="monospace" font-size="16" fill="#FFFF55">■■</text>
  <text x="280" y="215" font-family="monospace" font-size="16" fill="#5555FF">■■</text>
  <text x="320" y="215" font-family="monospace" font-size="16" fill="#FF55FF">■■</text>
  <text x="160" y="245" font-family="monospace" font-size="16" fill="#55FFFF">■■</text>
  <text x="200" y="245" font-family="monospace" font-size="16" fill="#FFFFFF">■■</text>
  <text x="240" y="245" font-family="monospace" font-size="16" fill="#FF8800">■■</text>
  <text x="280" y="245" font-family="monospace" font-size="16" fill="#88FF00">■■</text>
  <text x="320" y="245" font-family="monospace" font-size="16" fill="#00FFAA">■■</text>
  <text x="160" y="310" font-family="monospace" font-size="13" fill="#00FF00">\e[38;5;201m FORGE</text>
  <!-- More matrix chars on right -->
  <text x="410" y="120" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.9">]</text>
  <text x="410" y="140" font-family="monospace" font-size="14" fill="#00CC00" opacity="0.7">m</text>
  <text x="410" y="160" font-family="monospace" font-size="14" fill="#009900" opacity="0.5">[</text>
  <text x="440" y="100" font-family="monospace" font-size="14" fill="#00FF00" opacity="0.9">3</text>
  <text x="440" y="120" font-family="monospace" font-size="14" fill="#00CC00" opacity="0.7">3</text>
  <text x="440" y="140" font-family="monospace" font-size="14" fill="#009900" opacity="0.5">8</text>
</svg>