<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark indigo -->
  <rect width="1024" height="1024" rx="200" fill="#0A0818"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="#1A1040" stroke-width="80"/>
  <!-- Circular arrow arc (270 degrees, clockwise) -->
  <path d="M512 182 A330 330 0 1 1 182 512" fill="none" stroke="#FFD600" stroke-width="72" stroke-linecap="round"/>
  <!-- Arrowhead pointing clockwise at start -->
  <polygon points="512,110 420,230 604,230" fill="#FFD600"/>
  <!-- Center circle -->
  <circle cx="512" cy="512" r="130" fill="#1A1040" stroke="#FF6D00" stroke-width="16"/>
  <!-- Clock hand - hour (short) -->
  <line x1="512" y1="512" x2="512" y2="418" stroke="#FF9800" stroke-width="24" stroke-linecap="round"/>
  <!-- Clock hand - minute (long) -->
  <line x1="512" y1="512" x2="588" y2="462" stroke="#FFD600" stroke-width="18" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="20" fill="#FFD600"/>
</svg>
