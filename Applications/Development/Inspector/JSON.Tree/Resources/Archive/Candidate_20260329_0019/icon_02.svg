<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | A/B 두 파일 비교 패널 | 레이어드 | 민트+빨강 diff -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#006064" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: Two side-by-side panels -->
  <!-- Panel A (left) -->
  <rect x="60" y="80" width="420" height="864" rx="22" fill="white" filter="url(#sh2)"/>
  <rect x="60" y="80" width="420" height="72" rx="22" fill="#00838F"/>
  <rect x="60" y="130" width="420" height="22" fill="#00838F"/>
  <text x="270" y="116" font-family="Arial Black, sans-serif" font-size="36" fill="white"
        text-anchor="middle" dominant-baseline="middle">A  file_v1.json</text>

  <!-- Panel B (right) -->
  <rect x="544" y="80" width="420" height="864" rx="22" fill="white" filter="url(#sh2)"/>
  <rect x="544" y="80" width="420" height="72" rx="22" fill="#00838F"/>
  <rect x="544" y="130" width="420" height="22" fill="#00838F"/>
  <text x="754" y="116" font-family="Arial Black, sans-serif" font-size="36" fill="white"
        text-anchor="middle" dominant-baseline="middle">B  file_v2.json</text>

  <!-- Layer 3: Diff content lines -->
  <!-- Identical lines -->
  <rect x="72" y="175" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="90" y="194" font-family="Consolas, monospace" font-size="28" fill="#555">"name": "Alice"</text>
  <rect x="556" y="175" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="574" y="194" font-family="Consolas, monospace" font-size="28" fill="#555">"name": "Alice"</text>

  <!-- Removed line (A only, red) -->
  <rect x="72" y="225" width="396" height="38" rx="4" fill="#FFCDD2"/>
  <text x="90" y="244" font-family="Consolas, monospace" font-size="28" fill="#C62828">- "age": 30</text>
  <!-- Empty on B -->
  <rect x="556" y="225" width="396" height="38" rx="4" fill="#F9F9F9" opacity="0.4"/>

  <!-- Added line (B only, green) -->
  <!-- Empty on A -->
  <rect x="72" y="275" width="396" height="38" rx="4" fill="#F9F9F9" opacity="0.4"/>
  <rect x="556" y="275" width="396" height="38" rx="4" fill="#C8E6C9"/>
  <text x="574" y="294" font-family="Consolas, monospace" font-size="28" fill="#1B5E20">+ "age": 32</text>

  <!-- Identical lines -->
  <rect x="72" y="325" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="90" y="344" font-family="Consolas, monospace" font-size="28" fill="#555">"tags": [</text>
  <rect x="556" y="325" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="574" y="344" font-family="Consolas, monospace" font-size="28" fill="#555">"tags": [</text>

  <!-- Changed line -->
  <rect x="72" y="375" width="396" height="38" rx="4" fill="#FFCDD2"/>
  <text x="90" y="394" font-family="Consolas, monospace" font-size="26" fill="#C62828">- "dev"</text>
  <rect x="556" y="375" width="396" height="38" rx="4" fill="#C8E6C9"/>
  <text x="574" y="394" font-family="Consolas, monospace" font-size="26" fill="#1B5E20">+ "dev","json"</text>

  <!-- More identical lines -->
  <rect x="72" y="425" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="90" y="444" font-family="Consolas, monospace" font-size="28" fill="#555">]</text>
  <rect x="556" y="425" width="396" height="38" rx="4" fill="#F5F5F5"/>
  <text x="574" y="444" font-family="Consolas, monospace" font-size="28" fill="#555">]</text>

  <!-- More lines fading -->
  <rect x="72"  y="475" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.7"/>
  <rect x="556" y="475" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.7"/>
  <rect x="72"  y="521" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.5"/>
  <rect x="556" y="521" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.5"/>
  <rect x="72"  y="567" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.3"/>
  <rect x="556" y="567" width="396" height="34" rx="4" fill="#F5F5F5" opacity="0.3"/>

  <!-- Center divider line -->
  <line x1="512" y1="100" x2="512" y2="924" stroke="#00838F" stroke-width="6" opacity="0.5"/>
  <!-- Diff count badge -->
  <circle cx="512" cy="512" r="36" fill="#F57F17" filter="url(#sh2)"/>
  <text x="512" y="512" font-family="Arial Black, sans-serif" font-size="34" fill="white"
        text-anchor="middle" dominant-baseline="middle">Δ</text>
</svg>
