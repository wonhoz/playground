<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 교차로 도로 -->
  <rect x="230" y="80" width="52" height="352" rx="4" fill="#0EA5E9" opacity="0.12"/>
  <rect x="80" y="230" width="352" height="52" rx="4" fill="#0EA5E9" opacity="0.12"/>
  <!-- 도로 경계 -->
  <line x1="256" y1="80" x2="256" y2="180" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="256" y1="332" x2="256" y2="432" stroke="#38BDF8" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="80" y1="256" x2="180" y2="256" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <line x1="332" y1="256" x2="432" y2="256" stroke="#38BDF8" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <!-- 중앙 DNS 스위치 -->
  <circle cx="256" cy="256" r="45" fill="#0EA5E9" opacity="0.15"/>
  <circle cx="256" cy="256" r="38" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)"/>
  <!-- 전환 화살표 (중앙) -->
  <path d="M 235 246 L 277 246 M 269 238 L 277 246 L 269 254" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 277 266 L 235 266 M 243 258 L 235 266 L 243 274" stroke="#0EA5E9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 방향 노드들 -->
  <circle cx="256" cy="120" r="14" fill="#0EA5E9" opacity="0.8" filter="url(#glow)"/>
  <text x="256" y="125" text-anchor="middle" fill="white" font-size="10" font-family="monospace">A</text>
  <circle cx="256" cy="392" r="14" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
  <text x="256" y="397" text-anchor="middle" fill="white" font-size="10" font-family="monospace">B</text>
  <circle cx="120" cy="256" r="14" fill="#0EA5E9" opacity="0.6"/>
  <text x="120" y="261" text-anchor="middle" fill="white" font-size="9" font-family="monospace">C</text>
  <circle cx="392" cy="256" r="14" fill="#38BDF8" opacity="0.6"/>
  <text x="392" y="261" text-anchor="middle" fill="white" font-size="9" font-family="monospace">D</text>
</svg>