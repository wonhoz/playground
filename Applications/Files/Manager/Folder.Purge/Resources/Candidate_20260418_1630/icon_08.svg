    <!-- 빈폴더(회색) -->
    <rect x="392" y="652" width="240" height="200" rx="20" fill="#455A64"/>
    <rect x="392" y="624" width="130" height="38" rx="12" fill="#455A64"/>
    <text x="512" y="758" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📁</text>
    <text x="512" y="820" font-family="'Segoe UI',Arial,sans-serif" font-size="28" text-anchor="middle" fill="#90A4AE" font-weight="700">Temp</text>

    <!-- 정상(민트) -->
    <rect x="696" y="652" width="240" height="200" rx="20" fill="#00897B"/>
    <rect x="696" y="624" width="130" height="38" rx="12" fill="#00897B"/>
    <text x="816" y="758" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📁</text>
