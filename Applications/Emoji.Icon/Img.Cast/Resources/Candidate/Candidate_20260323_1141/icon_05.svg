<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="cast5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E64A19"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#cast5)"/>
  <!-- Layer 2: Source image (top) -->
  <rect x="312" y="160" width="400" height="260" rx="16" fill="white" opacity="0.9"/>
  <!-- Mountain image inside -->
  <polygon points="412,380 512,260 612,380" fill="#90CAF9"/>
  <circle cx="580" cy="290" r="40" fill="#FFF176"/>
  <!-- Casting sparks/particles -->
  <circle cx="380" cy="490" r="18" fill="#FFD700"/>
  <circle cx="512" cy="530" r="14" fill="#FF8C00"/>
  <circle cx="640" cy="490" r="18" fill="#FFD700"/>
  <circle cx="440" cy="560" r="10" fill="#FF8C00" opacity="0.8"/>
  <circle cx="580" cy="565" r="12" fill="#FFD700" opacity="0.7"/>
  <!-- Arrow -->
  <line x1="512" y1="430" x2="512" y2="580" stroke="white" stroke-width="44" stroke-linecap="round"/>
  <polygon points="452,560 512,640 572,560" fill="white"/>
  <!-- Output (bottom) -->
  <rect x="312" y="700" width="400" height="160" rx="16" fill="white"/>
  <rect x="342" y="730" width="340" height="18" rx="9" fill="#E64A19"/>
  <rect x="342" y="762" width="280" height="18" rx="9" fill="#E64A19" opacity="0.6"/>
</svg>