<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#180a04"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="prismFace1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="prismFace2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Input light beam (white/raw document) -->
  <rect x="30" y="245" width="120" height="22" fill="#EF4444" fill-opacity="0.5" rx="4" filter="url(#glow)"/>
  <line x1="30" y1="256" x2="150" y2="256" stroke="white" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Prism body (triangular) -->
  <polygon points="150,135 360,256 150,377" fill="url(#prismFace1)" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glow)"/>
  <polygon points="150,135 360,256 150,377" fill="url(#prismFace2)"/>

  <!-- Output beams (refracted = multiple PDF pages) -->
  <!-- Beam 1 (top) = page 1 -->
  <path d="M360,256 L470,160" stroke="#F97316" stroke-width="8" stroke-opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Beam 2 = page 2 -->
  <path d="M360,256 L480,206" stroke="#EF4444" stroke-width="6" stroke-opacity="0.65" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Beam 3 (center) = page 3 -->
  <path d="M360,256 L490,256" stroke="#DC2626" stroke-width="9" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Beam 4 = page 4 -->
  <path d="M360,256 L480,306" stroke="#EF4444" stroke-width="6" stroke-opacity="0.6" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Beam 5 (bottom) = page 5 -->
  <path d="M360,256 L470,352" stroke="#F97316" stroke-width="7" stroke-opacity="0.55" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Document miniatures at beam ends -->
  <!-- Doc 1 -->
  <rect x="456" y="140" width="38" height="46" rx="3" fill="#2a0e04" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <polygon points="482,140 494,140 494,152" fill="#1a0804" stroke="#F97316" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="462" y1="158" x2="490" y2="158" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="462" y1="167" x2="488" y2="167" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="462" y1="176" x2="490" y2="176" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Doc 2 -->
  <rect x="466" y="186" width="36" height="44" rx="3" fill="#2a0a04" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <polygon points="490,186 502,186 502,198" fill="#1a0804" stroke="#EF4444" stroke-width="1"/>
  <line x1="472" y1="204" x2="498" y2="204" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="472" y1="213" x2="496" y2="213" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="472" y1="222" x2="498" y2="222" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Doc 3 (center, largest) -->
  <rect x="476" y="232" width="42" height="52" rx="3" fill="#2a0e04" stroke="#DC2626" stroke-width="2" stroke-opacity="0.9" filter="url(#glow)"/>
  <polygon points="504,232 518,232 518,246" fill="#1a0804" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="482" y1="252" x2="514" y2="252" stroke="#F97316" stroke-width="2" stroke-opacity="0.6" filter="url(#softglow)"/>
  <line x1="482" y1="263" x2="512" y2="263" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="482" y1="274" x2="514" y2="274" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Doc 4 -->
  <rect x="466" y="284" width="36" height="44" rx="3" fill="#2a0a04" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <polygon points="490,284 502,284 502,296" fill="#1a0804" stroke="#EF4444" stroke-width="1"/>
  <line x1="472" y1="302" x2="498" y2="302" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="472" y1="311" x2="496" y2="311" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="472" y1="320" x2="498" y2="320" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Doc 5 -->
  <rect x="456" y="330" width="38" height="46" rx="3" fill="#2a0e04" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <polygon points="482,330 494,330 494,342" fill="#1a0804" stroke="#F97316" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="462" y1="348" x2="490" y2="348" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="462" y1="357" x2="488" y2="357" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="462" y1="366" x2="490" y2="366" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Prism base glow -->
  <ellipse cx="256" cy="440" rx="150" ry="30" fill="#F97316" fill-opacity="0.04" filter="url(#glow)"/>
</svg>
