<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Str.Forge - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 8px; color: #ffffff; }
  p.desc { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 960px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 160px; height: 160px; border-radius: 16px; border: 1px solid #333; display: block; }
  .item span { font-size: 12px; color: #888; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Str.Forge</h1>
<p class="desc">문자열 처리·변환 개발 도구 — 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_terminal_green.svg" alt="01"><span>01 Terminal Green</span></div>
  <div class="item"><img src="candidate_02_forge_hammer.svg" alt="02"><span>02 Forge Hammer</span></div>
  <div class="item"><img src="candidate_03_code_blue.svg" alt="03"><span>03 Code Blue</span></div>
  <div class="item"><img src="candidate_04_transform_arrows.svg" alt="04"><span>04 Transform Arrows</span></div>
  <div class="item"><img src="candidate_05_hex_matrix.svg" alt="05"><span>05 Hex Matrix</span></div>
  <div class="item"><img src="candidate_06_gradient_text.svg" alt="06"><span>06 Gradient Text</span></div>
  <div class="item"><img src="candidate_07_dark_regex.svg" alt="07"><span>07 Dark Regex</span></div>
  <div class="item"><img src="candidate_08_circuit_text.svg" alt="08"><span>08 Circuit Text</span></div>
  <div class="item"><img src="candidate_09_orange_dev.svg" alt="09"><span>09 Orange Dev</span></div>
  <div class="item"><img src="candidate_10_minimal_brackets.svg" alt="10"><span>10 Minimal Brackets</span></div>
</div>
</body>
</html>
