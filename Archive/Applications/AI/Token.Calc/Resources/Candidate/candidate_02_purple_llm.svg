<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D001A"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="96" cy="160" r="24" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <circle cx="96" cy="256" r="24" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <circle cx="96" cy="352" r="24" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <!-- Hidden layer -->
  <circle cx="256" cy="128" r="28" fill="#6A1B9A" stroke="#E1BEE7" stroke-width="5"/>
  <circle cx="256" cy="208" r="28" fill="#6A1B9A" stroke="#E1BEE7" stroke-width="5"/>
  <circle cx="256" cy="288" r="28" fill="#6A1B9A" stroke="#E1BEE7" stroke-width="5"/>
  <circle cx="256" cy="368" r="28" fill="#6A1B9A" stroke="#E1BEE7" stroke-width="5"/>
  <!-- Output layer -->
  <circle cx="416" cy="192" r="28" fill="#7B1FA2" stroke="#F3E5F5" stroke-width="6"/>
  <circle cx="416" cy="320" r="28" fill="#7B1FA2" stroke="#F3E5F5" stroke-width="6"/>
  <!-- Connections (sample) -->
  <line x1="120" y1="160" x2="228" y2="136" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="160" x2="228" y2="216" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="256" x2="228" y2="136" stroke="#CE93D8" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="256" x2="228" y2="296" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="352" x2="228" y2="296" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="352" x2="228" y2="376" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="136" x2="388" y2="200" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="216" x2="388" y2="200" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="296" x2="388" y2="312" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="376" x2="388" y2="312" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <!-- Token text on nodes -->
  <text x="96" y="166" text-anchor="middle" font-size="12" fill="#E1BEE7" font-family="monospace" opacity="0.8">T</text>
  <text x="96" y="262" text-anchor="middle" font-size="12" fill="#E1BEE7" font-family="monospace" opacity="0.8">T</text>
  <text x="96" y="358" text-anchor="middle" font-size="12" fill="#E1BEE7" font-family="monospace" opacity="0.8">T</text>
  <!-- Cost badge on output -->
  <text x="416" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#F3E5F5" font-family="monospace">$</text>
  <text x="416" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#F3E5F5" font-family="monospace">$</text>
  <!-- LLM label at bottom -->
  <rect x="128" y="424" width="256" height="48" rx="16" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <text x="256" y="455" text-anchor="middle" font-size="28" font-weight="bold" fill="#E1BEE7" font-family="monospace" opacity="0.95">LLM CALC</text>
</svg>
