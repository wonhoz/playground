<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0099"/>
      <stop offset="100%" stop-color="#FF6600"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <filter id="neon1">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer ring (pink-orange) — 80% arc -->
  <path d="M256,256 m-175,0 a175,175 0 1,1 350,0" fill="none" stroke="url(#ring1)" stroke-width="12" stroke-linecap="round" filter="url(#neon1)"/>
  <!-- Outer ring glow -->
  <path d="M256,256 m-175,0 a175,175 0 1,1 350,0" fill="none" stroke="url(#ring1)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Mid ring (cyan-blue) — 60% arc -->
  <path d="M256,256 m-130,0 a130,130 0 1,1 260,0" fill="none" stroke="url(#ring2)" stroke-width="10" stroke-linecap="round" filter="url(#neon1)"/>
  <path d="M256,256 m-130,0 a130,130 0 1,1 260,0" fill="none" stroke="url(#ring2)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Inner ring (yellow-orange) — 40% arc -->
  <path d="M256,256 m-88,0 a88,88 0 0,1 88,-88" fill="none" stroke="url(#ring3)" stroke-width="9" stroke-linecap="round" filter="url(#neon1)"/>
  <path d="M256,256 m-88,0 a88,88 0 0,1 88,-88" fill="none" stroke="url(#ring3)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Center disk icon -->
  <circle cx="256" cy="256" r="36" fill="#0D0D0D" stroke="#FF0099" stroke-width="3" filter="url(#neon2)" opacity="0.9"/>
  <circle cx="256" cy="256" r="22" fill="none" stroke="#00FFCC" stroke-width="2.5" opacity="0.8"/>
  <circle cx="256" cy="256" r="9" fill="#FF0099" opacity="0.9" filter="url(#neon2)"/>
  <!-- Percentage arcs labels -->
  <text x="256" y="148" text-anchor="middle" fill="#FF6600" font-family="Arial" font-size="16" font-weight="bold" filter="url(#neon2)">80%</text>
  <text x="140" y="220" text-anchor="middle" fill="#00FFCC" font-family="Arial" font-size="14" filter="url(#neon2)">60%</text>
  <text x="176" y="172" text-anchor="middle" fill="#FFFF00" font-family="Arial" font-size="13" filter="url(#neon2)">40%</text>
  <!-- Bottom stats -->
  <rect x="100" y="385" width="120" height="32" rx="6" fill="#1A0025" stroke="#FF0099" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="406" text-anchor="middle" fill="#FF0099" font-family="Arial" font-size="13" font-weight="bold">C: 400 GB</text>
  <rect x="292" y="385" width="120" height="32" rx="6" fill="#001A1A" stroke="#00FFCC" stroke-width="1.5" opacity="0.8"/>
  <text x="352" y="406" text-anchor="middle" fill="#00FFCC" font-family="Arial" font-size="13" font-weight="bold">D: 200 GB</text>
  <!-- Label -->
  <text x="256" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="22" font-weight="bold" letter-spacing="3" filter="url(#neon2)" opacity="0.9">DISK.LENS</text>
  <text x="256" y="490" text-anchor="middle" fill="#888" font-family="Arial" font-size="13" letter-spacing="4">NEON EDITION</text>
</svg>
