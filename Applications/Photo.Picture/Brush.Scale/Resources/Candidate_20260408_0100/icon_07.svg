<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07bs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="60%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>

  <!-- Background: amber -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07bs)"/>

  <!-- Image frame -->
  <rect x="148" y="200" width="728" height="560" rx="20" fill="white" opacity="0.95"/>

  <!-- Left half: mosaic/blurry face -->
  <clipPath id="leftHalf">
    <rect x="160" y="212" width="348" height="536"/>
  </clipPath>
  <g clip-path="url(#leftHalf)">
    <!-- Mosaic blocks representing blurry face -->
    <rect x="160" y="212" width="348" height="536" fill="#FEF9C3"/>
    <!-- Large pixel blocks -->
    <rect x="164" y="216" width="56" height="56" fill="#D97706" opacity="0.6"/>
    <rect x="220" y="216" width="56" height="56" fill="#FCD34D" opacity="0.6"/>
    <rect x="276" y="216" width="56" height="56" fill="#F59E0B" opacity="0.6"/>
    <rect x="332" y="216" width="56" height="56" fill="#D97706" opacity="0.6"/>
    <rect x="388" y="216" width="108" height="56" fill="#FEF3C7" opacity="0.6"/>

    <rect x="164" y="272" width="56" height="56" fill="#FEF3C7" opacity="0.7"/>
    <rect x="220" y="272" width="56" height="56" fill="#D97706" opacity="0.8"/>
    <rect x="276" y="272" width="56" height="56" fill="#92400E" opacity="0.7"/>
    <rect x="332" y="272" width="56" height="56" fill="#D97706" opacity="0.7"/>
    <rect x="388" y="272" width="108" height="56" fill="#FCD34D" opacity="0.5"/>

    <rect x="164" y="328" width="56" height="56" fill="#D97706" opacity="0.5"/>
    <rect x="220" y="328" width="56" height="56" fill="#92400E" opacity="0.9"/>
    <rect x="276" y="328" width="56" height="56" fill="#451A03" opacity="0.8"/>
    <rect x="332" y="328" width="56" height="56" fill="#92400E" opacity="0.9"/>
    <rect x="388" y="328" width="108" height="56" fill="#D97706" opacity="0.5"/>

    <rect x="164" y="384" width="232" height="56" fill="#FCD34D" opacity="0.5"/>
    <rect x="396" y="384" width="100" height="56" fill="#F59E0B" opacity="0.5"/>
    <rect x="164" y="440" width="232" height="308" fill="#FEF3C7" opacity="0.6"/>
    <rect x="396" y="440" width="100" height="308" fill="#FCD34D" opacity="0.4"/>
  </g>

  <!-- Center divider with slider handle -->
  <line x1="508" y1="212" x2="508" y2="748" stroke="#0EA5E9" stroke-width="6"/>
  <circle cx="508" cy="490" r="28" fill="#0EA5E9"/>
  <polygon points="488,490 500,474 500,506" fill="white"/>
  <polygon points="528,490 516,474 516,506" fill="white"/>

  <!-- Right half: sharp, smooth portrait -->
  <clipPath id="rightHalf">
    <rect x="508" y="212" width="356" height="536"/>
  </clipPath>
  <g clip-path="url(#rightHalf)">
    <rect x="508" y="212" width="356" height="536" fill="#FFFBEB"/>
    <!-- Smooth face representation -->
    <ellipse cx="690" cy="420" rx="120" ry="140" fill="url(#faceGrad)"/>
    <!-- Eyes -->
    <ellipse cx="648" cy="385" rx="16" ry="18" fill="#1C1917"/>
    <ellipse cx="732" cy="385" rx="16" ry="18" fill="#1C1917"/>
    <ellipse cx="650" cy="382" rx="5" ry="6" fill="white"/>
    <ellipse cx="734" cy="382" rx="5" ry="6" fill="white"/>
    <!-- Smile -->
    <path d="M655,440 Q690,468 725,440" fill="none" stroke="#92400E" stroke-width="6" stroke-linecap="round"/>
    <!-- Hair -->
    <ellipse cx="690" cy="298" rx="126" ry="60" fill="#92400E"/>
  </g>

  <!-- Before/After labels -->
  <text x="330" y="788" font-family="Arial,sans-serif" font-size="26" fill="#92400E" text-anchor="middle" opacity="0.8">Blurry</text>
  <text x="690" y="788" font-family="Arial,sans-serif" font-size="26" fill="#059669" text-anchor="middle" font-weight="bold">Sharp ✓</text>
</svg>
