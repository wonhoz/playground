<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor — 퍼즐 모드 (타겟 실루엣 + 반투명 오버레이, 보라-파랑 계열, PuzzleGoal) -->

  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1230"/>
      <stop offset="100%" stop-color="#2A1A4A"/>
    </linearGradient>
    <linearGradient id="targetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6C3483" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow04">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg04)"/>

  <!-- === 타겟 실루엣 (점선 외곽선, 반투명) — PuzzleGoal === -->
  <!-- 타겟 나무 실루엣 (달성해야 할 모양) -->
  <g opacity="0.35" stroke="#BB88FF" stroke-dasharray="12,8" fill="none">
    <line x1="512" y1="840" x2="512" y2="580" stroke-width="14"/>
    <line x1="512" y1="660" x2="400" y2="530" stroke-width="9"/>
    <line x1="512" y1="660" x2="624" y2="530" stroke-width="9"/>
    <line x1="400" y1="530" x2="338" y2="450" stroke-width="6"/>
    <line x1="400" y1="530" x2="455" y2="450" stroke-width="6"/>
    <line x1="624" y1="530" x2="569" y2="450" stroke-width="6"/>
    <line x1="624" y1="530" x2="686" y2="450" stroke-width="6"/>
    <line x1="512" y1="580" x2="512" y2="460" stroke-width="7"/>
    <line x1="512" y1="460" x2="466" y2="396" stroke-width="4"/>
    <line x1="512" y1="460" x2="558" y2="396" stroke-width="4"/>
  </g>
  <!-- 타겟 잎 실루엣 -->
  <g opacity="0.25" fill="#9B59B6">
    <circle cx="330" cy="440" r="34"/>
    <circle cx="455" cy="440" r="28"/>
    <circle cx="569" cy="440" r="28"/>
    <circle cx="686" cy="440" r="34"/>
    <circle cx="466" cy="384" r="24"/>
    <circle cx="558" cy="384" r="24"/>
  </g>

  <!-- === 현재 성장 나무 (실선, 밝은 색) — 아직 목표에 못 미침 === -->
  <!-- 줄기 -->
  <line x1="512" y1="840" x2="512" y2="640" stroke="#E8B84B" stroke-width="16" stroke-linecap="round" filter="url(#glow04)"/>
  <!-- 1단계 가지만 (미완성) -->
  <line x1="512" y1="700" x2="420" y2="600" stroke="#D4A030" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="700" x2="604" y2="600" stroke="#D4A030" stroke-width="10" stroke-linecap="round"/>
  <!-- 잎 (현재 단계) -->
  <circle cx="408" cy="590" r="28" fill="#F39C12" opacity="0.9"/>
  <circle cx="616" cy="590" r="28" fill="#F39C12" opacity="0.9"/>
  <circle cx="512" cy="626" r="22" fill="#F1C40F" opacity="0.8"/>

  <!-- 잠금 아이콘 + GOAL 텍스트 (상단 목표 영역) -->
  <rect x="370" y="228" width="284" height="68" rx="34" fill="#6C3483" opacity="0.9" stroke="#BB88FF" stroke-width="2"/>
  <text x="512" y="256" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#DDA0DD">PUZZLE GOAL</text>
  <text x="512" y="284" text-anchor="middle" font-family="Consolas, monospace" font-size="24" font-weight="bold" fill="#BB88FF">iter 3 달성</text>

  <!-- 진행도 바 -->
  <rect x="280" y="890" width="464" height="28" rx="14" fill="#2A1A4A" stroke="#6C3483" stroke-width="2"/>
  <rect x="280" y="890" width="180" height="28" rx="14" fill="#9B59B6" opacity="0.9"/>
  <text x="512" y="910" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" fill="#DDA0DD">1 / 3</text>

  <!-- 별 (목표 달성 보상 암시) -->
  <g opacity="0.6" filter="url(#glow04)">
    <polygon points="512,330 524,362 558,362 532,382 542,414 512,394 482,414 492,382 466,362 500,362" fill="#FFD700"/>
    <polygon points="400,340 408,364 434,364 414,378 422,402 400,388 378,402 386,378 366,364 392,364" fill="#C0C0C0" transform="scale(0.7) translate(172,170)"/>
    <polygon points="624,340 632,364 658,364 638,378 646,402 624,388 602,402 610,378 590,364 616,364" fill="#C0C0C0" transform="scale(0.7) translate(-178,170)"/>
  </g>
</svg>
