<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001414"/>
      <stop offset="100%" stop-color="#002626"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chart grid -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#1A3A3A" stroke-width="2"/>
  <line x1="80" y1="340" x2="432" y2="340" stroke="#1A3A3A" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#1A3A3A" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#1A3A3A" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="80" y1="160" x2="432" y2="160" stroke="#1A3A3A" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="80" y1="100" x2="432" y2="100" stroke="#1A3A3A" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Y axis labels -->
  <text x="66" y="404" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">0</text>
  <text x="66" y="344" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">20</text>
  <text x="66" y="284" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">40</text>
  <text x="66" y="224" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">60</text>
  <text x="66" y="164" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">80</text>
  <text x="66" y="104" text-anchor="end" font-family="Consolas" font-size="11" fill="#888">100</text>
  <!-- Benchmark bars -->
  <!-- Process 1: 85% -->
  <rect x="100" y="145" width="50" height="255" rx="4" fill="url(#bar1)"/>
  <text x="125" y="136" text-anchor="middle" font-family="Consolas" font-size="11" fill="#26C6DA">85%</text>
  <text x="125" y="420" text-anchor="middle" font-family="Consolas" font-size="10" fill="#888">proc1</text>
  <!-- Process 2: 60% -->
  <rect x="172" y="220" width="50" height="180" rx="4" fill="url(#bar2)"/>
  <text x="197" y="210" text-anchor="middle" font-family="Consolas" font-size="11" fill="#00BCD4">60%</text>
  <text x="197" y="420" text-anchor="middle" font-family="Consolas" font-size="10" fill="#888">proc2</text>
  <!-- Process 3: 92% (peak) -->
  <rect x="244" y="106" width="50" height="294" rx="4" fill="url(#bar3)"/>
  <text x="269" y="96" text-anchor="middle" font-family="Consolas" font-size="11" fill="#80DEEA">92%</text>
  <text x="269" y="420" text-anchor="middle" font-family="Consolas" font-size="10" fill="#888">proc3</text>
  <!-- Process 4: 45% -->
  <rect x="316" y="265" width="50" height="135" rx="4" fill="url(#bar1)"/>
  <text x="341" y="255" text-anchor="middle" font-family="Consolas" font-size="11" fill="#26C6DA">45%</text>
  <text x="341" y="420" text-anchor="middle" font-family="Consolas" font-size="10" fill="#888">proc4</text>
  <!-- Process 5: 73% -->
  <rect x="388" y="181" width="44" height="219" rx="4" fill="url(#bar2)"/>
  <text x="410" y="171" text-anchor="middle" font-family="Consolas" font-size="11" fill="#00BCD4">73%</text>
  <text x="410" y="420" text-anchor="middle" font-family="Consolas" font-size="10" fill="#888">proc5</text>
  <!-- Title -->
  <text x="256" y="68" text-anchor="middle" font-family="Segoe UI" font-size="18" fill="#26C6DA" font-weight="bold">Process Benchmark</text>
</svg>