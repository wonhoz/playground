<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="100%" stop-color="#1A1408"/>
    </linearGradient>
    <linearGradient id="ground01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A050"/>
      <stop offset="100%" stop-color="#8A6828"/>
    </linearGradient>
    <clipPath id="frame01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Dark background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <g clip-path="url(#frame01)">
    <!-- Layer 2: Scene — stone structure, sand, water, fire -->

    <!-- Ground/floor (dark stone) -->
    <rect x="80" y="820" width="864" height="60" rx="4" fill="#484848"/>
    <rect x="80" y="820" width="864" height="14" rx="4" fill="#666"/>

    <!-- Stone wall / structure (center-left) -->
    <rect x="200" y="550" width="80" height="272" fill="#606060"/>
    <rect x="200" y="550" width="80" height="272" fill="none" stroke="#777" stroke-width="2"/>
    <!-- Stone texture lines -->
    <line x1="200" y1="620" x2="280" y2="620" stroke="#777" stroke-width="2"/>
    <line x1="200" y1="690" x2="280" y2="690" stroke="#777" stroke-width="2"/>
    <line x1="200" y1="760" x2="280" y2="760" stroke="#777" stroke-width="2"/>
    <line x1="240" y1="550" x2="240" y2="820" stroke="#777" stroke-width="2" opacity="0.5"/>

    <!-- Right stone block -->
    <rect x="680" y="640" width="120" height="182" fill="#606060"/>
    <line x1="680" y1="710" x2="800" y2="710" stroke="#777" stroke-width="2"/>
    <line x1="740" y1="640" x2="740" y2="820" stroke="#777" stroke-width="2" opacity="0.5"/>

    <!-- Sand pile (right of stone wall, accumulated) -->
    <!-- Sand heap against the stone wall -->
    <ellipse cx="350" cy="820" rx="140" ry="45" fill="#E8B840"/>
    <ellipse cx="350" cy="800" rx="100" ry="35" fill="#F0C050"/>
    <ellipse cx="350" cy="785" rx="65" ry="22" fill="#F8D060"/>

    <!-- Falling sand particles (from above, falling down) -->
    <!-- Stream of sand particles -->
    <rect x="340" y="140" width="22" height="8" rx="4" fill="#F0C050" opacity="0.9"/>
    <rect x="342" y="175" width="18" height="7" rx="3" fill="#E8B840" opacity="0.85"/>
    <rect x="338" y="210" width="22" height="8" rx="4" fill="#F0C050" opacity="0.9"/>
    <rect x="344" y="248" width="16" height="7" rx="3" fill="#E8B840" opacity="0.8"/>
    <rect x="340" y="284" width="20" height="8" rx="4" fill="#F0C050" opacity="0.85"/>
    <rect x="345" y="320" width="16" height="7" rx="3" fill="#EAB840" opacity="0.75"/>
    <rect x="339" y="356" width="22" height="8" rx="4" fill="#F0C050" opacity="0.8"/>
    <rect x="343" y="392" width="18" height="7" rx="3" fill="#E8B840" opacity="0.75"/>
    <rect x="340" y="428" width="20" height="8" rx="4" fill="#F0C050" opacity="0.7"/>
    <rect x="344" y="464" width="16" height="7" rx="3" fill="#E8B840" opacity="0.65"/>
    <rect x="341" y="500" width="20" height="8" rx="4" fill="#F0C050" opacity="0.6"/>
    <rect x="338" y="536" width="24" height="8" rx="4" fill="#E8B840" opacity="0.5"/>
    <rect x="342" y="572" width="18" height="7" rx="3" fill="#F0C050" opacity="0.4"/>
    <!-- Sand source at top (hopper/funnel) -->
    <polygon points="310,100 380,100 360,145 330,145" fill="#998030"/>
    <rect x="328" y="100" width="34" height="45" rx="4" fill="#C8A040"/>

    <!-- Water (flowing from left edge, pooling on ground to right of center stone) -->
    <rect x="280" y="770" width="400" height="50" rx="4" fill="#2A6ACC" opacity="0.8"/>
    <rect x="280" y="770" width="400" height="14" rx="4" fill="#5590FF" opacity="0.5"/>
    <!-- Water ripples -->
    <ellipse cx="480" cy="775" rx="40" ry="6" fill="none" stroke="#88BBFF" stroke-width="2" opacity="0.4"/>
    <ellipse cx="380" cy="778" rx="25" ry="4" fill="none" stroke="#88BBFF" stroke-width="2" opacity="0.35"/>
    <!-- Water flow line -->
    <path d="M80,780 Q180,790 280,775" fill="none" stroke="#2A6ACC" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

    <!-- Fire (burning wood on right, against right stone block) -->
    <!-- Wood log -->
    <rect x="550" y="780" width="130" height="40" rx="8" fill="#6A3810"/>
    <rect x="550" y="780" width="130" height="12" rx="8" fill="#7A4820" opacity="0.6"/>
    <!-- Fire flames -->
    <!-- Large center flame -->
    <ellipse cx="614" cy="740" rx="35" ry="50" fill="#FF6A00" opacity="0.9"/>
    <ellipse cx="614" cy="730" rx="22" ry="38" fill="#FF9A00" opacity="0.9"/>
    <ellipse cx="614" cy="718" rx="12" ry="26" fill="#FFE040" opacity="0.9"/>
    <!-- Left flame -->
    <ellipse cx="572" cy="755" rx="22" ry="36" fill="#FF4500" opacity="0.85"/>
    <ellipse cx="572" cy="748" rx="13" ry="26" fill="#FF8A00" opacity="0.85"/>
    <!-- Right flame -->
    <ellipse cx="655" cy="758" rx="20" ry="32" fill="#FF5A00" opacity="0.8"/>
    <ellipse cx="655" cy="750" rx="12" ry="23" fill="#FF8A00" opacity="0.8"/>
    <!-- Flame tips (flickering) -->
    <ellipse cx="595" cy="690" rx="8" ry="20" fill="#FFEE00" opacity="0.7"/>
    <ellipse cx="630" cy="685" rx="7" ry="18" fill="#FFEE00" opacity="0.65"/>
    <!-- Embers/sparks -->
    <circle cx="590" cy="660" r="4" fill="#FF8A00" opacity="0.7"/>
    <circle cx="640" cy="650" r="3" fill="#FFCC00" opacity="0.6"/>
    <circle cx="620" cy="645" r="3" fill="#FF6A00" opacity="0.65"/>

    <!-- Layer 3: Material labels (small tags) -->
    <rect x="302" y="80" width="88" height="34" rx="8" fill="#332200"/>
    <text x="346" y="103" font-family="'Segoe UI',Arial" font-size="24" fill="#F0C050" text-anchor="middle" font-weight="700">🟡 모래</text>

    <rect x="82" y="752" width="78" height="32" rx="8" fill="#001A44"/>
    <text x="121" y="773" font-family="'Segoe UI',Arial" font-size="22" fill="#5590FF" text-anchor="middle" font-weight="700">💧 물</text>

    <rect x="700" y="610" width="78" height="32" rx="8" fill="#330E00"/>
    <text x="739" y="632" font-family="'Segoe UI',Arial" font-size="22" fill="#FF8A00" text-anchor="middle" font-weight="700">🔥 불</text>

    <rect x="185" y="520" width="78" height="32" rx="8" fill="#222222"/>
    <text x="224" y="542" font-family="'Segoe UI',Arial" font-size="22" fill="#888" text-anchor="middle" font-weight="700">🪨 돌</text>

    <!-- Gravity arrow -->
    <line x1="350" y1="148" x2="350" y2="780" stroke="#555" stroke-width="2" stroke-dasharray="6,10" opacity="0.4"/>
    <polygon points="350,790 342,770 358,770" fill="#555" opacity="0.4"/>
  </g>
</svg>
