<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <linearGradient id="arrow6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg6)"/>

  <!-- White card -->
  <rect x="60" y="100" width="904" height="720" rx="32" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>

  <!-- LEFT: Chaotic pile of files (diagonal, overlapping) -->
  <rect x="90" y="230" width="170" height="200" rx="14" fill="#FFE082" stroke="#F57F17" stroke-width="12" transform="rotate(20, 175, 330)"/>
  <text x="175" y="340" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle" transform="rotate(20, 175, 330)">IMG</text>

  <rect x="140" y="200" width="170" height="200" rx="14" fill="#FFF176" stroke="#F57F17" stroke-width="12" transform="rotate(-15, 225, 300)"/>
  <text x="225" y="310" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle" transform="rotate(-15, 225, 300)">VID</text>

  <rect x="80" y="330" width="170" height="200" rx="14" fill="#FFCA28" stroke="#F57F17" stroke-width="12" transform="rotate(35, 165, 430)"/>
  <text x="165" y="440" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle" transform="rotate(35, 165, 430)">JPG</text>

  <rect x="190" y="290" width="170" height="200" rx="14" fill="#FFE082" stroke="#F57F17" stroke-width="12" transform="rotate(-25, 275, 390)"/>
  <text x="275" y="400" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle" transform="rotate(-25, 275, 390)">MOV</text>

  <rect x="110" y="430" width="200" height="170" rx="14" fill="#FFF176" stroke="#F57F17" stroke-width="12" transform="rotate(10, 210, 515)"/>
  <text x="210" y="525" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle" transform="rotate(10, 210, 515)">HEIC</text>

  <!-- CHAOS label -->
  <rect x="90" y="640" width="280" height="62" rx="20" fill="#FFC107" stroke="#F57F17" stroke-width="12"/>
  <text x="230" y="682" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#E65100" text-anchor="middle">CHAOS</text>

  <!-- Arrow (diagonal dynamic) -->
  <rect x="386" y="375" width="140" height="46" rx="18" fill="url(#arrowG)" stroke="#F57F17" stroke-width="12"/>
  <polygon points="526,348 616,398 526,448" fill="#FF6F00" stroke="#F57F17" stroke-width="12" stroke-linejoin="round"/>
  <!-- SORT label on arrow -->
  <rect x="396" y="438" width="120" height="46" rx="16" fill="#FFB300" stroke="#F57F17" stroke-width="10"/>
  <text x="456" y="470" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle">SORT</text>

  <!-- RIGHT: Neatly stacked date folders -->
  <rect x="638" y="160" width="296" height="76" rx="18" fill="#FF6F00" stroke="#F57F17" stroke-width="14"/>
  <text x="786" y="210" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">2024/</text>

  <rect x="658" y="248" width="268" height="62" rx="14" fill="#FFB300" stroke="#F57F17" stroke-width="12"/>
  <text x="792" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">01/</text>

  <rect x="676" y="322" width="242" height="52" rx="12" fill="#FFCA28" stroke="#F57F17" stroke-width="10"/>
  <text x="797" y="357" font-family="Arial Black, sans-serif" font-weight="900" font-size="34" fill="#E65100" text-anchor="middle">15/</text>

  <rect x="690" y="386" width="224" height="48" rx="10" fill="#FFF176" stroke="#F57F17" stroke-width="10"/>
  <text x="802" y="418" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle">12 files</text>

  <rect x="658" y="448" width="268" height="62" rx="14" fill="#FFB300" stroke="#F57F17" stroke-width="12"/>
  <text x="792" y="490" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">02/</text>

  <rect x="676" y="522" width="242" height="52" rx="12" fill="#FFCA28" stroke="#F57F17" stroke-width="10"/>
  <text x="797" y="557" font-family="Arial Black, sans-serif" font-weight="900" font-size="34" fill="#E65100" text-anchor="middle">08/</text>

  <rect x="690" y="586" width="224" height="48" rx="10" fill="#FFF176" stroke="#F57F17" stroke-width="10"/>
  <text x="802" y="618" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#E65100" text-anchor="middle">24 files</text>

  <!-- ORDER label -->
  <rect x="638" y="640" width="296" height="62" rx="20" fill="#FF6F00" stroke="#F57F17" stroke-width="12"/>
  <text x="786" y="682" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">ORDER</text>

  <!-- Title -->
  <rect x="112" y="838" width="800" height="96" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="904" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>
</svg>
