<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 돋보기 원 -->
  <circle cx="210" cy="210" r="110" fill="none" stroke="url(#glass)" stroke-width="32"/>
  <!-- 손잡이 -->
  <line x1="292" y1="292" x2="400" y2="400" stroke="#90CAF9" stroke-width="36" stroke-linecap="round"/>
  <!-- 이모지 심볼 -->
  <text x="210" y="228" font-size="80" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI Emoji">😀</text>
