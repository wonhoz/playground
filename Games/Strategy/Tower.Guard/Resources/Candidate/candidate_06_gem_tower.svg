<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051520"/>
      <stop offset="100%" stop-color="#0a2030"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40e0d0"/>
      <stop offset="50%" stop-color="#20a0c0"/>
      <stop offset="100%" stop-color="#105080"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#304060"/>
      <stop offset="100%" stop-color="#182030"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Base tower -->
  <rect x="196" y="300" width="120" height="160" rx="6" fill="url(#base)"/>
  <!-- Base details -->
  <rect x="180" y="420" width="152" height="20" rx="6" fill="#253550"/>
  <rect x="164" y="434" width="184" height="18" rx="6" fill="#1a2840"/>
  <!-- Crystal tower middle -->
  <polygon points="256,100 320,260 256,300 192,260" fill="url(#crystal)"/>
  <!-- Crystal facets -->
  <polygon points="256,100 320,260 256,180" fill="#60f0f0" opacity="0.3"/>
  <polygon points="256,100 192,260 256,180" fill="#20b0d0" opacity="0.4"/>
  <polygon points="256,300 320,260 256,180" fill="#108090" opacity="0.5"/>
  <!-- Crystal shine -->
  <polygon points="256,100 320,260 256,180" fill="url(#shine)"/>
  <!-- Gems on base -->
  <polygon points="210,305 226,290 242,305 226,320" fill="#40e0d0" opacity="0.9"/>
  <polygon points="270,305 286,290 302,305 286,320" fill="#40e0d0" opacity="0.9"/>
  <!-- Energy rings -->
  <ellipse cx="256" cy="260" rx="80" ry="16" fill="none" stroke="#40e0d0" stroke-width="3" opacity="0.5"/>
  <ellipse cx="256" cy="260" rx="100" ry="20" fill="none" stroke="#20b0d0" stroke-width="2" opacity="0.3"/>
  <ellipse cx="256" cy="260" rx="120" ry="24" fill="none" stroke="#108090" stroke-width="1" opacity="0.2"/>
  <!-- Energy beams -->
  <line x1="256" y1="260" x2="130" y2="180" stroke="#40e0d0" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="260" x2="390" y2="200" stroke="#40e0d0" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="260" x2="140" y2="340" stroke="#40e0d0" stroke-width="3" opacity="0.4"/>
  <!-- Sparkles -->
  <circle cx="130" cy="180" r="8" fill="#40e0d0" opacity="0.8"/>
  <circle cx="390" cy="200" r="6" fill="#40e0d0" opacity="0.7"/>
  <circle cx="140" cy="340" r="7" fill="#40e0d0" opacity="0.6"/>
  <!-- Top gem sparkle -->
  <circle cx="256" cy="100" r="10" fill="#a0ffff" opacity="0.9"/>
  <circle cx="256" cy="100" r="5" fill="#ffffff"/>
</svg>