  <line x1="526" y1="520" x2="582" y2="610" stroke="#80D8FF" stroke-width="9" stroke-linecap="round"/>
  <line x1="442" y1="610" x2="420" y2="680" stroke="#80D8FF" stroke-width="9" stroke-linecap="round"/>
  <line x1="582" y1="610" x2="604" y2="680" stroke="#80D8FF" stroke-width="9" stroke-linecap="round"/>
