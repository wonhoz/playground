<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="link07" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg07cp2)"/>

  <!-- Layer 2: Chain links representing path connection -->
  <!-- Link 1 (folder) -->
  <rect x="80" y="380" width="280" height="180" rx="90" fill="url(#link07)" stroke="#00ACC1" stroke-width="16"/>
  <rect x="132" y="432" width="176" height="76" rx="38" fill="#00ACC1"/>
  <text x="220" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="white"
    text-anchor="middle">📁</text>

  <!-- Link 2 (connecting) -->
  <rect x="338" y="400" width="200" height="140" rx="70" fill="url(#link07)" stroke="#00ACC1" stroke-width="16"/>
  <rect x="378" y="440" width="120" height="60" rx="30" fill="#00ACC1"/>
  <!-- Backslash inside link 2 -->
  <text x="438" y="477" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#FFF176" text-anchor="middle">\</text>

  <!-- Link 3 (file) -->
  <rect x="516" y="380" width="280" height="180" rx="90" fill="url(#link07)" stroke="#00ACC1" stroke-width="16"/>
  <rect x="568" y="432" width="176" height="76" rx="38" fill="#00ACC1"/>
  <text x="656" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="white"
    text-anchor="middle">📄</text>

  <!-- Link 4 (arrow = clipboard) -->
  <rect x="774" y="400" width="180" height="140" rx="70" fill="url(#link07)" stroke="#00ACC1" stroke-width="16"/>
  <rect x="808" y="440" width="112" height="60" rx="30" fill="#00ACC1"/>
  <text x="864" y="478" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="white"
    text-anchor="middle">📋</text>

  <!-- Layer 3: Path text under the chain -->
  <text x="512" y="670" font-family="'Courier New',monospace" font-size="72" font-weight="bold"
    fill="white" text-anchor="middle">C:\folder\file</text>

  <text x="512" y="800" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">COPY · PATH</text>

  <text x="512" y="890" font-family="'Segoe UI',Arial,sans-serif" font-size="52"
    fill="white" text-anchor="middle" opacity="0.7">link paths · 9 formats</text>
</svg>
