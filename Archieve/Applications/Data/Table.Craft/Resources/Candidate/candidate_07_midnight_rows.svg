<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon table frame -->
  <rect x="72" y="104" width="368" height="304" rx="16" fill="none" stroke="url(#neon)" stroke-width="6"/>
  <!-- Header neon bar -->
  <rect x="72" y="104" width="368" height="60" rx="16" fill="#00E5FF" opacity="0.15"/>
  <rect x="72" y="148" width="368" height="16" fill="#00E5FF" opacity="0.15"/>
  <!-- Alternating row fills -->
  <rect x="73" y="164" width="366" height="48" fill="#7C4DFF" opacity="0.1"/>
  <rect x="73" y="260" width="366" height="48" fill="#7C4DFF" opacity="0.1"/>
  <rect x="73" y="356" width="366" height="51" rx="16" fill="#7C4DFF" opacity="0.1"/>
  <!-- Row separators -->
  <line x1="72" y1="212" x2="440" y2="212" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <line x1="72" y1="260" x2="440" y2="260" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <line x1="72" y1="308" x2="440" y2="308" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <line x1="72" y1="356" x2="440" y2="356" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <!-- Column separators -->
  <line x1="200" y1="164" x2="200" y2="408" stroke="#7C4DFF" stroke-width="2" opacity="0.5"/>
  <line x1="328" y1="164" x2="328" y2="408" stroke="#7C4DFF" stroke-width="2" opacity="0.5"/>
  <!-- Neon header text -->
  <rect x="92" y="122" width="80" height="8" rx="4" fill="#00E5FF" opacity="0.9"/>
  <rect x="220" y="122" width="80" height="8" rx="4" fill="#7C4DFF" opacity="0.9"/>
  <rect x="348" y="122" width="72" height="8" rx="4" fill="#00E5FF" opacity="0.9"/>
  <!-- Data lines -->
  <rect x="92" y="184" width="88" height="6" rx="3" fill="#B0BEC5" opacity="0.7"/>
  <rect x="220" y="184" width="60" height="6" rx="3" fill="#B0BEC5" opacity="0.7"/>
  <rect x="348" y="184" width="72" height="6" rx="3" fill="#00E5FF" opacity="0.8"/>
  <rect x="92" y="232" width="60" height="6" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="220" y="232" width="88" height="6" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="348" y="232" width="50" height="6" rx="3" fill="#7C4DFF" opacity="0.8"/>
  <rect x="92" y="280" width="80" height="6" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="220" y="280" width="50" height="6" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="348" y="280" width="72" height="6" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="92" y="328" width="60" height="6" rx="3" fill="#B0BEC5" opacity="0.5"/>
  <rect x="220" y="328" width="80" height="6" rx="3" fill="#B0BEC5" opacity="0.5"/>
  <rect x="348" y="328" width="40" height="6" rx="3" fill="#00E5FF" opacity="0.7"/>
  <rect x="92" y="376" width="88" height="6" rx="3" fill="#B0BEC5" opacity="0.5"/>
  <rect x="220" y="376" width="40" height="6" rx="3" fill="#B0BEC5" opacity="0.5"/>
  <rect x="348" y="376" width="72" height="6" rx="3" fill="#B0BEC5" opacity="0.5"/>
</svg>
