<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="80" y="100" width="352" height="250" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
  <rect x="92" y="112" width="328" height="226" rx="6" fill="url(#screen)"/>
  <!-- Screen content - terminal output -->
  <text x="108" y="140" font-family="monospace" font-size="13" fill="#00ff41">$ port-watch --scan localhost</text>
  <text x="108" y="160" font-family="monospace" font-size="12" fill="#888888">Scanning ports...</text>
  <text x="108" y="180" font-family="monospace" font-size="12" fill="#00ff41">PORT    STATE    SERVICE</text>
  <line x1="108" y1="186" x2="404" y2="186" stroke="#333" stroke-width="1"/>
  <text x="108" y="200" font-family="monospace" font-size="11" fill="#58a6ff">80/tcp  OPEN     http</text>
  <text x="108" y="216" font-family="monospace" font-size="11" fill="#58a6ff">443/tcp OPEN     https</text>
  <text x="108" y="232" font-family="monospace" font-size="11" fill="#f85149">3389/tcp OPEN    rdp</text>
  <text x="108" y="248" font-family="monospace" font-size="11" fill="#58a6ff">8080/tcp OPEN    http-alt</text>
  <text x="108" y="264" font-family="monospace" font-size="11" fill="#888888">22/tcp  CLOSED   ssh</text>
  <text x="108" y="284" font-family="monospace" font-size="11" fill="#ffa500">_</text>
  <!-- Monitor stand -->
  <rect x="228" y="350" width="56" height="30" rx="4" fill="#333"/>
  <rect x="180" y="376" width="152" height="16" rx="6" fill="#3a3a3a"/>
  <!-- Alert indicator -->
  <circle cx="404" cy="200" r="6" fill="#f85149"/>
  <circle cx="404" cy="200" r="10" fill="none" stroke="#f85149" stroke-width="1.5" opacity="0.6"/>
</svg>
