<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#12082A"/>
    </linearGradient>
    <radialGradient id="ballGlow01" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#AADDFF"/>
    </radialGradient>
    <clipPath id="frame01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <g clip-path="url(#frame01)">
    <!-- Layer 2: Brick grid (5 rows x 8 cols) -->
    <!-- Row 1 - Hot Pink -->
    <rect x="82" y="130" width="106" height="48" rx="8" fill="#FF2D55"/>
    <rect x="198" y="130" width="106" height="48" rx="8" fill="#FF4D70"/>
    <rect x="314" y="130" width="106" height="48" rx="8" fill="#FF2D55"/>
    <rect x="430" y="130" width="106" height="48" rx="8" fill="#FF4D70"/>
    <rect x="546" y="130" width="106" height="48" rx="8" fill="#FF2D55"/>
    <rect x="662" y="130" width="106" height="48" rx="8" fill="#FF4D70"/>
    <rect x="778" y="130" width="106" height="48" rx="8" fill="#FF2D55"/>
    <!-- Brick shine -->
    <rect x="82" y="130" width="106" height="14" rx="7" fill="white" opacity="0.15"/>
    <rect x="198" y="130" width="106" height="14" rx="7" fill="white" opacity="0.12"/>
    <rect x="314" y="130" width="106" height="14" rx="7" fill="white" opacity="0.15"/>
