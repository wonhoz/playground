<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 보석 크리스탈 — 단어들이 결정체를 이루는 구조 | 기하학 | #001A1A -->
  <defs>
    <filter id="crystalGlow8">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="crystal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88FFFF"/>
      <stop offset="100%" stop-color="#0088AA"/>
    </linearGradient>
    <linearGradient id="crystal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AAFFEE"/>
      <stop offset="100%" stop-color="#006688"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#001A1A"/>
  <!-- Ambient sparkles -->
  <circle cx="200" cy="250" r="3" fill="#22D3EE" opacity="0.5" filter="url(#crystalGlow8)"/>
  <circle cx="820" cy="280" r="2" fill="#88FFFF" opacity="0.4" filter="url(#crystalGlow8)"/>
  <circle cx="180" cy="720" r="3" fill="#22D3EE" opacity="0.4" filter="url(#crystalGlow8)"/>
  <circle cx="840" cy="700" r="2" fill="#88FFFF" opacity="0.5" filter="url(#crystalGlow8)"/>
  <!-- Layer 2: Crystal facets forming from words -->
  <!-- Central large crystal shard -->
  <polygon points="512,220 600,380 512,500 424,380" fill="url(#crystal1)" stroke="#88FFFF" stroke-width="3" filter="url(#crystalGlow8)" opacity="0.9"/>
  <!-- Word inside central crystal -->
  <text x="512" y="370" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">cloud</text>
  <!-- Left upper crystal shard -->
  <polygon points="388,290 452,380 388,460 324,380" fill="url(#crystal2)" stroke="#44DDDD" stroke-width="3" filter="url(#crystalGlow8)" opacity="0.85"/>
  <text x="388" y="385" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">단어</text>
  <!-- Right upper crystal shard -->
  <polygon points="636,290 700,380 636,460 572,380" fill="url(#crystal1)" stroke="#44DDDD" stroke-width="3" filter="url(#crystalGlow8)" opacity="0.85"/>
  <text x="636" y="385" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">word</text>
  <!-- Bottom center crystal -->
  <polygon points="512,500 600,600 512,700 424,600" fill="url(#crystal2)" stroke="#22D3EE" stroke-width="3" filter="url(#crystalGlow8)" opacity="0.8"/>
  <text x="512" y="608" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.8">텍스트</text>
  <!-- Far left crystal (smaller) -->
  <polygon points="270,380 318,460 270,540 222,460" fill="#006688" stroke="#22AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.7"/>
  <text x="270" y="465" font-family="Arial,sans-serif" font-size="13" fill="#88FFEE" text-anchor="middle" opacity="0.8">빈도</text>
  <!-- Far right crystal -->
  <polygon points="754,380 802,460 754,540 706,460" fill="#006688" stroke="#22AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.7"/>
  <text x="754" y="465" font-family="Arial,sans-serif" font-size="13" fill="#88FFEE" text-anchor="middle" opacity="0.8">AI</text>
  <!-- Small satellite crystals -->
  <polygon points="320,220 352,280 320,340 288,280" fill="#004455" stroke="#11AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.6"/>
  <text x="320" y="284" font-family="Arial,sans-serif" font-size="10" fill="#66EEDD" text-anchor="middle">NLP</text>
  <polygon points="704,220 736,280 704,340 672,280" fill="#004455" stroke="#11AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.6"/>
  <text x="704" y="284" font-family="Arial,sans-serif" font-size="10" fill="#66EEDD" text-anchor="middle">분석</text>
  <polygon points="390,650 422,710 390,770 358,710" fill="#004455" stroke="#11AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.6"/>
  <text x="390" y="714" font-family="Arial,sans-serif" font-size="10" fill="#66EEDD" text-anchor="middle">구름</text>
  <polygon points="634,650 666,710 634,770 602,710" fill="#004455" stroke="#11AAAA" stroke-width="2" filter="url(#crystalGlow8)" opacity="0.6"/>
  <text x="634" y="714" font-family="Arial,sans-serif" font-size="10" fill="#66EEDD" text-anchor="middle">언어</text>
  <!-- Crystal connection lines (lattice) -->
  <line x1="452" y1="380" x2="512" y2="380" stroke="#22D3EE" stroke-width="2" opacity="0.4"/>
  <line x1="572" y1="380" x2="512" y2="380" stroke="#22D3EE" stroke-width="2" opacity="0.4"/>
  <line x1="388" y1="460" x2="424" y2="500" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <line x1="636" y1="460" x2="600" y2="500" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <!-- Layer 3: Bottom label -->
  <text x="512" y="860" font-family="Arial,sans-serif" font-size="18" fill="#22D3EE" text-anchor="middle" opacity="0.7">Word Crystal Lattice</text>
</svg>
