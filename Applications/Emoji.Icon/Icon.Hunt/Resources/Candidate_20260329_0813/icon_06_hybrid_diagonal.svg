<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Emoji/icons streaming diagonally into a search funnel -->
  <!-- Diagonal stream of emoji -->
  <text x="160" y="260" font-size="96" opacity="0.9">😀</text>
  <text x="260" y="340" font-size="96" opacity="0.8">🌟</text>
  <text x="160" y="420" font-size="80" opacity="0.7">🔥</text>
  <text x="320" y="460" font-size="80" opacity="0.6">💎</text>
  <text x="200" y="540" font-size="72" opacity="0.5">🎯</text>
  <text x="380" y="560" font-size="72" opacity="0.4">🚀</text>
  <!-- Funnel/filter pointing to result -->
  <path d="M 500 300 L 700 300 L 640 480 L 580 480 L 520 480 Z" fill="white" opacity="0.8"/>
  <rect x="550" y="480" width="80" height="120" rx="10" fill="white" opacity="0.8"/>
  <!-- Arrow diagonal down to result -->
  <line x1="590" y1="610" x2="640" y2="700" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <polygon points="640,700 618,674 650,674" fill="white"/>
  <!-- Winner/result emoji highlighted -->
  <circle cx="730" cy="780" r="110" fill="white" opacity="0.95"/>
  <text x="730" y="820" font-size="120" text-anchor="middle">🎯</text>
  <!-- Layer 3: sparkle around result -->
  <circle cx="620" cy="690" r="16" fill="#FDE047"/>
  <circle cx="840" cy="700" r="12" fill="#FDE047"/>
  <circle cx="710" cy="670" r="10" fill="#FDE047"/>
  <circle cx="760" cy="895" r="14" fill="#FDE047" opacity="0.6"/>
</svg>
