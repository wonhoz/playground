  <rect x="72" y="152" width="80" height="36" rx="18" fill="#001f1f" stroke="#00e5cc" stroke-width="2"/>
  <text x="84" y="175" font-family="monospace" font-size="14" fill="#00e5cc">Ctrl+Z</text>
  <rect x="210" y="76" width="92" height="36" rx="18" fill="#001f1f" stroke="#00e5cc" stroke-width="2"/>
  <text x="222" y="99" font-family="monospace" font-size="14" fill="#00e5cc">Alt+F4</text>
  <rect x="358" y="152" width="88" height="36" rx="18" fill="#00e5cc" opacity="0.9"/>
  <text x="370" y="175" font-family="monospace" font-size="14" fill="#001a1a" font-weight="bold">Win+D</text>
  <rect x="64" y="296" width="88" height="36" rx="18" fill="#001f1f" stroke="#00b3a0" stroke-width="2"/>
  <text x="72" y="319" font-family="monospace" font-size="14" fill="#00b3a0">Ctrl+S</text>
