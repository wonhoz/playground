<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#0F0520"/>
    </radialGradient>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="neon02">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg02)"/>
  <!-- 별 -->
  <circle cx="180" cy="150" r="4" fill="white" opacity="0.6"/>
  <circle cx="350" cy="100" r="3" fill="white" opacity="0.4"/>
  <circle cx="780" cy="130" r="4" fill="white" opacity="0.5"/>
  <circle cx="920" cy="200" r="3" fill="white" opacity="0.4"/>
  <circle cx="100" cy="700" r="3" fill="white" opacity="0.5"/>
  <circle cx="900" cy="750" r="4" fill="white" opacity="0.4"/>
  <!-- 잔상 1 (가장 흐린) -->
  <polygon points="190,520 280,620 190,720 100,620" fill="#0891B2" opacity="0.18"/>
  <!-- 잔상 2 -->
  <polygon points="280,488 400,612 280,736 160,612" fill="#0891B2" opacity="0.28"/>
  <!-- 잔상 3 -->
  <polygon points="360,460 510,612 360,764 210,612" fill="#06B6D4" opacity="0.38"/>
  <!-- 잔상 4 -->
  <polygon points="430,432 610,612 430,792 250,612" fill="#22D3EE" opacity="0.5"/>
  <!-- 궤적 라인 -->
  <path d="M140 612 L640 612" stroke="url(#trailGrad)" stroke-width="24" opacity="0.6" stroke-linecap="round"/>
  <!-- 총알들 (경로 주변) -->
  <circle cx="700" cy="310" r="40" fill="#FCD34D" filter="url(#neon02)"/>
  <circle cx="800" cy="460" r="36" fill="#F472B6" filter="url(#neon02)"/>
  <circle cx="820" cy="620" r="38" fill="#FCD34D" filter="url(#neon02)"/>
  <circle cx="750" cy="780" r="34" fill="#F472B6" filter="url(#neon02)"/>
  <circle cx="580" cy="840" r="32" fill="#FB923C" opacity="0.8"/>
  <circle cx="380" cy="840" r="30" fill="#FCD34D" opacity="0.7"/>
  <circle cx="220" cy="840" r="28" fill="#F472B6" opacity="0.6"/>
  <!-- 현재 다이아몬드 (오른쪽으로 이동 중) -->
  <polygon points="640,512 780,632 640,752 500,632" fill="#22D3EE" filter="url(#neon02)"/>
  <polygon points="640,542 752,632 640,722 528,632" fill="#38BDF8"/>
  <polygon points="640,576 716,632 640,688 564,632" fill="#7DD3FC"/>
  <!-- 다이아몬드 하이라이트 -->
  <polygon points="640,576 716,632 640,630 600,600" fill="white" opacity="0.4"/>
  <!-- 속도 라인들 -->
  <line x1="476" y1="570" x2="370" y2="570" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="476" y1="612" x2="350" y2="612" stroke="#22D3EE" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="476" y1="654" x2="370" y2="654" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
</svg>
