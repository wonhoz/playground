<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal · 레이어드 · 여러 포맷 카드 스택 -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9CC"/>
      <stop offset="1" stop-color="#FFC69C"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- 뒷 카드(teal) -->
  <g transform="rotate(-9 512 530)">
    <rect x="160" y="290" width="704" height="150" rx="30" fill="#1ABC9C" stroke="#0E8B75" stroke-width="12"/>
    <text x="200" y="390" font-family="Consolas, monospace" font-weight="700" font-size="88" fill="#FFFFFF">file:///C:/docs</text>
  </g>
  <!-- 중간 카드(purple) -->
  <g transform="rotate(-3 512 560)">
    <rect x="150" y="450" width="724" height="150" rx="30" fill="#9B59B6" stroke="#6C3483" stroke-width="12"/>
    <text x="190" y="550" font-family="Consolas, monospace" font-weight="700" font-size="88" fill="#FFFFFF">/c/docs/note</text>
  </g>
  <!-- 앞 카드(blue) -->
  <g transform="rotate(4 512 650)">
    <rect x="140" y="610" width="744" height="150" rx="30" fill="#3A86FF" stroke="#1E5CC9" stroke-width="12"/>
    <text x="180" y="710" font-family="Consolas, monospace" font-weight="700" font-size="88" fill="#FFFFFF">C:\docs\note</text>
  </g>
  <!-- 상단 배지 -->
  <rect x="352" y="130" width="320" height="120" rx="36" fill="#FFFFFF" stroke="#2C3E50" stroke-width="12"/>
  <text x="512" y="218" font-family="Arial Black, sans-serif" font-weight="900" font-size="90" fill="#FF6B35" text-anchor="middle">COPY</text>
</svg>
