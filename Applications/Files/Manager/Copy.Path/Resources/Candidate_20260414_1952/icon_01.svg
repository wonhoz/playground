<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 따뜻한 주황/노랑 그라데이션 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A3C"/>
      <stop offset="100%" style="stop-color:#FFD166"/>
    </linearGradient>
    <linearGradient id="card01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFF5E0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 팝업 카드 -->
  <rect x="180" y="260" width="664" height="420" rx="24" fill="url(#card01)" stroke="#FF9A3C" stroke-width="8"/>
  <!-- Layer 3: 경로 텍스트 행들 -->
  <text x="220" y="340" font-family="Consolas, monospace" font-size="76" font-weight="bold" fill="#CC4400">C:\</text>
  <text x="220" y="420" font-family="Consolas, monospace" font-size="76" font-weight="bold" fill="#FF6B00">path\to\</text>
  <!-- 구분선 -->
  <line x1="210" y1="450" x2="814" y2="450" stroke="#FFB366" stroke-width="4"/>
  <!-- 두 번째 형식 -->
  <text x="220" y="530" font-family="Consolas, monospace" font-size="72" fill="#444444">C:/path/to/</text>
  <!-- 복사 버튼 (우하단) -->
  <rect x="660" y="570" width="140" height="70" rx="12" fill="#FF9A3C"/>
  <text x="730" y="618" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Copy</text>
  <!-- 클립보드 아이콘 (카드 위 왼쪽) -->
  <rect x="430" y="180" width="164" height="120" rx="14" fill="#FF6B00" stroke="#CC4400" stroke-width="6"/>
  <rect x="462" y="164" width="100" height="36" rx="10" fill="#FFFFFF" stroke="#CC4400" stroke-width="6"/>
  <line x1="462" y1="220" x2="562" y2="220" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="462" y1="248" x2="562" y2="248" stroke="white" stroke-width="10" stroke-linecap="round"/>
</svg>
