<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 하늘색 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: 왼쪽 SVG 라벨 박스 -->
  <rect x="80" y="340" width="310" height="200" rx="24" fill="#0288D1"/>
  <text x="235" y="468" font-family="Arial Black, sans-serif" font-size="108" font-weight="900" fill="white" text-anchor="middle">SVG</text>

  <!-- Layer 2: 오른쪽 ICO 라벨 박스 -->
  <rect x="634" y="340" width="310" height="200" rx="24" fill="#FF6D00"/>
  <text x="789" y="468" font-family="Arial Black, sans-serif" font-size="108" font-weight="900" fill="white" text-anchor="middle">ICO</text>

  <!-- Layer 3: 변환 화살표 -->
  <path d="M420 440 L560 440 L530 395 M560 440 L530 485" stroke="url(#arrow1)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Layer 3: 작은 포맷 뱃지들 -->
  <rect x="195" y="590" width="120" height="52" rx="12" fill="#4FC3F7"/>
  <text x="255" y="626" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">PNG</text>

  <rect x="325" y="590" width="120" height="52" rx="12" fill="#26C6DA"/>
  <text x="385" y="626" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">JPG</text>

  <rect x="455" y="590" width="120" height="52" rx="12" fill="#80CBC4"/>
  <text x="515" y="626" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">BMP</text>
</svg>
