<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E040FB"/>
      <stop offset="100%" style="stop-color:#AA00FF"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#651FFF"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B388FF"/>
      <stop offset="100%" style="stop-color:#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="256,100 400,185 256,270 112,185" fill="url(#faceTop)"/>
  <!-- Left face -->
  <polygon points="112,185 256,270 256,410 112,325" fill="url(#faceLeft)"/>
  <!-- Right face -->
  <polygon points="256,270 400,185 400,325 256,410" fill="url(#faceRight)"/>
  <!-- Edge highlights -->
  <polyline points="256,100 400,185 400,325 256,410 112,325 112,185 256,100" fill="none" stroke="#E040FB" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="270" x2="256" y2="410" stroke="#CE93D8" stroke-width="2" opacity="0.5"/>
</svg>
