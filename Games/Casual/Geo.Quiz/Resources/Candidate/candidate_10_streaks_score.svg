<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <radialGradient id="globeMini" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trophy / Score card header -->
  <rect x="60" y="60" width="392" height="110" rx="18" fill="#0d1a5c" stroke="#ffee58" stroke-width="2"/>
  <!-- Trophy icon -->
  <text x="110" y="130" font-family="Arial" font-size="60" text-anchor="middle">🏆</text>
  <!-- Score display -->
  <text x="270" y="95" font-family="Arial" font-size="14" fill="#9fa8da">HIGH SCORE</text>
  <text x="270" y="135" font-family="Arial" font-size="42" font-weight="900" fill="url(#scoreGrad)" text-anchor="left">9,480</text>
  <!-- Rank badge -->
  <rect x="380" y="78" width="60" height="30" rx="8" fill="#ff6d00"/>
  <text x="410" y="98" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">TOP 1%</text>
  <!-- Globe mini -->
  <circle cx="120" cy="280" r="80" fill="url(#globeMini)"/>
  <ellipse cx="120" cy="280" rx="80" ry="16" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="255" rx="72" ry="11" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="120" cy="305" rx="72" ry="11" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="120" cy="280" rx="28" ry="80" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="120" cy="280" rx="60" ry="80" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <!-- Mini land -->
  <ellipse cx="110" cy="268" rx="30" ry="20" fill="#2e7d32" opacity="0.7"/>
  <ellipse cx="145" cy="278" rx="22" ry="15" fill="#388e3c" opacity="0.65"/>
  <!-- Streak counter -->
  <rect x="230" y="200" width="220" height="80" rx="14" fill="#0d1a5c" stroke="#ff9100" stroke-width="2"/>
  <text x="250" y="228" font-family="Arial" font-size="12" fill="#ffcc80">CURRENT STREAK</text>
  <text x="250" y="266" font-family="Arial" font-size="32" font-weight="900" fill="#ff9100">🔥 12</text>
  <!-- Question count -->
  <rect x="230" y="300" width="100" height="60" rx="12" fill="#0d1a5c" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="280" y="322" font-family="Arial" font-size="11" fill="#90caf9" text-anchor="middle">CORRECT</text>
  <text x="280" y="350" font-family="Arial" font-size="26" font-weight="bold" fill="#64b5f6" text-anchor="middle">48/60</text>
  <!-- Accuracy -->
  <rect x="350" y="300" width="100" height="60" rx="12" fill="#0d1a5c" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="400" y="322" font-family="Arial" font-size="11" fill="#80cbc4" text-anchor="middle">ACCURACY</text>
  <text x="400" y="350" font-family="Arial" font-size="26" font-weight="bold" fill="#69f0ae" text-anchor="middle">80%</text>
  <!-- Progress bar -->
  <rect x="60" y="390" width="392" height="20" rx="10" fill="#0d1a5c"/>
  <rect x="60" y="390" width="314" height="20" rx="10" fill="#1976d2"/>
  <rect x="60" y="390" width="180" height="20" rx="10" fill="#64b5f6"/>
  <text x="256" y="406" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Level 12 — 80%</text>
  <!-- Title -->
  <text x="256" y="460" font-family="Arial" font-size="36" font-weight="900" fill="url(#scoreGrad)" text-anchor="middle" letter-spacing="3">GEO.QUIZ</text>
  <text x="256" y="490" font-family="Arial" font-size="14" fill="#9fa8da" text-anchor="middle">World Geography Challenge</text>
</svg>
