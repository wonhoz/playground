  <!-- Pulse/EKG style waveform -->
  <polyline points="
    140,512
    220,512
    260,512
    300,512
    340,300
    380,720
    420,380
    460,640
    500,512
    540,512
    580,512
    620,320
    660,700
    700,400
    740,620
    780,512
    840,512
    880,512"
    stroke="#26C6DA" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Baseline -->
  <line x1="140" y1="512" x2="880" y2="512" stroke="#00838F" stroke-width="6" opacity="0.3" stroke-dasharray="12,8"/>
  <!-- Live indicator dot -->
  <circle cx="880" cy="512" r="28" fill="#26C6DA"/>
  <circle cx="880" cy="512" r="44" fill="none" stroke="#26C6DA" stroke-width="8" opacity="0.4"/>
  <circle cx="880" cy="512" r="60" fill="none" stroke="#26C6DA" stroke-width="6" opacity="0.2"/>
