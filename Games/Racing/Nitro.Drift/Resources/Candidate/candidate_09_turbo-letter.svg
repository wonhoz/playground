<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#200500"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speed lines -->
  <line x1="30" y1="180" x2="220" y2="180" stroke="#ff4400" stroke-width="4" opacity="0.6"/>
  <line x1="30" y1="200" x2="200" y2="200" stroke="#ff6600" stroke-width="3" opacity="0.4"/>
  <line x1="30" y1="260" x2="210" y2="260" stroke="#ff4400" stroke-width="4" opacity="0.6"/>
  <line x1="30" y1="280" x2="195" y2="280" stroke="#ff6600" stroke-width="3" opacity="0.4"/>
  <line x1="30" y1="340" x2="205" y2="340" stroke="#ff4400" stroke-width="4" opacity="0.6"/>
  <line x1="30" y1="360" x2="190" y2="360" stroke="#ff6600" stroke-width="3" opacity="0.4"/>
  <!-- Big N letter -->
  <text x="200" y="370" font-family="Arial Black" font-size="280" font-weight="900" fill="url(#letter)" opacity="0.95">N</text>
  <!-- Exhaust particles -->
  <circle cx="215" cy="190" r="5" fill="#ff6600" opacity="0.8"/>
  <circle cx="195" cy="205" r="4" fill="#ff4400" opacity="0.6"/>
  <circle cx="210" cy="270" r="5" fill="#ff6600" opacity="0.8"/>
  <circle cx="192" cy="288" r="3" fill="#ff4400" opacity="0.6"/>
  <circle cx="205" cy="350" r="5" fill="#ff6600" opacity="0.8"/>
  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black" font-size="28" font-weight="900" fill="#ff6600">NITRO.DRIFT</text>
</svg>
