  <path d="M210,210 Q180,210 170,230 L170,282 Q170,302 210,302" fill="none" stroke="url(#b3)" stroke-width="14" stroke-linecap="round"/>
  <path d="M302,210 Q332,210 342,230 L342,282 Q342,302 302,302" fill="none" stroke="url(#b3)" stroke-width="14" stroke-linecap="round"/>
  <!-- Layer 2 (middle) -->
