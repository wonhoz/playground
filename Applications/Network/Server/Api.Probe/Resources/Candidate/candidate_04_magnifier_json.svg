<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#2A2A3E"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- JSON content behind -->
  <text x="70" y="120" font-family="monospace" font-size="14" fill="#888">{</text>
  <text x="90" y="145" font-family="monospace" font-size="14" fill="#6366F1">"id":</text>
  <text x="160" y="145" font-family="monospace" font-size="14" fill="#F59E0B">42,</text>
  <text x="90" y="170" font-family="monospace" font-size="14" fill="#6366F1">"name":</text>
  <text x="180" y="170" font-family="monospace" font-size="14" fill="#10B981">"probe",</text>
  <text x="90" y="195" font-family="monospace" font-size="14" fill="#6366F1">"status":</text>
  <text x="200" y="195" font-family="monospace" font-size="14" fill="#34D399">200,</text>
  <text x="90" y="220" font-family="monospace" font-size="14" fill="#6366F1">"data":</text>
  <text x="170" y="220" font-family="monospace" font-size="14" fill="#888">[...]</text>
  <text x="70" y="245" font-family="monospace" font-size="14" fill="#888">}</text>
  <!-- Magnifier circle -->
  <circle cx="290" cy="250" r="140" fill="url(#glass)" stroke="#3B82F6" stroke-width="4"/>
  <!-- Magnifier handle -->
  <line x1="390" y1="350" x2="450" y2="420" stroke="#3B82F6" stroke-width="16" stroke-linecap="round"/>
  <!-- Highlighted/enlarged text inside magnifier -->
  <text x="215" y="210" font-family="monospace" font-size="18" fill="#34D399">"status":</text>
  <text x="215" y="240" font-family="monospace" font-weight="bold" font-size="30" fill="#10B981">200</text>
  <text x="215" y="275" font-family="monospace" font-size="16" fill="#60A5FA">OK</text>
</svg>