<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 망원경/눈 — 포트 감시 은유 | 중앙 심볼 | 라벤더+파랑+초록 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <filter id="sh5" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#4A148C" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="eyeball" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Layer 2: Large eye shape -->
  <!-- Eye whites -->
  <ellipse cx="512" cy="460" rx="380" ry="220" fill="url(#eyeball)" filter="url(#sh5)"/>
  <!-- Eye outline -->
  <path d="M132,460 Q512,120 892,460 Q512,800 132,460Z" fill="none" stroke="#1565C0" stroke-width="28"/>

  <!-- Iris (blue) -->
  <circle cx="512" cy="460" r="150" fill="#1565C0" filter="url(#sh5)"/>
  <!-- Iris detail -->
  <circle cx="512" cy="460" r="130" fill="#1976D2"/>
  <!-- Pupil -->
  <circle cx="512" cy="460" r="72" fill="#0D47A1"/>
  <!-- Pupil - center -->
  <circle cx="512" cy="460" r="36" fill="#000051"/>
  <!-- Reflection highlight -->
  <circle cx="548" cy="432" r="26" fill="white" opacity="0.7"/>
  <circle cx="480" cy="480" r="14" fill="white" opacity="0.4"/>

  <!-- Layer 3: Port numbers in iris (like targeting reticle) -->
  <!-- Reticle lines -->
  <line x1="512" y1="316" x2="512" y2="380" stroke="#90CAF9" stroke-width="8" opacity="0.8"/>
  <line x1="512" y1="540" x2="512" y2="604" stroke="#90CAF9" stroke-width="8" opacity="0.8"/>
  <line x1="368" y1="460" x2="432" y2="460" stroke="#90CAF9" stroke-width="8" opacity="0.8"/>
  <line x1="592" y1="460" x2="656" y2="460" stroke="#90CAF9" stroke-width="8" opacity="0.8"/>

  <!-- Port badges below eye -->
  <rect x="120" y="730" width="220" height="76" rx="22" fill="#1565C0" filter="url(#sh5)"/>
  <text x="230" y="768" font-family="Consolas, monospace" font-size="44" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">:8080</text>

  <rect x="402" y="730" width="220" height="76" rx="22" fill="#43A047" filter="url(#sh5)"/>
  <text x="512" y="768" font-family="Consolas, monospace" font-size="44" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">:443</text>

  <rect x="684" y="730" width="220" height="76" rx="22" fill="#1565C0" filter="url(#sh5)"/>
  <text x="794" y="768" font-family="Consolas, monospace" font-size="44" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">:80</text>

  <!-- Live indicator -->
  <circle cx="512" cy="880" r="22" fill="#43A047" filter="url(#sh5)"/>
  <circle cx="512" cy="880" r="36" fill="#43A047" opacity="0.3"/>
  <text x="554" y="880" font-family="Arial, sans-serif" font-size="36" fill="#2E7D32"
        dominant-baseline="middle">WATCHING</text>
</svg>
