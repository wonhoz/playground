    <rect x="360" y="328" width="22" height="22" rx="4" opacity="0.9"/>
    <rect x="392" y="328" width="22" height="22" rx="4" opacity="0.7"/>
    <rect x="328" y="360" width="22" height="22" rx="4" opacity="0.9"/>
    <rect x="360" y="360" width="22" height="22" rx="4" opacity="0.5"/>
    <rect x="296" y="392" width="22" height="22" rx="4" opacity="0.7"/>
    <rect x="360" y="392" width="22" height="22" rx="4" opacity="0.9"/>
