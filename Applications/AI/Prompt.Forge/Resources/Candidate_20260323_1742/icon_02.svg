<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1020"/>
  <!-- Layer 2: AI 서비스 선택 뱃지 3개 -->
  <!-- GPT 뱃지 (초록) -->
  <circle cx="220" cy="280" r="150" fill="#10A37F"/>
  <text x="220" y="310" font-size="120" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">G</text>
  <!-- Claude 뱃지 (주황) -->
  <circle cx="512" cy="280" r="150" fill="#CC785C"/>
  <text x="512" y="310" font-size="120" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">C</text>
  <!-- 기타 (보라) -->
  <circle cx="804" cy="280" r="150" fill="#7C3AED"/>
  <text x="804" y="310" font-size="120" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">✦</text>
  <!-- Layer 3: 프롬프트 입력 박스 -->
  <rect x="80" y="520" width="864" height="380" rx="24" fill="#161B22"/>
  <rect x="80" y="520" width="864" height="380" rx="24" fill="none" stroke="#30363D" stroke-width="6"/>
  <text x="140" y="620" font-size="52" fill="#58A6FF" font-family="monospace">&gt; Write a function to...</text>
  <text x="140" y="700" font-size="52" fill="#3D444D" font-family="monospace">_</text>
  <rect x="720" y="800" width="200" height="70" rx="12" fill="#1F6FEB"/>
  <text x="820" y="847" font-size="44" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">Send</text>
</svg>
