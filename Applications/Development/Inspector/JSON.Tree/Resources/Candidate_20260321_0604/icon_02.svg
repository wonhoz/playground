<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="jt2-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
  </defs>
  <g clip-path="url(#jt2-clip)">
    <!-- Background: Dark Slate -->
    <rect width="1024" height="1024" fill="#1A2030"/>

    <!-- Left file panel -->
