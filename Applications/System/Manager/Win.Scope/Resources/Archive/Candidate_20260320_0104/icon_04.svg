<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Window stack (3 windows behind) -->
  <rect x="200" y="280" width="380" height="280" rx="18" fill="#0D47A1" opacity="0.4"/>
  <rect x="160" y="330" width="380" height="280" rx="18" fill="#0D47A1" opacity="0.55"/>
  <rect x="120" y="380" width="380" height="280" rx="18" fill="#0D47A1" opacity="0.7"/>
  <!-- Window title bars -->
  <rect x="120" y="380" width="380" height="36" rx="10" fill="#1565C0" opacity="0.9"/>
  <circle cx="148" cy="398" r="8" fill="#42A5F5" opacity="0.7"/>
  <circle cx="172" cy="398" r="8" fill="#42A5F5" opacity="0.5"/>
  <!-- Magnifier glass -->
  <circle cx="680" cy="440" r="170" fill="none" stroke="#42A5F5" stroke-width="40"/>
  <circle cx="680" cy="440" r="130" fill="#0D47A1" opacity="0.3"/>
  <!-- Magnifier handle -->
  <line x1="800" y1="560" x2="880" y2="680" stroke="#42A5F5" stroke-width="44" stroke-linecap="round"/>
  <!-- Inner magnifier content (shows window detail) -->
  <rect x="600" y="380" width="160" height="120" rx="10" fill="#42A5F5" opacity="0.2"/>
  <rect x="600" y="380" width="160" height="28" rx="8" fill="#42A5F5" opacity="0.4"/>
  <!-- Focus sparkle -->
  <circle cx="680" cy="440" r="16" fill="#42A5F5" opacity="0.6"/>
</svg>
