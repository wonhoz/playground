<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 다크 -->
  <rect width="1024" height="1024" rx="190" fill="#212121"/>

  <!-- 황금 만년필/펜촉 실루엣 -->
  <!-- 펜 몸통 (세로로 약간 기울어짐) -->
  <!-- 펜 barrel (몸통) -->
  <rect x="450" y="215" width="80" height="340" rx="40" fill="#FFD700" transform="rotate(15 512 512)"/>
  <!-- 펜 clip -->
  <rect x="518" y="220" width="16" height="290" rx="8" fill="#FFA000" transform="rotate(15 512 512)"/>
  <!-- 펜 그라디언트 섀도우 -->
  <rect x="450" y="215" width="36" height="340" rx="40" fill="rgba(255,255,255,0.25)" transform="rotate(15 512 512)"/>
  <!-- 펜촉 부분 (아래쪽) -->
  <polygon points="450,555 530,555 490,640" fill="#B8860B" transform="rotate(15 512 512)"/>
  <polygon points="470,555 510,555 490,620" fill="#FFD700" transform="rotate(15 512 512)"/>
  <!-- 펜촉 끝 포인트 -->
  <polygon points="482,620 498,620 490,648" fill="#FFF9C4" transform="rotate(15 512 512)"/>
  <!-- 금속 링 -->
  <rect x="450" y="548" width="80" height="18" rx="4" fill="#B8860B" transform="rotate(15 512 512)"/>

  <!-- 잉크 방울 효과 (파란/황금) -->
  <ellipse cx="580" cy="700" rx="22" ry="28" fill="#1565C0" opacity="0.85"/>
  <ellipse cx="610" cy="730" rx="14" ry="18" fill="#1565C0" opacity="0.65"/>
  <ellipse cx="558" cy="735" rx="10" ry="13" fill="#FFD700" opacity="0.75"/>

  <!-- 격자 셀들 채워지는 효과 (펜 아래쪽) -->
  <rect x="560" y="680" width="90" height="90" rx="6" fill="rgba(255,255,255,0.9)" stroke="#FFD700" stroke-width="4"/>
  <rect x="650" y="680" width="90" height="90" rx="6" fill="rgba(255,255,255,0.7)" stroke="#FFD700" stroke-width="4"/>
  <rect x="560" y="770" width="90" height="90" rx="6" fill="rgba(255,255,255,0.5)" stroke="#FFD700" stroke-width="3" stroke-dasharray="8,5"/>
  <rect x="650" y="770" width="90" height="90" rx="6" fill="rgba(255,255,255,0.2)" stroke="#FFD700" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- 셀 안 알파벳 -->
  <text x="605" y="753" font-family="Arial Black" font-size="65" font-weight="bold" fill="#212121" text-anchor="middle">A</text>
  <text x="695" y="753" font-family="Arial Black" font-size="65" font-weight="bold" fill="#424242" text-anchor="middle">B</text>

  <!-- 힌트 번호 작게 -->
  <text x="565" y="698" font-family="Arial" font-size="28" fill="#FFD700">1</text>
  <text x="655" y="698" font-family="Arial" font-size="28" fill="#FFD700">2</text>

  <!-- 상단 좌측 작은 격자들 (배경 장식) -->
  <rect x="215" y="400" width="70" height="70" rx="4" fill="rgba(255,215,0,0.15)" stroke="#FFD700" stroke-width="2"/>
  <rect x="285" y="400" width="70" height="70" rx="4" fill="rgba(255,215,0,0.1)" stroke="#FFD700" stroke-width="2"/>
  <rect x="215" y="470" width="70" height="70" rx="4" fill="rgba(255,215,0,0.1)" stroke="#FFD700" stroke-width="2"/>
  <rect x="285" y="470" width="70" height="70" rx="4" fill="rgba(255,215,0,0.15)" stroke="#FFD700" stroke-width="2"/>

  <!-- 하단 타이틀 -->
  <text x="512" y="920" font-family="Arial Black" font-size="80" font-weight="bold" fill="#FFD700" text-anchor="middle">CROSSWORD</text>
</svg>
