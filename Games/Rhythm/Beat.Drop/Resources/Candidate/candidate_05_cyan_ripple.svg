<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000d15"/>
      <stop offset="100%" stop-color="#001a2a"/>
    </linearGradient>
    <radialGradient id="ripple" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#00AACC" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88FFFF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ripple circles from drop point -->
  <circle cx="256" cy="340" r="140" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.15"/>
  <circle cx="256" cy="340" r="110" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.25"/>
  <circle cx="256" cy="340" r="80" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="340" r="50" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="340" r="22" fill="#00FFFF" opacity="0.3"/>
  <!-- Glow -->
  <circle cx="256" cy="340" r="160" fill="url(#ripple)"/>
  <!-- Water drop falling -->
  <path d="M256,100 Q276,155 278,190 Q278,228 256,228 Q234,228 234,190 Q234,155 256,100 Z" fill="url(#drop)"/>
  <ellipse cx="248" cy="165" rx="7" ry="11" fill="white" opacity="0.35" transform="rotate(-20 248 165)"/>
  <!-- Motion blur trail -->
  <line x1="256" y1="228" x2="256" y2="310" stroke="#00FFFF" stroke-width="3" stroke-dasharray="8,6" opacity="0.5"/>
  <!-- Beat bars at bottom (thin) -->
  <rect x="96" y="435" width="16" height="40" rx="4" fill="#00FFFF" opacity="0.5"/>
  <rect x="122" y="420" width="16" height="55" rx="4" fill="#00FFFF" opacity="0.6"/>
  <rect x="148" y="405" width="16" height="70" rx="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="174" y="415" width="16" height="60" rx="4" fill="#00FFFF" opacity="0.65"/>
  <rect x="200" y="430" width="16" height="45" rx="4" fill="#00FFFF" opacity="0.55"/>
  <rect x="296" y="430" width="16" height="45" rx="4" fill="#00FFFF" opacity="0.55"/>
  <rect x="322" y="415" width="16" height="60" rx="4" fill="#00FFFF" opacity="0.65"/>
  <rect x="348" y="405" width="16" height="70" rx="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="374" y="420" width="16" height="55" rx="4" fill="#00FFFF" opacity="0.6"/>
  <rect x="400" y="435" width="16" height="40" rx="4" fill="#00FFFF" opacity="0.5"/>
</svg>