<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Piano keys — minimal modern -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0A"/>
  <!-- Piano body frame -->
  <rect x="140" y="280" width="744" height="480" rx="28" fill="#111" stroke="#E91E63" stroke-width="20"/>
  <!-- White keys (7 keys) -->
  <rect x="170" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="264" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="358" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="452" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="546" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="640" y="300" width="88" height="400" rx="0" fill="#F5F5F5"/>
  <rect x="734" y="300" width="80" height="400" rx="0" fill="#F5F5F5"/>
  <!-- Key separators -->
  <line x1="264" y1="300" x2="264" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <line x1="358" y1="300" x2="358" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <line x1="452" y1="300" x2="452" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <line x1="546" y1="300" x2="546" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <line x1="640" y1="300" x2="640" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <line x1="734" y1="300" x2="734" y2="700" stroke="#0A0A0A" stroke-width="6"/>
  <!-- Black keys (5 keys) -->
  <rect x="218" y="300" width="60" height="240" rx="6" fill="#1A1A1A"/>
  <rect x="312" y="300" width="60" height="240" rx="6" fill="#1A1A1A"/>
  <rect x="500" y="300" width="60" height="240" rx="6" fill="#1A1A1A"/>
  <rect x="594" y="300" width="60" height="240" rx="6" fill="#1A1A1A"/>
  <rect x="688" y="300" width="60" height="240" rx="6" fill="#1A1A1A"/>
  <!-- Active key highlight (one key pressed = pink glow) -->
  <rect x="452" y="300" width="88" height="400" rx="0" fill="#E91E63" opacity="0.25"/>
  <rect x="500" y="300" width="60" height="240" rx="6" fill="#E91E63" opacity="0.5"/>
  <!-- Frame border bottom round -->
  <rect x="140" y="668" width="744" height="52" rx="0" fill="#111"/>
  <rect x="140" y="696" width="744" height="24" rx="0" fill="#222"/>
  <rect x="140" y="696" width="744" height="64" rx="28" fill="#111" opacity="0"/>
</svg>
