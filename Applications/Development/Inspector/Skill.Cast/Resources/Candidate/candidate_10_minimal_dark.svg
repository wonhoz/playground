<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#1E1E2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Abstract skill cast icon -->
  <!-- Projection/cast rays -->
  <line x1="256" y1="256" x2="160" y2="120" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="100" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="256" x2="352" y2="120" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="110" y2="256" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="256" x2="402" y2="256" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- Skill nodes at ray ends -->
  <circle cx="160" cy="120" r="30" fill="#1E1E2E" stroke="#7C4DFF" stroke-width="2"/>
  <text x="144" y="125" font-family="monospace" font-size="14" fill="#CE93D8">C#</text>
  <circle cx="256" cy="100" r="30" fill="#1E1E2E" stroke="#E040FB" stroke-width="2"/>
  <text x="238" y="105" font-family="monospace" font-size="14" fill="#CE93D8">.NET</text>
  <circle cx="352" cy="120" r="30" fill="#1E1E2E" stroke="#7C4DFF" stroke-width="2"/>
  <text x="337" y="125" font-family="monospace" font-size="14" fill="#CE93D8">WPF</text>
  <circle cx="110" cy="256" r="26" fill="#1E1E2E" stroke="#7C4DFF" stroke-width="2"/>
  <text x="96" y="261" font-family="monospace" font-size="13" fill="#CE93D8">SQL</text>
  <circle cx="402" cy="256" r="26" fill="#1E1E2E" stroke="#7C4DFF" stroke-width="2"/>
  <text x="388" y="261" font-family="monospace" font-size="13" fill="#CE93D8">Git</text>
  <!-- Central node -->
  <circle cx="256" cy="256" r="46" fill="#1A0040" stroke="url(#accent)" stroke-width="3"/>
  <text x="228" y="251" font-family="monospace" font-size="14" fill="white" font-weight="bold">SKILL</text>
  <text x="229" y="269" font-family="monospace" font-size="14" fill="#CE93D8">CAST</text>
  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="#7C4DFF" stroke-width="1" stroke-dasharray="6,6" opacity="0.4"/>
</svg>
