<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel grid sand fall simulation -->
  <!-- Sky area (top) - sparse pixels -->
  <rect x="120" y="100" width="14" height="14" fill="#FFDD66" opacity="0.9"/>
  <rect x="180" y="90" width="14" height="14" fill="#FFCC44" opacity="0.8"/>
  <rect x="240" y="110" width="14" height="14" fill="#FFDD66" opacity="0.9"/>
  <rect x="300" y="95" width="14" height="14" fill="#FFB833" opacity="0.7"/>
  <rect x="360" y="105" width="14" height="14" fill="#FFDD66" opacity="0.9"/>
  <!-- Mid fall -->
  <rect x="110" y="150" width="14" height="14" fill="#FF8833" opacity="0.8"/>
  <rect x="170" y="160" width="14" height="14" fill="#FFAA44" opacity="0.9"/>
  <rect x="230" y="145" width="14" height="14" fill="#FFCC66" opacity="0.8"/>
  <rect x="290" y="155" width="14" height="14" fill="#FF8833" opacity="0.7"/>
  <rect x="350" y="150" width="14" height="14" fill="#FFAA44" opacity="0.9"/>
  <!-- Water pixels -->
  <rect x="140" y="180" width="14" height="14" fill="#4488FF" opacity="0.8"/>
  <rect x="320" y="175" width="14" height="14" fill="#44AAFF" opacity="0.9"/>
  <!-- More mid -->
  <rect x="100" y="210" width="14" height="14" fill="#CC6622" opacity="0.9"/>
  <rect x="160" y="200" width="14" height="14" fill="#FF9944" opacity="0.8"/>
  <rect x="220" y="215" width="14" height="14" fill="#FFBB55" opacity="0.9"/>
  <rect x="280" y="205" width="14" height="14" fill="#CC6622" opacity="0.8"/>
  <rect x="340" y="210" width="14" height="14" fill="#FF9944" opacity="0.9"/>
  <rect x="400" y="200" width="14" height="14" fill="#FFBB55" opacity="0.7"/>
  <!-- Dense accumulation at bottom -->
  <rect x="80" y="340" width="352" height="14" fill="#AA6622" opacity="0.8"/>
  <rect x="80" y="356" width="352" height="14" fill="#BB7733" opacity="0.9"/>
  <rect x="80" y="372" width="352" height="14" fill="#CC8844" opacity="0.9"/>
  <rect x="80" y="388" width="352" height="14" fill="#BB7733" opacity="0.8"/>
  <!-- Pile shape at bottom -->
  <rect x="120" y="324" width="272" height="14" fill="#996622" opacity="0.7"/>
  <rect x="160" y="310" width="192" height="14" fill="#886611" opacity="0.6"/>
  <rect x="200" y="296" width="112" height="14" fill="#775510" opacity="0.5"/>
  <rect x="230" y="282" width="52" height="14" fill="#664410" opacity="0.4"/>
  <!-- Rock/stone pixels -->
  <rect x="150" y="370" width="20" height="20" fill="#555544" opacity="0.9"/>
  <rect x="300" y="365" width="20" height="20" fill="#666655" opacity="0.9"/>
</svg>
