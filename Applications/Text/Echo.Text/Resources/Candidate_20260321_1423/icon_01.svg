<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <clipPath id="c1c"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1c)"/>
  <circle cx="820" cy="820" r="300" fill="#283593" opacity="0.2" clip-path="url(#c1c)"/>

  <!-- Layer 2: 스피커 + 텍스트 → 음파 (중앙심볼) -->
  <!-- 스피커 바디 -->
  <rect x="280" y="360" width="160" height="260" rx="18" fill="#5C6BC0"/>
  <!-- 스피커 콘 (왼쪽 돌출) -->
  <polygon points="280,380 200,320 200,580 280,520" fill="#7986CB"/>
  <!-- 스피커 콘 외곽선 -->
  <polygon points="280,380 200,320 200,580 280,520" fill="none" stroke="#9FA8DA" stroke-width="6"/>

  <!-- 텍스트 입력 힌트 (스피커 위 왼쪽) -->
  <rect x="210" y="220" width="220" height="80" rx="12" fill="#1A237E" stroke="#3F51B5" stroke-width="3"/>
  <text x="320" y="268" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#9FA8DA">Hello</text>
  <!-- 화살표 →스피커 -->
  <path d="M 320,300 L 320,355" stroke="#5C6BC0" stroke-width="4" stroke-linecap="round"/>
  <polygon points="310,348 320,370 330,348" fill="#5C6BC0"/>

  <!-- 음파들 (오른쪽) -->
  <path d="M 450,430 Q 510,490 450,560" fill="none" stroke="#5C6BC0" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <path d="M 490,390 Q 590,490 490,600" fill="none" stroke="#7986CB" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M 530,350 Q 670,490 530,640" fill="none" stroke="#9FA8DA" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
  <path d="M 580,310 Q 760,490 580,680" fill="none" stroke="#C5CAE9" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M 630,280 Q 850,490 630,710" fill="none" stroke="#E8EAF6" stroke-width="10" stroke-linecap="round" opacity="0.35"/>

  <!-- Layer 3: 하단 레이블 -->
  <rect x="280" y="730" width="464" height="56" rx="14" fill="#0D1B3E" opacity="0.9"/>
  <text x="512" y="765" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#7986CB">Text → Speech</text>
</svg>
