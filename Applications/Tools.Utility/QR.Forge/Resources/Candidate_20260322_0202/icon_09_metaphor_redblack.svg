  <!-- 중앙 로고 (흰 원 + 빨간 "F" = Forge) — 레이어드 핵심 -->
  <circle cx="512" cy="512" r="78" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="68" fill="url(#logoBg)"/>
  <!-- "F" 글자 -->
  <text x="512" y="540" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">F</text>
  <!-- 로고 테두리 -->
  <circle cx="512" cy="512" r="78" fill="none" stroke="#FF1744" stroke-width="4" opacity="0.8"/>
