  <rect x="508" y="220" width="156" height="104" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="586" y="285" font-family="Segoe UI Emoji,sans-serif" font-size="52" text-anchor="middle">🇺🇸</text>
  <rect x="682" y="220" width="156" height="104" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
