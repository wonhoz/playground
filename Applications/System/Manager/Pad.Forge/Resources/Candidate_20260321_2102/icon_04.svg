<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: 게임패드 (약간 기울어진) -->
  <g transform="rotate(-8, 512, 485)">
    <!-- 어깨 버튼 -->
    <rect x="256" y="348" width="136" height="36" rx="12" fill="white" opacity="0.85"/>
    <rect x="632" y="348" width="136" height="36" rx="12" fill="white" opacity="0.85"/>

    <!-- 패드 메인 바디 -->
    <rect x="238" y="374" width="548" height="222" rx="86" fill="white" opacity="0.95"/>
    <!-- 왼쪽 그립 -->
    <rect x="252" y="542" width="162" height="148" rx="56" fill="white" opacity="0.95"/>
    <!-- 오른쪽 그립 -->
    <rect x="610" y="542" width="162" height="148" rx="56" fill="white" opacity="0.95"/>

    <!-- 내부 패드 영역 어두운 테두리 느낌 -->
    <rect x="238" y="374" width="548" height="222" rx="86" fill="none" stroke="#00695C" stroke-width="3" opacity="0.3"/>

    <!-- D-pad -->
    <rect x="312" y="460" width="66" height="22" rx="5" fill="#00695C"/>
    <rect x="334" y="438" width="22" height="66" rx="5" fill="#00695C"/>

    <!-- 왼쪽 아날로그 스틱 -->
    <circle cx="410" cy="510" r="36" fill="#B2DFDB"/>
    <circle cx="410" cy="510" r="22" fill="#00897B"/>

    <!-- 오른쪽 아날로그 스틱 -->
    <circle cx="642" cy="528" r="36" fill="#B2DFDB"/>
    <circle cx="642" cy="528" r="22" fill="#00897B"/>

    <!-- ABXY 버튼 -->
    <circle cx="704" cy="488" r="22" fill="#43A047"/>
    <circle cx="742" cy="452" r="22" fill="#E53935"/>
    <circle cx="666" cy="452" r="22" fill="#1E88E5"/>
    <circle cx="704" cy="416" r="22" fill="#FDD835"/>
    <text x="704" y="488" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">A</text>
    <text x="742" y="452" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">B</text>
    <text x="666" y="452" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">X</text>
    <text x="704" y="416" text-anchor="middle" dominant-baseline="middle" fill="#555" font-size="16" font-family="Arial" font-weight="bold">Y</text>

    <!-- 홈 버튼 -->
    <circle cx="512" cy="462" r="18" fill="#B2DFDB"/>
    <circle cx="512" cy="462" r="11" fill="#00897B"/>
  </g>

  <!-- Layer 3: 편집 연필 (우측 하단) -->
  <circle cx="762" cy="752" r="105" fill="#004D40" opacity="0.95"/>
  <circle cx="762" cy="752" r="98" fill="#00695C"/>

  <!-- 연필 (중앙 배치, 45도 기울어짐) -->
  <g transform="translate(762, 752) rotate(-45)">
    <!-- 연필 지우개 -->
    <rect x="-18" y="-88" width="36" height="26" rx="5" fill="#FF8A80"/>
    <line x1="-18" y1="-64" x2="18" y2="-64" stroke="#E57373" stroke-width="3"/>
    <!-- 연필 몸통 -->
    <rect x="-18" y="-64" width="36" height="118" rx="3" fill="#FFEB3B"/>
    <!-- 연필 나무 끝 -->
    <rect x="-18" y="54" width="36" height="22" rx="2" fill="#FFCC02"/>
    <!-- 연필 팁 -->
    <polygon points="-18,76 18,76 0,110" fill="#FF8F00"/>
    <!-- 필기선 -->
    <line x1="0" y1="108" x2="-28" y2="136" stroke="#FFCC02" stroke-width="4" stroke-linecap="round"/>
    <!-- 연필 세로선 -->
    <line x1="-7" y1="-62" x2="-7" y2="54" stroke="#F9A825" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
