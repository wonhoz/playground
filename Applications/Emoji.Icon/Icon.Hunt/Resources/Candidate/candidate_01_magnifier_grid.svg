<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Icon grid background -->
  <!-- Row 1 -->
  <rect x="56" y="56" width="72" height="72" rx="14" fill="#0f3460" opacity="0.7"/>
  <text x="72" y="106" font-size="36">🎵</text>
  <rect x="144" y="56" width="72" height="72" rx="14" fill="#0f3460" opacity="0.7"/>
  <text x="160" y="106" font-size="36">📁</text>
  <rect x="232" y="56" width="72" height="72" rx="14" fill="#0f3460" opacity="0.7"/>
  <text x="248" y="106" font-size="36">⚙️</text>
  <rect x="320" y="56" width="72" height="72" rx="14" fill="#0f3460" opacity="0.5"/>
  <text x="336" y="106" font-size="36">🌐</text>
  <rect x="408" y="56" width="72" height="72" rx="14" fill="#0f3460" opacity="0.4"/>
  <text x="424" y="106" font-size="36">💡</text>
  <!-- Row 2 -->
  <rect x="56" y="144" width="72" height="72" rx="14" fill="#0f3460" opacity="0.5"/>
  <text x="72" y="194" font-size="36">🔔</text>
  <rect x="144" y="144" width="72" height="72" rx="14" fill="#0f3460" opacity="0.7"/>
  <text x="160" y="194" font-size="36">📧</text>
  <rect x="232" y="144" width="72" height="72" rx="14" fill="#0f3460" opacity="0.4"/>
  <text x="248" y="194" font-size="36">🔑</text>
  <rect x="320" y="144" width="72" height="72" rx="14" fill="#0f3460" opacity="0.6"/>
  <text x="336" y="194" font-size="36">🖥</text>
  <rect x="408" y="144" width="72" height="72" rx="14" fill="#0f3460" opacity="0.5"/>
  <text x="424" y="194" font-size="36">📊</text>
  <!-- Row 3 partial (behind lens) -->
  <rect x="56" y="232" width="72" height="72" rx="14" fill="#0f3460" opacity="0.3"/>
  <text x="72" y="282" font-size="36" opacity="0.4">🎨</text>
  <rect x="144" y="232" width="72" height="72" rx="14" fill="#0f3460" opacity="0.3"/>
  <text x="160" y="282" font-size="36" opacity="0.4">🔧</text>
  <!-- Magnifier glass -->
  <circle cx="300" cy="290" r="130" fill="#0a1628" opacity="0.92" stroke="#3b82f6" stroke-width="5"/>
  <!-- Icons inside magnifier (enlarged/focused) -->
  <rect x="200" y="220" width="80" height="80" rx="14" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="214" y="278" font-size="48">🎨</text>
  <rect x="296" y="220" width="80" height="80" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="278" font-size="48">🔧</text>
  <rect x="200" y="314" width="80" height="80" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="214" y="372" font-size="48">📌</text>
  <rect x="296" y="314" width="80" height="80" rx="14" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="310" y="372" font-size="48">⭐</text>
  <!-- Lens reflection -->
  <ellipse cx="248" cy="248" rx="32" ry="18" fill="white" opacity="0.06" transform="rotate(-30 248 248)"/>
  <!-- Magnifier handle -->
  <line x1="396" y1="386" x2="444" y2="434" stroke="url(#blue)" stroke-width="20" stroke-linecap="round"/>
  <!-- Search ring glow -->
  <circle cx="300" cy="290" r="130" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
</svg>
