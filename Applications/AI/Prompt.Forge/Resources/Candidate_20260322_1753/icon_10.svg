<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 로즈골드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF8A"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="key10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <!-- Layer 2: 황금 열쇠 -->
  <!-- 열쇠 고리 -->
  <circle cx="380" cy="400" r="160" fill="none" stroke="url(#key10)" stroke-width="80"/>
  <!-- 열쇠 몸통 -->
  <rect x="490" y="372" width="340" height="56" rx="28" fill="url(#key10)"/>
  <!-- 열쇠 이빨들 -->
  <rect x="680" y="428" width="48" height="60" rx="8" fill="url(#key10)"/>
  <rect x="760" y="428" width="36" height="44" rx="6" fill="url(#key10)"/>
  <!-- 열쇠 안쪽 구멍 -->
  <circle cx="380" cy="400" r="68" fill="url(#bg10)"/>
  <!-- Layer 3: AI 포인트 별들 — 열쇠가 열어주는 것 -->
  <!-- 열쇠 구멍 안의 AI 심볼 -->
  <text x="380" y="418" font-family="sans-serif" font-size="50" fill="#F59E0B" text-anchor="middle" opacity="0.9">✦</text>
  <!-- 오른쪽에 AI 포인트들 -->
  <circle cx="750" cy="280" r="28" fill="white" opacity="0.8"/>
  <text x="750" y="290" font-family="sans-serif" font-size="24" fill="#F59E0B" text-anchor="middle" font-weight="bold">AI</text>
  <!-- 문이 열리는 느낌의 빛 -->
  <circle cx="820" cy="560" r="50" fill="white" opacity="0.3"/>
  <circle cx="820" cy="560" r="30" fill="white" opacity="0.4"/>
  <circle cx="820" cy="560" r="14" fill="white" opacity="0.7"/>
  <!-- 열쇠 왼쪽 작은 장식 별들 -->
  <circle cx="200" cy="620" r="10" fill="white" opacity="0.6"/>
  <circle cx="250" cy="700" r="7" fill="white" opacity="0.5"/>
  <circle cx="160" cy="720" r="12" fill="white" opacity="0.5"/>
  <!-- Prompt 텍스트 -->
  <text x="512" y="820" font-family="sans-serif" font-size="40" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">Prompt.Forge</text>
</svg>
