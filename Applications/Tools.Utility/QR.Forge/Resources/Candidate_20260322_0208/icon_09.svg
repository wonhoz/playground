<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09 | Hybrid | 기하학 추상 | QR 파인더 패턴을 원형 추상화, 별자리처럼 | 스카이블루 + 인디고 -->

  <defs>
    <radialGradient id="bgGrad09" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#82B1FF"/>
      <stop offset="100%" stop-color="#448AFF"/>
    </radialGradient>
    <filter id="glow09">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="connLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#448AFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#82B1FF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad09)"/>

  <!-- Layer 2: 별 배경 파티클 -->
  <g fill="#FFFFFF" opacity="0.3">
    <circle cx="200" cy="180" r="2"/>
    <circle cx="350" cy="120" r="1.5"/>
    <circle cx="500" cy="160" r="2"/>
    <circle cx="700" cy="140" r="1.5"/>
    <circle cx="850" cy="200" r="2"/>
    <circle cx="150" cy="400" r="1.5"/>
    <circle cx="900" cy="350" r="2"/>
    <circle cx="180" cy="700" r="1.5"/>
    <circle cx="900" cy="800" r="2"/>
    <circle cx="600" cy="900" r="1.5"/>
  </g>

  <!-- Layer 3: QR 구조를 원형+사각형 추상화로 표현 -->
  <!-- 3개 파인더 노드 (크고 빛나는 원) -->

  <!-- 좌상단 노드 - 파인더 패턴 추상화 (동심원) -->
  <g filter="url(#glow09)">
    <circle cx="256" cy="256" r="108" fill="none" stroke="#448AFF" stroke-width="24"/>
    <circle cx="256" cy="256" r="72"  fill="none" stroke="#82B1FF" stroke-width="16"/>
    <circle cx="256" cy="256" r="36"  fill="#448AFF"/>
  </g>

  <!-- 우상단 노드 -->
  <g filter="url(#glow09)">
    <circle cx="768" cy="256" r="108" fill="none" stroke="#448AFF" stroke-width="24"/>
    <circle cx="768" cy="256" r="72"  fill="none" stroke="#82B1FF" stroke-width="16"/>
    <circle cx="768" cy="256" r="36"  fill="#448AFF"/>
  </g>

  <!-- 좌하단 노드 -->
  <g filter="url(#glow09)">
    <circle cx="256" cy="768" r="108" fill="none" stroke="#448AFF" stroke-width="24"/>
    <circle cx="256" cy="768" r="72"  fill="none" stroke="#82B1FF" stroke-width="16"/>
    <circle cx="256" cy="768" r="36"  fill="#448AFF"/>
  </g>

  <!-- 연결선 (파인더 간 타이밍 패턴 추상화) -->
  <line x1="368" y1="256" x2="656" y2="256" stroke="url(#connLine)" stroke-width="8" stroke-dasharray="20,12"/>
  <line x1="256" y1="368" x2="256" y2="656" stroke="url(#connLine)" stroke-width="8" stroke-dasharray="20,12"/>
  <line x1="368" y1="300" x2="650" y2="700" stroke="url(#connLine)" stroke-width="6" stroke-dasharray="16,14" opacity="0.5"/>

  <!-- 데이터 노드 (작은 원들) -->
  <g fill="#64B5F6" opacity="0.85" filter="url(#glow09)">
    <circle cx="512" cy="256" r="20"/>
    <circle cx="256" cy="512" r="20"/>
    <circle cx="512" cy="512" r="28"/>
    <circle cx="650" cy="450" r="18"/>
    <circle cx="750" cy="550" r="16"/>
    <circle cx="600" cy="650" r="22"/>
    <circle cx="850" cy="480" r="14"/>
    <circle cx="700" cy="720" r="18"/>
    <circle cx="800" cy="700" r="16"/>
    <circle cx="850" cy="620" r="14"/>
    <circle cx="480" cy="730" r="18"/>
    <circle cx="560" cy="820" r="16"/>
    <circle cx="650" cy="800" r="14"/>
    <circle cx="760" cy="820" r="18"/>
  </g>
  <!-- 데이터 노드 연결선 -->
  <g stroke="#448AFF" stroke-width="3" opacity="0.35">
    <line x1="512" y1="256" x2="512" y2="512"/>
    <line x1="512" y1="512" x2="650" y2="450"/>
    <line x1="650" y1="450" x2="750" y2="550"/>
    <line x1="750" y1="550" x2="700" y2="720"/>
    <line x1="700" y1="720" x2="560" y2="820"/>
    <line x1="560" y1="820" x2="480" y2="730"/>
    <line x1="600" y1="650" x2="512" y2="512"/>
    <line x1="850" y1="480" x2="750" y2="550"/>
    <line x1="850" y1="620" x2="800" y2="700"/>
    <line x1="760" y1="820" x2="800" y2="700"/>
  </g>

  <!-- 중앙 QR 심볼 힌트 (작은 파인더 패턴 3개를 삼각형 배치로 암시) -->
  <text x="512" y="420" font-family="monospace" font-size="36" fill="#82B1FF" text-anchor="middle" opacity="0.5">QR</text>
</svg>
