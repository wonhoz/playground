  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 경로 슬래시 체인 (수직으로) -->
  <rect x="100" y="140" width="824" height="120" rx="20" fill="#1B5E20"/>
