<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 매트릭스 블랙 -->
  <rect width="1024" height="1024" rx="180" fill="#050F05"/>
  <!-- Layer 2: 세로로 흘러내리는 문자 열들 (매트릭스 스타일) -->
  <!-- 열 1 -->
  <text x="110" y="200" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="1.0">@</text>
  <text x="110" y="268" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.9">#</text>
  <text x="110" y="336" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.75">$</text>
  <text x="110" y="404" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.55">%</text>
  <text x="110" y="472" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.35">@</text>
  <text x="110" y="540" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.2">#</text>
