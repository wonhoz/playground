<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#2E1065"/>
  <!-- Layer 2: Format chips flying from center -->
  <!-- SVG chip (center-ish) -->
  <rect x="390" y="390" width="244" height="76" rx="20" fill="#EA580C" transform="rotate(-5 512 428)"/>
  <text x="512" y="438" font-family="Arial,sans-serif" font-size="40" fill="white" text-anchor="middle" font-weight="bold" transform="rotate(-5 512 428)">SVG</text>
  <!-- Arrow rays outward -->
  <line x1="512" y1="428" x2="200" y2="250" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="428" x2="820" y2="250" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="428" x2="200" y2="750" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="428" x2="820" y2="750" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- ICO chip (top-left) -->
  <rect x="110" y="155" width="160" height="60" rx="16" fill="#2563EB"/>
  <text x="190" y="194" font-family="Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">ICO</text>
  <!-- PNG chip (top-right) -->
  <rect x="754" y="155" width="160" height="60" rx="16" fill="#059669"/>
  <text x="834" y="194" font-family="Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">PNG</text>
  <!-- JPG chip (bottom-left) -->
  <rect x="110" y="745" width="160" height="60" rx="16" fill="#DC2626"/>
  <text x="190" y="784" font-family="Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">JPG</text>
  <!-- BMP chip (bottom-right) -->
  <rect x="754" y="745" width="160" height="60" rx="16" fill="#D97706"/>
  <text x="834" y="784" font-family="Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">BMP</text>
  <!-- Layer 3: Star sparkles -->
  <polygon points="512,165 520,188 545,188 525,203 532,226 512,212 492,226 499,203 479,188 504,188" fill="#FDE047" opacity="0.85"/>
  <circle cx="380" cy="300" r="10" fill="#A78BFA" opacity="0.7"/>
  <circle cx="644" cy="300" r="10" fill="#A78BFA" opacity="0.7"/>
  <circle cx="380" cy="620" r="10" fill="#A78BFA" opacity="0.7"/>
  <circle cx="644" cy="620" r="10" fill="#A78BFA" opacity="0.7"/>
</svg>