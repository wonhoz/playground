  <text x="116" y="272" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="Courier New">5</text>
  <text x="116" y="290" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="Courier New">6</text>
  <text x="116" y="308" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="Courier New">7</text>
  <text x="116" y="326" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="Courier New">8</text>
  <text x="116" y="344" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="Courier New">9</text>
  <!-- Code lines -->
  <rect x="136" y="192" width="130" height="9" rx="3" fill="#66BB6A" opacity="0.7"/>
