<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060f0a"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Quantum orbital paths -->
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4" transform="rotate(120 256 256)"/>

  <!-- Orbital electrons (data bits) -->
  <circle cx="456" cy="256" r="10" fill="#10B981" filter="url(#glow)"/>
  <circle cx="256" cy="56" r="10" fill="#34D399" filter="url(#glow)" transform="rotate(60 256 256)"/>
  <circle cx="56" cy="256" r="10" fill="#10B981" filter="url(#glow)" transform="rotate(120 256 256)"/>

  <!-- Checkmark orbit trail -->
  <path d="M456,256 A200,60 0 0,1 256,56" fill="none" stroke="#10B981" stroke-width="3" stroke-opacity="0.6" stroke-dasharray="8,4" filter="url(#softglow)"/>

  <!-- Nucleus (atom core = hash core) -->
  <circle cx="256" cy="256" r="50" fill="#051a10"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Hash symbol inside nucleus -->
  <line x1="242" y1="237" x2="242" y2="275" stroke="#10B981" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="270" y1="237" x2="270" y2="275" stroke="#10B981" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="234" y1="249" x2="278" y2="249" stroke="#34D399" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="234" y1="263" x2="278" y2="263" stroke="#34D399" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Quantum bits (qubits) floating around -->
  <!-- Superposition states -->
  <g filter="url(#softglow)">
    <circle cx="130" cy="130" r="6" fill="#10B981" fill-opacity="0.8"/>
    <circle cx="382" cy="130" r="6" fill="#34D399" fill-opacity="0.8"/>
    <circle cx="130" cy="382" r="6" fill="#6EE7B7" fill-opacity="0.7"/>
    <circle cx="382" cy="382" r="6" fill="#10B981" fill-opacity="0.8"/>
  </g>
  <!-- Qubit connecting lines -->
  <line x1="130" y1="130" x2="256" y2="256" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="382" y1="130" x2="256" y2="256" stroke="#34D399" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="130" y1="382" x2="256" y2="256" stroke="#6EE7B7" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="382" y1="382" x2="256" y2="256" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Wave function lines -->
  <path d="M60,180 Q90,160 120,180 Q150,200 180,180 Q210,160 240,180" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <path d="M272,180 Q302,160 332,180 Q362,200 392,180 Q422,160 452,180" fill="none" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <path d="M60,332 Q90,312 120,332 Q150,352 180,332 Q210,312 240,332" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.35"/>
  <path d="M272,332 Q302,312 332,332 Q362,352 392,332 Q422,312 452,332" fill="none" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Checksum result bar -->
  <rect x="100" y="430" width="312" height="22" rx="11" fill="#051a10" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <rect x="108" y="436" width="180" height="10" rx="5" fill="#10B981" fill-opacity="0.7"/>
  <circle cx="420" cy="441" r="8" fill="#34D399" fill-opacity="0.4" stroke="#34D399" stroke-width="1.5"/>
  <!-- Checkmark in circle -->
  <path d="M415,441 L419,445 L425,437" fill="none" stroke="#34D399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
