<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 십자말풀이 격자 | 레이어드 | #1E3A5F -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E3A5F"/>
  <!-- Layer 2: Crossword grid (7x7 excerpt) -->
  <!-- Define cell size 88px, start at x=160, y=200 -->
  <!-- Filled black cells -->
  <rect x="160" y="200" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="336" y="200" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="600" y="200" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="776" y="200" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="248" y="376" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="512" y="376" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="688" y="376" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="160" y="552" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="424" y="552" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="688" y="552" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="336" y="728" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="512" y="728" width="88" height="88" rx="4" fill="#0A1628"/>
  <rect x="776" y="728" width="88" height="88" rx="4" fill="#0A1628"/>
  <!-- White open cells -->
  <rect x="248" y="200" width="88" height="88" rx="4" fill="white"/>
  <rect x="424" y="200" width="88" height="88" rx="4" fill="white"/>
  <rect x="512" y="200" width="88" height="88" rx="4" fill="#93C5FD"/>
  <rect x="688" y="200" width="88" height="88" rx="4" fill="white"/>
  <rect x="160" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="248" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="336" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="424" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="512" y="288" width="88" height="88" rx="4" fill="#93C5FD"/>
  <rect x="600" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="688" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="776" y="288" width="88" height="88" rx="4" fill="white"/>
  <rect x="160" y="376" width="88" height="88" rx="4" fill="white"/>
  <rect x="336" y="376" width="88" height="88" rx="4" fill="white"/>
  <rect x="424" y="376" width="88" height="88" rx="4" fill="white"/>
  <rect x="600" y="376" width="88" height="88" rx="4" fill="white"/>
  <rect x="776" y="376" width="88" height="88" rx="4" fill="white"/>
  <!-- Layer 3: Letters in selected cells -->
  <text x="556" y="258" font-family="Arial,sans-serif" font-size="44" fill="#1E3A8A" text-anchor="middle" font-weight="bold">퀴</text>
  <text x="556" y="346" font-family="Arial,sans-serif" font-size="44" fill="#1E3A8A" text-anchor="middle" font-weight="bold">즈</text>
  <!-- Cell numbers -->
  <text x="258" y="218" font-family="Arial,sans-serif" font-size="14" fill="#475569">1</text>
  <text x="434" y="218" font-family="Arial,sans-serif" font-size="14" fill="#475569">2</text>
  <text x="170" y="306" font-family="Arial,sans-serif" font-size="14" fill="#475569">3</text>
</svg>
