<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="100%" stop-color="#0F0F23"/>
    </radialGradient>
    <linearGradient id="gauge1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF87"/>
      <stop offset="50%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gauge track (semicircle) -->
  <path d="M96,320 A170,170 0 0,1 416,320" fill="none" stroke="#333355" stroke-width="28" stroke-linecap="round"/>
  <!-- Gauge fill (75%) -->
  <path d="M96,320 A170,170 0 0,1 370,185" fill="none" stroke="url(#gauge1)" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Tick marks -->
  <line x1="96" y1="320" x2="82" y2="310" stroke="#888" stroke-width="2.5"/>
  <line x1="119" y1="231" x2="108" y2="222" stroke="#888" stroke-width="2.5"/>
  <line x1="186" y1="161" x2="180" y2="148" stroke="#888" stroke-width="2.5"/>
  <line x1="256" y1="140" x2="256" y2="126" stroke="#888" stroke-width="2.5"/>
  <line x1="326" y1="161" x2="332" y2="148" stroke="#888" stroke-width="2.5"/>
  <line x1="393" y1="231" x2="404" y2="222" stroke="#888" stroke-width="2.5"/>
  <line x1="416" y1="320" x2="430" y2="310" stroke="#888" stroke-width="2.5"/>
  <!-- Needle -->
  <line x1="256" y1="320" x2="378" y2="192" stroke="#FF6B6B" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="320" r="14" fill="#FF4500" filter="url(#glow)"/>
  <circle cx="256" cy="320" r="7" fill="white"/>
  <!-- Center display -->
  <text x="256" y="370" text-anchor="middle" fill="white" font-family="Arial" font-size="42" font-weight="bold" filter="url(#glow)">75%</text>
  <text x="256" y="400" text-anchor="middle" fill="#AAAACC" font-family="Arial" font-size="18">Used</text>
  <!-- Disk drive visual below gauge -->
  <rect x="176" y="425" width="160" height="42" rx="10" fill="#1A1A3A" stroke="#444466" stroke-width="2"/>
  <rect x="188" y="435" width="100" height="22" rx="5" fill="#0A0A1A"/>
  <rect x="188" y="435" width="75" height="22" rx="5" fill="#FF4500" opacity="0.7"/>
  <text x="340" y="451" text-anchor="middle" fill="#AAAACC" font-family="Arial" font-size="11">HDD</text>
  <!-- Label -->
  <text x="256" y="492" text-anchor="middle" fill="#8888CC" font-family="Arial" font-size="18" font-weight="bold" letter-spacing="2">DISK.LENS</text>
</svg>
