  <circle cx="310" cy="502" r="14" fill="#00BCD4" opacity="0.8"/>
  <circle cx="362" cy="512" r="12" fill="#00BCD4" opacity="0.6"/>
  <circle cx="258" cy="564" r="12" fill="#00BCD4" opacity="0.5"/>
  <circle cx="310" cy="574" r="12" fill="#00BCD4" opacity="0.5"/>
  <circle cx="362" cy="564" r="12" fill="#00BCD4" opacity="0.5"/>
  <!-- Speaker grille dots (right) -->
