  <rect x="192" y="190" width="30" height="210" rx="6" fill="url(#flame)" opacity="0.85"/>
  <rect x="232" y="170" width="30" height="230" rx="6" fill="url(#flame)" opacity="0.9"/>
  <rect x="272" y="185" width="30" height="215" rx="6" fill="url(#flame)" opacity="0.85"/>
  <rect x="312" y="210" width="30" height="190" rx="6" fill="url(#flame)" opacity="0.8"/>
  <rect x="352" y="245" width="30" height="155" rx="6" fill="url(#flame)" opacity="0.75"/>
