<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <linearGradient id="cascade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 계단식 서버들 -->
  <rect x="196" y="100" width="120" height="60" rx="6" fill="#3B82F6" opacity="0.15"/>
  <rect x="196" y="100" width="120" height="60" rx="6" fill="none" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="208" y="112" width="96" height="10" rx="5" fill="#3B82F6" opacity="0.6"/>
  <rect x="208" y="128" width="96" height="10" rx="5" fill="#60A5FA" opacity="0.5"/>
  <rect x="208" y="144" width="65" height="10" rx="5" fill="#3B82F6" opacity="0.35"/>
  <!-- 폭포 흐름들 -->
  <path d="M 246 160 L 190 210 M 266 160 L 256 210 M 286 160 L 322 210" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.5" filter="url(#glow)"/>
  <!-- 2단계 서버들 -->
  <rect x="140" y="210" width="90" height="55" rx="6" fill="#3B82F6" opacity="0.1"/>
  <rect x="140" y="210" width="90" height="55" rx="6" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  <rect x="216" y="210" width="80" height="55" rx="6" fill="#3B82F6" opacity="0.08"/>
  <rect x="216" y="210" width="80" height="55" rx="6" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.6"/>
  <rect x="292" y="210" width="80" height="55" rx="6" fill="#3B82F6" opacity="0.08"/>
  <rect x="292" y="210" width="80" height="55" rx="6" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <!-- 3단계 폭포 -->
  <path d="M 160 265 L 120 315 M 185 265 L 170 315 M 250 265 L 220 315 M 255 265 L 285 315 M 330 265 L 290 315 M 355 265 L 370 315" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.4"/>
  <!-- 3단계 클라이언트들 -->
  <circle cx="120" cy="330" r="11" fill="#3B82F6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="170" cy="330" r="10" fill="#60A5FA" opacity="0.6"/>
  <circle cx="220" cy="330" r="10" fill="#3B82F6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="260" cy="330" r="10" fill="#60A5FA" opacity="0.6"/>
  <circle cx="295" cy="330" r="10" fill="#3B82F6" opacity="0.6"/>
  <circle cx="340" cy="330" r="10" fill="#60A5FA" opacity="0.6" filter="url(#glow)"/>
  <circle cx="380" cy="330" r="10" fill="#3B82F6" opacity="0.6"/>
  <!-- 레이블 -->
  <text x="256" y="400" text-anchor="middle" fill="#3B82F6" font-size="12" font-family="monospace" font-weight="bold" filter="url(#glow)">CASCADE SERVE</text>
</svg>