<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#110000"/>
    </linearGradient>
    <linearGradient id="crystal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="crystal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shardGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폭발 중심 -->
  <circle cx="256" cy="256" r="80" fill="#EF4444" opacity="0.08" filter="url(#shardGlow)"/>
  <!-- 날아가는 수정 파편들 (폴더 모양) -->
  <!-- 파편 1 (우상) -->
  <polygon points="280,170 340,130 360,200 320,220 280,170" fill="url(#crystal1)" opacity="0.85" filter="url(#glow)" transform="rotate(15 320 175)"/>
  <!-- 파편 2 (상) -->
  <polygon points="230,130 270,90 300,140 260,155 230,130" fill="url(#crystal2)" opacity="0.8" filter="url(#glow)" transform="rotate(-10 260 120)"/>
  <!-- 파편 3 (좌상) -->
  <polygon points="130,160 175,120 185,190 148,195 130,160" fill="url(#crystal1)" opacity="0.82" filter="url(#glow)" transform="rotate(20 157 155)"/>
  <!-- 파편 4 (우) -->
  <polygon points="340,230 410,210 420,280 370,290 340,230" fill="url(#crystal2)" opacity="0.8" filter="url(#glow)" transform="rotate(-20 380 250)"/>
  <!-- 파편 5 (우하) -->
  <polygon points="310,330 380,360 360,420 300,395 310,330" fill="url(#crystal1)" opacity="0.78" filter="url(#glow)" transform="rotate(25 340 375)"/>
  <!-- 파편 6 (하) -->
  <polygon points="220,360 260,410 240,460 200,430 220,360" fill="url(#crystal2)" opacity="0.75" filter="url(#glow)" transform="rotate(-15 230 410)"/>
  <!-- 파편 7 (좌하) -->
  <polygon points="125,300 168,345 150,400 108,368 125,300" fill="url(#crystal1)" opacity="0.78" filter="url(#glow)" transform="rotate(30 138 350)"/>
  <!-- 파편 8 (좌) -->
  <polygon points="95,220 152,205 158,268 110,272 95,220" fill="url(#crystal2)" opacity="0.8" filter="url(#glow)" transform="rotate(-25 125 238)"/>
  <!-- 중앙 폭발 코어 -->
  <circle cx="256" cy="256" r="36" fill="#EF4444" opacity="0.8" filter="url(#shardGlow)"/>
  <circle cx="256" cy="256" r="22" fill="#F87171" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#FEE2E2" opacity="1"/>
  <!-- 충격 라인들 -->
  <line x1="256" y1="220" x2="280" y2="190" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <line x1="292" y1="256" x2="330" y2="240" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="292" x2="310" y2="320" stroke="#DC2626" stroke-width="2" opacity="0.45"/>
  <line x1="220" y1="292" x2="190" y2="315" stroke="#EF4444" stroke-width="2" opacity="0.45"/>
  <line x1="220" y1="220" x2="192" y2="195" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <!-- 작은 파편 파티클들 -->
  <circle cx="320" cy="165" r="5" fill="#FCA5A5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="170" cy="185" r="4" fill="#F87171" opacity="0.65"/>
  <circle cx="400" cy="300" r="4" fill="#EF4444" opacity="0.6"/>
  <circle cx="150" cy="350" r="4.5" fill="#FCA5A5" opacity="0.65"/>
</svg>