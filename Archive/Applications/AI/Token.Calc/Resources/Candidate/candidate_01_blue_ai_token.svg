<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="140" fill="url(#glow)"/>
  <!-- Token coin -->
  <circle cx="200" cy="200" r="120" fill="#1565C0" stroke="url(#coin)" stroke-width="10"/>
  <circle cx="200" cy="200" r="96" fill="#1976D2" stroke="#64B5F6" stroke-width="4" opacity="0.7"/>
  <!-- AI text on coin -->
  <text x="200" y="188" text-anchor="middle" font-size="36" font-weight="bold" fill="#E3F2FD" font-family="monospace" opacity="0.95">AI</text>
  <text x="200" y="228" text-anchor="middle" font-size="22" fill="#90CAF9" font-family="monospace" opacity="0.8">TOKEN</text>
  <!-- Calculator panel right -->
  <rect x="316" y="88" width="148" height="224" rx="16" fill="#0D47A1" stroke="#42A5F5" stroke-width="5"/>
  <!-- Calc display -->
  <rect x="330" y="104" width="120" height="44" rx="8" fill="#1A237E" stroke="#64B5F6" stroke-width="3"/>
  <rect x="338" y="114" width="96" height="10" rx="5" fill="#90CAF9" opacity="0.9"/>
  <rect x="338" y="128" width="72" height="8" rx="4" fill="#64B5F6" opacity="0.7"/>
  <!-- Calc buttons 3x3 -->
  <rect x="330" y="160" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="370" y="160" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="410" y="160" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="330" y="196" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="370" y="196" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="410" y="196" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="330" y="232" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="370" y="232" width="32" height="28" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="2"/>
  <rect x="410" y="232" width="32" height="28" rx="6" fill="#0D47A1" stroke="#90CAF9" stroke-width="3"/>
  <!-- = button styled -->
  <text x="330" y="170" dx="16" text-anchor="middle" font-size="14" fill="#E3F2FD" font-family="monospace" opacity="0.8">7</text>
  <text x="370" y="170" dx="16" text-anchor="middle" font-size="14" fill="#E3F2FD" font-family="monospace" opacity="0.8">8</text>
  <text x="410" y="170" dx="16" text-anchor="middle" font-size="14" fill="#E3F2FD" font-family="monospace" opacity="0.8">9</text>
  <text x="426" y="252" text-anchor="middle" font-size="18" font-weight="bold" fill="#90CAF9" opacity="0.9">=</text>
  <!-- Cost display panel -->
  <rect x="88" y="336" width="336" height="104" rx="16" fill="#0D47A1" stroke="#42A5F5" stroke-width="5"/>
  <rect x="104" y="352" width="100" height="8" rx="4" fill="#90CAF9" opacity="0.8"/>
  <rect x="104" y="366" width="56" height="14" rx="7" fill="#1E88E5" opacity="0.9"/>
  <text x="136" y="377" text-anchor="middle" font-size="13" fill="#E3F2FD" font-family="monospace" opacity="0.9">$0.02</text>
  <rect x="220" y="352" width="80" height="8" rx="4" fill="#90CAF9" opacity="0.8"/>
  <rect x="220" y="366" width="56" height="14" rx="7" fill="#1565C0" opacity="0.9"/>
  <text x="248" y="377" text-anchor="middle" font-size="13" fill="#E3F2FD" font-family="monospace" opacity="0.9">512T</text>
  <rect x="316" y="352" width="90" height="8" rx="4" fill="#90CAF9" opacity="0.8"/>
  <rect x="316" y="366" width="88" height="14" rx="7" fill="#0D47A1" opacity="0.9"/>
  <text x="360" y="377" text-anchor="middle" font-size="13" fill="#90CAF9" font-family="monospace" opacity="0.8">GPT-4o</text>
  <!-- Model tags -->
  <rect x="104" y="396" width="64" height="20" rx="8" fill="#1976D2" opacity="0.8"/>
  <rect x="180" y="396" width="64" height="20" rx="8" fill="#1976D2" opacity="0.7"/>
  <rect x="256" y="396" width="64" height="20" rx="8" fill="#1976D2" opacity="0.6"/>
  <rect x="332" y="396" width="80" height="20" rx="8" fill="#1976D2" opacity="0.5"/>
</svg>
