<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ns05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BE185D"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <clipPath id="c_ns05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Hot pink background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_ns05)"/>
  <g clip-path="url(#c_ns05)">
    <!-- Layer 2: Sliced pentagon halves (layered) -->
    <!-- Pentagon half 1 (left) - cyan -->
    <polygon points="240,240 400,240 480,380 400,520 240,520" fill="#0E7490" stroke="#22D3EE" stroke-width="16" stroke-linejoin="round"/>
    <!-- Pentagon half 2 (right) - yellow -->
    <polygon points="784,240 624,240 544,380 624,520 784,520" fill="#78350F" stroke="#FDE047" stroke-width="16" stroke-linejoin="round"/>
    <!-- Slice gap particles -->
    <circle cx="512" cy="300" r="12" fill="white"/>
    <circle cx="512" cy="360" r="12" fill="white"/>
    <circle cx="512" cy="420" r="12" fill="white"/>
    <circle cx="512" cy="480" r="12" fill="white"/>
    <!-- Layer 3: Combo counter -->
    <rect x="152" y="580" width="720" height="280" rx="52" fill="#9F1239"/>
    <rect x="152" y="580" width="720" height="280" rx="52" fill="none" stroke="#FB7185" stroke-width="12"/>
    <!-- Combo text -->
    <text x="512" y="690" font-family="Arial Black" font-size="72" font-weight="900" fill="#FCA5A5" text-anchor="middle">COMBO</text>
    <text x="512" y="816" font-family="Arial Black" font-size="160" font-weight="900" fill="white" text-anchor="middle">×7</text>
    <!-- Particle burst at top -->
    <circle cx="512" cy="220" r="36" fill="#FEF08A"/>
    <circle cx="440" cy="180" r="18" fill="#FCD34D"/>
    <circle cx="584" cy="180" r="18" fill="#FCD34D"/>
    <circle cx="380" cy="220" r="14" fill="#FEF08A"/>
    <circle cx="644" cy="220" r="14" fill="#FEF08A"/>
    <circle cx="512" cy="148" r="14" fill="#F59E0B"/>
  </g>
</svg>
