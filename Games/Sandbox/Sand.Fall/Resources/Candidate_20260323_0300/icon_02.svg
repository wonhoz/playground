<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 재질 팔레트 그리드 (Material palette) | 레이어드 | #111111 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#111111"/>
  <!-- Layer 2: Material color swatches grid -->
  <!-- Row 1: Sand, Water, Fire -->
  <rect x="160" y="200" width="200" height="160" rx="14" fill="#E8C878"/>
  <text x="260" y="292" font-family="Arial,sans-serif" font-size="26" fill="#1A0E05" text-anchor="middle" font-weight="bold">모래</text>
  <text x="260" y="326" font-family="Consolas,monospace" font-size="16" fill="#6B3A1F" text-anchor="middle">Sand</text>
  <rect x="412" y="200" width="200" height="160" rx="14" fill="#3468C8"/>
  <text x="512" y="292" font-family="Arial,sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">물</text>
  <text x="512" y="326" font-family="Consolas,monospace" font-size="16" fill="#BAE6FD" text-anchor="middle">Water</text>
  <rect x="664" y="200" width="200" height="160" rx="14" fill="#FF5500"/>
  <text x="764" y="292" font-family="Arial,sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">불</text>
  <text x="764" y="326" font-family="Consolas,monospace" font-size="16" fill="#FDE68A" text-anchor="middle">Fire</text>
  <!-- Row 2: Stone, Plant, Ice -->
  <rect x="160" y="412" width="200" height="160" rx="14" fill="#788090"/>
  <text x="260" y="504" font-family="Arial,sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">돌</text>
  <text x="260" y="538" font-family="Consolas,monospace" font-size="16" fill="#E5E7EB" text-anchor="middle">Stone</text>
  <rect x="412" y="412" width="200" height="160" rx="14" fill="#22A030"/>
  <text x="512" y="504" font-family="Arial,sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">식물</text>
  <text x="512" y="538" font-family="Consolas,monospace" font-size="16" fill="#D1FAE5" text-anchor="middle">Plant</text>
  <rect x="664" y="412" width="200" height="160" rx="14" fill="#A8D8F0"/>
  <text x="764" y="504" font-family="Arial,sans-serif" font-size="26" fill="#0A1628" text-anchor="middle" font-weight="bold">얼음</text>
  <text x="764" y="538" font-family="Consolas,monospace" font-size="16" fill="#1E3A8A" text-anchor="middle">Ice</text>
  <!-- Row 3: Wood, Oil, Acid -->
  <rect x="160" y="624" width="200" height="160" rx="14" fill="#8B5E3C"/>
  <text x="260" y="716" font-family="Arial,sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">나무</text>
  <text x="260" y="750" font-family="Consolas,monospace" font-size="16" fill="#FDE68A" text-anchor="middle">Wood</text>
  <rect x="412" y="624" width="200" height="160" rx="14" fill="#6A4820"/>
  <text x="512" y="716" font-family="Arial,sans-serif" font-size="26" fill="#FDE68A" text-anchor="middle" font-weight="bold">기름</text>
  <text x="512" y="750" font-family="Consolas,monospace" font-size="16" fill="#DEB87A" text-anchor="middle">Oil</text>
  <rect x="664" y="624" width="200" height="160" rx="14" fill="#88FF10" opacity="0.9"/>
  <text x="764" y="716" font-family="Arial,sans-serif" font-size="26" fill="#0A1A00" text-anchor="middle" font-weight="bold">산</text>
  <text x="764" y="750" font-family="Consolas,monospace" font-size="16" fill="#064E3B" text-anchor="middle">Acid</text>
  <!-- Layer 3: Selected cursor indicator -->
  <rect x="160" y="200" width="200" height="160" rx="14" fill="none" stroke="white" stroke-width="5"/>
</svg>
