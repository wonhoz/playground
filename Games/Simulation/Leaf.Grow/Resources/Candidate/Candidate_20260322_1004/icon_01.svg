<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal — 프랙탈 나무 (대칭 3단계 가지, 밝은 녹색+갈색, 하늘 배경) -->

  <!-- Layer 1: 배경 -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0EEFF"/>
      <stop offset="100%" stop-color="#A8D8B0"/>
    </linearGradient>
    <linearGradient id="trunk01" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#8B6040"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg01)"/>

  <!-- 땅 -->
  <ellipse cx="512" cy="860" rx="260" ry="40" fill="#5A8A3A" opacity="0.5"/>

  <!-- Layer 2: 줄기 + 재귀 가지 구조 -->
  <!-- 메인 줄기 -->
  <line x1="512" y1="840" x2="512" y2="600" stroke="#6B4423" stroke-width="28" stroke-linecap="round"/>

  <!-- 1단계 가지 (왼쪽, 오른쪽) -->
  <line x1="512" y1="660" x2="390" y2="540" stroke="#7A5030" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="660" x2="634" y2="540" stroke="#7A5030" stroke-width="18" stroke-linecap="round"/>

  <!-- 2단계 가지 (왼쪽 서브) -->
  <line x1="390" y1="540" x2="320" y2="450" stroke="#8B6040" stroke-width="12" stroke-linecap="round"/>
  <line x1="390" y1="540" x2="450" y2="450" stroke="#8B6040" stroke-width="12" stroke-linecap="round"/>
  <!-- 2단계 가지 (오른쪽 서브) -->
  <line x1="634" y1="540" x2="574" y2="450" stroke="#8B6040" stroke-width="12" stroke-linecap="round"/>
  <line x1="634" y1="540" x2="704" y2="450" stroke="#8B6040" stroke-width="12" stroke-linecap="round"/>

  <!-- 3단계 가지 (왼-왼) -->
  <line x1="320" y1="450" x2="278" y2="390" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <line x1="320" y1="450" x2="355" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <!-- 3단계 가지 (왼-오) -->
  <line x1="450" y1="450" x2="418" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <line x1="450" y1="450" x2="482" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <!-- 3단계 가지 (오-왼) -->
  <line x1="574" y1="450" x2="542" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <line x1="574" y1="450" x2="606" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <!-- 3단계 가지 (오-오) -->
  <line x1="704" y1="450" x2="669" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <line x1="704" y1="450" x2="746" y2="385" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>

  <!-- 메인 줄기 상단 -->
  <line x1="512" y1="600" x2="512" y2="490" stroke="#8B6040" stroke-width="14" stroke-linecap="round"/>
  <!-- 4단계: 중앙 상단 -->
  <line x1="512" y1="490" x2="476" y2="420" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>
  <line x1="512" y1="490" x2="548" y2="420" stroke="#9B7050" stroke-width="7" stroke-linecap="round"/>

  <!-- Layer 3: 잎 클러스터 (끝 가지마다) -->
  <!-- 왼-왼 끝 -->
  <circle cx="278" cy="382" r="30" fill="#2ECC71" opacity="0.9"/>
  <circle cx="355" cy="377" r="28" fill="#27AE60" opacity="0.9"/>
  <!-- 왼-오 끝 -->
  <circle cx="418" cy="377" r="28" fill="#2ECC71" opacity="0.9"/>
  <circle cx="482" cy="377" r="26" fill="#58D68D" opacity="0.9"/>
  <!-- 오-왼 끝 -->
  <circle cx="542" cy="377" r="26" fill="#58D68D" opacity="0.9"/>
  <circle cx="606" cy="377" r="28" fill="#2ECC71" opacity="0.9"/>
  <!-- 오-오 끝 -->
  <circle cx="669" cy="377" r="28" fill="#27AE60" opacity="0.9"/>
  <circle cx="746" cy="377" r="30" fill="#2ECC71" opacity="0.9"/>
  <!-- 중앙 상단 끝 -->
  <circle cx="476" cy="412" r="26" fill="#1ABC9C" opacity="0.9"/>
  <circle cx="548" cy="412" r="26" fill="#1ABC9C" opacity="0.9"/>

  <!-- 꽃 (Ellipse 포인트) -->
  <circle cx="278" cy="378" r="10" fill="#FF6B9D"/>
  <circle cx="746" cy="373" r="10" fill="#FF6B9D"/>
  <circle cx="512" cy="380" r="10" fill="#FFD700"/>
</svg>
