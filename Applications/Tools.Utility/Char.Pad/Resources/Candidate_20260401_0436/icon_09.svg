<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg9)"/>
  <!-- Layer 2: Large mouse cursor -->
  <polygon points="200,160 200,700 380,560 460,780 540,748 460,528 680,528" fill="#AD1457"/>
  <polygon points="200,160 200,700 380,560 460,780 530,755 452,535 672,535" fill="white"/>
  <polygon points="200,160 200,700 380,560 452,535" fill="#E91E63" opacity="0.3"/>
  <!-- Layer 3: Colorful char swatches around cursor -->
  <!-- © swatch -->
  <rect x="580" y="180" width="130" height="100" rx="16" fill="#7C4DFF"/>
  <text x="645" y="232" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">©</text>
  <!-- ∑ swatch -->
  <rect x="730" y="180" width="130" height="100" rx="16" fill="#FF6D00"/>
  <text x="795" y="232" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">∑</text>
  <!-- → swatch -->
  <rect x="580" y="298" width="130" height="100" rx="16" fill="#00897B"/>
  <text x="645" y="350" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">→</text>
  <!-- ★ swatch -->
  <rect x="730" y="298" width="130" height="100" rx="16" fill="#F57F17"/>
  <text x="795" y="350" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">★</text>
  <!-- ² swatch -->
  <rect x="580" y="416" width="130" height="100" rx="16" fill="#1565C0"/>
  <text x="645" y="468" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">²</text>
  <!-- € swatch -->
  <rect x="730" y="416" width="130" height="100" rx="16" fill="#AD1457"/>
  <text x="795" y="468" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">€</text>
  <!-- ♪ swatch -->
  <rect x="580" y="534" width="130" height="100" rx="16" fill="#558B2F"/>
  <text x="645" y="586" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">♪</text>
  <!-- ∞ swatch -->
  <rect x="730" y="534" width="130" height="100" rx="16" fill="#00838F"/>
  <text x="795" y="586" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">∞</text>
  <!-- Bottom swatches -->
  <rect x="300" y="820" width="130" height="100" rx="16" fill="#6A1B9A"/>
  <text x="365" y="872" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">™</text>
  <rect x="450" y="820" width="130" height="100" rx="16" fill="#BF360C"/>
  <text x="515" y="872" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">±</text>
  <rect x="600" y="820" width="130" height="100" rx="16" fill="#1B5E20"/>
  <text x="665" y="872" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">≠</text>
</svg>
