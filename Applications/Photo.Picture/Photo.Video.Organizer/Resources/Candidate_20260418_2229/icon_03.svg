  <text x="230" y="347" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">04-12</text>

  <rect x="392" y="130" width="240" height="220" rx="14" fill="#FF8A65"/>
  <circle cx="492" cy="210" r="44" fill="#FFCA28" opacity="0.8"/>
