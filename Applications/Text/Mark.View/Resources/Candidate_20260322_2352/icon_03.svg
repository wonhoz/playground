<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#14532D"/>
  <!-- Layer 2: Open book -->
  <!-- Book spine (center) -->
  <rect x="498" y="240" width="28" height="520" rx="6" fill="#92400E"/>
  <!-- Left page -->
  <rect x="160" y="250" width="335" height="500" rx="14" fill="#FEF9C3"/>
  <!-- Right page -->
  <rect x="530" y="250" width="335" height="500" rx="14" fill="#FFFBEB"/>
  <!-- Layer 3: Content -->
  <!-- Left page: Raw markdown -->
  <text x="180" y="306" font-family="Consolas,monospace" font-size="22" fill="#7C3AED" font-weight="bold"># 제목</text>
  <text x="180" y="342" font-family="Consolas,monospace" font-size="18" fill="#374151">**굵은 텍스트**</text>
  <text x="180" y="374" font-family="Consolas,monospace" font-size="18" fill="#374151">_기울임꼴_</text>
  <text x="180" y="406" font-family="Consolas,monospace" font-size="18" fill="#059669">```python</text>
  <text x="180" y="432" font-family="Consolas,monospace" font-size="16" fill="#374151">  code()</text>
  <text x="180" y="458" font-family="Consolas,monospace" font-size="18" fill="#059669">```</text>
  <text x="180" y="490" font-family="Consolas,monospace" font-size="18" fill="#374151">- 목록 1</text>
  <text x="180" y="516" font-family="Consolas,monospace" font-size="18" fill="#374151">- 목록 2</text>
  <!-- Left page label -->
  <rect x="180" y="668" width="120" height="24" rx="8" fill="#7C3AED" opacity="0.7"/>
  <text x="240" y="684" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">Markdown</text>
  <!-- Right page: Rendered HTML -->
  <text x="550" y="306" font-family="Arial,sans-serif" font-size="26" fill="#1E40AF" font-weight="bold">제목</text>
  <line x1="548" y1="318" x2="842" y2="318" stroke="#BFDBFE" stroke-width="2"/>
  <text x="550" y="352" font-family="Arial,sans-serif" font-size="18" fill="#1F2937" font-weight="bold">굵은 텍스트</text>
  <text x="550" y="380" font-family="Arial,sans-serif" font-size="18" fill="#1F2937" font-style="italic">기울임꼴</text>
  <rect x="548" y="395" width="300" height="72" rx="6" fill="#F1F5F9"/>
  <text x="562" y="418" font-family="Consolas,monospace" font-size="15" fill="#0EA5E9">python</text>
  <text x="562" y="440" font-family="Consolas,monospace" font-size="15" fill="#374151">  code()</text>
  <text x="548" y="490" font-family="Arial,sans-serif" font-size="16" fill="#374151">• 목록 1</text>
  <text x="548" y="516" font-family="Arial,sans-serif" font-size="16" fill="#374151">• 목록 2</text>
  <!-- Right page label -->
  <rect x="722" y="668" width="120" height="24" rx="8" fill="#059669" opacity="0.8"/>
  <text x="782" y="684" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">렌더링</text>
</svg>