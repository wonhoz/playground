<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- QR corners -->
  <rect x="88" y="88" width="120" height="120" rx="12" fill="none" stroke="url(#accent)" stroke-width="16"/>
  <rect x="110" y="110" width="76" height="76" rx="6" fill="url(#accent)"/>
  <rect x="304" y="88" width="120" height="120" rx="12" fill="none" stroke="url(#accent)" stroke-width="16"/>
  <rect x="326" y="110" width="76" height="76" rx="6" fill="url(#accent)"/>
  <rect x="88" y="304" width="120" height="120" rx="12" fill="none" stroke="url(#accent)" stroke-width="16"/>
  <rect x="110" y="326" width="76" height="76" rx="6" fill="url(#accent)"/>
  <!-- Link chain icon center-right -->
  <g transform="translate(304,304)">
    <rect x="0" y="20" width="80" height="36" rx="18" fill="none" stroke="url(#link)" stroke-width="14"/>
    <rect x="28" y="52" width="80" height="36" rx="18" fill="none" stroke="url(#link)" stroke-width="14"/>
  </g>
  <!-- Data dots -->
  <rect x="304" y="304" width="18" height="18" rx="3" fill="url(#accent)" opacity="0.4"/>
  <rect x="330" y="304" width="18" height="18" rx="3" fill="url(#accent)" opacity="0.4"/>
  <rect x="356" y="304" width="18" height="18" rx="3" fill="url(#accent)" opacity="0.4"/>
</svg>
