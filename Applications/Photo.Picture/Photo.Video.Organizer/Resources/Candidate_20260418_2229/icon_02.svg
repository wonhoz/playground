<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background fresh green -->
  <rect width="1024" height="1024" rx="190" fill="#E8F5E9"/>
  <!-- Layer 2: Folder tree structure yyyy/MM/dd -->
  <!-- Root folder -->
  <rect x="80" y="180" width="260" height="100" rx="16" fill="#43A047"/>
  <text x="210" y="244" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">2026</text>
  <!-- Connector lines -->
  <line x1="210" y1="280" x2="210" y2="340" stroke="#388E3C" stroke-width="10"/>
  <line x1="210" y1="340" x2="340" y2="340" stroke="#388E3C" stroke-width="10"/>
  <line x1="210" y1="340" x2="700" y2="340" stroke="#388E3C" stroke-width="10"/>
  <!-- MM folder left -->
  <rect x="280" y="340" width="200" height="90" rx="14" fill="#66BB6A"/>
  <text x="380" y="398" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">03</text>
  <!-- MM folder right -->
  <rect x="600" y="340" width="200" height="90" rx="14" fill="#66BB6A"/>
  <text x="700" y="398" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">04</text>
  <!-- DD connectors under 04 -->
  <line x1="700" y1="430" x2="700" y2="490" stroke="#388E3C" stroke-width="10"/>
  <line x1="560" y1="490" x2="840" y2="490" stroke="#388E3C" stroke-width="10"/>
  <line x1="560" y1="490" x2="560" y2="530" stroke="#388E3C" stroke-width="10"/>
  <line x1="700" y1="490" x2="700" y2="530" stroke="#388E3C" stroke-width="10"/>
  <line x1="840" y1="490" x2="840" y2="530" stroke="#388E3C" stroke-width="10"/>
  <!-- DD folders -->
  <rect x="490" y="530" width="140" height="80" rx="12" fill="#A5D6A7"/>
  <text x="560" y="582" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#2E7D32" text-anchor="middle">14</text>
  <rect x="630" y="530" width="140" height="80" rx="12" fill="#A5D6A7"/>
  <text x="700" y="582" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#2E7D32" text-anchor="middle">15</text>
  <rect x="770" y="530" width="140" height="80" rx="12" fill="#A5D6A7"/>
  <text x="840" y="582" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#2E7D32" text-anchor="middle">16</text>
  <!-- DD connectors under 03 -->
  <line x1="380" y1="430" x2="380" y2="490" stroke="#388E3C" stroke-width="10"/>
  <line x1="280" y1="490" x2="480" y2="490" stroke="#388E3C" stroke-width="10"/>
  <line x1="280" y1="490" x2="280" y2="530" stroke="#388E3C" stroke-width="10"/>
  <line x1="480" y1="490" x2="480" y2="530" stroke="#388E3C" stroke-width="10"/>
  <rect x="210" y="530" width="140" height="80" rx="12" fill="#A5D6A7"/>
  <text x="280" y="582" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#2E7D32" text-anchor="middle">21</text>
  <rect x="410" y="530" width="140" height="80" rx="12" fill="#A5D6A7"/>
  <text x="480" y="582" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#2E7D32" text-anchor="middle">28</text>
  <!-- Layer 3: Photo files in leaf folders -->
  <rect x="220" y="650" width="50" height="60" rx="8" fill="#FF8F00" opacity="0.8"/>
  <rect x="280" y="650" width="50" height="60" rx="8" fill="#AB47BC" opacity="0.7"/>
  <rect x="340" y="650" width="50" height="60" rx="8" fill="#29B6F6" opacity="0.7"/>
  <!-- Label -->
  <rect x="330" y="810" width="364" height="80" rx="16" fill="#2E7D32"/>
  <text x="512" y="864" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFFFFF" text-anchor="middle">Organize</text>
</svg>
