<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 행렬 떨어지는 문자들 (Matrix 스타일) -->
  <!-- 열 1 -->
  <text x="90" y="100" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.9">f</text>
  <text x="90" y="120" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.7">i</text>
  <text x="90" y="140" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.5">l</text>
  <text x="90" y="160" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.3">e</text>
  <text x="90" y="180" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.15">_</text>
  <!-- 열 2 -->
  <text x="120" y="80" font-family="monospace" font-size="14" fill="#A5B4FC" opacity="0.95" filter="url(#glow)">r</text>
  <text x="120" y="100" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.8">e</text>
  <text x="120" y="120" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.6">n</text>
  <text x="120" y="140" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.4">a</text>
  <text x="120" y="160" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.2">m</text>
  <!-- 열 3 -->
  <text x="150" y="110" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.85">0</text>
  <text x="150" y="130" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.65">0</text>
  <text x="150" y="150" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.45">1</text>
  <text x="150" y="170" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.25">.t</text>
  <!-- 중앙 행렬 박스 -->
  <rect x="140" y="190" width="232" height="132" rx="8" fill="#0a0a20" stroke="#6366F1" stroke-width="2" opacity="0.9"/>
  <!-- 행렬 내용 (이름 변환) -->
  <text x="160" y="218" font-family="monospace" font-size="13" fill="#6366F1" opacity="0.7">[ file_001  ]   [ report_01 ]</text>
  <text x="160" y="238" font-family="monospace" font-size="13" fill="#818CF8" opacity="0.8">[ file_002  ] × [ report_02 ]</text>
  <text x="160" y="258" font-family="monospace" font-size="13" fill="#A5B4FC" opacity="0.9" filter="url(#glow)">[ file_003  ]   [ report_03 ]</text>
  <text x="160" y="278" font-family="monospace" font-size="13" fill="#818CF8" opacity="0.8">[ file_004  ]   [ report_04 ]</text>
  <text x="160" y="298" font-family="monospace" font-size="13" fill="#6366F1" opacity="0.7">[ file_005  ]   [ report_05 ]</text>
  <!-- 행렬 브래킷 강조 -->
  <rect x="140" y="190" width="6" height="132" rx="3" fill="#6366F1" opacity="0.6"/>
  <rect x="366" y="190" width="6" height="132" rx="3" fill="#6366F1" opacity="0.6"/>
  <!-- 아래 떨어지는 문자들 -->
  <text x="200" y="380" font-family="monospace" font-size="14" fill="#A5B4FC" opacity="0.9" filter="url(#glow)">→</text>
  <text x="220" y="380" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.7">BATCH</text>
  <text x="290" y="380" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.5">RENAME</text>
  <!-- 상단 떨어지는 문자 추가 컬럼들 -->
  <text x="310" y="90" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.8">名</text>
  <text x="310" y="110" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.6">前</text>
  <text x="340" y="80" font-family="monospace" font-size="14" fill="#A5B4FC" opacity="0.9" filter="url(#glow)">→</text>
  <text x="370" y="90" font-family="monospace" font-size="14" fill="#6366F1" opacity="0.8">新</text>
  <text x="370" y="110" font-family="monospace" font-size="14" fill="#818CF8" opacity="0.6">名</text>
  <!-- 하단 페이드 -->
  <text x="200" y="410" font-family="monospace" font-size="12" fill="#6366F1" opacity="0.4">01010110 01100101</text>
  <text x="200" y="430" font-family="monospace" font-size="12" fill="#818CF8" opacity="0.25">01110010 01101001</text>
</svg>