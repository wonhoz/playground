<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#a0153a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cassette body -->
  <rect x="76" y="156" width="360" height="200" rx="20" fill="url(#tape)"/>
  <rect x="96" y="176" width="320" height="160" rx="12" fill="#1a0a14"/>
  <!-- Tape window -->
  <rect x="136" y="196" width="240" height="100" rx="8" fill="#2a1a24" stroke="#e94560" stroke-width="2"/>
  <!-- Reels -->
  <circle cx="196" cy="246" r="36" fill="#0d0d1a" stroke="#e94560" stroke-width="3"/>
  <circle cx="196" cy="246" r="20" fill="#1a1a2e"/>
  <circle cx="196" cy="246" r="8" fill="#e94560"/>
  <circle cx="316" cy="246" r="36" fill="#0d0d1a" stroke="#e94560" stroke-width="3"/>
  <circle cx="316" cy="246" r="20" fill="#1a1a2e"/>
  <circle cx="316" cy="246" r="8" fill="#e94560"/>
  <!-- Tape path -->
  <path d="M196,226 Q256,210 316,226" stroke="#333" stroke-width="4" fill="none"/>
  <!-- Label -->
  <rect x="176" y="310" width="160" height="30" rx="4" fill="#e94560" opacity="0.3"/>
  <text x="256" y="330" text-anchor="middle" fill="#e94560" font-size="14" font-family="monospace">SOUND BOARD</text>
  <!-- Holes -->
  <circle cx="116" cy="336" r="16" fill="#0d0d1a"/>
  <circle cx="396" cy="336" r="16" fill="#0d0d1a"/>
</svg>