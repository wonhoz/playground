<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0f0500"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-core">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer containment ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#3a1500" stroke-width="8"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#5a2000" stroke-width="3" stroke-dasharray="20,10"/>

  <!-- Reactor plasma rays (8 directions) -->
  <g filter="url(#glow-strong)" opacity="0.7">
    <line x1="256" y1="256" x2="256" y2="60" stroke="#FF6600" stroke-width="3" stroke-opacity="0.8"/>
    <line x1="256" y1="256" x2="256" y2="452" stroke="#FF6600" stroke-width="3" stroke-opacity="0.8"/>
    <line x1="256" y1="256" x2="60" y2="256" stroke="#FF6600" stroke-width="3" stroke-opacity="0.8"/>
    <line x1="256" y1="256" x2="452" y2="256" stroke="#FF6600" stroke-width="3" stroke-opacity="0.8"/>
    <line x1="256" y1="256" x2="114" y2="114" stroke="#FFD700" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="256" y1="256" x2="398" y2="114" stroke="#FFD700" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="256" y1="256" x2="114" y2="398" stroke="#FFD700" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="256" y1="256" x2="398" y2="398" stroke="#FFD700" stroke-width="2" stroke-opacity="0.6"/>
  </g>

  <!-- Orbiting rings -->
  <ellipse cx="256" cy="256" rx="155" ry="50" fill="none" stroke="#FF8C00" stroke-width="2.5" opacity="0.6" transform="rotate(-30 256 256)"/>
  <ellipse cx="256" cy="256" rx="155" ry="50" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="155" ry="50" fill="none" stroke="#FF4500" stroke-width="2" opacity="0.4" transform="rotate(150 256 256)"/>

  <!-- Orbiting particles -->
  <circle cx="401" cy="256" r="8" fill="#FFD700" filter="url(#glow-soft)" opacity="0.9" transform="rotate(-30 256 256)"/>
  <circle cx="111" cy="256" r="6" fill="#FF6600" filter="url(#glow-soft)" opacity="0.8" transform="rotate(60 256 256)"/>
  <circle cx="256" cy="101" r="7" fill="#FF4500" filter="url(#glow-soft)" opacity="0.8" transform="rotate(150 256 256)"/>

  <!-- Core plasma glow -->
  <circle cx="256" cy="256" r="90" fill="url(#core)" filter="url(#glow-core)" opacity="0.8"/>
  <circle cx="256" cy="256" r="60" fill="url(#plasma)" filter="url(#glow-strong)"/>

  <!-- Central prompt text symbol -->
  <g filter="url(#glow-strong)">
    <!-- ">" cursor symbol -->
    <path d="M220 220 L290 256 L220 292" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Underline cursor bar -->
    <rect x="230" y="298" width="50" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Energy particles around core -->
  <g filter="url(#glow-soft)" opacity="0.9">
    <circle cx="256" cy="166" r="5" fill="#FFD700"/>
    <circle cx="346" cy="256" r="4" fill="#FF8C00"/>
    <circle cx="256" cy="346" r="5" fill="#FFD700"/>
    <circle cx="166" cy="256" r="4" fill="#FF8C00"/>
    <circle cx="313" cy="199" r="3" fill="#FFFFFF"/>
    <circle cx="313" cy="313" r="3" fill="#FFFFFF"/>
    <circle cx="199" cy="199" r="3" fill="#FFFFFF"/>
    <circle cx="199" cy="313" r="3" fill="#FFFFFF"/>
  </g>

  <!-- Outer energy burst lines -->
  <g stroke="#FF4500" stroke-width="1.5" opacity="0.4" filter="url(#glow-soft)">
    <line x1="256" y1="36" x2="256" y2="80"/>
    <line x1="476" y1="256" x2="432" y2="256"/>
    <line x1="36" y1="256" x2="80" y2="256"/>
    <line x1="256" y1="476" x2="256" y2="432"/>
    <line x1="404" y1="108" x2="375" y2="137"/>
    <line x1="108" y1="108" x2="137" y2="137"/>
    <line x1="404" y1="404" x2="375" y2="375"/>
    <line x1="108" y1="404" x2="137" y2="375"/>
  </g>

  <!-- Label -->
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="18" fill="#FF8C00" opacity="0.8" filter="url(#glow-soft)">PROMPT FORGE</text>
</svg>
