<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 민트-크림 배경 -->
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <g clip-path="url(#clip07)">
    <!-- Layer 2: 학생 실루엣 (지구본 들고 고민) -->
    <!-- 몸통 -->
    <rect x="360" y="560" width="304" height="380" rx="60" fill="#7B1FA2"/>
    <!-- 머리 -->
    <circle cx="512" cy="480" r="130" fill="#FFCC80"/>
    <!-- 머리카락 -->
    <ellipse cx="512" cy="370" rx="130" ry="60" fill="#5D4037"/>
    <!-- 눈 -->
    <circle cx="474" cy="475" r="18" fill="#37474F"/>
    <circle cx="550" cy="475" r="18" fill="#37474F"/>
    <!-- 입 (고민 표정) -->
    <path d="M478 520 Q512 508 546 520" stroke="#5D4037" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- 팔 (지구본 들기) -->
    <path d="M360 620 Q280 580 240 640 Q220 680 260 720 Q300 760 340 700" stroke="#FFCC80" stroke-width="64" stroke-linecap="round" fill="none"/>

    <!-- 지구본 (왼손에 들고 있음) -->
    <circle cx="200" cy="760" r="110" fill="#1565C0"/>
    <ellipse cx="200" cy="760" rx="110" ry="110" fill="none" stroke="#29B6F6" stroke-width="8" opacity="0.7"/>
    <ellipse cx="200" cy="760" rx="68" ry="110" fill="none" stroke="#29B6F6" stroke-width="6" opacity="0.6"/>
    <line x1="90" y1="760" x2="310" y2="760" stroke="#29B6F6" stroke-width="6" opacity="0.6"/>
    <!-- 대륙들 -->
    <path d="M150 700 Q175 685 195 705 Q210 725 195 750 Q175 760 155 740 Z" fill="#66BB6A"/>
    <path d="M210 710 Q235 698 255 715 Q265 735 250 752 Q230 760 210 742 Z" fill="#66BB6A"/>

    <!-- Layer 3: 말풍선 (물음표 + 국기) -->
    <rect x="540" y="300" width="360" height="200" rx="28" fill="#FFFFFF" stroke="#CE93D8" stroke-width="8"/>
    <!-- 말풍선 꼬리 -->
    <path d="M555 500 L540 540 L600 500 Z" fill="#FFFFFF" stroke="#CE93D8" stroke-width="8"/>
    <!-- 국기 이모지와 물음표 -->
    <text x="660" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🇧🇷</text>
    <text x="820" y="390" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="100" fill="#7B1FA2" text-anchor="middle">?</text>
    <text x="720" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#546E7A" text-anchor="middle">수도는?</text>

    <!-- 상단 게임 제목 -->
    <rect x="200" y="130" width="624" height="80" rx="22" fill="#00897B"/>
    <text x="512" y="186" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">GEO QUIZ</text>
  </g>
</svg>
