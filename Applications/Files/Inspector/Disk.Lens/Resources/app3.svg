  <text x="373" y="538" font-family="'Segoe UI', sans-serif" font-size="44" fill="#1B5E20">31%</text>
  <!-- 항목 4: System 18% -->
  <text x="100" y="624" font-family="'Segoe UI', sans-serif" font-size="52" fill="#6A1B9A">📁 System</text>
  <rect x="100" y="634" width="824" height="56" rx="8" fill="#F3E5F5"/>
  <rect x="100" y="634" width="148" height="56" rx="8" fill="#7B1FA2"/>
  <text x="266" y="676" font-family="'Segoe UI', sans-serif" font-size="44" fill="#4A148C">18%</text>
