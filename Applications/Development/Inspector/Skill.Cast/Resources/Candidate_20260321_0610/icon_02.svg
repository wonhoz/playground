<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D2B7A"/>
      <stop offset="100%" stop-color="#1A1850"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B6FD4"/>
      <stop offset="100%" stop-color="#5A4EC4"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D8FE8"/>
      <stop offset="100%" stop-color="#7B6FD4"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B8FF"/>
      <stop offset="100%" stop-color="#9D8FE8"/>
    </linearGradient>
    <linearGradient id="topcard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0EEFF"/>
      <stop offset="100%" stop-color="#D8D0FF"/>
    </linearGradient>
    <filter id="shadow02">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- 배경 글로우 -->
  <ellipse cx="512" cy="520" rx="340" ry="280" fill="#4A3FA0" fill-opacity="0.3"/>

  <!-- Layer 2: 메인 오브젝트 — 겹쳐진 카드들 -->
  <!-- 뒤쪽 카드 3 -->
  <rect x="280" y="360" width="420" height="300" rx="20" fill="url(#card1)" filter="url(#shadow02)" transform="rotate(-8, 490, 510)"/>
  <!-- 뒤쪽 카드 2 -->
  <rect x="280" y="360" width="420" height="300" rx="20" fill="url(#card2)" filter="url(#shadow02)" transform="rotate(-4, 490, 510)"/>
  <!-- 앞쪽 카드 (메인) -->
  <rect x="280" y="360" width="420" height="300" rx="20" fill="url(#topcard)" filter="url(#shadow02)"/>

  <!-- 카드 내용 — 스킬 목록 -->
  <!-- 헤더 바 -->
  <rect x="280" y="360" width="420" height="56" rx="20" fill="#5A4EC4"/>
  <rect x="280" y="394" width="420" height="22" fill="#5A4EC4"/>

  <!-- 헤더 텍스트 표시 (막대) -->
  <rect x="308" y="377" width="120" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.9"/>
  <!-- 헤더 도트 -->
  <circle cx="662" cy="384" r="8" fill="#FF6B6B"/>
  <circle cx="638" cy="384" r="8" fill="#FFD93D"/>
  <circle cx="614" cy="384" r="8" fill="#6BCB77"/>

  <!-- 목록 항목들 -->
  <rect x="308" y="440" width="18" height="18" rx="4" fill="#9D8FE8"/>
  <rect x="338" y="443" width="140" height="12" rx="6" fill="#3A3080" fill-opacity="0.5"/>
  <rect x="560" y="443" width="60" height="12" rx="6" fill="#6BCB77" fill-opacity="0.7"/>

  <rect x="308" y="476" width="18" height="18" rx="4" fill="#7B6FD4"/>
  <rect x="338" y="479" width="100" height="12" rx="6" fill="#3A3080" fill-opacity="0.5"/>
  <rect x="560" y="479" width="50" height="12" rx="6" fill="#FFD700" fill-opacity="0.7"/>

  <rect x="308" y="512" width="18" height="18" rx="4" fill="#C4B8FF"/>
  <rect x="338" y="515" width="160" height="12" rx="6" fill="#3A3080" fill-opacity="0.5"/>
  <rect x="560" y="515" width="70" height="12" rx="6" fill="#FF6B9D" fill-opacity="0.7"/>

  <rect x="308" y="548" width="18" height="18" rx="4" fill="#9D8FE8"/>
  <rect x="338" y="551" width="120" height="12" rx="6" fill="#3A3080" fill-opacity="0.5"/>
  <rect x="560" y="551" width="55" height="12" rx="6" fill="#6BCB77" fill-opacity="0.7"/>

  <!-- 구분선 -->
  <line x1="296" y1="462" x2="684" y2="462" stroke="#C4B8FF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="296" y1="498" x2="684" y2="498" stroke="#C4B8FF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="296" y1="534" x2="684" y2="534" stroke="#C4B8FF" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Layer 3: 검색 아이콘 -->
  <circle cx="760" cy="280" r="52" fill="none" stroke="#FFD700" stroke-width="18" stroke-linecap="round"/>
  <line x1="798" y1="318" x2="830" y2="350" stroke="#FFD700" stroke-width="18" stroke-linecap="round"/>
  <!-- 마법 별 -->
  <polygon points="512,180 522,210 554,210 530,228 540,258 512,240 484,258 494,228 470,210 502,210" fill="#C4B8FF" fill-opacity="0.8"/>
</svg>
