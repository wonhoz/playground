<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#180a04"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="fireBreath" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#EF4444" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#DC2626" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d1408"/>
      <stop offset="100%" stop-color="#1e0a04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Dragon body (right side, facing left) -->
  <!-- Dragon tail -->
  <path d="M480,400 Q440,350 410,300 Q390,260 400,220" fill="none" stroke="#F97316" stroke-width="18" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M480,400 Q440,350 410,300 Q390,260 400,220" fill="none" stroke="#EF4444" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Dragon body -->
  <path d="M400,220 Q360,180 340,160 Q310,140 290,140" fill="none" stroke="#F97316" stroke-width="25" stroke-linecap="round" stroke-opacity="0.45"/>
  <path d="M400,220 Q360,180 340,160 Q310,140 290,140" fill="none" stroke="#EF4444" stroke-width="14" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- Dragon neck -->
  <path d="M290,140 Q260,130 240,115 Q225,105 210,95" fill="none" stroke="#F97316" stroke-width="22" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Dragon head -->
  <ellipse cx="195" cy="88" rx="50" ry="35" fill="#2a0c04" stroke="#F97316" stroke-width="3" stroke-opacity="0.8" filter="url(#softglow)" transform="rotate(-20 195 88)"/>

  <!-- Dragon eye -->
  <circle cx="178" cy="75" r="10" fill="#F97316" filter="url(#glow)"/>
  <circle cx="178" cy="75" r="6" fill="#0a0204"/>
  <circle cx="181" cy="72" r="3" fill="white" fill-opacity="0.7"/>

  <!-- Dragon nostril -->
  <ellipse cx="155" cy="90" rx="6" ry="4" fill="#EF4444" fill-opacity="0.6" transform="rotate(-15 155 90)"/>

  <!-- Dragon horn -->
  <path d="M200,62 L208,40 Q210,35 215,38 L205,62" fill="#2a0c04" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Dragon fin/wing -->
  <path d="M310,140 Q330,100 360,80 Q340,120 350,160 Z" fill="#F97316" fill-opacity="0.2" stroke="#F97316" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M290,140 Q300,100 320,75 Q310,115 325,145 Z" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Dragon breath / fire -->
  <path d="M145,95 Q120,130 80,200 Q50,260 40,340" fill="none" stroke="#F97316" stroke-width="30" stroke-opacity="0.3" stroke-linecap="round" filter="url(#fireglow)"/>
  <path d="M145,95 Q118,128 78,198 Q48,258 38,338" fill="none" stroke="#EF4444" stroke-width="18" stroke-opacity="0.35" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M145,95 Q115,126 75,196 Q45,256 35,336" fill="none" stroke="#F97316" stroke-width="8" stroke-opacity="0.6" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M145,95 Q112,124 72,194 Q42,254 32,334" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Document being forged by fire -->
  <rect x="50" y="340" width="180" height="135" rx="8" fill="url(#docGrad)" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.8" filter="url(#glow)"/>
  <!-- Doc fold -->
  <polygon points="200,340 230,340 230,370" fill="#1a0804" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="200" y1="340" x2="230" y2="370" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- PDF label -->
  <rect x="65" y="355" width="55" height="16" rx="8" fill="#F97316" fill-opacity="0.6" filter="url(#softglow)"/>

  <!-- Doc content lines (forged) -->
  <line x1="65" y1="382" x2="218" y2="382" stroke="#F97316" stroke-width="2" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="65" y1="397" x2="205" y2="397" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="65" y1="412" x2="218" y2="412" stroke="#F97316" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="65" y1="427" x2="190" y2="427" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="65" y1="445" x2="218" y2="445" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="65" y1="460" x2="200" y2="460" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Fire sparks -->
  <g filter="url(#glow)">
    <circle cx="100" cy="310" r="5" fill="#F97316"/>
    <circle cx="70" cy="330" r="4" fill="#EF4444"/>
    <circle cx="130" cy="305" r="3.5" fill="#DC2626"/>
    <circle cx="165" cy="320" r="4" fill="#F97316"/>
  </g>
</svg>
