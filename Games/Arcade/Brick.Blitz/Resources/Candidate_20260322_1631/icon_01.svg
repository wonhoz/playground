    <rect x="778" y="130" width="106" height="14" rx="7" fill="white" opacity="0.15"/>

    <!-- Row 2 - Orange -->
    <rect x="82" y="190" width="106" height="48" rx="8" fill="#FF9500"/>
    <rect x="198" y="190" width="106" height="48" rx="8" fill="#FFAA22"/>
    <rect x="314" y="190" width="106" height="48" rx="8" fill="#FF9500"/>
    <rect x="430" y="190" width="106" height="48" rx="8" fill="#FFAA22"/>
    <rect x="546" y="190" width="106" height="48" rx="8" fill="#FF9500"/>
    <rect x="662" y="190" width="106" height="48" rx="8" fill="#FFAA22"/>
    <rect x="778" y="190" width="106" height="48" rx="8" fill="#FF9500"/>
    <rect x="82" y="190" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="198" y="190" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
    <rect x="314" y="190" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="430" y="190" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
    <rect x="546" y="190" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="662" y="190" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
    <rect x="778" y="190" width="106" height="14" rx="7" fill="white" opacity="0.13"/>

    <!-- Row 3 - Yellow -->
    <rect x="82" y="250" width="106" height="48" rx="8" fill="#FFD700"/>
    <rect x="198" y="250" width="106" height="48" rx="8" fill="#FFE033"/>
    <rect x="314" y="250" width="106" height="48" rx="8" fill="#FFD700"/>
    <rect x="430" y="250" width="106" height="48" rx="8" fill="#FFE033"/>
