<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f0a00"/>
      <stop offset="100%" stop-color="#2a1000"/>
    </linearGradient>
    <linearGradient id="lava" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#800000"/>
    </linearGradient>
    <radialGradient id="fire_glow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lava ground glow -->
  <ellipse cx="256" cy="460" rx="160" ry="40" fill="#ff4400" opacity="0.3"/>
  <!-- Tower base - dark volcanic stone -->
  <rect x="190" y="280" width="132" height="180" rx="6" fill="#3a1a0a"/>
  <!-- Lava cracks on tower -->
  <path d="M210 290 L220 320 L215 350 L225 380" fill="none" stroke="#ff4400" stroke-width="3" opacity="0.7"/>
  <path d="M295 300 L285 330 L290 360" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.6"/>
  <!-- Tower top platform -->
  <rect x="170" y="254" width="172" height="32" rx="6" fill="#4a2010"/>
  <!-- Fire bowl on top -->
  <path d="M220 254 Q256 240 292 254" fill="#5a2a10" stroke="#4a1a08" stroke-width="2"/>
  <path d="M220 254 L230 200 Q256 160 282 200 L292 254Z" fill="#5a2a10"/>
  <!-- Flames -->
  <path d="M236 254 Q230 220 256 190 Q248 220 270 210 Q260 230 280 240 Q262 240 260 254Z" fill="#ff6600"/>
  <path d="M240 254 Q238 225 256 200 Q250 230 268 220 Q258 238 274 248 Q258 244 256 254Z" fill="#ffaa00"/>
  <path d="M248 254 Q246 235 256 215 Q254 235 264 228 Q258 244 262 254Z" fill="#ffdd00"/>
  <!-- Fire glow effect -->
  <ellipse cx="256" cy="220" rx="60" ry="50" fill="url(#fire_glow)" opacity="0.6"/>
  <!-- Battlements -->
  <rect x="173" y="220" width="26" height="40" rx="4" fill="#4a2010"/>
  <rect x="213" y="220" width="26" height="40" rx="4" fill="#4a2010"/>
  <rect x="273" y="220" width="26" height="40" rx="4" fill="#4a2010"/>
  <rect x="313" y="220" width="26" height="40" rx="4" fill="#4a2010"/>
  <!-- Lava river at base -->
  <path d="M80 460 Q140 440 200 455 Q256 465 310 450 Q370 440 432 455" fill="none" stroke="#ff4400" stroke-width="8" opacity="0.7"/>
  <!-- Lava pools -->
  <ellipse cx="150" cy="460" rx="30" ry="12" fill="#ff4400" opacity="0.5"/>
  <ellipse cx="380" cy="455" rx="25" ry="10" fill="#ff6600" opacity="0.4"/>
  <!-- Sparks flying -->
  <circle cx="200" cy="180" r="4" fill="#ffaa00" opacity="0.9"/>
  <circle cx="310" cy="165" r="3" fill="#ff6600" opacity="0.8"/>
  <circle cx="170" cy="210" r="3" fill="#ffdd00" opacity="0.7"/>
  <circle cx="340" cy="200" r="4" fill="#ffaa00" opacity="0.9"/>
  <!-- Tower window/door -->
  <path d="M236 460 L236 370 Q256 350 276 370 L276 460Z" fill="#1f0a00"/>
</svg>