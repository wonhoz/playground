<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 검색창("ICON") + 결과 아이콘 카드들 | 공간/장면 | 민트+파랑+노랑 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0FFF8"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#004D40" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: Search bar -->
  <rect x="80" y="130" width="864" height="140" rx="70" fill="#1565C0" filter="url(#sh2)"/>
  <!-- Magnifier icon inside bar -->
  <circle cx="170" cy="200" r="38" fill="none" stroke="white" stroke-width="16"/>
  <line x1="198" y1="228" x2="225" y2="255" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Search text -->
  <text x="290" y="215" font-family="Arial Black, sans-serif" font-size="84" font-weight="900"
        fill="white" dominant-baseline="middle">ICON</text>
  <!-- Cursor blink -->
  <rect x="640" y="162" width="12" height="76" rx="6" fill="#90CAF9"/>

  <!-- Layer 3: Result icon cards (3 cards, vivid colors) -->
  <!-- Card 1 -->
  <rect x="80"  y="330" width="240" height="560" rx="28" fill="white" filter="url(#sh2)"/>
  <!-- Star icon in card 1 -->
  <polygon points="200,400 218,455 275,455 230,488 248,543 200,510 152,543 170,488 125,455 182,455"
           fill="#FFD740"/>
  <rect x="130" y="570" width="140" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="150" y="600" width="100" height="14" rx="7" fill="#EEEEEE"/>
  <!-- Fav star -->
  <polygon points="200,660 210,690 242,690 218,708 226,738 200,720 174,738 182,708 158,690 190,690"
           fill="#FFC107" transform="scale(0.7) translate(86,286)"/>

  <!-- Card 2 (selected/highlighted) -->
  <rect x="392" y="310" width="240" height="580" rx="28" fill="#1565C0" filter="url(#sh2)"/>
  <!-- Home icon in card 2 -->
  <polygon points="512,380 570,440 570,510 454,510 454,440" fill="white"/>
  <rect x="490" y="458" width="44" height="52" rx="6" fill="#90CAF9"/>
  <rect x="445" y="555" width="134" height="16" rx="8" fill="white" opacity="0.5"/>
  <rect x="465" y="585" width="94" height="14" rx="7" fill="white" opacity="0.3"/>
  <rect x="437" y="620" width="150" height="38" rx="19" fill="white" opacity="0.2"/>
  <text x="512" y="639" font-family="Arial, sans-serif" font-size="22" fill="white"
        text-anchor="middle" dominant-baseline="middle">복사</text>

  <!-- Card 3 -->
  <rect x="704" y="330" width="240" height="560" rx="28" fill="white" filter="url(#sh2)"/>
  <!-- Bell icon in card 3 -->
  <path d="M824,390 C824,390 770,408 770,468 L878,468 C878,408 824,390 824,390Z" fill="#FF7043"/>
  <circle cx="824" cy="483" r="16" fill="#FF7043"/>
  <rect x="754" y="530" width="140" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="774" y="560" width="100" height="14" rx="7" fill="#EEEEEE"/>
</svg>
