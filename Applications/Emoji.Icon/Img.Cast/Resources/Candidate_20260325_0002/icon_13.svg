<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#E3F2FD"/>
  <!-- Layer 2: 좌측 SVG 코드 → 우측 PNG 이미지 -->
  <!-- 왼쪽 패널 -->
  <rect x="220" y="280" width="254" height="420" rx="16" fill="#1A1A2E"/>
  <rect x="220" y="280" width="254" height="44" rx="16" fill="#252535"/>
  <rect x="220" y="302" width="254" height="22" fill="#252535"/>
  <text x="347" y="306" text-anchor="middle" font-family="Arial" font-size="28" fill="#90A4AE">icon.svg</text>
  <!-- SVG 코드 -->
  <text x="238" y="364" font-family="Courier New" font-size="38" fill="#4FC3F7">&lt;svg&gt;</text>
  <text x="248" y="402" font-family="Courier New" font-size="34" fill="#A5D6A7">  &lt;rect</text>
  <text x="248" y="436" font-family="Courier New" font-size="32" fill="#E0E0E0">   rx="190"</text>
  <text x="248" y="470" font-family="Courier New" font-size="32" fill="#CE93D8">   fill="…"</text>
  <text x="248" y="504" font-family="Courier New" font-size="34" fill="#A5D6A7">  /&gt;</text>
  <text x="238" y="540" font-family="Courier New" font-size="34" fill="#F48FB1">  &lt;circle</text>
  <text x="238" y="574" font-family="Courier New" font-size="34" fill="#80CBC4">  &lt;text</text>
  <text x="238" y="608" font-family="Courier New" font-size="38" fill="#4FC3F7">&lt;/svg&gt;</text>
  <!-- 중앙 화살표 -->
  <path d="M482,490 L550,490" fill="none" stroke="#1565C0" stroke-width="20" stroke-linecap="round"/>
  <polygon points="556,490 530,470 530,510" fill="#1565C0"/>
  <text x="517" y="556" text-anchor="middle" font-family="Arial Black" font-size="44" fill="#1565C0">Cast!</text>
  <!-- 오른쪽 패널 (렌더링된 PNG) -->
  <rect x="566" y="280" width="254" height="420" rx="16" fill="white" stroke="#CFD8DC" stroke-width="6"/>
  <rect x="566" y="280" width="254" height="44" rx="16" fill="#1565C0"/>
  <rect x="566" y="302" width="254" height="22" fill="#1565C0"/>
  <text x="693" y="306" text-anchor="middle" font-family="Arial" font-size="28" fill="white">icon.png</text>
  <!-- 렌더링된 이미지 (별 모양) -->
  <rect x="586" y="338" width="214" height="344" rx="12" fill="#F5F5F5"/>
  <!-- 예시 아이콘 (간단한 앱 아이콘) -->
  <rect x="612" y="358" width="162" height="162" rx="30" fill="#1565C0"/>
  <polygon points="693,380 710,428 760,428 720,458 734,506 693,476 652,506 666,458 626,428 676,428" fill="#FFD600"/>
  <!-- PNG 미리보기 영역 아래 -->
  <rect x="596" y="540" width="194" height="10" rx="5" fill="#BDBDBD"/>
  <text x="693" y="640" text-anchor="middle" font-family="Arial" font-size="44" fill="#546E7A">icon.png</text>
  <text x="693" y="692" text-anchor="middle" font-family="Arial" font-size="36" fill="#90A4AE">1024×1024</text>
  <!-- Layer 3 -->
  <text x="512" y="840" text-anchor="middle" font-family="Arial Black" font-size="76" font-weight="900" fill="#1565C0">SVG → PNG</text>
</svg>