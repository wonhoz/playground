    <text x="290" y="560" font-family="Consolas, monospace" font-weight="700" font-size="44" fill="#3E2723" text-anchor="middle">my-project</text>
  </g>
  <!-- 번개 아이콘 (빠른 실행) -->
  <g>
    <path d="M 500 300 L 610 300 L 550 460 L 640 460 L 500 700 L 560 520 L 470 520 Z" fill="#FFD93D" stroke="#3E2723" stroke-width="14" stroke-linejoin="round"/>
  </g>
  <!-- 터미널 -->
  <g>
    <rect x="640" y="290" width="300" height="400" rx="28" fill="#1B1B1B" stroke="#3E2723" stroke-width="18"/>
    <rect x="640" y="290" width="300" height="60" rx="28" fill="#3E2723"/>
    <rect x="640" y="324" width="300" height="30" fill="#3E2723"/>
    <circle cx="676" cy="320" r="12" fill="#FF5252"/>
    <circle cx="706" cy="320" r="12" fill="#FFD93D"/>
    <circle cx="736" cy="320" r="12" fill="#4CAF50"/>
    <!-- 프롬프트 -->
    <text x="660" y="420" font-family="Consolas, monospace" font-weight="700" font-size="40" fill="#06D6A0">$ claude</text>
    <text x="660" y="478" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFFFFF">&gt; Hello!</text>
    <text x="660" y="526" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFD93D">&gt; Ready</text>
    <!-- 커서 블링크 -->
