<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 딥 네이비 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0A0E2A"/>

  <!-- Layer 2: 로봇 몸통 실루엣 -->

  <!-- 다리 -->
  <rect x="400" y="790" width="90" height="130" rx="18" fill="#2A3A6A"/>
  <rect x="534" y="790" width="90" height="130" rx="18" fill="#2A3A6A"/>
  <!-- 발 -->
  <rect x="384" y="895" width="120" height="40" rx="14" fill="#3A4E8A"/>
  <rect x="518" y="895" width="120" height="40" rx="14" fill="#3A4E8A"/>

  <!-- 몸통 -->
  <rect x="340" y="510" width="344" height="296" rx="36" fill="#1E2D62"/>
  <rect x="340" y="510" width="344" height="296" rx="36" fill="none" stroke="#4A6AAA" stroke-width="10"/>

  <!-- 몸통 배지: 가슴 패널 -->
  <rect x="388" y="568" width="248" height="160" rx="16" fill="#0E1840" stroke="#3A5A9A" stroke-width="6"/>
  <!-- 가슴 패널 디테일: 작은 LED 3개 -->
  <circle cx="444" cy="620" r="18" fill="#FF1493"/>
  <circle cx="512" cy="620" r="18" fill="#FF69B4" opacity="0.7"/>
  <circle cx="580" cy="620" r="18" fill="#2A3A6A"/>
  <!-- 가슴 패널 하단 바 -->
  <rect x="406" y="672" width="212" height="16" rx="8" fill="#3A5A9A" opacity="0.8"/>
  <rect x="406" y="672" width="120" height="16" rx="8" fill="#7A9ADA"/>

  <!-- 팔 -->
  <rect x="220" y="530" width="110" height="220" rx="30" fill="#1E2D62" stroke="#4A6AAA" stroke-width="8"/>
  <rect x="694" y="530" width="110" height="220" rx="30" fill="#1E2D62" stroke="#4A6AAA" stroke-width="8"/>
  <!-- 손 -->
  <circle cx="275" cy="775" r="46" fill="#2A3A6A" stroke="#4A6AAA" stroke-width="8"/>
  <circle cx="749" cy="775" r="46" fill="#2A3A6A" stroke="#4A6AAA" stroke-width="8"/>

  <!-- 목 -->
  <rect x="450" y="460" width="124" height="60" rx="16" fill="#1E2D62" stroke="#4A6AAA" stroke-width="8"/>

  <!-- 머리 -->
  <rect x="310" y="240" width="404" height="232" rx="60" fill="#1E2D62" stroke="#4A6AAA" stroke-width="12"/>

  <!-- Layer 3: 눈 (핑크 빛나는) -->
  <!-- 왼쪽 눈 -->
  <ellipse cx="424" cy="350" rx="56" ry="52" fill="#FF1493" opacity="0.25"/>
  <ellipse cx="424" cy="350" rx="38" ry="36" fill="#FF69B4"/>
  <ellipse cx="424" cy="350" rx="22" ry="20" fill="#FF1493"/>
  <ellipse cx="424" cy="350" rx="10" ry="9" fill="white"/>
  <!-- 오른쪽 눈 -->
  <ellipse cx="600" cy="350" rx="56" ry="52" fill="#FF1493" opacity="0.25"/>
  <ellipse cx="600" cy="350" rx="38" ry="36" fill="#FF69B4"/>
  <ellipse cx="600" cy="350" rx="22" ry="20" fill="#FF1493"/>
  <ellipse cx="600" cy="350" rx="10" ry="9" fill="white"/>

  <!-- 안테나 -->
  <rect x="494" y="168" width="36" height="80" rx="14" fill="#3A5A9A"/>
  <circle cx="512" cy="148" r="30" fill="#FF69B4"/>
  <circle cx="512" cy="148" r="16" fill="#FF1493"/>

  <!-- 입 (직선 → 로봇다운 표정) -->
  <rect x="420" y="428" width="184" height="20" rx="10" fill="#3A5A9A"/>
  <rect x="446" y="428" width="40" height="20" rx="10" fill="#7A9ADA" opacity="0.7"/>

  <!-- 귀 (측면 원형 센서) -->
  <circle cx="310" cy="356" r="28" fill="#2A3A6A" stroke="#4A6AAA" stroke-width="8"/>
  <circle cx="714" cy="356" r="28" fill="#2A3A6A" stroke="#4A6AAA" stroke-width="8"/>
</svg>
