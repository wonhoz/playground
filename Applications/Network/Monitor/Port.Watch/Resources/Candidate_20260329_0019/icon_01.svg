<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 포트 테이블 UI (:80/:443/:8080) | 공간/장면 | 민트+초록+파랑 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0FFF8"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#004D40" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: Table panel -->
  <rect x="60" y="80" width="904" height="864" rx="24" fill="white" filter="url(#sh1)"/>
  <!-- Header row -->
  <rect x="60" y="80" width="904" height="80" rx="24" fill="#00695C"/>
  <rect x="60" y="130" width="904" height="30" fill="#00695C"/>
  <text x="160" y="120" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        dominant-baseline="middle">Port</text>
  <text x="340" y="120" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        dominant-baseline="middle">Protocol</text>
  <text x="560" y="120" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        dominant-baseline="middle">Process</text>
  <text x="830" y="120" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        dominant-baseline="middle">State</text>

  <!-- Layer 3: Port rows -->
  <!-- Row 1: :80 -->
  <rect x="72" y="175" width="880" height="76" rx="6" fill="#E0F2F1"/>
  <text x="160" y="213" font-family="Consolas, monospace" font-size="42" font-weight="bold"
        fill="#006064" dominant-baseline="middle">:80</text>
  <text x="340" y="213" font-family="Consolas, monospace" font-size="36" fill="#546E7A"
        dominant-baseline="middle">TCP</text>
  <text x="560" y="213" font-family="Consolas, monospace" font-size="36" fill="#37474F"
        dominant-baseline="middle">nginx.exe</text>
  <circle cx="858" cy="213" r="18" fill="#43A047"/>

  <!-- Row 2: :443 -->
  <rect x="72" y="263" width="880" height="76" rx="6" fill="#F5F5F5"/>
  <text x="160" y="301" font-family="Consolas, monospace" font-size="42" font-weight="bold"
        fill="#006064" dominant-baseline="middle">:443</text>
  <text x="340" y="301" font-family="Consolas, monospace" font-size="36" fill="#546E7A"
        dominant-baseline="middle">TCP</text>
  <text x="560" y="301" font-family="Consolas, monospace" font-size="36" fill="#37474F"
        dominant-baseline="middle">nginx.exe</text>
  <circle cx="858" cy="301" r="18" fill="#43A047"/>

  <!-- Row 3: :3306 -->
  <rect x="72" y="351" width="880" height="76" rx="6" fill="#E0F2F1"/>
  <text x="160" y="389" font-family="Consolas, monospace" font-size="42" font-weight="bold"
        fill="#006064" dominant-baseline="middle">:3306</text>
  <text x="340" y="389" font-family="Consolas, monospace" font-size="36" fill="#546E7A"
        dominant-baseline="middle">TCP</text>
  <text x="560" y="389" font-family="Consolas, monospace" font-size="36" fill="#37474F"
        dominant-baseline="middle">mysqld.exe</text>
  <circle cx="858" cy="389" r="18" fill="#43A047"/>

  <!-- Row 4: :8080 (highlighted fav) -->
  <rect x="72" y="439" width="880" height="76" rx="6" fill="#FFF9C4"/>
  <!-- Fav star -->
  <text x="100" y="477" font-family="Arial, sans-serif" font-size="36" fill="#FFC107"
        dominant-baseline="middle">★</text>
  <text x="160" y="477" font-family="Consolas, monospace" font-size="42" font-weight="bold"
        fill="#006064" dominant-baseline="middle">:8080</text>
  <text x="340" y="477" font-family="Consolas, monospace" font-size="36" fill="#546E7A"
        dominant-baseline="middle">TCP</text>
  <text x="560" y="477" font-family="Consolas, monospace" font-size="36" fill="#37474F"
        dominant-baseline="middle">node.exe</text>
  <circle cx="858" cy="477" r="18" fill="#43A047"/>

  <!-- Row 5: :5432 -->
  <rect x="72" y="527" width="880" height="76" rx="6" fill="#E0F2F1"/>
  <text x="160" y="565" font-family="Consolas, monospace" font-size="42" font-weight="bold"
        fill="#006064" dominant-baseline="middle">:5432</text>
  <text x="340" y="565" font-family="Consolas, monospace" font-size="36" fill="#546E7A"
        dominant-baseline="middle">TCP</text>
  <text x="560" y="565" font-family="Consolas, monospace" font-size="36" fill="#37474F"
        dominant-baseline="middle">postgres</text>
  <circle cx="858" cy="565" r="18" fill="#43A047"/>

  <!-- Fading rows -->
  <rect x="72" y="615" width="880" height="70" rx="6" fill="#F5F5F5" opacity="0.7"/>
  <rect x="72" y="697" width="880" height="70" rx="6" fill="#F5F5F5" opacity="0.4"/>
  <rect x="72" y="779" width="880" height="70" rx="6" fill="#F5F5F5" opacity="0.2"/>

  <!-- Status bar -->
  <rect x="60" y="878" width="904" height="66" rx="24" fill="#E0F2F1"/>
  <text x="100" y="911" font-family="Arial, sans-serif" font-size="28" fill="#00695C"
        dominant-baseline="middle">● LIVE  │  5개 포트 감시 중  │  자동 갱신: 5초</text>
</svg>
