<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#001a33"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0044aa"/>
      <stop offset="100%" stop-color="#001166"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256,60 L420,120 L420,280 Q420,400 256,460 Q92,400 92,280 L92,120 Z" fill="url(#shield)" stroke="#0066ff" stroke-width="4"/>
  <!-- Shield inner -->
  <path d="M256,85 L398,138 L398,278 Q398,383 256,433 Q114,383 114,278 L114,138 Z" fill="none" stroke="#0088ff" stroke-width="2" opacity="0.6"/>
  <!-- Binary code on shield -->
  <text x="150" y="190" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">01100011</text>
  <text x="150" y="215" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">10001010</text>
  <text x="150" y="240" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">01110101</text>
  <text x="150" y="265" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">11001001</text>
  <text x="150" y="290" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">00101110</text>
  <text x="150" y="315" font-family="monospace" font-size="15" fill="#00aaff" opacity="0.7">10110100</text>
  <!-- Lock overlay -->
  <rect x="216" y="230" width="80" height="80" rx="10" fill="#001a33" stroke="#00aaff" stroke-width="3" filter="url(#glow)"/>
  <path d="M238,230 L238,205 Q238,180 256,180 Q274,180 274,205 L274,230" fill="none" stroke="#00aaff" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="262" r="14" fill="#00aaff" filter="url(#glow)"/>
  <rect x="250" y="262" width="12" height="22" rx="4" fill="#00aaff" filter="url(#glow)"/>
</svg>