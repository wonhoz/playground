<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: ICO 멀티사이즈 그리드 (2×2) -->
    <!-- 16px 대표 칸 -->
    <rect x="110" y="220" width="340" height="260" rx="28" fill="#EF6C00"/>
    <text x="280" y="320" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="96" fill="#FFFFFF" text-anchor="middle">16</text>
    <text x="280" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#FFE0B2" text-anchor="middle">px</text>

    <!-- 32px 칸 -->
    <rect x="574" y="220" width="340" height="260" rx="28" fill="#F57C00"/>
    <text x="744" y="320" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="96" fill="#FFFFFF" text-anchor="middle">32</text>
    <text x="744" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#FFE0B2" text-anchor="middle">px</text>

    <!-- 48px 칸 -->
    <rect x="110" y="524" width="340" height="260" rx="28" fill="#FF8F00"/>
    <text x="280" y="624" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="96" fill="#FFFFFF" text-anchor="middle">48</text>
    <text x="280" y="734" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#FFE0B2" text-anchor="middle">px</text>

    <!-- 256px 칸 (골드 강조) -->
    <rect x="574" y="524" width="340" height="260" rx="28" fill="#FFB300"/>
    <text x="744" y="600" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">256</text>
    <text x="744" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#FFF8E1" text-anchor="middle">px ★</text>
    <text x="744" y="760" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#FFF8E1" text-anchor="middle">HD</text>

    <!-- Layer 3: ICO 배지 + 타이틀 -->
    <rect x="300" y="130" width="424" height="74" rx="24" fill="#E65100"/>
    <text x="512" y="182" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">ICO 멀티사이즈</text>

    <rect x="230" y="844" width="564" height="80" rx="24" fill="#E65100"/>
    <text x="512" y="898" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
  </g>
</svg>
