<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a12"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="diskCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="15%" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="holo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer holographic rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Holographic spectrum rings -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#06B6D4" stroke-width="3" stroke-opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="#7DD3FC" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="256" cy="256" r="85" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Disk surface holographic shimmer sectors -->
  <path d="M256,256 L256,81 A175,175 0 0,1 391,331 Z" fill="#06B6D4" fill-opacity="0.06"/>
  <path d="M256,256 L391,331 A175,175 0 0,1 121,331 Z" fill="#0EA5E9" fill-opacity="0.04"/>
  <path d="M256,256 L121,331 A175,175 0 0,1 256,81 Z" fill="#3B82F6" fill-opacity="0.05"/>

  <!-- Radial light lines -->
  <line x1="256" y1="256" x2="256" y2="81" stroke="#06B6D4" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="256" y1="256" x2="421" y2="171" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="421" y2="341" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="256" y2="431" stroke="#06B6D4" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="256" y1="256" x2="91" y2="341" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="91" y2="171" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Main disk body -->
  <circle cx="256" cy="256" r="175" fill="url(#diskCore)"/>

  <!-- Inner spindle hole -->
  <circle cx="256" cy="256" r="28" fill="#030508"/>
  <circle cx="256" cy="256" r="26" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="18" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Holographic highlight arc -->
  <path d="M 140 180 A 130 130 0 0 1 372 180" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Lens flare dots -->
  <circle cx="320" cy="160" r="3" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="180" cy="190" r="2" fill="#7DD3FC" filter="url(#glow)"/>
  <circle cx="350" cy="220" r="1.5" fill="white" filter="url(#glow)"/>
</svg>
