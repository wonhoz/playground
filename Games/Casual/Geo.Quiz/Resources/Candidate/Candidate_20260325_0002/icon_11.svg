<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#4E342E"/>
  <!-- Layer 2: 나침반 -->
  <circle cx="512" cy="500" r="260" fill="#FFF8E1" stroke="#8D6E63" stroke-width="20"/>
  <circle cx="512" cy="500" r="230" fill="none" stroke="#A1887F" stroke-width="8"/>
  <!-- 나침반 눈금 -->
  <line x1="512" y1="260" x2="512" y2="290" stroke="#5D4037" stroke-width="12"/>
  <line x1="512" y1="710" x2="512" y2="740" stroke="#5D4037" stroke-width="12"/>
  <line x1="272" y1="500" x2="302" y2="500" stroke="#5D4037" stroke-width="12"/>
  <line x1="722" y1="500" x2="752" y2="500" stroke="#5D4037" stroke-width="12"/>
  <!-- 방향 텍스트 -->
  <text x="512" y="330" text-anchor="middle" font-family="Arial Black" font-size="90" font-weight="900" fill="#C62828">N</text>
  <text x="512" y="700" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#5D4037">S</text>
  <text x="320" y="520" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#5D4037">W</text>
  <text x="704" y="520" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#5D4037">E</text>
  <!-- 나침반 바늘 -->
  <polygon points="512,310 490,510 512,480 534,510" fill="#C62828"/>
  <polygon points="512,690 490,510 512,545 534,510" fill="#5D4037"/>
  <circle cx="512" cy="500" r="22" fill="#3E2723"/>
  <!-- Layer 3: 배경 세계지도 힌트 -->
  <text x="512" y="940" text-anchor="middle" font-family="Arial" font-size="72" fill="#8D6E63" opacity="0.8">세계를 찾아라</text>
</svg>