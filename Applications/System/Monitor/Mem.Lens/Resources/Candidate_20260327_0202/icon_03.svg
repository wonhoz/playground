<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — warm amber orange -->
  <defs>
    <linearGradient id="bgML3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1200"/>
      <stop offset="100%" stop-color="#180A00"/>
    </linearGradient>
    <clipPath id="lensMem">
      <circle cx="460" cy="460" r="265"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bgML3)"/>

  <!-- Layer 2: Magnifier (main object) -->
  <circle cx="460" cy="460" r="265" fill="#F5F0E8" stroke="#E8700A" stroke-width="24"/>

  <!-- Inside lens: memory bar chart -->
  <g clip-path="url(#lensMem)">
    <circle cx="460" cy="460" r="263" fill="#FFF8F0"/>

    <!-- Chart title -->
    <text x="460" y="250" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="bold" fill="#5A2A00">Memory Usage</text>

    <!-- Bar chart — vertical bars -->
    <!-- Bar 1: chrome -->
    <rect x="240" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="240" y="378" width="48" height="132" rx="5" fill="#2196F3"/>
    <text x="264" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#5A3A10">ch</text>

    <!-- Bar 2: slack -->
    <rect x="308" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="308" y="398" width="48" height="112" rx="5" fill="#1976D2"/>
    <text x="332" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#5A3A10">sl</text>

    <!-- Bar 3: suspicious (orange/red, spike) -->
    <rect x="376" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="376" y="290" width="48" height="220" rx="5" fill="#FF5500"/>
    <text x="400" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#AA2200">!!</text>

    <!-- Bar 4: code -->
    <rect x="444" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="444" y="430" width="48" height="80" rx="5" fill="#64B5F6"/>
    <text x="468" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#5A3A10">vs</text>

    <!-- Bar 5: explorer -->
    <rect x="512" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="512" y="470" width="48" height="40" rx="5" fill="#90CAF9"/>
    <text x="536" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#5A3A10">ex</text>

    <!-- Bar 6: other -->
    <rect x="580" y="310" width="48" height="200" rx="5" fill="#E0E8F0"/>
    <rect x="580" y="440" width="48" height="70" rx="5" fill="#42A5F5"/>
    <text x="604" y="525" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#5A3A10">...</text>

    <!-- Y-axis -->
    <line x1="230" y1="300" x2="230" y2="510" stroke="#AA7744" stroke-width="3"/>
    <line x1="230" y1="510" x2="640" y2="510" stroke="#AA7744" stroke-width="3"/>

    <!-- Y-axis labels -->
    <text x="220" y="315" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="18" fill="#AA6622">4G</text>
    <text x="220" y="395" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="18" fill="#AA6622">2G</text>
    <text x="220" y="512" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="18" fill="#AA6622">0</text>

    <!-- Warning arrow on suspicious bar -->
    <polygon points="400,272 388,295 412,295" fill="#FF3300"/>

    <!-- Lens inner glow at edge -->
    <circle cx="460" cy="460" r="260" fill="none" stroke="#F5D0A0" stroke-width="8" opacity="0.3"/>
  </g>

  <!-- Lens border top layer -->
  <circle cx="460" cy="460" r="265" fill="none" stroke="#E8700A" stroke-width="24"/>

  <!-- Lens glare -->
  <path d="M320 290 Q348 278 356 315" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- Layer 3: Handle -->
  <line x1="682" y1="682" x2="858" y2="858" stroke="#E8700A" stroke-width="42" stroke-linecap="round"/>
  <line x1="682" y1="682" x2="858" y2="858" stroke="#FF9A30" stroke-width="24" stroke-linecap="round"/>
</svg>
