<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Large eye outline -->
  <path d="M150 512 Q512 200 874 512 Q512 824 150 512 Z" fill="#0D47A1" opacity="0.5"/>
  <path d="M150 512 Q512 200 874 512 Q512 824 150 512 Z" fill="none" stroke="#42A5F5" stroke-width="24"/>
  <!-- Iris -->
  <circle cx="512" cy="512" r="160" fill="#0D47A1" opacity="0.75"/>
  <circle cx="512" cy="512" r="120" fill="#050A0F"/>
  <circle cx="512" cy="512" r="80" fill="#0D47A1" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="512" cy="512" r="44" fill="#42A5F5" opacity="0.9"/>
  <!-- Eye shine -->
  <circle cx="548" cy="478" r="18" fill="#ffffff" opacity="0.3"/>
  <!-- Window frame reflected in eye -->
  <rect x="470" y="490" width="84" height="60" rx="6" fill="none" stroke="#42A5F5" stroke-width="8" opacity="0.5"/>
  <rect x="470" y="490" width="84" height="16" rx="4" fill="#42A5F5" opacity="0.3"/>
  <!-- Eyelash hints -->
  <line x1="248" y1="440" x2="230" y2="400" stroke="#42A5F5" stroke-width="8" opacity="0.4"/>
  <line x1="200" y1="512" x2="160" y2="512" stroke="#42A5F5" stroke-width="8" opacity="0.3"/>
  <line x1="776" y1="440" x2="794" y2="400" stroke="#42A5F5" stroke-width="8" opacity="0.4"/>
  <line x1="824" y1="512" x2="864" y2="512" stroke="#42A5F5" stroke-width="8" opacity="0.3"/>
</svg>
