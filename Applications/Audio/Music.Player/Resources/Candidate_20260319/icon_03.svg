<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Vinyl record with play indicator -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0D0D"/>
  <!-- Vinyl disc -->
  <circle cx="512" cy="512" r="380" fill="#1A1A1A"/>
  <!-- Grooves -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#2A2A2A" stroke-width="12"/>
  <circle cx="512" cy="512" r="290" fill="none" stroke="#2A2A2A" stroke-width="10"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#2A2A2A" stroke-width="8"/>
  <circle cx="512" cy="512" r="190" fill="none" stroke="#2A2A2A" stroke-width="7"/>
  <!-- Label center -->
  <circle cx="512" cy="512" r="130" fill="#1DB954"/>
  <!-- Center hole -->
  <circle cx="512" cy="512" r="24" fill="#0D0D0D"/>
  <!-- Play triangle small on label -->
  <path d="M466 462 L466 562 L582 512 Z" fill="#0D0D0D"/>
</svg>
