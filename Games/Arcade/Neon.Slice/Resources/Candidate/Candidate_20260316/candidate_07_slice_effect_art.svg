<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0500"/>
      <stop offset="100%" style="stop-color:#00050a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="swipeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4400;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffaa00;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffff00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Swipe arc trail -->
  <path d="M80 350 Q180 150 380 180" stroke="url(#swipeGrad)" stroke-width="35" fill="none" stroke-linecap="round" opacity="0.25" filter="url(#glow)"/>
  <path d="M80 350 Q180 150 380 180" stroke="url(#swipeGrad)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M80 350 Q180 150 380 180" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Finger/swipe tip -->
  <circle cx="378" cy="182" r="12" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="378" cy="182" r="6" fill="#ffffff"/>
  <!-- Sliced objects -->
  <!-- Fruit/orb 1 - sliced diagonally -->
  <circle cx="200" cy="250" r="40" fill="none" stroke="#ff6600" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="translate(-8,-8)"/>
  <circle cx="200" cy="250" r="40" fill="none" stroke="#ff9900" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="translate(8,8)"/>
  <line x1="164" y1="214" x2="236" y2="286" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Juice splatter -->
  <circle cx="195" cy="240" r="4" fill="#ff6600" filter="url(#glow)"/>
  <circle cx="180" cy="228" r="2.5" fill="#ff9900" filter="url(#glow)"/>
  <circle cx="210" cy="222" r="2" fill="#ffcc00" filter="url(#glow)"/>
  <!-- Orb 2 -->
  <circle cx="330" cy="220" r="32" fill="none" stroke="#00ccff" stroke-width="2.5" filter="url(#glow)" opacity="0.7" transform="translate(-6,-6)"/>
  <circle cx="330" cy="220" r="32" fill="none" stroke="#0099ff" stroke-width="2.5" filter="url(#glow)" opacity="0.7" transform="translate(6,6)"/>
  <line x1="298" y1="188" x2="362" y2="252" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Orb splatter -->
  <circle cx="316" cy="210" r="3" fill="#00ccff" filter="url(#glow)"/>
  <circle cx="305" cy="200" r="2" fill="#0099ff" filter="url(#glow)"/>
  <circle cx="345" cy="205" r="2.5" fill="#00ccff" filter="url(#glow)"/>
  <!-- Score-like particles -->
  <circle cx="256" cy="160" r="2" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="240" cy="148" r="1.5" fill="#ffcc00" filter="url(#glow)"/>
  <circle cx="272" cy="152" r="1.5" fill="#ffff00" filter="url(#glow)"/>
</svg>