<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="lensBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 오렌지-노랑 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg6)"/>

  <!-- Layer 2: 돋보기 (중앙 큰) -->
  <!-- 렌즈 내부 — 색상 팔레트 원형 -->
  <circle cx="430" cy="430" r="270" fill="white" opacity="0.9"/>
  <!-- 색상 파이 조각 6개 -->
  <path d="M430 430 L430 170 A260 260 0 0 1 656 290 Z" fill="#EF5350"/>
  <path d="M430 430 L656 290 A260 260 0 0 1 690 510 Z" fill="#FF9800"/>
  <path d="M430 430 L690 510 A260 260 0 0 1 560 680 Z" fill="#FFEE58"/>
  <path d="M430 430 L560 680 A260 260 0 0 1 300 680 Z" fill="#66BB6A"/>
  <path d="M430 430 L300 680 A260 260 0 0 1 170 510 Z" fill="#42A5F5"/>
  <path d="M430 430 L170 510 A260 260 0 0 1 430 170 Z" fill="#AB47BC"/>
  <!-- 중앙 흰 원 -->
  <circle cx="430" cy="430" r="80" fill="white"/>
  <!-- 중앙 아이콘 (별 — 선택된 아이콘) -->
  <polygon points="430,390 444,418 476,418 450,436 460,466 430,447 400,466 410,436 384,418 416,418" fill="#FFD740"/>

  <!-- 돋보기 테두리 -->
  <circle cx="430" cy="430" r="270" fill="none" stroke="url(#lensBody)" stroke-width="44"/>
  <!-- 손잡이 -->
  <line x1="644" y1="644" x2="900" y2="900" stroke="#E65100" stroke-width="66" stroke-linecap="round"/>
  <!-- 손잡이 하이라이트 -->
  <line x1="654" y1="644" x2="900" y2="890" stroke="#FFA040" stroke-width="22" stroke-linecap="round" opacity="0.4"/>

  <!-- Layer 3: 검색 결과 카운트 배지 -->
  <circle cx="780" cy="240" r="90" fill="#FF3D00"/>
  <text x="780" y="218" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="white" text-anchor="middle" dominant-baseline="middle">9000</text>
  <text x="780" y="265" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="32" fill="#FFE0CC" text-anchor="middle" dominant-baseline="middle">icons</text>
</svg>
