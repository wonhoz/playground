<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: Large Q? text centered -->
  <text x="512" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="480" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.95">Q?</text>

  <!-- Layer 3: 4 directional answer choice indicators -->
  <!-- Top answer bubble -->
  <ellipse cx="512" cy="120" rx="110" ry="52" fill="white" opacity="0.85"/>
  <text x="512" y="138" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="bold"
    fill="#C62828" text-anchor="middle">A</text>

  <!-- Bottom answer bubble -->
  <ellipse cx="512" cy="900" rx="110" ry="52" fill="white" opacity="0.85"/>
  <text x="512" y="918" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="bold"
    fill="#C62828" text-anchor="middle">C</text>

  <!-- Left answer bubble -->
  <ellipse cx="120" cy="512" rx="110" ry="52" fill="white" opacity="0.85"/>
  <text x="120" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="bold"
    fill="#C62828" text-anchor="middle">B</text>

  <!-- Right answer bubble -->
  <ellipse cx="904" cy="512" rx="110" ry="52" fill="white" opacity="0.85"/>
  <text x="904" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="bold"
    fill="#C62828" text-anchor="middle">D</text>

  <!-- Connecting lines from center to bubbles -->
  <line x1="512" y1="280" x2="512" y2="175" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="740" x2="512" y2="845" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="280" y1="512" x2="235" y2="512" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="744" y1="512" x2="789" y2="512" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
</svg>
