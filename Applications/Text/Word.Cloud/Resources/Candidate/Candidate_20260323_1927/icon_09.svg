<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg09)"/>
  <!-- 2x4 grid of words with varying font sizes -->
  <!-- Row 1 -->
  <text x="280" y="320" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#1E40AF">Cloud</text>
  <text x="720" y="320" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="#DC2626">Word</text>
  <!-- Row 2 -->
  <text x="280" y="460" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="78" font-weight="900" fill="#059669">Text</text>
  <text x="720" y="460" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#7C3AED">Data</text>
  <!-- Row 3 -->
  <text x="280" y="590" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="60" font-weight="700" fill="#EA580C">Font</text>
  <text x="720" y="590" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#0891B2">Color</text>
  <!-- Row 4 -->
  <text x="280" y="710" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="700" fill="#9333EA">Size</text>
  <text x="720" y="710" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="44" font-weight="700" fill="#15803D">Export</text>
  <!-- Grid divider lines -->
  <line x1="512" y1="220" x2="512" y2="780" stroke="#D97706" stroke-width="4" opacity="0.3"/>
  <line x1="210" y1="390" x2="814" y2="390" stroke="#D97706" stroke-width="3" opacity="0.25"/>
  <line x1="210" y1="520" x2="814" y2="520" stroke="#D97706" stroke-width="3" opacity="0.25"/>
  <line x1="210" y1="648" x2="814" y2="648" stroke="#D97706" stroke-width="3" opacity="0.25"/>
</svg>
