<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="beam5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 따뜻한 오렌지 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg5)"/>

  <!-- Layer 2: 저울 (균등한 무게 = 동일 파일) -->
  <!-- 저울 기둥 -->
  <rect x="490" y="360" width="44" height="380" rx="12" fill="#FF6F00"/>
  <!-- 저울 받침 -->
  <rect x="300" y="730" width="424" height="36" rx="12" fill="#FF6F00"/>
  <!-- 저울 가로대 -->
  <rect x="180" y="356" width="664" height="24" rx="10" fill="#FF8F00"/>
  <!-- 저울 중심 원 -->
  <circle cx="512" cy="368" r="36" fill="#FF6F00" stroke="white" stroke-width="6"/>

  <!-- 왼쪽 저울판 -->
  <line x1="210" y1="368" x2="210" y2="520" stroke="#FF8F00" stroke-width="8"/>
  <ellipse cx="210" cy="534" rx="120" ry="30" fill="#FFB74D" stroke="#FF8F00" stroke-width="6"/>
  <!-- 왼쪽 파일 (빨강 = 중복) -->
  <rect x="150" y="450" width="120" height="70" rx="10" fill="#E53935"/>
  <text x="210" y="488" font-family="'Courier New',monospace" font-size="22" fill="white" text-anchor="middle" dominant-baseline="middle">doc.pdf</text>

  <!-- 오른쪽 저울판 -->
  <line x1="814" y1="368" x2="814" y2="520" stroke="#FF8F00" stroke-width="8"/>
  <ellipse cx="814" cy="534" rx="120" ry="30" fill="#FFB74D" stroke="#FF8F00" stroke-width="6"/>
  <!-- 오른쪽 파일 (빨강 = 중복) -->
  <rect x="754" y="450" width="120" height="70" rx="10" fill="#E53935"/>
  <text x="814" y="488" font-family="'Courier New',monospace" font-size="22" fill="white" text-anchor="middle" dominant-baseline="middle">doc(2).pdf</text>

  <!-- Layer 3: 중앙 = 배지 -->
  <rect x="422" y="200" width="180" height="90" rx="20" fill="#F57F17"/>
  <text x="512" y="246" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle" dominant-baseline="middle">=</text>
  <!-- 저울 균형 = SAME -->
  <text x="512" y="830" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#BF360C" text-anchor="middle" dominant-baseline="middle">IDENTICAL FILES</text>
</svg>
