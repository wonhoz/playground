  <!-- .dmp label -->
  <rect x="136" y="96" width="100" height="26" rx="5" fill="#FF5252"/>
  <text x="186" y="113" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">.dmp</text>
  <!-- Hex dump lines -->
  <text x="140" y="155" font-family="monospace" font-size="11" fill="#546E7A">0x0000  FF FE 00 00 4D 5A 90 00</text>
  <text x="140" y="173" font-family="monospace" font-size="11" fill="#546E7A">0x0008  03 00 00 00 04 00 00 00</text>
