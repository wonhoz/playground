<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stacked ICO files perspective -->
  <!-- Back/smallest stack -->
  <rect x="88" y="220" width="100" height="100" rx="12" fill="#2d0000" stroke="#7f1d1d" stroke-width="1.5" transform="skewY(-8) translate(0 20)"/>
  <text x="104" y="290" font-family="monospace" font-size="14" fill="#7f1d1d">16px</text>
  <rect x="158" y="180" width="120" height="120" rx="12" fill="#3d0000" stroke="#b91c1c" stroke-width="2" transform="skewY(-5) translate(0 10)"/>
  <text x="178" y="262" font-family="monospace" font-size="16" fill="#b91c1c">32px</text>
  <rect x="196" y="148" width="148" height="148" rx="14" fill="#2d0000" stroke="#b91c1c" stroke-width="2"/>
  <text x="226" y="240" font-family="monospace" font-size="18" fill="#b91c1c">48px</text>
  <!-- Front/largest -->
  <rect x="88" y="60" width="260" height="260" rx="20" fill="#1a0000" stroke="#ef4444" stroke-width="3"/>
  <!-- ICO icon content inside largest -->
  <text x="118" y="240" font-size="140">⭐</text>
  <!-- ICO file label -->
  <rect x="228" y="288" width="80" height="28" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="236" y="307" font-family="monospace" font-size="14" fill="white" font-weight="bold">.ico</text>
  <!-- Corner fold on document -->
  <polygon points="308,60 348,60 348,100 308,100" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
  <polygon points="308,60 348,100 308,100" fill="#b91c1c" opacity="0.6"/>
  <!-- Right side: tool panel -->
  <rect x="370" y="60" width="82" height="260" rx="10" fill="#1a0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="378" y="88" font-family="monospace" font-size="11" fill="#ef4444">Generate</text>
  <!-- Layer rows -->
  <rect x="378" y="98" width="66" height="22" rx="5" fill="#2d0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="386" y="114" font-family="monospace" font-size="11" fill="#7f1d1d">256px ✓</text>
  <rect x="378" y="126" width="66" height="22" rx="5" fill="#2d0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="386" y="142" font-family="monospace" font-size="11" fill="#7f1d1d">128px ✓</text>
  <rect x="378" y="154" width="66" height="22" rx="5" fill="#2d0000" stroke="#ef4444" stroke-width="1.5"/>
  <text x="386" y="170" font-family="monospace" font-size="11" fill="#ef4444">64px ✓</text>
  <rect x="378" y="182" width="66" height="22" rx="5" fill="#2d0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="386" y="198" font-family="monospace" font-size="11" fill="#7f1d1d">48px ✓</text>
  <rect x="378" y="210" width="66" height="22" rx="5" fill="#2d0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="386" y="226" font-family="monospace" font-size="11" fill="#7f1d1d">32px ✓</text>
  <rect x="378" y="238" width="66" height="22" rx="5" fill="#2d0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="386" y="254" font-family="monospace" font-size="11" fill="#7f1d1d">16px ✓</text>
  <!-- Export button -->
  <rect x="378" y="278" width="66" height="32" rx="8" fill="#ef4444" opacity="0.9"/>
  <text x="386" y="299" font-family="monospace" font-size="13" fill="white" font-weight="bold">Export</text>
  <!-- Bottom: output preview row -->
  <rect x="56" y="356" width="400" height="100" rx="12" fill="#1a0000" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="72" y="382" font-family="monospace" font-size="13" fill="#ef4444">Output: app_icon.ico  (All sizes packed)</text>
  <!-- Mini size previews -->
  <rect x="72" y="390" width="20" height="20" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="100" y="388" width="24" height="24" rx="4" fill="#ef4444" opacity="0.75"/>
  <rect x="132" y="386" width="28" height="28" rx="5" fill="#ef4444" opacity="0.8"/>
  <rect x="168" y="384" width="32" height="32" rx="5" fill="#ef4444" opacity="0.85"/>
  <rect x="208" y="380" width="40" height="40" rx="6" fill="#ef4444" opacity="0.9"/>
  <rect x="256" y="374" width="52" height="52" rx="8" fill="#ef4444"/>
  <!-- Checkmark -->
  <circle cx="430" cy="432" r="22" fill="#22c55e" opacity="0.9"/>
  <path d="M419 432 L426 440 L442 422" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
