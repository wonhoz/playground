<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGear" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A1500"/>
      <stop offset="100%" stop-color="#0D0B00"/>
    </linearGradient>
    <!-- 기어 색상 -->
    <linearGradient id="gear1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="gear2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <!-- 충돌 섬광 -->
    <radialGradient id="conflictFlash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FF4444"/>
      <stop offset="70%" stop-color="#CC0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <filter id="gearGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="conflictBlast">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgGear)"/>

  <!-- 충돌 배경 글로우 -->
  <circle cx="512" cy="512" r="200" fill="#FF4400" opacity="0.06" filter="url(#conflictBlast)"/>

  <!-- Layer2: 왼쪽 기어 (노랑) -->
  <!-- 기어 이빨 (12개) -->
  <g transform="translate(320, 480)">
    <!-- 기어 본체 -->
    <circle r="140" fill="url(#gear1Grad)" filter="url(#gearGlow)"/>
    <!-- 이빨 -->
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(0)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(30)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(60)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(90)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(120)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(150)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(180)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(210)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(240)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(270)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(300)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FCD34D" transform="rotate(330)"/>
    <!-- 중앙 구멍 -->
    <circle r="54" fill="url(#bgGear)"/>
    <circle r="40" fill="url(#gear1Grad)" opacity="0.4"/>
    <circle r="22" fill="url(#bgGear)"/>
    <!-- 버전 텍스트 -->
    <text y="8" font-family="monospace" font-size="26" fill="#7A3800" text-anchor="middle" font-weight="bold">v1</text>
  </g>

  <!-- 오른쪽 기어 (오렌지) -->
  <g transform="translate(704, 480)">
    <!-- 기어 본체 -->
    <circle r="140" fill="url(#gear2Grad)" filter="url(#gearGlow)"/>
    <!-- 이빨 (15도 오프셋으로 맞물림) -->
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(15)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(45)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(75)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(105)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(135)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(165)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(195)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(225)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(255)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(285)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(315)"/>
    <rect x="-18" y="-155" width="36" height="44" rx="6" fill="#FB923C" transform="rotate(345)"/>
    <!-- 중앙 구멍 -->
    <circle r="54" fill="url(#bgGear)"/>
    <circle r="40" fill="url(#gear2Grad)" opacity="0.4"/>
    <circle r="22" fill="url(#bgGear)"/>
    <text y="8" font-family="monospace" font-size="26" fill="#7A1800" text-anchor="middle" font-weight="bold">v2</text>
  </g>

  <!-- Layer3: 충돌 섬광 (중앙) -->
  <circle cx="512" cy="480" r="55" fill="url(#conflictFlash)" filter="url(#conflictBlast)"/>

  <!-- 충돌 번개 모양 -->
  <path d="M 506 430 L 490 490 L 508 490 L 500 555 L 530 485 L 512 485 Z" fill="#FFFFFF" filter="url(#conflictBlast)" opacity="0.9"/>

  <!-- 라벨들 -->
  <text x="320" y="670" font-family="monospace" font-size="20" fill="#FCD34D" text-anchor="middle">pkg@1.0.0</text>
  <text x="704" y="670" font-family="monospace" font-size="20" fill="#FB923C" text-anchor="middle">pkg@2.0.0</text>
  <text x="512" y="600" font-family="monospace" font-size="26" fill="#FF4444" text-anchor="middle" font-weight="bold">VERSION CONFLICT</text>

  <!-- 기어 연결선 (점선, 충돌 중) -->
  <line x1="460" y1="480" x2="564" y2="480" stroke="#FF4444" stroke-width="4" stroke-dasharray="8,6" opacity="0.7"/>
</svg>
