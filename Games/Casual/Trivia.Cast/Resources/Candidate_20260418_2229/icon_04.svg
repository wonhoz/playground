<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background show stage dark purple -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#1A0030"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: Game show stage set -->
  <!-- Stage floor -->
  <ellipse cx="512" cy="820" rx="400" ry="60" fill="#7B1FA2" opacity="0.7"/>
  <!-- Podium -->
  <rect x="350" y="640" width="324" height="200" rx="16" fill="#6A1B9A"/>
  <rect x="370" y="660" width="284" height="160" rx="12" fill="#9C27B0" opacity="0.9"/>
  <!-- Host silhouette -->
  <circle cx="512" cy="480" r="80" fill="#FFD740"/>
  <rect x="452" y="560" width="120" height="180" rx="20" fill="#FFD740"/>
  <rect x="392" y="580" width="120" height="24" rx="12" fill="#FFD740"/>
  <rect x="512" y="580" width="120" height="24" rx="12" fill="#FFD740"/>
  <!-- Spotlight beams -->
  <polygon points="200 130 100 520 380 520" fill="#FFCA28" opacity="0.1"/>
  <polygon points="824 130 924 520 644 520" fill="#FFCA28" opacity="0.1"/>
  <!-- TRIVIA label on podium -->
  <text x="512" y="748" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFD740" text-anchor="middle">TRIVIA</text>
  <!-- Layer 3: Stars/lights -->
  <circle cx="200" cy="200" r="14" fill="#FFD740" opacity="0.9"/>
  <circle cx="824" cy="200" r="14" fill="#FFD740" opacity="0.9"/>
  <circle cx="140" cy="380" r="10" fill="#FFCA28" opacity="0.7"/>
  <circle cx="884" cy="380" r="10" fill="#FFCA28" opacity="0.7"/>
  <circle cx="512" cy="180" r="18" fill="#FFD740" opacity="0.85"/>
  <!-- Microphone -->
  <rect x="488" y="450" width="48" height="100" rx="24" fill="#424242"/>
  <circle cx="512" cy="450" r="40" fill="#757575"/>
</svg>
