<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001F1A"/>
      <stop offset="100%" stop-color="#000D0A"/>
    </radialGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="100%" stop-color="#00D9F5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid of windows (task switcher style) -->
  <!-- Row 1 -->
  <rect x="72" y="80" width="160" height="120" rx="8" fill="#001F1A" stroke="#00F5A0" stroke-width="2" opacity="0.8"/>
  <rect x="72" y="80" width="160" height="20" rx="8" fill="#00F5A0" opacity="0.3"/>
  <text x="82" y="95" font-family="Segoe UI" font-size="12" fill="#00F5A0">explorer</text>
  <rect x="80" y="106" width="100" height="8" rx="2" fill="#00F5A0" opacity="0.2"/>
  <rect x="80" y="120" width="130" height="8" rx="2" fill="#00F5A0" opacity="0.15"/>
  <rect x="280" y="80" width="160" height="120" rx="8" fill="#001F1A" stroke="#00D9F5" stroke-width="2" opacity="0.8"/>
  <rect x="280" y="80" width="160" height="20" rx="8" fill="#00D9F5" opacity="0.3"/>
  <text x="290" y="95" font-family="Segoe UI" font-size="12" fill="#00D9F5">chrome</text>
  <!-- Row 2 -->
  <rect x="72" y="220" width="160" height="120" rx="8" fill="#001F1A" stroke="#00D9F5" stroke-width="2" opacity="0.8"/>
  <rect x="72" y="220" width="160" height="20" rx="8" fill="#00D9F5" opacity="0.3"/>
  <text x="82" y="235" font-family="Segoe UI" font-size="12" fill="#00D9F5">notepad</text>
  <rect x="280" y="220" width="160" height="120" rx="8" fill="#001A1F" stroke="#00F5A0" stroke-width="3"/>
  <rect x="280" y="220" width="160" height="20" rx="8" fill="#00F5A0" opacity="0.5"/>
  <text x="290" y="235" font-family="Segoe UI" font-size="12" fill="#00F5A0" font-weight="700">code — [ACTIVE]</text>
  <rect x="288" y="246" width="140" height="8" rx="2" fill="#00F5A0" opacity="0.3"/>
  <rect x="288" y="260" width="120" height="8" rx="2" fill="#00F5A0" opacity="0.2"/>
  <rect x="288" y="274" width="130" height="8" rx="2" fill="#00F5A0" opacity="0.15"/>
  <!-- Active window highlight glow -->
  <rect x="280" y="220" width="160" height="120" rx="8" fill="none" stroke="#00F5A0" stroke-width="4" filter="url(#glow)"/>
  <!-- Selection corners -->
  <path d="M280,220 L280,236 M280,220 L296,220" stroke="#00F5A0" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M440,220 L440,236 M440,220 L424,220" stroke="#00F5A0" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M280,340 L280,324 M280,340 L296,340" stroke="#00F5A0" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M440,340 L440,324 M440,340 L424,340" stroke="#00F5A0" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Info bar -->
  <rect x="72" y="368" width="368" height="56" rx="10" fill="#001F1A" stroke="#00F5A0" stroke-width="1.5"/>
  <text x="92" y="390" font-family="Segoe UI" font-size="13" fill="#00F5A0">code.exe  |  HWND: 0x00050028  |  PID: 18420</text>
  <text x="92" y="410" font-family="Segoe UI" font-size="13" fill="#888">Pos: (280,220)  Size: 1280x720  Z:1  Visible</text>
  <text x="256" y="465" text-anchor="middle" font-family="Segoe UI" font-size="22" font-weight="700" fill="#00F5A0" filter="url(#glow)">WIN.SCOPE</text>
</svg>
