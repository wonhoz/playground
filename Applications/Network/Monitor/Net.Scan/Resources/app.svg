<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#002800"/>
    </linearGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- radar rings -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="#00c853" stroke-width="2" opacity="0.8"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#00c853" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#00c853" stroke-width="2" opacity="0.45"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00c853" stroke-width="2" opacity="0.3"/>
  <!-- crosshairs -->
  <line x1="256" y1="86" x2="256" y2="426" stroke="#00c853" stroke-width="1.5" opacity="0.25"/>
  <line x1="86" y1="256" x2="426" y2="256" stroke="#00c853" stroke-width="1.5" opacity="0.25"/>
  <!-- radar sweep wedge -->
  <path d="M256 256 L256 96 A160 160 0 0 1 400 340 Z" fill="url(#sweep)"/>
  <!-- center dot -->
  <circle cx="256" cy="256" r="10" fill="#00e676" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="5" fill="white"/>
  <!-- detected device blips -->
  <circle cx="320" cy="190" r="9" fill="#00e676" filter="url(#glow)"/>
  <circle cx="320" cy="190" r="4" fill="white"/>
  <circle cx="350" cy="310" r="7" fill="#69f0ae" filter="url(#glow)"/>
  <circle cx="180" cy="330" r="8" fill="#00e676" filter="url(#glow)"/>
  <circle cx="195" cy="180" r="6" fill="#69f0ae" filter="url(#glow)"/>
</svg>
