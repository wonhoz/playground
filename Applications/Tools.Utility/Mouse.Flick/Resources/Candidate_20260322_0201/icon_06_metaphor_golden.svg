<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg06" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E1600"/>
      <stop offset="100%" stop-color="#100C00"/>
    </radialGradient>
    <linearGradient id="bolt06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="glow06">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow06">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg06)"/>

  <!-- 원형 제스처 궤적 (원 그리기 제스처) -->
  <circle cx="512" cy="440" r="240" fill="none" stroke="#FFD700" stroke-width="20" stroke-linecap="round" stroke-dasharray="1380 120" filter="url(#glow06)" opacity="0.9"/>

  <!-- 원 위 화살표 (시계방향) -->
  <polyline points="460,202 510,198 516,248" fill="none" stroke="#FFD700" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow06)"/>

  <!-- 중앙 번개 심볼 (빠른 실행 = 번개) -->
  <polygon points="540,260 480,460 520,460 472,640 580,400 534,400 590,260" fill="url(#bolt06)" filter="url(#glow06)"/>

  <!-- 하단 동작 배지 -->
  <rect x="312" y="740" width="400" height="66" rx="14" fill="#2A1E00" stroke="#FFD700" stroke-width="4"/>
  <text x="512" y="768" font-family="sans-serif" font-size="22" fill="#FFD700" text-anchor="middle">Circle Gesture</text>
  <text x="512" y="796" font-family="monospace" font-size="24" font-weight="bold" fill="#FFA500" text-anchor="middle">= Instant Launch</text>

  <!-- 장식 점들 (궤적 흔적) -->
  <circle cx="752" cy="440" r="10" fill="#FFD700" opacity="0.6" filter="url(#softglow06)"/>
  <circle cx="730" cy="540" r="8" fill="#FFD700" opacity="0.4" filter="url(#softglow06)"/>
  <circle cx="680" cy="625" r="6" fill="#FFD700" opacity="0.25" filter="url(#softglow06)"/>
</svg>
