<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#0050AA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main terminal frame -->
  <rect x="64" y="80" width="384" height="352" rx="12" fill="#0A1628" stroke="#1E90FF" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="64" y="80" width="384" height="40" rx="12" fill="url(#panel)"/>
  <rect x="64" y="100" width="384" height="20" fill="url(#panel)"/>
  <!-- Traffic lights -->
  <circle cx="100" cy="100" r="8" fill="#FF5F57"/>
  <circle cx="124" cy="100" r="8" fill="#FFBD2E"/>
  <circle cx="148" cy="100" r="8" fill="#28CA42"/>
  <!-- Pane dividers -->
  <line x1="256" y1="120" x2="256" y2="432" stroke="#1E90FF" stroke-width="2" opacity="0.7"/>
  <line x1="64" y1="276" x2="256" y2="276" stroke="#1E90FF" stroke-width="2" opacity="0.7"/>
  <!-- Code lines in panes -->
  <rect x="80" y="136" width="120" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="80" y="152" width="80" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="168" width="100" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="184" width="60" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="80" y="200" width="90" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="216" width="70" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="232" width="110" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <!-- Right pane lines -->
  <rect x="272" y="136" width="140" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="272" y="152" width="100" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="272" y="168" width="120" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="272" y="184" width="80" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="272" y="200" width="110" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="272" y="216" width="90" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="272" y="232" width="130" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="272" y="248" width="70" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
  <!-- Bottom left pane lines -->
  <rect x="80" y="292" width="100" height="6" rx="3" fill="#00D4FF" opacity="0.9"/>
  <rect x="80" y="308" width="130" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="324" width="80" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="340" width="110" height="6" rx="3" fill="#00D4FF" opacity="0.9"/>
  <rect x="80" y="356" width="70" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <rect x="80" y="372" width="90" height="6" rx="3" fill="#4A90D9" opacity="0.6"/>
  <!-- Save/restore icon hint -->
  <path d="M400 390 L430 390 L430 420 L410 420 L400 410 Z" fill="url(#panel)" stroke="#00D4FF" stroke-width="2"/>
  <rect x="408" y="390" width="14" height="10" fill="#00D4FF" opacity="0.7"/>
</svg>