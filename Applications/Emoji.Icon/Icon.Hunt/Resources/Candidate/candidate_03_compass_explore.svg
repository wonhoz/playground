<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <radialGradient id="compass_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a1e"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="256" cy="240" r="180" fill="url(#compass_bg)" stroke="#44aa44" stroke-width="5"/>
  <!-- Compass cardinal marks -->
  <text x="245" y="90" font-family="monospace" font-size="20" fill="#44ff44" font-weight="bold">N</text>
  <text x="245" y="408" font-family="monospace" font-size="20" fill="#44aa44">S</text>
  <text x="65" y="248" font-family="monospace" font-size="20" fill="#44aa44">W</text>
  <text x="426" y="248" font-family="monospace" font-size="20" fill="#44aa44">E</text>
  <!-- Compass tick marks -->
  <line x1="256" y1="66" x2="256" y2="80" stroke="#44ff44" stroke-width="3"/>
  <line x1="256" y1="400" x2="256" y2="414" stroke="#44aa44" stroke-width="2"/>
  <line x1="80" y1="240" x2="94" y2="240" stroke="#44aa44" stroke-width="2"/>
  <line x1="418" y1="240" x2="432" y2="240" stroke="#44aa44" stroke-width="2"/>
  <!-- Compass needle -->
  <polygon points="256,120 244,256 256,248 268,256" fill="#ff4444"/>
  <polygon points="256,360 244,256 256,264 268,256" fill="#888888"/>
  <circle cx="256" cy="256" r="10" fill="#ffcc00"/>
  <!-- Icons scattered around compass -->
  <text x="130" y="170" font-family="serif" font-size="28">🔍</text>
  <text x="340" y="170" font-family="serif" font-size="28">⭐</text>
  <text x="130" y="330" font-family="serif" font-size="28">🏷️</text>
  <text x="340" y="330" font-family="serif" font-size="28">🎯</text>
  <!-- Bottom label -->
  <text x="168" y="460" font-family="sans-serif" font-size="24" fill="#44aa44" font-weight="bold">Icon.Hunt</text>
</svg>