  <defs>
    <radialGradient id="gBg5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="gPlanet5" cx="38%" cy="32%" r="65%">
