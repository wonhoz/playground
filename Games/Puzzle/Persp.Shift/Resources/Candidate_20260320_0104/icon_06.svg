<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050A0A"/>
  <!-- 거울 프레임 -->
  <rect x="400" y="160" width="240" height="440" rx="20" fill="#00695C" opacity="0.4" stroke="#4DB6AC" stroke-width="20"/>
  <!-- 거울 유리 -->
  <rect x="420" y="180" width="200" height="400" rx="10" fill="#4DB6AC" opacity="0.12"/>
  <!-- 왼쪽 큐브 (실제) -->
  <rect x="140" y="380" width="160" height="160" rx="8" fill="#00695C" opacity="0.9"/>
