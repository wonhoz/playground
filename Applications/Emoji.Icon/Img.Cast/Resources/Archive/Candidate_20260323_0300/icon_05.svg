<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 주조 공장 몰드 (cast = 주조) | 중앙심볼 | #7F1D1D -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#450A0A"/>
  <!-- Layer 2: Mold/foundry press machine -->
  <!-- Upper press plate -->
  <rect x="220" y="200" width="584" height="100" rx="14" fill="#991B1B"/>
  <!-- Press arm -->
  <rect x="478" y="300" width="68" height="120" rx="8" fill="#7F1D1D"/>
  <!-- Mold cavity (square with ICO inside) -->
  <rect x="280" y="420" width="464" height="260" rx="16" fill="#B91C1C" stroke="#EF4444" stroke-width="4"/>
  <!-- ICO shape inside mold -->
  <rect x="320" y="450" width="200" height="200" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="3"/>
  <!-- Nested sizes inside -->
  <rect x="338" y="466" width="164" height="164" rx="10" fill="#EF4444" opacity="0.6"/>
  <rect x="356" y="484" width="128" height="128" rx="8" fill="#DC2626" opacity="0.6"/>
  <rect x="374" y="502" width="92" height="92" rx="6" fill="#B91C1C" opacity="0.7"/>
  <rect x="392" y="520" width="56" height="56" rx="4" fill="#991B1B" opacity="0.8"/>
  <text x="420" y="555" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">ICO</text>
  <!-- Liquid metal flowing in (right side) -->
  <path d="M680 520 Q740 480 780 500 Q820 520 800 560 Q780 600 720 580 Q680 560 680 520 Z" fill="#F59E0B" opacity="0.8"/>
  <path d="M760 490 Q780 460 810 470" fill="none" stroke="#FDE68A" stroke-width="4" opacity="0.6"/>
  <!-- Layer 3: Press labels -->
  <text x="512" y="262" font-family="Arial,sans-serif" font-size="22" fill="#FEF2F2" text-anchor="middle" font-weight="bold">IMG CAST</text>
  <!-- Ejected product below -->
  <rect x="344" y="730" width="160" height="120" rx="10" fill="#FEF2F2" stroke="#F59E0B" stroke-width="4"/>
  <text x="424" y="802" font-family="Arial,sans-serif" font-size="22" fill="#B45309" text-anchor="middle" font-weight="bold">ICO ✓</text>
  <!-- Down arrow ejection -->
  <path d="M512 700 L512 724" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
  <polygon points="490,720 512,740 534,720" fill="#EF4444"/>
</svg>
