<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E3A8A"/>
  <!-- Layer 2: File shape with folded corner -->
  <path d="M 260 180 L 680 180 L 760 260 L 760 820 L 260 820 Z" fill="#DBEAFE" opacity="0.9"/>
  <!-- Folded corner triangle -->
  <path d="M 680 180 L 680 260 L 760 260 Z" fill="#1E40AF" opacity="0.8"/>
  <!-- Layer 3: MD text content -->
  <!-- "MD" large text -->
  <text x="512" y="530" font-family="Arial,sans-serif" font-size="230" fill="#1E3A8A" text-anchor="middle" font-weight="900" opacity="0.85">MD</text>
  <!-- .md extension bar at bottom -->
  <rect x="260" y="750" width="500" height="50" rx="0" fill="#1E40AF" opacity="0.9"/>
  <rect x="260" y="750" width="500" height="50" rx="0" fill="#1E40AF"/>
  <text x="512" y="784" font-family="Consolas,monospace" font-size="26" fill="#93C5FD" text-anchor="middle" font-weight="bold">.markdown</text>
  <!-- Top corner fold highlight -->
  <line x1="680" y1="180" x2="760" y2="260" stroke="#93C5FD" stroke-width="3" opacity="0.5"/>
</svg>