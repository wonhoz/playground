<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: QR 코드 (보라 계열, 로고 슬롯 있음) -->
  <rect x="152" y="152" width="720" height="720" rx="32" fill="white" stroke="#6A1B9A" stroke-width="8"/>
  <!-- 좌상단 위치 마커 -->
  <rect x="192" y="192" width="176" height="176" rx="14" fill="#6A1B9A"/>
  <rect x="216" y="216" width="128" height="128" rx="8" fill="white"/>
  <rect x="240" y="240" width="80" height="80" rx="6" fill="#6A1B9A"/>
  <!-- 우상단 위치 마커 -->
  <rect x="656" y="192" width="176" height="176" rx="14" fill="#6A1B9A"/>
  <rect x="680" y="216" width="128" height="128" rx="8" fill="white"/>
  <rect x="704" y="240" width="80" height="80" rx="6" fill="#6A1B9A"/>
  <!-- 좌하단 위치 마커 -->
  <rect x="192" y="656" width="176" height="176" rx="14" fill="#6A1B9A"/>
  <rect x="216" y="680" width="128" height="128" rx="8" fill="white"/>
  <rect x="240" y="704" width="80" height="80" rx="6" fill="#6A1B9A"/>
  <!-- 데이터 도트 영역 (우하단) -->
  <rect x="408" y="656" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="464" y="656" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="520" y="656" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="576" y="656" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="632" y="656" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="688" y="656" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="408" y="712" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="520" y="712" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="576" y="712" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="688" y="712" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="408" y="768" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="464" y="768" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="632" y="768" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="688" y="768" width="44" height="44" rx="6" fill="#F57F17"/>
  <!-- 상단 데이터 도트 (좌우 마커 사이) -->
  <rect x="408" y="192" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="464" y="192" width="44" height="44" rx="6" fill="#E53935"/>
  <rect x="520" y="192" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="576" y="192" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="408" y="248" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="520" y="248" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="576" y="248" width="44" height="44" rx="6" fill="#E53935"/>
