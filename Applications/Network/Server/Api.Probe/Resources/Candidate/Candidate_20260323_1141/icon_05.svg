<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#004D40"/>
  <!-- Layer 2: Terminal card -->
  <rect x="140" y="200" width="744" height="580" rx="16" fill="#00251A"/>
  <!-- Terminal dots -->
  <circle cx="210" cy="270" r="20" fill="#FF5F57"/>
  <circle cx="260" cy="270" r="20" fill="#FEBC2E"/>
  <circle cx="310" cy="270" r="20" fill="#28C840"/>
  <!-- Divider -->
  <rect x="140" y="302" width="744" height="4" fill="#004D40"/>
  <!-- Layer 3: curl command -->
  <text x="180" y="380" font-family="Consolas,monospace" font-size="36" fill="#A5D6A7">$ curl -X GET \</text>
  <text x="200" y="430" font-family="Consolas,monospace" font-size="36" fill="#A5D6A7">  /api/probe \</text>
  <text x="200" y="480" font-family="Consolas,monospace" font-size="36" fill="#A5D6A7">  -H "Accept: json"</text>
  <rect x="180" y="520" width="600" height="4" fill="#004D40"/>
  <text x="180" y="580" font-family="Consolas,monospace" font-size="32" fill="#69F0AE">&#123; "status": "ok" &#125;</text>
</svg>