<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#2D1054"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EEEFF"/>
      <stop offset="100%" stop-color="#4CC8DC"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Deep purple background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <!-- Layer 2: Dark grid panel -->
  <rect x="112" y="112" width="800" height="800" rx="28" fill="#0D0520"/>

  <!-- Layer 3: 4x4 Tiles — cyan wave expanding diagonally from top-left -->
  <!-- Row 0: 3 cyan + 1 blue (territory = top 3 of row 0) -->
  <rect x="152" y="152" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="337" y="152" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="522" y="152" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="707" y="152" width="165" height="165" rx="18" fill="#64BCE0"/>
  <!-- Row 1: 2 cyan + blue + lavender -->
  <rect x="152" y="337" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="337" y="337" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="522" y="337" width="165" height="165" rx="18" fill="#64BCE0"/>
  <rect x="707" y="337" width="165" height="165" rx="18" fill="#B48CD4"/>
  <!-- Row 2: 1 cyan + blue + salmon + pink -->
  <rect x="152" y="522" width="165" height="165" rx="18" fill="url(#cyanGlow)"/>
  <rect x="337" y="522" width="165" height="165" rx="18" fill="#64BCE0"/>
  <rect x="522" y="522" width="165" height="165" rx="18" fill="#F4956A"/>
  <rect x="707" y="522" width="165" height="165" rx="18" fill="#F08CAC"/>
  <!-- Row 3: blue + salmon + pink + green -->
  <rect x="152" y="707" width="165" height="165" rx="18" fill="#64BCE0"/>
  <rect x="337" y="707" width="165" height="165" rx="18" fill="#F4956A"/>
  <rect x="522" y="707" width="165" height="165" rx="18" fill="#F08CAC"/>
  <rect x="707" y="707" width="165" height="165" rx="18" fill="#7CCA7C"/>

  <!-- Wave direction arrow — subtle diagonal hint -->
  <line x1="180" y1="180" x2="750" y2="750" stroke="#6EEEFF" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
</svg>
