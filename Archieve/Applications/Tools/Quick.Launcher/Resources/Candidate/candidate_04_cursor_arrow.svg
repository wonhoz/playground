<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E0050"/>
      <stop offset="100%" style="stop-color:#3A0080"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CCAAFF"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#AA44FF;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#AA44FF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#burst)"/>
  <!-- Speed lines radial -->
  <line x1="256" y1="80" x2="256" y2="140" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="130" x2="340" y2="165" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <line x1="420" y1="256" x2="360" y2="256" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="380" x2="340" y2="345" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <line x1="130" y1="130" x2="170" y2="165" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="256" x2="150" y2="256" stroke="#AA44FF" stroke-width="2" opacity="0.5"/>
  <!-- Large cursor arrow -->
  <path d="M 180 150 L 180 360 L 240 300 L 280 390 L 320 370 L 280 280 L 360 280 Z" fill="url(#arrow)" stroke="#AA44FF" stroke-width="3"/>
  <!-- Glow dot at tip -->
  <circle cx="180" cy="150" r="10" fill="#FFFFFF" opacity="0.9"/>
</svg>
