<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window.Pilot — 아이콘 후보 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .card { background: #252535; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: border-color .2s; }
    .card:hover { border-color: #666; }
    .card img { width: 100%; max-width: 160px; height: 160px; object-fit: contain; display: block; margin: 0 auto 12px; }
    .card .num  { font-size: 11px; color: #555; margin-bottom: 4px; }
    .card .name { font-size: 13px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Window.Pilot — 아이콘 후보</h1>
  <p>창 배치·조작 자동화 도구 | 10개 디자인 컨셉</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_window_grid.svg" alt="window_grid">
      <div class="num">#01</div>
      <div class="name">window_grid</div>
    </div>
    <div class="card">
      <img src="candidate_02_compass_layout.svg" alt="compass_layout">
      <div class="num">#02</div>
      <div class="name">compass_layout</div>
    </div>
    <div class="card">
      <img src="candidate_03_snap_arrows.svg" alt="snap_arrows">
      <div class="num">#03</div>
      <div class="name">snap_arrows</div>
    </div>
    <div class="card">
      <img src="candidate_04_pilot_joystick.svg" alt="pilot_joystick">
      <div class="num">#04</div>
      <div class="name">pilot_joystick</div>
    </div>
    <div class="card">
      <img src="candidate_05_cockpit_panel.svg" alt="cockpit_panel">
      <div class="num">#05</div>
      <div class="name">cockpit_panel</div>
    </div>
    <div class="card">
      <img src="candidate_06_layout_teal.svg" alt="layout_teal">
      <div class="num">#06</div>
      <div class="name">layout_teal</div>
    </div>
    <div class="card">
      <img src="candidate_07_magnet_snap.svg" alt="magnet_snap">
      <div class="num">#07</div>
      <div class="name">magnet_snap</div>
    </div>
    <div class="card">
      <img src="candidate_08_monitor_arrange.svg" alt="monitor_arrange">
      <div class="num">#08</div>
      <div class="name">monitor_arrange</div>
    </div>
    <div class="card">
      <img src="candidate_09_crosshair_target.svg" alt="crosshair_target">
      <div class="num">#09</div>
      <div class="name">crosshair_target</div>
    </div>
    <div class="card">
      <img src="candidate_10_drag_drop_orange.svg" alt="drag_drop_orange">
      <div class="num">#10</div>
      <div class="name">drag_drop_orange</div>
    </div>
  </div>
</body>
</html>
