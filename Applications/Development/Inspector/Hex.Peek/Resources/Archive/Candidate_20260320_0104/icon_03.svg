<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Chip outline -->
  <rect x="300" y="300" width="424" height="424" rx="20" fill="#2E7D32"/>
  <rect x="340" y="340" width="344" height="344" rx="10" fill="#050A00"/>
  <!-- Circuit traces (horizontal) -->
  <line x1="340" y1="420" x2="684" y2="420" stroke="#4CAF50" stroke-width="14"/>
  <line x1="340" y1="512" x2="684" y2="512" stroke="#4CAF50" stroke-width="14"/>
  <line x1="340" y1="604" x2="684" y2="604" stroke="#4CAF50" stroke-width="14"/>
  <!-- Circuit traces (vertical) -->
  <line x1="420" y1="340" x2="420" y2="684" stroke="#4CAF50" stroke-width="14"/>
  <line x1="512" y1="340" x2="512" y2="684" stroke="#4CAF50" stroke-width="14"/>
  <line x1="604" y1="340" x2="604" y2="684" stroke="#4CAF50" stroke-width="14"/>
  <!-- Pin nodes at intersections -->
  <circle cx="420" cy="420" r="16" fill="#4CAF50"/>
  <circle cx="512" cy="420" r="16" fill="#4CAF50"/>
  <circle cx="604" cy="420" r="16" fill="#4CAF50"/>
  <circle cx="420" cy="512" r="16" fill="#4CAF50"/>
  <circle cx="512" cy="512" r="22" fill="#4CAF50"/>
  <circle cx="604" cy="512" r="16" fill="#4CAF50"/>
  <circle cx="420" cy="604" r="16" fill="#4CAF50"/>
  <circle cx="512" cy="604" r="16" fill="#4CAF50"/>
  <circle cx="604" cy="604" r="16" fill="#4CAF50"/>
  <!-- External pins left/right/top/bottom -->
  <rect x="210" y="400" width="90" height="20" rx="4" fill="#4CAF50"/>
  <rect x="210" y="500" width="90" height="20" rx="4" fill="#4CAF50"/>
  <rect x="210" y="600" width="90" height="20" rx="4" fill="#4CAF50"/>
  <rect x="724" y="400" width="90" height="20" rx="4" fill="#4CAF50"/>
  <rect x="724" y="500" width="90" height="20" rx="4" fill="#4CAF50"/>
  <rect x="724" y="600" width="90" height="20" rx="4" fill="#4CAF50"/>
</svg>