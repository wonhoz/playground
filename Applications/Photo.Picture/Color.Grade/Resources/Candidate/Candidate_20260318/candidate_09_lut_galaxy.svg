<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3D LUT 큐브 (아이소메트릭) -->
  <!-- 앞면 -->
  <polygon points="180,200 320,200 320,340 180,340" fill="#A78BFA" opacity="0.1"/>
  <polygon points="180,200 320,200 320,340 180,340" fill="none" stroke="#A78BFA" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 윗면 -->
  <polygon points="180,200 320,200 380,140 240,140" fill="#C084FC" opacity="0.08"/>
  <polygon points="180,200 320,200 380,140 240,140" fill="none" stroke="#C084FC" stroke-width="2" opacity="0.8"/>
  <!-- 오른쪽 면 -->
  <polygon points="320,200 380,140 380,280 320,340" fill="#A78BFA" opacity="0.06"/>
  <polygon points="320,200 380,140 380,280 320,340" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <!-- LUT 격자 (앞면) -->
  <line x1="226" y1="200" x2="226" y2="340" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <line x1="272" y1="200" x2="272" y2="340" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="247" x2="320" y2="247" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="294" x2="320" y2="294" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <!-- 색상 점들 (LUT 매핑) -->
  <circle cx="226" cy="247" r="5" fill="#FF6B6B" opacity="0.8" filter="url(#glow)"/>
  <circle cx="272" cy="247" r="5" fill="#06D6A0" opacity="0.8" filter="url(#glow)"/>
  <circle cx="226" cy="294" r="5" fill="#118AB2" opacity="0.8"/>
  <circle cx="272" cy="294" r="5" fill="#FFD166" opacity="0.8" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="410" text-anchor="middle" fill="#A78BFA" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">3D LUT CUBE</text>
</svg>