<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="glow04" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF08A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg04)"/>
  <!-- Mold frame (casting die) -->
  <rect x="230" y="250" width="560" height="440" rx="30" fill="#78350F" stroke="#451A03" stroke-width="16"/>
  <!-- Mold inner cavity (star shape cutout) -->
  <rect x="290" y="310" width="440" height="320" rx="16" fill="#92400E"/>
  <!-- Glowing light from mold -->
  <ellipse cx="512" cy="470" rx="180" ry="130" fill="url(#glow04)" opacity="0.8"/>
  <!-- Shining star icon emerging -->
  <polygon points="512,350 540,430 625,430 558,480 582,560 512,512 442,560 466,480 399,430 484,430" fill="#FEF08A" stroke="#FBBF24" stroke-width="8" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <line x1="620" y1="280" x2="660" y2="240" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="660" y1="280" x2="620" y2="240" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="750" y1="350" x2="790" y2="310" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="790" y1="350" x2="750" y2="310" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="330" y1="280" x2="360" y2="250" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="360" y1="280" x2="330" y2="250" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Bottom label -->
  <text x="512" y="800" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#78350F" text-anchor="middle">ICON CAST</text>
</svg>