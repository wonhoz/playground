  <!-- Highlighted/selected cell -->
  <rect x="508" y="342" width="156" height="104" rx="12" fill="#1E40AF" stroke="#3B82F6" stroke-width="3"/>
  <text x="586" y="407" font-family="Segoe UI Emoji,sans-serif" font-size="52" text-anchor="middle">🇧🇷</text>
  <rect x="682" y="342" width="156" height="104" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="760" y="407" font-family="Segoe UI Emoji,sans-serif" font-size="52" text-anchor="middle">🇨🇳</text>
  <!-- Row 3 -->
  <rect x="160" y="464" width="156" height="104" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
