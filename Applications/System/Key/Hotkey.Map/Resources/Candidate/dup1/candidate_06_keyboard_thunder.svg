<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
    <linearGradient id="kb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#1a1a25"/>
    </linearGradient>
    <linearGradient id="thunder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ffd600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard body -->
  <rect x="60" y="240" width="392" height="180" rx="16" fill="url(#kb)"/>
  <!-- Key rows top -->
  <rect x="80" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="120" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="160" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="200" y="258" width="32" height="26" rx="5" fill="#fff176" filter="url(#glow)"/>
  <rect x="240" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="280" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="320" y="258" width="32" height="26" rx="5" fill="#fff176" filter="url(#glow)"/>
  <rect x="360" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="400" y="258" width="32" height="26" rx="5" fill="#3a3a48"/>
  <!-- Key rows middle -->
  <rect x="80" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="120" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="160" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="200" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="240" y="296" width="32" height="26" rx="5" fill="#fff176" filter="url(#glow)"/>
  <rect x="280" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="320" y="296" width="32" height="26" rx="5" fill="#3a3a48"/>
  <rect x="360" y="296" width="72" height="26" rx="5" fill="#3a3a48"/>
  <!-- Space row -->
  <rect x="80" y="334" width="70" height="26" rx="5" fill="#3a3a48"/>
  <rect x="160" y="334" width="192" height="26" rx="5" fill="#2a2a35"/>
  <rect x="362" y="334" width="70" height="26" rx="5" fill="#3a3a48"/>
  <!-- Thunder bolt -->
  <polygon points="256,60 220,190 250,190 214,380 306,200 272,200 312,60" fill="url(#thunder)" filter="url(#glow)"/>
  <!-- Glow rays -->
  <line x1="200" y1="160" x2="160" y2="120" stroke="url(#thunder)" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="310" y1="150" x2="360" y2="110" stroke="url(#thunder)" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
</svg>