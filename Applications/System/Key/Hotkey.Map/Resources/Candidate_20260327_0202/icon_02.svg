<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — deep purple gradient -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#1A0E3D"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: "Ctrl+?" large text block -->
  <!-- Background pill for the shortcut text -->
  <rect x="112" y="280" width="560" height="160" rx="24" fill="#3D2A80" stroke="#6A50C0" stroke-width="6"/>
  <text x="140" y="388" font-family="'Consolas','Courier New',monospace" font-size="110" font-weight="bold" fill="#FFE066">Ctrl+</text>

  <!-- Question mark placeholder (magnifier-style) -->
  <circle cx="752" cy="360" r="130" fill="none" stroke="#FFE066" stroke-width="22"/>
  <circle cx="752" cy="360" r="85" fill="#3D2A80"/>
  <!-- ? symbol inside -->
  <text x="718" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="bold" fill="#FF9F1C">?</text>
  <!-- Magnifier handle -->
  <line x1="848" y1="458" x2="920" y2="540" stroke="#FFE066" stroke-width="24" stroke-linecap="round"/>

  <!-- Layer 3: Scan result tags at bottom -->
  <rect x="112" y="520" width="240" height="64" rx="14" fill="#1A3A1A" stroke="#2ECC71" stroke-width="4"/>
  <text x="152" y="561" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#2ECC71">✓ Free: 38</text>

  <rect x="376" y="520" width="240" height="64" rx="14" fill="#2A2A5A" stroke="#6A7ADD" stroke-width="4"/>
  <text x="410" y="561" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#8888FF">✗ Used: 14</text>

  <rect x="640" y="520" width="240" height="64" rx="14" fill="#3A1A1A" stroke="#EF5350" stroke-width="4"/>
  <text x="672" y="561" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#EF5350">⚠ Sys: 11</text>

  <!-- Subtitle -->
  <text x="512" y="670" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="bold" fill="#A090D0">Hotkey Scanner</text>
</svg>
