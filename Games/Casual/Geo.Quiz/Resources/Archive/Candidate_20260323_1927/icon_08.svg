<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_g8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#065F46"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_g8)"/>

  <!-- 정답 카드 -->
  <rect x="195" y="255" width="634" height="514" rx="32" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="6"
        style="filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3))"/>

  <!-- 카드 상단 헤더 (국가명) -->
  <rect x="195" y="255" width="634" height="180" rx="32" fill="#ECFDF5"/>
  <rect x="195" y="370" width="634" height="65" fill="#ECFDF5"/>

  <!-- 국기 미니 (프랑스) -->
  <!-- 프랑스 국기: 3색 세로 줄 -->
  <rect x="235" y="285" width="40" height="120" rx="4" fill="#1D4ED8"/>
  <rect x="275" y="285" width="40" height="120" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="315" y="285" width="40" height="120" rx="4" fill="#DC2626"/>
  <rect x="235" y="285" width="120" height="120" rx="4" fill="none" stroke="#E5E7EB" stroke-width="3"/>

  <!-- FRANCE 텍스트 -->
  <text x="512" y="386" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#065F46">FRANCE</text>

  <!-- 구분선 -->
  <line x1="235" y1="435" x2="789" y2="435" stroke="#D1FAE5" stroke-width="4"/>

  <!-- 카드 하단 (정답) -->
  <text x="512" y="530" font-family="Arial" font-size="50" text-anchor="middle" fill="#6B7280">수도 (Capital)</text>
  <text x="512" y="660" font-family="Arial Black" font-size="130" font-weight="900" text-anchor="middle" fill="#1E293B">PARIS</text>

  <!-- 정답 체크 배지 -->
  <circle cx="779" cy="269" r="55" fill="#22C55E" stroke="white" stroke-width="8"/>
  <text x="779" y="293" font-family="Arial Black" font-size="62" font-weight="900" text-anchor="middle" fill="white">✓</text>
</svg>
