<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A20"/>
      <stop offset="100%" style="stop-color:#1A0A00"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEE88"/>
      <stop offset="100%" style="stop-color:#FF8800;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="pile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC44"/>
      <stop offset="100%" style="stop-color:#AA6600"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Platform/ledge -->
  <rect x="80" y="180" width="150" height="20" rx="5" fill="#444433"/>
  <rect x="280" y="300" width="150" height="20" rx="5" fill="#444433"/>
  <!-- Sand stream from left platform -->
  <path d="M200 190 C210 220 200 260 220 280 C230 300 240 320 256 380" fill="none" stroke="url(#stream)" stroke-width="18" stroke-linecap="round"/>
  <!-- Particle cloud -->
  <circle cx="202" cy="200" r="6" fill="#FFD060" opacity="0.9"/>
  <circle cx="215" cy="230" r="5" fill="#FFCC44" opacity="0.8"/>
  <circle cx="225" cy="265" r="5" fill="#FFAA33" opacity="0.8"/>
  <circle cx="240" cy="295" r="4" fill="#FF9922" opacity="0.7"/>
  <!-- Accumulated pile -->
  <ellipse cx="256" cy="400" rx="100" ry="30" fill="url(#pile)" opacity="0.9"/>
  <ellipse cx="256" cy="395" rx="70" ry="20" fill="#FFDD66" opacity="0.7"/>
  <!-- Stars/sparkles -->
  <circle cx="140" cy="130" r="3" fill="#FFEEAA" opacity="0.5"/>
  <circle cx="380" cy="160" r="3" fill="#FFEEAA" opacity="0.4"/>
  <circle cx="400" cy="380" r="3" fill="#FFEEAA" opacity="0.5"/>
  <!-- Second platform stream -->
  <path d="M280 310 C290 330 300 355 305 380" fill="none" stroke="#FFAA22" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
</svg>
