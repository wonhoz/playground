<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1A1A2E"/>
  <!-- Layer 2: 2×2 포맷 배지 그리드 -->
  <!-- SVG 배지 (초록) -->
  <rect x="240" y="280" width="220" height="180" rx="20" fill="#1B5E20"/>
  <text x="350" y="390" text-anchor="middle" font-family="Arial Black" font-size="100" font-weight="900" fill="#69F0AE">SVG</text>
  <!-- PNG 배지 (파랑) -->
  <rect x="564" y="280" width="220" height="180" rx="20" fill="#0D47A1"/>
  <text x="674" y="390" text-anchor="middle" font-family="Arial Black" font-size="100" font-weight="900" fill="#82B1FF">PNG</text>
  <!-- ICO 배지 (오렌지) -->
  <rect x="240" y="564" width="220" height="180" rx="20" fill="#E65100"/>
  <text x="350" y="674" text-anchor="middle" font-family="Arial Black" font-size="100" font-weight="900" fill="#FFD180">ICO</text>
  <!-- JPG 배지 (보라) -->
  <rect x="564" y="564" width="220" height="180" rx="20" fill="#4A148C"/>
  <text x="674" y="674" text-anchor="middle" font-family="Arial Black" font-size="100" font-weight="900" fill="#EA80FC">JPG</text>
  <!-- Layer 3: 배지 사이 변환 화살표 -->
  <text x="512" y="390" text-anchor="middle" font-family="Arial" font-size="64" fill="#546E7A">⇄</text>
  <text x="350" y="530" text-anchor="middle" font-family="Arial" font-size="64" fill="#546E7A">⇅</text>
  <text x="674" y="530" text-anchor="middle" font-family="Arial" font-size="64" fill="#546E7A">⇅</text>
  <text x="512" y="674" text-anchor="middle" font-family="Arial" font-size="64" fill="#546E7A">⇄</text>
  <!-- 하단 텍스트 -->
  <text x="512" y="860" text-anchor="middle" font-family="Arial Black" font-size="72" font-weight="900" fill="#4FC3F7">Img.Cast</text>
</svg>