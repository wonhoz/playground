<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 요새 성벽 -->
  <rect x="90" y="280" width="332" height="140" rx="4" fill="#F97316" opacity="0.08"/>
  <rect x="90" y="280" width="332" height="140" rx="4" fill="none" stroke="#F97316" stroke-width="2.5"/>
  <!-- 성벽 톱니 -->
  <rect x="90" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="130" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="200" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="280" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="352" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="392" y="262" width="30" height="28" rx="3" fill="#F97316" opacity="0.2"/>
  <!-- 중앙 타워 -->
  <rect x="216" y="160" width="80" height="140" rx="4" fill="#F97316" opacity="0.1"/>
  <rect x="216" y="160" width="80" height="140" rx="4" fill="none" stroke="#F97316" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 타워 창문들 (포트들) -->
  <rect x="228" y="180" width="25" height="20" rx="3" fill="#F97316" opacity="0.4" filter="url(#glow)"/>
  <rect x="259" y="180" width="25" height="20" rx="3" fill="#F97316" opacity="0.4" filter="url(#glow)"/>
  <rect x="228" y="215" width="56" height="20" rx="3" fill="#F97316" opacity="0.3"/>
  <!-- 문 -->
  <rect x="238" y="254" width="36" height="26" rx="4" fill="#F97316" opacity="0.5" filter="url(#glow)"/>
  <!-- 성문 -->
  <rect x="224" y="340" width="64" height="80" rx="4" fill="#F97316" opacity="0.3"/>
  <!-- 경보 타워 불빛 -->
  <circle cx="256" cy="148" r="14" fill="#F97316" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="148" r="24" fill="#F97316" opacity="0.1"/>
  <!-- 측면 창들 (포트 스테이터스) -->
  <rect x="110" y="295" width="30" height="20" rx="3" fill="#F97316" opacity="0.3"/>
  <rect x="150" y="295" width="30" height="20" rx="3" fill="#F97316" opacity="0.2"/>
  <rect x="332" y="295" width="30" height="20" rx="3" fill="#F97316" opacity="0.3"/>
  <rect x="372" y="295" width="30" height="20" rx="3" fill="#F97316" opacity="0.2"/>
</svg>