  <rect x="142" y="676" width="176" height="176" fill="url(#smoothBL)" rx="6"/>

  <rect x="694" y="664" width="200" height="200" rx="10" fill="#0F2744" opacity="0.9"/>
  <defs>
    <linearGradient id="smoothBR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect x="706" y="676" width="176" height="176" fill="url(#smoothBR)" rx="6"/>

  <!-- Small connecting arrows from pixel corners to smooth -->
  <line x1="230" y1="360" x2="400" y2="430" stroke="#FCD34D" stroke-width="5" stroke-linecap="round" opacity="0.5" stroke-dasharray="12,8"/>
  <line x1="794" y1="360" x2="624" y2="430" stroke="#A5F3FC" stroke-width="5" stroke-linecap="round" opacity="0.5" stroke-dasharray="12,8"/>
