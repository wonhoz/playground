<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 검정 배경 -->
  <circle cx="512" cy="512" r="512" fill="#0A0A0A"/>

  <!-- Layer 2: 좌측 - 원본 이미지 (컬러 얼굴) -->
  <circle cx="260" cy="430" r="160" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="260" cy="415" r="85" fill="#555"/>
  <circle cx="220" cy="387" r="14" fill="#AAA"/>
  <circle cx="300" cy="387" r="14" fill="#AAA"/>
  <path d="M 205,455 Q 260,498 315,455" stroke="#999" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- 변환 화살표 -->
  <path d="M 445,430 L 548,430" stroke="#444" stroke-width="10" stroke-linecap="round"/>
  <polygon points="538,410 570,430 538,450" fill="#444"/>

  <!-- Layer 3: 우측 - 문자 아트 그리드 (얼굴/원형 구성) -->
  <g font-family="Consolas,monospace" font-size="22">
    <text x="595" y="272" fill="#222">. . . . . . . . . . . . . .</text>
    <text x="595" y="306" fill="#333">. . . @ @ @ @ @ @ . . . .</text>
    <text x="595" y="340" fill="#555">. . @ # # # # # # @ . . .</text>
    <text x="595" y="374" fill="#777">. @ # # # # # # # # @ . .</text>
    <text x="595" y="408">
      <tspan fill="#999">. @ # </tspan><tspan fill="#CCC">@ </tspan><tspan fill="#999"># # </tspan><tspan fill="#CCC">@ </tspan><tspan fill="#999"># # @ @ . .</tspan>
    </text>
    <text x="595" y="442" fill="#888">. @ # # # # # # # # @ . .</text>
    <text x="595" y="476">
      <tspan fill="#999">. @ # # </tspan><tspan fill="#EEE">- - - - </tspan><tspan fill="#999"># # @ . .</tspan>
    </text>
    <text x="595" y="510" fill="#777">. . @ # # # # # # @ . . .</text>
    <text x="595" y="544" fill="#555">. . . @ @ @ @ @ @ . . . .</text>
    <text x="595" y="578" fill="#333">. . . . . . . . . . . . . .</text>
  </g>

  <!-- 하단 레이블 -->
  <text x="512" y="780" text-anchor="middle" font-family="Consolas,monospace" font-size="38" fill="#555">Image → Char Art</text>
  <!-- 문자 스케일 -->
  <text x="512" y="840" text-anchor="middle" font-family="Consolas,monospace" font-size="32" fill="#222">@  #  %  *  +  -  .  (space)</text>
</svg>
