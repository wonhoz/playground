<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A30"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="30%" stop-color="#1A0A30"/>
      <stop offset="31%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="175" fill="url(#vinyl)"/>
  <!-- Grooves -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Label center -->
  <circle cx="256" cy="256" r="72" fill="#6A1B9A"/>
  <circle cx="256" cy="256" r="58" fill="#4A148C"/>
  <!-- Label text lines -->
  <rect x="220" y="238" width="72" height="7" rx="3.5" fill="#CE93D8" opacity="0.8"/>
  <rect x="228" y="252" width="56" height="6" rx="3" fill="#CE93D8" opacity="0.6"/>
  <rect x="232" y="265" width="48" height="6" rx="3" fill="#CE93D8" opacity="0.5"/>
  <!-- Center hole -->
  <circle cx="256" cy="256" r="10" fill="#0A0A0A"/>
  <!-- Tag hanging off vinyl -->
  <line x1="330" y1="182" x2="380" y2="132" stroke="#CE93D8" stroke-width="3" stroke-dasharray="6,4"/>
  <rect x="352" y="100" width="90" height="56" rx="8" fill="#4A148C" stroke="#CE93D8" stroke-width="2.5"/>
  <circle cx="366" cy="112" r="5" fill="#1A0A30" stroke="#CE93D8" stroke-width="2"/>
  <rect x="375" y="105" width="55" height="6" rx="3" fill="#CE93D8" opacity="0.7"/>
  <rect x="375" y="116" width="42" height="5" rx="2.5" fill="#CE93D8" opacity="0.5"/>
  <rect x="375" y="126" width="50" height="5" rx="2.5" fill="#CE93D8" opacity="0.6"/>
  <rect x="375" y="136" width="38" height="5" rx="2.5" fill="#CE93D8" opacity="0.5"/>
</svg>
