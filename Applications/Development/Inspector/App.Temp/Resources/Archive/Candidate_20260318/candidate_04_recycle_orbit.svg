<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#22C55E" stroke-width="3" stroke-dasharray="12,6" opacity="0.4"/>
  <!-- Recycle arrows (3 curved arrows around the orbit) -->
  <!-- Arrow 1 (top) -->
  <path d="M180,130 A100,100 0 0,1 332,130" fill="none" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
  <polygon points="332,130 316,108 352,118" fill="#22C55E"/>
  <!-- Arrow 2 (bottom right) -->
  <path d="M370,300 A100,100 0 0,1 200,390" fill="none" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
  <polygon points="200,390 190,368 224,376" fill="#22C55E"/>
  <!-- Arrow 3 (bottom left) -->
  <path d="M148,360 A100,100 0 0,1 140,186" fill="none" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
  <polygon points="140,186 162,198 148,164" fill="#22C55E"/>
  <!-- Center: file being recycled -->
  <rect x="218" y="218" width="76" height="76" rx="8" fill="#001a00" stroke="#22C55E" stroke-width="2"/>
  <text x="256" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#22C55E">.tmp</text>
  <text x="256" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#22C55E">.log</text>
  <text x="256" y="280" text-anchor="middle" font-family="monospace" font-size="10" fill="#22C55E">.cache</text>
  <!-- Orbiting file fragments -->
  <circle cx="256" cy="96" r="12" fill="#22C55E" opacity="0.7"/>
  <text x="256" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#001a00">~</text>
  <circle cx="400" cy="316" r="10" fill="#16A34A" opacity="0.6"/>
  <circle cx="140" cy="380" r="8" fill="#22C55E" opacity="0.5"/>
</svg>
