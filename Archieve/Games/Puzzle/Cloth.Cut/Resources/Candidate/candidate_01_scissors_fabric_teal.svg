<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#4DB6AC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cloth fabric with wavy edge -->
  <path d="M100 180 Q140 160 180 180 Q220 200 260 180 Q300 160 340 180 Q380 200 420 180 L420 360 Q380 380 340 360 Q300 340 260 360 Q220 380 180 360 Q140 340 100 360 Z" fill="url(#cloth)" opacity="0.85"/>
  <!-- Fabric texture lines -->
  <line x1="100" y1="220" x2="420" y2="220" stroke="#00897B" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="260" x2="420" y2="260" stroke="#00897B" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="300" x2="420" y2="300" stroke="#00897B" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="180" x2="160" y2="360" stroke="#00897B" stroke-width="1.5" opacity="0.4"/>
  <line x1="220" y1="180" x2="220" y2="360" stroke="#00897B" stroke-width="1.5" opacity="0.4"/>
  <line x1="280" y1="180" x2="280" y2="360" stroke="#00897B" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="180" x2="340" y2="360" stroke="#00897B" stroke-width="1.5" opacity="0.4"/>
  <!-- Scissors -->
  <circle cx="220" cy="260" r="14" fill="none" stroke="white" stroke-width="5"/>
  <circle cx="280" cy="260" r="14" fill="none" stroke="white" stroke-width="5"/>
  <line x1="230" y1="252" x2="390" y2="176" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="268" x2="390" y2="344" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Cut line dashed -->
  <line x1="256" y1="160" x2="256" y2="380" stroke="white" stroke-width="2.5" stroke-dasharray="10,8" opacity="0.6"/>
</svg>
