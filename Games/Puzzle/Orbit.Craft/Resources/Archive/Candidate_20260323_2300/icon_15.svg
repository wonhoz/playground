<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg15" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#A21551"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <radialGradient id="planet15" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FBCFE8"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </radialGradient>
    <clipPath id="clip15">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg15)"/>
  <g clip-path="url(#clip15)">
    <!-- 별 -->
    <circle cx="160" cy="190" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="820" cy="200" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="180" cy="840" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="840" cy="820" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="130" cy="500" r="2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="900" cy="480" r="2" fill="#FFFFFF" opacity="0.4"/>
    <!-- Layer 2: 수식 배경 패널 -->
    <rect x="220" y="220" width="584" height="290" rx="20" fill="#5C0A2E" opacity="0.8" stroke="#F472B6" stroke-width="8"/>
    <!-- 수식: F = ma -->
    <text x="512" y="316" text-anchor="middle" font-family="Georgia, Times, serif" font-style="italic" font-weight="bold" font-size="110" fill="#FFFFFF">F = ma</text>
    <!-- 아래 설명 -->
    <text x="512" y="392" text-anchor="middle" font-family="Arial" font-size="36" fill="#F9A8D4" opacity="0.9">뉴턴의 제2법칙</text>
    <!-- 변수 설명 (패널 하단) -->
    <rect x="240" y="430" width="160" height="56" rx="10" fill="#7B0D39" opacity="0.7"/>
    <text x="320" y="465" text-anchor="middle" font-family="Arial" font-size="28" fill="#F472B6">F: 중력</text>
    <rect x="432" y="430" width="160" height="56" rx="10" fill="#7B0D39" opacity="0.7"/>
    <text x="512" y="465" text-anchor="middle" font-family="Arial" font-size="28" fill="#F472B6">m: 질량</text>
    <rect x="624" y="430" width="160" height="56" rx="10" fill="#7B0D39" opacity="0.7"/>
    <text x="704" y="465" text-anchor="middle" font-family="Arial" font-size="28" fill="#F472B6">a: 가속도</text>
    <!-- Layer 2: 행성 (우하단) -->
    <circle cx="720" cy="760" r="110" fill="url(#planet15)"/>
    <!-- 행성 표면 -->
    <ellipse cx="695" cy="740" rx="70" ry="24" fill="#BE185D" opacity="0.4" transform="rotate(-20 695 740)"/>
    <!-- 궤도 선 (행성 주위) -->
    <circle cx="720" cy="760" r="155" fill="none" stroke="#F472B6" stroke-width="8" opacity="0.35"/>
    <!-- Layer 2: 작은 물체 (행성 영향권) -->
    <circle cx="875" cy="760" r="28" fill="#FFFFFF" opacity="0.8"/>
    <!-- 중력 화살표 -->
    <path d="M 847 760 Q 810 760 782 760" fill="none" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <polygon points="782,760 796,750 796,770" fill="#FDE68A"/>
    <!-- 힘 벡터 F 표시 -->
    <text x="814" y="742" text-anchor="middle" font-family="Georgia" font-style="italic" font-weight="bold" font-size="30" fill="#FDE68A">F</text>
    <!-- Layer 3: 작은 물리 기호들 -->
    <text x="280" y="740" font-family="Georgia" font-style="italic" font-size="36" fill="#F9A8D4" opacity="0.5">G</text>
    <text x="248" y="790" font-family="Georgia" font-style="italic" font-size="28" fill="#F9A8D4" opacity="0.4">m₁m₂</text>
    <line x1="240" y1="800" x2="310" y2="800" stroke="#F9A8D4" stroke-width="4" opacity="0.4"/>
    <text x="262" y="828" font-family="Georgia" font-style="italic" font-size="28" fill="#F9A8D4" opacity="0.4">r²</text>
    <!-- 별 장식 -->
    <path d="M 200 300 L 210 322 L 232 332 L 210 342 L 200 364 L 190 342 L 168 332 L 190 322 Z" fill="#FFFFFF" opacity="0.7"/>
  </g>
</svg>
