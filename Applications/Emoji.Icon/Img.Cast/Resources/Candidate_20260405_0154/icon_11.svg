<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <linearGradient id="arrow11a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <linearGradient id="arrow11b" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg11)"/>
  <!-- Layer 2: Two format icons connected by bidirectional arrows -->
  <!-- Left: SVG circle badge -->
  <circle cx="280" cy="512" r="200" fill="#9C27B0"/>
  <text x="178" y="558" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="900" fill="white">SVG</text>
  <!-- Right: ICO square badge -->
  <rect x="544" y="312" width="380" height="400" rx="40" fill="#6A1B9A"/>
  <text x="580" y="558" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="900" fill="white">ICO</text>
  <!-- Top arrow (left to right) -->
  <path d="M430 430 Q512 360 630 430" fill="none" stroke="url(#arrow11a)" stroke-width="20" stroke-linecap="round"/>
  <polygon points="620,390 670,440 610,460" fill="#E040FB"/>
  <!-- Bottom arrow (right to left) -->
  <path d="M630 590 Q512 660 430 590" fill="none" stroke="url(#arrow11b)" stroke-width="20" stroke-linecap="round"/>
  <polygon points="440,630 390,580 450,560" fill="#9C27B0"/>
  <!-- Layer 3: PNG/BMP sub-labels -->
  <text x="192" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="500" fill="#CE93D8">vector</text>
  <text x="576" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="500" fill="#CE93D8">bitmap</text>
</svg>
