<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 다크 블루 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1B3E"/>
  <!-- 카드 1 (뒤): 노랑, 시계 반대 회전 -->
  <rect x="262" y="242" width="480" height="540" rx="32" fill="#FFD166" transform="rotate(-10 512 512)"/>
  <!-- 카드 2 (중간): 민트, 약간 회전 -->
  <rect x="262" y="242" width="480" height="540" rx="32" fill="#4ECDC4" transform="rotate(-4 512 512)"/>
  <!-- 카드 3 (앞): 코랄, 정면 -->
  <rect x="262" y="242" width="480" height="540" rx="32" fill="#FF6B6B"/>
  <!-- 앞 카드 내용 줄 -->
  <rect x="326" y="370" width="352" height="36" rx="18" fill="rgba(255,255,255,0.75)"/>
  <rect x="326" y="426" width="280" height="28" rx="14" fill="rgba(255,255,255,0.50)"/>
  <rect x="326" y="472" width="220" height="28" rx="14" fill="rgba(255,255,255,0.30)"/>
</svg>
