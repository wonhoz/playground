<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#4C1D95"/>
  <!-- Layer 2: Broom body -->
  <!-- Handle (diagonal) -->
  <line x1="280" y1="200" x2="640" y2="680" stroke="#FBBF24" stroke-width="45" stroke-linecap="round"/>
  <!-- Broom head (sweeping end) -->
  <path d="M 590 640 Q 550 730 640 820 Q 720 900 820 840 Q 880 780 840 690 Q 800 620 720 610 Z" fill="#D97706"/>
  <!-- Broom bristles -->
  <line x1="620" y1="660" x2="640" y2="830" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="650" y1="652" x2="680" y2="820" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="680" y1="648" x2="720" y2="810" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="710" y1="650" x2="758" y2="800" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="740" y1="656" x2="796" y2="790" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Layer 3: Folders being swept away -->
  <g transform="rotate(-15 250 620)">
    <rect x="175" y="575" width="120" height="80" rx="8" fill="#EDE9FE" opacity="0.7"/>
    <rect x="175" y="553" width="60" height="28" rx="6" fill="#EDE9FE" opacity="0.7"/>
  </g>
  <g transform="rotate(8 360 660)">
    <rect x="310" y="630" width="100" height="70" rx="8" fill="#DDD6FE" opacity="0.65"/>
    <rect x="310" y="612" width="50" height="24" rx="5" fill="#DDD6FE" opacity="0.65"/>
  </g>
  <g transform="rotate(25 440 700)">
    <rect x="390" y="675" width="90" height="60" rx="7" fill="#C4B5FD" opacity="0.6"/>
    <rect x="390" y="660" width="45" height="20" rx="5" fill="#C4B5FD" opacity="0.6"/>
  </g>
  <!-- Motion dust particles -->
  <circle cx="290" cy="700" r="8" fill="#A78BFA" opacity="0.5"/>
  <circle cx="340" cy="720" r="6" fill="#A78BFA" opacity="0.45"/>
  <circle cx="460" cy="740" r="7" fill="#A78BFA" opacity="0.4"/>
</svg>