<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <!-- Clip person to canvas -->
    <clipPath id="cp02">
      <circle cx="512" cy="512" r="512"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background — vibrant blue -->
  <circle cx="512" cy="512" r="512" fill="url(#bg02)"/>

  <!-- Layer 2: Person avatar silhouette (white) -->
  <!-- Head -->
  <circle cx="462" cy="298" r="158" fill="white" clip-path="url(#cp02)"/>
  <!-- Neck connector -->
  <!-- <rect x="402" y="420" width="120" height="110" fill="white" clip-path="url(#cp02)"/> -->
  <!-- Body / shoulders -->
  <path d="M214,800 Q154,800 154,740 Q154,495 462,495 Q770,495 770,800 Z" fill="white" clip-path="url(#cp02)"/>

  <!-- Layer 3: Large green ACTIVE badge (bottom-right of avatar) -->
  <!-- White border ring -->
  <circle cx="740" cy="656" r="178" fill="white"/>
  <!-- Green fill -->
  <circle cx="740" cy="656" r="150" fill="#43D97B"/>
  <!-- White checkmark inside badge -->
  <polyline points="668,656 724,712 820,604" fill="none"
            stroke="white" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
