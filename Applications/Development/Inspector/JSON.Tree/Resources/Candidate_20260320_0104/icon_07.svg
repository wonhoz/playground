<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: 파이프라인 흐름 (pipeline flow: data path) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- 파이프 라인 3단계 -->
  <!-- 파이프 1 -->
  <rect x="160" y="340" width="180" height="80" rx="40" fill="#E65100"/>
  <!-- 화살표 1 -->
  <polygon points="370,380 420,350 420,410" fill="#FF8A65"/>
  <!-- 파이프 2 -->
  <rect x="422" y="340" width="180" height="80" rx="40" fill="#E65100"/>
  <!-- 화살표 2 -->
  <polygon points="632,380 682,350 682,410" fill="#FF8A65"/>
  <!-- 파이프 3 -->
  <rect x="684" y="340" width="180" height="80" rx="40" fill="#E65100"/>
  <!-- 데이터 노드들 (아래) -->
  <circle cx="250" cy="560" r="40" fill="#FF8A65" opacity="0.85"/>
  <circle cx="512" cy="560" r="40" fill="#FF8A65" opacity="0.85"/>
  <circle cx="774" cy="560" r="40" fill="#FF8A65" opacity="0.85"/>
  <!-- 연결선 -->
  <line x1="250" y1="420" x2="250" y2="520" stroke="#FF8A65" stroke-width="8" stroke-dasharray="12,8"/>
  <line x1="512" y1="420" x2="512" y2="520" stroke="#FF8A65" stroke-width="8" stroke-dasharray="12,8"/>
  <line x1="774" y1="420" x2="774" y2="520" stroke="#FF8A65" stroke-width="8" stroke-dasharray="12,8"/>
  <!-- 흐름 방향 곡선 -->
  <path d="M290 560 Q512 620 734 560" fill="none" stroke="#E65100" stroke-width="6" opacity="0.5"/>
</svg>
