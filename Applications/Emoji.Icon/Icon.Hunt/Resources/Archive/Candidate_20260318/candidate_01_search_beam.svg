<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 돋보기 -->
  <circle cx="210" cy="210" r="90" fill="#10B981" opacity="0.06"/>
  <circle cx="210" cy="210" r="90" fill="none" stroke="#10B981" stroke-width="16" filter="url(#glow)"/>
  <circle cx="210" cy="210" r="65" fill="none" stroke="#34D399" stroke-width="2" opacity="0.4"/>
  <!-- 손잡이 -->
  <line x1="278" y1="278" x2="380" y2="380" stroke="#10B981" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 빔 효과 -->
  <line x1="210" y1="120" x2="210" y2="80" stroke="#10B981" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="300" y1="130" x2="330" y2="100" stroke="#10B981" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="120" y1="130" x2="90" y2="100" stroke="#10B981" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="450" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">SEARCH BEAM</text>
</svg>
