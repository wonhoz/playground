    <!-- Longitude/latitude lines -->
    <ellipse cx="512" cy="512" rx="360" ry="100" fill="none" stroke="#60A5FA" stroke-width="6" opacity="0.4"/>
    <ellipse cx="512" cy="512" rx="360" ry="230" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.3"/>
    <line x1="152" y1="512" x2="872" y2="512" stroke="#60A5FA" stroke-width="6" opacity="0.4"/>
    <line x1="382" y1="154" x2="382" y2="870" stroke="#60A5FA" stroke-width="4" opacity="0.3"/>
    <line x1="642" y1="154" x2="642" y2="870" stroke="#60A5FA" stroke-width="4" opacity="0.3"/>
    <!-- Layer 3: Red location pin -->
    <path d="M512 240 Q392 400 392 470 A120 120 0 1 0 632 470 Q632 400 512 240 Z" fill="#EF4444"/>
    <circle cx="512" cy="470" r="60" fill="white"/>
    <circle cx="512" cy="470" r="40" fill="#EF4444"/>
