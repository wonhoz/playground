<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg08)"/>
  <!-- App window frame -->
  <rect x="160" y="200" width="704" height="624" rx="20" fill="#1E293B"/>
  <!-- Title bar -->
  <rect x="160" y="200" width="704" height="56" rx="20" fill="#0F172A"/>
  <rect x="160" y="236" width="704" height="20" fill="#0F172A"/>
  <circle cx="210" cy="228" r="12" fill="#EF4444"/>
  <circle cx="252" cy="228" r="12" fill="#F59E0B"/>
  <circle cx="294" cy="228" r="12" fill="#22C55E"/>
  <!-- Sidebar -->
  <rect x="160" y="256" width="180" height="568" fill="#0F172A"/>
  <!-- Sidebar items -->
  <text x="250" y="330" text-anchor="middle" font-family="monospace" font-size="26" fill="#64748B">Collection</text>
  <!-- GET item -->
  <rect x="170" y="356" width="160" height="52" rx="8" fill="#1E3A2A"/>
  <rect x="178" y="368" width="56" height="28" rx="6" fill="#22C55E"/>
  <text x="206" y="387" text-anchor="middle" font-family="Arial Black" font-size="20" font-weight="900" fill="#FFFFFF">GET</text>
  <text x="260" y="387" font-family="monospace" font-size="20" fill="#86EFAC">/users</text>
  <!-- POST item -->
  <rect x="170" y="420" width="160" height="52" rx="8" fill="#1E2A3A"/>
  <rect x="178" y="432" width="62" height="28" rx="6" fill="#F59E0B"/>
  <text x="209" y="451" text-anchor="middle" font-family="Arial Black" font-size="20" font-weight="900" fill="#FFFFFF">POST</text>
  <text x="260" y="451" font-family="monospace" font-size="20" fill="#FCD34D">/create</text>
  <!-- PUT item -->
  <rect x="170" y="484" width="160" height="52" rx="8" fill="#1E2A1A"/>
  <rect x="178" y="496" width="52" height="28" rx="6" fill="#3B82F6"/>
  <text x="204" y="515" text-anchor="middle" font-family="Arial Black" font-size="20" font-weight="900" fill="#FFFFFF">PUT</text>
  <text x="258" y="515" font-family="monospace" font-size="20" fill="#93C5FD">/update</text>
  <!-- DELETE item -->
  <rect x="170" y="548" width="160" height="52" rx="8" fill="#2A1E1E"/>
  <rect x="178" y="560" width="78" height="28" rx="6" fill="#EF4444"/>
  <text x="217" y="579" text-anchor="middle" font-family="Arial Black" font-size="18" font-weight="900" fill="#FFFFFF">DELETE</text>
  <!-- Main content area -->
  <rect x="356" y="268" width="490" height="64" rx="10" fill="#334155"/>
  <rect x="364" y="278" width="72" height="44" rx="8" fill="#22C55E"/>
  <text x="400" y="305" text-anchor="middle" font-family="Arial Black" font-size="26" font-weight="900" fill="#FFFFFF">GET</text>
  <text x="610" y="307" text-anchor="middle" font-family="monospace" font-size="26" fill="#94A3B8">https://api...</text>
  <!-- Response panel -->
  <rect x="356" y="352" width="490" height="360" rx="10" fill="#0F172A"/>
  <text x="380" y="388" font-family="monospace" font-size="24" fill="#22C55E">200 OK</text>
  <text x="380" y="424" font-family="monospace" font-size="22" fill="#67E8F9">{"status":</text>
  <text x="380" y="456" font-family="monospace" font-size="22" fill="#FDE68A">  "success",</text>
  <text x="380" y="488" font-family="monospace" font-size="22" fill="#67E8F9">"data": [...]</text>
  <text x="380" y="520" font-family="monospace" font-size="22" fill="#94A3B8">}</text>
</svg>
