<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#08082a"/>
    </linearGradient>
    <linearGradient id="crystal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="crystal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="crystal3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C7D2FE;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="crystalGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 수정 1 (좌) -->
  <polygon points="110,180 140,130 170,180 170,280 140,330 110,280" fill="url(#crystal1)" stroke="#A5B4FC" stroke-width="1.5" opacity="0.85" filter="url(#glow)"/>
  <polygon points="110,180 140,130 140,180 110,180" fill="white" opacity="0.15"/>
  <polygon points="140,130 170,180 140,180 140,130" fill="white" opacity="0.08"/>
  <!-- 수정 내 번호 -->
  <text x="140" y="240" text-anchor="middle" font-family="monospace" font-size="16" fill="#030508" font-weight="bold" opacity="0.8">01</text>
  <!-- 연결 화살표 1→2 -->
  <path d="M 175 256 L 200 256 M 193 248 L 200 256 L 193 264" stroke="#818CF8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 수정 2 (중) -->
  <polygon points="205,180 240,120 275,180 275,290 240,340 205,290" fill="url(#crystal2)" stroke="#818CF8" stroke-width="1.5" opacity="0.9" filter="url(#crystalGlow)"/>
  <polygon points="205,180 240,120 240,180 205,180" fill="white" opacity="0.2"/>
  <polygon points="240,120 275,180 240,180 240,120" fill="white" opacity="0.1"/>
  <text x="240" y="250" text-anchor="middle" font-family="monospace" font-size="16" fill="#030508" font-weight="bold" opacity="0.8">02</text>
  <!-- 연결 화살표 2→3 -->
  <path d="M 280 256 L 305 256 M 298 248 L 305 256 L 298 264" stroke="#818CF8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 수정 3 (우) -->
  <polygon points="310,185 345,130 380,185 380,285 345,330 310,285" fill="url(#crystal3)" stroke="#C7D2FE" stroke-width="1.5" opacity="0.85" filter="url(#glow)"/>
  <polygon points="310,185 345,130 345,185 310,185" fill="white" opacity="0.18"/>
  <polygon points="345,130 380,185 345,185 345,130" fill="white" opacity="0.09"/>
  <text x="345" y="244" text-anchor="middle" font-family="monospace" font-size="16" fill="#030508" font-weight="bold" opacity="0.8">03</text>
  <!-- ... 더 있음 -->
  <path d="M 385 256 L 415 256 M 406 248 L 413 256 L 406 264" stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <circle cx="425" cy="256" r="4" fill="#6366F1" opacity="0.5"/>
  <circle cx="440" cy="256" r="4" fill="#6366F1" opacity="0.4"/>
  <circle cx="455" cy="256" r="4" fill="#6366F1" opacity="0.3"/>
  <!-- 상단 파일명 라벨 -->
  <text x="140" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366F1" opacity="0.7">file_001</text>
  <text x="240" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#818CF8" opacity="0.8">file_002</text>
  <text x="345" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#A5B4FC" opacity="0.7">file_003</text>
  <!-- 하단 새 이름 라벨 -->
  <text x="140" y="358" text-anchor="middle" font-family="monospace" font-size="10" fill="#A5B4FC" opacity="0.9">report_001</text>
  <text x="240" y="368" text-anchor="middle" font-family="monospace" font-size="10" fill="#818CF8" opacity="0.9">report_002</text>
  <text x="345" y="358" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366F1" opacity="0.9">report_003</text>
  <!-- 빛 반사 -->
  <circle cx="240" cy="200" r="80" fill="#6366F1" opacity="0.04" filter="url(#crystalGlow)"/>
</svg>