<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="stencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="40%" stop-color="#555"/>
      <stop offset="40%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stencil/cutting tool -->
  <rect x="120" y="120" width="272" height="175" rx="12" fill="url(#stencilGrad)" opacity="0.8"/>
  <!-- Stencil cutout for badge shape -->
  <rect x="152" y="148" width="208" height="54" rx="27" fill="#1c1c1c"/>
  <!-- Badge on work surface -->
  <rect x="120" y="340" width="272" height="50" rx="16" fill="url(#resultGrad)" opacity="0.95"/>
  <rect x="130" y="353" width="90" height="12" rx="5" fill="white" opacity="0.6"/>
  <rect x="280" y="353" width="70" height="12" rx="5" fill="white" opacity="0.9"/>
  <!-- Arrow showing production -->
  <path d="M256 295 L256 335" stroke="#00bcd4" stroke-width="5" stroke-linecap="round" stroke-dasharray="10,5"/>
  <polygon points="246,333 256,352 266,333" fill="#00bcd4"/>
  <!-- Ink brush/roller tool -->
  <rect x="220" y="148" width="72" height="22" rx="11" fill="url(#inkGrad)" opacity="0.9"/>
  <rect x="248" y="170" width="16" height="40" rx="4" fill="#006064"/>
  <!-- Ink drip -->
  <ellipse cx="256" cy="214" rx="5" ry="8" fill="url(#inkGrad)" opacity="0.8"/>
</svg>