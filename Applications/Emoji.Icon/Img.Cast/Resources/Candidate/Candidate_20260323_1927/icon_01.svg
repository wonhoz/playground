<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg01)"/>
  <!-- SVG text box -->
  <rect x="95" y="370" width="260" height="150" rx="22" fill="none" stroke="white" stroke-width="18"/>
  <text x="225" y="465" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle">SVG</text>
  <!-- Arrow -->
