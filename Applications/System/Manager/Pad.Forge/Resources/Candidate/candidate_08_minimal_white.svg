<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clean floating notepad -->
  <rect x="115" y="95" width="250" height="310" rx="20" fill="#FFFFFF"/>
  <!-- Drop shadow hint -->
  <rect x="125" y="105" width="250" height="310" rx="20" fill="#000000" opacity="0.06"/>
  <rect x="115" y="95" width="250" height="310" rx="20" fill="#FFFFFF"/>
  <!-- Left accent bar -->
  <rect x="115" y="95" width="10" height="310" rx="5" fill="url(#accent)"/>
  <!-- Title area -->
  <rect x="125" y="95" width="240" height="56" rx="15" fill="url(#accent)" opacity="0.08"/>
  <text x="245" y="130" font-family="sans-serif" font-size="20" fill="#3B82F6" text-anchor="middle" font-weight="bold">Pad.Forge</text>
  <!-- Content lines - minimal -->
  <rect x="135" y="170" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="135" y="190" width="160" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="207" width="170" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="224" width="150" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="250" width="170" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="267" width="140" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="284" width="160" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="310" width="150" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="327" width="170" height="8" rx="4" fill="#EEF2F7"/>
  <rect x="135" y="344" width="130" height="8" rx="4" fill="#EEF2F7"/>
  <!-- Gradient cursor line indicator -->
  <rect x="135" y="170" width="180" height="10" rx="5" fill="url(#accent)" opacity="0.4"/>
  <!-- Small write action button -->
  <circle cx="350" cy="400" r="40" fill="url(#accent)"/>
  <text x="350" y="408" font-family="sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">✎</text>
</svg>
