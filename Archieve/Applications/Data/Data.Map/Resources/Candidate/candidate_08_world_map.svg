<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <radialGradient id="dot1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <radialGradient id="dot2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#008844"/>
    </radialGradient>
    <filter id="pulse">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe outline -->
  <ellipse cx="256" cy="240" rx="190" ry="160" fill="#001133" stroke="#1a4a7a" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="240" rx="190" ry="40" fill="none" stroke="#1a3a5a" stroke-width="1" opacity="0.5"/>
  <ellipse cx="256" cy="200" rx="170" ry="30" fill="none" stroke="#1a3a5a" stroke-width="1" opacity="0.5"/>
  <ellipse cx="256" cy="280" rx="170" ry="30" fill="none" stroke="#1a3a5a" stroke-width="1" opacity="0.5"/>
  <ellipse cx="256" cy="160" rx="130" ry="20" fill="none" stroke="#1a3a5a" stroke-width="1" opacity="0.4"/>
  <ellipse cx="256" cy="320" rx="130" ry="20" fill="none" stroke="#1a3a5a" stroke-width="1" opacity="0.4"/>
  <!-- Meridian lines -->
  <line x1="256" y1="80" x2="256" y2="400" stroke="#1a3a5a" stroke-width="1" opacity="0.5"/>
  <line x1="136" y1="100" x2="136" y2="380" stroke="#1a3a5a" stroke-width="0.8" opacity="0.4"/>
  <line x1="376" y1="100" x2="376" y2="380" stroke="#1a3a5a" stroke-width="0.8" opacity="0.4"/>
  <line x1="96" y1="180" x2="96" y2="300" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <line x1="416" y1="180" x2="416" y2="300" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <!-- Land masses (simplified) -->
  <path d="M140,190 Q160,170 200,175 Q220,185 230,200 Q220,220 200,215 Q170,210 150,220 Q140,210 140,190Z" fill="#1a5a2a" opacity="0.6"/>
  <path d="M240,165 Q270,155 300,162 Q320,175 315,195 Q300,210 275,205 Q255,195 240,180 Z" fill="#1a5a2a" opacity="0.5"/>
  <path d="M310,200 Q340,190 365,200 Q375,215 370,235 Q355,250 330,245 Q310,235 305,220Z" fill="#1a5a2a" opacity="0.5"/>
  <path d="M155,255 Q175,245 210,252 Q225,265 220,285 Q205,295 185,290 Q160,280 155,265Z" fill="#1a5a2a" opacity="0.4"/>
  <path d="M260,255 Q285,248 310,258 Q322,270 315,285 Q300,295 278,290 Q260,278 260,265Z" fill="#1a5a2a" opacity="0.5"/>
  <path d="M355,250 Q375,242 395,252 Q405,265 398,278 Q385,285 365,280 Q348,268 355,250Z" fill="#1a5a2a" opacity="0.4"/>
  <!-- Data points on globe -->
  <circle cx="175" cy="200" r="10" fill="url(#dot1)" filter="url(#pulse)"/>
  <circle cx="280" cy="175" r="14" fill="url(#dot1)" filter="url(#pulse)"/>
  <circle cx="345" cy="220" r="8" fill="url(#dot2)" filter="url(#pulse)"/>
  <circle cx="200" cy="265" r="11" fill="url(#dot2)" filter="url(#pulse)"/>
  <circle cx="290" cy="268" r="9" fill="url(#dot1)" filter="url(#pulse)"/>
  <circle cx="375" cy="260" r="7" fill="url(#dot2)" filter="url(#pulse)"/>
  <!-- Connection arcs between points -->
  <path d="M175,200 Q228,140 280,175" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <path d="M280,175 Q312,197 345,220" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <path d="M200,265 Q245,250 290,268" fill="none" stroke="#44ff88" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <!-- Title -->
  <text x="256" y="430" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#4a9eff" text-anchor="middle" letter-spacing="2">DATA MAP</text>
  <text x="256" y="458" font-family="Arial, sans-serif" font-size="13" fill="#1a5a8a" text-anchor="middle">Global Data View</text>
  <!-- Stats bar -->
  <rect x="80" y="468" width="352" height="22" rx="4" fill="#001122"/>
  <rect x="82" y="470" width="176" height="18" rx="3" fill="#1a4a7a" opacity="0.6"/>
  <text x="256" y="484" font-family="Arial, sans-serif" font-size="11" fill="#4a9eff" text-anchor="middle">50% Coverage</text>
</svg>
