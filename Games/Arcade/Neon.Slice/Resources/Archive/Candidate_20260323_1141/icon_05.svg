<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#001A0A"/>
  <!-- Layer 2: 네온 그리드 + 슬라이스 -->
  <!-- 수평 네온 격자선 -->
  <line x1="120" y1="280" x2="904" y2="280" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="380" x2="904" y2="380" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="480" x2="904" y2="480" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="580" x2="904" y2="580" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="680" x2="904" y2="680" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <!-- 수직 네온 격자선 -->
  <line x1="280" y1="180" x2="280" y2="840" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="430" y1="180" x2="430" y2="840" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="580" y1="180" x2="580" y2="840" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <line x1="730" y1="180" x2="730" y2="840" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <!-- 슬라이스 라인 (밝게 빛나는) -->
  <line x1="120" y1="760" x2="904" y2="240" stroke="#00FF41" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="760" x2="904" y2="240" stroke="#00FF41" stroke-width="40" stroke-linecap="round" opacity="0.25"/>
  <!-- 슬라이스된 네온 오브젝트들 (마름모) -->
  <polygon points="355,480 430,330 505,480 430,630" fill="#00FF41" opacity="0.7"/>
  <polygon points="655,380 730,230 805,380 730,530" fill="#00FF88" opacity="0.65"/>
  <!-- 잘린 오브젝트들 (아래쪽) -->
  <polygon points="205,580 280,430 355,580 280,730" fill="#007A1F" opacity="0.6"/>
  <!-- Layer 3: 점수판 -->
  <rect x="160" y="820" width="704" height="80" rx="10" fill="#003300"/>
  <text x="512" y="877" font-family="Consolas,monospace" font-size="52" fill="#00FF41" text-anchor="middle" font-weight="bold">NEON SLICE</text>
</svg>
