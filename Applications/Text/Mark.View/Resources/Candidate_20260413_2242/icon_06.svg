<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#BF360C" stroke-width="16"/>
  <!-- Document body (slightly rotated for dynamism) -->
  <g transform="rotate(-6 512 410)">
    <rect x="220" y="185" width="408" height="460" rx="24" fill="#FFF3E0" stroke="#BF360C" stroke-width="14"/>
    <!-- Document content lines -->
    <text x="262" y="286" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FF6B35">#</text>
    <rect x="346" y="252" width="228" height="20" rx="10" fill="#FF8A65" opacity="0.7"/>
    <rect x="262" y="312" width="310" height="16" rx="8" fill="#FFAB91" opacity="0.6"/>
    <rect x="262" y="346" width="270" height="16" rx="8" fill="#FFAB91" opacity="0.5"/>
    <rect x="262" y="380" width="290" height="16" rx="8" fill="#FFAB91" opacity="0.4"/>
    <!-- Code block inside doc -->
    <rect x="262" y="414" width="320" height="60" rx="10" fill="#FBE9E7" stroke="#FF6B35" stroke-width="8"/>
    <text x="278" y="456" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#BF360C">```code```</text>
  </g>
  <!-- Hash badge (overlapping, forward) -->
  <rect x="598" y="266" width="192" height="192" rx="48" fill="#FF6B35" stroke="#BF360C" stroke-width="16"/>
  <text x="694" y="400" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="#FFFFFF" text-anchor="middle">#</text>
