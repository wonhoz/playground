<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#DC2626"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Heart shape outline -->
    <path d="M512 800 C512 800 160 580 160 350 C160 230 250 150 340 150 C400 150 460 185 512 230 C564 185 624 150 684 150 C774 150 864 230 864 350 C864 580 512 800 512 800 Z"
          fill="none" stroke="#FDE68A" stroke-width="22"/>
    <!-- Fill heart with ASCII chars -->
    <!-- Row by row inside heart -->
    <text x="512" y="310" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@@@  @@@</text>
    <text x="512" y="350" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@@@@@@@@@@@@</text>
    <text x="512" y="390" font-size="28" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">############</text>
    <text x="512" y="430" font-size="28" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">$$$$$$$$$$$$</text>
    <text x="512" y="470" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@@@@@@@@@@@@</text>
    <text x="512" y="510" font-size="28" font-weight="bold" font-family="monospace" fill="#FDE68A" text-anchor="middle">%%%%%%%%%%</text>
    <text x="512" y="550" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@@@@@@@@</text>
    <text x="512" y="590" font-size="28" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">######</text>
    <text x="512" y="630" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@@@@</text>
    <text x="512" y="670" font-size="28" font-weight="bold" font-family="monospace" fill="#FDE68A" text-anchor="middle">##</text>
    <text x="512" y="710" font-size="28" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">@</text>
    <!-- Heart outline chars -->
    <text x="512" y="165" font-size="44" font-weight="bold" font-family="system-ui" fill="#FDE68A" text-anchor="middle">HEART</text>
    <text x="512" y="880" font-size="38" font-weight="bold" font-family="monospace" fill="#FDE68A" text-anchor="middle">@#$%&amp;*+-=.</text>
  </g>
</svg>
