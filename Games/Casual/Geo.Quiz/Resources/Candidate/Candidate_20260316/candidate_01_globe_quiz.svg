<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <linearGradient id="landGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe sphere -->
  <circle cx="220" cy="240" r="155" fill="url(#globeGrad)"/>
  <!-- Globe highlight -->
  <circle cx="175" cy="185" r="45" fill="white" opacity="0.1"/>
  <!-- Latitude lines -->
  <ellipse cx="220" cy="240" rx="155" ry="30" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <ellipse cx="220" cy="185" rx="140" ry="22" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <ellipse cx="220" cy="295" rx="140" ry="22" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <!-- Longitude lines -->
  <ellipse cx="220" cy="240" rx="40" ry="155" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <ellipse cx="220" cy="240" rx="80" ry="155" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  <ellipse cx="220" cy="240" rx="120" ry="155" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- Land masses (simplified) -->
  <ellipse cx="200" cy="210" rx="45" ry="30" fill="url(#landGrad)" opacity="0.9"/>
  <ellipse cx="255" cy="225" rx="30" ry="20" fill="url(#landGrad)" opacity="0.8"/>
  <ellipse cx="185" cy="270" rx="25" ry="18" fill="url(#landGrad)" opacity="0.85"/>
  <ellipse cx="240" cy="278" rx="20" ry="15" fill="url(#landGrad)" opacity="0.7"/>
  <ellipse cx="165" cy="240" rx="18" ry="12" fill="url(#landGrad)" opacity="0.75"/>
  <!-- Globe outline -->
  <circle cx="220" cy="240" r="155" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Question mark badge -->
  <circle cx="370" cy="150" r="55" fill="#f57f17"/>
  <circle cx="370" cy="150" r="48" fill="#ff8f00"/>
  <text x="370" y="168" font-family="Arial" font-size="52" font-weight="900" fill="white" text-anchor="middle">?</text>
  <!-- Location pin -->
  <path d="M350,350 Q330,310 330,290 A20,20 0 0,1 370,290 Q370,310 350,350 Z" fill="#ff1744"/>
  <circle cx="350" cy="290" r="10" fill="white"/>
  <!-- Stars decoration -->
  <circle cx="420" cy="300" r="4" fill="#ffee58" opacity="0.8"/>
  <circle cx="440" cy="350" r="3" fill="#ffee58" opacity="0.6"/>
  <circle cx="410" cy="380" r="5" fill="#ffee58" opacity="0.7"/>
  <!-- Title -->
  <text x="256" y="465" font-family="Arial" font-size="36" font-weight="900" fill="#ffee58" text-anchor="middle">GEO.QUIZ</text>
</svg>
