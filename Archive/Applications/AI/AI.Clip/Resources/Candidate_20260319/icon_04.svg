  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="#0A1628"/>
  <!-- Clipboard body -->
  <rect x="260" y="200" width="420" height="540" rx="28" fill="#0D2137" stroke="#00BCD4" stroke-width="24"/>
