<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2e1f00"/>
    </linearGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar chart axes -->
  <line x1="256" y1="256" x2="256" y2="80"  stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="420" y2="360" stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="348" y2="432" stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="164" y2="432" stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="92"  y2="360" stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="90"  y2="152" stroke="#f9a825" stroke-width="1.5" opacity="0.5"/>
  <!-- Radar grid rings -->
  <polygon points="256,168 342,224 342,288 256,344 170,288 170,224" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.3"/>
  <polygon points="256,124 380,198 380,314 256,388 132,314 132,198" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.2"/>
  <!-- Skill radar fill -->
  <polygon points="256,110 395,195 365,385 210,420 110,340 112,155" fill="#f9a825" opacity="0.22" stroke="#ffd600" stroke-width="2.5"/>
  <!-- Axis labels -->
  <text x="256" y="72" font-family="sans-serif" font-size="14" fill="#ffd600" text-anchor="middle">Frontend</text>
  <text x="436" y="368" font-family="sans-serif" font-size="14" fill="#ffd600">Backend</text>
  <text x="350" y="448" font-family="sans-serif" font-size="14" fill="#ffd600">DevOps</text>
  <text x="100" y="448" font-family="sans-serif" font-size="14" fill="#ffd600" text-anchor="end">Cloud</text>
  <text x="68" y="368" font-family="sans-serif" font-size="14" fill="#ffd600" text-anchor="end">DB</text>
  <text x="76" y="152" font-family="sans-serif" font-size="14" fill="#ffd600" text-anchor="end">Mobile</text>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="7" fill="#ffd600"/>
</svg>
