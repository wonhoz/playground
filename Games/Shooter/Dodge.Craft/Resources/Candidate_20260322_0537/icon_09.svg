<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09: Metaphor / 기하학 추상 / 방패+망치 합성 심볼 (Dodge+Craft) -->
  <!-- 배경: 바이올렛-그레이 -->
  <rect width="1024" height="1024" rx="160" fill="#160D22"/>

  <!-- 방사형 배경 광 -->
  <radialGradient id="g09shield" cx="50%" cy="45%" r="45%">
    <stop offset="0%" stop-color="#4A0080" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#160D22" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="160" fill="url(#g09shield)"/>

  <!-- 방패 형태 (Dodge 심볼) -->
  <path d="M512 220 L750 310 L750 560 Q750 700 512 800 Q274 700 274 560 L274 310 Z"
        fill="#1A0040" stroke="#8B00FF" stroke-width="6"/>
  <!-- 방패 내부 패턴 -->
  <path d="M512 270 L700 342 L700 555 Q700 660 512 745 Q324 660 324 555 L324 342 Z"
        fill="#250060" stroke="#9B30FF" stroke-width="3" opacity="0.7"/>

  <!-- 방패 내 탄막 회피 화살표 (굽은 화살표) -->
  <path d="M430 500 Q420 450 470 420 Q520 390 560 430 Q600 470 580 520"
        stroke="#FF6EB4" stroke-width="12" fill="none" stroke-linecap="round"/>
  <polygon points="580,520 558,500 602,498" fill="#FF6EB4"/>

  <!-- 방패 내 건설 블록 (우상단) -->
  <rect x="570" y="340" width="50" height="50" rx="7" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="570" y="394" width="50" height="50" rx="7" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>

  <!-- 망치 (Craft 심볼, 방패 위에 겹침) -->
  <g transform="translate(512, 510) rotate(-30)">
    <!-- 손잡이 -->
    <rect x="-10" y="-20" width="20" height="160" rx="10" fill="#C8A45A" stroke="#A08040" stroke-width="2"/>
    <!-- 헤드 -->
    <rect x="-38" y="-95" width="76" height="55" rx="12" fill="#8B6914" stroke="#C8A45A" stroke-width="3"/>
    <!-- 헤드 광택 -->
    <rect x="-30" y="-88" width="18" height="40" rx="5" fill="#D4AF50" opacity="0.4"/>
    <!-- 충격 이펙트 -->
    <g stroke="#FFD700" stroke-width="3" fill="none" opacity="0.7">
      <line x1="-50" y1="-110" x2="-62" y2="-122"/>
      <line x1="-60" y1="-80" x2="-75" y2="-80"/>
      <line x1="-50" y1="-55" x2="-62" y2="-43"/>
      <line x1="50" y1="-110" x2="62" y2="-122"/>
      <line x1="60" y1="-80" x2="75" y2="-80"/>
    </g>
  </g>

  <!-- 방패 테두리 장식 (Wave indicator) -->
  <path d="M512 220 L750 310 L750 560 Q750 700 512 800 Q274 700 274 560 L274 310 Z"
        fill="none" stroke="#9B30FF" stroke-width="2" stroke-dasharray="14,7" opacity="0.4"/>

  <!-- 방패 상단 왕관 장식 -->
  <polygon points="512,195 525,220 540,205 553,228 568,210 575,235 512,235 449,235 456,210 471,228 484,205 499,220" fill="#8B00FF" opacity="0.8"/>

  <!-- 탄막들 (방패에 튕기는 느낌) -->
  <circle cx="270" cy="450" r="13" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <path d="M255 440 L268 448" stroke="#FF3333" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.6"/>
  <circle cx="275" cy="530" r="11" fill="#FF4444" stroke="#FF7777" stroke-width="2.5"/>
  <circle cx="755" cy="460" r="13" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <path d="M770 450 L757 458" stroke="#FF3333" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 자원 (방패 아래 드랍) -->
  <polygon points="512,830 530,855 512,880 494,855" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>

  <!-- Lives 표시 (상단) -->
  <g opacity="0.85">
    <circle cx="430" cy="168" r="12" fill="#FF6EB4"/>
    <circle cx="460" cy="168" r="12" fill="#FF6EB4"/>
    <circle cx="490" cy="168" r="12" fill="#FF6EB4"/>
  </g>
</svg>
