<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0000"/>
  <!-- Clock face -->
  <circle cx="512" cy="480" r="280" fill="none" stroke="#C62828" stroke-width="30"/>
  <circle cx="512" cy="480" r="270" fill="#C62828" fill-opacity="0.08"/>
  <!-- Clock ticks -->
  <line x1="512" y1="210" x2="512" y2="250" stroke="#EF9A9A" stroke-width="18"/>
  <line x1="512" y1="710" x2="512" y2="750" stroke="#EF9A9A" stroke-width="18"/>
  <line x1="242" y1="480" x2="282" y2="480" stroke="#EF9A9A" stroke-width="18"/>
  <line x1="742" y1="480" x2="782" y2="480" stroke="#EF9A9A" stroke-width="18"/>
  <!-- Clock hands - urgent position -->
  <line x1="512" y1="480" x2="512" y2="290" stroke="#EF9A9A" stroke-width="22" stroke-linecap="round"/>
  <line x1="512" y1="480" x2="660" y2="430" stroke="#C62828" stroke-width="28" stroke-linecap="round"/>
  <circle cx="512" cy="480" r="20" fill="#C62828"/>
  <!-- Snap hand -->
  <path d="M350 680 Q380 640 420 660 Q440 620 470 650" fill="none" stroke="#EF9A9A" stroke-width="22" stroke-linecap="round"/>
  <!-- Spark at snap -->
  <circle cx="470" cy="650" r="12" fill="#EF9A9A"/>
  <line x1="490" y1="630" x2="520" y2="610" stroke="#EF9A9A" stroke-width="10"/>
  <line x1="500" y1="650" x2="535" y2="645" stroke="#EF9A9A" stroke-width="10"/>
</svg>