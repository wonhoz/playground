<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Speed lines (manga effect) -->
  <g stroke="white" stroke-width="1.5" opacity="0.2">
    <line x1="256" y1="256" x2="0" y2="0"/>
    <line x1="256" y1="256" x2="128" y2="0"/>
    <line x1="256" y1="256" x2="256" y2="0"/>
    <line x1="256" y1="256" x2="384" y2="0"/>
    <line x1="256" y1="256" x2="512" y2="0"/>
    <line x1="256" y1="256" x2="512" y2="128"/>
    <line x1="256" y1="256" x2="512" y2="256"/>
    <line x1="256" y1="256" x2="512" y2="384"/>
    <line x1="256" y1="256" x2="512" y2="512"/>
    <line x1="256" y1="256" x2="384" y2="512"/>
    <line x1="256" y1="256" x2="256" y2="512"/>
    <line x1="256" y1="256" x2="128" y2="512"/>
    <line x1="256" y1="256" x2="0" y2="512"/>
    <line x1="256" y1="256" x2="0" y2="384"/>
    <line x1="256" y1="256" x2="0" y2="256"/>
    <line x1="256" y1="256" x2="0" y2="128"/>
  </g>
  <!-- Ink pen nib -->
  <polygon points="256,100 300,220 256,200 212,220" fill="white"/>
  <polygon points="256,200 280,280 256,270 232,280" fill="#CCCCCC"/>
  <!-- Pen body -->
  <rect x="240" y="270" width="32" height="120" rx="6" fill="#888888"/>
  <!-- Ink drop -->
  <ellipse cx="256" cy="420" rx="18" ry="24" fill="white"/>
  <ellipse cx="256" cy="408" rx="8" ry="6" fill="white"/>
  <!-- Comic panel borders -->
  <rect x="60" y="60" width="160" height="110" rx="8" fill="none" stroke="white" stroke-width="4"/>
  <rect x="240" y="60" width="212" height="110" rx="8" fill="none" stroke="white" stroke-width="4"/>
  <rect x="60" y="190" width="392" height="40" rx="8" fill="none" stroke="white" stroke-width="3"/>
  <!-- Stars -->
  <text x="78" y="125" font-size="36" fill="white" opacity="0.8">★</text>
  <text x="260" y="125" font-size="36" fill="white" opacity="0.8">✦</text>
</svg>
