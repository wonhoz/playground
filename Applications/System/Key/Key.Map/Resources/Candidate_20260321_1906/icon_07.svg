<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: 수식키(Ctrl+Shift+Alt)가 왕좌에 (metaphor) | 실루엣/캐릭터 | 골드+다크 -->
  <!-- Layer 1: 배경 - 짙은 네이비 -->
  <defs>
    <linearGradient id="bg07k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0F0F28"/>
    </linearGradient>
    <linearGradient id="gold07" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="glow07" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07k)"/>

  <!-- 왕관 글로우 -->
  <circle cx="512" cy="330" r="280" fill="url(#glow07)"/>

  <!-- Layer 2: 왕관 실루엣 (수식키들이 왕의 자리) -->
  <!-- 왕관 몸체 -->
  <path d="M200 480 L200 380 L310 460 L400 250 L512 400 L624 250 L714 460 L824 380 L824 480 Z"
        fill="url(#gold07)" stroke="#92400E" stroke-width="3" stroke-linejoin="round"/>
  <!-- 왕관 바닥 테두리 -->
  <rect x="190" y="478" width="644" height="50" rx="10" fill="#B45309" stroke="#92400E" stroke-width="2"/>
  <!-- 왕관 바닥 보석들 -->
  <circle cx="300" cy="503" r="12" fill="#3B82F6"/>
  <circle cx="420" cy="503" r="14" fill="#8B5CF6"/>
  <circle cx="512" cy="503" r="16" fill="#06B6D4"/>
  <circle cx="604" cy="503" r="14" fill="#10B981"/>
  <circle cx="724" cy="503" r="12" fill="#3B82F6"/>

  <!-- 왕관 꼭대기 보석들 (3개 뾰족한 끝) -->
  <circle cx="400" cy="255" r="22" fill="#EC4899" stroke="#F9A8D4" stroke-width="2"/>
  <circle cx="512" cy="175" r="28" fill="#F59E0B" stroke="#FDE68A" stroke-width="2"/>
  <circle cx="624" cy="255" r="22" fill="#EC4899" stroke="#F9A8D4" stroke-width="2"/>

  <!-- Layer 2: 수식키 3개 (왕관 아래) -->
  <!-- Ctrl -->
  <rect x="185" y="555" width="180" height="70" rx="12" fill="#1E1E35" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="275" y="597" text-anchor="middle" font-family="Segoe UI,Arial" font-size="28" font-weight="bold" fill="#3B82F6">Ctrl</text>

  <!-- Shift -->
  <rect x="420" y="555" width="184" height="70" rx="12" fill="#1E1E35" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="512" y="597" text-anchor="middle" font-family="Segoe UI,Arial" font-size="28" font-weight="bold" fill="#8B5CF6">Shift</text>

  <!-- Alt -->
  <rect x="659" y="555" width="180" height="70" rx="12" fill="#1E1E35" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="749" y="597" text-anchor="middle" font-family="Segoe UI,Arial" font-size="28" font-weight="bold" fill="#F59E0B">Alt</text>

  <!-- + 기호들 -->
  <text x="400" y="600" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="#444466">+</text>
  <text x="638" y="600" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="#444466">+</text>

  <!-- Layer 3: 하단 단축키 조합 예시 -->
  <rect x="240" y="665" width="544" height="48" rx="10" fill="#1A1A30" stroke="#2A2A50" stroke-width="1.5"/>
  <text x="512" y="695" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#6B7280">Ctrl + Shift + P</text>

  <!-- 빛 반짝임 효과 (보석에서) -->
  <line x1="512" y1="155" x2="492" y2="140" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="155" x2="532" y2="140" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="155" x2="512" y2="135" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="400" y1="238" x2="386" y2="224" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="624" y1="238" x2="638" y2="224" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- 하단 앱 이름 -->
  <text x="512" y="800" text-anchor="middle" font-family="Segoe UI,Arial" font-size="30" font-weight="bold" fill="#2A2040" letter-spacing="2">Key.Map</text>
</svg>
