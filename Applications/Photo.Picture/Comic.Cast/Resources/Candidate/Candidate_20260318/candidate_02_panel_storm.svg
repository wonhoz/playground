<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 만화 패널 레이아웃 -->
  <rect x="80" y="90" width="160" height="140" rx="4" fill="#FB923C" opacity="0.1"/>
  <rect x="80" y="90" width="160" height="140" rx="4" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <rect x="252" y="90" width="180" height="140" rx="4" fill="#FDBA74" opacity="0.08"/>
  <rect x="252" y="90" width="180" height="140" rx="4" fill="none" stroke="#FDBA74" stroke-width="3"/>
  <rect x="80" y="242" width="352" height="100" rx="4" fill="#FB923C" opacity="0.07"/>
  <rect x="80" y="242" width="352" height="100" rx="4" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <rect x="80" y="354" width="160" height="100" rx="4" fill="#FDBA74" opacity="0.08"/>
  <rect x="80" y="354" width="160" height="100" rx="4" fill="none" stroke="#FDBA74" stroke-width="2.5"/>
  <rect x="252" y="354" width="180" height="100" rx="4" fill="#FB923C" opacity="0.1"/>
  <rect x="252" y="354" width="180" height="100" rx="4" fill="none" stroke="#FB923C" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 패널 내용 (간단한 만화 요소들) -->
  <!-- 패널 1: 번개 -->
  <path d="M 150 120 L 135 155 L 155 155 L 135 180" stroke="#FB923C" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- 패널 2: 별 -->
  <polygon points="342,115 352,140 378,140 358,155 366,180 342,165 318,180 326,155 306,140 332,140" fill="#FDBA74" opacity="0.5"/>
  <!-- 패널 3: 말풍선 -->
  <rect x="165" y="257" width="120" height="50" rx="15" fill="#FB923C" opacity="0.2"/>
  <text x="225" y="287" text-anchor="middle" fill="#FDBA74" font-size="12" font-family="sans-serif" font-weight="bold">COMIC!</text>
  <!-- 패널 4/5: 점들 (하프톤) -->
  <circle cx="150" cy="395" r="6" fill="#FB923C" opacity="0.5"/>
  <circle cx="175" cy="395" r="5" fill="#FDBA74" opacity="0.4"/>
  <circle cx="200" cy="395" r="7" fill="#FB923C" opacity="0.5"/>
  <circle cx="160" cy="420" r="5" fill="#FDBA74" opacity="0.4"/>
  <circle cx="185" cy="420" r="4" fill="#FB923C" opacity="0.3"/>
</svg>