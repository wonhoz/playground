<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#040d0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 별점 기반 사진 정리 -->
  <!-- 5성급 사진 (메인) -->
  <rect x="130" y="80" width="252" height="180" rx="10" fill="#0a2018" stroke="#34D399" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <!-- 풍경 사진 내용 -->
  <rect x="130" y="80" width="252" height="130" rx="10" fill="#0d2a1a" opacity="0.8"/>
  <path d="M130,180 Q175,140 210,170 Q240,195 270,165 Q300,140 382,190" fill="#1a4028" opacity="0.7"/>
  <path d="M130,200 Q185,165 225,190 Q265,215 330,185 Q365,168 382,210" fill="#1a4a30" opacity="0.6"/>
  <circle cx="190" cy="120" r="28" fill="#FDE047" opacity="0.15"/>
  <circle cx="193" cy="118" r="20" fill="#FDE047" opacity="0.1"/>
  <!-- 별점 표시 -->
  <rect x="130" y="210" width="252" height="50" rx="0" fill="#061510" opacity="0.9"/>
  <!-- 5개 별 (채워진) -->
  <text x="174" y="242" text-anchor="middle" font-size="26" fill="#FDE047" filter="url(#glow)" opacity="0.95">★</text>
  <text x="214" y="242" text-anchor="middle" font-size="26" fill="#FDE047" filter="url(#glow)" opacity="0.95">★</text>
  <text x="254" y="242" text-anchor="middle" font-size="26" fill="#FDE047" filter="url(#glow)" opacity="0.95">★</text>
  <text x="294" y="242" text-anchor="middle" font-size="26" fill="#FDE047" filter="url(#glow)" opacity="0.95">★</text>
  <text x="334" y="242" text-anchor="middle" font-size="26" fill="#FDE047" filter="url(#glow)" opacity="0.95">★</text>
  <!-- 등급별 섹션들 -->
  <!-- 5성 -->
  <rect x="60" y="300" width="392" height="36" rx="6" fill="#0a2018" stroke="#34D399" stroke-width="1.5" opacity="0.9"/>
  <text x="80" y="323" font-size="16" fill="#FDE047" opacity="0.95">★★★★★</text>
  <rect x="230" y="308" width="150" height="20" rx="4" fill="#34D399" opacity="0.4" filter="url(#glow)"/>
  <text x="440" y="323" text-anchor="end" font-size="11" fill="#34D399" opacity="0.9">48 photos</text>
  <!-- 4성 -->
  <rect x="60" y="342" width="392" height="32" rx="6" fill="#0a1a10" stroke="#10B981" stroke-width="1" opacity="0.8"/>
  <text x="80" y="363" font-size="14" fill="#FDE047" opacity="0.7">★★★★☆</text>
  <rect x="230" y="350" width="110" height="16" rx="4" fill="#10B981" opacity="0.3"/>
  <text x="440" y="363" text-anchor="end" font-size="11" fill="#10B981" opacity="0.8">87 photos</text>
  <!-- 3성 -->
  <rect x="60" y="380" width="392" height="28" rx="6" fill="#061510" stroke="#065f46" stroke-width="1" opacity="0.7"/>
  <text x="80" y="399" font-size="12" fill="#FDE047" opacity="0.5">★★★☆☆</text>
  <rect x="230" y="386" width="80" height="14" rx="4" fill="#065f46" opacity="0.4"/>
  <text x="440" y="399" text-anchor="end" font-size="11" fill="#6EE7B7" opacity="0.7">124 photos</text>
  <!-- 2성 -->
  <rect x="60" y="414" width="392" height="24" rx="6" fill="#040e08" stroke="#1a3a20" stroke-width="1" opacity="0.6"/>
  <text x="80" y="431" font-size="11" fill="#FDE047" opacity="0.35">★★☆☆☆</text>
  <rect x="230" y="419" width="50" height="12" rx="3" fill="#1a3a20" opacity="0.5"/>
  <text x="440" y="431" text-anchor="end" font-size="10" fill="#6EE7B7" opacity="0.5">56 photos</text>
  <!-- 하단 -->
  <rect x="80" y="446" width="352" height="36" rx="8" fill="#061510" stroke="#34D399" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="469" text-anchor="middle" font-size="13" font-weight="bold" fill="#34D399" filter="url(#glow)" opacity="0.9">STAR RATING ORGANIZER</text>
</svg>
