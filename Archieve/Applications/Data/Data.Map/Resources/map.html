<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Data.Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0F0F1E; }
#map { width:100%; height:100%; }

/* Leaflet 다크 커스터마이즈 */
.leaflet-container { background:#1A1A2E; font-family:'Segoe UI',sans-serif; }
.leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.8); }
.leaflet-control-zoom { border:1px solid #444466 !important; background:#1A1A30 !important; }
.leaflet-control-zoom a { background:#1A1A30 !important; color:#E0E0E0 !important; border-color:#444466 !important; }
.leaflet-control-zoom a:hover { background:#252538 !important; }
.leaflet-control-attribution { background:#14142A !important; color:#666688 !important; }
.leaflet-control-attribution a { color:#50C8DC !important; }
.leaflet-popup-content-wrapper { background:#1A1A30 !important; color:#E0E0E0 !important; border:1px solid #444466; }
.leaflet-popup-tip { background:#1A1A30 !important; }

/* 범례 */
#legend {
  position:absolute; bottom:30px; right:10px; z-index:1000;
  background:#14142A; border:1px solid #333355;
  border-radius:6px; padding:10px 14px; min-width:160px;
  font-size:11px; color:#888888; display:none;
}
#legend h4 { color:#50C8DC; margin-bottom:6px; font-size:12px; }
#legend-items { }
.legend-item { display:flex; align-items:center; gap:8px; margin:3px 0; }
.legend-color { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

/* 클러스터 스타일 */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background:#252538 !important;
  border-color:#50C8DC !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background:#1A3A4A !important;
  color:#50C8DC !important;
}

/* 툴팁 */
.custom-tooltip {
  background:#1A1A30 !important;
  border:1px solid #444466 !important;
  color:#E0E0E0 !important;
  font-size:11px !important;
}

#loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#666688; font-size:14px; font-family:'Segoe UI',sans-serif;
  z-index:2000; display:none;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <h4 id="legend-title">범례</h4>
  <div id="legend-items"></div>
</div>
<div id="loading">🗺 데이터 렌더링 중...</div>

<script>
const map = L.map('map', {
  center: [36.5, 127.5],
  zoom: 7,
  zoomControl: true
});

// OSM 타일 (다크 필터 CSS로 처리)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

let currentLayer = null;
let heatLayer = null;
const PALETTES = [
  '#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6',
  '#1ABC9C','#E67E22','#E91E63','#00BCD4','#8BC34A'
];

// 외부에서 호출: GeoJSON/TopoJSON 렌더링
window.renderGeoJson = function(geojsonStr, options) {
  if (currentLayer) map.removeLayer(currentLayer);
  showLoading(true);
  try {
    const data = JSON.parse(geojsonStr);
    const opts = options || {};
    const colorField = opts.colorField || '';
    const valueField = opts.valueField || '';

    // 값 범위 계산
    let values = [];
    if (valueField) {
      (data.features || []).forEach(f => {
        const v = f.properties?.[valueField];
        if (typeof v === 'number') values.push(v);
      });
    }
    const minVal = values.length ? Math.min(...values) : 0;
    const maxVal = values.length ? Math.max(...values) : 1;

    // 유니크 카테고리
    const categories = new Set();
    if (colorField) {
      (data.features || []).forEach(f => {
        const v = f.properties?.[colorField];
        if (v != null) categories.add(String(v));
      });
    }
    const catArray = [...categories].slice(0, 10);
    const catColorMap = {};
    catArray.forEach((c, i) => catColorMap[c] = PALETTES[i % PALETTES.length]);

    currentLayer = L.geoJSON(data, {
      style: (feature) => {
        let color = '#50C8DC';
        if (colorField && feature.properties?.[colorField] != null) {
          color = catColorMap[String(feature.properties[colorField])] || '#50C8DC';
        } else if (valueField && feature.properties?.[valueField] != null) {
          const v = feature.properties[valueField];
          const ratio = maxVal > minVal ? (v - minVal) / (maxVal - minVal) : 0.5;
          color = interpolateColor('#1A3A6A', '#E74C3C', ratio);
        }
        return {
          color: color, weight: 1.5, fillColor: color, fillOpacity: 0.5
        };
      },
      pointToLayer: (feature, latlng) => {
        let color = '#50C8DC';
        if (colorField && feature.properties?.[colorField] != null) {
          color = catColorMap[String(feature.properties[colorField])] || '#50C8DC';
        }
        return L.circleMarker(latlng, {
          radius: 6, fillColor: color, color: '#222244',
          weight: 1, fillOpacity: 0.85
        });
      },
      onEachFeature: (feature, layer) => {
        if (!feature.properties) return;
        const props = feature.properties;
        const rows = Object.entries(props).slice(0, 8)
          .map(([k, v]) => `<tr><td style="color:#7777AA;padding:2px 6px">${k}</td><td style="padding:2px 6px">${v ?? ''}</td></tr>`)
          .join('');
        layer.bindPopup(`<table style="font-size:11px">${rows}</table>`, { maxWidth: 280 });

        const label = props.name || props.NAME || props.title || props.id || '';
        if (label) layer.bindTooltip(String(label), { className:'custom-tooltip', sticky:true });
      }
    }).addTo(map);

    map.fitBounds(currentLayer.getBounds().pad(0.05));

    // 범례 업데이트
    updateLegend(catArray, catColorMap, opts.legendTitle || '범례');

    showLoading(false);
    return { ok: true, featureCount: (data.features || []).length };
  } catch (e) {
    showLoading(false);
    return { ok: false, error: e.message };
  }
};

// CSV 점 렌더링 (lat, lng 컬럼 필수)
window.renderCsvPoints = function(pointsJson, options) {
  if (currentLayer) map.removeLayer(currentLayer);
  showLoading(true);
  try {
    const points = JSON.parse(pointsJson);
    const opts = options || {};
    const colorField = opts.colorField || '';
    const sizeField = opts.sizeField || '';

    const categories = new Set();
    if (colorField) points.forEach(p => { if (p[colorField] != null) categories.add(String(p[colorField])); });
    const catArray = [...categories].slice(0, 10);
    const catColorMap = {};
    catArray.forEach((c, i) => catColorMap[c] = PALETTES[i % PALETTES.length]);

    const sizes = sizeField ? points.map(p => parseFloat(p[sizeField]) || 0).filter(v => !isNaN(v)) : [];
    const minSize = sizes.length ? Math.min(...sizes) : 0;
    const maxSize = sizes.length ? Math.max(...sizes) : 1;

    const markers = [];
    points.forEach(p => {
      const lat = parseFloat(p.lat || p.latitude || p.LAT || p.Lat);
      const lng = parseFloat(p.lng || p.lon || p.longitude || p.LNG || p.Lon);
      if (isNaN(lat) || isNaN(lng)) return;

      let color = '#50C8DC';
      if (colorField && p[colorField] != null) color = catColorMap[String(p[colorField])] || '#50C8DC';

      let radius = 6;
      if (sizeField && p[sizeField] != null) {
        const v = parseFloat(p[sizeField]) || 0;
        const ratio = maxSize > minSize ? (v - minSize) / (maxSize - minSize) : 0.5;
        radius = 4 + ratio * 16;
      }

      const m = L.circleMarker([lat, lng], {
        radius, fillColor: color, color: '#222244', weight: 1, fillOpacity: 0.8
      });

      const rows = Object.entries(p).slice(0, 8)
        .map(([k, v]) => `<tr><td style="color:#7777AA;padding:2px 6px">${k}</td><td style="padding:2px 6px">${v ?? ''}</td></tr>`)
        .join('');
      m.bindPopup(`<table style="font-size:11px">${rows}</table>`, { maxWidth: 280 });
      markers.push(m);
    });

    currentLayer = L.layerGroup(markers).addTo(map);

    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.1));
    }

    updateLegend(catArray, catColorMap, opts.legendTitle || '범례');
    showLoading(false);
    return { ok: true, pointCount: markers.length };
  } catch (e) {
    showLoading(false);
    return { ok: false, error: e.message };
  }
};

window.clearMap = function() {
  if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
  document.getElementById('legend').style.display = 'none';
};

window.setCenter = function(lat, lng, zoom) {
  map.setView([lat, lng], zoom || map.getZoom());
};

function interpolateColor(c1, c2, t) {
  const hex = c => [
    parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)
  ];
  const [r1,g1,b1] = hex(c1), [r2,g2,b2] = hex(c2);
  const r = Math.round(r1+(r2-r1)*t);
  const g = Math.round(g1+(g2-g1)*t);
  const b = Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function updateLegend(cats, colorMap, title) {
  const legend = document.getElementById('legend');
  if (!cats.length) { legend.style.display = 'none'; return; }
  legend.style.display = 'block';
  document.getElementById('legend-title').textContent = title;
  const items = cats.map(c =>
    `<div class="legend-item"><div class="legend-color" style="background:${colorMap[c]}"></div><span>${c}</span></div>`
  ).join('');
  document.getElementById('legend-items').innerHTML = items;
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

// C# → JS 메시지 수신
window.addEventListener('message', e => {
  try {
    const msg = JSON.parse(e.data);
    if (msg.action === 'geojson') window.renderGeoJson(msg.data, msg.options);
    else if (msg.action === 'csv') window.renderCsvPoints(msg.data, msg.options);
    else if (msg.action === 'clear') window.clearMap();
    else if (msg.action === 'center') window.setCenter(msg.lat, msg.lng, msg.zoom);
  } catch {}
});
</script>
</body>
</html>
