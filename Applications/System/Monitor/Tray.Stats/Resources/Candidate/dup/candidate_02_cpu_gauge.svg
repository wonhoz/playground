<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#152515"/>
    </linearGradient>
    <linearGradient id="gauge_green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cc44"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="gauge_yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cccc00"/>
      <stop offset="100%" stop-color="#ffff44"/>
    </linearGradient>
    <linearGradient id="gauge_red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Semicircle gauge background -->
  <path d="M96 320 A160 160 0 0 1 416 320" fill="none" stroke="#1a2a1a" stroke-width="40" stroke-linecap="round"/>
  <!-- Green zone (0-60%) -->
  <path d="M96 320 A160 160 0 0 1 256 160" fill="none" stroke="url(#gauge_green)" stroke-width="32" stroke-linecap="butt" opacity="0.8"/>
  <!-- Yellow zone (60-80%) -->
  <path d="M256 160 A160 160 0 0 1 356 196" fill="none" stroke="url(#gauge_yellow)" stroke-width="32" stroke-linecap="butt" opacity="0.8"/>
  <!-- Red zone (80-100%) -->
  <path d="M356 196 A160 160 0 0 1 416 320" fill="none" stroke="url(#gauge_red)" stroke-width="32" stroke-linecap="butt" opacity="0.8"/>
  <!-- Needle at ~65% -->
  <line x1="256" y1="320" x2="280" y2="165" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="320" r="16" fill="#333" stroke="#888" stroke-width="3"/>
  <circle cx="256" cy="320" r="7" fill="#fff"/>
  <!-- Tick marks -->
  <line x1="96" y1="320" x2="116" y2="320" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="160" x2="256" y2="180" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  <line x1="416" y1="320" x2="396" y2="320" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  <!-- Labels -->
  <text x="84" y="350" font-size="20" fill="#888" font-family="monospace">0</text>
  <text x="240" y="146" font-size="20" fill="#888" font-family="monospace">50</text>
  <text x="400" y="350" font-size="20" fill="#888" font-family="monospace">100</text>
  <!-- CPU label and value -->
  <text x="256" y="250" font-size="28" fill="#00ff88" font-family="monospace" text-anchor="middle" font-weight="bold">CPU</text>
  <text x="256" y="290" font-size="40" fill="#ffffff" font-family="monospace" text-anchor="middle" font-weight="bold">65%</text>
  <!-- Chip icon at bottom -->
  <rect x="200" y="370" width="112" height="80" rx="8" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="2"/>
  <!-- Chip pins -->
  <rect x="180" y="385" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="180" y="403" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="180" y="421" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="312" y="385" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="312" y="403" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="312" y="421" width="20" height="8" rx="2" fill="#3a5a3a"/>
  <rect x="215" y="362" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <rect x="244" y="362" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <rect x="273" y="362" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <rect x="215" y="436" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <rect x="244" y="436" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <rect x="273" y="436" width="8" height="20" rx="2" fill="#3a5a3a"/>
  <!-- Chip inner grid -->
  <rect x="215" y="388" width="82" height="52" rx="4" fill="#0a1a0a"/>
  <line x1="242" y1="388" x2="242" y2="440" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="269" y1="388" x2="269" y2="440" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="215" y1="409" x2="297" y2="409" stroke="#2a4a2a" stroke-width="1"/>
</svg>