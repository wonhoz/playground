<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#12121F"/>
  <!-- Layer 2: 4×4 원소 그리드 (원형 원소들) -->
  <!-- Row 1 -->
  <circle cx="280" cy="280" r="88" fill="#E8C878"/>
  <text x="280" y="294" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="#3E2000">Sand</text>
  <circle cx="468" cy="280" r="88" fill="#3468C8"/>
  <text x="468" y="294" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Water</text>
  <circle cx="656" cy="280" r="88" fill="#FF5500"/>
  <text x="656" y="294" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Fire</text>
  <circle cx="844" cy="280" r="88" fill="#6A4820"/>
  <text x="844" y="294" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Oil</text>
  <!-- Row 2 -->
  <circle cx="280" cy="468" r="88" fill="#788090"/>
  <text x="280" y="482" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Stone</text>
  <circle cx="468" cy="468" r="88" fill="#8B5E3C"/>
  <text x="468" y="482" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Wood</text>
  <circle cx="656" cy="468" r="88" fill="#A8D8F0"/>
  <text x="656" y="482" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="#0D4070">Ice</text>
  <circle cx="844" cy="468" r="88" fill="#9AAAC0"/>
  <text x="844" y="482" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="#2A3A4A">Steam</text>
  <!-- Row 3 -->
  <circle cx="280" cy="656" r="88" fill="#AA7040"/>
  <text x="280" y="670" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Seed</text>
  <circle cx="468" cy="656" r="88" fill="#22A030"/>
  <text x="468" y="670" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Plant</text>
  <circle cx="656" cy="656" r="88" fill="#2A4A10"/>
  <text x="656" y="670" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="#88FF10">Acid</text>
  <circle cx="844" cy="656" r="88" fill="#504848"/>
  <text x="844" y="670" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="#A0A0A0">Ash</text>
  <!-- Layer 3: 상호작용 선들 (화살표) -->
  <line x1="468" y1="370" x2="468" y2="380" stroke="#FF5500" stroke-width="6" opacity="0.5"/>
  <line x1="280" y1="370" x2="280" y2="380" stroke="#E8C878" stroke-width="6" opacity="0.5"/>
  <!-- 제목 -->
  <text x="512" y="840" text-anchor="middle" font-family="Arial Black" font-size="72" font-weight="900" fill="#4FC3F7">13 Elements</text>
</svg>