<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Forge circuit board — prompt as electronic circuit -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#020A08"/>
  <!-- Circuit board traces (horizontal) -->
  <rect x="140" y="360" width="180" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="140" y="500" width="140" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="140" y="640" width="160" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="704" y="360" width="180" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="724" y="500" width="160" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="704" y="640" width="180" height="14" rx="7" fill="#00BFA5" opacity="0.5"/>
  <!-- Vertical traces -->
  <rect x="318" y="200" width="14" height="160" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="706" y="200" width="14" height="160" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="318" y="640" width="14" height="200" rx="7" fill="#00BFA5" opacity="0.5"/>
  <rect x="706" y="640" width="14" height="200" rx="7" fill="#00BFA5" opacity="0.5"/>
  <!-- Main PCB chip (prompt forge core) -->
  <rect x="280" y="280" width="464" height="464" rx="20" fill="#032218" stroke="#00BFA5" stroke-width="20"/>
  <!-- Chip pin lines (sides) -->
  <rect x="320" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="380" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="440" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="500" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="560" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="620" y="248" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="320" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="380" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="440" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="500" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="560" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <rect x="620" y="740" width="24" height="36" rx="4" fill="#00BFA5" opacity="0.8"/>
  <!-- Chip inner: prompt cursor symbol -->
  <rect x="340" y="420" width="80" height="36" rx="8" fill="#00BFA5" opacity="0.6"/>
  <rect x="434" y="420" width="260" height="36" rx="8" fill="#00BFA5" opacity="0.8"/>
  <rect x="340" y="476" width="354" height="30" rx="8" fill="#00BFA5" opacity="0.5"/>
  <rect x="340" y="526" width="280" height="30" rx="8" fill="#00BFA5" opacity="0.4"/>
  <!-- Central glow -->
  <circle cx="512" cy="512" r="60" fill="#00BFA5" opacity="0.08"/>
</svg>
