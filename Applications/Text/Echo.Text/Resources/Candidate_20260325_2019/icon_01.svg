  </defs>
  <!-- Layer 1: 황금 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 흰 에디터 패널 -->
  <rect x="148" y="192" width="728" height="500" rx="36" fill="white" opacity="0.95"/>
  <!-- 에디터 텍스트 라인들 -->
  <rect x="216" y="284" width="440" height="36" rx="18" fill="#BDBDBD"/>
  <rect x="216" y="348" width="350" height="36" rx="18" fill="#BDBDBD"/>
  <rect x="216" y="412" width="400" height="36" rx="18" fill="#BDBDBD"/>
  <rect x="216" y="476" width="280" height="36" rx="18" fill="#E0E0E0"/>
  <!-- 큰 재생 버튼 -->
  <circle cx="716" cy="540" r="108" fill="url(#play1)"/>
  <polygon points="694,492 694,588 782,540" fill="white" stroke-linejoin="round"/>
  <!-- Layer 3: 음파 웨이브 (하단) -->
  <rect x="216" y="580" width="44" height="80" rx="22" fill="#FFB300" opacity="0.8"/>
  <rect x="276" y="556" width="44" height="104" rx="22" fill="#FF8F00" opacity="0.9"/>
  <rect x="336" y="572" width="44" height="72" rx="22" fill="#FFB300" opacity="0.8"/>
  <rect x="396" y="548" width="44" height="120" rx="22" fill="#FF6F00"/>
  <rect x="456" y="564" width="44" height="88" rx="22" fill="#FFB300" opacity="0.8"/>
</svg>
