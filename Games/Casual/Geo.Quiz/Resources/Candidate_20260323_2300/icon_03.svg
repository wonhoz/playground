    <line x1="172" y1="512" x2="852" y2="512"/>
    <line x1="172" y1="352" x2="852" y2="352"/>
    <line x1="172" y1="672" x2="852" y2="672"/>
  </g>

  <!-- 경도선 -->
  <g clip-path="url(#clip03)" fill="none" stroke="#0369A1" stroke-width="10" opacity="0.7">
    <line x1="512" y1="172" x2="512" y2="852"/>
    <ellipse cx="512" cy="512" rx="170" ry="340"/>
    <ellipse cx="512" cy="512" rx="295" ry="340"/>
  </g>

  <!-- 대륙 실루엣 (유라시아·아프리카 느낌) -->
