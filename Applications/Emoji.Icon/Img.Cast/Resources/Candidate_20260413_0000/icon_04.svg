<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor · 기하학 추상 · 양방향 변환 심볼 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFF8E1"/>
  <!-- 왼쪽 카드 PNG -->
  <g>
    <rect x="100" y="320" width="340" height="380" rx="36" fill="#E91E63" stroke="#880E4F" stroke-width="16"/>
    <rect x="130" y="360" width="280" height="220" rx="16" fill="#FCE4EC"/>
    <circle cx="270" cy="470" r="60" fill="#FFFFFF" stroke="#880E4F" stroke-width="10"/>
    <text x="270" y="650" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">PNG</text>
  </g>
  <!-- 오른쪽 카드 JPG -->
  <g>
    <rect x="584" y="320" width="340" height="380" rx="36" fill="#FFD93D" stroke="#B88A00" stroke-width="16"/>
    <rect x="614" y="360" width="280" height="220" rx="16" fill="#FFFBEA"/>
    <circle cx="754" cy="470" r="60" fill="#5C4000"/>
    <text x="754" y="650" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#5C4000" text-anchor="middle">JPG</text>
  </g>
  <!-- 양방향 화살표 (중앙) -->
  <g>
    <!-- 가로 바 -->
    <rect x="440" y="488" width="144" height="48" rx="24" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10"/>
    <!-- 왼쪽 화살촉 -->
    <path d="M 470 460 L 410 512 L 470 564 Z" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10" stroke-linejoin="round"/>
    <!-- 오른쪽 화살촉 -->
    <path d="M 554 460 L 614 512 L 554 564 Z" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10" stroke-linejoin="round"/>
  </g>
  <!-- 상단 라벨 -->
  <rect x="252" y="130" width="520" height="130" rx="40" fill="#4A148C" stroke="#1A0B3F" stroke-width="14"/>
  <text x="512" y="222" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">CONVERT</text>
  <!-- 하단 확장자 -->
  <g>
    <rect x="222" y="780" width="260" height="120" rx="30" fill="#06D6A0" stroke="#056B4F" stroke-width="12"/>
    <text x="352" y="862" font-family="Arial Black, sans-serif" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">ICO</text>
  </g>
  <g>
    <rect x="502" y="780" width="300" height="120" rx="30" fill="#3A86FF" stroke="#1A5CC9" stroke-width="12"/>
    <text x="652" y="862" font-family="Arial Black, sans-serif" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">WEBP</text>
  </g>
</svg>
