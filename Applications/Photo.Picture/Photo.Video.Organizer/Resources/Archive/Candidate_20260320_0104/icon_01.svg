<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Album Calendar: organize by date -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Calendar body -->
  <rect x="200" y="260" width="624" height="504" rx="32" fill="#4A148C"/>
  <!-- Calendar header -->
  <rect x="200" y="260" width="624" height="100" rx="32" fill="#7B1FA2"/>
  <rect x="200" y="320" width="624" height="40" fill="#7B1FA2"/>
  <!-- Calendar ring pegs -->
  <circle cx="340" cy="248" r="30" fill="#CE93D8"/>
  <circle cx="684" cy="248" r="30" fill="#CE93D8"/>
  <!-- Calendar grid lines -->
  <line x1="200" y1="430" x2="824" y2="430" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="200" y1="520" x2="824" y2="520" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="200" y1="610" x2="824" y2="610" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="200" y1="700" x2="824" y2="700" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="378" y1="360" x2="378" y2="764" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="512" y1="360" x2="512" y2="764" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <line x1="646" y1="360" x2="646" y2="764" stroke="#CE93D8" stroke-width="6" stroke-opacity="0.4"/>
  <!-- Photo thumbnail dots on calendar -->
  <rect x="230" y="448" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.9"/>
  <rect x="408" y="448" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.7"/>
  <rect x="540" y="538" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.9"/>
  <rect x="674" y="538" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.7"/>
  <rect x="230" y="628" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.9"/>
  <rect x="408" y="718" width="60" height="44" rx="8" fill="#CE93D8" opacity="0.7"/>
</svg>
