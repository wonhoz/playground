<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 입력 이미지 프레임 -->
  <rect x="40" y="140" width="160" height="160" rx="16" fill="#0A0A1A" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>
  <text x="120" y="232" font-size="80" text-anchor="middle" font-family="Segoe UI Emoji">🖼️</text>
  <!-- 변환 화살표 -->
  <path d="M 210 200 L 290 200" stroke="#E040FB" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="280,188 300,200 280,212" fill="#E040FB" filter="url(#glow)"/>
  <!-- ICO 출력 스택 -->
  <rect x="310" y="100" width="140" height="140" rx="14" fill="#0A0A1A" stroke="#69F0AE" stroke-width="3" filter="url(#glow)"/>
  <rect x="296" y="86" width="140" height="140" rx="14" fill="#0A0A1A" stroke="#00E5FF" stroke-width="2"/>
  <rect x="282" y="72" width="140" height="140" rx="14" fill="#0A0A1A" stroke="#E040FB" stroke-width="2"/>
  <text x="352" y="165" font-size="26" text-anchor="middle" fill="#69F0AE" font-family="Segoe UI" font-weight="bold">.ICO</text>
  <!-- 크기 뱃지 행 -->
  <rect x="56" y="340" width="56" height="30" rx="8" fill="#001830" stroke="#00E5FF" stroke-width="1"/>
  <text x="84" y="360" font-size="14" text-anchor="middle" fill="#00E5FF" font-family="Segoe UI">16px</text>
  <rect x="124" y="340" width="56" height="30" rx="8" fill="#001830" stroke="#E040FB" stroke-width="1"/>
  <text x="152" y="360" font-size="14" text-anchor="middle" fill="#E040FB" font-family="Segoe UI">32px</text>
  <rect x="192" y="340" width="56" height="30" rx="8" fill="#001830" stroke="#69F0AE" stroke-width="1"/>
  <text x="220" y="360" font-size="14" text-anchor="middle" fill="#69F0AE" font-family="Segoe UI">48px</text>
  <rect x="260" y="340" width="70" height="30" rx="8" fill="#001830" stroke="#FFD740" stroke-width="1"/>
  <text x="295" y="360" font-size="14" text-anchor="middle" fill="#FFD740" font-family="Segoe UI">256px</text>
  <!-- 제목 -->
  <text x="256" y="420" font-size="24" text-anchor="middle" fill="#00E5FF" font-family="Segoe UI" filter="url(#glow)">Icon Maker</text>
  <text x="256" y="456" font-size="16" text-anchor="middle" fill="#546E7A" font-family="Segoe UI">PNG → ICO Converter</text>
</svg>