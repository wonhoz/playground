<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mark.View — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F2318; font-family: 'Segoe UI', sans-serif; color: #D1FAE5; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #6EE7B7; letter-spacing: 2px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #34D399; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #0A2018; border: 2px solid #059669; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #6EE7B7; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #A7F3D0; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #6EE7B7; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #065F46; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1># Mark.View</h1>
<p class="subtitle">Markdown 파일 뷰어 — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept"># 헤더 미리보기 카드</div>
    <span class="tag literal">literal</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#4338CA"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#C7D2FE"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">.md → 렌더링 변환</div>
    <span class="tag literal">literal</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#059669"></div>
      <div class="swatch" style="background:#ECFDF5"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">확대경으로 # 발견</div>
    <span class="tag metaphor">metaphor</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#EAB308"></div>
      <div class="swatch" style="background:#1D4ED8"></div>
      <div class="swatch" style="background:#93C5FD"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">형광펜 하이라이트 미리보기</div>
    <span class="tag metaphor">metaphor</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#FB923C"></div>
      <div class="swatch" style="background:#FFFBEB"></div>
      <div class="swatch" style="background:#1D4ED8"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">MD vs 렌더링 분할 화면</div>
    <span class="tag hybrid">hybrid</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#DB2777"></div>
      <div class="swatch" style="background:#0891B2"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
</div>
</body>
</html>
