<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A10"/>
      <stop offset="100%" stop-color="#0A1020"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speedometer arc background -->
  <path d="M90,350 A180,180 0 0,1 422,350" fill="none" stroke="#1E293B" stroke-width="30" stroke-linecap="round"/>
  <!-- Colored arc (fill level) -->
  <path d="M90,350 A180,180 0 0,1 422,350" fill="none" stroke="url(#arc)" stroke-width="30" stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="142"/>
  <!-- Tick marks -->
  <line x1="90" y1="350" x2="108" y2="350" stroke="#334155" stroke-width="3"/>
  <line x1="113" y1="260" x2="128" y2="271" stroke="#334155" stroke-width="3"/>
  <line x1="170" y1="185" x2="180" y2="200" stroke="#334155" stroke-width="3"/>
  <line x1="256" y1="162" x2="256" y2="178" stroke="#334155" stroke-width="3"/>
  <line x1="342" y1="185" x2="332" y2="200" stroke="#334155" stroke-width="3"/>
  <line x1="399" y1="260" x2="384" y2="271" stroke="#334155" stroke-width="3"/>
  <line x1="422" y1="350" x2="404" y2="350" stroke="#334155" stroke-width="3"/>
  <!-- Needle (pointing to 75%) -->
  <line x1="256" y1="330" x2="370" y2="200" stroke="#F87171" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="330" r="14" fill="#334155"/>
  <circle cx="256" cy="330" r="6" fill="#F87171"/>
  <!-- Center display -->
  <text x="256" y="280" font-family="monospace" font-weight="bold" font-size="36" fill="#EF4444" text-anchor="middle">75%</text>
  <text x="256" y="308" font-family="monospace" font-size="14" fill="#888" text-anchor="middle">Temp Disk Usage</text>
  <!-- Labels -->
  <text x="70" y="390" font-family="monospace" font-size="12" fill="#10B981">0%</text>
  <text x="424" y="390" font-family="monospace" font-size="12" fill="#EF4444">100%</text>
  <!-- App name -->
  <text x="256" y="460" font-family="monospace" font-weight="bold" font-size="22" fill="#60A5FA" text-anchor="middle">App.Temp</text>
</svg>