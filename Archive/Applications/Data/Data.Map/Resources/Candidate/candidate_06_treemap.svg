  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Treemap rectangles -->
  <!-- Large block top-left -->
  <rect x="56" y="80" width="200" height="160" rx="4" fill="#1565c0"/>
  <rect x="58" y="82" width="196" height="156" rx="3" fill="#1976d2" opacity="0.7"/>
