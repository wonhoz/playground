<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="jt4-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="jt4-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0A3C"/>
      <stop offset="100%" stop-color="#0A0520"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#jt4-clip)">
    <!-- Background: Deep Purple -->
    <rect width="1024" height="1024" fill="url(#jt4-bg)"/>

    <!-- Layer 1 (deepest, farthest back) -->
    <g opacity="0.4">
      <rect x="180" y="680" width="664" height="80" rx="12" fill="#3040A0"/>
      <rect x="220" y="696" width="200" height="14" rx="7" fill="#8090FF"/>
      <rect x="440" y="696" width="160" height="14" rx="7" fill="#6070D0"/>
      <rect x="620" y="696" width="180" height="14" rx="7" fill="#7080E8"/>
      <rect x="220" y="718" width="140" height="12" rx="6" fill="#6070D0" opacity="0.7"/>
      <rect x="380" y="718" width="100" height="12" rx="6" fill="#5060C0" opacity="0.7"/>
    </g>

    <!-- Layer 2 -->
    <g opacity="0.6">
      <rect x="200" y="568" width="624" height="100" rx="14" fill="#3A3080"/>
      <rect x="236" y="584" width="180" height="16" rx="8" fill="#9090FF"/>
      <rect x="434" y="584" width="140" height="16" rx="8" fill="#7070D0"/>
      <rect x="590" y="584" width="200" height="16" rx="8" fill="#8080E8"/>
      <rect x="236" y="610" width="240" height="13" rx="6" fill="#7070C0" opacity="0.8"/>
      <rect x="496" y="610" width="180" height="13" rx="6" fill="#6060B0" opacity="0.7"/>
      <rect x="236" y="630" width="160" height="11" rx="5" fill="#6060B0" opacity="0.6"/>
    </g>

    <!-- Layer 3 -->
    <g opacity="0.8">
      <rect x="220" y="440" width="584" height="116" rx="16" fill="#5040A8"/>
      <rect x="256" y="456" width="160" height="18" rx="9" fill="#C0B0FF"/>
      <rect x="432" y="456" width="120" height="18" rx="9" fill="#A090F0"/>
      <rect x="566" y="456" width="200" height="18" rx="9" fill="#B0A0FF"/>
      <rect x="256" y="484" width="280" height="14" rx="7" fill="#9080E0" opacity="0.8"/>
      <rect x="552" y="484" width="200" height="14" rx="7" fill="#8070D0" opacity="0.7"/>
      <rect x="256" y="506" width="200" height="12" rx="6" fill="#8070D0" opacity="0.6"/>
      <rect x="474" y="506" width="140" height="12" rx="6" fill="#7060C0" opacity="0.5"/>
      <rect x="256" y="526" width="320" height="12" rx="6" fill="#7060C0" opacity="0.5"/>
    </g>

    <!-- Layer 4 (top, nearest) -->
    <g opacity="1.0">
      <rect x="240" y="290" width="544" height="138" rx="18" fill="#7B5AE0" stroke="#A090FF" stroke-width="3"/>
      <rect x="276" y="308" width="140" height="20" rx="10" fill="#FFFFFF" opacity="0.95"/>
      <rect x="432" y="308" width="100" height="20" rx="10" fill="#E0D8FF" opacity="0.85"/>
      <rect x="548" y="308" width="200" height="20" rx="10" fill="#F0EAFF" opacity="0.9"/>
      <rect x="276" y="338" width="300" height="16" rx="8" fill="#C4B0FF" opacity="0.8"/>
      <rect x="592" y="338" width="160" height="16" rx="8" fill="#B8A8F0" opacity="0.7"/>
      <rect x="276" y="362" width="220" height="14" rx="7" fill="#B0A0F0" opacity="0.7"/>
      <rect x="512" y="362" width="180" height="14" rx="7" fill="#A090E0" opacity="0.6"/>
      <rect x="276" y="384" width="360" height="14" rx="7" fill="#A090E0" opacity="0.6"/>
      <rect x="276" y="406" width="240" height="12" rx="6" fill="#9080D0" opacity="0.5"/>
    </g>

    <!-- Depth arrow/indicator on right side -->
    <g stroke="#7B5AE0" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <line x1="820" y1="300" x2="820" y2="740"/>
      <line x1="800" y1="320" x2="820" y2="300"/>
      <line x1="840" y1="320" x2="820" y2="300"/>
      <line x1="800" y1="720" x2="820" y2="740"/>
      <line x1="840" y1="720" x2="820" y2="740"/>
    </g>
    <text x="840" y="528" font-family="monospace" font-size="18" fill="#7B5AE0" opacity="0.6" transform="rotate(90 840 528)">depth</text>

    <!-- Layer count badges left -->
    <circle cx="226" cy="740" r="14" fill="#3040A0" stroke="#8090FF" stroke-width="2"/>
    <text x="226" y="745" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">1</text>
    <circle cx="226" cy="618" r="14" fill="#3A3080" stroke="#9090FF" stroke-width="2"/>
    <text x="226" y="623" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">2</text>
    <circle cx="226" cy="498" r="14" fill="#5040A8" stroke="#A090F0" stroke-width="2"/>
    <text x="226" y="503" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">3</text>
    <circle cx="226" cy="359" r="14" fill="#7B5AE0" stroke="#C0B0FF" stroke-width="2"/>
    <text x="226" y="364" font-family="monospace" font-size="14" fill="#FFFFFF" text-anchor="middle">4</text>
  </g>
</svg>
