<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 그라데이션 배경 (민트-라벤더) -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="50%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <g clip-path="url(#clip08)">
    <!-- Layer 2: 3가지 청소 기능 카드 (레이어드) -->

    <!-- 레지스트리 카드 (우, 뒤) -->
    <rect x="554" y="235" width="380" height="360" rx="28" fill="#3F51B5" transform="rotate(8 744 415)"/>
    <text x="810" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" transform="rotate(8 810 340)">레지스트리</text>
    <text x="810" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="85" text-anchor="middle" transform="rotate(8 810 425)">🔑</text>
    <text x="810" y="510" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#C5CAE9" text-anchor="middle" transform="rotate(8 810 510)">REGISTRY</text>

    <!-- 설치 프로그램 카드 (좌, 뒤) -->
    <rect x="90" y="235" width="380" height="360" rx="28" fill="#7B1FA2" transform="rotate(-8 280 415)"/>
    <text x="214" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 214 340)">프로그램</text>
    <text x="214" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="85" text-anchor="middle" transform="rotate(-8 214 425)">📦</text>
    <text x="214" y="510" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#E1BEE7" text-anchor="middle" transform="rotate(-8 214 510)">PROGRAMS</text>

    <!-- 임시 파일 카드 (중앙, 앞) -->
    <rect x="292" y="195" width="440" height="430" rx="32" fill="#00838F"/>
    <text x="512" y="315" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">임시 파일</text>
    <text x="512" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="110" text-anchor="middle">🗂</text>
    <text x="512" y="555" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="42" fill="#A7FFEB" text-anchor="middle">TEMP FILES</text>

    <!-- Layer 3: 하단 실행 버튼 배지 -->
    <circle cx="512" cy="830" r="96" fill="#00838F"/>
    <text x="512" y="810" font-family="'Segoe UI',Arial,sans-serif" font-size="52" text-anchor="middle">🧹</text>
    <text x="512" y="870" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">청소</text>

    <!-- 좌우 아이콘 -->
    <text x="200" y="856" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#7B1FA2" text-anchor="middle">✓</text>
    <text x="824" y="856" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#3F51B5" text-anchor="middle">✓</text>

    <!-- 상단 타이틀 -->
    <rect x="220" y="116" width="584" height="72" rx="22" fill="#00838F"/>
    <text x="512" y="170" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SYS.CLEAN</text>
  </g>
</svg>
