<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003d7a"/>
      <stop offset="100%" stop-color="#001529"/>
    </linearGradient>
    <linearGradient id="net" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="capture" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff3838"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Web net pattern (simplified) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#net)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="100" ry="180" fill="none" stroke="url(#net)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="180" ry="80" fill="none" stroke="url(#net)" stroke-width="2" opacity="0.6"/>
  <line x1="76" y1="256" x2="436" y2="256" stroke="url(#net)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="76" x2="256" y2="436" stroke="url(#net)" stroke-width="2" opacity="0.5"/>
  <!-- Capture box in center -->
  <rect x="156" y="176" width="200" height="160" rx="6" fill="none" stroke="url(#capture)" stroke-width="3" filter="url(#glow)"/>
  <!-- Corner accents -->
  <path d="M156 196 L156 176 L176 176" stroke="url(#capture)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M356 176 L356 196" stroke="url(#capture)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M336 176 L356 176" stroke="url(#capture)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M156 316 L156 336 L176 336" stroke="url(#capture)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M336 336 L356 336 L356 316" stroke="url(#capture)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center click point -->
  <circle cx="256" cy="256" r="16" fill="url(#capture)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="8" fill="white"/>
</svg>