<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - warm cream/soft white -->
  <rect width="1024" height="1024" rx="180" fill="#F5F0FF"/>

  <!-- Layer 2: Mini grid (6x6) upper portion, left=mixed right=single color -->
  <!-- Grid: 54px tiles, 6px gap, start x=110, y=160 -->
  <!-- Left half: mixed colors -->
  <rect x="110" y="160" width="54" height="54" rx="7" fill="#F38BA8"/>
  <rect x="170" y="160" width="54" height="54" rx="7" fill="#89B4FA"/>
  <rect x="230" y="160" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="110" y="220" width="54" height="54" rx="7" fill="#CBA6F7"/>
  <rect x="170" y="220" width="54" height="54" rx="7" fill="#FAB387"/>
  <rect x="230" y="220" width="54" height="54" rx="7" fill="#89DCEB"/>
  <rect x="110" y="280" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="170" y="280" width="54" height="54" rx="7" fill="#F38BA8"/>
  <rect x="230" y="280" width="54" height="54" rx="7" fill="#89B4FA"/>
  <rect x="110" y="340" width="54" height="54" rx="7" fill="#FAB387"/>
  <rect x="170" y="340" width="54" height="54" rx="7" fill="#89DCEB"/>
  <rect x="230" y="340" width="54" height="54" rx="7" fill="#CBA6F7"/>
  <rect x="110" y="400" width="54" height="54" rx="7" fill="#89DCEB"/>
  <rect x="170" y="400" width="54" height="54" rx="7" fill="#CBA6F7"/>
  <rect x="230" y="400" width="54" height="54" rx="7" fill="#FAB387"/>
  <rect x="110" y="460" width="54" height="54" rx="7" fill="#89B4FA"/>
  <rect x="170" y="460" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="230" y="460" width="54" height="54" rx="7" fill="#F38BA8"/>

  <!-- Arrow divider -->
  <polygon points="310,337 355,310 355,364" fill="#CBA6F7" opacity="0.9"/>

  <!-- Right half: all mint green (flooded) -->
  <rect x="370" y="160" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="160" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="160" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="370" y="220" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="220" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="220" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="370" y="280" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="280" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="280" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="370" y="340" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="340" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="340" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="370" y="400" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="400" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="400" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="370" y="460" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="430" y="460" width="54" height="54" rx="7" fill="#A6E3A1"/>
  <rect x="490" y="460" width="54" height="54" rx="7" fill="#A6E3A1"/>

  <!-- Layer 3: Counter chip top right -->
  <rect x="580" y="160" width="280" height="100" rx="20" fill="#1e1e2e"/>
  <text x="720" y="230" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="#FAB387">30</text>

  <!-- 6-color palette buttons bottom -->
  <rect x="110" y="570" width="120" height="60" rx="14" fill="#F38BA8"/>
  <rect x="240" y="570" width="120" height="60" rx="14" fill="#89B4FA"/>
  <rect x="370" y="570" width="120" height="60" rx="14" fill="#A6E3A1"/>
  <rect x="500" y="570" width="120" height="60" rx="14" fill="#FAB387"/>
  <rect x="630" y="570" width="120" height="60" rx="14" fill="#CBA6F7"/>
  <rect x="760" y="570" width="120" height="60" rx="14" fill="#89DCEB"/>

  <!-- Title text -->
  <text x="512" y="730" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" text-anchor="middle" fill="#1e1e2e" opacity="0.85">HUE FLOW</text>
</svg>
