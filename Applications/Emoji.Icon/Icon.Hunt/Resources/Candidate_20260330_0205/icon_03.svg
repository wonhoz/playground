<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="archer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 초록 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- Layer 2: 과녁 (target) — 아이콘을 사냥 -->
  <circle cx="700" cy="400" r="240" fill="#FFEBEE"/>
  <circle cx="700" cy="400" r="180" fill="#EF9A9A"/>
  <circle cx="700" cy="400" r="120" fill="#EF5350"/>
  <circle cx="700" cy="400" r="60" fill="#B71C1C"/>
  <!-- 과녁 중앙 아이콘 (별) -->
  <polygon points="700,355 714,385 748,385 720,405 730,440 700,418 670,440 680,405 652,385 686,385" fill="#FFD740" stroke="#FF8F00" stroke-width="4"/>

  <!-- 사냥꾼 실루엣 (왼쪽) -->
  <!-- 몸통 -->
  <ellipse cx="240" cy="580" rx="68" ry="90" fill="url(#archer)"/>
  <!-- 머리 -->
  <circle cx="240" cy="450" r="62" fill="#8D6E63"/>
  <!-- 눈 (집중) -->
  <ellipse cx="260" cy="440" rx="18" ry="14" fill="white"/>
  <circle cx="264" cy="440" r="9" fill="#1A1A1A"/>
  <!-- 활 -->
  <path d="M310 340 Q420 460 310 580" fill="none" stroke="#5D4037" stroke-width="20" stroke-linecap="round"/>
  <!-- 시위 -->
  <line x1="310" y1="340" x2="310" y2="580" stroke="#A1887F" stroke-width="8"/>
  <!-- 화살 -->
  <line x1="320" y1="460" x2="620" y2="400" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <polygon points="622,400 590,385 590,415" fill="#FF7043"/>
  <!-- 화살 깃 -->
  <polygon points="320,460 300,440 310,460 300,480" fill="#FF8A65"/>

  <!-- Layer 3: 사냥 성공 파티클 -->
  <text x="820" y="260" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="72" text-anchor="middle">✨</text>
  <circle cx="780" cy="180" r="18" fill="#FFD740" opacity="0.8"/>
  <circle cx="870" cy="310" r="12" fill="#FF8F00" opacity="0.7"/>
  <circle cx="740" cy="220" r="10" fill="#FFEE58" opacity="0.6"/>
  <!-- 하단 레이블 -->
  <rect x="280" y="800" width="444" height="90" rx="20" fill="#2E7D32" opacity="0.8"/>
  <text x="502" y="847" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle" dominant-baseline="middle">ICON HUNT</text>
</svg>
