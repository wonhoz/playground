<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <linearGradient id="blue_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </linearGradient>
    <linearGradient id="silver_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="data_flow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00BFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#C0C0C0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="left_clip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44ddff"/>
      <stop offset="100%" stop-color="#0088bb"/>
    </linearGradient>
    <linearGradient id="right_clip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <filter id="glow05">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mirror_glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg05)" rx="48"/>

  <!-- 배경 그리드 (반영 느낌) -->
  <line x1="256" y1="60" x2="256" y2="460" stroke="#00BFFF" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,6"/>

  <!-- 왼쪽 클립보드 (청색) -->
  <rect x="60" y="145" width="160" height="222" rx="14" ry="14"
        fill="#050f20" stroke="url(#left_clip)" stroke-width="3.5" filter="url(#glow05)"/>
  <!-- 왼쪽 클립 -->
  <rect x="112" y="132" width="56" height="26" rx="8" ry="8"
        fill="#050f20" stroke="url(#left_clip)" stroke-width="3" filter="url(#glow05)"/>
  <!-- 왼쪽 텍스트 라인 -->
  <line x1="82" y1="195" x2="200" y2="195" stroke="#00BFFF" stroke-width="2.5" opacity="0.7"/>
  <line x1="82" y1="218" x2="200" y2="218" stroke="#00BFFF" stroke-width="2.5" opacity="0.7"/>
  <line x1="82" y1="241" x2="185" y2="241" stroke="#00BFFF" stroke-width="2.5" opacity="0.6"/>
  <line x1="82" y1="264" x2="195" y2="264" stroke="#00BFFF" stroke-width="2.5" opacity="0.6"/>
  <line x1="82" y1="287" x2="180" y2="287" stroke="#00BFFF" stroke-width="2.5" opacity="0.55"/>
  <line x1="82" y1="310" x2="190" y2="310" stroke="#00BFFF" stroke-width="2.5" opacity="0.55"/>
  <line x1="82" y1="333" x2="175" y2="333" stroke="#00BFFF" stroke-width="2.5" opacity="0.5"/>
  <!-- 왼쪽 이미지 블록 -->
  <rect x="82" y="348" width="55" height="8" rx="3" fill="#00BFFF" opacity="0.4"/>
  <rect x="82" y="360" width="40" height="8" rx="3" fill="#00BFFF" opacity="0.3"/>

  <!-- 오른쪽 클립보드 (실버) - 대칭 -->
  <rect x="292" y="145" width="160" height="222" rx="14" ry="14"
        fill="#0f0f18" stroke="url(#right_clip)" stroke-width="3.5" filter="url(#glow05)"/>
  <!-- 오른쪽 클립 -->
  <rect x="344" y="132" width="56" height="26" rx="8" ry="8"
        fill="#0f0f18" stroke="url(#right_clip)" stroke-width="3" filter="url(#glow05)"/>
  <!-- 오른쪽 텍스트 라인 -->
  <line x1="312" y1="195" x2="430" y2="195" stroke="#C0C0C0" stroke-width="2.5" opacity="0.7"/>
  <line x1="312" y1="218" x2="430" y2="218" stroke="#C0C0C0" stroke-width="2.5" opacity="0.7"/>
  <line x1="327" y1="241" x2="430" y2="241" stroke="#C0C0C0" stroke-width="2.5" opacity="0.6"/>
  <line x1="317" y1="264" x2="430" y2="264" stroke="#C0C0C0" stroke-width="2.5" opacity="0.6"/>
  <line x1="332" y1="287" x2="430" y2="287" stroke="#C0C0C0" stroke-width="2.5" opacity="0.55"/>
  <line x1="322" y1="310" x2="430" y2="310" stroke="#C0C0C0" stroke-width="2.5" opacity="0.55"/>
  <line x1="337" y1="333" x2="430" y2="333" stroke="#C0C0C0" stroke-width="2.5" opacity="0.5"/>
  <!-- 오른쪽 이미지 블록 -->
  <rect x="375" y="348" width="55" height="8" rx="3" fill="#C0C0C0" opacity="0.4"/>
  <rect x="390" y="360" width="40" height="8" rx="3" fill="#C0C0C0" opacity="0.3"/>

  <!-- 데이터 교환 화살표 (중앙) -->
  <!-- 왼쪽->오른쪽 화살표 -->
  <line x1="228" y1="230" x2="284" y2="230" stroke="url(#data_flow)" stroke-width="3" filter="url(#glow05)"/>
  <polygon points="284,224 296,230 284,236" fill="#ffffff" opacity="0.9" filter="url(#glow05)"/>
  <!-- 데이터 패킷 -->
  <circle cx="248" cy="230" r="4" fill="#00BFFF" opacity="0.9" filter="url(#glow05)"/>
  <circle cx="260" cy="230" r="4" fill="#ffffff" opacity="0.9" filter="url(#glow05)"/>

  <!-- 오른쪽->왼쪽 화살표 -->
  <line x1="284" y1="290" x2="228" y2="290" stroke="url(#data_flow)" stroke-width="3" filter="url(#glow05)"/>
  <polygon points="228,284 216,290 228,296" fill="#C0C0C0" opacity="0.9" filter="url(#glow05)"/>
  <!-- 데이터 패킷 -->
  <circle cx="264" cy="290" r="4" fill="#C0C0C0" opacity="0.9" filter="url(#glow05)"/>
  <circle cx="252" cy="290" r="4" fill="#ffffff" opacity="0.9" filter="url(#glow05)"/>

  <!-- 중앙 교환 심볼 -->
  <circle cx="256" cy="260" r="18" fill="#050f20" stroke="url(#blue_grad)" stroke-width="2.5" filter="url(#glow05)"/>
  <path d="M 248 255 L 264 255 L 260 251 M 264 265 L 248 265 L 252 269"
        fill="none" stroke="#00BFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 거울 효과 반사선 -->
  <line x1="256" y1="100" x2="256" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- AI 텍스트 -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="22"
        font-weight="bold" fill="url(#blue_grad)" opacity="0.9" filter="url(#glow05)">AI.Clip</text>

  <!-- 주변 빛 효과 -->
  <ellipse cx="256" cy="256" rx="180" ry="160" fill="none" stroke="#00BFFF" stroke-width="1" opacity="0.06"/>
</svg>
