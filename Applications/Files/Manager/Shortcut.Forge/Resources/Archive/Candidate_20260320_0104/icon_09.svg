<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
<!-- 컨셉: 포탈 순간이동 -->
<!-- 포탈 왼쪽 (파란 원형 링) -->
<ellipse cx="300" cy="512" rx="100" ry="180" fill="none" stroke="#1565C0" stroke-width="40"/>
<ellipse cx="300" cy="512" rx="70" ry="150" fill="#1565C0" opacity="0.15"/>
<!-- 포탈 오른쪽 (파란 원형 링) -->
<ellipse cx="724" cy="512" rx="100" ry="180" fill="none" stroke="#42A5F5" stroke-width="40"/>
<ellipse cx="724" cy="512" rx="70" ry="150" fill="#42A5F5" opacity="0.15"/>
<!-- 이동 화살표 -->
<path d="M 380 512 L 640 512" fill="none" stroke="#42A5F5" stroke-width="32" stroke-linecap="round"/>
<path d="M 580 452 L 648 512 L 580 572" fill="none" stroke="#42A5F5" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 파일 아이콘 (왼쪽 포탈로 진입) -->
<rect x="180" y="474" width="80" height="64" rx="8" fill="#42A5F5" opacity="0.9"/>
<!-- 파일 아이콘 (오른쪽 포탈에서 나옴) -->
<rect x="764" y="474" width="80" height="64" rx="8" fill="#1565C0" opacity="0.9"/>
<!-- 속도선 -->
<line x1="420" y1="480" x2="500" y2="480" stroke="#42A5F5" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
<line x1="420" y1="512" x2="500" y2="512" stroke="#42A5F5" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
<line x1="420" y1="544" x2="500" y2="544" stroke="#42A5F5" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
</svg>
