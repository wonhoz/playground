<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라이트 스카이 -->
  <rect width="1024" height="1024" rx="180" fill="#E3F2FD"/>
  <!-- Layer 2: 점수 랭킹 + 지구 -->
  <!-- 지구 아이콘 -->
  <circle cx="512" cy="380" r="220" fill="#1565C0"/>
  <ellipse cx="512" cy="380" rx="110" ry="220" fill="none" stroke="#1976D2" stroke-width="5" opacity="0.7"/>
  <line x1="292" y1="380" x2="732" y2="380" stroke="#1976D2" stroke-width="5" opacity="0.7"/>
  <!-- 대륙들 -->
  <ellipse cx="430" cy="300" rx="70" ry="50" fill="#43A047" opacity="0.8"/>
  <ellipse cx="570" cy="320" rx="80" ry="60" fill="#388E3C" opacity="0.75"/>
  <ellipse cx="500" cy="450" rx="60" ry="45" fill="#4CAF50" opacity="0.8"/>
  <!-- 별 3개 -->
  <text x="260" y="300" font-family="Arial" font-size="64" fill="#FFC107" text-anchor="middle">★</text>
  <text x="512" y="180" font-family="Arial" font-size="80" fill="#FFC107" text-anchor="middle">★</text>
  <text x="764" y="300" font-family="Arial" font-size="64" fill="#FFC107" text-anchor="middle">★</text>
  <!-- Layer 3: 점수 + 타이틀 -->
  <rect x="160" y="660" width="704" height="100" rx="16" fill="#1565C0"/>
  <text x="512" y="725" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="white" text-anchor="middle">GEO QUIZ</text>
  <text x="512" y="830" font-family="Arial" font-size="44" fill="#1565C0" text-anchor="middle">World Geography Game</text>
</svg>
