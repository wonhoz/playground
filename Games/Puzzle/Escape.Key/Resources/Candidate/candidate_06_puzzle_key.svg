<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1942"/>
      <stop offset="100%" style="stop-color:#c31432"/>
    </linearGradient>
    <linearGradient id="piece" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Puzzle pieces forming a key -->
  <!-- Piece 1 (bow of key) -->
  <path d="M100 120 C100 80 160 60 200 80 C240 100 250 140 230 170 C220 190 195 195 180 180 C165 165 180 145 196 155 C212 165 200 180 185 175 C170 170 165 155 175 148" stroke="url(#piece)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="175" cy="155" r="40" stroke="url(#piece)" stroke-width="8" fill="url(#piece)" opacity="0.3"/>
  <!-- Piece 2 (shaft) -->
  <rect x="200" y="170" width="180" height="30" rx="5" fill="url(#piece)" opacity="0.8"/>
  <!-- Piece 3 (teeth) -->
  <rect x="320" y="200" width="24" height="35" rx="5" fill="url(#piece)"/>
  <rect x="355" y="200" width="24" height="50" rx="5" fill="url(#piece)"/>
  <!-- Puzzle notches -->
  <circle cx="255" cy="185" r="14" fill="#4a1942"/>
  <circle cx="295" cy="185" r="14" fill="#4a1942"/>
  <!-- Puzzle interlocks (bumps) -->
  <circle cx="255" cy="200" r="12" fill="url(#piece)" opacity="0.9"/>
  <circle cx="295" cy="200" r="12" fill="url(#piece)" opacity="0.7"/>
  <!-- Question mark (puzzle) -->
  <text x="256" y="380" font-family="serif" font-size="150" text-anchor="middle" fill="url(#piece)" opacity="0.3" font-weight="bold">?</text>
  <!-- Escape label -->
  <text x="256" y="470" font-family="monospace" font-size="28" text-anchor="middle" fill="url(#piece)" font-weight="bold">ESCAPE KEY</text>
</svg>
