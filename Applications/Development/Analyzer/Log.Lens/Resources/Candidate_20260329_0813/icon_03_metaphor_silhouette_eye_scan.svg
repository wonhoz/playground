<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg03" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0D1F14"/>
      <stop offset="100%" stop-color="#060D0A"/>
    </radialGradient>
    <radialGradient id="iris03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="60%" stop-color="#00CC66"/>
      <stop offset="100%" stop-color="#006633"/>
    </radialGradient>
    <radialGradient id="pupil03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003319"/>
      <stop offset="100%" stop-color="#000A05"/>
    </radialGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg03)"/>

  <!-- 스캔라인 패턴 -->
  <g opacity="0.08">
    <line x1="0" y1="240" x2="1024" y2="240" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="280" x2="1024" y2="280" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="320" x2="1024" y2="320" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="360" x2="1024" y2="360" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="440" x2="1024" y2="440" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="480" x2="1024" y2="480" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="520" x2="1024" y2="520" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="560" x2="1024" y2="560" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="640" x2="1024" y2="640" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="680" x2="1024" y2="680" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="720" x2="1024" y2="720" stroke="#00FF88" stroke-width="2"/>
    <line x1="0" y1="760" x2="1024" y2="760" stroke="#00FF88" stroke-width="2"/>
  </g>

  <!-- 눈 외형 (아몬드 실루엣) -->
  <path d="M 100,512 Q 300,260 512,260 Q 724,260 924,512 Q 724,764 512,764 Q 300,764 100,512 Z"
        fill="#0A1A0F" stroke="#00CC66" stroke-width="8"/>

  <!-- 홍채 -->
  <circle cx="512" cy="512" r="188" fill="url(#iris03)"/>

  <!-- 홍채 디테일 라인들 -->
  <g stroke="#003322" stroke-width="3" opacity="0.5">
    <line x1="512" y1="324" x2="512" y2="700"/>
    <line x1="324" y1="512" x2="700" y2="512"/>
    <line x1="380" y1="380" x2="644" y2="644"/>
    <line x1="644" y1="380" x2="380" y2="644"/>
  </g>

  <!-- 동공 -->
  <circle cx="512" cy="512" r="90" fill="url(#pupil03)"/>

  <!-- 스캔 빔 (수평 초록 라인) -->
  <rect x="100" y="498" width="824" height="28" rx="4" fill="#00FF88" opacity="0.4" filter="url(#glow03)"/>
  <rect x="100" y="506" width="824" height="12" rx="3" fill="#88FFCC" opacity="0.6"/>

  <!-- 눈 하이라이트 반사 -->
  <ellipse cx="568" cy="440" rx="40" ry="26" fill="white" opacity="0.12"/>

  <!-- 하단 텍스트 레이블들 -->
  <!-- FATAL 레드 라인 -->
  <rect x="112" y="840" width="160" height="24" rx="4" fill="#FF4747" opacity="0.9"/>
  <!-- ERROR -->
  <rect x="284" y="840" width="130" height="24" rx="4" fill="#FF6B6B" opacity="0.8"/>
  <!-- WARN -->
  <rect x="426" y="840" width="100" height="24" rx="4" fill="#FFD93D" opacity="0.9"/>
  <!-- INFO -->
  <rect x="538" y="840" width="100" height="24" rx="4" fill="#00C8FF" opacity="0.9"/>
  <!-- DEBUG -->
  <rect x="650" y="840" width="120" height="24" rx="4" fill="#6EA8FE" opacity="0.8"/>
  <!-- TRACE -->
  <rect x="782" y="840" width="130" height="24" rx="4" fill="#8888A8" opacity="0.7"/>

  <!-- 사이드 레이더 코너 (HUD 느낌) -->
  <path d="M 60,200 L 60,140 L 120,140" fill="none" stroke="#00FF88" stroke-width="6" opacity="0.6"/>
  <path d="M 964,200 L 964,140 L 904,140" fill="none" stroke="#00FF88" stroke-width="6" opacity="0.6"/>
  <path d="M 60,824 L 60,884 L 120,884" fill="none" stroke="#00FF88" stroke-width="6" opacity="0.6"/>
  <path d="M 964,824 L 964,884 L 904,884" fill="none" stroke="#00FF88" stroke-width="6" opacity="0.6"/>
</svg>
