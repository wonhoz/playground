<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Icon.Hunt - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #a855f7; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .card:hover { border-color: #a855f7; }
    .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .label { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .num { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Icon.Hunt — Icon Candidates</h1>
  <p>아이콘 검색·탐색 도구 아이콘 후보 10개</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_magnifier_grid.svg" alt="magnifier_grid"/>
      <div class="label">magnifier_grid</div>
      <div class="num">#01</div>
    </div>
    <div class="card">
      <img src="candidate_02_neon_search.svg" alt="neon_search"/>
      <div class="label">neon_search</div>
      <div class="num">#02</div>
    </div>
    <div class="card">
      <img src="candidate_03_golden_compass.svg" alt="golden_compass"/>
      <div class="label">golden_compass</div>
      <div class="num">#03</div>
    </div>
    <div class="card">
      <img src="candidate_04_teal_hunt.svg" alt="teal_hunt"/>
      <div class="label">teal_hunt</div>
      <div class="num">#04</div>
    </div>
    <div class="card">
      <img src="candidate_05_pink_emoji_wall.svg" alt="pink_emoji_wall"/>
      <div class="label">pink_emoji_wall</div>
      <div class="num">#05</div>
    </div>
    <div class="card">
      <img src="candidate_06_orange_spotlight.svg" alt="orange_spotlight"/>
      <div class="label">orange_spotlight</div>
      <div class="num">#06</div>
    </div>
    <div class="card">
      <img src="candidate_07_cyan_explorer.svg" alt="cyan_explorer"/>
      <div class="label">cyan_explorer</div>
      <div class="num">#07</div>
    </div>
    <div class="card">
      <img src="candidate_08_indigo_galaxy.svg" alt="indigo_galaxy"/>
      <div class="label">indigo_galaxy</div>
      <div class="num">#08</div>
    </div>
    <div class="card">
      <img src="candidate_09_red_target.svg" alt="red_target"/>
      <div class="label">red_target</div>
      <div class="num">#09</div>
    </div>
    <div class="card">
      <img src="candidate_10_white_minimal.svg" alt="white_minimal"/>
      <div class="label">white_minimal</div>
      <div class="num">#10</div>
    </div>
  </div>
</body>
</html>
