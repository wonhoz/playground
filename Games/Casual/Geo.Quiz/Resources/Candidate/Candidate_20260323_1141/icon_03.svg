<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 슬레이트 -->
  <rect width="1024" height="1024" rx="180" fill="#1A1A2E"/>
  <!-- Layer 2: 국기 그리드 퀴즈 UI -->
  <!-- 국기 카드들 (2×3) -->
  <!-- 일본 스타일 -->
  <rect x="120" y="200" width="220" height="150" rx="12" fill="white"/>
  <circle cx="230" cy="275" r="50" fill="#BC002D"/>
  <!-- 프랑스 스타일 -->
  <rect x="360" y="200" width="220" height="150" rx="12" fill="#002395"/>
  <rect x="420" y="200" width="74" height="150" rx="0" fill="white"/>
  <rect x="494" y="200" width="86" height="150" rx="0" fill="#ED2939"/>
  <!-- 독일 스타일 -->
  <rect x="600" y="200" width="220" height="150" rx="12" fill="#000000"/>
  <rect x="600" y="250" width="220" height="50" fill="#DD0000"/>
  <rect x="600" y="300" width="220" height="50" rx="0" fill="#FFCE00"/>
  <!-- 브라질 스타일 (초록+노랑) -->
  <rect x="120" y="370" width="220" height="150" rx="12" fill="#009C3B"/>
  <polygon points="230,385 340,445 230,505 120,445" fill="#FFDF00"/>
  <circle cx="230" cy="445" r="36" fill="#002776"/>
  <!-- ? 카드 1 -->
  <rect x="360" y="370" width="220" height="150" rx="12" fill="#333"/>
  <text x="470" y="462" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FFFF00" text-anchor="middle">?</text>
  <!-- ? 카드 2 -->
  <rect x="600" y="370" width="220" height="150" rx="12" fill="#444"/>
  <text x="710" y="462" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FF4081" text-anchor="middle">?</text>
  <!-- Layer 3: 정답 선택 UI -->
  <text x="512" y="620" font-family="Arial" font-size="40" fill="#888" text-anchor="middle">Which country?</text>
  <rect x="160" y="660" width="200" height="70" rx="12" fill="#1976D2"/>
  <text x="260" y="703" font-family="Arial" font-size="30" fill="white" text-anchor="middle">Japan</text>
  <rect x="412" y="660" width="200" height="70" rx="12" fill="#333"/>
  <text x="512" y="703" font-family="Arial" font-size="30" fill="#888" text-anchor="middle">Korea</text>
  <rect x="664" y="660" width="200" height="70" rx="12" fill="#333"/>
  <text x="764" y="703" font-family="Arial" font-size="30" fill="#888" text-anchor="middle">China</text>
</svg>
