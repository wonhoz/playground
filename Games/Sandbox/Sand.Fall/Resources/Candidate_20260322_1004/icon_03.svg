  <rect x="808" y="534" width="5" height="10" rx="1" fill="#FF6D00"/>
  <rect x="817" y="534" width="5" height="10" rx="1" fill="#FF6D00"/>
  <rect x="826" y="534" width="5" height="10" rx="1" fill="#FF6D00"/>
  <rect x="835" y="534" width="5" height="10" rx="1" fill="#FF6D00"/>

