    <path d="M 630 644 Q 660 614 624 604" fill="none" stroke="#FDE68A" stroke-width="8" stroke-linecap="round"/>
    <polygon points="624,604 618,622 635,616" fill="#FDE68A"/>
    <!-- 별 장식 -->
    <path d="M 800 750 L 810 775 L 835 785 L 810 795 L 800 820 L 790 795 L 765 785 L 790 775 Z" fill="#FDE68A" opacity="0.8"/>
    <path d="M 220 280 L 228 298 L 246 306 L 228 314 L 220 332 L 212 314 L 194 306 L 212 298 Z" fill="#FDE68A" opacity="0.6"/>
  </g>
