<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <linearGradient id="nib" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c0ff"/>
      <stop offset="50%" stop-color="#8080ff"/>
      <stop offset="100%" stop-color="#4040cc"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff79c6"/>
      <stop offset="100%" stop-color="#bd93f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pen body -->
  <rect x="220" y="80" width="72" height="240" rx="10" fill="url(#nib)" opacity="0.9"/>
  <!-- Pen nib -->
  <path d="M220 320 L256 400 L292 320 Z" fill="url(#nib)" filter="url(#glow)"/>
  <!-- Nib split line -->
  <line x1="256" y1="340" x2="256" y2="400" stroke="url(#ink)" stroke-width="2" opacity="0.7"/>
  <!-- Ink drop -->
  <ellipse cx="256" cy="440" rx="14" ry="20" fill="url(#ink)" filter="url(#glow)"/>
  <!-- Pen clip -->
  <rect x="284" y="80" width="10" height="200" rx="5" fill="url(#nib)" opacity="0.6"/>
  <!-- Decorative rings -->
  <rect x="220" y="290" width="72" height="10" rx="5" fill="url(#ink)" opacity="0.7"/>
  <rect x="220" y="270" width="72" height="8" rx="4" fill="url(#ink)" opacity="0.5"/>
  <!-- Ink trail -->
  <path d="M256 440 C280 450 320 430 340 460 C360 490 300 500 256 480" stroke="url(#ink)" stroke-width="3" fill="none" opacity="0.5" filter="url(#glow)"/>
  <!-- Bezier path preview -->
  <path d="M80 200 C120 140 180 280 256 220 C332 160 380 280 440 200" stroke="url(#ink)" stroke-width="2.5" fill="none" opacity="0.4" filter="url(#glow)"/>
</svg>