<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <clipPath id="c7"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Warm amber background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g7)"/>
  <g clip-path="url(#c7)">
    <!-- Layer 2: Folder icon with terminal inside -->
    <!-- Folder tab -->
    <rect x="200" y="290" width="260" height="80" rx="20" fill="#D97706"/>
    <!-- Folder body -->
    <rect x="200" y="358" width="624" height="430" rx="24" fill="#F59E0B"/>
    <!-- Folder inner shadow / depth -->
    <rect x="218" y="376" width="588" height="395" rx="18" fill="#FBBF24"/>
    <!-- Terminal prompt inside folder -->
    <rect x="240" y="400" width="544" height="340" rx="16" fill="#1C1917"/>
    <!-- Terminal header bar -->
    <rect x="240" y="400" width="544" height="50" rx="16" fill="#292524"/>
    <rect x="240" y="428" width="544" height="22" fill="#292524"/>
    <circle cx="274" cy="425" r="11" fill="#EF4444"/>
    <circle cx="304" cy="425" r="11" fill="#F59E0B"/>
    <circle cx="334" cy="425" r="11" fill="#22C55E"/>
    <!-- >_ inside terminal -->
    <text x="262" y="590" font-family="Consolas,monospace" font-size="160" fill="#34D399" font-weight="bold">&gt;_</text>
    <!-- Layer 3: Right-click badge on folder tab -->
    <circle cx="502" cy="320" r="60" fill="#B45309"/>
    <text x="502" y="296" font-family="Arial Black,Arial,sans-serif" font-size="42" fill="white" font-weight="900" text-anchor="middle">RIGHT</text>
    <text x="502" y="348" font-family="Arial Black,Arial,sans-serif" font-size="42" fill="#FDE68A" font-weight="900" text-anchor="middle">CLICK</text>
  </g>
</svg>
