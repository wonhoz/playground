  <!-- File stack (3 files) -->
  <!-- Back file -->
  <rect x="280" y="220" width="340" height="420" rx="20" fill="#002A36" stroke="#00ACC1" stroke-width="14" opacity="0.5"/>
  <!-- Middle file -->
  <rect x="300" y="240" width="340" height="420" rx="20" fill="#003544" stroke="#00ACC1" stroke-width="16" opacity="0.75"/>
  <!-- Front file -->
  <rect x="320" y="260" width="340" height="420" rx="20" fill="#004250" stroke="#00E5FF" stroke-width="18"/>
  <!-- Waveform on front -->
  <rect x="360" y="360" width="16" height="120" rx="8" fill="#00E5FF" opacity="0.5"/>
  <rect x="390" y="320" width="16" height="200" rx="8" fill="#00E5FF" opacity="0.7"/>
  <rect x="420" y="340" width="16" height="160" rx="8" fill="#00E5FF" opacity="0.9"/>
  <rect x="450" y="380" width="16" height="80" rx="8" fill="#00E5FF" opacity="0.7"/>
  <rect x="480" y="310" width="16" height="220" rx="8" fill="#00E5FF" opacity="0.8"/>
  <rect x="510" y="350" width="16" height="140" rx="8" fill="#00E5FF" opacity="0.6"/>
  <rect x="540" y="390" width="16" height="60" rx="8" fill="#00E5FF" opacity="0.5"/>
  <rect x="570" y="330" width="16" height="180" rx="8" fill="#00E5FF" opacity="0.7"/>
  <!-- Tag arrow pointing to file -->
  <path d="M700 480 L820 480 M780 440 L820 480 L780 520" fill="none" stroke="#FF7043" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="680" y="560" width="160" height="80" rx="14" fill="#BF360C" stroke="#FF7043" stroke-width="16"/>
  <circle cx="706" cy="600" r="14" fill="#001820" stroke="#FF7043" stroke-width="8"/>
  <rect x="730" y="590" width="88" height="12" rx="6" fill="#FF7043" opacity="0.8"/>
  <rect x="730" y="610" width="66" height="12" rx="6" fill="#FF7043" opacity="0.6"/>
</svg>
