<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9F99D"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <clipPath id="c7"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Lime/green gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g7)"/>
  <g clip-path="url(#c7)">
    <!-- Layer 2: Small image frame (bottom-left) -->
    <rect x="116" y="658" width="214" height="170" rx="16" fill="#DCFCE7" stroke="#15803D" stroke-width="10"/>
    <!-- Mountain in small frame -->
    <polygon points="223,678 293,820 153,820" fill="#86EFAC"/>
    <rect x="116" y="658" width="214" height="84" rx="16" fill="#A7F3D0" opacity="0.6"/>
    <!-- Layer 2: Large image frame (top-right, 4× area) -->
    <rect x="484" y="218" width="428" height="340" rx="24" fill="#F0FDF4" stroke="#166534" stroke-width="14"/>
    <!-- Mountain in large frame -->
    <polygon points="698,248 868,538 528,538" fill="#4ADE80"/>
    <rect x="484" y="218" width="428" height="170" rx="24" fill="#86EFAC" opacity="0.6"/>
    <!-- Layer 3: Bold diagonal arrow -->
    <line x1="340" y1="744" x2="480" y2="554" stroke="#15803D" stroke-width="72" stroke-linecap="round"/>
    <polygon points="456,596 526,468 570,590" fill="#15803D"/>
    <!-- Scale factor badge -->
    <rect x="294" y="592" width="184" height="84" rx="18" fill="#166534"/>
    <text x="386" y="654" font-family="Arial Black,Arial,sans-serif" font-size="88" fill="white" font-weight="900" text-anchor="middle">4×</text>
    <!-- Image size hints -->
    <text x="223" y="866" font-family="Arial,sans-serif" font-size="80" fill="#166534" font-weight="bold" text-anchor="middle">100px</text>
    <text x="698" y="594" font-family="Arial,sans-serif" font-size="80" fill="#166534" font-weight="bold" text-anchor="middle">400px</text>
  </g>
</svg>
