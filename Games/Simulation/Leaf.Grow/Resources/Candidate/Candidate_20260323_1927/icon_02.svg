  <text x="280" y="770" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">SEED</text>
  <!-- 화살표 1 -->
  <path d="M 368,620 L 428,610" stroke="white" stroke-width="14" stroke-linecap="round"/>
