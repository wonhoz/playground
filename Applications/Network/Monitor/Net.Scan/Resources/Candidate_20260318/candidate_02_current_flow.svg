<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#2DD4BF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 흐름 경로들 -->
  <path d="M 80 180 Q 180 150 256 180 Q 332 210 432 180" fill="none" stroke="url(#flow)" stroke-width="4" filter="url(#glow)"/>
  <path d="M 80 240 Q 180 215 256 240 Q 332 265 432 240" fill="none" stroke="#14B8A6" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  <path d="M 80 300 Q 180 275 256 300 Q 332 325 432 300" fill="none" stroke="#2DD4BF" stroke-width="2.5" opacity="0.6"/>
  <path d="M 80 360 Q 180 335 256 360 Q 332 385 432 360" fill="none" stroke="#14B8A6" stroke-width="2" opacity="0.4"/>
  <!-- 패킷 점들 (흐름 위) -->
  <circle cx="160" cy="175" r="7" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="300" cy="238" r="6" fill="#2DD4BF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="400" cy="178" r="5" fill="#14B8A6" opacity="0.7"/>
  <circle cx="120" cy="299" r="6" fill="#2DD4BF" opacity="0.7"/>
  <circle cx="380" cy="298" r="5" fill="#14B8A6" opacity="0.6"/>
  <!-- 스캐너 게이트 -->
  <line x1="256" y1="140" x2="256" y2="400" stroke="#14B8A6" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <rect x="240" y="140" width="32" height="260" rx="4" fill="#14B8A6" opacity="0.05"/>
  <!-- 스캔 표시 -->
  <rect x="235" y="155" width="42" height="240" rx="6" fill="none" stroke="#14B8A6" stroke-width="2" stroke-dasharray="6,4" filter="url(#glow)"/>
  <text x="256" y="430" text-anchor="middle" fill="#14B8A6" font-size="14" font-family="monospace" opacity="0.7">SCAN</text>
</svg>