<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c9-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c9-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="c9-paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c9-clip)">
    <!-- Background: warm amber/cream -->
    <rect width="1024" height="1024" fill="url(#c9-bg)"/>

    <!-- Clipboard body -->
    <rect x="260" y="220" width="504" height="620" rx="24" fill="url(#c9-paper)" stroke="#D4A017" stroke-width="6"/>
    <!-- Clipboard top clip -->
    <rect x="400" y="200" width="224" height="60" rx="14" fill="#D4A017"/>
    <rect x="460" y="196" width="104" height="28" rx="12" fill="#B8880A"/>

    <!-- Checklist rows -->
    <!-- Row 1: checked (임시파일) -->
    <circle cx="320" cy="358" r="22" fill="#2ECC71"/>
    <polyline points="308,358 318,370 338,344" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="362" y="344" width="200" height="16" rx="4" fill="#D4A017" opacity="0.40"/>
    <rect x="362" y="366" width="140" height="12" rx="4" fill="#D4A017" opacity="0.25"/>

    <!-- Row 2: checked (브라우저 캐시) -->
    <circle cx="320" cy="454" r="22" fill="#2ECC71"/>
    <polyline points="308,454 318,466 338,440" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="362" y="440" width="260" height="16" rx="4" fill="#D4A017" opacity="0.40"/>
    <rect x="362" y="462" width="180" height="12" rx="4" fill="#D4A017" opacity="0.25"/>

    <!-- Row 3: checked (레지스트리) -->
    <circle cx="320" cy="550" r="22" fill="#2ECC71"/>
    <polyline points="308,550 318,562 338,538" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="362" y="536" width="220" height="16" rx="4" fill="#D4A017" opacity="0.40"/>
    <rect x="362" y="558" width="160" height="12" rx="4" fill="#D4A017" opacity="0.25"/>

    <!-- Row 4: checked (시작프로그램) -->
    <circle cx="320" cy="646" r="22" fill="#2ECC71"/>
    <polyline points="308,646 318,658 338,634" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="362" y="632" width="240" height="16" rx="4" fill="#D4A017" opacity="0.40"/>
    <rect x="362" y="654" width="170" height="12" rx="4" fill="#D4A017" opacity="0.25"/>

    <!-- Row 5: checked (설치앱 정리) -->
    <circle cx="320" cy="742" r="22" fill="#2ECC71"/>
    <polyline points="308,742 318,754 338,730" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="362" y="728" width="190" height="16" rx="4" fill="#D4A017" opacity="0.40"/>
    <rect x="362" y="750" width="130" height="12" rx="4" fill="#D4A017" opacity="0.25"/>

    <!-- Pen/pencil (right corner) -->
    <rect x="680" y="520" width="36" height="200" rx="8" fill="#F39C12" transform="rotate(-20 698 620)"/>
    <polygon points="710,690 686,690 698,730" fill="#C8860A" transform="rotate(-20 698 620)"/>
    <rect x="680" y="510" width="36" height="30" rx="4" fill="#E0E0E0" transform="rotate(-20 698 620)"/>
  </g>
</svg>
