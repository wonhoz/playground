<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: Layered QR code cards showing different QR outputs -->
  <!-- Card 3 (back) - URL QR -->
  <rect x="300" y="220" width="480" height="480" rx="20" fill="#7C3AED" opacity="0.45"/>
  <!-- Card 2 - Text QR -->
  <rect x="250" y="260" width="480" height="480" rx="20" fill="#2563EB" opacity="0.55"/>
  <!-- Card 1 (front) - Main QR with visible code -->
  <rect x="200" y="300" width="480" height="480" rx="20" fill="white" opacity="0.95"/>
  <!-- QR code pattern (simplified) -->
  <rect x="240" y="340" width="100" height="100" rx="8" fill="#1F2937"/>
  <rect x="260" y="360" width="60" height="60" rx="4" fill="white"/>
  <rect x="275" y="375" width="30" height="30" fill="#1F2937"/>
  <rect x="540" y="340" width="100" height="100" rx="8" fill="#1F2937"/>
  <rect x="560" y="360" width="60" height="60" rx="4" fill="white"/>
  <rect x="575" y="375" width="30" height="30" fill="#1F2937"/>
  <rect x="240" y="640" width="100" height="100" rx="8" fill="#1F2937"/>
  <rect x="260" y="660" width="60" height="60" rx="4" fill="white"/>
  <rect x="275" y="675" width="30" height="30" fill="#1F2937"/>
  <!-- QR data cells (simplified pattern) -->
  <rect x="360" y="340" width="22" height="22" fill="#1F2937"/>
  <rect x="392" y="340" width="22" height="22" fill="#1F2937"/>
  <rect x="424" y="340" width="22" height="22" fill="#1F2937"/>
  <rect x="360" y="372" width="22" height="22" fill="#1F2937"/>
  <rect x="424" y="372" width="22" height="22" fill="#1F2937"/>
  <rect x="456" y="372" width="22" height="22" fill="#1F2937"/>
  <rect x="360" y="404" width="22" height="22" fill="#1F2937"/>
  <rect x="392" y="404" width="22" height="22" fill="#1F2937"/>
  <rect x="488" y="404" width="22" height="22" fill="#1F2937"/>
  <rect x="360" y="436" width="22" height="22" fill="#1F2937"/>
  <rect x="456" y="436" width="22" height="22" fill="#1F2937"/>
  <rect x="488" y="436" width="22" height="22" fill="#1F2937"/>
  <!-- Layer 3: Label strip at bottom -->
  <rect x="210" y="800" width="600" height="80" rx="20" fill="#F59E0B"/>
  <text x="512" y="854" font-family="Arial" font-size="58" fill="white" text-anchor="middle" font-weight="bold">QR Forge</text>
</svg>
