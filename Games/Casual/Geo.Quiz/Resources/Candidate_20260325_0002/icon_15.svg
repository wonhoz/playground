<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0A1929"/>
  <!-- 세계지도 배경 (희미) -->
  <!-- 대륙 실루엣 단순화 -->
  <ellipse cx="350" cy="380" rx="140" ry="90" fill="white" opacity="0.06"/>
  <ellipse cx="550" cy="350" rx="100" ry="80" fill="white" opacity="0.06"/>
  <ellipse cx="650" cy="450" rx="70" ry="110" fill="white" opacity="0.06"/>
  <ellipse cx="380" cy="550" rx="110" ry="70" fill="white" opacity="0.06"/>
  <!-- Layer 2: 점수판 -->
  <rect x="220" y="280" width="584" height="420" rx="24" fill="white" opacity="0.95"/>
  <!-- 점수판 헤더 -->
  <rect x="220" y="280" width="584" height="90" rx="24" fill="#1565C0"/>
  <rect x="220" y="340" width="584" height="30" fill="#1565C0"/>
  <text x="512" y="344" text-anchor="middle" font-family="Arial Black" font-size="68" font-weight="900" fill="white">RESULT</text>
  <!-- 점수 -->
  <text x="512" y="500" text-anchor="middle" font-family="Arial Black" font-size="180" font-weight="900" fill="#00E676">10/10</text>
  <!-- 별 5개 -->
  <text x="512" y="610" text-anchor="middle" font-family="Arial" font-size="90">⭐⭐⭐⭐⭐</text>
  <!-- 완벽 텍스트 -->
  <text x="512" y="680" text-anchor="middle" font-family="Arial Black" font-size="66" font-weight="900" fill="#1565C0">PERFECT!</text>
  <!-- Layer 3: 장식 -->
  <text x="260" y="870" font-size="70" text-anchor="middle">🎉</text>
  <text x="764" y="870" font-size="70" text-anchor="middle">🏆</text>
</svg>