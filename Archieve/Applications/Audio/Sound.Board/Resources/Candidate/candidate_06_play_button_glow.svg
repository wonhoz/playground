<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#000510"/>
    </radialGradient>
    <radialGradient id="circle" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#4527a0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#circle)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#b388ff" stroke-width="3" opacity="0.5"/>
  <polygon points="210,170 210,342 370,256" fill="white" opacity="0.95" filter="url(#glow)"/>
  <!-- Sound rings -->
  <path d="M390,180 Q440,256 390,332" stroke="#b388ff" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M415,155 Q480,256 415,357" stroke="#7c4dff" stroke-width="4" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>