  <!-- Header labels -->
  <rect x="84" y="158" width="80" height="10" rx="5" fill="#FFF3E0" opacity="0.9"/>
  <rect x="212" y="158" width="80" height="10" rx="5" fill="#FFF3E0" opacity="0.9"/>
  <rect x="340" y="158" width="80" height="10" rx="5" fill="#FFF3E0" opacity="0.9"/>
  <!-- Data content -->
  <rect x="84" y="218" width="88" height="10" rx="5" fill="#FFCC80" opacity="0.8"/>
  <rect x="212" y="218" width="60" height="10" rx="5" fill="#FFCC80" opacity="0.8"/>
  <rect x="340" y="218" width="80" height="10" rx="5" fill="#FFCC80" opacity="0.8"/>
  <rect x="84" y="282" width="60" height="10" rx="5" fill="#FFE0B2" opacity="0.7"/>
  <rect x="212" y="282" width="88" height="10" rx="5" fill="#FFE0B2" opacity="0.7"/>
  <rect x="340" y="282" width="50" height="10" rx="5" fill="#FFE0B2" opacity="0.7"/>
  <rect x="84" y="346" width="80" height="10" rx="5" fill="#FFE0B2" opacity="0.6"/>
  <rect x="212" y="346" width="40" height="10" rx="5" fill="#FFE0B2" opacity="0.6"/>
  <rect x="340" y="346" width="88" height="10" rx="5" fill="#FFE0B2" opacity="0.6"/>
