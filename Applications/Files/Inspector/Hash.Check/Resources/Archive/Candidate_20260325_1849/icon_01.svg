<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <clipPath id="bgClip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: 파일 아이콘 -->
  <!-- 파일 본체 (우상단 귀 접힘) -->
  <path d="M 290,90 L 570,90 L 690,210 L 690,530 L 290,530 Z" fill="white" opacity="0.97"/>
  <!-- 귀 접힘 -->
  <path d="M 570,90 L 690,210 L 570,210 Z" fill="#93C5FD"/>
  <!-- 파일 내용 줄 -->
  <rect x="340" y="290" width="220" height="20" rx="10" fill="#BFDBFE"/>
  <rect x="340" y="330" width="270" height="20" rx="10" fill="#BFDBFE"/>
  <rect x="340" y="370" width="170" height="20" rx="10" fill="#BFDBFE"/>
  <rect x="340" y="410" width="240" height="20" rx="10" fill="#BFDBFE"/>

  <!-- SHA256 라벨 배경 -->
  <rect x="230" y="572" width="564" height="76" rx="16" fill="rgba(0,0,0,0.38)"/>
  <!-- SHA256 텍스트 -->
  <text x="512" y="626" text-anchor="middle" font-family="Consolas, 'Courier New', monospace"
        font-size="56" font-weight="bold" fill="#FCD34D">SHA256</text>

  <!-- Layer 3: 해시값 텍스트 박스 -->
  <rect x="170" y="672" width="684" height="76" rx="16" fill="rgba(0,0,0,0.38)"/>
  <text x="512" y="722" text-anchor="middle" font-family="Consolas, 'Courier New', monospace"
        font-size="42" fill="#86EFAC">a3f8 c0d2 e1b5 ···</text>

  <!-- 검증 완료 뱃지 (우하단) -->
  <circle cx="780" cy="820" r="88" fill="url(#shieldG)" stroke="white" stroke-width="8"/>
  <path d="M 748,820 L 773,845 L 818,793" stroke="white" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
