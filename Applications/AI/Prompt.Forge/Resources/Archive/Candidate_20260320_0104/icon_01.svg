<!-- Prompt.Forge icon_01: 도장 날인 (rubber stamp: seal/publish prompt) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#150A20"/>
  <!-- Stamp handle -->
  <rect x="400" y="160" width="224" height="160" rx="24" fill="#7B1FA2"/>
  <!-- Neck -->
  <rect x="452" y="310" width="120" height="80" rx="12" fill="#9C27B0"/>
  <!-- Stamp base -->
  <rect x="260" y="380" width="504" height="130" rx="20" fill="#9C27B0"/>
  <!-- Impression (ink) -->
  <rect x="240" y="580" width="544" height="220" rx="24" fill="#4A0D60"/>
  <!-- Circular seal mark in impression -->
  <circle cx="512" cy="690" r="86" fill="none" stroke="#BA68C8" stroke-width="28"/>
  <circle cx="512" cy="690" r="42" fill="#BA68C8"/>
</svg>
