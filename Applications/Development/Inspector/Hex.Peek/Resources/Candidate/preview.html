<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Hex.Peek - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #00ff88; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .card:hover { border-color: #00ff88; }
    .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .label { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .num { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Hex.Peek — Icon Candidates</h1>
  <p>16진수 파일 뷰어 아이콘 후보 10개</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_matrix_grid.svg" alt="matrix_grid"/>
      <div class="label">matrix_grid</div>
      <div class="num">#01</div>
    </div>
    <div class="card">
      <img src="candidate_02_neon_byte.svg" alt="neon_byte"/>
      <div class="label">neon_byte</div>
      <div class="num">#02</div>
    </div>
    <div class="card">
      <img src="candidate_03_amber_terminal.svg" alt="amber_terminal"/>
      <div class="label">amber_terminal</div>
      <div class="num">#03</div>
    </div>
    <div class="card">
      <img src="candidate_04_binary_ocean.svg" alt="binary_ocean"/>
      <div class="label">binary_ocean</div>
      <div class="num">#04</div>
    </div>
    <div class="card">
      <img src="candidate_05_red_inspector.svg" alt="red_inspector"/>
      <div class="label">red_inspector</div>
      <div class="num">#05</div>
    </div>
    <div class="card">
      <img src="candidate_06_teal_chip.svg" alt="teal_chip"/>
      <div class="label">teal_chip</div>
      <div class="num">#06</div>
    </div>
    <div class="card">
      <img src="candidate_07_golden_bytes.svg" alt="golden_bytes"/>
      <div class="label">golden_bytes</div>
      <div class="num">#07</div>
    </div>
    <div class="card">
      <img src="candidate_08_pink_decode.svg" alt="pink_decode"/>
      <div class="label">pink_decode</div>
      <div class="num">#08</div>
    </div>
    <div class="card">
      <img src="candidate_09_slate_viewer.svg" alt="slate_viewer"/>
      <div class="label">slate_viewer</div>
      <div class="num">#09</div>
    </div>
    <div class="card">
      <img src="candidate_10_orange_scan.svg" alt="orange_scan"/>
      <div class="label">orange_scan</div>
      <div class="num">#10</div>
    </div>
  </div>
</body>
</html>
