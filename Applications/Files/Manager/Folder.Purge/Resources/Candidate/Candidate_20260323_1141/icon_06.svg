<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#FFF8E1"/>
  <!-- Layer 2: Trash can (open lid) -->
  <!-- Lid -->
  <rect x="230" y="300" width="564" height="80" rx="16" fill="#E53935"/>
  <rect x="390" y="240" width="244" height="70" rx="16" fill="#E53935"/>
  <!-- Body -->
  <rect x="250" y="380" width="524" height="440" rx="16" fill="#E53935"/>
  <!-- Trash lines -->
  <rect x="380" y="420" width="24" height="340" rx="12" fill="white" opacity="0.5"/>
  <rect x="500" y="420" width="24" height="340" rx="12" fill="white" opacity="0.5"/>
  <rect x="620" y="420" width="24" height="340" rx="12" fill="white" opacity="0.5"/>
  <!-- Layer 3: Folders flying into trash -->
  <rect x="120" y="230" width="80" height="30" rx="8" fill="#FF8C42" transform="rotate(-20,160,245)"/>
  <rect x="110" y="252" width="100" height="70" rx="8" fill="#FF8C42" transform="rotate(-20,160,287)"/>
  <!-- Motion arc dotted line -->
  <path d="M 210 290 Q 280 220 340 360" fill="none" stroke="#E65100" stroke-width="6" stroke-dasharray="16,10"/>
  <!-- Second folder -->
  <rect x="820" y="180" width="80" height="30" rx="8" fill="#FF8C42" opacity="0.8" transform="rotate(20,860,195)"/>
  <rect x="810" y="202" width="100" height="70" rx="8" fill="#FF8C42" opacity="0.8" transform="rotate(20,860,237)"/>
  <path d="M 812 240 Q 750 200 700 350" fill="none" stroke="#E65100" stroke-width="6" stroke-dasharray="16,10"/>
</svg>