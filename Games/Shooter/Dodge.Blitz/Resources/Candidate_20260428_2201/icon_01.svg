<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B1F4A"/>
      <stop offset="1" stop-color="#0A0E27"/>
    </linearGradient>
    <radialGradient id="dia01" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7DFFE6"/>
