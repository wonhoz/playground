<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="keyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Three large key icons as main visual -->
  <!-- Key 1: Ctrl -->
  <rect x="60" y="140" width="120" height="100" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="60" y="140" width="120" height="80" rx="16" fill="url(#keyTop)"/>
  <rect x="60" y="200" width="120" height="40" rx="0" fill="#1e293b"/>
  <rect x="60" y="220" width="120" height="20" rx="16" fill="#1e293b"/>
  <text x="90" y="200" font-family="monospace" font-size="22" font-weight="bold" fill="#e2e8f0">Ctrl</text>
  <!-- Plus sign -->
  <text x="192" y="198" font-family="monospace" font-size="36" fill="#64748b">+</text>
  <!-- Key 2: Alt -->
  <rect x="228" y="140" width="120" height="100" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="228" y="140" width="120" height="80" rx="16" fill="url(#keyTop)"/>
  <rect x="228" y="200" width="120" height="40" rx="0" fill="#1e293b"/>
  <rect x="228" y="220" width="120" height="20" rx="16" fill="#1e293b"/>
  <text x="262" y="200" font-family="monospace" font-size="22" font-weight="bold" fill="#e2e8f0">Alt</text>
  <!-- Plus sign -->
  <text x="360" y="198" font-family="monospace" font-size="36" fill="#64748b">+</text>
  <!-- Key 3: highlighted -->
  <rect x="396" y="120" width="76" height="120" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="396" y="120" width="76" height="100" rx="16" fill="#f1f5f9"/>
  <rect x="396" y="195" width="76" height="45" rx="0" fill="#e2e8f0"/>
  <rect x="396" y="220" width="76" height="20" rx="16" fill="#e2e8f0"/>
  <text x="416" y="170" font-family="monospace" font-size="28" font-weight="bold" fill="#1e293b">F5</text>
  <!-- Arrow decoration -->
  <line x1="256" y1="290" x2="256" y2="330" stroke="#334155" stroke-width="2.5" stroke-dasharray="5,4"/>
  <polygon points="256,340 246,322 266,322" fill="#334155"/>
  <!-- Action label box -->
  <rect x="100" y="348" width="312" height="52" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="156" y="376" font-family="monospace" font-size="18" fill="#94a3b8">Refresh</text>
  <text x="256" y="394" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">Hotkey action bound</text>
  <!-- Keyboard rows below showing context -->
  <rect x="60" y="420" width="392" height="52" rx="10" fill="#1e293b" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="80" y="432" font-family="monospace" font-size="10" fill="#475569">Q W E R T Y U I O P [ ] \</text>
  <text x="80" y="448" font-family="monospace" font-size="10" fill="#475569">A S D F G H J K L ; '</text>
  <text x="80" y="464" font-family="monospace" font-size="10" fill="#475569">Z X C V B N M , . / Enter</text>
</svg>
