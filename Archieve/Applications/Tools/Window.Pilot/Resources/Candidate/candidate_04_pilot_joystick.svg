<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <radialGradient id="stickGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </radialGradient>
    <radialGradient id="baseGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="btnRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 조이스틱 베이스 -->
  <ellipse cx="256" cy="370" rx="140" ry="50" fill="url(#baseGrad)" filter="url(#shadow)"/>
  <ellipse cx="256" cy="360" rx="140" ry="46" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <ellipse cx="256" cy="355" rx="120" ry="38" fill="#111827"/>
  <!-- 조이스틱 스틱 -->
  <rect x="238" y="160" width="36" height="210" rx="18" fill="url(#stickGrad)"/>
  <!-- 조이스틱 헤드 -->
  <circle cx="256" cy="150" r="60" fill="url(#stickGrad)" filter="url(#shadow)"/>
  <circle cx="256" cy="142" r="55" fill="#9ca3af"/>
  <!-- 빨간 버튼 -->
  <circle cx="256" cy="128" r="22" fill="url(#btnRed)"/>
  <circle cx="250" cy="122" r="8" fill="#fca5a5" opacity="0.5"/>
  <!-- 창 아이콘 (헤드에) -->
  <rect x="232" y="148" width="18" height="14" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <rect x="254" y="148" width="18" height="14" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <rect x="232" y="166" width="18" height="14" rx="2" fill="#1d4ed8" opacity="0.5"/>
  <rect x="254" y="166" width="18" height="14" rx="2" fill="#1d4ed8" opacity="0.5"/>
  <!-- 베이스 버튼들 -->
  <circle cx="176" cy="348" r="14" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <circle cx="214" cy="355" r="10" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <circle cx="298" cy="355" r="10" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <circle cx="336" cy="348" r="14" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
</svg>
