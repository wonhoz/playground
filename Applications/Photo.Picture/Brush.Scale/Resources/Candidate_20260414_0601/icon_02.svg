<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="mainCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF0F5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg2)"/>

  <!-- White card -->
  <rect x="80" y="110" width="864" height="700" rx="32" fill="url(#mainCard)" stroke="#880E4F" stroke-width="16"/>

  <!-- Central 4x mega badge -->
  <rect x="200" y="148" width="624" height="280" rx="40" fill="#E91E63" stroke="#880E4F" stroke-width="18"/>
  <text x="512" y="352" font-family="Arial Black, sans-serif" font-weight="900" font-size="240" fill="#FFFFFF" text-anchor="middle">4x</text>

  <!-- Image size comparison below badge -->
  <!-- Small image (before) -->
  <rect x="116" y="470" width="160" height="160" rx="20" fill="#FFFFFF" stroke="#880E4F" stroke-width="14"/>
  <rect x="130" y="484" width="132" height="100" rx="10" fill="#FCE4EC" stroke="#880E4F" stroke-width="8"/>
  <polygon points="140,574 190,520 220,550 250,505 268,574" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <rect x="130" y="596" width="132" height="18" rx="6" fill="#E91E63" stroke="#880E4F" stroke-width="5"/>
  <!-- Pixel size label -->
  <rect x="116" y="643" width="160" height="50" rx="16" fill="#FF6B9D" stroke="#880E4F" stroke-width="10"/>
  <text x="196" y="676" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">512px</text>

  <!-- Arrow between cards -->
  <rect x="294" y="528" width="88" height="40" rx="16" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <polygon points="382,504 442,548 382,592" fill="#880E4F" stroke="#880E4F" stroke-width="10" stroke-linejoin="round"/>

  <!-- Large image (after) -->
  <rect x="448" y="440" width="240" height="240" rx="24" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>
  <rect x="464" y="456" width="208" height="160" rx="12" fill="#FCE4EC" stroke="#880E4F" stroke-width="10"/>
  <!-- Sharp crisp landscape -->
  <polygon points="474,606 544,520 590,565 640,510 662,606" fill="#E91E63" stroke="#880E4F" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="474,606 544,565 590,588 640,555 662,606" fill="#FF6B9D" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="640" cy="480" r="30" fill="#FFD93D" stroke="#880E4F" stroke-width="8"/>
  <rect x="464" y="628" width="208" height="36" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="8"/>
  <!-- Pixel size label -->
  <rect x="448" y="695" width="240" height="58" rx="20" fill="#880E4F" stroke="#5D0C36" stroke-width="10"/>
  <text x="568" y="735" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">2048px</text>

  <!-- AI badge -->
  <rect x="730" y="475" width="170" height="80" rx="24" fill="#FF6B9D" stroke="#880E4F" stroke-width="12"/>
  <text x="815" y="528" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">AI</text>

  <!-- Title -->
  <rect x="162" y="830" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="895" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
