<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Supernova explosion concentric rings -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020510"/>
  <!-- Outer shockwave rings (expanding) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#BF360C" stroke-width="8" opacity="0.25"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#E65100" stroke-width="10" opacity="0.35"/>
  <circle cx="512" cy="512" r="295" fill="none" stroke="#E65100" stroke-width="12" opacity="0.45"/>
  <circle cx="512" cy="512" r="248" fill="none" stroke="#E65100" stroke-width="14" opacity="0.55"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#FF6D00" stroke-width="16" opacity="0.65"/>
  <circle cx="512" cy="512" r="152" fill="none" stroke="#FF6D00" stroke-width="18" opacity="0.75"/>
  <circle cx="512" cy="512" r="106" fill="none" stroke="#FF8F00" stroke-width="20" opacity="0.8"/>
  <!-- Emission jet spikes (4 cardinal directions) -->
  <line x1="512" y1="406" x2="512" y2="148" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="618" y1="512" x2="876" y2="512" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="618" x2="512" y2="876" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="406" y1="512" x2="148" y2="512" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Diagonal jet spikes -->
  <line x1="589" y1="435" x2="752" y2="272" stroke="#E65100" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <line x1="589" y1="589" x2="752" y2="752" stroke="#E65100" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <line x1="435" y1="589" x2="272" y2="752" stroke="#E65100" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <line x1="435" y1="435" x2="272" y2="272" stroke="#E65100" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <!-- Core (compressed star remnant) -->
  <circle cx="512" cy="512" r="60" fill="#E65100" opacity="0.6"/>
  <circle cx="512" cy="512" r="40" fill="#FF8F00"/>
  <circle cx="512" cy="512" r="24" fill="#FFAB00"/>
  <circle cx="512" cy="512" r="12" fill="#FFD740"/>
  <!-- Debris particles -->
  <circle cx="340" cy="280" r="10" fill="#E65100" opacity="0.7"/>
  <circle cx="700" cy="260" r="8" fill="#FF6D00" opacity="0.65"/>
  <circle cx="780" cy="680" r="9" fill="#E65100" opacity="0.6"/>
  <circle cx="240" cy="720" r="8" fill="#FF6D00" opacity="0.6"/>
  <circle cx="800" cy="380" r="7" fill="#E65100" opacity="0.55"/>
  <circle cx="200" cy="360" r="7" fill="#FF6D00" opacity="0.5"/>
</svg>
