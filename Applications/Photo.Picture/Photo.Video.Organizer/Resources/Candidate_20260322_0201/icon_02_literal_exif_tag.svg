<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg-grad-02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B5E"/>
      <stop offset="100%" stop-color="#1A4A8A"/>
    </linearGradient>
    <linearGradient id="chip-grad-02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A5BAF"/>
      <stop offset="100%" stop-color="#1E3F7A"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg-grad-02)"/>

  <!-- 카메라 실루엣 (중앙 상단) -->
  <rect x="262" y="160" width="500" height="340" rx="40" fill="#1E3D6E" stroke="#4A90D9" stroke-width="4"/>
  <!-- 렌즈 -->
  <circle cx="512" cy="330" r="120" fill="#0A1E3C" stroke="#4A90D9" stroke-width="6"/>
  <circle cx="512" cy="330" r="80" fill="#1A3266" stroke="#2A6AB8" stroke-width="3"/>
  <circle cx="512" cy="330" r="40" fill="#0D1F45"/>
  <circle cx="512" cy="330" r="20" fill="#4A90D9" opacity="0.6"/>
  <!-- 뷰파인더 -->
  <rect x="420" y="175" width="120" height="55" rx="10" fill="#2A5BAF"/>
  <!-- 셔터 버튼 -->
  <circle cx="680" cy="195" r="28" fill="#4A90D9"/>

  <!-- EXIF 태그 칩들 카메라 아래로 연결되는 선 -->
  <line x1="512" y1="500" x2="512" y2="560" stroke="#4A90D9" stroke-width="4" stroke-dasharray="8,6"/>

  <!-- 태그 칩 1: 날짜 -->
  <rect x="160" y="560" width="300" height="72" rx="36" fill="url(#chip-grad-02)" stroke="#5BA3E8" stroke-width="2"/>
  <text x="310" y="604" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#7DC4FF">2024-07-15</text>
  <!-- 연결선 좌 -->
  <line x1="310" y1="560" x2="430" y2="560" stroke="#4A90D9" stroke-width="3"/>
  <line x1="430" y1="560" x2="512" y2="560" stroke="#4A90D9" stroke-width="3"/>

  <!-- 태그 칩 2: 위치 -->
  <rect x="560" y="560" width="300" height="72" rx="36" fill="url(#chip-grad-02)" stroke="#5BA3E8" stroke-width="2"/>
  <text x="710" y="604" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#7DC4FF">도쿄, JP</text>
  <!-- 연결선 우 -->
  <line x1="560" y1="560" x2="594" y2="560" stroke="#4A90D9" stroke-width="3"/>

  <!-- 파일명 출력 화살표 -->
  <path d="M 440 680 L 584 680 L 584 650 L 640 700 L 584 750 L 584 720 L 440 720 Z"
        fill="#F0A830" stroke="#CC8800" stroke-width="2" stroke-linejoin="round"/>

  <!-- 결과 파일명 -->
  <rect x="90" y="790" width="844" height="90" rx="16" fill="#0A1E3C" stroke="#4A90D9" stroke-width="2"/>
  <text x="512" y="848" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="700" fill="#7DC4FF">2024-07-15_도쿄.jpg</text>
</svg>
