<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#160804"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Quantum orbital paths (3 axes) -->
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.35" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-opacity="0.35" transform="rotate(120 256 256)"/>

  <!-- Quantum particles (document fragments in superposition) -->
  <!-- State 1: top orbit -->
  <g filter="url(#glow)">
    <circle cx="456" cy="256" r="12" fill="#F97316"/>
    <circle cx="456" cy="256" r="7" fill="white" fill-opacity="0.4"/>
  </g>
  <!-- State 2: rotated orbit -->
  <g transform="rotate(60 256 256)" filter="url(#glow)">
    <circle cx="456" cy="256" r="10" fill="#EF4444"/>
    <circle cx="456" cy="256" r="6" fill="white" fill-opacity="0.35"/>
  </g>
  <!-- State 3: another orbit -->
  <g transform="rotate(120 256 256)" filter="url(#glow)">
    <circle cx="456" cy="256" r="10" fill="#DC2626"/>
    <circle cx="456" cy="256" r="5" fill="white" fill-opacity="0.3"/>
  </g>

  <!-- Wave function lines (quantum superposition of PDF states) -->
  <path d="M56,180 Q90,160 124,180 Q158,200 192,180 Q226,160 256,180" fill="none" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <path d="M256,180 Q286,160 320,180 Q354,200 388,180 Q422,160 456,180" fill="none" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>
  <path d="M56,332 Q90,312 124,332 Q158,352 192,332 Q226,312 256,332" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.35"/>
  <path d="M256,332 Q286,312 320,332 Q354,352 388,332 Q422,312 456,332" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Central PDF document (collapsed quantum state) -->
  <rect x="192" y="170" width="128" height="172" rx="8" fill="#120604" stroke="#F97316" stroke-width="3" stroke-opacity="0.9" filter="url(#glow)"/>
  <!-- Doc fold -->
  <polygon points="286,170 320,170 320,204" fill="#0a0304" stroke="#F97316" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="286" y1="170" x2="320" y2="204" stroke="#F97316" stroke-width="2" stroke-opacity="0.8"/>

  <!-- PDF label -->
  <rect x="204" y="188" width="55" height="16" rx="8" fill="#F97316" fill-opacity="0.6" filter="url(#softglow)"/>

  <!-- Quantum state probabilities (wave function bars) -->
  <rect x="204" y="216" width="100" height="6" rx="3" fill="#F97316" fill-opacity="0.55"/>
  <rect x="204" y="230" width="75" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.45"/>
  <rect x="204" y="243" width="95" height="5" rx="2.5" fill="#F97316" fill-opacity="0.5"/>
  <rect x="204" y="256" width="55" height="5" rx="2.5" fill="#DC2626" fill-opacity="0.4"/>
  <rect x="204" y="268" width="100" height="5" rx="2.5" fill="#F97316" fill-opacity="0.5"/>
  <rect x="204" y="280" width="80" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.42"/>
  <rect x="204" y="293" width="90" height="5" rx="2.5" fill="#F97316" fill-opacity="0.48"/>
  <rect x="204" y="306" width="65" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.38"/>
  <rect x="204" y="319" width="100" height="6" rx="3" fill="#F97316" fill-opacity="0.55"/>

  <!-- Probability wave effect on doc borders -->
  <rect x="192" y="170" width="128" height="172" rx="8" fill="none" stroke="#F97316" stroke-width="1" filter="url(#glow)" stroke-opacity="0.4"/>

  <!-- Connecting lines (entanglement) to particles -->
  <line x1="320" y1="256" x2="456" y2="256" stroke="#F97316" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="5,4"/>
  <!-- Entanglement to rotated particles -->
  <line x1="256" y1="170" x2="286" y2="80" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="256" y1="342" x2="226" y2="432" stroke="#DC2626" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Quantum energy rings -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#F97316" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- Corner indicators -->
  <rect x="30" y="30" width="25" height="3" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="30" y="30" width="3" height="25" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="457" y="30" width="25" height="3" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="479" y="30" width="3" height="25" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="30" y="479" width="25" height="3" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="30" y="457" width="3" height="25" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="457" y="479" width="25" height="3" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
  <rect x="479" y="457" width="3" height="25" fill="#F97316" fill-opacity="0.4" rx="1.5"/>
</svg>
