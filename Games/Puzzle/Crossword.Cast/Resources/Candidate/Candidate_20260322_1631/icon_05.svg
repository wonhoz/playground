    <circle cx="512" cy="876" r="100" fill="#164A2A"/>
    <circle cx="512" cy="876" r="100" fill="none" stroke="#2ECC71" stroke-width="7"/>
    <polyline points="445,876 494,928 579,820" fill="none" stroke="#2ECC71" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
