<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <radialGradient id="highlight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF9A9A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#highlight)"/>
  <!-- Main table -->
  <rect x="72" y="96" width="368" height="288" rx="16" fill="#C62828" stroke="#EF9A9A" stroke-width="8"/>
  <!-- Header -->
  <rect x="72" y="96" width="368" height="60" rx="16" fill="#EF5350"/>
  <rect x="72" y="140" width="368" height="16" fill="#EF5350"/>
  <!-- Edit cursor in header -->
  <rect x="280" y="116" width="4" height="20" rx="2" fill="white" opacity="0.9"/>
  <rect x="292" y="122" width="80" height="10" rx="5" fill="#FFCDD2" opacity="0.9"/>
  <!-- Column lines -->
  <line x1="192" y1="156" x2="192" y2="384" stroke="#EF9A9A" stroke-width="6" opacity="0.6"/>
  <line x1="320" y1="156" x2="320" y2="384" stroke="#EF9A9A" stroke-width="6" opacity="0.6"/>
  <!-- Row lines -->
  <line x1="72" y1="216" x2="440" y2="216" stroke="#EF9A9A" stroke-width="6" opacity="0.6"/>
  <line x1="72" y1="280" x2="440" y2="280" stroke="#EF9A9A" stroke-width="6" opacity="0.6"/>
  <line x1="72" y1="344" x2="440" y2="344" stroke="#EF9A9A" stroke-width="6" opacity="0.6"/>
  <!-- Active cell highlight -->
  <rect x="193" y="217" width="126" height="62" fill="#EF5350" opacity="0.4"/>
  <rect x="193" y="217" width="126" height="62" fill="none" stroke="#FFCDD2" stroke-width="4"/>
  <!-- Pencil edit icon -->
  <g transform="translate(380 380) rotate(-45)">
    <rect x="-10" y="-50" width="20" height="70" rx="4" fill="#FFD54F"/>
    <polygon points="-10,20 10,20 0,40" fill="#FF8F00"/>
    <rect x="-10" y="-60" width="20" height="14" rx="3" fill="#BDBDBD"/>
  </g>
</svg>
