<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0C1A35"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow05">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg05)"/>
  <!-- 방패 글로우 -->
  <path d="M512 145 L790 260 L790 540 Q790 750 512 875 Q234 750 234 540 L234 260 Z" fill="#0EA5E9" opacity="0.2" filter="url(#shieldGlow)"/>
  <!-- 방패 메인 -->
  <path d="M512 175 L770 282 L770 530 Q770 726 512 845 Q254 726 254 530 L254 282 Z" fill="url(#shieldGrad)"/>
  <!-- 방패 테두리 -->
  <path d="M512 175 L770 282 L770 530 Q770 726 512 845 Q254 726 254 530 L254 282 Z" fill="none" stroke="#BAE6FD" stroke-width="10"/>
  <!-- 방패 내부 하이라이트 -->
  <path d="M512 210 L740 308 L740 520 Q740 700 512 808" stroke="white" stroke-width="4" fill="none" opacity="0.3"/>
  <!-- 방패 안 — 눈 (깨어있음) -->
  <!-- 눈 흰자 -->
  <ellipse cx="512" cy="490" rx="215" ry="130" fill="white"/>
  <!-- 위 눈꺼풀 -->
  <path d="M297 490 Q420 348 512 340 Q604 348 727 490 Z" fill="#BAE6FD"/>
  <!-- 홍채 -->
  <clipPath id="shieldEyeClip"><ellipse cx="512" cy="490" rx="213" ry="128"/></clipPath>
  <circle cx="512" cy="490" r="100" fill="#22D3EE" clip-path="url(#shieldEyeClip)" filter="url(#eyeGlow05)"/>
  <!-- 동공 -->
  <circle cx="512" cy="490" r="54" fill="#0C1A35"/>
  <!-- 하이라이트 -->
  <circle cx="546" cy="458" r="26" fill="white" opacity="0.85"/>
  <!-- 눈 테두리 위 -->
  <path d="M297 490 Q420 348 512 340 Q604 348 727 490" stroke="#0369A1" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 눈 테두리 아래 -->
  <path d="M297 490 Q420 618 512 626 Q604 618 727 490" stroke="#0369A1" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- ZZZ들 (작은, 방패 외부) -->
  <text x="820" y="350" font-family="Arial Black" font-weight="900" font-size="58" fill="#64748B" opacity="0.5" transform="rotate(20 820 350)">z</text>
  <text x="860" y="290" font-family="Arial Black" font-weight="900" font-size="44" fill="#64748B" opacity="0.38" transform="rotate(20 860 290)">z</text>
  <text x="885" y="245" font-family="Arial Black" font-weight="900" font-size="32" fill="#64748B" opacity="0.28" transform="rotate(20 885 245)">z</text>
  <!-- 방패 하단 텍스트 -->
  <text x="512" y="800" font-family="Arial Black" font-weight="900" font-size="46" fill="white" text-anchor="middle">PROTECT</text>
</svg>
