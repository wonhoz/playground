<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Orange -->
  <rect width="1024" height="1024" rx="190" fill="#FF6F00"/>

  <!-- Left: Image frame with mountain silhouette -->
  <rect x="200" y="340" width="260" height="200" rx="12" fill="white" opacity="0.95"/>
  <!-- Mountain inside frame -->
  <polygon points="260,520 330,400 400,520" fill="#E65100"/>
  <polygon points="310,520 355,430 410,520" fill="#BF360C"/>
  <!-- Sun -->
  <circle cx="385" cy="375" r="22" fill="#FFD600"/>

  <!-- Arrow in center -->
  <line x1="490" y1="440" x2="610" y2="440" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <polygon points="620,440 588,410 588,470" fill="white"/>

  <!-- Spark effects above arrow -->
  <text x="530" y="415" font-family="Arial" font-size="36" text-anchor="middle" fill="#FFE57F">✦</text>
  <text x="570" y="408" font-family="Arial" font-size="28" text-anchor="middle" fill="#FFE57F">✦</text>

  <!-- Right: Text block (ASCII art) -->
  <rect x="638" y="330" width="200" height="220" rx="8" fill="rgba(255,255,255,0.12)"/>
  <text x="650" y="374" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="white">@#$%@##$</text>
  <text x="650" y="410" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="white">##$@.@#$</text>
  <text x="650" y="446" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="white">$@#..@##</text>
  <text x="650" y="482" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="white">@##$@#..</text>
  <text x="650" y="518" font-family="'Courier New', monospace" font-size="30" font-weight="700" fill="white">##.....@</text>

  <!-- Top label -->
  <text x="512" y="290" font-family="'Courier New', monospace" font-size="88" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.9)">IMG → TXT</text>

  <!-- Bottom label chars -->
  <text x="512" y="780" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.6)">@ # $ % .</text>
</svg>
