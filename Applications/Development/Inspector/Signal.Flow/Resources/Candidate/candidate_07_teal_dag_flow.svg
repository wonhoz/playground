<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002020"/>
      <stop offset="100%" stop-color="#003333"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db6ac"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#4db6ac"/>
    </marker>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Edges with arrows -->
  <line x1="156" y1="156" x2="236" y2="236" stroke="#4db6ac" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="256" y1="100" x2="256" y2="228" stroke="#4db6ac" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="356" y1="156" x2="276" y2="236" stroke="#4db6ac" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="256" y1="284" x2="176" y2="356" stroke="#4db6ac" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="256" y1="284" x2="336" y2="356" stroke="#4db6ac" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="176" y1="412" x2="236" y2="448" stroke="#4db6ac" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="336" y1="412" x2="276" y2="448" stroke="#4db6ac" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- Nodes -->
  <circle cx="156" cy="140" r="28" fill="url(#node)" stroke="#80cbc4" stroke-width="2"/>
  <text x="156" y="146" font-family="monospace" font-size="11" fill="white" text-anchor="middle">SRC</text>
  <circle cx="256" cy="84" r="28" fill="url(#node)" stroke="#80cbc4" stroke-width="2"/>
  <text x="256" y="90" font-family="monospace" font-size="11" fill="white" text-anchor="middle">IN</text>
  <circle cx="356" cy="140" r="28" fill="url(#node)" stroke="#80cbc4" stroke-width="2"/>
  <text x="356" y="146" font-family="monospace" font-size="11" fill="white" text-anchor="middle">MSG</text>
  <circle cx="256" cy="256" r="32" fill="#004d40" stroke="#4db6ac" stroke-width="2.5"/>
  <text x="256" y="262" font-family="monospace" font-size="12" fill="#b2dfdb" text-anchor="middle">FLOW</text>
  <circle cx="176" cy="390" r="26" fill="url(#node)" stroke="#80cbc4" stroke-width="2"/>
  <text x="176" y="396" font-family="monospace" font-size="10" fill="white" text-anchor="middle">SINK1</text>
  <circle cx="336" cy="390" r="26" fill="url(#node)" stroke="#80cbc4" stroke-width="2"/>
  <text x="336" y="396" font-family="monospace" font-size="10" fill="white" text-anchor="middle">SINK2</text>
  <!-- Animated dot on central node -->
  <circle cx="256" cy="256" r="8" fill="#1de9b6" opacity="0.9"/>
</svg>
