<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Prism triangle -->
  <polygon points="512,180 820,740 204,740" fill="#F57F17" opacity="0.2" stroke="#F57F17" stroke-width="44" stroke-linejoin="round"/>
  <!-- Incoming light beam -->
  <line x1="200" y1="380" x2="450" y2="480" stroke="#FFD54F" stroke-width="32" stroke-linecap="round"/>
  <!-- Spectrum rays spreading out (right side) -->
  <line x1="570" y1="480" x2="820" y2="340" stroke="#FFD54F" stroke-width="28" stroke-linecap="round"/>
  <line x1="570" y1="490" x2="840" y2="440" stroke="#FFD54F" stroke-width="24" stroke-linecap="round" opacity="0.85"/>
  <line x1="575" y1="500" x2="840" y2="510" stroke="#F57F17" stroke-width="22" stroke-linecap="round" opacity="0.8"/>
  <line x1="575" y1="510" x2="840" y2="580" stroke="#F57F17" stroke-width="20" stroke-linecap="round" opacity="0.65"/>
  <line x1="575" y1="520" x2="820" y2="650" stroke="#F57F17" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
  <!-- Small glyph dots at spectrum end -->
  <circle cx="836" cy="340" r="22" fill="#FFD54F"/>
  <circle cx="848" cy="440" r="18" fill="#FFD54F" opacity="0.8"/>
  <circle cx="848" cy="512" r="16" fill="#F57F17"/>
  <circle cx="848" cy="582" r="14" fill="#F57F17" opacity="0.7"/>
  <circle cx="826" cy="650" r="12" fill="#F57F17" opacity="0.5"/>
</svg>