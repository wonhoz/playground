<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background sky blue -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: Washing machine cleaning "system files" -->
  <!-- Washing machine body -->
  <rect x="200" y="200" width="624" height="640" rx="40" fill="#ECEFF1" opacity="0.97"/>
  <rect x="220" y="220" width="584" height="60" rx="20" fill="#B0BEC5"/>
  <!-- Control knobs -->
  <circle cx="300" cy="250" r="22" fill="#0288D1"/>
  <circle cx="380" cy="250" r="16" fill="#29B6F6"/>
  <circle cx="700" cy="250" r="22" fill="#F44336"/>
  <!-- Door circle (porthole) -->
  <circle cx="512" cy="560" r="220" fill="#0288D1" opacity="0.85"/>
  <circle cx="512" cy="560" r="200" fill="#29B6F6" opacity="0.7"/>
  <!-- Spinning drum / water effect -->
  <circle cx="512" cy="560" r="170" fill="#01579B"/>
  <!-- Foam/bubbles inside -->
  <circle cx="460" cy="520" r="30" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="540" cy="500" r="24" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="490" cy="580" r="36" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="570" cy="570" r="20" fill="#FFFFFF" opacity="0.15"/>
  <!-- File label visible inside drum -->
  <text x="512" y="545" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle" opacity="0.7">*.tmp</text>
  <text x="512" y="590" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle" opacity="0.6">junk</text>
  <!-- Door handle -->
  <rect x="480" y="748" width="64" height="22" rx="11" fill="#455A64"/>
  <!-- Layer 3: Clean sparkles -->
  <path d="M820 320 L830 350 L862 350 L836 368 L846 398 L820 380 L794 398 L804 368 L778 350 L810 350 Z" fill="#FFD740" opacity="0.9"/>
  <rect x="320" y="880" width="384" height="80" rx="16" fill="#01579B"/>
  <text x="512" y="933" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#E1F5FE" text-anchor="middle">Sys Wash</text>
</svg>
