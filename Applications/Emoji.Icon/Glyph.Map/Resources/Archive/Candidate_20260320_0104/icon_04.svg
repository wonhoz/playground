<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Tree trunk -->
  <rect x="472" y="600" width="80" height="240" rx="20" fill="#F57F17"/>
  <!-- Tree branches - trunk to branches -->
  <line x1="512" y1="600" x2="300" y2="420" stroke="#F57F17" stroke-width="44" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="724" y2="420" stroke="#F57F17" stroke-width="44" stroke-linecap="round"/>
  <line x1="512" y1="500" x2="512" y2="320" stroke="#F57F17" stroke-width="44" stroke-linecap="round"/>
  <!-- Letter nodes at branch tips -->
  <circle cx="512" cy="290" r="70" fill="#FFD54F"/>
  <circle cx="260" cy="390" r="58" fill="#F57F17" opacity="0.9"/>
  <circle cx="764" cy="390" r="58" fill="#F57F17" opacity="0.9"/>
  <!-- Sub-branches -->
  <line x1="260" y1="390" x2="190" y2="270" stroke="#F57F17" stroke-width="30" stroke-linecap="round"/>
  <line x1="260" y1="390" x2="330" y2="270" stroke="#F57F17" stroke-width="30" stroke-linecap="round"/>
  <line x1="764" y1="390" x2="694" y2="270" stroke="#F57F17" stroke-width="30" stroke-linecap="round"/>
  <line x1="764" y1="390" x2="834" y2="270" stroke="#F57F17" stroke-width="30" stroke-linecap="round"/>
  <circle cx="190" cy="240" r="44" fill="#FFD54F" opacity="0.7"/>
  <circle cx="330" cy="240" r="44" fill="#FFD54F" opacity="0.7"/>
  <circle cx="694" cy="240" r="44" fill="#FFD54F" opacity="0.7"/>
  <circle cx="834" cy="240" r="44" fill="#FFD54F" opacity="0.7"/>
</svg>