<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="vac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef9a9a"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="suck"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- folder -->
  <path d="M90 200 L90 370 L360 370 L360 225 L200 225 L175 200 Z" fill="url(#folder)"/>
  <path d="M90 200 L90 230 L360 230 L360 225 L200 225 L175 200 Z" fill="#1976d2"/>
  <ellipse cx="145" cy="215" rx="25" ry="7" fill="white" opacity="0.2"/>
  <!-- debris sucking into vacuum -->
  <circle cx="260" cy="310" r="7" fill="#90a4ae" opacity="0.6"/>
  <circle cx="220" cy="340" r="5" fill="#78909c" opacity="0.5"/>
  <circle cx="300" cy="330" r="8" fill="#8d6e63" opacity="0.5"/>
  <!-- vacuum hose -->
  <path d="M370 370 Q390 340 410 310 Q420 280 400 260" stroke="#bdbdbd" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- vacuum body -->
  <ellipse cx="400" cy="230" rx="65" ry="45" fill="url(#vac)"/>
  <ellipse cx="380" cy="215" rx="18" ry="10" fill="white" opacity="0.2"/>
  <!-- suction mouth -->
  <ellipse cx="360" cy="370" rx="22" ry="14" fill="#c62828"/>
  <!-- suction lines -->
  <path d="M280 340 Q320 345 350 362" stroke="#ef9a9a" stroke-width="3" fill="none" opacity="0.5" filter="url(#suck)"/>
  <path d="M250 325 Q300 328 345 355" stroke="#ef9a9a" stroke-width="2" fill="none" opacity="0.4" filter="url(#suck)"/>
</svg>
