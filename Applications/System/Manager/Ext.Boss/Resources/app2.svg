<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background – warm cream -->
  <rect width="1024" height="1024" rx="190" fill="#FFF8DC"/>

  <g clip-path="url(#clip02)">
    <!-- Layer 2: File icon (folded corner) -->
    <!-- File body -->
    <path d="M240,180 L680,180 L800,300 L800,840 L240,840 Z" fill="#2756B8"/>
    <!-- Fold corner -->
    <path d="M680,180 L680,300 L800,300 Z" fill="#1A3F8A"/>
    <!-- File inner area -->
    <rect x="280" y="380" width="440" height="360" rx="10" fill="#1A3F8A"/>

    <!-- Layer 3: .EXT label on file -->
    <rect x="270" y="220" width="310" height="92" rx="16" fill="#FF7D00"/>
    <text x="296" y="291" font-family="'Courier New', Courier, monospace" font-size="60" font-weight="bold" fill="#FFFFFF">.EXT</text>

    <!-- Lines representing content -->
    <rect x="306" y="416" width="350" height="20" rx="8" fill="#2756B8" opacity="0.5"/>
    <rect x="306" y="462" width="280" height="20" rx="8" fill="#2756B8" opacity="0.4"/>
    <rect x="306" y="508" width="320" height="20" rx="8" fill="#2756B8" opacity="0.4"/>

    <!-- Status icons row -->
    <circle cx="338" cy="606" r="36" fill="#0E4A1E"/>
    <!-- Check -->
    <path d="M316,606 L330,624 L362,586" stroke="#50E080" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="462" cy="606" r="36" fill="#4A0E0E"/>
    <!-- X -->
    <path d="M442,586 L482,626 M482,586 L442,626" stroke="#FF5555" stroke-width="10" fill="none" stroke-linecap="round"/>

    <circle cx="586" cy="606" r="36" fill="#333B45"/>
    <!-- Minus -->
    <path d="M564,606 L608,606" stroke="#8899AA" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Small "Ext.Boss" wordmark at bottom -->
    <text x="340" y="800" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#2756B8" opacity="0.7">Ext.Boss</text>
  </g>
</svg>
