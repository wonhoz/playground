<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </radialGradient>
    <radialGradient id="flower1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF80AB"/>
      <stop offset="100%" stop-color="#FF4081" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="flower2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Watercolor background blobs -->
  <ellipse cx="150" cy="150" rx="120" ry="100" fill="#A5D6A7" opacity="0.3" filter="url(#blur)"/>
  <ellipse cx="380" cy="200" rx="100" ry="80" fill="#80DEEA" opacity="0.25" filter="url(#blur)"/>
  <ellipse cx="256" cy="380" rx="140" ry="80" fill="#A5D6A7" opacity="0.2" filter="url(#blur)"/>
