<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - diagonal split -->
  <rect width="1024" height="1024" rx="180" fill="#FFFFFF"/>
  <clipPath id="clip10">
    <rect width="1024" height="1024" rx="180"/>
  </clipPath>
  <polygon points="0,0 1024,0 1024,1024" fill="#1A1A2E" clip-path="url(#clip10)"/>
  <!-- Layer 2: # on white side -->
  <text x="230" y="580" font-family="Arial Black" font-size="280" font-weight="900" fill="#1A1A2E">#</text>
  <!-- # on dark side -->
  <text x="620" y="540" font-family="Arial Black" font-size="280" font-weight="900" fill="white">#</text>
  <!-- Layer 3: Toggle switch in center -->
  <rect x="362" y="450" width="300" height="120" rx="60" fill="#00BCD4"/>
  <circle cx="612" cy="510" r="52" fill="white"/>
</svg>