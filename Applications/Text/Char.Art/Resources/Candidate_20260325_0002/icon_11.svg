<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#40C4FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#grad11)"/>

  <!-- Magnifying glass handle -->
  <line x1="680" y1="700" x2="810" y2="830" stroke="white" stroke-width="72" stroke-linecap="round"/>
  <!-- Handle shadow -->
  <line x1="682" y1="702" x2="812" y2="832" stroke="rgba(0,0,0,0.25)" stroke-width="72" stroke-linecap="round"/>

  <!-- Magnifying glass lens outer ring -->
  <circle cx="450" cy="470" r="240" fill="white" opacity="0.95"/>
  <circle cx="450" cy="470" r="240" fill="none" stroke="white" stroke-width="60"/>

  <!-- Inner lens area (light blue tint) -->
  <circle cx="450" cy="470" r="180" fill="#E1F5FE"/>

  <!-- Content inside lens: pixel "@" being magnified -->
  <!-- Pixel grid: 3x3 showing big "@" pixel-art -->
  <!-- Background pixels (light) -->
  <rect x="318" y="338" width="58" height="58" rx="4" fill="#B3E5FC"/>
  <rect x="386" y="338" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="454" y="338" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="522" y="338" width="58" height="58" rx="4" fill="#B3E5FC"/>

  <rect x="318" y="406" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="386" y="406" width="58" height="58" rx="4" fill="#01579B"/>
  <rect x="454" y="406" width="58" height="58" rx="4" fill="#01579B"/>
  <rect x="522" y="406" width="58" height="58" rx="4" fill="#0288D1"/>

  <rect x="318" y="474" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="386" y="474" width="58" height="58" rx="4" fill="#01579B"/>
  <rect x="454" y="474" width="58" height="58" rx="4" fill="#B3E5FC"/>
  <rect x="522" y="474" width="58" height="58" rx="4" fill="#0288D1"/>

  <rect x="318" y="542" width="58" height="58" rx="4" fill="#B3E5FC"/>
  <rect x="386" y="542" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="454" y="542" width="58" height="58" rx="4" fill="#0288D1"/>
  <rect x="522" y="542" width="58" height="58" rx="4" fill="#B3E5FC"/>

  <!-- "@" label inside lens (text at pixel location) -->
  <text x="450" y="640" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="#01579B">@</text>

  <!-- Lens highlight (reflection arc) -->
  <path d="M 330 350 Q 390 290 480 320" stroke="rgba(255,255,255,0.75)" stroke-width="20"
        fill="none" stroke-linecap="round"/>

  <!-- Top label -->
  <text x="512" y="240" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.90)">#@$%</text>

  <!-- Bottom label -->
  <text x="512" y="870" font-family="'Courier New', monospace" font-size="72" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.80)">Char.Art</text>
</svg>
