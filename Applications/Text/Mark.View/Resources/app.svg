<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2D8B"/>
      <stop offset="100%" stop-color="#DA8FE0"/>
    </linearGradient>
    <clipPath id="clip01">
      <circle cx="512" cy="512" r="512"/>
    </clipPath>
  </defs>
  <!-- Layer1: 배경 -->
  <circle cx="512" cy="512" r="512" fill="url(#bg01)"/>
  <!-- Layer2: 배경 뒤 반투명 큰 "#" 깊이감 + 콘텐츠 요소 (상하 여백 대칭 보정 -38px) -->
  <g clip-path="url(#clip01)">
    <text x="512" y="492" font-size="900" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="white" fill-opacity="0.12" text-anchor="middle" dominant-baseline="central">#</text>
    <!-- 메인 중앙 "#" -->
    <text x="512" y="402" font-size="500" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="white" text-anchor="middle" dominant-baseline="central">#</text>
    <!-- Layer3: 하단 노란 배지 -->
    <rect x="330" y="662" width="364" height="110" rx="55" fill="#FFD700"/>
    <text x="512" y="718" font-size="90" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="#5B1A6B" text-anchor="middle" dominant-baseline="central">MD</text>
  </g>
</svg>
