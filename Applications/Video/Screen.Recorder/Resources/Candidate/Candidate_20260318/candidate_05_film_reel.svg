<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 필름 릴 -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#EF4444" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="80" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="240" r="30" fill="#EF4444" opacity="0.2" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="14" fill="#EF4444" opacity="0.8" filter="url(#glow)"/>
  <!-- 스포크 -->
  <line x1="256" y1="210" x2="256" y2="160" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="230" y1="216" x2="187" y2="178" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="218" y1="240" x2="166" y2="240" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="282" y1="216" x2="325" y2="178" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="294" y1="240" x2="346" y2="240" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="270" x2="256" y2="320" stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- 퍼포레이션 (필름 구멍) -->
  <rect x="140" y="155" width="20" height="28" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <rect x="352" y="155" width="20" height="28" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <rect x="140" y="297" width="20" height="28" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <rect x="352" y="297" width="20" height="28" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">FILM REEL</text>
</svg>
