<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0000"/>
    </linearGradient>
    <linearGradient id="swipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hand with pointing finger -->
  <!-- Palm -->
  <ellipse cx="180" cy="310" rx="60" ry="70" fill="#2A0000" stroke="#FF4444" stroke-width="2"/>
  <!-- Fingers -->
  <rect x="148" y="220" width="24" height="70" rx="12" fill="#2A0000" stroke="#FF4444" stroke-width="2"/>
  <rect x="178" y="200" width="24" height="80" rx="12" fill="#2A0000" stroke="#FF4444" stroke-width="2" opacity="0.7"/>
  <rect x="208" y="215" width="24" height="70" rx="12" fill="#2A0000" stroke="#FF4444" stroke-width="2" opacity="0.7"/>
  <!-- Index finger extended pointing right -->
  <rect x="210" y="195" width="26" height="90" rx="13" fill="#FF4444" opacity="0.9" transform="rotate(-40 223 240)"/>
  <!-- Swipe trail -->
  <path d="M 280 240 Q 340 200 420 220" fill="none" stroke="url(#swipe)" stroke-width="10" stroke-linecap="round"/>
  <polygon points="420,205 440,220 420,235" fill="#FF0000"/>
  <!-- Speed lines -->
  <line x1="290" y1="255" x2="400" y2="240" stroke="#FF4444" stroke-width="3" stroke-dasharray="8,5" opacity="0.5"/>
  <line x1="285" y1="270" x2="390" y2="260" stroke="#FF4444" stroke-width="2" stroke-dasharray="6,6" opacity="0.3"/>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FF4444">MOUSE.FLICK</text>
</svg>