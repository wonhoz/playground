<!-- Prompt.Forge icon_08: 체인링크 단조 (chain link: forge connections) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#150A20"/>
  <!-- Left chain link (oval, tilted) -->
  <ellipse cx="360" cy="512" rx="160" ry="90" fill="none" stroke="#9C27B0" stroke-width="52" transform="rotate(-30 360 512)"/>
  <!-- Right chain link (oval, tilted opposite) -->
  <ellipse cx="664" cy="512" rx="160" ry="90" fill="none" stroke="#BA68C8" stroke-width="52" transform="rotate(30 664 512)"/>
  <!-- Overlap mask (background color to show interlocking) -->
  <rect x="480" y="360" width="64" height="304" fill="#150A20"/>
</svg>
