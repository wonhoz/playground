<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="dg-bg-clip-04">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="dg-bg-04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A40"/>
      <stop offset="100%" stop-color="#2A1060"/>
    </linearGradient>
    <linearGradient id="block-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#dg-bg-04)"/>

  <g clip-path="url(#dg-bg-clip-04)">
    <!-- 블록들 -->
    <!-- 상단 블록 (루트) -->
    <rect x="376" y="230" width="272" height="120" rx="20" fill="url(#block-amber)"/>
    <rect x="396" y="250" width="232" height="80" rx="12" fill="#FF8F00" opacity="0.6"/>
    <rect x="408" y="264" width="100" height="24" rx="12" fill="rgba(255,255,255,0.35)"/>
    <rect x="408" y="296" width="140" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>

    <!-- 중단 좌 블록 -->
    <rect x="220" y="470" width="220" height="106" rx="18" fill="url(#block-amber)" opacity="0.9"/>
    <rect x="236" y="486" width="188" height="74" rx="12" fill="#FF8F00" opacity="0.55"/>
    <rect x="246" y="498" width="80" height="20" rx="10" fill="rgba(255,255,255,0.3)"/>
    <rect x="246" y="526" width="110" height="16" rx="8" fill="rgba(255,255,255,0.18)"/>

    <!-- 중단 우 블록 -->
    <rect x="584" y="470" width="220" height="106" rx="18" fill="url(#block-amber)" opacity="0.9"/>
    <rect x="600" y="486" width="188" height="74" rx="12" fill="#FF8F00" opacity="0.55"/>
    <rect x="610" y="498" width="80" height="20" rx="10" fill="rgba(255,255,255,0.3)"/>
    <rect x="610" y="526" width="110" height="16" rx="8" fill="rgba(255,255,255,0.18)"/>

    <!-- 하단 블록들 -->
    <rect x="220" y="700" width="164" height="88" rx="16" fill="url(#block-amber)" opacity="0.75"/>
    <rect x="416" y="700" width="192" height="88" rx="16" fill="url(#block-amber)" opacity="0.8"/>
    <rect x="640" y="700" width="164" height="88" rx="16" fill="url(#block-amber)" opacity="0.75"/>

    <!-- 화이트 화살표들 (종속 관계 표시) -->
    <!-- 루트 → 좌 -->
    <line x1="430" y1="350" x2="340" y2="470" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round"/>
    <polygon points="340,470 300,424 382,422" fill="#FFFFFF"/>

    <!-- 루트 → 우 -->
    <line x1="594" y1="350" x2="694" y2="470" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round"/>
    <polygon points="694,470 650,422 742,424" fill="#FFFFFF"/>

    <!-- 좌 → 하좌 -->
    <line x1="302" y1="576" x2="302" y2="700" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>
    <polygon points="302,700 272,658 332,658" fill="#FFFFFF"/>

    <!-- 좌 → 하중 -->
    <line x1="380" y1="576" x2="460" y2="700" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
    <polygon points="460,700 424,656 498,654" fill="#FFFFFF"/>

    <!-- 우 → 하우 -->
    <line x1="722" y1="576" x2="722" y2="700" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>
    <polygon points="722,700 692,658 752,658" fill="#FFFFFF"/>
  </g>
</svg>
