<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 거대한 눈 -->
  <path d="M 80 256 Q 180 150 256 150 Q 332 150 432 256 Q 332 362 256 362 Q 180 362 80 256 Z" fill="#F97316" opacity="0.1"/>
  <path d="M 80 256 Q 180 150 256 150 Q 332 150 432 256 Q 332 362 256 362 Q 180 362 80 256 Z" fill="none" stroke="#F97316" stroke-width="3" filter="url(#glow)"/>
  <!-- 홍채 -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#F97316" stroke-width="2.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="50" fill="#F97316" opacity="0.12"/>
  <!-- 동공 -->
  <circle cx="256" cy="256" r="30" fill="#F97316" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="18" fill="#F97316" opacity="0.6" filter="url(#glow)"/>
  <!-- 포트 숫자 (홍채 주변) -->
  <text x="256" y="186" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">80</text>
  <text x="320" y="215" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">443</text>
  <text x="340" y="260" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">22</text>
  <text x="316" y="305" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">3389</text>
  <text x="196" y="305" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">8080</text>
  <text x="172" y="260" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">21</text>
  <text x="196" y="215" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.6">25</text>
  <!-- 빛 반사 -->
  <circle cx="235" cy="238" r="6" fill="white" opacity="0.3"/>
  <!-- 경고 빛 -->
  <circle cx="130" cy="140" r="3" fill="#F97316" opacity="0.6" filter="url(#glow)"/>
  <circle cx="390" cy="380" r="4" fill="#FB923C" opacity="0.5"/>
