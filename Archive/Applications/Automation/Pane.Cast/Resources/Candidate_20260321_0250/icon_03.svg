<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark teal -->
  <rect width="1024" height="1024" rx="190" fill="#060E12"/>

  <!-- LEFT: Single empty terminal (before) -->
  <rect x="50" y="280" width="300" height="420" rx="20" fill="#0C1E20" stroke="#2E4E54" stroke-width="12"/>
  <!-- Title bar -->
  <rect x="50" y="280" width="300" height="40" rx="14 14 0 0" fill="#1B3A40"/>
  <!-- Empty terminal content (just a blinking cursor) -->
  <rect x="78" y="420" width="28" height="36" rx="4" fill="#2E6E74" opacity="0.7"/>

  <!-- CENTER: Large magenta arrow -->
  <!-- Arrow body (rectangle) + Arrow head (polygon) combined -->
  <rect x="400" y="484" width="130" height="56" rx="12" fill="#E040FB"/>
  <polygon points="530,440 650,512 530,584" fill="#E040FB"/>
  <!-- Glow behind arrow -->
  <ellipse cx="530" cy="512" rx="120" ry="60" fill="#E040FB" opacity="0.15"/>

  <!-- RIGHT: 4-pane active terminal (after) -->
  <rect x="680" y="190" width="310" height="600" rx="20" fill="#0A2018" stroke="#69F0AE" stroke-width="16"/>
  <!-- Title bar of right terminal -->
  <rect x="680" y="190" width="310" height="42" rx="14 14 0 0" fill="#1A5030"/>
  <!-- Pane dividers -->
  <line x1="835" y1="232" x2="835" y2="790" stroke="#69F0AE" stroke-width="10"/>
  <line x1="680" y1="490" x2="990" y2="490" stroke="#69F0AE" stroke-width="10"/>
  <!-- Pane content lines (top-left pane) -->
  <rect x="698" y="260" width="110" height="14" rx="4" fill="#69F0AE" opacity="0.8"/>
  <rect x="698" y="286" width="80" height="12" rx="4" fill="#A5D6A7" opacity="0.5"/>
  <rect x="698" y="308" width="100" height="12" rx="4" fill="#A5D6A7" opacity="0.35"/>
  <!-- Pane content lines (top-right pane) -->
  <rect x="856" y="260" width="90" height="14" rx="4" fill="#69F0AE" opacity="0.6"/>
  <rect x="856" y="286" width="70" height="12" rx="4" fill="#A5D6A7" opacity="0.4"/>
  <!-- Pane content lines (bottom-left pane) -->
  <rect x="698" y="518" width="100" height="14" rx="4" fill="#69F0AE" opacity="0.6"/>
  <rect x="698" y="544" width="60" height="12" rx="4" fill="#A5D6A7" opacity="0.3"/>
  <!-- Pane content lines (bottom-right pane) -->
  <rect x="856" y="518" width="80" height="14" rx="4" fill="#69F0AE" opacity="0.5"/>
  <rect x="856" y="544" width="50" height="12" rx="4" fill="#A5D6A7" opacity="0.3"/>
</svg>
