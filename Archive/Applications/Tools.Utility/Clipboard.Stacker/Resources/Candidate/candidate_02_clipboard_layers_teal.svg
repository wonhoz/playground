<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Layer cards stacked -->
  <rect x="160" y="270" width="200" height="130" rx="14" fill="url(#card)" opacity="0.4"/>
  <rect x="150" y="245" width="200" height="130" rx="14" fill="url(#card)" opacity="0.65"/>
  <rect x="140" y="220" width="200" height="130" rx="14" fill="url(#card)" opacity="0.85"/>
  <rect x="130" y="195" width="200" height="130" rx="14" fill="url(#card)"/>
  <!-- Pin at top -->
  <circle cx="230" cy="195" r="16" fill="#00695C"/>
  <circle cx="230" cy="195" r="8" fill="#4DB6AC"/>
  <!-- Lines on top card -->
  <rect x="152" y="220" width="120" height="10" rx="3" fill="#00695C" opacity="0.7"/>
  <rect x="152" y="238" width="90" height="10" rx="3" fill="#00695C" opacity="0.5"/>
  <rect x="152" y="256" width="100" height="10" rx="3" fill="#00695C" opacity="0.4"/>
  <!-- Stack count badge -->
  <circle cx="350" cy="370" r="34" fill="#26A69A"/>
  <text x="350" y="378" text-anchor="middle" font-size="28" font-weight="bold" fill="white" font-family="Arial">4</text>
</svg>
