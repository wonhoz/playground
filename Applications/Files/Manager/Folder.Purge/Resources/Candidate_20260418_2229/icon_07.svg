<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background coral -->
  <defs>
    <radialGradient id="bg07" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: Folder with X prohibition sign + broom -->
  <!-- Folder shape -->
  <path d="M160 420 L160 760 L860 760 L860 420 L560 420 L520 340 L160 340 Z" fill="#FF8A65" opacity="0.9"/>
  <rect x="160" y="420" width="700" height="340" rx="0" fill="#FFCCBC" opacity="0.85"/>
  <!-- X prohibition overlay on folder -->
  <circle cx="510" cy="580" r="200" fill="none" stroke="#BF360C" stroke-width="28"/>
  <line x1="368" y1="438" x2="652" y2="722" stroke="#BF360C" stroke-width="28" stroke-linecap="round"/>
  <!-- Broom sweeping left side -->
  <!-- Broom head -->
  <rect x="100" y="640" width="280" height="90" rx="16" fill="#5D4037" transform="rotate(-30 240 685)"/>
  <!-- Broom bristles -->
  <line x1="120" y1="720" x2="90" y2="800" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <line x1="150" y1="730" x2="130" y2="820" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <line x1="180" y1="738" x2="168" y2="830" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <line x1="210" y1="744" x2="206" y2="836" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <!-- Broom handle -->
  <rect x="290" y="500" width="28" height="280" rx="14" fill="#8D6E63" transform="rotate(-30 304 640)"/>
  <!-- Layer 3: Empty folder label -->
  <rect x="580" y="680" width="240" height="68" rx="14" fill="#BF360C"/>
  <text x="700" y="726" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFCCBC" text-anchor="middle">EMPTY</text>
</svg>
