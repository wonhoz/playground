<!-- Layout.Forge icon_07: 레고 블록 조립 (stacking blocks: component assembly) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Bottom block -->
  <rect x="200" y="620" width="560" height="160" rx="20" fill="#3949AB"/>
  <circle cx="340" cy="620" r="40" fill="#4A5BBD"/>
  <circle cx="512" cy="620" r="40" fill="#4A5BBD"/>
  <circle cx="684" cy="620" r="40" fill="#4A5BBD"/>
  <!-- Middle block -->
  <rect x="260" y="440" width="440" height="160" rx="20" fill="#5C6BC0"/>
  <circle cx="380" cy="440" r="40" fill="#6A79C8"/>
  <circle cx="620" cy="440" r="40" fill="#6A79C8"/>
  <!-- Top block (being placed, slightly above) -->
  <rect x="320" y="240" width="320" height="160" rx="20" fill="#3949AB" opacity="0.75"/>
  <circle cx="450" cy="240" r="36" fill="#4A5BBD" opacity="0.75"/>
  <circle cx="590" cy="240" r="36" fill="#4A5BBD" opacity="0.75"/>
  <!-- Down arrow -->
  <line x1="512" y1="210" x2="512" y2="260" stroke="#7986CB" stroke-width="22" stroke-linecap="round"/>
</svg>
