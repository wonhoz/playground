    <!-- Y축 -->
    <line x1="220" y1="300" x2="220" y2="760" stroke="#405060" stroke-width="3"/>
    <!-- 추가(+) 그래프 라인 (초록) - 파일 추가 -->
    <polyline points="220,540 310,480 400,420 490,380 580,360 670,340 760,320 820,320" fill="none" stroke="#22DD66" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 추가 그래프 점들 -->
    <circle cx="310" cy="480" r="12" fill="#22DD66"/>
    <circle cx="400" cy="420" r="12" fill="#22DD66"/>
    <circle cx="490" cy="380" r="12" fill="#22DD66"/>
    <circle cx="580" cy="360" r="12" fill="#22DD66"/>
    <circle cx="670" cy="340" r="12" fill="#22DD66"/>
    <circle cx="760" cy="320" r="12" fill="#22DD66"/>
    <!-- 삭제(-) 그래프 라인 (빨강) - 파일 삭제 -->
    <polyline points="220,540 310,590 400,620 490,660 580,680 670,710 760,730 820,740" fill="none" stroke="#FF3333" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
