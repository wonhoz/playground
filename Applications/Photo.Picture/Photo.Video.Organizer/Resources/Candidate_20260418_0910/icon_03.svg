<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 민트-다크 배경 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <clipPath id="clip03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#clip03)">
    <!-- Layer 2: 폴더 중앙 심볼 (크고 선명하게) -->
    <!-- 폴더 탭 -->
    <rect x="200" y="330" width="220" height="70" rx="18" fill="#00695C"/>
    <!-- 폴더 본체 -->
    <rect x="170" y="380" width="684" height="420" rx="28" fill="#00897B"/>

    <!-- Layer 3: 날짜 패턴 텍스트 (폴더 안) -->
    <rect x="210" y="420" width="600" height="100" rx="18" fill="#E0F2F1" opacity="0.95"/>
    <text x="512" y="490" font-family="'Segoe UI','Consolas',monospace" font-weight="900" font-size="82" fill="#00695C" text-anchor="middle">2024/06/15</text>

    <rect x="210" y="542" width="600" height="100" rx="18" fill="#E0F2F1" opacity="0.95"/>
    <text x="512" y="612" font-family="'Segoe UI','Consolas',monospace" font-weight="900" font-size="82" fill="#004D40" text-anchor="middle">2024/07/04</text>

    <rect x="210" y="664" width="600" height="100" rx="18" fill="#E0F2F1" opacity="0.95"/>
    <text x="512" y="734" font-family="'Segoe UI','Consolas',monospace" font-weight="900" font-size="82" fill="#00695C" text-anchor="middle">2024/08/20</text>

    <!-- 상단 EXIF 배지 -->
    <rect x="310" y="210" width="404" height="96" rx="26" fill="#FF6F00"/>
    <text x="512" y="275" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle">EXIF → 📁</text>

    <!-- 사진 미니 아이콘 (좌상) -->
    <rect x="170" y="210" width="120" height="100" rx="14" fill="#FFFFFF" stroke="#00897B" stroke-width="8"/>
    <rect x="180" y="220" width="100" height="64" rx="8" fill="#81D4FA"/>
    <circle cx="215" cy="240" r="14" fill="#FFD54F"/>

    <!-- 동영상 미니 아이콘 (우상) -->
    <rect x="734" y="210" width="120" height="100" rx="14" fill="#FFFFFF" stroke="#00897B" stroke-width="8"/>
    <rect x="744" y="220" width="100" height="64" rx="8" fill="#EF9A9A"/>
    <circle cx="794" cy="252" r="20" fill="rgba(0,0,0,0.2)"/>
    <path d="M784 242 L784 262 L804 252 Z" fill="#FFFFFF"/>
  </g>
</svg>
