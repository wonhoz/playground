  <rect x="100" y="750" width="824" height="100" rx="20" fill="#1565C0"/>
  <text x="512" y="820" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="64" fill="white" text-anchor="middle">총 128 GB 중 78 GB 사용</text>
