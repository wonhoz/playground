<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1008"/>
      <stop offset="100%" stop-color="#2A1A10"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifier -->
  <circle cx="240" cy="220" r="110" fill="none" stroke="#D4A017" stroke-width="10"/>
  <circle cx="240" cy="220" r="98" fill="#141008" opacity="0.8"/>
  <!-- Handle -->
  <line x1="322" y1="302" x2="390" y2="380" stroke="#D4A017" stroke-width="18" stroke-linecap="round"/>
  <!-- Code inside magnifier -->
  <text x="200" y="190" font-family="monospace" font-size="13" fill="#44FF44">def calc(a,b):</text>
  <text x="210" y="212" font-family="monospace" font-size="13" fill="#44FF44">  x = a + b</text>
  <text x="210" y="234" font-family="monospace" font-size="13" fill="#FF4444">  y = a / 0</text>
  <text x="210" y="256" font-family="monospace" font-size="13" fill="#44FF44">  return x</text>
  <!-- Bug highlight on the error line -->
  <rect x="207" y="222" width="120" height="16" rx="3" fill="#FF4444" opacity="0.25"/>
  <!-- Small bug icon -->
  <ellipse cx="340" cy="232" rx="10" ry="7" fill="#FF4444"/>
  <line x1="334" y1="228" x2="328" y2="222" stroke="#FF4444" stroke-width="1.5"/>
  <line x1="346" y1="228" x2="352" y2="222" stroke="#FF4444" stroke-width="1.5"/>
  <circle cx="336" cy="227" r="2.5" fill="#FF8888"/>
  <circle cx="344" cy="227" r="2.5" fill="#FF8888"/>
  <!-- Verdict label -->
  <text x="256" y="415" font-family="Arial" font-size="20" fill="#D4A017" text-anchor="middle">Division by Zero!</text>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#D4A017" text-anchor="middle">Bug.Hunt</text>
</svg>
