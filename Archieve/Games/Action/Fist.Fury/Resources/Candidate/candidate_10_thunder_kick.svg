<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#2d2200"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#ff9100"/>
    </linearGradient>
    <radialGradient id="thunderGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee58" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffee58" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Thunder glow -->
  <circle cx="256" cy="256" r="200" fill="url(#thunderGlow)"/>
  <!-- Large lightning bolt -->
  <path d="M310,60 L220,240 L270,240 L190,460 L340,230 L285,230 Z" fill="url(#boltGrad)"/>
  <!-- Inner lightning highlight -->
  <path d="M300,80 L228,240 L268,240 L210,420 L320,250 L280,250 Z" fill="#fff9c4" opacity="0.4"/>
  <!-- Kick leg silhouette -->
  <rect x="80" y="280" width="30" height="120" rx="12" fill="#8d6e63" transform="rotate(-50, 95, 340)"/>
  <rect x="115" y="250" width="30" height="95" rx="12" fill="#8d6e63" transform="rotate(-30, 130, 297)"/>
  <!-- Boot -->
  <rect x="155" y="195" width="70" height="40" rx="10" fill="#5d4037" transform="rotate(-45, 190, 215)"/>
  <!-- Body (partial) -->
  <rect x="50" y="300" width="50" height="80" rx="10" fill="#5d4037"/>
  <!-- Secondary smaller bolts -->
  <path d="M360,100 L330,175 L350,175 L310,280 L400,195 L373,195 Z" fill="url(#boltGrad)" opacity="0.6"/>
  <path d="M400,180 L378,235 L393,235 L365,310 L430,250 L410,250 Z" fill="url(#boltGrad)" opacity="0.4"/>
  <!-- THUNDER text -->
  <text x="256" y="488" font-family="Arial" font-size="34" font-weight="900" fill="url(#boltGrad)" text-anchor="middle" letter-spacing="2">THUNDER KICK</text>
</svg>
