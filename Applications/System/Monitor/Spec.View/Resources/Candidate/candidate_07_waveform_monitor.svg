<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001433"/>
      <stop offset="100%" style="stop-color:#000a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Screen border -->
  <rect x="56" y="80" width="400" height="300" rx="12" fill="#000d20" stroke="#1565c0" stroke-width="3"/>
  <!-- CPU wave -->
  <text x="72" y="110" fill="#42a5f5" font-size="11" font-family="monospace">CPU 70%</text>
  <polyline points="72,140 92,130 112,150 132,120 152,140 172,145 192,125 212,140 232,148 252,128 272,140 292,132 312,145 332,125 352,140 372,135 392,145 412,128 432,140" stroke="#2196f3" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- RAM wave -->
  <text x="72" y="175" fill="#66bb6a" font-size="11" font-family="monospace">RAM 55%</text>
  <polyline points="72,200 102,185 122,210 152,190 172,205 202,185 222,200 252,190 272,205 302,188 322,202 352,190 372,205 402,195 432,200" stroke="#4caf50" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- GPU wave -->
  <text x="72" y="235" fill="#ff7043" font-size="11" font-family="monospace">GPU 82%</text>
  <polyline points="72,260 92,245 112,270 132,240 152,268 172,245 192,265 212,248 232,270 252,242 272,262 292,244 312,268 332,245 352,262 372,248 392,265 412,245 432,260" stroke="#ff5722" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Temp wave -->
  <text x="72" y="295" fill="#ffca28" font-size="11" font-family="monospace">TEMP 45C</text>
  <polyline points="72,320 112,310 152,322 192,308 232,318 272,312 312,320 352,310 392,318 432,315" stroke="#ffc107" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Stand and base -->
  <rect x="216" y="380" width="80" height="28" rx="4" fill="#0d1b33"/>
  <rect x="176" y="408" width="160" height="16" rx="8" fill="#0d1b33" stroke="#1565c0" stroke-width="2"/>
</svg>