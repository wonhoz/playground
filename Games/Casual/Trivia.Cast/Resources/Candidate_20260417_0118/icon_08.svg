<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
    <linearGradient id="btn8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F50057"/>
      <stop offset="100%" stop-color="#C51162"/>
    </linearGradient>
    <radialGradient id="btnGlow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FF80AB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg8)"/>

  <!-- Layer 2: Buzzer button base shadow -->
  <ellipse cx="512" cy="620" rx="316" ry="60" fill="#AD1457" opacity="0.4"/>
  <!-- Buzzer button body (cylinder side) -->
  <ellipse cx="512" cy="580" rx="300" ry="56" fill="#880E4F"/>
  <rect x="212" y="280" width="600" height="300" fill="#C51162"/>
  <!-- Buzzer top face -->
  <ellipse cx="512" cy="280" rx="300" ry="100" fill="url(#btn8)"/>
  <!-- Glow on button -->
  <ellipse cx="512" cy="280" rx="280" ry="90" fill="url(#btnGlow)"/>
  <!-- Highlight arc -->
  <path d="M310,230 Q512,170 714,230" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.45"/>

  <!-- "?" on button face -->
  <text x="512" y="330" font-family="Arial Black, sans-serif" font-size="220" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">?</text>

  <!-- Layer 3: TRIVIA text at bottom -->
  <rect x="168" y="730" width="688" height="120" rx="60" fill="#F50057"/>
  <text x="512" y="808" font-family="Arial Black, sans-serif" font-size="84" font-weight="900" fill="white" text-anchor="middle">TRIVIA</text>

  <!-- Sparkle dots -->
  <circle cx="200" cy="220" r="22" fill="#FFD600" opacity="0.9"/>
  <circle cx="824" cy="180" r="18" fill="#FFD600" opacity="0.85"/>
  <circle cx="860" cy="380" r="14" fill="#FFD600" opacity="0.75"/>
  <circle cx="164" cy="430" r="16" fill="#FFD600" opacity="0.8"/>
  <circle cx="280" cy="130" r="12" fill="white" opacity="0.8"/>
  <circle cx="760" cy="130" r="12" fill="white" opacity="0.8"/>
</svg>
