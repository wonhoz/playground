<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#0091EA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main gear -->
  <g transform="translate(200,200)">
    <circle r="100" fill="#1C1C1C" stroke="url(#blue)" stroke-width="12"/>
    <circle r="40" fill="#0A0A0A" stroke="url(#blue)" stroke-width="8"/>
    <g fill="url(#blue)">
      <rect x="-12" y="-120" width="24" height="34" rx="4"/>
      <rect x="-12" y="86" width="24" height="34" rx="4"/>
      <rect x="86" y="-12" width="34" height="24" rx="4"/>
      <rect x="-120" y="-12" width="34" height="24" rx="4"/>
      <rect transform="rotate(45)" x="-12" y="-120" width="24" height="34" rx="4"/>
      <rect transform="rotate(45)" x="-12" y="86" width="24" height="34" rx="4"/>
      <rect transform="rotate(45)" x="86" y="-12" width="34" height="24" rx="4"/>
      <rect transform="rotate(45)" x="-120" y="-12" width="34" height="24" rx="4"/>
    </g>
  </g>
  <!-- Small gear 2 -->
  <g transform="translate(340,330)">
    <circle r="60" fill="#1C1C1C" stroke="url(#accent)" stroke-width="8"/>
    <circle r="24" fill="#0A0A0A" stroke="url(#accent)" stroke-width="5"/>
    <g fill="url(#accent)">
      <rect x="-7" y="-72" width="14" height="20" rx="3"/>
      <rect x="-7" y="52" width="14" height="20" rx="3"/>
      <rect x="52" y="-7" width="20" height="14" rx="3"/>
      <rect x="-72" y="-7" width="20" height="14" rx="3"/>
      <rect transform="rotate(45)" x="-7" y="-72" width="14" height="20" rx="3"/>
      <rect transform="rotate(45)" x="-7" y="52" width="14" height="20" rx="3"/>
      <rect transform="rotate(45)" x="52" y="-7" width="20" height="14" rx="3"/>
      <rect transform="rotate(45)" x="-72" y="-7" width="20" height="14" rx="3"/>
    </g>
  </g>
  <!-- Clock display panel -->
  <rect x="80" y="380" width="200" height="60" rx="10" fill="#1C1C1C" stroke="url(#blue)" stroke-width="2"/>
  <rect x="90" y="392" width="80" height="10" rx="4" fill="url(#accent)" opacity="0.8"/>
  <rect x="90" y="412" width="55" height="8" rx="4" fill="url(#blue)" opacity="0.5"/>
</svg>
