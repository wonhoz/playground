  <rect x="130" y="430" width="252" height="48" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="459" text-anchor="middle" font-size="14" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">NODE EDITOR</text>
