<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스크린 톤 (하프톤 망점) -->
  <!-- 큰 점들 (어두운 영역) -->
  <circle cx="120" cy="130" r="14" fill="#FB923C" opacity="0.7"/>
  <circle cx="165" cy="130" r="14" fill="#FB923C" opacity="0.7"/>
  <circle cx="210" cy="130" r="13" fill="#FB923C" opacity="0.65"/>
  <circle cx="255" cy="130" r="12" fill="#FB923C" opacity="0.6"/>
  <!-- 중간 점들 -->
  <circle cx="120" cy="175" r="10" fill="#FB923C" opacity="0.6"/>
  <circle cx="165" cy="175" r="11" fill="#FDBA74" opacity="0.65"/>
  <circle cx="210" cy="175" r="9" fill="#FB923C" opacity="0.55"/>
  <circle cx="255" cy="175" r="8" fill="#FDBA74" opacity="0.5"/>
  <circle cx="300" cy="175" r="7" fill="#FB923C" opacity="0.45"/>
  <!-- 작은 점들 (밝은 영역) -->
  <circle cx="300" cy="130" r="9" fill="#FDBA74" opacity="0.5"/>
  <circle cx="345" cy="130" r="6" fill="#FB923C" opacity="0.4"/>
  <circle cx="390" cy="130" r="4" fill="#FDBA74" opacity="0.3"/>
  <circle cx="345" cy="175" r="5" fill="#FB923C" opacity="0.35"/>
  <circle cx="390" cy="175" r="3" fill="#FDBA74" opacity="0.25"/>
  <!-- 사진 → 만화 변환 화살표 -->
  <path d="M 100 256 L 180 256 M 170 244 L 180 256 L 170 268" stroke="#FB923C" stroke-width="4" fill="none" filter="url(#glow)"/>
  <!-- 변환 전 (그레이스케일 이미지) -->
  <rect x="90" y="310" width="100" height="80" rx="6" fill="none" stroke="#888888" stroke-width="2" opacity="0.4"/>
  <rect x="96" y="316" width="88" height="68" rx="4" fill="#444444" opacity="0.3"/>
  <text x="141" y="358" text-anchor="middle" fill="#888888" font-size="10" font-family="monospace" opacity="0.5">PHOTO</text>
  <!-- 변환 후 (만화 스타일) -->
  <rect x="220" y="310" width="220" height="80" rx="6" fill="none" stroke="#FB923C" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 하프톤 패턴 (만화) -->
  <g opacity="0.6">
    <circle cx="240" cy="330" r="6" fill="#FB923C"/>
    <circle cx="262" cy="330" r="8" fill="#FDBA74"/>
    <circle cx="286" cy="330" r="6" fill="#FB923C"/>
    <circle cx="310" cy="330" r="4" fill="#FDBA74"/>
    <circle cx="240" cy="355" r="8" fill="#FB923C"/>
    <circle cx="264" cy="355" r="6" fill="#FDBA74"/>
    <circle cx="288" cy="355" r="4" fill="#FB923C"/>
    <circle cx="312" cy="355" r="3" fill="#FDBA74"/>
    <circle cx="336" cy="355" r="2" fill="#FB923C"/>
    <circle cx="240" cy="378" r="4" fill="#FDBA74"/>
    <circle cx="262" cy="378" r="3" fill="#FB923C"/>
  </g>
  <text x="340" y="358" text-anchor="middle" fill="#FB923C" font-size="10" font-family="monospace" opacity="0.7">COMIC</text>
</svg>