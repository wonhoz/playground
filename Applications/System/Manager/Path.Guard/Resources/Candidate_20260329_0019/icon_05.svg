<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 스냅샷 타임라인 — PATH 백업·복원의 시간여행 | 대각선/동적 | 보라+청록+흰 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#4A148C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Timeline arrow (left to right, slightly diagonal) -->
  <line x1="120" y1="550" x2="860" y2="420" stroke="#7E57C2" stroke-width="16" stroke-linecap="round"/>
  <polygon points="860,420 820,390 820,450" fill="#7E57C2"/>

  <!-- TIME label -->
  <text x="512" y="600" font-family="Arial, sans-serif" font-size="22" fill="#7E57C2"
        text-anchor="middle" opacity="0.7">← 시간 흐름 →</text>

  <!-- Snapshot 1 (oldest) -->
  <circle cx="180" cy="546" r="36" fill="#4527A0" filter="url(#sh5)"/>
  <text x="180" y="546" font-family="Arial, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">S1</text>
  <rect x="120" y="430" width="150" height="80" rx="10" fill="white" filter="url(#sh5)"/>
  <text x="195" y="455" font-family="Arial, sans-serif" font-size="14" fill="#4527A0"
        text-anchor="middle">2026-03-20</text>
  <text x="195" y="478" font-family="Consolas, monospace" font-size="12" fill="#546E7A"
        text-anchor="middle">24개 항목</text>
  <text x="195" y="498" font-family="Arial, sans-serif" font-size="11" fill="#90A4AE"
        text-anchor="middle">백업됨</text>

  <!-- Snapshot 2 -->
  <circle cx="380" cy="516" r="36" fill="#6A1B9A" filter="url(#sh5)"/>
  <text x="380" y="516" font-family="Arial, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">S2</text>
  <rect x="320" y="400" width="150" height="80" rx="10" fill="white" filter="url(#sh5)"/>
  <text x="395" y="425" font-family="Arial, sans-serif" font-size="14" fill="#6A1B9A"
        text-anchor="middle">2026-03-25</text>
  <text x="395" y="448" font-family="Consolas, monospace" font-size="12" fill="#546E7A"
        text-anchor="middle">26개 항목</text>
  <text x="395" y="468" font-family="Arial, sans-serif" font-size="11" fill="#90A4AE"
        text-anchor="middle">백업됨</text>

  <!-- Snapshot 3 (current - highlighted) -->
  <circle cx="600" cy="476" r="46" fill="#00BCD4" filter="url(#sh5)"/>
  <circle cx="600" cy="476" r="30" fill="white"/>
  <text x="600" y="476" font-family="Arial Black, sans-serif" font-size="18" fill="#006064"
        text-anchor="middle" dominant-baseline="middle">NOW</text>
  <rect x="530" y="340" width="180" height="100" rx="10" fill="#E0F7FA" filter="url(#sh5)"/>
  <text x="620" y="365" font-family="Arial, sans-serif" font-size="14" fill="#006064"
        text-anchor="middle">2026-03-29</text>
  <text x="620" y="388" font-family="Consolas, monospace" font-size="12" fill="#546E7A"
        text-anchor="middle">28개 항목</text>
  <rect x="548" y="406" width="140" height="24" rx="8" fill="#00BCD4"/>
  <text x="618" y="418" font-family="Arial, sans-serif" font-size="13" fill="white"
        text-anchor="middle" dominant-baseline="middle">현재 상태</text>

  <!-- Restore arrow (going back) — curved arrow from S3 back to S2 -->
  <path d="M560,500 C480,560 380,580 330,540" fill="none" stroke="#E53935" stroke-width="10"
        stroke-dasharray="16,8" stroke-linecap="round"/>
  <polygon points="330,540 290,520 330,510" fill="#E53935"/>
  <rect x="390" y="556" width="130" height="32" rx="10" fill="#E53935"/>
  <text x="455" y="572" font-family="Arial, sans-serif" font-size="16" fill="white"
        text-anchor="middle" dominant-baseline="middle">복원</text>

  <!-- Bottom label -->
  <rect x="220" y="760" width="584" height="70" rx="35" fill="white" filter="url(#sh5)"/>
  <text x="512" y="795" font-family="Arial Black, sans-serif" font-size="34" fill="#4527A0"
        text-anchor="middle" dominant-baseline="middle">Snapshot &amp; Restore</text>
</svg>
