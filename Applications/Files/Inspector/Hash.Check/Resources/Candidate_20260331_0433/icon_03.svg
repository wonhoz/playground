<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D0D1A"/>
  <!-- Layer 2: 알고리즘 배지들 (큼직하게) -->
  <!-- SHA256 -->
  <rect x="100" y="130" width="824" height="160" rx="28" fill="#6A1B9A"/>
  <text x="512" y="238" font-family="'Consolas', monospace" font-weight="900" font-size="100" fill="#CE93D8" text-anchor="middle">SHA-256</text>
  <!-- MD5 -->
  <rect x="100" y="318" width="824" height="140" rx="28" fill="#1565C0"/>
  <text x="512" y="418" font-family="'Consolas', monospace" font-weight="900" font-size="100" fill="#90CAF9" text-anchor="middle">MD5</text>
  <!-- SHA1 -->
  <rect x="100" y="486" width="824" height="130" rx="28" fill="#00695C"/>
  <text x="512" y="577" font-family="'Consolas', monospace" font-weight="900" font-size="100" fill="#80CBC4" text-anchor="middle">SHA-1</text>
  <!-- SHA512 -->
  <rect x="100" y="644" width="824" height="130" rx="28" fill="#BF360C"/>
  <text x="512" y="735" font-family="'Consolas', monospace" font-weight="900" font-size="100" fill="#FFAB91" text-anchor="middle">SHA-512</text>
  <!-- Layer 3: 체크마크 오버레이 -->
  <circle cx="880" cy="880" r="100" fill="#1B5E20"/>
  <polyline points="830,880 868,920 940,848" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
