<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0D1117"/>
  <!-- Layer 2: 큰 픽셀 아트 (Sand.Fall 로고처럼) -->
  <!-- S 픽셀 글자 -->
  <!-- 행 1 -->
  <rect x="80" y="160" width="60" height="60" fill="#E8C878"/>
  <rect x="152" y="160" width="60" height="60" fill="#E8C878"/>
  <rect x="224" y="160" width="60" height="60" fill="#E8C878"/>
  <!-- 행 2 -->
  <rect x="80" y="232" width="60" height="60" fill="#E8C878"/>
  <!-- 행 3 -->
  <rect x="80" y="304" width="60" height="60" fill="#E8C878"/>
  <rect x="152" y="304" width="60" height="60" fill="#E8C878"/>
  <rect x="224" y="304" width="60" height="60" fill="#E8C878"/>
  <!-- 행 4 -->
  <rect x="224" y="376" width="60" height="60" fill="#E8C878"/>
  <!-- 행 5 -->
  <rect x="80" y="448" width="60" height="60" fill="#E8C878"/>
  <rect x="152" y="448" width="60" height="60" fill="#E8C878"/>
  <rect x="224" y="448" width="60" height="60" fill="#E8C878"/>

  <!-- 수직 구분선 -->
  <rect x="310" y="120" width="8" height="420" rx="4" fill="#334155"/>

  <!-- 큰 픽셀 아트 씬 (오른쪽) -->
  <!-- 하늘 -->
  <rect x="340" y="120" width="604" height="140" rx="8" fill="#0D2040"/>
  <!-- 모래 언덕 -->
  <rect x="340" y="400" width="604" height="140" rx="4" fill="#E8C878"/>
  <rect x="340" y="360" width="300" height="40" fill="#E8C878"/>
  <rect x="340" y="340" width="180" height="20" fill="#DCBA64"/>
  <!-- 물 -->
  <rect x="340" y="260" width="604" height="140" rx="4" fill="#1E3A8A"/>
  <!-- 불 -->
  <rect x="580" y="120" width="100" height="140" fill="#FF5500" opacity="0.8"/>
  <rect x="620" y="120" width="60" height="100" fill="#FFD700" opacity="0.9"/>
  <!-- 돌 블럭들 -->
  <rect x="340" y="540" width="200" height="100" fill="#788090"/>
  <rect x="740" y="540" width="204" height="100" fill="#788090"/>
  <!-- 바닥 -->
  <rect x="340" y="640" width="604" height="100" rx="4" fill="#4B3621"/>

  <!-- Layer 3: 떨어지는 입자 -->
  <circle cx="500" cy="220" r="10" fill="#E8C878"/>
  <circle cx="520" cy="250" r="8" fill="#DCBA64"/>
  <circle cx="510" cy="280" r="7" fill="#E8C878"/>
  <circle cx="700" cy="200" r="12" fill="#3468C8"/>
  <circle cx="690" cy="240" r="9" fill="#4080E0"/>

  <!-- 물질 이름 표시 (아래) -->
  <rect x="80" y="790" width="864" height="120" rx="16" fill="#161B22"/>
  <text x="512" y="868" font-size="64" fill="#E8C878" text-anchor="middle" font-weight="bold" font-family="monospace">SAND · FALL</text>
</svg>
