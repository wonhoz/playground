  <!-- A letter filled with small characters (overlay effect) -->
  <!-- Simulate filled A with character grid - using clip path concept via overlapping chars -->
  <!-- Left diagonal characters -->
  <text x="254" y="720" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="254" y="680" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="268" y="640" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="286" y="600" font-family="monospace" font-size="38" font-weight="700" fill="#333333">.</text>
  <text x="306" y="560" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="326" y="520" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="348" y="480" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="370" y="440" font-family="monospace" font-size="38" font-weight="700" fill="#333333">.</text>
