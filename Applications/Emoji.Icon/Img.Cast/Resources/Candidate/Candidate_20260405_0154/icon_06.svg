  <text x="240" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="600" fill="#66BB6A">64 · 256</text>
  <!-- Layer 3: Big green checkmark circle overlapping bottom-right -->
  <circle cx="700" cy="680" r="200" fill="url(#check06)"/>
