<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1A252F"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#D68910"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000050"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mondrian-style layout grid -->
  <!-- Outer frame -->
  <rect x="72" y="72" width="368" height="368" rx="4" fill="none" stroke="#ECF0F1" stroke-width="3"/>
  <!-- Internal lines -->
  <line x1="72" y1="220" x2="440" y2="220" stroke="#ECF0F1" stroke-width="3"/>
  <line x1="72" y1="340" x2="440" y2="340" stroke="#ECF0F1" stroke-width="3"/>
  <line x1="220" y1="72" x2="220" y2="220" stroke="#ECF0F1" stroke-width="3"/>
  <line x1="300" y1="220" x2="300" y2="440" stroke="#ECF0F1" stroke-width="3"/>
  <line x1="220" y1="340" x2="220" y2="440" stroke="#ECF0F1" stroke-width="3"/>
  <!-- Colored blocks -->
  <!-- Top-left red -->
  <rect x="75" y="75" width="142" height="142" fill="url(#redGrad)" filter="url(#shadow)"/>
  <!-- Top-right large blue -->
  <rect x="223" y="75" width="214" height="142" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <!-- Middle-left green -->
  <rect x="75" y="223" width="142" height="114" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <!-- Middle-right strip yellow -->
  <rect x="303" y="223" width="134" height="114" fill="url(#yellowGrad)" filter="url(#shadow)"/>
  <!-- Bottom-left large (dark) -->
  <rect x="75" y="343" width="142" height="94" fill="#34495E"/>
  <!-- Bottom-right (dark) -->
  <rect x="303" y="343" width="134" height="94" fill="#2C3E50"/>
  <!-- Center gap (white border strips already visible) -->
  <!-- Layout icon overlay (L shape white) -->
  <rect x="223" y="223" width="74" height="14" rx="2" fill="white" opacity="0.6"/>
  <rect x="223" y="223" width="14" height="114" rx="2" fill="white" opacity="0.6"/>
  <!-- Title bottom center -->
  <text x="183" y="420" font-family="Arial Black, sans-serif" font-size="10" text-anchor="middle" fill="white" opacity="0.4" letter-spacing="1">LAYOUT</text>
  <text x="370" y="420" font-family="Arial Black, sans-serif" font-size="10" text-anchor="middle" fill="white" opacity="0.4" letter-spacing="1">FORGE</text>
</svg>
