<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff80ab"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80d8ff"/>
      <stop offset="100%" stop-color="#40c4ff"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ccff90"/>
      <stop offset="100%" stop-color="#b2ff59"/>
    </linearGradient>
    <linearGradient id="bm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ffc400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 축 -->
  <line x1="80" y1="420" x2="432" y2="420" stroke="#555" stroke-width="4"/>
  <line x1="80" y1="80" x2="80" y2="420" stroke="#555" stroke-width="4"/>
  <!-- 그리드 라인 -->
  <line x1="80" y1="320" x2="432" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="120" x2="432" y2="120" stroke="#333" stroke-width="2"/>
  <!-- 로그 소스별 막대 (3소스 + 병합) -->
  <rect x="100" y="200" width="52" height="220" rx="6" fill="url(#b1)"/>
  <rect x="170" y="160" width="52" height="260" rx="6" fill="url(#b2)"/>
  <rect x="240" y="240" width="52" height="180" rx="6" fill="url(#b3)"/>
  <!-- 병합 결과 막대 -->
  <rect x="340" y="100" width="72" height="320" rx="8" fill="url(#bm)" opacity="0.95"/>
  <!-- 병합 화살표 표시 -->
  <line x1="295" y1="260" x2="335" y2="260" stroke="white" stroke-width="5" stroke-dasharray="8,4"/>
  <polygon points="335,260 322,252 322,268" fill="white"/>
  <!-- 소스 점 표시 (범례) -->
  <circle cx="100" cy="450" r="8" fill="url(#b1)"/>
  <circle cx="170" cy="450" r="8" fill="url(#b2)"/>
  <circle cx="240" cy="450" r="8" fill="url(#b3)"/>
  <circle cx="340" cy="450" r="10" fill="url(#bm)"/>
</svg>
