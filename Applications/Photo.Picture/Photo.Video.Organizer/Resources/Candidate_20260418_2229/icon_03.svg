  <!-- Row 2 -->
  <rect x="110" y="410" width="240" height="220" rx="14" fill="#81C784"/>
  <circle cx="180" cy="470" r="30" fill="#FFCA28" opacity="0.9"/>
  <polygon points="230 440 170 550 290 550" fill="#FFFFFF" opacity="0.6"/>
  <rect x="110" y="600" width="240" height="34" rx="0" fill="#81C784"/>
  <text x="230" y="627" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">04-15</text>

  <rect x="392" y="410" width="240" height="220" rx="14" fill="#BA68C8"/>
  <circle cx="512" cy="480" r="50" fill="#FFFFFF" opacity="0.3"/>
  <rect x="392" y="600" width="240" height="34" rx="0" fill="#BA68C8"/>
  <text x="512" y="627" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">04-16</text>

  <rect x="674" y="410" width="240" height="220" rx="14" fill="#FFB74D"/>
  <polygon points="794 430 734 550 854 550" fill="#FFFFFF" opacity="0.6"/>
