<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 밝은 노랑/오렌지 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFAA33"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: ZZZ 텍스트 (보라/인디고) -->
  <!-- 큰 Z -->
  <text x="160" y="620" font-family="Arial Black, sans-serif" font-size="360" font-weight="900" fill="#6C3FD4" opacity="0.85">Z</text>
  <!-- 중간 Z -->
  <text x="360" y="480" font-family="Arial Black, sans-serif" font-size="240" font-weight="900" fill="#8B60E8" opacity="0.7">Z</text>
  <!-- 작은 Z -->
  <text x="520" y="370" font-family="Arial Black, sans-serif" font-size="160" font-weight="900" fill="#A888F0" opacity="0.6">Z</text>

  <!-- Layer 3: 금지 (No) 기호 — 빨간 사선 -->
  <circle cx="512" cy="512" r="370" fill="none" stroke="#EE2233" stroke-width="88"/>
  <line x1="250" y1="250" x2="774" y2="774" stroke="#EE2233" stroke-width="88" stroke-linecap="round"/>
</svg>
