<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <clipPath id="clip07"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <g clip-path="url(#clip07)">
    <!-- 태양 중앙 원 -->
    <circle cx="512" cy="512" r="115" fill="#FDE68A"/>
    <circle cx="512" cy="512" r="92" fill="#F59E0B"/>
    <!-- 태양 광선 (단어 방사) -->
    <!-- 위 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FDE68A" transform="rotate(0,512,512)">WORD</text>
    <!-- 우측상단 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="50" fill="#FFFFFF" transform="rotate(45,512,512)">cloud</text>
    <!-- 우측 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="58" fill="#FDE68A" transform="rotate(90,512,512)">DATA</text>
    <!-- 우측하단 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="46" fill="#FFFFFF" transform="rotate(135,512,512)">love</text>
    <!-- 아래 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FDE68A" transform="rotate(180,512,512)">TEXT</text>
    <!-- 좌측하단 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#FFFFFF" transform="rotate(225,512,512)">font</text>
    <!-- 좌측 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="54" fill="#FDE68A" transform="rotate(270,512,512)">LIFE</text>
    <!-- 좌측상단 -->
    <text x="512" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="44" fill="#FFFFFF" transform="rotate(315,512,512)">art</text>
    <!-- 중앙 텍스트 -->
    <text x="512" y="525" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#78350F">WC</text>
  </g>
</svg>
