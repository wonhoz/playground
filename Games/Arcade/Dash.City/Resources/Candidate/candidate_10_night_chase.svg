  <rect x="292" y="164" width="14" height="16" fill="#ffcc44" opacity="0.3"/>
  <rect x="236" y="192" width="14" height="16" fill="#44aaff" opacity="0.6"/>
  <rect x="264" y="192" width="14" height="16" fill="#ffcc44" opacity="0.8"/>
  <rect x="292" y="192" width="14" height="16" fill="#44aaff" opacity="0.4"/>
  <rect x="236" y="220" width="14" height="16" fill="#ffcc44" opacity="0.5"/>
  <rect x="264" y="220" width="14" height="16" fill="#44aaff" opacity="0.3"/>
  <rect x="292" y="220" width="14" height="16" fill="#ffcc44" opacity="0.7"/>

  <rect x="336" y="160" width="76" height="200" fill="#080814"/>
  <rect x="358" y="144" width="16" height="16" fill="#080814"/>
  <circle cx="366" cy="138" r="4" fill="#ff4444" opacity="0.7"/>
  <rect x="348" y="176" width="12" height="14" fill="#44aaff" opacity="0.5"/>
  <rect x="374" y="176" width="12" height="14" fill="#ffcc44" opacity="0.7"/>
  <rect x="348" y="202" width="12" height="14" fill="#ffcc44" opacity="0.3"/>
  <rect x="374" y="202" width="12" height="14" fill="#44aaff" opacity="0.6"/>
  <rect x="348" y="228" width="12" height="14" fill="#44aaff" opacity="0.8"/>
  <rect x="374" y="228" width="12" height="14" fill="#ffcc44" opacity="0.4"/>

  <rect x="424" y="200" width="56" height="160" fill="#0a0a16"/>
  <rect x="436" y="216" width="10" height="12" fill="#44aaff" opacity="0.6"/>
  <rect x="458" y="216" width="10" height="12" fill="#ffcc44" opacity="0.4"/>
  <rect x="436" y="240" width="10" height="12" fill="#ffcc44" opacity="0.7"/>
  <rect x="458" y="240" width="10" height="12" fill="#44aaff" opacity="0.3"/>

  <!-- Road with car lights -->
  <rect x="60" y="360" width="392" height="80" fill="url(#road3)"/>
  <line x1="60" y1="400" x2="452" y2="400" stroke="#333" stroke-width="2"/>
  <rect x="100" y="392" width="50" height="8" rx="4" fill="#ffcc00" opacity="0.6"/>
  <rect x="220" y="392" width="50" height="8" rx="4" fill="#ffcc00" opacity="0.6"/>
  <rect x="340" y="392" width="50" height="8" rx="4" fill="#ffcc00" opacity="0.6"/>
  <!-- Headlights beam -->
  <polygon points="256,345 220,370 292,370" fill="#ffffaa" opacity="0.15"/>
  <!-- Runner with glow -->
  <ellipse cx="256" cy="345" rx="18" ry="18" fill="#ff8800" filter="url(#lightGlow)"/>
  <rect x="242" y="363" width="28" height="32" rx="8" fill="#ff8800"/>
  <line x1="242" y1="379" x2="224" y2="398" stroke="#ff8800" stroke-width="10" stroke-linecap="round"/>
  <line x1="270" y1="379" x2="284" y2="396" stroke="#ff8800" stroke-width="10" stroke-linecap="round"/>
  <line x1="248" y1="395" x2="236" y2="416" stroke="#ff8800" stroke-width="10" stroke-linecap="round"/>
  <line x1="264" y1="395" x2="278" y2="414" stroke="#ff8800" stroke-width="10" stroke-linecap="round"/>
  <!-- Title -->
  <text x="256" y="468" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#fff176" text-anchor="middle" letter-spacing="3" filter="url(#moonGlow)">DASH CITY</text>
</svg>
