<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Boot.Map - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #00C6FF; margin-bottom: 8px; }
  p { text-align: center; color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 14px; text-align: center; }
  .item img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .item span { display: block; margin-top: 8px; font-size: 12px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Boot.Map</h1>
<p>시스템 부팅 순서/시간 분석기 - 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_boot_timeline.svg" alt="01"/><span>01 boot_timeline</span></div>
  <div class="item"><img src="candidate_02_radar_boot.svg" alt="02"/><span>02 radar_boot</span></div>
  <div class="item"><img src="candidate_03_boot_heatmap.svg" alt="03"/><span>03 boot_heatmap</span></div>
  <div class="item"><img src="candidate_04_gantt_chart.svg" alt="04"/><span>04 gantt_chart</span></div>
  <div class="item"><img src="candidate_05_network_graph.svg" alt="05"/><span>05 network_graph</span></div>
  <div class="item"><img src="candidate_06_speedometer.svg" alt="06"/><span>06 speedometer</span></div>
  <div class="item"><img src="candidate_07_circuit_boot.svg" alt="07"/><span>07 circuit_boot</span></div>
  <div class="item"><img src="candidate_08_flame_boot.svg" alt="08"/><span>08 flame_boot</span></div>
  <div class="item"><img src="candidate_09_matrix_boot.svg" alt="09"/><span>09 matrix_boot</span></div>
  <div class="item"><img src="candidate_10_constellation_boot.svg" alt="10"/><span>10 constellation_boot</span></div>
</div>
</body>
</html>
