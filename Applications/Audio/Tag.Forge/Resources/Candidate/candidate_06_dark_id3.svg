<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#2D2D44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C792EA"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File icon -->
  <path d="M152 112 L312 112 L360 160 L360 400 Q360 416 344 416 L152 416 Q136 416 136 400 L136 128 Q136 112 152 112 Z" fill="#2D2D44" stroke="#C792EA" stroke-width="3"/>
  <path d="M312 112 L312 160 L360 160" fill="none" stroke="#C792EA" stroke-width="3"/>
  <!-- ID3 badge -->
  <rect x="155" y="130" width="68" height="28" rx="8" fill="url(#accent)"/>
  <text x="189" y="150" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">ID3</text>
  <!-- Tag fields in file -->
  <g font-family="monospace" font-size="13">
    <text x="160" y="210" fill="#C792EA" opacity="0.9">Title</text>
    <rect x="208" y="198" width="128" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
    <text x="160" y="238" fill="#C792EA" opacity="0.9">Artist</text>
    <rect x="210" y="226" width="105" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
    <text x="160" y="266" fill="#C792EA" opacity="0.9">Album</text>
    <rect x="213" y="254" width="115" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
    <text x="160" y="294" fill="#C792EA" opacity="0.9">Year</text>
    <rect x="204" y="282" width="68" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
    <text x="160" y="322" fill="#C792EA" opacity="0.9">Genre</text>
    <rect x="213" y="310" width="90" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
    <text x="160" y="350" fill="#C792EA" opacity="0.9">Track</text>
    <rect x="210" y="338" width="55" height="10" rx="5" fill="#7B2FBE" opacity="0.6"/>
  </g>
  <!-- Album art placeholder -->
  <rect x="285" y="210" width="58" height="58" rx="6" fill="#7B2FBE" opacity="0.5" stroke="#C792EA" stroke-width="1.5"/>
  <!-- Music note in art box -->
  <text x="314" y="248" text-anchor="middle" font-family="Arial" font-size="28" fill="#C792EA" opacity="0.7">♪</text>
  <!-- Edit pen -->
  <g transform="translate(370,360) rotate(40)">
    <rect x="-6" y="-38" width="12" height="50" rx="4" fill="#FFD54F"/>
    <polygon points="-6,12 6,12 0,26" fill="#FFC107"/>
    <rect x="-6" y="-48" width="12" height="12" rx="3" fill="#BDBDBD"/>
  </g>
</svg>
