<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2300"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- grid background -->
  <g fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3">
    <line x1="90" y1="90" x2="90" y2="422"/>
    <line x1="178" y1="90" x2="178" y2="422"/>
    <line x1="266" y1="90" x2="266" y2="422"/>
    <line x1="354" y1="90" x2="354" y2="422"/>
    <line x1="422" y1="90" x2="422" y2="422"/>
    <line x1="90" y1="90" x2="422" y2="90"/>
    <line x1="90" y1="178" x2="422" y2="178"/>
    <line x1="90" y1="266" x2="422" y2="266"/>
    <line x1="90" y1="354" x2="422" y2="354"/>
    <line x1="90" y1="422" x2="422" y2="422"/>
  </g>
  <!-- pencil -->
  <g transform="rotate(-35, 256, 256)">
    <rect x="224" y="100" width="64" height="260" rx="6" fill="#ffe066"/>
    <polygon points="224,360 288,360 256,430" fill="#f4a261"/>
    <rect x="224" y="100" width="64" height="30" fill="#c0c0c0"/>
    <rect x="230" y="130" width="52" height="200" fill="#ffe066"/>
    <line x1="256" y1="130" x2="256" y2="330" stroke="#e6c200" stroke-width="3"/>
  </g>
  <!-- highlight letter -->
  <text x="256" y="480" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#ffe066" text-anchor="middle" opacity="0.7">CROSSWORD</text>
</svg>
