<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c3"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Warm cream background -->
  <rect width="1024" height="1024" rx="190" fill="#FFFBEB"/>
  <g clip-path="url(#c3)">
    <!-- Layer 2: Input format badges (left column) -->
    <rect x="96" y="248" width="240" height="90" rx="18" fill="#4F46E5"/>
    <text x="216" y="313" font-family="Arial Black,Arial,sans-serif" font-size="88" fill="white" font-weight="900" text-anchor="middle">SVG</text>

    <rect x="96" y="370" width="240" height="90" rx="18" fill="#059669"/>
    <text x="216" y="435" font-family="Arial Black,Arial,sans-serif" font-size="88" fill="white" font-weight="900" text-anchor="middle">PNG</text>

    <rect x="96" y="492" width="240" height="90" rx="18" fill="#D97706"/>
    <text x="216" y="557" font-family="Arial Black,Arial,sans-serif" font-size="88" fill="white" font-weight="900" text-anchor="middle">JPG</text>

    <rect x="96" y="614" width="240" height="90" rx="18" fill="#DC2626"/>
    <text x="216" y="679" font-family="Arial Black,Arial,sans-serif" font-size="88" fill="white" font-weight="900" text-anchor="middle">BMP</text>

    <!-- Layer 3: Converging arrows to center -->
    <line x1="336" y1="293" x2="540" y2="512" stroke="#4F46E5" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <line x1="336" y1="415" x2="540" y2="512" stroke="#059669" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <line x1="336" y1="537" x2="540" y2="512" stroke="#D97706" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <line x1="336" y1="659" x2="540" y2="512" stroke="#DC2626" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

    <!-- Main conversion arrow -->
    <line x1="570" y1="512" x2="700" y2="512" stroke="#1E1B4B" stroke-width="60" stroke-linecap="round"/>
    <polygon points="678,452 760,512 678,572" fill="#1E1B4B"/>

    <!-- Output: large ICO badge (right) -->
    <rect x="766" y="380" width="222" height="264" rx="28" fill="#1E1B4B"/>
    <text x="877" y="470" font-family="Arial Black,Arial,sans-serif" font-size="90" fill="#FCD34D" font-weight="900" text-anchor="middle">ICO</text>
    <!-- Size dots inside ICO badge -->
    <circle cx="830" cy="524" r="18" fill="#818CF8"/>
    <circle cx="877" cy="524" r="25" fill="#818CF8"/>
    <circle cx="931" cy="524" r="32" fill="#818CF8"/>
    <text x="877" y="626" font-family="Arial,sans-serif" font-size="80" fill="#C4B5FD" font-weight="bold" text-anchor="middle">256px</text>
  </g>
</svg>
