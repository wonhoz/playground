  <path d="M 512 308 A 332 332 0 0 1 844 640" fill="none" stroke="#4CAF50" stroke-width="60" stroke-linecap="round"/>
  <!-- 바늘 (빠름 방향 - 오른쪽) -->
  <line x1="512" y1="640" x2="770" y2="380" stroke="#F57F17" stroke-width="16" stroke-linecap="round"/>
  <circle cx="512" cy="640" r="36" fill="#F57F17"/>
  <circle cx="512" cy="640" r="20" fill="white"/>
  <!-- 눈금 텍스트 -->
  <text x="175" y="710" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#EF5350" text-anchor="middle">느림</text>
  <text x="512" y="284" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FDD835" text-anchor="middle">보통</text>
  <text x="848" y="710" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#4CAF50" text-anchor="middle">빠름</text>
  <!-- Layer 3: 상태 배지 -->
  <rect x="284" y="770" width="456" height="86" rx="22" fill="#2E7D32"/>
  <text x="512" y="827" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#FDD835" text-anchor="middle">OPTIMIZED!</text>
