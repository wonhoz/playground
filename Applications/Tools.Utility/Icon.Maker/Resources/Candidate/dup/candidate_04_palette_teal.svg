<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="palette" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 팔레트 모양 -->
  <ellipse cx="230" cy="260" rx="180" ry="160" fill="url(#palette)"/>
  <ellipse cx="290" cy="260" rx="80" ry="70" fill="#004D40"/>
  <!-- 컬러 닷들 -->
  <circle cx="110" cy="180" r="30" fill="#F44336"/>
  <circle cx="170" cy="120" r="30" fill="#FF9800"/>
  <circle cx="250" cy="100" r="30" fill="#FFEB3B"/>
  <circle cx="330" cy="120" r="30" fill="#4CAF50"/>
  <circle cx="380" cy="180" r="30" fill="#2196F3"/>
  <circle cx="380" cy="260" r="30" fill="#9C27B0"/>
  <!-- 붓 -->
  <rect x="310" y="300" width="160" height="14" rx="7" fill="#B2DFDB" transform="rotate(-45 310 300)"/>
  <ellipse cx="244" cy="366" rx="16" ry="22" fill="#26A69A" transform="rotate(-45 244 366)"/>
  <!-- ICO 뱃지 -->
  <rect x="340" y="360" width="110" height="110" rx="20" fill="#004D40" stroke="#80CBC4" stroke-width="3"/>
  <text x="395" y="430" font-size="22" text-anchor="middle" fill="#B2DFDB" font-family="Segoe UI" font-weight="bold">.ICO</text>
  <text x="395" y="400" font-size="36" text-anchor="middle" fill="#80CBC4" font-family="Segoe UI Emoji">🖌️</text>
</svg>