<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg05lg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#0C1C0C"/>
      <stop offset="100%" stop-color="#040804"/>
    </radialGradient>
    <radialGradient id="canopyGlow05" cx="50%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#40FF60" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#40FF60" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rootGlow05" cx="50%" cy="90%" r="30%">
      <stop offset="0%" stop-color="#3AC95A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3AC95A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame05lg">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05lg)"/>
  <g clip-path="url(#frame05lg)">

    <!-- Canopy glow -->
    <circle cx="512" cy="390" r="280" fill="url(#canopyGlow05)"/>
    <!-- Root glow -->
    <ellipse cx="512" cy="900" rx="160" ry="50" fill="url(#rootGlow05)"/>

    <!-- ===== CENTRAL TREE SILHOUETTE ===== -->
    <!-- Trunk -->
    <line x1="512" y1="870" x2="512" y2="680" stroke="#5A3008" stroke-width="12" stroke-linecap="round"/>
    <!-- Level 1 -->
    <line x1="512" y1="680" x2="445" y2="556" stroke="#6B4010" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="680" x2="579" y2="556" stroke="#6B4010" stroke-width="8" stroke-linecap="round"/>
    <!-- Level 2 -->
    <line x1="445" y1="556" x2="390" y2="468" stroke="#7A5018" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="445" y1="556" x2="446" y2="464" stroke="#7A5018" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="579" y1="556" x2="578" y2="464" stroke="#7A5018" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="579" y1="556" x2="634" y2="468" stroke="#7A5018" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Level 3 twigs -->
    <line x1="390" y1="468" x2="358" y2="412" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="390" y1="468" x2="388" y2="408" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="446" y1="464" x2="420" y2="406" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="446" y1="464" x2="460" y2="402" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="578" y1="464" x2="564" y2="402" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="578" y1="464" x2="604" y2="406" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="634" y1="468" x2="636" y2="408" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="634" y1="468" x2="666" y2="412" stroke="#9A6828" stroke-width="3.5" stroke-linecap="round"/>

    <!-- LEAF CROWN (large bright cluster) -->
    <!-- Outer ring of leaf blobs -->
    <ellipse cx="330" cy="390" rx="32" ry="22" fill="#2AB848" opacity="0.8" transform="rotate(-20 330 390)"/>
    <ellipse cx="360" cy="365" rx="38" ry="26" fill="#3AC95A" opacity="0.9" transform="rotate(-10 360 365)"/>
    <ellipse cx="400" cy="348" rx="38" ry="26" fill="#40DD60" opacity="0.85"/>
    <ellipse cx="440" cy="335" rx="34" ry="24" fill="#3AC95A" opacity="0.9"/>
    <ellipse cx="476" cy="326" rx="34" ry="24" fill="#50EE70" opacity="0.85"/>
    <ellipse cx="512" cy="322" rx="36" ry="25" fill="#40FF60" opacity="0.9"/>
    <ellipse cx="548" cy="326" rx="34" ry="24" fill="#50EE70" opacity="0.85"/>
    <ellipse cx="584" cy="335" rx="34" ry="24" fill="#3AC95A" opacity="0.9"/>
    <ellipse cx="624" cy="348" rx="38" ry="26" fill="#40DD60" opacity="0.85"/>
    <ellipse cx="664" cy="365" rx="38" ry="26" fill="#3AC95A" opacity="0.9" transform="rotate(10 664 365)"/>
    <ellipse cx="694" cy="390" rx="32" ry="22" fill="#2AB848" opacity="0.8" transform="rotate(20 694 390)"/>
    <!-- Inner/middle ring -->
    <ellipse cx="380" cy="342" rx="30" ry="20" fill="#50EE70" opacity="0.75"/>
    <ellipse cx="440" cy="315" rx="32" ry="22" fill="#40FF60" opacity="0.8"/>
    <ellipse cx="512" cy="304" rx="36" ry="24" fill="#60FF80" opacity="0.85"/>
    <ellipse cx="584" cy="315" rx="32" ry="22" fill="#40FF60" opacity="0.8"/>
    <ellipse cx="644" cy="342" rx="30" ry="20" fill="#50EE70" opacity="0.75"/>

    <!-- Flower dots scattered in canopy -->
    <circle cx="365" cy="355" r="8" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="436" cy="325" r="9" fill="#FFD0E8" opacity="0.85"/>
    <circle cx="492" cy="312" r="9" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="536" cy="310" r="8" fill="#FFD0E8" opacity="0.85"/>
    <circle cx="584" cy="322" r="9" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="642" cy="348" r="8" fill="#FFD0E8" opacity="0.85"/>

    <!-- ===== HUD: Title + Progress ===== -->
    <text x="512" y="155" font-family="'Segoe UI',Arial" font-size="56" font-weight="900" fill="#3AC95A" text-anchor="middle" opacity="0.9" letter-spacing="4">LEAF · GROW</text>

    <!-- Iteration progress bar -->
    <rect x="280" y="174" width="464" height="20" rx="10" fill="#0A1A0A"/>
    <rect x="280" y="174" width="371" height="20" rx="10" fill="#3AC95A" opacity="0.85"/>
    <!-- Marker dots -->
    <circle cx="396" cy="184" r="5" fill="#0A1A0A"/>
    <circle cx="512" cy="184" r="5" fill="#0A1A0A"/>
    <circle cx="628" cy="184" r="5" fill="#0A1A0A"/>
    <text x="280" y="215" font-family="'Segoe UI',Arial" font-size="22" fill="#3A8840" opacity="0.85">반복</text>
    <text x="660" y="215" font-family="'Segoe UI',Arial" font-size="22" font-weight="700" fill="#88DD88" opacity="0.9" text-anchor="end">4 / 5</text>

    <!-- Growth rate badge -->
    <rect x="402" y="224" width="220" height="38" rx="12" fill="#0E2010" stroke="#2A6030" stroke-width="1"/>
    <text x="512" y="249" font-family="'Segoe UI',Arial" font-size="22" font-weight="700" fill="#60DD80" text-anchor="middle" opacity="0.9">성장률 87%</text>

    <!-- Species name -->
    <text x="512" y="960" font-family="'Segoe UI',Arial" font-size="30" font-weight="700" fill="#2A6030" text-anchor="middle" opacity="0.8">분기 나무  (Fractal Tree)</text>
  </g>
</svg>
