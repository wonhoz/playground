<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000005"/>
      <stop offset="100%" stop-color="#00000f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars/background -->
  <circle cx="100" cy="80" r="1" fill="white" opacity="0.3"/>
  <circle cx="200" cy="60" r="1" fill="white" opacity="0.2"/>
  <circle cx="350" cy="90" r="1" fill="white" opacity="0.3"/>
  <circle cx="450" cy="50" r="1" fill="white" opacity="0.2"/>
  <circle cx="60" cy="400" r="1" fill="white" opacity="0.2"/>
  <circle cx="470" cy="430" r="1" fill="white" opacity="0.3"/>
  <!-- Constellation lines connecting hex bytes -->
  <line x1="256" y1="100" x2="160" y2="190" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="190" x2="100" y2="300" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="100" x2="380" y2="180" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="180" x2="420" y2="310" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="300" x2="220" y2="380" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="380" x2="360" y2="400" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="310" x2="360" y2="400" stroke="#4ADE80" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="190" x2="256" y2="256" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
  <line x1="380" y1="180" x2="256" y2="256" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="300" x2="256" y2="256" stroke="#22C55E" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="310" x2="256" y2="256" stroke="#22C55E" stroke-width="1" opacity="0.3"/>
  <!-- Hex byte nodes as stars -->
  <circle cx="256" cy="100" r="12" fill="#15803D" stroke="#4ADE80" stroke-width="2"/>
  <text x="256" y="104" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">FF</text>
  <circle cx="160" cy="190" r="10" fill="#15803D" stroke="#22C55E" stroke-width="1.5"/>
  <text x="160" y="194" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">A0</text>
  <circle cx="380" cy="180" r="10" fill="#15803D" stroke="#22C55E" stroke-width="1.5"/>
  <text x="380" y="184" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">3B</text>
  <circle cx="100" cy="300" r="8" fill="#166534" stroke="#16A34A" stroke-width="1.5"/>
  <text x="100" y="304" text-anchor="middle" font-family="monospace" font-size="7" fill="#22C55E">4E</text>
  <circle cx="420" cy="310" r="8" fill="#166534" stroke="#16A34A" stroke-width="1.5"/>
  <text x="420" y="314" text-anchor="middle" font-family="monospace" font-size="7" fill="#22C55E">C1</text>
  <circle cx="220" cy="380" r="8" fill="#166534" stroke="#16A34A" stroke-width="1.5"/>
  <text x="220" y="384" text-anchor="middle" font-family="monospace" font-size="7" fill="#22C55E">D7</text>
  <circle cx="360" cy="400" r="8" fill="#166534" stroke="#16A34A" stroke-width="1.5"/>
  <text x="360" y="404" text-anchor="middle" font-family="monospace" font-size="7" fill="#22C55E">88</text>
  <!-- Center node (brightest) -->
  <circle cx="256" cy="256" r="18" fill="#14532D" stroke="#4ADE80" stroke-width="3"/>
  <circle cx="256" cy="256" r="28" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.4"/>
  <text x="256" y="253" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">HEX</text>
  <text x="256" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#22C55E">PEEK</text>
</svg>
