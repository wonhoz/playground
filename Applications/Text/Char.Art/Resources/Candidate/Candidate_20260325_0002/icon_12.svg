<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Dark near-black -->
  <rect width="1024" height="1024" rx="190" fill="#12121F"/>

  <!-- Camera lens rings (concentric circles) -->
  <circle cx="512" cy="512" r="385" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="28"/>
  <circle cx="512" cy="512" r="330" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="18"/>
  <circle cx="512" cy="512" r="278" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="14"/>
  <circle cx="512" cy="512" r="225" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="10"/>

  <!-- Lens interior fill -->
  <circle cx="512" cy="512" r="220" fill="#0A0A18"/>

  <!-- ASCII chars arranged in circular arc -->
  <!-- Inner ring of chars (r ~155) -->
  <text x="512" y="370" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">@</text>
  <text x="651" y="415" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">#</text>
  <text x="700" y="560" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">$</text>
  <text x="636" y="700" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">%</text>
  <text x="512" y="750" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">@</text>
  <text x="388" y="700" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">#</text>
  <text x="322" y="560" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">$</text>
  <text x="371" y="415" font-family="'Courier New', monospace" font-size="78" font-weight="900"
        text-anchor="middle" fill="#00E5FF">%</text>

  <!-- Center "@" -->
  <text x="512" y="548" font-family="'Courier New', monospace" font-size="130" font-weight="900"
        text-anchor="middle" fill="#00E5FF">@</text>

  <!-- Aperture blades (lens diaphragm lines) -->
  <line x1="512" y1="127" x2="512" y2="226" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="727" y1="191" x2="673" y2="278" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="873" y1="407" x2="782" y2="449" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="873" y1="617" x2="782" y2="575" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="727" y1="833" x2="673" y2="746" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="297" y1="833" x2="351" y2="746" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="151" y1="617" x2="242" y2="575" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="151" y1="407" x2="242" y2="449" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
  <line x1="297" y1="191" x2="351" y2="278" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>
</svg>
