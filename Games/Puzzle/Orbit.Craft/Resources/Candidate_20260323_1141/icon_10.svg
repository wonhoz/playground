<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 매직 퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#0A0020"/>
  <!-- Layer 2: 3D 느낌의 행성 + 토성 링 -->
  <!-- 뒤 링 -->
  <ellipse cx="512" cy="512" rx="380" ry="100" fill="none" stroke="#CE93D8" stroke-width="10" opacity="0.3"/>
  <!-- 행성 -->
  <circle cx="512" cy="512" r="220" fill="#4A0080"/>
  <circle cx="512" cy="512" r="200" fill="#6A0DAD"/>
  <circle cx="512" cy="512" r="180" fill="#7B1FA2"/>
  <!-- 행성 표면 디테일 -->
  <ellipse cx="512" cy="512" rx="140" ry="60" fill="none" stroke="#CE93D8" stroke-width="5" opacity="0.4"/>
  <ellipse cx="512" cy="460" rx="100" ry="35" fill="none" stroke="#E1BEE7" stroke-width="4" opacity="0.3"/>
  <!-- 앞 링 (행성 앞에) -->
  <ellipse cx="512" cy="512" rx="380" ry="100" fill="none" stroke="#CE93D8" stroke-width="16" opacity="0.8" clip-path="url(#front)"/>
  <!-- 링 위 우주선 -->
  <circle cx="892" cy="512" r="18" fill="#FFFF00"/>
  <!-- 위성들 -->
  <circle cx="512" cy="292" r="20" fill="#00E5FF" opacity="0.9"/>
  <circle cx="512" cy="732" r="16" fill="#FF4081" opacity="0.9"/>
  <circle cx="180" cy="440" r="14" fill="#FFD740" opacity="0.9"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#CE93D8" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
