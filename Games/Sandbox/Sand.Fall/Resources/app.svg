<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0E00"/>
      <stop offset="100%" stop-color="#3E2000"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Ground pile -->
  <ellipse cx="256" cy="430" rx="180" ry="50" fill="url(#ground)" opacity="0.9"/>
  <!-- Falling sand particles -->
  <g fill="url(#sand)">
    <rect x="240" y="100" width="18" height="18" rx="3"/>
    <rect x="252" y="140" width="14" height="14" rx="2"/>
    <rect x="236" y="175" width="16" height="16" rx="3"/>
    <rect x="258" y="215" width="12" height="12" rx="2"/>
    <rect x="244" y="250" width="18" height="18" rx="3"/>
    <rect x="260" y="290" width="14" height="14" rx="2"/>
    <rect x="238" y="325" width="16" height="16" rx="3"/>
    <!-- Side particles -->
    <rect x="210" y="200" width="10" height="10" rx="2" opacity="0.7"/>
    <rect x="290" y="230" width="10" height="10" rx="2" opacity="0.7"/>
    <rect x="200" y="310" width="12" height="12" rx="2" opacity="0.5"/>
    <rect x="305" y="290" width="12" height="12" rx="2" opacity="0.5"/>
    <rect x="185" y="380" width="14" height="14" rx="3" opacity="0.6"/>
    <rect x="315" y="360" width="14" height="14" rx="3" opacity="0.6"/>
  </g>
  <!-- Hourglass top opening -->
  <path d="M 196 90 L 316 90 L 276 130 L 236 130 Z" fill="url(#sand)" opacity="0.5"/>
  <line x1="196" y1="90" x2="316" y2="90" stroke="url(#sand)" stroke-width="6" stroke-linecap="round"/>
</svg>
