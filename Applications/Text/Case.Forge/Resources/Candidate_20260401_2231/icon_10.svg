<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="key10cf" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg10cf)"/>

  <!-- Layer 2: Large Aa keyboard key -->
  <rect x="180" y="160" width="664" height="500" rx="36" fill="url(#key10cf)"/>
  <rect x="200" y="180" width="624" height="460" rx="28" fill="white"/>

  <!-- Big "Aa" text on key -->
  <text x="340" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="320" font-weight="bold"
    fill="#0097A7" text-anchor="middle">A</text>
  <text x="680" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="240" font-weight="bold"
    fill="#B2EBF2" text-anchor="middle">a</text>

  <!-- Layer 3: Case result pills below the key -->
  <rect x="88" y="710" width="264" height="72" rx="36" fill="white" opacity="0.9"/>
  <text x="220" y="756" font-family="'Courier New',monospace" font-size="48" font-weight="bold"
    fill="#006064" text-anchor="middle">camel</text>

  <rect x="384" y="710" width="256" height="72" rx="36" fill="white" opacity="0.9"/>
  <text x="512" y="756" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#2E7D32" text-anchor="middle">snake_</text>

  <rect x="672" y="710" width="264" height="72" rx="36" fill="white" opacity="0.9"/>
  <text x="804" y="756" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#880E4F" text-anchor="middle">kebab-</text>

  <rect x="180" y="816" width="264" height="72" rx="36" fill="white" opacity="0.85"/>
  <text x="312" y="862" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#E65100" text-anchor="middle">SCREAM</text>

  <rect x="480" y="816" width="364" height="72" rx="36" fill="white" opacity="0.85"/>
  <text x="662" y="862" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#1565C0" text-anchor="middle">PascalCase</text>
</svg>
