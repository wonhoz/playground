<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#003333"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84FFFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Environment variable list panel -->
  <rect x="70" y="80" width="372" height="352" rx="12" fill="#001E20" stroke="#00BCD4" stroke-width="2"/>
  <!-- Header -->
  <rect x="70" y="80" width="372" height="48" rx="12" fill="url(#teal)"/>
  <rect x="70" y="108" width="372" height="20" fill="url(#teal)"/>
  <text x="256" y="111" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" fill="white" font-weight="bold">Environment Variables</text>
  <!-- List rows -->
  <rect x="86" y="144" width="340" height="32" rx="5" fill="#003A3C"/>
  <rect x="86" y="182" width="340" height="32" rx="5" fill="#002E30"/>
  <rect x="86" y="220" width="340" height="32" rx="5" fill="#003A3C"/>
  <rect x="86" y="258" width="340" height="32" rx="5" fill="#002E30"/>
  <rect x="86" y="296" width="340" height="32" rx="5" fill="#003A3C"/>
  <rect x="86" y="334" width="340" height="32" rx="5" fill="#002E30"/>
  <!-- Row content -->
  <text x="100" y="165" font-family="Consolas" font-size="12" fill="#84FFFF">PATH</text>
  <text x="200" y="165" font-family="Consolas" font-size="11" fill="#00BCD4">/usr/bin:/usr/local/bin</text>
  <text x="100" y="203" font-family="Consolas" font-size="12" fill="#84FFFF">JAVA_HOME</text>
  <text x="200" y="203" font-family="Consolas" font-size="11" fill="#00BCD4">/opt/java/17</text>
  <text x="100" y="241" font-family="Consolas" font-size="12" fill="#84FFFF">NODE_PATH</text>
  <text x="200" y="241" font-family="Consolas" font-size="11" fill="#00BCD4">/usr/lib/node</text>
  <!-- Active row highlight for PATH -->
  <rect x="86" y="144" width="4" height="32" rx="2" fill="#84FFFF"/>
  <!-- Shield overlay badge -->
  <circle cx="382" cy="380" r="46" fill="#001E20" stroke="#00BCD4" stroke-width="3"/>
  <path d="M382 344 L410 358 L410 382 Q410 404 382 414 Q354 404 354 382 L354 358 Z" fill="url(#teal)" opacity="0.3" stroke="#00BCD4" stroke-width="2"/>
  <path d="M368 376 L380 388 L398 366" stroke="#84FFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>