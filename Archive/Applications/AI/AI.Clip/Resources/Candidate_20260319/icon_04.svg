  <circle cx="460" cy="560" r="32" fill="none" stroke="#00BCD4" stroke-width="16"/>
  <line x1="400" y1="544" x2="520" y2="480" stroke="#00BCD4" stroke-width="16" stroke-linecap="round"/>
  <line x1="440" y1="576" x2="520" y2="640" stroke="#00BCD4" stroke-width="16" stroke-linecap="round"/>
  <!-- AI chip bottom right -->
  <rect x="620" y="580" width="180" height="180" rx="24" fill="#00BCD4"/>
  <rect x="644" y="604" width="132" height="132" rx="12" fill="#0A1628"/>
