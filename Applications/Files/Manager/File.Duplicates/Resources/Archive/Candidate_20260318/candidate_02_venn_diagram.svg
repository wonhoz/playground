<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#041216"/>
    </linearGradient>
    <radialGradient id="circle1Grad" cx="40%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="circle2Grad" cx="60%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="overlapGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="circle1Clip">
      <circle cx="210" cy="256" r="130"/>
    </clipPath>
    <clipPath id="circle2Clip">
      <circle cx="302" cy="256" r="130"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 원 1 -->
  <circle cx="210" cy="256" r="130" fill="url(#circle1Grad)" stroke="#06B6D4" stroke-width="2.5" opacity="0.9"/>
  <!-- 원 2 -->
  <circle cx="302" cy="256" r="130" fill="url(#circle2Grad)" stroke="#22D3EE" stroke-width="2.5" opacity="0.9"/>
  <!-- 겹치는 영역 강조 -->
  <path d="
    M 256,140
    A 130,130 0 0,1 256,372
    A 130,130 0 0,1 256,140
  " fill="url(#overlapGrad)" opacity="0.6" filter="url(#glow)"/>
  <!-- 파일 아이콘 (왼쪽 원) -->
  <g opacity="0.8">
    <rect x="140" y="230" width="50" height="62" rx="5" fill="#06B6D4" opacity="0.6"/>
    <polygon points="140,230 165,230 165,208 190,230" fill="#0891B2" opacity="0.7"/>
    <line x1="150" y1="253" x2="182" y2="253" stroke="#E0F7FA" stroke-width="2" opacity="0.7"/>
    <line x1="150" y1="265" x2="175" y2="265" stroke="#E0F7FA" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- 파일 아이콘 (오른쪽 원) -->
  <g opacity="0.75">
    <rect x="322" y="230" width="50" height="62" rx="5" fill="#22D3EE" opacity="0.5"/>
    <polygon points="322,230 347,230 347,208 372,230" fill="#06B6D4" opacity="0.6"/>
    <line x1="332" y1="253" x2="364" y2="253" stroke="#E0F7FA" stroke-width="2" opacity="0.6"/>
    <line x1="332" y1="265" x2="357" y2="265" stroke="#E0F7FA" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- 겹치는 영역 - 동일 파일 표시 -->
  <circle cx="256" cy="256" r="22" fill="#67E8F9" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="261" text-anchor="middle" font-family="Arial" font-size="14" fill="#030508" font-weight="bold">=</text>
  <!-- 라벨 -->
  <text x="168" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#06B6D4" opacity="0.7">Group A</text>
  <text x="344" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#22D3EE" opacity="0.7">Group B</text>
  <text x="256" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#67E8F9" opacity="0.9">DUPLICATES</text>
  <!-- 파티클 -->
  <circle cx="130" cy="180" r="2.5" fill="#06B6D4" opacity="0.5"/>
  <circle cx="390" cy="180" r="2.5" fill="#22D3EE" opacity="0.5"/>
  <circle cx="120" cy="340" r="2" fill="#06B6D4" opacity="0.4"/>
  <circle cx="395" cy="340" r="2" fill="#22D3EE" opacity="0.4"/>
</svg>