<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="#0A0A0A"/>
  <!-- Big @ symbol -->
  <text x="512" y="560" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, monospace" font-size="640" font-weight="900" fill="#39FF14">@</text>
  <!-- Face silhouette inside @ -->
  <!-- Head circle -->
  <circle cx="512" cy="470" r="95" fill="#0A0A0A"/>
  <!-- Eyes -->
  <circle cx="478" cy="450" r="14" fill="#39FF14"/>
  <circle cx="546" cy="450" r="14" fill="#39FF14"/>
