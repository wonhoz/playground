<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Patchwork pieces -->
  <rect x="120" y="130" width="120" height="120" rx="8" fill="#FFCCBC" opacity="0.9"/>
  <rect x="252" y="130" width="120" height="120" rx="8" fill="#FFAB91" opacity="0.9"/>
  <rect x="120" y="262" width="120" height="120" rx="8" fill="#FF8A65" opacity="0.9"/>
  <rect x="252" y="262" width="120" height="120" rx="8" fill="#FF7043" opacity="0.9"/>
  <!-- Patch stitching lines -->
  <rect x="124" y="134" width="112" height="112" rx="6" fill="none" stroke="#BF360C" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="256" y="134" width="112" height="112" rx="6" fill="none" stroke="#BF360C" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="124" y="266" width="112" height="112" rx="6" fill="none" stroke="#BF360C" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="256" y="266" width="112" height="112" rx="6" fill="none" stroke="#BF360C" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Cross stitching at center -->
  <line x1="120" y1="240" x2="372" y2="240" stroke="white" stroke-width="4" stroke-dasharray="8,6"/>
  <line x1="240" y1="130" x2="240" y2="382" stroke="white" stroke-width="4" stroke-dasharray="8,6"/>
  <!-- Scissors at cross -->
  <circle cx="234" cy="234" r="16" fill="none" stroke="#FFCCBC" stroke-width="4"/>
  <line x1="244" y1="224" x2="380" y2="140" stroke="#FFCCBC" stroke-width="4" stroke-linecap="round"/>
  <line x1="244" y1="244" x2="380" y2="328" stroke="#FFCCBC" stroke-width="4" stroke-linecap="round"/>
</svg>
