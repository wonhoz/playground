<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0530"/>
      <stop offset="100%" stop-color="#0d2b1a"/>
    </linearGradient>
    <linearGradient id="cell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 세포 분열 패턴으로 잎 표현 -->
  <!-- 중앙 큰 세포 -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="url(#cell)" stroke-width="6" opacity="0.9"/>
  <circle cx="256" cy="256" r="20" fill="url(#cell)" opacity="0.6"/>
  <!-- 1단계 분열 -->
  <circle cx="180" cy="210" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <circle cx="332" cy="210" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <circle cx="180" cy="302" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <circle cx="332" cy="302" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <circle cx="256" cy="180" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <circle cx="256" cy="332" r="42" fill="none" stroke="url(#cell)" stroke-width="5" opacity="0.8"/>
  <!-- 2단계 분열 (외곽) -->
  <circle cx="118" cy="160" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="394" cy="160" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="118" cy="352" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="394" cy="352" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="160" cy="115" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="352" cy="115" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="160" cy="397" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <circle cx="352" cy="397" r="28" fill="none" stroke="url(#cell)" stroke-width="4" opacity="0.5"/>
  <!-- 연결 맥관 -->
  <line x1="256" y1="256" x2="180" y2="210" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="332" y2="210" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="180" y2="302" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="332" y2="302" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="180" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="332" stroke="url(#cell)" stroke-width="3" opacity="0.4"/>
</svg>
