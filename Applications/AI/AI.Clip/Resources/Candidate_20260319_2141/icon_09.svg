<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Infinity symbol made of text/data (endless clipboard AI loop) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0A"/>
  <!-- Infinity loop — two circles connected -->
  <!-- Left loop -->
  <circle cx="340" cy="512" r="200" fill="none" stroke="#FF6D00" stroke-width="52"/>
  <!-- Right loop -->
  <circle cx="684" cy="512" r="200" fill="none" stroke="#FF6D00" stroke-width="52"/>
  <!-- Mask overlap (fill to create clean infinity) -->
  <rect x="400" y="312" width="224" height="400" fill="#0A0A0A"/>
  <!-- Cross strands -->
  <!-- Top crossing strand -->
  <path d="M400 392 Q512 512 624 392" fill="none" stroke="#FF6D00" stroke-width="52" stroke-linecap="round"/>
  <!-- Bottom crossing strand -->
  <path d="M400 632 Q512 512 624 632" fill="none" stroke="#FF6D00" stroke-width="52" stroke-linecap="round"/>
  <!-- AI dot in center crossing -->
  <circle cx="512" cy="512" r="44" fill="#FF6D00"/>
  <circle cx="512" cy="512" r="22" fill="#0A0A0A"/>
  <!-- Text dash decorations on loops -->
  <rect x="240" y="498" width="48" height="28" rx="8" fill="#FF6D00" opacity="0.4"/>
  <rect x="716" y="498" width="48" height="28" rx="8" fill="#FF6D00" opacity="0.4"/>
</svg>
