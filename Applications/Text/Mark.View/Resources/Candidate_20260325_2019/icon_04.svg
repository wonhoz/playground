<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="100%" stop-color="#A29BFE"/>
    </linearGradient>
    <clipPath id="clip04">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer1: 배경 -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <g clip-path="url(#clip04)">
    <!-- Layer2: 전체 카드 -->
    <rect x="160" y="200" width="704" height="620" rx="32" fill="white"/>
    <!-- 제목바 (어두운 배경, 상단 모서리만 둥글게) -->
    <rect x="160" y="200" width="704" height="55" rx="32" fill="#2D3436"/>
    <!-- 제목바 하단 각지게 처리 -->
    <rect x="160" y="228" width="704" height="27" fill="#2D3436"/>
    <!-- 트래픽 라이트 -->
    <circle cx="225" cy="228" r="14" fill="#FF5F56"/>
    <circle cx="270" cy="228" r="14" fill="#FFBD2E"/>
    <circle cx="315" cy="228" r="14" fill="#27C93F"/>
    <!-- 좌측 패널 (어두운 편집기) -->
    <rect x="160" y="255" width="340" height="565" fill="#1E1E2E"/>
    <!-- 좌측 "#" 텍스트 -->
    <text x="220" y="380" font-size="120" font-weight="900" font-family="Courier New, monospace" fill="#A29BFE" dominant-baseline="auto">#</text>
    <!-- 좌측 코드 줄들 -->
    <rect x="200" y="430" width="260" height="18" rx="9" fill="#74B9FF" fill-opacity="0.4"/>
    <rect x="200" y="462" width="220" height="15" rx="7" fill="#A29BFE" fill-opacity="0.3"/>
    <rect x="200" y="494" width="240" height="15" rx="7" fill="#74B9FF" fill-opacity="0.3"/>
    <rect x="200" y="526" width="200" height="15" rx="7" fill="#A29BFE" fill-opacity="0.25"/>
    <rect x="200" y="558" width="250" height="15" rx="7" fill="#74B9FF" fill-opacity="0.2"/>
    <!-- 가운데 분리선 -->
    <rect x="498" y="255" width="6" height="565" fill="#DDDDDD"/>
    <!-- 우측 패널 (밝은 미리보기) -->
    <rect x="504" y="255" width="360" height="565" fill="#FAFAFA"/>
    <!-- 우측 헤딩 텍스트 -->
    <text x="524" y="330" font-size="60" font-weight="900" font-family="Arial, sans-serif" fill="#2D3436" dominant-baseline="auto">Title</text>
    <!-- 우측 줄들 -->
    <rect x="524" y="380" width="300" height="16" rx="8" fill="#636E72" fill-opacity="0.4"/>
    <rect x="524" y="408" width="280" height="14" rx="7" fill="#636E72" fill-opacity="0.3"/>
    <rect x="524" y="434" width="310" height="14" rx="7" fill="#636E72" fill-opacity="0.3"/>
    <rect x="524" y="460" width="260" height="14" rx="7" fill="#636E72" fill-opacity="0.25"/>
    <rect x="524" y="494" width="290" height="14" rx="7" fill="#636E72" fill-opacity="0.2"/>
    <rect x="524" y="520" width="240" height="14" rx="7" fill="#636E72" fill-opacity="0.2"/>
    <rect x="524" y="548" width="270" height="14" rx="7" fill="#636E72" fill-opacity="0.18"/>
    <!-- Layer3: 우측 패널 하단 초록 배지 -->
    <rect x="524" y="730" width="260" height="50" rx="25" fill="#27AE60"/>
    <text x="654" y="755" font-size="32" font-weight="700" font-family="Arial Black, Arial, sans-serif" fill="white" text-anchor="middle" dominant-baseline="central">✓ PREVIEW</text>
  </g>
</svg>
