<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="ghostGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ghostblur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ghost ambient glow -->
  <circle cx="256" cy="260" r="180" fill="url(#ghostGlow)" filter="url(#ghostblur)"/>

  <!-- Archive box (being peeked at) -->
  <rect x="130" y="320" width="252" height="155" rx="10" fill="#0f0e02" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5" filter="url(#softglow)"/>
  <!-- Box lid -->
  <rect x="120" y="295" width="272" height="40" rx="6" fill="#121100" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Box zipper detail -->
  <line x1="235" y1="295" x2="277" y2="295" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.5" stroke-dasharray="5,3"/>
  <rect x="246" y="289" width="20" height="18" rx="4" fill="#1a1800" stroke="#EAB308" stroke-width="1.5" filter="url(#softglow)"/>

  <!-- Files inside box (peeking visible) -->
  <rect x="155" y="342" width="65" height="80" rx="5" fill="#EAB308" fill-opacity="0.06" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="164" y1="360" x2="212" y2="360" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="164" y1="373" x2="210" y2="373" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="164" y1="386" x2="212" y2="386" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>

  <rect x="235" y="350" width="55" height="70" rx="4" fill="#FBBF24" fill-opacity="0.05" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="243" y1="365" x2="282" y2="365" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="243" y1="378" x2="280" y2="378" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>

  <rect x="305" y="342" width="62" height="80" rx="4" fill="#EAB308" fill-opacity="0.06" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="313" y1="360" x2="358" y2="360" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="313" y1="373" x2="356" y2="373" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Ghost body -->
  <path d="M256,100 C 180,100 140,160 140,230 C 140,275 155,310 140,350 C 130,370 115,385 130,385 C 148,385 155,368 173,368 C 191,368 196,385 212,385 C 228,385 234,368 256,368 C 278,368 284,385 300,385 C 316,385 322,368 340,368 C 356,368 364,385 382,385 C 398,385 384,370 372,350 C 356,310 372,275 372,230 C 372,160 332,100 256,100 Z"
    fill="#EAB308" fill-opacity="0.12" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.65" filter="url(#glow)"/>

  <!-- Ghost eyes (friendly/curious look) -->
  <!-- Left eye -->
  <ellipse cx="218" cy="220" rx="25" ry="28" fill="#0f0e02" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="218" cy="220" r="15" fill="#EAB308" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="218" cy="220" r="9" fill="#0a0900"/>
  <circle cx="223" cy="215" r="4" fill="white" fill-opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="294" cy="220" rx="25" ry="28" fill="#0f0e02" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="294" cy="220" r="15" fill="#F59E0B" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="294" cy="220" r="9" fill="#0a0900"/>
  <circle cx="299" cy="215" r="4" fill="white" fill-opacity="0.7"/>

  <!-- Ghost mouth (curious "o") -->
  <ellipse cx="256" cy="268" rx="20" ry="16" fill="#0a0900" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Ghost highlight/shine -->
  <ellipse cx="220" cy="150" rx="22" ry="14" fill="white" fill-opacity="0.08" transform="rotate(-20 220 150)"/>

  <!-- Peeking hands (ghost arms reaching toward box) -->
  <!-- Left arm -->
  <path d="M155,310 Q145,320 140,335" fill="none" stroke="#EAB308" stroke-width="8" stroke-opacity="0.4" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M155,310 Q145,320 140,335" fill="none" stroke="#FDE68A" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- Left hand fingers -->
  <circle cx="136" cy="340" r="8" fill="#EAB308" fill-opacity="0.3" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="125" cy="333" r="6" fill="#EAB308" fill-opacity="0.25"/>
  <circle cx="130" cy="350" r="6" fill="#EAB308" fill-opacity="0.25"/>

  <!-- Right arm -->
  <path d="M357,310 Q367,320 372,335" fill="none" stroke="#F59E0B" stroke-width="8" stroke-opacity="0.4" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M357,310 Q367,320 372,335" fill="none" stroke="#FDE68A" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- Right hand fingers -->
  <circle cx="376" cy="340" r="8" fill="#F59E0B" fill-opacity="0.3" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="387" cy="333" r="6" fill="#F59E0B" fill-opacity="0.25"/>
  <circle cx="382" cy="350" r="6" fill="#F59E0B" fill-opacity="0.25"/>

  <!-- Sparkle stars around ghost -->
  <path d="M80,160 L83,152 L86,160 L94,163 L86,166 L83,174 L80,166 L72,163 Z" fill="#EAB308" fill-opacity="0.4" filter="url(#softglow)"/>
  <path d="M430,180 L432,175 L434,180 L439,182 L434,184 L432,189 L430,184 L425,182 Z" fill="#F59E0B" fill-opacity="0.35"/>
  <path d="M90,380 L92,375 L94,380 L99,382 L94,384 L92,389 L90,384 L85,382 Z" fill="#FBBF24" fill-opacity="0.3"/>
</svg>
