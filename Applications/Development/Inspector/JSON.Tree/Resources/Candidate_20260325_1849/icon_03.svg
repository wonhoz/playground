<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03jt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 하늘 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03jt)"/>
  <!-- 구름 장식 -->
  <ellipse cx="200" cy="200" rx="110" ry="60" fill="white" opacity="0.70"/>
  <ellipse cx="240" cy="180" rx="80" ry="55" fill="white" opacity="0.70"/>
  <ellipse cx="820" cy="160" rx="90" ry="50" fill="white" opacity="0.70"/>
  <ellipse cx="860" cy="145" rx="70" ry="45" fill="white" opacity="0.70"/>

  <!-- Layer 2: 나무 (JSON 트리 구조) -->
  <!-- 줄기 -->
  <rect x="476" y="620" width="72" height="260" rx="18" fill="url(#trunk)"/>
  <!-- 뿌리들 -->
  <path d="M 512,880 Q 420,900 390,940" stroke="#78350F" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 512,880 Q 600,910 630,945" stroke="#78350F" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 512,880 Q 512,910 512,950" stroke="#78350F" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- 가지들 -->
  <path d="M 512,650 Q 360,580 280,500" stroke="#92400E" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 512,650 Q 660,580 760,500" stroke="#92400E" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 512,700 Q 420,680 350,640" stroke="#92400E" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 512,700 Q 600,680 670,640" stroke="#92400E" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Layer 3: 잎 노드들 (JSON 값들) -->
  <!-- 루트 노드 {} -->
  <circle cx="512" cy="400" r="72" fill="#0EA5E9" stroke="white" stroke-width="8"/>
  <text x="512" y="418" text-anchor="middle" font-family="Consolas, monospace"
        font-size="52" font-weight="bold" fill="white">{}</text>

  <!-- 좌측 가지 노드들 -->
  <circle cx="288" cy="300" r="56" fill="#10B981" stroke="white" stroke-width="7"/>
  <text x="288" y="316" text-anchor="middle" font-family="Consolas, monospace"
        font-size="36" font-weight="bold" fill="white">[]</text>

  <circle cx="168" cy="200" r="44" fill="#F59E0B" stroke="white" stroke-width="6"/>
  <text x="168" y="214" text-anchor="middle" font-family="Consolas, monospace"
        font-size="28" fill="white">"A"</text>

  <circle cx="310" cy="185" r="44" fill="#EF4444" stroke="white" stroke-width="6"/>
  <text x="310" y="199" text-anchor="middle" font-family="Consolas, monospace"
        font-size="28" fill="white">42</text>

  <!-- 우측 가지 노드들 -->
  <circle cx="736" cy="300" r="56" fill="#8B5CF6" stroke="white" stroke-width="7"/>
  <text x="736" y="316" text-anchor="middle" font-family="Consolas, monospace"
        font-size="36" font-weight="bold" fill="white">{}</text>

  <circle cx="650" cy="185" r="44" fill="#F59E0B" stroke="white" stroke-width="6"/>
  <text x="650" y="199" text-anchor="middle" font-family="Consolas, monospace"
        font-size="28" fill="white">"B"</text>

  <circle cx="846" cy="200" r="44" fill="#06B6D4" stroke="white" stroke-width="6"/>
  <text x="846" y="214" text-anchor="middle" font-family="Consolas, monospace"
        font-size="28" fill="white">✓</text>

  <!-- 가지선 (노드 연결) -->
  <line x1="512" y1="400" x2="288" y2="300" stroke="#92400E" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="400" x2="736" y2="300" stroke="#92400E" stroke-width="12" stroke-linecap="round"/>
  <line x1="288" y1="300" x2="168" y2="200" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
  <line x1="288" y1="300" x2="310" y2="185" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
  <line x1="736" y1="300" x2="650" y2="185" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
  <line x1="736" y1="300" x2="846" y2="200" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
</svg>
