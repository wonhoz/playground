    <line x1="178" y1="215" x2="334" y2="215" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="211" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">&gt;</text>
  </g>

  <!-- 쌍 8 (y=240) -->
  <g filter="url(#glow09)">
    <line x1="210" y1="240" x2="302" y2="240" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="236" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">_</text>
  </g>

  <!-- 쌍 9 (y=265) -->
  <g filter="url(#glow09)">
    <line x1="210" y1="265" x2="302" y2="265" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="261" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">F</text>
  </g>

  <!-- 쌍 10 (y=290) -->
  <g filter="url(#glow09)">
    <line x1="178" y1="290" x2="334" y2="290" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="286" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">O</text>
  </g>

