<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="purple_bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <linearGradient id="hash_grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E0FF"/>
    </linearGradient>
    <filter id="shadow_soft">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4A148C" flood-opacity="0.4"/>
    </filter>
    <filter id="text_glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Background — vivid purple gradient circle -->
  <rect width="1024" height="1024" rx="190" fill="url(#purple_bg)"/>

  <!-- Subtle grid lines in background -->
  <line x1="0" y1="342" x2="1024" y2="342" stroke="white" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="682" x2="1024" y2="682" stroke="white" stroke-width="1" opacity="0.07"/>
  <line x1="342" y1="0" x2="342" y2="1024" stroke="white" stroke-width="1" opacity="0.07"/>
  <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1" opacity="0.07"/>
  <line x1="682" y1="0" x2="682" y2="1024" stroke="white" stroke-width="1" opacity="0.07"/>

  <!-- Layer 2: Main object — giant # symbol -->
  <g filter="url(#shadow_soft)">
    <!-- # symbol — horizontal bars -->
    <rect x="196" y="368" width="620" height="72" rx="36" fill="url(#hash_grad)"/>
    <rect x="196" y="568" width="620" height="72" rx="36" fill="url(#hash_grad)"/>
    <!-- # symbol — vertical bars -->
    <rect x="324" y="230" width="72" height="548" rx="36" fill="url(#hash_grad)"/>
    <rect x="608" y="230" width="72" height="548" rx="36" fill="url(#hash_grad)"/>
  </g>

  <!-- Layer 3: Detail — text lines below hash (representing heading content) -->
  <!-- Title text line -->
  <rect x="196" y="840" width="500" height="32" rx="12" fill="white" opacity="0.65"/>
  <!-- Sub line 1 -->
  <rect x="196" y="890" width="380" height="22" rx="8" fill="white" opacity="0.35"/>
  <!-- Sub line 2 -->
  <rect x="196" y="922" width="420" height="22" rx="8" fill="white" opacity="0.28"/>

  <!-- Small md badge -->
  <rect x="740" y="840" width="100" height="100" rx="16" fill="white" opacity="0.15"/>
  <text x="760" y="895" font-family="Arial" font-size="28" font-weight="bold" fill="white" opacity="0.9">.md</text>

  <!-- Glow accent on # bars -->
  <rect x="196" y="368" width="620" height="72" rx="36" fill="none" stroke="white" stroke-width="3" opacity="0.35"/>
  <rect x="196" y="568" width="620" height="72" rx="36" fill="none" stroke="white" stroke-width="3" opacity="0.35"/>
  <rect x="324" y="230" width="72" height="548" rx="36" fill="none" stroke="white" stroke-width="3" opacity="0.35"/>
  <rect x="608" y="230" width="72" height="548" rx="36" fill="none" stroke="white" stroke-width="3" opacity="0.35"/>
</svg>
