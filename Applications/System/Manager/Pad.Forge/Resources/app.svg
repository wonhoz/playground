<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3D2B89"/>
      <stop offset="100%" stop-color="#1A0F4A"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <circle cx="512" cy="512" r="512" fill="url(#bg1)"/>

  <!-- Layer 2: 어깨 버튼 (LB/RB) -->
  <rect x="272" y="338" width="142" height="44" rx="14" fill="#5A48CC"/>
  <text x="343" y="361" text-anchor="middle" dominant-baseline="middle" fill="#C4B8FF" font-size="24" font-family="Arial" font-weight="bold">LB</text>
  <rect x="610" y="338" width="142" height="44" rx="14" fill="#5A48CC"/>
  <text x="681" y="361" text-anchor="middle" dominant-baseline="middle" fill="#C4B8FF" font-size="24" font-family="Arial" font-weight="bold">RB</text>

  <!-- 패드 메인 바디 -->
  <rect x="253" y="372" width="518" height="218" rx="82" fill="#6D5AE6"/>
  <!-- 왼쪽 그립 -->
  <rect x="266" y="524" width="158" height="148" rx="54" fill="#6D5AE6"/>
  <!-- 오른쪽 그립 -->
  <rect x="600" y="524" width="158" height="148" rx="54" fill="#6D5AE6"/>

  <!-- 패드 내부 어두운 영역 -->
  <rect x="330" y="392" width="364" height="168" rx="52" fill="#4A3AAA" opacity="0.5"/>

  <!-- Layer 3: 버튼 디테일 -->

  <!-- D-pad (왼쪽) -->
  <rect x="308" y="460" width="70" height="24" rx="6" fill="#E0D4FF"/>
  <rect x="333" y="435" width="24" height="70" rx="6" fill="#E0D4FF"/>

  <!-- 왼쪽 아날로그 스틱 -->
  <circle cx="410" cy="508" r="38" fill="#4A3AAA"/>
  <circle cx="410" cy="508" r="23" fill="#8B7CF6"/>

  <!-- 오른쪽 아날로그 스틱 -->
  <circle cx="634" cy="528" r="38" fill="#4A3AAA"/>
  <circle cx="634" cy="528" r="23" fill="#8B7CF6"/>

  <!-- ABXY 버튼 -->
  <!-- A (아래, 녹색) -->
  <circle cx="708" cy="495" r="26" fill="#2E7D32"/>
  <circle cx="708" cy="495" r="20" fill="#43A047"/>
  <text x="708" y="495" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="18" font-family="Arial" font-weight="bold">A</text>

  <!-- B (오른쪽, 빨강) -->
  <circle cx="750" cy="456" r="26" fill="#B71C1C"/>
  <circle cx="750" cy="456" r="20" fill="#E53935"/>
  <text x="750" y="456" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="18" font-family="Arial" font-weight="bold">B</text>

  <!-- X (왼쪽, 파랑) -->
  <circle cx="666" cy="456" r="26" fill="#1565C0"/>
  <circle cx="666" cy="456" r="20" fill="#1E88E5"/>
  <text x="666" y="456" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="18" font-family="Arial" font-weight="bold">X</text>

  <!-- Y (위, 노랑) -->
  <circle cx="708" cy="418" r="26" fill="#F9A825"/>
  <circle cx="708" cy="418" r="20" fill="#FDD835"/>
  <text x="708" y="418" text-anchor="middle" dominant-baseline="middle" fill="#333" font-size="18" font-family="Arial" font-weight="bold">Y</text>

  <!-- 홈 버튼 -->
  <circle cx="512" cy="462" r="22" fill="#9C89FF"/>
  <circle cx="512" cy="462" r="13" fill="#7B68EE"/>

  <!-- 메뉴/뒤로가기 버튼 -->
  <rect x="456" y="448" width="30" height="14" rx="7" fill="#9C89FF" opacity="0.8"/>
  <rect x="538" y="448" width="30" height="14" rx="7" fill="#9C89FF" opacity="0.8"/>

  <!-- 그립 텍스처 -->
  <circle cx="338" cy="578" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="358" cy="598" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="318" cy="598" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="338" cy="618" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="686" cy="578" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="706" cy="598" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="666" cy="598" r="5" fill="#4A3AAA" opacity="0.8"/>
  <circle cx="686" cy="618" r="5" fill="#4A3AAA" opacity="0.8"/>
</svg>
