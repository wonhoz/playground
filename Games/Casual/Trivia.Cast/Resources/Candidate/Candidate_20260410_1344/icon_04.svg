<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="bulb04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <filter id="glow04">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Rays of light -->
  <g stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.6">
    <line x1="512" y1="100" x2="512" y2="160"/>
    <line x1="712" y1="155" x2="680" y2="207"/>
    <line x1="800" y1="330" x2="748" y2="348"/>
    <line x1="312" y1="155" x2="344" y2="207"/>
    <line x1="224" y1="330" x2="276" y2="348"/>
  </g>
  <!-- Layer 2: Light bulb body -->
  <ellipse cx="512" cy="430" rx="200" ry="210" fill="url(#bulb04)" stroke="#E65100" stroke-width="14"/>
  <!-- Bulb base sections -->
  <rect x="430" y="620" width="164" height="40" rx="8" fill="#E65100"/>
  <rect x="436" y="668" width="152" height="40" rx="8" fill="#E65100"/>
  <rect x="444" y="716" width="136" height="40" rx="8" fill="#BF360C"/>
  <!-- Question mark inside bulb -->
  <text x="512" y="490" font-family="Arial Black, sans-serif" font-size="240" font-weight="900" fill="#E65100" text-anchor="middle" dominant-baseline="middle">?</text>
  <!-- Layer 3: Glowing center circle -->
  <circle cx="512" cy="430" r="80" fill="#FFFFFF" opacity="0.35" filter="url(#glow04)"/>
  <!-- Blue accent dots (categories) -->
  <circle cx="200" cy="700" r="36" fill="#1565C0"/>
  <circle cx="280" cy="780" r="28" fill="#0288D1"/>
  <circle cx="824" cy="700" r="36" fill="#1565C0"/>
  <circle cx="744" cy="780" r="28" fill="#0288D1"/>
</svg>
