<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFB7C5"/>
      <stop offset="100%" stop-color="#C9184A"/>
    </radialGradient>
    <radialGradient id="petal" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFD6E0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Book pages in background -->
  <rect x="110" y="120" width="130" height="280" rx="6" fill="white" opacity="0.25" transform="rotate(-8,175,260)"/>
  <rect x="140" y="115" width="130" height="280" rx="6" fill="white" opacity="0.2" transform="rotate(-3,205,255)"/>
  <rect x="170" y="112" width="130" height="280" rx="6" fill="white" opacity="0.35"/>
  <rect x="210" y="112" width="130" height="280" rx="6" fill="white" opacity="0.3"/>
  <!-- Sakura flower center -->
  <!-- Petal 1 -->
  <ellipse cx="256" cy="200" rx="28" ry="50" fill="url(#petal)" transform="rotate(0 256 256)"/>
  <!-- Petal 2 -->
  <ellipse cx="256" cy="200" rx="28" ry="50" fill="url(#petal)" transform="rotate(72 256 256)"/>
  <!-- Petal 3 -->
  <ellipse cx="256" cy="200" rx="28" ry="50" fill="url(#petal)" transform="rotate(144 256 256)"/>
  <!-- Petal 4 -->
  <ellipse cx="256" cy="200" rx="28" ry="50" fill="url(#petal)" transform="rotate(216 256 256)"/>
  <!-- Petal 5 -->
  <ellipse cx="256" cy="200" rx="28" ry="50" fill="url(#petal)" transform="rotate(288 256 256)"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="22" fill="#FFB7C5"/>
  <circle cx="256" cy="256" r="12" fill="#C9184A"/>
  <!-- Stamens -->
  <circle cx="256" cy="242" r="3" fill="#fff"/>
  <circle cx="268" cy="250" r="3" fill="#fff"/>
  <circle cx="263" cy="264" r="3" fill="#fff"/>
  <circle cx="249" cy="264" r="3" fill="#fff"/>
  <circle cx="244" cy="250" r="3" fill="#fff"/>
  <!-- Falling petals -->
  <ellipse cx="130" cy="380" rx="12" ry="20" fill="white" opacity="0.6" transform="rotate(30 130 380)"/>
  <ellipse cx="380" cy="150" rx="10" ry="16" fill="white" opacity="0.5" transform="rotate(-20 380 150)"/>
  <ellipse cx="400" cy="380" rx="11" ry="18" fill="white" opacity="0.4" transform="rotate(50 400 380)"/>
  <ellipse cx="90" cy="200" rx="9" ry="15" fill="white" opacity="0.5" transform="rotate(-40 90 200)"/>
  <!-- Page indicator dots -->
  <circle cx="226" cy="450" r="6" fill="white" opacity="0.4"/>
  <circle cx="246" cy="450" r="6" fill="white" opacity="0.4"/>
  <circle cx="266" cy="450" r="8" fill="white" opacity="0.9"/>
  <circle cx="286" cy="450" r="6" fill="white" opacity="0.4"/>
</svg>
