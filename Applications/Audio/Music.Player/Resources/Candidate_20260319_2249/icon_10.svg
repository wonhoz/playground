<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Frequency spectrum analyzer — color gradient bars -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#040A14"/>
  <!-- Spectrum bars (low → high freq, tall → short, color: blue→green→yellow→red) -->
  <!-- 14 bars -->
  <rect x="140" y="280" width="50" height="500" rx="10" fill="#1565C0"/>
  <rect x="204" y="220" width="50" height="560" rx="10" fill="#1976D2"/>
  <rect x="268" y="180" width="50" height="600" rx="10" fill="#0288D1"/>
  <rect x="332" y="220" width="50" height="560" rx="10" fill="#00838F"/>
  <rect x="396" y="260" width="50" height="520" rx="10" fill="#00897B"/>
  <rect x="460" y="300" width="50" height="480" rx="10" fill="#2E7D32"/>
  <rect x="524" y="350" width="50" height="430" rx="10" fill="#558B2F"/>
  <rect x="588" y="400" width="50" height="380" rx="10" fill="#F9A825"/>
  <rect x="652" y="450" width="50" height="330" rx="10" fill="#EF6C00"/>
  <rect x="716" y="500" width="50" height="280" rx="10" fill="#E64A19"/>
  <rect x="780" y="560" width="50" height="220" rx="10" fill="#C62828"/>
  <rect x="834" y="620" width="50" height="160" rx="10" fill="#AD1457"/>
  <!-- Mirror reflection below baseline (faded) -->
  <rect x="140" y="786" width="50" height="80" rx="10" fill="#1565C0" opacity="0.2"/>
  <rect x="204" y="786" width="50" height="80" rx="10" fill="#1976D2" opacity="0.2"/>
  <rect x="268" y="786" width="50" height="80" rx="10" fill="#0288D1" opacity="0.2"/>
  <rect x="332" y="786" width="50" height="80" rx="10" fill="#00838F" opacity="0.2"/>
  <rect x="396" y="786" width="50" height="80" rx="10" fill="#00897B" opacity="0.2"/>
  <rect x="460" y="786" width="50" height="80" rx="10" fill="#2E7D32" opacity="0.2"/>
  <rect x="524" y="786" width="50" height="80" rx="10" fill="#558B2F" opacity="0.2"/>
  <rect x="588" y="786" width="50" height="80" rx="10" fill="#F9A825" opacity="0.2"/>
  <rect x="652" y="786" width="50" height="80" rx="10" fill="#EF6C00" opacity="0.2"/>
  <!-- Baseline -->
  <rect x="120" y="782" width="784" height="8" rx="4" fill="#1A2A40" opacity="0.8"/>
</svg>
