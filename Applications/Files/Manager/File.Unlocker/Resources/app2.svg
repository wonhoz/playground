<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#F59E0B;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#FBBF24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <g transform="translate(0,-34)">
  <!-- 자물쇠 본체 (잠긴 상태 → 깨지는 중) -->
  <!-- 자물쇠 몸체 -->
  <rect x="176" y="256" width="160" height="130" rx="15" fill="url(#lockGrad)" opacity="0.9"/>
  <!-- 자물쇠 고리 (부서진) -->
  <path d="M 210,256 L 210,196 Q 210,150 256,150 Q 302,150 302,196 L 302,248" fill="none" stroke="#FBBF24" stroke-width="22" stroke-linecap="round" opacity="0.85"/>
  <!-- 고리 부서짐 효과 -->
  <path d="M 302,248 L 302,256" fill="none" stroke="#FCD34D" stroke-width="18" opacity="0.4"/>
  <!-- 레이저 빔 -->
  <rect x="60" y="250" width="250" height="6" rx="3" fill="url(#laserGrad)" filter="url(#laserGlow)"/>
  <!-- 레이저 소스 -->
  <rect x="50" y="235" width="40" height="36" rx="8" fill="#92400E" opacity="0.9"/>
  <rect x="86" y="245" width="8" height="16" rx="2" fill="#F59E0B" opacity="0.9"/>
  <!-- 레이저 충격 지점 -->
  <circle cx="310" cy="253" r="18" fill="#FCD34D" opacity="0.7" filter="url(#laserGlow)"/>
  <circle cx="310" cy="253" r="10" fill="white" opacity="0.5" filter="url(#glow)"/>
  <!-- 파편들 -->
  <rect x="320" y="230" width="8" height="5" rx="2" fill="#F59E0B" opacity="0.8" transform="rotate(20 324 232)"/>
  <rect x="335" y="240" width="6" height="4" rx="1" fill="#FBBF24" opacity="0.7" transform="rotate(-15 338 242)"/>
  <rect x="325" y="258" width="7" height="4" rx="2" fill="#FCD34D" opacity="0.75" transform="rotate(35 328 260)"/>
  <circle cx="348" cy="232" r="3" fill="#F59E0B" opacity="0.6"/>
  <circle cx="342" cy="268" r="2.5" fill="#FBBF24" opacity="0.65"/>
  <!-- 자물쇠 내 열쇠 구멍 -->
  <circle cx="256" cy="310" r="16" fill="#92400E" opacity="0.8"/>
  <rect x="249" y="310" width="14" height="22" rx="3" fill="#92400E" opacity="0.8"/>
  <!-- 잠금 해제 텍스트 -->
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="11" fill="#F59E0B" opacity="0.6">LASER UNLOCK</text>
  <!-- 빛 파티클 -->
  <circle cx="380" cy="200" r="3" fill="#FCD34D" opacity="0.5" filter="url(#glow)"/>
  <circle cx="420" cy="280" r="2.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="150" cy="180" r="2" fill="#FBBF24" opacity="0.5"/>
  </g>
</svg>