  <rect width="1024" height="1024" rx="150" fill="#5B21B6"/>
  <!-- Layer 2: Chat bubble -->
  <rect x="170" y="260" width="600" height="360" rx="40" fill="#EDE9FE"/>
  <!-- Bubble tail -->
  <path d="M 250 620 L 200 700 L 340 620 Z" fill="#EDE9FE"/>
  <!-- Layer 3: Prompt text inside bubble -->
  <text x="310" y="380" font-family="Consolas,monospace" font-size="34" fill="#7C3AED" font-weight="bold">&gt; </text>
  <text x="370" y="380" font-family="Consolas,monospace" font-size="34" fill="#1E1B4B">prompt_</text>
  <!-- Cursor blink rect -->
  <rect x="652" y="353" width="18" height="34" rx="2" fill="#7C3AED" opacity="0.85"/>
  <!-- Sub text lines -->
  <rect x="214" y="410" width="520" height="16" rx="4" fill="#A78BFA" opacity="0.45"/>
  <rect x="214" y="440" width="440" height="16" rx="4" fill="#A78BFA" opacity="0.35"/>
  <rect x="214" y="470" width="360" height="16" rx="4" fill="#A78BFA" opacity="0.25"/>
