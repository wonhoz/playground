<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Registry tree panel -->
  <rect x="155" y="185" width="714" height="580" rx="28" fill="#FFFFFF" stroke="#60A5FA" stroke-width="8"/>
  <!-- Header bar -->
  <rect x="155" y="185" width="714" height="62" rx="28" fill="#2563EB"/>
  <rect x="155" y="219" width="714" height="28" rx="0" fill="#2563EB"/>
  <text x="512" y="228" font-family="Arial,sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Registry Editor</text>
  <!-- Tree structure -->
  <!-- HKEY_LOCAL_MACHINE -->
  <text x="192" y="316" font-family="Consolas,monospace" font-size="38" fill="#1D4ED8">▶ HKEY_LOCAL_MACHINE</text>
  <!-- HKEY_CURRENT_USER - expanded -->
  <text x="192" y="378" font-family="Consolas,monospace" font-size="38" fill="#7C3AED">▼ HKEY_CURRENT_USER</text>
  <rect x="230" y="390" width="4" height="160" rx="2" fill="#A5B4FC"/>
  <text x="255" y="432" font-family="Consolas,monospace" font-size="36" fill="#6D28D9">▶ Control Panel</text>
  <text x="255" y="482" font-family="Consolas,monospace" font-size="36" fill="#7C3AED" opacity="0.7">▼ Software</text>
  <text x="292" y="528" font-family="Consolas,monospace" font-size="34" fill="#9D74FF">  Microsoft</text>
  <!-- HKEY_CLASSES_ROOT -->
  <text x="192" y="585" font-family="Consolas,monospace" font-size="38" fill="#0284C7">▶ HKEY_CLASSES_ROOT</text>
  <!-- HKEY_USERS -->
  <text x="192" y="641" font-family="Consolas,monospace" font-size="38" fill="#0284C7">▶ HKEY_USERS</text>
  <!-- Bookmark star -->
  <text x="800" y="482" font-family="Arial,sans-serif" font-size="52" fill="#F59E0B">★</text>
  <!-- Label -->
  <text x="512" y="862" font-family="Arial,sans-serif" font-size="58" fill="#1D4ED8" font-weight="bold" text-anchor="middle">Reg Vault</text>
</svg>
