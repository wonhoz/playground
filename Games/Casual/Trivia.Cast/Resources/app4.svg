<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <filter id="shadow03">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000050"/>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Card stack - back cards -->
  <rect x="250" y="370" width="560" height="340" rx="24" fill="#F8BBD9" opacity="0.6" transform="rotate(-8 512 540)"/>
  <rect x="250" y="360" width="560" height="340" rx="24" fill="#FFCCBC" opacity="0.7" transform="rotate(-4 512 530)"/>
  <!-- Layer 2: Front card (white) -->
  <rect x="220" y="310" width="584" height="360" rx="24" fill="#FFFFFF" filter="url(#shadow03)"/>
  <!-- Card top bar coral -->
  <rect x="220" y="310" width="584" height="72" rx="24" fill="#FF7043"/>
  <rect x="220" y="358" width="584" height="24" fill="#FF7043"/>
  <!-- Q label on bar -->
  <text x="280" y="362" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF" dominant-baseline="middle">Q</text>
  <!-- Card number -->
  <text x="764" y="362" font-family="Arial Black, sans-serif" font-size="40" font-weight="700" fill="#FFCCBC" text-anchor="end" dominant-baseline="middle">3/10</text>
  <!-- Answer lines on card -->
  <rect x="260" y="420" width="480" height="28" rx="8" fill="#F3E5F5"/>
  <rect x="260" y="470" width="380" height="28" rx="8" fill="#F3E5F5"/>
  <rect x="260" y="520" width="440" height="28" rx="8" fill="#F3E5F5"/>
  <rect x="260" y="570" width="320" height="28" rx="8" fill="#F3E5F5"/>
  <!-- Layer 3: Correct badge on card -->
  <circle cx="750" cy="540" r="70" fill="#66BB6A"/>
  <path d="M718 540 L742 564 L782 514" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Stars below stack -->
  <text x="512" y="780" font-family="sans-serif" font-size="80" text-anchor="middle">⭐⭐⭐</text>
</svg>
