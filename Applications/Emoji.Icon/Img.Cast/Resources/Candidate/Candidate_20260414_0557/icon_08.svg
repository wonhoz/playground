<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </radialGradient>
    <linearGradient id="centerCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F9FBE7"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06D6A0"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg8)"/>

  <!-- Orbit ring (decorative) -->
  <circle cx="512" cy="480" r="350" fill="none" stroke="#E91E63" stroke-width="10" stroke-dasharray="20,16" opacity="0.4"/>

  <!-- Top input badges (orbiting) -->
  <rect x="362" y="90" width="160" height="80" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="442" y="143" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">SVG</text>

  <!-- Right output badge -->
  <rect x="834" y="380" width="160" height="80" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="914" y="433" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">ICO</text>

  <!-- Bottom badge -->
  <rect x="362" y="848" width="160" height="80" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="442" y="901" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">PNG</text>

  <!-- Left badge -->
  <rect x="30" y="380" width="180" height="80" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="120" y="433" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">WEBP</text>

  <!-- Orbit arrows (pointing inward to center) -->
  <!-- Top arrow -->
  <rect x="490" y="182" width="44" height="60" rx="12" fill="#06D6A0" stroke="#004D40" stroke-width="10"/>
  <polygon points="462,242 512,292 562,242" fill="#06D6A0" stroke="#004D40" stroke-width="10" stroke-linejoin="round"/>

  <!-- Right arrow -->
  <rect x="754" y="458" width="60" height="44" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <polygon points="754,432 704,480 754,528" fill="#E91E63" stroke="#880E4F" stroke-width="10" stroke-linejoin="round"/>

  <!-- Bottom arrow -->
  <rect x="490" y="754" width="44" height="60" rx="12" fill="#06D6A0" stroke="#004D40" stroke-width="10"/>
  <polygon points="462,754 512,704 562,754" fill="#06D6A0" stroke="#004D40" stroke-width="10" stroke-linejoin="round"/>

  <!-- Left arrow -->
  <rect x="218" y="458" width="60" height="44" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <polygon points="278,432 328,480 278,528" fill="#E91E63" stroke="#880E4F" stroke-width="10" stroke-linejoin="round"/>

  <!-- Center white card -->
  <rect x="282" y="330" width="460" height="300" rx="36" fill="url(#centerCard)" stroke="#004D40" stroke-width="18"/>

  <!-- CAST mega badge center -->
  <rect x="302" y="352" width="420" height="140" rx="32" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="512" y="456" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">CAST</text>

  <!-- IMG label below CAST -->
  <rect x="332" y="510" width="360" height="90" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="512" y="575" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FFFFFF" text-anchor="middle">IMAGE</text>
</svg>
