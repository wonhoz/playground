<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 그린 (아케이드) -->
  <rect width="1024" height="1024" rx="180" fill="#001010"/>
  <!-- Layer 2: 폭발 + 생존 UI -->
  <!-- 중앙 폭발 -->
  <circle cx="512" cy="440" r="200" fill="#FF6D00" opacity="0.8"/>
  <circle cx="512" cy="440" r="160" fill="#FF8F00" opacity="0.9"/>
  <circle cx="512" cy="440" r="120" fill="#FFCC02"/>
  <circle cx="512" cy="440" r="80" fill="white"/>
  <!-- 폭발 광선들 -->
  <line x1="512" y1="240" x2="512" y2="160" stroke="#FF6D00" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="640" x2="512" y2="720" stroke="#FF6D00" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <line x1="312" y1="440" x2="232" y2="440" stroke="#FF6D00" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <line x1="712" y1="440" x2="792" y2="440" stroke="#FF6D00" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <line x1="370" y1="298" x2="312" y2="240" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="654" y1="298" x2="712" y2="240" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="370" y1="582" x2="312" y2="640" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="654" y1="582" x2="712" y2="640" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- BOOM 텍스트 -->
  <text x="512" y="460" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A0000" text-anchor="middle">BOOM</text>
  <!-- Layer 3: 점수/생존 -->
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FFFF00" text-anchor="middle">BLITZ!</text>
  <!-- 생존 하트들 -->
  <text x="280" y="900" font-family="Arial" font-size="48" fill="#FF4081" text-anchor="middle">♥</text>
  <text x="380" y="900" font-family="Arial" font-size="48" fill="#FF4081" text-anchor="middle">♥</text>
  <text x="480" y="900" font-family="Arial" font-size="48" fill="#FF4081" text-anchor="middle">♥</text>
  <text x="580" y="900" font-family="Arial" font-size="48" fill="#333" text-anchor="middle">♥</text>
  <text x="680" y="900" font-family="Arial" font-size="48" fill="#333" text-anchor="middle">♥</text>
</svg>
