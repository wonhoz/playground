  <line x1="220" y1="600" x2="400" y2="760" stroke="#5D4037" stroke-width="8" opacity="0.8"/>
  <line x1="800" y1="560" x2="640" y2="780" stroke="#5D4037" stroke-width="8" opacity="0.8"/>
  <line x1="400" y1="760" x2="640" y2="780" stroke="#5D4037" stroke-width="8" opacity="0.8"/>
  <!-- Key caps at each node -->
  <rect x="468" y="160" width="88" height="72" rx="12" fill="#5D4037"/>
  <rect x="256" y="342" width="88" height="72" rx="12" fill="#5D4037" opacity="0.8"/>
  <rect x="676" y="322" width="88" height="72" rx="12" fill="#5D4037" opacity="0.8"/>
  <rect x="356" y="720" width="88" height="72" rx="12" fill="#5D4037" opacity="0.8"/>
  <rect x="596" y="742" width="88" height="72" rx="12" fill="#5D4037" opacity="0.8"/>
