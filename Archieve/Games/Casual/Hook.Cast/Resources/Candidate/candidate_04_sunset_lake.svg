<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="40%" stop-color="#ff9100"/>
      <stop offset="70%" stop-color="#ffcc02"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="35%" r="18%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ff9100" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun glow -->
  <circle cx="256" cy="180" r="60" fill="#fff176" opacity="0.5"/>
  <circle cx="256" cy="180" r="42" fill="#ffee58" opacity="0.8"/>
  <circle cx="256" cy="180" r="28" fill="#fff9c4"/>
  <!-- Sun rays -->
  <line x1="256" y1="104" x2="256" y2="80" stroke="#ffcc02" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="318" y1="118" x2="334" y2="100" stroke="#ffcc02" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="344" y1="180" x2="368" y2="180" stroke="#ffcc02" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="194" y1="118" x2="178" y2="100" stroke="#ffcc02" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="168" y1="180" x2="144" y2="180" stroke="#ffcc02" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <!-- Lake -->
  <path d="M0 308 Q128 294 256 308 Q384 322 512 308 L512 512 L0 512 Z" fill="url(#lake)"/>
  <!-- Sun reflection on water -->
  <ellipse cx="256" cy="380" rx="30" ry="80" fill="#ffcc02" opacity="0.25"/>
  <!-- Ripple rings -->
  <ellipse cx="256" cy="316" rx="30" ry="8" fill="none" stroke="#ffcc02" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="256" cy="316" rx="55" ry="15" fill="none" stroke="#ff9100" stroke-width="1" opacity="0.3"/>
  <!-- Silhouette trees left -->
  <rect x="40" y="250" width="18" height="80" fill="#1a1a00" opacity="0.7"/>
  <ellipse cx="49" cy="244" rx="26" ry="36" fill="#1a1a00" opacity="0.7"/>
  <rect x="80" y="265" width="14" height="65" fill="#1a1a00" opacity="0.6"/>
  <ellipse cx="87" cy="258" rx="20" ry="30" fill="#1a1a00" opacity="0.6"/>
  <!-- Silhouette trees right -->
  <rect x="455" y="255" width="18" height="75" fill="#1a1a00" opacity="0.7"/>
  <ellipse cx="464" cy="248" rx="26" ry="36" fill="#1a1a00" opacity="0.7"/>
  <rect x="418" y="268" width="14" height="62" fill="#1a1a00" opacity="0.6"/>
  <ellipse cx="425" cy="262" rx="22" ry="28" fill="#1a1a00" opacity="0.6"/>
  <!-- Fishing rod silhouette -->
  <line x1="130" y1="285" x2="210" y2="250" stroke="#1a1a00" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <line x1="210" y1="250" x2="270" y2="228" stroke="#1a1a00" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- Fishing line -->
  <line x1="270" y1="228" x2="285" y2="316" stroke="#1a1a00" stroke-width="1.5" opacity="0.7"/>
  <!-- Hook splash -->
  <circle cx="285" cy="316" r="6" fill="#ff9100" opacity="0.8"/>
  <!-- Fisherman silhouette -->
  <circle cx="110" cy="282" r="14" fill="#1a1a00" opacity="0.8"/>
  <rect x="102" y="295" width="16" height="30" rx="4" fill="#1a1a00" opacity="0.8"/>
  <!-- Birds -->
  <path d="M320 140 Q326 134 332 140" fill="none" stroke="#1a1a00" stroke-width="2" opacity="0.6"/>
  <path d="M345 128 Q352 122 359 128" fill="none" stroke="#1a1a00" stroke-width="2" opacity="0.5"/>
  <path d="M295 156 Q300 151 306 156" fill="none" stroke="#1a1a00" stroke-width="2" opacity="0.5"/>
</svg>
