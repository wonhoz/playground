<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-02">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="bg-grad-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1466"/>
      <stop offset="100%" stop-color="#2D1B8E"/>
    </linearGradient>
    <linearGradient id="lens-grad-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFA500" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg-grad-02)"/>
  <g clip-path="url(#bg-clip-02)">
    <!-- 파일 아이콘 (왼쪽) -->
    <rect x="160" y="300" width="220" height="280" rx="16" fill="#4A5A9A" stroke="#7080CC" stroke-width="6"/>
    <path d="M 320 300 L 380 300 L 380 360 L 320 360 Z" fill="#2D3A7A"/>
    <path d="M 320 300 L 380 360 L 320 360 Z" fill="#3D4A8A"/>
    <!-- 파일 내용 줄 -->
    <rect x="185" y="390" width="140" height="12" rx="4" fill="#8090CC" opacity="0.8"/>
    <rect x="185" y="416" width="110" height="12" rx="4" fill="#8090CC" opacity="0.6"/>
    <rect x="185" y="442" width="130" height="12" rx="4" fill="#8090CC" opacity="0.6"/>
    <rect x="185" y="468" width="90" height="12" rx="4" fill="#8090CC" opacity="0.4"/>
    <!-- 레지스트리 키 아이콘 (오른쪽) -->
    <rect x="644" y="300" width="220" height="280" rx="16" fill="#6A1A1A" stroke="#CC3030" stroke-width="6"/>
    <!-- 레지스트리 트리 구조 -->
    <rect x="670" y="350" width="80" height="16" rx="4" fill="#FF6060" opacity="0.9"/>
    <line x1="680" y1="366" x2="680" y2="450" stroke="#FF4040" stroke-width="4" stroke-linecap="round"/>
    <line x1="680" y1="390" x2="720" y2="390" stroke="#FF4040" stroke-width="4" stroke-linecap="round"/>
    <rect x="720" y="380" width="100" height="20" rx="4" fill="#FF6060" opacity="0.7"/>
    <line x1="680" y1="420" x2="720" y2="420" stroke="#FF4040" stroke-width="4" stroke-linecap="round"/>
    <rect x="720" y="410" width="120" height="20" rx="4" fill="#FF6060" opacity="0.7"/>
    <line x1="680" y1="450" x2="720" y2="450" stroke="#FF4040" stroke-width="4" stroke-linecap="round"/>
    <rect x="720" y="440" width="90" height="20" rx="4" fill="#FF6060" opacity="0.5"/>
    <!-- 레지스트리 키 심볼 -->
    <rect x="670" y="490" width="40" height="56" rx="6" fill="#FFD700"/>
    <rect x="678" y="474" width="24" height="24" rx="4" fill="none" stroke="#FFD700" stroke-width="6"/>
    <circle cx="690" cy="518" r="6" fill="#1A1466"/>
    <!-- 돋보기 (골드) - 중앙 오버랩 -->
    <circle cx="512" cy="460" r="160" fill="url(#lens-grad-02)" stroke="#FFD700" stroke-width="14"/>
    <circle cx="512" cy="460" r="145" fill="none" stroke="#FFD700" stroke-width="6" opacity="0.5"/>
    <!-- 돋보기 손잡이 -->
    <line x1="624" y1="572" x2="710" y2="660" stroke="#FFD700" stroke-width="28" stroke-linecap="round"/>
    <!-- 돋보기 렌즈 내부 반사 -->
    <circle cx="460" cy="410" r="36" fill="#FFFFFF" opacity="0.12"/>
    <!-- 스캔 라인들 (돋보기 안) -->
    <rect x="400" y="435" width="220" height="10" rx="4" fill="#FFD700" opacity="0.4"/>
    <rect x="400" y="458" width="180" height="10" rx="4" fill="#FFD700" opacity="0.3"/>
    <rect x="400" y="481" width="200" height="10" rx="4" fill="#FFD700" opacity="0.3"/>
  </g>
</svg>
