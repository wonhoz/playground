    <rect x="500" y="478" width="34" height="28" rx="5"/>
    <rect x="540" y="478" width="34" height="28" rx="5"/>
    <rect x="580" y="478" width="34" height="28" rx="5"/>
    <rect x="620" y="478" width="34" height="28" rx="5"/>
    <!-- 스페이스바 -->
