<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Crucible/cauldron brewing prompts -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#100010"/>
  <!-- Cauldron -->
  <path d="M280 500 Q260 720 512 760 Q764 720 744 500 Z" fill="#2D0050" stroke="#9C27B0" stroke-width="26"/>
  <ellipse cx="512" cy="500" rx="264" ry="64" fill="#3D0060" stroke="#9C27B0" stroke-width="26"/>
  <!-- Handles -->
  <path d="M248 530 Q200 480 220 430" fill="none" stroke="#9C27B0" stroke-width="26" stroke-linecap="round"/>
  <path d="M776 530 Q824 480 804 430" fill="none" stroke="#9C27B0" stroke-width="26" stroke-linecap="round"/>
  <!-- Brewing glow inside -->
  <ellipse cx="512" cy="510" rx="200" ry="40" fill="#E040FB" opacity="0.3"/>
  <!-- Rising bubbles / prompt symbols -->
  <circle cx="440" cy="460" r="16" fill="#CE93D8" opacity="0.8"/>
  <circle cx="512" cy="420" r="22" fill="#CE93D8" opacity="0.6"/>
  <circle cx="580" cy="450" r="14" fill="#CE93D8" opacity="0.7"/>
  <!-- Text curling out -->
  <path d="M470 390 Q512 320 560 380" fill="none" stroke="#E040FB" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <path d="M430 350 Q490 260 550 330" fill="none" stroke="#E040FB" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Stars of text above -->
  <circle cx="400" cy="280" r="8" fill="#F8BBD0"/>
  <circle cx="512" cy="240" r="11" fill="#F8BBD0" opacity="0.8"/>
  <circle cx="624" cy="270" r="8" fill="#F8BBD0" opacity="0.7"/>
</svg>
