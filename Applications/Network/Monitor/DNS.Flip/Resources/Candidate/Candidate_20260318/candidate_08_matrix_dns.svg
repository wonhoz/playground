<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 매트릭스 그리드 -->
  <g opacity="0.15">
    <line x1="80" y1="80" x2="80" y2="432" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="160" y1="80" x2="160" y2="432" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="240" y1="80" x2="240" y2="432" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="320" y1="80" x2="320" y2="432" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="400" y1="80" x2="400" y2="432" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="80" y1="80" x2="432" y2="80" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="80" y1="160" x2="432" y2="160" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="80" y1="240" x2="432" y2="240" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="80" y1="320" x2="432" y2="320" stroke="#0EA5E9" stroke-width="1"/>
    <line x1="80" y1="400" x2="432" y2="400" stroke="#0EA5E9" stroke-width="1"/>
  </g>
  <!-- 강조 셀들 -->
  <rect x="80" y="80" width="80" height="80" rx="4" fill="#0EA5E9" opacity="0.2" filter="url(#glow)"/>
  <rect x="320" y="160" width="80" height="80" rx="4" fill="#38BDF8" opacity="0.15"/>
  <rect x="160" y="240" width="80" height="80" rx="4" fill="#0EA5E9" opacity="0.2" filter="url(#glow)"/>
  <rect x="240" y="320" width="80" height="80" rx="4" fill="#38BDF8" opacity="0.15"/>
  <!-- 전환 경로 -->
  <path d="M 120 120 L 120 200 L 240 200 L 240 280 L 360 280 L 360 200 L 440 200" fill="none" stroke="#0EA5E9" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#glow)"/>
  <!-- 노드들 -->
  <circle cx="120" cy="120" r="10" fill="#0EA5E9" filter="url(#glow)"/>
  <circle cx="200" cy="280" r="8" fill="#38BDF8" opacity="0.8"/>
  <circle cx="360" cy="280" r="10" fill="#0EA5E9" filter="url(#glow)"/>
  <!-- DNS 텍스트 -->
  <text x="256" y="456" text-anchor="middle" fill="#0EA5E9" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">DNS MATRIX</text>
</svg>