<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="100" y="186" width="312" height="210" rx="20" fill="#0D47A1" stroke="#1976D2" stroke-width="3"/>
  <!-- Viewfinder hump -->
  <rect x="196" y="156" width="120" height="40" rx="12" fill="#1565C0"/>
  <!-- Lens ring -->
  <circle cx="256" cy="292" r="74" fill="#0A2F6B" stroke="#1976D2" stroke-width="4"/>
  <circle cx="256" cy="292" r="58" fill="url(#lens)" opacity="0.15"/>
  <circle cx="256" cy="292" r="44" fill="#1565C0"/>
  <circle cx="256" cy="292" r="30" fill="#0D47A1"/>
  <!-- Code inside lens -->
  <text x="256" y="286" text-anchor="middle" font-size="18" fill="#90CAF9" font-family="Courier New" font-weight="bold">&lt;/&gt;</text>
  <!-- Shutter button -->
  <circle cx="380" cy="210" r="20" fill="#1976D2" stroke="#42A5F5" stroke-width="3"/>
  <circle cx="380" cy="210" r="11" fill="#0D47A1"/>
  <!-- Flash -->
  <rect x="140" y="210" width="36" height="24" rx="6" fill="#1976D2"/>
  <!-- Corner brackets (snap frame) -->
  <path d="M130 230 L130 216 L144 216" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M382 230 L382 216 L368 216" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M130 350 L130 364 L144 364" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M382 350 L382 364 L368 364" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
