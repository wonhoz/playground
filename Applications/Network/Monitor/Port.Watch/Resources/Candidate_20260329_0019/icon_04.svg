<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 항구(Port) + 배 — Port의 이중 의미 은유 | 공간/장면 | 하늘+파랑+노랑 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#01579B" flood-opacity="0.25"/>
    </filter>
    <clipPath id="round4">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#sky)"/>

  <!-- Sea -->
  <rect x="0" y="620" width="1024" height="404" fill="url(#sea)" clip-path="url(#round4)"/>
  <!-- Wave -->
  <path d="M0,640 Q128,610 256,640 Q384,670 512,640 Q640,610 768,640 Q896,670 1024,640 L1024,680 Q896,710 768,680 Q640,650 512,680 Q384,710 256,680 Q128,650 0,680 Z"
        fill="#1976D2" clip-path="url(#round4)"/>

  <!-- Layer 2: Harbor dock -->
  <rect x="80" y="570" width="200" height="80" rx="10" fill="#5D4037"/>
  <rect x="744" y="570" width="200" height="80" rx="10" fill="#5D4037"/>
  <!-- Dock pillars -->
  <rect x="100" y="580" width="24" height="440" rx="8" fill="#6D4C41"/>
  <rect x="200" y="580" width="24" height="440" rx="8" fill="#6D4C41"/>
  <rect x="800" y="580" width="24" height="440" rx="8" fill="#6D4C41"/>
  <rect x="900" y="580" width="24" height="440" rx="8" fill="#6D4C41"/>

  <!-- Port sign -->
  <rect x="300" y="150" width="424" height="100" rx="20" fill="#E53935" filter="url(#sh4)"/>
  <text x="512" y="200" font-family="Arial Black, sans-serif" font-size="64" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">PORT</text>
  <!-- Sign pole -->
  <rect x="494" y="248" width="36" height="120" rx="8" fill="#546E7A"/>

  <!-- Layer 3: Ship -->
  <g filter="url(#sh4)">
    <!-- Hull -->
    <path d="M200,580 Q260,660 512,680 Q764,660 824,580 Z" fill="#1976D2"/>
    <!-- Deck -->
    <rect x="280" y="510" width="464" height="80" rx="14" fill="#64B5F6"/>
    <!-- Cabin -->
    <rect x="380" y="400" width="264" height="120" rx="14" fill="#FFFFFF"/>
    <!-- Windows -->
    <circle cx="440" cy="460" r="22" fill="#64B5F6"/>
    <circle cx="512" cy="460" r="22" fill="#64B5F6"/>
    <circle cx="584" cy="460" r="22" fill="#64B5F6"/>
    <!-- Chimney -->
    <rect x="474" y="330" width="64" height="80" rx="10" fill="#546E7A"/>
    <!-- Flag (yellow) -->
    <line x1="474" y1="330" x2="474" y2="210" stroke="#546E7A" stroke-width="8"/>
    <polygon points="474,210 560,240 474,270" fill="#FFD740"/>
  </g>

  <!-- Port numbers on water -->
  <text x="300" y="780" font-family="Consolas, monospace" font-size="52" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.6">:443</text>
  <text x="724" y="780" font-family="Consolas, monospace" font-size="52" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.6">:80</text>
</svg>
