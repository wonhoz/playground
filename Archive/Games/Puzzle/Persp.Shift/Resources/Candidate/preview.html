<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Persp.Shift - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { color: #7C4DFF; margin-bottom: 8px; font-size: 22px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item:hover { border-color: #7C4DFF; background: #2a2a2a; }
  .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 20px; }
  .item span { font-size: 11px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Persp.Shift — 아이콘 후보 10종</h1>
<p>원근감 전환 퍼즐 게임</p>
<div class="grid">
  <div class="item"><img src="candidate_01_cube_shift_blue.svg"><span>01 cube_shift_blue</span></div>
  <div class="item"><img src="candidate_02_perspective_purple.svg"><span>02 perspective_purple</span></div>
  <div class="item"><img src="candidate_03_portal_neon.svg"><span>03 portal_neon</span></div>
  <div class="item"><img src="candidate_04_illusion_pink.svg"><span>04 illusion_pink</span></div>
  <div class="item"><img src="candidate_05_escher_gold.svg"><span>05 escher_gold</span></div>
  <div class="item"><img src="candidate_06_dimension_teal.svg"><span>06 dimension_teal</span></div>
  <div class="item"><img src="candidate_07_wormhole_violet.svg"><span>07 wormhole_violet</span></div>
  <div class="item"><img src="candidate_08_tiles_orange.svg"><span>08 tiles_orange</span></div>
  <div class="item"><img src="candidate_09_glasses_red.svg"><span>09 glasses_red</span></div>
  <div class="item"><img src="candidate_10_wireframe_lime.svg"><span>10 wireframe_lime</span></div>
</div>
</body>
</html>
