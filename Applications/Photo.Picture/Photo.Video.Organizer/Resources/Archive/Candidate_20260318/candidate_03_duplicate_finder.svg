<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#040d0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 중복 파일 찾기 아이콘 -->
  <!-- 원본 사진 (좌측) -->
  <rect x="80" y="130" width="130" height="130" rx="10" fill="#0a2018" stroke="#34D399" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <circle cx="110" cy="160" r="12" fill="#34D399" opacity="0.7"/>
  <path d="M80,230 Q110,200 135,220 Q155,235 175,218 Q195,202 210,230" fill="none" stroke="#34D399" stroke-width="2" opacity="0.8"/>
  <rect x="92" y="238" width="106" height="14" rx="4" fill="#34D399" opacity="0.2"/>
  <!-- 복사본 1 (중앙 — 살짝 오프셋) -->
  <rect x="145" y="160" width="128" height="128" rx="10" fill="#0a1a10" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
  <circle cx="173" cy="188" r="11" fill="#10B981" opacity="0.5"/>
  <path d="M145,256 Q175,228 198,248 Q218,263 238,246 Q258,230 273,258" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  <!-- 복사본 2 (오른쪽 — 더 오프셋) -->
  <rect x="205" y="185" width="126" height="126" rx="10" fill="#061510" stroke="#065f46" stroke-width="1" opacity="0.5"/>
  <circle cx="232" cy="212" r="10" fill="#065f46" opacity="0.5"/>
  <!-- 중복 경고 마크 -->
  <circle cx="360" cy="185" r="36" fill="#0a2a18" stroke="#34D399" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <text x="360" y="180" text-anchor="middle" font-size="28" fill="#FDE047" font-weight="bold" opacity="0.9">!</text>
  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#34D399" opacity="0.8">DUP</text>
  <!-- 화살표 -->
  <path d="M213,190 Q285,185 324,185" stroke="#34D399" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <!-- 연결 선 (3개 파일 → 하나로) -->
  <path d="M145,356 L205,340 L265,356" fill="none" stroke="#34D399" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <circle cx="205" cy="340" r="6" fill="#34D399" opacity="0.6"/>
  <!-- 정리 결과 -->
  <rect x="80" y="370" width="352" height="80" rx="10" fill="#061510" stroke="#34D399" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#34D399" filter="url(#glow)" opacity="0.9">DUPLICATE FINDER</text>
  <text x="256" y="416" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">3 files → 1 original detected</text>
  <!-- 상태 바 -->
  <rect x="100" y="428" width="312" height="10" rx="4" fill="#1a3a28" opacity="0.6"/>
  <rect x="100" y="428" width="220" height="10" rx="4" fill="#34D399" opacity="0.7" filter="url(#glow)"/>
  <text x="314" y="438" font-size="10" fill="#34D399" opacity="0.8">71%</text>
</svg>
