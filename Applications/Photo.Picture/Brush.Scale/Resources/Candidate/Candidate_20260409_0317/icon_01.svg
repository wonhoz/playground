<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Warm orange/gold gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g1)"/>
  <!-- Layer 2: Small image frame at top center -->
  <rect x="362" y="218" width="300" height="218" rx="18" fill="white" opacity="0.28"/>
  <!-- Landscape inside frame (sky + mountain) -->
  <rect x="362" y="218" width="300" height="130" rx="18" fill="#7DD3FC" opacity="0.55"/>
  <polygon points="512,242 618,428 406,428" fill="white" opacity="0.7"/>
  <!-- Layer 2: Large scale factor "4×" -->
  <text x="512" y="820" font-family="Arial Black,Arial,sans-serif" font-size="440" fill="white" font-weight="900" text-anchor="middle">4×</text>
  <!-- Layer 3: "Upscale" label -->
  <text x="512" y="906" font-family="Arial,sans-serif" font-size="84" fill="white" font-weight="bold" text-anchor="middle" opacity="0.80">Upscale</text>
</svg>
