<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1C1C2E"/>
  <!-- Layer 2: 로그 라인들 -->
  <!-- INFO 라인 -->
  <rect x="80" y="160" width="864" height="100" rx="12" fill="#1A2A3A"/>
  <rect x="80" y="160" width="160" height="100" rx="12" fill="#1565C0"/>
  <text x="160" y="226" font-family="'Consolas', monospace" font-weight="700" font-size="60" fill="#90CAF9" text-anchor="middle">[INFO]</text>
  <text x="540" y="226" font-family="'Consolas', monospace" font-size="52" fill="#B0BEC5">Server started</text>
  <!-- WARN 라인 -->
  <rect x="80" y="284" width="864" height="100" rx="12" fill="#2A2A1A"/>
  <rect x="80" y="284" width="180" height="100" rx="12" fill="#F57F17"/>
  <text x="170" y="350" font-family="'Consolas', monospace" font-weight="700" font-size="60" fill="#FFE082" text-anchor="middle">[WARN]</text>
  <text x="540" y="350" font-family="'Consolas', monospace" font-size="52" fill="#B0BEC5">Retry 3/5...</text>
  <!-- ERROR 라인 (강조) -->
  <rect x="80" y="408" width="864" height="120" rx="12" fill="#2A1A1A"/>
  <rect x="80" y="408" width="196" height="120" rx="12" fill="#B71C1C"/>
  <text x="178" y="482" font-family="'Consolas', monospace" font-weight="700" font-size="60" fill="#FF8A80" text-anchor="middle">[ERROR]</text>
  <text x="560" y="482" font-family="'Consolas', monospace" font-size="52" fill="#EF9A9A">Connection failed</text>
  <!-- DEBUG 라인 -->
  <rect x="80" y="552" width="864" height="90" rx="12" fill="#1A1A2A"/>
  <rect x="80" y="552" width="188" height="90" rx="12" fill="#4A148C"/>
  <text x="174" y="612" font-family="'Consolas', monospace" font-weight="700" font-size="56" fill="#CE93D8" text-anchor="middle">[DEBUG]</text>
  <text x="540" y="612" font-family="'Consolas', monospace" font-size="48" fill="#9E9E9E">payload: 0x3F</text>
  <!-- INFO 라인 2 -->
  <rect x="80" y="666" width="864" height="90" rx="12" fill="#1A2A3A"/>
  <rect x="80" y="666" width="160" height="90" rx="12" fill="#1565C0"/>
  <text x="160" y="726" font-family="'Consolas', monospace" font-weight="700" font-size="56" fill="#90CAF9" text-anchor="middle">[INFO]</text>
  <text x="540" y="726" font-family="'Consolas', monospace" font-size="48" fill="#78909C">Request: GET /api</text>
  <!-- Layer 3: 렌즈 아이콘 (우하단) -->
  <circle cx="840" cy="840" r="120" fill="none" stroke="#29B6F6" stroke-width="24" opacity="0.6"/>
  <line x1="928" y1="928" x2="980" y2="980" stroke="#29B6F6" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
</svg>
