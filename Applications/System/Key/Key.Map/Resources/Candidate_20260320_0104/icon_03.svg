<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080500"/>
  <!-- Swap / exchange symbol -->
  <!-- Left arrow (going left) -->
  <path d="M640 380 L380 380" stroke="#4E342E" stroke-width="28" stroke-linecap="round"/>
  <polygon points="340,380 400,340 400,420" fill="#4E342E"/>
  <!-- Right arrow (going right) -->
  <path d="M384 620 L644 620" stroke="#A1887F" stroke-width="28" stroke-linecap="round"/>
  <polygon points="684,620 624,580 624,660" fill="#A1887F"/>
  <!-- Key cap left -->
  <rect x="630" y="310" width="160" height="140" rx="22" fill="#4E342E"/>
  <rect x="648" y="328" width="124" height="104" rx="14" fill="#080500"/>
  <!-- Key cap right -->
  <rect x="234" y="550" width="160" height="140" rx="22" fill="#A1887F" opacity="0.8"/>
  <rect x="252" y="568" width="124" height="104" rx="14" fill="#080500"/>
  <!-- Crossing lines middle -->
  <line x1="512" y1="340" x2="512" y2="660" stroke="#4E342E" stroke-width="10" opacity="0.4" stroke-dasharray="16,10"/>
</svg>
