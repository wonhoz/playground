<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Minimal clipboard with circling AI orbit -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0D1A"/>
  <!-- Clipboard minimal -->
  <rect x="300" y="260" width="360" height="460" rx="24" fill="#1A1A35"/>
  <rect x="300" y="260" width="360" height="460" rx="24" fill="none" stroke="#536DFE" stroke-width="26"/>
  <rect x="390" y="232" width="180" height="60" rx="12" fill="#536DFE"/>
  <!-- Lines -->
  <rect x="350" y="370" width="240" height="18" rx="9" fill="#536DFE" opacity="0.8"/>
  <rect x="350" y="415" width="190" height="18" rx="9" fill="#536DFE" opacity="0.6"/>
  <rect x="350" y="460" width="215" height="18" rx="9" fill="#536DFE" opacity="0.6"/>
  <rect x="350" y="505" width="170" height="18" rx="9" fill="#536DFE" opacity="0.4"/>
  <!-- Orbit ring -->
  <ellipse cx="512" cy="490" rx="310" ry="310" fill="none" stroke="#536DFE" stroke-width="6" stroke-dasharray="30 20" opacity="0.3"/>
  <!-- Orbiting AI dot -->
  <circle cx="822" cy="490" r="28" fill="#FF4081"/>
  <circle cx="822" cy="490" r="14" fill="#FF80AB"/>
  <!-- Orbit dot 2 -->
  <circle cx="202" cy="490" r="20" fill="#536DFE" opacity="0.6"/>
</svg>
