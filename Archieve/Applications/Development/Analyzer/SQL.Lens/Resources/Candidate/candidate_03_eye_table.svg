<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A001A"/>
      <stop offset="100%" style="stop-color:#1A0030"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="30%" style="stop-color:#AA66FF"/>
      <stop offset="70%" style="stop-color:#6600CC"/>
      <stop offset="100%" style="stop-color:#330066"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M80 256 C150 150 362 150 432 256 C362 362 150 362 80 256 Z" fill="#110022" stroke="#AA66FF" stroke-width="4"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="80" fill="url(#iris)"/>
  <!-- Pupil with SQL -->
  <circle cx="256" cy="256" r="40" fill="#000011"/>
  <text x="256" y="263" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="#CC88FF">SQL</text>
  <!-- Table lines visible through eye -->
  <line x1="130" y1="230" x2="380" y2="230" stroke="#AA66FF" stroke-width="1" opacity="0.3"/>
  <line x1="130" y1="256" x2="380" y2="256" stroke="#AA66FF" stroke-width="1" opacity="0.2"/>
  <line x1="130" y1="280" x2="380" y2="280" stroke="#AA66FF" stroke-width="1" opacity="0.3"/>
  <!-- Eyelashes hint -->
  <line x1="256" y1="150" x2="256" y2="130" stroke="#AA66FF" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="155" x2="215" y2="136" stroke="#AA66FF" stroke-width="2" opacity="0.4"/>
  <line x1="292" y1="155" x2="297" y2="136" stroke="#AA66FF" stroke-width="2" opacity="0.4"/>
</svg>
