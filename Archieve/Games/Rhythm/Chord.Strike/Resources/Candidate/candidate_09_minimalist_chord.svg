<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f0e8"/>
      <stop offset="100%" stop-color="#eeddc8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc2244"/>
      <stop offset="100%" stop-color="#880022"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chord diagram frame -->
  <rect x="156" y="120" width="200" height="260" rx="8" fill="none" stroke="#2a2a2a" stroke-width="8"/>
  <!-- Nut -->
  <rect x="156" y="118" width="200" height="16" rx="4" fill="#2a2a2a"/>
  <!-- Fret lines -->
  <line x1="156" y1="185" x2="356" y2="185" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="156" y1="250" x2="356" y2="250" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="156" y1="315" x2="356" y2="315" stroke="#2a2a2a" stroke-width="3"/>
  <!-- String lines -->
  <line x1="196" y1="120" x2="196" y2="380" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="236" y1="120" x2="236" y2="380" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="276" y1="120" x2="276" y2="380" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="316" y1="120" x2="316" y2="380" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Finger dots (G chord) -->
  <circle cx="196" cy="217" r="20" fill="url(#accent)"/>
  <circle cx="276" cy="217" r="20" fill="url(#accent)"/>
  <circle cx="236" cy="152" r="18" fill="none" stroke="#cc2244" stroke-width="4"/>
  <!-- Barre indicator -->
  <rect x="188" y="282" width="136" height="36" rx="18" fill="url(#accent)" opacity="0.85"/>
  <!-- Chord name -->
  <text x="256" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#2a2a2a">G</text>
  <!-- Decorative strike lines -->
  <line x1="80" y1="200" x2="130" y2="200" stroke="#cc2244" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="220" x2="120" y2="220" stroke="#cc2244" stroke-width="3" stroke-linecap="round"/>
  <line x1="382" y1="200" x2="432" y2="200" stroke="#cc2244" stroke-width="4" stroke-linecap="round"/>
  <line x1="392" y1="220" x2="432" y2="220" stroke="#cc2244" stroke-width="3" stroke-linecap="round"/>
</svg>