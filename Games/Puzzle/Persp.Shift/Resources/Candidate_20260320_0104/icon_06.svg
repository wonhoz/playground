  <line x1="440" y1="200" x2="480" y2="260" stroke="#4DB6AC" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- 시점 화살표 -->
  <path d="M512 660 L512 760 L560 760 L512 860 L464 760 L512 760 Z" fill="#4DB6AC" opacity="0.8"/>
