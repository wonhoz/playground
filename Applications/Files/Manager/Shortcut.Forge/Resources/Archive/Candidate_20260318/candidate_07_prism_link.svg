<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#07001a"/>
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 입력 광선 (링크 체인) -->
  <circle cx="65" cy="256" r="22" fill="none" stroke="#7C3AED" stroke-width="5" opacity="0.85" filter="url(#glow)"/>
  <circle cx="65" cy="256" r="10" fill="#7C3AED" opacity="0.5"/>
  <line x1="87" y1="256" x2="140" y2="256" stroke="#A78BFA" stroke-width="4" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 프리즘 -->
  <polygon points="140,148 285,256 140,364" fill="url(#prismGrad)" stroke="#C4B5FD" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <polygon points="140,148 285,256 140,200" fill="white" opacity="0.15"/>
  <!-- 굴절 링크들 (다수의 바로가기) -->
  <!-- 링크 1 (상) -->
  <line x1="285" y1="225" x2="345" y2="175" stroke="#EDE9FE" stroke-width="3.5" opacity="0.85" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="345" cy="175" r="18" fill="none" stroke="#C4B5FD" stroke-width="4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="345" cy="175" r="9" fill="#A78BFA" opacity="0.7"/>
  <line x1="363" y1="175" x2="400" y2="175" stroke="#C4B5FD" stroke-width="3.5" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="418" cy="175" r="18" fill="none" stroke="#A78BFA" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="418" cy="175" r="8" fill="#8B5CF6" opacity="0.65"/>
  <!-- 링크 2 (중앙) -->
  <line x1="285" y1="256" x2="360" y2="256" stroke="#C4B5FD" stroke-width="4.5" opacity="0.9" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="360" cy="256" r="20" fill="none" stroke="#EDE9FE" stroke-width="4.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="360" cy="256" r="11" fill="#C4B5FD" opacity="0.8"/>
  <line x1="380" y1="256" x2="435" y2="256" stroke="#EDE9FE" stroke-width="4.5" opacity="0.9" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="450" cy="256" r="14" fill="#A78BFA" opacity="0.85" filter="url(#glow)"/>
  <!-- 링크 3 (하) -->
  <line x1="285" y1="287" x2="345" y2="337" stroke="#A78BFA" stroke-width="3.5" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="345" cy="337" r="18" fill="none" stroke="#8B5CF6" stroke-width="3.5" opacity="0.8" filter="url(#glow)"/>
  <circle cx="345" cy="337" r="8" fill="#7C3AED" opacity="0.6"/>
  <line x1="363" y1="337" x2="405" y2="337" stroke="#8B5CF6" stroke-width="3" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="420" cy="337" r="15" fill="none" stroke="#7C3AED" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <circle cx="420" cy="337" r="7" fill="#6D28D9" opacity="0.55"/>
</svg>