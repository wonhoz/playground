<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CE93D8"/>
      <stop offset="1" stop-color="#7E57C2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g3)"/>
  <!-- header chip -->
  <g transform="translate(360 220)">
    <rect width="304" height="72" rx="36" fill="#FFFFFF"/>
    <text x="152" y="49" font-family="Verdana, sans-serif" font-size="32" font-weight="800" text-anchor="middle" fill="#5E35B1">CONVERT</text>
  </g>
  <!-- big text SVG -->
  <text x="512" y="540" font-family="Verdana, sans-serif" font-size="180" font-weight="900" text-anchor="middle" fill="#FFEB3B" stroke="#311B92" stroke-width="10" paint-order="stroke">SVG</text>
  <!-- arrow down -->
  <g transform="translate(440 580)">
    <rect x="60" y="0" width="60" height="80" fill="#FFFFFF"/>
    <polygon points="0,80 180,80 90,180" fill="#FFFFFF"/>
  </g>
  <!-- big text ICO -->
  <text x="512" y="900" font-family="Verdana, sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#FF8A65" stroke="#311B92" stroke-width="10" paint-order="stroke">ICO</text>
</svg>
