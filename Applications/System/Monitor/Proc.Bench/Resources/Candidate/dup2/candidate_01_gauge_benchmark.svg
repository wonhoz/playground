<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7C59F"/>
      <stop offset="100%" style="stop-color:#FF3D00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gauge background arc -->
  <path d="M96 340 A200 200 0 0 1 416 340" fill="none" stroke="#333333" stroke-width="30" stroke-linecap="round"/>
  <!-- Gauge fill arc (75%) -->
  <path d="M96 340 A200 200 0 0 1 390 268" fill="none" stroke="url(#arc)" stroke-width="30" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="256" y1="140" x2="256" y2="165" stroke="#666" stroke-width="3"/>
  <line x1="136" y1="205" x2="155" y2="222" stroke="#666" stroke-width="3"/>
  <line x1="376" y1="205" x2="357" y2="222" stroke="#666" stroke-width="3"/>
  <!-- Needle -->
  <line x1="256" y1="256" x2="380" y2="195" stroke="#FF3D00" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="14" fill="#FF6B35"/>
  <circle cx="256" cy="256" r="7" fill="#FF3D00"/>
  <!-- Value text -->
  <text x="256" y="360" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#FF6B35">75%</text>
</svg>
