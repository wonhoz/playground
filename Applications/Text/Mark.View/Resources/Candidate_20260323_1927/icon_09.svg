<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_mv9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F2440"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_mv9)"/>
  <!-- 코드블록 박스 -->
  <rect x="210" y="300" width="604" height="440" rx="24" fill="#0D1F35" stroke="#334155" stroke-width="8"/>
  <!-- 코드블록 상단 바 -->
  <rect x="210" y="300" width="604" height="56" rx="24" fill="#1E293B"/>
  <rect x="210" y="332" width="604" height="24" fill="#1E293B"/>
  <!-- 트래픽 라이트 -->
  <circle cx="258" cy="328" r="14" fill="#FF5F57"/>
  <circle cx="302" cy="328" r="14" fill="#FEBC2E"/>
  <circle cx="346" cy="328" r="14" fill="#28C840"/>
  <!-- 백틱 기호 -->
  <text x="512" y="368" font-family="'Courier New', monospace" font-size="36" fill="#64748B" text-anchor="middle">```markdown</text>
  <!-- 초록 텍스트 줄들 -->
  <text x="240" y="428" font-family="'Courier New', monospace" font-size="36" fill="#4ADE80"># Heading</text>
  <text x="240" y="474" font-family="'Courier New', monospace" font-size="32" fill="#86EFAC">**Bold** _italic_</text>
  <text x="240" y="516" font-family="'Courier New', monospace" font-size="32" fill="#34D399">- List item one</text>
  <text x="240" y="556" font-family="'Courier New', monospace" font-size="32" fill="#4ADE80">- List item two</text>
  <text x="240" y="596" font-family="'Courier New', monospace" font-size="30" fill="#6EE7B7">[link](url)</text>
  <text x="240" y="636" font-family="'Courier New', monospace" font-size="30" fill="#A7F3D0">![image](path)</text>
  <!-- 닫는 백틱 -->
  <text x="240" y="690" font-family="'Courier New', monospace" font-size="36" fill="#64748B">```</text>
</svg>
