    <text x="714" y="488" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">🎬 VIDEO</text>

    <!-- Layer 3: 아래 폴더 (캘린더 탭 + 날짜 텍스트) -->
    <rect x="220" y="570" width="584" height="56" rx="20" fill="#FF6F00"/>
    <!-- 폴더 탭 -->
    <rect x="240" y="540" width="160" height="50" rx="14" fill="#E65100"/>
    <text x="320" y="572" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#FFFFFF" text-anchor="middle">2024</text>
    <!-- 폴더 본체 -->
    <rect x="220" y="590" width="584" height="220" rx="20" fill="#FFA726"/>

    <!-- 폴더 안 날짜 구조 -->
    <rect x="246" y="614" width="250" height="72" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <text x="371" y="660" font-family="'Segoe UI','Consolas',monospace" font-weight="800" font-size="48" fill="#E65100" text-anchor="middle">06/15</text>

    <rect x="528" y="614" width="250" height="72" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <text x="653" y="660" font-family="'Segoe UI','Consolas',monospace" font-weight="800" font-size="48" fill="#7B1FA2" text-anchor="middle">07/04</text>

    <rect x="246" y="704" width="250" height="72" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <text x="371" y="750" font-family="'Segoe UI','Consolas',monospace" font-weight="800" font-size="48" fill="#1565C0" text-anchor="middle">08/20</text>

    <rect x="528" y="704" width="250" height="72" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <text x="653" y="750" font-family="'Segoe UI','Consolas',monospace" font-weight="800" font-size="48" fill="#2E7D32" text-anchor="middle">12/31</text>

    <!-- 연결 화살표 (사진+동영상 → 폴더) -->
    <path d="M308 500 Q308 548 380 570" stroke="#FF7043" stroke-width="24" stroke-linecap="round" fill="none"/>
    <path d="M714 500 Q714 548 644 570" stroke="#7B1FA2" stroke-width="24" stroke-linecap="round" fill="none"/>
  </g>
