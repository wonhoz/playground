  <!-- 500 -->
  <circle cx="135" cy="345" r="10" fill="#7C3AED"/>
  <text x="152" y="352" font-family="monospace" font-size="14" fill="#A78BFA">/data</text>
  <rect x="340" y="335" width="50" height="20" rx="4" fill="#7C3AED"/>
  <text x="365" y="350" font-family="monospace" font-size="10" fill="white" text-anchor="middle">500</text>
  <!-- Footer -->
  <line x1="120" y1="390" x2="392" y2="390" stroke="#2D4A5E" stroke-width="1"/>
  <text x="256" y="420" font-family="monospace" font-size="12" fill="#555" text-anchor="middle">5 endpoints tested</text>
  <text x="256" y="460" font-family="monospace" font-weight="bold" font-size="20" fill="#60A5FA" text-anchor="middle">Api.Probe</text>
