<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c7-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c7-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F1F3D"/>
      <stop offset="100%" stop-color="#1A3060"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c7-clip)">
    <!-- Background: deep indigo -->
    <rect width="1024" height="1024" fill="url(#c7-bg)"/>

    <!-- Heavy base (junk pile, bottom) - chaotic rectangles -->
    <rect x="180" y="780" width="664" height="130" rx="10" fill="#0D1830" opacity="0.8"/>
    <rect x="210" y="720" width="90" height="70" rx="6" fill="#1E2E50" opacity="0.90"/>
    <rect x="320" y="740" width="110" height="55" rx="6" fill="#243458" opacity="0.85"/>
    <rect x="450" y="730" width="80" height="65" rx="6" fill="#1E2E50" opacity="0.90"/>
    <rect x="550" y="750" width="100" height="50" rx="6" fill="#243458" opacity="0.80"/>
    <rect x="660" y="720" width="95" height="75" rx="6" fill="#1E2E50" opacity="0.85"/>
    <!-- Junk labels in red -->
    <rect x="225" y="735" width="60" height="10" rx="3" fill="#E74C3C" opacity="0.60"/>
    <rect x="335" y="752" width="80" height="10" rx="3" fill="#E74C3C" opacity="0.50"/>
    <rect x="465" y="745" width="50" height="10" rx="3" fill="#E74C3C" opacity="0.55"/>
    <rect x="565" y="762" width="70" height="10" rx="3" fill="#E74C3C" opacity="0.45"/>
    <rect x="675" y="735" width="65" height="10" rx="3" fill="#E74C3C" opacity="0.52"/>

    <!-- Rising bubbles (files being lifted/freed, ascending) -->
    <!-- Large bubble -->
    <circle cx="512" cy="480" r="86" fill="none" stroke="#40C4AA" stroke-width="10" opacity="0.85"/>
    <circle cx="512" cy="480" r="68" fill="#40C4AA" opacity="0.12"/>
    <!-- Upward arrow inside bubble -->
    <line x1="512" y1="530" x2="512" y2="434" stroke="#40C4AA" stroke-width="18" stroke-linecap="round"/>
    <line x1="512" y1="434" x2="476" y2="472" stroke="#40C4AA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="512" y1="434" x2="548" y2="472" stroke="#40C4AA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Medium bubble left -->
    <circle cx="300" cy="560" r="54" fill="none" stroke="#40C4AA" stroke-width="7" opacity="0.65"/>
    <circle cx="300" cy="560" r="40" fill="#40C4AA" opacity="0.08"/>
    <line x1="300" y1="590" x2="300" y2="534" stroke="#40C4AA" stroke-width="11" stroke-linecap="round" opacity="0.80"/>
    <line x1="300" y1="534" x2="276" y2="558" stroke="#40C4AA" stroke-width="11" stroke-linecap="round" opacity="0.80"/>
    <line x1="300" y1="534" x2="324" y2="558" stroke="#40C4AA" stroke-width="11" stroke-linecap="round" opacity="0.80"/>

    <!-- Medium bubble right -->
    <circle cx="720" cy="540" r="48" fill="none" stroke="#80EDFF" stroke-width="7" opacity="0.60"/>
    <circle cx="720" cy="540" r="34" fill="#80EDFF" opacity="0.08"/>
    <line x1="720" y1="568" x2="720" y2="516" stroke="#80EDFF" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
    <line x1="720" y1="516" x2="698" y2="538" stroke="#80EDFF" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
    <line x1="720" y1="516" x2="742" y2="538" stroke="#80EDFF" stroke-width="10" stroke-linecap="round" opacity="0.75"/>

    <!-- Small bubbles floating up top -->
    <circle cx="400" cy="330" r="28" fill="none" stroke="#40C4AA" stroke-width="5" opacity="0.50"/>
    <circle cx="620" cy="310" r="22" fill="none" stroke="#80EDFF" stroke-width="4" opacity="0.45"/>
    <circle cx="340" cy="240" r="16" fill="none" stroke="#40C4AA" stroke-width="3" opacity="0.35"/>
    <circle cx="680" cy="220" r="14" fill="none" stroke="#80EDFF" stroke-width="3" opacity="0.30"/>

    <!-- Stars at top -->
    <circle cx="512" cy="180" r="8" fill="#40C4AA" opacity="0.80"/>
    <circle cx="450" cy="200" r="5" fill="#80EDFF" opacity="0.65"/>
    <circle cx="574" cy="195" r="5" fill="#40C4AA" opacity="0.65"/>
  </g>
</svg>
