<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="100%" stop-color="#002850"/>
    </linearGradient>
    <radialGradient id="globe" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#004080"/>
      <stop offset="100%" stop-color="#001428"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="256" cy="230" r="160" fill="url(#globe)" stroke="#0088ff" stroke-width="2" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="230" rx="160" ry="40" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.3"/>
  <ellipse cx="256" cy="230" rx="120" ry="30" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.3"/>
  <ellipse cx="256" cy="200" rx="140" ry="20" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.25"/>
  <ellipse cx="256" cy="260" rx="150" ry="20" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.25"/>
  <!-- Longitude lines -->
  <line x1="256" y1="70" x2="256" y2="390" stroke="#0088ff" stroke-width="1" opacity="0.3"/>
  <path d="M200,72 Q100,230 200,388" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.25"/>
  <path d="M312,72 Q412,230 312,388" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.25"/>
  <!-- Trace path -->
  <polyline points="140,200 180,190 220,210 256,185 300,195 340,170 380,200" fill="none" stroke="#00ffcc" stroke-width="3" stroke-linecap="round"/>
  <!-- Trace points -->
  <circle cx="140" cy="200" r="6" fill="#00ffcc"/>
  <circle cx="256" cy="185" r="6" fill="#00ffcc"/>
  <circle cx="380" cy="200" r="6" fill="#00ffcc"/>
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#0088ff">NET.TRACE</text>
</svg>
