<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08csn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <!-- Background: deep orange -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08csn)"/>

  <!-- Left: Windows Explorer tile -->
  <rect x="100" y="350" width="280" height="280" rx="24" fill="white" opacity="0.95"/>
  <!-- Explorer windows logo mini -->
  <rect x="136" y="390" width="58" height="58" rx="6" fill="#3B82F6"/>
  <rect x="202" y="390" width="58" height="58" rx="6" fill="#EF4444"/>
  <rect x="136" y="456" width="58" height="58" rx="6" fill="#22C55E"/>
  <rect x="202" y="456" width="58" height="58" rx="6" fill="#FCD34D"/>
  <text x="240" y="566" font-family="Arial,sans-serif" font-size="22" fill="#374151" text-anchor="middle">Explorer</text>
  <text x="240" y="594" font-family="Arial,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">Right-click</text>

  <!-- Center: large bold arrow -->
  <line x1="394" y1="490" x2="598" y2="490" stroke="white" stroke-width="32" stroke-linecap="round"/>
  <polygon points="580,446 660,490 580,534" fill="white"/>
  <!-- "Shell Extension" text on arrow -->
  <text x="496" y="480" font-family="Arial,sans-serif" font-size="20" fill="#C2410C" text-anchor="middle" font-weight="bold">Shell.Native.dll</text>

  <!-- Right: Claude Code terminal tile -->
  <rect x="648" y="350" width="280" height="280" rx="24" fill="#0F172A" opacity="0.95"/>
  <!-- Claude C logo inside -->
  <circle cx="788" cy="450" r="72" fill="#F97316"/>
  <text x="788" y="478" font-family="Arial Black,Arial" font-size="72" fill="white" font-weight="900" text-anchor="middle">C</text>
  <text x="788" y="566" font-family="Arial,sans-serif" font-size="22" fill="#CBD5E1" text-anchor="middle">Claude Code</text>
  <text x="788" y="594" font-family="Consolas,monospace" font-size="16" fill="#64748B" text-anchor="middle">claude . --start</text>

  <!-- Connection lines detail (dotted) -->
  <line x1="380" y1="460" x2="380" y2="520" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" stroke-dasharray="8,6"/>
  <line x1="660" y1="460" x2="660" y2="520" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" stroke-dasharray="8,6"/>

  <!-- Bottom label -->
  <rect x="200" y="730" width="624" height="64" rx="16" fill="white" opacity="0.2"/>
  <text x="512" y="770" font-family="Arial Black,Arial" font-size="34" fill="white" font-weight="900" text-anchor="middle">Claude.Shell.Native</text>
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.8">Windows Shell Extension</text>
</svg>
