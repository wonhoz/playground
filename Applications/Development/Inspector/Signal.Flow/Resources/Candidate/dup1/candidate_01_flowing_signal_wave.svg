<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a1a"/>
      <stop offset="100%" stop-color="#001a2e"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56CCF2" stop-opacity="0"/>
      <stop offset="20%" stop-color="#56CCF2"/>
      <stop offset="80%" stop-color="#8E54E9"/>
      <stop offset="100%" stop-color="#8E54E9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ee0979" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ee0979"/>
      <stop offset="80%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56ab2f" stop-opacity="0"/>
      <stop offset="20%" stop-color="#56ab2f"/>
      <stop offset="80%" stop-color="#a8e063"/>
      <stop offset="100%" stop-color="#a8e063" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#0a2040" stroke-width="1" opacity="0.5">
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="256" x2="452" y2="256"/>
    <line x1="60" y1="352" x2="452" y2="352"/>
    <line x1="160" y1="80" x2="160" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="352" y1="80" x2="352" y2="432"/>
  </g>

  <!-- Wave 1 - sine wave (blue/purple) -->
  <path d="M60,160 C100,160 120,100 160,100 C200,100 220,220 260,220 C300,220 320,100 360,100 C400,100 420,160 452,160" fill="none" stroke="url(#wave1)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Wave 2 - offset sine (red/orange) -->
  <path d="M60,256 C100,256 120,180 160,180 C200,180 220,332 260,332 C300,332 320,180 360,180 C400,180 420,256 452,256" fill="none" stroke="url(#wave2)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Wave 3 - higher frequency (green) -->
  <path d="M60,352 C80,352 90,312 110,312 C130,312 140,392 160,392 C180,392 190,312 210,312 C230,312 240,392 260,392 C280,392 290,312 310,312 C330,312 340,392 360,392 C380,392 390,352 452,352" fill="none" stroke="url(#wave3)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Moving signal dots on waves -->
  <circle cx="310" cy="110" r="8" fill="#56CCF2" filter="url(#glow)"/>
  <circle cx="200" cy="332" r="8" fill="#ee0979" filter="url(#glow)"/>
  <circle cx="280" cy="392" r="8" fill="#56ab2f" filter="url(#glow)"/>

  <!-- Direction arrows -->
  <polygon points="445,148 452,160 445,172" fill="#56CCF2" opacity="0.8" filter="url(#glow)"/>
  <polygon points="445,244 452,256 445,268" fill="#ee0979" opacity="0.8" filter="url(#glow)"/>
  <polygon points="445,340 452,352 445,364" fill="#56ab2f" opacity="0.8" filter="url(#glow)"/>

  <!-- Amplitude labels (dots on y-axis) -->
  <circle cx="60" cy="160" r="5" fill="#56CCF2" opacity="0.6"/>
  <circle cx="60" cy="256" r="5" fill="#ee0979" opacity="0.6"/>
  <circle cx="60" cy="352" r="5" fill="#56ab2f" opacity="0.6"/>

  <!-- Channel indicator bars -->
  <rect x="65" y="82" width="6" height="350" rx="3" fill="#56CCF2" opacity="0.15"/>
  <rect x="450" y="82" width="6" height="350" rx="3" fill="#56CCF2" opacity="0.15"/>
</svg>
