<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00080f"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="crystal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="dirty" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Before: dirty/cluttered side (left) -->
  <text x="130" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B7280">BEFORE</text>
  <rect x="60" y="100" width="150" height="280" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <!-- Messy files inside -->
  <rect x="75" y="116" width="60" height="40" rx="4" fill="#1F2937" stroke="#4B5563" stroke-width="1" transform="rotate(-8 105 136)"/>
  <text x="105" y="134" text-anchor="middle" font-family="monospace" font-size="8" fill="#9CA3AF">.tmp</text>
  <rect x="130" y="130" width="60" height="40" rx="4" fill="#1F2937" stroke="#4B5563" stroke-width="1" transform="rotate(12 160 150)"/>
  <text x="160" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#9CA3AF">.log</text>
  <rect x="70" y="195" width="60" height="40" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1" transform="rotate(5 100 215)"/>
  <text x="100" y="213" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">.cache</text>
  <rect x="125" y="210" width="60" height="40" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1" transform="rotate(-6 155 230)"/>
  <text x="155" y="228" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">.bak</text>
  <text x="135" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">12 files</text>
  <text x="135" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563">847 MB</text>
  <!-- Arrow -->
  <path d="M215,256 L296,256" stroke="#38BDF8" stroke-width="4" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38BDF8"/>
    </marker>
  </defs>
  <text x="256" y="248" text-anchor="middle" font-family="monospace" font-size="11" fill="#38BDF8">CLEAN</text>
  <!-- After: crystal clear (right) -->
  <text x="382" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#38BDF8">AFTER</text>
  <rect x="302" y="100" width="150" height="280" rx="12" fill="#00080f" stroke="#38BDF8" stroke-width="2"/>
  <!-- Crystal gem inside -->
  <polygon points="377,150 420,210 400,280 354,280 334,210" fill="url(#crystal)" opacity="0.15"/>
  <polygon points="377,150 420,210 400,280 354,280 334,210" fill="none" stroke="url(#crystal)" stroke-width="2"/>
  <!-- Crystal facets -->
  <line x1="377" y1="150" x2="377" y2="280" stroke="url(#crystal2)" stroke-width="1" opacity="0.4"/>
  <line x1="334" y1="210" x2="420" y2="210" stroke="url(#crystal2)" stroke-width="1" opacity="0.4"/>
  <text x="377" y="218" text-anchor="middle" font-family="monospace" font-size="11" fill="#38BDF8" opacity="0.7">CLEAN</text>
  <text x="377" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#38BDF8">0 files</text>
  <text x="377" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#0EA5E9">0 MB</text>
  <!-- Sparkles -->
  <text x="380" y="145" font-family="monospace" font-size="14" fill="#E0F2FE">✦</text>
  <text x="308" y="128" font-family="monospace" font-size="10" fill="#BAE6FD" opacity="0.7">✦</text>
  <text x="440" y="158" font-family="monospace" font-size="10" fill="#BAE6FD" opacity="0.7">✦</text>
</svg>
