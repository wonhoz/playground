<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <radialGradient id="planet04" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg04)"/>
  <!-- 별들 -->
  <circle cx="250" cy="230" r="5" fill="#FDE68A" opacity="0.8"/>
  <circle cx="780" cy="200" r="6" fill="#FDE68A" opacity="0.9"/>
  <circle cx="840" cy="780" r="5" fill="#FDE68A" opacity="0.7"/>
  <circle cx="200" cy="800" r="4" fill="#FDE68A" opacity="0.6"/>
  <!-- 렌치 (중앙) -->
  <g transform="translate(512,512) rotate(-30)">
    <!-- 렌치 몸통 -->
    <rect x="-35" y="-200" width="70" height="340" rx="20" fill="#D1D5DB" stroke="#F9FAFB" stroke-width="15"/>
    <!-- 렌치 헤드 상단 -->
    <path d="M -80,-200 Q -80,-280 0,-290 Q 80,-280 80,-200 L 60,-200 Q 60,-260 0,-268 Q -60,-260 -60,-200 Z" fill="#9CA3AF" stroke="#F9FAFB" stroke-width="12"/>
    <!-- 렌치 개구부 상단 -->
    <rect x="-30" y="-270" width="60" height="80" rx="8" fill="url(#bg04)"/>
    <!-- 렌치 헤드 하단 -->
    <path d="M -70,140 L -90,180 L -80,220 Q -40,250 0,250 Q 40,250 80,220 L 90,180 L 70,140 Z" fill="#9CA3AF" stroke="#F9FAFB" stroke-width="12"/>
    <!-- 렌치 나사 패턴 -->
    <circle cx="0" cy="0" r="25" fill="#6B7280" stroke="#F9FAFB" stroke-width="8"/>
  </g>
  <!-- 작은 행성들 (주변) -->
  <circle cx="260" cy="280" r="55" fill="url(#planet04)" stroke="#DDD6FE" stroke-width="10"/>
  <circle cx="248" cy="270" r="40" fill="#6D28D9" opacity="0.7"/>
  <!-- 큰 행성 (오른쪽 하단) -->
  <circle cx="780" cy="730" r="80" fill="#FCD34D" stroke="#FDE68A" stroke-width="10"/>
  <ellipse cx="762" cy="715" rx="58" ry="25" fill="none" stroke="#F59E0B" stroke-width="8" opacity="0.7"/>
  <!-- 별 (장식) -->
  <path d="M 760,240 L 775,270 L 810,270 L 782,290 L 793,320 L 760,300 L 727,320 L 738,290 L 710,270 L 745,270 Z" fill="#FDE68A" stroke="#F59E0B" stroke-width="6"/>
  <path d="M 280,780 L 290,800 L 313,800 L 296,813 L 303,835 L 280,820 L 257,835 L 264,813 L 247,800 L 270,800 Z" fill="#FDE68A" stroke="#F59E0B" stroke-width="5"/>
  <!-- 궤도 링 (배경) -->
  <ellipse cx="512" cy="512" rx="330" ry="120" fill="none" stroke="white" stroke-width="6" opacity="0.25" stroke-dasharray="20 20"/>
</svg>
