    <!-- obj folder (top-right) -->
    <rect x="612" y="220" width="280" height="220" rx="28" fill="#1E293B" stroke="#334155" stroke-width="8"/>
    <rect x="612" y="188" width="160" height="44" rx="16" fill="#1E293B" stroke="#334155" stroke-width="8"/>
    <text x="752" y="340" font-family="Courier New" font-size="52" font-weight="700" fill="#94A3B8" text-anchor="middle">obj</text>
    <!-- X marks on both -->
    <line x1="172" y1="264" x2="372" y2="416" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
    <line x1="372" y1="264" x2="172" y2="416" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
    <line x1="652" y1="264" x2="852" y2="416" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
    <line x1="852" y1="264" x2="652" y2="416" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
