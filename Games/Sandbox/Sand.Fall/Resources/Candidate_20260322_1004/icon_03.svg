  <circle cx="440" cy="796" r="6" fill="#4FC3F7"/>
  <circle cx="390" cy="776" r="6" fill="#29B6F6"/>
  <circle cx="348" cy="744" r="6" fill="#2196F3"/>
  <circle cx="316" cy="704" r="6" fill="#1E88E5"/>

  <!-- 물→상단우: 물→모래 (파랑→노랑 도트) -->
