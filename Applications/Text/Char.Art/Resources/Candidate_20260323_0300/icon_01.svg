<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 이미지→ASCII 변환 화살표 | 대각선/동적 | #0A0A1A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A0A1A"/>
  <!-- Layer 2: Left - pixel image blocks -->
  <rect x="110" y="260" width="300" height="300" rx="10" fill="#1E293B"/>
  <!-- Pixel grid representation -->
  <rect x="120" y="270" width="52" height="52" rx="4" fill="#7C3AED"/>
  <rect x="178" y="270" width="52" height="52" rx="4" fill="#5B21B6"/>
  <rect x="236" y="270" width="52" height="52" rx="4" fill="#3B0764"/>
  <rect x="294" y="270" width="52" height="52" rx="4" fill="#6D28D9"/>
  <rect x="120" y="328" width="52" height="52" rx="4" fill="#4C1D95"/>
  <rect x="178" y="328" width="52" height="52" rx="4" fill="#7C3AED" opacity="0.8"/>
  <rect x="236" y="328" width="52" height="52" rx="4" fill="#A855F7"/>
  <rect x="294" y="328" width="52" height="52" rx="4" fill="#5B21B6"/>
  <rect x="120" y="386" width="52" height="52" rx="4" fill="#3B0764"/>
  <rect x="178" y="386" width="52" height="52" rx="4" fill="#6D28D9"/>
  <rect x="236" y="386" width="52" height="52" rx="4" fill="#4C1D95"/>
  <rect x="294" y="386" width="52" height="52" rx="4" fill="#7C3AED"/>
  <rect x="120" y="444" width="52" height="52" rx="4" fill="#A855F7" opacity="0.7"/>
  <rect x="178" y="444" width="52" height="52" rx="4" fill="#5B21B6"/>
  <rect x="236" y="444" width="52" height="52" rx="4" fill="#3B0764"/>
  <rect x="294" y="444" width="52" height="52" rx="4" fill="#6D28D9"/>
  <!-- Conversion arrow -->
  <path d="M440 395 L560 395" stroke="#F59E0B" stroke-width="18" stroke-linecap="round"/>
  <polygon points="554,370 614,395 554,420" fill="#F59E0B"/>
  <!-- Spark effect -->
  <circle cx="470" cy="380" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="510" cy="410" r="5" fill="#FDE68A" opacity="0.5"/>
  <!-- Right - ASCII art output -->
  <rect x="620" y="260" width="300" height="300" rx="10" fill="#0F1A0F"/>
  <text x="635" y="306" font-family="Consolas,monospace" font-size="20" fill="#4ADE80">@@@##$$%%&amp;</text>
  <text x="635" y="332" font-family="Consolas,monospace" font-size="20" fill="#22C55E">##**++==--:</text>
  <text x="635" y="358" font-family="Consolas,monospace" font-size="20" fill="#16A34A">**++==--::.</text>
  <text x="635" y="384" font-family="Consolas,monospace" font-size="20" fill="#15803D">++==--::;..</text>
  <text x="635" y="410" font-family="Consolas,monospace" font-size="20" fill="#166534">==--::;.. </text>
  <text x="635" y="436" font-family="Consolas,monospace" font-size="20" fill="#14532D" opacity="0.8">--::;..   </text>
  <text x="635" y="462" font-family="Consolas,monospace" font-size="20" fill="#052E16" opacity="0.6">::;..     </text>
  <!-- Layer 3: Labels -->
  <text x="260" y="600" font-family="Arial,sans-serif" font-size="22" fill="#A855F7" text-anchor="middle">이미지</text>
  <text x="770" y="600" font-family="Consolas,monospace" font-size="22" fill="#4ADE80" text-anchor="middle">ASCII</text>
</svg>
