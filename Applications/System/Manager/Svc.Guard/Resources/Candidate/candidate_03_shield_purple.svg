<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="260" r="160" fill="url(#glow)"/>
  <!-- Hexagon shield -->
  <polygon points="256,75 380,148 380,295 256,368 132,295 132,148" fill="url(#shield)"/>
  <polygon points="256,105 355,163 355,280 256,338 157,280 157,163" fill="none" stroke="#E1BEE7" stroke-width="3" opacity="0.5"/>
  <!-- Service gear -->
  <circle cx="256" cy="225" r="45" fill="none" stroke="#F3E5F5" stroke-width="7"/>
  <circle cx="256" cy="225" r="22" fill="#4A148C"/>
  <circle cx="256" cy="225" r="10" fill="#CE93D8"/>
  <!-- Spokes -->
  <line x1="256" y1="170" x2="256" y2="190" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="256" y2="280" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="201" y1="225" x2="221" y2="225" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="291" y1="225" x2="311" y2="225" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="217" y1="186" x2="231" y2="200" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="281" y1="250" x2="295" y2="264" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="295" y1="186" x2="281" y2="200" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="231" y1="250" x2="217" y2="264" stroke="#F3E5F5" stroke-width="9" stroke-linecap="round"/>
  <!-- Status bar -->
  <rect x="195" y="295" width="122" height="12" rx="6" fill="#6A1B9A"/>
  <rect x="195" y="295" width="85" height="12" rx="6" fill="#CE93D8"/>
  <text x="256" y="330" text-anchor="middle" font-family="Arial" font-size="20" fill="#E1BEE7" font-weight="bold">GUARD</text>
</svg>
