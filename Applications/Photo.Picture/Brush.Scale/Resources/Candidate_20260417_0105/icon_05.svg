<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <linearGradient id="brush5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Layer 2: Canvas / image frame -->
  <rect x="140" y="140" width="600" height="620" rx="24" fill="white" stroke="#CE93D8" stroke-width="8"/>

  <!-- Left side of canvas — pixelated -->
  <g>
    <rect x="158" y="158" width="90" height="90" rx="6" fill="#B39DDB"/>
    <rect x="258" y="158" width="90" height="90" rx="6" fill="#9575CD"/>
    <rect x="358" y="158" width="90" height="90" rx="6" fill="#CE93D8"/>
    <rect x="458" y="158" width="90" height="90" rx="6" fill="#9575CD"/>
    <rect x="158" y="258" width="90" height="90" rx="6" fill="#9575CD"/>
    <rect x="258" y="258" width="90" height="90" rx="6" fill="#B39DDB"/>
    <rect x="358" y="258" width="90" height="90" rx="6" fill="#7E57C2"/>
    <rect x="458" y="258" width="90" height="90" rx="6" fill="#B39DDB"/>
    <rect x="158" y="358" width="90" height="90" rx="6" fill="#CE93D8"/>
    <rect x="258" y="358" width="90" height="90" rx="6" fill="#7E57C2"/>
    <rect x="358" y="358" width="90" height="90" rx="6" fill="#9575CD"/>
    <rect x="458" y="358" width="90" height="90" rx="6" fill="#CE93D8"/>
  </g>

  <!-- Right side of canvas — smooth scene (after AI touch) -->
  <clipPath id="rightCanvas">
    <rect x="140" y="458" width="600" height="302" rx="0"/>
  </clipPath>
  <g clip-path="url(#rightCanvas)">
    <rect x="140" y="458" width="600" height="302" fill="#B3E5FC"/>
    <circle cx="310" cy="550" r="76" fill="#FFD600"/>
    <path d="M140,620 L240,530 L320,575 L420,510 L530,560 L630,510 L740,580 L740,760 L140,760 Z" fill="#66BB6A"/>
  </g>

  <!-- Divider line at brush stroke -->
  <line x1="140" y1="460" x2="740" y2="460" stroke="#CE93D8" stroke-width="4" stroke-dasharray="16 8"/>

  <!-- Layer 3: AI Brush — angled paintbrush -->
  <!-- Brush handle -->
  <rect x="620" y="180" width="200" height="44" rx="22" fill="url(#brush5)" transform="rotate(-45, 720, 202)"/>
  <!-- Brush ferrule -->
  <rect x="682" y="464" width="76" height="36" rx="6" fill="#9E9E9E" transform="rotate(-45, 720, 482)"/>
  <!-- Brush tip -->
  <ellipse cx="730" cy="540" rx="30" ry="48" fill="#7E57C2" transform="rotate(-45, 730, 540)"/>

  <!-- Sparkles at brush tip -->
  <circle cx="640" cy="460" r="18" fill="#FFD600"/>
  <circle cx="680" cy="420" r="12" fill="white"/>
  <circle cx="610" cy="420" r="10" fill="#FFD600"/>

  <!-- AI label badge -->
  <rect x="780" y="540" width="190" height="204" rx="20" fill="url(#brush5)"/>
  <text x="875" y="626" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">AI</text>
  <text x="875" y="716" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#CE93D8" text-anchor="middle">4×</text>
</svg>
