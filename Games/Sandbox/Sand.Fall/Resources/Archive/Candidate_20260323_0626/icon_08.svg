<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 지층 단면 — 재질이 쌓인 지질학적 단면 | 레이어드 | #0A0800 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A0800"/>
  <!-- Layer 2: Geological cross-section -->
  <!-- Label area left -->
  <!-- Layer strata (from top to bottom) -->
  <!-- Layer 1: Surface/air (sky) -->
  <rect x="220" y="200" width="584" height="60" rx="0" fill="#001428" stroke="#1A3A5A" stroke-width="1"/>
  <text x="820" y="235" font-family="monospace" font-size="12" fill="#4488AA" text-anchor="start">공기</text>
  <text x="186" y="235" font-family="monospace" font-size="12" fill="#4488AA" text-anchor="end">AIR</text>
  <!-- Layer 2: Soil/grass top -->
  <rect x="220" y="260" width="584" height="50" rx="0" fill="#2A4A10" stroke="#3A6A20" stroke-width="1"/>
  <text x="820" y="290" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="start">흙</text>
  <text x="186" y="290" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="end">SOIL</text>
  <!-- Grass at surface -->
  <line x1="240" y1="260" x2="240" y2="248" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="258" y2="246" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="260" x2="270" y2="250" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <line x1="320" y1="260" x2="322" y2="247" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="260" x2="368" y2="249" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <line x1="450" y1="260" x2="452" y2="248" stroke="#22AA22" stroke-width="3" stroke-linecap="round"/>
  <!-- Layer 3: Sand layer -->
  <rect x="220" y="310" width="584" height="80" rx="0" fill="#C8A820" stroke="#8A7010" stroke-width="1"/>
  <text x="820" y="356" font-family="monospace" font-size="12" fill="#FFDD44" text-anchor="start">모래</text>
  <text x="186" y="356" font-family="monospace" font-size="12" fill="#FFDD44" text-anchor="end">SAND</text>
  <!-- Sand grain texture -->
  <circle cx="280" cy="340" r="3" fill="#EECC40" opacity="0.6"/>
  <circle cx="340" cy="355" r="3" fill="#D8B820" opacity="0.6"/>
  <circle cx="400" cy="345" r="3" fill="#EECC40" opacity="0.6"/>
  <circle cx="460" cy="360" r="3" fill="#D8B820" opacity="0.6"/>
  <circle cx="520" cy="342" r="3" fill="#EECC40" opacity="0.6"/>
  <circle cx="580" cy="358" r="3" fill="#D8B820" opacity="0.6"/>
  <circle cx="640" cy="346" r="3" fill="#EECC40" opacity="0.6"/>
  <circle cx="700" cy="355" r="3" fill="#D8B820" opacity="0.6"/>
  <!-- Layer 4: Clay/hardpan -->
  <rect x="220" y="390" width="584" height="60" rx="0" fill="#8B5A2B" stroke="#6A3A10" stroke-width="1"/>
  <text x="820" y="425" font-family="monospace" font-size="12" fill="#CC8844" text-anchor="start">점토</text>
  <text x="186" y="425" font-family="monospace" font-size="12" fill="#CC8844" text-anchor="end">CLAY</text>
  <!-- Layer 5: Rock/gravel -->
  <rect x="220" y="450" width="584" height="70" rx="0" fill="#444444" stroke="#333333" stroke-width="1"/>
  <text x="820" y="490" font-family="monospace" font-size="12" fill="#888888" text-anchor="start">암석</text>
  <text x="186" y="490" font-family="monospace" font-size="12" fill="#888888" text-anchor="end">ROCK</text>
  <!-- Rock texture (irregulars) -->
  <polygon points="250,460 280,460 290,475 270,490 245,480" fill="#555555"/>
  <polygon points="350,462 385,458 395,475 375,488 345,480" fill="#555555"/>
  <polygon points="480,460 510,455 525,472 505,485 475,478" fill="#555555"/>
  <polygon points="600,462 630,458 645,475 625,488 598,482" fill="#555555"/>
  <!-- Layer 6: Water table -->
  <rect x="220" y="520" width="584" height="60" rx="0" fill="#0A2050" stroke="#0A1A40" stroke-width="1"/>
  <text x="820" y="556" font-family="monospace" font-size="12" fill="#4488FF" text-anchor="start">지하수</text>
  <text x="186" y="556" font-family="monospace" font-size="12" fill="#4488FF" text-anchor="end">WATER</text>
  <!-- Water ripples -->
  <path d="M 240 545 Q 280 535 320 545 Q 360 535 400 545 Q 440 535 480 545 Q 520 535 560 545 Q 600 535 640 545 Q 680 535 720 545 Q 760 535 790 545" stroke="#2266FF" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Layer 7: Lava/magma at bottom -->
  <rect x="220" y="580" width="584" height="80" rx="0" fill="#660000" stroke="#880000" stroke-width="1"/>
  <text x="820" y="626" font-family="monospace" font-size="12" fill="#FF4400" text-anchor="start">마그마</text>
  <text x="186" y="626" font-family="monospace" font-size="12" fill="#FF4400" text-anchor="end">MAGMA</text>
  <!-- Lava bubbles -->
  <circle cx="300" cy="620" r="14" fill="#FF4400" opacity="0.6"/>
  <circle cx="420" cy="610" r="10" fill="#FF6600" opacity="0.5"/>
  <circle cx="540" cy="618" r="12" fill="#FF4400" opacity="0.6"/>
  <circle cx="670" cy="606" r="8" fill="#FF6600" opacity="0.5"/>
  <!-- Layer 8: Iron core suggestion -->
  <rect x="220" y="660" width="584" height="40" rx="0" fill="#2A0000" stroke="#440000" stroke-width="1"/>
  <text x="820" y="684" font-family="monospace" font-size="12" fill="#662200" text-anchor="start">핵</text>
  <text x="186" y="684" font-family="monospace" font-size="12" fill="#662200" text-anchor="end">CORE</text>
  <!-- Layer 3: Depth scale bar on right -->
  <line x1="800" y1="260" x2="800" y2="700" stroke="#3A3A3A" stroke-width="2"/>
  <line x1="796" y1="260" x2="804" y2="260" stroke="#3A3A3A" stroke-width="2"/>
  <line x1="796" y1="700" x2="804" y2="700" stroke="#3A3A3A" stroke-width="2"/>
  <text x="800" y="820" font-family="monospace" font-size="13" fill="#666666" text-anchor="middle">깊이: 0~50m (단면도)</text>
</svg>
