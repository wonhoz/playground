  <!-- 중간 보조 행성 (중심) -->
  <circle cx="512" cy="500" r="70" fill="#1E3A5F" stroke="#334155" stroke-width="10" opacity="0.8"/>
  <circle cx="512" cy="500" r="70" fill="none" stroke="#60A5FA" stroke-width="8" opacity="0.5"/>
  <!-- 목표 궤도 (타겟) -->
  <ellipse cx="750" cy="550" rx="120" ry="80" fill="none" stroke="#22C55E" stroke-width="12" opacity="0.8"/>
  <!-- 탐사선 (궤적 끝) -->
  <g transform="translate(800,430) rotate(-35)">
    <ellipse cx="0" cy="0" rx="32" ry="16" fill="#E0E0E0" stroke="#FFFFFF" stroke-width="8"/>
    <rect x="-10" y="-26" width="20" height="26" rx="10" fill="#93C5FD" stroke="#FFFFFF" stroke-width="7"/>
    <rect x="-44" y="-5" width="26" height="10" rx="5" fill="#60A5FA" stroke="#FFFFFF" stroke-width="5"/>
    <rect x="18" y="-5" width="26" height="10" rx="5" fill="#60A5FA" stroke="#FFFFFF" stroke-width="5"/>
