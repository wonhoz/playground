<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="prism1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="prism2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프리즘 삼각형 -->
  <polygon points="256,80 100,360 412,360" fill="none" stroke="#2DD4BF" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <!-- 프리즘 내부 스펙트럼 분산 -->
  <line x1="256" y1="80" x2="150" y2="360" stroke="#F43F5E" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="180" y2="360" stroke="#FB923C" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="210" y2="360" stroke="#FDE047" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="240" y2="360" stroke="#4ADE80" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="270" y2="360" stroke="#38BDF8" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="300" y2="360" stroke="#818CF8" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="80" x2="330" y2="360" stroke="#C084FC" stroke-width="2" opacity="0.7"/>
  <!-- 두 이미지 비교 표현 — 좌/우 패널 -->
  <rect x="90" y="390" width="140" height="70" rx="6" fill="#0d1520" stroke="#2DD4BF" stroke-width="2" opacity="0.8"/>
  <rect x="282" y="390" width="140" height="70" rx="6" fill="#0d1520" stroke="#2DD4BF" stroke-width="2" opacity="0.8"/>
  <!-- 좌 패널 내부 -->
  <rect x="102" y="402" width="40" height="46" rx="3" fill="#1a3a4a" opacity="0.9"/>
  <rect x="150" y="410" width="68" height="8" rx="3" fill="#2DD4BF" opacity="0.6"/>
  <rect x="150" y="424" width="50" height="6" rx="3" fill="#2DD4BF" opacity="0.3"/>
  <rect x="150" y="436" width="60" height="6" rx="3" fill="#2DD4BF" opacity="0.3"/>
  <!-- 우 패널 내부 -->
  <rect x="294" y="402" width="40" height="46" rx="3" fill="#2a1a3a" opacity="0.9"/>
  <rect x="342" y="410" width="68" height="8" rx="3" fill="#C084FC" opacity="0.6"/>
  <rect x="342" y="424" width="50" height="6" rx="3" fill="#C084FC" opacity="0.3"/>
  <rect x="342" y="436" width="60" height="6" rx="3" fill="#C084FC" opacity="0.3"/>
  <!-- 중앙 비교 화살표 -->
  <path d="M230 425 L282 425" stroke="#2DD4BF" stroke-width="2.5" marker-end="url(#arr)" opacity="0.9"/>
  <text x="256" y="420" text-anchor="middle" font-size="16" fill="#2DD4BF" opacity="0.8">⇄</text>
  <!-- 상단 글로우 포인트 -->
  <circle cx="256" cy="80" r="8" fill="#2DD4BF" filter="url(#softglow)" opacity="0.9"/>
</svg>
