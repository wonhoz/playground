<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | MP3 파일 + 앨범아트 + 메타데이터 태그 카드 | 레이어드 | 민트+파랑+주황 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#004D40" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Back card (offset) -->
  <rect x="180" y="160" width="660" height="560" rx="24" fill="#80CBC4" filter="url(#sh2)" opacity="0.6"/>

  <!-- Middle card -->
  <rect x="150" y="190" width="660" height="560" rx="24" fill="#26A69A" filter="url(#sh2)" opacity="0.8"/>

  <!-- Front card (main) -->
  <rect x="120" y="220" width="660" height="560" rx="24" fill="white" filter="url(#sh2)"/>

  <!-- Album art (left side of card) -->
  <rect x="148" y="248" width="240" height="240" rx="16" fill="#7B1FA2" filter="url(#sh2)"/>
  <circle cx="268" cy="368" r="80" fill="#9C27B0"/>
  <circle cx="268" cy="368" r="50" fill="#7B1FA2"/>
  <circle cx="268" cy="368" r="24" fill="#CE93D8"/>
  <!-- Vinyl grooves -->
  <circle cx="268" cy="368" r="60" fill="none" stroke="#BA68C8" stroke-width="4" opacity="0.5"/>
  <circle cx="268" cy="368" r="70" fill="none" stroke="#BA68C8" stroke-width="3" opacity="0.3"/>
  <circle cx="268" cy="368" r="18" fill="#EDE7F6"/>

  <!-- Tag info (right side) -->
  <text x="430" y="278" font-family="Arial, sans-serif" font-size="16" fill="#80CBC4">TITLE</text>
  <text x="430" y="302" font-family="Arial Black, sans-serif" font-size="26" fill="#212121">Midnight Blue</text>

  <text x="430" y="342" font-family="Arial, sans-serif" font-size="16" fill="#80CBC4">ARTIST</text>
  <text x="430" y="366" font-family="Arial, sans-serif" font-size="22" fill="#37474F">Echo Valley</text>

  <text x="430" y="406" font-family="Arial, sans-serif" font-size="16" fill="#80CBC4">ALBUM</text>
  <text x="430" y="430" font-family="Arial, sans-serif" font-size="20" fill="#37474F">Night Sessions Vol.2</text>

  <text x="430" y="468" font-family="Arial, sans-serif" font-size="16" fill="#80CBC4">GENRE / YEAR</text>
  <text x="430" y="492" font-family="Arial, sans-serif" font-size="20" fill="#37474F">Jazz · 2024</text>

  <!-- Format badge -->
  <rect x="150" y="508" width="90" height="36" rx="12" fill="#FF6F00"/>
  <text x="195" y="526" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">MP3</text>
  <rect x="250" y="508" width="100" height="36" rx="12" fill="#7B1FA2"/>
  <text x="300" y="526" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">FLAC</text>

  <!-- Track & duration -->
  <text x="430" y="526" font-family="Consolas, monospace" font-size="18" fill="#546E7A">Track 05 · 4:32</text>

  <!-- Bottom section: before/after -->
  <rect x="130" y="570" width="230" height="80" rx="12" fill="#FFEBEE"/>
  <text x="245" y="600" font-family="Arial, sans-serif" font-size="16" fill="#E53935"
        text-anchor="middle">이전: 태그 없음</text>
  <text x="245" y="622" font-family="Consolas, monospace" font-size="14" fill="#EF9A9A"
        text-anchor="middle">unknown_file.mp3</text>

  <rect x="388" y="570" width="374" height="80" rx="12" fill="#E8F5E9"/>
  <text x="575" y="600" font-family="Arial, sans-serif" font-size="16" fill="#2E7D32"
        text-anchor="middle">이후: 완성된 태그</text>
  <text x="575" y="622" font-family="Consolas, monospace" font-size="14" fill="#81C784"
        text-anchor="middle">Midnight Blue — Echo Valley.mp3</text>

  <!-- Arrow between -->
  <polygon points="368,606 388,588 388,624" fill="#26A69A"/>

  <!-- Right labels floating out -->
  <rect x="800" y="300" width="160" height="56" rx="14" fill="#FF6F00" filter="url(#sh2)"/>
  <text x="880" y="328" font-family="Arial Black, sans-serif" font-size="24" fill="white"
        text-anchor="middle" dominant-baseline="middle">TagLib#</text>

  <rect x="800" y="390" width="180" height="56" rx="14" fill="#7B1FA2" filter="url(#sh2)"/>
  <text x="890" y="418" font-family="Arial Black, sans-serif" font-size="22" fill="white"
        text-anchor="middle" dominant-baseline="middle">MusicBrainz</text>

  <!-- Bottom title -->
  <rect x="240" y="832" width="544" height="70" rx="35" fill="white" filter="url(#sh2)"/>
  <text x="512" y="867" font-family="Arial Black, sans-serif" font-size="36" fill="#004D40"
        text-anchor="middle" dominant-baseline="middle">Tag.Forge</text>
</svg>
