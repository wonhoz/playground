<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1500"/>
      <stop offset="100%" stop-color="#2D2200"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative mosaic tile pattern (Roman/Byzantine style) -->
  <!-- Diamond grid -->
  <rect x="148" y="148" width="44" height="44" rx="4" fill="#FFD60A" transform="rotate(45 170 170)"/>
  <rect x="216" y="148" width="44" height="44" rx="4" fill="#E85D04" transform="rotate(45 238 170)"/>
  <rect x="284" y="148" width="44" height="44" rx="4" fill="#FFD60A" transform="rotate(45 306 170)"/>
  <rect x="148" y="216" width="44" height="44" rx="4" fill="#E85D04" transform="rotate(45 170 238)"/>
  <rect x="216" y="216" width="44" height="44" rx="4" fill="#FFD60A" transform="rotate(45 238 238)"/>
  <rect x="284" y="216" width="44" height="44" rx="4" fill="#E85D04" transform="rotate(45 306 238)"/>
  <rect x="148" y="284" width="44" height="44" rx="4" fill="#FFD60A" transform="rotate(45 170 306)"/>
  <rect x="216" y="284" width="44" height="44" rx="4" fill="#E85D04" transform="rotate(45 238 306)"/>
  <rect x="284" y="284" width="44" height="44" rx="4" fill="#FFD60A" transform="rotate(45 306 306)"/>
  <!-- Border tiles -->
  <rect x="90" y="90" width="332" height="332" rx="16" fill="none" stroke="#FFD60A" stroke-width="4" opacity="0.5"/>
  <rect x="102" y="102" width="308" height="308" rx="12" fill="none" stroke="#E85D04" stroke-width="2" opacity="0.4"/>
  <!-- Title plaque -->
  <rect x="130" y="410" width="252" height="52" rx="12" fill="#FFD60A" opacity="0.15" stroke="#FFD60A" stroke-width="2"/>
  <text x="256" y="443" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#FFD60A">MOSAIC.FORGE</text>
</svg>