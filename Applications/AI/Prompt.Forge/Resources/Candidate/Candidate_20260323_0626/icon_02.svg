<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 퍼즐 조각 맞추기 — 프롬프트 블록 조립 | 기하학 | #2A0A30 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#2A0A30"/>
  <!-- Layer 2: Jigsaw puzzle pieces representing prompt components -->
  <!-- Piece 1: Role - top left -->
  <path d="M200 300 L380 300 L380 340 Q400 340 400 360 Q400 380 380 380 L380 460 L200 460 L200 420 Q180 420 180 400 Q180 380 200 380 Z" fill="#6D28D9" stroke="#A78BFA" stroke-width="3"/>
  <text x="290" y="375" font-family="monospace" font-size="22" fill="#DDD6FE" text-anchor="middle" font-weight="bold">Role</text>
  <!-- Piece 2: Context - top right (interlocking) -->
  <path d="M400 300 L580 300 L580 380 Q600 380 600 400 Q600 420 580 420 L580 460 L400 460 L400 380 Q420 380 420 360 Q420 340 400 340 Z" fill="#7C3AED" stroke="#C4B5FD" stroke-width="3"/>
  <text x="490" y="375" font-family="monospace" font-size="22" fill="#EDE9FE" text-anchor="middle" font-weight="bold">Context</text>
  <!-- Piece 3: Task - bottom left -->
  <path d="M200 460 L380 460 L380 540 Q400 540 400 560 Q400 580 380 580 L380 620 L200 620 L200 540 Q180 540 180 520 Q180 500 200 500 Z" fill="#5B21B6" stroke="#8B5CF6" stroke-width="3"/>
  <text x="290" y="545" font-family="monospace" font-size="22" fill="#DDD6FE" text-anchor="middle" font-weight="bold">Task</text>
  <!-- Piece 4: Format - bottom right -->
  <path d="M400 460 L580 460 L580 620 L400 620 L400 580 Q380 580 380 560 Q380 540 400 540 Z" fill="#4C1D95" stroke="#7C3AED" stroke-width="3"/>
  <text x="490" y="545" font-family="monospace" font-size="22" fill="#EDE9FE" text-anchor="middle" font-weight="bold">Format</text>
  <!-- Floating piece (not yet placed) -->
  <path d="M650 280 L800 280 L800 360 Q820 360 820 380 Q820 400 800 400 L800 440 L650 440 L650 400 Q630 400 630 380 Q630 360 650 360 Z" fill="#3B1066" stroke="#A78BFA" stroke-width="3" opacity="0.85" transform="rotate(-15 725 360)"/>
  <text x="730" y="370" font-family="monospace" font-size="18" fill="#C4B5FD" text-anchor="middle" transform="rotate(-15 730 370)">Output</text>
  <!-- Layer 3: Connection arrow -->
  <text x="512" y="730" font-family="Arial,sans-serif" font-size="26" fill="#C4B5FD" text-anchor="middle" opacity="0.7">완성된 프롬프트</text>
  <line x1="350" y1="640" x2="670" y2="640" stroke="#A78BFA" stroke-width="3" opacity="0.4"/>
</svg>
