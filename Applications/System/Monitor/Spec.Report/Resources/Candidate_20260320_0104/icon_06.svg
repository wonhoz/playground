<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- QR코드+스캔: QR code pattern being scanned -->
  <!-- QR frame border corners -->
  <path d="M220 220 L220 300 M220 220 L300 220" fill="none" stroke="#29B6F6" stroke-width="16" stroke-linecap="round"/>
  <path d="M804 220 L804 300 M804 220 L724 220" fill="none" stroke="#29B6F6" stroke-width="16" stroke-linecap="round"/>
  <path d="M220 804 L220 724 M220 804 L300 804" fill="none" stroke="#29B6F6" stroke-width="16" stroke-linecap="round"/>
  <path d="M804 804 L804 724 M804 804 L724 804" fill="none" stroke="#29B6F6" stroke-width="16" stroke-linecap="round"/>
  <!-- QR code modules (simplified pattern) -->
  <!-- Top-left finder pattern -->
  <rect x="260" y="260" width="140" height="140" rx="10" fill="#01579B"/>
  <rect x="278" y="278" width="104" height="104" rx="6" fill="#000810"/>
  <rect x="296" y="296" width="68" height="68" rx="4" fill="#01579B"/>
  <!-- Top-right finder pattern -->
  <rect x="624" y="260" width="140" height="140" rx="10" fill="#01579B"/>
  <rect x="642" y="278" width="104" height="104" rx="6" fill="#000810"/>
  <rect x="660" y="296" width="68" height="68" rx="4" fill="#01579B"/>
  <!-- Bottom-left finder pattern -->
  <rect x="260" y="624" width="140" height="140" rx="10" fill="#01579B"/>
  <rect x="278" y="642" width="104" height="104" rx="6" fill="#000810"/>
  <rect x="296" y="660" width="68" height="68" rx="4" fill="#01579B"/>
  <!-- Data modules center area -->
  <rect x="440" y="260" width="36" height="36" rx="4" fill="#01579B"/>
  <rect x="496" y="280" width="28" height="28" rx="4" fill="#01579B"/>
  <rect x="548" y="260" width="36" height="36" rx="4" fill="#01579B"/>
  <rect x="440" y="306" width="28" height="28" rx="4" fill="#01579B"/>
  <!-- Center data -->
  <rect x="430" y="430" width="164" height="164" rx="8" fill="#01579B" opacity="0.3"/>
  <!-- Scan line -->
  <line x1="200" y1="512" x2="824" y2="512" stroke="#29B6F6" stroke-width="6" opacity="0.9"/>
  <rect x="200" y="502" width="624" height="20" rx="4" fill="#29B6F6" opacity="0.1"/>
</svg>