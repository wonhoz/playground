<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#grad07)"/>

  <!-- Eye white (outer ellipse) -->
  <ellipse cx="512" cy="510" rx="310" ry="185" fill="white"/>

  <!-- Iris (dark circle) -->
  <circle cx="512" cy="510" r="145" fill="#311B92"/>

  <!-- Pupil inner circle with ASCII text -->
  <circle cx="512" cy="510" r="100" fill="#1A0A5E"/>

  <!-- ASCII chars inside pupil -->
  <text x="512" y="498" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="#B388FF">@#$</text>
  <text x="512" y="545" font-family="'Courier New', monospace" font-size="44" font-weight="900"
        text-anchor="middle" fill="#CE93D8">%*@</text>

  <!-- Iris highlight ring -->
  <circle cx="512" cy="510" r="145" fill="none" stroke="#7C4DFF" stroke-width="8"/>

  <!-- Eye outline -->
  <ellipse cx="512" cy="510" rx="310" ry="185" fill="none" stroke="#4527A0" stroke-width="10"/>

  <!-- Eyelashes top -->
  <line x1="390" y1="330" x2="400" y2="360" stroke="#260E40" stroke-width="14" stroke-linecap="round"/>
  <line x1="445" y1="305" x2="450" y2="338" stroke="#260E40" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="295" x2="512" y2="328" stroke="#260E40" stroke-width="14" stroke-linecap="round"/>
  <line x1="578" y1="305" x2="573" y2="338" stroke="#260E40" stroke-width="14" stroke-linecap="round"/>
  <line x1="633" y1="330" x2="622" y2="360" stroke="#260E40" stroke-width="14" stroke-linecap="round"/>

  <!-- Sparkles around eye -->
  <text x="260" y="430" font-family="Arial" font-size="65" text-anchor="middle" fill="#FFD700">✦</text>
  <text x="765" y="420" font-family="Arial" font-size="65" text-anchor="middle" fill="#FFD700">✦</text>
  <text x="310" y="680" font-family="Arial" font-size="50" text-anchor="middle" fill="#FFE57F">✦</text>
  <text x="716" y="690" font-family="Arial" font-size="50" text-anchor="middle" fill="#FFE57F">✦</text>

  <!-- Top/bottom label -->
  <text x="512" y="240" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">@#$%</text>
  <text x="512" y="800" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">@#$%</text>
</svg>
