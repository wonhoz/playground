<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050f0a"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="runeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#34D399" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#runeGlow)" filter="url(#outerGlow)"/>

  <!-- Outer magic circle -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#34D399" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Rune inscribed circle (inner) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.6" filter="url(#softglow)"/>

  <!-- Hexagram star (hash/checksum symbol) -->
  <!-- Upward triangle -->
  <polygon points="256,80 390,316 122,316" fill="none" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <!-- Downward triangle -->
  <polygon points="256,432 122,196 390,196" fill="none" stroke="#34D399" stroke-width="2.5" stroke-opacity="0.7" filter="url(#softglow)"/>

  <!-- Rune marks at hexagram points -->
  <circle cx="256" cy="80" r="7" fill="#10B981" filter="url(#glow)"/>
  <circle cx="390" cy="196" r="7" fill="#34D399" filter="url(glow)"/>
  <circle cx="390" cy="316" r="7" fill="#10B981" filter="url(#glow)"/>
  <circle cx="256" cy="432" r="7" fill="#34D399" filter="url(#glow)"/>
  <circle cx="122" cy="316" r="7" fill="#10B981" filter="url(#glow)"/>
  <circle cx="122" cy="196" r="7" fill="#34D399" filter="url(#glow)"/>

  <!-- Hexagonal inner border -->
  <polygon points="256,160 326,198 326,314 256,352 186,314 186,198" fill="#10B981" fill-opacity="0.04" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Central hash rune -->
  <!-- Hash symbol made of lines -->
  <line x1="230" y1="220" x2="230" y2="292" stroke="#10B981" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="282" y1="220" x2="282" y2="292" stroke="#10B981" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="218" y1="243" x2="294" y2="243" stroke="#34D399" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="218" y1="269" x2="294" y2="269" stroke="#34D399" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Glow on hash -->
  <line x1="230" y1="220" x2="230" y2="292" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="282" y1="220" x2="282" y2="292" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="218" y1="243" x2="294" y2="243" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="218" y1="269" x2="294" y2="269" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Runic text marks on circle -->
  <line x1="256" y1="86" x2="256" y2="72" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="340" y1="107" x2="348" y2="95" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="396" y1="172" x2="408" y2="166" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="420" y1="256" x2="434" y2="256" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="396" y1="340" x2="408" y2="346" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="340" y1="405" x2="348" y2="417" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="256" y1="426" x2="256" y2="440" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="172" y1="405" x2="164" y2="417" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="116" y1="340" x2="104" y2="346" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="92" y1="256" x2="78" y2="256" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="116" y1="172" x2="104" y2="166" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="172" y1="107" x2="164" y2="95" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
