<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1445"/>
  <!-- Layer 2: 교차 단어들 (HEART 가로 + EAGLE 세로) -->
  <!-- HEART 가로 (행 5) -->
  <rect x="80" y="420" width="864" height="100" rx="12" fill="#1E3A8A"/>
  <text x="162" y="500" font-size="90" fill="#60A5FA" font-weight="bold" font-family="Arial Black">H E A R T</text>
  <!-- EAGLE 세로 (교차점 A) -->
  <rect x="460" y="80" width="100" height="864" rx="12" fill="#1E4734"/>
  <text x="510" y="175" font-size="80" fill="#34D399" text-anchor="middle" font-weight="bold" font-family="Arial Black">E</text>
  <text x="510" y="265" font-size="80" fill="#34D399" text-anchor="middle" font-weight="bold" font-family="Arial Black">A</text>
  <text x="510" y="355" font-size="80" fill="#34D399" text-anchor="middle" font-weight="bold" font-family="Arial Black">G</text>
  <!-- A는 교차 (하이라이트) -->
  <rect x="460" y="420" width="100" height="100" rx="4" fill="#7C3AED"/>
  <text x="510" y="497" font-size="80" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial Black">A</text>
  <text x="510" y="595" font-size="80" fill="#34D399" text-anchor="middle" font-weight="bold" font-family="Arial Black">L</text>
  <text x="510" y="695" font-size="80" fill="#34D399" text-anchor="middle" font-weight="bold" font-family="Arial Black">E</text>
  <!-- Layer 3: 격자 흐릿하게 -->
  <line x1="80" y1="268" x2="944" y2="268" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="80" y1="358" x2="944" y2="358" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="80" y1="620" x2="944" y2="620" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="80" y1="710" x2="944" y2="710" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="270" y1="80" x2="270" y2="944" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="360" y1="80" x2="360" y2="944" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="652" y1="80" x2="652" y2="944" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
  <line x1="742" y1="80" x2="742" y2="944" stroke="#1D4ED8" stroke-width="4" opacity="0.4"/>
</svg>
