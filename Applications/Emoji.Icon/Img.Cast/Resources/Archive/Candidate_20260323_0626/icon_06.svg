<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 케이크 레이어 — 다중 크기 ICO 레이어 | 대각선/동적 | #1A0A00 -->
  <defs>
    <linearGradient id="cakeGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#CC3A00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A00"/>
  <!-- Layer 2: Stacked cake layers (ICO size layers) -->
  <!-- Layer 256px (base - largest) -->
  <rect x="212" y="660" width="600" height="80" rx="10" fill="url(#cakeGrad6)" stroke="#FF8855" stroke-width="3"/>
  <text x="512" y="706" font-family="monospace" font-size="18" fill="#FFDDCC" text-anchor="middle" font-weight="bold">256 × 256 px</text>
  <!-- Layer 128px -->
  <rect x="256" y="576" width="512" height="74" rx="10" fill="#CC5500" stroke="#FF8844" stroke-width="3"/>
  <text x="512" y="619" font-family="monospace" font-size="16" fill="#FFDDCC" text-anchor="middle" font-weight="bold">128 × 128 px</text>
  <!-- Layer 64px -->
  <rect x="298" y="500" width="428" height="68" rx="10" fill="#AA4400" stroke="#FF7733" stroke-width="3"/>
  <text x="512" y="541" font-family="monospace" font-size="15" fill="#FFCCAA" text-anchor="middle" font-weight="bold">64 × 64 px</text>
  <!-- Layer 48px -->
  <rect x="340" y="432" width="344" height="60" rx="10" fill="#883300" stroke="#FF6622" stroke-width="3"/>
  <text x="512" y="469" font-family="monospace" font-size="14" fill="#FFCCAA" text-anchor="middle" font-weight="bold">48 × 48 px</text>
  <!-- Layer 32px -->
  <rect x="380" y="372" width="264" height="52" rx="10" fill="#662800" stroke="#EE5511" stroke-width="3"/>
  <text x="512" y="405" font-family="monospace" font-size="13" fill="#FFBBAA" text-anchor="middle" font-weight="bold">32 × 32 px</text>
  <!-- Layer 16px (top - smallest) -->
  <rect x="420" y="322" width="184" height="42" rx="10" fill="#4A1E00" stroke="#DD4400" stroke-width="3"/>
  <text x="512" y="349" font-family="monospace" font-size="12" fill="#FFBBAA" text-anchor="middle" font-weight="bold">16 × 16 px</text>
  <!-- Candle on top (ICO "file" symbol) -->
  <rect x="496" y="268" width="32" height="50" rx="4" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
  <!-- Flame -->
  <ellipse cx="512" cy="256" rx="12" ry="18" fill="#FF6600"/>
  <ellipse cx="512" cy="252" rx="7" ry="12" fill="#FFFF00"/>
  <ellipse cx="512" cy="250" rx="4" ry="7" fill="white" opacity="0.8"/>
  <!-- ICO file label on candle -->
  <text x="512" y="300" font-family="monospace" font-size="10" fill="#4A1E00" text-anchor="middle" font-weight="bold">.ICO</text>
  <!-- Layer 3: Side depth lines to show 3D cake effect -->
  <line x1="212" y1="660" x2="180" y2="700" stroke="#AA3300" stroke-width="3"/>
  <line x1="812" y1="660" x2="844" y2="700" stroke="#AA3300" stroke-width="3"/>
  <line x1="180" y1="700" x2="180" y2="740" stroke="#AA3300" stroke-width="3"/>
  <rect x="180" y="700" width="632" height="40" rx="0" fill="#882200" stroke="#AA3300" stroke-width="2" opacity="0.8"/>
</svg>
