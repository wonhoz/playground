<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#000a1f"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <filter id="boltglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- folder -->
  <path d="M90 230 L90 395 L420 395 L420 255 L225 255 L195 230 Z" fill="url(#folder)"/>
  <path d="M90 230 L90 260 L420 260 L420 255 L225 255 L195 230 Z" fill="#f57f17"/>
  <ellipse cx="148" cy="246" rx="26" ry="7" fill="white" opacity="0.25"/>
  <!-- lightning bolt -->
  <path d="M280 80 L230 250 L270 250 L220 440 L300 250 L260 250 Z" fill="url(#bolt)" filter="url(#boltglow)"/>
  <!-- secondary smaller bolt -->
  <path d="M330 140 L305 220 L325 220 L295 310 L340 215 L320 215 Z" fill="url(#bolt)" opacity="0.5" filter="url(#boltglow)"/>
  <!-- glow impact -->
  <circle cx="240" cy="395" r="40" fill="#ffe082" opacity="0.3" filter="url(#boltglow)"/>
  <!-- sparks -->
  <circle cx="210" cy="400" r="5" fill="#fff9c4"/>
  <circle cx="270" cy="395" r="4" fill="#ffe082"/>
  <circle cx="240" cy="420" r="3" fill="white" opacity="0.7"/>
</svg>
