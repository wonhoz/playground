<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001200"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="80" width="392" height="320" rx="8" fill="#001A00" stroke="#00FF41" stroke-width="2" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="60" y="80" width="392" height="28" rx="8" fill="#003A00"/>
  <rect x="60" y="95" width="392" height="13" fill="#003A00"/>
  <text x="256" y="97" font-family="monospace" font-size="12" fill="#00FF41" text-anchor="middle">Pad.Forge — Terminal</text>
  <!-- Terminal text (green on black) -->
  <text x="80" y="132" font-family="monospace" font-size="13" fill="#00FF41" filter="url(#termGlow)">$ pad-forge --new</text>
  <text x="80" y="152" font-family="monospace" font-size="13" fill="#00CC33">Creating new document...</text>
  <text x="80" y="172" font-family="monospace" font-size="13" fill="#00FF41" filter="url(#termGlow)">$ ls notes/</text>
  <text x="80" y="192" font-family="monospace" font-size="13" fill="#00CC33">meeting.txt  ideas.txt</text>
  <text x="80" y="212" font-family="monospace" font-size="13" fill="#00CC33">todo.txt     README.md</text>
  <text x="80" y="232" font-family="monospace" font-size="13" fill="#00FF41" filter="url(#termGlow)">$ cat ideas.txt</text>
  <text x="80" y="252" font-family="monospace" font-size="12" fill="#008822"># Pad.Forge Ideas</text>
  <text x="80" y="268" font-family="monospace" font-size="12" fill="#00CC33">- Syntax highlight</text>
  <text x="80" y="284" font-family="monospace" font-size="12" fill="#00CC33">- Auto save</text>
  <text x="80" y="300" font-family="monospace" font-size="12" fill="#00CC33">- Search replace</text>
  <text x="80" y="320" font-family="monospace" font-size="13" fill="#00FF41" filter="url(#termGlow)">$ _</text>
  <!-- Blinking cursor -->
  <rect x="96" y="308" width="10" height="16" rx="1" fill="#00FF41" filter="url(#termGlow)"/>
  <!-- CRT scanlines effect -->
  <rect x="60" y="108" width="392" height="292" fill="none" opacity="0.03"/>
  <!-- Status bar -->
  <rect x="60" y="372" width="392" height="28" rx="6" fill="#003A00"/>
  <text x="80" y="390" font-family="monospace" font-size="11" fill="#00FF41">INSERT  |  UTF-8  |  4 files</text>
</svg>
