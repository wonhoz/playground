<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#37474F"/>
      <stop offset="100%" style="stop-color:#455A64"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clean minimal design: large G glyph -->
  <text x="256" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="260" fill="#ECEFF1" opacity="0.12">G</text>
  <!-- Top bracket -->
  <path d="M140,100 L100,100 L100,160" fill="none" stroke="#90A4AE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M372,100 L412,100 L412,160" fill="none" stroke="#90A4AE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom bracket -->
  <path d="M140,412 L100,412 L100,352" fill="none" stroke="#90A4AE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M372,412 L412,412 L412,352" fill="none" stroke="#90A4AE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center content -->
  <text x="256" y="220" text-anchor="middle" font-family="monospace" font-size="16" fill="#90A4AE">U+0041 — U+1FFFF</text>
  <!-- Featured glyphs row -->
  <text x="118" y="295" text-anchor="middle" font-family="serif" font-size="52" fill="#ECEFF1">A</text>
  <text x="188" y="295" text-anchor="middle" font-family="serif" font-size="52" fill="#B0BEC5">Ω</text>
  <text x="256" y="295" text-anchor="middle" font-family="serif" font-size="52" fill="#FFD54F">★</text>
  <text x="324" y="295" text-anchor="middle" font-family="serif" font-size="52" fill="#B0BEC5">∞</text>
  <text x="394" y="295" text-anchor="middle" font-family="serif" font-size="52" fill="#ECEFF1">π</text>
  <!-- Label -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" letter-spacing="8" fill="#90A4AE">GLYPH MAP</text>
  <!-- Dot separators -->
  <circle cx="256" cy="415" r="4" fill="#90A4AE" opacity="0.6"/>
  <circle cx="226" cy="415" r="4" fill="#90A4AE" opacity="0.3"/>
  <circle cx="286" cy="415" r="4" fill="#90A4AE" opacity="0.3"/>
</svg>
