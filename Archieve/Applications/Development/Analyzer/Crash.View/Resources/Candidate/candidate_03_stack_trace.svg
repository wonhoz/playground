<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="56" y="90" width="400" height="340" rx="12" fill="#161B22" stroke="#30363D" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="56" y="90" width="400" height="34" rx="12" fill="#21262D"/>
  <rect x="56" y="112" width="400" height="12" fill="#21262D"/>
  <circle cx="84" cy="107" r="7" fill="#FF5F57"/>
  <circle cx="106" cy="107" r="7" fill="#FEBC2E"/>
  <circle cx="128" cy="107" r="7" fill="#28C840"/>
  <text x="256" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B949E">crash_dump.dmp</text>
  <!-- Stack frames with colored highlight on error line -->
  <rect x="68" y="194" width="376" height="18" fill="url(#highlight)"/>
  <!-- Code lines -->
  <text x="76" y="148" font-family="monospace" font-size="12" fill="#8B949E">Frame  0: ntdll!NtWaitForSingleObject</text>
  <text x="76" y="166" font-family="monospace" font-size="12" fill="#8B949E">Frame  1: kernel32!WaitForSingleObjectEx</text>
  <text x="76" y="184" font-family="monospace" font-size="12" fill="#8B949E">Frame  2: App!CrashHandler::Report</text>
  <text x="76" y="202" font-family="monospace" font-size="12" fill="#FF5252">Frame  3: App!Main::Run +0x2F  &lt;&lt;&lt;</text>
  <text x="76" y="220" font-family="monospace" font-size="12" fill="#8B949E">Frame  4: App!wmain</text>
  <text x="76" y="238" font-family="monospace" font-size="12" fill="#8B949E">Frame  5: kernel32!BaseThreadInitThunk</text>
  <!-- Separator -->
  <line x1="68" y1="252" x2="444" y2="252" stroke="#30363D" stroke-width="1"/>
  <!-- Exception info -->
  <text x="76" y="272" font-family="monospace" font-size="12" fill="#FF9800">EXCEPTION:</text>
  <text x="76" y="290" font-family="monospace" font-size="11" fill="#FFB74D">  Code   : 0xC0000005</text>
  <text x="76" y="306" font-family="monospace" font-size="11" fill="#FFB74D">  Access : READ</text>
  <text x="76" y="322" font-family="monospace" font-size="11" fill="#FFB74D">  Addr   : 0x00000000</text>
  <!-- Register -->
  <text x="76" y="344" font-family="monospace" font-size="11" fill="#58A6FF">RAX=0x0000 RBX=0xDEAD</text>
  <text x="76" y="360" font-family="monospace" font-size="11" fill="#58A6FF">RCX=0xBEEF RDX=0xFACE</text>
  <!-- Magnifier overlay -->
  <circle cx="400" cy="430" r="48" fill="none" stroke="#FF5252" stroke-width="5"/>
  <line x1="434" y1="464" x2="460" y2="490" stroke="#FF5252" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="430" r="30" fill="#161B22" opacity="0.8"/>
  <text x="400" y="438" text-anchor="middle" font-family="monospace" font-size="18" fill="#FF5252">0x</text>
</svg>
