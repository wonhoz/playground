<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 민트 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: URL 주소창 -->
  <rect x="80" y="160" width="864" height="100" rx="50" fill="white" stroke="#00897B" stroke-width="8"/>
  <text x="200" y="226" font-family="'Segoe UI', sans-serif" font-size="56" fill="#78909C">🌐</text>
  <text x="600" y="224" font-family="'Consolas', monospace" font-size="52" fill="#004D40" text-anchor="middle">https://example.com</text>
  <!-- 캡처 버튼 -->
  <rect x="820" y="176" width="120" height="68" rx="34" fill="#FF5722"/>
  <text x="880" y="222" font-family="'Segoe UI', sans-serif" font-size="40" fill="white" text-anchor="middle">📸</text>
  <!-- Layer 3: 캡처 결과 이미지 -->
  <!-- 이미지 카드 (폴라로이드 스타일) -->
  <rect x="120" y="320" width="784" height="560" rx="24" fill="white" stroke="#B2DFDB" stroke-width="8"/>
  <!-- 웹페이지 캡처 내용 -->
  <rect x="140" y="340" width="744" height="480" rx="12" fill="#1565C0"/>
  <!-- 미니 브라우저 바 -->
  <rect x="140" y="340" width="744" height="60" rx="12" fill="#0D47A1"/>
  <circle cx="180" cy="370" r="14" fill="#FF5252"/>
  <circle cx="220" cy="370" r="14" fill="#FFD600"/>
  <circle cx="260" cy="370" r="14" fill="#69F0AE"/>
  <!-- 웹 콘텐츠 -->
  <rect x="160" y="420" width="340" height="32" rx="8" fill="#BBDEFB"/>
  <rect x="160" y="464" width="500" height="20" rx="6" fill="#90CAF9"/>
  <rect x="160" y="494" width="460" height="20" rx="6" fill="#90CAF9"/>
  <rect x="540" y="420" width="320" height="160" rx="12" fill="#1976D2"/>
  <text x="700" y="510" font-family="'Segoe UI', sans-serif" font-size="72" fill="white" text-anchor="middle">🌐</text>
  <!-- 파일명 레이블 -->
  <text x="512" y="918" font-family="'Consolas', monospace" font-size="44" fill="#00695C" text-anchor="middle">screenshot_20260331.png</text>
</svg>
