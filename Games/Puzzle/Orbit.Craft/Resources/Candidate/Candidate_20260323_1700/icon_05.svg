<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#042F2E"/>
  <!-- Layer 2: 곡선 궤도 + 행성 -->
  <!-- 타원 궤도 (크게) -->
  <ellipse cx="512" cy="512" rx="400" ry="300" fill="none" stroke="#14B8A6" stroke-width="16" opacity="0.7"/>
  <!-- 행성 (중심) -->
  <circle cx="512" cy="512" r="100" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="80" fill="#E2E8F0"/>
  <!-- 표면 -->
  <ellipse cx="490" cy="490" rx="35" ry="20" fill="#CBD5E1" opacity="0.6"/>
  <ellipse cx="540" cy="540" rx="25" ry="15" fill="#94A3B8" opacity="0.5"/>
  <!-- 탐사선 (궤도 위 3곳) -->
  <circle cx="912" cy="512" r="20" fill="#5EEAD4"/>
  <circle cx="512" cy="212" r="16" fill="#5EEAD4" opacity="0.8"/>
  <circle cx="142" cy="600" r="12" fill="#5EEAD4" opacity="0.6"/>
  <!-- 탐사선 경로 흔적 -->
  <path d="M912 512 Q800 280 512 212" fill="none" stroke="#14B8A6" stroke-width="8" stroke-dasharray="16,10" opacity="0.5"/>
  <!-- Layer 3: 외곽 궤도 (작게) -->
  <ellipse cx="512" cy="512" rx="200" ry="160" fill="none" stroke="#0D9488" stroke-width="8" opacity="0.4"/>
</svg>
