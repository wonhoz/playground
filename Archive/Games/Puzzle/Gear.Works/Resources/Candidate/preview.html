<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Gear.Works — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; padding: 32px; }
  h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
  p  { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }
  .card {
    background: #242424;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #ffb300; transform: translateY(-3px); }
  .card img { width: 120px; height: 120px; border-radius: 8px; }
  .card .label {
    margin-top: 10px;
    font-size: 12px;
    color: #ffe082;
    word-break: break-all;
  }
  .card .num {
    font-size: 20px;
    font-weight: 900;
    color: #ffb300;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>Gear.Works — Icon Candidates</h1>
<p>기어 메커니즘 퍼즐 게임 / 10개 디자인 후보</p>
<div class="grid">
  <div class="card"><div class="num">01</div><img src="candidate_01_steampunk_gears.svg" alt="steampunk_gears"><div class="label">steampunk_gears</div></div>
  <div class="card"><div class="num">02</div><img src="candidate_02_neon_mechanism.svg" alt="neon_mechanism"><div class="label">neon_mechanism</div></div>
  <div class="card"><div class="num">03</div><img src="candidate_03_puzzle_connect.svg" alt="puzzle_connect"><div class="label">puzzle_connect</div></div>
  <div class="card"><div class="num">04</div><img src="candidate_04_clockwork.svg" alt="clockwork"><div class="label">clockwork</div></div>
  <div class="card"><div class="num">05</div><img src="candidate_05_green_factory.svg" alt="green_factory"><div class="label">green_factory</div></div>
  <div class="card"><div class="num">06</div><img src="candidate_06_isometric_gears.svg" alt="isometric_gears"><div class="label">isometric_gears</div></div>
  <div class="card"><div class="num">07</div><img src="candidate_07_minimal_white.svg" alt="minimal_white"><div class="label">minimal_white</div></div>
  <div class="card"><div class="num">08</div><img src="candidate_08_circuit_gears.svg" alt="circuit_gears"><div class="label">circuit_gears</div></div>
  <div class="card"><div class="num">09</div><img src="candidate_09_rainbow_spin.svg" alt="rainbow_spin"><div class="label">rainbow_spin</div></div>
  <div class="card"><div class="num">10</div><img src="candidate_10_blueprint.svg" alt="blueprint"><div class="label">blueprint</div></div>
</div>
</body>
</html>
