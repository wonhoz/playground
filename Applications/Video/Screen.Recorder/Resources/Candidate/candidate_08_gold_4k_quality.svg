<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#0D0900"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#0D0900"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Screen -->
  <rect x="60" y="80" width="392" height="260" rx="16" fill="url(#screen)" stroke="url(#gold)" stroke-width="8"/>
  <!-- Screen scanlines -->
  <g opacity="0.07" fill="url(#gold)">
    <rect x="68" y="90" width="376" height="4"/>
    <rect x="68" y="102" width="376" height="4"/>
    <rect x="68" y="114" width="376" height="4"/>
    <rect x="68" y="126" width="376" height="4"/>
    <rect x="68" y="138" width="376" height="4"/>
    <rect x="68" y="150" width="376" height="4"/>
    <rect x="68" y="162" width="376" height="4"/>
    <rect x="68" y="174" width="376" height="4"/>
    <rect x="68" y="186" width="376" height="4"/>
    <rect x="68" y="198" width="376" height="4"/>
    <rect x="68" y="210" width="376" height="4"/>
    <rect x="68" y="222" width="376" height="4"/>
    <rect x="68" y="234" width="376" height="4"/>
    <rect x="68" y="246" width="376" height="4"/>
    <rect x="68" y="258" width="376" height="4"/>
    <rect x="68" y="270" width="376" height="4"/>
    <rect x="68" y="282" width="376" height="4"/>
    <rect x="68" y="294" width="376" height="4"/>
    <rect x="68" y="306" width="376" height="4"/>
    <rect x="68" y="318" width="376" height="4"/>
    <rect x="68" y="330" width="376" height="4"/>
  </g>
  <!-- 4K text on screen -->
  <text x="100" y="240" font-family="Arial Black" font-size="120" font-weight="900" fill="url(#gold)" opacity="0.9">4K</text>
  <!-- REC badge -->
  <rect x="300" y="100" width="130" height="40" rx="10" fill="#FF1744" opacity="0.9"/>
  <circle cx="318" cy="120" r="10" fill="white" opacity="0.9"/>
  <rect x="336" y="113" width="80" height="14" rx="5" fill="white" opacity="0.8"/>
  <!-- Stand -->
  <rect x="236" y="340" width="40" height="44" rx="6" fill="#2C1F00"/>
  <rect x="186" y="382" width="140" height="18" rx="8" fill="#2C1F00"/>
  <!-- Quality bars -->
  <g fill="url(#gold)">
    <rect x="80" y="430" width="60" height="40" rx="4" opacity="0.4"/>
    <rect x="152" y="416" width="60" height="54" rx="4" opacity="0.55"/>
    <rect x="224" y="400" width="60" height="70" rx="4" opacity="0.7"/>
    <rect x="296" y="384" width="60" height="86" rx="4" opacity="0.85"/>
    <rect x="368" y="366" width="60" height="104" rx="4" opacity="1"/>
  </g>
  <rect x="80" y="468" width="348" height="4" rx="2" fill="url(#gold)" opacity="0.3"/>
</svg>
