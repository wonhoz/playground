<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Eiffel Tower silhouette -->
  <polygon points="512,200 480,380 440,500 420,620 604,620 584,500 544,380 512,200" fill="#1B5E20" fill-opacity="0.85"/>
  <!-- Tower details -->
  <rect x="440" y="500" width="144" height="18" rx="4" fill="#66BB6A" fill-opacity="0.7"/>
  <rect x="455" y="380" width="114" height="15" rx="4" fill="#66BB6A" fill-opacity="0.7"/>
  <rect x="468" y="310" width="88" height="12" rx="4" fill="#66BB6A" fill-opacity="0.7"/>
  <!-- Base platform -->
  <rect x="380" y="620" width="264" height="40" rx="8" fill="#66BB6A" fill-opacity="0.5"/>
  <!-- Ground -->
  <ellipse cx="512" cy="740" rx="240" ry="30" fill="#1B5E20" fill-opacity="0.4"/>
  <!-- Pin dot at top -->
  <circle cx="512" cy="200" r="22" fill="#66BB6A"/>
</svg>