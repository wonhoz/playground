<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0F"/>
  <!-- 분석 차트 배경 -->
  <rect x="180" y="300" width="664" height="440" rx="20" fill="#01579B" opacity="0.15" stroke="#01579B" stroke-width="20"/>
  <!-- 차트 막대들 -->
  <rect x="240" y="560" width="80" height="140" rx="8" fill="#01579B"/>
  <rect x="360" y="460" width="80" height="240" rx="8" fill="#4FC3F7"/>
  <rect x="480" y="380" width="80" height="320" rx="8" fill="#4FC3F7"/>
  <rect x="600" y="500" width="80" height="200" rx="8" fill="#01579B"/>
  <rect x="720" y="420" width="80" height="280" rx="8" fill="#4FC3F7" opacity="0.7"/>
  <!-- X축 -->
  <line x1="200" y1="720" x2="840" y2="720" stroke="#01579B" stroke-width="20" stroke-linecap="round"/>
  <!-- 포트 레이블 점 -->
  <circle cx="280" cy="740" r="10" fill="#01579B"/>
  <circle cx="400" cy="740" r="10" fill="#4FC3F7"/>
  <circle cx="520" cy="740" r="10" fill="#4FC3F7"/>
  <circle cx="640" cy="740" r="10" fill="#01579B"/>
  <circle cx="760" cy="740" r="10" fill="#4FC3F7"/>
  <!-- 트렌드 라인 -->
  <polyline points="280,560 400,460 520,380 640,500 760,420" fill="none" stroke="#4FC3F7" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
