<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 틸 -->
  <rect width="1024" height="1024" rx="180" fill="#004D40"/>
  <!-- Layer 2: 픽셀 그리드 → 문자 변환 (좌: 픽셀 블록, 우: 문자) -->
  <!-- 좌측 픽셀 그리드 4×4 -->
  <rect x="100" y="312" width="360" height="400" rx="16" fill="#00695C"/>
  <!-- 픽셀 블록들 (그레이스케일 느낌) -->
  <rect x="116" y="328" width="76" height="76" rx="4" fill="#B2DFDB"/>
  <rect x="200" y="328" width="76" height="76" rx="4" fill="#80CBC4"/>
  <rect x="284" y="328" width="76" height="76" rx="4" fill="#4DB6AC"/>
  <rect x="368" y="328" width="76" height="76" rx="4" fill="#26A69A"/>
  <rect x="116" y="412" width="76" height="76" rx="4" fill="#80CBC4"/>
  <rect x="200" y="412" width="76" height="76" rx="4" fill="#004D40"/>
  <rect x="284" y="412" width="76" height="76" rx="4" fill="#004D40"/>
  <rect x="368" y="412" width="76" height="76" rx="4" fill="#4DB6AC"/>
  <rect x="116" y="496" width="76" height="76" rx="4" fill="#4DB6AC"/>
  <rect x="200" y="496" width="76" height="76" rx="4" fill="#004D40"/>
  <rect x="284" y="496" width="76" height="76" rx="4" fill="#1B5E20"/>
  <rect x="368" y="496" width="76" height="76" rx="4" fill="#80CBC4"/>
  <rect x="116" y="580" width="76" height="76" rx="4" fill="#26A69A"/>
  <rect x="200" y="580" width="76" height="76" rx="4" fill="#4DB6AC"/>
  <rect x="284" y="580" width="76" height="76" rx="4" fill="#80CBC4"/>
  <rect x="368" y="580" width="76" height="76" rx="4" fill="#B2DFDB"/>
  <!-- 화살표 -->
  <line x1="490" y1="512" x2="570" y2="512" stroke="#80CBC4" stroke-width="28" stroke-linecap="round"/>
  <polygon points="560,484 608,512 560,540" fill="#80CBC4"/>
  <!-- 우측 문자 그리드 4×4 (같은 형태, 문자로) -->
  <rect x="600" y="312" width="320" height="400" rx="16" fill="#00695C"/>
  <text x="622" y="390" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">.</text>
  <text x="700" y="390" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">:</text>
  <text x="778" y="390" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">+</text>
  <text x="856" y="390" font-family="Consolas,monospace" font-size="68" fill="#80CBC4" font-weight="bold">#</text>
  <text x="622" y="468" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">:</text>
  <text x="700" y="468" font-family="Consolas,monospace" font-size="68" fill="#004D40" font-weight="bold">@</text>
  <text x="778" y="468" font-family="Consolas,monospace" font-size="68" fill="#004D40" font-weight="bold">@</text>
  <text x="856" y="468" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">+</text>
  <text x="622" y="546" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">+</text>
  <text x="700" y="546" font-family="Consolas,monospace" font-size="68" fill="#004D40" font-weight="bold">@</text>
  <text x="778" y="546" font-family="Consolas,monospace" font-size="68" fill="#26A69A" font-weight="bold">#</text>
  <text x="856" y="546" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">:</text>
  <text x="622" y="624" font-family="Consolas,monospace" font-size="68" fill="#80CBC4" font-weight="bold">#</text>
  <text x="700" y="624" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">+</text>
  <text x="778" y="624" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">:</text>
  <text x="856" y="624" font-family="Consolas,monospace" font-size="68" fill="#E0F2F1" font-weight="bold">.</text>
  <!-- Layer 3: 라벨 -->
  <text x="280" y="760" font-family="Arial" font-size="36" fill="#B2DFDB" text-anchor="middle" font-weight="bold">pixel</text>
  <text x="760" y="760" font-family="Consolas,monospace" font-size="36" fill="#B2DFDB" text-anchor="middle" font-weight="bold">@#:.</text>
</svg>
