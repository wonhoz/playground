<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background deep purple -->
  <defs>
    <radialGradient id="bg03" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: Registry key icon + repair wrench -->
  <!-- Registry key shape (old-fashioned key) -->
  <!-- Key head (circle) -->
  <circle cx="400" cy="380" r="170" fill="#7B1FA2" opacity="0.9"/>
  <circle cx="400" cy="380" r="120" fill="#4A148C" opacity="0.8"/>
  <circle cx="400" cy="380" r="70" fill="#CE93D8" opacity="0.9"/>
  <!-- Key shaft -->
  <rect x="540" y="358" width="260" height="44" rx="22" fill="#7B1FA2" opacity="0.9"/>
  <!-- Key teeth -->
  <rect x="680" y="402" width="40" height="50" rx="8" fill="#7B1FA2" opacity="0.9"/>
  <rect x="740" y="402" width="40" height="70" rx="8" fill="#7B1FA2" opacity="0.9"/>
  <!-- HKLM label inside key head -->
  <text x="400" y="395" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">HKLM</text>
  <!-- Fix/repair badge (wrench + check) -->
  <circle cx="720" cy="720" r="130" fill="#43A047" opacity="0.95"/>
  <!-- Wrench shape -->
  <path d="M680 760 L710 680 Q740 650 770 680 Q800 710 770 740 L740 760 Z" fill="#FFFFFF" opacity="0.9"/>
  <rect x="700" y="740" width="60" height="100" rx="12" fill="#FFFFFF" opacity="0.9" transform="rotate(45 730 790)"/>
  <!-- Check -->
  <path d="M660 720 L695 758 L780 670" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: Issue count badge -->
  <circle cx="280" cy="720" r="90" fill="#E53935"/>
  <text x="280" y="710" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#FFFFFF" text-anchor="middle">47</text>
  <text x="280" y="760" font-family="Arial, sans-serif" font-size="28" fill="#FFCDD2" text-anchor="middle">issues</text>
</svg>
