<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1724"/>
      <stop offset="100%" stop-color="#1A2435"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifier circle -->
  <circle cx="220" cy="220" r="150" fill="url(#lens)" stroke="#3B82F6" stroke-width="5"/>
  <!-- Handle -->
  <line x1="336" y1="336" x2="450" y2="450" stroke="#3B82F6" stroke-width="18" stroke-linecap="round"/>
  <!-- Inside magnifier: temp file list -->
  <text x="120" y="155" font-family="monospace" font-size="14" fill="#F59E0B">TEMP /</text>
  <text x="120" y="180" font-family="monospace" font-size="12" fill="#FEF3C7">app_cache.tmp</text>
  <text x="120" y="200" font-family="monospace" font-size="12" fill="#FEF3C7">session_2024.log</text>
  <text x="120" y="220" font-family="monospace" font-size="12" fill="#EF4444">~$lockfile.tmp</text>
  <text x="120" y="240" font-family="monospace" font-size="12" fill="#FEF3C7">crash_report.dmp</text>
  <text x="120" y="265" font-family="monospace" font-size="11" fill="#888">...18 more files</text>
  <!-- Size badge -->
  <rect x="130" y="280" width="110" height="28" rx="6" fill="#D97706"/>
  <text x="185" y="299" font-family="monospace" font-size="13" fill="white" text-anchor="middle">Total: 847MB</text>
</svg>