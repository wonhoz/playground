  <!-- 연결선 (태그 → 파일) -->
  <path d="M120,228 Q120,260 115,280" stroke="#34D399" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <path d="M270,228 Q270,260 279,280" stroke="#34D399" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
