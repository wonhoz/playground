<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76FF03"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (RED 가로 / RUG 세로, 교차점 R=(0,0)) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="412" width="196" height="196" fill="#1B5E20" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#1B5E20" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#1B5E20" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#1B5E20" rx="10"/>
  <!-- 교차점 강조 R=(0,0) -->
  <rect x="212" y="212" width="196" height="196" fill="#E8F5E9" stroke="#388E3C" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- 흰 셀 -->
  <rect x="412" y="212" width="196" height="196" fill="white" stroke="#388E3C" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="212" width="196" height="196" fill="white" stroke="#388E3C" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="412" width="196" height="196" fill="white" stroke="#388E3C" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="#388E3C" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- 글자 (RED 가로 / RUG 세로) -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1B5E20">R</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1B5E20">E</text>
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#C62828">D</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1B5E20">U</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1B5E20">G</text>
  <!-- Layer 3: 큰 체크마크 (완성!) -->
  <path d="M 270 550 L 440 730 L 790 300" stroke="white" stroke-width="72" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
</svg>
