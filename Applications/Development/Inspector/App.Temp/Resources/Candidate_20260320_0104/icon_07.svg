<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- File (solid base) -->
  <rect x="320" y="400" width="260" height="320" rx="16" fill="#1565C0"/>
  <polygon points="450,400 580,400 580,490 450,490" fill="#0A0D1A" opacity="0.3"/>
  <!-- Evaporation: file dissolving upward -->
  <rect x="320" y="340" width="260" height="60" rx="10" fill="#1565C0" opacity="0.7"/>
  <rect x="340" y="280" width="220" height="50" rx="10" fill="#1565C0" opacity="0.45"/>
  <rect x="370" y="230" width="160" height="44" rx="10" fill="#42A5F5" opacity="0.3"/>
  <rect x="400" y="190" width="100" height="36" rx="10" fill="#42A5F5" opacity="0.15"/>
  <!-- Rising particles -->
  <circle cx="440" cy="160" r="12" fill="#42A5F5" opacity="0.4"/>
  <circle cx="512" cy="140" r="8" fill="#42A5F5" opacity="0.3"/>
  <circle cx="570" cy="155" r="10" fill="#42A5F5" opacity="0.25"/>
</svg>