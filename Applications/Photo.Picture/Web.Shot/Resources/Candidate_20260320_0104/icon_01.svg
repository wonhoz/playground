<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Camera body -->
  <rect x="240" y="350" width="540" height="360" rx="40" fill="#0277BD"/>
  <!-- Camera lens -->
  <circle cx="512" cy="530" r="130" fill="#000A10"/>
  <circle cx="512" cy="530" r="100" fill="#0277BD" opacity="0.3"/>
  <circle cx="512" cy="530" r="70" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="512" cy="530" r="40" fill="#000A10"/>
  <!-- Camera top hump -->
  <rect x="380" y="290" width="180" height="80" rx="20" fill="#0277BD"/>
  <!-- Browser globe -->
  <circle cx="720" cy="290" r="80" fill="none" stroke="#4FC3F7" stroke-width="14"/>
  <ellipse cx="720" cy="290" rx="35" ry="80" fill="none" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="640" y1="290" x2="800" y2="290" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="720" y1="210" x2="720" y2="370" stroke="#4FC3F7" stroke-width="10"/>
  <!-- Shutter button -->
  <circle cx="512" cy="350" r="20" fill="#4FC3F7"/>
</svg>
