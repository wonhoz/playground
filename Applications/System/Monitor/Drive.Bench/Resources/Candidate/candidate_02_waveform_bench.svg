<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020B18"/>
      <stop offset="100%" stop-color="#071528"/>
    </linearGradient>
    <linearGradient id="readWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="writeWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chart area -->
  <rect x="60" y="70" width="392" height="310" rx="8" fill="#071528" stroke="#1E3A5F" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="60" y1="148" x2="452" y2="148" stroke="#0F2942" stroke-width="1"/>
  <line x1="60" y1="225" x2="452" y2="225" stroke="#0F2942" stroke-width="1"/>
  <line x1="60" y1="302" x2="452" y2="302" stroke="#0F2942" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="50" y="152" font-family="monospace" font-size="10" fill="#1E3A5F" text-anchor="end">7G</text>
  <text x="50" y="228" font-family="monospace" font-size="10" fill="#1E3A5F" text-anchor="end">3.5G</text>
  <text x="50" y="382" font-family="monospace" font-size="10" fill="#1E3A5F" text-anchor="end">0</text>
  <!-- READ waveform (blue) -->
  <polyline points="68,200 100,150 130,160 165,130 200,145 235,110 270,125 305,108 340,118 375,100 410,115 445,108" fill="none" stroke="url(#readWave)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area under read wave -->
  <polygon points="68,200 100,150 130,160 165,130 200,145 235,110 270,125 305,108 340,118 375,100 410,115 445,108 445,370 68,370" fill="#38BDF8" opacity="0.08"/>
  <!-- WRITE waveform (orange) -->
  <polyline points="68,260 100,230 130,240 165,210 200,225 235,195 270,215 305,200 340,215 375,195 410,210 445,202" fill="none" stroke="url(#writeWave)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area under write wave -->
  <polygon points="68,260 100,230 130,240 165,210 200,225 235,195 270,215 305,200 340,215 375,195 410,210 445,202 445,370 68,370" fill="#F97316" opacity="0.06"/>
  <!-- Legend -->
  <rect x="80" y="420" width="16" height="10" rx="3" fill="#38BDF8"/>
  <text x="102" y="430" font-family="sans-serif" font-size="12" fill="#7DD3FC">Read: 5,542 MB/s</text>
  <rect x="260" y="420" width="16" height="10" rx="3" fill="#F97316"/>
  <text x="282" y="430" font-family="sans-serif" font-size="12" fill="#FCA5A5">Write: 4,128 MB/s</text>
  <!-- Title -->
  <text x="256" y="470" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Sequential Throughput Benchmark</text>
</svg>
