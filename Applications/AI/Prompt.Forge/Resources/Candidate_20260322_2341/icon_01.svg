<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow01">
      <feDropShadow dx="6" dy="6" stdDeviation="10" flood-color="#92400E" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Layer 1: Warm cream background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- subtle texture dots -->
  <circle cx="150" cy="150" r="5" fill="#D97706" opacity="0.08"/>
  <circle cx="880" cy="200" r="4" fill="#D97706" opacity="0.06"/>
  <circle cx="900" cy="880" r="6" fill="#D97706" opacity="0.07"/>
  <circle cx="130" cy="870" r="4" fill="#D97706" opacity="0.06"/>

  <!-- Layer 2: Recipe card stack (3 cards, offset) -->
  <!-- Card 3 (back) -->
  <rect x="220" y="240" width="620" height="540" rx="20" fill="#FEF9EE" stroke="#D97706" stroke-width="5" opacity="0.5" transform="rotate(6 512 512)" filter="url(#shadow01)"/>
  <!-- Card 2 (middle) -->
  <rect x="220" y="240" width="620" height="540" rx="20" fill="#FFFBF0" stroke="#B45309" stroke-width="5" opacity="0.75" transform="rotate(-3 512 512)" filter="url(#shadow01)"/>

  <!-- Card 1 (front) -->
  <rect x="200" y="220" width="624" height="540" rx="20" fill="white" stroke="#92400E" stroke-width="6" filter="url(#shadow01)"/>
  <!-- Card header bar -->
  <rect x="200" y="220" width="624" height="72" rx="20" fill="#D97706"/>
  <rect x="200" y="262" width="624" height="30" fill="#D97706"/>
  <text x="512" y="268" font-family="'Segoe UI',sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">PROMPT RECIPE</text>

  <!-- Divider line -->
  <line x1="240" y1="330" x2="784" y2="330" stroke="#D97706" stroke-width="2" opacity="0.3"/>

  <!-- Template variable lines -->
  <text x="248" y="390" font-family="'Consolas','Courier New',monospace" font-size="38" fill="#92400E" font-weight="bold">{{role}}</text>
  <line x1="248" y1="400" x2="780" y2="400" stroke="#FDE68A" stroke-width="2"/>

  <text x="248" y="458" font-family="'Consolas','Courier New',monospace" font-size="38" fill="#B45309" font-weight="bold">{{task}}</text>
  <line x1="248" y1="468" x2="780" y2="468" stroke="#FDE68A" stroke-width="2"/>

  <text x="248" y="526" font-family="'Consolas','Courier New',monospace" font-size="38" fill="#92400E" font-weight="bold">{{context}}</text>
  <line x1="248" y1="536" x2="780" y2="536" stroke="#FDE68A" stroke-width="2"/>

  <!-- Tag chips at bottom -->
  <rect x="248" y="600" width="130" height="44" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
  <text x="313" y="628" font-family="'Segoe UI',sans-serif" font-size="26" fill="#92400E" text-anchor="middle">GPT-4</text>

  <rect x="396" y="600" width="130" height="44" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
  <text x="461" y="628" font-family="'Segoe UI',sans-serif" font-size="26" fill="#92400E" text-anchor="middle">writing</text>

  <!-- Layer 3: Favorite star top-right -->
  <text x="770" y="270" font-family="'Segoe UI Emoji',sans-serif" font-size="44" fill="#FEF08A">★</text>
</svg>
