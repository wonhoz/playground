<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="shelfG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg4)"/>

  <!-- White card (bookshelf area) -->
  <rect x="70" y="100" width="884" height="720" rx="32" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>

  <!-- Shelf boards (3 rows) -->
  <rect x="70" y="378" width="884" height="22" rx="4" fill="url(#shelfG)" stroke="#4E342E" stroke-width="10"/>
  <rect x="70" y="596" width="884" height="22" rx="4" fill="url(#shelfG)" stroke="#4E342E" stroke-width="10"/>
  <rect x="70" y="814" width="884" height="22" rx="4" fill="url(#shelfG)" stroke="#4E342E" stroke-width="10"/>

  <!-- TOP ROW: Year albums (2022, 2023, 2024) -->
  <!-- 2022 album -->
  <rect x="100" y="152" width="200" height="222" rx="12" fill="#FF6B35" stroke="#E65100" stroke-width="14"/>
  <rect x="114" y="164" width="172" height="140" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="8"/>
  <!-- Mini photo inside -->
  <polygon points="120,294 168,248 196,270 228,236 280,294" fill="#FF6B35" stroke="#E65100" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="252" cy="224" r="20" fill="#FFD93D" stroke="#E65100" stroke-width="5"/>
  <!-- Year spine label -->
  <rect x="100" y="304" width="200" height="62" rx="8" fill="#E65100" stroke="#BF360C" stroke-width="8"/>
  <text x="200" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">2022</text>

  <!-- 2023 album -->
  <rect x="316" y="148" width="200" height="226" rx="12" fill="#FF9800" stroke="#E65100" stroke-width="14"/>
  <rect x="330" y="160" width="172" height="140" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="8"/>
  <polygon points="336,290 384,254 412,272 444,240 496,290" fill="#FF9800" stroke="#E65100" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="468" cy="228" r="20" fill="#FFD93D" stroke="#E65100" stroke-width="5"/>
  <rect x="316" y="300" width="200" height="62" rx="8" fill="#E65100" stroke="#BF360C" stroke-width="8"/>
  <text x="416" y="343" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">2023</text>

  <!-- 2024 album (prominent) -->
  <rect x="532" y="134" width="240" height="240" rx="16" fill="#FF5722" stroke="#BF360C" stroke-width="16"/>
  <rect x="550" y="150" width="204" height="154" rx="10" fill="#FFFFFF" stroke="#BF360C" stroke-width="10"/>
  <polygon points="558,294 614,248 650,272 694,228 748,294" fill="#FF5722" stroke="#BF360C" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="720" cy="210" r="26" fill="#FFD93D" stroke="#BF360C" stroke-width="7"/>
  <rect x="532" y="306" width="240" height="62" rx="10" fill="#BF360C" stroke="#870000" stroke-width="10"/>
  <text x="652" y="349" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">2024</text>

  <!-- Thin album (extra) -->
  <rect x="786" y="170" width="80" height="206" rx="8" fill="#FFB300" stroke="#E65100" stroke-width="10"/>
  <text x="826" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 826, 290)">2025</text>

  <!-- MIDDLE ROW: Month sub-albums -->
  <rect x="100" y="396" width="120" height="194" rx="10" fill="#FFCC02" stroke="#E65100" stroke-width="10"/>
  <text x="160" y="516" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#E65100" text-anchor="middle" transform="rotate(90, 160, 516)">JAN</text>
  <rect x="234" y="396" width="120" height="194" rx="10" fill="#FF8F00" stroke="#E65100" stroke-width="10"/>
  <text x="294" y="516" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 294, 516)">FEB</text>
  <rect x="368" y="400" width="120" height="190" rx="10" fill="#FF6F00" stroke="#E65100" stroke-width="10"/>
  <text x="428" y="517" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 428, 517)">MAR</text>
  <rect x="502" y="396" width="120" height="194" rx="10" fill="#FF8F00" stroke="#E65100" stroke-width="10"/>
  <text x="562" y="516" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 562, 516)">APR</text>
  <rect x="636" y="400" width="120" height="190" rx="10" fill="#FFCC02" stroke="#E65100" stroke-width="10"/>
  <text x="696" y="517" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#E65100" text-anchor="middle" transform="rotate(90, 696, 517)">MAY</text>
  <rect x="770" y="396" width="120" height="194" rx="10" fill="#FF6F00" stroke="#E65100" stroke-width="10"/>
  <text x="830" y="516" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 830, 516)">JUN</text>

  <!-- Title badge -->
  <rect x="112" y="720" width="800" height="100" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="786" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>

  <!-- SORT badge -->
  <rect x="362" y="848" width="300" height="72" rx="28" fill="#FF5722" stroke="#BF360C" stroke-width="12"/>
  <text x="512" y="899" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">SORT</text>
</svg>
