<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1A0A0A"/>
  <!-- Layer 2: 파일 카드 + 자물쇠 (잠긴 상태) -->
  <rect x="100" y="140" width="500" height="580" rx="28" fill="#311B1B"/>
  <text x="350" y="320" font-family="'Segoe UI', sans-serif" font-size="60" fill="#EF9A9A" text-anchor="middle">📄 data.db</text>
  <!-- 자물쇠 (잠긴) -->
  <rect x="270" y="380" width="160" height="160" rx="16" fill="#B71C1C"/>
  <path d="M310,380 Q310,310 350,310 Q390,310 390,380" fill="none" stroke="#B71C1C" stroke-width="32" stroke-linecap="round"/>
  <circle cx="350" cy="460" r="20" fill="white"/>
  <rect x="342" y="460" width="16" height="40" rx="8" fill="white"/>
  <!-- 프로세스 목록 -->
  <rect x="100" y="750" width="500" height="80" rx="16" fill="#1A2A1A"/>
  <text x="350" y="802" font-family="'Consolas', monospace" font-size="44" fill="#69F0AE" text-anchor="middle">⚙ explorer.exe</text>
  <!-- Layer 3: 잠금 해제 버튼 (오른쪽) -->
  <rect x="650" y="480" width="280" height="120" rx="24" fill="#1B5E20"/>
  <text x="790" y="558" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="64" fill="#69F0AE" text-anchor="middle">UNLOCK</text>
  <!-- 화살표 -->
  <line x1="600" y1="540" x2="648" y2="540" stroke="#69F0AE" stroke-width="20" stroke-linecap="round"/>
  <polygon points="640,516 672,540 640,564" fill="#69F0AE"/>
</svg>
