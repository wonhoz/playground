<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softneon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerneon">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Archive box shape (main) -->
  <rect x="80" y="160" width="352" height="280" rx="12" fill="#0e0d01" stroke="#EAB308" stroke-width="3" stroke-opacity="0.8" filter="url(#neon)"/>
  <!-- Box lid -->
  <rect x="70" y="130" width="372" height="50" rx="8" fill="#121100" stroke="#F59E0B" stroke-width="2.5" stroke-opacity="0.9" filter="url(#neon)"/>
  <!-- Lid center highlight -->
  <rect x="200" y="142" width="112" height="26" rx="6" fill="#EAB308" fill-opacity="0.12" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Neon zipper track on box front -->
  <!-- Left zipper teeth -->
  <g filter="url(#softneon)">
    <rect x="218" y="168" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.7"/>
    <rect x="218" y="196" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.65"/>
    <rect x="218" y="224" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.7"/>
    <rect x="218" y="252" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.65"/>
    <rect x="218" y="280" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.7"/>
    <rect x="218" y="308" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.6"/>
    <rect x="218" y="336" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.65"/>
    <rect x="218" y="364" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.6"/>
    <rect x="218" y="392" width="12" height="18" rx="3" fill="#EAB308" fill-opacity="0.55"/>
  </g>

  <!-- Right zipper teeth -->
  <g filter="url(#softneon)">
    <rect x="282" y="168" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.7"/>
    <rect x="282" y="196" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.65"/>
    <rect x="282" y="224" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.7"/>
    <rect x="282" y="252" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.65"/>
    <rect x="282" y="280" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.7"/>
    <rect x="282" y="308" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.6"/>
    <rect x="282" y="336" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.65"/>
    <rect x="282" y="364" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.6"/>
    <rect x="282" y="392" width="12" height="18" rx="3" fill="#FBBF24" fill-opacity="0.55"/>
  </g>

  <!-- Zipper pull (at top, partially open) -->
  <rect x="240" y="155" width="32" height="40" rx="8" fill="#1a1800" stroke="#EAB308" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="248" y1="165" x2="264" y2="165" stroke="#EAB308" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="248" y1="173" x2="264" y2="173" stroke="#EAB308" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="248" y1="181" x2="264" y2="181" stroke="#EAB308" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Pull ring -->
  <circle cx="256" cy="148" r="10" fill="none" stroke="#F59E0B" stroke-width="2.5" filter="url(#softneon)"/>
  <circle cx="256" cy="136" r="5" fill="#EAB308" fill-opacity="0.5" filter="url(#softneon)"/>

  <!-- Open peek through zipper (glow inside) -->
  <rect x="232" y="160" width="48" height="240" fill="#EAB308" fill-opacity="0.05" filter="url(#neon)"/>
  <!-- Content peeking through -->
  <line x1="248" y1="205" x2="264" y2="205" stroke="#EAB308" stroke-width="3" stroke-opacity="0.4" filter="url(#softneon)"/>
  <line x1="248" y1="225" x2="264" y2="225" stroke="#F59E0B" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="248" y1="245" x2="264" y2="245" stroke="#EAB308" stroke-width="3" stroke-opacity="0.4" filter="url(#softneon)"/>

  <!-- Box content (file icons peeking) -->
  <rect x="105" y="220" width="85" height="55" rx="5" fill="#EAB308" fill-opacity="0.08" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="325" y="220" width="85" height="55" rx="5" fill="#FBBF24" fill-opacity="0.08" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="115" y="305" width="65" height="40" rx="4" fill="#EAB308" fill-opacity="0.06" stroke="#EAB308" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="335" y="305" width="65" height="40" rx="4" fill="#FBBF24" fill-opacity="0.06" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Neon label on box -->
  <rect x="100" y="365" width="90" height="45" rx="8" fill="#1a1800" stroke="#EAB308" stroke-width="2" stroke-opacity="0.6" filter="url(#softneon)"/>
  <rect x="112" y="377" width="66" height="10" rx="5" fill="#EAB308" fill-opacity="0.6"/>
  <rect x="112" y="392" width="50" height="8" rx="4" fill="#F59E0B" fill-opacity="0.4"/>
</svg>
