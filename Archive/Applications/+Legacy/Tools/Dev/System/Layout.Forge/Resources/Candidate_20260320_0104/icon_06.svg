<!-- Layout.Forge icon_06: 컴파스 + 사각형 (compass drawing rectangle) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Rectangle being drawn (partial, dashed) -->
  <rect x="220" y="380" width="500" height="340" rx="12" fill="none" stroke="#3949AB" stroke-width="28" stroke-dasharray="36,18"/>
  <!-- Compass (two legs) -->
  <line x1="640" y1="280" x2="720" y2="380" stroke="#5C6BC0" stroke-width="32" stroke-linecap="round"/>
  <line x1="640" y1="280" x2="560" y2="420" stroke="#5C6BC0" stroke-width="32" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="640" cy="280" r="28" fill="#5C6BC0"/>
  <!-- Pencil tip -->
  <circle cx="720" cy="380" r="18" fill="#7986CB"/>
</svg>
