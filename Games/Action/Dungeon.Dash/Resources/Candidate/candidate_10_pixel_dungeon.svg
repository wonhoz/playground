<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0015"/>
      <stop offset="100%" stop-color="#15002A"/>
    </linearGradient>
    <linearGradient id="pixelHeroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel dungeon grid (8x8 pixel tiles, 48px each) -->
  <!-- Wall tiles (dark) -->
  <!-- Row 0 -->
  <rect x="80" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="176" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="224" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="272" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="320" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="368" y="80" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <!-- Row 1 -->
  <rect x="80" y="128" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="128" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/><!-- Floor -->
  <rect x="176" y="128" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="224" y="128" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="272" y="128" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="320" y="128" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="368" y="128" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <!-- Row 2 -->
  <rect x="80" y="176" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="176" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="176" y="176" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <!-- Torch tile -->
  <rect x="224" y="176" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <ellipse cx="248" cy="196" rx="8" ry="12" fill="#F97316" opacity="0.8"/>
  <rect x="244" y="206" width="8" height="10" rx="2" fill="#92400E"/>
  <rect x="320" y="176" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="368" y="176" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <!-- Row 3 -->
  <rect x="80" y="224" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="224" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <!-- Row 4 -->
  <rect x="80" y="272" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="272" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="176" y="272" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="224" y="272" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="272" y="272" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="320" y="272" width="48" height="48" fill="#120920" stroke="#0A0015" stroke-width="1"/>
  <rect x="368" y="272" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <!-- Row 5 -->
  <rect x="80" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="128" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="176" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="224" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="272" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="320" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <rect x="368" y="320" width="48" height="48" fill="#1A0A30" stroke="#0A0015" stroke-width="1"/>
  <!-- Wall decorations (mossy stones) -->
  <circle cx="104" cy="104" r="6" fill="#166534" opacity="0.5"/>
  <circle cx="392" cy="104" r="6" fill="#166534" opacity="0.5"/>
  <!-- Pixel hero (8x8 style) in room -->
  <!-- Standing at center of row2-col2 -->
  <rect x="296" y="192" width="12" height="12" rx="2" fill="#FDE68A"/><!-- head -->
  <rect x="290" y="204" width="24" height="20" rx="2" fill="#4F46E5"/><!-- body -->
  <rect x="288" y="208" width="8" height="12" rx="2" fill="#4F46E5"/><!-- arm L -->
  <rect x="304" y="208" width="8" height="12" rx="2" fill="#D97706"/><!-- sword arm -->
  <rect x="296" y="224" width="10" height="14" rx="2" fill="#1E1B4B"/><!-- leg L -->
  <rect x="306" y="226" width="10" height="12" rx="2" fill="#1E1B4B"/><!-- leg R -->
  <!-- Pixel sword -->
  <rect x="312" y="200" width="4" height="20" rx="1" fill="#E5E7EB"/>
  <!-- Pixel monster (right side row 2-col4) -->
  <rect x="344" y="192" width="14" height="12" rx="2" fill="#7C3AED"/>
  <rect x="342" y="182" width="4" height="8" rx="1" fill="#7C3AED"/><!-- horn L -->
  <rect x="352" y="182" width="4" height="8" rx="1" fill="#7C3AED"/><!-- horn R -->
  <rect x="340" y="204" width="22" height="18" rx="2" fill="#6D28D9"/>
  <circle cx="348" cy="196" r="4" fill="#EF4444"/><!-- eye L -->
  <circle cx="356" cy="196" r="4" fill="#EF4444"/><!-- eye R -->
  <!-- Title bar -->
  <rect x="80" y="382" width="352" height="50" rx="8" fill="#0A0015" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="256" y="413" font-family="monospace" font-size="16" fill="#A855F7" text-anchor="middle" font-weight="bold">DUNGEON DASH</text>
</svg>
