    <circle cx="696" cy="389" r="12" fill="#EEFF88" opacity="0.8"/>
    <!-- 계산기 팝업 내용 -->
    <!-- 디스플레이 -->
    <rect x="370" y="428" width="328" height="60" rx="10" fill="#1A1050"/>
    <rect x="570" y="440" width="110" height="36" rx="6" fill="#CCFF44" opacity="0.7"/>
    <!-- 버튼 그리드 (3x4) -->
    <!-- 행 1 -->
    <rect x="370" y="504" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.8"/>
    <rect x="454" y="504" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.8"/>
    <rect x="538" y="504" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.8"/>
    <rect x="622" y="504" width="76" height="52" rx="10" fill="#88CC00"/>
    <!-- 행 2 -->
    <rect x="370" y="568" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="454" y="568" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="538" y="568" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="622" y="568" width="76" height="52" rx="10" fill="#88CC00"/>
    <!-- 행 3 -->
    <rect x="370" y="632" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="454" y="632" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
