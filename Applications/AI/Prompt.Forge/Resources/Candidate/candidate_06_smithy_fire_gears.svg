<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0800"/>
      <stop offset="100%" stop-color="#200e00"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b87333"/>
      <stop offset="100%" stop-color="#7a4a1a"/>
    </linearGradient>
    <radialGradient id="fireCore" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="forgeFire">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fire background -->
  <ellipse cx="256" cy="440" rx="200" ry="80" fill="url(#fireCore)" filter="url(#forgeFire)"/>
  <!-- Large gear (left) -->
  <g transform="translate(165,240) rotate(15)">
    <circle r="75" fill="url(#gearGrad)" stroke="#c8962a" stroke-width="2"/>
    <circle r="50" fill="#1a0800"/>
    <!-- Gear teeth -->
    <rect x="-10" y="-88" width="20" height="28" rx="4" fill="url(#gearGrad)"/>
    <rect x="-10" y="60" width="20" height="28" rx="4" fill="url(#gearGrad)"/>
    <rect x="60" y="-10" width="28" height="20" rx="4" fill="url(#gearGrad)"/>
    <rect x="-88" y="-10" width="28" height="20" rx="4" fill="url(#gearGrad)"/>
    <rect x="42" y="-72" width="20" height="28" rx="4" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="-62" y="-72" width="20" height="28" rx="4" fill="url(#gearGrad)" transform="rotate(-45)"/>
    <rect x="42" y="44" width="20" height="28" rx="4" fill="url(#gearGrad)" transform="rotate(-45)"/>
    <rect x="-62" y="44" width="20" height="28" rx="4" fill="url(#gearGrad)" transform="rotate(45)"/>
    <circle r="15" fill="#b87333"/>
  </g>
  <!-- Small gear (right) -->
  <g transform="translate(340,200) rotate(-20)">
    <circle r="48" fill="url(#gearGrad)" stroke="#c8962a" stroke-width="2"/>
    <circle r="30" fill="#1a0800"/>
    <rect x="-8" y="-58" width="16" height="20" rx="3" fill="url(#gearGrad)"/>
    <rect x="-8" y="38" width="16" height="20" rx="3" fill="url(#gearGrad)"/>
    <rect x="38" y="-8" width="20" height="16" rx="3" fill="url(#gearGrad)"/>
    <rect x="-58" y="-8" width="20" height="16" rx="3" fill="url(#gearGrad)"/>
    <rect x="26" y="-45" width="16" height="20" rx="3" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="-42" y="-45" width="16" height="20" rx="3" fill="url(#gearGrad)" transform="rotate(-45)"/>
    <circle r="10" fill="#b87333"/>
  </g>
  <!-- Forge fire flames -->
  <path d="M185 400 C195 360 210 380 220 350 C225 370 235 355 240 335 C245 355 252 342 258 360 C264 345 270 362 278 350 C282 368 292 358 298 375 C305 362 312 378 308 400Z" fill="url(#fireCore)" filter="url(#forgeFire)"/>
  <!-- Prompt text sparks -->
  <g filter="url(#forgeFire)" opacity="0.9">
    <line x1="256" y1="135" x2="256" y2="110" stroke="#ffd700" stroke-width="3"/>
    <line x1="220" y1="145" x2="205" y2="125" stroke="#ff8c00" stroke-width="2.5"/>
    <line x1="292" y1="145" x2="307" y2="125" stroke="#ff8c00" stroke-width="2.5"/>
    <line x1="195" y1="175" x2="178" y2="162" stroke="#ffd700" stroke-width="2"/>
    <line x1="318" y1="175" x2="335" y2="162" stroke="#ffd700" stroke-width="2"/>
  </g>
  <!-- Spark particles -->
  <circle cx="256" cy="108" r="5" fill="#ffd700" filter="url(#forgeFire)"/>
  <circle cx="203" cy="122" r="4" fill="#ff8c00" filter="url(#forgeFire)"/>
  <circle cx="309" cy="122" r="4" fill="#ff8c00" filter="url(#forgeFire)"/>
  <circle cx="176" cy="160" r="3" fill="#ffd700" filter="url(#forgeFire)"/>
  <circle cx="337" cy="160" r="3" fill="#ffd700" filter="url(#forgeFire)"/>
</svg>