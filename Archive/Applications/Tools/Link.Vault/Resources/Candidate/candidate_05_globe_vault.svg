<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <radialGradient id="globe" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="256" cy="240" r="160" fill="url(#globe)" stroke="#90caf9" stroke-width="5"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="240" rx="160" ry="50" fill="none" stroke="#e3f2fd" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="256" cy="240" rx="160" ry="110" fill="none" stroke="#e3f2fd" stroke-width="2.5" opacity="0.4"/>
  <!-- Longitude line -->
  <line x1="256" y1="80" x2="256" y2="400" stroke="#e3f2fd" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="256" cy="240" rx="60" ry="160" fill="none" stroke="#e3f2fd" stroke-width="2.5" opacity="0.5"/>
  <!-- Lock overlay at bottom -->
  <rect x="200" y="340" width="112" height="88" rx="16" fill="#1a237e" stroke="#5c6bc0" stroke-width="4"/>
  <path d="M220 352 Q220 316 256 316 Q292 316 292 352" fill="none" stroke="#7986cb" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="376" r="14" fill="#ffd740"/>
  <!-- Pin marker on globe -->
  <circle cx="256" cy="180" r="14" fill="#ff5252"/>
  <line x1="256" y1="180" x2="256" y2="240" stroke="#ff5252" stroke-width="4" stroke-dasharray="6,4"/>
</svg>
