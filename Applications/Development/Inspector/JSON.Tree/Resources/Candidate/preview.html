<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JSON.Tree - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 140px; height: 140px; border-radius: 20px; border: 1px solid #333; background: #111; }
  .item span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>JSON.Tree — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_tree_nodes.svg"><span>01<br>Tree Nodes</span></div>
  <div class="item"><img src="candidate_02_folder_expand.svg"><span>02<br>Folder Expand</span></div>
  <div class="item"><img src="candidate_03_mindmap_json.svg"><span>03<br>Mindmap JSON</span></div>
  <div class="item"><img src="candidate_04_org_chart.svg"><span>04<br>Org Chart</span></div>
  <div class="item"><img src="candidate_05_neon_branches.svg"><span>05<br>Neon Branches</span></div>
  <div class="item"><img src="candidate_06_magnify_inspect.svg"><span>06<br>Magnify Inspect</span></div>
  <div class="item"><img src="candidate_07_layered_depths.svg"><span>07<br>Layered Depths</span></div>
  <div class="item"><img src="candidate_08_path_breadcrumb.svg"><span>08<br>Path Breadcrumb</span></div>
  <div class="item"><img src="candidate_09_circuit_tree.svg"><span>09<br>Circuit Tree</span></div>
  <div class="item"><img src="candidate_10_galaxy_node.svg"><span>10<br>Galaxy Node</span></div>
</div>
</body>
</html>
