<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="compassRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 컴퍼스 외곽 링 -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#compassRing)" stroke-width="4"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#3b1a7a" stroke-width="1.5" stroke-dasharray="8,6"/>
  <!-- 방향 표시 (N S E W) -->
  <text x="256" y="90" font-family="Arial" font-weight="bold" font-size="28" fill="#a78bfa" text-anchor="middle">N</text>
  <text x="256" y="440" font-family="Arial" font-weight="bold" font-size="28" fill="#7c3aed" text-anchor="middle">S</text>
  <text x="432" y="264" font-family="Arial" font-weight="bold" font-size="28" fill="#7c3aed" text-anchor="middle">E</text>
  <text x="80" y="264" font-family="Arial" font-weight="bold" font-size="28" fill="#7c3aed" text-anchor="middle">W</text>
  <!-- 창 배치 화살표들 -->
  <polygon points="256,116 240,156 256,144 272,156" fill="#a78bfa" filter="url(#glow)"/>
  <polygon points="256,396 240,356 256,368 272,356" fill="#7c3aed"/>
  <polygon points="116,256 156,240 144,256 156,272" fill="#7c3aed"/>
  <polygon points="396,256 356,240 368,256 356,272" fill="#7c3aed"/>
  <!-- 중심 -->
  <circle cx="256" cy="256" r="30" fill="url(#centerGlow)"/>
  <circle cx="256" cy="256" r="14" fill="#7c3aed" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <!-- 작은 창 아이콘들 (4방향) -->
  <rect x="218" y="128" width="76" height="52" rx="5" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="218" y="332" width="76" height="52" rx="5" fill="#2d1b69" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="128" y="218" width="52" height="76" rx="5" fill="#2d1b69" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="332" y="218" width="52" height="76" rx="5" fill="#2d1b69" stroke="#5b21b6" stroke-width="1.5"/>
</svg>
