<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#050A10"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Particle storm - various colors and sizes -->
  <g opacity="0.9">
    <!-- Purple/pink particles -->
    <circle cx="256" cy="256" r="16" fill="#E040FB"/>
    <circle cx="220" cy="200" r="10" fill="#E040FB"/>
    <circle cx="292" cy="210" r="8" fill="#CE93D8"/>
    <circle cx="180" cy="256" r="12" fill="#7C4DFF"/>
    <circle cx="336" cy="256" r="10" fill="#7C4DFF"/>
    <!-- Yellow/orange -->
    <circle cx="240" cy="150" r="9" fill="#FFD740"/>
    <circle cx="310" cy="170" r="7" fill="#FFAB40"/>
    <circle cx="170" cy="320" r="8" fill="#FF6D00"/>
    <circle cx="360" cy="300" r="11" fill="#FF6D00"/>
    <!-- Cyan/green -->
    <circle cx="200" cy="340" r="10" fill="#00E5FF"/>
    <circle cx="320" cy="340" r="9" fill="#00E5FF"/>
    <circle cx="256" cy="380" r="14" fill="#69F0AE"/>
    <circle cx="150" cy="200" r="7" fill="#69F0AE"/>
    <circle cx="370" cy="220" r="8" fill="#00BFA5"/>
    <!-- Tiny scattered -->
    <circle cx="130" cy="280" r="5" fill="#FFD740" opacity="0.7"/>
    <circle cx="390" cy="270" r="4" fill="#E040FB" opacity="0.7"/>
    <circle cx="256" cy="120" r="6" fill="#00E5FF" opacity="0.8"/>
    <circle cx="210" cy="420" r="5" fill="#FF6D00" opacity="0.7"/>
    <circle cx="310" cy="410" r="6" fill="#7C4DFF" opacity="0.8"/>
    <circle cx="140" cy="150" r="4" fill="#69F0AE" opacity="0.6"/>
    <circle cx="380" cy="380" r="4" fill="#FFD740" opacity="0.6"/>
  </g>
  <!-- Velocity lines -->
  <g stroke="#E040FB" stroke-width="2" opacity="0.3" stroke-linecap="round">
    <line x1="256" y1="256" x2="220" y2="200"/>
    <line x1="256" y1="256" x2="292" y2="210"/>
    <line x1="256" y1="256" x2="180" y2="256"/>
    <line x1="256" y1="256" x2="200" y2="340"/>
    <line x1="256" y1="256" x2="320" y2="340"/>
    <line x1="256" y1="256" x2="256" y2="380"/>
    <line x1="256" y1="256" x2="336" y2="256"/>
    <line x1="256" y1="256" x2="170" y2="320"/>
    <line x1="256" y1="256" x2="360" y2="300"/>
  </g>
</svg>
