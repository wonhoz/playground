<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050b15"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softneon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerneon">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient glow background -->
  <circle cx="256" cy="256" r="200" fill="#06B6D4" fill-opacity="0.03" filter="url(#outerneon)"/>

  <!-- Pie chart slices (neon style, 3D elevated look) -->

  <!-- Slice 1: System (~35%, cyan) - largest -->
  <path d="M256,256 L256,56 A200,200 0 0,1 440,356 Z" fill="#06B6D4" fill-opacity="0.18"/>
  <path d="M256,256 L256,56 A200,200 0 0,1 440,356 Z" fill="none" stroke="#06B6D4" stroke-width="3" filter="url(#neon)"/>
  <!-- Side face 3D -->
  <path d="M256,256 L256,76 A180,180 0 0,1 420,344 L440,356 A200,200 0 0,0 256,56 Z" fill="#06B6D4" fill-opacity="0.1"/>

  <!-- Slice 2: Media (~25%, blue) -->
  <path d="M256,256 L440,356 A200,200 0 0,1 120,420 Z" fill="#3B82F6" fill-opacity="0.18"/>
  <path d="M256,256 L440,356 A200,200 0 0,1 120,420 Z" fill="none" stroke="#3B82F6" stroke-width="3" filter="url(#neon)"/>

  <!-- Slice 3: Apps (~20%, teal) -->
  <path d="M256,256 L120,420 A200,200 0 0,1 80,160 Z" fill="#0EA5E9" fill-opacity="0.18"/>
  <path d="M256,256 L120,420 A200,200 0 0,1 80,160 Z" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#softneon)"/>

  <!-- Slice 4: Free (~20%, light cyan) -->
  <path d="M256,256 L80,160 A200,200 0 0,1 256,56 Z" fill="#7DD3FC" fill-opacity="0.12"/>
  <path d="M256,256 L80,160 A200,200 0 0,1 256,56 Z" fill="none" stroke="#7DD3FC" stroke-width="2.5" filter="url(#softneon)"/>

  <!-- Inner circle (donut hole) - dark with neon border -->
  <circle cx="256" cy="256" r="80" fill="#030508"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#06B6D4" stroke-width="3" filter="url(#neon)"/>
  <circle cx="256" cy="256" r="75" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Center disk icon -->
  <circle cx="256" cy="256" r="40" fill="#061420"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="15" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#softneon)"/>
  <circle cx="256" cy="256" r="8" fill="#06B6D4" fill-opacity="0.6"/>
  <!-- Radial lines (disk tracks) -->
  <line x1="256" y1="218" x2="256" y2="232" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="256" y1="280" x2="256" y2="294" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="218" y1="256" x2="232" y2="256" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="280" y1="256" x2="294" y2="256" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Neon edge dots at slice boundaries -->
  <circle cx="256" cy="56" r="5" fill="#7DD3FC" filter="url(#softneon)"/>
  <circle cx="440" cy="356" r="5" fill="#06B6D4" filter="url(#neon)"/>
  <circle cx="120" cy="420" r="5" fill="#3B82F6" filter="url(#softneon)"/>
  <circle cx="80" cy="160" r="5" fill="#0EA5E9" filter="url(#softneon)"/>

  <!-- Legend dots -->
  <circle cx="360" cy="95" r="5" fill="#06B6D4" filter="url(#softneon)"/>
  <circle cx="360" cy="118" r="5" fill="#3B82F6" filter="url(#softneon)"/>
  <circle cx="360" cy="141" r="5" fill="#0EA5E9" filter="url(#softneon)"/>
  <circle cx="360" cy="164" r="5" fill="#7DD3FC" filter="url(#softneon)"/>
  <rect x="374" y="88" width="60" height="8" rx="4" fill="#06B6D4" fill-opacity="0.5"/>
  <rect x="374" y="111" width="45" height="8" rx="4" fill="#3B82F6" fill-opacity="0.5"/>
  <rect x="374" y="134" width="50" height="8" rx="4" fill="#0EA5E9" fill-opacity="0.5"/>
  <rect x="374" y="157" width="50" height="8" rx="4" fill="#7DD3FC" fill-opacity="0.4"/>
</svg>
