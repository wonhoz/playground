<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#0f0f2e"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#004477"/>
    </radialGradient>
    <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001133"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M80,256 Q170,130 256,130 Q342,130 432,256 Q342,382 256,382 Q170,382 80,256 Z" fill="#0a1628" stroke="#00d4ff" stroke-width="3"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="85" fill="url(#iris)"/>
  <!-- Network ring pattern in iris -->
  <circle cx="256" cy="256" r="65" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="30" fill="url(#pupil)"/>
  <!-- Highlight -->
  <circle cx="272" cy="240" r="10" fill="#ffffff" opacity="0.6"/>
  <!-- Network data streams around eye -->
  <text x="85" y="252" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.7">:80</text>
  <text x="85" y="266" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.7">:443</text>
  <text x="400" y="252" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.7">:22</text>
  <text x="400" y="266" font-family="monospace" font-size="10" fill="#f85149" opacity="0.9">:3389</text>
  <!-- Top/bottom info -->
  <text x="256" y="115" text-anchor="middle" font-family="monospace" font-size="14" fill="#00d4ff" font-weight="bold">PORT.WATCH</text>
  <text x="256" y="410" text-anchor="middle" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.7">MONITORING ACTIVE</text>
  <!-- Eyelid lines -->
  <path d="M80,256 Q170,130 256,130 Q342,130 432,256" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
</svg>
