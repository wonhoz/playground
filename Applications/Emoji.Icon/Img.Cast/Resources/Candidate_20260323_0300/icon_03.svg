<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 드래그&드롭 손+이미지 | 실루엣/캐릭터 | #F0FDF4 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#F0FDF4"/>
  <!-- Layer 2: Drop zone -->
  <rect x="180" y="540" width="664" height="280" rx="24" fill="none" stroke="#16A34A" stroke-width="4" stroke-dasharray="20,12"/>
  <text x="512" y="640" font-family="Arial,sans-serif" font-size="28" fill="#15803D" text-anchor="middle">여기에 파일을 끌어다 놓으세요</text>
  <text x="512" y="680" font-family="Arial,sans-serif" font-size="20" fill="#4ADE80" text-anchor="middle">SVG / PNG / JPG</text>
  <!-- Drop zone icon -->
  <path d="M512 710 L512 760" stroke="#4ADE80" stroke-width="4" stroke-linecap="round"/>
  <path d="M480 732 L512 760 L544 732" fill="none" stroke="#4ADE80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Layer 2: Hand silhouette holding file -->
  <!-- Palm -->
  <path d="M380 200 Q360 280 370 380 Q380 460 420 500 L580 500 Q650 460 660 380 Q670 280 640 200 Q610 160 580 220 Q560 180 530 200 Q510 160 490 200 Q470 160 450 200 Q420 160 380 200 Z" fill="#FEF3C7" stroke="#F59E0B" stroke-width="4"/>
  <!-- Fingers outline -->
  <path d="M380 200 Q360 140 390 120 Q420 100 430 160" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <path d="M450 200 Q440 130 470 110 Q500 90 500 160" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <path d="M500 200 Q490 130 520 110 Q550 90 550 160" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <path d="M540 220 Q540 140 570 120 Q600 100 610 160" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <!-- File being dragged (under hand) -->
  <rect x="430" y="350" width="160" height="200" rx="10" fill="#3B82F6" opacity="0.8" transform="rotate(8 510 450)"/>
  <text x="510" y="460" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" transform="rotate(8 510 460)">image.svg</text>
  <!-- Layer 3: Arrow indicator -->
  <path d="M512 500 L512 530" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
  <polygon points="490,528 512,552 534,528" fill="#F59E0B"/>
</svg>
