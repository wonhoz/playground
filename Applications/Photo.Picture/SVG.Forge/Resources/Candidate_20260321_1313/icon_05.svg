<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 - 진한 다크 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: 편집기 UI 레이아웃 -->
  <!-- 메뉴바 -->
  <rect x="130" y="160" width="764" height="48" rx="10" fill="#0F172A"/>
  <text x="160" y="192" font-family="Segoe UI,sans-serif" font-size="22" fill="#64748B">File  Edit  View  Export</text>
  <!-- 메뉴 오른쪽 줌 -->
  <text x="760" y="192" font-family="Segoe UI,sans-serif" font-size="22" fill="#475569">100%  🔍</text>

  <!-- 도구바 (왼쪽 세로) -->
  <rect x="130" y="218" width="68" height="528" rx="10" fill="#0F172A"/>
  <!-- 도구 버튼들 -->
  <!-- Select 도구 -->
  <rect x="146" y="234" width="36" height="36" rx="7" fill="#3B82F6"/>
  <text x="164" y="257" text-anchor="middle" font-family="serif" font-size="20" fill="white">↖</text>
  <!-- Rect 도구 -->
  <rect x="146" y="282" width="36" height="36" rx="7" fill="#1E293B"/>
  <rect x="152" y="288" width="24" height="24" rx="4" fill="none" stroke="#64748B" stroke-width="3"/>
  <!-- Ellipse 도구 -->
  <rect x="146" y="330" width="36" height="36" rx="7" fill="#1E293B"/>
  <ellipse cx="164" cy="348" rx="12" ry="9" fill="none" stroke="#64748B" stroke-width="3"/>
  <!-- Line 도구 -->
  <rect x="146" y="378" width="36" height="36" rx="7" fill="#1E293B"/>
  <line x1="154" y1="394" x2="178" y2="406" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <!-- Text 도구 -->
  <rect x="146" y="426" width="36" height="36" rx="7" fill="#1E293B"/>
  <text x="164" y="450" text-anchor="middle" font-family="serif" font-size="22" fill="#64748B">T</text>

  <!-- 메인 캔버스 영역 -->
  <rect x="208" y="218" width="534" height="528" rx="6" fill="#1E293B"/>
  <!-- 캔버스 내 그리드 (미세) -->
  <g opacity="0.06">
    <line x1="248" y1="218" x2="248" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="328" y1="218" x2="328" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="408" y1="218" x2="408" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="488" y1="218" x2="488" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="568" y1="218" x2="568" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="648" y1="218" x2="648" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="728" y1="218" x2="728" y2="746" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="298" x2="742" y2="298" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="378" x2="742" y2="378" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="458" x2="742" y2="458" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="538" x2="742" y2="538" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="618" x2="742" y2="618" stroke="#94A3B8" stroke-width="1"/>
    <line x1="208" y1="698" x2="742" y2="698" stroke="#94A3B8" stroke-width="1"/>
  </g>
  <!-- 캔버스 안 도형들 -->
  <rect x="248" y="258" width="200" height="140" rx="8" fill="#6366F1" opacity="0.85"/>
  <ellipse cx="580" cy="430" rx="110" ry="80" fill="#F59E0B" opacity="0.85"/>
  <line x1="260" y1="560" x2="500" y2="660" stroke="#F472B6" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
  <!-- 선택 박스 (사각형 선택됨) -->
  <rect x="240" y="250" width="216" height="156" rx="2" fill="none"
        stroke="#3B82F6" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- 오른쪽 패널 (속성/레이어) -->
  <rect x="752" y="218" width="142" height="528" rx="6" fill="#0F172A"/>
  <text x="762" y="248" font-family="Segoe UI,sans-serif" font-size="18" fill="#475569">Properties</text>
  <line x1="752" y1="258" x2="894" y2="258" stroke="#1E293B" stroke-width="2"/>
  <!-- 속성 값들 -->
  <text x="762" y="283" font-family="Consolas,monospace" font-size="16" fill="#64748B">X: 248</text>
  <text x="762" y="303" font-family="Consolas,monospace" font-size="16" fill="#64748B">Y: 258</text>
  <text x="762" y="323" font-family="Consolas,monospace" font-size="16" fill="#64748B">W: 200</text>
  <text x="762" y="343" font-family="Consolas,monospace" font-size="16" fill="#64748B">H: 140</text>
  <!-- Fill 색상 스왓치 -->
  <text x="762" y="375" font-family="Segoe UI,sans-serif" font-size="16" fill="#64748B">Fill</text>
  <rect x="800" y="360" width="28" height="20" rx="4" fill="#6366F1"/>
  <!-- 레이어 섹션 -->
  <line x1="752" y1="400" x2="894" y2="400" stroke="#1E293B" stroke-width="2"/>
  <text x="762" y="422" font-family="Segoe UI,sans-serif" font-size="18" fill="#475569">Layers</text>
  <rect x="762" y="432" width="120" height="32" rx="6" fill="#1E3A5F"/>
  <text x="772" y="453" font-family="Segoe UI,sans-serif" font-size="15" fill="#93C5FD">Layer 1</text>
  <rect x="762" y="472" width="120" height="28" rx="6" fill="#1E293B"/>
  <text x="772" y="490" font-family="Segoe UI,sans-serif" font-size="15" fill="#475569">Layer 2</text>

  <!-- Layer 3: 상태바 -->
  <rect x="130" y="756" width="764" height="52" rx="10" fill="#0F172A"/>
  <text x="160" y="787" font-family="Segoe UI,sans-serif" font-size="20" fill="#475569">SVG.Forge</text>
  <text x="550" y="787" font-family="Segoe UI,sans-serif" font-size="20" fill="#64748B">Rect 1 선택됨</text>
  <text x="800" y="787" font-family="Segoe UI,sans-serif" font-size="20" fill="#334155">100%</text>
</svg>
