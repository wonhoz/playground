<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001520"/>
      <stop offset="100%" stop-color="#002a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00DDFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00DDFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44EEFF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Network edges -->
  <line x1="256" y1="256" x2="140" y2="160" stroke="#00DDFF" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="380" y2="160" stroke="#00DDFF" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="120" y2="320" stroke="#00DDFF" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="400" y2="340" stroke="#00DDFF" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="420" stroke="#00DDFF" stroke-width="2" opacity="0.4"/>
  <line x1="140" y1="160" x2="380" y2="160" stroke="#00DDFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="120" y1="320" x2="400" y2="340" stroke="#00DDFF" stroke-width="1.5" opacity="0.25"/>
  <!-- Network nodes -->
  <circle cx="256" cy="256" r="24" fill="url(#node)"/>
  <text x="256" y="263" font-family="monospace" font-size="11" fill="#001520" text-anchor="middle" font-weight="bold">SYS</text>
  <circle cx="140" cy="160" r="16" fill="url(#node)" opacity="0.85"/>
  <text x="140" y="165" font-family="monospace" font-size="9" fill="#001520" text-anchor="middle">DRV</text>
  <circle cx="380" cy="160" r="16" fill="url(#node)" opacity="0.85"/>
  <text x="380" y="165" font-family="monospace" font-size="9" fill="#001520" text-anchor="middle">SVC</text>
  <circle cx="120" cy="320" r="14" fill="url(#node)" opacity="0.75"/>
  <text x="120" y="325" font-family="monospace" font-size="9" fill="#001520" text-anchor="middle">NET</text>
  <circle cx="400" cy="340" r="14" fill="url(#node)" opacity="0.75"/>
  <text x="400" y="345" font-family="monospace" font-size="9" fill="#001520" text-anchor="middle">UI</text>
  <circle cx="256" cy="420" r="14" fill="url(#node)" opacity="0.75"/>
  <text x="256" y="425" font-family="monospace" font-size="9" fill="#001520" text-anchor="middle">LOG</text>
  <!-- Boot arrow -->
  <polygon points="256,68 280,100 232,100" fill="#44EEFF" opacity="0.8"/>
  <line x1="256" y1="100" x2="256" y2="232" stroke="#44EEFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
</svg>