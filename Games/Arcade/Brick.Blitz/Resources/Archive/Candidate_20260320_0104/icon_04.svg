<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- Brick wall rows -->
  <rect x="140" y="600" width="744" height="80" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="140" y="510" width="744" height="80" rx="8" fill="#1A237E" opacity="0.75"/>
  <rect x="140" y="420" width="744" height="80" rx="8" fill="#1A237E" opacity="0.65"/>
  <!-- Brick mortar lines -->
  <line x1="280" y1="600" x2="280" y2="680" stroke="#050010" stroke-width="8"/>
  <line x1="460" y1="600" x2="460" y2="680" stroke="#050010" stroke-width="8"/>
  <line x1="640" y1="600" x2="640" y2="680" stroke="#050010" stroke-width="8"/>
  <line x1="360" y1="510" x2="360" y2="590" stroke="#050010" stroke-width="8"/>
  <line x1="560" y1="510" x2="560" y2="590" stroke="#050010" stroke-width="8"/>
  <line x1="740" y1="510" x2="740" y2="590" stroke="#050010" stroke-width="8"/>
  <line x1="280" y1="420" x2="280" y2="500" stroke="#050010" stroke-width="8"/>
  <line x1="460" y1="420" x2="460" y2="500" stroke="#050010" stroke-width="8"/>
  <line x1="640" y1="420" x2="640" y2="500" stroke="#050010" stroke-width="8"/>
  <!-- Lightning bolt (blitz) -->
  <polygon points="580,140 440,460 530,460 420,820 700,380 580,380 680,140"
    fill="#5C6BC0" opacity="0.95"/>
  <polygon points="580,140 440,460 530,460 420,820 700,380 580,380 680,140"
    fill="none" stroke="#9FA8DA" stroke-width="10" opacity="0.6"/>
  <!-- Impact glow -->
  <ellipse cx="512" cy="460" rx="80" ry="24" fill="#5C6BC0" opacity="0.4"/>
</svg>
