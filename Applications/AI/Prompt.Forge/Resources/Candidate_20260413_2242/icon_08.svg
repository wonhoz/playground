<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- Mold / casting frame (outer rectangle with cutout) -->
  <rect x="180" y="188" width="664" height="400" rx="24" fill="#78909C" stroke="#455A64" stroke-width="16"/>
  <!-- Mold inner space (where prompt is poured) -->
  <rect x="220" y="228" width="584" height="320" rx="18" fill="#FFFFFF" stroke="#455A64" stroke-width="12"/>
  <!-- Prompt "cast" filling the mold — text blocks representing prompt structure -->
  <rect x="248" y="258" width="144" height="54" rx="16" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="320" y="296" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">{{role}}</text>
  <rect x="410" y="258" width="374" height="22" rx="11" fill="#90A4AE" opacity="0.6"/>
  <rect x="248" y="330" width="536" height="18" rx="9" fill="#B0BEC5" opacity="0.6"/>
  <rect x="248" y="362" width="420" height="18" rx="9" fill="#B0BEC5" opacity="0.5"/>
  <!-- Second variable block -->
  <rect x="248" y="400" width="174" height="54" rx="16" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10"/>
  <text x="335" y="438" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">{{task}}</text>
  <rect x="440" y="400" width="344" height="22" rx="11" fill="#90A4AE" opacity="0.5"/>
  <rect x="440" y="436" width="300" height="18" rx="9" fill="#B0BEC5" opacity="0.4"/>
  <!-- Mold bolts (corner details) -->
  <circle cx="206" cy="214" r="16" fill="#455A64" stroke="#263238" stroke-width="10"/>
  <circle cx="818" cy="214" r="16" fill="#455A64" stroke="#263238" stroke-width="10"/>
  <circle cx="206" cy="562" r="16" fill="#455A64" stroke="#263238" stroke-width="10"/>
  <circle cx="818" cy="562" r="16" fill="#455A64" stroke="#263238" stroke-width="10"/>
  <!-- BUILD badge -->
  <rect x="236" y="748" width="552" height="116" rx="36" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">BUILD</text>
</svg>
