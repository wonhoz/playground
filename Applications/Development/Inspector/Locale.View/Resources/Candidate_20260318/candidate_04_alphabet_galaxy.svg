<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000008"/>
      <stop offset="100%" stop-color="#000012"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#core)"/>
  <!-- Spiral arms with language scripts as stars -->
  <!-- Arm 1 -->
  <path d="M256,256 Q290,220 340,180 Q380,148 420,130" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
  <!-- Arm 2 -->
  <path d="M256,256 Q220,290 180,340 Q148,380 130,420" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
  <!-- Arm 3 -->
  <path d="M256,256 Q292,290 340,330 Q380,368 420,390" fill="none" stroke="#D97706" stroke-width="1" opacity="0.2"/>
  <!-- Arm 4 -->
  <path d="M256,256 Q218,220 170,180 Q130,148 90,130" fill="none" stroke="#D97706" stroke-width="1" opacity="0.2"/>
  <!-- Language script "stars" scattered in spiral -->
  <text x="360" y="165" font-family="serif" font-size="16" fill="#FDE68A" opacity="0.9">A</text>
  <text x="406" y="132" font-family="serif" font-size="12" fill="#F59E0B" opacity="0.7">B</text>
  <text x="300" y="200" font-family="serif" font-size="14" fill="#FDE68A" opacity="0.8">あ</text>
  <text x="340" y="210" font-family="serif" font-size="12" fill="#D97706" opacity="0.7">い</text>
  <text x="390" y="220" font-family="serif" font-size="11" fill="#F59E0B" opacity="0.6">う</text>
  <text x="150" y="345" font-family="serif" font-size="15" fill="#FDE68A" opacity="0.9">가</text>
  <text x="118" y="388" font-family="serif" font-size="12" fill="#F59E0B" opacity="0.7">나</text>
  <text x="200" y="310" font-family="serif" font-size="13" fill="#FDE68A" opacity="0.8">α</text>
  <text x="170" y="290" font-family="serif" font-size="12" fill="#D97706" opacity="0.7">β</text>
  <text x="345" y="340" font-family="serif" font-size="15" fill="#FDE68A" opacity="0.85">語</text>
  <text x="390" y="375" font-family="serif" font-size="12" fill="#F59E0B" opacity="0.7">字</text>
  <text x="155" y="178" font-family="serif" font-size="14" fill="#FDE68A" opacity="0.85">Я</text>
  <text x="108" y="145" font-family="serif" font-size="12" fill="#F59E0B" opacity="0.7">Б</text>
  <text x="200" y="210" font-family="serif" font-size="13" fill="#FDE68A" opacity="0.8">ก</text>
  <text x="170" y="225" font-family="serif" font-size="12" fill="#D97706" opacity="0.7">ข</text>
  <!-- Near-center scripts (medium brightness) -->
  <text x="280" y="230" font-family="serif" font-size="18" fill="#FEF3C7" opacity="0.7">ع</text>
  <text x="224" y="288" font-family="serif" font-size="18" fill="#FDE68A" opacity="0.7">ह</text>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="20" fill="#F59E0B" opacity="0.3"/>
  <circle cx="256" cy="256" r="8" fill="#FDE68A" opacity="0.8"/>
  <text x="256" y="260" text-anchor="middle" font-family="serif" font-size="10" fill="#0a0008">Aa</text>
</svg>
