<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2838"/>
      <stop offset="100%" style="stop-color:#2A475E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor outline -->
  <rect x="70" y="80" width="372" height="280" rx="16" fill="none" stroke="#4DD0E1" stroke-width="5"/>
  <rect x="70" y="80" width="372" height="30" rx="16" fill="#4DD0E1" opacity="0.2"/>
  <!-- 3 circles for window controls -->
  <circle cx="103" cy="95" r="7" fill="#FF5252"/>
  <circle cx="128" cy="95" r="7" fill="#FFD740"/>
  <circle cx="153" cy="95" r="7" fill="#69F0AE"/>
  <!-- Layout panes inside monitor -->
  <rect x="90" y="125" width="130" height="100" rx="8" fill="#4DD0E1" opacity="0.15" stroke="#4DD0E1" stroke-width="2"/>
  <rect x="235" y="125" width="90" height="100" rx="8" fill="#4DD0E1" opacity="0.15" stroke="#4DD0E1" stroke-width="2"/>
  <rect x="340" y="125" width="85" height="100" rx="8" fill="#4DD0E1" opacity="0.15" stroke="#4DD0E1" stroke-width="2"/>
  <rect x="90" y="238" width="335" height="105" rx="8" fill="#4DD0E1" opacity="0.1" stroke="#4DD0E1" stroke-width="2"/>
  <!-- Stand -->
  <rect x="220" y="360" width="72" height="40" rx="4" fill="#4DD0E1" opacity="0.4"/>
  <rect x="176" y="400" width="160" height="16" rx="8" fill="#4DD0E1" opacity="0.5"/>
  <!-- Restore arrow -->
  <path d="M210 455 Q256 425 302 455" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <polygon points="302,441 302,469 322,455" fill="#66BB6A"/>
</svg>
