<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- crossword grid -->
  <g fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9">
    <rect x="80" y="80" width="352" height="352" rx="8"/>
    <!-- vertical lines -->
    <line x1="168" y1="80" x2="168" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="344" y1="80" x2="344" y2="432"/>
    <!-- horizontal lines -->
    <line x1="80" y1="168" x2="432" y2="168"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="344" x2="432" y2="344"/>
  </g>
  <!-- black cells -->
  <rect x="80" y="80" width="88" height="88" rx="4" fill="#0a2540"/>
  <rect x="344" y="256" width="88" height="88" rx="4" fill="#0a2540"/>
  <rect x="256" y="344" width="88" height="88" rx="4" fill="#0a2540"/>
  <!-- letters -->
  <text x="212" y="148" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="300" y="148" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffe066" text-anchor="middle" dominant-baseline="central">R</text>
  <text x="388" y="148" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">T</text>
  <text x="124" y="212" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffe066" text-anchor="middle" dominant-baseline="central">W</text>
  <text x="212" y="212" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">O</text>
  <text x="124" y="300" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">R</text>
  <text x="212" y="300" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">D</text>
</svg>
