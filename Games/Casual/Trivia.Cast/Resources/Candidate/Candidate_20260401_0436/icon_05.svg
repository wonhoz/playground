<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Trophy cup -->
  <!-- Trophy body -->
  <path d="M 312 200 L 712 200 L 680 520 Q 660 620 512 640 Q 364 620 344 520 Z" fill="url(#trophy)" stroke="#FF8F00" stroke-width="12"/>
  <!-- Trophy handles -->
  <path d="M 312 200 Q 200 200 200 340 Q 200 440 312 440" fill="none" stroke="url(#trophy)" stroke-width="48" stroke-linecap="round"/>
  <path d="M 712 200 Q 824 200 824 340 Q 824 440 712 440" fill="none" stroke="url(#trophy)" stroke-width="48" stroke-linecap="round"/>
  <!-- Trophy base stem -->
  <rect x="444" y="640" width="136" height="80" rx="8" fill="#FF8F00"/>
  <!-- Trophy base plate -->
  <rect x="340" y="718" width="344" height="60" rx="14" fill="#FF8F00" stroke="#F57F17" stroke-width="8"/>
  <!-- Layer 3: Score inside trophy -->
  <text x="512" y="400" text-anchor="middle" dominant-baseline="middle" font-size="140" font-family="Georgia,serif" font-weight="bold" fill="#F57F17">1st</text>
  <!-- Stars above trophy -->
  <text x="312" y="170" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI Emoji,Arial" fill="#FFF9C4">★</text>
  <text x="512" y="136" text-anchor="middle" dominant-baseline="middle" font-size="100" font-family="Segoe UI Emoji,Arial" fill="white">★</text>
  <text x="712" y="170" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI Emoji,Arial" fill="#FFF9C4">★</text>
  <!-- Score on base -->
  <text x="512" y="750" text-anchor="middle" dominant-baseline="middle" font-size="60" font-family="Segoe UI,Arial" font-weight="bold" fill="#FFF9C4">TOP SCORE</text>
  <!-- Bottom trivia text -->
  <text x="512" y="900" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial" font-weight="bold" fill="white" opacity="0.85">TRIVIA</text>
</svg>
