<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 앰버 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg5)"/>
  <!-- Layer 2: 큰 QR 파인더 패턴 3개 (흰색) -->
  <!-- 파인더 1 — 좌상 -->
  <rect x="108" y="108" width="252" height="252" rx="18" fill="white"/>
  <rect x="143" y="143" width="182" height="182" rx="10" fill="#F57F17"/>
  <rect x="179" y="179" width="110" height="110" rx="8" fill="white"/>
  <!-- 파인더 2 — 우상 -->
  <rect x="664" y="108" width="252" height="252" rx="18" fill="white"/>
  <rect x="699" y="143" width="182" height="182" rx="10" fill="#F57F17"/>
  <rect x="735" y="179" width="110" height="110" rx="8" fill="white"/>
  <!-- 파인더 3 — 좌하 -->
  <rect x="108" y="664" width="252" height="252" rx="18" fill="white"/>
  <rect x="143" y="699" width="182" height="182" rx="10" fill="#F57F17"/>
  <rect x="179" y="735" width="110" height="110" rx="8" fill="white"/>
  <!-- Layer 3: 중앙 "QR" 텍스트 (크고 임팩트 있게) -->
  <text x="512" y="630" font-family="Arial Black, sans-serif" font-size="340" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.95">QR</text>
  <!-- 작은 데이터 모듈 힌트 (우하) -->
  <rect x="668" y="668" width="72" height="72" rx="10" fill="white" opacity="0.7"/>
  <rect x="752" y="668" width="72" height="72" rx="10" fill="white" opacity="0.4"/>
  <rect x="668" y="752" width="72" height="72" rx="10" fill="white" opacity="0.4"/>
  <rect x="752" y="752" width="72" height="72" rx="10" fill="white" opacity="0.7"/>
</svg>
