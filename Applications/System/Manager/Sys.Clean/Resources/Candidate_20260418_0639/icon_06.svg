    <linearGradient id="gear06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 큰 기어 (배경) -->
  <!-- 기어 이빨 (바깥 원) -->
  <circle cx="512" cy="460" r="220" fill="url(#gear06)"/>
  <!-- 기어 이빨 돌출 (8개) -->
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B"/>
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(45 512 460)"/>
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(90 512 460)"/>
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(135 512 460)"/>
