<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: ID3 tag card with edit pencil -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0F0B1A"/>
  <!-- Tag card -->
  <rect x="160" y="240" width="580" height="440" rx="28" fill="#1A1030" stroke="#7C4DFF" stroke-width="24"/>
  <!-- Album art placeholder -->
  <rect x="200" y="285" width="160" height="160" rx="16" fill="#311B92"/>
  <!-- Music note in art -->
  <rect x="264" y="308" width="22" height="88" rx="6" fill="#7C4DFF"/>
  <ellipse cx="256" cy="396" rx="28" ry="20" fill="#7C4DFF" transform="rotate(-12, 256, 396)"/>
  <path d="M286 308 L330 295 L330 318 L286 331 Z" fill="#7C4DFF"/>
  <!-- Metadata fields -->
  <!-- Title -->
  <rect x="390" y="300" width="300" height="20" rx="10" fill="#7C4DFF" opacity="0.9"/>
  <!-- Artist -->
  <rect x="390" y="340" width="240" height="16" rx="8" fill="#7C4DFF" opacity="0.65"/>
  <!-- Album -->
  <rect x="390" y="376" width="260" height="16" rx="8" fill="#7C4DFF" opacity="0.65"/>
  <!-- Year -->
  <rect x="390" y="412" width="120" height="16" rx="8" fill="#7C4DFF" opacity="0.5"/>
  <!-- Horizontal rule -->
  <rect x="200" y="468" width="500" height="4" rx="2" fill="#7C4DFF" opacity="0.3"/>
  <!-- More fields -->
  <rect x="200" y="498" width="440" height="16" rx="8" fill="#7C4DFF" opacity="0.4"/>
  <rect x="200" y="530" width="380" height="16" rx="8" fill="#7C4DFF" opacity="0.3"/>
  <rect x="200" y="562" width="400" height="16" rx="8" fill="#7C4DFF" opacity="0.3"/>
  <!-- Pencil edit tool -->
  <path d="M700 620 L820 500 L870 550 L750 670 Z" fill="#B39DDB"/>
  <path d="M820 500 L848 472 Q862 458 876 472 L892 488 Q906 502 892 516 L870 550 Z" fill="#7C4DFF"/>
  <path d="M700 620 L680 700 L760 680 Z" fill="#B39DDB" opacity="0.7"/>
</svg>
