<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000808"/>
      <stop offset="100%" style="stop-color:#080008"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- X-shaped dual laser cut -->
  <line x1="80" y1="80" x2="432" y2="432" stroke="#00ff88" stroke-width="4" filter="url(#laserGlow)"/>
  <line x1="80" y1="80" x2="432" y2="432" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="432" y1="80" x2="80" y2="432" stroke="#00ff44" stroke-width="4" filter="url(#laserGlow)"/>
  <line x1="432" y1="80" x2="80" y2="432" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <!-- Center flash -->
  <circle cx="256" cy="256" r="20" fill="#ffffff" filter="url(#laserGlow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="10" fill="#00ff88"/>
  <!-- 4 neon object quadrants -->
  <!-- Top fragment -->
  <path d="M256 256 L170 170 Q256 120 342 170 Z" fill="none" stroke="#00ccff" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(0,-20)"/>
  <!-- Right fragment -->
  <path d="M256 256 L342 170 Q392 256 342 342 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(20,0)"/>
  <!-- Bottom fragment -->
  <path d="M256 256 L342 342 Q256 392 170 342 Z" fill="none" stroke="#00ccff" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(0,20)"/>
  <!-- Left fragment -->
  <path d="M256 256 L170 342 Q120 256 170 170 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(-20,0)"/>
  <!-- Scattered particles -->
  <circle cx="200" cy="200" r="3" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="310" cy="200" r="3" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="200" cy="310" r="3" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="310" cy="310" r="3" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="180" cy="180" r="2" fill="#00ccff" filter="url(#glow)"/>
  <circle cx="332" cy="332" r="2" fill="#00ccff" filter="url(#glow)"/>
</svg>