<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#1B5E20"/>

  <!-- Chalkboard -->
  <rect x="195" y="195" width="634" height="520" rx="22" fill="#2E7D32" stroke="#795548" stroke-width="20"/>
  <!-- Chalkboard inner frame -->
  <rect x="215" y="215" width="594" height="480" rx="12" fill="none" stroke="#A5D6A7" stroke-width="4" opacity="0.5"/>

  <!-- Chalk continent lines (rough, white) -->
  <!-- North America chalk -->
  <path d="M235,280 Q255,262 278,268 Q300,260 315,275 Q330,292 324,320 Q338,345 326,372 Q310,402 288,420 Q262,438 240,425 Q218,412 210,385 Q200,355 208,325 Q200,298 235,283 Z" fill="none" stroke="#E8F5E9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
  <!-- Europe chalk -->
  <path d="M420,252 Q438,240 458,244 Q476,240 488,254 Q500,268 495,288 Q504,305 494,322 Q480,338 462,342 Q442,346 426,330 Q408,315 406,292 Q403,270 420,256 Z" fill="none" stroke="#E8F5E9" stroke-width="7" stroke-linecap="round" opacity="0.88"/>
  <!-- Africa chalk -->
  <path d="M425,352 Q448,340 470,348 Q494,358 502,384 Q514,416 508,452 Q502,490 485,515 Q465,535 442,540 Q418,543 402,525 Q382,505 380,470 Q370,433 383,396 Q392,365 425,356 Z" fill="none" stroke="#E8F5E9" stroke-width="7" stroke-linecap="round" opacity="0.88"/>
  <!-- Asia chalk -->
  <path d="M510,235 Q548,222 600,226 Q652,230 684,248 Q716,266 720,294 Q725,324 706,345 Q686,364 652,370 Q614,376 580,358 Q546,342 522,315 Q500,290 498,262 Q497,244 510,240 Z" fill="none" stroke="#E8F5E9" stroke-width="7" stroke-linecap="round" opacity="0.88"/>
  <!-- Australia chalk -->
  <path d="M640,430 Q664,420 692,424 Q720,428 732,448 Q743,468 735,492 Q724,512 700,520 Q674,528 652,514 Q628,500 622,476 Q615,452 633,436 Z" fill="none" stroke="#E8F5E9" stroke-width="7" stroke-linecap="round" opacity="0.88"/>

  <!-- Chalk dust dots -->
  <circle cx="610" cy="510" r="5" fill="#E8F5E9" opacity="0.5"/>
  <circle cx="625" cy="520" r="3" fill="#E8F5E9" opacity="0.4"/>
  <circle cx="598" cy="525" r="4" fill="#E8F5E9" opacity="0.45"/>
  <circle cx="280" cy="490" r="4" fill="#E8F5E9" opacity="0.4"/>
  <circle cx="295" cy="505" r="5" fill="#E8F5E9" opacity="0.35"/>
  <circle cx="740" cy="355" r="3" fill="#E8F5E9" opacity="0.4"/>

  <!-- BIG chalk "?" -->
  <text x="512" y="520" font-size="260" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.18">?</text>

  <!-- Chalk tray at bottom of board -->
  <rect x="195" y="715" width="634" height="35" rx="8" fill="#8D6E63"/>
  <!-- Chalk pieces in tray -->
  <rect x="240" y="721" width="55" height="22" rx="6" fill="#ECEFF1"/>
  <rect x="310" y="721" width="45" height="22" rx="6" fill="#FFCCBC"/>
  <rect x="368" y="721" width="50" height="22" rx="6" fill="#ECEFF1"/>

  <!-- Label below -->
  <text x="512" y="870" font-size="95" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#A5D6A7">세계 지리</text>
</svg>
