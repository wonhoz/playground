<!-- Layout.Forge icon_02: 눈금자 + 가이드라인 (ruler with guide lines) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Horizontal ruler -->
  <rect x="160" y="200" width="700" height="80" rx="12" fill="#3949AB"/>
  <!-- Ruler ticks -->
  <line x1="280" y1="200" x2="280" y2="280" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="400" y1="200" x2="400" y2="280" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="520" y1="200" x2="520" y2="280" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="640" y1="200" x2="640" y2="280" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="760" y1="200" x2="760" y2="280" stroke="#5C6BC0" stroke-width="12"/>
  <!-- Vertical ruler -->
  <rect x="160" y="200" width="80" height="620" rx="12" fill="#3949AB"/>
  <line x1="160" y1="360" x2="240" y2="360" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="160" y1="480" x2="240" y2="480" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="160" y1="600" x2="240" y2="600" stroke="#5C6BC0" stroke-width="12"/>
  <line x1="160" y1="720" x2="240" y2="720" stroke="#5C6BC0" stroke-width="12"/>
  <!-- Guide lines (dashed) -->
  <line x1="400" y1="280" x2="400" y2="820" stroke="#5C6BC0" stroke-width="16" stroke-dasharray="20,14" opacity="0.7"/>
  <line x1="240" y1="480" x2="860" y2="480" stroke="#5C6BC0" stroke-width="16" stroke-dasharray="20,14" opacity="0.7"/>
</svg>
