<!-- Layout.Forge icon_10: 돋보기 + 와이어프레임 (magnifier over wireframe) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Wireframe UI (background) -->
  <rect x="180" y="220" width="500" height="380" rx="16" fill="none" stroke="#3949AB" stroke-width="20"/>
  <rect x="200" y="240" width="460" height="60" rx="8" fill="#3949AB"/>
  <rect x="200" y="330" width="200" height="240" rx="8" fill="none" stroke="#3949AB" stroke-width="16"/>
  <rect x="420" y="330" width="240" height="100" rx="8" fill="none" stroke="#3949AB" stroke-width="16"/>
  <rect x="420" y="450" width="240" height="120" rx="8" fill="none" stroke="#3949AB" stroke-width="16"/>
  <!-- Magnifier -->
  <circle cx="680" cy="660" r="170" fill="none" stroke="#5C6BC0" stroke-width="44"/>
  <circle cx="680" cy="660" r="126" fill="#0A0D1A" opacity="0.85"/>
  <!-- Handle -->
  <line x1="800" y1="780" x2="880" y2="860" stroke="#5C6BC0" stroke-width="44" stroke-linecap="round"/>
</svg>
