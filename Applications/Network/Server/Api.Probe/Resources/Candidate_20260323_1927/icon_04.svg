<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg04)"/>
  <!-- Left up arrow (request) -->
  <g opacity="0.95">
    <line x1="270" y1="680" x2="270" y2="310" stroke="#FFFFFF" stroke-width="55" stroke-linecap="round"/>
    <polyline points="180,420 270,290 360,420" fill="none" stroke="#FFFFFF" stroke-width="55" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="270" y="760" text-anchor="middle" font-family="Arial Black" font-size="52" font-weight="900" fill="#FED7AA">REQ</text>
  </g>
  <!-- Center lightning bolt -->
  <polygon points="512,210 440,530 510,530 440,820 596,450 516,450 596,210" fill="#FFFFFF"/>
  <!-- Right down arrow (response) -->
  <g opacity="0.95">
    <line x1="754" y1="310" x2="754" y2="680" stroke="#FFFFFF" stroke-width="55" stroke-linecap="round"/>
    <polyline points="664,570 754,700 844,570" fill="none" stroke="#FFFFFF" stroke-width="55" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="754" y="760" text-anchor="middle" font-family="Arial Black" font-size="52" font-weight="900" fill="#FED7AA">RES</text>
  </g>
</svg>
