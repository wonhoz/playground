<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | SHA256 해시값 + 체크마크 UI | 공간/장면 | 흰+파랑+초록 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1B5E20" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: Hash UI panel -->
  <rect x="60" y="80" width="904" height="864" rx="24" fill="white" filter="url(#sh1)"/>
  <rect x="60" y="80" width="904" height="76" rx="24" fill="#1565C0"/>
  <rect x="60" y="128" width="904" height="28" fill="#1565C0"/>
  <text x="512" y="116" font-family="Arial Black, sans-serif" font-size="34" fill="white"
        text-anchor="middle" dominant-baseline="middle">Hash.Check — 해시 검증</text>

  <!-- Layer 3: Hash display -->
  <!-- File name -->
  <text x="90" y="218" font-family="Arial, sans-serif" font-size="30" fill="#546E7A"
        dominant-baseline="middle">파일: setup_v2.1.exe  (48.3 MB)</text>

  <!-- Algorithm label -->
  <rect x="90" y="248" width="150" height="50" rx="14" fill="#1565C0"/>
  <text x="165" y="273" font-family="Arial Black, sans-serif" font-size="28" fill="white"
        text-anchor="middle" dominant-baseline="middle">SHA256</text>

  <!-- Computed hash -->
  <rect x="90" y="312" width="844" height="70" rx="12" fill="#F5F5F5"/>
  <text x="110" y="347" font-family="Consolas, monospace" font-size="30" fill="#1565C0"
        dominant-baseline="middle">a4f2b8c1e9d3... 7f2a1b4c8e9d</text>

  <!-- Expected hash -->
  <text x="90" y="430" font-family="Arial, sans-serif" font-size="28" fill="#546E7A"
        dominant-baseline="middle">예상값:</text>
  <rect x="90" y="450" width="844" height="70" rx="12" fill="#F5F5F5"/>
  <text x="110" y="485" font-family="Consolas, monospace" font-size="30" fill="#546E7A"
        dominant-baseline="middle">a4f2b8c1e9d3... 7f2a1b4c8e9d</text>

  <!-- Match result (big checkmark) -->
  <rect x="90" y="556" width="844" height="140" rx="20" fill="#E8F5E9" filter="url(#sh1)"/>
  <!-- Checkmark circle -->
  <circle cx="200" cy="626" r="56" fill="#43A047"/>
  <text x="200" y="626" font-family="Arial, sans-serif" font-size="72" fill="white"
        text-anchor="middle" dominant-baseline="middle">✓</text>
  <!-- Match text -->
  <text x="300" y="610" font-family="Arial Black, sans-serif" font-size="52" fill="#2E7D32"
        dominant-baseline="middle">일치!</text>
  <text x="300" y="660" font-family="Arial, sans-serif" font-size="32" fill="#43A047"
        dominant-baseline="middle">파일이 무결합니다</text>

  <!-- Batch/Folder tabs at bottom -->
  <rect x="90" y="730" width="180" height="60" rx="14" fill="#E3F2FD"/>
  <text x="180" y="760" font-family="Arial, sans-serif" font-size="26" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">단일</text>
  <rect x="290" y="730" width="180" height="60" rx="14" fill="#F5F5F5"/>
  <text x="380" y="760" font-family="Arial, sans-serif" font-size="26" fill="#9E9E9E"
        text-anchor="middle" dominant-baseline="middle">일괄</text>
  <rect x="490" y="730" width="180" height="60" rx="14" fill="#F5F5F5"/>
  <text x="580" y="760" font-family="Arial, sans-serif" font-size="26" fill="#9E9E9E"
        text-anchor="middle" dominant-baseline="middle">폴더</text>
  <rect x="690" y="730" width="180" height="60" rx="14" fill="#F5F5F5"/>
  <text x="780" y="760" font-family="Arial, sans-serif" font-size="26" fill="#9E9E9E"
        text-anchor="middle" dominant-baseline="middle">감시</text>
</svg>
