  <!-- Bricks row 2 - orange -->
  <rect x="68" y="146" width="80" height="36" rx="5" fill="#FF8C00"/>
  <rect x="158" y="146" width="80" height="36" rx="5" fill="#FF8C00"/>
  <rect x="248" y="146" width="80" height="36" rx="5" fill="#FF8C00"/>
  <rect x="338" y="146" width="80" height="36" rx="5" fill="#FF8C00"/>
  <!-- Bricks row 3 - yellow (center broken) -->
