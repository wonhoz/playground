<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FF6B35"/>
  <!-- Layer 2: Color pixels on top half -->
  <!-- Row of colorful pixels (top) -->
  <rect x="160" y="190" width="80" height="80" rx="4" fill="#EF4444"/>
  <rect x="252" y="190" width="80" height="80" rx="4" fill="#F97316"/>
  <rect x="344" y="190" width="80" height="80" rx="4" fill="#EAB308"/>
  <rect x="436" y="190" width="80" height="80" rx="4" fill="#22C55E"/>
  <rect x="528" y="190" width="80" height="80" rx="4" fill="#3B82F6"/>
  <rect x="620" y="190" width="80" height="80" rx="4" fill="#8B5CF6"/>
  <rect x="712" y="190" width="80" height="80" rx="4" fill="#EC4899"/>
  <rect x="804" y="190" width="80" height="80" rx="4" fill="#EF4444"/>
  <!-- Melting drips from pixels -->
  <path d="M 200 270 Q 200 340 195 380" stroke="#EF4444" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 292 270 Q 295 360 290 420" stroke="#F97316" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M 384 270 Q 388 350 382 400" stroke="#EAB308" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 476 270 Q 480 380 474 450" stroke="#22C55E" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M 568 270 Q 572 360 566 410" stroke="#3B82F6" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 660 270 Q 664 380 658 440" stroke="#8B5CF6" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M 752 270 Q 756 360 750 420" stroke="#EC4899" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Layer 3: ASCII characters emerging from melting -->
  <text x="180" y="500" font-family="Consolas,monospace" font-size="42" fill="white" font-weight="bold">@</text>
  <text x="272" y="540" font-family="Consolas,monospace" font-size="38" fill="white" opacity="0.9">#</text>
  <text x="364" y="520" font-family="Consolas,monospace" font-size="44" fill="white" font-weight="bold">$</text>
  <text x="456" y="560" font-family="Consolas,monospace" font-size="36" fill="white" opacity="0.85">%</text>
  <text x="548" y="510" font-family="Consolas,monospace" font-size="40" fill="white" font-weight="bold">&amp;</text>
  <text x="640" y="550" font-family="Consolas,monospace" font-size="36" fill="white" opacity="0.8">*</text>
  <text x="732" y="530" font-family="Consolas,monospace" font-size="38" fill="white" opacity="0.85">+</text>
  <!-- Bottom text art output -->
  <text x="180" y="640" font-family="Consolas,monospace" font-size="26" fill="white" opacity="0.65">@##$$%&amp;&amp;*++==--:.</text>
  <text x="180" y="680" font-family="Consolas,monospace" font-size="26" fill="white" opacity="0.45">..::---==**&amp;%$$#@</text>
  <text x="180" y="720" font-family="Consolas,monospace" font-size="26" fill="white" opacity="0.3">  . . :  :  .    .</text>
</svg>