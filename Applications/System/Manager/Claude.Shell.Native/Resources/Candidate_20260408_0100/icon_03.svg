<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: light sky -->
  <rect width="1024" height="1024" rx="190" fill="#EFF6FF"/>

  <!-- Shell DLL puzzle piece (Shell Extension = fitting into a bigger system) -->
  <!-- Base Windows Explorer icon (large) -->
  <rect x="150" y="200" width="560" height="580" rx="20" fill="#DBEAFE" stroke="#3B82F6" stroke-width="6"/>

  <!-- Explorer top bar -->
  <rect x="150" y="200" width="560" height="52" rx="20" fill="#1D4ED8"/>
  <rect x="150" y="226" width="560" height="26" fill="#1D4ED8"/>
  <text x="430" y="235" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">File Explorer</text>

  <!-- Explorer content -->
  <rect x="170" y="270" width="520" height="40" rx="6" fill="#BFDBFE"/>
  <text x="186" y="296" font-family="Arial,sans-serif" font-size="20" fill="#1E3A5F">📁  Documents</text>
  <rect x="170" y="320" width="520" height="40" rx="6" fill="#93C5FD"/>
  <text x="186" y="346" font-family="Arial,sans-serif" font-size="20" fill="#1E3A5F">📁  Projects</text>
  <rect x="170" y="370" width="520" height="40" rx="6" fill="#BFDBFE"/>
  <text x="186" y="396" font-family="Arial,sans-serif" font-size="20" fill="#1E3A5F">📄  index.html</text>

  <!-- Context menu button on folder row (right-click indicator) -->
  <circle cx="670" cy="341" r="22" fill="#1D4ED8"/>
  <text x="670" y="348" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">⋮</text>

  <!-- Plug/extension piece fitting into explorer (bottom right of explorer) -->
  <!-- Socket in explorer -->
  <rect x="490" y="670" width="220" height="80" rx="12" fill="#BFDBFE" stroke="#3B82F6" stroke-width="4" stroke-dasharray="12,8"/>
  <text x="600" y="716" font-family="Arial,sans-serif" font-size="18" fill="#1D4ED8" text-anchor="middle">Shell Extension</text>

  <!-- Plugin piece coming from outside -->
  <rect x="640" y="750" width="300" height="160" rx="14" fill="#F97316"/>
  <!-- Connector teeth -->
  <rect x="660" y="740" width="40" height="20" rx="6" fill="#F97316"/>
  <rect x="740" y="740" width="40" height="20" rx="6" fill="#F97316"/>
  <!-- Claude "C" on plugin -->
  <circle cx="728" cy="830" r="52" fill="white"/>
  <text x="728" y="847" font-family="Arial Black,Arial" font-size="52" fill="#F97316" font-weight="900" text-anchor="middle">C</text>
  <text x="728" y="878" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.9">Claude</text>

  <!-- Arrow from plugin to socket -->
  <line x1="700" y1="752" x2="700" y2="718" stroke="#FDE047" stroke-width="10" stroke-linecap="round" stroke-dasharray="14,8"/>
  <polygon points="682,720 700,694 718,720" fill="#FDE047"/>
</svg>
