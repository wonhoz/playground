<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
    <radialGradient id="sky" cx="30%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b2ebf2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#sky)"/>
  <!-- Cute clouds -->
  <ellipse cx="100" cy="80" rx="44" ry="26" fill="white" opacity="0.9"/>
  <ellipse cx="130" cy="70" rx="32" ry="22" fill="white" opacity="0.9"/>
  <ellipse cx="72" cy="76" rx="28" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="360" cy="100" rx="38" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="390" cy="92" rx="28" ry="18" fill="white" opacity="0.8"/>
  <!-- Water -->
  <path d="M0 340 Q64 326 128 340 Q192 354 256 340 Q320 326 384 340 Q448 354 512 340 L512 512 L0 512 Z" fill="#4fc3f7" opacity="0.8"/>
  <path d="M0 352 Q64 340 128 352 Q192 364 256 352 Q320 340 384 352 Q448 364 512 352" fill="none" stroke="#81d4fa" stroke-width="3" opacity="0.7"/>
  <!-- Chibi character body -->
  <!-- Head -->
  <circle cx="200" cy="220" r="58" fill="#ffcc99"/>
  <!-- Hat -->
  <ellipse cx="200" cy="168" rx="65" ry="16" fill="#5d4037"/>
  <rect x="174" y="128" width="52" height="42" rx="8" fill="#795548"/>
