<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0030"/>
  <!-- Layer 2: 타이포그래피 폭발 (원형 방사형 배치) -->
  <!-- 가장 크고 다양한 색상의 단어들 -->
  <!-- 중앙 -->
  <text x="512" y="540" font-family="Arial Black,Arial" font-size="180" font-weight="900" fill="#E040FB" text-anchor="middle">WC</text>
  <!-- 상단 -->
  <text x="512" y="220" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FF4081" text-anchor="middle">CLOUD</text>
  <!-- 좌우 -->
  <text x="160" y="520" font-family="Arial Black,Arial" font-size="56" font-weight="900" fill="#40C4FF" text-anchor="middle" transform="rotate(-90,160,520)">WORD</text>
  <text x="864" y="520" font-family="Arial Black,Arial" font-size="56" font-weight="900" fill="#69F0AE" text-anchor="middle" transform="rotate(90,864,520)">TEXT</text>
  <!-- 코너 단어들 -->
  <text x="220" y="280" font-family="Arial" font-size="44" font-weight="700" fill="#FFD740" text-anchor="middle">freq</text>
  <text x="800" y="280" font-family="Arial" font-size="40" font-weight="700" fill="#FF6E40" text-anchor="middle">tag</text>
  <text x="220" y="780" font-family="Arial" font-size="36" fill="#B39DDB" text-anchor="middle">font</text>
  <text x="800" y="780" font-family="Arial" font-size="42" fill="#80DEEA" text-anchor="middle">size</text>
  <!-- 하단 -->
  <text x="512" y="820" font-family="Arial" font-size="52" font-weight="700" fill="#CE93D8" text-anchor="middle">VISUAL</text>
  <!-- Layer 3: 원형 가이드 -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#E040FB" stroke-width="4" opacity="0.3"/>
  <circle cx="512" cy="512" r="420" fill="none" stroke="#7C4DFF" stroke-width="3" opacity="0.2"/>
</svg>
