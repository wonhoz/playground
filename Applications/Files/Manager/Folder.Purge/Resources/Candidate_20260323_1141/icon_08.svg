<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#263238"/>
  <!-- Layer 2: Checklist rows -->
  <!-- Row 1: checked -->
  <rect x="140" y="220" width="744" height="100" rx="16" fill="#37474F"/>
  <rect x="170" y="244" width="52" height="52" rx="10" fill="#26C6DA"/>
  <line x1="184" y1="270" x2="200" y2="288" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="288" x2="220" y2="256" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Folder icon -->
  <rect x="250" y="248" width="50" height="20" rx="6" fill="white"/>
  <rect x="240" y="262" width="70" height="44" rx="6" fill="white"/>
  <rect x="336" y="256" width="280" height="16" rx="8" fill="white" opacity="0.5"/>
  <!-- Row 2: checked -->
  <rect x="140" y="340" width="744" height="100" rx="16" fill="#37474F"/>
  <rect x="170" y="364" width="52" height="52" rx="10" fill="#26C6DA"/>
  <line x1="184" y1="390" x2="200" y2="408" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="408" x2="220" y2="376" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <rect x="250" y="368" width="50" height="20" rx="6" fill="white"/>
  <rect x="240" y="382" width="70" height="44" rx="6" fill="white"/>
  <rect x="336" y="376" width="240" height="16" rx="8" fill="white" opacity="0.5"/>
  <!-- Row 3: unchecked -->
  <rect x="140" y="460" width="744" height="100" rx="16" fill="#37474F"/>
  <rect x="170" y="484" width="52" height="52" rx="10" fill="none" stroke="#26C6DA" stroke-width="6"/>
  <rect x="250" y="488" width="50" height="20" rx="6" fill="white" opacity="0.6"/>
  <rect x="240" y="502" width="70" height="44" rx="6" fill="white" opacity="0.6"/>
  <rect x="336" y="496" width="320" height="16" rx="8" fill="white" opacity="0.3"/>
  <!-- Layer 3: Delete button -->
  <rect x="140" y="640" width="744" height="90" rx="16" fill="#EF5350"/>
  <text x="512" y="696" font-family="Arial" font-size="44" font-weight="bold" fill="white" text-anchor="middle">DELETE SELECTED</text>
</svg>