<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A00"/>
  <!-- 진공청소기 본체 -->
  <ellipse cx="560" cy="580" rx="200" ry="120" fill="#1B5E20" stroke="#66BB6A" stroke-width="14"/>
  <!-- 청소기 헤드 -->
  <rect x="200" y="640" width="280" height="60" rx="30" fill="#1B5E20" stroke="#66BB6A" stroke-width="12"/>
  <!-- 흡입구 -->
  <rect x="180" y="645" width="50" height="50" rx="10" fill="#000A00" stroke="#66BB6A" stroke-width="10"/>
  <!-- 호스 -->
  <path d="M360 660 Q420 620 480 580" fill="none" stroke="#66BB6A" stroke-width="24" stroke-linecap="round"/>
  <!-- 흡입 선 -->
  <line x1="180" y1="580" x2="230" y2="648" stroke="#66BB6A" stroke-width="10" stroke-linecap="round" stroke-dasharray="15 8"/>
  <line x1="185" y1="560" x2="228" y2="645" stroke="#66BB6A" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 8" opacity="0.6"/>
  <line x1="192" y1="540" x2="228" y2="646" stroke="#66BB6A" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 8" opacity="0.4"/>
  <!-- 청소기 창 -->
  <circle cx="590" cy="560" r="55" fill="#000A00" stroke="#66BB6A" stroke-width="10"/>
  <circle cx="590" cy="560" r="35" fill="#1B5E20" opacity="0.5"/>
  <!-- 바퀴들 -->
  <circle cx="460" cy="700" r="30" fill="#000A00" stroke="#66BB6A" stroke-width="10"/>
  <circle cx="640" cy="700" r="30" fill="#000A00" stroke="#66BB6A" stroke-width="10"/>
  <!-- 먼지 입자들 (흡입 중) -->
  <circle cx="220" cy="540" r="10" fill="#66BB6A" opacity="0.7"/>
  <circle cx="240" cy="510" r="7" fill="#66BB6A" opacity="0.5"/>
  <circle cx="200" cy="500" r="12" fill="#66BB6A" opacity="0.6"/>
  <circle cx="260" cy="480" r="8" fill="#66BB6A" opacity="0.4"/>
</svg>
