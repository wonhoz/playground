<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: metaphor · 공간/장면 · Explorer 창에서 폴더 우클릭 → 터미널 -->
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D1C4E9"/>
      <stop offset="1" stop-color="#9575CD"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg03)"/>
  <!-- Explorer 윈도우 (뒤쪽) -->
  <g>
    <rect x="100" y="140" width="620" height="600" rx="28" fill="#FFFFFF" stroke="#311B92" stroke-width="16"/>
    <rect x="100" y="140" width="620" height="70" rx="28" fill="#311B92"/>
    <rect x="100" y="180" width="620" height="30" fill="#311B92"/>
    <!-- 창 점 3개 -->
    <circle cx="150" cy="175" r="14" fill="#FF5252"/>
    <circle cx="190" cy="175" r="14" fill="#FFD93D"/>
    <circle cx="230" cy="175" r="14" fill="#4CAF50"/>
    <!-- 폴더 그리드 -->
    <g>
      <!-- 폴더 1 (우클릭 타겟) -->
      <g>
        <path d="M 160 290 L 220 290 L 250 320 L 330 320 L 330 420 L 160 420 Z" fill="#FFD93D" stroke="#E65100" stroke-width="10"/>
        <rect x="160" y="380" width="170" height="8" fill="#E65100"/>
      </g>
      <g>
        <path d="M 380 290 L 440 290 L 470 320 L 550 320 L 550 420 L 380 420 Z" fill="#FFD93D" stroke="#B88A00" stroke-width="8" opacity="0.6"/>
      </g>
      <g>
        <path d="M 600 290 L 660 290 L 690 320 L 700 320 L 700 420 L 600 420 Z" fill="#FFD93D" stroke="#B88A00" stroke-width="8" opacity="0.6"/>
      </g>
    </g>
  </g>
  <!-- 컨텍스트 메뉴 (선택된 폴더 옆) -->
  <g>
    <rect x="300" y="410" width="420" height="360" rx="20" fill="#FFFFFF" stroke="#4A148C" stroke-width="12"/>
    <rect x="318" y="430" width="384" height="50" rx="8" fill="#F5F5F5"/>
    <text x="340" y="466" font-family="Consolas, monospace" font-size="32" fill="#616161">Open</text>
    <rect x="318" y="490" width="384" height="50" rx="8" fill="#F5F5F5"/>
    <text x="340" y="526" font-family="Consolas, monospace" font-size="32" fill="#616161">Open in Terminal</text>
    <rect x="318" y="550" width="384" height="70" rx="10" fill="#FFD93D" stroke="#E65100" stroke-width="6"/>
    <circle cx="352" cy="585" r="16" fill="#E65100"/>
    <text x="380" y="597" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#3E2723">Claude Code</text>
    <rect x="318" y="630" width="384" height="50" rx="8" fill="#F5F5F5"/>
    <text x="340" y="666" font-family="Consolas, monospace" font-size="32" fill="#616161">Pin to Quick access</text>
    <rect x="318" y="690" width="384" height="50" rx="8" fill="#F5F5F5"/>
    <text x="340" y="726" font-family="Consolas, monospace" font-size="32" fill="#616161">Properties</text>
  </g>
  <!-- 마우스 커서 (메뉴 위) -->
  <g transform="translate(630 555)">
    <path d="M 0 0 L 0 90 L 24 68 L 42 104 L 56 98 L 38 64 L 70 64 Z" fill="#FFFFFF" stroke="#1B1B1B" stroke-width="8" stroke-linejoin="round"/>
  </g>
  <!-- 터미널 아이콘 (하단 오른쪽) -->
  <g>
    <rect x="780" y="780" width="220" height="180" rx="20" fill="#1B1B1B" stroke="#FFD93D" stroke-width="10"/>
    <text x="800" y="860" font-family="Consolas, monospace" font-weight="700" font-size="54" fill="#06D6A0">$_</text>
    <text x="810" y="920" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFD93D">claude</text>
  </g>
</svg>
