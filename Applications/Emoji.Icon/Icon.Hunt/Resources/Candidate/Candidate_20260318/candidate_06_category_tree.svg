<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 트리 구조 -->
  <!-- 루트 -->
  <circle cx="256" cy="130" r="22" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
  <text x="256" y="137" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">🏷️</text>
  <!-- 브랜치 라인 -->
  <line x1="256" y1="152" x2="156" y2="218" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="152" x2="356" y2="218" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <!-- 레벨 2 노드 -->
  <circle cx="156" cy="235" r="18" fill="#10B981" opacity="0.12" stroke="#34D399" stroke-width="1.5"/>
  <text x="156" y="242" text-anchor="middle" font-size="16" font-family="Segoe UI Emoji">😊</text>
  <circle cx="356" cy="235" r="18" fill="#10B981" opacity="0.12" stroke="#34D399" stroke-width="1.5"/>
  <text x="356" y="242" text-anchor="middle" font-size="16" font-family="Segoe UI Emoji">🌍</text>
  <!-- 레벨 3 라인 -->
  <line x1="156" y1="253" x2="106" y2="320" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <line x1="156" y1="253" x2="206" y2="320" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <line x1="356" y1="253" x2="306" y2="320" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <line x1="356" y1="253" x2="406" y2="320" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <!-- 레벨 3 노드 -->
  <circle cx="106" cy="335" r="14" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="106" y="341" text-anchor="middle" font-size="13" font-family="Segoe UI Emoji">🔥</text>
  <circle cx="206" cy="335" r="14" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="206" y="341" text-anchor="middle" font-size="13" font-family="Segoe UI Emoji">⚡</text>
  <circle cx="306" cy="335" r="14" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="306" y="341" text-anchor="middle" font-size="13" font-family="Segoe UI Emoji">🌟</text>
  <circle cx="406" cy="335" r="14" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="406" y="341" text-anchor="middle" font-size="13" font-family="Segoe UI Emoji">💎</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">CATEGORY TREE</text>
</svg>
