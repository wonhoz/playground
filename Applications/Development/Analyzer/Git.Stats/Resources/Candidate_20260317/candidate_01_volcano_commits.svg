<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#3a0800"/>
      <stop offset="100%" stop-color="#1a0500"/>
    </radialGradient>
    <radialGradient id="crater01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="50%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </radialGradient>
    <linearGradient id="lava01a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF2200"/>
    </linearGradient>
    <linearGradient id="lava01b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow01b">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg01)"/>

  <!-- 연기 구름 -->
  <ellipse cx="220" cy="55" rx="50" ry="25" fill="#2a1a1a" opacity="0.7"/>
  <ellipse cx="260" cy="45" rx="65" ry="30" fill="#3a2020" opacity="0.6"/>
  <ellipse cx="300" cy="58" rx="45" ry="22" fill="#2a1a1a" opacity="0.7"/>
  <ellipse cx="256" cy="60" rx="80" ry="35" fill="#1a0a0a" opacity="0.5"/>

  <!-- 화산 폭발 - 용암 파편들 -->
  <filter id="partGlow">
    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- 커밋 파편 (원형 용암 방울) -->
  <circle cx="200" cy="100" r="8" fill="#FF6600" filter="url(#partGlow)" opacity="0.9"/>
  <circle cx="180" cy="80" r="5" fill="#FF8C00" filter="url(#partGlow)" opacity="0.8"/>
  <circle cx="310" cy="90" r="7" fill="#FF4500" filter="url(#partGlow)" opacity="0.9"/>
  <circle cx="330" cy="115" r="4" fill="#FF8C00" filter="url(#partGlow)" opacity="0.7"/>
  <circle cx="240" cy="75" r="6" fill="#FF6600" filter="url(#partGlow)" opacity="0.9"/>
  <circle cx="270" cy="80" r="9" fill="#FF8C00" filter="url(#partGlow)" opacity="0.85"/>
  <circle cx="160" cy="120" r="4" fill="#FF4500" filter="url(#partGlow)" opacity="0.6"/>
  <circle cx="350" cy="100" r="5" fill="#FF6600" filter="url(#partGlow)" opacity="0.7"/>

  <!-- 화산체 (산 실루엣) -->
  <polygon points="256,140 60,430 452,430" fill="#1a0800"/>
  <polygon points="256,140 100,380 412,380" fill="#220a00"/>

  <!-- 산 측면 질감 -->
  <polygon points="256,140 60,430 158,430" fill="#280d00" opacity="0.6"/>
  <polygon points="256,140 354,430 452,430" fill="#280d00" opacity="0.6"/>

  <!-- 용암 흐름 - 왼쪽 -->
  <path d="M240,165 Q200,220 185,280 Q175,330 195,380 Q210,410 240,430"
        fill="none" stroke="url(#lava01a)" stroke-width="12" stroke-linecap="round" opacity="0.9" filter="url(#glow01)"/>
  <path d="M240,165 Q200,220 185,280 Q175,330 195,380 Q210,410 240,430"
        fill="none" stroke="#FF8C00" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- 용암 흐름 - 오른쪽 -->
  <path d="M270,165 Q310,230 325,290 Q335,340 315,385 Q300,410 275,430"
        fill="none" stroke="url(#lava01b)" stroke-width="10" stroke-linecap="round" opacity="0.9" filter="url(#glow01)"/>
  <path d="M270,165 Q310,230 325,290 Q335,340 315,385 Q300,410 275,430"
        fill="none" stroke="#FF6600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 용암 흐름 - 중앙 작은 -->
  <path d="M256,155 Q256,200 250,260 Q245,300 260,350"
        fill="none" stroke="#FF4500" stroke-width="7" stroke-linecap="round" opacity="0.7" filter="url(#glow01)"/>

  <!-- 커밋 카운터 점들 (용암 흐름 위) -->
  <circle cx="190" cy="230" r="6" fill="#FF8C00" filter="url(#partGlow)"/>
  <circle cx="183" cy="295" r="5" fill="#FF6600" filter="url(#partGlow)"/>
  <circle cx="198" cy="355" r="7" fill="#FF4500" filter="url(#partGlow)"/>
  <circle cx="318" cy="245" r="5" fill="#FF8C00" filter="url(#partGlow)"/>
  <circle cx="328" cy="305" r="6" fill="#FF6600" filter="url(#partGlow)"/>
  <circle cx="312" cy="360" r="5" fill="#FF4500" filter="url(#partGlow)"/>

  <!-- 분화구 -->
  <ellipse cx="256" cy="148" rx="55" ry="20" fill="#8B0000"/>
  <ellipse cx="256" cy="145" rx="45" ry="16" fill="url(#crater01)" filter="url(#glow01b)"/>
  <ellipse cx="256" cy="143" rx="30" ry="10" fill="#FF8C00" opacity="0.9"/>
  <ellipse cx="256" cy="142" rx="18" ry="6" fill="#FFFF00" opacity="0.8" filter="url(#glow01b)"/>

  <!-- 지면 (용암 호수) -->
  <ellipse cx="256" cy="430" rx="160" ry="18" fill="#FF4500" opacity="0.3" filter="url(#glow01)"/>
  <rect x="60" y="428" width="392" height="84" fill="#1a0500"/>
  <path d="M60,430 Q150,420 256,425 Q362,420 452,430 L452,512 L60,512 Z" fill="#0d0200"/>

  <!-- 용암 호수 표면 -->
  <path d="M100,432 Q180,425 256,428 Q332,425 410,432" fill="none" stroke="#FF4500" stroke-width="3" opacity="0.6" filter="url(#glow01)"/>

  <!-- 하단 텍스트 영역 장식 - 작은 커밋 바 -->
  <rect x="100" y="455" width="20" height="35" fill="#FF4500" opacity="0.5" rx="2"/>
  <rect x="130" y="445" width="20" height="45" fill="#FF6600" opacity="0.6" rx="2"/>
  <rect x="160" y="460" width="20" height="30" fill="#FF4500" opacity="0.5" rx="2"/>
  <rect x="310" y="448" width="20" height="42" fill="#FF6600" opacity="0.6" rx="2"/>
  <rect x="340" y="458" width="20" height="32" fill="#FF4500" opacity="0.5" rx="2"/>
  <rect x="370" y="442" width="20" height="48" fill="#FF8C00" opacity="0.6" rx="2"/>
</svg>
