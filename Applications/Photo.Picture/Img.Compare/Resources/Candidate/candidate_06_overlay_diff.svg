<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2a0a"/>
      <stop offset="100%" stop-color="#1a1a0a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="40%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00ff8840"/>
      <stop offset="100%" stop-color="#00ff8800"/>
    </radialGradient>
    <radialGradient id="glow2" cx="60%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff440040"/>
      <stop offset="100%" stop-color="#ff440000"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Background glow -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#glow1)"/>
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#glow2)"/>
  <!-- Image 1 (before) - semi-transparent -->
  <rect x="60" y="100" width="220" height="220" rx="12" fill="#00aa55" opacity="0.4"/>
  <rect x="80" y="120" width="100" height="80" rx="6" fill="#00ff88" opacity="0.3"/>
  <rect x="80" y="220" width="180" height="40" rx="6" fill="#00ff88" opacity="0.3"/>
  <circle cx="220" cy="160" r="40" fill="#00cc66" opacity="0.4"/>
  <!-- Image 2 (after) - semi-transparent -->
  <rect x="232" y="192" width="220" height="220" rx="12" fill="#aa2200" opacity="0.4"/>
  <rect x="252" y="212" width="100" height="80" rx="6" fill="#ff4400" opacity="0.3"/>
  <rect x="252" y="332" width="180" height="40" rx="6" fill="#ff4400" opacity="0.3"/>
  <circle cx="352" cy="260" r="40" fill="#cc2200" opacity="0.4"/>
  <!-- Overlap area highlight (diff region) -->
  <rect x="232" y="192" width="48" height="128" rx="4" fill="#ffff00" opacity="0.25"/>
  <!-- Diff markers -->
  <circle cx="310" cy="250" r="12" fill="none" stroke="#ffff00" stroke-width="3"/>
  <circle cx="350" cy="280" r="8" fill="none" stroke="#ffff00" stroke-width="3"/>
  <!-- Labels -->
  <rect x="60" y="338" width="80" height="26" rx="5" fill="#00aa55" opacity="0.8"/>
  <text x="100" y="356" text-anchor="middle" font-family="Arial" font-size="16" fill="white">BEFORE</text>
  <rect x="372" y="192" width="72" height="26" rx="5" fill="#aa2200" opacity="0.8"/>
  <text x="408" y="210" text-anchor="middle" font-family="Arial" font-size="16" fill="white">AFTER</text>
  <!-- Diff count indicator -->
  <rect x="186" y="410" width="140" height="40" rx="10" fill="#333300" opacity="0.9"/>
  <text x="256" y="436" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffff00">DIFF: 3 areas</text>
</svg>
