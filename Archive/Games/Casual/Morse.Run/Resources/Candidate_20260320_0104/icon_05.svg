<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Lightning bolt -->
  <polygon points="580,180 420,560 530,560 380,880 700,440 570,440 720,180" fill="#F57F17" fill-opacity="0.9"/>
  <!-- Dot overlays on lightning -->
  <circle cx="590" cy="280" r="24" fill="#FFD54F"/>
  <rect x="528" y="360" width="90" height="44" rx="22" fill="#FFD54F" fill-opacity="0.8"/>
  <circle cx="505" cy="470" r="24" fill="#FFD54F"/>
  <!-- Outer glow -->
  <polygon points="580,180 420,560 530,560 380,880 700,440 570,440 720,180" fill="none" stroke="#FFD54F" stroke-width="16" stroke-opacity="0.4"/>
</svg>