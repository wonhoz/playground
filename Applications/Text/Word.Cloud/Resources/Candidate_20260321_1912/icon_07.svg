  </g>
  <!-- 중간 구름 -->
  <g fill="rgba(255,255,255,0.48)">
    <circle cx="512" cy="572" r="238"/>
    <circle cx="297" cy="607" r="186"/>
    <circle cx="727" cy="607" r="186"/>
    <circle cx="512" cy="390" r="206"/>
    <circle cx="368" cy="444" r="176"/>
