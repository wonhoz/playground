  <ellipse cx="192" cy="256" rx="28" ry="12" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5"/>
  <ellipse cx="320" cy="256" rx="28" ry="12" fill="#4C1D95" opacity="0.4"/>
  <ellipse cx="320" cy="256" rx="28" ry="12" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5"/>
