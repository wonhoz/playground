  <circle cx="120" cy="110" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="340" cy="100" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="400" cy="100" r="48" fill="url(#moon)" filter="url(#moonGlow)" opacity="0.9"/>
  <circle cx="418" cy="88" r="38" fill="#1a2a4a" opacity="0.3"/>
  <!-- City silhouettes (dark, nighttime) -->
  <rect x="60" y="220" width="60" height="140" fill="#0a0a18"/>
  <rect x="72" y="206" width="24" height="14" fill="#0a0a18"/>
  <circle cx="84" cy="200" r="4" fill="#ff4444" opacity="0.8"/>
  <rect x="96" y="234" width="10" height="12" fill="#ffcc44" opacity="0.4"/>
  <rect x="96" y="260" width="10" height="12" fill="#44aaff" opacity="0.5"/>
  <rect x="96" y="286" width="10" height="12" fill="#ffcc44" opacity="0.3"/>

  <rect x="132" y="170" width="80" height="190" fill="#080818"/>
