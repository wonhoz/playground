<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 하늘색 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg6)"/>

  <!-- Layer 2: 큰 {} 브레이스 (코드) -->
  <!-- 왼쪽 { -->
  <text x="120" y="620" font-family="'Courier New',monospace" font-weight="900" font-size="520" fill="#7B1FA2" opacity="0.85" dominant-baseline="middle">{</text>
  <!-- 오른쪽 } -->
  <text x="560" y="620" font-family="'Courier New',monospace" font-weight="900" font-size="520" fill="#7B1FA2" opacity="0.85" dominant-baseline="middle">}</text>

  <!-- Layer 3: 망치 (대각선, 동적 — forge) -->
  <g transform="translate(200 200) rotate(-40, 200, 200)">
    <!-- 손잡이 -->
    <rect x="186" y="180" width="40" height="300" rx="16" fill="#6D4C41"/>
    <!-- 망치 머리 -->
    <rect x="80" y="80" width="252" height="116" rx="26" fill="url(#hammerGrad)"/>
    <!-- 망치 하이라이트 -->
    <rect x="80" y="80" width="252" height="38" rx="26" fill="#FFCC02" opacity="0.35"/>
  </g>

  <!-- 충격 효과선 -->
  <line x1="420" y1="480" x2="340" y2="400" stroke="#FF8F00" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="460" y1="440" x2="390" y2="350" stroke="#FF8F00" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="500" y1="420" x2="450" y2="320" stroke="#FF8F00" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
