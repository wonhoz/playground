<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: Literal / 실루엣·캐릭터 / 플레이어 실루엣 + 탄막 회피 + 건설 중 -->
  <!-- 배경: 웜 다크 -->
  <rect width="1024" height="1024" rx="160" fill="#1C1008"/>

  <!-- 배경 발광 (따뜻한 앰버) -->
  <radialGradient id="g05warm" cx="50%" cy="65%" r="45%">
    <stop offset="0%" stop-color="#8B4500" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1C1008" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="160" fill="url(#g05warm)"/>

  <!-- 바닥 플랫폼 -->
  <rect x="230" y="750" width="564" height="28" rx="14" fill="#3A2010" stroke="#8B4500" stroke-width="3"/>

  <!-- 건설 중인 벽 (왼쪽) -->
  <rect x="260" y="580" width="72" height="72" rx="8" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="260" y="650" width="72" height="72" rx="8" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="260" y="720" width="72" height="28" rx="8" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <!-- 반쪽 건설 중인 블록 (애니메이션 느낌) -->
  <rect x="260" y="510" width="72" height="65" rx="8" fill="#1E4FD8" opacity="0.45" stroke="#4A9EFF" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 건설 중인 벽 (오른쪽) -->
  <rect x="692" y="620" width="72" height="72" rx="8" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="692" y="692" width="72" height="30" rx="8" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="692" y="550" width="72" height="65" rx="8" fill="#1E4FD8" opacity="0.45" stroke="#4A9EFF" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 플레이어 실루엣 (핑크, 중앙) — 회피 포즈 -->
  <!-- 몸통 -->
  <ellipse cx="512" cy="640" rx="38" ry="50" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="4"/>
  <!-- 머리 -->
  <circle cx="512" cy="565" r="40" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="4"/>
  <circle cx="512" cy="565" r="18" fill="#FFD6EC"/>
  <!-- 왼팔 (뻗은 자세) -->
  <path d="M474 620 Q430 590 410 570" stroke="#FF6EB4" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 오른팔 (건설 도구 들기) -->
  <path d="M550 610 Q590 580 620 570" stroke="#FF6EB4" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- 망치 -->
  <rect x="618" y="548" width="50" height="18" rx="6" fill="#C8A45A"/>
  <rect x="628" y="530" width="18" height="42" rx="6" fill="#8B6914"/>
  <!-- 다리 -->
  <path d="M490 688 Q470 720 455 748" stroke="#FF6EB4" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M534 688 Q554 720 570 748" stroke="#FF6EB4" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- 날아오는 탄막 (다각도) -->
  <circle cx="340" cy="490" r="16" fill="#FF2222" stroke="#FF5555" stroke-width="3.5"/>
  <path d="M295 470 L332 485" stroke="#FF2222" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.6"/>
  <circle cx="730" cy="460" r="16" fill="#FF2222" stroke="#FF5555" stroke-width="3.5"/>
  <path d="M775 440 L738 455" stroke="#FF2222" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.6"/>
  <circle cx="440" cy="390" r="12" fill="#FF4444" stroke="#FF7777" stroke-width="2.5"/>
  <circle cx="590" cy="380" r="12" fill="#FF4444" stroke="#FF7777" stroke-width="2.5"/>
  <circle cx="512" cy="360" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>

  <!-- 자원 픽업들 -->
  <polygon points="430,720 444,740 430,760 416,740" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  <polygon points="592,720 606,740 592,760 578,740" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>

  <!-- Lives HUD -->
  <circle cx="400" cy="250" r="14" fill="#FF6EB4" opacity="0.9"/>
  <circle cx="435" cy="250" r="14" fill="#FF6EB4" opacity="0.9"/>
  <circle cx="470" cy="250" r="14" fill="#FF6EB4" opacity="0.4"/>
</svg>
