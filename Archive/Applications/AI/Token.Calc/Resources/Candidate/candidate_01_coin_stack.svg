<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="coin1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7d774"/>
      <stop offset="100%" stop-color="#c8a000"/>
    </linearGradient>
    <linearGradient id="coin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#a07800"/>
    </linearGradient>
    <linearGradient id="coin3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4b030"/>
      <stop offset="100%" stop-color="#886000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 코인 3개 쌓기 -->
  <!-- 맨 아래 코인 -->
  <ellipse cx="256" cy="340" rx="130" ry="32" fill="url(#coin3)"/>
  <rect x="126" y="300" width="260" height="40" fill="#a07800"/>
  <ellipse cx="256" cy="300" rx="130" ry="32" fill="url(#coin2)"/>
  <!-- 중간 코인 -->
  <ellipse cx="256" cy="270" rx="130" ry="32" fill="url(#coin2)"/>
  <rect x="126" y="230" width="260" height="40" fill="#b08800"/>
  <ellipse cx="256" cy="230" rx="130" ry="32" fill="url(#coin1)"/>
  <!-- 맨 위 코인 -->
  <ellipse cx="256" cy="200" rx="130" ry="32" fill="url(#coin1)"/>
  <rect x="126" y="160" width="260" height="40" fill="#c09000"/>
  <ellipse cx="256" cy="160" rx="130" ry="32" fill="#f7d774"/>
  <!-- 코인 위 T 문자 -->
  <text x="256" y="178" font-family="Arial" font-weight="bold" font-size="48" fill="#886600" text-anchor="middle" dominant-baseline="middle">T</text>
  <!-- 반짝임 효과 -->
  <ellipse cx="210" cy="148" rx="18" ry="6" fill="white" opacity="0.35" transform="rotate(-20,210,148)"/>
</svg>
