<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: Metaphor / 기하학 추상 / DODGE + CRAFT 텍스트 기반, 총알 원형 프레임 -->
  <!-- 배경: 차콜 블랙 -->
  <rect width="1024" height="1024" rx="160" fill="#111111"/>

  <!-- 원형 탄막 프레임 -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#FF3333" stroke-width="3" stroke-dasharray="12,6" opacity="0.5"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#FF4444" stroke-width="1.5" opacity="0.25"/>

  <!-- 탄막 원형 배치 -->
  <circle cx="512" cy="132" r="16" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="781" cy="243" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="892" cy="512" r="16" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="781" cy="781" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="512" cy="892" r="16" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="243" cy="781" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="132" cy="512" r="16" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="243" cy="243" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>

  <!-- 중앙 배경 원 -->
  <circle cx="512" cy="512" r="280" fill="#1A1A2E"/>

  <!-- DODGE 텍스트 (상단) -->
  <text x="512" y="460" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#FF3333" letter-spacing="-2">DODGE</text>

  <!-- 구분선 (건설 요소들) -->
  <g transform="translate(512, 510)">
    <!-- Wall 블록들 -->
    <rect x="-120" y="-10" width="30" height="30" rx="4" fill="#1E4FD8"/>
    <rect x="-84" y="-10" width="30" height="30" rx="4" fill="#1E4FD8"/>
    <rect x="-48" y="-10" width="30" height="30" rx="4" fill="#1E4FD8"/>
    <rect x="-12" y="-10" width="30" height="30" rx="4" fill="#2ECC40"/>
    <rect x="24" y="-10" width="30" height="30" rx="4" fill="#00CED1"/>
    <rect x="60" y="-10" width="30" height="30" rx="4" fill="#FF6600"/>
    <rect x="96" y="-10" width="30" height="30" rx="4" fill="#1E4FD8"/>
  </g>

  <!-- CRAFT 텍스트 (하단) -->
  <text x="512" y="620" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#4A9EFF" letter-spacing="-2">CRAFT</text>

  <!-- 중앙 연결 앰퍼샌드 느낌 - 플레이어 아이콘 -->
  <circle cx="512" cy="385" r="22" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="3"/>
  <circle cx="512" cy="385" r="9" fill="#FFD6EC"/>
</svg>
