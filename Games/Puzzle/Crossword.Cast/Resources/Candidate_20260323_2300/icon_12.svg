<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <clipPath id="clip12">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg12)"/>
  <g clip-path="url(#clip12)">
    <!-- Layer 2: 퍼즐 조각 4개 (2x2 맞춤 형태) -->
    <!-- 퍼즐 조각 1 (좌상) — 오른쪽/아래쪽 돌출 -->
    <path d="M 180 180
             L 420 180
             Q 420 280, 470 280 Q 520 280, 520 230 Q 520 180, 570 180
             L 570 180 L 570 420
             Q 470 420, 470 470 Q 470 520, 520 520 Q 570 520, 570 570
             L 420 570 L 420 570
             Q 420 470, 370 470 Q 320 470, 320 520 Q 320 570, 370 570
             L 180 570 Z"
          fill="#D97706" stroke="#1C1917" stroke-width="8"/>

    <!-- 퍼즐 조각 2 (우상) — 왼쪽 오목/아래쪽 돌출 -->
    <path d="M 570 180
             Q 570 180, 620 180
             L 844 180 L 844 420
             Q 744 420, 744 470 Q 744 520, 794 520 Q 844 520, 844 570
             L 620 570
             Q 620 470, 570 470 Q 520 470, 520 520 Q 520 570, 570 570
             L 570 420
             Q 620 420, 620 370 Q 620 320, 570 320 Q 520 320, 520 270 Q 520 220, 570 220
             Z"
          fill="#FFFFFF" stroke="#1C1917" stroke-width="8"/>

    <!-- 퍼즐 조각 3 (좌하) — 위쪽 오목/오른쪽 돌출 -->
    <path d="M 180 570
             Q 180 570, 320 570
             Q 320 620, 370 620 Q 420 620, 420 570
             L 570 570
             Q 570 620, 520 620 Q 470 620, 470 670 Q 470 720, 520 720 Q 570 720, 570 770
             L 420 770
             Q 420 670, 370 670 Q 320 670, 320 720 Q 320 770, 370 770
             L 180 844 Z"
          fill="#FFFFFF" stroke="#1C1917" stroke-width="8"/>

    <!-- 퍼즐 조각 4 (우하) — 위쪽 오목/왼쪽 오목 -->
    <path d="M 570 570
             Q 620 570, 620 520 Q 620 470, 570 470
             L 844 570 L 844 844
             L 620 844
             Q 620 744, 570 744 Q 520 744, 520 794 Q 520 844, 570 844
             L 420 844
             Q 420 794, 470 794 Q 520 794, 520 744 Q 520 694, 470 694 Q 420 694, 420 770
             L 570 770
             Q 570 720, 520 720 Q 470 720, 470 670 Q 470 620, 520 620 Q 570 620, 570 570
             Z"
          fill="#D97706" stroke="#1C1917" stroke-width="8"/>

    <!-- Layer 3: 퍼즐 조각 위 문자 -->
    <text x="290" y="390" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#1C1917" text-anchor="middle" dominant-baseline="middle">C</text>
    <text x="720" y="390" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#D97706" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="290" y="720" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#D97706" text-anchor="middle" dominant-baseline="middle">P</text>
    <text x="720" y="720" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#1C1917" text-anchor="middle" dominant-baseline="middle">Z</text>
  </g>
</svg>
