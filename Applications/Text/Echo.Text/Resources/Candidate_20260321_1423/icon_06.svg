<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <clipPath id="c6c"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6c)"/>
  <circle cx="512" cy="400" r="320" fill="#059669" opacity="0.1" clip-path="url(#c6c)"/>

  <!-- Layer 2: 입/입술 실루엣에서 알파벳들이 나옴 (실루엣 hybrid) -->
  <!-- 입 실루엣 (열린 입 모양) -->
  <!-- 윗입술 -->
  <path d="M 310,440 Q 360,390 420,410 Q 460,395 512,390 Q 564,395 604,410 Q 664,390 714,440"
        stroke="#34D399" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 아랫입술 -->
  <path d="M 310,440 Q 412,530 512,540 Q 612,530 714,440"
        stroke="#34D399" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 입 안 (어두운 내부) -->
  <path d="M 330,440 Q 420,510 512,520 Q 604,510 694,440 Q 620,405 512,400 Q 404,405 330,440 Z"
        fill="#033A2E" opacity="0.85"/>
  <!-- 이 (위) -->
  <rect x="390" y="422" width="264" height="22" rx="6" fill="#ECFDF5" opacity="0.7"/>
  <!-- 이 (아래) -->
  <rect x="390" y="470" width="264" height="22" rx="6" fill="#D1FAE5" opacity="0.6"/>

  <!-- 알파벳들이 입에서 나와 흩어짐 (오른쪽 + 위쪽) -->
  <g font-family="Consolas,monospace" font-weight="bold">
    <!-- 첫번째 줄 (입에서 바로 나옴) -->
    <text x="730" y="400" font-size="52" fill="#6EE7B7" opacity="1.0">H</text>
    <text x="784" y="360" font-size="46" fill="#34D399" opacity="0.9">e</text>
    <text x="826" y="400" font-size="42" fill="#10B981" opacity="0.8">l</text>
    <text x="848" y="354" font-size="38" fill="#059669" opacity="0.7">l</text>

    <!-- 위로 올라가는 글자들 -->
    <text x="680" y="330" font-size="36" fill="#6EE7B7" opacity="0.75">o</text>
    <text x="730" y="290" font-size="32" fill="#34D399" opacity="0.6"> </text>
    <text x="760" y="260" font-size="28" fill="#10B981" opacity="0.5">W</text>

    <!-- 위쪽 더 멀리 -->
    <text x="590" y="280" font-size="28" fill="#A7F3D0" opacity="0.55">o</text>
    <text x="630" y="238" font-size="24" fill="#6EE7B7" opacity="0.4">r</text>
    <text x="674" y="210" font-size="20" fill="#34D399" opacity="0.3">l</text>
    <text x="706" y="190" font-size="18" fill="#10B981" opacity="0.2">d</text>

    <!-- 왼쪽으로도 조금 -->
    <text x="220" y="380" font-size="36" fill="#6EE7B7" opacity="0.6">T</text>
    <text x="188" y="340" font-size="30" fill="#34D399" opacity="0.45">T</text>
    <text x="164" y="300" font-size="24" fill="#10B981" opacity="0.3">S</text>
  </g>

  <!-- 음파 호 (오른쪽) -->
  <path d="M 728,470 Q 780,490 728,510" fill="none" stroke="#34D399" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M 752,450 Q 820,490 752,530" fill="none" stroke="#10B981" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

  <!-- Layer 3: 하단 레이블 -->
  <rect x="240" y="730" width="544" height="56" rx="14" fill="#022C22" opacity="0.9"/>
  <text x="512" y="765" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#6EE7B7">speak it out loud</text>
</svg>
