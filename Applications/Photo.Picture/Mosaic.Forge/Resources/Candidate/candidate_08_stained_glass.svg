<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1A0E2E"/>
      <stop offset="100%" stop-color="#0D0718"/>
    </radialGradient>
    <filter id="glassGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stained glass mosaic - irregular polygons with black borders -->
  <!-- Central rose window pattern -->
  <!-- Outer ring segments -->
  <polygon points="256,80 310,140 256,160 202,140" fill="#FF4444" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="310,140 390,130 390,200 310,190" fill="#FF8800" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="390,200 430,256 390,310 350,256" fill="#FFDD00" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="390,310 310,380 256,360 310,300" fill="#44CC44" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="256,360 202,380 122,310 180,300" fill="#2288FF" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="122,310 82,256 122,200 162,256" fill="#6633FF" opacity="0.8" stroke="#111" stroke-width="3"/>
  <polygon points="122,200 202,130 256,160 202,200" fill="#FF44AA" opacity="0.8" stroke="#111" stroke-width="3"/>
  <!-- Middle ring -->
  <polygon points="256,160 310,190 290,256 222,256 202,200" fill="#FF9944" opacity="0.85" stroke="#111" stroke-width="3"/>
  <polygon points="310,190 350,256 310,300 290,256" fill="#AAEE44" opacity="0.85" stroke="#111" stroke-width="3"/>
  <polygon points="310,300 256,360 222,300 290,256" fill="#44AAFF" opacity="0.85" stroke="#111" stroke-width="3"/>
  <polygon points="222,300 180,300 162,256 222,256" fill="#BB44FF" opacity="0.85" stroke="#111" stroke-width="3"/>
  <polygon points="202,200 222,256 162,256 122,200" fill="#FF6644" opacity="0.85" stroke="#111" stroke-width="3"/>
  <!-- Center gem -->
  <polygon points="256,200 290,256 256,310 222,256" fill="#FFFFFF" opacity="0.9" stroke="#111" stroke-width="3" filter="url(#glassGlow)"/>
  <!-- Corner decorations -->
  <polygon points="60,80 140,80 120,140 60,140" fill="#FF2244" opacity="0.7" stroke="#111" stroke-width="2"/>
  <polygon points="372,80 452,80 452,140 392,140" fill="#22AAFF" opacity="0.7" stroke="#111" stroke-width="2"/>
  <polygon points="60,372 120,372 140,432 60,432" fill="#44FF88" opacity="0.7" stroke="#111" stroke-width="2"/>
  <polygon points="392,372 452,372 452,432 372,432" fill="#FFAA22" opacity="0.7" stroke="#111" stroke-width="2"/>
</svg>
