  <rect x="148" y="215" width="28" height="40" rx="4" fill="url(#stone)"/>
  <rect x="192" y="215" width="28" height="40" rx="4" fill="url(#stone)"/>
  <rect x="236" y="215" width="28" height="40" rx="4" fill="url(#stone)"/>
  <rect x="280" y="215" width="28" height="40" rx="4" fill="url(#stone)"/>
  <rect x="324" y="215" width="28" height="40" rx="4" fill="url(#stone)"/>
  <!-- Gate -->
  <path d="M216 420 L216 320 Q256 280 296 320 L296 420Z" fill="#1a0d33"/>
  <!-- Portcullis lines -->
  <line x1="226" y1="320" x2="226" y2="420" stroke="#3a3050" stroke-width="4"/>
  <line x1="246" y1="320" x2="246" y2="420" stroke="#3a3050" stroke-width="4"/>
  <line x1="266" y1="320" x2="266" y2="420" stroke="#3a3050" stroke-width="4"/>
  <line x1="286" y1="320" x2="286" y2="420" stroke="#3a3050" stroke-width="4"/>
  <line x1="216" y1="350" x2="296" y2="350" stroke="#3a3050" stroke-width="4"/>
  <line x1="216" y1="380" x2="296" y2="380" stroke="#3a3050" stroke-width="4"/>
  <!-- Fire glow -->
  <ellipse cx="145" cy="195" rx="20" ry="20" fill="url(#glow)"/>
  <ellipse cx="367" cy="195" rx="20" ry="20" fill="url(#glow)"/>
  <!-- Torches -->
  <rect x="138" y="175" width="8" height="25" rx="2" fill="#8a6040"/>
  <ellipse cx="142" cy="173" rx="8" ry="10" fill="#ff9030"/>
  <rect x="366" y="175" width="8" height="25" rx="2" fill="#8a6040"/>
  <ellipse cx="370" cy="173" rx="8" ry="10" fill="#ff9030"/>
