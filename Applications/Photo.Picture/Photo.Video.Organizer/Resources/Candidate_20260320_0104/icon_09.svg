<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Web to Grid: chaos to order -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Left side: chaotic web / scattered -->
  <!-- Random scattered photo rectangles -->
  <rect x="130" y="200" width="80" height="60" rx="6" fill="#CE93D8" opacity="0.4" transform="rotate(20 170 230)"/>
  <rect x="200" y="310" width="80" height="60" rx="6" fill="#CE93D8" opacity="0.4" transform="rotate(-15 240 340)"/>
  <rect x="130" y="430" width="80" height="60" rx="6" fill="#CE93D8" opacity="0.4" transform="rotate(8 170 460)"/>
  <rect x="250" y="520" width="80" height="60" rx="6" fill="#CE93D8" opacity="0.4" transform="rotate(-20 290 550)"/>
  <rect x="170" y="620" width="80" height="60" rx="6" fill="#CE93D8" opacity="0.4" transform="rotate(14 210 650)"/>
  <!-- Web lines connecting chaos -->
  <line x1="170" y1="230" x2="240" y2="340" stroke="#4A148C" stroke-width="4" opacity="0.6"/>
  <line x1="240" y1="340" x2="170" y2="460" stroke="#4A148C" stroke-width="4" opacity="0.6"/>
  <line x1="170" y1="460" x2="290" y2="550" stroke="#4A148C" stroke-width="4" opacity="0.6"/>
  <line x1="290" y1="550" x2="210" y2="650" stroke="#4A148C" stroke-width="4" opacity="0.6"/>
  <line x1="170" y1="230" x2="290" y2="550" stroke="#4A148C" stroke-width="3" opacity="0.4"/>
  <!-- Arrow in center -->
  <path d="M400 440 L440 480 L400 520" stroke="#CE93D8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M440 480 L360 480" stroke="#CE93D8" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M480 390 L560 480 L480 570" stroke="#CE93D8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <!-- Right side: perfect grid -->
  <rect x="576" y="200" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="702" y="200" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="576" y="306" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="702" y="306" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="576" y="412" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="702" y="412" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="576" y="518" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <rect x="702" y="518" width="110" height="86" rx="10" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <!-- Grid photo dots -->
  <circle cx="610" cy="228" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="736" cy="228" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="610" cy="334" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="736" cy="334" r="10" fill="#CE93D8" opacity="0.7"/>
</svg>
