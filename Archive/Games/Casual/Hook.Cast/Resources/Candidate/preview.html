<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Hook.Cast - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #48cae4; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .card:hover { border-color: #48cae4; }
    .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .label { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .num { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Hook.Cast — Icon Candidates</h1>
  <p>낚시 후크 던지기 캐주얼 게임 아이콘 후보 10개</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_ocean_hook.svg" alt="ocean_hook"/>
      <div class="label">ocean_hook</div>
      <div class="num">#01</div>
    </div>
    <div class="card">
      <img src="candidate_02_cartoon_fish_colorful.svg" alt="cartoon_fish_colorful"/>
      <div class="label">cartoon_fish_colorful</div>
      <div class="num">#02</div>
    </div>
    <div class="card">
      <img src="candidate_03_retro_arcade_neon.svg" alt="retro_arcade_neon"/>
      <div class="label">retro_arcade_neon</div>
      <div class="num">#03</div>
    </div>
    <div class="card">
      <img src="candidate_04_sunset_lake.svg" alt="sunset_lake"/>
      <div class="label">sunset_lake</div>
      <div class="num">#04</div>
    </div>
    <div class="card">
      <img src="candidate_05_deep_sea_dark.svg" alt="deep_sea_dark"/>
      <div class="label">deep_sea_dark</div>
      <div class="num">#05</div>
    </div>
    <div class="card">
      <img src="candidate_06_hook_icon_minimal.svg" alt="hook_icon_minimal"/>
      <div class="label">hook_icon_minimal</div>
      <div class="num">#06</div>
    </div>
    <div class="card">
      <img src="candidate_07_pier_wooden.svg" alt="pier_wooden"/>
      <div class="label">pier_wooden</div>
      <div class="num">#07</div>
    </div>
    <div class="card">
      <img src="candidate_08_tropical_bright.svg" alt="tropical_bright"/>
      <div class="label">tropical_bright</div>
      <div class="num">#08</div>
    </div>
    <div class="card">
      <img src="candidate_09_geometric_minimal_white.svg" alt="geometric_minimal_white"/>
      <div class="label">geometric_minimal_white</div>
      <div class="num">#09</div>
    </div>
    <div class="card">
      <img src="candidate_10_chibistyle_cute.svg" alt="chibistyle_cute"/>
      <div class="label">chibistyle_cute</div>
      <div class="num">#10</div>
    </div>
  </div>
</body>
</html>
