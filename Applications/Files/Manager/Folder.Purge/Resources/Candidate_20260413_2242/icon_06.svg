<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#BF360C" stroke-width="16"/>
  <!-- Vacuum / suction device body -->
  <ellipse cx="620" cy="420" rx="180" ry="140" fill="#FF6B35" stroke="#BF360C" stroke-width="16"/>
  <!-- Vacuum nozzle (tube pointing left) -->
  <rect x="200" y="396" width="260" height="50" rx="24" fill="#BF360C" stroke="#7F0000" stroke-width="14"/>
  <!-- Suction vortex rings -->
  <ellipse cx="300" cy="421" rx="36" ry="52" fill="none" stroke="#FF9800" stroke-width="10" opacity="0.7"/>
  <ellipse cx="280" cy="421" rx="24" ry="36" fill="none" stroke="#FFB300" stroke-width="8" opacity="0.6"/>
  <ellipse cx="265" cy="421" rx="14" ry="22" fill="none" stroke="#FFD93D" stroke-width="6" opacity="0.5"/>
  <!-- Folders being sucked in -->
  <path d="M 160,330 L 160,378 L 228,378 L 228,348 L 208,330 L 184,330 Z" fill="#FCE4EC" stroke="#E91E63" stroke-width="10" transform="rotate(-15 194 354) translate(-20,-10)"/>
  <path d="M 154,440 L 154,482 L 220,482 L 220,454 L 202,440 L 178,440 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="10" transform="rotate(10 187 461) translate(-15,10)"/>
  <!-- Vacuum indicator (suction power) -->
  <text x="620" y="438" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">100%</text>
  <!-- Particle dots showing suction flow -->
  <circle cx="360" cy="400" r="10" fill="#E91E63" opacity="0.7"/>
  <circle cx="392" cy="415" r="8" fill="#FFD93D" opacity="0.6"/>
  <circle cx="420" cy="408" r="7" fill="#E91E63" opacity="0.5"/>
  <circle cx="342" cy="438" r="8" fill="#FF9800" opacity="0.55"/>
  <!-- PURGE badge -->
  <rect x="214" y="748" width="596" height="116" rx="36" fill="#BF360C" stroke="#7F0000" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">PURGE</text>
</svg>
