<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 별자리 글리프 패턴 -->
  <circle cx="180" cy="160" r="8" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="120" r="6" fill="#FBBF24" opacity="0.7"/>
  <circle cx="332" cy="160" r="8" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="240" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="312" cy="240" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="256" cy="310" r="10" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <!-- 연결선 -->
  <line x1="180" y1="160" x2="256" y2="120" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="120" x2="332" y2="160" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="160" x2="200" y2="240" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="160" x2="312" y2="240" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="240" x2="256" y2="310" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <line x1="312" y1="240" x2="256" y2="310" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>
  <!-- 이모지 심볼 -->
  <text x="256" y="200" text-anchor="middle" font-size="36" font-family="Segoe UI Emoji">✨</text>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">GLYPH CONSTELLATION</text>
</svg>
