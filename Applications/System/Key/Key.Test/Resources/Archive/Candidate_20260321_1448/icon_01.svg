  </g>
  <!-- 테스트 안됨 (어두움) -->
  <g fill="#222233" stroke="#2A2A40" stroke-width="1.5">
    <rect x="476" y="326" width="34" height="28" rx="5"/>
    <rect x="516" y="326" width="34" height="28" rx="5"/>
    <rect x="572" y="326" width="34" height="28" rx="5"/>
    <rect x="612" y="326" width="34" height="28" rx="5"/>
