<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 마젠타-보라 -->
  <defs>
    <linearGradient id="bg_sc03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_sc03)"/>

  <!-- 지팡이 본체 (대각선) -->
  <line x1="220" y1="800" x2="740" y2="200" stroke="url(#wandGrad)" stroke-width="52" stroke-linecap="round"/>
  <!-- 지팡이 내부 무늬 -->
  <line x1="240" y1="780" x2="720" y2="220" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.4" stroke-dasharray="40 30"/>

  <!-- 지팡이 손잡이 -->
  <circle cx="225" cy="795" r="44" fill="#8D6E63" stroke="#5D4037" stroke-width="12"/>
  <circle cx="225" cy="795" r="26" fill="#A1887F"/>

  <!-- 끝 부분 빛 폭발 -->
  <circle cx="735" cy="205" r="60" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="735" cy="205" r="40" fill="#FFF59D"/>
  <circle cx="735" cy="205" r="22" fill="white"/>

  <!-- 스파크들 — 지팡이 끝에서 뿜어지는 별들 -->
  <!-- 별 1 (큰, 오른쪽 위) -->
  <g transform="translate(850, 120) rotate(15)">
    <polygon points="0,-32 8,-10 32,-10 14,6 20,30 0,16 -20,30 -14,6 -32,-10 -8,-10" fill="#FFD600"/>
  </g>
  <!-- 별 2 (중간, 오른쪽) -->
  <g transform="translate(900, 280) rotate(-10)">
    <polygon points="0,-24 6,-8 24,-8 10,4 14,22 0,12 -14,22 -10,4 -24,-8 -6,-8" fill="#FF80AB"/>
  </g>
  <!-- 별 3 (작은, 위) -->
  <g transform="translate(680, 100) rotate(30)">
    <polygon points="0,-20 5,-6 20,-6 8,4 12,18 0,10 -12,18 -8,4 -20,-6 -5,-6" fill="#80D8FF"/>
  </g>
  <!-- 별 4 (큰, 왼쪽 위) -->
  <g transform="translate(580, 160) rotate(-20)">
    <polygon points="0,-28 7,-9 28,-9 12,5 18,26 0,14 -18,26 -12,5 -28,-9 -7,-9" fill="#EA80FC"/>
  </g>
  <!-- 별 5 -->
  <g transform="translate(820, 100) rotate(45)">
    <polygon points="0,-18 4,-5 18,-5 7,4 10,16 0,9 -10,16 -7,4 -18,-5 -4,-5" fill="#69FF47"/>
  </g>

  <!-- 코드 스파크 (지팡이 중간) -->
  <!-- { } -->
  <text x="780" y="450" font-family="Consolas, monospace" font-size="72" fill="#FFD600" font-weight="bold" opacity="0.9">{</text>
  <text x="840" y="450" font-family="Consolas, monospace" font-size="72" fill="#80D8FF" font-weight="bold" opacity="0.9">}</text>
  <!-- &lt;/&gt; -->
  <text x="140" y="400" font-family="Consolas, monospace" font-size="56" fill="#FFD600" opacity="0.7">&lt;/&gt;</text>
  <!-- # -->
  <text x="800" y="580" font-family="Consolas, monospace" font-size="68" fill="#EA80FC" opacity="0.8">#</text>

  <!-- "Cast" 텍스트 (하단) -->
  <text x="512" y="920" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="100" font-weight="900"
        fill="none" stroke="#FFD600" stroke-width="4" opacity="0.5">Cast</text>
  <text x="512" y="920" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="100" font-weight="900"
        fill="white" opacity="0.9">Cast</text>

  <!-- 작은 마법 원 장식 -->
  <circle cx="400" cy="700" r="18" fill="#FFD600" opacity="0.6"/>
  <circle cx="620" cy="750" r="12" fill="#80D8FF" opacity="0.6"/>
  <circle cx="300" cy="550" r="14" fill="#EA80FC" opacity="0.5"/>
</svg>
