<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7986CB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 모루 (Anvil) -->
  <ellipse cx="256" cy="370" rx="170" ry="30" fill="#283593"/>
  <rect x="156" y="290" width="200" height="80" rx="8" fill="url(#anvil)"/>
  <path d="M 116 290 Q 116 250 156 250 L 356 250 Q 420 250 420 290 Z" fill="url(#anvil)"/>
  <!-- 망치 -->
  <rect x="300" y="80" width="50" height="130" rx="10" fill="#FFCA28" transform="rotate(-30 300 80)"/>
  <rect x="260" y="60" width="90" height="60" rx="10" fill="#FFD740" transform="rotate(-30 260 60)"/>
  <!-- 스파크 (불꽃) -->
  <line x1="240" y1="240" x2="200" y2="160" stroke="url(#spark)" stroke-width="5" stroke-linecap="round"/>
  <line x1="260" y1="230" x2="240" y2="140" stroke="url(#spark)" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="240" x2="310" y2="150" stroke="url(#spark)" stroke-width="4" stroke-linecap="round"/>
  <!-- ICO 뱃지 -->
  <rect x="60" y="300" width="80" height="80" rx="16" fill="#1A237E" stroke="#9FA8DA" stroke-width="2"/>
  <text x="100" y="350" font-size="16" text-anchor="middle" fill="#C5CAE9" font-family="Segoe UI" font-weight="bold">.ICO</text>
  <text x="256" y="450" font-size="22" text-anchor="middle" fill="#9FA8DA" font-family="Segoe UI">Icon Forge</text>
</svg>