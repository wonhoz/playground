<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Port.Watch - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { color: #1E90FF; margin-bottom: 8px; font-size: 22px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item:hover { border-color: #1E90FF; background: #2a2a2a; }
  .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 20px; }
  .item span { font-size: 11px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Port.Watch — 아이콘 후보 10종</h1>
<p>네트워크 포트 모니터링 도구</p>
<div class="grid">
  <div class="item"><img src="candidate_01_port_scan_blue.svg"><span>01 port_scan_blue</span></div>
  <div class="item"><img src="candidate_02_network_green.svg"><span>02 network_green</span></div>
  <div class="item"><img src="candidate_03_eye_monitor_amber.svg"><span>03 eye_monitor_amber</span></div>
  <div class="item"><img src="candidate_04_lighthouse_teal.svg"><span>04 lighthouse_teal</span></div>
  <div class="item"><img src="candidate_05_socket_purple.svg"><span>05 socket_purple</span></div>
  <div class="item"><img src="candidate_06_firewall_red.svg"><span>06 firewall_red</span></div>
  <div class="item"><img src="candidate_07_pulse_cyan.svg"><span>07 pulse_cyan</span></div>
  <div class="item"><img src="candidate_08_telescope_navy.svg"><span>08 telescope_navy</span></div>
  <div class="item"><img src="candidate_09_shield_connection_emerald.svg"><span>09 shield_connection_emerald</span></div>
  <div class="item"><img src="candidate_10_matrix_port_orange.svg"><span>10 matrix_port_orange</span></div>
</div>
</body>
</html>
