<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hue.Flow — Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #f72585; letter-spacing: 2px; }
  p.sub { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 32px #f7258540; border-color: #f72585; }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card .label { margin-top: 10px; font-size: 12px; color: #aaa; line-height: 1.4; }
  .card .num { font-size: 18px; font-weight: bold; color: #f72585; }
</style>
</head>
<body>
<h1>Hue.Flow</h1>
<p class="sub">Color flow puzzle game — connect matching color dots | Icon Candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_color_flow_lines.svg" alt="01"/><div class="label"><span class="num">01</span><br>Color Flow Lines</div></div>
  <div class="card"><img src="candidate_02_hue_connection_art.svg" alt="02"/><div class="label"><span class="num">02</span><br>Hue Connection Art</div></div>
  <div class="card"><img src="candidate_03_color_dot_connect.svg" alt="03"/><div class="label"><span class="num">03</span><br>Color Dot Connect</div></div>
  <div class="card"><img src="candidate_04_rainbow_flow_puzzle.svg" alt="04"/><div class="label"><span class="num">04</span><br>Rainbow Flow Puzzle</div></div>
  <div class="card"><img src="candidate_05_hue_path_art.svg" alt="05"/><div class="label"><span class="num">05</span><br>Hue Path Art</div></div>
  <div class="card"><img src="candidate_06_color_snake_flow.svg" alt="06"/><div class="label"><span class="num">06</span><br>Color Snake Flow</div></div>
  <div class="card"><img src="candidate_07_dot_connect_colorful.svg" alt="07"/><div class="label"><span class="num">07</span><br>Dot Connect Colorful</div></div>
  <div class="card"><img src="candidate_08_flow_path_rainbow.svg" alt="08"/><div class="label"><span class="num">08</span><br>Flow Path Rainbow</div></div>
  <div class="card"><img src="candidate_09_hue_maze_art.svg" alt="09"/><div class="label"><span class="num">09</span><br>Hue Maze Art</div></div>
  <div class="card"><img src="candidate_10_color_connection.svg" alt="10"/><div class="label"><span class="num">10</span><br>Color Connection</div></div>
</div>
</body>
</html>
