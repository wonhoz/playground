<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
<!-- 컨셉: 주소 핀 + 경로선 -->
<!-- 경로선 (꺾이는 PATH) -->
<path d="M 240 760 L 240 460 Q 240 400 300 400 L 720 400 Q 780 400 780 340 L 780 240" fill="none" stroke="#2E7D32" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 경로 점들 -->
<circle cx="240" cy="760" r="28" fill="#66BB6A"/>
<circle cx="240" cy="580" r="20" fill="#2E7D32"/>
<circle cx="512" cy="400" r="20" fill="#2E7D32"/>
<circle cx="780" cy="320" r="20" fill="#2E7D32"/>
<!-- 핀 1 (시작, 하단) -->
<path d="M 180 760 Q 180 680 240 660 Q 300 680 300 760 Q 300 820 240 880 Q 180 820 180 760 Z" fill="#2E7D32"/>
<circle cx="240" cy="750" r="36" fill="#0A1A0A"/>
<circle cx="240" cy="750" r="18" fill="#66BB6A"/>
<!-- 핀 2 (끝, 상단) -->
<path d="M 720 240 Q 720 160 780 140 Q 840 160 840 240 Q 840 300 780 360 Q 720 300 720 240 Z" fill="#66BB6A"/>
<circle cx="780" cy="230" r="36" fill="#0A1A0A"/>
<circle cx="780" cy="230" r="18" fill="#2E7D32"/>
<!-- 경로 라벨들 (작은 직사각형) -->
<rect x="160" y="540" width="160" height="40" rx="10" fill="#1A2A1A" stroke="#2E7D32" stroke-width="12"/>
<rect x="400" y="360" width="224" height="40" rx="10" fill="#1A2A1A" stroke="#66BB6A" stroke-width="12"/>
</svg>
