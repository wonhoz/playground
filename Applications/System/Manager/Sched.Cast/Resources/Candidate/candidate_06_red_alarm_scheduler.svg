<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <radialGradient id="bell" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bell shape -->
  <path d="M 256 80 C 256 80 180 110 172 220 L 152 360 L 360 360 L 340 220 C 332 110 256 80 256 80 Z" fill="url(#bell)" opacity="0.9"/>
  <!-- Bell clapper -->
  <rect x="240" y="355" width="32" height="50" rx="14" fill="url(#red)"/>
  <!-- Bell handle -->
  <path d="M 240 80 Q 256 60 272 80" fill="none" stroke="url(#red)" stroke-width="10" stroke-linecap="round"/>
  <!-- Alarm rings -->
  <g fill="none" stroke="url(#red)" stroke-linecap="round" opacity="0.6">
    <path d="M 130 200 A 140 80 0 0 0 150 140" stroke-width="10"/>
    <path d="M 382 200 A 140 80 0 0 1 362 140" stroke-width="10"/>
  </g>
  <!-- Schedule bars at bottom -->
  <rect x="80" y="400" width="352" height="12" rx="5" fill="#2D0000"/>
  <rect x="80" y="400" width="180" height="12" rx="5" fill="url(#red)" opacity="0.8"/>
  <rect x="80" y="424" width="352" height="12" rx="5" fill="#2D0000"/>
  <rect x="80" y="424" width="260" height="12" rx="5" fill="url(#red)" opacity="0.5"/>
  <!-- Exclamation dot on bell -->
  <circle cx="256" cy="240" r="12" fill="#FFCDD2"/>
</svg>
