<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Web.Shot Icon Candidates</title>
<style>
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
  h1 { font-size: 1.4rem; color: #4FC3F7; margin-bottom: 8px; }
  p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img {
    width: 140px; height: 140px; border-radius: 28px;
    border: 1px solid #1e2a30;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }
  .item img:hover { transform: scale(1.12); box-shadow: 0 8px 32px rgba(79,195,247,0.35); }
  .label { font-size: 0.78rem; color: #888; }
</style>
</head>
<body>
<h1>Web.Shot — Icon Candidates</h1>
<p>bg=#000A10 · accent=#0277BD · accentLight=#4FC3F7 · 웹 스크린샷 도구</p>
<div class="grid">
  <div class="item"><img src="icon_01.svg" alt="01"><span class="label">01. 카메라+웹</span></div>
  <div class="item"><img src="icon_02.svg" alt="02"><span class="label">02. 스크린샷프레임</span></div>
  <div class="item"><img src="icon_03.svg" alt="03"><span class="label">03. 화살표+화면</span></div>
  <div class="item"><img src="icon_04.svg" alt="04"><span class="label">04. 잠망경</span></div>
  <div class="item"><img src="icon_05.svg" alt="05"><span class="label">05. 포탄발사</span></div>
  <div class="item"><img src="icon_06.svg" alt="06"><span class="label">06. 총+화면</span></div>
  <div class="item"><img src="icon_07.svg" alt="07"><span class="label">07. 레이저캡처</span></div>
  <div class="item"><img src="icon_08.svg" alt="08"><span class="label">08. 그물포획</span></div>
  <div class="item"><img src="icon_09.svg" alt="09"><span class="label">09. 완드+URL</span></div>
  <div class="item"><img src="icon_10.svg" alt="10"><span class="label">10. 새총발사</span></div>
</div>
</body>
</html>
