<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: metaphor · 실루엣 · 이미지 파일이 옷을 갈아입는 캐릭터 -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8BBD0"/>
      <stop offset="1" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg07)"/>
  <!-- 이미지 파일 캐릭터 -->
  <g>
    <!-- 몸체 (파일 모양) -->
    <path d="M 280 220 L 620 220 L 720 320 L 720 820 L 280 820 Z" fill="#FFFFFF" stroke="#4A148C" stroke-width="18" stroke-linejoin="round"/>
    <path d="M 620 220 L 620 320 L 720 320" fill="none" stroke="#4A148C" stroke-width="18" stroke-linejoin="round"/>
    <!-- 눈 -->
    <circle cx="420" cy="440" r="32" fill="#FFFFFF" stroke="#4A148C" stroke-width="8"/>
    <circle cx="560" cy="440" r="32" fill="#FFFFFF" stroke="#4A148C" stroke-width="8"/>
    <circle cx="420" cy="442" r="14" fill="#4A148C"/>
    <circle cx="560" cy="442" r="14" fill="#4A148C"/>
    <!-- 볼터치 -->
    <circle cx="360" cy="500" r="24" fill="#FFB6C1" opacity="0.8"/>
    <circle cx="620" cy="500" r="24" fill="#FFB6C1" opacity="0.8"/>
    <!-- 미소 -->
    <path d="M 430 540 Q 490 590 560 540" stroke="#4A148C" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- 포맷 라벨 (가슴) -->
    <rect x="360" y="620" width="260" height="120" rx="28" fill="#FFD93D" stroke="#B88A00" stroke-width="12"/>
    <text x="490" y="706" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#5C4000" text-anchor="middle">PNG</text>
  </g>
  <!-- 옷걸이에 걸린 다른 포맷들 -->
  <g>
    <rect x="760" y="260" width="180" height="120" rx="26" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
    <text x="850" y="344" font-family="Arial Black, sans-serif" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">JPG</text>
  </g>
  <g>
    <rect x="760" y="410" width="180" height="120" rx="26" fill="#06D6A0" stroke="#056B4F" stroke-width="10"/>
    <text x="850" y="494" font-family="Arial Black, sans-serif" font-weight="900" font-size="70" fill="#FFFFFF" text-anchor="middle">ICO</text>
  </g>
  <g>
    <rect x="760" y="560" width="200" height="120" rx="26" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10"/>
    <text x="860" y="644" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">WEBP</text>
  </g>
  <!-- 연결선 -->
  <line x1="720" y1="320" x2="760" y2="320" stroke="#4A148C" stroke-width="10"/>
  <line x1="720" y1="470" x2="760" y2="470" stroke="#4A148C" stroke-width="10"/>
  <line x1="720" y1="620" x2="760" y2="620" stroke="#4A148C" stroke-width="10"/>
  <!-- 스파클 -->
  <g fill="#FFFFFF">
    <circle cx="140" cy="300" r="16"/>
    <circle cx="180" cy="500" r="12"/>
    <circle cx="160" cy="700" r="14"/>
  </g>
</svg>
