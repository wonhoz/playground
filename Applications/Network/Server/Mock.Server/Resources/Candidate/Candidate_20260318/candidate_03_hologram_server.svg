<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 홀로그램 투영 기반 -->
  <rect x="186" y="380" width="140" height="30" rx="8" fill="#EC4899" opacity="0.4" filter="url(#glow)"/>
  <!-- 홀로그램 빔들 -->
  <path d="M 206 380 L 140 200 M 306 380 L 372 200" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <path d="M 220 380 L 170 200 M 292 380 L 342 200" stroke="#F472B6" stroke-width="1" stroke-dasharray="3,5" opacity="0.25"/>
  <!-- 홀로그램 서버 이미지 -->
  <rect x="140" y="140" width="232" height="180" rx="8" fill="#EC4899" opacity="0.05"/>
  <rect x="140" y="140" width="232" height="180" rx="8" fill="none" stroke="#EC4899" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <!-- 서버 내용 (홀로그램) -->
  <rect x="158" y="158" width="196" height="16" rx="8" fill="#EC4899" opacity="0.25" filter="url(#glow)"/>
  <rect x="158" y="182" width="196" height="16" rx="8" fill="#EC4899" opacity="0.2"/>
  <rect x="158" y="206" width="196" height="16" rx="8" fill="#EC4899" opacity="0.15"/>
  <rect x="158" y="230" width="196" height="16" rx="8" fill="#EC4899" opacity="0.12"/>
  <rect x="158" y="254" width="196" height="16" rx="8" fill="#EC4899" opacity="0.1"/>
  <rect x="158" y="278" width="120" height="16" rx="8" fill="#EC4899" opacity="0.08"/>
  <!-- MOCK 레이블 -->
  <text x="256" y="455" text-anchor="middle" fill="#EC4899" font-size="16" font-family="monospace" font-weight="bold" filter="url(#glow)">HOLOGRAM MOCK</text>
  <!-- 홀로그램 스캔 라인들 -->
  <line x1="140" y1="170" x2="372" y2="170" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="195" x2="372" y2="195" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="220" x2="372" y2="220" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="245" x2="372" y2="245" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="270" x2="372" y2="270" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="295" x2="372" y2="295" stroke="#EC4899" stroke-width="0.5" opacity="0.2"/>
</svg>