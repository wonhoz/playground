<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Alarm clock -->
  <circle cx="512" cy="520" r="260" fill="none" stroke="#FF6F00" stroke-width="40"/>
  <!-- Bell feet -->
  <line x1="360" y1="780" x2="300" y2="840" stroke="#FF6F00" stroke-width="36" stroke-linecap="round"/>
  <line x1="664" y1="780" x2="724" y2="840" stroke="#FF6F00" stroke-width="36" stroke-linecap="round"/>
  <!-- Bell on top -->
  <circle cx="380" cy="320" r="44" fill="#FFA726"/>
  <circle cx="644" cy="320" r="44" fill="#FFA726"/>
  <!-- Clock hands -->
  <line x1="512" y1="520" x2="512" y2="320" stroke="#FFA726" stroke-width="30" stroke-linecap="round"/>
  <line x1="512" y1="520" x2="640" y2="580" stroke="#FF6F00" stroke-width="24" stroke-linecap="round"/>
  <circle cx="512" cy="520" r="20" fill="#FFA726"/>
  <!-- Tick marks -->
  <line x1="512" y1="276" x2="512" y2="316" stroke="#FF6F00" stroke-width="20" stroke-linecap="round"/>
  <line x1="512" y1="724" x2="512" y2="764" stroke="#FF6F00" stroke-width="20" stroke-linecap="round"/>
  <line x1="276" y1="520" x2="316" y2="520" stroke="#FF6F00" stroke-width="20" stroke-linecap="round"/>
  <line x1="708" y1="520" x2="748" y2="520" stroke="#FF6F00" stroke-width="20" stroke-linecap="round"/>
</svg>
