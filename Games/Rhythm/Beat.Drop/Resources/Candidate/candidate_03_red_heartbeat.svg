<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0808"/>
    </linearGradient>
    <linearGradient id="beat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Heartbeat/ECG line -->
  <polyline points="56,280 130,280 155,240 175,320 200,200 225,360 248,280 260,280 280,260 300,300 320,280 456,280" fill="none" stroke="url(#beat)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Music note drop -->
  <circle cx="256" cy="140" r="30" fill="#FF4444" opacity="0.9"/>
  <path d="M256,110 Q270,90 280,100 Q280,120 256,140 Q232,120 232,100 Q242,90 256,110 Z" fill="#FF8888" opacity="0.5"/>
  <!-- Music note -->
  <circle cx="256" cy="380" r="22" fill="#FF4444"/>
  <rect x="274" y="330" width="8" height="54" rx="4" fill="#FF4444"/>
  <path d="M282,330 Q330,320 326,345 Q322,355 282,355" fill="#FF4444"/>
</svg>