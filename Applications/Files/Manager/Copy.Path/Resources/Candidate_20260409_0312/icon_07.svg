<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c7"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Deep indigo background -->
  <rect width="1024" height="1024" rx="190" fill="#1E1B4B"/>
  <g clip-path="url(#c7)">
    <!-- Decorative glow behind menu -->
    <rect x="188" y="228" width="648" height="578" rx="32" fill="#312E81" opacity="0.6"/>
    <!-- Layer 2: Context menu panel (white) -->
    <rect x="208" y="244" width="608" height="542" rx="20" fill="white"/>
    <!-- Menu header separator -->
    <line x1="208" y1="306" x2="816" y2="306" stroke="#F3F4F6" stroke-width="4"/>
    <!-- Layer 3: Menu items -->
    <!-- Normal item 1 -->
    <text x="250" y="296" font-family="Arial,sans-serif" font-size="80" fill="#374151" font-weight="normal">Open</text>
    <!-- Highlighted item (Copy Path) -->
    <rect x="208" y="316" width="608" height="106" rx="10" fill="#FEF3C7"/>
    <rect x="208" y="316" width="6" height="106" rx="3" fill="#F59E0B"/>
    <text x="250" y="390" font-family="Arial,sans-serif" font-size="82" fill="#92400E" font-weight="bold">Copy Path</text>
    <!-- Copy icon indicator on highlighted row -->
    <rect x="700" y="338" width="80" height="62" rx="8" fill="#FBBF24" opacity="0.6"/>
    <rect x="718" y="328" width="80" height="62" rx="8" fill="#F59E0B"/>
    <!-- Separator line -->
    <line x1="228" y1="432" x2="796" y2="432" stroke="#F3F4F6" stroke-width="4"/>
    <!-- Normal item 2 -->
    <text x="250" y="516" font-family="Arial,sans-serif" font-size="80" fill="#374151" font-weight="normal">Rename</text>
    <!-- Normal item 3 -->
    <text x="250" y="620" font-family="Arial,sans-serif" font-size="80" fill="#374151" font-weight="normal">Delete</text>
    <!-- Normal item 4 -->
    <text x="250" y="724" font-family="Arial,sans-serif" font-size="80" fill="#374151" font-weight="normal">Properties</text>
    <!-- Cursor arrow pointing at Copy Path row -->
    <polygon points="820,354 820,438 870,396" fill="#FCD34D"/>
    <polygon points="820,354 822,356 870,396 822,436 820,438" fill="none" stroke="#92400E" stroke-width="4"/>
  </g>
</svg>
