<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a10"/>
      <stop offset="100%" stop-color="#002a18"/>
    </linearGradient>
    <linearGradient id="arr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00acc1"/>
    </linearGradient>
    <linearGradient id="arr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- big circular rotate arrows -->
  <!-- top arrow: clockwise -->
  <path d="M130 256 Q130 150 256 130" stroke="url(#arr1)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <polygon points="256,130 238,112 270,112" fill="#00e5ff"/>
  <!-- bottom arrow: counterclockwise -->
  <path d="M382 256 Q382 362 256 382" stroke="url(#arr2)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <polygon points="256,382 274,400 242,400" fill="#69f0ae"/>
  <!-- center circle -->
  <circle cx="256" cy="256" r="80" fill="#003030"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#00acc1" stroke-width="4" opacity="0.5"/>
  <!-- inner icon: network node -->
  <circle cx="256" cy="256" r="22" fill="#00acc1" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="white"/>
  <!-- connection lines -->
  <line x1="256" y1="234" x2="256" y2="200" stroke="#00e5ff" stroke-width="4" opacity="0.6"/>
  <line x1="275" y1="268" x2="302" y2="292" stroke="#00e5ff" stroke-width="4" opacity="0.6"/>
  <line x1="237" y1="268" x2="210" y2="292" stroke="#69f0ae" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="196" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="308" cy="296" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="204" cy="296" r="10" fill="#69f0ae" filter="url(#glow)"/>
</svg>
