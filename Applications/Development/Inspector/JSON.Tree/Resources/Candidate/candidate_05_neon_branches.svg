<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ccaa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trunk -->
  <rect x="246" y="80" width="20" height="200" rx="10" fill="url(#trunk)" opacity="0.85"/>
  <!-- Main branches -->
  <line x1="256" y1="170" x2="120" y2="240" stroke="#00ffcc" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="210" x2="392" y2="260" stroke="#00ffcc" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="240" x2="110" y2="310" stroke="#00ccaa" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="260" x2="402" y2="330" stroke="#00ccaa" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- Sub-branches -->
  <line x1="120" y1="240" x2="60" y2="290" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <line x1="120" y1="240" x2="80" y2="310" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <line x1="392" y1="260" x2="440" y2="310" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <line x1="392" y1="260" x2="420" y2="330" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <line x1="110" y1="310" x2="60" y2="360" stroke="#00ccaa" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <line x1="110" y1="310" x2="90" y2="370" stroke="#00ccaa" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <line x1="402" y1="330" x2="440" y2="370" stroke="#00ccaa" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- Node circles with value labels -->
  <circle cx="256" cy="76" r="20" fill="#00ffcc" opacity="0.9"/>
  <text x="256" y="82" text-anchor="middle" font-family="monospace" font-size="11" fill="#001a14">{}</text>
  <circle cx="120" cy="240" r="16" fill="#00ffcc" opacity="0.8"/>
  <text x="120" y="245" text-anchor="middle" font-family="monospace" font-size="9" fill="#001a14">"k"</text>
  <circle cx="392" cy="260" r="16" fill="#00ffcc" opacity="0.8"/>
  <text x="392" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#001a14">[]</text>
  <circle cx="60" cy="290" r="11" fill="#00ccaa" opacity="0.7"/>
  <circle cx="80" cy="310" r="11" fill="#00ccaa" opacity="0.7"/>
  <circle cx="440" cy="310" r="11" fill="#00ccaa" opacity="0.7"/>
  <circle cx="420" cy="330" r="11" fill="#00ccaa" opacity="0.7"/>
  <circle cx="60" cy="360" r="7" fill="#009977" opacity="0.65"/>
  <circle cx="90" cy="370" r="7" fill="#009977" opacity="0.65"/>
  <circle cx="440" cy="370" r="7" fill="#009977" opacity="0.65"/>
  <!-- Glow halos -->
  <circle cx="256" cy="76" r="30" fill="#00ffcc" opacity="0.12"/>
  <circle cx="120" cy="240" r="24" fill="#00ffcc" opacity="0.1"/>
  <circle cx="392" cy="260" r="24" fill="#00ffcc" opacity="0.1"/>
  <!-- Label -->
  <text x="256" y="455" text-anchor="middle" font-family="monospace" font-size="16" letter-spacing="3" fill="#00ffcc" opacity="0.5">JSON TREE</text>
</svg>
