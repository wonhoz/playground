<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 방송 신호 반원들 -->
  <path d="M 160 300 A 96 96 0 0 1 352 300" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <path d="M 185 300 A 71 71 0 0 1 327 300" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.5"/>
  <path d="M 210 300 A 46 46 0 0 1 302 300" fill="none" stroke="#60A5FA" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 235 300 A 21 21 0 0 1 277 300" fill="none" stroke="#3B82F6" stroke-width="4" filter="url(#glow)"/>
  <!-- 타워 안테나 -->
  <line x1="256" y1="300" x2="256" y2="120" stroke="#3B82F6" stroke-width="4" filter="url(#glow)"/>
  <line x1="236" y1="180" x2="256" y2="160" stroke="#3B82F6" stroke-width="2.5" opacity="0.7"/>
  <line x1="276" y1="180" x2="256" y2="160" stroke="#3B82F6" stroke-width="2.5" opacity="0.7"/>
  <line x1="220" y1="220" x2="256" y2="200" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  <line x1="292" y1="220" x2="256" y2="200" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  <!-- 타워 꼭대기 -->
  <circle cx="256" cy="110" r="12" fill="#3B82F6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="110" r="20" fill="#3B82F6" opacity="0.1"/>
  <!-- 타워 기반 -->
  <rect x="244" y="300" width="24" height="80" rx="4" fill="#3B82F6" opacity="0.5"/>
  <rect x="210" y="380" width="92" height="20" rx="6" fill="#3B82F6" opacity="0.3"/>
  <!-- 클라이언트들 -->
  <rect x="90" y="370" width="60" height="45" rx="6" fill="#3B82F6" opacity="0.15"/>
  <rect x="90" y="370" width="60" height="45" rx="6" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <rect x="362" y="370" width="60" height="45" rx="6" fill="#3B82F6" opacity="0.15"/>
  <rect x="362" y="370" width="60" height="45" rx="6" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.5"/>
  <!-- 전송 선들 -->
  <line x1="150" y1="370" x2="220" y2="400" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="362" y1="392" x2="302" y2="400" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
</svg>