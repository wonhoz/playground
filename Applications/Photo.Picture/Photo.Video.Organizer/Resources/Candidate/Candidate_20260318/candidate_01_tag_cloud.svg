  <rect x="272" y="155" width="84" height="34" rx="17" fill="#0d2020" stroke="#10B981" stroke-width="1.5" opacity="0.8"/>
  <text x="314" y="177" text-anchor="middle" font-size="12" fill="#10B981" opacity="0.85">Wedding</text>
  <rect x="366" y="155" width="100" height="36" rx="18" fill="#0d2020" stroke="#34D399" stroke-width="1.5" opacity="0.8"/>
