<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#022C22"/>
  <!-- Terminal window frame -->
  <rect x="140" y="220" width="744" height="510" rx="18" fill="#0F2318"/>
  <!-- Terminal title bar -->
  <rect x="140" y="220" width="744" height="48" rx="18" fill="#0A1F12"/>
  <rect x="140" y="248" width="744" height="20" fill="#0A1F12"/>
  <!-- Traffic light dots -->
  <circle cx="185" cy="244" r="10" fill="#EF4444"/>
  <circle cx="215" cy="244" r="10" fill="#F59E0B"/>
  <circle cx="245" cy="244" r="10" fill="#10B981"/>
  <!-- Terminal title -->
  <text x="512" y="250" font-family="Consolas,monospace" font-size="16" fill="#4ADE80" text-anchor="middle" opacity="0.6">Prompt.Forge — Terminal</text>
  <!-- Layer 2: Terminal content -->
  <!-- Previous lines (dim) -->
  <text x="175" y="320" font-family="Consolas,monospace" font-size="22" fill="#166534" opacity="0.6">$ prompt list --tag AI</text>
  <text x="175" y="354" font-family="Consolas,monospace" font-size="20" fill="#4ADE80" opacity="0.5">  [1] 번역 프롬프트       v3</text>
  <text x="175" y="384" font-family="Consolas,monospace" font-size="20" fill="#4ADE80" opacity="0.5">  [2] 요약 프롬프트       v2</text>
  <text x="175" y="414" font-family="Consolas,monospace" font-size="20" fill="#4ADE80" opacity="0.4">  [3] 코드리뷰 프롬프트   v1</text>
  <!-- Divider -->
  <line x1="175" y1="438" x2="840" y2="438" stroke="#166534" stroke-width="1" opacity="0.5"/>
  <!-- Layer 3: Main active prompt line -->
  <text x="175" y="490" font-family="Consolas,monospace" font-size="34" fill="#86EFAC" font-weight="bold">&gt;&nbsp;</text>
  <text x="225" y="490" font-family="Consolas,monospace" font-size="34" fill="#4ADE80">prompt_</text>
  <!-- Cursor block -->
  <rect x="547" y="462" width="20" height="34" rx="2" fill="#4ADE80" opacity="0.9"/>
  <!-- Bottom status bar -->
  <rect x="140" y="696" width="744" height="34" rx="8" fill="#0A1F12"/>
  <text x="175" y="718" font-family="Consolas,monospace" font-size="14" fill="#166534">●&nbsp;Prompt.Forge&nbsp;v2.1&nbsp;&nbsp;|&nbsp;&nbsp;총 42개</text>
</svg>