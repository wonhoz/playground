<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#2a1500"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="pkt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pipe channel -->
  <rect x="70" y="228" width="372" height="56" rx="28" fill="url(#pipe)" opacity="0.3" stroke="#ffb74d" stroke-width="2"/>
  <!-- Event packets flowing through -->
  <rect x="90" y="240" width="52" height="32" rx="10" fill="url(#pkt)"/>
  <text x="116" y="261" font-family="monospace" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">EVT</text>
  <rect x="168" y="240" width="52" height="32" rx="10" fill="url(#pkt)" opacity="0.85"/>
  <text x="194" y="261" font-family="monospace" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">MSG</text>
  <rect x="246" y="240" width="52" height="32" rx="10" fill="url(#pkt)" opacity="0.7"/>
  <text x="272" y="261" font-family="monospace" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">SIG</text>
  <rect x="324" y="240" width="52" height="32" rx="10" fill="url(#pkt)" opacity="0.5"/>
  <!-- Source node left -->
  <circle cx="70" cy="256" r="32" fill="#e65100" stroke="#ffb74d" stroke-width="3"/>
  <text x="70" y="262" font-family="monospace" font-size="14" fill="#fff3e0" text-anchor="middle" font-weight="bold">SRC</text>
  <!-- Sink node right -->
  <circle cx="442" cy="256" r="32" fill="#1a0e00" stroke="#ffb74d" stroke-width="3"/>
  <text x="442" y="262" font-family="monospace" font-size="14" fill="#ffb74d" text-anchor="middle" font-weight="bold">SNK</text>
  <!-- Process nodes above/below -->
  <rect x="170" y="130" width="80" height="44" rx="10" fill="#3e2000" stroke="#ffb74d" stroke-width="2"/>
  <text x="210" y="157" font-family="monospace" font-size="12" fill="#ffb74d" text-anchor="middle">FILTER</text>
  <line x1="210" y1="174" x2="210" y2="228" stroke="#ffb74d" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="262" y="338" width="80" height="44" rx="10" fill="#3e2000" stroke="#ffb74d" stroke-width="2"/>
  <text x="302" y="365" font-family="monospace" font-size="12" fill="#ffb74d" text-anchor="middle">TRANSFORM</text>
  <line x1="302" y1="284" x2="302" y2="338" stroke="#ffb74d" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Flow arrow -->
  <polygon points="442,232 420,220 420,244" fill="#ffb74d"/>
</svg>
