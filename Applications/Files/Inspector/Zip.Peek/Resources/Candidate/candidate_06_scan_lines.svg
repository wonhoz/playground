<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="zipFile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ZIP 파일 아이콘 (큰 것) -->
  <rect x="146" y="100" width="220" height="270" rx="12" fill="url(#zipFile)" stroke="#374151" stroke-width="2"/>
  <!-- 파일 접힌 모서리 -->
  <polygon points="306,100 366,100 366,160 306,160" fill="#1f2937"/>
  <polygon points="306,100 366,160 306,160" fill="#111827"/>
  <line x1="306" y1="100" x2="366" y2="160" stroke="#374151" stroke-width="1.5"/>
  <!-- 파일 내부 텍스트 -->
  <rect x="166" y="176" width="120" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="196" width="160" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="216" width="100" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="236" width="140" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="256" width="80" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="276" width="130" height="10" rx="2" fill="#374151"/>
  <rect x="166" y="296" width="110" height="10" rx="2" fill="#374151"/>
  <!-- ZIP 레이블 -->
  <rect x="166" y="326" width="80" height="28" rx="6" fill="#fbbf24" opacity="0.9"/>
  <text x="206" y="345" font-family="Arial" font-weight="bold" font-size="16" fill="#1c1400" text-anchor="middle">ZIP</text>
  <!-- 스캔 라인 (움직이는 효과 - 고정 표현) -->
  <rect x="146" y="230" width="220" height="40" fill="url(#scanLine)" filter="url(#neon)"/>
  <!-- 스캔 포인터 선 -->
  <line x1="146" y1="250" x2="366" y2="250" stroke="#39ff14" stroke-width="2.5" filter="url(#neon)"/>
  <!-- 스캔 중인 파일 정보 (오른쪽) -->
  <rect x="384" y="220" width="88" height="60" rx="8" fill="#001a00" stroke="#39ff14" stroke-width="1.5" filter="url(#neon)"/>
  <text x="428" y="243" font-family="'Courier New',monospace" font-size="10" fill="#39ff14" text-anchor="middle">file.csv</text>
  <text x="428" y="258" font-family="'Courier New',monospace" font-size="10" fill="#39ff14" text-anchor="middle">2.4 MB</text>
  <text x="428" y="272" font-family="'Courier New',monospace" font-size="9" fill="#00cc00" text-anchor="middle">OK</text>
  <!-- 연결선 -->
  <line x1="366" y1="250" x2="384" y2="250" stroke="#39ff14" stroke-width="1.5" opacity="0.7" filter="url(#neon)"/>
  <!-- 하단 통계 -->
  <rect x="146" y="392" width="220" height="36" rx="8" fill="#001a00" stroke="#39ff14" stroke-width="1.5"/>
  <text x="256" y="414" font-family="'Courier New',monospace" font-size="13" fill="#39ff14" text-anchor="middle" filter="url(#neon)">SCANNING... 38%</text>
</svg>
