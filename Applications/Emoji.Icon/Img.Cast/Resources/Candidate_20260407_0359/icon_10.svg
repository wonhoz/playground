<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 라벤더 파스텔 -->
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>

  <!-- Layer 2: 2×2 포맷 격자 (SVG/PNG/JPG/ICO) -->
  <!-- SVG 칸 (좌상) -->
  <rect x="120" y="180" width="360" height="280" rx="32" fill="#FF7043"/>
  <text x="300" y="348" font-family="Arial Black" font-size="120" fill="white" text-anchor="middle">SVG</text>

  <!-- PNG 칸 (우상) -->
  <rect x="544" y="180" width="360" height="280" rx="32" fill="#29B6F6"/>
  <text x="724" y="348" font-family="Arial Black" font-size="120" fill="white" text-anchor="middle">PNG</text>

  <!-- JPG 칸 (좌하) -->
  <rect x="120" y="524" width="360" height="280" rx="32" fill="#FFC107"/>
  <text x="300" y="692" font-family="Arial Black" font-size="120" fill="white" text-anchor="middle">JPG</text>

  <!-- ICO 칸 (우하) -->
  <rect x="544" y="524" width="360" height="280" rx="32" fill="#AB47BC"/>
  <text x="724" y="692" font-family="Arial Black" font-size="120" fill="white" text-anchor="middle">ICO</text>

  <!-- Layer 3: 중앙 변환 포인트 (교차점에 화살표 원) -->
  <circle cx="512" cy="512" r="68" fill="white"/>
  <circle cx="512" cy="512" r="60" fill="#7E57C2"/>
  <!-- 양방향 화살표 -->
  <path d="M460,512 L564,512" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M548,492 L572,512 L548,532" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M476,492 L452,512 L476,532" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 하단 BMP 추가 작은 뱃지 -->
  <rect x="388" y="856" width="248" height="68" rx="34" fill="#66BB6A"/>
  <text x="512" y="902" font-family="Arial Black" font-size="48" fill="white" text-anchor="middle">+ BMP</text>
</svg>
