<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zip.Peek — 아이콘 후보 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .card { background: #252535; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: border-color .2s; }
    .card:hover { border-color: #666; }
    .card img { width: 100%; max-width: 160px; height: 160px; object-fit: contain; display: block; margin: 0 auto 12px; }
    .card .num  { font-size: 11px; color: #555; margin-bottom: 4px; }
    .card .name { font-size: 13px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Zip.Peek — 아이콘 후보</h1>
  <p>ZIP·압축 파일 내용 미리보기 | 10개 디자인 컨셉</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_zipper_eye.svg" alt="zipper_eye">
      <div class="num">#01</div>
      <div class="name">zipper_eye</div>
    </div>
    <div class="card">
      <img src="candidate_02_archive_folder.svg" alt="archive_folder">
      <div class="num">#02</div>
      <div class="name">archive_folder</div>
    </div>
    <div class="card">
      <img src="candidate_03_file_tree.svg" alt="file_tree">
      <div class="num">#03</div>
      <div class="name">file_tree</div>
    </div>
    <div class="card">
      <img src="candidate_04_magnify_blue.svg" alt="magnify_blue">
      <div class="num">#04</div>
      <div class="name">magnify_blue</div>
    </div>
    <div class="card">
      <img src="candidate_05_box_open.svg" alt="box_open">
      <div class="num">#05</div>
      <div class="name">box_open</div>
    </div>
    <div class="card">
      <img src="candidate_06_scan_lines.svg" alt="scan_lines">
      <div class="num">#06</div>
      <div class="name">scan_lines</div>
    </div>
    <div class="card">
      <img src="candidate_07_compression_wave.svg" alt="compression_wave">
      <div class="num">#07</div>
      <div class="name">compression_wave</div>
    </div>
    <div class="card">
      <img src="candidate_08_peek_window.svg" alt="peek_window">
      <div class="num">#08</div>
      <div class="name">peek_window</div>
    </div>
    <div class="card">
      <img src="candidate_09_extract_burst.svg" alt="extract_burst">
      <div class="num">#09</div>
      <div class="name">extract_burst</div>
    </div>
    <div class="card">
      <img src="candidate_10_xray_archive.svg" alt="xray_archive">
      <div class="num">#10</div>
      <div class="name">xray_archive</div>
    </div>
  </div>
</body>
</html>
