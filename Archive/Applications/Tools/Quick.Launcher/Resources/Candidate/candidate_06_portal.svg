<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000510"/>
      <stop offset="100%" style="stop-color:#001030"/>
    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00EEFF"/>
      <stop offset="40%" style="stop-color:#0055FF"/>
      <stop offset="70%" style="stop-color:#5500AA"/>
      <stop offset="100%" style="stop-color:#110022"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#88EEFF"/>
      <stop offset="100%" style="stop-color:#0033BB"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Portal rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0044AA" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#0066CC" stroke-width="4" opacity="0.5"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#0088EE" stroke-width="5" opacity="0.6"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#00AAFF" stroke-width="6" opacity="0.7"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#00CCFF" stroke-width="8" opacity="0.8"/>
  <!-- Portal center -->
  <circle cx="256" cy="256" r="85" fill="url(#portal)"/>
  <circle cx="256" cy="256" r="50" fill="url(#inner)" opacity="0.9"/>
  <!-- Arrow through portal -->
  <path d="M 200 256 L 240 230 L 240 245 L 290 245 L 290 267 L 240 267 L 240 282 Z" fill="white" opacity="0.95"/>
  <!-- Sparkles -->
  <circle cx="130" cy="160" r="4" fill="#00CCFF" opacity="0.7"/>
  <circle cx="380" cy="140" r="3" fill="#0088FF" opacity="0.6"/>
  <circle cx="400" cy="360" r="4" fill="#00CCFF" opacity="0.7"/>
  <circle cx="110" cy="380" r="3" fill="#0088FF" opacity="0.5"/>
</svg>
