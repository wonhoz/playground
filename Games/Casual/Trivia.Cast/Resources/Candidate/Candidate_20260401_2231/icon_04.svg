<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="bulb04" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <radialGradient id="glow04" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Glow effect -->
  <ellipse cx="512" cy="440" rx="320" ry="310" fill="url(#glow04)"/>

  <!-- Layer 2: Light bulb -->
  <!-- Bulb body -->
  <path d="M512 180 C380 180 290 270 290 390 C290 470 330 530 390 575 L390 640 L634 640 L634 575 C694 530 734 470 734 390 C734 270 644 180 512 180 Z"
    fill="url(#bulb04)" stroke="#FFB300" stroke-width="8"/>
  <!-- Bulb base ridges -->
  <rect x="390" y="648" width="244" height="36" rx="8" fill="#FFB300" opacity="0.9"/>
  <rect x="400" y="692" width="224" height="36" rx="8" fill="#F9A825" opacity="0.9"/>
  <rect x="420" y="736" width="184" height="36" rx="8" fill="#F57F17" opacity="0.9"/>
  <!-- Screw base -->
  <rect x="440" y="780" width="144" height="50" rx="25" fill="#E65100"/>

  <!-- Layer 3: Checkmark inside bulb (정답!) -->
  <path d="M400 400 L470 470 L630 310" fill="none" stroke="#7B1FA2" stroke-width="56"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Light rays -->
  <line x1="512" y1="100" x2="512" y2="50" stroke="#FFF176" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  <line x1="650" y1="140" x2="690" y2="100" stroke="#FFF176" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <line x1="374" y1="140" x2="334" y2="100" stroke="#FFF176" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <line x1="760" y1="290" x2="810" y2="270" stroke="#FFF176" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
  <line x1="264" y1="290" x2="214" y2="270" stroke="#FFF176" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
  <line x1="800" y1="450" x2="855" y2="450" stroke="#FFF176" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="224" y1="450" x2="169" y2="450" stroke="#FFF176" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <!-- Correct label -->
  <text x="512" y="940" font-family="'Segoe UI',Arial,sans-serif" font-size="84" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">CORRECT!</text>
</svg>
