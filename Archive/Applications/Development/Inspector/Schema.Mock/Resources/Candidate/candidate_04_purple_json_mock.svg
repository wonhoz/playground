  <!-- Brace line 1 { -->
  <rect x="112" y="114" width="16" height="10" rx="3" fill="#CE93D8"/>
  <!-- Keys and values -->
  <rect x="136" y="140" width="60" height="10" rx="3" fill="url(#key)"/>
