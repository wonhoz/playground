<!-- Layout.Forge icon_03: 중첩 사각형 (nested rectangles: UI hierarchy) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Outermost frame -->
  <rect x="160" y="200" width="704" height="624" rx="32" fill="none" stroke="#3949AB" stroke-width="36"/>
  <!-- Middle frame -->
  <rect x="280" y="320" width="464" height="384" rx="24" fill="none" stroke="#5C6BC0" stroke-width="28"/>
  <!-- Inner frame -->
  <rect x="380" y="420" width="264" height="184" rx="16" fill="#3949AB"/>
  <!-- Innermost dot -->
  <circle cx="512" cy="512" r="36" fill="#5C6BC0"/>
</svg>
