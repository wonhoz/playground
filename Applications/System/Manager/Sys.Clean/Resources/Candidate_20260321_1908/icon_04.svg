<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c4-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c4-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#D4F0FF"/>
    </linearGradient>
    <linearGradient id="c4-cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDF7FF"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c4-clip)">
    <!-- Sky background -->
    <rect width="1024" height="1024" fill="url(#c4-sky)"/>

    <!-- Dirty cloud (left, gray) - dissolving -->
    <ellipse cx="300" cy="460" rx="170" ry="100" fill="#B0B8C4" opacity="0.70"/>
    <ellipse cx="230" cy="490" rx="100" ry="70" fill="#9AA4B0" opacity="0.60"/>
    <ellipse cx="380" cy="490" rx="110" ry="65" fill="#B0B8C4" opacity="0.55"/>
    <ellipse cx="310" cy="400" rx="120" ry="80" fill="#A8B2BF" opacity="0.50"/>
    <!-- Dissolve dots from dirty cloud -->
    <circle cx="470" cy="420" r="14" fill="#B8C2CC" opacity="0.40"/>
    <circle cx="495" cy="460" r="9" fill="#B8C2CC" opacity="0.30"/>
    <circle cx="480" cy="490" r="7" fill="#B8C2CC" opacity="0.25"/>

    <!-- Clean cloud (right, white) -->
    <ellipse cx="680" cy="380" rx="190" ry="110" fill="url(#c4-cloud)"/>
    <ellipse cx="600" cy="410" rx="120" ry="80" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="770" cy="410" rx="130" ry="78" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="690" cy="330" rx="130" ry="90" fill="#FFFFFF" opacity="0.90"/>

    <!-- Sun rays top-right -->
    <circle cx="830" cy="200" r="56" fill="#FFD700" opacity="0.90"/>
    <line x1="830" y1="128" x2="830" y2="108" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <line x1="882" y1="148" x2="896" y2="134" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <line x1="902" y1="200" x2="922" y2="200" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

    <!-- Ground: clean floor line -->
    <rect x="0" y="740" width="1024" height="284" fill="#C8EAFF" opacity="0.60"/>
    <!-- Floor shine -->
    <ellipse cx="512" cy="742" rx="400" ry="18" fill="#FFFFFF" opacity="0.40"/>

    <!-- Checkmark on ground (clean result) -->
    <circle cx="512" cy="820" r="72" fill="#FFFFFF" opacity="0.85"/>
    <polyline points="472,820 500,852 556,788"
              fill="none" stroke="#2ECC71" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Sparkles around clean cloud -->
    <circle cx="560" cy="300" r="6" fill="#FFD700" opacity="0.9"/>
    <line x1="560" y1="288" x2="560" y2="312" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="548" y1="300" x2="572" y2="300" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <circle cx="780" cy="320" r="5" fill="#FFD700" opacity="0.8"/>
    <circle cx="820" cy="360" r="4" fill="#FFD700" opacity="0.7"/>
  </g>
</svg>
