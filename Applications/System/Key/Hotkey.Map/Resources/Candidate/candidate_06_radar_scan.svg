<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001400"/>
      <stop offset="100%" style="stop-color:#002800"/>
    </linearGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff44;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00ff44;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar circles -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00aa22" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#00aa22" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#00aa22" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#00aa22" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Cross hairs -->
  <line x1="76" y1="256" x2="436" y2="256" stroke="#00aa22" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="256" y1="76" x2="256" y2="436" stroke="#00aa22" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Radar sweep -->
  <path d="M 256 256 L 436 256 A 180 180 0 0 0 256 76 Z" fill="#00ff44" fill-opacity="0.08"/>
  <!-- Blips = hotkeys detected -->
  <circle cx="320" cy="180" r="8" fill="#00ff44" fill-opacity="0.9"/>
  <circle cx="320" cy="180" r="18" fill="none" stroke="#00ff44" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="334" y="177" font-family="monospace" font-size="12" fill="#00ff44">Ctrl+C</text>
  <circle cx="160" cy="300" r="8" fill="#44ff88" fill-opacity="0.9"/>
  <circle cx="160" cy="300" r="18" fill="none" stroke="#44ff88" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="110" y="297" font-family="monospace" font-size="12" fill="#44ff88">Alt+F4</text>
  <circle cx="370" cy="340" r="6" fill="#88ff44" fill-opacity="0.8"/>
  <text x="380" y="338" font-family="monospace" font-size="12" fill="#88ff44">Win+D</text>
  <circle cx="200" cy="155" r="5" fill="#00ff88" fill-opacity="0.7"/>
  <text x="155" y="152" font-family="monospace" font-size="11" fill="#00ff88">F5</text>
  <!-- Center -->
  <circle cx="256" cy="256" r="6" fill="#00ff44"/>
  <!-- Label -->
  <text x="168" y="462" font-family="monospace" font-size="20" fill="#00ff44">HOTKEY RADAR</text>
</svg>