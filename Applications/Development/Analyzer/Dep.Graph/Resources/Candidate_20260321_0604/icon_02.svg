<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="dg-bg-clip-02">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="dg-bg-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8380A"/>
      <stop offset="100%" stop-color="#C62800"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#dg-bg-02)"/>

  <g clip-path="url(#dg-bg-clip-02)">
    <!-- 루트 패키지 박스 (중앙 상단) -->
    <rect x="376" y="248" width="272" height="110" rx="18" fill="#1A0A00"/>
    <rect x="390" y="262" width="244" height="82" rx="12" fill="#2C1000"/>
    <!-- 박스 내 텍스트 대신 점 3개 -->
    <circle cx="462" cy="303" r="10" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="512" cy="303" r="10" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="562" cy="303" r="10" fill="#FFFFFF" opacity="0.6"/>

    <!-- 가지 연결선 -->
