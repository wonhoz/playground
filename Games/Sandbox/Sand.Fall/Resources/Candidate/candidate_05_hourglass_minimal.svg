<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1430"/>
      <stop offset="100%" stop-color="#0D0B1A"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7986CB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#303F9F" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hourglass shape -->
  <path d="M 140 80 L 372 80 L 372 100 L 280 240 L 280 272 L 372 412 L 372 432 L 140 432 L 140 412 L 232 272 L 232 240 L 140 100 Z" fill="url(#glass)" stroke="#7986CB" stroke-width="4"/>
  <!-- Top sand -->
  <clipPath id="topClip">
    <path d="M 148 88 L 364 88 L 364 100 L 280 240 L 280 244 L 232 244 L 232 240 L 148 100 Z"/>
  </clipPath>
  <rect x="148" y="140" width="216" height="110" fill="url(#sand)" opacity="0.85" clip-path="url(#topClip)"/>
  <!-- Bottom sand -->
  <clipPath id="botClip">
    <path d="M 232 272 L 280 272 L 364 412 L 364 424 L 148 424 L 148 412 Z"/>
  </clipPath>
  <rect x="148" y="340" width="216" height="90" fill="url(#sand)" opacity="0.9" clip-path="url(#botClip)"/>
  <!-- Falling stream -->
  <rect x="250" y="244" width="12" height="100" rx="6" fill="url(#sand)" opacity="0.8"/>
  <!-- Horizontal bars top/bottom -->
  <rect x="120" y="70" width="272" height="22" rx="8" fill="#455A64"/>
  <rect x="120" y="420" width="272" height="22" rx="8" fill="#455A64"/>
</svg>
