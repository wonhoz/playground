<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04 | Metaphor | 대각선·동적 | URL/텍스트 → QR 변환 흐름 | 퍼플 + 마젠타 -->

  <defs>
    <linearGradient id="bgGrad04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#2D0050"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC00FF"/>
      <stop offset="100%" stop-color="#FF0080"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#FF4081"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad04)"/>

  <!-- Layer 2: 왼쪽 - 텍스트/URL 표현 -->
  <!-- 텍스트 줄 (URL처럼) -->
  <rect x="130" y="290" width="260" height="28" rx="14" fill="#CC00FF" opacity="0.9"/>
  <rect x="130" y="342" width="200" height="28" rx="14" fill="#CC00FF" opacity="0.7"/>
  <rect x="130" y="394" width="240" height="28" rx="14" fill="#CC00FF" opacity="0.8"/>
  <rect x="130" y="446" width="180" height="28" rx="14" fill="#CC00FF" opacity="0.6"/>
  <rect x="130" y="498" width="220" height="28" rx="14" fill="#CC00FF" opacity="0.75"/>
  <rect x="130" y="550" width="190" height="28" rx="14" fill="#CC00FF" opacity="0.65"/>
  <rect x="130" y="602" width="250" height="28" rx="14" fill="#CC00FF" opacity="0.85"/>
  <rect x="130" y="654" width="160" height="28" rx="14" fill="#CC00FF" opacity="0.7"/>
  <!-- https:// 표시 -->
  <text x="130" y="255" font-family="monospace" font-size="52" font-weight="bold" fill="#CC00FF" opacity="0.7">https://</text>

  <!-- 변환 화살표 (동적) -->
  <g transform="translate(512, 512)">
    <!-- 화살표 몸통 -->
    <path d="M-80 0 L60 0" stroke="url(#arrowGrad)" stroke-width="28" stroke-linecap="round"/>
    <!-- 화살표 헤드 -->
    <path d="M30 -35 L90 0 L30 35" fill="none" stroke="url(#arrowGrad)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- 스파크 이펙트 -->
    <circle cx="-30" cy="0" r="8" fill="#FF0080" opacity="0.8"/>
    <circle cx="0"   cy="0" r="6" fill="#FF40C0" opacity="0.6"/>
    <circle cx="20"  cy="0" r="5" fill="#FF80FF" opacity="0.4"/>
  </g>

  <!-- Layer 3: 오른쪽 - QR 코드 결과 -->
  <g fill="#FF0080">
    <!-- 좌상단 파인더 -->
    <rect x="640" y="280" width="168" height="168" rx="14"/>
    <rect x="660" y="300" width="128" height="128" rx="8" fill="#2D0050"/>
    <rect x="682" y="322" width="84" height="84" rx="4" fill="#FF0080"/>

    <!-- 우상단 파인더 -->
    <rect x="830" y="280" width="100" height="100" rx="12"/>
    <rect x="846" y="296" width="68" height="68" rx="6" fill="#2D0050"/>
    <rect x="862" y="312" width="36" height="36" rx="3" fill="#FF0080"/>

    <!-- 좌하단 파인더 -->
    <rect x="640" y="470" width="100" height="100" rx="12"/>
    <rect x="656" y="486" width="68" height="68" rx="6" fill="#2D0050"/>
    <rect x="672" y="502" width="36" height="36" rx="3" fill="#FF0080"/>

    <!-- 데이터 모듈 -->
    <rect x="756" y="476" width="24" height="24" rx="3"/>
    <rect x="790" y="476" width="24" height="24" rx="3"/>
    <rect x="824" y="476" width="24" height="24" rx="3"/>
    <rect x="858" y="476" width="24" height="24" rx="3"/>
    <rect x="756" y="510" width="24" height="24" rx="3"/>
    <rect x="824" y="510" width="24" height="24" rx="3"/>
    <rect x="858" y="510" width="24" height="24" rx="3"/>
    <rect x="756" y="544" width="24" height="24" rx="3"/>
    <rect x="790" y="544" width="24" height="24" rx="3"/>
    <rect x="858" y="544" width="24" height="24" rx="3"/>
    <rect x="756" y="578" width="24" height="24" rx="3"/>
    <rect x="790" y="578" width="24" height="24" rx="3"/>
    <rect x="824" y="578" width="24" height="24" rx="3"/>
    <rect x="672" y="610" width="24" height="24" rx="3"/>
    <rect x="706" y="610" width="24" height="24" rx="3"/>
    <rect x="756" y="610" width="24" height="24" rx="3"/>
    <rect x="790" y="610" width="24" height="24" rx="3"/>
    <rect x="858" y="610" width="24" height="24" rx="3"/>
    <rect x="672" y="644" width="24" height="24" rx="3"/>
    <rect x="756" y="644" width="24" height="24" rx="3"/>
    <rect x="824" y="644" width="24" height="24" rx="3"/>
    <rect x="706" y="678" width="24" height="24" rx="3"/>
    <rect x="790" y="678" width="24" height="24" rx="3"/>
    <rect x="858" y="678" width="24" height="24" rx="3"/>
    <rect x="672" y="712" width="24" height="24" rx="3"/>
    <rect x="706" y="712" width="24" height="24" rx="3"/>
    <rect x="790" y="712" width="24" height="24" rx="3"/>
    <rect x="858" y="712" width="24" height="24" rx="3"/>
  </g>
</svg>
