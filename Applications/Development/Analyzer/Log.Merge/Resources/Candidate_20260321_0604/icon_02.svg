    <rect x="320" y="264" width="384" height="52" rx="14" fill="#FF6B35" opacity="0.9"/>
    <rect x="332" y="276" width="200" height="28" rx="8" fill="rgba(255,255,255,0.25)"/>

    <!-- 노드 2 (시안) -->
    <circle cx="270" cy="390" r="26" fill="#00D4FF"/>
    <rect x="320" y="364" width="340" height="52" rx="14" fill="#00D4FF" opacity="0.85"/>
    <rect x="332" y="376" width="160" height="28" rx="8" fill="rgba(255,255,255,0.25)"/>

