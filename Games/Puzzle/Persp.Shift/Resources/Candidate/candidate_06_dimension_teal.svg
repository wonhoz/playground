<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001414"/>
      <stop offset="100%" stop-color="#002626"/>
    </linearGradient>
    <linearGradient id="teal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="teal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Two overlapping cubes showing dimension shift -->
  <!-- Cube 1 (back, dimmer) -->
  <polygon points="192,100 320,166 320,298 192,232" fill="#001E20" stroke="#00838F" stroke-width="2" opacity="0.6"/>
  <polygon points="320,166 400,128 400,260 320,298" fill="#001A1E" stroke="#006064" stroke-width="2" opacity="0.6"/>
  <polygon points="192,100 320,166 400,128 272,62" fill="#002428" stroke="#00838F" stroke-width="2" opacity="0.6"/>
  <!-- Cube 2 (front, bright) -->
  <polygon points="112,210 240,276 240,408 112,342" fill="#001E20" stroke="#26C6DA" stroke-width="2.5"/>
  <polygon points="240,276 320,238 320,370 240,408" fill="#001820" stroke="#00838F" stroke-width="2.5"/>
  <polygon points="112,210 240,276 320,238 192,172" fill="#002428" stroke="#26C6DA" stroke-width="2.5"/>
  <!-- Highlight edges of front cube -->
  <line x1="192" y1="172" x2="192" y2="172" stroke="#80DEEA" stroke-width="3"/>
  <line x1="240" y1="276" x2="240" y2="408" stroke="#80DEEA" stroke-width="2" opacity="0.5"/>
  <!-- Connecting/shift arrows between cubes -->
  <path d="M286 168 Q300 210 280 248" stroke="#80DEEA" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="6,4"/>
  <polygon points="272,248 288,256 284,240" fill="#80DEEA"/>
  <!-- Perspective grid -->
  <line x1="60" y1="450" x2="256" y2="150" stroke="#00838F" stroke-width="1" opacity="0.2"/>
  <line x1="170" y1="450" x2="320" y2="200" stroke="#00838F" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="456" x2="400" y2="180" stroke="#00838F" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="380" x2="452" y2="380" stroke="#00838F" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="420" x2="452" y2="420" stroke="#00838F" stroke-width="1" opacity="0.15"/>
</svg>