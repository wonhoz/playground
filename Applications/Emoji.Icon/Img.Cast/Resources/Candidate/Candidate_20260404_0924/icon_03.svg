<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <filter id="sh03">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 1: Light purple background -->
  <rect width="1024" height="1024" rx="190" fill="#7C4DFF"/>
  <rect x="16" y="16" width="992" height="992" rx="178" fill="url(#bg03)"/>

  <!-- Layer 2: Format bubbles flowing into one output -->
  <!-- Input streams (left side) — 3 format bubbles with lines converging right -->

  <!-- SVG bubble -->
  <circle cx="200" cy="310" r="90" fill="#29B6F6" filter="url(#sh03)"/>
  <text x="200" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">SVG</text>

  <!-- PNG bubble -->
  <circle cx="200" cy="512" r="90" fill="#66BB6A" filter="url(#sh03)"/>
  <text x="200" y="512" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">PNG</text>

  <!-- JPG bubble -->
  <circle cx="200" cy="714" r="90" fill="#FF7043" filter="url(#sh03)"/>
  <text x="200" y="714" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">JPG</text>

  <!-- Converging stream lines -->
  <!-- SVG → center -->
  <path d="M 290,310 Q 512,310 512,512" fill="none" stroke="#29B6F6" stroke-width="22"
        stroke-linecap="round" opacity="0.7"/>
  <!-- PNG → center -->
  <line x1="290" y1="512" x2="512" y2="512" stroke="#66BB6A" stroke-width="22"
        stroke-linecap="round" opacity="0.7"/>
  <!-- JPG → center -->
  <path d="M 290,714 Q 512,714 512,512" fill="none" stroke="#FF7043" stroke-width="22"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Center merge dot -->
  <circle cx="512" cy="512" r="40" fill="url(#streamGrad)" filter="url(#sh03)"/>

  <!-- Output stream (right side) -->
  <line x1="552" y1="512" x2="720" y2="512" stroke="url(#streamGrad)" stroke-width="28"
        stroke-linecap="round"/>

  <!-- Output arrow head -->
  <polygon points="740,512 700,482 700,542" fill="#E040FB"/>

  <!-- Layer 3: Output ICO badge -->
  <rect x="740" y="438" width="180" height="148" rx="20" fill="#4527A0" filter="url(#sh03)"/>
  <text x="830" y="512" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- BMP bubble (smaller, top right of inputs) -->
  <circle cx="190" cy="170" r="56" fill="#AB47BC"/>
  <text x="190" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">BMP</text>

  <path d="M 246,170 Q 460,170 512,490" fill="none" stroke="#AB47BC" stroke-width="14"
        stroke-linecap="round" opacity="0.5"/>
</svg>
