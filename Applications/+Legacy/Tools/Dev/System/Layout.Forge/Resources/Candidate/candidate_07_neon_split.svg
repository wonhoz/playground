<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060614"/>
      <stop offset="100%" stop-color="#0E0E22"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFAA"/>
      <stop offset="100%" stop-color="#00AAFF"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer border glow -->
  <rect x="60" y="60" width="392" height="392" rx="16" fill="none" stroke="url(#neonGrad)" stroke-width="2" filter="url(#neonGlow)" opacity="0.5"/>
  <!-- Split dividers -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="url(#neonGrad)" stroke-width="2" filter="url(#neonGlow)" opacity="0.7"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="url(#neonGrad)" stroke-width="2" filter="url(#neonGlow)" opacity="0.7"/>
  <!-- Quadrant labels / content placeholders -->
  <!-- Q1 top-left -->
  <rect x="88" y="88" width="148" height="148" rx="6" fill="#00FFAA" opacity="0.05"/>
  <text x="162" y="158" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00FFAA" opacity="0.6">NAV</text>
  <rect x="96" y="100" width="100" height="10" rx="5" fill="#00FFAA" opacity="0.15"/>
  <rect x="96" y="118" width="80" height="8" rx="4" fill="#00FFAA" opacity="0.1"/>
  <rect x="96" y="134" width="90" height="8" rx="4" fill="#00FFAA" opacity="0.1"/>
  <!-- Q2 top-right (active / selected) -->
  <rect x="276" y="88" width="148" height="148" rx="6" fill="#00AAFF" opacity="0.1"/>
  <rect x="276" y="88" width="148" height="148" rx="6" fill="none" stroke="#00AAFF" stroke-width="1.5" filter="url(#neonGlow)"/>
  <text x="350" y="158" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00AAFF" filter="url(#neonGlow)">CONTENT</text>
  <!-- Q3 bottom-left -->
  <rect x="88" y="276" width="148" height="148" rx="6" fill="#00FFAA" opacity="0.05"/>
  <text x="162" y="345" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00FFAA" opacity="0.5">SIDEBAR</text>
  <!-- Q4 bottom-right -->
  <rect x="276" y="276" width="148" height="148" rx="6" fill="#00AAFF" opacity="0.05"/>
  <text x="350" y="345" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00AAFF" opacity="0.5">FOOTER</text>
  <!-- Center intersection glow -->
  <circle cx="256" cy="256" r="18" fill="#00FFAA" opacity="0.15" filter="url(#neonGlow)"/>
  <circle cx="256" cy="256" r="6" fill="url(#neonGrad)" filter="url(#neonGlow)"/>
  <!-- Resize handles at corners -->
  <circle cx="80" cy="80" r="6" fill="#00FFAA" filter="url(#neonGlow)"/>
  <circle cx="432" cy="80" r="6" fill="#00AAFF" filter="url(#neonGlow)"/>
  <circle cx="80" cy="432" r="6" fill="#00FFAA" filter="url(#neonGlow)" opacity="0.6"/>
  <circle cx="432" cy="432" r="6" fill="#00AAFF" filter="url(#neonGlow)" opacity="0.6"/>
</svg>
