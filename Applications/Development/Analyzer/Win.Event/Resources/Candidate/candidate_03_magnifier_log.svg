<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B263B"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#415A77"/>
      <stop offset="100%" stop-color="#778DA9"/>
    </linearGradient>
    <radialGradient id="glass" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4FACFE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Log sheet behind magnifier -->
  <rect x="60" y="80" width="240" height="320" rx="10" fill="#1B263B" stroke="#415A77" stroke-width="2"/>
  <rect x="80" y="110" width="160" height="12" rx="3" fill="#415A77" opacity="0.5"/>
  <rect x="80" y="136" width="180" height="10" rx="3" fill="#778DA9" opacity="0.3"/>
  <rect x="80" y="158" width="140" height="10" rx="3" fill="#E94560" opacity="0.5"/>
  <rect x="80" y="180" width="170" height="10" rx="3" fill="#778DA9" opacity="0.3"/>
  <rect x="80" y="202" width="130" height="10" rx="3" fill="#F5A623" opacity="0.5"/>
  <rect x="80" y="224" width="175" height="10" rx="3" fill="#778DA9" opacity="0.3"/>
  <rect x="80" y="246" width="155" height="10" rx="3" fill="#2ECC71" opacity="0.5"/>
  <rect x="80" y="268" width="165" height="10" rx="3" fill="#778DA9" opacity="0.3"/>
  <rect x="80" y="290" width="120" height="10" rx="3" fill="#E94560" opacity="0.5"/>
  <rect x="80" y="312" width="150" height="10" rx="3" fill="#778DA9" opacity="0.3"/>
  <!-- Magnifier circle -->
  <circle cx="310" cy="260" r="145" fill="url(#glass)" stroke="url(#lens)" stroke-width="14"/>
  <circle cx="310" cy="260" r="140" fill="none" stroke="#4FACFE" stroke-width="2" opacity="0.4"/>
  <!-- Zoomed content inside magnifier -->
  <clipPath id="lensClip"><circle cx="310" cy="260" r="132"/></clipPath>
  <g clip-path="url(#lensClip)">
    <rect x="210" y="185" width="200" height="150" rx="6" fill="#0D1B2A" opacity="0.7"/>
    <rect x="220" y="200" width="140" height="14" rx="3" fill="#E94560" opacity="0.9"/>
    <rect x="220" y="224" width="165" height="12" rx="3" fill="#F5A623" opacity="0.8"/>
    <rect x="220" y="248" width="155" height="12" rx="3" fill="#4FACFE" opacity="0.8"/>
    <rect x="220" y="272" width="130" height="12" rx="3" fill="#2ECC71" opacity="0.8"/>
    <rect x="220" y="296" width="170" height="12" rx="3" fill="#778DA9" opacity="0.6"/>
  </g>
  <!-- Handle -->
  <line x1="426" y1="376" x2="462" y2="428" stroke="url(#lens)" stroke-width="18" stroke-linecap="round"/>
  <text x="256" y="474" text-anchor="middle" font-family="Segoe UI" font-size="22" font-weight="700" fill="#778DA9">WIN.EVENT ANALYZER</text>
</svg>
