<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 황금-앰버 그라데이션 배경 -->
  <defs>
    <radialGradient id="bg07" cx="50%" cy="55%" r="58%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="60%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <g clip-path="url(#clip07)">
    <!-- Layer 2: 불꽃 실루엣 (배경 스트릭 느낌) -->
    <path d="M512 900 Q360 820 340 680 Q320 560 400 500 Q420 590 470 570 Q425 460 470 340 Q510 220 490 120 Q580 210 600 320 Q620 420 575 480 Q640 440 660 350 Q710 460 685 570 Q730 530 750 440 Q775 540 755 660 Q735 780 640 840 Q580 880 512 900 Z" fill="#FF6F00" opacity="0.35"/>
    <path d="M512 880 Q400 810 390 700 Q380 590 450 545 Q460 610 500 600 Q468 520 500 420 Q535 320 520 230 Q600 300 605 400 Q610 480 578 520 Q610 500 628 430 Q658 520 640 620 Q660 580 680 510 Q700 595 684 690 Q668 785 594 838 Q558 860 512 880 Z" fill="#FF8F00" opacity="0.5"/>

    <!-- Layer 2: 트로피 (중앙 메인) -->
    <!-- 트로피 컵 -->
    <rect x="366" y="280" width="292" height="260" rx="30" fill="#FFD54F"/>
    <!-- 트로피 손잡이 왼쪽 -->
    <path d="M366 340 Q290 340 280 400 Q270 460 336 480" stroke="#FFD54F" stroke-width="50" stroke-linecap="round" fill="none"/>
    <!-- 트로피 손잡이 오른쪽 -->
    <path d="M658 340 Q734 340 744 400 Q754 460 688 480" stroke="#FFD54F" stroke-width="50" stroke-linecap="round" fill="none"/>
    <!-- 트로피 컵 내부 음영 -->
    <rect x="390" y="300" width="244" height="220" rx="22" fill="#FFB300" opacity="0.4"/>
    <!-- 별 장식 -->
    <text x="512" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="100" text-anchor="middle">⭐</text>
    <!-- 트로피 기둥 -->
    <rect x="476" y="540" width="72" height="80" rx="10" fill="#FFD54F"/>
    <!-- 트로피 받침 -->
    <rect x="380" y="620" width="264" height="52" rx="16" fill="#FFD54F"/>

    <!-- Layer 3: 스트릭 카운터 + 불꽃 강조 -->
    <!-- 스트릭 배지 (우상단) -->
    <circle cx="790" cy="300" r="100" fill="#FF3D00"/>
    <text x="790" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="52" text-anchor="middle">🔥</text>
    <text x="790" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">7</text>
    <text x="790" y="385" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="30" fill="#FFCCBC" text-anchor="middle">연속!</text>

    <!-- 좌측 점수 배지 -->
    <circle cx="234" cy="300" r="90" fill="#FFFFFF" opacity="0.2"/>
    <text x="234" y="275" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">점수</text>
    <text x="234" y="335" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFD54F" text-anchor="middle">2450</text>

    <!-- 하단 배너 -->
    <rect x="130" y="750" width="764" height="82" rx="24" fill="#FFFFFF" opacity="0.2"/>
    <rect x="130" y="840" width="764" height="82" rx="24" fill="#1A004A"/>
    <text x="512" y="896" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFD54F" text-anchor="middle">TRIVIA CAST</text>
    <text x="512" y="790" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#FFFFFF" text-anchor="middle">완벽합니다! 🏆</text>
  </g>
</svg>
