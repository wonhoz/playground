<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#1a1200"/>
    </linearGradient>
    <linearGradient id="door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vault body -->
  <rect x="80" y="100" width="352" height="340" rx="16" fill="#1A0E00" stroke="#B45309" stroke-width="4"/>
  <!-- Vault door (circular) -->
  <circle cx="256" cy="270" r="140" fill="url(#door)" stroke="#F59E0B" stroke-width="4"/>
  <!-- Vault ring 1 -->
  <circle cx="256" cy="270" r="115" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <!-- Vault ring 2 -->
  <circle cx="256" cy="270" r="90" fill="#78350F" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- Vault bolts -->
  <circle cx="256" cy="155" r="10" fill="#F59E0B"/>
  <circle cx="256" cy="385" r="10" fill="#F59E0B"/>
  <circle cx="141" cy="270" r="10" fill="#F59E0B"/>
  <circle cx="371" cy="270" r="10" fill="#F59E0B"/>
  <circle cx="175" cy="189" r="8" fill="#D97706"/>
  <circle cx="337" cy="189" r="8" fill="#D97706"/>
  <circle cx="175" cy="351" r="8" fill="#D97706"/>
  <circle cx="337" cy="351" r="8" fill="#D97706"/>
  <!-- Inner vault: hex display -->
  <circle cx="256" cy="270" r="68" fill="#0a0500"/>
  <!-- Hex data inside vault -->
  <text x="256" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B">FF A3 4B</text>
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97706">0E C2 88</text>
  <text x="256" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B">5D 3F A0</text>
  <text x="256" y="290" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97706">11 6E D7</text>
  <text x="256" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="#B45309">41 B9 CC</text>
  <!-- Handle -->
  <circle cx="256" cy="270" r="16" fill="#F59E0B"/>
  <circle cx="256" cy="270" r="8" fill="#78350F"/>
  <!-- Vault top label -->
  <text x="256" y="148" text-anchor="middle" font-family="monospace" font-size="14" fill="#F59E0B" letter-spacing="2">HEX VAULT</text>
  <!-- Hinge -->
  <rect x="76" y="180" width="12" height="40" rx="4" fill="#B45309"/>
  <rect x="76" y="340" width="12" height="40" rx="4" fill="#B45309"/>
</svg>
