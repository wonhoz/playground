<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0020"/>
      <stop offset="100%" stop-color="#070010"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Layered cards perspective (isometric-ish) -->
  <!-- Layer 4 (bottom/back) -->
  <rect x="100" y="320" width="280" height="70" rx="10" fill="#1a0030" stroke="#4c1d95" stroke-width="1.5" transform="skewX(-8)"/>
  <text x="120" y="362" font-family="monospace" font-size="13" fill="#4c1d95">Background layer</text>
  <circle cx="392" cy="355" r="8" fill="#4c1d95" opacity="0.5"/>
  <!-- Layer 3 -->
  <rect x="92" y="256" width="280" height="70" rx="10" fill="#1e0038" stroke="#7c3aed" stroke-width="2" transform="skewX(-8)"/>
  <text x="112" y="298" font-family="monospace" font-size="13" fill="#7c3aed">Shadow/FX layer</text>
  <circle cx="384" cy="291" r="8" fill="#7c3aed" opacity="0.6"/>
  <!-- Layer 2 -->
  <rect x="84" y="192" width="280" height="70" rx="10" fill="#22003d" stroke="#a855f7" stroke-width="2" transform="skewX(-8)"/>
  <text x="104" y="234" font-family="monospace" font-size="13" fill="#a855f7">Color/Shape layer</text>
  <circle cx="376" cy="227" r="8" fill="#a855f7" opacity="0.7"/>
  <!-- Layer 1 (top/front, active) -->
  <rect x="76" y="120" width="280" height="80" rx="12" fill="#2d004a" stroke="#c084fc" stroke-width="3" transform="skewX(-8)"/>
  <text x="96" y="157" font-family="monospace" font-size="14" fill="#c084fc" font-weight="bold">Icon Art layer ▶</text>
  <text x="96" y="177" font-family="monospace" font-size="11" fill="#9333ea">Active · 256x256</text>
  <circle cx="368" cy="160" r="10" fill="#c084fc"/>
  <!-- Right side: output preview -->
  <rect x="380" y="60" width="88" height="88" rx="16" fill="#1a0030" stroke="#c084fc" stroke-width="2.5"/>
  <!-- Mini icon inside -->
  <rect x="398" y="78" width="52" height="52" rx="12" fill="#9333ea" opacity="0.9"/>
  <polygon points="424,86 428,98 442,98 432,106 436,118 424,110 412,118 416,106 406,98 420,98" fill="white" opacity="0.9" transform="scale(0.6) translate(283 83)"/>
  <text x="396" y="165" font-family="monospace" font-size="11" fill="#c084fc">Preview</text>
  <!-- Color wheel small -->
  <circle cx="424" cy="224" r="40" fill="none" stroke="#4c1d95" stroke-width="1"/>
  <path d="M424 184 A40 40 0 0 1 464 224" fill="none" stroke="#ef4444" stroke-width="8"/>
  <path d="M464 224 A40 40 0 0 1 424 264" fill="none" stroke="#fb923c" stroke-width="8"/>
  <path d="M424 264 A40 40 0 0 1 384 224" fill="none" stroke="#fbbf24" stroke-width="8"/>
  <path d="M384 224 A40 40 0 0 1 424 184" fill="none" stroke="#a855f7" stroke-width="8"/>
  <circle cx="424" cy="224" r="18" fill="#0f0020" stroke="#c084fc" stroke-width="2"/>
  <circle cx="424" cy="224" r="6" fill="#c084fc"/>
  <!-- Blend modes label -->
  <rect x="380" y="288" width="88" height="28" rx="8" fill="#1a0030" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="384" y="307" font-family="monospace" font-size="11" fill="#a855f7">Blend:Normal</text>
  <!-- Export button -->
  <rect x="380" y="410" width="88" height="44" rx="10" fill="#9333ea" opacity="0.9"/>
  <text x="390" y="434" font-family="monospace" font-size="13" fill="white" font-weight="bold">Export</text>
  <text x="392" y="449" font-family="monospace" font-size="11" fill="#e9d5ff">.ico</text>
</svg>
