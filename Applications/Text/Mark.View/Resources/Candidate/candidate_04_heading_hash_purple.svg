<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="hash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Big # symbol -->
  <!-- Vertical lines of hash -->
  <rect x="168" y="100" width="32" height="312" rx="8" fill="url(#hash)"/>
  <rect x="248" y="100" width="32" height="312" rx="8" fill="url(#hash)"/>
  <!-- Horizontal lines of hash -->
  <rect x="136" y="184" width="296" height="32" rx="8" fill="url(#hash)"/>
  <rect x="136" y="264" width="296" height="32" rx="8" fill="url(#hash)"/>
  <!-- Overlay text lines (preview content) -->
  <rect x="64" y="440" width="384" height="12" rx="6" fill="white" opacity="0.25"/>
  <rect x="64" y="462" width="280" height="10" rx="5" fill="white" opacity="0.15"/>
  <!-- Small decorative elements -->
  <circle cx="90" cy="100" r="14" fill="white" opacity="0.15"/>
  <circle cx="422" cy="412" r="14" fill="white" opacity="0.15"/>
  <!-- H1/H2/H3 indicator pills -->
  <rect x="64" y="60" width="50" height="24" rx="12" fill="white" opacity="0.2"/>
  <text x="89" y="77" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">H1</text>
  <rect x="124" y="60" width="50" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="149" y="77" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">H2</text>
  <rect x="184" y="60" width="50" height="24" rx="12" fill="white" opacity="0.08"/>
  <text x="209" y="77" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">H3</text>
</svg>
