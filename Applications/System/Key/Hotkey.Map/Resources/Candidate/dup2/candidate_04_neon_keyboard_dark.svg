<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000814"/>
      <stop offset="100%" style="stop-color:#001233"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard -->
  <rect x="36" y="172" width="440" height="198" rx="18" fill="#050a18" stroke="#0066ff" stroke-width="2" filter="url(#neon)"/>
  <!-- Glowing key rows -->
  <!-- Row 1: accent keys -->
  <rect x="52" y="188" width="36" height="30" rx="6" fill="#00aaff" fill-opacity="0.2" stroke="#00aaff" stroke-width="1.5"/>
  <text x="62" y="208" font-family="monospace" font-size="11" fill="#00aaff">Esc</text>
  <rect x="96" y="188" width="30" height="30" rx="6" fill="#ff0066" fill-opacity="0.3" stroke="#ff0066" stroke-width="1.5" filter="url(#neon)"/>
  <text x="106" y="208" font-family="monospace" font-size="11" fill="#ff0066">F1</text>
  <rect x="130" y="188" width="30" height="30" rx="6" fill="#ff0066" fill-opacity="0.2" stroke="#ff0066" stroke-width="1.5"/>
  <text x="140" y="208" font-family="monospace" font-size="11" fill="#ff0066">F2</text>
  <rect x="164" y="188" width="30" height="30" rx="6" fill="#050a18" stroke="#333" stroke-width="1"/>
  <text x="174" y="208" font-family="monospace" font-size="11" fill="#336"/>
  <rect x="198" y="188" width="30" height="30" rx="6" fill="#050a18" stroke="#333" stroke-width="1"/>
  <rect x="232" y="188" width="30" height="30" rx="6" fill="#00ff88" fill-opacity="0.2" stroke="#00ff88" stroke-width="1.5" filter="url(#neon)"/>
  <text x="241" y="208" font-family="monospace" font-size="11" fill="#00ff88">F5</text>
  <!-- Ctrl + keys highlighted -->
  <rect x="52" y="328" width="50" height="30" rx="6" fill="#ff0066" fill-opacity="0.3" stroke="#ff0066" stroke-width="2" filter="url(#neon)"/>
  <text x="62" y="348" font-family="monospace" font-size="11" fill="#ff0066">Ctrl</text>
  <rect x="52" y="294" width="66" height="30" rx="6" fill="#0066ff" fill-opacity="0.2" stroke="#0066ff" stroke-width="1.5"/>
  <text x="60" y="313" font-family="monospace" font-size="11" fill="#0066ff">Shift</text>
  <!-- Other keys faded -->
  <rect x="108" y="328" width="36" height="30" rx="6" fill="#050a18" stroke="#222" stroke-width="1"/>
  <text x="116" y="348" font-family="monospace" font-size="11" fill="#333">Win</text>
  <rect x="148" y="328" width="44" height="30" rx="6" fill="#00aaff" fill-opacity="0.2" stroke="#00aaff" stroke-width="1.5"/>
  <text x="160" y="348" font-family="monospace" font-size="11" fill="#00aaff">Alt</text>
  <!-- Space bar glowing -->
  <rect x="196" y="328" width="120" height="30" rx="6" fill="#aa00ff" fill-opacity="0.15" stroke="#aa00ff" stroke-width="1.5" filter="url(#neon)"/>
  <text x="240" y="348" font-family="monospace" font-size="11" fill="#aa00ff">Space</text>
</svg>