  <rect x="350" y="480" width="128" height="128" rx="8" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <rect x="480" y="480" width="128" height="128" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <rect x="610" y="480" width="128" height="128" rx="8" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <!-- 행 3 -->
  <rect x="220" y="610" width="128" height="128" rx="8" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <rect x="350" y="610" width="128" height="128" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <rect x="480" y="610" width="128" height="128" rx="8" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <rect x="610" y="610" width="128" height="128" rx="8" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>

