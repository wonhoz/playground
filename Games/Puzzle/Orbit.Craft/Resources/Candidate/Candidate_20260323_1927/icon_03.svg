<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="p1" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFA07A"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </radialGradient>
    <radialGradient id="p2" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </radialGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- 별 -->
  <circle cx="220" cy="200" r="3" fill="white" opacity="0.5"/>
  <circle cx="800" cy="220" r="4" fill="white" opacity="0.6"/>
  <circle cx="180" cy="820" r="3" fill="white" opacity="0.4"/>
  <circle cx="850" cy="800" r="2" fill="white" opacity="0.5"/>
  <circle cx="500" cy="170" r="3" fill="white" opacity="0.4"/>
  <circle cx="160" cy="500" r="2" fill="white" opacity="0.3"/>
  <circle cx="870" cy="500" r="3" fill="white" opacity="0.4"/>
  <!-- 중력 곡선들 (형광 녹색/시안) -->
  <path d="M 300,512 Q 420,380 540,350 Q 660,320 720,400" fill="none" stroke="#39FF14" stroke-width="8" opacity="0.7" stroke-dasharray="20 10"/>
  <path d="M 290,530 Q 400,680 520,700 Q 640,720 730,640" fill="none" stroke="#39FF14" stroke-width="8" opacity="0.5" stroke-dasharray="20 10"/>
  <path d="M 350,420 Q 380,290 500,260 Q 620,230 700,330" fill="none" stroke="#00FFFF" stroke-width="7" opacity="0.6" stroke-dasharray="15 15"/>
  <path d="M 340,620 Q 360,760 490,790 Q 620,820 710,720" fill="none" stroke="#00FFFF" stroke-width="7" opacity="0.5" stroke-dasharray="15 15"/>
  <path d="M 250,512 Q 380,200 512,180 Q 644,160 750,350" fill="none" stroke="#FF69B4" stroke-width="6" opacity="0.5" stroke-dasharray="25 12"/>
  <path d="M 250,530 Q 380,820 512,840 Q 644,860 750,660" fill="none" stroke="#FF69B4" stroke-width="6" opacity="0.4" stroke-dasharray="25 12"/>
  <!-- 주황 행성 (왼쪽) -->
  <circle cx="340" cy="512" r="110" fill="url(#p1)" filter="url(#glow03)"/>
  <ellipse cx="320" cy="490" rx="80" ry="35" fill="none" stroke="#FFD700" stroke-width="8" opacity="0.5"/>
  <!-- 파랑 행성 (오른쪽) -->
  <circle cx="700" cy="512" r="90" fill="url(#p2)" filter="url(#glow03)"/>
  <ellipse cx="680" cy="495" rx="65" ry="28" fill="none" stroke="#E0F7FA" stroke-width="7" opacity="0.5"/>
  <!-- 중력 당기는 화살표 -->
  <path d="M 460,512 L 430,512" stroke="white" stroke-width="10" stroke-linecap="round" marker-end="url(#arr)"/>
  <path d="M 570,512 L 600,512" stroke="white" stroke-width="10" stroke-linecap="round"/>
</svg>
