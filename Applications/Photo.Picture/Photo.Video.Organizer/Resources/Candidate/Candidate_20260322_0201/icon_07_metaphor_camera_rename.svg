<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg-grad-07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#5C0000"/>
    </linearGradient>
    <radialGradient id="lens-grad-07" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#666666"/>
      <stop offset="60%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="body-grad-07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4444"/>
