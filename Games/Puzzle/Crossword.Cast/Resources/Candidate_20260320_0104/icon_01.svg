<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 십자가 격자 크로스워드: + 모양 격자 -->
  <!-- 배경 격자 전체 (5x5) -->
  <rect x="190" y="190" width="130" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
