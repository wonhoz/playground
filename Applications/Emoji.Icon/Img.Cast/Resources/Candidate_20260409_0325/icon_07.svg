<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <clipPath id="c7"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Soft coral/rose gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#g7)"/>
  <g clip-path="url(#c7)">
    <!-- Layer 2: Large dashed drop zone rectangle -->
    <rect x="214" y="370" width="596" height="450" rx="32" fill="#FFF5F5" stroke="#F43F5E" stroke-width="12" stroke-dasharray="28,16"/>
    <!-- Down arrow inside drop zone -->
    <line x1="512" y1="418" x2="512" y2="576" stroke="#F43F5E" stroke-width="64" stroke-linecap="round"/>
    <polygon points="454,548 512,642 570,548" fill="#F43F5E"/>
    <!-- Output format label in drop zone bottom -->
    <text x="512" y="790" font-family="Arial Black,Arial,sans-serif" font-size="120" fill="#BE123C" font-weight="900" text-anchor="middle">ICO</text>
    <!-- Layer 3: Input format badges floating above drop zone -->
    <!-- SVG badge (top left) -->
    <rect x="200" y="230" width="164" height="84" rx="18" fill="#4F46E5"/>
    <text x="282" y="292" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="white" font-weight="900" text-anchor="middle">SVG</text>
    <!-- PNG badge (top center-left) -->
    <rect x="400" y="196" width="164" height="84" rx="18" fill="#059669"/>
    <text x="482" y="258" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="white" font-weight="900" text-anchor="middle">PNG</text>
    <!-- JPG badge (top center-right) -->
    <rect x="580" y="220" width="164" height="84" rx="18" fill="#D97706"/>
    <text x="662" y="282" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="white" font-weight="900" text-anchor="middle">JPG</text>
    <!-- BMP badge (top right) -->
    <rect x="660" y="290" width="164" height="84" rx="18" fill="#7C3AED"/>
    <text x="742" y="352" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="white" font-weight="900" text-anchor="middle">BMP</text>
    <!-- Small arrows pointing down to drop zone -->
    <line x1="282" y1="314" x2="282" y2="368" stroke="#4F46E5" stroke-width="12" stroke-linecap="round"/>
    <polygon points="268,358 282,372 296,358" fill="#4F46E5"/>
    <line x1="482" y1="280" x2="450" y2="368" stroke="#059669" stroke-width="12" stroke-linecap="round"/>
    <line x1="662" y1="304" x2="560" y2="368" stroke="#D97706" stroke-width="12" stroke-linecap="round"/>
    <line x1="742" y1="374" x2="720" y2="368" stroke="#7C3AED" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
