<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background deep purple -->
  <defs>
    <linearGradient id="bgGrad05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bgGrad05)"/>
  <!-- Layer 2: File cards falling diagonally -->
  <!-- Card 1 top-left - SVG -->
  <rect x="120" y="120" width="200" height="240" rx="18" fill="#E040FB" transform="rotate(-15 220 240)"/>
  <text x="220" y="220" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(-15 220 240)">SVG</text>
  <!-- Card 2 middle - PNG -->
  <rect x="290" y="280" width="200" height="240" rx="18" fill="#40C4FF" transform="rotate(-8 390 400)"/>
  <text x="390" y="390" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 390 400)">PNG</text>
  <!-- Card 3 middle-right - JPG -->
  <rect x="490" y="400" width="200" height="240" rx="18" fill="#69F0AE" transform="rotate(5 590 520)"/>
  <text x="590" y="510" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#1B5E20" text-anchor="middle" transform="rotate(5 590 520)">JPG</text>
  <!-- Card 4 bottom-right - ICO -->
  <rect x="660" y="560" width="200" height="240" rx="18" fill="#FFD740" transform="rotate(14 760 680)"/>
  <text x="760" y="670" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#E65100" text-anchor="middle" transform="rotate(14 760 680)">ICO</text>
  <!-- Layer 3: Speed lines (motion blur) -->
  <path d="M100 820 L350 600" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <path d="M200 870 L450 650" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M300 900 L550 700" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
</svg>
