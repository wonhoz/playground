<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09 | Metaphor / 기하학 추상 | 태그/라벨 + 화살표 + 파일 -->
  <!-- 컨셉: 가격표(태그) 모양 안에 EXIF 날짜가 담겨 파일에 붙는 모습 -->
  <!-- 색조: 따뜻한 크림 화이트 + 딥 브라운 레드 + 청록 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="#FBF5EC"/>

  <!-- 큰 태그 형태 (중앙 좌측) - 핵심 메타포 -->
  <!-- 태그 몸체 -->
  <path d="M160,260 L580,260 L700,512 L580,764 L160,764 Z" fill="#8B1A1A" opacity="0.92"/>
  <!-- 태그 구멍 (끈 구멍) -->
  <circle cx="220" cy="512" r="32" fill="#FBF5EC"/>
  <circle cx="220" cy="512" r="20" fill="#8B1A1A"/>
  <!-- 태그 테두리 -->
  <path d="M160,260 L580,260 L700,512 L580,764 L160,764 Z" fill="none" stroke="#C0392B" stroke-width="6"/>

  <!-- 태그 안 날짜/EXIF 정보 -->
  <text x="430" y="380" font-family="Consolas,monospace" font-size="18" fill="#FFE4B5" text-anchor="middle" opacity="0.8">EXIF DateTimeOriginal</text>
  <!-- 날짜 크게 표시 -->
  <text x="430" y="440" font-family="Consolas,monospace" font-size="36" fill="white" text-anchor="middle" font-weight="bold">2024</text>
  <text x="430" y="490" font-family="Consolas,monospace" font-size="36" fill="white" text-anchor="middle" font-weight="bold">03·15</text>
  <text x="430" y="540" font-family="Consolas,monospace" font-size="28" fill="#FFD580" text-anchor="middle" font-weight="bold">09:42:11</text>

  <!-- 구분선 -->
  <line x1="270" y1="568" x2="590" y2="568" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- 파일 포맷 목록 -->
  <text x="430" y="604" font-family="Consolas,monospace" font-size="16" fill="#FFE4B5" text-anchor="middle">.jpg  .heic  .mp4  .mov</text>
  <text x="430" y="630" font-family="Consolas,monospace" font-size="16" fill="#FFE4B5" text-anchor="middle">.cr2  .nef  .arw  .dng</text>

  <!-- 태그 끈 -->
  <path d="M160,512 Q110,460 80,512 Q110,564 160,512" stroke="#8B6914" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 화살표 (태그 → 파일) -->
  <g transform="translate(730,512)">
    <path d="M0,0 L80,0" stroke="#00897B" stroke-width="14" stroke-linecap="round"/>
    <polygon points="68,-20 108,0 68,20" fill="#00897B"/>
  </g>

  <!-- 파일 (우측) - 날짜 이름이 이미 붙어있는 -->
  <!-- 파일 바디 -->
  <rect x="848" y="340" width="136" height="172" rx="12" fill="#E0F2F1" stroke="#00897B" stroke-width="6"/>
  <!-- 파일 귀 접힘 -->
  <polygon points="944,340 984,340 984,380 944,380" fill="#E0F2F1"/>
  <polygon points="944,340 984,380 944,380" fill="#00897B"/>
  <!-- 사진 미니 -->
  <rect x="860" y="394" width="110" height="70" rx="5" fill="#B2EBF2" opacity="0.8"/>
  <path d="M860 440 Q876 426 892 432 Q908 418 930 428 Q950 416 970 428 L970 464 L860 464Z" fill="#4A8A3A" opacity="0.6"/>
  <!-- 파일 이름 배지 -->
  <rect x="840" y="522" width="156" height="68" rx="8" fill="#004D40" stroke="#00897B" stroke-width="3"/>
  <text x="918" y="548" font-family="Consolas,monospace" font-size="12" fill="#80CBC4" text-anchor="middle">20240315</text>
  <text x="918" y="566" font-family="Consolas,monospace" font-size="12" fill="#80CBC4" text-anchor="middle">_094211</text>
  <text x="918" y="582" font-family="Consolas,monospace" font-size="11" fill="#4DB6AC" text-anchor="middle">_001.jpg</text>

  <!-- 복수 파일 스택 힌트 -->
  <rect x="852" y="334" width="120" height="160" rx="10" fill="none" stroke="#00897B" stroke-width="3" opacity="0.3" transform="translate(10,10)"/>
  <rect x="852" y="334" width="120" height="160" rx="10" fill="none" stroke="#00897B" stroke-width="3" opacity="0.2" transform="translate(20,20)"/>

  <!-- 하단 - 이름 변환 예시 -->
  <rect x="120" y="810" width="784" height="74" rx="14" fill="#8B1A1A" opacity="0.1" stroke="#8B1A1A" stroke-width="3"/>
  <text x="250" y="840" font-family="Consolas,monospace" font-size="15" fill="#8B1A1A">IMG_9821.jpg</text>
  <text x="450" y="848" font-family="Arial" font-size="30" fill="#00897B">→</text>
  <text x="510" y="840" font-family="Consolas,monospace" font-size="15" fill="#004D40" font-weight="bold">20240315_094211_001.jpg</text>
  <text x="250" y="865" font-family="Consolas,monospace" font-size="13" fill="#C0392B" opacity="0.7">VID_0042.mp4</text>
  <text x="510" y="865" font-family="Consolas,monospace" font-size="13" fill="#00695C">20240315_143022_001.mp4</text>

  <!-- 상단 부제목 -->
  <text x="430" y="204" font-family="Arial,sans-serif" font-size="28" fill="#8B1A1A" text-anchor="middle" font-weight="bold">EXIF Tag</text>
  <text x="430" y="240" font-family="Arial,sans-serif" font-size="20" fill="#C0392B" text-anchor="middle">Batch Rename</text>
</svg>
