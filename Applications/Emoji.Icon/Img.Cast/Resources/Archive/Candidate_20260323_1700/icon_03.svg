<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#042F2E"/>
  <!-- Layer 2: 드래그앤드롭 영역 -->
  <rect x="80" y="180" width="860" height="500" rx="40" fill="#065F5A" stroke="#14B8A6" stroke-width="16" stroke-dasharray="32,16"/>
  <!-- 파일 아이콘들 -->
  <!-- 파일1 SVG -->
  <rect x="180" y="280" width="160" height="200" rx="16" fill="#0D9488"/>
  <path d="M300,280 L340,320 L340,480 L180,480 L180,280" fill="#0F766E"/>
  <path d="M300,280 L340,320 L300,320 Z" fill="#0A4040"/>
  <text x="260" y="440" font-size="34" fill="#CCFBF1" text-anchor="middle" font-weight="bold">SVG</text>
  <!-- 파일2 PNG -->
  <rect x="380" y="280" width="160" height="200" rx="16" fill="#0EA5E9"/>
  <path d="M500,280 L540,320 L540,480 L380,480 L380,280" fill="#0284C7"/>
  <path d="M500,280 L540,320 L500,320 Z" fill="#014163"/>
  <text x="460" y="440" font-size="34" fill="#E0F2FE" text-anchor="middle" font-weight="bold">PNG</text>
  <!-- 파일3 BMP -->
  <rect x="580" y="280" width="160" height="200" rx="16" fill="#14B8A6"/>
  <path d="M700,280 L740,320 L740,480 L580,480 L580,280" fill="#0D9488"/>
  <path d="M700,280 L740,320 L700,320 Z" fill="#042F2E"/>
  <text x="660" y="440" font-size="34" fill="#CCFBF1" text-anchor="middle" font-weight="bold">BMP</text>
  <!-- 화살표 아래 -->
  <path d="M512 696 L512 756" stroke="#14B8A6" stroke-width="28" stroke-linecap="round"/>
  <polygon points="486,748 512,784 538,748" fill="#14B8A6"/>
  <!-- Layer 3: 출력 ICO 배지 -->
  <rect x="312" y="800" width="400" height="120" rx="28" fill="#F59E0B"/>
  <text x="512" y="882" font-size="72" fill="#1C0000" text-anchor="middle" font-weight="bold" font-family="Arial">.ICO</text>
</svg>
