<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A00"/>
      <stop offset="50%" style="stop-color:#2A1000"/>
      <stop offset="100%" style="stop-color:#3A2000"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600"/>
      <stop offset="100%" style="stop-color:#FFAA00"/>
    </linearGradient>
    <linearGradient id="dune1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD080"/>
      <stop offset="100%" style="stop-color:#CC8800"/>
    </linearGradient>
    <linearGradient id="dune2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBB44"/>
      <stop offset="100%" style="stop-color:#AA6600"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sunset sky -->
  <path d="M80 80 L432 80 L432 280 L80 280 Z" fill="url(#sky)" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="256" cy="220" r="50" fill="#FFE066" opacity="0.8"/>
  <!-- Dunes -->
  <path d="M80 420 Q180 300 280 380 Q360 440 432 360 L432 512 L80 512 Z" fill="url(#dune2)"/>
  <path d="M80 460 Q160 360 256 420 Q340 470 432 400 L432 512 L80 512 Z" fill="url(#dune1)"/>
  <!-- Sand particles falling from top -->
  <circle cx="180" cy="140" r="4" fill="#FFD080" opacity="0.8"/>
  <circle cx="200" cy="160" r="3" fill="#FFCC66" opacity="0.7"/>
  <circle cx="220" cy="130" r="4" fill="#FFD080" opacity="0.9"/>
  <circle cx="300" cy="150" r="3" fill="#FFCC66" opacity="0.7"/>
  <circle cx="330" cy="130" r="4" fill="#FFD080" opacity="0.8"/>
  <circle cx="350" cy="165" r="3" fill="#FFCC66" opacity="0.9"/>
  <!-- Wind lines -->
  <path d="M80 310 Q140 305 200 315 Q260 325 320 310" fill="none" stroke="#FFDD88" stroke-width="2" opacity="0.3"/>
  <path d="M100 330 Q170 322 230 335" fill="none" stroke="#FFDD88" stroke-width="1" opacity="0.2"/>
</svg>
