<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="alertNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="256" y1="256" x2="140" y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="256" x2="372" y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="256" x2="140" y2="352" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="256" x2="372" y2="352" stroke="#f85149" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="256" x2="256" y2="120" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="392" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="160" x2="372" y2="160" stroke="#58a6ff" stroke-width="1" opacity="0.25"/>
  <line x1="140" y1="352" x2="372" y2="352" stroke="#58a6ff" stroke-width="1" opacity="0.25"/>
  <!-- Outer nodes -->
  <circle cx="140" cy="160" r="18" fill="url(#nodeGrad)"/>
  <circle cx="372" cy="160" r="18" fill="url(#nodeGrad)"/>
  <circle cx="140" cy="352" r="18" fill="url(#nodeGrad)"/>
  <circle cx="372" cy="352" r="16" fill="url(#alertNode)"/>
  <circle cx="256" cy="120" r="15" fill="url(#nodeGrad)"/>
  <circle cx="256" cy="392" r="15" fill="url(#nodeGrad)"/>
  <!-- Port labels -->
  <text x="140" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">80</text>
  <text x="372" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">443</text>
  <text x="140" y="357" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">22</text>
  <text x="372" y="357" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff" font-weight="bold">3389</text>
  <text x="256" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">53</text>
  <text x="256" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">8080</text>
  <!-- Center node (host) -->
  <circle cx="256" cy="256" r="30" fill="url(#nodeGrad)"/>
  <circle cx="256" cy="256" r="36" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <!-- Monitor icon in center -->
  <rect x="244" y="246" width="24" height="18" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
  <line x1="256" y1="264" x2="256" y2="270" stroke="#fff" stroke-width="2"/>
  <line x1="250" y1="270" x2="262" y2="270" stroke="#fff" stroke-width="2"/>
</svg>
