<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg07)"/>
  <!-- Stacked cards - SVG (top) -->
  <rect x="230" y="210" width="560" height="170" rx="22" fill="white" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <rect x="255" y="228" width="8" height="134" rx="4" fill="#F472B6"/>
  <text x="512" y="315" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#374151" text-anchor="middle">SVG</text>
  <!-- PNG (middle card, offset down) -->
  <rect x="250" y="408" width="560" height="170" rx="22" fill="#FED7AA" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <rect x="275" y="426" width="8" height="134" rx="4" fill="#EA580C"/>
  <text x="532" y="513" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#374151" text-anchor="middle">PNG</text>
  <!-- ICO (bottom card, offset further) -->
  <rect x="270" y="606" width="560" height="170" rx="22" fill="#BBF7D0" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <rect x="295" y="624" width="8" height="134" rx="4" fill="#16A34A"/>
  <text x="552" y="711" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#374151" text-anchor="middle">ICO</text>
  <!-- Arrow overlay -->
  <path d="M 820 380 L 860 430 L 820 480" stroke="white" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>