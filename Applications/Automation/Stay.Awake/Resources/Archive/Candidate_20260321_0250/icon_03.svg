<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep indigo -->
  <rect width="1024" height="1024" rx="190" fill="#080418"/>

  <!-- Moon crescent (full circle minus offset circle = crescent facing right) -->
  <circle cx="460" cy="512" r="270" fill="#5C6BC0"/>
  <!-- Cutout to form crescent -->
  <circle cx="572" cy="448" r="226" fill="#080418"/>

  <!-- Subtle star dots (sleeping night sky feel) -->
  <circle cx="760" cy="200" r="10" fill="#9FA8DA" opacity="0.6"/>
  <circle cx="840" cy="340" r="7" fill="#9FA8DA" opacity="0.4"/>
  <circle cx="700" cy="290" r="8" fill="#7986CB" opacity="0.5"/>
  <circle cx="820" cy="180" r="6" fill="#9FA8DA" opacity="0.35"/>

  <!-- Prohibition circle (red-orange) -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#FF3D00" stroke-width="72"/>

  <!-- Prohibition diagonal line -->
  <line x1="270" y1="270" x2="754" y2="754"
        stroke="#FF3D00" stroke-width="72" stroke-linecap="round"/>
</svg>
