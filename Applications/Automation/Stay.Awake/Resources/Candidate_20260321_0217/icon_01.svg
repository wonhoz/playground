<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep dark green-black -->
  <rect width="1024" height="1024" rx="200" fill="#071410"/>
  <!-- Eye outline / eyelid shape -->
  <path d="M160 512 Q512 180 864 512 Q512 844 160 512 Z" fill="#0F2A1F" stroke="#4CAF50" stroke-width="20"/>
  <!-- Iris -->
  <circle cx="512" cy="512" r="175" fill="#1B5E20" stroke="#66BB6A" stroke-width="16"/>
  <!-- Pupil -->
  <circle cx="512" cy="512" r="96" fill="#071410"/>
  <!-- Highlight reflection -->
  <circle cx="462" cy="462" r="38" fill="white" opacity="0.25"/>
  <!-- Active status dot: bright green -->
  <circle cx="780" cy="280" r="72" fill="#00C853" stroke="#CCFF90" stroke-width="14"/>
  <!-- Inner dot -->
  <circle cx="780" cy="280" r="32" fill="#CCFF90"/>
</svg>
