  <!-- 201 Created -->
  <circle cx="135" cy="225" r="10" fill="#059669"/>
  <text x="152" y="232" font-family="monospace" font-size="14" fill="#34D399">/create</text>
  <rect x="340" y="215" width="50" height="20" rx="4" fill="#0D9488"/>
  <text x="365" y="230" font-family="monospace" font-size="10" fill="white" text-anchor="middle">201</text>
  <!-- 404 -->
  <circle cx="135" cy="265" r="10" fill="#DC2626"/>
  <text x="152" y="272" font-family="monospace" font-size="14" fill="#F87171">/old-ep</text>
  <rect x="340" y="255" width="50" height="20" rx="4" fill="#DC2626"/>
  <text x="365" y="270" font-family="monospace" font-size="10" fill="white" text-anchor="middle">404</text>
  <!-- 401 -->
  <circle cx="135" cy="305" r="10" fill="#D97706"/>
  <text x="152" y="312" font-family="monospace" font-size="14" fill="#FBBF24">/secure</text>
  <rect x="340" y="295" width="50" height="20" rx="4" fill="#D97706"/>
