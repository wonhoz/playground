    <path d="M790 490 C700 488 610 488 510 490" fill="none" stroke="#A78BFA" stroke-width="54" stroke-linecap="round"/>
    <polygon points="510,490 558,448 558,532" fill="#A78BFA"/>

    <!-- 화살표 7: 핑크 (우상) -->
    <path d="M710 280 C640 340 570 410 510 490" fill="none" stroke="#F472B6" stroke-width="54" stroke-linecap="round"/>
    <polygon points="510,490 556,444 540,524" fill="#F472B6"/>

    <!-- 중앙 수렴점 -->
    <circle cx="512" cy="490" r="66" fill="#FFFFFF"/>
    <circle cx="512" cy="490" r="44" fill="#2D1060"/>
    <circle cx="512" cy="490" r="22" fill="#FFFFFF"/>
