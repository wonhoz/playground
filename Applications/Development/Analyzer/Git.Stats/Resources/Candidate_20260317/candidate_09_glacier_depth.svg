<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg09" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020f1a"/>
      <stop offset="30%" stop-color="#041525"/>
      <stop offset="100%" stop-color="#010810"/>
    </linearGradient>
    <linearGradient id="layer09a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <linearGradient id="layer09b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0EAFF"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="layer09c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#4BA3C7"/>
    </linearGradient>
    <linearGradient id="layer09d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A8FB5"/>
      <stop offset="100%" stop-color="#1A6080"/>
    </linearGradient>
    <linearGradient id="layer09e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A5A78"/>
      <stop offset="100%" stop-color="#0A3555"/>
    </linearGradient>
    <linearGradient id="layer09f" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A3050"/>
      <stop offset="100%" stop-color="#051825"/>
    </linearGradient>
    <linearGradient id="water09" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020f1a" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow09">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow09b">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iceGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 (하늘/물) -->
  <rect width="512" height="512" fill="url(#bg09)"/>

  <!-- 하늘 별 -->
  <circle cx="40" cy="25" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="120" cy="15" r="0.8" fill="#87CEEB" opacity="0.4"/>
  <circle cx="380" cy="30" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="460" cy="18" r="0.8" fill="#87CEEB" opacity="0.5"/>
  <circle cx="200" cy="40" r="0.7" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="330" cy="10" r="1" fill="#FFFFFF" opacity="0.5"/>

  <!-- 수면 (해수면) - 빙하 위 -->
  <rect x="0" y="110" width="512" height="402" fill="url(#water09)" opacity="0.15"/>

  <!-- 빙하 단면 테두리 (전체) -->
  <rect x="60" y="60" width="392" height="400" rx="8" fill="#041525" stroke="#87CEEB" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 빙하 층 1: 최상단 (눈/얼음) - 가장 많은 최신 커밋 -->
  <rect x="60" y="60" width="392" height="62" rx="4" fill="url(#layer09a)"/>
  <!-- 층 1 내부 구조 (결정) -->
  <path d="M80,75 L100,85 L120,72 L150,88 L180,70 L210,84 L240,69 L270,83 L300,70 L330,85 L360,71 L390,86 L420,73 L440,82" fill="none" stroke="#D0EAFF" stroke-width="1" opacity="0.6"/>
  <path d="M80,95 L110,105 L140,93 L170,108 L200,92 L230,106 L260,91 L290,105 L320,92 L350,107 L380,93 L410,108 L440,94" fill="none" stroke="#B8DCF4" stroke-width="1" opacity="0.5"/>
  <!-- 층 1 커밋 아이콘들 -->
  <circle cx="130" cy="85" r="5" fill="#4BA3C7" opacity="0.7"/>
  <circle cx="210" cy="82" r="6" fill="#3A8FB5" opacity="0.8"/>
  <circle cx="290" cy="88" r="5" fill="#4BA3C7" opacity="0.7"/>
  <circle cx="380" cy="83" r="6" fill="#3A8FB5" opacity="0.8"/>
  <!-- 층 라벨 바 (좌측) -->
  <rect x="60" y="60" width="6" height="62" rx="2" fill="#FFFFFF" opacity="0.8"/>

  <!-- 층 구분선 -->
  <line x1="60" y1="122" x2="452" y2="122" stroke="#87CEEB" stroke-width="1.5" opacity="0.7" filter="url(#iceGlow)"/>

  <!-- 빙하 층 2 -->
  <rect x="60" y="122" width="392" height="60" fill="url(#layer09b)"/>
  <path d="M80,138 Q150,132 220,140 Q290,148 360,136 Q410,130 450,138" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.5"/>
  <path d="M80,158 Q140,152 200,160 Q270,168 340,156 Q400,148 450,156" fill="none" stroke="#7EC8E3" stroke-width="1" opacity="0.4"/>
  <!-- 층 2 커밋 점들 -->
  <circle cx="110" cy="148" r="5" fill="#1A6080" opacity="0.7"/>
  <circle cx="185" cy="145" r="4" fill="#3A8FB5" opacity="0.6"/>
  <circle cx="256" cy="150" r="6" fill="#1A6080" opacity="0.8"/>
  <circle cx="330" cy="147" r="4" fill="#3A8FB5" opacity="0.6"/>
  <circle cx="415" cy="152" r="5" fill="#1A6080" opacity="0.7"/>
  <rect x="60" y="122" width="6" height="60" rx="1" fill="#D0EAFF" opacity="0.7"/>

  <line x1="60" y1="182" x2="452" y2="182" stroke="#7EC8E3" stroke-width="1.5" opacity="0.6" filter="url(#iceGlow)"/>

  <!-- 빙하 층 3 -->
  <rect x="60" y="182" width="392" height="58" fill="url(#layer09c)"/>
  <path d="M80,198 Q170,190 256,198 Q342,206 450,196" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.4"/>
  <path d="M80,218 Q170,212 256,220 Q342,228 450,216" fill="none" stroke="#7EC8E3" stroke-width="1" opacity="0.3"/>
  <circle cx="150" cy="207" r="5" fill="#020f1a" opacity="0.5"/>
  <circle cx="256" cy="210" r="6" fill="#020f1a" opacity="0.6"/>
  <circle cx="360" cy="207" r="5" fill="#020f1a" opacity="0.5"/>
  <rect x="60" y="182" width="6" height="58" rx="1" fill="#7EC8E3" opacity="0.7"/>

  <line x1="60" y1="240" x2="452" y2="240" stroke="#4BA3C7" stroke-width="1.5" opacity="0.5" filter="url(#iceGlow)"/>

  <!-- 빙하 층 4 -->
  <rect x="60" y="240" width="392" height="58" fill="url(#layer09d)"/>
  <path d="M80,258 Q170,250 256,258 Q342,266 450,256" fill="none" stroke="#7EC8E3" stroke-width="1" opacity="0.3"/>
  <circle cx="175" cy="265" r="4" fill="#87CEEB" opacity="0.3"/>
  <circle cx="256" cy="268" r="5" fill="#87CEEB" opacity="0.4"/>
  <circle cx="340" cy="265" r="4" fill="#87CEEB" opacity="0.3"/>
  <rect x="60" y="240" width="6" height="58" rx="1" fill="#4BA3C7" opacity="0.6"/>

  <line x1="60" y1="298" x2="452" y2="298" stroke="#3A8FB5" stroke-width="1" opacity="0.4" filter="url(#iceGlow)"/>

  <!-- 빙하 층 5 -->
  <rect x="60" y="298" width="392" height="58" fill="url(#layer09e)"/>
  <circle cx="200" cy="323" r="3" fill="#4BA3C7" opacity="0.25"/>
  <circle cx="310" cy="320" r="3" fill="#4BA3C7" opacity="0.25"/>
  <rect x="60" y="298" width="6" height="58" rx="1" fill="#3A8FB5" opacity="0.5"/>

  <line x1="60" y1="356" x2="452" y2="356" stroke="#1A6080" stroke-width="1" opacity="0.3"/>

  <!-- 빙하 층 6 (가장 깊은 층 - 오래된 커밋) -->
  <rect x="60" y="356" width="392" height="104" rx="4" fill="url(#layer09f)"/>
  <circle cx="256" cy="390" r="2.5" fill="#1A6080" opacity="0.2"/>
  <rect x="60" y="356" width="6" height="104" rx="1" fill="#1A5A78" opacity="0.4"/>

  <!-- 빙하 크랙 (균열 효과) -->
  <path d="M200,60 L195,130 L210,182" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" filter="url(#iceGlow)"/>
  <path d="M350,80 L355,140 L345,182" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3" filter="url(#iceGlow)"/>
  <path d="M130,182 L120,250" fill="none" stroke="#D0EAFF" stroke-width="1" opacity="0.3"/>
  <path d="M385,200 L395,260 L380,298" fill="none" stroke="#D0EAFF" stroke-width="1" opacity="0.25"/>

  <!-- 수면 라인 (중간) -->
  <rect x="0" y="108" width="512" height="8" fill="#87CEEB" opacity="0.2"/>
  <path d="M0,112 Q128,107 256,110 Q384,107 512,112" fill="none" stroke="#87CEEB" stroke-width="2.5" opacity="0.6" filter="url(#glow09)"/>
  <path d="M0,115 Q128,111 256,113 Q384,111 512,115" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>

  <!-- 수면 아래 투영 효과 -->
  <rect x="60" y="118" width="392" height="15" fill="#87CEEB" opacity="0.1"/>

  <!-- 깊이 표시 (우측 눈금) -->
  <line x1="455" y1="60" x2="465" y2="60" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="455" y1="122" x2="465" y2="122" stroke="#D0EAFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="455" y1="182" x2="465" y2="182" stroke="#87CEEB" stroke-width="1.5" opacity="0.5"/>
  <line x1="455" y1="240" x2="465" y2="240" stroke="#7EC8E3" stroke-width="1.5" opacity="0.4"/>
  <line x1="455" y1="298" x2="465" y2="298" stroke="#4BA3C7" stroke-width="1" opacity="0.35"/>
  <line x1="455" y1="356" x2="465" y2="356" stroke="#3A8FB5" stroke-width="1" opacity="0.3"/>
  <line x1="455" y1="460" x2="465" y2="460" stroke="#1A6080" stroke-width="1" opacity="0.25"/>

  <!-- 깊이 화살표 -->
  <line x1="470" y1="60" x2="470" y2="455" stroke="#87CEEB" stroke-width="1.5" opacity="0.4"/>
  <polygon points="470,465 465,450 475,450" fill="#87CEEB" opacity="0.4"/>

  <!-- 빙산 꼭대기 (수면 위) -->
  <polygon points="256,20 180,108 332,108" fill="#FFFFFF" opacity="0.9" filter="url(#iceGlow)"/>
  <polygon points="256,20 200,85 312,85" fill="#F0F8FF" opacity="0.95"/>
  <!-- 빙산 상단 크랙 -->
  <line x1="256" y1="30" x2="248" y2="70" stroke="#D0EAFF" stroke-width="1" opacity="0.6"/>
  <line x1="270" y1="50" x2="280" y2="90" stroke="#D0EAFF" stroke-width="1" opacity="0.5"/>
</svg>
