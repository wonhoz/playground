  <circle cx="266" cy="606" r="6" fill="#4DD0E1"/>
  <circle cx="256" cy="550" r="6" fill="#80CBC4"/>
  <circle cx="256" cy="490" r="6" fill="#A5D6A7"/>
  <circle cx="266" cy="436" r="6" fill="#D4E157"/>
  <circle cx="286" cy="390" r="6" fill="#F9C040" opacity="0.9"/>
  <circle cx="316" cy="348" r="6" fill="#F9C040"/>
  <circle cx="354" cy="316" r="6" fill="#FFD740"/>
  <circle cx="398" cy="292" r="6" fill="#F9C040"/>
  <circle cx="448" cy="244" r="6" fill="#FFD740"/>

  <!-- ===== 중앙 로고 ===== -->
  <!-- 중앙 원 배경 -->
