<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Stamp/seal on music tag (approve/finalize tags) -->
  <circle cx="512" cy="512" r="460" fill="#0A0014"/>
  <!-- Outer stamp ring -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="#AB47BC" stroke-width="28" stroke-dasharray="40 20"/>
  <!-- Stamp body -->
  <circle cx="512" cy="512" r="300" fill="#1A0030" stroke="#AB47BC" stroke-width="20"/>
  <!-- Inner design: music note inside stamp -->
  <rect x="480" y="340" width="36" height="240" rx="10" fill="#AB47BC"/>
  <ellipse cx="460" cy="580" rx="68" ry="48" fill="#AB47BC" transform="rotate(-15, 460, 580)"/>
  <path d="M516 340 L620 310 L620 346 L516 376 Z" fill="#AB47BC"/>
  <!-- Stamp handle top -->
  <rect x="470" y="140" width="84" height="120" rx="16" fill="#7B1FA2"/>
  <rect x="430" y="240" width="164" height="40" rx="8" fill="#7B1FA2"/>
</svg>
