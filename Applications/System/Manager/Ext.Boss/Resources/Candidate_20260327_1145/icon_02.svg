<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Keyring circle -->
  <circle cx="512" cy="380" r="160" fill="none" stroke="#0284C7" stroke-width="40"/>
  <circle cx="512" cy="220" r="50" fill="#0284C7"/>
  <!-- Keys hanging from ring -->
  <!-- Key 1 (.txt) - blue -->
  <rect x="280" y="440" width="130" height="50" rx="8" fill="#3B82F6"/>
  <circle cx="345" cy="465" r="22" fill="#FFFFFF"/>
  <rect x="430" y="456" width="60" height="18" rx="4" fill="#FFFFFF"/>
  <rect x="430" y="442" width="20" height="46" rx="2" fill="none" stroke="#3B82F6" stroke-width="6"/>
  <text x="345" y="558" font-family="Consolas,monospace" font-size="40" fill="#1E40AF" text-anchor="middle">.txt</text>
  <!-- Key 2 (.jpg) - purple -->
  <rect x="455" y="440" width="130" height="50" rx="8" fill="#8B5CF6"/>
  <circle cx="520" cy="465" r="22" fill="#FFFFFF"/>
  <text x="520" y="558" font-family="Consolas,monospace" font-size="40" fill="#6D28D9" text-anchor="middle">.jpg</text>
  <!-- Key 3 (.pdf) - red -->
  <rect x="630" y="440" width="130" height="50" rx="8" fill="#EF4444"/>
  <circle cx="695" cy="465" r="22" fill="#FFFFFF"/>
  <text x="695" y="558" font-family="Consolas,monospace" font-size="40" fill="#B91C1C" text-anchor="middle">.pdf</text>
  <!-- Key 4 (.mp4) - green -->
  <rect x="340" y="580" width="130" height="50" rx="8" fill="#10B981"/>
  <circle cx="405" cy="605" r="22" fill="#FFFFFF"/>
  <text x="405" y="698" font-family="Consolas,monospace" font-size="40" fill="#047857" text-anchor="middle">.mp4</text>
  <!-- Key 5 (.exe) - orange -->
  <rect x="545" y="580" width="130" height="50" rx="8" fill="#F59E0B"/>
  <circle cx="610" cy="605" r="22" fill="#FFFFFF"/>
  <text x="610" y="698" font-family="Consolas,monospace" font-size="40" fill="#B45309" text-anchor="middle">.exe</text>
  <!-- Label -->
  <text x="512" y="820" font-family="Arial,sans-serif" font-size="58" fill="#0C4A6E" font-weight="bold" text-anchor="middle">Extension</text>
</svg>
