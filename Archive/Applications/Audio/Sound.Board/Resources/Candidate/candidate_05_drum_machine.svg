<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#3d1c02"/>
      <stop offset="100%" style="stop-color:#0d0502"/>
    </radialGradient>
    <radialGradient id="drum" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#d4820a"/>
      <stop offset="100%" style="stop-color:#7a4500"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Drum body -->
  <ellipse cx="256" cy="200" rx="180" ry="50" fill="#5a3000" stroke="#c87020" stroke-width="4"/>
  <rect x="76" y="200" width="360" height="140" fill="#5a3000"/>
  <ellipse cx="256" cy="340" rx="180" ry="50" fill="url(#drum)" stroke="#c87020" stroke-width="4"/>
  <!-- Drum head -->
  <ellipse cx="256" cy="200" rx="175" ry="46" fill="url(#drum)" opacity="0.9"/>
  <!-- Tension rods -->
  <line x1="110" y1="180" x2="110" y2="360" stroke="#888" stroke-width="6"/>
  <line x1="160" y1="165" x2="160" y2="365" stroke="#888" stroke-width="6"/>
  <line x1="256" y1="160" x2="256" y2="365" stroke="#888" stroke-width="6"/>
  <line x1="352" y1="165" x2="352" y2="365" stroke="#888" stroke-width="6"/>
  <line x1="402" y1="180" x2="402" y2="360" stroke="#888" stroke-width="6"/>
  <!-- Hit marks -->
  <circle cx="210" cy="190" r="12" fill="white" opacity="0.2"/>
  <circle cx="300" cy="205" r="8" fill="white" opacity="0.15"/>
  <!-- Stand -->
  <line x1="180" y1="380" x2="130" y2="460" stroke="#666" stroke-width="10" stroke-linecap="round"/>
  <line x1="332" y1="380" x2="382" y2="460" stroke="#666" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="390" x2="256" y2="460" stroke="#666" stroke-width="10" stroke-linecap="round"/>
</svg>