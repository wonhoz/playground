<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 검색창 배경 -->
  <rect x="60" y="180" width="340" height="70" rx="35" fill="#4A148C" stroke="#CE93D8" stroke-width="3"/>
  <!-- 돋보기 아이콘 -->
  <circle cx="390" cy="215" r="55" fill="none" stroke="url(#glow)" stroke-width="28"/>
  <line x1="432" y1="257" x2="460" y2="285" stroke="#E1BEE7" stroke-width="24" stroke-linecap="round"/>
  <!-- 이모지 나열 -->
  <text x="110" y="148" font-size="52" fill="#E1BEE7" font-family="Segoe UI Emoji">🔍</text>
  <text x="200" y="148" font-size="52" fill="#CE93D8" font-family="Segoe UI Emoji">🎯</text>
  <text x="290" y="148" font-size="52" fill="#BA68C8" font-family="Segoe UI Emoji">✨</text>
</svg>