<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="gauge_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E35"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="arc_speed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="60%" stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FF4400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Drive body -->
  <rect x="140" y="80" width="232" height="160" rx="16" fill="#1E1E35" stroke="#3A3A5A" stroke-width="2.5"/>
  <rect x="156" y="96" width="200" height="128" rx="10" fill="#141428"/>
  <!-- HDD platters hint -->
  <circle cx="256" cy="160" r="52" fill="none" stroke="#3A3A5A" stroke-width="2"/>
  <circle cx="256" cy="160" r="36" fill="none" stroke="#2A2A4A" stroke-width="1.5"/>
  <circle cx="256" cy="160" r="18" fill="none" stroke="#252545" stroke-width="1"/>
  <circle cx="256" cy="160" r="7" fill="#4A4A6A"/>
  <!-- Connector pins -->
  <rect x="172" y="232" width="8" height="14" rx="2" fill="#888888"/>
  <rect x="186" y="232" width="8" height="14" rx="2" fill="#888888"/>
  <rect x="200" y="232" width="8" height="14" rx="2" fill="#888888"/>
  <rect x="214" y="232" width="8" height="14" rx="2" fill="#888888"/>
  <!-- Speedometer gauge below -->
  <path d="M116,380 A140,140 0 0,1 396,380" fill="none" stroke="#2A2A40" stroke-width="18"/>
  <path d="M116,380 A140,140 0 0,1 316,258" fill="none" stroke="#00FF88" stroke-width="12" stroke-linecap="round"/>
  <path d="M316,258 A140,140 0 0,1 396,380" fill="none" stroke="#FF4400" stroke-width="12" stroke-linecap="round" opacity="0.3"/>
  <!-- Needle -->
  <line x1="256" y1="380" x2="315" y2="255" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256" cy="380" r="10" fill="#333355" stroke="#6666AA" stroke-width="2"/>
  <!-- Speed label -->
  <text x="256" y="420" font-family="Arial" font-size="20" fill="#00FF88" text-anchor="middle">6.8 GB/s</text>
  <text x="256" y="460" font-family="Arial" font-size="24" font-weight="bold" fill="#4488FF" text-anchor="middle">DRIVE·BENCH</text>
</svg>
