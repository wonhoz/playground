<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a0f"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#F97316" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <!-- Compass cardinal points with JSON labels -->
  <text x="256" y="82" text-anchor="middle" font-family="monospace" font-size="14" fill="#F97316">N</text>
  <text x="256" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C">{ root }</text>
  <text x="440" y="262" font-family="monospace" font-size="14" fill="#F97316">E</text>
  <text x="430" y="278" font-family="monospace" font-size="9" fill="#FB923C">[ arr ]</text>
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="14" fill="#F97316">S</text>
  <text x="256" y="426" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C">null</text>
  <text x="60" y="262" text-anchor="middle" font-family="monospace" font-size="14" fill="#F97316">W</text>
  <text x="60" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C">{ obj }</text>
  <!-- Compass needle (pointing to root/North) -->
  <polygon points="256,106 248,256 256,240 264,256" fill="url(#needle)" opacity="0.9"/>
  <polygon points="256,406 248,256 256,270 264,256" fill="#374151" opacity="0.6"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="14" fill="#0a1520" stroke="#F97316" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="5" fill="#F97316"/>
  <!-- Tick marks -->
  <line x1="256" y1="76" x2="256" y2="66" stroke="#F97316" stroke-width="2" opacity="0.5"/>
  <line x1="446" y1="256" x2="456" y2="256" stroke="#F97316" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="436" x2="256" y2="446" stroke="#F97316" stroke-width="2" opacity="0.5"/>
  <line x1="66" y1="256" x2="56" y2="256" stroke="#F97316" stroke-width="2" opacity="0.5"/>
  <!-- Diagonal tick marks -->
  <line x1="390" y1="122" x2="396" y2="116" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="390" y1="390" x2="396" y2="396" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="122" y1="390" x2="116" y2="396" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="122" y1="122" x2="116" y2="116" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <!-- JSON path decorations -->
  <text x="350" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C" opacity="0.5">$.data</text>
  <text x="160" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C" opacity="0.5">$.meta</text>
  <text x="350" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C" opacity="0.5">$.list</text>
  <text x="160" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#FB923C" opacity="0.5">$.tags</text>
</svg>
