<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F"/>
      <stop offset="100%" style="stop-color:#451A03"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg06)"/>
  <!-- Tree trunk -->
  <rect x="472" y="680" width="80" height="180" rx="16" fill="#92400E"/>
  <!-- Tree roots -->
  <path d="M 472 850 Q 380 870 340 840" fill="none" stroke="#92400E" stroke-width="28" stroke-linecap="round"/>
  <path d="M 552 850 Q 644 870 684 840" fill="none" stroke="#92400E" stroke-width="28" stroke-linecap="round"/>
  <!-- Main branches -->
  <!-- Center branch up -->
  <line x1="512" y1="680" x2="512" y2="430" stroke="#A16207" stroke-width="36" stroke-linecap="round"/>
  <!-- Left branches -->
  <line x1="512" y1="600" x2="320" y2="460" stroke="#A16207" stroke-width="26" stroke-linecap="round"/>
  <line x1="512" y1="520" x2="240" y2="380" stroke="#A16207" stroke-width="20" stroke-linecap="round"/>
  <!-- Right branches -->
  <line x1="512" y1="600" x2="704" y2="460" stroke="#A16207" stroke-width="26" stroke-linecap="round"/>
  <line x1="512" y1="520" x2="784" y2="380" stroke="#A16207" stroke-width="20" stroke-linecap="round"/>
  <!-- Sub branches -->
  <line x1="320" y1="460" x2="240" y2="340" stroke="#B45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="320" y1="460" x2="380" y2="330" stroke="#B45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="704" y1="460" x2="784" y2="340" stroke="#B45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="704" y1="460" x2="644" y2="330" stroke="#B45309" stroke-width="14" stroke-linecap="round"/>
  <!-- Words on branches (leaves) -->
  <!-- Top center -->
  <text x="512" y="390" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="70" font-weight="900" fill="#FDE68A">Word</text>
  <!-- Left upper -->
  <text x="240" y="330" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="700" fill="#4ADE80">Cloud</text>
  <!-- Right upper -->
  <text x="784" y="330" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="700" fill="#FB923C">Text</text>
  <!-- Left mid -->
  <text x="268" y="420" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="34" font-weight="700" fill="#60A5FA">data</text>
  <!-- Right mid -->
  <text x="756" y="420" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="34" font-weight="700" fill="#F9A8D4">art</text>
  <!-- Left lower sub -->
  <text x="360" y="296" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="700" fill="#C4B5FD">font</text>
  <!-- Right lower sub -->
  <text x="660" y="296" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="700" fill="#6EE7B7">viz</text>
  <!-- Left branch tip -->
  <text x="228" y="380" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#FCD34D">size</text>
  <text x="768" y="380" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="22" fill="#A5F3FC">color</text>
</svg>
