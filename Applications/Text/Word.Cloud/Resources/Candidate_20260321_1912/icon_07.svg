    <text x="322" y="603" font-size="80" fill="#E91E63">Hello</text>
    <text x="702" cy="603" y="598" font-size="76" fill="#F06292">Cloud</text>
    <text x="267" y="678" font-size="52" fill="#AB47BC">Text</text>
    <text x="512" y="686" font-size="52" fill="#7E57C2">Data</text>
