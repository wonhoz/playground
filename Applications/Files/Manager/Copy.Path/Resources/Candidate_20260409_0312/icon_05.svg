<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c5"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Lavender background -->
  <rect width="1024" height="1024" rx="190" fill="#EDE9FE"/>
  <g clip-path="url(#c5)">
    <!-- Layer 2: Back card (rotated left, light blue) -->
    <g transform="rotate(-10, 512, 520)">
      <rect x="286" y="248" width="452" height="540" rx="28" fill="#DBEAFE" stroke="#93C5FD" stroke-width="8"/>
      <!-- Header on back card -->
      <rect x="286" y="248" width="452" height="74" rx="28" fill="#60A5FA"/>
      <rect x="286" y="284" width="452" height="38" fill="#60A5FA"/>
    </g>
    <!-- Middle card (rotated right, light pink) -->
    <g transform="rotate(10, 512, 520)">
      <rect x="286" y="248" width="452" height="540" rx="28" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="8"/>
      <rect x="286" y="248" width="452" height="74" rx="28" fill="#F472B6"/>
      <rect x="286" y="284" width="452" height="38" fill="#F472B6"/>
    </g>
    <!-- Layer 2: Front card (white, straight) -->
    <rect x="286" y="236" width="452" height="552" rx="28" fill="white"/>
    <!-- Card header (purple) -->
    <rect x="286" y="236" width="452" height="86" rx="28" fill="#7C3AED"/>
    <rect x="286" y="278" width="452" height="44" fill="#7C3AED"/>
    <!-- Layer 3: Card content -->
    <text x="310" y="382" font-family="Consolas,monospace" font-size="80" fill="#1E1B4B" font-weight="bold">C:\path</text>
    <line x1="304" y1="402" x2="714" y2="402" stroke="#EDE9FE" stroke-width="6"/>
    <text x="310" y="496" font-family="Consolas,monospace" font-size="80" fill="#059669" font-weight="bold">/home/</text>
    <line x1="304" y1="516" x2="714" y2="516" stroke="#EDE9FE" stroke-width="6"/>
    <text x="310" y="610" font-family="Consolas,monospace" font-size="80" fill="#DC2626" font-weight="bold">file://</text>
    <!-- Copy button on front card -->
    <rect x="310" y="648" width="404" height="100" rx="16" fill="#7C3AED"/>
    <text x="512" y="718" font-family="Arial,sans-serif" font-size="82" fill="white" font-weight="bold" text-anchor="middle">Copy</text>
  </g>
</svg>
