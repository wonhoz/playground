<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
    <linearGradient id="camera" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#e17055"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="96" y="196" width="320" height="200" rx="20" fill="url(#camera)"/>
  <!-- Camera top bump -->
  <rect x="160" y="168" width="100" height="36" rx="10" fill="url(#camera)"/>
  <!-- Lens outer -->
  <circle cx="240" cy="296" r="80" fill="url(#lens)"/>
  <circle cx="240" cy="296" r="64" fill="#1a1a1a"/>
  <circle cx="240" cy="296" r="48" fill="#2d2d2d"/>
  <circle cx="240" cy="296" r="32" fill="#0066cc" opacity="0.8" filter="url(#glow)"/>
  <circle cx="240" cy="296" r="16" fill="white" opacity="0.3"/>
  <circle cx="232" cy="288" r="6" fill="white" opacity="0.5"/>
  <!-- Calendar mini overlay -->
  <rect x="300" y="220" width="100" height="100" rx="10" fill="#243b55" opacity="0.95"/>
  <rect x="300" y="220" width="100" height="28" rx="10" fill="#e17055"/>
  <rect x="300" y="238" width="100" height="10" fill="#e17055"/>
  <!-- Calendar grid dots -->
  <circle cx="316" cy="264" r="4" fill="white" opacity="0.7"/>
  <circle cx="334" cy="264" r="4" fill="white" opacity="0.7"/>
  <circle cx="352" cy="264" r="4" fill="white" opacity="0.7"/>
  <circle cx="370" cy="264" r="4" fill="white" opacity="0.7"/>
  <circle cx="316" cy="282" r="4" fill="#fdcb6e" opacity="0.9"/>
  <circle cx="334" cy="282" r="4" fill="white" opacity="0.7"/>
  <circle cx="352" cy="282" r="4" fill="white" opacity="0.7"/>
  <circle cx="316" cy="300" r="4" fill="white" opacity="0.7"/>
  <circle cx="334" cy="300" r="4" fill="white" opacity="0.7"/>
  <!-- Shutter button -->
  <circle cx="380" cy="210" r="16" fill="#2d3436"/>
  <circle cx="380" cy="210" r="10" fill="#636e72"/>
</svg>