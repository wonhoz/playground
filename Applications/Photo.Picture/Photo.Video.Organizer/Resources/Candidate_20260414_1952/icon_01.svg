  <rect x="100" y="260" width="130" height="100" rx="10" fill="white" opacity="0.85" transform="rotate(-8 165 310)"/>
  <rect x="108" y="268" width="114" height="72" rx="6" fill="#64B5F6" transform="rotate(-8 165 310)"/>
