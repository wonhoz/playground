<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0d0508"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0510"/>
      <stop offset="100%" stop-color="#050205"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스카이라인을 픽셀 타일로 구성한 모자이크 -->
  <!-- 하늘 배경 -->
  <rect x="60" y="80" width="392" height="260" rx="8" fill="url(#sky)" opacity="0.6"/>
  <!-- 건물들을 픽셀/타일로 표현 -->
  <!-- 건물 1 (왼쪽) -->
  <rect x="70" y="230" width="14" height="110" rx="0" fill="#F43F5E" opacity="0.8"/>
  <rect x="86" y="230" width="14" height="110" rx="0" fill="#9F1239" opacity="0.7"/>
  <rect x="100" y="210" width="14" height="130" rx="0" fill="#F43F5E" opacity="0.85" filter="url(#glow)"/>
  <rect x="114" y="230" width="14" height="110" rx="0" fill="#BE185D" opacity="0.75"/>
  <!-- 건물 2 -->
  <rect x="130" y="180" width="14" height="160" rx="0" fill="#F43F5E" opacity="0.8"/>
  <rect x="144" y="170" width="14" height="170" rx="0" fill="#9F1239" opacity="0.85" filter="url(#glow)"/>
  <rect x="158" y="195" width="14" height="145" rx="0" fill="#BE185D" opacity="0.75"/>
  <rect x="172" y="215" width="14" height="125" rx="0" fill="#F43F5E" opacity="0.8"/>
  <!-- 건물 3 (가장 높음) -->
  <rect x="192" y="130" width="14" height="210" rx="0" fill="#F43F5E" opacity="0.9" filter="url(#glow)"/>
  <rect x="206" y="120" width="14" height="220" rx="0" fill="#BE185D" opacity="0.9" filter="url(#glow)"/>
  <rect x="220" y="140" width="14" height="200" rx="0" fill="#9F1239" opacity="0.85"/>
  <rect x="234" y="160" width="14" height="180" rx="0" fill="#F43F5E" opacity="0.8"/>
  <!-- 건물 4 (중앙) -->
  <rect x="256" y="150" width="14" height="190" rx="0" fill="#F43F5E" opacity="0.85" filter="url(#glow)"/>
  <rect x="270" y="140" width="14" height="200" rx="0" fill="#BE185D" opacity="0.9" filter="url(#glow)"/>
  <rect x="284" y="155" width="14" height="185" rx="0" fill="#F43F5E" opacity="0.8"/>
  <!-- 건물 5 -->
  <rect x="304" y="170" width="14" height="170" rx="0" fill="#9F1239" opacity="0.8"/>
  <rect x="318" y="160" width="14" height="180" rx="0" fill="#F43F5E" opacity="0.85" filter="url(#glow)"/>
  <rect x="332" y="185" width="14" height="155" rx="0" fill="#BE185D" opacity="0.75"/>
  <rect x="346" y="205" width="14" height="135" rx="0" fill="#F43F5E" opacity="0.8"/>
  <!-- 건물 6 (오른쪽) -->
  <rect x="366" y="215" width="14" height="125" rx="0" fill="#9F1239" opacity="0.75"/>
  <rect x="380" y="200" width="14" height="140" rx="0" fill="#F43F5E" opacity="0.8" filter="url(#glow)"/>
  <rect x="394" y="220" width="14" height="120" rx="0" fill="#BE185D" opacity="0.75"/>
  <rect x="408" y="235" width="14" height="105" rx="0" fill="#F43F5E" opacity="0.7"/>
  <!-- 창문 픽셀 -->
  <rect x="103" y="218" width="4" height="4" fill="#FDE047" opacity="0.6"/>
  <rect x="136" y="195" width="4" height="4" fill="#FDE047" opacity="0.7"/>
  <rect x="148" y="180" width="4" height="4" fill="#FDE047" opacity="0.8"/>
  <rect x="196" y="145" width="4" height="4" fill="#FDE047" opacity="0.9"/>
  <rect x="210" y="130" width="4" height="4" fill="#FDE047" opacity="1" filter="url(#glow)"/>
  <rect x="260" y="160" width="4" height="4" fill="#FDE047" opacity="0.8"/>
  <rect x="274" y="148" width="4" height="4" fill="#FDE047" opacity="0.9"/>
  <rect x="322" y="170" width="4" height="4" fill="#FDE047" opacity="0.7"/>
  <rect x="384" y="210" width="4" height="4" fill="#FDE047" opacity="0.6"/>
  <!-- 바닥 -->
  <rect x="60" y="340" width="392" height="14" rx="2" fill="#F43F5E" opacity="0.4"/>
  <!-- 하단 라벨 -->
  <rect x="110" y="370" width="292" height="80" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="399" text-anchor="middle" font-size="14" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">CITY SKYLINE</text>
  <text x="256" y="422" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">도시 스카이라인 모자이크</text>
  <text x="256" y="440" text-anchor="middle" font-size="10" fill="#555" opacity="0.6">pixel art style</text>
</svg>
