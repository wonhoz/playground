<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0C2A1C"/>
      <stop offset="100%" stop-color="#040E09"/>
    </radialGradient>
    <linearGradient id="bladeGrad04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="50%" stop-color="#DDFFEE"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <clipPath id="frame04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#frame04)">
    <!-- Layer 2: Layered shapes (pentagon on top, circle behind, triangle behind) -->

    <!-- Triangle (backmost layer) - large, teal -->
    <polygon points="512,160 820,680 204,680" fill="#007755" opacity="0.7"/>

    <!-- Circle (middle layer) - vivid cyan -->
    <circle cx="512" cy="490" r="220" fill="#00BB88" opacity="0.82"/>

    <!-- Pentagon (top layer) - hot pink/magenta -->
    <polygon points="512,300 660,408 604,570 420,570 364,408" fill="#FF1E6E" opacity="0.93"/>

    <!-- Inner shape details - subtle outline on pentagon -->
    <polygon points="512,300 660,408 604,570 420,570 364,408" fill="none" stroke="#FF6AA0" stroke-width="6" opacity="0.5"/>

    <!-- Spark at the slash impact point (center) -->
    <circle cx="512" cy="465" r="22" fill="#FFFF80" opacity="0.85"/>
    <!-- Spark rays -->
    <line x1="512" y1="440" x2="512" y2="415" stroke="#FFFF80" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="530" y1="447" x2="550" y2="428" stroke="#FFFF80" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="494" y1="447" x2="474" y2="428" stroke="#FFFF80" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="535" y1="465" x2="562" y2="465" stroke="#FFFF80" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="489" y1="465" x2="462" y2="465" stroke="#FFFF80" stroke-width="7" stroke-linecap="round" opacity="0.7"/>

    <!-- Bomb (lower right corner) -->
    <circle cx="810" cy="808" r="86" fill="#111"/>
    <ellipse cx="788" cy="786" rx="20" ry="14" fill="white" opacity="0.11"/>
    <path d="M810,722 Q838,692 854,664" stroke="#555" stroke-width="13" fill="none" stroke-linecap="round"/>
    <ellipse cx="860" cy="656" rx="11" ry="16" fill="#FF6A00" transform="rotate(-25 860 656)"/>
    <ellipse cx="860" cy="656" rx="7" ry="10" fill="#FFE040" transform="rotate(-25 860 656)"/>

    <!-- Layer 3: Sharp white blade (diagonal, cutting through all layers) -->
    <!-- Outer glow -->
    <line x1="155" y1="155" x2="869" y2="869" stroke="white" stroke-width="70" stroke-linecap="round" opacity="0.08"/>
    <!-- Mid glow -->
    <line x1="155" y1="155" x2="869" y2="869" stroke="#AAFFCC" stroke-width="38" stroke-linecap="round" opacity="0.28"/>
    <!-- Core white blade -->
    <line x1="155" y1="155" x2="869" y2="869" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Sharp edge shine lines -->
    <line x1="168" y1="140" x2="882" y2="854" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <line x1="140" y1="168" x2="854" y2="882" stroke="#88FFCC" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
  </g>
</svg>
