<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Signal.Flow — 아이콘 후보</title>
  <style>
    body { background:#1a1a1a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:32px; }
    h1 { font-size:22px; margin-bottom:8px; color:#00ccff; letter-spacing:2px; }
    p  { color:#888; font-size:13px; margin-bottom:28px; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
    .card { background:#242424; border-radius:12px; padding:20px; text-align:center; border:1px solid #333; }
    .card img { width:120px; height:120px; border-radius:12px; }
    .card span { display:block; margin-top:10px; font-size:11px; color:#888; word-break:break-all; }
  </style>
</head>
<body>
  <h1>Signal.Flow</h1>
  <p>신호·이벤트 흐름 분석기 — 아이콘 후보 10종</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_neon_waveform.svg"/><span>01 · neon waveform</span></div>
    <div class="card"><img src="candidate_02_orange_event_pipe.svg"/><span>02 · orange event pipe</span></div>
    <div class="card"><img src="candidate_03_blue_circuit_trace.svg"/><span>03 · blue circuit trace</span></div>
    <div class="card"><img src="candidate_04_green_oscilloscope.svg"/><span>04 · green oscilloscope</span></div>
    <div class="card"><img src="candidate_05_violet_event_timeline.svg"/><span>05 · violet event timeline</span></div>
    <div class="card"><img src="candidate_06_red_pulse_radar.svg"/><span>06 · red pulse radar</span></div>
    <div class="card"><img src="candidate_07_teal_dag_flow.svg"/><span>07 · teal DAG flow</span></div>
    <div class="card"><img src="candidate_08_yellow_lightning_debug.svg"/><span>08 · yellow lightning debug</span></div>
    <div class="card"><img src="candidate_09_pink_spectrum_analyzer.svg"/><span>09 · pink spectrum analyzer</span></div>
    <div class="card"><img src="candidate_10_ice_stream_arrows.svg"/><span>10 · ice stream arrows</span></div>
  </div>
</body>
</html>
