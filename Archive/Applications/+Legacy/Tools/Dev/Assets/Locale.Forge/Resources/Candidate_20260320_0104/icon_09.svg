<!-- Locale.Forge icon_09: 레이어 스택 (stacked document layers) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0F1A"/>
  <!-- Bottom layer -->
  <rect x="200" y="600" width="560" height="120" rx="20" fill="#3949AB"/>
  <!-- Middle layer -->
  <rect x="200" y="470" width="560" height="120" rx="20" fill="#4A5BBD"/>
  <!-- Top layer -->
  <rect x="200" y="340" width="560" height="120" rx="20" fill="#5C6BC0"/>
  <!-- Lines on top layer -->
  <line x1="260" y1="380" x2="560" y2="380" stroke="#7986CB" stroke-width="18" stroke-linecap="round"/>
  <line x1="260" y1="420" x2="480" y2="420" stroke="#7986CB" stroke-width="18" stroke-linecap="round"/>
</svg>
