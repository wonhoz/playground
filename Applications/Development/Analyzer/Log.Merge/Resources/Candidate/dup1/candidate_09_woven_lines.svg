<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2a1040"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Woven/interlaced log streams -->
  <!-- Blue stream wavy -->
  <path d="M60 140 Q130 120 200 160 Q270 200 340 160 Q410 120 460 150" fill="none" stroke="#2196f3" stroke-width="8" stroke-linecap="round"/>
  <!-- Red stream wavy (opposite phase) -->
  <path d="M60 200 Q130 240 200 200 Q270 160 340 200 Q410 240 460 210" fill="none" stroke="#f44336" stroke-width="8" stroke-linecap="round"/>
  <!-- Green stream -->
  <path d="M60 260 Q130 240 200 280 Q270 320 340 280 Q410 240 460 260" fill="none" stroke="#4caf50" stroke-width="8" stroke-linecap="round"/>
  <!-- Orange stream -->
  <path d="M60 320 Q130 360 200 320 Q270 280 340 320 Q410 360 460 330" fill="none" stroke="#ff9800" stroke-width="8" stroke-linecap="round"/>
  <!-- Converge at right into single stream -->
  <path d="M460 150 Q490 150 490 256" fill="none" stroke="#2196f3" stroke-width="5" stroke-dasharray="6,4"/>
  <path d="M460 210 Q492 210 492 256" fill="none" stroke="#f44336" stroke-width="5" stroke-dasharray="6,4"/>
  <path d="M460 260 Q494 260 494 256" fill="none" stroke="#4caf50" stroke-width="5" stroke-dasharray="6,4"/>
  <path d="M460 330 Q492 330 492 256" fill="none" stroke="#ff9800" stroke-width="5" stroke-dasharray="6,4"/>
  <!-- Merged output -->
  <rect x="452" y="236" width="16" height="40" rx="8" fill="#ffd740"/>
  <!-- Label -->
  <text x="256" y="430" font-family="monospace" font-size="22" fill="#e040fb" text-anchor="middle">INTERLEAVED</text>
  <!-- File icons at left -->
  <circle cx="46" cy="140" r="14" fill="#1565c0" stroke="#42a5f5" stroke-width="3"/>
  <circle cx="46" cy="200" r="14" fill="#b71c1c" stroke="#ef5350" stroke-width="3"/>
  <circle cx="46" cy="260" r="14" fill="#1b5e20" stroke="#66bb6a" stroke-width="3"/>
  <circle cx="46" cy="320" r="14" fill="#e65100" stroke="#ff7043" stroke-width="3"/>
</svg>
