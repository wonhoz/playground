<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#120A28"/>
      <stop offset="100%" stop-color="#080410"/>
    </radialGradient>
    <clipPath id="frame04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <!-- Star-shaped clipPath for flag pattern -->
    <clipPath id="starClip04">
      <polygon points="512,140 580,330 790,330 622,450 688,650 512,528 336,650 402,450 234,330 444,330"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#frame04)">
    <!-- Layer 2: Star shape filled with flag stripes from different countries -->
    <!-- Base star shape -->
    <polygon points="512,140 580,330 790,330 622,450 688,650 512,528 336,650 402,450 234,330 444,330" fill="#1A1040"/>

    <!-- France stripes in top part of star -->
    <rect x="234" y="140" width="190" height="500" fill="#002395" clip-path="url(#starClip04)"/>
    <rect x="424" y="140" width="176" height="500" fill="#FFFFFF" clip-path="url(#starClip04)"/>
    <rect x="600" y="140" width="190" height="500" fill="#ED2939" clip-path="url(#starClip04)"/>

    <!-- Germany horizontal stripes overlay in lower part -->
    <rect x="234" y="440" width="556" height="70" fill="#000000" clip-path="url(#starClip04)" opacity="0.85"/>
    <rect x="234" y="510" width="556" height="70" fill="#DD0000" clip-path="url(#starClip04)" opacity="0.85"/>
    <rect x="234" y="580" width="556" height="70" fill="#FFCE00" clip-path="url(#starClip04)" opacity="0.85"/>

    <!-- Star outline -->
    <polygon points="512,140 580,330 790,330 622,450 688,650 512,528 336,650 402,450 234,330 444,330" fill="none" stroke="white" stroke-width="8" opacity="0.6"/>
    <polygon points="512,140 580,330 790,330 622,450 688,650 512,528 336,650 402,450 234,330 444,330" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>

    <!-- Large "?" in center of star -->
    <text x="512" y="500" font-family="'Segoe UI', Arial" font-size="160" font-weight="900" fill="white" text-anchor="middle" opacity="0.92">?</text>

    <!-- Layer 3: Orbiting flag tiles (surrounding the star) -->
    <!-- Top-left: Japan -->
    <rect x="155" y="152" width="120" height="80" rx="6" fill="white" opacity="0.9"/>
    <circle cx="215" cy="192" r="22" fill="#BC002D" opacity="0.9"/>
    <rect x="155" y="152" width="120" height="80" rx="6" fill="none" stroke="#555" stroke-width="2"/>

    <!-- Top-right: Germany (black/red/gold) -->
    <rect x="749" y="152" width="120" height="80" rx="6" fill="#FFCE00"/>
    <rect x="749" y="152" width="120" height="53" fill="#DD0000"/>
    <rect x="749" y="152" width="120" height="27" fill="#000"/>
    <rect x="749" y="152" width="120" height="80" rx="6" fill="none" stroke="#555" stroke-width="2"/>

    <!-- Bottom-left: Italy -->
    <rect x="155" y="790" width="120" height="80" rx="6" fill="#CE2B37"/>
    <rect x="155" y="790" width="80" height="80" fill="#FFFFFF"/>
    <rect x="155" y="790" width="40" height="80" fill="#009246"/>
    <rect x="155" y="790" width="120" height="80" rx="6" fill="none" stroke="#555" stroke-width="2"/>

    <!-- Bottom-right: Brazil -->
    <rect x="749" y="790" width="120" height="80" rx="6" fill="#009C3B"/>
    <polygon points="809,798 869,830 809,862 749,830" fill="#FEDF00"/>
    <circle cx="809" cy="830" r="18" fill="#002776"/>
    <rect x="749" y="790" width="120" height="80" rx="6" fill="none" stroke="#555" stroke-width="2"/>

    <!-- "국기 맞추기" text below -->
    <text x="512" y="750" font-family="'Segoe UI', Arial" font-size="52" font-weight="700" fill="#8877CC" text-anchor="middle" opacity="0.85">국기 맞추기</text>

    <!-- Flag pins/markers at each mini flag -->
    <circle cx="215" cy="240" r="7" fill="#FFD700"/>
    <circle cx="809" cy="240" r="7" fill="#FFD700"/>
    <circle cx="215" cy="782" r="7" fill="#FFD700"/>
    <circle cx="809" cy="782" r="7" fill="#FFD700"/>
  </g>
</svg>
