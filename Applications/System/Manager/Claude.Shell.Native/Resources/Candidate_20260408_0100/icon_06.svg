<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06csn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
  </defs>

  <!-- Background: deep sky blue -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06csn)"/>

  <!-- Windows (left side: File Explorer) -->
  <rect x="100" y="240" width="380" height="480" rx="14" fill="#1E3A5F"/>
  <rect x="100" y="240" width="380" height="44" rx="14" fill="#1D4ED8"/>
  <rect x="100" y="264" width="380" height="20" fill="#1D4ED8"/>
  <circle cx="140" cy="262" r="10" fill="#EF4444" opacity="0.7"/>
  <circle cx="172" cy="262" r="10" fill="#F59E0B" opacity="0.7"/>
  <circle cx="204" cy="262" r="10" fill="#22C55E" opacity="0.7"/>
  <text x="290" y="268" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">File Explorer</text>
  <!-- Files inside -->
  <text x="130" y="322" font-family="Arial,sans-serif" font-size="20" fill="#CBD5E1">📁 Projects</text>
  <rect x="116" y="334" width="348" height="38" rx="6" fill="#1D4ED8" opacity="0.5"/>
  <text x="130" y="360" font-family="Arial,sans-serif" font-size="20" fill="white">📁 my-app</text>
  <text x="130" y="402" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📄 package.json</text>
  <text x="130" y="442" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📄 README.md</text>
  <text x="130" y="482" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📄 index.ts</text>

  <!-- Bridge/connector in middle -->
  <!-- Bridge pillars -->
  <rect x="490" y="430" width="44" height="220" rx="8" fill="#FCD34D"/>
  <rect x="546" y="390" width="44" height="260" rx="8" fill="#FCD34D"/>
  <!-- Bridge deck -->
  <rect x="480" y="420" width="120" height="20" rx="6" fill="#F59E0B"/>
  <!-- Bridge cables -->
  <line x1="512" y1="420" x2="512" y2="430" stroke="#FDE047" stroke-width="6"/>
  <line x1="534" y1="415" x2="530" y2="430" stroke="#FDE047" stroke-width="4"/>
  <line x1="558" y1="410" x2="550" y2="430" stroke="#FDE047" stroke-width="4"/>
  <!-- Bridge label -->
  <rect x="464" y="548" width="172" height="36" rx="8" fill="#F59E0B" opacity="0.3"/>
  <text x="550" y="572" font-family="Arial,sans-serif" font-size="20" fill="#FDE047" text-anchor="middle">Shell.Native</text>
  <!-- Arrow across bridge -->
  <line x1="480" y1="435" x2="560" y2="435" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <polygon points="550,417 580,435 550,453" fill="white"/>

  <!-- Claude Code terminal window (right) -->
  <rect x="560" y="240" width="380" height="480" rx="14" fill="#0F172A"/>
  <rect x="560" y="240" width="380" height="44" rx="14" fill="#1C1917"/>
  <rect x="560" y="264" width="380" height="20" fill="#1C1917"/>
  <circle cx="600" cy="262" r="10" fill="#EF4444" opacity="0.7"/>
  <circle cx="632" cy="262" r="10" fill="#F59E0B" opacity="0.7"/>
  <circle cx="664" cy="262" r="10" fill="#22C55E" opacity="0.7"/>
  <text x="730" y="268" font-family="Arial,sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Claude Code</text>
  <!-- Terminal content -->
  <text x="580" y="318" font-family="Consolas,monospace" font-size="16" fill="#22C55E">$ claude .</text>
  <text x="580" y="346" font-family="Consolas,monospace" font-size="14" fill="#64748B">Claude Code v1.2.0</text>
  <text x="580" y="374" font-family="Consolas,monospace" font-size="14" fill="#A7F3D0">&gt; How can I help?</text>
  <rect x="578" y="386" width="320" height="2" rx="0" fill="#374151"/>
  <text x="580" y="418" font-family="Consolas,monospace" font-size="14" fill="#64748B">Working in:</text>
  <text x="580" y="442" font-family="Consolas,monospace" font-size="14" fill="#60A5FA">C:\Projects\my-app\</text>
  <!-- Blinking cursor -->
  <rect x="580" y="468" width="10" height="20" rx="1" fill="#22C55E" opacity="0.9"/>

  <!-- Arrow flow visual -->
  <text x="512" y="798" font-family="Arial,sans-serif" font-size="24" fill="#7DD3FC" text-anchor="middle" opacity="0.9">Right-click → Open with Claude Code</text>
</svg>
