<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#1a2035"/>
    </linearGradient>
    <linearGradient id="screenLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="screenRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="transArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 왼쪽 데스크탑 -->
  <rect x="52" y="150" width="168" height="130" rx="10" fill="url(#screenLeft)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="52" y="150" width="168" height="24" rx="10" fill="#1e3a8a"/>
  <rect x="52" y="161" width="168" height="13" rx="0" fill="#1e3a8a"/>
  <!-- 왼쪽 창들 -->
  <rect x="66" y="186" width="64" height="46" rx="4" fill="#1d4ed8" opacity="0.7"/>
  <rect x="136" y="186" width="68" height="22" rx="4" fill="#1d4ed8" opacity="0.5"/>
  <rect x="136" y="212" width="68" height="20" rx="4" fill="#1d4ed8" opacity="0.5"/>
  <!-- 왼쪽 태그 -->
  <rect x="88" y="296" width="100" height="22" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="138" y="311" font-family="Arial" font-size="12" fill="#93c5fd" text-anchor="middle">Work</text>
  <!-- 전환 화살표 (가운데) -->
  <path d="M226,230 L290,230" stroke="url(#transArrow)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="286,215 316,230 286,245" fill="#22c55e" filter="url(#glow)"/>
  <path d="M290,282 L226,282" stroke="url(#transArrow)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <polygon points="230,272 200,282 230,292" fill="#3b82f6" opacity="0.5"/>
  <!-- 오른쪽 데스크탑 -->
  <rect x="292" y="150" width="168" height="130" rx="10" fill="url(#screenRight)" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="292" y="150" width="168" height="24" rx="10" fill="#166534"/>
  <rect x="292" y="161" width="168" height="13" rx="0" fill="#166534"/>
  <!-- 오른쪽 창들 -->
  <rect x="306" y="186" width="60" height="46" rx="4" fill="#16a34a" opacity="0.7"/>
  <rect x="372" y="186" width="72" height="22" rx="4" fill="#16a34a" opacity="0.5"/>
  <rect x="372" y="212" width="72" height="20" rx="4" fill="#16a34a" opacity="0.5"/>
  <!-- 오른쪽 태그 (활성) -->
  <rect x="316" y="296" width="114" height="22" rx="6" fill="#166534" stroke="#22c55e" stroke-width="2"/>
  <text x="373" y="311" font-family="Arial" font-size="12" fill="#86efac" text-anchor="middle">Browser</text>
  <!-- 단축키 힌트 -->
  <rect x="186" y="380" width="140" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="256" y="402" font-family="'Courier New', monospace" font-size="16" fill="#94a3b8" text-anchor="middle">Ctrl + →</text>
</svg>
