<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 연녹색-오렌지 배경 -->
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <g clip-path="url(#clip07)">
    <!-- Layer 2: Before (SVG) 파일 — 좌측 -->
    <rect x="80" y="260" width="350" height="420" rx="28" fill="#43A047" opacity="0.15"/>
    <rect x="80" y="260" width="350" height="420" rx="28" fill="none" stroke="#43A047" stroke-width="10"/>
    <!-- 파일 상단 모서리 -->
    <path d="M350 260 L430 340 L350 340 Z" fill="#43A047" opacity="0.3"/>
    <!-- BEFORE 라벨 -->
    <rect x="100" y="280" width="160" height="46" rx="10" fill="#43A047"/>
    <text x="180" y="313" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="#FFFFFF" text-anchor="middle">BEFORE</text>
    <!-- SVG 텍스트 -->
    <text x="255" y="530" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="148" fill="#2E7D32" text-anchor="middle">SVG</text>

    <!-- 변환 화살표 (중앙) -->
    <path d="M448 512 L576 512" stroke="#FF6F00" stroke-width="54" stroke-linecap="round"/>
    <path d="M534 458 L596 512 L534 566" stroke="#FF6F00" stroke-width="54" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Layer 3: After (ICO) 파일 — 우측 -->
    <rect x="594" y="260" width="350" height="420" rx="28" fill="#F57C00" opacity="0.15"/>
    <rect x="594" y="260" width="350" height="420" rx="28" fill="none" stroke="#F57C00" stroke-width="10"/>
    <path d="M864 260 L944 340 L864 340 Z" fill="#F57C00" opacity="0.3"/>
    <!-- AFTER 라벨 -->
    <rect x="614" y="280" width="136" height="46" rx="10" fill="#F57C00"/>
    <text x="682" y="313" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="#FFFFFF" text-anchor="middle">AFTER</text>
    <!-- ICO 텍스트 -->
    <text x="769" y="530" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="148" fill="#E65100" text-anchor="middle">ICO</text>

    <!-- 하단 포맷 목록 -->
    <text x="512" y="770" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="58" fill="#888888" text-anchor="middle">PNG · JPG · BMP · WEBP</text>
  </g>
</svg>
