<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zipCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폭발 후광 -->
  <circle cx="256" cy="256" r="180" fill="url(#burst)"/>
  <!-- 방사형 파일 아이콘들 (8방향) -->
  <!-- 위 -->
  <rect x="236" y="80" width="40" height="50" rx="5" fill="#3b82f6" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="110" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.txt</text>
  <!-- 오른쪽 위 -->
  <rect x="354" y="124" width="40" height="50" rx="5" fill="#22c55e" opacity="0.9" filter="url(#glow)" transform="rotate(45,374,149)"/>
  <text x="374" y="150" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.jpg</text>
  <!-- 오른쪽 -->
  <rect x="372" y="236" width="40" height="50" rx="5" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <text x="392" y="265" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.mp3</text>
  <!-- 오른쪽 아래 -->
  <rect x="354" y="338" width="40" height="50" rx="5" fill="#f87171" opacity="0.9" filter="url(#glow)" transform="rotate(-45,374,363)"/>
  <text x="374" y="364" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.pdf</text>
  <!-- 아래 -->
  <rect x="236" y="382" width="40" height="50" rx="5" fill="#fbbf24" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="410" font-family="Arial" font-size="9" fill="#1c1400" text-anchor="middle">.csv</text>
  <!-- 왼쪽 아래 -->
  <rect x="118" y="338" width="40" height="50" rx="5" fill="#34d399" opacity="0.9" filter="url(#glow)" transform="rotate(45,138,363)"/>
  <text x="138" y="364" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.xml</text>
  <!-- 왼쪽 -->
  <rect x="100" y="236" width="40" height="50" rx="5" fill="#f472b6" opacity="0.9" filter="url(#glow)"/>
  <text x="120" y="265" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.py</text>
  <!-- 왼쪽 위 -->
  <rect x="118" y="124" width="40" height="50" rx="5" fill="#38bdf8" opacity="0.9" filter="url(#glow)" transform="rotate(-45,138,149)"/>
  <text x="138" y="150" font-family="Arial" font-size="9" fill="white" text-anchor="middle">.json</text>
  <!-- 중앙 ZIP 아이콘 -->
  <circle cx="256" cy="256" r="56" fill="url(#zipCenter)" stroke="#fbbf24" stroke-width="3" filter="url(#glow)"/>
  <text x="256" y="248" font-family="Arial" font-weight="bold" font-size="28" fill="#fde68a" text-anchor="middle">ZIP</text>
  <text x="256" y="272" font-family="Arial" font-size="12" fill="#fbbf24" text-anchor="middle">EXTRACT</text>
</svg>
