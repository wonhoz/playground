<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001214"/>
      <stop offset="100%" stop-color="#002428"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="50%" stop-color="#84FFFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="alert" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Heart rate / network pulse monitor -->
  <!-- Monitor frame -->
  <rect x="60" y="120" width="392" height="240" rx="12" fill="#001820" stroke="#00BCD4" stroke-width="2"/>
  <!-- Grid lines on monitor -->
  <line x1="76" y1="180" x2="436" y2="180" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="76" y1="240" x2="436" y2="240" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="76" y1="300" x2="436" y2="300" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="152" y1="136" x2="152" y2="344" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="228" y1="136" x2="228" y2="344" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="304" y1="136" x2="304" y2="344" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="136" x2="380" y2="344" stroke="#00838F" stroke-width="1" opacity="0.3"/>
  <!-- Network pulse line -->
  <polyline points="76,240 120,240 136,180 152,300 168,160 184,320 200,240 220,240 230,200 240,280 250,160 260,310 272,240 296,240 304,210 312,270 320,240 436,240" fill="none" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alert spike (red) -->
  <polyline points="250,240 258,140 266,340 274,240" fill="none" stroke="url(#alert)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Port labels at bottom -->
  <rect x="60" y="372" width="392" height="60" rx="8" fill="#001820" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="76" y="394" font-family="Consolas" font-size="11" fill="#84FFFF">:80</text>
  <text x="76" y="412" font-family="Consolas" font-size="10" fill="#00BCD4">LISTEN</text>
  <text x="160" y="394" font-family="Consolas" font-size="11" fill="#84FFFF">:443</text>
  <text x="160" y="412" font-family="Consolas" font-size="10" fill="#00BCD4">LISTEN</text>
  <text x="250" y="394" font-family="Consolas" font-size="11" fill="#FF5252">:4444</text>
  <text x="250" y="412" font-family="Consolas" font-size="10" fill="#FF1744">ALERT!</text>
  <text x="340" y="394" font-family="Consolas" font-size="11" fill="#84FFFF">:22</text>
  <text x="340" y="412" font-family="Consolas" font-size="10" fill="#00BCD4">LISTEN</text>
</svg>