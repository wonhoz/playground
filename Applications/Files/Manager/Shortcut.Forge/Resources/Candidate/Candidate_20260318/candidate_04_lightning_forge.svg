<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a001a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE"/>
      <stop offset="50%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="anvilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#2E1065"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 모루 (Anvil) -->
  <rect x="160" y="340" width="192" height="55" rx="10" fill="url(#anvilGrad)" opacity="0.9"/>
  <rect x="140" y="385" width="232" height="20" rx="8" fill="#2E1065" opacity="0.9"/>
  <rect x="185" y="305" width="142" height="42" rx="6" fill="#5B21B6" opacity="0.85"/>
  <!-- 모루 표면 광택 -->
  <rect x="160" y="340" width="192" height="12" rx="10" fill="#7C3AED" opacity="0.4"/>
  <!-- 번개 볼트 (바로가기 심볼 + 단조) -->
  <polygon points="270,100 240,235 264,235 228,395 295,220 268,220 305,100" fill="url(#boltGrad)" opacity="1" filter="url(#boltGlow)"/>
  <polygon points="270,100 240,235 264,235 228,395 295,220 268,220 305,100" fill="none" stroke="#EDE9FE" stroke-width="1.5" opacity="0.5"/>
  <!-- 번개 충격 불꽃 -->
  <circle cx="256" cy="310" r="30" fill="#A78BFA" opacity="0.5" filter="url(#glow)"/>
  <!-- 불꽃 파티클 -->
  <circle cx="220" cy="290" r="6" fill="#C4B5FD" opacity="0.7" filter="url(#glow)"/>
  <circle cx="290" cy="285" r="5" fill="#A78BFA" opacity="0.65" filter="url(#glow)"/>
  <circle cx="240" cy="330" r="4" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="278" cy="325" r="5" fill="#C4B5FD" opacity="0.65" filter="url(#glow)"/>
  <!-- 불꽃 스파크들 -->
  <line x1="235" y1="295" x2="218" y2="272" stroke="#C4B5FD" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="278" y1="290" x2="295" y2="268" stroke="#A78BFA" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <line x1="256" y1="288" x2="256" y2="265" stroke="#EDE9FE" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- 해머 (망치) -->
  <rect x="340" y="180" width="80" height="50" rx="8" fill="#5B21B6" opacity="0.9"/>
  <rect x="340" y="180" width="80" height="18" rx="8" fill="#7C3AED" opacity="0.5"/>
  <line x1="380" y1="230" x2="320" y2="300" stroke="#4C1D95" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <line x1="380" y1="230" x2="320" y2="300" stroke="#6D28D9" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- 작은 링크 아이콘들 (모루 주변) -->
  <circle cx="130" cy="260" r="14" fill="#7C3AED" opacity="0.7" stroke="#A78BFA" stroke-width="2"/>
  <circle cx="130" cy="260" r="8" fill="none" stroke="#C4B5FD" stroke-width="2.5" opacity="0.8"/>
  <circle cx="130" cy="260" r="3" fill="#C4B5FD" opacity="0.9"/>
  <!-- 바로가기 화살표 심볼 -->
  <rect x="90" y="340" width="55" height="55" rx="8" fill="#2E1065" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>
  <path d="M 102,358 L 120,358 L 120,350 L 133,365 L 120,380 L 120,372 L 102,372 Z" fill="#A78BFA" opacity="0.85" filter="url(#glow)"/>
</svg>