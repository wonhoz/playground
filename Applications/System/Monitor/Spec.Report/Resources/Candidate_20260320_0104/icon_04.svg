<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- 인증서+메달: certificate with medal ribbon -->
  <!-- Certificate scroll -->
  <rect x="220" y="280" width="460" height="380" rx="16" fill="#01579B"/>
  <rect x="240" y="300" width="420" height="340" rx="10" fill="#000810"/>
  <!-- Certificate content -->
  <line x1="280" y1="360" x2="620" y2="360" stroke="#29B6F6" stroke-width="10" stroke-linecap="round"/>
  <line x1="310" y1="400" x2="590" y2="400" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <line x1="320" y1="432" x2="580" y2="432" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <line x1="320" y1="458" x2="560" y2="458" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <line x1="320" y1="484" x2="570" y2="484" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <!-- Seal stamp -->
  <circle cx="570" cy="580" r="60" fill="#01579B"/>
  <circle cx="570" cy="580" r="46" fill="#000810"/>
  <circle cx="570" cy="580" r="34" fill="#29B6F6" opacity="0.5"/>
  <!-- Medal ribbon -->
  <path d="M570 660 L530 760 L570 730 L610 760 Z" fill="#01579B"/>
  <!-- Medal -->
  <circle cx="570" cy="700" r="50" fill="#29B6F6"/>
  <circle cx="570" cy="700" r="36" fill="#000810"/>
  <circle cx="570" cy="700" r="24" fill="#29B6F6" opacity="0.6"/>
  <!-- Star in medal -->
  <polygon points="570,684 575,696 588,696 578,704 582,716 570,708 558,716 562,704 552,696 565,696" fill="#29B6F6"/>
</svg>