<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: 레이어드 포맷 카드들 -->
    <!-- 맨 뒤 WEBP -->
    <rect x="140" y="200" width="380" height="480" rx="28" fill="#AB47BC" transform="rotate(-10 330 440)"/>
    <text x="316" y="420" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle" transform="rotate(-10 316 420)">WEBP</text>
    <text x="316" y="500" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="#E1BEE7" text-anchor="middle" transform="rotate(-10 316 500)">웹 최적화</text>

    <!-- 중간 JPG -->
    <rect x="220" y="230" width="380" height="480" rx="28" fill="#E91E63" transform="rotate(-4 410 470)"/>
    <text x="403" y="450" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle" transform="rotate(-4 403 450)">JPG</text>
    <text x="403" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="#F8BBD0" text-anchor="middle" transform="rotate(-4 403 530)">압축 사진</text>

    <!-- 앞 PNG (메인) -->
    <rect x="340" y="200" width="420" height="520" rx="32" fill="#26A69A"/>
    <text x="550" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">PNG</text>
    <text x="550" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="46" fill="#B2DFDB" text-anchor="middle">투명 지원</text>
    <text x="550" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#80CBC4" text-anchor="middle">무손실</text>

    <!-- Layer 3: SVG 작은 카드 (상단 우측) -->
    <rect x="720" y="160" width="200" height="160" rx="20" fill="#5C6BC0"/>
    <text x="820" y="258" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="66" fill="#FFFFFF" text-anchor="middle">SVG</text>

    <!-- 타이틀 -->
    <rect x="230" y="840" width="564" height="80" rx="24" fill="#880E4F"/>
    <text x="512" y="894" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
  </g>
</svg>
