<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: 색상 팀으로 그룹된 키 격자 (metaphor) | 기하학 추상 | 밝고 화사한 다색 격자 -->
  <!-- Layer 1: 배경 - 밝은 크림 -->
  <rect width="1024" height="1024" rx="190" fill="#FAFAF8"/>

  <!-- Layer 2: 키 격자 (5x3 배치, 카테고리별 색상) -->
  <!-- 컨셉: 키보드가 색상 팀 격자로 추상화됨 -->

  <!-- File 팀 (파랑) - 3개 키 -->
  <rect x="150" y="220" width="140" height="110" rx="16" fill="#3B82F6"/>
  <text x="220" y="272" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="white">Ctrl+P</text>
  <text x="220" y="296" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#BFDBFE">File</text>

  <rect x="310" y="220" width="140" height="110" rx="16" fill="#2563EB"/>
  <text x="380" y="272" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="white">Ctrl+W</text>
  <text x="380" y="296" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#BFDBFE">File</text>

  <rect x="470" y="220" width="140" height="110" rx="16" fill="#1D4ED8"/>
  <text x="540" y="272" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="white">Ctrl+S</text>
  <text x="540" y="296" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#BFDBFE">File</text>

  <!-- Edit 팀 (주황) - 3개 키 -->
  <rect x="630" y="220" width="140" height="110" rx="16" fill="#F59E0B"/>
  <text x="700" y="272" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="white">Ctrl+Z</text>
  <text x="700" y="296" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#FEF3C7">Edit</text>

  <rect x="790" y="220" width="80" height="110" rx="16" fill="#D97706"/>
  <text x="830" y="272" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="white">Ctrl+/</text>
  <text x="830" y="296" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#FEF3C7">Edit</text>

  <!-- View 팀 (보라) - 3개 키 -->
  <rect x="150" y="352" width="140" height="110" rx="16" fill="#8B5CF6"/>
  <text x="220" y="400" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="white">Ctrl+B</text>
  <text x="220" y="424" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#EDE9FE">View</text>

  <rect x="310" y="352" width="140" height="110" rx="16" fill="#7C3AED"/>
  <text x="380" y="396" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Ctrl+Shift+E</text>
  <text x="380" y="420" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" fill="#EDE9FE">View</text>

  <rect x="470" y="352" width="140" height="110" rx="16" fill="#6D28D9"/>
  <text x="540" y="400" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Ctrl+`</text>
  <text x="540" y="424" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#EDE9FE">View</text>

  <!-- Run 팀 (초록) - 2개 키 -->
  <rect x="630" y="352" width="140" height="110" rx="16" fill="#10B981"/>
  <text x="700" y="400" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="white">F5</text>
  <text x="700" y="424" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#D1FAE5">Run</text>

  <rect x="790" y="352" width="80" height="110" rx="16" fill="#059669"/>
  <text x="830" y="400" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Ctrl+F5</text>
  <text x="830" y="424" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#D1FAE5">Run</text>

  <!-- Navigate 팀 (시안) - 3개 키 -->
  <rect x="150" y="484" width="140" height="110" rx="16" fill="#06B6D4"/>
  <text x="220" y="528" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="white">F12</text>
  <text x="220" y="552" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#CFFAFE">Navigate</text>

  <rect x="310" y="484" width="140" height="110" rx="16" fill="#0891B2"/>
  <text x="380" y="528" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Ctrl+Shift+F</text>
  <text x="380" y="552" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#CFFAFE">Navigate</text>

  <rect x="470" y="484" width="140" height="110" rx="16" fill="#0E7490"/>
  <text x="540" y="528" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="white">Ctrl+G</text>
  <text x="540" y="552" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#CFFAFE">Navigate</text>

  <!-- Other 팀 (회색) - 2개 키 -->
  <rect x="630" y="484" width="140" height="110" rx="16" fill="#6B7280"/>
  <text x="700" y="528" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="white">Ctrl+,</text>
  <text x="700" y="552" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#F3F4F6">Other</text>

  <rect x="790" y="484" width="80" height="110" rx="16" fill="#4B5563"/>
  <text x="830" y="528" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Ctrl+K</text>
  <text x="830" y="552" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#F3F4F6">Other</text>

  <!-- Layer 3: 하단 제목 바 -->
  <rect x="150" y="640" width="724" height="60" rx="14" fill="#1E1B30"/>
  <text x="512" y="668" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" font-weight="bold" fill="#8B5CF6" letter-spacing="3">⌨ Key.Map</text>
  <text x="512" y="690" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#4B3D8A">단축키 카테고리 맵</text>

  <!-- 카테고리 색상 도트 행 (하단 장식) -->
  <circle cx="290" cy="760" r="18" fill="#3B82F6"/>
  <circle cx="340" cy="760" r="18" fill="#F59E0B"/>
  <circle cx="390" cy="760" r="18" fill="#8B5CF6"/>
  <circle cx="440" cy="760" r="18" fill="#10B981"/>
  <circle cx="490" cy="760" r="18" fill="#06B6D4"/>
  <circle cx="540" cy="760" r="18" fill="#6B7280"/>
  <!-- 연결선 -->
  <line x1="308" y1="760" x2="322" y2="760" stroke="#E2E8F0" stroke-width="3"/>
  <line x1="358" y1="760" x2="372" y2="760" stroke="#E2E8F0" stroke-width="3"/>
  <line x1="408" y1="760" x2="422" y2="760" stroke="#E2E8F0" stroke-width="3"/>
  <line x1="458" y1="760" x2="472" y2="760" stroke="#E2E8F0" stroke-width="3"/>
  <line x1="508" y1="760" x2="522" y2="760" stroke="#E2E8F0" stroke-width="3"/>
</svg>
