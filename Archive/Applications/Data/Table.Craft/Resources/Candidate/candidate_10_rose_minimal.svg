<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Card shadow -->
  <rect x="92" y="108" width="340" height="320" rx="24" fill="#F48FB1" opacity="0.5"/>
  <!-- Main card -->
  <rect x="84" y="100" width="340" height="320" rx="24" fill="white" opacity="0.95"/>
  <!-- Header bar -->
  <rect x="84" y="100" width="340" height="60" rx="24" fill="url(#header)"/>
  <rect x="84" y="136" width="340" height="24" fill="url(#header)"/>
  <!-- Row dividers -->
  <line x1="84" y1="212" x2="424" y2="212" stroke="#F48FB1" stroke-width="3"/>
  <line x1="84" y1="268" x2="424" y2="268" stroke="#F48FB1" stroke-width="3"/>
  <line x1="84" y1="324" x2="424" y2="324" stroke="#F48FB1" stroke-width="3"/>
  <line x1="84" y1="380" x2="424" y2="380" stroke="#F48FB1" stroke-width="3"/>
  <!-- Col dividers -->
  <line x1="210" y1="160" x2="210" y2="420" stroke="#F48FB1" stroke-width="2" opacity="0.7"/>
  <line x1="340" y1="160" x2="340" y2="420" stroke="#F48FB1" stroke-width="2" opacity="0.7"/>
  <!-- Header labels -->
  <rect x="108" y="118" width="72" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="234" y="118" width="56" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="364" y="118" width="40" height="8" rx="4" fill="white" opacity="0.9"/>
  <!-- Row check marks and data -->
  <circle cx="120" cy="184" r="10" fill="url(#accent)"/>
  <text x="120" y="189" text-anchor="middle" font-size="14" fill="white" font-weight="bold">✓</text>
  <rect x="144" y="178" width="48" height="8" rx="4" fill="#AD1457" opacity="0.7"/>
  <rect x="234" y="178" width="64" height="8" rx="4" fill="#AD1457" opacity="0.7"/>
  <rect x="364" y="178" width="40" height="8" rx="4" fill="#AD1457" opacity="0.7"/>
  <circle cx="120" cy="240" r="10" fill="#F48FB1" opacity="0.8"/>
  <rect x="144" y="234" width="64" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <rect x="234" y="234" width="48" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <rect x="364" y="234" width="40" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <circle cx="120" cy="296" r="10" fill="url(#accent)"/>
  <text x="120" y="301" text-anchor="middle" font-size="14" fill="white" font-weight="bold">✓</text>
  <rect x="144" y="290" width="56" height="8" rx="4" fill="#AD1457" opacity="0.6"/>
  <rect x="234" y="290" width="72" height="8" rx="4" fill="#AD1457" opacity="0.6"/>
  <rect x="364" y="290" width="32" height="8" rx="4" fill="#AD1457" opacity="0.6"/>
  <circle cx="120" cy="352" r="10" fill="#F48FB1" opacity="0.8"/>
  <rect x="144" y="346" width="48" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <rect x="234" y="346" width="64" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <rect x="364" y="346" width="40" height="8" rx="4" fill="#880E4F" opacity="0.5"/>
  <!-- Small add button -->
  <circle cx="400" cy="432" r="28" fill="url(#accent)"/>
  <text x="400" y="441" text-anchor="middle" font-size="32" fill="white" font-weight="bold">+</text>
</svg>
