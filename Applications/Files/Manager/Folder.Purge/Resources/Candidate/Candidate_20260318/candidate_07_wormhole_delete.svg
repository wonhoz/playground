<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0e0000"/>
    </linearGradient>
    <radialGradient id="wormholeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#030508;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7F1D1D;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 웜홀 링들 -->
  <ellipse cx="256" cy="256" rx="185" ry="62" fill="none" stroke="#7F1D1D" stroke-width="2.5" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="158" ry="53" fill="none" stroke="#991B1B" stroke-width="3" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="128" ry="43" fill="none" stroke="#DC2626" stroke-width="3.5" opacity="0.6" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="96" ry="33" fill="none" stroke="#EF4444" stroke-width="4" opacity="0.72" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="64" ry="22" fill="none" stroke="#F87171" stroke-width="4.5" opacity="0.85" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="36" ry="13" fill="none" stroke="#FCA5A5" stroke-width="5" opacity="0.9" filter="url(#glow)"/>
  <!-- 웜홀 내부 (검정) -->
  <ellipse cx="256" cy="256" rx="20" ry="8" fill="#030508"/>
  <!-- 글로우 -->
  <circle cx="256" cy="256" r="200" fill="url(#wormholeGrad)"/>
  <!-- 폴더들 (빨려드는) -->
  <!-- 폴더 1 (우측) -->
  <g transform="translate(370,218)">
    <polygon points="0,0 48,0 60,14 60,72 0,72" fill="#DC2626" opacity="0.85"/>
    <polygon points="0,0 36,0 36,-16 60,0" fill="#EF4444" opacity="0.78"/>
    <line x1="12" y1="36" x2="48" y2="36" stroke="#FCA5A5" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="50" x2="38" y2="50" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- 흡입 왜곡 경로 -->
  <path d="M 370 254 Q 330 256 295 256" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.5" stroke-dasharray="6,4"/>
  <!-- 폴더 2 (상단) -->
  <g transform="translate(210,75)" opacity="0.8">
    <polygon points="0,0 42,0 52,12 52,65 0,65" fill="#F87171" opacity="0.8"/>
    <polygon points="0,0 32,0 32,-14 52,0" fill="#DC2626" opacity="0.72"/>
  </g>
  <path d="M 236 140 Q 248 180 252 220" fill="none" stroke="#F87171" stroke-width="1.8" opacity="0.4" stroke-dasharray="5,4"/>
  <!-- 폴더 3 (좌측) -->
  <g transform="translate(68,225)" opacity="0.75">
    <polygon points="0,0 44,0 54,13 54,68 0,68" fill="#EF4444" opacity="0.8"/>
    <polygon points="0,0 34,0 34,-14 54,0" fill="#991B1B" opacity="0.72"/>
  </g>
  <path d="M 122 259 Q 165 258 212 257" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.45" stroke-dasharray="6,4"/>
  <!-- 시공간 왜곡 격자 -->
  <line x1="120" y1="200" x2="200" y2="240" stroke="#EF4444" stroke-width="0.8" opacity="0.2"/>
  <line x1="120" y1="312" x2="200" y2="272" stroke="#EF4444" stroke-width="0.8" opacity="0.2"/>
  <line x1="392" y1="200" x2="312" y2="240" stroke="#DC2626" stroke-width="0.8" opacity="0.2"/>
  <line x1="392" y1="312" x2="312" y2="272" stroke="#DC2626" stroke-width="0.8" opacity="0.2"/>
</svg>