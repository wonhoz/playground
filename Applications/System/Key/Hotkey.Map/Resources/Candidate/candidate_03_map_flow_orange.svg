<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e00"/>
      <stop offset="100%" style="stop-color:#2d1a00"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#ffcc00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flow lines -->
  <path d="M 100 160 L 200 160 L 200 256 L 300 256 L 300 340 L 400 340" fill="none" stroke="url(#arrow)" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- Key boxes along the flow -->
  <rect x="60" y="136" width="80" height="48" rx="10" fill="#1a0e00" stroke="#ff8800" stroke-width="2.5"/>
  <text x="76" y="165" font-family="monospace" font-size="16" fill="#ff8800" font-weight="bold">Ctrl</text>
  <!-- Plus sign -->
  <text x="150" y="168" font-family="monospace" font-size="20" fill="#ffaa00">+</text>
  <rect x="170" y="136" width="60" height="48" rx="10" fill="#1a0e00" stroke="#ff8800" stroke-width="2.5"/>
  <text x="190" y="165" font-family="monospace" font-size="18" fill="#ffcc00">C</text>
  <!-- Arrow -->
  <polygon points="238,156 262,160 238,164" fill="#ff8800"/>
  <!-- Action label -->
  <rect x="272" y="136" width="100" height="48" rx="10" fill="#331a00" stroke="#ffaa00" stroke-width="2"/>
  <text x="284" y="159" font-family="sans-serif" font-size="12" fill="#ffaa00">Copy</text>
  <text x="284" y="176" font-family="sans-serif" font-size="11" fill="#aa6600">Clipboard</text>
  <!-- Second hotkey -->
  <rect x="60" y="224" width="80" height="48" rx="10" fill="#1a0e00" stroke="#ff6600" stroke-width="2.5"/>
  <text x="76" y="253" font-family="monospace" font-size="16" fill="#ff6600" font-weight="bold">Alt</text>
  <text x="150" y="256" font-family="monospace" font-size="20" fill="#ffaa00">+</text>
  <rect x="170" y="224" width="60" height="48" rx="10" fill="#1a0e00" stroke="#ff6600" stroke-width="2.5"/>
  <text x="183" y="253" font-family="monospace" font-size="18" fill="#ffcc00">F4</text>
  <polygon points="238,244 262,248 238,252" fill="#ff6600"/>
  <rect x="272" y="224" width="100" height="48" rx="10" fill="#331a00" stroke="#ff8800" stroke-width="2"/>
  <text x="288" y="247" font-family="sans-serif" font-size="12" fill="#ff8800">Close</text>
  <text x="284" y="264" font-family="sans-serif" font-size="11" fill="#aa6600">Window</text>
  <!-- Third hotkey -->
  <rect x="60" y="308" width="80" height="48" rx="10" fill="#1a0e00" stroke="#ffaa00" stroke-width="2.5"/>
  <text x="64" y="337" font-family="monospace" font-size="14" fill="#ffaa00" font-weight="bold">Win</text>
  <text x="150" y="340" font-family="monospace" font-size="20" fill="#ffaa00">+</text>
  <rect x="170" y="308" width="60" height="48" rx="10" fill="#1a0e00" stroke="#ffaa00" stroke-width="2.5"/>
  <text x="189" y="337" font-family="monospace" font-size="18" fill="#ffcc00">D</text>
  <polygon points="238,328 262,332 238,336" fill="#ffaa00"/>
  <rect x="272" y="308" width="100" height="48" rx="10" fill="#331a00" stroke="#ffaa00" stroke-width="2"/>
  <text x="284" y="331" font-family="sans-serif" font-size="12" fill="#ffaa00">Desktop</text>
  <text x="288" y="348" font-family="sans-serif" font-size="11" fill="#aa6600">Show</text>
</svg>