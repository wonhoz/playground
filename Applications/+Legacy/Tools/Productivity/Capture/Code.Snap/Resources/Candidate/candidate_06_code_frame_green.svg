  <rect x="148" y="228" width="120" height="9" rx="3" fill="#66BB6A" opacity="0.6"/>
  <rect x="136" y="246" width="140" height="9" rx="3" fill="#A5D6A7" opacity="0.55"/>
  <rect x="148" y="264" width="90" height="9" rx="3" fill="#66BB6A" opacity="0.5"/>
  <rect x="148" y="282" width="110" height="9" rx="3" fill="#A5D6A7" opacity="0.5"/>
  <rect x="136" y="300" width="150" height="9" rx="3" fill="#66BB6A" opacity="0.45"/>
  <rect x="136" y="318" width="80" height="9" rx="3" fill="#A5D6A7" opacity="0.4"/>
  <rect x="136" y="336" width="100" height="9" rx="3" fill="#66BB6A" opacity="0.35"/>
