<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 별 3스타 점수: 별 3개 -->
  <!-- center large star -->
  <polygon points="512,200 556,370 740,370 596,476 648,646 512,540 376,646 428,476 284,370 468,370"
    fill="#B0BEC5"/>
  <!-- left star (slightly lower, smaller) -->
  <polygon points="280,380 312,490 430,490 336,558 370,668 280,600 190,668 224,558 130,490 248,490"
    fill="#37474F" opacity="0.85"/>
  <!-- right star (slightly lower, smaller) -->
  <polygon points="744,380 776,490 894,490 800,558 834,668 744,600 654,668 688,558 594,490 712,490"
    fill="#37474F" opacity="0.85"/>
  <!-- glow behind center star -->
  <circle cx="512" cy="430" r="130" fill="#B0BEC5" opacity="0.08"/>
  <!-- star outlines -->
  <polygon points="512,200 556,370 740,370 596,476 648,646 512,540 376,646 428,476 284,370 468,370"
    fill="none" stroke="#B0BEC5" stroke-width="6" opacity="0.5"/>
  <!-- rating bar below -->
  <rect x="220" y="740" width="584" height="28" rx="14" fill="#37474F"/>
  <rect x="220" y="740" width="584" height="28" rx="14" fill="none" stroke="#B0BEC5" stroke-width="4" opacity="0.4"/>
  <!-- filled portion (3/3 = full) -->
  <rect x="224" y="744" width="576" height="20" rx="10" fill="#B0BEC5" opacity="0.7"/>
  <!-- label dots -->
  <circle cx="330" cy="754" r="6" fill="#050808" opacity="0.5"/>
  <circle cx="512" cy="754" r="6" fill="#050808" opacity="0.5"/>
  <circle cx="694" cy="754" r="6" fill="#050808" opacity="0.5"/>
</svg>
