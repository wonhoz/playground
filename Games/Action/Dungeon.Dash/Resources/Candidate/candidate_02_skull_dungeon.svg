<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0505"/>
    </linearGradient>
    <radialGradient id="skullGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7F1D1D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stone arch -->
  <path d="M60,460 L60,180 Q60,80 256,80 Q452,80 452,180 L452,460" fill="none" stroke="#374151" stroke-width="16" stroke-linecap="round"/>
  <path d="M85,460 L85,188 Q85,110 256,110 Q427,110 427,188 L427,460" fill="none" stroke="#1F2937" stroke-width="4"/>
  <!-- Stone texture on arch -->
  <line x1="60" y1="200" x2="90" y2="200" stroke="#4B5563" stroke-width="2"/>
  <line x1="60" y1="270" x2="90" y2="270" stroke="#4B5563" stroke-width="2"/>
  <line x1="60" y1="340" x2="90" y2="340" stroke="#4B5563" stroke-width="2"/>
  <line x1="422" y1="200" x2="452" y2="200" stroke="#4B5563" stroke-width="2"/>
  <line x1="422" y1="270" x2="452" y2="270" stroke="#4B5563" stroke-width="2"/>
  <line x1="422" y1="340" x2="452" y2="340" stroke="#4B5563" stroke-width="2"/>
  <!-- Glow -->
  <circle cx="256" cy="270" r="140" fill="url(#skullGlow)"/>
  <!-- Skull -->
  <!-- Cranium -->
  <ellipse cx="256" cy="230" rx="100" ry="90" fill="url(#boneGrad)" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Cheekbone extension -->
  <rect x="165" y="280" width="182" height="40" rx="10" fill="url(#boneGrad)" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Eye sockets -->
  <ellipse cx="218" cy="220" rx="28" ry="30" fill="#0A0505"/>
  <ellipse cx="294" cy="220" rx="28" ry="30" fill="#0A0505"/>
  <!-- Eye glow -->
  <ellipse cx="218" cy="220" rx="16" ry="18" fill="#EF4444" opacity="0.5"/>
  <ellipse cx="294" cy="220" rx="16" ry="18" fill="#EF4444" opacity="0.5"/>
  <!-- Nose hole -->
  <path d="M248,258 Q256,272 264,258 Q268,248 256,244 Q244,248 248,258Z" fill="#0A0505"/>
  <!-- Teeth -->
  <rect x="180" y="310" width="22" height="28" rx="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="210" y="310" width="22" height="28" rx="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="240" y="310" width="22" height="28" rx="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="270" y="310" width="22" height="28" rx="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="300" y="310" width="22" height="28" rx="4" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- Title -->
  <text x="256" y="430" font-family="serif" font-size="22" fill="#EF4444" text-anchor="middle" font-weight="bold">DUNGEON DASH</text>
  <text x="256" y="460" font-family="serif" font-size="14" fill="#6B7280" text-anchor="middle">Enter if you dare...</text>
</svg>
