<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 모자이크 — 픽셀이 문자로 변환 | 기하학 | #1A1A00 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A1A00"/>
  <!-- Layer 2: Pixel-to-ASCII mosaic grid -->
  <!-- Left side: colored pixel blocks (image) -->
  <!-- Row 1 -->
  <rect x="160" y="200" width="60" height="60" fill="#1D4ED8"/>
  <rect x="222" y="200" width="60" height="60" fill="#1E40AF"/>
  <rect x="284" y="200" width="60" height="60" fill="#60A5FA"/>
  <rect x="346" y="200" width="60" height="60" fill="#93C5FD"/>
  <!-- Row 2 -->
  <rect x="160" y="262" width="60" height="60" fill="#1E40AF"/>
  <rect x="222" y="262" width="60" height="60" fill="#374151"/>
  <rect x="284" y="262" width="60" height="60" fill="#374151"/>
  <rect x="346" y="262" width="60" height="60" fill="#60A5FA"/>
  <!-- Row 3 -->
  <rect x="160" y="324" width="60" height="60" fill="#60A5FA"/>
  <rect x="222" y="324" width="60" height="60" fill="#374151"/>
  <rect x="284" y="324" width="60" height="60" fill="#1F2937"/>
  <rect x="346" y="324" width="60" height="60" fill="#1E40AF"/>
  <!-- Row 4 -->
  <rect x="160" y="386" width="60" height="60" fill="#93C5FD"/>
  <rect x="222" y="386" width="60" height="60" fill="#60A5FA"/>
  <rect x="284" y="386" width="60" height="60" fill="#1E40AF"/>
  <rect x="346" y="386" width="60" height="60" fill="#1D4ED8"/>
  <!-- More rows -->
  <rect x="160" y="448" width="60" height="60" fill="#FCD34D"/>
  <rect x="222" y="448" width="60" height="60" fill="#F59E0B"/>
  <rect x="284" y="448" width="60" height="60" fill="#D97706"/>
  <rect x="346" y="448" width="60" height="60" fill="#FCD34D"/>
  <rect x="160" y="510" width="60" height="60" fill="#4ADE80"/>
  <rect x="222" y="510" width="60" height="60" fill="#22C55E"/>
  <rect x="284" y="510" width="60" height="60" fill="#16A34A"/>
  <rect x="346" y="510" width="60" height="60" fill="#4ADE80"/>
  <!-- Arrow in the middle -->
  <text x="512" y="430" font-family="Arial,sans-serif" font-size="72" fill="#FBBF24" text-anchor="middle">→</text>
  <!-- Right side: ASCII characters representing the same image -->
  <text x="600" y="254" font-family="monospace" font-size="40" fill="#60A5FA">░░▒▒</text>
  <text x="600" y="302" font-family="monospace" font-size="40" fill="#374151">░██░</text>
  <text x="600" y="350" font-family="monospace" font-size="40" fill="#374151">░██░</text>
  <text x="600" y="398" font-family="monospace" font-size="40" fill="#60A5FA">▒░░▒</text>
  <text x="600" y="454" font-family="monospace" font-size="40" fill="#FCD34D">████</text>
  <text x="600" y="510" font-family="monospace" font-size="40" fill="#4ADE80">████</text>
  <!-- Layer 3: Label -->
  <text x="512" y="660" font-family="Arial,sans-serif" font-size="32" fill="#FBBF24" text-anchor="middle" font-weight="bold">Image → ASCII</text>
  <rect x="320" y="680" width="384" height="4" rx="2" fill="#FBBF24" opacity="0.3"/>
</svg>
