  <line x1="120" y1="175" x2="148" y2="118" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="205" y1="165" x2="182" y2="108" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="205" y1="165" x2="230" y2="110" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="155" x2="276" y2="100" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="155" x2="320" y2="98" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="390" y1="160" x2="365" y2="105" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <line x1="390" y1="160" x2="418" y2="108" stroke="url(#branch)" stroke-width="5" stroke-linecap="round"/>
  <!-- 잎들 -->
  <ellipse cx="256" cy="295" rx="22" ry="14" fill="url(#leaf)" opacity="0.9"/>
  <ellipse cx="95" cy="115" rx="16" ry="10" fill="url(#leaf)" opacity="0.85"/>
  <ellipse cx="148" cy="108" rx="16" ry="10" fill="url(#leaf)" opacity="0.85"/>
  <ellipse cx="182" cy="98" rx="16" ry="10" fill="url(#leaf)" opacity="0.85"/>
