  <rect x="222" y="228" width="3" height="14" rx="1" fill="#FFCCBC"/>
  <!-- Speed lines -->
  <line x1="400" y1="160" x2="440" y2="160" stroke="#FFAB91" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="410" y1="178" x2="450" y2="178" stroke="#FFAB91" stroke-width="2.5" opacity="0.6"/>
  <line x1="405" y1="142" x2="435" y2="142" stroke="#FFAB91" stroke-width="2" opacity="0.5"/>
