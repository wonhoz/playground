<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060f1f"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0d8ff"/>
      <stop offset="50%" stop-color="#60b0e8"/>
      <stop offset="100%" stop-color="#2880c0"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="100%" stop-color="#c0d8f0"/>
    </linearGradient>
    <radialGradient id="frost" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0e8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c0e8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Frost glow -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#frost)"/>
  <!-- Ice spire main -->
  <polygon points="256,80 310,300 202,300" fill="url(#ice)"/>
  <!-- Ice facets -->
  <polygon points="256,80 310,300 256,200" fill="#d0f0ff" opacity="0.3"/>
  <polygon points="256,80 202,300 256,200" fill="#80c0e8" opacity="0.4"/>
  <!-- Ice shine -->
  <polygon points="256,80 285,200 256,200" fill="#ffffff" opacity="0.4"/>
  <!-- Secondary ice spires -->
  <polygon points="190,200 224,340 156,340" fill="url(#ice)" opacity="0.8"/>
  <polygon points="322,200 356,340 288,340" fill="url(#ice)" opacity="0.8"/>
  <!-- Snow cap -->
  <ellipse cx="256" cy="88" rx="24" ry="12" fill="url(#snow)"/>
  <ellipse cx="190" cy="208" rx="18" ry="9" fill="url(#snow)"/>
  <ellipse cx="322" cy="208" rx="18" ry="9" fill="url(#snow)"/>
  <!-- Tower base -->
  <rect x="170" y="340" width="172" height="100" rx="6" fill="#2060a0"/>
  <rect x="152" y="430" width="208" height="22" rx="8" fill="#1a4880"/>
  <rect x="130" y="444" width="252" height="18" rx="8" fill="#10305a"/>
  <!-- Frozen enemies in ice blocks -->
  <rect x="90" y="310" width="50" height="60" rx="4" fill="#60c0e8" opacity="0.5"/>
  <ellipse cx="115" cy="325" rx="10" ry="12" fill="#cc2020" opacity="0.7"/>
  <rect x="108" y="336" width="14" height="26" rx="3" fill="#cc2020" opacity="0.7"/>
  <rect x="370" y="330" width="50" height="55" rx="4" fill="#60c0e8" opacity="0.5"/>
  <ellipse cx="395" cy="344" rx="10" ry="11" fill="#cc2020" opacity="0.6"/>
  <!-- Ice crystals floating -->
  <polygon points="160,160 166,180 160,200 154,180" fill="#80d8ff" opacity="0.8"/>
  <polygon points="352,170 358,190 352,210 346,190" fill="#80d8ff" opacity="0.7"/>
  <polygon points="140,240 146,255 140,270 134,255" fill="#a0e0ff" opacity="0.6"/>
  <polygon points="370,260 376,275 370,290 364,275" fill="#a0e0ff" opacity="0.7"/>
  <!-- Snowflake symbols -->
  <text x="246" y="108" font-size="16" fill="#ffffff" opacity="0.7">❄</text>
</svg>