<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111122"/>
    </linearGradient>
    <linearGradient id="n1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#8800FF"/>
    </linearGradient>
    <linearGradient id="n2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0044FF"/>
    </linearGradient>
    <linearGradient id="n3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tetris-like blocks with neon outlines -->
  <!-- Row bottom -->
  <rect x="104" y="380" width="72" height="72" rx="6" fill="url(#n1)" opacity="0.8" stroke="#FF00FF" stroke-width="2"/>
  <rect x="184" y="380" width="72" height="72" rx="6" fill="url(#n2)" opacity="0.8" stroke="#00FFFF" stroke-width="2"/>
  <rect x="264" y="380" width="72" height="72" rx="6" fill="url(#n1)" opacity="0.8" stroke="#FF00FF" stroke-width="2"/>
  <rect x="344" y="380" width="72" height="72" rx="6" fill="url(#n3)" opacity="0.8" stroke="#FFFF00" stroke-width="2"/>
  <!-- Row 2 -->
  <rect x="104" y="302" width="72" height="72" rx="6" fill="url(#n2)" opacity="0.75" stroke="#00FFFF" stroke-width="2"/>
  <rect x="184" y="302" width="72" height="72" rx="6" fill="url(#n3)" opacity="0.75" stroke="#FFFF00" stroke-width="2"/>
  <rect x="264" y="302" width="72" height="72" rx="6" fill="url(#n2)" opacity="0.75" stroke="#00FFFF" stroke-width="2"/>
  <!-- Row 3 (partial) -->
  <rect x="184" y="224" width="72" height="72" rx="6" fill="url(#n1)" opacity="0.7" stroke="#FF00FF" stroke-width="2"/>
  <rect x="264" y="224" width="72" height="72" rx="6" fill="url(#n3)" opacity="0.7" stroke="#FFFF00" stroke-width="2"/>
  <!-- Falling block -->
  <rect x="264" y="140" width="72" height="72" rx="6" fill="url(#n2)" opacity="0.5" stroke="#00FFFF" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Neon glow effects -->
  <rect x="104" y="380" width="72" height="72" rx="6" fill="none" stroke="#FF00FF" stroke-width="6" opacity="0.15"/>
  <rect x="184" y="302" width="72" height="72" rx="6" fill="none" stroke="#FFFF00" stroke-width="6" opacity="0.15"/>
</svg>