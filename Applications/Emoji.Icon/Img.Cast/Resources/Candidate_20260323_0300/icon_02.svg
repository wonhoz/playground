<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 멀티사이즈 ICO 그리드 | 레이어드 | #1E3A8A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1628"/>
  <!-- Layer 2: Large ICO file icon background -->
  <rect x="220" y="200" width="440" height="540" rx="20" fill="#1E3A8A"/>
  <polygon points="580,200 660,280 580,280" fill="#2563EB"/>
  <polygon points="580,200 660,280 580,280" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <text x="440" y="560" font-family="Arial,sans-serif" font-size="32" fill="#93C5FD" text-anchor="middle" font-weight="bold">.ICO</text>
  <!-- Layer 3: Multi-size squares inside the ICO -->
  <!-- 256px representation -->
  <rect x="255" y="240" width="180" height="180" rx="12" fill="#3B82F6"/>
  <text x="345" y="345" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">256</text>
  <!-- 48px -->
  <rect x="455" y="248" width="80" height="80" rx="8" fill="#60A5FA"/>
  <text x="495" y="295" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">48</text>
  <!-- 32px -->
  <rect x="455" y="344" width="56" height="56" rx="6" fill="#93C5FD"/>
  <text x="483" y="378" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">32</text>
  <!-- 16px -->
  <rect x="518" y="350" width="32" height="32" rx="4" fill="#BFDBFE"/>
  <text x="534" y="371" font-family="Arial,sans-serif" font-size="10" fill="#1E3A8A" text-anchor="middle">16</text>
  <!-- Stacked behind: PNG file -->
  <rect x="360" y="640" width="400" height="160" rx="16" fill="#14532D" opacity="0.7" transform="rotate(-4 560 720)"/>
  <text x="560" y="720" font-family="Arial,sans-serif" font-size="24" fill="#4ADE80" text-anchor="middle" transform="rotate(-4 560 720)">.PNG / .SVG</text>
  <!-- Arrow from PNG to ICO -->
  <path d="M550 720 Q480 660 460 600" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
  <polygon points="448,606 462,558 480,600" fill="#F59E0B"/>
</svg>
