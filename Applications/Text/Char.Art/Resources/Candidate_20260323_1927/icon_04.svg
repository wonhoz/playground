<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="#111827"/>
  <!-- Terminal window frame -->
  <rect x="160" y="200" width="704" height="624" rx="18" fill="#0D1117"/>
  <!-- Terminal title bar -->
  <rect x="160" y="200" width="704" height="52" rx="18" fill="#1C2128"/>
  <rect x="160" y="232" width="704" height="20" fill="#1C2128"/>
  <circle cx="205" cy="226" r="11" fill="#EF4444"/>
  <circle cx="242" cy="226" r="11" fill="#F59E0B"/>
  <circle cx="279" cy="226" r="11" fill="#22C55E"/>
  <!-- ASCII face made of characters - pixel art style -->
  <!-- Row 1: top of head -->
  <text x="220" y="316" font-family="monospace" font-size="38" fill="#005500">@</text>
  <text x="258" y="316" font-family="monospace" font-size="38" fill="#006600">@</text>
  <text x="296" y="316" font-family="monospace" font-size="38" fill="#007700">@</text>
  <text x="334" y="316" font-family="monospace" font-size="38" fill="#008800">#</text>
  <text x="372" y="316" font-family="monospace" font-size="38" fill="#009900">#</text>
  <text x="410" y="316" font-family="monospace" font-size="38" fill="#009900">#</text>
  <text x="448" y="316" font-family="monospace" font-size="38" fill="#008800">@</text>
  <text x="486" y="316" font-family="monospace" font-size="38" fill="#007700">@</text>
  <text x="524" y="316" font-family="monospace" font-size="38" fill="#006600">@</text>
  <text x="562" y="316" font-family="monospace" font-size="38" fill="#005500">@</text>
  <!-- Row 2 -->
  <text x="220" y="358" font-family="monospace" font-size="38" fill="#006600">@</text>
  <text x="258" y="358" font-family="monospace" font-size="38" fill="#00AA00">$</text>
  <text x="296" y="358" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="334" y="358" font-family="monospace" font-size="38" fill="#00FF00">%</text>
  <text x="372" y="358" font-family="monospace" font-size="38" fill="#00FF41">.</text>
  <text x="410" y="358" font-family="monospace" font-size="38" fill="#00FF41">.</text>
  <text x="448" y="358" font-family="monospace" font-size="38" fill="#00FF00">%</text>
  <text x="486" y="358" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="524" y="358" font-family="monospace" font-size="38" fill="#00AA00">$</text>
  <text x="562" y="358" font-family="monospace" font-size="38" fill="#006600">@</text>
  <!-- Row 3: eyes -->
  <text x="220" y="400" font-family="monospace" font-size="38" fill="#007700">#</text>
  <text x="258" y="400" font-family="monospace" font-size="38" fill="#00BB00">$</text>
  <text x="296" y="400" font-family="monospace" font-size="38" fill="#00FF41">@</text>
  <text x="334" y="400" font-family="monospace" font-size="38" fill="#003300">@</text>
  <text x="372" y="400" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="410" y="400" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="448" y="400" font-family="monospace" font-size="38" fill="#003300">@</text>
  <text x="486" y="400" font-family="monospace" font-size="38" fill="#00FF41">@</text>
  <text x="524" y="400" font-family="monospace" font-size="38" fill="#00BB00">$</text>
  <text x="562" y="400" font-family="monospace" font-size="38" fill="#007700">#</text>
  <!-- Row 4: nose -->
  <text x="220" y="442" font-family="monospace" font-size="38" fill="#006600">@</text>
  <text x="258" y="442" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="296" y="442" font-family="monospace" font-size="38" fill="#00FF41">.</text>
  <text x="334" y="442" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="372" y="442" font-family="monospace" font-size="38" fill="#00FF00">%</text>
  <text x="410" y="442" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="448" y="442" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="486" y="442" font-family="monospace" font-size="38" fill="#00FF41">.</text>
  <text x="524" y="442" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="562" y="442" font-family="monospace" font-size="38" fill="#006600">@</text>
  <!-- Row 5: smile -->
  <text x="220" y="484" font-family="monospace" font-size="38" fill="#007700">#</text>
  <text x="258" y="484" font-family="monospace" font-size="38" fill="#00BB00">*</text>
  <text x="296" y="484" font-family="monospace" font-size="38" fill="#00FF00">-</text>
  <text x="334" y="484" font-family="monospace" font-size="38" fill="#00FF41">\</text>
  <text x="372" y="484" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="410" y="484" font-family="monospace" font-size="38" fill="#00FF41"> </text>
  <text x="448" y="484" font-family="monospace" font-size="38" fill="#00FF41">/</text>
  <text x="486" y="484" font-family="monospace" font-size="38" fill="#00FF00">-</text>
  <text x="524" y="484" font-family="monospace" font-size="38" fill="#00BB00">*</text>
  <text x="562" y="484" font-family="monospace" font-size="38" fill="#007700">#</text>
  <!-- Row 6: chin -->
  <text x="220" y="526" font-family="monospace" font-size="38" fill="#006600">@</text>
  <text x="258" y="526" font-family="monospace" font-size="38" fill="#00AA00">$</text>
  <text x="296" y="526" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="334" y="526" font-family="monospace" font-size="38" fill="#00EE00">#</text>
  <text x="372" y="526" font-family="monospace" font-size="38" fill="#00FF41">@</text>
  <text x="410" y="526" font-family="monospace" font-size="38" fill="#00FF41">@</text>
  <text x="448" y="526" font-family="monospace" font-size="38" fill="#00EE00">#</text>
  <text x="486" y="526" font-family="monospace" font-size="38" fill="#00CC00">$</text>
  <text x="524" y="526" font-family="monospace" font-size="38" fill="#00AA00">$</text>
  <text x="562" y="526" font-family="monospace" font-size="38" fill="#006600">@</text>
  <!-- Bottom prompt line -->
  <text x="190" y="620" font-family="monospace" font-size="34" fill="#00FF41">$ convert image.png --ascii</text>
  <text x="190" y="660" font-family="monospace" font-size="34" fill="#22C55E">&#x2588;</text>
</svg>
