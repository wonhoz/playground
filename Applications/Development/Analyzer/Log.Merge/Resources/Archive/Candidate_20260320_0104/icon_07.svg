<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Bridge connecting two platforms -->
  <!-- Left platform -->
  <rect x="140" y="480" width="220" height="300" rx="16" fill="#006064"/>
  <!-- Right platform -->
  <rect x="664" y="480" width="220" height="300" rx="16" fill="#006064"/>
  <!-- Bridge deck -->
  <rect x="140" y="460" width="744" height="40" rx="10" fill="#00BCD4"/>
  <!-- Bridge pillars -->
  <rect x="360" y="500" width="40" height="280" rx="8" fill="#0d2a2e"/>
  <rect x="624" y="500" width="40" height="280" rx="8" fill="#0d2a2e"/>
  <!-- Bridge cables (arch) -->
  <path d="M180 460 Q512 200 844 460" stroke="#006064" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Cable hangers -->
  <line x1="280" y1="380" x2="280" y2="460" stroke="#006064" stroke-width="10"/>
  <line x1="380" y1="300" x2="380" y2="460" stroke="#006064" stroke-width="10"/>
  <line x1="512" y1="240" x2="512" y2="460" stroke="#006064" stroke-width="10"/>
  <line x1="644" y1="300" x2="644" y2="460" stroke="#006064" stroke-width="10"/>
  <line x1="744" y1="380" x2="744" y2="460" stroke="#006064" stroke-width="10"/>
  <!-- Log data flowing across -->
  <circle cx="300" cy="430" r="14" fill="#00BCD4"/>
  <circle cx="450" cy="412" r="14" fill="#00BCD4" opacity="0.7"/>
  <circle cx="512" cy="406" r="16" fill="#00BCD4"/>
  <circle cx="574" cy="412" r="14" fill="#00BCD4" opacity="0.7"/>
  <circle cx="720" cy="430" r="14" fill="#00BCD4"/>
</svg>