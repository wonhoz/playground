<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0A0F"/>
  <!-- Magnifier circle -->
  <circle cx="440" cy="440" r="230" fill="none" stroke="#3949AB" stroke-width="52"/>
  <circle cx="440" cy="440" r="160" fill="#3949AB" opacity="0.15"/>
  <!-- Search handle -->
  <line x1="622" y1="622" x2="820" y2="820" stroke="#3949AB" stroke-width="70" stroke-linecap="round"/>
  <line x1="622" y1="622" x2="810" y2="810" stroke="#7986CB" stroke-width="30" stroke-linecap="round" opacity="0.5"/>
  <!-- Event lines inside lens -->
  <rect x="340" y="370" width="200" height="18" rx="8" fill="#7986CB"/>
  <rect x="340" y="408" width="150" height="14" rx="7" fill="#7986CB" opacity="0.6"/>
  <rect x="340" y="438" width="180" height="14" rx="7" fill="#7986CB" opacity="0.5"/>
  <!-- Alert dot -->
  <circle cx="600" cy="230" r="60" fill="#7986CB"/>
  <rect x="583" y="178" width="34" height="90" rx="12" fill="#0A0A0F"/>
  <circle cx="600" cy="294" r="16" fill="#0A0A0F"/>
