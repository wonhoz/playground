<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </radialGradient>
    <linearGradient id="quillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="crystalFacet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="crystalFacet2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crystalGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bgGrad02)" rx="40"/>

  <!-- 배경 별들 -->
  <circle cx="60" cy="60" r="1.5" fill="#A78BFA" opacity="0.6"/>
  <circle cx="450" cy="80" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="420" cy="420" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="80" cy="450" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="480" cy="300" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="30" cy="250" r="2" fill="#C4B5FD" opacity="0.3"/>

  <!-- 글로우 배경 -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glowPurple)" opacity="0.2"/>

  <!-- 마법 문자들 (배경 레이어) -->
  <text x="80" y="180" font-family="monospace" font-size="16" fill="#A78BFA" opacity="0.3" transform="rotate(-15, 80, 180)">∑</text>
  <text x="400" y="150" font-family="monospace" font-size="14" fill="#C4B5FD" opacity="0.25" transform="rotate(10, 400, 150)">∞</text>
  <text x="380" y="380" font-family="monospace" font-size="18" fill="#A78BFA" opacity="0.2" transform="rotate(-5, 380, 380)">∂</text>
  <text x="70" y="380" font-family="monospace" font-size="15" fill="#C4B5FD" opacity="0.25" transform="rotate(20, 70, 380)">Ω</text>

  <!-- 수정 깃털 펜 몸체 -->
  <!-- 깃털 전체 실루엣 (회전: 45도 기울기) -->
  <g transform="translate(256, 256) rotate(-40)">
    <!-- 깃털 날개 좌측 -->
    <path d="M0 -170 C-30 -120 -60 -60 -40 20 C-20 80 0 0 0 0 Z"
          fill="url(#crystalFacet1)" opacity="0.85" filter="url(#glow02)"/>
    <!-- 깃털 날개 우측 -->
    <path d="M0 -170 C30 -120 60 -60 40 20 C20 80 0 0 0 0 Z"
          fill="url(#crystalFacet2)" opacity="0.75" filter="url(#glow02)"/>
    <!-- 깃털 중심 줄기 -->
    <line x1="0" y1="-170" x2="0" y2="140" stroke="#E9D5FF" stroke-width="2" opacity="0.9"/>
    <!-- 깃털 세부 결 라인들 -->
    <line x1="-35" y1="-80" x2="0" y2="-60" stroke="#C4B5FD" stroke-width="1" opacity="0.5"/>
    <line x1="-50" y1="-40" x2="0" y2="-20" stroke="#C4B5FD" stroke-width="1" opacity="0.5"/>
    <line x1="-40" y1="0" x2="0" y2="10" stroke="#C4B5FD" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="-80" x2="0" y2="-60" stroke="#C4B5FD" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="-40" x2="0" y2="-20" stroke="#C4B5FD" stroke-width="1" opacity="0.5"/>
    <line x1="40" y1="0" x2="0" y2="10" stroke="#C4B5FD" stroke-width="1" opacity="0.4"/>

    <!-- 수정 끝부분 (닙/펜촉) -->
    <polygon points="0,140 -12,100 12,100" fill="#8B5CF6" filter="url(#crystalGlow)" opacity="0.95"/>
    <polygon points="0,155 -6,130 6,130" fill="#E9D5FF" opacity="0.9"/>

    <!-- 수정 크리스탈 패싯들 (깃털 상단) -->
    <polygon points="0,-170 -15,-140 0,-120 15,-140" fill="#E9D5FF" opacity="0.9"/>
    <polygon points="-15,-140 -30,-110 0,-120" fill="#C4B5FD" opacity="0.7"/>
    <polygon points="15,-140 30,-110 0,-120" fill="#A78BFA" opacity="0.7"/>
  </g>

  <!-- 마법 문자 흔적 (펜이 쓴 글자들) -->
  <!-- 빛나는 텍스트 -->
  <text x="290" y="320" font-family="monospace" font-size="20" font-weight="bold"
        fill="#C4B5FD" opacity="0.9" filter="url(#crystalGlow)">&gt;_</text>
  <text x="320" y="350" font-family="monospace" font-size="15"
        fill="#A78BFA" opacity="0.7" filter="url(#glow02)">prompt</text>

  <!-- 글자 파티클/반짝이 효과 -->
  <circle cx="310" cy="180" r="4" fill="#8B5CF6" filter="url(#crystalGlow)" opacity="0.8"/>
  <circle cx="180" cy="330" r="3" fill="#C4B5FD" filter="url(#glow02)" opacity="0.7"/>
  <circle cx="360" cy="200" r="5" fill="#A78BFA" filter="url(#crystalGlow)" opacity="0.6"/>

  <!-- 별빛 반짝임들 -->
  <g filter="url(#crystalGlow)">
    <line x1="130" y1="140" x2="130" y2="160" stroke="#C4B5FD" stroke-width="1.5" opacity="0.7"/>
    <line x1="120" y1="150" x2="140" y2="150" stroke="#C4B5FD" stroke-width="1.5" opacity="0.7"/>
    <line x1="390" y1="350" x2="390" y2="370" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="380" y1="360" x2="400" y2="360" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="410" y1="120" x2="410" y2="136" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="402" y1="128" x2="418" y2="128" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- 마법 링/아우라 -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2" stroke-dasharray="4 8"/>
  <ellipse cx="256" cy="256" rx="170" ry="170" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 12"/>

  <!-- 하단 라벨 -->
  <rect x="155" y="455" width="202" height="28" rx="5" fill="#1a0d2e" stroke="#8B5CF6" stroke-width="1" opacity="0.7"/>
  <text x="256" y="474" font-family="monospace" font-size="13" font-weight="bold"
        fill="#A78BFA" text-anchor="middle" opacity="0.9">PROMPT.FORGE</text>
</svg>
