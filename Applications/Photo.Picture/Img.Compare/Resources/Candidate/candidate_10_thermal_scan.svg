<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="scanL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#001eff"/>
      <stop offset="33%" stop-color="#00ccff"/>
      <stop offset="66%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <linearGradient id="scanR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="50%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ffff00"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffff00"/>
      <stop offset="50%" stop-color="#00ffffff"/>
      <stop offset="100%" stop-color="#00ffff00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Left panel (before - thermal cold) -->
  <rect x="50" y="80" width="190" height="220" rx="10" fill="#001133"/>
  <!-- Thermal blobs left -->
  <ellipse cx="130" cy="160" rx="60" ry="50" fill="#001eff" opacity="0.6"/>
  <ellipse cx="160" cy="200" rx="40" ry="35" fill="#00ccff" opacity="0.5"/>
  <ellipse cx="100" cy="220" rx="30" ry="25" fill="#00ff66" opacity="0.5"/>
  <ellipse cx="180" cy="260" rx="25" ry="20" fill="#ff6600" opacity="0.7"/>
  <!-- Crosshair left -->
  <line x1="130" y1="100" x2="130" y2="290" stroke="#ffffff20" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="195" x2="230" y2="195" stroke="#ffffff20" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Right panel (after - thermal hot) -->
  <rect x="272" y="80" width="190" height="220" rx="10" fill="#330000"/>
  <!-- Thermal blobs right -->
  <ellipse cx="360" cy="160" rx="60" ry="50" fill="#ff0000" opacity="0.6"/>
  <ellipse cx="390" cy="200" rx="40" ry="35" fill="#ff9900" opacity="0.5"/>
  <ellipse cx="330" cy="220" rx="30" ry="25" fill="#ffff00" opacity="0.5"/>
  <ellipse cx="410" cy="260" rx="25" ry="20" fill="#ff6600" opacity="0.7"/>
  <!-- Crosshair right -->
  <line x1="360" y1="100" x2="360" y2="290" stroke="#ffffff20" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="282" y1="195" x2="452" y2="195" stroke="#ffffff20" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Scan line overlay -->
  <rect x="236" y="80" width="8" height="220" rx="4" fill="url(#scanLine)" opacity="0.9"/>
  <!-- Color scale bar -->
  <rect x="50" y="330" width="412" height="22" rx="6" fill="url(#scanL)"/>
  <text x="50" y="372" font-family="monospace" font-size="14" fill="#001eff">COLD</text>
  <text x="432" y="372" text-anchor="end" font-family="monospace" font-size="14" fill="#ff6600">HOT</text>
  <!-- Temp labels -->
  <text x="145" y="308" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ccff">-5°C</text>
  <text x="367" y="308" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff9900">+42°C</text>
  <!-- Title -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white" opacity="0.7">THERMAL SCAN</text>
  <text x="256" y="475" text-anchor="middle" font-family="Arial" font-size="14" fill="white" opacity="0.4">BEFORE / AFTER</text>
</svg>
