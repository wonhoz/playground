<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <radialGradient id="cauldron07" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="brew07" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="steamGlow07" x="-60%" y="-100%" width="220%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cauldronGlow07" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Deep red-brown background (warm kitchen/forge) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Warm light from below -->
  <ellipse cx="512" cy="900" rx="380" ry="160" fill="#F97316" opacity="0.12"/>
  <!-- Ember sparks -->
  <circle cx="300" cy="820" r="4" fill="#F97316" opacity="0.5"/>
  <circle cx="380" cy="860" r="3" fill="#FEF08A" opacity="0.4"/>
  <circle cx="680" cy="840" r="4" fill="#F97316" opacity="0.5"/>
  <circle cx="750" cy="800" r="3" fill="#FEF08A" opacity="0.4"/>

  <!-- Layer 2: Cauldron / pot -->
  <!-- Pot rim -->
  <ellipse cx="512" cy="540" rx="300" ry="44" fill="#4B5563"/>
  <!-- Pot body -->
  <path d="M212,540 Q200,820 512,840 Q824,820 812,540 Z" fill="url(#cauldron07)"/>
  <!-- Pot legs -->
  <rect x="340" y="840" width="40" height="80" rx="8" fill="#374151"/>
  <rect x="642" y="840" width="40" height="80" rx="8" fill="#374151"/>
  <rect x="492" y="848" width="40" height="72" rx="8" fill="#374151"/>
  <!-- Pot handle left -->
  <path d="M212,540 Q170,480 190,430 Q210,380 240,420 Q220,460 230,510" fill="none" stroke="#4B5563" stroke-width="28" stroke-linecap="round"/>
  <!-- Pot handle right -->
  <path d="M812,540 Q854,480 834,430 Q814,380 784,420 Q804,460 794,510" fill="none" stroke="#4B5563" stroke-width="28" stroke-linecap="round"/>

  <!-- Brew surface inside cauldron -->
  <g filter="url(#cauldronGlow07)">
    <ellipse cx="512" cy="538" rx="282" ry="34" fill="url(#brew07)" opacity="0.9"/>
    <!-- Swirl pattern -->
    <path d="M380,540 Q450,520 512,538 Q574,556 640,540" fill="none" stroke="#A7F3D0" stroke-width="4" opacity="0.5"/>
    <!-- Bubbles on surface -->
    <circle cx="440" cy="534" r="12" fill="#A7F3D0" opacity="0.5"/>
    <circle cx="560" cy="536" r="10" fill="#A7F3D0" opacity="0.4"/>
    <circle cx="620" cy="530" r="8" fill="#6EE7B7" opacity="0.5"/>
  </g>

  <!-- Layer 3: Steam wisps with floating recipe cards -->
  <g filter="url(#steamGlow07)">
    <!-- Steam wisps -->
    <path d="M420,530 Q400,460 430,390 Q460,320 440,250" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
    <path d="M512,530 Q492,450 520,370 Q548,290 530,210" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.22"/>
    <path d="M604,530 Q624,460 600,390 Q576,320 596,250" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
  </g>

  <!-- Floating recipe ingredient cards in steam -->
  <rect x="340" y="360" width="150" height="50" rx="8" fill="rgba(254,243,199,0.85)" stroke="#D97706" stroke-width="2" transform="rotate(-8 415 385)"/>
  <text x="343" y="394" font-family="'Consolas',monospace" font-size="22" fill="#92400E" font-weight="bold" transform="rotate(-8 415 385)">{{role}}</text>

  <rect x="530" y="290" width="160" height="50" rx="8" fill="rgba(254,243,199,0.85)" stroke="#D97706" stroke-width="2" transform="rotate(6 610 315)"/>
  <text x="533" y="324" font-family="'Consolas',monospace" font-size="22" fill="#92400E" font-weight="bold" transform="rotate(6 610 315)">{{task}}</text>

  <rect x="400" y="210" width="170" height="50" rx="8" fill="rgba(254,243,199,0.85)" stroke="#D97706" stroke-width="2" transform="rotate(-4 485 235)"/>
  <text x="403" y="244" font-family="'Consolas',monospace" font-size="22" fill="#92400E" font-weight="bold" transform="rotate(-4 485 235)">{{format}}</text>

  <!-- Fire glow under cauldron -->
  <g filter="url(#cauldronGlow07)">
    <ellipse cx="430" cy="858" rx="70" ry="20" fill="#F97316" opacity="0.7"/>
    <ellipse cx="594" cy="858" rx="70" ry="20" fill="#F97316" opacity="0.7"/>
  </g>
</svg>
