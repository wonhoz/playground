<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040a08"/>
      <stop offset="100%" stop-color="#071410"/>
    </linearGradient>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="p2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Origami tree shapes (flat polygon faces) -->
  <!-- Top crane/tree shape - head -->
  <polygon points="256,70 310,180 256,160 202,180" fill="url(#p1)" stroke="#34D399" stroke-width="1.5"/>
  <text x="256" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#6EE7B7">{ }</text>
  <!-- Main body polygon -->
  <polygon points="202,180 310,180 340,280 256,320 172,280" fill="url(#p2)" stroke="#34D399" stroke-width="1.5"/>
  <!-- Inner fold lines -->
  <line x1="256" y1="160" x2="256" y2="320" stroke="#34D399" stroke-width="1" opacity="0.4"/>
  <line x1="202" y1="180" x2="340" y2="280" stroke="#34D399" stroke-width="0.8" opacity="0.3"/>
  <line x1="310" y1="180" x2="172" y2="280" stroke="#34D399" stroke-width="0.8" opacity="0.3"/>
  <!-- Left wing -->
  <polygon points="172,280 256,320 210,400 120,350" fill="url(#p3)" stroke="#10B981" stroke-width="1.5"/>
  <text x="175" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#34D399">[ ]</text>
  <!-- Right wing -->
  <polygon points="340,280 256,320 302,400 392,350" fill="url(#p1)" stroke="#10B981" stroke-width="1.5"/>
  <text x="340" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#34D399">"str"</text>
  <!-- Left tail -->
  <polygon points="120,350 210,400 170,450" fill="url(#p2)" stroke="#059669" stroke-width="1"/>
  <text x="166" y="420" text-anchor="middle" font-family="monospace" font-size="7" fill="#10B981">42</text>
  <!-- Right tail -->
  <polygon points="392,350 302,400 342,450" fill="url(#p3)" stroke="#059669" stroke-width="1"/>
  <text x="344" y="420" text-anchor="middle" font-family="monospace" font-size="7" fill="#10B981">true</text>
  <!-- Center label -->
  <text x="256" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#6EE7B7" opacity="0.6">{ data:</text>
  <text x="256" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ADE80" opacity="0.6">  ... }</text>
  <!-- Fold crease marks -->
  <path d="M256,320 L210,400" stroke="#059669" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.4"/>
  <path d="M256,320 L302,400" stroke="#059669" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.4"/>
</svg>
