<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 따뜻한 산호/복숭아 -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FFAB91"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <!-- Layer 2: 드래그앤드롭 손 제스처 실루엣 (메타포) -->
  <!-- 손 실루엣 — 오른쪽 방향으로 파일 들고 이동 -->
  <!-- 손바닥 -->
  <ellipse cx="460" cy="680" rx="180" ry="120" fill="#FF7043"/>
  <!-- 엄지 손가락 -->
  <path d="M300,680 Q260,600 300,550 Q340,510 380,540 L380,680 Z" fill="#FF7043"/>
  <!-- 검지 -->
  <rect x="380" y="380" width="70" height="320" rx="35" fill="#FF7043"/>
  <!-- 중지 -->
  <rect x="460" y="360" width="70" height="340" rx="35" fill="#FF7043"/>
  <!-- 약지 -->
  <rect x="540" y="380" width="70" height="320" rx="35" fill="#FF7043"/>
  <!-- 새끼 -->
  <rect x="620" y="420" width="60" height="280" rx="30" fill="#FF7043"/>
  <!-- 손 경계선 -->
  <ellipse cx="460" cy="680" rx="180" ry="120" fill="none" stroke="#E64A19" stroke-width="10"/>
  <path d="M300,680 Q260,600 300,550 Q340,510 380,540 L380,680 Z" fill="none" stroke="#E64A19" stroke-width="10"/>
  <rect x="380" y="380" width="70" height="320" rx="35" fill="none" stroke="#E64A19" stroke-width="10"/>
  <rect x="460" y="360" width="70" height="340" rx="35" fill="none" stroke="#E64A19" stroke-width="10"/>
  <rect x="540" y="380" width="70" height="320" rx="35" fill="none" stroke="#E64A19" stroke-width="10"/>
  <rect x="620" y="420" width="60" height="280" rx="30" fill="none" stroke="#E64A19" stroke-width="10"/>

  <!-- Layer 3: 손 위 파일 아이콘 (드래그 중) + 이동 화살표 -->
  <!-- 파일 아이콘 (손 위에 올려진) -->
  <rect x="380" y="200" width="200" height="250" rx="20" fill="#FFF9C4" stroke="#F9A825" stroke-width="10"/>
  <!-- 파일 폴드 -->
  <path d="M527,200 L580,253 L527,253 Z" fill="#F9A825"/>
  <!-- 파일 내용 라인 -->
  <rect x="406" y="280" width="120" height="12" rx="6" fill="#F9A825" opacity="0.7"/>
  <rect x="406" y="302" width="90" height="12" rx="6" fill="#F9A825" opacity="0.7"/>
  <!-- 파일 위 "IMG" -->
  <text x="480" y="380" font-family="Arial Black" font-size="60" fill="#F57F17" text-anchor="middle">IMG</text>

  <!-- 이동 방향 화살표들 (오른쪽으로 이동감) -->
  <path d="M660,460 L720,480" stroke="#FF5722" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M670,500 L740,515" stroke="#FF5722" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <path d="M665,540 L730,550" stroke="#FF5722" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
</svg>
