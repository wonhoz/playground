<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2d1b00"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="100%" stop-color="#8B5E0A"/>
    </linearGradient>
    <linearGradient id="rod" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <filter id="bead_shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Abacus frame -->
  <rect x="80" y="100" width="352" height="340" rx="18" fill="url(#frame)" filter="url(#bead_shadow)"/>
  <rect x="80" y="100" width="352" height="340" rx="18" fill="none" stroke="#ffd200" stroke-width="2" opacity="0.4"/>
  <!-- Inner frame -->
  <rect x="98" y="118" width="316" height="304" rx="12" fill="#1a0a00"/>

  <!-- Divider bar -->
  <rect x="98" y="243" width="316" height="14" rx="4" fill="url(#frame)"/>

  <!-- Rods (5 rods visible) -->
  <line x1="148" y1="118" x2="148" y2="422" stroke="url(#rod)" stroke-width="5" stroke-linecap="round"/>
  <line x1="208" y1="118" x2="208" y2="422" stroke="url(#rod)" stroke-width="5" stroke-linecap="round"/>
  <line x1="268" y1="118" x2="268" y2="422" stroke="url(#rod)" stroke-width="5" stroke-linecap="round"/>
  <line x1="328" y1="118" x2="328" y2="422" stroke="url(#rod)" stroke-width="5" stroke-linecap="round"/>
  <line x1="388" y1="118" x2="388" y2="422" stroke="url(#rod)" stroke-width="5" stroke-linecap="round"/>

  <!-- Upper section beads (1 bead per rod = value 5) -->
  <!-- Rod 1 upper - moved up -->
  <ellipse cx="148" cy="145" rx="22" ry="14" fill="#ee0979" filter="url(#bead_shadow)"/>
  <ellipse cx="148" cy="142" rx="16" ry="6" fill="#ff6a9a" opacity="0.4"/>
  <!-- Rod 2 upper - moved down (showing 5) -->
  <ellipse cx="208" cy="228" rx="22" ry="14" fill="#f7971e" filter="url(#bead_shadow)"/>
  <ellipse cx="208" cy="225" rx="16" ry="6" fill="#ffba66" opacity="0.4"/>
  <!-- Rod 3 upper - moved down -->
  <ellipse cx="268" cy="228" rx="22" ry="14" fill="#ffd200" filter="url(#bead_shadow)"/>
  <ellipse cx="268" cy="225" rx="16" ry="6" fill="#ffe966" opacity="0.4"/>
  <!-- Rod 4 upper - moved up -->
  <ellipse cx="328" cy="145" rx="22" ry="14" fill="#56ab2f" filter="url(#bead_shadow)"/>
  <ellipse cx="328" cy="142" rx="16" ry="6" fill="#88e055" opacity="0.4"/>
  <!-- Rod 5 upper - moved down -->
  <ellipse cx="388" cy="228" rx="22" ry="14" fill="#56CCF2" filter="url(#bead_shadow)"/>
  <ellipse cx="388" cy="225" rx="16" ry="6" fill="#aae8ff" opacity="0.4"/>

  <!-- Lower section beads (4 beads per rod = values 1-4) -->
  <!-- Rod 1 lower - 3 beads up (value 3) -->
  <ellipse cx="148" cy="274" rx="22" ry="14" fill="#ee0979" filter="url(#bead_shadow)"/>
  <ellipse cx="148" cy="271" rx="16" ry="6" fill="#ff6a9a" opacity="0.4"/>
  <ellipse cx="148" cy="302" rx="22" ry="14" fill="#ee0979" filter="url(#bead_shadow)"/>
  <ellipse cx="148" cy="299" rx="16" ry="6" fill="#ff6a9a" opacity="0.4"/>
  <ellipse cx="148" cy="330" rx="22" ry="14" fill="#ee0979" filter="url(#bead_shadow)"/>
  <ellipse cx="148" cy="327" rx="16" ry="6" fill="#ff6a9a" opacity="0.4"/>
  <ellipse cx="148" cy="400" rx="22" ry="14" fill="#cc0060" opacity="0.5"/>
  <!-- Rod 2 lower -->
  <ellipse cx="208" cy="274" rx="22" ry="14" fill="#f7971e" filter="url(#bead_shadow)"/>
  <ellipse cx="208" cy="271" rx="16" ry="6" fill="#ffba66" opacity="0.4"/>
  <ellipse cx="208" cy="370" rx="22" ry="14" fill="#cc7700" opacity="0.5"/>
  <ellipse cx="208" cy="398" rx="22" ry="14" fill="#cc7700" opacity="0.5"/>
  <ellipse cx="208" cy="424" rx="22" ry="14" fill="#cc7700" opacity="0.5"/>
  <!-- Rod 3 lower -->
  <ellipse cx="268" cy="274" rx="22" ry="14" fill="#ffd200" filter="url(#bead_shadow)"/>
  <ellipse cx="268" cy="271" rx="16" ry="6" fill="#ffe966" opacity="0.4"/>
  <ellipse cx="268" cy="302" rx="22" ry="14" fill="#ffd200" filter="url(#bead_shadow)"/>
  <ellipse cx="268" cy="299" rx="16" ry="6" fill="#ffe966" opacity="0.4"/>
  <ellipse cx="268" cy="370" rx="22" ry="14" fill="#aa9000" opacity="0.5"/>
  <ellipse cx="268" cy="398" rx="22" ry="14" fill="#aa9000" opacity="0.5"/>
  <!-- Rod 4 lower -->
  <ellipse cx="328" cy="274" rx="22" ry="14" fill="#56ab2f" filter="url(#bead_shadow)"/>
  <ellipse cx="328" cy="271" rx="16" ry="6" fill="#88e055" opacity="0.4"/>
  <ellipse cx="328" cy="302" rx="22" ry="14" fill="#56ab2f" filter="url(#bead_shadow)"/>
  <ellipse cx="328" cy="299" rx="16" ry="6" fill="#88e055" opacity="0.4"/>
  <ellipse cx="328" cy="330" rx="22" ry="14" fill="#56ab2f" filter="url(#bead_shadow)"/>
  <ellipse cx="328" cy="327" rx="16" ry="6" fill="#88e055" opacity="0.4"/>
  <ellipse cx="328" cy="358" rx="22" ry="14" fill="#56ab2f" filter="url(#bead_shadow)"/>
  <ellipse cx="328" cy="355" rx="16" ry="6" fill="#88e055" opacity="0.4"/>
  <!-- Rod 5 lower -->
  <ellipse cx="388" cy="274" rx="22" ry="14" fill="#56CCF2" filter="url(#bead_shadow)"/>
  <ellipse cx="388" cy="271" rx="16" ry="6" fill="#aae8ff" opacity="0.4"/>
  <ellipse cx="388" cy="302" rx="22" ry="14" fill="#56CCF2" filter="url(#bead_shadow)"/>
  <ellipse cx="388" cy="299" rx="16" ry="6" fill="#aae8ff" opacity="0.4"/>
  <ellipse cx="388" cy="370" rx="22" ry="14" fill="#2288aa" opacity="0.5"/>
  <ellipse cx="388" cy="398" rx="22" ry="14" fill="#2288aa" opacity="0.5"/>
</svg>
