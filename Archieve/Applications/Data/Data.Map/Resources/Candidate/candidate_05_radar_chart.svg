<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#1a2444"/>
    </linearGradient>
    <linearGradient id="radar_fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar grid (5 levels) -->
  <!-- Level 5 (outermost) -->
  <polygon points="256,80 404,176 348,352 164,352 108,176" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Level 4 -->
  <polygon points="256,110 374,190 326,334 186,334 138,190" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Level 3 -->
  <polygon points="256,140 344,204 304,316 208,316 168,204" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Level 2 -->
  <polygon points="256,170 314,218 282,298 230,298 198,218" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Level 1 -->
  <polygon points="256,200 284,232 260,280 252,280 228,232" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Axes -->
  <line x1="256" y1="256" x2="256" y2="80" stroke="#2a4a7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="256" y1="256" x2="404" y2="176" stroke="#2a4a7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="256" y1="256" x2="348" y2="352" stroke="#2a4a7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="256" y1="256" x2="164" y2="352" stroke="#2a4a7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="256" y1="256" x2="108" y2="176" stroke="#2a4a7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Data polygon -->
  <polygon points="256,100 390,182 330,345 175,340 120,185" fill="url(#radar_fill)" stroke="#00bcd4" stroke-width="2.5"/>
  <!-- Data point dots -->
  <circle cx="256" cy="100" r="7" fill="#00e5ff"/>
  <circle cx="390" cy="182" r="7" fill="#00e5ff"/>
  <circle cx="330" cy="345" r="7" fill="#00e5ff"/>
  <circle cx="175" cy="340" r="7" fill="#00e5ff"/>
  <circle cx="120" cy="185" r="7" fill="#00e5ff"/>
  <!-- Axis labels -->
  <text x="256" y="68" font-family="Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="middle">Speed</text>
  <text x="424" y="172" font-family="Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="start">Depth</text>
  <text x="360" y="374" font-family="Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="middle">Range</text>
  <text x="152" y="374" font-family="Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="middle">Links</text>
  <text x="82" y="172" font-family="Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="end">Size</text>
  <!-- Center -->
  <circle cx="256" cy="256" r="5" fill="#00bcd4"/>
  <!-- Title -->
  <text x="256" y="432" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00bcd4" text-anchor="middle" letter-spacing="2">DATA MAP</text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="13" fill="#667" text-anchor="middle">Radar Analysis</text>
</svg>
