  <rect x="160" y="560" width="700" height="280" rx="24" fill="#DCFCE7" stroke="#22C55E" stroke-width="6" stroke-dasharray="20,12"/>
  <text x="512" y="688" font-family="Arial,sans-serif" font-size="28" fill="#15803D" text-anchor="middle" opacity="0.7">드래그하여 변환</text>
  <text x="512" y="724" font-family="Arial,sans-serif" font-size="20" fill="#4ADE80" text-anchor="middle" opacity="0.6">SVG · PNG · JPG · BMP</text>
  <!-- Drop arrow -->
