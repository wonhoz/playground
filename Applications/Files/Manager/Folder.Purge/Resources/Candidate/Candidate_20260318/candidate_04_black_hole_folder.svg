<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </linearGradient>
    <radialGradient id="accretionGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#030508;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#7F1D1D;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#EF4444;stop-opacity:0.5"/>
      <stop offset="80%" style="stop-color:#F87171;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="blackHoleGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 강착 원반 -->
  <ellipse cx="256" cy="256" rx="200" ry="65" fill="url(#accretionGrad)" filter="url(#blackHoleGlow)"/>
  <ellipse cx="256" cy="256" rx="170" ry="55" fill="#EF4444" opacity="0.1"/>
  <ellipse cx="256" cy="256" rx="140" ry="45" fill="#DC2626" opacity="0.12"/>
  <!-- 강착 원반 반짝임 -->
  <ellipse cx="256" cy="256" rx="180" ry="58" fill="none" stroke="#F87171" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="150" ry="48" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.55" filter="url(#glow)"/>
  <!-- 폴더들 (블랙홀로 빨려드는) -->
  <!-- 폴더 1 (오른쪽에서 진입) -->
  <g transform="translate(380,220) scale(0.9)">
    <polygon points="0,0 45,0 55,12 55,65 0,65" fill="#EF4444" opacity="0.85"/>
    <polygon points="0,0 35,0 35,-14 55,0" fill="#DC2626" opacity="0.75"/>
  </g>
  <!-- 흡입 화살표 -->
  <path d="M 375 255 Q 340 257 310 256" fill="none" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <!-- 폴더 2 (위에서) -->
  <g transform="translate(220,90) scale(0.7)">
    <polygon points="0,0 40,0 50,11 50,58 0,58" fill="#F87171" opacity="0.8"/>
    <polygon points="0,0 30,0 30,-12 50,0" fill="#EF4444" opacity="0.7"/>
  </g>
  <path d="M 248 145 Q 252 180 254 210" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.4"/>
  <!-- 폴더 3 (왼쪽에서) -->
  <g transform="translate(85,235) scale(0.75)">
    <polygon points="0,0 42,0 52,11 52,60 0,60" fill="#DC2626" opacity="0.8"/>
    <polygon points="0,0 32,0 32,-12 52,0" fill="#EF4444" opacity="0.7"/>
  </g>
  <path d="M 148 260 Q 185 258 212 256" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.4"/>
  <!-- 블랙홀 (사건 지평선) -->
  <circle cx="256" cy="256" r="70" fill="#030508" opacity="1" filter="url(#blackHoleGlow)"/>
  <circle cx="256" cy="256" r="60" fill="#030508" opacity="1"/>
  <circle cx="256" cy="256" r="55" fill="#0a0000" opacity="1"/>
  <!-- 광자 링 -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#F87171" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <!-- 상대론적 제트 -->
  <line x1="256" y1="184" x2="256" y2="80" stroke="#EF4444" stroke-width="5" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="328" x2="256" y2="432" stroke="#EF4444" stroke-width="5" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="184" x2="256" y2="80" stroke="#FCA5A5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="328" x2="256" y2="432" stroke="#FCA5A5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>