<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000008"/>
      <stop offset="100%" stop-color="#000012"/>
    </linearGradient>
    <radialGradient id="neb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#EF4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#neb)"/>
  <!-- Nebula gas clouds (circles) -->
  <circle cx="200" cy="220" r="80" fill="#F59E0B" opacity="0.04"/>
  <circle cx="300" cy="280" r="70" fill="#EF4444" opacity="0.04"/>
  <circle cx="250" cy="250" r="100" fill="#A855F7" opacity="0.03"/>
  <!-- Number "stars" in the nebula -->
  <!-- Bright center stars -->
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="26" fill="#FDE68A" opacity="0.9" font-weight="bold">42</text>
  <!-- Mid-brightness numbers -->
  <text x="180" y="200" font-family="monospace" font-size="16" fill="#F59E0B" opacity="0.7">3.14</text>
  <text x="300" y="210" font-family="monospace" font-size="14" fill="#FCD34D" opacity="0.6">2.72</text>
  <text x="320" y="290" font-family="monospace" font-size="15" fill="#F59E0B" opacity="0.65">√2</text>
  <text x="175" y="300" font-family="monospace" font-size="14" fill="#FCD34D" opacity="0.6">1/3</text>
  <!-- Dim distant numbers -->
  <text x="100" y="150" font-family="monospace" font-size="12" fill="#D97706" opacity="0.4">7</text>
  <text x="380" y="140" font-family="monospace" font-size="11" fill="#D97706" opacity="0.35">99</text>
  <text x="420" y="310" font-family="monospace" font-size="12" fill="#B45309" opacity="0.3">∞</text>
  <text x="80" y="320" font-family="monospace" font-size="11" fill="#B45309" opacity="0.3">13</text>
  <text x="130" y="380" font-family="monospace" font-size="10" fill="#92400E" opacity="0.25">π</text>
  <text x="360" y="400" font-family="monospace" font-size="10" fill="#92400E" opacity="0.25">e</text>
  <text x="240" y="120" font-family="monospace" font-size="10" fill="#B45309" opacity="0.3">φ</text>
  <text x="140" y="430" font-family="monospace" font-size="9" fill="#78350F" opacity="0.2">256</text>
  <text x="370" y="420" font-family="monospace" font-size="9" fill="#78350F" opacity="0.2">128</text>
  <!-- Very faint background numbers -->
  <text x="70" y="220" font-family="monospace" font-size="9" fill="#78350F" opacity="0.15">+</text>
  <text x="440" y="220" font-family="monospace" font-size="9" fill="#78350F" opacity="0.15">×</text>
  <text x="70" y="300" font-family="monospace" font-size="9" fill="#78350F" opacity="0.15">÷</text>
  <text x="440" y="300" font-family="monospace" font-size="9" fill="#78350F" opacity="0.15">-</text>
  <!-- Math symbols as constellation lines -->
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="11" fill="#F59E0B" opacity="0.5">NUMBER NEBULA</text>
</svg>
