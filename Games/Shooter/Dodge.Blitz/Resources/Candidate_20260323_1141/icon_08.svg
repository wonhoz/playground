<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 비비드 레드 -->
  <rect width="1024" height="1024" rx="180" fill="#B71C1C"/>
  <!-- Layer 2: 방패 + 총알 막기 -->
  <!-- 큰 방패 -->
  <path d="M512,180 L800,300 L800,580 Q800,760 512,860 Q224,760 224,580 L224,300 Z" fill="#C62828"/>
  <path d="M512,180 L800,300 L800,580 Q800,760 512,860 Q224,760 224,580 L224,300 Z" fill="none" stroke="#EF9A9A" stroke-width="12"/>
  <!-- 방패 안 번개 문양 -->
  <polygon points="560,300 460,540 540,540 420,780 660,480 560,480 680,300" fill="#FFFF00" opacity="0.9"/>
  <!-- 방패에 맞는 총알들 -->
  <rect x="140" y="380" width="18" height="40" rx="6" fill="#FFFF00" transform="rotate(90,149,400)"/>
  <rect x="840" y="340" width="18" height="40" rx="6" fill="#FFFF00" transform="rotate(-90,849,360)"/>
  <rect x="220" y="240" width="18" height="40" rx="6" fill="#FFFF00" transform="rotate(45,229,260)"/>
  <rect x="750" y="240" width="18" height="40" rx="6" fill="#FFFF00" transform="rotate(-45,759,260)"/>
  <!-- 충격파 -->
  <circle cx="190" cy="400" r="30" fill="none" stroke="#FFD740" stroke-width="6" opacity="0.7"/>
  <circle cx="860" cy="360" r="28" fill="none" stroke="#FFD740" stroke-width="5" opacity="0.6"/>
  <!-- Layer 3: -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FFFF00" text-anchor="middle">DODGE.BLITZ</text>
</svg>
