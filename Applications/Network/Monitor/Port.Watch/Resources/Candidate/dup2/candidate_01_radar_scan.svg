<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#003300"/>
    </linearGradient>
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#radarGlow)"/>
  <!-- Radar rings -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
  <!-- Cross hairs -->
  <line x1="256" y1="46" x2="256" y2="466" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <line x1="46" y1="256" x2="466" y2="256" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <!-- Sweep sector -->
  <path d="M256,256 L256,96 A160,160 0 0,1 395,316 Z" fill="#00ff41" opacity="0.12"/>
  <line x1="256" y1="256" x2="395" y2="316" stroke="#00ff41" stroke-width="2.5" opacity="0.8"/>
  <!-- Blips (detected ports) -->
  <circle cx="320" cy="180" r="5" fill="#00ff41"/>
  <circle cx="320" cy="180" r="10" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
  <circle cx="180" cy="300" r="4" fill="#00ff41" opacity="0.8"/>
  <circle cx="360" cy="280" r="6" fill="#ff4444"/>
  <circle cx="360" cy="280" r="12" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
  <!-- Center crosshair -->
  <circle cx="256" cy="256" r="6" fill="none" stroke="#00ff41" stroke-width="2"/>
  <circle cx="256" cy="256" r="2" fill="#00ff41"/>
</svg>
