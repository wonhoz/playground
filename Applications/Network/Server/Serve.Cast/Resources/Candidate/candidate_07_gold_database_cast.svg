<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2a1c00"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <radialGradient id="top" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffd54f"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Database cylinder body -->
  <rect x="146" y="185" width="220" height="170" fill="url(#db)" rx="4"/>
  <!-- DB top ellipse -->
  <ellipse cx="256" cy="185" rx="110" ry="30" fill="url(#top)"/>
  <!-- DB bottom ellipse -->
  <ellipse cx="256" cy="355" rx="110" ry="30" fill="#f57f17"/>
  <!-- Dividing lines -->
  <ellipse cx="256" cy="235" rx="110" ry="28" fill="none" stroke="#f57f17" stroke-width="2" opacity="0.6"/>
  <ellipse cx="256" cy="285" rx="110" ry="28" fill="none" stroke="#f57f17" stroke-width="2" opacity="0.6"/>
  <ellipse cx="256" cy="325" rx="110" ry="28" fill="none" stroke="#f57f17" stroke-width="2" opacity="0.4"/>
  <!-- Cast waves right side -->
  <path d="M360 200 Q400 220 400 255 Q400 290 360 310" stroke="#ffd740" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M370 175 Q425 205 425 255 Q425 305 370 335" stroke="#ffd740" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M380 150 Q450 190 450 255 Q450 320 380 360" stroke="#ffd740" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Label -->
  <text x="256" y="435" font-family="monospace" font-size="24" fill="#ffd54f" text-anchor="middle" letter-spacing="3" opacity="0.9">CAST</text>
</svg>
