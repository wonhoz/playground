<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1400"/>
      <stop offset="100%" stop-color="#2D2200"/>
    </linearGradient>
    <linearGradient id="arcade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Arcade cabinet shape -->
  <path d="M 160 90 L 352 90 L 372 180 L 372 420 L 140 420 L 140 180 Z" fill="#1A1400" stroke="#FFD60A" stroke-width="3"/>
  <!-- Screen -->
  <rect x="168" y="120" width="176" height="120" rx="8" fill="#0D0D0D"/>
  <!-- Game screen content -->
  <rect x="176" y="128" width="160" height="104" rx="4" fill="#000A00"/>
  <!-- Morse pattern on screen -->
  <circle cx="196" cy="170" r="8" fill="#FFD60A"/>
  <rect x="212" y="162" width="22" height="16" rx="4" fill="#FFD60A"/>
  <circle cx="244" cy="170" r="8" fill="#FFD60A"/>
  <circle cx="262" cy="170" r="8" fill="#FFD60A"/>
  <rect x="278" y="162" width="22" height="16" rx="4" fill="#FFD60A"/>
  <circle cx="310" cy="170" r="8" fill="#FFD60A"/>
  <!-- Runner on screen -->
  <rect x="256" y="190" width="12" height="12" fill="#00FF88"/>
  <rect x="252" y="202" width="20" height="16" fill="#00FF88"/>
  <!-- Controls -->
  <circle cx="196" cy="360" r="24" fill="#333" stroke="#FFD60A" stroke-width="2"/>
  <circle cx="196" cy="360" r="14" fill="#FFD60A"/>
  <rect x="280" y="346" width="20" height="20" rx="4" fill="#FF4444"/>
  <rect x="308" y="346" width="20" height="20" rx="4" fill="#FF4444"/>
  <!-- Coin slot -->
  <rect x="220" y="396" width="72" height="14" rx="4" fill="#333"/>
  <!-- Title on cabinet -->
  <text x="256" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#FFD60A">MORSE.RUN</text>
  <!-- Score display -->
  <text x="256" y="280" text-anchor="middle" font-family="monospace" font-size="13" fill="#FFD60A">HI-SCORE 99999</text>
</svg>