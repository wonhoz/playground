<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26C6DA"/>
      <stop offset="1" stop-color="#0097A7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g1)"/>
  <!-- left card: PNG -->
  <g transform="translate(120 320) rotate(-8)">
    <rect width="280" height="340" rx="28" fill="#FFFFFF" stroke="#0E2F33" stroke-width="14"/>
    <rect x="28" y="40" width="160" height="22" rx="8" fill="#FFE082"/>
    <rect x="28" y="76" width="120" height="18" rx="6" fill="#B2DFDB"/>
    <text x="140" y="240" font-family="Verdana, sans-serif" font-size="92" font-weight="900" text-anchor="middle" fill="#00838F">PNG</text>
  </g>
  <!-- right card: ICO -->
  <g transform="translate(620 360) rotate(8)">
    <rect width="280" height="340" rx="28" fill="#FFFFFF" stroke="#0E2F33" stroke-width="14"/>
    <rect x="28" y="40" width="160" height="22" rx="8" fill="#FF8A80"/>
    <rect x="28" y="76" width="120" height="18" rx="6" fill="#FFCDD2"/>
    <text x="140" y="240" font-family="Verdana, sans-serif" font-size="100" font-weight="900" text-anchor="middle" fill="#C62828">ICO</text>
  </g>
  <!-- arrow -->
  <g transform="translate(420 460)">
    <rect x="0" y="36" width="190" height="50" rx="22" fill="#FFEB3B" stroke="#0E2F33" stroke-width="14"/>
    <polygon points="170,0 280,61 170,122" fill="#FFEB3B" stroke="#0E2F33" stroke-width="14" stroke-linejoin="round"/>
  </g>
</svg>
