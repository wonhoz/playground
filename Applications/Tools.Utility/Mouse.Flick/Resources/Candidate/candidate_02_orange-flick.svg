<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#3D1500"/>
    </linearGradient>
    <linearGradient id="flick" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mouse body -->
  <path d="M 200 220 Q 200 160 256 160 Q 312 160 312 220 L 312 320 Q 312 370 256 370 Q 200 370 200 320 Z" fill="#2A1000" stroke="#FF6B00" stroke-width="3"/>
  <!-- Mouse scroll wheel -->
  <rect x="246" y="185" width="20" height="50" rx="10" fill="#FF6B00" opacity="0.7"/>
  <!-- Mouse button divider -->
  <line x1="256" y1="160" x2="256" y2="285" stroke="#FF6B00" stroke-width="2" opacity="0.5"/>
  <!-- Flick arrow right -->
  <path d="M 320 260 L 420 220 L 400 260 L 420 300 Z" fill="url(#flick)" opacity="0.9"/>
  <!-- Trail lines -->
  <line x1="320" y1="240" x2="390" y2="240" stroke="#FFD700" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="320" y1="260" x2="400" y2="260" stroke="#FFD700" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="320" y1="280" x2="390" y2="280" stroke="#FFD700" stroke-width="2" stroke-dasharray="3,5" opacity="0.3"/>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FF6B00">MOUSE.FLICK</text>
</svg>