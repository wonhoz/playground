<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 프린터 + 문자 용지 출력 | 공간/장면 | #FFF8F0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF8F0"/>
  <!-- Layer 2: Printer outputting ASCII art paper -->
  <!-- Printer body -->
  <rect x="260" y="320" width="504" height="240" rx="20" fill="#374151" stroke="#1F2937" stroke-width="5"/>
  <!-- Printer feed slot -->
  <rect x="320" y="360" width="384" height="24" rx="4" fill="#1F2937"/>
  <!-- Printer top panel -->
  <rect x="300" y="332" width="424" height="40" rx="10" fill="#4B5563"/>
  <!-- Status light (green = printing) -->
  <circle cx="700" cy="352" r="10" fill="#4ADE80"/>
  <!-- Paper coming out of printer -->
  <rect x="356" y="280" width="312" height="300" rx="4" fill="#FFFBF0" stroke="#E5E7EB" stroke-width="2"/>
  <!-- ASCII art on paper -->
  <text x="380" y="320" font-family="monospace" font-size="13" fill="#374151"> ___  </text>
  <text x="380" y="336" font-family="monospace" font-size="13" fill="#374151">/   \ </text>
  <text x="380" y="352" font-family="monospace" font-size="13" fill="#374151">|o o|</text>
  <text x="380" y="368" font-family="monospace" font-size="13" fill="#374151"> \_/ </text>
  <text x="380" y="396" font-family="monospace" font-size="13" fill="#6B7280">##########</text>
  <text x="380" y="412" font-family="monospace" font-size="13" fill="#6B7280">#  HELLO  #</text>
  <text x="380" y="428" font-family="monospace" font-size="13" fill="#6B7280">##########</text>
  <text x="380" y="456" font-family="monospace" font-size="11" fill="#9CA3AF">░░░▒▒▓▓███</text>
  <text x="380" y="472" font-family="monospace" font-size="11" fill="#9CA3AF">░▒▓█ ASCII</text>
  <text x="380" y="488" font-family="monospace" font-size="11" fill="#9CA3AF">ART OUTPUT</text>
  <!-- Layer 3: Printer paper roll below -->
  <ellipse cx="512" cy="570" rx="160" ry="12" fill="#E5E7EB"/>
  <!-- Paper coming from top (going in) -->
  <rect x="420" y="200" width="164" height="140" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="502" y="260" font-family="monospace" font-size="12" fill="#9CA3AF" text-anchor="middle">input</text>
  <text x="502" y="278" font-family="monospace" font-size="12" fill="#6B7280" text-anchor="middle">image.png</text>
</svg>
