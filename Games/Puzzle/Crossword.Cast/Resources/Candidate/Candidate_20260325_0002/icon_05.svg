<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 아이보리 -->
  <rect width="1024" height="1024" rx="190" fill="#FFFDE7" stroke="#BDBDBD" stroke-width="12"/>

  <!-- 신문지 느낌 배경 줄무늬 (힌트 목록 느낌) -->
  <rect x="210" y="210" width="604" height="604" rx="8" fill="white" stroke="#BDBDBD" stroke-width="4"/>

  <!-- 상단 헤더 -->
  <rect x="210" y="210" width="604" height="80" rx="8" fill="#424242"/>
  <text x="512" y="268" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">CROSSWORD</text>

  <!-- ACROSS / DOWN 섹션 제목들 -->
  <text x="240" y="340" font-family="Arial" font-size="38" font-weight="bold" fill="#424242">ACROSS</text>
  <text x="530" y="340" font-family="Arial" font-size="38" font-weight="bold" fill="#424242">DOWN</text>

  <!-- 힌트 줄무늬 텍스트 (ACROSS쪽) -->
  <text x="240" y="385" font-family="Arial" font-size="28" fill="#757575">1. A type of puzzle</text>
  <text x="240" y="420" font-family="Arial" font-size="28" fill="#757575">2. Word game clue</text>
  <text x="240" y="455" font-family="Arial" font-size="28" fill="#757575">3. Letter grid</text>
  <text x="240" y="490" font-family="Arial" font-size="28" fill="#757575">4. Fill in blank</text>
  <text x="240" y="525" font-family="Arial" font-size="28" fill="#757575">5. Brain teaser</text>

  <!-- 힌트 줄무늬 텍스트 (DOWN쪽) -->
  <text x="530" y="385" font-family="Arial" font-size="28" fill="#757575">1. Hint word</text>
  <text x="530" y="420" font-family="Arial" font-size="28" fill="#757575">2. Crossword</text>
  <text x="530" y="455" font-family="Arial" font-size="28" fill="#757575">3. Answer</text>
  <text x="530" y="490" font-family="Arial" font-size="28" fill="#757575">4. Letters</text>
  <text x="530" y="525" font-family="Arial" font-size="28" fill="#757575">5. Solve it</text>

  <!-- 구분선 -->
  <line x1="520" y1="315" x2="520" y2="545" stroke="#BDBDBD" stroke-width="2"/>
  <line x1="240" y1="355" x2="784" y2="355" stroke="#BDBDBD" stroke-width="2"/>

  <!-- 하단 크로스워드 그리드 (작은 크기) -->
  <!-- 4×3 그리드: x=240, y=570, 셀=80px -->
  <rect x="240" y="565" width="80" height="80" fill="#1A1A1A"/>
  <rect x="320" y="565" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="400" y="565" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="480" y="565" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="560" y="565" width="80" height="80" fill="#1A1A1A"/>
  <rect x="240" y="645" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="320" y="645" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="400" y="645" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="480" y="645" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="560" y="645" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="240" y="725" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="320" y="725" width="80" height="80" fill="#1A1A1A"/>
  <rect x="400" y="725" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="480" y="725" width="80" height="80" fill="white" stroke="#424242" stroke-width="2"/>
  <rect x="560" y="725" width="80" height="80" fill="#1A1A1A"/>

  <!-- 그리드 알파벳 -->
  <text x="360" y="625" font-family="Arial Black" font-size="52" font-weight="bold" fill="#1565C0" text-anchor="middle">W</text>
  <text x="440" y="625" font-family="Arial Black" font-size="52" font-weight="bold" fill="#1565C0" text-anchor="middle">O</text>
  <text x="520" y="625" font-family="Arial Black" font-size="52" font-weight="bold" fill="#1565C0" text-anchor="middle">R</text>
  <text x="280" y="705" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">D</text>
  <text x="360" y="705" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">U</text>
  <text x="440" y="705" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">N</text>
  <text x="560" y="705" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">K</text>
  <text x="280" y="785" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">S</text>
  <text x="440" y="785" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">P</text>
  <text x="520" y="785" font-family="Arial Black" font-size="52" font-weight="bold" fill="#424242" text-anchor="middle">T</text>
</svg>
