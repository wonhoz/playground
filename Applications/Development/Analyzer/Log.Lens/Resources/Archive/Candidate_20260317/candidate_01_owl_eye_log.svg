<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <radialGradient id="eye_iris" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE57A"/>
      <stop offset="40%" stop-color="#FFB300"/>
      <stop offset="80%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="eye_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pupil_grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="log_line_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FF8C00" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#FFB300" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="feather_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D2800"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
    <clipPath id="circle_clip">
      <circle cx="256" cy="220" r="180"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg01)"/>

  <!-- 별빛 -->
  <circle cx="60" cy="40" r="1.5" fill="#FFB300" opacity="0.6"/>
