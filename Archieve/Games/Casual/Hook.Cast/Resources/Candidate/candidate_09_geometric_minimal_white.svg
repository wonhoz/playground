<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Geometric water shape -->
  <polygon points="56,310 256,270 456,310 456,456 56,456" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <!-- Water triangles for wave effect -->
  <polygon points="56,310 156,290 256,310" fill="#bfdbfe" opacity="0.7"/>
  <polygon points="256,310 356,290 456,310" fill="#bfdbfe" opacity="0.7"/>
  <!-- Rod - geometric bold lines -->
  <line x1="80" y1="360" x2="220" y2="300" stroke="#374151" stroke-width="14" stroke-linecap="square"/>
  <line x1="220" y1="300" x2="310" y2="260" stroke="#374151" stroke-width="9" stroke-linecap="square"/>
  <!-- Geometric hook - sharp angles -->
  <line x1="310" y1="260" x2="310" y2="315" stroke="url(#blue)" stroke-width="10"/>
  <line x1="310" y1="315" x2="282" y2="360" stroke="url(#blue)" stroke-width="10" stroke-linecap="round"/>
  <path d="M282 360 Q260 390 256 375 Q252 360 268 354" fill="none" stroke="url(#blue)" stroke-width="10" stroke-linecap="round"/>
  <!-- Geometric fish - bold triangles/rectangles -->
  <rect x="150" y="340" width="84" height="44" rx="8" fill="url(#orange)"/>
  <polygon points="230,340 270,328 270,362" fill="#f97316"/>
  <circle cx="168" cy="362" r="8" fill="white"/>
  <circle cx="171" cy="362" r="4" fill="#111"/>
  <!-- Reel geometric -->
  <rect x="120" y="342" width="36" height="22" rx="4" fill="#374151"/>
  <rect x="132" y="348" width="12" height="10" rx="2" fill="#6b7280"/>
  <!-- Geometric splash triangles -->
  <polygon points="310,310 298,298 322,298" fill="#93c5fd" opacity="0.7"/>
  <polygon points="310,310 296,316 302,302" fill="#60a5fa" opacity="0.5"/>
  <!-- Score circle -->
  <circle cx="400" cy="140" r="56" fill="url(#orange)"/>
  <text x="368" y="135" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">CAST</text>
  <text x="382" y="158" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">+50</text>
</svg>
