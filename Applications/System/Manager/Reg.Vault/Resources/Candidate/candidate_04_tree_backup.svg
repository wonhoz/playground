<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0A500"/>
      <stop offset="100%" style="stop-color:#CC8800"/>
    </linearGradient>
    <linearGradient id="backup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#1F6FEB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Registry tree -->
  <line x1="90" y1="110" x2="90" y2="390" stroke="#30363D" stroke-width="2"/>
  <!-- HKEY entries -->
  <rect x="90" y="100" width="14" height="14" rx="2" fill="#F0A500"/>
  <rect x="112" y="96" width="160" height="22" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="120" y="112" font-family="monospace" font-size="13" fill="#F0A500">HKEY_LOCAL_MACHINE</text>
  <line x1="90" y1="140" x2="110" y2="140" stroke="#30363D" stroke-width="2"/>
  <rect x="110" y="130" width="14" height="14" rx="2" fill="#F0A500"/>
  <rect x="132" y="126" width="130" height="22" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="140" y="142" font-family="monospace" font-size="13" fill="#F0A500">SOFTWARE</text>
  <line x1="110" y1="170" x2="130" y2="170" stroke="#30363D" stroke-width="2"/>
  <rect x="130" y="160" width="14" height="14" rx="2" fill="#8B949E"/>
  <rect x="152" y="156" width="140" height="22" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="160" y="172" font-family="monospace" font-size="12" fill="#8B949E">Microsoft</text>
  <line x1="90" y1="210" x2="110" y2="210" stroke="#30363D" stroke-width="2"/>
  <rect x="110" y="200" width="14" height="14" rx="2" fill="#F0A500"/>
  <rect x="132" y="196" width="110" height="22" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="140" y="212" font-family="monospace" font-size="13" fill="#F0A500">SYSTEM</text>
  <!-- Backup arrow (circular) -->
  <circle cx="360" cy="320" r="80" fill="none" stroke="url(#backup)" stroke-width="10" stroke-dasharray="200 60"/>
  <path d="M 414 260 L 440 240 L 440 280 Z" fill="url(#backup)"/>
  <!-- HDD icon -->
  <rect x="318" y="298" width="76" height="44" rx="8" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <circle cx="384" cy="320" r="6" fill="#58A6FF"/>
  <rect x="326" y="312" width="44" height="5" rx="2" fill="#374151"/>
</svg>
