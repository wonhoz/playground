<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80cbc4"/>
      <stop offset="100%" stop-color="#00796b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- card 1 (front) slightly tilted -->
  <rect x="100" y="155" width="200" height="130" rx="16" fill="url(#card1)" transform="rotate(-8 200 220)"/>
  <rect x="118" y="175" width="164" height="14" rx="6" fill="white" opacity="0.3" transform="rotate(-8 200 182)"/>
  <rect x="118" y="197" width="120" height="10" rx="5" fill="white" opacity="0.2" transform="rotate(-8 178 202)"/>
  <circle cx="254" cy="218" r="12" fill="#0288d1" transform="rotate(-8 254 218)"/>
  <!-- card 2 (back) peeking through flipped -->
  <rect x="212" y="220" width="200" height="130" rx="16" fill="url(#card2)" transform="rotate(8 312 285) scaleX(-0.4)" transform-origin="312 285"/>
  <!-- flip arc arrow -->
  <path d="M180 330 Q256 290 332 330" stroke="#00e5ff" stroke-width="10" fill="none" stroke-linecap="round"/>
  <polygon points="332,330 318,318 336,312" fill="#00e5ff"/>
  <!-- card edge showing flip -->
  <path d="M256 200 Q290 200 290 256 Q290 312 256 312" stroke="#80deea" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- glow -->
  <circle cx="256" cy="256" r="80" fill="#0288d1" opacity="0.08" filter="url(#glow)"/>
</svg>
