<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <clipPath id="c06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background — warm amber -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <!-- Layer 2: Shield silhouette (Active state guardian) -->
  <!-- Shield outer glow (amber-gold) -->
  <path d="M 512,148 L 784,204 L 784,504 Q 784,752 512,880 Q 240,752 240,504 L 240,204 Z"
        fill="#FCD34D" opacity="0.25" clip-path="url(#c06)"/>
  <!-- Shield body (white) -->
  <path d="M 512,172 L 764,224 L 764,496 Q 764,732 512,854 Q 260,732 260,496 L 260,224 Z"
        fill="white" clip-path="url(#c06)"/>
  <!-- Shield inner face (amber tint, depth) -->
  <path d="M 512,220 L 720,264 L 720,488 Q 720,696 512,806 Q 304,696 304,488 L 304,264 Z"
        fill="#FEF3C7" clip-path="url(#c06)"/>

  <!-- Layer 3: Green checkmark inside shield -->
  <!-- Check outline shadow for depth -->
  <polyline points="378,548 472,644 672,422"
            fill="none" stroke="#15803D" stroke-width="80"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.3"
            transform="translate(4,4)"/>
  <!-- Main green checkmark -->
  <polyline points="378,548 472,644 672,422"
            fill="none" stroke="#22C55E" stroke-width="72"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
