<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <radialGradient id="sun" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ffd600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#sun)" opacity="0.5"/>
  <!-- Water at bottom -->
  <path d="M0 340 Q80 325 160 340 Q240 355 320 340 Q400 325 480 340 L512 340 L512 512 L0 512 Z" fill="#0099cc" opacity="0.8"/>
  <path d="M0 355 Q80 344 160 355 Q240 366 320 355 Q400 344 480 355 L512 355" fill="none" stroke="#66ccff" stroke-width="2.5" opacity="0.6"/>
  <!-- Big cute fish -->
  <ellipse cx="256" cy="400" rx="100" ry="55" fill="#ff5722"/>
  <!-- Tail -->
  <path d="M352 400 L400 370 L408 430 Z" fill="#ff7043"/>
  <!-- Belly -->
  <ellipse cx="240" cy="415" rx="65" ry="30" fill="#ffccbc" opacity="0.8"/>
  <!-- Eye -->
  <circle cx="195" cy="388" r="22" fill="white"/>
  <circle cx="200" cy="388" r="14" fill="#1565c0"/>
  <circle cx="205" cy="383" r="7" fill="#333"/>
  <circle cx="208" cy="381" r="3" fill="white"/>
  <!-- Mouth smile -->
  <path d="M175 408 Q185 420 200 415" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Scales -->
  <path d="M250 380 Q270 370 290 380" fill="none" stroke="#e64a19" stroke-width="2.5" opacity="0.6"/>
  <path d="M270 400 Q290 390 310 400" fill="none" stroke="#e64a19" stroke-width="2.5" opacity="0.6"/>
  <path d="M255 418 Q275 408 295 418" fill="none" stroke="#e64a19" stroke-width="2.5" opacity="0.6"/>
  <!-- Dorsal fin -->
  <path d="M240 340 Q256 300 290 330 L290 350 L240 355 Z" fill="#ff7043" opacity="0.9"/>
  <!-- Bubbles -->
  <circle cx="160" cy="310" r="12" fill="none" stroke="#0099cc" stroke-width="2.5"/>
  <circle cx="140" cy="285" r="8" fill="none" stroke="#0099cc" stroke-width="2"/>
  <circle cx="168" cy="265" r="5" fill="none" stroke="#0099cc" stroke-width="2"/>
  <!-- Hook coming down -->
  <line x1="356" y1="60" x2="340" y2="345" stroke="#888" stroke-width="2.5"/>
  <path d="M340 345 Q342 380 328 394 Q316 404 310 396 Q306 388 312 382 Q318 376 322 382" fill="none" stroke="#aaa" stroke-width="6" stroke-linecap="round"/>
  <!-- Bait worm -->
  <path d="M322 382 Q318 390 324 396 Q330 402 326 410" fill="none" stroke="#cc4400" stroke-width="5" stroke-linecap="round"/>
  <!-- Rod at top right -->
  <line x1="340" y1="60" x2="356" y2="60" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="90" x2="356" y2="60" stroke="#8B4513" stroke-width="9" stroke-linecap="round"/>
  <line x1="440" y1="120" x2="380" y2="90" stroke="#8B4513" stroke-width="11" stroke-linecap="round"/>
</svg>
