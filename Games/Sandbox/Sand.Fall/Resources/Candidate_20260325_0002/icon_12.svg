<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1117"/>
  <!-- Layer 2: 모래시계 (원소 상호작용) -->
  <!-- 위쪽 bulb (물) -->
  <path d="M300,220 L724,220 L580,480 L444,480 Z" fill="#3468C8" opacity="0.9"/>
  <!-- 아래쪽 bulb (모래+물 섞임) -->
  <path d="M444,504 L580,504 L724,780 L300,780 Z" fill="#8B6030" opacity="0.9"/>
  <!-- 목 부분의 알갱이들 -->
  <circle cx="505" cy="492" r="9" fill="#E8C878"/>
  <circle cx="519" cy="492" r="9" fill="#3468C8"/>
  <circle cx="512" cy="510" r="10" fill="#E8C878"/>
  <circle cx="504" cy="530" r="8" fill="#3468C8"/>
  <circle cx="520" cy="548" r="9" fill="#E8C878"/>
  <!-- 모래시계 테두리 -->
  <path d="M300,220 L724,220 L580,480 L444,480 Z" fill="none" stroke="white" stroke-width="14"/>
  <path d="M444,504 L580,504 L724,780 L300,780 Z" fill="none" stroke="white" stroke-width="14"/>
  <rect x="290" y="207" width="444" height="24" rx="12" fill="#4FC3F7"/>
  <rect x="290" y="769" width="444" height="24" rx="12" fill="#FF8C00"/>
  <!-- 물 위에 거품 -->
  <circle cx="380" cy="350" r="16" fill="white" opacity="0.3"/>
  <circle cx="500" cy="310" r="13" fill="white" opacity="0.2"/>
  <circle cx="640" cy="370" r="15" fill="white" opacity="0.3"/>
  <!-- Layer 3: 외부 불꽃 -->
  <path d="M700,780 Q750,700 730,600 Q720,560 750,500 Q770,460 760,400" fill="none" stroke="#FF5500" stroke-width="20" opacity="0.7"/>
  <circle cx="760" cy="390" r="30" fill="#FF5500" opacity="0.8"/>
  <circle cx="755" cy="360" r="20" fill="#FF9900" opacity="0.7"/>
  <!-- 레이블 -->
  <text x="512" y="380" text-anchor="middle" font-family="Arial Black" font-size="66" font-weight="900" fill="white" opacity="0.9">Water</text>
  <text x="512" y="700" text-anchor="middle" font-family="Arial Black" font-size="66" font-weight="900" fill="#E8C878">Sand</text>
</svg>