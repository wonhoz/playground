<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="notify" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Heart health symbol -->
  <path d="M 256,200 C 256,200 180,148 180,100 C 180,68 208,52 256,80 C 304,52 332,68 332,100 C 332,148 256,200 256,200 Z" fill="url(#heart)" opacity="0.9"/>
  <!-- ECG line inside heart area -->
  <polyline points="192,120 212,120 224,96 236,144 248,108 260,128 268,120 290,120 302,104 314,120" fill="none" stroke="#FFEBEE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Notification card -->
  <rect x="72" y="232" width="368" height="120" rx="20" fill="url(#notify)" stroke="#A5D6A7" stroke-width="6"/>
  <!-- Green check bell -->
  <circle cx="120" cy="292" r="32" fill="#2E7D32" stroke="#A5D6A7" stroke-width="4"/>
  <path d="M 120,276 A 18,18 0 0,1 138,294 L 138,304 L 102,304 L 102,294 A 18,18 0 0,1 120,276 Z" fill="#A5D6A7"/>
  <circle cx="120" cy="310" r="7" fill="#A5D6A7"/>
  <rect x="108" y="272" width="24" height="7" rx="3" fill="#A5D6A7"/>
  <!-- Text lines -->
  <rect x="168" y="268" width="240" height="10" rx="5" fill="#E8F5E9" opacity="0.9"/>
  <rect x="168" y="284" width="200" height="8" rx="4" fill="#C8E6C9" opacity="0.7"/>
  <rect x="168" y="300" width="220" height="8" rx="4" fill="#C8E6C9" opacity="0.6"/>
  <!-- Timer badge -->
  <circle cx="400" cy="340" r="40" fill="#1B5E20" stroke="#66BB6A" stroke-width="5"/>
  <text x="400" y="352" text-anchor="middle" font-size="26" font-weight="bold" fill="#A5D6A7" font-family="monospace">25m</text>
  <!-- Stretching figure -->
  <circle cx="256" cy="400" r="18" fill="#66BB6A"/>
  <line x1="256" y1="418" x2="256" y2="460" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="436" x2="228" y2="418" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="436" x2="284" y2="418" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="460" x2="240" y2="488" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="460" x2="272" y2="488" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
</svg>
