<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#FF8F00"/>
  <!-- Layer 2: 2x2 format grid -->
  <!-- SVG cell -->
  <rect x="140" y="200" width="320" height="240" rx="16" fill="#0D47A1"/>
  <text x="300" y="340" font-family="Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">SVG</text>
  <!-- PNG cell -->
  <rect x="564" y="200" width="320" height="240" rx="16" fill="#2E7D32"/>
  <text x="724" y="340" font-family="Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">PNG</text>
  <!-- JPG cell -->
  <rect x="140" y="580" width="320" height="240" rx="16" fill="#E65100"/>
  <text x="300" y="720" font-family="Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">JPG</text>
  <!-- ICO cell -->
  <rect x="564" y="580" width="320" height="240" rx="16" fill="#4A148C"/>
  <text x="724" y="720" font-family="Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">ICO</text>
  <!-- Grid lines -->
  <rect x="140" y="452" width="744" height="16" rx="8" fill="#FF8F00"/>
  <rect x="464" y="200" width="16" height="620" rx="8" fill="#FF8F00"/>
</svg>