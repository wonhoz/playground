<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 세계지도 + 수도 표시 핀 | 공간/장면 | #134E4A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A2E2C"/>
  <!-- Layer 2: Simplified world map outline (stylized) -->
  <!-- North America -->
  <path d="M160 300 Q180 260 240 250 Q290 240 320 280 Q340 310 330 360 Q320 400 280 420 Q250 430 220 410 Q180 380 160 340 Z" fill="#2DD4BF" opacity="0.7"/>
  <!-- South America -->
  <path d="M260 460 Q280 440 310 450 Q340 460 350 500 Q360 560 340 620 Q320 660 290 660 Q260 650 240 610 Q220 560 230 510 Z" fill="#14B8A6" opacity="0.65"/>
  <!-- Europe -->
  <path d="M460 240 Q490 220 530 230 Q560 240 570 270 Q575 300 560 320 Q540 330 510 325 Q480 315 465 290 Z" fill="#2DD4BF" opacity="0.75"/>
  <!-- Africa -->
  <path d="M470 360 Q490 340 520 340 Q550 345 565 370 Q575 410 570 470 Q565 530 540 570 Q510 590 480 580 Q450 565 445 530 Q438 470 445 420 Z" fill="#14B8A6" opacity="0.6"/>
  <!-- Asia -->
  <path d="M570 240 Q620 220 700 230 Q760 240 800 270 Q840 300 830 350 Q820 390 770 410 Q720 420 670 410 Q620 395 590 370 Q565 340 570 300 Z" fill="#0D9488" opacity="0.8"/>
  <!-- Australia -->
  <path d="M730 550 Q760 530 800 540 Q840 550 850 580 Q855 610 840 640 Q820 660 790 660 Q760 655 740 630 Q720 600 720 575 Z" fill="#2DD4BF" opacity="0.6"/>
  <!-- Layer 3: Location pins -->
  <!-- Seoul pin -->
  <line x1="730" y1="300" x2="730" y2="340" stroke="#EF4444" stroke-width="4"/>
  <circle cx="730" cy="295" r="12" fill="#EF4444"/>
  <circle cx="730" cy="295" r="6" fill="white"/>
  <text x="750" y="298" font-family="Arial,sans-serif" font-size="14" fill="#CCFBF1">서울</text>
  <!-- Washington DC pin -->
  <line x1="230" y1="310" x2="230" y2="350" stroke="#FDE68A" stroke-width="4"/>
  <circle cx="230" cy="305" r="12" fill="#FDE68A"/>
  <circle cx="230" cy="305" r="6" fill="white"/>
  <!-- Paris pin -->
  <line x1="500" y1="266" x2="500" y2="296" stroke="#F9A8D4" stroke-width="4"/>
  <circle cx="500" cy="261" r="12" fill="#F9A8D4"/>
  <circle cx="500" cy="261" r="6" fill="white"/>
  <!-- Sydney pin -->
  <line x1="790" y1="600" x2="790" y2="630" stroke="#86EFAC" stroke-width="4"/>
  <circle cx="790" cy="595" r="12" fill="#86EFAC"/>
  <circle cx="790" cy="595" r="6" fill="white"/>
  <!-- Quiz question overlay -->
  <rect x="180" y="760" width="664" height="80" rx="16" fill="#0F3D38"/>
  <text x="512" y="808" font-family="Arial,sans-serif" font-size="22" fill="#CCFBF1" text-anchor="middle">대한민국의 수도는?</text>
</svg>
