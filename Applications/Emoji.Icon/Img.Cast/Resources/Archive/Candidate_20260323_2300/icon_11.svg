    <!-- 창 버튼들 -->
    <circle cx="780" cy="214" r="10" fill="#EF4444"/>
    <circle cx="820" cy="214" r="10" fill="#F59E0B"/>
    <circle cx="860" cy="214" r="10" fill="#22C55E"/>
    <!-- 파일 항목들 -->
    <rect x="150" y="258" width="720" height="66" rx="8" fill="#FDE68A" opacity="0.15"/>
