<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120000"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 쓰나미 파도 (거대한 곡선) -->
  <!-- 파도 1 (뒤) -->
  <path d="M 60,350 Q 150,260 220,300 Q 290,340 350,250 Q 400,180 456,200 L 456,450 L 60,450 Z" fill="#7F1D1D" opacity="0.5"/>
  <!-- 파도 2 (중간) -->
  <path d="M 60,320 Q 120,230 190,275 Q 260,320 330,220 Q 390,150 456,180 L 456,450 L 60,450 Z" fill="#DC2626" opacity="0.55" filter="url(#glow)"/>
  <!-- 파도 3 (앞, 메인) -->
  <path d="M 60,290 Q 100,180 170,240 Q 240,300 310,190 Q 380,110 456,155 L 456,450 L 60,450 Z" fill="url(#waveGrad)" opacity="0.75" filter="url(#waveGlow)"/>
  <!-- 파도 크레스트 (흰 거품) -->
  <path d="M 60,290 Q 100,180 170,240 Q 240,300 310,190 Q 380,110 456,155" fill="none" stroke="#FCA5A5" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <!-- 파도 내 하이라이트 -->
  <path d="M 60,310 Q 100,210 165,258 Q 230,306 302,210 Q 370,130 456,168" fill="none" stroke="#FEE2E2" stroke-width="1.5" opacity="0.5"/>
  <!-- 날아가는 폴더들 (파도에 휩쓸림) -->
  <g transform="translate(300,118) rotate(-25)">
    <polygon points="0,0 38,0 48,11 48,58 0,58" fill="#EF4444" opacity="0.8"/>
    <polygon points="0,0 28,0 28,-12 48,0" fill="#DC2626" opacity="0.72"/>
  </g>
  <g transform="translate(380,115) rotate(20)">
    <polygon points="0,0 32,0 40,9 40,50 0,50" fill="#F87171" opacity="0.75"/>
    <polygon points="0,0 24,0 24,-10 40,0" fill="#EF4444" opacity="0.68"/>
  </g>
  <g transform="translate(140,200) rotate(-15)">
    <polygon points="0,0 36,0 44,10 44,55 0,55" fill="#DC2626" opacity="0.78"/>
    <polygon points="0,0 28,0 28,-12 44,0" fill="#991B1B" opacity="0.7"/>
  </g>
  <!-- 거품 파티클들 -->
  <circle cx="110" cy="278" r="7" fill="#FCA5A5" opacity="0.6" filter="url(#glow)"/>
  <circle cx="180" cy="234" r="5" fill="#F87171" opacity="0.55"/>
  <circle cx="250" cy="295" r="6" fill="#FCA5A5" opacity="0.6"/>
  <circle cx="340" cy="185" r="5" fill="#F87171" opacity="0.55" filter="url(#glow)"/>
  <circle cx="420" cy="148" r="7" fill="#FEE2E2" opacity="0.5" filter="url(#glow)"/>
  <!-- 물 튀기기 효과 -->
  <path d="M 100,280 L 90,260 M 100,280 L 115,265 M 100,280 L 92,255" stroke="#FCA5A5" stroke-width="1.5" opacity="0.5"/>
  <path d="M 420,152 L 408,132 M 420,152 L 435,138 M 420,152 L 412,128" stroke="#FEE2E2" stroke-width="1.5" opacity="0.5"/>
</svg>