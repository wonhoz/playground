<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A001A"/>
      <stop offset="100%" stop-color="#2D002D"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#FF79C6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lightning bolt (flick speed) -->
  <path d="M 290 90 L 210 270 L 258 270 L 222 420 L 330 220 L 276 220 Z" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Mouse silhouette outline -->
  <path d="M 120 260 Q 120 180 180 180 Q 240 180 240 260 L 240 360 Q 240 400 180 400 Q 120 400 120 360 Z" fill="none" stroke="#FF79C6" stroke-width="3" opacity="0.5"/>
  <rect x="168" y="196" width="24" height="52" rx="12" fill="#FF79C6" opacity="0.4"/>
  <line x1="180" y1="180" x2="180" y2="248" stroke="#FF79C6" stroke-width="2" opacity="0.4"/>
  <!-- Speed sparks -->
  <circle cx="340" cy="160" r="6" fill="#FF79C6" opacity="0.7"/>
  <circle cx="370" cy="200" r="4" fill="#FF006E" opacity="0.6"/>
  <circle cx="390" cy="250" r="5" fill="#FF79C6" opacity="0.5"/>
  <circle cx="380" cy="300" r="4" fill="#FF006E" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="455" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FF79C6" filter="url(#glow)">MOUSE.FLICK</text>
</svg>