<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#0f2535"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4060" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a2030" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hex grid background -->
  <g opacity="0.2" stroke="#00aaff" stroke-width="1" fill="none">
    <polygon points="256,80 290,100 290,140 256,160 222,140 222,100"/>
    <polygon points="316,140 350,160 350,200 316,220 282,200 282,160"/>
    <polygon points="196,140 230,160 230,200 196,220 162,200 162,160"/>
    <polygon points="256,200 290,220 290,260 256,280 222,260 222,220"/>
    <polygon points="316,260 350,280 350,320 316,340 282,320 282,280"/>
    <polygon points="196,260 230,280 230,320 196,340 162,320 162,280"/>
    <polygon points="256,320 290,340 290,380 256,400 222,380 222,340"/>
  </g>
  <!-- Magnifier circle -->
  <circle cx="220" cy="220" r="120" fill="url(#lens)" stroke="#00aaff" stroke-width="5"/>
  <!-- Trace line inside -->
  <polyline points="130,220 160,200 190,240 220,210 250,230 280,190 310,220" fill="none" stroke="#00ffcc" stroke-width="3" clip-path="url(#clip1)"/>
  <!-- Handle -->
  <line x1="318" y1="318" x2="400" y2="400" stroke="#00aaff" stroke-width="14" stroke-linecap="round"/>
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#00aaff">NET.TRACE</text>
</svg>
