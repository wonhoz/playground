<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background bright red -->
  <rect width="1024" height="1024" rx="190" fill="#FFEBEE"/>
  <!-- Layer 2: Checklist with delete items -->
  <rect x="130" y="160" width="764" height="680" rx="24" fill="#FFFFFF" opacity="0.97"/>
  <rect x="130" y="160" width="764" height="96" rx="24" fill="#C62828"/>
  <text x="512" y="224" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">Folder Purge</text>
  <!-- List items with checkboxes -->
  <!-- Item 1: Empty folder checked -->
  <rect x="170" y="300" width="684" height="90" rx="14" fill="#FFEBEE"/>
  <rect x="188" y="318" width="54" height="54" rx="10" fill="#E53935"/>
  <path d="M198 345 L210 357 L232 333" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="280" y="352" font-family="Arial, sans-serif" font-size="40" fill="#B71C1C">빈 폴더</text>
  <text x="800" y="352" font-family="Arial Black, sans-serif" font-size="36" fill="#E53935" text-anchor="middle">12개</text>
  <!-- Item 2: VS Artifacts checked -->
  <rect x="170" y="414" width="684" height="90" rx="14" fill="#FFEBEE"/>
  <rect x="188" y="432" width="54" height="54" rx="10" fill="#E53935"/>
  <path d="M198 459 L210 471 L232 447" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="280" y="466" font-family="Arial, sans-serif" font-size="38" fill="#B71C1C">VS 아티팩트</text>
  <text x="800" y="466" font-family="Arial Black, sans-serif" font-size="36" fill="#E53935" text-anchor="middle">28개</text>
  <!-- Item 3: Empty files checked -->
  <rect x="170" y="528" width="684" height="90" rx="14" fill="#FFEBEE"/>
  <rect x="188" y="546" width="54" height="54" rx="10" fill="#E53935"/>
  <path d="M198 573 L210 585 L232 561" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="280" y="580" font-family="Arial, sans-serif" font-size="38" fill="#B71C1C">빈 파일</text>
  <text x="800" y="580" font-family="Arial Black, sans-serif" font-size="36" fill="#E53935" text-anchor="middle">7개</text>
  <!-- Item 4: Pattern files -->
  <rect x="170" y="642" width="684" height="90" rx="14" fill="#FFEBEE"/>
  <rect x="188" y="660" width="54" height="54" rx="10" fill="#FF7043"/>
  <path d="M198 687 L210 699 L232 675" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="280" y="694" font-family="Arial, sans-serif" font-size="38" fill="#BF360C">패턴 파일 (*.log)</text>
  <text x="800" y="694" font-family="Arial Black, sans-serif" font-size="36" fill="#FF7043" text-anchor="middle">5개</text>
  <!-- Layer 3: Total badge -->
  <rect x="200" y="790" width="624" height="80" rx="16" fill="#C62828"/>
  <text x="512" y="843" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">총 52개 · 1.2 GB 해방</text>
</svg>
