  <line x1="244" y1="215" x2="254" y2="215" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
  <line x1="179" y1="184" x2="186" y2="191" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
