<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 밝은 하늘색 -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="imgInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect x="80" y="80" width="864" height="864" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: 이미지 프레임 (작은 것 → 큰 것) -->
  <!-- 작은 이미지 (좌하단) -->
  <rect x="130" y="570" width="230" height="180" rx="20" fill="white" opacity="0.9"/>
  <rect x="145" y="585" width="200" height="150" rx="12" fill="#B3E5FC"/>
  <!-- 작은 이미지 안 픽셀들 -->
  <rect x="150" y="590" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="198" y="590" width="45" height="45" rx="4" fill="#26C6DA"/>
  <rect x="246" y="590" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="294" y="590" width="45" height="45" rx="4" fill="#26C6DA"/>
  <rect x="150" y="638" width="45" height="45" rx="4" fill="#26C6DA"/>
  <rect x="198" y="638" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="246" y="638" width="45" height="45" rx="4" fill="#26C6DA"/>
  <rect x="294" y="638" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="150" y="686" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="198" y="686" width="45" height="45" rx="4" fill="#26C6DA"/>
  <rect x="246" y="686" width="45" height="45" rx="4" fill="#0288D1"/>
  <rect x="294" y="686" width="45" height="45" rx="4" fill="#26C6DA"/>

  <!-- 화살표 -->
  <path d="M380 660 Q440 580 490 530" stroke="#F57F17" stroke-width="16" fill="none" stroke-linecap="round"/>
  <polygon points="478,510 510,540 490,558" fill="#F57F17"/>

  <!-- 큰 이미지 프레임 -->
  <rect x="470" y="140" width="390" height="480" rx="28" fill="white" opacity="0.95"/>
  <rect x="492" y="162" width="346" height="436" rx="18" fill="url(#imgInner)"/>
  <!-- 선명한 이미지 안 내용 — 풍경 -->
  <rect x="492" y="452" width="346" height="146" rx="0" fill="#A5D6A7"/>
  <!-- 하늘 -->
  <rect x="492" y="162" width="346" height="290" rx="18" fill="#B3E5FC"/>
  <!-- 구름 -->
  <ellipse cx="590" cy="240" rx="55" ry="35" fill="white" opacity="0.9"/>
  <ellipse cx="630" cy="228" rx="45" ry="30" fill="white" opacity="0.88"/>
  <ellipse cx="680" cy="250" rx="50" ry="32" fill="white" opacity="0.85"/>
  <!-- 산 -->
  <polygon points="492,530 580,290 668,530" fill="#2E7D32"/>
  <polygon points="550,530 640,320 730,530" fill="#388E3C"/>
  <polygon points="600,530 690,350 780,530" fill="#43A047"/>
  <polygon points="598,355 640,320 680,355" fill="white"/>
  <!-- 태양 -->
  <circle cx="760" cy="220" r="42" fill="#FFD54F"/>

  <!-- Layer 3: "4×" 핵심 텍스트 배지 -->
  <rect x="130" y="140" width="290" height="160" rx="30" fill="#FF6F00" opacity="0.97"/>
  <text x="275" y="258" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="white">4×</text>

  <!-- 코너 뱃지 — "AI" -->
  <circle cx="895" cy="855" r="65" fill="#7C4DFF" opacity="0.95"/>
  <text x="895" y="875" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white">AI</text>
</svg>
