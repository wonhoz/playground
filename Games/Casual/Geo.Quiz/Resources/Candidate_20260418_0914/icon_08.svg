<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 트라이컬러 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <g clip-path="url(#clip08)">
    <!-- Layer 2: 세 가지 퀴즈 모드 카드 (레이어드) -->
    <!-- 수도 모드 카드 (좌, 뒤) -->
    <rect x="90" y="260" width="380" height="360" rx="28" fill="#3949AB" transform="rotate(-8 280 440)"/>
    <text x="210" y="370" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 210 370)">수도</text>
    <text x="210" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle" transform="rotate(-8 210 450)">🏛️</text>
    <text x="210" y="540" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#C5CAE9" text-anchor="middle" transform="rotate(-8 210 540)">CAPITAL</text>

    <!-- 대륙 모드 카드 (우, 뒤) -->
    <rect x="554" y="260" width="380" height="360" rx="28" fill="#2E7D32" transform="rotate(8 744 440)"/>
    <text x="814" y="370" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle" transform="rotate(8 814 370)">대륙</text>
    <text x="814" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle" transform="rotate(8 814 450)">🌍</text>
    <text x="814" y="540" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#C8E6C9" text-anchor="middle" transform="rotate(8 814 540)">CONTINENT</text>

    <!-- 국기 모드 카드 (중앙, 앞) -->
    <rect x="292" y="220" width="440" height="420" rx="32" fill="#B71C1C"/>
    <text x="512" y="350" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">국기</text>
    <text x="512" y="470" font-family="'Segoe UI',Arial,sans-serif" font-size="120" text-anchor="middle">🏳️</text>
    <text x="512" y="580" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="48" fill="#FFCDD2" text-anchor="middle">FLAG</text>

    <!-- Layer 3: 하단 퀴즈 UI 힌트 -->
    <!-- 큰 물음표 배지 -->
    <circle cx="512" cy="840" r="100" fill="#FF6F00"/>
    <text x="512" y="900" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">?</text>

    <!-- 좌우 포인트 텍스트 -->
    <text x="230" y="870" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="68" fill="#3949AB" text-anchor="middle">A</text>
    <text x="794" y="870" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="68" fill="#2E7D32" text-anchor="middle">B+</text>

    <!-- 상단 타이틀 -->
    <rect x="276" y="130" width="472" height="72" rx="20" fill="#FF6F00"/>
    <text x="512" y="184" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">GEO QUIZ</text>
  </g>
</svg>
