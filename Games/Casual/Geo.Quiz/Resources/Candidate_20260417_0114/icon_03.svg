<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Layer 2: Quiz card -->
  <rect x="148" y="148" width="728" height="728" rx="28" fill="white" stroke="#A5D6A7" stroke-width="8"/>

  <!-- Question area — flag display -->
  <rect x="180" y="178" width="664" height="260" rx="18" fill="#388E3C"/>
  <!-- Japanese-style flag in question area -->
  <rect x="180" y="178" width="664" height="260" rx="18" fill="#FAFAFA"/>
  <circle cx="512" cy="308" r="90" fill="#D32F2F"/>
  <!-- Flag label -->
  <text x="512" y="200" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#388E3C" text-anchor="middle">이 국기의 나라는?</text>

  <!-- 4-choice buttons -->
  <!-- Button A (correct — green highlight) -->
  <rect x="180" y="462" width="300" height="90" rx="16" fill="#2E7D32"/>
  <text x="330" y="517" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">A. 일본</text>

  <!-- Button B -->
  <rect x="500" y="462" width="344" height="90" rx="16" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="6"/>
  <text x="672" y="517" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#388E3C" text-anchor="middle">B. 중국</text>

  <!-- Button C -->
  <rect x="180" y="572" width="300" height="90" rx="16" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="6"/>
  <text x="330" y="627" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#388E3C" text-anchor="middle">C. 한국</text>

  <!-- Button D (wrong — red highlight) -->
  <rect x="500" y="572" width="344" height="90" rx="16" fill="#B71C1C"/>
  <text x="672" y="627" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">D. 베트남</text>

  <!-- Streak indicator -->
  <rect x="180" y="688" width="664" height="72" rx="14" fill="#FF8F00" opacity="0.9"/>
  <text x="512" y="737" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">🔥 3연속 정답!</text>

  <!-- Layer 3: Timer arc at top -->
  <rect x="412" y="158" width="200" height="56" rx="28" fill="#FF8F00"/>
  <text x="512" y="197" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle">⏱ 15초</text>
</svg>
