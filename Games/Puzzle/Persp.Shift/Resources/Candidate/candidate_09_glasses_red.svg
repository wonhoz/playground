<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0000"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="cyan_lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="red_lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D50000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3D glasses (anaglyph style) -->
  <!-- Frame -->
  <rect x="80" y="196" width="148" height="108" rx="20" fill="url(#red)" opacity="0.15" stroke="#F44336" stroke-width="4"/>
  <rect x="284" y="196" width="148" height="108" rx="20" fill="url(#red)" opacity="0.15" stroke="#F44336" stroke-width="4"/>
  <!-- Lenses -->
  <rect x="88" y="204" width="132" height="92" rx="14" fill="url(#cyan_lens)"/>
  <rect x="292" y="204" width="132" height="92" rx="14" fill="url(#red_lens)"/>
  <!-- Bridge -->
  <line x1="228" y1="246" x2="284" y2="246" stroke="#F44336" stroke-width="5" stroke-linecap="round"/>
  <!-- Temple arms -->
  <path d="M80 250 L56 240" stroke="#F44336" stroke-width="5" stroke-linecap="round"/>
  <path d="M432 250 L456 240" stroke="#F44336" stroke-width="5" stroke-linecap="round"/>
  <!-- Cyan eye text (left lens) -->
  <text x="154" y="255" text-anchor="middle" font-family="Consolas" font-size="22" fill="#00E5FF" font-weight="bold">3D</text>
  <!-- Red eye text (right lens) offset for anaglyph -->
  <text x="358" y="255" text-anchor="middle" font-family="Consolas" font-size="22" fill="#FF4444" font-weight="bold">3D</text>
  <!-- Shifted perspective below glasses -->
  <!-- Left view (cyan tint) -->
  <polygon points="80,340 180,310 180,390 80,420" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.5"/>
  <rect x="96" y="324" width="70" height="5" rx="2" fill="#00E5FF" opacity="0.4"/>
  <rect x="96" y="338" width="50" height="5" rx="2" fill="#00E5FF" opacity="0.4"/>
  <rect x="96" y="352" width="65" height="5" rx="2" fill="#00E5FF" opacity="0.4"/>
  <!-- Right view (red tint) offset -->
  <polygon points="332,340 432,310 432,390 332,420" fill="none" stroke="#FF4444" stroke-width="2" opacity="0.5"/>
  <rect x="348" y="320" width="70" height="5" rx="2" fill="#FF4444" opacity="0.4"/>
  <rect x="348" y="334" width="50" height="5" rx="2" fill="#FF4444" opacity="0.4"/>
  <rect x="348" y="348" width="65" height="5" rx="2" fill="#FF4444" opacity="0.4"/>
</svg>