<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#00695C" stroke-width="16"/>

  <!-- Calendar header -->
  <rect x="108" y="148" width="808" height="80" rx="20" fill="#00695C" stroke="#004D40" stroke-width="12"/>
  <text x="512" y="202" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">APRIL 2026</text>

  <!-- Calendar ring pins -->
  <circle cx="280" cy="148" r="20" fill="#004D40" stroke="#002B25" stroke-width="8"/>
  <circle cx="744" cy="148" r="20" fill="#004D40" stroke="#002B25" stroke-width="8"/>

  <!-- Big date number -->
  <text x="512" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="220" fill="#06D6A0" text-anchor="middle">14</text>

  <!-- 10 question dots (7 filled green = done, 3 grey = remaining) -->
  <circle cx="248" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="316" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="384" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="452" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="520" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="588" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="656" cy="578" r="22" fill="#06D6A0" stroke="#004D40" stroke-width="8"/>
  <circle cx="724" cy="578" r="22" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="8"/>
  <circle cx="792" cy="578" r="22" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="8"/>
  <circle cx="860" cy="578" r="22" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="8"/>

  <!-- DAILY badge -->
  <rect x="248" y="752" width="528" height="116" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#06D6A0" text-anchor="middle">DAILY</text>
</svg>
