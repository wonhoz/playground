  <text x="270" y="560" font-family="Arial,sans-serif" font-size="18" fill="#93C5FD" text-anchor="middle">물</text>
  <text x="760" y="560" font-family="Arial,sans-serif" font-size="18" fill="#F97316" text-anchor="middle">불</text>
