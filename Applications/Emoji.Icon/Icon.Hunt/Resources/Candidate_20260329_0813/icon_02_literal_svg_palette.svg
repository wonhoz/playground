<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 그린 그라디언트 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F3D2B"/>
      <stop offset="100%" stop-color="#1B6B45"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E5A3C"/>
      <stop offset="100%" stop-color="#0D2B1E"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg2)"/>

  <!-- 메인 카드 (SVG 코드 에디터 느낌) -->
  <rect x="112" y="140" width="680" height="520" rx="28" fill="url(#cardGrad)" stroke="#39D353" stroke-width="10"/>

  <!-- 코드 에디터 상단 타이틀바 -->
  <rect x="112" y="140" width="680" height="68" rx="28" fill="#0D2B1E"/>
  <rect x="112" y="180" width="680" height="28" fill="#0D2B1E"/>
  <!-- 닫기 버튼들 -->
  <circle cx="162" cy="174" r="16" fill="#FF5F57"/>
  <circle cx="214" cy="174" r="16" fill="#FFBD2E"/>
  <circle cx="266" cy="174" r="16" fill="#28CA41"/>

  <!-- 파일명 -->
  <text x="390" y="184" font-family="monospace" font-size="44" fill="#39D353" fill-opacity="0.8" text-anchor="middle">icon.svg</text>

  <!-- SVG 코드 라인들 -->
  <text x="148" y="278" font-family="monospace" font-size="38" fill="#7DCFFF">&lt;svg</text>
  <text x="230" y="278" font-family="monospace" font-size="38" fill="#A6E22E"> viewBox=</text>
  <text x="510" y="278" font-family="monospace" font-size="38" fill="#E6DB74">"0 0 24 24"</text>
  <text x="148" y="336" font-family="monospace" font-size="38" fill="#7DCFFF">  &lt;path</text>
  <text x="148" y="394" font-family="monospace" font-size="38" fill="#E6DB74">    d=</text>
  <text x="256" y="394" font-family="monospace" font-size="38" fill="#E6DB74">"M12 2L..."</text>
  <text x="148" y="452" font-family="monospace" font-size="38" fill="#A6E22E">    fill=</text>
  <text x="356" y="452" font-family="monospace" font-size="38" fill="#FF6B9D">"currentColor"</text>
  <text x="148" y="510" font-family="monospace" font-size="38" fill="#7DCFFF">  /&gt;</text>
  <text x="148" y="568" font-family="monospace" font-size="38" fill="#7DCFFF">&lt;/svg&gt;</text>

  <!-- 가로 구분선 -->
  <line x1="112" y1="620" x2="792" y2="620" stroke="#39D353" stroke-width="6" stroke-opacity="0.4"/>

  <!-- 색상 팔레트 스와치 (하단) -->
  <rect x="112" y="620" width="680" height="160" rx="0" fill="#0A2018"/>
  <rect x="112" y="660" width="680" height="120" rx="28" fill="#0A2018"/>

  <!-- 스와치 원들 -->
  <circle cx="202" cy="700" r="36" fill="#FF6B9D" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="306" cy="700" r="36" fill="#F5D020" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="410" cy="700" r="36" fill="#26D0CE" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="514" cy="700" r="36" fill="#7B61FF" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="618" cy="700" r="36" fill="#FF8C42" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="722" cy="700" r="36" fill="#39D353" stroke="#FFFFFF" stroke-width="8"/>

  <!-- 활성 스와치 표시 (체크마크) -->
  <path d="M388 693 L403 708 L432 679" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 우하단 SVG 아이콘 (실제 아이콘 미리보기) -->
  <rect x="810" y="400" width="164" height="164" rx="20" fill="#1B6B45" stroke="#39D353" stroke-width="8"/>
  <!-- 별 모양 아이콘 -->
  <polygon points="892,422 906,462 948,462 916,486 928,526 892,502 856,526 868,486 836,462 878,462"
           fill="#F5D020" stroke="none"/>

  <!-- 우상단 "SVG" 텍스트 태그 -->
  <rect x="810" y="160" width="164" height="220" rx="20" fill="#39D353"/>
  <text x="892" y="242" font-family="monospace" font-size="62" fill="#0D2B1E" text-anchor="middle" font-weight="bold">SVG</text>
  <!-- 태그 삼각형 귀퉁이 -->
  <polygon points="810,270 892,340 974,270" fill="#28A245"/>
</svg>
