  <circle cx="600" cy="180" r="4" fill="#FFDD00" opacity="0.5" filter="url(#spark)"/>
  <circle cx="860" cy="260" r="6" fill="#FF7700" opacity="0.6" filter="url(#spark)"/>

  <!-- 망치 (상단 우측 대각선) -->
