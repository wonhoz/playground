<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ed573"/>
      <stop offset="100%" style="stop-color:#7bed9f"/>
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#74b9ff"/>
    </linearGradient>
    <linearGradient id="flow4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffa502"/>
      <stop offset="100%" style="stop-color:#eccc68"/>
    </linearGradient>
    <linearGradient id="flow5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#fd79a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid dots -->
  <circle cx="100" cy="100" r="10" fill="#ff4757" filter="url(#glow)"/>
  <circle cx="412" cy="100" r="10" fill="#ff4757" filter="url(#glow)"/>
  <circle cx="100" cy="200" r="10" fill="#2ed573" filter="url(#glow)"/>
  <circle cx="412" cy="200" r="10" fill="#2ed573" filter="url(#glow)"/>
  <circle cx="100" cy="300" r="10" fill="#1e90ff" filter="url(#glow)"/>
  <circle cx="412" cy="300" r="10" fill="#1e90ff" filter="url(#glow)"/>
  <circle cx="100" cy="400" r="10" fill="#ffa502" filter="url(#glow)"/>
  <circle cx="412" cy="400" r="10" fill="#ffa502" filter="url(#glow)"/>
  <!-- Flow lines connecting dots -->
  <path d="M110,100 Q200,100 200,200 Q200,300 300,300 Q400,300 402,100" stroke="url(#flow1)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M110,200 Q150,200 150,300 Q150,400 402,400" stroke="url(#flow4)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M110,300 Q250,300 250,150 Q250,100 350,100 Q380,100 402,200" stroke="url(#flow2)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Grid background lines -->
  <line x1="100" y1="80" x2="100" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="200" y1="80" x2="200" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="300" y1="80" x2="300" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="412" y1="80" x2="412" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="80" y1="100" x2="432" y2="100" stroke="#ffffff08" stroke-width="1"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="#ffffff08" stroke-width="1"/>
  <line x1="80" y1="300" x2="432" y2="300" stroke="#ffffff08" stroke-width="1"/>
  <line x1="80" y1="400" x2="432" y2="400" stroke="#ffffff08" stroke-width="1"/>
</svg>
