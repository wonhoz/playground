<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg19" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <linearGradient id="handle19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg19)"/>
  <!-- Layer 2: Swiss Army Knife body -->
  <!-- Knife body (main red casing) -->
  <rect x="200" y="420" width="624" height="180" rx="50" fill="#D32F2F"/>
  <rect x="200" y="420" width="624" height="180" rx="50" fill="none" stroke="#B71C1C" stroke-width="8"/>
  <!-- Cross emblem on knife -->
  <rect x="478" y="460" width="68" height="100" rx="6" fill="white"/>
  <rect x="450" y="488" width="124" height="44" rx="6" fill="white"/>
  <!-- Tools deployed from knife (format conversion tools) -->
  <!-- Tool 1: SVG blade (top-left) -->
  <rect x="170" y="200" width="160" height="240" rx="14" fill="url(#handle19)"/>
  <rect x="170" y="200" width="160" height="180" rx="14" fill="#78909C"/>
  <text x="184" y="290" font-family="'Segoe UI',Arial,sans-serif" font-size="62" font-weight="800" fill="white">SVG</text>
  <!-- Tool 2: PNG blade (top-right) -->
  <rect x="694" y="190" width="160" height="250" rx="14" fill="url(#handle19)"/>
  <rect x="694" y="190" width="160" height="190" rx="14" fill="#546E7A"/>
  <text x="706" y="282" font-family="'Segoe UI',Arial,sans-serif" font-size="62" font-weight="800" fill="white">PNG</text>
  <!-- Tool 3: ICO blade (bottom) -->
  <rect x="420" y="578" width="184" height="240" rx="14" fill="url(#handle19)"/>
  <rect x="420" y="636" width="184" height="182" rx="14" fill="#607D8B"/>
  <text x="440" y="770" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="white">ICO</text>
  <!-- Layer 3: Pivot screw -->
  <circle cx="512" cy="510" r="22" fill="#455A64"/>
  <circle cx="512" cy="510" r="10" fill="#B0BEC5"/>
  <!-- Small bolt indicators -->
  <circle cx="270" cy="510" r="12" fill="#B71C1C"/>
  <circle cx="754" cy="510" r="12" fill="#B71C1C"/>
</svg>
