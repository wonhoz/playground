<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2833"/>
      <stop offset="100%" stop-color="#2E4057"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#44A08D"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A18CD1"/>
      <stop offset="100%" stop-color="#FBC2EB"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Layer bars -->
  <rect x="80" y="96" width="352" height="62" rx="10" fill="url(#layer1)" opacity="0.9"/>
  <rect x="80" y="182" width="352" height="62" rx="10" fill="url(#layer2)" opacity="0.9"/>
  <rect x="80" y="268" width="352" height="62" rx="10" fill="url(#layer3)" opacity="0.9"/>
  <rect x="80" y="354" width="352" height="62" rx="10" fill="url(#layer4)" opacity="0.9"/>
  <!-- Layer labels -->
  <text x="256" y="134" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="20" font-weight="bold" fill="white">Presentation Layer</text>
  <text x="256" y="220" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="20" font-weight="bold" fill="white">Application Layer</text>
  <text x="256" y="306" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="20" font-weight="bold" fill="white">Domain Layer</text>
  <text x="256" y="392" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="20" font-weight="bold" fill="#1C2833">Infrastructure</text>
  <!-- Dependency arrows (downward only, one-way) -->
  <line x1="256" y1="158" x2="256" y2="178" stroke="white" stroke-width="4" marker-end="url(#arr)" stroke-linecap="round"/>
  <line x1="256" y1="244" x2="256" y2="264" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="330" x2="256" y2="350" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <polygon points="256,178 248,162 264,162" fill="white"/>
  <polygon points="256,264 248,248 264,248" fill="white"/>
  <polygon points="256,350 248,334 264,334" fill="white"/>
  <!-- Side modules -->
  <rect x="432" y="100" width="56" height="24" rx="6" fill="#FF6B6B" opacity="0.6"/>
  <text x="460" y="116" text-anchor="middle" font-family="monospace" font-size="10" fill="white">View</text>
  <rect x="432" y="186" width="56" height="24" rx="6" fill="#4ECDC4" opacity="0.6"/>
  <text x="460" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Svc</text>
  <rect x="432" y="272" width="56" height="24" rx="6" fill="#A18CD1" opacity="0.6"/>
  <text x="460" y="288" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Ent</text>
  <rect x="432" y="358" width="56" height="24" rx="6" fill="#FDD835" opacity="0.6"/>
  <text x="460" y="374" text-anchor="middle" font-family="monospace" font-size="10" fill="#1C2833">Repo</text>
</svg>
