  <line x1="274" y1="200" x2="314" y2="200" stroke="#00E676" stroke-width="3"/>
  <!-- Path labels -->
  <rect x="158" y="226" width="40" height="16" rx="3" fill="#007B2E" opacity="0.7"/>
