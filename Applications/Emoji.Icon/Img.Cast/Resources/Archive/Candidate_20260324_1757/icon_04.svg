<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ic04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <clipPath id="c_ic04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Teal background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_ic04)"/>
  <g clip-path="url(#c_ic04)">
    <!-- Layer 2: Large drag-and-drop arrow (pointing down) -->
    <!-- Arrow shaft -->
    <rect x="452" y="120" width="120" height="480" rx="40" fill="#5EEAD4"/>
    <!-- Arrow head -->
    <polygon points="252,580 512,820 772,580" fill="#2DD4BF"/>
    <!-- Layer 3: File type badges around arrow -->
    <!-- SVG badge top-left -->
    <rect x="100" y="120" width="200" height="100" rx="24" fill="#6EE7B7"/>
    <text x="200" y="188" font-family="Arial Black" font-size="60" font-weight="900" fill="#064E3B" text-anchor="middle">SVG</text>
    <!-- PNG badge top-right -->
    <rect x="724" y="120" width="200" height="100" rx="24" fill="#A7F3D0"/>
    <text x="824" y="188" font-family="Arial Black" font-size="60" font-weight="900" fill="#065F46" text-anchor="middle">PNG</text>
    <!-- ICO badge middle-left -->
    <rect x="60" y="460" width="200" height="100" rx="24" fill="#F9A8D4"/>
    <text x="160" y="528" font-family="Arial Black" font-size="60" font-weight="900" fill="#9D174D" text-anchor="middle">ICO</text>
    <!-- JPG badge middle-right -->
    <rect x="764" y="460" width="200" height="100" rx="24" fill="#FDE68A"/>
    <text x="864" y="528" font-family="Arial Black" font-size="60" font-weight="900" fill="#78350F" text-anchor="middle">JPG</text>
    <!-- BMP badge bottom -->
    <rect x="412" y="880" width="200" height="100" rx="24" fill="#E9D5FF"/>
    <text x="512" y="948" font-family="Arial Black" font-size="60" font-weight="900" fill="#6B21A8" text-anchor="middle">BMP</text>
    <!-- Connecting lines from badges to arrow -->
    <line x1="300" y1="170" x2="452" y2="360" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round" stroke-dasharray="20 14" opacity="0.6"/>
    <line x1="724" y1="170" x2="572" y2="360" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round" stroke-dasharray="20 14" opacity="0.6"/>
    <line x1="260" y1="510" x2="452" y2="510" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round" stroke-dasharray="20 14" opacity="0.6"/>
    <line x1="764" y1="510" x2="572" y2="510" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round" stroke-dasharray="20 14" opacity="0.6"/>
  </g>
</svg>
