<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="gear09" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg09cf)"/>

  <!-- Layer 2: Gear mechanism -->
  <!-- Large gear (input side) -->
  <path d="M320 380 m-180 0 a180 180 0 1 0 360 0 a180 180 0 1 0 -360 0" fill="url(#gear09)" opacity="0.9"/>
  <!-- Gear teeth (8 teeth) -->
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(0 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(45 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(90 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(135 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(180 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(225 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(270 320 380)"/>
  <rect x="302" y="162" width="36" height="60" rx="8" fill="url(#gear09)" transform="rotate(315 320 380)"/>
  <!-- Center hole -->
  <circle cx="320" cy="380" r="70" fill="#6A1B9A"/>
  <!-- Input text in gear -->
  <text x="320" y="395" font-family="'Courier New',monospace" font-size="60" font-weight="bold"
    fill="white" text-anchor="middle">abc</text>

  <!-- Small gear (output side) -->
  <path d="M704 480 m-120 0 a120 120 0 1 0 240 0 a120 120 0 1 0 -240 0" fill="#CE93D8" opacity="0.9"/>
  <!-- Gear teeth small (6 teeth) -->
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(0 704 480)"/>
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(60 704 480)"/>
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(120 704 480)"/>
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(180 704 480)"/>
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(240 704 480)"/>
  <rect x="689" y="328" width="30" height="50" rx="6" fill="#CE93D8" transform="rotate(300 704 480)"/>
  <!-- Center hole small -->
  <circle cx="704" cy="480" r="50" fill="#4A148C"/>
  <!-- Output text in small gear -->
  <text x="704" y="497" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="white" text-anchor="middle">ABC</text>

  <!-- Layer 3: Labels -->
  <text x="320" y="610" font-family="'Segoe UI',Arial,sans-serif" font-size="64" fill="white"
    text-anchor="middle" opacity="0.75">Input</text>
  <text x="704" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="white"
    text-anchor="middle" opacity="0.75">Output</text>

  <!-- Output cases floating -->
  <text x="512" y="790" font-family="'Courier New',monospace" font-size="68" font-weight="bold"
    fill="#FFF176" text-anchor="middle">CASE · FORGE</text>
  <text x="512" y="870" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="#CE93D8"
    text-anchor="middle" opacity="0.8">11 naming conventions</text>
</svg>
