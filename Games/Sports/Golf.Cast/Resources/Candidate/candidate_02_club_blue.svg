<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="clubgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90CAF9"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Golf club shaft -->
  <line x1="150" y1="100" x2="340" y2="380" stroke="url(#clubgrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Club head -->
  <ellipse cx="358" cy="400" rx="42" ry="22" fill="#42A5F5" stroke="#90CAF9" stroke-width="4" transform="rotate(-35,358,400)"/>
  <!-- Golf ball -->
  <circle cx="390" cy="440" r="36" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="3"/>
  <circle cx="381" cy="430" r="5" fill="#E0E0E0" opacity="0.6"/>
  <circle cx="398" cy="430" r="5" fill="#E0E0E0" opacity="0.6"/>
  <circle cx="390" cy="444" r="5" fill="#E0E0E0" opacity="0.6"/>
  <!-- Trajectory dots -->
  <circle cx="260" cy="280" r="5" fill="#FFD54F" opacity="0.7"/>
  <circle cx="230" cy="230" r="4" fill="#FFD54F" opacity="0.5"/>
  <circle cx="200" cy="185" r="3" fill="#FFD54F" opacity="0.3"/>
  <!-- Flag in distance -->
  <line x1="160" y1="185" x2="160" y2="310" stroke="#ECEFF1" stroke-width="4"/>
  <path d="M160,185 L210,205 L160,225Z" fill="#F44336"/>
  <ellipse cx="160" cy="315" rx="30" ry="8" fill="#388E3C"/>
  <!-- Course sky stars -->
  <circle cx="380" cy="100" r="3" fill="#FFD54F" opacity="0.7"/>
  <circle cx="420" cy="130" r="2" fill="#FFD54F" opacity="0.5"/>
  <circle cx="340" cy="80" r="2.5" fill="#FFD54F" opacity="0.6"/>
</svg>
