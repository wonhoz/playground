<!-- AI.Clip icon_01: 자석 텍스트 인력 (magnet attracting text/dots) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0520"/>
  <!-- Horseshoe magnet -->
  <path d="M300 280 L300 560 Q300 740 512 740 Q724 740 724 560 L724 280" fill="none" stroke="#9C27B0" stroke-width="72" stroke-linecap="round"/>
  <!-- Magnet poles -->
  <rect x="264" y="220" width="72" height="80" rx="12" fill="#7B1FA2"/>
  <rect x="688" y="220" width="72" height="80" rx="12" fill="#CE93D8"/>
  <!-- Attracted text dots (flying toward magnet) -->
  <circle cx="180" cy="480" r="22" fill="#CE93D8"/>
  <circle cx="158" cy="560" r="16" fill="#CE93D8"/>
  <circle cx="840" cy="480" r="22" fill="#CE93D8"/>
  <circle cx="862" cy="560" r="16" fill="#CE93D8"/>
  <circle cx="200" cy="400" r="14" fill="#9C27B0"/>
  <circle cx="820" cy="400" r="14" fill="#9C27B0"/>
</svg>
