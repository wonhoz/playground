<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Prism -->
  <polygon points="256,80 96,400 416,400" fill="none" stroke="#e0e0e0" stroke-width="5"/>
  <polygon points="256,80 96,400 416,400" fill="#1a1a2e" opacity="0.7"/>
  <!-- White beam entering -->
  <line x1="100" y1="120" x2="200" y2="230" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <!-- Dispersed color beams exiting (log levels) -->
  <line x1="200" y1="230" x2="100" y2="320" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="110" y2="350" stroke="#ff9100" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="80" y2="380" stroke="#ffd740" stroke-width="5" stroke-linecap="round"/>
  <!-- Log level labels -->
  <text x="64" y="316" font-family="monospace" font-size="16" fill="#ef5350">ERROR</text>
  <text x="64" y="346" font-family="monospace" font-size="16" fill="#ff9100">WARN</text>
  <text x="64" y="376" font-family="monospace" font-size="16" fill="#ffd740">DEBUG</text>
  <!-- Right side beams -->
  <line x1="200" y1="230" x2="320" y2="290" stroke="#4caf50" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="360" y2="310" stroke="#29b6f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="380" y2="350" stroke="#7c4dff" stroke-width="5" stroke-linecap="round"/>
  <text x="324" y="286" font-family="monospace" font-size="16" fill="#4caf50">INFO</text>
  <text x="364" y="306" font-family="monospace" font-size="16" fill="#29b6f6">DEBUG</text>
  <text x="382" y="346" font-family="monospace" font-size="16" fill="#7c4dff">TRACE</text>
  <!-- Lens circle -->
  <circle cx="150" cy="175" r="36" fill="none" stroke="#e0e0e0" stroke-width="4" opacity="0.7"/>
  <line x1="176" y1="201" x2="200" y2="230" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
