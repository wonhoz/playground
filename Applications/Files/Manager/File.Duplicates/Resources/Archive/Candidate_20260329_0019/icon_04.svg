<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 복제 도장이 찍힌 파일들 — 동일 해시=도장 은유 | 기하학 추상 | 청록+황금+파랑 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#006064" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Large stamp / seal (top center) -->
  <circle cx="512" cy="300" r="160" fill="#FFD700" filter="url(#sh4)"/>
  <circle cx="512" cy="300" r="140" fill="#FFA000"/>
  <circle cx="512" cy="300" r="120" fill="#FFD700"/>
  <!-- Stamp text -->
  <text x="512" y="280" font-family="Arial Black, sans-serif" font-size="56" fill="#BF360C"
        text-anchor="middle" dominant-baseline="middle">COPY</text>
  <text x="512" y="332" font-family="Consolas, monospace" font-size="24" fill="#E65100"
        text-anchor="middle" dominant-baseline="middle">SHA256</text>
  <!-- Stamp serrated edge decorative -->
  <circle cx="512" cy="155" r="14" fill="#E0F7FA"/>
  <circle cx="512" cy="445" r="14" fill="#E0F7FA"/>
  <circle cx="357" cy="210" r="14" fill="#E0F7FA"/>
  <circle cx="667" cy="210" r="14" fill="#E0F7FA"/>
  <circle cx="357" cy="390" r="14" fill="#E0F7FA"/>
  <circle cx="667" cy="390" r="14" fill="#E0F7FA"/>

  <!-- File 1 (bottom left) — stamped -->
  <rect x="110" y="560" width="200" height="250" rx="16" fill="#0097A7" filter="url(#sh4)"/>
  <polygon points="258,560 310,612 258,612" fill="#80DEEA"/>
  <rect x="130" y="640" width="160" height="14" rx="7" fill="white" opacity="0.7"/>
  <rect x="130" y="668" width="130" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="130" y="696" width="150" height="14" rx="7" fill="white" opacity="0.7"/>
  <!-- Stamp mark on file 1 -->
  <circle cx="210" cy="762" r="40" fill="#FFD700" opacity="0.9"/>
  <text x="210" y="762" font-family="Arial Black, sans-serif" font-size="22" fill="#BF360C"
        text-anchor="middle" dominant-baseline="middle">DUP</text>

  <!-- File 2 (bottom center) — stamped -->
  <rect x="412" y="540" width="200" height="250" rx="16" fill="#0097A7" filter="url(#sh4)"/>
  <polygon points="560,540 612,592 560,592" fill="#80DEEA"/>
  <rect x="432" y="620" width="160" height="14" rx="7" fill="white" opacity="0.7"/>
  <rect x="432" y="648" width="130" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="432" y="676" width="150" height="14" rx="7" fill="white" opacity="0.7"/>
  <!-- Stamp mark on file 2 -->
  <circle cx="512" cy="742" r="40" fill="#FFD700" opacity="0.9"/>
  <text x="512" y="742" font-family="Arial Black, sans-serif" font-size="22" fill="#BF360C"
        text-anchor="middle" dominant-baseline="middle">DUP</text>

  <!-- File 3 (bottom right) — stamped -->
  <rect x="714" y="560" width="200" height="250" rx="16" fill="#0097A7" filter="url(#sh4)"/>
  <polygon points="862,560 914,612 862,612" fill="#80DEEA"/>
  <rect x="734" y="640" width="160" height="14" rx="7" fill="white" opacity="0.7"/>
  <rect x="734" y="668" width="130" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="734" y="696" width="150" height="14" rx="7" fill="white" opacity="0.7"/>
  <!-- Stamp mark on file 3 -->
  <circle cx="814" cy="762" r="40" fill="#FFD700" opacity="0.9"/>
  <text x="814" y="762" font-family="Arial Black, sans-serif" font-size="22" fill="#BF360C"
        text-anchor="middle" dominant-baseline="middle">DUP</text>

  <!-- Stamp impact lines -->
  <line x1="330" y1="440" x2="210" y2="560" stroke="#FFD700" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="512" y2="540" stroke="#FFD700" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="694" y1="440" x2="814" y2="560" stroke="#FFD700" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
</svg>
