<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: literal · 기하학 추상 · 흩어진 사진 → 달력 그리드 정렬 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#F3E5F5"/>
  <!-- 좌측 상단: 흩어진 사진들 (혼란) -->
  <g>
    <g transform="rotate(-18 220 240)">
      <rect x="160" y="180" width="140" height="110" rx="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="10"/>
      <rect x="170" y="190" width="120" height="80" fill="#FF6B9D"/>
    </g>
    <g transform="rotate(12 340 200)">
      <rect x="290" y="150" width="140" height="110" rx="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="10"/>
      <rect x="300" y="160" width="120" height="80" fill="#4CAF50"/>
    </g>
    <g transform="rotate(-8 180 340)">
      <rect x="130" y="290" width="140" height="110" rx="8" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="10"/>
      <rect x="140" y="300" width="120" height="80" fill="#3A86FF"/>
    </g>
  </g>
  <!-- 화살표 (정렬 방향) -->
  <g>
    <path d="M 420 340 L 560 340" stroke="#6A1B9A" stroke-width="28" stroke-linecap="round"/>
    <path d="M 540 310 L 580 340 L 540 370" fill="none" stroke="#6A1B9A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- 우측 하단: 달력 그리드 (정돈) -->
  <g>
    <rect x="560" y="200" width="400" height="720" rx="28" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="16"/>
    <!-- 헤더 -->
    <rect x="560" y="200" width="400" height="90" rx="28" fill="#6A1B9A"/>
    <rect x="560" y="250" width="400" height="40" fill="#6A1B9A"/>
    <text x="760" y="268" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFD93D" text-anchor="middle">APR 2026</text>
    <!-- 4×4 그리드 (사진 셀) -->
    <g>
      <!-- row 1 -->
      <rect x="580" y="310" width="90" height="90" rx="8" fill="#FF6B9D"/>
      <rect x="680" y="310" width="90" height="90" rx="8" fill="#4CAF50"/>
      <rect x="780" y="310" width="90" height="90" rx="8" fill="#3A86FF"/>
      <rect x="880" y="310" width="60" height="90" rx="8" fill="#FFD93D"/>
      <!-- row 2 -->
      <rect x="580" y="410" width="90" height="90" rx="8" fill="#FFD93D"/>
      <rect x="680" y="410" width="90" height="90" rx="8" fill="#FF6B9D"/>
      <rect x="780" y="410" width="90" height="90" rx="8" fill="#4CAF50"/>
      <rect x="880" y="410" width="60" height="90" rx="8" fill="#3A86FF"/>
      <!-- row 3 -->
      <rect x="580" y="510" width="90" height="90" rx="8" fill="#3A86FF"/>
      <rect x="680" y="510" width="90" height="90" rx="8" fill="#FFD93D"/>
      <rect x="780" y="510" width="90" height="90" rx="8" fill="#FF6B9D"/>
      <rect x="880" y="510" width="60" height="90" rx="8" fill="#4CAF50"/>
      <!-- row 4 -->
      <rect x="580" y="610" width="90" height="90" rx="8" fill="#4CAF50"/>
      <rect x="680" y="610" width="90" height="90" rx="8" fill="#3A86FF"/>
      <rect x="780" y="610" width="90" height="90" rx="8" fill="#FFD93D"/>
      <rect x="880" y="610" width="60" height="90" rx="8" fill="#FF6B9D"/>
    </g>
    <!-- 하단 라벨 -->
    <rect x="580" y="730" width="360" height="160" rx="20" fill="#FFD93D"/>
    <text x="760" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#6A1B9A" text-anchor="middle">BY DATE</text>
  </g>
</svg>
