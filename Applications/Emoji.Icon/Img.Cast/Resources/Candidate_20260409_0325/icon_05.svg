<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <clipPath id="c5"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Warm amber/gold gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#g5)"/>
  <g clip-path="url(#c5)">
    <!-- Layer 2: Rubber stamp body (handle) -->
    <!-- Handle grip (top of stamp) -->
    <rect x="362" y="172" width="300" height="100" rx="28" fill="#D97706"/>
    <!-- Handle body -->
    <rect x="412" y="250" width="200" height="220" rx="16" fill="#B45309"/>
    <!-- Stamp head (rubber part) -->
    <rect x="284" y="448" width="456" height="118" rx="20" fill="#92400E"/>
    <!-- Stamp rubber face (printing surface) -->
    <rect x="308" y="518" width="408" height="80" rx="12" fill="#F59E0B"/>
    <!-- Layer 3: Stamp imprint below + format being stamped -->
    <!-- Paper/output below stamp -->
    <rect x="226" y="644" width="572" height="200" rx="20" fill="white" stroke="#D97706" stroke-width="8"/>
    <!-- "ICO" stamped text on paper (red ink impression) -->
    <text x="512" y="786" font-family="Arial Black,Arial,sans-serif" font-size="138" fill="#DC2626" font-weight="900" text-anchor="middle" opacity="0.85">ICO</text>
    <!-- Format being stamped indicator (badge around stamp) -->
    <rect x="764" y="310" width="166" height="76" rx="18" fill="#4F46E5"/>
    <text x="847" y="362" font-family="Arial Black,Arial,sans-serif" font-size="82" fill="white" font-weight="900" text-anchor="middle">SVG</text>
    <!-- Arrow from SVG to stamp -->
    <path d="M 752,350 Q 700,430 680,468" stroke="#4F46E5" stroke-width="16" stroke-linecap="round" fill="none" stroke-dasharray="18,10"/>
  </g>
</svg>
