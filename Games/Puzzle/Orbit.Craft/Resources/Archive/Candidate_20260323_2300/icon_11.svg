    <rect x="232" y="372" width="140" height="140" fill="#0C3344" opacity="0.7"/>
    <rect x="372" y="372" width="140" height="140" fill="#0E4A5E" opacity="0.7"/>
    <rect x="512" y="372" width="140" height="140" fill="#0C3344" opacity="0.7"/>
    <rect x="652" y="372" width="140" height="140" fill="#0E4A5E" opacity="0.7"/>
    <rect x="232" y="512" width="140" height="140" fill="#0E4A5E" opacity="0.7"/>
    <rect x="372" y="512" width="140" height="140" fill="#0C3344" opacity="0.7"/>
