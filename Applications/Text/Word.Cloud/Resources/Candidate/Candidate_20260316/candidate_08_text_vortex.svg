<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a001a"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <radialGradient id="vortexCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#8800ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2200aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vortex glow -->
  <circle cx="256" cy="256" r="160" fill="url(#vortexCore)" opacity="0.35"/>
  <!-- Word spirals - rotating word blocks at various angles and distances -->
  <rect x="228" y="105" width="56" height="12" rx="4" fill="#ff00ff" opacity="0.85" transform="rotate(10,256,111)" filter="url(#glow)"/>
  <rect x="338" y="152" width="48" height="11" rx="3" fill="#cc00ff" opacity="0.8" transform="rotate(35,362,157)" filter="url(#glow)"/>
  <rect x="375" y="235" width="50" height="11" rx="3" fill="#8800ff" opacity="0.75" transform="rotate(65,400,240)"/>
  <rect x="340" y="330" width="46" height="11" rx="3" fill="#4400ee" opacity="0.7" transform="rotate(110,363,335)"/>
  <rect x="248" y="375" width="52" height="12" rx="4" fill="#2200cc" opacity="0.7" transform="rotate(170,274,381)"/>
  <rect x="134" y="340" width="48" height="11" rx="3" fill="#4400ee" opacity="0.72" transform="rotate(220,158,345)"/>
  <rect x="90" y="248" width="46" height="11" rx="3" fill="#6600ff" opacity="0.75" transform="rotate(255,113,253)"/>
  <rect x="133" y="152" width="48" height="11" rx="3" fill="#9900ff" opacity="0.8" transform="rotate(300,157,157)" filter="url(#glow)"/>
  <!-- Inner ring -->
  <rect x="234" y="168" width="44" height="10" rx="3" fill="#ff44ff" opacity="0.85" transform="rotate(15,256,173)" filter="url(#glow)"/>
  <rect x="318" y="224" width="40" height="10" rx="3" fill="#cc44ff" opacity="0.8" transform="rotate(60,338,229)"/>
  <rect x="310" y="298" width="40" height="10" rx="3" fill="#8844ff" opacity="0.75" transform="rotate(120,330,303)"/>
  <rect x="238" y="330" width="42" height="10" rx="3" fill="#5544ff" opacity="0.75" transform="rotate(175,259,335)"/>
  <rect x="164" y="296" width="40" height="10" rx="3" fill="#6644ff" opacity="0.75" transform="rotate(230,184,301)"/>
  <rect x="156" y="220" width="40" height="10" rx="3" fill="#9944ff" opacity="0.8" transform="rotate(285,176,225)"/>
  <!-- Vortex center -->
  <circle cx="256" cy="256" r="22" fill="#ff00ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="white" opacity="0.95"/>
</svg>