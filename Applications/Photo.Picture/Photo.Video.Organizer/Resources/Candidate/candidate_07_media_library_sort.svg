  <path d="M240 424 L256 440 L272 424" stroke="url(#shelf)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <line x1="256" y1="424" x2="256" y2="468" stroke="url(#shelf)" stroke-width="4" stroke-linecap="round"/>
