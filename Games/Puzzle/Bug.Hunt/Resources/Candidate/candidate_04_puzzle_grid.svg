<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#142030"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code puzzle grid 6x5 -->
  <!-- Row 1 -->
  <rect x="68" y="100" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="98" y="128" font-family="monospace" font-size="14" fill="#4488FF" text-anchor="middle">if</text>
  <rect x="138" y="100" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="168" y="128" font-family="monospace" font-size="14" fill="#88CCFF" text-anchor="middle">(x</text>
  <rect x="208" y="100" width="60" height="44" rx="5" fill="#FF2222"/>
  <text x="238" y="128" font-family="monospace" font-size="13" fill="white" text-anchor="middle">==</text>
  <rect x="278" y="100" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="308" y="128" font-family="monospace" font-size="14" fill="#88CCFF" text-anchor="middle">0)</text>
  <rect x="348" y="100" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="378" y="128" font-family="monospace" font-size="14" fill="#44AAFF" text-anchor="middle">{</text>
  <!-- Row 2 -->
  <rect x="68" y="154" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="98" y="182" font-family="monospace" font-size="13" fill="#AAAAFF" text-anchor="middle">ret</text>
  <rect x="138" y="154" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="168" y="182" font-family="monospace" font-size="14" fill="#FFAA44" text-anchor="middle">x/</text>
  <rect x="208" y="154" width="60" height="44" rx="5" fill="#FF2222"/>
  <text x="238" y="182" font-family="monospace" font-size="14" fill="white" text-anchor="middle">y</text>
  <rect x="278" y="154" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="308" y="182" font-family="monospace" font-size="14" fill="#88CCFF" text-anchor="middle">;</text>
  <rect x="348" y="154" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="378" y="182" font-family="monospace" font-size="14" fill="#44AAFF" text-anchor="middle">}</text>
  <!-- Row 3 -->
  <rect x="68" y="208" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="98" y="236" font-family="monospace" font-size="14" fill="#44CC44" text-anchor="middle">for</text>
  <rect x="138" y="208" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="168" y="236" font-family="monospace" font-size="13" fill="#88CCFF" text-anchor="middle">(i=</text>
  <rect x="208" y="208" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="238" y="236" font-family="monospace" font-size="14" fill="#FFAA44" text-anchor="middle">0;</text>
  <rect x="278" y="208" width="60" height="44" rx="5" fill="#1A3A1A"/>
  <text x="308" y="236" font-family="monospace" font-size="12" fill="#44FF44" text-anchor="middle">FIX</text>
  <rect x="348" y="208" width="60" height="44" rx="5" fill="#1A2A3A"/>
  <text x="378" y="236" font-family="monospace" font-size="13" fill="#88CCFF" text-anchor="middle">++)</text>
  <!-- Bug markers -->
  <circle cx="238" cy="100" r="8" fill="#FF0000" stroke="#FF8888" stroke-width="2"/>
  <text x="238" y="104" font-family="Arial" font-size="10" fill="white" text-anchor="middle">!</text>
  <circle cx="238" cy="154" r="8" fill="#FF0000" stroke="#FF8888" stroke-width="2"/>
  <text x="238" y="158" font-family="Arial" font-size="10" fill="white" text-anchor="middle">!</text>
  <!-- Title -->
  <text x="256" y="310" font-family="Arial" font-size="18" fill="#FF4444" text-anchor="middle">Find the 2 bugs!</text>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#4488FF" text-anchor="middle">Bug.Hunt</text>
