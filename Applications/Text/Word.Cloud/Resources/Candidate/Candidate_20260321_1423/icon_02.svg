<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2e)"/>

  <!-- Layer 2: 워드클라우드 앱 UI (레이어드) -->
  <!-- 앱 창 -->
  <rect x="148" y="200" width="728" height="558" rx="18" fill="#18181E"/>
  <rect x="148" y="200" width="728" height="558" rx="18" fill="none" stroke="#2A2A3A" stroke-width="4"/>

  <!-- 타이틀바 -->
  <rect x="148" y="200" width="728" height="44" rx="18" fill="#22222E"/>
  <rect x="148" y="224" width="728" height="20" fill="#22222E"/>
  <circle cx="188" cy="222" r="8" fill="#FF5F57"/>
  <circle cx="214" cy="222" r="8" fill="#FFBD2E"/>
  <circle cx="240" cy="222" r="8" fill="#28CA42"/>
  <text x="512" y="230" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#444455">Word.Cloud</text>

  <!-- 좌측: 텍스트 입력 패널 -->
  <rect x="168" y="264" width="244" height="474" rx="8" fill="#141420"/>
  <text x="180" y="288" font-family="Segoe UI,sans-serif" font-size="14" fill="#555566">Input Text</text>
  <rect x="180" y="298" width="220" height="200" rx="6" fill="#1A1A28" stroke="#2A2A3A" stroke-width="1"/>
  <text x="192" y="320" font-family="Consolas,monospace" font-size="12" fill="#4A4A6A">The quick brown</text>
  <text x="192" y="338" font-family="Consolas,monospace" font-size="12" fill="#4A4A6A">fox jumps over</text>
  <text x="192" y="356" font-family="Consolas,monospace" font-size="12" fill="#4A4A6A">the lazy dog.</text>
  <text x="192" y="374" font-family="Consolas,monospace" font-size="12" fill="#3A3A5A">Word cloud is</text>
  <text x="192" y="392" font-family="Consolas,monospace" font-size="12" fill="#3A3A5A">a visual text</text>
  <text x="192" y="410" font-family="Consolas,monospace" font-size="12" fill="#2A2A4A">analysis tool.</text>

  <!-- 테마 선택 -->
  <text x="180" y="524" font-family="Segoe UI,sans-serif" font-size="13" fill="#444455">Theme</text>
  <rect x="180" y="532" width="220" height="28" rx="6" fill="#22222E" stroke="#2A2A3A" stroke-width="1"/>
  <text x="196" y="550" font-family="Segoe UI,sans-serif" font-size="13" fill="#5DC863">Viridis ▾</text>

  <!-- 생성 버튼 -->
  <rect x="180" y="574" width="220" height="38" rx="10" fill="#3B528B"/>
  <text x="290" y="597" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#FDE725">Generate ▶</text>

  <!-- 우측: 워드클라우드 결과 -->
  <rect x="432" y="264" width="424" height="474" rx="8" fill="#0D0D18"/>

  <!-- 구름 모양 워드클라우드 (간략화) -->
  <!-- Viridis 팔레트 단어들 -->
  <text x="644" y="430" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="62" font-weight="700" fill="#5DC863">word</text>
  <text x="560" y="370" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="40" font-weight="600" fill="#21908C">cloud</text>
  <text x="730" y="380" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="40" font-weight="600" fill="#3B528B">text</text>
  <text x="540" y="466" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="28" fill="#FDE725">fox</text>
  <text x="730" y="468" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="28" fill="#440154">quick</text>
  <text x="600" y="510" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#21908C">lazy</text>
  <text x="710" y="516" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#5DC863">dog</text>
  <text x="480" y="420" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#3B528B">brown</text>
  <text x="820" y="436" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#440154">over</text>
  <text x="644" y="550" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" fill="#21908C">jumps</text>
  <text x="488" y="488" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#5DC863">the</text>
  <text x="820" y="490" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#3B528B">visual</text>

  <!-- Layer 3: 팔레트 힌트 스와치 (하단) -->
  <g transform="translate(432,730)">
    <circle cx="20"  cy="14" r="9" fill="#440154"/>
    <circle cx="44"  cy="14" r="9" fill="#3B528B"/>
    <circle cx="68"  cy="14" r="9" fill="#21908C"/>
    <circle cx="92"  cy="14" r="9" fill="#5DC863"/>
    <circle cx="116" cy="14" r="9" fill="#FDE725"/>
    <text x="140" y="19" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">Viridis</text>
  </g>
</svg>
