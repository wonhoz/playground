<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D00"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ASCII art face made of characters -->
  <text x="256" y="108" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle">  / \_____/ \  </text>
  <text x="256" y="132" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle"> |  o     o  | </text>
  <text x="256" y="156" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle"> |     ^     | </text>
  <text x="256" y="180" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle"> |  \___/    | </text>
  <text x="256" y="204" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle">  \_________/  </text>
  <!-- Bracket art below -->
  <text x="256" y="244" font-family="monospace" font-size="16" fill="#39FF14" text-anchor="middle">{ ASCII ART }</text>
  <!-- Character palette -->
  <text x="256" y="284" font-family="monospace" font-size="20" fill="#44FF44" text-anchor="middle">/ \ | _ ~ * # @</text>
  <text x="256" y="314" font-family="monospace" font-size="20" fill="#22CC22" text-anchor="middle">+ = % &amp; ^ ! ? .</text>
  <!-- Arrow/brush icon -->
  <text x="256" y="354" font-family="monospace" font-size="30" fill="#00FF41" text-anchor="middle">[ DRAW ]</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#00FF41" text-anchor="middle">Char.Art</text>
</svg>
