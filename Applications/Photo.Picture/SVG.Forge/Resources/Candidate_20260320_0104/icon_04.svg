<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0500"/>
  <!-- Geometric shapes combination -->
  <!-- Circle -->
  <circle cx="380" cy="400" r="180" fill="none" stroke="#E65100" stroke-width="24"/>
  <circle cx="380" cy="400" r="180" fill="#E65100" opacity="0.2"/>
  <!-- Triangle -->
  <polygon points="600,220 780,560 420,560" fill="none" stroke="#FF8A65" stroke-width="20"/>
  <polygon points="600,220 780,560 420,560" fill="#FF8A65" opacity="0.15"/>
  <!-- Square -->
  <rect x="340" y="540" width="220" height="220" rx="8" fill="none" stroke="#E65100" stroke-width="20"/>
  <rect x="340" y="540" width="220" height="220" rx="8" fill="#E65100" opacity="0.18"/>
  <!-- Intersection highlights -->
  <path d="M420 560 L600 560 L600 400 Q560 370 520 380 Q480 390 460 420 Q440 450 440 480 Q440 520 420 560Z" fill="#FF8A65" opacity="0.35"/>
  <!-- Small accent shapes -->
  <polygon points="820,700 870,800 770,800" fill="#FF8A65" opacity="0.7"/>
  <circle cx="200" cy="700" r="50" fill="#E65100" opacity="0.6"/>
  <rect x="150" y="200" width="80" height="80" rx="6" fill="#FF8A65" opacity="0.5"/>
</svg>
