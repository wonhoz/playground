<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1de9b6"/>
      <stop offset="100%" stop-color="#00bfa5"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80cbc4"/>
      <stop offset="100%" stop-color="#4db6ac"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Big letter B (Boss) -->
  <text x="60" y="340" font-family="Arial" font-size="320" font-weight="900" fill="#00695c" opacity="0.4">B</text>
  <!-- File stack -->
  <rect x="90" y="280" width="160" height="190" rx="12" fill="#003d33" stroke="#1de9b6" stroke-width="1.5" opacity="0.7" transform="rotate(-8, 170, 375)"/>
  <rect x="100" y="270" width="160" height="190" rx="12" fill="#004d40" stroke="#1de9b6" stroke-width="1.5" opacity="0.85" transform="rotate(-4, 180, 365)"/>
  <rect x="110" y="260" width="160" height="190" rx="12" fill="url(#fileGrad)"/>
  <!-- Fold corner -->
  <polygon points="228,260 270,302 228,302" fill="#004d40"/>
  <polygon points="228,260 270,260 270,302" fill="#80cbc4"/>
  <!-- Extension text -->
  <text x="190" y="370" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#004d40" text-anchor="middle">.EXT</text>
  <!-- Crown on file -->
  <polygon points="240,220 265,248 290,228 315,248 340,220 340,265 240,265" fill="url(#tealGrad)"/>
  <circle cx="240" cy="220" r="9" fill="#1de9b6"/>
  <circle cx="290" cy="210" r="9" fill="#1de9b6"/>
  <circle cx="340" cy="220" r="9" fill="#1de9b6"/>
  <!-- Right side apps -->
  <rect x="320" y="290" width="95" height="75" rx="10" fill="#003d33" stroke="#1de9b6" stroke-width="1.5"/>
  <rect x="340" y="305" width="25" height="25" rx="5" fill="#1de9b6" opacity="0.8"/>
  <rect x="375" y="305" width="25" height="25" rx="5" fill="#1de9b6" opacity="0.5"/>
  <rect x="340" y="338" width="25" height="16" rx="4" fill="#1de9b6" opacity="0.4"/>
  <rect x="375" y="338" width="25" height="16" rx="4" fill="#1de9b6" opacity="0.3"/>
  <!-- Connecting arrow -->
  <path d="M275 380 Q297 380 297 330" fill="none" stroke="#1de9b6" stroke-width="3" stroke-dasharray="6,3" stroke-linecap="round"/>
  <polygon points="290,327 297,310 304,327" fill="#1de9b6"/>
</svg>
