<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 레이더 원들 -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#F97316" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#FB923C" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <!-- 십자선 -->
  <line x1="86" y1="256" x2="426" y2="256" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="86" x2="256" y2="426" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  <!-- 스윕 섹터 -->
  <path d="M 256 256 L 256 86 A 170 170 0 0 1 376 346 Z" fill="url(#sweep)"/>
  <!-- 탐지 블립 -->
  <circle cx="316" cy="186" r="8" fill="#F97316" opacity="0.9" filter="url(#glow)"/>
  <circle cx="196" cy="340" r="6" fill="#FB923C" opacity="0.7"/>
  <circle cx="380" cy="300" r="7" fill="#F97316" opacity="0.8" filter="url(#glow)"/>
  <!-- 중앙 -->
  <circle cx="256" cy="256" r="12" fill="#F97316" opacity="0.7" filter="url(#glow)"/>
  <!-- 포트 레이블들 -->
  <text x="320" y="182" fill="#F97316" font-size="9" font-family="monospace" opacity="0.7">:443</text>
  <text x="192" y="355" fill="#F97316" font-size="9" font-family="monospace" opacity="0.6">:80</text>
  <text x="385" y="298" fill="#F97316" font-size="9" font-family="monospace" opacity="0.7">:22</text>
</svg>