    <!-- 날개 위 단어들 -->
    <text x="390" y="350" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FDE68A" transform="rotate(-30,390,380)">WORD</text>
    <text x="634" y="350" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FDE68A" transform="rotate(30,634,380)">cloud</text>
