<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FDA4AF"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: Icon gallery/museum scene - wall of emoji icons being browsed -->
  <!-- Gallery wall -->
  <rect x="132" y="200" width="760" height="520" rx="20" fill="white" opacity="0.6"/>
  <!-- Icon grid on wall - 3x3 emoji display -->
  <!-- Row 1 -->
  <rect x="168" y="230" width="150" height="150" rx="20" fill="#FEF9C3"/><text x="243" y="328" font-size="88" text-anchor="middle">😀</text>
  <rect x="348" y="230" width="150" height="150" rx="20" fill="#DCFCE7"/><text x="423" y="328" font-size="88" text-anchor="middle">🌟</text>
  <rect x="528" y="230" width="150" height="150" rx="20" fill="#EDE9FE"/><text x="603" y="328" font-size="88" text-anchor="middle">🔥</text>
  <rect x="706" y="230" width="160" height="150" rx="20" fill="#FEE2E2"/><text x="786" y="328" font-size="88" text-anchor="middle">💎</text>
  <!-- Row 2 -->
  <rect x="168" y="410" width="150" height="150" rx="20" fill="#DBEAFE"/><text x="243" y="508" font-size="88" text-anchor="middle">🎯</text>
  <rect x="348" y="410" width="150" height="150" rx="20" fill="#FEF3C7"/><text x="423" y="508" font-size="88" text-anchor="middle">🚀</text>
  <rect x="528" y="410" width="150" height="150" rx="20" fill="#D1FAE5"/><text x="603" y="508" font-size="88" text-anchor="middle">🎨</text>
  <rect x="706" y="410" width="160" height="150" rx="20" fill="#FCE7F3"/><text x="786" y="508" font-size="88" text-anchor="middle">⚡</text>
  <!-- Row 3 - partial -->
  <rect x="168" y="590" width="150" height="110" rx="20" fill="#FEE2E2" opacity="0.7"/><text x="243" y="666" font-size="80" text-anchor="middle" opacity="0.7">🦋</text>
  <rect x="348" y="590" width="150" height="110" rx="20" fill="#ECFDF5" opacity="0.7"/><text x="423" y="666" font-size="80" text-anchor="middle" opacity="0.7">🍀</text>
  <!-- Layer 3: Highlighted selected icon with ring -->
  <rect x="520" y="402" width="166" height="166" rx="22" fill="none" stroke="#F43F5E" stroke-width="16"/>
  <!-- Magnifier cursor looking at it -->
  <circle cx="790" cy="790" r="80" fill="none" stroke="#F43F5E" stroke-width="20"/>
  <circle cx="790" cy="790" r="64" fill="#F43F5E" opacity="0.1"/>
  <line x1="850" y1="850" x2="900" y2="900" stroke="#F43F5E" stroke-width="24" stroke-linecap="round"/>
</svg>
