<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_10: 재시작 화살표 (restart circle: service restart) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030810"/>
  <!-- 재시작 원형 화살표 (두꺼운 호) -->
  <!-- 큰 원호 (약 300도) -->
  <path d="M512 200 A312 312 0 1 1 280 680" fill="none" stroke="#1A237E" stroke-width="60" stroke-linecap="round"/>
  <!-- 화살표 머리 (끝 방향) -->
  <polygon points="200,620 240,760 340,680" fill="#1A237E"/>
  <!-- 내부 원 (서비스 아이콘) -->
  <circle cx="512" cy="512" r="130" fill="#1A237E"/>
  <!-- 내부 전원/서비스 심볼 (세로선 + 원호) -->
  <line x1="512" y1="420" x2="512" y2="520" stroke="#5C6BC0" stroke-width="22" stroke-linecap="round"/>
  <path d="M440 490 A90 90 0 1 0 584 490" fill="none" stroke="#5C6BC0" stroke-width="22" stroke-linecap="round"/>
  <!-- 재시작 방향 힌트 (작은 화살표) -->
  <circle cx="512" cy="200" r="22" fill="#5C6BC0"/>
</svg>
