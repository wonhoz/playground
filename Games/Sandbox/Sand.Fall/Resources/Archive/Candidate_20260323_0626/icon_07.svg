<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 픽셀 팔레트 선택기 — 재질 선택 UI | 기하학 | #111118 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#111118"/>
  <!-- Layer 2: Material palette UI (toolbar-style) -->
  <!-- Palette panel frame -->
  <rect x="160" y="200" width="704" height="560" rx="12" fill="#1A1A24" stroke="#3A3A50" stroke-width="4"/>
  <!-- Panel title bar -->
  <rect x="160" y="200" width="704" height="48" rx="12" fill="#252535"/>
  <rect x="160" y="228" width="704" height="20" fill="#252535"/>
  <text x="512" y="231" font-family="monospace" font-size="16" fill="#8888BB" text-anchor="middle">재질 팔레트 (MATERIAL PALETTE)</text>
  <!-- Material swatches grid (5 columns, 4 rows) -->
  <!-- Row 1: Sand materials -->
  <!-- Sand (selected - highlighted) -->
  <rect x="190" y="270" width="104" height="104" rx="8" fill="#C8A820" stroke="#FFD700" stroke-width="4"/>
  <rect x="192" y="272" width="100" height="70" rx="6" fill="#E8C840"/>
  <!-- Sand pixel texture -->
  <rect x="196" y="276" width="8" height="8" fill="#D8B830" rx="1"/>
  <rect x="210" y="280" width="8" height="8" fill="#EECC50" rx="1"/>
  <rect x="224" y="276" width="8" height="8" fill="#C8A820" rx="1"/>
  <rect x="238" y="282" width="8" height="8" fill="#E8C840" rx="1"/>
  <rect x="252" y="276" width="8" height="8" fill="#D8B830" rx="1"/>
  <rect x="266" y="280" width="8" height="8" fill="#C8A820" rx="1"/>
  <rect x="280" y="276" width="8" height="8" fill="#EECC50" rx="1"/>
  <text x="242" y="372" font-family="monospace" font-size="13" fill="#FFD700" text-anchor="middle" font-weight="bold">모래</text>
  <!-- Water -->
  <rect x="306" y="270" width="104" height="104" rx="8" fill="#0A1A3A" stroke="#2244AA" stroke-width="2"/>
  <rect x="308" y="272" width="100" height="70" rx="6" fill="#0A2050"/>
  <path d="M 308 310 Q 330 300 358 310 Q 380 300 408 310" stroke="#4488FF" stroke-width="3" fill="none"/>
  <path d="M 308 326 Q 330 316 358 326 Q 380 316 408 326" stroke="#2266CC" stroke-width="2" fill="none"/>
  <text x="358" y="372" font-family="monospace" font-size="13" fill="#4488FF" text-anchor="middle">물</text>
  <!-- Fire -->
  <rect x="422" y="270" width="104" height="104" rx="8" fill="#3A0A00" stroke="#FF6600" stroke-width="2"/>
  <rect x="424" y="272" width="100" height="70" rx="6" fill="#200800"/>
  <path d="M 450 342 Q 445 320 460 302 Q 465 318 468 302 Q 474 316 474 302 Q 480 320 476 342 Z" fill="#FF6600"/>
  <path d="M 454 342 Q 452 328 460 316 Q 464 326 468 316 Q 472 326 474 342 Z" fill="#FFDD00"/>
  <text x="474" y="372" font-family="monospace" font-size="13" fill="#FF6600" text-anchor="middle">불</text>
  <!-- Oil -->
  <rect x="538" y="270" width="104" height="104" rx="8" fill="#1A1400" stroke="#665500" stroke-width="2"/>
  <rect x="540" y="272" width="100" height="70" rx="6" fill="#0A0800"/>
  <ellipse cx="590" cy="307" rx="40" ry="15" fill="#332800"/>
  <ellipse cx="590" cy="316" rx="35" ry="12" fill="#221800"/>
  <text x="590" y="372" font-family="monospace" font-size="13" fill="#886600" text-anchor="middle">기름</text>
  <!-- Stone -->
  <rect x="654" y="270" width="104" height="104" rx="8" fill="#2A2A2A" stroke="#666666" stroke-width="2"/>
  <rect x="656" y="272" width="100" height="70" rx="6" fill="#1A1A1A"/>
  <polygon points="676,342 706,302 736,342" fill="#444444"/>
  <polygon points="696,342 720,314 744,342" fill="#555555"/>
  <text x="706" y="372" font-family="monospace" font-size="13" fill="#888888" text-anchor="middle">돌</text>
  <!-- Row 2: More materials -->
  <!-- Acid -->
  <rect x="190" y="390" width="104" height="104" rx="8" fill="#0A2000" stroke="#44FF00" stroke-width="2"/>
  <rect x="192" y="392" width="100" height="70" rx="6" fill="#061400"/>
  <circle cx="230" cy="427" r="12" fill="#22AA00" opacity="0.8"/>
  <circle cx="252" cy="422" r="8" fill="#44DD00" opacity="0.7"/>
  <circle cx="272" cy="430" r="10" fill="#22AA00" opacity="0.8"/>
  <text x="242" y="492" font-family="monospace" font-size="13" fill="#44FF00" text-anchor="middle">산</text>
  <!-- Lava -->
  <rect x="306" y="390" width="104" height="104" rx="8" fill="#3A0000" stroke="#FF4400" stroke-width="2"/>
  <rect x="308" y="392" width="100" height="70" rx="6" fill="#200000"/>
  <path d="M 308 450 Q 330 432 350 450 Q 370 432 408 450" stroke="#FF4400" stroke-width="4" fill="#880000"/>
  <text x="358" y="492" font-family="monospace" font-size="13" fill="#FF4400" text-anchor="middle">용암</text>
  <!-- Ice -->
  <rect x="422" y="390" width="104" height="104" rx="8" fill="#001428" stroke="#88CCFF" stroke-width="2"/>
  <rect x="424" y="392" width="100" height="70" rx="6" fill="#001020"/>
  <polygon points="474,402 484,422 464,422" fill="#88CCFF" opacity="0.8"/>
  <polygon points="474,442 484,422 464,422" fill="#AADDFF" opacity="0.6"/>
  <text x="474" y="492" font-family="monospace" font-size="13" fill="#88CCFF" text-anchor="middle">얼음</text>
  <!-- Wood -->
  <rect x="538" y="390" width="104" height="104" rx="8" fill="#2A1400" stroke="#8B4513" stroke-width="2"/>
  <rect x="540" y="392" width="100" height="70" rx="6" fill="#1A0C00"/>
  <line x1="540" y1="410" x2="640" y2="410" stroke="#5A3010" stroke-width="3"/>
  <line x1="540" y1="425" x2="640" y2="425" stroke="#4A2808" stroke-width="2"/>
  <line x1="540" y1="440" x2="640" y2="440" stroke="#5A3010" stroke-width="3"/>
  <text x="590" y="492" font-family="monospace" font-size="13" fill="#8B4513" text-anchor="middle">나무</text>
  <!-- Gunpowder -->
  <rect x="654" y="390" width="104" height="104" rx="8" fill="#1A1A1A" stroke="#888888" stroke-width="2"/>
  <rect x="656" y="392" width="100" height="70" rx="6" fill="#0A0A0A"/>
  <circle cx="694" cy="427" r="6" fill="#333333"/>
  <circle cx="706" cy="420" r="5" fill="#444444"/>
  <circle cx="718" cy="427" r="6" fill="#333333"/>
  <circle cx="700" cy="436" r="5" fill="#555555"/>
  <circle cx="712" cy="440" r="4" fill="#444444"/>
  <text x="706" y="492" font-family="monospace" font-size="13" fill="#888888" text-anchor="middle">화약</text>
  <!-- Layer 3: Selected material indicator at bottom -->
  <rect x="190" y="510" width="674" height="50" rx="8" fill="#101018" stroke="#C8A820" stroke-width="3"/>
  <text x="512" y="540" font-family="monospace" font-size="16" fill="#FFD700" text-anchor="middle">선택됨: 모래  |  마우스로 클릭하여 배치</text>
</svg>
