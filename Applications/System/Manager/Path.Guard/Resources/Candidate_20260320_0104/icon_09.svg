<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
<!-- 컨셉: 망치 + 렌치 경로 수리 -->
<!-- 경로선 (끊어진) -->
<line x1="200" y1="512" x2="380" y2="512" stroke="#2E7D32" stroke-width="28" stroke-linecap="round"/>
<line x1="640" y1="512" x2="824" y2="512" stroke="#2E7D32" stroke-width="28" stroke-linecap="round"/>
<!-- 끊어진 부분 표시 -->
<line x1="400" y1="490" x2="460" y2="550" stroke="#66BB6A" stroke-width="20" stroke-linecap="round"/>
<line x1="560" y1="490" x2="620" y2="550" stroke="#66BB6A" stroke-width="20" stroke-linecap="round"/>
<!-- 렌치 (수리 중) -->
<path d="M 460 360 Q 420 320 390 340 Q 360 360 380 400 Q 400 440 440 440 L 580 580 Q 600 600 620 600 Q 660 600 660 560 Q 660 540 640 520 Z" fill="#2E7D32"/>
<circle cx="395" cy="368" r="28" fill="#030A03"/>
<!-- 망치 -->
<rect x="540" y="240" width="180" height="100" rx="16" fill="#66BB6A"/>
<rect x="556" y="254" width="148" height="72" rx="10" fill="#030A03" opacity="0.3"/>
<line x1="580" y1="340" x2="440" y2="560" stroke="#66BB6A" stroke-width="36" stroke-linecap="round"/>
<!-- 수리 완료 체크 (경로 끝에) -->
<circle cx="824" cy="512" r="44" fill="#2E7D32"/>
<path d="M 800 512 L 818 530 L 850 490" fill="none" stroke="#030A03" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
