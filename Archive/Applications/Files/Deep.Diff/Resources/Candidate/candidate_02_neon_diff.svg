<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Two document icons -->
  <!-- Left doc -->
  <rect x="80" y="100" width="140" height="180" rx="8" fill="#0a0a20" stroke="#ff00aa" stroke-width="2" filter="url(#glow)"/>
  <polygon points="192,100 220,100 220,128" fill="#ff00aa" opacity="0.5"/>
  <rect x="192" y="100" width="28" height="28" rx="4" fill="#0a0a20" stroke="#ff00aa" stroke-width="1.5"/>
  <!-- Lines on left doc -->
  <line x1="96" y1="140" x2="200" y2="140" stroke="#ff00aa" stroke-width="2" opacity="0.7"/>
  <line x1="96" y1="158" x2="180" y2="158" stroke="#ff00aa" stroke-width="2" opacity="0.5"/>
  <line x1="96" y1="176" x2="200" y2="176" stroke="#ff00aa" stroke-width="1.5" opacity="0.6"/>
  <line x1="96" y1="194" x2="165" y2="194" stroke="#ff6600" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
  <line x1="96" y1="212" x2="200" y2="212" stroke="#ff00aa" stroke-width="2" opacity="0.4"/>
  <line x1="96" y1="230" x2="185" y2="230" stroke="#ff00aa" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="248" x2="200" y2="248" stroke="#ff0044" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <!-- Right doc -->
  <rect x="292" y="100" width="140" height="180" rx="8" fill="#0a0a20" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <polygon points="404,100 432,100 432,128" fill="#00aaff" opacity="0.5"/>
  <rect x="404" y="100" width="28" height="28" rx="4" fill="#0a0a20" stroke="#00aaff" stroke-width="1.5"/>
  <!-- Lines on right doc -->
  <line x1="308" y1="140" x2="412" y2="140" stroke="#00aaff" stroke-width="2" opacity="0.7"/>
  <line x1="308" y1="158" x2="390" y2="158" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  <line x1="308" y1="176" x2="412" y2="176" stroke="#00aaff" stroke-width="1.5" opacity="0.6"/>
  <line x1="308" y1="194" x2="370" y2="194" stroke="#00ff88" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
  <line x1="308" y1="212" x2="412" y2="212" stroke="#00aaff" stroke-width="2" opacity="0.4"/>
  <line x1="308" y1="230" x2="395" y2="230" stroke="#00aaff" stroke-width="2" opacity="0.6"/>
  <line x1="308" y1="248" x2="412" y2="248" stroke="#00aaff" stroke-width="2" opacity="0.3"/>
  <!-- Diff connections in center -->
  <path d="M220,194 Q256,185 292,194" fill="none" stroke="#ff6600" stroke-width="2.5" opacity="0.8" stroke-dasharray="5,3"/>
  <path d="M220,248 Q256,256 292,194" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
  <!-- VS badge -->
  <circle cx="256" cy="190" r="28" fill="#1a0a2a" stroke="#aa00ff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="256" y="196" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#aa00ff" text-anchor="middle">VS</text>
  <!-- Magnifier (deep inspection) -->
  <circle cx="256" cy="330" r="60" fill="none" stroke="#00ffaa" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="330" r="50" fill="#050520" opacity="0.8"/>
  <line x1="298" y1="372" x2="336" y2="410" stroke="#00ffaa" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Inside magnifier - diff view -->
  <line x1="224" y1="318" x2="280" y2="318" stroke="#ff0044" stroke-width="3" opacity="0.8"/>
  <line x1="224" y1="332" x2="288" y2="332" stroke="#00ff88" stroke-width="3" opacity="0.8"/>
  <line x1="224" y1="346" x2="276" y2="346" stroke="#aaaaaa" stroke-width="2" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="456" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#00aaff" text-anchor="middle" letter-spacing="2" filter="url(#glow)">DEEP DIFF</text>
</svg>
