<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <linearGradient id="board7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg7)"/>

  <!-- Layer 2: Scoreboard card (back) -->
  <rect x="168" y="158" width="688" height="640" rx="24" fill="#1A237E" opacity="0.25" transform="rotate(3, 512, 478)"/>
  <!-- Scoreboard card (front) -->
  <rect x="152" y="148" width="720" height="640" rx="24" fill="url(#board7)"/>

  <!-- Scoreboard header -->
  <rect x="152" y="148" width="720" height="96" rx="24" fill="#33691E"/>
  <rect x="152" y="202" width="720" height="42" fill="#33691E"/>
  <text x="512" y="215" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#CCFF90" text-anchor="middle">SCOREBOARD</text>

  <!-- Score rows -->
  <rect x="180" y="274" width="664" height="72" rx="12" fill="#1B5E20" stroke="#4CAF50" stroke-width="4"/>
  <text x="240" y="322" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFD600">🥇</text>
  <text x="300" y="322" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#CCFF90">Player 1</text>
  <text x="796" y="322" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFD600" text-anchor="end">9850</text>

  <rect x="180" y="362" width="664" height="72" rx="12" fill="#1B5E20" stroke="#81C784" stroke-width="4" opacity="0.85"/>
  <text x="240" y="410" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#B0BEC5">🥈</text>
  <text x="300" y="410" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#A5D6A7">Player 2</text>
  <text x="796" y="410" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#B0BEC5" text-anchor="end">7200</text>

  <rect x="180" y="450" width="664" height="72" rx="12" fill="#1B5E20" stroke="#66BB6A" stroke-width="4" opacity="0.7"/>
  <text x="240" y="498" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFAB40">🥉</text>
  <text x="300" y="498" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#81C784">Player 3</text>
  <text x="796" y="498" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFAB40" text-anchor="end">5480</text>

  <!-- Timer bar -->
  <text x="512" y="588" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#CCFF90" text-anchor="middle">TIME REMAINING</text>
  <rect x="192" y="604" width="640" height="40" rx="20" fill="#33691E"/>
  <rect x="192" y="604" width="250" height="40" rx="20" fill="#FF6F00"/>
  <text x="512" y="700" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFD600" text-anchor="middle">15s</text>

  <!-- Layer 3: Trophy badge -->
  <circle cx="840" cy="840" r="112" fill="#FFD600" stroke="white" stroke-width="12"/>
  <text x="840" y="884" font-family="Segoe UI Emoji, sans-serif" font-size="100" text-anchor="middle">🏆</text>
</svg>
