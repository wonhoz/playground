  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 2x2 모델 카드 그리드 -->
  <!-- GPT-4 -->
  <rect x="66" y="80" width="168" height="152" rx="14" fill="url(#card1)"/>
  <text x="150" y="130" font-family="Arial" font-weight="bold" font-size="22" fill="white" text-anchor="middle">GPT-4o</text>
  <text x="150" y="158" font-family="Arial" font-size="14" fill="#bfdbfe" text-anchor="middle">$5.00 / 1M in</text>
  <text x="150" y="178" font-family="Arial" font-size="14" fill="#bfdbfe" text-anchor="middle">$15.00 / 1M out</text>
  <text x="150" y="210" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#93c5fd" text-anchor="middle">$0.0048</text>
  <!-- Claude -->
  <rect x="278" y="80" width="168" height="152" rx="14" fill="url(#card2)"/>
  <text x="362" y="130" font-family="Arial" font-weight="bold" font-size="22" fill="white" text-anchor="middle">Claude 3</text>
  <text x="362" y="158" font-family="Arial" font-size="14" fill="#ddd6fe" text-anchor="middle">$3.00 / 1M in</text>
  <text x="362" y="178" font-family="Arial" font-size="14" fill="#ddd6fe" text-anchor="middle">$15.00 / 1M out</text>
  <text x="362" y="210" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#c4b5fd" text-anchor="middle">$0.0032</text>
  <!-- Gemini -->
  <rect x="66" y="252" width="168" height="152" rx="14" fill="url(#card3)"/>
  <text x="150" y="302" font-family="Arial" font-weight="bold" font-size="22" fill="white" text-anchor="middle">Gemini</text>
  <text x="150" y="330" font-family="Arial" font-size="14" fill="#bbf7d0" text-anchor="middle">$1.25 / 1M in</text>
  <text x="150" y="350" font-family="Arial" font-size="14" fill="#bbf7d0" text-anchor="middle">$5.00 / 1M out</text>
  <text x="150" y="382" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#86efac" text-anchor="middle">$0.0015</text>
  <!-- Llama -->
  <rect x="278" y="252" width="168" height="152" rx="14" fill="url(#card4)"/>
  <text x="362" y="302" font-family="Arial" font-weight="bold" font-size="22" fill="white" text-anchor="middle">Llama 3</text>
  <text x="362" y="330" font-family="Arial" font-size="14" fill="#fde68a" text-anchor="middle">$0.20 / 1M in</text>
  <text x="362" y="350" font-family="Arial" font-size="14" fill="#fde68a" text-anchor="middle">$0.20 / 1M out</text>
  <text x="362" y="382" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#fbbf24" text-anchor="middle">$0.0001</text>
  <!-- 타이틀 -->
  <text x="256" y="454" font-family="Arial" font-weight="bold" font-size="20" fill="#a5b4fc" text-anchor="middle">MULTI-MODEL COMPARE</text>
