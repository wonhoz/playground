  <circle cx="397" cy="105" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="417" cy="155" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="395" cy="205" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="419" cy="255" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="397" cy="305" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="417" cy="355" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="395" cy="405" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>

  <!-- 중앙 AI 텍스트 -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="22"
        font-weight="bold" fill="url(#dna_green)" opacity="0.9" filter="url(#glow01)">AI.Clip</text>

  <!-- 배경 글로우 효과 -->
  <circle cx="256" cy="257" r="120" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.08"/>
  <circle cx="256" cy="257" r="150" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.05"/>
</svg>
