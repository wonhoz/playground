<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 계기판: dashboard gauges for CPU/RAM/GPU -->
  <!-- Dashboard frame -->
  <rect x="180" y="300" width="664" height="420" rx="24" fill="#2E7D32" opacity="0.3"/>
  <!-- Gauge 1 - CPU -->
  <circle cx="300" cy="500" r="110" fill="none" stroke="#2E7D32" stroke-width="24"/>
  <path d="M300 500 m-110 0 a110 110 0 0 1 220 0" fill="none" stroke="#81C784" stroke-width="24" stroke-linecap="round"/>
  <line x1="300" y1="500" x2="300" y2="400" stroke="#81C784" stroke-width="10" stroke-linecap="round"/>
  <circle cx="300" cy="500" r="14" fill="#81C784"/>
  <!-- Gauge 2 - RAM (center, larger) -->
  <circle cx="512" cy="480" r="130" fill="none" stroke="#2E7D32" stroke-width="28"/>
  <path d="M512 480 m-130 0 a130 130 0 0 1 112 -65" fill="none" stroke="#81C784" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="480" x2="460" y2="378" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <circle cx="512" cy="480" r="16" fill="#81C784"/>
  <!-- Gauge 3 - GPU -->
  <circle cx="724" cy="500" r="110" fill="none" stroke="#2E7D32" stroke-width="24"/>
  <path d="M724 500 m-110 0 a110 110 0 0 1 77 -77" fill="none" stroke="#81C784" stroke-width="24" stroke-linecap="round"/>
  <line x1="724" y1="500" x2="669" y2="422" stroke="#81C784" stroke-width="10" stroke-linecap="round"/>
  <circle cx="724" cy="500" r="14" fill="#81C784"/>
  <!-- Bottom info bar -->
  <rect x="200" y="650" width="624" height="50" rx="10" fill="#2E7D32" opacity="0.4"/>
  <line x1="240" y1="675" x2="360" y2="675" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="675" x2="584" y2="675" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
  <line x1="650" y1="675" x2="780" y2="675" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
</svg>