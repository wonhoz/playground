<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D1117"/>
  <!-- Layer 2: Request panel -->
  <rect x="140" y="180" width="744" height="260" rx="16" fill="#161B22"/>
  <!-- URL bar -->
  <rect x="175" y="220" width="540" height="60" rx="12" fill="#21262D"/>
  <text x="205" y="260" font-family="Consolas,monospace" font-size="28" fill="#58A6FF">GET /api/users</text>
  <!-- SEND button -->
  <rect x="730" y="220" width="130" height="60" rx="12" fill="#2196F3"/>
  <text x="795" y="259" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle">SEND</text>
  <!-- Layer 3: Response panel with 200 OK badge -->
  <rect x="140" y="470" width="744" height="360" rx="16" fill="#161B22"/>
  <!-- 200 OK badge -->
  <rect x="175" y="510" width="140" height="46" rx="10" fill="#4CAF50"/>
  <text x="245" y="542" font-family="Arial" font-size="30" font-weight="bold" fill="white" text-anchor="middle">200 OK</text>
  <rect x="175" y="580" width="640" height="18" rx="9" fill="#2196F3" opacity="0.3"/>
  <rect x="175" y="610" width="560" height="18" rx="9" fill="white" opacity="0.15"/>
  <rect x="175" y="640" width="600" height="18" rx="9" fill="white" opacity="0.1"/>
</svg>