<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="cal8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4527A0"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
    <linearGradient id="folder8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg8)"/>

  <!-- Layer 2: Large calendar (top half) -->
  <rect x="148" y="148" width="728" height="480" rx="24" fill="white" stroke="#80CBC4" stroke-width="8"/>
  <!-- Calendar header -->
  <rect x="148" y="148" width="728" height="120" rx="24" fill="url(#cal8)"/>
  <rect x="148" y="228" width="728" height="40" fill="url(#cal8)"/>
  <text x="512" y="228" font-family="Arial Black, sans-serif" font-size="84" font-weight="900" fill="white" text-anchor="middle">2024.01</text>

  <!-- Calendar day grid (simplified 4 days) -->
  <!-- Day 1 with photo -->
  <rect x="176" y="296" width="160" height="160" rx="14" fill="#E0F7FA"/>
  <rect x="176" y="296" width="160" height="100" fill="#80CBC4"/>
  <circle cx="230" cy="336" r="28" fill="#FFD600"/>
  <text x="256" y="448" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#4527A0" text-anchor="middle">5</text>

  <!-- Day 2 with photo -->
  <rect x="356" y="296" width="160" height="160" rx="14" fill="#F3E5F5"/>
  <rect x="356" y="296" width="160" height="100" fill="#CE93D8"/>
  <text x="436" y="448" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#4527A0" text-anchor="middle">12</text>

  <!-- Day 3 with photo -->
  <rect x="536" y="296" width="160" height="160" rx="14" fill="#FFF9C4"/>
  <rect x="536" y="296" width="160" height="100" fill="#FFF176"/>
  <text x="616" y="448" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#4527A0" text-anchor="middle">19</text>

  <!-- Day 4 with photo -->
  <rect x="716" y="296" width="132" height="160" rx="14" fill="#FCE4EC"/>
  <rect x="716" y="296" width="132" height="100" fill="#F48FB1"/>
  <text x="782" y="448" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#4527A0" text-anchor="middle">25</text>

  <!-- Calendar ring pins -->
  <circle cx="290" cy="144" r="22" fill="#311B92"/>
  <circle cx="734" cy="144" r="22" fill="#311B92"/>

  <!-- Layer 2b: Three destination folders (bottom) -->
  <!-- Main folder (center) -->
  <g transform="translate(300, 658)">
    <path d="M0,0 L0,270 L424,270 L424,52 L260,52 L234,0 Z" fill="url(#folder8)"/>
    <rect x="0" y="52" width="424" height="218" rx="12" fill="#009688"/>
    <text x="212" y="150" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="white" text-anchor="middle">2024</text>
    <text x="212" y="234" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#B2DFDB" text-anchor="middle">/ JAN</text>
  </g>

  <!-- Arrow from calendar to folder -->
  <path d="M512,628 L512,668" stroke="#4527A0" stroke-width="20" stroke-linecap="round"/>
  <polygon points="512,668 484,640 540,640" fill="#4527A0"/>

  <!-- Layer 3: Photo count bubble -->
  <circle cx="820" cy="660" r="68" fill="#4527A0" stroke="white" stroke-width="8"/>
  <text x="820" y="688" font-family="Arial Black, sans-serif" font-size="66" font-weight="900" fill="white" text-anchor="middle">47</text>
</svg>
