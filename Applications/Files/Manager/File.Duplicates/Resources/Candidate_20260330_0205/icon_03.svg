<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="60%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
    <linearGradient id="file3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 핑크 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg3)"/>

  <!-- Layer 2: 쌍둥이 파일 (미러 이미지) -->
  <!-- 왼쪽 파일 -->
  <rect x="130" y="240" width="300" height="380" rx="18" fill="url(#file3)" stroke="white" stroke-width="6"/>
  <polygon points="360,240 430,310 430,310 360,310" fill="#880E4F"/>
  <rect x="360" y="240" width="70" height="70" rx="8" fill="#880E4F"/>
  <rect x="175" y="370" width="210" height="16" rx="4" fill="#F48FB1" opacity="0.8"/>
  <rect x="175" y="400" width="175" height="16" rx="4" fill="#F48FB1" opacity="0.6"/>
  <rect x="175" y="430" width="195" height="16" rx="4" fill="#F48FB1" opacity="0.5"/>
  <text x="280" y="530" font-family="'Courier New',monospace" font-size="24" fill="#FFCDD2" text-anchor="middle">file.jpg</text>

  <!-- 오른쪽 파일 (미러) -->
  <rect x="594" y="240" width="300" height="380" rx="18" fill="url(#file3)" stroke="white" stroke-width="6"/>
  <polygon points="664,240 664,310 594,310" fill="#880E4F"/>
  <rect x="594" y="240" width="70" height="70" rx="8" fill="#880E4F"/>
  <rect x="639" y="370" width="210" height="16" rx="4" fill="#F48FB1" opacity="0.8"/>
  <rect x="674" y="400" width="175" height="16" rx="4" fill="#F48FB1" opacity="0.6"/>
  <rect x="654" y="430" width="195" height="16" rx="4" fill="#F48FB1" opacity="0.5"/>
  <text x="744" y="530" font-family="'Courier New',monospace" font-size="24" fill="#FFCDD2" text-anchor="middle">file(2).jpg</text>

  <!-- Layer 3: 중앙 = 기호 + 가위 (하나 제거) -->
  <text x="512" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="80" fill="#AD1457" text-anchor="middle" dominant-baseline="middle">=</text>
  <!-- 가위 아이콘 (제거 의미) -->
  <circle cx="512" cy="700" r="68" fill="#D32F2F" stroke="white" stroke-width="8"/>
  <text x="512" y="700" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="60" text-anchor="middle" dominant-baseline="middle">✂</text>
</svg>
