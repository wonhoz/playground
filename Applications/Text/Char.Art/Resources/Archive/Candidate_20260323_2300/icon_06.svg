<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#F59E0B"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Label: BRIGHTNESS -->
    <text x="512" y="200" font-size="52" font-weight="bold" font-family="system-ui" fill="#1F2937" text-anchor="middle">BRIGHTNESS</text>
    <!-- Gradient scale bar label DARK -->
    <text x="160" y="310" font-size="36" font-weight="bold" font-family="system-ui" fill="#1F2937">DARK</text>
    <text x="780" y="310" font-size="36" font-weight="bold" font-family="system-ui" fill="#1F2937">LIGHT</text>
    <!-- Block filled squares - dark to light -->
    <rect x="120" y="330" width="110" height="110" rx="12" fill="#0F172A"/>
    <text x="175" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="#374151" text-anchor="middle">&#x2588;</text>
    <rect x="248" y="330" width="110" height="110" rx="12" fill="#1F2937"/>
    <text x="303" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="#4B5563" text-anchor="middle">&#x2588;</text>
    <rect x="376" y="330" width="110" height="110" rx="12" fill="#374151"/>
    <text x="431" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="#6B7280" text-anchor="middle">&#x2593;</text>
    <rect x="504" y="330" width="110" height="110" rx="12" fill="#6B7280"/>
    <text x="559" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="#9CA3AF" text-anchor="middle">&#x2592;</text>
    <rect x="632" y="330" width="110" height="110" rx="12" fill="#9CA3AF"/>
    <text x="687" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="#D1D5DB" text-anchor="middle">&#x2591;</text>
    <rect x="760" y="330" width="110" height="110" rx="12" fill="#E5E7EB"/>
    <text x="815" y="400" font-size="72" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle"> </text>
    <!-- Char scale row -->
    <text x="120" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#0F172A">@</text>
    <text x="248" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#1F2937">#</text>
    <text x="376" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#374151">$</text>
    <text x="504" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#6B7280">+</text>
    <text x="632" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#9CA3AF">-</text>
    <text x="760" y="530" font-size="64" font-weight="bold" font-family="monospace" fill="#D1D5DB">.</text>
    <!-- Arrow bottom -->
    <line x1="150" y1="620" x2="874" y2="620" stroke="#1F2937" stroke-width="16" stroke-linecap="round"/>
    <polygon points="874,600 920,620 874,640" fill="#1F2937"/>
    <!-- Label chars -->
    <text x="512" y="750" font-size="44" font-weight="bold" font-family="monospace" fill="#1F2937" text-anchor="middle">@#$%+-=. </text>
    <text x="512" y="840" font-size="34" font-weight="bold" font-family="system-ui" fill="#78350F" text-anchor="middle">Brightness Map</text>
  </g>
</svg>
