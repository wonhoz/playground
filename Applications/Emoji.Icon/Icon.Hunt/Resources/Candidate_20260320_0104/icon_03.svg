<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Fishing rod -->
  <line x1="220" y1="200" x2="760" y2="480" stroke="#FF7043" stroke-width="36" stroke-linecap="round"/>
  <!-- Fishing line -->
  <line x1="760" y1="480" x2="760" y2="780" stroke="#FF7043" stroke-width="18" stroke-linecap="round" stroke-dasharray="20 12"/>
  <!-- Hook -->
  <path d="M760 780 Q820 780 820 840 Q820 900 760 900 Q720 900 720 860" fill="none" stroke="#FF7043" stroke-width="40" stroke-linecap="round"/>
  <!-- Icon being hooked -->
  <rect x="640" y="820" width="120" height="120" rx="24" fill="#BF360C" stroke="#FF7043" stroke-width="20"/>
  <!-- Star shape inside hooked icon -->
  <polygon points="700,840 714,876 752,876 722,898 733,934 700,913 667,934 678,898 648,876 686,876" fill="#FF7043" opacity="0.8"/>
</svg>