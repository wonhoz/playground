<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Card stack behind -->
  <rect x="115" y="165" width="300" height="200" rx="14" fill="url(#card2)" stroke="#BF360C" stroke-width="3" opacity="0.7" transform="rotate(8,265,265)"/>
  <rect x="108" y="158" width="300" height="200" rx="14" fill="url(#card2)" stroke="#BF360C" stroke-width="3" opacity="0.85" transform="rotate(4,258,258)"/>
  <!-- Front card -->
  <rect x="100" y="155" width="312" height="205" rx="16" fill="url(#card1)" stroke="#BF360C" stroke-width="4"/>
  <!-- Card top strip -->
  <rect x="100" y="155" width="312" height="36" rx="16" fill="#FF7043"/>
  <rect x="100" y="175" width="312" height="16" fill="#FF7043"/>
  <text x="256" y="180" text-anchor="middle" font-family="monospace" font-size="13" fill="white">FLASHCARD</text>
  <!-- Word on card -->
  <text x="256" y="240" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="36" font-weight="bold" fill="#BF360C">serendipity</text>
  <!-- Phonetic -->
  <text x="256" y="266" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="15" fill="#FF7043">/ˌserənˈdɪpɪti/</text>
  <!-- Divider -->
  <line x1="130" y1="278" x2="382" y2="278" stroke="#FFCCBC" stroke-width="2"/>
  <!-- Korean translation -->
  <text x="256" y="306" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="22" fill="#BF360C">뜻밖의 행운</text>
  <text x="256" y="330" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#FF7043">n. 행복한 우연, 뜻밖의 발견</text>
  <!-- Progress dots -->
  <circle cx="220" cy="390" r="8" fill="#FF7043"/>
  <circle cx="244" cy="390" r="8" fill="#FF7043"/>
  <circle cx="268" cy="390" r="8" fill="white" stroke="#FF7043" stroke-width="2"/>
  <circle cx="292" cy="390" r="8" fill="white" stroke="#FF7043" stroke-width="2"/>
  <!-- Card count -->
  <text x="256" y="440" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="white" opacity="0.8">3 / 24 cards</text>
</svg>
