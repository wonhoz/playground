<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#82b1ff"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <linearGradient id="stream1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff80ab"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <linearGradient id="stream2" x1="0%" y1="0%" x2="0%" y2="100%">
