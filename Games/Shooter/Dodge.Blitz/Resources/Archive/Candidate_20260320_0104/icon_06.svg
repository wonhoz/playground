<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030510"/>
  <!-- Zigzag dodge path -->
  <polyline points="160,800 320,400 480,700 640,300 864,600" fill="none" stroke="#42A5F5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Player dot on path -->
  <circle cx="640" cy="300" r="36" fill="#42A5F5"/>
  <circle cx="640" cy="300" r="22" fill="#030510"/>
  <circle cx="640" cy="300" r="10" fill="#42A5F5"/>
  <!-- Bullet obstacles -->
  <circle cx="280" cy="500" r="24" fill="#0D47A1"/>
  <circle cx="440" cy="600" r="24" fill="#0D47A1"/>
  <circle cx="600" cy="420" r="24" fill="#0D47A1"/>
  <circle cx="760" cy="500" r="24" fill="#0D47A1"/>
  <!-- Speed lines behind player -->
  <line x1="560" y1="280" x2="480" y2="300" stroke="#42A5F5" stroke-width="5" opacity="0.5"/>
  <line x1="560" y1="310" x2="500" y2="330" stroke="#42A5F5" stroke-width="5" opacity="0.4"/>
</svg>
