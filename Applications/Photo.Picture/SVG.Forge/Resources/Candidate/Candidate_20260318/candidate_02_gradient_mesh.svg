<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 그라디언트 메시 에디터 -->
  <!-- 메시 그리드 기반 사각형 -->
  <!-- 3x3 메시 패치 -->
  <path d="M90,100 Q180,90 270,100 Q360,110 430,100 Q435,185 430,260 Q425,335 430,410 Q340,420 260,410 Q175,400 90,410 Q85,325 90,250 Q95,175 90,100 Z" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.3"/>
  <!-- 메시 컨트롤 포인트들 -->
  <!-- 수평선 3개 -->
  <path d="M90,100 Q180,95 260,100 Q340,105 430,100" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
  <path d="M90,255 Q180,248 260,255 Q340,262 430,255" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
  <path d="M90,410 Q180,403 260,410 Q340,417 430,410" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
  <!-- 수직선 3개 -->
  <path d="M90,100 Q85,178 90,255 Q95,332 90,410" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
  <path d="M260,100 Q255,178 260,255 Q265,332 260,410" fill="none" stroke="#C084FC" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <path d="M430,100 Q425,178 430,255 Q435,332 430,410" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
  <!-- 메시 패치 색상 채우기 -->
  <path d="M90,100 Q175,95 260,100 Q255,178 260,255 Q175,248 90,255 Q95,178 90,100 Z" fill="#C084FC" opacity="0.08"/>
  <path d="M260,100 Q345,95 430,100 Q425,178 430,255 Q345,248 260,255 Q265,178 260,100 Z" fill="#A855F7" opacity="0.1"/>
  <path d="M90,255 Q175,248 260,255 Q255,332 260,410 Q175,403 90,410 Q95,332 90,255 Z" fill="#7C3AED" opacity="0.1"/>
  <path d="M260,255 Q345,248 430,255 Q425,332 430,410 Q345,403 260,410 Q265,332 260,255 Z" fill="#C084FC" opacity="0.12"/>
  <!-- 컨트롤 포인트 (원) -->
  <circle cx="90" cy="100" r="7" fill="#C084FC" stroke="#fff" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <circle cx="260" cy="100" r="7" fill="#C084FC" stroke="#fff" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <circle cx="430" cy="100" r="7" fill="#C084FC" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="90" cy="255" r="7" fill="#C084FC" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="260" cy="255" r="9" fill="#FDE047" stroke="#fff" stroke-width="2" filter="url(#glow)" opacity="0.95"/>
  <circle cx="430" cy="255" r="7" fill="#C084FC" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="90" cy="410" r="7" fill="#A855F7" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="260" cy="410" r="7" fill="#A855F7" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="430" cy="410" r="7" fill="#A855F7" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <!-- 선택된 포인트 핸들 -->
  <line x1="220" y1="235" x2="260" y2="255" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <line x1="300" y1="275" x2="260" y2="255" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <circle cx="220" cy="235" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="300" cy="275" r="4" fill="#FDE047" opacity="0.8"/>
  <!-- 하단 -->
  <rect x="130" y="432" width="252" height="48" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="461" text-anchor="middle" font-size="14" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">GRADIENT MESH</text>
</svg>
