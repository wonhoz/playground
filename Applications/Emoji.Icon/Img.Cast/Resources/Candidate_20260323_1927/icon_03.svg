<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- Big star (SVG source) on left -->
  <polygon points="260,210 295,320 410,320 320,385 355,495 260,430 165,495 200,385 110,320 225,320" fill="#FBBF24" stroke="white" stroke-width="12" stroke-linejoin="round"/>
  <text x="260" y="560" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">SVG</text>
  <!-- Arrow -->
  <line x1="435" y1="370" x2="570" y2="370" stroke="white" stroke-width="52" stroke-linecap="round"/>
  <polygon points="560,318 640,370 560,422" fill="white"/>
  <!-- Multi-size grid on right -->
  <rect x="660" y="210" width="240" height="240" rx="14" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="8"/>
  <!-- 16px star -->
  <polygon points="700,250 706,268 724,268 711,278 716,296 700,286 684,296 689,278 676,268 694,268" fill="#FBBF24"/>
  <text x="712" y="310" font-family="Arial, sans-serif" font-size="22" fill="white">16px</text>
  <!-- 32px star -->
  <polygon points="790,246 799,272 826,272 806,288 814,314 790,298 766,314 774,288 754,272 781,272" fill="#FBBF24"/>
  <text x="793" y="322" font-family="Arial, sans-serif" font-size="22" fill="white">32px</text>
  <!-- 48px star -->
  <polygon points="700,360 712,395 748,395 720,417 730,452 700,432 670,452 680,417 652,395 688,395" fill="#FBBF24"/>
  <text x="700" y="468" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">48px</text>
  <!-- 256px star -->
  <polygon points="820,356 836,404 884,404 848,432 862,480 820,454 778,480 792,432 756,404 804,404" fill="#FBBF24"/>
  <text x="820" y="496" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">256px</text>
  <!-- Bottom label -->
  <text x="512" y="840" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">MULTI-SIZE</text>
</svg>