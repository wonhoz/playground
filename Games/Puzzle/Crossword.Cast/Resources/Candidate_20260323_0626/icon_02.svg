<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 머리 속 단어들 — 사고 거품 | 실루엣/캐릭터 | #1A0A28 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A28"/>
  <!-- Layer 2: Head silhouette with thought bubbles containing crossword words -->
  <!-- Head silhouette -->
  <circle cx="440" cy="580" r="150" fill="#2A1A40"/>
  <rect x="340" y="650" width="200" height="120" rx="0" fill="#2A1A40"/>
  <!-- Thought bubble chain -->
  <circle cx="590" cy="500" r="16" fill="#3B2060"/>
  <circle cx="624" cy="464" r="20" fill="#3B2060"/>
  <circle cx="660" cy="420" r="26" fill="#3B2060"/>
  <!-- Main thought bubble -->
  <ellipse cx="720" cy="330" rx="200" ry="140" fill="#2A1840" stroke="#7C3AED" stroke-width="4"/>
  <!-- Word tiles in thought bubble -->
  <rect x="556" y="260" width="60" height="52" rx="6" fill="#3B1E6A"/>
  <text x="586" y="292" font-family="Arial,sans-serif" font-size="28" fill="#DDD6FE" text-anchor="middle" font-weight="bold">가</text>
  <rect x="622" y="260" width="60" height="52" rx="6" fill="#1E3A5C"/>
  <text x="652" y="292" font-family="Arial,sans-serif" font-size="28" fill="#93C5FD" text-anchor="middle" font-weight="bold">나</text>
  <rect x="688" y="260" width="60" height="52" rx="6" fill="#3B1E6A"/>
  <text x="718" y="292" font-family="Arial,sans-serif" font-size="28" fill="#DDD6FE" text-anchor="middle" font-weight="bold">다</text>
  <rect x="754" y="260" width="60" height="52" rx="6" fill="#3B1E6A"/>
  <text x="784" y="292" font-family="Arial,sans-serif" font-size="28" fill="#DDD6FE" text-anchor="middle" font-weight="bold">라</text>
  <!-- Second row in bubble -->
  <rect x="622" y="318" width="60" height="52" rx="6" fill="#3B1E6A"/>
  <text x="652" y="350" font-family="Arial,sans-serif" font-size="28" fill="#DDD6FE" text-anchor="middle" font-weight="bold">마</text>
  <rect x="688" y="318" width="60" height="52" rx="6" fill="#1E3A5C"/>
  <text x="718" y="350" font-family="Arial,sans-serif" font-size="28" fill="#93C5FD" text-anchor="middle" font-weight="bold">바</text>
  <rect x="754" y="318" width="60" height="52" rx="6" fill="#3B1E6A"/>
  <text x="784" y="350" font-family="Arial,sans-serif" font-size="28" fill="#DDD6FE" text-anchor="middle" font-weight="bold">사</text>
  <!-- Layer 3: Eyes (thinking expression) -->
  <circle cx="412" cy="560" r="22" fill="#DDD6FE"/>
  <circle cx="468" cy="560" r="22" fill="#DDD6FE"/>
  <circle cx="416" cy="558" r="10" fill="#1A0A28"/>
  <circle cx="472" cy="558" r="10" fill="#1A0A28"/>
  <!-- Upward gaze -->
  <circle cx="418" cy="554" r="4" fill="#7C3AED"/>
  <circle cx="474" cy="554" r="4" fill="#7C3AED"/>
</svg>
