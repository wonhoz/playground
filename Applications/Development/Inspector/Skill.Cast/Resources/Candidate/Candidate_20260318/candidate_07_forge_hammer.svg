<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040200"/>
      <stop offset="100%" stop-color="#080400"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Forge anvil -->
  <rect x="140" y="360" width="232" height="50" rx="8" fill="#1F2937"/>
  <rect x="160" y="340" width="192" height="28" rx="4" fill="#374151"/>
  <rect x="180" y="400" width="152" height="30" rx="6" fill="#111827"/>
  <!-- Anvil legs -->
  <rect x="196" y="430" width="40" height="30" rx="4" fill="#111827"/>
  <rect x="276" y="430" width="40" height="30" rx="4" fill="#111827"/>
  <!-- Hot skill badge on anvil (being forged) -->
  <rect x="196" y="310" width="120" height="50" rx="8" fill="#450a0a" stroke="#EF4444" stroke-width="2"/>
  <text x="256" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#FCA5A5">SKILL FORGE</text>
  <text x="256" y="350" text-anchor="middle" font-family="monospace" font-size="12" fill="#EF4444">★★★★★</text>
  <!-- Glow under badge -->
  <ellipse cx="256" cy="368" rx="60" ry="8" fill="#EF4444" opacity="0.2"/>
  <!-- Hammer -->
  <rect x="310" y="180" width="50" height="90" rx="8" fill="url(#metal)"/>
  <rect x="310" y="200" width="50" height="50" rx="4" fill="#6B7280"/>
  <rect x="326" y="268" width="18" height="110" rx="6" fill="#8B4513"/>
  <!-- Hammer head shine -->
  <rect x="314" y="184" width="14" height="40" rx="3" fill="#D1D5DB" opacity="0.4"/>
  <!-- Impact sparks -->
  <line x1="256" y1="310" x2="220" y2="280" stroke="#F97316" stroke-width="2" opacity="0.7"/>
  <line x1="256" y1="310" x2="246" y2="274" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="310" x2="275" y2="278" stroke="#FCD34D" stroke-width="1.5" opacity="0.7"/>
  <circle cx="218" cy="277" r="4" fill="#F97316" opacity="0.7"/>
  <circle cx="244" cy="270" r="3" fill="#FCD34D" opacity="0.6"/>
  <circle cx="278" cy="274" r="4" fill="#EF4444" opacity="0.6"/>
  <!-- Smoke/steam from forging -->
  <circle cx="190" cy="270" r="10" fill="#374151" opacity="0.3"/>
  <circle cx="175" cy="250" r="14" fill="#4B5563" opacity="0.2"/>
  <circle cx="165" cy="228" r="18" fill="#374151" opacity="0.15"/>
  <!-- Title -->
  <text x="256" y="496" text-anchor="middle" font-family="monospace" font-size="11" fill="#EF4444" opacity="0.6">SKILL FORGE</text>
</svg>
