<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- RAM stick -->
  <rect x="215" y="330" width="594" height="120" rx="14" fill="#4C1D95"/>
  <rect x="240" y="350" width="544" height="80" rx="8" fill="#5B21B6"/>
  <!-- RAM notch -->
  <rect x="498" y="330" width="28" height="30" rx="4" fill="#3C1A7E"/>
  <!-- RAM chips on stick -->
  <rect x="270" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="338" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="406" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="474" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="542" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="610" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <rect x="678" y="364" width="52" height="52" rx="6" fill="#7C3AED"/>
  <!-- Magnifying glass over RAM -->
  <circle cx="730" cy="620" r="190" fill="none" stroke="#7C3AED" stroke-width="32"/>
  <circle cx="730" cy="620" r="154" fill="#EDE9FE" opacity="0.8"/>
  <!-- RAM detail visible through lens -->
  <rect x="594" y="566" width="272" height="108" rx="12" fill="#5B21B6" opacity="0.6"/>
  <rect x="618" y="582" width="44" height="76" rx="6" fill="#A78BFA"/>
  <rect x="674" y="582" width="44" height="76" rx="6" fill="#C4B5FD"/>
  <rect x="730" y="582" width="44" height="76" rx="6" fill="#A78BFA"/>
  <rect x="786" y="582" width="44" height="76" rx="6" fill="#8B5CF6"/>
  <!-- Handle -->
  <line x1="876" y1="766" x2="956" y2="846" stroke="#6D28D9" stroke-width="36" stroke-linecap="round"/>
  <!-- Memory usage bar -->
  <text x="215" y="590" font-family="Arial,sans-serif" font-size="40" fill="#6D28D9">RAM:</text>
  <rect x="290" y="556" width="360" height="44" rx="10" fill="#EDE9FE"/>
  <rect x="290" y="556" width="234" height="44" rx="10" fill="#7C3AED"/>
  <text x="528" y="590" font-family="Arial,sans-serif" font-size="40" fill="#6D28D9">65%</text>
</svg>
