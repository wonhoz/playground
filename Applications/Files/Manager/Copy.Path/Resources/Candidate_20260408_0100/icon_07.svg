<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: warm cream -->
  <rect width="1024" height="1024" rx="190" fill="#FFF7ED"/>

  <!-- Clipboard shadow -->
  <rect x="260" y="248" width="510" height="598" rx="28" fill="#FDBA74" opacity="0.4"/>

  <!-- Clipboard body: coral/red -->
  <rect x="248" y="234" width="510" height="598" rx="28" fill="#EF4444"/>

  <!-- Clipboard clip bar -->
  <rect x="374" y="172" width="258" height="110" rx="18" fill="#B91C1C"/>
  <rect x="408" y="188" width="190" height="74" rx="12" fill="#DC2626"/>
  <circle cx="503" cy="225" r="20" fill="#EF4444"/>

  <!-- White content area on clipboard -->
  <rect x="272" y="360" width="462" height="420" rx="16" fill="white"/>

  <!-- "PATH" big bold text -->
  <text x="503" y="518" font-family="Arial Black,Arial" font-size="148" fill="#1D4ED8" font-weight="900" text-anchor="middle">PATH</text>

  <!-- Underline accent -->
  <rect x="306" y="540" width="394" height="10" rx="5" fill="#3B82F6"/>

  <!-- Sub-label -->
  <text x="503" y="618" font-family="Arial,sans-serif" font-size="36" fill="#6B7280" text-anchor="middle">Copy as any format</text>

  <!-- Small copy icon bottom right of clipboard -->
  <circle cx="700" cy="770" r="52" fill="#1D4ED8"/>
  <rect x="672" y="746" width="36" height="44" rx="6" fill="white" opacity="0.6"/>
  <rect x="686" y="732" width="36" height="44" rx="6" fill="white"/>
  <line x1="696" y1="750" x2="714" y2="750" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
  <line x1="696" y1="762" x2="714" y2="762" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
</svg>
