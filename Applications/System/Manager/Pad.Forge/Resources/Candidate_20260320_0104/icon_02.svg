<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
<!-- 컨셉: 포스트잇 접착 -->
<!-- 포스트잇 그림자 -->
<rect x="320" y="300" width="400" height="380" rx="8" fill="#1A1000" opacity="0.6" transform="translate(12, 12)"/>
<!-- 포스트잇 메인 (살짝 기울어짐) -->
<rect x="280" y="280" width="400" height="380" rx="8" fill="#F9A825" transform="rotate(-3, 480, 470)"/>
<!-- 접착 부분 (상단 살짝 어두움) -->
<rect x="280" y="280" width="400" height="52" rx="8" fill="#FFE082" opacity="0.6" transform="rotate(-3, 480, 306)"/>
<!-- 포스트잇 내용 줄 -->
<line x1="310" y1="390" x2="650" y2="380" stroke="#0A0800" stroke-width="18" stroke-linecap="round" opacity="0.4" transform="rotate(-3, 480, 385)"/>
<line x1="310" y1="450" x2="610" y2="440" stroke="#0A0800" stroke-width="18" stroke-linecap="round" opacity="0.3" transform="rotate(-3, 480, 445)"/>
<line x1="310" y1="510" x2="630" y2="500" stroke="#0A0800" stroke-width="18" stroke-linecap="round" opacity="0.4" transform="rotate(-3, 480, 505)"/>
<line x1="310" y1="570" x2="540" y2="562" stroke="#0A0800" stroke-width="18" stroke-linecap="round" opacity="0.3" transform="rotate(-3, 480, 566)"/>
<!-- 접는 귀퉁이 (우하단) -->
<path d="M 620 630 L 680 630 L 680 660 Q 650 700 620 630 Z" fill="#1A1000" opacity="0.4" transform="rotate(-3, 650, 645)"/>
<!-- 두 번째 포스트잇 (뒤에 살짝) -->
<rect x="340" y="650" width="360" height="80" rx="8" fill="#FFE082" opacity="0.5" transform="rotate(5, 520, 690)"/>
<!-- 세 번째 포스트잇 흔적 -->
<rect x="280" y="730" width="340" height="60" rx="8" fill="#F9A825" opacity="0.3" transform="rotate(-6, 450, 760)"/>
</svg>
