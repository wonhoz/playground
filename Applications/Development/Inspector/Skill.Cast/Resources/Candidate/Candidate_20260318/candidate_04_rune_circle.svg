  <line x1="185" y1="185" x2="327" y2="327" stroke="#0891B2" stroke-width="0.8" opacity="0.2"/>
  <line x1="327" y1="185" x2="185" y2="327" stroke="#0891B2" stroke-width="0.8" opacity="0.2"/>
  <!-- 8 skill nodes at cardinal + intercardinal points -->
