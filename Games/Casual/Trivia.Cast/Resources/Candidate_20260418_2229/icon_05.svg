<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background broadcast red -->
  <defs>
    <radialGradient id="bg05" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: Broadcast tower / antenna + signal waves -->
  <!-- Tower base -->
  <polygon points="512 800 440 900 584 900" fill="#C62828"/>
  <!-- Tower body -->
  <rect x="496" y="400" width="32" height="400" rx="8" fill="#D32F2F"/>
  <!-- Tower arms -->
  <line x1="370" y1="580" x2="654" y2="580" stroke="#D32F2F" stroke-width="20" stroke-linecap="round"/>
  <line x1="420" y1="500" x2="604" y2="500" stroke="#D32F2F" stroke-width="16" stroke-linecap="round"/>
  <line x1="460" y1="440" x2="564" y2="440" stroke="#D32F2F" stroke-width="14" stroke-linecap="round"/>
  <!-- Tower tip (star/beacon) -->
  <circle cx="512" cy="390" r="30" fill="#FF1744"/>
  <circle cx="512" cy="390" r="18" fill="#FFCDD2" opacity="0.9"/>
  <!-- Signal arcs (knowledge broadcasting) -->
  <path d="M300 340 Q512 160 724 340" fill="none" stroke="#FF1744" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <path d="M200 250 Q512 0 824 250" fill="none" stroke="#FF5252" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M400 420 Q512 300 624 420" fill="none" stroke="#FF8A80" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <!-- Layer 3: CAST label + knowledge bubbles -->
  <rect x="310" y="830" width="404" height="90" rx="20" fill="#B71C1C"/>
  <text x="512" y="890" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#FFCDD2" text-anchor="middle">CAST</text>
  <!-- Question mark bubbles floating up -->
  <circle cx="280" cy="460" r="42" fill="#FF8A80" opacity="0.8"/>
  <text x="280" y="479" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
  <circle cx="744" cy="460" r="36" fill="#FF8A80" opacity="0.7"/>
  <text x="744" y="477" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
</svg>
