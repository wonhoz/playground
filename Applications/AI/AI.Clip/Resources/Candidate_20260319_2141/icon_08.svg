<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Neon clipboard minimal — flat modern tray icon style -->
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="#050510"/>
  <!-- Clipboard outline only (bold outline style) -->
  <rect x="260" y="220" width="504" height="620" rx="32" fill="none" stroke="#40C4FF" stroke-width="36"/>
  <!-- Top clip -->
  <rect x="376" y="182" width="272" height="80" rx="18" fill="#40C4FF"/>
  <rect x="428" y="158" width="168" height="80" rx="18" fill="#0D47A1"/>
  <!-- Three content lines — thick minimal -->
  <rect x="330" y="380" width="364" height="30" rx="15" fill="#40C4FF" opacity="0.9"/>
  <rect x="330" y="450" width="290" height="30" rx="15" fill="#40C4FF" opacity="0.55"/>
  <rect x="330" y="520" width="324" height="30" rx="15" fill="#40C4FF" opacity="0.55"/>
  <!-- AI dot trio (bottom center) -->
  <circle cx="432" cy="640" r="20" fill="#40C4FF"/>
  <circle cx="512" cy="640" r="20" fill="#40C4FF" opacity="0.7"/>
  <circle cx="592" cy="640" r="20" fill="#40C4FF" opacity="0.45"/>
</svg>
