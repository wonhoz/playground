<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff80ab"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#00acc1"/>
    </radialGradient>
    <linearGradient id="landGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clouds/bubbles decoration -->
  <circle cx="80" cy="100" r="30" fill="white" opacity="0.5"/>
  <circle cx="110" cy="90" r="22" fill="white" opacity="0.4"/>
  <circle cx="55" cy="88" r="20" fill="white" opacity="0.4"/>
  <circle cx="420" cy="120" r="25" fill="white" opacity="0.4"/>
  <circle cx="450" cy="108" r="18" fill="white" opacity="0.35"/>
  <!-- Globe cute style -->
  <circle cx="256" cy="230" r="140" fill="url(#globeGrad)"/>
  <!-- Land cute shapes -->
  <ellipse cx="225" cy="195" rx="50" ry="35" fill="url(#landGrad)"/>
  <ellipse cx="290" cy="210" rx="40" ry="28" fill="url(#landGrad)"/>
  <ellipse cx="205" cy="255" rx="32" ry="22" fill="url(#landGrad)"/>
  <ellipse cx="272" cy="268" rx="28" ry="20" fill="url(#landGrad)"/>
  <!-- Globe cute face -->
  <circle cx="220" cy="200" r="6" fill="#5d4037"/>
  <circle cx="250" cy="198" r="6" fill="#5d4037"/>
  <!-- Smile -->
  <path d="M215,220 Q235,236 258,220" fill="none" stroke="#5d4037" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="205" cy="218" rx="12" ry="7" fill="#ff8a80" opacity="0.6"/>
  <ellipse cx="265" cy="215" rx="12" ry="7" fill="#ff8a80" opacity="0.6"/>
  <!-- Stars around globe -->
  <polygon points="340,120 346,136 363,136 350,146 355,163 340,153 325,163 330,146 317,136 334,136" fill="#ffee58"/>
  <polygon points="160,120 164,132 177,132 167,140 171,153 160,145 149,153 153,140 143,132 156,132" fill="#ffee58" opacity="0.8"/>
  <!-- Question bubbles -->
  <circle cx="395" cy="190" r="32" fill="white" opacity="0.9"/>
  <text x="395" y="200" font-family="Arial" font-size="32" font-weight="900" fill="#e91e63" text-anchor="middle">?</text>
  <!-- Answer bubbles -->
  <ellipse cx="130" cy="360" rx="65" ry="30" fill="white" opacity="0.85"/>
  <text x="130" y="368" font-family="Arial" font-size="14" font-weight="bold" fill="#00acc1" text-anchor="middle">Seoul</text>
  <ellipse cx="270" cy="370" rx="65" ry="30" fill="#ffee58"/>
  <text x="270" y="378" font-family="Arial" font-size="14" font-weight="bold" fill="#5d4037" text-anchor="middle">Tokyo ✓</text>
  <ellipse cx="410" cy="360" rx="65" ry="30" fill="white" opacity="0.85"/>
  <text x="410" y="368" font-family="Arial" font-size="14" font-weight="bold" fill="#00acc1" text-anchor="middle">Beijing</text>
  <!-- Title cute style -->
  <text x="256" y="452" font-family="Arial" font-size="38" font-weight="900" fill="white" text-anchor="middle">GEO</text>
  <text x="256" y="490" font-family="Arial" font-size="24" font-weight="bold" fill="#fff9c4" text-anchor="middle">QUIZ!</text>
</svg>
