<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Prompt.Forge — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1A0A2E; font-family: 'Segoe UI', sans-serif; color: #E9D5FF; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #F9A8D4; letter-spacing: 2px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #A78BFA; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #2A1040; border: 2px solid #7C3AED; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #F9A8D4; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #DDD6FE; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #A78BFA; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #4C1D95; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>⚡ Prompt.Forge</h1>
<p class="subtitle">AI 프롬프트 라이브러리 관리 앱 — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">프롬프트 카드 라이브러리</div>
    <span class="tag literal">literal</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#F97316"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">AI 따옴표 대화창</div>
    <span class="tag literal">literal</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#5B21B6"></div>
      <div class="swatch" style="background:#EDE9FE"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">프롬프트 단련 (forge)</div>
    <span class="tag metaphor">metaphor</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#EC4899"></div>
      <div class="swatch" style="background:#1E1B4B"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">AI 마법 주문</div>
    <span class="tag metaphor">metaphor</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#1E1B4B"></div>
      <div class="swatch" style="background:#F59E0B"></div>
      <div class="swatch" style="background:#22D3EE"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">버전 히스토리 타임라인</div>
    <span class="tag hybrid">hybrid</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#0F766E"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
</div>
</body>
</html>
