<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark navy -->
  <rect width="1024" height="1024" rx="200" fill="#080818"/>
  <!-- Glow rays emanating from cursor tip -->
  <line x1="340" y1="340" x2="220" y2="220" stroke="#69F0AE" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="340" y1="340" x2="200" y2="350" stroke="#69F0AE" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="340" y1="340" x2="330" y2="200" stroke="#69F0AE" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- Motion trail -->
  <path d="M820 820 Q680 700 520 560" stroke="#00BCD4" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M820 820 Q700 680 560 520" stroke="#00BCD4" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Mouse cursor arrow (large, filled) -->
  <polygon points="340,340 340,680 444,580 520,740 590,710 514,548 660,548" fill="#00BCD4" stroke="#E0F7FA" stroke-width="16" stroke-linejoin="round"/>
  <!-- Cursor tip highlight -->
  <circle cx="340" cy="340" r="28" fill="#69F0AE"/>
  <!-- Active indicator: bright dot bottom-right -->
  <circle cx="800" cy="750" r="60" fill="#00C853" stroke="#B9F6CA" stroke-width="14"/>
  <circle cx="800" cy="750" r="26" fill="#B9F6CA"/>
</svg>
