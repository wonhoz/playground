  <rect x="200" y="195" width="20" height="165" rx="5" fill="url(#bar)" opacity="0.8"/>
  <rect x="230" y="175" width="20" height="185" rx="5" fill="url(#bar)" opacity="0.9"/>
  <rect x="260" y="180" width="20" height="180" rx="5" fill="url(#bar)" opacity="0.85"/>
