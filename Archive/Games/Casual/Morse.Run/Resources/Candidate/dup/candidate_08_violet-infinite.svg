<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0020"/>
      <stop offset="100%" stop-color="#1A0040"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="50%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Infinite perspective track -->
  <path d="M 60 400 L 200 260 L 312 260 L 452 400 Z" fill="#1A0040" stroke="#7B2FBE" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="260" x2="256" y2="180" stroke="#C77DFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="312" y1="260" x2="256" y2="180" stroke="#C77DFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Morse obstacles in perspective -->
  <circle cx="180" cy="310" r="16" fill="#C77DFF" opacity="0.9"/>
  <rect x="218" y="298" width="36" height="24" rx="6" fill="#C77DFF" opacity="0.9"/>
  <circle cx="290" cy="310" r="16" fill="#C77DFF" opacity="0.9"/>
  <rect x="314" y="298" width="36" height="24" rx="6" fill="#C77DFF" opacity="0.9"/>
  <!-- Runner -->
  <circle cx="256" cy="210" r="20" fill="#E0AAFF"/>
  <line x1="256" y1="230" x2="256" y2="260" stroke="#E0AAFF" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="244" x2="236" y2="232" stroke="#E0AAFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="244" x2="276" y2="238" stroke="#E0AAFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="240" y2="284" stroke="#E0AAFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="272" y2="280" stroke="#E0AAFF" stroke-width="5" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="100" cy="140" r="3" fill="#C77DFF" opacity="0.7"/>
  <circle cx="400" cy="120" r="4" fill="#C77DFF" opacity="0.6"/>
  <circle cx="150" cy="180" r="2" fill="#C77DFF" opacity="0.5"/>
  <circle cx="380" cy="160" r="3" fill="#C77DFF" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#C77DFF">MORSE.RUN</text>
</svg>