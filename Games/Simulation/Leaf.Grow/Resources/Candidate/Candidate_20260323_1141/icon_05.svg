<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 선셋 오렌지 -->
  <rect width="1024" height="1024" rx="180" fill="#F57F17"/>
  <!-- Layer 2: 햇빛 + 잎 광합성 -->
  <!-- 태양 (우상) -->
  <circle cx="780" cy="260" r="130" fill="#FFFF00" opacity="0.9"/>
  <circle cx="780" cy="260" r="100" fill="#FFCC02"/>
  <!-- 태양 광선들 -->
  <line x1="780" y1="120" x2="780" y2="80" stroke="#FFCC02" stroke-width="12" stroke-linecap="round"/>
  <line x1="920" y1="260" x2="960" y2="260" stroke="#FFCC02" stroke-width="12" stroke-linecap="round"/>
  <line x1="870" y1="170" x2="898" y2="142" stroke="#FFCC02" stroke-width="10" stroke-linecap="round"/>
  <line x1="870" y1="350" x2="898" y2="378" stroke="#FFCC02" stroke-width="10" stroke-linecap="round"/>
  <line x1="690" y1="170" x2="662" y2="142" stroke="#FFCC02" stroke-width="10" stroke-linecap="round"/>
  <!-- 빛 화살표들 (잎으로) -->
  <line x1="700" y1="300" x2="600" y2="420" stroke="#FFFF00" stroke-width="6" stroke-linecap="round" opacity="0.6" stroke-dasharray="15,10"/>
  <line x1="680" y1="360" x2="560" y2="480" stroke="#FFFF00" stroke-width="6" stroke-linecap="round" opacity="0.5" stroke-dasharray="15,10"/>
  <!-- 나무 -->
  <line x1="380" y1="840" x2="380" y2="540" stroke="#5D4037" stroke-width="20" stroke-linecap="round"/>
  <line x1="380" y1="640" x2="300" y2="560" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
  <line x1="380" y1="610" x2="460" y2="540" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
  <!-- 잎 관 (빛 받아 밝음) -->
  <circle cx="380" cy="480" r="160" fill="#2E7D32"/>
  <circle cx="280" cy="500" r="100" fill="#388E3C"/>
  <circle cx="480" cy="480" r="120" fill="#43A047"/>
  <circle cx="380" cy="380" r="120" fill="#4CAF50"/>
  <!-- 잎 반짝임 -->
  <circle cx="340" cy="400" r="20" fill="#A5D6A7" opacity="0.7"/>
  <circle cx="440" cy="430" r="16" fill="#C8E6C9" opacity="0.6"/>
  <!-- 땅 -->
  <rect x="120" y="840" width="784" height="100" rx="12" fill="#4E342E"/>
  <!-- Layer 3: -->
  <text x="512" y="980" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#FFF9C4" text-anchor="middle">LEAF.GROW</text>
</svg>
