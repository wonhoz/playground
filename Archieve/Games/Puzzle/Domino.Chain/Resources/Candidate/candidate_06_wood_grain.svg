<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1006"/>
      <stop offset="100%" stop-color="#2A1A08"/>
    </linearGradient>
    <linearGradient id="wood1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8882A"/>
      <stop offset="50%" stop-color="#A06820"/>
      <stop offset="100%" stop-color="#884C10"/>
    </linearGradient>
    <linearGradient id="wood2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0A040"/>
      <stop offset="50%" stop-color="#C07828"/>
      <stop offset="100%" stop-color="#A05A14"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wood plank floor -->
  <rect x="40" y="305" width="432" height="15" rx="3" fill="#5A3010" opacity="0.8"/>
  <rect x="40" y="318" width="432" height="8" rx="2" fill="#3A1A05" opacity="0.6"/>
  <!-- Wood grain lines on floor -->
  <line x1="60" y1="308" x2="180" y2="316" stroke="#704020" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="307" x2="320" y2="315" stroke="#704020" stroke-width="1" opacity="0.4"/>
  <line x1="340" y1="308" x2="460" y2="316" stroke="#704020" stroke-width="1" opacity="0.4"/>
  <!-- Dominos with wood texture -->
  <rect x="72" y="190" width="48" height="116" rx="8" fill="url(#wood1)" stroke="#5A3010" stroke-width="2.5"/>
  <line x1="72" y1="248" x2="120" y2="248" stroke="#3A1A05" stroke-width="2"/>
  <circle cx="88" cy="218" r="5" fill="#1A0A00"/>
  <circle cx="104" cy="218" r="5" fill="#1A0A00"/>
  <circle cx="96" cy="270" r="5" fill="#1A0A00"/>
  <rect x="162" y="190" width="48" height="116" rx="8" fill="url(#wood2)" stroke="#5A3010" stroke-width="2.5"/>
  <line x1="162" y1="248" x2="210" y2="248" stroke="#3A1A05" stroke-width="2"/>
  <circle cx="178" cy="218" r="5" fill="#1A0A00"/>
  <circle cx="194" cy="270" r="5" fill="#1A0A00"/>
  <circle cx="178" cy="270" r="5" fill="#1A0A00"/>
  <circle cx="194" cy="218" r="5" fill="#1A0A00"/>
  <!-- Tilting -->
  <g transform="rotate(-30 281 280)">
    <rect x="257" y="190" width="48" height="116" rx="8" fill="url(#wood1)" stroke="#5A3010" stroke-width="2.5"/>
    <line x1="257" y1="248" x2="305" y2="248" stroke="#3A1A05" stroke-width="2"/>
    <circle cx="273" cy="216" r="5" fill="#1A0A00"/>
    <circle cx="289" cy="216" r="5" fill="#1A0A00"/>
    <circle cx="281" cy="248" r="5" fill="#1A0A00"/>
    <circle cx="273" cy="278" r="5" fill="#1A0A00"/>
    <circle cx="289" cy="278" r="5" fill="#1A0A00"/>
  </g>
  <!-- Fallen flat -->
  <rect x="330" y="283" width="116" height="48" rx="8" fill="url(#wood2)" stroke="#5A3010" stroke-width="2.5"/>
  <line x1="388" y1="283" x2="388" y2="331" stroke="#3A1A05" stroke-width="2"/>
  <circle cx="359" cy="299" r="5" fill="#1A0A00"/>
  <circle cx="359" cy="315" r="5" fill="#1A0A00"/>
  <circle cx="410" cy="307" r="5" fill="#1A0A00"/>
  <!-- Dust puff -->
  <circle cx="330" cy="305" r="18" fill="#C07030" opacity="0.12"/>
  <circle cx="330" cy="305" r="10" fill="#D08040" opacity="0.1"/>
  <text x="256" y="455" font-family="Georgia" font-size="26" font-weight="bold" fill="#C8882A" text-anchor="middle">DOMINO·CHAIN</text>
</svg>
