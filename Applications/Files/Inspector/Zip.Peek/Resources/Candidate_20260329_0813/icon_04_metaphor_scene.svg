  <!-- Window control dots -->
  <circle cx="162" cy="216" r="8" fill="#EF4444"/>
  <circle cx="188" cy="216" r="8" fill="#F59E0B"/>
  <circle cx="214" cy="216" r="8" fill="#22C55E"/>
