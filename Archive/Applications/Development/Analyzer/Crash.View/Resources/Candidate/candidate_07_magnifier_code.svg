<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="lens" cx="40%" cy="35%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#0D001A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code background lines (behind magnifier) -->
  <g font-family="monospace" font-size="11" fill="#7B1FA2" opacity="0.5">
    <text x="60" y="105">void CrashHandler::Analyze(DumpFile* dump) {</text>
    <text x="60" y="121">  auto stack = dump-&gt;GetStackTrace();</text>
    <text x="60" y="137">  for (auto&amp; frame : stack.frames) {</text>
    <text x="60" y="153">    if (frame.IsException()) {</text>
    <text x="60" y="169">      Report(frame.address, frame.code);</text>
    <text x="60" y="185">    }</text>
    <text x="60" y="201">  }</text>
    <text x="60" y="217">}</text>
    <text x="60" y="380">// EXCEPTION_ACCESS_VIOLATION</text>
    <text x="60" y="396">// at 0x00007FFF`DEADBEEF</text>
    <text x="60" y="412">// RIP: 0x00007FFF`C0DE0000</text>
  </g>
  <!-- Magnifier circle -->
  <circle cx="270" cy="270" r="160" fill="#1A0030" stroke="#CE93D8" stroke-width="8"/>
  <circle cx="270" cy="270" r="150" fill="none" stroke="#9C27B0" stroke-width="3" opacity="0.4"/>
  <!-- Code inside magnifier (enlarged/highlighted) -->
  <text x="180" y="210" font-family="monospace" font-size="14" fill="#CE93D8">void Analyze(</text>
  <text x="168" y="232" font-family="monospace" font-size="14" fill="#CE93D8">  DumpFile* dump)</text>
  <!-- Error line highlight -->
  <rect x="170" y="245" width="200" height="22" rx="3" fill="#FF1744" opacity="0.2"/>
  <text x="175" y="261" font-family="monospace" font-size="14" fill="#FF5252">  Report(addr, code);</text>
  <text x="168" y="285" font-family="monospace" font-size="14" fill="#CE93D8">}</text>
  <text x="185" y="310" font-family="monospace" font-size="13" fill="#FF9800">// FAULT HERE ^</text>
  <!-- Lens highlight -->
  <circle cx="220" cy="220" r="28" fill="white" opacity="0.06"/>
  <!-- Magnifier handle -->
  <line x1="396" y1="396" x2="460" y2="460" stroke="#CE93D8" stroke-width="18" stroke-linecap="round"/>
</svg>
