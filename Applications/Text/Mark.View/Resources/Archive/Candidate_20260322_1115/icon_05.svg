<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background — vivid violet -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: Left side — raw # hash (small, dimmer) -->
  <!-- # horizontal bars -->
  <rect x="122" y="362" width="212" height="44" rx="22" fill="white" opacity="0.45"/>
  <rect x="122" y="430" width="212" height="44" rx="22" fill="white" opacity="0.45"/>
  <!-- # vertical bars -->
  <rect x="172" y="296" width="44" height="244" rx="22" fill="white" opacity="0.45"/>
  <rect x="272" y="296" width="44" height="244" rx="22" fill="white" opacity="0.45"/>

  <!-- Layer 3: Transformation arrow → -->
  <!-- Arrow shaft -->
  <rect x="368" y="494" width="220" height="36" rx="18" fill="white" opacity="0.9"/>
  <!-- Arrow head (right-pointing chevron) -->
  <path d="M570,440 L660,512 L570,584"
        fill="none" stroke="white" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Right side — rendered H (big bold, bright) -->
  <!-- Left vertical of H -->
  <rect x="690" y="248" width="64" height="528" rx="32" fill="white" opacity="0.97"/>
  <!-- Right vertical of H -->
  <rect x="870" y="248" width="64" height="528" rx="32" fill="white" opacity="0.97"/>
  <!-- H crossbar (middle) -->
  <rect x="690" y="480" width="244" height="64" rx="32" fill="white" opacity="0.97"/>
</svg>
