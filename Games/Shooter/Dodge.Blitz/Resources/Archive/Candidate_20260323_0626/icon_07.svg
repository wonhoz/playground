<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dodge.Blitz | 점수판+최고기록 — 게임 오버 스코어 화면 | 공간/장면 | #100010 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#100010"/>
  <!-- Scanline effect -->
  <rect x="0" y="0" width="1024" height="1024" rx="160" fill="url(#scanlines7)" opacity="0.1"/>
  <defs>
    <pattern id="scanlines7" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#220022" stroke-width="2"/>
    </pattern>
  </defs>
  <!-- Layer 2: Scoreboard screen -->
  <!-- Arcade screen frame -->
  <rect x="180" y="180" width="664" height="620" rx="20" fill="#1A001A" stroke="#FF00FF" stroke-width="6"/>
  <rect x="190" y="190" width="644" height="600" rx="16" fill="#0A000A" stroke="#AA00AA" stroke-width="2"/>
  <!-- GAME OVER header (flashing) -->
  <text x="512" y="250" font-family="monospace" font-size="42" fill="#FF00FF" text-anchor="middle" font-weight="bold">GAME OVER</text>
  <line x1="210" y1="268" x2="814" y2="268" stroke="#AA00AA" stroke-width="2"/>
  <!-- Score section -->
  <text x="512" y="316" font-family="monospace" font-size="18" fill="#AA00AA" text-anchor="middle">SCORE</text>
  <text x="512" y="370" font-family="monospace" font-size="52" fill="#FFFFFF" text-anchor="middle" font-weight="bold">148,620</text>
  <!-- High Score comparison -->
  <line x1="250" y1="390" x2="774" y2="390" stroke="#440044" stroke-width="1"/>
  <text x="512" y="426" font-family="monospace" font-size="16" fill="#888888" text-anchor="middle">HI-SCORE</text>
  <text x="512" y="470" font-family="monospace" font-size="36" fill="#FFD700" text-anchor="middle" font-weight="bold">★ 148,620 ★</text>
  <text x="512" y="504" font-family="monospace" font-size="16" fill="#FF8800" text-anchor="middle">NEW RECORD!</text>
  <!-- Stats section -->
  <line x1="250" y1="520" x2="774" y2="520" stroke="#440044" stroke-width="1"/>
  <text x="360" y="560" font-family="monospace" font-size="14" fill="#888888" text-anchor="middle">WAVE</text>
  <text x="360" y="590" font-family="monospace" font-size="24" fill="#FFFFFF" text-anchor="middle" font-weight="bold">12</text>
  <text x="512" y="560" font-family="monospace" font-size="14" fill="#888888" text-anchor="middle">BULLETS</text>
  <text x="512" y="590" font-family="monospace" font-size="24" fill="#FF4444" text-anchor="middle" font-weight="bold">847</text>
  <text x="664" y="560" font-family="monospace" font-size="14" fill="#888888" text-anchor="middle">TIME</text>
  <text x="664" y="590" font-family="monospace" font-size="24" fill="#FFFFFF" text-anchor="middle" font-weight="bold">4:23</text>
  <!-- Continue prompt (blinking) -->
  <line x1="250" y1="610" x2="774" y2="610" stroke="#440044" stroke-width="1"/>
  <text x="512" y="660" font-family="monospace" font-size="16" fill="#FF00FF" text-anchor="middle">PRESS START TO CONTINUE</text>
  <!-- Coin indicator -->
  <text x="512" y="740" font-family="monospace" font-size="14" fill="#666666" text-anchor="middle">CREDIT 03</text>
  <!-- Layer 3: CRT screen corner decorations -->
  <circle cx="200" cy="200" r="10" fill="#1A001A"/>
  <circle cx="824" cy="200" r="10" fill="#1A001A"/>
  <circle cx="200" cy="780" r="10" fill="#1A001A"/>
  <circle cx="824" cy="780" r="10" fill="#1A001A"/>
</svg>
