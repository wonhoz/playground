<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#180a04"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="anvilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1a08"/>
      <stop offset="60%" stop-color="#2a0e04"/>
      <stop offset="100%" stop-color="#1a0802"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#3d1a08"/>
      <stop offset="100%" stop-color="#1e0c04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heatglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Forge fire glow on floor -->
  <ellipse cx="256" cy="430" rx="200" ry="50" fill="#F97316" fill-opacity="0.08" filter="url(#heatglow)"/>

  <!-- Anvil base -->
  <rect x="140" y="360" width="232" height="40" rx="6" fill="url(#anvilGrad)" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Anvil body -->
  <rect x="170" y="300" width="172" height="65" rx="4" fill="url(#anvilGrad)" stroke="#F97316" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Anvil face (working surface) -->
  <rect x="150" y="280" width="212" height="30" rx="5" fill="#3d1a08" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Anvil horn -->
  <path d="M362,295 L420,285 L410,295 L420,305 L362,295 Z" fill="#4a1a08" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Document being forged (on anvil, slightly bent/shaped) -->
  <path d="M185,180 L185,280 L325,280 L325,195 L310,180 Z" fill="url(#docGrad)" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <!-- Doc fold corner -->
  <polygon points="310,180 325,195 310,195" fill="#2a0e04" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Doc content lines -->
  <line x1="200" y1="205" x2="305" y2="205" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="200" y1="220" x2="295" y2="220" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="200" y1="235" x2="305" y2="235" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="200" y1="250" x2="285" y2="250" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="200" y1="264" x2="305" y2="264" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- PDF text on document -->
  <rect x="200" y="187" width="60" height="14" rx="7" fill="#F97316" fill-opacity="0.5" filter="url(#softglow)"/>

  <!-- Hammer -->
  <rect x="290" y="95" width="50" height="70" rx="6" fill="#2a0e04" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.8" filter="url(#glow)"/>
  <!-- Hammer head detail -->
  <rect x="280" y="100" width="70" height="50" rx="8" fill="#3d1a08" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Hammer face glow (hot) -->
  <rect x="280" y="140" width="70" height="20" rx="4" fill="#F97316" fill-opacity="0.3" filter="url(#glow)"/>
  <!-- Hammer handle -->
  <rect x="308" y="165" width="18" height="115" rx="9" fill="#2a0e04" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Sparks flying -->
  <g filter="url(#glow)">
    <circle cx="380" cy="270" r="4" fill="#F97316"/>
    <circle cx="395" cy="250" r="3" fill="#EF4444"/>
    <circle cx="355" cy="255" r="2.5" fill="#F97316"/>
    <circle cx="420" cy="280" r="3" fill="#DC2626"/>
    <circle cx="145" cy="265" r="3.5" fill="#F97316"/>
    <circle cx="128" cy="250" r="2.5" fill="#EF4444"/>
    <circle cx="160" cy="245" r="2" fill="#F97316"/>
  </g>

  <!-- Spark trails -->
  <line x1="380" y1="270" x2="400" y2="250" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="395" y1="250" x2="415" y2="235" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="145" y1="265" x2="120" y2="248" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Heat shimmer lines -->
  <path d="M186,180 Q200,165 215,180" fill="none" stroke="#F97316" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M260,178 Q274,162 288,178" fill="none" stroke="#EF4444" stroke-width="1" stroke-opacity="0.25"/>
</svg>
