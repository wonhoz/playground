<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 그레이 -->
  <rect width="1024" height="1024" rx="180" fill="#111111"/>
  <!-- Layer 2: 픽셀 입자들이 떨어지는 시뮬레이션 화면 -->
  <!-- 시뮬레이션 프레임 -->
  <rect x="120" y="160" width="784" height="660" rx="12" fill="#1A1A1A"/>
  <!-- 상단 모래 쌓인 곳 -->
  <rect x="120" y="160" width="784" height="12" fill="#222"/>
  <!-- 모래 입자 그리드 (격자 픽셀) - 아래로 갈수록 쌓임 -->
  <!-- 쌓인 모래 더미 (바닥) -->
  <rect x="120" y="680" width="784" height="140" fill="#8D6E63"/>
  <!-- 모래 표면 불규칙 -->
  <rect x="120" y="660" width="120" height="20" rx="2" fill="#A1887F"/>
  <rect x="240" y="650" width="100" height="30" rx="2" fill="#8D6E63"/>
  <rect x="340" y="665" width="130" height="15" rx="2" fill="#A1887F"/>
  <rect x="470" y="655" width="90" height="25" rx="2" fill="#8D6E63"/>
  <rect x="560" y="660" width="140" height="20" rx="2" fill="#BCAAA4"/>
  <rect x="700" y="650" width="204" height="30" rx="2" fill="#8D6E63"/>
  <!-- 떨어지는 입자들 (위에서 아래로) -->
  <!-- 열 1 -->
  <rect x="180" y="200" width="20" height="20" rx="2" fill="#FFCC02"/>
  <rect x="184" y="250" width="16" height="16" rx="2" fill="#FFA000"/>
  <rect x="180" y="310" width="20" height="20" rx="2" fill="#FF8F00"/>
  <rect x="185" y="380" width="15" height="15" rx="2" fill="#FFA000"/>
  <rect x="178" y="450" width="22" height="22" rx="2" fill="#FFCC02"/>
  <rect x="182" y="530" width="18" height="18" rx="2" fill="#FF8F00"/>
  <rect x="180" y="600" width="20" height="20" rx="2" fill="#FFA000"/>
  <!-- 열 2 (물 - 파란) -->
  <rect x="340" y="220" width="20" height="20" rx="2" fill="#2196F3"/>
  <rect x="336" y="280" width="24" height="16" rx="2" fill="#1976D2"/>
  <rect x="338" y="350" width="22" height="20" rx="2" fill="#42A5F5"/>
  <rect x="340" y="430" width="20" height="20" rx="2" fill="#1976D2"/>
  <!-- 열 3 (돌 - 회색) -->
  <rect x="540" y="200" width="24" height="24" rx="2" fill="#78909C"/>
  <rect x="538" y="270" width="26" height="22" rx="2" fill="#546E7A"/>
  <rect x="540" y="350" width="24" height="24" rx="2" fill="#607D8B"/>
  <rect x="536" y="440" width="28" height="20" rx="2" fill="#546E7A"/>
  <rect x="540" y="520" width="24" height="24" rx="2" fill="#78909C"/>
  <!-- 열 4 (불 - 빨간) -->
  <rect x="740" y="210" width="20" height="20" rx="2" fill="#FF3D00"/>
  <rect x="738" y="275" width="22" height="18" rx="2" fill="#FF6D00"/>
  <rect x="740" y="345" width="20" height="20" rx="2" fill="#FF3D00"/>
  <rect x="736" y="420" width="24" height="20" rx="2" fill="#FF8F00"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="910" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#FFA000" text-anchor="middle">SAND.FALL</text>
</svg>
