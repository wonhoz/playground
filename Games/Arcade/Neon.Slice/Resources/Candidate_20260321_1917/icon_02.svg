<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="n2-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="n2-trail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF5FFF" stop-opacity="0.0"/>
      <stop offset="60%" stop-color="#BF5FFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1.0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#n2-clip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#08050E"/>
    <!-- Grid -->
    <g stroke="#BF5FFF" stroke-width="0.7" opacity="0.07">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="682" x2="1024" y2="682"/>
      <line x1="0" y1="852" x2="1024" y2="852"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="682" y1="0" x2="682" y2="1024"/>
      <line x1="852" y1="0" x2="852" y2="1024"/>
    </g>

    <!-- Trailing arc of the slice gesture (4 fading lines) -->
    <line x1="200" y1="750" x2="480" y2="420"
          stroke="#BF5FFF" stroke-width="28" stroke-linecap="round" opacity="0.12"/>
    <line x1="230" y1="740" x2="510" y2="410"
          stroke="#BF5FFF" stroke-width="18" stroke-linecap="round" opacity="0.22"/>
    <line x1="260" y1="730" x2="600" y2="370"
          stroke="#BF5FFF" stroke-width="12" stroke-linecap="round" opacity="0.40"/>
    <line x1="290" y1="720" x2="720" y2="300"
          stroke="#BF5FFF" stroke-width="7" stroke-linecap="round" opacity="0.60"/>
    <!-- Bright tip -->
    <line x1="600" y1="370" x2="780" y2="240"
          stroke="url(#n2-trail)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <!-- Tip glow dot -->
    <circle cx="780" cy="240" r="18" fill="#FFFFFF" opacity="0.90"/>
    <circle cx="780" cy="240" r="36" fill="#BF5FFF" opacity="0.25"/>

    <!-- Neon shapes being sliced along the trail -->
    <!-- Pentagon (left, mid-trail) -->
    <polygon points="350,600 382,578 375,542 341,542 334,578"
             fill="#3A0066" stroke="#BF5FFF" stroke-width="6" opacity="0.85"/>
    <!-- Circle (right, near tip) -->
    <circle cx="640" cy="440" r="54" fill="#180030" stroke="#BF5FFF" stroke-width="5" opacity="0.80"/>
    <!-- Slash cut through circle -->
    <line x1="590" y1="390" x2="690" y2="490"
          stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.80"/>

    <!-- Cursor dot at tip -->
    <circle cx="780" cy="240" r="9" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="780" cy="240" r="18" fill="none" stroke="#BF5FFF" stroke-width="3" opacity="0.70"/>

    <!-- Scattered particles -->
    <circle cx="420" cy="530" r="6" fill="#BF5FFF" opacity="0.80"/>
    <circle cx="370" cy="490" r="4" fill="#FFFFFF" opacity="0.60"/>
    <circle cx="500" cy="460" r="5" fill="#BF5FFF" opacity="0.65"/>
    <circle cx="680" cy="380" r="4" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="730" cy="320" r="5" fill="#BF5FFF" opacity="0.70"/>
  </g>
</svg>
