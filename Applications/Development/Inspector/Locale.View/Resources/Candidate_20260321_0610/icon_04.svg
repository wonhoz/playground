<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_lv04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCBA4"/>
      <stop offset="50%" stop-color="#F4A460"/>
      <stop offset="100%" stop-color="#D4822A"/>
    </linearGradient>
    <linearGradient id="tower1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CD853F"/>
      <stop offset="100%" stop-color="#8B5E2A"/>
    </linearGradient>
    <linearGradient id="tower2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#9B6B3A"/>
    </linearGradient>
    <linearGradient id="tower3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0A870"/>
      <stop offset="100%" stop-color="#B07040"/>
    </linearGradient>
    <linearGradient id="goldTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#C8A000"/>
    </linearGradient>
    <filter id="shadow_lv04">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#5C3000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_lv04">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_lv04)"/>
  <!-- 하늘 -->
  <rect x="0" y="0" width="1024" height="680" rx="0" fill="#87CEEB" fill-opacity="0.15"/>
  <!-- 모래 바닥 -->
  <ellipse cx="512" cy="800" rx="450" ry="50" fill="#B87040" fill-opacity="0.3"/>

  <!-- Layer 2: 메인 오브젝트 — 바벨탑 (계단식 구조) -->
  <!-- 가장 넓은 기단 -->
  <rect x="230" y="680" width="564" height="80" rx="10" fill="url(#tower1)" filter="url(#shadow_lv04)"/>
  <!-- 2단 -->
  <rect x="270" y="610" width="484" height="80" rx="10" fill="url(#tower2)" filter="url(#shadow_lv04)"/>
  <!-- 3단 -->
  <rect x="320" y="540" width="384" height="80" rx="10" fill="url(#tower1)" filter="url(#shadow_lv04)"/>
  <!-- 4단 -->
  <rect x="370" y="470" width="284" height="80" rx="10" fill="url(#tower2)" filter="url(#shadow_lv04)"/>
  <!-- 5단 -->
  <rect x="420" y="400" width="184" height="80" rx="10" fill="url(#tower3)" filter="url(#shadow_lv04)"/>
  <!-- 6단 -->
  <rect x="460" y="330" width="104" height="80" rx="10" fill="url(#tower1)" filter="url(#shadow_lv04)"/>
  <!-- 7단 (꼭대기) -->
  <rect x="486" y="260" width="52" height="80" rx="8" fill="url(#tower2)" filter="url(#shadow_lv04)"/>
  <!-- 황금 첨탑 -->
  <polygon points="512,200 490,265 534,265" fill="url(#goldTop)" filter="url(#glow_lv04)"/>
  <circle cx="512" cy="196" r="18" fill="url(#goldTop)" filter="url(#glow_lv04)"/>

  <!-- 창문들 -->
  <g fill="#2A1500" fill-opacity="0.4">
    <!-- 기단 창 -->
    <rect x="306" y="700" width="28" height="36" rx="4"/>
    <rect x="366" y="700" width="28" height="36" rx="4"/>
    <rect x="426" y="700" width="28" height="36" rx="4"/>
    <rect x="566" y="700" width="28" height="36" rx="4"/>
    <rect x="626" y="700" width="28" height="36" rx="4"/>
    <rect x="686" y="700" width="28" height="36" rx="4"/>
    <!-- 2단 창 -->
    <rect x="340" y="628" width="24" height="30" rx="4"/>
    <rect x="396" y="628" width="24" height="30" rx="4"/>
    <rect x="596" y="628" width="24" height="30" rx="4"/>
    <rect x="652" y="628" width="24" height="30" rx="4"/>
    <!-- 3단 -->
    <rect x="370" y="558" width="22" height="28" rx="4"/>
    <rect x="506" y="558" width="22" height="28" rx="4"/>
    <rect x="622" y="558" width="22" height="28" rx="4"/>
    <!-- 4단 -->
    <rect x="404" y="488" width="20" height="26" rx="4"/>
    <rect x="506" y="488" width="20" height="26" rx="4"/>
    <rect x="600" y="488" width="20" height="26" rx="4"/>
    <!-- 5단 -->
    <rect x="446" y="418" width="18" height="24" rx="4"/>
    <rect x="502" y="418" width="18" height="24" rx="4"/>
    <rect x="558" y="418" width="18" height="24" rx="4"/>
  </g>

  <!-- Layer 3: 언어 문자 장식 -->
  <text x="280" y="672" font-size="26" fill="#FFCE88" fill-opacity="0.7" font-family="serif">A</text>
  <text x="720" y="672" font-size="26" fill="#FFCE88" fill-opacity="0.7" font-family="serif">字</text>
  <text x="312" y="600" font-size="22" fill="#FFE0AA" fill-opacity="0.6" font-family="serif">Ω</text>
  <text x="680" y="600" font-size="22" fill="#FFE0AA" fill-opacity="0.6" font-family="serif">α</text>
  <text x="350" y="530" font-size="20" fill="#FFFFFF" fill-opacity="0.5" font-family="serif">한</text>
  <text x="636" y="530" font-size="20" fill="#FFFFFF" fill-opacity="0.5" font-family="serif">あ</text>
</svg>
