<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02 | literal | 레이어드 | 폭탄 vs 도형 대비 장면 | 오렌지/레드/다크 -->

  <defs>
    <radialGradient id="bg02" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1E0800"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="bombGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <radialGradient id="shapeGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="60%" stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#CC2200"/>
    </radialGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bombGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg02)"/>

  <!-- 배경 그리드 라인 (전장감) -->
  <line x1="200" y1="200" x2="824" y2="824" stroke="#330000" stroke-width="1" opacity="0.4"/>
  <line x1="824" y1="200" x2="200" y2="824" stroke="#330000" stroke-width="1" opacity="0.4"/>
  <circle cx="512" cy="512" r="280" stroke="#330000" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="512" cy="512" r="180" stroke="#330000" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- 왼쪽 상단 — 슬라이스된 삼각형 (통쾌한 히트) -->
  <polygon points="280,240 420,480 140,480"
    fill="url(#shapeGrad)" opacity="0.92" filter="url(#glow02)"/>
  <!-- 삼각형 상단 절반 (분리) -->
  <polygon points="280,240 350,360 210,360"
    fill="#FFBB00" opacity="0.85" filter="url(#glow02)"
    transform="translate(-18,-20) rotate(-8,280,300)"/>
  <!-- 삼각형 하단 절반 -->
  <polygon points="350,360 420,480 140,480 210,360"
    fill="#FF4400" opacity="0.8" transform="translate(12,18) rotate(4,280,420)"/>

  <!-- 삼각형 파편 -->
  <polygon points="175,510 195,535 155,532" fill="#FF9900" opacity="0.7" filter="url(#glow02)"/>
  <polygon points="430,500 448,522 412,520" fill="#FFCC00" opacity="0.6" filter="url(#glow02)"/>
  <circle cx="145" cy="560" r="7" fill="#FF4400" opacity="0.5"/>
  <circle cx="465" cy="545" r="5" fill="#FFAA00" opacity="0.6"/>

  <!-- 슬라이스 궤적 (삼각형 통과) -->
  <line x1="100" y1="600" x2="500" y2="160"
    stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.8" filter="url(#glow02)"/>
  <line x1="100" y1="600" x2="500" y2="160"
    stroke="#FF6600" stroke-width="2" stroke-linecap="round" opacity="1"/>

  <!-- 오른쪽 하단 — 폭탄 (경고! 피해야 함) -->
  <!-- 폭탄 몸체 -->
  <circle cx="680" cy="660" r="120" fill="url(#bombGrad)" filter="url(#bombGlow)"/>
  <circle cx="680" cy="660" r="120" fill="none" stroke="#FF2200" stroke-width="4" opacity="0.7"/>
  <!-- 폭탄 하이라이트 -->
  <circle cx="645" cy="625" r="32" fill="#444444" opacity="0.6"/>
  <!-- 폭탄 도화선 -->
  <path d="M680,540 Q720,500 740,470 Q755,450 760,430"
    stroke="#888888" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 도화선 불꽃 -->
  <circle cx="760" cy="428" r="14" fill="#FF6600" filter="url(#bombGlow)" opacity="0.95"/>
  <circle cx="760" cy="428" r="7" fill="#FFEE00" opacity="1"/>
  <!-- 폭탄 X 표시 (위험 경고) -->
  <line x1="638" y1="628" x2="722" y2="692" stroke="#FF2200" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="722" y1="628" x2="638" y2="692" stroke="#FF2200" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- 중앙 VS 텍스트 -->
  <text x="512" y="545" text-anchor="middle" font-family="Arial Black, sans-serif"
    font-size="52" font-weight="900" fill="#FFFFFF" opacity="0.15">VS</text>
</svg>
