<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A0D2E"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard body -->
  <rect x="64" y="180" width="384" height="200" rx="20" fill="#111133" stroke="#00FFFF" stroke-width="2" opacity="0.9"/>
  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="82" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="128" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="174" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="220" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="266" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="312" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="358" y="200" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="404" y="200" width="38" height="38" rx="6" fill="url(#keyGrad)" stroke="#00FFFF" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Row 2 -->
  <rect x="82" y="248" width="56" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="146" y="248" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="192" y="248" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="238" y="248" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="284" y="248" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="330" y="248" width="38" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <rect x="376" y="248" width="66" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Row 3 - Space bar -->
  <rect x="82" y="296" width="348" height="38" rx="6" fill="#1A1A3A" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Active key glow -->
  <rect x="238" y="248" width="38" height="38" rx="6" fill="#00FFFF" opacity="0.3" filter="url(#glow)"/>
  <!-- Pulse dot -->
  <circle cx="257" cy="120" r="20" fill="none" stroke="#00FFFF" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  <circle cx="257" cy="120" r="8" fill="#00FFFF" filter="url(#glow)"/>
  <!-- Signal waves -->
  <path d="M230 120 Q220 110 230 100" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M218 126 Q202 110 218 94" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M284 120 Q294 110 284 100" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M296 126 Q312 110 296 94" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
