<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="screen10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#162330"/>
    </linearGradient>
    <filter id="shadow10">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000060"/>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <!-- Layer 2: Screen/window frame -->
  <rect x="110" y="140" width="804" height="740" rx="28" fill="url(#screen10)" filter="url(#shadow10)"/>
  <!-- Title bar -->
  <rect x="110" y="140" width="804" height="64" rx="28" fill="#00ACC1"/>
  <rect x="110" y="176" width="804" height="28" fill="#00ACC1"/>
  <!-- Title bar text: Trivia -->
  <text x="512" y="178" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">TRIVIA</text>
  <!-- Dots on title bar -->
  <circle cx="160" cy="172" r="10" fill="#FF5252"/>
  <circle cx="192" cy="172" r="10" fill="#FFD740"/>
  <circle cx="224" cy="172" r="10" fill="#69F0AE"/>
  <!-- Timer strip -->
  <rect x="110" y="204" width="804" height="24" fill="#004D5E"/>
  <rect x="110" y="204" width="540" height="24" fill="#00E5FF" rx="0"/>
  <text x="900" y="216" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#00E5FF" text-anchor="end" dominant-baseline="middle">09</text>
  <!-- Question area -->
  <rect x="150" y="248" width="724" height="20" rx="6" fill="#FFFFFF" fill-opacity="0.12"/>
  <rect x="150" y="248" width="560" height="20" rx="6" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="150" y="280" width="480" height="20" rx="6" fill="#FFFFFF" fill-opacity="0.18"/>
  <!-- Q label -->
  <text x="162" y="238" font-family="Arial Bold, sans-serif" font-size="28" fill="#00E5FF" dominant-baseline="middle">Q.</text>
  <!-- Answer buttons 2x2 -->
  <!-- A button (highlighted correct) -->
  <rect x="150" y="320" width="340" height="100" rx="14" fill="#00C853" fill-opacity="0.9"/>
  <text x="178" y="371" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" dominant-baseline="middle">A</text>
  <rect x="215" y="345" width="260" height="18" rx="5" fill="#FFFFFF" fill-opacity="0.8"/>
  <rect x="215" y="373" width="200" height="14" rx="5" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- B button -->
  <rect x="534" y="320" width="340" height="100" rx="14" fill="#263340"/>
  <text x="562" y="371" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00E5FF" dominant-baseline="middle">B</text>
  <rect x="600" y="345" width="240" height="18" rx="5" fill="#FFFFFF" fill-opacity="0.4"/>
  <rect x="600" y="373" width="180" height="14" rx="5" fill="#FFFFFF" fill-opacity="0.2"/>
  <!-- C button -->
  <rect x="150" y="440" width="340" height="100" rx="14" fill="#263340"/>
  <text x="178" y="491" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00E5FF" dominant-baseline="middle">C</text>
  <rect x="215" y="462" width="220" height="18" rx="5" fill="#FFFFFF" fill-opacity="0.4"/>
  <rect x="215" y="490" width="270" height="14" rx="5" fill="#FFFFFF" fill-opacity="0.2"/>
  <!-- D button -->
  <rect x="534" y="440" width="340" height="100" rx="14" fill="#263340"/>
  <text x="562" y="491" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00E5FF" dominant-baseline="middle">D</text>
  <rect x="600" y="462" width="200" height="18" rx="5" fill="#FFFFFF" fill-opacity="0.4"/>
  <rect x="600" y="490" width="250" height="14" rx="5" fill="#FFFFFF" fill-opacity="0.2"/>
  <!-- Score strip -->
  <rect x="150" y="568" width="724" height="56" rx="14" fill="#263340"/>
  <text x="176" y="596" font-family="Arial Black, sans-serif" font-size="28" fill="#FFD740" dominant-baseline="middle">🔥 3</text>
  <text x="512" y="596" font-family="Arial Black, sans-serif" font-size="28" fill="#FFFFFF" dominant-baseline="middle" text-anchor="middle">5 / 10</text>
  <text x="860" y="596" font-family="Arial Black, sans-serif" font-size="28" fill="#00E5FF" dominant-baseline="middle" text-anchor="end">450pt</text>
  <!-- Layer 3: Category badge -->
  <rect x="150" y="640" width="200" height="52" rx="14" fill="#FF6D00"/>
  <text x="250" y="666" font-family="Arial Bold, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IT</text>
  <rect x="366" y="640" width="220" height="52" rx="14" fill="#7B1FA2"/>
  <text x="476" y="666" font-family="Arial Bold, sans-serif" font-size="26" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">DAILY</text>
  <rect x="602" y="640" width="272" height="52" rx="14" fill="#1565C0"/>
  <text x="738" y="666" font-family="Arial Bold, sans-serif" font-size="26" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">SCIENCE</text>
  <!-- Decorative dots outside screen -->
  <circle cx="870" cy="120" r="30" fill="#FFD740" opacity="0.8"/>
  <circle cx="920" cy="160" r="18" fill="#FF4081" opacity="0.7"/>
  <circle cx="150" cy="920" r="28" fill="#69F0AE" opacity="0.8"/>
</svg>
