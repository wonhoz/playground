<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: 단축키 텍스트 + 물리 키 심볼 결합 (hybrid) | 중앙 심볼 | 화이트+비비드 -->
  <!-- Layer 1: 배경 - 순수 화이트 -->
  <rect width="1024" height="1024" rx="190" fill="#FFFFFF"/>

  <!-- Layer 2: 중앙의 큰 키 심볼 (물리 키 형태) -->
  <!-- 메인 키 배경 (커다란 키 모양) -->
  <rect x="200" y="220" width="624" height="500" rx="40" fill="#F0F0F8" stroke="#D0D0E8" stroke-width="4"/>
  <!-- 키 안쪽 (눌린 효과) -->
  <rect x="220" y="240" width="584" height="460" rx="32" fill="#E8E8F5" stroke="#C8C8E0" stroke-width="2"/>

  <!-- Layer 2: 단축키 조합 텍스트들 (대형, 색상별) -->
  <!-- 1줄: Ctrl+Shift+P -->
  <text x="512" y="360" text-anchor="middle" font-family="Consolas,monospace" font-size="52" font-weight="bold" fill="#8B5CF6">Ctrl+Shift+P</text>
  <!-- 설명 -->
  <text x="512" y="400" text-anchor="middle" font-family="Segoe UI,Arial" font-size="22" fill="#9CA3AF">명령 팔레트</text>

  <!-- 구분선 -->
  <line x1="280" y1="425" x2="744" y2="425" stroke="#D0D0E8" stroke-width="2"/>

  <!-- 2줄: Ctrl+P -->
  <text x="512" y="480" text-anchor="middle" font-family="Consolas,monospace" font-size="48" font-weight="bold" fill="#3B82F6">Ctrl+P</text>
  <text x="512" y="516" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" fill="#9CA3AF">파일 열기</text>

  <!-- 구분선 -->
  <line x1="280" y1="540" x2="744" y2="540" stroke="#D0D0E8" stroke-width="2"/>

  <!-- 3줄: F5 (초록) + F12 (시안) -->
  <text x="380" y="600" text-anchor="middle" font-family="Consolas,monospace" font-size="52" font-weight="bold" fill="#10B981">F5</text>
  <text x="380" y="636" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" fill="#9CA3AF">디버그</text>

  <text x="510" y="618" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" fill="#D0D0E8">·</text>

  <text x="644" y="600" text-anchor="middle" font-family="Consolas,monospace" font-size="52" font-weight="bold" fill="#F59E0B">Ctrl+Z</text>
  <text x="644" y="636" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" fill="#9CA3AF">실행 취소</text>

  <!-- 키 코너 데코 (물리 키 느낌) -->
  <!-- 왼쪽 위 -->
  <circle cx="240" cy="258" r="6" fill="#D0D0E8"/>
  <!-- 오른쪽 위 -->
  <circle cx="784" cy="258" r="6" fill="#D0D0E8"/>
  <!-- 왼쪽 아래 -->
  <circle cx="240" cy="682" r="6" fill="#D0D0E8"/>
  <!-- 오른쪽 아래 -->
  <circle cx="784" cy="682" r="6" fill="#D0D0E8"/>

  <!-- Layer 3: 하단 카테고리 색상 바 (범례) -->
  <rect x="200" y="760" width="624" height="50" rx="12" fill="#F8F8FF" stroke="#E0E0F0" stroke-width="2"/>
  <!-- 색상 세그먼트들 -->
  <rect x="204" y="764" width="90" height="42" rx="10" fill="#3B82F6"/>
  <text x="249" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">File</text>
  <rect x="300" y="764" width="90" height="42" fill="#F59E0B"/>
  <text x="345" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Edit</text>
  <rect x="396" y="764" width="90" height="42" fill="#8B5CF6"/>
  <text x="441" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">View</text>
  <rect x="492" y="764" width="90" height="42" fill="#10B981"/>
  <text x="537" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Run</text>
  <rect x="588" y="764" width="90" height="42" fill="#06B6D4"/>
  <text x="633" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" font-weight="bold" fill="white">Navigate</text>
  <rect x="684" y="764" width="136" height="42" rx="10" fill="#6B7280"/>
  <text x="752" y="791" text-anchor="middle" font-family="Segoe UI,Arial" font-size="16" font-weight="bold" fill="white">Other</text>

  <!-- 상단 앱 이름 (미니) -->
  <text x="512" y="190" text-anchor="middle" font-family="Segoe UI,Arial" font-size="32" font-weight="bold" fill="#1E1B30" letter-spacing="3">⌨ Key.Map</text>
</svg>
