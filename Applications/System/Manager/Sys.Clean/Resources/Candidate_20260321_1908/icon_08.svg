<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c8-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c8-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#145A32"/>
      <stop offset="100%" stop-color="#0A3D22"/>
    </linearGradient>
    <linearGradient id="c8-key" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F8F0"/>
      <stop offset="100%" stop-color="#C8E8C8"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c8-clip)">
    <!-- Background: deep emerald -->
    <rect width="1024" height="1024" fill="url(#c8-bg)"/>
    <circle cx="512" cy="512" r="480" fill="#0D4A28" opacity="0.30"/>

    <!-- Registry key shape: horizontal bar (key bow) -->
    <circle cx="380" cy="400" r="140" fill="none" stroke="url(#c8-key)" stroke-width="52"/>
    <!-- Key shaft -->
    <rect x="490" y="376" width="270" height="52" rx="12" fill="url(#c8-key)"/>
    <!-- Key teeth -->
    <rect x="640" y="428" width="44" height="44" rx="8" fill="url(#c8-key)"/>
    <rect x="700" y="428" width="44" height="60" rx="8" fill="url(c8-key)"/>
    <rect x="700" y="428" width="44" height="60" rx="8" fill="url(#c8-key)"/>

    <!-- Key hole (inner circle cutout) -->
    <circle cx="380" cy="400" r="64" fill="#0D4A28"/>
    <circle cx="380" cy="400" r="44" fill="#0D4A28"/>

    <!-- Broken/removed registry entries (red X marks) -->
    <line x1="290" y1="590" x2="330" y2="630" stroke="#E74C3C" stroke-width="14" stroke-linecap="round" opacity="0.70"/>
    <line x1="330" y1="590" x2="290" y2="630" stroke="#E74C3C" stroke-width="14" stroke-linecap="round" opacity="0.70"/>
    <rect x="350" y="598" width="120" height="12" rx="4" fill="#E74C3C" opacity="0.35"/>

    <line x1="290" y1="660" x2="330" y2="700" stroke="#E74C3C" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
    <line x1="330" y1="660" x2="290" y2="700" stroke="#E74C3C" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
    <rect x="350" y="668" width="90" height="12" rx="4" fill="#E74C3C" opacity="0.28"/>

    <!-- Large checkmark (fixed!) -->
    <circle cx="720" cy="680" r="110" fill="#27AE60" opacity="0.20"/>
    <circle cx="720" cy="680" r="90" fill="#27AE60" opacity="0.25"/>
    <polyline points="672,680 706,718 772,644"
              fill="none" stroke="#2ECC71" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small sparkles -->
    <circle cx="830" cy="240" r="9" fill="#7DFFB3" opacity="0.75"/>
    <line x1="830" y1="224" x2="830" y2="256" stroke="#7DFFB3" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="814" y1="240" x2="846" y2="240" stroke="#7DFFB3" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="200" cy="300" r="7" fill="#7DFFB3" opacity="0.55"/>
  </g>
</svg>
