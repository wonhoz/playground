<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0015"/>
      <stop offset="100%" stop-color="#15002A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Spider web -->
  <!-- Radial lines -->
  <line x1="256" y1="80" x2="256" y2="360" stroke="#4A3060" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#4A3060" stroke-width="1.5"/>
  <line x1="143" y1="107" x2="369" y2="333" stroke="#4A3060" stroke-width="1.5"/>
  <line x1="369" y1="107" x2="143" y2="333" stroke="#4A3060" stroke-width="1.5"/>
  <!-- Web rings -->
  <ellipse cx="256" cy="220" rx="55" ry="45" fill="none" stroke="#5A4070" stroke-width="1.5"/>
  <ellipse cx="256" cy="220" rx="110" ry="90" fill="none" stroke="#4A3060" stroke-width="1.5"/>
  <ellipse cx="256" cy="220" rx="165" ry="135" fill="none" stroke="#3A2050" stroke-width="1.5"/>
  <!-- Spider body -->
  <ellipse cx="256" cy="220" rx="18" ry="14" fill="#9B30FF"/>
  <ellipse cx="256" cy="208" rx="12" ry="10" fill="#7B20DF"/>
  <!-- Spider legs -->
  <line x1="240" y1="218" x2="210" y2="200" stroke="#9B30FF" stroke-width="2.5"/>
  <line x1="238" y1="222" x2="205" y2="222" stroke="#9B30FF" stroke-width="2.5"/>
  <line x1="240" y1="226" x2="210" y2="240" stroke="#9B30FF" stroke-width="2.5"/>
  <line x1="272" y1="218" x2="302" y2="200" stroke="#9B30FF" stroke-width="2.5"/>
  <line x1="274" y1="222" x2="307" y2="222" stroke="#9B30FF" stroke-width="2.5"/>
  <line x1="272" y1="226" x2="302" y2="240" stroke="#9B30FF" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="251" cy="207" r="3" fill="#FF00FF"/>
  <circle cx="261" cy="207" r="3" fill="#FF00FF"/>
  <!-- Caught bug -->
  <ellipse cx="170" cy="155" rx="10" ry="7" fill="#FF4444"/>
  <line x1="164" y1="151" x2="158" y2="145" stroke="#FF4444" stroke-width="1.5"/>
  <line x1="176" y1="151" x2="182" y2="145" stroke="#FF4444" stroke-width="1.5"/>
  <text x="256" y="422" font-family="Arial" font-size="22" fill="#9B30FF" text-anchor="middle">Code Spider</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF00FF" text-anchor="middle">Bug.Hunt</text>
</svg>
