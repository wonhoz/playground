<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0018"/>
  <!-- 별들 -->
  <circle cx="200" cy="200" r="3" fill="#FFF" opacity="0.6"/>
  <circle cx="850" cy="180" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="150" cy="800" r="2" fill="#FFF" opacity="0.5"/>
  <circle cx="900" cy="820" r="3" fill="#FFF" opacity="0.6"/>
  <!-- Layer 2: 로켓 모양 탐사선 -->
  <polygon points="512,120 580,400 512,360 444,400" fill="#E879F9"/>
  <rect x="444" y="360" width="136" height="200" rx="16" fill="#A855F7"/>
  <!-- 노즐 -->
  <polygon points="444,560 476,640 548,640 580,560" fill="#C026D3"/>
  <!-- 날개 -->
  <polygon points="444,400 380,560 444,520" fill="#7E22CE"/>
  <polygon points="580,400 644,560 580,520" fill="#7E22CE"/>
  <!-- 창문 -->
  <circle cx="512" cy="300" r="36" fill="#C4B5FD"/>
  <circle cx="512" cy="300" r="22" fill="#0A0018"/>
  <!-- Layer 3: 중력 곡선 -->
  <!-- 큰 행성 (오른쪽 아래) -->
  <circle cx="820" cy="820" r="160" fill="#1A0A3C"/>
  <circle cx="820" cy="820" r="120" fill="#2D1060"/>
  <circle cx="820" cy="820" r="160" fill="none" stroke="#7C3AED" stroke-width="12"/>
  <!-- 중력 필드 곡선 -->
  <path d="M512 640 Q560 720 680 780" fill="none" stroke="#A855F7" stroke-width="10" stroke-dasharray="14,8" opacity="0.7"/>
  <path d="M512 640 Q580 740 700 810" fill="none" stroke="#A855F7" stroke-width="6" stroke-dasharray="10,8" opacity="0.4"/>
</svg>
