<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- Brick grid (5 rows × 4 bricks) with cracks -->
  <!-- Row 1 -->
  <rect x="140" y="200" width="168" height="90" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="320" y="200" width="168" height="90" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="500" y="200" width="168" height="90" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="680" y="200" width="204" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <!-- Row 2 -->
  <rect x="140" y="302" width="204" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="356" y="302" width="168" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="536" y="302" width="168" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="716" y="302" width="168" height="90" rx="8" fill="#1A237E" opacity="0.75"/>
  <!-- Row 3 (with cracks) -->
  <rect x="140" y="404" width="168" height="90" rx="8" fill="#5C6BC0" opacity="0.7"/>
  <rect x="320" y="404" width="168" height="90" rx="8" fill="#5C6BC0" opacity="0.65"/>
  <rect x="500" y="404" width="168" height="90" rx="8" fill="#5C6BC0" opacity="0.6"/>
  <rect x="680" y="404" width="204" height="90" rx="8" fill="#5C6BC0" opacity="0.55"/>
  <!-- Crack 1 -->
  <polyline points="230,404 210,450 250,460 225,494" stroke="#050010" stroke-width="10" fill="none"/>
  <!-- Crack 2 -->
  <polyline points="400,404 420,430 390,460 415,494" stroke="#050010" stroke-width="10" fill="none"/>
  <!-- Crack 3 (center highlight) -->
  <polyline points="570,404 550,440 590,455 555,494" stroke="#9FA8DA" stroke-width="8" fill="none"/>
  <!-- Row 4 (crumbling) -->
  <rect x="140" y="506" width="148" height="90" rx="8" fill="#1A237E" opacity="0.5"/>
  <rect x="360" y="514" width="138" height="76" rx="8" fill="#1A237E" opacity="0.4" transform="rotate(-3,429,552)"/>
  <rect x="520" y="518" width="148" height="70" rx="8" fill="#1A237E" opacity="0.35" transform="rotate(4,594,553)"/>
  <rect x="690" y="510" width="170" height="80" rx="8" fill="#1A237E" opacity="0.3" transform="rotate(-2,775,550)"/>
  <!-- Row 5 (scattered) -->
  <rect x="160" y="624" width="120" height="70" rx="8" fill="#1A237E" opacity="0.3" transform="rotate(-8,220,659)"/>
  <rect x="560" y="630" width="100" height="60" rx="8" fill="#1A237E" opacity="0.25" transform="rotate(6,610,660)"/>
  <rect x="720" y="618" width="130" height="68" rx="8" fill="#1A237E" opacity="0.2" transform="rotate(-5,785,652)"/>
  <!-- Impact glow center -->
  <ellipse cx="512" cy="450" rx="140" ry="60" fill="#5C6BC0" opacity="0.15"/>
</svg>
