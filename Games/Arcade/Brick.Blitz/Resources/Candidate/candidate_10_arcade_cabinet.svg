<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001100"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Arcade cabinet body -->
  <rect x="148" y="60" width="216" height="340" rx="12" fill="#222222" stroke="#444" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="164" y="76" width="184" height="200" rx="8" fill="#111"/>
  <!-- Screen -->
  <rect x="172" y="84" width="168" height="184" rx="6" fill="url(#screen)"/>
  <!-- Mini bricks on screen -->
  <rect x="182" y="98" width="36" height="14" rx="3" fill="#FF3333"/>
  <rect x="224" y="98" width="36" height="14" rx="3" fill="#FF3333"/>
  <rect x="266" y="98" width="36" height="14" rx="3" fill="#FF3333"/>
  <rect x="308" y="98" width="24" height="14" rx="3" fill="#FF3333"/>
  <rect x="182" y="118" width="36" height="14" rx="3" fill="#FF8800"/>
  <rect x="224" y="118" width="36" height="14" rx="3" fill="#FF8800"/>
  <rect x="266" y="118" width="36" height="14" rx="3" fill="#FF8800"/>
  <!-- Screen ball -->
  <circle cx="238" cy="148" r="8" fill="#FFFFFF"/>
  <!-- Screen paddle -->
  <rect x="214" y="252" width="72" height="10" rx="5" fill="#00FFFF"/>
  <!-- Coin slot -->
  <rect x="226" y="288" width="60" height="8" rx="4" fill="#555"/>
  <rect x="246" y="286" width="20" height="12" rx="2" fill="#333"/>
  <!-- Joystick -->
  <circle cx="200" cy="330" r="16" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="200" cy="330" r="8" fill="#FF0000"/>
  <!-- Buttons -->
  <circle cx="270" cy="328" r="10" fill="#FF0000"/>
  <circle cx="300" cy="320" r="10" fill="#0066FF"/>
  <circle cx="285" cy="348" r="10" fill="#00CC00"/>
  <!-- Title text -->
  <text x="256" y="435" font-family="Arial" font-size="20" font-weight="bold" fill="#FFDD00" text-anchor="middle">INSERT COIN</text>
  <text x="256" y="468" font-family="Arial" font-size="24" font-weight="bold" fill="#FF4400" text-anchor="middle">Brick.Blitz</text>
</svg>
