<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
    <linearGradient id="knife" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 밝은 빨강 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg4)"/>

  <!-- Layer 2: 스위스 아미나이프 본체 (빨강) -->
  <rect x="312" y="360" width="400" height="300" rx="50" fill="#D32F2F"/>
  <!-- 외곽 하이라이트 -->
  <rect x="320" y="368" width="384" height="120" rx="40" fill="#EF5350" opacity="0.5"/>
  <!-- 칼날/도구들이 펼쳐지는 모습 -->

  <!-- 도구 1: 칼날 (위) -->
  <g transform="translate(512 360) rotate(-30, 0, 0)">
    <rect x="-14" y="-220" width="28" height="220" rx="6" fill="url(#knife)"/>
    <polygon points="-14,-220 14,-220 0,-280" fill="#BDBDBD"/>
    <!-- 레이블 -->
    <rect x="-50" y="-310" width="100" height="42" rx="10" fill="#FF5722"/>
    <text x="0" y="-287" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">JSON</text>
  </g>

  <!-- 도구 2: 가위 (오른쪽 위) -->
  <g transform="translate(512 360) rotate(15, 0, 0)">
    <rect x="-14" y="-200" width="28" height="200" rx="6" fill="url(#knife)"/>
    <rect x="-50" y="-260" width="100" height="42" rx="10" fill="#1565C0"/>
    <text x="0" y="-237" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">HASH</text>
  </g>

  <!-- 도구 3: 오른쪽 -->
  <g transform="translate(512 360) rotate(45, 0, 0)">
    <rect x="-14" y="-180" width="28" height="180" rx="6" fill="url(#knife)"/>
    <rect x="-50" y="-236" width="100" height="42" rx="10" fill="#2E7D32"/>
    <text x="0" y="-213" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">REGEX</text>
  </g>

  <!-- 도구 4: 왼쪽 위 -->
  <g transform="translate(512 360) rotate(-60, 0, 0)">
    <rect x="-14" y="-190" width="28" height="190" rx="6" fill="url(#knife)"/>
    <rect x="-56" y="-250" width="112" height="42" rx="10" fill="#6A1B9A"/>
    <text x="0" y="-227" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">BASE64</text>
  </g>

  <!-- 본체 로고 -->
  <text x="512" y="524" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="white" text-anchor="middle" dominant-baseline="middle">+</text>

  <!-- Layer 3: 도구 개수 배지 -->
  <circle cx="760" cy="280" r="80" fill="#FF8F00"/>
  <text x="760" y="264" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle" dominant-baseline="middle">8</text>
  <text x="760" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#FFF3E0" text-anchor="middle" dominant-baseline="middle">tools</text>
</svg>
