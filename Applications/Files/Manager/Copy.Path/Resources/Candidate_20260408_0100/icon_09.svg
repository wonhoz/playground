  <rect x="376" y="542" width="234" height="58" rx="10" fill="#FDF4FF"/>
  <rect x="376" y="542" width="8" height="58" rx="4" fill="#D946EF"/>
  <text x="394" y="570" font-family="Consolas,monospace" font-size="20" fill="#701A75" font-weight="bold">unix</text>
  <text x="394" y="590" font-family="Consolas,monospace" font-size="16" fill="#6B7280">/c/Users/admin</text>

  <rect x="622" y="542" width="234" height="58" rx="10" fill="#FFF8F1"/>
  <rect x="622" y="542" width="8" height="58" rx="4" fill="#FB923C"/>
  <text x="640" y="570" font-family="Consolas,monospace" font-size="20" fill="#7C2D12" font-weight="bold">UNC</text>
  <text x="640" y="590" font-family="Consolas,monospace" font-size="14" fill="#6B7280">\\HOST\C$\Use...</text>
