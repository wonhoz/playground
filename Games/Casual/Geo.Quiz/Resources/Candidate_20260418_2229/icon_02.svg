<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background earth green -->
  <defs>
    <radialGradient id="bg02" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: Globe / world map simplified -->
  <circle cx="512" cy="480" r="320" fill="#1565C0" opacity="0.85"/>
  <!-- Continents (simplified shapes) -->
  <!-- North America -->
  <ellipse cx="380" cy="390" rx="80" ry="90" fill="#66BB6A" opacity="0.9"/>
  <!-- South America -->
  <ellipse cx="410" cy="540" rx="55" ry="80" fill="#81C784" opacity="0.9"/>
  <!-- Europe -->
  <ellipse cx="510" cy="360" rx="60" ry="50" fill="#66BB6A" opacity="0.9"/>
  <!-- Africa -->
  <ellipse cx="520" cy="490" rx="65" ry="90" fill="#A5D6A7" opacity="0.9"/>
  <!-- Asia -->
  <ellipse cx="660" cy="380" rx="120" ry="70" fill="#388E3C" opacity="0.9"/>
  <!-- Australia -->
  <ellipse cx="680" cy="540" rx="60" ry="44" fill="#66BB6A" opacity="0.9"/>
  <!-- Lat/lon grid lines -->
  <circle cx="512" cy="480" r="320" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.2"/>
  <ellipse cx="512" cy="480" rx="320" ry="160" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.15"/>
  <line x1="192" y1="480" x2="832" y2="480" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <!-- Layer 3: Capital city pins -->
  <!-- Pin 1 -->
  <circle cx="400" cy="400" r="18" fill="#FF1744"/>
  <line x1="400" y1="418" x2="400" y2="450" stroke="#FF1744" stroke-width="6"/>
  <!-- Pin 2 -->
  <circle cx="530" cy="355" r="18" fill="#FF1744"/>
  <line x1="530" y1="373" x2="530" y2="405" stroke="#FF1744" stroke-width="6"/>
  <!-- Pin 3 -->
  <circle cx="660" cy="390" r="18" fill="#FFD740"/>
  <line x1="660" y1="408" x2="660" y2="440" stroke="#FFD740" stroke-width="6"/>
  <!-- GEO QUIZ label -->
  <rect x="290" y="830" width="444" height="90" rx="20" fill="#1B5E20"/>
  <text x="512" y="889" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#A5D6A7" text-anchor="middle">GEO QUIZ</text>
</svg>
