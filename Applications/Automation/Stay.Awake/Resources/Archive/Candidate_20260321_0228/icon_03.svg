<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark navy -->
  <rect width="1024" height="1024" rx="200" fill="#060C1C"/>
  <!-- Mouse cursor body (large filled arrow, top-left area) -->
  <polygon points="220,200 220,610 352,490 438,680 524,642 438,452 606,452" fill="#1E90FF" stroke="#E3F2FD" stroke-width="18" stroke-linejoin="round"/>
  <!-- Cursor tip bright highlight -->
  <circle cx="220" cy="200" r="30" fill="#82CFFF"/>
  <!-- Lightning bolt (right side, yellow+warm) -->
  <!-- bolt: zig-zag path -->
  <polygon points="680,160 580,520 660,520 560,860 780,440 690,440 800,160" fill="#FFD600" stroke="#FFF176" stroke-width="8" stroke-linejoin="round"/>
</svg>
