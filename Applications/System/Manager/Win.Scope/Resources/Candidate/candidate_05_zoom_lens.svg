<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0533"/>
      <stop offset="100%" stop-color="#0D0820"/>
    </linearGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9C27B0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3F0A60" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Windows mini thumbnails in background -->
  <rect x="56" y="72" width="120" height="90" rx="6" fill="#1A0D30" stroke="#4A0E6A" stroke-width="1.5" opacity="0.7"/>
  <rect x="56" y="72" width="120" height="16" rx="6" fill="#4A0E6A" opacity="0.6"/>
  <rect x="196" y="82" width="120" height="90" rx="6" fill="#1A0D30" stroke="#4A0E6A" stroke-width="1.5" opacity="0.7"/>
  <rect x="336" y="66" width="120" height="90" rx="6" fill="#1A0D30" stroke="#4A0E6A" stroke-width="1.5" opacity="0.7"/>
  <rect x="56" y="186" width="120" height="90" rx="6" fill="#1A0D30" stroke="#4A0E6A" stroke-width="1.5" opacity="0.7"/>
  <rect x="336" y="186" width="120" height="90" rx="6" fill="#1A0D30" stroke="#4A0E6A" stroke-width="1.5" opacity="0.7"/>
  <!-- Magnifier circle -->
  <circle cx="248" cy="258" r="148" fill="url(#lens)" stroke="url(#frame)" stroke-width="12" filter="url(#glow)"/>
  <!-- Inner reflection -->
  <circle cx="248" cy="258" r="142" fill="none" stroke="#CE93D8" stroke-width="2" opacity="0.3"/>
  <ellipse cx="214" cy="200" rx="30" ry="16" fill="#FFFFFF" opacity="0.06"/>
  <!-- Zoomed window inside lens -->
  <clipPath id="lc2"><circle cx="248" cy="258" r="138"/></clipPath>
  <g clip-path="url(#lc2)">
    <rect x="148" y="168" width="200" height="180" rx="8" fill="#0D0820" stroke="#9C27B0" stroke-width="2"/>
    <rect x="148" y="168" width="200" height="24" rx="8" fill="#7B1FA2" opacity="0.8"/>
    <text x="172" y="185" font-family="Segoe UI" font-size="13" fill="#FFF">chrome.exe</text>
    <text x="162" y="214" font-family="Segoe UI" font-size="11" fill="#CE93D8">HWND: 0x00020034</text>
    <text x="162" y="232" font-family="Segoe UI" font-size="11" fill="#CE93D8">PID: 7291</text>
    <text x="162" y="250" font-family="Segoe UI" font-size="11" fill="#CE93D8">Pos: (0,0) 1920x1080</text>
    <text x="162" y="268" font-family="Segoe UI" font-size="11" fill="#CE93D8">Style: Overlapped</text>
    <text x="162" y="286" font-family="Segoe UI" font-size="11" fill="#CE93D8">Visible: true</text>
    <text x="162" y="304" font-family="Segoe UI" font-size="11" fill="#CE93D8">Z-Order: 1</text>
    <text x="162" y="322" font-family="Segoe UI" font-size="11" fill="#CE93D8">Class: Widget_1</text>
  </g>
  <!-- Handle grip -->
  <line x1="366" y1="376" x2="430" y2="452" stroke="url(#frame)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
  <text x="256" y="496" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#CE93D8">WIN.SCOPE</text>
</svg>
