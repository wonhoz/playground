<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Programmer sleeping at desk -->
  <!-- Desk -->
  <rect x="180" y="620" width="664" height="40" rx="10" fill="#1B5E20" fill-opacity="0.7"/>
  <!-- Monitor -->
  <rect x="340" y="380" width="344" height="220" rx="14" fill="#1B5E20" fill-opacity="0.6" stroke="#66BB6A" stroke-width="12"/>
  <!-- Code on screen -->
  <rect x="368" y="410" width="120" height="14" rx="5" fill="#A5D6A7"/>
  <rect x="368" y="440" width="80" height="14" rx="5" fill="#66BB6A"/>
  <rect x="368" y="470" width="140" height="14" rx="5" fill="#A5D6A7" fill-opacity="0.7"/>
  <rect x="368" y="500" width="60" height="14" rx="5" fill="#66BB6A" fill-opacity="0.6"/>
  <!-- Auto-run indicator (blinking cursor) -->
  <rect x="368" y="530" width="12" height="24" rx="2" fill="#66BB6A"/>
  <!-- Monitor stand -->
  <rect x="492" y="600" width="40" height="24" rx="4" fill="#1B5E20" fill-opacity="0.8"/>
  <!-- Sleeping head on desk -->
  <ellipse cx="380" cy="620" rx="60" ry="40" fill="#1B5E20" fill-opacity="0.8"/>
  <!-- Arms on desk -->
  <rect x="200" y="600" width="300" height="28" rx="14" fill="#1B5E20" fill-opacity="0.6"/>
  <!-- Zzz bubbles -->
  <circle cx="310" cy="500" r="20" fill="none" stroke="#66BB6A" stroke-width="10"/>
  <circle cx="360" cy="440" r="28" fill="none" stroke="#A5D6A7" stroke-width="10"/>
  <circle cx="430" cy="370" r="36" fill="none" stroke="#66BB6A" stroke-width="10"/>
</svg>