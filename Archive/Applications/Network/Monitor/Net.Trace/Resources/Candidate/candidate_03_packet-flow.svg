<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a0a3a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Source node -->
  <rect x="50" y="216" width="80" height="80" rx="12" fill="#1e1060" stroke="#7b2fff" stroke-width="2"/>
  <text x="90" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#7b2fff">SRC</text>
  <!-- Dest node -->
  <rect x="382" y="216" width="80" height="80" rx="12" fill="#1e1060" stroke="#ff6b6b" stroke-width="2"/>
  <text x="422" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff6b6b">DST</text>
  <!-- Flow line -->
  <line x1="130" y1="256" x2="382" y2="256" stroke="url(#arrow)" stroke-width="3" stroke-dasharray="12,6"/>
  <!-- Packets -->
  <rect x="180" y="240" width="30" height="32" rx="4" fill="#7b2fff" opacity="0.9"/>
  <rect x="240" y="240" width="30" height="32" rx="4" fill="#9b4fff" opacity="0.8"/>
  <rect x="300" y="240" width="30" height="32" rx="4" fill="#ff6b6b" opacity="0.7"/>
  <!-- Hop nodes -->
  <circle cx="195" cy="180" r="20" fill="#1e1060" stroke="#7b2fff" stroke-width="1.5"/>
  <circle cx="256" cy="160" r="20" fill="#1e1060" stroke="#9b4fff" stroke-width="1.5"/>
  <circle cx="317" cy="180" r="20" fill="#1e1060" stroke="#ff6b6b" stroke-width="1.5"/>
  <line x1="130" y1="256" x2="195" y2="180" stroke="#7b2fff" stroke-width="1" opacity="0.4"/>
  <line x1="195" y1="180" x2="256" y2="160" stroke="#9b4fff" stroke-width="1" opacity="0.4"/>
  <line x1="256" y1="160" x2="317" y2="180" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  <line x1="317" y1="180" x2="382" y2="256" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#9b4fff">NET.TRACE</text>
</svg>
