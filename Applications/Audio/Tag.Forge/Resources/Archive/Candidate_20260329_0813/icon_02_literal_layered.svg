<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - deep teal/navy -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="card2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E4A7A"/>
      <stop offset="100%" stop-color="#0E2A4A"/>
    </linearGradient>
    <linearGradient id="card2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5C8A"/>
      <stop offset="100%" stop-color="#0E3558"/>
    </linearGradient>
    <linearGradient id="card2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="50%" stop-color="#0090D8"/>
      <stop offset="100%" stop-color="#005BA0"/>
    </linearGradient>
    <linearGradient id="pencil2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="80%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg2)" rx="180"/>

  <!-- Subtle grid lines (metadata/data feel) -->
  <line x1="150" y1="200" x2="874" y2="200" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>
  <line x1="150" y1="400" x2="874" y2="400" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>
  <line x1="150" y1="600" x2="874" y2="600" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>
  <line x1="150" y1="800" x2="874" y2="800" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>

  <!-- Layer 2: Stacked file cards (layered composition) -->
  <!-- Bottom card -->
  <rect x="200" y="310" width="530" height="360" rx="18" fill="url(#card2a)" opacity="0.7"/>
  <!-- Middle card -->
  <rect x="220" y="290" width="530" height="360" rx="18" fill="url(#card2b)" opacity="0.85"/>
  <!-- Top card (active) -->
  <rect x="240" y="268" width="530" height="360" rx="18" fill="url(#card2c)"/>

  <!-- Top card content -->
  <!-- Music note icon -->
  <circle cx="318" cy="340" r="22" fill="#001830" opacity="0.5"/>
  <text x="308" y="350" font-family="'Segoe UI Symbol', Arial" font-size="26" fill="white" opacity="0.9">&#9835;</text>

  <!-- Tag label rows on top card -->
  <rect x="280" y="330" width="60" height="16" rx="6" fill="white" opacity="0.18"/>
  <text x="280" y="343" font-family="Arial" font-size="13" fill="#AAD8FF" opacity="0.7">TITLE</text>
  <rect x="280" y="356" width="340" height="22" rx="5" fill="white" opacity="0.12"/>
  <text x="288" y="373" font-family="'Arial Black', Arial" font-weight="900" font-size="19" fill="white">Neon Rain</text>

  <rect x="280" y="392" width="60" height="14" rx="5" fill="white" opacity="0.15"/>
  <text x="280" y="403" font-family="Arial" font-size="13" fill="#AAD8FF" opacity="0.7">ARTIST</text>
  <rect x="280" y="412" width="240" height="20" rx="5" fill="white" opacity="0.1"/>
  <text x="288" y="428" font-family="Arial" font-size="17" fill="#E0F4FF">Luna Blaze</text>

  <rect x="280" y="446" width="60" height="14" rx="5" fill="white" opacity="0.15"/>
  <text x="280" y="457" font-family="Arial" font-size="13" fill="#AAD8FF" opacity="0.7">ALBUM</text>
  <rect x="280" y="466" width="300" height="20" rx="5" fill="white" opacity="0.1"/>
  <text x="288" y="482" font-family="Arial" font-size="17" fill="#E0F4FF">Midnight Sessions</text>

  <!-- YEAR / TRACK row -->
  <text x="280" y="526" font-family="Arial" font-size="13" fill="#AAD8FF" opacity="0.7">YEAR</text>
  <text x="360" y="526" font-family="Arial" font-size="13" fill="#AAD8FF" opacity="0.7">TRACK</text>
  <text x="280" y="546" font-family="'Arial Black',Arial" font-weight="900" font-size="19" fill="white">2024</text>
  <text x="360" y="546" font-family="'Arial Black',Arial" font-weight="900" font-size="19" fill="white">07</text>

  <!-- Divider line -->
  <line x1="280" y1="558" x2="740" y2="558" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Saved checkmark badge -->
  <circle cx="726" cy="285" r="28" fill="#00E87A"/>
  <polyline points="714,285 722,294 740,274" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 3: Yellow pencil (edit/forge detail) -->
  <g transform="translate(730 620) rotate(-38)">
    <rect x="-14" y="-100" width="28" height="130" rx="6" fill="url(#pencil2)"/>
    <!-- Pencil tip -->
    <polygon points="-14,30 14,30 0,68" fill="#F5C842"/>
    <!-- Eraser -->
    <rect x="-14" y="-108" width="28" height="18" rx="4" fill="#FF8888"/>
    <rect x="-14" y="-100" width="28" height="6" fill="#C86060"/>
    <!-- Highlight -->
    <rect x="-5" y="-95" width="8" height="100" rx="3" fill="white" opacity="0.25"/>
  </g>
</svg>
