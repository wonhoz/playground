<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0F1B38"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: bin / obj text (VS artifact folder names) -->
  <!-- Subtle folder outline hinting at a project structure -->
  <rect x="250" y="148" width="524" height="48" rx="18" fill="none" stroke="#2A3F6A" stroke-width="6"/>
  <rect x="210" y="188" width="604" height="632" rx="42" fill="none" stroke="#2A3F6A" stroke-width="6"/>

  <text x="512" y="448"
        font-family="'Courier New', Courier, monospace"
        font-size="215" font-weight="700"
        text-anchor="middle" fill="#4A5F90">bin</text>
  <text x="512" y="668"
        font-family="'Courier New', Courier, monospace"
        font-size="215" font-weight="700"
        text-anchor="middle" fill="#3A4F80">obj</text>

  <!-- Layer 3: Bold red X crossing through the texts -->
  <!-- Outer X (thick, darker) -->
  <line x1="215" y1="225" x2="810" y2="820"
        stroke="#B71C1C" stroke-width="110" stroke-linecap="round"/>
  <line x1="810" y1="225" x2="215" y2="820"
        stroke="#B71C1C" stroke-width="110" stroke-linecap="round"/>
  <!-- Inner X (bright red highlight) -->
  <line x1="215" y1="225" x2="810" y2="820"
        stroke="#FF1744" stroke-width="60" stroke-linecap="round" opacity="0.75"/>
  <line x1="810" y1="225" x2="215" y2="820"
        stroke="#FF1744" stroke-width="60" stroke-linecap="round" opacity="0.75"/>
</svg>
