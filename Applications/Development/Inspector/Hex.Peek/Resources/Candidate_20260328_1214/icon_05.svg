<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8F00"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
    <filter id="shadow05">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#BF360C" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg05)" rx="120"/>

  <!-- Layer 2: File icon -->
  <g filter="url(#shadow05)">
    <!-- File body -->
    <path d="M180 120 L640 120 L820 300 L820 920 L180 920 Z" fill="url(#bodyGrad)" stroke="#FF8F00" stroke-width="22"/>
    <!-- Dog-ear flap -->
    <polygon points="640,120 820,300 640,300" fill="url(#fileGrad)"/>
    <line x1="640" y1="120" x2="640" y2="300" stroke="#E65100" stroke-width="14"/>
    <line x1="640" y1="300" x2="820" y2="300" stroke="#E65100" stroke-width="14"/>
    <!-- File top band (golden) -->
    <rect x="180" y="120" width="460" height="80" rx="0" fill="#FF8F00"/>
    <rect x="180" y="120" width="460" height="80" rx="22" fill="#FF8F00"/>
    <rect x="180" y="155" width="460" height="45" fill="#FF8F00"/>
  </g>

  <!-- HEX label on top band -->
  <text x="420" y="167" font-family="Arial,sans-serif" font-size="76" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">HEX</text>

  <!-- Layer 3: Hex text content in file body -->
  <text x="220" y="380" font-family="monospace" font-size="52" font-weight="bold" fill="#BF360C">FF 4A 0D</text>
  <text x="220" y="450" font-family="monospace" font-size="52" font-weight="bold" fill="#E65100">2C 50 45</text>

  <!-- Highlighted row -->
  <rect x="200" y="475" width="560" height="72" rx="14" fill="rgba(255,143,0,0.25)"/>
  <text x="220" y="520" font-family="monospace" font-size="52" font-weight="bold" fill="#FF6F00">00 00 B8</text>

  <text x="220" y="595" font-family="monospace" font-size="52" font-weight="bold" fill="#BF360C" opacity="0.8">1C 6F 3A</text>
  <text x="220" y="665" font-family="monospace" font-size="52" fill="#E65100" opacity="0.65">A3 7E C1</text>
  <text x="220" y="735" font-family="monospace" font-size="52" fill="#BF360C" opacity="0.5">D4 08 F2</text>

  <!-- ASCII column -->
  <line x1="748" y1="340" x2="748" y2="790" stroke="#FFB300" stroke-width="8"/>
  <text x="770" y="380" font-family="monospace" font-size="52" fill="#E65100">PE.</text>
  <text x="770" y="450" font-family="monospace" font-size="52" fill="#E65100">,PE</text>
  <text x="770" y="520" font-family="monospace" font-size="52" fill="#FF6F00">...</text>
  <text x="770" y="595" font-family="monospace" font-size="52" fill="#E65100" opacity="0.7">.:j</text>
  <text x="770" y="665" font-family="monospace" font-size="52" fill="#BF360C" opacity="0.55">~.</text>
  <text x="770" y="735" font-family="monospace" font-size="52" fill="#BF360C" opacity="0.4">...</text>

  <!-- Address offset label -->
  <text x="200" y="840" font-family="monospace" font-size="40" fill="#BF360C" opacity="0.7">0x00000000</text>
</svg>
