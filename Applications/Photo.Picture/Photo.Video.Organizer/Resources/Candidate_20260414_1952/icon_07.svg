<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 하늘+흰색 -->
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 사진+동영상 아이콘 레이어드 + 날짜 태그 -->
  <!-- 동영상 아이콘 (뒤) -->
  <rect x="320" y="280" width="480" height="360" rx="28" fill="#1976D2" opacity="0.85" transform="rotate(6 560 460)"/>
  <!-- 재생 버튼 -->
  <polygon points="500,360 500,500 640,430" fill="white" opacity="0.8" transform="rotate(6 560 460)"/>
  <!-- 사진 프레임 (앞) -->
  <rect x="200" y="300" width="480" height="360" rx="28" fill="white" opacity="0.95"/>
  <!-- 사진 내용 (풍경) -->
  <defs>
    <linearGradient id="sky07" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
  </defs>
  <rect x="218" y="318" width="444" height="280" rx="16" fill="url(#sky07)"/>
  <!-- 산 실루엣 -->
  <polygon points="218,598 340,480 420,540 480,420 560,540 620,480 662,598" fill="#2E7D32" opacity="0.8"/>
  <!-- 태양 -->
  <circle cx="580" cy="390" r="44" fill="#FFD700" opacity="0.9"/>
  <!-- Layer 3: 날짜 태그 (오른쪽 하단) -->
  <rect x="500" y="600" width="340" height="100" rx="20" fill="#0277BD" opacity="0.95"/>
  <text x="670" y="665" font-family="Segoe UI, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">2024-06-15</text>
  <!-- 아이콘 타입 태그 -->
  <rect x="218" y="350" width="86" height="50" rx="10" fill="#F44336" opacity="0.9"/>
  <text x="261" y="385" font-family="Segoe UI, sans-serif" font-size="34" font-weight="bold" fill="white" text-anchor="middle">JPG</text>
  <!-- 하단 레이블 -->
  <text x="512" y="880" font-family="Segoe UI, sans-serif" font-size="62" font-weight="bold" fill="#01579B" text-anchor="middle">Photo + Video</text>
  <text x="512" y="942" font-family="Segoe UI, sans-serif" font-size="48" fill="#0277BD" text-anchor="middle">Organizer</text>
</svg>
