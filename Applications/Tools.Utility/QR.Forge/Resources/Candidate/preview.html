<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>QR.Forge - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 24px; color: #888; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; }
  .item span { font-size: 0.72rem; color: #666; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>QR.Forge — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_blue_qr_scan.svg"/><span>01 blue_qr_scan</span></div>
  <div class="item"><img src="candidate_02_neon_qr_generate.svg"/><span>02 neon_qr_generate</span></div>
  <div class="item"><img src="candidate_03_orange_forge_hammer.svg"/><span>03 orange_forge_hammer</span></div>
  <div class="item"><img src="candidate_04_purple_qr_link.svg"/><span>04 purple_qr_link</span></div>
  <div class="item"><img src="candidate_05_teal_minimal_qr.svg"/><span>05 teal_minimal_qr</span></div>
  <div class="item"><img src="candidate_06_gold_qr_premium.svg"/><span>06 gold_qr_premium</span></div>
  <div class="item"><img src="candidate_07_cyan_qr_wifi.svg"/><span>07 cyan_qr_wifi</span></div>
  <div class="item"><img src="candidate_08_red_qr_scan_beam.svg"/><span>08 red_qr_scan_beam</span></div>
  <div class="item"><img src="candidate_09_green_circuit_qr.svg"/><span>09 green_circuit_qr</span></div>
  <div class="item"><img src="candidate_10_white_clean_qr.svg"/><span>10 white_clean_qr</span></div>
</div>
</body>
</html>
