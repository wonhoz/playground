<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="cryFace1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cryFace2" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cryFace3" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Crystal facets (archive as crystal) -->
  <!-- Top facet -->
  <polygon points="256,55 385,195 256,235 127,195" fill="url(#cryFace1)" stroke="#EAB308" stroke-width="2" stroke-opacity="0.8" filter="url(#softglow)"/>
  <!-- Right facet -->
  <polygon points="385,195 430,330 256,415 256,235" fill="url(#cryFace2)" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Left facet -->
  <polygon points="256,235 256,415 82,330 127,195" fill="url(#cryFace3)" stroke="#FBBF24" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Bottom -->
  <polygon points="256,415 430,330 256,455 82,330" fill="#EAB308" fill-opacity="0.15" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- File archive contents inside crystal (stacked files) -->
  <!-- File stack visible through crystal faces -->
  <g opacity="0.5">
    <rect x="220" y="195" width="72" height="90" rx="4" fill="#EAB308" fill-opacity="0.12" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="230" y1="215" x2="282" y2="215" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="230" y1="228" x2="278" y2="228" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="230" y1="241" x2="282" y2="241" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="230" y1="254" x2="275" y2="254" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="230" y1="267" x2="282" y2="267" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.45"/>
  </g>

  <!-- Crystal edges highlights -->
  <line x1="256" y1="55" x2="385" y2="195" stroke="#FDE68A" stroke-width="2" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="256" y1="55" x2="127" y2="195" stroke="#FDE68A" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="256" y1="455" x2="430" y2="330" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="455" x2="82" y2="330" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="235" x2="385" y2="195" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="235" x2="127" y2="195" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="235" x2="256" y2="415" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="256" y1="235" x2="430" y2="330" stroke="#EAB308" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="256" y1="235" x2="82" y2="330" stroke="#EAB308" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Crystal apex glow -->
  <circle cx="256" cy="55" r="20" fill="#EAB308" fill-opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="55" r="8" fill="#FDE68A" filter="url(#glow)"/>
  <circle cx="256" cy="55" r="4" fill="white"/>

  <!-- Vertex glows -->
  <circle cx="385" cy="195" r="6" fill="#EAB308" filter="url(#softglow)"/>
  <circle cx="127" cy="195" r="6" fill="#F59E0B" filter="url(#softglow)"/>
  <circle cx="430" cy="330" r="5" fill="#EAB308" filter="url(#softglow)"/>
  <circle cx="82" cy="330" r="5" fill="#FBBF24" filter="url(#softglow)"/>
  <circle cx="256" cy="455" r="7" fill="#EAB308" filter="url(#glow)"/>

  <!-- Sub-crystals -->
  <polygon points="420,80 440,105 420,120 400,105" fill="#EAB308" fill-opacity="0.25" stroke="#EAB308" stroke-width="1.5"/>
  <polygon points="85,85 100,110 85,125 70,110" fill="#F59E0B" fill-opacity="0.25" stroke="#F59E0B" stroke-width="1.5"/>
</svg>
