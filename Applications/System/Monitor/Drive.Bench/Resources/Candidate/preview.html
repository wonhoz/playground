<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive.Bench — Icon Candidates</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #fb923c; }
    p.subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .card:hover { border-color: #f97316; transform: translateY(-3px); }
    .card img { width: 128px; height: 128px; border-radius: 20px; }
    .card .label { font-size: 11px; color: #888; text-align: center; word-break: break-all; }
    .card .num { font-size: 18px; font-weight: 700; color: #f97316; }
  </style>
</head>
<body>
  <h1>Drive.Bench — Icon Candidates</h1>
  <p class="subtitle">드라이브 성능 벤치마크 | 10 candidates</p>
  <div class="grid">
    <div class="card"><span class="num">01</span><img src="candidate_01_speedometer.svg" alt="speedometer"><span class="label">speedometer</span></div>
    <div class="card"><span class="num">02</span><img src="candidate_02_waveform_bench.svg" alt="waveform bench"><span class="label">waveform_bench</span></div>
    <div class="card"><span class="num">03</span><img src="candidate_03_benchmark_bars.svg" alt="benchmark bars"><span class="label">benchmark_bars</span></div>
    <div class="card"><span class="num">04</span><img src="candidate_04_circuit_drive.svg" alt="circuit drive"><span class="label">circuit_drive</span></div>
    <div class="card"><span class="num">05</span><img src="candidate_05_rocket_speed.svg" alt="rocket speed"><span class="label">rocket_speed</span></div>
    <div class="card"><span class="num">06</span><img src="candidate_06_data_flow.svg" alt="data flow"><span class="label">data_flow</span></div>
    <div class="card"><span class="num">07</span><img src="candidate_07_diamond_perf.svg" alt="diamond perf"><span class="label">diamond_perf</span></div>
    <div class="card"><span class="num">08</span><img src="candidate_08_thermal_bench.svg" alt="thermal bench"><span class="label">thermal_bench</span></div>
    <div class="card"><span class="num">09</span><img src="candidate_09_radar_chart.svg" alt="radar chart"><span class="label">radar_chart</span></div>
    <div class="card"><span class="num">10</span><img src="candidate_10_golden_drive.svg" alt="golden drive"><span class="label">golden_drive</span></div>
  </div>
</body>
</html>
