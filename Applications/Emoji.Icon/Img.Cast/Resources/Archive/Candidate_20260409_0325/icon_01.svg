<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="c1"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Vivid indigo/purple gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#g1)"/>
  <g clip-path="url(#c1)">
    <!-- Decorative soft circle -->
    <circle cx="200" cy="820" r="180" fill="#6D28D9" opacity="0.35"/>
    <!-- Layer 2: Format labels -->
    <!-- "SVG" left badge -->
    <rect x="96" y="330" width="298" height="154" rx="28" fill="#818CF8"/>
    <text x="245" y="437" font-family="Arial Black,Arial,sans-serif" font-size="130" fill="white" font-weight="900" text-anchor="middle">SVG</text>
    <!-- "ICO" right badge -->
    <rect x="630" y="330" width="298" height="154" rx="28" fill="#A78BFA"/>
    <text x="779" y="437" font-family="Arial Black,Arial,sans-serif" font-size="130" fill="white" font-weight="900" text-anchor="middle">ICO</text>
    <!-- Layer 3: Bold conversion arrow -->
    <line x1="416" y1="407" x2="598" y2="407" stroke="white" stroke-width="72" stroke-linecap="round"/>
    <polygon points="570,346 660,407 570,468" fill="white"/>
    <!-- Size label below -->
    <text x="512" y="602" font-family="Arial,sans-serif" font-size="84" fill="#C4B5FD" font-weight="bold" text-anchor="middle">16 · 32 · 48 · 256</text>
    <!-- Subtitle -->
    <rect x="276" y="650" width="472" height="80" rx="16" fill="white" opacity="0.18"/>
    <text x="512" y="707" font-family="Arial,sans-serif" font-size="82" fill="white" font-weight="bold" text-anchor="middle">Image Cast</text>
  </g>
</svg>
