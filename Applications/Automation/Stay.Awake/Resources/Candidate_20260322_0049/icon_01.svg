<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    icon_01 [literal] — Slack 아바타 + 초록 Presence
    컨셉: Slack 앱 사용자 아바타 옆 presence indicator가 초록 = 항상 Active
    연결고리: Slack에서 유저 옆 초록 점 = 활성 상태 — 이 앱이 그 점을 항상 초록으로 유지
    패턴: 중앙 심볼
    색상: 진보라(#6B21A8→#3B0369) + 연보라 아바타 + 초록 포인트
  -->
  <defs>
    <radialGradient id="bg01" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#3B0369"/>
    </radialGradient>
    <radialGradient id="presence01" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </radialGradient>
    <clipPath id="avatarClip01">
      <circle cx="512" cy="460" r="242"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 (Slack 보라 그라데이션) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: 아바타 원 + 사람 실루엣 -->
  <circle cx="512" cy="460" r="242" fill="#9333EA"/>
  <g clip-path="url(#avatarClip01)">
    <!-- 머리 -->
    <circle cx="512" cy="374" r="108" fill="#EDE9FE"/>
    <!-- 몸통 어깨 -->
    <ellipse cx="512" cy="645" rx="182" ry="148" fill="#EDE9FE"/>
  </g>
  <!-- 아바타 미묘한 테두리 -->
  <circle cx="512" cy="460" r="242" fill="none" stroke="#C084FC" stroke-width="10" opacity="0.5"/>

  <!-- Layer 3: Presence 점 (아바타 오른쪽 하단 — Slack 표준 위치) -->
  <!-- 구분 테두리 (배경색으로) -->
  <circle cx="692" cy="642" r="90" fill="#3B0369"/>
  <!-- 초록 presence 원 -->
  <circle cx="692" cy="642" r="74" fill="url(#presence01)"/>
  <!-- 하이라이트 -->
  <circle cx="670" cy="620" r="22" fill="white" opacity="0.35"/>
</svg>
