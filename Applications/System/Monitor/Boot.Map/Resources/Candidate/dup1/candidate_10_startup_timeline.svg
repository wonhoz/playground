<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline track -->
  <rect x="80" y="246" width="352" height="20" rx="10" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="2"/>
  <rect x="80" y="246" width="352" height="20" rx="10" fill="url(#track)" opacity="0.7" filter="url(#glow)"/>
  <!-- Phase markers on timeline -->
  <circle cx="80" cy="256" r="14" fill="#00bcd4" filter="url(#glow)"/>
  <circle cx="168" cy="256" r="12" fill="#26c6da" filter="url(#glow)"/>
  <circle cx="240" cy="256" r="14" fill="#7c4dff" filter="url(#glow)"/>
  <circle cx="320" cy="256" r="12" fill="#9575cd" filter="url(#glow)"/>
  <circle cx="432" cy="256" r="16" fill="#ea80fc" filter="url(#glow)"/>
  <!-- Phase labels above -->
  <rect x="60" y="140" width="40" height="28" rx="6" fill="#00838f" opacity="0.9"/>
  <line x1="80" y1="168" x2="80" y2="242" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="148" y="155" width="40" height="28" rx="6" fill="#00838f" opacity="0.8"/>
  <line x1="168" y1="183" x2="168" y2="244" stroke="#26c6da" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="220" y="140" width="40" height="28" rx="6" fill="#4527a0" opacity="0.9"/>
  <line x1="240" y1="168" x2="240" y2="242" stroke="#7c4dff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="300" y="155" width="40" height="28" rx="6" fill="#4527a0" opacity="0.8"/>
  <line x1="320" y1="183" x2="320" y2="244" stroke="#9575cd" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="412" y="140" width="40" height="28" rx="6" fill="#6a1b9a" opacity="0.9"/>
  <line x1="432" y1="168" x2="432" y2="242" stroke="#ea80fc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Duration bars below -->
  <rect x="80" y="290" width="88" height="30" rx="6" fill="#00bcd4" opacity="0.5"/>
  <rect x="168" y="290" width="72" height="30" rx="6" fill="#26c6da" opacity="0.4"/>
  <rect x="240" y="290" width="80" height="30" rx="6" fill="#7c4dff" opacity="0.5"/>
  <rect x="320" y="290" width="112" height="30" rx="6" fill="#ea80fc" opacity="0.4"/>
  <!-- Total time bar -->
  <rect x="80" y="360" width="352" height="18" rx="9" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="1.5"/>
  <rect x="80" y="360" width="280" height="18" rx="9" fill="#00e5ff" opacity="0.4"/>
  <circle cx="360" cy="369" r="12" fill="#00e5ff" filter="url(#glow)"/>
</svg>