<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: 막대 용량 (bar chart storage) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 바닥 기준선 -->
  <line x1="180" y1="780" x2="844" y2="780" stroke="#81C784" stroke-width="8" opacity="0.5"/>
  <!-- 막대 1 (가장 큼) -->
  <rect x="220" y="300" width="110" height="480" rx="12" fill="#2E7D32"/>
  <!-- 막대 2 -->
  <rect x="360" y="420" width="110" height="360" rx="12" fill="#81C784" opacity="0.85"/>
  <!-- 막대 3 -->
  <rect x="500" y="510" width="110" height="270" rx="12" fill="#2E7D32" opacity="0.7"/>
  <!-- 막대 4 -->
  <rect x="640" y="580" width="110" height="200" rx="12" fill="#81C784" opacity="0.55"/>
  <!-- 막대 상단 레이블 점 -->
  <circle cx="275" cy="290" r="14" fill="#81C784"/>
  <circle cx="415" cy="410" r="14" fill="#2E7D32"/>
  <circle cx="555" cy="500" r="14" fill="#81C784"/>
  <circle cx="695" cy="570" r="14" fill="#2E7D32"/>
  <!-- 가로 격자 -->
  <line x1="180" y1="620" x2="844" y2="620" stroke="#2E7D32" stroke-width="4" opacity="0.3"/>
  <line x1="180" y1="460" x2="844" y2="460" stroke="#2E7D32" stroke-width="4" opacity="0.3"/>
  <line x1="180" y1="300" x2="844" y2="300" stroke="#2E7D32" stroke-width="4" opacity="0.3"/>
</svg>
