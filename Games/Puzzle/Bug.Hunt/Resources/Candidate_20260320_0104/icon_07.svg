<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Fly swatter handle -->
  <line x1="720" y1="820" x2="560" y2="500" stroke="#E65100" stroke-width="36" stroke-linecap="round"/>
  <!-- Swatter grid head -->
  <rect x="280" y="200" width="340" height="320" rx="20" fill="#E65100" fill-opacity="0.4" stroke="#E65100" stroke-width="20"/>
  <!-- Grid lines -->
  <line x1="364" y1="200" x2="364" y2="520" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="448" y1="200" x2="448" y2="520" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="532" y1="200" x2="532" y2="520" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="280" y1="280" x2="620" y2="280" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="280" y1="360" x2="620" y2="360" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="280" y1="440" x2="620" y2="440" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <!-- Bug squashed on grid -->
  <ellipse cx="450" cy="360" rx="55" ry="40" fill="#FFAB40" fill-opacity="0.7"/>
  <!-- Impact stars -->
  <line x1="390" y1="310" x2="360" y2="280" stroke="#FFAB40" stroke-width="12"/>
  <line x1="510" y1="310" x2="540" y2="280" stroke="#FFAB40" stroke-width="12"/>
  <line x1="390" y1="410" x2="360" y2="440" stroke="#FFAB40" stroke-width="12"/>
  <line x1="510" y1="410" x2="540" y2="440" stroke="#FFAB40" stroke-width="12"/>
  <!-- Code lines beneath -->
  <rect x="680" y="300" width="140" height="16" rx="6" fill="#E65100" fill-opacity="0.5"/>
  <rect x="680" y="340" width="100" height="16" rx="6" fill="#FFAB40" fill-opacity="0.4"/>
  <rect x="680" y="380" width="120" height="16" rx="6" fill="#E65100" fill-opacity="0.5"/>
</svg>