<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03 | metaphor | 원소 순환 고리 -->
  <!-- 컨셉: 모래→불→증기→물→모래 순환 사이클을 원형 고리로 표현 -->
  <!-- 각 물질이 전환되는 흐름을 픽셀 도트 궤적으로 시각화 -->

  <!-- 배경: 딥 네이비 -->
  <rect x="80" y="80" width="864" height="864" rx="160" fill="#0A0E1A"/>

  <!-- 외부 원호 트랙 (순환 경로) -->
  <circle cx="512" cy="512" r="310" fill="none" stroke="#1E2840" stroke-width="48"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#253050" stroke-width="40"/>

  <!-- 순환 방향 화살표 픽셀 (시계 방향) -->
  <!-- 상단 화살표 -->
  <polygon points="512,192 528,218 496,218" fill="#4A5580" opacity="0.7"/>
  <!-- 우측 화살표 -->
  <polygon points="818,510 792,494 792,526" fill="#4A5580" opacity="0.7"/>
  <!-- 하단 화살표 -->
  <polygon points="512,832 496,806 528,806" fill="#4A5580" opacity="0.7"/>
  <!-- 좌측 화살표 -->
  <polygon points="206,510 232,526 232,494" fill="#4A5580" opacity="0.7"/>

  <!-- ===== 4대 원소 허브 (원호 위 4개 위치) ===== -->

