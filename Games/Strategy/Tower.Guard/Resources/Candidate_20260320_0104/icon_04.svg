<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 미로 방어선: 방어 미로 -->
  <!-- maze walls (L-shaped defense paths) -->
  <g fill="none" stroke="#37474F" stroke-width="28" stroke-linecap="square">
    <!-- outer frame (partial) -->
    <path d="M180 180 L180 844 L844 844 L844 180"/>
    <!-- horizontal walls -->
    <line x1="180" y1="380" x2="560" y2="380"/>
    <line x1="464" y1="560" x2="844" y2="560"/>
    <line x1="180" y1="660" x2="380" y2="660"/>
    <line x1="660" y1="380" x2="844" y2="380"/>
    <!-- vertical walls -->
    <line x1="380" y1="180" x2="380" y2="280"/>
    <line x1="660" y1="500" x2="660" y2="844"/>
    <line x1="560" y1="280" x2="560" y2="380"/>
    <line x1="464" y1="560" x2="464" y2="660"/>
  </g>
  <!-- enemy path highlight (dotted) -->
  <path d="M180 512 Q300 512 300 450 Q300 260 420 260 Q500 260 500 320 Q500 450 600 450 Q720 450 720 512 Q720 600 620 600 Q540 600 512 660 Q484 720 512 780" fill="none" stroke="#B0BEC5" stroke-width="8" stroke-dasharray="16 10" stroke-linecap="round" opacity="0.5"/>
  <!-- base (protected area) -->
  <circle cx="512" cy="820" r="40" fill="#B0BEC5" opacity="0.2"/>
  <circle cx="512" cy="820" r="24" fill="#37474F"/>
</svg>
