<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#27272A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Window chrome -->
  <rect x="52" y="70" width="408" height="380" rx="14" fill="#1C1C1E" stroke="#3F3F46" stroke-width="2"/>
  <rect x="52" y="70" width="408" height="40" rx="14" fill="#2C2C2E"/>
  <rect x="52" y="90" width="408" height="20" fill="#2C2C2E"/>
  <circle cx="84" cy="90" r="7" fill="#FF5F57"/>
  <circle cx="108" cy="90" r="7" fill="#FFBD2E"/>
  <circle cx="132" cy="90" r="7" fill="#28C940"/>
  <!-- Tab bar -->
  <rect x="160" y="78" width="120" height="24" rx="6" fill="#1C1C1E"/>
  <rect x="165" y="82" width="8" height="16" rx="2" fill="#A78BFA" opacity="0.6"/>
  <rect x="178" y="86" width="70" height="8" rx="3" fill="#E4E4E7" opacity="0.5"/>
  <!-- Line numbers area -->
  <rect x="52" y="110" width="50" height="340" fill="#161618"/>
  <!-- Line numbers -->
  <text x="90" y="140" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">1</text>
  <text x="90" y="158" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">2</text>
  <text x="90" y="176" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">3</text>
  <text x="90" y="194" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">4</text>
  <text x="90" y="212" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">5</text>
  <text x="90" y="230" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">6</text>
  <text x="90" y="248" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">7</text>
  <text x="90" y="266" font-family="Courier New" font-size="13" fill="#52525B" text-anchor="end">8</text>
  <!-- Code content (markdown themed) -->
  <!-- # Heading -->
  <rect x="110" y="130" width="18" height="14" rx="2" fill="#F472B6"/>
  <rect x="134" y="130" width="120" height="14" rx="3" fill="#E4E4E7" opacity="0.8"/>
  <!-- blank line -->
  <!-- **bold** -->
  <rect x="110" y="166" width="16" height="12" rx="2" fill="#A78BFA"/>
  <rect x="130" y="166" width="80" height="12" rx="2" fill="#E4E4E7" opacity="0.6"/>
  <rect x="214" y="166" width="16" height="12" rx="2" fill="#A78BFA"/>
  <!-- plain text -->
  <rect x="110" y="184" width="180" height="12" rx="2" fill="#A1A1AA" opacity="0.7"/>
  <!-- ``` code block -->
  <rect x="110" y="202" width="28" height="12" rx="2" fill="#34D399"/>
  <rect x="110" y="220" width="22" height="12" rx="2" fill="#F472B6"/>
  <rect x="138" y="220" width="16" height="12" rx="2" fill="#A78BFA"/>
  <rect x="160" y="220" width="100" height="12" rx="2" fill="#FDE68A"/>
  <rect x="110" y="238" width="150" height="12" rx="2" fill="#6EE7B7" opacity="0.8"/>
  <rect x="110" y="256" width="28" height="12" rx="2" fill="#34D399"/>
  <!-- - list item -->
  <rect x="110" y="274" width="8" height="12" rx="2" fill="#F472B6"/>
  <rect x="124" y="274" width="130" height="12" rx="2" fill="#A1A1AA" opacity="0.7"/>
  <!-- Active line highlight -->
  <rect x="52" y="218" width="408" height="18" fill="url(#accent)" opacity="0.08"/>
  <!-- Cursor -->
  <rect x="268" y="220" width="2" height="14" rx="1" fill="url(#accent)"/>
</svg>
