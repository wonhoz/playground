<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 포맷 카드 스택 + 변환 화살표 | 레이어드 | 하늘색+흰카드+주황 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42C8F5"/>
      <stop offset="100%" stop-color="#1A8FD1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0055AA" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Layer 2: Format cards (stacked/layered) -->
  <!-- Back card: PNG -->
  <rect x="120" y="220" width="320" height="200" rx="22" fill="#FF7043" filter="url(#shadow1)"/>
  <text x="280" y="342" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">PNG</text>

  <!-- Middle card: SVG -->
  <rect x="160" y="310" width="320" height="200" rx="22" fill="#AB47BC" filter="url(#shadow1)"/>
  <text x="320" y="432" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">SVG</text>

  <!-- Front card: ICO -->
  <rect x="200" y="400" width="320" height="200" rx="22" fill="#FFFFFF" filter="url(#shadow1)"/>
  <text x="360" y="522" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
        fill="#1A8FD1" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- Layer 3: Orange conversion arrow -->
  <g filter="url(#shadow1)">
    <!-- Arrow shaft -->
    <rect x="570" y="478" width="240" height="68" rx="34" fill="#FF6D00"/>
    <!-- Arrow head -->
    <polygon points="790,390 930,512 790,634" fill="#FF6D00"/>
  </g>
  <!-- Small star sparkles near arrow -->
  <circle cx="855" cy="380" r="18" fill="#FFD740" opacity="0.9"/>
  <circle cx="900" cy="330" r="11" fill="#FFD740" opacity="0.7"/>
  <circle cx="940" cy="390" r="14" fill="#FFFFFF" opacity="0.8"/>
</svg>
