<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- 지문+시스템: fingerprint with system data overlay -->
  <!-- Fingerprint rings -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#01579B" stroke-width="8" stroke-dasharray="880 0" opacity="0.6"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#01579B" stroke-width="8" opacity="0.7"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#29B6F6" stroke-width="8" opacity="0.8"/>
  <circle cx="512" cy="512" r="160" fill="none" stroke="#29B6F6" stroke-width="8" opacity="0.9"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#29B6F6" stroke-width="9"/>
  <circle cx="512" cy="512" r="80" fill="none" stroke="#29B6F6" stroke-width="10"/>
  <circle cx="512" cy="512" r="40" fill="none" stroke="#29B6F6" stroke-width="10"/>
  <!-- Fingerprint break/gap on right side to simulate real fingerprint -->
  <path d="M632 340 A160 160 0 0 1 672 512" fill="none" stroke="#000810" stroke-width="12"/>
  <path d="M670 420 A200 200 0 0 1 710 512" fill="none" stroke="#000810" stroke-width="12"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="16" fill="#29B6F6"/>
  <!-- Data overlay lines -->
  <line x1="750" y1="380" x2="830" y2="380" stroke="#29B6F6" stroke-width="5" stroke-linecap="round"/>
  <line x1="760" y1="400" x2="830" y2="400" stroke="#01579B" stroke-width="4" stroke-linecap="round"/>
  <line x1="755" y1="420" x2="830" y2="420" stroke="#01579B" stroke-width="4" stroke-linecap="round"/>
  <line x1="750" y1="600" x2="830" y2="600" stroke="#29B6F6" stroke-width="5" stroke-linecap="round"/>
  <line x1="760" y1="620" x2="830" y2="620" stroke="#01579B" stroke-width="4" stroke-linecap="round"/>
  <line x1="755" y1="640" x2="830" y2="640" stroke="#01579B" stroke-width="4" stroke-linecap="round"/>
  <!-- Corner brackets -->
  <path d="M260 280 L260 320 M260 280 L300 280" fill="none" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <path d="M764 280 L764 320 M764 280 L724 280" fill="none" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <path d="M260 744 L260 704 M260 744 L300 744" fill="none" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <path d="M764 744 L764 704 M764 744 L724 744" fill="none" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
</svg>