<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8F5C0"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
    <linearGradient id="arrow4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Source box (left) -->
  <rect x="80" y="340" width="300" height="340" rx="24" fill="#4CAF50" opacity="0.9"/>
  <text x="230" y="480" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">PNG</text>
  <!-- Small image icon inside box -->
  <rect x="130" y="500" width="200" height="130" rx="12" fill="white" opacity="0.25"/>
  <circle cx="185" cy="545" r="24" fill="#FFD600" opacity="0.8"/>
  <path d="M130,630 L190,560 L240,600 L290,530 L330,620 L330,630 Z" fill="white" opacity="0.4"/>

  <!-- Target box (right) -->
  <rect x="644" y="340" width="300" height="340" rx="24" fill="#7B1FA2" opacity="0.9"/>
  <text x="794" y="480" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">ICO</text>
  <!-- Small grid icon inside box -->
  <g opacity="0.5">
    <rect x="694" y="505" width="56" height="56" rx="8" fill="white"/>
    <rect x="766" y="505" width="56" height="56" rx="8" fill="white"/>
    <rect x="694" y="577" width="56" height="56" rx="8" fill="white"/>
    <rect x="766" y="577" width="56" height="56" rx="8" fill="white"/>
  </g>

  <!-- Layer 3: Arrow bridge -->
  <path d="M390,470 Q512,320 634,470" fill="none" stroke="url(#arrow4)" stroke-width="36" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="634,470 596,430 650,418" fill="#E040FB"/>

  <!-- Speed lines -->
  <line x1="380" y1="540" x2="644" y2="540" stroke="url(#arrow4)" stroke-width="20" stroke-linecap="round"/>
  <polygon points="644,540 604,516 604,564" fill="#7B1FA2"/>

  <!-- Top label -->
  <text x="512" y="840" font-family="Arial Black, sans-serif" font-size="74" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">CAST</text>
</svg>
