<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 별자리 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#020818"/>
  <!-- Layer 2: 별자리 패턴 + 연결선 -->
  <!-- 별들 (크게) -->
  <circle cx="260" cy="260" r="14" fill="#FFD740"/>
  <circle cx="480" cy="200" r="10" fill="#FFD740" opacity="0.8"/>
  <circle cx="700" cy="300" r="12" fill="#FFD740"/>
  <circle cx="820" cy="500" r="10" fill="#FFD740" opacity="0.8"/>
  <circle cx="700" cy="720" r="14" fill="#FFD740"/>
  <circle cx="440" cy="800" r="10" fill="#FFD740" opacity="0.8"/>
  <circle cx="220" cy="700" r="12" fill="#FFD740"/>
  <circle cx="180" cy="480" r="10" fill="#FFD740" opacity="0.8"/>
  <!-- 별자리 연결선 -->
  <line x1="260" y1="260" x2="480" y2="200" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="480" y1="200" x2="700" y2="300" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="700" y1="300" x2="820" y2="500" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="820" y1="500" x2="700" y2="720" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="700" y1="720" x2="440" y2="800" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="440" y1="800" x2="220" y2="700" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="220" y1="700" x2="180" y2="480" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <line x1="180" y1="480" x2="260" y2="260" stroke="#FFD740" stroke-width="3" opacity="0.4"/>
  <!-- 중앙 궤도 (별자리 중심) -->
  <circle cx="512" cy="500" r="180" fill="none" stroke="#00E5FF" stroke-width="5" opacity="0.6"/>
  <circle cx="512" cy="500" r="80" fill="#0D47A1" opacity="0.8"/>
  <circle cx="512" cy="500" r="60" fill="#1565C0"/>
  <circle cx="512" cy="500" r="40" fill="#1976D2"/>
  <!-- 궤도 위성 -->
  <circle cx="692" cy="500" r="20" fill="#00E5FF"/>
  <!-- Layer 3: -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#FFD740" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
