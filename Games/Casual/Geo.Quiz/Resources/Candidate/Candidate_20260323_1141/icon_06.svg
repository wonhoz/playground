<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 네이비 -->
  <rect width="1024" height="1024" rx="180" fill="#0A1628"/>
  <!-- Layer 2: 퀴즈 답안 UI (수도 맞추기) -->
  <!-- 상단 질문 카드 -->
  <rect x="120" y="160" width="784" height="140" rx="16" fill="#1A2B4A"/>
  <text x="512" y="220" font-family="Arial" font-size="32" fill="#90CAF9" text-anchor="middle">Capital of France?</text>
  <text x="512" y="270" font-family="Arial Black,Arial" font-size="44" font-weight="900" fill="white" text-anchor="middle">수도는?</text>
  <!-- 답안 버튼 4개 -->
  <!-- 정답 (초록) -->
  <rect x="120" y="340" width="360" height="100" rx="14" fill="#1B5E20"/>
  <rect x="120" y="340" width="360" height="100" rx="14" fill="none" stroke="#4CAF50" stroke-width="4"/>
  <text x="300" y="402" font-family="Arial Black,Arial" font-size="44" font-weight="900" fill="#69F0AE" text-anchor="middle">Paris ✓</text>
  <!-- 오답들 -->
  <rect x="544" y="340" width="360" height="100" rx="14" fill="#1A1A2E"/>
  <rect x="544" y="340" width="360" height="100" rx="14" fill="none" stroke="#333" stroke-width="4"/>
  <text x="724" y="402" font-family="Arial" font-size="40" fill="#666" text-anchor="middle">Lyon</text>
  <rect x="120" y="460" width="360" height="100" rx="14" fill="#1A1A2E"/>
  <rect x="120" y="460" width="360" height="100" rx="14" fill="none" stroke="#333" stroke-width="4"/>
  <text x="300" y="522" font-family="Arial" font-size="40" fill="#666" text-anchor="middle">Nice</text>
  <rect x="544" y="460" width="360" height="100" rx="14" fill="#1A1A2E"/>
  <rect x="544" y="460" width="360" height="100" rx="14" fill="none" stroke="#333" stroke-width="4"/>
  <text x="724" y="522" font-family="Arial" font-size="40" fill="#666" text-anchor="middle">Marseille</text>
  <!-- Layer 3: 점수 + 진행바 -->
  <rect x="120" y="620" width="784" height="20" rx="10" fill="#1A2B4A"/>
  <rect x="120" y="620" width="520" height="20" rx="10" fill="#1976D2"/>
  <text x="512" y="720" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#1976D2" text-anchor="middle">GEO QUIZ</text>
  <text x="512" y="810" font-family="Arial" font-size="40" fill="#90CAF9" text-anchor="middle">Score: 780</text>
</svg>
