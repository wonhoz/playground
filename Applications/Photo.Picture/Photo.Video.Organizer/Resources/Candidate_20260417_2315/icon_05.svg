<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 시간 흐름 선 (대각선) -->
  <path d="M 140 800 Q 512 400 884 200" stroke="url(#stream)" stroke-width="16" fill="none" opacity="0.8"/>
  <!-- 폴더 아이템들 — 시간축 위에 올라가 있음 -->
  <!-- 폴더 1 (오래됨 — 왼쪽 아래) -->
  <rect x="130" y="640" width="190" height="100" rx="16" fill="#FFD700" opacity="0.9"/>
  <text x="225" y="698" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#4A148C" text-anchor="middle">2022</text>
  <!-- 폴더 2 (중간) -->
  <rect x="390" y="440" width="190" height="100" rx="16" fill="#FFD700" opacity="0.9"/>
  <text x="485" y="498" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#4A148C" text-anchor="middle">2023</text>
  <!-- 폴더 3 (최근 — 오른쪽 위) -->
  <rect x="660" y="230" width="190" height="100" rx="16" fill="#FFD700" opacity="0.95"/>
  <text x="755" y="288" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#4A148C" text-anchor="middle">2024</text>
  <!-- Layer 3: 사진 아이콘들 (각 폴더 위 작은 이미지) -->
  <rect x="148" y="572" width="70" height="56" rx="8" fill="white" opacity="0.8"/>
  <polygon points="150,624 183,584 205,600 218,572 218,624" fill="#E91E63" opacity="0.5"/>
  <rect x="408" y="372" width="70" height="56" rx="8" fill="white" opacity="0.8"/>
  <polygon points="410,424 443,384 465,400 478,372 478,424" fill="#FF6F00" opacity="0.5"/>
  <rect x="678" y="162" width="70" height="56" rx="8" fill="white" opacity="0.8"/>
  <polygon points="680,214 713,174 735,190 748,162 748,214" fill="#00BCD4" opacity="0.5"/>
</svg>
