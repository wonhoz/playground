<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 지도 코스 레이아웃: 코스 지도 -->
  <!-- course fairway paths -->
  <path d="M200 800 Q260 700 300 580 Q340 460 400 420 Q460 380 480 320 Q500 260 512 220"
    fill="none" stroke="#388E3C" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- fairway outline (lighter) -->
  <path d="M200 800 Q260 700 300 580 Q340 460 400 420 Q460 380 480 320 Q500 260 512 220"
    fill="none" stroke="#81C784" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
  <!-- rough border -->
  <path d="M200 800 Q260 700 300 580 Q340 460 400 420 Q460 380 480 320 Q500 260 512 220"
    fill="none" stroke="#388E3C" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
  <!-- tee box (start) -->
  <rect x="164" y="768" width="70" height="46" rx="8" fill="#81C784" opacity="0.7"/>
  <!-- green (end circle) -->
  <circle cx="512" cy="220" r="50" fill="#388E3C" opacity="0.9"/>
  <circle cx="512" cy="220" r="32" fill="#81C784" opacity="0.6"/>
  <!-- hole pin on green -->
  <line x1="512" y1="220" x2="512" y2="170" stroke="#81C784" stroke-width="6"/>
  <path d="M512 170 L548 185 L512 200 Z" fill="#388E3C"/>
  <!-- bunkers (sand traps) -->
  <ellipse cx="340" cy="570" rx="44" ry="26" fill="#81C784" opacity="0.3"/>
  <ellipse cx="460" cy="400" rx="38" ry="22" fill="#81C784" opacity="0.3"/>
  <!-- water hazard -->
  <ellipse cx="260" cy="680" rx="50" ry="28" fill="#388E3C" opacity="0.4"/>
</svg>
