<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 밝은 하늘색 그라디언트 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F4FF"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="browser_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="lens_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#01579B" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg1)"/>

  <!-- 브라우저 창 (메인 오브젝트) -->
  <rect x="140" y="200" width="744" height="520" rx="40" fill="url(#browser_grad)" filter="url(#shadow1)"/>
  <!-- 브라우저 타이틀바 -->
  <rect x="140" y="200" width="744" height="90" rx="40" fill="#0277BD"/>
  <rect x="140" y="250" width="744" height="40" fill="#0277BD"/>
  <!-- 브라우저 버튼 (신호등) -->
  <circle cx="210" cy="245" r="18" fill="#FF5252"/>
  <circle cx="265" cy="245" r="18" fill="#FFD740"/>
  <circle cx="320" cy="245" r="18" fill="#69F0AE"/>
  <!-- URL 바 -->
  <rect x="360" y="225" width="480" height="42" rx="21" fill="#E3F2FD" opacity="0.9"/>
  <!-- URL 텍스트 -->
  <text x="600" y="254" font-family="monospace" font-size="22" fill="#0D47A1" text-anchor="middle" font-weight="bold">https://</text>

  <!-- 브라우저 콘텐츠 영역 (웹 페이지 라인) -->
  <rect x="175" y="320" width="654" height="12" rx="6" fill="white" opacity="0.3"/>
  <rect x="175" y="350" width="480" height="10" rx="5" fill="white" opacity="0.2"/>
  <rect x="175" y="378" width="580" height="10" rx="5" fill="white" opacity="0.2"/>
  <rect x="175" y="406" width="420" height="10" rx="5" fill="white" opacity="0.2"/>

  <!-- 카메라 렌즈 오버레이 (디테일) -->
  <circle cx="512" cy="600" r="155" fill="none" stroke="#00E5FF" stroke-width="70" opacity="0.95"/>
  <circle cx="512" cy="600" r="100" fill="none" stroke="white" stroke-width="14" opacity="0.7"/>
  <circle cx="512" cy="600" r="48" fill="#00E5FF" opacity="0.9"/>
  <circle cx="512" cy="600" r="28" fill="white" opacity="0.95"/>

  <!-- 셔터 버튼 표시 -->
  <circle cx="512" cy="600" r="12" fill="#0288D1"/>

  <!-- 렌즈 반사광 -->
  <circle cx="480" cy="568" r="18" fill="white" opacity="0.5"/>
</svg>
