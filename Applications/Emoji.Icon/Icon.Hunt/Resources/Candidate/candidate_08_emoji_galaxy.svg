<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#0d0d25"/>
    </linearGradient>
    <radialGradient id="gal" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#gal)"/>
  <!-- Spiral arms with icons -->
  <!-- Center -->
  <text x="232" y="272" font-family="serif" font-size="44">🔍</text>
  <!-- Ring 1 -->
  <text x="170" y="200" font-family="serif" font-size="28">⭐</text>
  <text x="310" y="200" font-family="serif" font-size="28">🔥</text>
  <text x="170" y="330" font-family="serif" font-size="28">🌊</text>
  <text x="310" y="330" font-family="serif" font-size="28">💡</text>
  <!-- Ring 2 -->
  <text x="100" y="140" font-family="serif" font-size="22">🏠</text>
  <text x="256" y="110" font-family="serif" font-size="22">🚀</text>
  <text x="380" y="140" font-family="serif" font-size="22">💎</text>
  <text x="90" y="270" font-family="serif" font-size="22">🌍</text>
  <text x="400" y="270" font-family="serif" font-size="22">🎵</text>
  <text x="100" y="400" font-family="serif" font-size="22">🔔</text>
  <text x="256" y="420" font-family="serif" font-size="22">❤️</text>
  <text x="380" y="400" font-family="serif" font-size="22">🎯</text>
  <!-- Orbital rings -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#4488ff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6,4"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#4488ff" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6,8"/>
</svg>