<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0032"/>
      <stop offset="100%" stop-color="#2D004D"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 레지스트리 에디터 스타일 패널 -->
    <rect x="80" y="100" width="864" height="760" rx="24" fill="#1E0040" stroke="#7B1FA2" stroke-width="4"/>
    <!-- 헤더 바 -->
    <rect x="80" y="100" width="864" height="60" rx="24" fill="#4A148C"/>
    <rect x="80" y="132" width="864" height="28" fill="#4A148C"/>
    <text x="160" y="142" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#CE93D8">HKEY_LOCAL_MACHINE — 레지스트리 스캔</text>

    <!-- 오류 항목들 -->
    <!-- 항목 1 -->
    <rect x="100" y="184" width="824" height="80" rx="10" fill="#380070"/>
    <text x="130" y="216" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#CE93D8">🔑 AppPaths\OldApp.exe</text>
    <text x="130" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#EF5350">실행 파일 없음: C:\Program Files\OldApp\app.exe</text>
    <!-- 삭제 X -->
    <line x1="830" y1="204" x2="870" y2="244" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>
    <line x1="870" y1="204" x2="830" y2="244" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>

    <!-- 항목 2 -->
    <rect x="100" y="278" width="824" height="80" rx="10" fill="#380070"/>
    <text x="130" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#CE93D8">🔑 SharedDLLs\missing.dll</text>
    <text x="130" y="342" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#EF5350">DLL 파일이 존재하지 않음: missing.dll</text>
    <line x1="830" y1="298" x2="870" y2="338" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>
    <line x1="870" y1="298" x2="830" y2="338" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>

    <!-- 항목 3 -->
    <rect x="100" y="372" width="824" height="80" rx="10" fill="#380070"/>
    <text x="130" y="404" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#CE93D8">🔑 Run\StartupGhost</text>
    <text x="130" y="436" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#EF5350">실행 파일 없음: C:\Ghost\ghost.exe</text>
    <line x1="830" y1="392" x2="870" y2="432" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>
    <line x1="870" y1="392" x2="830" y2="432" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>

    <!-- 항목 4 -->
    <rect x="100" y="466" width="824" height="80" rx="10" fill="#380070"/>
    <text x="130" y="498" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#CE93D8">🔑 Uninstall\DeletedProg</text>
    <text x="130" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#EF5350">설치 폴더가 존재하지 않음: C:\DeletedProg</text>
    <line x1="830" y1="486" x2="870" y2="526" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>
    <line x1="870" y1="486" x2="830" y2="526" stroke="#FFD600" stroke-width="9" stroke-linecap="round"/>

    <!-- 스크롤 암시 (더 있다는 표시) -->
    <text x="512" y="610" font-family="'Segoe UI',Arial,sans-serif" font-size="36" text-anchor="middle" fill="#7B1FA2">• • •</text>
    <text x="512" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="32" text-anchor="middle" fill="#9C27B0">총 47개 오류 발견</text>

    <!-- 액션 버튼 -->
    <rect x="200" y="740" width="624" height="72" rx="20" fill="#FFD600"/>
    <text x="512" y="788" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#1A0032" text-anchor="middle">🛠 모두 수정</text>
  </g>
</svg>
