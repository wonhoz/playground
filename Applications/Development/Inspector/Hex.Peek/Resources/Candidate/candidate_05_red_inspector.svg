<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2d0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifier glass -->
  <circle cx="220" cy="220" r="130" fill="#200000" stroke="#ff4444" stroke-width="8"/>
  <circle cx="220" cy="220" r="130" fill="none" stroke="#ff2222" stroke-width="3" stroke-dasharray="20,10"/>
  <!-- Hex grid inside lens -->
  <clipPath id="lens">
    <circle cx="220" cy="220" r="122"/>
  </clipPath>
  <g clip-path="url(#lens)">
    <text x="100" y="165" font-family="monospace" font-size="19" fill="#ff6666">4D 5A 90</text>
    <text x="100" y="192" font-family="monospace" font-size="19" fill="#cc4444">00 03 00</text>
    <text x="100" y="219" font-family="monospace" font-size="19" fill="#ff4444" font-weight="bold">FF FF 00</text>
    <text x="100" y="246" font-family="monospace" font-size="19" fill="#cc4444">B8 00 00</text>
    <text x="100" y="273" font-family="monospace" font-size="19" fill="#ff6666">40 00 E8</text>
    <!-- Crosshair inside lens -->
    <line x1="220" y1="100" x2="220" y2="340" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
    <line x1="98" y1="220" x2="342" y2="220" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Lens reflection -->
  <ellipse cx="175" cy="170" rx="35" ry="20" fill="white" opacity="0.06" transform="rotate(-30 175 170)"/>
  <!-- Handle -->
  <rect x="314" y="314" width="24" height="100" rx="12" fill="url(#red)" transform="rotate(45 326 364)"/>
  <!-- Byte chips scattered -->
  <rect x="60" y="80" width="70" height="28" rx="6" fill="#3d0000" stroke="#ff4444" stroke-width="1.5"/>
  <text x="68" y="99" font-family="monospace" font-size="16" fill="#ff6666">0x4D</text>
  <rect x="370" y="80" width="70" height="28" rx="6" fill="#3d0000" stroke="#ff4444" stroke-width="1.5"/>
  <text x="378" y="99" font-family="monospace" font-size="16" fill="#ff6666">0xFF</text>
  <rect x="60" y="390" width="80" height="28" rx="6" fill="#3d0000" stroke="#cc0000" stroke-width="1.5"/>
  <text x="68" y="409" font-family="monospace" font-size="16" fill="#cc4444">0x5A</text>
  <rect x="60" y="360" width="80" height="28" rx="6" fill="#3d0000" stroke="#cc0000" stroke-width="1.5"/>
  <text x="68" y="379" font-family="monospace" font-size="16" fill="#cc4444">0x90</text>
  <!-- Title -->
  <text x="370" y="420" font-family="monospace" font-size="32" font-weight="bold" fill="#ff4444" opacity="0.8">HEX</text>
  <text x="364" y="455" font-family="monospace" font-size="20" fill="#cc0000" opacity="0.7">PEEK</text>
</svg>
