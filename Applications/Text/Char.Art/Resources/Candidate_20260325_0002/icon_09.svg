<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Cream -->
  <rect width="1024" height="1024" rx="190" fill="#FFF8E1"/>

  <!-- Brush body (thick dark brown) -->
  <!-- Handle -->
  <rect x="472" y="210" width="80" height="380" rx="40" fill="#3E2723"/>
  <!-- Ferrule (metal band) -->
  <rect x="458" y="560" width="108" height="60" rx="8" fill="#8D6E63"/>
  <!-- Brush bristles (tapered) -->
  <polygon points="458,620 566,620 545,720 479,720" fill="#4E342E"/>
  <!-- Brush tip -->
  <polygon points="479,720 545,720 530,760 494,760" fill="#5D4037"/>
  <polygon points="494,760 530,760 515,795 509,795" fill="#6D4C41"/>

  <!-- Ink drops on handle top -->
  <circle cx="480" cy="235" r="12" fill="#6D4C41" opacity="0.7"/>
  <circle cx="540" cy="222" r="9" fill="#6D4C41" opacity="0.6"/>
  <circle cx="512" cy="218" r="7" fill="#6D4C41" opacity="0.5"/>

  <!-- ASCII chars flowing from brush tip -->
  <text x="590" y="710" font-family="'Courier New', monospace" font-size="90" font-weight="900"
        fill="#3E2723" opacity="0.9">@</text>
  <text x="668" y="660" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        fill="#4E342E" opacity="0.8">#</text>
  <text x="740" y="620" font-family="'Courier New', monospace" font-size="75" font-weight="700"
        fill="#5D4037" opacity="0.7">$</text>
  <text x="598" y="790" font-family="'Courier New', monospace" font-size="70" font-weight="700"
        fill="#5D4037" opacity="0.65">%</text>
  <text x="680" y="770" font-family="'Courier New', monospace" font-size="65" font-weight="700"
        fill="#6D4C41" opacity="0.55">@</text>
  <text x="750" y="740" font-family="'Courier New', monospace" font-size="60" font-weight="700"
        fill="#795548" opacity="0.45">#</text>

  <!-- Smaller scattered chars further away -->
  <text x="800" y="590" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        fill="#8D6E63" opacity="0.4">$</text>
  <text x="760" y="830" font-family="'Courier New', monospace" font-size="50" font-weight="700"
        fill="#8D6E63" opacity="0.35">.</text>

  <!-- Label -->
  <text x="340" y="870" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="#3E2723" opacity="0.75">Art</text>
</svg>
