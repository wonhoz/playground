<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="vault" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Vault door -->
  <circle cx="512" cy="460" r="300" fill="url(#vault)"/>
  <circle cx="512" cy="460" r="270" fill="#F59E0B"/>
  <circle cx="512" cy="460" r="220" fill="#B45309"/>
  <!-- Vault dial -->
  <circle cx="512" cy="460" r="140" fill="#D97706"/>
  <circle cx="512" cy="460" r="120" fill="#FBBF24"/>
  <!-- Dial markings -->
  <line x1="512" y1="340" x2="512" y2="380" stroke="#92400E" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="540" x2="512" y2="580" stroke="#92400E" stroke-width="14" stroke-linecap="round"/>
  <line x1="392" y1="460" x2="432" y2="460" stroke="#92400E" stroke-width="14" stroke-linecap="round"/>
  <line x1="592" y1="460" x2="632" y2="460" stroke="#92400E" stroke-width="14" stroke-linecap="round"/>
  <!-- Pointer -->
  <line x1="512" y1="460" x2="560" y2="380" stroke="#92400E" stroke-width="16" stroke-linecap="round"/>
  <circle cx="512" cy="460" r="20" fill="#92400E"/>
  <!-- Bolt handles on vault -->
  <circle cx="248" cy="310" r="36" fill="#B45309" stroke="#92400E" stroke-width="8"/>
  <circle cx="776" cy="310" r="36" fill="#B45309" stroke="#92400E" stroke-width="8"/>
  <circle cx="248" cy="610" r="36" fill="#B45309" stroke="#92400E" stroke-width="8"/>
  <circle cx="776" cy="610" r="36" fill="#B45309" stroke="#92400E" stroke-width="8"/>
  <!-- REG label -->
  <text x="512" y="832" font-family="Arial,sans-serif" font-size="68" fill="#B45309" font-weight="bold" text-anchor="middle">VAULT</text>
</svg>
