<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Badge.Forge - Icon Candidates</title>
<style>
  body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { color: #4caf50; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.25s ease; }
  .card:hover { transform: translateY(-6px) scale(1.04); border-color: #4caf50; box-shadow: 0 12px 32px rgba(76,175,80,0.3); }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card span { display: block; margin-top: 10px; font-size: 12px; color: #888; }
  .card:hover span { color: #4caf50; }
</style>
</head>
<body>
<h1>Badge.Forge</h1>
<p>Badge/shield image creator — 10 icon candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_shield_badge_craft.svg" alt="01"><span>01 · Shield Badge Craft</span></div>
  <div class="card"><img src="candidate_02_github_badge_art.svg" alt="02"><span>02 · GitHub Badge Art</span></div>
  <div class="card"><img src="candidate_03_status_badge_icon.svg" alt="03"><span>03 · Status Badge Icon</span></div>
  <div class="card"><img src="candidate_04_badge_forge_hammer.svg" alt="04"><span>04 · Badge Forge Hammer</span></div>
  <div class="card"><img src="candidate_05_shield_label_creator.svg" alt="05"><span>05 · Shield Label Creator</span></div>
  <div class="card"><img src="candidate_06_badge_ribbon.svg" alt="06"><span>06 · Badge Ribbon</span></div>
  <div class="card"><img src="candidate_07_passing_shield_art.svg" alt="07"><span>07 · Passing Shield Art</span></div>
  <div class="card"><img src="candidate_08_status_shield_green.svg" alt="08"><span>08 · Status Shield Green</span></div>
  <div class="card"><img src="candidate_09_badge_craft_tool.svg" alt="09"><span>09 · Badge Craft Tool</span></div>
  <div class="card"><img src="candidate_10_label_badge_icon.svg" alt="10"><span>10 · Label Badge Icon</span></div>
</div>
</body>
</html>
