    <!-- 유럽·아시아 -->
    <path d="M 350 380 Q 420 340 520 360 Q 620 345 700 380 Q 740 410 720 450 Q 690 480 650 470 Q 600 490 560 475 Q 510 500 470 480 Q 420 490 380 460 Q 340 430 350 380 Z"/>
    <!-- 아프리카 -->
    <path d="M 420 490 Q 450 480 490 495 Q 520 510 510 560 Q 500 610 480 640 Q 460 660 440 640 Q 410 610 400 570 Q 390 530 420 490 Z"/>
