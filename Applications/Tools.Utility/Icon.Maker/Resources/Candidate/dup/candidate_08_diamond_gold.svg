<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 다이아몬드 (아이콘 상징) -->
  <polygon points="256,80 380,200 256,420 132,200" fill="url(#gem)"/>
  <polygon points="256,80 380,200 256,240" fill="url(#shine)"/>
  <polygon points="256,80 132,200 256,240" fill="#FFD700" opacity="0.5"/>
  <!-- 내부 패싯 라인 -->
  <line x1="256" y1="80" x2="256" y2="420" stroke="#FF8F00" stroke-width="2" opacity="0.4"/>
  <line x1="132" y1="200" x2="380" y2="200" stroke="#FF8F00" stroke-width="2" opacity="0.4"/>
  <!-- ICO 텍스트 오버레이 -->
  <text x="256" y="300" font-size="48" text-anchor="middle" fill="#3E2723" font-family="Segoe UI" font-weight="bold">.ICO</text>
  <!-- 코너 크기 레이블 -->
  <circle cx="100" cy="430" r="28" fill="#FFA000" opacity="0.8"/>
  <text x="100" y="436" font-size="14" text-anchor="middle" fill="#212121" font-family="Segoe UI" font-weight="bold">16</text>
  <circle cx="170" cy="450" r="34" fill="#FFB300" opacity="0.85"/>
  <text x="170" y="456" font-size="14" text-anchor="middle" fill="#212121" font-family="Segoe UI" font-weight="bold">32</text>
  <circle cx="256" cy="460" r="40" fill="#FFC107" opacity="0.9"/>
  <text x="256" y="466" font-size="14" text-anchor="middle" fill="#212121" font-family="Segoe UI" font-weight="bold">48</text>
  <circle cx="350" cy="450" r="46" fill="#FFD700"/>
  <text x="350" y="456" font-size="14" text-anchor="middle" fill="#212121" font-family="Segoe UI" font-weight="bold">256</text>
</svg>