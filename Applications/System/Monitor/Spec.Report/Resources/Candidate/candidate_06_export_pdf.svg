<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a08"/>
      <stop offset="100%" style="stop-color:#2a1a10"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9f0"/>
      <stop offset="100%" style="stop-color:#ffe0c0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of pages -->
  <rect x="130" y="120" width="220" height="280" rx="10" fill="#c8956a" transform="rotate(-8 240 260)"/>
  <rect x="140" y="110" width="220" height="280" rx="10" fill="#d4a070" transform="rotate(-4 250 250)"/>
  <rect x="150" y="100" width="220" height="280" rx="10" fill="url(#page)"/>
  <!-- Fold corner -->
  <polygon points="310,100 370,160 310,160" fill="#ffcc99"/>
  <polygon points="310,100 370,160 310,160" fill="white" opacity="0.4"/>
  <!-- Content lines -->
  <rect x="170" y="180" width="140" height="10" rx="3" fill="#bf5722" opacity="0.4"/>
  <rect x="170" y="202" width="120" height="8" rx="3" fill="#bf5722" opacity="0.25"/>
  <rect x="170" y="220" width="130" height="8" rx="3" fill="#bf5722" opacity="0.25"/>
  <rect x="170" y="238" width="100" height="8" rx="3" fill="#bf5722" opacity="0.25"/>
  <!-- PDF badge -->
  <rect x="320" y="330" width="100" height="50" rx="10" fill="#f44336"/>
  <text x="370" y="362" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial">PDF</text>
  <!-- Arrow down -->
  <polygon points="256,360 228,330 284,330" fill="#ff7043"/>
  <rect x="248" y="300" width="16" height="32" rx="4" fill="#ff7043"/>
</svg>