<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 방사형 차트 -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.1"/>
  <!-- 섹터 -->
  <path d="M 256 256 L 256 126 A 130 130 0 0 1 369 186 Z" fill="#FBBF24" opacity="0.12" filter="url(#glow)"/>
  <path d="M 256 256 L 369 186 A 130 130 0 0 1 386 326 Z" fill="#FDE68A" opacity="0.08"/>
  <path d="M 256 256 L 386 326 A 130 130 0 0 1 143 326 Z" fill="#FBBF24" opacity="0.10"/>
  <path d="M 256 256 L 143 326 A 130 130 0 0 1 256 126 Z" fill="#FDE68A" opacity="0.07"/>
  <!-- 범주 레이블 -->
  <text x="256" y="108" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">😀</text>
  <text x="390" y="195" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">🌍</text>
  <text x="390" y="335" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">🔧</text>
  <text x="130" y="335" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">🎨</text>
  <text x="130" y="195" text-anchor="middle" font-size="18" font-family="Segoe UI Emoji">🚀</text>
  <!-- 중앙 -->
  <circle cx="256" cy="256" r="20" fill="#FBBF24" opacity="0.2" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">RADIAL CHART</text>
</svg>
