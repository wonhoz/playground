  <!-- Clean lines -->
  <rect x="734" y="325" width="140" height="16" rx="8" fill="#4CAF50" opacity="0.9"/>
  <rect x="734" y="352" width="110" height="13" rx="7" fill="#4CAF50" opacity="0.6"/>
  <rect x="734" y="376" width="126" height="13" rx="7" fill="#4CAF50" opacity="0.6"/>
  <!-- More aligned rows -->
  <rect x="634" y="430" width="240" height="14" rx="7" fill="#4CAF50" opacity="0.7"/>
  <rect x="634" y="460" width="200" height="14" rx="7" fill="#4CAF50" opacity="0.55"/>
  <rect x="634" y="490" width="220" height="14" rx="7" fill="#4CAF50" opacity="0.55"/>
  <rect x="634" y="520" width="180" height="14" rx="7" fill="#4CAF50" opacity="0.45"/>
  <!-- Check mark bottom -->
