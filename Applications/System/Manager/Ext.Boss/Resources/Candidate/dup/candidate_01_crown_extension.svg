<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c548"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Crown -->
  <polygon points="80,320 80,200 160,260 256,140 352,260 432,200 432,320" fill="url(#crown)" opacity="0.9"/>
  <rect x="80" y="320" width="352" height="60" rx="8" fill="url(#crown)"/>
  <!-- Crown gems -->
  <circle cx="256" cy="165" r="20" fill="#e74c3c"/>
  <circle cx="160" cy="265" r="14" fill="#3498db"/>
  <circle cx="352" cy="265" r="14" fill="#2ecc71"/>
  <!-- File extension labels -->
  <rect x="90" y="410" width="80" height="44" rx="8" fill="white" opacity="0.15" stroke="url(#crown)" stroke-width="2"/>
  <text x="130" y="437" font-family="monospace" font-size="16" text-anchor="middle" fill="url(#crown)">.EXE</text>
  <rect x="186" y="410" width="80" height="44" rx="8" fill="white" opacity="0.15" stroke="url(#crown)" stroke-width="2"/>
  <text x="226" y="437" font-family="monospace" font-size="16" text-anchor="middle" fill="url(#crown)">.PDF</text>
  <rect x="282" y="410" width="80" height="44" rx="8" fill="white" opacity="0.15" stroke="url(#crown)" stroke-width="2"/>
  <text x="322" y="437" font-family="monospace" font-size="16" text-anchor="middle" fill="url(#crown)">.MP4</text>
  <rect x="378" y="410" width="80" height="44" rx="8" fill="white" opacity="0.15" stroke="url(#crown)" stroke-width="2"/>
  <text x="418" y="437" font-family="monospace" font-size="16" text-anchor="middle" fill="url(#crown)">.ZIP</text>
</svg>
