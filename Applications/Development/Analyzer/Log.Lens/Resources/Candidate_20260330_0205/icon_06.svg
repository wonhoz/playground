<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#B39DDB"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 보라 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg6)"/>

  <!-- Layer 2: 눈 아이콘 (lens — 보다) -->
  <!-- 눈꺼풀 위 -->
  <path d="M100 512 Q512 120 924 512" fill="url(#eyeFill)"/>
  <!-- 눈꺼풀 아래 -->
  <path d="M100 512 Q512 900 924 512 Q512 700 100 512 Z" fill="url(#eyeFill)"/>
  <!-- 공막 (흰자) -->
  <ellipse cx="512" cy="512" rx="340" ry="240" fill="white" opacity="0.92"/>
  <!-- 홍채 -->
  <circle cx="512" cy="512" r="160" fill="#7B1FA2"/>
  <!-- 동공 -->
  <circle cx="512" cy="512" r="88" fill="#1A0A2E"/>
  <!-- 동공 반사 -->
  <circle cx="540" cy="480" r="28" fill="white" opacity="0.7"/>
  <!-- 눈 테두리 -->
  <path d="M100 512 Q512 120 924 512 Q512 900 100 512 Z" fill="none" stroke="#4A148C" stroke-width="20"/>

  <!-- Layer 3: 로그 텍스트 흐름 (동공 주위) -->
  <!-- 상단 -->
  <text x="512" y="260" font-family="'Courier New',monospace" font-size="34" fill="#EF5350" text-anchor="middle">[ERROR] timeout</text>
  <!-- 좌측 -->
  <text x="200" y="512" font-family="'Courier New',monospace" font-size="28" fill="#1565C0" text-anchor="middle" transform="rotate(-90, 200, 512)">[INFO] start</text>
  <!-- 우측 -->
  <text x="824" y="512" font-family="'Courier New',monospace" font-size="28" fill="#388E3C" text-anchor="middle" transform="rotate(90, 824, 512)">[DEBUG] ok</text>
  <!-- 하단 -->
  <text x="512" y="764" font-family="'Courier New',monospace" font-size="34" fill="#F57F17" text-anchor="middle">[WARN] mem 89%</text>

  <!-- 중앙 동공 내 로그 레이블 -->
  <text x="512" y="520" font-family="'Courier New',monospace" font-weight="900" font-size="40" fill="#EF5350" text-anchor="middle" dominant-baseline="middle">LOG</text>
</svg>
