<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000428"/>
      <stop offset="100%" stop-color="#004e92"/>
    </linearGradient>
    <linearGradient id="prism" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0c0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- White light beam in -->
  <path d="M60,256 L200,256" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <!-- Prism shape -->
  <polygon points="200,160 330,256 200,352" fill="url(#prism)" opacity="0.85"/>
  <polygon points="200,160 330,256 200,352" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  <!-- Dispersed rainbow beams (JSON syntax colors) -->
  <!-- String: amber -->
  <path d="M330,220 L450,160" stroke="#f7d774" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Number: green -->
  <path d="M330,238 L450,212" stroke="#56d364" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Boolean: cyan -->
  <path d="M330,252 L450,248" stroke="#79c0ff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Key: blue -->
  <path d="M330,266 L450,286" stroke="#58a6ff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Null: pink -->
  <path d="M330,282 L450,326" stroke="#ff7eb6" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Brace: orange -->
  <path d="M330,300 L450,368" stroke="#f0883e" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- JSON labels on beams -->
  <text x="455" y="165" font-family="monospace" font-size="12" fill="#f7d774">"string"</text>
  <text x="455" y="217" font-family="monospace" font-size="12" fill="#56d364">123</text>
  <text x="455" y="253" font-family="monospace" font-size="12" fill="#79c0ff">true</text>
  <text x="455" y="291" font-family="monospace" font-size="12" fill="#58a6ff">"key"</text>
  <text x="455" y="331" font-family="monospace" font-size="12" fill="#ff7eb6">null</text>
  <text x="455" y="373" font-family="monospace" font-size="12" fill="#f0883e">{ }</text>
  <!-- FMT label -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.6">JSON FMT</text>
</svg>
