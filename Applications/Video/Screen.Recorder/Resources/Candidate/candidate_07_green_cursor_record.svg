<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#051A05"/>
      <stop offset="100%" stop-color="#001000"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <radialGradient id="clickRing" cx="50%" cy="50%">
      <stop offset="60%" stop-color="#00C853" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00C853" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Screen rectangle -->
  <rect x="70" y="80" width="372" height="260" rx="14" fill="#0A1F0A" stroke="url(#green)" stroke-width="4"/>
  <!-- Screen content lines -->
  <g fill="#1B5E20" opacity="0.5">
    <rect x="100" y="114" width="200" height="12" rx="5"/>
    <rect x="100" y="138" width="140" height="10" rx="5"/>
    <rect x="100" y="158" width="180" height="10" rx="5"/>
    <rect x="100" y="178" width="160" height="10" rx="5"/>
    <rect x="100" y="198" width="200" height="10" rx="5"/>
    <rect x="100" y="218" width="120" height="10" rx="5"/>
    <rect x="100" y="238" width="170" height="10" rx="5"/>
    <rect x="100" y="258" width="150" height="10" rx="5"/>
    <rect x="100" y="278" width="190" height="10" rx="5"/>
    <rect x="100" y="298" width="130" height="10" rx="5"/>
  </g>
  <!-- Click rings -->
  <circle cx="310" cy="220" r="60" fill="url(#clickRing)"/>
  <circle cx="310" cy="220" r="44" fill="url(#clickRing)" opacity="0.7"/>
  <!-- Cursor arrow -->
  <polygon points="296,196 296,248 312,234 322,256 334,250 322,228 344,226" fill="url(#green)"/>
  <!-- Record indicator -->
  <circle cx="390" cy="110" r="16" fill="#FF1744"/>
  <!-- Pulse ring -->
  <circle cx="390" cy="110" r="28" fill="none" stroke="#FF1744" stroke-width="3" opacity="0.5"/>
  <!-- Bottom controls -->
  <rect x="70" y="360" width="372" height="48" rx="10" fill="#0A1F0A" stroke="#1B5E20" stroke-width="2"/>
  <circle cx="130" cy="384" r="16" fill="url(#green)" opacity="0.8"/>
  <rect x="160" y="376" width="140" height="8" rx="4" fill="url(#green)" opacity="0.4"/>
  <rect x="160" y="392" width="100" height="8" rx="4" fill="url(#green)" opacity="0.3"/>
  <circle cx="400" cy="384" r="16" fill="#FF1744"/>
</svg>
