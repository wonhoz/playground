<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 타자기 — 프롬프트를 타이핑하는 도구 | 공간/장면 | #2C1A00 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#2C1A00"/>
  <!-- Layer 2: Typewriter -->
  <!-- Paper roll at top -->
  <rect x="380" y="200" width="264" height="180" rx="4" fill="#FAF0D8" stroke="#D4B870" stroke-width="3"/>
  <!-- Paper lines / text being typed -->
  <text x="400" y="232" font-family="monospace" font-size="12" fill="#1A1000">You are an expert</text>
  <text x="400" y="250" font-family="monospace" font-size="12" fill="#1A1000">in {domain}. Your</text>
  <text x="400" y="268" font-family="monospace" font-size="12" fill="#1A1000">task is to {task}</text>
  <text x="400" y="286" font-family="monospace" font-size="12" fill="#1A1000">with tone: {tone}</text>
  <!-- Cursor blinking -->
  <rect x="400" y="304" width="8" height="16" fill="#FF8800"/>
  <!-- Typewriter body -->
  <rect x="220" y="350" width="584" height="280" rx="16" fill="#4A3010" stroke="#7A6040" stroke-width="4"/>
  <!-- Keyboard area -->
  <rect x="240" y="420" width="544" height="180" rx="8" fill="#3A2408"/>
  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="260" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="308" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="356" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="404" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="452" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="500" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="548" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="596" y="436" width="40" height="36" rx="4" fill="#FF8800" stroke="#FFAA40" stroke-width="2"/>
  <rect x="644" y="436" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="692" y="436" width="52" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <!-- Row 1 labels -->
  <text x="280" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">Q</text>
  <text x="328" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">W</text>
  <text x="376" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">E</text>
  <text x="424" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">R</text>
  <text x="472" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">T</text>
  <text x="520" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">Y</text>
  <text x="568" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">U</text>
  <text x="616" y="460" font-family="monospace" font-size="10" fill="#FFCC44" text-anchor="middle">ENT</text>
  <text x="664" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">I</text>
  <text x="718" y="460" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">OP</text>
  <!-- Row 2 -->
  <rect x="278" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="326" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="374" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="422" y="480" width="40" height="36" rx="4" fill="#FF8800" stroke="#FFAA40" stroke-width="2"/>
  <rect x="470" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="518" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="566" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="614" y="480" width="40" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <rect x="662" y="480" width="82" height="36" rx="4" fill="#6A5030" stroke="#8A7050" stroke-width="1"/>
  <text x="298" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">A</text>
  <text x="346" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">S</text>
  <text x="394" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">D</text>
  <text x="442" y="504" font-family="monospace" font-size="10" fill="#FFCC44" text-anchor="middle">⟵</text>
  <text x="490" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">G</text>
  <text x="538" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">H</text>
  <text x="586" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">J</text>
  <text x="634" y="504" font-family="monospace" font-size="12" fill="#C0A080" text-anchor="middle">K</text>
  <!-- Spacebar -->
  <rect x="350" y="524" width="328" height="36" rx="4" fill="#5A4020" stroke="#8A7050" stroke-width="2"/>
  <text x="512" y="548" font-family="monospace" font-size="11" fill="#A08060" text-anchor="middle">PROMPT SPACE</text>
  <!-- Platen roller -->
  <rect x="240" y="358" width="544" height="50" rx="8" fill="#5A4020" stroke="#8A7050" stroke-width="3"/>
  <!-- Layer 3: Typewriter bell icon -->
  <circle cx="780" cy="370" r="20" fill="#FFD700" stroke="#FFAA00" stroke-width="3"/>
  <text x="780" y="377" font-family="Arial,sans-serif" font-size="16" fill="#8B6000" text-anchor="middle">🔔</text>
</svg>
