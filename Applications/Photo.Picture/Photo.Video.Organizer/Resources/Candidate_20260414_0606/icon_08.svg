<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </radialGradient>
    <linearGradient id="mainBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06D6A0"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg8)"/>

  <!-- White card -->
  <rect x="80" y="100" width="864" height="720" rx="32" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>

  <!-- Center: Giant folder icon -->
  <rect x="200" y="230" width="624" height="420" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="18"/>
  <!-- Folder tab -->
  <rect x="200" y="196" width="240" height="60" rx="20" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <rect x="200" y="220" width="240" height="40" fill="#06D6A0"/>

  <!-- Inside folder: photo + video thumbnails arranged -->
  <!-- Photo thumb 1 -->
  <rect x="230" y="268" width="176" height="136" rx="14" fill="#FFFFFF" stroke="#004D40" stroke-width="10"/>
  <rect x="244" y="282" width="148" height="90" rx="8" fill="#B2DFDB" stroke="#004D40" stroke-width="7"/>
  <polygon points="250,362 292,326 316,348 344,312 380,362" fill="#06D6A0" stroke="#004D40" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="354" cy="300" r="16" fill="#FFD93D" stroke="#004D40" stroke-width="5"/>
  <!-- Date badge on photo -->
  <rect x="244" y="382" width="148" height="14" rx="6" fill="#06D6A0" stroke="#004D40" stroke-width="5"/>

  <!-- Video thumb center -->
  <rect x="424" y="255" width="176" height="154" rx="14" fill="#FFFFFF" stroke="#880E4F" stroke-width="10"/>
  <rect x="438" y="269" width="148" height="100" rx="8" fill="#FCE4EC" stroke="#880E4F" stroke-width="7"/>
  <circle cx="512" cy="319" r="38" fill="#E91E63" stroke="#880E4F" stroke-width="9"/>
  <polygon points="498,303 498,335 532,319" fill="#FFFFFF"/>
  <rect x="438" y="381" width="148" height="16" rx="6" fill="#E91E63" stroke="#880E4F" stroke-width="5"/>

  <!-- Photo thumb 2 -->
  <rect x="618" y="268" width="176" height="136" rx="14" fill="#FFFFFF" stroke="#004D40" stroke-width="10"/>
  <rect x="632" y="282" width="148" height="90" rx="8" fill="#B2DFDB" stroke="#004D40" stroke-width="7"/>
  <polygon points="638,362 680,318 706,342 736,304 768,362" fill="#00BFA5" stroke="#004D40" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="748" cy="300" r="16" fill="#FFD93D" stroke="#004D40" stroke-width="5"/>
  <rect x="632" y="382" width="148" height="14" rx="6" fill="#06D6A0" stroke="#004D40" stroke-width="5"/>

  <!-- Date row at bottom of folder -->
  <rect x="230" y="432" width="564" height="70" rx="18" fill="#004D40" stroke="#00251A" stroke-width="12"/>
  <text x="512" y="478" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">2024 / 01 / 15</text>

  <!-- ORGANIZE mega badge (top) -->
  <rect x="180" y="140" width="664" height="110" rx="36" fill="url(#mainBadge)" stroke="#004D40" stroke-width="16"/>
  <text x="512" y="218" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">ORGANIZE</text>

  <!-- File type badges (floating) -->
  <rect x="100" y="720" width="160" height="60" rx="20" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="180" y="759" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">JPG</text>

  <rect x="278" y="720" width="160" height="60" rx="20" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="358" y="759" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">MP4</text>

  <rect x="456" y="720" width="160" height="60" rx="20" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="536" y="759" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">MOV</text>

  <rect x="634" y="720" width="180" height="60" rx="20" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="724" y="759" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">HEIC</text>

  <!-- Title -->
  <rect x="112" y="840" width="800" height="96" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="906" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>
</svg>
