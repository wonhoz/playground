  <rect x="440" y="310" width="20" height="10" rx="3" fill="#ff8800"/>
  <rect x="440" y="340" width="20" height="10" rx="3" fill="#ff8800"/>
  <rect x="260" y="200" width="10" height="20" rx="3" fill="#ff8800"/>
