<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Large gear -->
  <circle cx="512" cy="460" r="200" fill="none" stroke="#33691E" stroke-width="20"/>
  <circle cx="512" cy="460" r="120" fill="#33691E"/>
  <circle cx="512" cy="460" r="50" fill="#050A00"/>
  <!-- Gear teeth -->
  <rect x="492" y="240" width="40" height="60" rx="6" fill="#33691E"/>
  <rect x="492" y="620" width="40" height="60" rx="6" fill="#33691E"/>
  <rect x="292" y="440" width="60" height="40" rx="6" fill="#33691E"/>
  <rect x="672" y="440" width="60" height="40" rx="6" fill="#33691E"/>
  <rect x="340" y="298" width="50" height="50" rx="6" fill="#33691E" transform="rotate(45,365,323)"/>
  <rect x="622" y="298" width="50" height="50" rx="6" fill="#33691E" transform="rotate(45,647,323)"/>
  <rect x="340" y="572" width="50" height="50" rx="6" fill="#33691E" transform="rotate(45,365,597)"/>
  <rect x="622" y="572" width="50" height="50" rx="6" fill="#33691E" transform="rotate(45,647,597)"/>
  <!-- Bullets launching from gear -->
  <ellipse cx="512" cy="760" rx="30" ry="20" fill="#AED581"/>
  <ellipse cx="680" cy="710" rx="30" ry="20" fill="#AED581" transform="rotate(-30,680,710)"/>
  <ellipse cx="344" cy="710" rx="30" ry="20" fill="#AED581" transform="rotate(30,344,710)"/>
  <!-- Speed lines -->
  <line x1="512" y1="790" x2="512" y2="840" stroke="#AED581" stroke-width="6" opacity="0.7"/>
  <line x1="700" y1="730" x2="730" y2="760" stroke="#AED581" stroke-width="6" opacity="0.7"/>
</svg>
