<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network connections -->
  <line x1="256" y1="256" x2="120" y2="140" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="256" y1="256" x2="390" y2="140" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="256" y1="256" x2="100" y2="360" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="256" y1="256" x2="410" y2="360" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="256" y1="256" x2="256" y2="100" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="256" y1="256" x2="256" y2="420" stroke="#4466ff" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Center key node -->
  <circle cx="256" cy="256" r="40" fill="#1a1a3a" stroke="#6688ff" stroke-width="3"/>
  <text x="230" y="253" font-family="monospace" font-size="14" fill="#6688ff">Ctrl</text>
  <text x="236" y="270" font-family="monospace" font-size="14" fill="#6688ff">+Alt</text>
  <!-- Key nodes -->
  <rect x="94" y="116" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#ff6644" stroke-width="2"/>
  <text x="110" y="145" font-family="monospace" font-size="16" fill="#ff6644">Del</text>
  <rect x="364" y="116" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#44ff66" stroke-width="2"/>
  <text x="381" y="145" font-family="monospace" font-size="16" fill="#44ff66">Tab</text>
  <rect x="74" y="336" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#ffcc00" stroke-width="2"/>
  <text x="91" y="365" font-family="monospace" font-size="16" fill="#ffcc00">F5</text>
  <rect x="386" y="336" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#ff44cc" stroke-width="2"/>
  <text x="401" y="365" font-family="monospace" font-size="16" fill="#ff44cc">F12</text>
  <rect x="230" y="76" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#44ccff" stroke-width="2"/>
  <text x="252" y="105" font-family="monospace" font-size="16" fill="#44ccff">Z</text>
  <rect x="230" y="396" width="52" height="48" rx="10" fill="#1a1a3a" stroke="#ff8844" stroke-width="2"/>
  <text x="250" y="425" font-family="monospace" font-size="16" fill="#ff8844">S</text>
  <!-- Connection dots -->
  <circle cx="120" cy="140" r="4" fill="#4466ff"/>
  <circle cx="390" cy="140" r="4" fill="#4466ff"/>
  <circle cx="100" cy="360" r="4" fill="#4466ff"/>
  <circle cx="410" cy="360" r="4" fill="#4466ff"/>
</svg>