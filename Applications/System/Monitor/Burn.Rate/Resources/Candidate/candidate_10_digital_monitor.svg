<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A00"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="68" y="70" width="376" height="280" rx="14" fill="#111" stroke="#222" stroke-width="3"/>
  <!-- Screen -->
  <rect x="80" y="82" width="352" height="256" rx="8" fill="url(#screen)"/>
  <!-- Screen content - battery stats -->
  <text x="104" y="116" font-family="monospace" font-size="14" fill="#00FF41">BURN.RATE MONITOR v1.0</text>
  <line x1="90" y1="124" x2="420" y2="124" stroke="#003300" stroke-width="1"/>
  <text x="104" y="148" font-family="monospace" font-size="13" fill="#888">Battery    : 62%</text>
  <text x="104" y="168" font-family="monospace" font-size="13" fill="#FF8800">Drain Rate : 18.4%/h</text>
  <text x="104" y="188" font-family="monospace" font-size="13" fill="#FF4444">Est. Life  : 3h 21m</text>
  <text x="104" y="208" font-family="monospace" font-size="13" fill="#FFFF00">Avg Power  : 24.2W</text>
  <text x="104" y="228" font-family="monospace" font-size="13" fill="#44AAFF">Charge Cyc : 287</text>
  <text x="104" y="248" font-family="monospace" font-size="13" fill="#888">Health     : 89%</text>
  <!-- Mini battery graphic in screen -->
  <rect x="330" y="148" width="80" height="40" rx="5" fill="#001100" stroke="#00FF41" stroke-width="1.5"/>
  <rect x="410" y="160" width="8" height="16" rx="3" fill="#00FF41"/>
  <rect x="334" y="152" width="46" height="32" rx="4" fill="#00FF41"/>
  <text x="370" y="174" font-family="Arial" font-size="14" font-weight="bold" fill="#001100" text-anchor="middle">62%</text>
  <!-- Cursor blink -->
  <rect x="104" y="262" width="9" height="14" fill="#00FF41" opacity="0.8"/>
  <!-- Monitor stand -->
  <rect x="232" y="350" width="48" height="24" rx="4" fill="#111" stroke="#222" stroke-width="2"/>
  <rect x="196" y="372" width="120" height="14" rx="6" fill="#111" stroke="#222" stroke-width="2"/>
  <!-- Title -->
  <text x="256" y="428" font-family="Arial" font-size="22" fill="#00FF41" text-anchor="middle">System Monitor</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8800" text-anchor="middle">Burn.Rate</text>
</svg>
