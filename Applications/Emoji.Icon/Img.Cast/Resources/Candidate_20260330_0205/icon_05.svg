<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 밝은 파랑 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg5)"/>

  <!-- Layer 2: 프리즘 삼각형 -->
  <polygon points="512,170 760,750 264,750" fill="#90CAF9" stroke="#1565C0" stroke-width="14"/>
  <!-- 프리즘 광택 -->
  <polygon points="512,170 640,460 512,460" fill="#E3F2FD" opacity="0.5"/>
  <line x1="512" y1="170" x2="640" y2="460" stroke="#FFFFFF" stroke-width="6" opacity="0.6"/>

  <!-- 입력 광선 (왼쪽) -->
  <line x1="100" y1="460" x2="264" y2="460" stroke="#1565C0" stroke-width="18" stroke-linecap="round"/>
  <!-- 입력 레이블 -->
  <rect x="60" y="400" width="180" height="80" rx="14" fill="#1565C0"/>
  <text x="150" y="448" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle" dominant-baseline="middle">IMG</text>

  <!-- Layer 3: 출력 광선들 (오른쪽) — 무지개 분산 -->
  <!-- SVG — 빨강 -->
  <line x1="760" y1="400" x2="920" y2="300" stroke="#F44336" stroke-width="16" stroke-linecap="round"/>
  <rect x="860" y="260" width="140" height="68" rx="12" fill="#F44336"/>
  <text x="930" y="296" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" dominant-baseline="middle">SVG</text>

  <!-- PNG — 초록 -->
  <line x1="760" y1="480" x2="920" y2="480" stroke="#4CAF50" stroke-width="16" stroke-linecap="round"/>
  <rect x="860" y="445" width="140" height="68" rx="12" fill="#4CAF50"/>
  <text x="930" y="479" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" dominant-baseline="middle">PNG</text>

  <!-- JPG — 노랑 -->
  <line x1="760" y1="560" x2="920" y2="620" stroke="#FFC107" stroke-width="16" stroke-linecap="round"/>
  <rect x="860" y="592" width="140" height="68" rx="12" fill="#FFC107"/>
  <text x="930" y="626" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#333" text-anchor="middle" dominant-baseline="middle">JPG</text>

  <!-- ICO — 파랑 -->
  <line x1="760" y1="640" x2="920" y2="760" stroke="#2196F3" stroke-width="16" stroke-linecap="round"/>
  <rect x="860" y="732" width="140" height="68" rx="12" fill="#2196F3"/>
  <text x="930" y="766" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- BMP — 보라 -->
  <line x1="760" y1="700" x2="920" y2="840" stroke="#9C27B0" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <rect x="856" y="820" width="140" height="62" rx="12" fill="#9C27B0" opacity="0.7"/>
  <text x="926" y="851" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="42" fill="white" text-anchor="middle" dominant-baseline="middle">BMP</text>
</svg>
