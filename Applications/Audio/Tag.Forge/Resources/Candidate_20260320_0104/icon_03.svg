<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#010A08"/>
  <!-- Label printer body -->
  <rect x="260" y="300" width="504" height="320" rx="30" fill="#0d2420"/>
  <rect x="260" y="300" width="504" height="320" rx="30" fill="none" stroke="#26A69A" stroke-width="18"/>
  <!-- Paper slot opening -->
  <rect x="300" y="590" width="424" height="28" rx="6" fill="#010A08"/>
  <!-- Tag label coming out -->
  <rect x="360" y="618" width="304" height="150" rx="8" fill="#4DB6AC"/>
  <!-- Tag hole -->
  <circle cx="404" cy="693" r="20" fill="#010A08"/>
  <!-- Tag lines (metadata) -->
  <rect x="440" y="655" width="180" height="14" rx="7" fill="#010A08" opacity="0.6"/>
  <rect x="440" y="685" width="140" height="14" rx="7" fill="#010A08" opacity="0.6"/>
  <rect x="440" y="715" width="160" height="14" rx="7" fill="#010A08" opacity="0.6"/>
  <!-- Printer display panel -->
  <rect x="300" y="330" width="250" height="100" rx="10" fill="#010A08"/>
  <rect x="300" y="330" width="250" height="100" rx="10" fill="none" stroke="#26A69A" stroke-width="6"/>
  <!-- Printer button -->
  <circle cx="650" cy="380" r="40" fill="#26A69A"/>
  <circle cx="650" cy="380" r="26" fill="#4DB6AC"/>
</svg>