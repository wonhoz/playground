<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgLines" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1C20"/>
      <stop offset="100%" stop-color="#111315"/>
    </linearGradient>
    <!-- 카드 배경 -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2D33"/>
      <stop offset="100%" stop-color="#22252A"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000066"/>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgLines)"/>

  <!-- 배경 카드 -->
