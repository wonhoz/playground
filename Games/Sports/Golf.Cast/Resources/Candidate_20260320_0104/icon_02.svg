<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 깃발 홀 핀: 깃발 + 홀 -->
  <!-- green surface -->
  <ellipse cx="512" cy="760" rx="300" ry="60" fill="#388E3C" opacity="0.6"/>
  <!-- hole -->
  <ellipse cx="512" cy="760" rx="60" ry="20" fill="#030A03"/>
  <!-- pin shaft -->
  <line x1="512" y1="760" x2="512" y2="320" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <!-- flag -->
  <path d="M512 320 L680 390 L512 460 Z" fill="#388E3C"/>
  <path d="M512 320 L680 390 L512 460 Z" fill="none" stroke="#81C784" stroke-width="3" opacity="0.6"/>
  <!-- flag detail line -->
  <line x1="540" y1="340" x2="640" y2="380" stroke="#81C784" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="540" y1="370" x2="640" y2="405" stroke="#81C784" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
