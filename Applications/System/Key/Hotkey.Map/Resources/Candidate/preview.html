<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Hotkey.Map - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #818cf8; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .card:hover { border-color: #818cf8; }
    .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .label { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .num { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Hotkey.Map — Icon Candidates</h1>
  <p>시스템 단축키 맵핑·시각화 도구 아이콘 후보 10개</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_keyboard_blueprint.svg" alt="keyboard_blueprint"/>
      <div class="label">keyboard_blueprint</div>
      <div class="num">#01</div>
    </div>
    <div class="card">
      <img src="candidate_02_neon_keymap.svg" alt="neon_keymap"/>
      <div class="label">neon_keymap</div>
      <div class="num">#02</div>
    </div>
    <div class="card">
      <img src="candidate_03_golden_shortcuts.svg" alt="golden_shortcuts"/>
      <div class="label">golden_shortcuts</div>
      <div class="num">#03</div>
    </div>
    <div class="card">
      <img src="candidate_04_teal_mindmap.svg" alt="teal_mindmap"/>
      <div class="label">teal_mindmap</div>
      <div class="num">#04</div>
    </div>
    <div class="card">
      <img src="candidate_05_red_command.svg" alt="red_command"/>
      <div class="label">red_command</div>
      <div class="num">#05</div>
    </div>
    <div class="card">
      <img src="candidate_06_lime_heatmap.svg" alt="lime_heatmap"/>
      <div class="label">lime_heatmap</div>
      <div class="num">#06</div>
    </div>
    <div class="card">
      <img src="candidate_07_slate_dark_keys.svg" alt="slate_dark_keys"/>
      <div class="label">slate_dark_keys</div>
      <div class="num">#07</div>
    </div>
    <div class="card">
      <img src="candidate_08_orange_flow.svg" alt="orange_flow"/>
      <div class="label">orange_flow</div>
      <div class="num">#08</div>
    </div>
    <div class="card">
      <img src="candidate_09_indigo_visual.svg" alt="indigo_visual"/>
      <div class="label">indigo_visual</div>
      <div class="num">#09</div>
    </div>
    <div class="card">
      <img src="candidate_10_white_clean.svg" alt="white_clean"/>
      <div class="label">white_clean</div>
      <div class="num">#10</div>
    </div>
  </div>
</body>
</html>
