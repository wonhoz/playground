<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Web.Shot — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
  p.desc { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-6px) scale(1.03); border-color: #555; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; }
</style>
</head>
<body>
<h1>Web.Shot</h1>
<p class="desc">Website screenshot tool — capture full-page screenshots</p>
<div class="grid">
  <div class="card"><img src="candidate_01_camera_browser.svg"/><span>01 · Camera + Browser</span></div>
  <div class="card"><img src="candidate_02_screenshot_capture.svg"/><span>02 · Screenshot Capture</span></div>
  <div class="card"><img src="candidate_03_web_page_snap.svg"/><span>03 · Web Page Snap</span></div>
  <div class="card"><img src="candidate_04_browser_camera_shutter.svg"/><span>04 · Browser Camera Shutter</span></div>
  <div class="card"><img src="candidate_05_screen_capture_flash.svg"/><span>05 · Screen Capture Flash</span></div>
  <div class="card"><img src="candidate_06_webpage_screenshot.svg"/><span>06 · Webpage Screenshot</span></div>
  <div class="card"><img src="candidate_07_web_camera_art.svg"/><span>07 · Web Camera Art</span></div>
  <div class="card"><img src="candidate_08_browser_snapshot.svg"/><span>08 · Browser Snapshot</span></div>
  <div class="card"><img src="candidate_09_screen_shot_lightning.svg"/><span>09 · Screenshot Lightning</span></div>
  <div class="card"><img src="candidate_10_web_capture_icon.svg"/><span>10 · Web Capture Icon</span></div>
</div>
</body>
</html>
