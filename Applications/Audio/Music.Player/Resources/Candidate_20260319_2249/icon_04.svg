<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Metronome — rhythm / BPM -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0006"/>
  <!-- Metronome body (trapezoid) -->
  <path d="M320 820 L704 820 L624 200 L400 200 Z" fill="#1A0028" stroke="#9C27B0" stroke-width="24" stroke-linejoin="round"/>
  <!-- Face panel -->
  <path d="M360 780 L664 780 L600 260 L424 260 Z" fill="#0D001A"/>
  <!-- Pendulum arc guide lines -->
  <path d="M340 600 Q512 480 684 600" fill="none" stroke="#9C27B0" stroke-width="8" stroke-dasharray="16 12" opacity="0.4"/>
  <path d="M380 680 Q512 580 644 680" fill="none" stroke="#9C27B0" stroke-width="6" stroke-dasharray="12 10" opacity="0.3"/>
  <!-- Pendulum rod (angled right = beat) -->
  <line x1="512" y1="720" x2="620" y2="340" stroke="#E040FB" stroke-width="18" stroke-linecap="round"/>
  <!-- Pendulum bob -->
  <circle cx="634" cy="314" r="28" fill="#E040FB"/>
  <!-- Pivot -->
  <circle cx="512" cy="720" r="18" fill="#9C27B0"/>
  <!-- BPM scale marks -->
  <rect x="420" y="360" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <rect x="420" y="400" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <rect x="420" y="440" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <rect x="420" y="480" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <rect x="420" y="520" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <rect x="420" y="560" width="44" height="10" rx="5" fill="#9C27B0" opacity="0.5"/>
  <!-- Speaker hole at bottom -->
  <circle cx="440" cy="700" r="10" fill="#9C27B0" opacity="0.4"/>
  <circle cx="480" cy="700" r="10" fill="#9C27B0" opacity="0.4"/>
  <circle cx="520" cy="700" r="10" fill="#9C27B0" opacity="0.4"/>
  <circle cx="560" cy="700" r="10" fill="#9C27B0" opacity="0.4"/>
  <circle cx="600" cy="700" r="10" fill="#9C27B0" opacity="0.4"/>
</svg>
