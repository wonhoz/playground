<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>

  <!-- RESULT header -->
  <rect x="112" y="152" width="800" height="72" rx="20" fill="#F57F17" stroke="#E65100" stroke-width="12"/>
  <text x="512" y="203" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">RESULT</text>

  <!-- Score: 18/20 huge -->
  <text x="512" y="400" font-family="Arial Black, sans-serif" font-weight="900" font-size="188" fill="#E65100" text-anchor="middle">18/20</text>

  <!-- Grade badge: A -->
  <rect x="380" y="418" width="132" height="84" rx="20" fill="#FFD93D" stroke="#F57F17" stroke-width="12"/>
  <text x="446" y="480" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#BF360C" text-anchor="middle">A</text>

  <!-- CORRECT count bar -->
  <rect x="112" y="518" width="800" height="80" rx="20" fill="#388E3C" stroke="#1B5E20" stroke-width="14"/>
  <text x="512" y="572" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">18 CORRECT  2 WRONG</text>

  <!-- SCORE badge -->
  <rect x="248" y="752" width="528" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">SCORE</text>
</svg>
