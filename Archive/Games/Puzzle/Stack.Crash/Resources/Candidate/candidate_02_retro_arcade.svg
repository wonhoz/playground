<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="redBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="greenBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44FF88"/>
      <stop offset="100%" stop-color="#00AA44"/>
    </linearGradient>
    <linearGradient id="blueBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="yellowBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEE44"/>
      <stop offset="100%" stop-color="#CC9900"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel grid scanlines -->
  <rect x="40" y="40" width="432" height="432" rx="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  <!-- Ground platform -->
  <rect x="56" y="410" width="400" height="24" rx="0" fill="#333366"/>
  <rect x="56" y="410" width="400" height="4" rx="0" fill="#5555AA"/>
  <!-- Stack - pixel style (no radius) -->
  <rect x="112" y="326" width="288" height="56" fill="url(#blueBlock)"/>
  <rect x="112" y="326" width="288" height="8" fill="#88AAFF" opacity="0.5"/>
  <rect x="112" y="374" width="288" height="4" fill="#002266" opacity="0.5"/>
  <rect x="136" y="266" width="240" height="56" fill="url(#greenBlock)"/>
  <rect x="136" y="266" width="240" height="8" fill="#88FFCC" opacity="0.5"/>
  <rect x="192" y="210" width="128" height="52" fill="url(#redBlock)"/>
  <rect x="192" y="210" width="128" height="8" fill="#FF9999" opacity="0.5"/>
  <!-- Crashing top block -->
  <g transform="translate(256, 175) rotate(-22)">
    <rect x="-80" y="-26" width="160" height="48" fill="url(#yellowBlock)"/>
    <rect x="-80" y="-26" width="160" height="8" fill="#FFFFAA" opacity="0.5"/>
  </g>
  <!-- Pixel explosion debris -->
  <rect x="330" y="118" width="16" height="16" fill="#FFEE44"/>
  <rect x="354" y="136" width="12" height="12" fill="#FF4444"/>
  <rect x="312" y="100" width="8" height="8" fill="#44FF88"/>
  <rect x="370" y="108" width="10" height="10" fill="#4488FF"/>
  <rect x="346" y="92" width="8" height="8" fill="#FFEE44" opacity="0.7"/>
  <!-- Score text style -->
  <text x="256" y="78" font-family="monospace" font-size="22" fill="#FFEE44" text-anchor="middle" opacity="0.9" letter-spacing="2">CRASH!</text>
</svg>
