<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="60%" stop-color="#ff1744"/>
      <stop offset="100%" stop-color="#b71c1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe57f"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fire glow -->
  <ellipse cx="256" cy="380" rx="180" ry="100" fill="url(#fire)" opacity="0.7"/>
  <!-- Flame shapes -->
  <path d="M256 180 Q220 240 230 300 Q200 260 210 320 Q170 280 180 380 L332 380 Q342 280 302 320 Q312 260 282 300 Q292 240 256 180 Z" fill="#ff6d00" opacity="0.9"/>
  <path d="M256 220 Q236 266 244 310 Q222 278 230 330 L282 330 Q290 278 268 310 Q276 266 256 220 Z" fill="#ffd740"/>
  <!-- Forging Letters on fire base -->
  <text x="156" y="440" font-family="serif" font-size="48" font-weight="bold" fill="url(#letter)" text-anchor="middle">A</text>
  <text x="256" y="440" font-family="serif" font-size="48" font-weight="bold" fill="url(#letter)" text-anchor="middle">あ</text>
  <text x="356" y="440" font-family="serif" font-size="48" font-weight="bold" fill="url(#letter)" text-anchor="middle">가</text>
  <!-- Stars/sparks from flame -->
  <circle cx="180" cy="200" r="5" fill="#ffd740" opacity="0.9"/>
  <circle cx="320" cy="190" r="6" fill="#ff9100" opacity="0.9"/>
  <circle cx="210" cy="160" r="4" fill="#ffd740" opacity="0.8"/>
  <circle cx="290" cy="155" r="5" fill="#ff9100" opacity="0.8"/>
  <circle cx="256" cy="130" r="4" fill="#fff9c4" opacity="0.9"/>
</svg>
