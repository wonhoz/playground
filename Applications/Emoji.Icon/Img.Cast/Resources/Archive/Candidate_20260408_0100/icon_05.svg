<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05ic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background: purple/indigo -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05ic)"/>

  <!-- ICO multi-size grid title -->
  <text x="512" y="200" font-family="Arial Black,Arial" font-size="52" fill="white" font-weight="900" text-anchor="middle">.ICO</text>
  <text x="512" y="246" font-family="Arial,sans-serif" font-size="26" fill="#C4B5FD" text-anchor="middle">Multi-Size Icon</text>

  <!-- Size grid: 6 cells -->
  <!-- 16x16 -->
  <rect x="140" y="280" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="158" y="298" width="144" height="144" rx="8" fill="#FDE68A"/>
  <!-- Small icon inside (smiley) -->
  <circle cx="230" cy="370" r="42" fill="#F59E0B"/>
  <circle cx="216" cy="360" r="7" fill="#1C1917"/>
  <circle cx="244" cy="360" r="7" fill="#1C1917"/>
  <path d="M210,382 Q230,398 250,382" fill="none" stroke="#1C1917" stroke-width="5" stroke-linecap="round"/>
  <text x="230" y="460" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">16px</text>

  <!-- 32x32 -->
  <rect x="342" y="280" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="360" y="298" width="144" height="144" rx="8" fill="#FDE68A"/>
  <circle cx="432" cy="370" r="46" fill="#F59E0B"/>
  <circle cx="418" cy="359" r="8" fill="#1C1917"/>
  <circle cx="446" cy="359" r="8" fill="#1C1917"/>
  <circle cx="421" cy="356" r="3" fill="white"/>
  <circle cx="449" cy="356" r="3" fill="white"/>
  <path d="M412,383 Q432,399 452,383" fill="none" stroke="#1C1917" stroke-width="6" stroke-linecap="round"/>
  <text x="432" y="460" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">32px</text>

  <!-- 48x48 -->
  <rect x="544" y="280" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="562" y="298" width="144" height="144" rx="8" fill="#FDE68A"/>
  <circle cx="634" cy="370" r="48" fill="#F59E0B"/>
  <circle cx="619" cy="358" r="9" fill="#1C1917"/>
  <circle cx="649" cy="358" r="9" fill="#1C1917"/>
  <circle cx="622" cy="355" r="3.5" fill="white"/>
  <circle cx="652" cy="355" r="3.5" fill="white"/>
  <path d="M614,384 Q634,402 654,384" fill="none" stroke="#1C1917" stroke-width="6" stroke-linecap="round"/>
  <text x="634" y="460" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">48px</text>

  <!-- 64x64 -->
  <rect x="140" y="490" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="158" y="508" width="144" height="144" rx="8" fill="#FDE68A"/>
  <circle cx="230" cy="580" r="50" fill="#F59E0B"/>
  <circle cx="215" cy="568" r="10" fill="#1C1917"/>
  <circle cx="245" cy="568" r="10" fill="#1C1917"/>
  <circle cx="218" cy="565" r="4" fill="white"/>
  <circle cx="248" cy="565" r="4" fill="white"/>
  <path d="M210,593 Q230,612 250,593" fill="none" stroke="#1C1917" stroke-width="7" stroke-linecap="round"/>
  <text x="230" y="670" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">64px</text>

  <!-- 128x128 -->
  <rect x="342" y="490" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="360" y="508" width="144" height="144" rx="8" fill="#FDE68A"/>
  <circle cx="432" cy="580" r="52" fill="#F59E0B"/>
  <circle cx="417" cy="567" r="11" fill="#1C1917"/>
  <circle cx="447" cy="567" r="11" fill="#1C1917"/>
  <circle cx="420" cy="564" r="4.5" fill="white"/>
  <circle cx="450" cy="564" r="4.5" fill="white"/>
  <path d="M412,595 Q432,614 452,595" fill="none" stroke="#1C1917" stroke-width="7" stroke-linecap="round"/>
  <text x="432" y="670" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">128px</text>

  <!-- 256x256 -->
  <rect x="544" y="490" width="180" height="180" rx="16" fill="#1E1B4B"/>
  <rect x="562" y="508" width="144" height="144" rx="8" fill="#FDE68A"/>
  <circle cx="634" cy="580" r="54" fill="#F59E0B"/>
  <circle cx="618" cy="566" r="12" fill="#1C1917"/>
  <circle cx="650" cy="566" r="12" fill="#1C1917"/>
  <circle cx="621" cy="563" r="5" fill="white"/>
  <circle cx="653" cy="563" r="5" fill="white"/>
  <path d="M614,597 Q634,618 654,597" fill="none" stroke="#1C1917" stroke-width="8" stroke-linecap="round"/>
  <text x="634" y="670" font-family="Arial,sans-serif" font-size="24" fill="#A5B4FC" text-anchor="middle">256px</text>

  <!-- "All in one .ico" label at bottom -->
  <rect x="260" y="720" width="504" height="66" rx="16" fill="#FDE047"/>
  <text x="512" y="763" font-family="Arial Black,Arial" font-size="34" fill="#4F46E5" font-weight="900" text-anchor="middle">All in one .ico file</text>
</svg>
