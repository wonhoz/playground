<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F0FF"/>
      <stop offset="100%" stop-color="#E8C8FF"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 2x2 format grid -->
  <!-- Top-left: SVG (teal) -->
  <rect x="130" y="130" width="340" height="340" rx="28" fill="#26C6DA"/>
  <!-- Top-right: PNG (green) -->
  <rect x="554" y="130" width="340" height="340" rx="28" fill="#66BB6A"/>
  <!-- Bottom-left: ICO (orange) -->
  <rect x="130" y="554" width="340" height="340" rx="28" fill="#FFA726"/>
  <!-- Bottom-right: JPG (pink) -->
  <rect x="554" y="554" width="340" height="340" rx="28" fill="#EF5350"/>
  <!-- Layer 3: Format labels -->
  <text x="168" y="342" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white">SVG</text>
  <text x="575" y="342" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white">PNG</text>
  <text x="180" y="766" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white">ICO</text>
  <text x="594" y="766" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white">JPG</text>
  <!-- Center crosshair / gap hint -->
  <rect x="462" y="130" width="80" height="764" rx="0" fill="url(#bg05)"/>
  <rect x="130" y="462" width="764" height="80" rx="0" fill="url(#bg05)"/>
</svg>
