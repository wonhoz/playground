<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1400"/>
      <stop offset="100%" stop-color="#2d2000"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="magnify" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폴더 뒷면 -->
  <rect x="80" y="170" width="320" height="250" rx="10" fill="url(#folderBack)"/>
  <!-- 폴더 탭 -->
  <path d="M80,170 L80,148 L160,148 L190,170Z" fill="#b45309"/>
  <!-- 폴더 앞면 -->
  <rect x="80" y="190" width="320" height="230" rx="10" fill="url(#folderFront)"/>
  <!-- 압축 파일 아이콘들 (폴더 안) -->
  <rect x="108" y="220" width="52" height="64" rx="6" fill="#92400e" stroke="#d97706" stroke-width="1.5"/>
  <text x="134" y="244" font-family="Arial" font-size="10" fill="#fde68a" text-anchor="middle">ZIP</text>
  <rect x="108" y="248" width="52" height="30" rx="0" fill="#78350f"/>
  <text x="134" y="268" font-family="'Courier New',monospace" font-size="9" fill="#fcd34d" text-anchor="middle">4.2MB</text>
  <rect x="172" y="220" width="52" height="64" rx="6" fill="#92400e" stroke="#d97706" stroke-width="1.5"/>
  <text x="198" y="244" font-family="Arial" font-size="10" fill="#fde68a" text-anchor="middle">RAR</text>
  <rect x="172" y="248" width="52" height="30" rx="0" fill="#78350f"/>
  <text x="198" y="268" font-family="'Courier New',monospace" font-size="9" fill="#fcd34d" text-anchor="middle">12MB</text>
  <!-- 확대경 -->
  <circle cx="356" cy="340" r="72" fill="none" stroke="url(#magnify)" stroke-width="10"/>
  <circle cx="356" cy="340" r="58" fill="#1c1400" opacity="0.85"/>
  <!-- 확대경 안 파일 목록 -->
  <rect x="320" y="312" width="72" height="6" rx="2" fill="#fcd34d" opacity="0.8"/>
  <rect x="320" y="324" width="56" height="6" rx="2" fill="#fcd34d" opacity="0.6"/>
  <rect x="320" y="336" width="64" height="6" rx="2" fill="#fcd34d" opacity="0.7"/>
  <rect x="320" y="348" width="48" height="6" rx="2" fill="#fcd34d" opacity="0.5"/>
  <!-- 손잡이 -->
  <line x1="406" y1="388" x2="440" y2="422" stroke="url(#magnify)" stroke-width="10" stroke-linecap="round"/>
</svg>
