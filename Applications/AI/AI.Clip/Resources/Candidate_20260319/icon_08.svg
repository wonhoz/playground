<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Copy symbol with AI eye -->
  <circle cx="512" cy="512" r="460" fill="#141414"/>
  <!-- Two overlapping rectangles (copy symbol) -->
  <rect x="240" y="320" width="340" height="400" rx="24" fill="#1E1E1E" stroke="#26A69A" stroke-width="28"/>
  <rect x="340" y="220" width="340" height="400" rx="24" fill="#1E1E1E" stroke="#26A69A" stroke-width="28"/>
  <!-- Eye in the center of top rect -->
  <ellipse cx="510" cy="420" rx="100" ry="60" fill="#26A69A"/>
  <circle cx="510" cy="420" r="34" fill="#141414"/>
  <circle cx="510" cy="420" r="18" fill="#26A69A"/>
  <circle cx="524" cy="410" r="7" fill="#fff" opacity="0.7"/>
</svg>
