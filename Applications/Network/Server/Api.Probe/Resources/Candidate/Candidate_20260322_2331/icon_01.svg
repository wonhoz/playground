<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A1B2E"/>
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1B2E"/>
      <stop offset="100%" stop-color="#0D0E1F"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: Method Badge Stack -->
  <!-- GET badge -->
  <rect x="190" y="200" width="644" height="162" rx="20" fill="#0D2E2A"/>
  <rect x="190" y="200" width="644" height="162" rx="20" fill="none" stroke="#14B8A6" stroke-width="4"/>
  <text x="290" y="302" font-family="'Consolas','Courier New',monospace" font-size="88" font-weight="bold" fill="#14B8A6">GET</text>

  <!-- POST badge -->
  <rect x="190" y="390" width="644" height="162" rx="20" fill="#0D2E16"/>
  <rect x="190" y="390" width="644" height="162" rx="20" fill="none" stroke="#22C55E" stroke-width="4"/>
  <text x="261" y="492" font-family="'Consolas','Courier New',monospace" font-size="88" font-weight="bold" fill="#22C55E">POST</text>

  <!-- DEL badge -->
  <rect x="190" y="580" width="644" height="162" rx="20" fill="#2E0D0D"/>
  <rect x="190" y="580" width="644" height="162" rx="20" fill="none" stroke="#EF4444" stroke-width="4"/>
  <text x="261" y="682" font-family="'Consolas','Courier New',monospace" font-size="88" font-weight="bold" fill="#EF4444">DEL</text>

  <!-- Layer 3: Detail — small dot indicators -->
  <circle cx="830" cy="281" r="18" fill="#14B8A6" opacity="0.9"/>
  <circle cx="830" cy="471" r="18" fill="#22C55E" opacity="0.9"/>
  <circle cx="830" cy="661" r="18" fill="#EF4444" opacity="0.9"/>
</svg>
