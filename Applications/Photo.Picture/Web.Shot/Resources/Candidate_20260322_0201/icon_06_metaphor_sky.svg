<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 스카이 파스텔 -->
  <rect width="1024" height="1024" rx="180" fill="#E8F4FD"/>

  <!-- 레이어드 패턴: 브라우저 + 다운로드 화살표 (캡처 = 저장) -->

  <!-- 구름 배경 장식 -->
  <ellipse cx="200" cy="180" rx="120" ry="60" fill="#C8E6F8" opacity="0.7"/>
  <ellipse cx="800" cy="140" rx="100" ry="50" fill="#C8E6F8" opacity="0.6"/>
  <ellipse cx="860" cy="840" rx="130" ry="55" fill="#C8E6F8" opacity="0.5"/>

  <!-- 브라우저 창 (메인, 밝은 테마) -->
  <rect x="140" y="200" width="560" height="620" rx="20" fill="white" filter="url(#shadow)"/>
  <!-- 타이틀바 -->
  <rect x="140" y="200" width="560" height="56" rx="20" fill="#7EC8E3"/>
  <rect x="140" y="228" width="560" height="28" fill="#7EC8E3"/>
  <!-- 버튼 -->
  <circle cx="166" cy="228" r="9" fill="#FF8A80"/>
  <circle cx="190" cy="228" r="9" fill="#FFD54F"/>
  <circle cx="214" cy="228" r="9" fill="#A5D6A7"/>
  <!-- URL 바 -->
  <rect x="236" y="213" width="360" height="30" rx="15" fill="white" opacity="0.7"/>
  <text x="416" y="234" font-family="sans-serif" font-size="14" fill="#2A7A9A" text-anchor="middle">https://example.com</text>

  <!-- 페이지 내용 (스크롤 가능한 긴 내용) -->
  <rect x="160" y="276" width="520" height="520" rx="6" fill="#FAFEFF" clip-path="url(#browser-clip)"/>
  <!-- 히어로 이미지 -->
  <rect x="160" y="276" width="520" height="140" rx="0" fill="#B3D9F0"/>
  <circle cx="280" cy="326" rx="50" ry="50" fill="#7EC8E3"/>
  <text x="450" y="330" font-family="sans-serif" font-size="20" fill="#2A7A9A" text-anchor="middle">Example Website</text>
  <text x="450" y="354" font-family="sans-serif" font-size="13" fill="#4A9AB8" text-anchor="middle">Full Page</text>
  <!-- 콘텐츠 줄 -->
  <rect x="174" y="432" width="340" height="14" rx="4" fill="#B3D9F0"/>
  <rect x="174" y="454" width="492" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="472" width="460" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="498" width="492" height="50" rx="6" fill="#E8F4FD"/>
  <rect x="174" y="558" width="300" height="12" rx="4" fill="#B3D9F0"/>
  <rect x="174" y="578" width="460" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="596" width="440" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="620" width="492" height="50" rx="6" fill="#E8F4FD"/>
  <rect x="174" y="680" width="380" height="12" rx="4" fill="#B3D9F0"/>
  <rect x="174" y="700" width="460" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="720" width="430" height="10" rx="3" fill="#D0ECF8"/>
  <rect x="174" y="744" width="492" height="40" rx="6" fill="#E8F4FD"/>

  <!-- 스크롤바 -->
  <rect x="688" y="276" width="12" height="520" rx="6" fill="#D0ECF8"/>
  <rect x="688" y="290" width="12" height="100" rx="6" fill="#7EC8E3"/>

  <!-- 캡처 버튼 + 다운로드 화살표 (우측 패널) -->
  <rect x="730" y="350" width="200" height="300" rx="20" fill="#7EC8E3" filter="url(#shadow)"/>
  <!-- 카메라 아이콘 -->
  <rect x="756" y="370" width="148" height="100" rx="12" fill="white" opacity="0.9"/>
  <circle cx="830" cy="420" r="32" fill="none" stroke="#2A7A9A" stroke-width="6"/>
  <circle cx="830" cy="420" r="18" fill="#2A7A9A"/>
  <rect x="800" y="370" width="60" height="18" rx="6" fill="white" opacity="0.9"/>
  <!-- 화살표 (다운로드) -->
  <line x1="830" y1="490" x2="830" y2="562" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <polyline points="804,545 830,574 856,545" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- SAVE 텍스트 -->
  <text x="830" y="640" font-family="sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SAVE</text>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#A0C8E0" flood-opacity="0.5"/>
    </filter>
    <clipPath id="browser-clip">
      <rect x="160" y="276" width="520" height="520" rx="6"/>
    </clipPath>
  </defs>
</svg>
