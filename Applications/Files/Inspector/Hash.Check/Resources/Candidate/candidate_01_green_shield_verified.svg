<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001400"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00CC44"/>
      <stop offset="100%" stop-color="#007722"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00FF66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FF66" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Shield shape -->
  <path d="M256 80 L420 140 L420 280 Q420 390 256 450 Q92 390 92 280 L92 140 Z" fill="url(#shield)" opacity="0.9"/>
  <!-- Shield inner -->
  <path d="M256 110 L395 160 L395 280 Q395 370 256 420 Q117 370 117 280 L117 160 Z" fill="#001800" opacity="0.5"/>
  <!-- Checkmark -->
  <polyline points="175,260 230,320 340,190" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hash text at bottom of shield -->
  <text x="256" y="390" text-anchor="middle" fill="#00FF66" font-size="14" font-family="monospace" opacity="0.8">MD5 / SHA-256</text>
  <!-- Verified label -->
  <rect x="160" y="440" width="192" height="36" rx="8" fill="#00CC44" opacity="0.2"/>
  <text x="256" y="463" text-anchor="middle" fill="#00FF66" font-size="18" font-family="monospace">VERIFIED</text>
</svg>
