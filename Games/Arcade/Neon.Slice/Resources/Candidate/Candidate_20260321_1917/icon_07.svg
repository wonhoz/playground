<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="n7-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="n7-bomb" cx="45%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FF1A00" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#FF1A00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n7-safe" cx="55%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#n7-clip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#0A0300"/>
    <!-- Grid -->
    <g stroke="#FF4400" stroke-width="0.7" opacity="0.07">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="682" x2="1024" y2="682"/>
      <line x1="0" y1="852" x2="1024" y2="852"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="682" y1="0" x2="682" y2="1024"/>
      <line x1="852" y1="0" x2="852" y2="1024"/>
    </g>

    <!-- BOMB (left, danger) -->
    <ellipse cx="340" cy="500" rx="340" ry="280" fill="url(#n7-bomb)"/>
    <!-- Bomb body -->
    <circle cx="340" cy="500" r="160" fill="#1A0000" stroke="#FF2200" stroke-width="10" opacity="0.95"/>
    <!-- Bomb outer glow ring -->
    <circle cx="340" cy="500" r="186" fill="none" stroke="#FF2200" stroke-width="4" opacity="0.35"/>
    <!-- Bomb fuse -->
    <path d="M340,340 Q360,290 390,260 Q410,240 430,220"
          fill="none" stroke="#FFA500" stroke-width="7" stroke-linecap="round"/>
    <!-- Fuse spark -->
    <circle cx="430" cy="220" r="16" fill="#FFE600" opacity="0.95"/>
    <circle cx="430" cy="220" r="28" fill="#FFA500" opacity="0.50"/>
    <!-- Bomb "!" text -->
    <text x="340" y="526"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="130"
          fill="#FF4444"
          text-anchor="middle">!</text>

    <!-- Warning X overlay on bomb -->
    <line x1="260" y1="420" x2="420" y2="580" stroke="#FF0000" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
    <line x1="420" y1="420" x2="260" y2="580" stroke="#FF0000" stroke-width="14" stroke-linecap="round" opacity="0.55"/>

    <!-- SAFE shape (right, green, sliceable) -->
    <ellipse cx="700" cy="520" rx="280" ry="240" fill="url(#n7-safe)"/>
    <!-- Pentagon (safe to slice) -->
    <polygon points="700,380 760,430 738,500 662,500 640,430"
             fill="#041A00" stroke="#39FF14" stroke-width="8" opacity="0.95"/>
    <circle cx="700" cy="440" r="120" fill="none" stroke="#39FF14" stroke-width="3" opacity="0.22"/>

    <!-- Dividing line / "choose" indicator -->
    <line x1="512" y1="240" x2="512" y2="800"
          stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.18" stroke-dasharray="12 16"/>
  </g>
</svg>
