<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F4FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg01)"/>
  <!-- GET badge circle -->
  <circle cx="512" cy="400" r="220" fill="#22C55E"/>
  <!-- GET text -->
  <text x="512" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="145" font-weight="900" fill="#FFFFFF" letter-spacing="-3">GET</text>
  <!-- URL bar -->
  <rect x="180" y="660" width="664" height="90" rx="45" fill="#E2E8F0"/>
  <rect x="180" y="660" width="664" height="90" rx="45" fill="none" stroke="#CBD5E1" stroke-width="3"/>
  <!-- URL text -->
  <text x="512" y="712" text-anchor="middle" dominant-baseline="middle" font-family="monospace, sans-serif" font-size="38" fill="#64748B">/api/v1/users</text>
</svg>
