<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Node network connected circles -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Connection lines -->
  <line x1="512" y1="512" x2="280" y2="300" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="744" y2="300" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="280" y2="724" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="744" y2="724" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="512" y2="220" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="180" y2="512" stroke="#33691E" stroke-width="8"/>
  <line x1="512" y1="512" x2="844" y2="512" stroke="#33691E" stroke-width="8"/>
  <!-- Peripheral connections -->
  <line x1="280" y1="300" x2="512" y2="220" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <line x1="744" y1="300" x2="512" y2="220" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <line x1="280" y1="300" x2="180" y2="512" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <line x1="280" y1="724" x2="180" y2="512" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <line x1="744" y1="724" x2="844" y2="512" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <line x1="744" y1="300" x2="844" y2="512" stroke="#1B5E20" stroke-width="5" opacity="0.6"/>
  <!-- Satellite nodes -->
  <circle cx="280" cy="300" r="38" fill="#1B5E20"/>
  <circle cx="280" cy="300" r="24" fill="#558B2F"/>
  <circle cx="744" cy="300" r="38" fill="#1B5E20"/>
  <circle cx="744" cy="300" r="24" fill="#558B2F"/>
  <circle cx="280" cy="724" r="38" fill="#1B5E20"/>
  <circle cx="280" cy="724" r="24" fill="#33691E"/>
  <circle cx="744" cy="724" r="38" fill="#1B5E20"/>
  <circle cx="744" cy="724" r="24" fill="#33691E"/>
  <circle cx="512" cy="220" r="32" fill="#33691E"/>
  <circle cx="512" cy="220" r="18" fill="#558B2F"/>
  <circle cx="180" cy="512" r="32" fill="#33691E"/>
  <circle cx="180" cy="512" r="18" fill="#558B2F"/>
  <circle cx="844" cy="512" r="32" fill="#33691E"/>
  <circle cx="844" cy="512" r="18" fill="#558B2F"/>
  <!-- Central hub node -->
  <circle cx="512" cy="512" r="60" fill="#1B5E20"/>
  <circle cx="512" cy="512" r="42" fill="#33691E"/>
  <circle cx="512" cy="512" r="26" fill="#76FF03"/>
  <!-- Active signal dots on lines -->
  <circle cx="396" cy="406" r="10" fill="#76FF03" opacity="0.8"/>
  <circle cx="628" cy="406" r="10" fill="#76FF03" opacity="0.8"/>
  <circle cx="512" cy="366" r="8" fill="#558B2F" opacity="0.7"/>
</svg>
