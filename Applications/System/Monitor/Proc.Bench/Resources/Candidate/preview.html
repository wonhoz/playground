<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Proc.Bench - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { color: #FF6D00; margin-bottom: 8px; font-size: 22px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item:hover { border-color: #FF6D00; background: #2a2a2a; }
  .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 20px; }
  .item span { font-size: 11px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Proc.Bench — 아이콘 후보 10종</h1>
<p>프로세스 성능 벤치마크 도구</p>
<div class="grid">
  <div class="item"><img src="candidate_01_gauge_blue.svg"><span>01 gauge_blue</span></div>
  <div class="item"><img src="candidate_02_cpu_flame_orange.svg"><span>02 cpu_flame_orange</span></div>
  <div class="item"><img src="candidate_03_bar_chart_teal.svg"><span>03 bar_chart_teal</span></div>
  <div class="item"><img src="candidate_04_stopwatch_green.svg"><span>04 stopwatch_green</span></div>
  <div class="item"><img src="candidate_05_radar_purple.svg"><span>05 radar_purple</span></div>
  <div class="item"><img src="candidate_06_heatmap_red.svg"><span>06 heatmap_red</span></div>
  <div class="item"><img src="candidate_07_lightning_yellow.svg"><span>07 lightning_yellow</span></div>
  <div class="item"><img src="candidate_08_matrix_graph_cyan.svg"><span>08 matrix_graph_cyan</span></div>
  <div class="item"><img src="candidate_09_trophy_gold.svg"><span>09 trophy_gold</span></div>
  <div class="item"><img src="candidate_10_thermal_magenta.svg"><span>10 thermal_magenta</span></div>
</div>
</body>
</html>
