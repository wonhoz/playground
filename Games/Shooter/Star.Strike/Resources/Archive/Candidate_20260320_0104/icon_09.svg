<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Comet with long tail trajectory -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020510"/>
  <!-- Comet orbit path (elliptical arc, faint) -->
  <ellipse cx="512" cy="540" rx="380" ry="260" fill="none" stroke="#BF360C" stroke-width="4" stroke-dasharray="18,14" opacity="0.3"/>
  <!-- Tail (gradient from comet head toward upper-left) -->
  <!-- Wide outer glow tail -->
  <path d="M 680,340 Q 400,460 180,300" fill="none" stroke="#E65100" stroke-width="60" stroke-linecap="round" opacity="0.08"/>
  <path d="M 680,340 Q 420,440 200,310" fill="none" stroke="#E65100" stroke-width="40" stroke-linecap="round" opacity="0.12"/>
  <!-- Main tail -->
  <path d="M 680,340 Q 440,430 220,320" fill="none" stroke="#E65100" stroke-width="22" stroke-linecap="round" opacity="0.4"/>
  <path d="M 680,340 Q 450,420 240,330" fill="none" stroke="#FF6D00" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Bright inner core tail -->
  <path d="M 680,340 Q 460,410 260,340" fill="none" stroke="#FFAB00" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Secondary dust tail (slightly different angle) -->
  <path d="M 680,340 Q 430,500 200,440" fill="none" stroke="#E65100" stroke-width="16" stroke-linecap="round" opacity="0.2"/>
  <path d="M 680,340 Q 440,490 220,450" fill="none" stroke="#FF6D00" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <!-- Comet nucleus / head -->
  <circle cx="680" cy="340" r="70" fill="#E65100" opacity="0.3"/>
  <circle cx="680" cy="340" r="50" fill="#E65100" opacity="0.6"/>
  <circle cx="680" cy="340" r="34" fill="#FF6D00"/>
  <circle cx="680" cy="340" r="20" fill="#FFAB00"/>
  <circle cx="680" cy="340" r="10" fill="#FFD740"/>
  <!-- Coma glow around nucleus -->
  <circle cx="680" cy="340" r="90" fill="none" stroke="#E65100" stroke-width="8" opacity="0.2"/>
  <!-- Stars in background -->
  <circle cx="300" cy="700" r="4" fill="#E65100" opacity="0.3"/>
  <circle cx="800" cy="650" r="3" fill="#FF6D00" opacity="0.25"/>
  <circle cx="180" cy="500" r="3" fill="#E65100" opacity="0.2"/>
  <circle cx="850" cy="200" r="4" fill="#FF6D00" opacity="0.3"/>
</svg>
