<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0020"/>
      <stop offset="100%" stop-color="#2d0035"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <linearGradient id="medalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ribbon top bands -->
  <rect x="220" y="90" width="36" height="130" rx="0" fill="url(#ribbonGrad)" transform="rotate(-8,238,155)"/>
  <rect x="256" y="90" width="36" height="130" rx="0" fill="#7b1fa2" transform="rotate(8,274,155)"/>
  <!-- V-cut at bottom of ribbons -->
  <polygon points="220,220 238,245 256,220" fill="url(#ribbonGrad)" transform="rotate(-8,238,232)"/>
  <polygon points="256,220 274,245 292,220" fill="#7b1fa2" transform="rotate(8,274,232)"/>
  <!-- Medal circle -->
  <circle cx="256" cy="320" r="85" fill="url(#medalGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="320" r="72" fill="none" stroke="#f9a825" stroke-width="4" opacity="0.5"/>
  <!-- Stars on medal -->
  <polygon points="256,270 263,292 286,292 268,305 275,328 256,315 237,328 244,305 226,292 249,292" fill="white" opacity="0.8"/>
  <!-- Badge label on medal -->
  <rect x="202" y="340" width="108" height="20" rx="6" fill="#7b1fa2" opacity="0.8"/>
  <rect x="210" y="346" width="92" height="8" rx="3" fill="#ce93d8" opacity="0.8"/>
</svg>