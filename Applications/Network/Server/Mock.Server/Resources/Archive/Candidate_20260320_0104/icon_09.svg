<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09: 인형 조종 (marionette: controlled response) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050510"/>
  <!-- 조종 막대 (상단) -->
  <rect x="280" y="200" width="464" height="24" rx="12" fill="#283593"/>
  <rect x="460" y="160" width="104" height="64" rx="12" fill="#283593"/>
  <!-- 조종 줄들 -->
  <line x1="320" y1="224" x2="360" y2="440" stroke="#5C6BC0" stroke-width="5" stroke-dasharray="10,6" opacity="0.7"/>
  <line x1="512" y1="224" x2="512" y2="400" stroke="#5C6BC0" stroke-width="5" stroke-dasharray="10,6" opacity="0.7"/>
  <line x1="704" y1="224" x2="664" y2="440" stroke="#5C6BC0" stroke-width="5" stroke-dasharray="10,6" opacity="0.7"/>
  <line x1="380" y1="224" x2="430" y2="560" stroke="#5C6BC0" stroke-width="5" stroke-dasharray="10,6" opacity="0.5"/>
  <line x1="644" y1="224" x2="594" y2="560" stroke="#5C6BC0" stroke-width="5" stroke-dasharray="10,6" opacity="0.5"/>
  <!-- 인형 머리 -->
  <circle cx="512" cy="440" r="70" fill="#283593"/>
  <!-- 인형 눈 -->
  <circle cx="480" cy="428" r="14" fill="#5C6BC0"/>
  <circle cx="544" cy="428" r="14" fill="#5C6BC0"/>
  <!-- 인형 입 (미소) -->
  <path d="M480 468 Q512 492 544 468" fill="none" stroke="#5C6BC0" stroke-width="8" stroke-linecap="round"/>
  <!-- 인형 몸통 -->
  <line x1="512" y1="510" x2="512" y2="640" stroke="#283593" stroke-width="24" stroke-linecap="round"/>
  <!-- 팔 -->
  <line x1="360" y1="560" x2="512" y2="540" stroke="#283593" stroke-width="20" stroke-linecap="round"/>
  <line x1="664" y1="560" x2="512" y2="540" stroke="#283593" stroke-width="20" stroke-linecap="round"/>
  <!-- 다리 -->
  <line x1="512" y1="640" x2="430" y2="760" stroke="#283593" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="640" x2="594" y2="760" stroke="#283593" stroke-width="18" stroke-linecap="round"/>
</svg>
