<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001219"/>
      <stop offset="100%" stop-color="#005F73"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gesture ripple waves (mouse flick effect) -->
  <circle cx="256" cy="230" r="40" fill="none" stroke="#94D2BD" stroke-width="5" opacity="0.9"/>
  <circle cx="256" cy="230" r="70" fill="none" stroke="#94D2BD" stroke-width="4" opacity="0.7"/>
  <circle cx="256" cy="230" r="100" fill="none" stroke="#94D2BD" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="230" r="130" fill="none" stroke="#94D2BD" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="230" r="160" fill="none" stroke="#94D2BD" stroke-width="1" opacity="0.15"/>
  <!-- Flick arrow through center -->
  <path d="M 100 340 Q 200 180 380 150" fill="none" stroke="#0A9396" stroke-width="8" stroke-linecap="round"/>
  <polygon points="378,130 400,152 374,165" fill="#0A9396"/>
  <!-- Mouse cursor at origin point -->
  <path d="M 100 340 L 116 310 L 120 328 L 134 318 L 116 350 L 108 336 Z" fill="#E9D8A6"/>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#94D2BD">MOUSE.FLICK</text>
</svg>