<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0015"/>
    </linearGradient>
    <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#8B5CF6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="portalGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 포털 A (왼쪽) -->
  <ellipse cx="145" cy="256" rx="75" ry="110" fill="url(#portalGrad)" filter="url(#portalGlow)"/>
  <ellipse cx="145" cy="256" rx="75" ry="110" fill="none" stroke="#A78BFA" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="145" cy="256" rx="60" ry="88" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.6"/>
  <ellipse cx="145" cy="256" rx="40" ry="60" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <!-- 포털 A 내부 -->
  <ellipse cx="145" cy="256" rx="25" ry="38" fill="#8B5CF6" opacity="0.4" filter="url(#glow)"/>
  <!-- 포털 B (오른쪽) -->
  <ellipse cx="367" cy="256" rx="75" ry="110" fill="url(#portalGrad)" filter="url(#portalGlow)"/>
  <ellipse cx="367" cy="256" rx="75" ry="110" fill="none" stroke="#8B5CF6" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="367" cy="256" rx="60" ry="88" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <ellipse cx="367" cy="256" rx="40" ry="60" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="367" cy="256" rx="25" ry="38" fill="#7C3AED" opacity="0.35" filter="url(#glow)"/>
  <!-- 연결 화살표 (포털 간) -->
  <path d="M 200,256 Q 256,230 312,256" fill="none" stroke="#C4B5FD" stroke-width="3" opacity="0.7" stroke-dasharray="8,5" filter="url(#glow)"/>
  <path d="M 200,256 Q 256,282 312,256" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.5" stroke-dasharray="8,5"/>
  <polygon points="308,248 318,256 308,264" fill="#C4B5FD" opacity="0.8" filter="url(#glow)"/>
  <!-- 바로가기 화살표 심볼 -->
  <path d="M 228,230 L 265,230 L 265,215 L 285,240 L 265,265 L 265,250 L 228,250 Z" fill="#8B5CF6" opacity="0.85" filter="url(#glow)"/>
  <!-- 라벨 -->
  <text x="145" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#A78BFA" opacity="0.7">ORIGIN</text>
  <text x="367" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4B5FD" opacity="0.7">TARGET</text>
  <!-- 파티클 -->
  <circle cx="220" cy="220" r="4" fill="#C4B5FD" opacity="0.6" filter="url(#glow)"/>
  <circle cx="295" cy="290" r="3" fill="#A78BFA" opacity="0.55"/>
  <circle cx="240" cy="285" r="3.5" fill="#8B5CF6" opacity="0.6"/>
</svg>