<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="17%" stop-color="#FF8800"/>
      <stop offset="33%" stop-color="#FFFF00"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="67%" stop-color="#0088FF"/>
      <stop offset="83%" stop-color="#8800FF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Photo frame -->
  <rect x="100" y="130" width="312" height="220" rx="12" fill="#111"/>
  <!-- Gradient/LUT bands on photo -->
  <rect x="100" y="130" width="312" height="55" rx="0" fill="#220000" opacity="0.9"/>
  <rect x="100" y="185" width="312" height="55" rx="0" fill="#001100" opacity="0.9"/>
  <rect x="100" y="240" width="312" height="55" rx="0" fill="#000022" opacity="0.9"/>
  <rect x="100" y="295" width="312" height="55" rx="0" fill="#221100" opacity="0.9"/>
  <rect x="100" y="130" width="312" height="220" rx="12" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Spectrum bar -->
  <rect x="100" y="370" width="312" height="24" rx="12" fill="url(#spectrum)"/>
  <!-- Color grade curve -->
  <path d="M110 340 Q160 310 210 325 Q260 340 310 300 Q360 260 400 270" fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tone indicators -->
  <circle cx="160" cy="315" r="6" fill="#FF6666"/>
  <circle cx="256" cy="332" r="6" fill="#66FF66"/>
  <circle cx="355" cy="300" r="6" fill="#6666FF"/>
</svg>
