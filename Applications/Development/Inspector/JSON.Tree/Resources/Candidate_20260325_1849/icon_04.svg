<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#F8FAFC"/>

  <!-- 상단 타이틀 바 -->
  <rect x="140" y="110" width="744" height="54" rx="10" fill="#E2E8F0"/>
  <text x="512" y="147" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="32" fill="#64748B">Diff 비교 — A vs B</text>

  <!-- Layer 2: 두 패널 -->
  <!-- A 패널 (좌측: 삭제/변경) -->
  <rect x="140" y="180" width="350" height="680" rx="14" fill="#FFF0F0" stroke="#FCA5A5" stroke-width="3"/>
  <!-- A 패널 헤더 -->
  <rect x="140" y="180" width="350" height="52" rx="14" fill="#FCA5A5"/>
  <text x="315" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="36" font-weight="bold" fill="white">A (이전)</text>

  <!-- A 패널 라인들 -->
  <rect x="160" y="254" width="280" height="36" rx="8" fill="#FEE2E2"/>
  <text x="178" y="279" font-family="Consolas, monospace" font-size="30" fill="#EF4444">- "name": "Alice"</text>

  <rect x="160" y="302" width="280" height="36" rx="8" fill="rgba(0,0,0,0)"/>
  <text x="178" y="327" font-family="Consolas, monospace" font-size="30" fill="#6B7280">  "age": 30</text>

  <rect x="160" y="350" width="280" height="36" rx="8" fill="#FEE2E2"/>
  <text x="178" y="375" font-family="Consolas, monospace" font-size="30" fill="#EF4444">- "city": "Seoul"</text>

  <rect x="160" y="398" width="280" height="36" rx="8" fill="rgba(0,0,0,0)"/>
  <text x="178" y="423" font-family="Consolas, monospace" font-size="30" fill="#6B7280">  "ok": true</text>

  <rect x="160" y="446" width="280" height="36" rx="8" fill="#FEE2E2"/>
  <text x="178" y="471" font-family="Consolas, monospace" font-size="30" fill="#EF4444">- "score": 85</text>

  <!-- A 통계 -->
  <rect x="160" y="780" width="280" height="52" rx="10" fill="#FCA5A5"/>
  <text x="300" y="814" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="34" font-weight="bold" fill="white">−3 삭제</text>

  <!-- B 패널 (우측: 추가/변경) -->
  <rect x="534" y="180" width="350" height="680" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="3"/>
  <!-- B 패널 헤더 -->
  <rect x="534" y="180" width="350" height="52" rx="14" fill="#86EFAC"/>
  <text x="709" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="36" font-weight="bold" fill="#14532D">B (현재)</text>

  <!-- B 패널 라인들 -->
  <rect x="554" y="254" width="280" height="36" rx="8" fill="#DCFCE7"/>
  <text x="572" y="279" font-family="Consolas, monospace" font-size="30" fill="#16A34A">+ "name": "Bob"</text>

  <rect x="554" y="302" width="280" height="36" rx="8" fill="rgba(0,0,0,0)"/>
  <text x="572" y="327" font-family="Consolas, monospace" font-size="30" fill="#6B7280">  "age": 30</text>

  <rect x="554" y="350" width="280" height="36" rx="8" fill="#DCFCE7"/>
  <text x="572" y="375" font-family="Consolas, monospace" font-size="30" fill="#16A34A">+ "city": "Busan"</text>

  <rect x="554" y="398" width="280" height="36" rx="8" fill="rgba(0,0,0,0)"/>
  <text x="572" y="423" font-family="Consolas, monospace" font-size="30" fill="#6B7280">  "ok": true</text>

  <rect x="554" y="446" width="280" height="36" rx="8" fill="#DCFCE7"/>
  <text x="572" y="471" font-family="Consolas, monospace" font-size="30" fill="#16A34A">+ "level": "A"</text>

  <!-- B 통계 -->
  <rect x="554" y="780" width="280" height="52" rx="10" fill="#86EFAC"/>
  <text x="694" y="814" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="34" font-weight="bold" fill="#14532D">+3 추가</text>

  <!-- Layer 3: 중간 구분 화살표 -->
  <text x="512" y="560" text-anchor="middle" font-family="Segoe UI" font-size="60" fill="#94A3B8">⟷</text>
</svg>
