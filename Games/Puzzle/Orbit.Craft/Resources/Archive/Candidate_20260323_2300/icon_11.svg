    <!-- 행성 A (302, 302) -->
    <circle cx="302" cy="302" r="45" fill="url(#planet11a)"/>
    <!-- 행성 B (582, 442) -->
    <circle cx="582" cy="442" r="40" fill="url(#planet11b)"/>
