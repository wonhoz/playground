<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1505"/>
      <stop offset="100%" stop-color="#152010"/>
    </linearGradient>
    <linearGradient id="pcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#0d1f10"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4030"/>
      <stop offset="100%" stop-color="#1a2a20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- RAM stick body (PCB) -->
  <rect x="90" y="190" width="332" height="130" rx="6" fill="url(#pcb)" stroke="#2a4020" stroke-width="3"/>
  <!-- Gold edge connector -->
  <rect x="90" y="290" width="332" height="30" rx="3" fill="#c8a020"/>
  <!-- Connector fingers -->
  <rect x="105" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="130" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="155" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="180" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="205" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="230" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="255" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="280" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="305" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="330" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="355" y="293" width="16" height="24" rx="2" fill="#f0c030"/>
  <rect x="380" y="293" width="20" height="24" rx="2" fill="#f0c030"/>
  <!-- Memory chips on PCB -->
  <rect x="112" y="204" width="58" height="72" rx="4" fill="url(#chip)" stroke="#3a5030" stroke-width="2"/>
  <rect x="183" y="204" width="58" height="72" rx="4" fill="url(#chip)" stroke="#3a5030" stroke-width="2"/>
  <rect x="254" y="204" width="58" height="72" rx="4" fill="url(#chip)" stroke="#3a5030" stroke-width="2"/>
  <rect x="325" y="204" width="58" height="72" rx="4" fill="url(#chip)" stroke="#3a5030" stroke-width="2"/>
  <!-- Chip dot markers -->
  <circle cx="117" cy="209" r="4" fill="#f0c030"/>
  <circle cx="188" cy="209" r="4" fill="#f0c030"/>
  <circle cx="259" cy="209" r="4" fill="#f0c030"/>
  <circle cx="330" cy="209" r="4" fill="#f0c030"/>
  <!-- Chip labels -->
  <text x="141" y="244" font-size="12" fill="#44ff88" font-family="monospace" text-anchor="middle">DDR5</text>
  <text x="212" y="244" font-size="12" fill="#44ff88" font-family="monospace" text-anchor="middle">DDR5</text>
  <text x="283" y="244" font-size="12" fill="#44ff88" font-family="monospace" text-anchor="middle">DDR5</text>
  <text x="354" y="244" font-size="12" fill="#44ff88" font-family="monospace" text-anchor="middle">DDR5</text>
  <!-- PCB traces (green lines) -->
  <line x1="90" y1="240" x2="422" y2="240" stroke="#2a5020" stroke-width="1"/>
  <line x1="90" y1="254" x2="422" y2="254" stroke="#2a5020" stroke-width="1"/>
  <!-- Usage bar above -->
  <rect x="90" y="140" width="332" height="36" rx="8" fill="#0d1a10" stroke="#2a4020" stroke-width="2"/>
  <rect x="94" y="144" width="220" height="28" rx="6" fill="#44ff88" opacity="0.9"/>
  <text x="256" y="162" font-size="16" fill="#ffffff" font-family="monospace" text-anchor="middle" font-weight="bold">RAM: 14.1GB / 32GB (66%)</text>
  <!-- Label -->
  <text x="256" y="110" font-size="22" fill="#44ff88" font-family="monospace" text-anchor="middle">MEMORY</text>
  <!-- Slots remaining indicator -->
  <text x="256" y="380" font-size="18" fill="#888" font-family="monospace" text-anchor="middle">4 slots  |  2 used  |  5600MHz</text>
  <!-- Visual indicator bars -->
  <rect x="90" y="400" width="80" height="60" rx="8" fill="#1a3020" stroke="#44ff88" stroke-width="2"/>
  <text x="130" y="425" font-size="11" fill="#44ff88" font-family="monospace" text-anchor="middle">SLOT 1</text>
  <text x="130" y="444" font-size="11" fill="#44ff88" font-family="monospace" text-anchor="middle">16GB</text>
  <rect x="186" y="400" width="80" height="60" rx="8" fill="#1a3020" stroke="#44ff88" stroke-width="2"/>
  <text x="226" y="425" font-size="11" fill="#44ff88" font-family="monospace" text-anchor="middle">SLOT 2</text>
  <text x="226" y="444" font-size="11" fill="#44ff88" font-family="monospace" text-anchor="middle">16GB</text>
  <rect x="282" y="400" width="80" height="60" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="322" y="425" font-size="11" fill="#555" font-family="monospace" text-anchor="middle">SLOT 3</text>
  <text x="322" y="444" font-size="11" fill="#555" font-family="monospace" text-anchor="middle">EMPTY</text>
  <rect x="378" y="400" width="80" height="60" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="418" y="425" font-size="11" fill="#555" font-family="monospace" text-anchor="middle">SLOT 4</text>
  <text x="418" y="444" font-size="11" fill="#555" font-family="monospace" text-anchor="middle">EMPTY</text>
</svg>