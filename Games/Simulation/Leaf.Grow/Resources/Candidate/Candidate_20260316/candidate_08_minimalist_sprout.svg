<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000018"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimal pot circle -->
  <circle cx="256" cy="390" r="68" fill="white" filter="url(#shadow)"/>
  <circle cx="256" cy="390" r="60" fill="#EFEBE9"/>
  <ellipse cx="256" cy="352" rx="40" ry="10" fill="#D7CCC8"/>
  <!-- Soil -->
  <ellipse cx="256" cy="352" rx="38" ry="8" fill="#795548"/>
  <!-- Minimal stem (single line) -->
  <line x1="256" y1="352" x2="256" y2="196" stroke="url(#stemGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Simple leaf left (teardrop shape) -->
  <path d="M256 280 Q206 260 190 220 Q220 230 256 275" fill="#8BC34A" filter="url(#shadow)"/>
  <path d="M256 280 Q206 260 190 220 Q220 230 256 275" fill="#7CB342" opacity="0.7"/>
  <!-- Simple leaf right -->
  <path d="M256 240 Q306 218 324 178 Q292 192 256 236" fill="#8BC34A" filter="url(#shadow)"/>
  <path d="M256 240 Q306 218 324 178 Q292 192 256 236" fill="#7CB342" opacity="0.7"/>
  <!-- Top bud (small circle) -->
  <circle cx="256" cy="188" r="20" fill="#AED581" filter="url(#shadow)"/>
  <circle cx="256" cy="188" r="12" fill="#C5E1A5"/>
  <!-- Vein lines -->
  <line x1="256" y1="280" x2="210" y2="240" stroke="#558B2F" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="240" x2="302" y2="196" stroke="#558B2F" stroke-width="1.5" opacity="0.4"/>
  <!-- Water drop decoration -->
  <path d="M340 300 Q344 290 340 280 Q336 290 340 300" fill="#29B6F6" opacity="0.6"/>
  <path d="M170 260 Q174 250 170 240 Q166 250 170 260" fill="#29B6F6" opacity="0.5"/>
  <!-- Simple label -->
  <text x="256" y="478" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#558B2F" font-weight="600" letter-spacing="1">Leaf.Grow</text>
</svg>
