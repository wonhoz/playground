<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0EB"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Telescope / scope -->
  <!-- Main tube -->
  <rect x="200" y="440" width="560" height="120" rx="40" fill="#DC2626" transform="rotate(-20,480,500)"/>
  <rect x="220" y="450" width="520" height="100" rx="34" fill="#EF4444" transform="rotate(-20,480,500)"/>
  <!-- Eyepiece -->
  <rect x="620" y="400" width="100" height="90" rx="20" fill="#B91C1C" transform="rotate(-20,670,445)"/>
  <!-- Lens cap -->
  <circle cx="244" cy="548" r="70" fill="#DC2626" transform="rotate(-20,244,548)"/>
  <circle cx="244" cy="548" r="52" fill="#FECACA" transform="rotate(-20,244,548)"/>
  <!-- Tripod -->
  <line x1="480" y1="580" x2="360" y2="830" stroke="#B91C1C" stroke-width="28" stroke-linecap="round"/>
  <line x1="480" y1="580" x2="600" y2="830" stroke="#B91C1C" stroke-width="28" stroke-linecap="round"/>
  <line x1="480" y1="580" x2="480" y2="830" stroke="#B91C1C" stroke-width="28" stroke-linecap="round"/>
  <!-- Windows crosshair in scope view -->
  <circle cx="244" cy="548" r="40" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="224" y1="548" x2="264" y2="548" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="244" y1="528" x2="244" y2="568" stroke="#FFFFFF" stroke-width="6"/>
  <!-- Label -->
  <text x="512" y="920" font-family="Arial,sans-serif" font-size="60" fill="#991B1B" font-weight="bold" text-anchor="middle">Win Scope</text>
</svg>
