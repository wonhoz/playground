<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000a05"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laser">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="laserBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="50%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Laser emitter -->
  <rect x="40" y="244" width="45" height="24" rx="6" fill="#333" stroke="#00ff00" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="42" cy="252" r="4" fill="#00ff00" filter="url(#glow)"/>
  <circle cx="42" cy="264" r="4" fill="#00ff00" filter="url(#glow)"/>
  <!-- Laser beam -->
  <line x1="85" y1="256" x2="472" y2="256" stroke="url(#laserBeam)" stroke-width="4" filter="url(#laser)"/>
  <line x1="85" y1="256" x2="472" y2="256" stroke="#ffffff" stroke-width="1" filter="url(#glow)"/>
  <!-- Object being sliced - circle split -->
  <path d="M256 180 Q310 180 340 200 Q370 220 370 256" stroke="#ff6600" stroke-width="3" fill="none" filter="url(#glow)" transform="translate(-10, -15)"/>
  <path d="M256 180 Q310 180 340 200 Q370 220 370 256" stroke="#ff6600" stroke-width="3" fill="none" filter="url(#glow)" transform="translate(10, 15)"/>
  <!-- Circular object top half -->
  <path d="M180 256 A76 76 0 0 1 332 256" stroke="#ff9900" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.8" transform="translate(0,-20)"/>
  <!-- Circular object bottom half -->
  <path d="M180 256 A76 76 0 0 0 332 256" stroke="#ff9900" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.8" transform="translate(0,20)"/>
  <!-- Slice particles at impact -->
  <circle cx="256" cy="256" r="3" fill="#ffffff" filter="url(#laser)"/>
  <circle cx="240" cy="245" r="2.5" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="272" cy="247" r="2" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="248" cy="268" r="2" fill="#ffaa00" filter="url(#glow)"/>
  <circle cx="264" cy="266" r="2.5" fill="#ffaa00" filter="url(#glow)"/>
  <line x1="232" y1="238" x2="220" y2="228" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <line x1="278" y1="240" x2="290" y2="230" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <line x1="240" y1="272" x2="228" y2="282" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <line x1="270" y1="274" x2="282" y2="284" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
</svg>