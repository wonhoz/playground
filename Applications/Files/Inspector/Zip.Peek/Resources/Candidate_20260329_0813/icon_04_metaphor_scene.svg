      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: App window scene showing ZIP file contents -->
