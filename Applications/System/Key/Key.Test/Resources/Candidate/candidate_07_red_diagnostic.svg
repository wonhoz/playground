<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0000"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Diagnostic circle -->
  <circle cx="256" cy="200" r="130" fill="none" stroke="#FF4444" stroke-width="3" stroke-dasharray="8 4" filter="url(#glow)" opacity="0.6"/>
  <circle cx="256" cy="200" r="100" fill="none" stroke="#FF4444" stroke-width="2" opacity="0.4"/>
  <!-- Crosshair -->
  <line x1="256" y1="80" x2="256" y2="130" stroke="#FF4444" stroke-width="2" filter="url(#glow)"/>
  <line x1="256" y1="270" x2="256" y2="320" stroke="#FF4444" stroke-width="2" filter="url(#glow)"/>
  <line x1="136" y1="200" x2="186" y2="200" stroke="#FF4444" stroke-width="2" filter="url(#glow)"/>
  <line x1="326" y1="200" x2="376" y2="200" stroke="#FF4444" stroke-width="2" filter="url(#glow)"/>
  <!-- Center key -->
  <rect x="210" y="154" width="92" height="92" rx="14" fill="url(#keyGrad)" filter="url(#glow)"/>
  <rect x="218" y="162" width="76" height="76" rx="10" fill="#AA0000" opacity="0.6"/>
  <text x="256" y="213" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="white">!</text>
  <!-- Status panel -->
  <rect x="80" y="360" width="352" height="100" rx="12" fill="#1A0000" stroke="#FF4444" stroke-width="1.5"/>
  <text x="100" y="390" font-family="'Courier New', monospace" font-size="14" fill="#FF6666">DIAGNOSTIC MODE</text>
  <rect x="100" y="400" width="120" height="8" rx="4" fill="#FF4444" filter="url(#glow)"/>
  <rect x="100" y="400" width="312" height="8" rx="4" fill="#330000"/>
  <text x="100" y="432" font-family="'Courier New', monospace" font-size="12" fill="#FF4444" opacity="0.8">KEYS TESTED: 47/104</text>
  <text x="290" y="432" font-family="'Courier New', monospace" font-size="12" fill="#FF8888" opacity="0.7">ERRORS: 0</text>
  <!-- Corner markers -->
  <rect x="80" y="80" width="20" height="3" fill="#FF4444" opacity="0.5"/>
  <rect x="80" y="80" width="3" height="20" fill="#FF4444" opacity="0.5"/>
  <rect x="412" y="80" width="20" height="3" fill="#FF4444" opacity="0.5"/>
  <rect x="429" y="80" width="3" height="20" fill="#FF4444" opacity="0.5"/>
</svg>
