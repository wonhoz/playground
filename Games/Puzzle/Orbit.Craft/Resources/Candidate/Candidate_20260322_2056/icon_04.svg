      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <radialGradient id="gStarB" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </radialGradient>
  </defs>
  <!-- 배경: 딥 다크 블루 -->
  <rect width="1024" height="1024" rx="190" fill="#061018"/>
  <!-- 별 A (왼쪽): 황금 -->
  <circle cx="296" cy="512" r="84" fill="url(#gStarA)"/>
  <!-- 별 B (오른쪽): 파랑 -->
  <circle cx="728" cy="512" r="84" fill="url(#gStarB)"/>
