<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 스위스 아미 나이프 — 텍스트 도구들이 펼쳐진 | 레이어드 | 빨강+실버+흰 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B71C1C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Knife body (red handle) -->
  <rect x="340" y="600" width="600" height="160" rx="50" fill="#C62828" filter="url(#sh4)"/>
  <!-- Handle rivets -->
  <circle cx="420" cy="680" r="18" fill="#B71C1C"/>
  <circle cx="490" cy="680" r="18" fill="#B71C1C"/>
  <!-- Logo cross -->
  <rect x="856" y="652" width="60" height="16" rx="8" fill="white" opacity="0.6"/>
  <rect x="878" y="630" width="16" height="60" rx="8" fill="white" opacity="0.6"/>

  <!-- Layer 3: Tool blades fanning out (with text labels) -->
  <!-- Blade 1: {} JSON (longest, top) -->
  <g filter="url(#sh4)">
    <rect x="150" y="300" width="560" height="68" rx="16" fill="url(#blade)"
          transform="rotate(-30, 340, 610)"/>
    <text transform="rotate(-30, 340, 610)" x="340" y="334"
          font-family="Arial Black, sans-serif" font-size="40" font-weight="900"
          fill="#1565C0" text-anchor="middle" dominant-baseline="middle">{JSON}</text>
  </g>

  <!-- Blade 2: Hash -->
  <g filter="url(#sh4)">
    <rect x="150" y="410" width="480" height="68" rx="16" fill="url(#blade)"
          transform="rotate(-15, 340, 610)"/>
    <text transform="rotate(-15, 340, 610)" x="340" y="444"
          font-family="Arial Black, sans-serif" font-size="40" font-weight="900"
          fill="#E53935" text-anchor="middle" dominant-baseline="middle">#Hash</text>
  </g>

  <!-- Blade 3: Regex -->
  <g filter="url(#sh4)">
    <rect x="150" y="520" width="400" height="68" rx="16" fill="url(#blade)"
          transform="rotate(-5, 340, 610)"/>
    <text transform="rotate(-5, 340, 610)" x="330" y="554"
          font-family="Arial Black, sans-serif" font-size="38" font-weight="900"
          fill="#7B1FA2" text-anchor="middle" dominant-baseline="middle">/regex/</text>
  </g>

  <!-- Blade 4: JWT -->
  <g filter="url(#sh4)">
    <rect x="150" y="618" width="360" height="68" rx="16" fill="url(#blade)"
          transform="rotate(8, 340, 610)"/>
    <text transform="rotate(8, 340, 610)" x="310" y="652"
          font-family="Arial Black, sans-serif" font-size="40" font-weight="900"
          fill="#00897B" text-anchor="middle" dominant-baseline="middle">JWT</text>
  </g>

  <!-- Blade 5: Base64 -->
  <g filter="url(#sh4)">
    <rect x="150" y="710" width="340" height="60" rx="16" fill="url(#blade)"
          transform="rotate(22, 340, 610)"/>
    <text transform="rotate(22, 340, 610)" x="290" y="740"
          font-family="Arial Black, sans-serif" font-size="34" font-weight="900"
          fill="#F57F17" text-anchor="middle" dominant-baseline="middle">Base64</text>
  </g>
</svg>
