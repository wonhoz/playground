<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060f0a"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#059669" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="pupil" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#030a05"/>
      <stop offset="100%" stop-color="#020704"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Eye ambient glow -->
  <ellipse cx="256" cy="256" rx="220" ry="130" fill="#10B981" fill-opacity="0.05" filter="url(#eyeglow)"/>

  <!-- Eye shape (eyelids) -->
  <path d="M60,256 Q150,130 256,126 Q362,130 452,256 Q362,382 256,386 Q150,382 60,256 Z"
    fill="#0a1f12" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.7" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="110" fill="url(#iris)"/>

  <!-- Iris texture (radial lines) -->
  <g stroke="#10B981" stroke-width="1" stroke-opacity="0.3">
    <line x1="256" y1="146" x2="256" y2="176"/>
    <line x1="256" y1="336" x2="256" y2="366"/>
    <line x1="146" y1="256" x2="176" y2="256"/>
    <line x1="336" y1="256" x2="366" y2="256"/>
    <line x1="178" y1="178" x2="200" y2="200"/>
    <line x1="334" y1="178" x2="312" y2="200"/>
    <line x1="178" y1="334" x2="200" y2="312"/>
    <line x1="334" y1="334" x2="312" y2="312"/>
    <!-- More radial fibers -->
    <line x1="212" y1="150" x2="222" y2="178"/>
    <line x1="300" y1="150" x2="290" y2="178"/>
    <line x1="163" y1="213" x2="189" y2="222"/>
    <line x1="163" y1="299" x2="189" y2="290"/>
    <line x1="349" y1="213" x2="323" y2="222"/>
    <line x1="349" y1="299" x2="323" y2="290"/>
    <line x1="212" y1="362" x2="222" y2="334"/>
    <line x1="300" y1="362" x2="290" y2="334"/>
  </g>

  <!-- Iris rings -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="85" fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="60" fill="url(#pupil)"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Hash symbol in pupil -->
  <line x1="242" y1="237" x2="242" y2="275" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="270" y1="237" x2="270" y2="275" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="232" y1="249" x2="280" y2="249" stroke="#34D399" stroke-width="3.5" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="232" y1="263" x2="280" y2="263" stroke="#34D399" stroke-width="3.5" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Hash highlight glow -->
  <line x1="242" y1="237" x2="242" y2="275" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="270" y1="237" x2="270" y2="275" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="232" y1="249" x2="280" y2="249" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="232" y1="263" x2="280" y2="263" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Eye highlight/catchlight -->
  <ellipse cx="220" cy="220" rx="18" ry="12" fill="white" fill-opacity="0.12" transform="rotate(-20 220 220)"/>
  <circle cx="228" cy="215" r="5" fill="white" fill-opacity="0.2"/>

  <!-- Eyelash marks (top) -->
  <g stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round">
    <line x1="180" y1="168" x2="190" y2="158"/>
    <line x1="210" y1="148" x2="216" y2="136"/>
    <line x1="245" y1="136" x2="248" y2="124"/>
    <line x1="278" y1="138" x2="282" y2="126"/>
    <line x1="308" y1="148" x2="316" y2="137"/>
    <line x1="332" y1="164" x2="343" y2="155"/>
  </g>

  <!-- Hash binary ring around eye -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="6,8"/>

  <!-- Scanning arc on outer iris -->
  <path d="M 156 256 A 100 100 0 0 1 336 216" fill="none" stroke="#34D399" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round" filter="url(#softglow)"/>
</svg>
