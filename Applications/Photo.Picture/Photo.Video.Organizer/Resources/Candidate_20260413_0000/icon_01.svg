<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal · 중앙심볼 · 사진 + 날짜 스탬프 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E1F5FE"/>
  <!-- 사진 프레임 -->
  <g transform="rotate(-6 512 520)">
    <rect x="200" y="260" width="624" height="520" rx="28" fill="#FFFFFF" stroke="#01579B" stroke-width="18"/>
    <!-- 사진 내부: 산/해 -->
    <rect x="230" y="290" width="564" height="420" fill="#81D4FA"/>
    <circle cx="720" cy="380" r="58" fill="#FFD93D" stroke="#F57F17" stroke-width="8"/>
    <path d="M 230 640 L 340 500 L 450 590 L 560 450 L 680 600 L 794 530 L 794 710 L 230 710 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="10"/>
    <!-- 하단 흰 여백 + 날짜 스탬프 -->
    <rect x="230" y="710" width="564" height="40" fill="#FFFFFF"/>
    <text x="512" y="770" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#01579B" text-anchor="middle">2026 · 04 · 13</text>
  </g>
  <!-- 날짜 배지 (코너) -->
  <g>
    <rect x="720" y="120" width="220" height="220" rx="30" fill="#FF6B35" stroke="#BF360C" stroke-width="16"/>
    <text x="830" y="210" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">APR</text>
    <text x="830" y="295" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">13</text>
  </g>
</svg>
