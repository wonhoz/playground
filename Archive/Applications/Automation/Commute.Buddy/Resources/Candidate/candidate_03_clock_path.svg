<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Route path dotted -->
  <path d="M100,380 Q150,260 256,200 Q362,140 410,130" stroke="#80CBC4" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="12,8"/>
  <!-- Start pin -->
  <circle cx="100" cy="380" r="18" fill="#FF5252"/>
  <circle cx="100" cy="380" r="10" fill="white"/>
  <!-- End pin -->
  <circle cx="410" cy="130" r="18" fill="#69F0AE"/>
  <circle cx="410" cy="130" r="10" fill="white"/>
  <!-- Waypoints -->
  <circle cx="200" cy="290" r="10" fill="#FFD740" stroke="white" stroke-width="2"/>
  <circle cx="320" cy="200" r="10" fill="#FFD740" stroke="white" stroke-width="2"/>
  <!-- Clock face -->
  <circle cx="256" cy="280" r="100" fill="url(#clockFace)" stroke="#37474F" stroke-width="7"/>
  <circle cx="256" cy="280" r="90" fill="none" stroke="#B0BEC5" stroke-width="2"/>
  <!-- Clock markers -->
  <line x1="256" y1="192" x2="256" y2="204" stroke="#37474F" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="356" x2="256" y2="368" stroke="#37474F" stroke-width="5" stroke-linecap="round"/>
  <line x1="158" y1="280" x2="170" y2="280" stroke="#37474F" stroke-width="5" stroke-linecap="round"/>
  <line x1="342" y1="280" x2="354" y2="280" stroke="#37474F" stroke-width="5" stroke-linecap="round"/>
  <!-- Hour hand (8 o'clock) -->
  <line x1="256" y1="280" x2="218" y2="248" stroke="#37474F" stroke-width="8" stroke-linecap="round"/>
  <!-- Minute hand (12 o'clock area) -->
  <line x1="256" y1="280" x2="256" y2="208" stroke="#FF5252" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="280" r="8" fill="#37474F"/>
  <!-- Labels -->
  <text x="256" y="190" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#B0BEC5">12</text>
  <text x="354" y="285" font-family="'Segoe UI', sans-serif" font-size="14" fill="#B0BEC5">3</text>
  <text x="249" y="373" font-family="'Segoe UI', sans-serif" font-size="14" fill="#B0BEC5">6</text>
  <text x="152" y="285" font-family="'Segoe UI', sans-serif" font-size="14" fill="#B0BEC5">9</text>
</svg>
