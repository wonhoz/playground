<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0005"/>
  <!-- Fragment scan — magnifier over mosaic tiles -->
  <!-- Background tiles -->
  <rect x="160" y="160" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="270" y="160" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="380" y="160" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="490" y="160" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="600" y="160" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="710" y="160" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="820" y="160" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>

  <rect x="160" y="270" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="270" y="270" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="380" y="270" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>

  <rect x="160" y="380" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="270" y="380" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>

  <rect x="160" y="490" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="160" y="600" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="160" y="710" width="100" height="100" rx="6" fill="#F48FB1" opacity="0.4"/>
  <rect x="160" y="820" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>

  <rect x="270" y="490" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>
  <rect x="380" y="380" width="100" height="100" rx="6" fill="#880E4F" opacity="0.5"/>

  <!-- Magnifier circle (large) -->
  <circle cx="580" cy="560" r="280" fill="none" stroke="#F48FB1" stroke-width="32"/>
  <!-- Scan glow inside -->
  <circle cx="580" cy="560" r="270" fill="#F48FB1" opacity="0.06"/>
  <!-- Tiles visible inside magnifier — brighter/enlarged -->
  <rect x="440" y="420" width="130" height="130" rx="10" fill="#880E4F" opacity="0.9"/>
  <rect x="580" y="420" width="130" height="130" rx="10" fill="#F48FB1" opacity="0.85"/>
  <rect x="440" y="560" width="130" height="130" rx="10" fill="#F48FB1" opacity="0.85"/>
  <rect x="580" y="560" width="130" height="130" rx="10" fill="#880E4F" opacity="0.9"/>
  <!-- Magnifier handle -->
  <line x1="810" y1="790" x2="900" y2="880" stroke="#F48FB1" stroke-width="44" stroke-linecap="round"/>
</svg>
