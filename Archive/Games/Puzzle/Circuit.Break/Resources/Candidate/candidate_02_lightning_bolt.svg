<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a0a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <filter id="electric">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="electric2">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow backdrop -->
  <polygon points="310,60 230,260 280,260 200,450 340,230 285,230 360,60" fill="#ffcc00" filter="url(#electric2)" opacity="0.3"/>
  <!-- Main lightning bolt -->
  <polygon points="310,60 230,260 280,260 200,450 340,230 285,230 360,60" fill="url(#bolt)" filter="url(#electric)"/>
  <!-- Circuit dots at connection points -->
  <circle cx="310" cy="60" r="16" fill="#ffff00" filter="url(#electric)"/>
  <circle cx="200" cy="450" r="16" fill="#ff8800" filter="url(#electric)"/>
  <!-- Horizontal circuit lines -->
  <line x1="60" y1="170" x2="200" y2="170" stroke="#ffcc00" stroke-width="4" opacity="0.5"/>
  <line x1="60" y1="340" x2="150" y2="340" stroke="#ffcc00" stroke-width="4" opacity="0.5"/>
  <line x1="312" y1="170" x2="450" y2="170" stroke="#ffcc00" stroke-width="4" opacity="0.5"/>
  <line x1="360" y1="340" x2="450" y2="340" stroke="#ffcc00" stroke-width="4" opacity="0.5"/>
  <!-- Small circuit dots -->
  <circle cx="200" cy="170" r="8" fill="#ffcc00" opacity="0.7"/>
  <circle cx="450" cy="170" r="8" fill="#ffcc00" opacity="0.7"/>
  <circle cx="150" cy="340" r="8" fill="#ffcc00" opacity="0.7"/>
  <circle cx="360" cy="340" r="8" fill="#ffcc00" opacity="0.7"/>
  <!-- Break crack lines -->
  <line x1="190" y1="270" x2="230" y2="250" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="280" x2="225" y2="260" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
</svg>