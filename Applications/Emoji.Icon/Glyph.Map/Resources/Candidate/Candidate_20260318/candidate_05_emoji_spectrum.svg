<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스펙트럼 호 -->
  <path d="M 100 300 A 156 156 0 0 1 412 300" fill="none" stroke="#FBBF24" stroke-width="3" filter="url(#glow)"/>
  <path d="M 125 310 A 131 131 0 0 1 387 310" fill="none" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>
  <!-- 스펙트럼 이모지들 -->
  <text x="105" y="285" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">😢</text>
  <text x="165" y="220" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">😐</text>
  <text x="256" y="190" text-anchor="middle" font-size="32" font-family="Segoe UI Emoji">😊</text>
  <text x="347" y="220" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">😄</text>
  <text x="407" y="285" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">🤩</text>
  <!-- 레이블 -->
  <text x="256" y="400" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">EMOJI SPECTRUM</text>
</svg>
