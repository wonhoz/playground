<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A86FF"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Left card: PNG -->
  <rect x="60" y="200" width="330" height="380" rx="28" fill="url(#card1)" stroke="#1565C0" stroke-width="16"/>
  <!-- PNG image icon inside card -->
  <rect x="100" y="240" width="250" height="200" rx="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="12"/>
  <!-- Mountain/image symbol -->
  <polygon points="130,410 210,310 255,370 290,330 350,410" fill="#3A86FF" stroke="#1565C0" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="310" cy="295" r="28" fill="#FFD93D" stroke="#1565C0" stroke-width="8"/>
  <!-- PNG badge -->
  <rect x="90" y="465" width="250" height="80" rx="28" fill="#3A86FF" stroke="#1565C0" stroke-width="14"/>
  <text x="215" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">PNG</text>

  <!-- Arrow -->
  <rect x="415" y="465" width="130" height="50" rx="18" fill="url(#arrow1)" stroke="#1A5CC9" stroke-width="12"/>
  <polygon points="545,432 630,490 545,548" fill="#1565C0" stroke="#1A5CC9" stroke-width="12" stroke-linejoin="round"/>

  <!-- Right card: ICO -->
  <rect x="634" y="200" width="330" height="380" rx="28" fill="url(#card1)" stroke="#1565C0" stroke-width="16"/>
  <!-- ICO multi-size grid -->
  <rect x="674" y="240" width="250" height="200" rx="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="12"/>
  <rect x="690" y="256" width="50" height="50" rx="8" fill="#3A86FF" stroke="#1565C0" stroke-width="6"/>
  <rect x="752" y="256" width="70" height="70" rx="8" fill="#3A86FF" stroke="#1565C0" stroke-width="6"/>
  <rect x="834" y="256" width="72" height="72" rx="8" fill="#3A86FF" stroke="#1565C0" stroke-width="6"/>
  <rect x="690" y="322" width="100" height="100" rx="8" fill="#1565C0" stroke="#1A5CC9" stroke-width="6"/>
  <rect x="806" y="340" width="82" height="82" rx="8" fill="#1565C0" stroke="#1A5CC9" stroke-width="6"/>
  <!-- ICO badge -->
  <rect x="650" y="465" width="250" height="80" rx="28" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="775" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">ICO</text>

  <!-- Title badge -->
  <rect x="262" y="660" width="500" height="100" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="727" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>

  <!-- Subtitle -->
  <rect x="312" y="790" width="400" height="70" rx="28" fill="#3A86FF" stroke="#1565C0" stroke-width="12"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">CONVERT</text>
</svg>
