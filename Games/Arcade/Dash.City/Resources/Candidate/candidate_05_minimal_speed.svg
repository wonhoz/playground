<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large D letter -->
  <text x="60" y="340" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" fill="#e94560" opacity="0.15">D</text>
  <!-- Speed lines horizontal -->
  <rect x="60" y="180" width="200" height="8" rx="4" fill="#e94560" opacity="0.9"/>
  <rect x="60" y="204" width="160" height="6" rx="3" fill="#e94560" opacity="0.6"/>
  <rect x="60" y="224" width="120" height="5" rx="2.5" fill="#e94560" opacity="0.4"/>
  <rect x="60" y="242" width="80" height="4" rx="2" fill="#e94560" opacity="0.25"/>
  <!-- Runner icon (bold, minimal) -->
  <circle cx="340" cy="200" r="32" fill="#e94560"/>
  <!-- Body -->
  <rect x="316" y="232" width="48" height="56" rx="12" fill="#e94560"/>
  <!-- Legs running -->
  <line x1="328" y1="280" x2="304" y2="320" stroke="#e94560" stroke-width="18" stroke-linecap="round"/>
  <line x1="356" y1="280" x2="376" y2="318" stroke="#e94560" stroke-width="18" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="316" y1="250" x2="292" y2="272" stroke="#e94560" stroke-width="14" stroke-linecap="round"/>
  <line x1="364" y1="250" x2="384" y2="270" stroke="#e94560" stroke-width="14" stroke-linecap="round"/>
  <!-- City line (skyline) -->
  <polyline points="60,150 100,150 100,120 140,120 140,100 180,100 180,130 220,130 220,90 260,90 260,130 300,130 300,110 340,110 340,150 380,150 380,120 420,120 420,150 460,150" fill="none" stroke="#0f3460" stroke-width="6"/>
  <!-- Ground line -->
  <line x1="60" y1="370" x2="452" y2="370" stroke="#e94560" stroke-width="4" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="440" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">DASH</text>
  <text x="256" y="488" font-family="Arial Black, sans-serif" font-size="34" font-weight="700" fill="#e94560" text-anchor="middle" letter-spacing="10">CITY</text>
</svg>
