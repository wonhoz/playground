<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE4D8"/>
      <stop offset="100%" stop-color="#FFD0C0"/>
    </linearGradient>
    <linearGradient id="pinkTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8A8C0"/>
      <stop offset="100%" stop-color="#EC7098"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Soft peach background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: 4x4 Tiles — pink territory almost complete, 3 tiles remain -->
  <!-- Row 0: all pink -->
  <rect x="152" y="152" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="337" y="152" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="522" y="152" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="707" y="152" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <!-- Row 1: 3 pink + 1 salmon -->
  <rect x="152" y="337" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="337" y="337" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="522" y="337" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="707" y="337" width="165" height="165" rx="18" fill="#F4956A"/>
  <!-- Row 2: 2 pink + salmon + blue -->
  <rect x="152" y="522" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="337" y="522" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="522" y="522" width="165" height="165" rx="18" fill="#F4956A"/>
  <rect x="707" y="522" width="165" height="165" rx="18" fill="#64BCE0"/>
  <!-- Row 3: 1 pink + salmon + blue + green -->
  <rect x="152" y="707" width="165" height="165" rx="18" fill="url(#pinkTile)"/>
  <rect x="337" y="707" width="165" height="165" rx="18" fill="#F4956A"/>
  <rect x="522" y="707" width="165" height="165" rx="18" fill="#64BCE0"/>
  <rect x="707" y="707" width="165" height="165" rx="18" fill="#7CCA7C"/>

  <!-- Layer 3: Progress bar hint at bottom -->
  <rect x="152" y="908" width="720" height="20" rx="10" fill="#00000018"/>
  <rect x="152" y="908" width="576" height="20" rx="10" fill="#EC7098" opacity="0.7"/>
</svg>
