  <rect x="720" y="380" width="160" height="160" rx="8" fill="#00695C" opacity="0.5"/>
  <path d="M880 380 L800 310 L640 310 L720 380 Z" fill="#4DB6AC" opacity="0.25"/>
  <path d="M720 380 L640 310 L640 470 L720 540 Z" fill="#00695C" opacity="0.3"/>
