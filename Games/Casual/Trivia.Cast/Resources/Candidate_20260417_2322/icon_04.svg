<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="glow04" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFEE58" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- 글로우 -->
  <ellipse cx="512" cy="420" rx="300" ry="260" fill="url(#glow04)"/>
  <!-- Layer 2: 전구 몸통 -->
  <ellipse cx="512" cy="400" rx="180" ry="190" fill="#FDD835"/>
  <!-- 전구 베이스 -->
  <rect x="432" y="570" width="160" height="40" rx="8" fill="#E65100"/>
  <rect x="452" y="610" width="120" height="40" rx="8" fill="#E65100"/>
  <rect x="472" y="650" width="80" height="36" rx="8" fill="#E65100"/>
  <!-- 전구 내부 필라멘트 -->
  <path d="M 460 460 Q 490 420 520 460 Q 550 420 580 460" fill="none" stroke="#FF8F00" stroke-width="14" stroke-linecap="round"/>
  <!-- Layer 3: 물음표 (전구 안) -->
  <text x="512" y="460" font-family="Arial Black, Arial, sans-serif" font-size="200" font-weight="900" fill="#E65100" text-anchor="middle" opacity="0.85">?</text>
  <!-- 빛 줄기들 -->
  <line x1="512" y1="170" x2="512" y2="120" stroke="#FDD835" stroke-width="18" stroke-linecap="round"/>
  <line x1="640" y1="220" x2="676" y2="184" stroke="#FDD835" stroke-width="14" stroke-linecap="round"/>
  <line x1="384" y1="220" x2="348" y2="184" stroke="#FDD835" stroke-width="14" stroke-linecap="round"/>
  <line x1="700" y1="350" x2="752" y2="330" stroke="#FDD835" stroke-width="14" stroke-linecap="round"/>
  <line x1="324" y1="350" x2="272" y2="330" stroke="#FDD835" stroke-width="14" stroke-linecap="round"/>
  <!-- 점수 배지 -->
  <rect x="340" y="760" width="344" height="76" rx="20" fill="#E65100"/>
  <text x="512" y="813" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#FDD835" text-anchor="middle">+50 pts!</text>
</svg>
