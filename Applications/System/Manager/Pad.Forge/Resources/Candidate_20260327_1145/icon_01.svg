<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F0"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Gamepad body -->
  <ellipse cx="512" cy="500" rx="340" ry="240" fill="#DC2626"/>
  <ellipse cx="512" cy="500" rx="310" ry="214" fill="#EF4444"/>
  <!-- Left grip -->
  <ellipse cx="220" cy="580" rx="120" ry="160" fill="#DC2626"/>
  <!-- Right grip -->
  <ellipse cx="804" cy="580" rx="120" ry="160" fill="#DC2626"/>
  <!-- D-pad (left) -->
  <rect x="270" y="460" width="120" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="310" y="420" width="40" height="120" rx="6" fill="#FFFFFF"/>
  <!-- Buttons (right) - ABXY -->
  <circle cx="680" cy="440" r="28" fill="#22C55E"/>
  <text x="680" y="452" font-family="Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="bold" text-anchor="middle">A</text>
  <circle cx="730" cy="490" r="28" fill="#EF4444"/>
  <text x="730" y="502" font-family="Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="630" cy="490" r="28" fill="#3B82F6"/>
  <text x="630" y="502" font-family="Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="bold" text-anchor="middle">X</text>
  <circle cx="680" cy="540" r="28" fill="#F59E0B"/>
  <text x="680" y="552" font-family="Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Y</text>
  <!-- Center buttons -->
  <rect x="452" y="475" width="50" height="30" rx="12" fill="#FFFFFF" opacity="0.6"/>
  <rect x="522" y="475" width="50" height="30" rx="12" fill="#FFFFFF" opacity="0.6"/>
  <!-- Remap arrows -->
  <text x="512" y="830" font-family="Arial,sans-serif" font-size="60" fill="#991B1B" font-weight="bold" text-anchor="middle">Pad Forge</text>
</svg>
