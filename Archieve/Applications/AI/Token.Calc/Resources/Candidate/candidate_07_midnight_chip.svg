  <text x="256" y="272" text-anchor="middle" font-size="14" fill="#7C4DFF" font-family="monospace" opacity="0.8">CALC</text>
  <!-- Chip legs/pins -->
  <rect x="112" y="176" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.8"/>
  <rect x="112" y="196" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="112" y="216" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="112" y="236" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="112" y="296" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="112" y="316" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="360" y="176" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.8"/>
  <rect x="360" y="196" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="360" y="216" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="360" y="236" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="360" y="296" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="360" y="316" width="40" height="8" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="176" y="112" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="216" y="112" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
