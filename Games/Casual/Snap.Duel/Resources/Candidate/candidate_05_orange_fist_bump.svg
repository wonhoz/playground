<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#2a1800"/>
    </linearGradient>
    <radialGradient id="impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#impact)"/>
  <!-- Left fist (coming from left) -->
  <!-- Arm -->
  <rect x="60" y="230" width="130" height="52" rx="20" fill="#e65100"/>
  <!-- Fist -->
  <rect x="166" y="212" width="72" height="72" rx="16" fill="#ff6d00"/>
  <rect x="166" y="212" width="72" height="20" rx="8" fill="#ff8f00" opacity="0.7"/>
  <!-- Knuckle lines -->
  <line x1="182" y1="220" x2="182" y2="235" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="218" x2="200" y2="233" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="218" y1="220" x2="218" y2="235" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <!-- Right fist (coming from right) -->
  <rect x="322" y="230" width="130" height="52" rx="20" fill="#e65100"/>
  <rect x="274" y="212" width="72" height="72" rx="16" fill="#ff6d00"/>
  <rect x="274" y="212" width="72" height="20" rx="8" fill="#ff8f00" opacity="0.7"/>
  <line x1="290" y1="220" x2="290" y2="235" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="218" x2="308" y2="233" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="326" y1="220" x2="326" y2="235" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <!-- Impact burst lines -->
  <line x1="256" y1="256" x2="256" y2="160" stroke="#ffd600" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <line x1="256" y1="256" x2="256" y2="352" stroke="#ffd600" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <line x1="256" y1="256" x2="170" y2="196" stroke="#ffd600" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <line x1="256" y1="256" x2="342" y2="196" stroke="#ffd600" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <line x1="256" y1="256" x2="170" y2="316" stroke="#ffd600" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <line x1="256" y1="256" x2="342" y2="316" stroke="#ffd600" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <!-- POW text -->
  <text x="256" y="270" font-family="sans-serif" font-size="30" fill="#ffd600" text-anchor="middle" font-weight="bold" filter="url(#glow)">POW!</text>
  <!-- Title -->
  <text x="256" y="455" font-family="sans-serif" font-size="24" fill="#ff6d00" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.9">SNAP.DUEL</text>
</svg>
