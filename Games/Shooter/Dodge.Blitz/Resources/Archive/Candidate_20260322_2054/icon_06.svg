<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="dark_green_bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#041B0E"/>
      <stop offset="100%" stop-color="#020A08"/>
    </linearGradient>
    <radialGradient id="shield_aura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00FFCC" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00FFCC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="player_inner" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#80FFE8"/>
      <stop offset="100%" stop-color="#00FFCC"/>
    </radialGradient>
    <filter id="diamond_glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="trail_blur">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blink_soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Dark green-black background -->
  <rect width="1024" height="1024" rx="190" fill="url(#dark_green_bg)"/>

  <!-- Stars -->
  <circle cx="220" cy="190" r="2" fill="white" opacity="0.35"/>
  <circle cx="780" cy="165" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="160" cy="600" r="2" fill="white" opacity="0.3"/>
  <circle cx="855" cy="650" r="1.5" fill="white" opacity="0.28"/>
  <circle cx="350" cy="840" r="2" fill="#00FFCC" opacity="0.2"/>
  <circle cx="700" cy="820" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="480" cy="180" r="1.5" fill="white" opacity="0.28"/>
  <circle cx="600" cy="870" r="2" fill="white" opacity="0.25"/>

  <!-- Layer 2: Bullet trails (trajectories that just missed the player) -->
  <!-- Red bullet trail — came from top-left, passed near, curving off -->
  <g filter="url(#trail_blur)">
    <!-- Trail: top-right to bottom-left (just missed) -->
    <line x1="800" y1="200" x2="420" y2="580" stroke="#FF3737" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="800" y1="200" x2="420" y2="580" stroke="#FF3737" stroke-width="20" stroke-linecap="round" opacity="0.2"/>
    <!-- Bullet head -->
    <circle cx="800" cy="200" r="18" fill="#FF3737" opacity="0.85"/>

    <!-- Trail: top-left to middle-right (another miss) -->
    <line x1="200" y1="240" x2="590" y2="530" stroke="#FF8200" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
    <line x1="200" y1="240" x2="590" y2="530" stroke="#FF8200" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
    <circle cx="200" cy="240" r="16" fill="#FF8200" opacity="0.85"/>

    <!-- Trail: bottom-left to top-right -->
    <line x1="210" y1="820" x2="580" y2="445" stroke="#B432FF" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
    <line x1="210" y1="820" x2="580" y2="445" stroke="#B432FF" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
    <circle cx="210" cy="820" r="16" fill="#B432FF" opacity="0.85"/>

    <!-- Trail: from right, horizontal near-miss -->
    <line x1="870" y1="530" x2="620" y2="530" stroke="#FF3C96" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <line x1="870" y1="530" x2="620" y2="530" stroke="#FF3C96" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
    <circle cx="870" cy="530" r="16" fill="#FF3C96" opacity="0.85"/>

    <!-- Trail: from bottom-right -->
    <line x1="830" y1="800" x2="560" y2="570" stroke="#FF5500" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <circle cx="830" cy="800" r="14" fill="#FF5500" opacity="0.8"/>
  </g>

  <!-- Invincibility aura (blink state — player just got hit and is invincible) -->
  <g filter="url(#blink_soft)">
    <circle cx="512" cy="512" r="170" fill="url(#shield_aura)"/>
    <!-- Blink rings -->
    <circle cx="512" cy="512" r="150" fill="none" stroke="#00FFCC" stroke-width="4" opacity="0.35"/>
    <circle cx="512" cy="512" r="130" fill="none" stroke="#00FFCC" stroke-width="3" opacity="0.25"/>
  </g>

  <!-- Layer 3: Player diamond — large, centered, glowing (hero silhouette) -->
  <g filter="url(#diamond_glow)">
    <!-- Outer glow ring -->
    <polygon
      points="512,320 704,512 512,704 320,512"
      fill="none"
      stroke="#00FFCC"
      stroke-width="6"
      opacity="0.35"
      stroke-linejoin="round"
    />
    <!-- Main diamond body -->
    <polygon
      points="512,352 672,512 512,672 352,512"
      fill="url(#player_inner)"
      stroke="#00BF98"
      stroke-width="8"
      stroke-linejoin="round"
    />
    <!-- Inner diamond facet lines -->
    <line x1="512" y1="352" x2="512" y2="672" stroke="#80FFE8" stroke-width="3" opacity="0.35"/>
    <line x1="352" y1="512" x2="672" y2="512" stroke="#80FFE8" stroke-width="3" opacity="0.35"/>
    <!-- Top highlight -->
    <polygon
      points="512,352 592,432 512,432 432,432"
      fill="white"
      opacity="0.18"
    />
    <!-- Center glow dot -->
    <circle cx="512" cy="512" r="30" fill="white" opacity="0.35"/>
    <circle cx="512" cy="512" r="14" fill="white" opacity="0.5"/>
  </g>
</svg>
