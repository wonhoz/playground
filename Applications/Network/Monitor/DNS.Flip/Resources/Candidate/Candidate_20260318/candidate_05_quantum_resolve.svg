<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 원자 궤도 -->
  <ellipse cx="256" cy="256" rx="160" ry="55" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="160" ry="55" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.4" transform="rotate(60,256,256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="55" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.4" transform="rotate(120,256,256)"/>
  <!-- 핵 -->
  <circle cx="256" cy="256" r="30" fill="#0EA5E9" opacity="0.2"/>
  <circle cx="256" cy="256" r="22" fill="#0EA5E9" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
  <!-- 전자 (DNS 쿼리) -->
  <circle cx="416" cy="256" r="9" fill="#0EA5E9" opacity="0.9" filter="url(#glow)"/>
  <circle cx="184" cy="116" r="7" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="184" cy="396" r="7" fill="#0EA5E9" opacity="0.7"/>
  <!-- DNS 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#0EA5E9" font-size="18" font-family="monospace" font-weight="bold" filter="url(#glow)">RESOLVE</text>
  <!-- 빛 효과 -->
  <circle cx="120" cy="150" r="3" fill="#38BDF8" opacity="0.5"/>
  <circle cx="390" cy="380" r="4" fill="#0EA5E9" opacity="0.6" filter="url(#glow)"/>
</svg>