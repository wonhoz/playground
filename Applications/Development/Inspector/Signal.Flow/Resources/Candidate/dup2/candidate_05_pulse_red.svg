<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0000"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="50%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ECG/pulse line -->
  <polyline points="50,256 130,256 145,256 155,140 165,370 175,256 220,256 230,200 240,256 260,256 270,180 280,340 290,256 340,256 350,210 360,256 420,256 430,230 440,256 470,256" stroke="url(#pulse)" stroke-width="5" fill="none" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Radial pulse circles -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#E53935" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#E53935" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#E53935" stroke-width="1" opacity="0.08"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="#FF5252"/>
  <!-- Signal markers -->
  <line x1="155" y1="130" x2="155" y2="145" stroke="#FF8A80" stroke-width="2"/>
  <text x="130" y="125" font-family="monospace" font-size="12" fill="#FF8A80">PEAK</text>
  <line x1="270" y1="170" x2="270" y2="185" stroke="#FF8A80" stroke-width="2"/>
  <text x="248" y="165" font-family="monospace" font-size="12" fill="#FF8A80">EVT</text>
  <!-- Bottom label -->
  <text x="156" y="430" font-family="monospace" font-size="20" fill="#EF9A9A" letter-spacing="2">SIGNAL.FLOW</text>
</svg>
