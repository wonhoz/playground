<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021B0E"/>
      <stop offset="100%" stop-color="#052E16"/>
    </linearGradient>
    <radialGradient id="diskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="190" fill="url(#diskGlow)"/>
  <!-- Circuit board traces radiating from center -->
  <line x1="256" y1="256" x2="256" y2="90" stroke="#059669" stroke-width="2.5"/>
  <line x1="256" y1="90" x2="320" y2="90" stroke="#059669" stroke-width="2.5"/>
  <circle cx="320" cy="90" r="6" fill="#34D399"/>
  <line x1="256" y1="256" x2="422" y2="256" stroke="#059669" stroke-width="2.5"/>
  <line x1="422" y1="256" x2="422" y2="180" stroke="#059669" stroke-width="2.5"/>
  <circle cx="422" cy="180" r="6" fill="#34D399"/>
  <line x1="256" y1="256" x2="380" y2="380" stroke="#059669" stroke-width="2.5"/>
  <circle cx="380" cy="380" r="6" fill="#34D399"/>
  <line x1="256" y1="256" x2="90" y2="380" stroke="#059669" stroke-width="2.5"/>
  <line x1="90" y1="380" x2="90" y2="430" stroke="#059669" stroke-width="2.5"/>
  <circle cx="90" cy="430" r="6" fill="#34D399"/>
  <line x1="256" y1="256" x2="90" y2="256" stroke="#059669" stroke-width="2.5"/>
  <line x1="90" y1="256" x2="90" y2="190" stroke="#059669" stroke-width="2.5"/>
  <circle cx="90" cy="190" r="6" fill="#34D399"/>
  <!-- Disk rings -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#065F46" stroke-width="2" stroke-dasharray="12,8"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#059669" stroke-width="2.5" stroke-dasharray="8,6"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#34D399" stroke-width="2" stroke-dasharray="6,5"/>
  <!-- Usage arc -->
  <path d="M256,106 A150,150 0 0,1 390,372" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="36" fill="#021B0E" stroke="#34D399" stroke-width="3"/>
  <circle cx="256" cy="256" r="12" fill="#059669"/>
  <!-- Capacity chips at nodes -->
  <rect x="300" y="74" width="80" height="28" rx="7" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="93" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">SYS 186G</text>
  <rect x="360" y="150" width="80" height="28" rx="7" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="169" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">APP 102G</text>
  <rect x="364" y="364" width="80" height="28" rx="7" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <text x="404" y="383" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">MED 55G</text>
  <rect x="42" y="414" width="80" height="28" rx="7" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <text x="82" y="433" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">DOC 12G</text>
  <rect x="42" y="174" width="80" height="28" rx="7" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <text x="82" y="193" font-family="monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">FRE 488G</text>
</svg>
