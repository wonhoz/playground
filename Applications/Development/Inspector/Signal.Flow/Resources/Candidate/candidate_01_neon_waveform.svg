<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88"/>
      <stop offset="70%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="80" y1="176" x2="432" y2="176" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#1a1a3a" stroke-width="1.5"/>
  <line x1="80" y1="336" x2="432" y2="336" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="176" y1="120" x2="176" y2="392" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="256" y1="120" x2="256" y2="392" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="336" y1="120" x2="336" y2="392" stroke="#1a1a3a" stroke-width="1"/>
  <!-- Waveform 1 (green) -->
  <path d="M80 256 L115 256 L115 170 L150 170 L150 256 L185 256 L185 170 L220 170 L220 256 L255 256 L255 170 L290 170 L290 256 L325 256 L325 170 L360 170 L360 256 L395 256 L432 256"
        stroke="#00ff88" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Waveform 2 (cyan) -->
  <path d="M80 256 L100 256 L100 336 L140 336 L140 256 L160 256 L160 336 L200 336 L200 256 L220 256 L220 336 L260 336 L260 256 L280 256 L280 336 L320 336 L320 256 L360 256 L360 336 L400 336 L432 336"
        stroke="#00ccff" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Signal dot moving -->
  <circle cx="290" cy="170" r="8" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="260" cy="336" r="8" fill="#00ccff" filter="url(#glow)"/>
  <!-- Axis labels -->
  <text x="80" y="415" font-family="monospace" font-size="13" fill="#00ff88" opacity="0.7">t=0</text>
  <text x="240" y="415" font-family="monospace" font-size="13" fill="#00ff88" opacity="0.7">t=50ms</text>
  <text x="400" y="415" font-family="monospace" font-size="13" fill="#00ff88" opacity="0.7">t=100</text>
  <!-- Title -->
  <text x="256" y="460" font-family="monospace" font-size="18" fill="#00ccff" text-anchor="middle" letter-spacing="3" opacity="0.85">SIGNAL.FLOW</text>
</svg>
