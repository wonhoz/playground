  <rect x="150" y="200" width="240" height="220" rx="10" fill="#4338ca" stroke="#a5b4fc" stroke-width="2" opacity="0.9"/>
  <!-- menu items in front card -->
  <rect x="164" y="220" width="212" height="28" rx="5" fill="#6366f1" opacity="0.6"/>
  <rect x="176" y="228" width="100" height="12" rx="3" fill="#e0e7ff"/>
  <rect x="176" y="262" width="130" height="10" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <rect x="176" y="284" width="110" height="10" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <rect x="176" y="306" width="150" height="10" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <line x1="164" y1="326" x2="376" y2="326" stroke="#4338ca" stroke-width="1"/>
  <rect x="176" y="338" width="120" height="10" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <rect x="176" y="360" width="90" height="10" rx="3" fill="#c7d2fe" opacity="0.7"/>
  <polygon points="368,280 368,292 380,286" fill="#a5b4fc"/>
</svg>
