    <linearGradient id="stream3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80d8ff"/>
      <stop offset="100%" stop-color="#40c4ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 세 개의 입력 스트림 -->
  <rect x="70" y="80" width="80" height="180" rx="8" fill="url(#stream1)" opacity="0.85"/>
  <rect x="216" y="80" width="80" height="180" rx="8" fill="url(#stream2)" opacity="0.85"/>
  <rect x="362" y="80" width="80" height="180" rx="8" fill="url(#stream3)" opacity="0.85"/>
  <!-- 로그 라인 표현 -->
  <line x1="80" y1="110" x2="140" y2="110" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="80" y1="130" x2="140" y2="130" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="80" y1="150" x2="120" y2="150" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="80" y1="170" x2="140" y2="170" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="226" y1="110" x2="286" y2="110" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="226" y1="130" x2="270" y2="130" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="226" y1="150" x2="286" y2="150" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="226" y1="170" x2="265" y2="170" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="372" y1="110" x2="432" y2="110" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="372" y1="130" x2="425" y2="130" stroke="white" stroke-width="4" opacity="0.6"/>
