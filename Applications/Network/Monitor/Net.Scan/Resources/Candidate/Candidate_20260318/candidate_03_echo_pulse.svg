<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 에코 펄스 원들 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.1"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#14B8A6" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="75" fill="none" stroke="#2DD4BF" stroke-width="2.5" opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="#14B8A6" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <!-- 중앙 발신기 -->
  <circle cx="256" cy="256" r="20" fill="#14B8A6" opacity="0.3"/>
  <circle cx="256" cy="256" r="12" fill="#14B8A6" opacity="0.8" filter="url(#glow)"/>
  <!-- 방사형 선들 -->
  <line x1="256" y1="256" x2="256" y2="76" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="412" y2="346" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="100" y2="346" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
  <!-- 탐지된 디바이스들 -->
  <circle cx="256" cy="146" r="9" fill="#2DD4BF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="346" cy="311" r="7" fill="#14B8A6" opacity="0.7"/>
  <circle cx="166" cy="311" r="7" fill="#2DD4BF" opacity="0.7"/>
  <circle cx="310" cy="180" r="6" fill="#14B8A6" opacity="0.6"/>
  <circle cx="202" cy="180" r="6" fill="#2DD4BF" opacity="0.6"/>
  <!-- PING 텍스트 -->
  <text x="256" y="430" text-anchor="middle" fill="#14B8A6" font-size="16" font-family="monospace" font-weight="bold" filter="url(#glow)">ECHO PING</text>
</svg>