<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 펜 + 칸 채우기: 연필 + 빈 칸 -->
  <!-- 빈 격자 칸들 -->
  <rect x="160" y="400" width="120" height="120" rx="8" fill="none" stroke="#1565C0" stroke-width="8"/>
  <rect x="290" y="400" width="120" height="120" rx="8" fill="none" stroke="#1565C0" stroke-width="8"/>
  <rect x="420" y="400" width="120" height="120" rx="8" fill="#1565C0" opacity="0.5"/>
  <rect x="550" y="400" width="120" height="120" rx="8" fill="none" stroke="#1565C0" stroke-width="8"/>
  <rect x="680" y="400" width="180" height="120" rx="8" fill="none" stroke="#1565C0" stroke-width="8"/>
  <!-- 채워진 칸 (쓰여진 곳) -->
  <rect x="160" y="530" width="120" height="120" rx="8" fill="#1565C0" opacity="0.5"/>
  <rect x="290" y="530" width="120" height="120" rx="8" fill="#1565C0" opacity="0.5"/>
  <rect x="420" y="530" width="120" height="120" rx="8" fill="none" stroke="#1565C0" stroke-width="8"/>
  <rect x="550" y="530" width="120" height="120" rx="8" fill="#1565C0" opacity="0.5"/>
  <!-- 연필 (크게, 오른쪽 상단) -->
  <g transform="translate(700,250) rotate(45)">
    <!-- 연필 몸통 -->
    <rect x="-30" y="-200" width="60" height="300" rx="6" fill="#1565C0"/>
    <!-- 연필 끝 (지우개) -->
    <rect x="-30" y="-240" width="60" height="40" rx="4" fill="#42A5F5" opacity="0.7"/>
    <!-- 연필 금속 -->
    <rect x="-30" y="100" width="60" height="28" rx="2" fill="#42A5F5"/>
    <!-- 연필 팁 -->
    <polygon points="-30,128 30,128 0,210" fill="#42A5F5" opacity="0.8"/>
    <!-- 연필 중간 선 -->
    <line x1="0" y1="-200" x2="0" y2="100" stroke="#000A14" stroke-width="6" opacity="0.3"/>
  </g>
  <!-- 쓰는 획 표시 -->
  <circle cx="460" cy="420" r="10" fill="#42A5F5"/>
  <line x1="460" y1="420" x2="500" y2="430" stroke="#42A5F5" stroke-width="6" opacity="0.6"/>
</svg>
