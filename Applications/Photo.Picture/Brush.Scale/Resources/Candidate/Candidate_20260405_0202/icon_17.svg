<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="ring17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg17)"/>
  <!-- Layer 2: Camera lens with focus rings — blurry outer → sharp center -->
  <!-- Outermost lens ring -->
  <circle cx="512" cy="512" r="380" fill="#263238" stroke="#546E7A" stroke-width="30"/>
  <!-- Focus ring label -->
  <text x="148" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="600" fill="#546E7A" transform="rotate(-45, 200, 280)">blur</text>
  <!-- Middle ring -->
  <circle cx="512" cy="512" r="290" fill="#2E3D45" stroke="url(#ring17)" stroke-width="20"/>
  <!-- Inner ring (sharper) -->
  <circle cx="512" cy="512" r="210" fill="#37474F" stroke="#90A4AE" stroke-width="16"/>
  <!-- Focus plane ring (crisp) -->
  <circle cx="512" cy="512" r="140" fill="#455A64" stroke="#B0BEC5" stroke-width="12"/>
  <!-- Sharp center (image in perfect focus) -->
  <circle cx="512" cy="512" r="90" fill="#E91E63"/>
  <!-- Image detail in center: sharp target reticle -->
  <line x1="512" y1="445" x2="512" y2="480" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="512" y1="544" x2="512" y2="579" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="445" y1="512" x2="480" y2="512" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="544" y1="512" x2="579" y2="512" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="512" cy="512" r="28" fill="none" stroke="white" stroke-width="8"/>
  <!-- Layer 3: Focus indicator labels -->
  <text x="292" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="#E91E63">FOCUS</text>
  <!-- Red dot (focus indicator) top right -->
  <circle cx="810" cy="250" r="28" fill="#E91E63"/>
  <text x="848" y="265" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="700" fill="#E91E63">AF</text>
  <!-- ×4 at bottom -->
  <text x="414" y="920" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="#B0BEC5">×4</text>
</svg>
