  <rect x="250" y="720" width="52" height="34" rx="6" fill="#5C6BC0" opacity="0.6" transform="rotate(15,276,737)"/>
  <rect x="170" y="350" width="48" height="32" rx="6" fill="#1A237E" opacity="0.7" transform="rotate(-40,194,366)"/>
  <rect x="300" y="200" width="54" height="36" rx="6" fill="#5C6BC0" opacity="0.55" transform="rotate(25,327,218)"/>
  <!-- Spiral motion lines -->
