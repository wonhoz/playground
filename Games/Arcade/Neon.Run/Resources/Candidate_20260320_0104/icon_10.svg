<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Neon pixel cat (Nyan Cat / Popcat style) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Pixel grid size: 56px -->
  <!-- Cat body (rectangle blocks) -->
  <!-- Row 1 (top of body) -->
  <rect x="280" y="336" width="56" height="56" fill="#00B0FF"/>
  <rect x="336" y="336" width="56" height="56" fill="#00E5FF"/>
  <rect x="392" y="336" width="56" height="56" fill="#00E5FF"/>
  <rect x="448" y="336" width="56" height="56" fill="#00E5FF"/>
  <rect x="504" y="336" width="56" height="56" fill="#00E5FF"/>
  <rect x="560" y="336" width="56" height="56" fill="#00E5FF"/>
  <rect x="616" y="336" width="56" height="56" fill="#00B0FF"/>
  <!-- Ears -->
  <rect x="280" y="280" width="56" height="56" fill="#00E5FF"/>
  <rect x="616" y="280" width="56" height="56" fill="#00E5FF"/>
  <rect x="280" y="224" width="56" height="56" fill="#00B0FF"/>
  <rect x="616" y="224" width="56" height="56" fill="#00B0FF"/>
  <!-- Row 2 -->
  <rect x="224" y="392" width="56" height="56" fill="#00B0FF"/>
  <rect x="280" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="336" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="392" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="448" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="504" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="560" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="616" y="392" width="56" height="56" fill="#00E5FF"/>
  <rect x="672" y="392" width="56" height="56" fill="#00B0FF"/>
  <!-- Eyes (dark pixels) -->
  <rect x="336" y="392" width="56" height="56" fill="#000510"/>
  <rect x="560" y="392" width="56" height="56" fill="#000510"/>
  <!-- Row 3 (mouth row) -->
  <rect x="224" y="448" width="56" height="56" fill="#00B0FF"/>
  <rect x="280" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="336" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="392" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="448" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="504" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="560" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="616" y="448" width="56" height="56" fill="#00E5FF"/>
  <rect x="672" y="448" width="56" height="56" fill="#00B0FF"/>
  <!-- Whiskers (horizontal lines) -->
  <rect x="168" y="410" width="56" height="10" fill="#80D8FF" opacity="0.8"/>
  <rect x="168" y="430" width="56" height="10" fill="#80D8FF" opacity="0.6"/>
  <rect x="728" y="410" width="56" height="10" fill="#80D8FF" opacity="0.8"/>
  <rect x="728" y="430" width="56" height="10" fill="#80D8FF" opacity="0.6"/>
  <!-- Row 4 (bottom body) -->
  <rect x="280" y="504" width="56" height="56" fill="#00B0FF"/>
  <rect x="336" y="504" width="56" height="56" fill="#00E5FF"/>
  <rect x="392" y="504" width="56" height="56" fill="#00E5FF"/>
  <rect x="448" y="504" width="56" height="56" fill="#00E5FF"/>
  <rect x="504" y="504" width="56" height="56" fill="#00E5FF"/>
  <rect x="560" y="504" width="56" height="56" fill="#00E5FF"/>
  <rect x="616" y="504" width="56" height="56" fill="#00B0FF"/>
  <!-- Legs/paws -->
  <rect x="336" y="560" width="56" height="56" fill="#00B0FF"/>
  <rect x="448" y="560" width="56" height="56" fill="#00B0FF"/>
  <rect x="504" y="560" width="56" height="56" fill="#00B0FF"/>
  <rect x="616" y="560" width="56" height="56" fill="#00B0FF"/>
  <!-- Tail (right side) -->
  <rect x="672" y="504" width="56" height="56" fill="#0091EA"/>
  <rect x="728" y="504" width="56" height="56" fill="#0091EA"/>
  <rect x="784" y="560" width="56" height="56" fill="#0091EA"/>
  <rect x="784" y="616" width="56" height="56" fill="#0091EA"/>
  <!-- Rainbow trail (left side) -->
  <rect x="140" y="336" width="84" height="18" fill="#FF4081" opacity="0.9"/>
  <rect x="120" y="354" width="104" height="18" fill="#FF6E40" opacity="0.9"/>
  <rect x="110" y="372" width="114" height="18" fill="#FFFF00" opacity="0.8"/>
  <rect x="110" y="390" width="114" height="18" fill="#00E676" opacity="0.8"/>
  <rect x="120" y="408" width="104" height="18" fill="#00B0FF" opacity="0.9"/>
  <rect x="140" y="426" width="84" height="18" fill="#EA80FC" opacity="0.9"/>
</svg>
