<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 주황+노랑 -->
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#FFA726"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: 혼란스러운 파일 더미(왼쪽) → 깔끔한 정리(오른쪽) -->
  <!-- 왼쪽: 뒤죽박죽 사진/동영상 더미 -->
  <g>
    <rect x="80" y="400" width="180" height="120" rx="12" fill="white" opacity="0.75" transform="rotate(-15 170 460)"/>
    <rect x="90" y="410" width="160" height="80" rx="8" fill="#90CAF9" transform="rotate(-15 170 460)"/>
    <rect x="100" y="360" width="180" height="120" rx="12" fill="white" opacity="0.75" transform="rotate(10 190 420)"/>
    <rect x="110" y="370" width="160" height="80" rx="8" fill="#A5D6A7" transform="rotate(10 190 420)"/>
    <rect x="120" y="480" width="180" height="120" rx="12" fill="white" opacity="0.75" transform="rotate(-5 210 540)"/>
    <rect x="130" y="490" width="160" height="80" rx="8" fill="#FFE082" transform="rotate(-5 210 540)"/>
    <rect x="60" y="520" width="180" height="120" rx="12" fill="white" opacity="0.7" transform="rotate(18 150 580)"/>
    <rect x="70" y="530" width="160" height="80" rx="8" fill="#F48FB1" transform="rotate(18 150 580)"/>
  </g>
  <!-- 중앙 변환 화살표 (마법 지팡이처럼) -->
  <path d="M 338 500 L 540 500" stroke="white" stroke-width="26" stroke-linecap="round"/>
  <path d="M 512 466 L 550 500 L 512 534" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 스파클 이펙트 -->
  <text x="434" y="454" font-family="Segoe UI, sans-serif" font-size="50" fill="#FFD700">✦</text>
  <text x="400" y="560" font-family="Segoe UI, sans-serif" font-size="36" fill="#FFD700" opacity="0.8">✦</text>
  <!-- 오른쪽: 깔끔하게 정리된 폴더들 -->
  <rect x="568" y="260" width="340" height="500" rx="20" fill="white" opacity="0.92"/>
  <!-- 폴더 행들 -->
  <rect x="590" y="290" width="296" height="76" rx="12" fill="#FF8F00" opacity="0.9"/>
  <text x="620" y="338" font-family="Segoe UI, sans-serif" font-size="48" font-weight="bold" fill="white">📁 2024</text>
  <rect x="610" y="386" width="256" height="64" rx="10" fill="#FFA726" opacity="0.85"/>
  <text x="634" y="428" font-family="Segoe UI, sans-serif" font-size="42" fill="white">📁 06</text>
  <rect x="630" y="470" width="216" height="60" rx="10" fill="#FFCC80" opacity="0.9"/>
  <text x="650" y="510" font-family="Segoe UI, sans-serif" font-size="38" fill="#E65100">📁 07</text>
  <rect x="630" y="550" width="216" height="60" rx="10" fill="#FFCC80" opacity="0.9"/>
  <text x="650" y="590" font-family="Segoe UI, sans-serif" font-size="38" fill="#E65100">📁 08</text>
  <!-- 사진 파일들 (녹색 체크) -->
  <rect x="650" y="630" width="196" height="50" rx="8" fill="#E8F5E9"/>
  <text x="662" y="666" font-family="Segoe UI, sans-serif" font-size="34" fill="#2E7D32">✓ 001.jpg</text>
  <rect x="650" y="690" width="196" height="50" rx="8" fill="#E8F5E9"/>
  <text x="662" y="726" font-family="Segoe UI, sans-serif" font-size="34" fill="#2E7D32">✓ 002.mp4</text>
  <!-- Layer 3: 하단 레이블 -->
  <text x="512" y="875" font-family="Segoe UI, sans-serif" font-size="66" font-weight="bold" fill="white" text-anchor="middle">Organize!</text>
</svg>
