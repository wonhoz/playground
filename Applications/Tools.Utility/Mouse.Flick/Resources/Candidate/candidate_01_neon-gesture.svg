<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A001A"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C77DFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C77DFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gesture trail arc -->
  <path d="M 120 380 Q 180 200 340 140" fill="none" stroke="url(#trail)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrow tip at end of trail -->
  <polygon points="340,120 355,155 325,155" fill="#C77DFF" filter="url(#glow)" transform="rotate(-20 340 140)"/>
  <!-- Mouse cursor -->
  <path d="M 120 380 L 140 350 L 148 370 L 160 360 L 142 400 L 134 385 Z" fill="#E0AAFF" filter="url(#glow)"/>
  <!-- Speed dots along trail -->
  <circle cx="170" cy="330" r="5" fill="#C77DFF" opacity="0.6"/>
  <circle cx="220" cy="270" r="6" fill="#C77DFF" opacity="0.7"/>
  <circle cx="270" cy="210" r="7" fill="#C77DFF" opacity="0.8"/>
  <circle cx="310" cy="170" r="8" fill="#C77DFF" opacity="0.9"/>
  <!-- Title -->
  <text x="256" y="450" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#C77DFF">MOUSE.FLICK</text>
  <text x="256" y="478" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C77DFF" opacity="0.6">Gesture Tool</text>
</svg>