<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <!-- Background: deep orange -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Left: large backslash \ -->
  <text x="60" y="700" font-family="Arial Black,Arial" font-size="480" font-weight="900" fill="white" opacity="0.95">\</text>

  <!-- Yellow transformation arrow -->
  <line x1="420" y1="512" x2="580" y2="512" stroke="#FDE047" stroke-width="34" stroke-linecap="round"/>
  <polygon points="574,464 684,512 574,560" fill="#FDE047"/>

  <!-- Right: large forward slash / -->
  <text x="620" y="700" font-family="Arial Black,Arial" font-size="480" font-weight="900" fill="white" opacity="0.95">/</text>

  <!-- Small label bottom -->
  <rect x="292" y="800" width="440" height="56" rx="12" fill="white" opacity="0.18"/>
  <text x="512" y="838" font-family="Arial,sans-serif" font-size="34" fill="white" font-weight="bold" text-anchor="middle">path format convert</text>
</svg>
