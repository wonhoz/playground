<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="brain06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF80AB"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
    <linearGradient id="bolt06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
    <filter id="glow06">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Background circuit-like dots -->
  <circle cx="200" cy="200" r="16" fill="#CE93D8" opacity="0.5"/>
  <circle cx="820" cy="200" r="16" fill="#CE93D8" opacity="0.5"/>
  <circle cx="200" cy="820" r="16" fill="#CE93D8" opacity="0.5"/>
  <circle cx="820" cy="820" r="16" fill="#CE93D8" opacity="0.5"/>
  <!-- Layer 2: Brain silhouette -->
  <!-- Left hemisphere -->
  <path d="M512 280 Q380 260 320 340 Q260 420 280 520 Q300 620 380 660 Q440 690 512 680 Z" fill="url(#brain06)"/>
  <!-- Right hemisphere -->
  <path d="M512 280 Q644 260 704 340 Q764 420 744 520 Q724 620 644 660 Q584 690 512 680 Z" fill="url(#brain06)"/>
  <!-- Brain center divider -->
  <line x1="512" y1="290" x2="512" y2="670" stroke="#F8BBD9" stroke-width="6" stroke-dasharray="12,8"/>
  <!-- Brain gyri folds left -->
  <path d="M360 380 Q330 420 350 460" fill="none" stroke="#F8BBD9" stroke-width="14" stroke-linecap="round"/>
  <path d="M340 500 Q320 540 350 560" fill="none" stroke="#F8BBD9" stroke-width="14" stroke-linecap="round"/>
  <!-- Brain gyri folds right -->
  <path d="M664 380 Q694 420 674 460" fill="none" stroke="#F8BBD9" stroke-width="14" stroke-linecap="round"/>
  <path d="M684 500 Q704 540 674 560" fill="none" stroke="#F8BBD9" stroke-width="14" stroke-linecap="round"/>
  <!-- Brain stem -->
  <rect x="472" y="680" width="80" height="80" rx="16" fill="#F48FB1"/>
  <!-- Layer 3: Lightning bolt -->
  <polygon points="560,180 480,430 536,430 456,700 640,380 576,380 660,180" fill="url(#bolt06)" filter="url(#glow06)" stroke="#FF6F00" stroke-width="8" stroke-linejoin="round"/>
</svg>
