<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 앱 UI 패널 -->
  <rect x="150" y="160" width="724" height="640" rx="24" fill="#1E2D5A"/>
  <!-- 타이틀바 -->
  <rect x="150" y="160" width="724" height="64" rx="24" fill="#283593"/>
  <rect x="150" y="196" width="724" height="28" fill="#283593"/>
  <text x="512" y="202" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#90CAF9" text-anchor="middle">Sys.Clean</text>
  <!-- 항목 행들 -->
  <!-- Temp Files 행 -->
  <rect x="170" y="244" width="684" height="68" rx="10" fill="#283593"/>
  <rect x="184" y="256" width="40" height="40" rx="8" fill="#4CAF50"/>
  <text x="204" y="284" font-family="Arial Black, sans-serif" font-size="36" fill="white" text-anchor="middle">✓</text>
  <text x="490" y="284" font-family="Arial, sans-serif" font-size="34" fill="#E0E0E0" text-anchor="middle">임시 파일</text>
  <text x="810" y="284" font-family="Arial Black, sans-serif" font-size="36" fill="#4CAF50" text-anchor="middle">1.2 GB</text>
  <!-- Cache 행 -->
  <rect x="170" y="322" width="684" height="68" rx="10" fill="#1E2D5A"/>
  <rect x="184" y="334" width="40" height="40" rx="8" fill="#4CAF50"/>
  <text x="204" y="362" font-family="Arial Black, sans-serif" font-size="36" fill="white" text-anchor="middle">✓</text>
  <text x="480" y="362" font-family="Arial, sans-serif" font-size="34" fill="#E0E0E0" text-anchor="middle">브라우저 캐시</text>
  <text x="810" y="362" font-family="Arial Black, sans-serif" font-size="36" fill="#4CAF50" text-anchor="middle">842 MB</text>
  <!-- Registry 행 -->
  <rect x="170" y="400" width="684" height="68" rx="10" fill="#283593"/>
  <rect x="184" y="412" width="40" height="40" rx="8" fill="#EF5350"/>
  <text x="204" y="440" font-family="Arial Black, sans-serif" font-size="36" fill="white" text-anchor="middle">✓</text>
  <text x="490" y="440" font-family="Arial, sans-serif" font-size="34" fill="#E0E0E0" text-anchor="middle">레지스트리</text>
  <text x="810" y="440" font-family="Arial Black, sans-serif" font-size="36" fill="#EF5350" text-anchor="middle">47개</text>
  <!-- Log Files 행 -->
  <rect x="170" y="478" width="684" height="68" rx="10" fill="#1E2D5A"/>
  <rect x="184" y="490" width="40" height="40" rx="8" fill="#4CAF50"/>
  <text x="204" y="518" font-family="Arial Black, sans-serif" font-size="36" fill="white" text-anchor="middle">✓</text>
  <text x="475" y="518" font-family="Arial, sans-serif" font-size="34" fill="#E0E0E0" text-anchor="middle">로그 파일</text>
  <text x="810" y="518" font-family="Arial Black, sans-serif" font-size="36" fill="#4CAF50" text-anchor="middle">234 MB</text>
  <!-- Layer 3: 하단 총계 + 실행 버튼 -->
  <rect x="150" y="720" width="724" height="80" rx="24" fill="#1565C0"/>
  <rect x="150" y="720" width="724" height="40" fill="#1565C0"/>
  <text x="512" y="773" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">총 2.3 GB 정리</text>
</svg>
