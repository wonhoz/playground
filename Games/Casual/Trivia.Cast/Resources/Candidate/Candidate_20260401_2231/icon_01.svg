<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: 4 answer buttons 2x2 grid -->
  <!-- Button A -->
  <rect x="88" y="120" width="390" height="160" rx="20" fill="white" opacity="0.95"/>
  <text x="135" y="228" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold" fill="#1565C0">A</text>
  <rect x="240" y="150" width="200" height="100" rx="12" fill="#E3F2FD"/>
  <text x="340" y="218" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#1565C0" text-anchor="middle">quiz</text>

  <!-- Button B -->
  <rect x="546" y="120" width="390" height="160" rx="20" fill="white" opacity="0.95"/>
  <text x="593" y="228" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold" fill="#E53935">B</text>
  <rect x="698" y="150" width="200" height="100" rx="12" fill="#FFEBEE"/>
  <text x="798" y="218" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#E53935" text-anchor="middle">fact</text>

  <!-- Button C -->
  <rect x="88" y="360" width="390" height="160" rx="20" fill="white" opacity="0.95"/>
  <text x="135" y="468" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold" fill="#2E7D32">C</text>
  <rect x="240" y="390" width="200" height="100" rx="12" fill="#E8F5E9"/>
  <text x="340" y="458" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#2E7D32" text-anchor="middle">true</text>

  <!-- Button D -->
  <rect x="546" y="360" width="390" height="160" rx="20" fill="white" opacity="0.95"/>
  <text x="593" y="468" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold" fill="#F57F17">D</text>
  <rect x="698" y="390" width="200" height="100" rx="12" fill="#FFF8E1"/>
  <text x="798" y="458" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#F57F17" text-anchor="middle">play</text>

  <!-- Layer 3: Timer progress bar + title -->
  <rect x="88" y="590" width="848" height="26" rx="13" fill="white" opacity="0.25"/>
  <rect x="88" y="590" width="510" height="26" rx="13" fill="#FFF176" opacity="0.9"/>

  <text x="512" y="710" font-family="'Segoe UI',Arial,sans-serif" font-size="108" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">TRIVIA</text>
  <text x="512" y="820" font-family="'Segoe UI',Arial,sans-serif" font-size="68" fill="white" text-anchor="middle" opacity="0.75" letter-spacing="14">CAST</text>
</svg>
