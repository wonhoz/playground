  <rect x="548" y="260" width="240" height="480" rx="12" fill="#1E1E2E" stroke="#333344" stroke-width="4"/>
  <text x="566" y="330" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Title</text>
  <rect x="566" y="340" width="200" height="5" rx="2" fill="#42A5F5"/>
  <text x="566" y="395" font-family="Arial Black" font-size="46" font-weight="900" fill="#E0E0E0">bold</text>
  <rect x="556" y="412" width="6" height="48" rx="3" fill="#4FC3F7"/>
  <text x="570" y="453" font-family="Arial" font-size="42" fill="#B0BEC5" font-style="italic">quote</text>
  <text x="576" y="506" font-family="Arial" font-size="42" fill="#E0E0E0">• list</text>
