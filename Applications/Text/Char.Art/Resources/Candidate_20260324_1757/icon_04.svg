<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ca04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0E22"/>
    </linearGradient>
    <clipPath id="c_ca04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Dark indigo background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_ca04)"/>
  <g clip-path="url(#c_ca04)">
    <!-- Layer 2: Prism triangle -->
    <polygon points="512,140 212,780 812,780" fill="#EDE9FE" stroke="#A78BFA" stroke-width="16"/>
    <!-- Prism refraction face -->
    <polygon points="512,140 512,520 312,780" fill="#C4B5FD"/>
    <polygon points="512,140 512,520 712,780" fill="#DDD6FE"/>
    <!-- Prism shine -->
    <line x1="512" y1="140" x2="440" y2="380" stroke="white" stroke-width="10" opacity="0.6" stroke-linecap="round"/>
    <!-- Layer 3: Rainbow spectrum rays with characters -->
    <!-- Ray 1: Red -->
    <line x1="272" y1="790" x2="140" y2="920" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
    <text x="90" y="960" font-family="Courier New" font-size="52" fill="#EF4444" transform="rotate(-40 90 960)">@</text>
    <!-- Ray 2: Orange -->
    <line x1="332" y1="790" x2="260" y2="940" stroke="#F97316" stroke-width="18" stroke-linecap="round"/>
    <text x="218" y="968" font-family="Courier New" font-size="52" fill="#F97316" transform="rotate(-20 218 968)">#</text>
    <!-- Ray 3: Yellow -->
    <line x1="420" y1="790" x2="400" y2="950" stroke="#EAB308" stroke-width="18" stroke-linecap="round"/>
    <text x="375" y="980" font-family="Courier New" font-size="52" fill="#FDE047">%</text>
    <!-- Ray 4: Green -->
    <line x1="512" y1="790" x2="512" y2="960" stroke="#22C55E" stroke-width="18" stroke-linecap="round"/>
    <text x="488" y="986" font-family="Courier New" font-size="52" fill="#4ADE80">$</text>
    <!-- Ray 5: Cyan -->
    <line x1="604" y1="790" x2="624" y2="950" stroke="#06B6D4" stroke-width="18" stroke-linecap="round"/>
    <text x="604" y="978" font-family="Courier New" font-size="52" fill="#22D3EE">&amp;</text>
    <!-- Ray 6: Blue -->
    <line x1="692" y1="790" x2="764" y2="940" stroke="#3B82F6" stroke-width="18" stroke-linecap="round"/>
    <text x="758" y="964" font-family="Courier New" font-size="52" fill="#60A5FA" transform="rotate(20 758 964)">*</text>
    <!-- Ray 7: Purple -->
    <line x1="752" y1="790" x2="884" y2="920" stroke="#A855F7" stroke-width="20" stroke-linecap="round"/>
    <text x="878" y="952" font-family="Courier New" font-size="52" fill="#C084FC" transform="rotate(40 878 952">!</text>
    <!-- White light entering prism from top -->
    <line x1="512" y1="60" x2="512" y2="140" stroke="white" stroke-width="28" stroke-linecap="round"/>
    <line x1="512" y1="60" x2="440" y2="80" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
    <line x1="512" y1="60" x2="584" y2="80" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
