<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f2010"/>
      <stop offset="100%" stop-color="#1a3a20"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#5a3a20"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0c0d0"/>
      <stop offset="100%" stop-color="#707080"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tower platform -->
  <rect x="180" y="300" width="152" height="160" rx="6" fill="url(#wood)"/>
  <!-- Platform top -->
  <rect x="160" y="276" width="192" height="32" rx="6" fill="#6a4020"/>
  <!-- Tower top structure -->
  <rect x="200" y="180" width="112" height="108" rx="6" fill="url(#wood)"/>
  <!-- Archer perch -->
  <rect x="172" y="156" width="168" height="32" rx="6" fill="#6a4020"/>
  <!-- Battlements on perch -->
  <rect x="175" y="130" width="24" height="36" rx="4" fill="url(#wood)"/>
  <rect x="215" y="130" width="24" height="36" rx="4" fill="url(#wood)"/>
  <rect x="255" y="130" width="24" height="36" rx="4" fill="url(#wood)"/>
  <rect x="295" y="130" width="24" height="36" rx="4" fill="url(#wood)"/>
  <!-- Arrows flying -->
  <line x1="380" y1="160" x2="310" y2="200" stroke="#d0a060" stroke-width="4"/>
  <polygon points="380,160 368,154 374,168" fill="#d0a060"/>
  <line x1="410" y1="220" x2="330" y2="230" stroke="#d0a060" stroke-width="4"/>
  <polygon points="410,220 396,216 402,228" fill="#d0a060"/>
  <line x1="370" y1="280" x2="300" y2="260" stroke="#d0a060" stroke-width="4"/>
  <polygon points="370,280 356,278 362,290" fill="#d0a060"/>
  <!-- Archer figure -->
  <circle cx="256" cy="155" r="14" fill="#c08050"/>
  <rect x="248" y="168" width="16" height="28" rx="4" fill="#4a7040"/>
  <!-- Bow -->
  <path d="M228 145 Q216 158 228 172" fill="none" stroke="#8b5e3c" stroke-width="5" stroke-linecap="round"/>
  <line x1="228" y1="145" x2="228" y2="172" stroke="#d0a060" stroke-width="2"/>
  <!-- Arrow on bow -->
  <line x1="228" y1="158" x2="260" y2="158" stroke="#d0a060" stroke-width="3"/>
  <!-- Tower door -->
  <path d="M234 460 L234 380 Q256 360 278 380 L278 460Z" fill="#3a2010"/>
  <!-- Steps -->
  <rect x="212" y="452" width="88" height="10" rx="3" fill="#5a3a20"/>
  <rect x="220" y="440" width="72" height="12" rx="3" fill="#5a3a20"/>
  <!-- Ground/grass -->
  <ellipse cx="256" cy="465" rx="140" ry="20" fill="#1a4020" opacity="0.7"/>
</svg>