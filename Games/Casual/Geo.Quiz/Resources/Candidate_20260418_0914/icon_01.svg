<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 하늘블루 배경 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <g clip-path="url(#clip01)">
    <!-- Layer 2: 국기 이모지 2×3 그리드 -->
    <!-- 🇰🇷 한국 국기 스타일 -->
    <rect x="110" y="160" width="240" height="170" rx="18" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <rect x="110" y="160" width="240" height="170" rx="18" fill="#C62828" opacity="0.08"/>
    <circle cx="230" cy="245" r="48" fill="none" stroke="#C62828" stroke-width="18"/>
    <path d="M206 221 Q230 197 254 221" stroke="#C62828" stroke-width="18" fill="none"/>
    <path d="M206 269 Q230 293 254 269" stroke="#003580" stroke-width="18" fill="none"/>

    <!-- 🇯🇵 일본 국기 스타일 -->
    <rect x="390" y="160" width="240" height="170" rx="18" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <circle cx="510" cy="245" r="56" fill="#C62828"/>

    <!-- 🇫🇷 프랑스 국기 스타일 -->
    <rect x="670" y="160" width="240" height="170" rx="18" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <rect x="670" y="160" width="80" height="170" rx="18" fill="#003189"/>
    <rect x="830" y="160" width="80" height="170" rx="18" fill="#C62828"/>
    <rect x="750" y="160" width="80" height="170" fill="#FFFFFF"/>
    <rect x="670" y="160" width="80" height="170" rx="18" fill="#003189"/>

    <!-- 🇧🇷 브라질 스타일 -->
    <rect x="110" y="370" width="240" height="170" rx="18" fill="#009C3B"/>
    <polygon points="230,385 350,455 230,525 110,455" fill="#FEDF00"/>
    <circle cx="230" cy="455" r="44" fill="#002776"/>

    <!-- 🇦🇺 호주 스타일 -->
    <rect x="390" y="370" width="240" height="170" rx="18" fill="#00008B"/>
    <rect x="390" y="370" width="96" height="68" rx="18" fill="#00008B"/>
    <!-- 유니언잭 느낌 -->
    <line x1="390" y1="370" x2="486" y2="438" stroke="#FFFFFF" stroke-width="18"/>
    <line x1="486" y1="370" x2="390" y2="438" stroke="#FFFFFF" stroke-width="18"/>
    <line x1="438" y1="370" x2="438" y2="438" stroke="#FFFFFF" stroke-width="10"/>
    <line x1="390" y1="404" x2="486" y2="404" stroke="#FFFFFF" stroke-width="10"/>

    <!-- 🇩🇪 독일 스타일 -->
    <rect x="670" y="370" width="240" height="170" rx="18" fill="#FFCE00"/>
    <rect x="670" y="370" width="240" height="57" rx="18" fill="#000000"/>
    <rect x="670" y="483" width="240" height="57" rx="18" fill="#DD0000"/>

    <!-- Layer 3: 물음표 배지 -->
    <circle cx="780" cy="780" r="140" fill="#1565C0"/>
    <text x="780" y="840" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="200" fill="#FFFFFF" text-anchor="middle">?</text>

    <!-- 퀴즈 텍스트 -->
    <rect x="110" y="572" width="490" height="76" rx="20" fill="#1565C0" opacity="0.85"/>
    <text x="355" y="622" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">GEO QUIZ</text>
  </g>
</svg>
