<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a1a"/>
      <stop offset="100%" stop-color="#000d0d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#00b3a0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wizard wand -->
  <rect x="68" y="410" width="216" height="14" rx="6" fill="#5d3209" transform="rotate(-45 176 417)"/>
  <rect x="68" y="410" width="216" height="8" rx="4" fill="#7c4a0f" opacity="0.5" transform="rotate(-45 176 417)"/>
  <!-- Star at wand tip -->
  <circle cx="340" cy="148" r="24" fill="#00e5cc" opacity="0.3"/>
  <circle cx="340" cy="148" r="16" fill="#00e5cc" opacity="0.6"/>
  <polygon points="340,128 346,142 362,142 350,152 354,168 340,158 326,168 330,152 318,142 334,142" fill="#00e5cc"/>
  <!-- Sparkles from wand -->
  <circle cx="296" cy="186" r="6" fill="#00e5cc" opacity="0.8"/>
  <circle cx="312" cy="168" r="4" fill="#00b3a0" opacity="0.7"/>
  <circle cx="274" cy="200" r="5" fill="#00e5cc" opacity="0.6"/>
  <circle cx="258" cy="218" r="4" fill="#00b3a0" opacity="0.5"/>
  <circle cx="318" cy="192" r="3" fill="#66ffee" opacity="0.7"/>
  <circle cx="284" cy="176" r="3" fill="#66ffee" opacity="0.6"/>
  <!-- Transformation: image -> ICO -->
  <!-- Source: generic image -->
  <rect x="56" y="200" width="140" height="140" rx="16" fill="#001f1f" stroke="#00b3a0" stroke-width="2"/>
  <text x="82" y="286" font-size="72">🖼️</text>
  <!-- Arrow with sparkles -->
  <line x1="196" y1="270" x2="316" y2="270" stroke="#00e5cc" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>
  <polygon points="320,270 306,262 306,278" fill="#00e5cc"/>
  <circle cx="240" cy="256" r="5" fill="#00e5cc" opacity="0.6"/>
  <circle cx="256" cy="250" r="4" fill="#00b3a0" opacity="0.7"/>
  <circle cx="248" cy="265" r="3" fill="#66ffee" opacity="0.5"/>
  <!-- Destination: ICO file -->
  <rect x="316" y="200" width="140" height="140" rx="16" fill="#001f1f" stroke="#00e5cc" stroke-width="2.5"/>
  <!-- ICO sizes stacked inside -->
  <rect x="336" y="220" width="36" height="36" rx="8" fill="#003333" stroke="#00b3a0" stroke-width="1.5"/>
  <text x="342" y="246" font-family="monospace" font-size="16" fill="#00e5cc">16</text>
  <rect x="380" y="220" width="44" height="44" rx="8" fill="#003333" stroke="#00e5cc" stroke-width="2"/>
  <text x="388" y="248" font-family="monospace" font-size="18" fill="#00e5cc">32</text>
  <rect x="336" y="272" width="52" height="52" rx="8" fill="#003333" stroke="#00b3a0" stroke-width="1.5"/>
  <text x="344" y="304" font-family="monospace" font-size="20" fill="#00e5cc">48</text>
  <rect x="395" y="272" width="44" height="44" rx="8" fill="#00e5cc" opacity="0.9"/>
  <text x="400" y="301" font-family="monospace" font-size="16" fill="#001a1a" font-weight="bold">256</text>
  <!-- ICO label -->
  <rect x="336" y="325" width="100" height="24" rx="6" fill="#00e5cc" opacity="0.8"/>
  <text x="352" y="342" font-family="monospace" font-size="14" fill="#001a1a" font-weight="bold">.ico</text>
  <!-- Step indicators bottom -->
  <circle cx="130" cy="420" r="16" fill="#00e5cc"/>
  <text x="123" y="426" font-family="monospace" font-size="14" fill="#001a1a" font-weight="bold">1</text>
  <line x1="146" y1="420" x2="226" y2="420" stroke="#00b3a0" stroke-width="2"/>
  <circle cx="242" cy="420" r="16" fill="#003333" stroke="#00e5cc" stroke-width="2"/>
  <text x="235" y="426" font-family="monospace" font-size="14" fill="#00e5cc">2</text>
  <line x1="258" y1="420" x2="338" y2="420" stroke="#00b3a0" stroke-width="2"/>
  <circle cx="354" cy="420" r="16" fill="#003333" stroke="#00b3a0" stroke-width="2"/>
  <text x="347" y="426" font-family="monospace" font-size="14" fill="#00b3a0">3</text>
  <text x="114" y="450" font-family="monospace" font-size="11" fill="#007a70">Import</text>
  <text x="226" y="450" font-family="monospace" font-size="11" fill="#007a70">Resize</text>
