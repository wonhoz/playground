  <!-- Layer 3: Path text below barcode -->
  <text x="512" y="730" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Consolas,monospace" fill="#69F0AE">C:\Users\file.txt</text>
  <!-- Clipboard copy icon bottom-right -->
  <circle cx="820" cy="840" r="80" fill="#FF6D00"/>
  <rect x="790" y="808" width="52" height="52" rx="8" fill="white" opacity="0.9"/>
