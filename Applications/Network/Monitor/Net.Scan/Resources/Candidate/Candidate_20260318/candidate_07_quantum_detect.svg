<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 양자 탐지 격자 -->
  <g opacity="0.2">
    <line x1="100" y1="100" x2="412" y2="100" stroke="#14B8A6" stroke-width="1"/>
    <line x1="100" y1="170" x2="412" y2="170" stroke="#14B8A6" stroke-width="1"/>
    <line x1="100" y1="240" x2="412" y2="240" stroke="#14B8A6" stroke-width="1"/>
    <line x1="100" y1="310" x2="412" y2="310" stroke="#14B8A6" stroke-width="1"/>
    <line x1="100" y1="380" x2="412" y2="380" stroke="#14B8A6" stroke-width="1"/>
    <line x1="100" y1="100" x2="100" y2="412" stroke="#14B8A6" stroke-width="1"/>
    <line x1="170" y1="100" x2="170" y2="412" stroke="#14B8A6" stroke-width="1"/>
    <line x1="240" y1="100" x2="240" y2="412" stroke="#14B8A6" stroke-width="1"/>
    <line x1="310" y1="100" x2="310" y2="412" stroke="#14B8A6" stroke-width="1"/>
    <line x1="380" y1="100" x2="380" y2="412" stroke="#14B8A6" stroke-width="1"/>
  </g>
  <!-- 탐지된 노드들 (강조) -->
  <rect x="155" y="155" width="30" height="30" rx="4" fill="#14B8A6" opacity="0.3" filter="url(#glow)"/>
  <rect x="295" y="225" width="30" height="30" rx="4" fill="#2DD4BF" opacity="0.25" filter="url(#glow)"/>
  <rect x="225" y="295" width="30" height="30" rx="4" fill="#14B8A6" opacity="0.25" filter="url(#glow)"/>
  <rect x="365" y="155" width="30" height="30" rx="4" fill="#2DD4BF" opacity="0.2"/>
  <!-- 탐지 포인트 -->
  <circle cx="170" cy="170" r="7" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="310" cy="240" r="7" fill="#2DD4BF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="240" cy="310" r="7" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="380" cy="170" r="6" fill="#2DD4BF" opacity="0.7"/>
  <!-- 스캔 라인 -->
  <line x1="100" y1="256" x2="412" y2="256" stroke="#14B8A6" stroke-width="2.5" opacity="0.6" filter="url(#glow)" stroke-dasharray="10,5"/>
  <rect x="100" y="250" width="312" height="12" rx="6" fill="#14B8A6" opacity="0.05"/>
  <!-- 결과 수 -->
  <text x="256" y="440" text-anchor="middle" fill="#14B8A6" font-size="13" font-family="monospace" opacity="0.7">DETECTED: 4 HOSTS</text>
</svg>