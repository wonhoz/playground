<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
<!-- 컨셉: 타임라인 부팅 단계 -->
<!-- 타임라인 수직선 -->
<line x1="512" y1="180" x2="512" y2="840" stroke="#1565C0" stroke-width="20" stroke-linecap="round"/>
<!-- 단계 1 (맨 위) -->
<circle cx="512" cy="240" r="32" fill="#42A5F5"/>
<rect x="560" y="218" width="200" height="44" rx="12" fill="#1565C0" opacity="0.8"/>
<!-- 단계 2 -->
<circle cx="512" cy="360" r="32" fill="#42A5F5"/>
<rect x="260" y="338" width="200" height="44" rx="12" fill="#1565C0" opacity="0.8"/>
<!-- 단계 3 -->
<circle cx="512" cy="480" r="32" fill="#42A5F5"/>
<rect x="560" y="458" width="200" height="44" rx="12" fill="#1565C0" opacity="0.8"/>
<!-- 단계 4 -->
<circle cx="512" cy="600" r="32" fill="#1565C0" stroke="#42A5F5" stroke-width="16"/>
<rect x="260" y="578" width="200" height="44" rx="12" fill="#1565C0" opacity="0.5" stroke="#42A5F5" stroke-width="10" stroke-dasharray="10 6"/>
<!-- 단계 5 (미래) -->
<circle cx="512" cy="720" r="32" fill="#1565C0" opacity="0.4"/>
<rect x="560" y="698" width="200" height="44" rx="12" fill="#1565C0" opacity="0.3"/>
<!-- 현재 진행 표시 (화살표) -->
<circle cx="512" cy="600" r="56" fill="none" stroke="#42A5F5" stroke-width="16" stroke-dasharray="20 10"/>
<!-- 타임 마커 (작은 점들) -->
<circle cx="512" cy="300" r="8" fill="#42A5F5" opacity="0.5"/>
<circle cx="512" cy="420" r="8" fill="#42A5F5" opacity="0.5"/>
<circle cx="512" cy="540" r="8" fill="#42A5F5" opacity="0.5"/>
</svg>
