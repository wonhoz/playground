<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sunburst: inner ring (4 segments) -->
  <!-- Segment 1: top-right ~90deg -->
  <path d="M256,256 L256,156 A100,100 0 0,1 356,256 Z" fill="#F97316" opacity="0.9"/>
  <!-- Segment 2: bottom-right -->
  <path d="M256,256 L356,256 A100,100 0 0,1 256,356 Z" fill="#3B82F6" opacity="0.9"/>
  <!-- Segment 3: bottom-left -->
  <path d="M256,256 L256,356 A100,100 0 0,1 156,256 Z" fill="#22C55E" opacity="0.9"/>
  <!-- Segment 4: top-left -->
  <path d="M256,256 L156,256 A100,100 0 0,1 256,156 Z" fill="#A855F7" opacity="0.9"/>
  <!-- Outer ring (8 smaller segments) -->
  <path d="M256,256 L310,138 A145,145 0 0,1 401,201 Z" fill="#FB923C" opacity="0.75"/>
  <path d="M256,256 L401,201 A145,145 0 0,1 401,311 Z" fill="#60A5FA" opacity="0.75"/>
  <path d="M256,256 L401,311 A145,145 0 0,1 310,374 Z" fill="#34D399" opacity="0.75"/>
  <path d="M256,256 L310,374 A145,145 0 0,1 202,374 Z" fill="#4ADE80" opacity="0.75"/>
  <path d="M256,256 L202,374 A145,145 0 0,1 111,311 Z" fill="#86EFAC" opacity="0.75"/>
  <path d="M256,256 L111,311 A145,145 0 0,1 111,201 Z" fill="#C084FC" opacity="0.75"/>
  <path d="M256,256 L111,201 A145,145 0 0,1 202,138 Z" fill="#D946EF" opacity="0.75"/>
  <path d="M256,256 L202,138 A145,145 0 0,1 310,138 Z" fill="#FBBF24" opacity="0.75"/>
  <!-- Outer outermost ring strip -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#F97316" stroke-width="18" stroke-dasharray="60,10" stroke-linecap="round" opacity="0.4"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="50" fill="#0A0A12" stroke="#374151" stroke-width="2"/>
  <text x="256" y="252" font-family="sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">C:\</text>
  <text x="256" y="268" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">1TB</text>
  <!-- Gap lines between segments -->
  <line x1="256" y1="106" x2="256" y2="156" stroke="#050508" stroke-width="3"/>
  <line x1="406" y1="256" x2="356" y2="256" stroke="#050508" stroke-width="3"/>
  <line x1="256" y1="406" x2="256" y2="356" stroke="#050508" stroke-width="3"/>
  <line x1="106" y1="256" x2="156" y2="256" stroke="#050508" stroke-width="3"/>
</svg>
