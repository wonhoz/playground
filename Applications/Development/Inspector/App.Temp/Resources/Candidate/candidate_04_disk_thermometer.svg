<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#14142A"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Thermometer body -->
  <rect x="226" y="80" width="60" height="280" rx="30" fill="#1E293B" stroke="#334155" stroke-width="3"/>
  <!-- Mercury fill -->
  <rect x="238" y="180" width="36" height="180" rx="18" fill="url(#mercury)"/>
  <!-- Bulb -->
  <circle cx="256" cy="380" r="36" fill="#EF4444" stroke="#334155" stroke-width="3"/>
  <circle cx="256" cy="380" r="28" fill="#FCA5A5"/>
  <!-- Tick marks -->
  <line x1="286" y1="120" x2="310" y2="120" stroke="#475569" stroke-width="2"/>
  <line x1="286" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2"/>
  <line x1="286" y1="200" x2="310" y2="200" stroke="#475569" stroke-width="2"/>
  <line x1="286" y1="240" x2="310" y2="240" stroke="#475569" stroke-width="2"/>
  <line x1="286" y1="280" x2="310" y2="280" stroke="#475569" stroke-width="2"/>
  <line x1="286" y1="320" x2="310" y2="320" stroke="#475569" stroke-width="2"/>
  <text x="318" y="125" font-family="monospace" font-size="13" fill="#888">CLEAN</text>
  <text x="318" y="205" font-family="monospace" font-size="13" fill="#F59E0B">WARM</text>
  <text x="318" y="285" font-family="monospace" font-size="13" fill="#EF4444">HOT!</text>
  <!-- Label -->
  <text x="256" y="465" font-family="monospace" font-weight="bold" font-size="22" fill="#60A5FA" text-anchor="middle">App.Temp</text>
  <text x="145" y="465" font-family="monospace" font-size="12" fill="#888">Temp</text>
  <text x="340" y="465" font-family="monospace" font-size="12" fill="#888">Files</text>
</svg>