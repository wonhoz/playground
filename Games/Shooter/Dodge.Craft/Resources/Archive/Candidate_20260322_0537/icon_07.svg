<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: Hybrid / 대각선·동적 / Bomb 폭발 + 탄막 제거 장면 -->
  <!-- 배경: 다크 오렌지 -->
  <rect width="1024" height="1024" rx="160" fill="#180800"/>

  <!-- 폭발 빛 배경 -->
  <radialGradient id="g07exp" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#FF4500" stop-opacity="0.45"/>
    <stop offset="50%" stop-color="#8B2500" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#180800" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="160" fill="url(#g07exp)"/>

  <!-- 폭발 이펙트 레이어 1 (바깥) -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#FF4500" stroke-width="4" opacity="0.3"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#FF6600" stroke-width="6" opacity="0.4"/>

  <!-- 폭발 광선 (방사형) -->
  <g stroke="#FF6600" stroke-width="5" opacity="0.6">
    <line x1="512" y1="512" x2="512" y2="260"/>
    <line x1="512" y1="512" x2="702" y2="322"/>
    <line x1="512" y1="512" x2="764" y2="512"/>
    <line x1="512" y1="512" x2="702" y2="702"/>
    <line x1="512" y1="512" x2="512" y2="764"/>
    <line x1="512" y1="512" x2="322" y2="702"/>
    <line x1="512" y1="512" x2="260" y2="512"/>
    <line x1="512" y1="512" x2="322" y2="322"/>
  </g>

  <!-- 폭발 광선 (대각, 얇음) -->
  <g stroke="#FFD700" stroke-width="3" opacity="0.4">
    <line x1="512" y1="512" x2="612" y2="290"/>
    <line x1="512" y1="512" x2="734" y2="412"/>
    <line x1="512" y1="512" x2="734" y2="612"/>
    <line x1="512" y1="512" x2="612" y2="734"/>
    <line x1="512" y1="512" x2="412" y2="734"/>
    <line x1="512" y1="512" x2="290" y2="612"/>
    <line x1="512" y1="512" x2="290" y2="412"/>
    <line x1="512" y1="512" x2="412" y2="290"/>
  </g>

  <!-- 폭발 코어 -->
  <circle cx="512" cy="512" r="110" fill="#FF4500" opacity="0.85"/>
  <circle cx="512" cy="512" r="80" fill="#FF6600"/>
  <circle cx="512" cy="512" r="55" fill="#FFD700"/>
  <circle cx="512" cy="512" r="30" fill="#FFFFFF" opacity="0.9"/>

  <!-- Bomb 구조물 잔해 (중앙) -->
  <circle cx="512" cy="512" r="36" fill="#FF4500" stroke="#8B2500" stroke-width="4"/>
  <rect x="506" y="472" width="12" height="24" rx="4" fill="#8B4513"/>

  <!-- 파괴된 탄막들 (주변에 흩어짐) -->
  <g opacity="0.7">
    <circle cx="400" cy="360" r="10" fill="#FF3333" opacity="0.6"/>
    <circle cx="640" cy="340" r="8" fill="#FF3333" opacity="0.5"/>
    <circle cx="350" cy="540" r="10" fill="#FF3333" opacity="0.6"/>
    <circle cx="700" cy="580" r="9" fill="#FF3333" opacity="0.5"/>
    <circle cx="420" cy="680" r="8" fill="#FF3333" opacity="0.5"/>
    <circle cx="640" cy="700" r="10" fill="#FF3333" opacity="0.6"/>
    <!-- 파괴 이펙트 X 마크들 -->
    <g stroke="#FF0000" stroke-width="3" opacity="0.7">
      <line x1="390" y1="350" x2="410" y2="370"/>
      <line x1="410" y1="350" x2="390" y2="370"/>
      <line x1="630" y1="330" x2="650" y2="350"/>
      <line x1="650" y1="330" x2="630" y2="350"/>
    </g>
  </g>

  <!-- 플레이어 (핑크, 안전하게 멀리) -->
  <circle cx="290" cy="740" r="30" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="4"/>
  <circle cx="290" cy="740" r="13" fill="#FFD6EC"/>

  <!-- 자원 드랍 -->
  <polygon points="740,740 756,762 740,784 724,762" fill="#FFD700" stroke="#FFA500" stroke-width="2.5"/>
  <polygon points="770,720 782,738 770,756 758,738" fill="#FFD700" stroke="#FFA500" stroke-width="2" opacity="0.7"/>

  <!-- BOOM! 텍스트 -->
  <text x="512" y="870" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FF6600" opacity="0.9" letter-spacing="2">BOOM!</text>
</svg>
