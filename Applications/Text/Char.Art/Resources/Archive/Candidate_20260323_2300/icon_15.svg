<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <clipPath id="clip15"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg15)"/>
  <g clip-path="url(#clip15)">
    <!-- 팔레트 본체 (타원형) -->
    <ellipse cx="510" cy="530" rx="360" ry="280" fill="#D97706"/>
    <ellipse cx="510" cy="530" rx="340" ry="260" fill="#B45309"/>
    <!-- 엄지 구멍 -->
    <ellipse cx="320" cy="420" rx="70" ry="55" fill="#78350F"/>
    <!-- 팔레트 위의 물감 점들 (색상 스팟) -->
    <circle cx="240" cy="560" r="36" fill="#EF4444"/>
    <circle cx="340" cy="620" r="36" fill="#F97316"/>
    <circle cx="450" cy="660" r="36" fill="#FDE68A"/>
    <circle cx="570" cy="660" r="36" fill="#22C55E"/>
    <circle cx="680" cy="620" r="36" fill="#3B82F6"/>
    <circle cx="760" cy="555" r="36" fill="#A855F7"/>
    <!-- 팔레트 테두리 -->
    <ellipse cx="510" cy="530" rx="360" ry="280" fill="none" stroke="#FDE68A" stroke-width="12"/>
    <!-- 컬러풀 ASCII 문자들이 팔레트 안을 가득 채움 -->
    <text x="270" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#EF4444" opacity="0.9">@</text>
    <text x="360" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#F97316" opacity="0.9">#</text>
    <text x="450" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#FDE68A" opacity="0.9">$</text>
    <text x="540" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#22C55E" opacity="0.9">%</text>
    <text x="630" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#60A5FA" opacity="0.9">&amp;</text>
    <text x="710" y="490" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#A855F7" opacity="0.9">*</text>
    <text x="295" y="555" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#FCA5A5" opacity="0.7">+</text>
    <text x="385" y="555" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#FED7AA" opacity="0.7">=</text>
    <text x="475" y="555" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#A7F3D0" opacity="0.7">~</text>
    <text x="565" y="555" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#BAE6FD" opacity="0.7">!</text>
    <text x="645" y="555" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#DDD6FE" opacity="0.7">^</text>
    <!-- 붓 (팔레트 위에 놓인) -->
    <rect x="640" y="200" width="30" height="240" rx="10" fill="#92400E" transform="rotate(35,655,320)"/>
    <ellipse cx="686" cy="248" rx="22" ry="36" fill="#FDE68A" transform="rotate(35,686,248)"/>
    <!-- 라벨 -->
    <text x="512" y="870" font-size="42" font-weight="bold" font-family="system-ui" fill="#FDE68A" text-anchor="middle">ASCII Palette</text>
    <text x="512" y="930" font-size="28" font-family="system-ui" fill="#FED7AA" text-anchor="middle">Art from Characters</text>
  </g>
</svg>
