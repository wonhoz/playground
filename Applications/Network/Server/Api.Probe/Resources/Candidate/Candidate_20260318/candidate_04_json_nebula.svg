<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 성운 배경 -->
  <circle cx="256" cy="256" r="160" fill="url(#nebula)"/>
  <circle cx="200" cy="210" r="80" fill="url(#nebula)" opacity="0.6"/>
  <!-- JSON 구조 시각화 -->
  <rect x="110" y="130" width="292" height="260" rx="10" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <!-- 중괄호 -->
  <text x="120" y="165" fill="#A78BFA" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">{</text>
  <text x="382" y="375" fill="#A78BFA" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">}</text>
  <!-- JSON 키-값들 -->
  <text x="145" y="195" fill="#8B5CF6" font-size="12" font-family="monospace" opacity="0.8">"endpoint": "/api/v2"</text>
  <text x="145" y="220" fill="#8B5CF6" font-size="12" font-family="monospace" opacity="0.7">"method": "GET"</text>
  <text x="145" y="245" fill="#A78BFA" font-size="12" font-family="monospace" opacity="0.9">"status": 200</text>
  <text x="145" y="270" fill="#8B5CF6" font-size="12" font-family="monospace" opacity="0.6">"latency": 42</text>
  <text x="145" y="295" fill="#8B5CF6" font-size="12" font-family="monospace" opacity="0.5">"body": {</text>
  <text x="165" y="320" fill="#A78BFA" font-size="11" font-family="monospace" opacity="0.6">  "data": [...]</text>
  <text x="145" y="345" fill="#8B5CF6" font-size="12" font-family="monospace" opacity="0.5">}</text>
  <!-- 데이터 흐름 점들 -->
  <circle cx="420" cy="200" r="5" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="430" cy="256" r="4" fill="#A78BFA" opacity="0.5"/>
  <circle cx="420" cy="312" r="5" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
</svg>