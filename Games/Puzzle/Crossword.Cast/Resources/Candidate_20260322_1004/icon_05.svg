<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 에메랄드 딥그린 계열 -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#021A0F"/>

  <!-- Layer 1: 완성된 크로스워드 격자 (5x5) -->
  <!-- 막힌 칸 -->
  <rect x="198" y="198" width="112" height="112" rx="7" fill="#033D1E"/>
  <rect x="444" y="198" width="112" height="112" rx="7" fill="#033D1E"/>
  <rect x="690" y="198" width="136" height="112" rx="7" fill="#033D1E"/>
  <rect x="198" y="444" width="112" height="112" rx="7" fill="#033D1E"/>
  <rect x="690" y="444" width="136" height="112" rx="7" fill="#033D1E"/>
  <rect x="198" y="690" width="112" height="136" rx="7" fill="#033D1E"/>
  <rect x="444" y="690" width="112" height="136" rx="7" fill="#033D1E"/>
  <rect x="690" y="690" width="136" height="136" rx="7" fill="#033D1E"/>

  <!-- 입력 완료 칸 (채워진 칸 — 에메랄드 계열) -->
  <!-- 1행 -->
  <rect x="320" y="198" width="114" height="112" rx="7" fill="#1B5E20" opacity="0.9"/>
  <rect x="556" y="198" width="124" height="112" rx="7" fill="#1B5E20" opacity="0.9"/>
  <!-- 2행 -->
  <rect x="198" y="320" width="112" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="320" y="320" width="114" height="114" rx="7" fill="#4CAF50"/>
  <rect x="444" y="320" width="112" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="556" y="320" width="124" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="690" y="320" width="136" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <!-- 3행 -->
  <rect x="320" y="444" width="114" height="112" rx="7" fill="#4CAF50"/>
  <rect x="444" y="444" width="112" height="112" rx="7" fill="#66BB6A"/>
  <rect x="556" y="444" width="124" height="112" rx="7" fill="#4CAF50"/>
  <!-- 4행 -->
  <rect x="198" y="566" width="112" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="320" y="566" width="114" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="444" y="566" width="112" height="114" rx="7" fill="#4CAF50"/>
  <rect x="556" y="566" width="124" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <rect x="690" y="566" width="136" height="114" rx="7" fill="#2E7D32" opacity="0.9"/>
  <!-- 5행 -->
  <rect x="320" y="690" width="114" height="136" rx="7" fill="#1B5E20" opacity="0.9"/>
  <rect x="556" y="690" width="124" height="136" rx="7" fill="#1B5E20" opacity="0.9"/>

  <!-- Layer 2: 알파벳 (완성된 단어들) -->
  <!-- 가로: FIND (3행) -->
  <text x="377" y="502" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#E8F5E9" text-anchor="middle" dominant-baseline="middle">F</text>
  <text x="500" y="502" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="618" y="502" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#E8F5E9" text-anchor="middle" dominant-baseline="middle">N</text>

  <!-- 세로: WIN (2열) -->
  <text x="377" y="256" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">W</text>
  <text x="377" y="378" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#81C784" text-anchor="middle" dominant-baseline="middle">I</text>
  <!-- F 교차 (이미 표시) -->
  <text x="377" y="625" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">D</text>
  <text x="377" y="756" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">!</text>

  <!-- 다른 채워진 알파벳들 -->
  <text x="254" y="378" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">A</text>
  <text x="500" y="378" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">N</text>
  <text x="618" y="378" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">G</text>
  <text x="758" y="378" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">S</text>

  <text x="254" y="625" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">B</text>
  <text x="500" y="625" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#81C784" text-anchor="middle" dominant-baseline="middle">D</text>
  <text x="618" y="625" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">S</text>
  <text x="758" y="625" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">T</text>

  <text x="618" y="256" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">G</text>
  <text x="618" y="756" font-family="'Arial Black', Arial" font-weight="900" font-size="78" fill="#A5D6A7" text-anchor="middle" dominant-baseline="middle">O</text>

  <!-- Layer 3: 체크마크 오버레이 (완성 표시) — 우하단 -->
  <!-- 체크 배경 원 -->
  <circle cx="758" cy="758" r="0" fill="none"/>
  <!-- 황금빛 별 / 완성 배지 -->
  <circle cx="762" cy="790" r="85" fill="#F9A825" opacity="0.15"/>
  <circle cx="762" cy="790" r="68" fill="#F57F17"/>
  <circle cx="762" cy="790" r="60" fill="#FFD600"/>

  <!-- 체크 표시 -->
  <polyline points="730,790 752,816 800,762" fill="none" stroke="#1A4A00" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 완성 반짝임 (스파클) -->
  <g fill="#FFD600" opacity="0.9">
    <polygon points="200,860 207,875 224,875 211,884 216,900 200,890 184,900 189,884 176,875 193,875" transform="scale(0.6) translate(165,615)"/>
  </g>
  <line x1="210" y1="830" x2="210" y2="810" stroke="#FFD600" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="200" y1="820" x2="220" y2="820" stroke="#FFD600" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="196" y1="814" x2="202" y2="826" stroke="#FFD600" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="204" y1="810" x2="216" y2="830" stroke="#FFD600" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
