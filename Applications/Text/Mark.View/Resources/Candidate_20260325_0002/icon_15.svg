<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#EDE7F6"/>
  <!-- Layer 2: 기호들 귀엽게 패턴 -->
  <!-- 큰 "#" 중앙 (보라) -->
  <circle cx="512" cy="430" r="200" fill="#D1C4E9"/>
  <text x="512" y="510" text-anchor="middle" font-family="Arial Black" font-size="310" font-weight="900" fill="#6A1B9A">#</text>
  <!-- "**" 노랑 원 배경 -->
  <circle cx="280" cy="290" r="90" fill="#FFF9C4"/>
  <text x="280" y="316" text-anchor="middle" font-family="Arial Black" font-size="120" font-weight="900" fill="#F9A825">**</text>
  <!-- ">" 초록 원 배경 -->
  <circle cx="744" cy="290" r="90" fill="#E8F5E9"/>
  <text x="744" y="320" text-anchor="middle" font-family="Arial Black" font-size="130" font-weight="900" fill="#2E7D32">&gt;</text>
  <!-- "-" 오렌지 원 배경 -->
  <circle cx="270" cy="720" r="90" fill="#FFF3E0"/>
  <text x="270" y="754" text-anchor="middle" font-family="Arial Black" font-size="160" font-weight="900" fill="#E65100">-</text>
  <!-- "`" 파란 원 배경 -->
  <circle cx="754" cy="720" r="90" fill="#E3F2FD"/>
  <text x="754" y="756" text-anchor="middle" font-family="Arial Black" font-size="150" font-weight="900" fill="#1565C0">`</text>
  <!-- Layer 3: 연결선 -->
  <line x1="364" y1="310" x2="422" y2="340" stroke="#9575CD" stroke-width="6" stroke-dasharray="12,8" opacity="0.7"/>
  <line x1="660" y1="310" x2="602" y2="340" stroke="#9575CD" stroke-width="6" stroke-dasharray="12,8" opacity="0.7"/>
  <line x1="354" y1="654" x2="422" y2="594" stroke="#9575CD" stroke-width="6" stroke-dasharray="12,8" opacity="0.7"/>
  <line x1="670" y1="654" x2="602" y2="594" stroke="#9575CD" stroke-width="6" stroke-dasharray="12,8" opacity="0.7"/>
  <!-- 하단 텍스트 -->
  <text x="512" y="888" text-anchor="middle" font-family="Arial Black" font-size="78" font-weight="900" fill="#6A1B9A">Markdown</text>
</svg>