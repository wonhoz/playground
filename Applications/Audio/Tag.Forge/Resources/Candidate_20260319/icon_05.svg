<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: MusicBrainz globe + magnifier (auto-fetch metadata) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#001122"/>
  <!-- Globe -->
  <circle cx="460" cy="460" r="280" fill="#002244" stroke="#2196F3" stroke-width="22"/>
  <!-- Latitude lines -->
  <ellipse cx="460" cy="460" rx="280" ry="90" fill="none" stroke="#2196F3" stroke-width="14" opacity="0.6"/>
  <ellipse cx="460" cy="380" rx="240" ry="50" fill="none" stroke="#2196F3" stroke-width="10" opacity="0.4"/>
  <ellipse cx="460" cy="540" rx="240" ry="50" fill="none" stroke="#2196F3" stroke-width="10" opacity="0.4"/>
  <!-- Vertical longitude -->
  <line x1="460" y1="180" x2="460" y2="740" stroke="#2196F3" stroke-width="14" opacity="0.6"/>
  <path d="M340 190 Q280 340 290 460 Q300 580 340 730" fill="none" stroke="#2196F3" stroke-width="12" opacity="0.4"/>
  <path d="M580 190 Q640 340 630 460 Q620 580 580 730" fill="none" stroke="#2196F3" stroke-width="12" opacity="0.4"/>
  <!-- Music note on globe -->
  <rect x="436" y="340" width="26" height="160" rx="7" fill="#64B5F6"/>
  <ellipse cx="424" cy="500" rx="44" ry="32" fill="#64B5F6" transform="rotate(-12, 424, 500)"/>
  <path d="M462 340 L530 320 L530 348 L462 368 Z" fill="#64B5F6"/>
  <!-- Magnifier -->
  <circle cx="720" cy="700" r="90" fill="none" stroke="#FF9800" stroke-width="32"/>
  <line x1="790" y1="770" x2="860" y2="840" stroke="#FF9800" stroke-width="32" stroke-linecap="round"/>
</svg>
