<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE74A"/>
      <stop offset="1" stop-color="#FF8A1F"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="190" fill="url(#bg05)"/>
  <!-- 4 arrows pointing at center, leaving safe gap -->
  <g fill="#1E40AF" stroke="#0B1F66" stroke-width="10" stroke-linejoin="round">
    <polygon points="512,140 592,300 552,300 552,360 472,360 472,300 432,300"/>
    <polygon points="884,512 724,432 724,472 664,472 664,552 724,552 724,592"/>
    <polygon points="512,884 432,724 472,724 472,664 552,664 552,724 592,724"/>
    <polygon points="140,512 300,592 300,552 360,552 360,472 300,472 300,432"/>
  </g>
  <!-- safe center (empty space = dodge) -->
  <circle cx="512" cy="512" r="150" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#1E40AF" stroke-width="12" stroke-dasharray="22 14"/>
  <!-- diamond inside -->
  <polygon points="512,420 600,512 512,604 424,512" fill="#0FFFD0" stroke="#0B1F66" stroke-width="10"/>
</svg>
