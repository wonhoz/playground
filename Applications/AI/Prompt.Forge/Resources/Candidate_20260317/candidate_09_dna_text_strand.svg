  <g filter="url(#glow09)">
    <line x1="145" y1="190" x2="367" y2="190" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="186" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">T</text>
  </g>

