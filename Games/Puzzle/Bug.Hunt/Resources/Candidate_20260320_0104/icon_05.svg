<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Footprint trail 1 -->
  <ellipse cx="300" cy="280" rx="35" ry="50" fill="#E65100" fill-opacity="0.8" transform="rotate(-20,300,280)"/>
  <ellipse cx="370" cy="240" rx="28" ry="40" fill="#E65100" fill-opacity="0.7" transform="rotate(-20,370,240)"/>
  <!-- Footprint trail 2 -->
  <ellipse cx="450" cy="350" rx="35" ry="50" fill="#E65100" fill-opacity="0.75" transform="rotate(15,450,350)"/>
  <ellipse cx="510" cy="300" rx="28" ry="40" fill="#E65100" fill-opacity="0.65" transform="rotate(15,510,300)"/>
  <!-- Footprint trail 3 (larger, closer) -->
  <ellipse cx="590" cy="440" rx="40" ry="58" fill="#FFAB40" fill-opacity="0.75" transform="rotate(-10,590,440)"/>
  <ellipse cx="660" cy="390" rx="32" ry="46" fill="#FFAB40" fill-opacity="0.65" transform="rotate(-10,660,390)"/>
  <!-- Footprint trail 4 (largest, at target) -->
  <ellipse cx="680" cy="580" rx="48" ry="68" fill="#FFAB40" fill-opacity="0.8" transform="rotate(20,680,580)"/>
  <ellipse cx="750" cy="520" rx="38" ry="54" fill="#FFAB40" fill-opacity="0.7" transform="rotate(20,750,520)"/>
  <!-- Target circle at end -->
  <circle cx="720" cy="700" r="80" fill="none" stroke="#E65100" stroke-width="20"/>
  <circle cx="720" cy="700" r="40" fill="#E65100" fill-opacity="0.6"/>
  <!-- Dotted path -->
  <path d="M330 280 Q500 420 690 660" fill="none" stroke="#FFAB40" stroke-width="8" stroke-dasharray="16,12" stroke-opacity="0.4"/>
</svg>