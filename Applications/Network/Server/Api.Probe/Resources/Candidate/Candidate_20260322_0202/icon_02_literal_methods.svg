<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 네이비 -->
  <rect width="1024" height="1024" rx="180" fill="#0F172A"/>
  <rect x="30" y="30" width="964" height="964" rx="160" fill="#1E2D4A"/>

  <!-- 중앙 제목 텍스트: API -->
  <text x="512" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="120" font-weight="900" fill="#E2E8F0" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">API</text>
  <text x="512" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="34" fill="#64748B" text-anchor="middle" dominant-baseline="middle" letter-spacing="6">PROBE</text>

  <!-- 4개의 HTTP 메서드 배지 -->
  <!-- GET -->
  <rect x="110" y="340" width="180" height="68" rx="10" fill="#14B8A6"/>
  <text x="200" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">GET</text>

  <!-- POST -->
  <rect x="310" y="340" width="180" height="68" rx="10" fill="#22C55E"/>
  <text x="400" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">POST</text>

  <!-- PUT -->
  <rect x="510" y="340" width="180" height="68" rx="10" fill="#F59E0B"/>
  <text x="600" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">PUT</text>

  <!-- DELETE -->
  <rect x="710" y="340" width="204" height="68" rx="10" fill="#EF4444"/>
  <text x="812" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">DELETE</text>

  <!-- 응답 코드 줄 -->
  <line x1="110" y1="460" x2="914" y2="460" stroke="#334155" stroke-width="2"/>

  <!-- 200 OK -->
  <rect x="110" y="480" width="180" height="68" rx="10" fill="#166534"/>
  <text x="200" y="514" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="900" fill="#86EFAC" text-anchor="middle" dominant-baseline="middle">200 OK</text>

  <!-- 404 NOT FOUND -->
  <rect x="310" y="480" width="240" height="68" rx="10" fill="#7C2D12"/>
  <text x="430" y="514" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#FCA5A5" text-anchor="middle" dominant-baseline="middle">404 NOT FOUND</text>

  <!-- 500 ERROR -->
  <rect x="570" y="480" width="200" height="68" rx="10" fill="#450A0A"/>
  <text x="670" y="514" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#F87171" text-anchor="middle" dominant-baseline="middle">500 ERROR</text>

  <!-- 하단 JSON 중괄호 데코 -->
  <text x="200" y="680" font-family="'Courier New', monospace" font-size="180" fill="#334155" text-anchor="middle" dominant-baseline="middle" opacity="0.6">{</text>
  <text x="820" y="680" font-family="'Courier New', monospace" font-size="180" fill="#334155" text-anchor="middle" dominant-baseline="middle" opacity="0.6">}</text>

  <!-- 중앙 화살표 -->
  <line x1="300" y1="680" x2="720" y2="680" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <polyline points="700,660 724,680 700,700" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
