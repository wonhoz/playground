<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00FFEE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <!-- Corner TL -->
    <rect x="90" y="90" width="120" height="120" rx="10" fill="none" stroke="url(#neon)" stroke-width="16"/>
    <rect x="114" y="114" width="72" height="72" rx="4" fill="url(#neon)" opacity="0.85"/>
    <!-- Corner TR -->
    <rect x="302" y="90" width="120" height="120" rx="10" fill="none" stroke="url(#neon)" stroke-width="16"/>
    <rect x="326" y="114" width="72" height="72" rx="4" fill="url(#neon)" opacity="0.85"/>
    <!-- Corner BL -->
    <rect x="90" y="302" width="120" height="120" rx="10" fill="none" stroke="url(#neon)" stroke-width="16"/>
    <rect x="114" y="326" width="72" height="72" rx="4" fill="url(#neon)" opacity="0.85"/>
    <!-- Data matrix -->
    <rect x="302" y="302" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="334" y="302" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="366" y="302" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="302" y="334" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="366" y="334" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="334" y="366" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="398" y="302" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="398" y="366" width="20" height="20" rx="3" fill="url(#neon)"/>
    <rect x="334" y="334" width="20" height="20" rx="3" fill="url(#neon)" opacity="0.5"/>
  </g>
</svg>
