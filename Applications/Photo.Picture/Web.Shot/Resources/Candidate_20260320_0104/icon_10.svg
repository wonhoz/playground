  <ellipse cx="512" cy="300" rx="38" ry="90" fill="none" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="422" y1="300" x2="602" y2="300" stroke="#4FC3F7" stroke-width="10"/>
