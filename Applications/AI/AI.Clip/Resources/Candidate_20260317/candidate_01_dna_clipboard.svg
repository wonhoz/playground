  <circle cx="115" cy="155" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="93" cy="205" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="117" cy="255" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="95" cy="305" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="115" cy="355" r="4" fill="#00ccff" opacity="0.9" filter="url(#glow01)"/>
  <circle cx="93" cy="405" r="4" fill="#00ff88" opacity="0.9" filter="url(#glow01)"/>

