<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#001133"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="360" x2="432" y2="360" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="80" x2="160" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="80" x2="200" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="80" x2="240" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="80" x2="280" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="80" x2="320" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="80" x2="360" y2="440" stroke="#4488BB" stroke-width="1" opacity="0.4"/>
  <!-- Document outline -->
  <rect x="130" y="90" width="220" height="290" rx="6" fill="none" stroke="#88CCFF" stroke-width="3"/>
  <!-- Corner fold -->
  <polyline points="290,90 350,90 350,150" fill="none" stroke="#88CCFF" stroke-width="3"/>
  <line x1="290" y1="90" x2="350" y2="150" stroke="#88CCFF" stroke-width="2"/>
  <!-- Technical dimension lines -->
  <line x1="110" y1="90" x2="110" y2="380" stroke="#4499FF" stroke-width="2"/>
  <line x1="102" y1="90" x2="118" y2="90" stroke="#4499FF" stroke-width="2"/>
  <line x1="102" y1="380" x2="118" y2="380" stroke="#4499FF" stroke-width="2"/>
  <text x="96" y="240" font-family="monospace" font-size="11" fill="#4499FF" text-anchor="middle" transform="rotate(-90, 96, 240)">290px</text>
  <!-- PDF text in blueprint style -->
  <text x="220" y="240" font-family="monospace" font-size="60" fill="#88CCFF" text-anchor="middle" font-weight="bold" opacity="0.9">PDF</text>
  <!-- Tech annotations -->
  <circle cx="155" cy="115" r="5" fill="#4499FF"/>
  <line x1="155" y1="115" x2="155" y2="115" stroke="#4499FF" stroke-width="1"/>
  <text x="165" y="112" font-family="monospace" font-size="11" fill="#4499FF">v4.3</text>
  <!-- Revision block bottom right -->
  <rect x="270" y="320" width="80" height="60" rx="3" fill="none" stroke="#88CCFF" stroke-width="2"/>
  <line x1="270" y1="340" x2="350" y2="340" stroke="#88CCFF" stroke-width="1"/>
  <text x="310" y="336" font-family="monospace" font-size="9" fill="#88CCFF" text-anchor="middle">REV</text>
  <text x="310" y="358" font-family="monospace" font-size="12" fill="#AADDFF" text-anchor="middle" font-weight="bold">A</text>
  <text x="310" y="373" font-family="monospace" font-size="9" fill="#88CCFF" text-anchor="middle">FORGE</text>
</svg>
