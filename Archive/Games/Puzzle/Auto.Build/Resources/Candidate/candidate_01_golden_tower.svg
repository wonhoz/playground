<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#3d2e00"/>
    </linearGradient>
    <linearGradient id="block" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6600"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="80" y="420" width="352" height="20" rx="4" fill="#B8860B" opacity="0.6"/>
  <!-- Building blocks stacked -->
  <rect x="156" y="380" width="200" height="44" rx="6" fill="url(#block)"/>
  <rect x="176" y="330" width="160" height="44" rx="6" fill="url(#block)" opacity="0.95"/>
  <rect x="196" y="280" width="120" height="44" rx="6" fill="url(#block)" opacity="0.9"/>
  <rect x="216" y="230" width="80" height="44" rx="6" fill="url(#block)" opacity="0.85"/>
  <rect x="232" y="185" width="48" height="40" rx="6" fill="url(#block)" opacity="0.8"/>
  <!-- Window details on blocks -->
  <rect x="178" y="390" width="12" height="18" rx="2" fill="#1a1200" opacity="0.5"/>
  <rect x="200" y="390" width="12" height="18" rx="2" fill="#1a1200" opacity="0.5"/>
  <rect x="300" y="390" width="12" height="18" rx="2" fill="#1a1200" opacity="0.5"/>
  <rect x="322" y="390" width="12" height="18" rx="2" fill="#1a1200" opacity="0.5"/>
  <!-- Gear icon top right -->
  <circle cx="390" cy="122" r="48" fill="url(#gear)" opacity="0.9"/>
  <circle cx="390" cy="122" r="28" fill="#1a1200"/>
  <circle cx="390" cy="122" r="12" fill="url(#gear)"/>
  <!-- Gear teeth -->
  <rect x="382" y="68" width="16" height="18" rx="4" fill="url(#gear)"/>
  <rect x="382" y="158" width="16" height="18" rx="4" fill="url(#gear)"/>
  <rect x="336" y="114" width="18" height="16" rx="4" fill="url(#gear)"/>
  <rect x="426" y="114" width="18" height="16" rx="4" fill="url(#gear)"/>
  <rect x="352" y="82" width="14" height="14" rx="3" fill="url(#gear)" transform="rotate(45 359 89)"/>
  <rect x="416" y="82" width="14" height="14" rx="3" fill="url(#gear)" transform="rotate(45 423 89)"/>
  <rect x="352" y="144" width="14" height="14" rx="3" fill="url(#gear)" transform="rotate(45 359 151)"/>
  <rect x="416" y="144" width="14" height="14" rx="3" fill="url(#gear)" transform="rotate(45 423 151)"/>
  <!-- Plus indicator (auto-place) -->
  <circle cx="130" cy="122" r="36" fill="#FFD700" opacity="0.15"/>
  <rect x="118" y="107" width="24" height="30" rx="4" fill="#FFD700"/>
  <rect x="107" y="118" width="46" height="8" rx="4" fill="#FFD700"/>
</svg>