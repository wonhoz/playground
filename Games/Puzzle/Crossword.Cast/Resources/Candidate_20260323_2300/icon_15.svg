             C 500 820, 512 820, 512 820
             Z"
          fill="none" stroke="#22D3EE" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 뇌 우반구 -->
    <path d="M 512 260
             C 564 240, 644 240, 694 280
             C 754 330, 784 390, 784 450
             C 794 500, 784 540, 764 570
             C 784 590, 794 620, 784 650
             C 774 690, 744 710, 714 720
             C 704 760, 674 780, 634 775
             C 614 810, 574 820, 534 810
