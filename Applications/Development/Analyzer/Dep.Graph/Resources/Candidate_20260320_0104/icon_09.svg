<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000D1A"/>
  <!-- Root system: branching downward like tree roots -->
  <!-- Main trunk -->
  <line x1="512" y1="180" x2="512" y2="380" stroke="#4DD0E1" stroke-width="36" stroke-linecap="round"/>
  <!-- Second level branches -->
  <line x1="512" y1="380" x2="300" y2="540" stroke="#4DD0E1" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="380" x2="724" y2="540" stroke="#4DD0E1" stroke-width="28" stroke-linecap="round"/>
  <!-- Third level -->
  <line x1="300" y1="540" x2="190" y2="680" stroke="#0097A7" stroke-width="20" stroke-linecap="round"/>
  <line x1="300" y1="540" x2="380" y2="700" stroke="#0097A7" stroke-width="20" stroke-linecap="round"/>
  <line x1="724" y1="540" x2="644" y2="700" stroke="#0097A7" stroke-width="20" stroke-linecap="round"/>
  <line x1="724" y1="540" x2="834" y2="680" stroke="#0097A7" stroke-width="20" stroke-linecap="round"/>
  <!-- Fourth level fine roots -->
  <line x1="190" y1="680" x2="150" y2="800" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="190" y1="680" x2="240" y2="810" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="380" y1="700" x2="330" y2="820" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="644" y1="700" x2="690" y2="820" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="834" y1="680" x2="790" y2="810" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="834" y1="680" x2="874" y2="800" stroke="#0097A7" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
</svg>
