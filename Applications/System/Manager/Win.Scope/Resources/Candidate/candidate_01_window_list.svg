<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#302B63"/>
    </linearGradient>
    <linearGradient id="win1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A18CD1"/>
      <stop offset="100%" stop-color="#FBC2EB"/>
    </linearGradient>
    <linearGradient id="win2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A1C4FD"/>
      <stop offset="100%" stop-color="#C2E9FB"/>
    </linearGradient>
    <linearGradient id="win3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84FAB0"/>
      <stop offset="100%" stop-color="#8FD3F4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Window cards stacked -->
  <!-- Card 3 (back) -->
  <rect x="100" y="200" width="312" height="200" rx="12" fill="#1A1A3E" stroke="#302B63" stroke-width="2" opacity="0.7"/>
  <rect x="100" y="200" width="312" height="28" rx="12" fill="url(#win3)" opacity="0.5"/>
  <!-- Card 2 (mid) -->
  <rect x="78" y="160" width="312" height="200" rx="12" fill="#1A1A3E" stroke="#302B63" stroke-width="2" opacity="0.85"/>
  <rect x="78" y="160" width="312" height="28" rx="12" fill="url(#win2)" opacity="0.6"/>
  <!-- Card 1 (front) -->
  <rect x="56" y="120" width="312" height="200" rx="12" fill="#1F1B4E" stroke="#A18CD1" stroke-width="2"/>
  <rect x="56" y="120" width="312" height="32" rx="12" fill="url(#win1)"/>
  <!-- Window controls -->
  <circle cx="82" cy="136" r="8" fill="#FF5F57"/>
  <circle cx="104" cy="136" r="8" fill="#FEBC2E"/>
  <circle cx="126" cy="136" r="8" fill="#28C840"/>
  <text x="200" y="140" font-family="Segoe UI" font-size="14" fill="#FFF" opacity="0.8">notepad.exe</text>
  <!-- Content lines -->
  <rect x="76" y="168" width="200" height="10" rx="3" fill="#A18CD1" opacity="0.3"/>
  <rect x="76" y="186" width="240" height="10" rx="3" fill="#A18CD1" opacity="0.2"/>
  <rect x="76" y="204" width="180" height="10" rx="3" fill="#A18CD1" opacity="0.2"/>
  <rect x="76" y="222" width="220" height="10" rx="3" fill="#A18CD1" opacity="0.2"/>
  <rect x="76" y="240" width="160" height="10" rx="3" fill="#A18CD1" opacity="0.2"/>
  <rect x="76" y="258" width="200" height="10" rx="3" fill="#A18CD1" opacity="0.2"/>
  <!-- Info panel right -->
  <rect x="390" y="120" width="66" height="200" rx="10" fill="#151530" stroke="#302B63" stroke-width="1.5"/>
  <text x="423" y="148" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#A18CD1">PID</text>
  <text x="423" y="165" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="700" fill="#FBC2EB">4821</text>
  <text x="423" y="192" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#A18CD1">WND</text>
  <text x="423" y="209" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="700" fill="#C2E9FB">3</text>
  <text x="423" y="236" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#A18CD1">CPU</text>
  <text x="423" y="253" text-anchor="middle" font-family="Segoe UI" font-size="15" font-weight="700" fill="#84FAB0">1.2%</text>
  <!-- Footer -->
  <text x="256" y="455" text-anchor="middle" font-family="Segoe UI" font-size="24" font-weight="700" fill="#A18CD1">WIN.SCOPE</text>
</svg>
