<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02 | Literal / 레이어드 | 사진·영상 파일 스택 + 날짜 태그 변환 -->
  <!-- 컨셉: 쌓인 미디어 파일들이 날짜 태그를 읽어 정렬되는 모습 -->
  <!-- 색조: 밝은 라벤더 배경 + 퍼플 + 비비드 오렌지 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="#F0EAFB"/>

  <!-- 파일 스택 (뒤, 3번째) -->
  <rect x="200" y="290" width="260" height="320" rx="14" fill="#C9B8E8" stroke="#9B79D4" stroke-width="6"/>
  <polygon points="420,290 460,290 460,330 420,330" fill="#C9B8E8"/>
  <polygon points="420,290 460,330 420,330" fill="#9B79D4"/>
  <!-- 파일 내용 라인 -->
  <rect x="218" y="350" width="180" height="10" rx="3" fill="#9B79D4" opacity="0.5"/>
  <rect x="218" y="370" width="140" height="10" rx="3" fill="#9B79D4" opacity="0.4"/>
  <!-- 사진 섬네일 느낌 -->
  <rect x="218" y="392" width="224" height="120" rx="6" fill="#B09FD0"/>
  <path d="M218 470 Q248 440 278 460 Q308 430 338 450 Q368 420 442 460 L442 512 L218 512 Z" fill="#9B79D4"/>
  <circle cx="260" cy="425" r="18" fill="#F0EAFB"/>

  <!-- 파일 스택 (중간) -->
  <rect x="240" y="260" width="260" height="320" rx="14" fill="#D9CBEE" stroke="#7E57C2" stroke-width="6"/>
  <polygon points="460,260 500,260 500,300 460,300" fill="#D9CBEE"/>
  <polygon points="460,260 500,300 460,300" fill="#7E57C2"/>
  <rect x="258" y="318" width="180" height="10" rx="3" fill="#7E57C2" opacity="0.5"/>
  <rect x="258" y="338" width="140" height="10" rx="3" fill="#7E57C2" opacity="0.4"/>
  <rect x="258" y="358" width="224" height="120" rx="6" fill="#C4B4E0"/>
  <path d="M258 436 Q288 410 318 430 Q348 400 378 420 Q408 390 482 430 L482 478 L258 478 Z" fill="#7E57C2"/>
  <circle cx="300" cy="390" r="18" fill="#F0EAFB"/>

  <!-- 파일 스택 (앞, 1번째) -->
  <rect x="280" y="228" width="260" height="320" rx="14" fill="#EDE7F6" stroke="#5E35B1" stroke-width="7"/>
  <polygon points="500,228 540,228 540,268 500,268" fill="#EDE7F6"/>
  <polygon points="500,228 540,268 500,268" fill="#5E35B1"/>
  <rect x="298" y="284" width="180" height="10" rx="3" fill="#5E35B1" opacity="0.5"/>
  <rect x="298" y="304" width="140" height="10" rx="3" fill="#5E35B1" opacity="0.4"/>
  <!-- 사진 프레임 -->
  <rect x="298" y="322" width="224" height="130" rx="6" fill="#C5B3E9"/>
  <path d="M298 410 Q330 378 365 400 Q398 365 435 390 Q458 365 522 398 L522 452 L298 452 Z" fill="#7E57C2"/>
  <circle cx="345" cy="352" r="22" fill="#FFD740"/>
  <!-- EXIF 태그 뱃지 -->
  <rect x="298" y="470" width="224" height="60" rx="8" fill="#5E35B1"/>
  <text x="410" y="497" font-family="Consolas,monospace" font-size="14" fill="#FFD740" text-anchor="middle" font-weight="bold">EXIF</text>
  <text x="410" y="518" font-family="Consolas,monospace" font-size="13" fill="white" text-anchor="middle">2024:06:21 14:33</text>

  <!-- 큰 변환 화살표 -->
  <g transform="translate(620,400)">
    <path d="M-30,0 L60,0" stroke="#FF6D00" stroke-width="18" stroke-linecap="round"/>
    <polygon points="50,-22 100,0 50,22" fill="#FF6D00"/>
  </g>

  <!-- 날짜 기반 정렬된 출력 파일들 (오른쪽) -->
  <!-- 날짜 폴더 구조 -->
  <rect x="730" y="190" width="174" height="46" rx="10" fill="#FF6D00" opacity="0.9"/>
  <text x="817" y="221" font-family="Consolas,monospace" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2024/</text>

  <rect x="756" y="246" width="148" height="42" rx="8" fill="#FF8F00" opacity="0.85"/>
  <text x="830" y="274" font-family="Consolas,monospace" font-size="18" fill="white" text-anchor="middle">06/</text>

  <!-- 날짜 이름 파일들 -->
  <rect x="772" y="298" width="220" height="52" rx="8" fill="#FFF8E1" stroke="#FFB300" stroke-width="4"/>
  <text x="882" y="323" font-family="Consolas,monospace" font-size="14" fill="#5E35B1" text-anchor="middle" font-weight="bold">20240621_143301</text>
  <text x="882" y="342" font-family="Consolas,monospace" font-size="13" fill="#7E57C2" text-anchor="middle">_001.jpg</text>

  <rect x="772" y="360" width="220" height="52" rx="8" fill="#FFF8E1" stroke="#FFB300" stroke-width="4"/>
  <text x="882" y="385" font-family="Consolas,monospace" font-size="14" fill="#5E35B1" text-anchor="middle" font-weight="bold">20240621_143318</text>
  <text x="882" y="404" font-family="Consolas,monospace" font-size="13" fill="#7E57C2" text-anchor="middle">_002.jpg</text>

  <rect x="772" y="422" width="220" height="52" rx="8" fill="#FFF8E1" stroke="#FFB300" stroke-width="4"/>
  <text x="882" y="447" font-family="Consolas,monospace" font-size="14" fill="#5E35B1" text-anchor="middle" font-weight="bold">20240621_150045</text>
  <text x="882" y="466" font-family="Consolas,monospace" font-size="13" fill="#7E57C2" text-anchor="middle">_003.mp4</text>

  <!-- 영상 파일 아이콘 구분 (재생버튼) -->
  <circle cx="780" cy="448" r="12" fill="#FF6D00" opacity="0.8"/>
  <polygon points="776,443 792,448 776,453" fill="white"/>

  <!-- 하단 설명 바 -->
  <rect x="160" y="700" width="704" height="62" rx="12" fill="#5E35B1" opacity="0.12"/>
  <text x="512" y="728" font-family="Arial,sans-serif" font-size="22" fill="#5E35B1" text-anchor="middle" font-weight="bold">EXIF / QuickTime</text>
  <text x="512" y="752" font-family="Arial,sans-serif" font-size="18" fill="#7E57C2" text-anchor="middle">Batch Rename</text>
</svg>
