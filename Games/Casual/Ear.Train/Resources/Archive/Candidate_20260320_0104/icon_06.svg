  <line x1="478" y1="744" x2="478" y2="600" stroke="#AED581" stroke-width="14"/>
  <ellipse cx="590" cy="720" rx="38" ry="28" fill="#AED581"/>
  <line x1="628" y1="704" x2="628" y2="570" stroke="#AED581" stroke-width="14"/>
  <!-- 음표 연결선 -->
  <line x1="478" y1="600" x2="628" y2="570" stroke="#AED581" stroke-width="10"/>
</svg>
