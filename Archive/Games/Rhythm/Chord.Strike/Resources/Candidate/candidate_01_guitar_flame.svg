<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0b6e"/>
    </linearGradient>
    <linearGradient id="gtr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Guitar body -->
  <ellipse cx="220" cy="320" rx="90" ry="110" fill="url(#gtr)" opacity="0.9"/>
  <ellipse cx="220" cy="240" rx="70" ry="85" fill="url(#gtr)" opacity="0.85"/>
  <!-- Guitar neck -->
  <rect x="205" y="80" width="30" height="180" rx="8" fill="#cc4400"/>
  <!-- Strings -->
  <line x1="212" y1="85" x2="212" y2="320" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <line x1="218" y1="85" x2="218" y2="320" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <line x1="224" y1="85" x2="224" y2="320" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <line x1="230" y1="85" x2="230" y2="320" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <!-- Sound hole -->
  <circle cx="220" cy="290" r="28" fill="#1a0533" opacity="0.8"/>
  <!-- Frets -->
  <rect x="205" y="130" width="30" height="4" rx="2" fill="#ff9900"/>
  <rect x="205" y="155" width="30" height="4" rx="2" fill="#ff9900"/>
  <rect x="205" y="180" width="30" height="4" rx="2" fill="#ff9900"/>
  <!-- Music notes -->
  <text x="310" y="200" font-size="60" fill="#ff6b00" opacity="0.8" filter="url(#glow)">♪</text>
  <text x="340" y="280" font-size="45" fill="#ff0055" opacity="0.7" filter="url(#glow)">♫</text>
  <text x="120" y="160" font-size="40" fill="#ffaa00" opacity="0.6" filter="url(#glow)">♩</text>
  <!-- Strike lightning -->
  <polygon points="290,120 310,180 295,180 320,250 295,250 330,330 270,210 290,210 265,140" fill="#ffdd00" opacity="0.9" filter="url(#glow)"/>
</svg>