<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0E00"/>
      <stop offset="100%" stop-color="#4E2800"/>
    </linearGradient>
    <linearGradient id="disk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hard drive shape -->
  <rect x="115" y="155" width="282" height="202" rx="20" fill="url(#disk)"/>
  <rect x="130" y="168" width="252" height="176" rx="14" fill="#BF360C" opacity="0.5"/>
  <!-- Platters -->
  <circle cx="256" cy="256" r="80" fill="#E65100"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#FFA726" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="55" fill="#BF360C"/>
  <circle cx="256" cy="256" r="35" fill="#E65100"/>
  <circle cx="256" cy="256" r="18" fill="#FF7043"/>
  <!-- Read arm -->
  <line x1="310" y1="195" x2="256" y2="250" stroke="#FFF3E0" stroke-width="7" stroke-linecap="round"/>
  <circle cx="310" cy="195" r="10" fill="#FF8A65"/>
  <!-- Progress bar / clean status -->
  <rect x="130" y="348" width="252" height="16" rx="8" fill="#1C0E00" opacity="0.6"/>
  <rect x="130" y="348" width="180" height="16" rx="8" fill="#FFCC80"/>
  <text x="256" y="398" text-anchor="middle" font-family="Arial" font-size="18" fill="#FFE0B2" font-weight="bold">CLEANING...</text>
</svg>
