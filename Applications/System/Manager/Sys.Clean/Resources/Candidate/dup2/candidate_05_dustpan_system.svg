<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <linearGradient id="pan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dustpan -->
  <path d="M130 280 L380 280 L360 400 L150 400 Z" fill="url(#pan)" filter="url(#glow)"/>
  <!-- Dustpan lip/edge -->
  <rect x="120" y="268" width="272" height="22" rx="6" fill="#c8e6c9"/>
  <!-- Dustpan handle -->
  <line x1="256" y1="268" x2="256" y2="160" stroke="url(#handle)" stroke-width="18" stroke-linecap="round"/>
  <circle cx="256" cy="150" r="16" fill="#81c784" filter="url(#glow)"/>
  <!-- Dust/debris in pan -->
  <ellipse cx="200" cy="355" rx="18" ry="10" fill="#795548" opacity="0.6"/>
  <ellipse cx="270" cy="365" rx="22" ry="12" fill="#6d4c41" opacity="0.5"/>
  <ellipse cx="320" cy="345" rx="15" ry="8" fill="#795548" opacity="0.6"/>
  <!-- Small debris pieces -->
  <circle cx="180" cy="340" r="5" fill="#a1887f" opacity="0.7"/>
  <circle cx="220" cy="370" r="4" fill="#8d6e63" opacity="0.6"/>
  <circle cx="290" cy="350" r="6" fill="#a1887f" opacity="0.7"/>
  <circle cx="340" cy="370" r="4" fill="#8d6e63" opacity="0.6"/>
  <circle cx="250" cy="385" r="5" fill="#795548" opacity="0.7"/>
  <!-- Sweep lines coming in from left -->
  <path d="M100 290 Q115 285 130 280" stroke="#69f0ae" stroke-width="3" fill="none" opacity="0.6" stroke-dasharray="8,4"/>
  <path d="M90 300 Q110 295 130 290" stroke="#a5d6a7" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  <path d="M95 310 Q112 307 130 302" stroke="#69f0ae" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="6,5"/>
  <!-- System circuit lines on pan -->
  <path d="M160 310 L200 310 L200 330 L240 330" stroke="#00e676" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M290 310 L330 310 L330 330 L350 330" stroke="#00e676" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="200" cy="310" r="4" fill="#00e676" opacity="0.6"/>
  <circle cx="330" cy="310" r="4" fill="#00e676" opacity="0.6"/>
</svg>