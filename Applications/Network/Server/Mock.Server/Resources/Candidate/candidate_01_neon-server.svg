<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <linearGradient id="server" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Server rack -->
  <rect x="120" y="130" width="272" height="60" rx="10" fill="url(#server)" opacity="0.9"/>
  <rect x="120" y="210" width="272" height="60" rx="10" fill="url(#server)" opacity="0.75"/>
  <rect x="120" y="290" width="272" height="60" rx="10" fill="url(#server)" opacity="0.6"/>
  <!-- LED indicators -->
  <circle cx="350" cy="160" r="8" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="370" cy="160" r="8" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="350" cy="240" r="8" fill="#FFD600" filter="url(#glow)"/>
  <circle cx="370" cy="240" r="8" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="350" cy="320" r="8" fill="#00FF88" filter="url(#glow)"/>
  <circle cx="370" cy="320" r="8" fill="#FF4444" filter="url(#glow)"/>
  <!-- Mock label -->
  <rect x="140" y="147" width="80" height="26" rx="4" fill="#0D1B2A" opacity="0.6"/>
  <rect x="140" y="227" width="80" height="26" rx="4" fill="#0D1B2A" opacity="0.6"/>
  <rect x="140" y="307" width="80" height="26" rx="4" fill="#0D1B2A" opacity="0.6"/>
  <!-- API lines -->
  <line x1="256" y1="380" x2="180" y2="420" stroke="#00E5FF" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="256" y1="380" x2="256" y2="420" stroke="#00E5FF" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="256" y1="380" x2="332" y2="420" stroke="#00E5FF" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  <circle cx="180" cy="420" r="10" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="256" cy="420" r="10" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="332" cy="420" r="10" fill="#00E5FF" filter="url(#glow)"/>
</svg>