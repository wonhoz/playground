<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A1E"/>
  <!-- Layer 2: ∅ 기호 + 점선 빈 폴더들 -->
  <!-- 큰 ∅ 기호 (중앙) -->
  <circle cx="512" cy="440" r="320" fill="none" stroke="#3B3B8A" stroke-width="40"/>
  <line x1="264" y1="192" x2="760" y2="688" stroke="#3B3B8A" stroke-width="40" stroke-linecap="round"/>
  <!-- 점선 폴더 실루엣들 (사라지는 느낌) -->
  <!-- 폴더 1 -->
  <rect x="300" y="320" width="200" height="150" rx="10" fill="none" stroke="#5555AA" stroke-width="5" stroke-dasharray="20,12"/>
  <rect x="300" y="294" width="90" height="34" rx="6" fill="none" stroke="#5555AA" stroke-width="5" stroke-dasharray="16,10"/>
  <!-- 폴더 2 -->
  <rect x="524" y="360" width="180" height="130" rx="10" fill="none" stroke="#4444AA" stroke-width="5" stroke-dasharray="18,12" opacity="0.7"/>
  <rect x="524" y="336" width="80" height="30" rx="6" fill="none" stroke="#4444AA" stroke-width="5" stroke-dasharray="14,10" opacity="0.7"/>
  <!-- 폴더 3 (더 흐림) -->
  <rect x="380" y="480" width="160" height="120" rx="10" fill="none" stroke="#3333AA" stroke-width="5" stroke-dasharray="16,12" opacity="0.5"/>
  <!-- 체크마크 오른쪽 하단 -->
  <circle cx="800" cy="800" r="130" fill="#1A3A1A"/>
  <circle cx="800" cy="800" r="130" fill="none" stroke="#4CAF50" stroke-width="16"/>
  <polyline points="730,800 775,845 870,755" fill="none" stroke="#4CAF50" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Layer 3: 하단 텍스트 -->
  <text x="512" y="870" font-size="80" fill="#4040A0" text-anchor="middle" font-family="Arial" font-weight="bold">EMPTY</text>
</svg>
