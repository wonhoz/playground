<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0e0c29"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Background keyboard silhouette -->
  <rect x="36" y="200" width="440" height="200" rx="20" fill="#1e1b4b" stroke="#312e81" stroke-width="2" opacity="0.6"/>
  <!-- Key row outlines (ghost) -->
  <rect x="52" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="88" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="124" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="160" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="196" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="232" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="268" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <rect x="304" y="216" width="30" height="26" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.5"/>
  <!-- Highlighted combo keys -->
  <rect x="52" y="248" width="46" height="30" rx="5" fill="#6366f1" opacity="0.9"/>
  <text x="60" y="268" font-family="monospace" font-size="12" fill="white" font-weight="bold">Ctrl</text>
  <rect x="52" y="248" width="46" height="30" rx="5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <rect x="124" y="248" width="36" height="30" rx="5" fill="#4f46e5" opacity="0.85"/>
  <text x="132" y="268" font-family="monospace" font-size="14" fill="white" font-weight="bold">Z</text>
  <rect x="124" y="248" width="36" height="30" rx="5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <!-- Ghost keys continue -->
  <rect x="166" y="248" width="36" height="30" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <rect x="208" y="248" width="36" height="30" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <rect x="250" y="248" width="36" height="30" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <rect x="292" y="248" width="36" height="30" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <rect x="334" y="248" width="36" height="30" rx="4" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <!-- Spacebar row -->
  <rect x="100" y="284" width="260" height="30" rx="5" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <rect x="366" y="284" width="44" height="30" rx="5" fill="#6366f1" opacity="0.7"/>
  <text x="372" y="304" font-family="monospace" font-size="11" fill="white">Map</text>
  <!-- Popup tooltip above keys -->
  <rect x="48" y="100" width="200" height="80" rx="12" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <polygon points="96,180 80,198 112,198" fill="#312e81" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="96,180 80,198 112,198" fill="#312e81"/>
  <text x="64" y="126" font-family="monospace" font-size="14" fill="#818cf8" font-weight="bold">Ctrl + Z</text>
  <text x="64" y="148" font-family="monospace" font-size="12" fill="#a5b4fc">Undo action</text>
  <text x="64" y="168" font-family="monospace" font-size="11" fill="#6366f1">Global shortcut</text>
  <!-- Second popup for another key -->
  <rect x="284" y="88" width="192" height="88" rx="12" fill="#1e1b4b" stroke="#4f46e5" stroke-width="2"/>
  <polygon points="380,176 366,194 394,194" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="380,176 366,194 394,194" fill="#1e1b4b"/>
  <text x="298" y="114" font-family="monospace" font-size="13" fill="#a5b4fc" font-weight="bold">Win + Map</text>
  <text x="298" y="134" font-family="monospace" font-size="12" fill="#818cf8">Open keymapper</text>
  <text x="298" y="154" font-family="monospace" font-size="11" fill="#4f46e5">App shortcut</text>
  <!-- Decorative connection lines -->
  <line x1="75" y1="278" x2="75" y2="248" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
  <line x1="142" y1="278" x2="142" y2="248" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
  <!-- Indigo map icon small -->
  <rect x="400" y="380" width="72" height="72" rx="12" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="414" y="424" font-family="monospace" font-size="28" fill="#818cf8">⌨</text>
</svg>
