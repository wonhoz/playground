<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#d9e4f0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifier clean -->
  <circle cx="220" cy="210" r="110" fill="#fff" stroke="#2c3e50" stroke-width="6"/>
  <circle cx="220" cy="210" r="100" fill="#fafafa" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="302" y1="292" x2="390" y2="380" stroke="#2c3e50" stroke-width="18" stroke-linecap="round"/>
  <!-- Content inside lens -->
  <rect x="148" y="170" width="144" height="14" rx="3" fill="#e74c3c" opacity="0.8"/>
  <rect x="148" y="192" width="120" height="14" rx="3" fill="#ecf0f1"/>
  <rect x="148" y="214" width="144" height="14" rx="3" fill="#2ecc71" opacity="0.8"/>
  <rect x="148" y="236" width="110" height="14" rx="3" fill="#ecf0f1"/>
  <rect x="148" y="258" width="130" height="14" rx="3" fill="#f39c12" opacity="0.7"/>
  <!-- Plus/minus indicators -->
  <circle cx="134" cy="177" r="9" fill="#e74c3c"/>
  <text x="134" y="182" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">-</text>
  <circle cx="134" cy="221" r="9" fill="#2ecc71"/>
  <text x="134" y="226" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">+</text>
  <circle cx="134" cy="265" r="9" fill="#f39c12"/>
  <text x="134" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">~</text>
  <!-- Title -->
  <text x="256" y="420" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#2c3e50" text-anchor="middle" letter-spacing="2">DEEP</text>
  <text x="256" y="462" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#2c3e50" text-anchor="middle" letter-spacing="2">DIFF</text>
  <!-- Subtitle accent -->
  <rect x="156" y="470" width="200" height="4" rx="2" fill="#e74c3c"/>
</svg>
