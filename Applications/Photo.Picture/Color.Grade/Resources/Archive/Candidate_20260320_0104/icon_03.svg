<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- 온도계 외곽 -->
  <rect x="452" y="180" width="120" height="500" rx="60" fill="none" stroke="#AD1457" stroke-width="28"/>
  <!-- 온도계 구근 -->
  <circle cx="512" cy="720" r="100" fill="#AD1457"/>
  <circle cx="512" cy="720" r="70" fill="#F48FB1" opacity="0.6"/>
  <!-- 온도 채움 -->
  <rect x="476" y="420" width="72" height="320" rx="36" fill="#AD1457" opacity="0.7"/>
  <!-- 눈금 -->
  <line x1="572" y1="300" x2="620" y2="300" stroke="#AD1457" stroke-width="16" stroke-linecap="round"/>
  <line x1="572" y1="380" x2="610" y2="380" stroke="#AD1457" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="572" y1="460" x2="620" y2="460" stroke="#AD1457" stroke-width="16" stroke-linecap="round"/>
  <line x1="572" y1="540" x2="610" y2="540" stroke="#AD1457" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="572" y1="620" x2="620" y2="620" stroke="#AD1457" stroke-width="16" stroke-linecap="round"/>
  <!-- 색온도 그라데이션 띠 (왼쪽) -->
  <rect x="280" y="380" width="100" height="280" rx="16" fill="url(#ctg)"/>
  <defs>
    <linearGradient id="ctg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>
</svg>
