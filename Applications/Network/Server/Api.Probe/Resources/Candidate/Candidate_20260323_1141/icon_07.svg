<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#4A148C"/>
  <!-- Layer 2: Collection folder -->
  <rect x="180" y="240" width="200" height="70" rx="16" fill="#7B1FA2"/>
  <rect x="180" y="300" width="664" height="420" rx="20" fill="#7B1FA2"/>
  <!-- Layer 3: Request list -->
  <!-- GET row -->
  <rect x="210" y="330" width="80" height="36" rx="10" fill="#4CAF50"/>
  <text x="250" y="355" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">GET</text>
  <rect x="308" y="338" width="440" height="20" rx="10" fill="white" opacity="0.3"/>
  <!-- POST row -->
  <rect x="210" y="400" width="90" height="36" rx="10" fill="#2196F3"/>
  <text x="255" y="425" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">POST</text>
  <rect x="318" y="408" width="400" height="20" rx="10" fill="white" opacity="0.3"/>
  <!-- PUT row -->
  <rect x="210" y="470" width="80" height="36" rx="10" fill="#FF9800"/>
  <text x="250" y="495" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">PUT</text>
  <rect x="308" y="478" width="360" height="20" rx="10" fill="white" opacity="0.3"/>
  <!-- DEL row -->
  <rect x="210" y="540" width="100" height="36" rx="10" fill="#F44336"/>
  <text x="260" y="565" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">DEL</text>
  <rect x="328" y="548" width="300" height="20" rx="10" fill="white" opacity="0.3"/>
</svg>