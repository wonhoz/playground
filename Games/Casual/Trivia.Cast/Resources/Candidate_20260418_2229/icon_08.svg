<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background hot pink to orange diagonal -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Large question mark bubbles diagonal -->
  <!-- Big Q bubble -->
  <circle cx="300" cy="400" r="200" fill="#E91E63" opacity="0.9"/>
  <text x="300" y="465" font-family="Arial Black, sans-serif" font-size="260" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
  <!-- Small Q bubbles -->
  <circle cx="620" cy="260" r="110" fill="#FF7043" opacity="0.85"/>
  <text x="620" y="302" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
  <circle cx="780" cy="500" r="80" fill="#FF8A65" opacity="0.8"/>
  <text x="780" y="532" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
  <!-- Layer 3: Streak flame -->
  <path d="M560 800 Q600 700 630 620 Q660 700 650 780 Q700 700 720 600 Q770 690 750 820 Q800 760 780 870 L560 870 Z" fill="#FF3D00" opacity="0.95"/>
  <path d="M590 870 Q615 790 635 730 Q655 790 640 870 Z" fill="#FF6D00" opacity="0.9"/>
  <!-- x7 badge -->
  <circle cx="430" cy="800" r="80" fill="#AD1457"/>
