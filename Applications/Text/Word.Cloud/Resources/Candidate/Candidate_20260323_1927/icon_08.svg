  <text x="754" y="430" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">Word</text>
  <text x="700" y="470" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" font-weight="700" fill="#FDE68A">cloud</text>
  <text x="810" y="465" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="700" fill="#A7F3D0">text</text>
