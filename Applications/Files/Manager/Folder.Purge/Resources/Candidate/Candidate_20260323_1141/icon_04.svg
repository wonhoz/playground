  <circle cx="512" cy="512" r="360" fill="none" stroke="#4CAF50" stroke-width="20"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#4CAF50" stroke-width="14" opacity="0.7"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#4CAF50" stroke-width="10" opacity="0.5"/>
  <!-- Radar sweep -->
  <line x1="512" y1="512" x2="512" y2="152" stroke="#A5D6A7" stroke-width="8"/>
  <line x1="512" y1="512" x2="763" y2="263" stroke="#A5D6A7" stroke-width="8" opacity="0.5"/>
