<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark emerald -->
  <rect width="1024" height="1024" rx="200" fill="#071812"/>
  <!-- Terminal monitor frame -->
  <rect x="150" y="200" width="680" height="480" rx="30" fill="#0C2818" stroke="#1B5E20" stroke-width="14"/>
  <!-- Terminal screen (inner) -->
  <rect x="174" y="224" width="632" height="432" rx="18" fill="#0A1F0E"/>
  <!-- Title bar strip -->
  <rect x="174" y="224" width="632" height="44" rx="18" fill="#163C1C"/>
  <!-- Title bar dots (green, red, amber) -->
  <circle cx="212" cy="246" r="12" fill="#EF5350"/>
  <circle cx="252" cy="246" r="12" fill="#FFB300"/>
  <circle cx="292" cy="246" r="12" fill="#69F0AE"/>
  <!-- Prompt line 1 -->
  <rect x="200" y="296" width="80" height="22" rx="5" fill="#69F0AE"/>
  <rect x="294" y="296" width="200" height="22" rx="5" fill="#A5D6A7" opacity="0.7"/>
  <!-- Prompt line 2 -->
  <rect x="200" y="338" width="80" height="22" rx="5" fill="#69F0AE" opacity="0.7"/>
  <rect x="294" y="338" width="280" height="22" rx="5" fill="#A5D6A7" opacity="0.45"/>
  <!-- Prompt line 3 (shorter) -->
  <rect x="200" y="380" width="80" height="22" rx="5" fill="#69F0AE" opacity="0.5"/>
  <rect x="294" y="380" width="140" height="22" rx="5" fill="#A5D6A7" opacity="0.3"/>
  <!-- Magenta launch arrow (right side, pointing right-down) -->
  <polygon points="700,480 700,580 820,530" fill="#E040FB" stroke="#F8BBD9" stroke-width="14" stroke-linejoin="round"/>
  <!-- Magenta ripple rings around arrow -->
  <circle cx="760" cy="530" r="80" fill="none" stroke="#E040FB" stroke-width="12" opacity="0.4"/>
  <circle cx="760" cy="530" r="110" fill="none" stroke="#CE93D8" stroke-width="8" opacity="0.2"/>
</svg>
