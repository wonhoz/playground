<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 클래퍼보드 본체 -->
  <rect x="90" y="200" width="332" height="220" rx="8" fill="#EF4444" opacity="0.07"/>
  <rect x="90" y="200" width="332" height="220" rx="8" fill="none" stroke="#EF4444" stroke-width="3" filter="url(#glow)"/>
  <!-- 클래퍼보드 상단 바 (클랩) -->
  <rect x="90" y="160" width="332" height="50" rx="8" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 클랩 스트라이프 -->
  <line x1="130" y1="160" x2="110" y2="210" stroke="#EF4444" stroke-width="16" opacity="0.4"/>
  <line x1="180" y1="160" x2="160" y2="210" stroke="#EF4444" stroke-width="16" opacity="0.4"/>
  <line x1="230" y1="160" x2="210" y2="210" stroke="#EF4444" stroke-width="16" opacity="0.4"/>
  <line x1="280" y1="160" x2="260" y2="210" stroke="#EF4444" stroke-width="16" opacity="0.4"/>
  <line x1="330" y1="160" x2="310" y2="210" stroke="#EF4444" stroke-width="16" opacity="0.4"/>
  <!-- 클래퍼보드 텍스트 -->
  <text x="256" y="270" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" opacity="0.6">SCENE: 01 TAKE: 01</text>
  <text x="256" y="300" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" opacity="0.5">SCREEN RECORDER</text>
  <!-- 레이블 -->
  <text x="256" y="460" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">SCARLET CLAPBOARD</text>
</svg>
