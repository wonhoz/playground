<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 흑백 체스 패턴 — 밀도 매핑 시각화 | 기하학 | #14080A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#14080A"/>
  <!-- Layer 2: 8x8 chess-like grid showing grayscale density mapping to ASCII -->
  <!-- Density gradient grid (left column = darkest = dense chars, right = lightest = sparse) -->
  <!-- Row 1 -->
  <rect x="160" y="200" width="88" height="80" fill="#000000"/>
  <text x="204" y="248" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">█</text>
  <rect x="250" y="200" width="88" height="80" fill="#1A1A1A"/>
  <text x="294" y="248" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">▓</text>
  <rect x="340" y="200" width="88" height="80" fill="#333333"/>
  <text x="384" y="248" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">▒</text>
  <rect x="430" y="200" width="88" height="80" fill="#4D4D4D"/>
  <text x="474" y="248" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">░</text>
  <rect x="520" y="200" width="88" height="80" fill="#666666"/>
  <text x="564" y="248" font-family="monospace" font-size="28" fill="#F97316" text-anchor="middle">#</text>
  <rect x="610" y="200" width="88" height="80" fill="#808080"/>
  <text x="654" y="248" font-family="monospace" font-size="28" fill="#FCD34D" text-anchor="middle">@</text>
  <rect x="700" y="200" width="88" height="80" fill="#999999"/>
  <text x="744" y="248" font-family="monospace" font-size="28" fill="#A3E635" text-anchor="middle">%</text>
  <rect x="790" y="200" width="88" height="80" fill="#B3B3B3"/>
  <text x="834" y="248" font-family="monospace" font-size="28" fill="#4ADE80" text-anchor="middle">+</text>
  <!-- Row 2 -->
  <rect x="160" y="282" width="88" height="80" fill="#1A1A1A"/>
  <text x="204" y="330" font-family="monospace" font-size="28" fill="#60A5FA" text-anchor="middle">▓</text>
  <rect x="250" y="282" width="88" height="80" fill="#000000"/>
  <text x="294" y="330" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">█</text>
  <rect x="340" y="282" width="88" height="80" fill="#4D4D4D"/>
  <text x="384" y="330" font-family="monospace" font-size="28" fill="#F97316" text-anchor="middle">░</text>
  <rect x="430" y="282" width="88" height="80" fill="#666666"/>
  <text x="474" y="330" font-family="monospace" font-size="28" fill="#FCD34D" text-anchor="middle">#</text>
  <rect x="520" y="282" width="88" height="80" fill="#333333"/>
  <text x="564" y="330" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">▒</text>
  <rect x="610" y="282" width="88" height="80" fill="#999999"/>
  <text x="654" y="330" font-family="monospace" font-size="28" fill="#A3E635" text-anchor="middle">%</text>
  <rect x="700" y="282" width="88" height="80" fill="#CCCCCC"/>
  <text x="744" y="330" font-family="monospace" font-size="28" fill="#22D3EE" text-anchor="middle">-</text>
  <rect x="790" y="282" width="88" height="80" fill="#E6E6E6"/>
  <text x="834" y="330" font-family="monospace" font-size="28" fill="#F0ABFC" text-anchor="middle">.</text>
  <!-- Row 3 through 6 (more pattern rows) -->
  <rect x="160" y="364" width="88" height="80" fill="#333333"/>
  <text x="204" y="412" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">▒</text>
  <rect x="250" y="364" width="88" height="80" fill="#4D4D4D"/>
  <text x="294" y="412" font-family="monospace" font-size="28" fill="#F97316" text-anchor="middle">░</text>
  <rect x="340" y="364" width="88" height="80" fill="#000000"/>
  <text x="384" y="412" font-family="monospace" font-size="28" fill="#EF4444" text-anchor="middle">█</text>
  <rect x="430" y="364" width="88" height="80" fill="#808080"/>
  <text x="474" y="412" font-family="monospace" font-size="28" fill="#FCD34D" text-anchor="middle">@</text>
  <rect x="520" y="364" width="88" height="80" fill="#999999"/>
  <text x="564" y="412" font-family="monospace" font-size="28" fill="#A3E635" text-anchor="middle">%</text>
  <rect x="610" y="364" width="88" height="80" fill="#B3B3B3"/>
  <text x="654" y="412" font-family="monospace" font-size="28" fill="#4ADE80" text-anchor="middle">+</text>
  <rect x="700" y="364" width="88" height="80" fill="#E6E6E6"/>
  <text x="744" y="412" font-family="monospace" font-size="28" fill="#F0ABFC" text-anchor="middle">.</text>
  <rect x="790" y="364" width="88" height="80" fill="#FFFFFF"/>
  <text x="834" y="412" font-family="monospace" font-size="28" fill="#FFFFFF" text-anchor="middle"> </text>
  <!-- Layer 3: Density scale label -->
  <line x1="160" y1="620" x2="878" y2="620" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <polygon points="878,612 896,620 878,628" fill="#FBBF24"/>
  <text x="160" y="660" font-family="monospace" font-size="16" fill="#EF4444">Dark</text>
  <text x="834" y="660" font-family="monospace" font-size="16" fill="#9CA3AF" text-anchor="end">Light</text>
  <text x="512" y="720" font-family="Arial,sans-serif" font-size="20" fill="#FBBF24" text-anchor="middle">Luminosity → Char Density</text>
</svg>
