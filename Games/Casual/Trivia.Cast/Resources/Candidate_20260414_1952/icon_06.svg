<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 빨강+금색 (퀴즈쇼 분위기) -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B71C1C"/>
      <stop offset="100%" style="stop-color:#F57F17"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 마이크 + 퀴즈쇼 스타일 -->
  <!-- 마이크 그릴 -->
  <ellipse cx="512" cy="380" rx="160" ry="200" fill="white" opacity="0.95"/>
  <ellipse cx="512" cy="380" rx="140" ry="180" fill="#B71C1C" opacity="0.8"/>
  <!-- 마이크 그릴 줄무늬 -->
  <line x1="380" y1="300" x2="644" y2="300" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="370" y1="340" x2="654" y2="340" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="373" y1="380" x2="651" y2="380" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="383" y1="420" x2="641" y2="420" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="397" y1="460" x2="627" y2="460" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- 마이크 손잡이 -->
  <rect x="490" y="580" width="44" height="180" rx="22" fill="white" opacity="0.95"/>
  <!-- 마이크 스탠드 베이스 -->
  <rect x="380" y="740" width="264" height="28" rx="14" fill="white" opacity="0.9"/>
  <!-- Layer 3: 스포트라이트 효과 + 퀴즈 텍스트 -->
  <!-- 빛 줄기들 -->
  <path d="M 512 190 L 380 80" stroke="#FFD700" stroke-width="14" opacity="0.7" stroke-linecap="round"/>
  <path d="M 512 190 L 644 80" stroke="#FFD700" stroke-width="14" opacity="0.7" stroke-linecap="round"/>
  <path d="M 512 190 L 320 120" stroke="#FFD700" stroke-width="10" opacity="0.4" stroke-linecap="round"/>
  <path d="M 512 190 L 704 120" stroke="#FFD700" stroke-width="10" opacity="0.4" stroke-linecap="round"/>
  <!-- 퀴즈쇼 타이틀 배너 -->
  <rect x="200" y="820" width="624" height="90" rx="18" fill="#FFD700" opacity="0.95"/>
  <text x="512" y="883" font-family="Segoe UI, sans-serif" font-size="64" font-weight="bold" fill="#B71C1C" text-anchor="middle">TRIVIA CAST</text>
</svg>
