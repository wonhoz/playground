<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- App chrome -->
  <rect x="36" y="56" width="440" height="400" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Menu bar -->
  <rect x="36" y="56" width="440" height="32" rx="14" fill="#0f172a"/>
  <rect x="36" y="72" width="440" height="16" fill="#0f172a"/>
  <circle cx="58" cy="72" r="6" fill="#ef4444"/>
  <circle cx="78" cy="72" r="6" fill="#f59e0b"/>
  <circle cx="98" cy="72" r="6" fill="#22c55e"/>
  <text x="120" y="77" font-family="monospace" font-size="12" fill="#38bdf8">Icon Maker</text>
  <text x="280" y="77" font-family="monospace" font-size="11" fill="#475569">File  Edit  View  Export</text>
  <!-- Left toolbar -->
  <rect x="36" y="88" width="48" height="368" rx="0" fill="#0f172a" stroke="#334155" stroke-width="0" border-right="1px solid #334155"/>
  <line x1="84" y1="88" x2="84" y2="456" stroke="#334155" stroke-width="1"/>
  <!-- Tool icons -->
  <text x="50" y="118" font-size="20">✏️</text>
  <rect x="40" y="100" width="40" height="28" rx="4" fill="#38bdf8" opacity="0.2"/>
  <text x="50" y="152" font-size="20">🖌️</text>
  <text x="50" y="186" font-size="20">◻</text>
  <text x="50" y="220" font-size="20">◯</text>
  <text x="50" y="254" font-size="20">🪣</text>
  <text x="50" y="288" font-size="20">✂️</text>
  <text x="50" y="322" font-size="20">🔍</text>
  <!-- Canvas area -->
  <rect x="84" y="88" width="292" height="292" fill="#071020"/>
  <!-- Checkerboard -->
  <pattern id="check" width="16" height="16" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#0d1a2e"/>
    <rect x="8" y="8" width="8" height="8" fill="#0d1a2e"/>
  </pattern>
  <rect x="84" y="88" width="292" height="292" fill="url(#check)" opacity="0.5"/>
  <!-- Icon being drawn (paintbrush icon) -->
  <rect x="140" y="120" width="184" height="184" rx="40" fill="#0ea5e9" opacity="0.9"/>
  <rect x="168" y="160" width="12" height="80" rx="5" fill="white" transform="rotate(-35 174 200)"/>
  <rect x="166" y="155" width="16" height="12" rx="4" fill="#fca5a5" transform="rotate(-35 174 161)"/>
  <ellipse cx="209" cy="225" rx="12" ry="24" fill="#4ade80" transform="rotate(-35 209 225)"/>
  <!-- Right properties panel -->
  <rect x="376" y="88" width="100" height="368" rx="0" fill="#0f172a"/>
  <line x1="376" y1="88" x2="376" y2="456" stroke="#334155" stroke-width="1"/>
  <text x="384" y="110" font-family="monospace" font-size="11" fill="#38bdf8">Properties</text>
  <text x="384" y="132" font-family="monospace" font-size="10" fill="#64748b">Width: 256</text>
  <text x="384" y="148" font-family="monospace" font-size="10" fill="#64748b">Height: 256</text>
  <text x="384" y="164" font-family="monospace" font-size="10" fill="#64748b">Color: RGBA</text>
  <text x="384" y="180" font-family="monospace" font-size="10" fill="#64748b">BG: Trans.</text>
  <!-- Color palette -->
  <text x="384" y="208" font-family="monospace" font-size="11" fill="#38bdf8">Colors</text>
  <rect x="384" y="214" width="20" height="20" rx="4" fill="#ef4444"/>
  <rect x="408" y="214" width="20" height="20" rx="4" fill="#3b82f6"/>
  <rect x="432" y="214" width="20" height="20" rx="4" fill="#22c55e"/>
  <rect x="456" y="214" width="20" height="20" rx="4" fill="#fbbf24"/>
  <rect x="384" y="240" width="20" height="20" rx="4" fill="#a855f7"/>
  <rect x="408" y="240" width="20" height="20" rx="4" fill="#f472b6"/>
  <rect x="432" y="240" width="20" height="20" rx="4" fill="white"/>
  <rect x="456" y="240" width="20" height="20" rx="4" fill="#374151"/>
  <!-- Export sizes -->
  <text x="384" y="282" font-family="monospace" font-size="11" fill="#38bdf8">Export</text>
  <rect x="384" y="290" width="88" height="24" rx="5" fill="#334155"/>
  <text x="388" y="307" font-family="monospace" font-size="10" fill="#94a3b8">ICO (all sizes)</text>
  <rect x="384" y="320" width="88" height="24" rx="5" fill="#334155"/>
  <text x="388" y="337" font-family="monospace" font-size="10" fill="#94a3b8">PNG 256px</text>
  <rect x="384" y="350" width="88" height="24" rx="5" fill="#334155"/>
  <text x="388" y="367" font-family="monospace" font-size="10" fill="#94a3b8">SVG</text>
  <!-- Export button -->
  <rect x="384" y="406" width="88" height="36" rx="8" fill="#0ea5e9"/>
  <text x="394" y="429" font-family="monospace" font-size="13" fill="white" font-weight="bold">Export</text>
  <!-- Status bar -->
  <rect x="36" y="440" width="440" height="16" rx="0" fill="#0f172a"/>
  <rect x="36" y="448" width="440" height="8" rx="14" fill="#0f172a"/>
  <text x="52" y="453" font-family="monospace" font-size="10" fill="#38bdf8">Canvas: 256x256  |  Zoom: 100%  |  RGBA  |  Layer: 1</text>
</svg>
