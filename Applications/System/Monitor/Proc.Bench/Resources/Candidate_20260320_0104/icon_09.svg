<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 다이아몬드 내구도: diamond gem with CPU core -->
  <!-- Diamond shape -->
  <polygon points="512,200 720,420 512,760 304,420" fill="#33691E"/>
  <!-- Diamond facets -->
  <polygon points="512,200 720,420 512,420" fill="#AED581" opacity="0.3"/>
  <polygon points="512,200 304,420 512,420" fill="#050A00" opacity="0.3"/>
  <line x1="512" y1="200" x2="512" y2="760" stroke="#AED581" stroke-width="3" opacity="0.5"/>
  <line x1="304" y1="420" x2="720" y2="420" stroke="#AED581" stroke-width="3" opacity="0.5"/>
  <line x1="512" y1="200" x2="304" y2="420" stroke="#AED581" stroke-width="2" opacity="0.4"/>
  <line x1="512" y1="200" x2="720" y2="420" stroke="#AED581" stroke-width="2" opacity="0.4"/>
  <!-- CPU chip embedded in diamond center -->
  <rect x="462" y="370" width="100" height="100" rx="10" fill="#AED581" opacity="0.9"/>
  <rect x="474" y="382" width="76" height="76" rx="6" fill="#050A00"/>
  <line x1="494" y1="382" x2="494" y2="458" stroke="#AED581" stroke-width="3"/>
  <line x1="512" y1="382" x2="512" y2="458" stroke="#AED581" stroke-width="3"/>
  <line x1="530" y1="382" x2="530" y2="458" stroke="#AED581" stroke-width="3"/>
  <line x1="474" y1="402" x2="550" y2="402" stroke="#AED581" stroke-width="3"/>
  <line x1="474" y1="420" x2="550" y2="420" stroke="#AED581" stroke-width="3"/>
  <line x1="474" y1="438" x2="550" y2="438" stroke="#AED581" stroke-width="3"/>
  <!-- Shine -->
  <line x1="440" y1="280" x2="460" y2="300" stroke="#AED581" stroke-width="6" stroke-linecap="round"/>
  <line x1="560" y1="230" x2="580" y2="250" stroke="#AED581" stroke-width="4" stroke-linecap="round"/>
</svg>