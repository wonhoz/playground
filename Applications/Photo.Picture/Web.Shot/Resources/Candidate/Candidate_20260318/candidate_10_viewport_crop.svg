<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="viewportClip">
      <rect x="150" y="140" width="212" height="140"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 뷰포트 크롭 캡처 -->
  <!-- 전체 웹 페이지 (어두운) -->
  <rect x="60" y="80" width="392" height="300" rx="6" fill="#040a10" stroke="#1a3a50" stroke-width="1" opacity="0.7"/>
  <!-- 어두운 영역 내용 -->
  <rect x="70" y="90" width="370" height="16" rx="3" fill="#061018" opacity="0.8"/>
  <rect x="70" y="114" width="370" height="60" rx="3" fill="#061018" opacity="0.6"/>
  <rect x="70" y="182" width="180" height="80" rx="3" fill="#061018" opacity="0.6"/>
  <rect x="262" y="182" width="178" height="80" rx="3" fill="#061018" opacity="0.6"/>
  <rect x="70" y="270" width="370" height="100" rx="3" fill="#061018" opacity="0.5"/>
  <!-- 뷰포트 영역 (밝은) -->
  <rect x="150" y="140" width="212" height="140" rx="0" fill="#060d16" opacity="0.9"/>
  <!-- 뷰포트 내 콘텐츠 -->
  <rect x="158" y="148" width="196" height="14" rx="3" fill="#0a2030" opacity="0.8"/>
  <rect x="165" y="152" width="80" height="6" rx="2" fill="#38BDF8" opacity="0.6"/>
  <rect x="158" y="170" width="196" height="50" rx="3" fill="#081820" opacity="0.7"/>
  <rect x="165" y="178" width="180" height="10" rx="3" fill="#38BDF8" opacity="0.4"/>
  <rect x="165" y="194" width="160" height="8" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="165" y="206" width="170" height="8" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="158" y="228" width="90" height="44" rx="4" fill="#0a2030" stroke="#38BDF8" stroke-width="0.8" opacity="0.8"/>
  <rect x="260" y="228" width="88" height="44" rx="4" fill="#0a2030" stroke="#38BDF8" stroke-width="0.8" opacity="0.8"/>
  <!-- 뷰포트 테두리 (강조) -->
  <rect x="150" y="140" width="212" height="140" rx="2" fill="none" stroke="#38BDF8" stroke-width="3" filter="url(#glow)" opacity="0.95"/>
  <!-- 뷰포트 핸들 -->
  <rect x="144" y="134" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="249" y="134" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="354" y="134" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="144" y="207" width="14" height="14" rx="2" fill="#38BDF8" opacity="0.9"/>
  <rect x="354" y="207" width="14" height="14" rx="2" fill="#38BDF8" opacity="0.9"/>
  <rect x="144" y="276" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="249" y="276" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="354" y="276" width="14" height="14" rx="2" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <!-- 치수 표시 -->
  <line x1="150" y1="128" x2="362" y2="128" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="150" y1="125" x2="150" y2="131" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="362" y1="125" x2="362" y2="131" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <text x="256" y="124" text-anchor="middle" font-size="10" fill="#38BDF8" filter="url(#glow)" opacity="0.9">1366px</text>
  <line x1="374" y1="140" x2="374" y2="280" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="371" y1="140" x2="377" y2="140" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <line x1="371" y1="280" x2="377" y2="280" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <text x="390" y="215" font-size="10" fill="#38BDF8" filter="url(#glow)" opacity="0.9">768px</text>
  <!-- 하단 제어 -->
  <rect x="60" y="400" width="392" height="74" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">VIEWPORT CROP</text>
  <!-- 해상도 선택 -->
  <rect x="78" y="438" width="80" height="22" rx="5" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.8"/>
  <text x="118" y="452" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.9">1920×1080</text>
  <rect x="170" y="438" width="70" height="22" rx="5" fill="#38BDF8" opacity="0.3" filter="url(#glow)"/>
  <text x="205" y="452" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.9">1366×768</text>
  <rect x="252" y="438" width="60" height="22" rx="5" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.7"/>
  <text x="282" y="452" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.7">768×1024</text>
  <rect x="330" y="438" width="60" height="22" rx="5" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.7"/>
  <text x="360" y="452" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.7">375×812</text>
  <text x="256" y="466" text-anchor="middle" font-size="10" fill="#888" opacity="0.6">뷰포트 크롭 캡처</text>
</svg>
