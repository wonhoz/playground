  <!-- 좌상: (252, 372) 우상: (772, 372) 중앙상: (512, 244) -->
  <!-- 실제 등축: 좌(252,500) 위중심(512,244) 우(772,500) 앞중심(512,756) -->
  <!-- 단순화 형태 -->
  <polygon points="512,230 780,390 512,550 244,390" fill="#E8B820"/>
  <polygon points="512,238 772,394 512,542 252,394" fill="#F9C040"/>

  <!-- 큐브 좌면 (평행사변형 — 파랑/물) -->
