<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="hddGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="lensRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="platGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="70%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- HDD body -->
  <rect x="80" y="150" width="300" height="200" rx="20" fill="url(#hddGrad)" stroke="#4B5563" stroke-width="3"/>
  <!-- HDD platter -->
  <circle cx="220" cy="250" r="80" fill="url(#platGrad)" stroke="#6B7280" stroke-width="2"/>
  <circle cx="220" cy="250" r="60" fill="none" stroke="#4B5563" stroke-width="1"/>
  <circle cx="220" cy="250" r="40" fill="none" stroke="#4B5563" stroke-width="1"/>
  <circle cx="220" cy="250" r="18" fill="#111827" stroke="#6B7280" stroke-width="2"/>
  <!-- Read arm -->
  <line x1="220" y1="250" x2="295" y2="195" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <circle cx="295" cy="195" r="8" fill="#60A5FA"/>
  <!-- Screw corners -->
  <circle cx="105" cy="175" r="8" fill="#6B7280"/>
  <circle cx="355" cy="175" r="8" fill="#6B7280"/>
  <circle cx="105" cy="325" r="8" fill="#6B7280"/>
  <circle cx="355" cy="325" r="8" fill="#6B7280"/>
  <!-- Connector port -->
  <rect x="310" y="228" width="60" height="44" rx="6" fill="#111827" stroke="#374151" stroke-width="2"/>
  <rect x="318" y="236" width="44" height="12" rx="3" fill="#F59E0B" opacity="0.7"/>
  <rect x="318" y="252" width="44" height="12" rx="3" fill="#6B7280"/>
  <!-- Magnifier overlay -->
  <circle cx="340" cy="340" r="90" fill="#60A5FA" fill-opacity="0.07" stroke="url(#lensRim)" stroke-width="6"/>
  <!-- Magnifier handle -->
  <line x1="407" y1="407" x2="455" y2="455" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  <!-- Zoom chart inside lens -->
  <rect x="290" y="295" width="100" height="10" rx="5" fill="#F97316" opacity="0.9"/>
  <rect x="290" y="313" width="70" height="10" rx="5" fill="#3B82F6" opacity="0.9"/>
  <rect x="290" y="331" width="85" height="10" rx="5" fill="#22C55E" opacity="0.9"/>
  <rect x="290" y="349" width="55" height="10" rx="5" fill="#A855F7" opacity="0.9"/>
  <rect x="290" y="367" width="90" height="10" rx="5" fill="#F59E0B" opacity="0.9"/>
</svg>
