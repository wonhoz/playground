<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a000a"/>
      <stop offset="100%" stop-color="#1a001a"/>
    </linearGradient>
    <linearGradient id="waveMain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ee0979"/>
      <stop offset="25%" stop-color="#ffd200"/>
      <stop offset="50%" stop-color="#56ab2f"/>
      <stop offset="75%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#8E54E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Axis -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#555" stroke-width="1" opacity="0.5"/>

  <!-- Filled wave area -->
  <path d="M60,256 C100,256 120,100 160,100 C200,100 220,412 260,412 C300,412 320,100 360,100 C400,100 420,256 452,256 L452,256 L60,256 Z" fill="url(#waveMain)" opacity="0.1"/>

  <!-- Main colorful wave -->
  <path d="M60,256 C100,256 120,100 160,100 C200,100 220,412 260,412 C300,412 320,100 360,100 C400,100 420,256 452,256" fill="none" stroke="url(#waveMain)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Glow duplicate -->
  <path d="M60,256 C100,256 120,100 160,100 C200,100 220,412 260,412 C300,412 320,100 360,100 C400,100 420,256 452,256" fill="none" stroke="url(#waveMain)" stroke-width="14" stroke-linecap="round" opacity="0.2" filter="url(#glow2)"/>

  <!-- Peak markers -->
  <circle cx="160" cy="100" r="10" fill="#ffd200" filter="url(#glow)"/>
  <circle cx="360" cy="100" r="10" fill="#56CCF2" filter="url(#glow)"/>
  <!-- Trough markers -->
  <circle cx="260" cy="412" r="10" fill="#ee0979" filter="url(#glow)"/>
  <!-- Zero crossings -->
  <circle cx="60" cy="256" r="7" fill="#8E54E9" opacity="0.8"/>
  <circle cx="210" cy="256" r="7" fill="#56ab2f" opacity="0.8"/>
  <circle cx="310" cy="256" r="7" fill="#56ab2f" opacity="0.8"/>
  <circle cx="452" cy="256" r="7" fill="#8E54E9" opacity="0.8"/>

  <!-- Amplitude markers (vertical dashed lines) -->
  <line x1="160" y1="100" x2="160" y2="256" stroke="#ffd200" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="260" y1="256" x2="260" y2="412" stroke="#ee0979" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="360" y1="100" x2="360" y2="256" stroke="#56CCF2" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Frequency measurement arc -->
  <path d="M160,260 Q255,290 360,260" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.25"/>

  <!-- Measurement arrows -->
  <line x1="80" y1="100" x2="80" y2="412" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <polygon points="75,106 80,95 85,106" fill="#fff" opacity="0.4"/>
  <polygon points="75,406 80,417 85,406" fill="#fff" opacity="0.4"/>
  <!-- Amplitude label dots -->
  <rect x="66" y="178" width="22" height="5" rx="2" fill="#fff" opacity="0.25"/>
  <rect x="66" y="329" width="22" height="5" rx="2" fill="#fff" opacity="0.25"/>
</svg>
