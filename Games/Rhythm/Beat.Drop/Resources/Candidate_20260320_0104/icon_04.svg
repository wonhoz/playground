<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#080005"/>
  <!-- 드럼 + 스틱 타격: 드럼 + 스틱 -->
  <!-- 드럼 몸통 (실린더) -->
  <ellipse cx="512" cy="680" rx="300" ry="80" fill="#9C27B0"/>
  <rect x="212" y="520" width="600" height="160" fill="#9C27B0"/>
  <ellipse cx="512" cy="520" rx="300" ry="80" fill="#CE93D8" opacity="0.8"/>
  <!-- 드럼 러그/장식 -->
  <rect x="230" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="310" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="390" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="470" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="550" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="630" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="710" y="550" width="30" height="60" rx="6" fill="#CE93D8" opacity="0.6"/>
  <!-- 스틱 1 (왼쪽, 타격 중) -->
  <line x1="340" y1="180" x2="480" y2="500" stroke="#CE93D8" stroke-width="18" stroke-linecap="round"/>
  <circle cx="480" cy="500" r="22" fill="#CE93D8"/>
  <!-- 스틱 2 (오른쪽) -->
  <line x1="684" y1="200" x2="560" y2="480" stroke="#9C27B0" stroke-width="18" stroke-linecap="round"/>
  <circle cx="560" cy="480" r="22" fill="#9C27B0"/>
  <!-- 타격 충격 파동 -->
  <ellipse cx="512" cy="520" rx="180" ry="48" fill="none" stroke="#CE93D8" stroke-width="8" opacity="0.6"/>
  <ellipse cx="512" cy="520" rx="240" ry="64" fill="none" stroke="#CE93D8" stroke-width="5" opacity="0.4"/>
  <!-- 음표 -->
  <ellipse cx="720" cy="300" rx="30" ry="22" fill="#CE93D8" opacity="0.7"/>
  <line x1="750" y1="286" x2="750" y2="180" stroke="#CE93D8" stroke-width="12" opacity="0.7"/>
  <path d="M750,180 Q800,195 794,230" stroke="#CE93D8" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
