<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256 60 L420 120 L420 260 C420 360 340 430 256 460 C172 430 92 360 92 260 L92 120 Z" fill="url(#shield)" opacity="0.2"/>
  <path d="M256 60 L420 120 L420 260 C420 360 340 430 256 460 C172 430 92 360 92 260 L92 120 Z" stroke="url(#shield)" stroke-width="6" fill="none"/>
  <!-- ENV variable lines inside shield -->
  <rect x="155" y="170" width="200" height="18" rx="9" fill="url(#shield)" opacity="0.9"/>
  <text x="165" y="184" font-family="monospace" font-size="14" fill="#0d0d1a" font-weight="bold">PATH=/usr/local/bin</text>
  <rect x="155" y="205" width="200" height="18" rx="9" fill="url(#shield)" opacity="0.7"/>
  <text x="165" y="219" font-family="monospace" font-size="14" fill="#0d0d1a" font-weight="bold">HOME=/root</text>
  <rect x="155" y="240" width="200" height="18" rx="9" fill="url(#shield)" opacity="0.5"/>
  <rect x="155" y="275" width="200" height="18" rx="9" fill="url(#shield)" opacity="0.35"/>
  <!-- Checkmark on shield -->
  <path d="M196 320 L236 360 L316 280" stroke="url(#shield)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
