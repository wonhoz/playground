<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <linearGradient id="kb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard body -->
  <rect x="96" y="210" width="320" height="160" rx="14" fill="url(#kb)"/>
  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="110" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="140" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="170" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="200" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="230" y="224" width="24" height="22" rx="4" fill="#FF8A65"/><rect x="260" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="290" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="320" y="224" width="24" height="22" rx="4" fill="#FF7043"/><rect x="350" y="224" width="62" height="22" rx="4" fill="#FF5722"/>
  <!-- Row 2 -->
  <rect x="110" y="254" width="36" height="22" rx="4" fill="#FF5722"/><rect x="152" y="254" width="24" height="22" rx="4" fill="#FF7043"/><rect x="182" y="254" width="24" height="22" rx="4" fill="#FF7043"/><rect x="212" y="254" width="24" height="22" rx="4" fill="#FF8A65"/><rect x="242" y="254" width="24" height="22" rx="4" fill="#FF7043"/><rect x="272" y="254" width="24" height="22" rx="4" fill="#FF7043"/><rect x="302" y="254" width="24" height="22" rx="4" fill="#FF7043"/><rect x="332" y="254" width="80" height="22" rx="4" fill="#FF5722"/>
  <!-- Row 3 (spacebar) -->
  <rect x="110" y="284" width="44" height="22" rx="4" fill="#FF5722"/><rect x="160" y="284" width="24" height="22" rx="4" fill="#FF7043"/><rect x="190" y="284" width="24" height="22" rx="4" fill="#FF7043"/><rect x="220" y="284" width="24" height="22" rx="4" fill="#FF8A65"/>
  <rect x="140" y="314" width="232" height="26" rx="6" fill="#FF5722"/>
