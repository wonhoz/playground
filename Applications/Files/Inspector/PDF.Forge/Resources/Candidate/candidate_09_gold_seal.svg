<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A140A"/>
      <stop offset="100%" stop-color="#0D0A05"/>
    </radialGradient>
    <radialGradient id="seal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="docPage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#F5E8C8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Parchment document -->
  <rect x="110" y="80" width="230" height="310" rx="4" fill="url(#docPage)"/>
  <rect x="110" y="80" width="230" height="310" rx="4" fill="none" stroke="#C8A878" stroke-width="3"/>
  <!-- Top decorative lines -->
  <line x1="130" y1="108" x2="320" y2="108" stroke="#C8A878" stroke-width="2"/>
  <line x1="130" y1="116" x2="320" y2="116" stroke="#C8A878" stroke-width="1"/>
  <!-- Document text lines (faux text) -->
  <rect x="130" y="135" width="80" height="7" rx="3.5" fill="#886644"/>
  <rect x="130" y="155" width="160" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="167" width="145" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="179" width="150" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="191" width="130" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="215" width="155" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="227" width="140" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="239" width="160" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="263" width="130" height="5" rx="2.5" fill="#BBAA88"/>
  <rect x="130" y="275" width="150" height="5" rx="2.5" fill="#BBAA88"/>
  <!-- Signature line -->
  <line x1="130" y1="340" x2="260" y2="340" stroke="#886644" stroke-width="1.5"/>
  <text x="195" y="358" font-family="serif" font-size="11" fill="#886644" text-anchor="middle" font-style="italic">Authorized Signature</text>
  <!-- Gold wax seal -->
  <circle cx="360" cy="340" r="70" fill="url(#seal)"/>
  <!-- Seal ray lines -->
  <line x1="360" y1="270" x2="360" y2="260" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="410" y1="290" x2="418" y2="282" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="430" y1="340" x2="440" y2="340" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="410" y1="390" x2="418" y2="398" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="360" y1="410" x2="360" y2="420" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="310" y1="390" x2="302" y2="398" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="290" y1="340" x2="280" y2="340" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="310" y1="290" x2="302" y2="282" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <!-- Inner seal -->
  <circle cx="360" cy="340" r="56" fill="none" stroke="#8B6914" stroke-width="3"/>
  <circle cx="360" cy="340" r="46" fill="#B8860B" opacity="0.5"/>
  <!-- PDF inside seal -->
  <text x="360" y="353" font-family="serif" font-size="30" fill="#FFD700" text-anchor="middle" font-weight="bold">PDF</text>
</svg>
