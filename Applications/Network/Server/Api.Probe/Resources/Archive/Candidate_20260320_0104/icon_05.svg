<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0F"/>
  <!-- Radar sweep arcs -->
  <circle cx="512" cy="512" r="320" stroke="#0277BD" stroke-width="4" fill="none" opacity="0.4"/>
  <circle cx="512" cy="512" r="220" stroke="#0277BD" stroke-width="4" fill="none" opacity="0.5"/>
  <circle cx="512" cy="512" r="120" stroke="#0277BD" stroke-width="4" fill="none" opacity="0.7"/>
  <!-- Radar sweep sector -->
  <path d="M512 512 L512 192 A320 320 0 0 1 803 672 Z" fill="#4FC3F7" opacity="0.12"/>
  <!-- Sweep line -->
  <line x1="512" y1="512" x2="803" y2="672" stroke="#4FC3F7" stroke-width="5" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="18" fill="#4FC3F7"/>
  <!-- Detected endpoints (blips) -->
  <circle cx="512" cy="300" r="12" fill="#4FC3F7" opacity="0.9"/>
  <circle cx="680" cy="400" r="10" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="360" cy="640" r="8" fill="#4FC3F7" opacity="0.5"/>
  <circle cx="700" cy="600" r="9" fill="#4FC3F7" opacity="0.6"/>
  <!-- Cross hairs -->
  <line x1="512" y1="200" x2="512" y2="824" stroke="#0277BD" stroke-width="2" opacity="0.3"/>
  <line x1="200" y1="512" x2="824" y2="512" stroke="#0277BD" stroke-width="2" opacity="0.3"/>
</svg>