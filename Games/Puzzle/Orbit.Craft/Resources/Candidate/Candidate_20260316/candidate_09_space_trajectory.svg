<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a18"/>
      <stop offset="100%" style="stop-color:#0c1428"/>
    </linearGradient>
    <radialGradient id="planet1" cx="35%" cy="35%" r="65%"><stop offset="0%" style="stop-color:#86efac"/><stop offset="100%" style="stop-color:#15803d"/></radialGradient>
    <radialGradient id="planet2" cx="35%" cy="35%" r="65%"><stop offset="0%" style="stop-color:#fca5a5"/><stop offset="100%" style="stop-color:#b91c1c"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Star field -->
  <circle cx="100" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="380" cy="70" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="160" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="80" cy="380" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="430" cy="400" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="460" r="1" fill="#fff" opacity="0.4"/>
  <!-- Source planet (bottom-left) -->
  <circle cx="130" cy="400" r="40" fill="url(#planet1)" filter="url(#glow)"/>
  <!-- Destination planet (top-right) -->
  <circle cx="390" cy="130" r="32" fill="url(#planet2)" filter="url(#glow)"/>
  <!-- Hohmann transfer orbit (curved trajectory) -->
  <path d="M130,360 C90,260 180,100 390,130" stroke="#fbbf24" stroke-width="3" fill="none" stroke-dasharray="10,5" filter="url(#sm)" opacity="0.8"/>
  <!-- Direct transfer path (shorter) -->
  <path d="M155,370 C220,280 300,180 365,145" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="6,5" opacity="0.5"/>
  <!-- Spacecraft on trajectory -->
  <g transform="translate(240 245) rotate(-40)">
    <polygon points="0,-14 -7,8 0,5 7,8" fill="#e2e8f0" filter="url(#sm)"/>
    <ellipse cx="0" cy="10" rx="4" ry="8" fill="#f97316" filter="url(#sm)" opacity="0.8"/>
  </g>
  <!-- Velocity vectors -->
  <line x1="152" y1="363" x2="165" y2="342" stroke="#fbbf2480" stroke-width="2"/>
  <polygon points="165,342 153,340 162,330" fill="#fbbf24" opacity="0.8"/>
  <!-- Distance indicator -->
  <line x1="130" y1="395" x2="390" y2="135" stroke="#ffffff15" stroke-width="1" stroke-dasharray="4,6"/>
</svg>
