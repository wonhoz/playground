<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VPN.Cast - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { font-size: 1.4rem; color: #888; margin-bottom: 20px; letter-spacing: 0.05em; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; }
  .item { background: #242424; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item img { width: 100%; aspect-ratio: 1; display: block; border-radius: 8px; }
  .item p { margin: 10px 0 0; font-size: 0.72rem; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>VPN.Cast — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_shield_blue.svg"/><p>01 Shield Blue</p></div>
  <div class="item"><img src="candidate_02_lock_cyan.svg"/><p>02 Lock Cyan</p></div>
  <div class="item"><img src="candidate_03_tunnel_green.svg"/><p>03 Tunnel Green</p></div>
  <div class="item"><img src="candidate_04_globe_orange.svg"/><p>04 Globe Orange</p></div>
  <div class="item"><img src="candidate_05_network_violet.svg"/><p>05 Network Violet</p></div>
  <div class="item"><img src="candidate_06_eye_red.svg"/><p>06 Eye Red</p></div>
  <div class="item"><img src="candidate_07_key_gold.svg"/><p>07 Key Gold</p></div>
  <div class="item"><img src="candidate_08_signal_teal.svg"/><p>08 Signal Teal</p></div>
  <div class="item"><img src="candidate_09_radar_neon.svg"/><p>09 Radar Neon</p></div>
  <div class="item"><img src="candidate_10_castle_indigo.svg"/><p>10 Castle Indigo</p></div>
</div>
</body>
</html>
