<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 벽 + 가시 방어막: 가시벽 -->
  <!-- main wall body -->
  <rect x="160" y="440" width="704" height="180" rx="10" fill="#37474F"/>
  <!-- wall stone texture lines -->
  <line x1="160" y1="530" x2="864" y2="530" stroke="#050808" stroke-width="5" opacity="0.5"/>
  <line x1="280" y1="440" x2="280" y2="530" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <line x1="460" y1="440" x2="460" y2="530" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <line x1="640" y1="440" x2="640" y2="530" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <line x1="370" y1="530" x2="370" y2="620" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <line x1="550" y1="530" x2="550" y2="620" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <line x1="730" y1="530" x2="730" y2="620" stroke="#050808" stroke-width="4" opacity="0.4"/>
  <!-- spikes on top of wall -->
  <g fill="#B0BEC5">
    <polygon points="200,440 218,330 236,440"/>
    <polygon points="260,440 278,330 296,440"/>
    <polygon points="320,440 338,330 356,440"/>
    <polygon points="380,440 398,330 416,440"/>
    <polygon points="440,440 458,330 476,440"/>
    <polygon points="500,440 518,330 536,440"/>
    <polygon points="560,440 578,330 596,440"/>
    <polygon points="620,440 638,330 656,440"/>
    <polygon points="680,440 698,330 716,440"/>
    <polygon points="740,440 758,330 776,440"/>
    <polygon points="800,440 818,330 836,440"/>
  </g>
  <!-- enemy silhouettes stopped by wall -->
  <circle cx="320" cy="720" r="24" fill="#B0BEC5" opacity="0.35"/>
  <rect x="308" y="744" width="24" height="34" rx="4" fill="#B0BEC5" opacity="0.35"/>
  <circle cx="512" cy="720" r="24" fill="#B0BEC5" opacity="0.35"/>
  <rect x="500" y="744" width="24" height="34" rx="4" fill="#B0BEC5" opacity="0.35"/>
  <circle cx="700" cy="720" r="24" fill="#B0BEC5" opacity="0.35"/>
  <rect x="688" y="744" width="24" height="34" rx="4" fill="#B0BEC5" opacity="0.35"/>
  <!-- X marks (blocked) -->
  <line x1="300" y1="690" x2="340" y2="730" stroke="#B0BEC5" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="340" y1="690" x2="300" y2="730" stroke="#B0BEC5" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
</svg>
