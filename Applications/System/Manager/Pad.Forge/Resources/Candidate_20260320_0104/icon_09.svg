<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
<!-- 컨셉: 돋보기 검색 메모 -->
<!-- 메모 배경 -->
<rect x="180" y="200" width="520" height="580" rx="20" fill="#120E00" stroke="#F9A825" stroke-width="24"/>
<!-- 메모 줄들 -->
<line x1="230" y1="320" x2="640" y2="320" stroke="#F9A825" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
<line x1="230" y1="396" x2="600" y2="396" stroke="#F9A825" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
<!-- 검색 하이라이트 줄 -->
<rect x="225" y="460" width="380" height="36" rx="8" fill="#F9A825" opacity="0.2"/>
<line x1="230" y1="478" x2="580" y2="478" stroke="#FFE082" stroke-width="20" stroke-linecap="round"/>
<line x1="230" y1="548" x2="560" y2="548" stroke="#F9A825" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
<line x1="230" y1="620" x2="600" y2="620" stroke="#F9A825" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
<!-- 돋보기 (우하단, 메모 위에) -->
<circle cx="700" cy="660" r="160" fill="#1A1200" stroke="#F9A825" stroke-width="36"/>
<circle cx="700" cy="660" r="116" fill="#0A0800"/>
<!-- 돋보기 안에 보이는 줄 (검색 결과) -->
<rect x="630" y="640" width="140" height="24" rx="6" fill="#FFE082" opacity="0.8"/>
<rect x="630" y="678" width="100" height="18" rx="6" fill="#F9A825" opacity="0.4"/>
<!-- 돋보기 손잡이 -->
<line x1="820" y1="780" x2="900" y2="860" stroke="#F9A825" stroke-width="48" stroke-linecap="round"/>
</svg>
