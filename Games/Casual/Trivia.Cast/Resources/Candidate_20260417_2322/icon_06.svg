<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="fire06" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="60%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 불꽃 스트릭 (대각선/동적) -->
  <!-- 불꽃 3개 (대각선 배치) -->
  <ellipse cx="310" cy="680" rx="70" ry="110" fill="url(#fire06)" transform="rotate(-15 310 680)"/>
  <ellipse cx="310" cy="620" rx="42" ry="68" fill="#FDD835" opacity="0.9" transform="rotate(-15 310 620)"/>
  <ellipse cx="510" cy="580" rx="90" ry="140" fill="url(#fire06)" transform="rotate(-12 510 580)"/>
  <ellipse cx="510" cy="490" rx="54" ry="88" fill="#FDD835" opacity="0.9" transform="rotate(-12 510 490)"/>
  <ellipse cx="730" cy="460" rx="115" ry="175" fill="url(#fire06)" transform="rotate(-8 730 460)"/>
  <ellipse cx="730" cy="330" rx="68" ry="110" fill="#FDD835" opacity="0.9" transform="rotate(-8 730 330)"/>
  <!-- Layer 3: 스트릭 배지 + 점수 -->
  <rect x="280" y="770" width="464" height="80" rx="22" fill="#FF3D00"/>
  <text x="512" y="824" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#FDD835" text-anchor="middle">🔥 STREAK!</text>
  <!-- 숫자 배지들 -->
  <circle cx="310" cy="740" r="38" fill="#FDD835"/>
  <text x="310" y="757" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#FF3D00" text-anchor="middle">3</text>
  <circle cx="510" cy="720" r="46" fill="#FDD835"/>
  <text x="510" y="740" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#FF3D00" text-anchor="middle">5</text>
  <circle cx="730" cy="710" r="38" fill="#FF9800"/>
  <text x="730" y="727" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">+</text>
</svg>
