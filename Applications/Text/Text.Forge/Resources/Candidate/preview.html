<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Text.Forge - Icon Candidates</title>
<style>
  body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { color: #e94560; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.25s ease; }
  .card:hover { transform: translateY(-6px) scale(1.04); border-color: #e94560; box-shadow: 0 12px 32px rgba(233,69,96,0.3); }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card span { display: block; margin-top: 10px; font-size: 12px; color: #888; }
  .card:hover span { color: #e94560; }
</style>
</head>
<body>
<h1>Text.Forge</h1>
<p>Advanced text editor/transformer — 10 icon candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_hammer_forge.svg" alt="01"><span>01 · Hammer Forge</span></div>
  <div class="card"><img src="candidate_02_letter_anvil.svg" alt="02"><span>02 · Letter Anvil</span></div>
  <div class="card"><img src="candidate_03_text_fire.svg" alt="03"><span>03 · Text Fire</span></div>
  <div class="card"><img src="candidate_04_word_craft.svg" alt="04"><span>04 · Word Craft</span></div>
  <div class="card"><img src="candidate_05_text_manipulation.svg" alt="05"><span>05 · Text Manipulation</span></div>
  <div class="card"><img src="candidate_06_letter_smithy.svg" alt="06"><span>06 · Letter Smithy</span></div>
  <div class="card"><img src="candidate_07_processor_gear.svg" alt="07"><span>07 · Processor Gear</span></div>
  <div class="card"><img src="candidate_08_word_forge_art.svg" alt="08"><span>08 · Word Forge Art</span></div>
  <div class="card"><img src="candidate_09_text_alchemy.svg" alt="09"><span>09 · Text Alchemy</span></div>
  <div class="card"><img src="candidate_10_letter_transform.svg" alt="10"><span>10 · Letter Transform</span></div>
</div>
</body>
</html>
