<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#302b63"/>
    </linearGradient>
    <linearGradient id="fort" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Castle/fortress -->
  <rect x="100" y="250" width="312" height="200" rx="8" fill="url(#fort)" opacity="0.5"/>
  <rect x="100" y="250" width="312" height="200" rx="8" stroke="url(#fort)" stroke-width="4" fill="none"/>
  <!-- Battlements -->
  <rect x="100" y="210" width="50" height="50" rx="5" fill="url(#fort)" opacity="0.7"/>
  <rect x="170" y="210" width="50" height="50" rx="5" fill="url(#fort)" opacity="0.7"/>
  <rect x="240" y="210" width="50" height="50" rx="5" fill="url(#fort)" opacity="0.7"/>
  <rect x="310" y="210" width="50" height="50" rx="5" fill="url(#fort)" opacity="0.7"/>
  <rect x="380" y="210" width="32" height="50" rx="5" fill="url(#fort)" opacity="0.7"/>
  <!-- Gate/door -->
  <path d="M216 450 L216 330 C216 310 296 310 296 330 L296 450 Z" fill="#0f0c29"/>
  <!-- ENV text on fortress -->
  <text x="256" y="300" font-family="monospace" font-size="30" text-anchor="middle" fill="url(#fort)" font-weight="bold">ENV</text>
  <text x="256" y="480" font-family="monospace" font-size="22" text-anchor="middle" fill="url(#fort)" opacity="0.8">GUARD</text>
  <!-- Tower windows -->
  <rect x="130" y="285" width="28" height="36" rx="14" fill="url(#fort)" opacity="0.3"/>
  <rect x="354" y="285" width="28" height="36" rx="14" fill="url(#fort)" opacity="0.3"/>
</svg>
