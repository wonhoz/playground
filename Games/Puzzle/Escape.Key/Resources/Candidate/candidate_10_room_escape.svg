<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b2d42"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="room_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef233c"/>
      <stop offset="100%" style="stop-color:#8d99ae"/>
    </linearGradient>
    <linearGradient id="exit_light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd200"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Room walls (perspective) -->
  <polygon points="60,80 452,80 380,200 132,200" fill="#1a1a1a" stroke="url(#room_g)" stroke-width="3"/>
  <rect x="60" y="80" width="60" height="380" fill="#1a1a1a" stroke="url(#room_g)" stroke-width="3"/>
  <rect x="392" y="80" width="60" height="380" fill="#1a1a1a" stroke="url(#room_g)" stroke-width="3"/>
  <rect x="60" y="80" width="392" height="60" fill="#111" stroke="url(#room_g)" stroke-width="3"/>
  <!-- Floor -->
  <rect x="60" y="380" width="392" height="80" fill="#111" stroke="url(#room_g)" stroke-width="3"/>
  <!-- Door with light -->
  <rect x="190" y="250" width="132" height="210" rx="8" fill="#1a1a1a" stroke="url(#exit_light)" stroke-width="6"/>
  <!-- Light beam -->
  <path d="M190 250 L100 160 M322 250 L420 160" stroke="url(#exit_light)" stroke-width="2" opacity="0.4"/>
  <!-- EXIT sign -->
  <rect x="198" y="260" width="116" height="34" rx="6" fill="url(#exit_light)" opacity="0.8"/>
  <text x="256" y="283" font-family="monospace" font-size="22" text-anchor="middle" fill="#1a1a1a" font-weight="bold">EXIT</text>
  <!-- Key on floor -->
  <circle cx="256" cy="370" r="18" stroke="url(#exit_light)" stroke-width="7" fill="none"/>
  <line x1="269" y1="382" x2="290" y2="400" stroke="url(#exit_light)" stroke-width="7" stroke-linecap="round"/>
  <line x1="282" y1="395" x2="292" y2="383" stroke="url(#exit_light)" stroke-width="5" stroke-linecap="round"/>
</svg>
