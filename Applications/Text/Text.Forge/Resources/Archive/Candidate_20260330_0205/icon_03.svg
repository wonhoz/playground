<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 적갈색 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- Layer 2: 모루 (anvil) -->
  <!-- 모루 상단 -->
  <rect x="200" y="560" width="624" height="120" rx="24" fill="url(#anvil)"/>
  <!-- 모루 목 -->
  <rect x="300" y="680" width="100" height="80" rx="8" fill="#546E7A"/>
  <!-- 모루 받침 -->
  <rect x="220" y="750" width="584" height="80" rx="16" fill="#455A64"/>

  <!-- 망치 (hammer) — 내려치는 모션 -->
  <g transform="translate(440 120) rotate(30, 120, 200)">
    <!-- 손잡이 -->
    <rect x="100" y="180" width="36" height="260" rx="14" fill="#8D6E63"/>
    <!-- 망치 머리 -->
    <rect x="30" y="100" width="176" height="96" rx="18" fill="url(#hammer)"/>
    <!-- 망치 하이라이트 -->
    <rect x="30" y="100" width="176" height="30" rx="18" fill="#FFCC02" opacity="0.4"/>
  </g>

  <!-- 모루 위 텍스트 (단조 중인 텍스트) -->
  <rect x="240" y="480" width="544" height="88" rx="14" fill="#FF8F00" opacity="0.9"/>
  <text x="512" y="527" font-family="'Courier New',monospace" font-weight="900" font-size="60" fill="white" text-anchor="middle" dominant-baseline="middle">TEXT</text>

  <!-- 불꽃 (spark) -->
  <circle cx="480" cy="456" r="12" fill="#FFD740" opacity="0.9"/>
  <circle cx="540" cy="440" r="8" fill="#FF8F00" opacity="0.8"/>
  <circle cx="600" cy="452" r="10" fill="#FFEE58" opacity="0.7"/>
  <circle cx="460" cy="430" r="7" fill="#FFCA28" opacity="0.6"/>
  <circle cx="620" cy="430" r="6" fill="#FF6F00" opacity="0.6"/>

  <!-- Layer 3: 앱 이름 -->
  <rect x="260" y="880" width="504" height="82" rx="18" fill="#4E342E" opacity="0.8"/>
  <text x="512" y="922" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FF8F00" text-anchor="middle" dominant-baseline="middle">TEXT FORGE</text>
</svg>
