<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="60%" style="stop-color:#0d3a5c"/>
      <stop offset="100%" style="stop-color:#0a2a4a"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sky/water divider -->
  <rect x="0" y="240" width="512" height="272" rx="0" fill="url(#water)"/>
  <rect x="0" y="430" width="512" height="82" rx="80" fill="url(#water)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="2" fill="white" fill-opacity="0.6"/>
  <circle cx="150" cy="50" r="2" fill="white" fill-opacity="0.5"/>
  <circle cx="380" cy="70" r="2" fill="white" fill-opacity="0.7"/>
  <circle cx="440" cy="100" r="2" fill="white" fill-opacity="0.4"/>
  <!-- Moon -->
  <circle cx="420" cy="100" r="30" fill="#fffde7" fill-opacity="0.9"/>
  <circle cx="435" cy="90" r="22" fill="#0d3a5c"/>
  <!-- Fishing rod -->
  <line x1="100" y1="120" x2="280" y2="240" stroke="#8d6e63" stroke-width="6" stroke-linecap="round"/>
  <!-- Fishing line -->
  <line x1="280" y1="240" x2="320" y2="380" stroke="#e0e0e0" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Hook -->
  <path d="M 318 376 Q 318 410 340 410 Q 362 410 362 388 Q 362 375 350 368" fill="none" stroke="#c0c0c0" stroke-width="4" stroke-linecap="round"/>
  <line x1="350" y1="368" x2="358" y2="364" stroke="#c0c0c0" stroke-width="4" stroke-linecap="round"/>
  <!-- Fish -->
  <ellipse cx="390" cy="395" rx="36" ry="20" fill="#ff6b35"/>
  <polygon points="426,395 450,375 450,415" fill="#ff6b35"/>
  <circle cx="380" cy="390" r="4" fill="#1a1a1a"/>
  <!-- Water ripples -->
  <ellipse cx="320" cy="378" rx="30" ry="8" fill="none" stroke="#64b5f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <ellipse cx="320" cy="378" rx="50" ry="13" fill="none" stroke="#64b5f6" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Angler silhouette -->
  <circle cx="90" cy="108" r="16" fill="#1a1a2a"/>
  <rect x="76" y="124" width="28" height="40" rx="8" fill="#1a1a2a"/>
</svg>