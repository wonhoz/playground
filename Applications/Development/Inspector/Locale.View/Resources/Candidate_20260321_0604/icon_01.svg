<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="lv1-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <radialGradient id="lv1-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1A6ACC"/>
      <stop offset="100%" stop-color="#0A3A80"/>
    </radialGradient>
    <filter id="lv1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g clip-path="url(#lv1-clip)">
    <!-- Background: Vivid Cobalt -->
    <rect width="1024" height="1024" fill="url(#lv1-bg)"/>
    <!-- Star field -->
    <circle cx="200" cy="200" r="3" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="800" cy="180" r="2" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="160" cy="750" r="3" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="860" cy="700" r="2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="700" cy="820" r="3" fill="#FFFFFF" opacity="0.3"/>

    <!-- Globe (white wireframe style) -->
    <g filter="url(#lv1-shadow)">
      <!-- Globe outer circle -->
      <circle cx="512" cy="480" r="230" fill="#1A50A0" stroke="#FFFFFF" stroke-width="12"/>
      <!-- Equator line -->
      <ellipse cx="512" cy="480" rx="230" ry="60" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.7"/>
      <!-- Top tropic -->
      <ellipse cx="512" cy="380" rx="190" ry="48" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.5"/>
      <!-- Bottom tropic -->
      <ellipse cx="512" cy="580" rx="190" ry="48" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.5"/>
      <!-- Vertical meridian -->
      <ellipse cx="512" cy="480" rx="60" ry="230" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.7"/>
      <!-- Secondary meridian -->
      <ellipse cx="512" cy="480" rx="160" ry="230" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.4"/>
      <!-- Poles -->
      <circle cx="512" cy="252" r="8" fill="#FFFFFF" opacity="0.8"/>
      <circle cx="512" cy="708" r="8" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- Calendar widget (gold) overlapping globe -->
    <g filter="url(#lv1-shadow)" transform="translate(580, 580)">
      <rect x="0" y="0" width="200" height="180" rx="18" fill="#C87800"/>
      <!-- Calendar header -->
      <rect x="0" y="0" width="200" height="48" rx="18" fill="#E89020"/>
      <rect x="0" y="30" width="200" height="18" fill="#E89020"/>
      <text x="100" y="32" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">March</text>
      <!-- Calendar grid -->
      <g fill="#FFFFFF" font-family="monospace" font-size="16" opacity="0.85">
        <text x="18" y="70">Su</text><text x="48" y="70">Mo</text><text x="78" y="70">Tu</text>
        <text x="108" y="70">We</text><text x="138" y="70">Th</text><text x="168" y="70">Fr</text>
        <line x1="8" y1="76" x2="192" y2="76" stroke="#E89020" stroke-width="1.5" opacity="0.5"/>
        <text x="18" y="98">1</text><text x="48" y="98">2</text><text x="78" y="98">3</text>
        <text x="108" y="98">4</text><text x="138" y="98">5</text><text x="168" y="98">6</text>
        <text x="18" y="122">7</text><text x="48" y="122">8</text><text x="78" y="122">9</text>
        <text x="103" y="122">10</text><text x="133" y="122">11</text><text x="163" y="122">12</text>
        <text x="103" y="146">18</text><text x="133" y="146">19</text>
      </g>
      <!-- Highlight day 21 -->
      <circle cx="62" cy="140" r="14" fill="#FF9030"/>
      <text x="62" y="145" font-family="monospace" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">21</text>
    </g>

    <!-- Globe accent: glowing equator -->
    <ellipse cx="512" cy="480" rx="230" ry="60" fill="none" stroke="#60C0FF" stroke-width="4" opacity="0.4"/>
  </g>
</svg>
