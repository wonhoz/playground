<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#0F172A"/>
  <!-- Layer 2: Main card -->
  <rect x="170" y="230" width="590" height="440" rx="24" fill="#1E293B"/>
  <rect x="170" y="230" width="590" height="440" rx="24" fill="none" stroke="#334155" stroke-width="3"/>
  <!-- Top accent line -->
  <rect x="170" y="230" width="590" height="8" rx="4" fill="#4F46E5"/>
  <!-- Layer 3: Card content -->
  <!-- Title -->
  <rect x="210" y="270" width="290" height="26" rx="6" fill="#334155"/>
  <text x="355" y="288" font-family="Arial,sans-serif" font-size="15" fill="#E2E8F0" text-anchor="middle">완벽한 번역 프롬프트</text>
  <!-- Star icon (favorite) -->
  <polygon points="712,264 723,292 753,292 730,310 739,338 712,321 685,338 694,310 671,292 701,292" fill="#FBBF24"/>
  <!-- Text lines -->
  <rect x="210" y="316" width="500" height="14" rx="4" fill="#475569" opacity="0.7"/>
  <rect x="210" y="342" width="440" height="14" rx="4" fill="#475569" opacity="0.6"/>
  <rect x="210" y="368" width="370" height="14" rx="4" fill="#475569" opacity="0.5"/>
  <!-- Divider -->
  <line x1="210" y1="408" x2="720" y2="408" stroke="#334155" stroke-width="2"/>
  <!-- Tag chips -->
  <rect x="210" y="424" width="86" height="26" rx="13" fill="#134E4A"/>
  <text x="253" y="441" font-family="Arial,sans-serif" font-size="13" fill="#2DD4BF" text-anchor="middle">번역</text>
  <rect x="308" y="424" width="86" height="26" rx="13" fill="#1E3A8A"/>
  <text x="351" y="441" font-family="Arial,sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle">GPT-4</text>
  <rect x="406" y="424" width="86" height="26" rx="13" fill="#312E81"/>
  <text x="449" y="441" font-family="Arial,sans-serif" font-size="13" fill="#A78BFA" text-anchor="middle">중요</text>
  <!-- Version badge -->
  <rect x="648" y="424" width="60" height="26" rx="13" fill="#374151"/>
  <text x="678" y="441" font-family="Arial,sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle">v3</text>
  <!-- Teal decorative dots -->
  <circle cx="210" cy="490" r="8" fill="#2DD4BF" opacity="0.5"/>
  <circle cx="232" cy="490" r="8" fill="#2DD4BF" opacity="0.4"/>
  <circle cx="254" cy="490" r="8" fill="#2DD4BF" opacity="0.3"/>
</svg>