  <circle cx="878" cy="250" r="18" fill="#8B5CF6" opacity="0.75"/>
  <!-- Row 3 - 8 forming a face shape -->
  <circle cx="180" cy="340" r="24" fill="#EC4899" opacity="0.75"/>
  <circle cx="290" cy="340" r="28" fill="#EF4444" opacity="0.8"/>
  <circle cx="400" cy="330" r="30" fill="#F97316" opacity="0.85"/>
