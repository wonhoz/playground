<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0A00"/>
  <!-- Donut chart outer ring -->
  <!-- Segment 1 (~35%) orange -->
  <path d="M512 512 L512 162 A350 350 0 0 1 796 687 Z" fill="#F9A825"/>
  <!-- Segment 2 (~30%) light -->
  <path d="M512 512 L796 687 A350 350 0 0 1 284 762 Z" fill="#FFD54F"/>
  <!-- Segment 3 (~20%) dimmer -->
  <path d="M512 512 L284 762 A350 350 0 0 1 164 396 Z" fill="#F9A825" opacity="0.5"/>
  <!-- Segment 4 (~15%) -->
  <path d="M512 512 L164 396 A350 350 0 0 1 512 162 Z" fill="#FFD54F" opacity="0.35"/>
  <!-- Donut hole -->
  <circle cx="512" cy="512" r="200" fill="#0A0A00"/>
  <!-- Inner ring outline -->
  <circle cx="512" cy="512" r="200" fill="none" stroke="#F9A825" stroke-width="8"/>
  <!-- Percentage marks -->
  <line x1="512" y1="312" x2="512" y2="162" stroke="#0A0A00" stroke-width="6"/>
  <line x1="762" y1="600" x2="796" y2="687" stroke="#0A0A00" stroke-width="6"/>
</svg>