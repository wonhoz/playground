<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: hybrid · 중앙심볼 · 카메라+비디오+폴더 트리 -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B2EBF2"/>
      <stop offset="1" stop-color="#4DD0E1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg08)"/>
  <!-- 중앙 메인 폴더 -->
  <g>
    <path d="M 180 360 L 340 360 L 400 300 L 844 300 Q 884 300 884 340 L 884 820 Q 884 860 844 860 L 180 860 Q 140 860 140 820 L 140 400 Q 140 360 180 360 Z" fill="#FFFFFF" stroke="#006064" stroke-width="20"/>
    <!-- 폴더 탭 -->
    <path d="M 180 360 L 340 360 L 400 300 L 600 300 Q 620 300 620 320 L 620 400 L 140 400 L 140 400 Q 140 360 180 360 Z" fill="#FFD93D" stroke="#006064" stroke-width="20"/>
    <text x="380" y="378" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#006064" text-anchor="middle">2026 / 04</text>
  </g>
  <!-- 폴더 안: 사진 + 비디오 아이콘 -->
  <g>
    <!-- 사진 (좌) -->
    <rect x="200" y="450" width="300" height="220" rx="20" fill="#FF6B9D" stroke="#880E4F" stroke-width="14"/>
    <circle cx="450" cy="500" r="30" fill="#FFD93D" stroke="#880E4F" stroke-width="8"/>
    <path d="M 210 660 L 290 570 L 360 620 L 440 540 L 500 600 L 500 660 Z" fill="#FFFFFF"/>
    <!-- 카메라 심볼 오버레이 -->
    <g transform="translate(260 470)">
      <rect x="0" y="0" width="120" height="80" rx="10" fill="#FFFFFF" stroke="#880E4F" stroke-width="8"/>
      <circle cx="60" cy="40" r="26" fill="#880E4F"/>
      <circle cx="60" cy="40" r="14" fill="#FFFFFF"/>
    </g>
    <!-- 비디오 (우) -->
    <rect x="524" y="450" width="300" height="220" rx="20" fill="#3A86FF" stroke="#0D47A1" stroke-width="14"/>
    <!-- 재생 버튼 -->
    <circle cx="674" cy="560" r="70" fill="#FFFFFF" stroke="#0D47A1" stroke-width="10"/>
    <path d="M 654 520 L 710 560 L 654 600 Z" fill="#0D47A1"/>
  </g>
  <!-- 하단 파일명 바 -->
  <g>
    <rect x="200" y="710" width="624" height="110" rx="18" fill="#E0F7FA" stroke="#006064" stroke-width="10"/>
    <text x="512" y="786" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#006064" text-anchor="middle">IMG · MP4 · HEIC</text>
  </g>
  <!-- 우측 상단 배지 -->
  <g>
    <circle cx="870" cy="170" r="100" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
    <text x="870" y="200" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#FFFFFF" text-anchor="middle">13</text>
  </g>
</svg>
