<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 비비드 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#1B5E20"/>
  <!-- Layer 2: 국기 카드 + 물음표 퀴즈 -->
  <!-- 메인 국기 카드 (크게, 어떤 나라?) -->
  <rect x="160" y="180" width="704" height="440" rx="24" fill="white" stroke="#A5D6A7" stroke-width="6"/>
  <!-- 독일 국기 (3색 가로줄) -->
  <rect x="160" y="180" width="704" height="147" rx="0" fill="#000000"/>
  <rect x="160" y="327" width="704" height="147" fill="#DD0000"/>
  <rect x="160" y="474" width="704" height="146" rx="0" fill="#FFCE00"/>
  <!-- 모서리 라운드 유지 위해 위/아래 추가 -->
  <rect x="160" y="180" width="704" height="30" rx="24" fill="#000000"/>
  <rect x="160" y="590" width="704" height="30" rx="24" fill="#FFCE00"/>
  <!-- 물음표 오버레이 -->
  <rect x="160" y="180" width="704" height="440" rx="24" fill="#1B5E20" opacity="0.4"/>
  <text x="512" y="450" font-family="Arial Black,Arial" font-size="220" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">?</text>
  <!-- Layer 3: 선택지 힌트 -->
  <text x="512" y="720" font-family="Arial" font-size="36" fill="#A5D6A7" text-anchor="middle">Which country's flag?</text>
  <text x="512" y="860" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#69F0AE" text-anchor="middle">GEO QUIZ</text>
</svg>
