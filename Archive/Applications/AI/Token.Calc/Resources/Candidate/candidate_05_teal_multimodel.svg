<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001515"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="model1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="model2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Central T (Token) hub -->
  <circle cx="256" cy="200" r="72" fill="#004D40" stroke="#26C6DA" stroke-width="8"/>
  <text x="256" y="224" text-anchor="middle" font-size="56" font-weight="bold" fill="#80DEEA" font-family="monospace" opacity="0.95">T</text>
  <!-- Model bubbles around hub -->
  <!-- GPT-4 -->
  <circle cx="128" cy="120" r="52" fill="#00695C" stroke="url(#model1)" stroke-width="6"/>
  <text x="128" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#E0F2F1" font-family="monospace">GPT</text>
  <text x="128" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#80DEEA" font-family="monospace">4o</text>
  <!-- Claude -->
  <circle cx="384" cy="120" r="52" fill="#00695C" stroke="url(#model2)" stroke-width="6"/>
  <text x="384" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#E0F2F1" font-family="monospace">Claude</text>
  <text x="384" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#80DEEA" font-family="monospace">3.5S</text>
  <!-- Gemini -->
  <circle cx="128" cy="320" r="52" fill="#00695C" stroke="url(#model1)" stroke-width="6"/>
  <text x="128" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#E0F2F1" font-family="monospace">Gemini</text>
  <text x="128" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#80DEEA" font-family="monospace">1.5P</text>
  <!-- Llama -->
  <circle cx="384" cy="320" r="52" fill="#00695C" stroke="url(#model2)" stroke-width="6"/>
  <text x="384" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#E0F2F1" font-family="monospace">Llama</text>
  <text x="384" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#80DEEA" font-family="monospace">3.1</text>
  <!-- Connector lines -->
  <line x1="178" y1="148" x2="204" y2="168" stroke="#80CBC4" stroke-width="4" opacity="0.6"/>
  <line x1="334" y1="148" x2="308" y2="168" stroke="#80CBC4" stroke-width="4" opacity="0.6"/>
  <line x1="178" y1="292" x2="204" y2="232" stroke="#80CBC4" stroke-width="4" opacity="0.6"/>
  <line x1="334" y1="292" x2="308" y2="232" stroke="#80CBC4" stroke-width="4" opacity="0.6"/>
  <!-- Cost display bottom -->
  <rect x="88" y="392" width="336" height="72" rx="16" fill="#00363A" stroke="#26C6DA" stroke-width="5"/>
  <rect x="104" y="408" width="72" height="10" rx="5" fill="#80DEEA" opacity="0.9"/>
  <text x="316" y="444" text-anchor="middle" font-size="26" font-weight="bold" fill="#26C6DA" font-family="monospace" opacity="0.95">$0.0042</text>
</svg>
