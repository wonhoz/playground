<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1445"/>
  <!-- Layer 2: HTTP 메서드 리스트 -->
  <!-- GET -->
  <rect x="80" y="140" width="860" height="130" rx="24" fill="#14532D"/>
  <rect x="80" y="140" width="860" height="130" rx="24" fill="none" stroke="#22C55E" stroke-width="10"/>
  <text x="200" y="225" font-size="80" fill="#4ADE80" font-weight="bold" font-family="Arial Black">GET</text>
  <rect x="680" y="168" width="220" height="74" rx="12" fill="#15803D"/>
  <text x="790" y="220" font-size="44" fill="#DCFCE7" text-anchor="middle" font-family="monospace">/users</text>
  <!-- POST -->
  <rect x="80" y="300" width="860" height="130" rx="24" fill="#451A00"/>
  <rect x="80" y="300" width="860" height="130" rx="24" fill="none" stroke="#F59E0B" stroke-width="10"/>
  <text x="200" y="385" font-size="76" fill="#FCD34D" font-weight="bold" font-family="Arial Black">POST</text>
  <rect x="680" y="328" width="220" height="74" rx="12" fill="#7C2D12"/>
  <text x="790" y="380" font-size="44" fill="#FDE68A" text-anchor="middle" font-family="monospace">/create</text>
  <!-- PUT -->
  <rect x="80" y="460" width="860" height="130" rx="24" fill="#1E3A8A"/>
  <rect x="80" y="460" width="860" height="130" rx="24" fill="none" stroke="#3B82F6" stroke-width="10"/>
  <text x="200" y="545" font-size="80" fill="#60A5FA" font-weight="bold" font-family="Arial Black">PUT</text>
  <rect x="680" y="488" width="220" height="74" rx="12" fill="#1D4ED8"/>
  <text x="790" y="540" font-size="44" fill="#BFDBFE" text-anchor="middle" font-family="monospace">/update</text>
  <!-- DELETE -->
  <rect x="80" y="620" width="860" height="130" rx="24" fill="#450A0A"/>
  <rect x="80" y="620" width="860" height="130" rx="24" fill="none" stroke="#EF4444" stroke-width="10"/>
  <text x="200" y="705" font-size="68" fill="#FCA5A5" font-weight="bold" font-family="Arial Black">DELETE</text>
  <!-- Layer 3: 상단 API 타이틀 -->
  <rect x="80" y="790" width="860" height="90" rx="20" fill="#1E293B"/>
  <text x="512" y="850" font-size="50" fill="#94A3B8" text-anchor="middle" font-family="monospace">api.example.com</text>
</svg>
