      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 터미널 창 -->
  <rect x="70" y="120" width="372" height="260" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="2"/>
