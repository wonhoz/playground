<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg10)"/>
  <!-- Rainbow word waterfall - 7 rows, each a different color, words flowing downward -->
  <!-- Row 1: Red -->
  <text x="512" y="248" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#EF4444">Cloud</text>
  <!-- Row 2: Orange -->
  <text x="512" y="336" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="#F97316">Word</text>
  <!-- Row 3: Yellow -->
  <text x="512" y="420" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="70" font-weight="900" fill="#EAB308">Text</text>
  <!-- Row 4: Green -->
  <text x="512" y="508" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#22C55E">Data</text>
  <!-- Row 5: Cyan/Teal -->
  <text x="512" y="592" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#06B6D4">Font</text>
  <!-- Row 6: Blue -->
  <text x="512" y="672" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#3B82F6">Color</text>
  <!-- Row 7: Purple/Violet -->
  <text x="512" y="750" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#A855F7">Export</text>
  <!-- Glow effects / reflection lines -->
  <line x1="220" y1="280" x2="804" y2="280" stroke="rgba(239,68,68,0.2)" stroke-width="2"/>
  <line x1="220" y1="366" x2="804" y2="366" stroke="rgba(249,115,22,0.2)" stroke-width="2"/>
  <line x1="220" y1="450" x2="804" y2="450" stroke="rgba(234,179,8,0.2)" stroke-width="2"/>
  <line x1="220" y1="536" x2="804" y2="536" stroke="rgba(34,197,94,0.2)" stroke-width="2"/>
  <line x1="220" y1="620" x2="804" y2="620" stroke="rgba(6,182,212,0.2)" stroke-width="2"/>
  <line x1="220" y1="700" x2="804" y2="700" stroke="rgba(59,130,246,0.2)" stroke-width="2"/>
  <!-- Side decorative bars (waterfall effect) -->
  <rect x="195" y="220" width="12" height="570" rx="6" fill="url(#rainbowBar)"/>
  <rect x="817" y="220" width="12" height="570" rx="6" fill="url(#rainbowBar)"/>
  <defs>
    <linearGradient id="rainbowBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="16%" style="stop-color:#F97316"/>
      <stop offset="32%" style="stop-color:#EAB308"/>
      <stop offset="50%" style="stop-color:#22C55E"/>
      <stop offset="68%" style="stop-color:#06B6D4"/>
      <stop offset="84%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
</svg>
