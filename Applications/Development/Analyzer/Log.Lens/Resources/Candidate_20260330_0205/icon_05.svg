<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 크림 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg5)"/>

  <!-- Layer 2: 수사 메모판 (코르크 보드) -->
  <rect x="80" y="120" width="864" height="700" rx="20" fill="#D7CCC8"/>
  <!-- 코르크 텍스처 -->
  <rect x="90" y="130" width="844" height="680" rx="16" fill="#BCAAA4"/>

  <!-- 수사 메모들 — 로그 스티커 -->
  <!-- 노란 포스트잇 1 -->
  <rect x="120" y="160" width="280" height="200" rx="8" fill="#FFF59D" transform="rotate(-3 260 260)"/>
  <text x="140" y="220" font-family="'Courier New',monospace" font-size="28" fill="#1A1A1A" transform="rotate(-3 260 260)">[ERROR] 12:04</text>
  <text x="140" y="260" font-family="'Courier New',monospace" font-size="26" fill="#D32F2F" transform="rotate(-3 260 260)">NullRef #1</text>
  <text x="140" y="300" font-family="'Courier New',monospace" font-size="26" fill="#D32F2F" transform="rotate(-3 260 260)">stack:42</text>
  <!-- 핀 -->
  <circle cx="260" cy="168" r="16" fill="#D32F2F"/>

  <!-- 빨간 포스트잇 2 -->
  <rect x="450" y="140" width="280" height="180" rx="8" fill="#FF8A80" transform="rotate(4 590 230)"/>
  <text x="468" y="190" font-family="'Courier New',monospace" font-size="28" fill="white" transform="rotate(4 590 230)">[ERROR] 12:07</text>
  <text x="468" y="230" font-family="'Courier New',monospace" font-size="26" fill="white" transform="rotate(4 590 230)">Timeout #2</text>
  <circle cx="580" cy="148" r="16" fill="#880E4F" transform="rotate(4 590 230)"/>

  <!-- 파란 포스트잇 3 -->
  <rect x="130" y="420" width="240" height="160" rx="8" fill="#90CAF9" transform="rotate(2 250 500)"/>
  <text x="148" y="470" font-family="'Courier New',monospace" font-size="26" fill="#0D47A1" transform="rotate(2 250 500)">[WARN] 12:05</text>
  <text x="148" y="510" font-family="'Courier New',monospace" font-size="24" fill="#0D47A1" transform="rotate(2 250 500)">Mem 90%</text>
  <circle cx="250" cy="428" r="14" fill="#1565C0" transform="rotate(2 250 500)"/>

  <!-- 빨간 실 연결선 -->
  <line x1="260" y1="340" x2="450" y2="280" stroke="#D32F2F" stroke-width="5" stroke-dasharray="12 6" opacity="0.7"/>
  <line x1="580" y1="320" x2="520" y2="460" stroke="#D32F2F" stroke-width="4" stroke-dasharray="10 5" opacity="0.5"/>

  <!-- 큰 [ERROR] 레이블 -->
  <rect x="480" y="430" width="380" height="90" rx="16" fill="#D32F2F"/>
  <text x="670" y="477" font-family="'Courier New',monospace" font-weight="900" font-size="58" fill="white" text-anchor="middle" dominant-baseline="middle">[ERROR]</text>

  <!-- Layer 3: 돋보기 오버레이 -->
  <circle cx="810" cy="680" r="130" fill="white" opacity="0.8"/>
  <circle cx="810" cy="680" r="130" fill="none" stroke="#5D4037" stroke-width="22"/>
  <line x1="896" y1="766" x2="966" y2="836" stroke="#5D4037" stroke-width="28" stroke-linecap="round"/>
  <text x="810" y="688" font-family="'Courier New',monospace" font-size="36" fill="#D32F2F" text-anchor="middle" dominant-baseline="middle">3 ERR</text>
</svg>
