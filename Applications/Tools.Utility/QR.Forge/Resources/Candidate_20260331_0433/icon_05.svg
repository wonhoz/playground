  <rect x="248" y="520" width="44" height="44" rx="6" fill="#F57F17"/>
  <!-- Layer 3: 중앙 로고 슬롯 (QrStyle.LogoPath) -->
  <rect x="400" y="400" width="224" height="224" rx="24" fill="white" stroke="#6A1B9A" stroke-width="6"/>
  <rect x="416" y="416" width="192" height="192" rx="18" fill="#6A1B9A"/>
  <text x="512" y="504" font-family="'Consolas', monospace" font-size="60" fill="white" text-anchor="middle" font-weight="700">QR</text>
  <text x="512" y="564" font-family="'Consolas', monospace" font-size="44" fill="#CE93D8" text-anchor="middle" font-weight="700">FORGE</text>
