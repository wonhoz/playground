<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0505"/>
      <stop offset="100%" stop-color="#2E0A0A"/>
    </linearGradient>
    <linearGradient id="red_tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC2222"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="ivory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEE8E0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cascade dominos arc -->
  <!-- D1 standing -->
  <rect x="60" y="188" width="46" height="92" rx="7" fill="url(#ivory)" stroke="#CC2222" stroke-width="2.5"/>
  <line x1="60" y1="234" x2="106" y2="234" stroke="#CC2222" stroke-width="2"/>
  <circle cx="76" cy="212" r="5" fill="#CC2222"/>
  <circle cx="90" cy="212" r="5" fill="#CC2222"/>
  <circle cx="83" cy="255" r="5" fill="#CC2222"/>
  <!-- D2 -->
  <g transform="rotate(-18 175 258)">
    <rect x="152" y="188" width="46" height="92" rx="7" fill="url(#red_tile)" stroke="#FF4444" stroke-width="2"/>
    <line x1="152" y1="234" x2="198" y2="234" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <circle cx="168" cy="212" r="4.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="182" cy="255" r="4.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <!-- D3 -->
  <g transform="rotate(-40 265 265)">
    <rect x="242" y="188" width="46" height="92" rx="7" fill="url(#ivory)" stroke="#CC2222" stroke-width="2.5"/>
    <line x1="242" y1="234" x2="288" y2="234" stroke="#CC2222" stroke-width="2"/>
    <circle cx="256" cy="210" r="4.5" fill="#CC2222"/>
    <circle cx="274" cy="210" r="4.5" fill="#CC2222"/>
    <circle cx="265" cy="234" r="4.5" fill="#CC2222"/>
    <circle cx="256" cy="256" r="4.5" fill="#CC2222"/>
    <circle cx="274" cy="256" r="4.5" fill="#CC2222"/>
  </g>
  <!-- D4 -->
  <g transform="rotate(-65 360 275)">
    <rect x="337" y="188" width="46" height="92" rx="7" fill="url(#red_tile)" stroke="#FF4444" stroke-width="2"/>
    <line x1="337" y1="234" x2="383" y2="234" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <circle cx="353" cy="212" r="4.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="367" cy="256" r="4.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="353" cy="256" r="4.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <!-- Impact burst -->
  <circle cx="436" cy="290" r="40" fill="#FF2200" opacity="0.15"/>
  <line x1="436" y1="258" x2="436" y2="245" stroke="#FF4400" stroke-width="3" opacity="0.8"/>
  <line x1="462" y1="266" x2="473" y2="257" stroke="#FF4400" stroke-width="3" opacity="0.8"/>
  <line x1="466" y1="295" x2="480" y2="295" stroke="#FF4400" stroke-width="3" opacity="0.8"/>
  <line x1="454" y1="316" x2="464" y2="326" stroke="#FF4400" stroke-width="3" opacity="0.8"/>
  <line x1="410" y1="266" x2="399" y2="257" stroke="#FF4400" stroke-width="3" opacity="0.8"/>
  <!-- Floor line -->
  <line x1="40" y1="310" x2="472" y2="310" stroke="#CC4444" stroke-width="2" opacity="0.4"/>
  <text x="256" y="455" font-family="Arial Black" font-size="26" fill="#FF4444" text-anchor="middle">DOMINO·CHAIN</text>
</svg>
