<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <clipPath id="c8"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Deep indigo background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g8)"/>
  <g clip-path="url(#c8)">
    <!-- Layer 2: Input SVG file (left) -->
    <rect x="116" y="374" width="218" height="276" rx="20" fill="#818CF8"/>
    <!-- File fold corner -->
    <polygon points="274,374 334,374 334,434 274,434" fill="#A5B4FC"/>
    <line x1="274" y1="374" x2="334" y2="434" stroke="#818CF8" stroke-width="8"/>
    <text x="225" y="566" font-family="Arial Black,Arial,sans-serif" font-size="100" fill="white" font-weight="900" text-anchor="middle">SVG</text>
    <!-- Arrow -->
    <line x1="346" y1="512" x2="456" y2="512" stroke="#6366F1" stroke-width="60" stroke-linecap="round"/>
    <polygon points="430,454 510,512 430,570" fill="#6366F1"/>
    <!-- Layer 2: ICO size grid (right) 2×2 of different sizes -->
    <!-- 256px (top-left of grid) -->
    <rect x="524" y="234" width="214" height="214" rx="18" fill="#4F46E5"/>
    <text x="631" y="308" font-family="Arial,sans-serif" font-size="80" fill="#C4B5FD" font-weight="bold" text-anchor="middle">256</text>
    <text x="631" y="402" font-family="Arial,sans-serif" font-size="80" fill="white" font-weight="bold" text-anchor="middle">px</text>
    <!-- 128px (top-right) -->
    <rect x="752" y="234" width="156" height="156" rx="14" fill="#6D28D9"/>
    <text x="830" y="306" font-family="Arial,sans-serif" font-size="80" fill="#DDD6FE" font-weight="bold" text-anchor="middle">128</text>
    <text x="830" y="370" font-family="Arial,sans-serif" font-size="80" fill="white" font-weight="bold" text-anchor="middle">px</text>
    <!-- 32px (bottom-left) -->
    <rect x="524" y="576" width="156" height="156" rx="14" fill="#0891B2"/>
    <text x="602" y="643" font-family="Arial,sans-serif" font-size="80" fill="#BAE6FD" font-weight="bold" text-anchor="middle">32</text>
    <text x="602" y="707" font-family="Arial,sans-serif" font-size="80" fill="white" font-weight="bold" text-anchor="middle">px</text>
    <!-- 16px (bottom-right, smallest) -->
    <rect x="752" y="576" width="104" height="104" rx="12" fill="#0E7490"/>
    <text x="804" y="628" font-family="Arial,sans-serif" font-size="80" fill="#E0F2FE" font-weight="bold" text-anchor="middle">16</text>
    <!-- Layer 3: ".ico" label at bottom -->
    <text x="726" y="846" font-family="Arial Black,Arial,sans-serif" font-size="96" fill="#99F6E4" font-weight="900" text-anchor="middle">.ico</text>
  </g>
</svg>
