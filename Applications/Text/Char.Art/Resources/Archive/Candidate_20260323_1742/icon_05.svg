<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A0A20"/>
  <!-- Layer 2: 큰 A 글자 윤곽 내부가 ASCII 문자로 채워진 -->
  <!-- A 글자 외곽 (보라 글로우) -->
  <text x="512" y="800" font-size="900" fill="#C084FC" text-anchor="middle" font-family="Arial Black" font-weight="bold" opacity="0.15">A</text>
  <text x="512" y="800" font-size="900" fill="none" stroke="#7C3AED" stroke-width="8" text-anchor="middle" font-family="Arial Black" font-weight="bold">A</text>
  <!-- ASCII 문자들로 A 채우기 (내부를 가득 채우는 텍스트 격자) -->
  <text x="350" y="240" font-size="24" fill="#9333EA" font-family="monospace">@#*+.</text>
  <text x="320" y="272" font-size="24" fill="#A855F7" font-family="monospace">@@##**++..</text>
  <text x="300" y="304" font-size="24" fill="#9333EA" font-family="monospace">@@@###***+++...</text>
  <text x="280" y="336" font-size="24" fill="#A855F7" font-family="monospace">@@@####***+++....   </text>
  <text x="264" y="368" font-size="24" fill="#9333EA" font-family="monospace">@@@@#####****++++.....</text>
  <text x="248" y="400" font-size="24" fill="#A855F7" font-family="monospace">@@@@@######*****+++++....</text>
  <text x="248" y="432" font-size="24" fill="#9333EA" font-family="monospace">@@@@@@#######*****+++++...</text>
  <text x="248" y="464" font-size="24" fill="#A855F7" font-family="monospace">@@@@@@@@@@@@@@@@@@@@@@@@</text>
  <text x="248" y="496" font-size="24" fill="#9333EA" font-family="monospace">@@@@@@@@@##########@@@@@</text>
  <text x="248" y="528" font-size="24" fill="#A855F7" font-family="monospace">@@@@@@##***+....+***##@@</text>
  <text x="248" y="560" font-size="24" fill="#9333EA" font-family="monospace">@@@@@##***++....++***##@</text>
  <text x="248" y="592" font-size="24" fill="#A855F7" font-family="monospace">@@@@##****+++....+++***#</text>
  <text x="248" y="624" font-size="24" fill="#9333EA" font-family="monospace">@@@##****++++....++++***</text>
  <text x="248" y="656" font-size="24" fill="#A855F7" font-family="monospace">@@##*****+++++...+++++**</text>
  <text x="248" y="688" font-size="24" fill="#9333EA" font-family="monospace">@##*****++++++..++++++**</text>
  <text x="248" y="720" font-size="24" fill="#A855F7" font-family="monospace">##*****+++++++.+++++++**</text>
  <text x="248" y="752" font-size="24" fill="#9333EA" font-family="monospace">@@@@@@@@@@@@@@@@@@@@@@@@</text>
  <!-- Layer 3: 설명 배지 -->
  <rect x="240" y="840" width="544" height="80" rx="20" fill="#2E0A4A" stroke="#7C3AED" stroke-width="6"/>
  <text x="512" y="893" font-size="48" fill="#E0AAFF" text-anchor="middle" font-family="monospace">ASCII Art</text>
</svg>
