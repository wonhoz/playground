<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="speed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speed lines behind ball -->
  <line x1="60" y1="218" x2="220" y2="218" stroke="#FF0080" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="228" x2="220" y2="228" stroke="#FF4400" stroke-width="2" opacity="0.45"/>
  <line x1="100" y1="238" x2="220" y2="238" stroke="#FF8800" stroke-width="2" opacity="0.3"/>
  <!-- Bricks - some destroyed -->
  <rect x="68" y="96" width="76" height="30" rx="4" fill="#FF0080"/>
  <rect x="154" y="96" width="76" height="30" rx="4" fill="#FF0080"/>
  <!-- Destroyed bricks (shards) -->
  <rect x="240" y="94" width="35" height="14" rx="3" fill="#FF4400" opacity="0.8" transform="rotate(15 257 101)"/>
  <rect x="265" y="108" width="28" height="12" rx="3" fill="#FF0080" opacity="0.7" transform="rotate(-20 279 114)"/>
  <rect x="330" y="90" width="76" height="30" rx="4" fill="#FF0080"/>
  <rect x="68" y="136" width="76" height="30" rx="4" fill="#FF4400"/>
  <rect x="154" y="136" width="76" height="30" rx="4" fill="#FF4400"/>
  <rect x="330" y="136" width="76" height="30" rx="4" fill="#FF4400"/>
  <rect x="68" y="176" width="76" height="30" rx="4" fill="#FF8800"/>
  <rect x="154" y="176" width="76" height="30" rx="4" fill="#FF8800"/>
  <rect x="248" y="176" width="76" height="30" rx="4" fill="#FF8800"/>
  <rect x="330" y="176" width="76" height="30" rx="4" fill="#FF8800"/>
  <!-- Fast ball -->
  <circle cx="230" cy="228" r="16" fill="url(#speed)"/>
  <!-- Paddle -->
  <rect x="148" y="388" width="155" height="22" rx="11" fill="url(#speed)"/>
  <!-- Speed text -->
  <text x="256" y="348" font-family="Arial" font-size="28" font-weight="bold" fill="#FF0080" text-anchor="middle">BLITZ!</text>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8C00" text-anchor="middle">Brick.Blitz</text>
</svg>
