<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Forge flame shaping a music note -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0500"/>
  <!-- Anvil -->
  <rect x="260" y="680" width="500" height="70" rx="14" fill="#5D1A00"/>
  <rect x="220" y="730" width="580" height="56" rx="12" fill="#4A1500"/>
  <!-- Music note on anvil -->
  <rect x="468" y="340" width="38" height="260" rx="10" fill="#FF7043"/>
  <ellipse cx="450" cy="600" rx="66" ry="48" fill="#FF7043" transform="rotate(-15, 450, 600)"/>
  <path d="M506 340 L620 308 L620 344 L506 376 Z" fill="#FF7043"/>
  <!-- Hammer striking -->
  <rect x="610" y="460" width="84" height="180" rx="16" fill="#B0BEC5" transform="rotate(-40, 652, 550)"/>
  <rect x="596" y="420" width="112" height="56" rx="12" fill="#78909C" transform="rotate(-40, 652, 448)"/>
  <!-- Sparks -->
  <circle cx="510" cy="650" r="10" fill="#FFD740"/>
  <circle cx="548" cy="640" r="7" fill="#FFD740" opacity="0.8"/>
  <circle cx="476" cy="642" r="8" fill="#FFAB40" opacity="0.9"/>
  <circle cx="530" cy="620" r="5" fill="#FF6D00" opacity="0.7"/>
  <!-- Fire -->
  <path d="M380 560 Q360 490 400 450 Q420 500 440 460 Q460 420 480 450 Q500 480 480 540 Z" fill="#FF6D00" opacity="0.7"/>
</svg>
