    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="64" y="64" width="172" height="172" rx="20" fill="url(#pad1)" filter="url(#glow)" opacity="0.9"/>
  <rect x="276" y="64" width="172" height="172" rx="20" fill="url(#pad2)" filter="url(#glow)" opacity="0.9"/>
  <rect x="64" y="276" width="172" height="172" rx="20" fill="url(#pad3)" filter="url(#glow)" opacity="0.9"/>
  <rect x="276" y="276" width="172" height="172" rx="20" fill="url(#pad4)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="150" cy="150" r="30" fill="white" opacity="0.3"/>
  <circle cx="362" cy="150" r="30" fill="white" opacity="0.3"/>
  <circle cx="150" cy="362" r="30" fill="white" opacity="0.3"/>
  <circle cx="362" cy="362" r="30" fill="white" opacity="0.3"/>
