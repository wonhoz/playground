<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#365314"/>
      <stop offset="100%" stop-color="#3F6212"/>
    </linearGradient>
    <clipPath id="clip12"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg12)"/>
  <g clip-path="url(#clip12)">
    <!-- Layer 2: .md 박스 (왼쪽) -->
    <rect x="80" y="320" width="260" height="180" rx="18" fill="#FFFFFF" opacity="0.15"/>
    <rect x="80" y="320" width="260" height="180" rx="18" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <text x="210" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="900" fill="#FFFFFF" text-anchor="middle">.md</text>

    <!-- 화살표 (대각선 하강 변환) -->
    <!-- 화살표 몸통 -->
    <line x1="370" y1="380" x2="654" y2="540" stroke="#FDE68A" stroke-width="24" stroke-linecap="round"/>
    <!-- 화살표 머리 -->
    <polygon points="654,540 590,516 624,476" fill="#FDE68A"/>
    <!-- 반짝임 점들 -->
    <circle cx="430" cy="415" r="10" fill="#FDE68A" opacity="0.5"/>
    <circle cx="490" cy="450" r="8" fill="#FDE68A" opacity="0.4"/>
    <circle cx="550" cy="485" r="10" fill="#FDE68A" opacity="0.5"/>

    <!-- HTML 박스 (오른쪽 아래) -->
    <rect x="684" y="524" width="260" height="180" rx="18" fill="#A7F3D0" opacity="0.9"/>
    <rect x="684" y="524" width="260" height="180" rx="18" fill="none" stroke="#A7F3D0" stroke-width="8"/>
    <text x="814" y="636" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="900" fill="#065F46" text-anchor="middle">HTML</text>

    <!-- Layer 3: 작은 장식들 -->
    <!-- 왼쪽 마크다운 소스 미니 -->
    <rect x="100" y="540" width="220" height="12" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <rect x="100" y="562" width="180" height="12" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="100" y="584" width="200" height="12" rx="4" fill="#FFFFFF" opacity="0.25"/>
    <!-- 오른쪽 HTML 렌더링 미니 -->
    <rect x="700" y="740" width="220" height="12" rx="4" fill="#065F46" opacity="0.6"/>
    <rect x="700" y="762" width="180" height="12" rx="4" fill="#065F46" opacity="0.5"/>
    <rect x="700" y="784" width="200" height="12" rx="4" fill="#065F46" opacity="0.4"/>
    <!-- 상단 타이틀 -->
    <text x="512" y="176" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#FDE68A" text-anchor="middle" font-weight="700" opacity="0.85">CONVERT</text>
  </g>
</svg>
