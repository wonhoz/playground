<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_gq05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DB2777"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="c_gq05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Hot pink → purple gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_gq05)"/>
  <g clip-path="url(#c_gq05)">
    <!-- Layer 2: Big question mark (tilted) -->
    <text x="512" y="720" font-family="Arial Black" font-size="840" font-weight="900" fill="white" text-anchor="middle" opacity="0.15" transform="rotate(-12 512 512)">?</text>
    <text x="512" y="720" font-family="Arial Black" font-size="680" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">?</text>
    <!-- Layer 3: Flag emoji tiles scattered around -->
    <!-- Flag tiles (solid color blocks simulating flags) -->
    <!-- Flag 1 (top-left) - red/white/blue stripes -->
    <rect x="100" y="120" width="180" height="120" rx="16" fill="#1D4ED8"/>
    <rect x="100" y="152" width="180" height="40" rx="0" fill="white"/>
    <rect x="100" y="120" width="180" height="40" rx="16" fill="#EF4444"/>
    <!-- Flag 2 (top-right) - green/yellow/red -->
    <rect x="744" y="120" width="180" height="120" rx="16" fill="#16A34A"/>
    <rect x="744" y="152" width="180" height="40" rx="0" fill="#EAB308"/>
    <rect x="744" y="192" width="180" height="48" rx="16" fill="#EF4444"/>
    <!-- Flag 3 (middle-left) - white/red cross -->
    <rect x="60" y="440" width="180" height="120" rx="16" fill="white"/>
    <rect x="60" y="480" width="180" height="40" rx="0" fill="#EF4444"/>
    <rect x="120" y="440" width="60" height="120" rx="0" fill="#EF4444"/>
    <!-- Flag 4 (middle-right) - crescent and star -->
    <rect x="784" y="440" width="180" height="120" rx="16" fill="#15803D"/>
    <circle cx="854" cy="500" r="40" fill="white"/>
    <circle cx="870" cy="490" r="30" fill="#15803D"/>
    <text x="910" y="518" font-family="Arial" font-size="36" fill="white">★</text>
    <!-- Flag 5 (bottom-left) - sun and stripes -->
    <rect x="100" y="760" width="180" height="120" rx="16" fill="#EF4444"/>
    <rect x="100" y="800" width="180" height="40" rx="0" fill="white"/>
    <circle cx="190" cy="800" r="26" fill="#FBBF24"/>
    <!-- Flag 6 (bottom-right) - union jack simplified -->
    <rect x="744" y="760" width="180" height="120" rx="16" fill="#1D4ED8"/>
    <line x1="744" y1="760" x2="924" y2="880" stroke="white" stroke-width="24"/>
    <line x1="924" y1="760" x2="744" y2="880" stroke="white" stroke-width="24"/>
    <line x1="834" y1="760" x2="834" y2="880" stroke="white" stroke-width="20"/>
    <line x1="744" y1="820" x2="924" y2="820" stroke="white" stroke-width="20"/>
    <line x1="744" y1="760" x2="924" y2="880" stroke="#EF4444" stroke-width="10"/>
    <line x1="924" y1="760" x2="744" y2="880" stroke="#EF4444" stroke-width="10"/>
    <line x1="834" y1="760" x2="834" y2="880" stroke="#EF4444" stroke-width="12"/>
    <line x1="744" y1="820" x2="924" y2="820" stroke="#EF4444" stroke-width="12"/>
  </g>
</svg>
