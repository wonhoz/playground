<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B00"/>
      <stop offset="100%" stop-color="#1A0F00"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg2)"/>

  <!-- Grid lines (subtle) -->
  <line x1="130" y1="200" x2="130" y2="730" stroke="#FFD93D" stroke-opacity="0.15" stroke-width="3"/>
  <line x1="130" y1="730" x2="900" y2="730" stroke="#FFD93D" stroke-opacity="0.15" stroke-width="3"/>
  <line x1="130" y1="580" x2="900" y2="580" stroke="#FFD93D" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="12,10"/>
  <line x1="130" y1="430" x2="900" y2="430" stroke="#FFD93D" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="12,10"/>
  <line x1="130" y1="280" x2="900" y2="280" stroke="#FFD93D" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="12,10"/>

  <!-- Bar 1: Documents (tall) -->
  <rect x="160" y="280" width="130" height="450" rx="12" fill="url(#bar1)" filter="url(#glow2)"/>
  <!-- Bar 2: Videos (tallest) -->
  <rect x="330" y="200" width="130" height="530" rx="12" fill="url(#bar2)" filter="url(#glow2)"/>
  <!-- Bar 3: Images -->
  <rect x="500" y="380" width="130" height="350" rx="12" fill="url(#bar3)" filter="url(#glow2)"/>
  <!-- Bar 4: Others -->
  <rect x="670" y="480" width="130" height="250" rx="12" fill="url(#bar4)" filter="url(#glow2)"/>

  <!-- Bar top highlights -->
  <rect x="168" y="288" width="114" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="338" y="208" width="114" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="508" y="388" width="114" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="678" y="488" width="114" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.25"/>

  <!-- "GB" text label — big, bold, center bottom -->
  <text x="512" y="900" font-family="Arial Black, sans-serif" font-size="160" font-weight="900"
        text-anchor="middle" fill="#FFD93D" letter-spacing="8" filter="url(#glow2)">GB</text>
  <!-- Underline accent -->
  <rect x="340" y="916" width="344" height="12" rx="6" fill="#FF8C00" fill-opacity="0.7"/>
</svg>
