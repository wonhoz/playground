<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#F50057"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Diagonal letter scale (A B c d e decreasing) -->
  <!-- Trailing path -->
  <line x1="156" y1="820" x2="900" y2="200" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.25" stroke-dasharray="20 16"/>
  <!-- Big A (uppercase, top-right) -->
  <text x="820" y="260" text-anchor="middle" dominant-baseline="middle" font-size="280" font-family="Georgia,serif" font-weight="bold" fill="white" opacity="0.95">A</text>
  <!-- Medium B -->
  <text x="620" y="440" text-anchor="middle" dominant-baseline="middle" font-size="200" font-family="Georgia,serif" font-weight="bold" fill="#FFD600" opacity="0.9">B</text>
  <!-- Smaller c -->
  <text x="440" y="580" text-anchor="middle" dominant-baseline="middle" font-size="150" font-family="Georgia,serif" fill="#FF80AB" opacity="0.9">c</text>
  <!-- Small d -->
  <text x="300" y="690" text-anchor="middle" dominant-baseline="middle" font-size="110" font-family="Georgia,serif" fill="#80D8FF" opacity="0.85">d</text>
  <!-- Tiny e -->
  <text x="200" y="780" text-anchor="middle" dominant-baseline="middle" font-size="82" font-family="Georgia,serif" fill="#CCFF90" opacity="0.8">e</text>
  <!-- Layer 3: Arrows showing direction -->
  <!-- Arrow from large to small -->
  <text x="512" y="900" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white" opacity="0.7">A → a</text>
  <!-- Small bracket labels -->
  <text x="820" y="150" text-anchor="middle" font-size="68" font-family="Segoe UI,Arial,sans-serif" fill="#FFD600" opacity="0.8">UPPER</text>
  <text x="200" y="860" text-anchor="middle" font-size="68" font-family="Segoe UI,Arial,sans-serif" fill="#B2FF59" opacity="0.8">lower</text>
</svg>
