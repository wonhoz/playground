<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#003060"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0080FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0080FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#001830" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Area chart fill -->
  <path d="M60 380 L60 300 C120 280 150 240 200 220 C250 200 280 180 320 150 C360 120 400 110 450 90 L450 380 Z" fill="url(#fill)"/>
  <!-- Line chart -->
  <polyline points="60,300 120,280 180,240 240,210 300,170 360,130 450,90" fill="none" stroke="url(#wave)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Data points -->
  <circle cx="60" cy="300" r="8" fill="#00D4FF"/>
  <circle cx="120" cy="280" r="8" fill="#00D4FF"/>
  <circle cx="180" cy="240" r="8" fill="#00D4FF"/>
  <circle cx="240" cy="210" r="8" fill="#00D4FF"/>
  <circle cx="300" cy="170" r="8" fill="#00D4FF"/>
  <circle cx="360" cy="130" r="8" fill="#00D4FF"/>
  <circle cx="450" cy="90" r="8" fill="#00D4FF"/>
  <!-- Grid lines -->
  <line x1="60" y1="380" x2="460" y2="380" stroke="#0080FF" stroke-width="2" opacity="0.3"/>
  <line x1="60" y1="310" x2="460" y2="310" stroke="#0080FF" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="240" x2="460" y2="240" stroke="#0080FF" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="170" x2="460" y2="170" stroke="#0080FF" stroke-width="1" opacity="0.2"/>
  <!-- Git icon -->
  <circle cx="256" cy="430" r="20" fill="none" stroke="#0080FF" stroke-width="4"/>
  <text x="256" y="437" text-anchor="middle" fill="#00D4FF" font-size="18" font-family="monospace" font-weight="bold">git</text>
</svg>
