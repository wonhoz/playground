<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 빙고판 — 나라 이름으로 채운 빙고 | 기하학 | #1A0A28 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A28"/>
  <!-- Layer 2: Bingo card with country names -->
  <!-- Card background -->
  <rect x="180" y="180" width="664" height="664" rx="16" fill="#120720" stroke="#7C3AED" stroke-width="5"/>
  <!-- Header: BINGO -->
  <rect x="180" y="180" width="664" height="80" rx="16" fill="#4C1D95"/>
  <text x="246" y="237" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle" font-weight="bold">B</text>
  <text x="378" y="237" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle" font-weight="bold">I</text>
  <text x="512" y="237" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle" font-weight="bold">N</text>
  <text x="646" y="237" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle" font-weight="bold">G</text>
  <text x="778" y="237" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle" font-weight="bold">O</text>
  <!-- Grid cells (5x4 visible) with country names -->
  <!-- Row 1 -->
  <rect x="192" y="274" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="252" y="330" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">한국</text>
  <rect x="324" y="274" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="384" y="330" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">프랑스</text>
  <!-- Marked cell -->
  <rect x="456" y="274" width="120" height="104" rx="4" fill="#3B1E6A"/>
  <circle cx="516" cy="326" r="38" fill="none" stroke="#F472B6" stroke-width="6"/>
  <text x="516" y="330" font-family="Arial,sans-serif" font-size="13" fill="#F9A8D4" text-anchor="middle">일본</text>
  <rect x="588" y="274" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="648" y="330" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">독일</text>
  <rect x="720" y="274" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="780" y="330" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">미국</text>
  <!-- Row 2 -->
  <rect x="192" y="390" width="120" height="104" rx="4" fill="#3B1E6A"/>
  <circle cx="252" cy="442" r="38" fill="none" stroke="#F472B6" stroke-width="6"/>
  <text x="252" y="446" font-family="Arial,sans-serif" font-size="14" fill="#F9A8D4" text-anchor="middle">브라질</text>
  <rect x="324" y="390" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="384" y="446" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">인도</text>
  <rect x="456" y="390" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="516" y="446" font-family="Arial,sans-serif" font-size="13" fill="#A78BFA" text-anchor="middle">캐나다</text>
  <rect x="588" y="390" width="120" height="104" rx="4" fill="#3B1E6A"/>
  <circle cx="648" cy="442" r="38" fill="none" stroke="#F472B6" stroke-width="6"/>
  <text x="648" y="446" font-family="Arial,sans-serif" font-size="14" fill="#F9A8D4" text-anchor="middle">영국</text>
  <rect x="720" y="390" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="780" y="446" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">호주</text>
  <!-- Row 3 - BINGO diagonal -->
  <rect x="192" y="506" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="252" y="562" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">이탈리아</text>
  <rect x="324" y="506" width="120" height="104" rx="4" fill="#3B1E6A"/>
  <circle cx="384" cy="558" r="38" fill="none" stroke="#F472B6" stroke-width="6"/>
  <text x="384" y="562" font-family="Arial,sans-serif" font-size="14" fill="#F9A8D4" text-anchor="middle">중국</text>
  <rect x="456" y="506" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="516" y="562" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">스페인</text>
  <rect x="588" y="506" width="120" height="104" rx="4" fill="#1E0D38"/>
  <text x="648" y="562" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">멕시코</text>
  <rect x="720" y="506" width="120" height="104" rx="4" fill="#3B1E6A"/>
  <circle cx="780" cy="558" r="38" fill="none" stroke="#F472B6" stroke-width="6"/>
  <text x="780" y="562" font-family="Arial,sans-serif" font-size="14" fill="#F9A8D4" text-anchor="middle">러시아</text>
  <!-- Layer 3: BINGO! banner -->
  <text x="512" y="720" font-family="Arial,sans-serif" font-size="48" fill="#FCD34D" text-anchor="middle" font-weight="bold" opacity="0.8">BINGO!</text>
</svg>
