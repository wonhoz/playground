<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="map4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Simplified world map background -->
  <rect x="148" y="240" width="728" height="544" rx="20" fill="url(#map4)"/>
  <!-- Continent blobs on map -->
  <!-- Europe/Asia -->
  <ellipse cx="580" cy="380" rx="170" ry="100" fill="#4CAF50" opacity="0.75"/>
  <!-- Africa -->
  <ellipse cx="540" cy="520" rx="100" ry="130" fill="#4CAF50" opacity="0.7"/>
  <!-- Americas -->
  <ellipse cx="300" cy="460" rx="90" ry="160" fill="#4CAF50" opacity="0.7"/>
  <!-- Oceania -->
  <ellipse cx="730" cy="580" rx="70" ry="50" fill="#4CAF50" opacity="0.65"/>
  <!-- Antarctica hint -->
  <ellipse cx="512" cy="760" rx="200" ry="30" fill="#E0F7FA" opacity="0.5"/>

  <!-- Map pins with "?" -->
  <!-- Pin 1 — large (Tokyo) -->
  <g transform="translate(620, 290)">
    <ellipse cx="0" cy="0" rx="56" ry="56" fill="#FF5252"/>
    <circle cx="0" cy="-4" r="48" fill="#FF1744"/>
    <polygon points="0,48 -22,-16 22,-16" fill="#D32F2F"/>
    <text x="0" y="14" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">?</text>
  </g>

  <!-- Pin 2 — medium (Paris) -->
  <g transform="translate(480, 330)">
    <circle cx="0" cy="-4" r="38" fill="#FF6D00"/>
    <polygon points="0,38 -16,-12 16,-12" fill="#E65100"/>
    <text x="0" y="12" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">?</text>
  </g>

  <!-- Pin 3 — small (Nairobi) -->
  <g transform="translate(540, 510)">
    <circle cx="0" cy="-4" r="32" fill="#1565C0"/>
    <polygon points="0,32 -14,-8 14,-8" fill="#0D47A1"/>
    <text x="0" y="10" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">?</text>
  </g>

  <!-- Pin 4 — medium (New York) -->
  <g transform="translate(290, 400)">
    <circle cx="0" cy="-4" r="38" fill="#7B1FA2"/>
    <polygon points="0,38 -16,-12 16,-12" fill="#4A148C"/>
    <text x="0" y="12" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">?</text>
  </g>

  <!-- Pin 5 — small (Sydney) -->
  <g transform="translate(730, 560)">
    <circle cx="0" cy="-4" r="28" fill="#00897B"/>
    <polygon points="0,28 -12,-8 12,-8" fill="#004D40"/>
    <text x="0" y="9" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle">?</text>
  </g>

  <!-- Layer 3: Title -->
  <rect x="248" y="168" width="528" height="88" rx="44" fill="#1A237E"/>
  <text x="512" y="226" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle">GEO QUIZ</text>

  <!-- Score badge bottom -->
  <rect x="348" y="840" width="328" height="84" rx="42" fill="#FF5252"/>
  <text x="512" y="896" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle">Score: A</text>
</svg>
