<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <linearGradient id="cabinetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#000C18"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="49%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Arcade cabinet body -->
  <rect x="130" y="60" width="252" height="392" rx="18" fill="url(#cabinetGrad)" stroke="#333" stroke-width="3"/>
  <!-- Decorative stripes -->
  <rect x="130" y="90" width="252" height="8" fill="#FF00AA" opacity="0.8"/>
  <rect x="130" y="100" width="252" height="4" fill="#00F5FF" opacity="0.7"/>
  <!-- Screen bezel -->
  <rect x="150" y="120" width="212" height="180" rx="10" fill="#0A0A0A" stroke="#444" stroke-width="2"/>
  <!-- Screen content -->
  <rect x="158" y="128" width="196" height="164" rx="6" fill="url(#screenGrad)"/>
  <!-- Game screen content -->
  <!-- Enemy ships on screen -->
  <polygon points="210,150 196,170 210,164 224,170" fill="#FF00AA" opacity="0.9"/>
  <polygon points="256,148 242,168 256,162 270,168" fill="#FF00AA" opacity="0.9"/>
  <polygon points="302,150 288,170 302,164 316,170" fill="#FF00AA" opacity="0.9"/>
  <!-- Bullets -->
  <rect x="207" y="178" width="6" height="14" rx="3" fill="#FFD700"/>
  <rect x="253" y="175" width="6" height="14" rx="3" fill="#FFD700"/>
  <rect x="299" y="178" width="6" height="14" rx="3" fill="#FFD700"/>
  <!-- Player on screen -->
  <polygon points="256,260 240,280 256,272 272,280" fill="#00F5FF"/>
  <!-- Scanlines overlay -->
  <rect x="158" y="128" width="196" height="164" rx="6" fill="url(#scanline)" opacity="0.4"/>
  <!-- Controls section -->
  <circle cx="185" cy="360" r="30" fill="#1A1A1A" stroke="#555" stroke-width="2"/>
  <!-- D-pad -->
  <rect x="178" y="348" width="14" height="24" rx="3" fill="#333"/>
  <rect x="172" y="354" width="26" height="12" rx="3" fill="#333"/>
  <!-- Buttons -->
  <circle cx="280" cy="350" r="14" fill="#EF4444" stroke="#B91C1C" stroke-width="2"/>
  <circle cx="310" cy="340" r="14" fill="#22C55E" stroke="#15803D" stroke-width="2"/>
  <circle cx="340" cy="352" r="14" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <!-- Title marquee -->
  <rect x="145" y="66" width="222" height="22" rx="4" fill="#0A0A0A"/>
  <text x="256" y="82" font-family="monospace" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="bold">DODGE BLITZ</text>
  <!-- Score display -->
  <text x="256" y="425" font-family="monospace" font-size="11" fill="#FF00AA" text-anchor="middle">INSERT COIN</text>
</svg>
