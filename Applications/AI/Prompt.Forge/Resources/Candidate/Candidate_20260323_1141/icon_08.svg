<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#AD1457"/>
  <!-- Layer 2: Speech bubble -->
  <rect x="150" y="180" width="700" height="440" rx="40" fill="white"/>
  <!-- Bubble tail -->
  <polygon points="300,620 240,720 440,620" fill="white"/>
  <!-- Layer 3: Text lines in bubble -->
  <rect x="220" y="250" width="520" height="20" rx="10" fill="#AD1457" opacity="0.3"/>
  <rect x="220" y="290" width="440" height="20" rx="10" fill="#AD1457" opacity="0.3"/>
  <rect x="220" y="330" width="380" height="20" rx="10" fill="#AD1457" opacity="0.3"/>
  <!-- Tags -->
  <rect x="220" y="420" width="140" height="44" rx="22" fill="#26C6DA"/>
  <rect x="376" y="420" width="140" height="44" rx="22" fill="#26C6DA" opacity="0.8"/>
  <rect x="532" y="420" width="140" height="44" rx="22" fill="#26C6DA" opacity="0.6"/>
  <text x="290" y="448" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">#prompt</text>
  <text x="446" y="448" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">#AI</text>
  <text x="602" y="448" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">#idea</text>
</svg>