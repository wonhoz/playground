<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FED7AA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- File extension tag -->
  <rect x="170" y="280" width="300" height="200" rx="16" fill="#EA580C"/>
  <text x="320" y="395" font-family="Consolas,monospace" font-size="90" fill="#FFFFFF" font-weight="bold" text-anchor="middle">.txt</text>
  <!-- Arrow -->
  <path d="M490,380 L560,380 L545,355 M560,380 L545,405" fill="none" stroke="#C2410C" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- App icon (target) -->
  <rect x="580" y="310" width="200" height="140" rx="20" fill="#3B82F6"/>
  <text x="680" y="398" font-family="Arial,sans-serif" font-size="80" fill="#FFFFFF" text-anchor="middle">📝</text>
  <!-- OK badge -->
  <circle cx="760" cy="460" r="48" fill="#22C55E"/>
  <text x="760" y="478" font-family="Arial,sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold" text-anchor="middle">✓</text>
  <!-- More extensions -->
  <rect x="170" y="520" width="240" height="160" rx="14" fill="#8B5CF6"/>
  <text x="290" y="615" font-family="Consolas,monospace" font-size="72" fill="#FFFFFF" font-weight="bold" text-anchor="middle">.jpg</text>
  <rect x="430" y="520" width="240" height="160" rx="14" fill="#F44336"/>
  <text x="550" y="615" font-family="Consolas,monospace" font-size="72" fill="#FFFFFF" font-weight="bold" text-anchor="middle">.pdf</text>
  <rect x="690" y="520" width="164" height="160" rx="14" fill="#F59E0B"/>
  <text x="772" y="615" font-family="Consolas,monospace" font-size="64" fill="#FFFFFF" font-weight="bold" text-anchor="middle">.mp4</text>
  <!-- Label -->
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="58" fill="#9A3412" font-weight="bold" text-anchor="middle">Ext Boss</text>
</svg>
