<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12001A"/>
      <stop offset="100%" stop-color="#1A0828"/>
    </linearGradient>
    <linearGradient id="match" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF44FF"/>
      <stop offset="100%" stop-color="#AA00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Regex pattern display -->
  <rect x="58" y="80" width="396" height="60" rx="10" fill="#200030" stroke="#6600AA" stroke-width="1.5"/>
  <text x="80" y="104" font-family="monospace" font-size="13" fill="#8844AA">Pattern:</text>
  <text x="80" y="126" font-family="monospace" font-size="16" fill="#FF44FF" filter="url(#glow)">/(\w+)\s+(\w+)/g</text>
  <!-- Input string with matches -->
  <rect x="58" y="158" width="396" height="50" rx="8" fill="#180028"/>
  <text x="80" y="178" font-family="monospace" font-size="12" fill="#888">Input string:</text>
  <!-- Text with highlighted matches -->
  <rect x="80" y="184" width="66" height="18" rx="3" fill="url(#match)" opacity="0.3" filter="url(#glow)"/>
  <rect x="154" y="184" width="78" height="18" rx="3" fill="url(#match)" opacity="0.2"/>
  <rect x="240" y="184" width="90" height="18" rx="3" fill="url(#match)" opacity="0.3" filter="url(#glow)"/>
  <text x="80" y="198" font-family="monospace" font-size="13" fill="#FF88FF">hello</text>
  <text x="146" y="198" font-family="monospace" font-size="13" fill="#DDDDFF">world</text>
  <text x="222" y="198" font-family="monospace" font-size="13" fill="#FFFFFF">foo</text>
  <text x="240" y="198" font-family="monospace" font-size="13" fill="#FF88FF">str</text>
  <text x="276" y="198" font-family="monospace" font-size="13" fill="#FF88FF">forge</text>
  <!-- Match groups panel -->
  <rect x="58" y="222" width="396" height="130" rx="8" fill="#140020" stroke="#440066" stroke-width="1"/>
  <text x="80" y="244" font-family="monospace" font-size="12" fill="#AA44CC">Matches (2 found):</text>
  <line x1="80" y1="252" x2="434" y2="252" stroke="#330044" stroke-width="1"/>
  <!-- Match 1 -->
  <text x="80" y="272" font-family="monospace" font-size="12" fill="#6622AA">[0]</text>
  <text x="116" y="272" font-family="monospace" font-size="12" fill="#FF44FF" filter="url(#glow)">"hello world"</text>
  <text x="80" y="292" font-family="monospace" font-size="11" fill="#441166">  Group 1:</text>
  <text x="160" y="292" font-family="monospace" font-size="11" fill="#CC88FF">"hello"</text>
  <text x="80" y="308" font-family="monospace" font-size="11" fill="#441166">  Group 2:</text>
  <text x="160" y="308" font-family="monospace" font-size="11" fill="#CC88FF">"world"</text>
  <!-- Match 2 -->
  <text x="80" y="330" font-family="monospace" font-size="12" fill="#6622AA">[1]</text>
  <text x="116" y="330" font-family="monospace" font-size="12" fill="#FF44FF" filter="url(#glow)">"str forge"</text>
  <!-- Replace output -->
  <rect x="58" y="366" width="396" height="48" rx="8" fill="#101020" stroke="#334466" stroke-width="1"/>
  <text x="80" y="386" font-family="monospace" font-size="12" fill="#888">Replace → <tspan fill="#44AAFF">[$1|$2]</tspan></text>
  <text x="80" y="404" font-family="monospace" font-size="12" fill="#88CCFF">"[hello|world] [str|forge]"</text>
</svg>
