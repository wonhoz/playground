<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- 사진 프레임 (before) -->
  <rect x="180" y="300" width="260" height="200" rx="16" fill="#6A1B9A" opacity="0.4" stroke="#6A1B9A" stroke-width="20"/>
  <!-- 사진 내부 (간단한 풍경) -->
  <rect x="200" y="380" width="220" height="100" rx="8" fill="#6A1B9A" opacity="0.3"/>
  <circle cx="270" cy="350" r="28" fill="#6A1B9A" opacity="0.5"/>
  <!-- 변환 화살표 -->
  <polygon points="512,400 440,370 440,430" fill="#CE93D8"/>
  <line x1="440" y1="400" x2="584" y2="400" stroke="#CE93D8" stroke-width="28" stroke-linecap="round"/>
  <polygon points="584,400 556,370 584,430" fill="#CE93D8"/>
  <!-- 만화 프레임 (after) -->
  <rect x="584" y="300" width="260" height="200" rx="16" fill="#6A1B9A" opacity="0.3" stroke="#CE93D8" stroke-width="24"/>
  <!-- 만화 스타일 선들 (하프톤) -->
  <circle cx="634" cy="350" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="664" cy="350" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="694" cy="350" r="10" fill="#CE93D8" opacity="0.7"/>
  <circle cx="634" cy="380" r="10" fill="#CE93D8" opacity="0.5"/>
  <circle cx="664" cy="380" r="10" fill="#CE93D8" opacity="0.5"/>
  <!-- 액션선 -->
  <line x1="714" y1="320" x2="780" y2="260" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="730" y1="350" x2="800" y2="310" stroke="#CE93D8" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- 말풍선 -->
  <ellipse cx="380" cy="620" rx="140" ry="80" fill="#6A1B9A" opacity="0.4" stroke="#6A1B9A" stroke-width="18"/>
  <polygon points="380,700 340,760 430,720" fill="#6A1B9A" opacity="0.5"/>
</svg>
