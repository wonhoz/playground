<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 정답 체크 메인 -->
    <circle cx="512" cy="360" r="240" fill="#2E7D32" opacity="0.12"/>
    <circle cx="512" cy="360" r="200" fill="#2E7D32" opacity="0.2"/>
    <circle cx="512" cy="360" r="160" fill="#2E7D32"/>
    <text x="512" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="200" fill="#FFFFFF" text-anchor="middle">✓</text>

    <!-- 팡파레 별들 -->
    <text x="140" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="80">⭐</text>
    <text x="800" y="180" font-family="'Segoe UI',Arial,sans-serif" font-size="70">⭐</text>
    <text x="100" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="60">✨</text>
    <text x="860" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="60">✨</text>
    <text x="200" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="55">💫</text>
    <text x="820" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="65">⭐</text>
    <text x="300" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="50">✨</text>
    <text x="700" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="50">💫</text>

    <!-- 스트릭 정보 -->
    <rect x="160" y="620" width="700" height="100" rx="28" fill="#FF8F00"/>
    <text x="512" y="666" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">🔥 5연속 정답!</text>
    <text x="512" y="706" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFF9C4" text-anchor="middle">보너스 +50점 획득!</text>

    <!-- 점수 증가 표시 -->
    <rect x="160" y="742" width="700" height="70" rx="20" fill="#1565C0"/>
    <text x="512" y="788" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">총점: 250  •  정답률 80%</text>

    <!-- 타이틀 -->
    <rect x="140" y="840" width="744" height="70" rx="24" fill="#1B5E20"/>
    <text x="512" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">TRIVIA.CAST</text>
  </g>
</svg>
