<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 비비드 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#33691E"/>
  <!-- Layer 2: 씨앗 → 나무 계단식 성장 (레이어드) -->
  <!-- 진행 단계 화살표들 -->
  <!-- 단계 1: 씨앗 -->
  <ellipse cx="200" cy="500" rx="44" ry="32" fill="#8D6E63"/>
  <circle cx="200" cy="500" r="20" fill="#6D4C41"/>
  <!-- 화살표 -->
  <line x1="254" y1="500" x2="310" y2="500" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round"/>
  <polygon points="300,480 340,500 300,520" fill="#A5D6A7"/>
  <!-- 단계 2: 새싹 -->
  <line x1="380" y1="540" x2="380" y2="440" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="368" cy="462" rx="28" ry="16" fill="#66BB6A" transform="rotate(-30,368,462)"/>
  <!-- 화살표 -->
  <line x1="420" y1="480" x2="476" y2="480" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round"/>
  <polygon points="466,460 506,480 466,500" fill="#A5D6A7"/>
  <!-- 단계 3: 어린 나무 -->
  <line x1="560" y1="540" x2="560" y2="380" stroke="#388E3C" stroke-width="13" stroke-linecap="round"/>
  <line x1="560" y1="460" x2="520" y2="420" stroke="#388E3C" stroke-width="8" stroke-linecap="round"/>
  <line x1="560" y1="440" x2="600" y2="400" stroke="#388E3C" stroke-width="8" stroke-linecap="round"/>
  <circle cx="560" cy="360" r="60" fill="#43A047"/>
  <!-- 화살표 -->
  <line x1="632" y1="460" x2="688" y2="460" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round"/>
  <polygon points="678,440 718,460 678,480" fill="#A5D6A7"/>
  <!-- 단계 4: 다 자란 나무 (크게) -->
  <line x1="800" y1="540" x2="800" y2="300" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <line x1="800" y1="400" x2="740" y2="340" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
  <line x1="800" y1="370" x2="860" y2="310" stroke="#388E3C" stroke-width="12" stroke-linecap="round"/>
  <circle cx="800" cy="250" r="120" fill="#2E7D32"/>
  <circle cx="730" cy="270" r="80" fill="#388E3C"/>
  <circle cx="870" cy="260" r="90" fill="#43A047"/>
  <!-- 땅선 -->
  <rect x="120" y="540" width="784" height="60" rx="12" fill="#1B5E20"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="700" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#C8E6C9" text-anchor="middle">LEAF.GROW</text>
  <text x="512" y="780" font-family="Arial" font-size="36" fill="#A5D6A7" text-anchor="middle">Plant Simulation</text>
</svg>
