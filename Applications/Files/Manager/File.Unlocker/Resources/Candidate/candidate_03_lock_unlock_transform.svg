<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1b2f"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
    <linearGradient id="locked" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="unlocked" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="50%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- locked padlock left -->
  <path d="M80 210 C80 165 150 150 150 195" stroke="#ef5350" stroke-width="20" fill="none" stroke-linecap="round"/>
  <rect x="60" y="220" width="110" height="85" rx="12" fill="url(#locked)"/>
  <circle cx="115" cy="253" r="14" fill="#1b1b2f"/>
  <rect x="108" y="258" width="14" height="25" rx="4" fill="#1b1b2f"/>
  <!-- transform arrow -->
  <path d="M190 270 Q256 230 320 270" stroke="url(#arrow)" stroke-width="10" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#66bb6a"/>
    </marker>
  </defs>
  <!-- unlocked padlock right -->
  <path d="M365 210 C365 150 450 140 450 200" stroke="#66bb6a" stroke-width="20" fill="none" stroke-linecap="round"/>
  <rect x="340" y="220" width="110" height="85" rx="12" fill="url(#unlocked)"/>
  <circle cx="395" cy="253" r="14" fill="#1b1b2f"/>
  <rect x="388" y="258" width="14" height="25" rx="4" fill="#1b1b2f"/>
  <!-- shine on unlocked -->
  <ellipse cx="360" cy="238" rx="14" ry="6" fill="white" opacity="0.2" transform="rotate(-15 360 238)"/>
</svg>
