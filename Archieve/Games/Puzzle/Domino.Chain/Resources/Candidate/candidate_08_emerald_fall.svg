<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021A0A"/>
      <stop offset="100%" stop-color="#052814"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CC66"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <linearGradient id="ivory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEFFF4"/>
      <stop offset="100%" stop-color="#CCEEDC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Leaf particles -->
  <ellipse cx="70" cy="100" rx="6" ry="3" fill="#00AA44" opacity="0.5" transform="rotate(-20 70 100)"/>
  <ellipse cx="430" cy="130" rx="5" ry="2.5" fill="#00BB55" opacity="0.4" transform="rotate(30 430 130)"/>
  <ellipse cx="160" cy="60" rx="4" ry="2" fill="#00CC66" opacity="0.5" transform="rotate(-10 160 60)"/>
  <!-- Emerald tiles -->
  <rect x="72" y="185" width="48" height="96" rx="8" fill="url(#emerald)" stroke="#00FF88" stroke-width="2" filter="url(#glow)"/>
  <line x1="72" y1="233" x2="120" y2="233" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
  <circle cx="88" cy="208" r="5" fill="#CCFFDD"/>
  <circle cx="104" cy="208" r="5" fill="#CCFFDD"/>
  <circle cx="96" cy="257" r="5" fill="#CCFFDD"/>
  <rect x="163" y="185" width="48" height="96" rx="8" fill="url(#ivory)" stroke="#00CC66" stroke-width="2"/>
  <line x1="163" y1="233" x2="211" y2="233" stroke="#00CC66" stroke-width="2"/>
  <circle cx="179" cy="208" r="5" fill="#006633"/>
  <circle cx="195" cy="257" r="5" fill="#006633"/>
  <circle cx="179" cy="257" r="5" fill="#006633"/>
  <circle cx="195" cy="208" r="5" fill="#006633"/>
  <!-- Tilting -->
  <g transform="rotate(-28 282 268)">
    <rect x="258" y="185" width="48" height="96" rx="8" fill="url(#emerald)" stroke="#00FF88" stroke-width="2" filter="url(#glow)"/>
    <line x1="258" y1="233" x2="306" y2="233" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
    <circle cx="274" cy="208" r="5" fill="#CCFFDD"/>
    <circle cx="290" cy="208" r="5" fill="#CCFFDD"/>
    <circle cx="282" cy="233" r="5" fill="#CCFFDD"/>
    <circle cx="274" cy="257" r="5" fill="#CCFFDD"/>
    <circle cx="290" cy="257" r="5" fill="#CCFFDD"/>
    <circle cx="282" cy="220" r="5" fill="#CCFFDD"/>
  </g>
  <!-- Fallen -->
  <rect x="344" y="264" width="96" height="48" rx="8" fill="url(#ivory)" stroke="#00CC66" stroke-width="2"/>
  <line x1="392" y1="264" x2="392" y2="312" stroke="#00CC66" stroke-width="2"/>
  <circle cx="368" cy="280" r="5" fill="#006633"/>
  <circle cx="368" cy="296" r="5" fill="#006633"/>
  <circle cx="416" cy="288" r="5" fill="#006633"/>
  <!-- Chain trail -->
  <path d="M96,281 Q140,310 187,281 Q231,252 282,281 Q330,310 360,280" stroke="#00FF88" stroke-width="2" fill="none" opacity="0.35" stroke-dasharray="6,5"/>
  <text x="256" y="450" font-family="Arial" font-size="26" font-weight="bold" fill="#00CC66" text-anchor="middle" filter="url(#glow)">DOMINO·CHAIN</text>
</svg>
