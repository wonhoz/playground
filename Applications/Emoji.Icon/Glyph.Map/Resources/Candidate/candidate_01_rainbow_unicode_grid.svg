<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1E"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="25%" stop-color="#FF8800"/>
      <stop offset="50%" stop-color="#FFEE00"/>
      <stop offset="75%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#0088FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Unicode glyph grid -->
  <!-- Row 1 -->
  <text x="80" y="130" fill="#FF0080" font-size="38" font-family="Segoe UI Emoji">A</text>
  <text x="140" y="130" fill="#FF4400" font-size="38" font-family="Segoe UI Emoji">&#x3042;</text>
  <text x="200" y="130" fill="#FF8800" font-size="38" font-family="Segoe UI Emoji">&#x4E2D;</text>
  <text x="260" y="130" fill="#FFCC00" font-size="38" font-family="Segoe UI Emoji">&#x0391;</text>
  <text x="320" y="130" fill="#88FF00" font-size="38" font-family="Segoe UI Emoji">&#x0410;</text>
  <text x="380" y="130" fill="#00FF88" font-size="38" font-family="Segoe UI Emoji">&#x0600;</text>
  <!-- Row 2 -->
  <text x="80" y="200" fill="#00FFCC" font-size="38" font-family="Segoe UI Emoji">&#x1F600;</text>
  <text x="140" y="200" fill="#00CCFF" font-size="38" font-family="Segoe UI Emoji">&#x1F31F;</text>
  <text x="200" y="200" fill="#0088FF" font-size="38" font-family="Segoe UI Emoji">&#x2665;</text>
  <text x="260" y="200" fill="#4400FF" font-size="38" font-family="Segoe UI Emoji">&#x2660;</text>
  <text x="320" y="200" fill="#8800FF" font-size="38" font-family="Segoe UI Emoji">&#x2663;</text>
  <text x="380" y="200" fill="#FF00CC" font-size="38" font-family="Segoe UI Emoji">&#x2666;</text>
  <!-- Row 3 -->
  <text x="80" y="270" fill="#FF6666" font-size="38" font-family="Segoe UI Emoji">&#x03A9;</text>
  <text x="140" y="270" fill="#FFAA66" font-size="38" font-family="Segoe UI Emoji">&#x221E;</text>
  <text x="200" y="270" fill="#FFDD66" font-size="38" font-family="Segoe UI Emoji">&#x2605;</text>
  <text x="260" y="270" fill="#66FF99" font-size="38" font-family="Segoe UI Emoji">&#x2713;</text>
  <text x="320" y="270" fill="#66DDFF" font-size="38" font-family="Segoe UI Emoji">&#x00A9;</text>
  <text x="380" y="270" fill="#9966FF" font-size="38" font-family="Segoe UI Emoji">&#x00AE;</text>
  <!-- Rainbow bar bottom -->
  <rect x="72" y="320" width="368" height="8" rx="4" fill="url(#rainbow)"/>
  <!-- Title bar -->
  <rect x="72" y="350" width="368" height="40" rx="6" fill="#1E1E3E"/>
  <text x="256" y="376" text-anchor="middle" fill="#CCCCFF" font-size="18" font-family="monospace">U+0041 ~ U+1F600</text>
  <!-- Code point display -->
  <rect x="72" y="404" width="368" height="56" rx="8" fill="#0A0A2A"/>
  <text x="90" y="430" fill="#888888" font-size="13" font-family="monospace">UNICODE</text>
  <text x="90" y="450" fill="#AAAAFF" font-size="22" font-family="monospace">U+2605  ★  BLACK STAR</text>
</svg>
