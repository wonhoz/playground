<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 노랑 -->
  <rect width="1024" height="1024" rx="190" fill="#FFD600"/>

  <!-- 4×4 격자 배경 (연한 선들) -->
  <!-- 가로 -->
  <line x1="212" y1="212" x2="812" y2="212" stroke="#B8860B" stroke-width="3"/>
  <line x1="212" y1="362" x2="812" y2="362" stroke="#B8860B" stroke-width="3"/>
  <line x1="212" y1="512" x2="812" y2="512" stroke="#B8860B" stroke-width="3"/>
  <line x1="212" y1="662" x2="812" y2="662" stroke="#B8860B" stroke-width="3"/>
  <line x1="212" y1="812" x2="812" y2="812" stroke="#B8860B" stroke-width="3"/>
  <!-- 세로 -->
  <line x1="212" y1="212" x2="212" y2="812" stroke="#B8860B" stroke-width="3"/>
  <line x1="362" y1="212" x2="362" y2="812" stroke="#B8860B" stroke-width="3"/>
  <line x1="512" y1="212" x2="512" y2="812" stroke="#B8860B" stroke-width="3"/>
  <line x1="662" y1="212" x2="662" y2="812" stroke="#B8860B" stroke-width="3"/>
  <line x1="812" y1="212" x2="812" y2="812" stroke="#B8860B" stroke-width="3"/>

  <!-- 중앙 큰 "?" -->
  <text x="512" y="660" font-family="Arial Black" font-size="520" font-weight="bold" fill="#1A1A1A" text-anchor="middle" opacity="0.88">?</text>

  <!-- 격자 일부 셀에 작은 알파벳들 (코너쪽) -->
  <text x="287" y="310" font-family="Arial Black" font-size="90" font-weight="bold" fill="#E65100" text-anchor="middle" opacity="0.7">A</text>
  <text x="737" y="460" font-family="Arial Black" font-size="90" font-weight="bold" fill="#1565C0" text-anchor="middle" opacity="0.7">B</text>
  <text x="287" y="760" font-family="Arial Black" font-size="90" font-weight="bold" fill="#1B5E20" text-anchor="middle" opacity="0.7">C</text>
  <text x="737" y="760" font-family="Arial Black" font-size="90" font-weight="bold" fill="#7B1FA2" text-anchor="middle" opacity="0.7">D</text>
</svg>
