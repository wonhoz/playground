<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2d2000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Path through anchor points -->
  <path d="M100 380 C140 300 200 200 256 200 C312 200 340 280 400 160" stroke="url(#blue)" stroke-width="3.5" fill="none" filter="url(#glow)"/>
  <!-- Control handles -->
  <line x1="100" y1="380" x2="140" y2="300" stroke="url(#gold)" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,4"/>
  <line x1="256" y1="200" x2="220" y2="160" stroke="url(#gold)" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,4"/>
  <line x1="256" y1="200" x2="310" y2="180" stroke="url(#gold)" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,4"/>
  <line x1="400" y1="160" x2="360" y2="210" stroke="url(#gold)" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,4"/>
  <!-- Control point circles -->
  <circle cx="140" cy="300" r="7" fill="url(#gold)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="220" cy="160" r="7" fill="url(#gold)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="310" cy="180" r="7" fill="url(#gold)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="360" cy="210" r="7" fill="url(#gold)" opacity="0.8" filter="url(#glow)"/>
  <!-- Anchor point squares -->
  <rect x="86" y="366" width="28" height="28" rx="5" fill="url(#blue)" stroke="white" stroke-width="2" filter="url(#glow)"/>
  <rect x="242" y="186" width="28" height="28" rx="5" fill="url(#blue)" stroke="white" stroke-width="2" filter="url(#glow)"/>
  <rect x="386" y="146" width="28" height="28" rx="5" fill="url(#blue)" stroke="white" stroke-width="2" filter="url(#glow)"/>
</svg>