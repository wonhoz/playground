<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background warm orange -->
  <defs>
    <radialGradient id="bg03" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: Calendar with daily challenge completion -->
  <rect x="160" y="180" width="704" height="600" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <!-- Header -->
  <rect x="160" y="180" width="704" height="100" rx="24" fill="#E65100"/>
  <text x="512" y="244" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">Daily Challenge</text>
  <!-- Calendar grid 5x3 -->
  <text x="240" y="360" font-family="Arial, sans-serif" font-size="42" fill="#BDBDBD" text-anchor="middle">16</text>
  <text x="340" y="360" font-family="Arial, sans-serif" font-size="42" fill="#BDBDBD" text-anchor="middle">17</text>
  <!-- Today highlighted -->
  <circle cx="440" cy="342" r="36" fill="#E65100"/>
  <text x="440" y="358" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">18</text>
  <text x="540" y="360" font-family="Arial, sans-serif" font-size="42" fill="#BDBDBD" text-anchor="middle">19</text>
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="42" fill="#BDBDBD" text-anchor="middle">20</text>
  <!-- Completed marks -->
  <circle cx="240" cy="462" r="28" fill="#43A047"/>
  <path d="M224 462 L235 474 L258 450" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="340" cy="462" r="28" fill="#43A047"/>
  <path d="M324 462 L335 474 L358 450" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="440" cy="462" r="28" fill="#43A047"/>
  <path d="M424 462 L435 474 L458 450" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="540" cy="462" r="28" fill="#BDBDBD"/>
  <circle cx="640" cy="462" r="28" fill="#BDBDBD"/>
  <!-- Score -->
  <rect x="200" y="560" width="624" height="100" rx="18" fill="#FFF3E0"/>
  <text x="512" y="622" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#E65100" text-anchor="middle">9 / 10 pts ✓</text>
  <!-- Layer 3: Trophy -->
  <rect x="360" y="820" width="304" height="90" rx="20" fill="#E65100"/>
  <text x="512" y="879" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#FFD740" text-anchor="middle">🏆 완료!</text>
</svg>
