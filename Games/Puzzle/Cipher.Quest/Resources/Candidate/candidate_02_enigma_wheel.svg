<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a020"/>
      <stop offset="100%" stop-color="#805000"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a06820"/>
      <stop offset="100%" stop-color="#604010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer cipher wheel -->
  <circle cx="256" cy="256" r="210" fill="url(#ring1)" opacity="0.9"/>
  <circle cx="256" cy="256" r="190" fill="#1a1000"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="175" fill="url(#ring2)" opacity="0.9"/>
  <circle cx="256" cy="256" r="155" fill="#1a1000"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="140" fill="url(#ring1)" opacity="0.8"/>
  <circle cx="256" cy="256" r="120" fill="#0d0800"/>
  <!-- Letters on outer ring -->
  <text x="256" y="58" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">A</text>
  <text x="312" y="72" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">B</text>
  <text x="356" y="100" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">C</text>
  <text x="388" y="148" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">D</text>
  <text x="404" y="204" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">E</text>
  <text x="400" y="262" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">F</text>
  <text x="375" y="318" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">G</text>
  <text x="340" y="366" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">H</text>
  <text x="296" y="402" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">I</text>
  <text x="244" y="418" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">J</text>
  <text x="190" y="412" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">K</text>
  <text x="148" y="390" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">L</text>
  <text x="118" y="350" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">M</text>
  <text x="100" y="298" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">N</text>
  <text x="100" y="240" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">O</text>
  <text x="118" y="184" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">P</text>
  <text x="156" y="140" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">Q</text>
  <text x="206" y="108" text-anchor="middle" font-family="serif" font-size="20" fill="#ffcc44">R</text>
  <!-- Inner glow symbol -->
  <text x="256" y="280" text-anchor="middle" font-family="serif" font-size="80" fill="#ffcc44" opacity="0.9" filter="url(#glow)">?</text>
  <!-- Tick marks -->
  <line x1="256" y1="46" x2="256" y2="68" stroke="#ffcc44" stroke-width="3"/>
  <line x1="256" y1="444" x2="256" y2="466" stroke="#ffcc44" stroke-width="3"/>
  <line x1="46" y1="256" x2="68" y2="256" stroke="#ffcc44" stroke-width="3"/>
  <line x1="444" y1="256" x2="466" y2="256" stroke="#ffcc44" stroke-width="3"/>
</svg>