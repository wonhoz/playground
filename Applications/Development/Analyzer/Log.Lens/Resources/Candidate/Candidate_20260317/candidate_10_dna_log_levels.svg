<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050a0f"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- DNA backbone strands (two sinusoidal curves) -->
  <!-- Left strand (sin wave) -->
  <path d="M 160 40
    C 120 80, 200 120, 160 160
    C 120 200, 200 240, 160 280
    C 120 320, 200 360, 160 400
    C 120 440, 200 480, 160 480"
    fill="none" stroke="#00CED1" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Right strand (phase-shifted) -->
  <path d="M 352 40
    C 392 80, 312 120, 352 160
    C 392 200, 312 240, 352 280
    C 392 320, 312 360, 352 400
    C 392 440, 312 480, 352 480"
    fill="none" stroke="#00FF7F" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Base pairs (horizontal rungs) colored by log level -->
  <!-- Each rung = log level pair at crossing points -->

  <!-- Rung 1: ERROR (red) - ~y=80 -->
  <line x1="168" y1="80" x2="344" y2="80" stroke="#EF5350" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="168" cy="80" r="7" fill="#EF5350" filter="url(#glow)"/>
  <circle cx="344" cy="80" r="7" fill="#EF5350" filter="url(#glow)"/>
  <text x="395" y="85" font-family="monospace" font-size="13" fill="#EF5350" filter="url(#glow-sm)">ERROR</text>

  <!-- Rung 2: WARN (orange) - ~y=160 -->
  <line x1="152" y1="160" x2="360" y2="160" stroke="#FF9100" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="152" cy="160" r="7" fill="#FF9100" filter="url(#glow)"/>
  <circle cx="360" cy="160" r="7" fill="#FF9100" filter="url(#glow)"/>
  <text x="375" y="165" font-family="monospace" font-size="13" fill="#FF9100" filter="url(#glow-sm)">WARN</text>

  <!-- Rung 3: INFO (cyan) - ~y=240 -->
  <line x1="168" y1="240" x2="344" y2="240" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="168" cy="240" r="7" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="344" cy="240" r="7" fill="#00E5FF" filter="url(#glow)"/>
  <text x="375" y="245" font-family="monospace" font-size="13" fill="#00E5FF" filter="url(#glow-sm)">INFO</text>

  <!-- Rung 4: DEBUG (green) - ~y=320 -->
  <line x1="152" y1="320" x2="360" y2="320" stroke="#69F0AE" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="152" cy="320" r="7" fill="#69F0AE" filter="url(#glow)"/>
  <circle cx="360" cy="320" r="7" fill="#69F0AE" filter="url(#glow)"/>
  <text x="375" y="325" font-family="monospace" font-size="13" fill="#69F0AE" filter="url(#glow-sm)">DEBUG</text>

  <!-- Rung 5: TRACE (purple) - ~y=400 -->
  <line x1="168" y1="400" x2="344" y2="400" stroke="#CE93D8" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="168" cy="400" r="7" fill="#CE93D8" filter="url(#glow)"/>
  <circle cx="344" cy="400" r="7" fill="#CE93D8" filter="url(#glow)"/>
  <text x="375" y="405" font-family="monospace" font-size="13" fill="#CE93D8" filter="url(#glow-sm)">TRACE</text>

  <!-- Left level labels -->
  <text x="60" y="85" text-anchor="end" font-family="monospace" font-size="11" fill="#EF5350" opacity="0.7">ERR</text>
  <text x="60" y="165" text-anchor="end" font-family="monospace" font-size="11" fill="#FF9100" opacity="0.7">WRN</text>
  <text x="60" y="245" text-anchor="end" font-family="monospace" font-size="11" fill="#00E5FF" opacity="0.7">INF</text>
  <text x="60" y="325" text-anchor="end" font-family="monospace" font-size="11" fill="#69F0AE" opacity="0.7">DBG</text>
  <text x="60" y="405" text-anchor="end" font-family="monospace" font-size="11" fill="#CE93D8" opacity="0.7">TRC</text>

  <!-- Center label -->
  <rect x="210" y="466" width="92" height="26" rx="5" fill="#00CED1" fill-opacity="0.15" stroke="#00CED1" stroke-width="1" stroke-opacity="0.5"/>
  <text x="256" y="484" text-anchor="middle" font-family="monospace" font-size="13" fill="#00CED1" filter="url(#glow-sm)">LOG.LENS</text>
</svg>
