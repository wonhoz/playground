<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1km" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E2A"/>
      <stop offset="100%" stop-color="#060818"/>
    </linearGradient>
    <clipPath id="c1km"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1km)"/>
  <circle cx="820" cy="820" r="320" fill="#1A237E" opacity="0.18" clip-path="url(#c1km)"/>

  <!-- Layer 2: 단축키 카드 목록 (레이어드) -->
  <!-- 카드 3장 겹침 -->

  <!-- 뒤쪽 카드 -->
  <rect x="220" y="260" width="584" height="88" rx="14" fill="#12163A"/>
  <rect x="220" y="260" width="584" height="88" rx="14" fill="none" stroke="#1E2460" stroke-width="3"/>
  <text x="254" y="310" font-family="Segoe UI,sans-serif" font-size="17" fill="#3F51B5">Navigate</text>
  <text x="510" y="310" font-family="Consolas,monospace" font-size="22" font-weight="600" fill="#5C6BC0">Ctrl + G</text>
  <text x="740" y="310" font-family="Segoe UI,sans-serif" font-size="15" fill="#2A2F60">이동</text>

  <!-- 중간 카드 -->
  <rect x="208" y="380" width="608" height="88" rx="14" fill="#161A48"/>
  <rect x="208" y="380" width="608" height="88" rx="14" fill="none" stroke="#283593" stroke-width="3"/>
  <text x="242" y="430" font-family="Segoe UI,sans-serif" font-size="17" fill="#5C6BC0">Edit</text>
  <text x="510" y="430" text-anchor="middle" font-family="Consolas,monospace" font-size="22" font-weight="600" fill="#7986CB">Ctrl + Z</text>
  <text x="740" y="430" font-family="Segoe UI,sans-serif" font-size="15" fill="#3A4080">실행 취소</text>

  <!-- 앞쪽 카드 (가장 강조) -->
  <rect x="196" y="500" width="632" height="96" rx="14" fill="#1A2060"/>
  <rect x="196" y="500" width="632" height="96" rx="14" fill="none" stroke="#3F51B5" stroke-width="3"/>
  <!-- 카테고리 태그 -->
  <rect x="218" y="520" width="72" height="24" rx="8" fill="#283593"/>
  <text x="254" y="536" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#9FA8DA">File</text>
  <!-- 단축키 키캡들 -->
  <rect x="310" y="516" width="72" height="36" rx="8" fill="#283593" stroke="#5C6BC0" stroke-width="2"/>
  <text x="346" y="539" text-anchor="middle" font-family="Consolas,monospace" font-size="20" font-weight="700" fill="#E8EAF6">Ctrl</text>
  <text x="392" y="539" font-family="Consolas,monospace" font-size="22" font-weight="700" fill="#7986CB">+</text>
  <rect x="408" y="516" width="56" height="36" rx="8" fill="#283593" stroke="#5C6BC0" stroke-width="2"/>
  <text x="436" y="539" text-anchor="middle" font-family="Consolas,monospace" font-size="22" font-weight="700" fill="#E8EAF6">S</text>
  <!-- 설명 -->
  <text x="490" y="536" font-family="Segoe UI,sans-serif" font-size="18" fill="#9FA8DA">저장</text>
  <!-- 앱 이름 -->
  <text x="680" y="536" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="15" fill="#5C6BC0">VS Code</text>
  <text x="710" y="568" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#3F51B5">▶</text>

  <!-- Layer 3: 하단 앱 프리셋 탭 힌트 -->
  <rect x="196" y="660" width="130" height="36" rx="10" fill="#1A237E" stroke="#3F51B5" stroke-width="2"/>
  <text x="261" y="682" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">VS Code</text>
  <rect x="334" y="660" width="110" height="36" rx="10" fill="#12163A" stroke="#283593" stroke-width="2"/>
  <text x="389" y="682" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#5C6BC0">IntelliJ</text>
  <rect x="452" y="660" width="110" height="36" rx="10" fill="#12163A" stroke="#283593" stroke-width="2"/>
  <text x="507" y="682" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#5C6BC0">Excel</text>
  <rect x="570" y="660" width="110" height="36" rx="10" fill="#12163A" stroke="#283593" stroke-width="2"/>
  <text x="625" y="682" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#5C6BC0">Chrome</text>
</svg>
