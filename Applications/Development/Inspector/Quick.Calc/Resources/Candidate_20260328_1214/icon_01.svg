<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg1)"/>
  <!-- Layer 2: 계산기 몸체 -->
  <rect x="160" y="160" width="704" height="704" rx="56" fill="#1565C0"/>
  <!-- 디스플레이 -->
  <rect x="200" y="200" width="624" height="170" rx="24" fill="#0D47A1"/>
  <text x="796" y="315" font-family="'Courier New', monospace" font-size="110" fill="#E3F2FD" text-anchor="end" font-weight="bold">7 + 3</text>
  <!-- Layer 3: 버튼 그리드 3×4 -->
  <!-- 행 1 (숫자 7 8 9) + (나누기) -->
  <rect x="200" y="400" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="265" y="467" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">7</text>
  <rect x="350" y="400" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="415" y="467" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">8</text>
  <rect x="500" y="400" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="565" y="467" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">9</text>
  <rect x="650" y="400" width="114" height="108" rx="18" fill="#42A5F5"/>
  <text x="707" y="467" font-family="Arial" font-size="80" fill="white" text-anchor="middle" font-weight="bold">÷</text>
  <!-- 행 2 (4 5 6 ×) -->
  <rect x="200" y="524" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="265" y="591" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">4</text>
  <rect x="350" y="524" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="415" y="591" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">5</text>
  <rect x="500" y="524" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="565" y="591" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">6</text>
  <rect x="650" y="524" width="114" height="108" rx="18" fill="#42A5F5"/>
  <text x="707" y="591" font-family="Arial" font-size="80" fill="white" text-anchor="middle" font-weight="bold">×</text>
  <!-- 행 3 (1 2 3 -) -->
  <rect x="200" y="648" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="265" y="715" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">1</text>
  <rect x="350" y="648" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="415" y="715" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">2</text>
  <rect x="500" y="648" width="130" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="565" y="715" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">3</text>
  <rect x="650" y="648" width="114" height="108" rx="18" fill="#42A5F5"/>
  <text x="707" y="715" font-family="Arial" font-size="80" fill="white" text-anchor="middle" font-weight="bold">-</text>
  <!-- 행 4 (0 . = +) — = 은 오렌지 -->
  <rect x="200" y="772" width="280" height="108" rx="18" fill="white" opacity="0.92"/>
  <text x="340" y="839" font-family="Arial" font-size="80" fill="#1565C0" text-anchor="middle" font-weight="bold">0</text>
  <rect x="500" y="772" width="130" height="108" rx="18" fill="#FF8F00"/>
  <text x="565" y="839" font-family="Arial" font-size="100" fill="white" text-anchor="middle" font-weight="900">=</text>
  <rect x="650" y="772" width="114" height="108" rx="18" fill="#42A5F5"/>
  <text x="707" y="839" font-family="Arial" font-size="80" fill="white" text-anchor="middle" font-weight="bold">+</text>
</svg>
