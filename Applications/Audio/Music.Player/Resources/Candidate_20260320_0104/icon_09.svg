<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Music box body -->
  <rect x="240" y="480" width="420" height="280" rx="20" fill="#0d1030"/>
  <rect x="240" y="480" width="420" height="280" rx="20" fill="none" stroke="#3F51B5" stroke-width="20"/>
  <!-- Music box lid -->
  <rect x="220" y="380" width="460" height="120" rx="16" fill="#1a1f45"/>
  <rect x="220" y="380" width="460" height="120" rx="16" fill="none" stroke="#7986CB" stroke-width="16"/>
  <!-- Comb teeth on box -->
  <rect x="290" y="510" width="8" height="80" rx="4" fill="#7986CB"/>
  <rect x="318" y="510" width="8" height="90" rx="4" fill="#3F51B5"/>
  <rect x="346" y="510" width="8" height="70" rx="4" fill="#7986CB"/>
  <rect x="374" y="510" width="8" height="100" rx="4" fill="#3F51B5"/>
  <rect x="402" y="510" width="8" height="75" rx="4" fill="#7986CB"/>
  <rect x="430" y="510" width="8" height="85" rx="4" fill="#3F51B5"/>
  <rect x="458" y="510" width="8" height="65" rx="4" fill="#7986CB"/>
  <rect x="486" y="510" width="8" height="95" rx="4" fill="#3F51B5"/>
  <rect x="514" y="510" width="8" height="78" rx="4" fill="#7986CB"/>
  <rect x="542" y="510" width="8" height="88" rx="4" fill="#3F51B5"/>
  <!-- Winding key -->
  <rect x="640" y="340" width="24" height="80" rx="6" fill="#3F51B5"/>
  <ellipse cx="652" cy="330" rx="42" ry="18" fill="#7986CB"/>
  <rect x="632" y="418" width="40" height="20" rx="6" fill="#3F51B5"/>
  <!-- Musical note floating -->
  <circle cx="380" cy="300" r="24" fill="#7986CB"/>
  <line x1="404" y1="300" x2="404" y2="220" stroke="#7986CB" stroke-width="14"/>
  <line x1="404" y1="220" x2="450" y2="235" stroke="#7986CB" stroke-width="12"/>
</svg>