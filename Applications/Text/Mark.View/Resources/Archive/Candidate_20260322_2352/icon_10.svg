<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#0EA5E9"/>
  <!-- Sky gradient overlay -->
  <rect width="1024" height="1024" rx="150" fill="#38BDF8" opacity="0.3"/>
  <!-- Layer 2: App window at bottom -->
  <rect x="170" y="650" width="684" height="250" rx="20" fill="#1E293B"/>
  <rect x="170" y="650" width="684" height="46" rx="20" fill="#0F172A"/>
  <rect x="170" y="676" width="684" height="20" fill="#0F172A"/>
  <text x="512" y="680" font-family="Arial,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Mark.View</text>
  <!-- Window content lines -->
  <rect x="200" y="718" width="250" height="18" rx="5" fill="#3B82F6" opacity="0.8"/>
  <rect x="200" y="750" width="600" height="12" rx="3" fill="#334155"/>
  <rect x="200" y="772" width="520" height="12" rx="3" fill="#334155"/>
  <rect x="200" y="794" width="450" height="12" rx="3" fill="#2D3748"/>
  <!-- Layer 2: Falling .md file -->
  <!-- File shadow -->
  <ellipse cx="515" cy="650" rx="90" ry="20" fill="rgba(0,0,0,0.25)"/>
  <!-- File card -->
  <path d="M 415 200 L 595 200 L 635 245 L 635 600 L 415 600 Z" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="4"/>
  <!-- File corner fold -->
  <path d="M 595 200 L 595 245 L 635 245 Z" fill="#94A3B8" opacity="0.7"/>
  <!-- File content -->
  <text x="435" y="280" font-family="Consolas,monospace" font-size="28" fill="#1E40AF" font-weight="bold"># README</text>
  <line x1="435" y1="296" x2="615" y2="296" stroke="#BFDBFE" stroke-width="3"/>
  <rect x="435" y="314" width="170" height="13" rx="3" fill="#9CA3AF"/>
  <rect x="435" y="338" width="148" height="13" rx="3" fill="#9CA3AF" opacity="0.8"/>
  <text x="435" y="382" font-family="Consolas,monospace" font-size="18" fill="#7C3AED">**설치 방법**</text>
  <rect x="435" y="400" width="162" height="11" rx="3" fill="#D1D5DB"/>
  <rect x="435" y="422" width="140" height="11" rx="3" fill="#D1D5DB" opacity="0.7"/>
  <!-- .md badge -->
  <rect x="435" y="455" width="68" height="28" rx="8" fill="#1E3A8A"/>
  <text x="469" y="474" font-family="Consolas,monospace" font-size="16" fill="#93C5FD" text-anchor="middle">.md</text>
  <!-- Layer 3: Motion lines (falling) -->
  <line x1="415" y1="590" x2="390" y2="620" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="635" y1="590" x2="660" y2="620" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="510" y1="600" x2="510" y2="640" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>