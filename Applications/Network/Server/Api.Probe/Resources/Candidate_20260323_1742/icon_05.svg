<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A0A1A"/>
  <!-- Layer 2: 속도계 (응답 시간 ElapsedMs) -->
  <!-- 속도계 원 -->
  <circle cx="512" cy="460" r="360" fill="#200A20" stroke="#7B2FBE" stroke-width="16"/>
  <!-- 속도계 눈금 호 (배경) -->
  <path d="M 200,660 A 320,320 0 1,1 824,660" fill="none" stroke="#3A1A3A" stroke-width="40" stroke-linecap="round"/>
  <!-- 속도계 눈금 호 (채워진, 빠른 = 초록/노랑) -->
  <path d="M 200,660 A 320,320 0 0,1 380,200" fill="none" stroke="#4CAF50" stroke-width="40" stroke-linecap="round"/>
  <path d="M 380,200 A 320,320 0 0,1 512,152" fill="none" stroke="#8BC34A" stroke-width="40" stroke-linecap="round"/>
  <path d="M 512,152 A 320,320 0 0,1 640,198" fill="none" stroke="#FFD93D" stroke-width="40" stroke-linecap="round"/>
  <!-- 침 (바늘) - 빠른 응답 시간 위치 -->
  <line x1="512" y1="460" x2="380" y2="200" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
  <circle cx="512" cy="460" r="30" fill="#7B2FBE"/>
  <circle cx="512" cy="460" r="14" fill="#E0AAFF"/>
  <!-- 눈금 텍스트 -->
  <text x="180" y="740" font-size="44" fill="#6E7681" text-anchor="middle" font-family="monospace">0</text>
  <text x="512" y="120" font-size="44" fill="#6E7681" text-anchor="middle" font-family="monospace">500</text>
  <text x="844" y="740" font-size="44" fill="#6E7681" text-anchor="middle" font-family="monospace">∞</text>
  <!-- 응답 시간 표시 (큰) -->
  <text x="512" y="560" font-size="120" fill="#E0AAFF" text-anchor="middle" font-weight="bold" font-family="Arial">42</text>
  <text x="512" y="640" font-size="56" fill="#9C5FE0" text-anchor="middle" font-family="monospace">ms</text>
  <!-- Layer 3: 상태 배지 -->
  <rect x="320" y="740" width="384" height="80" rx="20" fill="#1E0A2E" stroke="#7B2FBE" stroke-width="6"/>
  <circle cx="372" cy="780" r="18" fill="#4CAF50"/>
  <text x="512" y="795" font-size="44" fill="#E0AAFF" text-anchor="middle" font-family="monospace">200 OK · Fast</text>
</svg>
