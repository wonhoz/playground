<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="110" y="155" width="804" height="510" rx="48" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
  <!-- Crosshair guide lines (faint) -->
  <line x1="512" y1="165" x2="512" y2="655" stroke="#CE93D8" stroke-width="4" stroke-dasharray="14,18" opacity="0.35"/>
  <line x1="120" y1="410" x2="904" y2="410" stroke="#CE93D8" stroke-width="4" stroke-dasharray="14,18" opacity="0.35"/>
  <!-- Concentric pulse circles (outermost to innermost) -->
  <circle cx="512" cy="410" r="248" fill="none" stroke="#E1BEE7" stroke-width="14" opacity="0.30"/>
  <circle cx="512" cy="410" r="196" fill="none" stroke="#BA68C8" stroke-width="16" opacity="0.50"/>
  <circle cx="512" cy="410" r="144" fill="none" stroke="#9C27B0" stroke-width="18" opacity="0.70"/>
  <circle cx="512" cy="410" r="92" fill="none" stroke="#7B1FA2" stroke-width="20" opacity="0.90"/>
  <!-- Center beacon -->
  <circle cx="512" cy="410" r="44" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <circle cx="512" cy="410" r="18" fill="#1A1A1A"/>
  <circle cx="524" cy="400" r="8" fill="#FFFFFF" opacity="0.85"/>
  <!-- ACTIVE badge -->
  <rect x="194" y="744" width="636" height="118" rx="36" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">ACTIVE</text>
</svg>
