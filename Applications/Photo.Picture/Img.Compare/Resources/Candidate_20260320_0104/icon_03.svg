<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
<!-- 컨셉: Before→After 화살표 -->
<!-- Before 이미지 (상단) -->
<rect x="180" y="180" width="664" height="260" rx="20" fill="#1A0040" stroke="#4527A0" stroke-width="20"/>
<!-- Before 내용 (픽셀 노이즈) -->
<rect x="220" y="210" width="60" height="48" rx="4" fill="#4527A0" opacity="0.6"/>
<rect x="300" y="225" width="44" height="36" rx="4" fill="#4527A0" opacity="0.4"/>
<rect x="440" y="200" width="56" height="44" rx="4" fill="#CE93D8" opacity="0.3"/>
<rect x="650" y="215" width="60" height="48" rx="4" fill="#4527A0" opacity="0.5"/>
<rect x="720" y="200" width="44" height="36" rx="4" fill="#4527A0" opacity="0.3"/>
<!-- 화살표 (중앙) -->
<path d="M 512 450 L 512 580" fill="none" stroke="#CE93D8" stroke-width="36" stroke-linecap="round"/>
<path d="M 420 530 L 512 600 L 604 530" fill="none" stroke="#CE93D8" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
<!-- After 이미지 (하단) -->
<rect x="180" y="600" width="664" height="240" rx="20" fill="#1A0040" stroke="#CE93D8" stroke-width="20"/>
<!-- After 내용 (깨끗한) -->
<rect x="220" y="630" width="200" height="32" rx="8" fill="#4527A0" opacity="0.8"/>
<rect x="460" y="630" width="160" height="32" rx="8" fill="#4527A0" opacity="0.6"/>
<rect x="220" y="688" width="280" height="32" rx="8" fill="#CE93D8" opacity="0.3"/>
<rect x="540" y="688" width="120" height="32" rx="8" fill="#4527A0" opacity="0.5"/>
</svg>
