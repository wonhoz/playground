<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_10: 기포 차트 (bubble chart: folder sizes) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 큰 기포 (대용량 폴더) -->
  <circle cx="380" cy="440" r="180" fill="#2E7D32" opacity="0.85"/>
  <!-- 중간 기포 -->
  <circle cx="660" cy="380" r="110" fill="#81C784" opacity="0.7"/>
  <!-- 작은 기포들 -->
  <circle cx="650" cy="620" r="75" fill="#2E7D32" opacity="0.6"/>
  <circle cx="260" cy="680" r="55" fill="#81C784" opacity="0.55"/>
  <circle cx="790" cy="600" r="45" fill="#2E7D32" opacity="0.5"/>
  <circle cx="800" cy="260" r="40" fill="#81C784" opacity="0.45"/>
  <circle cx="180" cy="330" r="32" fill="#2E7D32" opacity="0.4"/>
  <!-- 큰 기포 내부 장식 (하이라이트) -->
  <circle cx="340" cy="400" r="50" fill="#81C784" opacity="0.25"/>
  <!-- 기포 연결 영역 가이드 (격자) -->
  <line x1="180" y1="820" x2="844" y2="820" stroke="#2E7D32" stroke-width="4" opacity="0.3"/>
  <line x1="180" y1="180" x2="180" y2="820" stroke="#2E7D32" stroke-width="4" opacity="0.3"/>
</svg>
