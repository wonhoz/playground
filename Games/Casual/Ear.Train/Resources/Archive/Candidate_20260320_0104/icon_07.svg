<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 메트로놈 리듬: 메트로놈 진자 -->
  <!-- 메트로놈 몸체 (사다리꼴) -->
  <polygon points="312,820 712,820 640,220 384,220" fill="#558B2F"/>
  <!-- 몸체 안쪽 -->
  <polygon points="340,790 684,790 620,260 404,260" fill="#030A03" opacity="0.35"/>
  <!-- 메트로놈 다리 -->
  <rect x="312" y="820" width="400" height="30" rx="8" fill="#558B2F"/>
  <!-- 진자 축 -->
  <circle cx="512" cy="540" r="16" fill="#AED581"/>
  <!-- 진자 (기울어진 상태) -->
  <line x1="512" y1="540" x2="630" y2="240" stroke="#AED581" stroke-width="14" stroke-linecap="round"/>
  <!-- 진자 무게추 -->
  <rect x="590" y="220" width="50" height="28" rx="6" fill="#AED581"/>
  <!-- 눈금 선 -->
  <line x1="470" y1="420" x2="490" y2="420" stroke="#AED581" stroke-width="6" opacity="0.6"/>
  <line x1="465" y1="480" x2="488" y2="480" stroke="#AED581" stroke-width="6" opacity="0.6"/>
  <line x1="462" y1="540" x2="488" y2="540" stroke="#AED581" stroke-width="6" opacity="0.6"/>
  <line x1="465" y1="600" x2="488" y2="600" stroke="#AED581" stroke-width="6" opacity="0.6"/>
  <!-- 진자 스윙 호 (점선) -->
  <path d="M400,240 Q512,460 624,240" stroke="#AED581" stroke-width="6" fill="none" stroke-dasharray="16,12" opacity="0.4"/>
  <!-- BPM 노치 -->
  <line x1="540" y1="420" x2="554" y2="420" stroke="#AED581" stroke-width="6" opacity="0.6"/>
  <line x1="546" y1="480" x2="558" y2="480" stroke="#AED581" stroke-width="6" opacity="0.6"/>
</svg>
