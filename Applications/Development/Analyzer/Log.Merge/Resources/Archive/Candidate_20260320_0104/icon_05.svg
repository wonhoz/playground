<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Interweaving threads (braid pattern) -->
  <!-- Thread A (left-leaning, teal) -->
  <path d="M320 160 Q440 260 320 380 Q200 500 320 620 Q440 740 320 860"
    stroke="#006064" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- Thread B (right-leaning, cyan) -->
  <path d="M512 160 Q632 260 512 380 Q392 500 512 620 Q632 740 512 860"
    stroke="#00BCD4" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- Thread C (center) -->
  <path d="M704 160 Q584 260 704 380 Q824 500 704 620 Q584 740 704 860"
    stroke="#006064" stroke-width="32" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Intersection highlight dots -->
  <circle cx="416" cy="270" r="18" fill="#00BCD4"/>
  <circle cx="608" cy="270" r="18" fill="#006064"/>
  <circle cx="320" cy="380" r="18" fill="#00BCD4" opacity="0.8"/>
  <circle cx="512" cy="380" r="18" fill="#006064" opacity="0.8"/>
  <circle cx="704" cy="380" r="18" fill="#00BCD4" opacity="0.8"/>
  <circle cx="416" cy="500" r="18" fill="#00BCD4"/>
  <circle cx="608" cy="500" r="18" fill="#006064"/>
</svg>