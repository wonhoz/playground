<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010"/>
      <stop offset="100%" style="stop-color:#100a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bladeMulti" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multiple blade echoes -->
  <path d="M80 300 L420 220 L422 232 L82 312 Z" fill="#ff00ff" opacity="0.1" filter="url(#glow)"/>
  <path d="M80 290 L420 210 L422 222 L82 302 Z" fill="#ff00ff" opacity="0.15" filter="url(#glow)"/>
  <path d="M80 280 L420 200 L422 212 L82 292 Z" fill="url(#bladeMulti)" opacity="0.7" filter="url(#glow)"/>
  <!-- Blade edge -->
  <line x1="80" y1="280" x2="420" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <!-- Blade point -->
  <circle cx="420" cy="206" r="8" fill="#ff00ff" filter="url(#glow)"/>
  <circle cx="420" cy="206" r="4" fill="#ffffff"/>
  <!-- Handle -->
  <rect x="65" y="278" width="20" height="28" rx="5" fill="#880088" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
  <!-- Large hexagon being sliced -->
  <path d="M256 150 L320 190 L320 270 L256 310 L192 270 L192 190 Z" fill="none" stroke="#ff6600" stroke-width="2.5" filter="url(#glow)" opacity="0.7" transform="translate(0,-10)"/>
  <path d="M256 150 L320 190 L320 270 L256 310 L192 270 L192 190 Z" fill="none" stroke="#ff9900" stroke-width="2.5" filter="url(#glow)" opacity="0.7" transform="translate(0,10)"/>
  <!-- Cut line through hexagon -->
  <line x1="188" y1="240" x2="324" y2="220" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Hex sparks -->
  <circle cx="256" cy="230" r="4" fill="#ff00ff" filter="url(#glow)"/>
  <circle cx="240" cy="222" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="270" cy="226" r="2.5" fill="#ffff00" filter="url(#glow)"/>
  <line x1="245" y1="215" x2="238" y2="205" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
  <line x1="265" y1="218" x2="272" y2="207" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
</svg>