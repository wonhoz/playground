<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 네이비 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg2)"/>
  <!-- Layer 2: 흰색 QR 패턴 -->
  <!-- 코너 파인더 1 — 좌상 -->
  <rect x="128" y="128" width="272" height="272" rx="20" fill="white"/>
  <rect x="164" y="164" width="200" height="200" rx="12" fill="#1A237E"/>
  <rect x="200" y="200" width="128" height="128" rx="8" fill="white"/>
  <!-- 코너 파인더 2 — 우상 -->
  <rect x="624" y="128" width="272" height="272" rx="20" fill="white"/>
  <rect x="660" y="164" width="200" height="200" rx="12" fill="#1A237E"/>
  <rect x="696" y="200" width="128" height="128" rx="8" fill="white"/>
  <!-- 코너 파인더 3 — 좌하 -->
  <rect x="128" y="624" width="272" height="272" rx="20" fill="white"/>
  <rect x="164" y="660" width="200" height="200" rx="12" fill="#1A237E"/>
  <rect x="200" y="696" width="128" height="128" rx="8" fill="white"/>
  <!-- 데이터 모듈 -->
  <rect x="476" y="128" width="80" height="80" rx="10" fill="white"/>
  <rect x="476" y="224" width="80" height="80" rx="10" fill="white" opacity="0.5"/>
  <rect x="572" y="476" width="80" height="80" rx="10" fill="white" opacity="0.7"/>
  <rect x="668" y="476" width="80" height="80" rx="10" fill="white"/>
  <rect x="476" y="476" width="80" height="80" rx="10" fill="white" opacity="0.4"/>
  <rect x="572" y="572" width="80" height="80" rx="10" fill="white" opacity="0.6"/>
  <rect x="764" y="572" width="80" height="80" rx="10" fill="white" opacity="0.5"/>
  <rect x="572" y="668" width="80" height="80" rx="10" fill="white"/>
  <rect x="668" y="764" width="80" height="80" rx="10" fill="white" opacity="0.7"/>
  <rect x="764" y="764" width="80" height="80" rx="10" fill="white"/>
  <!-- Layer 3: 중앙 골드 다이아몬드 (로고 삽입 기능 표현) -->
  <rect x="862" y="524" width="132" height="132" rx="20" fill="url(#gold)" transform="rotate(45 928 590)"/>
  <rect x="892" y="554" width="72" height="72" rx="10" fill="#1A237E" transform="rotate(45 928 590)"/>
</svg>
