<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#1a0520"/>
      <stop offset="60%" stop-color="#0d0212"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softneon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerneon">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- City buildings silhouette -->
  <rect x="0" y="320" width="512" height="192" fill="#0a0110"/>
  <!-- Building shapes -->
  <rect x="20" y="260" width="60" height="260" fill="#0d0215"/>
  <rect x="90" y="290" width="45" height="230" fill="#0e0218"/>
  <rect x="145" y="240" width="70" height="280" fill="#0a0110"/>
  <rect x="225" y="200" width="50" height="320" fill="#0f0220"/>
  <rect x="285" y="270" width="65" height="250" fill="#0d0215"/>
  <rect x="360" y="230" width="55" height="290" fill="#0a0110"/>
  <rect x="425" y="285" width="70" height="240" fill="#0e0218"/>

  <!-- Neon signs on buildings -->
  <!-- Sign 1: manga/読む -->
  <rect x="35" y="280" width="30" height="20" rx="4" fill="none" stroke="#EC4899" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="50" y1="284" x2="50" y2="296" stroke="#EC4899" stroke-width="2" filter="url(#softneon)"/>
  <line x1="44" y1="290" x2="56" y2="290" stroke="#EC4899" stroke-width="2" filter="url(#softneon)"/>

  <!-- Sign 2: open book neon -->
  <path d="M155,255 L175,255 Q185,255 185,265 Q185,275 175,275 L155,275 Q145,275 145,265 Q145,255 155,255 Z" fill="none" stroke="#F472B6" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="165" y1="255" x2="165" y2="275" stroke="#F472B6" stroke-width="1.5" filter="url(#softneon)"/>

  <!-- Sign 3: MANGA text neon -->
  <rect x="235" y="215" width="30" height="10" rx="5" fill="#EC4899" fill-opacity="0.4" stroke="#EC4899" stroke-width="2" filter="url(#neon)"/>
  <rect x="235" y="232" width="30" height="10" rx="5" fill="#F472B6" fill-opacity="0.4" stroke="#F472B6" stroke-width="2" filter="url(#softneon)"/>

  <!-- Sign 4: star burst neon -->
  <polygon points="365,248 370,235 375,248 388,248 378,257 382,270 370,262 358,270 362,257 352,248" fill="none" stroke="#FB7185" stroke-width="2" filter="url(#neon)"/>

  <!-- Neon reflections on street -->
  <rect x="155" y="380" width="5" height="120" rx="2.5" fill="#F472B6" fill-opacity="0.15"/>
  <rect x="235" y="360" width="5" height="140" rx="2.5" fill="#EC4899" fill-opacity="0.12"/>
  <rect x="365" y="370" width="5" height="130" rx="2.5" fill="#FB7185" fill-opacity="0.12"/>

  <!-- Main floating manga page (center foreground) -->
  <rect x="170" y="100" width="172" height="230" rx="10" fill="#130318" stroke="#EC4899" stroke-width="3" filter="url(#neon)"/>
  <!-- Page fold -->
  <polygon points="310,100 342,100 342,132" fill="#0a0210" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="310" y1="100" x2="342" y2="132" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Manga page content -->
  <rect x="185" y="120" width="140" height="85" rx="4" fill="#1f0528" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Manga character silhouette -->
  <ellipse cx="255" cy="148" rx="20" ry="22" fill="#EC4899" fill-opacity="0.3"/>
  <rect x="240" y="170" width="30" height="28" rx="6" fill="#EC4899" fill-opacity="0.25"/>

  <!-- Page text lines -->
  <rect x="185" y="218" width="140" height="8" rx="4" fill="#EC4899" fill-opacity="0.4" filter="url(#softneon)"/>
  <rect x="185" y="234" width="120" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.35"/>
  <rect x="185" y="249" width="135" height="7" rx="3.5" fill="#EC4899" fill-opacity="0.4"/>
  <rect x="185" y="264" width="100" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.3"/>
  <rect x="185" y="279" width="130" height="7" rx="3.5" fill="#EC4899" fill-opacity="0.35"/>
  <rect x="185" y="294" width="110" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.3"/>

  <!-- Neon frame on page -->
  <rect x="170" y="100" width="172" height="230" rx="10" fill="none" stroke="#EC4899" stroke-width="1" filter="url(#outerneon)" stroke-opacity="0.4"/>

  <!-- Rain drops (tokyo rain atmosphere) -->
  <g stroke="#F472B6" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round">
    <line x1="80" y1="50" x2="76" y2="80"/>
    <line x1="140" y1="70" x2="136" y2="100"/>
    <line x1="420" y1="60" x2="416" y2="90"/>
    <line x1="470" y1="80" x2="466" y2="110"/>
    <line x1="50" y1="150" x2="46" y2="180"/>
    <line x1="450" y1="140" x2="446" y2="170"/>
    <line x1="100" y1="200" x2="96" y2="230"/>
  </g>
</svg>
