<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="128" width="872" height="546" rx="48" fill="#FFFFFF" stroke="#01579B" stroke-width="16"/>
  <!-- Char source stack (left) - stacked cards -->
  <rect x="112" y="192" width="300" height="370" rx="24" fill="#E8EAF6" stroke="#3A86FF" stroke-width="14"/>
  <rect x="128" y="208" width="268" height="338" rx="18" fill="#C5CAE9" stroke="#3A86FF" stroke-width="10"/>
  <text x="262" y="412" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="#3A86FF" text-anchor="middle">&#x2192;</text>
  <!-- Arrow: flow to clipboard -->
  <rect x="452" y="345" width="120" height="46" rx="22" fill="#0288D1" stroke="#01579B" stroke-width="14"/>
  <path d="M 566,299 L 638,368 L 566,437 Z" fill="#0288D1" stroke="#01579B" stroke-width="14" stroke-linejoin="round"/>
  <!-- Clipboard (right) -->
  <rect x="664" y="192" width="260" height="370" rx="24" fill="#FFFFFF" stroke="#01579B" stroke-width="14"/>
  <!-- Clipboard clip at top -->
  <rect x="734" y="176" width="120" height="40" rx="20" fill="#0288D1" stroke="#01579B" stroke-width="12"/>
  <!-- Clipboard content lines (text copied) -->
  <text x="794" y="326" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#0288D1" text-anchor="middle">&#x2192;</text>
  <rect x="698" y="390" width="192" height="14" rx="7" fill="#B0BEC5"/>
  <rect x="698" y="418" width="148" height="14" rx="7" fill="#B0BEC5"/>
  <rect x="698" y="446" width="170" height="14" rx="7" fill="#B0BEC5"/>
  <!-- FIND badge -->
  <rect x="96" y="754" width="300" height="108" rx="36" fill="#01579B" stroke="#003A72" stroke-width="14"/>
  <text x="246" y="827" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">FIND</text>
  <!-- PASTE badge -->
  <rect x="448" y="754" width="428" height="108" rx="36" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="662" y="827" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#1A1A1A" text-anchor="middle">PASTE</text>
</svg>
