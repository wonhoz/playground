<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 화음 원형 겹침: 벤다이어그램 음 -->
  <!-- 원 1 (도) -->
  <circle cx="380" cy="460" r="200" fill="#558B2F" opacity="0.55"/>
  <!-- 원 2 (미) -->
  <circle cx="550" cy="460" r="200" fill="#558B2F" opacity="0.55"/>
  <!-- 원 3 (솔) -->
  <circle cx="465" cy="620" r="200" fill="#558B2F" opacity="0.55"/>
  <!-- 겹침 중심 (화음 교집합) -->
  <circle cx="465" cy="520" r="70" fill="#AED581" opacity="0.8"/>
  <!-- 원 테두리 강조 -->
  <circle cx="380" cy="460" r="200" fill="none" stroke="#AED581" stroke-width="6" opacity="0.5"/>
  <circle cx="550" cy="460" r="200" fill="none" stroke="#AED581" stroke-width="6" opacity="0.5"/>
  <circle cx="465" cy="620" r="200" fill="none" stroke="#AED581" stroke-width="6" opacity="0.5"/>
  <!-- 중심 음표 -->
  <ellipse cx="452" cy="535" rx="26" ry="20" fill="#030A03"/>
  <line x1="478" y1="521" x2="478" y2="450" stroke="#030A03" stroke-width="10"/>
</svg>
