<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="key3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>
  <!-- Layer 2: Keyboard key (3D effect) -->
  <!-- Key shadow/depth -->
  <rect x="196" y="510" width="632" height="340" rx="30" fill="#BF6000"/>
  <!-- Key top face -->
  <rect x="188" y="468" width="648" height="340" rx="30" fill="url(#key3)"/>
  <!-- Key top border -->
  <rect x="188" y="468" width="648" height="340" rx="30" fill="none" stroke="#BDBDBD" stroke-width="6"/>
  <!-- Key label area -->
  <rect x="216" y="492" width="592" height="292" rx="20" fill="#F5F5F5"/>
  <!-- Keyboard symbol ⌨ label -->
  <text x="512" y="660" text-anchor="middle" dominant-baseline="middle" font-size="160" font-family="Segoe UI,Arial,sans-serif" fill="#424242">⌨</text>
  <!-- Layer 3: Special char ★ floating above key with glow -->
  <circle cx="512" cy="268" r="120" fill="#FF6F00" opacity="0.25"/>
  <circle cx="512" cy="268" r="88" fill="#FF8F00" opacity="0.4"/>
  <text x="512" y="268" text-anchor="middle" dominant-baseline="middle" font-size="164" font-family="Segoe UI,Arial,sans-serif" fill="#FF3D00">★</text>
  <!-- Small rising chars -->
  <text x="330" y="390" text-anchor="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="#BF360C" opacity="0.7">©</text>
  <text x="700" y="380" text-anchor="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="#E65100" opacity="0.7">∑</text>
  <text x="440" y="155" text-anchor="middle" font-size="64" font-family="Segoe UI,Arial,sans-serif" fill="#F57F17" opacity="0.5">→</text>
  <text x="600" y="160" text-anchor="middle" font-size="64" font-family="Segoe UI,Arial,sans-serif" fill="#BF360C" opacity="0.5">²</text>
</svg>
