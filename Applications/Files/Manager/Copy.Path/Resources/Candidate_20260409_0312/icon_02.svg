<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
    <clipPath id="c2"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Deep teal gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g2)"/>
  <g clip-path="url(#c2)">
    <!-- Decorative glow circles (Layer 1 accent) -->
    <circle cx="180" cy="820" r="140" fill="#0E7490" opacity="0.30"/>
    <circle cx="844" cy="200" r="140" fill="#0E7490" opacity="0.30"/>
    <!-- Layer 2: Backslash character (left) -->
    <text x="44" y="700" font-family="Consolas,monospace" font-size="340" fill="#FFFFFF" font-weight="bold" opacity="0.96">\</text>
    <!-- Layer 2: Slash character (right, lime green) -->
    <text x="638" y="700" font-family="Consolas,monospace" font-size="340" fill="#86EFAC" font-weight="bold" opacity="0.96">/</text>
    <!-- Layer 3: Conversion arrow (golden yellow) -->
    <line x1="306" y1="512" x2="540" y2="512" stroke="#FCD34D" stroke-width="72" stroke-linecap="round"/>
    <polygon points="518,436 648,512 518,588" fill="#FCD34D"/>
    <!-- Small "to" label below arrow -->
    <text x="480" y="620" font-family="Arial,sans-serif" font-size="80" fill="#BAE6FD" font-weight="bold" text-anchor="middle">to</text>
  </g>
</svg>
