<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 알파벳 큐브 — 3D 문자 블록 배치 | 기하학 | #0A0A14 -->
  <defs>
    <linearGradient id="cubeTop6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3A6A"/>
      <stop offset="100%" stop-color="#1A1A4A"/>
    </linearGradient>
    <linearGradient id="cubeLeft6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A30"/>
      <stop offset="100%" stop-color="#1A1A50"/>
    </linearGradient>
    <linearGradient id="cubeRight6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A50"/>
      <stop offset="100%" stop-color="#2A2A60"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A0A14"/>
  <!-- Layer 2: 3D alphabet cubes arranged in crossword pattern -->
  <!-- Cube macro helper: isometric cube with letter -->
  <!-- Row of cubes spelling W-O-R-D horizontally (center) -->
  <!-- Cube: W -->
  <polygon points="280,440 360,400 360,480 280,520" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="360,400 440,440 440,520 360,480" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="280,440 360,400 440,440 360,480" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="360" y="445" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">W</text>
  <!-- Cube: O -->
  <polygon points="440,440 520,400 520,480 440,520" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="520,400 600,440 600,520 520,480" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="440,440 520,400 600,440 520,480" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="520" y="445" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">O</text>
  <!-- Cube: R -->
  <polygon points="600,440 680,400 680,480 600,520" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="680,400 760,440 760,520 680,480" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="600,440 680,400 760,440 680,480" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="680" y="445" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">R</text>
  <!-- Cube: D -->
  <polygon points="760,440 840,400 840,480 760,520" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="840,400 920,440 920,520 840,480" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="760,440 840,400 920,440 840,480" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="840" y="445" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">D</text>
  <!-- Column cubes intersecting at O: spelling P-U-Z-Z-L-E downward style -->
  <!-- Cube: P (above O) - highlighted intersect -->
  <polygon points="440,360 520,320 520,400 440,440" fill="#1A1A5A" stroke="#8888FF" stroke-width="3"/>
  <polygon points="520,320 600,360 600,440 520,400" fill="#2A2A6A" stroke="#8888FF" stroke-width="3"/>
  <polygon points="440,360 520,320 600,360 520,400" fill="#3A3A7A" stroke="#AAAAFF" stroke-width="3"/>
  <text x="520" y="365" font-family="monospace" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">P</text>
  <!-- Cube: L (below O) -->
  <polygon points="440,520 520,480 520,560 440,600" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="520,480 600,520 600,600 520,560" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="440,520 520,480 600,520 520,560" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="520" y="525" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">L</text>
  <!-- Cube: A (further below) -->
  <polygon points="440,600 520,560 520,640 440,680" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="520,560 600,600 600,680 520,640" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2"/>
  <polygon points="440,600 520,560 600,600 520,640" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2"/>
  <text x="520" y="605" font-family="monospace" font-size="28" fill="#AAAAFF" text-anchor="middle" font-weight="bold">A</text>
  <!-- Cube: Y (at top, floating) -->
  <polygon points="440,280 520,240 520,320 440,360" fill="url(#cubeLeft6)" stroke="#4444AA" stroke-width="2" opacity="0.7"/>
  <polygon points="520,240 600,280 600,360 520,320" fill="url(#cubeRight6)" stroke="#4444AA" stroke-width="2" opacity="0.7"/>
  <polygon points="440,280 520,240 600,280 520,320" fill="url(#cubeTop6)" stroke="#6666CC" stroke-width="2" opacity="0.7"/>
  <text x="520" y="285" font-family="monospace" font-size="28" fill="#8888CC" text-anchor="middle" font-weight="bold">Y</text>
  <!-- Layer 3: Label -->
  <text x="512" y="820" font-family="monospace" font-size="20" fill="#6666AA" text-anchor="middle">CROSSWORD · PUZZLE</text>
</svg>
