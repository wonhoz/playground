<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2d1e00"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d890"/>
      <stop offset="50%" stop-color="#d4c070"/>
      <stop offset="100%" stop-color="#c0a850"/>
    </linearGradient>
    <linearGradient id="roll" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a08040"/>
      <stop offset="50%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a08040"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scroll paper -->
  <rect x="80" y="110" width="352" height="292" rx="4" fill="url(#paper)"/>
  <!-- Top roll -->
  <ellipse cx="256" cy="110" rx="176" ry="28" fill="url(#roll)"/>
  <ellipse cx="256" cy="110" rx="166" ry="20" fill="#b89050"/>
  <!-- Bottom roll -->
  <ellipse cx="256" cy="402" rx="176" ry="28" fill="url(#roll)"/>
  <ellipse cx="256" cy="402" rx="166" ry="20" fill="#b89050"/>
  <!-- Ancient cipher symbols on scroll -->
  <text x="120" y="165" font-family="serif" font-size="22" fill="#5a3a00">✦ Δ Ψ Ω ✦ Σ Λ</text>
  <text x="120" y="198" font-family="serif" font-size="18" fill="#4a2a00">░▒▓█▓▒░ ╔╗╚╝</text>
  <text x="120" y="228" font-family="serif" font-size="18" fill="#5a3a00">☽ ★ ☿ ♄ ☉ ♃</text>
  <text x="120" y="258" font-family="monospace" font-size="16" fill="#4a2a00">KEY: ??-??-??-??</text>
  <text x="120" y="288" font-family="serif" font-size="18" fill="#5a3a00">ΑΒΓΔΕΖΗΘΙΚΛΜΝα</text>
  <text x="120" y="318" font-family="monospace" font-size="16" fill="#4a2a00">... .._ _.. _._</text>
  <text x="120" y="348" font-family="serif" font-size="18" fill="#5a3a00">ℵ ℶ ℷ ℸ Ⅰ Ⅱ Ⅲ</text>
  <!-- Red seal -->
  <circle cx="400" cy="280" r="36" fill="#aa2200" opacity="0.9"/>
  <text x="400" y="288" text-anchor="middle" font-family="serif" font-size="28" fill="#ffcc44">?</text>
  <!-- Wax drips -->
  <ellipse cx="390" cy="310" rx="10" ry="6" fill="#aa2200"/>
  <ellipse cx="412" cy="308" rx="8" ry="5" fill="#aa2200"/>
</svg>