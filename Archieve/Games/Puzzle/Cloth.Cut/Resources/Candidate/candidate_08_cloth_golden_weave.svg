<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Woven cloth pattern -->
  <rect x="116" y="150" width="280" height="220" rx="10" fill="#5D4037" opacity="0.6"/>
  <!-- Horizontal weave threads -->
  <rect x="116" y="158" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.8"/>
  <rect x="116" y="180" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.65"/>
  <rect x="116" y="202" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.7"/>
  <rect x="116" y="224" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.6"/>
  <rect x="116" y="246" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.65"/>
  <rect x="116" y="268" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.6"/>
  <rect x="116" y="290" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.55"/>
  <rect x="116" y="312" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.5"/>
  <rect x="116" y="334" width="280" height="12" rx="4" fill="url(#gold)" opacity="0.45"/>
  <!-- Vertical weave threads (crossing) -->
  <rect x="148" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <rect x="186" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <rect x="224" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <rect x="262" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <rect x="300" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <rect x="338" y="150" width="10" height="220" rx="4" fill="#8D6E63" opacity="0.7"/>
  <!-- Scissors -->
  <circle cx="340" cy="370" r="16" fill="none" stroke="#FFF9C4" stroke-width="5"/>
  <circle cx="368" cy="370" r="16" fill="none" stroke="#FFF9C4" stroke-width="5"/>
  <line x1="354" y1="356" x2="430" y2="300" stroke="#FFF9C4" stroke-width="5" stroke-linecap="round"/>
