<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080E"/>
      <stop offset="100%" stop-color="#0E0E1A"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="100%" stop-color="#101830"/>
    </linearGradient>
    <linearGradient id="hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer hexagon -->
  <polygon points="256,60 384,130 384,270 256,340 128,270 128,130" fill="url(#hex)" stroke="url(#hexBorder)" stroke-width="4" filter="url(#glow)"/>
  <!-- Middle hexagon -->
  <polygon points="256,96 352,150 352,258 256,312 160,258 160,150" fill="url(#hex)" stroke="#2255AA" stroke-width="2" opacity="0.6"/>
  <!-- Inner hexagon -->
  <polygon points="256,136 320,172 320,244 256,280 192,244 192,172" fill="#0A1020" stroke="#3366BB" stroke-width="1.5" opacity="0.5"/>
  <!-- Shield icon inside -->
  <path d="M 256,148 L 306,168 L 306,222 Q 306,256 256,272 Q 206,256 206,222 L 206,168 Z" fill="#1A3A6A" opacity="0.8"/>
  <path d="M 256,148 L 306,168 L 306,222 Q 306,256 256,272 Q 206,256 206,222 L 206,168 Z" fill="none" stroke="#4488FF" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Check inside inner shield -->
  <polyline points="236,212 250,228 278,196" stroke="#88AAFF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Service dots around hexagon -->
  <circle cx="256" cy="360" r="10" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="128" cy="130" r="10" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="384" cy="130" r="10" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="128" cy="270" r="10" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="384" cy="270" r="10" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="256" cy="60" r="10" fill="#44FF88" filter="url(#glow)"/>
  <!-- Connecting pulse lines -->
  <line x1="256" y1="70" x2="256" y2="148" stroke="#4488FF" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="138" x2="206" y2="168" stroke="#4488FF" stroke-width="1.5" opacity="0.4"/>
  <line x1="374" y1="138" x2="306" y2="168" stroke="#4488FF" stroke-width="1.5" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="408" font-family="'Segoe UI', sans-serif" font-size="16" fill="#4488FF" text-anchor="middle" font-weight="700" filter="url(#glow)">SVC.GUARD</text>
  <text x="256" y="432" font-family="'Segoe UI', sans-serif" font-size="11" fill="#334466" text-anchor="middle">Service Protection System</text>
</svg>
