<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001520"/>
      <stop offset="100%" stop-color="#002540"/>
    </linearGradient>
    <linearGradient id="src" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <linearGradient id="alias" x1="0%" y1="0%" x2="100%" y2="100%">
