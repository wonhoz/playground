<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0f0528"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#0055ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="irisGrad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0044ff"/>
    </linearGradient>
    <filter id="eyeBlur">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye outline -->
  <ellipse cx="256" cy="230" rx="190" ry="90" fill="url(#eyeGlow)"/>
  <path d="M66 230 C120 140 392 140 446 230 C392 320 120 320 66 230Z" fill="#0a0a20" stroke="#00d4ff" stroke-width="2.5" filter="url(#eyeBlur)"/>
  <!-- Iris -->
  <circle cx="256" cy="230" r="75" fill="none" stroke="#0055ff" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="230" r="65" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Iris spokes -->
  <line x1="256" y1="165" x2="256" y2="295" stroke="#00aaff" stroke-width="1" opacity="0.4"/>
  <line x1="191" y1="230" x2="321" y2="230" stroke="#00aaff" stroke-width="1" opacity="0.4"/>
  <line x1="209" y1="183" x2="303" y2="277" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  <line x1="303" y1="183" x2="209" y2="277" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  <!-- Pupil -->
  <circle cx="256" cy="230" r="40" fill="#000010"/>
  <circle cx="256" cy="230" r="35" fill="#000510"/>
  <!-- AI scan cross inside pupil -->
  <line x1="238" y1="230" x2="274" y2="230" stroke="#00ffff" stroke-width="2" opacity="0.9" filter="url(#eyeBlur)"/>
  <line x1="256" y1="212" x2="256" y2="248" stroke="#00ffff" stroke-width="2" opacity="0.9" filter="url(#eyeBlur)"/>
  <!-- Reflection highlight -->
  <ellipse cx="275" cy="218" rx="10" ry="7" fill="#ffffff" opacity="0.25"/>
  <!-- Scan lines over text area below -->
  <rect x="100" y="340" width="312" height="100" rx="8" fill="#050510" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="115" y1="362" x2="398" y2="362" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="115" y1="382" x2="370" y2="382" stroke="#0055ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="115" y1="402" x2="390" y2="402" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="115" y1="422" x2="355" y2="422" stroke="#0055ff" stroke-width="1" opacity="0.4"/>
  <!-- Scan beam from eye -->
  <path d="M256 305 L200 340 L312 340Z" fill="url(#eyeGlow)" opacity="0.4"/>
  <!-- Corner scan brackets -->
  <path d="M100 340 L100 355 L115 355" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M412 340 L412 355 L397 355" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M100 440 L100 425 L115 425" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M412 440 L412 425 L397 425" fill="none" stroke="#00d4ff" stroke-width="2"/>
</svg>