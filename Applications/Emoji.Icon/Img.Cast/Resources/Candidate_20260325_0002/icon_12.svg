<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1117"/>
  <!-- Layer 2: ICO 파일 아이콘 (멀티사이즈) -->
  <!-- 큰 ICO 파일 아이콘 -->
  <rect x="252" y="220" width="520" height="560" rx="24" fill="#E65100"/>
  <!-- 접힌 모서리 -->
  <polygon points="772,220 772,320 672,220" fill="#BF360C"/>
  <polygon points="772,320 672,220 672,320" fill="#FF6D00"/>
  <!-- ICO 텍스트 -->
  <text x="512" y="370" text-anchor="middle" font-family="Arial Black" font-size="130" font-weight="900" fill="white">ICO</text>
  <!-- 사이즈 표시들 -->
  <rect x="292" y="430" width="440" height="50" rx="10" fill="#BF360C" opacity="0.8"/>
  <text x="512" y="466" text-anchor="middle" font-family="Arial Black" font-size="44" font-weight="900" fill="#FFD180">Multi-Size</text>
  <!-- 작은 정사각형들 (크기 표현) -->
  <rect x="292" y="508" width="60" height="60" rx="8" fill="white" opacity="0.9"/>
  <text x="322" y="546" text-anchor="middle" font-family="Arial" font-size="30" fill="#E65100">16</text>
  <rect x="376" y="496" width="80" height="80" rx="8" fill="white" opacity="0.9"/>
  <text x="416" y="543" text-anchor="middle" font-family="Arial" font-size="32" fill="#E65100">32</text>
  <rect x="476" y="482" width="100" height="100" rx="8" fill="white" opacity="0.9"/>
  <text x="526" y="538" text-anchor="middle" font-family="Arial" font-size="36" fill="#E65100">48</text>
  <rect x="596" y="462" width="136" height="136" rx="8" fill="white" opacity="0.9"/>
  <text x="664" y="540" text-anchor="middle" font-family="Arial" font-size="40" fill="#E65100">256</text>
  <!-- Layer 3: 글로우 -->
  <rect x="246" y="214" width="532" height="572" rx="28" fill="none" stroke="#FF6D00" stroke-width="8" opacity="0.5"/>
  <text x="512" y="870" text-anchor="middle" font-family="Arial Black" font-size="68" font-weight="900" fill="#FF9800">16 32 48 256</text>
</svg>