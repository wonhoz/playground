<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1445"/>
  <!-- Layer 2: 카드 (퀴즈 화면) -->
  <rect x="80" y="120" width="860" height="680" rx="32" fill="#1E3A8A"/>
  <rect x="80" y="120" width="860" height="680" rx="32" fill="none" stroke="#3B82F6" stroke-width="12"/>
  <!-- 질문 텍스트 -->
  <rect x="120" y="160" width="780" height="80" rx="16" fill="#2563EB"/>
  <text x="512" y="214" font-size="40" fill="#BFDBFE" text-anchor="middle">다음 나라의 수도는?</text>
  <!-- 국가명 강조 -->
  <text x="512" y="360" font-size="100" fill="#FBBF24" text-anchor="middle" font-weight="bold" font-family="Arial">🇫🇷</text>
  <text x="512" y="460" font-size="60" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial">프랑스</text>
  <!-- 선택지 4개 -->
  <rect x="120" y="540" width="360" height="70" rx="16" fill="#1D4ED8"/>
  <text x="300" y="585" font-size="36" fill="#93C5FD" text-anchor="middle">① 런던</text>
  <rect x="520" y="540" width="360" height="70" rx="16" fill="#166534"/>
  <text x="700" y="585" font-size="36" fill="#4ADE80" text-anchor="middle">② 파리 ✓</text>
  <rect x="120" y="630" width="360" height="70" rx="16" fill="#1D4ED8"/>
  <text x="300" y="675" font-size="36" fill="#93C5FD" text-anchor="middle">③ 베를린</text>
  <rect x="520" y="630" width="360" height="70" rx="16" fill="#1D4ED8"/>
  <text x="700" y="675" font-size="36" fill="#93C5FD" text-anchor="middle">④ 로마</text>
  <!-- Layer 3: 진행 바 -->
  <rect x="80" y="830" width="860" height="50" rx="14" fill="#1D4ED8"/>
  <rect x="80" y="830" width="430" height="50" rx="14" fill="#3B82F6"/>
  <text x="512" y="864" font-size="28" fill="white" text-anchor="middle" font-weight="bold">5 / 10</text>
</svg>
