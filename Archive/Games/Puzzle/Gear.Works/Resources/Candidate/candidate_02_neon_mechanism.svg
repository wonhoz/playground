<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <linearGradient id="neonGear1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <linearGradient id="neonGear2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76ff03"/>
      <stop offset="100%" stop-color="#33691e"/>
    </linearGradient>
    <linearGradient id="neonGear3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea00d9"/>
      <stop offset="100%" stop-color="#6a0050"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gear 1 (large, cyan) -->
  <circle cx="180" cy="220" r="100" fill="none" stroke="url(#neonGear1)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="180" cy="220" r="70" fill="none" stroke="url(#neonGear1)" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <circle cx="180" cy="220" r="20" fill="none" stroke="url(#neonGear1)" stroke-width="4" filter="url(#glow)"/>
  <!-- Spokes gear 1 -->
  <line x1="180" y1="140" x2="180" y2="300" stroke="url(#neonGear1)" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
  <line x1="100" y1="220" x2="260" y2="220" stroke="url(#neonGear1)" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
  <line x1="123" y1="163" x2="237" y2="277" stroke="url(#neonGear1)" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <line x1="237" y1="163" x2="123" y2="277" stroke="url(#neonGear1)" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <!-- Gear teeth 1 -->
  <rect x="170" y="108" width="20" height="24" rx="4" fill="url(#neonGear1)" filter="url(#glow)"/>
  <rect x="170" y="308" width="20" height="24" rx="4" fill="url(#neonGear1)" filter="url(#glow)"/>
  <rect x="68" y="210" width="24" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)"/>
  <rect x="268" y="210" width="24" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)"/>
  <rect x="105" y="148" width="20" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)" transform="rotate(45, 115, 158)"/>
  <rect x="239" y="148" width="20" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)" transform="rotate(45, 249, 158)"/>
  <rect x="105" y="274" width="20" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)" transform="rotate(45, 115, 284)"/>
  <rect x="239" y="274" width="20" height="20" rx="4" fill="url(#neonGear1)" filter="url(#glow)" transform="rotate(45, 249, 284)"/>
  <!-- Gear 2 (medium, magenta) -->
  <circle cx="355" cy="260" r="70" fill="none" stroke="url(#neonGear3)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="355" cy="260" r="20" fill="none" stroke="url(#neonGear3)" stroke-width="3" filter="url(#glow)"/>
  <line x1="355" y1="200" x2="355" y2="320" stroke="url(#neonGear3)" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <line x1="295" y1="260" x2="415" y2="260" stroke="url(#neonGear3)" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <!-- Gear teeth 2 -->
  <rect x="346" y="178" width="18" height="20" rx="4" fill="url(#neonGear3)" filter="url(#glow)"/>
  <rect x="346" y="322" width="18" height="20" rx="4" fill="url(#neonGear3)" filter="url(#glow)"/>
  <rect x="275" y="251" width="20" height="18" rx="4" fill="url(#neonGear3)" filter="url(#glow)"/>
  <rect x="417" y="251" width="20" height="18" rx="4" fill="url(#neonGear3)" filter="url(#glow)"/>
  <!-- Belt connecting gears -->
  <line x1="280" y1="220" x2="318" y2="230" stroke="#ffee58" stroke-width="3" stroke-dasharray="8,4" opacity="0.6" filter="url(#glow)"/>
  <!-- Title -->
  <text x="256" y="470" font-family="Arial" font-size="32" font-weight="900" fill="url(#neonGear1)" text-anchor="middle" filter="url(#glow)" letter-spacing="4">GEAR.WORKS</text>
</svg>
