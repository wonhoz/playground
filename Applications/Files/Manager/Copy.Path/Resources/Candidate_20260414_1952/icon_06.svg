<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 보라+분홍 -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 엉킨 경로(미로) → 깔끔한 경로 변환 -->
  <!-- 왼쪽: 복잡한 경로 덩어리 (꼬인 선들) -->
  <g opacity="0.85">
    <path d="M 140 350 Q 260 280 280 380 Q 300 480 180 460 Q 100 440 140 540 Q 180 620 280 600" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 160 320 Q 300 300 310 420 Q 320 500 200 480" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- 배경 박스 (왼쪽) -->
    <rect x="100" y="270" width="250" height="380" rx="20" fill="white" opacity="0.15" stroke="white" stroke-width="6"/>
    <!-- X 표시 -->
    <text x="225" y="500" font-family="Segoe UI, sans-serif" font-size="80" fill="#FF8888" text-anchor="middle" opacity="0.9">?</text>
  </g>
  <!-- 중앙 화살표 (변환) -->
  <path d="M 400 512 L 624 512" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <path d="M 600 470 L 650 512 L 600 554" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 오른쪽: 정돈된 경로 (깔끔한 행들) -->
  <rect x="674" y="290" width="250" height="440" rx="20" fill="white" opacity="0.95"/>
  <text x="799" y="370" font-family="Consolas, monospace" font-size="52" fill="#5B21B6" text-anchor="middle">full\</text>
  <line x1="700" y1="390" x2="898" y2="390" stroke="#DDD" stroke-width="4"/>
  <text x="799" y="450" font-family="Consolas, monospace" font-size="52" fill="#5B21B6" text-anchor="middle">slash/</text>
  <line x1="700" y1="470" x2="898" y2="470" stroke="#DDD" stroke-width="4"/>
  <text x="799" y="530" font-family="Consolas, monospace" font-size="42" fill="#5B21B6" text-anchor="middle">file:///</text>
  <line x1="700" y1="550" x2="898" y2="550" stroke="#DDD" stroke-width="4"/>
  <text x="799" y="610" font-family="Consolas, monospace" font-size="46" fill="#5B21B6" text-anchor="middle">\\UNC\</text>
  <line x1="700" y1="630" x2="898" y2="630" stroke="#DDD" stroke-width="4"/>
  <text x="799" y="690" font-family="Consolas, monospace" font-size="46" fill="#5B21B6" text-anchor="middle">name</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="870" font-family="Segoe UI, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle">Copy.Path</text>
</svg>
