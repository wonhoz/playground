<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <clipPath id="clip13">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>

  <!-- 지도 배경 (바다) -->
  <rect x="90" y="140" width="844" height="680" rx="18" fill="#0C4A6E" stroke="#6EE7B7" stroke-width="10"/>

  <!-- 세계 지도 단순화 윤곽 (백지도) -->
  <!-- 북아메리카 -->
  <path d="M 130 200 Q 180 190 240 210 Q 280 230 290 280 Q 310 310 300 370 Q 280 420 250 440 Q 220 460 200 430 Q 170 390 160 340 Q 140 290 130 250 Z"
        fill="#1E3A5F" stroke="#6EE7B7" stroke-width="6"/>
  <!-- 남아메리카 -->
  <path d="M 210 480 Q 250 470 280 490 Q 310 520 300 580 Q 290 640 260 680 Q 240 700 220 680 Q 195 650 190 600 Q 180 550 190 510 Z"
        fill="#1E3A5F" stroke="#6EE7B7" stroke-width="6"/>
  <!-- 유럽 -->
  <path d="M 440 180 Q 480 170 510 185 Q 530 200 520 230 Q 510 255 490 260 Q 470 265 455 250 Q 435 230 440 205 Z"
        fill="#1E3A5F" stroke="#6EE7B7" stroke-width="6"/>
  <!-- 아프리카 -->
  <path d="M 445 290 Q 490 275 520 295 Q 550 320 545 390 Q 540 460 510 510 Q 490 540 465 530 Q 435 510 425 460 Q 410 400 420 340 Q 425 305 445 290 Z"
