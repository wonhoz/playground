<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A08"/>
  <!-- 저항 지그재그: 지그재그 저항 -->
  <!-- 왼쪽 도선 -->
  <line x1="160" y1="512" x2="280" y2="512" stroke="#4DB6AC" stroke-width="16" stroke-linecap="round"/>
  <!-- 저항 지그재그 몸체 -->
  <polyline points="280,512 310,380 360,644 410,380 460,644 510,380 560,644 610,380 660,644 710,380 740,512" stroke="#4DB6AC" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 오른쪽 도선 -->
  <line x1="740" y1="512" x2="864" y2="512" stroke="#4DB6AC" stroke-width="16" stroke-linecap="round"/>
  <!-- 저항 값 표시 밴드 -->
  <rect x="370" y="460" width="20" height="104" rx="4" fill="#00897B"/>
  <rect x="440" y="460" width="20" height="104" rx="4" fill="#00897B"/>
  <rect x="510" y="460" width="20" height="104" rx="4" fill="#00897B"/>
  <rect x="580" y="460" width="14" height="104" rx="4" fill="#4DB6AC" opacity="0.7"/>
  <!-- 전압 측정 기호 (상단) -->
  <circle cx="512" cy="310" r="60" fill="none" stroke="#00897B" stroke-width="10"/>
  <!-- V 기호 (간단화) -->
  <polyline points="490,286 512,334 534,286" stroke="#4DB6AC" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 연결선 -->
  <line x1="512" y1="370" x2="512" y2="380" stroke="#00897B" stroke-width="8" stroke-dasharray="8,6"/>
  <!-- 접지 기호 (하단) -->
  <line x1="512" y1="714" x2="512" y2="750" stroke="#00897B" stroke-width="8"/>
  <line x1="452" y1="750" x2="572" y2="750" stroke="#4DB6AC" stroke-width="12" stroke-linecap="round"/>
  <line x1="472" y1="778" x2="552" y2="778" stroke="#4DB6AC" stroke-width="10" stroke-linecap="round"/>
  <line x1="492" y1="806" x2="532" y2="806" stroke="#4DB6AC" stroke-width="8" stroke-linecap="round"/>
  <line x1="512" y1="644" x2="512" y2="714" stroke="#00897B" stroke-width="8" stroke-dasharray="8,6"/>
</svg>
