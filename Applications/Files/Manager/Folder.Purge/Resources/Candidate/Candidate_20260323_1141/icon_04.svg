  <!-- Layer 3: Folder icons on radar -->
  <!-- Folder tab + body simplified -->
  <rect x="380" y="250" width="60" height="30" rx="8" fill="white"/>
  <rect x="370" y="272" width="80" height="60" rx="8" fill="white"/>
  <rect x="620" y="390" width="60" height="30" rx="8" fill="white"/>
  <rect x="610" y="412" width="80" height="60" rx="8" fill="white"/>
