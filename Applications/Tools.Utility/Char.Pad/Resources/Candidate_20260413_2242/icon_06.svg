<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#BF360C" stroke-width="16"/>
  <!-- Magnifier circle body -->
  <circle cx="450" cy="390" r="196" fill="#FFF9C4" stroke="#BF360C" stroke-width="20"/>
  <circle cx="450" cy="390" r="164" fill="#FFFFFF" stroke="#BF360C" stroke-width="14"/>
  <!-- Character inside magnifier: ∑ -->
  <text x="450" y="452" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="#E65100" text-anchor="middle">&#x2211;</text>
  <!-- Magnifier handle -->
  <line x1="594" y1="534" x2="724" y2="632" stroke="#BF360C" stroke-width="32" stroke-linecap="round"/>
  <circle cx="724" cy="632" r="20" fill="#BF360C"/>
  <!-- Small chars floating around magnifier -->
  <text x="178" y="244" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#E91E63" opacity="0.70">&#x2192;</text>
  <text x="692" y="220" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#3A86FF" opacity="0.70">&#xa9;</text>
  <text x="160" y="568" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#06D6A0" opacity="0.70">$</text>
  <!-- SEARCH badge -->
  <rect x="172" y="744" width="680" height="116" rx="36" fill="#BF360C" stroke="#7F0000" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">SEARCH</text>
</svg>
