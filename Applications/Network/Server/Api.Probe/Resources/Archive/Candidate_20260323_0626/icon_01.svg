<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | 탐정 돋보기 + URL 조사 | 공간/장면 | #1A0A28 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A28"/>
  <!-- Layer 2: Magnifying glass over URL bar -->
  <!-- URL bar background -->
  <rect x="180" y="380" width="580" height="80" rx="12" fill="#0F0620" stroke="#4A1E8A" stroke-width="3"/>
  <!-- URL text -->
  <text x="210" y="431" font-family="monospace" font-size="24" fill="#7C3AED">https://</text>
  <text x="360" y="431" font-family="monospace" font-size="24" fill="#A78BFA">api.example.com</text>
  <text x="596" y="431" font-family="monospace" font-size="24" fill="#60A5FA">/users</text>
  <!-- Method badge -->
  <rect x="180" y="280" width="100" height="42" rx="8" fill="#065F46"/>
  <text x="230" y="309" font-family="Arial,sans-serif" font-size="20" fill="#4ADE80" text-anchor="middle" font-weight="bold">GET</text>
  <!-- Response panel hint -->
  <rect x="180" y="490" width="580" height="200" rx="12" fill="#0C0418" stroke="#2D1060" stroke-width="2"/>
  <text x="210" y="524" font-family="monospace" font-size="18" fill="#4ADE80">200 OK</text>
  <text x="210" y="552" font-family="monospace" font-size="16" fill="#6D7280">{"id": 1, "name": "Alice"}</text>
  <text x="210" y="576" font-family="monospace" font-size="16" fill="#6D7280">{"id": 2, "name": "Bob"}</text>
  <!-- Layer 3: Magnifying glass overlay -->
  <circle cx="680" cy="340" r="130" fill="none" stroke="#FBBF24" stroke-width="14" opacity="0.85"/>
  <circle cx="680" cy="340" r="114" fill="#FBBF2410"/>
  <line x1="782" y1="436" x2="860" y2="520" stroke="#FBBF24" stroke-width="20" stroke-linecap="round"/>
  <!-- Crosshair inside glass -->
  <line x1="640" y1="340" x2="720" y2="340" stroke="#FBBF24" stroke-width="3" opacity="0.4"/>
  <line x1="680" y1="300" x2="680" y2="380" stroke="#FBBF24" stroke-width="3" opacity="0.4"/>
</svg>
