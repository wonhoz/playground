<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="key_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="100%" style="stop-color:#fda085"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Door -->
  <rect x="80" y="100" width="250" height="370" rx="14" fill="#2a2a4a" stroke="#4a4a8a" stroke-width="5"/>
  <path d="M220 100 L220 470 C220 470 330 470 330 350 L330 100 Z" fill="#222244" stroke="#4a4a8a" stroke-width="3"/>
  <!-- Door frame light (escape) -->
  <rect x="82" y="102" width="246" height="366" rx="12" stroke="url(#key_g)" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Keyhole -->
  <circle cx="165" cy="290" r="22" fill="url(#key_g)" opacity="0.8"/>
  <polygon points="154,305 176,305 165,335" fill="url(#key_g)" opacity="0.8"/>
  <!-- Big key -->
  <circle cx="370" cy="190" r="55" stroke="url(#key_g)" stroke-width="14" fill="none"/>
  <line x1="418" y1="222" x2="470" y2="290" stroke="url(#key_g)" stroke-width="14" stroke-linecap="round"/>
  <line x1="450" y1="280" x2="470" y2="260" stroke="url(#key_g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="460" y1="296" x2="476" y2="278" stroke="url(#key_g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Escape arrow -->
  <path d="M340 380 L400 380 L380 360" stroke="url(#key_g)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M340 380 L380 400" stroke="url(#key_g)" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
