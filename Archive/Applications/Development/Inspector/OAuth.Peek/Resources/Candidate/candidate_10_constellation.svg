  <line x1="256" y1="130" x2="362" y2="220" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="220" x2="256" y2="300" stroke="#44ff88" stroke-width="1.5" opacity="0.6"/>
