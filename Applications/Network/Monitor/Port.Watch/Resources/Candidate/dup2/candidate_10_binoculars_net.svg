<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <radialGradient id="lens1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a4a6a"/>
      <stop offset="60%" stop-color="#0d2d4a"/>
      <stop offset="100%" stop-color="#051520"/>
    </radialGradient>
    <radialGradient id="lens2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6a4a"/>
      <stop offset="60%" stop-color="#0d4a2d"/>
      <stop offset="100%" stop-color="#052015"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Binocular body -->
  <rect x="90" y="190" width="140" height="160" rx="30" fill="url(#body)" stroke="#3a5a7a" stroke-width="3"/>
  <rect x="282" y="190" width="140" height="160" rx="30" fill="url(#body)" stroke="#3a5a7a" stroke-width="3"/>
  <rect x="210" y="210" width="92" height="80" rx="10" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="2"/>
  <!-- Lens circles -->
  <circle cx="160" cy="270" r="60" fill="url(#lens1)" stroke="#5a8aaa" stroke-width="4"/>
  <circle cx="352" cy="270" r="60" fill="url(#lens2)" stroke="#5aaa8a" stroke-width="4"/>
  <!-- Lens crosshairs -->
  <line x1="160" y1="230" x2="160" y2="310" stroke="#2a8acc" stroke-width="1.5" opacity="0.7"/>
  <line x1="120" y1="270" x2="200" y2="270" stroke="#2a8acc" stroke-width="1.5" opacity="0.7"/>
  <line x1="352" y1="230" x2="352" y2="310" stroke="#2acc8a" stroke-width="1.5" opacity="0.7"/>
  <line x1="312" y1="270" x2="392" y2="270" stroke="#2acc8a" stroke-width="1.5" opacity="0.7"/>
  <!-- Port target in left lens -->
  <circle cx="160" cy="270" r="20" fill="none" stroke="#2a8acc" stroke-width="2" opacity="0.8"/>
  <text x="160" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#5af0ff" font-weight="bold">:80</text>
  <!-- Alert target in right lens -->
  <circle cx="352" cy="270" r="20" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.8"/>
  <text x="352" y="274" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff8888" font-weight="bold">:3389</text>
  <!-- Status bar below -->
  <rect x="100" y="385" width="312" height="34" rx="8" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1.5"/>
  <circle cx="128" cy="402" r="6" fill="#00ff88"/>
  <text x="142" y="407" font-family="monospace" font-size="11" fill="#88ffcc">4 OPEN  </text>
  <circle cx="248" cy="402" r="6" fill="#ff4444"/>
  <text x="262" y="407" font-family="monospace" font-size="11" fill="#ff8888">1 ALERT  </text>
  <circle cx="360" cy="402" r="6" fill="#888888"/>
  <text x="374" y="407" font-family="monospace" font-size="11" fill="#aaaaaa">24 CLOSED</text>
</svg>
