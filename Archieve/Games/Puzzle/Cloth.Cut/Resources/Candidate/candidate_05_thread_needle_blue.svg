  <line x1="130" y1="240" x2="382" y2="240" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="280" x2="382" y2="280" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="320" x2="382" y2="320" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="178" y1="160" x2="178" y2="360" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <line x1="226" y1="160" x2="226" y2="360" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <line x1="274" y1="160" x2="274" y2="360" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <line x1="322" y1="160" x2="322" y2="360" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
