<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 파스텔 민트 -->
  <rect width="1024" height="1024" rx="180" fill="#E0F2F1"/>
  <!-- Layer 2: 색상 원 안에 배치된 단어들 -->
  <!-- 큰 원들 (단어 버블) -->
  <circle cx="512" cy="480" r="200" fill="#00897B" opacity="0.9"/>
  <circle cx="260" cy="420" r="130" fill="#0097A7" opacity="0.85"/>
  <circle cx="764" cy="420" r="140" fill="#00796B" opacity="0.85"/>
  <circle cx="350" cy="640" r="100" fill="#26A69A" opacity="0.8"/>
  <circle cx="680" cy="640" r="110" fill="#4DB6AC" opacity="0.8"/>
  <circle cx="512" cy="720" r="80" fill="#80CBC4" opacity="0.75"/>
  <!-- 단어들 (원 안에) -->
  <text x="512" y="502" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">word</text>
  <text x="260" y="440" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="white" text-anchor="middle">tag</text>
  <text x="764" y="444" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="white" text-anchor="middle">text</text>
  <text x="350" y="658" font-family="Arial" font-size="48" font-weight="700" fill="white" text-anchor="middle">freq</text>
  <text x="680" y="660" font-family="Arial" font-size="52" font-weight="700" fill="white" text-anchor="middle">vis</text>
  <text x="512" y="736" font-family="Arial" font-size="40" fill="white" text-anchor="middle">font</text>
  <!-- Layer 3: 상단 타이틀 -->
  <text x="512" y="240" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#004D40" text-anchor="middle">Word Cloud</text>
  <line x1="200" y1="270" x2="824" y2="270" stroke="#00897B" stroke-width="4"/>
</svg>
