<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 은하 나선 -->
  <path d="M 256 256 C 280 230 310 235 320 256 C 335 285 310 320 280 325 C 240 332 200 308 195 268 C 188 218 225 175 275 172 C 335 168 380 215 380 275 C 380 345 330 390 260 390 C 180 390 120 330 120 256 C 120 170 185 110 270 110 C 365 110 432 185 432 280" fill="none" stroke="#14B8A6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <!-- 스캔 빔 -->
  <line x1="256" y1="256" x2="256" y2="90" stroke="#2DD4BF" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 256 256 L 256 90" stroke="#2DD4BF" stroke-width="8" opacity="0.1"/>
  <!-- 탐지 디바이스들 -->
  <circle cx="380" cy="180" r="8" fill="#14B8A6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="320" cy="380" r="7" fill="#2DD4BF" opacity="0.7"/>
  <circle cx="140" cy="300" r="8" fill="#14B8A6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="290" cy="140" r="6" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="420" cy="310" r="6" fill="#14B8A6" opacity="0.6"/>
  <!-- 중앙 게이트웨이 -->
  <circle cx="256" cy="256" r="22" fill="#14B8A6" opacity="0.15"/>
  <circle cx="256" cy="256" r="14" fill="#14B8A6" opacity="0.6" filter="url(#glow)"/>
  <!-- 연결 점선 -->
  <line x1="256" y1="256" x2="380" y2="180" stroke="#14B8A6" stroke-width="1" stroke-dasharray="4,5" opacity="0.4"/>
  <line x1="256" y1="256" x2="140" y2="300" stroke="#14B8A6" stroke-width="1" stroke-dasharray="4,5" opacity="0.4"/>
</svg>