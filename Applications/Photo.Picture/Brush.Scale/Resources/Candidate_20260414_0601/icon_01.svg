<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#3A86FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg1)"/>

  <!-- Left card: BEFORE (blurry pixels) -->
  <rect x="60" y="190" width="350" height="370" rx="28" fill="#FFFFFF" stroke="#1565C0" stroke-width="16"/>
  <!-- Pixelated image — big color blocks -->
  <rect x="80" y="210" width="310" height="260" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="10"/>
  <!-- Pixel grid (big blurry squares) -->
  <rect x="92" y="222" width="72" height="72" rx="4" fill="#42A5F5"/>
  <rect x="168" y="222" width="72" height="72" rx="4" fill="#64B5F6"/>
  <rect x="244" y="222" width="72" height="72" rx="4" fill="#90CAF9"/>
  <rect x="320" y="222" width="66" height="72" rx="4" fill="#42A5F5"/>
  <rect x="92" y="298" width="72" height="72" rx="4" fill="#90CAF9"/>
  <rect x="168" y="298" width="72" height="72" rx="4" fill="#1565C0"/>
  <rect x="244" y="298" width="72" height="72" rx="4" fill="#42A5F5"/>
  <rect x="320" y="298" width="66" height="72" rx="4" fill="#64B5F6"/>
  <rect x="92" y="374" width="72" height="90" rx="4" fill="#BBDEFB"/>
  <rect x="168" y="374" width="72" height="90" rx="4" fill="#90CAF9"/>
  <rect x="244" y="374" width="72" height="90" rx="4" fill="#42A5F5"/>
  <rect x="320" y="374" width="66" height="90" rx="4" fill="#BBDEFB"/>
  <!-- BEFORE badge -->
  <rect x="80" y="486" width="310" height="58" rx="20" fill="#90CAF9" stroke="#1565C0" stroke-width="10"/>
  <text x="235" y="526" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#1565C0" text-anchor="middle">BEFORE</text>

  <!-- Arrow -->
  <rect x="428" y="350" width="120" height="46" rx="18" fill="url(#arrowG)" stroke="#1A5CC9" stroke-width="12"/>
  <polygon points="548,316 638,373 548,430" fill="#1565C0" stroke="#1A5CC9" stroke-width="12" stroke-linejoin="round"/>

  <!-- Right card: AFTER (sharp) -->
  <rect x="656" y="190" width="310" height="370" rx="28" fill="#FFFFFF" stroke="#1565C0" stroke-width="16"/>
  <!-- Sharp image — smooth gradient shapes -->
  <rect x="672" y="206" width="278" height="264" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="10"/>
  <!-- Mountain landscape (crisp) -->
  <polygon points="680,460 760,330 820,390 880,310 950,460" fill="#1565C0" stroke="#0D47A1" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="680,460 760,390 820,420 880,380 950,460" fill="#3A86FF" stroke="#0D47A1" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="720" cy="270" r="36" fill="#FFD93D" stroke="#1565C0" stroke-width="8"/>
  <!-- Sparkle lines for sharpness -->
  <line x1="870" y1="225" x2="870" y2="245" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <line x1="856" y1="235" x2="884" y2="235" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <line x1="860" y1="221" x2="880" y2="249" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
  <line x1="880" y1="221" x2="860" y2="249" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
  <!-- AFTER badge -->
  <rect x="672" y="486" width="278" height="58" rx="20" fill="#1565C0" stroke="#0D47A1" stroke-width="10"/>
  <text x="811" y="526" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">AFTER</text>

  <!-- Title badge -->
  <rect x="202" y="650" width="620" height="100" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="718" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>

  <!-- UPSCALE badge -->
  <rect x="312" y="784" width="400" height="76" rx="28" fill="#3A86FF" stroke="#1565C0" stroke-width="12"/>
  <text x="512" y="837" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">UPSCALE</text>
</svg>
