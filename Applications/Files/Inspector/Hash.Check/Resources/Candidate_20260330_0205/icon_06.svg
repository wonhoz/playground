<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <linearGradient id="hashColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 청록 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg6)"/>

  <!-- Layer 2: 큰 # 해시 기호 -->
  <!-- 가로선 2개 -->
  <rect x="160" y="340" width="700" height="72" rx="20" fill="url(#hashColor)"/>
  <rect x="160" y="612" width="700" height="72" rx="20" fill="url(#hashColor)"/>
  <!-- 세로선 2개 (대각선 기울기) -->
  <rect x="310" y="160" width="72" height="700" rx="20" fill="url(#hashColor)" transform="rotate(-10, 346, 510)"/>
  <rect x="580" y="160" width="72" height="700" rx="20" fill="url(#hashColor)" transform="rotate(-10, 616, 510)"/>

  <!-- Layer 3: 큰 체크마크 (대각선, 동적) -->
  <path d="M200 560 L380 740 L780 280" stroke="#00E676" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- 체크 글로우 -->
  <path d="M200 560 L380 740 L780 280" stroke="#69F0AE" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>

  <!-- 해시 알고리즘 배지들 -->
  <rect x="100" y="860" width="120" height="50" rx="12" fill="#1565C0"/>
  <text x="160" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">MD5</text>
  <rect x="240" y="860" width="130" height="50" rx="12" fill="#0D47A1"/>
  <text x="305" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">SHA1</text>
  <rect x="390" y="860" width="160" height="50" rx="12" fill="#01579B"/>
  <text x="470" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">SHA256</text>
  <rect x="570" y="860" width="160" height="50" rx="12" fill="#006064"/>
  <text x="650" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">SHA512</text>
</svg>
