<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Two rivers merging -->
  <!-- Left river -->
  <path d="M200 200 Q240 300 280 400 Q320 500 512 700" stroke="#006064" stroke-width="60" fill="none" stroke-linecap="round"/>
  <!-- Right river -->
  <path d="M824 200 Q784 300 744 400 Q704 500 512 700" stroke="#006064" stroke-width="60" fill="none" stroke-linecap="round"/>
  <!-- Merged river -->
  <path d="M512 700 Q512 780 512 860" stroke="#00BCD4" stroke-width="80" fill="none" stroke-linecap="round"/>
  <!-- Flow ripples on left river -->
  <path d="M230 280 Q260 270 290 280" stroke="#00BCD4" stroke-width="10" fill="none" opacity="0.5"/>
  <path d="M250 340 Q280 330 310 340" stroke="#00BCD4" stroke-width="10" fill="none" opacity="0.5"/>
  <!-- Flow ripples on right river -->
  <path d="M754 280 Q724 270 694 280" stroke="#00BCD4" stroke-width="10" fill="none" opacity="0.5"/>
  <!-- Confluence point highlight -->
  <circle cx="512" cy="700" r="50" fill="#00BCD4" opacity="0.5"/>
  <circle cx="512" cy="700" r="28" fill="#00BCD4"/>
</svg>