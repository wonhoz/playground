<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
  <!-- 별자리 먼지 성운: 점 + 성운 -->
  <!-- 성운 배경 (희미한 가스) -->
  <ellipse cx="512" cy="512" rx="340" ry="280" fill="#F9A825" opacity="0.07"/>
  <ellipse cx="420" cy="440" rx="220" ry="180" fill="#FFE082" opacity="0.06"/>
  <ellipse cx="620" cy="580" rx="200" ry="160" fill="#F9A825" opacity="0.06"/>
  <!-- 별자리 점들 (입자) -->
  <circle cx="300" cy="300" r="16" fill="#FFE082"/>
  <circle cx="450" cy="240" r="12" fill="#F9A825"/>
  <circle cx="600" cy="280" r="14" fill="#FFE082"/>
  <circle cx="720" cy="360" r="10" fill="#F9A825"/>
  <circle cx="760" cy="500" r="12" fill="#FFE082"/>
  <circle cx="680" cy="640" r="14" fill="#F9A825"/>
  <circle cx="540" cy="720" r="16" fill="#FFE082"/>
  <circle cx="380" cy="680" r="10" fill="#F9A825"/>
  <circle cx="240" cy="580" r="12" fill="#FFE082"/>
  <circle cx="260" cy="440" r="14" fill="#F9A825"/>
  <!-- 중앙 큰 점 -->
  <circle cx="512" cy="512" r="24" fill="#FFE082"/>
  <circle cx="512" cy="512" r="14" fill="#F9A825"/>
  <!-- 내부 점들 (성운 입자) -->
  <circle cx="420" cy="380" r="8" fill="#F9A825" opacity="0.8"/>
  <circle cx="580" cy="400" r="7" fill="#FFE082" opacity="0.7"/>
  <circle cx="640" cy="500" r="9" fill="#F9A825" opacity="0.7"/>
  <circle cx="580" cy="620" r="7" fill="#FFE082" opacity="0.8"/>
  <circle cx="420" cy="640" r="8" fill="#F9A825" opacity="0.7"/>
  <circle cx="360" cy="520" r="9" fill="#FFE082" opacity="0.7"/>
  <!-- 별자리 연결선 -->
  <line x1="300" y1="300" x2="450" y2="240" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <line x1="450" y1="240" x2="600" y2="280" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <line x1="600" y1="280" x2="720" y2="360" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <line x1="720" y1="360" x2="760" y2="500" stroke="#FFE082" stroke-width="4" opacity="0.4"/>
  <line x1="760" y1="500" x2="680" y2="640" stroke="#FFE082" stroke-width="4" opacity="0.4"/>
  <line x1="680" y1="640" x2="540" y2="720" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <line x1="540" y1="720" x2="380" y2="680" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <line x1="380" y1="680" x2="240" y2="580" stroke="#FFE082" stroke-width="4" opacity="0.4"/>
  <line x1="240" y1="580" x2="260" y2="440" stroke="#FFE082" stroke-width="4" opacity="0.4"/>
  <line x1="260" y1="440" x2="300" y2="300" stroke="#F9A825" stroke-width="4" opacity="0.4"/>
  <!-- 중앙 연결 -->
  <line x1="512" y1="512" x2="420" y2="380" stroke="#FFE082" stroke-width="3" opacity="0.3"/>
  <line x1="512" y1="512" x2="640" y2="500" stroke="#FFE082" stroke-width="3" opacity="0.3"/>
</svg>
