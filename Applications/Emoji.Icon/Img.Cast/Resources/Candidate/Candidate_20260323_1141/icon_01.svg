<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D47A1"/>
  <!-- Layer 2: SVG file icon -->
  <rect x="120" y="300" width="240" height="300" rx="20" fill="white"/>
  <rect x="120" y="300" width="240" height="70" rx="20" fill="#1565C0"/>
  <text x="240" y="350" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">SVG</text>
  <text x="240" y="490" font-family="Arial" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">SVG</text>
  <!-- Arrow -->
  <line x1="390" y1="450" x2="620" y2="450" stroke="white" stroke-width="44" stroke-linecap="round"/>
  <polygon points="620,400 720,450 620,500" fill="white"/>
  <!-- ICO file icon -->
  <rect x="664" y="300" width="240" height="300" rx="20" fill="white"/>
  <rect x="664" y="300" width="240" height="70" rx="20" fill="#F9A825"/>
  <text x="784" y="350" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
  <text x="784" y="490" font-family="Arial" font-size="28" font-weight="bold" fill="#F9A825" text-anchor="middle">ICO</text>
</svg>