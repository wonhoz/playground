<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000510"/>
      <stop offset="100%" stop-color="#000a1e"/>
    </linearGradient>
    <linearGradient id="inf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large infinity symbol made of numbers -->
  <!-- Left loop -->
  <path d="M256,256 C256,210 210,170 160,170 C110,170 70,210 70,256 C70,302 110,342 160,342 C210,342 256,302 256,256 Z" fill="none" stroke="url(#inf)" stroke-width="18" opacity="0.6"/>
  <!-- Right loop -->
  <path d="M256,256 C256,210 302,170 352,170 C402,170 442,210 442,256 C442,302 402,342 352,342 C302,342 256,302 256,256 Z" fill="none" stroke="url(#inf)" stroke-width="18" opacity="0.6"/>
  <!-- Number digits on the infinity loops -->
  <text x="108" y="220" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">3.14</text>
  <text x="78" y="250" font-family="monospace" font-size="10" fill="#93C5FD" opacity="0.6">÷</text>
  <text x="80" y="278" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">2.72</text>
  <text x="104" y="308" font-family="monospace" font-size="10" fill="#93C5FD" opacity="0.6">×</text>
  <text x="155" y="340" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">∞</text>
  <text x="200" y="320" font-family="monospace" font-size="10" fill="#A78BFA" opacity="0.7">=</text>
  <text x="200" y="200" font-family="monospace" font-size="10" fill="#A78BFA" opacity="0.7">+</text>
  <text x="385" y="220" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">√2</text>
  <text x="412" y="250" font-family="monospace" font-size="10" fill="#93C5FD" opacity="0.6">^n</text>
  <text x="414" y="278" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">lim</text>
  <text x="388" y="308" font-family="monospace" font-size="10" fill="#93C5FD" opacity="0.6">∑</text>
  <text x="302" y="340" font-family="monospace" font-size="10" fill="#60A5FA" opacity="0.7">∞</text>
  <text x="302" y="200" font-family="monospace" font-size="10" fill="#A78BFA" opacity="0.7">-</text>
  <!-- Center point -->
  <circle cx="256" cy="256" r="12" fill="#1e1b4b" stroke="#8B5CF6" stroke-width="2"/>
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4B5FD">∞</text>
  <!-- Title -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="14" fill="#3B82F6" opacity="0.7">∞  CALC</text>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366F1" opacity="0.5">no limits</text>
</svg>
