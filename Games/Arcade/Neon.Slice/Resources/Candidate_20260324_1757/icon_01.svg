<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c_ns01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="glow_c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Dark background -->
  <rect width="1024" height="1024" rx="190" fill="#080812"/>
  <g clip-path="url(#c_ns01)">
    <!-- Grid lines -->
    <line x1="0" y1="256" x2="1024" y2="256" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="#00FFFF" stroke-width="2" opacity="0.12"/>
    <!-- Layer 2: Neon shapes -->
    <!-- Cyan circle (top-left area) -->
    <circle cx="310" cy="340" r="140" fill="url(#glow_c)"/>
    <circle cx="310" cy="340" r="120" fill="#0A2226" stroke="#22D3EE" stroke-width="14"/>
    <circle cx="310" cy="340" r="90" fill="#06182B" stroke="#67E8F9" stroke-width="6"/>
    <!-- Pink triangle (right) -->
    <circle cx="700" cy="380" r="130" fill="url(#glow_p)"/>
    <polygon points="700,260 820,480 580,480" fill="#1A0A14" stroke="#F472B6" stroke-width="14" stroke-linejoin="round"/>
    <!-- Green square (bottom-left) -->
    <circle cx="350" cy="700" r="120" fill="url(#glow_g)"/>
    <rect x="250" y="600" width="200" height="200" rx="22" fill="#0A1A0A" stroke="#4ADE80" stroke-width="14" transform="rotate(15 350 700)"/>
    <!-- Layer 3: Slice trail (diagonal white line) -->
    <line x1="160" y1="800" x2="864" y2="224" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <line x1="160" y1="800" x2="864" y2="224" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <!-- Slice particles -->
    <circle cx="310" cy="560" r="16" fill="#22D3EE" opacity="0.9"/>
    <circle cx="440" cy="480" r="12" fill="#F472B6" opacity="0.9"/>
    <circle cx="580" cy="400" r="14" fill="#4ADE80" opacity="0.9"/>
    <circle cx="700" cy="330" r="10" fill="#FCD34D" opacity="0.9"/>
    <circle cx="260" cy="640" r="8" fill="#22D3EE" opacity="0.7"/>
    <circle cx="760" cy="290" r="8" fill="#F472B6" opacity="0.7"/>
  </g>
</svg>
