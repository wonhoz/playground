  <!-- 상단 라벨 -->
  <rect x="222" y="100" width="580" height="130" rx="40" fill="#3E2723"/>
  <text x="512" y="192" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#FFD93D" text-anchor="middle">→ CLAUDE</text>
