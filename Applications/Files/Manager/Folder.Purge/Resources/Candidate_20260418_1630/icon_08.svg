    <!-- 삭제(레드) -->
    <rect x="696" y="140" width="240" height="200" rx="20" fill="#C62828"/>
    <rect x="696" y="112" width="130" height="38" rx="12" fill="#C62828"/>
    <text x="816" y="246" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📁</text>
    <text x="816" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle" fill="#FFCDD2" font-weight="700">obj</text>
    <line x1="760" y1="162" x2="832" y2="234" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <line x1="832" y1="162" x2="760" y2="234" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

