<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 정원사 손 — 식물을 돌보는 따뜻한 손길 | 실루엣 | #FFF5E8 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF5E8"/>
  <!-- Layer 2: Gardener hand holding/tending plant -->
  <!-- Soil pot (terracotta) -->
  <path d="M 350 760 L 370 680 L 654 680 L 674 760 Z" fill="#CC6633" stroke="#AA4422" stroke-width="4"/>
  <!-- Pot rim -->
  <rect x="340" y="668" width="344" height="24" rx="6" fill="#DD7744" stroke="#AA4422" stroke-width="3"/>
  <!-- Soil in pot -->
  <ellipse cx="512" cy="680" rx="160" ry="16" fill="#4A2800" stroke="#3A1800" stroke-width="2"/>
  <!-- Plant stem and leaves growing from pot -->
  <!-- Main stem -->
  <path d="M 512 680 Q 510 620 512 540 Q 514 460 508 380" stroke="#22AA44" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Branch 1 right -->
  <path d="M 516 580 Q 560 550 600 520" stroke="#22AA44" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Leaf on branch 1 -->
  <path d="M 600 520 Q 650 490 640 460 Q 610 470 600 520 Z" fill="#22C55E" stroke="#16A34A" stroke-width="2"/>
  <!-- Branch 2 left -->
  <path d="M 510 500 Q 464 470 428 444" stroke="#22AA44" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Leaf on branch 2 -->
  <path d="M 428 444 Q 378 414 388 384 Q 416 395 428 444 Z" fill="#4ADE80" stroke="#22C55E" stroke-width="2"/>
  <!-- Top leaves (new growth) -->
  <path d="M 508 380 Q 470 340 480 300 Q 506 318 508 380 Z" fill="#86EFAC" stroke="#4ADE80" stroke-width="2"/>
  <path d="M 508 380 Q 550 340 540 300 Q 514 318 508 380 Z" fill="#22C55E" stroke="#16A34A" stroke-width="2"/>
  <!-- Tiny new bud at tip -->
  <circle cx="508" cy="370" r="8" fill="#86EFAC" stroke="#4ADE80" stroke-width="2"/>
  <!-- Layer 3: Gardener hand silhouette (cradling/caring) -->
  <!-- Hand in cupped gesture under the pot, warm tone -->
  <path d="M 310 820 Q 290 800 300 760 L 350 760 L 380 760 Q 380 790 370 820 Z" fill="#D4956A"/>
  <path d="M 714 820 Q 734 800 724 760 L 674 760 L 644 760 Q 644 790 654 820 Z" fill="#D4956A"/>
  <!-- Palm under the pot -->
  <ellipse cx="512" cy="810" rx="200" ry="30" fill="#D4956A"/>
  <!-- Fingers (five) -->
  <!-- Thumb left -->
  <path d="M 316 800 Q 296 790 298 770 Q 306 765 320 775 Q 322 788 316 800 Z" fill="#C8845A"/>
  <!-- Index finger left -->
  <path d="M 360 762 Q 345 740 352 720 Q 362 718 372 732 Q 372 750 360 762 Z" fill="#C8845A"/>
  <!-- Middle finger left-center -->
  <path d="M 400 760 Q 388 738 396 718 Q 406 716 416 730 Q 416 748 400 760 Z" fill="#C8845A"/>
  <!-- Ring finger right-center -->
  <path d="M 620 760 Q 608 738 616 718 Q 626 716 636 730 Q 636 748 620 760 Z" fill="#C8845A"/>
  <!-- Pinky right -->
  <path d="M 660 762 Q 648 744 654 724 Q 664 722 674 736 Q 674 752 660 762 Z" fill="#C8845A"/>
  <!-- Thumb right -->
  <path d="M 708 800 Q 728 790 726 770 Q 718 765 704 775 Q 702 788 708 800 Z" fill="#C8845A"/>
  <!-- Watercan pouring (tool) -->
  <path d="M 760 320 Q 780 300 800 280 Q 820 260 810 240 Q 840 244 850 260 Q 840 310 800 330 Z" fill="#6A8A5A" stroke="#4A6A3A" stroke-width="3"/>
  <!-- Water drops -->
  <ellipse cx="792" cy="350" rx="5" ry="8" fill="#4488FF" opacity="0.8"/>
  <ellipse cx="806" cy="362" rx="4" ry="7" fill="#4488FF" opacity="0.7"/>
  <ellipse cx="776" cy="368" rx="4" ry="7" fill="#4488FF" opacity="0.7"/>
  <ellipse cx="816" cy="374" rx="3" ry="6" fill="#4488FF" opacity="0.6"/>
  <!-- Sunshine rays from top-right -->
  <line x1="870" y1="210" x2="820" y2="270" stroke="#FFD700" stroke-width="3" opacity="0.5" stroke-dasharray="10,6"/>
  <line x1="900" y1="250" x2="848" y2="296" stroke="#FFD700" stroke-width="2" opacity="0.4" stroke-dasharray="8,5"/>
</svg>
