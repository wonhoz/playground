<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <clipPath id="clip02"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <g clip-path="url(#clip02)">
    <!-- 최대 단어 -->
    <text x="512" y="390" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF">Hello</text>
    <!-- 큰 단어들 -->
    <text x="300" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="80" fill="#A7F3D0">World</text>
    <text x="700" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="75" fill="#A7F3D0">Love</text>
    <!-- 중간 단어들 -->
    <text x="200" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="52" fill="#FFFFFF" opacity="0.9">Data</text>
    <text x="490" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#6EE7B7">Text</text>
    <text x="760" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="44" fill="#FFFFFF" opacity="0.85">Cloud</text>
    <!-- 작은 단어들 -->
    <text x="320" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#A7F3D0" opacity="0.8">life</text>
    <text x="490" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#FFFFFF" opacity="0.7">font</text>
    <text x="650" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#A7F3D0" opacity="0.7">art</text>
    <!-- 최소 단어들 -->
    <text x="220" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6EE7B7" opacity="0.6">size</text>
    <text x="430" y="745" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" opacity="0.55">color</text>
    <text x="620" y="738" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#A7F3D0" opacity="0.55">big</text>
    <text x="790" y="744" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6EE7B7" opacity="0.5">time</text>
  </g>
</svg>
