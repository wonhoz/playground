<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: literal | 이미지 프레임 + 2중 업화살표 | 레이어드 | 하늘+연보라+핑크 -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B39DDB"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
    <linearGradient id="skyImg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="arrow06a" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#FF80AB"/>
    </linearGradient>
    <linearGradient id="arrow06b" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
    <filter id="shadow06">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9575CD44"/>
    </filter>
  </defs>

  <!-- Layer 1: 하늘색 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <!-- 배경 장식 원 -->
  <circle cx="800" cy="200" r="180" fill="#E1F5FE" opacity="0.6"/>
  <circle cx="200" cy="800" r="140" fill="#F3E5F5" opacity="0.5"/>

  <!-- Layer 2: 이미지 프레임 (하단) -->
  <rect x="162" y="480" width="700" height="430" rx="28" fill="url(#frameGrad)" filter="url(#shadow06)"/>
  <!-- 이미지 안쪽 내용 -->
  <rect x="186" y="504" width="652" height="382" rx="16" fill="url(#skyImg)"/>
  <!-- 산 실루엣 -->
  <polygon points="186,886 370,620 554,886" fill="#37474F"/>
  <polygon points="400,886 570,680 740,886" fill="#455A64"/>
  <!-- 태양 -->
  <circle cx="700" cy="570" r="55" fill="#FFF176"/>
  <!-- 프레임 상단 바 -->
  <rect x="186" y="504" width="652" height="44" rx="16" fill="#7E57C2"/>
  <!-- 점 3개 (창 버튼 느낌) -->
  <circle cx="220" cy="526" r="10" fill="#EF9A9A" opacity="0.9"/>
  <circle cx="252" cy="526" r="10" fill="#FFF176" opacity="0.9"/>
  <circle cx="284" cy="526" r="10" fill="#A5D6A7" opacity="0.9"/>

  <!-- Layer 3: 2중 업화살표 (상단 중앙) -->
  <!-- 바깥쪽 화살표 (크게, 연한) -->
  <polygon points="512,108 640,270 566,270 566,360 458,360 458,270 384,270"
           fill="url(#arrow06a)" opacity="0.55"/>
  <!-- 안쪽 화살표 (작게, 진하게) — 위에 겹침 -->
  <polygon points="512,168 606,290 554,290 554,360 470,360 470,290 418,290"
           fill="url(#arrow06b)" opacity="0.95"/>

  <!-- × 2 배율 라벨 -->
  <text x="512" y="440" font-family="Arial Black, sans-serif" font-size="88" font-weight="900"
        fill="#7B1FA2" text-anchor="middle" opacity="0.9">× 2  × 4  × 8</text>
</svg>
