<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 에메랄드 -->
  <rect width="1024" height="1024" rx="180" fill="#00251A"/>
  <!-- Layer 2: 잎 패턴 (프랙탈 스타일) -->
  <!-- 큰 잎 (좌) -->
  <ellipse cx="320" cy="512" rx="200" ry="300" fill="#1B5E20" transform="rotate(20,320,512)"/>
  <ellipse cx="320" cy="512" rx="180" ry="280" fill="#2E7D32" transform="rotate(20,320,512)"/>
  <!-- 잎맥 (큰 잎) -->
  <line x1="240" y1="650" x2="400" y2="380" stroke="#43A047" stroke-width="8" stroke-linecap="round"/>
  <line x1="275" y1="580" x2="220" y2="490" stroke="#4CAF50" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="315" y1="530" x2="270" y2="440" stroke="#4CAF50" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- 큰 잎 (우) -->
  <ellipse cx="704" cy="512" rx="200" ry="300" fill="#1A5E20" transform="rotate(-20,704,512)"/>
  <ellipse cx="704" cy="512" rx="180" ry="280" fill="#2E7D32" transform="rotate(-20,704,512)"/>
  <!-- 잎맥 (큰 잎 우) -->
  <line x1="784" y1="650" x2="624" y2="380" stroke="#43A047" stroke-width="8" stroke-linecap="round"/>
  <!-- 작은 잎들 (중앙 상하) -->
  <ellipse cx="512" cy="280" rx="80" ry="120" fill="#388E3C" transform="rotate(10,512,280)"/>
  <ellipse cx="512" cy="744" rx="80" ry="120" fill="#388E3C" transform="rotate(-10,512,744)"/>
  <!-- 가운데 새싹 -->
  <line x1="512" y1="840" x2="512" y2="200" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="960" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#A5D6A7" text-anchor="middle">LEAF.GROW</text>
</svg>
