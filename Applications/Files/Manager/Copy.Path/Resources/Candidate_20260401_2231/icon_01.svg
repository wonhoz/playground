<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01copypath" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DD0E1"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg01copypath)"/>

  <!-- Layer 2: Path format result list -->
  <!-- Input path box -->
  <rect x="88" y="88" width="848" height="80" rx="18" fill="white" opacity="0.95"/>
  <text x="140" y="143" font-family="'Courier New',monospace" font-size="48" fill="#00695C">C:\folder\file.txt</text>

  <!-- Result rows -->
  <rect x="88" y="188" width="848" height="68" rx="12" fill="white" opacity="0.88"/>
  <text x="140" y="234" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#888">전체 (백슬래시)</text>
  <text x="836" y="234" font-size="40" text-anchor="middle">📋</text>

  <rect x="88" y="268" width="848" height="68" rx="12" fill="white" opacity="0.88"/>
  <text x="140" y="314" font-family="'Courier New',monospace" font-size="48" font-weight="bold" fill="#0277BD">C:/folder/file.txt</text>

  <rect x="88" y="348" width="848" height="68" rx="12" fill="white" opacity="0.85"/>
  <text x="140" y="394" font-family="'Courier New',monospace" font-size="48" font-weight="bold" fill="#2E7D32">file.txt</text>

  <rect x="88" y="428" width="848" height="68" rx="12" fill="white" opacity="0.82"/>
  <text x="140" y="474" font-family="'Courier New',monospace" font-size="40" font-weight="bold" fill="#880E4F">C:\\folder\\file.txt</text>

  <rect x="88" y="508" width="848" height="68" rx="12" fill="white" opacity="0.8"/>
  <text x="140" y="554" font-family="'Courier New',monospace" font-size="38" font-weight="bold" fill="#E65100">file:///C:/folder/file.txt</text>

  <rect x="88" y="588" width="848" height="68" rx="12" fill="white" opacity="0.78"/>
  <text x="140" y="634" font-family="'Courier New',monospace" font-size="48" font-weight="bold" fill="#4A148C">/c/folder/file.txt</text>

  <!-- Layer 3: App label + copy badge -->
  <rect x="88" y="700" width="848" height="96" rx="24" fill="white" opacity="0.15"/>
  <text x="512" y="761" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="bold"
    fill="white" text-anchor="middle" letter-spacing="4">COPY · PATH</text>

  <!-- "9 formats" badge -->
  <circle cx="880" cy="800" r="96" fill="white" opacity="0.9"/>
  <text x="880" y="790" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold"
    fill="#00695C" text-anchor="middle">9</text>
  <text x="880" y="848" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#00695C"
    text-anchor="middle">fmts</text>
</svg>
