<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="hp-bg-clip-01">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="hp-bg-grad-01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="glow-01">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#hp-bg-grad-01)"/>
  <g clip-path="url(#hp-bg-clip-01)">
    <!-- 스캔라인 배경 효과 -->
    <rect x="0" y="240" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="280" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="320" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="360" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="400" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="440" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="480" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="520" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="560" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="600" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="640" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="680" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="720" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <rect x="0" y="760" width="1024" height="2" fill="#0A2A0A" opacity="0.8"/>
    <!-- "FF" 메인 텍스트 (네온 그린) -->
    <!-- F 왼쪽 -->
    <rect x="148" y="280" width="58" height="460" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <rect x="148" y="280" width="240" height="58" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <rect x="148" y="468" width="200" height="52" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <!-- F 오른쪽 -->
    <rect x="448" y="280" width="58" height="460" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <rect x="448" y="280" width="240" height="58" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <rect x="448" y="468" width="200" height="52" rx="12" fill="#00FF66" filter="url(#glow-01)"/>
    <!-- 글로우 효과 추가 레이어 -->
    <rect x="148" y="280" width="58" height="460" rx="12" fill="#00FF66" opacity="0.3"/>
    <rect x="448" y="280" width="58" height="460" rx="12" fill="#00FF66" opacity="0.3"/>
    <!-- 하단 헥스 바이트 표시 -->
    <rect x="230" y="800" width="100" height="34" rx="8" fill="#003A18"/>
    <rect x="348" y="800" width="100" height="34" rx="8" fill="#003A18"/>
    <rect x="466" y="800" width="100" height="34" rx="8" fill="#003A18"/>
    <rect x="584" y="800" width="100" height="34" rx="8" fill="#003A18"/>
    <rect x="702" y="800" width="100" height="34" rx="8" fill="#003A18"/>
    <!-- 바이트 텍스트 - 간략히 직사각형으로 표현 -->
    <rect x="248" y="808" width="64" height="18" rx="4" fill="#00BB44" opacity="0.8"/>
    <rect x="366" y="808" width="64" height="18" rx="4" fill="#00BB44" opacity="0.6"/>
    <rect x="484" y="808" width="64" height="18" rx="4" fill="#00BB44" opacity="0.6"/>
    <rect x="602" y="808" width="64" height="18" rx="4" fill="#00BB44" opacity="0.6"/>
    <rect x="720" y="808" width="64" height="18" rx="4" fill="#00BB44" opacity="0.6"/>
    <!-- 커서 블링크 라인 -->
    <rect x="710" y="280" width="6" height="460" rx="3" fill="#00FF66" opacity="0.7"/>
  </g>
</svg>
