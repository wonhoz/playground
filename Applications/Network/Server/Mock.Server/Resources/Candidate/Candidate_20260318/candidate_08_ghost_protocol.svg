<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 유령 형태 -->
  <path d="M 180 380 L 180 240 Q 180 130 256 130 Q 332 130 332 240 L 332 380 Q 320 370 308 380 Q 296 390 284 380 Q 272 370 256 380 Q 240 390 228 380 Q 216 370 204 380 Q 192 390 180 380 Z" fill="#EC4899" opacity="0.1"/>
  <path d="M 180 380 L 180 240 Q 180 130 256 130 Q 332 130 332 240 L 332 380 Q 320 370 308 380 Q 296 390 284 380 Q 272 370 256 380 Q 240 390 228 380 Q 216 370 204 380 Q 192 390 180 380 Z" fill="none" stroke="#EC4899" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 유령 눈 (포트들) -->
  <circle cx="224" cy="240" r="18" fill="#EC4899" opacity="0.2"/>
  <circle cx="288" cy="240" r="18" fill="#EC4899" opacity="0.2"/>
  <circle cx="224" cy="240" r="10" fill="#EC4899" opacity="0.8" filter="url(#glow)"/>
  <circle cx="288" cy="240" r="10" fill="#EC4899" opacity="0.8" filter="url(#glow)"/>
  <circle cx="222" cy="238" r="4" fill="white" opacity="0.5"/>
  <circle cx="286" cy="238" r="4" fill="white" opacity="0.5"/>
  <!-- 유령 입 (코드) -->
  <path d="M 224 290 Q 240 305 256 295 Q 272 283 288 290" fill="none" stroke="#F472B6" stroke-width="2" filter="url(#glow)"/>
  <!-- 파동 장식들 -->
  <path d="M 140 350 Q 150 340 160 350 Q 170 360 180 350" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.4"/>
  <path d="M 332 350 Q 342 340 352 350 Q 362 360 372 350" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.4"/>
  <!-- MOCK 텍스트 -->
  <text x="256" y="440" text-anchor="middle" fill="#EC4899" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">GHOST PROTOCOL</text>
</svg>