<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 예약 스크린샷 -->
  <!-- 시계 (중앙 상단) -->
  <circle cx="256" cy="175" r="90" fill="#060d16" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <circle cx="256" cy="175" r="78" fill="#040c14" stroke="#38BDF8" stroke-width="1" opacity="0.6"/>
  <!-- 시계 눈금 -->
  <line x1="256" y1="98" x2="256" y2="108" stroke="#38BDF8" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="242" x2="256" y2="252" stroke="#38BDF8" stroke-width="2" opacity="0.8"/>
  <line x1="169" y1="175" x2="179" y2="175" stroke="#38BDF8" stroke-width="2" opacity="0.8"/>
  <line x1="333" y1="175" x2="343" y2="175" stroke="#38BDF8" stroke-width="2" opacity="0.8"/>
  <!-- 시간 숫자 -->
  <text x="256" y="113" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.7">12</text>
  <text x="338" y="179" text-anchor="start" font-size="10" fill="#38BDF8" opacity="0.7">3</text>
  <text x="253" y="249" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.7">6</text>
  <text x="170" y="179" text-anchor="end" font-size="10" fill="#38BDF8" opacity="0.7">9</text>
  <!-- 시침 (오전 9시) -->
  <line x1="256" y1="175" x2="216" y2="145" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <!-- 분침 (00분) -->
  <line x1="256" y1="175" x2="256" y2="112" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <!-- 초침 -->
  <line x1="256" y1="175" x2="290" y2="135" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- 중심점 -->
  <circle cx="256" cy="175" r="5" fill="#38BDF8" filter="url(#glow)" opacity="0.9"/>
  <!-- 알람 마크 -->
  <circle cx="256" cy="85" r="8" fill="#FDE047" opacity="0.8" filter="url(#glow)"/>
  <text x="256" y="89" text-anchor="middle" font-size="8" fill="#030508" font-weight="bold">!</text>
  <!-- 예약 목록 -->
  <rect x="60" y="295" width="392" height="170" rx="10" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">SCHEDULED CAPTURES</text>
  <line x1="60" y1="326" x2="452" y2="326" stroke="#1a3a50" stroke-width="1" opacity="0.5"/>
  <!-- 예약 항목들 -->
  <circle cx="82" cy="345" r="7" fill="#4ADE80" opacity="0.8"/>
  <text x="96" y="349" font-size="10" fill="#38BDF8" opacity="0.9">09:00 Daily</text>
  <text x="96" y="362" font-size="9" fill="#888" opacity="0.7">example.com — Every day</text>
  <rect x="360" y="336" width="76" height="18" rx="4" fill="#38BDF8" opacity="0.3"/>
  <text x="398" y="348" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.9">Active</text>
  <line x1="72" y1="374" x2="440" y2="374" stroke="#1a3a50" stroke-width="0.8" opacity="0.4"/>
  <circle cx="82" cy="385" r="7" fill="#FDE047" opacity="0.8"/>
  <text x="96" y="389" font-size="10" fill="#38BDF8" opacity="0.8">14:30 Weekly</text>
  <text x="96" y="402" font-size="9" fill="#888" opacity="0.7">docs.site.io — Mon,Wed,Fri</text>
  <rect x="360" y="376" width="76" height="18" rx="4" fill="#FDE047" opacity="0.2"/>
  <text x="398" y="388" text-anchor="middle" font-size="9" fill="#FDE047" opacity="0.9">Paused</text>
  <line x1="72" y1="414" x2="440" y2="414" stroke="#1a3a50" stroke-width="0.8" opacity="0.4"/>
  <circle cx="82" cy="425" r="7" fill="#888" opacity="0.5"/>
  <text x="96" y="429" font-size="10" fill="#888" opacity="0.7">00:00 Monthly</text>
  <text x="96" y="442" font-size="9" fill="#888" opacity="0.6">shop.example.org — 1st day</text>
  <text x="256" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.8">SCHEDULED SHOT</text>
</svg>
