<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 금속 주형 프레스 — ICO 형태를 찍어내는 주형 | 중앙심볼 | #2A1A0A -->
  <defs>
    <linearGradient id="metalGrad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="50%" stop-color="#CCCCCC"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
    <linearGradient id="stampGrad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AA8800"/>
      <stop offset="100%" stop-color="#664400"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#2A1A0A"/>
  <!-- Layer 2: Metal press/stamp machine -->
  <!-- Press arm (raised) -->
  <rect x="380" y="200" width="264" height="60" rx="8" fill="url(#metalGrad8)" stroke="#888888" stroke-width="4"/>
  <!-- Press piston -->
  <rect x="466" y="260" width="92" height="120" rx="6" fill="#999999" stroke="#777777" stroke-width="3"/>
  <!-- Piston stripes -->
  <line x1="466" y1="290" x2="558" y2="290" stroke="#888888" stroke-width="3"/>
  <line x1="466" y1="315" x2="558" y2="315" stroke="#888888" stroke-width="3"/>
  <line x1="466" y1="340" x2="558" y2="340" stroke="#888888" stroke-width="3"/>
  <!-- Stamp head (bottom of press) -->
  <rect x="440" y="380" width="144" height="60" rx="8" fill="url(#stampGrad8)" stroke="#AA8800" stroke-width="4"/>
  <!-- ICO shape engraved on stamp face -->
  <rect x="462" y="398" width="100" height="24" rx="3" fill="#442200"/>
  <text x="512" y="416" font-family="monospace" font-size="14" fill="#CC8800" text-anchor="middle" font-weight="bold">.ICO</text>
  <!-- Work surface / base plate -->
  <rect x="280" y="620" width="464" height="40" rx="8" fill="url(#metalGrad8)" stroke="#888888" stroke-width="4"/>
  <!-- Material blank (being stamped) -->
  <rect x="340" y="540" width="344" height="80" rx="4" fill="#CC8800" stroke="#884400" stroke-width="3"/>
  <!-- Arrow showing press coming down -->
  <line x1="512" y1="440" x2="512" y2="530" stroke="#FFDD00" stroke-width="6" stroke-dasharray="12,8" stroke-linecap="round"/>
  <polygon points="492,530 532,530 512,560" fill="#FFDD00"/>
  <!-- Output ICO stamps on right side -->
  <!-- Finished ICO 1 -->
  <rect x="760" y="400" width="80" height="100" rx="6" fill="#AA6600" stroke="#FFAA22" stroke-width="3"/>
  <polygon points="800,400 840,400 840,424 812,424" fill="#884400"/>
  <polygon points="800,400 840,424 812,424" fill="#FFAA22"/>
  <text x="800" y="490" font-family="monospace" font-size="12" fill="#FFCC44" text-anchor="middle" font-weight="bold">.ICO</text>
  <!-- Finished ICO 2 (stacked) -->
  <rect x="745" y="390" width="80" height="100" rx="6" fill="#996000" stroke="#EE9920" stroke-width="2" opacity="0.8"/>
  <rect x="730" y="380" width="80" height="100" rx="6" fill="#885500" stroke="#DD8810" stroke-width="2" opacity="0.6"/>
  <!-- Layer 3: Ejected sparks from stamping -->
  <circle cx="480" cy="530" r="6" fill="#FFDD00" opacity="0.8"/>
  <circle cx="544" cy="545" r="5" fill="#FF8800" opacity="0.7"/>
  <circle cx="460" cy="560" r="4" fill="#FFDD00" opacity="0.6"/>
  <circle cx="560" cy="535" r="5" fill="#FF4400" opacity="0.8"/>
  <!-- Production count -->
  <rect x="280" y="780" width="200" height="50" rx="8" fill="#1A0C00" stroke="#AA6600" stroke-width="2"/>
  <text x="380" y="811" font-family="monospace" font-size="14" fill="#FFAA22" text-anchor="middle">생산량: 48 ICO</text>
</svg>
