<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="gaugeGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="gaugeOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gauge arc background -->
  <path d="M 80 340 A 176 176 0 0 1 432 340" fill="none" stroke="#292524" stroke-width="36" stroke-linecap="round"/>
  <!-- Gauge fill (72%) -->
  <path d="M 80 340 A 176 176 0 0 1 432 340" fill="none" stroke="#374151" stroke-width="36" stroke-linecap="round"/>
  <!-- Green zone (0-60%) -->
  <path d="M 80 340 A 176 176 0 0 1 291 134" fill="none" stroke="url(#gaugeGreen)" stroke-width="36" stroke-linecap="round"/>
  <!-- Orange zone (60-72%) -->
  <path d="M 291 134 A 176 176 0 0 1 366 152" fill="none" stroke="url(#gaugeOrange)" stroke-width="36" stroke-linecap="round"/>
  <!-- Tick marks -->
  <g stroke="#6B7280" stroke-width="2" stroke-linecap="round">
    <line x1="80" y1="340" x2="100" y2="340"/>
    <line x1="432" y1="340" x2="412" y2="340"/>
    <line x1="256" y1="164" x2="256" y2="184"/>
  </g>
  <!-- Needle -->
  <line x1="256" y1="340" x2="350" y2="165" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="340" r="16" fill="#F97316"/>
  <circle cx="256" cy="340" r="8" fill="#1C0A00"/>
  <!-- Center value display -->
  <text x="256" y="290" font-family="Arial" font-size="52" fill="white" text-anchor="middle" font-weight="bold">72%</text>
  <text x="256" y="320" font-family="Arial" font-size="16" fill="#9CA3AF" text-anchor="middle">MEMORY USED</text>
  <!-- Labels -->
  <text x="66" y="376" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">0</text>
  <text x="446" y="376" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">100</text>
  <!-- Bottom stats -->
  <rect x="100" y="395" width="140" height="48" rx="8" fill="#292524" opacity="0.7"/>
  <text x="170" y="415" font-family="Arial" font-size="12" fill="#9CA3AF" text-anchor="middle">USED</text>
  <text x="170" y="434" font-family="Arial" font-size="16" fill="#F97316" text-anchor="middle" font-weight="bold">23.0 GB</text>
  <rect x="272" y="395" width="140" height="48" rx="8" fill="#292524" opacity="0.7"/>
  <text x="342" y="415" font-family="Arial" font-size="12" fill="#9CA3AF" text-anchor="middle">FREE</text>
  <text x="342" y="434" font-family="Arial" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="bold">9.0 GB</text>
</svg>
