<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document stack (3 pages) -->
  <rect x="170" y="130" width="200" height="260" rx="8" fill="#DDDDDD"/>
  <rect x="155" y="120" width="200" height="260" rx="8" fill="#EEEEEE"/>
  <rect x="140" y="110" width="200" height="260" rx="8" fill="url(#page)"/>
  <!-- Corner fold -->
  <polygon points="280,110 340,110 340,170 280,110" fill="#EEEEEE"/>
  <polygon points="280,110 340,170 280,170" fill="#D8D8D8"/>
  <!-- Bold PDF badge -->
  <rect x="100" y="310" width="140" height="80" rx="12" fill="#CC0000" stroke="#FFFFFF" stroke-width="4"/>
  <text x="170" y="362" font-family="sans-serif" font-size="38" fill="#FFFFFF" text-anchor="middle" font-weight="900">PDF</text>
  <!-- Document lines -->
  <rect x="158" y="145" width="104" height="7" rx="3.5" fill="#888888"/>
  <rect x="158" y="163" width="140" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="175" width="130" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="187" width="145" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="199" width="120" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="220" width="140" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="232" width="100" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="244" width="130" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="268" width="120" height="5" rx="2.5" fill="#BBBBBB"/>
  <rect x="158" y="280" width="140" height="5" rx="2.5" fill="#BBBBBB"/>
  <!-- Forge icon - small hammer -->
  <rect x="290" y="360" width="50" height="28" rx="6" fill="#FFFFFF" opacity="0.9"/>
  <rect x="308" y="388" width="14" height="30" rx="7" fill="#FFFFFF" opacity="0.8"/>
  <text x="315" y="346" font-family="sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">FORGE</text>
</svg>
