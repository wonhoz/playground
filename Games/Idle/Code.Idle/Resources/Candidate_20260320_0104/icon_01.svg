<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Tree trunk -->
  <rect x="480" y="680" width="64" height="180" rx="16" fill="#1B5E20"/>
  <!-- Branches -->
  <line x1="512" y1="700" x2="380" y2="580" stroke="#1B5E20" stroke-width="24" stroke-linecap="round"/>
  <line x1="512" y1="660" x2="640" y2="540" stroke="#1B5E20" stroke-width="22" stroke-linecap="round"/>
  <line x1="512" y1="620" x2="320" y2="480" stroke="#1B5E20" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="580" x2="700" y2="440" stroke="#1B5E20" stroke-width="18" stroke-linecap="round"/>
  <!-- Code leaves -->
  <rect x="340" y="520" width="90" height="40" rx="6" fill="#A5D6A7"/>
  <rect x="640" y="470" width="90" height="40" rx="6" fill="#66BB6A"/>
  <rect x="260" y="420" width="90" height="40" rx="6" fill="#A5D6A7" fill-opacity="0.8"/>
  <rect x="700" y="370" width="90" height="40" rx="6" fill="#66BB6A" fill-opacity="0.8"/>
  <!-- Top code block (crown) -->
  <rect x="400" y="280" width="224" height="200" rx="20" fill="#1B5E20" fill-opacity="0.7"/>
  <rect x="420" y="310" width="140" height="18" rx="6" fill="#A5D6A7"/>
  <rect x="420" y="348" width="100" height="18" rx="6" fill="#66BB6A"/>
  <rect x="420" y="386" width="160" height="18" rx="6" fill="#A5D6A7" fill-opacity="0.7"/>
  <rect x="420" y="424" width="80" height="18" rx="6" fill="#66BB6A" fill-opacity="0.7"/>
</svg>