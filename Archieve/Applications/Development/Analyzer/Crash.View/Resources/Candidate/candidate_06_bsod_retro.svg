<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0000AA"/>
      <stop offset="100%" stop-color="#0000CC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- BSOD style screen -->
  <rect x="60" y="80" width="392" height="352" rx="8" fill="#0000AA"/>
  <!-- Header bar -->
  <rect x="60" y="80" width="392" height="28" rx="8" fill="#AAAAAA"/>
  <rect x="60" y="98" width="392" height="10" fill="#AAAAAA"/>
  <text x="256" y="99" text-anchor="middle" font-family="monospace" font-size="13" fill="#0000AA">Windows</text>
  <!-- BSOD text -->
  <text x="90" y="148" font-family="monospace" font-size="13" fill="white">A problem has been detected and</text>
  <text x="90" y="166" font-family="monospace" font-size="13" fill="white">Windows has been shut down to</text>
  <text x="90" y="184" font-family="monospace" font-size="13" fill="white">prevent damage to your computer.</text>
  <text x="90" y="218" font-family="monospace" font-size="14" fill="white">IRQL_NOT_LESS_OR_EQUAL</text>
  <text x="90" y="252" font-family="monospace" font-size="11" fill="white">If this is the first time you've seen this</text>
  <text x="90" y="268" font-family="monospace" font-size="11" fill="white">stop error screen, restart your computer.</text>
  <text x="90" y="302" font-family="monospace" font-size="11" fill="white">Technical information:</text>
  <text x="90" y="322" font-family="monospace" font-size="12" fill="white">*** STOP: 0x0000000A</text>
  <text x="90" y="338" font-family="monospace" font-size="12" fill="white">(0x00000001,0x00000002,</text>
  <text x="90" y="354" font-family="monospace" font-size="12" fill="white"> 0x00000001,0x00000000)</text>
  <!-- Sad face -->
  <text x="380" y="340" font-size="60" fill="white" opacity="0.8">:(</text>
  <!-- Screen glow/scanlines -->
  <rect x="60" y="80" width="392" height="352" rx="8" fill="none" stroke="#3333FF" stroke-width="2" opacity="0.5"/>
  <!-- Progress bar (analyzing) -->
  <rect x="90" y="415" width="332" height="12" rx="6" fill="#000088"/>
  <rect x="90" y="415" width="200" height="12" rx="6" fill="#FFFFFF" opacity="0.6"/>
  <text x="256" y="445" text-anchor="middle" font-family="monospace" font-size="11" fill="white">Analyzing crash... 60%</text>
</svg>
