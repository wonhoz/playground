<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Folder.Purge — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0C1A2E; font-family: 'Segoe UI', sans-serif; color: #DBEAFE; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #38BDF8; letter-spacing: 2px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #7DD3FC; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #0A1628; border: 2px solid #0284C7; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #38BDF8; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #BAE6FD; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #7DD3FC; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #075985; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>🗂 Folder.Purge</h1>
<p class="subtitle">폴더 정리 도구 (빈폴더·bin/obj·빈파일 탐지/삭제) — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">폴더 빗자루 청소</div>
    <span class="tag literal">literal</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#0EA5E9"></div>
      <div class="swatch" style="background:#FBBF24"></div>
      <div class="swatch" style="background:#D97706"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">폴더 X 표시 → 휴지통</div>
    <span class="tag literal">literal</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#16A34A"></div>
      <div class="swatch" style="background:#FCD34D"></div>
      <div class="swatch" style="background:#EF4444"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">필터 체 — 좋은 것만 통과</div>
    <span class="tag metaphor">metaphor</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#7C3AED"></div>
      <div class="swatch" style="background:#FCD34D"></div>
      <div class="swatch" style="background:#22C55E"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">지우개로 폴더 삭제</div>
    <span class="tag metaphor">metaphor</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#F43F5E"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">번개로 bin/obj 제거</div>
    <span class="tag hybrid">hybrid</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#1A1A2E"></div>
      <div class="swatch" style="background:#FDE047"></div>
      <div class="swatch" style="background:#EF4444"></div>
    </div>
  </div>
</div>
</body>
</html>
