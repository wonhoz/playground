<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 체(거름망) 필터링 | 기하학 | #FED7AA 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF7ED"/>
  <!-- Layer 2: Sieve/filter -->
  <!-- Sieve top rim -->
  <ellipse cx="512" cy="360" rx="300" ry="50" fill="#C2410C"/>
  <!-- Sieve body (trapezoid) -->
  <path d="M212 360 L280 660 L744 660 L812 360 Z" fill="#EA580C" opacity="0.8"/>
  <!-- Sieve mesh (grid holes) -->
  <!-- Horizontal lines -->
  <line x1="224" y1="410" x2="800" y2="410" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="236" y1="460" x2="788" y2="460" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="248" y1="510" x2="776" y2="510" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="260" y1="560" x2="764" y2="560" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="272" y1="610" x2="752" y2="610" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <!-- Vertical lines -->
  <line x1="330" y1="360" x2="298" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="390" y1="360" x2="372" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="450" y1="360" x2="446" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="512" y1="360" x2="512" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="574" y1="360" x2="578" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="634" y1="360" x2="652" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <line x1="694" y1="360" x2="726" y2="660" stroke="#FED7AA" stroke-width="2.5" opacity="0.6"/>
  <!-- Layer 3: Folders above (falling into sieve) -->
  <!-- Empty folder (falling through) -->
  <g transform="translate(500, 220) rotate(10)">
    <path d="M-40,0 L-40,0 L-10,0 L0,-12 L50,-12 L50,0" fill="#DC2626"/>
    <rect x="-40" y="0" width="90" height="60" rx="6" fill="#EF4444"/>
    <text x="5" y="38" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">empty</text>
  </g>
  <!-- Non-empty folder (caught by sieve) - bigger, sitting on rim -->
  <g transform="translate(280, 340) rotate(-5)">
    <path d="M-50,0 L-50,0 L-15,0 L0,-14 L65,-14 L65,0" fill="#D97706"/>
    <rect x="-50" y="0" width="115" height="78" rx="8" fill="#F59E0B"/>
    <text x="7" y="44" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">src/</text>
    <rect x="-30" y="12" width="74" height="48" rx="4" fill="#FDE68A" opacity="0.4"/>
  </g>
  <!-- Filtered particles falling through (tiny dots) -->
  <circle cx="380" cy="720" r="6" fill="#EA580C" opacity="0.6"/>
  <circle cx="440" cy="760" r="5" fill="#DC2626" opacity="0.5"/>
  <circle cx="500" cy="740" r="7" fill="#EF4444" opacity="0.4"/>
  <circle cx="560" cy="780" r="5" fill="#EA580C" opacity="0.5"/>
  <circle cx="620" cy="750" r="6" fill="#DC2626" opacity="0.4"/>
  <!-- Label below: 빈 폴더만 통과 -->
  <text x="512" y="870" font-family="Arial,sans-serif" font-size="22" fill="#EA580C" text-anchor="middle">빈 폴더만 필터링</text>
</svg>
