<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a05"/>
      <stop offset="100%" stop-color="#2a1508"/>
    </linearGradient>
    <linearGradient id="baton" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <linearGradient id="track_bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cc3300"/>
      <stop offset="100%" stop-color="#ee4400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Track ground -->
  <rect x="60" y="360" width="392" height="80" rx="8" fill="url(#track_bg)"/>
  <line x1="60" y1="390" x2="452" y2="390" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="60" y1="420" x2="452" y2="420" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Runner 1 (passing) - left side -->
  <circle cx="160" cy="300" r="20" fill="#f0c080"/>
  <path d="M160 320 L148 360 L158 362 L162 335 L174 355 L184 351 L170 318Z" fill="#cc2020"/>
  <!-- Arm outstretched with baton -->
  <path d="M162 330 L200 315 L202 325 L164 340Z" fill="#cc2020"/>
  <!-- Runner 2 (receiving) - right side -->
  <circle cx="330" cy="295" r="20" fill="#f0c080"/>
  <path d="M330 315 L318 355 L328 357 L332 330 L344 350 L354 346 L340 313Z" fill="#2233cc"/>
  <!-- Receiving arm back -->
  <path d="M328 325 L298 315 L296 305 L326 318Z" fill="#2233cc"/>
  <!-- Baton being passed -->
  <rect x="195" y="312" width="105" height="16" rx="8" fill="url(#baton)" transform="rotate(-5 247 320)"/>
  <!-- Baton ends -->
  <circle cx="200" cy="318" r="10" fill="#ff4400"/>
  <circle cx="296" cy="312" r="10" fill="#ffaa00"/>
  <!-- Motion lines behind runner 1 -->
  <line x1="80" y1="295" x2="130" y2="295" stroke="#ffaa00" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="70" y1="315" x2="128" y2="315" stroke="#ffaa00" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="80" y1="335" x2="132" y2="335" stroke="#ffaa00" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <!-- Motion lines behind runner 2 -->
  <line x1="362" y1="290" x2="420" y2="285" stroke="#4466ff" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="355" y1="308" x2="425" y2="305" stroke="#4466ff" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <!-- Crowd in background -->
  <rect x="80" y="80" width="352" height="120" rx="8" fill="#1a0a05" opacity="0.7"/>
  <ellipse cx="130" cy="115" rx="12" ry="15" fill="#c08060" opacity="0.6"/>
  <ellipse cx="165" cy="120" rx="12" ry="15" fill="#e0a080" opacity="0.6"/>
  <ellipse cx="200" cy="112" rx="11" ry="14" fill="#c08060" opacity="0.5"/>
  <ellipse cx="240" cy="118" rx="12" ry="15" fill="#d0a070" opacity="0.6"/>
  <ellipse cx="278" cy="110" rx="11" ry="13" fill="#c08060" opacity="0.5"/>
  <ellipse cx="315" cy="116" rx="12" ry="15" fill="#e0a080" opacity="0.6"/>
  <ellipse cx="350" cy="112" rx="11" ry="14" fill="#c08060" opacity="0.5"/>
  <ellipse cx="385" cy="118" rx="12" ry="15" fill="#d09070" opacity="0.6"/>
</svg>