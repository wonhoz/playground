<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#064E3B"/>
  <rect x="28" y="28" width="968" height="968" rx="160" fill="#065F46"/>

  <!-- 중앙 URL 입력 영역 (Postman 스타일) -->
  <rect x="100" y="180" width="824" height="80" rx="12" fill="#022C22"/>

  <!-- 메서드 드롭다운 -->
  <rect x="112" y="192" width="120" height="56" rx="8" fill="#059669"/>
  <text x="172" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">GET</text>
  <text x="224" y="224" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#6EE7B7">▼</text>

  <!-- URL 텍스트 -->
  <text x="260" y="220" font-family="'Courier New', monospace" font-size="22" fill="#6EE7B7" dominant-baseline="middle">https://api.example.com/v1/data</text>

  <!-- Send 버튼 -->
  <rect x="810" y="192" width="102" height="56" rx="8" fill="#10B981"/>
  <text x="861" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Send</text>

  <!-- 응답 패널 -->
  <rect x="100" y="290" width="824" height="440" rx="12" fill="#022C22"/>

  <!-- 탭 바 -->
  <rect x="112" y="302" width="120" height="36" rx="6" fill="#059669"/>
  <text x="172" y="322" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Body</text>
  <text x="280" y="322" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#6EE7B7" dominant-baseline="middle">Headers</text>

  <!-- 상태 코드 배지 -->
  <rect x="700" y="302" width="110" height="36" rx="6" fill="#047857"/>
  <text x="755" y="322" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#6EE7B7" text-anchor="middle" dominant-baseline="middle">200 OK</text>

  <!-- JSON 응답 본문 -->
  <line x1="112" y1="348" x2="912" y2="348" stroke="#134E4A" stroke-width="1"/>
  <text x="124" y="384" font-family="'Courier New', monospace" font-size="26" fill="#34D399">{</text>
  <text x="140" y="416" font-family="'Courier New', monospace" font-size="22" fill="#6EE7B7">  "success": <tspan fill="#FCD34D">true</tspan>,</text>
  <text x="140" y="448" font-family="'Courier New', monospace" font-size="22" fill="#6EE7B7">  "data": [</text>
  <text x="156" y="480" font-family="'Courier New', monospace" font-size="22" fill="#A7F3D0">    { "id": <tspan fill="#FCD34D">1</tspan>, "name": <tspan fill="#FCA5A5">"Alice"</tspan> },</text>
  <text x="156" y="512" font-family="'Courier New', monospace" font-size="22" fill="#A7F3D0">    { "id": <tspan fill="#FCD34D">2</tspan>, "name": <tspan fill="#FCA5A5">"Bob"</tspan> }</text>
  <text x="140" y="544" font-family="'Courier New', monospace" font-size="22" fill="#6EE7B7">  ],</text>
  <text x="140" y="576" font-family="'Courier New', monospace" font-size="22" fill="#6EE7B7">  "total": <tspan fill="#FCD34D">2</tspan></text>
  <text x="124" y="608" font-family="'Courier New', monospace" font-size="26" fill="#34D399">}</text>

  <!-- 응답 시간 표시 -->
  <text x="840" y="720" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#6EE7B7" text-anchor="end">143 ms</text>

  <!-- 왼쪽 사이드바 미니 (컬렉션 리스트) -->
  <rect x="100" y="756" width="200" height="30" rx="6" fill="#047857" opacity="0.5"/>
  <text x="200" y="771" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#6EE7B7" text-anchor="middle" dominant-baseline="middle">My Collection</text>

  <rect x="100" y="792" width="200" height="26" rx="6" fill="#022C22" opacity="0.7"/>
  <text x="200" y="806" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#059669" text-anchor="middle" dominant-baseline="middle">+ 새 요청 추가</text>
</svg>
