<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="spotlight10" cx="45%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow10">
      <feDropShadow dx="12" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="clip10">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <circle cx="460" cy="620" r="480" fill="url(#spotlight10)" clip-path="url(#clip10)"/>
  <g clip-path="url(#clip10)">
    <!-- 그라운드 그림자 -->
    <ellipse cx="460" cy="880" rx="140" ry="30" fill="#000000" opacity="0.35"/>

    <!-- Layer 2: 플레이어 캐릭터 실루엣 (회피 자세) -->
    <!-- 전체를 실루엣으로: 짙은 파랑으로 채우고 하이라이트 추가 -->
    <!-- 몸통 기울기 (오른쪽으로 크게 기울어 회피) -->
    <g transform="translate(460, 520) rotate(-20)" filter="url(#shadow10)">
      <!-- 다리 (달리는 자세) -->
      <line x1="0" y1="120" x2="-60" y2="310" stroke="#1E3A8A" stroke-width="54" stroke-linecap="round"/>
      <line x1="0" y1="120" x2="80" y2="290" stroke="#1E3A8A" stroke-width="54" stroke-linecap="round"/>
      <!-- 발 -->
      <ellipse cx="-60" cy="330" rx="40" ry="22" fill="#1E3A8A"/>
      <ellipse cx="80" cy="310" rx="40" ry="22" fill="#1E3A8A"/>
      <!-- 몸통 -->
      <rect x="-50" y="-60" width="100" height="200" rx="30" fill="#1E3A8A"/>
      <!-- 팔 (뻗은 자세) -->
      <line x1="-50" y1="20" x2="-160" y2="-80" stroke="#1E3A8A" stroke-width="46" stroke-linecap="round"/>
      <line x1="50" y1="20" x2="120" y2="100" stroke="#1E3A8A" stroke-width="46" stroke-linecap="round"/>
      <!-- 머리 -->
      <circle cx="0" cy="-120" r="65" fill="#1E3A8A"/>

      <!-- 실루엣 하이라이트 (에지 글로우) -->
      <circle cx="0" cy="-120" r="65" fill="none" stroke="#93C5FD" stroke-width="5" opacity="0.7"/>
      <rect x="-50" y="-60" width="100" height="200" rx="30" fill="none" stroke="#93C5FD" stroke-width="4" opacity="0.5"/>
    </g>

    <!-- Layer 3: 총알들 (회피 방향 반대에서 날아옴) -->
    <!-- 왼쪽에서 날아오는 총알들 -->
    <ellipse cx="200" cy="420" rx="14" ry="26" fill="#FDE68A" transform="rotate(90 200 420)"/>
    <ellipse cx="180" cy="500" rx="14" ry="26" fill="#FDE68A" transform="rotate(90 180 500)"/>
    <ellipse cx="220" cy="580" rx="14" ry="26" fill="#FDE68A" transform="rotate(90 220 580)"/>
    <ellipse cx="160" cy="640" rx="14" ry="26" fill="#FDE68A" transform="rotate(90 160 640)"/>
    <!-- 총알 속도 흔적 -->
    <line x1="140" y1="420" x2="200" y2="420" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="120" y1="500" x2="180" y2="500" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="160" y1="580" x2="220" y2="580" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="100" y1="640" x2="160" y2="640" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <!-- 위에서 내려오는 총알들 -->
    <ellipse cx="620" cy="220" rx="14" ry="26" fill="#93C5FD"/>
    <ellipse cx="720" cy="200" rx="14" ry="26" fill="#93C5FD"/>
    <ellipse cx="820" cy="240" rx="14" ry="26" fill="#93C5FD"/>
    <line x1="620" y1="160" x2="620" y2="220" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="720" y1="140" x2="720" y2="200" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="820" y1="180" x2="820" y2="240" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
