  <line x1="512" y1="466" x2="512" y2="558" stroke="#81C784" stroke-width="4"/>
  <line x1="532" y1="466" x2="532" y2="558" stroke="#81C784" stroke-width="4"/>
  <line x1="466" y1="492" x2="558" y2="492" stroke="#81C784" stroke-width="4"/>
  <line x1="466" y1="512" x2="558" y2="512" stroke="#81C784" stroke-width="4"/>
  <line x1="466" y1="532" x2="558" y2="532" stroke="#81C784" stroke-width="4"/>
  <!-- Lens shine -->
  <circle cx="476" cy="476" r="20" fill="#81C784" opacity="0.25"/>
