<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 창(드롭존) -->
  <rect x="160" y="380" width="704" height="460" rx="28" fill="white" opacity="0.18"/>
  <rect x="160" y="380" width="704" height="460" rx="28" fill="none" stroke="white" stroke-width="8" stroke-dasharray="24 14"/>
  <!-- 드롭 힌트 텍스트 -->
  <text x="512" y="770" font-family="Arial, sans-serif" font-size="52" fill="white" text-anchor="middle" opacity="0.7">Drop here</text>
  <!-- Layer 3: 파일 아이콘 내려오는 중 -->
  <rect x="382" y="190" width="260" height="310" rx="18" fill="white" opacity="0.97"/>
  <polygon points="382,190 642,190 642,270 562,270 562,190" fill="#43A047" opacity="0.4"/>
  <line x1="562" y1="190" x2="642" y2="270" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <text x="512" y="380" font-family="Arial Black, Arial, sans-serif" font-size="70" font-weight="900" fill="#2E7D32" text-anchor="middle">PNG</text>
  <!-- 아래 방향 화살표 (드롭 중) -->
  <line x1="512" y1="510" x2="512" y2="590" stroke="#69F0AE" stroke-width="14" stroke-linecap="round" stroke-dasharray="20 12"/>
  <polygon points="472,570 512,640 552,570" fill="#69F0AE"/>
</svg>
