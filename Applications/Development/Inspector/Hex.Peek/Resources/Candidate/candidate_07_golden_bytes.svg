<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#2a2000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec6e"/>
      <stop offset="100%" stop-color="#d4a800"/>
    </linearGradient>
    <linearGradient id="goldv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File scroll shape -->
  <rect x="120" y="80" width="272" height="352" rx="12" fill="#221a00" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Scroll curls -->
  <ellipse cx="256" cy="80" rx="136" ry="18" fill="#2a2000" stroke="url(#gold)" stroke-width="2"/>
  <ellipse cx="256" cy="432" rx="136" ry="18" fill="#2a2000" stroke="url(#gold)" stroke-width="2"/>
  <!-- Header stripe -->
  <rect x="120" y="98" width="272" height="36" rx="0" fill="#ffd700" opacity="0.1"/>
  <text x="136" y="122" font-family="monospace" font-size="14" fill="#ffd700" opacity="0.8">OFFSET   00 01 02 03 04 05 06 07</text>
  <!-- Separator -->
  <line x1="136" y1="138" x2="376" y2="138" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <!-- Hex rows -->
  <text x="136" y="162" font-family="monospace" font-size="14" fill="#b8860b">00000000</text>
  <text x="220" y="162" font-family="monospace" font-size="14" fill="#ffd700">4D 5A 90 00 03 00 00 00</text>
  <text x="136" y="184" font-family="monospace" font-size="14" fill="#b8860b">00000008</text>
  <text x="220" y="184" font-family="monospace" font-size="14" fill="#ffec6e">04 00 00 00 FF FF 00 00</text>
  <text x="136" y="206" font-family="monospace" font-size="14" fill="#b8860b">00000010</text>
  <text x="220" y="206" font-family="monospace" font-size="14" fill="#ffd700">B8 00 00 00 00 00 00 00</text>
  <!-- Selected row gold glow -->
  <rect x="128" y="212" width="256" height="26" rx="4" fill="#ffd700" opacity="0.18"/>
  <text x="136" y="230" font-family="monospace" font-size="14" fill="#b8860b">00000018</text>
  <text x="220" y="230" font-family="monospace" font-size="14" fill="#ffd700" font-weight="bold">40 00 00 00 00 00 00 00</text>
  <text x="136" y="252" font-family="monospace" font-size="14" fill="#b8860b">00000020</text>
  <text x="220" y="252" font-family="monospace" font-size="14" fill="#ffd700">00 00 00 00 00 00 00 00</text>
  <text x="136" y="274" font-family="monospace" font-size="14" fill="#b8860b">00000028</text>
  <text x="220" y="274" font-family="monospace" font-size="14" fill="#ffec6e">00 00 00 00 00 00 00 00</text>
  <text x="136" y="296" font-family="monospace" font-size="14" fill="#b8860b">00000030</text>
  <text x="220" y="296" font-family="monospace" font-size="14" fill="#ffd700">00 00 00 00 00 00 00 00</text>
  <text x="136" y="318" font-family="monospace" font-size="14" fill="#b8860b">00000038</text>
  <text x="220" y="318" font-family="monospace" font-size="14" fill="#ffec6e">E8 00 00 00 0E 1F BA 0E</text>
  <!-- Separator -->
  <line x1="136" y1="330" x2="376" y2="330" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <!-- Footer stats -->
  <text x="136" y="352" font-family="monospace" font-size="13" fill="#b8860b">Selected: 0x18-0x1F  |  8 bytes</text>
  <text x="136" y="370" font-family="monospace" font-size="13" fill="#b8860b">File: sample.exe  |  512 bytes</text>
  <!-- Magnifier top right -->
  <circle cx="390" cy="108" r="28" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8"/>
  <line x1="410" y1="128" x2="426" y2="144" stroke="#ffd700" stroke-width="5" stroke-linecap="round"/>
  <text x="377" y="115" font-family="monospace" font-size="16" fill="#ffd700" font-weight="bold">FF</text>
</svg>
