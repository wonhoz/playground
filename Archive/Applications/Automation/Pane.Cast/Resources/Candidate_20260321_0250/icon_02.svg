<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark olive green -->
  <rect width="1024" height="1024" rx="190" fill="#0E1806"/>

  <!-- Card 3 (back-right, rotated +24°) -->
  <rect x="382" y="220" width="260" height="380" rx="22"
        fill="#1A2C08" stroke="#558B2F" stroke-width="12"
        transform="rotate(24 512 800)"/>
  <!-- Subtle line on back card -->
  <rect x="410" y="300" width="160" height="14" rx="5" fill="#558B2F" opacity="0.4"
        transform="rotate(24 512 800)"/>

  <!-- Card 2 (back-left, rotated -24°) -->
  <rect x="382" y="220" width="260" height="380" rx="22"
        fill="#1E3408" stroke="#7CB342" stroke-width="12"
        transform="rotate(-24 512 800)"/>
  <rect x="410" y="300" width="160" height="14" rx="5" fill="#7CB342" opacity="0.4"
        transform="rotate(-24 512 800)"/>

  <!-- Card 1 (front, center, upright, brightest) -->
  <rect x="382" y="190" width="260" height="400" rx="22"
        fill="#2A4A10" stroke="#AED581" stroke-width="18"/>

  <!-- ">" prompt arrow on front card (filled polygon, large) -->
  <polygon points="440,348 440,492 556,420" fill="#E040FB"/>

  <!-- Small accent: three horizontal lines at bottom of front card (sessions indicator) -->
  <rect x="410" y="520" width="200" height="12" rx="4" fill="#AED581" opacity="0.5"/>
  <rect x="410" y="546" width="160" height="12" rx="4" fill="#AED581" opacity="0.35"/>
  <rect x="410" y="572" width="120" height="12" rx="4" fill="#AED581" opacity="0.2"/>

  <!-- Magenta badge bottom-right of card (selected indicator) -->
  <circle cx="620" cy="580" r="50" fill="#E040FB" stroke="#FCE4EC" stroke-width="10"/>
  <rect x="600" y="566" width="40" height="12" rx="4" fill="white"/>
  <rect x="600" y="582" width="40" height="12" rx="4" fill="white"/>
</svg>
