<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- DB Table -->
  <rect x="76" y="90" width="360" height="340" rx="12" fill="url(#table)" stroke="#1565C0" stroke-width="3"/>
  <!-- Table header -->
  <rect x="76" y="90" width="360" height="48" rx="12" fill="url(#header)"/>
  <rect x="76" y="114" width="360" height="24" fill="url(#header)"/>
  <g fill="white" opacity="0.9" font-size="1">
    <rect x="100" y="105" width="60" height="12" rx="4" fill="white" opacity="0.8"/>
    <rect x="180" y="105" width="80" height="12" rx="4" fill="white" opacity="0.8"/>
    <rect x="280" y="105" width="50" height="12" rx="4" fill="white" opacity="0.8"/>
    <rect x="350" y="105" width="66" height="12" rx="4" fill="white" opacity="0.8"/>
  </g>
  <!-- Row separator -->
  <line x1="76" y1="138" x2="436" y2="138" stroke="#1565C0" stroke-width="2"/>
  <!-- Column separators -->
  <line x1="174" y1="90" x2="174" y2="430" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <line x1="270" y1="90" x2="270" y2="430" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="90" x2="340" y2="430" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>
  <!-- Data rows -->
  <g fill="url(#cell)" opacity="0.7">
    <!-- Row 1 -->
    <rect x="96" y="152" width="56" height="10" rx="3"/>
    <rect x="190" y="152" width="66" height="10" rx="3" opacity="0.5"/>
    <rect x="286" y="152" width="36" height="10" rx="3"/>
    <rect x="356" y="152" width="56" height="10" rx="3" opacity="0.7"/>
    <!-- Row 2 -->
    <rect x="96" y="182" width="50" height="10" rx="3" opacity="0.6"/>
    <rect x="190" y="182" width="74" height="10" rx="3"/>
    <rect x="286" y="182" width="44" height="10" rx="3" opacity="0.5"/>
    <rect x="356" y="182" width="48" height="10" rx="3"/>
    <!-- Row 3 -->
    <rect x="96" y="212" width="60" height="10" rx="3"/>
    <rect x="190" y="212" width="58" height="10" rx="3" opacity="0.6"/>
    <rect x="286" y="212" width="38" height="10" rx="3"/>
    <rect x="356" y="212" width="60" height="10" rx="3" opacity="0.5"/>
    <!-- Row 4 -->
    <rect x="96" y="242" width="46" height="10" rx="3" opacity="0.5"/>
    <rect x="190" y="242" width="70" height="10" rx="3"/>
    <rect x="286" y="242" width="40" height="10" rx="3" opacity="0.7"/>
    <rect x="356" y="242" width="52" height="10" rx="3"/>
    <!-- Row 5 (mock highlight) -->
    <rect x="76" y="266" width="360" height="32" rx="0" fill="#1565C0" opacity="0.2"/>
    <rect x="96" y="274" width="52" height="10" rx="3" fill="#FF6D00"/>
    <rect x="190" y="274" width="62" height="10" rx="3" fill="#FF8F00"/>
    <rect x="286" y="274" width="34" height="10" rx="3" fill="#FF6D00"/>
    <rect x="356" y="274" width="56" height="10" rx="3" fill="#FF8F00"/>
    <!-- Row 6 -->
    <rect x="96" y="312" width="54" height="10" rx="3" opacity="0.5"/>
    <rect x="190" y="312" width="68" height="10" rx="3"/>
    <rect x="286" y="312" width="42" height="10" rx="3" opacity="0.6"/>
    <rect x="356" y="312" width="50" height="10" rx="3" opacity="0.7"/>
    <!-- Row 7 -->
    <rect x="96" y="342" width="48" height="10" rx="3"/>
    <rect x="190" y="342" width="72" height="10" rx="3" opacity="0.5"/>
    <rect x="286" y="342" width="36" height="10" rx="3"/>
    <rect x="356" y="342" width="58" height="10" rx="3" opacity="0.6"/>
  </g>
  <!-- Mock badge -->
  <rect x="330" y="400" width="96" height="30" rx="12" fill="#FF6D00"/>
  <rect x="344" y="410" width="68" height="10" rx="4" fill="white" opacity="0.9"/>
</svg>
