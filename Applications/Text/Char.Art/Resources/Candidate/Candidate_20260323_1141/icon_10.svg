<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 따뜻한 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0A00"/>
  <!-- Layer 2: 큰 텍스트 아트 얼굴 (ASCII 문자로만 구성된 얼굴) -->
  <!-- 상단 -->
  <text x="112" y="240" font-family="Consolas,monospace" font-size="58" fill="#FF6D00" font-weight="bold">@@@@@@@@@@@@@@</text>
  <!-- 눈썹 -->
  <text x="112" y="308" font-family="Consolas,monospace" font-size="58" fill="#FF8F00" font-weight="bold">@  ###  ###  @</text>
  <!-- 눈 -->
  <text x="112" y="376" font-family="Consolas,monospace" font-size="58" fill="#FFB300" font-weight="bold">@  (@)  (@)  @</text>
  <!-- 코 -->
  <text x="112" y="444" font-family="Consolas,monospace" font-size="58" fill="#FFCC02" font-weight="bold">@    /---\    @</text>
  <!-- 입 -->
  <text x="112" y="512" font-family="Consolas,monospace" font-size="58" fill="#FFD740" font-weight="bold">@   \___/    @</text>
  <!-- 하단 -->
  <text x="112" y="580" font-family="Consolas,monospace" font-size="58" fill="#FF8F00" font-weight="bold">@@@@@@@@@@@@@@</text>
  <!-- Layer 3: 하단 브랜딩 -->
  <rect x="160" y="660" width="704" height="100" rx="14" fill="#2D1500"/>
  <text x="512" y="727" font-family="Consolas,monospace" font-size="56" fill="#FF6D00" text-anchor="middle" font-weight="bold">CHAR.ART</text>
</svg>
