<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DBEEFF"/>
      <stop offset="100%" stop-color="#C0E0FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="250" fill="url(#bg1)"/>
  <!-- Keyboard frame -->
  <rect x="130" y="220" width="764" height="500" rx="40" fill="#FFFFFF" opacity="0.9"/>
  <rect x="130" y="220" width="764" height="500" rx="40" fill="none" stroke="#64B5F6" stroke-width="8"/>
  <!-- Row 1 - File (blue) keys -->
  <rect x="165" y="260" width="100" height="75" rx="10" fill="#3B82F6"/>
  <rect x="280" y="260" width="100" height="75" rx="10" fill="#3B82F6"/>
  <rect x="395" y="260" width="100" height="75" rx="10" fill="#F59E0B"/>
  <rect x="510" y="260" width="100" height="75" rx="10" fill="#8B5CF6"/>
  <rect x="625" y="260" width="100" height="75" rx="10" fill="#10B981"/>
  <rect x="740" y="260" width="125" height="75" rx="10" fill="#06B6D4"/>
  <!-- Row 2 - Edit (orange) keys -->
  <rect x="165" y="353" width="75" height="75" rx="10" fill="#6B7280"/>
  <rect x="256" y="353" width="100" height="75" rx="10" fill="#F59E0B"/>
  <rect x="372" y="353" width="100" height="75" rx="10" fill="#F59E0B"/>
  <rect x="488" y="353" width="100" height="75" rx="10" fill="#10B981"/>
  <rect x="604" y="353" width="100" height="75" rx="10" fill="#8B5CF6"/>
  <rect x="720" y="353" width="145" height="75" rx="10" fill="#3B82F6"/>
  <!-- Row 3 -->
  <rect x="165" y="446" width="140" height="75" rx="10" fill="#6B7280"/>
  <rect x="321" y="446" width="100" height="75" rx="10" fill="#10B981"/>
  <rect x="437" y="446" width="100" height="75" rx="10" fill="#06B6D4"/>
  <rect x="553" y="446" width="100" height="75" rx="10" fill="#F59E0B"/>
  <rect x="669" y="446" width="196" height="75" rx="10" fill="#6B7280"/>
  <!-- Spacebar row -->
  <rect x="165" y="539" width="130" height="75" rx="10" fill="#6B7280"/>
  <rect x="311" y="539" width="400" height="75" rx="10" fill="#E5E7EB"/>
  <rect x="727" y="539" width="138" height="75" rx="10" fill="#6B7280"/>
  <!-- Legend -->
  <rect x="165" y="655" width="28" height="28" rx="4" fill="#3B82F6"/>
  <text x="205" y="677" font-family="Arial,sans-serif" font-size="36" fill="#1E40AF">File</text>
  <rect x="305" y="655" width="28" height="28" rx="4" fill="#F59E0B"/>
  <text x="345" y="677" font-family="Arial,sans-serif" font-size="36" fill="#92400E">Edit</text>
  <rect x="445" y="655" width="28" height="28" rx="4" fill="#8B5CF6"/>
  <text x="485" y="677" font-family="Arial,sans-serif" font-size="36" fill="#5B21B6">View</text>
  <rect x="580" y="655" width="28" height="28" rx="4" fill="#10B981"/>
  <text x="620" y="677" font-family="Arial,sans-serif" font-size="36" fill="#065F46">Run</text>
  <rect x="698" y="655" width="28" height="28" rx="4" fill="#06B6D4"/>
  <text x="738" y="677" font-family="Arial,sans-serif" font-size="36" fill="#0E7490">Nav</text>
