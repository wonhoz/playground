<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (light) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg02cp)"/>

  <!-- Layer 2: Category tabs (horizontal) -->
  <!-- Tab 1: 최근 (teal) -->
  <rect x="60" y="160" width="128" height="56" rx="12" fill="#00BCD4"/>
  <text x="124" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white" text-anchor="middle">🕐</text>

  <!-- Tab 2: 즐겨찾기 (amber) -->
  <rect x="200" y="160" width="128" height="56" rx="12" fill="#FFC107"/>
  <text x="264" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white" text-anchor="middle">⭐</text>

  <!-- Tab 3: 화살표 (blue) — active, taller -->
  <rect x="340" y="140" width="128" height="76" rx="12" fill="#1565C0"/>
  <text x="404" y="194" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white" text-anchor="middle">→</text>

  <!-- Tab 4: 수학 (green) -->
  <rect x="480" y="160" width="128" height="56" rx="12" fill="#2E7D32"/>
  <text x="544" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white" text-anchor="middle">∑</text>

  <!-- Tab 5: 기호 (purple) -->
  <rect x="620" y="160" width="128" height="56" rx="12" fill="#6A1B9A"/>
  <text x="684" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white" text-anchor="middle">©</text>

  <!-- Tab 6: 이모지 (pink) -->
  <rect x="760" y="160" width="128" height="56" rx="12" fill="#E91E63"/>
  <text x="824" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="white" text-anchor="middle">😀</text>

  <!-- Content area -->
  <rect x="60" y="216" width="904" height="560" rx="20" fill="white" stroke="#BBDEFB" stroke-width="4"/>

  <!-- Arrow characters in content -->
  <text x="150" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">→</text>
  <text x="310" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">←</text>
  <text x="470" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">↑</text>
  <text x="630" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">↓</text>
  <text x="790" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">⇒</text>

  <text x="150" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">⇐</text>
  <text x="310" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">↔</text>
  <text x="470" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">⇔</text>
  <text x="630" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">↗</text>
  <text x="790" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">↙</text>

  <!-- Layer 3: "Copy" button at bottom -->
  <rect x="200" y="840" width="624" height="88" rx="44" fill="#1565C0"/>
  <text x="512" y="897" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="bold"
    fill="white" text-anchor="middle">📋 Copy</text>
</svg>
