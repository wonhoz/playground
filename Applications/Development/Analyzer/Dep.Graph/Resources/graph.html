<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0F0F1E; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#graph { width:100vw; height:100vh; }
.node circle { cursor:pointer; stroke-width:2; }
.node text { font-size:11px; fill:#E0E0E0; pointer-events:none; }
.link { stroke:#333355; stroke-opacity:0.8; }
.link.conflict { stroke:#FF4444; stroke-opacity:0.9; stroke-width:2; }
.link.outdated { stroke:#FFAA00; stroke-opacity:0.8; stroke-dasharray:5,3; }
.tooltip {
  position:absolute; background:#1A1A30; border:1px solid #444466;
  border-radius:6px; padding:8px 12px; pointer-events:none; opacity:0;
  transition:opacity .15s; font-size:12px; color:#E0E0E0; max-width:260px;
  line-height:1.5;
}
#legend {
  position:absolute; bottom:14px; left:14px; background:#14142A;
  border:1px solid #333355; border-radius:6px; padding:10px 14px;
  font-size:11px; color:#888888;
}
#legend div { display:flex; align-items:center; gap:6px; margin:3px 0; }
.legend-line { width:24px; height:3px; display:inline-block; border-radius:2px; }
.legend-dashed { width:24px; height:0; display:inline-block; border-bottom:2px dashed #FFAA00; }
#info-bar {
  position:absolute; top:10px; right:14px; background:#14142A;
  border:1px solid #333355; border-radius:6px; padding:6px 12px;
  font-size:11px; color:#666688;
}
</style>
</head>
<body>
<svg id="graph"></svg>
<div class="tooltip" id="tooltip"></div>
<div id="legend">
  <div><span class="legend-line" style="background:#50C8DC"></span> 직접 의존성</div>
  <div><span class="legend-line" style="background:#7777AA"></span> 간접 의존성</div>
  <div><span class="legend-line" style="background:#FF4444"></span> 버전 충돌</div>
  <div><span class="legend-dashed"></span> 구버전</div>
</div>
<div id="info-bar" id="info-bar">노드를 클릭하면 상세 정보가 표시됩니다.</div>

<script>
// D3 v7 CDN 대신 내장 미니멀 포스 시뮬레이션
const W = window.innerWidth, H = window.innerHeight;
const svg = document.getElementById('graph');
svg.setAttribute('width', W);
svg.setAttribute('height', H);

let graphData = { nodes: [], links: [] };
let simulation = null;
let transform = { x: 0, y: 0, k: 1 };
let dragging = null, dragStart = null;
let panStart = null, panOrigin = null;

// 외부에서 그래프 데이터 주입
window.setGraphData = function(data) {
  graphData = data;
  render();
};

function colorForType(type) {
  if (type === 'root') return '#50C8DC';
  if (type === 'direct') return '#7AADFF';
  if (type === 'indirect') return '#7777AA';
  if (type === 'conflict') return '#FF6666';
  return '#888888';
}

function render() {
  svg.innerHTML = '';
  if (!graphData.nodes.length) return;

  // 간단한 포스-레이아웃 (자체 구현)
  const nodes = graphData.nodes.map(n => ({ ...n, x: W/2 + (Math.random()-0.5)*300, y: H/2 + (Math.random()-0.5)*300, vx:0, vy:0 }));
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const links = graphData.links.map(l => ({ ...l, source: nodeMap[l.source], target: nodeMap[l.target] })).filter(l => l.source && l.target);

  // 시뮬레이션
  for (let iter = 0; iter < 300; iter++) {
    // 척력
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const d2 = dx*dx + dy*dy || 1;
        const d = Math.sqrt(d2);
        const f = 8000 / d2;
        nodes[i].vx -= f * dx/d;
        nodes[i].vy -= f * dy/d;
        nodes[j].vx += f * dx/d;
        nodes[j].vy += f * dy/d;
      }
    }
    // 인력 (링크)
    links.forEach(l => {
      const dx = l.target.x - l.source.x;
      const dy = l.target.y - l.source.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      const f = (d - 120) * 0.05;
      l.source.vx += f * dx/d;
      l.source.vy += f * dy/d;
      l.target.vx -= f * dx/d;
      l.target.vy -= f * dy/d;
    });
    // 중심 인력
    nodes.forEach(n => {
      n.vx += (W/2 - n.x) * 0.002;
      n.vy += (H/2 - n.y) * 0.002;
      n.x += n.vx * 0.85;
      n.y += n.vy * 0.85;
      n.vx *= 0.85;
      n.vy *= 0.85;
    });
  }

  const ns = document.createElementNS('http://www.w3.org/2000/svg','g');
  ns.setAttribute('id','scene');
  svg.appendChild(ns);

  // 링크
  links.forEach(l => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', l.source.x); line.setAttribute('y1', l.source.y);
    line.setAttribute('x2', l.target.x); line.setAttribute('y2', l.target.y);
    line.setAttribute('stroke', l.conflict ? '#FF4444' : l.outdated ? '#FFAA00' : '#333355');
    line.setAttribute('stroke-opacity', '0.8');
    line.setAttribute('stroke-width', l.conflict ? 2 : 1);
    if (l.outdated) line.setAttribute('stroke-dasharray','5,3');
    ns.appendChild(line);
  });

  // 노드
  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';

    const r = n.type === 'root' ? 18 : n.type === 'direct' ? 12 : 9;
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('r', r);
    c.setAttribute('cx', n.x); c.setAttribute('cy', n.y);
    c.setAttribute('fill', colorForType(n.type));
    c.setAttribute('stroke', n.conflict ? '#FF4444' : '#222244');
    c.setAttribute('stroke-width', '2');
    g.appendChild(c);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', n.x); label.setAttribute('y', n.y + r + 13);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('font-size','10');
    label.setAttribute('fill','#AAAACC');
    label.textContent = n.label || n.id;
    g.appendChild(label);

    g.addEventListener('mouseenter', (e) => showTooltip(e, n));
    g.addEventListener('mouseleave', () => hideTooltip());
    g.addEventListener('click', () => selectNode(n));
    ns.appendChild(g);
  });

  applyTransform();
}

function applyTransform() {
  const scene = document.getElementById('scene');
  if (scene) scene.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
}

const tooltip = document.getElementById('tooltip');
function showTooltip(e, n) {
  let html = `<b>${n.id}</b><br>`;
  if (n.version) html += `버전: <span style="color:#50C8DC">${n.version}</span><br>`;
  if (n.latestVersion) html += `최신: <span style="color:#A0E080">${n.latestVersion}</span><br>`;
  if (n.conflict) html += `<span style="color:#FF6666">⚠ 버전 충돌</span><br>`;
  if (n.deprecated) html += `<span style="color:#FFAA00">⚠ 더 이상 지원 안 함</span><br>`;
  if (n.type) html += `타입: ${n.type}`;
  tooltip.innerHTML = html;
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
  tooltip.style.opacity = '1';
}
function hideTooltip() { tooltip.style.opacity = '0'; }
function selectNode(n) {
  const bar = document.getElementById('info-bar');
  bar.textContent = `${n.id} ${n.version || ''} — ${n.type || ''}${n.conflict ? ' ⚠ 충돌' : ''}${n.deprecated ? ' ⚠ 구버전' : ''}`;
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage(JSON.stringify({ action:'select', id:n.id, version:n.version }));
  }
}

// 마우스 휠 줌
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  transform.k = Math.max(0.2, Math.min(4, transform.k * delta));
  applyTransform();
}, { passive:false });

// 드래그 패닝
svg.addEventListener('mousedown', e => {
  if (e.button === 0) { panStart = { x: e.clientX, y: e.clientY }; panOrigin = { ...transform }; }
});
svg.addEventListener('mousemove', e => {
  if (panStart) {
    transform.x = panOrigin.x + (e.clientX - panStart.x);
    transform.y = panOrigin.y + (e.clientY - panStart.y);
    applyTransform();
  }
});
svg.addEventListener('mouseup', () => panStart = null);
svg.addEventListener('mouseleave', () => panStart = null);

window.addEventListener('resize', () => {
  svg.setAttribute('width', window.innerWidth);
  svg.setAttribute('height', window.innerHeight);
});
</script>
</body>
</html>
