<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0a0014"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Map grid lines -->
  <line x1="80" y1="150" x2="432" y2="150" stroke="#1a0533" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="230" x2="432" y2="230" stroke="#1a0533" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="310" x2="432" y2="310" stroke="#1a0533" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="390" x2="432" y2="390" stroke="#1a0533" stroke-width="1" opacity="0.6"/>
  <!-- Node: Power On -->
  <circle cx="120" cy="420" r="22" fill="#ff6e40" filter="url(#glow)"/>
  <circle cx="120" cy="420" r="14" fill="#1a0533"/>
  <!-- Node: BIOS -->
  <circle cx="200" cy="360" r="18" fill="#ffd740" filter="url(#glow)"/>
  <!-- Node: Bootloader -->
  <circle cx="280" cy="290" r="20" fill="#69f0ae" filter="url(#glow)"/>
  <!-- Node: Kernel -->
  <circle cx="350" cy="210" r="22" fill="#40c4ff" filter="url(#glow)"/>
  <!-- Node: Desktop -->
  <circle cx="400" cy="130" r="26" fill="#ea80fc" filter="url(#glow)"/>
  <circle cx="400" cy="130" r="16" fill="#1a0533"/>
  <!-- Connection paths -->
  <path d="M120 420 Q150 400 200 360" stroke="#ff6e40" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M200 360 Q232 328 280 290" stroke="#ffd740" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M280 290 Q308 254 350 210" stroke="#69f0ae" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M350 210 Q372 172 400 130" stroke="#40c4ff" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <!-- Branch paths (sub-processes) -->
  <path d="M280 290 Q250 270 220 260 Q190 250 170 255" stroke="#b388ff" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
  <circle cx="170" cy="255" r="10" fill="#b388ff" filter="url(#glow)" opacity="0.7"/>
  <path d="M350 210 Q370 195 380 175 Q390 155 370 145" stroke="#80cbc4" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
  <circle cx="370" cy="145" r="10" fill="#80cbc4" filter="url(#glow)" opacity="0.7"/>
  <!-- Time arrow -->
  <path d="M80 460 L432 460" stroke="#546e7a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <polygon points="432,455 445,460 432,465" fill="#546e7a"/>
</svg>