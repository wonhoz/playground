<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="upArrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg8)"/>

  <!-- Card stack: small→large going up-right -->
  <!-- Card 4 (back, smallest) -->
  <rect x="80" y="540" width="180" height="220" rx="20" fill="#F8BBD0" stroke="#880E4F" stroke-width="12" transform="rotate(-10, 170, 650)"/>
  <rect x="100" y="558" width="140" height="110" rx="10" fill="#FCE4EC" stroke="#880E4F" stroke-width="8" transform="rotate(-10, 170, 650)"/>
  <rect x="100" y="682" width="140" height="36" rx="10" fill="#E91E63" stroke="#880E4F" stroke-width="8" transform="rotate(-10, 170, 650)"/>

  <!-- Card 3 -->
  <rect x="220" y="460" width="240" height="290" rx="22" fill="#C8E6C9" stroke="#1B5E20" stroke-width="12" transform="rotate(-4, 340, 605)"/>
  <rect x="238" y="478" width="204" height="150" rx="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="8" transform="rotate(-4, 340, 605)"/>
  <rect x="238" y="642" width="204" height="48" rx="14" fill="#06D6A0" stroke="#1B5E20" stroke-width="8" transform="rotate(-4, 340, 605)"/>

  <!-- Card 2 -->
  <rect x="380" y="360" width="310" height="370" rx="24" fill="#F8BBD0" stroke="#880E4F" stroke-width="14" transform="rotate(2, 535, 545)"/>
  <rect x="400" y="380" width="270" height="200" rx="14" fill="#FCE4EC" stroke="#880E4F" stroke-width="10" transform="rotate(2, 535, 545)"/>
  <!-- Landscape in card 2 -->
  <polygon points="408,566 464,500 504,530 548,488 578,530 620,490 660,566" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round" transform="rotate(2, 535, 545)"/>
  <rect x="400" y="594" width="270" height="60" rx="16" fill="#06D6A0" stroke="#1B5E20" stroke-width="10" transform="rotate(2, 535, 545)"/>
  <text x="535" y="635" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle" transform="rotate(2, 535, 635)">AFTER</text>

  <!-- Card 1 (front, largest) -->
  <rect x="540" y="220" width="380" height="460" rx="28" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <rect x="560" y="240" width="340" height="260" rx="16" fill="#E8F5E9" stroke="#004D40" stroke-width="12"/>
  <!-- Sharp detailed image -->
  <polygon points="568,488 640,380 700,430 760,360 820,420 880,350 892,488" fill="#06D6A0" stroke="#004D40" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="568,488 640,450 700,470 760,430 820,460 880,420 892,488" fill="#00BFA5" stroke="#004D40" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="856" cy="278" r="40" fill="#FFD93D" stroke="#004D40" stroke-width="10"/>
  <!-- Sparkles (sharp indicator) -->
  <line x1="740" y1="264" x2="740" y2="284" stroke="#004D40" stroke-width="8" stroke-linecap="round"/>
  <line x1="728" y1="274" x2="752" y2="274" stroke="#004D40" stroke-width="8" stroke-linecap="round"/>
  <line x1="730" y1="260" x2="750" y2="288" stroke="#004D40" stroke-width="5" stroke-linecap="round"/>
  <line x1="750" y1="260" x2="730" y2="288" stroke="#004D40" stroke-width="5" stroke-linecap="round"/>
  <!-- 8x badge on front card -->
  <rect x="560" y="498" width="340" height="70" rx="22" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="730" y="549" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">×8 SCALE</text>
  <!-- Resolution text -->
  <rect x="560" y="580" width="340" height="54" rx="18" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="730" y="619" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">AI ENHANCED</text>

  <!-- SCALE UP vertical arrow badge (left side) -->
  <rect x="80" y="200" width="160" height="300" rx="28" fill="url(#upArrow)" stroke="#004D40" stroke-width="14"/>
  <polygon points="56,270 160,160 264,270" fill="#06D6A0" stroke="#004D40" stroke-width="14" stroke-linejoin="round"/>
  <text x="160" y="430" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle" transform="rotate(90, 160, 350)">UP</text>

  <!-- Title -->
  <rect x="162" y="844" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="908" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
