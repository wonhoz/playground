<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0500"/>
<!-- 컨셉: 문 열기 — 열린 문 + 빛 -->
<!-- 빛 방사 -->
<circle cx="512" cy="512" r="300" fill="#FFAB40" opacity="0.08"/>
<circle cx="512" cy="512" r="200" fill="#FFAB40" opacity="0.10"/>
<!-- 문 프레임 -->
<rect x="260" y="240" width="500" height="620" rx="16" fill="none" stroke="#E65100" stroke-width="32"/>
<!-- 열린 문짝 (원근감) -->
<path d="M 420 260 L 740 310 L 740 840 L 420 840 Z" fill="#1A0800"/>
<path d="M 420 260 L 740 310 L 740 840 L 420 840 Z" fill="none" stroke="#E65100" stroke-width="20"/>
<!-- 문 경첩 -->
<rect x="404" y="320" width="32" height="48" rx="6" fill="#FFAB40"/>
<rect x="404" y="680" width="32" height="48" rx="6" fill="#FFAB40"/>
<!-- 문 손잡이 -->
<circle cx="690" cy="560" r="24" fill="#FFAB40"/>
<!-- 빛 광선 (문 틈새) -->
<path d="M 420 260 L 180 180" stroke="#FFAB40" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
<path d="M 420 550 L 160 540" stroke="#FFAB40" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
<path d="M 420 840 L 200 900" stroke="#FFAB40" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
</svg>
