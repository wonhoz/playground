  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimal server icon -->
  <rect x="130" y="155" width="252" height="50" rx="10" fill="url(#accent)"/>
  <rect x="130" y="220" width="252" height="50" rx="10" fill="url(#accent)" opacity="0.8"/>
  <rect x="130" y="285" width="252" height="50" rx="10" fill="url(#accent)" opacity="0.6"/>
