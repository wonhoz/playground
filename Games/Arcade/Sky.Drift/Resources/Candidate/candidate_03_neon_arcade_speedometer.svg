<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="100%" stop-color="#000a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Speedometer arc -->
  <path d="M96 300 A170 170 0 0 1 416 300" fill="none" stroke="#003a50" stroke-width="30"/>
  <path d="M96 300 A170 170 0 0 1 380 175" fill="none" stroke="#00e5ff" stroke-width="30" stroke-linecap="round" filter="url(#neon)" opacity="0.9"/>
  <!-- Speed ticks -->
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(-10 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(20 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(50 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(80 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(110 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(140 256 300)" opacity="0.5"/>
  <line x1="96" y1="300" x2="118" y2="300" stroke="#00e5ff" stroke-width="3" transform="rotate(170 256 300)" opacity="0.5"/>
  <!-- Needle -->
  <line x1="256" y1="300" x2="190" y2="148" stroke="#ff4081" stroke-width="5" stroke-linecap="round" filter="url(#neon)"/>
  <circle cx="256" cy="300" r="18" fill="#000010" stroke="#00e5ff" stroke-width="3"/>
  <circle cx="256" cy="300" r="8" fill="#00e5ff" filter="url(#neon)"/>
  <!-- Speed readout -->
  <text x="256" y="260" font-family="monospace" font-size="42" fill="#00e5ff" text-anchor="middle" font-weight="bold" filter="url(#neon)">847</text>
  <text x="256" y="285" font-family="monospace" font-size="14" fill="#00e5ff" text-anchor="middle" opacity="0.7">km/h  DRIFT</text>
  <!-- Title -->
  <text x="256" y="460" font-family="sans-serif" font-size="26" fill="#00e5ff" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#neon)">SKY.DRIFT</text>
</svg>
