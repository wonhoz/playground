<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="100%" stop-color="#051020"/>
    </linearGradient>
    <linearGradient id="block" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blockchain: linked JSON object blocks -->
  <!-- Block 1 (root) -->
  <rect x="186" y="60" width="140" height="70" rx="8" fill="#0a1535" stroke="#3B82F6" stroke-width="2"/>
  <text x="256" y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#93C5FD">{ root }</text>
  <text x="256" y="96" text-anchor="middle" font-family="monospace" font-size="8" fill="#3B82F6">hash: a1b2</text>
  <text x="256" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#1D4ED8">prev: null</text>
  <!-- Chain link 1→2 left -->
  <line x1="186" y1="95" x2="120" y2="155" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Chain link 1→2 right -->
  <line x1="326" y1="95" x2="392" y2="155" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Block 2 (left child) -->
  <rect x="60" y="155" width="120" height="64" rx="8" fill="#0a1535" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="120" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#93C5FD">{ users }</text>
  <text x="120" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">hash: c3d4</text>
  <text x="120" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">prev: a1b2</text>
  <!-- Block 3 (right child) -->
  <rect x="332" y="155" width="120" height="64" rx="8" fill="#0a1535" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="392" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#93C5FD">[ items ]</text>
  <text x="392" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">hash: e5f6</text>
  <text x="392" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">prev: a1b2</text>
  <!-- Chain links level 2 →3 -->
  <line x1="80" y1="219" x2="80" y2="290" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="150" y1="219" x2="200" y2="290" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="350" y1="219" x2="300" y2="290" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="430" y1="219" x2="430" y2="290" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Level 3 blocks -->
  <rect x="46" y="290" width="68" height="52" rx="6" fill="#051020" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="80" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">"Alice"</text>
  <text x="80" y="322" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">g7h8</text>
  <rect x="170" y="290" width="68" height="52" rx="6" fill="#051020" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="204" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">"Bob"</text>
  <text x="204" y="322" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">i9j0</text>
  <rect x="274" y="290" width="68" height="52" rx="6" fill="#051020" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="308" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">{ obj }</text>
  <text x="308" y="322" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">k1l2</text>
  <rect x="398" y="290" width="68" height="52" rx="6" fill="#051020" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="432" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="#60A5FA">true</text>
  <text x="432" y="322" text-anchor="middle" font-family="monospace" font-size="7" fill="#3B82F6">m3n4</text>
  <!-- Chain icon connectors (small circles on links) -->
  <circle cx="105" cy="127" r="5" fill="#3B82F6" opacity="0.7"/>
  <circle cx="358" cy="127" r="5" fill="#3B82F6" opacity="0.7"/>
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="11" fill="#3B82F6" opacity="0.6">CHAIN NODES</text>
</svg>
