<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0A1E"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon flow lines -->
  <path d="M60 256 Q150 150 256 256 Q362 362 452 256" stroke="#00FF88" stroke-width="4" fill="none" filter="url(#neon)" opacity="0.9"/>
  <path d="M60 256 Q150 320 256 256 Q362 192 452 256" stroke="#0088FF" stroke-width="3" fill="none" filter="url(#neon)" opacity="0.8"/>
  <path d="M60 256 Q256 100 452 256" stroke="#FF0088" stroke-width="2" fill="none" filter="url(#neon)" opacity="0.5"/>
  <!-- Intersection dots -->
  <circle cx="256" cy="256" r="14" fill="#00FF88" filter="url(#neon)"/>
  <circle cx="150" cy="220" r="8" fill="#0088FF" filter="url(#neon)"/>
  <circle cx="362" cy="292" r="8" fill="#FF0088" filter="url(#neon)"/>
  <!-- Grid (dim) -->
  <line x1="60" y1="180" x2="452" y2="180" stroke="#111133" stroke-width="1"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#111133" stroke-width="1"/>
  <line x1="60" y1="330" x2="452" y2="330" stroke="#111133" stroke-width="1"/>
  <line x1="150" y1="100" x2="150" y2="420" stroke="#111133" stroke-width="1"/>
  <line x1="256" y1="100" x2="256" y2="420" stroke="#111133" stroke-width="1"/>
  <line x1="362" y1="100" x2="362" y2="420" stroke="#111133" stroke-width="1"/>
  <!-- Labels -->
  <text x="130" y="440" font-family="monospace" font-size="22" fill="#00FF88" filter="url(#neon)" letter-spacing="2">SIGNAL</text>
  <text x="285" y="440" font-family="monospace" font-size="22" fill="#0088FF" filter="url(#neon)" letter-spacing="2">FLOW</text>
</svg>
