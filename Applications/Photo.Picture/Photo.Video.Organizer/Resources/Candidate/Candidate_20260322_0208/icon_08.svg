<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08 | Hybrid / 중앙 심볼 | 달력 + 사진 + 파일명 마법 변환 -->
  <!-- 컨셉: 달력 날짜가 사진 파일명으로 자동 매핑되는 마법 같은 연결 -->
  <!-- 색조: 딥 퍼플 배경 + 골드 + 핫 코랄 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="#1A0533"/>

  <!-- 별 반짝임 배경 -->
  <g fill="white" opacity="0.4">
    <circle cx="180" cy="180" r="3"/>
    <circle cx="840" cy="200" r="2"/>
    <circle cx="160" cy="820" r="2"/>
    <circle cx="880" cy="860" r="3"/>
    <circle cx="120" cy="500" r="2"/>
    <circle cx="920" cy="480" r="2"/>
    <circle cx="300" cy="120" r="2"/>
    <circle cx="700" cy="900" r="2"/>
  </g>

  <!-- 달력 카드 (좌측) -->
  <rect x="120" y="260" width="300" height="320" rx="20" fill="#2D1B5E" stroke="#7C3AED" stroke-width="6"/>
  <!-- 달력 헤더 -->
  <rect x="120" y="260" width="300" height="64" rx="20" fill="#7C3AED"/>
  <rect x="120" y="300" width="300" height="24" fill="#7C3AED"/>
  <text x="270" y="302" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">March 2024</text>
  <!-- 달력 날짜 그리드 -->
  <g font-family="Arial,sans-serif" font-size="18" fill="#C4B5FD" text-anchor="middle">
    <text x="168" y="362">S</text><text x="210" y="362">M</text><text x="252" y="362">T</text>
    <text x="294" y="362">W</text><text x="336" y="362">T</text><text x="378" y="362">F</text>
    <text x="420" y="362">S</text>
    <!-- 날짜 행 1 -->
    <text x="294" y="400" fill="#EDE9FE">1</text><text x="336" y="400" fill="#EDE9FE">2</text>
    <text x="378" y="400" fill="#EDE9FE">3</text><text x="420" y="400" fill="#EDE9FE">4</text>
    <!-- 날짜 행 2 -->
    <text x="168" y="436" fill="#EDE9FE">5</text><text x="210" y="436" fill="#EDE9FE">6</text>
    <text x="252" y="436" fill="#EDE9FE">7</text><text x="294" y="436" fill="#EDE9FE">8</text>
    <text x="336" y="436" fill="#EDE9FE">9</text><text x="378" y="436" fill="#EDE9FE">10</text>
    <text x="420" y="436" fill="#EDE9FE">11</text>
    <!-- 날짜 행 3 - 15일 강조 -->
    <text x="168" y="472" fill="#EDE9FE">12</text><text x="210" y="472" fill="#EDE9FE">13</text>
    <text x="252" y="472" fill="#EDE9FE">14</text>
    <!-- 15일 강조 원 -->
    <circle cx="294" cy="460" r="22" fill="#F59E0B"/>
    <text x="294" y="468" fill="#1A0533" font-weight="bold">15</text>
    <text x="336" y="472" fill="#EDE9FE">16</text><text x="378" y="472" fill="#EDE9FE">17</text>
    <text x="420" y="472" fill="#EDE9FE">18</text>
    <!-- 날짜 행 4 -->
    <text x="168" y="508" fill="#EDE9FE">19</text><text x="210" y="508" fill="#EDE9FE">20</text>
    <text x="252" y="508" fill="#EDE9FE">21</text><text x="294" y="508" fill="#EDE9FE">22</text>
    <text x="336" y="508" fill="#EDE9FE">23</text><text x="378" y="508" fill="#EDE9FE">24</text>
    <text x="420" y="508" fill="#EDE9FE">25</text>
    <!-- 날짜 행 5 -->
    <text x="168" y="544" fill="#EDE9FE">26</text><text x="210" y="544" fill="#EDE9FE">27</text>
    <text x="252" y="544" fill="#EDE9FE">28</text><text x="294" y="544" fill="#EDE9FE">29</text>
    <text x="336" y="544" fill="#EDE9FE">30</text><text x="378" y="544" fill="#EDE9FE">31</text>
  </g>

  <!-- 골든 연결선 + 마법 파티클 -->
  <g>
    <!-- 연결 곡선 -->
    <path d="M430,460 Q512,400 590,460" stroke="#F59E0B" stroke-width="6" fill="none" stroke-dasharray="12,6" opacity="0.9"/>
    <!-- 파티클들 -->
    <circle cx="470" cy="430" r="5" fill="#F59E0B" opacity="0.8"/>
    <circle cx="512" cy="410" r="7" fill="#FFD700" opacity="0.9"/>
    <circle cx="554" cy="432" r="5" fill="#F59E0B" opacity="0.8"/>
    <!-- 마법봉 -->
    <line x1="490" y1="450" x2="534" y2="406" stroke="#FFD700" stroke-width="5" stroke-linecap="round"/>
    <polygon points="534,406 546,394 522,382" fill="#FFD700"/>
    <!-- 별 반짝이 -->
    <path d="M556,388 L560,378 L564,388 L574,392 L564,396 L560,406 L556,396 L546,392 Z" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- 사진 미리보기 (가운데 위) + EXIF 읽기 표시 -->
  <rect x="420" y="200" width="184" height="140" rx="12" fill="#1A1A3E" stroke="#7C3AED" stroke-width="4"/>
  <!-- 사진 내용 -->
  <rect x="430" y="210" width="164" height="100" fill="#87CEEB" rx="6" opacity="0.7"/>
  <path d="M430 280 Q450 262 470 270 Q490 252 510 264 Q530 246 570 260 L584 260 L584 310 L430 310Z" fill="#4A8A3A" opacity="0.8"/>
  <circle cx="550" cy="240" r="18" fill="#FFD700" opacity="0.9"/>
  <!-- EXIF 뱃지 -->
  <rect x="430" y="320" width="164" height="32" rx="8" fill="#7C3AED" opacity="0.9"/>
  <text x="512" y="342" font-family="Consolas,monospace" font-size="14" fill="#F59E0B" text-anchor="middle" font-weight="bold">EXIF: 2024:03:15</text>

  <!-- 파일명 출력 카드 (우측) -->
  <rect x="614" y="280" width="290" height="340" rx="20" fill="#1A2E0A" stroke="#4ADE80" stroke-width="6"/>
  <!-- 파일 아이콘 -->
  <rect x="634" y="300" width="100" height="124" rx="10" fill="#0F1A07" stroke="#4ADE80" stroke-width="4"/>
  <polygon points="710,300 734,300 734,322 710,322" fill="#0F1A07"/>
  <polygon points="710,300 734,322 710,322" fill="#4ADE80"/>
  <!-- 파일 아이콘 안 사진 -->
  <rect x="644" y="330" width="80" height="54" rx="4" fill="#87CEEB" opacity="0.4"/>
  <path d="M644 362 Q656 350 668 356 Q680 344 700 352 Q710 344 724 350 L724 384 L644 384Z" fill="#4A8A3A" opacity="0.5"/>
  <!-- 새 파일명 텍스트 -->
  <text x="760" y="338" font-family="Consolas,monospace" font-size="15" fill="#4ADE80" font-weight="bold">20240315</text>
  <text x="760" y="360" font-family="Consolas,monospace" font-size="15" fill="#4ADE80" font-weight="bold">_094211</text>
  <text x="760" y="382" font-family="Consolas,monospace" font-size="14" fill="#86EFAC">_001.jpg</text>

  <!-- 복수 파일 리스트 -->
  <g font-family="Consolas,monospace" font-size="13" fill="#86EFAC">
    <text x="634" y="456">20240315_094211_001.jpg</text>
    <text x="634" y="478">20240315_094312_002.jpg</text>
    <text x="634" y="500">20240315_143022_001.mp4</text>
    <text x="634" y="522">20240316_082145_001.jpg</text>
    <text x="634" y="544">20240316_100304_002.heic</text>
    <text x="634" y="566">...</text>
  </g>

  <!-- 완료 배지 -->
  <circle cx="864" cy="310" r="28" fill="#4ADE80"/>
  <path d="M851,310 L860,322 L878,298" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 하단 타이틀 -->
  <rect x="200" y="740" width="624" height="80" rx="16" fill="#2D1B5E" stroke="#7C3AED" stroke-width="3"/>
  <text x="512" y="776" font-family="Arial,sans-serif" font-size="22" fill="#F59E0B" text-anchor="middle" font-weight="bold">Photo · Video Organizer</text>
  <text x="512" y="804" font-family="Arial,sans-serif" font-size="16" fill="#C4B5FD" text-anchor="middle">Rename by EXIF capture date</text>
</svg>
