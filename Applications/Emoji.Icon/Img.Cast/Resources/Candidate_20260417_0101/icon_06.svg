<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: ICO multi-size grid visualization -->
  <!-- Title bar -->
  <rect x="140" y="148" width="744" height="72" rx="12" fill="#26C6DA" opacity="0.9"/>
  <text x="512" y="202" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#0D47A1" text-anchor="middle">ICO Multi-Size</text>

  <!-- 256×256 large tile -->
  <rect x="140" y="236" width="356" height="356" rx="16" fill="#26C6DA" opacity="0.85"/>
  <text x="318" y="356" font-family="Arial Black, sans-serif" font-size="54" font-weight="700" fill="white" text-anchor="middle">256</text>
  <!-- Mountain landscape inside -->
  <circle cx="270" cy="310" r="46" fill="#FFD600"/>
  <path d="M140,380 L220,300 L290,345 L350,280 L496,380 L496,592 L140,592 Z" fill="#1976D2" opacity="0.6"/>

  <!-- 128×128 tile -->
  <rect x="512" y="236" width="180" height="180" rx="12" fill="#4DD0E1" opacity="0.8"/>
  <text x="602" y="316" font-family="Arial Black, sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle">128</text>
  <circle cx="558" cy="268" r="22" fill="#FFD600" opacity="0.8"/>

  <!-- 64×64 tile -->
  <rect x="708" y="236" width="176" height="176" rx="12" fill="#80DEEA" opacity="0.8"/>
  <text x="796" y="316" font-family="Arial Black, sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle">64</text>
  <circle cx="748" cy="268" r="18" fill="#FFD600" opacity="0.8"/>

  <!-- 48×48 tile -->
  <rect x="512" y="432" width="120" height="120" rx="10" fill="#B2EBF2" opacity="0.8"/>
  <text x="572" y="504" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#0D47A1" text-anchor="middle">48</text>

  <!-- 32×32 tile -->
  <rect x="648" y="432" width="112" height="112" rx="10" fill="#E0F7FA" opacity="0.8"/>
  <text x="704" y="501" font-family="Arial Black, sans-serif" font-size="36" font-weight="700" fill="#0D47A1" text-anchor="middle">32</text>

  <!-- 16×16 tile -->
  <rect x="776" y="432" width="108" height="108" rx="10" fill="white" opacity="0.9"/>
  <text x="830" y="497" font-family="Arial Black, sans-serif" font-size="32" font-weight="700" fill="#0D47A1" text-anchor="middle">16</text>

  <!-- Layer 3: Bottom file label -->
  <rect x="140" y="610" width="744" height="180" rx="16" fill="white" opacity="0.12"/>
  <text x="512" y="680" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#26C6DA" text-anchor="middle">app.ico</text>
  <text x="512" y="760" font-family="Arial, sans-serif" font-size="50" fill="white" text-anchor="middle" opacity="0.7">all sizes in one file</text>
</svg>
