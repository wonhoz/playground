  <ellipse cx="256" cy="380" rx="110" ry="100" fill="#261a00"/>

  <!-- 깃털 패턴 - 몸통 -->
  <ellipse cx="220" cy="340" rx="30" ry="20" fill="#2d2000" opacity="0.8"/>
