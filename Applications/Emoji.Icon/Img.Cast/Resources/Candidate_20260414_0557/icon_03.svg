<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="dropzone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Drop zone card -->
  <rect x="80" y="160" width="864" height="500" rx="32" fill="url(#dropzone)" stroke="#1B5E20" stroke-width="16" stroke-dasharray="24,12"/>

  <!-- Drop arrow (down into zone) -->
  <rect x="472" y="185" width="80" height="100" rx="16" fill="#06D6A0" stroke="#1B5E20" stroke-width="12"/>
  <polygon points="420,285 512,380 604,285" fill="#06D6A0" stroke="#1B5E20" stroke-width="12" stroke-linejoin="round"/>

  <!-- Floating file cards (input) -->
  <!-- File 1: PNG -->
  <rect x="110" y="300" width="200" height="240" rx="20" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14" transform="rotate(-8, 210, 420)"/>
  <rect x="130" y="320" width="160" height="120" rx="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="8" transform="rotate(-8, 210, 420)"/>
  <polygon points="150,420 200,360 230,395 260,365 285,420" fill="#06D6A0" stroke="#1B5E20" stroke-width="6" stroke-linejoin="round" transform="rotate(-8, 210, 420)"/>
  <rect x="130" y="455" width="160" height="52" rx="16" fill="#06D6A0" stroke="#1B5E20" stroke-width="10" transform="rotate(-8, 210, 420)"/>
  <text x="210" y="492" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8, 210, 492)">PNG</text>

  <!-- File 2: SVG -->
  <rect x="350" y="270" width="200" height="240" rx="20" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14"/>
  <rect x="370" y="290" width="160" height="120" rx="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="8"/>
  <text x="450" y="370" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#06D6A0" text-anchor="middle">&lt;/&gt;</text>
  <rect x="370" y="425" width="160" height="52" rx="16" fill="#00BFA5" stroke="#1B5E20" stroke-width="10"/>
  <text x="450" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">SVG</text>

  <!-- File 3: JPG -->
  <rect x="580" y="300" width="200" height="240" rx="20" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14" transform="rotate(6, 680, 420)"/>
  <rect x="600" y="320" width="160" height="120" rx="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="8" transform="rotate(6, 680, 420)"/>
  <circle cx="660" cy="360" r="28" fill="#FFD93D" stroke="#1B5E20" stroke-width="6" transform="rotate(6, 680, 420)"/>
  <polygon points="620,420 665,370 695,400 720,380 760,420" fill="#06D6A0" stroke="#1B5E20" stroke-width="6" stroke-linejoin="round" transform="rotate(6, 680, 420)"/>
  <rect x="600" y="455" width="160" height="52" rx="16" fill="#06D6A0" stroke="#1B5E20" stroke-width="10" transform="rotate(6, 680, 420)"/>
  <text x="680" y="492" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle" transform="rotate(6, 680, 492)">JPG</text>

  <!-- Drop Here label -->
  <rect x="282" y="580" width="460" height="70" rx="28" fill="#06D6A0" stroke="#1B5E20" stroke-width="12"/>
  <text x="512" y="628" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">DROP HERE</text>

  <!-- Output ICO badge -->
  <rect x="192" y="720" width="640" height="100" rx="36" fill="#1B5E20" stroke="#0A3200" stroke-width="14"/>
  <text x="512" y="789" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>

  <!-- FORMAT badge -->
  <rect x="342" y="850" width="340" height="72" rx="28" fill="#06D6A0" stroke="#1B5E20" stroke-width="12"/>
  <text x="512" y="902" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">FORMAT</text>
</svg>
