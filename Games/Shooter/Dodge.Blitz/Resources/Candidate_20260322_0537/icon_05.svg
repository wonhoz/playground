<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: Metaphor / 레이어드 / 생존 타이머 + 총알 / 초록-에메랄드 -->
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001A0A"/>
      <stop offset="100%" stop-color="#000A04"/>
    </radialGradient>
    <radialGradient id="timer05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00AA55"/>
    </radialGradient>
    <filter id="glow05">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow05sm">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#bg05)"/>

  <!-- 배경 그리드 (매트릭스 느낌) -->
  <line x1="256" y1="200" x2="256" y2="824" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="384" y1="200" x2="384" y2="824" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="512" y1="200" x2="512" y2="824" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="200" x2="640" y2="824" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="768" y1="200" x2="768" y2="824" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="256" x2="824" y2="256" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="384" x2="824" y2="384" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="512" x2="824" y2="512" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="640" x2="824" y2="640" stroke="#003322" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="768" x2="824" y2="768" stroke="#003322" stroke-width="1" opacity="0.5"/>

  <!-- 타이머 원형 (메인 심볼) -->
  <!-- 외부 링 (진행률 트랙) -->
  <circle cx="512" cy="480" r="220" fill="none" stroke="#003322" stroke-width="24"/>
  <!-- 진행률 아크 (약 70% 남은 상태) -->
  <circle cx="512" cy="480" r="220" fill="none" stroke="#00FF88" stroke-width="24"
    stroke-dasharray="970 390"
    stroke-dashoffset="390"
    stroke-linecap="round"
    transform="rotate(-90 512 480)"/>
  <!-- 타이머 글로우 -->
  <circle cx="512" cy="480" r="220" fill="none" stroke="#00FF88" stroke-width="6" opacity="0.3" filter="url(#glow05)"/>

  <!-- 타이머 내부 -->
  <circle cx="512" cy="480" r="180" fill="#001208" opacity="0.8"/>

  <!-- 시계 눈금 -->
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="4" opacity="0.6"/>
  <line x1="700" y1="292" x2="690" y2="313" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(30 512 480)"/>
  <line x1="700" y1="292" x2="690" y2="313" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(60 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="4" opacity="0.6" transform="rotate(90 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(120 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(150 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="4" opacity="0.6" transform="rotate(180 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(210 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(240 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="4" opacity="0.6" transform="rotate(270 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(300 512 480)"/>
  <line x1="512" y1="272" x2="512" y2="296" stroke="#00FF88" stroke-width="3" opacity="0.4" transform="rotate(330 512 480)"/>

  <!-- 시침·분침 -->
  <line x1="512" y1="480" x2="560" y2="380" stroke="#00FF88" stroke-width="6" stroke-linecap="round"/>
  <line x1="512" y1="480" x2="420" y2="430" stroke="#00CCFF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="512" cy="480" r="10" fill="#00FF88"/>

  <!-- 타이머 숫자 -->
  <text x="512" y="560" font-family="'Courier New', monospace" font-weight="700" font-size="64" fill="#00FF88" text-anchor="middle">42.7s</text>

  <!-- 총알들 (타이머 주변 위협) -->
  <circle cx="512" cy="220" r="16" fill="#FF4444" opacity="0.9"/>
  <circle cx="680" cy="285" r="14" fill="#FF6600" opacity="0.85"/>
  <circle cx="760" cy="430" r="16" fill="#FF4444" opacity="0.9"/>
  <circle cx="680" cy="660" r="14" fill="#FF6600" opacity="0.85"/>
  <circle cx="380" cy="700" r="16" fill="#FF4444" opacity="0.9"/>
  <circle cx="245" cy="550" r="14" fill="#FF6600" opacity="0.85"/>
  <circle cx="290" cy="340" r="16" fill="#FF4444" opacity="0.9"/>

  <!-- 총알 꼬리 (타이머 방향으로) -->
  <ellipse cx="512" cy="233" rx="5" ry="18" fill="#FF8888" opacity="0.4" transform="rotate(0 512 233)"/>
  <ellipse cx="673" cy="295" rx="5" ry="18" fill="#FF8888" opacity="0.4" transform="rotate(-30 673 295)"/>

  <!-- 하단 라벨 -->
  <text x="512" y="870" font-family="Arial Black, Arial" font-weight="900" font-size="68" fill="#00FF88" text-anchor="middle" opacity="0.7" letter-spacing="4">SURVIVE</text>
</svg>
