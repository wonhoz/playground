<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 무지개+픽셀: rainbow pixel color bands -->
