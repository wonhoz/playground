<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030812"/>
      <stop offset="100%" stop-color="#050f20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Crystal tuning fork shape -->
  <!-- Left prong -->
  <rect x="176" y="100" width="30" height="220" rx="15" fill="#1e3a5f" stroke="#38BDF8" stroke-width="2"/>
  <!-- Right prong -->
  <rect x="236" y="100" width="30" height="220" rx="15" fill="#1e3a5f" stroke="#38BDF8" stroke-width="2"/>
  <!-- Handle -->
  <rect x="191" y="320" width="50" height="110" rx="12" fill="#1e3a5f" stroke="#38BDF8" stroke-width="2"/>
  <!-- Resonance waves emanating from prongs -->
  <!-- Left waves -->
  <path d="M170,200 Q140,160 110,200 Q80,240 110,280 Q140,316 170,280" fill="none" stroke="#38BDF8" stroke-width="2.5" opacity="0.6"/>
  <path d="M170,200 Q120,148 80,200 Q42,250 80,302 Q120,350 170,298" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
  <path d="M170,200 Q100,136 52,200 Q8,260 52,320 Q100,380 170,316" fill="none" stroke="#0284C7" stroke-width="1" opacity="0.2"/>
  <!-- Right waves -->
  <path d="M272,200 Q302,160 332,200 Q362,240 332,280 Q302,316 272,280" fill="none" stroke="#38BDF8" stroke-width="2.5" opacity="0.6"/>
  <path d="M272,200 Q322,148 362,200 Q400,250 362,302 Q322,350 272,298" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
  <path d="M272,200 Q342,136 390,200 Q440,260 390,320 Q342,380 272,316" fill="none" stroke="#0284C7" stroke-width="1" opacity="0.2"/>
  <!-- Frequency annotation -->
  <text x="256" y="456" text-anchor="middle" font-family="monospace" font-size="11" fill="#38BDF8" opacity="0.7">440 Hz  ·  A4</text>
  <text x="256" y="474" text-anchor="middle" font-family="monospace" font-size="9" fill="#0EA5E9" opacity="0.5">resonance frequency</text>
  <!-- Crystal label on handle -->
  <text x="216" y="378" text-anchor="middle" font-family="monospace" font-size="9" fill="#38BDF8" opacity="0.6">XTAL</text>
  <text x="216" y="394" text-anchor="middle" font-family="monospace" font-size="8" fill="#0EA5E9" opacity="0.5">32kHz</text>
</svg>
