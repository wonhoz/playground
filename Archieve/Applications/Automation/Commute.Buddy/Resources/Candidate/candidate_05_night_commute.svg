<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2A3B"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="180" cy="55" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="70" r="3" fill="white" opacity="0.9"/>
  <circle cx="420" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="140" cy="130" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="380" cy="120" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="450" cy="60" r="2" fill="white" opacity="0.6"/>
  <circle cx="70" cy="150" r="2" fill="white" opacity="0.7"/>
  <!-- Moon -->
  <circle cx="380" cy="100" r="48" fill="url(#moon)"/>
  <circle cx="400" cy="86" r="38" fill="#1B2A3B"/>
  <!-- City skyline silhouette -->
  <rect x="60" y="320" width="40" height="120" fill="#1E3A5F"/>
