<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 따뜻한 오렌지 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 모루(anvil) -->
  <rect x="220" y="680" width="584" height="120" rx="16" fill="#5D4037"/>
  <rect x="280" y="600" width="464" height="100" rx="12" fill="#795548"/>
  <!-- 망치 -->
  <rect x="580" y="200" width="180" height="120" rx="24" fill="url(#hammerGrad)" transform="rotate(-35 670 260)"/>
  <rect x="620" y="340" width="40" height="280" rx="10" fill="#8D6E63" transform="rotate(-35 640 480)"/>
  <!-- 타격 효과 불꽃 -->
  <ellipse cx="440" cy="580" rx="60" ry="30" fill="#FFD600" opacity="0.9"/>
  <ellipse cx="380" cy="550" rx="30" ry="16" fill="#FF6F00" opacity="0.8"/>
  <ellipse cx="500" cy="560" rx="24" ry="14" fill="#FF8F00" opacity="0.7"/>
  <!-- Layer 3: 두드리는 텍스트 (변환 중인 모습) -->
  <rect x="160" y="440" width="400" height="120" rx="16" fill="#FFECB3"/>
  <text x="360" y="524" font-family="'Consolas', monospace" font-weight="700" font-size="72" fill="#E65100" text-anchor="middle">{ "text" }</text>
  <!-- 변환 결과 -->
  <rect x="160" y="780" width="500" height="80" rx="16" fill="#E8F5E9"/>
  <text x="410" y="836" font-family="'Consolas', monospace" font-size="52" fill="#2E7D32" text-anchor="middle">a3f8b2c1d4...</text>
</svg>
