<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E9ECEF"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000030"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Single large key -->
  <rect x="140" y="160" width="232" height="200" rx="16" fill="url(#keyGrad)" filter="url(#shadow)" stroke="#CCCCCC" stroke-width="2"/>
  <!-- Key top face -->
  <rect x="148" y="168" width="216" height="184" rx="12" fill="#FFFFFF"/>
  <!-- Letter A -->
  <text x="256" y="285" font-family="Arial, sans-serif" font-size="110" font-weight="700" text-anchor="middle" fill="#333333">A</text>
  <!-- Checkmark overlay -->
  <circle cx="340" cy="190" r="28" fill="#4CAF50"/>
  <path d="M328 190 L337 200 L354 180" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status bar bottom -->
  <rect x="80" y="400" width="352" height="48" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="96" y="416" width="80" height="16" rx="8" fill="#4CAF50"/>
  <rect x="192" y="416" width="56" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="264" y="416" width="48" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="328" y="416" width="88" height="16" rx="8" fill="#E0E0E0"/>
</svg>
