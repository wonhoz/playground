<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
<!-- 컨셉: 줄노트 가로선 -->
<!-- 노트 종이 -->
<rect x="200" y="180" width="624" height="660" rx="20" fill="#120E00" stroke="#F9A825" stroke-width="24"/>
<!-- 왼쪽 마진 선 (세로 빨간선) -->
<line x1="320" y1="200" x2="320" y2="820" stroke="#F9A825" stroke-width="16" opacity="0.4"/>
<!-- 가로줄들 (균등 간격) -->
<line x1="200" y1="310" x2="824" y2="310" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="380" x2="824" y2="380" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="450" x2="824" y2="450" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="520" x2="824" y2="520" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="590" x2="824" y2="590" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="660" x2="824" y2="660" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<line x1="200" y1="730" x2="824" y2="730" stroke="#F9A825" stroke-width="14" opacity="0.3"/>
<!-- 필기 콘텐츠 (간략한 글자 느낌) -->
<line x1="340" y1="310" x2="700" y2="310" stroke="#FFE082" stroke-width="20" stroke-linecap="round"/>
<line x1="340" y1="380" x2="620" y2="380" stroke="#FFE082" stroke-width="20" stroke-linecap="round"/>
<line x1="340" y1="450" x2="740" y2="450" stroke="#FFE082" stroke-width="20" stroke-linecap="round"/>
<line x1="340" y1="520" x2="560" y2="520" stroke="#FFE082" stroke-width="20" stroke-linecap="round"/>
<!-- 커서 (깜빡이는 느낌) -->
<rect x="580" y="500" width="12" height="40" rx="4" fill="#F9A825"/>
</svg>
