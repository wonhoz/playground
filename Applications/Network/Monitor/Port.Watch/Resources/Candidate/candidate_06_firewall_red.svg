    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Firewall brick wall -->
  <!-- Row 1 (top) -->
  <rect x="70" y="240" width="88" height="44" rx="4" fill="url(#wall)" stroke="#F44336" stroke-width="1.5"/>
  <rect x="166" y="240" width="88" height="44" rx="4" fill="url(#wall)" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="262" y="240" width="88" height="44" rx="4" fill="url(#wall)" stroke="#F44336" stroke-width="1.5"/>
  <rect x="358" y="240" width="84" height="44" rx="4" fill="url(#wall)" stroke="#D32F2F" stroke-width="1.5"/>
  <!-- Row 2 (offset) -->
