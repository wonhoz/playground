<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Infinite corridor perspective (vanishing point) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Vanishing point: 512,420 -->
  <!-- Corridor walls - perspective lines -->
  <polygon points="140,880 512,420 884,880" fill="none" stroke="#00B0FF" stroke-width="4" opacity="0.8"/>
  <!-- Floor panels (perspective rectangles) -->
  <polygon points="140,880 884,880 812,760 212,760" fill="#001020" stroke="#00B0FF" stroke-width="2" opacity="0.7"/>
  <polygon points="212,760 812,760 750,650 274,650" fill="#001828" stroke="#00B0FF" stroke-width="1.8" opacity="0.6"/>
  <polygon points="274,650 750,650 700,558 324,558" fill="#001E30" stroke="#00B0FF" stroke-width="1.5" opacity="0.5"/>
  <polygon points="324,558 700,558 662,482 362,482" fill="#002030" stroke="#00E5FF" stroke-width="1.2" opacity="0.45"/>
  <polygon points="362,482 662,482 636,420 388,420" fill="#002030" stroke="#00E5FF" stroke-width="1" opacity="0.4"/>
  <!-- Side walls -->
  <polygon points="140,880 212,760 274,650 324,558 362,482 388,420 512,420 140,880" fill="#000D1A" stroke="#00B0FF" stroke-width="2.5" opacity="0.6"/>
  <polygon points="884,880 812,760 750,650 700,558 662,482 636,420 512,420 884,880" fill="#000D1A" stroke="#00B0FF" stroke-width="2.5" opacity="0.6"/>
  <!-- Vanishing point glow -->
  <circle cx="512" cy="420" r="60" fill="#00B0FF" opacity="0.15"/>
  <circle cx="512" cy="420" r="30" fill="#00E5FF" opacity="0.25"/>
  <circle cx="512" cy="420" r="12" fill="#80D8FF" opacity="0.7"/>
  <!-- Neon edge strips on floor corners -->
  <line x1="140" y1="880" x2="512" y2="420" stroke="#00E5FF" stroke-width="3" opacity="0.9"/>
  <line x1="884" y1="880" x2="512" y2="420" stroke="#00E5FF" stroke-width="3" opacity="0.9"/>
  <!-- Horizon line glow -->
  <line x1="200" y1="420" x2="824" y2="420" stroke="#00B0FF" stroke-width="3" opacity="0.4"/>
</svg>
