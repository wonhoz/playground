<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="50%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="#FFFFFF"/>
  <!-- Gradient overlay -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg02)" opacity="0.08"/>
  <!-- 5x5 character grid, dark to light left-to-right -->
  <!-- Column 1 (darkest) -->
  <text x="152" y="300" font-family="monospace" font-size="110" font-weight="900" fill="#111111">@</text>
  <text x="152" y="430" font-family="monospace" font-size="110" font-weight="900" fill="#1A1A1A">@</text>
  <text x="152" y="560" font-family="monospace" font-size="110" font-weight="900" fill="#222222">@</text>
  <text x="152" y="690" font-family="monospace" font-size="110" font-weight="900" fill="#333333">@</text>
  <text x="152" y="820" font-family="monospace" font-size="110" font-weight="900" fill="#1A1A1A">#</text>
  <!-- Column 2 -->
  <text x="310" y="300" font-family="monospace" font-size="110" font-weight="900" fill="#333333">#</text>
  <text x="310" y="430" font-family="monospace" font-size="110" font-weight="900" fill="#444444">#</text>
  <text x="310" y="560" font-family="monospace" font-size="110" font-weight="900" fill="#3A3A3A">@</text>
  <text x="310" y="690" font-family="monospace" font-size="110" font-weight="900" fill="#555555">$</text>
  <text x="310" y="820" font-family="monospace" font-size="110" font-weight="900" fill="#444444">#</text>
  <!-- Column 3 -->
  <text x="468" y="300" font-family="monospace" font-size="110" font-weight="900" fill="#555555">$</text>
  <text x="468" y="430" font-family="monospace" font-size="110" font-weight="900" fill="#666666">%</text>
  <text x="468" y="560" font-family="monospace" font-size="110" font-weight="900" fill="#5A5A5A">$</text>
  <text x="468" y="690" font-family="monospace" font-size="110" font-weight="900" fill="#777777">*</text>
  <text x="468" y="820" font-family="monospace" font-size="110" font-weight="900" fill="#666666">%</text>
  <!-- Column 4 -->
  <text x="626" y="300" font-family="monospace" font-size="110" font-weight="900" fill="#777777">*</text>
  <text x="626" y="430" font-family="monospace" font-size="110" font-weight="900" fill="#888888">+</text>
  <text x="626" y="560" font-family="monospace" font-size="110" font-weight="900" fill="#7A7A7A">*</text>
  <text x="626" y="690" font-family="monospace" font-size="110" font-weight="900" fill="#999999">-</text>
  <text x="626" y="820" font-family="monospace" font-size="110" font-weight="900" fill="#888888">:</text>
  <!-- Column 5 (lightest) -->
  <text x="784" y="300" font-family="monospace" font-size="110" font-weight="900" fill="#AAAAAA">.</text>
  <text x="784" y="430" font-family="monospace" font-size="110" font-weight="900" fill="#BBBBBB"> </text>
  <text x="784" y="560" font-family="monospace" font-size="110" font-weight="900" fill="#AAAAAA">.</text>
  <text x="784" y="690" font-family="monospace" font-size="110" font-weight="900" fill="#CCCCCC"> </text>
  <text x="784" y="820" font-family="monospace" font-size="110" font-weight="900" fill="#BBBBBB">.</text>
  <!-- Gradient overlay for visual effect -->
  <defs>
    <linearGradient id="gradOverlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect x="185" y="185" width="654" height="654" fill="url(#gradOverlay)" opacity="0.3"/>
</svg>
