  <!-- 번호 2: "2 □ □ □" -->
  <text x="230" y="490" font-family="Arial Black" font-size="68" font-weight="900" fill="#7C3AED">2</text>

  <rect x="310" y="418" width="90" height="90" rx="8" fill="white" stroke="#7C3AED" stroke-width="7"/>
  <rect x="412" y="418" width="90" height="90" rx="8" fill="white" stroke="#7C3AED" stroke-width="7"/>
  <rect x="514" y="418" width="90" height="90" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="7"/>

