<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="100%" stop-color="#152040"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffee44" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffee44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="confetti_r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun/spotlight glow -->
  <ellipse cx="256" cy="180" rx="200" ry="160" fill="url(#sun)"/>
  <!-- Confetti particles -->
  <rect x="120" y="100" width="12" height="18" rx="2" fill="#ff4444" transform="rotate(20 126 109)"/>
  <rect x="160" y="80" width="10" height="16" rx="2" fill="#44ff44" transform="rotate(-15 165 88)"/>
  <rect x="340" y="90" width="12" height="18" rx="2" fill="#4444ff" transform="rotate(30 346 99)"/>
  <rect x="380" y="120" width="10" height="14" rx="2" fill="#ffff44" transform="rotate(-25 385 127)"/>
  <rect x="100" y="160" width="8" height="14" rx="2" fill="#ff44ff" transform="rotate(40 104 167)"/>
  <rect x="400" y="160" width="10" height="16" rx="2" fill="#44ffff" transform="rotate(-35 405 168)"/>
  <rect x="200" y="80" width="8" height="12" rx="2" fill="#ffaa44" transform="rotate(15 204 86)"/>
  <rect x="300" y="80" width="10" height="14" rx="2" fill="#ff4488" transform="rotate(-20 305 87)"/>
  <rect x="140" y="130" width="8" height="12" rx="2" fill="#88ff44" transform="rotate(50 144 136)"/>
  <rect x="360" y="140" width="8" height="12" rx="2" fill="#4488ff" transform="rotate(-45 364 146)"/>
  <!-- Victory runner - arms up, leaping -->
  <circle cx="256" cy="220" r="28" fill="#f0c080"/>
  <!-- Body -->
  <rect x="238" y="248" width="36" height="50" rx="6" fill="#cc2020"/>
  <!-- Victory arms raised high -->
  <line x1="238" y1="262" x2="190" y2="210" stroke="#f0c080" stroke-width="14" stroke-linecap="round"/>
  <line x1="274" y1="262" x2="322" y2="210" stroke="#f0c080" stroke-width="14" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="190" cy="210" r="10" fill="#f0c080"/>
  <circle cx="322" cy="210" r="10" fill="#f0c080"/>
  <!-- Leaping legs -->
  <line x1="248" y1="298" x2="210" y2="350" stroke="#f0c080" stroke-width="14" stroke-linecap="round"/>
  <line x1="264" y1="298" x2="302" y2="360" stroke="#f0c080" stroke-width="14" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="206" cy="356" rx="18" ry="10" fill="#333" transform="rotate(-20 206 356)"/>
  <ellipse cx="308" cy="362" rx="18" ry="10" fill="#333" transform="rotate(20 308 362)"/>
  <!-- Finish tape across chest -->
  <rect x="160" y="256" width="180" height="10" rx="5" fill="#ffdd44"/>
  <rect x="160" y="266" width="180" height="10" rx="5" fill="#cc2020"/>
  <!-- Track below -->
  <rect x="80" y="420" width="352" height="40" rx="6" fill="#992200" opacity="0.6"/>
  <!-- Crowd silhouettes -->
  <ellipse cx="110" cy="430" rx="18" ry="28" fill="#0a1530" opacity="0.8"/>
  <ellipse cx="150" cy="425" rx="16" ry="24" fill="#152040" opacity="0.8"/>
  <ellipse cx="365" cy="428" rx="18" ry="26" fill="#0a1530" opacity="0.8"/>
  <ellipse cx="405" cy="422" rx="16" ry="24" fill="#152040" opacity="0.8"/>
  <!-- Stars from excitement -->
  <polygon points="256,160 260,172 272,172 263,180 267,192 256,184 245,192 249,180 240,172 252,172" fill="#ffdd44" opacity="0.8"/>
</svg>