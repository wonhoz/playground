<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="50%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="light_trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <filter id="glow05" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 따뜻한 주황 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- 배경 어두운 파문 (드래그 시작 지점) -->
  <circle cx="680" cy="350" r="300" fill="#B45309" opacity="0.2" clip-path="url(#clip05)"/>
  <circle cx="680" cy="350" r="200" fill="#92400E" opacity="0.15" clip-path="url(#clip05)"/>

  <!-- Layer 2: 마우스 커서 + 빛 궤적 -->
  <!-- 빛줄기 궤적 (S자 드래그 경로) -->
  <!-- 글로우 효과 레이어 -->
  <path d="M 680,330 C 580,330 480,420 380,420 C 280,420 200,330 200,330"
        stroke="#FDE68A" stroke-width="80" fill="none"
        stroke-linecap="round" opacity="0.15" filter="url(#softglow)"
        clip-path="url(#clip05)"/>
  <!-- 메인 궤적 -->
  <path d="M 680,330 C 580,330 480,420 380,420 C 280,420 200,330 200,330"
        stroke="url(#light_trail)" stroke-width="44" fill="none"
        stroke-linecap="round" filter="url(#glow05)"/>

  <!-- 마우스 커서 (시작 위치, 오른쪽) -->
  <g transform="translate(680,330)">
    <!-- 커서 본체 -->
    <path d="M 0,0 L 0,80 L 20,60 L 38,90 L 52,84 L 34,54 L 60,48 Z"
          fill="white" opacity="0.95"/>
    <!-- 커서 테두리 -->
    <path d="M 0,0 L 0,80 L 20,60 L 38,90 L 52,84 L 34,54 L 60,48 Z"
          fill="none" stroke="#F97316" stroke-width="4"/>
  </g>

  <!-- 빛 파티클 (궤적 위) -->
  <circle cx="530" cy="360" r="10" fill="#FDE68A" opacity="0.8" filter="url(#glow05)"/>
  <circle cx="430" cy="400" r="8"  fill="#FDE68A" opacity="0.6" filter="url(#glow05)"/>
  <circle cx="310" cy="375" r="6"  fill="#FDE68A" opacity="0.5"/>

  <!-- 궤적 끝 - 명령 실행 폭발 효과 -->
  <circle cx="200" cy="330" r="70" fill="#FDE68A" opacity="0.15" filter="url(#softglow)"/>
  <circle cx="200" cy="330" r="44" fill="#FBBF24" opacity="0.4"/>
  <circle cx="200" cy="330" r="26" fill="white" opacity="0.9"/>
  <!-- 실행 체크/번개 심볼 -->
  <text x="200" y="348" text-anchor="middle" font-family="Segoe UI" font-size="36" fill="#EA580C" font-weight="bold">⚡</text>

  <!-- Layer 3: 하단 명령 실행 표시 -->
  <rect x="200" y="560" width="624" height="130" rx="24" fill="#431407" opacity="0.85"/>
  <rect x="200" y="560" width="624" height="130" rx="24" fill="none" stroke="#F97316" stroke-width="4"/>

  <!-- 궤적 화살표 텍스트 -->
  <text x="310" y="614" font-family="Segoe UI,sans-serif" font-size="36" fill="#FBBF24" font-weight="bold">← L</text>
  <text x="440" y="614" font-family="Segoe UI,sans-serif" font-size="32" fill="#FDA774">→  실행</text>
  <text x="512" y="666" text-anchor="middle" font-family="Consolas,monospace" font-size="30" fill="#FED7AA">Alt+Left  →  뒤로가기</text>

  <!-- 트레이 아이콘 힌트 (우측 하단 작은 표시) -->
  <rect x="740" y="800" width="140" height="48" rx="14" fill="#431407" opacity="0.8"/>
  <text x="810" y="832" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#FDBA74">🖱 Tray</text>
</svg>
