<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a1a"/>
      <stop offset="100%" stop-color="#003333"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44DDCC"/>
      <stop offset="100%" stop-color="#008877"/>
    </linearGradient>
    <linearGradient id="edit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AAFFEE"/>
      <stop offset="100%" stop-color="#44DDCC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Folder body -->
  <path d="M80,220 Q80,200 100,200 L220,200 L240,180 L400,180 Q420,180 420,200 L420,380 Q420,400 400,400 L100,400 Q80,400 80,380 Z" fill="url(#folder)" opacity="0.8"/>
  <!-- Folder tab -->
  <path d="M100,200 L220,200 L240,180 L100,180 Z" fill="url(#folder)"/>
  <!-- Inner shadow -->
  <path d="M96,220 Q96,210 106,210 L406,210 L406,390 Q406,394 400,394 L106,394 Q96,394 96,390 Z" fill="#001a1a" opacity="0.3"/>
  <!-- Files inside folder -->
  <rect x="130" y="245" width="70" height="88" rx="6" fill="#AAFFEE" opacity="0.7"/>
  <rect x="220" y="245" width="70" height="88" rx="6" fill="#AAFFEE" opacity="0.75"/>
  <rect x="310" y="245" width="70" height="88" rx="6" fill="#AAFFEE" opacity="0.8"/>
  <!-- Edit pencil badge -->
  <circle cx="400" cy="108" r="52" fill="#001a1a" stroke="#44DDCC" stroke-width="2"/>
  <g transform="rotate(-45 400 108)">
    <rect x="383" y="74" width="34" height="60" rx="6" fill="url(#edit)"/>
    <rect x="383" y="74" width="34" height="16" rx="6" fill="#FFAAAA"/>
    <polygon points="383,134 417,134 400,160" fill="#FFEECC"/>
    <polygon points="391,134 409,134 400,155" fill="#444"/>
  </g>
</svg>