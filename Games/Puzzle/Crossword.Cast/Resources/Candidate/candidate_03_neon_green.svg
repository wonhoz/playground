<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d3320"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- grid with neon glow -->
  <g fill="none" stroke="#00ff88" stroke-width="4" opacity="0.8" filter="url(#glow)">
    <rect x="96" y="96" width="320" height="320" rx="6"/>
    <line x1="176" y1="96" x2="176" y2="416"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="336" y1="96" x2="336" y2="416"/>
    <line x1="96" y1="176" x2="416" y2="176"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="336" x2="416" y2="336"/>
  </g>
  <!-- filled cells -->
  <rect x="96" y="256" width="80" height="80" rx="4" fill="#00ff88" opacity="0.15"/>
  <rect x="336" y="96" width="80" height="80" rx="4" fill="#00ff88" opacity="0.15"/>
  <!-- neon letters -->
  <text x="136" y="147" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">C</text>
  <text x="216" y="147" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">R</text>
  <text x="296" y="147" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">O</text>
  <text x="136" y="227" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>
  <text x="136" y="307" font-family="monospace" font-size="60" font-weight="bold" fill="#00ffcc" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>
  <text x="216" y="307" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">W</text>
  <text x="296" y="307" font-family="monospace" font-size="60" font-weight="bold" fill="#00ff88" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">D</text>
</svg>
