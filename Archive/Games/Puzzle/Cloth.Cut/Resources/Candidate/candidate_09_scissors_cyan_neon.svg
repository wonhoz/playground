<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#112244"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon cloth grid -->
  <rect x="130" y="170" width="252" height="180" rx="10" fill="#00FFFF" opacity="0.07"/>
  <line x1="130" y1="210" x2="382" y2="210" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="250" x2="382" y2="250" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="290" x2="382" y2="290" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="330" x2="382" y2="330" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="178" y1="170" x2="178" y2="350" stroke="#00FFFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="226" y1="170" x2="226" y2="350" stroke="#00FFFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="274" y1="170" x2="274" y2="350" stroke="#00FFFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="322" y1="170" x2="322" y2="350" stroke="#00FFFF" stroke-width="1.5" opacity="0.25"/>
  <!-- Neon scissors -->
  <circle cx="224" cy="260" r="20" fill="none" stroke="url(#neon)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="256" cy="260" r="20" fill="none" stroke="url(#neon)" stroke-width="5" filter="url(#glow)"/>
  <line x1="240" y1="243" x2="420" y2="148" stroke="url(#neon)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="240" y1="277" x2="420" y2="372" stroke="url(#neon)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Cut trace -->
  <line x1="256" y1="140" x2="256" y2="395" stroke="#00FFFF" stroke-width="2" stroke-dasharray="12,8" opacity="0.5" filter="url(#glow)"/>
</svg>
