<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <clipPath id="c2"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Mint green background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g2)"/>
  <g clip-path="url(#c2)">
    <!-- Layer 2: Folder icon (left) -->
    <!-- Folder tab -->
    <rect x="130" y="340" width="180" height="60" rx="14" fill="#F59E0B"/>
    <!-- Folder body -->
    <rect x="130" y="390" width="320" height="240" rx="18" fill="#FBBF24"/>
    <!-- Folder shine -->
    <rect x="146" y="406" width="288" height="60" rx="10" fill="#FDE68A" opacity="0.6"/>
    <!-- Right-click badge on folder -->
    <circle cx="410" cy="360" r="52" fill="#EF4444"/>
    <text x="410" y="378" font-family="Arial Black,Arial,sans-serif" font-size="54" fill="white" font-weight="900" text-anchor="middle">RC</text>
    <!-- Arrow -->
    <line x1="468" y1="512" x2="570" y2="512" stroke="#059669" stroke-width="56" stroke-linecap="round"/>
    <polygon points="546,454 634,512 546,570" fill="#059669"/>
    <!-- Layer 3: Terminal window (right) -->
    <rect x="590" y="340" width="304" height="340" rx="20" fill="#134E4A"/>
    <!-- Terminal title bar -->
    <rect x="590" y="340" width="304" height="50" rx="20" fill="#065F46"/>
    <rect x="590" y="368" width="304" height="22" fill="#065F46"/>
    <!-- Terminal dots -->
    <circle cx="622" cy="365" r="10" fill="#EF4444"/>
    <circle cx="654" cy="365" r="10" fill="#F59E0B"/>
    <circle cx="686" cy="365" r="10" fill="#10B981"/>
    <!-- Terminal text -->
    <text x="612" y="460" font-family="Consolas,monospace" font-size="84" fill="#34D399" font-weight="bold">&gt;_</text>
    <text x="612" y="570" font-family="Consolas,monospace" font-size="80" fill="#6EE7B7">claude</text>
    <!-- Blinking cursor -->
    <rect x="864" y="530" width="18" height="60" rx="4" fill="#34D399"/>
  </g>
</svg>
