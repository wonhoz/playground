<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Log lines scanning diagonally with a sweep line -->
  <!-- Log line strips diagonal -->
  <rect x="132" y="200" width="760" height="72" rx="16" fill="white" opacity="0.85" transform="rotate(-3, 512, 512)"/>
  <text x="160" y="258" font-family="monospace" font-size="50" fill="#047857" transform="rotate(-3, 512, 512)">[ERROR] NullPointerException at main</text>
  <rect x="132" y="300" width="760" height="72" rx="16" fill="white" opacity="0.75" transform="rotate(-3, 512, 512)"/>
  <text x="160" y="358" font-family="monospace" font-size="50" fill="#065F46" transform="rotate(-3, 512, 512)">[WARN]  Heap usage 92% critical</text>
  <rect x="132" y="400" width="760" height="72" rx="16" fill="white" opacity="0.65" transform="rotate(-3, 512, 512)"/>
  <text x="160" y="458" font-family="monospace" font-size="50" fill="#047857" transform="rotate(-3, 512, 512)">[INFO]  GC cycle completed 340ms</text>
  <rect x="132" y="500" width="760" height="72" rx="16" fill="white" opacity="0.55" transform="rotate(-3, 512, 512)"/>
  <text x="160" y="558" font-family="monospace" font-size="50" fill="#065F46" transform="rotate(-3, 512, 512)">[DEBUG] Cache miss: key=user_42</text>
  <!-- Layer 3: Diagonal scan highlight beam -->
  <rect x="100" y="370" width="840" height="90" rx="10" fill="#FFD60A" opacity="0.35" transform="rotate(-3, 512, 512)"/>
  <!-- Scan cursor line -->
  <line x1="100" y1="455" x2="924" y2="414" stroke="#FFD60A" stroke-width="6" opacity="0.8"/>
  <!-- Search icon at scan origin -->
  <circle cx="840" cy="760" r="75" fill="white" opacity="0.92"/>
  <circle cx="840" cy="760" r="52" fill="none" stroke="#34D399" stroke-width="18"/>
  <line x1="882" y1="802" x2="920" y2="840" stroke="#34D399" stroke-width="20" stroke-linecap="round"/>
</svg>
