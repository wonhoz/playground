<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="qc-bg-clip-02">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="qc-bg-grad-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1050"/>
      <stop offset="100%" stop-color="#0E0830"/>
    </linearGradient>
    <linearGradient id="popup-grad-02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCFF44"/>
      <stop offset="100%" stop-color="#88CC00"/>
    </linearGradient>
  </defs>
  <!-- 배경 (딥 인디고) -->
  <rect width="1024" height="1024" rx="180" fill="url(#qc-bg-grad-02)"/>
  <g clip-path="url(#qc-bg-clip-02)">
    <!-- 배경 데스크탑 창들 (흐릿하게) -->
    <rect x="160" y="280" width="700" height="460" rx="16" fill="#252060" opacity="0.4"/>
    <rect x="160" y="280" width="700" height="40" rx="16" fill="#1A1850" opacity="0.6"/>
    <!-- 흐릿한 내용 줄들 -->
