<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="qc-bg-clip-03">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="qc-bg-grad-03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E28"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
  </defs>
  <!-- 배경 (딥 네이비) -->
  <rect width="1024" height="1024" rx="180" fill="url(#qc-bg-grad-03)"/>
  <g clip-path="url(#qc-bg-clip-03)">
    <!-- 배경 별자리 느낌 점들 -->
    <circle cx="200" cy="200" r="4" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="820" cy="200" r="3" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="200" cy="820" r="3" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="820" cy="820" r="4" fill="#FFFFFF" opacity="0.2"/>
    <!-- + 기호 (좌상단, 화이트) -->
    <rect x="210" y="310" width="120" height="30" rx="10" fill="#FFFFFF" opacity="0.9"/>
    <rect x="260" y="260" width="30" height="130" rx="10" fill="#FFFFFF" opacity="0.9"/>
    <!-- × 기호 (우상단, 골드) -->
    <rect x="680" y="310" width="130" height="30" rx="10" fill="#FFD700" transform="rotate(45,745,325)"/>
    <rect x="680" y="310" width="130" height="30" rx="10" fill="#FFD700" transform="rotate(-45,745,325)"/>
    <!-- ÷ 기호 (좌하단, 코랄) -->
    <rect x="210" y="680" width="120" height="28" rx="10" fill="#FF7070" opacity="0.9"/>
    <circle cx="270" cy="645" r="16" fill="#FF7070" opacity="0.9"/>
    <circle cx="270" cy="720" r="16" fill="#FF7070" opacity="0.9"/>
    <!-- − 기호 (우하단, 퍼플) -->
    <rect x="688" y="684" width="120" height="28" rx="10" fill="#CC88FF" opacity="0.9"/>
    <!-- 중앙 = 기호 (밝은 화이트, 큰) -->
    <rect x="360" y="440" width="304" height="44" rx="14" fill="#FFFFFF" opacity="0.95"/>
    <rect x="360" y="538" width="304" height="44" rx="14" fill="#FFFFFF" opacity="0.95"/>
    <!-- 중앙 원형 배경 -->
    <circle cx="512" cy="512" r="150" fill="#1A2040" opacity="0.5"/>
    <!-- 연결선 (기호들과 중앙 연결) -->
    <line x1="330" y1="360" x2="420" y2="450" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <line x1="694" y1="360" x2="604" y2="450" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <line x1="330" y1="664" x2="420" y2="574" stroke="#FF7070" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <line x1="694" y1="664" x2="604" y2="574" stroke="#CC88FF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <!-- 기호 장식 글로우 -->
    <circle cx="275" cy="328" r="70" fill="#FFFFFF" opacity="0.04"/>
    <circle cx="749" cy="328" r="70" fill="#FFD700" opacity="0.06"/>
    <circle cx="275" cy="696" r="70" fill="#FF7070" opacity="0.06"/>
    <circle cx="748" cy="696" r="70" fill="#CC88FF" opacity="0.05"/>
  </g>
</svg>
