<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#12122A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 네온 드로잉 스트로크 -->
  <path d="M 80 350 C 120 250 160 200 220 180 C 280 160 320 200 360 160 C 400 120 420 90 450 80" fill="none" stroke="#00E5FF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 80 380 C 130 310 180 280 240 300 C 300 320 340 290 400 250" fill="none" stroke="#E040FB" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 100 420 Q 180 390 256 420 Q 340 450 430 410" fill="none" stroke="#69F0AE" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 스타일러스 네온 -->
  <line x1="360" y1="80" x2="160" y2="280" stroke="#FFD740" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="155,285 148,270 170,275" fill="#FFD740" filter="url(#glow)"/>
  <ellipse cx="365" cy="75" rx="10" ry="16" fill="#FFD740" transform="rotate(-45 365 75)" filter="url(#glow)"/>
  <!-- 잉크 드롭들 -->
  <circle cx="160" cy="285" r="6" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="240" cy="300" r="4" fill="#E040FB" filter="url(#glow)"/>
  <circle cx="340" cy="260" r="5" fill="#69F0AE" filter="url(#glow)"/>
</svg>