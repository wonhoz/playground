<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#2d1a00"/>
    </linearGradient>
    <linearGradient id="gearGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="gearBronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cd7f32"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
    <linearGradient id="gearSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#757575"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large gear (center-left) -->
  <circle cx="185" cy="250" r="120" fill="url(#gearGold)"/>
  <circle cx="185" cy="250" r="88" fill="#2d1a00"/>
  <circle cx="185" cy="250" r="28" fill="url(#gearGold)"/>
  <!-- Gear teeth large -->
  <rect x="172" y="110" width="26" height="38" rx="5" fill="url(#gearGold)"/>
  <rect x="172" y="362" width="26" height="38" rx="5" fill="url(#gearGold)"/>
  <rect x="45" y="237" width="38" height="26" rx="5" fill="url(#gearGold)"/>
  <rect x="297" y="237" width="38" height="26" rx="5" fill="url(#gearGold)"/>
  <rect x="89" y="148" width="28" height="28" rx="5" fill="url(#gearGold)" transform="rotate(45, 103, 162)"/>
  <rect x="257" y="148" width="28" height="28" rx="5" fill="url(#gearGold)" transform="rotate(45, 271, 162)"/>
  <rect x="89" y="326" width="28" height="28" rx="5" fill="url(#gearGold)" transform="rotate(45, 103, 340)"/>
  <rect x="257" y="326" width="28" height="28" rx="5" fill="url(#gearGold)" transform="rotate(45, 271, 340)"/>
  <!-- Medium gear (right) -->
  <circle cx="360" cy="200" r="80" fill="url(#gearBronze)"/>
  <circle cx="360" cy="200" r="58" fill="#2d1a00"/>
  <circle cx="360" cy="200" r="18" fill="url(#gearBronze)"/>
  <!-- Teeth medium -->
  <rect x="349" y="102" width="22" height="28" rx="4" fill="url(#gearBronze)"/>
  <rect x="349" y="270" width="22" height="28" rx="4" fill="url(#gearBronze)"/>
  <rect x="262" y="189" width="28" height="22" rx="4" fill="url(#gearBronze)"/>
  <rect x="430" y="189" width="28" height="22" rx="4" fill="url(#gearBronze)"/>
  <rect x="298" y="138" width="22" height="22" rx="4" fill="url(#gearBronze)" transform="rotate(45, 309, 149)"/>
  <rect x="410" y="138" width="22" height="22" rx="4" fill="url(#gearBronze)" transform="rotate(45, 421, 149)"/>
  <rect x="298" y="240" width="22" height="22" rx="4" fill="url(#gearBronze)" transform="rotate(45, 309, 251)"/>
  <rect x="410" y="240" width="22" height="22" rx="4" fill="url(#gearBronze)" transform="rotate(45, 421, 251)"/>
  <!-- Small gear (bottom right) -->
  <circle cx="390" cy="370" r="55" fill="url(#gearSilver)"/>
  <circle cx="390" cy="370" r="38" fill="#2d1a00"/>
  <circle cx="390" cy="370" r="13" fill="url(#gearSilver)"/>
  <!-- Teeth small -->
  <rect x="381" y="299" width="18" height="22" rx="3" fill="url(#gearSilver)"/>
  <rect x="381" y="429" width="18" height="22" rx="3" fill="url(#gearSilver)"/>
  <rect x="319" y="361" width="22" height="18" rx="3" fill="url(#gearSilver)"/>
  <rect x="449" y="361" width="22" height="18" rx="3" fill="url(#gearSilver)"/>
  <!-- Axle connection lines -->
  <line x1="185" y1="250" x2="360" y2="200" stroke="#ffb300" stroke-width="3" stroke-dasharray="8,4" opacity="0.4"/>
  <line x1="360" y1="200" x2="390" y2="370" stroke="#cd7f32" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Rotation arrows -->
  <path d="M115,180 A90,90 0 0,1 185,132" fill="none" stroke="#ffb300" stroke-width="3" marker-end="url(#goldArr)" opacity="0.8"/>
  <defs>
    <marker id="goldArr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#ffb300"/>
    </marker>
  </defs>
</svg>
