<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Img.Cast — Icon Candidates</title>
  <style>
    body { background: #0f1923; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
    h1 { color: #f97316; font-size: 28px; margin-bottom: 6px; }
    .sub { color: #c2410c; font-size: 13px; margin-bottom: 36px; }
    .grid { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; }
    .card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    img { width: 180px; height: 180px; border-radius: 32px; transition: transform 0.2s; cursor: pointer; box-shadow: 0 4px 20px rgba(249,115,22,0.3); }
    img:hover { transform: scale(1.18); }
    .fname { color: #fb923c; font-size: 12px; }
    .concept { color: #fdba74; font-size: 11px; max-width: 180px; text-align: center; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>Img.Cast</h1>
  <div class="sub">Candidate_20260323_1700 · 5 icons</div>
  <div class="grid">
    <div class="card"><img src="icon_01.svg"><div class="fname">icon_01</div><div class="concept">이미지 프레임 → ICO 화살표 변환</div></div>
    <div class="card"><img src="icon_02.svg"><div class="fname">icon_02</div><div class="concept">깔때기 (SVG/PNG/BMP → .ICO)</div></div>
    <div class="card"><img src="icon_03.svg"><div class="fname">icon_03</div><div class="concept">파일 3개 스택 → ICO 출력</div></div>
    <div class="card"><img src="icon_04.svg"><div class="fname">icon_04</div><div class="concept">캔버스 + Convert 버튼 UI</div></div>
    <div class="card"><img src="icon_05.svg"><div class="fname">icon_05</div><div class="concept">파일 → 다중 크기 ICO 출력</div></div>
  </div>
</body>
</html>
