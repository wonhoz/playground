<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#003333"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor outline -->
  <rect x="56" y="100" width="400" height="280" rx="14" fill="#001E1E" stroke="#00BCD4" stroke-width="3"/>
  <rect x="200" y="380" width="112" height="20" fill="#00BCD4" opacity="0.4"/>
  <rect x="160" y="400" width="192" height="12" rx="6" fill="#00BCD4" opacity="0.3"/>
