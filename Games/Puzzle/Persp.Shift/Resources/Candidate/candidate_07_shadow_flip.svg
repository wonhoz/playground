<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Light source -->
  <circle cx="380" cy="120" r="30" fill="url(#light)" opacity="0.9"/>
  <circle cx="380" cy="120" r="50" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
  <!-- Light rays -->
  <line x1="380" y1="60" x2="380" y2="80" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="80" x2="405" y2="95" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <line x1="440" y1="120" x2="420" y2="120" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <!-- Object (3D box) -->
  <polygon points="180,220 260,180 340,220 340,300 260,340 180,300" fill="#4a4a6a" stroke="#8888aa" stroke-width="2"/>
  <polygon points="260,180 340,220 340,300 260,260" fill="#5a5a7a" stroke="#8888aa" stroke-width="2"/>
  <polygon points="260,180 180,220 180,300 260,260" fill="#3a3a5a" stroke="#8888aa" stroke-width="2"/>
  <!-- Shadow (perspective shifted) -->
  <polygon points="180,350 260,390 340,350 400,370 300,420 160,380" fill="#0d0d1a" opacity="0.7"/>
  <!-- Shadow shift arrow -->
  <path d="M256 320 Q300 335 340 360" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="340,360 325,352 332,368" fill="#ffd700"/>
</svg>
