  <text x="732" y="334" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">3.1 KB</text>
  <text x="852" y="334" font-family="Consolas, monospace" font-size="18" fill="#43A047"
