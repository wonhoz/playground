<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg11" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A6E9C"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </radialGradient>
    <radialGradient id="planet11a" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <radialGradient id="planet11b" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </radialGradient>
    <clipPath id="clip11">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg11)"/>
  <g clip-path="url(#clip11)">
