<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#002222"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CCAA"/>
      <stop offset="100%" stop-color="#008877"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F8F5"/>
      <stop offset="100%" stop-color="#C8EBE6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Book cover left -->
  <rect x="80" y="100" width="160" height="310" rx="8" fill="url(#book)"/>
  <!-- Book spine -->
  <rect x="228" y="100" width="20" height="310" rx="2" fill="#006655"/>
  <!-- Book cover right (open) -->
  <rect x="248" y="100" width="180" height="310" rx="8" fill="url(#page)"/>
  <!-- Page lines with unicode chars -->
  <text x="265" y="160" fill="#008877" font-size="26" font-family="serif">A  &#x3042;  &#x4E2D;</text>
  <text x="265" y="198" fill="#006655" font-size="22" font-family="serif">&#x0391;  &#x0410;  &#x2605;</text>
  <text x="265" y="234" fill="#008877" font-size="22" font-family="serif">&#x2665;  &#x221E;  &#x2713;</text>
  <text x="265" y="270" fill="#006655" font-size="22" font-family="serif">&#x00A9;  &#x1F600;  &#x1F31F;</text>
  <text x="265" y="306" fill="#008877" font-size="22" font-family="serif">&#x0600;  &#x05D0;  &#x0E01;</text>
  <!-- Book cover text -->
  <text x="160" y="220" text-anchor="middle" fill="white" font-size="22" font-family="monospace" font-weight="bold" transform="rotate(-90, 160, 256)">GLYPH MAP</text>
  <!-- Page number -->
  <text x="390" y="395" fill="#006655" font-size="16" font-family="monospace">U+0041</text>
  <!-- Bookmark -->
  <polygon points="330,100 360,100 360,150 345,138 330,150" fill="#FF6644"/>
</svg>
