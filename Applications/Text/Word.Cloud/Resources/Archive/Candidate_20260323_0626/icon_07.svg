<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 체중계 — 단어 빈도 무게 측정 | 공간/장면 | #1A0A0A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A0A"/>
  <!-- Layer 2: Scale with words weighing down -->
  <!-- Scale base -->
  <rect x="380" y="760" width="264" height="30" rx="6" fill="#2A1A1A" stroke="#6A3A3A" stroke-width="3"/>
  <!-- Scale post -->
  <rect x="506" y="560" width="12" height="200" rx="4" fill="#3A2A2A" stroke="#6A3A3A" stroke-width="2"/>
  <!-- Scale pivot -->
  <circle cx="512" cy="560" r="16" fill="#5A3A3A" stroke="#8A5A5A" stroke-width="3"/>
  <!-- Scale arm (tilted right - heavier on right) -->
  <line x1="260" y1="530" x2="764" y2="590" stroke="#6A4A4A" stroke-width="12" stroke-linecap="round"/>
  <!-- Left pan (light) -->
  <ellipse cx="280" cy="540" rx="90" ry="20" fill="#3A2A2A" stroke="#6A4A4A" stroke-width="3"/>
  <line x1="240" y1="540" x2="220" y2="480" stroke="#5A4040" stroke-width="4"/>
  <line x1="320" y1="540" x2="340" y2="480" stroke="#5A4040" stroke-width="4"/>
  <line x1="220" y1="480" x2="340" y2="480" stroke="#5A4040" stroke-width="4"/>
  <!-- Left pan content: light/rare words -->
  <text x="280" y="465" font-family="Arial,sans-serif" font-size="14" fill="#AA7777" text-anchor="middle">독특한</text>
  <text x="252" y="445" font-family="Arial,sans-serif" font-size="11" fill="#886666" text-anchor="middle">희귀</text>
  <text x="308" y="448" font-family="Arial,sans-serif" font-size="10" fill="#886666" text-anchor="middle">신조어</text>
  <!-- Left pan weight label -->
  <rect x="240" y="540" width="80" height="24" rx="4" fill="#2A1A1A"/>
  <text x="280" y="557" font-family="monospace" font-size="13" fill="#AA8888" text-anchor="middle">×12</text>
  <!-- Right pan (heavy) -->
  <ellipse cx="744" cy="600" rx="90" ry="20" fill="#3A2A2A" stroke="#6A4A4A" stroke-width="3"/>
  <line x1="704" y1="600" x2="684" y2="540" stroke="#5A4040" stroke-width="4"/>
  <line x1="784" y1="600" x2="804" y2="540" stroke="#5A4040" stroke-width="4"/>
  <line x1="684" y1="540" x2="804" y2="540" stroke="#5A4040" stroke-width="4"/>
  <!-- Right pan content: heavy/frequent words -->
  <text x="744" y="524" font-family="Arial,sans-serif" font-size="30" fill="#FF6666" text-anchor="middle" font-weight="bold">언어</text>
  <text x="706" y="504" font-family="Arial,sans-serif" font-size="24" fill="#FF8888" text-anchor="middle" font-weight="bold">AI</text>
  <text x="782" y="508" font-family="Arial,sans-serif" font-size="20" fill="#FFAAAA" text-anchor="middle">텍스트</text>
  <text x="720" y="480" font-family="Arial,sans-serif" font-size="16" fill="#FFBBBB" text-anchor="middle">분석</text>
  <text x="766" y="478" font-family="Arial,sans-serif" font-size="14" fill="#FFBBBB" text-anchor="middle">단어</text>
  <!-- Right pan weight label -->
  <rect x="704" y="600" width="80" height="24" rx="4" fill="#2A1A1A"/>
  <text x="744" y="617" font-family="monospace" font-size="13" fill="#FF8888" text-anchor="middle">×2,847</text>
  <!-- Layer 3: Scale display panel -->
  <rect x="360" y="680" width="304" height="70" rx="10" fill="#2A1010" stroke="#7A3A3A" stroke-width="3"/>
  <text x="512" y="708" font-family="monospace" font-size="14" fill="#FF8888" text-anchor="middle">가장 무거운 단어:</text>
  <text x="512" y="734" font-family="monospace" font-size="18" fill="#FF4444" text-anchor="middle" font-weight="bold">언어 (2,847회)</text>
</svg>
