  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg15)"/>
  <!-- Layer 2: Diamond / gem shape — cut facets = multiple format outputs -->
  <!-- Diamond outline -->
  <!-- Top crown facets -->
