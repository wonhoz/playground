<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 파랑 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 이더넷 플러그 -->
  <!-- 플러그 몸통 -->
  <rect x="312" y="200" width="400" height="300" rx="28" fill="#1565C0"/>
  <!-- 플러그 상단 접점들 -->
  <rect x="360" y="160" width="50" height="60" rx="8" fill="#90CAF9"/>
  <rect x="430" y="150" width="50" height="70" rx="8" fill="#90CAF9"/>
  <rect x="500" y="150" width="50" height="70" rx="8" fill="#90CAF9"/>
  <rect x="570" y="160" width="50" height="60" rx="8" fill="#90CAF9"/>
  <!-- 플러그 케이블 -->
  <rect x="432" y="500" width="160" height="280" rx="20" fill="#1976D2"/>
  <rect x="432" y="500" width="160" height="30" fill="#0D47A1"/>
  <!-- Layer 3: 포트 번호 배지 -->
  <rect x="240" y="580" width="280" height="120" rx="24" fill="#FF6F00"/>
  <text x="380" y="660" font-family="'Consolas', monospace" font-weight="900" font-size="88" fill="white" text-anchor="middle">:443</text>
  <rect x="504" y="580" width="280" height="120" rx="24" fill="#1B5E20"/>
  <text x="644" y="660" font-family="'Consolas', monospace" font-weight="900" font-size="88" fill="#69F0AE" text-anchor="middle">:80</text>
  <!-- 포트 번호 라벨 -->
  <text x="512" y="800" font-family="'Consolas', monospace" font-weight="700" font-size="80" fill="#0D47A1" text-anchor="middle">TCP / UDP</text>
  <text x="512" y="900" font-family="'Segoe UI', sans-serif" font-size="60" fill="#1565C0" text-anchor="middle">Port Monitor</text>
</svg>
