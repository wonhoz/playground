<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a4a"/>
      <stop offset="60%" stop-color="#0044aa"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
    <radialGradient id="sun" cx="80%" cy="20%" r="25%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#sun)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="180" rx="60" ry="28" fill="white" opacity="0.18"/>
  <ellipse cx="150" cy="165" rx="40" ry="22" fill="white" opacity="0.18"/>
  <ellipse cx="380" cy="340" rx="70" ry="30" fill="white" opacity="0.12"/>
  <ellipse cx="360" cy="325" rx="50" ry="22" fill="white" opacity="0.12"/>
  <ellipse cx="80" cy="370" rx="55" ry="24" fill="white" opacity="0.1"/>
  <!-- Jet plane (angled, drifting) -->
  <!-- Fuselage -->
  <path d="M140 280 Q200 238 330 256 Q370 260 400 270 L380 286 Q340 292 300 282 Q200 270 140 300 Z" fill="url(#plane)"/>
  <!-- Nose cone -->
  <path d="M330 256 Q370 260 400 270 L380 286 Q350 280 330 256 Z" fill="#bbdefb"/>
  <!-- Wing -->
  <path d="M240 264 L220 210 L280 252 Z" fill="#e3f2fd" opacity="0.9"/>
  <path d="M240 272 L230 315 L275 270 Z" fill="#bbdefb" opacity="0.75"/>
  <!-- Tail -->
  <path d="M148 288 L145 260 L168 278 Z" fill="#e3f2fd"/>
  <!-- Engine trail -->
  <path d="M140 280 Q100 268 60 275" stroke="#e3f2fd" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M140 300 Q100 310 55 305" stroke="#e3f2fd" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Speed lines -->
  <line x1="80" y1="230" x2="160" y2="240" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="60" y1="250" x2="140" y2="260" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- Title -->
  <text x="256" y="455" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4" opacity="0.9">SKY.DRIFT</text>
</svg>
