<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0500"/>
  <!-- Laser engraving — laser beam tracing a vector path -->
  <!-- Machine head -->
  <rect x="360" y="160" width="304" height="100" rx="14" fill="#E65100" opacity="0.9"/>
  <rect x="480" y="240" width="64" height="80" rx="6" fill="#FF8A65" opacity="0.8"/>
  <!-- Laser beam -->
  <line x1="512" y1="320" x2="512" y2="480" stroke="#FF8A65" stroke-width="6" opacity="0.9"/>
  <ellipse cx="512" cy="490" rx="18" ry="8" fill="#FF8A65" opacity="0.9"/>
  <!-- Path being traced on surface -->
  <rect x="180" y="540" width="664" height="300" rx="14" fill="#E65100" opacity="0.18"/>
  <rect x="180" y="540" width="664" height="300" rx="14" fill="none" stroke="#E65100" stroke-width="12"/>
  <!-- Etched vector path -->
  <path d="M260 680 Q380 580 512 680 Q640 780 760 640" fill="none" stroke="#FF8A65" stroke-width="16" stroke-linecap="round"/>
  <!-- Glow at laser contact -->
  <circle cx="512" cy="680" r="32" fill="#FF8A65" opacity="0.5"/>
  <circle cx="512" cy="680" r="14" fill="#FF8A65" opacity="0.9"/>
  <!-- Guide rails -->
  <rect x="160" y="300" width="24" height="400" rx="6" fill="#E65100" opacity="0.5"/>
  <rect x="840" y="300" width="24" height="400" rx="6" fill="#E65100" opacity="0.5"/>
</svg>
