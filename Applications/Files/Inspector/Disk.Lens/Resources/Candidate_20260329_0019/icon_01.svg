  <!-- Pictures: 9.8 GB -->
  <text x="90" y="556" font-family="Arial, sans-serif" font-size="34" fill="#37474F"
        dominant-baseline="middle">📁 Pictures</text>
  <rect x="380" y="533" width="530" height="46" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="533" width="84" height="46" rx="6" fill="#00838F"/>
  <text x="422" y="556" font-family="Arial, sans-serif" font-size="28" fill="white"
