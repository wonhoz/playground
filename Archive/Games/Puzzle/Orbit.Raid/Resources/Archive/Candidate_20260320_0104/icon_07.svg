<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Black hole gravity vortex spiral -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030005"/>
  <!-- Outer accretion disk glow -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#004D40" stroke-width="20" opacity="0.3"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#00695C" stroke-width="12" opacity="0.4"/>
  <!-- Spiral arms (approximated with arcs) -->
  <path d="M 512,172 A 340,340 0 0 1 852,512 A 280,280 0 0 1 512,792 A 220,220 0 0 1 292,512 A 160,160 0 0 1 512,352 A 100,100 0 0 1 612,512 A 60,60 0 0 1 512,572" fill="none" stroke="#00897B" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <!-- Inner spiral tighter -->
  <path d="M 512,572 A 40,40 0 0 1 472,512 A 30,30 0 0 1 512,482 A 20,20 0 0 1 532,512" fill="none" stroke="#26A69A" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <!-- Event horizon (dark center) -->
  <circle cx="512" cy="512" r="70" fill="#030005"/>
  <circle cx="512" cy="512" r="70" fill="none" stroke="#00695C" stroke-width="8" opacity="0.6"/>
  <circle cx="512" cy="512" r="50" fill="#030005"/>
  <!-- Small matter being pulled (dots) -->
  <circle cx="512" cy="200" r="16" fill="#00897B" opacity="0.8"/>
  <circle cx="780" cy="380" r="13" fill="#26A69A" opacity="0.7"/>
  <circle cx="820" cy="600" r="11" fill="#00695C" opacity="0.65"/>
  <circle cx="620" cy="820" r="10" fill="#00695C" opacity="0.6"/>
  <!-- Photon ring glow -->
  <circle cx="512" cy="512" r="80" fill="none" stroke="#80CBC4" stroke-width="6" opacity="0.4"/>
</svg>
