  <g fill="#222233" stroke="#2A2A40" stroke-width="1.5">
    <rect x="528" y="362" width="34" height="34" rx="5"/>
    <rect x="568" y="362" width="34" height="34" rx="5"/>
    <rect x="608" y="362" width="34" height="34" rx="5"/>
    <rect x="648" y="362" width="34" height="34" rx="5"/>
    <rect x="688" y="362" width="34" height="34" rx="5"/>
  </g>

  <!-- QWERTY 행 -->
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="220" y="404" width="34" height="34" rx="5"/>
    <rect x="260" y="404" width="34" height="34" rx="5"/>
    <rect x="300" y="404" width="34" height="34" rx="5"/>
    <rect x="340" y="404" width="34" height="34" rx="5"/>
    <rect x="380" y="404" width="34" height="34" rx="5"/>
    <rect x="420" y="404" width="34" height="34" rx="5"/>
  </g>
  <!-- 문제 키 -->
  <rect x="460" y="404" width="34" height="34" rx="5" fill="#3A0808" stroke="#601010" stroke-width="2"/>
