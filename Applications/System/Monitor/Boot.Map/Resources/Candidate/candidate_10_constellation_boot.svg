  <line x1="200" y1="282" x2="150" y2="372" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="312" y1="282" x2="362" y2="372" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="372" x2="362" y2="372" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="160" cy="132" r="12" fill="#1E40AF" stroke="#60A5FA" stroke-width="2.5"/>
