<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#001400"/>
  <!-- Layer 2: 돋보기 + 스캔 목록 -->
  <!-- 돋보기 -->
  <circle cx="380" cy="380" r="260" fill="#0A200A" stroke="#4CAF50" stroke-width="28"/>
  <circle cx="380" cy="380" r="180" fill="#0D2A0D" stroke="#66BB6A" stroke-width="8"/>
  <!-- 돋보기 내부 - 폴더 아이콘 -->
  <rect x="270" y="310" width="220" height="160" rx="10" fill="#1A3A1A" stroke="#4CAF50" stroke-width="8"/>
  <rect x="270" y="284" width="100" height="34" rx="8" fill="#1A3A1A" stroke="#4CAF50" stroke-width="8"/>
  <text x="380" y="416" font-size="72" fill="#4CAF50" text-anchor="middle" font-family="monospace">∅</text>
  <!-- 돋보기 손잡이 -->
  <line x1="588" y1="588" x2="780" y2="780" stroke="#4CAF50" stroke-width="40" stroke-linecap="round"/>
  <line x1="730" y1="730" x2="800" y2="800" stroke="#2D5A2D" stroke-width="36" stroke-linecap="round"/>
  <!-- Layer 3: 스캔 결과 목록 -->
  <rect x="540" y="80" width="440" height="480" rx="20" fill="#0A1A0A" stroke="#2D4A2D" stroke-width="6"/>
  <!-- 목록 헤더 -->
  <rect x="540" y="80" width="440" height="60" rx="20" fill="#1A3A1A"/>
  <rect x="540" y="120" width="440" height="20" fill="#1A3A1A"/>
  <text x="760" y="120" font-size="36" fill="#66BB6A" text-anchor="middle" font-family="monospace">Scan Results</text>
  <!-- 목록 아이템들 -->
  <rect x="570" y="170" width="16" height="16" rx="3" fill="#FF4444"/>
  <text x="600" y="186" font-size="32" fill="#E0E0E0" font-family="monospace">bin/  (1.2 GB)</text>
  <rect x="570" y="220" width="16" height="16" rx="3" fill="#FF4444"/>
  <text x="600" y="236" font-size="32" fill="#E0E0E0" font-family="monospace">obj/  (880 MB)</text>
  <rect x="570" y="270" width="16" height="16" rx="3" fill="#FF8800"/>
  <text x="600" y="286" font-size="32" fill="#E0E0E0" font-family="monospace">empty/ x4</text>
  <rect x="570" y="320" width="16" height="16" rx="3" fill="#FF8800"/>
  <text x="600" y="336" font-size="32" fill="#E0E0E0" font-family="monospace">0 bytes x2</text>
  <rect x="570" y="370" width="16" height="16" rx="3" fill="#FFCC00"/>
  <text x="600" y="386" font-size="32" fill="#E0E0E0" font-family="monospace">.vs/  (244 MB)</text>
  <!-- 삭제 버튼 -->
  <rect x="570" y="460" width="380" height="76" rx="12" fill="#FF3333"/>
  <text x="760" y="508" font-size="44" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">Delete All</text>
</svg>
