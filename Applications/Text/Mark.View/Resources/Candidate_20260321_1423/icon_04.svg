<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c4d"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- 배경: 중립 다크 -->
  <rect width="1024" height="1024" rx="190" fill="#0E0E1A"/>
  <circle cx="512" cy="480" r="380" fill="#1A1A2E" opacity="0.6" clip-path="url(#c4d)"/>

  <!-- Layer 2: 6 테마 색상 팔레트 원형 배열 (기하학추상) -->
  <!-- 중앙 M↓ 로고 -->
  <circle cx="512" cy="480" r="72" fill="#1A1A2E" stroke="#333355" stroke-width="4"/>
  <text x="512" y="496" text-anchor="middle" font-family="Consolas,monospace" font-size="44" font-weight="bold" fill="#CCCCFF">M↓</text>

  <!-- 6개 테마 원: 정육각형 배열 -->
  <!-- Dark (상단) -->
  <circle cx="512" cy="270" r="80" fill="#1E1E2E" stroke="#CBA6F7" stroke-width="5"/>
  <text x="512" y="264" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#89B4FA">Dark</text>
  <text x="512" y="286" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#CBA6F7"># H1</text>

  <!-- GitHub (우상) -->
  <circle cx="720" cy="340" r="80" fill="#0D1117" stroke="#58A6FF" stroke-width="5"/>
  <text x="720" y="334" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#58A6FF">GitHub</text>
  <text x="720" y="356" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#56D364">## H2</text>

  <!-- Nord (우하) -->
  <circle cx="720" cy="590" r="80" fill="#2E3440" stroke="#88C0D0" stroke-width="5"/>
  <text x="720" y="584" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#88C0D0">Nord</text>
  <text x="720" y="606" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#A3BE8C">## H2</text>

  <!-- Dracula (하단) -->
  <circle cx="512" cy="660" r="80" fill="#282A36" stroke="#FF79C6" stroke-width="5"/>
  <text x="512" y="654" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#FF79C6">Dracula</text>
  <text x="512" y="676" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#BD93F9">## H2</text>

  <!-- Sepia (좌하) -->
  <circle cx="304" cy="590" r="80" fill="#F4ECD8" stroke="#7C4B00" stroke-width="5"/>
  <text x="304" y="584" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#7C4B00">Sepia</text>
  <text x="304" y="606" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#6B3C1A">## H2</text>

  <!-- Light (좌상) -->
  <circle cx="304" cy="340" r="80" fill="#FFFFFF" stroke="#0969DA" stroke-width="5"/>
  <text x="304" y="334" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#0969DA">Light</text>
  <text x="304" y="356" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#1A7F37">## H2</text>

  <!-- 연결선들 (중앙에서 각 원으로) -->
  <line x1="512" y1="408" x2="512" y2="350" stroke="#333355" stroke-width="3" opacity="0.5"/>
  <line x1="574" y1="444" x2="646" y2="403" stroke="#333355" stroke-width="3" opacity="0.5"/>
  <line x1="574" y1="516" x2="646" y2="557" stroke="#333355" stroke-width="3" opacity="0.5"/>
  <line x1="512" y1="552" x2="512" y2="580" stroke="#333355" stroke-width="3" opacity="0.5"/>
  <line x1="450" y1="516" x2="378" y2="557" stroke="#333355" stroke-width="3" opacity="0.5"/>
  <line x1="450" y1="444" x2="378" y2="403" stroke="#333355" stroke-width="3" opacity="0.5"/>

  <!-- Layer 3: 하단 레이블 -->
  <rect x="308" y="800" width="408" height="50" rx="14" fill="#0E0E1A" opacity="0.9"/>
  <text x="512" y="831" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="24" fill="#6666AA">6 themes</text>
</svg>
