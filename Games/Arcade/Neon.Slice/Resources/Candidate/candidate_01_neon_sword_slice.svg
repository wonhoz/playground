<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="100%" style="stop-color:#001520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#aaddff"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="sliceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ccff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ccff"/>
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sword blade -->
  <path d="M310 80 L160 380 L175 390 L320 90 Z" fill="url(#bladeGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Blade edge line -->
  <line x1="310" y1="80" x2="160" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <!-- Sword guard -->
  <ellipse cx="238" cy="235" rx="28" ry="10" fill="#0088ff" filter="url(#glow)" transform="rotate(-65 238 235)"/>
  <!-- Sword handle -->
  <rect x="232" y="345" width="10" height="55" rx="4" fill="#0044aa" filter="url(#glow)" transform="rotate(-65 237 372)"/>
  <!-- Slash trail arc -->
  <path d="M120 160 Q256 80 390 170" stroke="url(#sliceGrad)" stroke-width="6" fill="none" filter="url(#glow)"/>
  <path d="M130 180 Q256 100 380 190" stroke="#00ccff" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.5"/>
  <!-- Sliced object top piece -->
  <path d="M310 200 Q350 185 370 210 Q355 235 320 230 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(-5,-8)"/>
  <!-- Sliced object bottom piece -->
  <path d="M310 200 Q350 185 370 210 Q355 235 320 230 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(8,10)"/>
  <!-- Cut spark particles -->
  <circle cx="338" cy="210" r="3" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="348" cy="198" r="2" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="360" cy="220" r="2.5" fill="#ffff00" filter="url(#glow)"/>
  <line x1="335" y1="195" x2="328" y2="185" stroke="#ffff00" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="355" y1="208" x2="365" y2="200" stroke="#ff8800" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="350" y1="225" x2="358" y2="235" stroke="#ffff00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
</svg>