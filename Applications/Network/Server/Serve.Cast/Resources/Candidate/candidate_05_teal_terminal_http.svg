<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002b36"/>
      <stop offset="100%" stop-color="#004d40"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a3a"/>
      <stop offset="100%" stop-color="#0a2020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="80" y="110" width="352" height="260" rx="12" fill="url(#screen)" stroke="#00bfa5" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="80" y="110" width="352" height="36" rx="12" fill="#004d40"/>
  <rect x="80" y="128" width="352" height="18" fill="#004d40"/>
  <circle cx="110" cy="128" r="8" fill="#ef5350" opacity="0.9"/>
  <circle cx="136" cy="128" r="8" fill="#ffd740" opacity="0.9"/>
  <circle cx="162" cy="128" r="8" fill="#69f0ae" opacity="0.9"/>
  <!-- Terminal text -->
  <text x="106" y="182" font-family="monospace" font-size="18" fill="#00e5ff">$ serve .</text>
  <text x="106" y="210" font-family="monospace" font-size="15" fill="#69f0ae">Serving on http://localhost:8080</text>
  <text x="106" y="234" font-family="monospace" font-size="15" fill="#4fc3f7">GET /index.html  <tspan fill="#69f0ae">200</tspan></text>
  <text x="106" y="258" font-family="monospace" font-size="15" fill="#4fc3f7">GET /style.css   <tspan fill="#69f0ae">200</tspan></text>
  <text x="106" y="282" font-family="monospace" font-size="15" fill="#4fc3f7">GET /app.js      <tspan fill="#69f0ae">200</tspan></text>
  <text x="106" y="306" font-family="monospace" font-size="15" fill="#4fc3f7">GET /missing     <tspan fill="#ef5350">404</tspan></text>
  <!-- Cursor blink -->
  <rect x="106" y="320" width="10" height="18" rx="1" fill="#00e5ff" opacity="0.9"/>
  <!-- Base stand -->
  <rect x="216" y="370" width="80" height="16" rx="4" fill="#004d40" stroke="#00bfa5" stroke-width="1.5"/>
  <rect x="196" y="382" width="120" height="16" rx="6" fill="#004d40" stroke="#00bfa5" stroke-width="1.5"/>
  <!-- Network icon bottom -->
  <path d="M210 432 Q256 415 302 432" stroke="#00bfa5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M230 450 Q256 438 282 450" stroke="#00bfa5" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="256" cy="460" r="7" fill="#00bfa5"/>
</svg>
