<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg09" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9D174D"/>
      <stop offset="100%" stop-color="#3D0020"/>
    </radialGradient>
    <radialGradient id="center09" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </radialGradient>
    <linearGradient id="petal09a" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#FBCFE8"/>
    </linearGradient>
    <linearGradient id="petal09b" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <clipPath id="clip09">
      <rect width="1024" height="1024" rx="190"/>
