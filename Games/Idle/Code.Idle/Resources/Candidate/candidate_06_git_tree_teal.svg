<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00352E"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Git tree lines -->
  <line x1="186" y1="140" x2="186" y2="380" stroke="#4DB6AC" stroke-width="4"/>
  <line x1="186" y1="220" x2="310" y2="220" stroke="#4DB6AC" stroke-width="4"/>
  <line x1="310" y1="220" x2="310" y2="310" stroke="#4DB6AC" stroke-width="4"/>
  <line x1="186" y1="310" x2="310" y2="310" stroke="#4DB6AC" stroke-width="4"/>
  <!-- Commit nodes -->
  <circle cx="186" cy="150" r="16" fill="#26A69A" stroke="#80CBC4" stroke-width="3"/>
  <circle cx="186" cy="220" r="16" fill="#26A69A" stroke="#80CBC4" stroke-width="3"/>
  <circle cx="310" cy="220" r="16" fill="#80CBC4" stroke="#B2DFDB" stroke-width="3"/>
  <circle cx="186" cy="290" r="16" fill="#26A69A" stroke="#80CBC4" stroke-width="3"/>
  <circle cx="310" cy="290" r="16" fill="#80CBC4" stroke="#B2DFDB" stroke-width="3"/>
  <circle cx="186" cy="360" r="16" fill="#26A69A" stroke="#80CBC4" stroke-width="3"/>
  <!-- Commit labels -->
  <rect x="212" y="142" width="100" height="16" rx="5" fill="#00695C"/>
  <rect x="212" y="212" width="80" height="16" rx="5" fill="#00695C"/>
  <rect x="332" y="212" width="80" height="16" rx="5" fill="#004D40"/>
  <rect x="212" y="282" width="90" height="16" rx="5" fill="#00695C"/>
  <rect x="332" y="282" width="70" height="16" rx="5" fill="#004D40"/>
  <rect x="212" y="352" width="95" height="16" rx="5" fill="#00695C"/>
  <!-- XP counter on main branch -->
  <rect x="116" y="130" width="56" height="28" rx="6" fill="#00897B"/>
  <text x="144" y="149" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="Arial">+XP</text>
</svg>
