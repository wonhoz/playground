<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 라이트 블루-화이트 배경 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <clipPath id="clip03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#clip03)">
    <!-- Layer 2: 폴더 더미 (레이어드 카드) -->

    <!-- 뒤쪽 폴더들 (회색, 흐릿) -->
    <!-- 맨 뒤 3번째 폴더 -->
    <rect x="160" y="200" width="340" height="280" rx="24" fill="#90A4AE" opacity="0.5"/>
    <rect x="160" y="170" width="140" height="50" rx="14" fill="#90A4AE" opacity="0.5"/>
    <text x="330" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#FFFFFF" opacity="0.6" text-anchor="middle">obj</text>
    <text x="330" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#FFFFFF" opacity="0.5" text-anchor="middle">128 MB</text>

    <!-- 2번째 폴더 -->
    <rect x="240" y="240" width="340" height="280" rx="24" fill="#78909C"/>
    <rect x="240" y="210" width="140" height="50" rx="14" fill="#78909C"/>
    <text x="410" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#ECEFF1" text-anchor="middle">bin</text>
    <text x="410" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#CFD8DC" text-anchor="middle">256 MB</text>

    <!-- 앞 1번째 폴더 (강조) -->
    <rect x="330" y="280" width="380" height="300" rx="28" fill="#1565C0"/>
    <rect x="330" y="248" width="160" height="56" rx="16" fill="#1565C0"/>
    <!-- 빈 폴더 아이콘 느낌 -->
    <text x="520" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="100" text-anchor="middle">📁</text>
    <text x="520" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#BBDEFB" text-anchor="middle">빈 폴더</text>
    <text x="520" y="568" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="#FFFFFF" text-anchor="middle">0 B</text>

    <!-- Layer 3: 선택 체크박스들 -->
    <!-- 왼쪽 폴더 체크 -->
    <circle cx="196" cy="196" r="32" fill="#F44336"/>
    <text x="196" y="210" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">✓</text>
    <!-- 가운데 폴더 체크 -->
    <circle cx="276" cy="236" r="32" fill="#F44336"/>
    <text x="276" y="250" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">✓</text>
    <!-- 앞 폴더 체크 -->
    <circle cx="366" cy="276" r="36" fill="#F44336"/>
    <text x="366" y="292" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">✓</text>

    <!-- 총 절약 용량 배지 -->
    <rect x="130" y="660" width="420" height="100" rx="28" fill="#E53935"/>
    <text x="340" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#FFCDD2" text-anchor="middle">절약 공간</text>
    <text x="340" y="746" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">384 MB</text>

    <!-- 폴더 수 배지 -->
    <rect x="588" y="660" width="290" height="100" rx="28" fill="#1565C0"/>
    <text x="733" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#BBDEFB" text-anchor="middle">폴더 수</text>
    <text x="733" y="746" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">3개</text>

    <!-- 하단 타이틀 -->
    <rect x="190" y="840" width="644" height="78" rx="22" fill="#1565C0"/>
    <text x="512" y="894" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">FOLDER PURGE</text>
  </g>
</svg>
