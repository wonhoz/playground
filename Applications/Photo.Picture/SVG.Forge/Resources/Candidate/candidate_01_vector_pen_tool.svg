<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="path" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vector path curve -->
  <path d="M80 380 C120 200 200 100 256 160 C312 220 360 140 440 120" stroke="url(#path)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Anchor points -->
  <rect x="68" y="368" width="24" height="24" rx="4" fill="white" stroke="url(#path)" stroke-width="2"/>
  <rect x="244" y="148" width="24" height="24" rx="4" fill="white" stroke="url(#path)" stroke-width="2"/>
  <rect x="428" y="108" width="24" height="24" rx="4" fill="white" stroke="url(#path)" stroke-width="2"/>
  <!-- Control handles -->
  <line x1="80" y1="380" x2="120" y2="280" stroke="white" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="120" cy="280" r="5" fill="url(#path)" opacity="0.7"/>
  <line x1="256" y1="160" x2="210" y2="120" stroke="white" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="210" cy="120" r="5" fill="url(#path)" opacity="0.7"/>
  <line x1="256" y1="160" x2="310" y2="110" stroke="white" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="310" cy="110" r="5" fill="url(#path)" opacity="0.7"/>
  <!-- Pen tool icon -->
  <g transform="translate(300,300)" filter="url(#glow)">
    <path d="M0 100 L20 0 L100 20 Z" fill="url(#pen)" opacity="0.9"/>
    <path d="M20 0 L100 20 L60 60 Z" fill="url(#pen)" opacity="0.7"/>
    <circle cx="20" cy="0" r="8" fill="white"/>
  </g>
</svg>