<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | QR 생성기 UI — URL 입력 + QR 코드 미리보기 + 색상 설정 | 공간/장면 | 하늘+파랑+흰 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Window -->
  <rect x="70" y="100" width="884" height="820" rx="20" fill="white" filter="url(#sh1)"/>
  <!-- Title bar -->
  <rect x="70" y="100" width="884" height="60" rx="20" fill="#1565C0"/>
  <rect x="70" y="136" width="884" height="24" fill="#1565C0"/>
  <text x="512" y="131" font-family="Arial Black, sans-serif" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">QR.Forge — QR 코드 생성기</text>

  <!-- Left: Input panel -->
  <!-- Type selector tabs -->
  <rect x="86" y="180" width="100" height="38" rx="8" fill="#1565C0"/>
  <text x="136" y="199" font-family="Arial, sans-serif" font-size="16" fill="white"
        text-anchor="middle" dominant-baseline="middle">URL</text>
  <rect x="192" y="180" width="100" height="38" rx="8" fill="#E3F2FD"/>
  <text x="242" y="199" font-family="Arial, sans-serif" font-size="16" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">WiFi</text>
  <rect x="298" y="180" width="110" height="38" rx="8" fill="#E3F2FD"/>
  <text x="353" y="199" font-family="Arial, sans-serif" font-size="16" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">VCard</text>

  <!-- URL input -->
  <text x="86" y="240" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">URL 입력</text>
  <rect x="86" y="248" width="490" height="44" rx="10" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="102" y="270" font-family="Consolas, monospace" font-size="18" fill="#212121"
        dominant-baseline="middle">https://example.com/landing</text>

  <!-- Style options -->
  <text x="86" y="316" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">스타일</text>
  <!-- Foreground color -->
  <rect x="86" y="324" width="140" height="44" rx="10" fill="#212121" filter="url(#sh1)"/>
  <text x="156" y="346" font-family="Arial, sans-serif" font-size="14" fill="white"
        text-anchor="middle" dominant-baseline="middle">전경색 #212121</text>
  <!-- Background color -->
  <rect x="240" y="324" width="140" height="44" rx="10" fill="white" filter="url(#sh1)"/>
  <rect x="240" y="324" width="140" height="44" rx="10" fill="none" stroke="#E0E0E0" stroke-width="2"/>
  <text x="310" y="346" font-family="Arial, sans-serif" font-size="14" fill="#546E7A"
        text-anchor="middle" dominant-baseline="middle">배경색 #FFFFFF</text>

  <!-- Error correction -->
  <text x="86" y="394" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">오류 정정</text>
  <rect x="86" y="402" width="60" height="36" rx="8" fill="#1565C0"/>
  <text x="116" y="420" font-family="Arial, sans-serif" font-size="16" fill="white"
        text-anchor="middle" dominant-baseline="middle">M</text>
  <rect x="152" y="402" width="60" height="36" rx="8" fill="#E3F2FD"/>
  <text x="182" y="420" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle" dominant-baseline="middle">L</text>
  <rect x="218" y="402" width="60" height="36" rx="8" fill="#E3F2FD"/>
  <text x="248" y="420" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle" dominant-baseline="middle">Q</text>
  <rect x="284" y="402" width="60" height="36" rx="8" fill="#E3F2FD"/>
  <text x="314" y="420" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle" dominant-baseline="middle">H</text>

  <!-- Generate button -->
  <rect x="86" y="460" width="280" height="50" rx="14" fill="#43A047" filter="url(#sh1)"/>
  <text x="226" y="485" font-family="Arial Black, sans-serif" font-size="22" fill="white"
        text-anchor="middle" dominant-baseline="middle">QR 생성</text>

  <!-- Right: QR code preview -->
  <!-- QR code (simplified grid) -->
  <rect x="620" y="175" width="310" height="310" rx="14" fill="white" filter="url(#sh1)"/>

  <!-- QR code modules (simplified visual) -->
  <!-- Position detection markers: top-left -->
  <rect x="636" y="191" width="84" height="84" rx="6" fill="#212121"/>
  <rect x="648" y="203" width="60" height="60" rx="4" fill="white"/>
  <rect x="660" y="215" width="36" height="36" rx="2" fill="#212121"/>

  <!-- Top-right marker -->
  <rect x="810" y="191" width="84" height="84" rx="6" fill="#212121"/>
  <rect x="822" y="203" width="60" height="60" rx="4" fill="white"/>
  <rect x="834" y="215" width="36" height="36" rx="2" fill="#212121"/>

  <!-- Bottom-left marker -->
  <rect x="636" y="365" width="84" height="84" rx="6" fill="#212121"/>
  <rect x="648" y="377" width="60" height="60" rx="4" fill="white"/>
  <rect x="660" y="389" width="36" height="36" rx="2" fill="#212121"/>

  <!-- Data modules (simplified dots grid) -->
  <rect x="740" y="191" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="760" y="191" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="740" y="211" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="780" y="191" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="760" y="211" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="740" y="231" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="636" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="656" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="676" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="736" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="756" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="796" y="291" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="636" y="311" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="676" y="311" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="716" y="311" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="756" y="311" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="796" y="311" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="636" y="331" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="656" y="331" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="696" y="331" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="736" y="331" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="776" y="331" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="810" y="291" width="84" height="14" rx="2" fill="#212121" opacity="0.7"/>
  <rect x="740" y="365" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="760" y="365" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="800" y="365" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="820" y="365" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="740" y="385" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="780" y="385" width="14" height="14" rx="2" fill="#212121"/>
  <rect x="800" y="385" width="14" height="14" rx="2" fill="#212121"/>

  <!-- Save button under QR -->
  <rect x="620" y="506" width="310" height="44" rx="14" fill="#1565C0" filter="url(#sh1)"/>
  <text x="775" y="528" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">PNG 저장</text>

  <!-- Batch mode hint -->
  <rect x="86" y="540" width="490" height="80" rx="14" fill="#E3F2FD" filter="url(#sh1)"/>
  <text x="331" y="572" font-family="Arial, sans-serif" font-size="18" fill="#1565C0"
        text-anchor="middle">배치 모드: CSV/Excel에서 대량 생성</text>
  <text x="331" y="596" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle">URL × 100 → QR × 100 한 번에</text>
</svg>
