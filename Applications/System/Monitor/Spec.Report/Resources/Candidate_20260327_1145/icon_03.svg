<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF0"/>
      <stop offset="100%" stop-color="#FEF9C3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Report document with colored sections -->
  <rect x="200" y="175" width="624" height="700" rx="20" fill="#FFFFFF" stroke="#FCD34D" stroke-width="8"/>
  <!-- Document top fold -->
  <path d="M724,175 L824,275 L724,275 Z" fill="#FEF9C3" stroke="#FCD34D" stroke-width="8"/>
  <rect x="724" y="175" width="100" height="100" rx="0" fill="#FEF9C3"/>
  <!-- Title section -->
  <rect x="220" y="195" width="484" height="70" rx="10" fill="#FDE047"/>
  <text x="462" y="242" font-family="Arial,sans-serif" font-size="44" fill="#713F12" font-weight="bold" text-anchor="middle">System Report</text>
  <!-- CPU section -->
  <rect x="220" y="284" width="16" height="80" rx="4" fill="#3B82F6"/>
  <text x="252" y="314" font-family="Arial,sans-serif" font-size="38" fill="#1E40AF" font-weight="bold">CPU</text>
  <text x="252" y="356" font-family="Arial,sans-serif" font-size="32" fill="#374151">Intel i9-14900K  24C/32T</text>
  <!-- RAM section -->
  <rect x="220" y="382" width="16" height="80" rx="4" fill="#10B981"/>
  <text x="252" y="412" font-family="Arial,sans-serif" font-size="38" fill="#047857" font-weight="bold">RAM</text>
  <text x="252" y="454" font-family="Arial,sans-serif" font-size="32" fill="#374151">64 GB DDR5-6000 MHz</text>
  <!-- GPU section -->
  <rect x="220" y="480" width="16" height="80" rx="4" fill="#8B5CF6"/>
  <text x="252" y="510" font-family="Arial,sans-serif" font-size="38" fill="#6D28D9" font-weight="bold">GPU</text>
  <text x="252" y="552" font-family="Arial,sans-serif" font-size="32" fill="#374151">NVIDIA RTX 4090  24 GB</text>
  <!-- Disk section -->
  <rect x="220" y="578" width="16" height="80" rx="4" fill="#F59E0B"/>
  <text x="252" y="608" font-family="Arial,sans-serif" font-size="38" fill="#B45309" font-weight="bold">Disk</text>
  <text x="252" y="650" font-family="Arial,sans-serif" font-size="32" fill="#374151">Samsung 990 Pro  2 TB</text>
