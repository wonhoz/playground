<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001433"/>
      <stop offset="100%" stop-color="#000a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Electron orbits -->
  <ellipse cx="256" cy="256" rx="200" ry="70" fill="none" stroke="#00aaff" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="200" ry="70" fill="none" stroke="#00aaff" stroke-width="2.5" opacity="0.7" filter="url(#glow)" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="200" ry="70" fill="none" stroke="#00aaff" stroke-width="2.5" opacity="0.7" filter="url(#glow)" transform="rotate(-60 256 256)"/>
  <!-- Nucleus -->
  <circle cx="256" cy="256" r="40" fill="#001a44" stroke="#00aaff" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="28" fill="#0033aa" opacity="0.8"/>
  <!-- Proton dots in nucleus -->
  <circle cx="248" cy="248" r="6" fill="#ff4444"/>
  <circle cx="264" cy="248" r="6" fill="#ff4444"/>
  <circle cx="248" cy="264" r="6" fill="#888"/>
  <circle cx="264" cy="264" r="6" fill="#ff4444"/>
  <!-- Electrons -->
  <circle cx="456" cy="256" r="14" fill="#00ffff" filter="url(#glow)"/>
  <circle cx="152" cy="160" r="14" fill="#00ffff" filter="url(#glow)" transform="rotate(60 256 256)"/>
  <circle cx="360" cy="352" r="14" fill="#00ffff" filter="url(#glow)" transform="rotate(-60 256 256)"/>
  <!-- Circuit break overlay at one orbit -->
  <path d="M256,56 Q370,56 410,156" fill="none" stroke="#ff4400" stroke-width="3" stroke-dasharray="10 6" opacity="0.8"/>
  <circle cx="340" cy="80" r="10" fill="#ff4400" opacity="0.7" filter="url(#glow)"/>
</svg>