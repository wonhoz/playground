    <line x1="145" y1="165" x2="367" y2="165" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="161" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">P</text>
  </g>

