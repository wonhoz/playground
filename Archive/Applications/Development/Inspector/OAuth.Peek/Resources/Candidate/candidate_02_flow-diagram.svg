<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Client box -->
  <rect x="40" y="100" width="100" height="50" rx="8" fill="#1e1e4e" stroke="#4488ff" stroke-width="2"/>
  <text x="90" y="131" text-anchor="middle" font-family="monospace" font-size="12" fill="#4488ff">Client</text>
  <!-- Auth Server -->
  <rect x="206" y="100" width="100" height="50" rx="8" fill="#1e2e1e" stroke="#44ff88" stroke-width="2"/>
  <text x="256" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#44ff88">Auth</text>
  <text x="256" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#44ff88">Server</text>
  <!-- Resource Server -->
  <rect x="372" y="100" width="100" height="50" rx="8" fill="#2e1e1e" stroke="#ff8844" stroke-width="2"/>
  <text x="422" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff8844">Resource</text>
  <text x="422" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff8844">Server</text>
  <!-- Arrows -->
  <!-- 1: Auth Request -->
  <line x1="140" y1="118" x2="206" y2="118" stroke="#4488ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="173" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#4488ff">1.Auth Req</text>
  <!-- 2: Auth Code -->
  <line x1="206" y1="132" x2="140" y2="132" stroke="#44ff88" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="173" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#44ff88">2.Code</text>
  <!-- 3: Token Request -->
  <path d="M140,130 Q140,220 206,220" fill="none" stroke="#aaaaff" stroke-width="2"/>
  <text x="120" y="200" font-family="monospace" font-size="9" fill="#aaaaff">3.Token Req</text>
  <!-- 4: Access Token -->
  <path d="M206,230 Q140,230 140,160" fill="none" stroke="#ffff44" stroke-width="2"/>
  <text x="120" y="250" font-family="monospace" font-size="9" fill="#ffff44">4.Token</text>
  <!-- 5: API Call -->
  <line x1="306" y1="118" x2="372" y2="118" stroke="#ff8844" stroke-width="2"/>
  <text x="339" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff8844">5.API</text>
  <!-- Peek magnifier -->
  <circle cx="256" cy="300" r="70" fill="none" stroke="#ffff44" stroke-width="4"/>
  <line x1="310" y1="354" x2="360" y2="404" stroke="#ffff44" stroke-width="8" stroke-linecap="round"/>
  <!-- JWT inside lens -->
  <text x="256" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffff44">access_token</text>
  <text x="256" y="308" text-anchor="middle" font-family="monospace" font-size="9" fill="#88ff88">exp: 3600</text>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#4488ff">OAUTH.PEEK</text>
</svg>
