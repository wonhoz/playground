<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timer clock -->
  <circle cx="256" cy="220" r="152" fill="#B71C1C" stroke="url(#clock)" stroke-width="10"/>
  <circle cx="256" cy="220" r="132" fill="#C62828"/>
  <!-- Clock tick marks -->
  <line x1="256" y1="76" x2="256" y2="96" stroke="#EF9A9A" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="344" x2="256" y2="364" stroke="#EF9A9A" stroke-width="6" stroke-linecap="round"/>
  <line x1="108" y1="220" x2="128" y2="220" stroke="#EF9A9A" stroke-width="6" stroke-linecap="round"/>
  <line x1="384" y1="220" x2="404" y2="220" stroke="#EF9A9A" stroke-width="6" stroke-linecap="round"/>
  <!-- Progress arc (~75%) -->
  <path d="M 256,88 A 132,132 0 1 1 124,186" fill="none" stroke="#FF5252" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <!-- Center hub -->
  <circle cx="256" cy="220" r="16" fill="#EF5350"/>
  <!-- Hour/minute hands -->
  <line x1="256" y1="220" x2="256" y2="124" stroke="#FFCDD2" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="220" x2="320" y2="220" stroke="#FFCDD2" stroke-width="6" stroke-linecap="round"/>
  <!-- Timer buttons at top -->
  <rect x="200" y="52" width="28" height="28" rx="14" fill="#EF5350" stroke="#FFCDD2" stroke-width="4"/>
  <rect x="284" y="52" width="28" height="28" rx="14" fill="#EF5350" stroke="#FFCDD2" stroke-width="4"/>
  <rect x="234" y="40" width="44" height="16" rx="4" fill="#EF9A9A"/>
  <!-- Notification card below -->
  <rect x="64" y="388" width="384" height="96" rx="16" fill="#B71C1C" stroke="#EF9A9A" stroke-width="5"/>
  <circle cx="112" cy="436" r="28" fill="#C62828" stroke="#EF5350" stroke-width="4"/>
  <!-- Bell in circle -->
  <path d="M 112,422 A 14,14 0 0,1 126,436 L 126,444 L 98,444 L 98,436 A 14,14 0 0,1 112,422 Z" fill="#EF9A9A"/>
  <circle cx="112" cy="448" r="5" fill="#EF9A9A"/>
  <rect x="105" y="419" width="14" height="5" rx="2" fill="#EF9A9A"/>
  <rect x="152" y="416" width="200" height="10" rx="5" fill="#FFCDD2" opacity="0.9"/>
  <rect x="152" y="434" width="160" height="8" rx="4" fill="#EF9A9A" opacity="0.7"/>
  <rect x="152" y="450" width="180" height="8" rx="4" fill="#EF9A9A" opacity="0.6"/>
</svg>
