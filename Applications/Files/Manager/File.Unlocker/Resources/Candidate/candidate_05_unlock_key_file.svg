<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <linearGradient id="file" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- file -->
  <path d="M260 160 L360 160 L400 200 L400 380 L260 380 Z" fill="url(#file)"/>
  <path d="M360 160 L360 200 L400 200" fill="#6a1b9a" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="285" y="240" width="90" height="10" rx="5" fill="#f3e5f5" opacity="0.5"/>
  <rect x="285" y="260" width="70" height="10" rx="5" fill="#f3e5f5" opacity="0.35"/>
  <!-- key -->
  <circle cx="155" cy="230" r="55" fill="none" stroke="url(#key)" stroke-width="22" filter="url(#glow)"/>
  <circle cx="155" cy="230" r="25" fill="none" stroke="url(#key)" stroke-width="12"/>
  <line x1="155" y1="285" x2="155" y2="380" stroke="url(#key)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
  <rect x="155" y="330" width="35" height="15" rx="4" fill="url(#key)"/>
  <rect x="155" y="355" width="25" height="12" rx="3" fill="url(#key)"/>
  <!-- glow aura around key -->
  <circle cx="155" cy="230" r="70" fill="none" stroke="#ffd54f" stroke-width="3" opacity="0.2"/>
</svg>
