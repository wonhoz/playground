<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020010"/>
      <stop offset="100%" stop-color="#08001f"/>
    </linearGradient>
    <linearGradient id="clefGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#ff9500"/>
      <stop offset="70%" stop-color="#ff4d94"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="starfield" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0840" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#020010" stop-opacity="0"/>
    </radialGradient>
    <filter id="clefGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cosmic nebula bg -->
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="url(#starfield)"/>
  <!-- Stars -->
  <circle cx="90" cy="100" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="160" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="120" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="430" cy="200" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="380" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="440" cy="380" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="430" r="1" fill="#ffd700" opacity="0.4"/>
  <circle cx="330" cy="420" r="1.5" fill="#fff" opacity="0.4"/>
  <!-- Staff lines -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="222" x2="432" y2="222" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="244" x2="432" y2="244" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="266" x2="432" y2="266" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="288" x2="432" y2="288" stroke="#333" stroke-width="1.5"/>
  <!-- Treble clef (simplified elegant path) -->
  <path d="M220 370 C220 395 235 410 255 405 C280 398 290 378 282 358 C274 340 255 332 240 338 C218 346 210 372 215 395 C222 428 248 448 270 445 C302 440 318 415 315 383 C312 355 295 310 280 270 C268 235 260 175 268 140 C275 110 296 95 308 105 C320 115 316 140 302 148 C288 156 272 148 270 135" fill="none" stroke="url(#clefGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#clefGlow)"/>
  <!-- Cosmic glow dots along clef -->
  <circle cx="256" cy="403" r="8" fill="#ffd700" fill-opacity="0.5" filter="url(#clefGlow)"/>
  <circle cx="268" cy="270" r="6" fill="#ff4d94" fill-opacity="0.5" filter="url(#clefGlow)"/>
  <circle cx="270" cy="140" r="7" fill="#a855f7" fill-opacity="0.5" filter="url(#clefGlow)"/>
  <!-- Floating musical notes (small) -->
  <g transform="translate(360, 190)" filter="url(#clefGlow)">
    <ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffd700" transform="rotate(-20)"/>
    <line x1="9" y1="-1" x2="9" y2="-38" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="9" y1="-38" x2="25" y2="-32" stroke="#ffd700" stroke-width="2"/>
  </g>
  <g transform="translate(125, 310)" filter="url(#clefGlow)">
    <ellipse cx="0" cy="0" rx="9" ry="7" fill="#a855f7" transform="rotate(-20)"/>
    <line x1="9" y1="-1" x2="9" y2="-38" stroke="#a855f7" stroke-width="2.5"/>
    <line x1="9" y1="-38" x2="25" y2="-32" stroke="#a855f7" stroke-width="2"/>
  </g>
  <!-- Orbit rings around clef -->
  <ellipse cx="256" cy="256" rx="185" ry="60" fill="none" stroke="url(#clefGrad)" stroke-width="1" opacity="0.2" transform="rotate(-15 256 256)"/>
  <ellipse cx="256" cy="256" rx="170" ry="50" fill="none" stroke="url(#clefGrad)" stroke-width="1" opacity="0.15" transform="rotate(20 256 256)"/>
</svg>