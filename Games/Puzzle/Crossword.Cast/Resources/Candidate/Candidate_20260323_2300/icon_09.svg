<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F6212"/>
      <stop offset="100%" stop-color="#365314"/>
    </linearGradient>
    <linearGradient id="book09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <clipPath id="clip09">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg09)"/>
  <g clip-path="url(#clip09)">
    <!-- Layer 2: 책 모양 -->
    <!-- 책 본체 좌 페이지 -->
    <rect x="150" y="220" width="300" height="430" fill="url(#book09)" rx="12"/>
    <!-- 책 본체 우 페이지 -->
    <rect x="574" y="220" width="300" height="430" fill="url(#book09)" rx="12"/>
    <!-- 책 척추(중앙) -->
    <rect x="450" y="200" width="124" height="470" fill="#FDE68A" rx="8"/>
    <!-- 페이지 라인들 (왼쪽) -->
    <line x1="190" y1="310" x2="420" y2="310" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="360" x2="420" y2="360" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="410" x2="420" y2="410" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="460" x2="420" y2="460" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="510" x2="420" y2="510" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="560" x2="420" y2="560" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <!-- 페이지 라인들 (오른쪽) — 격자 패턴으로 -->
    <line x1="604" y1="310" x2="834" y2="310" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="604" y1="360" x2="834" y2="360" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="604" y1="410" x2="834" y2="410" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="604" y1="460" x2="834" y2="460" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="604" y1="510" x2="834" y2="510" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <line x1="604" y1="560" x2="834" y2="560" stroke="#3F6212" stroke-width="6" stroke-linecap="round"/>
    <!-- 세로 라인 (우측 사전 느낌) -->
    <line x1="670" y1="280" x2="670" y2="620" stroke="#3F6212" stroke-width="4" stroke-linecap="round"/>
    <line x1="740" y1="280" x2="740" y2="620" stroke="#3F6212" stroke-width="4" stroke-linecap="round"/>
    <!-- Layer 3: 텍스트 + 격자 강조 -->
    <!-- 왼쪽 페이지에 글자 힌트 스타일 -->
    <text x="200" y="290" font-family="Arial Black, sans-serif" font-size="32" fill="#1a3a0a">1.</text>
    <text x="240" y="290" font-family="Arial, sans-serif" font-size="30" fill="#1a3a0a">가로 단어</text>
    <text x="200" y="390" font-family="Arial Black, sans-serif" font-size="32" fill="#1a3a0a">2.</text>
    <text x="240" y="390" font-family="Arial, sans-serif" font-size="30" fill="#1a3a0a">세로 단어</text>
    <text x="200" y="490" font-family="Arial Black, sans-serif" font-size="32" fill="#1a3a0a">3.</text>
    <text x="240" y="490" font-family="Arial, sans-serif" font-size="30" fill="#1a3a0a">힌트</text>
    <!-- 오른쪽 페이지에 격자 미니 -->
    <rect x="614" y="330" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="674" y="330" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="734" y="330" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="614" y="390" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="674" y="390" width="50" height="50" fill="#FDE68A" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="734" y="390" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="614" y="450" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="674" y="450" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <rect x="734" y="450" width="50" height="50" fill="none" stroke="#1a3a0a" stroke-width="4" rx="4"/>
    <!-- 책 제목 아래 -->
    <rect x="200" y="710" width="624" height="130" fill="rgba(134,239,172,0.2)" stroke="#86EFAC" stroke-width="6" rx="16"/>
    <text x="512" y="778" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">DICTIONARY</text>
  </g>
</svg>
