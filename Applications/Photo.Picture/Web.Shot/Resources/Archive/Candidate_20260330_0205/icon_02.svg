<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 청록 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg2)"/>

  <!-- Layer 2: 배치 URL 목록 → PNG 파일들 -->
  <!-- URL 입력 목록 (왼쪽) -->
  <rect x="60" y="180" width="420" height="580" rx="18" fill="#006064" opacity="0.9"/>
  <text x="270" y="228" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#80DEEA" text-anchor="middle" dominant-baseline="middle">URL List</text>
  <rect x="82" y="252" width="376" height="52" rx="10" fill="#00838F"/>
  <text x="270" y="280" font-family="'Courier New',monospace" font-size="22" fill="#E0F7FA" text-anchor="middle" dominant-baseline="middle">https://github.com</text>
  <rect x="82" y="314" width="376" height="52" rx="10" fill="#00838F" opacity="0.85"/>
  <text x="270" y="342" font-family="'Courier New',monospace" font-size="22" fill="#E0F7FA" text-anchor="middle" dominant-baseline="middle">https://google.com</text>
  <rect x="82" y="376" width="376" height="52" rx="10" fill="#00838F" opacity="0.7"/>
  <text x="270" y="404" font-family="'Courier New',monospace" font-size="22" fill="#E0F7FA" text-anchor="middle" dominant-baseline="middle">https://reddit.com</text>
  <rect x="82" y="438" width="376" height="52" rx="10" fill="#00838F" opacity="0.6"/>
  <text x="270" y="466" font-family="'Courier New',monospace" font-size="22" fill="#B2EBF2" text-anchor="middle" dominant-baseline="middle">https://news.ycombinator…</text>
  <!-- 진행 바 -->
  <rect x="82" y="560" width="376" height="20" rx="10" fill="#004D40"/>
  <rect x="82" y="560" width="240" height="20" rx="10" fill="#26C6DA"/>
  <text x="270" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#80DEEA" text-anchor="middle" dominant-baseline="middle">3 / 4 captured</text>

  <!-- 화살표 -->
  <text x="512" y="470" font-family="'Segoe UI',Arial,sans-serif" font-size="64" fill="#00838F" text-anchor="middle" dominant-baseline="middle">→</text>

  <!-- PNG 결과 파일들 (오른쪽) -->
  <rect x="564" y="180" width="400" height="120" rx="14" fill="#00897B" opacity="0.9"/>
  <text x="764" y="242" font-family="'Courier New',monospace" font-size="24" fill="#E0F2F1" text-anchor="middle" dominant-baseline="middle">github_com.png</text>
  <rect x="564" y="316" width="400" height="120" rx="14" fill="#00897B" opacity="0.85"/>
  <text x="764" y="378" font-family="'Courier New',monospace" font-size="24" fill="#E0F2F1" text-anchor="middle" dominant-baseline="middle">google_com.png</text>
  <rect x="564" y="452" width="400" height="120" rx="14" fill="#00897B" opacity="0.7"/>
  <text x="764" y="514" font-family="'Courier New',monospace" font-size="24" fill="#E0F2F1" text-anchor="middle" dominant-baseline="middle">reddit_com.png</text>

  <!-- Layer 3: 배치 배지 -->
  <rect x="200" y="810" width="624" height="74" rx="20" fill="#00695C"/>
  <text x="512" y="850" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" dominant-baseline="middle">Batch Capture ×4</text>
</svg>
