<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1A0D00"/>
      <stop offset="100%" stop-color="#0D0600"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <radialGradient id="signal" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Broadcast signal rings -->
  <g fill="none" stroke="url(#orange)" stroke-linecap="round">
    <path d="M 140 180 A 130 130 0 0 1 372 180" stroke-width="18" opacity="0.8"/>
    <path d="M 166 208 A 96 96 0 0 1 346 208" stroke-width="16" opacity="0.65"/>
    <path d="M 192 236 A 62 62 0 0 1 320 236" stroke-width="14" opacity="0.5"/>
  </g>
  <!-- Antenna tower -->
  <line x1="256" y1="270" x2="256" y2="350" stroke="url(#orange)" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="200" y2="400" stroke="url(#orange)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="312" y2="400" stroke="url(#orange)" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="400" x2="312" y2="400" stroke="url(#orange)" stroke-width="8" stroke-linecap="round"/>
  <!-- Schedule grid -->
  <rect x="110" y="390" width="80" height="14" rx="4" fill="url(#orange)" opacity="0.5"/>
  <rect x="200" y="390" width="60" height="14" rx="4" fill="url(#orange)" opacity="0.7"/>
  <rect x="270" y="390" width="90" height="14" rx="4" fill="url(#orange)" opacity="0.4"/>
  <rect x="370" y="390" width="40" height="14" rx="4" fill="url(#orange)" opacity="0.6"/>
  <!-- Signal dot at top of antenna -->
  <circle cx="256" cy="262" r="16" fill="url(#orange)"/>
  <circle cx="256" cy="262" r="30" fill="url(#signal)"/>
</svg>
