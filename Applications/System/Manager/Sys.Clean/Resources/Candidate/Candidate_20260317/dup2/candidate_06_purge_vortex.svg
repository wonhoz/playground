<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#311b92"/>
      <stop offset="100%" style="stop-color:#0d0020"/>
    </radialGradient>
    <radialGradient id="vortex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="50%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#311b92;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vortex spiral arms -->
  <path d="M256 256 Q300 200 340 220 Q380 240 360 280 Q340 320 296 316 Q252 312 240 280 Q228 248 256 256" stroke="#ea80fc" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M256 256 Q210 200 180 230 Q150 260 170 296 Q190 332 228 328 Q266 324 270 296 Q274 268 256 256" stroke="#b388ff" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M256 256 Q280 160 320 155 Q360 150 380 196 Q400 242 380 280 Q360 318 316 326 Q272 334 250 306 Q228 278 256 256" stroke="#7c4dff" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.7"/>
  <path d="M256 256 Q200 150 155 165 Q110 180 115 232 Q120 284 165 310 Q210 336 250 318 Q290 300 286 272 Q282 244 256 256" stroke="#651fff" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
  <!-- Central core -->
  <circle cx="256" cy="256" r="25" fill="url(#vortex)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <!-- Debris being pulled in -->
  <circle cx="140" cy="160" r="7" fill="#ff6e40" opacity="0.7"/>
  <circle cx="380" cy="150" r="5" fill="#ffd740" opacity="0.6"/>
  <circle cx="400" cy="360" r="8" fill="#69f0ae" opacity="0.7"/>
  <circle cx="140" cy="380" r="6" fill="#40c4ff" opacity="0.6"/>
  <circle cx="160" cy="260" r="4" fill="#ea80fc" opacity="0.5"/>
  <!-- Motion trail dots -->
  <circle cx="120" cy="200" r="3" fill="#b388ff" opacity="0.5"/>
  <circle cx="130" cy="190" r="2" fill="#ea80fc" opacity="0.4"/>
  <circle cx="380" cy="300" r="3" fill="#b388ff" opacity="0.5"/>
  <circle cx="395" cy="290" r="2" fill="#ea80fc" opacity="0.4"/>
</svg>