<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 초록+민트 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Q&A 말풍선 쌍 -->
  <!-- 질문 말풍선 (상단 왼쪽) -->
  <path d="M 120 200 Q 120 160 160 160 L 680 160 Q 720 160 720 200 L 720 360 Q 720 400 680 400 L 260 400 L 200 460 L 220 400 L 160 400 Q 120 400 120 360 Z" fill="white" opacity="0.95"/>
  <!-- 물음표 + 텍스트 -->
  <text x="280" y="310" font-family="Segoe UI, sans-serif" font-size="100" font-weight="bold" fill="#00695C" text-anchor="middle">?</text>
  <text x="510" y="280" font-family="Segoe UI, sans-serif" font-size="60" fill="#00897B" text-anchor="middle">태양계에서</text>
  <text x="510" y="350" font-family="Segoe UI, sans-serif" font-size="60" fill="#00897B" text-anchor="middle">가장 큰 행성은?</text>
  <!-- 답변 말풍선 (하단 오른쪽) -->
  <path d="M 304 520 Q 304 480 344 480 L 880 480 Q 920 480 920 520 L 920 660 Q 920 700 880 700 L 764 700 L 800 760 L 744 700 L 344 700 Q 304 700 304 660 Z" fill="#FFD700" opacity="0.95"/>
  <!-- 체크 + 정답 -->
  <text x="380" y="610" font-family="Segoe UI, sans-serif" font-size="100" font-weight="bold" fill="#1B5E20" text-anchor="middle">✓</text>
  <text x="640" y="600" font-family="Segoe UI, sans-serif" font-size="70" font-weight="bold" fill="#1B5E20" text-anchor="middle">목성!</text>
  <!-- Layer 3: 점수 표시 -->
  <text x="512" y="900" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">+100 pts ✦</text>
</svg>
