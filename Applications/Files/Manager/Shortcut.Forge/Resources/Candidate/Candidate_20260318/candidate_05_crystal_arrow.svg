<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#080018"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="arrowSide" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="crystalGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 수정 화살표 - 메인 면 -->
  <polygon points="256,80 400,256 330,256 330,400 182,400 182,256 112,256" fill="url(#arrowGrad)" opacity="0.9" filter="url(#crystalGlow)"/>
  <!-- 수정 화살표 - 측면 (3D 효과) -->
  <polygon points="256,80 400,256 380,245 244,90" fill="white" opacity="0.18"/>
  <polygon points="330,256 330,400 310,388 310,248" fill="url(#arrowSide)" opacity="0.6"/>
  <!-- 수정 내부 광택 (면) -->
  <polygon points="256,80 330,256 256,230 182,256" fill="white" opacity="0.12"/>
  <!-- 수정 엣지 라인들 -->
  <polyline points="256,80 400,256 330,256 330,400 182,400 182,256 112,256 256,80" fill="none" stroke="#EDE9FE" stroke-width="2" opacity="0.6"/>
  <!-- 내부 수정 구조 -->
  <line x1="256" y1="80" x2="256" y2="400" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="256" x2="330" y2="256" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>
  <!-- 빛 굴절 -->
  <circle cx="280" cy="180" r="8" fill="white" opacity="0.2" filter="url(#glow)"/>
  <circle cx="310" cy="300" r="6" fill="#EDE9FE" opacity="0.25" filter="url(#glow)"/>
  <circle cx="200" cy="310" r="5" fill="#C4B5FD" opacity="0.2"/>
  <!-- 수정 팁 (화살촉) 글로우 -->
  <circle cx="256" cy="100" r="25" fill="#A78BFA" opacity="0.15" filter="url(#crystalGlow)"/>
  <circle cx="256" cy="100" r="12" fill="#C4B5FD" opacity="0.3" filter="url(#glow)"/>
  <!-- 파티클 (빛 반사) -->
  <circle cx="150" cy="200" r="3" fill="#EDE9FE" opacity="0.5" filter="url(#glow)"/>
  <circle cx="370" cy="200" r="3" fill="#C4B5FD" opacity="0.5" filter="url(#glow)"/>
  <circle cx="380" cy="350" r="2.5" fill="#A78BFA" opacity="0.45"/>
  <circle cx="140" cy="340" r="2.5" fill="#8B5CF6" opacity="0.45"/>
</svg>