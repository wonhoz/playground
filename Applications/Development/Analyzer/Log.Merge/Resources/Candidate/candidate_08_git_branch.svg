<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Git-style branch diagram (log streams as branches) -->
  <!-- Main trunk line -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#3FB950" stroke-width="4" filter="url(#glow)"/>
  <!-- Branch 1 left -->
  <path d="M256 160 Q200 180 180 220 Q180 280 200 300 Q220 320 256 330" stroke="#58A6FF" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- Branch 2 right -->
  <path d="M256 200 Q312 218 332 260 Q332 310 312 330 Q290 345 256 350" stroke="#FF7B72" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- Commit nodes on main -->
  <circle cx="256" cy="100" r="12" fill="#21262D" stroke="#3FB950" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="256" cy="160" r="10" fill="#3FB950" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="#3FB950" filter="url(#glow)"/>
  <circle cx="256" cy="350" r="10" fill="#3FB950" filter="url(#glow)"/>
  <circle cx="256" cy="432" r="16" fill="#21262D" stroke="#3FB950" stroke-width="3" filter="url(#glow)"/>
  <!-- Commit nodes on branch 1 -->
  <circle cx="180" cy="220" r="9" fill="#58A6FF" filter="url(#glow)"/>
  <circle cx="180" cy="280" r="9" fill="#58A6FF" filter="url(#glow)"/>
  <circle cx="200" cy="300" r="9" fill="#58A6FF" filter="url(#glow)"/>
  <!-- Commit nodes on branch 2 -->
  <circle cx="332" cy="260" r="9" fill="#FF7B72" filter="url(#glow)"/>
  <circle cx="332" cy="310" r="9" fill="#FF7B72" filter="url(#glow)"/>
  <!-- Merge commit indicator at bottom -->
  <circle cx="256" cy="432" r="16" fill="#D2A8FF" filter="url(#glow)" opacity="0.8"/>
  <text x="256" y="437" font-family="Arial Black, sans-serif" font-size="12" text-anchor="middle" fill="#1E1E2E" font-weight="900">M</text>
  <!-- Commit labels -->
  <text x="280" y="104" font-family="'Courier New', monospace" font-size="11" fill="#8B949E">HEAD</text>
  <text x="162" y="224" font-family="'Courier New', monospace" font-size="10" fill="#58A6FF" opacity="0.8">app.log</text>
  <text x="340" y="264" font-family="'Courier New', monospace" font-size="10" fill="#FF7B72" opacity="0.8">sys.log</text>
  <text x="280" y="436" font-family="'Courier New', monospace" font-size="11" fill="#D2A8FF">merged</text>
  <!-- Log lines next to main branch -->
  <rect x="80" y="88" width="80" height="6" rx="3" fill="#3FB950" opacity="0.2"/>
  <rect x="80" y="148" width="80" height="6" rx="3" fill="#3FB950" opacity="0.2"/>
  <rect x="80" y="244" width="80" height="6" rx="3" fill="#3FB950" opacity="0.2"/>
</svg>
