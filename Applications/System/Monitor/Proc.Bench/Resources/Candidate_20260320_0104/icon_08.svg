<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 로켓+프로세스: rocket with CPU body -->
  <!-- Rocket body (CPU chip shape) -->
  <rect x="412" y="380" width="200" height="280" rx="20" fill="#33691E"/>
  <!-- CPU grid on body -->
  <rect x="432" y="400" width="160" height="240" rx="12" fill="#050A00"/>
  <line x1="472" y1="400" x2="472" y2="640" stroke="#33691E" stroke-width="4"/>
  <line x1="512" y1="400" x2="512" y2="640" stroke="#33691E" stroke-width="4"/>
  <line x1="552" y1="400" x2="552" y2="640" stroke="#33691E" stroke-width="4"/>
  <line x1="432" y1="440" x2="592" y2="440" stroke="#33691E" stroke-width="4"/>
  <line x1="432" y1="480" x2="592" y2="480" stroke="#33691E" stroke-width="4"/>
  <line x1="432" y1="520" x2="592" y2="520" stroke="#33691E" stroke-width="4"/>
  <line x1="432" y1="560" x2="592" y2="560" stroke="#33691E" stroke-width="4"/>
  <line x1="432" y1="600" x2="592" y2="600" stroke="#33691E" stroke-width="4"/>
  <!-- Rocket nose cone -->
  <path d="M412 380 Q512 180 612 380 Z" fill="#AED581"/>
  <!-- Rocket fins -->
  <path d="M412 580 L340 700 L412 660 Z" fill="#AED581"/>
  <path d="M612 580 L684 700 L612 660 Z" fill="#AED581"/>
  <!-- Flame exhaust -->
  <path d="M452 660 Q512 780 572 660" fill="#AED581" opacity="0.8"/>
