<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="100%" stop-color="#1B3A2A"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow2">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#FFD740" flood-opacity="0.8"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg2)"/>

  <!-- Layer 2: Input file stack (staggered) -->
  <!-- File card 3 (back) -->
  <rect x="140" y="220" width="260" height="220" rx="18" fill="#1A3A4A" stroke="#4DD0E1" stroke-width="6" opacity="0.5" transform="rotate(-8, 270, 330)"/>
  <text x="270" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800"
        fill="#4DD0E1" opacity="0.5" text-anchor="middle" transform="rotate(-8, 270, 330)">SVG</text>
  <!-- File card 2 (middle) -->
  <rect x="150" y="200" width="260" height="220" rx="18" fill="#1A2A3A" stroke="#81D4FA" stroke-width="6" opacity="0.75" transform="rotate(-3, 280, 310)"/>
  <text x="280" y="295" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800"
        fill="#81D4FA" opacity="0.75" text-anchor="middle" transform="rotate(-3, 280, 310)">PNG</text>
  <!-- File card 1 (front) -->
  <rect x="160" y="185" width="260" height="220" rx="18" fill="#1A2040" stroke="#4FC3F7" stroke-width="8" filter="url(#shadow2)"/>
  <text x="290" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800"
        fill="#4FC3F7" text-anchor="middle">JPG</text>
  <text x="290" y="355" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="600"
        fill="#4FC3F7" opacity="0.6" text-anchor="middle">BMP</text>

  <!-- Layer 2: Funnel shape -->
  <path d="M 300 460 L 724 460 L 580 700 L 444 700 Z" fill="url(#funnelGrad)" opacity="0.85" filter="url(#shadow2)"/>
  <!-- Funnel neck -->
  <rect x="444" y="698" width="136" height="80" rx="10" fill="#00897B"/>
  <!-- Funnel lines detail -->
  <line x1="340" y1="520" x2="508" y2="700" stroke="white" stroke-width="3" opacity="0.15"/>
  <line x1="400" y1="460" x2="490" y2="700" stroke="white" stroke-width="3" opacity="0.12"/>
  <line x1="624" y1="460" x2="534" y2="700" stroke="white" stroke-width="3" opacity="0.12"/>
  <line x1="684" y1="520" x2="516" y2="700" stroke="white" stroke-width="3" opacity="0.15"/>

  <!-- Layer 3: ICO output card (bottom, glowing) -->
  <rect x="380" y="800" width="264" height="152" rx="18" fill="#2A1A08" stroke="#FFD740" stroke-width="8" filter="url(#glow2)"/>
  <text x="512" y="895" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900"
        fill="#FFD740" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- Layer 3: Size badges on output -->
  <text x="398" y="940" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#FFD740" opacity="0.6">16</text>
  <text x="452" y="940" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#FFD740" opacity="0.6">32</text>
  <text x="506" y="940" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#FFD740" opacity="0.6">256</text>

  <!-- Layer 3: Arrow inside funnel neck -->
  <polygon points="512,720 536,760 488,760" fill="white" opacity="0.7"/>
</svg>
