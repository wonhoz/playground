<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162840"/>
    </linearGradient>
    <linearGradient id="l0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="l1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="l3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="l4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Depth level indicator bar (left) -->
  <rect x="56" y="70" width="16" height="372" rx="8" fill="#1e2d40"/>
  <!-- Depth colorful segments -->
  <rect x="56" y="70" width="16" height="74" rx="8 8 0 0" fill="url(#l0)"/>
  <rect x="56" y="144" width="16" height="74" fill="url(#l1)"/>
  <rect x="56" y="218" width="16" height="74" fill="url(#l2)"/>
  <rect x="56" y="292" width="16" height="74" fill="url(#l3)"/>
  <rect x="56" y="366" width="16" height="76" rx="0 0 8 8" fill="url(#l4)"/>
  <!-- Depth 0 row -->
  <rect x="86" y="78" width="370" height="58" rx="8" fill="#1e1e2e"/>
  <text x="102" y="98" font-family="monospace" font-size="13" fill="#ef4444">Depth 0</text>
  <text x="102" y="118" font-family="monospace" font-size="13" fill="#e6edf3">{ "root" }</text>
  <!-- Depth 1 row -->
  <rect x="86" y="148" width="370" height="58" rx="8" fill="#1e1e2e"/>
  <text x="102" y="168" font-family="monospace" font-size="13" fill="#f97316">Depth 1</text>
  <text x="102" y="188" font-family="monospace" font-size="13" fill="#e6edf3">  "user": { }, "data": [ ]</text>
  <!-- Depth 2 row -->
  <rect x="86" y="222" width="370" height="58" rx="8" fill="#1e1e2e"/>
  <text x="102" y="242" font-family="monospace" font-size="13" fill="#eab308">Depth 2</text>
  <text x="102" y="262" font-family="monospace" font-size="13" fill="#e6edf3">    "name", "email", [0]</text>
  <!-- Depth 3 row -->
  <rect x="86" y="296" width="370" height="58" rx="8" fill="#1e1e2e"/>
  <text x="102" y="316" font-family="monospace" font-size="13" fill="#22c55e">Depth 3</text>
  <text x="102" y="336" font-family="monospace" font-size="13" fill="#e6edf3">      "John", "j@x.com"</text>
  <!-- Depth 4 row -->
  <rect x="86" y="370" width="370" height="58" rx="8" fill="#1e1e2e"/>
  <text x="102" y="390" font-family="monospace" font-size="13" fill="#3b82f6">Depth 4</text>
  <text x="102" y="410" font-family="monospace" font-size="13" fill="#e6edf3">        primitive values</text>
  <!-- Connecting lines from depth bar to rows -->
  <line x1="72" y1="107" x2="86" y2="107" stroke="#ef4444" stroke-width="2"/>
  <line x1="72" y1="177" x2="86" y2="177" stroke="#f97316" stroke-width="2"/>
  <line x1="72" y1="251" x2="86" y2="251" stroke="#eab308" stroke-width="2"/>
  <line x1="72" y1="325" x2="86" y2="325" stroke="#22c55e" stroke-width="2"/>
  <line x1="72" y1="399" x2="86" y2="399" stroke="#3b82f6" stroke-width="2"/>
</svg>
