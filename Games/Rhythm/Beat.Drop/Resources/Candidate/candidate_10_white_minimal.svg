    <radialGradient id="drop_glow" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="200" r="150" fill="url(#drop_glow)"/>
  <!-- Minimal waveform bars -->
  <rect x="80" y="300" width="20" height="60" rx="5" fill="url(#bar)" opacity="0.4"/>
  <rect x="110" y="280" width="20" height="80" rx="5" fill="url(#bar)" opacity="0.5"/>
