<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="leftPanel">
      <rect x="100" y="210" width="340" height="320" rx="14"/>
    </clipPath>
    <clipPath id="rightPanel">
      <rect x="580" y="210" width="340" height="320" rx="14"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- 왼쪽 패널 테두리 -->
  <rect x="100" y="210" width="340" height="320" rx="14" fill="rgba(255,255,255,0.18)"/>

  <!-- 픽셀화된 이미지 (큰 블록들) -->
  <g clip-path="url(#leftPanel)">
    <rect x="100" y="210" width="57" height="64" fill="#C084FC"/>
    <rect x="157" y="210" width="57" height="64" fill="#60A5FA"/>
    <rect x="214" y="210" width="57" height="64" fill="#4ADE80"/>
    <rect x="271" y="210" width="57" height="64" fill="#FDE047"/>
