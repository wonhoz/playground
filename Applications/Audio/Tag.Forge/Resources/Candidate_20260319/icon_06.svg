<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Barcode/tag scanner on music file -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0D0D0D"/>
  <!-- Music note -->
  <rect x="310" y="200" width="40" height="340" rx="10" fill="#FF6F00"/>
  <ellipse cx="292" cy="540" rx="72" ry="52" fill="#FF6F00" transform="rotate(-15, 292, 540)"/>
  <path d="M350 200 L480 168 L480 206 L350 238 Z" fill="#FF6F00"/>
  <!-- Scan frame around note head area -->
  <path d="M200 480 L200 440 L240 440" fill="none" stroke="#FFC107" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M200 600 L200 640 L240 640" fill="none" stroke="#FFC107" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M440 480 L440 440 L400 440" fill="none" stroke="#FFC107" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M440 600 L440 640 L400 640" fill="none" stroke="#FFC107" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line -->
  <line x1="190" y1="540" x2="450" y2="540" stroke="#FFC107" stroke-width="6" opacity="0.9"/>
  <!-- Metadata result panel -->
  <rect x="500" y="280" width="380" height="400" rx="20" fill="#1A1A1A" stroke="#FF6F00" stroke-width="16"/>
  <rect x="530" y="320" width="200" height="18" rx="9" fill="#FF6F00" opacity="0.9"/>
  <rect x="530" y="358" width="160" height="14" rx="7" fill="#FF6F00" opacity="0.65"/>
  <rect x="530" y="392" width="180" height="14" rx="7" fill="#FF6F00" opacity="0.65"/>
  <rect x="530" y="426" width="140" height="14" rx="7" fill="#FF6F00" opacity="0.5"/>
  <rect x="530" y="460" width="120" height="14" rx="7" fill="#FF6F00" opacity="0.4"/>
  <!-- Check mark (matched) -->
  <path d="M590 560 L630 600 L710 510" fill="none" stroke="#66BB6A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
