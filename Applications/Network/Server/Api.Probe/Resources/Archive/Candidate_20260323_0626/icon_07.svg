<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | 방패+JWT 토큰 — API 인증 보안 레이어 | 레이어드 | #1A0028 -->
  <defs>
    <radialGradient id="shieldGlow7" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A0028" stop-opacity="0"/>
    </radialGradient>
    <filter id="shieldBlur7">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0028"/>
  <rect width="1024" height="1024" rx="160" fill="url(#shieldGlow7)"/>
  <!-- Layer 2: Shield with lock -->
  <!-- Shield outer glow -->
  <path d="M 512 220 L 720 310 L 720 560 Q 720 700 512 800 Q 304 700 304 560 L 304 310 Z" fill="#3B0A6A" filter="url(#shieldBlur7)" opacity="0.6"/>
  <!-- Shield body -->
  <path d="M 512 240 L 700 324 L 700 556 Q 700 682 512 776 Q 324 682 324 556 L 324 324 Z" fill="#1A0040" stroke="#7C3AED" stroke-width="6"/>
  <!-- Shield inner gradient fill -->
  <path d="M 512 260 L 686 340 L 686 556 Q 686 668 512 754 Q 338 668 338 556 L 338 340 Z" fill="#240050" stroke="#9333EA" stroke-width="3"/>
  <!-- Shield emblem: padlock + key icon -->
  <!-- Padlock body -->
  <rect x="456" y="470" width="112" height="100" rx="12" fill="#7C3AED" stroke="#A855F7" stroke-width="3" filter="url(#shieldBlur7)"/>
  <!-- Padlock shackle -->
  <path d="M 480 470 L 480 430 Q 480 390 512 390 Q 544 390 544 430 L 544 470" stroke="#A855F7" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Keyhole on padlock -->
  <circle cx="512" cy="510" r="14" fill="#1A0040"/>
  <rect x="506" y="510" width="12" height="22" rx="4" fill="#1A0040"/>
  <!-- JWT token layers below shield -->
  <!-- Token card stack -->
  <rect x="236" y="680" width="560" height="36" rx="6" fill="#240060" stroke="#5B21B6" stroke-width="2" transform="rotate(-2 512 698)"/>
  <rect x="236" y="680" width="560" height="36" rx="6" fill="#2A0070" stroke="#7C3AED" stroke-width="2"/>
  <!-- JWT header.payload.signature format -->
  <text x="256" y="703" font-family="monospace" font-size="11" fill="#A78BFA">eyJhbGciOiJIUzI1NiJ9</text>
  <text x="470" y="703" font-family="monospace" font-size="11" fill="#C4B5FD">.</text>
  <text x="480" y="703" font-family="monospace" font-size="11" fill="#DDD6FE">eyJ1c2VyIjoiYWRtaW4i</text>
  <text x="690" y="703" font-family="monospace" font-size="11" fill="#A78BFA">.</text>
  <text x="700" y="703" font-family="monospace" font-size="11" fill="#7C3AED">xKc2...</text>
  <!-- API probe request detail -->
  <rect x="280" y="730" width="464" height="56" rx="8" fill="#14002A" stroke="#5B21B6" stroke-width="2"/>
  <text x="312" y="752" font-family="monospace" font-size="12" fill="#A855F7">Authorization:</text>
  <text x="442" y="752" font-family="monospace" font-size="12" fill="#DDD6FE">Bearer TOKEN</text>
  <text x="312" y="774" font-family="monospace" font-size="12" fill="#22D3EE">→ 200 OK  (인증 성공)</text>
  <!-- Layer 3: Verified badge -->
  <circle cx="700" cy="360" r="40" fill="#16A34A" stroke="#4ADE80" stroke-width="4" filter="url(#shieldBlur7)"/>
  <text x="700" y="370" font-family="Arial,sans-serif" font-size="28" fill="white" text-anchor="middle">✓</text>
</svg>
