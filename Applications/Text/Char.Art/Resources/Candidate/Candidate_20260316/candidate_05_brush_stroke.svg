<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0808"/>
      <stop offset="100%" stop-color="#1A1010"/>
    </linearGradient>
    <linearGradient id="brush" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#FECA57"/>
      <stop offset="100%" stop-color="#48DBFB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Canvas/paper area -->
  <rect x="80" y="80" width="352" height="300" rx="10" fill="#111" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Brush stroke painting ASCII art -->
  <!-- Painted characters in gradient style -->
  <text x="256" y="140" font-family="monospace" font-size="22" fill="#FF6B6B" text-anchor="middle">  /\_/\   /\_/\</text>
  <text x="256" y="168" font-family="monospace" font-size="22" fill="#FECA57" text-anchor="middle"> ( ^.^ ) ( ^.^ )</text>
  <text x="256" y="196" font-family="monospace" font-size="22" fill="#48DBFB" text-anchor="middle">  (  u  )_(  u  )</text>
  <text x="256" y="224" font-family="monospace" font-size="22" fill="#FF9FF3" text-anchor="middle"> ~~~~~~~~~~~~~~~~~~~~</text>
  <!-- Brush tool at corner -->
  <line x1="380" y1="280" x2="420" y2="340" stroke="#888" stroke-width="8" stroke-linecap="round"/>
  <polygon points="370,270 388,258 398,278" fill="#DDD"/>
  <rect x="386" y="278" width="16" height="30" rx="2" fill="#CC8800"/>
  <!-- Colorful dots (paint drops) -->
  <circle cx="100" cy="340" r="6" fill="#FF6B6B"/>
  <circle cx="122" cy="348" r="4" fill="#FECA57"/>
  <circle cx="140" cy="338" r="5" fill="#48DBFB"/>
  <circle cx="160" cy="345" r="4" fill="#FF9FF3"/>
  <circle cx="178" cy="340" r="6" fill="#54A0FF"/>
  <!-- Palette -->
  <rect x="80" y="392" width="352" height="30" rx="8" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <circle cx="108" cy="407" r="10" fill="#FF6B6B"/>
  <circle cx="136" cy="407" r="10" fill="#FECA57"/>
  <circle cx="164" cy="407" r="10" fill="#48DBFB"/>
  <circle cx="192" cy="407" r="10" fill="#FF9FF3"/>
  <circle cx="220" cy="407" r="10" fill="#54A0FF"/>
  <circle cx="248" cy="407" r="10" fill="#5F27CD"/>
  <circle cx="276" cy="407" r="10" fill="#00D2D3"/>
  <circle cx="304" cy="407" r="10" fill="#01CBC6"/>
  <circle cx="332" cy="407" r="10" fill="#C8D6E5"/>
  <circle cx="360" cy="407" r="10" fill="#576574"/>
  <circle cx="388" cy="407" r="10" fill="#222"/>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FECA57" text-anchor="middle">Char.Art</text>
</svg>
