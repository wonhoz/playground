<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 스페이스 블랙 -->
  <rect width="1024" height="1024" rx="180" fill="#020B18"/>
  <!-- 별들 -->
  <circle cx="160" cy="200" r="3" fill="white" opacity="0.7"/>
  <circle cx="300" cy="150" r="2" fill="white" opacity="0.6"/>
  <circle cx="800" cy="180" r="3" fill="white" opacity="0.8"/>
  <circle cx="900" cy="280" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="700" r="2" fill="white" opacity="0.6"/>
  <circle cx="850" cy="750" r="3" fill="white" opacity="0.7"/>
  <circle cx="200" cy="850" r="2" fill="white" opacity="0.5"/>
  <circle cx="750" cy="130" r="2" fill="white" opacity="0.6"/>
  <!-- Layer 2: 중앙 태양 + 궤도들 -->
  <!-- 태양 -->
  <circle cx="512" cy="512" r="100" fill="#FFA000"/>
  <circle cx="512" cy="512" r="80" fill="#FFD740"/>
  <circle cx="512" cy="512" r="60" fill="#FFFF00"/>
  <!-- 궤도 1 (내부) -->
  <ellipse cx="512" cy="512" rx="200" ry="200" fill="none" stroke="#42A5F5" stroke-width="4" opacity="0.7"/>
  <!-- 행성 1 -->
  <circle cx="712" cy="512" r="28" fill="#42A5F5"/>
  <!-- 궤도 2 (중간) -->
  <ellipse cx="512" cy="512" rx="310" ry="310" fill="none" stroke="#66BB6A" stroke-width="4" opacity="0.6"/>
  <!-- 행성 2 -->
  <circle cx="512" cy="202" r="36" fill="#66BB6A"/>
  <!-- 궤도 3 (외부) -->
  <ellipse cx="512" cy="512" rx="380" ry="380" fill="none" stroke="#AB47BC" stroke-width="4" opacity="0.5"/>
  <!-- 행성 3 -->
  <circle cx="192" cy="400" r="24" fill="#AB47BC"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#42A5F5" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
