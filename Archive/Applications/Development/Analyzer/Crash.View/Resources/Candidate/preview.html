<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Crash.View - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #ffffff; }
    p.desc { text-align: center; color: #888888; margin-bottom: 28px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
    .item img { width: 160px; height: 160px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #aaaaaa; text-align: center; word-break: break-all; }
    .item .num { font-size: 0.85rem; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Crash.View — 아이콘 후보 10종</h1>
  <p class="desc">크래시 덤프/로그 분석기</p>
  <div class="grid">
    <div class="item">
      <img src="candidate_01_red_explosion.svg" alt="01"/>
      <span class="num">01</span>
      <span>Red Explosion</span>
    </div>
    <div class="item">
      <img src="candidate_02_dump_file.svg" alt="02"/>
      <span class="num">02</span>
      <span>Dump File</span>
    </div>
    <div class="item">
      <img src="candidate_03_stack_trace.svg" alt="03"/>
      <span class="num">03</span>
      <span>Stack Trace</span>
    </div>
    <div class="item">
      <img src="candidate_04_shield_alert.svg" alt="04"/>
      <span class="num">04</span>
      <span>Shield Alert</span>
    </div>
    <div class="item">
      <img src="candidate_05_memory_forensic.svg" alt="05"/>
      <span class="num">05</span>
      <span>Memory Forensic</span>
    </div>
    <div class="item">
      <img src="candidate_06_bsod_retro.svg" alt="06"/>
      <span class="num">06</span>
      <span>BSOD Retro</span>
    </div>
    <div class="item">
      <img src="candidate_07_magnifier_code.svg" alt="07"/>
      <span class="num">07</span>
      <span>Magnifier Code</span>
    </div>
    <div class="item">
      <img src="candidate_08_warning_amber.svg" alt="08"/>
      <span class="num">08</span>
      <span>Warning Amber</span>
    </div>
    <div class="item">
      <img src="candidate_09_graph_analysis.svg" alt="09"/>
      <span class="num">09</span>
      <span>Graph Analysis</span>
    </div>
    <div class="item">
      <img src="candidate_10_broken_window.svg" alt="10"/>
      <span class="num">10</span>
      <span>Broken Window</span>
    </div>
  </div>
</body>
</html>
