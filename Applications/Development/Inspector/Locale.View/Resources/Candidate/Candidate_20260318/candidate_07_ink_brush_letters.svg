<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ink brush handle -->
  <rect x="370" y="60" width="14" height="160" rx="7" fill="#8B4513"/>
  <!-- Brush tip -->
  <path d="M370,220 Q377,240 377,260 Q377,280 370,290 L384,290 Q391,280 391,260 Q391,240 384,220 Z" fill="#2C2C2C"/>
  <ellipse cx="377" cy="290" rx="7" ry="4" fill="#1A1A1A"/>
  <!-- Ink drops falling from brush -->
  <circle cx="377" cy="308" r="3" fill="#38BDF8" opacity="0.6"/>
  <circle cx="374" cy="326" r="4" fill="#0EA5E9" opacity="0.5"/>
  <!-- Large ink brushstroke characters -->
  <!-- "文" (literature/language) -->
  <text x="100" y="200" text-anchor="middle" font-family="serif" font-size="120" fill="#0EA5E9" opacity="0.9" font-weight="bold">文</text>
  <!-- Smaller decorative letters around it -->
  <text x="68" y="340" font-family="serif" font-size="36" fill="#38BDF8" opacity="0.5">A</text>
  <text x="240" y="360" font-family="serif" font-size="28" fill="#7DD3FC" opacity="0.4">α</text>
  <text x="288" y="300" font-family="serif" font-size="30" fill="#38BDF8" opacity="0.45">Я</text>
  <text x="310" y="380" font-family="serif" font-size="24" fill="#0EA5E9" opacity="0.4">ع</text>
  <text x="196" y="430" font-family="serif" font-size="20" fill="#7DD3FC" opacity="0.35">가</text>
  <!-- Ink splatter dots -->
  <circle cx="80" cy="380" r="3" fill="#38BDF8" opacity="0.3"/>
  <circle cx="72" cy="396" r="2" fill="#0EA5E9" opacity="0.2"/>
  <circle cx="180" cy="420" r="2" fill="#38BDF8" opacity="0.2"/>
  <circle cx="264" cy="400" r="2" fill="#7DD3FC" opacity="0.2"/>
  <!-- Ink pool at bottom of brush path -->
  <ellipse cx="377" cy="360" rx="24" ry="8" fill="#0EA5E9" opacity="0.2"/>
  <!-- Label -->
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="11" fill="#38BDF8" opacity="0.5">INK BRUSH</text>
</svg>
