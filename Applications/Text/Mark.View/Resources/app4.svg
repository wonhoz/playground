<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#F9A825"/>
  <!-- Layer 2: 변환 흐름 -->
  <!-- 왼쪽: 코드 블록 -->
  <rect x="215" y="340" width="270" height="200" rx="16" fill="#1A1A2E"/>
  <text x="350" y="420" text-anchor="middle" font-family="Courier New" font-size="66" fill="#4FC3F7"># Hi</text>
  <text x="350" y="500" text-anchor="middle" font-family="Courier New" font-size="54" fill="#A5D6A7">**bold**</text>
  <!-- 굵은 화살표 -->
  <path d="M510,440 L600,440" fill="none" stroke="#1A1A2E" stroke-width="30" stroke-linecap="round"/>
  <polygon points="610,440 580,415 580,465" fill="#1A1A2E"/>
  <!-- 오른쪽: 렌더링 결과 -->
  <rect x="625" y="320" width="285" height="230" rx="16" fill="white"/>
  <text x="768" y="412" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#1565C0">Hi</text>
  <rect x="650" y="432" width="220" height="8" rx="4" fill="#BDBDBD"/>
  <text x="768" y="498" text-anchor="middle" font-family="Arial Black" font-size="64" font-weight="900" fill="#1A1A1A">bold</text>
  <!-- Layer 3: 제목 텍스트 -->
  <text x="512" y="270" text-anchor="middle" font-family="Arial Black" font-size="88" font-weight="900" fill="#1A1A2E">Markdown</text>
  <text x="512" y="780" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#1A1A2E">→ Rendered</text>
</svg>