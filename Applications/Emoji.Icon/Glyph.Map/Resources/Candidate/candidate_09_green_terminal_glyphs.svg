<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001800"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal frame -->
  <rect x="60" y="80" width="392" height="352" rx="10" fill="#001200" stroke="#00FF41" stroke-width="2" opacity="0.9"/>
  <!-- Terminal title bar -->
  <rect x="60" y="80" width="392" height="32" rx="10" fill="#003300"/>
  <circle cx="88" cy="96" r="7" fill="#FF4444"/>
  <circle cx="110" cy="96" r="7" fill="#FFAA00"/>
  <circle cx="132" cy="96" r="7" fill="#44FF44"/>
  <text x="256" y="100" text-anchor="middle" fill="#00AA22" font-size="13" font-family="monospace">Glyph.Map Terminal</text>
  <!-- Terminal content -->
  <text x="80" y="142" fill="#00FF41" font-size="14" font-family="monospace">$ glyph search "star"</text>
  <text x="80" y="165" fill="#00AA22" font-size="13" font-family="monospace">&#x2605; U+2605  BLACK STAR</text>
  <text x="80" y="184" fill="#00AA22" font-size="13" font-family="monospace">&#x2606; U+2606  WHITE STAR</text>
  <text x="80" y="203" fill="#00AA22" font-size="13" font-family="monospace">&#x1F31F; U+1F31F GLOWING STAR</text>
  <text x="80" y="222" fill="#00AA22" font-size="13" font-family="monospace">&#x2729; U+2729  STRESS OUTLINED STAR</text>
  <text x="80" y="241" fill="#00AA22" font-size="13" font-family="monospace">&#x272A; U+272A  CIRCLED WHITE STAR</text>
  <text x="80" y="265" fill="#00FF41" font-size="14" font-family="monospace">$ glyph info U+2665</text>
  <text x="80" y="288" fill="#00AA22" font-size="13" font-family="monospace">  Char  : &#x2665;</text>
  <text x="80" y="307" fill="#00AA22" font-size="13" font-family="monospace">  Name  : BLACK HEART SUIT</text>
  <text x="80" y="326" fill="#00AA22" font-size="13" font-family="monospace">  Block : Miscellaneous Symbols</text>
  <text x="80" y="345" fill="#00AA22" font-size="13" font-family="monospace">  UTF-8 : E2 99 A5</text>
  <!-- Cursor -->
  <rect x="80" y="360" width="10" height="18" fill="#00FF41" opacity="0.9"/>
  <!-- Scan line overlay -->
  <rect x="60" y="112" width="392" height="320" rx="0" fill="none" opacity="0.05"/>
</svg>
