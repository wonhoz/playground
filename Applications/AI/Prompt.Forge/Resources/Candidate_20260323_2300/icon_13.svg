<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="line13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>
  <!-- 타임라인 메인 라인 -->
  <line x1="130" y1="512" x2="894" y2="512" stroke="url(#line13)" stroke-width="18" stroke-linecap="round"/>
  <!-- 버전 노드 v1 -->
  <circle cx="220" cy="512" r="64" fill="#0F172A" stroke="#818CF8" stroke-width="16"/>
  <text x="220" y="524" font-family="system-ui, monospace, sans-serif" font-weight="bold" font-size="36" text-anchor="middle" fill="#818CF8">v1</text>
  <!-- v1 라벨 -->
  <rect x="165" y="590" width="110" height="48" rx="14" fill="#818CF8" opacity="0.2"/>
  <text x="220" y="622" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#A5B4FC">초기</text>
  <!-- 날짜 -->
  <text x="220" y="420" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle" fill="#4B5563">2026.01.10</text>
  <!-- 버전 노드 v2 -->
  <circle cx="512" cy="512" r="76" fill="#0F172A" stroke="#22D3EE" stroke-width="16"/>
  <text x="512" y="526" font-family="system-ui, monospace, sans-serif" font-weight="bold" font-size="42" text-anchor="middle" fill="#22D3EE">v2</text>
  <!-- v2 라벨 -->
  <rect x="450" y="610" width="124" height="48" rx="14" fill="#22D3EE" opacity="0.2"/>
  <text x="512" y="642" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#67E8F9">개선</text>
  <!-- 날짜 -->
  <text x="512" y="408" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle" fill="#4B5563">2026.02.14</text>
  <!-- 버전 노드 v3 (현재, 가장 크게) -->
  <circle cx="804" cy="512" r="90" fill="#0F172A" stroke="#818CF8" stroke-width="8"/>
  <circle cx="804" cy="512" r="90" fill="none" stroke="#22D3EE" stroke-width="16" stroke-dasharray="40,20"/>
  <text x="804" y="530" font-family="system-ui, monospace, sans-serif" font-weight="bold" font-size="52" text-anchor="middle" fill="#E0F2FE">v3</text>
  <!-- v3 라벨 (현재) -->
  <rect x="738" y="626" width="132" height="48" rx="14" fill="#22D3EE" opacity="0.35"/>
  <text x="804" y="658" font-family="system-ui, sans-serif" font-weight="bold" font-size="22" text-anchor="middle" fill="#22D3EE">현재</text>
  <!-- 날짜 -->
  <text x="804" y="396" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle" fill="#6B7280">2026.03.22</text>
  <!-- 화살표 방향 (우측) -->
  <polygon points="920,512 880,488 880,536" fill="url(#line13)"/>
  <!-- 연결 선 변경 표시 (diff 아이콘 느낌) -->
  <rect x="330" y="468" width="64" height="28" rx="8" fill="#818CF8" opacity="0.3"/>
  <text x="362" y="488" font-family="system-ui, monospace, sans-serif" font-size="20" text-anchor="middle" fill="#818CF8">+12</text>
  <rect x="620" y="468" width="72" height="28" rx="8" fill="#22D3EE" opacity="0.3"/>
  <text x="656" y="488" font-family="system-ui, monospace, sans-serif" font-size="20" text-anchor="middle" fill="#22D3EE">+28</text>
  <!-- 하단 히스토리 바 -->
  <rect x="180" y="760" width="664" height="20" rx="10" fill="#1E293B"/>
  <rect x="180" y="760" width="300" height="20" rx="10" fill="#818CF8" opacity="0.6"/>
  <rect x="480" y="760" width="180" height="20" rx="10" fill="#22D3EE" opacity="0.7"/>
</svg>
