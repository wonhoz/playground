<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프리즘 삼각형 -->
  <polygon points="256,100 110,380 402,380" fill="#10B981" opacity="0.06"/>
  <polygon points="256,100 110,380 402,380" fill="none" stroke="#10B981" stroke-width="3" filter="url(#glow)"/>
  <!-- 필터 빔 (입력) -->
  <line x1="256" y1="40" x2="256" y2="100" stroke="#10B981" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <!-- 분산 빔 (출력 - 이모지 별) -->
  <line x1="180" y1="380" x2="140" y2="430" stroke="#10B981" stroke-width="2.5" opacity="0.6"/>
  <line x1="230" y1="380" x2="215" y2="440" stroke="#34D399" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="380" x2="256" y2="445" stroke="#10B981" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <line x1="282" y1="380" x2="297" y2="440" stroke="#34D399" stroke-width="2.5" opacity="0.5"/>
  <line x1="332" y1="380" x2="372" y2="430" stroke="#10B981" stroke-width="2.5" opacity="0.6"/>
  <!-- 프리즘 내 이모지 -->
  <text x="256" y="270" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">🔎</text>
  <!-- 레이블 -->
  <text x="256" y="480" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">FILTER PRISM</text>
</svg>
