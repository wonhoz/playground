<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: 하드드라이브 + 확대 (HDD with magnifier) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- HDD 외곽 -->
  <rect x="180" y="280" width="560" height="360" rx="40" fill="#2E7D32"/>
  <!-- HDD 내부 플래터 -->
  <circle cx="420" cy="460" r="120" fill="#001A00" opacity="0.7"/>
  <circle cx="420" cy="460" r="80" fill="#2E7D32" opacity="0.5"/>
  <circle cx="420" cy="460" r="30" fill="#81C784"/>
  <!-- HDD 암 (read/write head) -->
  <line x1="420" y1="460" x2="520" y2="360" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <circle cx="520" cy="360" r="16" fill="#81C784"/>
  <!-- HDD 우측 회로 -->
  <rect x="600" y="340" width="100" height="12" rx="6" fill="#81C784" opacity="0.5"/>
  <rect x="600" y="380" width="80" height="12" rx="6" fill="#81C784" opacity="0.4"/>
  <rect x="600" y="420" width="100" height="12" rx="6" fill="#81C784" opacity="0.5"/>
  <!-- 확대경 -->
  <circle cx="700" cy="620" r="90" fill="none" stroke="#81C784" stroke-width="22"/>
  <line x1="773" y1="693" x2="840" y2="760" stroke="#81C784" stroke-width="28" stroke-linecap="round"/>
  <!-- 확대경 내부 + 기호 -->
  <line x1="700" y1="575" x2="700" y2="665" stroke="#81C784" stroke-width="12"/>
  <line x1="655" y1="620" x2="745" y2="620" stroke="#81C784" stroke-width="12"/>
</svg>
