<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a2436"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#162038"/>
    </linearGradient>
    <radialGradient id="gaugeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 조종석 패널 프레임 -->
  <rect x="60" y="100" width="392" height="280" rx="16" fill="url(#panel)" stroke="#1e3a5f" stroke-width="2"/>
  <!-- 계기판 1 (속도계 스타일) -->
  <circle cx="148" cy="220" r="66" fill="#0d1a2e" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="148" cy="220" r="58" fill="url(#gaugeGlow)"/>
  <text x="148" y="208" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">POSITION</text>
  <text x="148" y="228" font-family="'Courier New',monospace" font-weight="bold" font-size="18" fill="#22d3ee" text-anchor="middle">X:840</text>
  <text x="148" y="246" font-family="'Courier New',monospace" font-size="14" fill="#22d3ee" text-anchor="middle">Y:480</text>
  <!-- 바늘 -->
  <line x1="148" y1="220" x2="170" y2="168" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="148" cy="220" r="5" fill="#f59e0b"/>
  <!-- 계기판 2 (크기) -->
  <circle cx="256" cy="220" r="66" fill="#0d1a2e" stroke="#22d3ee" stroke-width="2"/>
  <text x="256" y="208" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">SIZE</text>
  <text x="256" y="228" font-family="'Courier New',monospace" font-weight="bold" font-size="18" fill="#22d3ee" text-anchor="middle">W:1280</text>
  <text x="256" y="246" font-family="'Courier New',monospace" font-size="14" fill="#22d3ee" text-anchor="middle">H:720</text>
  <line x1="256" y1="220" x2="278" y2="175" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256" cy="220" r="5" fill="#f59e0b"/>
  <!-- 계기판 3 (모니터) -->
  <circle cx="364" cy="220" r="66" fill="#0d1a2e" stroke="#22d3ee" stroke-width="2"/>
  <text x="364" y="208" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">MONITOR</text>
  <text x="364" y="232" font-family="'Courier New',monospace" font-weight="bold" font-size="22" fill="#22d3ee" text-anchor="middle">#2</text>
  <line x1="364" y1="220" x2="392" y2="198" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="364" cy="220" r="5" fill="#f59e0b"/>
  <!-- 하단 버튼 바 -->
  <rect x="84" y="322" width="344" height="36" rx="8" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="100" y="330" width="60" height="20" rx="4" fill="#166534"/>
  <text x="130" y="344" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">SNAP</text>
  <rect x="172" y="330" width="60" height="20" rx="4" fill="#1e3a8a"/>
  <text x="202" y="344" font-family="Arial" font-size="11" fill="#93c5fd" text-anchor="middle">MOVE</text>
  <rect x="244" y="330" width="60" height="20" rx="4" fill="#78350f"/>
  <text x="274" y="344" font-family="Arial" font-size="11" fill="#fde68a" text-anchor="middle">RESIZE</text>
  <rect x="316" y="330" width="60" height="20" rx="4" fill="#4c1d95"/>
  <text x="346" y="344" font-family="Arial" font-size="11" fill="#ddd6fe" text-anchor="middle">ALIGN</text>
</svg>
