<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#6B3FA0"/>
    </linearGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg02)" rx="120"/>

  <!-- Layer 2: Diagonal commit dots with branch lines -->
  <!-- Main diagonal path -->
  <polyline points="140,820 260,680 380,560 500,420 620,300 740,200"
    fill="none" stroke="#4DD8CC" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Commit dots (mint/teal) along diagonal -->
  <circle cx="140" cy="820" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>
  <circle cx="260" cy="680" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>
  <circle cx="380" cy="560" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>
  <circle cx="500" cy="420" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>
  <circle cx="620" cy="300" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>
  <circle cx="740" cy="200" r="30" fill="#4DD8CC" stroke="#A8F0E8" stroke-width="10" filter="url(#glow02)"/>

  <!-- Branch lines from some nodes -->
  <line x1="260" y1="680" x2="340" y2="760" stroke="#C084FC" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <circle cx="340" cy="760" r="20" fill="#C084FC" opacity="0.9"/>

  <line x1="500" y1="420" x2="600" y2="480" stroke="#C084FC" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <circle cx="600" cy="480" r="20" fill="#C084FC" opacity="0.9"/>

  <line x1="380" y1="560" x2="300" y2="620" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <circle cx="300" cy="620" r="20" fill="#F9A8D4" opacity="0.9"/>

  <!-- Layer 3: Commit count number top-right -->
  <rect x="650" y="100" width="260" height="130" rx="20" fill="white" opacity="0.15"/>
  <text x="780" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="90" font-weight="900"
    text-anchor="middle" fill="white">247</text>

  <!-- Small label -->
  <text x="780" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="36"
    text-anchor="middle" fill="#4DD8CC" font-weight="700">COMMITS</text>
</svg>
