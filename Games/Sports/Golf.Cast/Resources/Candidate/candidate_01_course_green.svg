<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <radialGradient id="ballgrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Course ground -->
  <ellipse cx="256" cy="380" rx="200" ry="50" fill="#388E3C" opacity="0.8"/>
  <!-- Fairway path -->
  <path d="M100,420 Q180,360 256,350 Q330,340 420,380" fill="none" stroke="#4CAF50" stroke-width="18" opacity="0.4"/>
  <!-- Flag pole -->
  <line x1="320" y1="180" x2="320" y2="360" stroke="#ECEFF1" stroke-width="5"/>
  <!-- Flag -->
  <path d="M320,180 L385,205 L320,230Z" fill="#F44336"/>
  <!-- Golf ball -->
  <circle cx="170" cy="345" r="30" fill="url(#ballgrad)" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Ball dimples -->
  <circle cx="162" cy="338" r="4" fill="#E0E0E0" opacity="0.5"/>
  <circle cx="178" cy="338" r="4" fill="#E0E0E0" opacity="0.5"/>
  <circle cx="170" cy="350" r="4" fill="#E0E0E0" opacity="0.5"/>
  <!-- Hole on green -->
  <circle cx="320" cy="362" r="14" fill="#1A1A1A"/>
  <!-- Trajectory arc -->
  <path d="M170,345 Q256,180 320,362" fill="none" stroke="#FFD54F" stroke-width="3" stroke-dasharray="12,6"/>
  <!-- Stars (score) -->
  <text x="256" y="475" text-anchor="middle" font-size="32" fill="#FFD54F">★ ★ ★</text>
</svg>
