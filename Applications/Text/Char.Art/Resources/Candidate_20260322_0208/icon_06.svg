  <defs>
    <radialGradient id="screenGlow06" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003333"/>
      <stop offset="100%" stop-color="#001515"/>
    </radialGradient>
  </defs>

  <!-- 모니터 외곽 -->
  <rect x="180" y="200" width="664" height="500" rx="24" fill="#0A1A1A" stroke="#00CCAA" stroke-width="8"/>

