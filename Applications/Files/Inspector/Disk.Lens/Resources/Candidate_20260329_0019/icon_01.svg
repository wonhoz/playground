<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 폴더 크기 막대 그래프 UI | 공간/장면 | 아이보리+파랑+주황 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#F57F17" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: Panel -->
  <rect x="60" y="80" width="904" height="864" rx="24" fill="white" filter="url(#sh1)"/>
  <rect x="60" y="80" width="904" height="76" rx="24" fill="#F57F17"/>
  <rect x="60" y="128" width="904" height="28" fill="#F57F17"/>
  <text x="512" y="116" font-family="Arial Black, sans-serif" font-size="34" fill="white"
        text-anchor="middle" dominant-baseline="middle">C:\Users\  — 디스크 분석</text>

  <!-- Layer 3: Folder size bars -->
  <!-- Row labels + bars -->
  <!-- Documents: 42.3 GB -->
  <text x="90" y="228" font-family="Arial, sans-serif" font-size="34" fill="#37474F"
        dominant-baseline="middle">📁 Documents</text>
