<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Trash can body -->
  <rect x="320" y="420" width="384" height="320" rx="24" fill="#1565C0"/>
  <!-- Trash can lid -->
  <rect x="280" y="360" width="464" height="60" rx="16" fill="#42A5F5"/>
  <!-- Lid handle -->
  <rect x="432" y="300" width="160" height="60" rx="14" fill="#42A5F5"/>
  <!-- File inside trash -->
  <rect x="430" y="490" width="120" height="150" rx="10" fill="#42A5F5" opacity="0.7"/>
  <polygon points="550,490 550,540 600,540" fill="#0A0D1A" opacity="0.5"/>
  <!-- Trash lines -->
  <line x1="440" y1="500" x2="440" y2="620" stroke="#0A0D1A" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="500" x2="512" y2="620" stroke="#0A0D1A" stroke-width="12" stroke-linecap="round"/>
  <line x1="584" y1="500" x2="584" y2="620" stroke="#0A0D1A" stroke-width="12" stroke-linecap="round"/>
</svg>