<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060C14"/>
      <stop offset="100%" stop-color="#0E1A28"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="68" y1="100" x2="68" y2="360" stroke="#1A2A3A" stroke-width="1.5"/>
  <line x1="68" y1="360" x2="444" y2="360" stroke="#1A2A3A" stroke-width="1.5"/>
  <line x1="68" y1="280" x2="444" y2="280" stroke="#1A2A3A" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="68" y1="200" x2="444" y2="200" stroke="#1A2A3A" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="68" y1="120" x2="444" y2="120" stroke="#1A2A3A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Battery % trend line (going down) -->
  <path d="M68 120 L130 148 L192 175 L254 205 L316 240 L378 288 L444 348" fill="none" stroke="#FF6600" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Filled area under line -->
  <path d="M68 120 L130 148 L192 175 L254 205 L316 240 L378 288 L444 348 L444 360 L68 360 Z" fill="url(#fill)"/>
  <!-- Data points -->
  <circle cx="68" cy="120" r="6" fill="#FF8800"/>
  <circle cx="130" cy="148" r="6" fill="#FF8800"/>
  <circle cx="192" cy="175" r="6" fill="#FF8800"/>
  <circle cx="254" cy="205" r="6" fill="#FF8800"/>
  <circle cx="316" cy="240" r="6" fill="#FF8800"/>
  <circle cx="378" cy="288" r="6" fill="#FF8800"/>
  <circle cx="444" cy="348" r="8" fill="#FF2200" stroke="#FF8800" stroke-width="2"/>
  <!-- Y axis labels -->
  <text x="60" y="124" font-family="Arial" font-size="13" fill="#888" text-anchor="end">100%</text>
  <text x="60" y="204" font-family="Arial" font-size="13" fill="#888" text-anchor="end">60%</text>
  <text x="60" y="284" font-family="Arial" font-size="13" fill="#888" text-anchor="end">30%</text>
  <text x="60" y="364" font-family="Arial" font-size="13" fill="#888" text-anchor="end">0%</text>
  <!-- Arrow showing trend down -->
  <line x1="400" y1="310" x2="420" y2="340" stroke="#FF2200" stroke-width="3"/>
  <polygon points="420,340 408,328 432,328" fill="#FF2200"/>
  <!-- Title -->
  <text x="256" y="425" font-family="Arial" font-size="20" fill="#FF6600" text-anchor="middle">Battery Drain Trend</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8800" text-anchor="middle">Burn.Rate</text>
</svg>
