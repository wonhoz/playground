<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="52" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
  <text x="232" y="253" font-family="monospace" font-size="12" fill="#e94560">HOT</text>
  <text x="230" y="270" font-family="monospace" font-size="12" fill="#e94560">KEYS</text>
  <!-- Branch lines -->
  <line x1="256" y1="204" x2="256" y2="120" stroke="#e94560" stroke-width="2.5"/>
  <line x1="304" y1="220" x2="380" y2="160" stroke="#ff6b6b" stroke-width="2.5"/>
  <line x1="308" y1="272" x2="390" y2="340" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="256" y1="308" x2="256" y2="390" stroke="#6bcb77" stroke-width="2.5"/>
  <line x1="204" y1="272" x2="124" y2="340" stroke="#4d96ff" stroke-width="2.5"/>
  <line x1="208" y1="220" x2="132" y2="160" stroke="#c77dff" stroke-width="2.5"/>
  <!-- Branch nodes -->
  <rect x="204" y="90" width="104" height="44" rx="10" fill="#1a0a0a" stroke="#e94560" stroke-width="2"/>
  <text x="220" y="117" font-family="monospace" font-size="14" fill="#e94560">Ctrl+C</text>
  <rect x="354" y="130" width="100" height="44" rx="10" fill="#1a0808" stroke="#ff6b6b" stroke-width="2"/>
  <text x="368" y="157" font-family="monospace" font-size="14" fill="#ff6b6b">Ctrl+V</text>
  <rect x="360" y="316" width="100" height="44" rx="10" fill="#1a1a00" stroke="#ffd93d" stroke-width="2"/>
  <text x="372" y="343" font-family="monospace" font-size="14" fill="#ffd93d">Alt+F4</text>
  <rect x="196" y="380" width="120" height="44" rx="10" fill="#001a00" stroke="#6bcb77" stroke-width="2"/>
  <text x="210" y="407" font-family="monospace" font-size="14" fill="#6bcb77">Win+Tab</text>
  <rect x="48" y="316" width="100" height="44" rx="10" fill="#00001a" stroke="#4d96ff" stroke-width="2"/>
  <text x="60" y="343" font-family="monospace" font-size="14" fill="#4d96ff">Ctrl+Z</text>
  <rect x="48" y="130" width="100" height="44" rx="10" fill="#1a001a" stroke="#c77dff" stroke-width="2"/>
  <text x="62" y="157" font-family="monospace" font-size="14" fill="#c77dff">Ctrl+X</text>
</svg>