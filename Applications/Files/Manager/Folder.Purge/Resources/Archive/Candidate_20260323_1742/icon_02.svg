<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1400"/>
  <!-- Layer 2: bin / obj 폴더 + X 표시 -->
  <!-- bin 폴더 (큰, 좌측) -->
  <rect x="80" y="300" width="380" height="280" rx="16" fill="#1A2E00"/>
  <rect x="80" y="300" width="380" height="280" rx="16" fill="none" stroke="#4CAF50" stroke-width="6"/>
  <rect x="80" y="260" width="180" height="52" rx="10" fill="#1A2E00" stroke="#4CAF50" stroke-width="6"/>
  <text x="270" y="460" font-size="90" fill="#4CAF50" text-anchor="middle" font-family="monospace" font-weight="bold">bin</text>
  <!-- bin 폴더 위 X (빨강) -->
  <line x1="120" y1="120" x2="420" y2="240" stroke="#FF3333" stroke-width="24" stroke-linecap="round"/>
  <line x1="420" y1="120" x2="120" y2="240" stroke="#FF3333" stroke-width="24" stroke-linecap="round"/>
  <!-- obj 폴더 (큰, 우측) -->
  <rect x="564" y="300" width="380" height="280" rx="16" fill="#1A2E00"/>
  <rect x="564" y="300" width="380" height="280" rx="16" fill="none" stroke="#4CAF50" stroke-width="6"/>
  <rect x="564" y="260" width="180" height="52" rx="10" fill="#1A2E00" stroke="#4CAF50" stroke-width="6"/>
  <text x="754" y="460" font-size="90" fill="#4CAF50" text-anchor="middle" font-family="monospace" font-weight="bold">obj</text>
  <!-- obj 폴더 위 X (빨강) -->
  <line x1="604" y1="120" x2="904" y2="240" stroke="#FF3333" stroke-width="24" stroke-linecap="round"/>
  <line x1="904" y1="120" x2="604" y2="240" stroke="#FF3333" stroke-width="24" stroke-linecap="round"/>
  <!-- Layer 3: VS 아티팩트 배지 + 설명 -->
  <rect x="200" y="660" width="624" height="90" rx="20" fill="#1A2E00" stroke="#66BB6A" stroke-width="4"/>
  <text x="512" y="716" font-size="50" fill="#66BB6A" text-anchor="middle" font-family="monospace">VS Artifacts · 4.2 GB</text>
  <!-- 삭제 화살표 -->
  <text x="512" y="880" font-size="160" fill="#FF3333" text-anchor="middle">✕</text>
</svg>
