  <line x1="326" y1="191" x2="333" y2="184" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
  <circle cx="302" cy="215" r="20" fill="url(#pupil_grad)"/>
  <circle cx="292" cy="205" r="5" fill="white" opacity="0.6"/>
  <circle cx="308" cy="202" r="2.5" fill="white" opacity="0.4"/>

  <!-- 부리 -->
  <path d="M 248 238 L 256 258 L 264 238 Q 256 245 248 238Z" fill="#CC7A00"/>

  <!-- 로그 라인들 (하단) -->
  <rect x="60" y="418" width="392" height="2" rx="1" fill="url(#log_line_grad)" opacity="0.9" filter="url(#softglow)"/>
  <rect x="60" y="435" width="320" height="2" rx="1" fill="url(#log_line_grad)" opacity="0.7"/>
  <rect x="60" y="452" width="360" height="2" rx="1" fill="url(#log_line_grad)" opacity="0.8"/>
  <rect x="60" y="469" width="280" height="2" rx="1" fill="url(#log_line_grad)" opacity="0.6"/>

  <!-- 로그 레벨 표시 도트 -->
  <circle cx="72" cy="419" r="4" fill="#FF4444" filter="url(#softglow)"/>
  <circle cx="72" cy="436" r="4" fill="#FFB300" filter="url(#softglow)"/>
  <circle cx="72" cy="453" r="4" fill="#00E676" filter="url(#softglow)"/>
  <circle cx="72" cy="470" r="4" fill="#64B5F6" filter="url(#softglow)"/>

