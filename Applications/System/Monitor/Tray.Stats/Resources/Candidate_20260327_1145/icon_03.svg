<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- 4-cell mini bar chart grid (tray icon concept) -->
  <!-- Cell 1: CPU -->
  <rect x="175" y="200" width="290" height="290" rx="24" fill="#3B82F6"/>
  <text x="320" y="290" font-family="Arial,sans-serif" font-size="48" fill="#DBEAFE" text-anchor="middle">CPU</text>
  <text x="320" y="400" font-family="Arial,sans-serif" font-size="100" fill="#FFFFFF" font-weight="bold" text-anchor="middle">67%</text>
  <!-- Cell 2: RAM -->
  <rect x="559" y="200" width="290" height="290" rx="24" fill="#10B981"/>
  <text x="704" y="290" font-family="Arial,sans-serif" font-size="48" fill="#D1FAE5" text-anchor="middle">RAM</text>
  <text x="704" y="400" font-family="Arial,sans-serif" font-size="100" fill="#FFFFFF" font-weight="bold" text-anchor="middle">80%</text>
  <!-- Cell 3: Net -->
  <rect x="175" y="534" width="290" height="290" rx="24" fill="#F43F5E"/>
  <text x="320" y="624" font-family="Arial,sans-serif" font-size="48" fill="#FECDD3" text-anchor="middle">NET</text>
  <text x="320" y="734" font-family="Arial,sans-serif" font-size="88" fill="#FFFFFF" font-weight="bold" text-anchor="middle">1.2</text>
  <text x="320" y="792" font-family="Arial,sans-serif" font-size="44" fill="#FECDD3" text-anchor="middle">MB/s</text>
  <!-- Cell 4: GPU -->
  <rect x="559" y="534" width="290" height="290" rx="24" fill="#A855F7"/>
  <text x="704" y="624" font-family="Arial,sans-serif" font-size="48" fill="#F3E8FF" text-anchor="middle">GPU</text>
  <text x="704" y="734" font-family="Arial,sans-serif" font-size="100" fill="#FFFFFF" font-weight="bold" text-anchor="middle">60%</text>
</svg>
