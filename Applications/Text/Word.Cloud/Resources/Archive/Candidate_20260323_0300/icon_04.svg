<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 파일→구름 변환 | 대각선/동적 | #064E3B -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#022C22"/>
  <!-- Layer 2: Input document (left) -->
  <rect x="120" y="300" width="300" height="380" rx="16" fill="#0D1F1A"/>
  <rect x="120" y="300" width="300" height="4" rx="2" fill="#4ADE80"/>
  <text x="160" y="336" font-family="Consolas,monospace" font-size="13" fill="#4ADE80">텍스트 파일...</text>
  <!-- Text lines (representing input text) -->
  <rect x="145" y="358" width="250" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="378" width="210" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="398" width="240" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="418" width="180" height="10" rx="5" fill="#14532D"/>
  <rect x="145" y="438" width="230" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="458" width="200" height="10" rx="5" fill="#14532D"/>
  <rect x="145" y="478" width="250" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="498" width="190" height="10" rx="5" fill="#14532D"/>
  <rect x="145" y="518" width="220" height="10" rx="5" fill="#166534"/>
  <rect x="145" y="538" width="170" height="10" rx="5" fill="#14532D"/>
  <text x="270" y="634" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" text-anchor="middle">input.txt</text>
  <!-- Conversion arrow (large) -->
  <path d="M440 490 L560 490" stroke="#F59E0B" stroke-width="16" stroke-linecap="round"/>
  <polygon points="554,466 610,490 554,514" fill="#F59E0B"/>
  <!-- Processing dots -->
  <circle cx="464" cy="476" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="504" cy="504" r="5" fill="#FDE68A" opacity="0.5"/>
  <circle cx="540" cy="475" r="6" fill="#FDE68A" opacity="0.6"/>
  <!-- Layer 3: Word cloud output (right) -->
  <!-- Cloud shape suggestion (abstract) -->
  <ellipse cx="760" cy="480" rx="200" ry="150" fill="#1A3A2A"/>
  <ellipse cx="680" cy="460" rx="100" ry="80" fill="#1A3A2A"/>
  <ellipse cx="840" cy="440" rx="110" ry="85" fill="#1A3A2A"/>
  <ellipse cx="760" cy="400" rx="120" ry="70" fill="#1A3A2A"/>
  <!-- Words inside cloud -->
  <text x="760" y="440" font-family="Arial,sans-serif" font-size="44" fill="#4ADE80" text-anchor="middle" font-weight="bold">구름</text>
  <text x="690" y="496" font-family="Arial,sans-serif" font-size="28" fill="#22C55E" text-anchor="middle">단어</text>
  <text x="820" y="500" font-family="Arial,sans-serif" font-size="24" fill="#16A34A" text-anchor="middle">텍스트</text>
  <text x="730" y="540" font-family="Arial,sans-serif" font-size="18" fill="#15803D" text-anchor="middle">빈도</text>
  <text x="800" y="530" font-family="Arial,sans-serif" font-size="16" fill="#14532D" text-anchor="middle">cloud</text>
</svg>
