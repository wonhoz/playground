<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
    <clipPath id="left-half"><rect x="0" y="0" width="480" height="1024"/></clipPath>
    <clipPath id="right-half"><rect x="544" y="0" width="480" height="1024"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#FAFAFA"/>
  <g clip-path="url(#cp)">
    <!-- 왼쪽 — BEFORE (지저분한 상태) -->
    <rect x="0" y="0" width="480" height="1024" fill="#FFEBEE"/>

    <!-- 어지러운 폴더들 (겹치고 기울어진) -->
    <g transform="rotate(-18 180 250)"><rect x="80" y="150" width="160" height="130" rx="14" fill="#EF5350" opacity="0.85"/><rect x="80" y="122" width="90" height="30" rx="10" fill="#EF5350" opacity="0.85"/></g>
    <g transform="rotate(12 260 300)"><rect x="180" y="220" width="140" height="115" rx="12" fill="#E57373" opacity="0.85"/><rect x="180" y="196" width="80" height="28" rx="9" fill="#E57373" opacity="0.85"/></g>
    <g transform="rotate(-8 120 420)"><rect x="60" y="360" width="150" height="120" rx="14" fill="#FF7043" opacity="0.85"/><rect x="60" y="334" width="84" height="28" rx="9" fill="#FF7043" opacity="0.85"/></g>
    <g transform="rotate(22 300 440)"><rect x="220" y="390" width="130" height="104" rx="12" fill="#EF5350" opacity="0.85"/><rect x="220" y="366" width="74" height="26" rx="8" fill="#EF5350" opacity="0.85"/></g>
    <g transform="rotate(-15 180 570)"><rect x="100" y="510" width="140" height="114" rx="12" fill="#C62828" opacity="0.85"/><rect x="100" y="484" width="80" height="28" rx="9" fill="#C62828" opacity="0.85"/></g>
    <g transform="rotate(5 280 620)"><rect x="190" y="560" width="150" height="122" rx="14" fill="#FF5252" opacity="0.85"/><rect x="190" y="534" width="84" height="28" rx="9" fill="#FF5252" opacity="0.85"/></g>

    <text x="240" y="810" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#C62828" text-anchor="middle">BEFORE</text>
    <text x="240" y="866" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#E57373" text-anchor="middle">무질서</text>

    <!-- 구분선 -->
    <rect x="480" y="0" width="64" height="1024" fill="#FFFFFF"/>
    <text x="512" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="60" text-anchor="middle">→</text>

    <!-- 오른쪽 — AFTER (깔끔한 트리) -->
    <rect x="544" y="0" width="480" height="1024" fill="#E8F5E9"/>

    <!-- 정돈된 폴더 트리 -->
    <!-- 루트 -->
    <rect x="580" y="160" width="180" height="100" rx="14" fill="#43A047"/>
    <rect x="580" y="134" width="100" height="30" rx="10" fill="#43A047"/>
    <text x="670" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="34" text-anchor="middle" fill="#FFFFFF" font-weight="700">Source</text>

    <line x1="670" y1="260" x2="670" y2="330" stroke="#388E3C" stroke-width="5"/>

    <!-- 하위 폴더 1 -->
    <line x1="670" y1="330" x2="590" y2="330" stroke="#388E3C" stroke-width="5"/>
    <rect x="560" y="308" width="150" height="84" rx="12" fill="#66BB6A"/>
    <rect x="560" y="284" width="88" height="26" rx="8" fill="#66BB6A"/>
    <text x="635" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle" fill="#FFFFFF" font-weight="700">Main</text>

    <!-- 하위 폴더 2 -->
    <line x1="670" y1="380" x2="590" y2="380" stroke="#388E3C" stroke-width="5"/>
    <rect x="560" y="358" width="150" height="84" rx="12" fill="#66BB6A"/>
    <rect x="560" y="334" width="88" height="26" rx="8" fill="#66BB6A"/>
    <text x="635" y="410" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle" fill="#FFFFFF" font-weight="700">Utils</text>

    <!-- 하위 폴더 3 -->
    <line x1="670" y1="430" x2="590" y2="430" stroke="#388E3C" stroke-width="5"/>
    <rect x="560" y="408" width="150" height="84" rx="12" fill="#66BB6A"/>
    <rect x="560" y="384" width="88" height="26" rx="8" fill="#66BB6A"/>
    <text x="635" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle" fill="#FFFFFF" font-weight="700">Tests</text>

    <!-- 체크 마크 -->
    <circle cx="850" cy="400" r="80" fill="#2E7D32"/>
    <polyline points="816,400 840,428 888,368" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="756" y="810" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#2E7D32" text-anchor="middle">AFTER</text>
    <text x="756" y="866" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#66BB6A" text-anchor="middle">정돈</text>
  </g>
</svg>
