<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050010"/>
      <stop offset="100%" stop-color="#0a001e"/>
    </linearGradient>
    <linearGradient id="spiral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pi symbol large -->
  <text x="256" y="300" text-anchor="middle" font-family="serif" font-size="200" fill="#A855F7" opacity="0.12" font-weight="bold">π</text>
  <!-- Spiral of pi digits -->
  <path d="M256,256 Q290,220 310,186 Q325,158 318,128 Q308,96 280,82 Q248,66 218,78 Q186,90 172,118 Q158,148 166,180 Q178,216 204,234 Q234,252 268,248 Q302,242 322,220 Q342,194 338,164 Q332,132 310,114" fill="none" stroke="url(#spiral)" stroke-width="3" opacity="0.7"/>
  <!-- Pi digits along the spiral -->
  <text x="310" y="182" font-family="monospace" font-size="11" fill="#C084FC">3.</text>
  <text x="318" y="150" font-family="monospace" font-size="10" fill="#A855F7">14</text>
  <text x="298" y="120" font-family="monospace" font-size="10" fill="#9333EA">15</text>
  <text x="262" y="98" font-family="monospace" font-size="10" fill="#A855F7">92</text>
  <text x="224" y="96" font-family="monospace" font-size="10" fill="#9333EA">65</text>
  <text x="190" y="112" font-family="monospace" font-size="10" fill="#A855F7">35</text>
  <text x="170" y="140" font-family="monospace" font-size="10" fill="#9333EA">89</text>
  <text x="164" y="174" font-family="monospace" font-size="10" fill="#A855F7">79</text>
  <text x="178" y="208" font-family="monospace" font-size="10" fill="#9333EA">32</text>
  <text x="202" y="232" font-family="monospace" font-size="10" fill="#A855F7">38</text>
  <text x="238" y="248" font-family="monospace" font-size="10" fill="#9333EA">46</text>
  <text x="274" y="244" font-family="monospace" font-size="10" fill="#A855F7">26</text>
  <text x="304" y="228" font-family="monospace" font-size="10" fill="#9333EA">43</text>
  <text x="324" y="206" font-family="monospace" font-size="10" fill="#A855F7">38</text>
  <text x="330" y="178" font-family="monospace" font-size="10" fill="#9333EA">32</text>
  <!-- Center: π value -->
  <circle cx="256" cy="256" r="30" fill="#14002e" stroke="#A855F7" stroke-width="2"/>
  <text x="256" y="253" text-anchor="middle" font-family="serif" font-size="20" fill="#C084FC" font-weight="bold">π</text>
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="9" fill="#9333EA">≈3.14159</text>
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="12" fill="#A855F7" opacity="0.7">PI SPIRAL</text>
</svg>
