<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f4a"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4757" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6b81" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa502" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffcc02" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ed573" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7bed9f" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#70a1ff" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Parallax layers (offset rectangles) -->
  <rect x="60" y="180" width="350" height="60" rx="8" fill="url(#layer1)"/>
  <rect x="90" y="220" width="350" height="60" rx="8" fill="url(#layer2)"/>
  <rect x="70" y="260" width="350" height="60" rx="8" fill="url(#layer3)"/>
  <rect x="100" y="300" width="350" height="60" rx="8" fill="url(#layer4)"/>
  <!-- Layer depth indicators -->
  <text x="68" y="217" font-family="Arial" font-size="16" fill="#fff" opacity="0.8" font-weight="bold">LAYER 1</text>
  <text x="98" y="257" font-family="Arial" font-size="16" fill="#fff" opacity="0.7">LAYER 2</text>
  <text x="78" y="297" font-family="Arial" font-size="16" fill="#fff" opacity="0.6">LAYER 3</text>
  <text x="108" y="337" font-family="Arial" font-size="16" fill="#fff" opacity="0.5">LAYER 4</text>
  <!-- Perspective indicator arrows on side -->
  <path d="M430 185 L445 185 L445 355 L430 355" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <text x="448" y="275" font-family="Arial" font-size="12" fill="#ffffff" opacity="0.5" transform="rotate(90,448,275)">DEPTH</text>
  <!-- Eye viewpoint icon -->
  <ellipse cx="256" cy="110" rx="40" ry="22" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
  <circle cx="256" cy="110" r="10" fill="#ffffff" opacity="0.8"/>
  <!-- Lines from eye to layers -->
  <line x1="230" y1="125" x2="100" y2="178" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
  <line x1="282" y1="125" x2="410" y2="178" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
</svg>
