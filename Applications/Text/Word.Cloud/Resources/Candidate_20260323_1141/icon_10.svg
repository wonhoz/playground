<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 밝은 크림 -->
  <rect width="1024" height="1024" rx="180" fill="#FFFDE7"/>
  <!-- Layer 2: 단어 빈도 히트맵 (격자형, 색상 강도로 빈도 표현) -->
  <!-- 7×6 격자 히트맵 -->
  <!-- 행 1 -->
  <rect x="120" y="200" width="110" height="80" rx="8" fill="#FFECB3"/>
  <rect x="244" y="200" width="110" height="80" rx="8" fill="#FFD54F"/>
  <rect x="368" y="200" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="492" y="200" width="110" height="80" rx="8" fill="#FF6F00"/>
  <rect x="616" y="200" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="740" y="200" width="110" height="80" rx="8" fill="#BF360C"/>
  <rect x="864" y="200" width="40" height="80" rx="8" fill="#7F0000"/>
  <!-- 행 2 -->
  <rect x="120" y="296" width="110" height="80" rx="8" fill="#FFD54F"/>
  <rect x="244" y="296" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="368" y="296" width="110" height="80" rx="8" fill="#FF6F00"/>
  <rect x="492" y="296" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="616" y="296" width="110" height="80" rx="8" fill="#BF360C"/>
  <rect x="740" y="296" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="864" y="296" width="40" height="80" rx="8" fill="#FFD54F"/>
  <!-- 행 3 (가장 밀도) -->
  <rect x="120" y="392" width="110" height="80" rx="8" fill="#FF6F00"/>
  <rect x="244" y="392" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="368" y="392" width="110" height="80" rx="8" fill="#BF360C"/>
  <rect x="492" y="392" width="110" height="80" rx="8" fill="#7F0000"/>
  <rect x="616" y="392" width="110" height="80" rx="8" fill="#BF360C"/>
  <rect x="740" y="392" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="864" y="392" width="40" height="80" rx="8" fill="#FF6F00"/>
  <!-- 행 4 -->
  <rect x="120" y="488" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="244" y="488" width="110" height="80" rx="8" fill="#FF6F00"/>
  <rect x="368" y="488" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="492" y="488" width="110" height="80" rx="8" fill="#BF360C"/>
  <rect x="616" y="488" width="110" height="80" rx="8" fill="#E65100"/>
  <rect x="740" y="488" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="864" y="488" width="40" height="80" rx="8" fill="#FFD54F"/>
  <!-- 행 5 -->
  <rect x="120" y="584" width="110" height="80" rx="8" fill="#FFD54F"/>
  <rect x="244" y="584" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="368" y="584" width="110" height="80" rx="8" fill="#FF6F00"/>
  <rect x="492" y="584" width="110" height="80" rx="8" fill="#FFA000"/>
  <rect x="616" y="584" width="110" height="80" rx="8" fill="#FFD54F"/>
  <rect x="740" y="584" width="110" height="80" rx="8" fill="#FFECB3"/>
  <rect x="864" y="584" width="40" height="80" rx="8" fill="#FFECB3"/>
  <!-- Layer 3: 단어들 오버레이 (격자 위에) -->
  <text x="175" y="252" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">the</text>
  <text x="299" y="252" font-family="Arial" font-size="32" fill="white" text-anchor="middle" font-weight="bold">and</text>
  <text x="423" y="252" font-family="Arial" font-size="36" fill="white" text-anchor="middle" font-weight="bold">of</text>
  <text x="547" y="252" font-family="Arial" font-size="44" fill="white" text-anchor="middle" font-weight="bold">is</text>
  <text x="671" y="252" font-family="Arial" font-size="52" fill="white" text-anchor="middle" font-weight="bold">it</text>
  <text x="795" y="252" font-family="Arial" font-size="60" fill="white" text-anchor="middle" font-weight="bold">a</text>
  <!-- 타이틀 -->
  <text x="512" y="760" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#E65100" text-anchor="middle">HEATMAP</text>
</svg>
