<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="robot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="186" y="130" width="140" height="110" rx="18" fill="url(#robot)"/>
  <rect x="194" y="142" width="124" height="90" rx="12" fill="#0D47A1"/>
  <!-- Eyes (screens) -->
  <rect x="206" y="155" width="44" height="30" rx="6" fill="#00E5FF"/>
  <rect x="262" y="155" width="44" height="30" rx="6" fill="#00E5FF"/>
  <text x="228" y="175" text-anchor="middle" font-size="14" fill="#0D47A1" font-family="Courier New" font-weight="bold">&gt;_</text>
  <text x="284" y="175" text-anchor="middle" font-size="14" fill="#0D47A1" font-family="Courier New" font-weight="bold">01</text>
  <!-- Antenna -->
  <rect x="252" y="110" width="8" height="24" rx="4" fill="#90CAF9"/>
  <circle cx="256" cy="106" r="8" fill="#29B6F6"/>
  <!-- Body -->
  <rect x="178" y="250" width="156" height="100" rx="14" fill="url(#robot)" opacity="0.85"/>
  <!-- Code on chest -->
  <rect x="192" y="264" width="90" height="8" rx="3" fill="#1565C0"/>
  <rect x="192" y="280" width="70" height="8" rx="3" fill="#1565C0" opacity="0.8"/>
  <rect x="192" y="296" width="80" height="8" rx="3" fill="#1565C0" opacity="0.7"/>
  <!-- Arms -->
  <rect x="140" y="255" width="42" height="28" rx="10" fill="#64B5F6"/>
  <rect x="330" y="255" width="42" height="28" rx="10" fill="#64B5F6"/>
  <!-- Coin badge -->
  <circle cx="320" cy="290" r="20" fill="#FFD54F"/>
  <text x="320" y="296" text-anchor="middle" font-size="16" fill="#3E2723" font-weight="bold" font-family="Arial">$</text>
  <!-- Legs -->
  <rect x="204" y="348" width="44" height="50" rx="10" fill="#64B5F6"/>
  <rect x="264" y="348" width="44" height="50" rx="10" fill="#64B5F6"/>
</svg>
