  <circle cx="704" cy="350" r="24" fill="#37474F"/>
  <rect x="738" y="338" width="80" height="12" rx="4" fill="#546E7A" opacity="0.6"/>
  <rect x="738" y="358" width="60" height="12" rx="4" fill="#546E7A" opacity="0.4"/>
  <rect x="654" y="462" width="200" height="100" rx="16" fill="#263238" stroke="#37474F" stroke-width="5"/>
  <circle cx="704" cy="512" r="24" fill="#37474F"/>
  <rect x="738" y="500" width="80" height="12" rx="4" fill="#546E7A" opacity="0.6"/>
  <rect x="738" y="520" width="60" height="12" rx="4" fill="#546E7A" opacity="0.4"/>
  <rect x="654" y="624" width="200" height="100" rx="16" fill="#263238" stroke="#37474F" stroke-width="5"/>
  <circle cx="704" cy="674" r="24" fill="#546E7A"/>
