<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050010"/>
  <!-- Index finger pointing down (tap) -->
  <!-- Hand/palm -->
  <rect x="380" y="560" width="264" height="280" rx="60" fill="#4527A0"/>
  <!-- Index finger extended -->
  <rect x="460" y="280" width="104" height="320" rx="52" fill="#4527A0"/>
  <!-- Fingertip highlight -->
  <ellipse cx="512" cy="300" rx="44" ry="36" fill="#9575CD" opacity="0.7"/>
  <!-- Tap ripples at bottom of finger -->
  <circle cx="512" cy="610" r="80" fill="none" stroke="#9575CD" stroke-width="14" opacity="0.5"/>
  <circle cx="512" cy="610" r="130" fill="none" stroke="#9575CD" stroke-width="8" opacity="0.3"/>
  <circle cx="512" cy="610" r="180" fill="none" stroke="#9575CD" stroke-width="5" opacity="0.15"/>
  <!-- Other fingers curled -->
  <rect x="320" y="540" width="76" height="180" rx="38" fill="#4527A0" opacity="0.6"/>
  <rect x="628" y="540" width="76" height="180" rx="38" fill="#4527A0" opacity="0.6"/>
  <!-- Calculator key hint -->
  <rect x="468" y="700" width="88" height="70" rx="14" fill="#9575CD" opacity="0.3"/>
</svg>
