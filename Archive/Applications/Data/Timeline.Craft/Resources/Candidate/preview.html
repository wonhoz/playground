<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timeline.Craft - Icon Candidates</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { color: #e0e0e0; font-size: 22px; margin-bottom: 8px; letter-spacing: 0.5px; }
    p  { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #555; transform: translateY(-3px); }
    .card img { width: 120px; height: 120px; border-radius: 20px; }
    .card span {
      color: #aaa;
      font-size: 11px;
      text-align: center;
      word-break: break-all;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Timeline.Craft — Icon Candidates</h1>
  <p>타임라인 시각화 제작 도구 | 총 10개 후보 아이콘</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_blue_timeline.svg"/><span>01 · Blue Timeline</span></div>
    <div class="card"><img src="candidate_02_green_milestones.svg"/><span>02 · Green Milestones</span></div>
    <div class="card"><img src="candidate_03_purple_gantt.svg"/><span>03 · Purple Gantt</span></div>
    <div class="card"><img src="candidate_04_orange_history.svg"/><span>04 · Orange History</span></div>
    <div class="card"><img src="candidate_05_teal_roadmap.svg"/><span>05 · Teal Roadmap</span></div>
    <div class="card"><img src="candidate_06_red_calendar.svg"/><span>06 · Red Calendar</span></div>
    <div class="card"><img src="candidate_07_midnight_flow.svg"/><span>07 · Midnight Flow</span></div>
    <div class="card"><img src="candidate_08_amber_journey.svg"/><span>08 · Amber Journey</span></div>
    <div class="card"><img src="candidate_09_indigo_spiral.svg"/><span>09 · Indigo Spiral</span></div>
    <div class="card"><img src="candidate_10_rose_events.svg"/><span>10 · Rose Events</span></div>
  </div>
</body>
</html>
