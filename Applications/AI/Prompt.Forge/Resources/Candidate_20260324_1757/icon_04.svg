    <circle cx="880" cy="180" r="28" fill="#22D3EE"/>
    <circle cx="840" cy="400" r="22" fill="#06B6D4"/>
    <circle cx="160" cy="640" r="26" fill="#22D3EE"/>
    <circle cx="300" cy="200" r="20" fill="#67E8F9"/>
