<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금빛 배경 (대장간 컨셉) -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#FF6F00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <rect width="1024" height="1024" rx="190" fill="url(#glow3)"/>
  <!-- Layer 2: 모루(anvil) 위의 음표 -->
  <!-- 모루 받침 -->
  <rect x="240" y="680" width="544" height="80" rx="16" fill="#5D4037"/>
  <!-- 모루 본체 -->
  <rect x="280" y="560" width="464" height="140" rx="24" fill="#795548"/>
  <!-- 모루 뿔 -->
  <polygon points="280,560 200,600 280,640" fill="#6D4C41"/>
  <!-- 불꽃/스파크 효과 -->
  <circle cx="512" cy="520" r="40" fill="#FF6F00" opacity="0.9"/>
  <circle cx="512" cy="520" r="25" fill="#FFCA28"/>
  <!-- 음표 — 두드려지고 있는 대상 -->
  <text x="512" y="555" font-family="'Segoe UI', sans-serif" font-size="160" fill="#1A237E" text-anchor="middle" transform="rotate(-15 512 480)">♪</text>
  <!-- Layer 3: 망치 -->
  <!-- 망치 머리 -->
  <rect x="580" y="200" width="180" height="120" rx="20" fill="#37474F" transform="rotate(45 670 260)"/>
  <!-- 망치 자루 -->
  <rect x="730" y="340" width="40" height="280" rx="12" fill="#8D6E63" transform="rotate(45 750 480)"/>
  <!-- 스파크 별 -->
  <circle cx="380" cy="440" r="22" fill="#FFCA28"/>
  <circle cx="430" cy="380" r="14" fill="#FF6F00"/>
  <circle cx="320" cy="380" r="18" fill="#FFA000"/>
  <!-- Tag.Forge 텍스트 배지 -->
  <rect x="280" y="820" width="464" height="68" rx="20" fill="#E65100"/>
  <text x="512" y="866" font-family="'Consolas', monospace" font-size="48" fill="white" text-anchor="middle" font-weight="700">TAG FORGE</text>
</svg>
