  <rect x="560" y="90" width="260" height="120" rx="20" fill="url(#hammerGrad)"/>
  <rect x="560" y="90" width="260" height="120" rx="20" fill="none" stroke="#FF6600" stroke-width="3" opacity="0.8"/>
  <!-- 망치 면 강조 -->
  <rect x="570" y="100" width="240" height="40" rx="10" fill="#FFAA00" opacity="0.4"/>
