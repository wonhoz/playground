<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg04cp)"/>

  <!-- Layer 2: Clipboard shape -->
  <!-- Clipboard body -->
  <rect x="240" y="220" width="544" height="620" rx="24" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="380" y="180" width="264" height="90" rx="20" fill="#00BCD4"/>
  <rect x="420" y="195" width="184" height="62" rx="12" fill="white"/>
  <!-- Clipboard hole -->
  <ellipse cx="512" cy="225" rx="40" ry="28" fill="#00BCD4"/>

  <!-- Symbols floating up from clipboard -->
  <text x="512" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#00695C" text-anchor="middle">©</text>
  <text x="380" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0277BD" text-anchor="middle">∑</text>
  <text x="644" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#880E4F" text-anchor="middle">→</text>
  <text x="512" y="680" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#E65100" text-anchor="middle">€</text>

  <!-- Layer 3: Flying arrow indicating copy -->
  <path d="M760 350 L880 350" stroke="#FFF176" stroke-width="20" stroke-linecap="round"
    marker-end="url(#arrowhead)"/>
  <path d="M790 280 C830 280 870 310 870 350 C870 390 830 420 790 420"
    fill="none" stroke="#FFF176" stroke-width="14" stroke-linecap="round"/>

  <!-- "Copied!" badge -->
  <rect x="700" y="760" width="264" height="80" rx="40" fill="#FFF176"/>
  <text x="832" y="813" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="bold"
    fill="#00695C" text-anchor="middle">Copied!</text>

  <!-- Small sparkle -->
  <circle cx="180" cy="400" r="16" fill="#B2EBF2" opacity="0.8"/>
  <circle cx="160" cy="500" r="10" fill="#FFF176" opacity="0.7"/>
  <circle cx="200" cy="600" r="14" fill="#B2EBF2" opacity="0.6"/>
</svg>
