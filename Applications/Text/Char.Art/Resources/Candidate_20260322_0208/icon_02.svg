<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02 | Literal | 레이어드 | 사진 → ASCII 변환 과정: 좌=원본사진, 우=ASCII 결과 -->
  <!-- 색조: 따뜻한 주황-앰버 배경 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="128" fill="#1A0E00"/>

  <!-- 화살표 (변환 방향) -->
  <path d="M490 512 L534 512 L520 498 M534 512 L520 526" stroke="#FF8C00" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 왼쪽: 원본 사진 프레임 (산 풍경 추상화) -->
  <rect x="185" y="290" width="270" height="270" rx="16" fill="#2A1A00" stroke="#FF8C00" stroke-width="6"/>
  <!-- 하늘 -->
  <rect x="185" y="290" width="270" height="135" rx="16" fill="#1E3A5F"/>
  <rect x="185" y="370" width="270" height="55" fill="#1E3A5F"/>
  <!-- 태양 -->
  <circle cx="295" cy="340" r="32" fill="#FFD700"/>
  <!-- 산 실루엣 -->
  <polygon points="185,560 270,390 355,470 400,410 455,560" fill="#2D4A1E"/>
  <!-- 사진 모서리 장식 -->
  <rect x="185" y="290" width="270" height="270" rx="16" fill="none" stroke="#FF8C00" stroke-width="6"/>

  <!-- 오른쪽: ASCII 텍스트 아트 패널 -->
  <rect x="569" y="290" width="270" height="270" rx="16" fill="#0A0A0A" stroke="#FF8C00" stroke-width="6"/>
  <g font-family="Courier New, monospace" font-size="13.5" fill="#FF8C00">
    <text x="580" y="315">..::^^**@@##@@**^^::..</text>
    <text x="580" y="332">.:^*@####@@@@####@*^:.</text>
    <text x="580" y="349">:^*@##@@@@@@@@@@##@*^:</text>
    <text x="580" y="366">^*@#@@@@@@@@@@@@@@#@*^</text>
    <text x="580" y="383">*@#@@@@@@@@@@@@@@@#@*</text>
    <text x="580" y="400">@#@@@@@@@@@@@@@@@@#@</text>
    <text x="580" y="417">##@@####@@@@####@@##</text>
    <text x="580" y="434">@*^^::..  ..::^^*@</text>
    <text x="580" y="451">*^:..        ..:^*</text>
    <text x="580" y="468">^:.            .:^</text>
    <text x="580" y="485">:.     @@@@     .:</text>
    <text x="580" y="502">:    @@@@@@@@    :</text>
    <text x="580" y="519">:.  @@@@@@@@@  .:</text>
    <text x="580" y="536">^:. @@@@@@@@ .:^</text>
    <text x="580" y="553">*^:..@@@@..:^*</text>
    <text x="580" y="553">*^:..@@@@..:^*</text>
  </g>

  <!-- 레이블 -->
  <text x="320" y="600" font-family="Courier New, monospace" font-size="22" fill="#FF8C00" text-anchor="middle">IMAGE</text>
  <text x="704" y="600" font-family="Courier New, monospace" font-size="22" fill="#FF8C00" text-anchor="middle">ASCII</text>
</svg>
