  <line x1="836" y1="340" x2="836" y2="160" stroke="#1A237E" stroke-width="16" stroke-linecap="round"/>
  <!-- Layer 3: 태그 레이블 붙이기 -->
  <!-- ID3 태그 카드 -->
  <rect x="200" y="600" width="620" height="260" rx="24" fill="white" stroke="#00897B" stroke-width="6"/>
