<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | MD→HTML 변환 화살표 | 대각선/동적 | #1E3A8A 다크블루 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1628"/>
  <!-- Layer 2: Left MD block -->
  <rect x="110" y="280" width="320" height="420" rx="16" fill="#1E3A8A" opacity="0.8"/>
  <text x="270" y="370" font-family="Consolas,monospace" font-size="36" fill="#93C5FD" text-anchor="middle" font-weight="bold">MD</text>
  <!-- MD syntax lines -->
  <text x="140" y="430" font-family="Consolas,monospace" font-size="18" fill="#60A5FA"># 제목</text>
  <text x="140" y="462" font-family="Consolas,monospace" font-size="16" fill="#93C5FD">**굵게**</text>
  <text x="140" y="492" font-family="Consolas,monospace" font-size="16" fill="#BFDBFE">- 목록</text>
  <text x="140" y="522" font-family="Consolas,monospace" font-size="15" fill="#DBEAFE">`코드`</text>
  <text x="140" y="550" font-family="Consolas,monospace" font-size="14" fill="#EFF6FF" opacity="0.6">[링크](url)</text>
  <!-- Arrow -->
  <path d="M448 490 L576 490" stroke="#F59E0B" stroke-width="16" stroke-linecap="round"/>
  <polygon points="570,466 626,490 570,514" fill="#F59E0B"/>
  <!-- Sparkle on arrow -->
  <circle cx="494" cy="477" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="534" cy="503" r="5" fill="#FDE68A" opacity="0.5"/>
  <!-- Right HTML rendered block -->
  <rect x="594" y="280" width="320" height="420" rx="16" fill="#F0FDF4"/>
  <text x="754" y="370" font-family="Arial,sans-serif" font-size="30" fill="#166534" text-anchor="middle" font-weight="bold">렌더링</text>
  <!-- Rendered lines -->
  <text x="624" y="430" font-family="Arial,sans-serif" font-size="22" fill="#15803D" font-weight="bold">제목</text>
  <text x="624" y="466" font-family="Arial,sans-serif" font-size="17" fill="#374151"><tspan font-weight="bold">굵게</tspan></text>
  <text x="624" y="496" font-family="Arial,sans-serif" font-size="16" fill="#374151">• 목록</text>
  <rect x="624" y="510" width="140" height="28" rx="4" fill="#E5E7EB"/>
  <text x="634" y="529" font-family="Consolas,monospace" font-size="14" fill="#374151">코드</text>
  <text x="624" y="555" font-family="Arial,sans-serif" font-size="14" fill="#2563EB" text-decoration="underline">링크</text>
  <!-- Layer 3: File type labels -->
  <text x="270" y="740" font-family="Arial,sans-serif" font-size="22" fill="#60A5FA" text-anchor="middle">.md</text>
  <text x="754" y="740" font-family="Arial,sans-serif" font-size="22" fill="#16A34A" text-anchor="middle">HTML</text>
</svg>
