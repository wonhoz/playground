<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000810"/>
      <stop offset="100%" style="stop-color:#001830"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="laneGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ccff;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#00ccff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3 aerial lanes -->
  <rect x="40" y="140" width="432" height="50" rx="6" fill="url(#laneGlow)"/>
  <rect x="40" y="231" width="432" height="50" rx="6" fill="url(#laneGlow)" opacity="0.8"/>
  <rect x="40" y="322" width="432" height="50" rx="6" fill="url(#laneGlow)" opacity="0.6"/>
  <!-- Lane borders -->
  <line x1="40" y1="140" x2="472" y2="140" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="40" y1="190" x2="472" y2="190" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="40" y1="231" x2="472" y2="231" stroke="#00ccff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <line x1="40" y1="281" x2="472" y2="281" stroke="#00ccff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <line x1="40" y1="322" x2="472" y2="322" stroke="#00ccff" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <line x1="40" y1="372" x2="472" y2="372" stroke="#00ccff" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <!-- Player plane in middle lane -->
  <g transform="translate(220, 256)" filter="url(#glow)">
    <path d="M-55 0 Q-38 -6 0 -6 Q42 -6 60 0 Q42 6 0 6 Q-38 6 -55 0 Z" fill="#aaddff"/>
    <path d="M-4 -6 L-25 -32 L16 -32 L22 -6 Z" fill="#88bbdd"/>
    <path d="M-4 6 L-25 32 L16 32 L22 6 Z" fill="#88bbdd"/>
    <path d="M-46 0 L-60 -20 L-38 -6 Z" fill="#6699bb"/>
    <path d="M-46 0 L-58 14 L-38 6 Z" fill="#6699bb" opacity="0.8"/>
    <ellipse cx="36" cy="0" rx="14" ry="5" fill="#0088cc" opacity="0.9"/>
  </g>
  <!-- Obstacle planes in other lanes -->
  <g transform="translate(330, 165) rotate(5)" opacity="0.7">
    <path d="M-40 0 Q-28 -5 0 -5 Q32 -5 44 0 Q32 5 0 5 Q-28 5 -40 0 Z" fill="#ff4400" opacity="0.8"/>
    <path d="M-3 -5 L-18 -24 L12 -24 L16 -5 Z" fill="#cc3300" opacity="0.8"/>
    <path d="M-3 5 L-18 24 L12 24 L16 5 Z" fill="#cc3300" opacity="0.8"/>
  </g>
  <g transform="translate(360, 347) rotate(-3)" opacity="0.6">
    <path d="M-40 0 Q-28 -5 0 -5 Q32 -5 44 0 Q32 5 0 5 Q-28 5 -40 0 Z" fill="#ff8800" opacity="0.8"/>
    <path d="M-3 -5 L-18 -24 L12 -24 L16 -5 Z" fill="#cc6600" opacity="0.8"/>
    <path d="M-3 5 L-18 24 L12 24 L16 5 Z" fill="#cc6600" opacity="0.8"/>
  </g>
  <!-- Drift trail -->
  <path d="M80 256 Q148 254 210 256" stroke="#00ccff" stroke-width="4" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.8"/>
  <path d="M80 261 Q145 260 206 261" stroke="#00aaff" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.5"/>
</svg>