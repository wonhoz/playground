<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack layers -->
  <rect x="100" y="160" width="312" height="52" rx="10" fill="url(#layer1)"/>
  <text x="195" y="192" font-family="monospace" font-size="20" fill="white" font-weight="bold">FRONTEND</text>
  <rect x="100" y="228" width="312" height="52" rx="10" fill="url(#layer2)"/>
  <text x="198" y="260" font-family="monospace" font-size="20" fill="white" font-weight="bold">BACKEND</text>
  <rect x="100" y="296" width="312" height="52" rx="10" fill="url(#layer3)"/>
  <text x="205" y="328" font-family="monospace" font-size="20" fill="white" font-weight="bold">DATABASE</text>
  <!-- Skill badges -->
  <circle cx="130" cy="186" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="122" y="191" font-family="monospace" font-size="12" fill="white">JS</text>
  <circle cx="130" cy="254" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="122" y="259" font-family="monospace" font-size="12" fill="white">C#</text>
  <circle cx="130" cy="322" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="119" y="327" font-family="monospace" font-size="11" fill="white">SQL</text>
  <!-- Cast icon -->
  <circle cx="256" cy="420" r="36" fill="#0D47A1" stroke="#42A5F5" stroke-width="3"/>
  <polygon points="256,405 244,428 268,428" fill="#42A5F5"/>
  <text x="235" y="445" font-family="monospace" font-size="11" fill="#90CAF9">CAST</text>
</svg>
