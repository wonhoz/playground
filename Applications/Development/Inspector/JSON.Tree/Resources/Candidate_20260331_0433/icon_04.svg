<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 블루 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1B3E"/>
  <!-- Layer 2: X-ray 파일 외곽선 -->
  <rect x="240" y="120" width="544" height="784" rx="32" fill="none" stroke="#29B6F6" stroke-width="16" opacity="0.7"/>
  <!-- X-ray 투시 라인들 -->
  <line x1="240" y1="240" x2="784" y2="240" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <line x1="240" y1="340" x2="784" y2="340" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <line x1="240" y1="440" x2="784" y2="440" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <line x1="240" y1="540" x2="784" y2="540" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <line x1="240" y1="640" x2="784" y2="640" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <line x1="240" y1="740" x2="784" y2="740" stroke="#29B6F6" stroke-width="4" opacity="0.3"/>
  <!-- Layer 3: 투과된 트리 구조 (네온 컬러) -->
  <!-- 루트 키 -->
  <text x="280" y="300" font-family="'Consolas', monospace" font-size="60" fill="#00E5FF">{</text>
  <!-- 중첩 노드 -->
  <rect x="320" y="310" width="12" height="300" rx="4" fill="#69F0AE" opacity="0.8"/>
  <text x="350" y="380" font-family="'Consolas', monospace" font-size="56" fill="#69F0AE">"name"</text>
  <text x="610" y="380" font-family="'Consolas', monospace" font-size="56" fill="#FFD180">: "A"</text>
  <text x="350" y="460" font-family="'Consolas', monospace" font-size="56" fill="#69F0AE">"count"</text>
  <text x="638" y="460" font-family="'Consolas', monospace" font-size="56" fill="#FF80AB">: 7</text>
  <text x="350" y="540" font-family="'Consolas', monospace" font-size="56" fill="#69F0AE">"data"</text>
  <text x="578" y="540" font-family="'Consolas', monospace" font-size="56" fill="#00E5FF">: [</text>
  <!-- 중첩 배열 -->
  <rect x="420" y="550" width="10" height="120" rx="4" fill="#FFD180" opacity="0.7"/>
  <text x="448" y="610" font-family="'Consolas', monospace" font-size="48" fill="#FFD180">true,</text>
  <text x="448" y="660" font-family="'Consolas', monospace" font-size="48" fill="#FFD180">42</text>
  <text x="350" y="710" font-family="'Consolas', monospace" font-size="56" fill="#00E5FF">]</text>
  <text x="280" y="800" font-family="'Consolas', monospace" font-size="60" fill="#00E5FF">}</text>
</svg>
