<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0d0508"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 회로 기판 스타일 모자이크 -->
  <!-- 배경 회로선 -->
  <line x1="60" y1="130" x2="452" y2="130" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="230" x2="452" y2="230" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="330" x2="452" y2="330" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="60" x2="130" y2="390" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="60" x2="230" y2="390" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="60" x2="330" y2="390" stroke="#2a0808" stroke-width="1.5" opacity="0.5"/>
  <!-- 사진 타일들 (회로 교점에 배치) -->
  <!-- 큰 중앙 타일 -->
  <rect x="205" y="205" width="102" height="102" rx="6" fill="#1a0508" stroke="#F43F5E" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <!-- 내부 패턴 (사진) -->
  <circle cx="256" cy="245" r="22" fill="#2a0810" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <path d="M234,268 Q256,250 278,268" fill="none" stroke="#F43F5E" stroke-width="2" opacity="0.8"/>
  <rect x="215" y="282" width="82" height="16" rx="3" fill="#1a0810" opacity="0.7"/>
  <!-- 4 중간 타일 -->
  <rect x="105" y="205" width="82" height="82" rx="5" fill="#140408" stroke="#BE185D" stroke-width="1.5" opacity="0.85"/>
  <circle cx="146" cy="235" r="16" fill="#200810" stroke="#BE185D" stroke-width="1" opacity="0.8"/>
  <rect x="305" y="205" width="82" height="82" rx="5" fill="#140408" stroke="#BE185D" stroke-width="1.5" opacity="0.85"/>
  <circle cx="346" cy="235" r="16" fill="#200810" stroke="#BE185D" stroke-width="1" opacity="0.8"/>
  <rect x="205" y="105" width="82" height="82" rx="5" fill="#140408" stroke="#F43F5E" stroke-width="1.5" opacity="0.85"/>
  <circle cx="246" cy="135" r="16" fill="#200810" stroke="#F43F5E" stroke-width="1" opacity="0.8"/>
  <rect x="205" y="325" width="82" height="82" rx="5" fill="#140408" stroke="#F43F5E" stroke-width="1.5" opacity="0.85"/>
  <circle cx="246" cy="355" r="16" fill="#200810" stroke="#F43F5E" stroke-width="1" opacity="0.8"/>
  <!-- 8 작은 모서리 타일 -->
  <rect x="72" y="105" width="60" height="60" rx="4" fill="#0d0408" stroke="#9F1239" stroke-width="1" opacity="0.7"/>
  <rect x="72" y="325" width="60" height="60" rx="4" fill="#0d0408" stroke="#9F1239" stroke-width="1" opacity="0.7"/>
  <rect x="380" y="105" width="60" height="60" rx="4" fill="#0d0408" stroke="#9F1239" stroke-width="1" opacity="0.7"/>
  <rect x="380" y="325" width="60" height="60" rx="4" fill="#0d0408" stroke="#9F1239" stroke-width="1" opacity="0.7"/>
  <!-- 회로 연결선 (밝은) -->
  <line x1="187" y1="246" x2="205" y2="246" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="307" y1="246" x2="325" y2="246" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="256" y1="187" x2="256" y2="205" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="256" y1="307" x2="256" y2="325" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- 교점 점 -->
  <circle cx="130" cy="130" r="5" fill="#F43F5E" opacity="0.6"/>
  <circle cx="230" cy="130" r="5" fill="#F43F5E" opacity="0.6"/>
  <circle cx="330" cy="130" r="5" fill="#F43F5E" opacity="0.6"/>
  <circle cx="130" cy="230" r="5" fill="#F43F5E" opacity="0.6"/>
  <circle cx="330" cy="230" r="5" fill="#F43F5E" opacity="0.6"/>
  <!-- 하단 -->
  <rect x="130" y="418" width="252" height="52" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="443" text-anchor="middle" font-size="14" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">CIRCUIT TILE</text>
  <text x="256" y="459" text-anchor="middle" font-size="10" fill="#888" opacity="0.7">회로 격자 모자이크</text>
</svg>
