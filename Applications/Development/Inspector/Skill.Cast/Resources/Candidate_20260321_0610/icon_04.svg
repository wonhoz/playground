<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A4A8C"/>
      <stop offset="100%" stop-color="#0A1F4A"/>
    </radialGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BBFFF"/>
      <stop offset="50%" stop-color="#3A9FE0"/>
      <stop offset="100%" stop-color="#1A7FCC"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFB700"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#80D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#80D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow04">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- 신경망 배경 패턴 -->
  <circle cx="512" cy="460" r="320" fill="url(#brainGlow)"/>
  <!-- 배경 연결선들 -->
  <line x1="200" y1="300" x2="400" y2="450" stroke="#5BBFFF" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="600" y1="250" x2="750" y2="400" stroke="#5BBFFF" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="180" y1="600" x2="380" y2="550" stroke="#5BBFFF" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="700" y1="580" x2="840" y2="650" stroke="#5BBFFF" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Layer 2: 메인 오브젝트 — AI 뇌 실루엣 -->
  <!-- 뇌 외형 (반쪽씩) -->
  <g fill="url(#brainGrad)" filter="url(#glow04)">
    <!-- 왼쪽 반구 -->
    <path d="M 512 240
      C 420 240 340 290 310 360
      C 280 430 285 480 300 520
      C 310 545 295 570 300 600
      C 308 630 340 650 380 650
      C 400 650 420 640 440 630
      L 440 580 L 480 580 L 480 540 L 440 540 L 440 480 L 490 480
      L 490 420 L 440 420 L 440 360 L 490 360 L 490 300
      C 500 270 512 250 512 240 Z"/>
    <!-- 오른쪽 반구 -->
    <path d="M 512 240
      C 604 240 684 290 714 360
      C 744 430 739 480 724 520
      C 714 545 729 570 724 600
      C 716 630 684 650 644 650
      C 624 650 604 640 584 630
      L 584 580 L 544 580 L 544 540 L 584 540 L 584 480 L 534 480
      L 534 420 L 584 420 L 584 360 L 534 360 L 534 300
      C 524 270 512 250 512 240 Z"/>
  </g>
  <!-- 뇌 중앙 구분선 -->
  <line x1="512" y1="260" x2="512" y2="640" stroke="#1A4A8C" stroke-width="8"/>

  <!-- 뇌 표면 주름 -->
  <path d="M 380 380 Q 420 360 460 380 Q 500 400 540 380 Q 580 360 620 380" fill="none" stroke="#1A7FCC" stroke-width="5" stroke-linecap="round"/>
  <path d="M 370 450 Q 410 430 450 450 Q 490 470 530 450 Q 570 430 610 450" fill="none" stroke="#1A7FCC" stroke-width="5" stroke-linecap="round"/>
  <path d="M 380 520 Q 420 500 460 520 Q 500 540 540 520 Q 580 500 620 520" fill="none" stroke="#1A7FCC" stroke-width="5" stroke-linecap="round"/>

  <!-- Layer 3: 기어들 -->
  <!-- 큰 기어 (우하단) -->
  <g transform="translate(680, 680)" fill="url(#gearGrad)">
    <path d="M 0 -80 L 15 -62 L 62 -62 L 78 -48 L 78 -15 L 62 0 L 78 15 L 78 48 L 62 62 L 15 62 L 0 80 L -15 62 L -62 62 L -78 48 L -78 15 L -62 0 L -78 -15 L -78 -48 L -62 -62 L -15 -62 Z"/>
    <circle cx="0" cy="0" r="36" fill="#1A4A8C"/>
    <circle cx="0" cy="0" r="20" fill="url(#gearGrad)"/>
  </g>
  <!-- 작은 기어 (우중단) -->
  <g transform="translate(730, 520) rotate(30)" fill="#FFD700" fill-opacity="0.85">
    <path d="M 0 -50 L 10 -38 L 38 -38 L 50 -28 L 50 -10 L 38 0 L 50 10 L 50 28 L 38 38 L 10 38 L 0 50 L -10 38 L -38 38 L -50 28 L -50 10 L -38 0 L -50 -10 L -50 -28 L -38 -38 L -10 -38 Z"/>
    <circle cx="0" cy="0" r="22" fill="#1A4A8C"/>
  </g>

  <!-- 신경 연결 노드들 -->
  <circle cx="310" cy="400" r="12" fill="#FFE566" filter="url(#glow04)"/>
  <circle cx="300" cy="530" r="10" fill="#5BBFFF" filter="url(#glow04)"/>
  <circle cx="714" cy="400" r="12" fill="#FFE566" filter="url(#glow04)"/>
  <circle cx="724" cy="530" r="10" fill="#5BBFFF" filter="url(#glow04)"/>
  <circle cx="512" cy="720" r="14" fill="#80D4FF" filter="url(#glow04)"/>
</svg>
