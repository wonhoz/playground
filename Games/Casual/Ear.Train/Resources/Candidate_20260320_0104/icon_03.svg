<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 도레미 계단: 계단식 음정 -->
  <!-- 계단 블록 (낮은 음 → 높은 음) -->
  <rect x="160" y="700" width="120" height="140" rx="8" fill="#558B2F"/>
  <rect x="280" y="580" width="120" height="260" rx="8" fill="#558B2F"/>
  <rect x="400" y="460" width="120" height="380" rx="8" fill="#558B2F"/>
  <rect x="520" y="340" width="120" height="500" rx="8" fill="#558B2F"/>
  <rect x="640" y="220" width="120" height="620" rx="8" fill="#558B2F"/>
  <rect x="760" y="160" width="100" height="680" rx="8" fill="#558B2F"/>
  <!-- 계단 윗면 강조 -->
  <rect x="160" y="700" width="120" height="18" rx="4" fill="#AED581"/>
  <rect x="280" y="580" width="120" height="18" rx="4" fill="#AED581"/>
  <rect x="400" y="460" width="120" height="18" rx="4" fill="#AED581"/>
  <rect x="520" y="340" width="120" height="18" rx="4" fill="#AED581"/>
  <rect x="640" y="220" width="120" height="18" rx="4" fill="#AED581"/>
  <rect x="760" y="160" width="100" height="18" rx="4" fill="#AED581"/>
  <!-- 음표 각 계단 위 -->
  <ellipse cx="220" cy="690" rx="22" ry="17" fill="#AED581"/>
  <ellipse cx="340" cy="570" rx="22" ry="17" fill="#AED581"/>
  <ellipse cx="460" cy="450" rx="22" ry="17" fill="#AED581"/>
  <ellipse cx="580" cy="330" rx="22" ry="17" fill="#AED581"/>
  <ellipse cx="700" cy="210" rx="22" ry="17" fill="#AED581"/>
  <!-- 상승 화살표 -->
  <polyline points="200,660 310,540 430,420 550,300 670,180" stroke="#AED581" stroke-width="6" fill="none" stroke-dasharray="14,10" opacity="0.5" stroke-linecap="round"/>
</svg>
