<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- Code block container (top half, dark) -->
  <rect x="132" y="172" width="760" height="244" rx="24" fill="#1E1E2E" stroke="#2C3E50" stroke-width="14"/>
  <!-- Code content: markdown raw -->
  <text x="166" y="248" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#E91E63">##</text>
  <text x="280" y="248" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF"> Heading</text>
  <text x="166" y="316" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFD93D">**bold**</text>
  <text x="380" y="316" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#06D6A0"> *italic*</text>
  <!-- Downward arrow (transform) -->
  <rect x="470" y="432" width="44" height="80" rx="20" fill="#F57F17" stroke="#E65100" stroke-width="12"/>
  <path d="M 420,506 L 512,584 L 604,506 Z" fill="#F57F17" stroke="#E65100" stroke-width="12" stroke-linejoin="round"/>
  <!-- Rendered result (bottom half, white clean) -->
  <rect x="132" y="452" width="760" height="180" rx="24" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="10"/>
  <text x="162" y="552" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#1A1A1A">Heading</text>
  <text x="162" y="606" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#444"><tspan font-style="italic">italic</tspan></text>
  <!-- FORMAT badge -->
  <rect x="188" y="748" width="648" height="116" rx="36" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">FORMAT</text>
</svg>
