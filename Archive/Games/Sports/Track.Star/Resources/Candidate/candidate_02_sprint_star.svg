<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdd44"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <radialGradient id="starburst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffdd44" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Star burst background -->
  <circle cx="256" cy="256" r="180" fill="url(#starburst)"/>
