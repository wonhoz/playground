<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CBA6F7"/>
      <stop offset="100%" stop-color="#F38BA8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Subtle dot grid background -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1.5" fill="#313244"/>
  </pattern>
  <rect x="60" y="60" width="392" height="392" fill="url(#dots)" opacity="0.8"/>
  <!-- Layout scaffold -->
  <!-- Main container -->
  <rect x="80" y="80" width="352" height="352" rx="8" fill="none" stroke="#45475A" stroke-width="1.5"/>
  <!-- Navbar bar -->
  <rect x="80" y="80" width="352" height="48" rx="8" fill="#313244"/>
  <rect x="84" y="84" width="344" height="40" rx="6" fill="#313244"/>
  <!-- Navbar items -->
  <rect x="96" y="96" width="60" height="16" rx="4" fill="url(#accentGrad)" filter="url(#glow)"/>
  <rect x="172" y="100" width="40" height="8" rx="4" fill="#585B70"/>
  <rect x="224" y="100" width="40" height="8" rx="4" fill="#585B70"/>
  <rect x="276" y="100" width="40" height="8" rx="4" fill="#585B70"/>
  <!-- Three column content -->
  <!-- Col 1 -->
  <rect x="80" y="144" width="100" height="288" rx="0" fill="#1E1E2E" stroke="#45475A" stroke-width="1"/>
  <rect x="88" y="156" width="84" height="32" rx="4" fill="#313244"/>
  <rect x="88" y="196" width="84" height="8" rx="4" fill="#585B70" opacity="0.6"/>
  <rect x="88" y="212" width="70" height="8" rx="4" fill="#585B70" opacity="0.5"/>
  <rect x="88" y="228" width="78" height="8" rx="4" fill="#585B70" opacity="0.4"/>
  <rect x="88" y="244" width="64" height="8" rx="4" fill="#585B70" opacity="0.3"/>
  <!-- Col 2 active -->
  <rect x="180" y="144" width="160" height="288" rx="0" fill="#1A1A2A" stroke="#CBA6F7" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="188" y="156" width="144" height="60" rx="4" fill="#313244"/>
  <rect x="188" y="228" width="144" height="8" rx="4" fill="#CBA6F7" opacity="0.5"/>
  <rect x="188" y="244" width="120" height="8" rx="4" fill="#CBA6F7" opacity="0.4"/>
  <rect x="188" y="260" width="130" height="8" rx="4" fill="#CBA6F7" opacity="0.3"/>
  <rect x="188" y="290" width="100" height="32" rx="4" fill="url(#accentGrad)" filter="url(#glow)"/>
  <text x="238" y="311" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">ADD</text>
  <!-- Col 3 -->
  <rect x="340" y="144" width="92" height="288" rx="0" fill="#1E1E2E" stroke="#45475A" stroke-width="1"/>
  <rect x="348" y="156" width="76" height="48" rx="4" fill="#313244"/>
  <rect x="348" y="216" width="76" height="8" rx="4" fill="#585B70" opacity="0.5"/>
  <rect x="348" y="232" width="60" height="8" rx="4" fill="#585B70" opacity="0.4"/>
  <!-- Selection handles -->
  <rect x="178" y="142" width="164" height="292" rx="6" fill="none" stroke="#CBA6F7" stroke-width="2" stroke-dasharray="5 3" filter="url(#glow)" opacity="0.6"/>
  <rect x="178" y="142" width="8" height="8" fill="#CBA6F7" filter="url(#glow)"/>
  <rect x="334" y="142" width="8" height="8" fill="#CBA6F7" filter="url(#glow)"/>
  <rect x="178" y="426" width="8" height="8" fill="#CBA6F7" filter="url(#glow)"/>
  <rect x="334" y="426" width="8" height="8" fill="#CBA6F7" filter="url(#glow)"/>
</svg>
