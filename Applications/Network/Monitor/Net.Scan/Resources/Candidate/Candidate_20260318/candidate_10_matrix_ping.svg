<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 핑 매트릭스 -->
  <g font-family="monospace" font-size="11" fill="#14B8A6" opacity="0.4">
    <text x="90" y="130">192.168.1.1</text>
    <text x="90" y="165">192.168.1.2</text>
    <text x="90" y="200">192.168.1.3</text>
    <text x="90" y="235">192.168.1.10</text>
    <text x="90" y="270">10.0.0.1</text>
    <text x="90" y="305">10.0.0.2</text>
  </g>
  <!-- 핑 응답 바들 -->
  <rect x="220" y="118" width="85" height="14" rx="7" fill="#14B8A6" opacity="0.7" filter="url(#glow)"/>
  <rect x="220" y="153" width="55" height="14" rx="7" fill="#2DD4BF" opacity="0.6"/>
  <rect x="220" y="188" width="100" height="14" rx="7" fill="#14B8A6" opacity="0.8" filter="url(#glow)"/>
  <rect x="220" y="223" width="40" height="14" rx="7" fill="#2DD4BF" opacity="0.5"/>
  <rect x="220" y="258" width="120" height="14" rx="7" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <rect x="220" y="293" width="70" height="14" rx="7" fill="#2DD4BF" opacity="0.6"/>
  <!-- ms 수치 -->
  <g font-family="monospace" font-size="10" fill="#2DD4BF" opacity="0.7">
    <text x="312" y="130">12ms ✓</text>
    <text x="282" y="165">8ms ✓</text>
    <text x="327" y="200">15ms ✓</text>
    <text x="267" y="235">5ms ✓</text>
    <text x="347" y="270">22ms ✓</text>
    <text x="297" y="305">10ms ✓</text>
  </g>
  <!-- 헤더 -->
  <rect x="80" y="95" width="340" height="2" fill="#14B8A6" opacity="0.4"/>
  <text x="90" y="108" font-family="monospace" font-size="10" fill="#14B8A6" opacity="0.6">HOST</text>
  <text x="222" y="108" font-family="monospace" font-size="10" fill="#14B8A6" opacity="0.6">LATENCY</text>
  <!-- 하단 요약 -->
  <rect x="80" y="330" width="340" height="2" fill="#14B8A6" opacity="0.4"/>
  <text x="256" y="370" text-anchor="middle" font-family="monospace" font-size="14" fill="#14B8A6" filter="url(#glow)">6/6 HOSTS ONLINE</text>
  <circle cx="130" cy="400" r="8" fill="#14B8A6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="400" r="8" fill="#2DD4BF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="382" cy="400" r="8" fill="#14B8A6" opacity="0.7" filter="url(#glow)"/>
</svg>