<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#080818"/>
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#A5B4FC;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C7D2FE;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="prismGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 입사 광선 (왼쪽에서) -->
  <rect x="60" y="246" width="130" height="5" rx="2.5" fill="url(#ray1)" filter="url(#glow)"/>
  <!-- 프리즘 -->
  <polygon points="190,150 330,256 190,362" fill="url(#prismGrad)" stroke="#A5B4FC" stroke-width="2" opacity="0.9" filter="url(#prismGlow)"/>
  <!-- 프리즘 내부 광택 -->
  <polygon points="190,150 330,256 190,200" fill="#A5B4FC" opacity="0.15"/>
  <!-- 굴절 광선들 (파일들) -->
  <!-- 광선 1 (상) -->
  <path d="M 330,230 L 460,140" stroke="#6366F1" stroke-width="4" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 광선 2 -->
  <path d="M 330,244 L 460,200" stroke="#818CF8" stroke-width="4" opacity="0.85" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 광선 3 (중앙) -->
  <path d="M 330,256 L 460,256" stroke="#A5B4FC" stroke-width="5" opacity="0.9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 광선 4 -->
  <path d="M 330,268 L 460,312" stroke="#818CF8" stroke-width="4" opacity="0.85" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 광선 5 (하) -->
  <path d="M 330,282 L 460,370" stroke="#6366F1" stroke-width="4" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 파일 아이콘 끝에 -->
  <rect x="440" y="128" width="30" height="24" rx="3" fill="#4F46E5" opacity="0.9"/>
  <polygon points="440,128 455,128 455,118 470,128" fill="#6366F1" opacity="0.8"/>
  <rect x="440" y="188" width="30" height="24" rx="3" fill="#5B5FCF" opacity="0.9"/>
  <polygon points="440,188 455,188 455,178 470,188" fill="#818CF8" opacity="0.8"/>
  <rect x="440" y="244" width="30" height="24" rx="3" fill="#6366F1" opacity="0.9"/>
  <polygon points="440,244 455,244 455,234 470,244" fill="#A5B4FC" opacity="0.8"/>
  <rect x="440" y="300" width="30" height="24" rx="3" fill="#5B5FCF" opacity="0.9"/>
  <polygon points="440,300 455,300 455,290 470,300" fill="#818CF8" opacity="0.8"/>
  <rect x="440" y="358" width="30" height="24" rx="3" fill="#4F46E5" opacity="0.9"/>
  <polygon points="440,358 455,358 455,348 470,358" fill="#6366F1" opacity="0.8"/>
  <!-- 프리즘 중심 광택 -->
  <circle cx="260" cy="256" r="6" fill="white" opacity="0.3" filter="url(#glow)"/>
</svg>