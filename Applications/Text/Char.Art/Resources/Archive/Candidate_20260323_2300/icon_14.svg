<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#7C3AED"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Pixelated face made of big blocks -->
    <!-- Background blocks (skin) -->
    <!-- Row 1 (top forehead) -->
    <rect x="260" y="180" width="500" height="80" rx="6" fill="#FDE68A"/>
    <!-- Row 2 (forehead) -->
    <rect x="180" y="265" width="660" height="80" rx="6" fill="#FDE68A"/>
    <!-- Row 3 (eyes row) -->
    <rect x="180" y="350" width="660" height="80" rx="6" fill="#FDE68A"/>
    <!-- Eyes - dark blocks -->
    <rect x="230" y="350" width="120" height="80" rx="6" fill="#1F2937"/>
    <rect x="675" y="350" width="120" height="80" rx="6" fill="#1F2937"/>
    <!-- Pupils -->
    <rect x="268" y="370" width="50" height="40" rx="4" fill="white" opacity="0.8"/>
    <rect x="713" y="370" width="50" height="40" rx="4" fill="white" opacity="0.8"/>
    <!-- Row 4 (nose row) -->
    <rect x="180" y="435" width="660" height="80" rx="6" fill="#FDE68A"/>
    <!-- Nose -->
    <rect x="430" y="460" width="80" height="55" rx="6" fill="#E6B800"/>
    <!-- Row 5 (smile row) -->
    <rect x="180" y="520" width="660" height="80" rx="6" fill="#FDE68A"/>
    <!-- Mouth dark left corner -->
    <rect x="230" y="535" width="80" height="65" rx="6" fill="#1F2937"/>
    <!-- Teeth middle -->
    <rect x="318" y="535" width="250" height="65" rx="6" fill="white"/>
    <!-- Mouth dark right corner -->
    <rect x="575" y="535" width="80" height="65" rx="6" fill="#1F2937"/>
    <!-- Row 6 (chin) -->
    <rect x="260" y="605" width="500" height="80" rx="6" fill="#FDE68A"/>
    <!-- Row 7 (neck) -->
    <rect x="380" y="690" width="260" height="70" rx="6" fill="#FDE68A"/>
    <!-- Ears -->
    <rect x="120" y="350" width="60" height="160" rx="6" fill="#FDE68A"/>
    <rect x="845" y="350" width="60" height="160" rx="6" fill="#FDE68A"/>
    <!-- Hair -->
    <rect x="180" y="180" width="660" height="85" rx="10" fill="#1F2937"/>
    <rect x="120" y="180" width="80" height="200" rx="6" fill="#1F2937"/>
    <rect x="825" y="180" width="80" height="200" rx="6" fill="#1F2937"/>
    <!-- Label -->
    <text x="512" y="860" font-size="44" font-weight="bold" font-family="system-ui" fill="#FDE68A" text-anchor="middle">PIXEL ART</text>
    <text x="512" y="920" font-size="30" font-family="system-ui" fill="#C4B5FD" text-anchor="middle">ASCII Mode</text>
  </g>
</svg>
