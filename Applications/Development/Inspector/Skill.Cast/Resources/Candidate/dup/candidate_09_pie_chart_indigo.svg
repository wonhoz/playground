<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Donut chart approximation using arcs -->
  <!-- Full circle base -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#283593" stroke-width="40"/>
  <!-- Segments (stroke-dasharray on circle circ=691) -->
  <!-- C# 35% = 242 -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#3F51B5" stroke-width="40" stroke-dasharray="242 449" stroke-dashoffset="0"/>
  <!-- .NET 25% = 173 -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#7986CB" stroke-width="40" stroke-dasharray="173 518" stroke-dashoffset="-242"/>
  <!-- TS 20% = 138 -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#9FA8DA" stroke-width="40" stroke-dasharray="138 553" stroke-dashoffset="-415"/>
  <!-- Other 20% -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#C5CAE9" stroke-width="40" stroke-dasharray="138 553" stroke-dashoffset="-553"/>
  <!-- Center -->
  <circle cx="256" cy="230" r="70" fill="#1A237E"/>
  <text x="228" y="226" font-family="monospace" font-size="14" fill="#C5CAE9">SKILL</text>
  <text x="228" y="244" font-family="monospace" font-size="14" fill="#9FA8DA">CAST</text>
  <!-- Legend -->
  <rect x="80" y="375" width="16" height="14" rx="3" fill="#3F51B5"/>
  <text x="102" y="387" font-family="monospace" font-size="13" fill="#C5CAE9">C# 35%</text>
  <rect x="185" y="375" width="16" height="14" rx="3" fill="#7986CB"/>
  <text x="207" y="387" font-family="monospace" font-size="13" fill="#C5CAE9">.NET 25%</text>
  <rect x="305" y="375" width="16" height="14" rx="3" fill="#9FA8DA"/>
  <text x="327" y="387" font-family="monospace" font-size="13" fill="#C5CAE9">TS 20%</text>
  <rect x="80" y="400" width="16" height="14" rx="3" fill="#C5CAE9"/>
  <text x="102" y="412" font-family="monospace" font-size="13" fill="#C5CAE9">Other 20%</text>
</svg>
