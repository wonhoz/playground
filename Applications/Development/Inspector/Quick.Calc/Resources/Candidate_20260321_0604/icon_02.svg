    <rect x="622" y="632" width="76" height="52" rx="10" fill="#55BB00"/>
    <!-- 행 4 -->
    <rect x="370" y="696" width="156" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="538" y="696" width="72" height="52" rx="10" fill="#EEFF88" opacity="0.7"/>
    <rect x="622" y="696" width="76" height="52" rx="10" fill="#33AA00"/>
    <!-- = 심볼 -->
    <rect x="636" y="714" width="48" height="7" rx="3" fill="#FFFFFF"/>
    <rect x="636" y="727" width="48" height="7" rx="3" fill="#FFFFFF"/>
    <!-- 팝업 튀어나오는 효과 선들 -->
    <line x1="344" y1="364" x2="280" y2="300" stroke="#CCFF44" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
    <line x1="724" y1="364" x2="788" y2="300" stroke="#CCFF44" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
    <line x1="344" y1="744" x2="280" y2="808" stroke="#CCFF44" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
    <line x1="724" y1="744" x2="788" y2="808" stroke="#CCFF44" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
