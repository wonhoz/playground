  <circle cx="512" cy="512" r="80" fill="none" stroke="#00838F" stroke-width="8" opacity="0.5"/>
  <!-- Cross hairs -->
  <line x1="192" y1="512" x2="832" y2="512" stroke="#00838F" stroke-width="8" opacity="0.3"/>
  <line x1="512" y1="192" x2="512" y2="832" stroke="#00838F" stroke-width="8" opacity="0.3"/>
