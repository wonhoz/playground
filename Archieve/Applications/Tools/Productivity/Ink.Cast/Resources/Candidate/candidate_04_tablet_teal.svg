<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A3A"/>
      <stop offset="100%" stop-color="#0D2626"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 태블릿 바디 -->
  <rect x="60" y="100" width="340" height="270" rx="20" fill="#00695C" stroke="#4DB6AC" stroke-width="4"/>
  <!-- 화면 -->
  <rect x="80" y="120" width="300" height="230" rx="10" fill="url(#screen)"/>
  <!-- 드로잉 스트로크들 -->
  <path d="M 100 200 C 140 160 190 180 220 220 C 250 260 280 250 320 210" fill="none" stroke="#80CBC4" stroke-width="7" stroke-linecap="round"/>
  <path d="M 100 260 Q 160 240 210 265 Q 260 285 340 250" fill="none" stroke="#4DB6AC" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="200" cy="290" rx="40" ry="28" fill="#26A69A" opacity="0.5"/>
  <!-- 버튼 -->
  <circle cx="430" cy="235" r="18" fill="#004D40" stroke="#4DB6AC" stroke-width="2"/>
  <!-- 스타일러스 -->
  <g transform="rotate(-35 380 80)">
    <rect x="360" y="60" width="14" height="100" rx="5" fill="#B2DFDB"/>
    <polygon points="360,160 374,160 367,185" fill="#80CBC4"/>
    <rect x="360" y="56" width="14" height="20" rx="4" fill="#E0F2F1"/>
  </g>
</svg>