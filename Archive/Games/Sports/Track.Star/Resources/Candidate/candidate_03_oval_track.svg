<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a200a"/>
      <stop offset="100%" stop-color="#153015"/>
    </linearGradient>
    <linearGradient id="trackfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cc3300"/>
      <stop offset="100%" stop-color="#991100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Infield grass -->
  <ellipse cx="256" cy="270" rx="140" ry="90" fill="#1a5020"/>
  <!-- Track surface -->
  <ellipse cx="256" cy="270" rx="200" ry="140" fill="url(#trackfill)"/>
  <ellipse cx="256" cy="270" rx="140" ry="90" fill="#1a5020"/>
  <!-- Lane markers -->
  <ellipse cx="256" cy="270" rx="148" ry="96" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="158" ry="103" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="168" ry="110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="178" ry="117" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="188" ry="124" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="198" ry="131" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Start/Finish line -->
  <rect x="256" y="128" width="4" height="26" fill="#ffff00"/>
  <rect x="260" y="128" width="4" height="26" fill="#000000"/>
  <rect x="264" y="128" width="4" height="26" fill="#ffff00"/>
  <rect x="268" y="128" width="4" height="26" fill="#000000"/>
  <!-- Runners at start -->
  <circle cx="280" cy="137" r="7" fill="#f0c080"/>
  <rect x="277" y="144" width="6" height="10" rx="2" fill="#cc2020"/>
  <circle cx="295" cy="142" r="6" fill="#f0c080"/>
  <rect x="292" y="148" width="5" height="9" rx="2" fill="#2020cc"/>
  <!-- Field markings -->
  <circle cx="256" cy="270" r="10" fill="#3a7030"/>
  <rect x="250" y="240" width="12" height="60" fill="#3a7030" opacity="0.5"/>
  <rect x="224" y="264" width="64" height="12" fill="#3a7030" opacity="0.5"/>
  <!-- Bleachers top suggestion -->
  <rect x="80" y="80" width="352" height="24" rx="6" fill="#2a2a4a" opacity="0.6"/>
  <!-- Numbers on track curve -->
  <text x="215" y="116" font-size="14" fill="#ffffff" opacity="0.7" font-family="Arial" font-weight="bold">100m</text>
</svg>