  <circle cx="528" cy="492" r="5" fill="#90CAF9"/>
  <circle cx="542" cy="486" r="5" fill="#FFE082"/>

  <!-- Layer 3: 8방향 방사형 화살표 + 출력 심볼 -->

  <!-- 상: KEY -->
