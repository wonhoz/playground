<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#030510"/>
  <!-- 네온 도시 빛 - 반사 효과 -->
  <!-- 빌딩들 -->
  <rect x="50" y="300" width="90" height="560" fill="#0D47A1" opacity="0.6"/>
  <rect x="160" y="220" width="70" height="640" fill="#0D47A1" opacity="0.7"/>
  <rect x="250" y="280" width="100" height="580" fill="#1565C0" opacity="0.6"/>
  <rect x="370" y="200" width="80" height="660" fill="#0D47A1" opacity="0.7"/>
  <rect x="574" y="210" width="80" height="650" fill="#0D47A1" opacity="0.7"/>
  <rect x="674" y="270" width="100" height="590" fill="#1565C0" opacity="0.6"/>
  <rect x="794" y="230" width="70" height="630" fill="#0D47A1" opacity="0.7"/>
  <rect x="884" y="310" width="90" height="550" fill="#0D47A1" opacity="0.6"/>
  <!-- 네온 빛 효과 (상단 광채) -->
  <ellipse cx="140" cy="300" rx="50" ry="80" fill="#42A5F5" opacity="0.15"/>
  <ellipse cx="295" cy="280" rx="55" ry="80" fill="#42A5F5" opacity="0.1"/>
  <ellipse cx="410" cy="200" rx="50" ry="80" fill="#42A5F5" opacity="0.15"/>
  <ellipse cx="614" cy="210" rx="50" ry="80" fill="#42A5F5" opacity="0.15"/>
  <ellipse cx="729" cy="270" rx="55" ry="80" fill="#42A5F5" opacity="0.1"/>
  <ellipse cx="829" cy="230" rx="50" ry="80" fill="#42A5F5" opacity="0.15"/>
  <!-- 수평 네온 라인들 -->
  <line x1="50" y1="860" x2="974" y2="860" stroke="#42A5F5" stroke-width="3" opacity="0.9"/>
  <!-- 반사 (물웅덩이 효과) -->
  <rect x="50" y="870" width="924" height="80" fill="#030510" opacity="0.5"/>
  <line x1="50" y1="880" x2="160" y2="880" stroke="#42A5F5" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="890" x2="370" y2="890" stroke="#42A5F5" stroke-width="2" opacity="0.3"/>
  <line x1="574" y1="885" x2="674" y2="885" stroke="#42A5F5" stroke-width="2" opacity="0.4"/>
  <line x1="794" y1="895" x2="884" y2="895" stroke="#42A5F5" stroke-width="2" opacity="0.3"/>
  <!-- 중앙 달리는 사람 네온 실루엣 -->
  <circle cx="512" cy="400" r="44" fill="none" stroke="#42A5F5" stroke-width="8"/>
  <circle cx="512" cy="400" r="44" fill="#42A5F5" opacity="0.2"/>
  <line x1="512" y1="444" x2="512" y2="560" stroke="#42A5F5" stroke-width="14"/>
  <line x1="512" y1="490" x2="456" y2="460" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="490" x2="568" y2="520" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <line x1="494" y1="560" x2="460" y2="640" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <line x1="530" y1="560" x2="564" y2="640" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <!-- 빛 후광 -->
  <circle cx="512" cy="400" r="80" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.2"/>
  <circle cx="512" cy="400" r="110" fill="none" stroke="#42A5F5" stroke-width="2" opacity="0.1"/>
</svg>
