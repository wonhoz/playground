<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="smoke1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="smoke2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd600" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd600" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcdd2"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stunt smoke trails forming a figure-8 / spiral -->
  <path d="M420 200 Q380 150 320 160 Q260 170 240 220 Q220 270 260 310 Q300 350 350 340 Q400 328 420 280 Q440 230 400 190 Q360 150 300 160 Q240 170 220 230 Q200 290 240 330 Q270 360 310 355 Q350 350 370 320"
        stroke="url(#smoke1)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M420 200 Q380 150 320 160 Q260 170 240 220 Q220 270 260 310 Q300 350 350 340 Q400 328 420 280 Q440 230 400 190 Q360 150 300 160 Q240 170 220 230 Q200 290 240 330 Q270 360 310 355 Q350 350 370 320"
        stroke="url(#smoke2)" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="20,15" opacity="0.6"/>
  <!-- Plane (small, at the current position ~370,320) -->
  <g transform="translate(368,320) rotate(30)">
    <path d="M0 -20 Q8 -8 8 10 L8 22 Q4 26 0 27 Q-4 26 -8 22 L-8 10 Q-8 -8 0 -20 Z" fill="url(#plane)"/>
    <path d="M3 0 L26 14 L18 16 L5 6 Z" fill="#ffcdd2" opacity="0.9"/>
    <path d="M-3 0 L-26 14 L-18 16 L-5 6 Z" fill="#ffcdd2" opacity="0.9"/>
  </g>
  <!-- G-force indicator -->
  <rect x="76" y="76" width="110" height="30" rx="8" fill="#1a0000" stroke="#ef5350" stroke-width="1.5"/>
  <text x="131" y="96" font-family="monospace" font-size="13" fill="#ef5350" text-anchor="middle">G: 4.8x</text>
  <rect x="76" y="115" width="110" height="30" rx="8" fill="#1a0000" stroke="#ffd600" stroke-width="1.5"/>
  <text x="131" y="135" font-family="monospace" font-size="13" fill="#ffd600" text-anchor="middle">DRIFT!!</text>
  <!-- Title -->
  <text x="256" y="455" font-family="sans-serif" font-size="26" fill="#ef5350" text-anchor="middle" font-weight="bold" letter-spacing="4" opacity="0.9">SKY.DRIFT</text>
</svg>
