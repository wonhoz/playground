<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1E2A"/>
  <!-- Layer 2: 원형 마스크 안에 단어 폭포 -->
  <defs>
    <clipPath id="circle">
      <circle cx="512" cy="512" r="420"/>
    </clipPath>
  </defs>
  <circle cx="512" cy="512" r="420" fill="#0E2A3A"/>
  <circle cx="512" cy="512" r="420" fill="none" stroke="#0EA5E9" stroke-width="16"/>
  <!-- 원 안의 단어들 (다양한 크기) -->
  <text x="512" y="280" font-size="120" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#circle)">word</text>
  <text x="300" y="400" font-size="76" fill="#7DD3FC" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#circle)">cloud</text>
  <text x="740" y="380" font-size="56" fill="#38BDF8" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">text</text>
  <text x="200" y="510" font-size="46" fill="#BAE6FD" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">big</text>
  <text x="512" y="510" font-size="90" fill="#E0F2FE" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#circle)">visual</text>
  <text x="840" y="500" font-size="38" fill="#7DD3FC" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">art</text>
  <text x="350" y="620" font-size="50" fill="#38BDF8" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">data</text>
  <text x="680" y="610" font-size="40" fill="#BAE6FD" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">color</text>
  <text x="180" y="680" font-size="32" fill="#0EA5E9" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">font</text>
  <text x="512" y="700" font-size="44" fill="#7DD3FC" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">size</text>
  <text x="840" y="660" font-size="30" fill="#38BDF8" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">mix</text>
  <text x="350" y="780" font-size="36" fill="#0EA5E9" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">render</text>
  <text x="650" y="760" font-size="28" fill="#075985" text-anchor="middle" font-family="Arial" clip-path="url(#circle)">analyze</text>
  <!-- Layer 3: 외곽 장식 점들 -->
  <circle cx="92" cy="512" r="12" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="932" cy="512" r="12" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="512" cy="92" r="12" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="512" cy="932" r="12" fill="#0EA5E9" opacity="0.5"/>
</svg>
