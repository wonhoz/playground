<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="btn1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="btn2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="btn3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#512DA8"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 배율 버튼 3개 (크게) -->
    <!-- 2x 버튼 -->
    <rect x="100" y="180" width="260" height="260" rx="28" fill="url(#btn1)"/>
    <text x="230" y="300" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="230" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="70" fill="#BBDEFB" text-anchor="middle">×</text>

    <!-- 4x 버튼 -->
    <rect x="382" y="180" width="260" height="260" rx="28" fill="url(#btn2)"/>
    <text x="512" y="300" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="512" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="70" fill="#B2EBF2" text-anchor="middle">×</text>

    <!-- 8x 버튼 -->
    <rect x="664" y="180" width="260" height="260" rx="28" fill="url(#btn3)"/>
    <text x="794" y="300" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" text-anchor="middle">8</text>
    <text x="794" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="70" fill="#D1C4E9" text-anchor="middle">×</text>

    <!-- 작은 이미지 → 큰 이미지 시각화 (하단) -->
    <!-- 작은 이미지 -->
    <rect x="100" y="490" width="140" height="140" rx="16" fill="#90A4AE" opacity="0.8"/>
    <rect x="116" y="506" width="108" height="108" rx="8" fill="#B0BEC5"/>
    <!-- 화살표 -->
    <text x="300" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="80" fill="#1565C0" text-anchor="middle">→</text>
    <!-- 큰 이미지 -->
    <rect x="390" y="450" width="220" height="220" rx="20" fill="#1E88E5" opacity="0.2"/>
    <rect x="406" y="466" width="188" height="188" rx="12" fill="#42A5F5" opacity="0.6"/>
    <rect x="422" y="482" width="156" height="156" rx="8" fill="#90CAF9"/>

    <!-- 업스케일 배율 라벨 -->
    <rect x="660" y="470" width="280" height="88" rx="20" fill="#1565C0"/>
    <text x="800" y="522" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">UPSCALE</text>
    <text x="800" y="546" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#90CAF9" text-anchor="middle">AI 고해상도</text>

    <!-- 타이틀 -->
    <rect x="212" y="760" width="600" height="70" rx="24" fill="#0D47A1"/>
    <text x="512" y="807" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>

    <!-- 모델 이름 표시 -->
    <rect x="100" y="660" width="340" height="52" rx="16" fill="#1976D2" opacity="0.8"/>
    <text x="270" y="693" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="32" fill="#FFFFFF" text-anchor="middle">RealESRGAN</text>
  </g>
</svg>
