<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 조준경 -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#10B981" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="100" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="240" r="60" fill="none" stroke="#10B981" stroke-width="2" opacity="0.7"/>
  <circle cx="256" cy="240" r="20" fill="#10B981" opacity="0.2" filter="url(#glow)"/>
  <!-- 십자선 -->
  <line x1="116" y1="240" x2="196" y2="240" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="316" y1="240" x2="396" y2="240" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="256" y1="100" x2="256" y2="180" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="256" y1="300" x2="256" y2="380" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 타깃 이모지 -->
  <text x="256" y="250" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">🎯</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">HUNT SCOPE</text>
</svg>
