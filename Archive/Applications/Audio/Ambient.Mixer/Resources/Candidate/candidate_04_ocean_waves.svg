<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0E3460"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A9ED9"/>
      <stop offset="100%" stop-color="#0E6FA0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1AA8E8"/>
      <stop offset="100%" stop-color="#0D86C0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun/moon reflection -->
  <ellipse cx="256" cy="140" rx="40" ry="40" fill="#FFE066" opacity="0.7"/>
  <rect x="240" y="180" width="32" height="100" fill="#FFE066" opacity="0.15"/>
  <!-- Ocean waves -->
  <path d="M60,300 Q110,270 160,300 Q210,330 260,300 Q310,270 360,300 Q410,330 452,300 L452,420 L60,420 Z" fill="url(#wave1)" opacity="0.7"/>
  <path d="M60,330 Q120,300 180,330 Q240,360 300,330 Q360,300 420,330 Q440,340 452,335 L452,440 L60,440 Z" fill="url(#wave2)" opacity="0.8"/>
  <path d="M60,360 Q130,340 200,360 Q270,380 340,360 Q400,342 452,360 L452,460 L60,460 Z" fill="#0D86C0" opacity="0.9"/>
  <!-- Sound bars (equalizer) on water -->
  <rect x="100" y="240" width="8" height="30" rx="4" fill="white" opacity="0.3"/>
  <rect x="120" y="230" width="8" height="40" rx="4" fill="white" opacity="0.3"/>
  <rect x="140" y="245" width="8" height="25" rx="4" fill="white" opacity="0.3"/>
  <rect x="340" y="238" width="8" height="32" rx="4" fill="white" opacity="0.3"/>
  <rect x="360" y="228" width="8" height="42" rx="4" fill="white" opacity="0.3"/>
  <rect x="380" y="244" width="8" height="26" rx="4" fill="white" opacity="0.3"/>
</svg>