<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#1C1C2E"/>
  <!-- Layer 2: Large @ symbol -->
  <text x="512" y="640" font-family="Arial Black" font-size="500" font-weight="900" fill="#00E5FF" text-anchor="middle">@</text>
  <!-- Layer 3: Surrounding characters -->
  <text x="180" y="300" font-family="Consolas,monospace" font-size="60" fill="white" opacity="0.7">#</text>
  <text x="800" y="280" font-family="Consolas,monospace" font-size="48" fill="#00E5FF" opacity="0.6">$</text>
  <text x="840" y="720" font-family="Consolas,monospace" font-size="36" fill="white" opacity="0.5">%</text>
  <text x="150" y="780" font-family="Consolas,monospace" font-size="44" fill="#00E5FF" opacity="0.5">!</text>
  <text x="200" y="540" font-family="Consolas,monospace" font-size="32" fill="white" opacity="0.4">*</text>
  <text x="820" y="500" font-family="Consolas,monospace" font-size="28" fill="#00E5FF" opacity="0.4">.</text>
</svg>