<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#2E7D32"/>

  <!-- 2x2 grid of answer buttons -->
  <!-- Button A - top left (highlighted with check) -->
  <rect x="205" y="220" width="270" height="240" rx="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="12"/>
  <text x="340" y="358" font-size="160" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#1B5E20">A</text>

  <!-- Button B - top right -->
  <rect x="549" y="220" width="270" height="240" rx="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="12"/>
  <text x="684" y="358" font-size="160" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#1B5E20">B</text>

  <!-- Button C - bottom left -->
  <rect x="205" y="490" width="270" height="240" rx="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="12"/>
  <text x="340" y="628" font-size="160" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#1B5E20">C</text>

  <!-- Button D - bottom right -->
  <rect x="549" y="490" width="270" height="240" rx="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="12"/>
  <text x="684" y="628" font-size="160" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#1B5E20">D</text>

  <!-- Correct answer check overlay on A -->
  <rect x="205" y="220" width="270" height="240" rx="30" fill="#00C853" opacity="0.85"/>
  <text x="340" y="358" font-size="160" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFFFFF">A</text>
  <!-- Checkmark badge -->
  <circle cx="430" cy="220" r="50" fill="#FFD600"/>
  <polyline points="405,218 422,238 460,200" fill="none" stroke="#1B5E20" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title text -->
  <text x="512" y="820" font-size="90" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFD600" stroke="#1B5E20" stroke-width="6">QUIZ</text>
</svg>
