<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3F6212"/>
      <stop offset="100%" stop-color="#365314"/>
    </linearGradient>
    <clipPath id="clip10"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <g clip-path="url(#clip10)">
    <!-- 작은 A -->
    <text x="245" y="620" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="200" fill="#86EFAC" opacity="0.9">A</text>
    <!-- 화살표 -->
    <line x1="360" y1="512" x2="480" y2="512" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
    <polygon points="480,475 545,512 480,549" fill="#FFFFFF"/>
    <!-- 큰 A -->
    <text x="750" y="700" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="360" fill="#86EFAC">A</text>
    <!-- 크기 레이블 -->
    <text x="245" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#FFFFFF" opacity="0.7">small</text>
    <text x="750" y="760" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" opacity="0.7">BIG</text>
    <!-- 왼쪽 상단 보조 단어들 (작은) -->
    <text x="195" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#86EFAC" opacity="0.55">word</text>
    <text x="310" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.45">font</text>
    <text x="420" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#86EFAC" opacity="0.5">size</text>
  </g>
</svg>
