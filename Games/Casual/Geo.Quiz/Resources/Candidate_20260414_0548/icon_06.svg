<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#0277BD" stroke-width="16"/>

  <!-- 3x2 grid of simplified flags -->
  <!-- Row 1 -->
  <!-- Japan: white bg + red circle -->
  <rect x="112" y="148" width="248" height="160" rx="16" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="10"/>
  <circle cx="236" cy="228" r="50" fill="#BC002D"/>

  <!-- South Korea: white + taegeuk-like red/blue -->
  <rect x="388" y="148" width="248" height="160" rx="16" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="10"/>
  <circle cx="512" cy="228" r="50" fill="none" stroke="#003478" stroke-width="8"/>
  <path d="M 462,228 A 50,50 0 0 1 562,228" fill="#C60C30" stroke="none"/>
  <path d="M 462,228 A 50,50 0 0 0 562,228" fill="#003478" stroke="none"/>

  <!-- France: tricolor -->
  <rect x="664" y="148" width="248" height="160" rx="16" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="10"/>
  <rect x="676" y="160" width="72" height="136" rx="4" fill="#0055A4"/>
  <rect x="748" y="160" width="72" height="136" fill="#FFFFFF"/>
  <rect x="820" y="160" width="80" height="136" rx="4" fill="#EF4135"/>

  <!-- Row 2 -->
  <!-- Germany: horizontal tricolor (black/red/gold) -->
  <rect x="112" y="332" width="248" height="160" rx="16" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="10"/>
  <rect x="124" y="344" width="224" height="44" rx="4" fill="#000000"/>
  <rect x="124" y="388" width="224" height="44" fill="#DD0000"/>
  <rect x="124" y="432" width="224" height="48" rx="4" fill="#FFCE00"/>

  <!-- Brazil: green + yellow diamond + blue circle -->
  <rect x="388" y="332" width="248" height="160" rx="16" fill="#009C3B" stroke="#007329" stroke-width="10"/>
  <path d="M 512,360 L 620,428 L 512,496 L 404,428 Z" fill="#FEDF00" stroke="none"/>
  <circle cx="512" cy="428" r="36" fill="#002776"/>

  <!-- UK: Union Jack (simplified) -->
  <rect x="664" y="332" width="248" height="160" rx="16" fill="#012169" stroke="#BDBDBD" stroke-width="10"/>
  <line x1="676" y1="344" x2="900" y2="480" stroke="#FFFFFF" stroke-width="18"/>
  <line x1="900" y1="344" x2="676" y2="480" stroke="#FFFFFF" stroke-width="18"/>
  <line x1="788" y1="344" x2="788" y2="480" stroke="#FFFFFF" stroke-width="20"/>
  <line x1="676" y1="412" x2="900" y2="412" stroke="#FFFFFF" stroke-width="20"/>
  <line x1="788" y1="344" x2="788" y2="480" stroke="#C8102E" stroke-width="12"/>
  <line x1="676" y1="412" x2="900" y2="412" stroke="#C8102E" stroke-width="12"/>

  <!-- FLAGS badge -->
  <rect x="168" y="752" width="688" height="116" rx="36" fill="#01579B" stroke="#003C7A" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">FLAGS</text>
</svg>
