<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="100%" stop-color="#100020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large ASCII letters in rainbow colors -->
  <text x="80" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="#FF3333">C</text>
  <text x="152" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="#FF8800">H</text>
  <text x="224" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="#FFDD00">A</text>
  <text x="296" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="#44FF44">R</text>
  <!-- Second line -->
  <text x="116" y="252" font-family="monospace" font-size="72" font-weight="bold" fill="#00CCFF">A</text>
  <text x="188" y="252" font-family="monospace" font-size="72" font-weight="bold" fill="#4488FF">R</text>
  <text x="260" y="252" font-family="monospace" font-size="72" font-weight="bold" fill="#AA44FF">T</text>
  <!-- Character scatter -->
  <text x="85" y="318" font-family="monospace" font-size="14" fill="#FF3333" opacity="0.7">@</text>
  <text x="112" y="318" font-family="monospace" font-size="14" fill="#FF8800" opacity="0.7">#</text>
  <text x="139" y="318" font-family="monospace" font-size="14" fill="#FFDD00" opacity="0.7">$</text>
  <text x="166" y="318" font-family="monospace" font-size="14" fill="#44FF44" opacity="0.7">%</text>
  <text x="193" y="318" font-family="monospace" font-size="14" fill="#00CCFF" opacity="0.7">&amp;</text>
  <text x="220" y="318" font-family="monospace" font-size="14" fill="#4488FF" opacity="0.7">*</text>
  <text x="247" y="318" font-family="monospace" font-size="14" fill="#AA44FF" opacity="0.7">!</text>
  <text x="274" y="318" font-family="monospace" font-size="14" fill="#FF3399" opacity="0.7">^</text>
  <text x="301" y="318" font-family="monospace" font-size="14" fill="#FF6600" opacity="0.7">~</text>
  <text x="328" y="318" font-family="monospace" font-size="14" fill="#FFFF00" opacity="0.7">+</text>
  <text x="355" y="318" font-family="monospace" font-size="14" fill="#33FF99" opacity="0.7">=</text>
  <text x="382" y="318" font-family="monospace" font-size="14" fill="#00BBFF" opacity="0.7">|</text>
  <text x="409" y="318" font-family="monospace" font-size="14" fill="#BB44FF" opacity="0.7">\</text>
  <!-- Title -->
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8800" text-anchor="middle">Char.Art</text>
</svg>
