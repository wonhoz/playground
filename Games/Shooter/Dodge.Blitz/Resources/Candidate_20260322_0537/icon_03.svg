  <!-- 윙팁 가속기 -->
  <rect x="432" y="735" width="18" height="24" rx="4" fill="#BB66FF"/>
  <rect x="574" y="735" width="18" height="24" rx="4" fill="#BB66FF"/>
  <!-- 조종석 -->
  <ellipse cx="512" cy="658" rx="14" ry="18" fill="#DDAAFF" opacity="0.85"/>
