<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>

  <!-- Flag display: French tricolor -->
  <rect x="200" y="152" width="624" height="192" rx="24" fill="#EEEEEE" stroke="#9E9E9E" stroke-width="12"/>
  <rect x="212" y="164" width="196" height="168" rx="8" fill="#0055A4"/>
  <rect x="408" y="164" width="208" height="168" fill="#FFFFFF"/>
  <rect x="616" y="164" width="196" height="168" rx="8" fill="#EF4135"/>
  <!-- ? overlay (semi-transparent) -->
  <rect x="432" y="152" width="160" height="192" fill="#FFFFFF" fill-opacity="0.88"/>
  <text x="512" y="286" font-family="Arial Black, sans-serif" font-weight="900" font-size="128" fill="#1565C0" text-anchor="middle">?</text>

  <!-- 4 choice buttons -->
  <rect x="112" y="372" width="368" height="72" rx="20" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="296" y="422" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">A. China</text>

  <!-- B. France = correct (highlighted green) -->
  <rect x="504" y="372" width="368" height="72" rx="20" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <text x="688" y="422" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#2E7D32" text-anchor="middle">B. France</text>

  <rect x="112" y="464" width="368" height="72" rx="20" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="296" y="514" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">C. Italy</text>

  <rect x="504" y="464" width="368" height="72" rx="20" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="688" y="514" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">D. Spain</text>

  <!-- Score strip -->
  <rect x="112" y="558" width="808" height="84" rx="20" fill="#1565C0" stroke="#0D47A1" stroke-width="12"/>
  <text x="516" y="617" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SCORE: 7 / 10</text>

  <!-- FLAG QUIZ badge -->
  <rect x="160" y="752" width="704" height="116" rx="36" fill="#0D47A1" stroke="#1A237E" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFD93D" text-anchor="middle">FLAG QUIZ</text>
</svg>
