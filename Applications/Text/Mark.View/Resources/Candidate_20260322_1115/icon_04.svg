<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <clipPath id="c04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background — warm amber brown -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <!-- Layer 2: Document page (white, slightly rotated for depth) -->
  <!-- Shadow page (offset, amber-dark) -->
  <rect x="220" y="128" width="584" height="768" rx="20" fill="#451A03" opacity="0.5"/>
  <!-- Main document page -->
  <rect x="200" y="112" width="584" height="768" rx="20" fill="white"/>

  <!-- Layer 3: Rendered markdown content on page -->
  <!-- Left accent bar (markdown heading indicator, sky blue) -->
  <rect x="200" y="112" width="10" height="768" rx="5" fill="#0EA5E9"/>

  <!-- H1 heading block — big bold dark bar -->
  <rect x="236" y="156" width="508" height="54" rx="8" fill="#1E293B"/>

  <!-- Separator line after heading -->
  <rect x="236" y="230" width="508" height="3" rx="2" fill="#E2E8F0"/>

  <!-- Paragraph text lines -->
  <rect x="236" y="252" width="508" height="16" rx="5" fill="#64748B" opacity="0.85"/>
  <rect x="236" y="280" width="470" height="16" rx="5" fill="#64748B" opacity="0.75"/>
  <rect x="236" y="308" width="490" height="16" rx="5" fill="#64748B" opacity="0.65"/>
  <rect x="236" y="336" width="430" height="16" rx="5" fill="#64748B" opacity="0.55"/>

  <!-- H2 subheading -->
  <rect x="236" y="376" width="340" height="36" rx="6" fill="#334155"/>

  <!-- More paragraph lines -->
  <rect x="236" y="432" width="508" height="16" rx="5" fill="#64748B" opacity="0.75"/>
  <rect x="236" y="460" width="488" height="16" rx="5" fill="#64748B" opacity="0.65"/>
  <rect x="236" y="488" width="500" height="16" rx="5" fill="#64748B" opacity="0.55"/>

  <!-- Code block -->
  <rect x="236" y="528" width="508" height="90" rx="10" fill="#F1F5F9"/>
  <rect x="256" y="546" width="200" height="12" rx="4" fill="#3B82F6" opacity="0.8"/>
  <rect x="256" y="568" width="280" height="12" rx="4" fill="#94A3B8" opacity="0.7"/>
  <rect x="256" y="590" width="180" height="12" rx="4" fill="#94A3B8" opacity="0.6"/>

  <!-- Final text lines -->
  <rect x="236" y="640" width="508" height="16" rx="5" fill="#64748B" opacity="0.6"/>
  <rect x="236" y="668" width="460" height="16" rx="5" fill="#64748B" opacity="0.5"/>
  <rect x="236" y="696" width="480" height="16" rx="5" fill="#64748B" opacity="0.4"/>
  <rect x="236" y="724" width="400" height="16" rx="5" fill="#64748B" opacity="0.3"/>
</svg>
