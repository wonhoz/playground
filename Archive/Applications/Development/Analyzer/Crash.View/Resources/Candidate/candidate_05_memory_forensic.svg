<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1DE9B6"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- RAM chip body -->
  <rect x="126" y="176" width="260" height="160" rx="10" fill="#001A14" stroke="#1DE9B6" stroke-width="4"/>
  <!-- Chip pins left -->
  <rect x="86" y="196" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="86" y="220" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="86" y="244" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="86" y="268" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="86" y="292" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="86" y="316" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <!-- Chip pins right -->
  <rect x="386" y="196" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="386" y="220" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="386" y="244" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="386" y="268" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="386" y="292" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <rect x="386" y="316" width="40" height="12" rx="3" fill="#1DE9B6"/>
  <!-- Chip label -->
  <text x="256" y="245" text-anchor="middle" font-family="monospace" font-size="14" fill="#1DE9B6">DDR5-6400</text>
  <text x="256" y="265" text-anchor="middle" font-family="monospace" font-size="12" fill="#00BFA5">32GB</text>
  <!-- Error address -->
  <rect x="146" y="285" width="220" height="30" rx="5" fill="#004D40"/>
  <text x="256" y="305" text-anchor="middle" font-family="monospace" font-size="12" fill="#FF5252">FAULT: 0xDEADBEEF</text>
  <!-- Scan beams -->
  <line x1="126" y1="240" x2="386" y2="240" stroke="#1DE9B6" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="126" y1="270" x2="386" y2="270" stroke="#1DE9B6" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>
  <!-- Magnifier -->
  <circle cx="340" cy="400" r="55" fill="none" stroke="#1DE9B6" stroke-width="6"/>
  <circle cx="340" cy="400" r="42" fill="#001A14" opacity="0.9"/>
  <text x="340" y="398" text-anchor="middle" font-family="monospace" font-size="12" fill="#FF5252">FAULT</text>
  <text x="340" y="413" text-anchor="middle" font-family="monospace" font-size="10" fill="#1DE9B6">ADDR</text>
  <line x1="374" y1="434" x2="408" y2="468" stroke="#1DE9B6" stroke-width="7" stroke-linecap="round"/>
  <!-- Binary rain -->
  <text x="96" y="120" font-family="monospace" font-size="11" fill="#1DE9B6" opacity="0.4">1010 0110</text>
  <text x="320" y="120" font-family="monospace" font-size="11" fill="#1DE9B6" opacity="0.4">0011 1101</text>
  <text x="100" y="460" font-family="monospace" font-size="11" fill="#1DE9B6" opacity="0.3">1100 0101</text>
</svg>
