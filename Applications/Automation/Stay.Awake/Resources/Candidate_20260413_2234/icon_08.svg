<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="110" y="140" width="804" height="550" rx="48" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- Shield body -->
  <path d="M 512,182 L 756,270 L 756,452 Q 756,604 512,682 Q 268,604 268,452 L 268,270 Z"
        fill="#3A86FF" stroke="#1A5CC9" stroke-width="18" stroke-linejoin="round"/>
  <!-- Shield inner face (lighter) -->
  <path d="M 512,214 L 726,292 L 726,452 Q 726,576 512,644 Q 298,576 298,452 L 298,292 Z"
        fill="#5C9EFF" stroke="none"/>
  <!-- Shield highlight arc (top gloss) -->
  <path d="M 380,230 Q 512,200 644,230" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.40"/>
  <!-- Lightning bolt (power / always on) -->
  <path d="M 546,278 L 462,446 L 526,446 L 478,594 L 596,400 L 528,400 Z"
        fill="#FFD93D" stroke="#B8860B" stroke-width="14" stroke-linejoin="round"/>
  <!-- GUARD badge -->
  <rect x="194" y="766" width="636" height="116" rx="36" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="850" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">GUARD</text>
</svg>
