<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="100%" stop-color="#00001a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Space grid -->
  <g stroke="#0a0a2a" stroke-width="1">
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="220" x2="452" y2="220"/>
    <line x1="60" y1="280" x2="452" y2="280"/>
    <line x1="60" y1="340" x2="452" y2="340"/>
  </g>
  <!-- Enemy fleet (top) -->
  <g fill="#ff3333">
    <!-- Row 1 enemies -->
    <polygon points="110,90 95,115 125,115"/>
    <polygon points="170,90 155,115 185,115"/>
    <polygon points="230,90 215,115 245,115"/>
    <polygon points="290,90 275,115 305,115"/>
    <polygon points="350,90 335,115 365,115"/>
    <polygon points="410,90 395,115 425,115"/>
  </g>
  <!-- Row 2 enemies -->
  <g fill="#ff6633" opacity="0.8">
    <polygon points="140,130 125,155 155,155"/>
    <polygon points="200,130 185,155 215,155"/>
    <polygon points="260,130 245,155 275,155"/>
    <polygon points="320,130 305,155 335,155"/>
    <polygon points="380,130 365,155 395,155"/>
  </g>
  <!-- Player ship -->
  <polygon points="256,400 236,440 276,440" fill="#44aaff"/>
  <!-- Player bullet -->
  <rect x="252" y="320" width="8" height="30" rx="3" fill="#44ffff"/>
  <!-- Orbit ring (puzzle element) -->
  <ellipse cx="256" cy="260" rx="150" ry="50" fill="none" stroke="#4444aa" stroke-width="2" opacity="0.6" stroke-dasharray="12,8"/>
  <!-- Explosion -->
  <circle cx="260" cy="160" r="18" fill="#ff8800" opacity="0.7"/>
  <circle cx="260" cy="160" r="10" fill="#ffff00" opacity="0.8"/>
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#ff3333">ORBIT.RAID</text>
</svg>
