  <text x="512" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="70" font-weight="900" fill="#A78BFA" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">Api.Probe</text>
  <text x="512" y="196" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">REST API TEST TOOL</text>

