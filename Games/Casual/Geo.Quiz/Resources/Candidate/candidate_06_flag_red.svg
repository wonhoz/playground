<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B71C1C"/>
      <stop offset="100%" style="stop-color:#880E4F"/>
    </linearGradient>
    <linearGradient id="flaggrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#FF8A80"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flag pole -->
  <rect x="130" y="100" width="12" height="320" rx="6" fill="#ECEFF1"/>
  <!-- Main flag -->
  <path d="M142,110 L370,130 L355,205 L142,185Z" fill="url(#flaggrad)"/>
  <!-- Flag stripe 2 -->
  <path d="M142,190 L350,210 L335,282 L142,260Z" fill="#FFECB3"/>
  <!-- Flag stripe 3 -->
  <path d="M142,265 L330,285 L315,355 L142,332Z" fill="#CE93D8"/>
  <!-- Star on flag -->
  <text x="255" y="175" text-anchor="middle" font-size="50" fill="#FFD54F">★</text>
  <!-- Question mark overlay -->
  <circle cx="380" cy="390" r="68" fill="#FFD54F" stroke="#F9A825" stroke-width="5"/>
  <text x="380" y="412" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="72" font-weight="900" fill="#B71C1C">?</text>
</svg>
