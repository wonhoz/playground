<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 따뜻한 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0A00"/>
  <!-- Layer 2: 슬링샷 중력 경로 -->
  <!-- 중력 방사형 그라데이션 효과 -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#FF6D00" stroke-width="3" opacity="0.15"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#FF6D00" stroke-width="4" opacity="0.2"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#FF6D00" stroke-width="5" opacity="0.3"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#FF8F00" stroke-width="6" opacity="0.4"/>
  <circle cx="512" cy="512" r="90" fill="none" stroke="#FFA726" stroke-width="8" opacity="0.6"/>
  <!-- 중앙 행성 (중력원) -->
  <circle cx="512" cy="512" r="80" fill="#BF360C"/>
  <circle cx="512" cy="512" r="64" fill="#E64A19"/>
  <circle cx="512" cy="512" r="48" fill="#FF6D00"/>
  <!-- 슬링샷 경로 (포물선) -->
  <path d="M160,800 Q300,200 700,260 Q900,280 860,460" stroke="#FFCC02" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M160,800 Q300,200 700,260 Q900,280 860,460" stroke="#FFCC02" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- 우주선 -->
  <circle cx="160" cy="800" r="20" fill="#FFCC02"/>
  <!-- 목적지 -->
  <circle cx="860" cy="460" r="16" fill="white"/>
  <circle cx="860" cy="460" r="8" fill="#FFCC02"/>
  <!-- Layer 3: 화살표 방향 -->
  <polygon points="840,438 880,460 840,482" fill="#FFCC02"/>
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#FF8F00" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
