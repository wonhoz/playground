<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="fog5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="sun5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="70%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>

  <!-- 배경 하늘 (원형) -->
  <circle cx="512" cy="512" r="490" fill="url(#sky5)"/>

  <!-- 태양 + 빛줄기 -->
  <g opacity="0.6">
    <line x1="512" y1="90" x2="512" y2="50" stroke="#FDE047" stroke-width="12" stroke-linecap="round"/>
    <line x1="610" y1="118" x2="638" y2="86" stroke="#FDE047" stroke-width="10" stroke-linecap="round"/>
    <line x1="414" y1="118" x2="386" y2="86" stroke="#FDE047" stroke-width="10" stroke-linecap="round"/>
    <line x1="668" y1="185" x2="706" y2="162" stroke="#FDE047" stroke-width="9" stroke-linecap="round"/>
    <line x1="356" y1="185" x2="318" y2="162" stroke="#FDE047" stroke-width="9" stroke-linecap="round"/>
  </g>
  <circle cx="512" cy="182" r="74" fill="url(#sun5)"/>

  <!-- 산 실루엣 배경 (더 뒤, 흐린 것처럼 표현) -->
  <polygon points="100,700 300,380 500,700" fill="#7DD3FC" opacity="0.5"/>
  <polygon points="500,700 700,420 900,700" fill="#7DD3FC" opacity="0.5"/>

  <!-- 선명한 산 실루엣 (앞) -->
  <polygon points="200,850 420,390 640,850" fill="#4338CA"/>
  <polygon points="420,850 650,360 880,850" fill="#3730A3"/>

  <!-- 산 눈덮임 -->
  <polygon points="400,420 420,390 440,430 430,440 410,438" fill="white" opacity="0.9"/>
  <polygon points="630,395 650,360 670,398 658,410 640,408" fill="white" opacity="0.9"/>

  <!-- 안개 (하단 그라데이션) -->
  <rect x="22" y="620" width="980" height="370" fill="url(#fog5)" clip-path="url(#circleMask)"/>
  <defs>
    <clipPath id="circleMask">
      <circle cx="512" cy="512" r="490"/>
    </clipPath>
  </defs>

  <!-- 구름 -->
  <ellipse cx="280" cy="370" rx="70" ry="38" fill="white" opacity="0.85"/>
  <ellipse cx="330" cy="352" rx="50" ry="32" fill="white" opacity="0.85"/>
  <ellipse cx="740" cy="400" rx="65" ry="36" fill="white" opacity="0.8"/>
  <ellipse cx="790" cy="382" rx="48" ry="28" fill="white" opacity="0.8"/>

  <!-- 해상도 힌트 텍스트 -->
  <rect x="360" y="740" width="304" height="78" rx="20" fill="rgba(30,58,138,0.75)"/>
  <text x="512" y="793" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="48" fill="white">Sharp</text>
</svg>
