<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1C1C2E"/>
  <!-- Layer 2: 드롭존 UI -->
  <!-- 점선 테두리 -->
  <rect x="220" y="260" width="584" height="460" rx="28" fill="none" stroke="#4FC3F7" stroke-width="10" stroke-dasharray="30,18"/>
  <!-- 내부 배경 -->
  <rect x="230" y="270" width="564" height="440" rx="22" fill="#12122A"/>
  <!-- 큰 아래 화살표 -->
  <path d="M512,350 L512,540" fill="none" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <polygon points="512,580 474,530 550,530" fill="white"/>
  <!-- "DROP" 텍스트 -->
  <text x="512" y="650" text-anchor="middle" font-family="Arial Black" font-size="130" font-weight="900" fill="white">DROP</text>
  <!-- 모서리 파일 아이콘들 -->
  <!-- SVG -->
  <rect x="248" y="280" width="80" height="60" rx="8" fill="#1B5E20" opacity="0.7"/>
  <text x="288" y="320" text-anchor="middle" font-family="Arial Black" font-size="34" fill="#69F0AE">SVG</text>
  <!-- ICO -->
  <rect x="696" y="280" width="80" height="60" rx="8" fill="#E65100" opacity="0.7"/>
  <text x="736" y="320" text-anchor="middle" font-family="Arial Black" font-size="34" fill="#FFD180">ICO</text>
  <!-- PNG -->
  <rect x="248" y="640" width="80" height="60" rx="8" fill="#0D47A1" opacity="0.7"/>
  <text x="288" y="680" text-anchor="middle" font-family="Arial Black" font-size="34" fill="#82B1FF">PNG</text>
  <!-- JPG -->
  <rect x="696" y="640" width="80" height="60" rx="8" fill="#4A148C" opacity="0.7"/>
  <text x="736" y="680" text-anchor="middle" font-family="Arial Black" font-size="34" fill="#EA80FC">JPG</text>
  <!-- Layer 3: 글로우 효과 -->
  <circle cx="512" cy="490" r="160" fill="#4FC3F7" opacity="0.04"/>
  <text x="512" y="840" text-anchor="middle" font-family="Arial Black" font-size="70" font-weight="900" fill="#4FC3F7">Drag &amp; Drop</text>
</svg>