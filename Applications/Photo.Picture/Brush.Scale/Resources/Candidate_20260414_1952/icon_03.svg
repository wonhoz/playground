<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 보라+분홍 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 신경망 노드 그래프 (AI) -->
  <!-- 입력 레이어 (픽셀) -->
  <circle cx="200" cy="340" r="36" fill="white" opacity="0.9"/>
  <circle cx="200" cy="440" r="36" fill="white" opacity="0.9"/>
  <circle cx="200" cy="540" r="36" fill="white" opacity="0.9"/>
  <circle cx="200" cy="640" r="36" fill="white" opacity="0.9"/>
  <!-- 히든 레이어 1 -->
  <circle cx="400" cy="290" r="36" fill="#F9A8D4" opacity="0.95"/>
  <circle cx="400" cy="400" r="36" fill="#F9A8D4" opacity="0.95"/>
  <circle cx="400" cy="510" r="36" fill="#F9A8D4" opacity="0.95"/>
  <circle cx="400" cy="620" r="36" fill="#F9A8D4" opacity="0.95"/>
  <circle cx="400" cy="700" r="36" fill="#F9A8D4" opacity="0.95"/>
  <!-- 히든 레이어 2 -->
  <circle cx="624" cy="340" r="36" fill="#DDD6FE" opacity="0.95"/>
  <circle cx="624" cy="450" r="36" fill="#DDD6FE" opacity="0.95"/>
  <circle cx="624" cy="560" r="36" fill="#DDD6FE" opacity="0.95"/>
  <circle cx="624" cy="660" r="36" fill="#DDD6FE" opacity="0.95"/>
  <!-- 출력 레이어 (고해상도) -->
  <circle cx="824" cy="400" r="44" fill="white" opacity="0.95"/>
  <circle cx="824" cy="540" r="44" fill="white" opacity="0.95"/>
  <circle cx="824" cy="620" r="44" fill="white" opacity="0.95"/>
  <!-- 연결선 (입력→히든1) -->
  <g stroke="white" stroke-width="3" opacity="0.3">
    <line x1="236" y1="340" x2="364" y2="290"/>
    <line x1="236" y1="340" x2="364" y2="400"/>
    <line x1="236" y1="440" x2="364" y2="290"/>
    <line x1="236" y1="440" x2="364" y2="510"/>
    <line x1="236" y1="540" x2="364" y2="510"/>
    <line x1="236" y1="540" x2="364" y2="620"/>
    <line x1="236" y1="640" x2="364" y2="620"/>
    <line x1="236" y1="640" x2="364" y2="700"/>
    <!-- 히든1→히든2 -->
    <line x1="436" y1="400" x2="588" y2="340"/>
    <line x1="436" y1="510" x2="588" y2="450"/>
    <line x1="436" y1="620" x2="588" y2="560"/>
    <line x1="436" y1="700" x2="588" y2="660"/>
    <!-- 히든2→출력 -->
    <line x1="660" y1="340" x2="780" y2="400"/>
    <line x1="660" y1="450" x2="780" y2="540"/>
    <line x1="660" y1="560" x2="780" y2="540"/>
    <line x1="660" y1="660" x2="780" y2="620"/>
  </g>
  <!-- Layer 3: 출력 노드에 이미지 아이콘 + AI 레이블 -->
  <text x="824" y="406" font-family="Segoe UI, sans-serif" font-size="40" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">HD</text>
  <text x="512" y="860" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">AI Scale</text>
</svg>
