<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg2)"/>

  <!-- White card -->
  <rect x="70" y="100" width="884" height="720" rx="32" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>

  <!-- Top: media files incoming -->
  <!-- Photo cards -->
  <rect x="100" y="130" width="160" height="130" rx="16" fill="#FCE4EC" stroke="#880E4F" stroke-width="12"/>
  <rect x="116" y="146" width="128" height="80" rx="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="8"/>
  <polygon points="120,218 168,186 196,206 228,178 240,218" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="220" cy="166" r="16" fill="#FFD93D" stroke="#880E4F" stroke-width="6"/>
  <rect x="116" y="232" width="128" height="18" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <!-- JPG label -->
  <rect x="108" y="226" width="80" height="36" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="8"/>
  <text x="148" y="251" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle">JPG</text>

  <!-- Video file -->
  <rect x="284" y="130" width="160" height="130" rx="16" fill="#FCE4EC" stroke="#880E4F" stroke-width="12"/>
  <rect x="300" y="146" width="128" height="80" rx="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="8"/>
  <!-- Play button -->
  <circle cx="364" cy="186" r="36" fill="#E91E63" stroke="#880E4F" stroke-width="8"/>
  <polygon points="351,172 351,200 385,186" fill="#FFFFFF"/>
  <rect x="300" y="232" width="128" height="18" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <rect x="292" y="226" width="80" height="36" rx="12" fill="#880E4F" stroke="#5D0C36" stroke-width="8"/>
  <text x="332" y="251" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle">MP4</text>

  <!-- HEIC file -->
  <rect x="468" y="130" width="160" height="130" rx="16" fill="#FCE4EC" stroke="#880E4F" stroke-width="12"/>
  <rect x="484" y="146" width="128" height="80" rx="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="8"/>
  <polygon points="488,218 530,178 554,200 580,168 604,218" fill="#FF6B9D" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <rect x="484" y="232" width="128" height="18" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <rect x="476" y="226" width="90" height="36" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="8"/>
  <text x="521" y="251" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle">HEIC</text>

  <!-- MOV file -->
  <rect x="652" y="130" width="160" height="130" rx="16" fill="#FCE4EC" stroke="#880E4F" stroke-width="12"/>
  <rect x="668" y="146" width="128" height="80" rx="8" fill="#F8BBD0" stroke="#880E4F" stroke-width="8"/>
  <circle cx="732" cy="186" r="36" fill="#FF6B9D" stroke="#880E4F" stroke-width="8"/>
  <polygon points="719,172 719,200 753,186" fill="#FFFFFF"/>
  <rect x="668" y="232" width="128" height="18" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <rect x="668" y="226" width="80" height="36" rx="12" fill="#880E4F" stroke="#5D0C36" stroke-width="8"/>
  <text x="708" y="251" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle">MOV</text>

  <!-- EXIF DATE badge center -->
  <rect x="282" y="298" width="460" height="80" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="512" y="352" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">EXIF DATE</text>

  <!-- Converging lines to main folder -->
  <line x1="180" y1="380" x2="512" y2="480" stroke="#E91E63" stroke-width="10" stroke-linecap="round"/>
  <line x1="364" y1="380" x2="512" y2="480" stroke="#FF6B9D" stroke-width="10" stroke-linecap="round"/>
  <line x1="548" y1="380" x2="512" y2="480" stroke="#E91E63" stroke-width="10" stroke-linecap="round"/>
  <line x1="732" y1="380" x2="512" y2="480" stroke="#FF6B9D" stroke-width="10" stroke-linecap="round"/>

  <!-- Output folder structure -->
  <!-- 2024 root -->
  <rect x="330" y="482" width="364" height="70" rx="20" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="512" y="529" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">2024/</text>
  <!-- Branch -->
  <rect x="500" y="556" width="12" height="50" rx="4" fill="#880E4F"/>
  <rect x="500" y="580" width="120" height="10" rx="4" fill="#880E4F"/>
  <rect x="500" y="620" width="180" height="10" rx="4" fill="#880E4F"/>
  <!-- Month folders -->
  <rect x="512" y="564" width="240" height="52" rx="14" fill="#FF6B9D" stroke="#880E4F" stroke-width="10"/>
  <text x="632" y="599" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">2024/01/</text>
  <rect x="512" y="624" width="240" height="52" rx="14" fill="#FF6B9D" stroke="#880E4F" stroke-width="10"/>
  <text x="632" y="659" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">2024/03/</text>

  <!-- Title -->
  <rect x="112" y="712" width="800" height="100" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="778" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>
</svg>
