<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="lens" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifier glass circle -->
  <circle cx="220" cy="220" r="155" fill="url(#lens)" stroke="#10B981" stroke-width="8"/>
  <circle cx="220" cy="220" r="147" fill="none" stroke="#059669" stroke-width="2" opacity="0.5"/>
  <!-- Circuit traces inside lens -->
  <g stroke="#10B981" stroke-width="2" opacity="0.5">
    <line x1="100" y1="220" x2="340" y2="220"/>
    <line x1="220" y1="100" x2="220" y2="340"/>
    <line x1="130" y1="150" x2="310" y2="290"/>
    <line x1="130" y1="290" x2="310" y2="150"/>
  </g>
  <!-- Memory cells inside lens -->
  <rect x="160" y="170" width="30" height="30" rx="4" fill="#10B981" opacity="0.5"/>
  <rect x="200" y="170" width="30" height="30" rx="4" fill="#10B981" opacity="0.8"/>
  <rect x="240" y="170" width="30" height="30" rx="4" fill="#10B981" opacity="0.3"/>
  <rect x="160" y="210" width="30" height="30" rx="4" fill="#10B981" opacity="0.9"/>
  <rect x="200" y="210" width="30" height="30" rx="4" fill="#34D399" opacity="0.7"/>
  <rect x="240" y="210" width="30" height="30" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="160" y="250" width="30" height="30" rx="4" fill="#10B981" opacity="0.4"/>
  <rect x="200" y="250" width="30" height="30" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="240" y="250" width="30" height="30" rx="4" fill="#10B981" opacity="0.9"/>
  <!-- Percentage readout -->
  <text x="220" y="145" font-family="Courier New" font-size="14" fill="#34D399" text-anchor="middle">64%</text>
  <!-- Lens reflection/glare -->
  <ellipse cx="165" cy="155" rx="30" ry="18" fill="white" opacity="0.06" transform="rotate(-30 165 155)"/>
  <!-- Handle -->
  <line x1="340" y1="340" x2="440" y2="440" stroke="#10B981" stroke-width="22" stroke-linecap="round"/>
  <line x1="340" y1="340" x2="440" y2="440" stroke="#34D399" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- Handle grip marks -->
  <line x1="365" y1="355" x2="378" y2="368" stroke="#022c22" stroke-width="3"/>
  <line x1="380" y1="370" x2="393" y2="383" stroke="#022c22" stroke-width="3"/>
  <line x1="395" y1="385" x2="408" y2="398" stroke="#022c22" stroke-width="3"/>
</svg>
