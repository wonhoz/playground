<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <radialGradient id="bg1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#0D0808"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tag1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="hammer1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8F0"/>
      <stop offset="100%" stop-color="#9090A8"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#FF6B00" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg1)" rx="180"/>
  <ellipse cx="512" cy="480" rx="340" ry="320" fill="url(#glow1)"/>

  <!-- Layer 2: Tag shape (main object) -->
  <!-- Tag body: rounded rectangle with hole -->
  <g filter="url(#shadow1)">
    <path d="M 220 310 L 220 680 Q 220 720 260 720 L 680 720 Q 720 720 740 700 L 820 620 Q 840 600 820 580 L 740 320 Q 720 300 680 300 L 260 300 Q 220 300 220 310 Z"
          fill="url(#tag1)" opacity="0.95"/>
    <!-- Tag hole -->
    <circle cx="700" cy="510" r="42" fill="#0D0808"/>
    <circle cx="700" cy="510" r="30" fill="none" stroke="#FFB347" stroke-width="8"/>
  </g>

  <!-- Layer 3: Text detail on tag -->
  <!-- "TAG" text -->
  <text x="380" y="490" font-family="'Arial Black', Arial" font-weight="900"
        font-size="140" fill="#1A0A00" opacity="0.35" letter-spacing="-4">TAG</text>
  <!-- Metadata lines (literal detail) -->
  <rect x="260" y="540" width="280" height="18" rx="9" fill="#1A0A00" opacity="0.4"/>
  <rect x="260" y="575" width="200" height="18" rx="9" fill="#1A0A00" opacity="0.3"/>
  <rect x="260" y="610" width="240" height="18" rx="9" fill="#1A0A00" opacity="0.25"/>

  <!-- Hammer hitting the tag (forge element) -->
  <g transform="translate(560 250) rotate(45)">
    <!-- Handle -->
    <rect x="-14" y="40" width="28" height="130" rx="10" fill="url(#hammer1)" opacity="0.9"/>
    <!-- Head -->
    <rect x="-46" y="-30" width="92" height="76" rx="12" fill="url(#hammer1)"/>
    <!-- Highlight -->
    <rect x="-38" y="-22" width="76" height="24" rx="6" fill="white" opacity="0.3"/>
  </g>

  <!-- Spark/impact dots -->
  <circle cx="596" cy="298" r="10" fill="#FFDD44" opacity="0.9"/>
  <circle cx="624" cy="272" r="7" fill="#FF8C00" opacity="0.8"/>
  <circle cx="570" cy="268" r="5" fill="#FFDD44" opacity="0.7"/>
  <circle cx="648" cy="308" r="6" fill="#FF4400" opacity="0.8"/>
</svg>
