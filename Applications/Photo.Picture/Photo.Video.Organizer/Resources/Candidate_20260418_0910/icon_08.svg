<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 라임-퍼플 배경 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <g clip-path="url(#clip08)">
    <!-- Layer 2: 사진 프레임 (중앙 좌측) -->
    <rect x="130" y="200" width="340" height="280" rx="22" fill="#FFFFFF" stroke="#FF7043" stroke-width="10"/>
    <!-- 사진 내용 (풍경) -->
    <rect x="148" y="218" width="304" height="200" rx="12" fill="#81D4FA"/>
    <circle cx="390" cy="270" r="44" fill="#FFD54F"/>
    <path d="M148 368 L220 308 L300 350 L380 316 L452 350 L452 418 L148 418Z" fill="#66BB6A" opacity="0.8"/>
    <!-- 사진 라벨 -->
