<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000A00"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF00"/>
      <stop offset="100%" stop-color="#006600"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bonsai pot -->
  <ellipse cx="256" cy="440" rx="90" ry="18" fill="#004400" filter="url(#neonGlow)"/>
  <path d="M176 440 L192 400 L320 400 L336 440 Z" fill="#002800" stroke="#00AA00" stroke-width="1.5"/>
  <ellipse cx="256" cy="400" rx="64" ry="10" fill="#003C00" stroke="#00AA00" stroke-width="1"/>
  <!-- Trunk neon lines -->
  <path d="M256 400 Q252 350 256 300 Q260 250 252 210" stroke="#00DD00" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Branch left 1 -->
  <path d="M254 310 Q220 280 188 260" stroke="#00AA00" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Branch left 2 -->
  <path d="M252 270 Q212 240 185 210" stroke="#00AA00" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Branch right 1 -->
  <path d="M256 320 Q290 290 322 272" stroke="#00AA00" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Branch right 2 -->
  <path d="M254 275 Q292 248 326 228" stroke="#00AA00" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Top branch -->
  <path d="M252 220 Q240 190 228 168" stroke="#00BB00" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M252 220 Q264 192 278 170" stroke="#00BB00" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Leaf clusters as circles -->
  <circle cx="185" cy="258" r="28" fill="#00FF00" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="185" cy="258" r="28" fill="none" stroke="#00FF00" stroke-width="1.5" filter="url(#neonGlow)"/>
  <circle cx="182" cy="206" r="24" fill="#00FF00" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="182" cy="206" r="24" fill="none" stroke="#00FF00" stroke-width="1.5" filter="url(#neonGlow)"/>
  <circle cx="324" cy="268" r="26" fill="#00FF00" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="324" cy="268" r="26" fill="none" stroke="#00FF00" stroke-width="1.5" filter="url(#neonGlow)"/>
  <circle cx="328" cy="224" r="22" fill="#00FF00" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="328" cy="224" r="22" fill="none" stroke="#00FF00" stroke-width="1.5" filter="url(#neonGlow)"/>
  <circle cx="228" cy="164" r="20" fill="#00FF00" opacity="0.15" filter="url(#neonGlow)"/>
  <circle cx="228" cy="164" r="20" fill="none" stroke="#44FF44" stroke-width="1.5" filter="url(#neonGlow)"/>
  <circle cx="278" cy="166" r="22" fill="#00FF00" opacity="0.15" filter="url(#neonGlow)"/>
  <circle cx="278" cy="166" r="22" fill="none" stroke="#44FF44" stroke-width="1.5" filter="url(#neonGlow)"/>
  <!-- Center crown -->
  <circle cx="256" cy="148" r="30" fill="#00FF00" opacity="0.18" filter="url(#neonGlow)"/>
  <circle cx="256" cy="148" r="30" fill="none" stroke="#88FF88" stroke-width="2" filter="url(#neonGlow)"/>
  <!-- Particle dots -->
  <circle cx="150" cy="240" r="3" fill="#00FF00" filter="url(#neonGlow)" opacity="0.7"/>
  <circle cx="360" cy="210" r="3" fill="#00FF00" filter="url(#neonGlow)" opacity="0.6"/>
  <circle cx="220" cy="130" r="2" fill="#88FF88" filter="url(#neonGlow)" opacity="0.8"/>
  <circle cx="296" cy="134" r="2" fill="#88FF88" filter="url(#neonGlow)" opacity="0.7"/>
</svg>
