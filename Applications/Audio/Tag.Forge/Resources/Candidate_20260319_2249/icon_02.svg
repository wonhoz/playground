<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Paint palette filling a music note with metadata colors -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0800"/>
  <!-- Palette shape -->
  <path d="M200 540 Q180 300 400 220 Q540 180 660 260 Q800 340 780 500 Q770 580 700 600 Q640 620 620 560 Q600 500 540 520 Q480 540 480 600 Q480 680 400 700 Q260 720 200 540 Z" fill="#1A1000" stroke="#FF9800" stroke-width="22"/>
  <!-- Color dots on palette -->
  <circle cx="340" cy="300" r="40" fill="#F44336"/>
  <circle cx="460" cy="250" r="40" fill="#FFC107"/>
  <circle cx="590" cy="280" r="40" fill="#4CAF50"/>
  <circle cx="680" cy="370" r="40" fill="#2196F3"/>
  <circle cx="690" cy="490" r="36" fill="#9C27B0"/>
  <!-- Music note being painted (center) -->
  <rect x="310" y="440" width="28" height="180" rx="8" fill="#FF9800"/>
  <ellipse cx="294" cy="620" rx="52" ry="36" fill="#FF9800" transform="rotate(-15, 294, 620)"/>
  <path d="M338 440 L430 410 L430 442 L338 472 Z" fill="#FF9800"/>
  <!-- Paint brush -->
  <rect x="580" y="560" width="22" height="240" rx="8" fill="#8D6E63" transform="rotate(-45, 591, 680)"/>
  <rect x="572" y="768" width="38" height="60" rx="8" fill="#FFC107" transform="rotate(-45, 591, 798)"/>
  <path d="M558 826 Q591 856 622 826" fill="#FFC107" transform="rotate(-45, 590, 840)"/>
</svg>
