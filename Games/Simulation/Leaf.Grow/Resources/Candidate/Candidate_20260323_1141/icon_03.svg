<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 포레스트 -->
  <rect width="1024" height="1024" rx="180" fill="#0A1A0A"/>
  <!-- Layer 2: 나이테 패턴 (성장 원) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#2E7D32" stroke-width="8" opacity="0.4"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#388E3C" stroke-width="8" opacity="0.5"/>
  <circle cx="512" cy="512" r="250" fill="none" stroke="#43A047" stroke-width="8" opacity="0.6"/>
  <circle cx="512" cy="512" r="190" fill="none" stroke="#4CAF50" stroke-width="8" opacity="0.7"/>
  <circle cx="512" cy="512" r="130" fill="none" stroke="#66BB6A" stroke-width="8" opacity="0.8"/>
  <circle cx="512" cy="512" r="80" fill="none" stroke="#81C784" stroke-width="10" opacity="0.9"/>
  <circle cx="512" cy="512" r="40" fill="#4CAF50" opacity="0.9"/>
  <circle cx="512" cy="512" r="20" fill="#A5D6A7"/>
  <!-- 반지름선 (나이테 단면) -->
  <line x1="512" y1="512" x2="512" y2="132" stroke="#2E7D32" stroke-width="4" opacity="0.4"/>
  <!-- 나무 나이 표시 -->
  <text x="560" y="330" font-family="Arial" font-size="28" fill="#A5D6A7" opacity="0.7">1yr</text>
  <text x="560" y="400" font-family="Arial" font-size="28" fill="#A5D6A7" opacity="0.7">5yr</text>
  <text x="560" y="460" font-family="Arial" font-size="28" fill="#A5D6A7" opacity="0.7">10yr</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#4CAF50" text-anchor="middle">LEAF.GROW</text>
</svg>
