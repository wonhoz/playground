<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="watch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#808090"/>
      <stop offset="100%" stop-color="#404050"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0f1a0f"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stopwatch body -->
  <circle cx="256" cy="280" r="170" fill="url(#watch)"/>
  <circle cx="256" cy="280" r="158" fill="url(#face)"/>
  <!-- Minute markers -->
  <line x1="256" y1="130" x2="256" y2="150" stroke="#ffffff" stroke-width="4" opacity="0.7"/>
  <line x1="330" y1="148" x2="320" y2="165" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="376" y1="206" x2="359" y2="213" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="406" y1="280" x2="386" y2="280" stroke="#ffffff" stroke-width="4" opacity="0.7"/>
  <line x1="376" y1="354" x2="359" y2="347" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="330" y1="412" x2="320" y2="395" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="430" x2="256" y2="410" stroke="#ffffff" stroke-width="4" opacity="0.7"/>
  <line x1="182" y1="412" x2="192" y2="395" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="136" y1="354" x2="153" y2="347" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="106" y1="280" x2="126" y2="280" stroke="#ffffff" stroke-width="4" opacity="0.7"/>
  <line x1="136" y1="206" x2="153" y2="213" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="182" y1="148" x2="192" y2="165" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <!-- Timer numbers -->
  <text x="256" y="162" font-size="22" fill="#888" font-family="Arial" text-anchor="middle">12</text>
  <text x="390" y="286" font-size="22" fill="#888" font-family="Arial" text-anchor="middle">3</text>
  <text x="256" y="422" font-size="22" fill="#888" font-family="Arial" text-anchor="middle">6</text>
  <text x="122" y="286" font-size="22" fill="#888" font-family="Arial" text-anchor="middle">9</text>
  <!-- Minute hand (at ~2 o'clock = record time) -->
  <line x1="256" y1="280" x2="310" y2="165" stroke="#ff3300" stroke-width="5" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="256" y1="280" x2="200" y2="150" stroke="#ffcc00" stroke-width="3" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="256" cy="280" r="10" fill="#c0c0d0"/>
  <circle cx="256" cy="280" r="5" fill="#ffffff"/>
  <!-- Crown/buttons -->
  <rect x="240" y="100" width="32" height="20" rx="8" fill="url(#watch)"/>
  <rect x="246" y="88" width="20" height="18" rx="6" fill="#707080"/>
  <!-- Side button -->
  <rect x="406" y="255" width="20" height="18" rx="6" fill="#707080"/>
  <!-- Time display -->
  <rect x="200" y="300" width="112" height="36" rx="8" fill="#000" opacity="0.6"/>
  <text x="256" y="323" font-size="20" fill="#00ff88" font-family="monospace" text-anchor="middle">09:58.3</text>
  <!-- Runner icon small -->
  <circle cx="256" cy="245" r="10" fill="#f0c080"/>
  <path d="M256 255 L250 272 L254 272 L256 263 L262 271 L266 269 L258 254Z" fill="#cc2020"/>
</svg>