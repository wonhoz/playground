<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <clipPath id="clip14"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>
  <g clip-path="url(#clip14)">
    <!-- Layer 2: 터미널 창 -->
    <rect x="180" y="240" width="664" height="560" rx="20" fill="#111827" stroke="#374151" stroke-width="6"/>
    <!-- 터미널 타이틀 바 -->
    <rect x="180" y="240" width="664" height="56" rx="20" fill="#1F2937"/>
    <rect x="180" y="266" width="664" height="30" fill="#1F2937"/>
    <!-- 닫기 버튼들 -->
    <circle cx="222" cy="268" r="12" fill="#EF4444"/>
    <circle cx="256" cy="268" r="12" fill="#FBBF24"/>
    <circle cx="290" cy="268" r="12" fill="#4ADE80"/>
    <!-- 터미널 텍스트 -->
    <!-- 프롬프트 라인 1 -->
    <text x="210" y="340" font-family="'Courier New', monospace" font-size="30" fill="#4ADE80" dominant-baseline="middle">$</text>
    <text x="246" y="340" font-family="'Courier New', monospace" font-size="30" fill="#22D3EE" dominant-baseline="middle">curl -X GET \</text>
    <!-- 라인 2 -->
    <text x="246" y="390" font-family="'Courier New', monospace" font-size="30" fill="#22D3EE" dominant-baseline="middle">  -H "Accept: application/json" \</text>
    <!-- 라인 3 -->
    <text x="246" y="440" font-family="'Courier New', monospace" font-size="30" fill="#22D3EE" dominant-baseline="middle">  "https://api.example.com/v1"</text>
    <!-- 구분선 -->
    <line x1="210" y1="468" x2="826" y2="468" stroke="#374151" stroke-width="2"/>
    <!-- 응답 -->
    <text x="210" y="510" font-family="'Courier New', monospace" font-size="26" fill="#6B7280" dominant-baseline="middle">HTTP/2 200</text>
    <text x="210" y="550" font-family="'Courier New', monospace" font-size="26" fill="#A7F3D0" dominant-baseline="middle">{</text>
    <text x="246" y="592" font-family="'Courier New', monospace" font-size="26" fill="#FDE68A" dominant-baseline="middle">"status": "ok",</text>
    <text x="246" y="634" font-family="'Courier New', monospace" font-size="26" fill="#FDE68A" dominant-baseline="middle">"data": [...]</text>
    <text x="210" y="674" font-family="'Courier New', monospace" font-size="26" fill="#A7F3D0" dominant-baseline="middle">}</text>
    <!-- 커서 -->
    <rect x="210" y="710" width="18" height="34" fill="#22D3EE" opacity="0.9"/>
    <!-- Layer 3: 강조 하이라이트 -->
    <rect x="195" y="318" width="632" height="44" rx="6" fill="#22D3EE" opacity="0.07"/>
  </g>
</svg>
