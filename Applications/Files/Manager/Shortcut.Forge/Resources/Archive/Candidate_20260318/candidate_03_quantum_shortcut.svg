<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#09001a"/>
    </linearGradient>
    <radialGradient id="qCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 양자 궤도들 (바로가기) -->
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#8B5CF6" stroke-width="1.2" opacity="0.3" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#7C3AED" stroke-width="1.2" opacity="0.3" transform="rotate(120 256 256)"/>
  <!-- 코어 글로우 -->
  <circle cx="256" cy="256" r="105" fill="url(#qCore)" filter="url(#strongGlow)"/>
  <circle cx="256" cy="256" r="55" fill="#8B5CF6" opacity="0.1"/>
  <circle cx="256" cy="256" r="28" fill="#A78BFA" opacity="0.2" filter="url(#glow)"/>
  <!-- 양자 터널 (바로가기 경로 = 직선) -->
  <!-- 일반 경로 (긴 호) -->
  <path d="M 90,256 A 166,166 0 1,1 422,256" fill="none" stroke="#6D28D9" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>
  <!-- 바로가기 (짧은 직선, 빛남) -->
  <line x1="90" y1="256" x2="422" y2="256" stroke="#C4B5FD" stroke-width="5" opacity="0.9" stroke-linecap="round" filter="url(#strongGlow)"/>
  <line x1="90" y1="256" x2="422" y2="256" stroke="#DDD6FE" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- 화살표 -->
  <polygon points="412,246 424,256 412,266" fill="#C4B5FD" opacity="0.9" filter="url(#glow)"/>
  <!-- 시작점 (좌) -->
  <circle cx="90" cy="256" r="18" fill="#7C3AED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="90" cy="256" r="11" fill="#A78BFA" opacity="1" filter="url(#glow)"/>
  <!-- 끝점 (우) -->
  <circle cx="422" cy="256" r="18" fill="#7C3AED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="422" cy="256" r="11" fill="#C4B5FD" opacity="1" filter="url(#glow)"/>
  <!-- 전자들 (궤도 위) -->
  <circle cx="256" cy="86" r="12" fill="#8B5CF6" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="426" r="12" fill="#A78BFA" opacity="0.8" filter="url(#glow)"/>
  <circle cx="366" cy="112" r="10" fill="#C4B5FD" opacity="0.8" filter="url(#glow)"/>
  <circle cx="146" cy="400" r="10" fill="#8B5CF6" opacity="0.78" filter="url(#glow)"/>
  <!-- 중앙 바로가기 아이콘 -->
  <circle cx="256" cy="256" r="22" fill="#7C3AED" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#A78BFA" opacity="1" filter="url(#glow)"/>
  <path d="M 248,252 L 260,252 L 260,248 L 268,256 L 260,264 L 260,260 L 248,260 Z" fill="#030508" opacity="0.9"/>
  <!-- 라벨 -->
  <text x="256" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#8B5CF6" opacity="0.5">SHORTCUT</text>
</svg>