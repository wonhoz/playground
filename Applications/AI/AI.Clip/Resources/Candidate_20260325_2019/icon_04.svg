<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="abg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 핫핑크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#abg4)"/>
  <!-- Layer 2: 복사 아이콘 (두 사각형) — 왼쪽 -->
  <!-- 뒤 종이 -->
  <rect x="152" y="256" width="280" height="340" rx="28" fill="white" opacity="0.7"/>
  <!-- 앞 종이 -->
  <rect x="212" y="316" width="280" height="340" rx="28" fill="white"/>
  <!-- 텍스트 라인 on 앞 종이 -->
  <rect x="252" y="396" width="200" height="24" rx="12" fill="#F48FB1"/>
  <rect x="252" y="440" width="160" height="24" rx="12" fill="#F8BBD0"/>
  <rect x="252" y="484" width="180" height="24" rx="12" fill="#F48FB1"/>
  <!-- Layer 3: 화살표 + AI 번개 -->
  <!-- 큰 화살표 -->
  <line x1="524" y1="512" x2="640" y2="512" stroke="#FFD740" stroke-width="52" stroke-linecap="round"/>
  <polygon points="628,460 628,564 740,512" fill="#FFD740"/>
  <!-- AI 번개 볼트 (오른쪽) -->
