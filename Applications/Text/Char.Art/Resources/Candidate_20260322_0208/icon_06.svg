  <!-- 커서 깜박임 효과 -->
  <rect x="218" y="402" width="10" height="18" fill="#00FF88" opacity="0.9"/>

  <!-- 프롬프트 -->
  <text x="218" y="418" font-family="Courier New, monospace" font-size="15" fill="#00FF88">$ char-art image.png_</text>

  <!-- 모니터 스탠드 -->
  <rect x="472" y="700" width="80" height="80" rx="6" fill="#0A1A1A" stroke="#00CCAA" stroke-width="4"/>
  <rect x="350" y="776" width="324" height="28" rx="10" fill="#0A1A1A" stroke="#00CCAA" stroke-width="4"/>

