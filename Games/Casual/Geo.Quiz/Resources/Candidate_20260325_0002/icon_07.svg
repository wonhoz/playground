  <!-- Puzzle division lines on map -->
  <line x1="512" y1="215" x2="512" y2="750" stroke="#E65100" stroke-width="18" stroke-dasharray="0"/>
  <line x1="215" y1="480" x2="834" y2="480" stroke="#E65100" stroke-width="18"/>
  <line x1="350" y1="215" x2="320" y2="750" stroke="#E65100" stroke-width="12" opacity="0.7"/>
