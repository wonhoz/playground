<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#A5B4FC;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 파동 레이어들 -->
  <path d="M 40 200 Q 100 160 160 200 Q 220 240 280 200 Q 340 160 400 200 Q 460 240 480 220" fill="none" stroke="url(#wave1)" stroke-width="3" opacity="0.6"/>
  <path d="M 40 230 Q 100 190 160 230 Q 220 270 280 230 Q 340 190 400 230 Q 460 270 480 250" fill="none" stroke="#818CF8" stroke-width="5" filter="url(#glow)"/>
  <path d="M 40 260 Q 100 220 160 260 Q 220 300 280 260 Q 340 220 400 260 Q 460 300 480 280" fill="none" stroke="url(#wave2)" stroke-width="3" opacity="0.6"/>
  <path d="M 40 290 Q 100 250 160 290 Q 220 330 280 290 Q 340 250 400 290 Q 460 330 480 310" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.4"/>
  <!-- 파동 채움 -->
  <path d="M 40 230 Q 100 190 160 230 Q 220 270 280 230 Q 340 190 400 230 Q 460 270 480 250 L 480 320 Q 460 300 400 310 Q 340 320 280 310 Q 220 300 160 310 Q 100 320 40 300 Z" fill="#6366F1" opacity="0.08"/>
  <!-- 파일 이름 텍스트 표현 (선들) -->
  <g opacity="0.9">
    <!-- 파일명 A -->
    <rect x="80" y="140" width="90" height="14" rx="7" fill="#6366F1" opacity="0.5"/>
    <!-- 화살표 -->
    <path d="M 185 147 L 205 147 M 198 140 L 205 147 L 198 154" stroke="#818CF8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 파일명 B -->
    <rect x="210" y="140" width="120" height="14" rx="7" fill="#A5B4FC" opacity="0.7"/>
  </g>
  <!-- 두 번째 파일 세트 -->
  <g opacity="0.7">
    <rect x="100" y="330" width="70" height="12" rx="6" fill="#6366F1" opacity="0.4"/>
    <path d="M 183 336 L 198 336 M 192 330 L 198 336 L 192 342" stroke="#818CF8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="203" y="330" width="100" height="12" rx="6" fill="#818CF8" opacity="0.6"/>
  </g>
  <!-- 세 번째 -->
  <g opacity="0.5">
    <rect x="120" y="370" width="55" height="10" rx="5" fill="#6366F1" opacity="0.3"/>
    <path d="M 186 375 L 198 375 M 193 370 L 198 375 L 193 380" stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="203" y="370" width="80" height="10" rx="5" fill="#818CF8" opacity="0.4"/>
  </g>
  <!-- 중앙 빛나는 물결 아이콘 -->
  <circle cx="256" cy="256" r="55" fill="#6366F1" opacity="0.08"/>
  <circle cx="256" cy="256" r="40" fill="#6366F1" opacity="0.12"/>
  <path d="M 210 256 Q 225 236 240 256 Q 255 276 270 256 Q 285 236 302 256" fill="none" stroke="#A5B4FC" stroke-width="5" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- 연필 아이콘 (하단) -->
  <g transform="translate(230, 290) rotate(-30)">
    <rect x="0" y="0" width="12" height="36" rx="2" fill="#818CF8" opacity="0.8"/>
    <polygon points="0,36 12,36 6,48" fill="#A5B4FC" opacity="0.9"/>
    <rect x="0" y="0" width="12" height="8" rx="2" fill="#6366F1" opacity="0.9"/>
  </g>
  <!-- 상단 별 장식 -->
  <circle cx="380" cy="120" r="4" fill="#A5B4FC" opacity="0.8" filter="url(#glow)"/>
  <circle cx="130" cy="100" r="3" fill="#818CF8" opacity="0.6"/>
  <circle cx="420" cy="380" r="3" fill="#6366F1" opacity="0.7"/>
</svg>