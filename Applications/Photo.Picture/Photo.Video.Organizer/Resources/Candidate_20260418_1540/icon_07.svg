<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 사서 캐릭터 실루엣 -->
    <!-- 머리 -->
    <circle cx="300" cy="220" r="90" fill="#7B1FA2"/>
    <!-- 얼굴 -->
    <circle cx="300" cy="220" r="70" fill="#FFCCBC"/>
    <!-- 눈 -->
    <circle cx="278" cy="210" r="10" fill="#4A148C"/>
    <circle cx="322" cy="210" r="10" fill="#4A148C"/>
    <!-- 안경 -->
    <rect x="260" y="202" width="44" height="24" rx="10" fill="none" stroke="#5C6BC0" stroke-width="5"/>
    <rect x="312" y="202" width="44" height="24" rx="10" fill="none" stroke="#5C6BC0" stroke-width="5"/>
    <line x1="304" y1="214" x2="312" y2="214" stroke="#5C6BC0" stroke-width="5"/>
    <!-- 입 -->
    <path d="M 286 240 Q 300 252 314 240" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>

    <!-- 몸통 -->
    <rect x="200" y="310" width="200" height="280" rx="30" fill="#7B1FA2"/>
    <!-- 팔 (오른쪽: 파일을 들고 있음) -->
    <rect x="400" y="340" width="60" height="180" rx="28" fill="#7B1FA2"/>
    <rect x="390" y="360" width="80" height="120" rx="20" fill="#9C27B0"/>
    <!-- 들고 있는 파일 카드 -->
    <rect x="440" y="280" width="120" height="150" rx="16" fill="#42A5F5"/>
    <text x="500" y="365" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">JPG</text>
    <rect x="456" y="380" width="88" height="10" rx="4" fill="#90CAF9" opacity="0.7"/>

    <!-- 좌측 팔 -->
    <rect x="140" y="340" width="60" height="160" rx="28" fill="#7B1FA2"/>

    <!-- 서랍장 (날짜별) -->
    <rect x="560" y="200" width="380" height="680" rx="24" fill="#CE93D8" stroke="#AB47BC" stroke-width="4"/>
    <!-- 서랍 1 -->
    <rect x="580" y="220" width="340" height="100" rx="14" fill="#9C27B0"/>
    <text x="760" y="283" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">2024/01</text>
    <circle cx="900" cy="270" r="18" fill="#E1BEE7"/>
    <!-- 서랍 2 -->
    <rect x="580" y="334" width="340" height="100" rx="14" fill="#AB47BC"/>
    <text x="760" y="397" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">2024/02</text>
    <circle cx="900" cy="384" r="18" fill="#E1BEE7"/>
    <!-- 서랍 3 (열려있음) -->
    <rect x="560" y="448" width="380" height="130" rx="14" fill="#7B1FA2"/>
    <text x="760" y="511" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">2024/03</text>
    <circle cx="900" cy="498" r="18" fill="#FFD54F"/>
    <!-- 서랍 3 안의 파일들 -->
    <rect x="574" y="566" width="50" height="50" rx="8" fill="#42A5F5"/>
    <rect x="632" y="566" width="50" height="50" rx="8" fill="#EF5350"/>
    <!-- 서랍 4 -->
    <rect x="580" y="600" width="340" height="100" rx="14" fill="#6A1B9A"/>
    <text x="760" y="663" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#CE93D8" text-anchor="middle">2024/12</text>
    <circle cx="900" cy="650" r="18" fill="#E1BEE7"/>
    <!-- 서랍 5 -->
    <rect x="580" y="714" width="340" height="100" rx="14" fill="#4A148C"/>
    <text x="760" y="777" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#D1C4E9" text-anchor="middle">2023/…</text>

    <!-- 화살표 (캐릭터 → 서랍) -->
    <text x="510" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="70" fill="#7B1FA2" text-anchor="middle">→</text>

    <!-- 타이틀 -->
    <rect x="80" y="890" width="864" height="70" rx="24" fill="#4A148C"/>
    <text x="512" y="937" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">PHOTO·VIDEO ORGANIZER</text>
  </g>
</svg>
