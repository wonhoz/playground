<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#051525"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor body -->
  <rect x="60" y="80" width="392" height="280" rx="20" fill="#1a2a3a" stroke="#2196f3" stroke-width="3"/>
  <rect x="76" y="96" width="360" height="248" rx="12" fill="url(#screen)"/>
  <!-- Screen content: CPU/RAM/GPU gauges -->
  <text x="96" y="125" fill="#42a5f5" font-size="12" font-family="monospace">CPU</text>
  <rect x="96" y="130" width="300" height="14" rx="5" fill="#1a3a5a"/>
  <rect x="96" y="130" width="210" height="14" rx="5" fill="#2196f3" opacity="0.8"/>
  <text x="96" y="165" fill="#66bb6a" font-size="12" font-family="monospace">RAM</text>
  <rect x="96" y="170" width="300" height="14" rx="5" fill="#1a3a1a"/>
  <rect x="96" y="170" width="190" height="14" rx="5" fill="#4caf50" opacity="0.8"/>
  <text x="96" y="205" fill="#ff7043" font-size="12" font-family="monospace">GPU</text>
  <rect x="96" y="210" width="300" height="14" rx="5" fill="#3a1a1a"/>
  <rect x="96" y="210" width="240" height="14" rx="5" fill="#ff5722" opacity="0.8"/>
  <text x="96" y="245" fill="#ffca28" font-size="12" font-family="monospace">DSK</text>
  <rect x="96" y="250" width="300" height="14" rx="5" fill="#3a2a1a"/>
  <rect x="96" y="250" width="150" height="14" rx="5" fill="#ff9800" opacity="0.8"/>
  <!-- Net activity -->
  <polyline points="96,305 116,295 136,310 156,285 176,300 196,290 216,308 236,285 256,295 276,302" stroke="#26c6da" stroke-width="2" fill="none"/>
  <!-- Stand -->
  <rect x="216" y="360" width="80" height="24" rx="4" fill="#1a2a3a"/>
  <rect x="176" y="384" width="160" height="16" rx="8" fill="#1a2a3a" stroke="#2196f3" stroke-width="2"/>
</svg>