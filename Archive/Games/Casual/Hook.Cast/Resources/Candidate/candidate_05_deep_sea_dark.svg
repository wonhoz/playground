<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#001433"/>
      <stop offset="100%" stop-color="#000a1a"/>
    </radialGradient>
    <radialGradient id="biolum" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#biolum)"/>
  <!-- Water surface shimmer at top -->
  <path d="M0 80 Q64 68 128 80 Q192 92 256 80 Q320 68 384 80 Q448 92 512 80 L512 100 L0 100 Z" fill="#001f4d" opacity="0.8"/>
  <!-- Depth layers -->
  <rect x="0" y="80" width="512" height="432" rx="0" fill="none" stroke="#001433" stroke-width="0"/>
  <!-- Bioluminescent particles -->
  <circle cx="120" cy="180" r="3" fill="#00ffcc" opacity="0.6"/>
  <circle cx="340" cy="150" r="2" fill="#00ffcc" opacity="0.5"/>
  <circle cx="80" cy="300" r="3.5" fill="#00ffcc" opacity="0.4"/>
  <circle cx="420" cy="250" r="2.5" fill="#00ffcc" opacity="0.55"/>
  <circle cx="180" cy="420" r="2" fill="#00ffcc" opacity="0.35"/>
  <circle cx="380" cy="380" r="3" fill="#00ffcc" opacity="0.45"/>
  <circle cx="260" cy="200" r="2" fill="#44ffdd" opacity="0.5"/>
  <circle cx="440" cy="410" r="2.5" fill="#00ffcc" opacity="0.3"/>
  <!-- Seaweed -->
  <path d="M80 512 Q70 470 80 440 Q90 410 80 380 Q70 350 82 320" fill="none" stroke="#005533" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 512 Q112 475 100 445 Q88 415 102 385" fill="none" stroke="#004422" stroke-width="5" stroke-linecap="round"/>
  <path d="M430 512 Q418 475 430 442 Q442 409 428 376" fill="none" stroke="#005533" stroke-width="6" stroke-linecap="round"/>
  <!-- Glowing anglerfish -->
  <ellipse cx="320" cy="360" rx="60" ry="40" fill="#001a33" stroke="#003366" stroke-width="2"/>
  <!-- Angler lure -->
  <path d="M360 322 Q370 290 350 268 Q340 258 348 262" fill="none" stroke="#002244" stroke-width="3"/>
  <circle cx="348" cy="262" r="10" fill="#00ffcc" opacity="0.9"/>
  <circle cx="348" cy="262" r="14" fill="#00ffcc" opacity="0.2"/>
  <!-- Teeth -->
  <polygon points="276,360 286,348 296,360" fill="white" opacity="0.7"/>
  <polygon points="290,365 300,353 310,365" fill="white" opacity="0.6"/>
  <polygon points="304,368 314,356 324,368" fill="white" opacity="0.5"/>
  <!-- Eye -->
  <circle cx="295" cy="345" r="14" fill="#002244"/>
  <circle cx="295" cy="345" r="8" fill="#00ffcc" opacity="0.6"/>
  <circle cx="298" cy="342" r="4" fill="white" opacity="0.8"/>
  <!-- Hook descending with line -->
  <line x1="256" y1="82" x2="256" y2="290" stroke="#c0c0c0" stroke-width="1.5" opacity="0.7"/>
  <path d="M256 290 Q258 328 238 342 Q220 354 214 344 Q208 334 216 324 Q224 314 232 322" fill="none" stroke="#aaa" stroke-width="6" stroke-linecap="round"/>
  <line x1="232" y1="322" x2="226" y2="336" stroke="#aaa" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bait glow -->
  <circle cx="244" cy="338" r="8" fill="#ffff00" opacity="0.4"/>
  <circle cx="244" cy="338" r="4" fill="#ffff00" opacity="0.7"/>
  <!-- Bubbles rising -->
  <circle cx="250" cy="260" r="5" fill="none" stroke="#336699" stroke-width="1.5" opacity="0.5"/>
  <circle cx="262" cy="232" r="4" fill="none" stroke="#336699" stroke-width="1.5" opacity="0.4"/>
  <circle cx="248" cy="210" r="3" fill="none" stroke="#336699" stroke-width="1.5" opacity="0.3"/>
</svg>
