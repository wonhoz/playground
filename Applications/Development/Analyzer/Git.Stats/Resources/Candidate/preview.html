<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Git.Stats - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { color: #FF8C00; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .item img { width: 128px; height: 128px; border-radius: 8px; }
    .item .name { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .item .num { font-size: 18px; font-weight: bold; color: #FF8C00; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Git.Stats — Icon Candidates</h1>
  <p>Git 저장소 통계 분석기 아이콘 후보 10종</p>
  <div class="grid">
    <div class="item"><div class="num">01</div><img src="candidate_01_orange_flame_commits.svg" alt="01"><div class="name">orange_flame_commits</div></div>
    <div class="item"><div class="num">02</div><img src="candidate_02_blue_ocean_graph.svg" alt="02"><div class="name">blue_ocean_graph</div></div>
    <div class="item"><div class="num">03</div><img src="candidate_03_green_matrix_commits.svg" alt="03"><div class="name">green_matrix_commits</div></div>
    <div class="item"><div class="num">04</div><img src="candidate_04_purple_nebula_branches.svg" alt="04"><div class="name">purple_nebula_branches</div></div>
    <div class="item"><div class="num">05</div><img src="candidate_05_red_heatmap_activity.svg" alt="05"><div class="name">red_heatmap_activity</div></div>
    <div class="item"><div class="num">06</div><img src="candidate_06_cyan_circuit_stats.svg" alt="06"><div class="name">cyan_circuit_stats</div></div>
    <div class="item"><div class="num">07</div><img src="candidate_07_gold_trophy_leaderboard.svg" alt="07"><div class="name">gold_trophy_leaderboard</div></div>
    <div class="item"><div class="num">08</div><img src="candidate_08_pink_radar_metrics.svg" alt="08"><div class="name">pink_radar_metrics</div></div>
    <div class="item"><div class="num">09</div><img src="candidate_09_white_minimal_diff.svg" alt="09"><div class="name">white_minimal_diff</div></div>
    <div class="item"><div class="num">10</div><img src="candidate_10_teal_sunburst_repo.svg" alt="10"><div class="name">teal_sunburst_repo</div></div>
  </div>
</body>
</html>
