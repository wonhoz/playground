  <!-- Service status chips -->
  <rect x="193" y="285" width="48" height="22" rx="11" fill="#1A1200" stroke="#FFD54F" stroke-width="2"/>
  <rect x="248" y="285" width="48" height="22" rx="11" fill="#1A1200" stroke="#FFD54F" stroke-width="2"/>
  <rect x="193" y="315" width="48" height="22" rx="11" fill="#1A1200" stroke="#4CAF50" stroke-width="2"/>
  <rect x="248" y="315" width="48" height="22" rx="11" fill="#1A1200" stroke="#F44336" stroke-width="2"/>
  <text x="217" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#FFD54F" font-weight="bold">RUN</text>
  <text x="272" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#FFD54F" font-weight="bold">SVC</text>
  <text x="217" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#4CAF50" font-weight="bold">ON</text>
  <text x="272" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#F44336" font-weight="bold">OFF</text>
