<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#070018"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프랙탈 경로 (Koch 곡선 스타일 바로가기) -->
  <!-- 레벨 1 - 메인 경로 -->
  <polyline points="60,256 150,160 256,256 362,160 452,256" fill="none" stroke="#8B5CF6" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <!-- 레벨 2 - 분기 경로들 -->
  <polyline points="60,256 105,215 150,160" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.55"/>
  <polyline points="150,160 200,205 256,256" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.55"/>
  <polyline points="256,256 308,210 362,160" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.55"/>
  <polyline points="362,160 406,208 452,256" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.55"/>
  <!-- 레벨 3 - 더 세밀한 분기 -->
  <polyline points="60,256 82,235 105,215" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <polyline points="200,205 228,230 256,256" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <polyline points="256,256 282,233 308,210" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <polyline points="406,208 428,232 452,256" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.4"/>
  <!-- 하단 미러 경로 -->
  <polyline points="60,256 150,352 256,256 362,352 452,256" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
  <polyline points="60,256 105,297 150,352" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <polyline points="256,256 308,302 362,352" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <!-- 노드들 -->
  <circle cx="60" cy="256" r="12" fill="#7C3AED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="150" cy="160" r="10" fill="#8B5CF6" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#C4B5FD" opacity="0.95" filter="url(#glow)"/>
  <circle cx="362" cy="160" r="10" fill="#A78BFA" opacity="0.85" filter="url(#glow)"/>
  <circle cx="452" cy="256" r="12" fill="#8B5CF6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="150" cy="352" r="9" fill="#7C3AED" opacity="0.8" filter="url(#glow)"/>
  <circle cx="362" cy="352" r="9" fill="#6D28D9" opacity="0.8" filter="url(#glow)"/>
  <!-- 중간 노드들 -->
  <circle cx="105" cy="215" r="7" fill="#A78BFA" opacity="0.75"/>
  <circle cx="200" cy="205" r="7" fill="#8B5CF6" opacity="0.75"/>
  <circle cx="308" cy="210" r="7" fill="#A78BFA" opacity="0.75"/>
  <circle cx="406" cy="208" r="7" fill="#8B5CF6" opacity="0.75"/>
  <!-- 바로가기 출력 노드 (우측) -->
  <circle cx="452" cy="256" r="18" fill="#7C3AED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="452" cy="256" r="10" fill="#EDE9FE" opacity="1" filter="url(#glow)"/>
  <path d="M 445,252 L 454,252 L 454,248 L 461,256 L 454,264 L 454,260 L 445,260 Z" fill="#030508" opacity="0.9"/>
  <!-- 시작 라벨 -->
  <text x="60" y="282" text-anchor="middle" font-family="monospace" font-size="10" fill="#8B5CF6" opacity="0.7">START</text>
  <!-- 프랙탈 구조 깊이 표현 (작은 점들) -->
  <circle cx="82" cy="235" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="228" cy="230" r="3" fill="#A78BFA" opacity="0.5"/>
  <circle cx="282" cy="233" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="428" cy="232" r="3" fill="#A78BFA" opacity="0.5"/>
</svg>