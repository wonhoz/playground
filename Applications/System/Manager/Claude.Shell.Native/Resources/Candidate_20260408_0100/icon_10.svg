<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10csn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>

  <!-- Background: blue to purple to pink gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10csn)"/>

  <!-- Windows logo (top-left) -->
  <rect x="130" y="200" width="116" height="116" rx="10" fill="#3B82F6" opacity="0.9"/>
  <rect x="256" y="200" width="116" height="116" rx="10" fill="#EF4444" opacity="0.9"/>
  <rect x="130" y="326" width="116" height="116" rx="10" fill="#22C55E" opacity="0.9"/>
  <rect x="256" y="326" width="116" height="116" rx="10" fill="#FCD34D" opacity="0.9"/>
  <text x="256" y="484" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9">Windows</text>
  <text x="256" y="512" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9">Explorer</text>

  <!-- Plus sign (integration) -->
  <text x="512" y="380" font-family="Arial Black,Arial" font-size="100" fill="white" font-weight="900" text-anchor="middle" opacity="0.9">+</text>

  <!-- Claude C badge (top-right) -->
  <circle cx="768" cy="320" r="130" fill="#F97316"/>
  <circle cx="768" cy="320" r="108" fill="#EA580C"/>
  <text x="768" y="356" font-family="Arial Black,Arial" font-size="130" fill="white" font-weight="900" text-anchor="middle">C</text>
  <text x="768" y="484" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9">Claude Code</text>
  <text x="768" y="512" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9">claude .</text>

  <!-- Equals sign -->
  <text x="512" y="630" font-family="Arial Black,Arial" font-size="100" fill="white" font-weight="900" text-anchor="middle" opacity="0.9">=</text>

  <!-- Result: context menu with Claude item (bottom center) -->
  <rect x="262" y="680" width="500" height="240" rx="14" fill="white" opacity="0.95"/>
  <rect x="280" y="698" width="464" height="44" rx="8" fill="#F97316"/>
  <circle cx="314" cy="720" r="16" fill="white"/>
  <text x="314" y="726" font-family="Arial Black,Arial" font-size="14" fill="#F97316" text-anchor="middle" font-weight="900">C</text>
  <text x="346" y="726" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="bold">Open with Claude Code</text>
  <rect x="280" y="750" width="464" height="38" rx="4" fill="transparent"/>
  <text x="300" y="774" font-family="Arial,sans-serif" font-size="18" fill="#6B7280">Open</text>
  <rect x="280" y="790" width="464" height="38" rx="4" fill="transparent"/>
  <text x="300" y="814" font-family="Arial,sans-serif" font-size="18" fill="#6B7280">Copy</text>
  <rect x="280" y="830" width="464" height="38" rx="4" fill="transparent"/>
  <text x="300" y="854" font-family="Arial,sans-serif" font-size="18" fill="#6B7280">Rename</text>
  <text x="300" y="896" font-family="Arial,sans-serif" font-size="18" fill="#6B7280">Delete</text>
</svg>
