<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1E"/>
      <stop offset="100%" style="stop-color:#1A1A3A"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488FF"/>
      <stop offset="100%" style="stop-color:#0044CC"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEEAA"/>
      <stop offset="100%" style="stop-color:#CCAA44"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256 90 L380 140 L380 280 C380 360 256 430 256 430 C256 430 132 360 132 280 L132 140 Z" fill="url(#shield)" opacity="0.9"/>
  <path d="M256 110 L365 155 L365 278 C365 348 256 412 256 412 C256 412 147 348 147 278 L147 155 Z" fill="#0033AA" opacity="0.8"/>
  <!-- Lock body -->
  <rect x="210" y="250" width="92" height="80" rx="10" fill="url(#lock)"/>
  <!-- Lock shackle -->
  <path d="M225 250 L225 215 A 31 31 0 0 1 287 215 L287 250" fill="none" stroke="url(#lock)" stroke-width="16" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="256" cy="282" r="12" fill="#8B6914"/>
  <rect x="250" y="282" width="12" height="20" rx="4" fill="#8B6914"/>
  <!-- Shine -->
