<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040A04"/>
      <stop offset="100%" stop-color="#081408"/>
    </linearGradient>
    <linearGradient id="crt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001A00"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- CRT monitor body -->
  <rect x="68" y="68" width="376" height="300" rx="20" fill="#0A1A0A" stroke="#1A3A1A" stroke-width="3"/>
  <!-- Screen bezel -->
  <rect x="84" y="82" width="344" height="272" rx="14" fill="#050D05"/>
  <!-- CRT screen glow effect -->
  <ellipse cx="256" cy="218" rx="160" ry="130" fill="#001A00" opacity="0.8"/>
  <!-- Terminal content -->
  <text x="104" y="120" font-family="monospace" font-size="14" fill="#33CC33">+--[ CHAR.ART v2.0 ]--+</text>
  <text x="104" y="144" font-family="monospace" font-size="14" fill="#00FF41">|  ___  _   _   _   _  |</text>
  <text x="104" y="168" font-family="monospace" font-size="14" fill="#00CC33">| / __|| |_| |_| |_/ / |</text>
  <text x="104" y="192" font-family="monospace" font-size="14" fill="#00FF41">| \__ \|  _  |  _  \  \|</text>
  <text x="104" y="216" font-family="monospace" font-size="14" fill="#00CC33">| /___/|_| |_|_| |_/_/  |</text>
  <text x="104" y="240" font-family="monospace" font-size="14" fill="#00FF41">|                        |</text>
  <text x="104" y="264" font-family="monospace" font-size="14" fill="#33CC33">+------------------------+</text>
  <text x="104" y="290" font-family="monospace" font-size="14" fill="#00FF41">$ _</text>
  <!-- CRT scanlines effect (subtle) -->
  <line x1="84" y1="95" x2="428" y2="95" stroke="#001400" stroke-width="2"/>
  <line x1="84" y1="107" x2="428" y2="107" stroke="#001400" stroke-width="2"/>
  <line x1="84" y1="119" x2="428" y2="119" stroke="#001400" stroke-width="2"/>
  <!-- Monitor stand -->
  <rect x="222" y="368" width="68" height="30" rx="6" fill="#0A1A0A" stroke="#1A3A1A" stroke-width="2"/>
  <rect x="190" y="396" width="132" height="16" rx="8" fill="#0A1A0A" stroke="#1A3A1A" stroke-width="2"/>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#00FF41" text-anchor="middle">Char.Art</text>
</svg>
