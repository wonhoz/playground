<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon border -->
  <rect x="48" y="48" width="416" height="416" rx="20" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <!-- Big HEX text -->
  <text x="60" y="200" font-family="monospace" font-size="120" font-weight="bold" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3">HEX</text>
  <text x="60" y="200" font-family="monospace" font-size="120" font-weight="bold" fill="#a855f7" opacity="0.15">HEX</text>
  <!-- Central magnifier -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#a855f7" stroke-width="6" filter="url(#neon)"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <!-- Bytes inside magnifier -->
  <text x="200" y="244" font-family="monospace" font-size="28" font-weight="bold" fill="#e0aaff">4D</text>
  <text x="258" y="244" font-family="monospace" font-size="28" font-weight="bold" fill="#c084fc">5A</text>
  <text x="200" y="280" font-family="monospace" font-size="28" font-weight="bold" fill="#c084fc">90</text>
  <text x="258" y="280" font-family="monospace" font-size="28" font-weight="bold" fill="#e0aaff">00</text>
  <!-- Magnifier handle -->
  <line x1="320" y1="320" x2="360" y2="360" stroke="#a855f7" stroke-width="14" stroke-linecap="round" filter="url(#neon)"/>
  <!-- Scanning line -->
  <line x1="64" y1="256" x2="166" y2="256" stroke="#a855f7" stroke-width="2" opacity="0.7" stroke-dasharray="6,4"/>
  <line x1="346" y1="256" x2="448" y2="256" stroke="#a855f7" stroke-width="2" opacity="0.7" stroke-dasharray="6,4"/>
  <!-- Floating hex values -->
  <text x="68" y="140" font-family="monospace" font-size="18" fill="#7c3aed" opacity="0.6">FF A0</text>
  <text x="340" y="140" font-family="monospace" font-size="18" fill="#7c3aed" opacity="0.6">3C 1B</text>
  <text x="68" y="400" font-family="monospace" font-size="18" fill="#7c3aed" opacity="0.6">B2 7E</text>
  <text x="340" y="400" font-family="monospace" font-size="18" fill="#7c3aed" opacity="0.6">0D 4F</text>
</svg>
