<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0011"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC0022"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bug body (large, central) -->
  <ellipse cx="256" cy="220" rx="80" ry="60" fill="url(#badge)"/>
  <ellipse cx="256" cy="190" rx="52" ry="44" fill="#DD2222"/>
  <!-- Head -->
  <circle cx="256" cy="156" r="36" fill="#CC1111"/>
  <!-- Eyes -->
  <circle cx="242" cy="150" r="10" fill="white"/>
  <circle cx="270" cy="150" r="10" fill="white"/>
  <circle cx="245" cy="152" r="5" fill="#111"/>
  <circle cx="273" cy="152" r="5" fill="#111"/>
  <!-- Antennae -->
  <line x1="244" y1="122" x2="228" y2="96" stroke="#FF6666" stroke-width="3" stroke-linecap="round"/>
  <line x1="268" y1="122" x2="284" y2="96" stroke="#FF6666" stroke-width="3" stroke-linecap="round"/>
  <circle cx="228" cy="94" r="5" fill="#FF8888"/>
  <circle cx="284" cy="94" r="5" fill="#FF8888"/>
  <!-- Legs (6) -->
  <line x1="184" y1="200" x2="144" y2="180" stroke="#CC2222" stroke-width="3.5"/>
  <line x1="180" y1="220" x2="136" y2="220" stroke="#CC2222" stroke-width="3.5"/>
  <line x1="184" y1="240" x2="144" y2="260" stroke="#CC2222" stroke-width="3.5"/>
  <line x1="328" y1="200" x2="368" y2="180" stroke="#CC2222" stroke-width="3.5"/>
  <line x1="332" y1="220" x2="376" y2="220" stroke="#CC2222" stroke-width="3.5"/>
  <line x1="328" y1="240" x2="368" y2="260" stroke="#CC2222" stroke-width="3.5"/>
  <!-- X cross on bug -->
  <line x1="220" y1="200" x2="292" y2="260" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="292" y1="200" x2="220" y2="260" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="340" font-family="Arial" font-size="22" fill="#FF4444" text-anchor="middle">CATCH THE BUG</text>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#FF6666" text-anchor="middle">Bug.Hunt</text>
</svg>
