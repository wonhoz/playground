<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 하늘색 -->
  <rect width="1024" height="1024" rx="190" fill="#0288D1"/>

  <!-- 교차 십자 구조 배경 -->
  <!-- 가로 띠 (FUN) -->
  <rect x="215" y="420" width="594" height="184" rx="12" fill="rgba(255,255,255,0.15)"/>
  <!-- 세로 띠 (FAST) -->
  <rect x="390" y="215" width="244" height="594" rx="12" fill="rgba(255,255,255,0.15)"/>

  <!-- 격자 배경 선들 -->
  <line x1="215" y1="215" x2="809" y2="215" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="215" y1="420" x2="809" y2="420" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <line x1="215" y1="604" x2="809" y2="604" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <line x1="215" y1="809" x2="809" y2="809" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="215" y1="215" x2="215" y2="809" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="390" y1="215" x2="390" y2="809" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <line x1="634" y1="215" x2="634" y2="809" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <line x1="809" y1="215" x2="809" y2="809" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>

  <!-- 교차점 강조 (노란 셀) -->
  <rect x="390" y="420" width="244" height="184" rx="8" fill="#FFD600"/>

  <!-- 가로 "FUN" -->
  <text x="302" y="545" font-family="Arial Black" font-size="148" font-weight="bold" fill="white" text-anchor="middle">F</text>
  <!-- 교차점 "U" — 노란 배경 위에 진한 색 -->
  <text x="512" y="545" font-family="Arial Black" font-size="148" font-weight="bold" fill="#0D47A1" text-anchor="middle">U</text>
  <text x="722" y="545" font-family="Arial Black" font-size="148" font-weight="bold" fill="white" text-anchor="middle">N</text>

  <!-- 세로 "FAST" (U 공유) -->
  <text x="512" y="370" font-family="Arial Black" font-size="148" font-weight="bold" fill="white" text-anchor="middle">F</text>
  <!-- U는 이미 표시됨 -->
  <text x="512" y="715" font-family="Arial Black" font-size="148" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="512" y="860" font-family="Arial Black" font-size="148" font-weight="bold" fill="white" text-anchor="middle">N</text>

  <!-- 교차점에서 별이 빛나는 -->
  <text x="455" y="430" font-family="Arial" font-size="52" fill="white" opacity="0.9">✦</text>
  <text x="590" y="430" font-family="Arial" font-size="52" fill="white" opacity="0.9">✦</text>

  <!-- 힌트 번호 -->
  <text x="220" y="255" font-family="Arial" font-size="46" font-weight="bold" fill="rgba(255,255,255,0.7)">1→</text>
  <text x="395" y="255" font-family="Arial" font-size="46" font-weight="bold" fill="rgba(255,255,255,0.7)">2↓</text>
</svg>
