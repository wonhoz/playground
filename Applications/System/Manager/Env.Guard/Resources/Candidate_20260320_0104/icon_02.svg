  <rect x="244" y="244" width="536" height="536" rx="28" fill="#050A05"/>
  <!-- Safe dial -->
  <circle cx="512" cy="512" r="160" fill="#2E7D32" opacity="0.5"/>
  <circle cx="512" cy="512" r="140" fill="none" stroke="#2E7D32" stroke-width="16"/>
  <circle cx="512" cy="512" r="80" fill="#050A05"/>
  <circle cx="512" cy="512" r="55" fill="#2E7D32" opacity="0.4"/>
  <circle cx="512" cy="512" r="28" fill="#81C784" opacity="0.7"/>
  <!-- Dial ticks -->
  <line x1="512" y1="372" x2="512" y2="400" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <line x1="652" y1="512" x2="624" y2="512" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="652" x2="512" y2="624" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <line x1="372" y1="512" x2="400" y2="512" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <!-- Dial pointer -->
  <line x1="512" y1="512" x2="512" y2="400" stroke="#81C784" stroke-width="16" stroke-linecap="round"/>
  <!-- Variable label on safe -->
  <rect x="280" y="740" width="464" height="40" rx="12" fill="#2E7D32" opacity="0.5"/>
  <rect x="300" y="755" width="120" height="10" rx="5" fill="#81C784" opacity="0.6"/>
  <rect x="440" y="755" width="80" height="10" rx="5" fill="#81C784" opacity="0.4"/>
