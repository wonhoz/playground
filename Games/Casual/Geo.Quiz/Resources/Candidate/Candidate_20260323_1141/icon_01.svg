<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 오션 블루 -->
  <rect width="1024" height="1024" rx="180" fill="#0D47A1"/>
  <!-- Layer 2: 세계지도 실루엣 + 핀 -->
  <!-- 대륙 실루엣들 (단순화) -->
  <!-- 북미 -->
  <ellipse cx="260" cy="380" rx="120" ry="140" fill="#43A047" opacity="0.9"/>
  <!-- 남미 -->
  <ellipse cx="300" cy="600" rx="70" ry="100" fill="#388E3C" opacity="0.85"/>
  <!-- 유럽/아프리카 -->
  <ellipse cx="512" cy="380" rx="80" ry="120" fill="#2E7D32" opacity="0.9"/>
  <ellipse cx="512" cy="580" rx="90" ry="130" fill="#388E3C" opacity="0.85"/>
  <!-- 아시아 -->
  <ellipse cx="720" cy="360" rx="150" ry="130" fill="#43A047" opacity="0.9"/>
  <!-- 오세아니아 -->
  <ellipse cx="760" cy="620" rx="80" ry="60" fill="#388E3C" opacity="0.8"/>
  <!-- 지도 핀 (빨간색, 중앙 아시아 위치) -->
  <circle cx="680" cy="310" r="36" fill="#F44336"/>
  <circle cx="680" cy="310" r="20" fill="white"/>
  <!-- 핀 막대 -->
  <line x1="680" y1="346" x2="680" y2="420" stroke="#F44336" stroke-width="12" stroke-linecap="round"/>
  <!-- Layer 3: ? 물음표 (핀 아래) -->
  <text x="512" y="800" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">WHERE?</text>
</svg>
