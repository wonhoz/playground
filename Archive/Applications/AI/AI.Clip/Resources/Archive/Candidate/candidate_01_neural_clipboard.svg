<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow background -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow1)" filter="url(#blur1)"/>
  <!-- Neural network nodes -->
  <circle cx="120" cy="180" r="14" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.7"/>
  <circle cx="120" cy="260" r="14" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.7"/>
  <circle cx="120" cy="340" r="14" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.7"/>
  <circle cx="210" cy="150" r="14" fill="none" stroke="#7c4dff" stroke-width="2.5" opacity="0.8"/>
  <circle cx="210" cy="230" r="14" fill="none" stroke="#7c4dff" stroke-width="2.5" opacity="0.8"/>
  <circle cx="210" cy="310" r="14" fill="none" stroke="#7c4dff" stroke-width="2.5" opacity="0.8"/>
  <circle cx="210" cy="370" r="14" fill="none" stroke="#7c4dff" stroke-width="2.5" opacity="0.8"/>
  <!-- Neural connections left layer -->
  <line x1="134" y1="180" x2="196" y2="150" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="180" x2="196" y2="230" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="260" x2="196" y2="230" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="260" x2="196" y2="310" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="340" x2="196" y2="310" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="340" x2="196" y2="370" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Clipboard body -->
  <rect x="220" y="140" width="172" height="232" rx="12" fill="none" stroke="url(#clipGrad)" stroke-width="3"/>
  <rect x="220" y="140" width="172" height="232" rx="12" fill="#ffffff" fill-opacity="0.04"/>
  <!-- Clipboard clip top -->
  <rect x="276" y="128" width="60" height="28" rx="8" fill="none" stroke="url(#clipGrad)" stroke-width="3"/>
  <rect x="286" y="133" width="40" height="18" rx="5" fill="#7c4dff" fill-opacity="0.5"/>
  <!-- Lines on clipboard -->
  <line x1="244" y1="195" x2="368" y2="195" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
  <line x1="244" y1="225" x2="368" y2="225" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
  <line x1="244" y1="255" x2="340" y2="255" stroke="#7c4dff" stroke-width="2" opacity="0.6"/>
  <line x1="244" y1="285" x2="350" y2="285" stroke="#7c4dff" stroke-width="2" opacity="0.6"/>
  <line x1="244" y1="315" x2="330" y2="315" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
  <!-- AI spark dots on clipboard -->
  <circle cx="350" cy="340" r="5" fill="#00e5ff" opacity="0.9"/>
  <circle cx="340" cy="330" r="3" fill="#7c4dff" opacity="0.8"/>
  <circle cx="362" cy="328" r="4" fill="#00e5ff" opacity="0.7"/>
  <!-- Connecting lines from neural to clipboard -->
  <line x1="224" y1="230" x2="210" y2="230" stroke="#7c4dff" stroke-width="2" opacity="0.6"/>
  <line x1="224" y1="260" x2="210" y2="260" stroke="#7c4dff" stroke-width="2" opacity="0.3"/>
  <!-- Highlight rim -->
  <rect x="220" y="140" width="172" height="3" rx="1.5" fill="#00e5ff" opacity="0.5"/>
</svg>