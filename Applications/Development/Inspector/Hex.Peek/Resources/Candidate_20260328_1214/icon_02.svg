<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="20%" y1="15%" x2="80%" y2="85%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#90CAF9" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow02">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0D47A1" flood-opacity="0.45"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg02)" rx="120"/>

  <!-- Layer 2: Magnifying glass -->
  <g filter="url(#shadow02)">
    <!-- Lens circle -->
    <circle cx="460" cy="440" r="290" fill="url(#glassGrad)" stroke="white" stroke-width="52"/>
    <!-- Handle -->
    <line x1="685" y1="665" x2="870" y2="850" stroke="white" stroke-width="72" stroke-linecap="round"/>
    <!-- Handle grip end -->
    <circle cx="870" cy="850" r="44" fill="white" opacity="0.6"/>
  </g>

  <!-- Layer 3: 0xFF text inside lens -->
  <text x="460" y="390" font-family="monospace" font-size="96" font-weight="bold" fill="#1565C0" text-anchor="middle" dominant-baseline="middle" filter="url(#textGlow)">0xFF</text>
  <text x="460" y="490" font-family="monospace" font-size="72" font-weight="bold" fill="#1976D2" text-anchor="middle" dominant-baseline="middle">4A 3C</text>
  <text x="460" y="570" font-family="monospace" font-size="56" fill="#42A5F5" text-anchor="middle" dominant-baseline="middle" opacity="0.8">0D 2C B8</text>

  <!-- Shine on lens -->
  <ellipse cx="370" cy="310" rx="90" ry="55" fill="rgba(255,255,255,0.45)" transform="rotate(-30 370 310)"/>

  <!-- "PEEK" label bottom -->
  <text x="512" y="910" font-family="Arial,sans-serif" font-size="110" font-weight="900" fill="white" text-anchor="middle" opacity="0.92">PEEK</text>
</svg>
