<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
    <linearGradient id="penBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon drawing strokes on canvas -->
  <path d="M90,380 Q140,260 220,200 Q300,140 380,160" fill="none" stroke="#00ffcc" stroke-width="5" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <path d="M90,380 Q140,260 220,200 Q300,140 380,160" fill="none" stroke="#00ffcc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M110,420 Q200,360 280,340 Q360,320 420,360" fill="none" stroke="#ff00aa" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <path d="M150,200 Q200,170 250,190 Q300,210 320,180" fill="none" stroke="#aa00ff" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <!-- Pen tool (stylus) -->
  <g transform="translate(380,90) rotate(-30)">
    <!-- Pen body -->
    <rect x="-12" y="-100" width="24" height="80" rx="8" fill="url(#penBody)"/>
    <rect x="-10" y="-105" width="20" height="15" rx="4" fill="#444"/>
    <!-- Pen clip -->
    <rect x="10" y="-100" width="5" height="70" rx="2" fill="#00ffcc" opacity="0.8"/>
    <!-- Nib -->
    <polygon points="-12,-20 12,-20 4,20 -4,20" fill="#666"/>
    <polygon points="-4,20 4,20 1,38 -1,38" fill="#00ffcc" opacity="0.9"/>
    <!-- Glow at tip -->
    <circle cx="0" cy="42" r="10" fill="#00ffcc" opacity="0.4" filter="url(#glow)"/>
  </g>
  <!-- Cast indicator (wifi symbol) -->
  <path d="M200,460 Q256,440 312,460" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M220,440 Q256,425 292,440" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <circle cx="256" cy="425" r="6" fill="#00ffcc" opacity="0.8"/>
  <!-- Screen glow dots -->
  <circle cx="180" cy="180" r="3" fill="#00ffcc" opacity="0.5"/>
  <circle cx="320" cy="340" r="3" fill="#ff00aa" opacity="0.5"/>
  <circle cx="420" cy="370" r="3" fill="#aa00ff" opacity="0.5"/>
</svg>
