<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a00"/>
      <stop offset="100%" stop-color="#001200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Matrix rain: falling numbers -->
  <!-- Column 1 -->
  <text x="68" y="90" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">7</text>
  <text x="68" y="115" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">3</text>
  <text x="68" y="140" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">+</text>
  <text x="68" y="165" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534" opacity="0.4">2</text>
  <text x="68" y="190" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.3">9</text>
  <text x="68" y="215" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">4</text>
  <!-- Column 2 -->
  <text x="110" y="140" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">×</text>
  <text x="110" y="165" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">8</text>
  <text x="110" y="190" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">π</text>
  <text x="110" y="215" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534" opacity="0.4">1</text>
  <text x="110" y="240" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.3">÷</text>
  <!-- Column 3 -->
  <text x="152" y="80" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">√</text>
  <text x="152" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">5</text>
  <text x="152" y="130" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">-</text>
  <text x="152" y="155" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534" opacity="0.4">6</text>
  <text x="152" y="180" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.3">2</text>
  <!-- Column 4 -->
  <text x="360" y="100" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">∑</text>
  <text x="360" y="125" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">4</text>
  <text x="360" y="150" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">^</text>
  <text x="360" y="175" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534" opacity="0.4">9</text>
  <!-- Column 5 -->
  <text x="402" y="70" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">∞</text>
  <text x="402" y="95" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">3</text>
  <text x="402" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">%</text>
  <text x="402" y="145" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534" opacity="0.4">7</text>
  <!-- Column 6 -->
  <text x="444" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="#22C55E" opacity="0.9">÷</text>
  <text x="444" y="145" text-anchor="middle" font-family="monospace" font-size="14" fill="#16A34A" opacity="0.7">2</text>
  <text x="444" y="170" text-anchor="middle" font-family="monospace" font-size="14" fill="#15803D" opacity="0.5">±</text>
  <!-- Center calculation display -->
  <rect x="160" y="210" width="192" height="130" rx="10" fill="#001200" stroke="#22C55E" stroke-width="2"/>
  <text x="256" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#22C55E" opacity="0.6">357 × 12</text>
  <line x1="175" y1="255" x2="337" y2="255" stroke="#22C55E" stroke-width="1.5" opacity="0.5"/>
  <text x="256" y="282" text-anchor="middle" font-family="monospace" font-size="26" fill="#4ADE80" font-weight="bold">4,284</text>
  <text x="256" y="326" text-anchor="middle" font-family="monospace" font-size="9" fill="#16A34A">=  4.284 × 10³</text>
  <!-- Bottom falling numbers -->
  <text x="68" y="380" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">5</text>
  <text x="68" y="405" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.15">×</text>
  <text x="110" y="370" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">9</text>
  <text x="360" y="360" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">=</text>
  <text x="402" y="390" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">+</text>
  <text x="444" y="370" text-anchor="middle" font-family="monospace" font-size="14" fill="#14532D" opacity="0.2">6</text>
</svg>
