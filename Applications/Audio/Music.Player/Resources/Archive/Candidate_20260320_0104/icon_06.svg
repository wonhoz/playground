<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Staff lines (5 horizontal) -->
  <line x1="160" y1="500" x2="864" y2="500" stroke="#3F51B5" stroke-width="12"/>
  <line x1="160" y1="560" x2="864" y2="560" stroke="#3F51B5" stroke-width="12"/>
  <line x1="160" y1="620" x2="864" y2="620" stroke="#3F51B5" stroke-width="12"/>
  <line x1="160" y1="440" x2="864" y2="440" stroke="#3F51B5" stroke-width="12"/>
  <line x1="160" y1="380" x2="864" y2="380" stroke="#3F51B5" stroke-width="12"/>
  <!-- Conductor baton -->
  <line x1="280" y1="200" x2="680" y2="560" stroke="#7986CB" stroke-width="20" stroke-linecap="round"/>
  <!-- Baton tip (white ball) -->
  <circle cx="285" cy="195" r="22" fill="#7986CB"/>
  <!-- Baton handle -->
  <rect x="665" y="548" width="60" height="28" rx="14" fill="#3F51B5"/>
  <!-- Motion arc -->
  <path d="M200 280 Q420 160 640 280" stroke="#7986CB" stroke-width="10" fill="none" stroke-dasharray="20,12" opacity="0.6"/>
</svg>