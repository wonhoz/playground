<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 (황금-앰버 방사 그라데이션) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>

  <!-- Layer 2: 4×4 컬러풀 픽셀 격자 (이미지 업스케일 추상 표현) -->
  <!-- Row 0: Cool blues/cyans (sky) -->
  <rect x="228" y="228" width="141" height="141" fill="#00E5FF"/>
  <rect x="369" y="228" width="141" height="141" fill="#00B0FF"/>
  <rect x="510" y="228" width="141" height="141" fill="#2979FF"/>
  <rect x="651" y="228" width="141" height="141" fill="#651FFF"/>
  <!-- Row 1: Greens/warm (foliage) -->
  <rect x="228" y="369" width="141" height="141" fill="#00E676"/>
  <rect x="369" y="369" width="141" height="141" fill="#FFEA00"/>
  <rect x="510" y="369" width="141" height="141" fill="#FFC400"/>
  <rect x="651" y="369" width="141" height="141" fill="#FF6D00"/>
  <!-- Row 2: Hot reds/pinks/purples -->
  <rect x="228" y="510" width="141" height="141" fill="#FF1744"/>
  <rect x="369" y="510" width="141" height="141" fill="#F50057"/>
  <rect x="510" y="510" width="141" height="141" fill="#D500F9"/>
  <rect x="651" y="510" width="141" height="141" fill="#7C4DFF"/>
  <!-- Row 3: Limes/golds/oranges -->
  <rect x="228" y="651" width="141" height="141" fill="#AEEA00"/>
  <rect x="369" y="651" width="141" height="141" fill="#C6FF00"/>
  <rect x="510" y="651" width="141" height="141" fill="#FFD600"/>
  <rect x="651" y="651" width="141" height="141" fill="#DD2C00"/>

  <!-- Layer 3: 방사되는 픽셀 파티클 (격자에서 피어나는 세부 디테일) -->
  <circle cx="190" cy="196" r="24" fill="#00E5FF"/>
  <circle cx="405" cy="184" r="20" fill="#00B0FF"/>
  <circle cx="710" cy="190" r="22" fill="#651FFF"/>
  <circle cx="836" cy="350" r="18" fill="#F50057"/>
  <circle cx="840" cy="590" r="24" fill="#FF1744"/>
  <circle cx="740" cy="824" r="20" fill="#DD2C00"/>
  <circle cx="510" cy="840" r="22" fill="#FFD600"/>
  <circle cx="310" cy="828" r="18" fill="#AEEA00"/>
  <circle cx="174" cy="726" r="24" fill="#00E676"/>
  <circle cx="168" cy="490" r="20" fill="#2979FF"/>
</svg>
