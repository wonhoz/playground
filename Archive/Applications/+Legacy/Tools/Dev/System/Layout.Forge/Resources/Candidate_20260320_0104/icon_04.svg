<!-- Layout.Forge icon_04: 십자선 정렬 (crosshair alignment) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Crosshair circle -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#3949AB" stroke-width="36"/>
  <circle cx="512" cy="512" r="100" fill="none" stroke="#5C6BC0" stroke-width="28"/>
  <circle cx="512" cy="512" r="22" fill="#5C6BC0"/>
  <!-- Horizontal line -->
  <line x1="160" y1="512" x2="360" y2="512" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round"/>
  <line x1="664" y1="512" x2="864" y2="512" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round"/>
  <!-- Vertical line -->
  <line x1="512" y1="160" x2="512" y2="360" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="664" x2="512" y2="864" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round"/>
</svg>
