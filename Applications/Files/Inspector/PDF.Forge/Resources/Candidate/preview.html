<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF.Forge - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    color: #FF4444;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: #252525;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: #FF4444;
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 12px;
    color: #ccc;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>PDF.Forge</h1>
<p class="subtitle">PDF 생성·편집 도구 — Icon Candidates (10)</p>
<div class="grid">
  <div class="card">
    <img src="candidate_01_forge_document.svg" alt="01 forge_document">
    <div class="card-num">#01</div>
    <div class="card-name">forge_document</div>
  </div>
  <div class="card">
    <img src="candidate_02_red_official.svg" alt="02 red_official">
    <div class="card-num">#02</div>
    <div class="card-name">red_official</div>
  </div>
  <div class="card">
    <img src="candidate_03_blueprint_tech.svg" alt="03 blueprint_tech">
    <div class="card-num">#03</div>
    <div class="card-name">blueprint_tech</div>
  </div>
  <div class="card">
    <img src="candidate_04_molten_pdf.svg" alt="04 molten_pdf">
    <div class="card-num">#04</div>
    <div class="card-name">molten_pdf</div>
  </div>
  <div class="card">
    <img src="candidate_05_crystal_doc.svg" alt="05 crystal_doc">
    <div class="card-num">#05</div>
    <div class="card-name">crystal_doc</div>
  </div>
  <div class="card">
    <img src="candidate_06_dark_minimal.svg" alt="06 dark_minimal">
    <div class="card-num">#06</div>
    <div class="card-name">dark_minimal</div>
  </div>
  <div class="card">
    <img src="candidate_07_paper_stack.svg" alt="07 paper_stack">
    <div class="card-num">#07</div>
    <div class="card-name">paper_stack</div>
  </div>
  <div class="card">
    <img src="candidate_08_neon_pdf.svg" alt="08 neon_pdf">
    <div class="card-num">#08</div>
    <div class="card-name">neon_pdf</div>
  </div>
  <div class="card">
    <img src="candidate_09_gold_seal.svg" alt="09 gold_seal">
    <div class="card-num">#09</div>
    <div class="card-name">gold_seal</div>
  </div>
  <div class="card">
    <img src="candidate_10_gradient_modern.svg" alt="10 gradient_modern">
    <div class="card-num">#10</div>
    <div class="card-name">gradient_modern</div>
  </div>
</div>
</body>
</html>
