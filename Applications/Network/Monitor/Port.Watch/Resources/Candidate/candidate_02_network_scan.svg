<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="100%" style="stop-color:#0F1923"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF87"/>
      <stop offset="100%" style="stop-color:#60EFFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network pulse wave -->
  <polyline points="60,256 110,256 140,160 170,352 200,210 230,300 260,256 310,256 340,180 370,330 400,256 452,256" fill="none" stroke="url(#pulse)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Port labels -->
  <rect x="80" y="350" width="70" height="28" rx="6" fill="#00FF87" opacity="0.15" stroke="#00FF87" stroke-width="1.5"/>
  <text x="115" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FF87">:80</text>
  <rect x="175" y="350" width="70" height="28" rx="6" fill="#60EFFF" opacity="0.15" stroke="#60EFFF" stroke-width="1.5"/>
  <text x="210" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#60EFFF">:443</text>
  <rect x="270" y="350" width="70" height="28" rx="6" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="305" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF6B6B">:8080</text>
  <rect x="365" y="350" width="70" height="28" rx="6" fill="#00FF87" opacity="0.15" stroke="#00FF87" stroke-width="1.5"/>
  <text x="400" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FF87">:22</text>
  <!-- Active indicator -->
  <circle cx="256" cy="140" r="10" fill="#00FF87"/>
  <circle cx="256" cy="140" r="20" fill="none" stroke="#00FF87" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="140" r="30" fill="none" stroke="#00FF87" stroke-width="1" opacity="0.3"/>
</svg>
