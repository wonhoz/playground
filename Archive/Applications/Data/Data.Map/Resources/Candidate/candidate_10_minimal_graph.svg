<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="line_g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f72585"/>
      <stop offset="100%" stop-color="#ff9e00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chart area background -->
  <rect x="72" y="80" width="368" height="280" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5"/>
  <!-- Grid lines subtle -->
  <line x1="72" y1="150" x2="440" y2="150" stroke="#e9ecef" stroke-width="1"/>
  <line x1="72" y1="220" x2="440" y2="220" stroke="#e9ecef" stroke-width="1"/>
  <line x1="72" y1="290" x2="440" y2="290" stroke="#e9ecef" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="60" y="154" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="end">75</text>
  <text x="60" y="224" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="end">50</text>
  <text x="60" y="294" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="end">25</text>
  <text x="60" y="364" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="end">0</text>
  <!-- Bars -->
  <rect x="96" y="220" width="36" height="140" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <rect x="152" y="180" width="36" height="180" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <rect x="208" y="152" width="36" height="208" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <rect x="264" y="170" width="36" height="190" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <rect x="320" y="130" width="36" height="230" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <rect x="376" y="108" width="36" height="252" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <!-- Line chart overlay -->
  <polyline points="114,230 170,195 226,165 282,178 338,145 394,120" fill="none" stroke="url(#line_g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="114" cy="230" r="5" fill="#f72585"/>
  <circle cx="170" cy="195" r="5" fill="#f72585"/>
  <circle cx="226" cy="165" r="5" fill="#f72585"/>
  <circle cx="282" cy="178" r="5" fill="#f72585"/>
  <circle cx="338" cy="145" r="5" fill="#f72585"/>
  <circle cx="394" cy="120" r="5" fill="#f72585"/>
  <!-- X axis labels -->
  <text x="114" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Jan</text>
  <text x="170" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Feb</text>
  <text x="226" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Mar</text>
  <text x="282" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Apr</text>
  <text x="338" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">May</text>
  <text x="394" y="378" font-family="Arial, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Jun</text>
  <!-- Bottom axis line -->
  <line x1="72" y1="360" x2="440" y2="360" stroke="#adb5bd" stroke-width="2"/>
  <!-- Title area -->
  <text x="256" y="428" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#4361ee" text-anchor="middle" letter-spacing="2">DATA MAP</text>
  <text x="256" y="458" font-family="Arial, sans-serif" font-size="13" fill="#6c757d" text-anchor="middle">Analytics Dashboard</text>
  <!-- Legend -->
  <rect x="170" y="470" width="14" height="14" rx="3" fill="url(#bar1)"/>
  <text x="190" y="482" font-family="Arial, sans-serif" font-size="11" fill="#495057">Volume</text>
  <line x1="240" y1="477" x2="262" y2="477" stroke="#f72585" stroke-width="3"/>
  <circle cx="251" cy="477" r="4" fill="#f72585"/>
  <text x="270" y="482" font-family="Arial, sans-serif" font-size="11" fill="#495057">Trend</text>
</svg>
