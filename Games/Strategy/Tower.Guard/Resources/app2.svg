<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0d33"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a8a9a"/>
      <stop offset="100%" stop-color="#4a4a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6030" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6030" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Castle main body -->
  <rect x="140" y="240" width="232" height="180" rx="4" fill="url(#stone)"/>
  <!-- Left tower -->
  <rect x="100" y="180" width="90" height="240" rx="4" fill="url(#stone)"/>
  <rect x="90" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
  <rect x="126" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
  <rect x="162" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
  <!-- Right tower -->
  <rect x="322" y="180" width="90" height="240" rx="4" fill="url(#stone)"/>
  <rect x="312" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
  <rect x="348" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
  <rect x="384" y="155" width="28" height="50" rx="4" fill="url(#stone)"/>
