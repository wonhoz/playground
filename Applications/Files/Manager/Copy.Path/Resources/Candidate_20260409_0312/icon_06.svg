<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c6"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Sky blue gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g6)"/>
  <g clip-path="url(#c6)">
    <!-- Layer 2: Explorer window shell -->
    <rect x="140" y="258" width="744" height="510" rx="28" fill="white"/>
    <!-- Title bar -->
    <rect x="140" y="258" width="744" height="66" rx="28" fill="#0369A1"/>
    <rect x="140" y="290" width="744" height="34" fill="#0369A1"/>
    <!-- Window control dots -->
    <circle cx="190" cy="291" r="14" fill="#EF4444"/>
    <circle cx="232" cy="291" r="14" fill="#FBBF24"/>
    <circle cx="274" cy="291" r="14" fill="#22C55E"/>
    <!-- Layer 3: Address bar (primary content) -->
    <rect x="168" y="344" width="688" height="90" rx="18" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="6"/>
    <!-- Chevron breadcrumb indicator -->
    <text x="190" y="416" font-family="Arial,sans-serif" font-size="80" fill="#0369A1" font-weight="bold">&#x276F;</text>
    <!-- Path text in address bar -->
    <text x="258" y="416" font-family="Consolas,monospace" font-size="80" fill="#0369A1" font-weight="bold">C:\Users\</text>
    <!-- Orange "Copy" button -->
    <rect x="168" y="456" width="688" height="90" rx="16" fill="#F97316"/>
    <text x="512" y="518" font-family="Arial,sans-serif" font-size="82" fill="white" font-weight="bold" text-anchor="middle">Copy Path</text>
    <!-- Format rows -->
    <rect x="168" y="560" width="688" height="84" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="4"/>
    <text x="196" y="620" font-family="Consolas,monospace" font-size="80" fill="#059669" font-weight="bold">/home/usr</text>
    <rect x="168" y="654" width="688" height="84" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="4"/>
    <text x="196" y="714" font-family="Consolas,monospace" font-size="80" fill="#7C3AED" font-weight="bold">file:///C:/</text>
  </g>
</svg>
