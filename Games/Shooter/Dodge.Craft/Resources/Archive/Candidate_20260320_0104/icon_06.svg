<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Two items combining -->
  <!-- Item A (gear) -->
  <circle cx="300" cy="420" r="80" fill="none" stroke="#33691E" stroke-width="16"/>
  <circle cx="300" cy="420" r="40" fill="#33691E"/>
  <!-- Gear teeth A -->
  <rect x="284" y="320" width="32" height="40" rx="4" fill="#33691E"/>
  <rect x="284" y="480" width="32" height="40" rx="4" fill="#33691E"/>
  <rect x="200" y="404" width="40" height="32" rx="4" fill="#33691E"/>
  <rect x="360" y="404" width="40" height="32" rx="4" fill="#33691E"/>
  <!-- Item B (bullet) -->
  <ellipse cx="724" cy="420" rx="50" ry="70" fill="#AED581"/>
  <polygon points="674,420 724,320 774,420" fill="#AED581"/>
  <!-- Combine arrows -->
  <polygon points="420,410 520,370 520,390 580,390 580,370 680,410 580,450 580,430 520,430 520,450" fill="#AED581"/>
  <!-- Shield result -->
  <polygon points="512,560 640,610 640,700 512,760 384,700 384,610" fill="#33691E" stroke="#AED581" stroke-width="8"/>
  <polygon points="512,595 612,635 612,695 512,740 412,695 412,635" fill="none" stroke="#AED581" stroke-width="4"/>
</svg>
