<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 딥 인디고 배경 -->
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <!-- 초록 배지 -->
    <radialGradient id="green05" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </radialGradient>
    <!-- 커서 그라데이션 -->
    <linearGradient id="cursor05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 딥 인디고 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: 초록 활동 파동 (마우스 움직임 = 활동 시그널) -->
  <circle cx="430" cy="550" r="330" fill="none" stroke="#22C55E" stroke-width="10" opacity="0.10"/>
  <circle cx="430" cy="550" r="252" fill="none" stroke="#22C55E" stroke-width="14" opacity="0.18"/>
  <circle cx="430" cy="550" r="174" fill="none" stroke="#22C55E" stroke-width="20" opacity="0.30"/>
  <circle cx="430" cy="550" r="96"  fill="none" stroke="#22C55E" stroke-width="28" opacity="0.46"/>

  <!-- 마우스 커서 (흰색 화살표 포인터, 약간 우측으로 기울어진 자세) -->
  <!-- 표준 마우스 포인터 경로 (좌상단 기준점) -->
  <path d="M 300 240 L 300 680 L 444 520 L 572 756 L 652 714 L 524 480 L 700 480 Z"
        fill="url(#cursor05)" stroke="#312E81" stroke-width="16" stroke-linejoin="round"/>

  <!-- 커서 이동 흔적 (점선 궤적 — 활동 시뮬레이션 표시) -->
  <line x1="220" y1="800" x2="300" y2="680"
        stroke="#6366F1" stroke-width="10" stroke-dasharray="18 12" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="880" x2="220" y2="800"
        stroke="#6366F1" stroke-width="8" stroke-dasharray="14 10" stroke-linecap="round" opacity="0.35"/>

  <!-- Layer 3: 우측 상단 — 메신저 채팅 버블 + Online 초록 점 -->
  <!-- 채팅 버블 -->
  <rect x="616" y="185" width="218" height="142" rx="34" fill="white" opacity="0.92"/>
  <!-- 버블 꼬리 -->
  <path d="M 656 327 L 636 394 L 730 344" fill="white" opacity="0.92"/>
  <!-- 버블 안 텍스트 줄 (메신저 메시지 표현) -->
  <rect x="640" y="218" width="130" height="20" rx="10" fill="#C7D2FE" opacity="0.7"/>
  <rect x="640" y="252" width="96" height="20" rx="10" fill="#C7D2FE" opacity="0.5"/>
  <rect x="640" y="286" width="116" height="20" rx="10" fill="#C7D2FE" opacity="0.5"/>

  <!-- Online 상태 도트 (채팅 버블 우측하단 — 항상 초록) -->
  <!-- 배경 링 (아이콘 테두리) -->
  <circle cx="802" cy="304" r="54" fill="#312E81"/>
  <!-- 초록 Active 도트 -->
  <circle cx="802" cy="304" r="44" fill="url(#green05)"/>
  <circle cx="788" cy="290" r="16" fill="#86EFAC" opacity="0.45"/>
</svg>
