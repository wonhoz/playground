<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Dark navy -->
  <rect width="1024" height="1024" rx="190" fill="#1A1A2E"/>

  <!-- Stars (dots) in sky -->
  <text x="260" y="300" font-family="'Courier New', monospace" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.6)">.</text>
  <text x="380" y="255" font-family="'Courier New', monospace" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.5)">.</text>
  <text x="500" y="230" font-family="'Courier New', monospace" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.7)">.</text>
  <text x="640" y="250" font-family="'Courier New', monospace" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.5)">.</text>
  <text x="765" y="280" font-family="'Courier New', monospace" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.6)">.</text>
  <text x="310" y="340" font-family="'Courier New', monospace" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.4)">.</text>
  <text x="720" y="330" font-family="'Courier New', monospace" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.4)">.</text>

  <!-- Mountain silhouette: right large peak -->
  <!-- ASCII chars form the mountain (bright at top, dark at bottom) -->

  <!-- Summit area (very bright) -->
  <text x="512" y="395" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="#00FF88">@</text>

  <!-- Upper mountain body -->
  <text x="430" y="478" font-family="'Courier New', monospace" font-size="75" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.92)">@#@</text>
  <text x="595" y="478" font-family="'Courier New', monospace" font-size="75" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.90)">#@#</text>

  <!-- Middle mountain -->
  <text x="355" y="560" font-family="'Courier New', monospace" font-size="70" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.78)">##$</text>
  <text x="512" y="560" font-family="'Courier New', monospace" font-size="70" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.80)">@#$@</text>
  <text x="668" y="560" font-family="'Courier New', monospace" font-size="70" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.76)">$#@</text>

  <!-- Lower mountain -->
  <text x="280" y="638" font-family="'Courier New', monospace" font-size="65" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.60)">$$$</text>
  <text x="512" y="638" font-family="'Courier New', monospace" font-size="65" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.65)">##$@##</text>
  <text x="744" y="638" font-family="'Courier New', monospace" font-size="65" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.58)">$$$</text>

  <!-- Base of mountain -->
  <text x="215" y="712" font-family="'Courier New', monospace" font-size="58" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.42)">@@</text>
  <text x="512" y="712" font-family="'Courier New', monospace" font-size="58" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.48)">$@#$$@#$</text>
  <text x="810" y="712" font-family="'Courier New', monospace" font-size="58" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.40)">@@</text>

  <!-- Ground row (dark) -->
  <text x="512" y="778" font-family="'Courier New', monospace" font-size="52" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.25)">.........</text>

  <!-- Bottom label -->
  <text x="512" y="870" font-family="'Courier New', monospace" font-size="72" font-weight="900"
        text-anchor="middle" fill="rgba(0,255,136,0.75)">Char.Art</text>
</svg>
