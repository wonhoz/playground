<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080820"/>
      <stop offset="100%" stop-color="#101030"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF6B9D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#45B7D1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#45B7D1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F9CA24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F9CA24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Watercolor blobs -->
  <ellipse cx="180" cy="200" rx="120" ry="100" fill="url(#blob1)"/>
  <ellipse cx="320" cy="220" rx="130" ry="110" fill="url(#blob2)"/>
  <ellipse cx="256" cy="300" rx="110" ry="90" fill="url(#blob3)"/>
  <!-- Characters on top of blobs -->
  <text x="130" y="172" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.9">@</text>
  <text x="172" y="210" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.85">#</text>
  <text x="215" y="178" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.9">$</text>
  <text x="270" y="190" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.85">%</text>
  <text x="310" y="165" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.9">&amp;</text>
  <text x="355" y="205" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.85">*</text>
  <text x="200" y="260" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.9">!</text>
  <text x="248" y="295" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.85">^</text>
  <text x="296" y="270" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.9">~</text>
  <text x="340" y="300" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.85">+</text>
  <!-- Title area -->
  <text x="256" y="392" font-family="Arial" font-size="20" fill="#F9CA24" text-anchor="middle">Character Canvas</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF6B9D" text-anchor="middle">Char.Art</text>
</svg>
