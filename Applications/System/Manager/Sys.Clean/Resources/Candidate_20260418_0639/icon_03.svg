<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 3종 배지 격자 -->
  <!-- Temp 배지 -->
  <rect x="160" y="190" width="300" height="240" rx="24" fill="#00838F"/>
  <text x="310" y="290" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">🗑️</text>
  <text x="310" y="370" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">Temp</text>
  <!-- Cache 배지 -->
  <rect x="564" y="190" width="300" height="240" rx="24" fill="#006064"/>
  <text x="714" y="290" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">⚡</text>
  <text x="714" y="370" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">Cache</text>
  <!-- Registry 배지 (중앙 아래, 큼) -->
  <rect x="312" y="490" width="400" height="240" rx="24" fill="#004D40"/>
  <text x="512" y="592" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">🔑</text>
  <text x="512" y="672" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="#80CBC4" text-anchor="middle">Registry</text>
  <!-- Layer 3: 연결 화살표들 -->
  <line x1="460" y1="310" x2="564" y2="310" stroke="#B2EBF2" stroke-width="10" stroke-dasharray="14,8" stroke-linecap="round"/>
  <line x1="310" y1="430" x2="420" y2="490" stroke="#B2EBF2" stroke-width="10" stroke-dasharray="14,8" stroke-linecap="round"/>
  <line x1="714" y1="430" x2="604" y2="490" stroke="#B2EBF2" stroke-width="10" stroke-dasharray="14,8" stroke-linecap="round"/>
  <!-- 체크 오버레이들 -->
  <circle cx="450" cy="230" r="36" fill="#4CAF50"/>
  <text x="450" y="248" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">✓</text>
  <circle cx="574" cy="230" r="36" fill="#4CAF50"/>
  <text x="574" y="248" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">✓</text>
</svg>
