<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
    <linearGradient id="frame3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Layer 2: Image frame -->
  <rect x="148" y="148" width="728" height="560" rx="28" fill="url(#frame3)"/>
  <!-- Inner image area -->
  <rect x="178" y="178" width="668" height="500" rx="18" fill="white" opacity="0.15"/>
  <!-- Landscape inside frame -->
  <rect x="178" y="178" width="668" height="280" fill="#F48FB1" opacity="0.4"/>
  <!-- Sun -->
  <circle cx="360" cy="290" r="70" fill="#FFD600"/>
  <!-- Ground -->
  <path d="M178,390 L260,310 L360,360 L460,280 L560,340 L660,290 L846,380 L846,678 L178,678 Z" fill="#AD1457" opacity="0.5"/>

  <!-- Center scale label -->
  <rect x="148" y="680" width="728" height="196" rx="28" fill="white" opacity="0.9"/>

  <!-- Layer 3: Scale factors -->
  <text x="248" y="798" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#F06292" text-anchor="middle">2×</text>
  <text x="512" y="798" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#E91E63" text-anchor="middle">4×</text>
  <text x="776" y="798" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#880E4F" text-anchor="middle">8×</text>

  <!-- Stars/sparkles on image -->
  <circle cx="700" cy="220" r="18" fill="#FFD600"/>
  <circle cx="740" cy="260" r="12" fill="white"/>
  <circle cx="680" cy="260" r="10" fill="#FFD600"/>
  <text x="700" y="380" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">AI</text>
</svg>
