<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <filter id="shadow02" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000025"/>
    </filter>
    <radialGradient id="green02" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: 라벤더 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: 채팅 말풍선 (메신저 UI) -->
  <rect x="118" y="195" width="660" height="380" rx="72" fill="white" filter="url(#shadow02)"/>
  <!-- 말풍선 꼬리 -->
  <path d="M 210 575 L 168 768 L 406 628" fill="white"/>

  <!-- 말풍선 안 "Away" 텍스트 (회색 — 비활성 상태) -->
  <text x="448" y="430" text-anchor="middle"
        font-family="'Segoe UI Black','Arial Black',sans-serif"
        font-size="156" font-weight="900" fill="#CBD5E1">Away</text>

  <!-- Layer 3: 굵은 빨간 취소 사선 (Away 차단) -->
  <!-- 사선 1 (좌상→우하) — Away 텍스트 가로지름 -->
  <line x1="118" y1="250" x2="778" y2="540"
        stroke="#EF4444" stroke-width="76" stroke-linecap="round"/>

  <!-- 우측 하단 초록 Active 배지 (Online 상태 유지) -->
  <!-- 흰 테두리 링 -->
  <circle cx="800" cy="690" r="146" fill="white"/>
  <!-- 초록 배지 -->
  <circle cx="800" cy="690" r="122" fill="url(#green02)"/>
  <!-- 내부 하이라이트 -->
  <circle cx="775" cy="665" r="50" fill="#86EFAC" opacity="0.4"/>
</svg>
