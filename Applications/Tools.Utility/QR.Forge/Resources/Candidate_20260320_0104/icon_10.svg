<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 3D QR 큐브 - 등축투영 -->
  <!-- 왼쪽 면 -->
  <polygon points="512,240 240,400 240,720 512,560" fill="#0A180A"/>
  <!-- 오른쪽 면 -->
  <polygon points="512,240 784,400 784,720 512,560" fill="#1B5E20"/>
  <!-- 위쪽 면 -->
  <polygon points="512,240 240,400 512,560 784,400" fill="#2E7D32"/>
  <!-- QR 도트 왼쪽 면 -->
  <rect x="272" y="440" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(30)"/>
  <rect x="320" y="416" width="36" height="36" rx="4" fill="#1B5E20" transform="skewY(30)"/>
  <rect x="368" y="444" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(30)"/>
  <rect x="272" y="496" width="36" height="36" rx="4" fill="#1B5E20" transform="skewY(30)"/>
  <rect x="368" y="500" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(30)"/>
  <rect x="272" y="552" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(30)"/>
  <rect x="320" y="528" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(30)"/>
  <!-- QR 도트 오른쪽 면 -->
  <rect x="560" y="440" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(-30)"/>
  <rect x="608" y="416" width="36" height="36" rx="4" fill="#2E7D32" transform="skewY(-30)"/>
  <rect x="656" y="444" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(-30)"/>
  <rect x="560" y="496" width="36" height="36" rx="4" fill="#2E7D32" transform="skewY(-30)"/>
  <rect x="656" y="500" width="36" height="36" rx="4" fill="#66BB6A" transform="skewY(-30)"/>
  <!-- 테두리 엣지 -->
  <line x1="512" y1="240" x2="240" y2="400" stroke="#66BB6A" stroke-width="6"/>
  <line x1="512" y1="240" x2="784" y2="400" stroke="#66BB6A" stroke-width="6"/>
  <line x1="240" y1="400" x2="240" y2="720" stroke="#66BB6A" stroke-width="4"/>
  <line x1="784" y1="400" x2="784" y2="720" stroke="#66BB6A" stroke-width="4"/>
  <line x1="240" y1="720" x2="512" y2="560" stroke="#66BB6A" stroke-width="4"/>
  <line x1="784" y1="720" x2="512" y2="560" stroke="#66BB6A" stroke-width="4"/>
  <line x1="512" y1="560" x2="512" y2="560" stroke="#66BB6A" stroke-width="4"/>
  <line x1="240" y1="400" x2="512" y2="560" stroke="#66BB6A" stroke-width="3" opacity="0.5"/>
  <line x1="784" y1="400" x2="512" y2="560" stroke="#66BB6A" stroke-width="3" opacity="0.5"/>
</svg>