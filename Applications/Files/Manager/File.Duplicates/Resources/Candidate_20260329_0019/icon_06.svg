<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | 2×2 파일 클론 그리드 + 돋보기 + X버튼 | 중앙 심볼 | 코랄+파랑+황금 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#BF360C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- 4 identical file cards in 2x2 grid -->
  <!-- Top-left -->
  <rect x="120" y="150" width="330" height="280" rx="20" fill="#E64A19" filter="url(#sh6)"/>
  <polygon points="392,150 450,208 392,208" fill="#FFCCBC"/>
  <rect x="148" y="236" width="250" height="16" rx="8" fill="white" opacity="0.8"/>
  <rect x="148" y="264" width="200" height="16" rx="8" fill="white" opacity="0.6"/>
  <rect x="148" y="292" width="230" height="16" rx="8" fill="white" opacity="0.7"/>
  <rect x="148" y="320" width="180" height="16" rx="8" fill="white" opacity="0.5"/>
  <text x="285" y="388" font-family="Consolas, monospace" font-size="22" fill="#FFCCBC"
        text-anchor="middle">a3f8b2c1...</text>

  <!-- Top-right -->
  <rect x="574" y="150" width="330" height="280" rx="20" fill="#E64A19" filter="url(#sh6)"/>
  <polygon points="846,150 904,208 846,208" fill="#FFCCBC"/>
  <rect x="602" y="236" width="250" height="16" rx="8" fill="white" opacity="0.8"/>
  <rect x="602" y="264" width="200" height="16" rx="8" fill="white" opacity="0.6"/>
  <rect x="602" y="292" width="230" height="16" rx="8" fill="white" opacity="0.7"/>
  <rect x="602" y="320" width="180" height="16" rx="8" fill="white" opacity="0.5"/>
  <text x="739" y="388" font-family="Consolas, monospace" font-size="22" fill="#FFCCBC"
        text-anchor="middle">a3f8b2c1...</text>

  <!-- Bottom-left -->
  <rect x="120" y="594" width="330" height="280" rx="20" fill="#E64A19" filter="url(#sh6)"/>
  <polygon points="392,594 450,652 392,652" fill="#FFCCBC"/>
  <rect x="148" y="680" width="250" height="16" rx="8" fill="white" opacity="0.8"/>
  <rect x="148" y="708" width="200" height="16" rx="8" fill="white" opacity="0.6"/>
  <rect x="148" y="736" width="230" height="16" rx="8" fill="white" opacity="0.7"/>
  <rect x="148" y="764" width="180" height="16" rx="8" fill="white" opacity="0.5"/>
  <text x="285" y="832" font-family="Consolas, monospace" font-size="22" fill="#FFCCBC"
        text-anchor="middle">a3f8b2c1...</text>

  <!-- Bottom-right — with red X (to be deleted) -->
  <rect x="574" y="594" width="330" height="280" rx="20" fill="#BDBDBD" filter="url(#sh6)" opacity="0.8"/>
  <polygon points="846,594 904,652 846,652" fill="#E0E0E0"/>
  <rect x="602" y="680" width="250" height="16" rx="8" fill="white" opacity="0.6"/>
  <rect x="602" y="708" width="200" height="16" rx="8" fill="white" opacity="0.4"/>
  <!-- Big X cross -->
  <line x1="620" y1="760" x2="880" y2="840" stroke="#E53935" stroke-width="20" stroke-linecap="round"/>
  <line x1="880" y1="760" x2="620" y2="840" stroke="#E53935" stroke-width="20" stroke-linecap="round"/>

  <!-- Center magnifier badge -->
  <circle cx="512" cy="512" r="90" fill="#FFD740" filter="url(#sh6)"/>
  <circle cx="512" cy="512" r="60" fill="white"/>
  <circle cx="512" cy="500" r="28" fill="none" stroke="#E64A19" stroke-width="12"/>
  <line x1="534" y1="522" x2="556" y2="544" stroke="#E64A19" stroke-width="14" stroke-linecap="round"/>
  <!-- = sign inside -->
  <rect x="494" y="490" width="36" height="8" rx="4" fill="#E64A19"/>
  <rect x="494" y="505" width="36" height="8" rx="4" fill="#E64A19"/>

  <!-- Connecting lines (grid guides) -->
  <line x1="450" y1="290" x2="574" y2="290" stroke="#FFD740" stroke-width="6" opacity="0.7"/>
  <line x1="450" y1="734" x2="574" y2="734" stroke="#FFD740" stroke-width="6" opacity="0.7"/>
  <line x1="285" y1="430" x2="285" y2="594" stroke="#FFD740" stroke-width="6" opacity="0.7"/>
  <line x1="739" y1="430" x2="739" y2="594" stroke="#FFD740" stroke-width="6" opacity="0.7"/>
</svg>
