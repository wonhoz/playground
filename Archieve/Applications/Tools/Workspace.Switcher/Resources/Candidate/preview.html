<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace.Switcher — 아이콘 후보 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .card { background: #252535; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: border-color .2s; }
    .card:hover { border-color: #666; }
    .card img { width: 100%; max-width: 160px; height: 160px; object-fit: contain; display: block; margin: 0 auto 12px; }
    .card .num  { font-size: 11px; color: #555; margin-bottom: 4px; }
    .card .name { font-size: 13px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Workspace.Switcher — 아이콘 후보</h1>
  <p>가상 데스크탑·워크스페이스 전환기 | 10개 디자인 컨셉</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_desktop_switch.svg" alt="desktop_switch">
      <div class="num">#01</div>
      <div class="name">desktop_switch</div>
    </div>
    <div class="card">
      <img src="candidate_02_cube_workspace.svg" alt="cube_workspace">
      <div class="num">#02</div>
      <div class="name">cube_workspace</div>
    </div>
    <div class="card">
      <img src="candidate_03_layers_stack.svg" alt="layers_stack">
      <div class="num">#03</div>
      <div class="name">layers_stack</div>
    </div>
    <div class="card">
      <img src="candidate_04_transit_arrow.svg" alt="transit_arrow">
      <div class="num">#04</div>
      <div class="name">transit_arrow</div>
    </div>
    <div class="card">
      <img src="candidate_05_orbit_ring.svg" alt="orbit_ring">
      <div class="num">#05</div>
      <div class="name">orbit_ring</div>
    </div>
    <div class="card">
      <img src="candidate_06_tab_switcher.svg" alt="tab_switcher">
      <div class="num">#06</div>
      <div class="name">tab_switcher</div>
    </div>
    <div class="card">
      <img src="candidate_07_portal_warp.svg" alt="portal_warp">
      <div class="num">#07</div>
      <div class="name">portal_warp</div>
    </div>
    <div class="card">
      <img src="candidate_08_timeline_flow.svg" alt="timeline_flow">
      <div class="num">#08</div>
      <div class="name">timeline_flow</div>
    </div>
    <div class="card">
      <img src="candidate_09_honeycomb.svg" alt="honeycomb">
      <div class="num">#09</div>
      <div class="name">honeycomb</div>
    </div>
    <div class="card">
      <img src="candidate_10_flip_card.svg" alt="flip_card">
      <div class="num">#10</div>
      <div class="name">flip_card</div>
    </div>
  </div>
</body>
</html>
