<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="dial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Drive / SSD shape -->
  <rect x="180" y="220" width="420" height="300" rx="24" fill="#1E293B"/>
  <rect x="210" y="250" width="360" height="240" rx="14" fill="#334155"/>
  <!-- Drive LED -->
  <circle cx="557" cy="370" r="16" fill="#22C55E"/>
  <!-- Drive chips (visual) -->
  <rect x="230" y="270" width="80" height="80" rx="6" fill="#475569"/>
  <rect x="326" y="270" width="80" height="80" rx="6" fill="#475569"/>
  <rect x="230" y="366" width="80" height="80" rx="6" fill="#475569"/>
  <!-- Speedometer -->
  <circle cx="730" cy="430" r="240" fill="none" stroke="#DBEAFE" stroke-width="8"/>
  <circle cx="730" cy="430" r="200" fill="#FFFFFF" stroke="#93C5FD" stroke-width="6"/>
  <!-- Speedometer arc - Red zone -->
  <path d="M530,430 A200,200 0 0,1 930,430" fill="none" stroke="#FECACA" stroke-width="36"/>
  <!-- Speed arc (filled to ~75%) -->
  <path d="M530,430 A200,200 0 0,1 848,243" fill="none" stroke="#0284C7" stroke-width="36" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="730" y1="430" x2="838" y2="250" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>
  <circle cx="730" cy="430" r="20" fill="#1E293B"/>
  <!-- Speed labels -->
  <text x="560" y="470" font-family="Arial,sans-serif" font-size="32" fill="#94A3B8">0</text>
  <text x="908" y="470" font-family="Arial,sans-serif" font-size="32" fill="#94A3B8">7k</text>
  <text x="700" y="298" font-family="Arial,sans-serif" font-size="32" fill="#0284C7">MB/s</text>
  <!-- Speed reading -->
  <text x="730" y="560" font-family="Arial,sans-serif" font-size="72" fill="#0C4A6E" font-weight="bold" text-anchor="middle">5250</text>
  <text x="730" y="610" font-family="Arial,sans-serif" font-size="36" fill="#0284C7" text-anchor="middle">MB/s</text>
  <!-- Label -->
  <text x="400" y="640" font-family="Arial,sans-serif" font-size="52" fill="#0C4A6E" font-weight="bold" text-anchor="middle">Drive Bench</text>
</svg>
