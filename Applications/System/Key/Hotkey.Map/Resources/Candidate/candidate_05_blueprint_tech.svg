  <line x1="140" y1="168" x2="160" y2="168" stroke="#4488ff" stroke-width="2"/>
  <text x="161" y="172" font-family="monospace" font-size="14" fill="#88aaff">+</text>
  <rect x="176" y="144" width="48" height="48" rx="8" fill="none" stroke="#4488ff" stroke-width="2"/>
  <text x="195" y="173" font-family="monospace" font-size="18" fill="#4488ff">S</text>
  <!-- Annotation arrow -->
  <line x1="224" y1="158" x2="270" y2="130" stroke="#aaccff" stroke-width="1.5" stroke-dasharray="4,3"/>
