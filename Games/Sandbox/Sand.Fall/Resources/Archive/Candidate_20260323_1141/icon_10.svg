<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 파스텔 오렌지 -->
  <rect width="1024" height="1024" rx="180" fill="#FFF3E0"/>
  <!-- Layer 2: 모래시계 + 주변 원소들 -->
  <!-- 큰 모래시계 -->
  <polygon points="200,200 824,200 512,512" fill="#FFA000"/>
  <polygon points="200,824 824,824 512,512" fill="#FF8F00"/>
  <!-- 모래시계 외곽선 + 프레임 -->
  <rect x="180" y="180" width="664" height="36" rx="10" fill="#E65100"/>
  <rect x="180" y="808" width="664" height="36" rx="10" fill="#E65100"/>
  <!-- 모래 흐름 (중앙) -->
  <line x1="512" y1="480" x2="512" y2="544" stroke="#FF6D00" stroke-width="20" stroke-linecap="round"/>
  <line x1="512" y1="480" x2="512" y2="544" stroke="#FFCC02" stroke-width="8" stroke-linecap="round"/>
  <!-- 주변 원소 아이콘들 (코너에) -->
  <!-- 물 방울 (좌상) -->
  <polygon points="180,300 160,370 200,370" fill="#2196F3"/>
  <circle cx="180" cy="374" r="36" fill="#2196F3"/>
  <text x="180" y="395" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">H₂O</text>
  <!-- 불 (우상) -->
  <polygon points="844,260 820,320 868,320" fill="#FF3D00"/>
  <text x="844" y="370" font-family="Arial" font-size="40" fill="#FF3D00" text-anchor="middle">🔥</text>
  <!-- 돌 (좌하) -->
  <rect x="145" y="700" width="70" height="70" rx="10" fill="#546E7A"/>
  <text x="180" y="748" font-family="Arial" font-size="36" fill="white" text-anchor="middle" font-weight="bold">◆</text>
  <!-- 폭발 (우하) -->
  <circle cx="844" cy="730" r="44" fill="#FF6D00" opacity="0.8"/>
  <text x="844" y="748" font-family="Arial" font-size="36" fill="white" text-anchor="middle">★</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#E65100" text-anchor="middle">SAND.FALL</text>
</svg>
