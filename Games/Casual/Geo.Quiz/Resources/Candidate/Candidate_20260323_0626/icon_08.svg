<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 국기 퍼즐 — 국기로 나라 맞추기 | 실루엣 | #F0F4FF -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#F0F4FF"/>
  <!-- Layer 2: Flag display cards -->
  <!-- Card grid: 3 columns × 3 rows with different countries' flags -->
  <!-- Card 1: South Korea flag -->
  <rect x="180" y="200" width="200" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <!-- Taegeukgi simplified -->
  <rect x="186" y="206" width="188" height="128" rx="8" fill="white"/>
  <!-- Red area top-left -->
  <path d="M 186 206 L 280 270 L 280 206 Z" fill="#CD2E3A" opacity="0.8"/>
  <!-- Blue area bottom-right -->
  <path d="M 280 270 L 374 334 L 374 270 L 280 270 Z" fill="#003478" opacity="0.8"/>
  <!-- Trigrams (simplified bars) -->
  <line x1="198" y1="290" x2="218" y2="290" stroke="#000000" stroke-width="5"/>
  <line x1="198" y1="302" x2="218" y2="302" stroke="#000000" stroke-width="5"/>
  <line x1="198" y1="314" x2="218" y2="314" stroke="#000000" stroke-width="5"/>
  <rect x="180" y="330" width="200" height="10" rx="0" fill="#F0F4FF"/>
  <text x="280" y="347" font-family="Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">대한민국 🇰🇷</text>
  <!-- Card 2: France flag -->
  <rect x="412" y="200" width="200" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <!-- Tricolor: blue, white, red -->
  <rect x="418" y="206" width="63" height="128" rx="4" fill="#0055A4"/>
  <rect x="481" y="206" width="62" height="128" fill="white"/>
  <rect x="543" y="206" width="63" height="128" rx="4" fill="#EF4135"/>
  <rect x="412" y="330" width="200" height="10" rx="0" fill="#F0F4FF"/>
  <text x="512" y="347" font-family="Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">프랑스 🇫🇷</text>
  <!-- Card 3: Japan flag -->
  <rect x="644" y="200" width="200" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <rect x="650" y="206" width="188" height="128" rx="8" fill="white"/>
  <circle cx="744" cy="270" r="42" fill="#BC002D"/>
  <rect x="644" y="330" width="200" height="10" rx="0" fill="#F0F4FF"/>
  <text x="744" y="347" font-family="Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">일본 🇯🇵</text>
  <!-- Card 4: Germany flag -->
  <rect x="180" y="420" width="200" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <rect x="186" y="426" width="188" height="43" rx="4" fill="#000000"/>
  <rect x="186" y="469" width="188" height="42" fill="#DD0000"/>
  <rect x="186" y="511" width="188" height="43" rx="4" fill="#FFCE00"/>
  <rect x="180" y="550" width="200" height="10" rx="0" fill="#F0F4FF"/>
  <text x="280" y="567" font-family="Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">독일 🇩🇪</text>
  <!-- Card 5: USA flag (simplified, mystery/question) -->
  <rect x="412" y="420" width="200" height="140" rx="10" fill="#F8FAFC" stroke="#3B82F6" stroke-width="4" stroke-dasharray="8,4"/>
  <!-- Question mark -->
  <text x="512" y="500" font-family="Arial,sans-serif" font-size="64" fill="#3B82F6" text-anchor="middle" font-weight="bold">?</text>
  <text x="512" y="567" font-family="Arial,sans-serif" font-size="16" fill="#3B82F6" text-anchor="middle">이 국기는?</text>
  <!-- Card 6: Brazil flag -->
  <rect x="644" y="420" width="200" height="140" rx="10" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <rect x="650" y="426" width="188" height="128" rx="8" fill="#009C3B"/>
  <polygon points="744,440 812,489 744,538 676,489" fill="#FEDF00"/>
  <circle cx="744" cy="489" r="30" fill="#002776"/>
  <text x="744" y="567" font-family="Arial,sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">브라질 🇧🇷</text>
  <!-- Layer 3: Answer choices for the mystery card -->
  <rect x="180" y="650" width="664" height="120" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <text x="512" y="678" font-family="Arial,sans-serif" font-size="15" fill="#334155" text-anchor="middle" font-weight="bold">어느 나라의 국기인가요?</text>
  <!-- Option buttons -->
  <rect x="210" y="692" width="150" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="285" y="720" font-family="Arial,sans-serif" font-size="14" fill="#1D4ED8" text-anchor="middle">① 미국 🇺🇸</text>
  <rect x="378" y="692" width="150" height="44" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="453" y="720" font-family="Arial,sans-serif" font-size="14" fill="#64748B" text-anchor="middle">② 영국 🇬🇧</text>
  <rect x="546" y="692" width="150" height="44" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="621" y="720" font-family="Arial,sans-serif" font-size="14" fill="#64748B" text-anchor="middle">③ 호주 🇦🇺</text>
</svg>
