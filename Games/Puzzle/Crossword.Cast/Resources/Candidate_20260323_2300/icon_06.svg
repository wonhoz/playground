<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#6b2d0b"/>
    </linearGradient>
    <linearGradient id="bulb06" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <g clip-path="url(#clip06)">
    <!-- Layer 2: 전구 모양 -->
    <!-- 전구 유리 부분 -->
    <circle cx="512" cy="390" r="200" fill="url(#bulb06)"/>
    <!-- 전구 베이스 -->
    <rect x="452" y="560" width="120" height="30" fill="#D97706" rx="4"/>
    <rect x="462" y="590" width="100" height="30" fill="#D97706" rx="4"/>
    <rect x="472" y="620" width="80"  height="30" fill="#D97706" rx="4"/>
    <!-- 필라멘트 -->
    <path d="M 480 520 Q 480 480, 512 460 Q 544 480, 544 520" fill="none" stroke="#78350F" stroke-width="12" stroke-linecap="round"/>
    <!-- 빛 방사선 -->
    <line x1="512" y1="140" x2="512" y2="100" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <line x1="660" y1="210" x2="686" y2="178" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <line x1="364" y1="210" x2="338" y2="178" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <line x1="748" y1="360" x2="794" y2="350" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <line x1="276" y1="360" x2="230" y2="350" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <!-- Layer 3: 힌트 텍스트 -->
    <!-- 단어 힌트 카드들 -->
    <rect x="140" y="680" width="340" height="70" fill="rgba(245,158,11,0.25)" stroke="#F59E0B" stroke-width="4" rx="12"/>
    <text x="310" y="717" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1. ACROSS →</text>
    <rect x="544" y="680" width="340" height="70" fill="rgba(245,158,11,0.25)" stroke="#F59E0B" stroke-width="4" rx="12"/>
    <text x="714" y="717" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2. DOWN ↓</text>
    <rect x="140" y="764" width="340" height="70" fill="rgba(245,158,11,0.25)" stroke="#F59E0B" stroke-width="4" rx="12"/>
    <text x="310" y="800" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3. ACROSS →</text>
    <rect x="544" y="764" width="340" height="70" fill="rgba(245,158,11,0.25)" stroke="#F59E0B" stroke-width="4" rx="12"/>
    <text x="714" y="800" font-family="Arial, sans-serif" font-size="36" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">CLUE!</text>
    <!-- CLUE 메인 텍스트 -->
    <text x="512" y="900" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">CLUE</text>
