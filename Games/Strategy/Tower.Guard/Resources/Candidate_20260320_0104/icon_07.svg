<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 전략 체스 배치: 체스 말 배치 -->
  <!-- chess board grid (4x4 section) -->
  <g opacity="0.35">
    <rect x="212" y="540" width="150" height="150" rx="4" fill="#37474F"/>
    <rect x="362" y="540" width="150" height="150" rx="4" fill="#B0BEC5" opacity="0.3"/>
    <rect x="512" y="540" width="150" height="150" rx="4" fill="#37474F"/>
    <rect x="662" y="540" width="150" height="150" rx="4" fill="#B0BEC5" opacity="0.3"/>
    <rect x="212" y="690" width="150" height="150" rx="4" fill="#B0BEC5" opacity="0.3"/>
    <rect x="362" y="690" width="150" height="150" rx="4" fill="#37474F"/>
    <rect x="512" y="690" width="150" height="150" rx="4" fill="#B0BEC5" opacity="0.3"/>
    <rect x="662" y="690" width="150" height="150" rx="4" fill="#37474F"/>
  </g>
  <!-- tower piece (rook) - center large -->
  <rect x="456" y="340" width="112" height="130" rx="8" fill="#37474F"/>
  <!-- rook battlements -->
  <rect x="456" y="306" width="28" height="46" rx="4" fill="#37474F"/>
  <rect x="498" y="306" width="28" height="46" rx="4" fill="#37474F"/>
  <rect x="540" y="306" width="28" height="46" rx="4" fill="#37474F"/>
  <!-- rook base -->
  <rect x="436" y="460" width="152" height="24" rx="6" fill="#B0BEC5" opacity="0.6"/>
  <!-- rook window -->
  <rect x="492" y="378" width="40" height="18" rx="3" fill="#050808"/>
  <!-- archer piece (left) -->
  <circle cx="287" cy="530" r="30" fill="#37474F"/>
  <rect x="269" y="560" width="36" height="44" rx="6" fill="#37474F"/>
  <rect x="269" y="596" width="36" height="14" rx="4" fill="#B0BEC5" opacity="0.5"/>
  <!-- mage piece (right) -->
  <circle cx="737" cy="530" r="30" fill="#B0BEC5" opacity="0.6"/>
  <rect x="719" y="560" width="36" height="44" rx="6" fill="#B0BEC5" opacity="0.4"/>
  <!-- move arrows -->
  <line x1="287" y1="596" x2="380" y2="596" stroke="#B0BEC5" stroke-width="5" stroke-dasharray="10 6" stroke-linecap="round" opacity="0.5"/>
  <polygon points="380,596 362,586 362,606" fill="#B0BEC5" opacity="0.5"/>
  <line x1="737" y1="596" x2="644" y2="596" stroke="#B0BEC5" stroke-width="5" stroke-dasharray="10 6" stroke-linecap="round" opacity="0.5"/>
  <polygon points="644,596 662,586 662,606" fill="#B0BEC5" opacity="0.5"/>
</svg>
