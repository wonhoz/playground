<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 따뜻한 오렌지/황금 그라디언트 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="camera_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="lens_ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#BF360C" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg3)"/>

  <!-- 카메라 바디 (실루엣 - 메인 오브젝트) -->
  <!-- 카메라 본체 -->
  <rect x="130" y="370" width="764" height="440" rx="60" fill="url(#camera_body)" filter="url(#shadow3)"/>
  <!-- 카메라 상단 돌출부 (핫슈/뷰파인더) -->
  <rect x="320" y="310" width="220" height="80" rx="30" fill="#BF360C"/>
  <!-- 셔터 버튼 -->
  <circle cx="780" cy="340" r="45" fill="#FF6D00"/>
  <circle cx="780" cy="340" r="28" fill="#E64A19"/>

  <!-- 렌즈 (흰 내부 공간 — URL 텍스트 표시) -->
  <circle cx="460" cy="590" r="190" fill="#1A1A1A"/>
  <circle cx="460" cy="590" r="168" fill="url(#lens_ring)"/>
  <circle cx="460" cy="590" r="140" fill="#1A1A1A"/>
  <!-- 렌즈 내부 반사 -->
  <circle cx="460" cy="590" r="115" fill="#0D1B2A"/>
  <circle cx="420" cy="548" r="28" fill="white" opacity="0.12"/>

  <!-- URL 텍스트 (렌즈 안에 표시 — 핵심 디테일) -->
  <text x="460" y="576" font-family="monospace" font-size="52" fill="#FFD740" text-anchor="middle" font-weight="bold">https</text>
  <text x="460" y="630" font-family="monospace" font-size="36" fill="#FFAB40" text-anchor="middle">://</text>

  <!-- 플래시 -->
  <rect x="680" y="430" width="80" height="52" rx="14" fill="#FF8F00" opacity="0.7"/>
  <!-- 뷰파인더 -->
  <rect x="680" y="500" width="80" height="56" rx="10" fill="#0D1B2A"/>
</svg>
