<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 용량 바 차트 -->
  <!-- 항목 1: Videos 78% -->
  <text x="100" y="210" font-family="'Segoe UI', sans-serif" font-size="52" fill="#1565C0">📁 Videos</text>
  <rect x="100" y="220" width="824" height="56" rx="8" fill="#E3F2FD"/>
  <rect x="100" y="220" width="642" height="56" rx="8" fill="#1565C0"/>
  <text x="760" y="262" font-family="'Segoe UI', sans-serif" font-size="44" fill="#0D47A1">78%</text>
  <!-- 항목 2: Programs 52% -->
  <text x="100" y="348" font-family="'Segoe UI', sans-serif" font-size="52" fill="#E65100">📁 Programs</text>
  <rect x="100" y="358" width="824" height="56" rx="8" fill="#FFF3E0"/>
  <rect x="100" y="358" width="428" height="56" rx="8" fill="#FF6F00"/>
  <text x="546" y="400" font-family="'Segoe UI', sans-serif" font-size="44" fill="#BF360C">52%</text>
  <!-- 항목 3: Documents 31% -->
  <text x="100" y="486" font-family="'Segoe UI', sans-serif" font-size="52" fill="#2E7D32">📁 Docs</text>
  <rect x="100" y="496" width="824" height="56" rx="8" fill="#E8F5E9"/>
