<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a1a2a"/>
    </linearGradient>
    <linearGradient id="wand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <linearGradient id="before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7675"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Before panel (messy JSON) -->
  <rect x="40" y="80" width="180" height="220" rx="10" fill="#2a1a1a"/>
  <text x="55" y="108" font-family="monospace" font-size="11" fill="#ff7675">{"a":1,"b":"x",</text>
  <text x="55" y="128" font-family="monospace" font-size="11" fill="#ff7675">"c":true,"d":[</text>
  <text x="55" y="148" font-family="monospace" font-size="11" fill="#ff7675">1,2,3],"e":{</text>
  <text x="55" y="168" font-family="monospace" font-size="11" fill="#ff7675">"f":"hello"}}</text>
  <!-- X mark on before -->
  <line x1="55" y1="185" x2="205" y2="285" stroke="#ff7675" stroke-width="3" opacity="0.4"/>
  <line x1="205" y1="185" x2="55" y2="285" stroke="#ff7675" stroke-width="3" opacity="0.4"/>
  <!-- Magic wand -->
  <g transform="rotate(-35,256,256)">
    <rect x="220" y="110" width="14" height="160" rx="7" fill="url(#wand)"/>
    <rect x="214" y="96" width="26" height="28" rx="6" fill="#fdcb6e"/>
    <!-- Star at top -->
    <polygon points="227,74 231,88 245,88 234,97 238,111 227,102 216,111 220,97 209,88 223,88" fill="#ffeaa7"/>
  </g>
  <!-- Sparkle particles -->
  <circle cx="300" cy="180" r="5" fill="#ffeaa7" opacity="0.8"/>
  <circle cx="320" cy="150" r="3" fill="#ffeaa7" opacity="0.6"/>
  <circle cx="290" cy="140" r="4" fill="#fdcb6e" opacity="0.7"/>
  <circle cx="340" cy="200" r="3" fill="#ffeaa7" opacity="0.5"/>
  <circle cx="310" cy="220" r="4" fill="#fdcb6e" opacity="0.6"/>
  <!-- After panel (formatted JSON) -->
  <rect x="292" y="80" width="180" height="220" rx="10" fill="#1a2a1a"/>
  <text x="307" y="108" font-family="monospace" font-size="11" fill="#00b894">{</text>
  <text x="307" y="128" font-family="monospace" font-size="11" fill="#74b9ff">  "a": </text>
  <text x="355" y="128" font-family="monospace" font-size="11" fill="#55efc4">1,</text>
  <text x="307" y="148" font-family="monospace" font-size="11" fill="#74b9ff">  "b": </text>
  <text x="355" y="148" font-family="monospace" font-size="11" fill="#fdcb6e">"x",</text>
  <text x="307" y="168" font-family="monospace" font-size="11" fill="#74b9ff">  "c": </text>
  <text x="355" y="168" font-family="monospace" font-size="11" fill="#55efc4">true,</text>
  <text x="307" y="188" font-family="monospace" font-size="11" fill="#74b9ff">  "d": [</text>
  <text x="307" y="208" font-family="monospace" font-size="11" fill="#55efc4">    1, 2, 3</text>
  <text x="307" y="228" font-family="monospace" font-size="11" fill="#74b9ff">  ],</text>
  <text x="307" y="248" font-family="monospace" font-size="11" fill="#00b894">}</text>
  <!-- Arrow -->
  <text x="256" y="330" text-anchor="middle" font-family="Arial" font-size="18" fill="#ffeaa7" opacity="0.7">BEFORE → AFTER</text>
  <text x="256" y="370" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#ffeaa7" opacity="0.8">FORMAT</text>
</svg>
