<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="scan" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff44" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff44" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="72" y="80" width="368" height="280" rx="16" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="4"/>
  <!-- Scanline glow -->
  <rect x="72" y="80" width="368" height="280" rx="16" fill="url(#scan)"/>
  <!-- ECG/pulse waveform -->
  <polyline points="72,220 120,220 140,220 150,120 160,300 170,220 200,220 210,180 215,180 220,160 225,240 230,240 260,240 270,200 275,200 280,170 285,260 290,240 330,240 340,200 345,200 350,175 355,255 360,240 442,240" fill="none" stroke="#00ff44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow effect on pulse line -->
  <polyline points="72,220 120,220 140,220 150,120 160,300 170,220 200,220 210,180 215,180 220,160 225,240 230,240 260,240 270,200 275,200 280,170 285,260 290,240 330,240 340,200 345,200 350,175 355,255 360,240 442,240" fill="none" stroke="#00ff44" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
  <!-- Scan line (animated suggestion) -->
  <line x1="330" y1="80" x2="330" y2="360" stroke="#00ff44" stroke-width="1" opacity="0.4"/>
  <!-- Stats labels -->
  <text x="88" y="112" font-size="16" fill="#00ff44" font-family="monospace" opacity="0.8">SYSTEM MONITOR</text>
  <text x="340" y="112" font-size="16" fill="#00ff44" font-family="monospace" opacity="0.6">LIVE</text>
  <circle cx="332" cy="107" r="5" fill="#00ff44" opacity="0.8"/>
  <!-- Bottom metrics -->
  <rect x="72" y="380" width="368" height="72" rx="12" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="2"/>
  <text x="90" y="408" font-size="14" fill="#00ff44" font-family="monospace">CPU: 48%</text>
  <text x="90" y="432" font-size="14" fill="#44aaff" font-family="monospace">RAM: 7.2GB</text>
  <text x="230" y="408" font-size="14" fill="#ffaa00" font-family="monospace">TEMP: 62C</text>
  <text x="230" y="432" font-size="14" fill="#ff4444" font-family="monospace">FAN: 2400rpm</text>
  <text x="370" y="408" font-size="14" fill="#888" font-family="monospace">UP:</text>
  <text x="370" y="432" font-size="14" fill="#888" font-family="monospace">3d 12h</text>
  <!-- Monitor stand -->
  <rect x="232" y="452" width="48" height="28" rx="4" fill="#1e1e1e"/>
  <rect x="196" y="474" width="120" height="12" rx="6" fill="#252525"/>
</svg>