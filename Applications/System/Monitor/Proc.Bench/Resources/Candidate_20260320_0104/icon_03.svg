<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 역기들기: barbell with CPU weights -->
  <!-- Barbell bar -->
  <rect x="200" y="490" width="624" height="44" rx="22" fill="#33691E"/>
  <!-- Left weight plate -->
  <rect x="180" y="390" width="80" height="244" rx="16" fill="#AED581"/>
  <rect x="200" y="410" width="44" height="204" rx="10" fill="#050A00"/>
  <!-- Right weight plate -->
  <rect x="764" y="390" width="80" height="244" rx="16" fill="#AED581"/>
  <rect x="780" y="410" width="44" height="204" rx="10" fill="#050A00"/>
  <!-- Inner weight plates -->
  <rect x="270" y="420" width="55" height="184" rx="12" fill="#33691E"/>
  <rect x="699" y="420" width="55" height="184" rx="12" fill="#33691E"/>
  <!-- CPU chip on bar center -->
  <rect x="452" y="452" width="120" height="120" rx="12" fill="#33691E"/>
  <rect x="466" y="466" width="92" height="92" rx="8" fill="#050A00"/>
  <line x1="490" y1="466" x2="490" y2="558" stroke="#33691E" stroke-width="4"/>
  <line x1="512" y1="466" x2="512" y2="558" stroke="#33691E" stroke-width="4"/>
  <line x1="534" y1="466" x2="534" y2="558" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="490" x2="558" y2="490" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="512" x2="558" y2="512" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="534" x2="558" y2="534" stroke="#33691E" stroke-width="4"/>
  <!-- Glow effect -->
  <ellipse cx="512" cy="512" rx="200" ry="30" fill="#AED581" opacity="0.08"/>
</svg>