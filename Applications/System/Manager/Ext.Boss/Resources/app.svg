<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <radialGradient id="gearGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gear glow -->
  <circle cx="290" cy="290" r="160" fill="url(#gearGlow)"/>
  <!-- File -->
  <rect x="90" y="120" width="200" height="260" rx="10" fill="url(#fileGrad)"/>
  <polygon points="250,120 290,160 250,160" fill="#263238"/>
  <polygon points="250,120 290,120 290,160" fill="#78909c"/>
  <rect x="115" y="200" width="150" height="10" rx="5" fill="#00e5ff" opacity="0.5"/>
  <rect x="115" y="225" width="120" height="10" rx="5" fill="#00e5ff" opacity="0.4"/>
  <rect x="115" y="250" width="135" height="10" rx="5" fill="#00e5ff" opacity="0.3"/>
  <!-- Gear body -->
  <circle cx="310" cy="310" r="100" fill="url(#gearGrad)" opacity="0.9"/>
  <circle cx="310" cy="310" r="60" fill="#212121"/>
  <circle cx="310" cy="310" r="25" fill="url(#gearGrad)"/>
  <!-- Gear teeth -->
  <rect x="295" y="195" width="30" height="35" rx="5" fill="url(#gearGrad)"/>
  <rect x="295" y="390" width="30" height="35" rx="5" fill="url(#gearGrad)"/>
  <rect x="195" y="295" width="35" height="30" rx="5" fill="url(#gearGrad)"/>
  <rect x="390" y="295" width="35" height="30" rx="5" fill="url(#gearGrad)"/>
  <rect x="228" y="228" width="28" height="28" rx="5" fill="url(#gearGrad)" transform="rotate(45 242 242)"/>
  <rect x="366" y="228" width="28" height="28" rx="5" fill="url(#gearGrad)" transform="rotate(45 380 242)"/>
  <rect x="228" y="366" width="28" height="28" rx="5" fill="url(#gearGrad)" transform="rotate(45 242 380)"/>
  <rect x="366" y="366" width="28" height="28" rx="5" fill="url(#gearGrad)" transform="rotate(45 380 380)"/>
</svg>
