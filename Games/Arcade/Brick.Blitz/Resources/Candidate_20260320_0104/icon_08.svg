<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- Rainbow-colored brick layers (5 rows, each different color) -->
  <!-- Row 1 (blue - darkest) -->
  <rect x="140" y="200" width="744" height="100" rx="10" fill="#1A237E" opacity="0.95"/>
  <line x1="320" y1="200" x2="320" y2="300" stroke="#050010" stroke-width="8"/>
  <line x1="520" y1="200" x2="520" y2="300" stroke="#050010" stroke-width="8"/>
  <line x1="700" y1="200" x2="700" y2="300" stroke="#050010" stroke-width="8"/>
  <!-- Row 2 (indigo) -->
  <rect x="140" y="312" width="744" height="100" rx="10" fill="#283593" opacity="0.9"/>
  <line x1="260" y1="312" x2="260" y2="412" stroke="#050010" stroke-width="8"/>
  <line x1="450" y1="312" x2="450" y2="412" stroke="#050010" stroke-width="8"/>
  <line x1="640" y1="312" x2="640" y2="412" stroke="#050010" stroke-width="8"/>
  <line x1="810" y1="312" x2="810" y2="412" stroke="#050010" stroke-width="8"/>
  <!-- Row 3 (blue-purple) -->
  <rect x="140" y="424" width="744" height="100" rx="10" fill="#3949AB" opacity="0.85"/>
  <line x1="320" y1="424" x2="320" y2="524" stroke="#050010" stroke-width="8"/>
  <line x1="520" y1="424" x2="520" y2="524" stroke="#050010" stroke-width="8"/>
  <line x1="700" y1="424" x2="700" y2="524" stroke="#050010" stroke-width="8"/>
  <!-- Row 4 (medium purple) -->
  <rect x="140" y="536" width="744" height="100" rx="10" fill="#5C6BC0" opacity="0.8"/>
  <line x1="260" y1="536" x2="260" y2="636" stroke="#050010" stroke-width="8"/>
  <line x1="450" y1="536" x2="450" y2="636" stroke="#050010" stroke-width="8"/>
  <line x1="640" y1="536" x2="640" y2="636" stroke="#050010" stroke-width="8"/>
  <line x1="810" y1="536" x2="810" y2="636" stroke="#050010" stroke-width="8"/>
  <!-- Row 5 (light) -->
  <rect x="140" y="648" width="744" height="100" rx="10" fill="#7986CB" opacity="0.7"/>
  <line x1="320" y1="648" x2="320" y2="748" stroke="#050010" stroke-width="8"/>
  <line x1="520" y1="648" x2="520" y2="748" stroke="#050010" stroke-width="8"/>
  <line x1="700" y1="648" x2="700" y2="748" stroke="#050010" stroke-width="8"/>
  <!-- Shimmer/highlight on each row -->
  <rect x="140" y="200" width="744" height="18" rx="8" fill="#9FA8DA" opacity="0.18"/>
  <rect x="140" y="312" width="744" height="18" rx="8" fill="#9FA8DA" opacity="0.15"/>
  <rect x="140" y="424" width="744" height="18" rx="8" fill="#9FA8DA" opacity="0.13"/>
  <rect x="140" y="536" width="744" height="18" rx="8" fill="#9FA8DA" opacity="0.1"/>
  <rect x="140" y="648" width="744" height="18" rx="8" fill="#9FA8DA" opacity="0.08"/>
</svg>
