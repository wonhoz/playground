<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 가지+잎+꽃 클로즈업 | 중앙심볼 | #05200A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#05200A"/>
  <!-- Layer 2: Single branch with leaves and flower -->
  <!-- Main branch -->
  <line x1="180" y1="820" x2="512" y2="500" stroke="#5C2A0A" stroke-width="22" stroke-linecap="round"/>
  <!-- Sub branch 1 (left) -->
  <line x1="380" y1="650" x2="240" y2="480" stroke="#7A3B14" stroke-width="14" stroke-linecap="round"/>
  <!-- Sub branch 2 (right) -->
  <line x1="420" y1="600" x2="560" y2="420" stroke="#7A3B14" stroke-width="14" stroke-linecap="round"/>
  <!-- Sub branch top (right) -->
  <line x1="512" y1="500" x2="660" y2="340" stroke="#8B4513" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="500" x2="360" y2="360" stroke="#8B4513" stroke-width="12" stroke-linecap="round"/>
  <!-- Leaves on sub branches - large decorative leaf shapes -->
  <!-- Leaf 1 (left sub branch tip) -->
  <ellipse cx="220" cy="460" rx="60" ry="36" fill="#16A34A" transform="rotate(-35 220 460)"/>
  <line x1="220" y1="460" x2="240" y2="480" stroke="#15803D" stroke-width="2"/>
  <!-- Leaf 2 -->
  <ellipse cx="570" cy="405" rx="55" ry="32" fill="#22C55E" transform="rotate(20 570 405)"/>
  <line x1="570" y1="405" x2="560" y2="420" stroke="#16A34A" stroke-width="2"/>
  <!-- Leaf 3 (top right branch tip) -->
  <ellipse cx="670" cy="325" rx="58" ry="34" fill="#4ADE80" transform="rotate(30 670 325)"/>
  <!-- Leaf 4 (top left branch tip) -->
  <ellipse cx="345" cy="345" rx="56" ry="33" fill="#15803D" transform="rotate(-40 345 345)"/>
  <!-- Leaf 5 (main branch area) -->
  <ellipse cx="290" cy="560" rx="48" ry="28" fill="#16A34A" transform="rotate(-20 290 560)"/>
  <ellipse cx="470" cy="530" rx="44" ry="26" fill="#22C55E" transform="rotate(15 470 530)"/>
  <!-- Layer 3: Flower at tip of main branch -->
  <!-- Petals -->
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FBCFE8" transform="rotate(0 512 440)"/>
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FBCFE8" transform="rotate(60 512 440)"/>
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FBCFE8" transform="rotate(120 512 440)"/>
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FCA5A5" transform="rotate(180 512 440)"/>
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FBCFE8" transform="rotate(240 512 440)"/>
  <ellipse cx="512" cy="440" rx="26" ry="40" fill="#FBCFE8" transform="rotate(300 512 440)"/>
  <!-- Flower center -->
  <circle cx="512" cy="440" r="24" fill="#FDE68A"/>
  <circle cx="512" cy="440" r="14" fill="#F59E0B"/>
  <!-- Dewdrops on leaves -->
  <circle cx="238" cy="456" r="7" fill="#BAE6FD" opacity="0.8"/>
  <circle cx="566" cy="400" r="6" fill="#BAE6FD" opacity="0.7"/>
</svg>
