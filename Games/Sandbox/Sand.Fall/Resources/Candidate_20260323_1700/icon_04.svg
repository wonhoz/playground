<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1C0E00"/>
  <!-- Layer 2: 커서 위에서 모래 쏟기 -->
  <!-- 커서 손 -->
  <text x="512" y="220" font-size="160" fill="#F59E0B" text-anchor="middle">✋</text>
  <!-- 모래 입자들 (떨어지는) -->
  <circle cx="480" cy="290" r="14" fill="#E8C878"/>
  <circle cx="510" cy="330" r="12" fill="#DCBA64"/>
  <circle cx="490" cy="380" r="10" fill="#E8C878"/>
  <circle cx="535" cy="290" r="11" fill="#FCD34D"/>
  <circle cx="520" cy="350" r="9" fill="#DCBA64"/>
  <circle cx="505" cy="420" r="12" fill="#E8C878"/>
  <circle cx="460" cy="440" r="8" fill="#FDE68A"/>
  <circle cx="550" cy="400" r="10" fill="#E8C878"/>
  <circle cx="540" cy="460" r="8" fill="#DCBA64"/>
  <!-- 쌓인 모래 언덕 -->
  <ellipse cx="512" cy="720" rx="380" ry="120" fill="#D97706"/>
  <ellipse cx="400" cy="720" rx="200" ry="100" fill="#F59E0B"/>
  <ellipse cx="600" cy="730" rx="160" ry="80" fill="#DCBA64"/>
  <!-- 모래 표면 텍스처 -->
  <path d="M132 700 Q200 680 300 700 Q400 720 500 700 Q600 680 700 700 Q800 720 892 700" fill="none" stroke="#FCD34D" stroke-width="8" opacity="0.5"/>
  <!-- Layer 3: 바닥에 튀는 입자들 -->
  <circle cx="200" cy="680" r="8" fill="#FCD34D"/>
  <circle cx="220" cy="650" r="6" fill="#FDE68A"/>
  <circle cx="800" cy="680" r="8" fill="#FCD34D"/>
  <circle cx="780" cy="650" r="6" fill="#FDE68A"/>
  <!-- 재고 물질 팔레트 표시 -->
  <rect x="80" y="860" width="130" height="80" rx="16" fill="#E8C878"/>
  <text x="145" y="912" font-size="30" fill="#1C0E00" text-anchor="middle" font-weight="bold">Sand</text>
  <rect x="230" y="860" width="130" height="80" rx="16" fill="#3468C8"/>
  <text x="295" y="912" font-size="30" fill="white" text-anchor="middle">Water</text>
  <rect x="380" y="860" width="130" height="80" rx="16" fill="#FF5500"/>
  <text x="445" y="912" font-size="30" fill="white" text-anchor="middle">Fire</text>
  <rect x="530" y="860" width="130" height="80" rx="16" fill="#788090"/>
  <text x="595" y="912" font-size="30" fill="white" text-anchor="middle">Stone</text>
  <rect x="680" y="860" width="130" height="80" rx="16" fill="#22A030"/>
  <text x="745" y="912" font-size="30" fill="white" text-anchor="middle">Plant</text>
  <rect x="830" y="860" width="114" height="80" rx="16" fill="#88FF10"/>
  <text x="887" y="912" font-size="30" fill="#1C0E00" text-anchor="middle">Acid</text>
</svg>
