<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 청록+파랑 -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006064"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 필름 스트립 (시간 순서로 사진들이 정렬) -->
  <!-- 필름 스트립 배경 (대각선으로 흐름) -->
  <rect x="60" y="300" width="904" height="380" rx="28" fill="#004D40" opacity="0.6" transform="rotate(-6 512 490)"/>
  <!-- 필름 구멍들 (왼쪽) -->
  <circle cx="90" cy="350" r="18" fill="#006064"/>
  <circle cx="90" cy="410" r="18" fill="#006064"/>
  <circle cx="90" cy="470" r="18" fill="#006064"/>
  <circle cx="90" cy="530" r="18" fill="#006064"/>
  <circle cx="90" cy="590" r="18" fill="#006064"/>
  <circle cx="90" cy="650" r="18" fill="#006064"/>
  <!-- 필름 구멍들 (오른쪽) -->
  <circle cx="934" cy="350" r="18" fill="#006064"/>
  <circle cx="934" cy="410" r="18" fill="#006064"/>
  <circle cx="934" cy="470" r="18" fill="#006064"/>
  <circle cx="934" cy="530" r="18" fill="#006064"/>
  <circle cx="934" cy="590" r="18" fill="#006064"/>
  <circle cx="934" cy="650" r="18" fill="#006064"/>
  <!-- 필름 프레임들 (날짜순) -->
  <!-- 프레임 1: 2024-05 -->
  <rect x="130" y="330" width="160" height="120" rx="8" fill="white" opacity="0.92"/>
  <defs>
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#80DEEA"/>
      <stop offset="100%" style="stop-color:#4DD0E1"/>
    </linearGradient>
  </defs>
  <rect x="138" y="338" width="144" height="90" rx="6" fill="url(#f1)"/>
  <text x="210" y="478" font-family="Segoe UI, sans-serif" font-size="36" fill="#E0F7FA" text-anchor="middle">2024-05</text>
  <!-- 프레임 2: 2024-06 -->
  <rect x="310" y="320" width="160" height="130" rx="8" fill="white" opacity="0.92"/>
  <defs>
    <linearGradient id="f2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#80CBC4"/>
      <stop offset="100%" style="stop-color:#4DB6AC"/>
    </linearGradient>
  </defs>
  <rect x="318" y="328" width="144" height="98" rx="6" fill="url(#f2)"/>
  <text x="390" y="474" font-family="Segoe UI, sans-serif" font-size="36" fill="#E0F2F1" text-anchor="middle">2024-06</text>
  <!-- 프레임 3: 2024-07 (하이라이트) -->
  <rect x="494" y="298" width="180" height="154" rx="8" fill="white" opacity="0.98" stroke="#FFD700" stroke-width="8"/>
  <defs>
    <linearGradient id="f3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26C6DA"/>
      <stop offset="100%" style="stop-color:#00ACC1"/>
    </linearGradient>
  </defs>
  <rect x="504" y="308" width="160" height="118" rx="6" fill="url(#f3)"/>
  <!-- 사진 안에 카메라 아이콘 -->
  <rect x="542" y="338" width="84" height="58" rx="10" fill="white" opacity="0.3"/>
  <circle cx="584" cy="360" r="20" fill="white" opacity="0.6"/>
  <text x="584" y="484" font-family="Segoe UI, sans-serif" font-size="36" font-weight="bold" fill="#006064" text-anchor="middle">2024-07</text>
  <!-- 프레임 4: 2024-08 -->
  <rect x="700" y="320" width="160" height="130" rx="8" fill="white" opacity="0.92"/>
  <defs>
    <linearGradient id="f4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#80DEEA"/>
      <stop offset="100%" style="stop-color:#4DD0E1"/>
    </linearGradient>
  </defs>
  <rect x="708" y="328" width="144" height="98" rx="6" fill="url(#f4)"/>
  <text x="780" y="474" font-family="Segoe UI, sans-serif" font-size="36" fill="#E0F7FA" text-anchor="middle">2024-08</text>
  <!-- Layer 3: 화살표 방향 (시간 흐름) + 레이블 -->
  <path d="M 140 720 L 880 720" stroke="white" stroke-width="16" stroke-linecap="round" stroke-dasharray="20,14" opacity="0.5"/>
  <path d="M 856 690 L 894 720 L 856 750" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <text x="512" y="880" font-family="Segoe UI, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">Photo Timeline</text>
</svg>
