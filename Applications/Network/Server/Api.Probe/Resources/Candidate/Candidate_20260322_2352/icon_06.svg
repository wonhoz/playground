<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#0A0A0A"/>
  <!-- Terminal window -->
  <rect x="120" y="180" width="784" height="560" rx="18" fill="#1A1A1A"/>
  <!-- Title bar -->
  <rect x="120" y="180" width="784" height="46" rx="18" fill="#2D2D2D"/>
  <rect x="120" y="206" width="784" height="20" fill="#2D2D2D"/>
  <circle cx="160" cy="203" r="9" fill="#EF4444"/>
  <circle cx="188" cy="203" r="9" fill="#F59E0B"/>
  <circle cx="216" cy="203" r="9" fill="#22C55E"/>
  <text x="512" y="210" font-family="Consolas,monospace" font-size="15" fill="#6B7280" text-anchor="middle">Terminal</text>
  <!-- Layer 2: curl command -->
  <text x="155" y="278" font-family="Consolas,monospace" font-size="22" fill="#22D3EE">$ curl \</text>
  <text x="175" y="314" font-family="Consolas,monospace" font-size="22" fill="#A78BFA">  -X POST \</text>
  <text x="175" y="350" font-family="Consolas,monospace" font-size="22" fill="#94A3B8">  -H </text>
  <text x="240" y="350" font-family="Consolas,monospace" font-size="22" fill="#86EFAC">'Content-Type: application/json' \</text>
  <text x="175" y="386" font-family="Consolas,monospace" font-size="22" fill="#94A3B8">  -d </text>
  <text x="240" y="386" font-family="Consolas,monospace" font-size="22" fill="#FDE68A">'{"key":"value"}' \</text>
  <text x="175" y="422" font-family="Consolas,monospace" font-size="22" fill="#60A5FA">  https://api.example.com</text>
  <!-- Divider -->
  <line x1="155" y1="445" x2="870" y2="445" stroke="#374151" stroke-width="1"/>
  <!-- Layer 3: Response output -->
  <text x="155" y="482" font-family="Consolas,monospace" font-size="20" fill="#4ADE80">{"status": "200", "ok": true}</text>
  <text x="155" y="516" font-family="Consolas,monospace" font-size="20" fill="#22D3EE">* Connection closed</text>
  <!-- Prompt line -->
  <text x="155" y="558" font-family="Consolas,monospace" font-size="22" fill="#22D3EE">$ </text>
  <rect x="185" y="540" width="12" height="22" fill="#22D3EE" opacity="0.8"/>
</svg>