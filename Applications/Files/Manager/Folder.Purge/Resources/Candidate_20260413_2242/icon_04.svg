<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
  <!-- Recycle bin body (trapezoidal) -->
  <path d="M 310,260 L 360,590 L 664,590 L 714,260 Z" fill="#9B59B6" stroke="#4A148C" stroke-width="16" stroke-linejoin="round"/>
  <!-- Bin vertical lines -->
  <line x1="426" y1="280" x2="414" y2="572" stroke="#7B1FA2" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="278" x2="512" y2="574" stroke="#7B1FA2" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="598" y1="280" x2="610" y2="572" stroke="#7B1FA2" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- Bin lid -->
  <rect x="278" y="228" width="468" height="42" rx="18" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  <!-- Lid handle -->
  <rect x="448" y="192" width="128" height="46" rx="14" fill="#9B59B6" stroke="#4A148C" stroke-width="12"/>
  <!-- Falling folders into bin (animated concept — static) -->
  <path d="M 370,160 L 370,228 Q 370,238 380,238 L 506,238 Q 516,238 516,228 L 516,176 Q 516,166 506,166 L 448,166 L 436,156 Q 432,152 426,152 L 380,152 Q 370,152 370,162 Z" fill="#FFD93D" stroke="#B8860B" stroke-width="12" opacity="0.7" transform="rotate(-12 440 195)"/>
  <path d="M 530,148 L 530,212 Q 530,222 540,222 L 660,222 Q 670,222 670,212 L 670,164 Q 670,154 660,154 L 606,154 L 594,144 Q 590,140 584,140 L 540,140 Q 530,140 530,150 Z" fill="#E91E63" stroke="#880E4F" stroke-width="12" opacity="0.6" transform="rotate(10 595 180)"/>
  <!-- DELETE badge -->
  <rect x="192" y="748" width="640" height="116" rx="36" fill="#6A1B9A" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#CE93D8" text-anchor="middle">DELETE</text>
</svg>
