<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark charcoal-slate -->
  <rect width="1024" height="1024" rx="200" fill="#111018"/>
  <!-- Card layer 3 (back, dimmer amber) -->
  <rect x="210" y="260" width="560" height="340" rx="24" fill="#2A1F08" stroke="#6D4C0F" stroke-width="10" transform="rotate(5 512 440)"/>
  <!-- Card layer 2 (middle, amber) -->
  <rect x="190" y="280" width="560" height="340" rx="24" fill="#3A2810" stroke="#F57F17" stroke-width="12" transform="rotate(-3 512 460)"/>
  <!-- Card layer 1 (front, bright amber/gold) -->
  <rect x="172" y="310" width="560" height="340" rx="24" fill="#4A3012" stroke="#FFB300" stroke-width="16"/>
  <!-- Terminal prompt lines on front card -->
  <rect x="210" y="360" width="100" height="22" rx="5" fill="#FFB300" opacity="0.9"/>
  <rect x="210" y="400" width="300" height="16" rx="4" fill="#FFE082" opacity="0.5"/>
  <rect x="210" y="430" width="220" height="16" rx="4" fill="#FFE082" opacity="0.35"/>
  <!-- Pink accent badge (session count) top-right -->
  <circle cx="760" cy="310" r="72" fill="#E91E8C" stroke="#FCE4EC" stroke-width="14"/>
  <!-- Three horizontal lines in badge (layers symbol) -->
  <rect x="728" y="284" width="64" height="12" rx="4" fill="white"/>
  <rect x="728" y="304" width="64" height="12" rx="4" fill="white"/>
  <rect x="728" y="324" width="64" height="12" rx="4" fill="white"/>
</svg>
