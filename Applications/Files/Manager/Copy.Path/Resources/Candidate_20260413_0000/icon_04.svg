<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor · 기하학 추상 · 백슬래시 ↔ 슬래시 변환 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFF0F6"/>
  <!-- 원형 테두리 -->
  <circle cx="512" cy="512" r="400" fill="#FFD1E8" stroke="#FF6BA8" stroke-width="16"/>
  <!-- 왼쪽 백슬래시 (크게) -->
  <g transform="translate(220 220)">
    <rect x="0" y="0" width="280" height="280" rx="36" fill="#FFFFFF" stroke="#E63946" stroke-width="14"/>
    <path d="M 60 60 L 220 220" stroke="#E63946" stroke-width="72" stroke-linecap="round"/>
  </g>
  <!-- 오른쪽 슬래시 -->
  <g transform="translate(520 520)">
    <rect x="0" y="0" width="280" height="280" rx="36" fill="#FFFFFF" stroke="#06A670" stroke-width="14"/>
    <path d="M 220 60 L 60 220" stroke="#06A670" stroke-width="72" stroke-linecap="round"/>
  </g>
  <!-- 변환 화살표 (큰 곡선) -->
  <path d="M 520 360 Q 640 400 660 500 Q 680 600 620 640" fill="none" stroke="#FFD93D" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 화살촉 -->
  <path d="M 560 680 L 640 660 L 620 560 Z" fill="#FFD93D" stroke="#C49B00" stroke-width="10" stroke-linejoin="round"/>
  <!-- 라벨 -->
  <text x="360" y="165" font-family="Arial Black, sans-serif" font-weight="900" font-size="90" fill="#E63946" text-anchor="middle">\</text>
  <text x="660" y="920" font-family="Arial Black, sans-serif" font-weight="900" font-size="90" fill="#06A670" text-anchor="middle">/</text>
</svg>
