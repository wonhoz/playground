  <path d="M 512,610 Q 455,580 445,540 Q 475,545 512,570" fill="#4ADE80" stroke="#22C55E" stroke-width="8"/>
  <path d="M 512,590 Q 569,560 579,520 Q 549,525 512,550" fill="#4ADE80" stroke="#22C55E" stroke-width="8"/>
  <!-- 새싹 라벨 -->
  <text x="512" y="770" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">SPROUT</text>
  <!-- 화살표 2 -->
  <path d="M 632,610 L 692,590" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <polygon points="692,590 669,580 674,608" fill="white"/>
