  <rect x="208" y="166" width="52" height="10" rx="3" fill="#FFB74D"/>
  <rect x="136" y="192" width="70" height="10" rx="3" fill="url(#key)"/>
  <rect x="214" y="192" width="8" height="10" rx="3" fill="#888"/>
  <rect x="232" y="192" width="110" height="10" rx="3" fill="url(#val)"/>
  <rect x="136" y="218" width="54" height="10" rx="3" fill="url(#key)"/>
