<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | ZIP 파일 열면 나타나는 파일 트리 UI — 폴더/파일/크기/압축률 | 공간/장면 | 하늘+파랑+주황 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Main window -->
  <rect x="70" y="100" width="884" height="820" rx="20" fill="white" filter="url(#sh1)"/>
  <!-- Title bar -->
  <rect x="70" y="100" width="884" height="60" rx="20" fill="#1565C0"/>
  <rect x="70" y="136" width="884" height="24" fill="#1565C0"/>
  <text x="512" y="131" font-family="Arial Black, sans-serif" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">Zip.Peek — archive.zip</text>

  <!-- Column headers -->
  <rect x="86" y="180" width="852" height="36" fill="#E3F2FD" rx="6"/>
  <text x="120" y="198" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        dominant-baseline="middle">이름</text>
  <text x="640" y="198" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        dominant-baseline="middle">크기</text>
  <text x="740" y="198" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        dominant-baseline="middle">압축 후</text>
  <text x="860" y="198" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        dominant-baseline="middle">절감</text>

  <!-- Tree rows -->
  <!-- Root folder -->
  <rect x="86" y="220" width="852" height="46" fill="#EFF8FF" rx="4"/>
  <text x="110" y="243" font-family="Arial, sans-serif" font-size="22" fill="#1565C0"
        dominant-baseline="middle">📁</text>
  <text x="140" y="243" font-family="Arial Black, sans-serif" font-size="18" fill="#1565C0"
        dominant-baseline="middle">📦  archive.zip</text>
  <text x="632" y="243" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">48.3 MB</text>
  <text x="732" y="243" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">12.1 MB</text>
  <text x="852" y="243" font-family="Consolas, monospace" font-size="18" fill="#43A047"
        dominant-baseline="middle">75%</text>

  <!-- Subfolder: src -->
  <rect x="86" y="268" width="852" height="44" rx="4"/>
  <text x="148" y="290" font-family="Arial, sans-serif" font-size="20" fill="#FF6F00"
        dominant-baseline="middle">📁  src/</text>
  <text x="632" y="290" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">22.1 MB</text>
  <text x="732" y="290" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">5.8 MB</text>
  <text x="852" y="290" font-family="Consolas, monospace" font-size="18" fill="#43A047"
