<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Drum Kit: bass drum + hi-hat -->
  <ellipse cx="512" cy="650" rx="220" ry="150" fill="none" stroke="#3F51B5" stroke-width="32"/>
  <ellipse cx="512" cy="640" rx="220" ry="140" fill="#0a0e2a"/>
  <ellipse cx="512" cy="640" rx="180" ry="110" fill="none" stroke="#7986CB" stroke-width="16"/>
  <line x1="292" y1="640" x2="732" y2="640" stroke="#3F51B5" stroke-width="20"/>
  <!-- hi-hat cymbals -->
  <ellipse cx="310" cy="380" rx="90" ry="18" fill="#3F51B5"/>
  <ellipse cx="310" cy="350" rx="90" ry="18" fill="#7986CB"/>
  <line x1="310" y1="368" x2="310" y2="550" stroke="#3F51B5" stroke-width="14"/>
  <!-- snare drum -->
  <ellipse cx="730" cy="480" rx="90" ry="50" fill="none" stroke="#7986CB" stroke-width="20"/>
  <line x1="640" y1="480" x2="820" y2="480" stroke="#3F51B5" stroke-width="10"/>
  <!-- drumstick -->
  <line x1="660" y1="310" x2="750" y2="430" stroke="#7986CB" stroke-width="18" stroke-linecap="round"/>
  <circle cx="655" cy="302" r="18" fill="#7986CB"/>
</svg>