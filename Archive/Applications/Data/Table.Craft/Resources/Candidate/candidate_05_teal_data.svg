<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Database cylinder top -->
  <ellipse cx="256" cy="148" rx="160" ry="40" fill="#00695C" stroke="#80CBC4" stroke-width="8"/>
  <!-- Database cylinder body -->
  <rect x="96" y="148" width="320" height="216" fill="#00796B" stroke="none"/>
  <line x1="96" y1="148" x2="96" y2="364" stroke="#80CBC4" stroke-width="8"/>
  <line x1="416" y1="148" x2="416" y2="364" stroke="#80CBC4" stroke-width="8"/>
  <!-- Database cylinder bottom -->
  <ellipse cx="256" cy="364" rx="160" ry="40" fill="#00695C" stroke="#80CBC4" stroke-width="8"/>
  <!-- Table rows inside DB -->
  <ellipse cx="256" cy="212" rx="140" ry="24" fill="none" stroke="#80CBC4" stroke-width="5" opacity="0.8"/>
  <ellipse cx="256" cy="276" rx="140" ry="24" fill="none" stroke="#80CBC4" stroke-width="5" opacity="0.8"/>
  <!-- Data labels -->
  <rect x="160" y="200" width="60" height="10" rx="5" fill="#E0F2F1" opacity="0.8"/>
  <rect x="270" y="200" width="60" height="10" rx="5" fill="#E0F2F1" opacity="0.8"/>
  <rect x="160" y="264" width="60" height="10" rx="5" fill="#E0F2F1" opacity="0.7"/>
  <rect x="270" y="264" width="40" height="10" rx="5" fill="#E0F2F1" opacity="0.7"/>
  <rect x="160" y="134" width="80" height="10" rx="5" fill="#E0F2F1" opacity="0.9"/>
</svg>
