  <rect x="470" y="190" width="130" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="610" y="190" width="130" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="750" y="190" width="80" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="190" y="330" width="130" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="750" y="330" width="80" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="190" y="470" width="130" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="750" y="470" width="80" height="130" rx="6" fill="#1565C0" opacity="0.3"/>
