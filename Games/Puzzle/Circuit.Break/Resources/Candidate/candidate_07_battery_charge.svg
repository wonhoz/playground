<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <linearGradient id="charge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00ff44"/>
      <stop offset="60%" stop-color="#88ff00"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Battery body -->
  <rect x="136" y="160" width="240" height="192" rx="16" fill="#0a1a2a" stroke="#00aaff" stroke-width="5"/>
  <!-- Battery positive terminal -->
  <rect x="260" y="136" width="36" height="28" rx="8" fill="#00aaff"/>
  <!-- Charge level fill -->
  <rect x="148" y="302" width="216" height="40" rx="8" fill="url(#charge)" opacity="0.9" filter="url(#glow)"/>
  <rect x="148" y="254" width="160" height="40" rx="8" fill="url(#charge)" opacity="0.7"/>
  <!-- Faint remaining -->
  <rect x="148" y="172" width="216" height="76" rx="8" fill="#001122" opacity="0.5"/>
  <!-- Level lines -->
  <line x1="148" y1="250" x2="364" y2="250" stroke="#002244" stroke-width="2"/>
  <line x1="148" y1="302" x2="364" y2="302" stroke="#002244" stroke-width="2"/>
  <!-- Lightning bolt overlay -->
  <polygon points="285,175 255,248 272,248 242,330 295,255 275,255 305,175" fill="#ffcc00" filter="url(#glow)" opacity="0.9"/>
  <!-- Circuit paths from battery -->
  <line x1="80" y1="256" x2="136" y2="256" stroke="#00aaff" stroke-width="4" filter="url(#glow)"/>
  <line x1="376" y1="256" x2="432" y2="256" stroke="#00aaff" stroke-width="4" filter="url(#glow)"/>
  <circle cx="96" cy="256" r="8" fill="#00aaff" filter="url(#glow)"/>
  <circle cx="416" cy="256" r="8" fill="#00aaff" filter="url(#glow)"/>
  <!-- Broken section -->
  <line x1="376" y1="320" x2="420" y2="320" stroke="#ff4400" stroke-width="4" stroke-dasharray="8 5"/>
  <line x1="80" y1="320" x2="136" y2="320" stroke="#ff4400" stroke-width="4" stroke-dasharray="8 5"/>
</svg>