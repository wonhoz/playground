<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 스마트폰 카메라가 QR 찍으면 URL/WiFi가 뜨는 장면 — 스캔 결과 | 대각선/동적 | 파랑+초록+흰 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1A237E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- QR Code (left, being scanned) -->
  <rect x="90" y="250" width="380" height="380" rx="14" fill="white" filter="url(#sh5)"/>
  <!-- Finder pattern TL -->
  <rect x="106" y="266" width="84" height="84" rx="6" fill="#1A237E"/>
  <rect x="118" y="278" width="60" height="60" rx="4" fill="white"/>
  <rect x="130" y="290" width="36" height="36" rx="2" fill="#1A237E"/>
  <!-- Finder pattern TR -->
  <rect x="370" y="266" width="84" height="84" rx="6" fill="#1A237E"/>
  <rect x="382" y="278" width="60" height="60" rx="4" fill="white"/>
  <rect x="394" y="290" width="36" height="36" rx="2" fill="#1A237E"/>
  <!-- Finder pattern BL -->
  <rect x="106" y="530" width="84" height="84" rx="6" fill="#1A237E"/>
  <rect x="118" y="542" width="60" height="60" rx="4" fill="white"/>
  <rect x="130" y="554" width="36" height="36" rx="2" fill="#1A237E"/>

  <!-- Data modules (colorful) -->
  <rect x="218" y="266" width="124" height="124" rx="6" fill="#F5F5F5"/>
  <rect x="224" y="272" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="238" y="272" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="252" y="272" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="224" y="286" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="266" y="286" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="224" y="300" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="238" y="300" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="252" y="300" width="10" height="10" rx="2" fill="#3949AB"/>
  <rect x="106" y="378" width="348" height="124" rx="6" fill="#F5F5F5"/>
  <rect x="218" y="530" width="248" height="84" rx="6" fill="#F5F5F5"/>

  <!-- Scan laser line (green) -->
  <rect x="90" y="425" width="380" height="8" rx="4" fill="#00E676" filter="url(#sh5)" opacity="0.9"/>
  <!-- Scan corner markers -->
  <path d="M90,250 L90,290 M90,250 L130,250" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"/>
  <path d="M430,250 L390,250 M430,250 L430,290" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"/>
  <path d="M90,630 L90,590 M90,630 L130,630" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"/>
  <path d="M430,630 L390,630 M430,630 L430,590" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"/>

  <!-- Arrow pointing right (scan result) -->
  <polygon points="490,420 550,380 550,460" fill="#3949AB" filter="url(#sh5)"/>

  <!-- Scan result popup (right side) -->
  <!-- URL result -->
  <rect x="560" y="200" width="400" height="140" rx="18" fill="#43A047" filter="url(#sh5)"/>
  <text x="760" y="235" font-family="Arial, sans-serif" font-size="20" fill="#C8E6C9"
        text-anchor="middle">🔗 URL 열기</text>
  <text x="760" y="265" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle">https://example.com</text>
  <rect x="640" y="286" width="240" height="36" rx="10" fill="white" opacity="0.9"/>
  <text x="760" y="304" font-family="Arial Black, sans-serif" font-size="18" fill="#2E7D32"
        text-anchor="middle" dominant-baseline="middle">Chrome에서 열기</text>

  <!-- WiFi result -->
  <rect x="560" y="370" width="400" height="140" rx="18" fill="#1E88E5" filter="url(#sh5)"/>
  <text x="760" y="405" font-family="Arial, sans-serif" font-size="20" fill="#BBDEFB"
        text-anchor="middle">📶 WiFi 연결</text>
  <text x="760" y="435" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle">HomeNetwork (WPA2)</text>
  <rect x="640" y="456" width="240" height="36" rx="10" fill="white" opacity="0.9"/>
  <text x="760" y="474" font-family="Arial Black, sans-serif" font-size="18" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">바로 연결</text>

  <!-- VCard result -->
  <rect x="560" y="540" width="400" height="140" rx="18" fill="#7B1FA2" filter="url(#sh5)"/>
  <text x="760" y="575" font-family="Arial, sans-serif" font-size="20" fill="#E1BEE7"
        text-anchor="middle">👤 연락처 추가</text>
  <text x="760" y="605" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle">John Doe · +82-10-1234</text>
  <rect x="640" y="626" width="240" height="36" rx="10" fill="white" opacity="0.9"/>
  <text x="760" y="644" font-family="Arial Black, sans-serif" font-size="18" fill="#4A148C"
        text-anchor="middle" dominant-baseline="middle">연락처 저장</text>

  <!-- Bottom label -->
  <rect x="230" y="772" width="564" height="76" rx="24" fill="white" filter="url(#sh5)"/>
  <text x="512" y="810" font-family="Arial Black, sans-serif" font-size="40" fill="#1A237E"
        text-anchor="middle" dominant-baseline="middle">QR.Forge</text>
</svg>
