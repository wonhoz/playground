<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 방사형 브로드캐스트 빔 -->
  <path d="M 190 280 A 80 80 0 0 1 322 280" fill="none" stroke="#EF4444" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <path d="M 160 310 A 120 120 0 0 1 352 310" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.5"/>
  <path d="M 130 340 A 160 160 0 0 1 382 340" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.3"/>
  <path d="M 100 370 A 200 200 0 0 1 412 370" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.15"/>
  <!-- 마이크/송신기 -->
  <line x1="256" y1="280" x2="256" y2="420" stroke="#EF4444" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <rect x="232" y="400" width="48" height="10" rx="5" fill="#EF4444" opacity="0.6"/>
  <!-- 중앙 방송 원 -->
  <circle cx="256" cy="270" r="18" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="460" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">BROADCAST BURST</text>
</svg>
