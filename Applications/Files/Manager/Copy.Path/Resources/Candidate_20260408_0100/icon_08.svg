<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background: dark navy -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <!-- Explorer window silhouette -->
  <rect x="140" y="200" width="744" height="600" rx="16" fill="#1E3A5F" stroke="#2D5A8E" stroke-width="6"/>

  <!-- Title bar -->
  <rect x="140" y="200" width="744" height="48" rx="16" fill="#0F2744"/>
  <rect x="140" y="228" width="744" height="20" fill="#0F2744"/>
  <!-- Window control dots -->
  <circle cx="192" cy="224" r="10" fill="#EF4444" opacity="0.8"/>
  <circle cx="226" cy="224" r="10" fill="#F59E0B" opacity="0.8"/>
  <circle cx="260" cy="224" r="10" fill="#22C55E" opacity="0.8"/>
  <!-- Window title -->
  <text x="512" y="231" font-family="Arial,sans-serif" font-size="20" fill="#93C5FD" text-anchor="middle" opacity="0.8">File Explorer</text>

  <!-- Address bar -->
  <rect x="160" y="264" width="664" height="44" rx="8" fill="#0D1B2A"/>
  <rect x="160" y="264" width="664" height="44" rx="8" stroke="#2563EB" stroke-width="3" fill="none"/>
  <!-- Path text in address bar -->
  <text x="182" y="293" font-family="Consolas,monospace" font-size="24" fill="#93C5FD">C:\Users\admin\Documents</text>

  <!-- Left panel (nav) -->
  <rect x="160" y="324" width="190" height="456" rx="6" fill="#0F2744"/>
  <rect x="172" y="344" width="166" height="30" rx="4" fill="#1D4ED8"/>
  <text x="186" y="365" font-family="Arial,sans-serif" font-size="20" fill="white">Desktop</text>
  <text x="186" y="403" font-family="Arial,sans-serif" font-size="20" fill="#64748B">Downloads</text>
  <text x="186" y="435" font-family="Arial,sans-serif" font-size="20" fill="#64748B">Documents</text>
  <text x="186" y="467" font-family="Arial,sans-serif" font-size="20" fill="#64748B">Pictures</text>

  <!-- File list area -->
  <rect x="364" y="324" width="500" height="456" rx="6" fill="#0D1B2A"/>

  <!-- File rows -->
  <rect x="374" y="340" width="480" height="40" rx="4" fill="#1D4ED8" opacity="0.6"/>
  <text x="416" y="366" font-family="Arial,sans-serif" font-size="22" fill="white">report.pdf</text>
  <rect x="374" y="390" width="480" height="40" rx="4" fill="transparent"/>
  <text x="416" y="416" font-family="Arial,sans-serif" font-size="22" fill="#64748B">project.zip</text>
  <rect x="374" y="440" width="480" height="40" rx="4" fill="transparent"/>
  <text x="416" y="466" font-family="Arial,sans-serif" font-size="22" fill="#64748B">notes.txt</text>

  <!-- Selected file icon -->
  <rect x="374" y="340" width="40" height="40" rx="4" fill="transparent"/>
  <text x="388" y="367" font-family="Arial,sans-serif" font-size="26" fill="#60A5FA">📄</text>

  <!-- Big green copy arrow badge -->
  <circle cx="808" cy="760" r="100" fill="#22C55E"/>
  <circle cx="808" cy="760" r="84" fill="#16A34A"/>
  <!-- Arrow pointing right (copy out) -->
  <line x1="758" y1="760" x2="830" y2="760" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <polygon points="822,726 874,760 822,794" fill="white"/>
  <!-- Small path symbol -->
  <text x="808" y="792" font-family="Consolas,monospace" font-size="20" fill="white" text-anchor="middle" opacity="0.8">\</text>
</svg>
