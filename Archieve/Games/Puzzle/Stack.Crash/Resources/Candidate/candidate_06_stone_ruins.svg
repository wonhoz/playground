<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#2A2218"/>
    </linearGradient>
    <linearGradient id="stone1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B8B8B"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="stone2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9E9E7E"/>
      <stop offset="100%" stop-color="#666650"/>
    </linearGradient>
    <linearGradient id="stone3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8957A"/>
      <stop offset="100%" stop-color="#6B5E4A"/>
    </linearGradient>
    <linearGradient id="crack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dusty ground -->
  <rect x="60" y="415" width="392" height="30" rx="5" fill="#3A3020"/>
  <!-- Stone blocks with texture -->
  <rect x="108" y="328" width="296" height="62" rx="4" fill="url(#stone1)"/>
  <!-- Mortar lines -->
  <line x1="200" y1="328" x2="200" y2="390" stroke="#333" stroke-width="2" opacity="0.5"/>
  <line x1="312" y1="328" x2="312" y2="390" stroke="#333" stroke-width="2" opacity="0.5"/>
  <rect x="136" y="262" width="240" height="62" rx="4" fill="url(#stone2)"/>
  <line x1="220" y1="262" x2="220" y2="324" stroke="#444" stroke-width="2" opacity="0.5"/>
  <line x1="316" y1="262" x2="316" y2="324" stroke="#444" stroke-width="2" opacity="0.5"/>
  <rect x="172" y="196" width="168" height="62" rx="4" fill="url(#stone3)"/>
  <line x1="256" y1="196" x2="256" y2="258" stroke="#555" stroke-width="2" opacity="0.5"/>
  <!-- Crumbling top block -->
  <g transform="translate(256, 160) rotate(-25)">
    <rect x="-76" y="-26" width="152" height="50" rx="4" fill="#AAAAAA"/>
    <!-- crack glow -->
    <line x1="-20" y1="-26" x2="-30" y2="24" stroke="url(#crack)" stroke-width="3"/>
    <line x1="20" y1="-26" x2="30" y2="24" stroke="url(#crack)" stroke-width="2"/>
  </g>
  <!-- Stone chunks falling -->
  <rect x="340" y="112" width="30" height="22" rx="3" fill="#8B8B8B" transform="rotate(20, 355, 123)"/>
  <rect x="376" y="136" width="20" height="16" rx="2" fill="#9E9E7E" transform="rotate(-30, 386, 144)"/>
  <rect x="310" y="95" width="18" height="14" rx="2" fill="#A8957A" transform="rotate(45, 319, 102)"/>
  <rect x="355" y="80" width="14" height="10" rx="2" fill="#888" transform="rotate(-15, 362, 85)"/>
  <!-- Dust cloud -->
  <circle cx="356" cy="168" r="24" fill="#AAAAAA" opacity="0.12"/>
  <circle cx="340" cy="155" r="16" fill="#BBBBAA" opacity="0.1"/>
</svg>
