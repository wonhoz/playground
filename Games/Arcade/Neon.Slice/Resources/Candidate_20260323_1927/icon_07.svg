<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="cyanGlow07">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="60%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg07)"/>
  <!-- Knife/sword silhouette -->
  <!-- Blade -->
  <polygon points="520,200 480,200 310,760 420,760" fill="url(#bladeGrad)" stroke="#E2E8F0" stroke-width="6" stroke-linejoin="round"/>
  <!-- Blade edge highlight -->
  <line x1="480" y1="200" x2="310" y2="760" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <!-- Guard (crossguard) -->
  <rect x="300" y="750" width="180" height="34" rx="17" fill="#64748B" stroke="#94A3B8" stroke-width="6"/>
  <!-- Handle -->
  <rect x="360" y="784" width="60" height="140" rx="16" fill="#374151" stroke="#64748B" stroke-width="8"/>
  <!-- Handle grip lines -->
  <line x1="368" y1="810" x2="412" y2="810" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <line x1="368" y1="840" x2="412" y2="840" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <line x1="368" y1="870" x2="412" y2="870" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <!-- Pommel -->
  <ellipse cx="390" cy="924" rx="42" ry="22" fill="#475569" stroke="#94A3B8" stroke-width="8"/>
  <!-- Cyan neon glow on blade edge -->
  <line x1="520" y1="200" x2="420" y2="760" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#cyanGlow07)" opacity="0.9"/>
  <!-- Cyan blade tip glow -->
  <ellipse cx="500" cy="210" rx="24" ry="14" fill="#00FFFF" filter="url(#cyanGlow07)" opacity="0.8"/>
  <!-- Neon particles off blade -->
  <circle cx="560" cy="300" r="10" fill="#00FFFF" filter="url(#cyanGlow07)" opacity="0.8"/>
  <circle cx="580" cy="420" r="8" fill="#00FFFF" filter="url(#cyanGlow07)" opacity="0.6"/>
  <circle cx="560" cy="540" r="10" fill="#00FFFF" filter="url(#cyanGlow07)" opacity="0.7"/>
  <circle cx="550" cy="660" r="8" fill="#00FFFF" filter="url(#cyanGlow07)" opacity="0.5"/>
  <!-- Right side neon sparks -->
  <circle cx="640" cy="360" r="8" fill="#00FFFF" opacity="0.5"/>
  <circle cx="680" cy="480" r="6" fill="#00FFFF" opacity="0.4"/>
  <circle cx="240" cy="500" r="8" fill="#00FFFF" opacity="0.4"/>
  <circle cx="210" cy="620" r="6" fill="#00FFFF" opacity="0.3"/>
</svg>