<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Window (being diagnosed) -->
  <rect x="280" y="240" width="464" height="340" rx="20" fill="#0D47A1" opacity="0.6"/>
  <rect x="280" y="240" width="464" height="46" rx="14" fill="#0D47A1" opacity="0.9"/>
  <circle cx="310" cy="263" r="10" fill="#42A5F5" opacity="0.7"/>
  <circle cx="338" cy="263" r="10" fill="#42A5F5" opacity="0.5"/>
