<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | URL/WiFi/VCard 타입 QR 코드 카드들 | 레이어드 | 민트+초록+파랑 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#004D40" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Card 1: URL (back, offset) -->
  <rect x="180" y="180" width="660" height="560" rx="24" fill="#80CBC4" filter="url(#sh2)" opacity="0.5"/>

  <!-- Card 2: WiFi (middle) -->
  <rect x="140" y="220" width="660" height="560" rx="24" fill="#1E88E5" filter="url(#sh2)" opacity="0.8"/>
  <!-- WiFi label -->
  <rect x="162" y="244" width="100" height="32" rx="10" fill="white" opacity="0.9"/>
  <text x="212" y="260" font-family="Arial Black, sans-serif" font-size="18" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">WiFi</text>
  <!-- WiFi icon -->
  <text x="470" y="450" font-family="Arial, sans-serif" font-size="100" fill="white"
        text-anchor="middle" dominant-baseline="middle" opacity="0.4">📶</text>
  <!-- Small QR in WiFi card -->
  <rect x="560" y="310" width="200" height="200" rx="10" fill="white" opacity="0.9"/>
  <rect x="572" y="322" width="52" height="52" rx="4" fill="#1E88E5"/>
  <rect x="580" y="330" width="36" height="36" rx="2" fill="white"/>
  <rect x="588" y="338" width="20" height="20" rx="1" fill="#1E88E5"/>
  <rect x="632" y="322" width="52" height="52" rx="4" fill="#1E88E5"/>
  <rect x="640" y="330" width="36" height="36" rx="2" fill="white"/>
  <rect x="648" y="338" width="20" height="20" rx="1" fill="#1E88E5"/>
  <rect x="572" y="382" width="52" height="52" rx="4" fill="#1E88E5"/>
  <rect x="580" y="390" width="36" height="36" rx="2" fill="white"/>
  <rect x="588" y="398" width="20" height="20" rx="1" fill="#1E88E5"/>
  <!-- WiFi data -->
  <text x="162" y="310" font-family="Consolas, monospace" font-size="18" fill="white">SSID: HomeNetwork</text>
  <text x="162" y="338" font-family="Consolas, monospace" font-size="18" fill="#B3E5FC">PW: ••••••••</text>
  <text x="162" y="366" font-family="Consolas, monospace" font-size="18" fill="#B3E5FC">Type: WPA2</text>

  <!-- Card 3: URL (front) -->
  <rect x="100" y="260" width="660" height="560" rx="24" fill="#00695C" filter="url(#sh2)"/>
  <!-- URL label -->
  <rect x="122" y="284" width="90" height="32" rx="10" fill="#FF6F00"/>
  <text x="167" y="300" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">URL</text>
  <!-- URL text -->
  <text x="122" y="344" font-family="Consolas, monospace" font-size="18" fill="#80CBC4">https://example.com</text>

  <!-- QR code in URL card -->
  <rect x="122" y="368" width="200" height="200" rx="10" fill="white" opacity="0.95"/>
  <!-- Simplified QR dots -->
  <rect x="134" y="380" width="52" height="52" rx="4" fill="#00695C"/>
  <rect x="142" y="388" width="36" height="36" rx="2" fill="white"/>
  <rect x="150" y="396" width="20" height="20" rx="1" fill="#00695C"/>
  <rect x="194" y="380" width="52" height="52" rx="4" fill="#00695C"/>
  <rect x="202" y="388" width="36" height="36" rx="2" fill="white"/>
  <rect x="210" y="396" width="20" height="20" rx="1" fill="#00695C"/>
  <rect x="134" y="440" width="52" height="52" rx="4" fill="#00695C"/>
  <rect x="142" y="448" width="36" height="36" rx="2" fill="white"/>
  <rect x="150" y="456" width="20" height="20" rx="1" fill="#00695C"/>
  <!-- Data dots -->
  <rect x="196" y="440" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="210" y="440" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="224" y="440" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="196" y="454" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="224" y="454" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="196" y="468" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="210" y="468" width="10" height="10" rx="2" fill="#00695C"/>
  <rect x="134" y="502" width="176" height="10" rx="3" fill="#00695C" opacity="0.6"/>
  <rect x="134" y="516" width="140" height="10" rx="3" fill="#00695C" opacity="0.5"/>
  <rect x="134" y="530" width="176" height="10" rx="3" fill="#00695C" opacity="0.6"/>

  <!-- VCard chip -->
  <rect x="340" y="380" width="400" height="180" rx="14" fill="white" opacity="0.15"/>
  <text x="540" y="430" font-family="Arial, sans-serif" font-size="22" fill="white">👤 VCard</text>
  <text x="540" y="460" font-family="Consolas, monospace" font-size="16" fill="#80CBC4">Name: John Doe</text>
  <text x="540" y="484" font-family="Consolas, monospace" font-size="16" fill="#80CBC4">Tel: +82-10-1234</text>
  <text x="540" y="508" font-family="Consolas, monospace" font-size="16" fill="#80CBC4">Email: john@mail</text>

  <!-- Bottom -->
  <rect x="120" y="756" width="580" height="36" rx="14" fill="#FF6F00" filter="url(#sh2)"/>
  <text x="410" y="774" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">URL · WiFi · VCard · Text</text>
</svg>
