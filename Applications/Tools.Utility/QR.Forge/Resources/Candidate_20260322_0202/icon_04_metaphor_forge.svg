  <rect x="630" y="200" width="40" height="200" rx="10" fill="#8B4513"/>
  <rect x="638" y="200" width="12" height="200" rx="5" fill="#A0522D" opacity="0.6"/>

  <!-- QR 코드 (아래, 망치로 찍히는 모루 위) -->
  <!-- 모루 모양 -->
  <ellipse cx="400" cy="730" rx="250" ry="50" fill="#3A2A10" opacity="0.6"/>
  <rect x="200" y="680" width="400" height="70" rx="20" fill="url(#qrAnvil)"/>
  <rect x="150" y="740" width="500" height="40" rx="12" fill="#2A1E0A"/>

  <!-- QR 코드 패널 (모루 위) -->
  <rect x="190" y="360" width="420" height="420" rx="16" fill="#FAFAF0"/>

