<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a2a0a"/>
      <stop offset="100%" stop-color="#061206"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Arcade cabinet outer -->
  <rect x="130" y="60" width="252" height="390" rx="20" fill="#1a0a2e" stroke="#7c4dff" stroke-width="3"/>
  <!-- Cabinet top curve -->
  <rect x="140" y="60" width="232" height="60" rx="16" fill="#0d001a" stroke="#7c4dff" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="155" y="125" width="202" height="175" rx="8" fill="#0d001a" stroke="#e040fb" stroke-width="2"/>
  <!-- Screen content -->
  <rect x="163" y="133" width="186" height="159" rx="4" fill="url(#screenGrad)"/>
  <!-- Game scene on screen (pixelated fighters) -->
  <!-- Fighter L pixel art small -->
  <rect x="180" y="155" width="14" height="14" fill="#00e5ff"/>
  <rect x="180" y="169" width="14" height="18" fill="#29b6f6"/>
  <rect x="194" y="169" width="20" height="10" fill="#29b6f6"/>
  <rect x="180" y="187" width="8" height="24" fill="#0288d1"/>
  <rect x="190" y="187" width="8" height="24" fill="#0288d1"/>
  <!-- Fighter R pixel art small -->
  <rect x="284" y="155" width="14" height="14" fill="#ef9a9a"/>
  <rect x="284" y="169" width="14" height="18" fill="#ef5350"/>
  <rect x="270" y="169" width="14" height="10" fill="#ef5350"/>
  <rect x="284" y="187" width="8" height="24" fill="#c62828"/>
  <rect x="292" y="187" width="8" height="24" fill="#c62828"/>
  <!-- Score display on screen -->
  <text x="190" y="150" font-family="'Courier New', monospace" font-size="9" fill="#4caf50">1P:08540</text>
  <text x="295" y="150" font-family="'Courier New', monospace" font-size="9" fill="#4caf50" text-anchor="end">2P:04320</text>
  <!-- VS on screen -->
  <text x="238" y="190" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#ffee58" text-anchor="middle">VS</text>
  <!-- FIGHT! text on screen -->
  <text x="238" y="268" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#ff1744" text-anchor="middle">FIGHT!</text>
  <!-- Health bars on screen -->
  <rect x="168" y="280" width="60" height="7" rx="3" fill="#4caf50"/>
  <rect x="250" y="280" width="40" height="7" rx="3" fill="#f44336"/>
  <!-- Cabinet controls -->
  <rect x="160" y="315" width="192" height="95" rx="6" fill="#0d001a" stroke="#7c4dff" stroke-width="1.5"/>
  <!-- D-pad -->
  <rect x="185" y="335" width="15" height="40" rx="3" fill="#7c4dff"/>
  <rect x="177" y="343" width="31" height="15" rx="3" fill="#7c4dff"/>
  <!-- Buttons -->
  <circle cx="310" cy="340" r="12" fill="#ff1744"/>
  <circle cx="338" cy="338" r="12" fill="#00e5ff"/>
  <circle cx="324" cy="362" r="12" fill="#ffee58"/>
  <circle cx="352" cy="360" r="12" fill="#4caf50"/>
  <!-- Insert coin -->
  <text x="256" y="468" font-family="'Courier New', monospace" font-size="13" fill="#e040fb" text-anchor="middle">INSERT COIN</text>
</svg>
