<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large neon letters A / 가 -->
  <text x="146" y="310" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" fill="none" stroke="#00FFFF" stroke-width="4" filter="url(#neon)" opacity="0.9">A</text>
  <text x="280" y="310" font-family="'Malgun Gothic', Arial, sans-serif" font-size="160" font-weight="900" fill="none" stroke="#FF00FF" stroke-width="4" filter="url(#neon)" opacity="0.9">가</text>
  <!-- Translation connector -->
  <line x1="200" y1="320" x2="260" y2="320" stroke="#FFD600" stroke-width="5" stroke-linecap="round" filter="url(#neon)"/>
  <polygon points="255,313 270,320 255,327" fill="#FFD600" filter="url(#neon)"/>
  <!-- Decorative small letters -->
  <text x="90" y="130" font-family="monospace" font-size="24" fill="#00FFFF" opacity="0.4" filter="url(#neon)">en</text>
  <text x="390" y="130" font-family="monospace" font-size="24" fill="#FF00FF" opacity="0.4" filter="url(#neon)">ko</text>
  <text x="90" y="400" font-family="monospace" font-size="20" fill="#69F0AE" opacity="0.35" filter="url(#neon)">ja</text>
  <text x="390" y="400" font-family="monospace" font-size="20" fill="#FFD600" opacity="0.35" filter="url(#neon)">fr</text>
  <!-- Corner brackets -->
  <path d="M68,68 L68,120 M68,68 L120,68" stroke="#00FFFF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#neon)"/>
  <path d="M444,68 L444,120 M444,68 L392,68" stroke="#FF00FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#neon)"/>
  <path d="M68,444 L68,392 M68,444 L120,444" stroke="#69F0AE" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#neon)"/>
  <path d="M444,444 L444,392 M444,444 L392,444" stroke="#FFD600" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#neon)"/>
</svg>
