<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Morse dots and dashes -->
  <circle cx="200" cy="400" r="36" fill="#F57F17"/>
  <rect x="280" y="366" width="160" height="68" rx="34" fill="#F57F17"/>
  <circle cx="500" cy="400" r="36" fill="#F57F17"/>
  <rect x="580" y="366" width="240" height="68" rx="34" fill="#FFD54F"/>
  <!-- Running figure -->
  <circle cx="580" cy="620" r="50" fill="#FFD54F"/>
  <!-- Body -->
  <line x1="580" y1="670" x2="580" y2="790" stroke="#FFD54F" stroke-width="28" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="580" y1="710" x2="500" y2="760" stroke="#FFD54F" stroke-width="22" stroke-linecap="round"/>
  <line x1="580" y1="710" x2="660" y2="680" stroke="#FFD54F" stroke-width="22" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="580" y1="790" x2="510" y2="880" stroke="#F57F17" stroke-width="22" stroke-linecap="round"/>
  <line x1="580" y1="790" x2="650" y2="850" stroke="#F57F17" stroke-width="22" stroke-linecap="round"/>
  <!-- Trail dots -->
  <circle cx="380" cy="830" r="14" fill="#F57F17" fill-opacity="0.6"/>
  <circle cx="330" cy="840" r="10" fill="#F57F17" fill-opacity="0.4"/>
  <circle cx="290" cy="848" r="7" fill="#F57F17" fill-opacity="0.25"/>
</svg>