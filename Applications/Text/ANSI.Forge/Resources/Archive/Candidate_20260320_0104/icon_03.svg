<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 불꽃+문자: flame made of character blocks -->
  <!-- Character blocks forming a flame shape -->
  <!-- Base row (wide) -->
  <rect x="300" y="720" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="370" y="720" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="440" y="720" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="510" y="720" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="580" y="720" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="650" y="720" width="60" height="60" rx="4" fill="#CE93D8"/>
  <!-- Row 2 -->
  <rect x="300" y="650" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="370" y="650" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="440" y="650" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="510" y="650" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="580" y="650" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="650" y="650" width="60" height="60" rx="4" fill="#4A148C"/>
  <!-- Row 3 (narrower) -->
  <rect x="330" y="580" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="400" y="580" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="470" y="580" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.7"/>
  <rect x="540" y="580" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="610" y="580" width="60" height="60" rx="4" fill="#CE93D8"/>
  <!-- Row 4 -->
  <rect x="360" y="510" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="430" y="510" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="500" y="510" width="60" height="60" rx="4" fill="#CE93D8"/>
  <rect x="570" y="510" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.5"/>
  <!-- Row 5 -->
  <rect x="390" y="440" width="60" height="60" rx="4" fill="#4A148C"/>
  <rect x="460" y="440" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.8"/>
  <rect x="530" y="440" width="60" height="60" rx="4" fill="#CE93D8"/>
  <!-- Row 6 (tip) -->
  <rect x="420" y="370" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.9"/>
  <rect x="490" y="370" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.6"/>
  <!-- Tip -->
  <rect x="450" y="300" width="60" height="60" rx="4" fill="#CE93D8" opacity="0.4"/>
</svg>