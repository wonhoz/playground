  <rect x="140" y="264" width="36" height="36" rx="4" fill="#BE185D" opacity="0.6"/>
  <rect x="60" y="304" width="36" height="36" rx="4" fill="#F97316" opacity="0.7"/>
  <rect x="100" y="304" width="36" height="36" rx="4" fill="#FB923C" opacity="0.65"/>
  <rect x="140" y="304" width="36" height="36" rx="4" fill="#F97316" opacity="0.6"/>
  <!-- 노랑/초록 그룹 -->
  <rect x="196" y="264" width="36" height="36" rx="4" fill="#FDE047" opacity="0.7"/>
  <rect x="236" y="264" width="36" height="36" rx="4" fill="#34D399" opacity="0.7" filter="url(#glow)"/>
  <rect x="276" y="264" width="36" height="36" rx="4" fill="#10B981" opacity="0.65"/>
