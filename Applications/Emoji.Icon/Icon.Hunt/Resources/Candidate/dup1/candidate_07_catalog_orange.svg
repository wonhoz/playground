<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e00"/>
      <stop offset="100%" style="stop-color:#2d1a00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Catalog book shape -->
  <rect x="60" y="80" width="300" height="360" rx="12" fill="#221400" stroke="#ff8800" stroke-width="3"/>
  <!-- Spine -->
  <rect x="60" y="80" width="30" height="360" rx="12" fill="#ff8800"/>
  <rect x="60" y="80" width="30" height="360" rx="6" fill="#ff8800"/>
  <!-- Tab markers on spine -->
  <rect x="80" y="130" width="30" height="20" rx="4" fill="#cc5500"/>
  <rect x="80" y="190" width="30" height="20" rx="4" fill="#cc5500"/>
  <rect x="80" y="250" width="30" height="20" rx="4" fill="#ffaa00"/>
  <rect x="80" y="310" width="30" height="20" rx="4" fill="#cc5500"/>
  <!-- Page content - icon entries -->
  <text x="105" y="130" font-family="serif" font-size="22">⭐</text>
  <text x="140" y="128" font-family="sans-serif" font-size="13" fill="#ffaa44">star / favorite</text>
  <line x1="105" y1="136" x2="340" y2="136" stroke="#331a00" stroke-width="1"/>
  <text x="105" y="166" font-family="serif" font-size="22">🔍</text>
  <text x="140" y="164" font-family="sans-serif" font-size="13" fill="#ffaa44">search / find</text>
  <line x1="105" y1="172" x2="340" y2="172" stroke="#331a00" stroke-width="1"/>
  <text x="105" y="202" font-family="serif" font-size="22">🏠</text>
  <text x="140" y="200" font-family="sans-serif" font-size="13" fill="#ffaa44">home / house</text>
  <line x1="105" y1="208" x2="340" y2="208" stroke="#331a00" stroke-width="1"/>
  <!-- Highlighted entry -->
  <rect x="105" y="212" width="240" height="36" rx="4" fill="#331a00"/>
  <text x="108" y="238" font-family="serif" font-size="22">💡</text>
  <text x="140" y="234" font-family="sans-serif" font-size="13" fill="#ffcc44" font-weight="bold">lightbulb / idea</text>
  <line x1="105" y1="248" x2="340" y2="248" stroke="#331a00" stroke-width="1"/>
  <text x="105" y="274" font-family="serif" font-size="22">🔔</text>
  <text x="140" y="270" font-family="sans-serif" font-size="13" fill="#ffaa44">bell / notification</text>
  <!-- Page number -->
  <text x="290" y="410" font-family="monospace" font-size="14" fill="#885500">Page 3 / 42</text>
  <!-- Floating search -->
  <rect x="320" y="300" width="140" height="48" rx="24" fill="#2a1400" stroke="#ff8800" stroke-width="2"/>
  <circle cx="430" cy="324" r="14" fill="#ff8800"/>
  <circle cx="424" cy="318" r="8" fill="none" stroke="white" stroke-width="2"/>
  <line x1="430" y1="324" x2="437" y2="332" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="330" y="329" font-family="sans-serif" font-size="14" fill="#ff8800">Search</text>
</svg>