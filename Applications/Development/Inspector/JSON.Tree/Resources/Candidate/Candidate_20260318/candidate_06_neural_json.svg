  <circle cx="256" cy="76" r="24" fill="#1e1b4b" stroke="#818CF8" stroke-width="2.5"/>
  <text x="256" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#C7D2FE">{ }</text>
  <text x="256" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="#818CF8">root</text>
