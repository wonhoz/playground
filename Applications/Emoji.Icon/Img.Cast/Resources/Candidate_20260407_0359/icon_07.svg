<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 흰색/매우 밝은 파스텔 -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <!-- 레인보우 스펙트럼 그라데이션 -->
    <linearGradient id="spectrum07" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="17%" stop-color="#FF6D00"/>
      <stop offset="33%" stop-color="#FFD600"/>
      <stop offset="50%" stop-color="#00E676"/>
      <stop offset="67%" stop-color="#00B0FF"/>
      <stop offset="83%" stop-color="#651FFF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <!-- Layer 2: 프리즘 삼각형 (중앙) -->
  <polygon points="512,180 200,720 824,720" fill="#CE93D8" opacity="0.3"/>
  <polygon points="512,180 200,720 824,720" fill="none" stroke="#9C27B0" stroke-width="20" stroke-linejoin="round"/>
  <!-- 프리즘 내부 빛 효과 -->
  <polygon points="512,180 200,720 824,720" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round" opacity="0.8"/>

  <!-- 입력 광선 (왼쪽에서 프리즘으로) — 흰 광선 -->
  <line x1="120" y1="440" x2="380" y2="520" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <line x1="120" y1="440" x2="380" y2="520" stroke="#E1BEE7" stroke-width="14" stroke-linecap="round"/>
  <!-- 광선 위 "SVG" 라벨 -->
  <text x="200" y="420" font-family="Arial Black" font-size="56" fill="#7B1FA2">SVG</text>

  <!-- 출력 레인보우 스펙트럼 (오른쪽으로) -->
  <!-- 스펙트럼 밴드들 -->
  <path d="M650,400 Q780,360 900,320" stroke="#FF1744" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M660,440 Q790,410 910,380" stroke="#FF6D00" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M668,480 Q795,458 918,435" stroke="#FFD600" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M674,520 Q798,505 920,490" stroke="#00E676" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M674,560 Q796,552 917,545" stroke="#00B0FF" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M668,600 Q788,600 905,600" stroke="#651FFF" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M650,640 Q775,645 890,650" stroke="#E040FB" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Layer 3: 오른쪽 포맷 라벨들 -->
  <text x="894" y="326" font-family="Arial Black" font-size="40" fill="#FF1744" text-anchor="start" opacity="0.9">PNG</text>
  <text x="894" y="390" font-family="Arial Black" font-size="40" fill="#FF6D00" text-anchor="start" opacity="0.9">JPG</text>
  <text x="894" y="444" font-family="Arial Black" font-size="40" fill="#D4A500" text-anchor="start" opacity="0.9">BMP</text>
  <text x="894" y="500" font-family="Arial Black" font-size="40" fill="#00A84D" text-anchor="start" opacity="0.9">ICO</text>
  <text x="894" y="556" font-family="Arial Black" font-size="40" fill="#007FCC" text-anchor="start" opacity="0.9">SVG</text>

  <!-- 하단 텍스트 -->
  <text x="512" y="840" font-family="Arial, sans-serif" font-weight="700" font-size="64" fill="#9C27B0" text-anchor="middle" opacity="0.5">FORMAT CAST</text>
</svg>
