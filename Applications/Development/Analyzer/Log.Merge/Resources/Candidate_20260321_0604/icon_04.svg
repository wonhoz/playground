    <!-- 화살표 2: 오렌지 (좌) -->
    <path d="M220 440 C330 450 430 460 510 490" fill="none" stroke="#FF6B35" stroke-width="54" stroke-linecap="round"/>
    <polygon points="510,490 456,460 468,532" fill="#FF6B35"/>

    <!-- 화살표 3: 옐로 (좌하) -->
    <path d="M230 620 C340 600 430 560 510 490" fill="none" stroke="#FFD700" stroke-width="54" stroke-linecap="round"/>
    <polygon points="510,490 458,528 466,456" fill="#FFD700"/>

    <!-- 화살표 4: 그린 (하) -->
    <path d="M390 780 C420 700 460 600 510 490" fill="none" stroke="#2ED573" stroke-width="54" stroke-linecap="round"/>
