<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030008"/>
      <stop offset="100%" stop-color="#060012"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magic casting circle (pentagram/tech circle) -->
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <!-- Innermost ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <!-- Pentagram lines (5 skill points) -->
  <polygon points="256,56 476,210 390,456 122,456 36,210" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <!-- Star (inner pentagon) -->
  <polygon points="256,136 388,228 340,376 172,376 124,228" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  <!-- 5 skill nodes at pentagram points -->
  <circle cx="256" cy="56" r="18" fill="#2d1060" stroke="#C084FC" stroke-width="2"/>
  <text x="256" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#E9D5FF">CODE</text>
  <text x="256" y="64" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">★★★★★</text>
  <circle cx="476" cy="210" r="18" fill="#2d1060" stroke="#C084FC" stroke-width="2"/>
  <text x="476" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#E9D5FF">TEST</text>
  <text x="476" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">★★★★☆</text>
  <circle cx="390" cy="456" r="18" fill="#2d1060" stroke="#C084FC" stroke-width="2"/>
  <text x="390" y="452" text-anchor="middle" font-family="monospace" font-size="7" fill="#E9D5FF">OPS</text>
  <text x="390" y="464" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">★★★☆☆</text>
  <circle cx="122" cy="456" r="18" fill="#2d1060" stroke="#C084FC" stroke-width="2"/>
  <text x="122" y="452" text-anchor="middle" font-family="monospace" font-size="7" fill="#E9D5FF">DB</text>
  <text x="122" y="464" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">★★★★☆</text>
  <circle cx="36" cy="210" r="18" fill="#2d1060" stroke="#C084FC" stroke-width="2"/>
  <text x="36" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#E9D5FF">UX</text>
  <text x="36" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">★★☆☆☆</text>
  <!-- Center skill symbol -->
  <circle cx="256" cy="256" r="44" fill="#1a0040" stroke="#A855F7" stroke-width="2"/>
  <text x="256" y="249" text-anchor="middle" font-family="monospace" font-size="11" fill="#C084FC">SKILL</text>
  <text x="256" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7">CAST</text>
  <!-- Glow particles -->
  <circle cx="256" cy="56" r="24" fill="#A855F7" opacity="0.1"/>
  <circle cx="476" cy="210" r="22" fill="#A855F7" opacity="0.08"/>
  <circle cx="36" cy="210" r="22" fill="#A855F7" opacity="0.08"/>
</svg>
