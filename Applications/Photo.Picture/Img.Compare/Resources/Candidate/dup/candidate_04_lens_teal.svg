<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="256" cy="230" r="120"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 배경 이미지 (흑백) -->
  <rect x="40" y="80" width="430" height="320" rx="16" fill="#263238"/>
  <rect x="40" y="300" width="430" height="100" rx="0" fill="#1C313A"/>
  <ellipse cx="180" cy="220" rx="80" ry="80" fill="#37474F"/>
  <ellipse cx="340" cy="240" rx="70" ry="60" fill="#455A64"/>
  <!-- 렌즈 영역 (컬러) -->
  <circle cx="256" cy="230" r="120" fill="#00695C"/>
  <ellipse cx="256" cy="230" rx="80" ry="80" clip-path="url(#lensClip)" fill="#4DB6AC"/>
  <ellipse cx="320" cy="240" rx="60" ry="50" clip-path="url(#lensClip)" fill="#26A69A"/>
  <!-- 렌즈 테두리 -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="#80CBC4" stroke-width="10"/>
  <!-- 렌즈 손잡이 -->
  <line x1="348" y1="322" x2="430" y2="404" stroke="#80CBC4" stroke-width="22" stroke-linecap="round"/>
  <!-- 레이블 -->
  <text x="256" y="450" font-size="20" text-anchor="middle" fill="#80CBC4" font-family="Segoe UI">Magnify Compare</text>
</svg>