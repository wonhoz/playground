<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <clipPath id="clip01"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <g clip-path="url(#clip01)">
    <!-- Layer 2: GET 뱃지 배경 -->
    <rect x="180" y="300" width="664" height="200" rx="32" fill="#047857"/>
    <rect x="192" y="312" width="640" height="176" rx="24" fill="#065F46" stroke="#A7F3D0" stroke-width="6"/>
    <!-- GET 텍스트 -->
    <text x="340" y="430" font-family="'Courier New', monospace" font-weight="900" font-size="148" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">GET</text>
    <!-- 200 OK 서브 텍스트 배경 -->
    <rect x="560" y="350" width="240" height="100" rx="16" fill="#059669"/>
    <text x="680" y="400" font-family="'Courier New', monospace" font-weight="700" font-size="52" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">200</text>
    <!-- OK 텍스트 -->
    <text x="680" y="460" font-family="'Courier New', monospace" font-weight="700" font-size="36" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">OK</text>
    <!-- Layer 3: 녹색 체크마크 -->
    <circle cx="512" cy="650" r="110" fill="#059669"/>
    <polyline points="452,650 498,700 590,600" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 상태 점들 -->
    <circle cx="300" cy="760" r="18" fill="#A7F3D0" opacity="0.5"/>
    <circle cx="356" cy="760" r="18" fill="#A7F3D0" opacity="0.5"/>
    <circle cx="412" cy="760" r="18" fill="#A7F3D0" opacity="0.5"/>
  </g>
</svg>
