<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="512" cy="512" r="512" fill="url(#bg1)"/>
  <!-- Clipboard -->
  <rect x="230" y="220" width="564" height="660" rx="24" fill="#FFFFFF" stroke="#3B82F6" stroke-width="10"/>
  <!-- Clipboard top clip -->
  <rect x="382" y="190" width="260" height="80" rx="16" fill="#2563EB"/>
  <rect x="452" y="178" width="120" height="40" rx="14" fill="#1D4ED8"/>
  <!-- Report sections -->
  <text x="278" y="344" font-family="Arial,sans-serif" font-size="38" fill="#1E40AF" font-weight="bold">CPU</text>
  <text x="278" y="390" font-family="Arial,sans-serif" font-size="34" fill="#374151">Intel Core i9-14900K</text>
  <line x1="260" y1="410" x2="764" y2="410" stroke="#DBEAFE" stroke-width="3"/>
  <text x="278" y="454" font-family="Arial,sans-serif" font-size="38" fill="#1E40AF" font-weight="bold">RAM</text>
  <text x="278" y="500" font-family="Arial,sans-serif" font-size="34" fill="#374151">64 GB DDR5-6000</text>
  <line x1="260" y1="520" x2="764" y2="520" stroke="#DBEAFE" stroke-width="3"/>
  <text x="278" y="564" font-family="Arial,sans-serif" font-size="38" fill="#1E40AF" font-weight="bold">GPU</text>
  <text x="278" y="610" font-family="Arial,sans-serif" font-size="34" fill="#374151">RTX 4090 24 GB</text>
  <line x1="260" y1="630" x2="764" y2="630" stroke="#DBEAFE" stroke-width="3"/>
  <text x="278" y="674" font-family="Arial,sans-serif" font-size="38" fill="#1E40AF" font-weight="bold">Disk</text>
  <text x="278" y="720" font-family="Arial,sans-serif" font-size="34" fill="#374151">Samsung 990 Pro 2 TB</text>
  <line x1="260" y1="740" x2="764" y2="740" stroke="#DBEAFE" stroke-width="3"/>
  <!-- Export buttons -->
  <rect x="278" y="762" width="110" height="50" rx="10" fill="#2563EB"/>
  <text x="333" y="794" font-family="Arial,sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">JSON</text>
  <rect x="408" y="762" width="110" height="50" rx="10" fill="#7C3AED"/>
  <text x="463" y="794" font-family="Arial,sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">HTML</text>
</svg>
