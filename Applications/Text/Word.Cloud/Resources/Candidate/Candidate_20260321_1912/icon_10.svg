<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emeraldBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <clipPath id="cc10">
      <circle cx="512" cy="570" r="225"/>
      <circle cx="305" cy="605" r="175"/>
      <circle cx="719" cy="605" r="175"/>
      <circle cx="512" cy="392" r="195"/>
      <circle cx="375" cy="447" r="165"/>
      <circle cx="655" cy="447" r="165"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 에메랄드 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#emeraldBg)"/>

  <!-- 배경 알파벳 패턴 -->
  <g fill="rgba(255,255,255,0.05)" font-family="monospace" font-size="26" letter-spacing="4">
    <text x="80"  y="145">A B C D E F G H I J K L M</text>
    <text x="80"  y="185">N O P Q R S T U V W X Y Z</text>
    <text x="80"  y="840">a b c d e f g h i j k l m</text>
    <text x="80"  y="880">n o p q r s t u v w x y z</text>
  </g>

  <!-- Layer 2: 흰 구름 -->
  <g fill="rgba(255,255,255,0.95)">
    <circle cx="512" cy="570" r="225"/>
    <circle cx="305" cy="605" r="175"/>
    <circle cx="719" cy="605" r="175"/>
    <circle cx="512" cy="392" r="195"/>
    <circle cx="375" cy="447" r="165"/>
    <circle cx="655" cy="447" r="165"/>
  </g>

  <!-- Layer 3: 구름 안 알파벳/단어 패턴 -->
  <g clip-path="url(#cc10)" text-anchor="middle">
    <!-- 큰 핵심 단어 -->
    <text x="512" y="498" font-family="Arial Black, Arial" font-size="132" font-weight="900" fill="#00695C">Word</text>
    <!-- 중간 단어들 -->
    <text x="310" y="606" font-family="Arial Black" font-size="82" font-weight="700" fill="#00897B">Hello</text>
    <text x="714" y="600" font-family="Arial Black" font-size="78" font-weight="700" fill="#26A69A">Cloud</text>
    <!-- 작은 단어들 -->
    <text x="265" y="682" font-family="Arial" font-size="53" font-weight="600" fill="#4DB6AC">Text</text>
    <text x="512" y="690" font-family="Arial" font-size="53" font-weight="600" fill="#00695C">Data</text>
    <text x="760" y="682" font-family="Arial" font-size="53" font-weight="600" fill="#26A69A">Code</text>
    <!-- 더 작은 단어들 -->
    <text x="385" y="758" font-family="Arial" font-size="40" fill="#80CBC4">Web</text>
    <text x="512" y="758" font-family="Arial" font-size="40" fill="#B2DFDB">AI</text>
    <text x="632" y="758" font-family="Arial" font-size="40" fill="#80CBC4">Art</text>
    <!-- 배경 글자 패턴 (구름 안 미세 텍스트) -->
    <text x="512" y="430" font-family="monospace" font-size="17" fill="rgba(0,105,92,0.25)" letter-spacing="5">w o r d c l o u d</text>
    <text x="512" y="635" font-family="monospace" font-size="15" fill="rgba(0,105,92,0.2)" letter-spacing="3">t e x t  a n a l y s i s</text>
  </g>
</svg>
