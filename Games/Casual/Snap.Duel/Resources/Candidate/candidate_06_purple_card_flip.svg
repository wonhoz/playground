<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#1a003a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Card stack background -->
  <rect x="186" y="136" width="140" height="200" rx="14" fill="#2d0060" stroke="#6a1b9a" stroke-width="1.5" opacity="0.5" transform="rotate(-8 256 236)"/>
  <rect x="186" y="136" width="140" height="200" rx="14" fill="#2d0060" stroke="#7b1fa2" stroke-width="1.5" opacity="0.7" transform="rotate(-3 256 236)"/>
  <!-- Main front card -->
  <rect x="186" y="136" width="140" height="200" rx="14" fill="url(#card1)" stroke="#e1bee7" stroke-width="2"/>
  <!-- Card design: snap symbol -->
  <circle cx="256" cy="220" r="48" fill="#4a148c" stroke="#ce93d8" stroke-width="2" opacity="0.9"/>
  <!-- Finger snap icon (simplified) -->
  <path d="M240 210 Q250 198 264 210 Q270 220 260 230 L256 238 L252 230 Q244 220 240 210 Z" fill="#e1bee7" opacity="0.9"/>
  <line x1="256" y1="200" x2="256" y2="190" stroke="#e1bee7" stroke-width="3" stroke-linecap="round"/>
  <line x1="266" y1="205" x2="274" y2="198" stroke="#e1bee7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="246" y1="205" x2="238" y2="198" stroke="#e1bee7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M240 248 L256 278 L272 248" fill="#e1bee7" opacity="0.7"/>
  <!-- Card suit-like corners -->
  <text x="200" y="162" font-family="monospace" font-size="14" fill="#ce93d8">S</text>
  <text x="298" y="320" font-family="monospace" font-size="14" fill="#ce93d8" transform="rotate(180 298 320)">S</text>
  <!-- Flying card (being slapped) -->
  <rect x="310" y="100" width="100" height="140" rx="10" fill="url(#card2)" stroke="#e1bee7" stroke-width="1.5" transform="rotate(25 360 170)" opacity="0.85"/>
  <!-- Slap lines -->
  <line x1="325" y1="110" x2="380" y2="90" stroke="#e040fb" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.7"/>
  <line x1="340" y1="130" x2="400" y2="115" stroke="#e040fb" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="462" font-family="sans-serif" font-size="22" fill="#ce93d8" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.9">SNAP.DUEL</text>
</svg>
