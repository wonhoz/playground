<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <radialGradient id="splash1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF80AB" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF80AB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="splash2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#69F0AE" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#69F0AE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="splash3" cx="60%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Watercolor splashes -->
  <ellipse cx="160" cy="155" rx="130" ry="105" fill="url(#splash1)"/>
  <ellipse cx="356" cy="358" rx="125" ry="110" fill="url(#splash2)"/>
  <ellipse cx="340" cy="145" rx="95" ry="80" fill="url(#splash3)"/>
  <!-- Paintbrush -->
  <rect x="330" y="60" width="18" height="120" rx="5" fill="#8D6E63" transform="rotate(35,339,120)"/>
  <polygon points="339,165 325,200 353,200" fill="#795548" transform="rotate(35,339,120)"/>
  <ellipse cx="339" cy="195" rx="14" ry="10" fill="#FF4081" opacity="0.8" transform="rotate(35,339,120)"/>
  <!-- Photo frame with wavy border -->
  <rect x="105" y="145" width="302" height="232" rx="18" fill="white" stroke="#90CAF9" stroke-width="5" stroke-dasharray="12,5"/>
  <!-- Stylized cartoon image inside -->
  <ellipse cx="256" cy="215" rx="70" ry="65" fill="#FFCC80"/>
  <circle cx="236" cy="205" r="8" fill="#5D4037"/>
  <circle cx="276" cy="205" r="8" fill="#5D4037"/>
  <path d="M236,235 Q256,255 276,235" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Blush marks -->
  <ellipse cx="220" cy="225" rx="12" ry="7" fill="#FF8A80" opacity="0.6"/>
  <ellipse cx="292" cy="225" rx="12" ry="7" fill="#FF8A80" opacity="0.6"/>
  <!-- Caption -->
  <rect x="105" y="340" width="302" height="37" rx="0" fill="#E3F2FD"/>
  <text x="256" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1565C0" font-style="italic">Toon Magic!</text>
</svg>
