<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 그라데이션 배경 (라이트 블루-그린) -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <g clip-path="url(#clip08)">
    <!-- Layer 2: 3가지 모드 카드 (레이어드) -->

    <!-- 데일리 모드 카드 (우, 뒤) -->
    <rect x="554" y="240" width="380" height="360" rx="28" fill="#2E7D32" transform="rotate(8 744 420)"/>
    <text x="810" y="350" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle" transform="rotate(8 810 350)">데일리</text>
    <text x="810" y="435" font-family="'Segoe UI',Arial,sans-serif" font-size="88" text-anchor="middle" transform="rotate(8 810 435)">🌟</text>
    <text x="810" y="520" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#C8E6C9" text-anchor="middle" transform="rotate(8 810 520)">DAILY</text>

    <!-- 카테고리 모드 카드 (좌, 뒤) -->
    <rect x="90" y="240" width="380" height="360" rx="28" fill="#7B1FA2" transform="rotate(-8 280 420)"/>
    <text x="214" y="350" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 214 350)">카테고리</text>
    <text x="214" y="435" font-family="'Segoe UI',Arial,sans-serif" font-size="88" text-anchor="middle" transform="rotate(-8 214 435)">🎯</text>
    <text x="214" y="520" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#E1BEE7" text-anchor="middle" transform="rotate(-8 214 520)">CATEGORY</text>

    <!-- 일반 모드 카드 (중앙, 앞) -->
    <rect x="292" y="200" width="440" height="420" rx="32" fill="#1565C0"/>
    <text x="512" y="320" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">일반 모드</text>
    <text x="512" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="110" text-anchor="middle">📚</text>
    <text x="512" y="560" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="42" fill="#BBDEFB" text-anchor="middle">NORMAL</text>

    <!-- Layer 3: 하단 물음표 배지 + 포인트 문자 -->
    <circle cx="512" cy="840" r="96" fill="#FF6B6B"/>
    <text x="512" y="898" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="126" fill="#FFFFFF" text-anchor="middle">?</text>

    <!-- 좌우 A/B 텍스트 -->
    <text x="200" y="868" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="66" fill="#7B1FA2" text-anchor="middle">A</text>
    <text x="824" y="868" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="66" fill="#2E7D32" text-anchor="middle">B+</text>

    <!-- 상단 타이틀 -->
    <rect x="230" y="120" width="564" height="72" rx="22" fill="#FF6B6B"/>
    <text x="512" y="174" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">TRIVIA CAST</text>
  </g>
</svg>
