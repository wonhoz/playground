<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Locale.View — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #ffffff; }
  p.desc { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: transform .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); border-color: #56CCF2; box-shadow: 0 8px 24px rgba(86,204,242,0.18); }
  .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; background: #111; }
  .card span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
  .card .num { font-size: 10px; color: #555; }
</style>
</head>
<body>
<h1>Locale.View</h1>
<p class="desc">Locale and localization resource viewer — icon candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_globe_text_bubbles.svg"/><span>Globe + Text Bubbles</span><span class="num">01</span></div>
  <div class="card"><img src="candidate_02_language_flag_mosaic.svg"/><span>Language Flag Mosaic</span><span class="num">02</span></div>
  <div class="card"><img src="candidate_03_translation_arrows.svg"/><span>Translation Arrows</span><span class="num">03</span></div>
  <div class="card"><img src="candidate_04_world_map_text.svg"/><span>World Map + Text</span><span class="num">04</span></div>
  <div class="card"><img src="candidate_05_babel_tower.svg"/><span>Babel Tower</span><span class="num">05</span></div>
  <div class="card"><img src="candidate_06_multilingual_speech.svg"/><span>Multilingual Speech</span><span class="num">06</span></div>
  <div class="card"><img src="candidate_07_locale_compass.svg"/><span>Locale Compass</span><span class="num">07</span></div>
  <div class="card"><img src="candidate_08_international_keyboard.svg"/><span>International Keyboard</span><span class="num">08</span></div>
  <div class="card"><img src="candidate_09_translation_bridge.svg"/><span>Translation Bridge</span><span class="num">09</span></div>
  <div class="card"><img src="candidate_10_language_spectrum.svg"/><span>Language Spectrum</span><span class="num">10</span></div>
</div>
</body>
</html>
