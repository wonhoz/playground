<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FED7AA"/>
  <!-- Layer 2: Sieve/filter mesh -->
  <!-- Sieve frame -->
  <rect x="160" y="200" width="700" height="420" rx="20" fill="#92400E" opacity="0.9"/>
  <!-- Mesh pattern (grid of holes) -->
  <rect x="180" y="220" width="660" height="380" rx="10" fill="#78350F"/>
  <!-- Horizontal mesh lines -->
  <line x1="180" y1="280" x2="840" y2="280" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="180" y1="340" x2="840" y2="340" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="180" y1="400" x2="840" y2="400" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="180" y1="460" x2="840" y2="460" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="180" y1="520" x2="840" y2="520" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <!-- Vertical mesh lines -->
  <line x1="280" y1="220" x2="280" y2="600" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="400" y1="220" x2="400" y2="600" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="520" y1="220" x2="520" y2="600" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="640" y1="220" x2="640" y2="600" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <line x1="760" y1="220" x2="760" y2="600" stroke="#FED7AA" stroke-width="6" opacity="0.4"/>
  <!-- Sieve handles -->
  <rect x="140" y="360" width="40" height="80" rx="10" fill="#92400E"/>
  <rect x="844" y="360" width="40" height="80" rx="10" fill="#92400E"/>
  <!-- Layer 3: Folders above (being filtered) -->
  <!-- Normal folder (passes through) -->
  <g opacity="0.8">
    <rect x="200" y="100" width="120" height="80" rx="8" fill="#22C55E"/>
    <rect x="200" y="80" width="60" height="26" rx="5" fill="#22C55E"/>
    <text x="260" y="148" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle">정상</text>
  </g>
  <!-- Empty folder (caught by sieve) - on top of mesh, not falling through -->
  <g opacity="0.85">
    <rect x="520" y="155" width="120" height="80" rx="8" fill="#EF4444"/>
    <rect x="520" y="135" width="60" height="26" rx="5" fill="#EF4444"/>
    <text x="580" y="203" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle">빈 폴더</text>
  </g>
  <!-- Folder below sieve (passed through) -->
  <rect x="250" y="660" width="120" height="80" rx="8" fill="#22C55E" opacity="0.7"/>
  <rect x="250" y="640" width="60" height="26" rx="5" fill="#22C55E" opacity="0.7"/>
  <!-- Arrow down for passing folder -->
  <line x1="310" y1="180" x2="310" y2="215" stroke="#22C55E" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>