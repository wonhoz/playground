<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#56ccf2"/>
      <stop offset="100%" style="stop-color:#2f80ed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Text "T" to "♪" conversion -->
  <text x="100" y="200" font-family="monospace" font-size="110" fill="white" opacity="0.9" font-weight="bold">T</text>
  <!-- Arrow -->
  <line x1="185" y1="165" x2="245" y2="165" stroke="url(#wave)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="240,150 265,165 240,180" fill="url(#wave)"/>
  <text x="270" y="200" font-family="serif" font-size="110" fill="url(#wave)" opacity="0.9">♪</text>
  <!-- Waveform display -->
  <rect x="60" y="260" width="390" height="90" rx="12" fill="white" opacity="0.05" stroke="url(#wave)" stroke-width="2"/>
  <polyline points="80,305 100,280 120,330 140,270 160,315 180,295 200,325 220,275 240,310 260,285 280,320 300,275 320,305 340,290 360,315 380,285 400,300 420,305" stroke="url(#wave)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="256" y="415" font-family="monospace" font-size="28" text-anchor="middle" fill="white" opacity="0.6">TEXT TO SPEECH</text>
</svg>
