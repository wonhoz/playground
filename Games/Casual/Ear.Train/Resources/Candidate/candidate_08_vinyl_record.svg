<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2c5364"/>
      <stop offset="100%" style="stop-color:#0f2027"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="60%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e96c1f"/>
      <stop offset="100%" style="stop-color:#f7c548"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="200" fill="url(#vinyl)"/>
  <!-- Grooves -->
  <circle cx="256" cy="256" r="180" stroke="#333" stroke-width="1.5" fill="none"/>
  <circle cx="256" cy="256" r="160" stroke="#333" stroke-width="1.5" fill="none"/>
  <circle cx="256" cy="256" r="140" stroke="#333" stroke-width="1.5" fill="none"/>
  <circle cx="256" cy="256" r="120" stroke="#333" stroke-width="1.5" fill="none"/>
  <circle cx="256" cy="256" r="100" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Label -->
  <circle cx="256" cy="256" r="72" fill="url(#label)"/>
  <!-- Note on label -->
  <text x="256" y="278" font-family="serif" font-size="58" text-anchor="middle" fill="white" font-weight="bold">♩</text>
  <!-- Center hole -->
  <circle cx="256" cy="256" r="10" fill="#1a1a1a"/>
  <!-- Ear wave -->
  <path d="M80 100 C90 88 105 92 105 105 C105 118 92 122 92 135 C92 148 105 152 105 165 C105 178 90 180 80 172" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
