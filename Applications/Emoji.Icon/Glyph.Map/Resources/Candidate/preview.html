<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Glyph.Map - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { color: #CC88FF; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .item img { width: 128px; height: 128px; border-radius: 8px; }
    .item .name { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .item .num { font-size: 18px; font-weight: bold; color: #CC88FF; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Glyph.Map — Icon Candidates</h1>
  <p>유니코드 글리프·문자 브라우저 아이콘 후보 10종</p>
  <div class="grid">
    <div class="item"><div class="num">01</div><img src="candidate_01_rainbow_unicode_grid.svg" alt="01"><div class="name">rainbow_unicode_grid</div></div>
    <div class="item"><div class="num">02</div><img src="candidate_02_violet_mosaic_chars.svg" alt="02"><div class="name">violet_mosaic_chars</div></div>
    <div class="item"><div class="num">03</div><img src="candidate_03_gold_magnifier_search.svg" alt="03"><div class="name">gold_magnifier_search</div></div>
    <div class="item"><div class="num">04</div><img src="candidate_04_blue_alphabet_wave.svg" alt="04"><div class="name">blue_alphabet_wave</div></div>
    <div class="item"><div class="num">05</div><img src="candidate_05_neon_emoji_burst.svg" alt="05"><div class="name">neon_emoji_burst</div></div>
    <div class="item"><div class="num">06</div><img src="candidate_06_teal_book_pages.svg" alt="06"><div class="name">teal_book_pages</div></div>
    <div class="item"><div class="num">07</div><img src="candidate_07_red_kanji_fire.svg" alt="07"><div class="name">red_kanji_fire</div></div>
    <div class="item"><div class="num">08</div><img src="candidate_08_silver_hex_codepoint.svg" alt="08"><div class="name">silver_hex_codepoint</div></div>
    <div class="item"><div class="num">09</div><img src="candidate_09_green_terminal_glyphs.svg" alt="09"><div class="name">green_terminal_glyphs</div></div>
    <div class="item"><div class="num">10</div><img src="candidate_10_orange_font_spectrum.svg" alt="10"><div class="name">orange_font_spectrum</div></div>
  </div>
</body>
</html>
