<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 파일 서랍 — 여러 포맷 정리 | 레이어드 | #0F1628 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1628"/>
  <!-- Layer 2: File cabinet with format files -->
  <!-- Cabinet body -->
  <rect x="200" y="200" width="624" height="640" rx="14" fill="#1E2A42" stroke="#2D3E5A" stroke-width="5"/>
  <!-- Drawer 1: SVG -->
  <rect x="220" y="220" width="584" height="130" rx="8" fill="#132040" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="240" y="238" width="544" height="94" rx="6" fill="#0D1628"/>
  <!-- SVG file icons in drawer -->
  <rect x="260" y="254" width="60" height="62" rx="4" fill="#1D4ED8"/>
  <text x="290" y="292" font-family="monospace" font-size="14" fill="#DBEAFE" text-anchor="middle">SVG</text>
  <rect x="334" y="254" width="60" height="62" rx="4" fill="#1E40AF"/>
  <text x="364" y="292" font-family="monospace" font-size="14" fill="#DBEAFE" text-anchor="middle">SVG</text>
  <rect x="408" y="254" width="60" height="62" rx="4" fill="#2563EB"/>
  <text x="438" y="292" font-family="monospace" font-size="14" fill="#DBEAFE" text-anchor="middle">SVG</text>
  <text x="600" y="285" font-family="Arial,sans-serif" font-size="16" fill="#60A5FA">Source</text>
  <circle cx="768" cy="285" r="16" fill="#3B82F6"/>
  <!-- Drawer 2: PNG -->
  <rect x="220" y="364" width="584" height="130" rx="8" fill="#1A3020" stroke="#16A34A" stroke-width="2"/>
  <rect x="240" y="382" width="544" height="94" rx="6" fill="#0D1A10"/>
  <rect x="260" y="398" width="60" height="62" rx="4" fill="#16A34A"/>
  <text x="290" y="436" font-family="monospace" font-size="14" fill="#DCFCE7" text-anchor="middle">PNG</text>
  <rect x="334" y="398" width="60" height="62" rx="4" fill="#15803D"/>
  <text x="364" y="436" font-family="monospace" font-size="14" fill="#DCFCE7" text-anchor="middle">PNG</text>
  <text x="600" y="429" font-family="Arial,sans-serif" font-size="16" fill="#4ADE80">Source</text>
  <circle cx="768" cy="429" r="16" fill="#22C55E"/>
  <!-- Drawer 3: ICO (output) -->
  <rect x="220" y="508" width="584" height="130" rx="8" fill="#2A1A00" stroke="#D97706" stroke-width="3"/>
  <rect x="240" y="526" width="544" height="94" rx="6" fill="#1C1000"/>
  <!-- Multi-size ICO grid -->
  <rect x="260" y="542" width="28" height="28" rx="3" fill="#D97706"/>
  <rect x="294" y="538" width="36" height="36" rx="3" fill="#F59E0B"/>
  <rect x="336" y="532" width="48" height="48" rx="4" fill="#FBBF24"/>
  <rect x="392" y="526" width="62" height="62" rx="5" fill="#FCD34D"/>
  <text x="600" y="573" font-family="Arial,sans-serif" font-size="16" fill="#FCD34D">Output</text>
  <circle cx="768" cy="573" r="16" fill="#F59E0B"/>
  <text x="512" y="640" font-family="Arial,sans-serif" font-size="16" fill="#F59E0B" text-anchor="middle">16 · 32 · 48 · 256</text>
  <!-- Layer 3: Conversion arrow overlapping -->
  <text x="512" y="790" font-family="Arial,sans-serif" font-size="26" fill="#FCD34D" text-anchor="middle">SVG / PNG  →  ICO</text>
</svg>
