<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 워프 그리드 (색상 변형) -->
  <!-- 변형 전 (회색 격자) -->
  <g opacity="0.2" stroke="#888888" stroke-width="1">
    <line x1="100" y1="140" x2="100" y2="380"/>
    <line x1="175" y1="140" x2="175" y2="380"/>
    <line x1="250" y1="140" x2="250" y2="380"/>
    <line x1="325" y1="140" x2="325" y2="380"/>
    <line x1="400" y1="140" x2="400" y2="380"/>
    <line x1="100" y1="140" x2="400" y2="140"/>
    <line x1="100" y1="215" x2="400" y2="215"/>
    <line x1="100" y1="290" x2="400" y2="290"/>
    <line x1="100" y1="380" x2="400" y2="380"/>
  </g>
  <!-- 변형 후 (색상 그레이딩 곡선 격자) -->
  <path d="M 100 140 Q 140 120 175 130 Q 215 140 250 120 Q 290 100 325 130 Q 360 155 400 140" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <path d="M 100 215 Q 140 190 175 205 Q 215 220 250 190 Q 290 165 325 195 Q 360 225 400 215" fill="none" stroke="#FF6B6B" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <path d="M 100 290 Q 140 265 175 285 Q 215 305 250 275 Q 290 248 325 278 Q 360 305 400 290" fill="none" stroke="#06D6A0" stroke-width="2" opacity="0.6"/>
  <path d="M 100 380 Q 140 360 175 375 Q 215 390 250 365 Q 290 340 325 365 Q 360 390 400 380" fill="none" stroke="#118AB2" stroke-width="2" opacity="0.6"/>
  <!-- 세로 워프선들 -->
  <path d="M 100 140 Q 95 260 100 380" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
  <path d="M 175 130 Q 170 255 175 375" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.4"/>
  <path d="M 250 120 Q 248 255 250 365" fill="none" stroke="#06D6A0" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <path d="M 325 130 Q 323 255 325 365" fill="none" stroke="#118AB2" stroke-width="1.5" opacity="0.4"/>
  <path d="M 400 140 Q 405 260 400 380" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
  <!-- 레이블 -->
  <text x="256" y="445" text-anchor="middle" fill="#A78BFA" font-size="13" font-family="monospace" filter="url(#glow)">COLOR WARP</text>
</svg>