<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#2d1000"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6622"/>
      <stop offset="100%" stop-color="#CC2200"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="50%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FFFF44"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Brick wall pattern -->
  <rect x="100" y="350" width="312" height="36" rx="4" fill="url(#brick)"/>
  <line x1="100" y1="368" x2="412" y2="368" stroke="#1a0800" stroke-width="3"/>
  <line x1="256" y1="350" x2="256" y2="386" stroke="#1a0800" stroke-width="3"/>
  <line x1="178" y1="350" x2="178" y2="386" stroke="#1a0800" stroke-width="3"/>
  <line x1="334" y1="350" x2="334" y2="386" stroke="#1a0800" stroke-width="3"/>

  <rect x="116" y="308" width="312" height="36" rx="4" fill="url(#brick)" opacity="0.9"/>
  <line x1="116" y1="326" x2="428" y2="326" stroke="#1a0800" stroke-width="3"/>
  <line x1="220" y1="308" x2="220" y2="344" stroke="#1a0800" stroke-width="3"/>
  <line x1="296" y1="308" x2="296" y2="344" stroke="#1a0800" stroke-width="3"/>
  <line x1="372" y1="308" x2="372" y2="344" stroke="#1a0800" stroke-width="3"/>

  <rect x="100" y="268" width="312" height="36" rx="4" fill="url(#brick)" opacity="0.85"/>
  <rect x="116" y="228" width="280" height="36" rx="4" fill="url(#brick)" opacity="0.8"/>
  <rect x="136" y="188" width="240" height="36" rx="4" fill="url(#brick)" opacity="0.75"/>

  <!-- Flame on top -->
  <path d="M210,188 Q230,140 256,110 Q268,140 280,120 Q310,80 270,50 Q310,70 320,110 Q340,80 330,50 Q370,90 350,140 Q380,120 370,160 Q390,150 380,188 Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Inner flame -->
  <path d="M230,188 Q248,155 256,130 Q264,155 280,140 Q300,110 285,90 Q320,130 300,165 Q320,155 315,188 Z" fill="#FFFF88" opacity="0.6"/>
</svg>