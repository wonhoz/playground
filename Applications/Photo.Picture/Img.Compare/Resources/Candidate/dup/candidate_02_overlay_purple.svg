<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 이미지 1 (뒤) -->
  <rect x="60" y="100" width="280" height="240" rx="16" fill="#6A1B9A" stroke="#CE93D8" stroke-width="3"/>
  <ellipse cx="160" cy="190" rx="50" ry="50" fill="#9C27B0" opacity="0.8"/>
  <rect x="60" y="280" width="280" height="60" rx="0" fill="#4A148C"/>
  <!-- 이미지 2 (앞, 반투명 오버레이) -->
  <rect x="170" y="160" width="280" height="240" rx="16" fill="#AB47BC" opacity="0.6" stroke="#E040FB" stroke-width="3"/>
  <ellipse cx="320" cy="260" rx="60" ry="60" fill="#E040FB" opacity="0.5"/>
  <!-- 차이 하이라이트 -->
  <rect x="170" y="160" width="170" height="240" rx="0" fill="#FF6D00" opacity="0.15"/>
  <!-- 중앙 비교 아이콘 -->
  <circle cx="256" cy="256" r="36" fill="white" opacity="0.15"/>
  <text x="256" y="270" font-size="40" text-anchor="middle" fill="white" font-family="Segoe UI Emoji">🔍</text>
  <!-- 레이블 -->
  <text x="200" y="440" font-size="20" text-anchor="middle" fill="#CE93D8" font-family="Segoe UI">Overlay Compare</text>
</svg>