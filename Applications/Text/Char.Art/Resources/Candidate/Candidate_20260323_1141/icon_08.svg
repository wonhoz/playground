  <text x="210" y="396" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.65">@</text>
  <text x="210" y="464" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.45">*</text>
  <text x="210" y="532" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.25">%</text>
  <!-- 열 3 (밝은 헤드) -->
  <text x="310" y="180" font-family="Consolas,monospace" font-size="52" fill="white" font-weight="bold" opacity="1.0">#</text>
  <text x="310" y="248" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.9">@</text>
  <text x="310" y="316" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.7">$</text>
  <text x="310" y="384" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.5">#</text>
  <text x="310" y="452" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.3">%</text>
  <text x="310" y="520" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.15">@</text>
  <!-- 열 4 -->
  <text x="410" y="300" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="1.0">$</text>
  <text x="410" y="368" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.8">@</text>
  <text x="410" y="436" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.55">#</text>
  <text x="410" y="504" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.3">$</text>
  <!-- 열 5 (밝은 헤드) -->
  <text x="510" y="220" font-family="Consolas,monospace" font-size="52" fill="white" font-weight="bold" opacity="1.0">@</text>
  <text x="510" y="288" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.9">#</text>
  <text x="510" y="356" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.7">%</text>
  <text x="510" y="424" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.5">$</text>
  <text x="510" y="492" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.3">@</text>
  <!-- 열 6 -->
  <text x="610" y="260" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="1.0">#</text>
  <text x="610" y="328" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.8">@</text>
  <text x="610" y="396" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.55">$</text>
  <text x="610" y="464" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.3">%</text>
  <!-- 열 7 -->
  <text x="710" y="200" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="1.0">%</text>
  <text x="710" y="268" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.85">$</text>
  <text x="710" y="336" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.65">@</text>
  <text x="710" y="404" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.4">#</text>
  <text x="710" y="472" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.2">%</text>
  <!-- 열 8 (밝은 헤드) -->
  <text x="810" y="280" font-family="Consolas,monospace" font-size="52" fill="white" font-weight="bold" opacity="1.0">$</text>
  <text x="810" y="348" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.9">@</text>
  <text x="810" y="416" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.65">#</text>
  <text x="810" y="484" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.4">$</text>
  <text x="810" y="552" font-family="Consolas,monospace" font-size="52" fill="#00FF41" font-weight="bold" opacity="0.2">%</text>
  <!-- Layer 3: 하단 ASCII ART 레이블 -->
  <rect x="200" y="680" width="624" height="100" rx="12" fill="#0A1F0A"/>
  <text x="512" y="745" font-family="Consolas,monospace" font-size="56" fill="#00FF41" text-anchor="middle" font-weight="bold">ASCII ART</text>
