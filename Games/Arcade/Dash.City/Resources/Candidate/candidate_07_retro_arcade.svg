<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d0030"/>
      <stop offset="100%" stop-color="#0d000f"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002244"/>
      <stop offset="100%" stop-color="#001122"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Arcade cabinet shape -->
  <rect x="140" y="60" width="232" height="360" rx="12" fill="#1a0a1a" stroke="#cc00cc" stroke-width="3"/>
  <rect x="160" y="80" width="192" height="180" rx="6" fill="url(#screen)" stroke="#8800ff" stroke-width="2"/>
  <!-- Screen content - city scene -->
  <rect x="168" y="128" width="28" height="52" fill="#333366"/>
  <rect x="206" y="108" width="36" height="72" fill="#1a1a44"/>
  <rect x="252" y="96" width="44" height="84" fill="#222255"/>
  <rect x="306" y="116" width="32" height="64" fill="#1a1a44"/>
  <rect x="168" y="180" width="170" height="8" fill="#222"/>
  <!-- Pixel runner on screen -->
  <rect x="220" y="158" width="8" height="8" fill="#ffff00"/>
  <rect x="216" y="166" width="16" height="10" fill="#ff8800"/>
  <rect x="212" y="176" width="8" height="10" fill="#cc6600"/>
  <rect x="224" y="176" width="8" height="10" fill="#cc6600"/>
  <!-- Speed lines on screen -->
  <rect x="168" y="160" width="40" height="3" fill="#00ffff" opacity="0.7"/>
  <rect x="168" y="167" width="28" height="2" fill="#00ffff" opacity="0.5"/>
  <!-- Cabinet controls -->
  <rect x="160" y="276" width="192" height="100" rx="4" fill="#111018"/>
  <!-- Joystick -->
  <circle cx="220" cy="330" r="24" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="220" cy="320" r="10" fill="#888"/>
  <!-- Buttons -->
  <circle cx="300" cy="318" r="12" fill="#ff0044"/>
  <circle cx="328" cy="308" r="12" fill="#0088ff"/>
  <circle cx="328" cy="336" r="12" fill="#00cc44"/>
  <circle cx="300" cy="346" r="12" fill="#ffcc00"/>
  <!-- Cabinet legs -->
  <rect x="160" y="400" width="32" height="40" rx="4" fill="#111018" stroke="#cc00cc" stroke-width="1"/>
  <rect x="320" y="400" width="32" height="40" rx="4" fill="#111018" stroke="#cc00cc" stroke-width="1"/>
  <!-- Marquee text -->
  <rect x="160" y="60" width="192" height="20" rx="4" fill="#cc00cc" opacity="0.5"/>
  <text x="256" y="75" font-family="Arial Black, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="3">DASH CITY</text>
  <!-- Coin insert -->
  <rect x="220" y="262" width="72" height="10" rx="3" fill="#555"/>
  <text x="256" y="271" font-family="Courier New, monospace" font-size="7" fill="#aaa" text-anchor="middle">INSERT COIN</text>
  <!-- Score -->
  <text x="256" y="470" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#cc00cc" text-anchor="middle" letter-spacing="4">DASH CITY</text>
</svg>
