    <text x="308" y="488" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">📷 PHOTO</text>

    <!-- 동영상 프레임 (중앙 우측) -->
    <rect x="554" y="200" width="340" height="280" rx="22" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="10"/>
    <rect x="572" y="218" width="304" height="200" rx="12" fill="#CE93D8"/>
    <!-- 플레이 버튼 -->
