<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 사이버 퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#0D0020"/>
  <!-- Layer 2: 닌자 별 + 네온 잔상 -->
  <!-- 닌자 별 (8각형 별) -->
  <polygon points="512,160 560,360 700,260 600,420 800,420 640,520 720,720 512,580 304,720 384,520 224,420 424,420 324,260 464,360" fill="#FF4081" opacity="0.95"/>
  <!-- 네온 글로우 -->
  <polygon points="512,160 560,360 700,260 600,420 800,420 640,520 720,720 512,580 304,720 384,520 224,420 424,420 324,260 464,360" fill="none" stroke="#FF80AB" stroke-width="6" opacity="0.6"/>
  <!-- 슬라이스 라인 (수평, 닌자 별을 가로지름) -->
  <line x1="140" y1="470" x2="884" y2="430" stroke="#FFFF00" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="470" x2="884" y2="430" stroke="#FFFF00" stroke-width="32" stroke-linecap="round" opacity="0.25"/>
  <!-- Layer 3: 점수 -->
  <text x="512" y="840" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FF4081" text-anchor="middle">x3</text>
  <text x="650" y="840" font-family="Arial" font-size="48" fill="#FF80AB" text-anchor="middle" opacity="0.8">COMBO</text>
</svg>
