<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 퍼즐부품: puzzle pieces representing hardware components -->
  <!-- Puzzle piece 1 (CPU - top left) -->
  <path d="M240 240 L460 240 L460 420 Q440 420 440 440 Q440 460 460 460 L460 460 L460 500 L280 500 L280 460 Q260 460 260 440 Q260 420 280 420 L280 420 L240 420 Z" fill="#2E7D32"/>
  <!-- CPU icon on piece 1 -->
  <rect x="300" y="280" width="100" height="100" rx="8" fill="#050A05"/>
  <line x1="320" y1="280" x2="320" y2="380" stroke="#81C784" stroke-width="3"/>
  <line x1="350" y1="280" x2="350" y2="380" stroke="#81C784" stroke-width="3"/>
  <line x1="300" y1="310" x2="400" y2="310" stroke="#81C784" stroke-width="3"/>
  <line x1="300" y1="340" x2="400" y2="340" stroke="#81C784" stroke-width="3"/>
  <!-- Puzzle piece 2 (RAM - top right) -->
  <path d="M564 240 L784 240 L784 420 L764 420 Q764 440 784 440 Q804 440 804 420 L804 420 L804 500 L564 500 L564 460 Q584 460 584 440 Q584 420 564 420 Z" fill="#81C784" opacity="0.7"/>
  <!-- RAM bars on piece 2 -->
  <rect x="600" y="280" width="140" height="30" rx="4" fill="#050A05"/>
  <rect x="600" y="324" width="140" height="30" rx="4" fill="#050A05"/>
  <rect x="600" y="368" width="140" height="30" rx="4" fill="#050A05"/>
  <!-- Puzzle piece 3 (GPU - bottom left) -->
  <path d="M240 564 L460 564 L460 524 Q440 524 440 504 Q440 484 460 484 L460 484 L460 484 L280 484 Q260 484 260 504 Q260 524 280 524 L240 524 Z" fill="#81C784" opacity="0.5"/>
  <!-- Puzzle piece 4 (Storage - bottom right) -->
  <path d="M564 564 L784 564 L784 784 L564 784 L564 564 Z" fill="#2E7D32" opacity="0.7"/>
  <!-- Storage icon on piece 4 -->
  <rect x="598" y="610" width="152" height="100" rx="16" fill="#050A05"/>
  <circle cx="700" cy="660" r="30" fill="none" stroke="#81C784" stroke-width="6"/>
  <circle cx="700" cy="660" r="12" fill="#81C784"/>
  <!-- Connector lines between pieces -->
  <line x1="460" y1="370" x2="564" y2="370" stroke="#81C784" stroke-width="4" stroke-dasharray="10 8" opacity="0.5"/>
  <line x1="370" y1="500" x2="370" y2="564" stroke="#81C784" stroke-width="4" stroke-dasharray="10 8" opacity="0.5"/>
</svg>