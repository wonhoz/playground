<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="lens" cx="40%" cy="35%" r="60%" id="lensGrad">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Log lines behind -->
  <rect x="72" y="120" width="280" height="14" rx="7" fill="#3949ab" opacity="0.7"/>
  <rect x="72" y="150" width="240" height="14" rx="7" fill="#3949ab" opacity="0.7"/>
  <rect x="72" y="180" width="260" height="14" rx="7" fill="#ef5350" opacity="0.8"/>
  <rect x="72" y="210" width="220" height="14" rx="7" fill="#3949ab" opacity="0.7"/>
  <rect x="72" y="240" width="250" height="14" rx="7" fill="#ffd740" opacity="0.8"/>
  <rect x="72" y="270" width="230" height="14" rx="7" fill="#3949ab" opacity="0.7"/>
  <rect x="72" y="300" width="200" height="14" rx="7" fill="#ef5350" opacity="0.8"/>
  <!-- Magnifying glass -->
  <circle cx="300" cy="260" r="140" fill="none" stroke="#90caf9" stroke-width="12"/>
  <circle cx="300" cy="260" r="126" fill="#1565c0" opacity="0.5"/>
  <!-- Highlighted line through lens -->
  <rect x="170" y="252" width="256" height="16" rx="8" fill="#ffd740" opacity="0.9"/>
  <!-- Handle -->
  <line x1="410" y1="370" x2="460" y2="420" stroke="#90caf9" stroke-width="20" stroke-linecap="round"/>
  <!-- Lens highlight -->
  <circle cx="252" cy="212" r="30" fill="white" opacity="0.08"/>
</svg>
