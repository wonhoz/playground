<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a2d"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- PCB board -->
  <rect x="60" y="60" width="392" height="392" rx="12" fill="url(#board)" stroke="#4a8a4a" stroke-width="3"/>
  <!-- Circuit traces -->
  <path d="M80,200 L200,200 L200,140 L320,140" stroke="#66bb6a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M80,260 L160,260 L160,320 L280,320 L280,380 L400,380" stroke="#66bb6a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M300,200 L360,200 L360,300 L420,300" stroke="#a5d6a7" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- CPU socket -->
  <rect x="160" y="160" width="120" height="120" rx="6" fill="#1a2e1a" stroke="#ffd54f" stroke-width="2"/>
  <rect x="175" y="175" width="90" height="90" rx="4" fill="#0d1a0d"/>
  <circle cx="220" cy="220" r="18" fill="#ffd54f" opacity="0.3"/>
  <!-- RAM slots -->
  <rect x="300" y="160" width="28" height="120" rx="3" fill="#0d1a0d" stroke="#42a5f5" stroke-width="1"/>
  <rect x="336" y="160" width="28" height="120" rx="3" fill="#0d1a0d" stroke="#42a5f5" stroke-width="1"/>
  <rect x="372" y="160" width="28" height="120" rx="3" fill="#1565c0" stroke="#42a5f5" stroke-width="1" opacity="0.8"/>
  <rect x="408" y="160" width="28" height="120" rx="3" fill="#0d1a0d" stroke="#42a5f5" stroke-width="1"/>
  <!-- Capacitors -->
  <circle cx="100" cy="120" r="14" fill="#333" stroke="#888" stroke-width="2"/>
  <circle cx="140" cy="120" r="14" fill="#333" stroke="#888" stroke-width="2"/>
  <circle cx="100" cy="380" r="14" fill="#333" stroke="#888" stroke-width="2"/>
  <circle cx="140" cy="380" r="14" fill="#333" stroke="#888" stroke-width="2"/>
  <!-- PCIe slots -->
  <rect x="80" y="320" width="200" height="16" rx="3" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <rect x="80" y="346" width="280" height="16" rx="3" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
</svg>