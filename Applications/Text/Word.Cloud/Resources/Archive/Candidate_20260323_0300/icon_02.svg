<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 큰/작은 단어 빈도 대비 | 기하학 | #4C1D95 퍼플 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E0440"/>
  <!-- Layer 2: Frequency bar chart (word rank) -->
  <!-- Bars representing word frequency -->
  <rect x="160" y="760" width="80" height="520" rx="8" fill="#8B5CF6" transform="translate(0,-520)"/>
  <text x="200" y="760" font-family="Arial,sans-serif" font-size="14" fill="#C4B5FD" text-anchor="middle" transform="rotate(-45, 200, 760)">word</text>
  <rect x="260" y="760" width="80" height="400" rx="8" fill="#A78BFA" transform="translate(0,-400)"/>
  <text x="300" y="760" font-family="Arial,sans-serif" font-size="14" fill="#C4B5FD" text-anchor="middle" transform="rotate(-45, 300, 760)">text</text>
  <rect x="360" y="760" width="80" height="310" rx="8" fill="#C4B5FD" transform="translate(0,-310)"/>
  <rect x="460" y="760" width="80" height="240" rx="8" fill="#DDD6FE" transform="translate(0,-240)"/>
  <rect x="560" y="760" width="80" height="180" rx="8" fill="#EDE9FE" transform="translate(0,-180)"/>
  <rect x="660" y="760" width="80" height="120" rx="8" fill="#F5F3FF" opacity="0.7" transform="translate(0,-120)"/>
  <rect x="760" y="760" width="80" height="80" rx="8" fill="#F5F3FF" opacity="0.5" transform="translate(0,-80)"/>
  <rect x="860" y="760" width="64" height="48" rx="8" fill="#F5F3FF" opacity="0.3" transform="translate(0,-48)"/>
  <!-- Baseline -->
  <line x1="140" y1="760" x2="884" y2="760" stroke="#6D28D9" stroke-width="3"/>
  <!-- Layer 3: Word size examples from bar heights -->
  <!-- Large word at top of tallest bar -->
  <text x="200" y="230" font-family="Arial,sans-serif" font-size="56" fill="#DDD6FE" text-anchor="middle" font-weight="bold">word</text>
  <!-- Medium -->
  <text x="300" y="350" font-family="Arial,sans-serif" font-size="38" fill="#C4B5FD" text-anchor="middle" font-weight="bold">text</text>
  <!-- Small -->
  <text x="400" y="445" font-family="Arial,sans-serif" font-size="26" fill="#A78BFA" text-anchor="middle">cloud</text>
  <text x="500" y="516" font-family="Arial,sans-serif" font-size="20" fill="#8B5CF6" text-anchor="middle">freq</text>
  <text x="590" y="576" font-family="Arial,sans-serif" font-size="15" fill="#7C3AED" text-anchor="middle">rank</text>
  <text x="668" y="636" font-family="Arial,sans-serif" font-size="12" fill="#6D28D9" text-anchor="middle">data</text>
</svg>
