<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
  <!-- 균형 저울 입자: 저울 + 알갱이 -->
  <!-- 저울 스탠드 -->
  <rect x="492" y="340" width="40" height="500" rx="8" fill="#F9A825"/>
  <!-- 저울 바 (약간 기울어짐) -->
  <rect x="180" y="310" width="664" height="28" rx="10" fill="#F9A825" transform="rotate(-5, 512, 324)"/>
  <!-- 왼쪽 접시 줄 -->
  <line x1="240" y1="322" x2="240" y2="520" stroke="#FFE082" stroke-width="8" stroke-linecap="round"/>
  <!-- 오른쪽 접시 줄 -->
  <line x1="784" y1="302" x2="784" y2="480" stroke="#FFE082" stroke-width="8" stroke-linecap="round"/>
  <!-- 왼쪽 접시 (무거움) -->
  <ellipse cx="240" cy="540" rx="130" ry="26" fill="#F9A825"/>
  <!-- 오른쪽 접시 (가벼움) -->
  <ellipse cx="784" cy="496" rx="130" ry="26" fill="#F9A825"/>
  <!-- 왼쪽 모래 알갱이 더미 (많음) -->
  <ellipse cx="240" cy="520" rx="90" ry="24" fill="#FFE082" opacity="0.6"/>
  <circle cx="200" cy="510" r="14" fill="#FFE082"/>
  <circle cx="240" cy="500" r="16" fill="#F9A825"/>
  <circle cx="280" cy="510" r="13" fill="#FFE082"/>
  <circle cx="218" cy="488" r="11" fill="#F9A825"/>
  <circle cx="260" cy="486" r="12" fill="#FFE082"/>
  <circle cx="240" cy="474" r="10" fill="#F9A825"/>
  <!-- 오른쪽 모래 알갱이 (적음) -->
  <circle cx="764" cy="476" r="14" fill="#FFE082"/>
  <circle cx="800" cy="472" r="12" fill="#F9A825"/>
  <circle cx="780" cy="460" r="11" fill="#FFE082"/>
  <!-- 저울 중심 피벗 -->
  <circle cx="512" cy="330" r="24" fill="#FFE082"/>
  <!-- 저울 받침 -->
  <rect x="420" y="840" width="184" height="30" rx="8" fill="#F9A825"/>
  <polygon points="512,840 450,870 574,870" fill="#F9A825" opacity="0.7"/>
</svg>
