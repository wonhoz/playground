<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgWeb" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0A0C14"/>
      <stop offset="100%" stop-color="#050710"/>
    </radialGradient>
    <!-- 거미줄 실 색상 -->
    <linearGradient id="webLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#CCDDFF" stop-opacity="0.4"/>
    </linearGradient>
    <!-- 노드 색상들 -->
    <radialGradient id="nodeSky" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <radialGradient id="nodeSkyBright" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </radialGradient>
    <filter id="webGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow05">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="centerGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgWeb)"/>

  <!-- 배경 미묘한 글로우 -->
  <circle cx="512" cy="512" r="350" fill="#0066AA" opacity="0.04"/>

  <!-- Layer2: 거미줄 구조 -->
  <!-- 거미줄 방사선 (중앙에서 8방향) -->
  <line x1="512" y1="512" x2="512" y2="200" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="733" y2="291" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="824" y2="512" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="733" y2="733" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="512" y2="824" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="291" y2="733" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="200" y2="512" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>
  <line x1="512" y1="512" x2="291" y2="291" stroke="url(#webLine)" stroke-width="3" filter="url(#webGlow)"/>

  <!-- 거미줄 동심 팔각형 (거리 80) -->
  <!-- 첫 번째 링 (거리 80) -->
  <polygon points="512,432 568,444 601,488 601,536 568,580 512,592 456,580 423,536 423,488 456,444"
    fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3" filter="url(#webGlow)"/>

  <!-- 두 번째 링 (거리 160) -->
  <polygon points="512,352 624,376 690,464 690,560 624,648 512,672 400,648 334,560 334,464 400,376"
    fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25" filter="url(#webGlow)"/>

  <!-- 세 번째 링 (거리 240) -->
  <polygon points="512,272 681,308 779,440 779,584 681,716 512,752 343,716 245,584 245,440 343,308"
    fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2" filter="url(#webGlow)"/>

  <!-- 네 번째 링 (거리 312) -->
  <polygon points="512,200 733,248 852,456 852,568 733,776 512,824 291,776 172,568 172,456 291,248"
    fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.15" filter="url(#webGlow)"/>

  <!-- Layer3: 노드들 (거미줄 교차점) -->
  <!-- 중앙 루트 노드 -->
  <circle cx="512" cy="512" r="38" fill="url(#nodeSkyBright)" filter="url(#centerGlow)"/>
  <circle cx="512" cy="512" r="24" fill="#E0F2FE"/>
  <text x="512" y="518" font-family="monospace" font-size="14" fill="#0C4A6E" text-anchor="middle" font-weight="bold">root</text>

  <!-- 1차 링 노드들 (거리 80, 작음) -->
  <circle cx="512" cy="432" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="568" cy="444" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="601" cy="488" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="601" cy="536" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="568" cy="580" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="512" cy="592" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="456" cy="580" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="423" cy="488" r="16" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>

  <!-- 2차 링 주요 노드들 -->
  <circle cx="512" cy="352" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="690" cy="464" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="690" cy="560" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="512" cy="672" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="334" cy="560" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>
  <circle cx="334" cy="464" r="24" fill="url(#nodeSky)" filter="url(#nodeGlow05)"/>

  <!-- 3차 링 일부 노드들 (더 작고 희미) -->
  <circle cx="512" cy="272" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>
  <circle cx="779" cy="440" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>
  <circle cx="779" cy="584" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>
  <circle cx="512" cy="752" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>
  <circle cx="245" cy="584" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>
  <circle cx="245" cy="440" r="18" fill="url(#nodeSky)" opacity="0.7" filter="url(#nodeGlow05)"/>

  <!-- 4차 링 (가장 외곽, 희미) -->
  <circle cx="512" cy="200" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="733" cy="291" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="824" cy="512" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="733" cy="733" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="512" cy="824" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="291" cy="733" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="200" cy="512" r="14" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="291" cy="291" r="14" fill="#7DD3FC" opacity="0.5"/>
</svg>
