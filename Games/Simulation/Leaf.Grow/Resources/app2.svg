<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2A0A"/>
      <stop offset="100%" stop-color="#1A4020"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ED321"/>
      <stop offset="100%" stop-color="#2D8A00"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="380" cy="100" r="44" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Sun rays -->
  <line x1="380" y1="44" x2="380" y2="28" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="380" y1="156" x2="380" y2="172" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="324" y1="100" x2="308" y2="100" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="436" y1="100" x2="452" y2="100" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="340" y1="60" x2="328" y2="48" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="420" y1="60" x2="432" y2="48" stroke="#FFE066" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Ground -->
  <rect x="0" y="420" width="512" height="92" rx="0" fill="#1A3D00" opacity="0.7"/>
  <ellipse cx="256" cy="422" rx="200" ry="12" fill="#2D5500" opacity="0.8"/>
  <!-- Main stem -->
  <path d="M256 420 Q250 350 256 280 Q262 200 248 140" stroke="#5A3A1A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <!-- Large leaf right -->
  <path d="M256 280 Q310 240 350 180 Q320 200 280 260" fill="url(#leafGrad)" filter="url(#glow)"/>
  <line x1="256" y1="280" x2="320" y2="210" stroke="#2D8A00" stroke-width="1.5" opacity="0.6"/>
  <!-- Medium leaf left -->
  <path d="M256 340 Q200 310 160 260 Q190 280 244 330" fill="url(#leafGrad)" opacity="0.85"/>
  <!-- Small leaf top -->
  <path d="M248 180 Q220 150 200 120 Q228 140 252 175" fill="#9ED946" opacity="0.9"/>
  <!-- Tiny bud at top -->
  <ellipse cx="248" cy="140" rx="14" ry="20" fill="#A8E45A" filter="url(#glow)"/>
  <!-- Grass blades at base -->
  <path d="M160 422 Q155 390 162 370" stroke="#4A7A00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M176 422 Q178 385 170 360" stroke="#3D6A00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M340 422 Q338 395 346 372" stroke="#4A7A00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M356 422 Q360 388 352 365" stroke="#3D6A00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Sparkles (growth particles) -->
  <circle cx="310" cy="250" r="4" fill="#A8E45A" filter="url(#glow)" opacity="0.8"/>
  <circle cx="220" cy="300" r="3" fill="#7ED321" filter="url(#glow)" opacity="0.7"/>
  <circle cx="270" cy="200" r="3" fill="#C8F570" filter="url(#glow)" opacity="0.6"/>
</svg>
