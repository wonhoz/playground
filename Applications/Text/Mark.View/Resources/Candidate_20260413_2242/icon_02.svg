<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>
  <!-- Markdown syntax elements displayed as badges/pills -->
  <!-- # Heading badge (top-left) -->
  <rect x="130" y="170" width="280" height="110" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="270" y="249" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle"># H1</text>
  <!-- ** Bold badge (top-right) -->
  <rect x="614" y="170" width="280" height="110" rx="28" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
  <text x="754" y="249" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">**B**</text>
  <!-- * Italic badge (middle-left) -->
  <rect x="130" y="310" width="280" height="110" rx="28" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="270" y="389" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">*I*</text>
  <!-- ``` Code badge (middle-right) -->
  <rect x="614" y="310" width="280" height="110" rx="28" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="754" y="389" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#1A1A1A" text-anchor="middle">```</text>
  <!-- > Quote badge (bottom-left) -->
  <rect x="130" y="450" width="280" height="110" rx="28" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
  <text x="270" y="529" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">&gt; Q</text>
  <!-- --- Line badge (bottom-right) -->
  <rect x="614" y="450" width="280" height="110" rx="28" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <text x="754" y="529" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#1A1A1A" text-anchor="middle">---</text>
  <!-- MD badge center -->
  <rect x="432" y="295" width="160" height="130" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="385" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#74C0FC" text-anchor="middle">MD</text>
  <!-- MARKDOWN badge -->
  <rect x="156" y="744" width="712" height="116" rx="36" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">MARKDOWN</text>
</svg>
