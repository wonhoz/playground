<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE44D"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Search bar background -->
  <rect x="80" y="180" width="352" height="60" rx="30" fill="#0D1B2A" stroke="#2A3A5A" stroke-width="2"/>
  <circle cx="128" cy="210" r="16" fill="none" stroke="#4A6A9A" stroke-width="3"/>
  <line x1="140" y1="222" x2="155" y2="237" stroke="#4A6A9A" stroke-width="3" stroke-linecap="round"/>
  <!-- Lightning bolt -->
  <path d="M290 100 L230 240 L265 240 L220 400 L350 220 L305 220 L360 100 Z" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Speed lines -->
  <line x1="80" y1="290" x2="160" y2="290" stroke="#FFE44D" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="80" y1="310" x2="140" y2="310" stroke="#FFE44D" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="80" y1="330" x2="120" y2="330" stroke="#FFE44D" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
