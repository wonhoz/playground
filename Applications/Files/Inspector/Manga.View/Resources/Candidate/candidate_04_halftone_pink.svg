<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Halftone dot background pattern -->
  <circle cx="80" cy="80" r="8" fill="#fff" opacity="0.15"/>
  <circle cx="130" cy="80" r="10" fill="#fff" opacity="0.15"/>
  <circle cx="180" cy="80" r="7" fill="#fff" opacity="0.15"/>
  <circle cx="80" cy="130" r="11" fill="#fff" opacity="0.15"/>
  <circle cx="130" cy="130" r="13" fill="#fff" opacity="0.2"/>
  <circle cx="430" cy="430" r="9" fill="#fff" opacity="0.15"/>
  <circle cx="380" cy="430" r="12" fill="#fff" opacity="0.15"/>
  <circle cx="430" cy="380" r="10" fill="#fff" opacity="0.15"/>
  <!-- Action burst background -->
  <circle cx="256" cy="230" r="170" fill="url(#burst)"/>
  <!-- Starburst lines -->
  <g stroke="white" stroke-width="3" opacity="0.3">
    <line x1="256" y1="60" x2="256" y2="10"/>
    <line x1="340" y1="90" x2="370" y2="55"/>
    <line x1="390" y1="170" x2="440" y2="155"/>
    <line x1="400" y1="256" x2="450" y2="256"/>
    <line x1="370" y1="340" x2="415" y2="365"/>
    <line x1="170" y1="90" x2="140" y2="55"/>
    <line x1="120" y1="170" x2="70" y2="155"/>
    <line x1="110" y1="256" x2="62" y2="256"/>
    <line x1="140" y1="340" x2="97" y2="365"/>
  </g>
  <!-- Manga character eye -->
  <ellipse cx="256" cy="210" rx="55" ry="70" fill="white"/>
  <ellipse cx="256" cy="220" rx="38" ry="50" fill="#1a0033"/>
  <circle cx="256" cy="215" r="22" fill="#cc00ff"/>
  <circle cx="256" cy="215" r="10" fill="#080010"/>
  <circle cx="268" cy="205" r="6" fill="white"/>
  <circle cx="248" cy="228" r="3" fill="white" opacity="0.7"/>
  <!-- Lashes top -->
  <path d="M205 190 Q220 175 240 180" stroke="#1a0033" stroke-width="4" fill="none"/>
  <path d="M307 190 Q292 175 272 180" stroke="#1a0033" stroke-width="4" fill="none"/>
  <!-- Blush marks -->
  <ellipse cx="200" cy="260" rx="20" ry="8" fill="#ff6ec7" opacity="0.6"/>
  <ellipse cx="312" cy="260" rx="20" ry="8" fill="#ff6ec7" opacity="0.6"/>
  <!-- Speed lines at bottom -->
  <line x1="100" y1="380" x2="200" y2="340" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="400" x2="200" y2="365" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="412" y1="380" x2="312" y2="340" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="432" y1="400" x2="312" y2="365" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Title bar -->
  <rect x="80" y="400" width="352" height="60" rx="12" fill="white" opacity="0.2"/>
  <rect x="100" y="415" width="120" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="100" y="432" width="80" height="6" rx="3" fill="white" opacity="0.5"/>
</svg>
