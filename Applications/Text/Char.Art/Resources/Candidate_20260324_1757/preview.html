<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Char.Art — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #040A0A; font-family: 'Courier New', monospace; color: #4ADE80; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #22D3EE; letter-spacing: 4px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #16A34A; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #0A1A0A; border: 2px solid #16A34A; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #4ADE80; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #86EFAC; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #4ADE80; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #14532D; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>@#$ Char.Art @#$</h1>
<p class="subtitle">이미지 → ASCII/텍스트 아트 변환기 — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">ASCII 문자 스마일 얼굴</div>
    <span class="tag literal">literal</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#0A0A0A"></div>
      <div class="swatch" style="background:#22C55E"></div>
      <div class="swatch" style="background:#4ADE80"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">이미지 → @#$% 변환</div>
    <span class="tag literal">literal</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#C2410C"></div>
      <div class="swatch" style="background:#FDDCB5"></div>
      <div class="swatch" style="background:#FEF08A"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">픽셀 도트로 분해된 @</div>
    <span class="tag metaphor">metaphor</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#1E3A8A"></div>
      <div class="swatch" style="background:#22D3EE"></div>
      <div class="swatch" style="background:#A5F3FC"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">프리즘 — 빛이 문자로 산란</div>
    <span class="tag metaphor">metaphor</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#1E1B4B"></div>
      <div class="swatch" style="background:#EDE9FE"></div>
      <div class="swatch" style="background:#EF4444"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">@ 태양 — 문자 아트의 중심</div>
    <span class="tag hybrid">hybrid</span><span class="tag">실루엣/캐릭터</span>
    <div class="palette">
      <div class="swatch" style="background:#9D174D"></div>
      <div class="swatch" style="background:#FCD34D"></div>
      <div class="swatch" style="background:#F9A8D4"></div>
    </div>
  </div>
</div>
</body>
</html>
