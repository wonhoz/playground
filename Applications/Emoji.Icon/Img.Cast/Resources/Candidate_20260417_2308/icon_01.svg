  <text x="250" y="525" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#1565C0" text-anchor="middle">PNG</text>
  <!-- 오른쪽 ICO 카드 -->
  <rect x="614" y="420" width="320" height="160" rx="20" fill="#FFF176" opacity="0.97"/>
  <text x="774" y="525" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#E65100" text-anchor="middle">ICO</text>
  <!-- Layer 3: 화살표 -->
  <line x1="430" y1="500" x2="580" y2="500" stroke="white" stroke-width="72" stroke-linecap="round"/>
  <polygon points="568,440 660,500 568,560" fill="white"/>
