<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#100a20"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#aaaaff"/>
      <stop offset="100%" stop-color="#220066"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Galaxy spiral arms -->
  <path d="M256,256 Q300,220 340,190 Q380,160 400,130" fill="none" stroke="#6644ff" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <path d="M256,256 Q220,220 190,190 Q160,160 140,130" fill="none" stroke="#4422ff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M256,256 Q290,290 320,320 Q360,360 380,400" fill="none" stroke="#8866ff" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <path d="M256,256 Q220,290 190,320 Q150,360 130,400" fill="none" stroke="#5533ff" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
  <!-- Star field along arms -->
  <circle cx="330" cy="195" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="380" cy="155" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="310" cy="310" r="3" fill="#aaaaff" opacity="0.7"/>
  <circle cx="365" cy="365" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="165" cy="170" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="185" cy="315" r="3" fill="#aaaaff" opacity="0.7"/>
  <!-- Raiding ships (red) -->
  <polygon points="420,110 405,130 435,130" fill="#ff3333"/>
  <polygon points="120,400 105,420 135,420" fill="#ff6633"/>
  <polygon points="410,380 395,400 425,400" fill="#ff3366"/>
  <!-- Galaxy core -->
  <circle cx="256" cy="256" r="30" fill="url(#core)"/>
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#8866ff">ORBIT.RAID</text>
</svg>
