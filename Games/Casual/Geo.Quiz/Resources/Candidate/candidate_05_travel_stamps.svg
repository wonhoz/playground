<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="passportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede0c8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Passport/journal -->
  <rect x="80" y="80" width="350" height="380" rx="16" fill="url(#passportGrad)"/>
  <!-- Passport header -->
  <rect x="80" y="80" width="350" height="60" rx="16" fill="#1565c0"/>
  <rect x="80" y="128" width="350" height="12" fill="#1565c0"/>
  <text x="255" y="118" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">WORLD PASSPORT</text>
  <!-- Travel stamps -->
  <!-- Stamp 1 Japan (red circle) -->
  <circle cx="165" cy="210" r="48" fill="none" stroke="#c62828" stroke-width="3"/>
  <circle cx="165" cy="210" r="42" fill="none" stroke="#c62828" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="165" y="202" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">JAPAN</text>
  <text x="165" y="218" font-family="Arial" font-size="16" text-anchor="middle">🇯🇵</text>
  <text x="165" y="234" font-family="'Courier New', monospace" font-size="9" fill="#c62828" text-anchor="middle">2026.01.15</text>
  <!-- Stamp 2 France (blue) -->
  <rect x="230" y="162" width="92" height="92" rx="6" fill="none" stroke="#1565c0" stroke-width="3" transform="rotate(12, 276, 208)"/>
  <text x="276" y="200" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle" transform="rotate(12, 276, 208)">FRANCE</text>
  <text x="276" y="216" font-family="Arial" font-size="16" text-anchor="middle" transform="rotate(12, 276, 208)">🇫🇷</text>
  <text x="276" y="232" font-family="'Courier New', monospace" font-size="9" fill="#1565c0" text-anchor="middle" transform="rotate(12, 276, 208)">2025.11.20</text>
  <!-- Stamp 3 Korea (teal) -->
  <circle cx="370" cy="230" r="42" fill="none" stroke="#00796b" stroke-width="3" transform="rotate(-8, 370, 230)"/>
  <text x="370" y="222" font-family="Arial" font-size="11" font-weight="bold" fill="#00796b" text-anchor="middle">KOREA</text>
  <text x="370" y="238" font-family="Arial" font-size="16" text-anchor="middle">🇰🇷</text>
  <text x="370" y="254" font-family="'Courier New', monospace" font-size="9" fill="#00796b" text-anchor="middle">2026.03.01</text>
  <!-- Stamp 4 Brazil (green, small) -->
  <ellipse cx="155" cy="340" rx="55" ry="42" fill="none" stroke="#2e7d32" stroke-width="2.5" transform="rotate(-5, 155, 340)"/>
  <text x="155" y="332" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle" transform="rotate(-5, 155, 340)">BRAZIL</text>
  <text x="155" y="348" font-family="Arial" font-size="15" text-anchor="middle" transform="rotate(-5, 155, 340)">🇧🇷</text>
  <!-- Stamp 5 ? (next destination) -->
  <circle cx="320" cy="355" r="50" fill="none" stroke="#f57f17" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="320" y="347" font-family="Arial" font-size="13" font-weight="bold" fill="#f57f17" text-anchor="middle">NEXT?</text>
  <text x="320" y="368" font-family="Arial" font-size="36" font-weight="900" fill="#f57f17" text-anchor="middle">?</text>
  <!-- Title -->
  <text x="256" y="492" font-family="Arial" font-size="28" font-weight="900" fill="#ffcc80" text-anchor="middle">GEO.QUIZ</text>
</svg>
