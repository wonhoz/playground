<!-- AI.Clip icon_09: 컴파스 방향 (compass pointing: navigate to text) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0520"/>
  <!-- Compass ring -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#7B1FA2" stroke-width="36"/>
  <circle cx="512" cy="512" r="260" fill="#1A0A2A"/>
  <!-- Cardinal marks -->
  <rect x="492" y="226" width="40" height="56" rx="8" fill="#CE93D8"/>
  <rect x="492" y="742" width="40" height="56" rx="8" fill="#7B1FA2"/>
  <rect x="226" y="492" width="56" height="40" rx="8" fill="#7B1FA2"/>
  <rect x="742" y="492" width="56" height="40" rx="8" fill="#7B1FA2"/>
  <!-- Needle (pointing to N/up) -->
  <polygon points="512,290 492,512 512,480 532,512" fill="#CE93D8"/>
  <polygon points="512,734 492,512 512,544 532,512" fill="#6A1B9A"/>
  <!-- Center pivot -->
  <circle cx="512" cy="512" r="28" fill="#9C27B0"/>
</svg>
