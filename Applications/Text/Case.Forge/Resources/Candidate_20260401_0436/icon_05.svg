<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCFF90"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Decorative branch/leaf -->
  <ellipse cx="820" cy="200" rx="80" ry="40" fill="#69F0AE" opacity="0.6" transform="rotate(-30 820 200)"/>
  <ellipse cx="880" cy="160" rx="60" ry="30" fill="#00C853" opacity="0.5" transform="rotate(-60 880 160)"/>
  <!-- Layer 2: Chameleon silhouette (simplified) -->
  <!-- Body -->
  <ellipse cx="490" cy="560" rx="240" ry="160" fill="#2E7D32"/>
  <!-- Head -->
  <ellipse cx="720" cy="480" rx="150" ry="120" fill="#388E3C"/>
  <!-- Snout -->
  <ellipse cx="860" cy="500" rx="80" ry="55" fill="#43A047"/>
  <!-- Curly tail (spiral) -->
  <path d="M 260 580 Q 180 620 160 700 Q 140 780 200 800 Q 260 820 280 760 Q 300 700 240 680" fill="none" stroke="#1B5E20" stroke-width="36" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="340" y="680" width="50" height="120" rx="25" fill="#2E7D32" transform="rotate(-10 365 740)"/>
  <rect x="540" y="690" width="50" height="110" rx="25" fill="#2E7D32" transform="rotate(10 565 745)"/>
  <rect x="420" y="700" width="44" height="100" rx="22" fill="#388E3C" transform="rotate(-5 442 750)"/>
  <!-- Eye -->
  <circle cx="760" cy="450" r="40" fill="white"/>
  <circle cx="770" cy="455" r="26" fill="#FFD600"/>
  <circle cx="778" cy="460" r="14" fill="#1B5E20"/>
  <!-- Vertical eye stripe -->
  <ellipse cx="780" cy="452" rx="6" ry="26" fill="#0D47A1" opacity="0.7"/>
  <!-- Layer 3: "Cc" text label + color patches on body -->
  <ellipse cx="500" cy="520" rx="90" ry="55" fill="#00E676" opacity="0.8"/>
  <text x="500" y="522" text-anchor="middle" dominant-baseline="middle" font-size="84" font-family="Georgia,serif" font-weight="bold" fill="#1B5E20">Cc</text>
  <!-- Color patches on body (chameleon changing) -->
  <circle cx="380" cy="580" r="38" fill="#FF6D00" opacity="0.7"/>
  <circle cx="600" cy="590" r="32" fill="#7C4DFF" opacity="0.7"/>
  <circle cx="440" cy="630" r="28" fill="#F50057" opacity="0.6"/>
  <!-- Small text indicator -->
  <text x="512" y="900" text-anchor="middle" dominant-baseline="middle" font-size="82" font-family="Consolas,monospace" fill="#1B5E20" opacity="0.7">camelCase</text>
</svg>
