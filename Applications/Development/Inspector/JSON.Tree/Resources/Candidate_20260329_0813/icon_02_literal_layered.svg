<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2B45"/>
      <stop offset="100%" stop-color="#0A4F6E"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg2)"/>

  <!-- Layer 2: Hierarchy rows (node cards) -->
  <!-- Root row -->
  <rect x="312" y="168" width="400" height="80" rx="14" fill="#00D4FF" opacity="0.18"/>
  <text x="512" y="214" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="52" font-weight="700"
        fill="#00D4FF" opacity="0.9">{ root }</text>

  <!-- Connector lines -->
  <line x1="430" y1="248" x2="360" y2="360" stroke="#00D4FF" stroke-width="10" stroke-dasharray="12 8" opacity="0.4"/>
  <line x1="594" y1="248" x2="664" y2="360" stroke="#4ECDC4" stroke-width="10" stroke-dasharray="12 8" opacity="0.4"/>

  <!-- Level 2 left -->
  <rect x="172" y="360" width="320" height="76" rx="12" fill="#4ECDC4" opacity="0.18"/>
  <text x="332" y="400" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="48" font-weight="700"
        fill="#4ECDC4" opacity="0.9">[ array ]</text>

  <!-- Level 2 right -->
  <rect x="532" y="360" width="320" height="76" rx="12" fill="#FFD166" opacity="0.18"/>
  <text x="692" y="400" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="48" font-weight="700"
        fill="#FFD166" opacity="0.9">{ obj }</text>

  <!-- Connector level 3 -->
  <line x1="270" y1="436" x2="230" y2="540" stroke="#4ECDC4" stroke-width="8" stroke-dasharray="10 6" opacity="0.35"/>
  <line x1="394" y1="436" x2="434" y2="540" stroke="#4ECDC4" stroke-width="8" stroke-dasharray="10 6" opacity="0.35"/>
  <line x1="626" y1="436" x2="580" y2="540" stroke="#FFD166" stroke-width="8" stroke-dasharray="10 6" opacity="0.35"/>
  <line x1="758" y1="436" x2="796" y2="540" stroke="#FFD166" stroke-width="8" stroke-dasharray="10 6" opacity="0.35"/>

  <!-- Level 3 leaf nodes -->
  <rect x="148" y="540" width="168" height="64" rx="10" fill="#78CC78" opacity="0.22"/>
  <text x="232" y="574" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="38" font-weight="600"
        fill="#78CC78">"str"</text>

  <rect x="354" y="540" width="160" height="64" rx="10" fill="#DD7777" opacity="0.22"/>
  <text x="434" y="574" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="38" font-weight="600"
        fill="#DD7777">## 42</text>

  <rect x="490" y="540" width="176" height="64" rx="10" fill="#CC88DD" opacity="0.22"/>
  <text x="578" y="574" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="38" font-weight="600"
        fill="#CC88DD">✓ true</text>

  <rect x="708" y="540" width="168" height="64" rx="10" fill="#7799AA" opacity="0.22"/>
  <text x="792" y="574" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="38" font-weight="600"
        fill="#7799AA">∅ null</text>

  <!-- Layer 3: Big { } watermark -->
  <text x="512" y="820" text-anchor="middle" dominant-baseline="middle"
        font-family="'Courier New', monospace" font-size="260" font-weight="900"
        fill="#00D4FF" opacity="0.08" letter-spacing="-10">{  }</text>

  <!-- Title -->
  <text x="512" y="930" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI', sans-serif" font-size="62" font-weight="700"
        fill="#FFFFFF" opacity="0.7" letter-spacing="6">JSON.Tree</text>
</svg>
