<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Screen mirroring: two screens with arrows between them -->
  <rect x="160" y="340" width="280" height="200" rx="16" fill="none" stroke="#FF8F00" stroke-width="30"/>
  <rect x="584" y="340" width="280" height="200" rx="16" fill="none" stroke="#FFB300" stroke-width="30"/>
  <!-- Arrow right -->
  <path d="M460 480 L564 480" stroke="#FFB300" stroke-width="32" stroke-linecap="round"/>
  <path d="M540 450 L572 480 L540 510" fill="none" stroke="#FFB300" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow left -->
  <path d="M460 560 L564 560" stroke="#FF8F00" stroke-width="32" stroke-linecap="round"/>
  <path d="M484 530 L452 560 L484 590" fill="none" stroke="#FF8F00" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screen stands -->
  <line x1="300" y1="540" x2="300" y2="600" stroke="#FF8F00" stroke-width="24" stroke-linecap="round"/>
  <line x1="724" y1="540" x2="724" y2="600" stroke="#FFB300" stroke-width="24" stroke-linecap="round"/>
  <line x1="220" y1="600" x2="380" y2="600" stroke="#FF8F00" stroke-width="24" stroke-linecap="round"/>
  <line x1="644" y1="600" x2="804" y2="600" stroke="#FFB300" stroke-width="24" stroke-linecap="round"/>
</svg>
