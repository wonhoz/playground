    <circle cx="310" cy="590" r="12" fill="#FF3333"/>
    <circle cx="400" cy="620" r="12" fill="#FF3333"/>
    <circle cx="490" cy="660" r="12" fill="#FF3333"/>
    <circle cx="580" cy="680" r="12" fill="#FF3333"/>
    <circle cx="670" cy="710" r="12" fill="#FF3333"/>
    <circle cx="760" cy="730" r="12" fill="#FF3333"/>
    <!-- + 레이블 (오른쪽 상단) -->
    <rect x="700" y="270" width="90" height="46" rx="10" fill="#22DD66" opacity="0.2"/>
    <rect x="736" y="283" width="18" height="20" rx="3" fill="#22DD66"/>
    <rect x="730" y="289" width="30" height="8" rx="3" fill="#22DD66"/>
    <!-- - 레이블 (오른쪽 하단) -->
    <rect x="700" y="750" width="90" height="46" rx="10" fill="#FF3333" opacity="0.2"/>
    <rect x="730" y="769" width="30" height="8" rx="3" fill="#FF3333"/>
    <!-- 왼쪽 파일 아이콘 -->
    <rect x="238" y="410" width="16" height="20" rx="3" fill="#607080"/>
    <path d="M 247 410 L 254 410 L 254 417 L 247 417 Z" fill="#405060"/>
    <!-- 트래킹 마커 (주황) -->
