<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 네이비 -->
  <rect width="1024" height="1024" rx="180" fill="#0A0A1A"/>
  <!-- Layer 2: 색상 스펙트럼 팔레트 + 샘플 워드 클라우드 -->
  <!-- 상단 팔레트 바 -->
  <rect x="120" y="160" width="784" height="60" rx="12" fill="#111"/>
  <rect x="120" y="160" width="112" height="60" rx="0" fill="#F44336"/>
  <rect x="232" y="160" width="112" height="60" fill="#FF9800"/>
  <rect x="344" y="160" width="112" height="60" fill="#FFEB3B"/>
  <rect x="456" y="160" width="112" height="60" fill="#4CAF50"/>
  <rect x="568" y="160" width="112" height="60" fill="#2196F3"/>
  <rect x="680" y="160" width="112" height="60" fill="#9C27B0"/>
  <rect x="792" y="160" width="112" height="60" rx="0" fill="#E91E63"/>
  <!-- 왼쪽 라운드 처리 -->
  <rect x="120" y="160" width="112" height="60" rx="12" fill="#F44336" clip-path="url(#lclip)"/>
  <!-- 오른쪽 라운드 처리 -->
  <rect x="792" y="160" width="112" height="60" rx="12" fill="#E91E63" clip-path="url(#rclip)"/>
  <!-- 샘플 워드 클라우드 (컬러풀) -->
  <text x="512" y="420" font-family="Arial Black,Arial" font-size="140" font-weight="900" fill="#2196F3" text-anchor="middle">data</text>
  <text x="250" y="380" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#F44336" text-anchor="middle">big</text>
  <text x="800" y="370" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#4CAF50" text-anchor="middle">ai</text>
  <text x="200" y="530" font-family="Arial" font-size="56" font-weight="700" fill="#FF9800" text-anchor="middle">NLP</text>
  <text x="820" y="530" font-family="Arial" font-size="52" font-weight="700" fill="#9C27B0" text-anchor="middle">ML</text>
  <text x="512" y="560" font-family="Arial" font-size="56" fill="#E91E63" text-anchor="middle" opacity="0.7">analysis</text>
  <!-- Layer 3: 하단 슬라이더 UI -->
  <rect x="160" y="620" width="704" height="60" rx="10" fill="#1A1A2E"/>
  <rect x="160" y="640" width="704" height="20" rx="10" fill="#333"/>
  <rect x="160" y="640" width="480" height="20" rx="10" fill="#2196F3"/>
  <circle cx="640" cy="650" r="22" fill="white" stroke="#2196F3" stroke-width="4"/>
  <text x="512" y="740" font-family="Arial" font-size="32" fill="#888" text-anchor="middle">color palette</text>
</svg>
