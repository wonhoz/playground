<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="50%" stop-color="#4A0060"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Retro sun -->
  <circle cx="256" cy="210" r="90" fill="url(#sun)"/>
  <!-- Sun stripe mask -->
  <rect x="166" y="240" width="180" height="10" fill="#1A0033"/>
  <rect x="166" y="258" width="180" height="10" fill="#1A0033"/>
  <rect x="166" y="276" width="180" height="12" fill="#1A0033"/>
  <rect x="166" y="296" width="180" height="14" fill="#1A0033"/>
  <!-- Grid floor -->
  <line x1="60" y1="340" x2="452" y2="340" stroke="#FF006E" stroke-width="2" opacity="0.8"/>
  <line x1="60" y1="370" x2="452" y2="370" stroke="#FF006E" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="400" x2="452" y2="400" stroke="#FF006E" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="430" x2="452" y2="430" stroke="#FF006E" stroke-width="1" opacity="0.4"/>
  <!-- Grid verticals -->
  <line x1="180" y1="340" x2="140" y2="460" stroke="#FF006E" stroke-width="1" opacity="0.6"/>
  <line x1="256" y1="340" x2="256" y2="460" stroke="#FF006E" stroke-width="1" opacity="0.6"/>
  <line x1="332" y1="340" x2="372" y2="460" stroke="#FF006E" stroke-width="1" opacity="0.6"/>
  <!-- Morse code top -->
  <text x="256" y="90" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FF6EC7">― · ― · ·</text>
  <!-- Title neon -->
  <text x="256" y="480" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FF006E" letter-spacing="3">MORSE.RUN</text>
</svg>