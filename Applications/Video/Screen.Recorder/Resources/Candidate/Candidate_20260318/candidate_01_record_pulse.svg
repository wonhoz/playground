<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 녹화 버튼 (동심원 펄스) -->
  <circle cx="256" cy="240" r="130" fill="#EF4444" opacity="0.04"/>
  <circle cx="256" cy="240" r="100" fill="#EF4444" opacity="0.06"/>
  <circle cx="256" cy="240" r="70" fill="#EF4444" opacity="0.08" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="45" fill="#EF4444" opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="28" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#EF4444" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">RECORD PULSE</text>
</svg>
