<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 틸 -->
  <rect width="1024" height="1024" rx="180" fill="#002B36"/>
  <!-- Layer 2: 격자 + 강조된 단어들 (교차 패턴) -->
  <!-- 전체 격자 배경 -->
  <rect x="120" y="160" width="784" height="704" rx="16" fill="#003847"/>
  <!-- 5×5 격자 (크게) -->
  <!-- 검정 칸들 -->
  <rect x="120" y="160" width="160" height="144" fill="#001A22"/>
  <rect x="440" y="160" width="160" height="144" fill="#001A22"/>
  <rect x="760" y="304" width="144" height="144" fill="#001A22"/>
  <rect x="120" y="448" width="160" height="144" fill="#001A22"/>
  <rect x="440" y="592" width="160" height="144" fill="#001A22"/>
  <rect x="760" y="736" width="144" height="128" fill="#001A22"/>
  <!-- 하이라이트 가로 (WORD) -->
  <rect x="280" y="304" width="480" height="144" rx="4" fill="#2AA198" opacity="0.8"/>
  <!-- 하이라이트 세로 (GAME) -->
  <rect x="600" y="160" width="160" height="576" rx="4" fill="#268BD2" opacity="0.6"/>
  <!-- 글자들 -->
  <text x="360" y="402" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">W</text>
  <text x="520" y="402" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="#FDF6E3" text-anchor="middle">O</text>
  <text x="680" y="402" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="840" y="402" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">D</text>
  <text x="680" y="258" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="#FDF6E3" text-anchor="middle">G</text>
  <!-- O는 공유 -->
  <text x="680" y="546" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="#FDF6E3" text-anchor="middle">M</text>
  <text x="680" y="690" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="#FDF6E3" text-anchor="middle">E</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#2AA198" text-anchor="middle">CROSSWORD.CAST</text>
</svg>
