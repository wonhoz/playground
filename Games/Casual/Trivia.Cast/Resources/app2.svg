<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: 2×2 category tiles -->
  <!-- Science tile (top-left) -->
  <rect x="96" y="96" width="400" height="400" rx="28" fill="#EF5350"/>
  <text x="296" y="258" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Segoe UI Emoji,Arial" fill="white">🔬</text>
  <text x="296" y="380" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial" font-weight="bold" fill="white">Science</text>
  <!-- History tile (top-right) -->
  <rect x="528" y="96" width="400" height="400" rx="28" fill="#FFA726"/>
  <text x="728" y="258" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Segoe UI Emoji,Arial" fill="white">🏛️</text>
  <text x="728" y="380" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial" font-weight="bold" fill="white">History</text>
  <!-- Nature tile (bottom-left) -->
  <rect x="96" y="528" width="400" height="400" rx="28" fill="#66BB6A"/>
  <text x="296" y="690" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Segoe UI Emoji,Arial" fill="white">🌿</text>
  <text x="296" y="812" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial" font-weight="bold" fill="white">Nature</text>
  <!-- Geography tile (bottom-right) -->
  <rect x="528" y="528" width="400" height="400" rx="28" fill="#42A5F5"/>
  <text x="728" y="690" text-anchor="middle" dominant-baseline="middle" font-size="120" font-family="Segoe UI Emoji,Arial" fill="white">🌍</text>
  <text x="728" y="812" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial" font-weight="bold" fill="white">Geo</text>
  <!-- Layer 3: Center ? badge -->
  <circle cx="512" cy="512" r="80" fill="#FFD700" stroke="#1A237E" stroke-width="10"/>
  <text x="512" y="516" text-anchor="middle" dominant-baseline="middle" font-size="110" font-family="Georgia,serif" font-weight="bold" fill="#1A237E">?</text>
</svg>
