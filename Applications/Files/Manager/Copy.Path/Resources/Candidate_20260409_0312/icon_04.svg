<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c4"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Mint green background -->
  <rect width="1024" height="1024" rx="190" fill="#ECFDF5"/>
  <g clip-path="url(#c4)">
    <!-- Layer 2: Branch lines from trunk to format labels -->
    <!-- Trunk (from file icon up to fork point) -->
    <line x1="512" y1="790" x2="512" y2="560" stroke="#10B981" stroke-width="64" stroke-linecap="round"/>
    <!-- Left branch: to C:\ label -->
    <path d="M 512,560 Q 512,440 340,380" stroke="#2563EB" stroke-width="64" stroke-linecap="round" fill="none"/>
    <!-- Center branch: to / label -->
    <line x1="512" y1="560" x2="512" y2="280" stroke="#7C3AED" stroke-width="64" stroke-linecap="round"/>
    <!-- Right branch: to url label -->
    <path d="M 512,560 Q 512,440 684,380" stroke="#F97316" stroke-width="64" stroke-linecap="round" fill="none"/>

    <!-- Layer 3: File icon at trunk bottom -->
    <rect x="448" y="802" width="128" height="160" rx="12" fill="white" stroke="#10B981" stroke-width="10"/>
    <!-- Folded corner on file icon -->
    <polygon points="528,802 576,802 576,852 528,852" fill="#D1FAE5"/>
    <line x1="528" y1="802" x2="576" y2="852" stroke="#10B981" stroke-width="8"/>
    <!-- Format labels at branch ends -->
    <!-- C:\ label (left branch end at ~340,380) -->
    <rect x="238" y="330" width="194" height="88" rx="16" fill="#2563EB"/>
    <text x="335" y="390" font-family="Consolas,monospace" font-size="82" fill="white" font-weight="bold" text-anchor="middle">C:\</text>
    <!-- / label (center branch end at 512,280) -->
    <rect x="440" y="226" width="144" height="88" rx="16" fill="#7C3AED"/>
    <text x="512" y="290" font-family="Consolas,monospace" font-size="82" fill="white" font-weight="bold" text-anchor="middle">/</text>
    <!-- url label (right branch end at ~684,380) -->
    <rect x="594" y="330" width="194" height="88" rx="16" fill="#F97316"/>
    <text x="691" y="390" font-family="Consolas,monospace" font-size="82" fill="white" font-weight="bold" text-anchor="middle">url</text>
  </g>
</svg>
