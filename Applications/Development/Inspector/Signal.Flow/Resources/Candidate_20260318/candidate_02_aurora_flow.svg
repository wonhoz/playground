<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000005"/>
      <stop offset="100%" stop-color="#00000f"/>
    </linearGradient>
    <linearGradient id="a1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="450" cy="70" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="120" cy="90" r="1" fill="white" opacity="0.3"/>
  <!-- Aurora curtains (signal flows as aurora bands) -->
  <!-- Band 1 (cyan) -->
  <path d="M60,200 Q140,140 220,180 Q300,220 380,160 Q420,140 460,170 L460,400 Q420,380 380,400 Q300,440 220,400 Q140,360 60,400 Z" fill="url(#a1)" opacity="0.5"/>
  <!-- Band 2 (green) -->
  <path d="M60,230 Q130,170 210,210 Q290,250 370,195 Q410,170 460,200 L460,370 Q410,340 370,365 Q290,410 210,375 Q130,340 60,370 Z" fill="url(#a2)" opacity="0.4"/>
  <!-- Band 3 (purple) -->
  <path d="M60,260 Q120,205 200,240 Q280,280 360,225 Q400,200 460,230 L460,340 Q400,310 360,335 Q280,380 200,345 Q120,310 60,340 Z" fill="url(#a3)" opacity="0.35"/>
  <!-- Band 4 (pink) -->
  <path d="M60,285 Q115,240 195,270 Q270,305 350,255 Q390,235 460,258 L460,315 Q390,292 350,312 Q270,355 195,320 Q115,285 60,312 Z" fill="url(#a4)" opacity="0.3"/>
  <!-- Signal value annotations -->
  <text x="150" y="185" font-family="monospace" font-size="9" fill="#22D3EE" opacity="0.7">CH1: 2.4V</text>
  <text x="300" y="205" font-family="monospace" font-size="9" fill="#4ADE80" opacity="0.7">CH2: 1.8V</text>
  <text x="160" y="235" font-family="monospace" font-size="9" fill="#818CF8" opacity="0.6">CH3: 3.1V</text>
  <text x="320" y="253" font-family="monospace" font-size="9" fill="#F472B6" opacity="0.6">CH4: 0.9V</text>
  <!-- Ground line -->
  <line x1="60" y1="420" x2="460" y2="420" stroke="#4ADE80" stroke-width="1.5" opacity="0.3"/>
  <text x="70" y="436" font-family="monospace" font-size="9" fill="#4ADE80" opacity="0.4">GND</text>
  <!-- Title -->
  <text x="256" y="480" text-anchor="middle" font-family="monospace" font-size="11" fill="#22D3EE" opacity="0.6">AURORA SIGNAL</text>
</svg>
