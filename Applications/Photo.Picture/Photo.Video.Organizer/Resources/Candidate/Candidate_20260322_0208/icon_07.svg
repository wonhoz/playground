<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07 | Literal / 레이어드 | 복수 파일 아이콘 + 연속 이름변경 -->
  <!-- 컨셉: 여러 파일이 줄지어 EXIF 읽기 후 날짜 파일명으로 바뀌는 컨베이어벨트 -->
  <!-- 색조: 밝은 민트 그린 배경 + 딥 틸 + 선명한 옐로 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="#E8FAF2"/>

  <!-- 컨베이어 벨트 -->
  <rect x="100" y="490" width="824" height="44" rx="12" fill="#0D5A46" opacity="0.2"/>
  <rect x="100" y="502" width="824" height="20" rx="6" fill="#0D5A46" opacity="0.15"/>
  <!-- 벨트 롤러 -->
  <circle cx="120" cy="512" r="24" fill="#0D5A46" opacity="0.3"/>
  <circle cx="904" cy="512" r="24" fill="#0D5A46" opacity="0.3"/>
  <!-- 벨트 텍스처 -->
  <g stroke="#0D5A46" stroke-width="3" opacity="0.12">
    <line x1="180" y1="490" x2="180" y2="534"/>
    <line x1="240" y1="490" x2="240" y2="534"/>
    <line x1="300" y1="490" x2="300" y2="534"/>
    <line x1="360" y1="490" x2="360" y2="534"/>
    <line x1="420" y1="490" x2="420" y2="534"/>
    <line x1="480" y1="490" x2="480" y2="534"/>
    <line x1="540" y1="490" x2="540" y2="534"/>
    <line x1="600" y1="490" x2="600" y2="534"/>
    <line x1="660" y1="490" x2="660" y2="534"/>
    <line x1="720" y1="490" x2="720" y2="534"/>
    <line x1="780" y1="490" x2="780" y2="534"/>
    <line x1="840" y1="490" x2="840" y2="534"/>
  </g>

  <!-- 입력 파일들 (좌측 - 원본 이름) -->
  <!-- 파일 1 -->
  <g transform="translate(130,330)">
    <rect x="0" y="0" width="100" height="126" rx="10" fill="white" stroke="#B0D4C6" stroke-width="5"/>
    <polygon points="70,0 100,0 100,30 70,30" fill="white"/>
    <polygon points="70,0 100,30 70,30" fill="#B0D4C6"/>
    <!-- 사진 미니 -->
    <rect x="10" y="36" width="80" height="52" rx="4" fill="#87CEEB" opacity="0.6"/>
    <path d="M10 74 Q25 62 38 68 Q52 58 68 66 Q78 58 90 64 L90 88 L10 88Z" fill="#6B9A4F" opacity="0.7"/>
    <text x="50" y="110" font-family="Consolas,monospace" font-size="12" fill="#7A9A8A" text-anchor="middle">IMG_9821</text>
    <text x="50" y="124" font-family="Consolas,monospace" font-size="11" fill="#9ABBA8" text-anchor="middle">.jpg</text>
  </g>
  <!-- 파일 2 -->
  <g transform="translate(248,330)">
    <rect x="0" y="0" width="100" height="126" rx="10" fill="white" stroke="#B0D4C6" stroke-width="5"/>
    <polygon points="70,0 100,0 100,30 70,30" fill="white"/>
    <polygon points="70,0 100,30 70,30" fill="#B0D4C6"/>
    <!-- 비디오 미니 -->
    <rect x="10" y="36" width="80" height="52" rx="4" fill="#2C3E50" opacity="0.7"/>
    <polygon points="38,52 68,62 38,72" fill="#F39C12"/>
    <text x="50" y="110" font-family="Consolas,monospace" font-size="12" fill="#7A9A8A" text-anchor="middle">VID_0042</text>
    <text x="50" y="124" font-family="Consolas,monospace" font-size="11" fill="#9ABBA8" text-anchor="middle">.mp4</text>
  </g>
  <!-- 파일 3 -->
  <g transform="translate(366,330)">
    <rect x="0" y="0" width="100" height="126" rx="10" fill="white" stroke="#B0D4C6" stroke-width="5"/>
    <polygon points="70,0 100,0 100,30 70,30" fill="white"/>
    <polygon points="70,0 100,30 70,30" fill="#B0D4C6"/>
    <rect x="10" y="36" width="80" height="52" rx="4" fill="#87CEEB" opacity="0.6"/>
    <path d="M10 76 Q28 60 44 70 Q60 52 80 66 Q85 60 90 64 L90 88 L10 88Z" fill="#4A8A3A" opacity="0.7"/>
    <text x="50" y="110" font-family="Consolas,monospace" font-size="12" fill="#7A9A8A" text-anchor="middle">IMG_9822</text>
    <text x="50" y="124" font-family="Consolas,monospace" font-size="11" fill="#9ABBA8" text-anchor="middle">.jpg</text>
  </g>

  <!-- EXIF 처리 기어/변환 중앙 박스 -->
  <rect x="490" y="300" width="180" height="190" rx="20" fill="#0D5A46" opacity="0.95"/>
  <!-- 기어 아이콘 -->
  <g transform="translate(580,370)">
    <circle cx="0" cy="0" r="40" fill="#0A4034"/>
    <circle cx="0" cy="0" r="28" fill="#116644" stroke="#1DB887" stroke-width="3"/>
    <!-- 기어 이빨 -->
    <g fill="#0D5A46" stroke="#1DB887" stroke-width="3">
      <rect x="-8" y="-52" width="16" height="18" rx="3"/>
      <rect x="-8" y="34" width="16" height="18" rx="3"/>
      <rect x="34" y="-8" width="18" height="16" rx="3"/>
      <rect x="-52" y="-8" width="18" height="16" rx="3"/>
      <!-- 대각선 이빨 -->
      <rect x="22" y="-46" width="16" height="18" rx="3" transform="rotate(45,30,-38)"/>
      <rect x="-38" y="28" width="16" height="18" rx="3" transform="rotate(45,-30,36)"/>
      <rect x="28" y="28" width="16" height="18" rx="3" transform="rotate(-45,36,36)"/>
      <rect x="-44" y="-46" width="16" height="18" rx="3" transform="rotate(-45,-36,-38)"/>
    </g>
    <circle cx="0" cy="0" r="12" fill="#0D5A46"/>
  </g>
  <!-- EXIF 텍스트 -->
  <text x="580" y="456" font-family="Consolas,monospace" font-size="16" fill="#7FFFD4" text-anchor="middle" font-weight="bold">EXIF</text>
  <text x="580" y="476" font-family="Consolas,monospace" font-size="12" fill="#4DB895" text-anchor="middle">Parser</text>

  <!-- 출력 파일들 (우측 - 날짜 이름) -->
  <!-- 출력 파일 1 -->
  <g transform="translate(704,330)">
    <rect x="0" y="0" width="100" height="126" rx="10" fill="#0D5A46" stroke="#1DB887" stroke-width="5"/>
    <polygon points="70,0 100,0 100,30 70,30" fill="#0D5A46"/>
    <polygon points="70,0 100,30 70,30" fill="#1DB887"/>
    <rect x="10" y="36" width="80" height="52" rx="4" fill="#87CEEB" opacity="0.6"/>
    <path d="M10 74 Q25 62 38 68 Q52 58 68 66 Q78 58 90 64 L90 88 L10 88Z" fill="#6B9A4F" opacity="0.7"/>
    <text x="50" y="106" font-family="Consolas,monospace" font-size="10" fill="#7FFFD4" text-anchor="middle">20240315</text>
    <text x="50" y="118" font-family="Consolas,monospace" font-size="10" fill="#7FFFD4" text-anchor="middle">_094211</text>
    <text x="50" y="128" font-family="Consolas,monospace" font-size="9" fill="#4DB895" text-anchor="middle">_001.jpg</text>
  </g>
  <!-- 출력 파일 2 -->
  <g transform="translate(822,330)">
    <rect x="0" y="0" width="100" height="126" rx="10" fill="#0D5A46" stroke="#1DB887" stroke-width="5"/>
    <polygon points="70,0 100,0 100,30 70,30" fill="#0D5A46"/>
    <polygon points="70,0 100,30 70,30" fill="#1DB887"/>
    <rect x="10" y="36" width="80" height="52" rx="4" fill="#2C3E50" opacity="0.7"/>
    <polygon points="38,52 68,62 38,72" fill="#F39C12"/>
    <!-- 체크 표시 -->
    <circle cx="82" cy="14" r="14" fill="#1DB887"/>
    <path d="M75,14 L80,20 L89,8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="50" y="106" font-family="Consolas,monospace" font-size="10" fill="#7FFFD4" text-anchor="middle">20240315</text>
    <text x="50" y="118" font-family="Consolas,monospace" font-size="10" fill="#7FFFD4" text-anchor="middle">_143022</text>
    <text x="50" y="128" font-family="Consolas,monospace" font-size="9" fill="#4DB895" text-anchor="middle">_001.mp4</text>
  </g>

  <!-- 하단 카운터 -->
  <rect x="280" y="600" width="464" height="80" rx="16" fill="#0D5A46" opacity="0.12" stroke="#0D5A46" stroke-width="3"/>
  <text x="512" y="634" font-family="Arial,sans-serif" font-size="20" fill="#0D5A46" text-anchor="middle" font-weight="bold">127 files</text>
  <text x="512" y="660" font-family="Arial,sans-serif" font-size="16" fill="#1DB887" text-anchor="middle">renamed by EXIF date</text>

  <!-- 진행 바 -->
  <rect x="280" y="706" width="464" height="18" rx="7" fill="#B0D4C6"/>
  <rect x="280" y="706" width="340" height="18" rx="7" fill="#0D5A46"/>
  <text x="780" y="720" font-family="Arial,sans-serif" font-size="15" fill="#0D5A46">73%</text>

  <!-- 상단 타이틀 -->
  <text x="512" y="220" font-family="Arial,sans-serif" font-size="34" fill="#0D5A46" text-anchor="middle" font-weight="bold">Photo + Video</text>
  <text x="512" y="260" font-family="Arial,sans-serif" font-size="22" fill="#1DB887" text-anchor="middle">Organizer</text>
</svg>
