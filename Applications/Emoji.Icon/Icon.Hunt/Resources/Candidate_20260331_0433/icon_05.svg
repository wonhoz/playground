<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 연초록 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 검색창 UI -->
  <rect x="112" y="200" width="800" height="120" rx="60" fill="white" stroke="#43A047" stroke-width="10"/>
  <circle cx="176" cy="260" r="34" fill="none" stroke="#78909C" stroke-width="12"/>
  <line x1="202" y1="286" x2="230" y2="314" stroke="#78909C" stroke-width="12" stroke-linecap="round"/>
  <text x="310" y="282" font-family="'Segoe UI', Arial, sans-serif" font-size="80" fill="#B0BEC5">icon</text>
  <!-- 커서 깜빡임 효과 -->
  <rect x="570" y="222" width="8" height="76" rx="4" fill="#43A047"/>
  <!-- Layer 3: 결과 아이콘들 떠오르는 모습 -->
  <rect x="112" y="380" width="180" height="180" rx="24" fill="#E91E63"/>
  <text x="202" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="100" fill="white" text-anchor="middle">★</text>
  <rect x="322" y="380" width="180" height="180" rx="24" fill="#1565C0"/>
  <text x="412" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="100" fill="white" text-anchor="middle">♦</text>
  <rect x="532" y="380" width="180" height="180" rx="24" fill="#FF6F00"/>
  <text x="622" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="100" fill="white" text-anchor="middle">▲</text>
  <rect x="742" y="380" width="180" height="180" rx="24" fill="#6A1B9A"/>
  <text x="832" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="100" fill="white" text-anchor="middle">●</text>
  <!-- 두번째 줄 아이콘들 (부분) -->
  <rect x="112" y="590" width="180" height="180" rx="24" fill="#00838F" opacity="0.8"/>
  <rect x="322" y="590" width="180" height="180" rx="24" fill="#558B2F" opacity="0.7"/>
  <rect x="532" y="590" width="180" height="180" rx="24" fill="#AD1457" opacity="0.6"/>
  <rect x="742" y="590" width="180" height="180" rx="24" fill="#4527A0" opacity="0.5"/>
  <!-- 결과 카운트 -->
  <text x="512" y="870" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#2E7D32" text-anchor="middle">150,000+ 아이콘</text>
</svg>
