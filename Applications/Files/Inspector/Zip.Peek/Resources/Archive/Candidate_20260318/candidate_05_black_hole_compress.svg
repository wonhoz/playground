<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0900"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="accretion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#FBBF24" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="event" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="70%" stop-color="#0a0900"/>
      <stop offset="100%" stop-color="#1a1600"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bhglow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Accretion disk (horizontal ellipse, glowing) -->
  <ellipse cx="256" cy="256" rx="210" ry="55" fill="none" stroke="#EAB308" stroke-width="30" stroke-opacity="0.15" filter="url(#bhglow)"/>
  <ellipse cx="256" cy="256" rx="200" ry="52" fill="none" stroke="#F59E0B" stroke-width="15" stroke-opacity="0.25" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="190" ry="50" fill="none" stroke="#EAB308" stroke-width="6" stroke-opacity="0.5" filter="url(#softglow)"/>
  <ellipse cx="256" cy="256" rx="180" ry="47" fill="none" stroke="#FBBF24" stroke-width="3" stroke-opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="170" ry="44" fill="none" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="158" ry="40" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Black hole (event horizon) -->
  <circle cx="256" cy="256" r="95" fill="url(#event)"/>
  <circle cx="256" cy="256" r="95" fill="none" stroke="#EAB308" stroke-width="3" stroke-opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="88" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Files being compressed/sucked in (archive compression) -->
  <!-- File 1 approaching from right -->
  <g transform="rotate(-15 380 230)">
    <rect x="360" y="215" width="40" height="50" rx="4" fill="#1a1800" stroke="#EAB308" stroke-width="2" stroke-opacity="0.8" filter="url(#softglow)"/>
    <polygon points="388,215 400,215 400,227" fill="#0f0e00" stroke="#EAB308" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="367" y1="233" x2="393" y2="233" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="367" y1="243" x2="390" y2="243" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="367" y1="253" x2="393" y2="253" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- File 2 approaching from top -->
  <g transform="rotate(25 190 100)">
    <rect x="168" y="85" width="35" height="45" rx="3" fill="#1a1800" stroke="#F59E0B" stroke-width="1.8" stroke-opacity="0.7" filter="url(#softglow)"/>
    <polygon points="192,85 203,85 203,96" fill="#0f0e00" stroke="#F59E0B" stroke-width="1"/>
    <line x1="175" y1="103" x2="198" y2="103" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="175" y1="113" x2="196" y2="113" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- File 3 approaching from left -->
  <g transform="rotate(10 100 290)">
    <rect x="78" y="278" width="38" height="48" rx="3" fill="#1a1800" stroke="#FBBF24" stroke-width="1.8" stroke-opacity="0.7"/>
    <polygon points="104,278 116,278 116,290" fill="#0f0e00" stroke="#FBBF24" stroke-width="1"/>
    <line x1="85" y1="298" x2="110" y2="298" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="85" y1="308" x2="108" y2="308" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- File 4 approaching from bottom -->
  <g transform="rotate(-20 310 420)">
    <rect x="290" y="405" width="36" height="46" rx="3" fill="#1a1800" stroke="#EAB308" stroke-width="1.8" stroke-opacity="0.7"/>
    <polygon points="314,405 326,405 326,417" fill="#0f0e00" stroke="#EAB308" stroke-width="1"/>
    <line x1="297" y1="425" x2="320" y2="425" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="297" y1="435" x2="318" y2="435" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Gravitational lensing arcs -->
  <path d="M 360 190 A 150 150 0 0 0 360 322" fill="none" stroke="#EAB308" stroke-width="2" stroke-opacity="0.25" filter="url(#softglow)"/>
  <path d="M 152 190 A 150 150 0 0 1 152 322" fill="none" stroke="#EAB308" stroke-width="2" stroke-opacity="0.25" filter="url(#softglow)"/>

  <!-- Compressed output (tiny zip) in center -->
  <circle cx="256" cy="256" r="20" fill="#1a1800" stroke="#EAB308" stroke-width="2" filter="url(#softglow)"/>
  <rect x="247" y="248" width="18" height="16" rx="3" fill="#EAB308" fill-opacity="0.3"/>
  <line x1="250" y1="252" x2="262" y2="252" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="250" y1="258" x2="262" y2="258" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
