  <text x="411" y="264" text-anchor="middle" font-family="monospace" font-size="6" fill="#06B6D4">85%</text>
  <circle cx="394" cy="394" r="13" fill="#03303f" stroke="#0891B2" stroke-width="1.5"/>
  <text x="394" y="397" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">Git</text>
  <circle cx="256" cy="411" r="15" fill="#03303f" stroke="#06B6D4" stroke-width="2"/>
  <text x="256" y="408" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">TS</text>
  <text x="256" y="419" text-anchor="middle" font-family="monospace" font-size="6" fill="#06B6D4">80%</text>
  <circle cx="118" cy="394" r="13" fill="#03303f" stroke="#0891B2" stroke-width="1.5"/>
  <text x="118" y="397" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">CSS</text>
  <circle cx="101" cy="256" r="15" fill="#03303f" stroke="#06B6D4" stroke-width="2"/>
  <text x="101" y="253" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">PY</text>
  <text x="101" y="264" text-anchor="middle" font-family="monospace" font-size="6" fill="#06B6D4">75%</text>
  <circle cx="118" cy="118" r="13" fill="#03303f" stroke="#0891B2" stroke-width="1.5"/>
  <text x="118" y="121" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">Go</text>
