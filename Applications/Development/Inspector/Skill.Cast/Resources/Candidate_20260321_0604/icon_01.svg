<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sc1-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <filter id="sc1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g clip-path="url(#sc1-clip)">
    <!-- Background: Deep Indigo -->
    <rect width="1024" height="1024" fill="#1A1040"/>
    <!-- Subtle grid -->
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#2D2060" stroke-width="2"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#2D2060" stroke-width="2"/>

    <!-- Card 3 (back): Purple - Memory -->
    <g filter="url(#sc1-shadow)" transform="rotate(-12 512 520)">
      <rect x="240" y="300" width="380" height="260" rx="20" fill="#7B3FBE"/>
      <rect x="240" y="300" width="380" height="52" rx="20" fill="#9B5FDE"/>
      <rect x="240" y="332" width="380" height="20" fill="#9B5FDE"/>
      <text x="260" y="336" font-family="monospace" font-size="28" fill="#E8D5FF" font-weight="bold">💾 Memory</text>
      <!-- lines -->
      <rect x="260" y="375" width="200" height="14" rx="7" fill="#C4A0E8" opacity="0.6"/>
      <rect x="260" y="400" width="160" height="14" rx="7" fill="#C4A0E8" opacity="0.4"/>
      <rect x="260" y="425" width="220" height="14" rx="7" fill="#C4A0E8" opacity="0.5"/>
      <rect x="260" y="450" width="130" height="14" rx="7" fill="#C4A0E8" opacity="0.3"/>
    </g>

    <!-- Card 2 (mid): Lime - Skills -->
    <g filter="url(#sc1-shadow)" transform="rotate(6 512 510)">
      <rect x="260" y="280" width="380" height="260" rx="20" fill="#2D7A3A"/>
      <rect x="260" y="280" width="380" height="52" rx="20" fill="#3DAA50"/>
      <rect x="260" y="312" width="380" height="20" fill="#3DAA50"/>
      <text x="280" y="316" font-family="monospace" font-size="28" fill="#CCFFCC" font-weight="bold">⚡ Skills</text>
      <rect x="280" y="355" width="200" height="14" rx="7" fill="#90EE90" opacity="0.7"/>
      <rect x="280" y="380" width="240" height="14" rx="7" fill="#90EE90" opacity="0.5"/>
      <rect x="280" y="405" width="170" height="14" rx="7" fill="#90EE90" opacity="0.6"/>
      <rect x="280" y="430" width="210" height="14" rx="7" fill="#90EE90" opacity="0.4"/>
    </g>

    <!-- Card 1 (front): Coral - Commands -->
    <g filter="url(#sc1-shadow)">
      <rect x="290" y="260" width="380" height="260" rx="20" fill="#C84B2A"/>
      <rect x="290" y="260" width="380" height="52" rx="20" fill="#E8603A"/>
      <rect x="290" y="292" width="380" height="20" fill="#E8603A"/>
      <text x="310" y="298" font-family="monospace" font-size="26" fill="#FFE0D0" font-weight="bold">⚡ Commands</text>
      <rect x="310" y="338" width="200" height="14" rx="7" fill="#FFAA88" opacity="0.8"/>
      <rect x="310" y="363" width="260" height="14" rx="7" fill="#FFAA88" opacity="0.6"/>
      <rect x="310" y="388" width="180" height="14" rx="7" fill="#FFAA88" opacity="0.7"/>
      <rect x="310" y="413" width="230" height="14" rx="7" fill="#FFAA88" opacity="0.5"/>
      <rect x="310" y="438" width="150" height="14" rx="7" fill="#FFAA88" opacity="0.4"/>
    </g>

    <!-- Corner accent dots -->
    <circle cx="200" cy="800" r="30" fill="#7B3FBE" opacity="0.5"/>
    <circle cx="824" cy="220" r="20" fill="#E8603A" opacity="0.4"/>
  </g>
</svg>
