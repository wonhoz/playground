<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Cassette tape — retro music player -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0D0A00"/>
  <!-- Cassette body -->
  <rect x="160" y="300" width="704" height="424" rx="36" fill="#1A1400" stroke="#FFC107" stroke-width="26"/>
  <!-- Top cut-out window -->
  <rect x="240" y="360" width="544" height="180" rx="20" fill="#0D0A00" stroke="#FFC107" stroke-width="16"/>
  <!-- Left reel -->
  <circle cx="360" cy="450" r="80" fill="#0D0A00" stroke="#FFC107" stroke-width="16"/>
  <circle cx="360" cy="450" r="40" fill="#FFC107" opacity="0.2"/>
  <circle cx="360" cy="450" r="16" fill="#FFC107"/>
  <!-- Reel spokes L -->
  <line x1="360" y1="370" x2="360" y2="430" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <line x1="291" y1="411" x2="344" y2="441" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <line x1="291" y1="489" x2="344" y2="459" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <!-- Right reel -->
  <circle cx="664" cy="450" r="80" fill="#0D0A00" stroke="#FFC107" stroke-width="16"/>
  <circle cx="664" cy="450" r="40" fill="#FFC107" opacity="0.2"/>
  <circle cx="664" cy="450" r="16" fill="#FFC107"/>
  <!-- Reel spokes R -->
  <line x1="664" y1="370" x2="664" y2="430" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <line x1="595" y1="411" x2="648" y2="441" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <line x1="595" y1="489" x2="648" y2="459" stroke="#FFC107" stroke-width="10" opacity="0.6"/>
  <!-- Tape ribbon between reels -->
  <path d="M440 530 Q512 550 584 530" fill="none" stroke="#FFA000" stroke-width="10"/>
  <!-- Bottom screws -->
  <circle cx="240" cy="660" r="20" fill="#0D0A00" stroke="#FFC107" stroke-width="12"/>
  <circle cx="784" cy="660" r="20" fill="#0D0A00" stroke="#FFC107" stroke-width="12"/>
  <!-- Label area -->
  <rect x="300" y="600" width="424" height="80" rx="12" fill="#FFC107" opacity="0.12" stroke="#FFC107" stroke-width="8"/>
  <rect x="340" y="624" width="200" height="14" rx="7" fill="#FFC107" opacity="0.6"/>
  <rect x="340" y="648" width="150" height="12" rx="6" fill="#FFC107" opacity="0.4"/>
</svg>
