  <circle cx="418" cy="298" r="16" fill="#041820" stroke="#0891B2" stroke-width="1.5"/>
  <text x="418" y="302" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">[]</text>
  <circle cx="336" cy="408" r="16" fill="#041820" stroke="#0891B2" stroke-width="1.5"/>
