<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#2D0A00"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="50%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FFEE00"/>
    </linearGradient>
    <filter id="fireBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fire trail -->
  <ellipse cx="140" cy="340" rx="50" ry="20" fill="#FF4400" filter="url(#fireBlur)" opacity="0.7"/>
  <ellipse cx="100" cy="330" rx="35" ry="15" fill="#FF8800" filter="url(#fireBlur)" opacity="0.6"/>
  <ellipse cx="65" cy="320" rx="25" ry="10" fill="#FFAA00" filter="url(#fireBlur)" opacity="0.4"/>
  <!-- Runner body (silhouette) -->
  <circle cx="270" cy="260" r="30" fill="#FF6600"/>
  <circle cx="270" cy="260" r="24" fill="#FF2200"/>
  <!-- Body -->
  <rect x="248" y="288" width="44" height="55" rx="10" fill="#FF4400"/>
  <!-- Legs running -->
  <line x1="260" y1="343" x2="238" y2="385" stroke="#FF6600" stroke-width="14" stroke-linecap="round"/>
  <line x1="280" y1="343" x2="305" y2="380" stroke="#FF6600" stroke-width="14" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="250" y1="305" x2="222" y2="285" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
  <line x1="290" y1="305" x2="318" y2="288" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
  <!-- Ground/floor -->
  <rect x="0" y="390" width="512" height="6" fill="#FF4400" opacity="0.6"/>
  <!-- Morse signal dots -->
  <circle cx="340" cy="200" r="14" fill="url(#fire)"/>
  <rect x="368" y="192" width="38" height="16" rx="8" fill="url(#fire)"/>
  <circle cx="420" cy="200" r="14" fill="url(#fire)"/>
  <rect x="340" y="225" width="38" height="16" rx="8" fill="#FFAA00"/>
  <circle cx="392" cy="233" r="14" fill="#FFAA00"/>
  <rect x="420" y="225" width="38" height="16" rx="8" fill="#FFAA00"/>
  <!-- Spark particles -->
  <circle cx="200" cy="290" r="5" fill="#FFEE00" opacity="0.8"/>
  <circle cx="185" cy="270" r="4" fill="#FF8800" opacity="0.7"/>
  <circle cx="170" cy="300" r="3" fill="#FFEE00" opacity="0.6"/>
  <circle cx="215" cy="310" r="4" fill="#FF8800" opacity="0.5"/>
</svg>
