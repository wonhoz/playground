<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric keyboard base -->
  <polygon points="64,310 256,210 448,310 256,410" fill="#1a2030" stroke="#2a3a50" stroke-width="2"/>
  <!-- Left face -->
  <polygon points="64,310 256,410 256,450 64,350" fill="#141c28" stroke="#2a3a50" stroke-width="2"/>
  <!-- Right face -->
  <polygon points="256,410 448,310 448,350 256,450" fill="#111824" stroke="#2a3a50" stroke-width="2"/>
  <!-- Keys on top face - isometric grid -->
  <!-- Row 1 keys -->
  <polygon points="120,288 160,268 200,288 160,308" fill="#243044" stroke="#3a5070" stroke-width="1.5"/>
  <text x="148" y="291" font-family="monospace" font-size="9" fill="#6888aa" transform="rotate(-26.5 148 291)">Q</text>
  <polygon points="168,268 208,248 248,268 208,288" fill="#243044" stroke="#3a5070" stroke-width="1.5"/>
  <text x="196" y="271" font-family="monospace" font-size="9" fill="#6888aa" transform="rotate(-26.5 196 271)">W</text>
  <polygon points="216,248 256,228 296,248 256,268" fill="#ff4466" fill-opacity="0.7" stroke="#ff6688" stroke-width="1.5"/>
  <text x="244" y="251" font-family="monospace" font-size="9" fill="white" transform="rotate(-26.5 244 251)">E</text>
  <!-- Row 2 -->
  <polygon points="136,308 176,288 216,308 176,328" fill="#243044" stroke="#3a5070" stroke-width="1.5"/>
  <polygon points="184,288 224,268 264,288 224,308" fill="#243044" stroke="#3a5070" stroke-width="1.5"/>
  <polygon points="232,268 272,248 312,268 272,288" fill="#ff8800" fill-opacity="0.6" stroke="#ffaa22" stroke-width="1.5"/>
  <!-- Ctrl key highlighted -->
  <polygon points="104,338 160,308 216,338 160,368" fill="#ff2244" fill-opacity="0.8" stroke="#ff4466" stroke-width="2"/>
  <text x="144" y="341" font-family="monospace" font-size="9" fill="white" transform="rotate(-26.5 144 341)">Ctrl</text>
  <!-- Legend -->
  <rect x="330" y="200" width="120" height="90" rx="10" fill="#1a2030" stroke="#2a3a50" stroke-width="2"/>
  <rect x="342" y="218" width="14" height="14" rx="3" fill="#ff4466" fill-opacity="0.7"/>
  <text x="362" y="230" font-family="sans-serif" font-size="12" fill="#e0e0e0">Mapped</text>
  <rect x="342" y="240" width="14" height="14" rx="3" fill="#ff8800" fill-opacity="0.6"/>
  <text x="362" y="252" font-family="sans-serif" font-size="12" fill="#e0e0e0">Active</text>
  <rect x="342" y="262" width="14" height="14" rx="3" fill="#243044" stroke="#3a5070" stroke-width="1"/>
  <text x="362" y="274" font-family="sans-serif" font-size="12" fill="#888">Unused</text>
</svg>