  <rect x="380" y="695" width="530" height="44" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="695" width="26" height="44" rx="6" fill="#B0BEC5"/>

  <!-- Status -->
  <text x="90" y="900" font-family="Arial, sans-serif" font-size="30" fill="#546E7A"
