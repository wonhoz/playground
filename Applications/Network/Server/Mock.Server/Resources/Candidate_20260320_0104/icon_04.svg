<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050510"/>
  <!-- Real server (solid, slightly behind) -->
  <rect x="220" y="360" width="240" height="200" rx="16" fill="#283593" opacity="0.5"/>
  <!-- Shadow server (offset, dark silhouette) -->
  <rect x="280" y="400" width="240" height="200" rx="16" fill="#5C6BC0" opacity="0.12"/>
  <!-- Main server (front) -->
  <rect x="340" y="320" width="340" height="240" rx="20" fill="#283593"/>
  <rect x="364" y="348" width="290" height="14" rx="7" fill="#5C6BC0"/>
  <rect x="364" y="378" width="210" height="14" rx="7" fill="#5C6BC0" opacity="0.6"/>
  <rect x="364" y="408" width="250" height="14" rx="7" fill="#5C6BC0" opacity="0.4"/>
  <!-- Shadow cast below/right (mock shadow) -->
  <ellipse cx="600" cy="610" rx="200" ry="30" fill="#5C6BC0" opacity="0.18"/>
  <!-- "MOCK" stamp impression lines -->
  <line x1="364" y1="460" x2="654" y2="460" stroke="#5C6BC0" stroke-width="3" opacity="0.3"/>
  <line x1="364" y1="480" x2="654" y2="480" stroke="#5C6BC0" stroke-width="3" opacity="0.3"/>
  <!-- Ghost/shadow figure behind server -->
  <ellipse cx="240" cy="370" rx="60" ry="80" fill="#5C6BC0" opacity="0.08"/>
  <circle cx="240" cy="290" r="40" fill="#5C6BC0" opacity="0.08"/>
</svg>