  <line x1="196" y1="216" x2="316" y2="216" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <line x1="196" y1="256" x2="316" y2="256" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <line x1="196" y1="296" x2="316" y2="296" stroke="#7C4DFF" stroke-width="2" opacity="0.3"/>
