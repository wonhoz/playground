<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 민트-청록 그라데이션 배경 -->
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#00838F"/>
    </radialGradient>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#clip04)">
    <!-- Layer 2: 뇌 실루엣 (중앙) -->
    <!-- 뇌 왼쪽 반구 -->
    <path d="M512 240 Q420 220 370 280 Q310 350 330 440 Q340 500 310 550 Q280 610 320 660 Q360 710 420 700 Q460 695 512 700 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- 뇌 오른쪽 반구 -->
    <path d="M512 240 Q604 220 654 280 Q714 350 694 440 Q684 500 714 550 Q744 610 704 660 Q664 710 604 700 Q564 695 512 700 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- 뇌 중간 결합선 -->
    <line x1="512" y1="250" x2="512" y2="695" stroke="#B2EBF2" stroke-width="8"/>
    <!-- 뇌 주름 (왼쪽) -->
    <path d="M380 340 Q410 360 390 390 Q370 420 400 440" stroke="#B0BEC5" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M360 460 Q390 480 375 510 Q360 540 390 555" stroke="#B0BEC5" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 뇌 주름 (오른쪽) -->
    <path d="M644 340 Q614 360 634 390 Q654 420 624 440" stroke="#B0BEC5" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M664 460 Q634 480 649 510 Q664 540 634 555" stroke="#B0BEC5" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Layer 3: 폭발하는 빛줄기 (지식) — 다양한 색상 -->
    <!-- 위 빛줄기 -->
    <line x1="512" y1="240" x2="512" y2="100" stroke="#FFD54F" stroke-width="16" stroke-linecap="round"/>
    <circle cx="512" cy="88" r="20" fill="#FFD54F"/>
    <!-- 우상 빛줄기 -->
    <line x1="620" y1="280" x2="740" y2="150" stroke="#FF6B6B" stroke-width="14" stroke-linecap="round"/>
    <circle cx="752" cy="138" r="18" fill="#FF6B6B"/>
    <!-- 좌상 빛줄기 -->
    <line x1="404" y1="280" x2="284" y2="150" stroke="#81C784" stroke-width="14" stroke-linecap="round"/>
    <circle cx="272" cy="138" r="18" fill="#81C784"/>
    <!-- 우 빛줄기 -->
    <line x1="710" y1="460" x2="900" y2="420" stroke="#29B6F6" stroke-width="12" stroke-linecap="round"/>
    <circle cx="914" cy="416" r="16" fill="#29B6F6"/>
    <!-- 좌 빛줄기 -->
    <line x1="314" y1="460" x2="124" y2="420" stroke="#CE93D8" stroke-width="12" stroke-linecap="round"/>
    <circle cx="110" cy="416" r="16" fill="#CE93D8"/>
    <!-- 우하 빛줄기 -->
    <line x1="660" y1="640" x2="800" y2="760" stroke="#FFCC02" stroke-width="12" stroke-linecap="round"/>
    <circle cx="812" cy="772" r="16" fill="#FFCC02"/>
    <!-- 좌하 빛줄기 -->
    <line x1="364" y1="640" x2="224" y2="760" stroke="#FF8A65" stroke-width="12" stroke-linecap="round"/>
    <circle cx="212" cy="772" r="16" fill="#FF8A65"/>

    <!-- 카테고리 이모지들 (빛줄기 끝) -->
    <text x="512" y="60" font-family="'Segoe UI',Arial,sans-serif" font-size="32" text-anchor="middle">💡</text>
    <text x="770" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">🔬</text>
    <text x="254" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">📜</text>
    <text x="932" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">💻</text>
    <text x="92" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">🎬</text>
    <text x="830" y="780" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">🎵</text>
    <text x="194" y="780" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">🌍</text>

    <!-- 하단 뇌 받침 + 텍스트 -->
    <rect x="400" y="700" width="224" height="20" rx="6" fill="#FFFFFF" opacity="0.5"/>
    <rect x="440" y="720" width="144" height="20" rx="6" fill="#FFFFFF" opacity="0.4"/>
    <rect x="260" y="840" width="504" height="72" rx="20" fill="#FFFFFF" opacity="0.2"/>
    <text x="512" y="888" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">TRIVIA CAST</text>
  </g>
</svg>
