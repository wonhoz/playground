<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="quote14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="clip14"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>
  <g clip-path="url(#clip14)">
    <!-- Layer 2: 인용구 > 블록 -->
    <!-- 좌측 세로바 -->
    <rect x="140" y="220" width="20" height="584" rx="10" fill="#22D3EE"/>
    <!-- 배경 틴트 -->
    <rect x="140" y="220" width="744" height="584" rx="14" fill="#22D3EE" opacity="0.06"/>
    <!-- 큰 따옴표 열기 -->
    <text x="200" y="500" font-family="Georgia,serif" font-size="400" font-weight="900" fill="url(#quote14)" opacity="0.85">"</text>
    <!-- Layer 3: 인용문 텍스트 -->
    <!-- 인용문 줄 1 -->
    <rect x="200" y="480" width="580" height="28" rx="8" fill="#FFFFFF" opacity="0.8"/>
    <!-- 인용문 줄 2 -->
    <rect x="200" y="524" width="500" height="22" rx="6" fill="#FFFFFF" opacity="0.6"/>
    <!-- 인용문 줄 3 -->
    <rect x="200" y="562" width="540" height="22" rx="6" fill="#FFFFFF" opacity="0.55"/>
    <!-- 인용문 줄 4 -->
    <rect x="200" y="600" width="420" height="22" rx="6" fill="#FFFFFF" opacity="0.5"/>
    <!-- 출처 -->
    <rect x="200" y="658" width="180" height="18" rx="5" fill="#22D3EE" opacity="0.7"/>
    <!-- 닫는 따옴표 (우하단) -->
    <text x="700" y="820" font-family="Georgia,serif" font-size="200" font-weight="900" fill="url(#quote14)" opacity="0.5">"</text>
    <!-- > 기호 강조 -->
    <text x="152" y="420" font-family="'Courier New',monospace" font-size="100" fill="#FDE68A" font-weight="900" opacity="0.6">&gt;</text>
    <!-- 하단 라벨 -->
    <text x="512" y="890" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#22D3EE" text-anchor="middle" font-weight="700" opacity="0.8">BLOCKQUOTE</text>
  </g>
</svg>
