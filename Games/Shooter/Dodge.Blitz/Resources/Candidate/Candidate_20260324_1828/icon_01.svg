<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <radialGradient id="playerG" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <filter id="neon01">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg01)"/>
  <!-- 별 -->
  <circle cx="160" cy="130" r="4" fill="white" opacity="0.7"/>
  <circle cx="310" cy="90" r="3" fill="white" opacity="0.5"/>
  <circle cx="750" cy="140" r="4" fill="white" opacity="0.6"/>
  <circle cx="900" cy="100" r="3" fill="white" opacity="0.5"/>
  <circle cx="870" cy="820" r="4" fill="white" opacity="0.6"/>
  <circle cx="130" cy="890" r="3" fill="white" opacity="0.4"/>
  <circle cx="480" cy="70" r="3" fill="white" opacity="0.5"/>
  <circle cx="200" cy="680" r="3" fill="white" opacity="0.4"/>
  <circle cx="820" cy="380" r="3" fill="white" opacity="0.5"/>
  <!-- 바깥 총알들 — 핑크 네온 (4방향) -->
  <circle cx="512" cy="148" r="46" fill="#F472B6" filter="url(#neon01)"/>
  <circle cx="512" cy="876" r="46" fill="#F472B6" filter="url(#neon01)"/>
  <circle cx="148" cy="512" r="46" fill="#F472B6" filter="url(#neon01)"/>
  <circle cx="876" cy="512" r="46" fill="#F472B6" filter="url(#neon01)"/>
  <!-- 대각선 총알들 — 노란 (4방향) -->
  <circle cx="260" cy="260" r="38" fill="#FCD34D" filter="url(#neon01)"/>
  <circle cx="764" cy="260" r="38" fill="#FCD34D" filter="url(#neon01)"/>
  <circle cx="260" cy="764" r="38" fill="#FCD34D" filter="url(#neon01)"/>
  <circle cx="764" cy="764" r="38" fill="#FCD34D" filter="url(#neon01)"/>
  <!-- 중간 총알들 — 오렌지 (작은) -->
  <circle cx="350" cy="195" r="28" fill="#FB923C" opacity="0.85"/>
  <circle cx="674" cy="195" r="28" fill="#FB923C" opacity="0.85"/>
  <circle cx="195" cy="350" r="28" fill="#FB923C" opacity="0.85"/>
  <circle cx="195" cy="674" r="28" fill="#FB923C" opacity="0.85"/>
  <circle cx="829" cy="350" r="28" fill="#FB923C" opacity="0.85"/>
  <circle cx="829" cy="674" r="28" fill="#FB923C" opacity="0.85"/>
  <!-- 플레이어 다이아몬드 (청록 네온, 중앙) — 바깥 글로우 -->
  <polygon points="512,310 704,512 512,714 320,512" fill="#0891B2" opacity="0.4" filter="url(#softglow)"/>
  <!-- 플레이어 다이아몬드 — 메인 -->
  <polygon points="512,334 688,512 512,690 336,512" fill="url(#playerG)"/>
  <polygon points="512,370 652,512 512,654 372,512" fill="#22D3EE"/>
  <polygon points="512,410 612,512 512,614 412,512" fill="#67E8F9"/>
  <!-- 하이라이트 -->
  <polygon points="512,410 612,512 512,510 450,460" fill="white" opacity="0.35"/>
  <!-- 다이아몬드 테두리 -->
  <polygon points="512,334 688,512 512,690 336,512" fill="none" stroke="#A5F3FC" stroke-width="5" opacity="0.7"/>
</svg>
