<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030010"/>
      <stop offset="100%" stop-color="#080020"/>
    </linearGradient>
    <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#4C1D95" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E0060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="runeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer glow rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#4C1D95" stroke-width="2" opacity="0.5" stroke-dasharray="20,10"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.6"/>
  <!-- Portal center -->
  <circle cx="256" cy="256" r="140" fill="url(#portalGrad)"/>
  <!-- Portal inner spiral rings -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="95" fill="none" stroke="#C084FC" stroke-width="2.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="68" fill="none" stroke="#DDD6FE" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#EDE9FE" stroke-width="1.5" opacity="0.5"/>
  <!-- Rune symbols around portal -->
  <text x="256" y="98" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⍟</text>
  <text x="390" y="178" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⌖</text>
  <text x="390" y="344" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⍣</text>
  <text x="256" y="428" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⌗</text>
  <text x="122" y="344" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⍫</text>
  <text x="122" y="178" font-family="serif" font-size="22" fill="#C084FC" text-anchor="middle" opacity="0.8">⍯</text>
  <!-- Portal eye -->
  <ellipse cx="256" cy="256" rx="36" ry="24" fill="#1E0060"/>
  <ellipse cx="256" cy="256" rx="20" ry="14" fill="#A78BFA" opacity="0.8"/>
  <circle cx="256" cy="256" r="9" fill="#EDE9FE"/>
  <circle cx="259" cy="253" r="3" fill="#1E0060"/>
  <!-- Hero silhouette entering portal -->
  <ellipse cx="256" cy="340" rx="30" ry="12" fill="#7C3AED" opacity="0.3"/>
  <circle cx="256" cy="308" r="14" fill="#C4B5FD" opacity="0.7"/>
  <rect x="246" y="322" width="20" height="28" rx="5" fill="#A78BFA" opacity="0.7"/>
  <!-- Dungeon Dash text -->
  <text x="256" y="470" font-family="serif" font-size="16" fill="#7C3AED" text-anchor="middle">DUNGEON DASH</text>
</svg>
