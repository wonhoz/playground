  <rect x="300" y="80" width="64" height="64" rx="12" fill="#2a4a6a" stroke="#4488ff" stroke-width="2"/>
  <text x="320" y="122" font-family="serif" font-size="30">💎</text>
  <rect x="380" y="80" width="64" height="64" rx="12" fill="#1e3a5a"/>
