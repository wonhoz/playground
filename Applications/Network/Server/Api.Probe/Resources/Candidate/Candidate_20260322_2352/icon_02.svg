<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E3A8A"/>
  <!-- Layer 2: API client UI mockup -->
  <rect x="130" y="200" width="764" height="580" rx="22" fill="#0F172A"/>
  <!-- Window title bar -->
  <rect x="130" y="200" width="764" height="50" rx="22" fill="#1E293B"/>
  <rect x="130" y="230" width="764" height="20" fill="#1E293B"/>
  <circle cx="170" cy="225" r="9" fill="#EF4444"/>
  <circle cx="198" cy="225" r="9" fill="#F59E0B"/>
  <circle cx="226" cy="225" r="9" fill="#22C55E"/>
  <text x="512" y="232" font-family="Arial,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Api.Probe</text>
  <!-- URL bar area -->
  <!-- Method selector -->
  <rect x="155" y="278" width="110" height="52" rx="10" fill="#065F46"/>
  <text x="210" y="312" font-family="Consolas,monospace" font-size="22" fill="#10B981" text-anchor="middle" font-weight="bold">GET</text>
  <!-- URL input field -->
  <rect x="278" y="278" width="484" height="52" rx="10" fill="#1E293B"/>
  <text x="296" y="311" font-family="Consolas,monospace" font-size="18" fill="#94A3B8">https://api.example.com/</text>
  <!-- SEND button -->
  <rect x="776" y="278" width="92" height="52" rx="10" fill="#F97316"/>
  <text x="822" y="312" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">SEND</text>
  <!-- Tab bar: Params, Headers, Body -->
  <rect x="155" y="352" width="764" height="40" rx="0" fill="#0F172A"/>
  <rect x="155" y="352" width="120" height="40" rx="0" fill="#1E293B"/>
  <text x="215" y="377" font-family="Arial,sans-serif" font-size="15" fill="#94A3B8" text-anchor="middle">Params</text>
  <text x="320" y="377" font-family="Arial,sans-serif" font-size="15" fill="#60A5FA" text-anchor="middle">Headers</text>
  <text x="420" y="377" font-family="Arial,sans-serif" font-size="15" fill="#94A3B8" text-anchor="middle">Body</text>
  <!-- Layer 3: Response panel -->
  <!-- Status bar -->
  <rect x="155" y="410" width="764" height="36" rx="0" fill="#0A0F1A"/>
  <rect x="163" y="420" width="80" height="22" rx="6" fill="#065F46"/>
  <text x="203" y="435" font-family="Consolas,monospace" font-size="14" fill="#10B981" text-anchor="middle" font-weight="bold">200 OK</text>
  <text x="300" y="435" font-family="Consolas,monospace" font-size="13" fill="#64748B">148ms · 2.3KB</text>
  <!-- JSON response preview -->
  <text x="172" y="476" font-family="Consolas,monospace" font-size="18" fill="#94A3B8">{</text>
  <text x="200" y="506" font-family="Consolas,monospace" font-size="17" fill="#A78BFA">"status"</text>
  <text x="310" y="506" font-family="Consolas,monospace" font-size="17" fill="#94A3B8">: </text>
  <text x="330" y="506" font-family="Consolas,monospace" font-size="17" fill="#86EFAC">"success"</text>
  <text x="200" y="536" font-family="Consolas,monospace" font-size="17" fill="#A78BFA">"data"</text>
  <text x="292" y="536" font-family="Consolas,monospace" font-size="17" fill="#94A3B8">: [...]</text>
  <text x="172" y="566" font-family="Consolas,monospace" font-size="18" fill="#94A3B8">}</text>
</svg>