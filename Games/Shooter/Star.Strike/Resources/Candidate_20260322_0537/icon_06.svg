  <!-- Cockpit glow hint -->
  <ellipse cx="512" cy="600" rx="200" ry="120" fill="url(#cockpitGlow)"/>

  <!-- HUD stats panel -->
  <rect x="230" y="790" width="180" height="36" rx="6" fill="#88CCFF" opacity="0.08"/>
  <text x="320" y="813" font-family="'Courier New', monospace" font-size="24"
        fill="#88CCFF" text-anchor="middle" letter-spacing="2" opacity="0.8">HP: ▮▮▮▮▮</text>

  <rect x="614" y="790" width="180" height="36" rx="6" fill="#88CCFF" opacity="0.08"/>
  <text x="704" y="813" font-family="'Courier New', monospace" font-size="24"
        fill="#88CCFF" text-anchor="middle" letter-spacing="2" opacity="0.8">LV: 07</text>

  <text x="512" y="880" font-family="'Courier New', monospace" font-size="38" font-weight="bold"
