<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CEC9"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <clipPath id="bgClip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: Heart shape made of ASCII characters -->
  <g clip-path="url(#bgClip01)" font-family="Courier New, monospace" font-weight="700">
    <!-- Row 1 -->
    <text x="340" y="335" font-size="58" fill="#FFFFFF">@</text>
    <text x="420" y="335" font-size="58" fill="#FFEAA7">@</text>
    <text x="570" y="335" font-size="58" fill="#FFFFFF">@</text>
    <text x="650" y="335" font-size="58" fill="#FFEAA7">@</text>

    <!-- Row 2 -->
    <text x="300" y="395" font-size="58" fill="#FFEAA7">#</text>
    <text x="380" y="395" font-size="58" fill="#FFFFFF">#</text>
    <text x="460" y="395" font-size="58" fill="#B2F5EA">#</text>
    <text x="540" y="395" font-size="58" fill="#FFFFFF">#</text>
    <text x="620" y="395" font-size="58" fill="#FFEAA7">#</text>
    <text x="700" y="395" font-size="58" fill="#FFFFFF">#</text>

    <!-- Row 3 -->
    <text x="300" y="455" font-size="58" fill="#FFFFFF">$</text>
    <text x="380" y="455" font-size="58" fill="#B2F5EA">$</text>
    <text x="460" y="455" font-size="58" fill="#FFEAA7">$</text>
    <text x="540" y="455" font-size="58" fill="#FFFFFF">$</text>
    <text x="620" y="455" font-size="58" fill="#B2F5EA">$</text>
    <text x="700" y="455" font-size="58" fill="#FFEAA7">$</text>

    <!-- Row 4 -->
    <text x="340" y="515" font-size="58" fill="#FFEAA7">%</text>
    <text x="420" y="515" font-size="58" fill="#FFFFFF">%</text>
    <text x="500" y="515" font-size="58" fill="#B2F5EA">%</text>
    <text x="580" y="515" font-size="58" fill="#FFFFFF">%</text>
    <text x="660" y="515" font-size="58" fill="#FFEAA7">%</text>

    <!-- Row 5 -->
    <text x="380" y="575" font-size="58" fill="#FFFFFF">&amp;</text>
    <text x="460" y="575" font-size="58" fill="#FFEAA7">&amp;</text>
    <text x="540" y="575" font-size="58" fill="#B2F5EA">&amp;</text>
    <text x="620" y="575" font-size="58" fill="#FFFFFF">&amp;</text>

    <!-- Row 6 -->
    <text x="420" y="635" font-size="58" fill="#FFEAA7">*</text>
    <text x="500" y="635" font-size="58" fill="#FFFFFF">*</text>
    <text x="580" y="635" font-size="58" fill="#B2F5EA">*</text>

    <!-- Row 7 -->
    <text x="460" y="695" font-size="58" fill="#FFFFFF">+</text>
    <text x="540" y="695" font-size="58" fill="#FFEAA7">+</text>
  </g>

  <!-- Layer 3: Camera icon top-left + badge bottom -->
  <g clip-path="url(#bgClip01)">
    <!-- Camera body -->
    <rect x="205" y="205" width="120" height="90" rx="18" fill="white" fill-opacity="0.85"/>
    <!-- Camera bump -->
    <rect x="240" y="193" width="50" height="20" rx="8" fill="white" fill-opacity="0.85"/>
    <!-- Camera lens -->
    <circle cx="265" cy="252" r="26" fill="#00CEC9"/>
    <circle cx="265" cy="252" r="17" fill="#007B77"/>
    <circle cx="272" cy="244" r="5" fill="white" fill-opacity="0.5"/>

    <!-- Bottom badge -->
    <rect x="312" y="752" width="400" height="78" rx="39" fill="white" fill-opacity="0.25"/>
    <text x="512" y="792" font-size="50" fill="white" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif" letter-spacing="4">CHAR ART</text>
  </g>
</svg>
