<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 밝은 민트/파스텔그린 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#E0F5F1"/>

  <!-- Layer 2: 메인 격자 컨테이너 (터미널 프레임) -->
  <rect x="120" y="140" width="784" height="740" rx="28" fill="#0F2A26" stroke="#1A5A50" stroke-width="14"/>
  <!-- 터미널 타이틀바 -->
  <rect x="120" y="140" width="784" height="56" rx="28 28 0 0" fill="#1A3A34"/>
  <!-- 타이틀바 버튼들 -->
  <circle cx="180" cy="168" r="14" fill="#FF5F56"/>
  <circle cx="224" cy="168" r="14" fill="#FFBD2E"/>
  <circle cx="268" cy="168" r="14" fill="#27C93F"/>

  <!-- 세로 분할선 (중앙) -->
  <rect x="506" y="196" width="12" height="684" fill="#1A5A50"/>
  <!-- 가로 분할선 (왼쪽 패인 내부) -->
  <rect x="120" y="534" width="386" height="12" fill="#1A5A50"/>
  <!-- 가로 분할선 (오른쪽 패인 내부) -->
  <rect x="518" y="440" width="386" height="12" fill="#1A5A50"/>

  <!-- 패인 1: 좌상 -->
  <!-- 코드 라인들 -->
  <rect x="148" y="220" width="180" height="16" rx="6" fill="#2DD4BF" opacity="0.9"/>
  <rect x="148" y="252" width="130" height="14" rx="5" fill="#80CBC4" opacity="0.7"/>
  <rect x="148" y="280" width="200" height="14" rx="5" fill="#80CBC4" opacity="0.55"/>
  <rect x="148" y="308" width="110" height="14" rx="5" fill="#2DD4BF" opacity="0.6"/>
  <rect x="148" y="336" width="160" height="14" rx="5" fill="#80CBC4" opacity="0.45"/>
  <rect x="148" y="364" width="90" height="14" rx="5" fill="#80CBC4" opacity="0.35"/>
  <!-- 커서 -->
  <rect x="148" y="400" width="18" height="22" rx="3" fill="#2DD4BF" opacity="0.85"/>

  <!-- 패인 2: 좌하 -->
  <rect x="148" y="572" width="140" height="16" rx="6" fill="#FF6B6B" opacity="0.9"/>
  <rect x="148" y="604" width="190" height="14" rx="5" fill="#FF8A80" opacity="0.65"/>
  <rect x="148" y="630" width="120" height="14" rx="5" fill="#FF8A80" opacity="0.5"/>
  <!-- 커서 -->
  <rect x="148" y="668" width="18" height="22" rx="3" fill="#FF6B6B" opacity="0.85"/>

  <!-- 패인 3: 우상 -->
  <rect x="542" y="220" width="200" height="16" rx="6" fill="#F59E0B" opacity="0.9"/>
  <rect x="542" y="252" width="150" height="14" rx="5" fill="#FBD38D" opacity="0.65"/>
  <rect x="542" y="280" width="170" height="14" rx="5" fill="#FBD38D" opacity="0.5"/>
  <rect x="542" y="308" width="100" height="14" rx="5" fill="#F59E0B" opacity="0.55"/>
  <!-- 커서 -->
  <rect x="542" y="350" width="18" height="22" rx="3" fill="#F59E0B" opacity="0.85"/>

  <!-- 패인 4: 우하 -->
  <rect x="542" y="480" width="160" height="16" rx="6" fill="#2DD4BF" opacity="0.75"/>
  <rect x="542" y="512" width="120" height="14" rx="5" fill="#80CBC4" opacity="0.55"/>
  <rect x="542" y="540" width="180" height="14" rx="5" fill="#80CBC4" opacity="0.45"/>
  <!-- 커서 -->
  <rect x="542" y="582" width="18" height="22" rx="3" fill="#2DD4BF" opacity="0.85"/>

  <!-- Layer 3: 코랄 하이라이트 — 격자 교차점 강조 -->
  <circle cx="512" cy="534" r="18" fill="#FF6B6B" opacity="0.9"/>
  <circle cx="512" cy="534" r="10" fill="#FF8A80"/>
  <!-- 분할선 교차점 밝은 점 -->
  <circle cx="512" cy="196" r="12" fill="#2DD4BF" opacity="0.7"/>
  <circle cx="512" cy="880" r="12" fill="#2DD4BF" opacity="0.7"/>
</svg>
