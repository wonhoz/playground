<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>

  <!-- Map pin (location marker) -->
  <ellipse cx="512" cy="430" rx="64" ry="22" fill="#F57F17" fill-opacity="0.4"/>
  <path d="M 512,180 C 430,180 366,244 366,324 C 366,420 512,530 512,530 C 512,530 658,420 658,324 C 658,244 594,180 512,180 Z" fill="#FFB300" stroke="#E65100" stroke-width="16"/>
  <circle cx="512" cy="320" r="60" fill="#FFFFFF" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="340" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#E65100" text-anchor="middle">?</text>

  <!-- Capital city name badges (4 choices) -->
  <rect x="108" y="548" width="348" height="68" rx="20" fill="#FFECB3" stroke="#FFB300" stroke-width="10"/>
  <text x="282" y="594" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#E65100" text-anchor="middle">A. Beijing</text>

  <!-- B = correct: Seoul -->
  <rect x="480" y="548" width="348" height="68" rx="20" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <text x="654" y="594" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#1B5E20" text-anchor="middle">B. Seoul</text>

  <rect x="108" y="632" width="348" height="68" rx="20" fill="#FFECB3" stroke="#FFB300" stroke-width="10"/>
  <text x="282" y="678" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#E65100" text-anchor="middle">C. Busan</text>

  <rect x="480" y="632" width="348" height="68" rx="20" fill="#FFECB3" stroke="#FFB300" stroke-width="10"/>
  <text x="654" y="678" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#E65100" text-anchor="middle">D. Tokyo</text>

  <!-- CAPITAL badge -->
  <rect x="168" y="752" width="688" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">CAPITAL</text>
</svg>
