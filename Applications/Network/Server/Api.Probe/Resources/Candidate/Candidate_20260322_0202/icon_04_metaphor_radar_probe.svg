<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 사이안/다크 -->
  <rect width="1024" height="1024" rx="180" fill="#0C1A2E"/>
  <rect x="24" y="24" width="976" height="976" rx="160" fill="#0E2340"/>

  <!-- 레이더 동심원 -->
  <circle cx="512" cy="520" r="340" fill="none" stroke="#0E4D6E" stroke-width="2"/>
  <circle cx="512" cy="520" r="255" fill="none" stroke="#0E4D6E" stroke-width="2"/>
  <circle cx="512" cy="520" r="170" fill="none" stroke="#0E4D6E" stroke-width="2"/>
  <circle cx="512" cy="520" r="85" fill="none" stroke="#0E4D6E" stroke-width="2"/>

  <!-- 레이더 십자선 -->
  <line x1="172" y1="520" x2="852" y2="520" stroke="#0E4D6E" stroke-width="1.5"/>
