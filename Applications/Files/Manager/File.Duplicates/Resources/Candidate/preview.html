<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>File.Duplicates — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; padding: 32px; }
  h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
  p  { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }
  .card {
    background: #242424;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #ef5350; transform: translateY(-3px); }
  .card img { width: 120px; height: 120px; border-radius: 8px; }
  .card .label {
    margin-top: 10px;
    font-size: 12px;
    color: #ef9a9a;
    word-break: break-all;
  }
  .card .num {
    font-size: 20px;
    font-weight: 900;
    color: #ef5350;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>File.Duplicates — Icon Candidates</h1>
<p>중복 파일 탐지 · 삭제 도구 / 10개 디자인 후보</p>
<div class="grid">
  <div class="card"><div class="num">01</div><img src="candidate_01_twin_files.svg" alt="twin_files"><div class="label">twin_files</div></div>
  <div class="card"><div class="num">02</div><img src="candidate_02_scan_radar.svg" alt="scan_radar"><div class="label">scan_radar</div></div>
  <div class="card"><div class="num">03</div><img src="candidate_03_trash_delete.svg" alt="trash_delete"><div class="label">trash_delete</div></div>
  <div class="card"><div class="num">04</div><img src="candidate_04_magnify_files.svg" alt="magnify_files"><div class="label">magnify_files</div></div>
  <div class="card"><div class="num">05</div><img src="candidate_05_mirror_split.svg" alt="mirror_split"><div class="label">mirror_split</div></div>
  <div class="card"><div class="num">06</div><img src="candidate_06_purple_hash.svg" alt="purple_hash"><div class="label">purple_hash</div></div>
  <div class="card"><div class="num">07</div><img src="candidate_07_orange_clean.svg" alt="orange_clean"><div class="label">orange_clean</div></div>
  <div class="card"><div class="num">08</div><img src="candidate_08_teal_compare.svg" alt="teal_compare"><div class="label">teal_compare</div></div>
  <div class="card"><div class="num">09</div><img src="candidate_09_dna_match.svg" alt="dna_match"><div class="label">dna_match</div></div>
  <div class="card"><div class="num">10</div><img src="candidate_10_pie_stats.svg" alt="pie_stats"><div class="label">pie_stats</div></div>
</div>
</body>
</html>
