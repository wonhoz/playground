<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FFFBEB"/>
  <!-- Layer 2: File icon -->
  <path d="M 290 200 L 640 200 L 720 285 L 720 800 L 290 800 Z" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="5"/>
  <!-- Corner fold -->
  <path d="M 640 200 L 640 285 L 720 285 Z" fill="#D1D5DB" opacity="0.8"/>
  <!-- Layer 3: "0B" label large -->
  <text x="505" y="550" font-family="Arial,sans-serif" font-size="220" fill="#DC2626" text-anchor="middle" font-weight="900" opacity="0.9">0</text>
  <text x="505" y="720" font-family="Arial,sans-serif" font-size="80" fill="#DC2626" text-anchor="middle" font-weight="700">bytes</text>
  <!-- Red dashed border around file -->
  <path d="M 290 200 L 640 200 L 720 285 L 720 800 L 290 800 Z" fill="none" stroke="#EF4444" stroke-width="8" stroke-dasharray="24,12"/>
  <!-- Warning icon at top -->
  <polygon points="505,250 530,305 480,305" fill="#F59E0B"/>
  <text x="505" y="298" font-family="Arial,sans-serif" font-size="30" fill="white" text-anchor="middle" font-weight="bold">!</text>
</svg>