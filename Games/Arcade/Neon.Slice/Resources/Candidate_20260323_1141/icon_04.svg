<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 사이버펑크 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#0A0015"/>
  <!-- Layer 2: X자 크로스 슬라이스 + 폭발 효과 -->
  <!-- 크로스 슬라이스 라인 1 -->
  <line x1="160" y1="200" x2="864" y2="824" stroke="#FF00AA" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="200" x2="864" y2="824" stroke="#FF00AA" stroke-width="36" stroke-linecap="round" opacity="0.3"/>
  <!-- 크로스 슬라이스 라인 2 -->
  <line x1="864" y1="200" x2="160" y2="824" stroke="#00FFAA" stroke-width="10" stroke-linecap="round"/>
  <line x1="864" y1="200" x2="160" y2="824" stroke="#00FFAA" stroke-width="36" stroke-linecap="round" opacity="0.3"/>
  <!-- 중앙 교차점 폭발 -->
  <circle cx="512" cy="512" r="80" fill="#FFFF00" opacity="0.9"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#FFFF00" stroke-width="8" opacity="0.6"/>
  <circle cx="512" cy="512" r="160" fill="none" stroke="#FFFF00" stroke-width="4" opacity="0.3"/>
  <!-- 입자들 -->
  <circle cx="350" cy="350" r="14" fill="#FF00AA" opacity="0.9"/>
  <circle cx="674" cy="350" r="12" fill="#00FFAA" opacity="0.9"/>
  <circle cx="350" cy="674" r="10" fill="#00FFAA" opacity="0.8"/>
  <circle cx="674" cy="674" r="14" fill="#FF00AA" opacity="0.8"/>
  <!-- 작은 파편들 -->
  <rect x="200" y="480" width="20" height="20" rx="4" fill="#FF00AA" opacity="0.7" transform="rotate(45,210,490)"/>
  <rect x="790" y="480" width="20" height="20" rx="4" fill="#00FFAA" opacity="0.7" transform="rotate(30,800,490)"/>
  <rect x="480" y="200" width="20" height="20" rx="4" fill="#FFFF00" opacity="0.7" transform="rotate(20,490,210)"/>
  <rect x="480" y="790" width="20" height="20" rx="4" fill="#FFFF00" opacity="0.7" transform="rotate(60,490,800)"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FF00AA" text-anchor="middle">SLICE!</text>
</svg>
