<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg06" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1e00"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </radialGradient>
    <linearGradient id="glass06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFA000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sand06top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="sand06bot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="frame06" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="glow06">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow06b">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sandGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="topHalf">
      <rect x="130" y="60" width="252" height="196"/>
    </clipPath>
    <clipPath id="botHalf">
      <rect x="130" y="256" width="252" height="196"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg06)"/>

  <!-- 배경 장식 점들 -->
  <circle cx="40" cy="50" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="470" cy="80" r="1" fill="#FFA000" opacity="0.4"/>
  <circle cx="30" cy="400" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="480" cy="430" r="1" fill="#FFA000" opacity="0.4"/>

  <!-- 모래시계 프레임 (상단 바) -->
  <rect x="120" y="52" width="272" height="18" rx="6" fill="url(#frame06)" filter="url(#glow06)"/>
  <rect x="125" y="54" width="262" height="14" rx="5" fill="#FFD700" opacity="0.3"/>

  <!-- 모래시계 프레임 (하단 바) -->
  <rect x="120" y="442" width="272" height="18" rx="6" fill="url(#frame06)" filter="url(#glow06)"/>
  <rect x="125" y="444" width="262" height="14" rx="5" fill="#FFD700" opacity="0.3"/>

  <!-- 모래시계 프레임 (세로 기둥 - 좌) -->
  <rect x="120" y="60" width="18" height="392" rx="6" fill="url(#frame06)"/>

  <!-- 모래시계 프레임 (세로 기둥 - 우) -->
  <rect x="374" y="60" width="18" height="392" rx="6" fill="url(#frame06)"/>

  <!-- 모래시계 유리 상단 부분 -->
  <path d="M140,70 L372,70 L280,256 L232,256 Z" fill="url(#glass06)" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- 모래시계 유리 하단 부분 -->
  <path d="M232,256 L280,256 L372,442 L140,442 Z" fill="url(#glass06)" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- 상단 모래 (커밋 데이터 시각화) -->
  <!-- 모래 레벨 표시 (위쪽) -->
  <path d="M145,160 L367,160 L290,256 L222,256 Z" fill="#FFA000" opacity="0.85" clip-path="url(#topHalf)"/>
  <path d="M145,158 L367,158 L290,256 L222,256 Z" fill="#FFD700" opacity="0.7"/>

  <!-- 상단 모래 위 - 커밋 그래프 라인들 -->
  <path d="M155,145 L180,130 L210,140 L240,118 L270,128 L300,110 L330,122 L357,108"
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155,165 L180,152 L210,160 L240,142 L270,150 L300,135 L330,145 L357,133"
        fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.5" filter="url(#glow06)"/>

  <!-- 커밋 점들 (상단) -->
  <circle cx="180" cy="130" r="4" fill="#FFFFFF" filter="url(#glow06)" opacity="0.9"/>
  <circle cx="240" cy="118" r="4" fill="#FFD700" filter="url(#glow06)" opacity="0.9"/>
  <circle cx="300" cy="110" r="5" fill="#FFFFFF" filter="url(#glow06b)" opacity="0.95"/>
  <circle cx="357" cy="108" r="4" fill="#FFD700" filter="url(#glow06)" opacity="0.9"/>
  <circle cx="210" cy="140" r="3" fill="#FFA000" filter="url(#sandGlow)" opacity="0.8"/>
  <circle cx="270" cy="128" r="3" fill="#FFA000" filter="url(#sandGlow)" opacity="0.8"/>
  <circle cx="330" cy="122" r="3.5" fill="#FFFFFF" filter="url(#sandGlow)" opacity="0.8"/>

  <!-- 모래 흘러내리는 스트림 (중간 목) -->
  <path d="M248,256 L256,320 L264,256" fill="#FFD700" opacity="0.8" filter="url(#sandGlow)"/>
  <line x1="256" y1="255" x2="256" y2="325" stroke="#FFD700" stroke-width="4" opacity="0.9" filter="url(#glow06)"/>
  <line x1="256" y1="255" x2="256" y2="325" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>

  <!-- 하단 모래 (쌓인 데이터) -->
  <path d="M232,256 L280,256 L360,430 L152,430 Z" fill="#FFA000" opacity="0.6" clip-path="url(#botHalf)"/>
  <path d="M232,320 L280,320 L355,430 L157,430 Z" fill="#FFA000" opacity="0.75"/>
  <path d="M235,340 L277,340 L352,428 L160,428 Z" fill="#FFD700" opacity="0.6"/>

  <!-- 하단 모래 위 표면 (물결형) -->
  <path d="M175,342 Q210,335 256,338 Q302,335 337,342" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8" filter="url(#sandGlow)"/>
  <path d="M165,352 Q210,346 256,349 Q302,346 347,352" fill="none" stroke="#FFA000" stroke-width="1.5" opacity="0.7"/>

  <!-- 하단 커밋 히스토그램 (모래 안에) -->
  <rect x="180" y="370" width="12" height="55" fill="#B8860B" opacity="0.6" rx="2"/>
  <rect x="198" y="358" width="12" height="67" fill="#FFD700" opacity="0.5" rx="2"/>
  <rect x="216" y="363" width="12" height="62" fill="#FFA000" opacity="0.6" rx="2"/>
  <rect x="234" y="353" width="12" height="72" fill="#FFD700" opacity="0.5" rx="2"/>
  <rect x="252" y="348" width="12" height="77" fill="#FFD700" opacity="0.6" rx="2"/>
  <rect x="270" y="355" width="12" height="70" fill="#FFA000" opacity="0.6" rx="2"/>
  <rect x="288" y="362" width="12" height="63" fill="#FFD700" opacity="0.5" rx="2"/>
  <rect x="306" y="372" width="12" height="53" fill="#B8860B" opacity="0.6" rx="2"/>

  <!-- 목 부분 장식 -->
  <ellipse cx="256" cy="256" rx="32" ry="8" fill="#FFD700" opacity="0.4" filter="url(#glow06)"/>
  <ellipse cx="256" cy="256" rx="20" ry="5" fill="#FFD700" opacity="0.6"/>

  <!-- 상단 모래 표면 반짝임 -->
  <path d="M155,160 Q255,154 365,160" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>

  <!-- 글로우 효과 - 중앙 -->
  <circle cx="256" cy="256" r="15" fill="#FFD700" opacity="0.2" filter="url(#glow06b)"/>
</svg>
