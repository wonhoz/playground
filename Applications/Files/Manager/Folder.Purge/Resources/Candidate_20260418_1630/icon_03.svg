<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 쓰레기통 (우하단) -->
    <rect x="620" y="620" width="300" height="320" rx="16" fill="#455A64"/>
    <rect x="600" y="590" width="340" height="48" rx="12" fill="#546E7A"/>
    <!-- 쓰레기통 선 -->
    <line x1="690" y1="638" x2="690" y2="920" stroke="#37474F" stroke-width="6"/>
    <line x1="770" y1="638" x2="770" y2="920" stroke="#37474F" stroke-width="6"/>
    <line x1="850" y1="638" x2="850" y2="920" stroke="#37474F" stroke-width="6"/>
    <!-- 손잡이 -->
    <rect x="720" y="558" width="100" height="36" rx="14" fill="#37474F"/>

    <!-- 날아가는 폴더들 (대각선 동적) -->
    <!-- bin 폴더 -->
    <g transform="rotate(-20 220 300)">
      <rect x="150" y="200" width="140" height="110" rx="14" fill="#FF7043"/>
      <rect x="150" y="175" width="80" height="34" rx="10" fill="#FF7043"/>
      <text x="220" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="44" text-anchor="middle" fill="#FFFFFF" font-weight="700">bin</text>
    </g>
    <!-- 속도선 -->
    <line x1="320" y1="280" x2="600" y2="490" stroke="#FF7043" stroke-width="6" stroke-dasharray="18,10" opacity="0.7" stroke-linecap="round"/>

    <!-- obj 폴더 -->
    <g transform="rotate(-10 200 480)">
      <rect x="130" y="420" width="140" height="110" rx="14" fill="#EF5350"/>
      <rect x="130" y="395" width="80" height="34" rx="10" fill="#EF5350"/>
      <text x="200" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="44" text-anchor="middle" fill="#FFFFFF" font-weight="700">obj</text>
    </g>
    <!-- 속도선 -->
    <line x1="300" y1="470" x2="620" y2="580" stroke="#EF5350" stroke-width="6" stroke-dasharray="18,10" opacity="0.7" stroke-linecap="round"/>

    <!-- .vs 폴더 -->
    <g transform="rotate(8 330 620)">
      <rect x="140" y="580" width="140" height="110" rx="14" fill="#78909C"/>
      <rect x="140" y="555" width="80" height="34" rx="10" fill="#78909C"/>
      <text x="210" y="650" font-family="'Segoe UI',Arial,sans-serif" font-size="40" text-anchor="middle" fill="#FFFFFF" font-weight="700">.vs</text>
    </g>
    <!-- 속도선 -->
    <line x1="320" y1="640" x2="620" y2="670" stroke="#78909C" stroke-width="6" stroke-dasharray="18,10" opacity="0.7" stroke-linecap="round"/>

    <!-- .log 파일 -->
    <g transform="rotate(-15 280 750)">
      <rect x="120" y="720" width="120" height="100" rx="12" fill="#B0BEC5"/>
      <text x="180" y="782" font-family="'Segoe UI',Arial,sans-serif" font-size="36" text-anchor="middle" fill="#37474F" font-weight="700">.log</text>
    </g>
    <!-- 속도선 -->
    <line x1="280" y1="768" x2="620" y2="740" stroke="#B0BEC5" stroke-width="6" stroke-dasharray="18,10" opacity="0.7" stroke-linecap="round"/>

    <!-- 타이틀 -->
    <rect x="140" y="90" width="700" height="70" rx="20" fill="#37474F"/>
    <text x="490" y="138" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#ECEFF1" text-anchor="middle">🗑 Folder Purge</text>
  </g>
</svg>
