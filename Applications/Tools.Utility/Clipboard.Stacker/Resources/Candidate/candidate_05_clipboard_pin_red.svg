<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sticky notes stacked -->
  <rect x="180" y="210" width="175" height="175" rx="6" fill="#FFCDD2" opacity="0.4" transform="rotate(10 267 297)"/>
  <rect x="170" y="195" width="175" height="175" rx="6" fill="#EF9A9A" opacity="0.5" transform="rotate(5 257 282)"/>
  <rect x="155" y="178" width="175" height="175" rx="6" fill="url(#note)"/>
  <!-- Pin -->
  <circle cx="242" cy="183" r="14" fill="#C62828"/>
  <circle cx="242" cy="183" r="7" fill="#FF5252"/>
  <line x1="242" y1="190" x2="242" y2="220" stroke="#C62828" stroke-width="4"/>
  <!-- Lines -->
  <rect x="172" y="215" width="120" height="11" rx="4" fill="#C62828" opacity="0.7"/>
  <rect x="172" y="238" width="100" height="11" rx="4" fill="#C62828" opacity="0.5"/>
  <rect x="172" y="261" width="110" height="11" rx="4" fill="#C62828" opacity="0.4"/>
  <!-- Stack counter -->
  <rect x="290" y="330" width="80" height="34" rx="17" fill="#C62828"/>
  <text x="330" y="353" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="Arial">+5</text>
</svg>
