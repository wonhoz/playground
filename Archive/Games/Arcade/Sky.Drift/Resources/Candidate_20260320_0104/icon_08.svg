<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 연 꼬리 바람 물결: 연 다이아몬드 -->
  <!-- 연 몸체 (다이아몬드) -->
  <polygon points="512,200 680,480 512,660 344,480" fill="#0288D1"/>
  <!-- 연 내부 십자 -->
  <line x1="512" y1="200" x2="512" y2="660" stroke="#000A14" stroke-width="8" opacity="0.5"/>
  <line x1="344" y1="480" x2="680" y2="480" stroke="#000A14" stroke-width="8" opacity="0.5"/>
  <!-- 연 하이라이트 -->
  <polygon points="512,200 680,480 512,430 344,480" fill="#4FC3F7" opacity="0.5"/>
  <!-- 연실 -->
  <path d="M512,660 Q480,720 500,780" stroke="#4FC3F7" stroke-width="5" fill="none"/>
  <!-- 꼬리 물결 -->
  <path d="M500,780 Q460,810 500,840 Q540,870 500,900 Q460,930 500,960"
        stroke="#4FC3F7" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M500,780 Q540,810 500,840 Q460,870 500,900 Q540,930 500,960"
        stroke="#0288D1" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 바람 선 -->
  <line x1="700" y1="320" x2="820" y2="320" stroke="#4FC3F7" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="740" y1="370" x2="840" y2="370" stroke="#4FC3F7" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="720" y1="420" x2="820" y2="420" stroke="#4FC3F7" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
