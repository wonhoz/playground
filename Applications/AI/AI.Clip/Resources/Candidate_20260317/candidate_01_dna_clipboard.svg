  <line x1="186" y1="235" x2="300" y2="235" stroke="url(#dna_green)" stroke-width="2.5" opacity="0.6"/>
  <line x1="186" y1="260" x2="310" y2="260" stroke="url(#dna_green)" stroke-width="2.5" opacity="0.6"/>
  <line x1="186" y1="285" x2="290" y2="285" stroke="url(#dna_green)" stroke-width="2.5" opacity="0.6"/>
  <line x1="186" y1="310" x2="315" y2="310" stroke="url(#dna_green)" stroke-width="2.5" opacity="0.6"/>
  <line x1="186" y1="335" x2="280" y2="335" stroke="url(#dna_green)" stroke-width="2.5" opacity="0.6"/>

