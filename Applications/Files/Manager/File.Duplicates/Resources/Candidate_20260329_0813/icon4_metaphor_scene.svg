<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF9C3"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: File scanner scene finding duplicates -->
  <!-- App window -->
  <rect x="132" y="200" width="760" height="560" rx="20" fill="white" opacity="0.92"/>
  <rect x="132" y="200" width="760" height="52" rx="20" fill="#EAB308"/>
  <rect x="132" y="228" width="760" height="24" fill="#EAB308"/>
  <text x="512" y="230" font-family="Arial" font-size="22" fill="white" text-anchor="middle">File.Duplicates — Scanner</text>
  <!-- Scan progress bar -->
  <rect x="160" y="272" width="704" height="32" rx="10" fill="#FEF3C7"/>
  <rect x="160" y="272" width="450" height="32" rx="10" fill="#EAB308" opacity="0.8"/>
  <text x="512" y="298" font-family="Arial" font-size="24" fill="white" text-anchor="middle">Scanning... 64%</text>
  <!-- Duplicate groups found -->
  <!-- Group 1 -->
  <rect x="150" y="326" width="724" height="90" rx="14" fill="#FEF3C7"/>
  <text x="175" y="380" font-family="monospace" font-size="34" fill="#374151">📄 report.pdf · report_copy.pdf · report_v2.pdf</text>
  <rect x="790" y="342" width="70" height="56" rx="10" fill="#EF4444"/>
  <text x="825" y="378" font-family="Arial" font-size="26" fill="white" text-anchor="middle" font-weight="bold">×3</text>
  <!-- Group 2 -->
  <rect x="150" y="430" width="724" height="90" rx="14" fill="#FEF3C7"/>
  <text x="175" y="484" font-family="monospace" font-size="34" fill="#374151">🖼️ photo.jpg · photo(1).jpg · photo(2).jpg</text>
  <rect x="790" y="446" width="70" height="56" rx="10" fill="#EF4444"/>
  <text x="825" y="482" font-family="Arial" font-size="26" fill="white" text-anchor="middle" font-weight="bold">×3</text>
  <!-- Group 3 -->
  <rect x="150" y="534" width="724" height="90" rx="14" fill="#FEF3C7"/>
  <text x="175" y="588" font-family="monospace" font-size="34" fill="#374151">📦 backup.zip · backup_old.zip</text>
  <rect x="790" y="550" width="70" height="56" rx="10" fill="#FBBF24"/>
  <text x="825" y="586" font-family="Arial" font-size="26" fill="white" text-anchor="middle" font-weight="bold">×2</text>
  <!-- Delete all button -->
  <rect x="600" y="660" width="280" height="70" rx="18" fill="#EF4444"/>
  <text x="740" y="704" font-family="Arial" font-size="38" fill="white" text-anchor="middle" font-weight="bold">🗑 Delete</text>
  <!-- Layer 3: Storage freed stat -->
  <text x="175" y="704" font-family="Arial" font-size="40" fill="#16A34A" font-weight="bold">Freed: 2.4 GB</text>
</svg>
