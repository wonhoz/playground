<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#1A1A2E"/>
  <!-- Layer 2: Folder tree -->
  <!-- Root -->
  <rect x="350" y="160" width="60" height="30" rx="8" fill="white"/>
  <rect x="340" y="182" width="80" height="60" rx="8" fill="white"/>
  <!-- Connector lines -->
  <line x1="380" y1="242" x2="380" y2="310" stroke="#555" stroke-width="4"/>
  <line x1="380" y1="310" x2="220" y2="310" stroke="#555" stroke-width="4"/>
  <line x1="380" y1="310" x2="540" y2="310" stroke="#555" stroke-width="4"/>
  <!-- Child 1 (highlighted = delete target) -->
  <rect x="160" y="296" width="50" height="25" rx="6" fill="#EF5350"/>
  <rect x="150" y="314" width="70" height="50" rx="6" fill="#EF5350"/>
  <!-- Child 2 -->
  <rect x="480" y="296" width="50" height="25" rx="6" fill="white" opacity="0.7"/>
  <rect x="470" y="314" width="70" height="50" rx="6" fill="white" opacity="0.7"/>
  <!-- More folders deeper -->
  <line x1="185" y1="364" x2="185" y2="430" stroke="#555" stroke-width="4"/>
  <rect x="155" y="416" width="50" height="25" rx="6" fill="#EF5350" opacity="0.8"/>
  <rect x="145" y="434" width="70" height="50" rx="6" fill="#EF5350" opacity="0.8"/>
  <!-- Checkboxes -->
  <rect x="770" y="310" width="50" height="50" rx="8" fill="none" stroke="#26C6DA" stroke-width="6"/>
  <line x1="779" y1="335" x2="793" y2="350" stroke="#26C6DA" stroke-width="6"/>
  <line x1="793" y1="350" x2="812" y2="320" stroke="#26C6DA" stroke-width="6"/>
  <rect x="770" y="430" width="50" height="50" rx="8" fill="none" stroke="#26C6DA" stroke-width="6"/>
  <!-- Empty checkbox -->
  <text x="840" y="350" font-family="Arial" font-size="22" fill="#EF5350">Delete</text>
  <text x="840" y="470" font-family="Arial" font-size="22" fill="white" opacity="0.6">Keep</text>
</svg>