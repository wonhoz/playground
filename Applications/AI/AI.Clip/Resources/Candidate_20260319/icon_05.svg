  <line x1="680" y1="340" x2="780" y2="380" stroke="#00E5FF" stroke-width="8" opacity="0.6"/>
  <line x1="680" y1="340" x2="700" y2="480" stroke="#00E5FF" stroke-width="8" opacity="0.6"/>
  <line x1="780" y1="380" x2="800" y2="500" stroke="#00E5FF" stroke-width="8" opacity="0.6"/>
  <line x1="700" y1="480" x2="740" y2="580" stroke="#00E5FF" stroke-width="8" opacity="0.6"/>
