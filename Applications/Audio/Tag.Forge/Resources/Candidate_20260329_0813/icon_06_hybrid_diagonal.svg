<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDF4FF"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Audio tags flowing diagonally from music file to tag info strips -->
  <!-- Music file icon top-left -->
  <rect x="132" y="200" width="200" height="250" rx="20" fill="white" opacity="0.9"/>
  <polygon points="272,200 332,200 332,260" fill="#C026D3" opacity="0.5"/>
  <text x="210" y="380" font-size="88" text-anchor="middle">🎵</text>
  <text x="232" y="430" font-family="monospace" font-size="36" fill="#C026D3">MP3</text>
  <!-- Diagonal tag data strips flowing from file -->
  <rect x="350" y="260" width="540" height="80" rx="16" fill="white" opacity="0.92" transform="rotate(-6, 512, 512)"/>
  <text x="375" y="328" font-family="monospace" font-size="54" fill="#C026D3" transform="rotate(-6, 512, 512)">Title: Summer Breeze</text>
  <rect x="350" y="380" width="540" height="80" rx="16" fill="white" opacity="0.82" transform="rotate(-6, 512, 512)"/>
  <text x="375" y="448" font-family="monospace" font-size="54" fill="#7C3AED" transform="rotate(-6, 512, 512)">Artist: John Doe</text>
  <rect x="350" y="500" width="540" height="80" rx="16" fill="white" opacity="0.72" transform="rotate(-6, 512, 512)"/>
  <text x="375" y="568" font-family="monospace" font-size="54" fill="#0EA5E9" transform="rotate(-6, 512, 512)">Album: Best 2026</text>
  <rect x="350" y="620" width="540" height="80" rx="16" fill="white" opacity="0.62" transform="rotate(-6, 512, 512)"/>
  <text x="375" y="688" font-family="monospace" font-size="54" fill="#059669" transform="rotate(-6, 512, 512)">Year: 2026 • Pop</text>
  <!-- Layer 3: Forge hammer icon at corner -->
  <circle cx="850" cy="820" r="80" fill="#C026D3" opacity="0.9"/>
  <text x="850" y="848" font-size="88" text-anchor="middle">🔨</text>
</svg>
