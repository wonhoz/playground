<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F3"/>
      <stop offset="100%" stop-color="#FFD6E0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Hardware chip at center (Spec=hardware specs) -->
  <rect x="312" y="312" width="400" height="400" rx="24" fill="#1E293B"/>
  <rect x="342" y="342" width="340" height="340" rx="14" fill="#334155"/>
  <!-- Chip grid 3×3 -->
  <rect x="362" y="362" width="90" height="90" rx="8" fill="#E11D48"/>
  <rect x="467" y="362" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="572" y="362" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="362" y="467" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="467" y="467" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="572" y="467" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="362" y="572" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="467" y="572" width="90" height="90" rx="8" fill="#475569"/>
  <rect x="572" y="572" width="90" height="90" rx="8" fill="#E11D48"/>
  <!-- Pins all sides -->
  <rect x="252" y="364" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="252" y="412" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="252" y="460" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="252" y="508" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="252" y="556" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="252" y="604" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="364" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="412" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="460" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="508" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="556" width="60" height="16" rx="4" fill="#94A3B8"/>
  <rect x="712" y="604" width="60" height="16" rx="4" fill="#94A3B8"/>
  <!-- Magnifier overlay -->
  <circle cx="760" cy="760" r="160" fill="none" stroke="#E11D48" stroke-width="28"/>
  <line x1="870" y1="870" x2="950" y2="950" stroke="#E11D48" stroke-width="28" stroke-linecap="round"/>
  <!-- View text -->
  <text x="760" y="776" font-family="Arial,sans-serif" font-size="68" fill="#E11D48" font-weight="bold" text-anchor="middle">🔍</text>
  <!-- Label -->
  <text x="512" y="940" font-family="Arial,sans-serif" font-size="60" fill="#9F1239" font-weight="bold" text-anchor="middle">Spec View</text>
</svg>
