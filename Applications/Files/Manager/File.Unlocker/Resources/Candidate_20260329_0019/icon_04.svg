<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 감옥 창살이 열리는 — 파일 해방 은유 | 기하학 추상 | 라임+초록+흰 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#AED581"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#33691E" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Bars (left side = locked, still in place) -->
  <rect x="80"  y="120" width="70" height="784" rx="35" fill="#546E7A" filter="url(#sh4)"/>
  <rect x="200" y="120" width="70" height="784" rx="35" fill="#546E7A" filter="url(#sh4)"/>
  <rect x="320" y="120" width="70" height="784" rx="35" fill="#546E7A" filter="url(#sh4)"/>
  <!-- Horizontal bars (cage) -->
  <rect x="80" y="120" width="310" height="60" rx="20" fill="#37474F"/>
  <rect x="80" y="844" width="310" height="60" rx="20" fill="#37474F"/>

  <!-- Right side: Open door / bars removed -->
  <!-- Swinging open bar -->
  <rect x="440" y="120" width="70" height="500" rx="35" fill="#78909C" filter="url(#sh4)"
        transform="rotate(70, 440, 120)"/>
  <!-- Light/freedom coming through -->
  <path d="M450,120 L950,120 L950,904 L450,904 Z" fill="#FFD740" opacity="0.25"/>
  <path d="M500,200 L924,200 L924,824 L500,824 Z" fill="white" opacity="0.2"/>

  <!-- Layer 3: File flying free (right side) -->
  <g filter="url(#sh4)" transform="rotate(-10, 740, 512)">
    <rect x="640" y="380" width="200" height="260" rx="18" fill="white"/>
    <polygon points="784,380 840,436 784,436" fill="#AED581"/>
    <rect x="670" y="480" width="140" height="16" rx="8" fill="#C5E1A5"/>
    <rect x="670" y="510" width="110" height="16" rx="8" fill="#C5E1A5"/>
    <rect x="670" y="540" width="130" height="16" rx="8" fill="#C5E1A5"/>
  </g>
  <!-- Freedom rays -->
  <line x1="750" y1="350" x2="850" y2="250" stroke="#FFD740" stroke-width="12" opacity="0.7" stroke-linecap="round"/>
  <line x1="820" y1="380" x2="920" y2="300" stroke="#FFD740" stroke-width="10" opacity="0.5" stroke-linecap="round"/>
  <line x1="780" y1="680" x2="880" y2="770" stroke="#FFD740" stroke-width="12" opacity="0.7" stroke-linecap="round"/>

  <!-- Unlock badge -->
  <circle cx="300" cy="512" r="80" fill="#43A047" filter="url(#sh4)"/>
  <text x="300" y="512" font-family="Arial, sans-serif" font-size="96" fill="white"
        text-anchor="middle" dominant-baseline="middle">🔓</text>
</svg>
