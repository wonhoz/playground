<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04i" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#03A9F4"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04i)"/>
  <!-- Layer 2: 변환 흐름 화살표 (3단계) -->
  <!-- SVG -->
  <rect x="220" y="380" width="160" height="100" rx="14" fill="#1B5E20"/>
  <text x="300" y="445" text-anchor="middle" font-family="Arial Black" font-size="76" font-weight="900" fill="#69F0AE">SVG</text>
  <!-- 화살표 1 -->
  <path d="M386,430 L446,430" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <polygon points="452,430 430,414 430,446" fill="white"/>
  <!-- PNG -->
  <rect x="460" y="380" width="160" height="100" rx="14" fill="#0D47A1"/>
  <text x="540" y="445" text-anchor="middle" font-family="Arial Black" font-size="76" font-weight="900" fill="#82B1FF">PNG</text>
  <!-- 화살표 2 -->
  <path d="M626,430 L686,430" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <polygon points="692,430 670,414 670,446" fill="white"/>
  <!-- ICO -->
  <rect x="700" y="366" width="160" height="128" rx="14" fill="#E65100"/>
  <text x="780" y="445" text-anchor="middle" font-family="Arial Black" font-size="76" font-weight="900" fill="#FFD180">ICO</text>
  <!-- ICO가 가장 크고 강조 -->
  <rect x="696" y="362" width="168" height="136" rx="16" fill="none" stroke="#FFD600" stroke-width="8"/>
  <!-- BMP -->
  <rect x="460" y="570" width="160" height="100" rx="14" fill="#4A148C"/>
  <text x="540" y="635" text-anchor="middle" font-family="Arial Black" font-size="76" font-weight="900" fill="#EA80FC">BMP</text>
  <!-- 화살표 아래 -->
  <path d="M540,488 L540,570" fill="none" stroke="white" stroke-width="12" stroke-dasharray="15,10"/>
  <!-- Layer 3: 배경 파일 아이콘들 (희미) -->
  <text x="512" y="820" text-anchor="middle" font-family="Arial Black" font-size="68" font-weight="900" fill="white" opacity="0.8">Convert All</text>
</svg>