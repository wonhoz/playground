<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>

  <!-- Flame small (×3): cx=220, base=630, h=240, w=120 -->
  <path d="M 220,630 L 160,546 Q 198,438 220,390 Q 242,438 280,546 Z"
        fill="#FFB300" stroke="#E65100" stroke-width="10" stroke-linejoin="round"/>
  <circle cx="220" cy="390" r="18" fill="#FFFFFF" fill-opacity="0.6"/>
  <!-- ×3 badge -->
  <rect x="164" y="642" width="112" height="52" rx="14" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="220" y="678" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">×3</text>

  <!-- Flame medium (×5): cx=460, base=630, h=330, w=160 -->
  <path d="M 460,630 L 380,514 Q 426,348 460,300 Q 494,348 540,514 Z"
        fill="#FF6B35" stroke="#BF360C" stroke-width="12" stroke-linejoin="round"/>
  <!-- Inner bright core -->
  <path d="M 460,600 L 420,540 Q 442,460 460,430 Q 478,460 500,540 Z"
        fill="#FFD93D" fill-opacity="0.7"/>
  <circle cx="460" cy="300" r="22" fill="#FFFFFF" fill-opacity="0.6"/>
  <!-- ×5 badge -->
  <rect x="398" y="642" width="124" height="52" rx="14" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="460" y="678" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">×5</text>

  <!-- Flame large (×7): cx=730, base=630, h=430, w=210 -->
  <path d="M 730,630 L 625,479 Q 688,248 730,200 Q 772,248 835,479 Z"
        fill="#E91E63" stroke="#880E4F" stroke-width="14" stroke-linejoin="round"/>
  <!-- Inner bright core -->
  <path d="M 730,590 L 678,500 Q 706,380 730,340 Q 754,380 782,500 Z"
        fill="#FF6B35" fill-opacity="0.75"/>
  <path d="M 730,560 L 700,490 Q 716,430 730,400 Q 744,430 760,490 Z"
        fill="#FFD93D" fill-opacity="0.75"/>
  <circle cx="730" cy="200" r="28" fill="#FFFFFF" fill-opacity="0.7"/>
  <!-- ×7 badge -->
  <rect x="664" y="642" width="132" height="52" rx="14" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="730" y="678" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">×7</text>

  <!-- STREAK badge -->
  <rect x="208" y="752" width="608" height="116" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">STREAK</text>
</svg>
