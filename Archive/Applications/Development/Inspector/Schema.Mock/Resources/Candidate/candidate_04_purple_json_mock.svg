      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
    <linearGradient id="val" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#009688"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code editor panel -->
  <rect x="66" y="80" width="380" height="360" rx="14" fill="#1A0A2E" stroke="url(#purple)" stroke-width="3"/>
