<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Auto.Build - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; color: #aaa; margin-bottom: 24px; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; background: #111; }
  .item span { font-size: 0.72rem; color: #888; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Auto.Build — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_golden_tower.svg"><span>01 Golden Tower</span></div>
  <div class="item"><img src="candidate_02_cyan_blueprint.svg"><span>02 Cyan Blueprint</span></div>
  <div class="item"><img src="candidate_03_purple_city.svg"><span>03 Purple City</span></div>
  <div class="item"><img src="candidate_04_green_eco.svg"><span>04 Green Eco</span></div>
  <div class="item"><img src="candidate_05_fire_construction.svg"><span>05 Fire Construction</span></div>
  <div class="item"><img src="candidate_06_ice_crystal.svg"><span>06 Ice Crystal</span></div>
  <div class="item"><img src="candidate_07_neon_tetris.svg"><span>07 Neon Tetris</span></div>
  <div class="item"><img src="candidate_08_retro_pixel.svg"><span>08 Retro Pixel</span></div>
  <div class="item"><img src="candidate_09_sunrise_skyline.svg"><span>09 Sunrise Skyline</span></div>
  <div class="item"><img src="candidate_10_rainbow_blocks.svg"><span>10 Rainbow Blocks</span></div>
</div>
</body>
</html>
