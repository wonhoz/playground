<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#4A0520"/>
    </linearGradient>
    <clipPath id="clip08"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <g clip-path="url(#clip08)">
    <!-- Layer 2: 앱 창 틀 -->
    <rect x="180" y="240" width="664" height="540" rx="28" fill="#9D174D" stroke="#F472B6" stroke-width="6"/>
    <!-- 창 상단 타이틀 바 -->
    <rect x="180" y="240" width="664" height="60" rx="28" fill="#BE185D"/>
    <rect x="180" y="268" width="664" height="32" fill="#BE185D"/>
    <text x="512" y="275" font-family="'Segoe UI', sans-serif" font-size="28" fill="#FCE7F3" text-anchor="middle" dominant-baseline="middle">Api.Probe</text>
    <!-- URL 입력창 -->
    <rect x="210" y="330" width="480" height="70" rx="14" fill="#831843" stroke="#F472B6" stroke-width="5"/>
    <!-- 메서드 드롭다운 -->
    <rect x="210" y="330" width="120" height="70" rx="14" fill="#9F1239"/>
    <text x="270" y="365" font-family="'Courier New', monospace" font-weight="700" font-size="30" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">GET</text>
    <!-- URL 텍스트 -->
    <text x="470" y="365" font-family="'Courier New', monospace" font-size="26" fill="#FBCFE8" text-anchor="middle" dominant-baseline="middle">/api/v1/data</text>
    <!-- SEND 버튼 -->
    <rect x="706" y="330" width="138" height="70" rx="14" fill="#F472B6"/>
    <text x="775" y="365" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="30" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">SEND</text>
    <!-- 헤더 섹션 -->
    <rect x="210" y="424" width="634" height="40" rx="8" fill="#6D0535"/>
    <text x="230" y="444" font-family="'Courier New', monospace" font-size="24" fill="#FBCFE8" dominant-baseline="middle">Headers</text>
    <!-- 응답 영역 -->
    <rect x="210" y="480" width="634" height="270" rx="14" fill="#6D0535" stroke="#BE185D" stroke-width="4"/>
    <text x="230" y="510" font-family="'Courier New', monospace" font-size="22" fill="#86EFAC" dominant-baseline="middle">HTTP/1.1 200 OK</text>
    <text x="230" y="548" font-family="'Courier New', monospace" font-size="22" fill="#F9A8D4" dominant-baseline="middle">Content-Type: application/json</text>
    <text x="230" y="586" font-family="'Courier New', monospace" font-size="22" fill="#FDE68A" dominant-baseline="middle">{</text>
    <text x="260" y="622" font-family="'Courier New', monospace" font-size="22" fill="#FBCFE8" dominant-baseline="middle">"success": true</text>
    <text x="230" y="658" font-family="'Courier New', monospace" font-size="22" fill="#FDE68A" dominant-baseline="middle">}</text>
    <!-- Layer 3: SEND 버튼 화살표 포인트 -->
    <polygon points="760,340 800,365 760,390" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
