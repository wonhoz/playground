<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="138" width="872" height="538" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>
  <!-- BEFORE section (left): cluttered folders -->
  <rect x="112" y="180" width="320" height="312" rx="24" fill="#FFF3E0" stroke="#FF9800" stroke-width="12"/>
  <!-- 3 stacked overlapping folders (messy) -->
  <path d="M 148,310 L 148,452 Q 148,468 164,468 L 394,468 Q 410,468 410,452 L 410,332 Q 410,316 394,316 L 290,316 L 266,296 Q 258,288 246,288 L 164,288 Q 148,288 148,304 Z" fill="#FFB300" stroke="#E65100" stroke-width="10"/>
  <path d="M 168,280 L 168,420 Q 168,436 184,436 L 400,436 Q 416,436 416,420 L 416,300 Q 416,284 400,284 L 296,284 L 272,264 Q 264,256 252,256 L 184,256 Q 168,256 168,272 Z" fill="#FFA726" stroke="#E65100" stroke-width="10" opacity="0.7"/>
  <path d="M 188,252 L 188,390 Q 188,406 204,406 L 390,406 Q 406,406 406,390 L 406,272 Q 406,256 390,256 L 286,256 L 262,236 Q 254,228 242,228 L 204,228 Q 188,228 188,244 Z" fill="#FFE082" stroke="#F9A825" stroke-width="10" opacity="0.6"/>
  <!-- Count badge on before -->
  <rect x="148" y="188" width="120" height="60" rx="18" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="208" y="230" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">47</text>
  <!-- Arrow -->
  <rect x="462" y="328" width="104" height="46" rx="22" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <path d="M 560,282 L 632,351 L 560,420 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="14" stroke-linejoin="round"/>
  <!-- AFTER section (right): clean, single folder -->
  <rect x="632" y="180" width="284" height="312" rx="24" fill="#E8F5E9" stroke="#388E3C" stroke-width="12"/>
  <path d="M 660,355 L 660,455 Q 660,468 673,468 L 875,468 Q 888,468 888,455 L 888,368 Q 888,355 875,355 L 773,355 L 752,336 Q 745,328 736,328 L 673,328 Q 660,328 660,341 Z" fill="#A5D6A7" stroke="#388E3C" stroke-width="10"/>
  <!-- Count badge (clean: 0) -->
  <rect x="660" y="188" width="100" height="60" rx="18" fill="#388E3C" stroke="#1B5E20" stroke-width="10"/>
  <text x="710" y="230" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">0</text>
  <!-- CLEAN badge -->
  <rect x="214" y="748" width="596" height="116" rx="36" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">CLEAN</text>
</svg>
