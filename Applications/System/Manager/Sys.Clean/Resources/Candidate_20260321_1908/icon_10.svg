<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c10-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c10-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006D77"/>
      <stop offset="100%" stop-color="#003A40"/>
    </linearGradient>
    <linearGradient id="c10-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0F5F0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c10-clip)">
    <!-- Background: deep teal -->
    <rect width="1024" height="1024" fill="url(#c10-bg)"/>
    <circle cx="512" cy="512" r="420" fill="#005060" opacity="0.30"/>

    <!-- "CLEAN" text — large, bold, centered -->
    <text x="512" y="480"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="188"
          fill="url(#c10-text)"
          text-anchor="middle">CLEAN</text>

    <!-- Underline bar -->
    <rect x="220" y="510" width="584" height="14" rx="7" fill="#83E8DE" opacity="0.70"/>

    <!-- Subtitle text: "System Cleaner" -->
    <text x="512" y="600"
          font-family="Arial, sans-serif"
          font-weight="400"
          font-size="56"
          fill="#83E8DE"
          text-anchor="middle"
          opacity="0.85">System Cleaner</text>

    <!-- Sparkle cluster top-left -->
    <circle cx="248" cy="300" r="14" fill="#83E8DE" opacity="0.90"/>
    <line x1="248" y1="278" x2="248" y2="322" stroke="#83E8DE" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="226" y1="300" x2="270" y2="300" stroke="#83E8DE" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="232" y1="284" x2="264" y2="316" stroke="#83E8DE" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <line x1="264" y1="284" x2="232" y2="316" stroke="#83E8DE" stroke-width="4" stroke-linecap="round" opacity="0.65"/>

    <!-- Sparkle cluster top-right -->
    <circle cx="776" cy="270" r="10" fill="#FFD700" opacity="0.90"/>
    <line x1="776" y1="252" x2="776" y2="288" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <line x1="758" y1="270" x2="794" y2="270" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <line x1="763" y1="257" x2="789" y2="283" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <line x1="789" y1="257" x2="763" y2="283" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.65"/>

    <!-- Sparkle bottom-left -->
    <circle cx="300" cy="760" r="9" fill="#FFD700" opacity="0.80"/>
    <line x1="300" y1="744" x2="300" y2="776" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="284" y1="760" x2="316" y2="760" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

    <!-- Sparkle bottom-right -->
    <circle cx="740" cy="780" r="11" fill="#83E8DE" opacity="0.80"/>
    <line x1="740" y1="762" x2="740" y2="798" stroke="#83E8DE" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <line x1="722" y1="780" x2="758" y2="780" stroke="#83E8DE" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

    <!-- Small dots scattered -->
    <circle cx="190" cy="520" r="6" fill="#FFFFFF" opacity="0.40"/>
    <circle cx="840" cy="500" r="5" fill="#FFFFFF" opacity="0.35"/>
    <circle cx="830" cy="700" r="7" fill="#83E8DE" opacity="0.50"/>
    <circle cx="200" cy="680" r="6" fill="#FFD700" opacity="0.45"/>
  </g>
</svg>
