  <!-- Bug trapped in web -->
  <ellipse cx="650" cy="370" rx="55" ry="75" fill="#FFAB40" fill-opacity="0.8"/>
  <circle cx="650" cy="305" r="38" fill="#FFAB40" fill-opacity="0.8"/>
  <line x1="598" y1="330" x2="560" y2="310" stroke="#E65100" stroke-width="10"/>
  <line x1="598" y1="365" x2="555" y2="365" stroke="#E65100" stroke-width="10"/>
  <line x1="702" y1="330" x2="740" y2="310" stroke="#E65100" stroke-width="10"/>
  <line x1="702" y1="365" x2="745" y2="365" stroke="#E65100" stroke-width="10"/>
