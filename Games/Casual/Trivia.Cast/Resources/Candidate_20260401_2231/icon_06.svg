<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg06" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background (soft lavender) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <!-- Layer 2: 12 category circles in a ring -->
  <!-- Science 🔬 -->
  <circle cx="512" cy="170" r="75" fill="#E3F2FD"/>
  <text x="512" y="196" font-size="72" text-anchor="middle">🔬</text>

  <!-- History 📜 -->
  <circle cx="700" cy="230" r="75" fill="#FFF8E1"/>
  <text x="700" y="256" font-size="72" text-anchor="middle">📜</text>

  <!-- IT 💻 -->
  <circle cx="830" cy="400" r="75" fill="#E8EAF6"/>
  <text x="830" y="426" font-size="72" text-anchor="middle">💻</text>

  <!-- Sports ⚽ -->
  <circle cx="855" cy="600" r="75" fill="#E8F5E9"/>
  <text x="855" y="626" font-size="72" text-anchor="middle">⚽</text>

  <!-- Movies 🎬 -->
  <circle cx="720" cy="790" r="75" fill="#FCE4EC"/>
  <text x="720" y="816" font-size="72" text-anchor="middle">🎬</text>

  <!-- Music 🎵 -->
  <circle cx="512" cy="860" r="75" fill="#FFF3E0"/>
  <text x="512" y="886" font-size="72" text-anchor="middle">🎵</text>

  <!-- Food 🍜 -->
  <circle cx="304" cy="790" r="75" fill="#F1F8E9"/>
  <text x="304" y="816" font-size="72" text-anchor="middle">🍜</text>

  <!-- Geography 🌍 -->
  <circle cx="169" cy="600" r="75" fill="#E0F2F1"/>
  <text x="169" y="626" font-size="72" text-anchor="middle">🌍</text>

  <!-- Math 🔢 -->
  <circle cx="194" cy="400" r="75" fill="#F3E5F5"/>
  <text x="194" y="426" font-size="72" text-anchor="middle">🔢</text>

  <!-- Art 🎨 -->
  <circle cx="324" cy="230" r="75" fill="#FBE9E7"/>
  <text x="324" y="256" font-size="72" text-anchor="middle">🎨</text>

  <!-- Games 🎮 -->
  <circle cx="390" cy="130" r="60" fill="#E8EAF6"/>
  <text x="390" y="154" font-size="58" text-anchor="middle">🎮</text>

  <!-- General 🌟 -->
  <circle cx="634" cy="130" r="60" fill="#FFFDE7"/>
  <text x="634" y="154" font-size="58" text-anchor="middle">🌟</text>

  <!-- Layer 3: Center "TRIVIA" label -->
  <circle cx="512" cy="512" r="185" fill="#AB47BC"/>
  <circle cx="512" cy="512" r="168" fill="#CE93D8"/>
  <text x="512" y="500" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle">TRIVIA</text>
  <text x="512" y="572" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">12 CATS</text>
</svg>
