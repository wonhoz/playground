<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a00"/>
      <stop offset="100%" stop-color="#1a1a00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel circuit board (each square = 1 pixel unit 32px) -->
  <!-- Background grid dots -->
  <circle cx="96" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="128" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="160" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="192" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="224" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="256" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="288" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="320" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="352" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="384" cy="96" r="3" fill="#2a2a00"/>
  <circle cx="416" cy="96" r="3" fill="#2a2a00"/>
  <!-- Wire segments (active - yellow-green) -->
  <rect x="80" y="240" width="32" height="32" fill="#88ff00"/>
  <rect x="112" y="240" width="32" height="32" fill="#88ff00"/>
  <rect x="144" y="240" width="32" height="32" fill="#88ff00"/>
  <rect x="144" y="208" width="32" height="32" fill="#88ff00"/>
  <rect x="144" y="176" width="32" height="32" fill="#88ff00"/>
  <rect x="176" y="176" width="32" height="32" fill="#88ff00"/>
  <rect x="208" y="176" width="32" height="32" fill="#88ff00"/>
  <rect x="208" y="208" width="32" height="32" fill="#88ff00"/>
  <rect x="208" y="240" width="32" height="32" fill="#88ff00"/>
  <rect x="240" y="240" width="32" height="32" fill="#88ff00"/>
  <!-- GAP (broken) -->
  <rect x="272" y="240" width="32" height="32" fill="#440000" stroke="#ff4400" stroke-width="3"/>
  <line x1="272" y1="240" x2="304" y2="272" stroke="#ff4400" stroke-width="3"/>
  <line x1="304" y1="240" x2="272" y2="272" stroke="#ff4400" stroke-width="3"/>
  <!-- Wire continues (inactive - dark) -->
  <rect x="304" y="240" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <rect x="336" y="240" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <rect x="368" y="240" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <rect x="400" y="240" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <rect x="400" y="272" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <rect x="400" y="304" width="32" height="32" fill="#1a1a00" stroke="#444400" stroke-width="2"/>
  <!-- More active wires below -->
  <rect x="208" y="272" width="32" height="32" fill="#88ff00"/>
  <rect x="208" y="304" width="32" height="32" fill="#88ff00"/>
  <rect x="208" y="336" width="32" height="32" fill="#88ff00"/>
  <rect x="240" y="336" width="32" height="32" fill="#88ff00"/>
  <!-- Start node -->
  <rect x="80" y="240" width="32" height="32" fill="#00ffff"/>
  <!-- End node (dimmed) -->
  <rect x="400" y="304" width="32" height="32" fill="#333300" stroke="#888800" stroke-width="2"/>
  <!-- Floating component (resistor pixel art) -->
  <rect x="240" y="368" width="128" height="48" rx="8" fill="#333300" stroke="#88ff00" stroke-width="2"/>
  <rect x="256" y="375" width="12" height="34" rx="2" fill="#888800"/>
  <rect x="276" y="375" width="12" height="34" rx="2" fill="#888800"/>
  <rect x="296" y="375" width="12" height="34" rx="2" fill="#888800"/>
  <rect x="316" y="375" width="12" height="34" rx="2" fill="#888800"/>
  <rect x="336" y="375" width="12" height="34" rx="2" fill="#888800"/>
</svg>