  <g filter="url(#glow09)">
    <line x1="145" y1="315" x2="367" y2="315" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="311" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">R</text>
  </g>

  <!-- 쌍 12 (y=340) -->
  <g filter="url(#glow09)">
    <line x1="145" y1="340" x2="367" y2="340" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="336" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">G</text>
  </g>

