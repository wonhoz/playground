<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Robot head with clipboard body -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0D1A"/>
  <!-- Robot head -->
  <rect x="280" y="200" width="464" height="380" rx="40" fill="#1A1A35" stroke="#7C4DFF" stroke-width="24"/>
  <!-- Robot eyes (data processing) -->
  <rect x="340" y="300" width="120" height="80" rx="16" fill="#7C4DFF"/>
  <rect x="564" y="300" width="120" height="80" rx="16" fill="#7C4DFF"/>
  <!-- Eye glints -->
  <circle cx="390" cy="328" r="18" fill="#B39DDB"/>
  <circle cx="614" cy="328" r="18" fill="#B39DDB"/>
  <!-- Robot mouth / progress bar -->
  <rect x="340" y="430" width="344" height="28" rx="14" fill="#2A2A50"/>
  <rect x="340" y="430" width="220" height="28" rx="14" fill="#7C4DFF"/>
  <!-- Antenna -->
  <rect x="498" y="140" width="28" height="64" rx="8" fill="#7C4DFF"/>
  <circle cx="512" cy="130" r="26" fill="#E040FB"/>
  <!-- Clipboard body below -->
  <rect x="280" y="604" width="464" height="220" rx="20" fill="#1A1A35" stroke="#7C4DFF" stroke-width="18"/>
  <!-- Clip lines -->
  <rect x="330" y="650" width="280" height="16" rx="8" fill="#7C4DFF" opacity="0.7"/>
  <rect x="330" y="686" width="220" height="16" rx="8" fill="#7C4DFF" opacity="0.5"/>
  <rect x="330" y="722" width="250" height="16" rx="8" fill="#7C4DFF" opacity="0.5"/>
  <!-- Neck connector -->
  <rect x="460" y="578" width="104" height="30" rx="8" fill="#7C4DFF" opacity="0.6"/>
</svg>
