<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#003355"/>
    </linearGradient>
    <linearGradient id="build" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#0080CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines blueprint style -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="400" x2="432" y2="400" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="160" y1="80" x2="160" y2="432" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="240" y1="80" x2="240" y2="432" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="320" y1="80" x2="320" y2="432" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="80" x2="400" y2="432" stroke="#00CFFF" stroke-width="1" opacity="0.15"/>
  <!-- Glow center -->
  <circle cx="256" cy="300" r="180" fill="url(#glow)"/>
  <!-- Building outline blueprint -->
  <rect x="140" y="320" width="232" height="80" rx="4" fill="none" stroke="#00CFFF" stroke-width="2.5" opacity="0.8"/>
  <rect x="160" y="240" width="192" height="80" rx="4" fill="none" stroke="#00CFFF" stroke-width="2.5" opacity="0.8"/>
  <rect x="190" y="165" width="132" height="75" rx="4" fill="none" stroke="#00CFFF" stroke-width="2.5" opacity="0.8"/>
  <rect x="222" y="108" width="68" height="57" rx="4" fill="none" stroke="#00CFFF" stroke-width="2.5" opacity="0.8"/>
  <!-- Filled blocks (placed) -->
  <rect x="140" y="320" width="232" height="80" rx="4" fill="url(#build)" opacity="0.25"/>
  <rect x="160" y="240" width="192" height="80" rx="4" fill="url(#build)" opacity="0.2"/>
  <!-- Auto cursor arrow -->
  <polygon points="380,100 410,160 393,153 385,180 370,170 378,143 360,143" fill="#00CFFF" opacity="0.9"/>
</svg>