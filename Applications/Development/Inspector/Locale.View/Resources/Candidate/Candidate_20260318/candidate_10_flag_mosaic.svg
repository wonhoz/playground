<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flag tiles in a grid mosaic -->
  <!-- Row 1 -->
  <!-- US -->
  <rect x="60" y="80" width="70" height="46" rx="4" fill="#B22234"/>
  <rect x="60" y="80" width="70" height="6" fill="#B22234"/>
  <rect x="60" y="92" width="70" height="6" fill="white" opacity="0.9"/>
  <rect x="60" y="104" width="70" height="6" fill="#B22234"/>
  <rect x="60" y="116" width="70" height="10" fill="white" opacity="0.9"/>
  <rect x="60" y="80" width="28" height="26" fill="#3C3B6E"/>
  <text x="95" y="111" text-anchor="middle" font-family="monospace" font-size="7" fill="white" opacity="0.8">en-US</text>
  <!-- Japan -->
  <rect x="140" y="80" width="70" height="46" rx="4" fill="#BC002D"/>
  <rect x="140" y="80" width="70" height="46" rx="4" fill="white" opacity="0.85"/>
  <circle cx="175" cy="103" r="14" fill="#BC002D"/>
  <text x="175" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#BC002D">ja-JP</text>
  <!-- Germany -->
  <rect x="220" y="80" width="70" height="46" rx="4" fill="black"/>
  <rect x="220" y="96" width="70" height="15" fill="#DD0000"/>
  <rect x="220" y="111" width="70" height="15" fill="#FFCE00"/>
  <text x="255" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFCE00">de-DE</text>
  <!-- France -->
  <rect x="300" y="80" width="70" height="46" rx="4" fill="#0055A4"/>
  <rect x="323" y="80" width="24" height="46" fill="white"/>
  <rect x="347" y="80" width="23" height="46" fill="#EF4135"/>
  <text x="335" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#0055A4">fr-FR</text>
  <!-- South Korea -->
  <rect x="380" y="80" width="70" height="46" rx="4" fill="white"/>
  <circle cx="415" cy="103" r="12" fill="#C60C30"/>
  <circle cx="415" cy="103" r="6" fill="#003478"/>
  <text x="415" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#003478">ko-KR</text>
  <!-- Row 2 -->
  <!-- China -->
  <rect x="60" y="146" width="70" height="46" rx="4" fill="#DE2910"/>
  <text x="76" y="163" font-family="serif" font-size="14" fill="#FFDE00">★</text>
  <text x="90" y="158" font-family="serif" font-size="8" fill="#FFDE00">★★</text>
  <text x="90" y="172" font-family="serif" font-size="8" fill="#FFDE00">★★</text>
  <text x="95" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#DE2910">zh-CN</text>
  <!-- Saudi Arabia -->
  <rect x="140" y="146" width="70" height="46" rx="4" fill="#006C35"/>
  <text x="175" y="168" text-anchor="middle" font-family="serif" font-size="10" fill="white">لا إله</text>
  <text x="175" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#006C35">ar-SA</text>
  <!-- India -->
  <rect x="220" y="146" width="70" height="46" rx="4" fill="#FF9933"/>
  <rect x="220" y="161" width="70" height="16" fill="white"/>
  <rect x="220" y="177" width="70" height="15" fill="#138808"/>
  <circle cx="255" cy="169" r="6" fill="#000080" opacity="0.7"/>
  <text x="255" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF9933">hi-IN</text>
  <!-- Russia -->
  <rect x="300" y="146" width="70" height="46" rx="4" fill="white"/>
  <rect x="300" y="161" width="70" height="15" fill="#0039A6"/>
  <rect x="300" y="176" width="70" height="16" fill="#D52B1E"/>
  <text x="335" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#0039A6">ru-RU</text>
  <!-- Brazil -->
  <rect x="380" y="146" width="70" height="46" rx="4" fill="#009c3b"/>
  <polygon points="415,150 446,169 415,188 384,169" fill="#FEDF00"/>
  <circle cx="415" cy="169" r="9" fill="#002776"/>
  <text x="415" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#009c3b">pt-BR</text>
  <!-- Row 3: locale code grid -->
  <rect x="60" y="240" width="392" height="200" rx="8" fill="#050810" stroke="#1E293B" stroke-width="1"/>
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="12" fill="#38BDF8">LOCALE STRINGS</text>
  <text x="80" y="298" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="298" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="298" font-family="monospace" font-size="10" fill="#22D3EE">"Hello"</text>
  <text x="80" y="318" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="318" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="318" font-family="monospace" font-size="10" fill="#38BDF8">"こんにちは"</text>
  <text x="80" y="338" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="338" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="338" font-family="monospace" font-size="10" fill="#22D3EE">"안녕하세요"</text>
  <text x="80" y="358" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="358" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="358" font-family="monospace" font-size="10" fill="#38BDF8">"مرحبا"</text>
  <text x="80" y="378" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="378" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="378" font-family="monospace" font-size="10" fill="#22D3EE">"Привет"</text>
  <text x="80" y="398" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="398" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="398" font-family="monospace" font-size="10" fill="#38BDF8">"你好"</text>
  <text x="80" y="418" font-family="monospace" font-size="10" fill="#94A3B8">app.title</text>
  <text x="260" y="418" font-family="monospace" font-size="10" fill="#64748B">=</text>
  <text x="280" y="418" font-family="monospace" font-size="10" fill="#22D3EE">"Hallo"</text>
</svg>
