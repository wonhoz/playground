<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#00080A"/>
  <!-- 도미노 탐색: 세 도미노 타일 -->
  <rect x="180" y="320" width="120" height="240" rx="18" fill="#006064" stroke="#26C6DA" stroke-width="10"/>
  <line x1="180" y1="440" x2="300" y2="440" stroke="#26C6DA" stroke-width="10"/>
  <circle cx="240" cy="385" r="16" fill="#26C6DA"/>
  <circle cx="240" cy="495" r="16" fill="#26C6DA"/>

  <rect x="452" y="320" width="120" height="240" rx="18" fill="#006064" stroke="#26C6DA" stroke-width="10"/>
  <line x1="452" y1="440" x2="572" y2="440" stroke="#26C6DA" stroke-width="10"/>
  <circle cx="492" cy="385" r="14" fill="#26C6DA"/>
  <circle cx="532" cy="385" r="14" fill="#26C6DA"/>
  <circle cx="492" cy="495" r="14" fill="#26C6DA"/>
  <circle cx="532" cy="495" r="14" fill="#26C6DA"/>

  <!-- 스캔 대기 도미노 (점선 테두리) -->
  <rect x="724" y="320" width="120" height="240" rx="18" fill="none" stroke="#26C6DA" stroke-width="16" stroke-dasharray="20,12"/>
  <!-- 탐색 점 (찾는 중) -->
  <circle cx="784" cy="380" r="18" fill="#26C6DA" opacity="0.4"/>
  <circle cx="784" cy="440" r="18" fill="#26C6DA" opacity="0.4"/>
  <circle cx="784" cy="500" r="18" fill="#26C6DA" opacity="0.4"/>

  <!-- 스캔 화살표 -->
  <line x1="300" y1="440" x2="452" y2="440" stroke="#26C6DA" stroke-width="22" stroke-linecap="round"/>
  <line x1="572" y1="440" x2="724" y2="440" stroke="#26C6DA" stroke-width="22" stroke-linecap="round" stroke-dasharray="30,18"/>
  <!-- 스캔 레이더 점 -->
  <circle cx="784" cy="700" r="36" fill="#26C6DA" opacity="0.6"/>
  <circle cx="784" cy="700" r="60" fill="none" stroke="#26C6DA" stroke-width="14" opacity="0.3"/>
</svg>
