  <rect x="216" y="218" width="64" height="10" rx="3" fill="#FFB74D"/>
  <!-- Nested object -->
  <rect x="136" y="244" width="78" height="10" rx="3" fill="url(#key)"/>
  <rect x="222" y="244" width="8" height="10" rx="3" fill="#888"/>
  <rect x="240" y="244" width="16" height="10" rx="3" fill="#CE93D8"/>
  <rect x="160" y="270" width="50" height="10" rx="3" fill="url(#key)"/>
