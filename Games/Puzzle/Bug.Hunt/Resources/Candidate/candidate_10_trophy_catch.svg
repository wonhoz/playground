<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1D1500"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trophy cup -->
  <path d="M176 120 L176 260 Q176 310 256 320 Q336 310 336 260 L336 120 Z" fill="url(#trophy)"/>
  <!-- Trophy handles -->
  <path d="M176 150 Q130 150 130 200 Q130 240 176 240" fill="none" stroke="url(#trophy)" stroke-width="16"/>
  <path d="M336 150 Q382 150 382 200 Q382 240 336 240" fill="none" stroke="url(#trophy)" stroke-width="16"/>
  <!-- Trophy shine -->
  <ellipse cx="226" cy="180" rx="18" ry="40" fill="white" opacity="0.25" transform="rotate(-15 226 180)"/>
  <!-- Trophy stem -->
  <rect x="232" y="318" width="48" height="32" rx="4" fill="#CC8800"/>
  <!-- Trophy base -->
  <rect x="188" y="348" width="136" height="24" rx="8" fill="url(#trophy)"/>
  <!-- Bug on trophy (caught!) -->
  <ellipse cx="256" cy="225" rx="28" ry="20" fill="#FF3300" opacity="0.95"/>
  <ellipse cx="256" cy="208" rx="18" ry="16" fill="#CC2200"/>
  <line x1="232" y1="218" x2="212" y2="207" stroke="#FF4400" stroke-width="2.5"/>
  <line x1="230" y1="226" x2="208" y2="226" stroke="#FF4400" stroke-width="2.5"/>
  <line x1="280" y1="218" x2="300" y2="207" stroke="#FF4400" stroke-width="2.5"/>
  <line x1="282" y1="226" x2="304" y2="226" stroke="#FF4400" stroke-width="2.5"/>
  <line x1="243" y1="196" x2="234" y2="182" stroke="#FF6600" stroke-width="2"/>
  <line x1="269" y1="196" x2="278" y2="182" stroke="#FF6600" stroke-width="2"/>
  <circle cx="248" cy="205" r="4" fill="white"/>
  <circle cx="264" cy="205" r="4" fill="white"/>
  <!-- Stars -->
  <text x="156" y="115" font-family="Arial" font-size="24" fill="#FFD700">*</text>
  <text x="340" y="115" font-family="Arial" font-size="24" fill="#FFD700">*</text>
  <text x="256" y="95" font-family="Arial" font-size="30" fill="#FFD700" text-anchor="middle">*</text>
  <!-- Title -->
  <text x="256" y="430" font-family="Arial" font-size="20" fill="#FFD700" text-anchor="middle">Bug Caught!</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FFA500" text-anchor="middle">Bug.Hunt</text>
</svg>
