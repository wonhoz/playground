<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#001233"/>
    </linearGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0080ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Holographic city scan lines -->
  <rect x="80" y="100" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="120" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="140" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="160" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="180" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="200" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="220" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="240" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="260" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="280" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="300" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="320" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="340" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <rect x="80" y="360" width="352" height="2" fill="#00f5ff" opacity="0.15"/>
  <!-- Buildings holographic -->
  <rect x="80" y="200" width="56" height="160" fill="url(#holo)" opacity="0.4" filter="url(#glow2)"/>
  <rect x="80" y="200" width="56" height="160" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="152" y="150" width="64" height="210" fill="url(#holo)" opacity="0.35" filter="url(#glow2)"/>
  <rect x="152" y="150" width="64" height="210" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="232" y="100" width="80" height="260" fill="url(#holo)" opacity="0.4" filter="url(#glow2)"/>
  <rect x="232" y="100" width="80" height="260" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.8"/>
  <rect x="328" y="160" width="64" height="200" fill="url(#holo)" opacity="0.35" filter="url(#glow2)"/>
  <rect x="328" y="160" width="64" height="200" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="408" y="210" width="50" height="150" fill="url(#holo)" opacity="0.3" filter="url(#glow2)"/>
  <rect x="408" y="210" width="50" height="150" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Ground platform -->
  <rect x="64" y="360" width="384" height="8" fill="#00f5ff" opacity="0.6" filter="url(#glow2)"/>
  <!-- Runner hologram -->
  <ellipse cx="256" cy="340" rx="18" ry="18" fill="#00f5ff" opacity="0.8" filter="url(#glow2)"/>
  <rect x="242" y="358" width="28" height="34" rx="8" fill="#00f5ff" opacity="0.6"/>
  <line x1="242" y1="376" x2="224" y2="396" stroke="#00f5ff" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="270" y1="376" x2="284" y2="394" stroke="#00f5ff" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="248" y1="392" x2="236" y2="414" stroke="#00f5ff" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="264" y1="392" x2="276" y2="412" stroke="#00f5ff" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Data readout -->
  <text x="80" y="450" font-family="Courier New, monospace" font-size="11" fill="#00f5ff" opacity="0.6">SYS: ACTIVE | SPEED: MAX</text>
  <text x="256" y="490" font-family="Courier New, monospace" font-size="28" fill="#00f5ff" text-anchor="middle" letter-spacing="5" filter="url(#glow2)">DASH CITY</text>
</svg>
