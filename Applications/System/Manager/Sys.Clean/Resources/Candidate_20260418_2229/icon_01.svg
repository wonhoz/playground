<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background crisp blue -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: Checklist of system clean targets -->
  <rect x="130" y="160" width="764" height="680" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <rect x="130" y="160" width="764" height="96" rx="24" fill="#1565C0"/>
  <text x="512" y="223" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FFFFFF" text-anchor="middle">Sys.Clean</text>
  <!-- Item 1: Temp files -->
  <rect x="168" y="300" width="688" height="85" rx="14" fill="#E3F2FD"/>
  <rect x="186" y="318" width="50" height="50" rx="10" fill="#1565C0"/>
  <path d="M196 343 L207 355 L228 332" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="278" y="351" font-family="Arial, sans-serif" font-size="38" fill="#0D47A1">임시 파일</text>
  <text x="804" y="351" font-family="Arial Black, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">3.2 GB</text>
  <!-- Item 2: Registry -->
  <rect x="168" y="410" width="688" height="85" rx="14" fill="#E3F2FD"/>
  <rect x="186" y="428" width="50" height="50" rx="10" fill="#7B1FA2"/>
  <path d="M196 453 L207 465 L228 442" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="278" y="461" font-family="Arial, sans-serif" font-size="38" fill="#4A148C">레지스트리</text>
  <text x="804" y="461" font-family="Arial Black, sans-serif" font-size="34" fill="#7B1FA2" text-anchor="middle">47개</text>
  <!-- Item 3: Programs -->
  <rect x="168" y="520" width="688" height="85" rx="14" fill="#E3F2FD"/>
  <rect x="186" y="538" width="50" height="50" rx="10" fill="#2E7D32"/>
  <path d="M196 563 L207 575 L228 552" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="278" y="571" font-family="Arial, sans-serif" font-size="38" fill="#1B5E20">설치 프로그램</text>
  <text x="804" y="571" font-family="Arial Black, sans-serif" font-size="34" fill="#2E7D32" text-anchor="middle">12개</text>
  <!-- Item 4: Custom folders -->
  <rect x="168" y="630" width="688" height="85" rx="14" fill="#E3F2FD"/>
  <rect x="186" y="648" width="50" height="50" rx="10" fill="#E65100"/>
  <path d="M196 673 L207 685 L228 662" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="278" y="681" font-family="Arial, sans-serif" font-size="38" fill="#BF360C">사용자 폴더</text>
  <text x="804" y="681" font-family="Arial Black, sans-serif" font-size="34" fill="#E65100" text-anchor="middle">820 MB</text>
  <!-- Layer 3: Total freed badge -->
  <rect x="200" y="790" width="624" height="80" rx="16" fill="#1565C0"/>
  <text x="512" y="843" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#FFFFFF" text-anchor="middle">총 4.0+ GB 확보 가능</text>
</svg>
