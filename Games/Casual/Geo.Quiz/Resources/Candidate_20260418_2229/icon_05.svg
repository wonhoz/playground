<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background adventure orange -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: Explorer planting flag on globe -->
  <!-- Simplified globe -->
  <circle cx="512" cy="580" r="300" fill="#1565C0" opacity="0.8"/>
  <ellipse cx="460" cy="520" rx="80" ry="70" fill="#43A047" opacity="0.85"/>
  <ellipse cx="580" cy="560" rx="70" ry="55" fill="#388E3C" opacity="0.85"/>
  <ellipse cx="512" cy="640" rx="50" ry="60" fill="#66BB6A" opacity="0.8"/>
  <!-- Flag pole on top of globe -->
  <line x1="512" y1="280" x2="512" y2="490" stroke="#8D6E63" stroke-width="18" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="512,280 700,330 512,380" fill="#FF3D00"/>
  <!-- Star on flag -->
  <path d="M580 320 L586 338 L606 338 L590 350 L596 368 L580 356 L564 368 L570 350 L554 338 L574 338 Z" fill="#FFFFFF" opacity="0.9"/>
  <!-- Layer 3: Score badge -->
  <circle cx="820" cy="240" r="90" fill="#FF6F00"/>
  <text x="820" y="268" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" text-anchor="middle">10</text>
  <text x="820" y="316" font-family="Arial, sans-serif" font-size="32" fill="#FFE082" text-anchor="middle">pts</text>
</svg>
