<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0c0c20"/>
    </linearGradient>
    <linearGradient id="paper1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="paper2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="paper3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#C7D2FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#6366F1" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 종이접기 학(crane) 스타일 추상 표현 -->
  <!-- 메인 종이 날개 1 -->
  <polygon points="256,140 160,280 256,320 256,140" fill="url(#paper1)" opacity="0.9" filter="url(#shadow)"/>
  <!-- 메인 종이 날개 2 -->
  <polygon points="256,140 352,280 256,320 256,140" fill="url(#paper2)" opacity="0.85" filter="url(#shadow)"/>
  <!-- 중간 접힘 -->
  <polygon points="160,280 256,320 200,380 160,280" fill="url(#paper3)" opacity="0.8"/>
  <polygon points="352,280 256,320 312,380 352,280" fill="url(#paper1)" opacity="0.75"/>
  <!-- 몸통 -->
  <polygon points="200,380 256,320 312,380 256,420 200,380" fill="url(#paper2)" opacity="0.9"/>
  <!-- 머리/부리 -->
  <polygon points="256,140 280,110 300,140 256,140" fill="#A5B4FC" opacity="0.9"/>
  <!-- 접힘 선 디테일 -->
  <line x1="256" y1="140" x2="256" y2="320" stroke="#C7D2FE" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="280" x2="256" y2="320" stroke="#A5B4FC" stroke-width="1" opacity="0.4"/>
  <line x1="352" y1="280" x2="256" y2="320" stroke="#A5B4FC" stroke-width="1" opacity="0.4"/>
  <!-- 글로우 효과 -->
  <circle cx="256" cy="220" r="60" fill="#6366F1" opacity="0.05" filter="url(#glow)"/>
  <!-- 이름 변경 텍스트 심볼 -->
  <text x="256" y="260" text-anchor="middle" font-family="Arial" font-size="18" fill="#C7D2FE" opacity="0.8" font-style="italic">Aa</text>
  <!-- 작은 파티클들 -->
  <circle cx="140" cy="160" r="3" fill="#818CF8" opacity="0.6"/>
  <circle cx="380" cy="180" r="2.5" fill="#A5B4FC" opacity="0.5"/>
  <circle cx="120" cy="380" r="2" fill="#6366F1" opacity="0.4"/>
  <circle cx="400" cy="360" r="3" fill="#818CF8" opacity="0.5"/>
</svg>