<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="80" width="392" height="300" rx="12" fill="#111111" stroke="#333" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="60" y="80" width="392" height="32" rx="12" fill="#222222"/>
  <rect x="60" y="96" width="392" height="16" fill="#222222"/>
  <circle cx="88" cy="96" r="7" fill="#FF5F57"/>
  <circle cx="112" cy="96" r="7" fill="#FEBC2E"/>
  <circle cx="136" cy="96" r="7" fill="#28C840"/>
  <text x="256" y="100" font-family="monospace" font-size="13" fill="#888" text-anchor="middle">bug.hunt terminal</text>
  <!-- Terminal content -->
  <text x="80" y="138" font-family="monospace" font-size="14" fill="#00CC00">$ run puzzle_01.py</text>
  <text x="80" y="162" font-family="monospace" font-size="14" fill="#888">Loading puzzle...</text>
  <text x="80" y="186" font-family="monospace" font-size="14" fill="#FF4444">ERROR: NullReferenceException</text>
  <text x="80" y="210" font-family="monospace" font-size="14" fill="#FF6666">  at line 42: obj.method()</text>
  <text x="80" y="234" font-family="monospace" font-size="14" fill="#FFAA00">HINT: Check object init</text>
  <text x="80" y="258" font-family="monospace" font-size="14" fill="#00CC00">$ _</text>
  <!-- Cursor blink -->
  <rect x="100" y="244" width="9" height="16" fill="#00CC00"/>
  <!-- Title -->
  <text x="256" y="430" font-family="Arial" font-size="22" fill="#FF4444" text-anchor="middle">Find the Bug!</text>
  <text x="256" y="464" font-family="Arial" font-size="26" font-weight="bold" fill="#00CC00" text-anchor="middle">Bug.Hunt</text>
</svg>
