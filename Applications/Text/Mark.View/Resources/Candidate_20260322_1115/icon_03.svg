<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C1445"/>
      <stop offset="100%" stop-color="#1E2A5E"/>
    </linearGradient>
    <clipPath id="c03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background — deep midnight navy -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <!-- Layer 2: Magnifying glass — examining / reading markdown -->
  <!-- Glass circle (white ring) -->
  <circle cx="462" cy="442" r="248" fill="none" stroke="white" stroke-width="72" clip-path="url(#c03)"/>
  <!-- Glass interior tint -->
  <circle cx="462" cy="442" r="212" fill="#1A2968" opacity="0.7"/>

  <!-- # hash inside magnifying glass -->
  <!-- Horizontal bars (within circle, ~248px wide) -->
  <rect x="332" y="390" width="260" height="46" rx="23" fill="white" opacity="0.93"/>
  <rect x="332" y="458" width="260" height="46" rx="23" fill="white" opacity="0.93"/>
  <!-- Vertical bars -->
  <rect x="378" y="330" width="46" height="224" rx="23" fill="white" opacity="0.93"/>
  <rect x="500" y="330" width="46" height="224" rx="23" fill="white" opacity="0.93"/>

  <!-- Layer 3: Magnifying glass handle -->
  <line x1="654" y1="630" x2="826" y2="802"
        stroke="white" stroke-width="72" stroke-linecap="round" clip-path="url(#c03)"/>
  <!-- Handle end cap glow -->
  <circle cx="826" cy="802" r="40" fill="white" opacity="0.4" clip-path="url(#c03)"/>
</svg>
