<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 텍스트 브러시 (단어 색칠하기) | 실루엣/캐릭터 | #FFF7ED 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF7ED"/>
  <!-- Layer 2: Large paint brush -->
  <!-- Brush handle -->
  <rect x="460" y="170" width="60" height="380" rx="16" fill="#92400E" transform="rotate(20 490 360)"/>
  <!-- Brush ferrule (metal band) -->
  <rect x="454" y="480" width="72" height="50" rx="6" fill="#9CA3AF" transform="rotate(20 490 505)"/>
  <!-- Brush head -->
  <ellipse cx="490" cy="580" rx="50" ry="80" fill="#F59E0B" transform="rotate(20 490 580)"/>
  <!-- Brush tip (pointed) -->
  <path d="M460 620 Q490 680 520 620" fill="#D97706" transform="rotate(20 490 640)"/>
  <!-- Layer 3: Word strokes from brush tip -->
  <!-- Colorful words being painted -->
  <text x="580" y="600" font-family="Arial,sans-serif" font-size="44" fill="#EF4444" font-weight="bold" transform="rotate(-5 580 600)">클라우드</text>
  <text x="380" y="660" font-family="Arial,sans-serif" font-size="32" fill="#3B82F6" font-weight="bold" transform="rotate(3 380 660)">단어</text>
  <text x="640" y="700" font-family="Arial,sans-serif" font-size="28" fill="#22C55E" transform="rotate(-3 640 700)">시각화</text>
  <text x="320" y="730" font-family="Arial,sans-serif" font-size="22" fill="#F59E0B" transform="rotate(5 320 730)">빈도</text>
  <text x="700" y="760" font-family="Arial,sans-serif" font-size="20" fill="#8B5CF6" transform="rotate(-6 700 760)">텍스트</text>
  <text x="370" y="790" font-family="Arial,sans-serif" font-size="18" fill="#EC4899" transform="rotate(2 370 790)">분석</text>
  <text x="620" y="810" font-family="Arial,sans-serif" font-size="16" fill="#06B6D4" transform="rotate(-4 620 810)">language</text>
  <!-- Paint drip -->
  <ellipse cx="556" cy="640" rx="8" ry="12" fill="#F59E0B" opacity="0.7"/>
  <ellipse cx="558" cy="656" rx="5" ry="8" fill="#D97706" opacity="0.6"/>
</svg>
