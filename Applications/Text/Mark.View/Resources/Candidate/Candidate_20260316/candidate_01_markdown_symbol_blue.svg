<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F2341"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large markdown "M↓" badge -->
  <rect x="76" y="160" width="360" height="220" rx="24" fill="url(#badge)" stroke="#38BDF8" stroke-width="3"/>
  <!-- M letter -->
  <path d="M116 340 L116 220 L176 300 L236 220 L236 340" stroke="white" stroke-width="22" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Down arrow -->
  <line x1="316" y1="220" x2="316" y2="330" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <polyline points="268,290 316,340 364,290" stroke="white" stroke-width="22" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Decorative text lines above badge -->
  <rect x="100" y="100" width="200" height="12" rx="6" fill="white" opacity="0.3"/>
  <rect x="100" y="122" width="140" height="10" rx="5" fill="white" opacity="0.2"/>
  <!-- Decorative text lines below badge -->
  <rect x="100" y="400" width="220" height="12" rx="6" fill="white" opacity="0.3"/>
  <rect x="100" y="422" width="160" height="10" rx="5" fill="white" opacity="0.2"/>
  <rect x="100" y="442" width="180" height="10" rx="5" fill="white" opacity="0.15"/>
  <!-- Dots accent -->
  <circle cx="380" cy="415" r="8" fill="white" opacity="0.3"/>
  <circle cx="404" cy="415" r="8" fill="white" opacity="0.2"/>
  <circle cx="428" cy="415" r="8" fill="white" opacity="0.15"/>
</svg>
