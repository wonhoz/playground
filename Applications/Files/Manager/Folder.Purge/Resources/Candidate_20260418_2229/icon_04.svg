<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background sky blue clean -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: Vacuum cleaner sucking up folder icons -->
  <!-- Vacuum body -->
  <ellipse cx="600" cy="580" rx="200" ry="130" fill="#1565C0" opacity="0.9"/>
  <ellipse cx="600" cy="580" rx="175" ry="110" fill="#1976D2"/>
  <!-- Vacuum hose -->
  <path d="M400 580 Q320 530 280 440 Q240 360 300 280" stroke="#0D47A1" stroke-width="40" stroke-linecap="round" fill="none"/>
  <!-- Suction opening -->
  <ellipse cx="310" cy="272" rx="50" ry="30" fill="#0D47A1" transform="rotate(-30 310 272)"/>
  <!-- Folder icons being sucked in -->
  <rect x="130" y="180" width="100" height="80" rx="10" fill="#FF8F00" opacity="0.9" transform="rotate(-10 180 220)"/>
  <path d="M130 220 Q180 220 180 200 L130 180 Z" fill="#FF8F00" opacity="0.9" transform="rotate(-10 180 220)"/>
  <rect x="170" y="130" width="80" height="65" rx="8" fill="#FFCC02" opacity="0.8" transform="rotate(15 210 163)"/>
  <rect x="80" y="280" width="70" height="55" rx="8" fill="#EF6C00" opacity="0.85" transform="rotate(-25 115 308)"/>
  <!-- Motion lines toward vacuum -->
  <path d="M230 250 L295 270" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M220 300 L290 290" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Vacuum power badge -->
  <rect x="530" y="550" width="140" height="60" rx="12" fill="#0D47A1"/>
  <text x="600" y="590" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" text-anchor="middle">PURGE</text>
  <!-- Layer 3: Clean sparkle -->
  <path d="M800 280 L812 314 L848 314 L820 332 L832 368 L800 350 L768 368 L780 332 L752 314 L788 314 Z" fill="#FFCA28" opacity="0.9"/>
  <circle cx="820" cy="680" r="18" fill="#FFFFFF" opacity="0.7"/>
</svg>
