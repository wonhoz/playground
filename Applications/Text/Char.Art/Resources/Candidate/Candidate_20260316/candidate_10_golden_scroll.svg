  <text x="256" y="228" font-family="monospace" font-size="13" fill="#3A2000" text-anchor="middle">| (__| ' \/ _` | '_/ _ \| '_|  _|</text>
  <text x="256" y="248" font-family="monospace" font-size="13" fill="#3A2000" text-anchor="middle"> \___|_||_\__,_|_|/_/ \_\_|  \__|</text>
