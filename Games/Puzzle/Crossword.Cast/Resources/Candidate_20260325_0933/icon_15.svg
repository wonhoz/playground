<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4527A0"/>
      <stop offset="100%" stop-color="#1A0070"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#00000055"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- 배경에 큰 ? 기호 (장식) -->
  <text x="512" y="560" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="700" fill="white" opacity="0.07">?</text>
  <!-- Layer 2: 격자 (KEY 가로 / KIT 세로, 교차점 K=(0,0)) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="412" width="196" height="196" fill="#0D0040" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#0D0040" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#0D0040" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#0D0040" rx="10"/>
  <!-- 흰 셀 -->
  <rect x="212" y="212" width="196" height="196" fill="#EDE7F6" stroke="#FFD600" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="212" width="196" height="196" fill="white" stroke="#7C4DFF" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="212" width="196" height="196" fill="white" stroke="#7C4DFF" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="412" width="196" height="196" fill="white" stroke="#7C4DFF" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="#7C4DFF" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- Layer 3: 글자 (KEY 가로 / KIT 세로) -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#FFD600">K</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E040FB">E</text>
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E040FB">Y</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E040FB">I</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E040FB">T</text>
  <!-- 클루 번호 -->
  <text x="222" y="228" text-anchor="start" dominant-baseline="hanging" font-family="Arial,sans-serif" font-weight="700" font-size="46" fill="#FFD600">1</text>
</svg>
