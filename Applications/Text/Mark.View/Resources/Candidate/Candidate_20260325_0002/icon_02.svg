<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#FFFDE7"/>
  <rect width="1024" height="1024" rx="190" fill="none" stroke="#F57F17" stroke-width="16"/>
  <!-- Layer 2: 문서 카드 -->
  <rect x="210" y="220" width="604" height="560" rx="20" fill="white" stroke="#E0E0E0" stroke-width="6"/>
  <!-- 문서 헤더 영역 -->
  <rect x="210" y="220" width="604" height="12" rx="0" fill="#F57F17"/>
  <rect x="210" y="226" width="604" height="14" fill="#F57F17"/>
  <!-- # Title -->
  <text x="260" y="310" font-family="Arial Black" font-size="100" font-weight="900" fill="#212121"># Title</text>
  <!-- 구분선 -->
  <rect x="240" y="328" width="540" height="5" rx="2" fill="#E0E0E0"/>
  <!-- ## Section -->
  <text x="260" y="400" font-family="Arial Black" font-size="80" font-weight="900" fill="#424242">## Section</text>
  <!-- 항목들 -->
  <text x="260" y="470" font-family="Arial" font-size="64" fill="#616161">• item one</text>
  <text x="260" y="545" font-family="Arial" font-size="64" fill="#616161">• item two</text>
  <text x="260" y="620" font-family="Arial" font-size="64" fill="#616161">• item three</text>
  <!-- --- 구분선 -->
  <rect x="240" y="650" width="540" height="4" rx="2" fill="#BDBDBD"/>
  <!-- Layer 3: .md 배지 -->
  <rect x="640" y="730" width="148" height="54" rx="12" fill="#F57F17"/>
  <text x="714" y="768" text-anchor="middle" font-family="Arial Black" font-size="44" font-weight="900" fill="white">.md</text>
</svg>