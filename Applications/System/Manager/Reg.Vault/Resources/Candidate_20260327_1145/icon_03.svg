<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- HKEY tree nodes as layered cards -->
  <!-- HKLM card (back) -->
  <rect x="250" y="200" width="580" height="140" rx="20" fill="#8B5CF6" opacity="0.4" transform="rotate(-4,540,270)"/>
  <!-- HKCU card (middle) -->
  <rect x="240" y="310" width="580" height="140" rx="20" fill="#7C3AED" opacity="0.6" transform="rotate(-1,530,380)"/>
  <!-- Software key card (front top) -->
  <rect x="200" y="420" width="624" height="160" rx="20" fill="#6D28D9"/>
  <text x="512" y="488" font-family="Consolas,monospace" font-size="48" fill="#DDD6FE" font-weight="bold" text-anchor="middle">HKCU\Software</text>
  <text x="512" y="550" font-family="Consolas,monospace" font-size="40" fill="#C4B5FD" text-anchor="middle">\Microsoft\Windows</text>
  <!-- Bookmark -->
  <path d="M808,420 L808,540 L748,500 L688,540 L688,420 Z" fill="#FBBF24"/>
  <!-- Snapshot icon -->
  <rect x="200" y="620" width="290" height="130" rx="16" fill="#7C3AED" opacity="0.8"/>
  <text x="345" y="697" font-family="Arial,sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold" text-anchor="middle">📸 Snap</text>
  <!-- Search icon -->
  <rect x="510" y="620" width="314" height="130" rx="16" fill="#7C3AED" opacity="0.8"/>
  <circle cx="634" cy="685" r="40" fill="none" stroke="#FFFFFF" stroke-width="16"/>
  <line x1="662" y1="713" x2="700" y2="751" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>
  <text x="740" y="700" font-family="Arial,sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold">Find</text>
</svg>
