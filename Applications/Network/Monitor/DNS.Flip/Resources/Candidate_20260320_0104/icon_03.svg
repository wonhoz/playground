<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#00080F"/>
  <!-- 네트워크 스위치 박스 -->
  <rect x="220" y="420" width="584" height="184" rx="36" fill="#0277BD"/>
  <!-- 포트 점들 -->
  <circle cx="340" cy="512" r="28" fill="#4FC3F7"/>
  <circle cx="440" cy="512" r="28" fill="#4FC3F7"/>
  <circle cx="540" cy="512" r="28" fill="#4FC3F7"/>
  <circle cx="640" cy="512" r="28" fill="#4FC3F7"/>
  <!-- 위쪽 선 (입력) -->
  <line x1="340" y1="300" x2="340" y2="420" stroke="#4FC3F7" stroke-width="28" stroke-linecap="round"/>
  <line x1="540" y1="300" x2="540" y2="420" stroke="#0277BD" stroke-width="28" stroke-linecap="round"/>
  <!-- 전환 화살표 (상단) -->
  <polygon points="340,260 300,320 380,320" fill="#4FC3F7"/>
  <polygon points="540,260 500,320 580,320" fill="#0277BD"/>
  <!-- 아래쪽 크로스 연결 선 -->
  <line x1="440" y1="604" x2="640" y2="724" stroke="#4FC3F7" stroke-width="22" stroke-linecap="round"/>
  <line x1="640" y1="604" x2="440" y2="724" stroke="#4FC3F7" stroke-width="22" stroke-linecap="round"/>
</svg>
