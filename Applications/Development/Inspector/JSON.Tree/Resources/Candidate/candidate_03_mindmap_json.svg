<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="branch1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="branch2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="branch3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Center node (root) -->
  <circle cx="256" cy="256" r="42" fill="url(#center)"/>
  <text x="256" y="252" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">JSON</text>
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="12" fill="#e9d5ff">root</text>
  <!-- Branch lines -->
  <line x1="222" y1="226" x2="130" y2="140" stroke="#f59e0b" stroke-width="3"/>
  <line x1="214" y1="256" x2="90" y2="256" stroke="#f59e0b" stroke-width="3"/>
  <line x1="222" y1="286" x2="130" y2="372" stroke="#10b981" stroke-width="3"/>
  <line x1="290" y1="226" x2="382" y2="140" stroke="#3b82f6" stroke-width="3"/>
  <line x1="298" y1="256" x2="422" y2="256" stroke="#3b82f6" stroke-width="3"/>
  <line x1="290" y1="286" x2="382" y2="372" stroke="#10b981" stroke-width="3"/>
  <!-- Branch nodes -->
  <circle cx="118" cy="128" r="28" fill="url(#branch1)" opacity="0.9"/>
  <text x="118" y="124" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"name"</text>
  <text x="118" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"John"</text>
  <circle cx="78" cy="256" r="28" fill="url(#branch1)" opacity="0.9"/>
  <text x="78" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"age"</text>
  <text x="78" y="266" text-anchor="middle" font-family="monospace" font-size="10" fill="white">30</text>
  <circle cx="118" cy="384" r="28" fill="url(#branch2)" opacity="0.9"/>
  <text x="118" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"tags"</text>
  <text x="118" y="394" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[ ]</text>
  <circle cx="394" cy="128" r="28" fill="url(#branch3)" opacity="0.9"/>
  <text x="394" y="124" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"data"</text>
  <text x="394" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="white">{ }</text>
  <circle cx="434" cy="256" r="28" fill="url(#branch3)" opacity="0.9"/>
  <text x="434" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"ok"</text>
  <text x="434" y="266" text-anchor="middle" font-family="monospace" font-size="10" fill="white">true</text>
  <circle cx="394" cy="384" r="28" fill="url(#branch2)" opacity="0.9"/>
  <text x="394" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="white">"meta"</text>
  <text x="394" y="394" text-anchor="middle" font-family="monospace" font-size="10" fill="white">null</text>
</svg>
