<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 확성기 — 단어가 울려 퍼지는 | 실루엣/캐릭터 | #FFF0F0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF0F0"/>
  <!-- Layer 2: Megaphone with words flying out -->
  <!-- Megaphone body -->
  <polygon points="260,440 380,380 380,620 260,560" fill="#DC2626" stroke="#991B1B" stroke-width="4"/>
  <!-- Megaphone cone (wide end) -->
  <polygon points="380,380 640,240 640,740 380,620" fill="#EF4444" stroke="#991B1B" stroke-width="4"/>
  <!-- Cone rim -->
  <ellipse cx="640" cy="490" rx="30" ry="260" fill="#B91C1C" stroke="#991B1B" stroke-width="3"/>
  <!-- Handle -->
  <rect x="200" y="474" width="66" height="52" rx="10" fill="#7F1D1D"/>
  <!-- Words radiating from megaphone -->
  <text x="700" y="310" font-family="Arial,sans-serif" font-size="40" fill="#1D4ED8" font-weight="bold" transform="rotate(-10 700 310)">단어</text>
  <text x="730" y="420" font-family="Arial,sans-serif" font-size="32" fill="#7C3AED" font-weight="bold">Cloud</text>
  <text x="740" y="510" font-family="Arial,sans-serif" font-size="28" fill="#16A34A" transform="rotate(5 740 510)">텍스트</text>
  <text x="720" y="600" font-family="Arial,sans-serif" font-size="24" fill="#D97706" transform="rotate(-5 720 600)">Word</text>
  <text x="700" y="680" font-family="Arial,sans-serif" font-size="20" fill="#DC2626" transform="rotate(8 700 680)">빈도</text>
  <!-- Sound waves -->
  <path d="M660 360 Q700 490 660 620" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.3"/>
  <path d="M700 330 Q756 490 700 650" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.2"/>
  <!-- Layer 3: Broadcast indicator light -->
  <circle cx="280" cy="434" r="16" fill="#FCD34D"/>
  <circle cx="280" cy="434" r="10" fill="#F59E0B"/>
</svg>
