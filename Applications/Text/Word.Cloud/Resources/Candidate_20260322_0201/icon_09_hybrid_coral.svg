<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 코랄 — 구름 + 단어 버블들, 중앙심볼+기하학 혼합 패턴 -->
  <defs>
    <linearGradient id="bg09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A1A0E"/>
      <stop offset="100%" stop-color="#220800"/>
    </linearGradient>
    <linearGradient id="cloudCoral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A70"/>
      <stop offset="100%" stop-color="#E06050"/>
    </linearGradient>
    <radialGradient id="bubbleA" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFB8A0"/>
      <stop offset="100%" stop-color="#FF6040"/>
    </radialGradient>
    <radialGradient id="bubbleB" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFD0B8"/>
      <stop offset="100%" stop-color="#FF7A5A"/>
    </radialGradient>
    <radialGradient id="bubbleC" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFC8AA"/>
      <stop offset="100%" stop-color="#F05A3A"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg09)"/>

  <!-- 메인 구름 (중앙 큰 구름) -->
  <g fill="url(#cloudCoral)" opacity="0.88">
    <circle cx="512" cy="430" r="200"/>
    <circle cx="340" cy="478" r="138"/>
    <circle cx="685" cy="468" r="148"/>
    <circle cx="425" cy="365" r="115"/>
    <circle cx="608" cy="358" r="125"/>
  </g>

  <!-- 구름 안 메인 텍스트 -->
  <text x="512" y="415" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#2A0808" text-anchor="middle">CLOUD</text>
  <text x="400" y="468" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#3A1010" text-anchor="middle">WORD</text>
  <text x="635" y="460" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#3A1010" text-anchor="middle">TEXT</text>

  <!-- 단어 버블들 — 개별 원형 버블에 단어 -->
  <!-- 큰 버블 -->
  <circle cx="245" cy="310" r="82" fill="url(#bubbleA)" opacity="0.9"/>
  <text x="245" y="318" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#3A0808" text-anchor="middle">hello</text>

  <circle cx="780" cy="300" r="75" fill="url(#bubbleB)" opacity="0.9"/>
  <text x="780" y="308" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#3A0808" text-anchor="middle">love</text>

  <!-- 중간 버블 -->
  <circle cx="180" cy="580" r="65" fill="url(#bubbleC)" opacity="0.85"/>
  <text x="180" y="588" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#3A0808" text-anchor="middle">world</text>

  <circle cx="848" cy="560" r="60" fill="url(#bubbleA)" opacity="0.85"/>
  <text x="848" y="568" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3A0808" text-anchor="middle">sky</text>

  <circle cx="350" cy="660" r="55" fill="url(#bubbleB)" opacity="0.82"/>
  <text x="350" y="667" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3A0808" text-anchor="middle">big</text>

  <circle cx="670" cy="655" r="52" fill="url(#bubbleC)" opacity="0.82"/>
  <text x="670" y="662" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#3A0808" text-anchor="middle">data</text>

  <!-- 작은 버블 -->
  <circle cx="512" cy="700" r="42" fill="url(#bubbleA)" opacity="0.78"/>
  <text x="512" y="706" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#3A0808" text-anchor="middle">art</text>

  <circle cx="145" cy="420" r="40" fill="url(#bubbleB)" opacity="0.75"/>
  <text x="145" y="426" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#3A0808" text-anchor="middle">tag</text>

  <circle cx="878" cy="425" r="38" fill="url(#bubbleC)" opacity="0.72"/>
  <text x="878" y="431" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#3A0808" text-anchor="middle">key</text>

  <!-- 아주 작은 버블들 -->
  <circle cx="235" cy="695" r="28" fill="url(#bubbleA)" opacity="0.65"/>
  <text x="235" y="700" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#3A0808" text-anchor="middle">map</text>

  <circle cx="788" cy="700" r="26" fill="url(#bubbleB)" opacity="0.62"/>
  <text x="788" y="705" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#3A0808" text-anchor="middle">hot</text>

  <!-- 버블들을 구름으로 연결하는 선들 -->
  <line x1="310" y1="330" x2="340" y2="390" stroke="#FF8A70" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="720" y1="315" x2="690" y2="375" stroke="#FF8A70" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="225" y1="520" x2="280" y2="468" stroke="#FF7060" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="795" y1="505" x2="745" y2="462" stroke="#FF7060" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
