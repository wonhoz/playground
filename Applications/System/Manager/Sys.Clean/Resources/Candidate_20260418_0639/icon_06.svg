  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(225 512 460)"/>
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(270 512 460)"/>
  <rect x="488" y="210" width="48" height="80" rx="10" fill="#607D8B" transform="rotate(315 512 460)"/>
  <!-- 기어 중앙 구멍 -->
