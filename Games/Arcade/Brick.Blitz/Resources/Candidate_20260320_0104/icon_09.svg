  <!-- Vortex center -->
  <circle cx="512" cy="512" r="80" fill="#1A237E" opacity="0.9"/>
  <circle cx="512" cy="512" r="44" fill="#5C6BC0" opacity="0.85"/>
  <circle cx="512" cy="512" r="20" fill="#9FA8DA" opacity="0.9"/>
