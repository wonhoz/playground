<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Magic wand touching audio file → metadata appears -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#05000F"/>
  <!-- Audio file (left) -->
  <path d="M140 220 L140 780 L540 780 L540 380 L380 220 Z" fill="#0D0020" stroke="#7C4DFF" stroke-width="20"/>
  <path d="M380 220 L380 380 L540 380 Z" fill="#7C4DFF" opacity="0.3"/>
  <!-- Waveform on file -->
  <rect x="190" y="480" width="16" height="100" rx="8" fill="#7C4DFF" opacity="0.5"/>
  <rect x="218" y="440" width="16" height="180" rx="8" fill="#7C4DFF" opacity="0.7"/>
  <rect x="246" y="460" width="16" height="140" rx="8" fill="#7C4DFF" opacity="0.9"/>
  <rect x="274" y="500" width="16" height="60" rx="8" fill="#7C4DFF" opacity="0.6"/>
  <rect x="302" y="430" width="16" height="200" rx="8" fill="#7C4DFF" opacity="0.8"/>
  <rect x="330" y="470" width="16" height="120" rx="8" fill="#7C4DFF" opacity="0.6"/>
  <rect x="358" y="490" width="16" height="80" rx="8" fill="#7C4DFF" opacity="0.5"/>
  <!-- Magic wand -->
  <line x1="520" y1="580" x2="780" y2="320" stroke="#FFD740" stroke-width="20" stroke-linecap="round"/>
  <rect x="764" y="292" width="40" height="60" rx="10" fill="#FFD740" transform="rotate(-45, 784, 322)"/>
  <circle cx="790" cy="298" r="20" fill="#FFF8E1"/>
  <!-- Sparkles around wand tip -->
  <path d="M820 240 L828 268 L856 256 L828 284 L820 312 L812 284 L784 256 L812 268 Z" fill="#FFD740" opacity="0.9"/>
  <circle cx="860" cy="320" r="10" fill="#FFF176" opacity="0.8"/>
  <circle cx="840" cy="370" r="8" fill="#FFF176" opacity="0.6"/>
  <!-- Metadata appearing (right) -->
  <rect x="580" y="520" width="300" height="220" rx="18" fill="#12003A" stroke="#CE93D8" stroke-width="14"/>
  <rect x="610" y="555" width="180" height="18" rx="9" fill="#CE93D8" opacity="0.9"/>
  <rect x="610" y="588" width="140" height="14" rx="7" fill="#CE93D8" opacity="0.6"/>
  <rect x="610" y="618" width="160" height="14" rx="7" fill="#CE93D8" opacity="0.6"/>
  <rect x="610" y="648" width="120" height="14" rx="7" fill="#CE93D8" opacity="0.5"/>
  <rect x="610" y="678" width="100" height="14" rx="7" fill="#CE93D8" opacity="0.4"/>
  <!-- Fade-in shimmer on metadata box -->
  <rect x="580" y="520" width="300" height="220" rx="18" fill="#E040FB" opacity="0.04"/>
</svg>
