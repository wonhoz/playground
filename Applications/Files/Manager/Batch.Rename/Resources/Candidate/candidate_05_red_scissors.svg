<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0808"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="file" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAAAA"/>
      <stop offset="100%" stop-color="#CC4444"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Files -->
  <rect x="76" y="168" width="100" height="130" rx="8" fill="url(#file)" opacity="0.6"/>
  <rect x="198" y="168" width="100" height="130" rx="8" fill="url(#file)" opacity="0.7"/>
  <rect x="320" y="168" width="100" height="130" rx="8" fill="url(#file)" opacity="0.8"/>
  <!-- Scissors shape -->
  <!-- Handle circle left -->
  <circle cx="150" cy="360" r="36" fill="none" stroke="url(#blade)" stroke-width="10"/>
  <circle cx="150" cy="360" r="18" fill="#1a0000" stroke="url(#blade)" stroke-width="6"/>
  <!-- Handle circle right -->
  <circle cx="362" cy="360" r="36" fill="none" stroke="url(#blade)" stroke-width="10"/>
  <circle cx="362" cy="360" r="18" fill="#1a0000" stroke="url(#blade)" stroke-width="6"/>
  <!-- Blade left -->
  <line x1="170" y1="340" x2="265" y2="280" stroke="url(#blade)" stroke-width="10" stroke-linecap="round"/>
  <!-- Blade right -->
  <line x1="342" y1="340" x2="265" y2="280" stroke="url(#blade)" stroke-width="10" stroke-linecap="round"/>
  <!-- Center screw -->
  <circle cx="265" cy="280" r="10" fill="#FF6666"/>
  <!-- Cut lines on files -->
  <line x1="76" y1="233" x2="176" y2="233" stroke="#FF4444" stroke-width="3" stroke-dasharray="6,3" opacity="0.7"/>
  <line x1="198" y1="233" x2="298" y2="233" stroke="#FF4444" stroke-width="3" stroke-dasharray="6,3" opacity="0.7"/>
  <line x1="320" y1="233" x2="420" y2="233" stroke="#FF4444" stroke-width="3" stroke-dasharray="6,3" opacity="0.7"/>
</svg>