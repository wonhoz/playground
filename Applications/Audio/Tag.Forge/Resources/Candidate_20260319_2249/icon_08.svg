<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Barcode stripe forming a music note shape -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#080808"/>
  <!-- Barcode bars arranged in music note shape (note stem + head area) -->
  <!-- Stem area bars (tall) -->
  <rect x="400" y="180" width="14" height="500" rx="4" fill="#F44336"/>
  <rect x="420" y="180" width="8" height="500" rx="4" fill="#F44336" opacity="0.7"/>
  <rect x="434" y="180" width="14" height="500" rx="4" fill="#F44336"/>
  <rect x="454" y="180" width="8" height="500" rx="4" fill="#F44336" opacity="0.8"/>
  <rect x="468" y="180" width="20" height="500" rx="4" fill="#F44336"/>
  <rect x="494" y="180" width="8" height="500" rx="4" fill="#F44336" opacity="0.7"/>
  <rect x="508" y="180" width="14" height="500" rx="4" fill="#F44336"/>
  <rect x="528" y="180" width="8" height="500" rx="4" fill="#F44336" opacity="0.6"/>
  <rect x="542" y="180" width="16" height="500" rx="4" fill="#F44336"/>
  <!-- Beam / flag (horizontal bar top) -->
  <rect x="400" y="180" width="200" height="30" rx="6" fill="#F44336"/>
  <rect x="400" y="225" width="160" height="22" rx="5" fill="#F44336" opacity="0.6"/>
  <!-- Note head area bars (shorter, to right) -->
  <rect x="332" y="580" width="14" height="120" rx="4" fill="#F44336" opacity="0.9"/>
  <rect x="352" y="570" width="8" height="140" rx="4" fill="#F44336" opacity="0.7"/>
  <rect x="366" y="560" width="14" height="160" rx="4" fill="#F44336"/>
  <rect x="386" y="570" width="8" height="140" rx="4" fill="#F44336" opacity="0.8"/>
  <rect x="540" y="560" width="14" height="160" rx="4" fill="#F44336"/>
  <rect x="560" y="570" width="8" height="140" rx="4" fill="#F44336" opacity="0.7"/>
  <rect x="574" y="580" width="14" height="120" rx="4" fill="#F44336" opacity="0.8"/>
  <!-- Scanner line -->
  <rect x="180" y="760" width="664" height="10" rx="5" fill="#F44336" opacity="0.3"/>
  <!-- Scan frame corners -->
  <path d="M200 720 L200 680 L240 680" fill="none" stroke="#F44336" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path x="840" y="720" d="M824 720 L824 680 L784 680" fill="none" stroke="#F44336" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
