<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#1F2833"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#45A29E"/>
      <stop offset="50%" stop-color="#66FCF1"/>
      <stop offset="100%" stop-color="#C5F6FA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Background arc -->
  <path d="M86 270 A170 170 0 0 1 426 270" fill="none" stroke="#1F2833" stroke-width="22"/>
  <!-- Active arc (about 60% of 180deg) -->
  <path d="M86 270 A170 170 0 0 1 300 112" fill="none" stroke="url(#arc)" stroke-width="22" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="86" y1="270" x2="108" y2="270" stroke="#45A29E" stroke-width="3"/>
  <line x1="256" y1="100" x2="256" y2="122" stroke="#45A29E" stroke-width="3"/>
  <line x1="426" y1="270" x2="404" y2="270" stroke="#45A29E" stroke-width="3"/>
  <line x1="139" y1="150" x2="153" y2="164" stroke="#45A29E" stroke-width="2"/>
  <line x1="373" y1="150" x2="359" y2="164" stroke="#45A29E" stroke-width="2"/>
  <!-- Needle -->
  <line x1="256" y1="270" x2="308" y2="132" stroke="#66FCF1" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="15" fill="#1F2833" stroke="#66FCF1" stroke-width="3"/>
  <!-- Display -->
  <text x="256" y="358" font-family="Arial" font-size="52" font-weight="bold" fill="#66FCF1" text-anchor="middle">4.2s</text>
  <text x="256" y="392" font-family="Arial" font-size="18" fill="#45A29E" text-anchor="middle">Boot Time</text>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#66FCF1" text-anchor="middle">Boot.Map</text>
</svg>
