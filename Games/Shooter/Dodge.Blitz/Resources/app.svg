<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020209"/>
      <stop offset="100%" stop-color="#080818"/>
    </linearGradient>
    <linearGradient id="shipNeon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <radialGradient id="shipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bulletNeon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00AA"/>
      <stop offset="100%" stop-color="#FF4DDD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines (neon grid floor) -->
  <line x1="0" y1="380" x2="512" y2="380" stroke="#1A1A4A" stroke-width="1.5"/>
  <line x1="0" y1="420" x2="512" y2="420" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="0" y1="460" x2="512" y2="460" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="80" y1="380" x2="80" y2="512" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="160" y1="380" x2="160" y2="512" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="240" y1="380" x2="240" y2="512" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="320" y1="380" x2="320" y2="512" stroke="#1A1A4A" stroke-width="1"/>
  <line x1="400" y1="380" x2="400" y2="512" stroke="#1A1A4A" stroke-width="1"/>
  <!-- Player ship (neon style) -->
  <ellipse cx="256" cy="300" rx="50" ry="25" fill="url(#shipGlow)"/>
  <polygon points="256,230 216,310 256,290 296,310" fill="url(#shipNeon)" stroke="#00F5FF" stroke-width="2"/>
  <rect x="244" y="308" width="24" height="8" rx="4" fill="#FDE68A" opacity="0.9"/>
  <!-- Bullets (incoming) -->
  <rect x="60" y="240" width="40" height="10" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5"/>
  <line x1="60" y1="245" x2="20" y2="245" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <rect x="80" y="175" width="40" height="10" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5"/>
  <line x1="80" y1="180" x2="40" y2="180" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <rect x="380" y="260" width="40" height="10" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5" transform="scale(-1,1) translate(-812,0)"/>
  <line x1="432" y1="265" x2="472" y2="265" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <rect x="340" y="200" width="40" height="10" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5" transform="scale(-1,1) translate(-720,0)"/>
  <line x1="340" y1="205" x2="300" y2="205" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <rect x="200" y="80" width="10" height="40" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5"/>
  <line x1="205" y1="80" x2="205" y2="50" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <rect x="310" y="90" width="10" height="40" rx="5" fill="url(#bulletNeon)" stroke="#FF00AA" stroke-width="1.5"/>
  <line x1="315" y1="90" x2="315" y2="60" stroke="#FF00AA" stroke-width="2" opacity="0.5"/>
  <!-- Score / title -->
  <text x="256" y="460" font-family="monospace" font-size="16" fill="#00F5FF" text-anchor="middle" font-weight="bold">DODGE.BLITZ</text>
  <text x="256" y="482" font-family="monospace" font-size="11" fill="#FF00AA" text-anchor="middle">SCORE: 99999</text>
</svg>
