<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer fractal ring - full circle (total disk) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Fractal level 1 - large arcs representing usage segments -->
  <!-- Used sector 1 (large, 70%) -->
  <path d="M256,46 A210,210 0 1,1 108,410" fill="none" stroke="#06B6D4" stroke-width="18" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Used sector 2 (medium, fill) -->
  <path d="M108,410 A210,210 0 0,1 256,46" fill="none" stroke="#1e3a5f" stroke-width="18" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Fractal level 2 rings - subdivided usage -->
  <path d="M256,80 A176,176 0 1,1 130,390" fill="none" stroke="#0EA5E9" stroke-width="12" stroke-opacity="0.65" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M256,115 A141,141 0 1,1 155,360" fill="none" stroke="#3B82F6" stroke-width="9" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Fractal level 3 -->
  <path d="M256,148 A108,108 0 1,1 178,330" fill="none" stroke="#06B6D4" stroke-width="6" stroke-opacity="0.7" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M256,180 A76,76 0 1,1 200,305" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round"/>

  <!-- Fractal level 4 - innermost -->
  <path d="M256,208 A48,48 0 1,1 220,285" fill="none" stroke="#06B6D4" stroke-width="3" stroke-opacity="0.8" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M256,228 A28,28 0 1,1 233,272" fill="none" stroke="#7DD3FC" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Central dot -->
  <circle cx="256" cy="256" r="12" fill="#06B6D4" fill-opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="#7DD3FC"/>

  <!-- Fractal branch lines radiating outward -->
  <line x1="256" y1="256" x2="256" y2="46" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="108" y2="410" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="256" y1="256" x2="446" y2="210" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#06B6D4" stroke-width="2" stroke-opacity="0.5">
    <line x1="256" y1="46" x2="256" y2="58"/>
    <line x1="360" y1="72" x2="354" y2="82"/>
    <line x1="436" y1="152" x2="426" y2="158"/>
    <line x1="466" y1="256" x2="454" y2="256"/>
    <line x1="436" y1="360" x2="426" y2="354"/>
    <line x1="360" y1="436" x2="354" y2="426"/>
    <line x1="256" y1="466" x2="256" y2="454"/>
    <line x1="152" y1="436" x2="158" y2="426"/>
    <line x1="76" y1="360" x2="86" y2="354"/>
    <line x1="46" y1="256" x2="58" y2="256"/>
    <line x1="76" y1="152" x2="86" y2="158"/>
    <line x1="152" y1="72" x2="158" y2="82"/>
  </g>

  <!-- Percentage labels suggestion dots -->
  <circle cx="466" cy="256" r="4" fill="#06B6D4" filter="url(#softglow)"/>
  <circle cx="256" cy="46" r="4" fill="#0EA5E9" filter="url(#softglow)"/>

  <!-- Free space sector marker -->
  <path d="M108,410 A210,210 0 0,1 256,466" fill="none" stroke="#3B82F6" stroke-width="6" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
