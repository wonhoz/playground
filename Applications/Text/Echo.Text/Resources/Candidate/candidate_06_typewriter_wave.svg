  <text x="97" y="271" font-family="monospace" font-size="22" text-anchor="middle" fill="white" font-weight="bold">E</text>
  <text x="149" y="271" font-family="monospace" font-size="22" text-anchor="middle" fill="#333" font-weight="bold">C</text>
