<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#0A0400"/>
    </linearGradient>
    <linearGradient id="chest05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <linearGradient id="glow05" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glowFilter05" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow05">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Deep dark background (velvet-like) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Ambient light from chest -->
  <ellipse cx="512" cy="600" rx="350" ry="250" fill="#D97706" opacity="0.1" filter="url(#glowFilter05)"/>

  <!-- Layer 2: Treasure chest (open) -->
  <!-- Chest body (lower) -->
  <rect x="180" y="540" width="664" height="320" rx="20" fill="url(#chest05)" stroke="#D97706" stroke-width="8"/>
  <!-- Chest bands / rivets -->
  <rect x="180" y="640" width="664" height="28" fill="#92400E" stroke="#D97706" stroke-width="3"/>
  <!-- Rivets -->
  <circle cx="230" cy="654" r="12" fill="#D97706"/>
  <circle cx="310" cy="654" r="12" fill="#D97706"/>
  <circle cx="510" cy="654" r="12" fill="#D97706"/>
  <circle cx="714" cy="654" r="12" fill="#D97706"/>
  <circle cx="794" cy="654" r="12" fill="#D97706"/>
  <!-- Center lock plate -->
  <rect x="462" y="536" width="100" height="80" rx="10" fill="#D97706"/>
  <circle cx="512" cy="566" r="18" fill="#92400E"/>
  <rect x="504" y="566" width="16" height="30" rx="4" fill="#92400E"/>

  <!-- Chest lid (open, hinged up) -->
  <path d="M180,540 L180,360 Q180,330 210,310 L814,310 Q844,330 844,360 L844,540 Z"
        fill="url(#chest05)" stroke="#D97706" stroke-width="8"/>
  <!-- Lid inner lining (velvet) -->
  <path d="M196,536 L196,368 Q196,348 218,336 L806,336 Q828,348 828,368 L828,536 Z"
        fill="#6B1A00" stroke="#92400E" stroke-width="3"/>

  <!-- Layer 3: Golden light / treasures emerging from chest -->
  <g filter="url(#glowFilter05)">
    <ellipse cx="512" cy="400" rx="180" ry="100" fill="url(#glow05)" opacity="0.85"/>
  </g>

  <!-- Floating sparkle prompts above chest -->
  <g filter="url(#softGlow05)">
    <!-- Floating text cards -->
    <rect x="330" y="230" width="180" height="60" rx="10" fill="#1C0A00" stroke="#F59E0B" stroke-width="3"/>
    <text x="420" y="268" font-family="'Consolas',monospace" font-size="28" fill="#FDE68A" text-anchor="middle">{{role}}</text>

    <rect x="530" y="170" width="200" height="60" rx="10" fill="#1C0A00" stroke="#F59E0B" stroke-width="3"/>
    <text x="630" y="208" font-family="'Consolas',monospace" font-size="28" fill="#FDE68A" text-anchor="middle">{{task}}</text>

    <!-- Stars floating out -->
    <circle cx="290" cy="220" r="10" fill="#FEF08A" opacity="0.9"/>
    <circle cx="720" cy="200" r="8" fill="#FEF08A" opacity="0.8"/>
    <circle cx="760" cy="250" r="6" fill="#F59E0B" opacity="0.7"/>
    <circle cx="260" cy="290" r="6" fill="#F59E0B" opacity="0.6"/>
    <circle cx="512" cy="150" r="7" fill="#FDE68A" opacity="0.7"/>
  </g>
</svg>
