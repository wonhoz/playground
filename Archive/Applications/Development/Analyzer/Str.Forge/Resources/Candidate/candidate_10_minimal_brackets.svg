<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#ECECEC"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#F4A261"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large bracket left -->
  <text x="92" y="320" font-family="'Segoe UI', monospace" font-size="200" fill="url(#dark)" opacity="0.9" font-weight="900">{</text>
  <!-- Large bracket right -->
  <text x="316" y="320" font-family="'Segoe UI', monospace" font-size="200" fill="url(#dark)" opacity="0.9" font-weight="900">}</text>
  <!-- Center content -->
  <text x="256" y="232" font-family="monospace" font-size="44" fill="url(#accent)" text-anchor="middle" font-weight="900">SF</text>
  <!-- Underline -->
  <rect x="196" y="244" width="120" height="5" rx="2.5" fill="url(#accent)"/>
  <!-- Small tag lines -->
  <text x="256" y="282" font-family="monospace" font-size="14" fill="#666" text-anchor="middle" letter-spacing="3">STRING FORGE</text>
  <!-- Small feature dots -->
  <circle cx="176" cy="360" r="5" fill="#E63946" opacity="0.7"/>
  <text x="188" y="364" font-family="monospace" font-size="11" fill="#444">regex</text>
  <circle cx="248" cy="360" r="5" fill="#F4A261" opacity="0.7"/>
  <text x="260" y="364" font-family="monospace" font-size="11" fill="#444">encode</text>
  <circle cx="330" cy="360" r="5" fill="#2A9D8F" opacity="0.7"/>
  <text x="342" y="364" font-family="monospace" font-size="11" fill="#444">hash</text>
  <!-- Shadow detail -->
  <rect x="92" y="384" width="328" height="2" rx="1" fill="#CCCCCC"/>
</svg>
