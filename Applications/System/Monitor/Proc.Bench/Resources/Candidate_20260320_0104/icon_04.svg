<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 레이싱트랙: oval race track with CPU in center -->
  <!-- Outer track -->
  <ellipse cx="512" cy="512" rx="340" ry="220" fill="none" stroke="#33691E" stroke-width="60"/>
  <!-- Inner track line (dashed) -->
  <ellipse cx="512" cy="512" rx="340" ry="220" fill="none" stroke="#AED581" stroke-width="4" stroke-dasharray="30 20"/>
  <!-- Start/finish line -->
  <rect x="502" y="252" width="20" height="80" fill="#AED581"/>
  <!-- Racing car position marker -->
  <ellipse cx="710" cy="380" rx="24" ry="16" fill="#AED581"/>
  <path d="M690 374 L730 374 L726 368 L694 368 Z" fill="#AED581"/>
  <!-- Speed trail -->
  <path d="M650 370 Q620 366 590 368" fill="none" stroke="#AED581" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M645 382 Q615 380 585 384" fill="none" stroke="#AED581" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- CPU chip center -->
  <rect x="452" y="452" width="120" height="120" rx="12" fill="#33691E"/>
  <rect x="466" y="466" width="92" height="92" rx="8" fill="#050A00"/>
  <line x1="490" y1="466" x2="490" y2="558" stroke="#AED581" stroke-width="3"/>
  <line x1="512" y1="466" x2="512" y2="558" stroke="#AED581" stroke-width="3"/>
  <line x1="534" y1="466" x2="534" y2="558" stroke="#AED581" stroke-width="3"/>
  <line x1="466" y1="490" x2="558" y2="490" stroke="#AED581" stroke-width="3"/>
  <line x1="466" y1="512" x2="558" y2="512" stroke="#AED581" stroke-width="3"/>
  <line x1="466" y1="534" x2="558" y2="534" stroke="#AED581" stroke-width="3"/>
</svg>