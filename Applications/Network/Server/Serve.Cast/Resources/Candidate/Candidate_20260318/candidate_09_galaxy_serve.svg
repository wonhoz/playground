<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 은하 나선 (서빙 경로들) -->
  <path d="M 256 256 C 290 230 340 240 360 256 C 385 275 375 315 350 325 C 315 338 275 320 265 290 C 250 250 280 215 320 210 C 370 203 410 245 405 295 C 398 355 345 390 285 388 C 210 385 155 330 155 260 C 155 180 215 120 290 115 C 375 109 435 175 430 260" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <!-- 중앙 서버 -->
  <circle cx="256" cy="256" r="28" fill="#3B82F6" opacity="0.15"/>
  <circle cx="256" cy="256" r="20" fill="#3B82F6" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#60A5FA" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="260" text-anchor="middle" fill="white" font-size="7" font-family="monospace">SRV</text>
  <!-- 클라이언트들 (은하 별들) -->
  <circle cx="360" cy="200" r="9" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="420" cy="295" r="8" fill="#60A5FA" opacity="0.7"/>
  <circle cx="350" cy="380" r="8" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="160" cy="370" r="8" fill="#60A5FA" opacity="0.7"/>
  <circle cx="105" cy="256" r="8" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="170" cy="140" r="8" fill="#60A5FA" opacity="0.7"/>
  <circle cx="310" cy="120" r="8" fill="#3B82F6" opacity="0.7"/>
  <!-- 전송 선들 (서빙) -->
  <line x1="256" y1="256" x2="360" y2="200" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="256" y1="256" x2="420" y2="295" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="256" y1="256" x2="105" y2="256" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="256" y1="256" x2="170" y2="140" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- 별 장식 -->
  <circle cx="130" cy="130" r="3" fill="#3B82F6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="400" r="4" fill="#60A5FA" opacity="0.5"/>
</svg>