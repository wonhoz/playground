<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor · 대각선/동적 · 브러시가 픽셀을 부드럽게 "칠하는" -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B5EAD7"/>
      <stop offset="1" stop-color="#74C0FC"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg04)"/>
  <!-- 픽셀 영역 (왼쪽 아래) -->
  <g transform="translate(120 540)">
    <rect x="0" y="0" width="70" height="70" fill="#FF6B9D"/>
    <rect x="70" y="0" width="70" height="70" fill="#FFB366"/>
    <rect x="140" y="0" width="70" height="70" fill="#FFD93D"/>
    <rect x="210" y="0" width="70" height="70" fill="#FF6B9D"/>
    <rect x="0" y="70" width="70" height="70" fill="#9B59B6"/>
    <rect x="70" y="70" width="70" height="70" fill="#FF6B9D"/>
    <rect x="140" y="70" width="70" height="70" fill="#FFB366"/>
    <rect x="210" y="70" width="70" height="70" fill="#FFD93D"/>
    <rect x="0" y="140" width="70" height="70" fill="#3A86FF"/>
    <rect x="70" y="140" width="70" height="70" fill="#9B59B6"/>
    <rect x="140" y="140" width="70" height="70" fill="#FF6B9D"/>
    <rect x="210" y="140" width="70" height="70" fill="#FFB366"/>
    <rect x="0" y="210" width="70" height="70" fill="#06D6A0"/>
    <rect x="70" y="210" width="70" height="70" fill="#3A86FF"/>
    <rect x="140" y="210" width="70" height="70" fill="#9B59B6"/>
    <rect x="210" y="210" width="70" height="70" fill="#FF6B9D"/>
  </g>
  <!-- 스무스 영역 (오른쪽 위) -->
  <path d="M 560 160 Q 720 180 800 360 Q 880 520 760 660 L 440 660 Q 320 520 400 360 Q 480 200 560 160 Z" fill="#FFE5B4"/>
  <ellipse cx="620" cy="360" rx="140" ry="80" fill="#FFD93D"/>
  <ellipse cx="720" cy="480" rx="100" ry="60" fill="#FF6B9D"/>
  <!-- 브러시 (대각선 동적) -->
  <g transform="rotate(-30 512 512)">
    <!-- 손잡이 -->
    <rect x="540" y="480" width="350" height="60" rx="24" fill="#8B4513" stroke="#4A2609" stroke-width="12"/>
    <!-- 메탈 밴드 -->
    <rect x="470" y="470" width="80" height="80" rx="10" fill="#C0C0C0" stroke="#707070" stroke-width="10"/>
    <!-- 브러시 털 -->
    <path d="M 310 460 Q 260 460 240 520 Q 260 580 310 580 L 480 580 L 480 460 Z" fill="#FFFFFF" stroke="#707070" stroke-width="12"/>
    <!-- 페인트 끝 -->
    <path d="M 180 500 Q 220 460 260 510 Q 240 560 180 540 Z" fill="#FFD93D" stroke="#C49B00" stroke-width="8"/>
  </g>
  <!-- 스파클 -->
  <g fill="#FFFFFF">
    <circle cx="680" cy="240" r="14"/>
    <circle cx="820" cy="320" r="10"/>
    <circle cx="560" cy="280" r="8"/>
  </g>
</svg>
