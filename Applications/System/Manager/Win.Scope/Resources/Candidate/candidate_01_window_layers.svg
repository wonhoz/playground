<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="win3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949ab;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="win2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c6bc0;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="win1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7986cb;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#5c6bc0;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bottom window (layer 3) -->
  <rect x="160" y="220" width="250" height="200" rx="12" fill="url(#win3)" stroke="#3f51b5" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="160" y="220" width="250" height="28" rx="12" fill="#3949ab"/>
  <rect x="160" y="234" width="250" height="14" fill="#3949ab"/>
  <!-- Window dots -->
  <circle cx="178" cy="234" r="6" fill="#ef5350"/>
  <circle cx="196" cy="234" r="6" fill="#ffa726"/>
  <circle cx="214" cy="234" r="6" fill="#66bb6a"/>
  <!-- Middle window (layer 2) -->
  <rect x="125" y="180" width="250" height="200" rx="12" fill="url(#win2)" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="125" y="180" width="250" height="28" rx="12" fill="#5c6bc0"/>
  <rect x="125" y="194" width="250" height="14" fill="#5c6bc0"/>
  <circle cx="143" cy="194" r="6" fill="#ef5350"/>
  <circle cx="161" cy="194" r="6" fill="#ffa726"/>
  <circle cx="179" cy="194" r="6" fill="#66bb6a"/>
  <!-- Top window (layer 1) -->
  <rect x="90" y="140" width="250" height="200" rx="12" fill="url(#win1)" stroke="#7986cb" stroke-width="2" filter="url(#glow)"/>
  <rect x="90" y="140" width="250" height="28" rx="12" fill="#7986cb"/>
  <rect x="90" y="154" width="250" height="14" fill="#7986cb"/>
  <circle cx="108" cy="154" r="6" fill="#ef5350"/>
  <circle cx="126" cy="154" r="6" fill="#ffa726"/>
  <circle cx="144" cy="154" r="6" fill="#66bb6a"/>
  <!-- Layer indicator labels -->
  <line x1="355" y1="256" x2="420" y2="200" stroke="#9fa8da" stroke-width="2" opacity="0.7" stroke-dasharray="6,3"/>
  <circle cx="420" cy="200" r="6" fill="#9fa8da" opacity="0.8"/>
  <line x1="390" y1="296" x2="440" y2="280" stroke="#7986cb" stroke-width="2" opacity="0.6" stroke-dasharray="5,3"/>
  <circle cx="440" cy="280" r="5" fill="#7986cb" opacity="0.7"/>
</svg>