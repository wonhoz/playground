<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 산호+빨강 그라데이션 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4757"/>
      <stop offset="100%" style="stop-color:#FF8C94"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 두 개의 큰 슬래시 기호 대비 -->
  <!-- 백슬래시 \ (왼쪽, 흰색) -->
  <text x="120" y="650" font-family="Consolas, monospace" font-size="560" font-weight="bold" fill="white" opacity="0.95">\</text>
  <!-- 슬래시 / (오른쪽, 노란색) -->
  <text x="450" y="650" font-family="Consolas, monospace" font-size="560" font-weight="bold" fill="#FFE66D">/</text>
  <!-- Layer 3: 가운데 변환 화살표 -->
  <rect x="430" y="460" width="160" height="100" rx="50" fill="#CC0020"/>
  <!-- 양방향 화살표 -->
  <path d="M 450 510 L 520 510 M 520 510 L 500 490 M 520 510 L 500 530" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 570 510 L 500 510 M 500 510 L 520 490 M 500 510 L 520 530" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 상단 레이블 -->
  <text x="512" y="220" font-family="Segoe UI, sans-serif" font-size="88" font-weight="bold" fill="white" text-anchor="middle">PATH</text>
  <!-- 하단 레이블 -->
  <text x="512" y="860" font-family="Segoe UI, sans-serif" font-size="66" fill="white" text-anchor="middle" opacity="0.85">FORMAT</text>
</svg>
