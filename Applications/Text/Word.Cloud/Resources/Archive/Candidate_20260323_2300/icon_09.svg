<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <clipPath id="clip09"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg09)"/>
  <g clip-path="url(#clip09)">
    <!-- 무지개색 단어들 흩뿌려짐 -->
    <!-- 가장 큰 단어 -->
    <text x="512" y="410" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#F472B6" transform="rotate(-4,512,410)">WORD</text>
    <!-- 큰 단어들 -->
    <text x="270" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="75" fill="#FBBF24" transform="rotate(6,270,530)">cloud</text>
    <text x="760" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="70" fill="#34D399" transform="rotate(-7,760,510)">DATA</text>
    <!-- 중간 단어들 -->
    <text x="200" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="50" fill="#60A5FA" transform="rotate(-10,200,630)">LOVE</text>
    <text x="480" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="46" fill="#FDE68A" transform="rotate(5,480,620)">text</text>
    <text x="730" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#A78BFA" transform="rotate(-5,730,625)">life</text>
    <!-- 작은 단어들 -->
    <text x="310" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#F472B6" transform="rotate(8,310,705)">font</text>
    <text x="490" y="712" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#34D399" transform="rotate(-6,490,712)">art</text>
    <text x="660" y="706" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#FBBF24" transform="rotate(9,660,706)">big</text>
    <text x="810" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#60A5FA" transform="rotate(-8,810,700)">size</text>
    <!-- 최소 단어들 -->
    <text x="250" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#A78BFA" transform="rotate(5,250,780)">color</text>
    <text x="430" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#F472B6" transform="rotate(-4,430,785)">view</text>
    <text x="600" y="778" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#34D399" transform="rotate(7,600,778)">map</text>
    <text x="760" y="784" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FDE68A" transform="rotate(-5,760,784)">play</text>
