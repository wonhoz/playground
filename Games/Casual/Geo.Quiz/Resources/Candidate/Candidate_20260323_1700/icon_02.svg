<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1A2A"/>
  <!-- Layer 2: 국기 3개 + 퀴즈 -->
  <!-- 국기 1 (한국 스타일) -->
  <rect x="80" y="160" width="280" height="180" rx="12" fill="#EF4444"/>
  <rect x="80" y="160" width="280" height="60" rx="12" fill="#EF4444"/>
  <circle cx="220" cy="250" r="50" fill="none" stroke="white" stroke-width="12"/>
  <!-- 국기 2 (독일 스타일) -->
  <rect x="380" y="160" width="280" height="60" rx="8" fill="#1C1C1C"/>
  <rect x="380" y="220" width="280" height="60" fill="#CC0000"/>
  <rect x="380" y="280" width="280" height="60" rx="8" fill="#FFCE00"/>
  <!-- 국기 3 (프랑스 스타일) -->
  <rect x="680" y="160" width="94" height="180" rx="8" fill="#003189"/>
  <rect x="774" y="160" width="93" height="180" fill="white"/>
  <rect x="867" y="160" width="93" height="180" rx="8" fill="#EF4444"/>
  <!-- 물음표 패널 -->
  <rect x="80" y="380" width="860" height="280" rx="24" fill="#1E3A8A"/>
  <rect x="80" y="380" width="860" height="280" rx="24" fill="none" stroke="#3B82F6" stroke-width="10"/>
  <text x="512" y="560" font-size="200" fill="#FBBF24" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="Arial Black">?</text>
  <!-- Layer 3: 4지선다 선택지 표시 -->
  <rect x="80" y="700" width="400" height="70" rx="16" fill="#1D4ED8"/>
  <text x="280" y="746" font-size="36" fill="white" text-anchor="middle">① 대한민국</text>
  <rect x="500" y="700" width="440" height="70" rx="16" fill="#1D4ED8"/>
  <text x="720" y="746" font-size="36" fill="white" text-anchor="middle">② 일본</text>
  <rect x="80" y="790" width="400" height="70" rx="16" fill="#166534"/>
  <text x="280" y="836" font-size="36" fill="#4ADE80" text-anchor="middle">③ 태국 ✓</text>
  <rect x="500" y="790" width="440" height="70" rx="16" fill="#1D4ED8"/>
  <text x="720" y="836" font-size="36" fill="white" text-anchor="middle">④ 중국</text>
</svg>
