<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <radialGradient id="glow10" cx="38%" cy="52%" r="50%">
      <stop offset="0%" stop-color="#FF5252" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B71C1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <rect width="1024" height="1024" rx="190" fill="url(#glow10)"/>

  <!-- Layer 2: 게임패드 (왼쪽) -->
  <!-- 어깨 버튼 -->
  <rect x="72" y="356" width="110" height="32" rx="10" fill="#7F0000" stroke="#FF8A80" stroke-width="2"/>
  <rect x="272" y="356" width="110" height="32" rx="10" fill="#7F0000" stroke="#FF8A80" stroke-width="2"/>

  <!-- 패드 몸체 -->
  <rect x="68" y="380" width="356" height="180" rx="62" fill="#7F0000"/>
  <rect x="68" y="380" width="356" height="180" rx="62" fill="none" stroke="#FF8A80" stroke-width="3"/>
  <!-- 왼쪽 그립 -->
  <rect x="80" y="516" width="114" height="120" rx="42" fill="#7F0000" stroke="#FF8A80" stroke-width="3"/>
  <!-- 오른쪽 그립 -->
  <rect x="298" y="516" width="114" height="120" rx="42" fill="#7F0000" stroke="#FF8A80" stroke-width="3"/>

  <!-- ABXY 버튼 -->
  <circle cx="362" cy="445" r="18" fill="#FF5252"/>
  <circle cx="392" cy="418" r="18" fill="#FF8A65"/>
  <circle cx="332" cy="418" r="18" fill="#FF80AB"/>
  <circle cx="362" cy="390" r="18" fill="#FFD740"/>
  <text x="362" y="445" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="14" font-family="Arial" font-weight="bold">A</text>
  <text x="392" y="418" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="14" font-family="Arial" font-weight="bold">B</text>
  <text x="332" y="418" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="14" font-family="Arial" font-weight="bold">X</text>
  <text x="362" y="390" text-anchor="middle" dominant-baseline="middle" fill="#333" font-size="14" font-family="Arial" font-weight="bold">Y</text>

  <!-- D-pad -->
  <rect x="116" y="434" width="48" height="16" rx="4" fill="#FF8A80"/>
  <rect x="132" y="418" width="16" height="48" rx="4" fill="#FF8A80"/>

  <!-- 스틱 -->
  <circle cx="186" cy="468" r="28" fill="#5F0000"/>
  <circle cx="186" cy="468" r="17" fill="#FF5252" opacity="0.5"/>

  <!-- Layer 3: 번개 변환 심볼 (중앙) -->
  <!-- 번개 배경 광원 -->
  <ellipse cx="532" cy="490" rx="60" ry="80" fill="#FFD740" opacity="0.15"/>
  <!-- 번개 모양 -->
  <polygon points="558,318 524,492 562,468 528,672 590,466 546,494" fill="#FFD740"/>
  <polygon points="558,318 524,492 562,468 528,672 590,466 546,494" fill="none" stroke="#FF8F00" stroke-width="3"/>

  <!-- 오른쪽 출력 아이콘들 (박스) -->
  <!-- 키보드 -->
  <rect x="634" y="204" width="110" height="78" rx="14" fill="#4A0000" stroke="#FF8A80" stroke-width="2.5"/>
  <rect x="646" y="216" width="86" height="26" rx="5" fill="#6A0000"/>
  <rect x="646" y="248" width="86" height="14" rx="4" fill="#6A0000"/>
  <text x="689" y="230" text-anchor="middle" dominant-baseline="middle" fill="#FF8A80" font-size="13" font-family="Arial" font-weight="bold">kbd</text>

  <!-- 마우스 -->
  <rect x="634" y="318" width="110" height="78" rx="14" fill="#4A0000" stroke="#FF8A80" stroke-width="2.5"/>
  <ellipse cx="689" cy="357" rx="26" ry="32" fill="none" stroke="#FF8A80" stroke-width="3"/>
  <line x1="689" y1="325" x2="689" y2="345" stroke="#FF8A80" stroke-width="3"/>
  <line x1="663" y1="350" x2="715" y2="350" stroke="#FF8A80" stroke-width="2"/>

  <!-- 가상 버튼 (컨트롤러) -->
  <rect x="634" y="432" width="110" height="78" rx="14" fill="#4A0000" stroke="#FF8A80" stroke-width="2.5"/>
  <rect x="652" y="452" width="74" height="40" rx="12" fill="#6A0000"/>
  <circle cx="676" cy="462" r="7" fill="#FF8A80" opacity="0.8"/>
  <circle cx="694" cy="474" r="7" fill="#FF8A80" opacity="0.8"/>
  <circle cx="712" cy="462" r="7" fill="#FF8A80" opacity="0.8"/>

  <!-- 앱 실행 -->
  <rect x="634" y="546" width="110" height="78" rx="14" fill="#4A0000" stroke="#FF8A80" stroke-width="2.5"/>
  <polygon points="672,566 720,585 672,604" fill="#FF8A80"/>

  <!-- 매크로 -->
  <rect x="634" y="660" width="110" height="78" rx="14" fill="#4A0000" stroke="#FF8A80" stroke-width="2.5"/>
  <text x="689" y="699" text-anchor="middle" dominant-baseline="middle" fill="#FF8A80" font-size="18" font-family="Arial" font-weight="bold">REC</text>
  <circle cx="689" cy="680" r="6" fill="#FF5252"/>

  <!-- 번개→출력 연결 점선 -->
  <line x1="578" y1="388" x2="626" y2="243" stroke="#FFD740" stroke-width="3" stroke-dasharray="8,5" opacity="0.65"/>
  <line x1="578" y1="428" x2="626" y2="357" stroke="#FFD740" stroke-width="3" stroke-dasharray="8,5" opacity="0.65"/>
  <line x1="578" y1="470" x2="626" y2="471" stroke="#FFD740" stroke-width="3" stroke-dasharray="8,5" opacity="0.65"/>
  <line x1="578" y1="514" x2="626" y2="585" stroke="#FFD740" stroke-width="3" stroke-dasharray="8,5" opacity="0.65"/>
  <line x1="566" y1="556" x2="626" y2="699" stroke="#FFD740" stroke-width="3" stroke-dasharray="8,5" opacity="0.65"/>
</svg>
