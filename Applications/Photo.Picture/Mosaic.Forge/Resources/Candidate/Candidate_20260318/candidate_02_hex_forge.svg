  <rect x="90" y="375" width="332" height="70" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="404" text-anchor="middle" font-size="15" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">HEX MOSAIC FORGE</text>
  <text x="256" y="425" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">벌집 헥사곤 모자이크</text>
