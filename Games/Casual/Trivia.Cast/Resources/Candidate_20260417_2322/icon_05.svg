<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 카테고리 카드 스택 (레이어드) -->
  <!-- 뒤 카드들 -->
  <rect x="200" y="280" width="620" height="380" rx="24" fill="#B2EBF2" opacity="0.5" transform="rotate(-6 512 470)"/>
  <rect x="200" y="280" width="620" height="380" rx="24" fill="#80DEEA" opacity="0.7" transform="rotate(-3 512 470)"/>
  <!-- 앞 카드 (메인) -->
  <rect x="180" y="270" width="660" height="400" rx="24" fill="white"/>
  <!-- 카드 헤더 -->
  <rect x="180" y="270" width="660" height="88" rx="24" fill="#00838F"/>
  <rect x="180" y="314" width="660" height="44" fill="#00838F"/>
  <text x="512" y="326" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">CATEGORY</text>
  <!-- 카테고리 아이콘들 3×2 -->
  <text x="290" y="440" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">🔬</text>
  <text x="512" y="440" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">🎬</text>
  <text x="734" y="440" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">⚽</text>
  <text x="290" y="550" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">🎵</text>
  <text x="512" y="550" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">🍜</text>
  <text x="734" y="550" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">🌍</text>
  <!-- Layer 3: 선택 하이라이트 -->
  <rect x="452" y="476" width="120" height="90" rx="14" fill="none" stroke="#FDD835" stroke-width="8"/>
  <!-- 점수 배지 -->
  <rect x="320" y="740" width="384" height="76" rx="20" fill="#00838F"/>
  <text x="512" y="792" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#FDD835" text-anchor="middle">10 Qs</text>
</svg>
