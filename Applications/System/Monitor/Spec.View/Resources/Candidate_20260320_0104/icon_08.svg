<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- X선투시: X-ray of computer showing internals -->
  <!-- Computer outline -->
  <rect x="220" y="280" width="584" height="440" rx="20" fill="none" stroke="#2E7D32" stroke-width="12"/>
  <!-- X-ray glow effect -->
  <rect x="220" y="280" width="584" height="440" rx="20" fill="#81C784" opacity="0.03"/>
  <!-- Internal motherboard layout -->
  <!-- CPU -->
  <rect x="360" y="360" width="140" height="140" rx="12" fill="none" stroke="#81C784" stroke-width="8"/>
  <line x1="390" y1="360" x2="390" y2="500" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <line x1="430" y1="360" x2="430" y2="500" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <line x1="470" y1="360" x2="470" y2="500" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <line x1="360" y1="394" x2="500" y2="394" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <line x1="360" y1="430" x2="500" y2="430" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <line x1="360" y1="466" x2="500" y2="466" stroke="#81C784" stroke-width="4" opacity="0.6"/>
  <!-- RAM sticks -->
  <rect x="540" y="360" width="30" height="140" rx="4" fill="none" stroke="#81C784" stroke-width="6"/>
  <rect x="580" y="360" width="30" height="140" rx="4" fill="none" stroke="#81C784" stroke-width="6"/>
  <rect x="620" y="360" width="30" height="140" rx="4" fill="none" stroke="#81C784" stroke-width="6"/>
  <!-- HDD -->
  <rect x="560" y="540" width="180" height="100" rx="10" fill="none" stroke="#2E7D32" stroke-width="6"/>
  <circle cx="650" cy="590" r="34" fill="none" stroke="#2E7D32" stroke-width="5"/>
  <!-- Circuit traces -->
  <path d="M500 430 H540" fill="none" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <path d="M500 394 H560 V360" fill="none" stroke="#81C784" stroke-width="3" opacity="0.4"/>
  <!-- Power unit -->
  <rect x="270" y="540" width="200" height="140" rx="10" fill="none" stroke="#2E7D32" stroke-width="6"/>
  <!-- Fan in power unit -->
  <circle cx="370" cy="610" r="50" fill="none" stroke="#2E7D32" stroke-width="4"/>
  <line x1="320" y1="610" x2="420" y2="610" stroke="#2E7D32" stroke-width="3"/>
  <line x1="370" y1="560" x2="370" y2="660" stroke="#2E7D32" stroke-width="3"/>
  <!-- X-ray cross markers -->
  <line x1="220" y1="280" x2="804" y2="720" stroke="#81C784" stroke-width="2" opacity="0.06"/>
  <line x1="804" y1="280" x2="220" y2="720" stroke="#81C784" stroke-width="2" opacity="0.06"/>
</svg>