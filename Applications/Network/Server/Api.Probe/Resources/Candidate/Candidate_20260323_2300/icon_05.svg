<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <clipPath id="clip05"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <g clip-path="url(#clip05)">
    <!-- Layer 2: JSON 창 틀 -->
    <rect x="200" y="220" width="624" height="480" rx="28" fill="#78350F" stroke="#FDE68A" stroke-width="8"/>
    <!-- 창 상단 바 -->
    <rect x="200" y="220" width="624" height="64" rx="28" fill="#92400E"/>
    <rect x="200" y="252" width="624" height="32" fill="#92400E"/>
    <!-- 창 닫기 버튼들 -->
    <circle cx="258" cy="252" r="16" fill="#EF4444"/>
    <circle cx="308" cy="252" r="16" fill="#FBBF24"/>
    <circle cx="358" cy="252" r="16" fill="#4ADE80"/>
    <!-- JSON 텍스트 라인들 -->
    <text x="240" y="336" font-family="'Courier New', monospace" font-size="38" fill="#FDE68A">{</text>
    <text x="270" y="390" font-family="'Courier New', monospace" font-size="34" fill="#A7F3D0">"method":</text>
    <text x="530" y="390" font-family="'Courier New', monospace" font-size="34" fill="#FCA5A5">"GET",</text>
    <text x="270" y="438" font-family="'Courier New', monospace" font-size="34" fill="#A7F3D0">"status":</text>
    <text x="534" y="438" font-family="'Courier New', monospace" font-size="34" fill="#FDE68A">200,</text>
    <text x="270" y="486" font-family="'Courier New', monospace" font-size="34" fill="#A7F3D0">"time":</text>
    <text x="476" y="486" font-family="'Courier New', monospace" font-size="34" fill="#86EFAC">"42ms"</text>
    <text x="240" y="534" font-family="'Courier New', monospace" font-size="38" fill="#FDE68A">}</text>
    <!-- Layer 3: 오른쪽 데이터 줄기 -->
    <line x1="824" y1="300" x2="824" y2="680" stroke="#FDE68A" stroke-width="12" stroke-linecap="round" stroke-dasharray="24 12"/>
    <circle cx="824" cy="300" r="22" fill="#FDE68A"/>
    <circle cx="824" cy="420" r="16" fill="#A7F3D0"/>
    <circle cx="824" cy="540" r="16" fill="#A7F3D0"/>
    <circle cx="824" cy="660" r="22" fill="#FDE68A"/>
    <line x1="824" y1="360" x2="872" y2="360" stroke="#A7F3D0" stroke-width="10" stroke-linecap="round"/>
    <line x1="824" y1="480" x2="872" y2="480" stroke="#A7F3D0" stroke-width="10" stroke-linecap="round"/>
    <line x1="824" y1="600" x2="872" y2="600" stroke="#A7F3D0" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
