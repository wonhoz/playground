<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#039BE5"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="6" dy="8" stdDeviation="8" flood-color="#00000055"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 동적 타일 (DOG 가로 / DIM 세로, 교차점 D=(0,0)) -->
  <!-- 어두운 셀 (배경) -->
  <rect x="412" y="412" width="196" height="196" fill="#01579B" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#01579B" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#01579B" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#01579B" rx="10"/>
  <!-- 각 타일을 약간 다른 각도로 회전 (동적 느낌) -->
  <!-- D (0,0) - 교차점, 노란 강조 -->
  <g transform="rotate(-6 312 312)">
    <rect x="212" y="212" width="196" height="196" fill="#FFF176" stroke="white" stroke-width="9" rx="12" filter="url(#sh)"/>
    <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E65100">D</text>
  </g>
  <!-- O (0,1) -->
  <g transform="rotate(5 512 312)">
    <rect x="412" y="212" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="12" filter="url(#sh)"/>
    <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#0277BD">O</text>
  </g>
  <!-- G (0,2) -->
  <g transform="rotate(-4 712 312)">
    <rect x="612" y="212" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="12" filter="url(#sh)"/>
    <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#0277BD">G</text>
  </g>
  <!-- I (1,0) -->
  <g transform="rotate(7 312 512)">
    <rect x="212" y="412" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="12" filter="url(#sh)"/>
    <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#0277BD">I</text>
  </g>
  <!-- M (2,0) -->
  <g transform="rotate(-5 312 712)">
    <rect x="212" y="612" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="12" filter="url(#sh)"/>
    <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#0277BD">M</text>
  </g>
</svg>
