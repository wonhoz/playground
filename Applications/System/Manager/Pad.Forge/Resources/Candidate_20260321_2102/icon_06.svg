<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: 팬처럼 펼쳐진 프로파일 카드들 -->

  <!-- 카드 3 (뒤, 가장 왼쪽 기울어짐) -->
  <g transform="rotate(-22, 512, 580)">
    <rect x="302" y="390" width="420" height="288" rx="22" fill="#4A148C" opacity="0.82" stroke="#CE93D8" stroke-width="2"/>
    <rect x="320" y="408" width="384" height="44" rx="10" fill="#6A1B9A" opacity="0.8"/>
    <text x="512" y="430" text-anchor="middle" dominant-baseline="middle" fill="#CE93D8" font-size="22" font-family="Arial">Profile 3</text>
    <text x="512" y="548" text-anchor="middle" dominant-baseline="middle" fill="#CE93D8" font-size="18" font-family="Arial" opacity="0.6">FPS Setup</text>
  </g>

  <!-- 카드 2 (중간 기울어짐) -->
  <g transform="rotate(-10, 512, 580)">
    <rect x="302" y="390" width="420" height="288" rx="22" fill="#880E4F" opacity="0.90" stroke="#F48FB1" stroke-width="2"/>
    <rect x="320" y="408" width="384" height="44" rx="10" fill="#AD1457" opacity="0.85"/>
    <text x="512" y="430" text-anchor="middle" dominant-baseline="middle" fill="#FCE4EC" font-size="22" font-family="Arial">Profile 2</text>
    <!-- 미니 패드 심볼 -->
    <ellipse cx="512" cy="548" rx="88" ry="52" fill="#AD1457" opacity="0.7"/>
    <circle cx="462" cy="542" r="12" fill="#F8BBD0" opacity="0.8"/>
    <circle cx="564" cy="548" r="12" fill="#F8BBD0" opacity="0.8"/>
    <text x="512" y="594" text-anchor="middle" dominant-baseline="middle" fill="#F8BBD0" font-size="16" font-family="Arial" opacity="0.7">RPG Setup</text>
  </g>

  <!-- 카드 1 (메인 카드, 중앙 세워짐) -->
  <rect x="302" y="372" width="420" height="306" rx="22" fill="#E91E63" stroke="#FF80AB" stroke-width="3"/>

  <!-- 카드 헤더 -->
  <rect x="302" y="372" width="420" height="58" rx="22" fill="#C2185B"/>
  <rect x="302" y="408" width="420" height="22" fill="#C2185B"/>
  <text x="512" y="401" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="24" font-family="Arial" font-weight="bold">Profile 1</text>

  <!-- 카드 내 게임패드 미니 아이콘 -->
  <!-- 패드 몸체 -->
  <rect x="376" y="452" width="272" height="118" rx="38" fill="white" opacity="0.22"/>
  <rect x="388" y="528" width="100" height="68" rx="30" fill="white" opacity="0.18"/>
  <rect x="536" y="528" width="100" height="68" rx="30" fill="white" opacity="0.18"/>
  <!-- ABXY 미니 버튼 -->
  <circle cx="628" cy="490" r="13" fill="#81C784"/>
  <circle cx="652" cy="468" r="13" fill="#EF9A9A"/>
  <circle cx="604" cy="468" r="13" fill="#90CAF9"/>
  <circle cx="628" cy="446" r="13" fill="#FFE082"/>
  <text x="628" y="490" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">A</text>
  <text x="652" y="468" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">B</text>
  <text x="604" y="468" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">X</text>
  <text x="628" y="446" text-anchor="middle" dominant-baseline="middle" fill="#555" font-size="11" font-family="Arial" font-weight="bold">Y</text>
  <!-- D-pad 미니 -->
  <rect x="402" y="484" width="36" height="12" rx="3" fill="white" opacity="0.7"/>
  <rect x="414" y="472" width="12" height="36" rx="3" fill="white" opacity="0.7"/>

  <!-- 카드 하단 텍스트 -->
  <text x="512" y="628" text-anchor="middle" fill="white" font-size="20" font-family="Arial" opacity="0.9">5 Mappings Active</text>

  <!-- Layer 3: 새 프로파일 + 버튼 -->
  <circle cx="788" cy="706" r="56" fill="#F50057"/>
  <text x="788" y="706" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="52" font-family="Arial" font-weight="bold">+</text>

  <!-- 카드 개수 뱃지 -->
  <circle cx="720" cy="356" r="30" fill="#FF4081"/>
  <text x="720" y="356" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="24" font-family="Arial" font-weight="bold">3</text>
</svg>
