<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <linearGradient id="vinyl5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#311B92"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 라벤더 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg5)"/>

  <!-- Layer 2: 바이닐 레코드 (기하학 추상) -->
  <circle cx="512" cy="480" r="330" fill="url(#vinyl5)" stroke="#7E57C2" stroke-width="6"/>
  <!-- 레코드 홈 -->
  <circle cx="512" cy="480" r="290" fill="none" stroke="#512DA8" stroke-width="3" opacity="0.5"/>
  <circle cx="512" cy="480" r="250" fill="none" stroke="#512DA8" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="480" r="210" fill="none" stroke="#512DA8" stroke-width="2" opacity="0.3"/>
  <circle cx="512" cy="480" r="170" fill="none" stroke="#512DA8" stroke-width="2" opacity="0.3"/>
  <circle cx="512" cy="480" r="130" fill="none" stroke="#512DA8" stroke-width="2" opacity="0.4"/>
  <!-- 레코드 라벨 (중앙 원) -->
  <circle cx="512" cy="480" r="90" fill="#7E57C2"/>
  <circle cx="512" cy="480" r="14" fill="#311B92"/>

  <!-- Layer 3: 태그 라벨 텍스트 (레코드 위) -->
  <text x="512" y="434" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#EDE7F6" text-anchor="middle" dominant-baseline="middle">TITLE</text>
  <text x="512" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#CE93D8" text-anchor="middle" dominant-baseline="middle">ARTIST</text>
  <text x="512" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#B39DDB" text-anchor="middle" dominant-baseline="middle">ALBUM</text>

  <!-- 편집 펜 아이콘 (오른쪽 상단) -->
  <circle cx="800" cy="240" r="90" fill="#673AB7" stroke="white" stroke-width="8"/>
  <text x="800" y="240" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="78" text-anchor="middle" dominant-baseline="middle">✏</text>

  <!-- 하단 파일 형식 배지들 -->
  <rect x="180" y="860" width="140" height="52" rx="14" fill="#7E57C2"/>
  <text x="250" y="888" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">MP3</text>
  <rect x="336" y="860" width="140" height="52" rx="14" fill="#5E35B1"/>
  <text x="406" y="888" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">FLAC</text>
  <rect x="492" y="860" width="140" height="52" rx="14" fill="#4527A0"/>
  <text x="562" y="888" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">OGG</text>
  <rect x="648" y="860" width="140" height="52" rx="14" fill="#311B92"/>
  <text x="718" y="888" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">M4A</text>
</svg>
