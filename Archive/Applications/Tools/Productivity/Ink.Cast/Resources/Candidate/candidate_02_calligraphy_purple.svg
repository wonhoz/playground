  <ellipse cx="76" cy="404" rx="10" ry="16" fill="#CE93D8" transform="rotate(45 76 404)"/>
  <!-- 물결 아래 라인 -->
  <path d="M 80 420 Q 130 400 180 420 Q 230 440 280 420 Q 330 400 380 420 Q 430 440 460 420" fill="none" stroke="#CE93D8" stroke-width="4" opacity="0.5"/>
  <text x="256" y="470" font-size="20" text-anchor="middle" fill="#CE93D8" font-family="Segoe UI">Digital Ink</text>
</svg>