<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0500"/>
      <stop offset="100%" style="stop-color:#1A1000"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD080"/>
      <stop offset="100%" style="stop-color:#BB8800"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4956A"/>
      <stop offset="100%" style="stop-color:#A06040"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Simple hand (fist) pouring sand -->
  <!-- Palm -->
  <ellipse cx="300" cy="160" rx="60" ry="50" fill="url(#hand)"/>
  <!-- Fingers -->
  <rect x="260" y="100" width="22" height="60" rx="11" fill="url(#hand)"/>
  <rect x="288" y="90" width="22" height="70" rx="11" fill="url(#hand)"/>
  <rect x="316" y="95" width="22" height="65" rx="11" fill="url(#hand)"/>
  <rect x="344" y="105" width="22" height="55" rx="11" fill="url(#hand)"/>
  <!-- Thumb -->
  <ellipse cx="252" cy="165" rx="20" ry="30" fill="url(#hand)" transform="rotate(-30 252 165)"/>
  <!-- Sand pouring from between fingers -->
  <path d="M285 148 C280 180 275 220 268 260 C262 300 258 340 254 380" fill="none" stroke="url(#sand)" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- Sand particles dispersing -->
  <circle cx="278" cy="200" r="5" fill="#FFD080" opacity="0.8"/>
  <circle cx="270" cy="240" r="4" fill="#FFBB55" opacity="0.7"/>
  <circle cx="260" cy="290" r="5" fill="#FFAA33" opacity="0.8"/>
  <circle cx="290" cy="270" r="3" fill="#FFD080" opacity="0.6"/>
  <circle cx="240" cy="330" r="4" fill="#FFBB55" opacity="0.7"/>
  <!-- Ground pile -->
  <ellipse cx="256" cy="412" rx="120" ry="30" fill="url(#sand)" opacity="0.8"/>
  <ellipse cx="256" cy="406" rx="80" ry="18" fill="#FFE088" opacity="0.7"/>
</svg>
