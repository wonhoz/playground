<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: 저울 용량 (scale: compare sizes) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 저울 기둥 -->
  <rect x="488" y="300" width="48" height="460" rx="12" fill="#2E7D32"/>
  <!-- 저울 베이스 -->
  <rect x="310" y="740" width="404" height="40" rx="20" fill="#2E7D32"/>
  <!-- 저울 횡대 (약간 기울어짐 - 왼쪽 무거움) -->
  <line x1="180" y1="380" x2="844" y2="340" stroke="#81C784" stroke-width="16" stroke-linecap="round"/>
  <!-- 저울 중심점 -->
  <circle cx="512" cy="360" r="22" fill="#81C784"/>
  <!-- 왼쪽 접시 줄 -->
  <line x1="240" y1="380" x2="220" y2="500" stroke="#81C784" stroke-width="8"/>
  <line x1="300" y1="380" x2="320" y2="500" stroke="#81C784" stroke-width="8"/>
  <!-- 오른쪽 접시 줄 -->
  <line x1="724" y1="340" x2="704" y2="460" stroke="#81C784" stroke-width="8"/>
  <line x1="784" y1="340" x2="804" y2="460" stroke="#81C784" stroke-width="8"/>
  <!-- 왼쪽 접시 (무거움) -->
  <ellipse cx="270" cy="510" rx="90" ry="20" fill="#81C784" opacity="0.8"/>
  <path d="M180 510 Q270 550 360 510" fill="#2E7D32" opacity="0.6"/>
  <!-- 오른쪽 접시 (가벼움) -->
  <ellipse cx="754" cy="470" rx="90" ry="20" fill="#81C784" opacity="0.8"/>
  <path d="M664 470 Q754 510 844 470" fill="#2E7D32" opacity="0.6"/>
  <!-- 왼쪽 폴더 아이콘 -->
  <rect x="220" y="440" width="100" height="70" rx="8" fill="#2E7D32" opacity="0.8"/>
  <rect x="220" y="420" width="50" height="25" rx="6" fill="#2E7D32" opacity="0.8"/>
  <!-- 오른쪽 폴더 아이콘 (작음) -->
  <rect x="710" y="400" width="80" height="56" rx="8" fill="#81C784" opacity="0.6"/>
  <rect x="710" y="384" width="40" height="20" rx="5" fill="#81C784" opacity="0.6"/>
</svg>
