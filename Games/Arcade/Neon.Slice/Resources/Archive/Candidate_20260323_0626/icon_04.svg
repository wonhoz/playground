<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Neon.Slice | 트로피 콤보 달성 | 공간/장면 | #1A0A00 -->
  <defs>
    <radialGradient id="trophyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A00"/>
  <!-- Layer 2: Trophy -->
  <!-- Trophy base -->
  <rect x="436" y="760" width="152" height="30" rx="6" fill="#92400E"/>
  <rect x="400" y="790" width="224" height="20" rx="4" fill="#78350F"/>
  <!-- Trophy stem -->
  <rect x="476" y="680" width="72" height="82" rx="8" fill="#D97706"/>
  <!-- Trophy cup -->
  <path d="M320 400 Q320 280 512 260 Q704 280 704 400 Q704 520 620 560 L512 580 L404 560 Q320 520 320 400 Z" fill="url(#trophyGrad)" stroke="#F59E0B" stroke-width="5"/>
  <!-- Trophy handles -->
  <path d="M320 400 Q240 420 250 480 Q260 540 340 540" fill="none" stroke="#FBBF24" stroke-width="10" stroke-linecap="round"/>
  <path d="M704 400 Q784 420 774 480 Q764 540 684 540" fill="none" stroke="#FBBF24" stroke-width="10" stroke-linecap="round"/>
  <!-- Shine -->
  <ellipse cx="440" cy="360" rx="36" ry="60" fill="white" opacity="0.15" transform="rotate(-20 440 360)"/>
  <!-- Layer 3: Combo text and stars -->
  <text x="512" y="480" font-family="Arial,sans-serif" font-size="50" fill="#1A0A00" text-anchor="middle" font-weight="bold">×10</text>
  <text x="512" y="520" font-family="Arial,sans-serif" font-size="22" fill="#7C2D12" text-anchor="middle" font-weight="bold">COMBO!</text>
  <!-- Stars around trophy -->
  <polygon points="300,280 308,304 332,304 314,318 320,342 300,328 280,342 286,318 268,304 292,304" fill="#FCD34D"/>
  <polygon points="724,280 730,300 750,300 734,312 740,332 724,320 708,332 714,312 698,300 718,300" fill="#FCD34D"/>
  <polygon points="200,460 206,476 222,476 210,486 214,502 200,492 186,502 190,486 178,476 194,476" fill="#FCD34D" opacity="0.7"/>
  <polygon points="824,460 830,476 846,476 834,486 838,502 824,492 810,502 814,486 802,476 818,476" fill="#FCD34D" opacity="0.7"/>
  <!-- Sparkles -->
  <text x="512" y="220" font-family="Arial,sans-serif" font-size="36" fill="#FCD34D" text-anchor="middle" opacity="0.8">✦✦✦</text>
</svg>
