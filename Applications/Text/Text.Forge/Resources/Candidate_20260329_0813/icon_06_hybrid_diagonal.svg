<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF9C3"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="strip1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="strip2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Text input → forged output, diagonal transformation strips -->
  <!-- Input strip (left, raw text) -->
  <rect x="130" y="300" width="340" height="100" rx="20" fill="url(#strip1)"/>
  <text x="300" y="367" font-family="monospace" font-size="68" fill="white" text-anchor="middle" font-weight="bold">lorem</text>
  <!-- Arrow pointing diagonally right+down -->
  <path d="M 480 350 L 570 510" stroke="#D97706" stroke-width="22" stroke-linecap="round" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <polygon points="0,0 12,6 0,12" fill="#D97706"/>
    </marker>
  </defs>
  <!-- Transform indicator (center) -->
  <circle cx="512" cy="512" r="58" fill="#D97706"/>
  <text x="512" y="535" font-family="monospace" font-size="62" fill="white" text-anchor="middle" font-weight="bold">⚙</text>
  <!-- Output strip (right, transformed text) -->
  <rect x="560" y="595" width="340" height="100" rx="20" fill="url(#strip2)"/>
  <text x="730" y="662" font-family="monospace" font-size="68" fill="white" text-anchor="middle" font-weight="bold">LOREM</text>
  <!-- Second smaller transform pair: before/after -->
  <rect x="200" y="650" width="250" height="78" rx="14" fill="#1D4ED8" opacity="0.5"/>
  <text x="325" y="703" font-family="monospace" font-size="55" fill="white" text-anchor="middle">  abc  </text>
  <rect x="210" y="760" width="250" height="78" rx="14" fill="#059669" opacity="0.5"/>
  <text x="335" y="813" font-family="monospace" font-size="55" fill="white" text-anchor="middle">abc</text>
  <!-- Layer 3: diagonal motion lines -->
  <line x1="180" y1="260" x2="840" y2="800" stroke="#D97706" stroke-width="6" stroke-dasharray="24,14" opacity="0.3"/>
</svg>
