<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#003366" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Portal rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring1)" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00d4ff" stroke-width="6" opacity="0.5"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#0099ff" stroke-width="8" opacity="0.7"/>
  <circle cx="256" cy="256" r="90" fill="url(#portal)" opacity="0.9"/>
  <!-- Inner vortex lines -->
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(0,256,256)"/>
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(30,256,256)"/>
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(60,256,256)"/>
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(90,256,256)"/>
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(120,256,256)"/>
  <line x1="256" y1="166" x2="256" y2="346" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(150,256,256)"/>
  <!-- Perspective arrows -->
  <path d="M256 140 L230 100 M256 140 L282 100" stroke="#00d4ff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M256 372 L230 412 M256 372 L282 412" stroke="#00d4ff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Center star -->
  <circle cx="256" cy="256" r="12" fill="#ffffff" opacity="0.9"/>
</svg>
