<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 요소 선택 스크린샷 -->
  <!-- 브라우저 -->
  <rect x="60" y="80" width="392" height="320" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <!-- 크롬 -->
  <rect x="60" y="80" width="392" height="24" rx="8" fill="#0a1520" opacity="0.95"/>
  <rect x="60" y="96" width="392" height="8" rx="0" fill="#0a1520" opacity="0.95"/>
  <circle cx="78" cy="91" r="4" fill="#EF4444" opacity="0.7"/>
  <circle cx="92" cy="91" r="4" fill="#FDE047" opacity="0.7"/>
  <circle cx="106" cy="91" r="4" fill="#4ADE80" opacity="0.7"/>
  <rect x="120" y="85" width="220" height="14" rx="7" fill="#0d2030" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <text x="230" y="95" text-anchor="middle" font-size="7" fill="#38BDF8" opacity="0.7">example.com</text>
  <!-- 웹페이지 내용 -->
  <rect x="68" y="108" width="376" height="50" rx="4" fill="#0a1828" opacity="0.7"/>
  <rect x="78" y="116" width="120" height="10" rx="3" fill="#38BDF8" opacity="0.4"/>
  <rect x="350" y="116" width="60" height="10" rx="3" fill="#38BDF8" opacity="0.25"/>
  <rect x="78" y="130" width="280" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <!-- 선택된 요소 (하이라이트) -->
  <rect x="68" y="162" width="180" height="100" rx="4" fill="#0a2030" opacity="0.7"/>
  <!-- 선택 오버레이 -->
  <rect x="68" y="162" width="180" height="100" rx="4" fill="#38BDF8" opacity="0.08" stroke="#38BDF8" stroke-width="2" filter="url(#glow)"/>
  <!-- 선택 핸들 -->
  <rect x="64" y="158" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="152" y="158" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="242" y="158" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="64" y="209" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="242" y="209" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="64" y="258" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="152" y="258" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <rect x="242" y="258" width="10" height="10" rx="1" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <!-- 선택 치수 -->
  <text x="158" y="152" text-anchor="middle" font-size="10" fill="#38BDF8" filter="url(#glow)" opacity="0.9">180×100</text>
  <!-- 요소 정보 툴팁 -->
  <rect x="255" y="150" width="180" height="100" rx="6" fill="#0a1520" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow)" opacity="0.95"/>
  <text x="268" y="168" font-size="10" font-weight="bold" fill="#38BDF8" opacity="0.9">&lt;div.hero-section&gt;</text>
  <text x="268" y="182" font-size="9" fill="#888" opacity="0.8">x: 68 y: 162</text>
  <text x="268" y="196" font-size="9" fill="#888" opacity="0.8">w: 180 h: 100</text>
  <line x1="255" y1="204" x2="435" y2="204" stroke="#38BDF8" stroke-width="0.8" opacity="0.4"/>
  <text x="268" y="218" font-size="9" fill="#38BDF8" opacity="0.7">Screenshot selected</text>
  <rect x="268" y="226" width="90" height="16" rx="4" fill="#38BDF8" opacity="0.3" filter="url(#glow)"/>
  <text x="313" y="237" text-anchor="middle" font-size="9" fill="#38BDF8" opacity="0.9">Capture</text>
  <!-- 나머지 비선택 영역들 -->
  <rect x="260" y="162" width="176" height="100" rx="4" fill="#0a1828" opacity="0.5"/>
  <rect x="68" y="272" width="180" height="116" rx="4" fill="#0a1828" opacity="0.5"/>
  <rect x="260" y="272" width="176" height="116" rx="4" fill="#0a1828" opacity="0.5"/>
  <!-- 커서 -->
  <path d="M80,165 L72,186 L79,181 L84,192 L87,191 L82,180 L91,180 Z" fill="#38BDF8" filter="url(#glow)" opacity="0.8"/>
  <!-- 하단 -->
  <rect x="130" y="422" width="252" height="48" rx="10" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="451" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">ELEMENT SELECTOR</text>
