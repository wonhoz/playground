<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background mint -->
  <defs>
    <linearGradient id="bgGrad06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bgGrad06)"/>
  <!-- Layer 2: Layered card stack (format conversion layers) -->
  <!-- Bottom card (old format) -->
  <rect x="224" y="440" width="576" height="340" rx="24" fill="#80DEEA" opacity="0.8"/>
  <text x="512" y="640" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#006064" text-anchor="middle" opacity="0.5">PNG</text>
  <!-- Middle card -->
  <rect x="196" y="380" width="576" height="340" rx="24" fill="#4DD0E1" opacity="0.9"/>
  <text x="484" y="574" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#004D40" text-anchor="middle" opacity="0.6">JPG</text>
  <!-- Top card (new format) -->
  <rect x="168" y="310" width="576" height="340" rx="24" fill="#FFFFFF" opacity="0.97"/>
  <text x="456" y="504" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#00796B" text-anchor="middle">ICO</text>
  <!-- Checkmark badge -->
  <circle cx="700" cy="330" r="72" fill="#00BFA5"/>
  <path d="M658 330 L688 362 L742 298" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: Top card stars/sparkles -->
  <circle cx="200" cy="200" r="18" fill="#FFD740" opacity="0.8"/>
  <circle cx="820" cy="200" r="14" fill="#FF8A65" opacity="0.7"/>
  <path d="M456 200 L468 230 L500 230 L476 248 L486 280 L456 262 L426 280 L436 248 L412 230 L444 230 Z" fill="#FFD740" opacity="0.9"/>
</svg>
