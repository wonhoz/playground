<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01010A"/>
      <stop offset="100%" stop-color="#0A0015"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#1D4ED8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="100" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="400" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="450" cy="200" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="80" cy="400" r="1" fill="white" opacity="0.5"/>
  <circle cx="430" cy="420" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="460" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="460" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="80" cy="160" r="1" fill="white" opacity="0.5"/>
  <circle cx="460" cy="300" r="1.5" fill="white" opacity="0.7"/>
  <!-- Nebula background -->
  <circle cx="256" cy="256" r="200" fill="url(#nebula)"/>
  <!-- Disk rings (cosmic) -->
  <ellipse cx="256" cy="256" rx="180" ry="50" fill="none" stroke="#7C3AED" stroke-width="18" opacity="0.5" transform="rotate(-20,256,256)"/>
  <ellipse cx="256" cy="256" rx="145" ry="38" fill="none" stroke="#3B82F6" stroke-width="12" opacity="0.4" transform="rotate(-20,256,256)"/>
  <ellipse cx="256" cy="256" rx="110" ry="28" fill="none" stroke="#06B6D4" stroke-width="8" opacity="0.4" transform="rotate(-20,256,256)"/>
  <!-- Disk surface (face-on) -->
  <ellipse cx="256" cy="256" rx="72" ry="72" fill="#1A0533" stroke="#7C3AED" stroke-width="3" opacity="0.9"/>
  <!-- Disk sectors -->
  <path d="M256,256 L256,186 A70,70 0 0,1 326,256 Z" fill="#EF4444" opacity="0.7"/>
  <path d="M256,256 L326,256 A70,70 0 0,1 256,326 Z" fill="#3B82F6" opacity="0.7"/>
  <path d="M256,256 L256,326 A70,70 0 0,1 186,256 Z" fill="#22C55E" opacity="0.7"/>
  <path d="M256,256 L186,256 A70,70 0 0,1 256,186 Z" fill="#F97316" opacity="0.7"/>
  <!-- Core star -->
  <circle cx="256" cy="256" r="22" fill="url(#core)"/>
  <circle cx="256" cy="256" r="10" fill="#FEF9C3" opacity="0.9"/>
  <!-- Usage label -->
  <text x="256" y="455" font-family="sans-serif" font-size="14" fill="#7C3AED" text-anchor="middle">Disk C: ● 72% used</text>
</svg>
