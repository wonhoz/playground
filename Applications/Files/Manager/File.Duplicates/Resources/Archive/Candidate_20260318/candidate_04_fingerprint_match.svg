<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#040e12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 지문 패턴 (동심원 호들) -->
  <g fill="none" stroke-linecap="round">
    <!-- 중심 코어 -->
    <circle cx="256" cy="240" r="18" stroke="#67E8F9" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
    <!-- 지문 고리들 -->
    <path d="M 228,200 Q 256,178 284,200 Q 300,216 300,240 Q 300,270 284,284 Q 270,295 256,295 Q 242,295 228,284 Q 212,270 212,240 Q 212,216 228,200" stroke="#22D3EE" stroke-width="2.5" opacity="0.85" fill="none"/>
    <path d="M 205,180 Q 256,152 307,180 Q 330,200 332,240 Q 332,285 307,305 Q 284,322 256,322 Q 228,322 205,305 Q 180,285 180,240 Q 180,200 205,180" stroke="#06B6D4" stroke-width="2" opacity="0.75" fill="none"/>
    <path d="M 183,162 Q 256,128 329,162 Q 360,186 362,240 Q 362,300 329,328 Q 300,350 256,350 Q 212,350 183,328 Q 150,300 150,240 Q 150,186 183,162" stroke="#22D3EE" stroke-width="2" opacity="0.65" fill="none"/>
    <path d="M 162,146 Q 256,105 350,146 Q 390,174 392,240 Q 392,316 350,350 Q 316,375 256,375 Q 196,375 162,350 Q 120,316 120,240 Q 120,174 162,146" stroke="#06B6D4" stroke-width="1.8" opacity="0.55" fill="none"/>
    <path d="M 142,130 Q 256,82 370,130 Q 420,162 422,240 Q 422,332 370,372 Q 332,400 256,400 Q 180,400 142,372 Q 90,332 90,240 Q 90,162 142,130" stroke="#22D3EE" stroke-width="1.5" opacity="0.4" fill="none"/>
    <!-- 지문 루프 (상단 갈라짐) -->
    <path d="M 230,195 Q 256,185 282,195" stroke="#67E8F9" stroke-width="2" opacity="0.7" fill="none"/>
    <path d="M 218,178 Q 256,165 294,178" stroke="#22D3EE" stroke-width="1.8" opacity="0.6" fill="none"/>
  </g>
  <!-- 스캔 라인 (감지) -->
  <rect x="90" y="235" width="332" height="3" rx="1.5" fill="#22D3EE" opacity="0.4" filter="url(#glow)"/>
  <!-- 매칭 포인트들 -->
  <circle cx="300" cy="210" r="5" fill="#67E8F9" opacity="0.9" filter="url(#glow)"/>
  <circle cx="210" cy="268" r="5" fill="#22D3EE" opacity="0.9" filter="url(#glow)"/>
  <circle cx="305" cy="290" r="4" fill="#06B6D4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="230" cy="310" r="4" fill="#67E8F9" opacity="0.85" filter="url(#glow)"/>
  <!-- 매칭 연결선 -->
  <line x1="300" y1="210" x2="210" y2="268" stroke="#22D3EE" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="305" y1="290" x2="230" y2="310" stroke="#06B6D4" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 하단 결과 -->
  <rect x="156" y="420" width="200" height="36" rx="10" fill="#06B6D4" opacity="0.2" stroke="#22D3EE" stroke-width="1"/>
  <text x="256" y="443" text-anchor="middle" font-family="monospace" font-size="13" fill="#67E8F9" opacity="0.9">MATCH FOUND</text>
  <!-- 상단 파일 아이콘 -->
  <rect x="80" y="80" width="44" height="55" rx="5" fill="#06B6D4" opacity="0.6"/>
  <polygon points="80,80 104,80 104,60 124,80" fill="#22D3EE" opacity="0.7"/>
  <rect x="400" y="80" width="44" height="55" rx="5" fill="#06B6D4" opacity="0.6"/>
  <polygon points="400,80 424,80 424,60 444,80" fill="#22D3EE" opacity="0.7"/>
  <!-- 연결 아치 -->
  <path d="M 124,104 Q 256,60 400,104" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
</svg>