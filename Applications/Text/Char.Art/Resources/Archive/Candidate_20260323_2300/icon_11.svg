<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#D97706"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Editor window frame -->
    <rect x="100" y="140" width="824" height="740" rx="20" fill="#1F2937" stroke="#D97706" stroke-width="8"/>
    <!-- Title bar -->
    <rect x="100" y="140" width="824" height="52" rx="20" fill="#374151"/>
    <rect x="100" y="168" width="824" height="24" fill="#374151"/>
    <!-- Window buttons -->
    <circle cx="148" cy="166" r="14" fill="#EF4444"/>
    <circle cx="188" cy="166" r="14" fill="#F59E0B"/>
    <circle cx="228" cy="166" r="14" fill="#10B981"/>
    <!-- File name tab -->
    <rect x="270" y="148" width="200" height="36" rx="8" fill="#4B5563"/>
    <text x="370" y="172" font-size="22" font-family="system-ui" fill="white" text-anchor="middle">ascii_art.txt</text>
    <!-- Line numbers -->
    <rect x="100" y="192" width="60" height="688" fill="#1F2937"/>
    <text x="130" y="236" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">1</text>
    <text x="130" y="278" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">2</text>
    <text x="130" y="320" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">3</text>
    <text x="130" y="362" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">4</text>
    <text x="130" y="404" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">5</text>
    <text x="130" y="446" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">6</text>
    <text x="130" y="488" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">7</text>
    <text x="130" y="530" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">8</text>
    <text x="130" y="572" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">9</text>
    <text x="130" y="614" font-size="20" font-family="monospace" fill="#6B7280" text-anchor="middle">10</text>
    <!-- Separator line -->
    <line x1="160" y1="192" x2="160" y2="880" stroke="#374151" stroke-width="2"/>
    <!-- ASCII art content in editor -->
    <text x="175" y="236" font-size="22" font-family="monospace" fill="#FDE68A">  /\_/\  </text>
    <text x="175" y="278" font-size="22" font-family="monospace" fill="#FDE68A"> ( @.@ ) </text>
    <text x="175" y="320" font-size="22" font-family="monospace" fill="#FDE68A">  > ^ &lt;  </text>
    <text x="175" y="362" font-size="22" font-family="monospace" fill="#FDE68A"> /|   |\ </text>
    <text x="175" y="404" font-size="22" font-family="monospace" fill="#FDE68A">  |___|  </text>
    <text x="175" y="446" font-size="22" font-family="monospace" fill="#86EFAC">-- DONE! --</text>
    <!-- Cursor blink -->
    <rect x="175" y="470" width="12" height="28" fill="#FDE68A" opacity="0.9"/>
    <!-- Status bar -->
    <rect x="100" y="840" width="824" height="40" rx="0" fill="#374151"/>
    <rect x="100" y="856" width="824" height="24" rx="10" fill="#374151"/>
    <text x="180" y="866" font-size="20" font-family="system-ui" fill="#9CA3AF">ASCII Art  |  Ln 7, Col 1  |  UTF-8</text>
  </g>
</svg>
