<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 핑크-퍼플 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: ICO 멀티사이즈 격자 (2×2) -->
  <!-- 타일 1: 256px -->
  <rect x="112" y="112" width="360" height="360" rx="28" fill="#AD1457"/>
  <text x="292" y="262" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="80" fill="white" text-anchor="middle">256</text>
  <text x="292" y="354" font-family="'Segoe UI', Arial, sans-serif" font-size="56" fill="#F8BBD9" text-anchor="middle">px</text>
  <!-- 타일 2: 128px -->
  <rect x="552" y="112" width="360" height="360" rx="28" fill="#6A1B9A"/>
  <text x="732" y="262" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="80" fill="white" text-anchor="middle">128</text>
  <text x="732" y="354" font-family="'Segoe UI', Arial, sans-serif" font-size="56" fill="#CE93D8" text-anchor="middle">px</text>
  <!-- 타일 3: 48px -->
  <rect x="112" y="552" width="360" height="360" rx="28" fill="#1565C0"/>
  <text x="292" y="702" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="80" fill="white" text-anchor="middle">48</text>
  <text x="292" y="794" font-family="'Segoe UI', Arial, sans-serif" font-size="56" fill="#90CAF9" text-anchor="middle">px</text>
  <!-- 타일 4: 16px -->
  <rect x="552" y="552" width="360" height="360" rx="28" fill="#00695C"/>
  <text x="732" y="702" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="80" fill="white" text-anchor="middle">16</text>
  <text x="732" y="794" font-family="'Segoe UI', Arial, sans-serif" font-size="56" fill="#80CBC4" text-anchor="middle">px</text>
  <!-- Layer 3: ICO 레이블 배지 -->
  <rect x="370" y="462" width="284" height="100" rx="50" fill="#F50057"/>
  <text x="512" y="532" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle">ICO</text>
</svg>
