<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05 | Metaphor | 공간·장면 | 스마트폰 카메라 QR 스캔 장면 | 민트 그린 + 다크 -->

  <defs>
    <linearGradient id="bgGrad05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A0F"/>
      <stop offset="100%" stop-color="#002618"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFB3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFB3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FFB3" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow05">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad05)"/>

  <!-- Layer 2: QR 코드 (중앙 좌측) -->
  <g fill="#00CC88">
    <!-- QR 파인더 좌상단 -->
    <rect x="190" y="230" width="180" height="180" rx="14"/>
    <rect x="210" y="250" width="140" height="140" rx="8" fill="#001A0F"/>
    <rect x="232" y="272" width="96" height="96" rx="5" fill="#00CC88"/>

    <!-- QR 파인더 우상단 -->
    <rect x="430" y="230" width="180" height="180" rx="14"/>
    <rect x="450" y="250" width="140" height="140" rx="8" fill="#001A0F"/>
    <rect x="472" y="272" width="96" height="96" rx="5" fill="#00CC88"/>

    <!-- QR 파인더 좌하단 -->
    <rect x="190" y="470" width="180" height="180" rx="14"/>
    <rect x="210" y="490" width="140" height="140" rx="8" fill="#001A0F"/>
    <rect x="232" y="512" width="96" height="96" rx="5" fill="#00CC88"/>

    <!-- 데이터 모듈 -->
    <rect x="432" y="464" width="28" height="28" rx="4"/>
    <rect x="476" y="464" width="28" height="28" rx="4"/>
    <rect x="520" y="464" width="28" height="28" rx="4"/>
    <rect x="564" y="464" width="28" height="28" rx="4"/>
    <rect x="432" y="508" width="28" height="28" rx="4"/>
    <rect x="520" y="508" width="28" height="28" rx="4"/>
    <rect x="564" y="508" width="28" height="28" rx="4"/>
    <rect x="432" y="552" width="28" height="28" rx="4"/>
    <rect x="476" y="552" width="28" height="28" rx="4"/>
    <rect x="564" y="552" width="28" height="28" rx="4"/>
    <rect x="476" y="596" width="28" height="28" rx="4"/>
    <rect x="520" y="596" width="28" height="28" rx="4"/>
    <rect x="248" y="660" width="28" height="28" rx="4"/>
    <rect x="292" y="660" width="28" height="28" rx="4"/>
    <rect x="336" y="660" width="28" height="28" rx="4"/>
    <rect x="380" y="660" width="28" height="28" rx="4"/>
    <rect x="432" y="660" width="28" height="28" rx="4"/>
    <rect x="564" y="660" width="28" height="28" rx="4"/>
    <rect x="248" y="704" width="28" height="28" rx="4"/>
    <rect x="336" y="704" width="28" height="28" rx="4"/>
    <rect x="476" y="704" width="28" height="28" rx="4"/>
    <rect x="564" y="704" width="28" height="28" rx="4"/>
    <rect x="292" y="748" width="28" height="28" rx="4"/>
    <rect x="380" y="748" width="28" height="28" rx="4"/>
    <rect x="520" y="748" width="28" height="28" rx="4"/>
  </g>

  <!-- Layer 3: 스캔 뷰파인더 코너 (스마트폰 카메라 프레임 느낌) -->
  <g fill="none" stroke="#00FFB3" stroke-width="16" stroke-linecap="round" filter="url(#glow05)">
    <!-- 좌상 코너 -->
    <path d="M155 340 L155 185 L310 185"/>
    <!-- 우상 코너 -->
    <path d="M714 185 L869 185 L869 340"/>
    <!-- 좌하 코너 -->
    <path d="M155 685 L155 840 L310 840"/>
    <!-- 우하 코너 -->
    <path d="M714 840 L869 840 L869 685"/>
  </g>

  <!-- 스캔 라인 (동적 느낌) -->
  <rect x="155" y="490" width="714" height="44" fill="url(#scanLine)" opacity="0.7"/>
</svg>
