<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 네온 검색창 -->
  <rect x="80" y="190" width="352" height="70" rx="35" fill="#10B981" opacity="0.05"/>
  <rect x="80" y="190" width="352" height="70" rx="35" fill="none" stroke="#10B981" stroke-width="3" filter="url(#glow)"/>
  <!-- 검색 아이콘 -->
  <circle cx="128" cy="225" r="18" fill="none" stroke="#10B981" stroke-width="3" filter="url(#glow)"/>
  <line x1="141" y1="238" x2="155" y2="252" stroke="#10B981" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 커서 -->
  <line x1="170" y1="210" x2="170" y2="240" stroke="#10B981" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <!-- 텍스트 프리뷰 -->
  <text x="195" y="233" fill="#34D399" font-size="14" font-family="monospace" opacity="0.7">emoji search...</text>
  <!-- 결과 미리보기 -->
  <text x="130" y="320" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">😊</text>
  <text x="195" y="320" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">🌟</text>
  <text x="256" y="320" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">🔥</text>
  <text x="317" y="320" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">💎</text>
  <text x="382" y="320" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">⚡</text>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">NEON FINDER</text>
</svg>
