<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="110" y="145" width="804" height="530" rx="48" fill="#FFFFFF" stroke="#BF360C" stroke-width="16"/>
  <!-- Steam lines (wavy, rising) -->
  <path d="M 396,318 Q 374,280 396,242 Q 418,204 396,168" fill="none" stroke="#FFAB76" stroke-width="16" stroke-linecap="round"/>
  <path d="M 480,306 Q 458,268 480,230 Q 502,192 480,156" fill="none" stroke="#FFAB76" stroke-width="16" stroke-linecap="round"/>
  <path d="M 564,318 Q 542,280 564,242 Q 586,204 564,168" fill="none" stroke="#FFAB76" stroke-width="16" stroke-linecap="round"/>
  <!-- Mug body -->
  <rect x="328" y="328" width="304" height="248" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="16"/>
  <!-- Mug top opening ellipse (dark coffee) -->
  <ellipse cx="480" cy="336" rx="152" ry="28" fill="#4E342E" stroke="#BF360C" stroke-width="14"/>
  <!-- Coffee surface -->
  <ellipse cx="480" cy="344" rx="132" ry="20" fill="#6D4C41"/>
  <!-- Mug handle -->
  <path d="M 632,368 Q 752,368 752,452 Q 752,536 632,536" fill="none" stroke="#BF360C" stroke-width="30" stroke-linecap="round"/>
  <!-- Mug shine highlight -->
  <rect x="360" y="360" width="26" height="100" rx="13" fill="#FFFFFF" opacity="0.25"/>
  <!-- Saucer plate -->
  <ellipse cx="480" cy="588" rx="210" ry="32" fill="#FF8A65" stroke="#BF360C" stroke-width="14"/>
  <!-- STAY ON badge -->
  <rect x="194" y="752" width="636" height="118" rx="36" fill="#BF360C" stroke="#7F0000" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">STAY ON</text>
</svg>
