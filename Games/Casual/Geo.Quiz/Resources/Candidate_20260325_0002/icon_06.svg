<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#0D47A1"/>

  <!-- Passport shadow -->
  <rect x="228" y="208" width="580" height="650" rx="35" fill="#000000" opacity="0.3"/>

  <!-- Passport body -->
  <rect x="215" y="195" width="580" height="650" rx="30" fill="#1565C0" stroke="#FFD600" stroke-width="14"/>

  <!-- Passport inner border -->
  <rect x="240" y="220" width="530" height="600" rx="20" fill="none" stroke="#FFD600" stroke-width="5" opacity="0.6"/>

  <!-- Globe symbol on passport -->
  <circle cx="512" cy="390" r="110" fill="none" stroke="#FFD600" stroke-width="12"/>
  <ellipse cx="512" cy="390" rx="110" ry="38" fill="none" stroke="#FFD600" stroke-width="8"/>
  <ellipse cx="512" cy="390" rx="50" ry="110" fill="none" stroke="#FFD600" stroke-width="8"/>
  <line x1="402" y1="390" x2="622" y2="390" stroke="#FFD600" stroke-width="8"/>

  <!-- Passport title -->
  <text x="512" y="545" font-size="72" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#FFD600" letter-spacing="8">WORLD QUIZ</text>

  <!-- Red stamps -->
  <circle cx="320" cy="650" r="70" fill="none" stroke="#F44336" stroke-width="12" opacity="0.9"/>
  <text x="320" y="658" font-size="42" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#F44336" opacity="0.9">QUIZ</text>
  <line x1="260" y1="620" x2="380" y2="680" stroke="#F44336" stroke-width="6" opacity="0.6"/>

  <circle cx="500" cy="690" r="55" fill="none" stroke="#F44336" stroke-width="10" opacity="0.85"/>
  <text x="500" y="700" font-size="36" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#F44336" opacity="0.85">★★</text>

  <circle cx="680" cy="650" r="62" fill="none" stroke="#F44336" stroke-width="10" opacity="0.8"/>
  <text x="680" y="638" font-size="34" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#F44336" opacity="0.8">GEO</text>
  <text x="680" y="678" font-size="34" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#F44336" opacity="0.8">2026</text>
</svg>
