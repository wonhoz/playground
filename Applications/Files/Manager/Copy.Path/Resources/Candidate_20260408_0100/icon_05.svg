<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
  </defs>

  <!-- Background: sky blue -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Left: Yellow folder -->
  <!-- Folder tab -->
  <path d="M148,400 L148,740 Q148,772 180,772 L396,772 Q428,772 428,740 L428,436 Q428,404 396,404 L310,404 L286,400 Z" fill="#FBBF24"/>
  <path d="M176,432 L176,748 Q176,764 192,764 L412,764 Q420,764 420,740 L420,436 Q420,420 404,420 L298,420 L276,412 Q268,404 256,404 L192,404 Q176,404 176,432 Z" fill="#FCD34D"/>
  <!-- Folder tab flap -->
  <path d="M196,400 L196,416 L356,416 L356,400 Q356,384 340,384 L212,384 Q196,384 196,400 Z" fill="#F59E0B"/>

  <!-- Dotted path arrow from folder to clipboard -->
  <line x1="440" y1="580" x2="600" y2="580" stroke="white" stroke-width="14" stroke-linecap="round" stroke-dasharray="24,16"/>
  <!-- Arrow head -->
  <polygon points="594,546 664,580 594,614" fill="white"/>

  <!-- Right: White clipboard -->
  <rect x="656" y="390" width="220" height="272" rx="18" fill="white"/>
  <!-- Clip top -->
  <rect x="726" y="350" width="80" height="60" rx="10" fill="#0EA5E9"/>
  <rect x="742" y="360" width="48" height="40" rx="6" fill="#BAE6FD"/>
  <circle cx="766" cy="380" r="10" fill="white"/>
  <!-- Lines on clipboard -->
  <line x1="680" y1="490" x2="856" y2="490" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="680" y1="520" x2="830" y2="520" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <line x1="680" y1="550" x2="840" y2="550" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
  <line x1="680" y1="580" x2="816" y2="580" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>

  <!-- Path text below folder -->
  <rect x="108" y="790" width="320" height="52" rx="12" fill="white" opacity="0.2"/>
  <text x="268" y="822" font-family="Consolas,monospace" font-size="26" fill="white" text-anchor="middle">C:\Users\</text>

  <!-- Copied badge on clipboard bottom -->
  <rect x="680" y="620" width="196" height="40" rx="10" fill="#22C55E"/>
  <text x="778" y="647" font-family="Arial,sans-serif" font-size="24" fill="white" font-weight="bold" text-anchor="middle">Copied!</text>

  <!-- Sparkle dots around arrow -->
  <circle cx="512" cy="520" r="8" fill="#FDE047"/>
  <circle cx="540" cy="548" r="6" fill="#FDE047" opacity="0.7"/>
  <circle cx="560" cy="510" r="5" fill="white" opacity="0.8"/>
</svg>
