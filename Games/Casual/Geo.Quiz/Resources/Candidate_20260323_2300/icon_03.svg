    <path d="M 240 420 Q 265 400 285 420 Q 300 450 290 490 Q 275 520 255 510 Q 230 490 235 460 Q 238 435 240 420 Z"/>
  </g>

  <!-- 별 하이라이트 -->
  <circle cx="380" cy="370" r="18" fill="#FFFFFF" opacity="0.6"/>
</svg>
