<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 파랑+민트 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E7FFF"/>
      <stop offset="100%" style="stop-color:#00C8B4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 열린 폴더 -->
  <!-- 폴더 탭 -->
  <path d="M 180 380 Q 180 340 220 340 L 400 340 Q 430 340 440 360 L 460 390 L 820 390 Q 860 390 860 430 L 860 720 Q 860 760 820 760 L 200 760 Q 160 760 160 720 L 160 420 Q 160 380 200 380 Z" fill="#FFFFFF" opacity="0.95"/>
  <path d="M 180 340 L 400 340 Q 430 340 440 360 L 460 390 L 200 390 Q 160 390 160 430 L 160 390 Q 160 340 200 340 Z" fill="#CCECFF"/>
  <!-- Layer 3: 폴더에서 경로 텍스트가 나오는 효과 (화살표+텍스트) -->
  <!-- 경로 텍스트 라인들 (폴더 안) -->
  <text x="210" y="500" font-family="Consolas, monospace" font-size="72" font-weight="bold" fill="#1E7FFF">C:\Users\</text>
  <text x="210" y="580" font-family="Consolas, monospace" font-size="64" fill="#006699">admin\file</text>
  <!-- 화살표 오른쪽으로 나감 -->
  <path d="M 760 630 L 860 630 L 840 600 M 860 630 L 840 660" stroke="#FF6600" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 클립보드 아이콘 (우측 바깥) - 작은 것 -->
  <rect x="840" y="680" width="90" height="110" rx="10" fill="#FF6600"/>
  <rect x="866" y="670" width="38" height="22" rx="6" fill="white"/>
</svg>
