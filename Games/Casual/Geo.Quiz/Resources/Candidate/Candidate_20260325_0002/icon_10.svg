  <!-- Trophy base -->
  <rect x="360" y="750" width="304" height="60" rx="18" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <rect x="330" y="808" width="364" height="38" rx="14" fill="#E65100"/>

  <!-- Globe inside trophy cup -->
  <circle cx="512" cy="400" r="150" fill="#1565C0" opacity="0.92"/>
  <ellipse cx="512" cy="400" rx="150" ry="45" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <ellipse cx="512" cy="400" rx="60" ry="150" fill="none" stroke="#42A5F5" stroke-width="7"/>
  <ellipse cx="512" cy="400" rx="125" ry="150" fill="none" stroke="#42A5F5" stroke-width="5"/>
  <circle cx="475" cy="378" r="32" fill="#4CAF50" opacity="0.88"/>
  <circle cx="545" cy="368" r="26" fill="#66BB6A" opacity="0.88"/>
  <circle cx="568" cy="405" r="20" fill="#81C784" opacity="0.85"/>

  <!-- Stars -->
  <polygon points="512,218 524,254 562,254 532,276 544,312 512,290 480,312 492,276 462,254 500,254" fill="#FFFFFF"/>
  <polygon points="290,370 299,396 327,396 305,412 313,438 290,422 267,438 275,412 253,396 281,396" fill="#FFFFFF" transform="scale(0.8) translate(73, 65)"/>
  <polygon points="734,370 743,396 771,396 749,412 757,438 734,422 711,438 719,412 697,396 725,396" fill="#FFFFFF" transform="scale(0.8) translate(-152, 65)"/>

