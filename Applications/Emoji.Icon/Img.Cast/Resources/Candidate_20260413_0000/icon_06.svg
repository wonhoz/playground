    <path d="M 480 760 L 544 760 L 568 880 L 456 880 Z" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
    <rect x="430" y="870" width="164" height="30" rx="14" fill="#880E4F"/>
  </g>
  <!-- 포맷 배지 (하단) -->
  <g>
    <rect x="100" y="800" width="140" height="100" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
    <text x="170" y="870" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">PNG</text>
  </g>
  <g>
    <rect x="260" y="800" width="140" height="100" rx="24" fill="#FFD93D" stroke="#B88A00" stroke-width="10"/>
    <text x="330" y="870" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#5C4000" text-anchor="middle">JPG</text>
  </g>
  <g>
