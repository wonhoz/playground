<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A2A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3D LUT Cube (isometric) -->
  <!-- Bottom face -->
  <polygon points="256,320 156,260 256,200 356,260" fill="#001122" stroke="#0066FF" stroke-width="2"/>
  <!-- Left face (red gradient) -->
  <polygon points="156,260 156,160 256,100 256,200" fill="#220000" stroke="#FF2200" stroke-width="2"/>
  <!-- Right face (green gradient) -->
  <polygon points="356,260 256,200 256,100 356,160" fill="#002200" stroke="#00FF44" stroke-width="2"/>
  <!-- Top face (where all colors meet) -->
  <polygon points="256,100 156,160 256,200 356,160" fill="#111111" stroke="#FFFF00" stroke-width="2"/>
  <!-- Color nodes at corners -->
  <circle cx="156" cy="260" r="10" fill="#FF1744"/>
  <circle cx="356" cy="260" r="10" fill="#00E676"/>
  <circle cx="256" cy="320" r="10" fill="#2979FF"/>
  <circle cx="156" cy="160" r="10" fill="#FF6D00"/>
  <circle cx="356" cy="160" r="10" fill="#00E5FF"/>
  <circle cx="256" cy="100" r="10" fill="#D500F9"/>
  <!-- Center axis lines -->
  <line x1="256" y1="100" x2="256" y2="320" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="156" y1="160" x2="356" y2="260" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="356" y1="160" x2="156" y2="260" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- LUT label -->
  <rect x="210" y="380" width="92" height="36" rx="10" fill="#1A1A2A" stroke="#444" stroke-width="1.5"/>
  <text x="256" y="395" text-anchor="middle" font-size="11" fill="#888" font-family="Arial">3D LUT</text>
  <text x="256" y="410" text-anchor="middle" font-size="13" fill="white" font-family="Arial" font-weight="bold">512x512</text>
</svg>
