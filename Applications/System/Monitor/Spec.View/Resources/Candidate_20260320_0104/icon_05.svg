  <path d="M512 812 L554 704 L470 704 Z" fill="#2E7D32" opacity="0.7"/>
  <path d="M262 687 L370 629 L328 556 Z" fill="#2E7D32" opacity="0.7"/>
  <path d="M262 337 L370 395 L412 322 Z" fill="#2E7D32" opacity="0.7"/>
  <!-- Inner lens ring -->
  <circle cx="512" cy="512" r="200" fill="none" stroke="#81C784" stroke-width="16"/>
