<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="frameL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56ccf2"/>
      <stop offset="100%" stop-color="#2f80ed"/>
    </linearGradient>
    <linearGradient id="frameR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Left frame -->
  <rect x="50" y="100" width="185" height="185" rx="16" fill="none" stroke="url(#frameL)" stroke-width="8"/>
  <rect x="66" y="116" width="153" height="153" rx="8" fill="#1a3a5c" opacity="0.8"/>
  <!-- Mountain in left frame -->
  <polygon points="144,230 96,268 192,268" fill="#56ccf2" opacity="0.7"/>
  <polygon points="144,210 112,268 176,268" fill="#2f80ed" opacity="0.9"/>
  <!-- Right frame (after processing) -->
  <rect x="277" y="100" width="185" height="185" rx="16" fill="none" stroke="url(#frameR)" stroke-width="8"/>
  <rect x="293" y="116" width="153" height="153" rx="8" fill="#3c1a5c" opacity="0.8"/>
  <!-- Mountain in right frame (enhanced) -->
  <polygon points="370,230 322,268 418,268" fill="#f093fb" opacity="0.7"/>
  <polygon points="370,210 338,268 402,268" fill="#f5576c" opacity="0.9"/>
  <!-- Compare arrows -->
  <path d="M245 185 L267 185" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <polygon points="270,180 280,185 270,190" fill="white"/>
  <!-- Diff indicator bars -->
  <rect x="110" y="320" width="292" height="12" rx="6" fill="#ffffff20"/>
  <rect x="110" y="320" width="180" height="12" rx="6" fill="#56ccf2"/>
  <rect x="110" y="344" width="292" height="12" rx="6" fill="#ffffff20"/>
  <rect x="110" y="344" width="240" height="12" rx="6" fill="#f5576c"/>
  <text x="256" y="408" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.8">COMPARE</text>
</svg>
