<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A0A"/>
  <!-- Layer 2: 3가지 물질 레이어 (모래 / 물 / 불) -->
  <!-- 물 레이어 (상단) -->
  <rect x="80" y="80" width="864" height="280" rx="16" fill="#1E3A8A"/>
  <rect x="80" y="80" width="864" height="280" rx="16" fill="none" stroke="#3468C8" stroke-width="10"/>
  <text x="512" y="260" font-size="100" fill="#60A5FA" text-anchor="middle" font-weight="bold" font-family="Arial">물</text>
  <!-- 파도 선 -->
  <path d="M80 340 Q200 310 320 340 Q440 370 560 340 Q680 310 800 340 Q870 360 944 340" fill="none" stroke="#3468C8" stroke-width="10"/>
  <!-- 모래 레이어 (중간) -->
  <rect x="80" y="360" width="864" height="280" rx="16" fill="#451A00"/>
  <rect x="80" y="360" width="864" height="280" rx="16" fill="none" stroke="#D97706" stroke-width="10"/>
  <text x="512" y="540" font-size="100" fill="#FCD34D" text-anchor="middle" font-weight="bold" font-family="Arial">모래</text>
  <!-- 불 레이어 (하단) -->
  <rect x="80" y="660" width="864" height="284" rx="16" fill="#450A0A"/>
  <rect x="80" y="660" width="864" height="284" rx="16" fill="none" stroke="#FF5500" stroke-width="10"/>
  <text x="512" y="840" font-size="100" fill="#FF6B00" text-anchor="middle" font-weight="bold" font-family="Arial">불</text>
  <!-- 불꽃 -->
  <path d="M380 940 Q400 880 420 920 Q440 860 460 910 Q480 850 500 900 Q520 840 540 880 Q560 820 580 870 Q600 810 620 860 Q640 900 660 940" fill="none" stroke="#FF5500" stroke-width="12" stroke-linecap="round"/>
  <!-- Layer 3: 떨어지는 입자 -->
  <circle cx="300" cy="350" r="14" fill="#E8C878"/>
  <circle cx="320" cy="320" r="10" fill="#DCBA64"/>
  <circle cx="500" cy="340" r="12" fill="#E8C878"/>
  <circle cx="700" cy="360" r="16" fill="#FCD34D"/>
</svg>
