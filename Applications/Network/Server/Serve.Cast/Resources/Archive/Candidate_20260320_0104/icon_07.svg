<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A08"/>
  <!-- 그물 캐스팅: 원형 파동 기준 -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#00695C" stroke-width="24" opacity="0.35"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#00695C" stroke-width="24" opacity="0.5"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#4DB6AC" stroke-width="28" opacity="0.75"/>
  <!-- 그물 격자선 (수평) -->
  <line x1="232" y1="512" x2="792" y2="512" stroke="#00695C" stroke-width="14" opacity="0.4"/>
  <line x1="260" y1="420" x2="764" y2="420" stroke="#00695C" stroke-width="10" opacity="0.3"/>
  <line x1="260" y1="604" x2="764" y2="604" stroke="#00695C" stroke-width="10" opacity="0.3"/>
  <!-- 그물 격자선 (수직) -->
  <line x1="512" y1="232" x2="512" y2="792" stroke="#00695C" stroke-width="14" opacity="0.4"/>
  <line x1="420" y1="260" x2="420" y2="764" stroke="#00695C" stroke-width="10" opacity="0.3"/>
  <line x1="604" y1="260" x2="604" y2="764" stroke="#00695C" stroke-width="10" opacity="0.3"/>
  <!-- 캐스트 중심 -->
  <circle cx="512" cy="512" r="40" fill="#4DB6AC"/>
  <!-- 발사 화살표 4방향 -->
  <polygon points="512,200 480,260 544,260" fill="#4DB6AC" opacity="0.8"/>
  <polygon points="512,824 544,764 480,764" fill="#4DB6AC" opacity="0.8"/>
  <polygon points="200,512 260,480 260,544" fill="#4DB6AC" opacity="0.8"/>
  <polygon points="824,512 764,544 764,480" fill="#4DB6AC" opacity="0.8"/>
