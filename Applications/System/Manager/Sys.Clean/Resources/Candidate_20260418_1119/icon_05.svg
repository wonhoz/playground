<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 라이트 퍼플-라벤더 배경 -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <g clip-path="url(#clip05)">
    <!-- Layer 2: 쓰레기 쌓인 PC 실루엣 (비포) -->
    <!-- PC 모니터 본체 (왼쪽) -->
    <rect x="80" y="260" width="380" height="280" rx="24" fill="#78909C"/>
    <!-- 모니터 화면 (빨강 - 꽉 차 있음) -->
    <rect x="100" y="280" width="340" height="200" rx="12" fill="#B71C1C"/>
    <!-- 쓰레기 아이콘들 화면에 -->
    <text x="180" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="54">🗑</text>
    <text x="280" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="46">📁</text>
    <text x="180" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="36">🔑</text>
    <text x="270" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="36">💾</text>
    <!-- PC 받침대 -->
    <rect x="232" y="540" width="76" height="50" rx="6" fill="#546E7A"/>
    <rect x="170" y="588" width="200" height="24" rx="8" fill="#546E7A"/>
    <!-- 느린 표시 -->
    <text x="270" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#EF5350" text-anchor="middle">🐌 느림</text>

    <!-- 가운데 화살표 + 청소 -->
    <text x="512" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🧹</text>
    <text x="512" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="#7B1FA2" text-anchor="middle">→</text>

    <!-- Layer 3: 깨끗한 PC 실루엣 (에프터) -->
    <!-- PC 모니터 본체 (오른쪽) -->
    <rect x="564" y="260" width="380" height="280" rx="24" fill="#78909C"/>
    <!-- 모니터 화면 (초록 - 깨끗) -->
    <rect x="584" y="280" width="340" height="200" rx="12" fill="#1B5E20"/>
    <!-- 체크 표시 + 반짝임 -->
    <text x="754" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="120" text-anchor="middle">✅</text>
    <!-- PC 받침대 -->
    <rect x="716" y="540" width="76" height="50" rx="6" fill="#546E7A"/>
    <rect x="654" y="588" width="200" height="24" rx="8" fill="#546E7A"/>
    <!-- 빠름 표시 -->
    <text x="754" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#43A047" text-anchor="middle">⚡ 쾌속!</text>

    <!-- 하단 절약 배지 -->
    <rect x="180" y="680" width="664" height="96" rx="28" fill="#7B1FA2"/>
    <text x="512" y="738" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#E1BEE7" text-anchor="middle">PC 성능 회복</text>
    <text x="512" y="770" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">3.2 GB + 47 항목 제거</text>

    <!-- 하단 타이틀 -->
    <rect x="230" y="858" width="564" height="78" rx="22" fill="#7B1FA2"/>
    <text x="512" y="910" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SYS.CLEAN</text>
  </g>
</svg>
