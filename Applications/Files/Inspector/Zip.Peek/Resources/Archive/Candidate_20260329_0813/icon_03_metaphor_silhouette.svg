<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E8FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: Open box (ZIP archive) silhouette -->
  <!-- Box body -->
  <rect x="240" y="480" width="480" height="340" rx="16" fill="#5B21B6"/>
  <!-- Box lid open -->
  <path d="M 220 480 Q 240 360 512 380 Q 784 360 804 480" stroke="#5B21B6" stroke-width="20" fill="#7C3AED" opacity="0.9"/>
  <!-- ZIP label on box -->
  <rect x="340" y="560" width="280" height="64" rx="12" fill="#DDD6FE"/>
  <text x="480" y="603" font-family="Arial" font-size="44" fill="#5B21B6" text-anchor="middle" font-weight="bold">ZIP</text>
  <!-- Files visible inside box -->
  <rect x="310" y="650" width="80" height="96" rx="8" fill="#A78BFA"/>
  <rect x="414" y="638" width="80" height="108" rx="8" fill="#C4B5FD"/>
  <rect x="518" y="650" width="80" height="96" rx="8" fill="#A78BFA"/>
  <rect x="622" y="660" width="80" height="86" rx="8" fill="#C4B5FD"/>
  <!-- Magnifying glass peeking into box -->
  <!-- Glass circle -->
  <circle cx="580" cy="360" r="110" fill="none" stroke="white" stroke-width="28"/>
  <circle cx="580" cy="360" r="90" fill="white" opacity="0.2"/>
  <!-- Eye in glass -->
  <ellipse cx="580" cy="360" rx="52" ry="36" fill="white" opacity="0.8"/>
  <circle cx="580" cy="360" r="22" fill="#7C3AED"/>
  <circle cx="592" cy="350" r="8" fill="white"/>
  <!-- Handle -->
  <line x1="662" y1="440" x2="740" y2="530" stroke="white" stroke-width="32" stroke-linecap="round"/>
  <!-- Layer 3: Peek sparkle effects -->
  <circle cx="420" cy="290" r="16" fill="#FDE68A"/>
  <circle cx="340" cy="330" r="10" fill="#FDE68A" opacity="0.7"/>
  <circle cx="480" cy="270" r="12" fill="white" opacity="0.8"/>
</svg>
