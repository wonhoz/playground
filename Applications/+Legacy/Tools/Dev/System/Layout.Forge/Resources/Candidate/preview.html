<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Layout.Forge - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 1100px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .item img { width: 160px; height: 160px; border-radius: 20px; border: 1px solid #333; background: #111; }
    .item span { font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>Layout.Forge — Icon Candidates</h1>
  <div class="grid">
    <div class="item"><img src="candidate_01_blueprint.svg" alt="01"/><span>01 Blueprint</span></div>
    <div class="item"><img src="candidate_02_orange_wireframe.svg" alt="02"/><span>02 Orange Wireframe</span></div>
    <div class="item"><img src="candidate_03_gradient_panels.svg" alt="03"/><span>03 Gradient Panels</span></div>
    <div class="item"><img src="candidate_04_dark_grid.svg" alt="04"/><span>04 Dark Grid</span></div>
    <div class="item"><img src="candidate_05_teal_minimal.svg" alt="05"/><span>05 Teal Minimal</span></div>
    <div class="item"><img src="candidate_06_pink_modern.svg" alt="06"/><span>06 Pink Modern</span></div>
    <div class="item"><img src="candidate_07_neon_split.svg" alt="07"/><span>07 Neon Split</span></div>
    <div class="item"><img src="candidate_08_earth_tones.svg" alt="08"/><span>08 Earth Tones</span></div>
    <div class="item"><img src="candidate_09_glass_morphism.svg" alt="09"/><span>09 Glass Morphism</span></div>
    <div class="item"><img src="candidate_10_geometric.svg" alt="10"/><span>10 Geometric</span></div>
  </div>
</body>
</html>
