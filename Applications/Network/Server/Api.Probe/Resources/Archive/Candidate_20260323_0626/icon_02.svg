<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | 소켓 플러그 연결 | 중앙심볼 | #001A10 -->
  <defs>
    <radialGradient id="socketGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#001A10"/>
  <!-- Layer 2: Plug (client) + Socket (server) -->
  <!-- Server socket (right side) -->
  <rect x="560" y="360" width="260" height="300" rx="30" fill="#0A2E1A" stroke="#22C55E" stroke-width="6"/>
  <!-- Socket holes -->
  <circle cx="640" cy="460" r="24" fill="#001A10" stroke="#4ADE80" stroke-width="3"/>
  <circle cx="720" cy="460" r="24" fill="#001A10" stroke="#4ADE80" stroke-width="3"/>
  <rect x="660" y="540" width="40" height="60" rx="6" fill="#001A10" stroke="#4ADE80" stroke-width="3"/>
  <text x="690" y="640" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" text-anchor="middle">API</text>
  <!-- Plug (client, left side) -->
  <rect x="204" y="360" width="260" height="300" rx="30" fill="#0A1E2E" stroke="#60A5FA" stroke-width="6"/>
  <!-- Plug prongs -->
  <rect x="277" y="268" width="26" height="94" rx="6" fill="#60A5FA"/>
  <rect x="320" y="268" width="26" height="94" rx="6" fill="#60A5FA"/>
  <rect x="363" y="268" width="26" height="80" rx="6" fill="#93C5FD"/>
  <text x="334" y="480" font-family="Arial,sans-serif" font-size="16" fill="#93C5FD" text-anchor="middle">Client</text>
  <!-- Connection / electricity arc between them -->
  <path d="M464 490 Q512 430 560 490" fill="none" stroke="#FCD34D" stroke-width="6" stroke-linecap="round" stroke-dasharray="14,6"/>
  <circle cx="512" cy="448" r="12" fill="#FCD34D" opacity="0.8"/>
  <!-- Layer 3: Connection status -->
  <circle cx="512" cy="720" r="28" fill="#16A34A" opacity="0.9"/>
  <text x="512" y="729" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle">✓</text>
  <text x="512" y="790" font-family="Arial,sans-serif" font-size="22" fill="#4ADE80" text-anchor="middle">Connected</text>
  <!-- Glow around connection area -->
  <ellipse cx="512" cy="490" rx="120" ry="80" fill="url(#socketGlow)"/>
</svg>
