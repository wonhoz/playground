<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Binary tree root node -->
  <circle cx="512" cy="200" r="54" fill="#4CAF50"/>
  <!-- Root to children lines -->
  <line x1="512" y1="254" x2="320" y2="430" stroke="#2E7D32" stroke-width="20" stroke-linecap="round"/>
  <line x1="512" y1="254" x2="704" y2="430" stroke="#2E7D32" stroke-width="20" stroke-linecap="round"/>
  <!-- Level 2 nodes -->
  <circle cx="320" cy="484" r="46" fill="#4CAF50"/>
  <circle cx="704" cy="484" r="46" fill="#4CAF50"/>
  <!-- Level 2 to 3 lines -->
  <line x1="320" y1="530" x2="200" y2="690" stroke="#2E7D32" stroke-width="16" stroke-linecap="round"/>
  <line x1="320" y1="530" x2="430" y2="690" stroke="#2E7D32" stroke-width="16" stroke-linecap="round"/>
  <line x1="704" y1="530" x2="594" y2="690" stroke="#2E7D32" stroke-width="16" stroke-linecap="round"/>
  <line x1="704" y1="530" x2="824" y2="690" stroke="#2E7D32" stroke-width="16" stroke-linecap="round"/>
  <!-- Level 3 nodes -->
  <circle cx="200" cy="730" r="36" fill="#2E7D32"/>
  <circle cx="430" cy="730" r="36" fill="#2E7D32"/>
  <circle cx="594" cy="730" r="36" fill="#2E7D32"/>
  <circle cx="824" cy="730" r="36" fill="#2E7D32"/>
  <!-- Level 4 leaf lines -->
  <line x1="200" y1="766" x2="160" y2="870" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="766" x2="240" y2="870" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="824" y1="766" x2="784" y2="870" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="824" y1="766" x2="864" y2="870" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
</svg>