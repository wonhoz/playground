<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 사전 + 격자 — 단어 찾기 레퍼런스 | 레이어드 | #200000 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#200000"/>
  <!-- Layer 2: Open dictionary -->
  <!-- Dictionary book base -->
  <rect x="160" y="240" width="704" height="480" rx="12" fill="#3A1A1A" stroke="#8B4444" stroke-width="4"/>
  <!-- Spine -->
  <rect x="488" y="240" width="48" height="480" fill="#5A2A2A"/>
  <!-- Left page -->
  <rect x="174" y="254" width="300" height="452" rx="4" fill="#FAF0E8"/>
  <!-- Right page -->
  <rect x="550" y="254" width="300" height="452" rx="4" fill="#FAF0E8"/>
  <!-- Left page: Dictionary entries -->
  <text x="200" y="290" font-family="serif" font-size="14" fill="#1A0000" font-weight="bold">CROSS·WORD</text>
  <rect x="196" y="295" width="260" height="1" fill="#8B4444"/>
  <text x="200" y="312" font-family="serif" font-size="10" fill="#3A1A00" font-style="italic">n. [크로스워드]</text>
  <text x="200" y="326" font-family="serif" font-size="10" fill="#3A1A00">가로세로 낱말 퀴즐; 격자</text>
  <text x="200" y="340" font-family="serif" font-size="10" fill="#3A1A00">안에 단어를 채워 넣는 게임.</text>
  <rect x="196" y="350" width="260" height="1" fill="#D4C4B4"/>
  <text x="200" y="368" font-family="serif" font-size="14" fill="#1A0000" font-weight="bold">CLUE</text>
  <rect x="196" y="373" width="260" height="1" fill="#8B4444"/>
  <text x="200" y="390" font-family="serif" font-size="10" fill="#3A1A00" font-style="italic">n. [단서]</text>
  <text x="200" y="404" font-family="serif" font-size="10" fill="#3A1A00">퍼즐 해결의 열쇠; 힌트.</text>
  <rect x="196" y="418" width="260" height="1" fill="#D4C4B4"/>
  <text x="200" y="436" font-family="serif" font-size="14" fill="#1A0000" font-weight="bold">GRID</text>
  <rect x="196" y="441" width="260" height="1" fill="#8B4444"/>
  <text x="200" y="458" font-family="serif" font-size="10" fill="#3A1A00" font-style="italic">n. [격자]</text>
  <text x="200" y="472" font-family="serif" font-size="10" fill="#3A1A00">가로 세로 선의 교차.</text>
  <!-- Page numbers -->
  <text x="324" y="690" font-family="serif" font-size="12" fill="#8B6868" text-anchor="middle">47</text>
  <!-- Right page: Mini crossword grid -->
  <text x="700" y="290" font-family="Arial,sans-serif" font-size="14" fill="#3A1A00" text-anchor="middle" font-weight="bold">낱말 퍼즐</text>
  <!-- 5×5 crossword grid -->
  <!-- Grid cells -->
  <rect x="570" y="310" width="44" height="44" fill="#1A0000" rx="2"/>
  <rect x="616" y="310" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="662" y="310" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="708" y="310" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="754" y="310" width="44" height="44" fill="#1A0000" rx="2"/>
  <rect x="570" y="356" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="616" y="356" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="662" y="356" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="708" y="356" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="754" y="356" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="570" y="402" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="616" y="402" width="44" height="44" fill="#1A0000" rx="2"/>
  <rect x="662" y="402" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="708" y="402" width="44" height="44" fill="#1A0000" rx="2"/>
  <rect x="754" y="402" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="570" y="448" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="616" y="448" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="662" y="448" width="44" height="44" fill="#FF6666" stroke="#FF4444" stroke-width="2"/>
  <rect x="708" y="448" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <rect x="754" y="448" width="44" height="44" fill="#FAF0E8" stroke="#8B4444" stroke-width="1"/>
  <!-- Letters in grid -->
  <text x="638" y="342" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">W</text>
  <text x="684" y="342" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">O</text>
  <text x="730" y="342" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">R</text>
  <text x="592" y="388" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">C</text>
  <text x="638" y="388" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">R</text>
  <text x="684" y="388" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">O</text>
  <text x="730" y="388" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">S</text>
  <text x="776" y="388" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">S</text>
  <text x="592" y="434" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">L</text>
  <text x="684" y="434" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">D</text>
  <text x="776" y="434" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">W</text>
  <text x="592" y="480" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">U</text>
  <text x="638" y="480" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">E</text>
  <text x="684" y="480" font-family="monospace" font-size="24" fill="#FF2222" text-anchor="middle" font-weight="bold">?</text>
  <text x="730" y="480" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">R</text>
  <text x="776" y="480" font-family="monospace" font-size="24" fill="#1A0000" text-anchor="middle" font-weight="bold">D</text>
  <!-- Right page number -->
  <text x="700" y="690" font-family="serif" font-size="12" fill="#8B6868" text-anchor="middle">48</text>
  <!-- Layer 3: Book shadow and binding detail -->
  <line x1="488" y1="256" x2="488" y2="718" stroke="#8B4444" stroke-width="2" opacity="0.5"/>
  <line x1="536" y1="256" x2="536" y2="718" stroke="#8B4444" stroke-width="2" opacity="0.5"/>
</svg>
