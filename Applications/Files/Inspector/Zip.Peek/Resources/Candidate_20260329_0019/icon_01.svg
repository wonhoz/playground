  <!-- Images inside -->
  <rect x="86" y="444" width="852" height="40" fill="#FFFDE7" rx="4"/>
  <text x="228" y="464" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">🖼  banner.png</text>
  <text x="632" y="464" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">5.2 MB</text>
  <text x="732" y="464" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">4.8 MB</text>
  <text x="852" y="464" font-family="Consolas, monospace" font-size="18" fill="#F9A825"
        dominant-baseline="middle">8%</text>

  <rect x="86" y="486" width="852" height="40" rx="4"/>
  <text x="228" y="506" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">🖼  icon.ico</text>
  <text x="632" y="506" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
        dominant-baseline="middle">256 KB</text>

  <!-- More rows (faded) -->
  <rect x="86" y="528" width="852" height="40" fill="#FAFAFA" rx="4"/>
  <text x="148" y="548" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">📄  README.md</text>
  <text x="632" y="548" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
