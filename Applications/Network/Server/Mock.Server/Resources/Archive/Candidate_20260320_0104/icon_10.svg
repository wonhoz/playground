<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_10: 메아리 서버 (echo: mock echo response) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050510"/>
  <!-- 서버 본체 -->
  <rect x="340" y="360" width="344" height="280" rx="30" fill="#283593"/>
  <!-- 서버 슬롯 -->
  <rect x="380" y="400" width="264" height="28" rx="8" fill="#050510" opacity="0.5"/>
  <rect x="380" y="448" width="264" height="28" rx="8" fill="#050510" opacity="0.5"/>
  <rect x="380" y="496" width="264" height="28" rx="8" fill="#050510" opacity="0.5"/>
  <!-- 서버 LED -->
  <circle cx="600" cy="414" r="10" fill="#5C6BC0"/>
  <circle cx="600" cy="462" r="10" fill="#5C6BC0" opacity="0.5"/>
  <circle cx="600" cy="510" r="10" fill="#5C6BC0" opacity="0.3"/>
  <!-- 메아리 파동 (왼쪽으로 퍼짐) -->
  <path d="M340 500 Q280 500 240 460" fill="none" stroke="#5C6BC0" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M340 500 Q250 500 190 440" fill="none" stroke="#5C6BC0" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  <path d="M340 500 Q220 500 160 430" fill="none" stroke="#5C6BC0" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <!-- 화살표 반사 (오른쪽에서 왼쪽으로) -->
  <!-- 입력 화살표 -->
  <line x1="780" y1="440" x2="684" y2="440" stroke="#5C6BC0" stroke-width="10" stroke-linecap="round"/>
  <polygon points="684,420 644,440 684,460" fill="#5C6BC0"/>
  <!-- 출력 화살표 (반사) -->
  <line x1="684" y1="560" x2="780" y2="560" stroke="#5C6BC0" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <polygon points="780,540 820,560 780,580" fill="#5C6BC0" opacity="0.7"/>
  <!-- 메아리 점 (점점 작아짐) -->
  <circle cx="190" cy="680" r="18" fill="#5C6BC0" opacity="0.5"/>
  <circle cx="280" cy="700" r="14" fill="#5C6BC0" opacity="0.6"/>
  <circle cx="360" cy="710" r="10" fill="#5C6BC0" opacity="0.7"/>
</svg>
