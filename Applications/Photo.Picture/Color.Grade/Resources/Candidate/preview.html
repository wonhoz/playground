<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Color.Grade — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    p  { color: #888; margin-bottom: 28px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #333; }
    .card img { width: 128px; height: 128px; border-radius: 16px; }
    .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Color.Grade — 아이콘 후보 10개</h1>
  <p>사진 색상 그레이딩 도구 아이콘 후보</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_lut_spectrum_dark.svg"/><span>01 · lut_spectrum_dark</span></div>
    <div class="card"><img src="candidate_02_color_wheel_vivid.svg"/><span>02 · color_wheel_vivid</span></div>
    <div class="card"><img src="candidate_03_photo_curve_teal.svg"/><span>03 · photo_curve_teal</span></div>
    <div class="card"><img src="candidate_04_film_lut_orange.svg"/><span>04 · film_lut_orange</span></div>
    <div class="card"><img src="candidate_05_palette_brush_purple.svg"/><span>05 · palette_brush_purple</span></div>
    <div class="card"><img src="candidate_06_hsl_sliders_blue.svg"/><span>06 · hsl_sliders_blue</span></div>
    <div class="card"><img src="candidate_07_split_tone_pink.svg"/><span>07 · split_tone_pink</span></div>
    <div class="card"><img src="candidate_08_histogram_green.svg"/><span>08 · histogram_green</span></div>
    <div class="card"><img src="candidate_09_cinematic_gold.svg"/><span>09 · cinematic_gold</span></div>
    <div class="card"><img src="candidate_10_rgb_cube_vivid.svg"/><span>10 · rgb_cube_vivid</span></div>
  </div>
</body>
</html>
