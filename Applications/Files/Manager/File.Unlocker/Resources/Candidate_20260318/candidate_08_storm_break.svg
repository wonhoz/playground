<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="50%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폭풍 구름 -->
  <ellipse cx="256" cy="140" rx="190" ry="80" fill="#1a0a00" opacity="0.9"/>
  <ellipse cx="200" cy="130" rx="80" ry="55" fill="#1e0c00" opacity="0.85"/>
  <ellipse cx="320" cy="125" rx="90" ry="60" fill="#160800" opacity="0.9"/>
  <ellipse cx="256" cy="155" rx="120" ry="50" fill="#1a0a00" opacity="0.8"/>
  <!-- 구름 테두리 -->
  <ellipse cx="256" cy="140" rx="190" ry="80" fill="none" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <!-- 번개 볼트 -->
  <polygon points="270,155 245,255 262,255 235,365 285,240 265,240 293,155" fill="url(#lightningGrad)" opacity="1" filter="url(#boltGlow)"/>
  <!-- 번개 외부 빛 -->
  <polygon points="270,155 245,255 262,255 235,365 285,240 265,240 293,155" fill="none" stroke="#FEF3C7" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <!-- 자물쇠 (번개 아래) -->
  <rect x="196" y="360" width="120" height="90" rx="10" fill="#92400E" opacity="0.85"/>
  <!-- 번개 충격 지점 -->
  <circle cx="256" cy="360" r="25" fill="#FCD34D" opacity="0.6" filter="url(#boltGlow)"/>
  <!-- 잠긴 고리 (부서지는 중) -->
  <path d="M 222,360 L 222,310 Q 222,280 256,280 Q 290,280 290,310 L 290,352" fill="none" stroke="#B45309" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  <!-- 고리 파열 -->
  <circle cx="290" cy="352" r="15" fill="#FBBF24" opacity="0.7" filter="url(#glow)"/>
  <!-- 파편들 -->
  <rect x="305" y="340" width="10" height="6" rx="2" fill="#F59E0B" opacity="0.8" transform="rotate(30)"/>
  <rect x="318" y="330" width="8" height="5" rx="2" fill="#FCD34D" opacity="0.7" transform="rotate(-20 330 330)"/>
  <circle cx="315" cy="365" r="5" fill="#FBBF24" opacity="0.75" filter="url(#glow)"/>
  <circle cx="330" cy="345" r="4" fill="#F59E0B" opacity="0.65"/>
  <!-- 자물쇠 내 구멍 -->
  <circle cx="256" cy="400" r="14" fill="#7C2D12" opacity="0.9"/>
  <rect x="249" y="400" width="14" height="22" rx="3" fill="#7C2D12" opacity="0.9"/>
  <!-- 번개 반사광 -->
  <ellipse cx="256" cy="460" rx="120" ry="15" fill="#F59E0B" opacity="0.06" filter="url(#glow)"/>
  <!-- 사이드 번개들 -->
  <line x1="120" y1="180" x2="160" y2="250" stroke="#F59E0B" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="160" y1="250" x2="145" y2="290" stroke="#FBBF24" stroke-width="2.5" opacity="0.45" stroke-linecap="round"/>
  <line x1="390" y1="175" x2="355" y2="240" stroke="#F59E0B" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  <line x1="355" y1="240" x2="370" y2="285" stroke="#FCD34D" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>