<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background teal -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: Calendar layer + photo frame layer (layered) -->
  <!-- Back layer: Calendar -->
  <rect x="140" y="200" width="600" height="560" rx="24" fill="#00838F" opacity="0.9"/>
  <rect x="140" y="200" width="600" height="90" rx="24" fill="#004D40"/>
  <text x="440" y="258" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#FFFFFF" text-anchor="middle">April</text>
  <!-- Calendar dates -->
  <text x="190" y="360" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">12</text>
  <text x="290" y="360" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">13</text>
  <text x="390" y="360" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">14</text>
  <text x="490" y="360" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">15</text>
  <text x="590" y="360" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">16</text>
  <text x="190" y="450" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">19</text>
  <text x="290" y="450" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">20</text>
  <circle cx="416" cy="430" r="28" fill="#FFD740"/>
  <text x="390" y="450" font-family="Arial, sans-serif" font-size="42" fill="#004D40">21</text>
  <text x="490" y="450" font-family="Arial, sans-serif" font-size="42" fill="#E0F7FA">22</text>
  <!-- Front layer: Photo frame offset -->
  <rect x="284" y="400" width="600" height="480" rx="24" fill="#FFFFFF" opacity="0.97"/>
  <!-- Photo content inside -->
  <polygon points="584 450 484 680 684 680" fill="#00838F" opacity="0.7"/>
  <polygon points="720 420 620 680 820 680" fill="#004D40" opacity="0.8"/>
  <circle cx="484" cy="445" r="50" fill="#FFD740"/>
  <rect x="294" y="680" width="580" height="70" rx="10" fill="#E0F7FA"/>
  <!-- Layer 3: Date badge on photo frame -->
  <rect x="570" y="820" width="280" height="64" rx="14" fill="#004D40"/>
  <text x="710" y="862" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#80DEEA" text-anchor="middle">2026-04-21</text>
</svg>
