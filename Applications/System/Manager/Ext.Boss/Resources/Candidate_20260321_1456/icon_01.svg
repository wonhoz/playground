<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2E4A"/>
      <stop offset="100%" stop-color="#152036"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <g clip-path="url(#clip01)">
    <!-- Layer 2: List row cards -->
    <rect x="130" y="200" width="764" height="108" rx="18" fill="#1E3456"/>
    <rect x="130" y="330" width="764" height="108" rx="18" fill="#1E3456"/>
    <rect x="130" y="460" width="764" height="108" rx="18" fill="#1E3456"/>
    <rect x="130" y="590" width="764" height="108" rx="18" fill="#1E3456"/>

    <!-- Layer 3: Extension labels -->
    <text x="186" y="272" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#6699CC">.pdf</text>
    <text x="186" y="402" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#6699CC">.docx</text>
    <text x="186" y="532" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#6699CC">.xyz</text>
    <text x="186" y="662" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#6699CC">.tmp</text>

    <!-- Status badges -->
    <!-- Row 1: OK -->
    <rect x="710" y="218" width="152" height="72" rx="36" fill="#0E3D22"/>
    <text x="752" y="268" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#50E080">OK</text>

    <!-- Row 2: OK -->
    <rect x="710" y="348" width="152" height="72" rx="36" fill="#0E3D22"/>
    <text x="752" y="398" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#50E080">OK</text>

    <!-- Row 3: Broken -->
    <rect x="668" y="478" width="196" height="72" rx="36" fill="#3D0E0E"/>
    <text x="690" y="528" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FF5555">Broken</text>

    <!-- Row 4: None -->
    <rect x="700" y="608" width="164" height="72" rx="36" fill="#222A35"/>
    <text x="728" y="658" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#607080">None</text>

    <!-- Left accent dots -->
    <circle cx="162" cy="254" r="10" fill="#4488BB"/>
    <circle cx="162" cy="384" r="10" fill="#4488BB"/>
    <circle cx="162" cy="514" r="10" fill="#BB4444"/>
    <circle cx="162" cy="644" r="10" fill="#445566"/>

    <!-- Bottom status summary bar -->
    <rect x="130" y="736" width="764" height="70" rx="18" fill="#111B2E"/>
    <circle cx="200" cy="771" r="14" fill="#50E080"/>
    <text x="226" y="782" font-family="Arial, sans-serif" font-size="28" fill="#50E080">2 OK</text>
    <circle cx="360" cy="771" r="14" fill="#FF5555"/>
    <text x="386" y="782" font-family="Arial, sans-serif" font-size="28" fill="#FF5555">1 Broken</text>
    <circle cx="580" cy="771" r="14" fill="#607080"/>
    <text x="606" y="782" font-family="Arial, sans-serif" font-size="28" fill="#607080">1 None</text>
  </g>
</svg>
