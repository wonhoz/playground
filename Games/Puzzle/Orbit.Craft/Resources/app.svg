<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a0f2e"/>
      <stop offset="100%" style="stop-color:#010208"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </radialGradient>
    <radialGradient id="moon1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </radialGradient>
    <radialGradient id="moon2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="160" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="180" cy="50" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="450" cy="200" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="350" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="470" cy="400" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="460" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="130" cy="440" r="1" fill="#fff" opacity="0.4"/>
  <!-- Orbital paths -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="#5eead430" stroke-width="2" transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="110" ry="40" fill="none" stroke="#c084fc30" stroke-width="1.5" transform="rotate(30 256 256)"/>
  <!-- Central planet -->
  <circle cx="256" cy="256" r="54" fill="url(#planet)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="80" ry="18" fill="none" stroke="#5eead470" stroke-width="6" transform="rotate(-15 256 256)"/>
  <!-- Orbiting moon 1 -->
  <circle cx="370" cy="210" r="18" fill="url(#moon1)" filter="url(#sm)"/>
  <!-- Orbiting moon 2 -->
  <circle cx="160" cy="310" r="14" fill="url(#moon2)" filter="url(#sm)"/>
  <!-- Craft icon -->
  <polygon points="430,130 415,155 445,155" fill="#ffffff80" filter="url(#sm)"/>
  <rect x="420" y="155" width="20" height="12" rx="3" fill="#ffffff60"/>
  <!-- Trajectory dashes -->
  <path d="M430,130 Q450,200 380,210" stroke="#ffffff30" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
</svg>
