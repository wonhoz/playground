<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#0A0500"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speedometer arc background -->
  <path d="M 80 320 A 180 180 0 0 1 432 320" fill="none" stroke="#1A0A00" stroke-width="40"/>
  <!-- Colored zones: green->yellow->red -->
  <path d="M 80 320 A 180 180 0 0 1 190 148" fill="none" stroke="#2ECC71" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 190 148 A 180 180 0 0 1 322 148" fill="none" stroke="#F39C12" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 322 148 A 180 180 0 0 1 432 320" fill="none" stroke="#E74C3C" stroke-width="36" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Tick marks -->
  <line x1="256" y1="140" x2="256" y2="160" stroke="#FFF" stroke-width="4" opacity="0.6"/>
  <line x1="142" y1="200" x2="155" y2="215" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <line x1="370" y1="200" x2="357" y2="215" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <line x1="100" y1="310" x2="122" y2="310" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <line x1="412" y1="310" x2="390" y2="310" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <!-- Needle (pointing ~60% = about 30deg past center) -->
  <line x1="256" y1="290" x2="300" y2="170" stroke="url(#needle)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="290" r="18" fill="#1A0A00" stroke="#FF4500" stroke-width="4"/>
  <circle cx="256" cy="290" r="7" fill="#FF4500"/>
  <!-- Value -->
  <text x="256" y="380" text-anchor="middle" font-family="Segoe UI" font-size="52" font-weight="700" fill="#FF4500" filter="url(#glow)">72</text>
  <text x="256" y="418" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#888">% CPU USAGE</text>
  <text x="256" y="460" text-anchor="middle" font-family="Segoe UI" font-size="20" fill="#555" letter-spacing="3">TRAY STATS</text>
</svg>
