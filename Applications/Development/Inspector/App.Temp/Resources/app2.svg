<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <radialGradient id="bubbleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.85"/>
      <stop offset="60%" style="stop-color:#90CAF9" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#42A5F5" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="30%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow04">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#1565C0" flood-opacity="0.25"/>
    </filter>
    <filter id="appShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#BF360C" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg04)" rx="120"/>

  <!-- Floating smaller bubbles -->
  <circle cx="200" cy="300" r="70" fill="url(#bubbleGrad)" stroke="#90CAF9" stroke-width="8" opacity="0.7"/>
  <circle cx="820" cy="250" r="50" fill="url(#bubbleGrad)" stroke="#90CAF9" stroke-width="6" opacity="0.6"/>
  <circle cx="840" cy="760" r="65" fill="url(#bubbleGrad)" stroke="#90CAF9" stroke-width="7" opacity="0.65"/>

  <!-- Layer 2: Main bubble (sandbox) -->
  <g filter="url(#shadow04)">
    <circle cx="512" cy="490" r="290" fill="url(#bubbleGrad)" stroke="#1E88E5" stroke-width="22"/>
    <!-- Shine highlight -->
    <circle cx="420" cy="360" r="120" fill="url(#shineGrad)"/>
  </g>

  <!-- Layer 3: App icon inside bubble -->
  <g filter="url(#appShadow)">
    <rect x="390" y="390" width="244" height="200" rx="24" fill="#FF7043"/>
    <polygon points="570,390 634,390 634,454 570,454" fill="#BF360C"/>
    <text x="512" y="500" font-family="Arial,sans-serif" font-size="66" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">.EXE</text>
  </g>

  <!-- Bubble highlight arc (top) -->
  <path d="M300 340 Q420 230 620 300" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="18" stroke-linecap="round"/>

  <!-- ISOLATED label -->
  <rect x="288" y="830" width="448" height="78" rx="39" fill="rgba(30,136,229,0.82)"/>
  <text x="512" y="873" font-family="Arial,sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">ISOLATED</text>
</svg>
