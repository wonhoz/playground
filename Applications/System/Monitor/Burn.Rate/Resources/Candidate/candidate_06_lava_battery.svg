<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#330A00"/>
    </linearGradient>
    <linearGradient id="lava" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="40%" stop-color="#FF4500"/>
      <stop offset="80%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Battery outline -->
  <rect x="120" y="130" width="260" height="220" rx="16" fill="#0A0000" stroke="#440000" stroke-width="3"/>
  <rect x="380" y="175" width="26" height="130" rx="6" fill="#330000"/>
  <!-- Lava fill (hot burn) -->
  <clipPath id="batClip">
    <rect x="120" y="130" width="260" height="220" rx="16"/>
  </clipPath>
  <rect x="128" y="220" width="244" height="122" rx="10" fill="url(#lava)" clip-path="url(#batClip)"/>
  <!-- Lava surface bubbles/waves -->
  <path d="M128 220 Q168 208 208 220 Q248 232 288 220 Q328 208 372 220 L372 225 Q328 213 288 225 Q248 237 208 225 Q168 213 128 225 Z" fill="#FF6600" opacity="0.7" clip-path="url(#batClip)"/>
  <!-- Bubbles -->
  <circle cx="170" cy="240" r="8" fill="#FF8800" opacity="0.6"/>
  <circle cx="240" cy="258" r="6" fill="#FFA500" opacity="0.5"/>
  <circle cx="320" cy="245" r="9" fill="#FF6600" opacity="0.6"/>
  <!-- Level indicator -->
  <text x="255" y="200" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">55%</text>
  <!-- Heat warning -->
  <text x="256" y="412" font-family="Arial" font-size="20" fill="#FF4500" text-anchor="middle">CRITICAL HEAT</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8C00" text-anchor="middle">Burn.Rate</text>
</svg>
