  <rect x="558" y="532" width="12" height="24" rx="3" fill="#CFD8DC" opacity="0.7"/>
  <rect x="576" y="538" width="12" height="18" rx="3" fill="#ECEFF1" opacity="0.7"/>
  <!-- 중앙 구분선 -->
