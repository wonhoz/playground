<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
<!-- 컨셉: 망치 + 렌치 제작 (바로가기 생성) -->
<!-- 렌치 -->
<path d="M 340 280 Q 290 240 260 260 Q 230 280 250 320 Q 270 360 310 360 L 600 660 Q 620 680 640 680 Q 680 680 680 640 Q 680 620 660 600 Z" fill="#1565C0"/>
<path d="M 340 280 Q 290 240 260 260 Q 230 280 250 320 Q 270 360 310 360 L 600 660 Q 620 680 640 680 Q 680 680 680 640 Q 680 620 660 600 Z" fill="none" stroke="#42A5F5" stroke-width="16"/>
<!-- 렌치 머리 구멍 -->
<circle cx="295" cy="300" r="36" fill="#000A14"/>
<!-- 망치 -->
<rect x="560" y="200" width="200" height="120" rx="20" fill="#42A5F5"/>
<rect x="580" y="216" width="160" height="88" rx="14" fill="#000A14" opacity="0.3"/>
<!-- 망치 손잡이 -->
<line x1="620" y1="320" x2="400" y2="680" stroke="#42A5F5" stroke-width="40" stroke-linecap="round"/>
<!-- 바로가기 화살표 심볼 (중앙) -->
<path d="M 450 500 L 580 500 M 540 450 L 590 500 L 540 550" fill="none" stroke="#1565C0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
<!-- 불꽃 파편 -->
<circle cx="600" cy="240" r="14" fill="#42A5F5" opacity="0.6"/>
<circle cx="640" cy="210" r="10" fill="#1565C0" opacity="0.7"/>
<circle cx="680" cy="250" r="8" fill="#42A5F5" opacity="0.5"/>
</svg>
