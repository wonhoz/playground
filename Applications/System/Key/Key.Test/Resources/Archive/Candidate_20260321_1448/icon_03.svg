    <clipPath id="c3kt"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3kt)"/>
  <circle cx="820" cy="820" r="300" fill="#A5D6A7" opacity="0.3" clip-path="url(#c3kt)"/>
