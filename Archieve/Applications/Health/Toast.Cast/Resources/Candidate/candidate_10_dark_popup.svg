<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <linearGradient id="toast" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Desktop window mockup -->
  <rect x="56" y="72" width="400" height="256" rx="16" fill="url(#toast)" stroke="#333" stroke-width="4"/>
  <!-- Window titlebar -->
  <rect x="56" y="72" width="400" height="32" rx="16" fill="#111122"/>
  <rect x="56" y="88" width="400" height="16" fill="#111122"/>
  <circle cx="84" cy="88" r="8" fill="#FF5F57"/>
  <circle cx="108" cy="88" r="8" fill="#FEBC2E"/>
  <circle cx="132" cy="88" r="8" fill="#28C840"/>
  <!-- Desktop content lines -->
  <rect x="80" y="128" width="352" height="12" rx="6" fill="#333" opacity="0.6"/>
  <rect x="80" y="152" width="280" height="10" rx="5" fill="#333" opacity="0.5"/>
  <rect x="80" y="172" width="320" height="10" rx="5" fill="#333" opacity="0.4"/>
  <rect x="80" y="192" width="260" height="10" rx="5" fill="#333" opacity="0.4"/>
  <rect x="80" y="212" width="300" height="10" rx="5" fill="#333" opacity="0.3"/>
  <!-- Toast notification popup -->
  <rect x="256" y="272" width="224" height="120" rx="16" fill="#1E1E36" stroke="url(#accent)" stroke-width="4"/>
  <!-- Left accent bar -->
  <rect x="256" y="278" width="6" height="108" rx="3" fill="url(#accent)"/>
  <!-- App icon in notification -->
  <circle cx="288" cy="312" r="20" fill="#7C4DFF" opacity="0.9"/>
  <text x="288" y="319" text-anchor="middle" font-size="18" fill="white">!</text>
  <!-- Toast text -->
  <rect x="318" y="288" width="140" height="10" rx="5" fill="#E0E0E0" opacity="0.9"/>
  <rect x="318" y="306" width="112" height="8" rx="4" fill="#9E9E9E" opacity="0.7"/>
  <rect x="318" y="320" width="128" height="8" rx="4" fill="#9E9E9E" opacity="0.6"/>
  <rect x="318" y="334" width="96" height="8" rx="4" fill="#9E9E9E" opacity="0.5"/>
  <!-- Action buttons -->
  <rect x="318" y="356" width="64" height="24" rx="8" fill="#7C4DFF" opacity="0.8"/>
  <rect x="326" y="362" width="48" height="8" rx="4" fill="#EDE7F6" opacity="0.9"/>
  <rect x="394" y="356" width="64" height="24" rx="8" fill="#333355" stroke="#555" stroke-width="2"/>
  <rect x="402" y="362" width="48" height="8" rx="4" fill="#9E9E9E" opacity="0.7"/>
  <!-- Progress bar at bottom of toast -->
  <rect x="262" y="382" width="212" height="4" rx="2" fill="#333355"/>
  <rect x="262" y="382" width="96" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
  <!-- Taskbar at bottom of screen -->
  <rect x="56" y="340" width="400" height="44" rx="16" fill="#111122" stroke="#222" stroke-width="3"/>
  <circle cx="256" cy="362" r="12" fill="#7C4DFF" opacity="0.7"/>
  <circle cx="208" cy="362" r="12" fill="#333" opacity="0.6"/>
  <circle cx="160" cy="362" r="12" fill="#333" opacity="0.6"/>
  <circle cx="304" cy="362" r="12" fill="#333" opacity="0.6"/>
  <circle cx="352" cy="362" r="12" fill="#333" opacity="0.6"/>
  <!-- Tray area -->
  <rect x="388" y="354" width="60" height="16" rx="4" fill="#222"/>
  <rect x="392" y="358" width="52" height="7" rx="3" fill="#555" opacity="0.7"/>
  <!-- Health figure small -->
  <circle cx="256" cy="436" r="28" fill="#7C4DFF" opacity="0.8"/>
  <circle cx="256" cy="424" r="10" fill="#EDE7F6"/>
  <line x1="256" y1="434" x2="256" y2="456" stroke="#EDE7F6" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="442" x2="242" y2="434" stroke="#EDE7F6" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="442" x2="270" y2="434" stroke="#EDE7F6" stroke-width="6" stroke-linecap="round"/>
</svg>
