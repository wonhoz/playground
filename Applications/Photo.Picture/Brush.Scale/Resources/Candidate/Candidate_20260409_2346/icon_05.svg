<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 큰 픽셀→작은 픽셀 (해상도 증가) | 기하학 추상 | 라임+파스텔 -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FFE8"/>
      <stop offset="100%" stop-color="#CCFF99"/>
    </linearGradient>
    <linearGradient id="arrowGrad05" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76C442"/>
      <stop offset="100%" stop-color="#33AA44"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 라임 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: 좌측 — 큰 픽셀 블록 (저해상도) -->
  <!-- 3×3 큰 블록 -->
  <rect x="90"  y="220" width="130" height="130" rx="10" fill="#A5D6A7"/>
  <rect x="228" y="220" width="130" height="130" rx="10" fill="#80CBC4"/>
  <rect x="366" y="220" width="130" height="130" rx="10" fill="#FFE082"/>
  <rect x="90"  y="358" width="130" height="130" rx="10" fill="#FFCC80"/>
  <rect x="228" y="358" width="130" height="130" rx="10" fill="#EF9A9A"/>
  <rect x="366" y="358" width="130" height="130" rx="10" fill="#CE93D8"/>
  <rect x="90"  y="496" width="130" height="130" rx="10" fill="#80DEEA"/>
  <rect x="228" y="496" width="130" height="130" rx="10" fill="#A5D6A7"/>
  <rect x="366" y="496" width="130" height="130" rx="10" fill="#FFE082"/>

  <!-- LOW RES 라벨 -->
  <text x="258" y="700" font-family="Arial Black, sans-serif" font-size="64" font-weight="900"
        fill="#66BB6A" text-anchor="middle" opacity="0.85">LOW</text>

  <!-- Layer 3: 중앙 화살표 (→) -->
  <polygon points="512,440 590,370 590,420 920,420 920,480 590,480 590,530" fill="url(#arrowGrad05)"/>

  <!-- Layer 2: 우측 — 작은 픽셀 격자 (고해상도) -->
  <!-- 6×6 작은 블록 -->
  <!-- Row 1 -->
  <rect x="640" y="220" width="58" height="58" rx="5" fill="#A5D6A7"/>
  <rect x="704" y="220" width="58" height="58" rx="5" fill="#80CBC4"/>
  <rect x="768" y="220" width="58" height="58" rx="5" fill="#FFE082"/>
  <rect x="832" y="220" width="58" height="58" rx="5" fill="#A5D6A7"/>
  <rect x="640" y="284" width="58" height="58" rx="5" fill="#FFCC80"/>
  <rect x="704" y="284" width="58" height="58" rx="5" fill="#EF9A9A"/>
  <rect x="768" y="284" width="58" height="58" rx="5" fill="#CE93D8"/>
  <rect x="832" y="284" width="58" height="58" rx="5" fill="#80DEEA"/>
  <!-- Row 2 -->
  <rect x="640" y="348" width="58" height="58" rx="5" fill="#80DEEA"/>
  <rect x="704" y="348" width="58" height="58" rx="5" fill="#A5D6A7"/>
  <rect x="768" y="348" width="58" height="58" rx="5" fill="#FFE082"/>
  <rect x="832" y="348" width="58" height="58" rx="5" fill="#FFCC80"/>
  <rect x="640" y="412" width="58" height="58" rx="5" fill="#CE93D8"/>
  <rect x="704" y="412" width="58" height="58" rx="5" fill="#80CBC4"/>
  <rect x="768" y="412" width="58" height="58" rx="5" fill="#EF9A9A"/>
  <rect x="832" y="412" width="58" height="58" rx="5" fill="#A5D6A7"/>
  <!-- Row 3 -->
  <rect x="640" y="476" width="58" height="58" rx="5" fill="#FFE082"/>
  <rect x="704" y="476" width="58" height="58" rx="5" fill="#FFCC80"/>
  <rect x="768" y="476" width="58" height="58" rx="5" fill="#80DEEA"/>
  <rect x="832" y="476" width="58" height="58" rx="5" fill="#CE93D8"/>
  <rect x="640" y="540" width="58" height="58" rx="5" fill="#A5D6A7"/>
  <rect x="704" y="540" width="58" height="58" rx="5" fill="#EF9A9A"/>
  <rect x="768" y="540" width="58" height="58" rx="5" fill="#80CBC4"/>
  <rect x="832" y="540" width="58" height="58" rx="5" fill="#FFE082"/>

  <!-- HIGH RES 라벨 -->
  <text x="756" y="700" font-family="Arial Black, sans-serif" font-size="56" font-weight="900"
        fill="#33AA44" text-anchor="middle" opacity="0.85">HIGH</text>

  <!-- 하단 배율 텍스트 -->
  <text x="512" y="870" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
        fill="#2E8B2E" text-anchor="middle">AI UPSCALE</text>
</svg>
