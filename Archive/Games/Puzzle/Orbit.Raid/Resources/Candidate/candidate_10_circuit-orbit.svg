<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050520"/>
      <stop offset="100%" stop-color="#100530"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit orbit paths -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#2233aa" stroke-width="2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#1a2266" stroke-width="2"/>
  <!-- Circuit nodes on outer orbit -->
  <rect x="390" y="244" width="24" height="24" rx="4" fill="#4466ff" stroke="#6688ff" stroke-width="2"/>
  <rect x="244" y="84" width="24" height="24" rx="4" fill="#6644ff" stroke="#8866ff" stroke-width="2"/>
  <rect x="90" y="244" width="24" height="24" rx="4" fill="#4466ff" stroke="#6688ff" stroke-width="2"/>
  <rect x="244" y="404" width="24" height="24" rx="4" fill="#6644ff" stroke="#8866ff" stroke-width="2"/>
  <!-- Circuit traces -->
  <line x1="390" y1="256" x2="366" y2="256" stroke="#4466ff" stroke-width="2"/>
  <line x1="256" y1="96" x2="256" y2="120" stroke="#6644ff" stroke-width="2"/>
  <line x1="114" y1="256" x2="146" y2="256" stroke="#4466ff" stroke-width="2"/>
  <line x1="256" y1="404" x2="256" y2="380" stroke="#6644ff" stroke-width="2"/>
  <!-- Enemy raid nodes (red) -->
  <circle cx="370" cy="150" r="14" fill="#ff4444" stroke="#ff6666" stroke-width="2"/>
  <circle cx="145" cy="150" r="12" fill="#ff6633" stroke="#ff8855" stroke-width="2"/>
  <circle cx="380" cy="370" r="12" fill="#ff4466" stroke="#ff6688" stroke-width="2"/>
  <!-- Attack vectors -->
  <line x1="370" y1="150" x2="330" y2="196" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="145" y1="150" x2="185" y2="196" stroke="#ff6633" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Planet core (puzzle element) -->
  <circle cx="256" cy="256" r="45" fill="#1a0a3a" stroke="#8844ff" stroke-width="3"/>
  <text x="256" y="264" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8844ff">RAID</text>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#6644ff">ORBIT.RAID</text>
</svg>
