<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082808"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="histR" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
    <linearGradient id="histG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <linearGradient id="histB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2979FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Photo preview top -->
  <rect x="108" y="118" width="296" height="130" rx="10" fill="#0A1A0A"/>
  <rect x="108" y="118" width="148" height="130" rx="10" fill="#1B5E20" opacity="0.4"/>
  <rect x="256" y="118" width="148" height="130" rx="10" fill="#4CAF50" opacity="0.25"/>
  <!-- Histogram area -->
  <rect x="108" y="270" width="296" height="190" rx="10" fill="#050F05"/>
  <rect x="108" y="270" width="296" height="190" rx="10" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="182" y1="278" x2="182" y2="452" stroke="#1B5E20" stroke-width="1" opacity="0.5"/>
  <line x1="256" y1="278" x2="256" y2="452" stroke="#1B5E20" stroke-width="1" opacity="0.5"/>
  <line x1="330" y1="278" x2="330" y2="452" stroke="#1B5E20" stroke-width="1" opacity="0.5"/>
  <!-- Red channel histogram bars -->
  <rect x="112" y="400" width="12" height="44" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="128" y="370" width="12" height="74" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="144" y="340" width="12" height="104" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="160" y="310" width="12" height="134" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="176" y="330" width="12" height="114" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="192" y="350" width="12" height="94" rx="2" fill="url(#histR)" opacity="0.7"/>
  <rect x="208" y="380" width="12" height="64" rx="2" fill="url(#histR)" opacity="0.7"/>
  <!-- Green channel -->
  <rect x="220" y="390" width="12" height="54" rx="2" fill="url(#histG)" opacity="0.7"/>
  <rect x="236" y="350" width="12" height="94" rx="2" fill="url(#histG)" opacity="0.7"/>
  <rect x="252" y="300" width="12" height="144" rx="2" fill="url(#histG)" opacity="0.7"/>
  <rect x="268" y="320" width="12" height="124" rx="2" fill="url(#histG)" opacity="0.7"/>
  <rect x="284" y="360" width="12" height="84" rx="2" fill="url(#histG)" opacity="0.7"/>
  <!-- Blue channel -->
  <rect x="308" y="410" width="12" height="34" rx="2" fill="url(#histB)" opacity="0.7"/>
  <rect x="324" y="360" width="12" height="84" rx="2" fill="url(#histB)" opacity="0.7"/>
  <rect x="340" y="320" width="12" height="124" rx="2" fill="url(#histB)" opacity="0.7"/>
  <rect x="356" y="340" width="12" height="104" rx="2" fill="url(#histB)" opacity="0.7"/>
  <rect x="372" y="380" width="12" height="64" rx="2" fill="url(#histB)" opacity="0.7"/>
</svg>
