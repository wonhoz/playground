<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#0D0820"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FA8DA"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#7986CB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Calendar base -->
  <rect x="76" y="100" width="240" height="220" rx="16" fill="#1A1040" stroke="url(#indigo)" stroke-width="4"/>
  <!-- Calendar header -->
  <rect x="76" y="100" width="240" height="52" rx="16" fill="url(#indigo)" opacity="0.7"/>
  <rect x="76" y="130" width="240" height="22" fill="url(#indigo)" opacity="0.7"/>
  <!-- Calendar rings -->
  <rect x="136" y="82" width="16" height="40" rx="6" fill="url(#play)"/>
  <rect x="264" y="82" width="16" height="40" rx="6" fill="url(#play)"/>
  <!-- Day grid -->
  <g fill="url(#play)" opacity="0.5">
    <rect x="96" y="172" width="22" height="22" rx="3"/>
    <rect x="128" y="172" width="22" height="22" rx="3"/>
    <rect x="160" y="172" width="22" height="22" rx="3"/>
    <rect x="192" y="172" width="22" height="22" rx="3"/>
    <rect x="224" y="172" width="22" height="22" rx="3" fill="#7986CB"/>
    <rect x="96" y="204" width="22" height="22" rx="3"/>
    <rect x="128" y="204" width="22" height="22" rx="3"/>
    <rect x="160" y="204" width="22" height="22" rx="3" fill="#7986CB"/>
    <rect x="192" y="204" width="22" height="22" rx="3"/>
    <rect x="96" y="236" width="22" height="22" rx="3"/>
    <rect x="128" y="236" width="22" height="22" rx="3"/>
  </g>
  <!-- Cast / Play button large -->
  <circle cx="360" cy="320" r="120" fill="#1A1040" stroke="url(#indigo)" stroke-width="8"/>
  <polygon points="336,276 336,364 424,320" fill="url(#play)"/>
  <!-- Broadcast signal from play button -->
  <g fill="none" stroke="url(#indigo)" stroke-linecap="round" opacity="0.5">
    <path d="M 288 270 A 80 80 0 0 1 432 270" stroke-width="8"/>
    <path d="M 306 288 A 60 60 0 0 1 414 288" stroke-width="7"/>
  </g>
</svg>
