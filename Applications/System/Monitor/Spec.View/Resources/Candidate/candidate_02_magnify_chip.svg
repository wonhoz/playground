<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0d2e"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </radialGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#4a148c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chip in background -->
  <rect x="80" y="80" width="260" height="260" rx="16" fill="#1a1040" stroke="#7b1fa2" stroke-width="2" opacity="0.8"/>
  <rect x="108" y="108" width="204" height="204" rx="8" fill="#0d0828"/>
  <rect x="128" y="128" width="80" height="80" rx="6" fill="#1a0a30" stroke="#ab47bc" stroke-width="1"/>
  <rect x="220" y="128" width="80" height="80" rx="6" fill="#1a0a30" stroke="#ab47bc" stroke-width="1"/>
  <rect x="128" y="220" width="80" height="80" rx="6" fill="#1a0a30" stroke="#ab47bc" stroke-width="1"/>
  <rect x="220" y="220" width="80" height="80" rx="6" fill="#1a0a30" stroke="#ab47bc" stroke-width="1"/>
  <!-- Chip pins -->
  <line x1="128" y1="80" x2="128" y2="108" stroke="#ab47bc" stroke-width="4"/>
  <line x1="168" y1="80" x2="168" y2="108" stroke="#ab47bc" stroke-width="4"/>
  <line x1="210" y1="80" x2="210" y2="108" stroke="#ab47bc" stroke-width="4"/>
  <line x1="250" y1="80" x2="250" y2="108" stroke="#ab47bc" stroke-width="4"/>
  <line x1="290" y1="80" x2="290" y2="108" stroke="#ab47bc" stroke-width="4"/>
  <!-- Magnifying glass -->
  <circle cx="320" cy="320" r="130" fill="url(#lens)" stroke="#ce93d8" stroke-width="8"/>
  <circle cx="320" cy="320" r="122" fill="none" stroke="#9c27b0" stroke-width="2" opacity="0.4"/>
  <!-- Handle -->
  <line x1="415" y1="415" x2="460" y2="460" stroke="#7b1fa2" stroke-width="18" stroke-linecap="round"/>
  <!-- Zoomed content in lens -->
  <rect x="250" y="255" width="40" height="40" rx="4" fill="#7b1fa2" opacity="0.6"/>
  <rect x="300" y="255" width="40" height="40" rx="4" fill="#4a148c" opacity="0.5"/>
  <rect x="250" y="305" width="40" height="40" rx="4" fill="#4a148c" opacity="0.5"/>
  <rect x="300" y="305" width="40" height="40" rx="4" fill="#7b1fa2" opacity="0.6"/>
</svg>