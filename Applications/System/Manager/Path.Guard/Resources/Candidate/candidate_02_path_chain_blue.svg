<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D2B"/>
      <stop offset="100%" stop-color="#001A55"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#0040C8"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chain links representing PATH segments -->
  <!-- Link 1 -->
  <rect x="60" y="160" width="80" height="40" rx="20" fill="none" stroke="#40C4FF" stroke-width="5"/>
  <rect x="70" y="170" width="60" height="20" rx="10" fill="url(#blue)" opacity="0.3"/>
  <!-- Link 2 -->
  <rect x="140" y="160" width="80" height="40" rx="20" fill="none" stroke="#2979FF" stroke-width="5"/>
  <rect x="150" y="170" width="60" height="20" rx="10" fill="url(#blue)" opacity="0.3"/>
  <!-- Link 3 -->
  <rect x="220" y="160" width="80" height="40" rx="20" fill="none" stroke="#40C4FF" stroke-width="5"/>
  <rect x="230" y="170" width="60" height="20" rx="10" fill="url(#blue)" opacity="0.3"/>
  <!-- Link 4 -->
  <rect x="300" y="160" width="80" height="40" rx="20" fill="none" stroke="#2979FF" stroke-width="5"/>
  <rect x="310" y="170" width="60" height="20" rx="10" fill="url(#blue)" opacity="0.3"/>
  <!-- Link 5 - broken/warning -->
  <rect x="380" y="160" width="72" height="40" rx="20" fill="none" stroke="#FF1744" stroke-width="5"/>
  <line x1="394" y1="166" x2="438" y2="194" stroke="#FF1744" stroke-width="3" opacity="0.6"/>
  <!-- PATH text in chain links -->
  <text x="100" y="185" text-anchor="middle" font-family="Consolas" font-size="11" fill="#40C4FF">/bin</text>
  <text x="180" y="185" text-anchor="middle" font-family="Consolas" font-size="11" fill="#40C4FF">/usr</text>
  <text x="260" y="185" text-anchor="middle" font-family="Consolas" font-size="11" fill="#40C4FF">/opt</text>
  <text x="340" y="185" text-anchor="middle" font-family="Consolas" font-size="11" fill="#40C4FF">/local</text>
  <text x="416" y="185" text-anchor="middle" font-family="Consolas" font-size="10" fill="#FF1744">???</text>
  <!-- Shield below -->
  <path d="M256 240 L340 278 L340 340 Q340 390 256 420 Q172 390 172 340 L172 278 Z" fill="url(#blue)" opacity="0.15" stroke="#2979FF" stroke-width="3"/>
  <!-- Check in shield -->
  <path d="M220 316 L244 340 L292 292" stroke="#40C4FF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Warning sign over broken link -->
  <polygon points="416,100 440,144 392,144" fill="#FF1744" opacity="0.2" stroke="#FF1744" stroke-width="2"/>
  <text x="416" y="136" text-anchor="middle" font-family="Consolas" font-size="22" fill="#FF1744" font-weight="bold">!</text>
</svg>