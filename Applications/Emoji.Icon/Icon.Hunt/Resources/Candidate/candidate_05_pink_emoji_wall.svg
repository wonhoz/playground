<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2a0a2a"/>
      <stop offset="100%" stop-color="#15001a"/>
    </radialGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Emoji wall grid (5x5 small) -->
  <text x="44" y="78" font-size="28" opacity="0.4">😀</text>
  <text x="88" y="78" font-size="28" opacity="0.4">🎨</text>
  <text x="132" y="78" font-size="28" opacity="0.35">🔮</text>
  <text x="176" y="78" font-size="28" opacity="0.4">⭐</text>
  <text x="220" y="78" font-size="28" opacity="0.3">🎯</text>
  <text x="264" y="78" font-size="28" opacity="0.35">💎</text>
  <text x="308" y="78" font-size="28" opacity="0.3">🌈</text>
  <text x="352" y="78" font-size="28" opacity="0.4">🚀</text>
  <text x="396" y="78" font-size="28" opacity="0.3">🔑</text>
  <text x="440" y="78" font-size="28" opacity="0.25">🎪</text>
  <text x="44" y="122" font-size="28" opacity="0.35">🎵</text>
  <text x="88" y="122" font-size="28" opacity="0.4">🏆</text>
  <text x="132" y="122" font-size="28" opacity="0.3">🌐</text>
  <text x="176" y="122" font-size="28" opacity="0.4">🦋</text>
  <text x="220" y="122" font-size="28" opacity="0.35">🔔</text>
  <text x="264" y="122" font-size="28" opacity="0.3">📌</text>
  <text x="308" y="122" font-size="28" opacity="0.4">💡</text>
  <text x="352" y="122" font-size="28" opacity="0.3">🌙</text>
  <text x="396" y="122" font-size="28" opacity="0.35">🔥</text>
  <text x="440" y="122" font-size="28" opacity="0.25">❄</text>
  <!-- Bottom rows dimmer -->
  <text x="44" y="430" font-size="28" opacity="0.2">📧</text>
  <text x="88" y="430" font-size="28" opacity="0.2">⚙️</text>
  <text x="132" y="430" font-size="28" opacity="0.15">🖥</text>
  <text x="352" y="430" font-size="28" opacity="0.2">🎮</text>
  <text x="396" y="430" font-size="28" opacity="0.15">📁</text>
  <text x="440" y="430" font-size="28" opacity="0.15">🔧</text>
  <!-- Big magnifier center focus -->
  <circle cx="240" cy="280" r="140" fill="#1a001a" opacity="0.9" stroke="#f472b6" stroke-width="5"/>
  <!-- Icon inside lens (larger) -->
  <text x="150" y="316" font-size="110">🦋</text>
  <!-- Lens shine -->
  <ellipse cx="192" cy="222" rx="40" ry="22" fill="white" opacity="0.05" transform="rotate(-30 192 222)"/>
  <!-- Lens ring glow -->
  <circle cx="240" cy="280" r="140" fill="none" stroke="#f9a8d4" stroke-width="2" opacity="0.5"/>
  <circle cx="240" cy="280" r="150" fill="none" stroke="#db2777" stroke-width="1" opacity="0.2"/>
  <!-- Handle -->
  <line x1="348" y1="388" x2="408" y2="448" stroke="url(#pink)" stroke-width="22" stroke-linecap="round"/>
  <!-- Tag chip -->
  <rect x="120" y="430" width="200" height="40" rx="20" fill="#2a0a2a" stroke="#f472b6" stroke-width="2"/>
  <text x="136" y="456" font-family="monospace" font-size="14" fill="#f472b6">butterfly  •  animal</text>
</svg>
