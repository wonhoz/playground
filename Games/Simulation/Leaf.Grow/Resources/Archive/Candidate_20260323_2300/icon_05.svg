  <line x1="404" y1="185" x2="377" y2="152" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
  <line x1="344" y1="280" x2="306" y2="268" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
  <line x1="344" y1="385" x2="306" y2="397" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
  <line x1="404" y1="458" x2="376" y2="490" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>

