<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Funnel/filter shape -->
  <path d="M80 100 L432 100 L300 260 L300 420 L212 420 L212 260 Z" fill="#00897b" stroke="#4db6ac" stroke-width="4"/>
  <!-- Lines going through filter -->
  <line x1="140" y1="140" x2="372" y2="140" stroke="#e0f2f1" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="170" x2="342" y2="170" stroke="#ef5350" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="200" x2="352" y2="200" stroke="#e0f2f1" stroke-width="6" stroke-linecap="round"/>
  <!-- After filter, only selected line -->
  <line x1="256" y1="300" x2="256" y2="380" stroke="#ffd740" stroke-width="8" stroke-linecap="round"/>
  <!-- Search icon -->
  <circle cx="420" cy="380" r="48" fill="#004d40" stroke="#4db6ac" stroke-width="4"/>
  <circle cx="412" cy="372" r="22" fill="none" stroke="#80cbc4" stroke-width="5"/>
  <line x1="430" y1="390" x2="450" y2="410" stroke="#80cbc4" stroke-width="5" stroke-linecap="round"/>
  <!-- Log text label -->
  <text x="256" y="470" font-family="monospace" font-size="28" fill="#80cbc4" text-anchor="middle">LOG</text>
</svg>
