<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#041214"/>
    </linearGradient>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#22D3EE;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="holoGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 홀로그램 기반 플랫폼 -->
  <ellipse cx="256" cy="380" rx="160" ry="30" fill="#06B6D4" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="256" cy="380" rx="100" ry="18" fill="#22D3EE" opacity="0.2"/>
  <!-- 홀로그램 빔 -->
  <polygon points="180,380 256,200 332,380" fill="#06B6D4" opacity="0.05"/>
  <line x1="180" y1="380" x2="256" y2="200" stroke="#06B6D4" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="332" y1="380" x2="256" y2="200" stroke="#22D3EE" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <!-- 메인 홀로그램 파일 (실선) -->
  <rect x="196" y="160" width="120" height="150" rx="10" fill="url(#holoGrad)" stroke="#67E8F9" stroke-width="2" opacity="0.9" filter="url(#holoGlow)"/>
  <polygon points="196,160 256,160 256,118 316,160" fill="#22D3EE" opacity="0.7" stroke="#67E8F9" stroke-width="1"/>
  <!-- 홀로그램 스캔 라인들 -->
  <line x1="196" y1="190" x2="316" y2="190" stroke="#67E8F9" stroke-width="1" opacity="0.5"/>
  <line x1="196" y1="205" x2="316" y2="205" stroke="#67E8F9" stroke-width="0.8" opacity="0.3"/>
  <line x1="196" y1="220" x2="316" y2="220" stroke="#22D3EE" stroke-width="2" opacity="0.6"/>
  <line x1="196" y1="237" x2="316" y2="237" stroke="#67E8F9" stroke-width="0.8" opacity="0.3"/>
  <line x1="196" y1="254" x2="316" y2="254" stroke="#06B6D4" stroke-width="2" opacity="0.7"/>
  <line x1="196" y1="271" x2="316" y2="271" stroke="#67E8F9" stroke-width="0.8" opacity="0.3"/>
  <line x1="196" y1="288" x2="316" y2="288" stroke="#22D3EE" stroke-width="1.5" opacity="0.5"/>
  <!-- 복사본 홀로그램 (오른쪽, 반투명 고스트) -->
  <rect x="310" y="180" width="90" height="112" rx="8" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3" filter="url(#glow)"/>
  <polygon points="310,180 355,180 355,148 400,180" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3"/>
  <line x1="322" y1="205" x2="392" y2="205" stroke="#22D3EE" stroke-width="1.5" opacity="0.4"/>
  <line x1="322" y1="220" x2="375" y2="220" stroke="#06B6D4" stroke-width="1.5" opacity="0.35"/>
  <line x1="322" y1="235" x2="385" y2="235" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <!-- 복사본 왼쪽 -->
  <rect x="112" y="200" width="75" height="94" rx="7" fill="none" stroke="#06B6D4" stroke-width="1.2" opacity="0.4" stroke-dasharray="4,3" filter="url(#glow)"/>
  <polygon points="112,200 149,200 149,174 187,200" fill="none" stroke="#22D3EE" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>
  <!-- 중앙 홀로그램 마커 -->
  <circle cx="256" cy="200" r="8" fill="#67E8F9" opacity="0.9" filter="url(#glow)"/>
  <!-- 복사 감지 텍스트 -->
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="12" fill="#06B6D4" opacity="0.6">× 2 COPIES FOUND</text>
</svg>