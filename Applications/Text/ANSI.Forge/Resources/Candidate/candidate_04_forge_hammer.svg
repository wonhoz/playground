<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#3D1A00"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil -->
  <rect x="140" y="340" width="232" height="60" rx="8" fill="#555"/>
  <rect x="160" y="300" width="192" height="50" rx="6" fill="#666"/>
  <!-- Fire sparks -->
  <circle cx="200" cy="280" r="8" fill="#FF4500" opacity="0.8"/>
  <circle cx="240" cy="250" r="6" fill="#FF8C00" opacity="0.7"/>
  <circle cx="300" cy="270" r="10" fill="#FFD700" opacity="0.6"/>
  <circle cx="330" cy="240" r="5" fill="#FF4500" opacity="0.9"/>
  <circle cx="180" cy="240" r="7" fill="#FF6600" opacity="0.7"/>
  <!-- Hot metal bar with ANSI colors -->
  <rect x="160" y="290" width="192" height="20" rx="4" fill="url(#fire)"/>
  <!-- Hammer -->
  <rect x="270" y="120" width="30" height="100" rx="6" fill="url(#metal)"/>
  <rect x="240" y="100" width="90" height="50" rx="8" fill="url(#metal)"/>
  <!-- Color sparks flying -->
  <circle cx="140" cy="200" r="6" fill="#FF0080"/>
  <circle cx="380" cy="180" r="6" fill="#00FFFF"/>
  <circle cx="160" cy="160" r="5" fill="#FFFF00"/>
  <circle cx="360" cy="220" r="5" fill="#00FF80"/>
  <circle cx="200" cy="130" r="4" fill="#FF6B6B"/>
  <!-- Label -->
  <text x="256" y="450" font-family="monospace" font-weight="bold" font-size="28" fill="#FF8C00" text-anchor="middle">ANSI FORGE</text>
</svg>