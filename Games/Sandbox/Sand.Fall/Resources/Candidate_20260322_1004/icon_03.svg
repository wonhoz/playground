  <rect x="456" y="530" width="12" height="22" rx="2" fill="#FF6D00"/>
  <rect x="474" y="536" width="12" height="18" rx="2" fill="#FF4500"/>
  <!-- 물 (우하단) -->
  <rect x="536" y="560" width="18" height="18" rx="2" fill="#2196F3"/>
  <rect x="556" y="556" width="18" height="22" rx="2" fill="#42A5F5"/>
  <rect x="576" y="560" width="18" height="18" rx="2" fill="#2196F3"/>
  <!-- 증기 (물 위) -->
