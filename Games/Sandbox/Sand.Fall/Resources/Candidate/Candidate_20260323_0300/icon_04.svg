<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 씨앗→식물 성장 (불이 나무에 번짐) | 공간/장면 | #0A0A0A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0D1117"/>
  <!-- Layer 2: Pixel art style scene -->
  <!-- Ground floor -->
  <rect x="140" y="780" width="744" height="40" rx="4" fill="#504848"/>
  <!-- Stone wall section -->
  <rect x="140" y="680" width="60" height="100" rx="0" fill="#788090"/>
  <rect x="200" y="680" width="60" height="100" rx="0" fill="#7C8498"/>
  <!-- Wood section -->
  <rect x="380" y="680" width="40" height="100" rx="0" fill="#8B5E3C"/>
  <rect x="460" y="680" width="40" height="100" rx="0" fill="#7A4E2C"/>
  <!-- Plant growing from seed -->
  <!-- Seed in soil -->
  <rect x="330" y="764" width="14" height="14" rx="2" fill="#AA7040"/>
  <!-- Plant pixels growing up -->
  <rect x="330" y="740" width="14" height="22" rx="2" fill="#22A030"/>
  <rect x="316" y="720" width="14" height="22" rx="2" fill="#22A030"/>
  <rect x="344" y="700" width="14" height="22" rx="2" fill="#22A030"/>
  <rect x="316" y="680" width="14" height="22" rx="2" fill="#1A9028"/>
  <rect x="344" y="660" width="14" height="22" rx="2" fill="#1A9028"/>
  <!-- Fire spreading to wood -->
  <rect x="450" y="680" width="14" height="20" rx="2" fill="#FF5500" opacity="0.9"/>
  <rect x="464" y="660" width="14" height="22" rx="2" fill="#FF8800" opacity="0.8"/>
  <rect x="450" y="640" width="14" height="22" rx="2" fill="#FFAA00" opacity="0.85"/>
  <rect x="464" y="618" width="14" height="24" rx="2" fill="#FFDD00" opacity="0.7"/>
  <!-- Water falling -->
  <rect x="230" y="300" width="14" height="14" rx="2" fill="#3468C8"/>
  <rect x="226" y="320" width="14" height="14" rx="2" fill="#2A5CB8"/>
  <rect x="234" y="340" width="14" height="14" rx="2" fill="#3468C8"/>
  <rect x="228" y="362" width="14" height="14" rx="2" fill="#3468C8"/>
  <rect x="236" y="384" width="14" height="14" rx="2" fill="#2A5CB8"/>
  <rect x="228" y="406" width="14" height="14" rx="2" fill="#3468C8"/>
  <!-- Water pool -->
  <rect x="160" y="740" width="200" height="40" rx="4" fill="#3468C8" opacity="0.7"/>
  <!-- Sand pile -->
  <rect x="580" y="600" width="14" height="14" rx="2" fill="#E8C878"/>
  <rect x="600" y="620" width="14" height="14" rx="2" fill="#DEB858"/>
  <rect x="576" y="632" width="14" height="14" rx="2" fill="#E8C878"/>
  <rect x="594" y="648" width="14" height="14" rx="2" fill="#C9A040"/>
  <!-- Sand pile at bottom -->
  <rect x="560" y="740" width="180" height="40" rx="4" fill="#E8C878" opacity="0.8"/>
  <!-- Layer 3: Material selector UI at top -->
  <rect x="140" y="180" width="744" height="60" rx="12" fill="#1A1A2A"/>
  <rect x="156" y="192" width="40" height="36" rx="6" fill="#E8C878" stroke="white" stroke-width="2"/>
  <rect x="206" y="192" width="40" height="36" rx="6" fill="#3468C8"/>
  <rect x="256" y="192" width="40" height="36" rx="6" fill="#FF5500"/>
  <rect x="306" y="192" width="40" height="36" rx="6" fill="#22A030"/>
  <rect x="356" y="192" width="40" height="36" rx="6" fill="#788090"/>
  <rect x="406" y="192" width="40" height="36" rx="6" fill="#8B5E3C"/>
</svg>
