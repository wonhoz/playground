<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10133F"/>
      <stop offset="1" stop-color="#2A1B6E"/>
    </linearGradient>
    <linearGradient id="txt09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DFFE6"/>
      <stop offset="1" stop-color="#00B894"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="190" fill="url(#bg09)"/>
  <!-- bullet streaks behind text -->
  <g stroke="#FF3D7F" stroke-width="18" stroke-linecap="round" opacity="0.7">
    <line x1="120" y1="240" x2="280" y2="260"/>
    <line x1="760" y1="260" x2="920" y2="240"/>
    <line x1="120" y1="780" x2="280" y2="800"/>
    <line x1="760" y1="800" x2="920" y2="780"/>
  </g>
  <!-- DODGE text -->
  <text x="512" y="540" font-family="Impact, 'Arial Black', sans-serif" font-weight="900"
        font-size="220" text-anchor="middle" fill="url(#txt09)"
        stroke="#FFFFFF" stroke-width="8" paint-order="stroke fill">DODGE</text>
  <!-- diamond punctuation -->
  <polygon points="512,720 624,832 512,944 400,832" fill="#FFE74A" stroke="#FFFFFF" stroke-width="10"/>
  <text x="512" y="700" font-family="Impact, 'Arial Black', sans-serif" font-size="100" text-anchor="middle"
        fill="#FFFFFF">BLITZ</text>
</svg>
