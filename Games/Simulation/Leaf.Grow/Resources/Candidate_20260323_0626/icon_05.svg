<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 계절 사이클 — 4계절 식물 변화 | 레이어드 | #1A1400 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A1400"/>
  <!-- Layer 2: Four season quadrants -->
  <!-- Spring (top-left) -->
  <rect x="180" y="180" width="290" height="290" rx="8" fill="#0A1A00" stroke="#4ADE80" stroke-width="2"/>
  <text x="240" y="216" font-family="Arial,sans-serif" font-size="16" fill="#4ADE80" font-weight="bold">봄 · SPRING</text>
  <!-- Spring tree -->
  <line x1="325" y1="440" x2="325" y2="340" stroke="#5A3A10" stroke-width="8" stroke-linecap="round"/>
  <line x1="325" y1="380" x2="295" y2="355" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <line x1="325" y1="370" x2="355" y2="345" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="325" cy="310" rx="55" ry="45" fill="#22AA44" stroke="#4ADE80" stroke-width="2"/>
  <!-- Cherry blossom dots -->
  <circle cx="305" cy="295" r="6" fill="#FF88AA"/>
  <circle cx="325" cy="282" r="7" fill="#FFB0C8"/>
  <circle cx="345" cy="298" r="6" fill="#FF88AA"/>
  <circle cx="312" cy="315" r="5" fill="#FFB0C8"/>
  <circle cx="338" cy="310" r="6" fill="#FF88AA"/>
  <!-- Summer (top-right) -->
  <rect x="554" y="180" width="290" height="290" rx="8" fill="#1A1000" stroke="#FCD34D" stroke-width="2"/>
  <text x="610" y="216" font-family="Arial,sans-serif" font-size="16" fill="#FCD34D" font-weight="bold">여름 · SUMMER</text>
  <!-- Sun -->
  <circle cx="699" cy="240" r="22" fill="#FFDD00" stroke="#FFAA00" stroke-width="2"/>
  <!-- Summer tree (full foliage) -->
  <line x1="699" y1="440" x2="699" y2="340" stroke="#5A3A10" stroke-width="8" stroke-linecap="round"/>
  <line x1="699" y1="390" x2="669" y2="360" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <line x1="699" y1="380" x2="729" y2="355" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="699" cy="306" rx="70" ry="58" fill="#16A34A" stroke="#22C55E" stroke-width="2"/>
  <ellipse cx="675" cy="316" rx="40" ry="34" fill="#22C55E" opacity="0.7"/>
  <ellipse cx="720" cy="312" rx="38" ry="32" fill="#22C55E" opacity="0.7"/>
  <!-- Autumn (bottom-left) -->
  <rect x="180" y="554" width="290" height="290" rx="8" fill="#200800" stroke="#F97316" stroke-width="2"/>
  <text x="226" y="590" font-family="Arial,sans-serif" font-size="16" fill="#F97316" font-weight="bold">가을 · AUTUMN</text>
  <!-- Autumn tree (sparse leaves) -->
  <line x1="325" y1="810" x2="325" y2="700" stroke="#5A3A10" stroke-width="8" stroke-linecap="round"/>
  <line x1="325" y1="750" x2="295" y2="720" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <line x1="325" y1="740" x2="355" y2="715" stroke="#5A3A10" stroke-width="5" stroke-linecap="round"/>
  <line x1="325" y1="730" x2="300" y2="710" stroke="#5A3A10" stroke-width="4" stroke-linecap="round"/>
  <!-- Autumn foliage patches -->
  <ellipse cx="325" cy="668" rx="50" ry="38" fill="#CC4400" opacity="0.8"/>
  <ellipse cx="305" cy="675" rx="30" ry="24" fill="#EE6600" opacity="0.7"/>
  <ellipse cx="345" cy="671" rx="28" ry="22" fill="#FFAA00" opacity="0.7"/>
  <!-- Falling leaves -->
  <ellipse cx="280" cy="720" rx="10" ry="6" fill="#FF8800" transform="rotate(-30 280 720)" opacity="0.9"/>
  <ellipse cx="365" cy="742" rx="8" ry="5" fill="#FFAA00" transform="rotate(20 365 742)" opacity="0.8"/>
  <ellipse cx="250" cy="760" rx="9" ry="5" fill="#EE4400" transform="rotate(-15 250 760)" opacity="0.7"/>
  <!-- Winter (bottom-right) -->
  <rect x="554" y="554" width="290" height="290" rx="8" fill="#001428" stroke="#93C5FD" stroke-width="2"/>
  <text x="596" y="590" font-family="Arial,sans-serif" font-size="16" fill="#93C5FD" font-weight="bold">겨울 · WINTER</text>
  <!-- Winter tree (bare branches) -->
  <line x1="699" y1="810" x2="699" y2="710" stroke="#4A3A28" stroke-width="8" stroke-linecap="round"/>
  <line x1="699" y1="760" x2="659" y2="730" stroke="#4A3A28" stroke-width="5" stroke-linecap="round"/>
  <line x1="699" y1="750" x2="739" y2="720" stroke="#4A3A28" stroke-width="5" stroke-linecap="round"/>
  <line x1="659" y1="730" x2="639" y2="714" stroke="#4A3A28" stroke-width="3" stroke-linecap="round"/>
  <line x1="739" y1="720" x2="759" y2="705" stroke="#4A3A28" stroke-width="3" stroke-linecap="round"/>
  <line x1="699" y1="740" x2="679" y2="720" stroke="#4A3A28" stroke-width="3" stroke-linecap="round"/>
  <line x1="699" y1="740" x2="715" y2="718" stroke="#4A3A28" stroke-width="3" stroke-linecap="round"/>
  <!-- Snowflakes -->
  <text x="635" y="680" font-family="Arial,sans-serif" font-size="22" fill="#93C5FD" opacity="0.8">❄</text>
  <text x="730" y="660" font-family="Arial,sans-serif" font-size="18" fill="#BFDBFE" opacity="0.7">❄</text>
  <text x="660" y="750" font-family="Arial,sans-serif" font-size="16" fill="#93C5FD" opacity="0.6">❄</text>
  <!-- Layer 3: Cycle arrows between quadrants -->
  <!-- Spring → Summer (top) -->
  <path d="M 480 300 Q 512 280 542 300" stroke="#AAAAAA" stroke-width="3" fill="none" marker-end="url(#arrowGray)"/>
  <polygon points="542,288 554,300 542,312" fill="#AAAAAA" opacity="0.7"/>
  <!-- Summer → Autumn (right) -->
  <path d="M 726 480 Q 744 512 726 542" stroke="#AAAAAA" stroke-width="3" fill="none"/>
  <polygon points="714,542 726,554 738,542" fill="#AAAAAA" opacity="0.7"/>
  <!-- Autumn → Winter (bottom) -->
  <path d="M 480 726 Q 512 744 542 726" stroke="#AAAAAA" stroke-width="3" fill="none"/>
  <polygon points="542,714 554,726 542,738" fill="#AAAAAA" opacity="0.7"/>
  <!-- Winter → Spring (left) -->
  <path d="M 298 542 Q 280 512 298 480" stroke="#AAAAAA" stroke-width="3" fill="none"/>
  <polygon points="286,480 298,468 310,480" fill="#AAAAAA" opacity="0.7"/>
</svg>
