<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 언어 코드 태그 뱃지들 쌓기 | 중앙 심볼 | 민트 배경 + 파랑 태그 + 핑크 포인트 -->
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="240" fill="url(#bg1)"/>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8EDDA"/>
      <stop offset="100%" stop-color="#6DD5C0"/>
    </linearGradient>
    <linearGradient id="tag1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A6AE8"/>
      <stop offset="100%" stop-color="#1A4FBF"/>
    </linearGradient>
    <linearGradient id="tag2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E83A8C"/>
      <stop offset="100%" stop-color="#BF1A6A"/>
    </linearGradient>
    <linearGradient id="tag3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4860A"/>
    </linearGradient>
  </defs>

  <!-- Layer 2: 메인 - 코드 태그 뱃지들 -->
  <!-- 상단 태그: en-US -->
  <rect x="192" y="190" width="640" height="148" rx="24" fill="url(#tag1)"/>
  <!-- 중간 태그: ja-JP -->
  <rect x="192" y="368" width="640" height="148" rx="24" fill="url(#tag2)"/>
  <!-- 하단 태그: ko-KR -->
  <rect x="192" y="546" width="640" height="148" rx="24" fill="url(#tag3)"/>

  <!-- Layer 3: 텍스트 디테일 -->
  <text x="512" y="291" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="92" font-weight="bold" fill="white" letter-spacing="2">en-US</text>
  <text x="512" y="469" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="92" font-weight="bold" fill="white" letter-spacing="2">ja-JP</text>
  <text x="512" y="647" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="92" font-weight="bold" fill="white" letter-spacing="2">ko-KR</text>

  <!-- 작은 dot 장식 -->
  <circle cx="220" cy="264" r="12" fill="white" opacity="0.4"/>
  <circle cx="220" cy="442" r="12" fill="white" opacity="0.4"/>
  <circle cx="220" cy="620" r="12" fill="white" opacity="0.4"/>

  <!-- 하단 소형 지시선 장식 -->
  <rect x="240" y="736" width="200" height="14" rx="7" fill="#1A7A5E" opacity="0.5"/>
  <rect x="460" y="736" width="140" height="14" rx="7" fill="#1A7A5E" opacity="0.35"/>
  <rect x="620" y="736" width="160" height="14" rx="7" fill="#1A7A5E" opacity="0.25"/>
</svg>
