<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 파스텔 스카이 -->
  <rect width="1024" height="1024" rx="180" fill="#E3F2FD"/>
  <!-- Layer 2: 화분 + 식물 성장 -->
  <!-- 화분 -->
  <path d="M320,800 L280,660 L744,660 L704,800 Z" fill="#8D6E63"/>
  <rect x="268" y="644" width="488" height="32" rx="8" fill="#6D4C41"/>
  <!-- 흙 -->
  <rect x="280" y="660" width="464" height="60" rx="4" fill="#5D4037"/>
  <!-- 줄기 -->
  <line x1="512" y1="660" x2="512" y2="360" stroke="#388E3C" stroke-width="18" stroke-linecap="round"/>
  <!-- 가지 1 (좌) -->
  <line x1="512" y1="520" x2="400" y2="440" stroke="#388E3C" stroke-width="12" stroke-linecap="round"/>
  <!-- 가지 2 (우) -->
  <line x1="512" y1="490" x2="640" y2="420" stroke="#388E3C" stroke-width="12" stroke-linecap="round"/>
  <!-- 가지 3 (좌) -->
  <line x1="512" y1="460" x2="440" y2="380" stroke="#388E3C" stroke-width="10" stroke-linecap="round"/>
  <!-- 잎 관 (크라운) -->
  <circle cx="512" cy="300" r="140" fill="#43A047"/>
  <circle cx="400" cy="340" r="90" fill="#4CAF50"/>
  <circle cx="620" cy="320" r="100" fill="#388E3C"/>
  <circle cx="440" cy="260" r="80" fill="#66BB6A"/>
  <circle cx="570" cy="240" r="90" fill="#4CAF50"/>
  <!-- 반짝임 (햇빛 반사) -->
  <circle cx="460" cy="270" r="16" fill="#A5D6A7" opacity="0.8"/>
  <circle cx="580" cy="290" r="12" fill="#C8E6C9" opacity="0.7"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#2E7D32" text-anchor="middle">LEAF.GROW</text>
</svg>
