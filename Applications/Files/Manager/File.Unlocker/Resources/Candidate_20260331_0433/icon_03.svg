<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 드롭존 -->
  <rect x="100" y="140" width="824" height="460" rx="36"
        fill="none" stroke="#0097A7" stroke-width="20" stroke-dasharray="40,20"/>
  <!-- 파일 드롭 아이콘 -->
  <text x="512" y="340" font-family="'Segoe UI', sans-serif" font-size="80" text-anchor="middle">📄</text>
  <text x="512" y="440" font-family="'Segoe UI', sans-serif" font-size="56" fill="#006064" text-anchor="middle">파일을 드롭하세요</text>
  <!-- 잠긴 자물쇠 (빨강) -->
  <circle cx="340" cy="480" r="80" fill="#B71C1C" opacity="0.85"/>
  <rect x="316" y="510" width="48" height="44" rx="8" fill="white"/>
  <path d="M320,480 Q320,440 364,440 Q408,440 408,480" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- 화살표 변환 -->
  <line x1="440" y1="512" x2="580" y2="512" stroke="#00838F" stroke-width="24" stroke-linecap="round"/>
  <polygon points="564,484 608,512 564,540" fill="#00838F"/>
  <!-- 열린 자물쇠 (초록) -->
  <circle cx="680" cy="480" r="80" fill="#1B5E20" opacity="0.85"/>
  <rect x="656" y="510" width="48" height="44" rx="8" fill="white"/>
  <path d="M660,480 Q660,440 704,440" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Layer 3: 해제 완료 텍스트 -->
  <rect x="100" y="660" width="824" height="120" rx="24" fill="#1B5E20"/>
  <text x="512" y="736" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#69F0AE" text-anchor="middle">✓ 잠금 해제 완료</text>
</svg>
