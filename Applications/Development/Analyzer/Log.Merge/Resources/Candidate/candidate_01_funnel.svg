  <line x1="372" y1="170" x2="410" y2="170" stroke="white" stroke-width="4" opacity="0.6"/>
  <!-- 수렴 화살표 -->
  <path d="M110 260 L110 310 L246 350" fill="none" stroke="url(#stream1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256 260 L256 350" fill="none" stroke="url(#stream2)" stroke-width="8" stroke-linecap="round"/>
  <path d="M402 260 L402 310 L266 350" fill="none" stroke="url(#stream3)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 병합된 출력 -->
  <rect x="136" y="350" width="240" height="110" rx="12" fill="url(#fg)" opacity="0.9"/>
  <line x1="155" y1="375" x2="360" y2="375" stroke="#283593" stroke-width="5"/>
  <line x1="155" y1="395" x2="340" y2="395" stroke="#283593" stroke-width="5"/>
  <line x1="155" y1="415" x2="355" y2="415" stroke="#283593" stroke-width="5"/>
  <line x1="155" y1="435" x2="330" y2="435" stroke="#283593" stroke-width="5"/>
