<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Path.Guard - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { color: #00C853; margin-bottom: 8px; font-size: 22px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item:hover { border-color: #00C853; background: #2a2a2a; }
  .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 20px; }
  .item span { font-size: 11px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Path.Guard — 아이콘 후보 10종</h1>
<p>시스템 PATH 환경변수 관리·보호 도구</p>
<div class="grid">
  <div class="item"><img src="candidate_01_shield_green.svg"><span>01 shield_green</span></div>
  <div class="item"><img src="candidate_02_path_chain_blue.svg"><span>02 path_chain_blue</span></div>
  <div class="item"><img src="candidate_03_lock_amber.svg"><span>03 lock_amber</span></div>
  <div class="item"><img src="candidate_04_guard_crimson.svg"><span>04 guard_crimson</span></div>
  <div class="item"><img src="candidate_05_env_teal.svg"><span>05 env_teal</span></div>
  <div class="item"><img src="candidate_06_route_orange.svg"><span>06 route_orange</span></div>
  <div class="item"><img src="candidate_07_directory_purple.svg"><span>07 directory_purple</span></div>
  <div class="item"><img src="candidate_08_registry_cyan.svg"><span>08 registry_cyan</span></div>
  <div class="item"><img src="candidate_09_sentinel_gold.svg"><span>09 sentinel_gold</span></div>
  <div class="item"><img src="candidate_10_matrix_emerald.svg"><span>10 matrix_emerald</span></div>
</div>
</body>
</html>
