  <text x="145" y="404" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">4</text>
  <text x="145" y="436" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">5</text>
  <text x="145" y="468" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">6</text>
  <text x="145" y="500" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">7</text>
  <text x="145" y="532" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">8</text>
  <text x="145" y="564" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">9</text>
  <text x="145" y="596" font-family="Consolas,monospace" font-size="16" fill="#5A5A5A" text-anchor="middle">10</text>
  <!-- Markdown content with syntax highlighting -->
  <text x="186" y="308" font-family="Consolas,monospace" font-size="18" fill="#569CD6"># </text>
  <text x="214" y="308" font-family="Consolas,monospace" font-size="18" fill="#4EC9B0">Mark.View</text>
  <text x="186" y="340" font-family="Consolas,monospace" font-size="18" fill="#808080">## 소개</text>
  <text x="186" y="372" font-family="Consolas,monospace" font-size="18" fill="#D4D4D4">마크다운 </text>
  <text x="338" y="372" font-family="Consolas,monospace" font-size="18" fill="#9CDCFE">**뷰어**</text>
  <text x="186" y="404" font-family="Consolas,monospace" font-size="18" fill="#6A9955">``` js</text>
  <text x="186" y="436" font-family="Consolas,monospace" font-size="18" fill="#9CDCFE">const </text>
  <text x="262" y="436" font-family="Consolas,monospace" font-size="18" fill="#D4D4D4">md </text>
  <text x="294" y="436" font-family="Consolas,monospace" font-size="18" fill="#D4D4D4">= </text>
  <text x="322" y="436" font-family="Consolas,monospace" font-size="18" fill="#CE9178">"# Hello"</text>
  <text x="186" y="468" font-family="Consolas,monospace" font-size="18" fill="#6A9955">```</text>
  <text x="186" y="500" font-family="Consolas,monospace" font-size="18" fill="#D4D4D4">- </text>
  <text x="210" y="500" font-family="Consolas,monospace" font-size="18" fill="#CE9178">항목1</text>
  <text x="186" y="532" font-family="Consolas,monospace" font-size="18" fill="#D4D4D4">- </text>
  <text x="210" y="532" font-family="Consolas,monospace" font-size="18" fill="#CE9178">항목2</text>
