<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep purple -->
  <rect width="1024" height="1024" rx="200" fill="#120A28"/>
  <!-- Outer track ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#1E1040" stroke-width="90"/>
  <!-- Circular progress arc ~300° in gold -->
  <path d="M512 172 A340 340 0 1 1 172 562" fill="none" stroke="#FFD600" stroke-width="88" stroke-linecap="round"/>
  <!-- Arrowhead at arc start (pointing clockwise) -->
  <polygon points="512,96 406,230 618,230" fill="#FFD600"/>
  <!-- Center clock face -->
  <circle cx="512" cy="512" r="148" fill="#1C1040" stroke="#FF6D00" stroke-width="18"/>
  <!-- Hour hand (short, thick) -->
  <line x1="512" y1="512" x2="512" y2="400" stroke="#FF9800" stroke-width="28" stroke-linecap="round"/>
  <!-- Minute hand (long) -->
  <line x1="512" y1="512" x2="606" y2="452" stroke="#FFD600" stroke-width="20" stroke-linecap="round"/>
  <!-- Center pin -->
  <circle cx="512" cy="512" r="22" fill="#FFD600"/>
</svg>
