<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <linearGradient id="brushBody8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3F51B5"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="star8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76FF03"/>
      <stop offset="100%" stop-color="#64DD17"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg8)"/>

  <!-- Layer 2: Giant paintbrush (vertical, center) -->
  <!-- Handle (top) -->
  <rect x="448" y="148" width="128" height="380" rx="64" fill="url(#brushBody8)"/>
  <!-- Ferrule (metal band) -->
  <rect x="436" y="504" width="152" height="56" rx="8" fill="#9E9E9E"/>
  <!-- Bristle section -->
  <ellipse cx="512" cy="660" rx="80" ry="140" fill="#3F51B5"/>
  <!-- Bristle tip -->
  <ellipse cx="512" cy="790" rx="36" ry="50" fill="#76FF03"/>

  <!-- Scale number (left side) -->
  <text x="256" y="560" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" fill="url(#brushBody8)" text-anchor="middle" opacity="0.9">8</text>
  <!-- × symbol -->
  <text x="256" y="740" font-family="Arial Black, sans-serif" font-size="130" font-weight="900" fill="#3F51B5" text-anchor="middle">×</text>

  <!-- Right side: resolution arrow -->
  <rect x="680" y="390" width="220" height="90" rx="45" fill="url(#brushBody8)"/>
  <polygon points="900,435 848,392 848,478" fill="#1A237E"/>
  <!-- Small pixels above arrow -->
  <rect x="694" y="286" width="56" height="56" rx="6" fill="#9E9E9E" opacity="0.7"/>
  <rect x="760" y="286" width="56" height="56" rx="6" fill="#757575" opacity="0.7"/>
  <rect x="826" y="286" width="56" height="56" rx="6" fill="#9E9E9E" opacity="0.7"/>
  <!-- Large crisp square below arrow -->
  <rect x="694" y="530" width="200" height="200" rx="18" fill="url(#star8)"/>
  <!-- Mountain in the square -->
  <path d="M694,700 L760,600 L820,650 L894,580 L894,730 L694,730 Z" fill="#1A237E" opacity="0.7"/>
  <circle cx="738" cy="600" r="28" fill="white" opacity="0.8"/>

  <!-- Layer 3: Sparkle dots at brush tip -->
  <circle cx="420" cy="830" r="20" fill="#76FF03"/>
  <circle cx="512" cy="860" r="16" fill="white"/>
  <circle cx="604" cy="830" r="20" fill="#76FF03"/>
  <circle cx="468" cy="870" r="12" fill="#CCFF90"/>
  <circle cx="556" cy="870" r="12" fill="#CCFF90"/>
</svg>
