<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c_fp02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background green -->
  <rect width="1024" height="1024" rx="190" fill="#16A34A"/>
  <g clip-path="url(#c_fp02)">
    <!-- Layer 2: Folders flying out with X marks -->
    <!-- Trash bin / delete target area (bottom) -->
    <rect x="312" y="680" width="400" height="280" rx="36" fill="#14532D"/>
    <rect x="252" y="652" width="520" height="60" rx="30" fill="#166534"/>
    <!-- Bin lines -->
    <line x1="412" y1="720" x2="412" y2="900" stroke="#22C55E" stroke-width="20" stroke-linecap="round"/>
    <line x1="512" y1="720" x2="512" y2="900" stroke="#22C55E" stroke-width="20" stroke-linecap="round"/>
    <line x1="612" y1="720" x2="612" y2="900" stroke="#22C55E" stroke-width="20" stroke-linecap="round"/>
    <!-- Bin lid handle -->
    <rect x="452" y="596" width="120" height="44" rx="22" fill="#166534"/>
    <!-- Flying folder 1 (top-left, tilted) -->
    <g transform="rotate(-20 300 380)">
      <rect x="210" y="340" width="180" height="140" rx="20" fill="#FCD34D"/>
      <rect x="210" y="300" width="100" height="50" rx="20" fill="#FCD34D"/>
      <!-- X mark -->
      <line x1="245" y1="375" x2="355" y2="455" stroke="#EF4444" stroke-width="24" stroke-linecap="round"/>
      <line x1="355" y1="375" x2="245" y2="455" stroke="#EF4444" stroke-width="24" stroke-linecap="round"/>
    </g>
    <!-- Flying folder 2 (top-right, tilted) -->
    <g transform="rotate(15 720 360)">
      <rect x="630" y="320" width="180" height="140" rx="20" fill="#FDE68A"/>
      <rect x="630" y="280" width="100" height="50" rx="20" fill="#FDE68A"/>
      <!-- X mark -->
      <line x1="665" y1="355" x2="775" y2="435" stroke="#EF4444" stroke-width="24" stroke-linecap="round"/>
      <line x1="775" y1="355" x2="665" y2="435" stroke="#EF4444" stroke-width="24" stroke-linecap="round"/>
    </g>
    <!-- Motion lines -->
    <line x1="340" y1="520" x2="380" y2="620" stroke="#86EFAC" stroke-width="14" stroke-linecap="round"/>
    <line x1="680" y1="500" x2="640" y2="610" stroke="#86EFAC" stroke-width="14" stroke-linecap="round"/>
    <!-- Layer 3: "PURGE" badge -->
    <rect x="340" y="136" width="344" height="100" rx="32" fill="#15803D"/>
    <text x="512" y="205" font-family="Arial Black" font-size="68" font-weight="900" fill="#86EFAC" text-anchor="middle">PURGE</text>
  </g>
</svg>
