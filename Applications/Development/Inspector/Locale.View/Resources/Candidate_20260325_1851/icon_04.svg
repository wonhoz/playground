<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 달력 카드 레이어들 - 각각 다른 날짜 포맷 | 레이어드 | 보라 배경 + 핑크/오렌지/민트 카드 -->
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 보라 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgP)"/>

  <!-- Layer 2: 달력 카드 레이어들 (뒤에서 앞으로) -->
  <!-- 카드 3: 뒷 오렌지 (기울어짐) -->
  <g transform="rotate(-12, 512, 512)">
    <rect x="220" y="200" width="560" height="520" rx="28" fill="#FF7043"/>
    <rect x="220" y="200" width="560" height="100" rx="28" fill="#E64A19"/>
    <rect x="220" y="270" width="560" height="30" fill="#E64A19"/>
    <text x="500" y="260" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="52" font-weight="bold" fill="white">2026-03-25</text>
    <text x="500" y="450" text-anchor="middle" dominant-baseline="middle"
          font-family="Arial, sans-serif" font-size="38" fill="white" opacity="0.7">MM/DD/YYYY</text>
  </g>

  <!-- 카드 2: 중간 핑크 (약간 기울어짐) -->
  <g transform="rotate(6, 512, 512)">
    <rect x="210" y="220" width="560" height="520" rx="28" fill="#EC4899"/>
    <rect x="210" y="220" width="560" height="100" rx="28" fill="#BE185D"/>
    <rect x="210" y="290" width="560" height="30" fill="#BE185D"/>
    <text x="490" y="280" text-anchor="middle" dominant-baseline="middle"
          font-family="Consolas, monospace" font-size="52" font-weight="bold" fill="white">25.03.2026</text>
    <text x="490" y="470" text-anchor="middle" dominant-baseline="middle"
          font-family="Arial, sans-serif" font-size="38" fill="white" opacity="0.7">DD.MM.YYYY</text>
  </g>

  <!-- 카드 1: 앞 민트 (정면) -->
  <rect x="200" y="240" width="580" height="540" rx="28" fill="#10B981"/>
  <rect x="200" y="240" width="580" height="108" rx="28" fill="#059669"/>
  <rect x="200" y="316" width="580" height="32" fill="#059669"/>
  <text x="490" y="302" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="54" font-weight="bold" fill="white">2026/03/25</text>

  <!-- Layer 3: 앞 카드 내부 -->
  <!-- 날짜 값들 -->
  <text x="490" y="430" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="42" fill="white">ShortDate</text>
  <text x="490" y="500" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="64" font-weight="bold" fill="#D1FAE5">25/03</text>
  <text x="490" y="590" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="42" fill="#A7F3D0">ko-KR  ·  ja-JP</text>
  <text x="490" y="660" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="38" fill="#6EE7B7">¥ · ₩ · $</text>

  <!-- 작은 하이라이트 점 -->
  <circle cx="762" cy="280" r="22" fill="#FCD34D"/>
  <circle cx="762" cy="280" r="10" fill="white"/>
</svg>
