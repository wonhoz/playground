    <linearGradient id="clip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="120" y="120" width="272" height="332" rx="12" fill="url(#board)"/>
  <!-- Clip at top -->
  <rect x="196" y="100" width="120" height="40" rx="12" fill="url(#clip)"/>
  <rect x="216" y="92" width="80" height="28" rx="8" fill="#777"/>
  <!-- Clipboard lines -->
  <rect x="148" y="165" width="216" height="12" rx="4" fill="#2255ff" opacity="0.7"/>
  <rect x="148" y="190" width="170" height="10" rx="4" fill="#555" opacity="0.5"/>
  <rect x="148" y="212" width="200" height="10" rx="4" fill="#555" opacity="0.5"/>
  <rect x="148" y="234" width="150" height="10" rx="4" fill="#555" opacity="0.4"/>
  <!-- Divider -->
  <line x1="148" y1="258" x2="364" y2="258" stroke="#bbb" stroke-width="2"/>
  <!-- Second item -->
  <rect x="148" y="272" width="216" height="12" rx="4" fill="#ff5500" opacity="0.7"/>
  <rect x="148" y="297" width="180" height="10" rx="4" fill="#555" opacity="0.5"/>
  <rect x="148" y="319" width="140" height="10" rx="4" fill="#555" opacity="0.4"/>
  <!-- Divider -->
  <line x1="148" y1="342" x2="364" y2="342" stroke="#bbb" stroke-width="2"/>
  <!-- Third item -->
  <rect x="148" y="356" width="216" height="12" rx="4" fill="#00aa44" opacity="0.7"/>
  <rect x="148" y="381" width="160" height="10" rx="4" fill="#555" opacity="0.5"/>
  <rect x="148" y="403" width="190" height="10" rx="4" fill="#555" opacity="0.4"/>
