<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 티얼 -->
  <rect width="1024" height="1024" rx="180" fill="#004D5B"/>
  <!-- Layer 2: 핀 포인트 + 위치 원 -->
  <!-- 외부 링들 -->
  <circle cx="512" cy="460" r="300" fill="none" stroke="#00BCD4" stroke-width="6" opacity="0.4"/>
  <circle cx="512" cy="460" r="220" fill="none" stroke="#00BCD4" stroke-width="8" opacity="0.6"/>
  <circle cx="512" cy="460" r="140" fill="none" stroke="#00E5FF" stroke-width="10" opacity="0.8"/>
  <!-- 십자선 -->
  <line x1="512" y1="160" x2="512" y2="760" stroke="#00E5FF" stroke-width="4" opacity="0.4"/>
  <line x1="212" y1="460" x2="812" y2="460" stroke="#00E5FF" stroke-width="4" opacity="0.4"/>
  <!-- 중앙 핀 (크게) -->
  <circle cx="512" cy="400" r="70" fill="#FF5722"/>
  <circle cx="512" cy="400" r="40" fill="white"/>
  <circle cx="512" cy="400" r="20" fill="#FF5722"/>
  <!-- 핀 꼬리 -->
  <path d="M460,450 Q512,560 564,450" fill="#FF5722"/>
  <!-- 물음표 (핀 안) -->
  <text x="512" y="418" font-family="Arial Black,Arial" font-size="52" font-weight="900" fill="white" text-anchor="middle">?</text>
  <!-- Layer 3: 좌표 텍스트 -->
  <text x="512" y="680" font-family="Consolas,monospace" font-size="36" fill="#00E5FF" text-anchor="middle">37.5°N 127.0°E</text>
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#00E5FF" text-anchor="middle">LOCATE!</text>
</svg>
