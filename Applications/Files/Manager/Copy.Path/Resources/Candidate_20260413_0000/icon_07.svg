<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: metaphor · 실루엣/캐릭터 · 손가락이 경로 바를 집는 모습 -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4C1F9"/>
      <stop offset="1" stop-color="#A685E2"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- 경로 바 (하이라이트 된 텍스트처럼) -->
  <rect x="180" y="540" width="664" height="140" rx="32" fill="#FFD93D" stroke="#B88A00" stroke-width="14"/>
  <text x="512" y="640" font-family="Consolas, monospace" font-weight="700" font-size="88" fill="#2C3E50" text-anchor="middle">C:\docs\note</text>
  <!-- 손 (단순한 실루엣) -->
  <g transform="translate(0 0)">
    <!-- 손바닥 -->
    <path d="M 380 240 Q 380 180 440 170 L 560 170 Q 620 180 620 240 L 620 410 Q 620 470 560 480 L 440 480 Q 380 470 380 410 Z" fill="#FFD1A8" stroke="#A8751F" stroke-width="14"/>
    <!-- 엄지 -->
    <path d="M 360 330 Q 300 320 290 380 Q 290 430 360 430" fill="#FFD1A8" stroke="#A8751F" stroke-width="14"/>
    <!-- 집게 손가락 (경로에 닿음) -->
    <rect x="490" y="460" width="70" height="140" rx="30" fill="#FFD1A8" stroke="#A8751F" stroke-width="14"/>
    <circle cx="525" cy="600" r="28" fill="#FFFFFF" stroke="#A8751F" stroke-width="10"/>
  </g>
  <!-- 스파클 / 복사 효과 -->
  <g fill="#FFFFFF" stroke="#FFD93D" stroke-width="8">
    <circle cx="200" cy="300" r="20"/>
    <circle cx="820" cy="360" r="16"/>
    <circle cx="140" cy="500" r="14"/>
    <circle cx="880" cy="560" r="18"/>
  </g>
  <!-- COPY 액션 -->
  <rect x="362" y="760" width="300" height="110" rx="34" fill="#FFFFFF" stroke="#2C3E50" stroke-width="12"/>
  <text x="512" y="842" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#6C3483" text-anchor="middle">COPY</text>
</svg>
