<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 블랙 -->
  <rect width="1024" height="1024" rx="180" fill="#050010"/>
  <!-- Layer 2: 네온 칼날로 도형을 슬라이스 -->
  <!-- 슬라이스된 육각형 (상반부) -->
  <polygon points="512,160 680,260 680,420 512,390" fill="#00E5FF" opacity="0.9"/>
  <!-- 슬라이스된 육각형 (하반부, 약간 분리) -->
  <polygon points="512,430 680,440 680,580 512,660" fill="#00B8D4" opacity="0.8"/>
  <!-- 왼쪽 반쪽들 -->
  <polygon points="512,160 344,260 344,420 512,390" fill="#00ACC1" opacity="0.85"/>
  <polygon points="512,430 344,440 344,580 512,660" fill="#00838F" opacity="0.75"/>
  <!-- 슬라이스 라인 (네온 빛) -->
  <line x1="180" y1="410" x2="844" y2="420" stroke="#FF00FF" stroke-width="8" stroke-linecap="round"/>
  <!-- 네온 글로우 효과 -->
  <line x1="180" y1="410" x2="844" y2="420" stroke="#FF00FF" stroke-width="24" stroke-linecap="round" opacity="0.3"/>
  <!-- 슬라이스 후 입자 효과 -->
  <circle cx="300" cy="414" r="8" fill="#FF00FF" opacity="0.8"/>
  <circle cx="512" cy="415" r="12" fill="#FF00FF"/>
  <circle cx="700" cy="416" r="6" fill="#FF00FF" opacity="0.7"/>
  <!-- Layer 3: 네온 타이틀 -->
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#FF00FF" text-anchor="middle" opacity="0.95">SLICE</text>
  <!-- 글로우 -->
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="none" stroke="#FF00FF" stroke-width="3" text-anchor="middle" opacity="0.4"/>
</svg>
