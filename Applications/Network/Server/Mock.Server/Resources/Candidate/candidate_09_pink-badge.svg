<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A1A"/>
      <stop offset="100%" stop-color="#2D0D2D"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#8338EC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Server box -->
  <rect x="100" y="130" width="312" height="200" rx="20" fill="#2A0A2A" stroke="#FF006E" stroke-width="2"/>
  <!-- Drive bays -->
  <rect x="120" y="150" width="272" height="40" rx="8" fill="#3D0D3D"/>
  <rect x="120" y="200" width="272" height="40" rx="8" fill="#3D0D3D"/>
  <rect x="120" y="250" width="272" height="40" rx="8" fill="#3D0D3D"/>
  <circle cx="365" cy="170" r="7" fill="#FF006E"/>
  <circle cx="345" cy="170" r="7" fill="#8338EC"/>
  <circle cx="365" cy="220" r="7" fill="#3BFF74"/>
  <circle cx="345" cy="220" r="7" fill="#FF006E"/>
  <circle cx="365" cy="270" r="7" fill="#FFD600"/>
  <circle cx="345" cy="270" r="7" fill="#3BFF74"/>
  <!-- Mock pill badge -->
  <rect x="150" y="360" width="212" height="54" rx="27" fill="url(#pill)"/>
  <text x="256" y="395" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">MOCK</text>
  <!-- Antenna -->
  <line x1="256" y1="130" x2="256" y2="80" stroke="#FF006E" stroke-width="4"/>
  <circle cx="256" cy="72" r="12" fill="#FF006E"/>
</svg>