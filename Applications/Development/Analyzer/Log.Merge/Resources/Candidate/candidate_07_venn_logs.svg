<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Venn circle left -->
  <circle cx="196" cy="256" r="140" fill="#1565c0" opacity="0.4" stroke="#42a5f5" stroke-width="4"/>
  <!-- Venn circle right -->
  <circle cx="316" cy="256" r="140" fill="#b71c1c" opacity="0.4" stroke="#ef5350" stroke-width="4"/>
  <!-- Log-A label -->
  <text x="140" y="200" font-family="monospace" font-size="18" fill="#90caf9" text-anchor="middle">log-A</text>
  <rect x="100" y="215" width="80" height="7" rx="3" fill="#42a5f5" opacity="0.8"/>
  <rect x="100" y="230" width="70" height="7" rx="3" fill="#42a5f5" opacity="0.8"/>
  <rect x="100" y="245" width="75" height="7" rx="3" fill="#42a5f5" opacity="0.8"/>
  <!-- Log-B label -->
  <text x="370" y="200" font-family="monospace" font-size="18" fill="#ef9a9a" text-anchor="middle">log-B</text>
  <rect x="330" y="215" width="80" height="7" rx="3" fill="#ef5350" opacity="0.8"/>
  <rect x="330" y="230" width="70" height="7" rx="3" fill="#ef5350" opacity="0.8"/>
  <rect x="330" y="245" width="75" height="7" rx="3" fill="#ef5350" opacity="0.8"/>
  <!-- Intersection (merged) -->
  <text x="256" y="248" font-family="monospace" font-size="14" fill="#ffd740" text-anchor="middle">MERGE</text>
  <rect x="218" y="258" width="76" height="7" rx="3" fill="#ffd740" opacity="0.9"/>
  <rect x="218" y="272" width="76" height="7" rx="3" fill="#ffd740" opacity="0.9"/>
  <rect x="218" y="286" width="76" height="7" rx="3" fill="#ffd740" opacity="0.9"/>
  <!-- Output arrow down -->
  <line x1="256" y1="356" x2="256" y2="440" stroke="#ffd740" stroke-width="5" stroke-linecap="round"/>
  <polygon points="246,436 256,460 266,436" fill="#ffd740"/>
  <!-- Output file -->
  <rect x="220" y="460" width="72" height="40" rx="8" fill="#ff8f00" opacity="0.8"/>
