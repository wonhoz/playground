<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 수정 면들 (색상 그레이딩) -->
  <polygon points="256,90 370,200 256,310 142,200" fill="#A78BFA" opacity="0.08"/>
  <polygon points="256,90 370,200 256,310 142,200" fill="none" stroke="#A78BFA" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 수정 하단 -->
  <polygon points="256,310 370,200 370,360 256,440 142,360 142,200" fill="#C084FC" opacity="0.04"/>
  <polygon points="256,310 370,360 256,440" fill="none" stroke="#C084FC" stroke-width="2"/>
  <polygon points="256,310 142,360 256,440" fill="none" stroke="#A78BFA" stroke-width="2"/>
  <line x1="370" y1="200" x2="370" y2="360" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <line x1="142" y1="200" x2="142" y2="360" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <!-- 색상 면들 -->
  <polygon points="256,90 370,200 256,200" fill="#FF6B6B" opacity="0.12"/>
  <polygon points="256,90 142,200 256,200" fill="#A78BFA" opacity="0.1"/>
  <polygon points="142,200 256,200 256,310" fill="#06D6A0" opacity="0.1"/>
  <polygon points="370,200 256,200 256,310" fill="#FFD166" opacity="0.1"/>
  <!-- 버텍스 -->
  <circle cx="256" cy="90" r="9" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="370" cy="200" r="8" fill="#FF6B6B" filter="url(#glow)"/>
  <circle cx="256" cy="310" r="8" fill="#06D6A0" filter="url(#glow)"/>
  <circle cx="142" cy="200" r="8" fill="#FFD166" filter="url(#glow)"/>
  <circle cx="256" cy="440" r="8" fill="#C084FC" filter="url(#glow)"/>
  <!-- 중앙 -->
  <circle cx="256" cy="200" r="14" fill="#A78BFA" opacity="0.3"/>
  <circle cx="256" cy="200" r="8" fill="#A78BFA" opacity="0.8" filter="url(#glow)"/>
</svg>