<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스크린샷 주석 도구 -->
  <!-- 스크린샷 배경 -->
  <rect x="60" y="80" width="392" height="300" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <!-- 캡처된 웹페이지 내용 -->
  <rect x="60" y="80" width="392" height="20" rx="8" fill="#0a1520" opacity="0.9"/>
  <circle cx="78" cy="90" r="4" fill="#EF4444" opacity="0.7"/>
  <circle cx="92" cy="90" r="4" fill="#FDE047" opacity="0.7"/>
  <circle cx="106" cy="90" r="4" fill="#4ADE80" opacity="0.7"/>
  <rect x="60" y="100" width="392" height="280" rx="0" fill="#06101c" opacity="0.7"/>
  <!-- 페이지 내용 -->
  <rect x="70" y="110" width="370" height="25" rx="3" fill="#0a1828" opacity="0.7"/>
  <rect x="80" y="118" width="120" height="10" rx="3" fill="#38BDF8" opacity="0.4"/>
  <rect x="70" y="142" width="250" height="100" rx="4" fill="#0a1828" opacity="0.6"/>
  <rect x="80" y="152" width="220" height="14" rx="3" fill="#38BDF8" opacity="0.3"/>
  <rect x="80" y="172" width="180" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="80" y="184" width="200" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="80" y="196" width="160" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="80" y="210" width="60" height="20" rx="5" fill="#38BDF8" opacity="0.4"/>
  <rect x="332" y="142" width="108" height="100" rx="4" fill="#0a1828" opacity="0.6"/>
  <!-- 주석 요소들 -->
  <!-- 화살표 주석 -->
  <path d="M155,200 L210,172" stroke="#EF4444" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="208,165 214,176 202,176" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 텍스트 주석 박스 -->
  <rect x="105" y="208" width="120" height="30" rx="6" fill="#1a0a0a" stroke="#EF4444" stroke-width="1.5" filter="url(#glow)" opacity="0.95"/>
  <text x="165" y="226" text-anchor="middle" font-size="10" fill="#EF4444" opacity="0.9">Button too small!</text>
  <!-- 형광펜 주석 -->
  <rect x="80" y="168" width="224" height="16" rx="2" fill="#FDE047" opacity="0.15"/>
  <rect x="80" y="168" width="224" height="16" rx="2" fill="none" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <!-- 원 주석 (버그 마크) -->
  <circle cx="380" cy="195" r="28" fill="none" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <path d="M380,172 L380,165 Q392,158 400,165" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <rect x="398" y="148" width="52" height="18" rx="4" fill="#060d16" stroke="#38BDF8" stroke-width="1" opacity="0.9"/>
  <text x="424" y="160" text-anchor="middle" font-size="8" fill="#38BDF8" opacity="0.9">Check this</text>
  <!-- 번호 마커 -->
  <circle cx="80" cy="218" r="9" fill="#38BDF8" filter="url(#glow)" opacity="0.9"/>
  <text x="80" y="222" text-anchor="middle" font-size="10" fill="#030508" font-weight="bold">1</text>
  <circle cx="380" cy="195" r="9" fill="#38BDF8" filter="url(#glow)" opacity="0.8"/>
  <text x="380" y="199" text-anchor="middle" font-size="10" fill="#030508" font-weight="bold">2</text>
  <!-- 도구 팔레트 (우측) -->
  <rect x="58" y="248" width="24" height="130" rx="8" fill="#0a1520" stroke="#38BDF8" stroke-width="1" opacity="0.9"/>
  <circle cx="70" cy="265" r="7" fill="#EF4444" opacity="0.8"/>
  <circle cx="70" cy="285" r="7" fill="#FDE047" opacity="0.8"/>
  <circle cx="70" cy="305" r="7" fill="#38BDF8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="70" cy="325" r="7" fill="#4ADE80" opacity="0.7"/>
  <text x="70" y="349" text-anchor="middle" font-size="12" fill="#38BDF8" opacity="0.7">↕</text>
  <!-- 하단 -->
  <rect x="80" y="400" width="352" height="68" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="426" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">ANNOTATION TOOL</text>
  <text x="256" y="450" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">스크린샷 주석 도구</text>
</svg>
