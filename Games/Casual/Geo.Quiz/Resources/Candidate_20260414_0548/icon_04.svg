<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>

  <!-- Grade result cards (stacked, A on top) -->
  <!-- F card (back) -->
  <rect x="168" y="290" width="360" height="260" rx="24" fill="#BDBDBD" stroke="#757575" stroke-width="12" transform="rotate(-8 348 420)"/>
  <text x="330" y="440" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="#757575" text-anchor="middle" transform="rotate(-8 348 420)">F</text>

  <!-- C card (middle-back) -->
  <rect x="268" y="240" width="360" height="260" rx="24" fill="#FFECB3" stroke="#FFB300" stroke-width="12" transform="rotate(-3 448 370)"/>
  <text x="445" y="402" font-family="Arial Black, sans-serif" font-weight="900" font-size="160" fill="#FFB300" text-anchor="middle" transform="rotate(-3 448 370)">C</text>

  <!-- A card (front, large, prominent) -->
  <rect x="380" y="168" width="420" height="300" rx="28" fill="#FCE4EC" stroke="#E91E63" stroke-width="16"/>
  <text x="590" y="380" font-family="Arial Black, sans-serif" font-weight="900" font-size="200" fill="#E91E63" text-anchor="middle">A</text>

  <!-- Score strip -->
  <rect x="112" y="490" width="808" height="84" rx="20" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="516" y="549" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">92 pts — PERFECT!</text>

  <!-- GRADE badge -->
  <rect x="228" y="752" width="568" height="116" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">GRADE</text>
</svg>
