<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080820"/>
      <stop offset="100%" stop-color="#10103A"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon waveform -->
  <polyline points="88,256 108,220 128,290 148,190 168,310 188,175 208,320 228,185 248,295 268,205 288,275 308,215 328,265 348,230 368,250 388,255 408,256 428,256"
    fill="none" stroke="#00FFCC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  <polyline points="88,256 108,220 128,290 148,190 168,310 188,175 208,320 228,185 248,295 268,205 288,275 308,215 328,265 348,230 368,250 388,255 408,256 428,256"
    fill="none" stroke="#00FFCC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Tag box -->
  <rect x="130" y="330" width="252" height="100" rx="12" fill="#0A0A25" stroke="#00FFCC" stroke-width="2" opacity="0.9"/>
  <!-- Neon text fields -->
  <g font-family="monospace" font-size="12" fill="#00FFCC">
    <text x="148" y="355" opacity="0.8">T:</text>
    <rect x="168" y="344" width="190" height="9" rx="4" fill="#00FFCC" opacity="0.25"/>
    <text x="148" y="376" opacity="0.8">A:</text>
    <rect x="168" y="365" width="155" height="9" rx="4" fill="#00FFCC" opacity="0.25"/>
    <text x="148" y="397" opacity="0.8">G:</text>
    <rect x="168" y="386" width="135" height="9" rx="4" fill="#00FFCC" opacity="0.25"/>
    <text x="148" y="418" opacity="0.8">Y:</text>
    <rect x="168" y="407" width="80" height="9" rx="4" fill="#00FFCC" opacity="0.25"/>
  </g>
  <!-- Cursor blink -->
  <rect x="362" y="344" width="2" height="12" fill="#00FFCC" filter="url(#neon)"/>
  <!-- Music note neon -->
  <g transform="translate(390,140)" filter="url(#neon)">
    <ellipse cx="0" cy="18" rx="14" ry="10" fill="none" stroke="#FF00FF" stroke-width="3" transform="rotate(-15)"/>
    <rect x="12" y="-28" width="4" height="46" rx="2" fill="#FF00FF"/>
    <polygon points="12,-28 38,-40 38,-20 12,-8" fill="#FF00FF"/>
  </g>
</svg>
