<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 비비드 딥 티얼 -->
  <rect width="1024" height="1024" rx="180" fill="#004D5B"/>
  <!-- Layer 2: 태양계 미니어처 (다양한 크기 행성들) -->
  <!-- 태양 (중앙) -->
  <circle cx="512" cy="512" r="120" fill="#FF6D00" opacity="0.95"/>
  <circle cx="512" cy="512" r="100" fill="#FF8F00"/>
  <circle cx="512" cy="512" r="80" fill="#FFA726"/>
  <circle cx="512" cy="512" r="60" fill="#FFD740"/>
  <!-- 태양광선 -->
  <line x1="512" y1="392" x2="512" y2="352" stroke="#FFD740" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="632" x2="512" y2="672" stroke="#FFD740" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="392" y1="512" x2="352" y2="512" stroke="#FFD740" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="632" y1="512" x2="672" y2="512" stroke="#FFD740" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- 궤도 1 + 행성 (수성) -->
  <circle cx="512" cy="512" r="200" fill="none" stroke="#78909C" stroke-width="3" opacity="0.5"/>
  <circle cx="712" cy="512" r="24" fill="#78909C"/>
  <!-- 궤도 2 + 행성 (금성) -->
  <circle cx="512" cy="512" r="270" fill="none" stroke="#FBC02D" stroke-width="3" opacity="0.5"/>
  <circle cx="512" cy="242" r="32" fill="#FBC02D"/>
  <!-- 궤도 3 + 행성 (지구) -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#1565C0" stroke-width="3" opacity="0.5"/>
  <circle cx="190" cy="450" r="36" fill="#1565C0"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FFD740" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
