<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0600"/>
    </radialGradient>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <radialGradient id="roseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0600"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer compass ring -->
  <circle cx="256" cy="256" r="200" fill="url(#compassGrad)"/>
  <circle cx="256" cy="256" r="188" fill="url(#roseGrad)"/>
  <!-- Degree marks -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#d4a843" stroke-width="1" stroke-dasharray="3,9"/>
  <!-- Cardinal direction marks -->
  <rect x="249" y="70" width="14" height="30" rx="4" fill="url(#compassGrad)"/>
  <rect x="249" y="412" width="14" height="30" rx="4" fill="url(#compassGrad)"/>
  <rect x="70" y="249" width="30" height="14" rx="4" fill="url(#compassGrad)"/>
  <rect x="412" y="249" width="30" height="14" rx="4" fill="url(#compassGrad)"/>
  <!-- Cardinal letters -->
  <text x="256" y="108" font-family="Arial" font-size="28" font-weight="900" fill="#ff1744" text-anchor="middle">N</text>
  <text x="256" y="425" font-family="Arial" font-size="22" font-weight="bold" fill="url(#compassGrad)" text-anchor="middle">S</text>
  <text x="426" y="263" font-family="Arial" font-size="22" font-weight="bold" fill="url(#compassGrad)" text-anchor="middle">E</text>
  <text x="86" y="263" font-family="Arial" font-size="22" font-weight="bold" fill="url(#compassGrad)" text-anchor="middle">W</text>
  <!-- Compass rose petals -->
  <polygon points="256,120 245,250 256,240 267,250" fill="#ff1744"/>
  <polygon points="256,392 245,262 256,272 267,262" fill="#d4a843"/>
  <polygon points="120,256 250,245 240,256 250,267" fill="#d4a843"/>
  <polygon points="392,256 262,245 272,256 262,267" fill="#d4a843"/>
  <!-- Diagonal petals smaller -->
  <polygon points="166,166 248,247 252,242 248,248" fill="#d4a843" transform="rotate(0)"/>
  <polygon points="346,166 264,247 260,242 264,248" fill="#d4a843"/>
  <polygon points="346,346 264,265 260,270 264,264" fill="#d4a843"/>
  <polygon points="166,346 248,265 252,270 248,264" fill="#d4a843"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="40" fill="url(#compassGrad)"/>
  <circle cx="256" cy="256" r="30" fill="url(#roseGrad)"/>
  <circle cx="256" cy="256" r="10" fill="url(#compassGrad)"/>
  <!-- Location pin on compass -->
  <path d="M292,200 Q272,165 272,145 A22,22 0 0,1 314,145 Q314,165 292,200 Z" fill="#ff1744" opacity="0.9"/>
  <circle cx="292" cy="145" r="11" fill="white"/>
  <text x="292" y="150" font-family="Arial" font-size="12" font-weight="bold" fill="#ff1744" text-anchor="middle">?</text>
  <!-- Title with retro style -->
  <text x="256" y="490" font-family="Arial" font-size="30" font-weight="900" fill="url(#compassGrad)" text-anchor="middle" letter-spacing="4">GEO.QUIZ</text>
</svg>
