  <text x="80" y="80" font-family="'Courier New', monospace" font-size="14" fill="#00FF41" opacity="0.15">01101</text>
  <text x="80" y="100" font-family="'Courier New', monospace" font-size="14" fill="#00FF41" opacity="0.1">10011</text>
