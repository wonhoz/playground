<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- Brick wall (right side) -->
  <rect x="500" y="180" width="200" height="90" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="712" y="180" width="172" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="500" y="282" width="200" height="90" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="712" y="282" width="172" height="90" rx="8" fill="#1A237E" opacity="0.75"/>
  <rect x="500" y="384" width="200" height="90" rx="8" fill="#1A237E" opacity="0.75"/>
  <rect x="712" y="384" width="172" height="90" rx="8" fill="#1A237E" opacity="0.7"/>
  <rect x="500" y="486" width="200" height="90" rx="8" fill="#5C6BC0" opacity="0.6"/>
  <rect x="712" y="486" width="172" height="90" rx="8" fill="#5C6BC0" opacity="0.55"/>
  <rect x="500" y="588" width="200" height="90" rx="8" fill="#1A237E" opacity="0.55"/>
  <rect x="712" y="588" width="172" height="90" rx="8" fill="#1A237E" opacity="0.5"/>
  <!-- Cannonball (flying left to right) -->
  <circle cx="320" cy="450" r="90" fill="#5C6BC0" opacity="0.9"/>
  <circle cx="320" cy="450" r="90" fill="none" stroke="#9FA8DA" stroke-width="14"/>
  <!-- Cannonball highlight -->
  <circle cx="286" cy="416" r="24" fill="#9FA8DA" opacity="0.3"/>
  <!-- Impact crater/explosion at wall hit point -->
  <!-- Explosion rays -->
  <line x1="500" y1="450" x2="440" y2="390" stroke="#5C6BC0" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <line x1="500" y1="450" x2="430" y2="450" stroke="#5C6BC0" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  <line x1="500" y1="450" x2="440" y2="510" stroke="#5C6BC0" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <line x1="500" y1="450" x2="480" y2="360" stroke="#9FA8DA" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="500" y1="450" x2="480" y2="540" stroke="#9FA8DA" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <!-- Brick fragments flying -->
  <rect x="380" y="320" width="54" height="36" rx="6" fill="#1A237E" opacity="0.7" transform="rotate(-20,407,338)"/>
  <rect x="360" y="520" width="54" height="36" rx="6" fill="#1A237E" opacity="0.65" transform="rotate(15,387,538)"/>
  <rect x="280" y="360" width="40" height="28" rx="4" fill="#5C6BC0" opacity="0.5" transform="rotate(-35,300,374)"/>
  <!-- Motion trail -->
  <ellipse cx="220" cy="450" rx="120" ry="28" fill="#1A237E" opacity="0.25"/>
</svg>
