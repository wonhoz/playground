<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="30%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#0A0A20"/>
      <stop offset="100%" stop-color="#020210"/>
    </radialGradient>
    <radialGradient id="target02" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#80FFDC"/>
      <stop offset="100%" stop-color="#008860"/>
    </radialGradient>
    <radialGradient id="planet02" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80AAFF"/>
      <stop offset="100%" stop-color="#2244AA"/>
    </radialGradient>
    <radialGradient id="targetGlow02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFC0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00FFC0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Deep space -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <g clip-path="url(#frame02)">
    <!-- Stars -->
    <circle cx="160" cy="200" r="2" fill="white" opacity="0.6"/>
    <circle cx="300" cy="140" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="600" cy="100" r="2" fill="white" opacity="0.6"/>
    <circle cx="900" cy="160" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="120" cy="500" r="2" fill="white" opacity="0.5"/>
    <circle cx="950" cy="700" r="2" fill="white" opacity="0.6"/>
    <circle cx="500" cy="950" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="800" cy="880" r="2" fill="white" opacity="0.5"/>

    <!-- Layer 2: Launch probe (lower-left) -->
    <!-- Probe = small triangle spaceship -->
    <polygon points="195,780 175,830 215,830" fill="#FFF0A0"/>
    <circle cx="195" cy="805" r="16" fill="#FFD060" opacity="0.45"/>

    <!-- Aim line (from probe to upper right) -->
    <line x1="195" y1="805" x2="680" y2="295" stroke="#FFD880" stroke-width="5" stroke-dasharray="12,16" stroke-linecap="round" opacity="0.65"/>

    <!-- Preview trajectory curve (arc showing predicted path) -->
    <!-- Bezier curve: from probe to orbit around target -->
    <path d="M195,805 Q350,300 680,295" fill="none" stroke="#88CCFF" stroke-width="7" stroke-dasharray="14,18" stroke-linecap="round" opacity="0.55"/>
    <!-- Additional curve showing orbit completion -->
    <path d="M680,295 Q900,400 820,600 Q740,750 590,720 Q480,700 500,580" fill="none" stroke="#88CCFF" stroke-width="5" stroke-dasharray="10,16" stroke-linecap="round" opacity="0.35"/>

    <!-- Planet (gravity influence) -->
    <circle cx="320" cy="450" r="55" fill="url(#planet02)"/>
    <ellipse cx="305" cy="435" rx="20" ry="13" fill="white" opacity="0.2"/>

    <!-- Target planet (cyan) with orbit ring -->
    <circle cx="690" cy="390" r="20" fill="url(#targetGlow02)"/>
    <circle cx="690" cy="390" r="80" fill="url(#targetGlow02)" opacity="0.4"/>
    <!-- Orbit ring -->
    <ellipse cx="690" cy="390" rx="195" ry="155" fill="none" stroke="#00FFC0" stroke-width="4" stroke-dasharray="12,10" opacity="0.6"/>
    <!-- Target planet body -->
    <circle cx="690" cy="390" r="78" fill="url(#target02)"/>
    <ellipse cx="672" cy="372" rx="28" ry="18" fill="white" opacity="0.22"/>
    <!-- "TARGET" label -->
    <text x="690" y="503" font-family="'Segoe UI',Arial" font-size="28" font-weight="700" fill="#00FFC0" text-anchor="middle" opacity="0.8">TARGET</text>

    <!-- Layer 3: Level indicator + aim arrow -->
    <!-- Level badge -->
    <rect x="828" y="82" width="120" height="50" rx="12" fill="#1A1A30"/>
    <text x="888" y="114" font-family="'Segoe UI',Arial" font-size="30" font-weight="700" fill="#88CCFF" text-anchor="middle">Lv.3</text>

    <!-- Aim indicator arrow at probe -->
    <polygon points="260,750 240,785 280,785" fill="#FFD880" opacity="0.7"/>

    <!-- Instructions -->
    <rect x="80" y="880" width="864" height="62" rx="12" fill="#101020"/>
    <text x="512" y="918" font-family="'Segoe UI',Arial" font-size="32" fill="#445566" text-anchor="middle">조준 → 발사 → 목표 행성 궤도 진입!</text>
  </g>
</svg>
