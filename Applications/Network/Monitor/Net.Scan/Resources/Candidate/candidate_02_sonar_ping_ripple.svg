<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#001530"/>
    </linearGradient>
    <radialGradient id="ping" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00b0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ripple rings -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="#00b0ff" stroke-width="6" opacity="0.9"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#00b0ff" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00b0ff" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#0077c2" stroke-width="2" opacity="0.25"/>
  <!-- center pulse -->
  <circle cx="256" cy="256" r="30" fill="url(#ping)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="16" fill="#00b0ff" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="8" fill="white"/>
  <!-- device dots detected -->
  <circle cx="340" cy="180" r="10" fill="#40c4ff" filter="url(#glow)"/>
  <circle cx="340" cy="180" r="5" fill="white"/>
  <circle cx="160" cy="310" r="10" fill="#00b0ff" filter="url(#glow)"/>
  <circle cx="160" cy="310" r="5" fill="white"/>
  <circle cx="370" cy="320" r="8" fill="#40c4ff" filter="url(#glow)"/>
  <circle cx="130" cy="170" r="7" fill="#00b0ff" filter="url(#glow)"/>
  <!-- small device icons at some dots -->
  <rect x="328" y="168" width="24" height="18" rx="3" fill="none" stroke="#40c4ff" stroke-width="2"/>
  <rect x="334" y="174" width="12" height="6" rx="1" fill="#40c4ff" opacity="0.5"/>
</svg>
