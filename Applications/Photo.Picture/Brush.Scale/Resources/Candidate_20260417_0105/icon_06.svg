<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <clipPath id="imgClip6"><rect x="120" y="180" width="784" height="600" rx="24"/></clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: Main image frame -->
  <rect x="120" y="180" width="784" height="600" rx="24" fill="#E0E0E0"/>

  <!-- Left: pixelated / blurry -->
  <g clip-path="url(#imgClip6)">
    <!-- Blurry pixel art -->
    <rect x="120" y="180" width="392" height="600" fill="#ECEFF1"/>
    <rect x="132" y="192" width="100" height="100" rx="6" fill="#B0BEC5"/>
    <rect x="242" y="192" width="100" height="100" rx="6" fill="#90A4AE"/>
    <rect x="352" y="192" width="100" height="100" rx="6" fill="#B0BEC5"/>
    <rect x="132" y="302" width="100" height="100" rx="6" fill="#90A4AE"/>
    <rect x="242" y="302" width="100" height="100" rx="6" fill="#78909C"/>
    <rect x="352" y="302" width="100" height="100" rx="6" fill="#90A4AE"/>
    <rect x="132" y="412" width="100" height="100" rx="6" fill="#78909C"/>
    <rect x="242" y="412" width="100" height="100" rx="6" fill="#B0BEC5"/>
    <rect x="352" y="412" width="100" height="100" rx="6" fill="#607D8B"/>
    <rect x="132" y="522" width="100" height="100" rx="6" fill="#B0BEC5"/>
    <rect x="242" y="522" width="100" height="100" rx="6" fill="#607D8B"/>
    <rect x="352" y="522" width="100" height="100" rx="6" fill="#78909C"/>
    <!-- BEFORE label -->
    <rect x="148" y="714" width="200" height="54" rx="12" fill="#FF7043"/>
    <text x="248" y="751" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">BEFORE</text>
  </g>

  <!-- Right: sharp, clean -->
  <g clip-path="url(#imgClip6)">
    <rect x="512" y="180" width="392" height="600" fill="#E8F5E9"/>
    <!-- Sharp landscape -->
    <rect x="512" y="180" width="392" height="340" fill="#B3E5FC"/>
    <!-- Sun -->
    <circle cx="680" cy="310" r="70" fill="#FF8F00"/>
    <!-- Clouds -->
    <ellipse cx="820" cy="260" rx="70" ry="36" fill="white" opacity="0.9"/>
    <ellipse cx="770" cy="252" rx="50" ry="28" fill="white" opacity="0.9"/>
    <!-- Mountains -->
    <path d="M512,440 L590,340 L670,390 L760,300 L860,380 L904,350 L904,520 L512,520 Z" fill="#1565C0"/>
    <!-- Grass -->
    <rect x="512" y="500" width="392" height="280" fill="#4CAF50"/>
    <!-- AFTER label -->
    <rect x="652" y="714" width="200" height="54" rx="12" fill="#1A237E"/>
    <text x="752" y="751" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">AFTER</text>
  </g>

  <!-- Layer 3: Slider handle -->
  <line x1="512" y1="180" x2="512" y2="780" stroke="white" stroke-width="8"/>
  <circle cx="512" cy="490" r="44" fill="white" stroke="#FF7043" stroke-width="10"/>
  <polygon points="488,490 512,464 512,516" fill="#FF7043"/>
  <polygon points="536,490 512,464 512,516" fill="#1A237E" transform="rotate(180, 512, 490)"/>

  <!-- Bottom label -->
  <text x="512" y="920" font-family="Arial Black, sans-serif" font-size="74" font-weight="900" fill="#E65100" text-anchor="middle">Brush.Scale</text>
</svg>
