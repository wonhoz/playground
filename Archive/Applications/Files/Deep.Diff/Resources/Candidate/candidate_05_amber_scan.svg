<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1000"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- scan lines effect -->
  <rect x="90" y="100" width="332" height="320" rx="8" fill="#0a0800" stroke="#f59e0b" stroke-width="2"/>
  <!-- scan beam -->
  <rect x="90" y="230" width="332" height="4" fill="#f59e0b" opacity="0.6"/>
  <rect x="90" y="210" width="332" height="20" fill="#f59e0b" opacity="0.05"/>
  <!-- lines above beam - checked -->
  <rect x="106" y="116" width="300" height="10" rx="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="106" y="134" width="280" height="10" rx="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="106" y="152" width="300" height="10" rx="3" fill="#ff6b6b" opacity="0.7"/>
  <rect x="106" y="170" width="260" height="10" rx="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="106" y="188" width="290" height="10" rx="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="106" y="206" width="300" height="10" rx="3" fill="#4ade80" opacity="0.7"/>
  <!-- lines below beam - scanning -->
  <rect x="106" y="248" width="300" height="10" rx="3" fill="#fbbf24" opacity="0.25"/>
  <rect x="106" y="266" width="240" height="10" rx="3" fill="#fbbf24" opacity="0.25"/>
  <rect x="106" y="284" width="300" height="10" rx="3" fill="#fbbf24" opacity="0.25"/>
  <rect x="106" y="302" width="270" height="10" rx="3" fill="#fbbf24" opacity="0.25"/>
  <!-- magnifier -->
  <circle cx="380" cy="350" r="55" fill="none" stroke="#f59e0b" stroke-width="5"/>
  <line x1="422" y1="392" x2="455" y2="425" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
  <text x="380" y="350" font-family="monospace" font-size="38" font-weight="bold" fill="#fbbf24" text-anchor="middle" dominant-baseline="central">?</text>
</svg>
