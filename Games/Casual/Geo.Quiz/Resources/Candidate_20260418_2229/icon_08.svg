<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background coral to dark red -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Flag grid 2x2 with streak flames -->
  <!-- Flag 1 - Red/White stripes (USA-like) -->
  <rect x="130" y="130" width="340" height="240" rx="14" fill="#E53935"/>
  <rect x="130" y="170" width="340" height="32" rx="0" fill="#FFFFFF"/>
  <rect x="130" y="234" width="340" height="32" rx="0" fill="#FFFFFF"/>
  <rect x="130" y="298" width="340" height="32" rx="0" fill="#FFFFFF"/>
  <rect x="130" y="130" width="160" height="130" rx="0" fill="#1565C0"/>
  <text x="210" y="210" font-family="Segoe UI Emoji, sans-serif" font-size="60" text-anchor="middle">⭐</text>
  <!-- Flag 2 - Blue/Yellow (Sweden-like) -->
  <rect x="554" y="130" width="340" height="240" rx="14" fill="#1565C0"/>
  <rect x="554" y="220" width="340" height="50" rx="0" fill="#FFD740"/>
  <rect x="680" y="130" width="50" height="240" rx="0" fill="#FFD740"/>
  <!-- Flag 3 - Green/White/Red (Italy-like) -->
  <rect x="130" y="420" width="340" height="240" rx="14" fill="#E53935"/>
  <rect x="130" y="420" width="113" height="240" rx="14" fill="#43A047"/>
  <rect x="243" y="420" width="114" height="240" rx="0" fill="#FFFFFF"/>
  <!-- Flag 4 - Red circle on white (Japan-like) -->
  <rect x="554" y="420" width="340" height="240" rx="14" fill="#FFFFFF"/>
  <circle cx="724" cy="540" r="80" fill="#E53935"/>
  <!-- Layer 3: Flame streak overlay -->
  <path d="M750 750 Q780 680 800 620 Q820 680 810 740 Q850 680 860 600 Q900 670 880 770 Q930 720 910 820 L750 820 Z" fill="#FF6D00" opacity="0.9"/>
  <path d="M780 820 Q800 760 815 710 Q830 760 820 820 Z" fill="#FF3D00" opacity="0.95"/>
  <text x="440" y="830" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#FFFFFF" text-anchor="middle">🔥 5x</text>
</svg>
