<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="key09" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (navy-charcoal) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg09cp)"/>

  <!-- Layer 2: Keyboard shortcut visual -->
  <!-- Keyboard key 1 -->
  <rect x="140" y="340" width="200" height="200" rx="20" fill="url(#key09)"/>
  <rect x="154" y="354" width="172" height="172" rx="14" fill="white"/>
  <text x="240" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold"
    fill="#263238" text-anchor="middle">Ctrl</text>

  <!-- Plus sign -->
  <text x="380" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="80" fill="white"
    text-anchor="middle" opacity="0.7">+</text>

  <!-- Keyboard key 2 -->
  <rect x="420" y="340" width="200" height="200" rx="20" fill="url(#key09)"/>
  <rect x="434" y="354" width="172" height="172" rx="14" fill="white"/>
  <text x="520" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold"
    fill="#263238" text-anchor="middle">Alt</text>

  <!-- Plus sign -->
  <text x="660" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="80" fill="white"
    text-anchor="middle" opacity="0.7">+</text>

  <!-- Keyboard key 3 -->
  <rect x="700" y="340" width="184" height="200" rx="20" fill="#FFC107"/>
  <rect x="714" y="354" width="156" height="172" rx="14" fill="#FFD54F"/>
  <text x="792" y="464" font-family="'Segoe UI',Arial,sans-serif" font-size="96" font-weight="bold"
    fill="#E65100" text-anchor="middle">C</text>

  <!-- Arrow pointing down to popup -->
  <path d="M512 570 L512 640" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <path d="M470 610 L512 660 L554 610" fill="none" stroke="#FFC107" stroke-width="20"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 3: Popup with symbol -->
  <rect x="240" y="670" width="544" height="220" rx="24" fill="white" opacity="0.95"/>
  <text x="380" y="812" font-family="'Segoe UI',Arial,sans-serif" font-size="80" fill="#1A237E"
    text-anchor="middle">© ∑ →</text>
  <!-- Popup pointer -->
  <path d="M490 670 L512 640 L534 670" fill="white" opacity="0.95"/>
</svg>
