<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="100%" stop-color="#0A1428"/>
    </linearGradient>
    <radialGradient id="globe" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="230" cy="240" r="150" fill="url(#globe)" stroke="#3B82F6" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="230" cy="190" rx="150" ry="25" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <ellipse cx="230" cy="240" rx="150" ry="30" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="230" cy="290" rx="150" ry="25" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <!-- Longitude lines -->
  <ellipse cx="230" cy="240" rx="50" ry="150" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <ellipse cx="230" cy="240" rx="100" ry="150" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <!-- Probe arrow -->
  <line x1="350" y1="170" x2="290" y2="210" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <polygon points="290,210 305,196 302,214" fill="#10B981"/>
  <!-- Probe source circle -->
  <circle cx="370" cy="155" r="18" fill="#059669"/>
  <text x="370" y="160" font-family="monospace" font-size="11" fill="white" text-anchor="middle">GET</text>
  <!-- Response badge -->
  <rect x="320" y="290" width="110" height="32" rx="8" fill="#0D9488"/>
  <text x="375" y="311" font-family="monospace" font-size="14" fill="white" text-anchor="middle">200 OK</text>
</svg>