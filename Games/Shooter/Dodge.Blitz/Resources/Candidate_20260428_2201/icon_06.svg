  </g>
  <!-- incoming bullet -->
  <ellipse cx="180" cy="430" rx="80" ry="26" fill="#FF2E6E" stroke="#FFFFFF" stroke-width="6"/>
  <!-- diamond character with face -->
  <polygon points="540,300 760,520 540,740 320,520" fill="#5BFCE5" stroke="#0CB39A" stroke-width="14"/>
  <!-- panic eyes (looking left at bullet) -->
  <ellipse cx="430" cy="500" rx="36" ry="44" fill="#FFFFFF"/>
  <ellipse cx="540" cy="500" rx="36" ry="44" fill="#FFFFFF"/>
  <circle cx="408" cy="510" r="18" fill="#0A1F2A"/>
  <circle cx="518" cy="510" r="18" fill="#0A1F2A"/>
  <!-- mouth oh -->
  <ellipse cx="490" cy="600" rx="34" ry="22" fill="#0A1F2A"/>
  <!-- sweat drop -->
  <path d="M680,420 Q700,460 690,490 Q680,510 660,510 Q640,510 640,490 Q650,460 670,420 Z" fill="#74C8FF" stroke="#FFFFFF" stroke-width="5"/>
