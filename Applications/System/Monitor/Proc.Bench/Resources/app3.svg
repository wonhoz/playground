<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Barbell / weight (performance load metaphor) -->
  <!-- Bar -->
  <rect x="212" y="480" width="600" height="64" rx="18" fill="#78716C"/>
  <!-- Left weight plate big -->
  <rect x="160" y="350" width="120" height="320" rx="20" fill="#374151"/>
  <rect x="180" y="370" width="80" height="280" rx="12" fill="#4B5563"/>
  <!-- Left weight plate small -->
  <rect x="100" y="410" width="76" height="200" rx="14" fill="#6B7280"/>
  <!-- Right weight plate big -->
  <rect x="744" y="350" width="120" height="320" rx="20" fill="#374151"/>
  <rect x="764" y="370" width="80" height="280" rx="12" fill="#4B5563"/>
  <!-- Right weight plate small -->
  <rect x="848" y="410" width="76" height="200" rx="14" fill="#6B7280"/>
  <!-- Center grip -->
  <rect x="400" y="480" width="224" height="64" rx="18" fill="#92400E"/>
  <!-- CPU score above -->
  <text x="512" y="360" font-family="Arial,sans-serif" font-size="72" fill="#B45309" font-weight="bold" text-anchor="middle">CPU</text>
  <text x="512" y="442" font-family="Arial,sans-serif" font-size="56" fill="#D97706" text-anchor="middle">단일 코어 성능</text>
  <!-- Score label -->
  <text x="512" y="720" font-family="Arial,sans-serif" font-size="100" fill="#1C1917" font-weight="bold" text-anchor="middle">9840</text>
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="52" fill="#78716C" text-anchor="middle">pts</text>
</svg>
