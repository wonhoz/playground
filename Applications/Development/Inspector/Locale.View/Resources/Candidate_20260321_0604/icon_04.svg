<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="lv4-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <filter id="lv4-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#C0A060" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g clip-path="url(#lv4-clip)">
    <!-- Background: Light Cream -->
    <rect width="1024" height="1024" fill="#FFF8EC"/>
    <!-- Subtle warm overlay -->
    <rect width="1024" height="1024" fill="#FFF0D8" opacity="0.4"/>

    <!-- Column headers -->
    <rect x="220" y="220" width="200" height="50" rx="10" fill="#1A3A8A"/>
    <text x="320" y="252" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">en-US</text>

    <rect x="440" y="220" width="200" height="50" rx="10" fill="#8A1A30"/>
    <text x="540" y="252" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ja-JP</text>

    <rect x="660" y="220" width="200" height="50" rx="10" fill="#1A6A30"/>
    <text x="760" y="252" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">de-DE</text>

    <!-- Divider line -->
    <line x1="220" y1="282" x2="870" y2="282" stroke="#C8B890" stroke-width="2" opacity="0.5"/>

    <!-- Row: Date short -->
    <g filter="url(#lv4-shadow)">
      <text x="122" y="336" font-family="monospace" font-size="18" fill="#7A6040" text-anchor="middle">Date</text>
      <rect x="224" y="300" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A3A8A" stroke-width="2" opacity="0.9"/>
      <text x="322" y="332" font-family="monospace" font-size="19" fill="#1A3A8A" text-anchor="middle">3/21/2026</text>
      <rect x="444" y="300" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#8A1A30" stroke-width="2" opacity="0.9"/>
      <text x="542" y="332" font-family="monospace" font-size="19" fill="#8A1A30" text-anchor="middle">2026/3/21</text>
      <rect x="664" y="300" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A6A30" stroke-width="2" opacity="0.9"/>
      <text x="762" y="332" font-family="monospace" font-size="19" fill="#1A6A30" text-anchor="middle">21.03.2026</text>
    </g>

    <!-- Row: Currency -->
    <g filter="url(#lv4-shadow)">
      <text x="122" y="424" font-family="monospace" font-size="18" fill="#7A6040" text-anchor="middle">Curr</text>
      <rect x="224" y="388" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A3A8A" stroke-width="2" opacity="0.9"/>
      <text x="322" y="420" font-family="monospace" font-size="19" fill="#1A3A8A" text-anchor="middle">$1,234.56</text>
      <rect x="444" y="388" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#8A1A30" stroke-width="2" opacity="0.9"/>
      <text x="542" y="420" font-family="monospace" font-size="19" fill="#8A1A30" text-anchor="middle">¥1,235</text>
      <rect x="664" y="388" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A6A30" stroke-width="2" opacity="0.9"/>
      <text x="762" y="420" font-family="monospace" font-size="19" fill="#1A6A30" text-anchor="middle">1.234,56€</text>
    </g>

    <!-- Row: Time -->
    <g filter="url(#lv4-shadow)">
      <text x="122" y="512" font-family="monospace" font-size="18" fill="#7A6040" text-anchor="middle">Time</text>
      <rect x="224" y="476" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A3A8A" stroke-width="2" opacity="0.9"/>
      <text x="322" y="508" font-family="monospace" font-size="19" fill="#1A3A8A" text-anchor="middle">3:45 PM</text>
      <rect x="444" y="476" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#8A1A30" stroke-width="2" opacity="0.9"/>
      <text x="542" y="508" font-family="monospace" font-size="19" fill="#8A1A30" text-anchor="middle">15:45</text>
      <rect x="664" y="476" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A6A30" stroke-width="2" opacity="0.9"/>
      <text x="762" y="508" font-family="monospace" font-size="19" fill="#1A6A30" text-anchor="middle">15:45 Uhr</text>
    </g>

    <!-- Row: Number -->
    <g filter="url(#lv4-shadow)">
      <text x="122" y="600" font-family="monospace" font-size="18" fill="#7A6040" text-anchor="middle">Num</text>
      <rect x="224" y="564" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A3A8A" stroke-width="2" opacity="0.9"/>
      <text x="322" y="596" font-family="monospace" font-size="18" fill="#1A3A8A" text-anchor="middle">1,000.5</text>
      <rect x="444" y="564" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#8A1A30" stroke-width="2" opacity="0.9"/>
      <text x="542" y="596" font-family="monospace" font-size="18" fill="#8A1A30" text-anchor="middle">1,000.5</text>
      <rect x="664" y="564" width="196" height="52" rx="8" fill="#FFFFFF" stroke="#1A6A30" stroke-width="2" opacity="0.9"/>
      <text x="762" y="596" font-family="monospace" font-size="18" fill="#1A6A30" text-anchor="middle">1.000,5</text>
    </g>

    <!-- Row: Week -->
    <g filter="url(#lv4-shadow)">
      <text x="122" y="688" font-family="monospace" font-size="16" fill="#7A6040" text-anchor="middle">Week1</text>
      <rect x="224" y="652" width="196" height="52" rx="8" fill="#FFFBE8" stroke="#C8A040" stroke-width="2" opacity="0.9"/>
      <text x="322" y="684" font-family="monospace" font-size="18" fill="#8A6020" text-anchor="middle">Sunday</text>
      <rect x="444" y="652" width="196" height="52" rx="8" fill="#FFFBE8" stroke="#C8A040" stroke-width="2" opacity="0.9"/>
      <text x="542" y="684" font-family="monospace" font-size="18" fill="#8A6020" text-anchor="middle">Monday</text>
      <rect x="664" y="652" width="196" height="52" rx="8" fill="#FFFBE8" stroke="#C8A040" stroke-width="2" opacity="0.9"/>
      <text x="762" y="684" font-family="monospace" font-size="18" fill="#8A6020" text-anchor="middle">Monday</text>
    </g>

    <!-- Row separator lines -->
    <g stroke="#E0CCA0" stroke-width="1.5" opacity="0.6">
      <line x1="220" y1="362" x2="870" y2="362"/>
      <line x1="220" y1="450" x2="870" y2="450"/>
      <line x1="220" y1="538" x2="870" y2="538"/>
      <line x1="220" y1="626" x2="870" y2="626"/>
    </g>
  </g>
</svg>
