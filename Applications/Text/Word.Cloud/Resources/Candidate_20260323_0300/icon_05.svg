<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 레인보우 단어 팔레트 | 기하학 | #1E1B4B -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E1B4B"/>
  <!-- Layer 2: Rainbow word arc cloud -->
  <!-- Red words (large) -->
  <text x="512" y="320" font-family="Arial,sans-serif" font-size="72" fill="#EF4444" text-anchor="middle" font-weight="bold" transform="rotate(-2 512 320)">CLOUD</text>
  <!-- Orange words -->
  <text x="290" y="400" font-family="Arial,sans-serif" font-size="46" fill="#F97316" text-anchor="middle" font-weight="bold" transform="rotate(-5 290 400)">word</text>
  <text x="740" y="390" font-family="Arial,sans-serif" font-size="44" fill="#FB923C" text-anchor="middle" font-weight="bold" transform="rotate(5 740 390)">text</text>
  <!-- Yellow words -->
  <text x="180" y="490" font-family="Arial,sans-serif" font-size="34" fill="#EAB308" text-anchor="middle" transform="rotate(-8 180 490)">빈도</text>
  <text x="850" y="480" font-family="Arial,sans-serif" font-size="32" fill="#FBBF24" text-anchor="middle" transform="rotate(6 850 480)">rank</text>
  <!-- Green words -->
  <text x="340" y="540" font-family="Arial,sans-serif" font-size="28" fill="#22C55E" text-anchor="middle" transform="rotate(3 340 540)">size</text>
  <text x="680" y="545" font-family="Arial,sans-serif" font-size="26" fill="#4ADE80" text-anchor="middle" transform="rotate(-3 680 545)">color</text>
  <!-- Blue words -->
  <text x="200" y="600" font-family="Arial,sans-serif" font-size="22" fill="#3B82F6" text-anchor="middle" transform="rotate(-6 200 600)">데이터</text>
  <text x="800" y="595" font-family="Arial,sans-serif" font-size="22" fill="#60A5FA" text-anchor="middle" transform="rotate(4 800 595)">언어</text>
  <text x="512" y="620" font-family="Arial,sans-serif" font-size="20" fill="#93C5FD" text-anchor="middle">visualize</text>
  <!-- Purple words (smaller) -->
  <text x="260" y="660" font-family="Arial,sans-serif" font-size="18" fill="#8B5CF6" text-anchor="middle">분석</text>
  <text x="760" y="655" font-family="Arial,sans-serif" font-size="18" fill="#A78BFA" text-anchor="middle">weight</text>
  <text x="460" y="680" font-family="Arial,sans-serif" font-size="16" fill="#C4B5FD" text-anchor="middle">layout</text>
  <text x="580" y="675" font-family="Arial,sans-serif" font-size="14" fill="#DDD6FE" text-anchor="middle">font</text>
  <!-- Pink words (smallest) -->
  <text x="160" y="720" font-family="Arial,sans-serif" font-size="14" fill="#F472B6" text-anchor="middle">corpus</text>
  <text x="856" y="714" font-family="Arial,sans-serif" font-size="13" fill="#EC4899" text-anchor="middle">mask</text>
  <text x="420" y="730" font-family="Arial,sans-serif" font-size="13" fill="#FBCFE8" text-anchor="middle">token</text>
  <text x="610" y="724" font-family="Arial,sans-serif" font-size="12" fill="#FECDD3" text-anchor="middle">count</text>
  <!-- Layer 3: Frequency legend dots -->
  <circle cx="240" cy="830" r="18" fill="#EF4444"/>
  <circle cx="300" cy="834" r="14" fill="#F97316"/>
  <circle cx="352" cy="837" r="11" fill="#EAB308"/>
  <circle cx="396" cy="839" r="9" fill="#22C55E"/>
  <circle cx="432" cy="840" r="7" fill="#3B82F6"/>
  <circle cx="462" cy="841" r="5" fill="#8B5CF6"/>
  <text x="512" y="870" font-family="Arial,sans-serif" font-size="18" fill="#6366F1" text-anchor="middle">빈도 = 크기 = 색상</text>
</svg>
