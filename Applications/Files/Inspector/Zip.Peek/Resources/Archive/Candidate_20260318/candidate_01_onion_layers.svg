<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12100204"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="onionGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#030508"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="230" fill="url(#onionGlow)" filter="url(#glow)"/>

  <!-- Onion-like concentric layers (archive layers) -->
  <!-- Layer 1 (outermost) -->
  <path d="M256,56 Q400,80 420,256 Q400,432 256,456 Q112,432 92,256 Q112,80 256,56 Z"
    fill="none" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.3" filter="url(#softglow)"/>

  <!-- Layer 2 -->
  <path d="M256,90 Q375,110 393,256 Q375,402 256,422 Q137,402 119,256 Q137,110 256,90 Z"
    fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-opacity="0.4" filter="url(#softglow)"/>

  <!-- Layer 3 -->
  <path d="M256,124 Q350,142 366,256 Q350,370 256,388 Q162,370 146,256 Q162,142 256,124 Z"
    fill="#EAB308" fill-opacity="0.04" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.5" filter="url(#softglow)"/>

  <!-- Layer 4 -->
  <path d="M256,158 Q326,173 340,256 Q326,339 256,354 Q186,339 172,256 Q186,173 256,158 Z"
    fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- Layer 5 -->
  <path d="M256,192 Q302,204 314,256 Q302,308 256,320 Q210,308 198,256 Q210,204 256,192 Z"
    fill="#EAB308" fill-opacity="0.08" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.65" filter="url(#softglow)"/>

  <!-- Layer 6 -->
  <path d="M256,220 Q280,228 288,256 Q280,284 256,292 Q232,284 224,256 Q232,228 256,220 Z"
    fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="2.5" stroke-opacity="0.75"/>

  <!-- Core -->
  <circle cx="256" cy="256" r="25" fill="#EAB308" fill-opacity="0.25" stroke="#EAB308" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#F59E0B" fill-opacity="0.6"/>
  <circle cx="256" cy="256" r="5" fill="#FDE68A"/>

  <!-- Zip icon overlay (zipper on the side) -->
  <!-- Zipper track -->
  <line x1="92" y1="256" x2="420" y2="256" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.3" stroke-dasharray="6,4"/>
  <!-- Zipper pull -->
  <rect x="248" y="244" width="16" height="24" rx="4" fill="#1a1500" stroke="#EAB308" stroke-width="2" filter="url(#softglow)"/>
  <line x1="256" y1="250" x2="256" y2="262" stroke="#EAB308" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Layer labels -->
  <circle cx="420" cy="256" r="5" fill="#EAB308" fill-opacity="0.7" filter="url(#softglow)"/>
  <circle cx="393" cy="256" r="4.5" fill="#F59E0B" fill-opacity="0.6" filter="url(#softglow)"/>
  <circle cx="366" cy="256" r="4" fill="#EAB308" fill-opacity="0.6"/>
  <circle cx="340" cy="256" r="3.5" fill="#FBBF24" fill-opacity="0.6"/>
  <circle cx="314" cy="256" r="3" fill="#EAB308" fill-opacity="0.65"/>
  <circle cx="288" cy="256" r="2.5" fill="#F59E0B" fill-opacity="0.7"/>
</svg>
