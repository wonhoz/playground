  </defs>

  <!-- Layer 1: 딥 네이비 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#navyBg)"/>

  <!-- 별빛 장식 -->
  <g fill="rgba(255,255,255,0.5)">
    <circle cx="148" cy="145" r="3"/>
    <circle cx="810" cy="195" r="2"/>
    <circle cx="905" cy="98" r="3"/>
    <circle cx="195" cy="808" r="2"/>
    <circle cx="858" cy="752" r="3"/>
    <circle cx="95"  cy="498" r="2"/>
    <circle cx="958" cy="598" r="2"/>
    <circle cx="350" cy="880" r="2"/>
    <circle cx="680" cy="920" r="3"/>
  </g>

  <!-- Layer 2: 보라색 구름 (상단) -->
  <g fill="#6A0DAD">
    <circle cx="512" cy="310" r="172"/>
    <circle cx="325" cy="345" r="133"/>
    <circle cx="699" cy="345" r="133"/>
    <circle cx="512" cy="172" r="148"/>
    <circle cx="392" cy="218" r="123"/>
    <circle cx="638" cy="218" r="123"/>
