<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e28"/>
      <stop offset="100%" style="stop-color:#2d1a44"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffee00"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lightning bolt -->
  <polygon points="280,60 220,250 268,250 232,452 312,220 260,220" fill="url(#bolt)" fill-opacity="0.9"/>
  <!-- Key badges around the bolt -->
  <rect x="60" y="130" width="100" height="44" rx="10" fill="#2a1a44" stroke="#cc88ff" stroke-width="2"/>
  <text x="72" y="157" font-family="monospace" font-size="16" fill="#cc88ff">Ctrl+C</text>
  <line x1="160" y1="152" x2="230" y2="162" stroke="#cc88ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="130" width="100" height="44" rx="10" fill="#2a1a44" stroke="#aa66ff" stroke-width="2"/>
  <text x="364" y="157" font-family="monospace" font-size="16" fill="#aa66ff">Ctrl+V</text>
  <line x1="350" y1="152" x2="285" y2="168" stroke="#aa66ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="264" width="100" height="44" rx="10" fill="#2a1a44" stroke="#ff88cc" stroke-width="2"/>
  <text x="72" y="291" font-family="monospace" font-size="16" fill="#ff88cc">Alt+F4</text>
  <line x1="160" y1="286" x2="235" y2="272" stroke="#ff88cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="264" width="100" height="44" rx="10" fill="#2a1a44" stroke="#88ffcc" stroke-width="2"/>
  <text x="362" y="291" font-family="monospace" font-size="16" fill="#88ffcc">Win+D</text>
  <line x1="350" y1="286" x2="295" y2="276" stroke="#88ffcc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="390" width="100" height="44" rx="10" fill="#2a1a44" stroke="#ffcc44" stroke-width="2"/>
  <text x="72" y="417" font-family="monospace" font-size="16" fill="#ffcc44">Ctrl+Z</text>
  <line x1="160" y1="412" x2="242" y2="370" stroke="#ffcc44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="390" width="100" height="44" rx="10" fill="#2a1a44" stroke="#44ccff" stroke-width="2"/>
  <text x="360" y="417" font-family="monospace" font-size="16" fill="#44ccff">Win+Tab</text>
  <line x1="350" y1="412" x2="298" y2="370" stroke="#44ccff" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>