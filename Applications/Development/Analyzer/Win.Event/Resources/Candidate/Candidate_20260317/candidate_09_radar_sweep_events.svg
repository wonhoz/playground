<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#021008"/>
      <stop offset="100%" stop-color="#010803"/>
    </radialGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF87" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00FF87" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to circle -->
    <clipPath id="radar-clip">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer frame rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#003a15" stroke-width="2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00FF87" stroke-width="2.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00CC6A" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#009950" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#006633" stroke-width="1.5" opacity="0.4"/>

  <!-- Cross hairs -->
  <g stroke="#005522" stroke-width="1" opacity="0.6">
    <line x1="56" y1="256" x2="456" y2="256"/>
    <line x1="256" y1="56" x2="256" y2="456"/>
    <line x1="115" y1="115" x2="397" y2="397" opacity="0.4"/>
    <line x1="397" y1="115" x2="115" y2="397" opacity="0.4"/>
  </g>

  <!-- Radar sweep sector (pie slice ~60 degrees) -->
  <g clip-path="url(#radar-clip)">
    <path d="M256 256 L256 56 A200 200 0 0 1 429 156 Z" fill="url(#sweep)" opacity="0.7"/>
    <!-- Sweep edge line -->
    <line x1="256" y1="256" x2="429" y2="156" stroke="#00FF87" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  </g>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#00FF87" filter="url(#glow)"/>

  <!-- Detected events (blips on the radar) -->
  <!-- ERROR blip (red) -->
  <g filter="url(#glow)">
    <circle cx="340" cy="156" r="8" fill="#EF5350" opacity="0.9"/>
    <circle cx="340" cy="156" r="16" fill="none" stroke="#EF5350" stroke-width="1.5" opacity="0.5"/>
    <text x="358" y="152" font-family="monospace" font-size="11" fill="#EF5350">ERR</text>
  </g>

  <!-- WARNING blip (orange) -->
  <g filter="url(#glow)">
    <circle cx="180" cy="190" r="7" fill="#FF9100" opacity="0.9"/>
    <circle cx="180" cy="190" r="14" fill="none" stroke="#FF9100" stroke-width="1.5" opacity="0.5"/>
    <text x="140" y="186" font-family="monospace" font-size="11" fill="#FF9100" text-anchor="end">WRN</text>
  </g>

  <!-- INFO blip (cyan) -->
  <g filter="url(#glow)">
    <circle cx="310" cy="330" r="7" fill="#00BCD4" opacity="0.9"/>
    <circle cx="310" cy="330" r="14" fill="none" stroke="#00BCD4" stroke-width="1.5" opacity="0.5"/>
    <text x="328" y="334" font-family="monospace" font-size="11" fill="#00BCD4">INF</text>
  </g>

  <!-- AUDIT blip (purple) -->
  <g filter="url(#glow)">
    <circle cx="180" cy="330" r="6" fill="#CE93D8" opacity="0.9"/>
    <circle cx="180" cy="330" r="12" fill="none" stroke="#CE93D8" stroke-width="1.5" opacity="0.5"/>
    <text x="162" y="348" font-family="monospace" font-size="11" fill="#CE93D8">AUD</text>
  </g>

  <!-- INFO blip 2 -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="360" cy="280" r="5" fill="#00BCD4"/>
    <circle cx="360" cy="280" r="10" fill="none" stroke="#00BCD4" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Outer ring label -->
  <text x="256" y="495" text-anchor="middle" font-family="monospace" font-size="16" fill="#00FF87" opacity="0.8" filter="url(#glow-sm)">WIN.EVENT RADAR</text>

  <!-- Degree markers -->
  <g font-family="monospace" font-size="10" fill="#004422" opacity="0.7">
    <text x="256" y="48" text-anchor="middle">N</text>
    <text x="464" y="260" text-anchor="middle">E</text>
    <text x="256" y="475" text-anchor="middle">S</text>
    <text x="48" y="260" text-anchor="middle">W</text>
  </g>
</svg>
