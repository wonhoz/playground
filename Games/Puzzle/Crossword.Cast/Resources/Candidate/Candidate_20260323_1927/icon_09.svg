  <text x="509" y="540" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#DC2626">G</text>
  <text x="749" y="540" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#7C3AED">T</text>

  <!-- 행 3 -->
  <rect x="210" y="570" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <rect x="330" y="570" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
