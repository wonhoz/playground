<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162240"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 4 mini gauges -->
  <!-- CPU gauge -->
  <circle cx="148" cy="180" r="72" fill="#0d2240" stroke="#1565c0" stroke-width="3"/>
  <path d="M 92,220 A 72,72 0 1,1 204,220" stroke="#263238" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 92,220 A 72,72 0 0,1 185,140" stroke="#2196f3" stroke-width="16" fill="none" stroke-linecap="round"/>
  <text x="148" y="195" text-anchor="middle" fill="#90caf9" font-size="14" font-family="monospace">CPU</text>
  <text x="148" y="214" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">72%</text>
  <!-- RAM gauge -->
  <circle cx="364" cy="180" r="72" fill="#0d2a0d" stroke="#2e7d32" stroke-width="3"/>
  <path d="M 308,220 A 72,72 0 1,1 420,220" stroke="#263238" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 308,220 A 72,72 0 0,1 400,140" stroke="#4caf50" stroke-width="16" fill="none" stroke-linecap="round"/>
  <text x="364" y="195" text-anchor="middle" fill="#a5d6a7" font-size="14" font-family="monospace">RAM</text>
  <text x="364" y="214" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">58%</text>
  <!-- GPU gauge -->
  <circle cx="148" cy="356" r="72" fill="#2a0d0d" stroke="#b71c1c" stroke-width="3"/>
  <path d="M 92,396 A 72,72 0 1,1 204,396" stroke="#263238" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 92,396 A 72,72 0 0,1 210,320" stroke="#f44336" stroke-width="16" fill="none" stroke-linecap="round"/>
  <text x="148" y="371" text-anchor="middle" fill="#ef9a9a" font-size="14" font-family="monospace">GPU</text>
  <text x="148" y="390" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">85%</text>
  <!-- DISK gauge -->
  <circle cx="364" cy="356" r="72" fill="#2a1a00" stroke="#e65100" stroke-width="3"/>
  <path d="M 308,396 A 72,72 0 1,1 420,396" stroke="#263238" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 308,396 A 72,72 0 0,1 372,287" stroke="#ff9800" stroke-width="16" fill="none" stroke-linecap="round"/>
  <text x="364" y="371" text-anchor="middle" fill="#ffcc80" font-size="14" font-family="monospace">DSK</text>
  <text x="364" y="390" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">42%</text>
</svg>