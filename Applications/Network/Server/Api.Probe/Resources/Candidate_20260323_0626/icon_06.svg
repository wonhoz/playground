<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | 컨베이어 벨트 파이프라인 — API 요청 처리 흐름 | 대각선/동적 | #001428 -->
  <defs>
    <linearGradient id="beltGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A2A3A"/>
      <stop offset="100%" stop-color="#0A1A28"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#001428"/>
  <!-- Layer 2: Conveyor belt pipeline -->
  <!-- Belt track (3 horizontal lanes) -->
  <!-- Lane 1: Request path -->
  <rect x="180" y="300" width="664" height="60" rx="8" fill="url(#beltGrad6)" stroke="#0E4A6A" stroke-width="3"/>
  <!-- Belt slats for lane 1 -->
  <line x1="240" y1="300" x2="240" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="300" x2="300" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="360" y1="300" x2="360" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="300" x2="420" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="480" y1="300" x2="480" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="540" y1="300" x2="540" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="300" x2="600" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="660" y1="300" x2="660" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="720" y1="300" x2="720" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <line x1="780" y1="300" x2="780" y2="360" stroke="#1A3A4A" stroke-width="2" opacity="0.6"/>
  <!-- Packages on lane 1 (requests) -->
  <rect x="210" y="310" width="56" height="40" rx="6" fill="#1D4ED8" stroke="#60A5FA" stroke-width="2"/>
  <text x="238" y="336" font-family="monospace" font-size="11" fill="#DBEAFE" text-anchor="middle" font-weight="bold">GET</text>
  <rect x="390" y="310" width="60" height="40" rx="6" fill="#7C3AED" stroke="#A78BFA" stroke-width="2"/>
  <text x="420" y="336" font-family="monospace" font-size="11" fill="#EDE9FE" text-anchor="middle" font-weight="bold">POST</text>
  <rect x="590" y="310" width="56" height="40" rx="6" fill="#0D6E5E" stroke="#2DD4BF" stroke-width="2"/>
  <text x="618" y="336" font-family="monospace" font-size="11" fill="#CCFBF1" text-anchor="middle" font-weight="bold">PUT</text>
  <text x="512" y="285" font-family="Arial,sans-serif" font-size="14" fill="#7AAABB" text-anchor="middle">→ 요청 큐 (Request Queue)</text>
  <!-- Lane 2: Processing -->
  <rect x="180" y="460" width="664" height="60" rx="8" fill="url(#beltGrad6)" stroke="#4A6A0E" stroke-width="3"/>
  <line x1="240" y1="460" x2="240" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="460" x2="300" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="360" y1="460" x2="360" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="460" x2="420" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="480" y1="460" x2="480" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="540" y1="460" x2="540" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="460" x2="600" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="660" y1="460" x2="660" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="720" y1="460" x2="720" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <line x1="780" y1="460" x2="780" y2="520" stroke="#3A4A1A" stroke-width="2" opacity="0.6"/>
  <!-- Processing packages (with spinner) -->
  <rect x="280" y="470" width="56" height="40" rx="6" fill="#854D0E" stroke="#FCD34D" stroke-width="2"/>
  <text x="308" y="496" font-family="monospace" font-size="11" fill="#FEF3C7" text-anchor="middle">⟳ 200</text>
  <rect x="500" y="470" width="56" height="40" rx="6" fill="#7C2D12" stroke="#FB923C" stroke-width="2"/>
  <text x="528" y="496" font-family="monospace" font-size="11" fill="#FED7AA" text-anchor="middle">⟳ 500</text>
  <text x="512" y="445" font-family="Arial,sans-serif" font-size="14" fill="#7AAA6A" text-anchor="middle">→ 처리 중 (Processing)</text>
  <!-- Lane 3: Response output -->
  <rect x="180" y="620" width="664" height="60" rx="8" fill="url(#beltGrad6)" stroke="#6A0E4A" stroke-width="3"/>
  <line x1="240" y1="620" x2="240" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="620" x2="300" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="620" x2="420" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <line x1="540" y1="620" x2="540" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <line x1="660" y1="620" x2="660" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <line x1="780" y1="620" x2="780" y2="680" stroke="#4A1A3A" stroke-width="2" opacity="0.6"/>
  <!-- Response packages -->
  <rect x="210" y="630" width="64" height="40" rx="6" fill="#166534" stroke="#4ADE80" stroke-width="2"/>
  <text x="242" y="656" font-family="monospace" font-size="11" fill="#BBF7D0" text-anchor="middle" font-weight="bold">200 OK</text>
  <rect x="440" y="630" width="64" height="40" rx="6" fill="#166534" stroke="#4ADE80" stroke-width="2"/>
  <text x="472" y="656" font-family="monospace" font-size="11" fill="#BBF7D0" text-anchor="middle" font-weight="bold">201 OK</text>
  <rect x="670" y="630" width="70" height="40" rx="6" fill="#7F1D1D" stroke="#F87171" stroke-width="2"/>
  <text x="705" y="656" font-family="monospace" font-size="11" fill="#FECACA" text-anchor="middle" font-weight="bold">500 ERR</text>
  <text x="512" y="605" font-family="Arial,sans-serif" font-size="14" fill="#AA7AAA" text-anchor="middle">→ 응답 출력 (Response Output)</text>
  <!-- Layer 3: Connecting arrows between lanes -->
  <polygon points="160,360 148,380 172,380" fill="#22D3EE" opacity="0.7"/>
  <line x1="160" y1="360" x2="160" y2="460" stroke="#22D3EE" stroke-width="3" opacity="0.5"/>
  <polygon points="160,460 148,480 172,480" fill="#22D3EE" opacity="0.7"/>
  <line x1="160" y1="520" x2="160" y2="620" stroke="#22D3EE" stroke-width="3" opacity="0.5"/>
  <polygon points="160,620 148,640 172,640" fill="#22D3EE" opacity="0.7"/>
</svg>
