<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="100%" stop-color="#2D1A00"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M80 256 Q256 100 432 256 Q256 412 80 256 Z" fill="#110800" stroke="#FFB300" stroke-width="3"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="80" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="40" fill="#0A0500"/>
  <!-- Port scan crosshair in pupil -->
  <circle cx="256" cy="256" r="25" fill="none" stroke="#FFD54F" stroke-width="2"/>
  <line x1="256" y1="236" x2="256" y2="216" stroke="#FFD54F" stroke-width="2"/>
  <line x1="256" y1="276" x2="256" y2="296" stroke="#FFD54F" stroke-width="2"/>
  <line x1="236" y1="256" x2="216" y2="256" stroke="#FFD54F" stroke-width="2"/>
  <line x1="276" y1="256" x2="296" y2="256" stroke="#FFD54F" stroke-width="2"/>
  <!-- Eye highlight -->
  <ellipse cx="228" cy="234" rx="14" ry="8" fill="white" opacity="0.2" transform="rotate(-30 228 234)"/>
  <!-- Port numbers around eye -->
  <text x="100" y="230" font-family="Consolas" font-size="13" fill="#FFB300" opacity="0.8">:80</text>
  <text x="380" y="220" font-family="Consolas" font-size="13" fill="#FFB300" opacity="0.8">:443</text>
  <text x="100" y="310" font-family="Consolas" font-size="13" fill="#FF8F00" opacity="0.8">:22</text>
  <text x="376" y="310" font-family="Consolas" font-size="13" fill="#FF8F00" opacity="0.8">:3306</text>
  <!-- Scan line sweeping -->
  <path d="M256 256 L360 180" stroke="#FFD54F" stroke-width="2.5" opacity="0.7"/>
  <path d="M256 256 L340 300" stroke="#FFD54F" stroke-width="1.5" opacity="0.3"/>
  <!-- Eyelashes/lashes hint -->
  <line x1="168" y1="168" x2="156" y2="154" stroke="#FFB300" stroke-width="2" opacity="0.4"/>
  <line x1="214" y1="140" x2="208" y2="124" stroke="#FFB300" stroke-width="2" opacity="0.4"/>
  <line x1="298" y1="140" x2="304" y2="124" stroke="#FFB300" stroke-width="2" opacity="0.4"/>
  <line x1="344" y1="168" x2="356" y2="154" stroke="#FFB300" stroke-width="2" opacity="0.4"/>
</svg>