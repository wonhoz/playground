<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#E64A19"/>
  <!-- Layer 2: Magnifier -->
  <circle cx="460" cy="440" r="240" fill="none" stroke="white" stroke-width="60"/>
  <line x1="644" y1="624" x2="830" y2="810" stroke="white" stroke-width="70" stroke-linecap="round"/>
  <!-- Layer 3: # inside magnifier -->
  <text x="420" y="510" font-family="Arial Black" font-size="200" font-weight="900" fill="#BF360C" text-anchor="middle">#</text>
  <!-- Small markdown symbols around -->
  <text x="200" y="260" font-family="Arial" font-size="48" fill="white" opacity="0.6">*</text>
  <text x="720" y="280" font-family="Arial" font-size="36" fill="white" opacity="0.5">&gt;</text>
  <text x="760" y="620" font-family="Arial" font-size="36" fill="white" opacity="0.4">**</text>
</svg>