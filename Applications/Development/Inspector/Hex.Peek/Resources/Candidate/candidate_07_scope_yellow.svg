<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1400"/>
      <stop offset="100%" style="stop-color:#2d2600"/>
    </linearGradient>
    <radialGradient id="scope" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffdd00;stop-opacity:0.15"/>
      <stop offset="80%" style="stop-color:#ffaa00;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scope circle -->
  <circle cx="256" cy="240" r="180" fill="url(#scope)" stroke="#ffdd00" stroke-width="5"/>
  <!-- Crosshair -->
  <line x1="76" y1="240" x2="436" y2="240" stroke="#ffdd00" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="256" y1="60" x2="256" y2="420" stroke="#ffdd00" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Inner circles -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="#ffaa00" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="240" r="60" fill="none" stroke="#ffaa00" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Hex bytes on scope -->
  <text x="276" y="200" font-family="monospace" font-size="20" fill="#ffdd00" font-weight="bold">F0</text>
  <text x="276" y="228" font-family="monospace" font-size="20" fill="#ffdd00" font-weight="bold">DE</text>
  <text x="276" y="256" font-family="monospace" font-size="20" fill="#ffdd00" font-weight="bold">AD</text>
  <text x="276" y="284" font-family="monospace" font-size="20" fill="#ffdd00" font-weight="bold">BE</text>
  <!-- Corner markers -->
  <line x1="76" y1="60" x2="76" y2="100" stroke="#ffdd00" stroke-width="3"/>
  <line x1="76" y1="60" x2="116" y2="60" stroke="#ffdd00" stroke-width="3"/>
  <line x1="436" y1="60" x2="436" y2="100" stroke="#ffdd00" stroke-width="3"/>
  <line x1="396" y1="60" x2="436" y2="60" stroke="#ffdd00" stroke-width="3"/>
  <line x1="76" y1="420" x2="76" y2="380" stroke="#ffdd00" stroke-width="3"/>
  <line x1="76" y1="420" x2="116" y2="420" stroke="#ffdd00" stroke-width="3"/>
  <line x1="436" y1="420" x2="436" y2="380" stroke="#ffdd00" stroke-width="3"/>
  <line x1="396" y1="420" x2="436" y2="420" stroke="#ffdd00" stroke-width="3"/>
  <!-- Bottom address display -->
  <rect x="120" y="440" width="272" height="32" rx="8" fill="#221c00"/>
  <text x="136" y="462" font-family="monospace" font-size="15" fill="#ffaa00">0xDEAD @ 0xF0DEADBE</text>
</svg>