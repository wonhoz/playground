  <rect x="218" y="230" width="16" height="12" rx="3" fill="#003333" stroke="#00b3a0" stroke-width="1"/>
  <rect x="238" y="230" width="16" height="12" rx="3" fill="#003333" stroke="#00b3a0" stroke-width="1"/>
  <rect x="258" y="230" width="16" height="12" rx="3" fill="#00e5cc" opacity="0.7"/>
  <rect x="278" y="230" width="16" height="12" rx="3" fill="#003333" stroke="#00b3a0" stroke-width="1"/>
  <rect x="218" y="248" width="24" height="12" rx="3" fill="#003333" stroke="#00b3a0" stroke-width="1"/>
  <rect x="246" y="248" width="40" height="12" rx="3" fill="#00b3a0" opacity="0.6"/>
  <rect x="290" y="248" width="10" height="12" rx="3" fill="#003333" stroke="#00b3a0" stroke-width="1"/>
  <rect x="218" y="266" width="72" height="14" rx="4" fill="#001f1f" stroke="#007a70" stroke-width="1"/>
  <!-- Branch lines -->
  <line x1="208" y1="256" x2="128" y2="180" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="256" y1="220" x2="256" y2="120" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="304" y1="256" x2="384" y2="180" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="208" y1="256" x2="120" y2="320" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="256" y1="292" x2="256" y2="380" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="304" y1="256" x2="390" y2="330" stroke="#00b3a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="208" y1="236" x2="110" y2="224" stroke="#007a70" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="304" y1="236" x2="400" y2="224" stroke="#007a70" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
