<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <radialGradient id="node1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </radialGradient>
    <radialGradient id="node2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66ffaa"/>
      <stop offset="100%" stop-color="#00aa44"/>
    </radialGradient>
    <radialGradient id="node3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa44"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="256" y1="180" x2="140" y2="280" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="180" x2="256" y2="310" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="180" x2="372" y2="280" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="280" x2="90" y2="380" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <line x1="140" y1="280" x2="180" y2="390" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="310" x2="220" y2="420" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="310" x2="292" y2="420" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <line x1="372" y1="280" x2="332" y2="390" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <line x1="372" y1="280" x2="420" y2="380" stroke="#66ffaa" stroke-width="2" opacity="0.4"/>
  <!-- Level 3 leaves -->
  <circle cx="90" cy="390" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <circle cx="180" cy="400" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <circle cx="220" cy="430" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <circle cx="292" cy="430" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <circle cx="332" cy="400" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <circle cx="420" cy="390" r="18" fill="url(#node3)" filter="url(#glow)"/>
  <!-- Level 2 nodes -->
  <circle cx="140" cy="280" r="28" fill="url(#node2)" filter="url(#glow)"/>
  <circle cx="256" cy="310" r="28" fill="url(#node2)" filter="url(#glow)"/>
  <circle cx="372" cy="280" r="28" fill="url(#node2)" filter="url(#glow)"/>
  <!-- Root node -->
  <circle cx="256" cy="170" r="44" fill="url(#node1)" filter="url(#glow)"/>
  <!-- Root label -->
  <text x="256" y="176" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#003344" text-anchor="middle">root</text>
  <!-- Level 2 labels -->
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="11" fill="#003322" text-anchor="middle">A</text>
  <text x="256" y="315" font-family="Arial, sans-serif" font-size="11" fill="#003322" text-anchor="middle">B</text>
  <text x="372" y="285" font-family="Arial, sans-serif" font-size="11" fill="#003322" text-anchor="middle">C</text>
  <!-- Title -->
  <text x="256" y="100" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)" letter-spacing="2">DATA MAP</text>
  <text x="256" y="130" font-family="Arial, sans-serif" font-size="14" fill="#66ffaa" text-anchor="middle" opacity="0.8">Structure Visualizer</text>
</svg>
