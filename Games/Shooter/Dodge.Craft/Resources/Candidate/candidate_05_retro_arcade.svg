<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000011"/>
      <stop offset="100%" stop-color="#001100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scanlines effect -->
  <rect x="40" y="60" width="432" height="2" fill="#00FF00" opacity="0.05"/>
  <rect x="40" y="80" width="432" height="2" fill="#00FF00" opacity="0.05"/>
  <rect x="40" y="100" width="432" height="2" fill="#00FF00" opacity="0.05"/>
  <!-- Player ship retro -->
  <polygon points="256,120 290,250 256,235 222,250" fill="#00FF00"/>
  <rect x="245" y="170" width="22" height="18" fill="#003300"/>
  <!-- Wings -->
  <polygon points="222,200 170,240 190,250 222,220" fill="#00CC00"/>
  <polygon points="290,200 342,240 322,250 290,220" fill="#00CC00"/>
  <!-- Engine -->
  <rect x="240" y="250" width="32" height="20" fill="#008800"/>
  <polygon points="244,270 256,310 268,270" fill="#FFFF00"/>
  <!-- Obstacles retro blocks -->
  <rect x="80" y="140" width="56" height="56" fill="#FF0000"/>
  <rect x="88" y="148" width="40" height="40" fill="#CC0000"/>
  <rect x="96" y="156" width="24" height="24" fill="#FF4444"/>
  <rect x="376" y="160" width="56" height="56" fill="#FF4400"/>
  <rect x="384" y="168" width="40" height="40" fill="#CC3300"/>
  <rect x="392" y="176" width="24" height="24" fill="#FF6644"/>
  <rect x="180" y="80" width="40" height="40" fill="#FF0066"/>
  <rect x="188" y="88" width="24" height="24" fill="#CC0044"/>
  <!-- Lives -->
  <polygon points="60,400 68,420 52,420" fill="#00FF00" opacity="0.8"/>
  <polygon points="80,400 88,420 72,420" fill="#00FF00" opacity="0.8"/>
  <polygon points="100,400 108,420 92,420" fill="#00FF00" opacity="0.8"/>
  <!-- Score -->
  <text x="350" y="415" font-family="'Courier New'" font-size="18" fill="#00FF00" text-anchor="middle">HI-SCORE: 9999</text>
  <text x="256" y="460" font-family="'Courier New'" font-size="28" font-weight="bold" fill="#00FF00" text-anchor="middle">DODGE CRAFT</text>
</svg>
