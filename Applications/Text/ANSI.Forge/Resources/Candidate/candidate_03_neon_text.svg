<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon A -->
  <text x="80" y="200" font-family="monospace" font-weight="bold" font-size="120" fill="#FF00FF" filter="url(#neon)" opacity="0.9">A</text>
  <!-- Neon N -->
  <text x="180" y="200" font-family="monospace" font-weight="bold" font-size="120" fill="#00FFFF" filter="url(#neon)" opacity="0.9">N</text>
  <!-- Neon S -->
  <text x="290" y="200" font-family="monospace" font-weight="bold" font-size="120" fill="#FFFF00" filter="url(#neon)" opacity="0.9">S</text>
  <!-- Neon I -->
  <text x="390" y="200" font-family="monospace" font-weight="bold" font-size="120" fill="#00FF80" filter="url(#neon)" opacity="0.9">I</text>
  <!-- Color code line -->
  <text x="60" y="300" font-family="monospace" font-size="22" fill="#FF6B6B">\e[31m</text>
  <text x="190" y="300" font-family="monospace" font-size="22" fill="#6BFF6B">\e[32m</text>
  <text x="310" y="300" font-family="monospace" font-size="22" fill="#6B6BFF">\e[34m</text>
  <!-- Escape code hint -->
  <rect x="60" y="330" width="392" height="2" fill="#333333"/>
  <text x="60" y="365" font-family="monospace" font-size="18" fill="#888888">\033[1;35m FORGE \033[0m</text>
  <!-- Decorative dots -->
  <circle cx="80" cy="410" r="5" fill="#FF00FF" opacity="0.7"/>
  <circle cx="100" cy="410" r="5" fill="#00FFFF" opacity="0.7"/>
  <circle cx="120" cy="410" r="5" fill="#FFFF00" opacity="0.7"/>
  <circle cx="140" cy="410" r="5" fill="#00FF80" opacity="0.7"/>
  <circle cx="160" cy="410" r="5" fill="#FF8C00" opacity="0.7"/>
</svg>