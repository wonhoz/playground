<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCCBC"/>
    </linearGradient>
    <linearGradient id="sand18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg18)"/>
  <!-- Layer 2: Hourglass with large pixels on top, fine pixels at bottom -->
  <!-- Hourglass outline -->
  <path d="M240 140 L784 140 L784 160 L560 512 L784 864 L784 884 L240 884 L240 864 L464 512 L240 160 Z" fill="#FFCCBC" stroke="#E64A19" stroke-width="16"/>
  <!-- Top half (large/coarse pixels = low res) -->
  <clipPath id="top18">
    <polygon points="240,140 784,140 560,512"/>
  </clipPath>
  <g clip-path="url(#top18)">
    <rect x="260" y="160" width="110" height="110" rx="8" fill="#FF8A65"/>
    <rect x="380" y="160" width="110" height="110" rx="8" fill="#FF7043"/>
    <rect x="500" y="160" width="110" height="110" rx="8" fill="#FF8A65"/>
    <rect x="620" y="160" width="110" height="110" rx="8" fill="#FF5722"/>
    <rect x="310" y="280" width="110" height="110" rx="8" fill="#FF7043"/>
    <rect x="430" y="280" width="110" height="110" rx="8" fill="#FF5722"/>
    <rect x="550" y="280" width="110" height="110" rx="8" fill="#FF8A65"/>
    <rect x="370" y="390" width="110" height="110" rx="8" fill="#FF7043"/>
    <rect x="480" y="390" width="110" height="110" rx="8" fill="#FF5722"/>
  </g>
  <!-- Neck (transition) -->
  <rect x="500" y="492" width="24" height="40" rx="4" fill="url(#sand18)"/>
  <!-- Bottom half (fine pixels = high res) — small crisp dots -->
  <clipPath id="bot18">
    <polygon points="464,512 560,512 784,864 240,864"/>
  </clipPath>
  <g clip-path="url(#bot18)">
    <!-- Fine pixel grid (many small blocks = high res) -->
    <rect x="290" y="540" width="46" height="46" rx="3" fill="#E64A19"/>
    <rect x="344" y="540" width="46" height="46" rx="3" fill="#FF7043"/>
    <rect x="398" y="540" width="46" height="46" rx="3" fill="#E64A19"/>
    <rect x="452" y="540" width="46" height="46" rx="3" fill="#FF8A65"/>
    <rect x="506" y="540" width="46" height="46" rx="3" fill="#FF5722"/>
    <rect x="560" y="540" width="46" height="46" rx="3" fill="#E64A19"/>
    <rect x="614" y="540" width="46" height="46" rx="3" fill="#FF7043"/>
    <rect x="268" y="594" width="46" height="46" rx="3" fill="#FF7043"/>
    <rect x="322" y="594" width="46" height="46" rx="3" fill="#E64A19"/>
    <rect x="376" y="594" width="46" height="46" rx="3" fill="#FF8A65"/>
    <rect x="430" y="594" width="46" height="46" rx="3" fill="#FF5722"/>
    <rect x="484" y="594" width="46" height="46" rx="3" fill="#FF7043"/>
    <rect x="538" y="594" width="46" height="46" rx="3" fill="#E64A19"/>
    <rect x="592" y="594" width="46" height="46" rx="3" fill="#FF8A65"/>
    <rect x="646" y="594" width="46" height="46" rx="3" fill="#FF5722"/>
    <!-- More rows of fine pixels -->
    <rect x="280" y="660" width="36" height="36" rx="2" fill="#FF7043"/>
    <rect x="322" y="660" width="36" height="36" rx="2" fill="#E64A19"/>
    <rect x="364" y="660" width="36" height="36" rx="2" fill="#FF5722"/>
    <rect x="406" y="660" width="36" height="36" rx="2" fill="#FF8A65"/>
    <rect x="448" y="660" width="36" height="36" rx="2" fill="#E64A19"/>
    <rect x="490" y="660" width="36" height="36" rx="2" fill="#FF7043"/>
    <rect x="532" y="660" width="36" height="36" rx="2" fill="#FF5722"/>
    <rect x="574" y="660" width="36" height="36" rx="2" fill="#E64A19"/>
    <rect x="616" y="660" width="36" height="36" rx="2" fill="#FF8A65"/>
    <rect x="658" y="660" width="36" height="36" rx="2" fill="#FF7043"/>
    <rect x="700" y="660" width="36" height="36" rx="2" fill="#E64A19"/>
  </g>
  <!-- Layer 3: Labels -->
  <text x="266" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="700" fill="#BF360C">LOW</text>
  <text x="604" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="700" fill="#BF360C">RES</text>
  <text x="332" y="870" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="700" fill="white">HIGH RES</text>
</svg>
