<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 압축 파일에서 내용물 파일들이 펼쳐지는 모습 | 레이어드 | 민트+초록+주황+흰 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#004D40" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Central ZIP archive file (large, center-bottom) -->
  <rect x="360" y="560" width="300" height="360" rx="20" fill="#00695C" filter="url(#sh2)"/>
  <polygon points="604,560 660,616 604,616" fill="#80CBC4"/>
  <!-- ZIP lines/zigzag pattern -->
  <rect x="382" y="650" width="256" height="16" rx="8" fill="#80CBC4" opacity="0.6"/>
  <rect x="382" y="680" width="220" height="16" rx="8" fill="#80CBC4" opacity="0.5"/>
  <rect x="382" y="710" width="240" height="16" rx="8" fill="#80CBC4" opacity="0.6"/>
  <!-- ZIP badge -->
  <rect x="372" y="574" width="80" height="32" rx="10" fill="#FF6F00"/>
  <text x="412" y="590" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">ZIP</text>
  <!-- Compression indicator -->
  <rect x="382" y="756" width="256" height="40" rx="12" fill="#004D40"/>
  <text x="510" y="776" font-family="Consolas, monospace" font-size="18" fill="#80CBC4"
        text-anchor="middle" dominant-baseline="middle">127 files · 75% off</text>

  <!-- Files flying out (top, spread) -->
  <!-- File 1: .cs (code) -->
  <g transform="rotate(-25, 300, 400)">
    <rect x="120" y="280" width="180" height="230" rx="16" fill="#1E88E5" filter="url(#sh2)"/>
    <polygon points="256,280 300,324 256,324" fill="#90CAF9"/>
    <rect x="138" y="360" width="140" height="12" rx="5" fill="white" opacity="0.7"/>
    <rect x="138" y="384" width="120" height="12" rx="5" fill="white" opacity="0.5"/>
    <rect x="138" y="408" width="140" height="12" rx="5" fill="white" opacity="0.6"/>
    <text x="210" y="456" font-family="Consolas, monospace" font-size="20" fill="#90CAF9"
          text-anchor="middle">.cs</text>
  </g>

  <!-- File 2: image -->
  <g transform="rotate(-10, 500, 350)">
    <rect x="380" y="160" width="180" height="230" rx="16" fill="#7B1FA2" filter="url(#sh2)"/>
    <polygon points="516,160 560,204 516,204" fill="#CE93D8"/>
    <rect x="396" y="240" width="148" height="80" rx="10" fill="#CE93D8" opacity="0.5"/>
    <text x="470" y="280" font-family="Arial, sans-serif" font-size="34" fill="white"
          text-anchor="middle" dominant-baseline="middle">🖼</text>
    <text x="470" y="356" font-family="Consolas, monospace" font-size="20" fill="#CE93D8"
          text-anchor="middle">.png</text>
  </g>

  <!-- File 3: text -->
  <g transform="rotate(15, 700, 400)">
    <rect x="620" y="240" width="180" height="230" rx="16" fill="#E65100" filter="url(#sh2)"/>
    <polygon points="756,240 800,284 756,284" fill="#FFCCBC"/>
    <rect x="638" y="320" width="140" height="12" rx="5" fill="white" opacity="0.7"/>
    <rect x="638" y="344" width="120" height="12" rx="5" fill="white" opacity="0.5"/>
    <rect x="638" y="368" width="130" height="12" rx="5" fill="white" opacity="0.6"/>
    <rect x="638" y="392" width="100" height="12" rx="5" fill="white" opacity="0.4"/>
    <text x="718" y="440" font-family="Consolas, monospace" font-size="20" fill="#FFCCBC"
          text-anchor="middle">.txt</text>
  </g>

  <!-- File 4: PDF -->
  <g transform="rotate(30, 820, 500)">
    <rect x="780" y="400" width="160" height="200" rx="14" fill="#C62828" filter="url(#sh2)"/>
    <polygon points="892,400 940,448 892,448" fill="#EF9A9A"/>
    <text x="860" y="510" font-family="Arial Black, sans-serif" font-size="28" fill="white"
          text-anchor="middle">PDF</text>
  </g>

  <!-- File 5: music -->
  <g transform="rotate(-35, 180, 520)">
    <rect x="80" y="460" width="160" height="200" rx="14" fill="#FF6F00" filter="url(#sh2)"/>
    <polygon points="196,460 240,508 196,508" fill="#FFCCBC"/>
    <text x="160" y="560" font-family="Arial, sans-serif" font-size="36" fill="white"
          text-anchor="middle" dominant-baseline="middle">♪</text>
    <text x="160" y="600" font-family="Consolas, monospace" font-size="18" fill="#FFCCBC"
          text-anchor="middle">.mp3</text>
  </g>

  <!-- Expanding arrows from ZIP -->
  <line x1="440" y1="558" x2="300" y2="440" stroke="#00897B" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="510" y1="558" x2="470" y2="380" stroke="#00897B" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="560" y1="558" x2="640" y2="400" stroke="#00897B" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="600" y1="580" x2="800" y2="500" stroke="#00897B" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="420" y1="580" x2="180" y2="540" stroke="#00897B" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Title -->
  <rect x="280" y="852" width="464" height="70" rx="35" fill="white" filter="url(#sh2)"/>
  <text x="512" y="887" font-family="Arial Black, sans-serif" font-size="36" fill="#004D40"
        text-anchor="middle" dominant-baseline="middle">Zip.Peek</text>
</svg>
