<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="#050A1A"/>

  <!-- 긴 웹페이지 스크롤 (세로로 긴 페이지가 잘리는 장면) -->
  <!-- 뒤쪽 페이지 그림자 -->
  <rect x="290" y="100" width="480" height="900" rx="12" fill="#0A1628" opacity="0.6"/>
  <!-- 앞쪽 긴 페이지 -->
  <rect x="260" y="80" width="480" height="900" rx="12" fill="#0D1E3A"/>
  <rect x="260" y="80" width="480" height="900" rx="12" fill="none" stroke="#2A4A8A" stroke-width="4"/>

  <!-- 브라우저 URL 바 (상단) -->
  <rect x="260" y="80" width="480" height="55" rx="12" fill="#1A3060"/>
  <rect x="280" y="95" width="340" height="25" rx="12" fill="#0D1E3A"/>
  <text x="450" y="113" font-family="monospace" font-size="14" fill="#4A90D9" text-anchor="middle">https://example.com</text>
  <!-- 브라우저 버튼 -->
  <circle cx="277" cy="107" r="7" fill="#FF5F57"/>
  <circle cx="296" cy="107" r="7" fill="#FEBC2E"/>
  <circle cx="315" cy="107" r="7" fill="#28C840"/>

  <!-- 페이지 내용 (위에서 아래까지 긴 콘텐츠) -->
  <rect x="280" y="152" width="440" height="80" rx="6" fill="#1A3060"/>
  <rect x="280" y="242" width="360" height="14" rx="4" fill="#2A4A8A"/>
  <rect x="280" y="264" width="420" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="282" width="390" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="300" width="410" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="328" width="440" height="60" rx="6" fill="#152844"/>
  <rect x="280" y="398" width="300" height="14" rx="4" fill="#2A4A8A"/>
  <rect x="280" y="420" width="420" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="438" width="380" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="466" width="440" height="60" rx="6" fill="#152844"/>
  <rect x="280" y="536" width="330" height="14" rx="4" fill="#2A4A8A"/>
  <rect x="280" y="558" width="420" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="576" width="400" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="600" width="440" height="60" rx="6" fill="#152844"/>
  <rect x="280" y="670" width="350" height="14" rx="4" fill="#2A4A8A"/>
  <rect x="280" y="692" width="420" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="712" width="390" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="738" width="440" height="60" rx="6" fill="#152844"/>
  <rect x="280" y="810" width="380" height="14" rx="4" fill="#2A4A8A"/>
  <rect x="280" y="832" width="420" height="10" rx="3" fill="#1E3870"/>
  <rect x="280" y="850" width="360" height="10" rx="3" fill="#1E3870"/>

  <!-- 카메라 셔터 클릭 이펙트 — 하단에서 올라오는 캡처 선 -->
  <line x1="220" y1="540" x2="800" y2="540" stroke="#4A90D9" stroke-width="4" stroke-dasharray="16,8" opacity="0.8"/>
  <!-- 캡처 프레임 코너 표시 -->
  <path d="M225,465 L225,390 L300,390" fill="none" stroke="#4A90D9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800,465 L800,390 L725,390" fill="none" stroke="#4A90D9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 스크롤바 (우측) -->
  <rect x="732" y="80" width="8" height="900" rx="4" fill="#1A3060"/>
  <rect x="732" y="180" width="8" height="120" rx="4" fill="#4A90D9"/>

  <!-- 저장 아이콘 (우하단 오버레이) -->
  <circle cx="830" cy="830" r="80" fill="#1A3060" stroke="#4A90D9" stroke-width="6"/>
  <path d="M810,808 L810,858 L850,858 L850,808 Z" fill="none" stroke="#4A90D9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M820,808 L820,828 L840,828 L840,808" fill="none" stroke="#4A90D9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M810,840 L830,862 L850,840" fill="none" stroke="#4A90D9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
