<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0F3460"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large U+ badge -->
  <rect x="100" y="90" width="310" height="160" rx="20" fill="#0F3460" stroke="#533483" stroke-width="3"/>
  <text x="256" y="195" text-anchor="middle" font-family="monospace" font-size="88" font-weight="bold" fill="#E040FB">U+</text>
  <!-- Code point display -->
  <rect x="100" y="270" width="310" height="64" rx="12" fill="#533483" opacity="0.8"/>
  <text x="256" y="314" text-anchor="middle" font-family="monospace" font-size="38" font-weight="bold" fill="#FFD54F">1F600</text>
  <!-- Sample glyphs floating -->
  <text x="100" y="405" font-family="Arial,sans-serif" font-size="42">😀</text>
  <text x="160" y="405" font-family="Arial,sans-serif" font-size="42">♠</text>
  <text x="220" y="405" font-family="Arial,sans-serif" font-size="42">Ω</text>
  <text x="280" y="405" font-family="Arial,sans-serif" font-size="42">★</text>
  <text x="340" y="405" font-family="Arial,sans-serif" font-size="42">∞</text>
  <text x="395" y="405" font-family="Arial,sans-serif" font-size="42">♦</text>
  <!-- Divider -->
  <line x1="80" y1="420" x2="430" y2="420" stroke="#533483" stroke-width="2" opacity="0.5"/>
  <!-- Label -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#CE93D8">GLYPH MAP</text>
</svg>
