<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="80%" r="80%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="f1" cx="50%" cy="90%" r="80%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="20%" style="stop-color:#ffca28"/>
      <stop offset="50%" style="stop-color:#ff6f00"/>
      <stop offset="100%" style="stop-color:#bf360c;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="f2" cx="50%" cy="90%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="15%" style="stop-color:#fff3e0"/>
      <stop offset="40%" style="stop-color:#ff8f00"/>
      <stop offset="70%" style="stop-color:#e53935"/>
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer cool flames (blue) -->
  <path d="M256 460 Q180 420 165 350 Q150 280 185 240 Q200 218 210 195 Q220 170 210 145 Q230 165 240 190 Q248 210 256 230 Q264 210 272 190 Q282 165 302 145 Q292 170 302 195 Q312 218 327 240 Q362 280 347 350 Q332 420 256 460 Z" fill="#0d47a1" opacity="0.4" filter="url(#glow)"/>
  <!-- Outer flame -->
  <path d="M256 450 Q195 410 182 345 Q169 280 202 238 Q218 215 228 190 Q238 165 232 140 Q250 162 258 188 Q264 210 256 230 Q248 210 254 188 Q262 162 280 140 Q274 165 284 190 Q294 215 310 238 Q343 280 330 345 Q317 410 256 450 Z" fill="url(#f1)" filter="url(#soft)"/>
  <!-- Inner flame -->
  <path d="M256 440 Q220 405 212 350 Q204 295 228 260 Q240 240 248 218 Q256 200 256 185 Q256 200 264 218 Q272 240 284 260 Q308 295 300 350 Q292 405 256 440 Z" fill="url(#f2)" filter="url(#glow)"/>
  <!-- Core white-hot -->
  <path d="M256 420 Q238 390 236 358 Q234 326 248 305 Q252 295 256 285 Q260 295 264 305 Q278 326 276 358 Q274 390 256 420 Z" fill="#ffffff" opacity="0.95" filter="url(#glow)"/>
  <!-- Thermometer reading overlay -->
  <rect x="340" y="200" width="80" height="120" rx="10" fill="#1a0a00" stroke="#ff6d00" stroke-width="2" opacity="0.9"/>
  <rect x="352" y="212" width="14" height="100" rx="7" fill="#37474f"/>
  <rect x="352" y="272" width="14" height="40" rx="7" fill="#ff1744" filter="url(#glow)"/>
  <circle cx="359" cy="318" r="12" fill="#ff1744" filter="url(#glow)"/>
  <!-- Sparks -->
  <circle cx="155" cy="300" r="4" fill="#ffd740" filter="url(#soft)" opacity="0.9"/>
  <circle cx="140" cy="270" r="3" fill="#ff9800" opacity="0.8"/>
  <circle cx="380" cy="280" r="4" fill="#ffd740" filter="url(#soft)" opacity="0.9"/>
  <circle cx="395" cy="250" r="3" fill="#ff6d00" opacity="0.8"/>
</svg>