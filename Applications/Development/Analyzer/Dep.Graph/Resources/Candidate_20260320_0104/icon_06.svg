<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000D1A"/>
  <!-- Layered stack: horizontal layers with connectors -->
  <rect x="200" y="200" width="624" height="100" rx="20" fill="#4DD0E1"/>
  <rect x="200" y="362" width="624" height="100" rx="20" fill="#0097A7"/>
  <rect x="200" y="524" width="624" height="100" rx="20" fill="#4DD0E1" opacity="0.7"/>
  <rect x="200" y="686" width="624" height="100" rx="20" fill="#0097A7" opacity="0.6"/>
  <!-- Vertical connectors between layers -->
  <line x1="400" y1="300" x2="400" y2="362" stroke="#4DD0E1" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="300" x2="512" y2="362" stroke="#4DD0E1" stroke-width="18" stroke-linecap="round"/>
  <line x1="624" y1="300" x2="624" y2="362" stroke="#4DD0E1" stroke-width="18" stroke-linecap="round"/>
  <line x1="400" y1="462" x2="400" y2="524" stroke="#4DD0E1" stroke-width="14" stroke-linecap="round"/>
  <line x1="624" y1="462" x2="624" y2="524" stroke="#4DD0E1" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="624" x2="512" y2="686" stroke="#4DD0E1" stroke-width="12" stroke-linecap="round"/>
</svg>
