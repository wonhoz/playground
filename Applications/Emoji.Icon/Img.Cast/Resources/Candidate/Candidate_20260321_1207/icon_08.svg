<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 딥 네이비 -->
  <defs>
    <radialGradient id="bg8" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0F1535"/>
      <stop offset="100%" stop-color="#060A1A"/>
    </radialGradient>
    <linearGradient id="flask8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="liquid8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="glow8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="emerald8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DFFB3"/>
      <stop offset="100%" stop-color="#00C853"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg8)"/>

  <!-- 배경 별빛 효과 -->
  <circle cx="120" cy="180" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="280" cy="120" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="900" cy="160" r="3" fill="#50C878" opacity="0.6"/>
  <circle cx="820" cy="250" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="780" r="2" fill="white" opacity="0.4"/>
  <circle cx="920" cy="820" r="3" fill="#FFD700" opacity="0.5"/>

  <!-- Layer 2: 연금술 플라스크 메인 바디 -->
  <!-- 플라스크 목 -->
  <rect x="420" y="130" width="184" height="240" rx="14" fill="#1A2050" stroke="#FFD700" stroke-width="8" opacity="0.95"/>
  <!-- 목 내부 광택 -->
  <rect x="440" y="148" width="60" height="204" rx="6" fill="white" opacity="0.07"/>

  <!-- 플라스크 몸통 (원형) -->
  <ellipse cx="512" cy="620" rx="260" ry="250" fill="url(#flask8)" stroke="#B8860B" stroke-width="10"/>
  <!-- 플라스크 내부 액체 (황금 변환 중) -->
  <ellipse cx="512" cy="680" rx="220" ry="180" fill="url(#liquid8)" opacity="0.7"/>
  <!-- 액체 표면 반짝임 -->
  <ellipse cx="512" cy="510" rx="218" ry="32" fill="#FFD700" opacity="0.35"/>

  <!-- 플라스크 유리 반사 -->
  <path d="M 310 520 C 290 580 285 650 305 720 C 320 760 340 790 355 810"
        stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.18"/>

  <!-- 플라스크 몸통-목 연결 -->
  <path d="M 420 370 C 380 400 260 460 265 580"
        stroke="#B8860B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 604 370 C 644 400 764 460 759 580"
        stroke="#B8860B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- 플라스크 내 이미지 파일 심볼 (변환 중) -->
  <!-- 파일 아이콘 (이미지 변환 중을 나타냄) -->
  <g opacity="0.85">
    <rect x="435" y="555" width="154" height="175" rx="12" fill="#1A2050" stroke="#FFD700" stroke-width="5"/>
    <path d="M 435 555 L 555 555 L 589 589 L 589 730 L 435 730 Z" fill="#0D1535"/>
    <path d="M 555 555 L 555 589 L 589 589" fill="none" stroke="#FFD700" stroke-width="5"/>
    <!-- 이미지 내용 표시 -->
    <rect x="453" y="608" width="118" height="86" rx="5" fill="#FFD700" opacity="0.15"/>
    <path d="M 453 678 L 490 640 L 522 665 L 553 628 L 571 678 Z" fill="#FFD700" opacity="0.45"/>
    <circle cx="540" cy="625" r="12" fill="#FFD700" opacity="0.5"/>
    <!-- ICO 레이블 등장 -->
    <text x="512" y="760" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700"
          fill="#FFD700" text-anchor="middle" opacity="0.8">→ ICO</text>
  </g>

  <!-- 변환 거품/기포 효과 -->
  <circle cx="390" cy="590" r="18" fill="#FFD700" opacity="0.3"/>
  <circle cx="640" cy="620" r="14" fill="#FFD700" opacity="0.25"/>
  <circle cx="420" cy="660" r="10" fill="#FFD700" opacity="0.2"/>
  <circle cx="620" cy="570" r="20" fill="#FFA500" opacity="0.25"/>

  <!-- Layer 3: 에메랄드 결과물 방울들 (변환 완료 신호) -->
  <circle cx="248" cy="490" r="28" fill="url(#emerald8)" opacity="0.9"/>
  <circle cx="775" cy="510" r="22" fill="url(#emerald8)" opacity="0.85"/>
  <circle cx="200" cy="620" r="16" fill="url(#emerald8)" opacity="0.7"/>

  <!-- 플라스크 뚜껑/마개 -->
  <rect x="408" y="100" width="208" height="50" rx="10" fill="#C9A227"/>
  <rect x="430" y="80" width="164" height="38" rx="8" fill="#FFD700"/>
  <rect x="460" y="64" width="104" height="30" rx="6" fill="#C9A227"/>

  <!-- 연기/빛 상승 효과 -->
  <path d="M 460 100 C 440 60 470 30 450 0" stroke="#FFD700" stroke-width="8" fill="none"
        stroke-linecap="round" opacity="0.4"/>
  <path d="M 512 96 C 500 50 520 20 508 0" stroke="#FFD700" stroke-width="8" fill="none"
        stroke-linecap="round" opacity="0.45"/>
  <path d="M 564 100 C 584 56 554 28 574 0" stroke="#FFD700" stroke-width="8" fill="none"
        stroke-linecap="round" opacity="0.4"/>
</svg>
