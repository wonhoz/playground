<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 캔버스 이젤 -->
  <line x1="200" y1="420" x2="256" y2="130" stroke="#8BC34A" stroke-width="10" stroke-linecap="round"/>
  <line x1="312" y1="420" x2="256" y2="130" stroke="#8BC34A" stroke-width="10" stroke-linecap="round"/>
  <line x1="180" y1="360" x2="332" y2="360" stroke="#558B2F" stroke-width="8" stroke-linecap="round"/>
  <!-- 캔버스 -->
  <rect x="100" y="80" width="312" height="260" rx="8" fill="url(#canvas)" stroke="#8BC34A" stroke-width="4"/>
  <!-- 캔버스 내 아이콘 그리기 -->
  <text x="256" y="230" font-size="130" text-anchor="middle" font-family="Segoe UI Emoji">🖼️</text>
  <!-- ICO 출력 뱃지 -->
  <rect x="356" y="296" width="100" height="44" rx="10" fill="#1B5E20" stroke="#AED581" stroke-width="2"/>
  <text x="406" y="323" font-size="18" text-anchor="middle" fill="#DCEDC8" font-family="Segoe UI" font-weight="bold">.ICO</text>
  <!-- 붓 -->
  <rect x="70" y="350" width="18" height="120" rx="6" fill="#795548" transform="rotate(-20 70 350)"/>
  <ellipse cx="54" cy="460" rx="12" ry="18" fill="#4CAF50" transform="rotate(-20 54 460)"/>
</svg>