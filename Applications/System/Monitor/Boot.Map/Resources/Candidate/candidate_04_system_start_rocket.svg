<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="80%" r="80%">
      <stop offset="0%" style="stop-color:#1a0020"/>
      <stop offset="60%" style="stop-color:#0d0020"/>
      <stop offset="100%" style="stop-color:#000010"/>
    </radialGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#64b5f6"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="20%" style="stop-color:#ffeb3b"/>
      <stop offset="50%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="100" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="80" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="120" r="2" fill="white" opacity="0.8"/>
  <circle cx="420" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="90" cy="200" r="2" fill="white" opacity="0.7"/>
  <circle cx="440" cy="200" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="320" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="400" cy="300" r="2" fill="white" opacity="0.7"/>
  <!-- Rocket body -->
  <path d="M256 110 Q290 140 296 200 L296 320 L256 350 L216 320 L216 200 Q222 140 256 110 Z" fill="url(#rocket)" filter="url(#glow)"/>
  <!-- Rocket nose cone -->
  <path d="M256 110 Q276 130 285 165 L227 165 Q236 130 256 110 Z" fill="#90caf9"/>
  <!-- Window -->
  <circle cx="256" cy="240" r="26" fill="#0d47a1"/>
  <circle cx="256" cy="240" r="22" fill="#1565c0"/>
  <circle cx="248" cy="232" r="8" fill="#42a5f5" opacity="0.5"/>
  <!-- Wings/fins -->
  <path d="M216 280 L170 340 L216 320 Z" fill="#64b5f6" opacity="0.8"/>
  <path d="M296 280 L342 340 L296 320 Z" fill="#64b5f6" opacity="0.8"/>
  <!-- Flame exhaust -->
  <ellipse cx="256" cy="370" rx="30" ry="80" fill="url(#flame)" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="256" cy="360" rx="16" ry="50" fill="#ffffff" opacity="0.7" filter="url(#glow)"/>
  <!-- Boot timeline alongside rocket -->
  <line x1="100" y1="350" x2="180" y2="110" stroke="#42a5f5" stroke-width="2" opacity="0.3" stroke-dasharray="8,4"/>
  <circle cx="100" cy="350" r="5" fill="#42a5f5" opacity="0.6"/>
  <circle cx="140" cy="230" r="5" fill="#69f0ae" opacity="0.6"/>
  <circle cx="180" cy="110" r="5" fill="#ea80fc" opacity="0.6"/>
</svg>