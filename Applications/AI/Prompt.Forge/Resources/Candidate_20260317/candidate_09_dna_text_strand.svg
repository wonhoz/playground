<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad09" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#001f12"/>
      <stop offset="100%" stop-color="#00120a"/>
    </radialGradient>
    <linearGradient id="strand1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF7F"/>
      <stop offset="100%" stop-color="#00CED1"/>
    </linearGradient>
    <linearGradient id="strand2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CED1"/>
      <stop offset="100%" stop-color="#00FF7F"/>
    </linearGradient>
    <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF7F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FF7F" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow09">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dnaGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow09">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bgGrad09)" rx="40"/>

  <!-- 배경 파티클 -->
  <circle cx="60" cy="80" r="2" fill="#00FF7F" opacity="0.3" filter="url(#glow09)"/>
  <circle cx="450" cy="120" r="1.5" fill="#00CED1" opacity="0.4" filter="url(#glow09)"/>
  <circle cx="480" cy="400" r="2" fill="#00FF7F" opacity="0.3" filter="url(#glow09)"/>
  <circle cx="40" cy="440" r="1.5" fill="#00CED1" opacity="0.35" filter="url(#glow09)"/>

  <!-- DNA 이중나선 -->
  <!-- 나선 수학: y = 60 + t*19 (step), x1 = 256 + 90*sin(t*0.4), x2 = 256 - 90*sin(t*0.4) -->

  <!-- 좌측 나선 -->
  <path d="M166,50 C210,75 210,105 166,130 C122,155 122,185 166,210 C210,235 210,265 166,290 C122,315 122,345 166,370 C210,395 210,425 166,450"
        stroke="#00FF7F" stroke-width="3" fill="none" filter="url(#dnaGlow)" opacity="0.9"/>

  <!-- 우측 나선 -->
  <path d="M346,50 C302,75 302,105 346,130 C390,155 390,185 346,210 C302,235 302,265 346,290 C390,315 390,345 346,370 C302,395 302,425 346,450"
        stroke="#00CED1" stroke-width="3" fill="none" filter="url(#dnaGlow)" opacity="0.9"/>

  <!-- 염기쌍 연결 (가로 사다리) + 텍스트 코드 -->
  <!-- 쌍 1 (y=65) -->
  <g filter="url(#glow09)">
    <line x1="178" y1="65" x2="334" y2="65" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="61" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">P</text>
  </g>

  <!-- 쌍 2 (y=90) -->
  <g filter="url(#glow09)">
    <line x1="210" y1="90" x2="302" y2="90" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="86" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">R</text>
  </g>

  <!-- 쌍 3 (y=115) -->
  <g filter="url(#glow09)">
    <line x1="210" y1="115" x2="302" y2="115" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="111" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">O</text>
  </g>

  <!-- 쌍 4 (y=140) -->
  <g filter="url(#glow09)">
    <line x1="178" y1="140" x2="334" y2="140" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="136" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">M</text>
