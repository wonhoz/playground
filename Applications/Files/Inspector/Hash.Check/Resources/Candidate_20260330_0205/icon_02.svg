<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 하늘 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg2)"/>

  <!-- Layer 2: 앱 UI 패널 -->
  <!-- 창 -->
  <rect x="80" y="120" width="864" height="760" rx="24" fill="#1E1E2E" opacity="0.9"/>
  <!-- 탭 바 -->
  <rect x="80" y="120" width="864" height="70" rx="24" fill="#12121E"/>
  <!-- 탭들 -->
  <rect x="96" y="128" width="160" height="52" rx="12" fill="#1565C0"/>
  <text x="176" y="156" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">Single</text>
  <rect x="272" y="136" width="130" height="44" rx="10" fill="#263238" opacity="0.8"/>
  <text x="337" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">Batch</text>
  <rect x="418" y="136" width="130" height="44" rx="10" fill="#263238" opacity="0.8"/>
  <text x="483" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">Folder</text>
  <rect x="564" y="136" width="130" height="44" rx="10" fill="#263238" opacity="0.8"/>
  <text x="629" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">Watch</text>

  <!-- 드롭 힌트 -->
  <rect x="100" y="220" width="824" height="140" rx="16" fill="#263238" stroke="#42A5F5" stroke-width="4" stroke-dasharray="16 8"/>
  <text x="512" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#42A5F5" text-anchor="middle" dominant-baseline="middle">Drop file here</text>
  <text x="512" y="318" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#546E7A" text-anchor="middle" dominant-baseline="middle">or click to browse</text>

  <!-- 해시 결과 테이블 -->
  <rect x="100" y="382" width="824" height="60" rx="10" fill="#1A3A1A" opacity="0.8"/>
  <text x="140" y="414" font-family="'Courier New',monospace" font-size="28" fill="#4CAF50" dominant-baseline="middle">MD5</text>
  <text x="260" y="414" font-family="'Courier New',monospace" font-size="26" fill="#A5D6A7" dominant-baseline="middle">d41d8cd98f00b204...</text>

  <rect x="100" y="454" width="824" height="60" rx="10" fill="#1A2A3A" opacity="0.8"/>
  <text x="140" y="486" font-family="'Courier New',monospace" font-size="28" fill="#42A5F5" dominant-baseline="middle">SHA1</text>
  <text x="270" y="486" font-family="'Courier New',monospace" font-size="26" fill="#90CAF9" dominant-baseline="middle">da39a3ee5e6b4b0d...</text>

  <rect x="100" y="526" width="824" height="60" rx="10" fill="#0D2A1A" opacity="0.9"/>
  <text x="140" y="558" font-family="'Courier New',monospace" font-size="28" fill="#69F0AE" dominant-baseline="middle">SHA256</text>
  <text x="310" y="558" font-family="'Courier New',monospace" font-size="26" fill="#CCFF90" dominant-baseline="middle">e3b0c44298fc1c14...</text>

  <rect x="100" y="598" width="824" height="60" rx="10" fill="#1A2A1A" opacity="0.8"/>
  <text x="140" y="630" font-family="'Courier New',monospace" font-size="28" fill="#81C784" dominant-baseline="middle">SHA512</text>
  <text x="310" y="630" font-family="'Courier New',monospace" font-size="26" fill="#C8E6C9" dominant-baseline="middle">cf83e1357eefb8bd...</text>

  <!-- Layer 3: 검증 입력 -->
  <rect x="100" y="700" width="824" height="74" rx="16" fill="#263238"/>
  <text x="140" y="738" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#546E7A" dominant-baseline="middle">🔍 Paste hash to verify...</text>
  <rect x="826" y="710" width="82" height="52" rx="12" fill="#2E7D32"/>
  <text x="867" y="738" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="34" fill="white" text-anchor="middle" dominant-baseline="middle">✓</text>
</svg>
