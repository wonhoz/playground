<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#020510"/>
  <!-- 원자 궤도 (3개 타원 궤도) -->
  <circle cx="512" cy="512" r="60" fill="#42A5F5"/>
  <!-- 궤도 1 (수평) -->
  <ellipse cx="512" cy="512" rx="300" ry="80" fill="none" stroke="#42A5F5" stroke-width="12"/>
  <!-- 궤도 2 (60도 기울기) -->
  <ellipse cx="512" cy="512" rx="300" ry="80" fill="none" stroke="#1565C0" stroke-width="12" transform="rotate(60,512,512)"/>
  <!-- 궤도 3 (120도 기울기) -->
  <ellipse cx="512" cy="512" rx="300" ry="80" fill="none" stroke="#0D47A1" stroke-width="12" transform="rotate(120,512,512)"/>
  <!-- 전자 (각 궤도의 끝) -->
  <circle cx="812" cy="512" r="20" fill="#42A5F5"/>
  <circle cx="362" cy="318" r="20" fill="#1565C0"/>
  <circle cx="362" cy="706" r="20" fill="#0D47A1"/>
</svg>
