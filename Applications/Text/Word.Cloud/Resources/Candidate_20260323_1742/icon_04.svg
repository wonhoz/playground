<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A20"/>
  <!-- Layer 2: 원형 궤도 위 단어들 (TextOrientation.Mixed) -->
  <!-- 동심원 궤도들 -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="#1E3A5F" stroke-width="4" stroke-dasharray="20,10"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="#1E3A5F" stroke-width="4" stroke-dasharray="16,8"/>
  <circle cx="512" cy="512" r="160" fill="none" stroke="#1E3A5F" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- 중앙 (가장 빈도 높은 단어) -->
  <text x="512" y="540" font-size="100" fill="#4D96FF" text-anchor="middle" font-weight="bold" font-family="Arial">cloud</text>
  <!-- 안쪽 궤도 단어들 (4개) -->
  <text x="512" y="364" font-size="52" fill="#74C0FC" text-anchor="middle" font-weight="bold" font-family="Arial">word</text>
  <text x="680" y="524" font-size="52" fill="#74C0FC" text-anchor="middle" font-weight="bold" font-family="Arial">text</text>
  <text x="512" y="694" font-size="52" fill="#74C0FC" text-anchor="middle" font-weight="bold" font-family="Arial">data</text>
  <text x="340" y="524" font-size="52" fill="#74C0FC" text-anchor="middle" font-weight="bold" font-family="Arial">freq</text>
  <!-- 바깥 궤도 단어들 (8개) -->
  <text x="512" y="130" font-size="40" fill="#339AF0" text-anchor="middle" font-family="Arial">analysis</text>
  <text x="810" y="230" font-size="36" fill="#4C6EF5" text-anchor="middle" font-family="Arial">theme</text>
  <text x="900" y="520" font-size="38" fill="#339AF0" text-anchor="middle" font-family="Arial">color</text>
  <text x="800" y="810" font-size="36" fill="#4C6EF5" text-anchor="middle" font-family="Arial">shape</text>
  <text x="512" y="910" font-size="40" fill="#339AF0" text-anchor="middle" font-family="Arial">export</text>
  <text x="215" y="810" font-size="36" fill="#4C6EF5" text-anchor="middle" font-family="Arial">mask</text>
  <text x="120" y="520" font-size="38" fill="#339AF0" text-anchor="middle" font-family="Arial">font</text>
  <text x="210" y="230" font-size="36" fill="#4C6EF5" text-anchor="middle" font-family="Arial">size</text>
  <!-- Layer 3: 배경 별들 (공간감) -->
  <circle cx="100" cy="100" r="4" fill="#4D96FF" opacity="0.3"/>
  <circle cx="920" cy="120" r="3" fill="#74C0FC" opacity="0.3"/>
  <circle cx="80" cy="900" r="5" fill="#4D96FF" opacity="0.3"/>
  <circle cx="940" cy="880" r="3" fill="#74C0FC" opacity="0.3"/>
  <circle cx="180" cy="400" r="3" fill="#4C6EF5" opacity="0.3"/>
  <circle cx="840" cy="350" r="4" fill="#339AF0" opacity="0.3"/>
</svg>
