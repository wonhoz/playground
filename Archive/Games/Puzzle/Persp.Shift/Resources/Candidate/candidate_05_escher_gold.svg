<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100A00"/>
      <stop offset="100%" stop-color="#1E1400"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="dark_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#7B5C00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Escher staircase style - infinite steps going up/shifting perspective -->
  <!-- Step 1 (bottom) -->
  <rect x="100" y="360" width="312" height="30" rx="3" fill="url(#gold)" opacity="0.9"/>
  <polygon points="100,360 100,390 84,380 84,350" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 2 -->
  <rect x="116" y="330" width="280" height="30" rx="3" fill="url(#gold)" opacity="0.85"/>
  <polygon points="116,330 116,360 100,350 100,320" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 3 -->
  <rect x="132" y="300" width="248" height="30" rx="3" fill="url(#gold)" opacity="0.8"/>
  <polygon points="132,300 132,330 116,320 116,290" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 4 -->
  <rect x="148" y="270" width="216" height="30" rx="3" fill="url(#gold)" opacity="0.75"/>
  <polygon points="148,270 148,300 132,290 132,260" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 5 -->
  <rect x="164" y="240" width="184" height="30" rx="3" fill="url(#gold)" opacity="0.7"/>
  <polygon points="164,240 164,270 148,260 148,230" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 6 -->
  <rect x="180" y="210" width="152" height="30" rx="3" fill="url(#gold)" opacity="0.65"/>
  <polygon points="180,210 180,240 164,230 164,200" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Step 7 (top) -->
  <rect x="196" y="180" width="120" height="30" rx="3" fill="url(#gold)" opacity="0.6"/>
  <polygon points="196,180 196,210 180,200 180,170" fill="url(#dark_gold)" opacity="0.8"/>
  <!-- Impossible loop - right side going down (perspective shift) -->
  <rect x="380" y="180" width="30" height="210" rx="3" fill="url(#dark_gold)" opacity="0.7"/>
  <polygon points="380,180 410,180 428,168 398,168" fill="url(#gold)" opacity="0.6"/>
  <!-- Perspective arrows -->
  <path d="M256 100 L256 70 M244 82 L256 70 L268 82" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <!-- Eye at top observing -->
  <ellipse cx="256" cy="130" rx="40" ry="22" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.7"/>
  <circle cx="256" cy="130" r="11" fill="url(#gold)" opacity="0.8"/>
  <circle cx="256" cy="130" r="5" fill="#100A00"/>
</svg>