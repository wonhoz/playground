<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 산호색 따뜻한 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#FF6B5B"/>
  <!-- Layer 2: 쌓인 카드덱 — 프롬프트 라이브러리 -->
  <!-- 맨 뒤 카드 -->
  <rect x="200" y="350" width="560" height="340" rx="24" fill="#FF4A37" transform="rotate(-8 480 520)"/>
  <!-- 중간 카드 -->
  <rect x="210" y="340" width="560" height="340" rx="24" fill="#FF8C7A" transform="rotate(-3 480 510)"/>
  <!-- 앞 카드 (메인) -->
  <rect x="222" y="280" width="580" height="360" rx="24" fill="#FFFFFF"/>
  <!-- Layer 3: 앞 카드 내용 -->
  <!-- 카드 헤더 -->
  <rect x="222" y="280" width="580" height="60" rx="24" fill="#FFF0ED"/>
  <rect x="222" y="316" width="580" height="24" fill="#FFF0ED"/>
  <!-- 프롬프트 제목 -->
  <text x="512" y="322" font-family="sans-serif" font-size="24" fill="#FF4A37" text-anchor="middle" font-weight="bold">Prompt #42</text>
  <!-- 텍스트 라인들 -->
  <rect x="262" y="368" width="380" height="16" rx="4" fill="#CCCCCC" opacity="0.8"/>
  <rect x="262" y="396" width="460" height="16" rx="4" fill="#CCCCCC" opacity="0.8"/>
  <rect x="262" y="424" width="320" height="16" rx="4" fill="#CCCCCC" opacity="0.8"/>
  <!-- 민트 태그 -->
  <rect x="262" y="458" width="90" height="28" rx="14" fill="#2EC4B6"/>
  <text x="307" y="477" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">AI</text>
  <rect x="362" y="458" width="110" height="28" rx="14" fill="#2EC4B6"/>
  <text x="417" y="477" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">writing</text>
  <!-- 즐겨찾기 별 -->
  <text x="758" y="476" font-family="sans-serif" font-size="32" fill="#FFD700">★</text>
  <!-- 아래 숫자 배지 -->
  <circle cx="512" cy="710" r="42" fill="#FF4A37"/>
  <text x="512" y="720" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">47</text>
</svg>
