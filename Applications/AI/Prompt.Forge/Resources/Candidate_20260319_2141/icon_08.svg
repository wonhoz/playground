<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Desk lamp illuminating a document (writing / prompt creation) -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#080500"/>
  <!-- Desk surface -->
  <rect x="120" y="740" width="784" height="40" rx="8" fill="#1A1200"/>
  <!-- Lamp base -->
  <rect x="460" y="706" width="104" height="40" rx="8" fill="#5D4037"/>
  <!-- Lamp arm segments -->
  <rect x="498" y="520" width="28" height="200" rx="8" fill="#8D6E63" transform="rotate(15, 512, 620)"/>
  <rect x="498" y="360" width="28" height="200" rx="8" fill="#8D6E63" transform="rotate(-10, 512, 460)"/>
  <!-- Lamp head -->
  <path d="M380 300 L640 300 L600 380 L420 380 Z" fill="#FFCA28"/>
  <rect x="380" y="285" width="260" height="20" rx="6" fill="#FFB300"/>
  <!-- Light cone -->
  <path d="M420 380 L240 720 L760 720 L600 380 Z" fill="#FF8F00" opacity="0.07"/>
  <path d="M430 380 L300 700 L720 700 L590 380 Z" fill="#FFD740" opacity="0.06"/>
  <!-- Document in light cone -->
  <rect x="280" y="520" width="460" height="200" rx="16" fill="#1A1200" stroke="#FFB300" stroke-width="16"/>
  <!-- Writing lines on doc -->
  <rect x="320" y="560" width="360" height="18" rx="9" fill="#FFB300" opacity="0.8"/>
  <rect x="320" y="598" width="290" height="18" rx="9" fill="#FFB300" opacity="0.6"/>
  <!-- Active cursor line -->
  <rect x="320" y="636" width="220" height="18" rx="9" fill="#FFB300" opacity="0.6"/>
  <rect x="546" y="636" width="16" height="18" rx="4" fill="#FFCA28"/>
  <rect x="320" y="674" width="160" height="18" rx="9" fill="#FFB300" opacity="0.4"/>
</svg>
