<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- Sonar waves: concentric arcs with center dot -->
  <circle cx="512" cy="512" r="52" fill="#66BB6A"/>
  <circle cx="512" cy="512" r="140" fill="none" stroke="#388E3C" stroke-width="28" opacity="0.85"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#66BB6A" stroke-width="24" opacity="0.65"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#388E3C" stroke-width="20" opacity="0.45"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#66BB6A" stroke-width="16" opacity="0.3"/>
  <!-- Sweep line -->
  <line x1="512" y1="512" x2="820" y2="300" stroke="#66BB6A" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <!-- Data point dots at various distances -->
  <circle cx="680" cy="360" r="20" fill="#66BB6A"/>
  <circle cx="360" cy="680" r="16" fill="#388E3C"/>
  <circle cx="750" cy="620" r="14" fill="#66BB6A"/>
</svg>
