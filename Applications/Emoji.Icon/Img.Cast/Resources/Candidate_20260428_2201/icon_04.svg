<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84FFFF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g4)"/>
  <!-- 6 file extension chips in 3x2 grid -->
  <g>
    <!-- row 1 -->
    <g transform="translate(180 280)">
      <rect width="200" height="160" rx="20" fill="#FFFFFF" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#E91E63">SVG</text>
    </g>
    <g transform="translate(412 240)">
      <rect width="200" height="160" rx="20" fill="#FFE082" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#1A237E">PNG</text>
    </g>
    <g transform="translate(644 280)">
      <rect width="200" height="160" rx="20" fill="#A5D6A7" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#1A237E">JPG</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(180 580)">
      <rect width="200" height="160" rx="20" fill="#FFAB91" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#1A237E">BMP</text>
    </g>
    <g transform="translate(412 620)">
      <rect width="200" height="160" rx="20" fill="#F48FB1" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#1A237E">WEBP</text>
    </g>
    <g transform="translate(644 580)">
      <rect width="200" height="160" rx="20" fill="#80DEEA" stroke="#1A237E" stroke-width="10"/>
      <text x="100" y="106" font-family="Verdana, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#1A237E">ICO</text>
    </g>
  </g>
</svg>
