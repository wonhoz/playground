<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a08"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fractal tree structure - Large {}  -->
  <!-- Root level -->
  <rect x="196" y="60" width="120" height="44" rx="8" fill="#0a1510" stroke="#34D399" stroke-width="2.5"/>
  <text x="256" y="80" text-anchor="middle" font-family="monospace" font-size="14" fill="#34D399" font-weight="bold">{ }</text>
  <text x="256" y="96" text-anchor="middle" font-family="monospace" font-size="9" fill="#6EE7B7">root</text>
  <!-- Level 1 lines -->
  <line x1="256" y1="104" x2="150" y2="160" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="104" x2="362" y2="160" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <!-- Level 1 nodes -->
  <rect x="95" y="160" width="110" height="40" rx="6" fill="#0a1510" stroke="#34D399" stroke-width="2"/>
  <text x="150" y="176" text-anchor="middle" font-family="monospace" font-size="11" fill="#34D399">{ }</text>
  <text x="150" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#6EE7B7">object</text>
  <rect x="307" y="160" width="110" height="40" rx="6" fill="#0a1510" stroke="#34D399" stroke-width="2"/>
  <text x="362" y="176" text-anchor="middle" font-family="monospace" font-size="11" fill="#34D399">[ ]</text>
  <text x="362" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#6EE7B7">array</text>
  <!-- Level 2 lines -->
  <line x1="150" y1="200" x2="96" y2="252" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="200" x2="180" y2="252" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <line x1="362" y1="200" x2="326" y2="252" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <line x1="362" y1="200" x2="398" y2="252" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <!-- Level 2 nodes -->
  <rect x="62" y="252" width="68" height="34" rx="5" fill="#0a1510" stroke="#10B981" stroke-width="1.5"/>
  <text x="96" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">{ }</text>
  <text x="96" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#6EE7B7">nested</text>
  <rect x="148" y="252" width="64" height="34" rx="5" fill="#0a1510" stroke="#10B981" stroke-width="1.5"/>
  <text x="180" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">"str"</text>
  <text x="180" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#6EE7B7">value</text>
  <rect x="294" y="252" width="64" height="34" rx="5" fill="#0a1510" stroke="#10B981" stroke-width="1.5"/>
  <text x="326" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">123</text>
  <text x="326" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#6EE7B7">number</text>
  <rect x="366" y="252" width="64" height="34" rx="5" fill="#0a1510" stroke="#10B981" stroke-width="1.5"/>
  <text x="398" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">true</text>
  <text x="398" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#6EE7B7">bool</text>
  <!-- Level 3 (smaller fractal) -->
  <line x1="96" y1="286" x2="70" y2="326" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <line x1="96" y1="286" x2="120" y2="326" stroke="#059669" stroke-width="1" opacity="0.4"/>
  <rect x="50" y="326" width="44" height="26" rx="4" fill="#0a1510" stroke="#059669" stroke-width="1"/>
  <text x="72" y="342" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">"x"</text>
  <rect x="100" y="326" width="44" height="26" rx="4" fill="#0a1510" stroke="#059669" stroke-width="1"/>
  <text x="122" y="342" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">42</text>
  <!-- Level 4 (tiny fractal) -->
  <line x1="72" y1="352" x2="62" y2="384" stroke="#047857" stroke-width="0.8" opacity="0.4"/>
  <line x1="122" y1="352" x2="132" y2="384" stroke="#047857" stroke-width="0.8" opacity="0.4"/>
  <rect x="46" y="384" width="32" height="20" rx="3" fill="#0a1510" stroke="#047857" stroke-width="0.8"/>
  <text x="62" y="397" text-anchor="middle" font-family="monospace" font-size="6" fill="#047857">null</text>
  <rect x="116" y="384" width="32" height="20" rx="3" fill="#0a1510" stroke="#047857" stroke-width="0.8"/>
  <text x="132" y="397" text-anchor="middle" font-family="monospace" font-size="6" fill="#047857">[ ]</text>
  <!-- Label -->
  <text x="350" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#34D399" opacity="0.5">FRACTAL</text>
  <text x="350" y="436" text-anchor="middle" font-family="monospace" font-size="11" fill="#10B981" opacity="0.5">JSON</text>
</svg>
