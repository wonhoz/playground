<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#00100F"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#002B26"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DE9B6"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main clapper body -->
  <rect x="80" y="160" width="352" height="280" rx="12" fill="url(#board)" stroke="url(#teal)" stroke-width="5"/>
  <!-- Clapper top arm -->
  <rect x="80" y="110" width="352" height="60" rx="8" fill="#00695C" stroke="url(#teal)" stroke-width="4"/>
  <!-- Diagonal stripes on top arm -->
  <g fill="url(#teal)" opacity="0.5">
    <polygon points="80,110 116,110 80,170"/>
    <polygon points="128,110 164,110 128,170 92,170"/>
    <polygon points="176,110 212,110 176,170 140,170"/>
    <polygon points="224,110 260,110 224,170 188,170"/>
    <polygon points="272,110 308,110 272,170 236,170"/>
    <polygon points="320,110 356,110 320,170 284,170"/>
    <polygon points="368,110 404,110 368,170 332,170"/>
    <polygon points="416,110 432,110 432,170 380,170"/>
  </g>
  <!-- Screen lines on body -->
  <g fill="url(#teal)" opacity="0.6">
    <rect x="110" y="210" width="80" height="12" rx="5"/>
    <rect x="202" y="210" width="50" height="12" rx="5" opacity="0.4"/>
    <rect x="110" y="240" width="60" height="12" rx="5" opacity="0.5"/>
    <rect x="180" y="240" width="90" height="12" rx="5"/>
    <rect x="110" y="270" width="180" height="12" rx="5" opacity="0.4"/>
  </g>
  <!-- REC indicator -->
  <circle cx="380" cy="340" r="40" fill="#001A1A" stroke="url(#teal)" stroke-width="4"/>
  <circle cx="380" cy="340" r="26" fill="#FF1744"/>
  <rect x="350" y="400" width="60" height="14" rx="6" fill="url(#teal)" opacity="0.6"/>
</svg>
