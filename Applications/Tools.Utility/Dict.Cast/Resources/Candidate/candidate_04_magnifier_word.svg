<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dictionary page -->
  <rect x="70" y="80" width="340" height="340" rx="10" fill="url(#pageBg)" stroke="#546E7A" stroke-width="4"/>
  <!-- Page header -->
  <rect x="70" y="80" width="340" height="36" rx="10" fill="#546E7A"/>
  <rect x="70" y="106" width="340" height="10" fill="#546E7A"/>
  <text x="240" y="104" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="16" fill="white">Dictionary</text>
  <!-- Dictionary entries -->
  <text x="90" y="140" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#263238">abridge</text>
  <text x="90" y="157" font-family="'Segoe UI', sans-serif" font-size="11" fill="#546E7A">  /əˈbrɪdʒ/ v. 요약하다, 줄이다</text>
  <line x1="90" y1="165" x2="390" y2="165" stroke="#B0BEC5" stroke-width="1"/>
  <text x="90" y="181" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#263238">abrogate</text>
  <text x="90" y="198" font-family="'Segoe UI', sans-serif" font-size="11" fill="#546E7A">  /ˈæbrəɡeɪt/ v. 폐지하다</text>
  <line x1="90" y1="206" x2="390" y2="206" stroke="#B0BEC5" stroke-width="1"/>
  <text x="90" y="222" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#00BCD4">abscond</text>
  <text x="90" y="239" font-family="'Segoe UI', sans-serif" font-size="11" fill="#546E7A">  /æbˈskɒnd/ v. 도주하다</text>
  <line x1="90" y1="247" x2="390" y2="247" stroke="#B0BEC5" stroke-width="1"/>
  <text x="90" y="263" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#263238">abstain</text>
  <text x="90" y="280" font-family="'Segoe UI', sans-serif" font-size="11" fill="#546E7A">  /əbˈsteɪn/ v. 삼가다, 자제하다</text>
  <line x1="90" y1="288" x2="390" y2="288" stroke="#B0BEC5" stroke-width="1"/>
  <text x="90" y="304" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#263238">abstruse</text>
  <text x="90" y="321" font-family="'Segoe UI', sans-serif" font-size="11" fill="#546E7A">  /æbˈstruːs/ adj. 난해한</text>
  <!-- Magnifier overlapping -->
  <circle cx="360" cy="380" r="90" fill="#263238" stroke="#00BCD4" stroke-width="7" opacity="0.92"/>
  <circle cx="360" cy="380" r="78" fill="#1C2B33" opacity="0.8"/>
  <!-- Word inside magnifier -->
  <text x="360" y="370" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="18" font-weight="bold" fill="#00BCD4">abscond</text>
  <text x="360" y="390" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="16" fill="white">도주하다</text>
  <line x1="424" y1="444" x2="468" y2="488" stroke="#00BCD4" stroke-width="10" stroke-linecap="round"/>
</svg>
