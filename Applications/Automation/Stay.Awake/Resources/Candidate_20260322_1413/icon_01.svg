<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Discord 그라데이션 배경 -->
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36393F"/>
      <stop offset="100%" stop-color="#2C2F33"/>
    </linearGradient>
    <!-- 초록 배지 그라데이션 -->
    <radialGradient id="badge01" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#57F287"/>
      <stop offset="100%" stop-color="#3BA55C"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: Discord 스타일 다크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: 노란 초승달 — Discord 자리비움(Idle) 아이콘 -->
  <!-- 큰 원으로 달 전체 그리기 -->
  <circle cx="490" cy="480" r="268" fill="#FAA61A"/>
  <!-- 배경색 원으로 가려서 초승달 모양 완성 -->
  <circle cx="580" cy="400" r="222" fill="#2C2F33"/>

  <!-- 별 장식 (밤 분위기) -->
  <circle cx="760" cy="260" r="10" fill="white" opacity="0.7"/>
  <circle cx="820" cy="330" r="7" fill="white" opacity="0.5"/>
  <circle cx="700" cy="200" r="8" fill="white" opacity="0.5"/>
  <circle cx="850" cy="200" r="6" fill="white" opacity="0.4"/>

  <!-- Layer 3: 빨간 금지 기호 ⊘ (자리비움 차단) -->
  <!-- 금지 원 테두리 -->
  <circle cx="490" cy="480" r="310" fill="none" stroke="#ED4245" stroke-width="76"/>
  <!-- 금지 대각선 (좌상→우하) -->
  <line x1="271" y1="261" x2="709" y2="699"
        stroke="#ED4245" stroke-width="76" stroke-linecap="round"/>

  <!-- 우측 하단: Online 상태 유지 중 (초록 배지) -->
  <!-- 배경색 경계 링 -->
  <circle cx="776" cy="776" r="118" fill="#2C2F33"/>
  <!-- 초록 Active 도트 -->
  <circle cx="776" cy="776" r="96" fill="url(#badge01)"/>
  <circle cx="752" cy="752" r="38" fill="#86EFAC" opacity="0.35"/>
</svg>
