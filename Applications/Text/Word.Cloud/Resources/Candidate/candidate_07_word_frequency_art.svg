<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff3030"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#33aa44"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#1166ee"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#9933ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Word bars by frequency (treemap/bar visual) -->
  <!-- Large words = tall bars -->
  <rect x="90" y="188" width="62" height="180" rx="6" fill="url(#bar1)" opacity="0.9"/>
  <rect x="166" y="138" width="62" height="230" rx="6" fill="url(#bar2)" opacity="0.9"/>
  <rect x="242" y="108" width="62" height="260" rx="6" fill="url(#bar3)" opacity="0.9"/>
  <rect x="318" y="158" width="62" height="210" rx="6" fill="url(#bar4)" opacity="0.9"/>
  <rect x="394" y="208" width="28" height="160" rx="5" fill="url(#bar5)" opacity="0.85"/>
  <!-- Word labels on bars -->
  <rect x="96" y="200" width="50" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="172" y="150" width="50" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="248" y="120" width="50" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="324" y="170" width="50" height="8" rx="3" fill="white" opacity="0.3"/>
  <!-- Baseline -->
  <rect x="80" y="368" width="352" height="4" rx="2" fill="#333"/>
</svg>