<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 앨범아트 카드 (기울어진) -->
  <rect x="120" y="200" width="440" height="440" rx="24" fill="#3F51B5" transform="rotate(-8 340 420)"/>
  <circle cx="340" cy="420" r="130" fill="#1A237E" transform="rotate(-8 340 420)"/>
  <circle cx="340" cy="420" r="60" fill="#7986CB" transform="rotate(-8 340 420)"/>
  <circle cx="340" cy="420" r="24" fill="white" transform="rotate(-8 340 420)"/>
  <!-- Layer 3: ID3 태그 패널 (오른쪽 앞) -->
  <rect x="480" y="220" width="400" height="340" rx="24" fill="#E91E63"/>
  <text x="680" y="278" font-family="'Consolas', monospace" font-size="50" fill="white" text-anchor="middle" font-weight="700">ID3</text>
  <line x1="500" y1="296" x2="860" y2="296" stroke="white" stroke-width="4" opacity="0.5"/>
  <text x="510" y="344" font-family="'Consolas', monospace" font-size="36" fill="#FCE4EC">♪ Title</text>
  <text x="510" y="390" font-family="'Consolas', monospace" font-size="36" fill="#FCE4EC">♫ Artist</text>
  <text x="510" y="436" font-family="'Consolas', monospace" font-size="36" fill="#FCE4EC">♩ Album</text>
  <text x="510" y="482" font-family="'Consolas', monospace" font-size="36" fill="#FCE4EC">♬ Genre</text>
  <text x="510" y="528" font-family="'Consolas', monospace" font-size="36" fill="#FCE4EC">★ Track</text>
  <!-- 대형 음표 (배경 장식, 역동적) -->
  <text x="720" y="860" font-family="'Segoe UI', sans-serif" font-size="360" fill="#3F51B5" opacity="0.18" text-anchor="middle">♫</text>
  <!-- MP3 배지 -->
  <rect x="180" y="750" width="200" height="68" rx="20" fill="#FF6F00"/>
  <text x="280" y="795" font-family="'Consolas', monospace" font-size="48" fill="white" text-anchor="middle" font-weight="700">MP3</text>
  <!-- 연결 화살표 -->
  <line x1="440" y1="480" x2="480" y2="390" stroke="#9C27B0" stroke-width="12" stroke-linecap="round"/>
  <polygon points="480,370 460,400 500,400" fill="#9C27B0"/>
</svg>
