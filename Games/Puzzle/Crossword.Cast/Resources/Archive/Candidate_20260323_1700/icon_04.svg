<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1C0700"/>
  <!-- Layer 2: "#1" 큰 번호 + 격자 배경 -->
  <!-- 격자 배경 (희미) -->
  <rect x="80" y="80" width="864" height="864" rx="20" fill="#2D1200" opacity="0.8"/>
  <line x1="80" y1="368" x2="944" y2="368" stroke="#F97316" stroke-width="4" opacity="0.2"/>
  <line x1="80" y1="656" x2="944" y2="656" stroke="#F97316" stroke-width="4" opacity="0.2"/>
  <line x1="368" y1="80" x2="368" y2="944" stroke="#F97316" stroke-width="4" opacity="0.2"/>
  <line x1="656" y1="80" x2="656" y2="944" stroke="#F97316" stroke-width="4" opacity="0.2"/>
  <!-- "#1" 큰 텍스트 -->
  <text x="512" y="560" font-size="480" fill="#F97316" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="Arial Black">#1</text>
  <!-- Layer 3: 격자 셀 (활성화된 셀들) -->
  <rect x="80" y="80" width="288" height="288" rx="12" fill="#F97316" opacity="0.2"/>
  <text x="224" y="248" font-size="120" fill="#FCD34D" text-anchor="middle" font-weight="bold" font-family="Arial">H</text>
  <rect x="80" y="656" width="288" height="288" rx="12" fill="#F97316" opacity="0.15"/>
  <text x="224" y="824" font-size="120" fill="#FDE68A" text-anchor="middle" font-weight="bold" font-family="Arial">A</text>
</svg>
