<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="100%" stop-color="#00001a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input: single "Hello" beam -->
  <line x1="60" y1="256" x2="190" y2="256" stroke="white" stroke-width="8" opacity="0.7"/>
  <text x="95" y="248" text-anchor="middle" font-family="serif" font-size="12" fill="white" opacity="0.6">Hello</text>
  <!-- Prism -->
  <polygon points="190,140 190,372 320,256" fill="#0a0a22" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="190" y1="140" x2="320" y2="256" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Output beams with different language "translations" -->
  <!-- Language 1: Japanese (red/orange) -->
  <line x1="320" y1="256" x2="452" y2="140" stroke="#EF4444" stroke-width="5" opacity="0.7"/>
  <text x="370" y="198" font-family="serif" font-size="13" fill="#EF4444">こんにちは</text>
  <!-- Language 2: Arabic (orange) -->
  <line x1="320" y1="256" x2="452" y2="180" stroke="#F97316" stroke-width="5" opacity="0.7"/>
  <text x="355" y="222" font-family="serif" font-size="13" fill="#F97316">مرحبا</text>
  <!-- Language 3: Korean (yellow) -->
  <line x1="320" y1="256" x2="452" y2="220" stroke="#EAB308" stroke-width="5" opacity="0.7"/>
  <text x="358" y="246" font-family="serif" font-size="13" fill="#EAB308">안녕하세요</text>
  <!-- Language 4: Devanagari (green) -->
  <line x1="320" y1="256" x2="452" y2="256" stroke="#22C55E" stroke-width="5" opacity="0.7"/>
  <text x="360" y="262" font-family="serif" font-size="13" fill="#22C55E">नमस्ते</text>
  <!-- Language 5: Russian (blue) -->
  <line x1="320" y1="256" x2="452" y2="292" stroke="#3B82F6" stroke-width="5" opacity="0.7"/>
  <text x="360" y="298" font-family="serif" font-size="13" fill="#3B82F6">Привет</text>
  <!-- Language 6: Chinese (indigo) -->
  <line x1="320" y1="256" x2="452" y2="328" stroke="#6366F1" stroke-width="5" opacity="0.7"/>
  <text x="370" y="325" font-family="serif" font-size="13" fill="#6366F1">你好</text>
  <!-- Language 7: German (violet) -->
  <line x1="320" y1="256" x2="452" y2="372" stroke="#8B5CF6" stroke-width="5" opacity="0.7"/>
  <text x="358" y="370" font-family="serif" font-size="13" fill="#8B5CF6">Hallo</text>
  <!-- Locale codes label -->
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#6366F1" opacity="0.7">LANGUAGE PRISM</text>
</svg>
