<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080A00"/>
  <!-- Stethoscope -->
  <!-- Ear pieces -->
  <circle cx="340" cy="220" r="32" fill="#33691E"/>
  <circle cx="500" cy="220" r="32" fill="#33691E"/>
  <!-- Tube -->
  <path d="M340 252 L340 380 Q340 440 420 440 Q500 440 500 380 L500 252" fill="none" stroke="#33691E" stroke-width="24" stroke-linecap="round"/>
  <!-- Chest piece tube down -->
  <line x1="420" y1="440" x2="420" y2="640" stroke="#33691E" stroke-width="24" stroke-linecap="round"/>
  <!-- Chest piece (membrane) -->
  <circle cx="420" cy="700" r="80" fill="#33691E"/>
  <circle cx="420" cy="700" r="55" fill="#080A00"/>
  <circle cx="420" cy="700" r="30" fill="#AED581" opacity="0.5"/>
