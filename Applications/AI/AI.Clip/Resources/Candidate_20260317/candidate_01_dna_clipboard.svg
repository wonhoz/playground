<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2140"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <linearGradient id="dna_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
    <linearGradient id="clip_grad01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow01">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg01)" rx="48"/>

  <!-- 클립보드 메인 바디 -->
  <rect x="156" y="130" width="200" height="255" rx="14" ry="14"
        fill="none" stroke="url(#clip_grad01)" stroke-width="4" opacity="0.9" filter="url(#glow01)"/>
  <!-- 클립보드 클립 -->
  <rect x="220" y="118" width="72" height="28" rx="8" ry="8"
        fill="none" stroke="url(#dna_green)" stroke-width="3.5" filter="url(#glow01)"/>
  <!-- 클립보드 라인들 -->
