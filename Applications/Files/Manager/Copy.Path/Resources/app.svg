<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (deep navy) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg02cp2)"/>

  <!-- Layer 2: Large path text with syntax highlighting -->
  <!-- Drive letter highlighted -->
  <text x="100" y="300" font-family="'Courier New',monospace" font-size="160" font-weight="bold"
    fill="#40C4FF">C:</text>
  <!-- Backslash highlighted -->
  <text x="330" y="300" font-family="'Courier New',monospace" font-size="160" font-weight="bold"
    fill="#FFF176">\</text>
  <!-- folder text -->
  <text x="100" y="480" font-family="'Courier New',monospace" font-size="140" font-weight="bold"
    fill="#69F0AE">folder</text>
  <!-- Backslash highlighted -->
  <text x="590" y="480" font-family="'Courier New',monospace" font-size="140" font-weight="bold"
    fill="#FFF176">\</text>
  <!-- file text -->
  <text x="100" y="640" font-family="'Courier New',monospace" font-size="120" font-weight="bold"
    fill="#FFB74D">file</text>
  <!-- dot and extension highlighted -->
  <text x="370" y="640" font-family="'Courier New',monospace" font-size="120" font-weight="bold"
    fill="#F48FB1">.txt</text>

  <!-- Layer 3: Clipboard icon + copy badge -->
  <rect x="88" y="710" width="848" height="12" rx="6" fill="white" opacity="0.2"/>
  <rect x="700" y="740" width="260" height="72" rx="36" fill="#40C4FF" opacity="0.9"/>
  <text x="830" y="790" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="bold"
    fill="#1A237E" text-anchor="middle">📋 Copy</text>

  <text x="180" y="840" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="bold"
    fill="white" opacity="0.7">COPY.PATH</text>
</svg>
