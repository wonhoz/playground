<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Crossword.Cast — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A2030; font-family: 'Segoe UI', sans-serif; color: #E0F2FE; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #FCD34D; letter-spacing: 3px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #38BDF8; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #061828; border: 2px solid #0369A1; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #FCD34D; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #BAE6FD; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #7DD3FC; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #075985; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>✏ Crossword.Cast</h1>
<p class="subtitle">영단어 십자말풀이 퍼즐 게임 — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">십자말 격자 3×3</div>
    <span class="tag literal">literal</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#0369A1"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#F97316"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">알파벳 타일 십자 (WORDS)</div>
    <span class="tag literal">literal</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#CA8A04"></div>
      <div class="swatch" style="background:#FDE047"></div>
      <div class="swatch" style="background:#DC2626"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">황금 열쇠 + 격자 (힌트로 풀기)</div>
    <span class="tag metaphor">metaphor</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#0891B2"></div>
      <div class="swatch" style="background:#F59E0B"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">돋보기로 "WORD" 발견</div>
    <span class="tag metaphor">metaphor</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#16A34A"></div>
      <div class="swatch" style="background:#DCFCE7"></div>
      <div class="swatch" style="background:#14532D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">CAST 격자 패턴</div>
    <span class="tag hybrid">hybrid</span><span class="tag">실루엣/캐릭터</span>
    <div class="palette">
      <div class="swatch" style="background:#0D9488"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#EF4444"></div>
    </div>
  </div>
</div>
</body>
</html>
