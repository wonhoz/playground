<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Code.Idle — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    p  { color: #888; margin-bottom: 28px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #333; }
    .card img { width: 128px; height: 128px; border-radius: 16px; }
    .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Code.Idle — 아이콘 후보 10개</h1>
  <p>코딩 아이들 게임 아이콘 후보</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_terminal_green.svg"/><span>01 · terminal_green</span></div>
    <div class="card"><img src="candidate_02_coder_robot_blue.svg"/><span>02 · coder_robot_blue</span></div>
    <div class="card"><img src="candidate_03_xp_progress_purple.svg"/><span>03 · xp_progress_purple</span></div>
    <div class="card"><img src="candidate_04_coin_stack_gold.svg"/><span>04 · coin_stack_gold</span></div>
    <div class="card"><img src="candidate_05_keyboard_auto_orange.svg"/><span>05 · keyboard_auto_orange</span></div>
    <div class="card"><img src="candidate_06_git_tree_teal.svg"/><span>06 · git_tree_teal</span></div>
    <div class="card"><img src="candidate_07_server_rack_grey.svg"/><span>07 · server_rack_grey</span></div>
    <div class="card"><img src="candidate_08_pixel_game_retro.svg"/><span>08 · pixel_game_retro</span></div>
    <div class="card"><img src="candidate_09_infinity_loop_red.svg"/><span>09 · infinity_loop_red</span></div>
    <div class="card"><img src="candidate_10_bracket_planet_cyan.svg"/><span>10 · bracket_planet_cyan</span></div>
  </div>
</body>
</html>
