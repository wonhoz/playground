<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background bright red -->
  <rect width="1024" height="1024" rx="190" fill="#FFEBEE"/>
  <!-- Layer 2: Grade report card -->
  <rect x="150" y="160" width="724" height="640" rx="24" fill="#FFFFFF" opacity="0.97"/>
  <rect x="150" y="160" width="724" height="100" rx="24" fill="#E53935"/>
  <text x="512" y="228" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF" text-anchor="middle">Score Report</text>
  <!-- Grade A large -->
  <text x="512" y="460" font-family="Arial Black, sans-serif" font-size="260" font-weight="900" fill="#E53935" text-anchor="middle" opacity="0.12">A</text>
  <!-- Actual grade overlay -->
  <text x="512" y="490" font-family="Arial Black, sans-serif" font-size="200" font-weight="900" fill="#E53935" text-anchor="middle">A</text>
  <!-- Score details -->
  <text x="512" y="620" font-family="Arial, sans-serif" font-size="52" fill="#757575" text-anchor="middle">90 / 100 pts</text>
  <!-- Layer 3: Stars below -->
  <text x="512" y="730" font-family="Segoe UI Emoji, sans-serif" font-size="80" text-anchor="middle">⭐⭐⭐</text>
</svg>
