<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09: 눈금자 측정 (ruler measuring disk) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 가로 눈금자 -->
  <rect x="160" y="340" width="704" height="100" rx="16" fill="#2E7D32"/>
  <!-- 눈금자 큰 눈금 -->
  <line x1="280" y1="340" x2="280" y2="410" stroke="#81C784" stroke-width="6"/>
  <line x1="400" y1="340" x2="400" y2="410" stroke="#81C784" stroke-width="6"/>
  <line x1="512" y1="340" x2="512" y2="410" stroke="#81C784" stroke-width="6"/>
  <line x1="624" y1="340" x2="624" y2="410" stroke="#81C784" stroke-width="6"/>
  <line x1="744" y1="340" x2="744" y2="410" stroke="#81C784" stroke-width="6"/>
  <!-- 눈금자 작은 눈금 -->
  <line x1="220" y1="340" x2="220" y2="380" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <line x1="340" y1="340" x2="340" y2="380" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <line x1="460" y1="340" x2="460" y2="380" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <line x1="568" y1="340" x2="568" y2="380" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <line x1="684" y1="340" x2="684" y2="380" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <!-- 세로 눈금자 -->
  <rect x="340" y="200" width="100" height="624" rx="16" fill="#81C784" opacity="0.25"/>
  <!-- 세로 눈금 -->
  <line x1="340" y1="320" x2="410" y2="320" stroke="#81C784" stroke-width="6" opacity="0.7"/>
  <line x1="340" y1="440" x2="410" y2="440" stroke="#81C784" stroke-width="6" opacity="0.7"/>
  <line x1="340" y1="560" x2="410" y2="560" stroke="#81C784" stroke-width="6" opacity="0.7"/>
  <line x1="340" y1="680" x2="410" y2="680" stroke="#81C784" stroke-width="6" opacity="0.7"/>
  <!-- 측정 화살표 -->
  <line x1="500" y1="520" x2="780" y2="520" stroke="#81C784" stroke-width="8"/>
  <polygon points="780,500 820,520 780,540" fill="#81C784"/>
  <polygon points="500,500 460,520 500,540" fill="#81C784"/>
  <!-- 측정 대상 (디스크 원형) -->
  <circle cx="640" cy="660" r="80" fill="none" stroke="#2E7D32" stroke-width="14"/>
  <circle cx="640" cy="660" r="28" fill="#2E7D32"/>
</svg>
