<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <clipPath id="c4"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Gold background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g4)"/>
  <g clip-path="url(#c4)">
    <!-- Layer 2: Trophy shape -->
    <!-- Trophy cup body -->
    <rect x="302" y="180" width="420" height="360" rx="40" fill="url(#trophy)"/>
    <!-- Trophy cup top rim -->
    <rect x="264" y="160" width="496" height="60" rx="20" fill="#F59E0B"/>
    <!-- Trophy handles (left and right arcs) -->
    <!-- Left handle -->
    <rect x="200" y="194" width="120" height="200" rx="60" fill="#D97706"/>
    <rect x="240" y="194" width="80" height="200" rx="40" fill="#FBBF24"/>
    <!-- Right handle -->
    <rect x="704" y="194" width="120" height="200" rx="60" fill="#D97706"/>
    <rect x="704" y="194" width="80" height="200" rx="40" fill="#FBBF24"/>
    <!-- Trophy stem -->
    <rect x="462" y="540" width="100" height="120" rx="14" fill="#D97706"/>
    <!-- Trophy base -->
    <rect x="334" y="648" width="356" height="60" rx="16" fill="#B45309"/>
    <!-- "1ST" text on trophy -->
    <text x="512" y="400" font-family="Arial Black,Arial,sans-serif" font-size="160" fill="white" font-weight="900" text-anchor="middle">1ST</text>
    <!-- Trophy star/shine -->
    <circle cx="640" cy="250" r="28" fill="#FEF3C7" opacity="0.8"/>
    <circle cx="370" cy="290" r="18" fill="#FEF3C7" opacity="0.6"/>
    <!-- Layer 3: Score panel at bottom -->
    <rect x="200" y="742" width="624" height="108" rx="22" fill="#92400E"/>
    <text x="512" y="816" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="#FDE68A" font-weight="900" text-anchor="middle">SCORE BOARD</text>
  </g>
</svg>
