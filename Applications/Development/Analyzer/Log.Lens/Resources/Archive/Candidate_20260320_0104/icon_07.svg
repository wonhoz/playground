<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000D0D"/>
  <!-- Crosshair outer circle -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#00838F" stroke-width="22"/>
  <!-- Crosshair inner circle -->
  <circle cx="512" cy="512" r="180" fill="none" stroke="#26C6DA" stroke-width="16"/>
  <!-- Crosshair lines (4 segments, gap in center) -->
  <line x1="512" y1="212" x2="512" y2="342" stroke="#00838F" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="682" x2="512" y2="812" stroke="#00838F" stroke-width="18" stroke-linecap="round"/>
  <line x1="212" y1="512" x2="342" y2="512" stroke="#00838F" stroke-width="18" stroke-linecap="round"/>
  <line x1="682" y1="512" x2="812" y2="512" stroke="#00838F" stroke-width="18" stroke-linecap="round"/>
  <!-- Error target dot (red-ish) -->
  <circle cx="512" cy="512" r="60" fill="#26C6DA"/>
  <circle cx="512" cy="512" r="32" fill="#000D0D"/>
  <!-- Small tick marks on outer circle -->
  <line x1="512" y1="212" x2="512" y2="234" stroke="#26C6DA" stroke-width="8"/>
  <line x1="512" y1="790" x2="512" y2="812" stroke="#26C6DA" stroke-width="8"/>
  <line x1="212" y1="512" x2="234" y2="512" stroke="#26C6DA" stroke-width="8"/>
  <line x1="790" y1="512" x2="812" y2="512" stroke="#26C6DA" stroke-width="8"/>
</svg>