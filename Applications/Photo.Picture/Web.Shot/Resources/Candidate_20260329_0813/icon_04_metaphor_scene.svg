<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: Browser window capture scene -->
  <!-- Browser frame -->
  <rect x="130" y="220" width="760" height="540" rx="20" fill="white" opacity="0.95"/>
  <!-- Browser toolbar -->
  <rect x="130" y="220" width="760" height="66" rx="20" fill="#F3F4F6"/>
  <rect x="130" y="252" width="760" height="34" fill="#F3F4F6"/>
  <!-- Browser buttons -->
  <circle cx="175" cy="253" r="14" fill="#EF4444" opacity="0.8"/>
  <circle cx="213" cy="253" r="14" fill="#FBBF24" opacity="0.8"/>
  <circle cx="251" cy="253" r="14" fill="#4ADE80" opacity="0.8"/>
  <!-- URL bar -->
  <rect x="290" y="237" width="500" height="32" rx="10" fill="white"/>
  <text x="310" y="259" font-family="monospace" font-size="26" fill="#6B7280">https://example.com/page</text>
  <!-- Website content in browser -->
  <rect x="150" y="306" width="720" height="60" rx="8" fill="#6366F1" opacity="0.7"/>
  <text x="510" y="346" font-family="Arial" font-size="38" fill="white" text-anchor="middle" font-weight="bold">My Awesome Website</text>
  <rect x="150" y="386" width="460" height="24" rx="6" fill="#E5E7EB"/>
  <rect x="150" y="422" width="340" height="24" rx="6" fill="#E5E7EB"/>
  <rect x="150" y="458" width="400" height="24" rx="6" fill="#E5E7EB"/>
  <!-- Image placeholder in content -->
  <rect x="640" y="386" width="228" height="170" rx="12" fill="#DBEAFE"/>
  <text x="754" y="486" font-size="88" text-anchor="middle">🖼️</text>
  <!-- Layer 3: Camera shutter snap icon overlaid on corner -->
  <circle cx="820" cy="750" r="100" fill="#0284C7" opacity="0.9"/>
  <circle cx="820" cy="750" r="72" fill="none" stroke="white" stroke-width="16"/>
  <circle cx="820" cy="750" r="46" fill="white" opacity="0.4"/>
  <!-- Shutter lines -->
  <line x1="820" y1="670" x2="820" y2="650" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Snapshot flash effect -->
  <polygon points="820,680 848,718 830,718 850,760 800,722 820,722" fill="#FDE047" opacity="0.9"/>
</svg>
