<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060614"/>
      <stop offset="100%" stop-color="#0A0A22"/>
    </linearGradient>
    <linearGradient id="trail03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00CFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <filter id="electricGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#frame03)">
    <!-- Layer 2: Brick grid (subtle, semi-transparent background pattern) -->
    <!-- Row A -->
    <rect x="82" y="130" width="100" height="44" rx="7" fill="#FF2D55" opacity="0.35"/>
    <rect x="192" y="130" width="100" height="44" rx="7" fill="#FF9500" opacity="0.35"/>
    <rect x="302" y="130" width="100" height="44" rx="7" fill="#FFD700" opacity="0.35"/>
    <rect x="412" y="130" width="100" height="44" rx="7" fill="#4CD964" opacity="0.35"/>
    <rect x="522" y="130" width="100" height="44" rx="7" fill="#5AC8FA" opacity="0.35"/>
    <rect x="632" y="130" width="100" height="44" rx="7" fill="#8B44FF" opacity="0.35"/>
    <rect x="742" y="130" width="100" height="44" rx="7" fill="#FF2D55" opacity="0.35"/>
    <rect x="852" y="130" width="90" height="44" rx="7" fill="#FF9500" opacity="0.35"/>
    <!-- Row B -->
    <rect x="82" y="184" width="100" height="44" rx="7" fill="#5AC8FA" opacity="0.3"/>
    <rect x="192" y="184" width="100" height="44" rx="7" fill="#4CD964" opacity="0.3"/>
    <rect x="302" y="184" width="100" height="44" rx="7" fill="#FF2D55" opacity="0.3"/>
    <rect x="412" y="184" width="100" height="44" rx="7" fill="#FFD700" opacity="0.3"/>
    <rect x="522" y="184" width="100" height="44" rx="7" fill="#FF9500" opacity="0.3"/>
    <rect x="632" y="184" width="100" height="44" rx="7" fill="#4CD964" opacity="0.3"/>
    <rect x="742" y="184" width="100" height="44" rx="7" fill="#FF2D55" opacity="0.3"/>
    <rect x="852" y="184" width="90" height="44" rx="7" fill="#5AC8FA" opacity="0.3"/>
    <!-- Row C -->
    <rect x="82" y="238" width="100" height="44" rx="7" fill="#FFD700" opacity="0.25"/>
    <rect x="192" y="238" width="100" height="44" rx="7" fill="#FF2D55" opacity="0.25"/>
    <rect x="302" y="238" width="100" height="44" rx="7" fill="#5AC8FA" opacity="0.25"/>
    <rect x="412" y="238" width="100" height="44" rx="7" fill="#FF9500" opacity="0.25"/>
    <rect x="522" y="238" width="100" height="44" rx="7" fill="#8B44FF" opacity="0.25"/>
    <rect x="632" y="238" width="100" height="44" rx="7" fill="#FFD700" opacity="0.25"/>
    <rect x="742" y="238" width="100" height="44" rx="7" fill="#4CD964" opacity="0.25"/>
    <rect x="852" y="238" width="90" height="44" rx="7" fill="#FF2D55" opacity="0.25"/>

    <!-- Layer 3: Electric speed lines (Blitz = lightning fast) -->
    <!-- Main bold diagonal trajectory -->
    <!-- Glow outer -->
    <line x1="820" y1="860" x2="200" y2="200" stroke="#1E90FF" stroke-width="70" stroke-linecap="round" opacity="0.10"/>
    <!-- Inner glow -->
    <line x1="820" y1="860" x2="200" y2="200" stroke="#00BFFF" stroke-width="38" stroke-linecap="round" opacity="0.30"/>
    <!-- Core white -->
    <line x1="820" y1="860" x2="200" y2="200" stroke="white" stroke-width="16" stroke-linecap="round"/>

    <!-- Second speed line (bounce off left wall) -->
    <!-- Glow -->
    <line x1="200" y1="200" x2="500" y2="860" stroke="#1E90FF" stroke-width="50" stroke-linecap="round" opacity="0.10"/>
    <line x1="200" y1="200" x2="500" y2="860" stroke="#00BFFF" stroke-width="26" stroke-linecap="round" opacity="0.28"/>
    <line x1="200" y1="200" x2="500" y2="860" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

    <!-- Ball at the apex (top of V shape, near the bricks) -->
    <circle cx="200" cy="200" r="48" fill="#00BFFF"/>
    <ellipse cx="186" cy="187" rx="18" ry="12" fill="white" opacity="0.6"/>

    <!-- Electric spark at bounce point -->
    <line x1="186" y1="196" x2="163" y2="175" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="214" y1="196" x2="237" y2="175" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="200" y1="180" x2="200" y2="157" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>

    <!-- Paddle at bottom right -->
    <rect x="580" y="870" width="360" height="48" rx="24" fill="#1E90FF"/>
    <rect x="580" y="870" width="360" height="18" rx="18" fill="white" opacity="0.18"/>

    <!-- Score label top right -->
    <text x="900" y="900" font-family="'Segoe UI', Arial" font-size="68" font-weight="900" fill="#1E90FF" text-anchor="middle" opacity="0.9">×3</text>
  </g>
</svg>
