  <rect x="122" y="292" width="88" height="44" rx="4" fill="url(#wall)" stroke="#F44336" stroke-width="1.5"/>
  <rect x="218" y="292" width="88" height="44" rx="4" fill="url(#wall)" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="314" y="292" width="88" height="44" rx="4" fill="url(#wall)" stroke="#F44336" stroke-width="1.5"/>
  <rect x="410" y="292" width="32" height="44" rx="4" fill="url(#wall)" stroke="#D32F2F" stroke-width="1.5"/>
  <!-- Flames above wall -->
  <path d="M100 240 Q110 200 120 210 Q130 170 150 185 Q160 150 170 170 Q185 140 190 165 Q200 155 200 175 Q210 145 220 170 Q230 158 230 180 Q240 175 240 240 Z" fill="url(#fire)" opacity="0.8"/>
  <path d="M270 240 Q280 195 295 215 Q305 170 320 188 Q332 155 340 175 Q350 160 350 185 Q362 175 365 195 Q370 240 370 240 Z" fill="url(#fire)" opacity="0.7"/>
  <!-- Blocked connection arrows -->
  <!-- Incoming blocked -->
  <line x1="256" y1="100" x2="256" y2="230" stroke="#FF1744" stroke-width="3" stroke-linecap="round"/>
  <polygon points="248,224 264,224 256,238" fill="#FF1744"/>
  <line x1="236" y1="100" x2="276" y2="100" stroke="#FF1744" stroke-width="3"/>
