<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="50%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E76F51"/>
    </linearGradient>
    <linearGradient id="folderSm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FFA040"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree lines -->
  <line x1="110" y1="165" x2="110" y2="390" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="110" y1="215" x2="180" y2="215" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="110" y1="290" x2="180" y2="290" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="110" y1="365" x2="180" y2="365" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="210" y1="240" x2="210" y2="340" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="210" y1="265" x2="280" y2="265" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="210" y1="315" x2="280" y2="315" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Root folder (large) -->
  <rect x="62" y="120" width="110" height="75" rx="8" fill="url(#folder)" filter="url(#shadow)"/>
  <rect x="62" y="110" width="55" height="18" rx="4" fill="#E76F51"/>
  <text x="117" y="163" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">C:\</text>
  <text x="117" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="10" opacity="0.8">500 GB</text>
  <!-- Level 2 folders -->
  <rect x="182" y="193" width="90" height="60" rx="7" fill="url(#folderSm)" filter="url(#shadow)"/>
  <rect x="182" y="185" width="45" height="14" rx="3" fill="#FFA040"/>
  <text x="227" y="228" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Users</text>
  <text x="227" y="243" text-anchor="middle" fill="white" font-family="Arial" font-size="9" opacity="0.8">180 GB</text>
  <rect x="182" y="268" width="90" height="60" rx="7" fill="url(#folderSm)" filter="url(#shadow)"/>
  <rect x="182" y="260" width="45" height="14" rx="3" fill="#FFA040"/>
  <text x="227" y="303" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Prog..</text>
  <text x="227" y="318" text-anchor="middle" fill="white" font-family="Arial" font-size="9" opacity="0.8">120 GB</text>
  <rect x="182" y="343" width="90" height="60" rx="7" fill="url(#folderSm)" filter="url(#shadow)"/>
  <rect x="182" y="335" width="45" height="14" rx="3" fill="#FFA040"/>
  <text x="227" y="378" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Windows</text>
  <text x="227" y="393" text-anchor="middle" fill="white" font-family="Arial" font-size="9" opacity="0.8">80 GB</text>
  <!-- Level 3 folders -->
  <rect x="295" y="243" width="75" height="50" rx="6" fill="#95D5B2" filter="url(#shadow)" opacity="0.9"/>
  <text x="333" y="273" text-anchor="middle" fill="#1B4332" font-family="Arial" font-size="11" font-weight="bold">Docs</text>
  <text x="333" y="287" text-anchor="middle" fill="#1B4332" font-family="Arial" font-size="9">60 GB</text>
  <rect x="295" y="293" width="75" height="50" rx="6" fill="#74C69D" filter="url(#shadow)" opacity="0.9"/>
  <text x="333" y="323" text-anchor="middle" fill="#1B4332" font-family="Arial" font-size="11" font-weight="bold">Video</text>
  <text x="333" y="337" text-anchor="middle" fill="#1B4332" font-family="Arial" font-size="9">80 GB</text>
  <!-- More sub-items right -->
  <rect x="390" y="250" width="70" height="40" rx="5" fill="#52B788" opacity="0.8" filter="url(#shadow)"/>
  <text x="425" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Music</text>
  <rect x="390" y="298" width="70" height="40" rx="5" fill="#40916C" opacity="0.8" filter="url(#shadow)"/>
  <text x="425" y="323" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Images</text>
  <line x1="370" y1="268" x2="390" y2="268" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="318" x2="390" y2="318" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="268" x2="370" y2="318" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Label -->
  <text x="256" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold" letter-spacing="2" opacity="0.9">DISK.LENS</text>
</svg>
