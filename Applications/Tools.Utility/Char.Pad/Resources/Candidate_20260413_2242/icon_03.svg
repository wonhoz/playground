<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <!-- 2x2 category blocks -->
  <!-- Top-left: Arrow -->
  <rect x="122" y="152" width="370" height="224" rx="28" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
  <text x="307" y="294" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">&#x2192;</text>
  <!-- Top-right: Math -->
  <rect x="532" y="152" width="370" height="224" rx="28" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="717" y="294" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">&#x2211;</text>
  <!-- Bottom-left: Symbol -->
  <rect x="122" y="398" width="370" height="224" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="307" y="542" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">&#xa9;</text>
  <!-- Bottom-right: Currency -->
  <rect x="532" y="398" width="370" height="224" rx="28" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <text x="717" y="542" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#1A1A1A" text-anchor="middle">$</text>
  <!-- SYMBOLS badge -->
  <rect x="172" y="736" width="680" height="116" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="822" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#06D6A0" text-anchor="middle">SYMBOLS</text>
</svg>
