<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 씨앗→나무 시간 경과: 성장 단계 -->
  <!-- ground line -->
  <rect x="180" y="700" width="664" height="10" rx="5" fill="#2E7D32" opacity="0.5"/>
  <!-- stage 1: seed -->
  <ellipse cx="240" cy="680" rx="28" ry="22" fill="#2E7D32"/>
  <ellipse cx="240" cy="650" rx="10" ry="18" fill="#66BB6A"/>
  <!-- stage 2: sprout -->
  <line x1="390" y1="700" x2="390" y2="630" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="374" cy="618" rx="28" ry="14" fill="#66BB6A" transform="rotate(-30 374 618)"/>
  <ellipse cx="406" cy="618" rx="28" ry="14" fill="#66BB6A" transform="rotate(30 406 618)"/>
  <!-- stage 3: small tree -->
  <line x1="520" y1="700" x2="520" y2="580" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
  <ellipse cx="500" cy="560" rx="40" ry="20" fill="#66BB6A" transform="rotate(-20 500 560)"/>
  <ellipse cx="540" cy="560" rx="40" ry="20" fill="#66BB6A" transform="rotate(20 540 560)"/>
  <ellipse cx="520" cy="540" rx="32" ry="16" fill="#66BB6A"/>
  <!-- stage 4: full tree -->
  <line x1="710" y1="700" x2="710" y2="530" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <!-- branches -->
  <line x1="710" y1="620" x2="660" y2="570" stroke="#2E7D32" stroke-width="10" stroke-linecap="round"/>
  <line x1="710" y1="600" x2="760" y2="555" stroke="#2E7D32" stroke-width="10" stroke-linecap="round"/>
  <!-- canopy -->
  <circle cx="710" cy="460" r="90" fill="#2E7D32" opacity="0.9"/>
  <circle cx="660" cy="490" r="52" fill="#66BB6A" opacity="0.7"/>
  <circle cx="760" cy="480" r="52" fill="#66BB6A" opacity="0.7"/>
  <circle cx="710" cy="430" r="52" fill="#66BB6A" opacity="0.8"/>
  <!-- growth arrows between stages -->
  <text font-size="50" fill="#66BB6A" opacity="0.5" x="282" y="690" font-family="sans-serif">›</text>
  <text font-size="50" fill="#66BB6A" opacity="0.5" x="432" y="690" font-family="sans-serif">›</text>
  <text font-size="50" fill="#66BB6A" opacity="0.5" x="596" y="690" font-family="sans-serif">›</text>
</svg>
