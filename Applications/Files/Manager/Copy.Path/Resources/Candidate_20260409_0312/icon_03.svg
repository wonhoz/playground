    <rect x="580" y="600" width="198" height="158" rx="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="10"/>
    <!-- Front page (vivid blue) -->
    <rect x="614" y="572" width="198" height="158" rx="16" fill="#2563EB"/>
    <!-- Lines on front page (representing text) -->
    <line x1="646" y1="610" x2="778" y2="610" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="646" y1="644" x2="778" y2="644" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="646" y1="678" x2="726" y2="678" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Folder tab label "PATH" -->
    <text x="216" y="340" font-family="Arial,sans-serif" font-size="80" fill="white" font-weight="bold" opacity="0.90">PATH</text>
  </g>
