<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001100"/>
      <stop offset="100%" style="stop-color:#002200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit traces -->
  <polyline points="80,140 140,140 140,200 260,200 260,140 340,140 340,200 420,200 420,300 340,300 340,360 260,360 260,300 140,300 140,360 80,360" fill="none" stroke="#00aa22" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="80" y1="140" x2="80" y2="360" stroke="#00aa22" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Junction dots -->
  <circle cx="140" cy="140" r="5" fill="#00ff44"/>
  <circle cx="140" cy="200" r="5" fill="#00ff44"/>
  <circle cx="260" cy="200" r="5" fill="#00ff44"/>
  <circle cx="260" cy="140" r="5" fill="#00ff44"/>
  <circle cx="340" cy="200" r="5" fill="#00ff44"/>
  <circle cx="420" cy="200" r="5" fill="#00ff44"/>
  <circle cx="420" cy="300" r="5" fill="#00ff44"/>
  <circle cx="340" cy="300" r="5" fill="#00ff44"/>
  <!-- Key components -->
  <rect x="92" y="124" width="48" height="32" rx="6" fill="#003300" stroke="#00ff44" stroke-width="2"/>
  <text x="103" y="145" font-family="monospace" font-size="12" fill="#00ff44">Ctrl</text>
  <rect x="212" y="124" width="48" height="32" rx="6" fill="#003300" stroke="#00aa22" stroke-width="2"/>
  <text x="225" y="145" font-family="monospace" font-size="13" fill="#00aa22">Alt</text>
  <rect x="316" y="124" width="48" height="32" rx="6" fill="#003300" stroke="#44ff00" stroke-width="2"/>
  <text x="320" y="145" font-family="monospace" font-size="11" fill="#44ff00">Shift</text>
  <!-- Central chip -->
  <rect x="176" y="216" width="160" height="80" rx="8" fill="#001a00" stroke="#00ff44" stroke-width="3"/>
  <text x="204" y="253" font-family="monospace" font-size="14" fill="#00ff44">HOTKEY</text>
  <text x="212" y="274" font-family="monospace" font-size="14" fill="#00aa22">MAPPER</text>
  <!-- Chip pins -->
  <rect x="152" y="228" width="24" height="8" rx="2" fill="#00aa22"/>
  <rect x="152" y="248" width="24" height="8" rx="2" fill="#00aa22"/>
  <rect x="152" y="268" width="24" height="8" rx="2" fill="#00aa22"/>
  <rect x="336" y="228" width="24" height="8" rx="2" fill="#00aa22"/>
  <rect x="336" y="248" width="24" height="8" rx="2" fill="#00aa22"/>
  <rect x="336" y="268" width="24" height="8" rx="2" fill="#00aa22"/>
</svg>