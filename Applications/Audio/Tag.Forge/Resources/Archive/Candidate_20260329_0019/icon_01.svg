<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 태그 편집 UI — 파일 목록 + Title/Artist/Album 필드 | 공간/장면 | 파랑+주황+흰 -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="sh1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Main window -->
  <rect x="70" y="100" width="884" height="820" rx="20" fill="white" filter="url(#sh1)"/>
  <!-- Title bar -->
  <rect x="70" y="100" width="884" height="60" rx="20" fill="#1565C0"/>
  <rect x="70" y="136" width="884" height="24" fill="#1565C0"/>
  <text x="512" y="131" font-family="Arial Black, sans-serif" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">Tag.Forge — 오디오 태그 편집기</text>

  <!-- Left: File list -->
  <rect x="86" y="178" width="280" height="720" fill="#F5F5F5" rx="8"/>
  <text x="226" y="200" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle">파일 목록</text>
  <!-- MP3 files -->
  <rect x="94" y="212" width="264" height="52" rx="8" fill="#E3F2FD"/>
  <text x="114" y="234" font-family="Arial, sans-serif" font-size="18" fill="#1565C0">🎵</text>
  <text x="140" y="230" font-family="Arial, sans-serif" font-size="14" fill="#212121">track_01.mp3</text>
  <text x="140" y="252" font-family="Arial, sans-serif" font-size="12" fill="#90A4AE">No tags</text>

  <rect x="94" y="272" width="264" height="52" rx="8" fill="#1565C0"/>
  <text x="114" y="294" font-family="Arial, sans-serif" font-size="18" fill="white">🎵</text>
  <text x="140" y="290" font-family="Arial, sans-serif" font-size="14" fill="white">song_final.flac</text>
  <text x="140" y="312" font-family="Arial, sans-serif" font-size="12" fill="#90CAF9">선택됨</text>

  <rect x="94" y="332" width="264" height="52" rx="8"/>
  <text x="114" y="354" font-family="Arial, sans-serif" font-size="18" fill="#546E7A">🎵</text>
  <text x="140" y="350" font-family="Arial, sans-serif" font-size="14" fill="#212121">unknown.m4a</text>
  <text x="140" y="372" font-family="Arial, sans-serif" font-size="12" fill="#90A4AE">No tags</text>

  <rect x="94" y="392" width="264" height="52" rx="8"/>
  <text x="114" y="414" font-family="Arial, sans-serif" font-size="18" fill="#546E7A">🎵</text>
  <text x="140" y="410" font-family="Arial, sans-serif" font-size="14" fill="#212121">music_03.ogg</text>
  <text x="140" y="432" font-family="Arial, sans-serif" font-size="12" fill="#90A4AE">No tags</text>

  <!-- Right: Tag editor -->
  <text x="500" y="194" font-family="Arial Black, sans-serif" font-size="18" fill="#1565C0"
        text-anchor="middle">태그 편집</text>

  <!-- Album art -->
  <rect x="390" y="210" width="140" height="140" rx="12" fill="#7E57C2" filter="url(#sh1)"/>
  <text x="460" y="280" font-family="Arial, sans-serif" font-size="60" fill="white"
        text-anchor="middle" dominant-baseline="middle">🎵</text>
  <text x="460" y="368" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle">앨범 아트</text>

  <!-- Tag fields -->
  <text x="560" y="232" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">제목 (Title)</text>
  <rect x="560" y="240" width="366" height="40" rx="8" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="576" y="260" font-family="Arial, sans-serif" font-size="18" fill="#212121"
        dominant-baseline="middle">Midnight Blue</text>

  <text x="560" y="298" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">아티스트 (Artist)</text>
  <rect x="560" y="306" width="366" height="40" rx="8" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="576" y="326" font-family="Arial, sans-serif" font-size="18" fill="#212121"
        dominant-baseline="middle">Echo Valley</text>

  <text x="560" y="364" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">앨범 (Album)</text>
  <rect x="560" y="372" width="366" height="40" rx="8" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="576" y="392" font-family="Arial, sans-serif" font-size="18" fill="#212121"
        dominant-baseline="middle">Night Sessions Vol.2</text>

  <text x="390" y="436" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">장르 (Genre)</text>
  <rect x="390" y="444" width="240" height="40" rx="8" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="406" y="464" font-family="Arial, sans-serif" font-size="18" fill="#212121"
        dominant-baseline="middle">Jazz</text>

  <text x="650" y="436" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">연도 / 트랙</text>
  <rect x="650" y="444" width="120" height="40" rx="8" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="666" y="464" font-family="Arial, sans-serif" font-size="18" fill="#212121"
        dominant-baseline="middle">2024 / 05</text>

  <!-- MusicBrainz button -->
  <rect x="390" y="510" width="280" height="44" rx="14" fill="#FF6D00" filter="url(#sh1)"/>
  <text x="530" y="532" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">MusicBrainz 조회</text>

  <!-- Save button -->
  <rect x="700" y="510" width="226" height="44" rx="14" fill="#43A047" filter="url(#sh1)"/>
  <text x="813" y="532" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">태그 저장</text>

  <!-- Supported formats -->
  <rect x="390" y="576" width="536" height="50" rx="12" fill="#E3F2FD"/>
  <text x="658" y="601" font-family="Consolas, monospace" font-size="18" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">MP3 · FLAC · OGG · M4A · AAC · WMA · OPUS</text>
</svg>
