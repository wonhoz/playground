<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Magnet attracting prompt pieces (magnetic prompt assembly) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#1A0020"/>
  <!-- Horseshoe magnet -->
  <path d="M280 280 L280 560 Q280 720 512 720 Q744 720 744 560 L744 280" fill="none" stroke="#AB47BC" stroke-width="80" stroke-linecap="square"/>
  <!-- Magnet poles colored tips -->
  <!-- Left pole (red/N) -->
  <rect x="240" y="248" width="80" height="100" rx="8" fill="#E53935"/>
  <!-- Right pole (blue/S) -->
  <rect x="704" y="248" width="80" height="100" rx="8" fill="#1E88E5"/>
  <!-- N label hint (dot) -->
  <circle cx="280" cy="220" r="18" fill="#E53935"/>
  <!-- S label hint (dot) -->
  <circle cx="744" cy="220" r="18" fill="#1E88E5"/>
  <!-- Attracted prompt fragments (orbiting) -->
  <rect x="130" y="380" width="120" height="28" rx="14" fill="#CE93D8" opacity="0.9"/>
  <rect x="100" y="480" width="90" height="22" rx="11" fill="#CE93D8" opacity="0.7"/>
  <rect x="136" y="560" width="100" height="22" rx="11" fill="#CE93D8" opacity="0.7"/>
  <rect x="794" y="380" width="120" height="28" rx="14" fill="#90CAF9" opacity="0.9"/>
  <rect x="814" y="470" width="90" height="22" rx="11" fill="#90CAF9" opacity="0.7"/>
  <rect x="794" y="550" width="100" height="22" rx="11" fill="#90CAF9" opacity="0.7"/>
  <!-- Pull force lines -->
  <line x1="248" y1="395" x2="310" y2="410" stroke="#CE93D8" stroke-width="8" stroke-dasharray="10 6" opacity="0.5"/>
  <line x1="784" y1="395" x2="730" y2="410" stroke="#90CAF9" stroke-width="8" stroke-dasharray="10 6" opacity="0.5"/>
</svg>
