  <path d="M256 180 Q180 180 180 260 Q180 340 256 340" fill="none" stroke="#2196f3" stroke-width="5"/>
  <!-- Branch 2 (right) -->
  <path d="M256 140 Q340 140 340 220 Q340 310 256 310" fill="none" stroke="#ff9800" stroke-width="5"/>
  <!-- Commit dots on main -->
  <circle cx="256" cy="120" r="10" fill="#4caf50" stroke="#81c784" stroke-width="3"/>
  <circle cx="256" cy="200" r="10" fill="#4caf50" stroke="#81c784" stroke-width="3"/>
  <circle cx="256" cy="340" r="10" fill="#4caf50" stroke="#81c784" stroke-width="3"/>
  <circle cx="256" cy="420" r="10" fill="#4caf50" stroke="#81c784" stroke-width="3"/>
  <!-- Commit dots on branches -->
  <circle cx="180" cy="260" r="10" fill="#2196f3" stroke="#64b5f6" stroke-width="3"/>
  <circle cx="180" cy="300" r="10" fill="#2196f3" stroke="#64b5f6" stroke-width="3"/>
  <circle cx="340" cy="220" r="10" fill="#ff9800" stroke="#ffb74d" stroke-width="3"/>
  <!-- Log labels -->
  <rect x="88" y="253" width="72" height="14" rx="5" fill="#1565c0" opacity="0.7"/>
  <rect x="356" y="213" width="72" height="14" rx="5" fill="#e65100" opacity="0.7"/>
