<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#F9A825"/>

  <!-- Flag shadow -->
  <rect x="222" y="272" width="580" height="360" rx="18" fill="#E65100" opacity="0.35"/>

  <!-- Flag rectangle -->
  <rect x="210" y="260" width="580" height="360" rx="14" fill="#FFFFFF" stroke="#5D4037" stroke-width="16"/>

  <!-- Flag stripes (France-inspired 3 vertical) -->
  <rect x="210" y="260" width="193" height="360" rx="0" fill="#1565C0"/>
  <rect x="403" y="260" width="194" height="360" fill="#FFFFFF"/>
  <rect x="597" y="260" width="193" height="360" rx="0" fill="#C62828"/>
  <!-- Clip to flag bounds -->
  <rect x="210" y="260" width="580" height="360" rx="14" fill="none" stroke="#5D4037" stroke-width="16"/>

  <!-- Question mark overlay centered on flag -->
  <text x="512" y="505" font-size="240" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFD600" stroke="#E65100" stroke-width="14" opacity="0.95">?</text>

  <!-- Bottom text -->
  <text x="512" y="780" font-size="100" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#4E342E">나라 맞추기</text>

  <!-- Small flag icons hint -->
  <rect x="220" y="840" width="80" height="52" rx="6" fill="#1565C0"/>
  <rect x="320" y="840" width="80" height="52" rx="6" fill="#C62828"/>
  <rect x="420" y="840" width="80" height="52" rx="6" fill="#2E7D32"/>
  <rect x="520" y="840" width="80" height="52" rx="6" fill="#FFD600"/>
  <rect x="620" y="840" width="80" height="52" rx="6" fill="#6A1B9A"/>
  <rect x="720" y="840" width="80" height="52" rx="6" fill="#0D47A1"/>
</svg>
