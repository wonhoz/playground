<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13111C"/>
      <stop offset="100%" stop-color="#1E1B2E"/>
    </linearGradient>
    <radialGradient id="c1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
    <radialGradient id="c2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>
    <radialGradient id="c3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </radialGradient>
    <radialGradient id="c4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#78350F"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Layered semi-transparent circles representing sound layers -->
  <circle cx="256" cy="256" r="180" fill="url(#c1)" opacity="0.25"/>
  <circle cx="256" cy="256" r="140" fill="url(#c2)" opacity="0.3"/>
  <circle cx="256" cy="256" r="100" fill="url(#c3)" opacity="0.35"/>
  <circle cx="256" cy="256" r="60" fill="url(#c4)" opacity="0.5"/>
  <!-- Center speaker icon -->
  <circle cx="256" cy="256" r="25" fill="#FBBF24"/>
  <polygon points="248,246 248,266 260,276 260,236" fill="#1E1B2E"/>
  <path d="M265,243 Q280,256 265,269" fill="none" stroke="#1E1B2E" stroke-width="3" stroke-linecap="round"/>
  <!-- Layer labels -->
  <text x="256" y="92" font-family="sans-serif" font-size="12" fill="#7C3AED" text-anchor="middle" opacity="0.8">RAIN</text>
  <text x="256" y="126" font-family="sans-serif" font-size="12" fill="#2563EB" text-anchor="middle" opacity="0.8">WIND</text>
  <text x="256" y="162" font-family="sans-serif" font-size="12" fill="#059669" text-anchor="middle" opacity="0.8">FOREST</text>
  <text x="256" y="196" font-family="sans-serif" font-size="12" fill="#D97706" text-anchor="middle" opacity="0.8">FIRE</text>
  <!-- Concentric rings -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#059669" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
</svg>