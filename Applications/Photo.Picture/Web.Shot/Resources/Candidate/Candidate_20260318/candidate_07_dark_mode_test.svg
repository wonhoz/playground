<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 다크/라이트 모드 전환 테스트 -->
  <!-- 라이트 모드 화면 (좌) -->
  <rect x="60" y="100" width="185" height="240" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" opacity="0.9"/>
  <text x="152" y="122" text-anchor="middle" font-size="10" fill="#334155" opacity="0.9" font-weight="bold">Light Mode</text>
  <!-- 라이트 모드 내용 -->
  <rect x="70" y="130" width="165" height="16" rx="4" fill="#e2e8f0" opacity="0.8"/>
  <rect x="80" y="134" width="80" height="8" rx="2" fill="#94a3b8" opacity="0.7"/>
  <rect x="70" y="154" width="165" height="60" rx="4" fill="#f1f5f9" opacity="0.8"/>
  <rect x="78" y="162" width="140" height="10" rx="3" fill="#475569" opacity="0.6"/>
  <rect x="78" y="178" width="120" height="8" rx="2" fill="#94a3b8" opacity="0.5"/>
  <rect x="78" y="190" width="130" height="8" rx="2" fill="#94a3b8" opacity="0.5"/>
  <rect x="70" y="222" width="75" height="50" rx="4" fill="#e2e8f0" opacity="0.8"/>
  <rect x="155" y="222" width="80" height="50" rx="4" fill="#e2e8f0" opacity="0.8"/>
  <rect x="70" y="280" width="165" height="28" rx="4" fill="#0ea5e9" opacity="0.7"/>
  <text x="152" y="298" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.9">CTA Button</text>
  <!-- 달 아이콘 -->
  <circle cx="152" cy="346" r="20" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.6"/>
  <text x="152" y="352" text-anchor="middle" font-size="16" fill="#94a3b8" opacity="0.6">☀</text>
  <!-- 다크 모드 화면 (우) -->
  <rect x="267" y="100" width="185" height="240" rx="8" fill="#0f172a" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.95"/>
  <text x="360" y="122" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.9" font-weight="bold">Dark Mode</text>
  <!-- 다크 모드 내용 -->
  <rect x="277" y="130" width="165" height="16" rx="4" fill="#1e293b" opacity="0.9"/>
  <rect x="287" y="134" width="80" height="8" rx="2" fill="#38BDF8" opacity="0.5"/>
  <rect x="277" y="154" width="165" height="60" rx="4" fill="#1e293b" opacity="0.8"/>
  <rect x="285" y="162" width="140" height="10" rx="3" fill="#cbd5e1" opacity="0.5"/>
  <rect x="285" y="178" width="120" height="8" rx="2" fill="#38BDF8" opacity="0.3"/>
  <rect x="285" y="190" width="130" height="8" rx="2" fill="#38BDF8" opacity="0.3"/>
  <rect x="277" y="222" width="75" height="50" rx="4" fill="#1e293b" stroke="#38BDF8" stroke-width="0.8" opacity="0.9"/>
  <rect x="362" y="222" width="80" height="50" rx="4" fill="#1e293b" stroke="#38BDF8" stroke-width="0.8" opacity="0.9"/>
  <rect x="277" y="280" width="165" height="28" rx="4" fill="#38BDF8" opacity="0.5" filter="url(#glow)"/>
  <text x="360" y="298" text-anchor="middle" font-size="9" fill="#030508" opacity="0.9" font-weight="bold">CTA Button</text>
  <!-- 달 아이콘 -->
  <circle cx="360" cy="346" r="20" fill="none" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <text x="360" y="352" text-anchor="middle" font-size="16" fill="#38BDF8" filter="url(#glow)" opacity="0.9">☽</text>
  <!-- 전환 화살표 -->
  <path d="M248,218 Q256,210 264,218" fill="none" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="261,212 267,218 261,224" fill="#38BDF8" opacity="0.9" filter="url(#glow)"/>
  <!-- 토글 스위치 -->
  <rect x="204" y="230" width="44" height="22" rx="11" fill="#0a1520" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <circle cx="237" cy="241" r="9" fill="#38BDF8" filter="url(#glow)" opacity="0.95"/>
  <!-- 하단 -->
  <rect x="80" y="400" width="352" height="68" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="426" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">DARK MODE TEST</text>
  <text x="256" y="450" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">라이트/다크 모드 비교</text>
</svg>
