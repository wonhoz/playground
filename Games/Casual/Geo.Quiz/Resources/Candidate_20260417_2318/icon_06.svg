<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 세계지도 윤곽 (간략화) -->
  <!-- 지도 카드 (뒤) -->
  <rect x="150" y="220" width="720" height="480" rx="24" fill="#E0F2F1" opacity="0.7"/>
  <!-- 대륙 실루엣들 (단순화) -->
  <!-- 북미 -->
  <ellipse cx="280" cy="360" rx="80" ry="90" fill="#80CBC4" opacity="0.7"/>
  <!-- 남미 -->
  <ellipse cx="320" cy="520" rx="55" ry="75" fill="#80CBC4" opacity="0.7"/>
  <!-- 유럽 -->
  <ellipse cx="490" cy="330" rx="55" ry="60" fill="#80CBC4" opacity="0.7"/>
  <!-- 아프리카 -->
  <ellipse cx="500" cy="490" rx="65" ry="90" fill="#80CBC4" opacity="0.7"/>
  <!-- 아시아 -->
  <ellipse cx="680" cy="360" rx="100" ry="80" fill="#80CBC4" opacity="0.7"/>
  <!-- 오세아니아 -->
  <ellipse cx="720" cy="520" rx="55" ry="40" fill="#80CBC4" opacity="0.7"/>
  <!-- Layer 3: 정답 체크 스티커들 -->
  <circle cx="280" cy="360" r="44" fill="#4CAF50"/>
  <text x="280" y="376" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">✓</text>
  <circle cx="490" cy="330" r="36" fill="#4CAF50"/>
  <text x="490" y="346" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">✓</text>
  <circle cx="680" cy="360" r="44" fill="#4CAF50"/>
  <text x="680" y="376" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">✓</text>
  <!-- 점수 배지 -->
  <rect x="340" y="760" width="344" height="86" rx="18" fill="#FDD835" opacity="0.97"/>
  <text x="512" y="816" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#004D40" text-anchor="middle">10/10 ★</text>
</svg>
