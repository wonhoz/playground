    <rect x="564" y="248" width="260" height="16" fill="#2D3F55"/>
    <rect x="580" y="232" width="120" height="14" rx="7" fill="#8090A8" opacity="0.8"/>

    <!-- Diff lines — LEFT (removed = red) and RIGHT (added = green) -->
