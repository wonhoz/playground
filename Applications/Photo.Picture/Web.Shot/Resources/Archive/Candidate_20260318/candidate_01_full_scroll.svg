<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <linearGradient id="pageg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 풀페이지 스크롤 캡처 -->
  <!-- 브라우저 창 (좁고 길게) -->
  <rect x="140" y="60" width="232" height="340" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <!-- 브라우저 크롬 -->
  <rect x="140" y="60" width="232" height="28" rx="8" fill="#0a1520" opacity="0.95"/>
  <rect x="140" y="80" width="232" height="8" rx="0" fill="#0a1520" opacity="0.95"/>
  <!-- 탭 버튼 -->
  <circle cx="158" cy="73" r="4" fill="#EF4444" opacity="0.8"/>
  <circle cx="172" cy="73" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="186" cy="73" r="4" fill="#4ADE80" opacity="0.8"/>
  <!-- URL 바 -->
  <rect x="200" y="67" width="140" height="14" rx="7" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.8"/>
  <text x="270" y="78" text-anchor="middle" font-size="7" fill="#38BDF8" opacity="0.7">example.com/page</text>
  <!-- 페이지 내용 (스크롤 가능) -->
  <!-- 헤더 영역 -->
  <rect x="148" y="92" width="216" height="40" rx="0" fill="#0d1a28" opacity="0.8"/>
  <rect x="156" y="100" width="80" height="10" rx="3" fill="#38BDF8" opacity="0.5"/>
  <rect x="258" y="100" width="40" height="10" rx="3" fill="#38BDF8" opacity="0.3"/>
  <rect x="305" y="100" width="40" height="10" rx="3" fill="#38BDF8" opacity="0.3"/>
  <rect x="156" y="114" width="200" height="2" rx="1" fill="#38BDF8" opacity="0.15"/>
  <!-- 히어로 이미지 -->
  <rect x="148" y="132" width="216" height="70" rx="0" fill="#0a1820" opacity="0.7"/>
  <path d="M148,175 Q200,150 256,165 Q300,178 364,160" fill="#1a3a50" opacity="0.6"/>
  <path d="M148,195 Q200,170 256,185 Q310,198 364,178" fill="#1a4a60" opacity="0.5"/>
  <!-- 텍스트 섹션 -->
  <rect x="156" y="210" width="140" height="8" rx="3" fill="#38BDF8" opacity="0.4"/>
  <rect x="156" y="224" width="196" height="6" rx="3" fill="#38BDF8" opacity="0.2"/>
  <rect x="156" y="234" width="180" height="6" rx="3" fill="#38BDF8" opacity="0.2"/>
  <rect x="156" y="244" width="190" height="6" rx="3" fill="#38BDF8" opacity="0.2"/>
  <!-- 카드 섹션 -->
  <rect x="148" y="258" width="66" height="50" rx="4" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <rect x="222" y="258" width="66" height="50" rx="4" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <rect x="298" y="258" width="66" height="50" rx="4" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <!-- 더 긴 콘텐츠 (절반 표시) -->
  <rect x="156" y="316" width="140" height="8" rx="3" fill="#38BDF8" opacity="0.3"/>
  <rect x="156" y="330" width="196" height="6" rx="3" fill="#38BDF8" opacity="0.15"/>
  <rect x="156" y="340" width="180" height="6" rx="3" fill="#38BDF8" opacity="0.15"/>
  <!-- 스크롤바 -->
  <rect x="364" y="88" width="6" height="252" rx="3" fill="#0d1a28" opacity="0.5"/>
  <rect x="364" y="88" width="6" height="80" rx="3" fill="#38BDF8" opacity="0.6" filter="url(#glow)"/>
  <!-- 스크롤 화살표 -->
  <path d="M256,406 L256,430" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <polygon points="250,426 262,426 256,434" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
  <!-- 하단 라벨 -->
  <rect x="130" y="442" width="252" height="48" rx="10" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="471" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">FULL-PAGE SCROLL CAPTURE</text>
</svg>
