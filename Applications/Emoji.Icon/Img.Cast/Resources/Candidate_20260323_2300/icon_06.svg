<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="belt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 컨베이어 벨트 -->
    <rect x="80" y="470" width="864" height="80" rx="40" fill="url(#belt)" opacity="0.8"/>
    <!-- 벨트 이음새 패턴 -->
    <line x1="180" y1="470" x2="180" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <line x1="300" y1="470" x2="300" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <line x1="420" y1="470" x2="420" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <line x1="540" y1="470" x2="540" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <line x1="660" y1="470" x2="660" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <line x1="780" y1="470" x2="780" y2="550" stroke="#065F46" stroke-width="6" opacity="0.5"/>
    <!-- 롤러들 -->
    <circle cx="120" cy="510" r="45" fill="#34D399"/>
    <circle cx="120" cy="510" r="25" fill="#065F46"/>
    <circle cx="904" cy="510" r="45" fill="#34D399"/>
    <circle cx="904" cy="510" r="25" fill="#065F46"/>
    <!-- 입력 이미지 박스 (좌측) -->
    <rect x="160" y="310" width="180" height="155" rx="14" fill="#FFFFFF" opacity="0.9"/>
    <!-- 이미지 내용 (산/하늘) -->
    <rect x="160" y="310" width="180" height="155" rx="14" fill="#7C3AED" opacity="0.6"/>
    <polygon points="160,430 240,350 290,400 320,365 340,430" fill="#4ADE80" opacity="0.8"/>
    <circle cx="210" cy="355" r="30" fill="#FDE68A" opacity="0.8"/>
    <text x="250" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">PNG</text>
    <!-- 출력 ICO 박스 (우측) -->
    <rect x="684" y="310" width="180" height="155" rx="14" fill="#FFFFFF" opacity="0.9"/>
    <rect x="684" y="315" width="180" height="90" rx="10" fill="#0EA5E9" opacity="0.6"/>
    <rect x="694" y="335" width="60" height="60" rx="6" fill="#FFFFFF" opacity="0.7"/>
    <rect x="764" y="335" width="30" height="30" rx="4" fill="#FFFFFF" opacity="0.7"/>
    <rect x="764" y="374" width="30" height="18" rx="3" fill="#FFFFFF" opacity="0.7"/>
    <text x="774" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">ICO</text>
    <!-- 화살표 방향 -->
    <path d="M 360 390 L 660 390" stroke="#FDE68A" stroke-width="20" stroke-linecap="round" stroke-dasharray="30 15"/>
    <polygon points="655,368 700,390 655,412" fill="#FDE68A"/>
  </g>
</svg>
