<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#0D0400"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Video track bars (timeline) -->
  <!-- Track 1 -->
  <rect x="80" y="140" width="352" height="50" rx="6" fill="#2A1000"/>
  <rect x="80" y="140" width="220" height="50" rx="6" fill="url(#track)" opacity="0.8"/>
  <rect x="310" y="140" width="122" height="50" rx="6" fill="url(#track)" opacity="0.6"/>
  <!-- Track 2 -->
  <rect x="80" y="204" width="352" height="50" rx="6" fill="#2A1000"/>
  <rect x="130" y="204" width="180" height="50" rx="6" fill="url(#orange)" opacity="0.7"/>
  <rect x="324" y="204" width="108" height="50" rx="6" fill="url(#orange)" opacity="0.5"/>
  <!-- Track 3 (audio) -->
  <rect x="80" y="268" width="352" height="30" rx="6" fill="#2A1000"/>
  <g stroke="url(#orange)" stroke-width="2" fill="none" opacity="0.6">
    <polyline points="80,283 110,268 130,298 160,268 190,298 220,268 240,298 280,268 310,298 340,268 370,298 400,268 432,283"/>
  </g>
  <!-- Playhead -->
  <line x1="260" y1="110" x2="260" y2="320" stroke="#FF1744" stroke-width="3"/>
  <polygon points="260,106 250,120 270,120" fill="#FF1744"/>
  <!-- Timeline ruler -->
  <rect x="80" y="110" width="352" height="26" rx="4" fill="#2A1000"/>
  <g stroke="url(#orange)" stroke-width="1.5" opacity="0.5">
    <line x1="130" y1="114" x2="130" y2="136"/>
    <line x1="180" y1="114" x2="180" y2="136"/>
    <line x1="230" y1="114" x2="230" y2="136"/>
    <line x1="280" y1="114" x2="280" y2="136"/>
    <line x1="330" y1="114" x2="330" y2="136"/>
    <line x1="380" y1="114" x2="380" y2="136"/>
    <line x1="430" y1="114" x2="430" y2="136"/>
  </g>
  <!-- Waveform in track 3 -->
  <!-- REC -->
  <circle cx="256" cy="380" r="44" fill="#1A0800" stroke="#FF6D00" stroke-width="5"/>
  <circle cx="256" cy="380" r="30" fill="#FF1744"/>
  <rect x="222" y="372" width="68" height="16" rx="5" fill="white" opacity="0"/>
</svg>
