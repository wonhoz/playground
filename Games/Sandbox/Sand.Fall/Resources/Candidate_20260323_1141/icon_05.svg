<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라이트 배경 -->
  <rect width="1024" height="1024" rx="180" fill="#FFF8E1"/>
  <!-- Layer 2: 원소 선택 팔레트 (브러시 도구) -->
  <!-- 상단 도구 모음 -->
  <rect x="120" y="160" width="784" height="120" rx="16" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
  <!-- 원소 버튼들 -->
  <!-- 모래 버튼 (선택됨) -->
  <rect x="148" y="184" width="120" height="72" rx="12" fill="#FFA000"/>
  <text x="208" y="227" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Sand</text>
  <!-- 물 버튼 -->
  <rect x="284" y="184" width="120" height="72" rx="12" fill="#1976D2"/>
  <text x="344" y="227" font-family="Arial" font-size="28" fill="white" text-anchor="middle">Water</text>
  <!-- 불 버튼 -->
  <rect x="420" y="184" width="120" height="72" rx="12" fill="#E64A19"/>
  <text x="480" y="227" font-family="Arial" font-size="28" fill="white" text-anchor="middle">Fire</text>
  <!-- 돌 버튼 -->
  <rect x="556" y="184" width="120" height="72" rx="12" fill="#546E7A"/>
  <text x="616" y="227" font-family="Arial" font-size="28" fill="white" text-anchor="middle">Stone</text>
  <!-- 지우개 -->
  <rect x="692" y="184" width="120" height="72" rx="12" fill="#9E9E9E"/>
  <text x="752" y="227" font-family="Arial" font-size="28" fill="white" text-anchor="middle">Erase</text>
  <!-- 시뮬레이션 화면 (캔버스) -->
  <rect x="120" y="304" width="784" height="520" rx="12" fill="#F9F9F9" stroke="#E0E0E0" stroke-width="3"/>
  <!-- 화면 안 입자들 -->
  <!-- 위쪽 모래 쏟기 -->
  <rect x="360" y="320" width="16" height="16" rx="2" fill="#FFCC02"/>
  <rect x="380" y="330" width="14" height="14" rx="2" fill="#FFA000"/>
  <rect x="398" y="322" width="16" height="16" rx="2" fill="#FF8F00"/>
  <rect x="418" y="332" width="14" height="14" rx="2" fill="#FFCC02"/>
  <!-- 쌓인 모래 더미 -->
  <rect x="200" y="680" width="620" height="20" rx="3" fill="#A1887F"/>
  <rect x="220" y="660" width="580" height="20" rx="3" fill="#8D6E63"/>
  <rect x="240" y="640" width="540" height="20" rx="3" fill="#BCAAA4"/>
  <rect x="280" y="620" width="460" height="20" rx="3" fill="#A1887F"/>
  <rect x="320" y="600" width="380" height="20" rx="3" fill="#8D6E63"/>
  <rect x="360" y="580" width="300" height="20" rx="3" fill="#BCAAA4"/>
  <rect x="390" y="560" width="240" height="20" rx="3" fill="#A1887F"/>
  <rect x="420" y="540" width="180" height="20" rx="3" fill="#8D6E63"/>
  <!-- 물 웅덩이 (좌측) -->
  <rect x="140" y="700" width="220" height="100" rx="6" fill="#90CAF9" opacity="0.7"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="910" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FF8F00" text-anchor="middle">SAND.FALL</text>
</svg>
