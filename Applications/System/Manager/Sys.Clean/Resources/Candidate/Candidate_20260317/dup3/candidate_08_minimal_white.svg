<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#2A2A3E"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer ring progress -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#333" stroke-width="18"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring)" stroke-width="18"
    stroke-dasharray="780" stroke-dashoffset="195" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="115" fill="none" stroke="#2A2A3E" stroke-width="12"/>
  <!-- Broom icon in center -->
  <g transform="translate(256,256)">
    <!-- Handle -->
    <rect x="-5" y="-80" width="10" height="100" rx="5" fill="#BDBDBD" transform="rotate(-15)"/>
    <!-- Head -->
    <ellipse cx="20" cy="40" rx="50" ry="18" fill="#9E9E9E"/>
    <!-- Bristles -->
    <g stroke="#E0E0E0" stroke-width="3" stroke-linecap="round">
      <line x1="-22" y1="52" x2="-26" y2="68"/>
      <line x1="-8" y1="56" x2="-10" y2="72"/>
      <line x1="6" y1="58" x2="6" y2="74"/>
      <line x1="20" y1="58" x2="22" y2="73"/>
      <line x1="34" y1="56" x2="38" y2="71"/>
      <line x1="48" y1="52" x2="55" y2="66"/>
      <line x1="60" y1="46" x2="70" y2="59"/>
    </g>
  </g>
  <!-- Percentage -->
  <text x="256" y="248" text-anchor="middle" font-family="Arial" font-size="44" fill="#E0E0E0" font-weight="bold">75%</text>
  <text x="256" y="278" text-anchor="middle" font-family="Arial" font-size="14" fill="#9E9E9E">Cleaned</text>
</svg>
