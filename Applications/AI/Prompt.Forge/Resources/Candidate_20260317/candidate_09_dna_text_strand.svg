  <g filter="url(#glow09)">
    <line x1="178" y1="365" x2="334" y2="365" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="361" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">E</text>
  </g>

