<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020008"/>
      <stop offset="100%" stop-color="#040012"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input number beam -->
  <line x1="60" y1="256" x2="190" y2="256" stroke="white" stroke-width="8" opacity="0.7"/>
  <text x="100" y="246" text-anchor="middle" font-family="monospace" font-size="16" fill="white" opacity="0.7" font-weight="bold">42</text>
  <!-- Prism -->
  <polygon points="190,140 190,372 320,256" fill="#090015" stroke="#7C3AED" stroke-width="2.5"/>
  <!-- Dispersed rays = different representations of 42 -->
  <!-- Hex (red) -->
  <line x1="320" y1="256" x2="452" y2="140" stroke="#EF4444" stroke-width="6" opacity="0.7"/>
  <text x="360" y="202" font-family="monospace" font-size="11" fill="#EF4444">0x2A</text>
  <!-- Octal (orange) -->
  <line x1="320" y1="256" x2="452" y2="180" stroke="#F97316" stroke-width="6" opacity="0.7"/>
  <text x="360" y="225" font-family="monospace" font-size="11" fill="#F97316">0o52</text>
  <!-- Binary (yellow) -->
  <line x1="320" y1="256" x2="452" y2="220" stroke="#EAB308" stroke-width="6" opacity="0.7"/>
  <text x="356" y="248" font-family="monospace" font-size="11" fill="#EAB308">101010</text>
  <!-- Decimal (green) -->
  <line x1="320" y1="256" x2="452" y2="256" stroke="#22C55E" stroke-width="6" opacity="0.7"/>
  <text x="360" y="262" font-family="monospace" font-size="11" fill="#22C55E">42</text>
  <!-- Float (blue) -->
  <line x1="320" y1="256" x2="452" y2="292" stroke="#3B82F6" stroke-width="6" opacity="0.7"/>
  <text x="355" y="290" font-family="monospace" font-size="11" fill="#3B82F6">42.000</text>
  <!-- Scientific (indigo) -->
  <line x1="320" y1="256" x2="452" y2="328" stroke="#6366F1" stroke-width="6" opacity="0.7"/>
  <text x="352" y="322" font-family="monospace" font-size="11" fill="#6366F1">4.2×10¹</text>
  <!-- Roman (violet) -->
  <line x1="320" y1="256" x2="452" y2="372" stroke="#8B5CF6" stroke-width="6" opacity="0.7"/>
  <text x="362" y="368" font-family="monospace" font-size="11" fill="#8B5CF6">XLII</text>
  <!-- Title -->
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-size="11" fill="#7C3AED" opacity="0.7">PRISM NUMBERS</text>
</svg>
