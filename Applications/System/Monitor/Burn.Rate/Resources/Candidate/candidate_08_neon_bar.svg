<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060A0F"/>
      <stop offset="100%" stop-color="#0C141F"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="40%" stop-color="#FFFF00"/>
      <stop offset="75%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Battery icon top -->
  <rect x="148" y="90" width="200" height="100" rx="12" fill="#0C141F" stroke="#223344" stroke-width="2.5"/>
  <rect x="348" y="112" width="22" height="56" rx="6" fill="#223344"/>
  <!-- Battery charge level visual 65% -->
  <rect x="156" y="98" width="126" height="84" rx="8" fill="url(#bar)"/>
  <text x="246" y="147" font-family="Arial" font-size="30" font-weight="bold" fill="white" text-anchor="middle">65%</text>
  <!-- Burn rate bar chart below -->
  <!-- Hours -->
  <text x="256" y="228" font-family="Arial" font-size="16" fill="#888" text-anchor="middle">Hourly Drain Rate (%/h)</text>
  <!-- Bar chart -->
  <rect x="90" y="340" width="40" height="55" rx="4" fill="#00FF88"/>
  <rect x="142" y="325" width="40" height="70" rx="4" fill="#44FF88"/>
  <rect x="194" y="310" width="40" height="85" rx="4" fill="#AAFF44"/>
  <rect x="246" y="295" width="40" height="100" rx="4" fill="#FFFF00"/>
  <rect x="298" y="278" width="40" height="117" rx="4" fill="#FF8800"/>
  <rect x="350" y="260" width="40" height="135" rx="4" fill="#FF4400"/>
  <!-- Axis -->
  <line x1="80" y1="395" x2="405" y2="395" stroke="#333" stroke-width="2"/>
  <text x="110" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">1h</text>
  <text x="162" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">2h</text>
  <text x="214" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">3h</text>
  <text x="266" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">4h</text>
  <text x="318" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">5h</text>
  <text x="370" y="412" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">6h</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF8800" text-anchor="middle">Burn.Rate</text>
</svg>
