<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="brush" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ICO 파일 스택 -->
  <rect x="280" y="200" width="160" height="200" rx="12" fill="#0D47A1" stroke="#42A5F5" stroke-width="3"/>
  <rect x="265" y="185" width="160" height="200" rx="12" fill="#0D47A1" stroke="#64B5F6" stroke-width="3"/>
  <rect x="250" y="170" width="160" height="200" rx="12" fill="#1565C0" stroke="#90CAF9" stroke-width="3"/>
  <!-- ICO 내부 -->
  <text x="330" y="280" font-size="60" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI Emoji">🎨</text>
  <text x="330" y="340" font-size="20" text-anchor="middle" fill="#90CAF9" font-family="Segoe UI">.ICO</text>
  <!-- 붓 -->
  <rect x="80" y="60" width="30" height="200" rx="8" fill="url(#brush)" transform="rotate(45 80 60)"/>
  <ellipse cx="105" cy="320" rx="18" ry="30" fill="#1976D2" transform="rotate(45 105 320)"/>
  <!-- 픽셀 크기 뱃지들 -->
  <rect x="60" y="380" width="70" height="26" rx="6" fill="#1976D2" stroke="#42A5F5" stroke-width="1"/>
  <text x="95" y="398" font-size="14" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI">256px</text>
  <rect x="145" y="380" width="60" height="26" rx="6" fill="#1976D2" stroke="#42A5F5" stroke-width="1"/>
  <text x="175" y="398" font-size="14" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI">48px</text>
  <rect x="220" y="380" width="60" height="26" rx="6" fill="#1976D2" stroke="#42A5F5" stroke-width="1"/>
  <text x="250" y="398" font-size="14" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI">32px</text>
  <rect x="295" y="380" width="60" height="26" rx="6" fill="#1976D2" stroke="#42A5F5" stroke-width="1"/>
  <text x="325" y="398" font-size="14" text-anchor="middle" fill="#E3F2FD" font-family="Segoe UI">16px</text>
</svg>