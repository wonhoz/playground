<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | L-시스템 문자열 F++[-F] | 기하학/추상 | #001515 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#001515"/>
  <!-- Layer 2: L-string display -->
  <!-- Axiom -->
  <rect x="160" y="200" width="704" height="70" rx="12" fill="#012A2A"/>
  <text x="200" y="228" font-family="Consolas,monospace" font-size="16" fill="#4ADE80">공리 (Axiom):</text>
  <text x="200" y="254" font-family="Consolas,monospace" font-size="22" fill="#22C55E" font-weight="bold">F</text>
  <!-- Rule 1 -->
  <rect x="160" y="294" width="704" height="80" rx="12" fill="#01201A"/>
  <text x="200" y="320" font-family="Consolas,monospace" font-size="16" fill="#4ADE80">규칙 (Rule):</text>
  <text x="200" y="354" font-family="Consolas,monospace" font-size="22" fill="#22C55E" font-weight="bold">F → FF+[+F-F-F]-[-F+F+F]</text>
  <!-- Generation expansion arrows -->
  <text x="200" y="420" font-family="Consolas,monospace" font-size="16" fill="#6B7280">n=1:</text>
  <text x="256" y="420" font-family="Consolas,monospace" font-size="18" fill="#16A34A">FF+[+F-F-F]-[-F+F+F]</text>
  <text x="200" y="454" font-family="Consolas,monospace" font-size="16" fill="#6B7280">n=2:</text>
  <text x="256" y="454" font-family="Consolas,monospace" font-size="16" fill="#15803D">FFFF+[+FF-FF...] → 8x...</text>
  <text x="200" y="484" font-family="Consolas,monospace" font-size="16" fill="#6B7280">n=3:</text>
  <text x="256" y="484" font-family="Consolas,monospace" font-size="16" fill="#14532D" opacity="0.8">→ 지수적 증가...</text>
  <!-- Symbol legend -->
  <rect x="160" y="520" width="320" height="260" rx="12" fill="#012A2A"/>
  <text x="200" y="556" font-family="Consolas,monospace" font-size="17" fill="#22C55E">F → 가지 그리기</text>
  <text x="200" y="590" font-family="Consolas,monospace" font-size="17" fill="#4ADE80">+ → 오른쪽 회전</text>
  <text x="200" y="624" font-family="Consolas,monospace" font-size="17" fill="#4ADE80">- → 왼쪽 회전</text>
  <text x="200" y="658" font-family="Consolas,monospace" font-size="17" fill="#86EFAC">[ → 위치 저장</text>
  <text x="200" y="692" font-family="Consolas,monospace" font-size="17" fill="#86EFAC">] → 위치 복원</text>
  <!-- Mini tree preview (right) -->
  <rect x="520" y="520" width="344" height="260" rx="12" fill="#012A2A"/>
  <!-- Small tree drawing -->
  <line x1="692" y1="760" x2="692" y2="660" stroke="#5C2A0A" stroke-width="8" stroke-linecap="round"/>
  <line x1="692" y1="700" x2="640" y2="640" stroke="#7A3B14" stroke-width="6" stroke-linecap="round"/>
  <line x1="692" y1="700" x2="744" y2="638" stroke="#7A3B14" stroke-width="6" stroke-linecap="round"/>
  <circle cx="636" cy="634" r="18" fill="#22C55E"/>
  <circle cx="748" cy="632" r="18" fill="#4ADE80"/>
  <circle cx="692" cy="650" r="22" fill="#16A34A"/>
  <circle cx="666" cy="622" r="12" fill="#F9A8D4" opacity="0.8"/>
</svg>
