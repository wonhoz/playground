<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8FFF4"/>
      <stop offset="100%" stop-color="#C8F5E0"/>
    </linearGradient>
    <linearGradient id="key_face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EEF8"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00883344" flood-opacity="0.5"/>
    </filter>
    <filter id="check_glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Key body (Enter key shape) -->
  <rect x="202" y="310" width="620" height="320" rx="28" fill="url(#key_face)" stroke="#C4D4E8" stroke-width="3" filter="url(#shadow3)"/>
  <!-- Key inner bevel -->
  <rect x="218" y="326" width="588" height="288" rx="20" fill="#F4F8FF" stroke="#DCE8F4" stroke-width="1.5"/>

  <!-- Enter symbol (⏎ arrow path) -->
  <!-- Horizontal bar -->
  <rect x="320" y="448" width="220" height="52" rx="10" fill="#3A4A68"/>
  <!-- Down arrow shaft -->
  <rect x="320" y="448" width="52" height="136" rx="10" fill="#3A4A68"/>
  <!-- Arrow head (down-left) -->
  <polygon points="268,548 372,484 372,612" fill="#3A4A68"/>

  <!-- Label text -->
  <text x="512" y="696" text-anchor="middle" font-family="Consolas,monospace" font-size="38" fill="#667799" letter-spacing="2">ENTER</text>

  <!-- Check mark circle -->
  <circle cx="720" cy="340" r="100" fill="#00C864" filter="url(#check_glow)"/>
  <circle cx="720" cy="340" r="100" fill="#00D86E"/>
  <!-- Check mark path -->
  <polyline points="664,340 704,380 780,292" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "TESTED" badge -->
  <rect x="350" y="750" width="324" height="60" rx="30" fill="#00C864"/>
  <text x="512" y="792" text-anchor="middle" font-family="Consolas,monospace" font-size="32" font-weight="bold" fill="white" letter-spacing="3">TESTED ✓</text>

  <!-- Small key decorations -->
  <rect x="210" y="234" width="100" height="56" rx="8" fill="white" stroke="#C4D4E8" stroke-width="2" opacity="0.7"/>
  <text x="260" y="270" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#8899BB">Tab</text>

  <rect x="326" y="234" width="60" height="56" rx="8" fill="white" stroke="#C4D4E8" stroke-width="2" opacity="0.5"/>
  <text x="356" y="270" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#99AABB">Q</text>

  <rect x="402" y="234" width="60" height="56" rx="8" fill="white" stroke="#C4D4E8" stroke-width="2" opacity="0.4"/>
  <text x="432" y="270" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#99AABB">W</text>
</svg>
