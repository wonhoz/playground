<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 따뜻한 앰버/크림 -->
  <defs>
    <radialGradient id="bg10" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF5D6"/>
      <stop offset="100%" stop-color="#F2D98A"/>
    </radialGradient>
    <linearGradient id="folder10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#C87A10"/>
    </linearGradient>
    <filter id="dustBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>

  <!-- Layer 2: 폴더 (먼지 낀 것처럼 표현) + 청소 후 깨끗해진 상태 -->
  <!-- 메인 폴더 -->
  <rect x="220" y="380" width="584" height="400" rx="28" fill="url(#folder10)"/>
  <path d="M220 380 L220 326 Q220 304 240 304 L390 304 Q416 304 430 326 L452 380 Z" fill="#E89010"/>

  <!-- 폴더 위 먼지/오래된 느낌 (왼쪽 - 청소 전 영역) -->
  <ellipse cx="350" cy="380" rx="120" ry="16" fill="rgba(140,100,30,0.35)" filter="url(#dustBlur)"/>
  <!-- 먼지 입자들 (작은 점들) -->
  <circle cx="268" cy="370" r="4" fill="rgba(120,80,20,0.4)"/>
  <circle cx="295" cy="362" r="3" fill="rgba(120,80,20,0.3)"/>
  <circle cx="320" cy="374" r="5" fill="rgba(120,80,20,0.35)"/>
  <circle cx="348" cy="358" r="3" fill="rgba(120,80,20,0.3)"/>
  <circle cx="372" cy="368" r="4" fill="rgba(120,80,20,0.35)"/>
  <circle cx="400" cy="362" r="3" fill="rgba(120,80,20,0.25)"/>
  <circle cx="425" cy="374" r="5" fill="rgba(120,80,20,0.3)"/>

  <!-- 폴더 내부 오래된 파일들 (왼쪽) -->
  <rect x="248" y="430" width="120" height="90" rx="8" fill="rgba(80,50,10,0.25)"/>
  <rect x="248" y="540" width="120" height="90" rx="8" fill="rgba(80,50,10,0.25)"/>
  <rect x="248" y="650" width="120" height="80" rx="8" fill="rgba(80,50,10,0.25)"/>

  <!-- Layer 3: 청소 빗자루/행주 효과 (오른쪽은 깨끗하게 청소됨) -->
  <!-- 청소 경계선 (왼쪽=먼지, 오른쪽=깨끗) -->
  <line x1="490" y1="360" x2="490" y2="800" stroke="rgba(200,160,50,0.4)" stroke-width="4" stroke-dasharray="20,12"/>

  <!-- 청소된 영역 (오른쪽) - 더 밝게 -->
  <rect x="490" y="380" width="314" height="400" rx="0" fill="rgba(255,220,100,0.2)"/>

  <!-- 청소 행주/브러시 - 둥근 사각형 형태 -->
  <rect x="460" y="380" width="80" height="400" rx="16" fill="rgba(255,255,255,0.7)"/>
  <!-- 행주 텍스처 줄무늬 -->
  <line x1="480" y1="395" x2="480" y2="760" stroke="rgba(200,200,200,0.6)" stroke-width="5" stroke-dasharray="18,8"/>
  <line x1="500" y1="395" x2="500" y2="760" stroke="rgba(200,200,200,0.6)" stroke-width="5" stroke-dasharray="18,8"/>
  <line x1="520" y1="395" x2="520" y2="760" stroke="rgba(200,200,200,0.6)" stroke-width="5" stroke-dasharray="18,8"/>

  <!-- 깨끗해진 영역 반짝임 -->
  <circle cx="660" cy="500" r="20" fill="rgba(255,255,255,0.7)" opacity="0.8"/>
  <path d="M660 480 L663 494 L677 497 L663 500 L660 514 L657 500 L643 497 L657 494 Z" fill="white"/>
  <circle cx="720" cy="640" r="14" fill="rgba(255,255,255,0.6)" opacity="0.7"/>
  <path d="M720 626 L722 636 L732 638 L722 640 L720 654 L718 640 L708 638 L718 636 Z" fill="white" opacity="0.9"/>

  <!-- 폴더 하이라이트 -->
  <rect x="220" y="380" width="584" height="44" rx="28" fill="rgba(255,255,255,0.18)"/>
</svg>
