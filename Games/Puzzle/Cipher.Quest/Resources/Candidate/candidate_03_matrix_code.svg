<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000a00"/>
      <stop offset="100%" stop-color="#001400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Matrix falling characters -->
  <text x="50" y="70" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">1</text>
  <text x="50" y="90" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">0</text>
  <text x="50" y="110" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.5">1</text>
  <text x="50" y="130" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.3">1</text>
  <text x="80" y="120" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">A</text>
  <text x="80" y="140" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">Z</text>
  <text x="80" y="160" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.5">9</text>
  <text x="110" y="60" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">X</text>
  <text x="110" y="80" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">7</text>
  <text x="110" y="100" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.5">K</text>
  <text x="390" y="380" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">3</text>
  <text x="390" y="400" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">F</text>
  <text x="390" y="420" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.5">8</text>
  <text x="420" y="360" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">B</text>
  <text x="420" y="380" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">5</text>
  <text x="420" y="400" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.5">Q</text>
  <text x="450" y="340" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.9">7</text>
  <text x="450" y="360" font-family="monospace" font-size="16" fill="#00ff44" opacity="0.7">Y</text>
  <!-- Main magnifying glass -->
  <circle cx="230" cy="230" r="130" fill="none" stroke="#00ff44" stroke-width="12" filter="url(#glow)"/>
  <circle cx="230" cy="230" r="118" fill="#000d00" opacity="0.85"/>
  <!-- Code inside glass -->
  <text x="145" y="185" font-family="monospace" font-size="20" fill="#00ff44" filter="url(#glow)">AES-256</text>
  <text x="150" y="215" font-family="monospace" font-size="20" fill="#00ff44" filter="url(#glow)">█▓░▒▓█</text>
  <text x="145" y="245" font-family="monospace" font-size="20" fill="#00ff44" opacity="0.8">ROT-13</text>
  <text x="155" y="275" font-family="monospace" font-size="18" fill="#00ff44" opacity="0.6">BASE64</text>
  <!-- Handle -->
  <line x1="328" y1="328" x2="420" y2="420" stroke="#00ff44" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
</svg>