<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07001A"/>
      <stop offset="100%" stop-color="#120033"/>
    </linearGradient>
    <linearGradient id="zap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#AA00FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Zapper device body -->
  <rect x="196" y="280" width="120" height="80" rx="12" fill="#1A0033" stroke="#AA00FF" stroke-width="3"/>
  <rect x="216" y="290" width="80" height="30" rx="6" fill="#0A0022" stroke="#6600CC" stroke-width="1.5"/>
  <text x="256" y="310" font-family="monospace" font-size="12" fill="#AA00FF" text-anchor="middle">BUG.ZAPPER</text>
  <!-- Handle -->
  <rect x="230" y="358" width="52" height="60" rx="8" fill="#110022" stroke="#7700BB" stroke-width="2"/>
  <!-- Zap beam -->
  <line x1="256" y1="280" x2="256" y2="200" stroke="url(#zap)" stroke-width="5" opacity="0.9"/>
  <line x1="256" y1="240" x2="230" y2="210" stroke="#00FFFF" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="240" x2="282" y2="210" stroke="#AA00FF" stroke-width="2" opacity="0.5"/>
  <!-- Bug being zapped -->
  <ellipse cx="256" cy="185" rx="30" ry="22" fill="#FF3300" opacity="0.85"/>
  <ellipse cx="256" cy="165" rx="20" ry="18" fill="#CC2200" opacity="0.85"/>
  <line x1="232" y1="178" x2="210" y2="165" stroke="#FF4400" stroke-width="2.5"/>
  <line x1="280" y1="178" x2="302" y2="165" stroke="#FF4400" stroke-width="2.5"/>
  <!-- Electric sparks around bug -->
  <line x1="225" y1="165" x2="212" y2="155" stroke="#FFFF00" stroke-width="2"/>
  <line x1="287" y1="165" x2="300" y2="155" stroke="#FFFF00" stroke-width="2"/>
  <line x1="256" y1="148" x2="256" y2="135" stroke="#00FFFF" stroke-width="2"/>
  <!-- Star sparks -->
  <circle cx="212" cy="154" r="4" fill="#FFFF00"/>
  <circle cx="300" cy="154" r="4" fill="#FFFF00"/>
  <circle cx="256" cy="133" r="4" fill="#00FFFF"/>
  <!-- Title -->
  <text x="256" y="445" font-family="Arial" font-size="20" fill="#AA00FF" text-anchor="middle">Exterminate!</text>
  <text x="256" y="476" font-family="Arial" font-size="22" font-weight="bold" fill="#00FFFF" text-anchor="middle">Bug.Hunt</text>
</svg>
