<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Recipe card -->
  <rect x="200" y="180" width="380" height="480" rx="16" fill="#33691E"/>
  <rect x="220" y="200" width="340" height="440" rx="12" fill="#050A00" opacity="0.6"/>
  <!-- Recipe ingredients (icons) -->
  <rect x="250" y="240" width="60" height="60" rx="8" fill="#33691E" stroke="#AED581" stroke-width="3"/>
  <rect x="330" y="240" width="60" height="60" rx="8" fill="#33691E" stroke="#AED581" stroke-width="3"/>
  <line x1="370" y1="252" x2="370" y2="288" stroke="#AED581" stroke-width="4"/>
  <line x1="352" y1="270" x2="388" y2="270" stroke="#AED581" stroke-width="4"/>
  <!-- Plus sign between ingredients -->
  <circle cx="420" cy="270" r="15" fill="#AED581"/>
  <line x1="412" y1="270" x2="428" y2="270" stroke="#050A00" stroke-width="4"/>
  <line x1="420" y1="262" x2="420" y2="278" stroke="#050A00" stroke-width="4"/>
  <!-- More recipe items -->
  <rect x="250" y="330" width="60" height="60" rx="8" fill="#33691E" stroke="#AED581" stroke-width="3"/>
  <rect x="330" y="330" width="60" height="60" rx="8" fill="#33691E" stroke="#AED581" stroke-width="3"/>
  <rect x="250" y="420" width="60" height="60" rx="8" fill="#33691E" stroke="#AED581" stroke-width="3"/>
  <!-- Result area -->
  <line x1="540" y1="400" x2="600" y2="400" stroke="#AED581" stroke-width="8"/>
  <polygon points="590,382 630,400 590,418" fill="#AED581"/>
  <rect x="630" y="340" width="160" height="160" rx="16" fill="#AED581"/>
  <!-- Ship silhouette in result -->
  <polygon points="710,360 685,420 710,405 735,420" fill="#050A00"/>
  <polygon points="710,405 685,420 660,455 710,440 760,455 735,420" fill="#050A00"/>
  <!-- Dodge path -->
  <path d="M200,750 Q512,680 824,750" fill="none" stroke="#AED581" stroke-width="8" stroke-dasharray="20,10" opacity="0.6"/>
  <polygon points="804,734 840,750 804,766" fill="#AED581" opacity="0.6"/>
</svg>
