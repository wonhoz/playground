  <!-- 강조 키 (문제 키, 진찰 중) -->
  <rect x="448" y="442" width="34" height="28" rx="5" fill="#FFB3B3" stroke="#FF6B6B" stroke-width="2"/>
  <text x="465" y="461" text-anchor="middle" font-family="Consolas,monospace" font-size="13" fill="#CC0000">U</text>

  <!-- 청진기 (SVG 도형으로) -->
  <!-- 청진기 헤드 (진찰 중인 키 위에) -->
  <circle cx="465" cy="395" r="36" fill="#FFFFFF" stroke="#388E3C" stroke-width="5"/>
  <circle cx="465" cy="395" r="22" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <circle cx="465" cy="395" r="10" fill="#4CAF50"/>

  <!-- 청진기 튜브 (구불구불) -->
  <path d="M 465,359 C 465,310 530,290 570,270 C 610,250 660,250 680,280"
