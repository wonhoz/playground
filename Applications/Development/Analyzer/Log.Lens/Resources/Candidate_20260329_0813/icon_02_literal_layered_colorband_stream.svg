<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 따뜻한 다크 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1428"/>
      <stop offset="100%" stop-color="#0E0A18"/>
    </linearGradient>
    <linearGradient id="fatal02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4747"/>
      <stop offset="100%" stop-color="#FF2222"/>
    </linearGradient>
    <linearGradient id="warn02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
    <linearGradient id="info02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#0090DD"/>
