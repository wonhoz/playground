<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#060d18"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="fall1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fall2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="diskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a3f"/>
      <stop offset="100%" stop-color="#061420"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="diskClip">
      <ellipse cx="256" cy="320" rx="190" ry="60"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Disk platform -->
  <ellipse cx="256" cy="340" rx="200" ry="65" fill="url(#diskGrad)" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.5"/>
  <ellipse cx="256" cy="320" rx="200" ry="65" fill="url(#diskGrad)" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Disk rings -->
  <ellipse cx="256" cy="320" rx="155" ry="50" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.4"/>
  <ellipse cx="256" cy="320" rx="110" ry="35" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.4"/>
  <ellipse cx="256" cy="320" rx="65" ry="20" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.5"/>
  <ellipse cx="256" cy="320" rx="22" ry="7" fill="#030508" stroke="#06B6D4" stroke-width="1.5" filter="url(#softglow)"/>

  <!-- Waterfall streams -->
  <!-- Stream 1 (center) -->
  <rect x="248" y="80" width="16" height="220" fill="url(#fall1)" rx="8" filter="url(#glow)"/>
  <!-- Stream 2 (left) -->
  <rect x="200" y="110" width="10" height="185" fill="url(#fall2)" rx="5" filter="url(#softglow)"/>
  <!-- Stream 3 (right) -->
  <rect x="302" y="120" width="10" height="175" fill="url(#fall2)" rx="5" filter="url(#softglow)"/>
  <!-- Stream 4 (far left) -->
  <rect x="158" y="150" width="7" height="140" fill="#3B82F6" fill-opacity="0.4" rx="3.5"/>
  <!-- Stream 5 (far right) -->
  <rect x="347" y="155" width="7" height="135" fill="#3B82F6" fill-opacity="0.4" rx="3.5"/>
  <!-- Stream 6 thin (left) -->
  <rect x="178" y="170" width="4" height="110" fill="#06B6D4" fill-opacity="0.3" rx="2"/>
  <!-- Stream 7 thin (right) -->
  <rect x="330" y="175" width="4" height="105" fill="#06B6D4" fill-opacity="0.3" rx="2"/>

  <!-- Splash at bottom -->
  <ellipse cx="256" cy="310" rx="60" ry="18" fill="#06B6D4" fill-opacity="0.25" filter="url(#glow)"/>
  <ellipse cx="256" cy="315" rx="40" ry="12" fill="#0EA5E9" fill-opacity="0.3" filter="url(#glow)"/>

  <!-- Top source bar -->
  <rect x="100" y="70" width="312" height="20" rx="10" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Data segments in source bar -->
  <rect x="108" y="75" width="40" height="10" rx="5" fill="#06B6D4" fill-opacity="0.7"/>
  <rect x="155" y="75" width="60" height="10" rx="5" fill="#0EA5E9" fill-opacity="0.6"/>
  <rect x="222" y="75" width="30" height="10" rx="5" fill="#3B82F6" fill-opacity="0.7"/>
  <rect x="259" y="75" width="50" height="10" rx="5" fill="#06B6D4" fill-opacity="0.6"/>
  <rect x="316" y="75" width="35" height="10" rx="5" fill="#0EA5E9" fill-opacity="0.7"/>
  <rect x="358" y="75" width="45" height="10" rx="5" fill="#3B82F6" fill-opacity="0.6"/>

  <!-- Floating data particles -->
  <circle cx="220" cy="200" r="3" fill="#06B6D4" fill-opacity="0.8" filter="url(#softglow)"/>
  <circle cx="290" cy="170" r="2.5" fill="#0EA5E9" fill-opacity="0.7" filter="url(#softglow)"/>
  <circle cx="165" cy="240" r="2" fill="#7DD3FC" fill-opacity="0.6"/>
  <circle cx="340" cy="230" r="2" fill="#7DD3FC" fill-opacity="0.6"/>
</svg>
