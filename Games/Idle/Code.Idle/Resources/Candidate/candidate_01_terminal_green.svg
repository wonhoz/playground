<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2818"/>
      <stop offset="100%" stop-color="#0A1E12"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="96" y="130" width="320" height="220" rx="14" fill="#1A1A2E"/>
  <rect x="104" y="138" width="304" height="204" rx="10" fill="url(#screen)"/>
  <!-- Monitor stand -->
  <rect x="232" y="350" width="48" height="40" rx="4" fill="#1A1A2E"/>
  <rect x="204" y="388" width="104" height="14" rx="7" fill="#1A1A2E"/>
  <!-- Terminal text (green) -->
  <text x="118" y="168" font-size="14" fill="#39FF14" font-family="Courier New" opacity="0.9">&gt; npm run idle</text>
  <text x="118" y="192" font-size="13" fill="#00FF88" font-family="Courier New" opacity="0.8">Compiling...</text>
  <text x="118" y="214" font-size="13" fill="#39FF14" font-family="Courier New" opacity="0.9">+500 XP</text>
  <text x="118" y="236" font-size="13" fill="#00CC44" font-family="Courier New" opacity="0.7">Lines: 9999</text>
  <text x="118" y="258" font-size="14" fill="#39FF14" font-family="Courier New" opacity="1">█</text>
  <!-- Coins floating -->
  <circle cx="360" cy="420" r="18" fill="#FFD700"/>
  <text x="360" y="426" text-anchor="middle" font-size="14" fill="#3E2723" font-weight="bold" font-family="Arial">$</text>
  <circle cx="330" cy="440" r="13" fill="#FFD700" opacity="0.7"/>
  <circle cx="390" cy="435" r="11" fill="#FFD700" opacity="0.6"/>
</svg>
