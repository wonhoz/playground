<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 신경망 연결선 (입력층 → 은닉층 → 출력층) -->
  <!-- 입력 → 은닉1 -->
  <line x1="110" y1="160" x2="230" y2="140" stroke="#6366F1" stroke-width="1.2" opacity="0.5"/>
  <line x1="110" y1="160" x2="230" y2="210" stroke="#6366F1" stroke-width="1.2" opacity="0.5"/>
  <line x1="110" y1="160" x2="230" y2="280" stroke="#818CF8" stroke-width="1" opacity="0.3"/>
  <line x1="110" y1="256" x2="230" y2="140" stroke="#818CF8" stroke-width="1" opacity="0.3"/>
  <line x1="110" y1="256" x2="230" y2="210" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="256" x2="230" y2="280" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="256" x2="230" y2="350" stroke="#818CF8" stroke-width="1" opacity="0.3"/>
  <line x1="110" y1="352" x2="230" y2="210" stroke="#6366F1" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="352" x2="230" y2="280" stroke="#6366F1" stroke-width="1.2" opacity="0.5"/>
  <line x1="110" y1="352" x2="230" y2="350" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
  <!-- 은닉1 → 은닉2 -->
  <line x1="230" y1="140" x2="340" y2="170" stroke="#818CF8" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="140" x2="340" y2="256" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="210" x2="340" y2="170" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
  <line x1="230" y1="210" x2="340" y2="256" stroke="#818CF8" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="210" x2="340" y2="342" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="280" x2="340" y2="170" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="280" x2="340" y2="256" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
  <line x1="230" y1="280" x2="340" y2="342" stroke="#818CF8" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="350" x2="340" y2="256" stroke="#6366F1" stroke-width="1" opacity="0.4"/>
  <line x1="230" y1="350" x2="340" y2="342" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
  <!-- 은닉2 → 출력 -->
  <line x1="340" y1="170" x2="430" y2="200" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="170" x2="430" y2="312" stroke="#818CF8" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="256" x2="430" y2="200" stroke="#A5B4FC" stroke-width="2" opacity="0.8"/>
  <line x1="340" y1="256" x2="430" y2="312" stroke="#A5B4FC" stroke-width="2" opacity="0.8"/>
  <line x1="340" y1="342" x2="430" y2="200" stroke="#818CF8" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="342" x2="430" y2="312" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <!-- 입력층 노드 -->
  <circle cx="110" cy="160" r="14" fill="url(#nodeGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="110" cy="256" r="16" fill="url(#nodeGrad)" opacity="1" filter="url(#glow)"/>
  <circle cx="110" cy="352" r="14" fill="url(#nodeGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- 은닉층1 노드 -->
  <circle cx="230" cy="140" r="12" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <circle cx="230" cy="210" r="14" fill="#A5B4FC" opacity="0.9" filter="url(#glow)"/>
  <circle cx="230" cy="280" r="14" fill="#A5B4FC" opacity="0.9" filter="url(#glow)"/>
  <circle cx="230" cy="350" r="12" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <!-- 은닉층2 노드 -->
  <circle cx="340" cy="170" r="12" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <circle cx="340" cy="256" r="15" fill="#A5B4FC" opacity="1" filter="url(#glow)"/>
  <circle cx="340" cy="342" r="12" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <!-- 출력층 노드 -->
  <circle cx="430" cy="200" r="16" fill="#6366F1" opacity="0.9" filter="url(#glow)"/>
  <circle cx="430" cy="312" r="16" fill="#6366F1" opacity="0.9" filter="url(#glow)"/>
  <!-- 노드 내부 심볼 (파일) -->
  <text x="430" y="206" text-anchor="middle" font-family="monospace" font-size="14" fill="#A5B4FC" opacity="0.9">A</text>
  <text x="430" y="318" text-anchor="middle" font-family="monospace" font-size="14" fill="#A5B4FC" opacity="0.9">B</text>
  <!-- 입력 라벨 -->
  <text x="110" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f1</text>
  <text x="110" y="259" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f2</text>
  <text x="110" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f3</text>
</svg>