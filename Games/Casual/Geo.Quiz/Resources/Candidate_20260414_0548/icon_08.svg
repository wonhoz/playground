<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#2E7D32" stroke-width="16"/>

  <!-- Before: wrong answers (left side) -->
  <rect x="112" y="152" width="340" height="484" rx="24" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="10"/>
  <!-- X marks -->
  <line x1="180" y1="240" x2="250" y2="310" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <line x1="250" y1="240" x2="180" y2="310" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <line x1="180" y1="360" x2="250" y2="430" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <line x1="250" y1="360" x2="180" y2="430" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <line x1="180" y1="480" x2="250" y2="550" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <line x1="250" y1="480" x2="180" y2="550" stroke="#D32F2F" stroke-width="18" stroke-linecap="round"/>
  <!-- WRONG label -->
  <rect x="128" y="558" width="308" height="64" rx="16" fill="#D32F2F" stroke="#B71C1C" stroke-width="10"/>
  <text x="282" y="601" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">5 WRONG</text>

  <!-- Arrow -->
  <rect x="464" y="370" width="96" height="40" rx="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="12"/>
  <path d="M 556,344 L 628,390 L 556,436 Z" fill="#2E7D32" stroke="#1B5E20" stroke-width="12" stroke-linejoin="round"/>

  <!-- After: correct answers (right side) -->
  <rect x="572" y="152" width="340" height="484" rx="24" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="10"/>
  <!-- Checkmarks -->
  <path d="M 628,270 L 668,320 L 748,220" fill="none" stroke="#388E3C" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 628,390 L 668,440 L 748,340" fill="none" stroke="#388E3C" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 628,510 L 668,560 L 748,460" fill="none" stroke="#388E3C" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- CORRECT label -->
  <rect x="588" y="558" width="308" height="64" rx="16" fill="#388E3C" stroke="#1B5E20" stroke-width="10"/>
  <text x="742" y="601" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">15 RIGHT</text>

  <!-- SCORE badge -->
  <rect x="228" y="752" width="568" height="116" rx="36" fill="#1B5E20" stroke="#0A3A0A" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#69F0AE" text-anchor="middle">SCORE</text>
</svg>
