<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mosaic icon grid - colorful tiles -->
  <rect x="48" y="48" width="80" height="80" rx="14" fill="#ff6b6b"/>
  <text x="72" y="100" font-family="serif" font-size="40">🔥</text>
  <rect x="140" y="48" width="80" height="80" rx="14" fill="#4ecdc4"/>
  <text x="162" y="100" font-family="serif" font-size="40">🌊</text>
  <rect x="232" y="48" width="80" height="80" rx="14" fill="#ffe66d"/>
  <text x="255" y="100" font-family="serif" font-size="40">⭐</text>
  <rect x="324" y="48" width="80" height="80" rx="14" fill="#a8e6cf"/>
  <text x="347" y="100" font-family="serif" font-size="40">🌿</text>
  <!-- Second row -->
  <rect x="48" y="140" width="80" height="80" rx="14" fill="#dda0dd"/>
  <text x="70" y="192" font-family="serif" font-size="40">💜</text>
  <rect x="140" y="140" width="80" height="80" rx="14" fill="#f0e68c"/>
  <text x="162" y="192" font-family="serif" font-size="40">🌟</text>
  <rect x="232" y="140" width="80" height="80" rx="14" fill="#87ceeb"/>
  <text x="254" y="192" font-family="serif" font-size="40">🔵</text>
  <rect x="324" y="140" width="80" height="80" rx="14" fill="#ffa07a"/>
  <text x="347" y="192" font-family="serif" font-size="40">🍊</text>
  <!-- Magnifier overlay -->
  <circle cx="330" cy="330" r="130" fill="#111" fill-opacity="0.5" stroke="#ffffff" stroke-width="6"/>
  <line x1="424" y1="424" x2="472" y2="472" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Highlighted icon inside magnifier -->
  <rect x="270" y="280" width="120" height="100" rx="18" fill="#4ecdc4"/>
  <text x="300" y="347" font-family="serif" font-size="56">🌊</text>
  <!-- Shine -->
  <ellipse cx="295" cy="298" rx="25" ry="12" fill="white" fill-opacity="0.2" transform="rotate(-30 295 298)"/>
</svg>