  <rect x="332" y="264" width="36" height="36" rx="4" fill="#38BDF8" opacity="0.7"/>
  <rect x="372" y="264" width="36" height="36" rx="4" fill="#818CF8" opacity="0.7"/>
  <rect x="412" y="264" width="36" height="36" rx="4" fill="#C084FC" opacity="0.7"/>
  <rect x="332" y="304" width="36" height="36" rx="4" fill="#0EA5E9" opacity="0.65"/>
  <rect x="372" y="304" width="36" height="36" rx="4" fill="#6366F1" opacity="0.65"/>
  <rect x="412" y="304" width="36" height="36" rx="4" fill="#A855F7" opacity="0.65"/>
  <!-- 분리선 -->
  <line x1="180" y1="258" x2="180" y2="346" stroke="#34D399" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="258" x2="320" y2="346" stroke="#34D399" stroke-width="1" opacity="0.3"/>
  <!-- 하단 -->
  <rect x="80" y="365" width="352" height="95" rx="10" fill="#061510" stroke="#34D399" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#34D399" filter="url(#glow)" opacity="0.9">COLOR PALETTE SORT</text>
  <text x="256" y="414" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">색상 팔레트 자동 정렬</text>
  <!-- 미니 통계 -->
  <text x="120" y="444" text-anchor="middle" font-size="11" fill="#EF4444" opacity="0.8">Warm 45</text>
  <text x="256" y="444" text-anchor="middle" font-size="11" fill="#34D399" opacity="0.8">Cool 38</text>
  <text x="390" y="444" text-anchor="middle" font-size="11" fill="#818CF8" opacity="0.8">Vivid 29</text>
