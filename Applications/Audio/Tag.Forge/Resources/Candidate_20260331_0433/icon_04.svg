  <text x="400" y="758" font-family="'Segoe UI', sans-serif" font-size="34" fill="#37474F">Someone</text>
  <text x="240" y="806" font-family="'Consolas', monospace" font-size="38" fill="#F06292">Year</text>
  <text x="400" y="806" font-family="'Segoe UI', sans-serif" font-size="34" fill="#37474F">2026</text>
