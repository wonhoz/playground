  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- layered menus concept (stacked cards) -->
  <rect x="90" y="160" width="240" height="220" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
