    <rect x="0" y="0" width="36" height="45" rx="4" fill="#06B6D4" opacity="0.85"/>
    <polygon points="0,0 18,0 18,-14 36,0" fill="#22D3EE" opacity="0.8"/>
  </g>
  <g transform="translate(263, 95)">
    <rect x="0" y="0" width="36" height="45" rx="4" fill="#06B6D4" opacity="0.7"/>
    <polygon points="0,0 18,0 18,-14 36,0" fill="#22D3EE" opacity="0.65"/>
  </g>
  <line x1="251" y1="122" x2="263" y2="120" stroke="#67E8F9" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,2"/>
  <!-- 쌍 2 (우) -->
  <g transform="translate(380, 218)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="#22D3EE" opacity="0.8"/>
    <polygon points="0,0 16,0 16,-12 32,0" fill="#67E8F9" opacity="0.75"/>
  </g>
  <g transform="translate(385, 260)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="#22D3EE" opacity="0.65"/>
    <polygon points="0,0 16,0 16,-12 32,0" fill="#67E8F9" opacity="0.6"/>
  </g>
  <line x1="401" y1="258" x2="402" y2="260" stroke="#22D3EE" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>
  <!-- 쌍 3 (하) -->
  <g transform="translate(218, 370)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="#06B6D4" opacity="0.75"/>
    <polygon points="0,0 16,0 16,-12 32,0" fill="#22D3EE" opacity="0.7"/>
  </g>
  <g transform="translate(263, 378)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="#06B6D4" opacity="0.62"/>
    <polygon points="0,0 16,0 16,-12 32,0" fill="#22D3EE" opacity="0.58"/>
  </g>
  <!-- 쌍 4 (좌) -->
  <g transform="translate(98, 218)">
