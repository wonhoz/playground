  <!-- Bottom-right: 256px -->
  <rect x="554" y="554" width="270" height="250" rx="20" fill="rgba(255,255,255,0.9)" stroke="white" stroke-width="10"/>
  <rect x="578" y="578" width="120" height="120" rx="14" fill="#8B5CF6"/>
  <polygon points="638,606 651,644 690,644 660,667 671,705 638,683 605,705 616,667 586,644 625,644" fill="#FCD34D"/>
