<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#041014"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadowBlur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 그림자/클론 파일 (뒤) -->
  <g opacity="0.35" filter="url(#shadowBlur)">
    <rect x="215" y="195" width="120" height="150" rx="10" fill="#06B6D4"/>
    <polygon points="215,195 275,195 275,155 335,195" fill="#0891B2"/>
    <line x1="235" y1="240" x2="315" y2="240" stroke="#67E8F9" stroke-width="3"/>
    <line x1="235" y1="260" x2="295" y2="260" stroke="#67E8F9" stroke-width="3"/>
    <line x1="235" y1="280" x2="305" y2="280" stroke="#67E8F9" stroke-width="3"/>
  </g>
  <!-- 그림자 2 (더 뒤) -->
  <g opacity="0.2" filter="url(#shadowBlur)">
    <rect x="230" y="210" width="120" height="150" rx="10" fill="#06B6D4"/>
  </g>
  <!-- 메인 파일 (앞) -->
  <rect x="155" y="175" width="130" height="162" rx="10" fill="url(#fileGrad)" opacity="0.95" filter="url(#glow)"/>
  <polygon points="155,175 220,175 220,130 285,175" fill="#22D3EE" opacity="0.9"/>
  <line x1="178" y1="222" x2="262" y2="222" stroke="#E0F7FA" stroke-width="3" opacity="0.8"/>
  <line x1="178" y1="244" x2="242" y2="244" stroke="#E0F7FA" stroke-width="3" opacity="0.7"/>
  <line x1="178" y1="266" x2="252" y2="266" stroke="#E0F7FA" stroke-width="3" opacity="0.6"/>
  <line x1="178" y1="288" x2="238" y2="288" stroke="#E0F7FA" stroke-width="2.5" opacity="0.5"/>
  <line x1="178" y1="308" x2="248" y2="308" stroke="#E0F7FA" stroke-width="2.5" opacity="0.5"/>
  <!-- 같음 표시 (=) -->
  <text x="316" y="255" font-family="Arial" font-size="42" fill="#06B6D4" opacity="0.7" font-weight="bold">=</text>
  <!-- 클론 표시 화살표 -->
  <path d="M 295 290 Q 330 320 350 290" fill="none" stroke="#22D3EE" stroke-width="2" stroke-dasharray="5,4" opacity="0.6"/>
  <circle cx="355" cy="288" r="5" fill="#22D3EE" opacity="0.7"/>
  <!-- 복사 아이콘 (우측) -->
  <rect x="345" y="300" width="90" height="110" rx="8" fill="url(#shadowGrad)" stroke="#06B6D4" stroke-width="1.5"/>
  <polygon points="345,300 390,300 390,268 435,300" fill="#0891B2" opacity="0.6"/>
  <line x1="362" y1="335" x2="418" y2="335" stroke="#67E8F9" stroke-width="2" opacity="0.6"/>
  <line x1="362" y1="352" x2="400" y2="352" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
  <!-- 감지 스캔 라인 -->
  <line x1="120" y1="420" x2="400" y2="420" stroke="#06B6D4" stroke-width="1.5" opacity="0.3" stroke-dasharray="8,6"/>
  <text x="256" y="445" text-anchor="middle" font-family="monospace" font-size="11" fill="#06B6D4" opacity="0.5">DUPLICATE DETECTED</text>
</svg>