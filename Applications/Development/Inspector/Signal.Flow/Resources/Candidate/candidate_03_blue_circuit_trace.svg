<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#001d3d"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit traces -->
  <!-- Main horizontal line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="url(#trace)" stroke-width="3"/>
  <!-- Branch lines -->
  <line x1="160" y1="256" x2="160" y2="160" stroke="#00b4d8" stroke-width="2.5"/>
  <line x1="160" y1="160" x2="260" y2="160" stroke="#00b4d8" stroke-width="2.5"/>
  <line x1="256" y1="256" x2="256" y2="340" stroke="#00b4d8" stroke-width="2.5"/>
  <line x1="200" y1="340" x2="340" y2="340" stroke="#00b4d8" stroke-width="2.5"/>
  <line x1="340" y1="256" x2="340" y2="180" stroke="#00b4d8" stroke-width="2.5"/>
  <!-- Component nodes -->
  <!-- Resistor at 160,256 -->
  <rect x="140" y="244" width="40" height="24" rx="4" fill="#001d3d" stroke="#00b4d8" stroke-width="2"/>
  <line x1="148" y1="256" x2="172" y2="256" stroke="#00b4d8" stroke-width="1.5"/>
  <!-- Capacitor at 256,340 -->
  <line x1="248" y1="325" x2="248" y2="355" stroke="#00b4d8" stroke-width="3"/>
  <line x1="264" y1="325" x2="264" y2="355" stroke="#00b4d8" stroke-width="3"/>
  <!-- Chip at 340,256 -->
  <rect x="318" y="230" width="44" height="52" rx="6" fill="#001d3d" stroke="#00b4d8" stroke-width="2"/>
  <line x1="326" y1="244" x2="318" y2="244" stroke="#00b4d8" stroke-width="1.5"/>
  <line x1="326" y1="256" x2="318" y2="256" stroke="#00b4d8" stroke-width="1.5"/>
  <line x1="326" y1="268" x2="318" y2="268" stroke="#00b4d8" stroke-width="1.5"/>
  <line x1="354" y1="244" x2="362" y2="244" stroke="#00b4d8" stroke-width="1.5"/>
  <line x1="354" y1="256" x2="362" y2="256" stroke="#00b4d8" stroke-width="1.5"/>
  <!-- Signal dots (flowing) -->
  <circle cx="80" cy="256" r="9" fill="#00b4d8"/>
  <circle cx="160" cy="160" r="7" fill="#0077b6" stroke="#00b4d8" stroke-width="1.5"/>
  <circle cx="256" cy="340" r="7" fill="#0077b6" stroke="#00b4d8" stroke-width="1.5"/>
  <circle cx="432" cy="256" r="9" fill="#00b4d8"/>
  <!-- Pulse markers -->
  <circle cx="200" cy="256" r="5" fill="#caf0f8"/>
  <circle cx="295" cy="256" r="5" fill="#caf0f8"/>
  <!-- Label -->
  <text x="256" y="455" font-family="monospace" font-size="18" fill="#00b4d8" text-anchor="middle" letter-spacing="3" opacity="0.9">SIGNAL.FLOW</text>
</svg>
