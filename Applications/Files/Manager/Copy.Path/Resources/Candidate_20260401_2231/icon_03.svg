<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (amber-deep orange) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg03cp2)"/>

  <!-- Layer 2: \ → / transformation -->
  <!-- Backslash (before) -->
  <rect x="88" y="280" width="340" height="340" rx="28" fill="white" opacity="0.92"/>
  <text x="258" y="510" font-family="'Courier New',monospace" font-size="320" font-weight="bold"
    fill="#E64A19" text-anchor="middle">\</text>

  <!-- Large arrow in center -->
  <text x="512" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="200" fill="white"
    text-anchor="middle" opacity="0.95">→</text>

  <!-- Forward slash (after) -->
  <rect x="596" y="280" width="340" height="340" rx="28" fill="white" opacity="0.92"/>
  <text x="766" y="510" font-family="'Courier New',monospace" font-size="320" font-weight="bold"
    fill="#0277BD" text-anchor="middle">/</text>

  <!-- Layer 3: Label tags at bottom -->
  <text x="258" y="680" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white"
    text-anchor="middle" opacity="0.8">Windows</text>
  <text x="766" y="680" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white"
    text-anchor="middle" opacity="0.8">Unix / URL</text>

  <text x="512" y="840" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">CONVERT PATH</text>
</svg>
