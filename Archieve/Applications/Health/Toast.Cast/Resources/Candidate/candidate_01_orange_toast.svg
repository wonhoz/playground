<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <linearGradient id="bread" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#FFA726"/>
    </linearGradient>
    <radialGradient id="steam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Toast notification card -->
  <rect x="64" y="280" width="384" height="152" rx="20" fill="#BF360C" stroke="#FFCC80" stroke-width="6"/>
  <!-- Notification content -->
  <rect x="88" y="304" width="80" height="80" rx="16" fill="#E65100" stroke="#FFA726" stroke-width="4"/>
  <!-- Bell icon in notification -->
  <path d="M 128,324 A 24,24 0 0,1 152,348 L 152,360 L 104,360 L 104,348 A 24,24 0 0,1 128,324 Z" fill="#FFCC80"/>
  <circle cx="128" cy="368" r="8" fill="#FFCC80"/>
  <rect x="116" y="320" width="24" height="8" rx="4" fill="#FFCC80"/>
  <!-- Text lines -->
  <rect x="184" y="308" width="200" height="12" rx="6" fill="#FFCC80" opacity="0.9"/>
  <rect x="184" y="328" width="160" height="10" rx="5" fill="#FFA726" opacity="0.7"/>
  <rect x="184" y="346" width="180" height="10" rx="5" fill="#FFA726" opacity="0.6"/>
  <!-- Action buttons -->
  <rect x="184" y="368" width="80" height="32" rx="10" fill="#FF6D00" stroke="#FFCC80" stroke-width="3"/>
  <rect x="196" y="378" width="56" height="8" rx="4" fill="#FFF9C4" opacity="0.9"/>
  <rect x="276" y="368" width="80" height="32" rx="10" fill="none" stroke="#FFA726" stroke-width="3"/>
  <rect x="288" y="378" width="56" height="8" rx="4" fill="#FFA726" opacity="0.8"/>
  <!-- Bread/toast art -->
  <rect x="152" y="100" width="208" height="168" rx="40" fill="url(#bread)"/>
  <!-- Crust top -->
  <rect x="152" y="100" width="208" height="24" rx="40" fill="#F57C00"/>
  <!-- Steam puffs -->
  <circle cx="200" cy="72" r="20" fill="url(#steam)"/>
  <circle cx="256" cy="60" r="24" fill="url(#steam)"/>
  <circle cx="312" cy="72" r="20" fill="url(#steam)"/>
  <!-- Stretching figure on toast -->
  <circle cx="256" cy="148" r="20" fill="#E65100" opacity="0.8"/>
  <line x1="256" y1="168" x2="256" y2="220" stroke="#E65100" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="188" x2="224" y2="172" stroke="#E65100" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="188" x2="288" y2="172" stroke="#E65100" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
</svg>
