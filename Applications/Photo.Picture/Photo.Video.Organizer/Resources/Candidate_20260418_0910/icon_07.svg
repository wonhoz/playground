      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FBE9E7"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

