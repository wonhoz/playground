<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 네이비-퍼플 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1464"/>
      <stop offset="100%" stop-color="#3A1C8C"/>
    </linearGradient>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <g clip-path="url(#clip01)">
    <!-- Layer 2: 상단 퀴즈 헤더 바 -->
    <rect x="80" y="100" width="864" height="90" rx="20" fill="#FFFFFF" opacity="0.12"/>
    <!-- 타이머 -->
    <circle cx="160" cy="145" r="34" fill="#FF6B6B"/>
    <text x="160" y="158" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">12</text>
    <!-- 진행 텍스트 -->
    <text x="512" y="155" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#FFFFFF" text-anchor="middle" opacity="0.9">3 / 10문제</text>
    <!-- 점수 -->
    <rect x="780" y="118" width="120" height="52" rx="14" fill="#FFD54F"/>
    <text x="840" y="152" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="32" fill="#1A1464" text-anchor="middle">250pt</text>

    <!-- Layer 2: 질문 카드 -->
    <rect x="80" y="210" width="864" height="150" rx="20" fill="#FFFFFF" opacity="0.15"/>
    <text x="512" y="295" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="#FFFFFF" text-anchor="middle">피타고라스 정리는?</text>
    <text x="512" y="345" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#B0BEC5" text-anchor="middle">수학 카테고리</text>

    <!-- Layer 3: 4지선다 버튼 -->
    <!-- A 버튼 -->
    <rect x="80" y="390" width="416" height="130" rx="18" fill="#FFFFFF" opacity="0.18"/>
    <rect x="80" y="390" width="416" height="130" rx="18" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    <text x="130" y="467" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFD54F">A</text>
    <text x="210" y="467" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF">c² = a² + b²</text>

    <!-- B 버튼 (정답 하이라이트) -->
    <rect x="528" y="390" width="416" height="130" rx="18" fill="#4CAF50" opacity="0.85"/>
    <text x="578" y="467" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF">B</text>
    <text x="658" y="467" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF">a² = b² + c²</text>

    <!-- C 버튼 -->
    <rect x="80" y="542" width="416" height="130" rx="18" fill="#FFFFFF" opacity="0.18"/>
    <text x="130" y="619" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFD54F">C</text>
    <text x="210" y="619" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF">c = a + b</text>

    <!-- D 버튼 -->
    <rect x="528" y="542" width="416" height="130" rx="18" fill="#FFFFFF" opacity="0.18"/>
    <text x="578" y="619" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFD54F">D</text>
    <text x="658" y="619" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF">a + b = c²</text>

    <!-- 스트릭 배지 -->
    <rect x="330" y="720" width="364" height="80" rx="22" fill="#FF6B6B"/>
    <text x="512" y="773" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">🔥 3연속!</text>

    <!-- 하단 TRIVIA CAST 로고 -->
    <rect x="230" y="830" width="564" height="72" rx="20" fill="#FFD54F"/>
    <text x="512" y="882" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#1A1464" text-anchor="middle">TRIVIA CAST</text>
  </g>
</svg>
