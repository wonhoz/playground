<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 눈이 ASCII를 해석 (눈이 문자를 이미지로 인식) | 중앙심볼 | #FDF2F8 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FDF2F8"/>
  <!-- Layer 2: Large eye with ASCII in pupil -->
  <!-- Eye whites (ellipse) -->
  <ellipse cx="512" cy="440" rx="360" ry="200" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="14"/>
  <!-- Pupil dark -->
  <circle cx="512" cy="440" r="130" fill="#1E3A8A"/>
  <circle cx="512" cy="440" r="108" fill="#0F172A"/>
  <!-- Iris ring -->
  <circle cx="512" cy="440" r="130" fill="none" stroke="#3B82F6" stroke-width="12" opacity="0.6"/>
  <!-- ASCII art inside pupil -->
  <text x="512" y="415" font-family="Consolas,monospace" font-size="18" fill="#4ADE80" text-anchor="middle">@##$$%</text>
  <text x="512" y="443" font-family="Consolas,monospace" font-size="18" fill="#22C55E" text-anchor="middle">*+==-.</text>
  <text x="512" y="471" font-family="Consolas,monospace" font-size="18" fill="#16A34A" text-anchor="middle">:::...</text>
  <!-- Eyelashes -->
  <line x1="512" y1="240" x2="512" y2="196" stroke="#1E3A8A" stroke-width="8" stroke-linecap="round"/>
  <line x1="422" y1="254" x2="400" y2="215" stroke="#1E3A8A" stroke-width="7" stroke-linecap="round"/>
  <line x1="342" y1="296" x2="310" y2="266" stroke="#1E3A8A" stroke-width="7" stroke-linecap="round"/>
  <line x1="602" y1="254" x2="622" y2="215" stroke="#1E3A8A" stroke-width="7" stroke-linecap="round"/>
  <line x1="682" y1="296" x2="712" y2="266" stroke="#1E3A8A" stroke-width="7" stroke-linecap="round"/>
  <!-- Highlight in eye -->
  <ellipse cx="458" cy="400" rx="26" ry="18" fill="white" opacity="0.4" transform="rotate(-20 458 400)"/>
  <!-- Layer 3: ASCII flowing below eye -->
  <text x="200" y="700" font-family="Consolas,monospace" font-size="22" fill="#6B7280">@#$%&amp;*+==-::.</text>
  <text x="240" y="736" font-family="Consolas,monospace" font-size="20" fill="#9CA3AF" opacity="0.8">++==-::;.. </text>
  <text x="280" y="768" font-family="Consolas,monospace" font-size="18" fill="#D1D5DB" opacity="0.6">:-  .  .  </text>
  <!-- "인식" arrow -->
  <path d="M512 660 Q512 690 440 720" fill="none" stroke="#818CF8" stroke-width="3" stroke-dasharray="8,5" opacity="0.6"/>
</svg>
