<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0D0520"/>
  <!-- Scanner beam device -->
  <rect x="200" y="380" width="624" height="264" rx="28" fill="#6A1B9A" opacity="0.8"/>
  <rect x="220" y="400" width="584" height="224" rx="18" fill="#0D0520" opacity="0.6"/>
  <!-- Scan lines -->
  <rect x="240" y="432" width="544" height="14" rx="6" fill="#AB47BC" opacity="0.5"/>
  <rect x="240" y="462" width="544" height="14" rx="6" fill="#AB47BC" opacity="0.5"/>
  <rect x="240" y="492" width="544" height="14" rx="6" fill="#AB47BC" opacity="0.5"/>
  <rect x="240" y="522" width="544" height="14" rx="6" fill="#AB47BC" opacity="0.5"/>
  <rect x="240" y="552" width="544" height="14" rx="6" fill="#AB47BC" opacity="0.5"/>
  <!-- Moving scan beam -->
  <rect x="380" y="396" width="8" height="232" rx="4" fill="#AB47BC"/>
  <rect x="380" y="396" width="60" height="232" rx="4" fill="#AB47BC" opacity="0.15"/>
  <!-- Corner brackets -->
  <path d="M240 400 L240 440 M240 400 L280 400" fill="none" stroke="#AB47BC" stroke-width="14" stroke-linecap="round"/>
  <path d="M784 400 L784 440 M784 400 L744 400" fill="none" stroke="#AB47BC" stroke-width="14" stroke-linecap="round"/>
  <path d="M240 624 L240 584 M240 624 L280 624" fill="none" stroke="#AB47BC" stroke-width="14" stroke-linecap="round"/>
  <path d="M784 624 L784 584 M784 624 L744 624" fill="none" stroke="#AB47BC" stroke-width="14" stroke-linecap="round"/>
  <!-- Globe icon above -->
  <circle cx="512" cy="240" r="90" fill="none" stroke="#6A1B9A" stroke-width="20"/>
  <ellipse cx="512" cy="240" rx="36" ry="90" fill="none" stroke="#6A1B9A" stroke-width="10"/>
  <line x1="422" y1="240" x2="602" y2="240" stroke="#6A1B9A" stroke-width="10"/>
  <!-- Arrow down from globe to scanner -->
  <line x1="512" y1="330" x2="512" y2="380" stroke="#AB47BC" stroke-width="20" stroke-linecap="round"/>
  <polygon points="480,370 512,400 544,370" fill="#AB47BC"/>
</svg>
