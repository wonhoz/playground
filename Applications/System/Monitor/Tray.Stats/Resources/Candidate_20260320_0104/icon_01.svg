<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- 트레이+차트: system tray icon shape with bar chart -->
  <!-- Tray icon container (small square like actual tray icon) -->
  <rect x="240" y="380" width="360" height="320" rx="20" fill="#1B5E20"/>
  <rect x="260" y="400" width="320" height="280" rx="14" fill="#000A05"/>
  <!-- Bar chart inside tray -->
  <rect x="284" y="580" width="52" height="80" rx="6" fill="#1B5E20"/>
  <rect x="352" y="530" width="52" height="130" rx="6" fill="#A5D6A7"/>
  <rect x="420" y="490" width="52" height="170" rx="6" fill="#1B5E20"/>
  <rect x="488" y="520" width="52" height="140" rx="6" fill="#1B5E20"/>
  <!-- Arrow emerging from tray to indicate live stats -->
  <path d="M660 540 L780 540 L780 480 L860 560 L780 640 L780 580 L660 580 Z" fill="#A5D6A7"/>
</svg>