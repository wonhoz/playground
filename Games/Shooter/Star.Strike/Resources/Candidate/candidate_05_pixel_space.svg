<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000022"/>
      <stop offset="100%" stop-color="#000044"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel stars (squares) -->
  <rect x="80" y="60" width="4" height="4" fill="white" opacity="0.8"/>
  <rect x="200" y="44" width="4" height="4" fill="white" opacity="0.6"/>
  <rect x="380" y="72" width="4" height="4" fill="#AAAAFF" opacity="0.7"/>
  <rect x="450" y="140" width="4" height="4" fill="white" opacity="0.5"/>
  <rect x="60" y="280" width="4" height="4" fill="white" opacity="0.6"/>
  <rect x="430" y="350" width="4" height="4" fill="white" opacity="0.5"/>
  <rect x="120" y="420" width="4" height="4" fill="#AAAAFF" opacity="0.6"/>
  <rect x="310" y="38" width="4" height="4" fill="white" opacity="0.7"/>
  <!-- Pixel ship (16x16 style, scaled up) -->
  <!-- 12px grid, each "pixel" = 16x16 -->
  <!-- Row by row ship design -->
  <rect x="240" y="336" width="32" height="16" fill="#EEEEFF"/> <!-- nose tip -->
  <rect x="224" y="352" width="64" height="16" fill="#CCCCEE"/> <!-- upper body -->
  <rect x="208" y="368" width="96" height="16" fill="#BBBBDD"/> <!-- mid body -->
  <rect x="192" y="384" width="128" height="16" fill="#AAAACC"/> <!-- wing start -->
  <rect x="160" y="400" width="192" height="16" fill="#9999BB"/> <!-- wings -->
  <rect x="224" y="416" width="64" height="16" fill="#8888AA"/> <!-- lower body -->
  <!-- Engine glow pixels -->
  <rect x="224" y="432" width="16" height="16" fill="#FF8800"/>
  <rect x="272" y="432" width="16" height="16" fill="#FF8800"/>
  <rect x="224" y="448" width="16" height="24" fill="#FF4400" opacity="0.8"/>
  <rect x="272" y="448" width="16" height="24" fill="#FF4400" opacity="0.8"/>
  <!-- Cockpit blue -->
  <rect x="240" y="352" width="32" height="16" fill="#44AAFF"/>
  <!-- Laser shots (pixel style) -->
  <rect x="244" y="192" width="8" height="96" fill="#FF4444"/>
  <rect x="260" y="192" width="8" height="96" fill="#FF4444"/>
  <rect x="244" y="192" width="8" height="12" fill="#FFFFFF"/>
  <rect x="260" y="192" width="8" height="12" fill="#FFFFFF"/>
  <!-- Pixel enemy (invader style) -->
  <!-- Row 1 -->
  <rect x="352" y="100" width="16" height="16" fill="#FF4444"/>
  <rect x="384" y="100" width="16" height="16" fill="#FF4444"/>
  <!-- Row 2 -->
  <rect x="336" y="116" width="16" height="16" fill="#FF4444"/>
  <rect x="352" y="116" width="16" height="16" fill="#FF8888"/>
  <rect x="368" y="116" width="16" height="16" fill="#FF8888"/>
  <rect x="384" y="116" width="16" height="16" fill="#FF8888"/>
  <rect x="400" y="116" width="16" height="16" fill="#FF4444"/>
  <!-- Row 3 -->
  <rect x="336" y="132" width="80" height="16" fill="#FF6666"/>
  <!-- Row 4 -->
  <rect x="352" y="148" width="48" height="16" fill="#FF4444"/>
  <!-- Hit flash -->
  <rect x="360" y="108" width="16" height="8" fill="#FFFF44" opacity="0.8"/>
  <rect x="376" y="96" width="8" height="8" fill="#FFFFFF" opacity="0.7"/>
  <!-- Score pixels -->
  <rect x="352" y="168" width="48" height="8" fill="#FFFF44" opacity="0.5"/>
</svg>
