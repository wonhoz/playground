<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- 왼쪽→오른쪽 페이지 (일본식 만화 읽기 방향) -->
  <!-- 오른쪽 페이지 (시작) -->
  <rect x="520" y="220" width="240" height="580" rx="14" fill="#6A1B9A"/>
  <rect x="554" y="260" width="160" height="120" rx="6" fill="#0A0010" opacity="0.5"/>
  <rect x="554" y="400" width="160" height="80" rx="6" fill="#0A0010" opacity="0.5"/>
  <rect x="554" y="500" width="100" height="16" rx="4" fill="#CE93D8" opacity="0.4"/>
  <rect x="554" y="526" width="120" height="16" rx="4" fill="#CE93D8" opacity="0.3"/>
  <!-- 왼쪽 페이지 (다음) -->
  <rect x="264" y="220" width="240" height="580" rx="14" fill="#6A1B9A" opacity="0.6"/>
  <rect x="298" y="260" width="160" height="240" rx="6" fill="#0A0010" opacity="0.5"/>
  <rect x="298" y="520" width="160" height="100" rx="6" fill="#0A0010" opacity="0.5"/>
  <!-- 읽기 방향 화살표 -->
  <line x1="512" y1="512" x2="340" y2="512" stroke="#CE93D8" stroke-width="20" stroke-linecap="round"/>
  <polygon points="340,480 280,512 340,544" fill="#CE93D8"/>
  <!-- 척추 -->
  <rect x="500" y="220" width="24" height="580" rx="6" fill="#0A0010" opacity="0.8"/>
</svg>