  <rect x="130" y="140" width="252" height="160" rx="6" fill="url(#paper)"/>
  <!-- Paper lines -->
  <line x1="148" y1="170" x2="364" y2="170" stroke="#CCCC99" stroke-width="1"/>
  <line x1="148" y1="188" x2="364" y2="188" stroke="#CCCC99" stroke-width="1"/>
  <line x1="148" y1="206" x2="364" y2="206" stroke="#CCCC99" stroke-width="1"/>
