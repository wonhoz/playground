<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <clipPath id="clip15">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg15)"/>
  <g clip-path="url(#clip15)">
    <!-- Layer 2: 뇌 윤곽선 -->
    <!-- 뇌 좌반구 -->
    <path d="M 512 260
             C 460 240, 380 240, 330 280
             C 270 330, 240 390, 240 450
             C 230 500, 240 540, 260 570
             C 240 590, 230 620, 240 650
             C 250 690, 280 710, 310 720
