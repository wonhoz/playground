<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_gq01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <clipPath id="c_gq01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_gq01)"/>
  <!-- Layer 2: Globe with grid lines -->
  <g clip-path="url(#c_gq01)">
    <!-- Globe body -->
    <circle cx="512" cy="540" r="340" fill="#1E40AF" stroke="#93C5FD" stroke-width="14"/>
    <!-- Latitude lines -->
    <ellipse cx="512" cy="540" rx="340" ry="120" fill="none" stroke="#60A5FA" stroke-width="8" opacity="0.6"/>
    <ellipse cx="512" cy="540" rx="340" ry="220" fill="none" stroke="#60A5FA" stroke-width="6" opacity="0.4"/>
    <!-- Longitude lines -->
    <line x1="172" y1="540" x2="852" y2="540" stroke="#60A5FA" stroke-width="8" opacity="0.6"/>
    <line x1="372" y1="202" x2="372" y2="878" stroke="#60A5FA" stroke-width="6" opacity="0.4"/>
    <line x1="652" y1="202" x2="652" y2="878" stroke="#60A5FA" stroke-width="6" opacity="0.4"/>
    <!-- Continents (simple blobs) -->
    <ellipse cx="420" cy="460" rx="100" ry="70" fill="#34D399" opacity="0.9"/>
    <ellipse cx="580" cy="420" rx="80" ry="100" fill="#34D399" opacity="0.9"/>
    <ellipse cx="520" cy="580" rx="120" ry="60" fill="#34D399" opacity="0.9"/>
    <ellipse cx="660" cy="560" rx="60" ry="50" fill="#34D399" opacity="0.9"/>
    <!-- Layer 3: Question mark badge -->
    <circle cx="720" cy="280" r="120" fill="#FCD34D"/>
    <text x="720" y="340" font-family="Arial Black" font-size="160" font-weight="900" fill="#1E3A8A" text-anchor="middle">?</text>
  </g>
</svg>
