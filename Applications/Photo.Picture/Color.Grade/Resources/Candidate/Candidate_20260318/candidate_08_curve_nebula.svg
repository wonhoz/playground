<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 커브 편집기 배경 그리드 -->
  <g opacity="0.15">
    <line x1="100" y1="100" x2="420" y2="100" stroke="#A78BFA" stroke-width="1"/>
    <line x1="100" y1="180" x2="420" y2="180" stroke="#A78BFA" stroke-width="1"/>
    <line x1="100" y1="260" x2="420" y2="260" stroke="#A78BFA" stroke-width="1"/>
    <line x1="100" y1="340" x2="420" y2="340" stroke="#A78BFA" stroke-width="1"/>
    <line x1="100" y1="420" x2="420" y2="420" stroke="#A78BFA" stroke-width="1"/>
    <line x1="100" y1="100" x2="100" y2="420" stroke="#A78BFA" stroke-width="1"/>
    <line x1="180" y1="100" x2="180" y2="420" stroke="#A78BFA" stroke-width="1"/>
    <line x1="260" y1="100" x2="260" y2="420" stroke="#A78BFA" stroke-width="1"/>
    <line x1="340" y1="100" x2="340" y2="420" stroke="#A78BFA" stroke-width="1"/>
    <line x1="420" y1="100" x2="420" y2="420" stroke="#A78BFA" stroke-width="1"/>
  </g>
  <!-- 대각선 기준선 -->
  <line x1="100" y1="420" x2="420" y2="100" stroke="#A78BFA" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,4"/>
  <!-- R 커브 -->
  <path d="M 100 420 Q 180 380 220 300 Q 280 180 420 100" fill="none" stroke="#FF6B6B" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <!-- G 커브 -->
  <path d="M 100 420 Q 200 400 260 280 Q 320 160 420 100" fill="none" stroke="#06D6A0" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <!-- B 커브 -->
  <path d="M 100 420 Q 150 360 200 260 Q 280 140 420 100" fill="none" stroke="#118AB2" stroke-width="2.5" opacity="0.7"/>
  <!-- 마스터 커브 (보라) -->
  <path d="M 100 420 Q 220 350 260 220 Q 300 140 420 100" fill="none" stroke="#A78BFA" stroke-width="3" filter="url(#glow)"/>
  <!-- 컨트롤 포인트들 -->
  <circle cx="220" cy="300" r="7" fill="#FF6B6B" opacity="0.9" filter="url(#glow)"/>
  <circle cx="260" cy="280" r="7" fill="#06D6A0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="260" r="7" fill="#118AB2" opacity="0.8"/>
  <circle cx="260" cy="220" r="8" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>
</svg>