<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#14060f"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="rainStream" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Manga page (floating in rain) -->
  <rect x="145" y="120" width="222" height="290" rx="8" fill="#0e0310" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Page spine -->
  <line x1="256" y1="120" x2="256" y2="410" stroke="#F472B6" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Page content -->
  <rect x="160" y="140" width="88" height="75" rx="4" fill="#1e0618" stroke="#EC4899" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="264" y="140" width="88" height="75" rx="4" fill="#180514" stroke="#F472B6" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Character sketches in panels -->
  <ellipse cx="204" cy="168" rx="18" ry="20" fill="#EC4899" fill-opacity="0.2"/>
  <rect x="192" y="188" width="24" height="22" rx="5" fill="#EC4899" fill-opacity="0.15"/>
  <ellipse cx="308" cy="165" rx="16" ry="18" fill="#F472B6" fill-opacity="0.2"/>
  <rect x="296" y="183" width="24" height="28" rx="5" fill="#F472B6" fill-opacity="0.15"/>
  <!-- Text lines on page -->
  <rect x="160" y="225" width="88" height="7" rx="3.5" fill="#EC4899" fill-opacity="0.4"/>
  <rect x="160" y="238" width="78" height="6" rx="3" fill="#EC4899" fill-opacity="0.35"/>
  <rect x="160" y="250" width="82" height="6" rx="3" fill="#EC4899" fill-opacity="0.3"/>
  <rect x="264" y="225" width="88" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.4"/>
  <rect x="264" y="238" width="72" height="6" rx="3" fill="#F472B6" fill-opacity="0.35"/>
  <rect x="264" y="250" width="85" height="6" rx="3" fill="#F472B6" fill-opacity="0.3"/>
  <!-- Lower panels -->
  <rect x="160" y="272" width="184" height="60" rx="4" fill="#1e0618" stroke="#EC4899" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="170" y="282" width="165" height="8" rx="4" fill="#EC4899" fill-opacity="0.35" filter="url(#softglow)"/>
  <rect x="170" y="298" width="140" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.3"/>
  <rect x="170" y="312" width="155" height="7" rx="3.5" fill="#EC4899" fill-opacity="0.3"/>
  <rect x="160" y="345" width="184" height="55" rx="4" fill="#180514" stroke="#F472B6" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="170" y="358" width="130" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.35"/>
  <rect x="170" y="372" width="160" height="7" rx="3.5" fill="#EC4899" fill-opacity="0.3"/>
  <rect x="170" y="386" width="120" height="7" rx="3.5" fill="#F472B6" fill-opacity="0.25"/>

  <!-- Rain drops (angled manga rain lines - many and dense) -->
  <g stroke="#EC4899" stroke-linecap="round" stroke-opacity="0.5">
    <line x1="50" y1="30" x2="30" y2="120" stroke-width="1.5" filter="url(#softglow)"/>
    <line x1="80" y1="20" x2="60" y2="110" stroke-width="1.2"/>
    <line x1="115" y1="25" x2="95" y2="115" stroke-width="1.5"/>
    <line x1="30" y1="160" x2="10" y2="250" stroke-width="1.2"/>
    <line x1="60" y1="170" x2="40" y2="260" stroke-width="1.5"/>
    <line x1="90" y1="155" x2="70" y2="245" stroke-width="1.2"/>
    <line x1="30" y1="300" x2="10" y2="390" stroke-width="1.5"/>
    <line x1="65" y1="310" x2="45" y2="400" stroke-width="1.2"/>
    <line x1="30" y1="420" x2="10" y2="510" stroke-width="1.5"/>
    <!-- Right side rain -->
    <line x1="400" y1="30" x2="380" y2="120" stroke-width="1.2"/>
    <line x1="435" y1="20" x2="415" y2="110" stroke-width="1.5"/>
    <line x1="465" y1="35" x2="445" y2="125" stroke-width="1.2"/>
    <line x1="495" y1="25" x2="475" y2="115" stroke-width="1.5"/>
    <line x1="415" y1="155" x2="395" y2="245" stroke-width="1.2"/>
    <line x1="445" y1="165" x2="425" y2="255" stroke-width="1.5"/>
    <line x1="478" y1="150" x2="458" y2="240" stroke-width="1.2"/>
    <line x1="410" y1="295" x2="390" y2="385" stroke-width="1.5"/>
    <line x1="445" y1="305" x2="425" y2="395" stroke-width="1.2"/>
    <line x1="478" y1="295" x2="458" y2="385" stroke-width="1.5"/>
    <line x1="415" y1="415" x2="395" y2="505" stroke-width="1.2"/>
    <line x1="450" y1="420" x2="430" y2="510" stroke-width="1.5"/>
    <line x1="482" y1="410" x2="462" y2="500" stroke-width="1.2"/>
  </g>
  <!-- Heavier rain strands -->
  <g stroke="#F472B6" stroke-linecap="round" stroke-opacity="0.35">
    <line x1="45" y1="40" x2="20" y2="160" stroke-width="2.5"/>
    <line x1="480" y1="50" x2="455" y2="170" stroke-width="2.5"/>
    <line x1="40" y1="300" x2="15" y2="420" stroke-width="2"/>
    <line x1="470" y1="290" x2="445" y2="410" stroke-width="2"/>
  </g>

  <!-- Rain splash at bottom -->
  <g stroke="#EC4899" stroke-width="1" stroke-opacity="0.4">
    <line x1="80" y1="490" x2="70" y2="480"/>
    <line x1="80" y1="490" x2="90" y2="480"/>
    <line x1="80" y1="490" x2="80" y2="478"/>
    <line x1="150" y1="495" x2="140" y2="485"/>
    <line x1="150" y1="495" x2="160" y2="485"/>
    <line x1="420" y1="492" x2="410" y2="482"/>
    <line x1="420" y1="492" x2="430" y2="482"/>
  </g>

  <!-- Page splash drops hitting it -->
  <circle cx="145" cy="200" r="4" fill="#EC4899" fill-opacity="0.5" filter="url(#softglow)"/>
  <circle cx="367" cy="280" r="3.5" fill="#F472B6" fill-opacity="0.45" filter="url(#softglow)"/>
  <circle cx="145" cy="350" r="3" fill="#EC4899" fill-opacity="0.4"/>
</svg>
