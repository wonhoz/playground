<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0533"/>
      <stop offset="100%" stop-color="#2D0A4E"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="280" r="170" fill="url(#centerGlow)"/>
  <!-- Gauge track background -->
  <path d="M96,360 A170,170 0 1,1 416,360" fill="none" stroke="#2D1A4A" stroke-width="28" stroke-linecap="round"/>
  <!-- Gauge filled (72%) -->
  <path d="M96,360 A170,170 0 1,1 385,220" fill="none" stroke="url(#gaugeGrad)" stroke-width="22" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="256" y1="112" x2="256" y2="130" stroke="#6B21A8" stroke-width="3"/>
  <line x1="364" y1="148" x2="352" y2="162" stroke="#6B21A8" stroke-width="3"/>
  <line x1="414" y1="256" x2="396" y2="256" stroke="#6B21A8" stroke-width="3"/>
  <line x1="364" y1="364" x2="352" y2="350" stroke="#6B21A8" stroke-width="3"/>
  <line x1="148" y1="148" x2="160" y2="162" stroke="#6B21A8" stroke-width="3"/>
  <line x1="98" y1="256" x2="116" y2="256" stroke="#6B21A8" stroke-width="3"/>
  <line x1="148" y1="364" x2="160" y2="350" stroke="#6B21A8" stroke-width="3"/>
  <!-- Needle -->
  <line x1="256" y1="280" x2="385" y2="220" stroke="#E9D5FF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="280" r="12" fill="#7E22CE" stroke="#E9D5FF" stroke-width="3"/>
  <!-- Center stats -->
  <text x="256" y="268" font-family="sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">72%</text>
  <text x="256" y="294" font-family="sans-serif" font-size="14" fill="#C084FC" text-anchor="middle">used</text>
  <!-- Labels -->
  <text x="96" y="392" font-family="sans-serif" font-size="12" fill="#22C55E" text-anchor="middle">0%</text>
  <text x="256" y="100" font-family="sans-serif" font-size="12" fill="#A3A3A3" text-anchor="middle">50%</text>
  <text x="416" y="392" font-family="sans-serif" font-size="12" fill="#EF4444" text-anchor="middle">100%</text>
  <!-- Drive label -->
  <text x="256" y="440" font-family="sans-serif" font-size="15" fill="#6B21A8" text-anchor="middle">Drive C: — 732 / 1000 GB</text>
</svg>
