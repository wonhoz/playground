<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Album art grid — music library view -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#050510"/>
  <!-- 2x2 album grid -->
  <!-- Album 1 (top-left) — warm red -->
  <rect x="140" y="140" width="340" height="340" rx="20" fill="#3E0000"/>
  <circle cx="310" cy="310" r="80" fill="#B71C1C" opacity="0.7"/>
  <circle cx="310" cy="310" r="40" fill="#3E0000"/>
  <path d="M296 290 L296 330 L336 310 Z" fill="#E53935" opacity="0.8"/>
  <!-- Album 2 (top-right) — cool blue -->
  <rect x="544" y="140" width="340" height="340" rx="20" fill="#001733"/>
  <rect x="590" y="200" width="240" height="14" rx="7" fill="#1565C0" opacity="0.8"/>
  <rect x="590" y="230" width="190" height="14" rx="7" fill="#1565C0" opacity="0.6"/>
  <rect x="590" y="260" width="210" height="14" rx="7" fill="#1565C0" opacity="0.6"/>
  <rect x="590" y="350" width="240" height="60" rx="10" fill="#1565C0" opacity="0.25"/>
  <!-- Album 3 (bottom-left) — green -->
  <rect x="140" y="544" width="340" height="340" rx="20" fill="#001A04"/>
  <path d="M220 624 L220 784 L400 714 Z" fill="#2E7D32" opacity="0.8"/>
  <path d="M260 624 L260 784 L420 714 Z" fill="#43A047" opacity="0.5"/>
  <!-- Album 4 (bottom-right) — purple gradient active -->
  <rect x="544" y="544" width="340" height="340" rx="20" fill="#1A0040"/>
  <rect x="544" y="544" width="340" height="340" rx="20" fill="none" stroke="#7C4DFF" stroke-width="16"/>
  <!-- Now playing indicator -->
  <rect x="590" y="580" width="240" height="18" rx="9" fill="#7C4DFF" opacity="0.9"/>
  <rect x="590" y="614" width="180" height="14" rx="7" fill="#7C4DFF" opacity="0.6"/>
  <!-- EQ bars (now playing) -->
  <rect x="600" y="700" width="20" height="60" rx="6" fill="#7C4DFF" opacity="0.7"/>
  <rect x="630" y="680" width="20" height="80" rx="6" fill="#7C4DFF" opacity="0.9"/>
  <rect x="660" y="660" width="20" height="100" rx="6" fill="#E040FB"/>
  <rect x="690" y="690" width="20" height="70" rx="6" fill="#7C4DFF" opacity="0.8"/>
  <rect x="720" y="710" width="20" height="50" rx="6" fill="#7C4DFF" opacity="0.6"/>
  <!-- Center gap -->
  <rect x="476" y="140" width="12" height="744" rx="6" fill="#050510"/>
  <rect x="140" y="476" width="744" height="12" rx="6" fill="#050510"/>
</svg>
