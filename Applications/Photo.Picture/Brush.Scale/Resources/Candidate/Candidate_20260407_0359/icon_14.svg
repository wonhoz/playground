<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 코랄+보라 그라데이션 -->
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>

  <!-- Layer 2: 이미지 + AI 확대경 + 4x 텍스트 — 레이어드 (hybrid) -->
  <!-- 기본 이미지 사진 (가운데) -->
  <rect x="180" y="200" width="500" height="400" rx="24" fill="#CE93D8"/>
  <!-- 이미지 내용 -->
  <path d="M200,560 L340,360 L420,420 L490,300 L660,560 Z" fill="#7B1FA2" opacity="0.8"/>
  <rect x="200" y="220" width="500" height="140" rx="12" fill="#F3E5F5" opacity="0.5"/>
  <circle cx="650" cy="280" r="50" fill="#FFD740" opacity="0.9"/>
  <ellipse cx="430" cy="567" rx="230" ry="40" fill="#66BB6A" opacity="0.5"/>
  <!-- 이미지 프레임 -->
  <rect x="180" y="200" width="500" height="400" rx="24" fill="none" stroke="#9C27B0" stroke-width="12"/>

  <!-- 확대경 오버레이 (오른쪽 하단에 겹쳐서) -->
  <circle cx="680" cy="620" r="200" fill="white" opacity="0.9"/>
  <circle cx="680" cy="620" r="200" fill="none" stroke="#E91E63" stroke-width="36"/>
  <!-- 확대경 내부 — 선명하게 확대된 이미지 -->
  <clipPath id="lens14">
    <circle cx="680" cy="620" r="184"/>
  </clipPath>
  <g clip-path="url(#lens14)">
    <rect x="496" y="436" width="368" height="368" fill="#F3E5F5"/>
    <path d="M496,770 L610,510 L680,580 L750,460 L864,680 L864,770 Z" fill="#9C27B0" opacity="0.9"/>
    <circle cx="840" cy="480" r="30" fill="#FFD740" opacity="0.95"/>
    <ellipse cx="680" cy="772" rx="184" ry="30" fill="#66BB6A" opacity="0.4"/>
  </g>
  <!-- 확대경 손잡이 -->
  <line x1="850" y1="800" x2="940" y2="900" stroke="#E91E63" stroke-width="40" stroke-linecap="round"/>

  <!-- Layer 3: 4x 뱃지 -->
  <circle cx="220" cy="700" r="90" fill="#E91E63"/>
  <text x="220" y="720" font-family="Arial Black" font-size="72" fill="white" text-anchor="middle">4x</text>
  <!-- AI 라벨 -->
  <rect x="280" y="800" width="140" height="60" rx="30" fill="#9C27B0"/>
  <text x="350" y="838" font-family="Arial Black" font-size="42" fill="white" text-anchor="middle">AI</text>
</svg>
