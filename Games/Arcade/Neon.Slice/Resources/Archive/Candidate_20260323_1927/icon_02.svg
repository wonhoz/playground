<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="neonGlow02">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg02)"/>
  <!-- Diagonal slice line (45 degrees) -->
  <line x1="230" y1="230" x2="794" y2="794" stroke="white" stroke-width="22" stroke-linecap="round" filter="url(#neonGlow02)"/>
  <line x1="230" y1="230" x2="794" y2="794" stroke="#F0F0FF" stroke-width="10" stroke-linecap="round"/>
  <!-- Neon cyan particles -->
  <circle cx="280" cy="280" r="22" fill="#00FFFF" filter="url(#neonGlow02)"/>
  <circle cx="360" cy="320" r="14" fill="#00FFFF" opacity="0.8"/>
  <circle cx="420" cy="260" r="18" fill="#00FFFF" filter="url(#neonGlow02)" opacity="0.7"/>
  <!-- Neon magenta particles -->
  <circle cx="550" cy="480" r="24" fill="#FF00FF" filter="url(#neonGlow02)"/>
  <circle cx="620" cy="540" r="16" fill="#FF00FF" opacity="0.8"/>
  <circle cx="500" cy="560" r="18" fill="#FF00FF" opacity="0.7"/>
  <!-- Neon yellow particles -->
  <circle cx="700" cy="680" r="22" fill="#FFFF00" filter="url(#neonGlow02)"/>
  <circle cx="760" cy="720" r="14" fill="#FFFF00" opacity="0.8"/>
  <circle cx="660" cy="730" r="16" fill="#FFFF00" opacity="0.7"/>
  <!-- Mixed small sparks -->
  <circle cx="310" cy="440" r="10" fill="#00FFFF" opacity="0.5"/>
  <circle cx="740" cy="380" r="10" fill="#FF00FF" opacity="0.5"/>
  <circle cx="440" cy="700" r="10" fill="#FFFF00" opacity="0.5"/>
  <circle cx="600" cy="260" r="10" fill="#FF00FF" opacity="0.5"/>
  <!-- 4-point star sparks -->
  <path d="M 280 280 L 280 256 M 280 280 L 304 280 M 280 280 L 280 304 M 280 280 L 256 280" stroke="#80FFFF" stroke-width="6" stroke-linecap="round" filter="url(#neonGlow02)"/>
  <path d="M 550 480 L 550 456 M 550 480 L 574 480 M 550 480 L 550 504 M 550 480 L 526 480" stroke="#FF80FF" stroke-width="6" stroke-linecap="round" filter="url(#neonGlow02)"/>
  <path d="M 700 680 L 700 656 M 700 680 L 724 680 M 700 680 L 700 704 M 700 680 L 676 680" stroke="#FFFF80" stroke-width="6" stroke-linecap="round" filter="url(#neonGlow02)"/>
</svg>