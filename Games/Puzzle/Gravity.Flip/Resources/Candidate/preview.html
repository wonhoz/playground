<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity.Flip — Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #a78bfa; letter-spacing: 2px; }
  p.sub { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 32px #a78bfa40; border-color: #a78bfa; }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card .label { margin-top: 10px; font-size: 12px; color: #aaa; line-height: 1.4; }
  .card .num { font-size: 18px; font-weight: bold; color: #a78bfa; }
</style>
</head>
<body>
<h1>Gravity.Flip</h1>
<p class="sub">Gravity puzzle game — flip gravity to solve levels | Icon Candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_gravity_flip_arrow.svg" alt="01"/><div class="label"><span class="num">01</span><br>Gravity Flip Arrow</div></div>
  <div class="card"><img src="candidate_02_upside_down_world.svg" alt="02"/><div class="label"><span class="num">02</span><br>Upside Down World</div></div>
  <div class="card"><img src="candidate_03_gravity_reverse_art.svg" alt="03"/><div class="label"><span class="num">03</span><br>Gravity Reverse Art</div></div>
  <div class="card"><img src="candidate_04_flip_world_puzzle.svg" alt="04"/><div class="label"><span class="num">04</span><br>Flip World Puzzle</div></div>
  <div class="card"><img src="candidate_05_anti_gravity_bubble.svg" alt="05"/><div class="label"><span class="num">05</span><br>Anti-Gravity Bubble</div></div>
  <div class="card"><img src="candidate_06_gravity_toggle.svg" alt="06"/><div class="label"><span class="num">06</span><br>Gravity Toggle</div></div>
  <div class="card"><img src="candidate_07_world_flip_puzzle.svg" alt="07"/><div class="label"><span class="num">07</span><br>World Flip Puzzle</div></div>
  <div class="card"><img src="candidate_08_inverse_gravity.svg" alt="08"/><div class="label"><span class="num">08</span><br>Inverse Gravity</div></div>
  <div class="card"><img src="candidate_09_falling_rising_art.svg" alt="09"/><div class="label"><span class="num">09</span><br>Falling + Rising Art</div></div>
  <div class="card"><img src="candidate_10_gravity_switch_neon.svg" alt="10"/><div class="label"><span class="num">10</span><br>Gravity Switch Neon</div></div>
</div>
</body>
</html>
