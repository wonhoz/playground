  <rect x="255" y="335" width="130" height="14" rx="7" fill="#81C784" opacity="0.4"/>
  <rect x="150" y="368" width="200" height="14" rx="7" fill="#81C784" opacity="0.5"/>
  <rect x="150" y="401" width="50" height="14" rx="7" fill="#81C784" opacity="0.3"/>
  <rect x="210" y="401" width="140" height="14" rx="7" fill="#81C784" opacity="0.4"/>
  <rect x="150" y="434" width="170" height="14" rx="7" fill="#81C784" opacity="0.6"/>
  <rect x="150" y="467" width="110" height="14" rx="7" fill="#81C784" opacity="0.35"/>
  <rect x="272" y="467" width="110" height="14" rx="7" fill="#81C784" opacity="0.25"/>
  <rect x="150" y="500" width="230" height="14" rx="7" fill="#81C784" opacity="0.4"/>
