<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1B2A"/>

  <!-- 대각선 배경 줄무늬 (동적 느낌) -->
  <line x1="0" y1="350" x2="1024" y2="150" stroke="#1A3A5C" stroke-width="3" opacity="0.4"/>
  <line x1="0" y1="560" x2="1024" y2="360" stroke="#1A3A5C" stroke-width="3" opacity="0.4"/>
  <line x1="0" y1="770" x2="1024" y2="570" stroke="#1A3A5C" stroke-width="3" opacity="0.4"/>

  <!-- Layer 2: 왼쪽 게임패드 버튼들 -->
  <!-- A 버튼 -->
  <circle cx="192" cy="318" r="58" fill="#1B4E1E"/>
  <circle cx="192" cy="318" r="44" fill="#43A047"/>
  <text x="192" y="318" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial" font-weight="bold">A</text>

  <!-- B 버튼 -->
  <circle cx="192" cy="458" r="58" fill="#7F0000"/>
  <circle cx="192" cy="458" r="44" fill="#E53935"/>
  <text x="192" y="458" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial" font-weight="bold">B</text>

  <!-- X 버튼 -->
  <circle cx="192" cy="598" r="58" fill="#0D3B6E"/>
  <circle cx="192" cy="598" r="44" fill="#1E88E5"/>
  <text x="192" y="598" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial" font-weight="bold">X</text>

  <!-- Y 버튼 -->
  <circle cx="192" cy="738" r="58" fill="#7A4000"/>
  <circle cx="192" cy="738" r="44" fill="#FB8C00"/>
  <text x="192" y="738" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="36" font-family="Arial" font-weight="bold">Y</text>

  <!-- Layer 3: 화살표 연결선들 -->
  <!-- A → ENT -->
  <line x1="250" y1="318" x2="725" y2="318" stroke="#00E5FF" stroke-width="5" stroke-dasharray="14,7"/>
  <polygon points="733,307 758,318 733,329" fill="#00E5FF"/>

  <!-- B → SPC -->
  <line x1="250" y1="458" x2="725" y2="458" stroke="#69F0AE" stroke-width="5" stroke-dasharray="14,7"/>
  <polygon points="733,447 758,458 733,469" fill="#69F0AE"/>

  <!-- X → CTRL -->
  <line x1="250" y1="598" x2="725" y2="598" stroke="#FFD740" stroke-width="5" stroke-dasharray="14,7"/>
  <polygon points="733,587 758,598 733,609" fill="#FFD740"/>

  <!-- Y → TAB -->
  <line x1="250" y1="738" x2="725" y2="738" stroke="#FF80AB" stroke-width="5" stroke-dasharray="14,7"/>
  <polygon points="733,727 758,738 733,749" fill="#FF80AB"/>

  <!-- 오른쪽 키보드 키들 -->
  <!-- ENT 키 -->
  <rect x="768" y="282" width="112" height="72" rx="12" fill="#103A50"/>
  <rect x="773" y="287" width="102" height="62" rx="9" fill="#0A2030" stroke="#00E5FF" stroke-width="2.5"/>
  <text x="824" y="318" text-anchor="middle" dominant-baseline="middle" fill="#00E5FF" font-size="24" font-family="Arial" font-weight="bold">ENT</text>

  <!-- SPC 키 -->
  <rect x="768" y="422" width="112" height="72" rx="12" fill="#0E3B2A"/>
  <rect x="773" y="427" width="102" height="62" rx="9" fill="#061E14" stroke="#69F0AE" stroke-width="2.5"/>
  <text x="824" y="458" text-anchor="middle" dominant-baseline="middle" fill="#69F0AE" font-size="24" font-family="Arial" font-weight="bold">SPC</text>

  <!-- CTRL 키 -->
  <rect x="768" y="562" width="112" height="72" rx="12" fill="#3D3000"/>
  <rect x="773" y="567" width="102" height="62" rx="9" fill="#1F1800" stroke="#FFD740" stroke-width="2.5"/>
  <text x="824" y="598" text-anchor="middle" dominant-baseline="middle" fill="#FFD740" font-size="22" font-family="Arial" font-weight="bold">CTRL</text>

  <!-- TAB 키 -->
  <rect x="768" y="702" width="112" height="72" rx="12" fill="#4A1030"/>
  <rect x="773" y="707" width="102" height="62" rx="9" fill="#250818" stroke="#FF80AB" stroke-width="2.5"/>
  <text x="824" y="738" text-anchor="middle" dominant-baseline="middle" fill="#FF80AB" font-size="24" font-family="Arial" font-weight="bold">TAB</text>
</svg>
