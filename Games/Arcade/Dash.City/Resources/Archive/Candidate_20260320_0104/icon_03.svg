<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#030510"/>
  <!-- 도로 원근법 -->
  <!-- 도로 면 -->
  <polygon points="512,200 900,880 124,880" fill="#0D47A1" opacity="0.3"/>
  <!-- 도로 경계선 -->
  <line x1="512" y1="200" x2="124" y2="880" stroke="#42A5F5" stroke-width="4" opacity="0.6"/>
  <line x1="512" y1="200" x2="900" y2="880" stroke="#42A5F5" stroke-width="4" opacity="0.6"/>
  <!-- 중앙 차선 (점선 원근) -->
  <line x1="512" y1="230" x2="512" y2="320" stroke="#42A5F5" stroke-width="6" opacity="0.8"/>
  <line x1="512" y1="360" x2="510" y2="480" stroke="#42A5F5" stroke-width="10" opacity="0.7"/>
  <line x1="510" y1="530" x2="508" y2="680" stroke="#42A5F5" stroke-width="16" opacity="0.6"/>
  <line x1="508" y1="730" x2="506" y2="880" stroke="#42A5F5" stroke-width="22" opacity="0.5"/>
  <!-- 왼쪽 차선 -->
  <line x1="430" y1="290" x2="330" y2="600" stroke="#42A5F5" stroke-width="4" stroke-dasharray="30,20" opacity="0.5"/>
  <!-- 오른쪽 차선 -->
  <line x1="594" y1="290" x2="694" y2="600" stroke="#42A5F5" stroke-width="4" stroke-dasharray="30,20" opacity="0.5"/>
  <!-- 지평선 도시 실루엣 -->
  <rect x="200" y="160" width="60" height="60" fill="#0D47A1" opacity="0.5"/>
  <rect x="280" y="140" width="45" height="80" fill="#0D47A1" opacity="0.5"/>
  <rect x="350" y="155" width="50" height="65" fill="#1565C0" opacity="0.5"/>
  <rect x="620" y="150" width="55" height="70" fill="#0D47A1" opacity="0.5"/>
  <rect x="695" y="138" width="50" height="82" fill="#1565C0" opacity="0.5"/>
  <rect x="765" y="155" width="60" height="65" fill="#0D47A1" opacity="0.5"/>
  <!-- 수평선 -->
  <line x1="100" y1="220" x2="924" y2="220" stroke="#42A5F5" stroke-width="3" opacity="0.4"/>
  <!-- 달리는 사람 실루엣 (작게 멀리) -->
  <circle cx="512" cy="260" r="14" fill="#42A5F5"/>
  <line x1="512" y1="274" x2="512" y2="316" stroke="#42A5F5" stroke-width="9" stroke-linecap="round"/>
  <line x1="512" y1="294" x2="490" y2="308" stroke="#42A5F5" stroke-width="7" stroke-linecap="round"/>
  <line x1="512" y1="294" x2="534" y2="308" stroke="#42A5F5" stroke-width="7" stroke-linecap="round"/>
  <line x1="502" y1="316" x2="488" y2="340" stroke="#42A5F5" stroke-width="7" stroke-linecap="round"/>
  <line x1="522" y1="316" x2="536" y2="340" stroke="#42A5F5" stroke-width="7" stroke-linecap="round"/>
</svg>
