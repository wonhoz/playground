<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="anvilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="100%" stop-color="#2a2a4a"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow aura -->
  <ellipse cx="256" cy="300" rx="180" ry="80" fill="url(#glowGrad)" opacity="0.5"/>
  <!-- Anvil -->
  <rect x="146" y="330" width="220" height="50" rx="10" fill="url(#anvilGrad)"/>
  <rect x="176" y="290" width="160" height="48" rx="8" fill="#3a3a5a"/>
  <rect x="126" y="278" width="260" height="22" rx="8" fill="url(#anvilGrad)"/>
  <!-- Big letter A being forged -->
  <path d="M180 270 L256 120 L332 270 M208 220 L304 220" stroke="url(#letterGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#shadow)"/>
  <!-- Hammer strike lines -->
  <line x1="310" y1="150" x2="340" y2="120" stroke="#c084fc" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="322" y1="148" x2="355" y2="130" stroke="#818cf8" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="315" y1="160" x2="350" y2="155" stroke="#c084fc" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>