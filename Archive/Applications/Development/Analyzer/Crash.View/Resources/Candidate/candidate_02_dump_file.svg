  <rect x="136" y="276" width="240" height="112" rx="6" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
  <text x="148" y="293" font-family="monospace" font-size="10" fill="#E53935">STACK TRACE:</text>
  <text x="148" y="309" font-family="monospace" font-size="10" fill="#546E7A">  ntdll!RtlRaiseException</text>
  <text x="148" y="323" font-family="monospace" font-size="10" fill="#546E7A">  kernel32!UnhandledExcep...</text>
  <text x="148" y="337" font-family="monospace" font-size="10" fill="#546E7A">  App.exe!main+0x2F</text>
  <text x="148" y="351" font-family="monospace" font-size="10" fill="#546E7A">  ...</text>
  <!-- Warning icon -->
  <polygon points="256,415 216,475 296,475" fill="#FF9800" stroke="#1E1E2E" stroke-width="4"/>
  <text x="256" y="468" text-anchor="middle" font-family="Arial Black" font-size="28" fill="white">!</text>
