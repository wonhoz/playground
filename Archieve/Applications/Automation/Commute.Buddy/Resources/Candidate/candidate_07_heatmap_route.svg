<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="heat1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Map grid faint -->
  <g stroke="#1E3A5F" stroke-width="1" opacity="0.5">
    <line x1="80" y1="80" x2="80" y2="432"/><line x1="160" y1="80" x2="160" y2="432"/>
    <line x1="240" y1="80" x2="240" y2="432"/><line x1="320" y1="80" x2="320" y2="432"/>
    <line x1="400" y1="80" x2="400" y2="432"/>
    <line x1="80" y1="80" x2="432" y2="80"/><line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="240" x2="432" y2="240"/><line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="80" y1="400" x2="432" y2="400"/>
  </g>
  <!-- Heatmap blobs -->
  <ellipse cx="200" cy="200" rx="90" ry="70" fill="url(#heat1)"/>
  <ellipse cx="300" cy="280" rx="80" ry="65" fill="url(#heat2)"/>
  <ellipse cx="160" cy="340" rx="65" ry="55" fill="url(#heat3)"/>
  <ellipse cx="370" cy="180" rx="70" ry="60" fill="url(#heat2)"/>
  <!-- Route line -->
  <path d="M100,400 L160,340 L200,200 L300,280 L370,180 L420,120" stroke="#00E5FF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Points -->
  <circle cx="100" cy="400" r="10" fill="#FF1744"/>
  <circle cx="200" cy="200" r="10" fill="#FF6D00"/>
  <circle cx="300" cy="280" r="10" fill="#FFD600"/>
  <circle cx="420" cy="120" r="14" fill="#00E5FF" stroke="white" stroke-width="3"/>
  <!-- Legend -->
  <rect x="80" y="452" width="352" height="26" rx="13" fill="#0D47A1" opacity="0.5"/>
  <rect x="88" y="458" width="24" height="12" rx="3" fill="#FF1744"/>
  <text x="118" y="469" font-family="'Segoe UI', sans-serif" font-size="11" fill="white">혼잡</text>
  <rect x="158" y="458" width="24" height="12" rx="3" fill="#FF6D00"/>
  <text x="188" y="469" font-family="'Segoe UI', sans-serif" font-size="11" fill="white">보통</text>
  <rect x="228" y="458" width="24" height="12" rx="3" fill="#FFD600"/>
  <text x="258" y="469" font-family="'Segoe UI', sans-serif" font-size="11" fill="white">원활</text>
  <rect x="298" y="458" width="24" height="12" rx="3" fill="#00E5FF"/>
  <text x="328" y="469" font-family="'Segoe UI', sans-serif" font-size="11" fill="white">최적</text>
</svg>
