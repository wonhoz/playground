    <rect x="692" y="326" width="34" height="28" rx="5"/>
  </g>
  <!-- 문제 키 (빨강) -->
  <rect x="732" y="326" width="34" height="28" rx="5" fill="#3A0808" stroke="#601010" stroke-width="2"/>
  <text x="749" y="344" text-anchor="middle" font-family="Consolas,monospace" font-size="9" fill="#FF6B6B">F12</text>

  <!-- 숫자열 -->
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="168" y="362" width="34" height="34" rx="5"/>
    <rect x="208" y="362" width="34" height="34" rx="5"/>
    <rect x="248" y="362" width="34" height="34" rx="5"/>
  </g>
  <!-- 현재 누르고 있는 키 (밝은 초록) -->
  <rect x="288" y="362" width="34" height="34" rx="5" fill="#206020" stroke="#40A040" stroke-width="3"/>
  <text x="305" y="382" text-anchor="middle" font-family="Consolas,monospace" font-size="11" fill="#6EFF6E">4</text>
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="328" y="362" width="34" height="34" rx="5"/>
    <rect x="368" y="362" width="34" height="34" rx="5"/>
    <rect x="408" y="362" width="34" height="34" rx="5"/>
    <rect x="448" y="362" width="34" height="34" rx="5"/>
    <rect x="488" y="362" width="34" height="34" rx="5"/>
