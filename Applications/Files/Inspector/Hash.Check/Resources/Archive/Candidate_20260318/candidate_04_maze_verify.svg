<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060f0b"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pathglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.063  0 0 0 0 0.725  0 0 0 0 0.506  0 0 0 1 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Maze walls (hash algorithm path visualization) -->
  <g stroke="#10B981" stroke-width="3" stroke-opacity="0.5" fill="none" stroke-linecap="square">
    <!-- Outer boundary -->
    <rect x="60" y="60" width="392" height="392" stroke-opacity="0.6"/>

    <!-- Maze internal walls (left section) -->
    <line x1="60" y1="116" x2="172" y2="116"/>
    <line x1="172" y1="60" x2="172" y2="116"/>
    <line x1="116" y1="116" x2="116" y2="228"/>
    <line x1="116" y1="228" x2="228" y2="228"/>
    <line x1="228" y1="172" x2="228" y2="228"/>
    <line x1="172" y1="172" x2="228" y2="172"/>
    <line x1="60" y1="228" x2="60" y2="228"/>

    <!-- Center section -->
    <line x1="284" y1="60" x2="284" y2="172"/>
    <line x1="228" y1="172" x2="340" y2="172"/>
    <line x1="340" y1="116" x2="340" y2="228"/>
    <line x1="284" y1="228" x2="452" y2="228"/>
    <line x1="396" y1="172" x2="452" y2="172"/>
    <line x1="452" y1="116" x2="452" y2="228"/>

    <!-- Lower section -->
    <line x1="60" y1="284" x2="172" y2="284"/>
    <line x1="116" y1="284" x2="116" y2="396"/>
    <line x1="60" y1="396" x2="228" y2="396"/>
    <line x1="228" y1="340" x2="228" y2="452"/>
    <line x1="172" y1="340" x2="284" y2="340"/>
    <line x1="284" y1="284" x2="284" y2="340"/>

    <!-- Right lower -->
    <line x1="340" y1="284" x2="396" y2="284"/>
    <line x1="396" y1="228" x2="396" y2="340"/>
    <line x1="340" y1="396" x2="452" y2="396"/>
    <line x1="452" y1="340" x2="452" y2="452"/>
    <line x1="340" y1="340" x2="340" y2="452"/>
  </g>

  <!-- Solution path (the verified hash path - glowing green) -->
  <polyline
    points="60,88 116,88 116,60 228,60 228,116 284,116 284,60 452,60 452,116 396,116 396,172 340,172 340,284 396,284 396,340 452,340 452,452 228,452 228,396 172,396 172,340 116,340 116,396 60,396 60,60"
    fill="none" stroke="#10B981" stroke-width="4" stroke-opacity="0.0"/>

  <!-- Animated solve path segments -->
  <polyline points="88,60 88,200 200,200 200,88 352,88 352,144 296,144 296,256 408,256 408,312 352,312 352,424 200,424 200,368 144,368 144,424 88,424 88,312 144,312 144,256 88,256 88,60"
    fill="none" stroke="#10B981" stroke-width="4.5" stroke-opacity="0.85" stroke-linecap="round" stroke-linejoin="round" filter="url(#pathglow)"/>

  <!-- Entry point -->
  <circle cx="88" cy="60" r="10" fill="#34D399" filter="url(#glow)"/>
  <!-- Exit/verify point -->
  <circle cx="88" cy="424" r="12" fill="#10B981" filter="url(#glow)"/>
  <!-- Checkmark at exit -->
  <path d="M81,424 L87,430 L97,416" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corner decorations -->
  <circle cx="60" cy="60" r="4" fill="#10B981" fill-opacity="0.5"/>
  <circle cx="452" cy="60" r="4" fill="#10B981" fill-opacity="0.5"/>
  <circle cx="60" cy="452" r="4" fill="#10B981" fill-opacity="0.5"/>
  <circle cx="452" cy="452" r="4" fill="#10B981" fill-opacity="0.5"/>
</svg>
