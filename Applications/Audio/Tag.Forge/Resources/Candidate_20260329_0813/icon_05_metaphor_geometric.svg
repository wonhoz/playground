<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: Music waveform + tag badge geometric pattern -->
  <!-- Waveform bars (audio visualization) -->
  <rect x="170" y="460" width="50" height="100" rx="14" fill="white" opacity="0.9"/>
  <rect x="240" y="400" width="50" height="220" rx="14" fill="white" opacity="0.9"/>
  <rect x="310" y="360" width="50" height="300" rx="14" fill="white" opacity="0.9"/>
  <rect x="380" y="420" width="50" height="180" rx="14" fill="white" opacity="0.9"/>
  <rect x="450" y="380" width="50" height="260" rx="14" fill="white" opacity="0.9"/>
  <rect x="520" y="430" width="50" height="160" rx="14" fill="#FDE047" opacity="0.9"/>
  <rect x="590" y="370" width="50" height="280" rx="14" fill="white" opacity="0.9"/>
  <rect x="660" y="410" width="50" height="200" rx="14" fill="white" opacity="0.9"/>
  <rect x="730" y="450" width="50" height="120" rx="14" fill="white" opacity="0.9"/>
  <rect x="800" y="470" width="50" height="80" rx="14" fill="white" opacity="0.9"/>
  <!-- Tag badge on top of highlighted bar -->
  <rect x="480" y="260" width="190" height="90" rx="18" fill="#2563EB" stroke="white" stroke-width="10"/>
  <text x="575" y="322" font-family="Arial" font-size="58" fill="white" text-anchor="middle" font-weight="bold">TAG</text>
  <!-- Pointer from tag badge to highlighted bar -->
  <line x1="545" y1="350" x2="545" y2="380" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <polygon points="545,384 532,366 558,366" fill="white" opacity="0.8"/>
  <!-- Musical note icons around waveform -->
  <text x="165" y="310" font-size="68" fill="white" opacity="0.4">♪</text>
  <text x="820" y="320" font-size="68" fill="white" opacity="0.4">♫</text>
  <!-- Layer 3: Tag labels below -->
  <text x="512" y="760" font-family="Arial" font-size="64" fill="white" text-anchor="middle" font-weight="bold">Title · Artist · Album</text>
</svg>
