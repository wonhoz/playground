<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="pen_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 주황 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <!-- 배경 원 장식 -->
  <circle cx="840" cy="200" r="240" fill="#EA580C" opacity="0.3" clip-path="url(#clip06)"/>
  <circle cx="200" cy="840" r="200" fill="#9A3412" opacity="0.25" clip-path="url(#clip06)"/>

  <!-- Layer 2: 벡터 패스 라인 (손이 그린 흔적) -->
  <!-- 흘러가는 S자 곡선 (금색) -->
  <path d="M 200,750 C 300,400 500,650 512,400 C 524,150 750,350 830,260"
        stroke="#FEF9C3" stroke-width="48" fill="none"
        stroke-linecap="round" opacity="0.6"/>

  <!-- 앵커 포인트들 -->
  <circle cx="200" cy="750" r="24" fill="white" opacity="0.85"/>
  <circle cx="512" cy="400" r="24" fill="white" opacity="0.85"/>
  <circle cx="830" cy="260" r="24" fill="white" opacity="0.85"/>

  <!-- 스타일러스/철필 실루엣 (대각선, 오른쪽 아래에서 왼쪽 위로 그리는 방향) -->
  <g transform="translate(660,360) rotate(-45)">
    <!-- 펜 배럴 (긴 몸통) -->
    <rect x="-18" y="-180" width="36" height="200" rx="10" fill="url(#pen_body)"/>
    <!-- 펜 팁 삼각형 -->
    <path d="M-18,20 L0,90 L18,20 Z" fill="#FDE68A"/>
    <!-- 팁 메탈 부분 -->
    <path d="M-10,20 L0,60 L10,20 Z" fill="#D4A017"/>
    <!-- 펜 클립 -->
    <rect x="12" y="-160" width="8" height="120" rx="4" fill="#F59E0B"/>
    <!-- 펜 상단 캡 -->
    <rect x="-16" y="-190" width="32" height="22" rx="8" fill="#92400E"/>
    <!-- 그립 텍스처 -->
    <rect x="-16" y="-60" width="32" height="80" rx="6" fill="#FBBF24" opacity="0.5"/>
    <line x1="-14" y1="-40" x2="14" y2="-40" stroke="#FDE68A" stroke-width="4" opacity="0.6"/>
    <line x1="-14" y1="-20" x2="14" y2="-20" stroke="#FDE68A" stroke-width="4" opacity="0.6"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#FDE68A" stroke-width="4" opacity="0.6"/>
  </g>

  <!-- Layer 3: 잉크/터치 효과 (팁 주변 빛남) -->
  <!-- 팁 끝에서 나오는 빛 -->
  <circle cx="510" cy="568" r="40" fill="#FDE68A" opacity="0.4"/>
  <circle cx="510" cy="568" r="20" fill="#FDE68A" opacity="0.7"/>
  <!-- 패스 포인트 하이라이트 -->
  <circle cx="512" cy="400" r="14" fill="#FBBF24"/>

  <!-- 맨 아래 SVG 텍스트 표시 (미니) -->
  <rect x="200" y="810" width="260" height="56" rx="14" fill="#9A3412" opacity="0.7"/>
  <text x="330" y="845" text-anchor="middle" font-family="Consolas,monospace" font-size="30" fill="#FEF3C7" font-weight="bold">&lt;path d="M..."/&gt;</text>
</svg>
