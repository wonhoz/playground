<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2DD4BF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 칼레이도스코프 패턴 — 좌측 (원본) -->
  <g transform="translate(130,220)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1a2a30" stroke-width="1.5" opacity="0.5"/>
    <!-- 섹터들 -->
    <path d="M0,0 L0,-110 A110,110 0 0,1 95,-57 Z" fill="#2DD4BF" opacity="0.15"/>
    <path d="M0,0 L95,-57 A110,110 0 0,1 95,57 Z" fill="#0891B2" opacity="0.15"/>
    <path d="M0,0 L95,57 A110,110 0 0,1 0,110 Z" fill="#2DD4BF" opacity="0.15"/>
    <path d="M0,0 L0,110 A110,110 0 0,1 -95,57 Z" fill="#0891B2" opacity="0.15"/>
    <path d="M0,0 L-95,57 A110,110 0 0,1 -95,-57 Z" fill="#2DD4BF" opacity="0.15"/>
    <path d="M0,0 L-95,-57 A110,110 0 0,1 0,-110 Z" fill="#0891B2" opacity="0.15"/>
    <!-- 테두리 -->
    <path d="M0,0 L0,-110 A110,110 0 0,1 95,-57 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
    <path d="M0,0 L95,-57 A110,110 0 0,1 95,57 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,0 L95,57 A110,110 0 0,1 0,110 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 L0,110 A110,110 0 0,1 -95,57 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,0 L-95,57 A110,110 0 0,1 -95,-57 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 L-95,-57 A110,110 0 0,1 0,-110 Z" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <!-- 내부 장식 -->
    <circle cx="0" cy="-60" r="10" fill="#2DD4BF" opacity="0.5"/>
    <circle cx="52" cy="-30" r="8" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="52" cy="30" r="10" fill="#2DD4BF" opacity="0.5"/>
    <circle cx="0" cy="60" r="8" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="-52" cy="30" r="10" fill="#2DD4BF" opacity="0.5"/>
    <circle cx="-52" cy="-30" r="8" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="0" cy="0" r="14" fill="url(#center)" filter="url(#glow)"/>
    <text x="0" y="130" text-anchor="middle" font-size="12" fill="#2DD4BF" opacity="0.7">Original</text>
  </g>
  <!-- 칼레이도스코프 패턴 — 우측 (변경됨) -->
  <g transform="translate(382,220)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1a2030" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,0 L0,-110 A110,110 0 0,1 95,-57 Z" fill="#F43F5E" opacity="0.12"/>
    <path d="M0,0 L95,-57 A110,110 0 0,1 95,57 Z" fill="#C084FC" opacity="0.12"/>
    <path d="M0,0 L95,57 A110,110 0 0,1 0,110 Z" fill="#F43F5E" opacity="0.12"/>
    <path d="M0,0 L0,110 A110,110 0 0,1 -95,57 Z" fill="#C084FC" opacity="0.12"/>
    <path d="M0,0 L-95,57 A110,110 0 0,1 -95,-57 Z" fill="#F43F5E" opacity="0.12"/>
    <path d="M0,0 L-95,-57 A110,110 0 0,1 0,-110 Z" fill="#C084FC" opacity="0.12"/>
    <path d="M0,0 L0,-110 A110,110 0 0,1 95,-57 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
    <path d="M0,0 L95,-57 A110,110 0 0,1 95,57 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,0 L95,57 A110,110 0 0,1 0,110 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 L0,110 A110,110 0 0,1 -95,57 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,0 L-95,57 A110,110 0 0,1 -95,-57 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" opacity="0.7"/>
    <path d="M0,0 L-95,-57 A110,110 0 0,1 0,-110 Z" fill="none" stroke="#F43F5E" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-60" r="10" fill="#F43F5E" opacity="0.5"/>
    <circle cx="52" cy="-30" r="8" fill="#F43F5E" opacity="0.4"/>
    <circle cx="52" cy="30" r="10" fill="#F43F5E" opacity="0.5"/>
    <circle cx="0" cy="60" r="8" fill="#F43F5E" opacity="0.4"/>
    <circle cx="-52" cy="30" r="10" fill="#F43F5E" opacity="0.5"/>
    <circle cx="-52" cy="-30" r="8" fill="#F43F5E" opacity="0.4"/>
    <circle cx="0" cy="0" r="14" fill="#F43F5E" opacity="0.4" filter="url(#glow)"/>
    <text x="0" y="130" text-anchor="middle" font-size="12" fill="#F43F5E" opacity="0.7">Modified</text>
  </g>
  <!-- 중앙 비교 화살표 -->
  <path d="M248,220 L264,220" stroke="#2DD4BF" stroke-width="2.5" marker-end="url(#a)" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="214" text-anchor="middle" font-size="18" fill="#2DD4BF" filter="url(#glow)" opacity="0.9">⇄</text>
  <!-- 하단 라벨 -->
  <text x="256" y="455" text-anchor="middle" font-size="14" fill="#2DD4BF" opacity="0.6" letter-spacing="4">KALEIDOSCOPE COMPARE</text>
</svg>
