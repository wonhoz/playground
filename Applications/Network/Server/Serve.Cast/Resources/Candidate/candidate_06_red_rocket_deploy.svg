<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <radialGradient id="exhaust" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="60%" stop-color="#ff6d00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="380" cy="100" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="440" cy="60" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="80" cy="200" r="2" fill="white" opacity="0.5"/>
  <circle cx="420" cy="180" r="2" fill="white" opacity="0.6"/>
  <circle cx="150" cy="300" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="460" cy="300" r="2" fill="white" opacity="0.5"/>
  <!-- Rocket body -->
  <path d="M256 80 Q290 110 295 200 L295 320 Q295 335 280 340 L232 340 Q217 335 217 320 L217 200 Q222 110 256 80 Z" fill="url(#rocket)"/>
  <!-- Rocket nose cone -->
  <path d="M256 80 Q290 110 295 175 L217 175 Q222 110 256 80 Z" fill="#ff8a80" opacity="0.6"/>
  <!-- Window -->
  <circle cx="256" cy="220" r="28" fill="#0d0d2b" stroke="#ff8a80" stroke-width="3"/>
  <circle cx="256" cy="220" r="20" fill="#1a1a2e"/>
  <circle cx="248" cy="212" r="6" fill="#4fc3f7" opacity="0.8"/>
  <!-- Fins -->
  <path d="M217 290 L175 350 L217 330 Z" fill="#c62828"/>
  <path d="M295 290 L337 350 L295 330 Z" fill="#c62828"/>
  <!-- Exhaust flames -->
  <ellipse cx="256" cy="380" rx="40" ry="55" fill="url(#exhaust)"/>
  <ellipse cx="256" cy="370" rx="22" ry="35" fill="#ff6d00" opacity="0.7"/>
  <ellipse cx="256" cy="362" rx="12" ry="22" fill="#ffd740" opacity="0.9"/>
  <!-- HTTP label on rocket -->
  <text x="256" y="445" font-family="sans-serif" font-size="22" fill="#ff8a80" text-anchor="middle" font-weight="bold" letter-spacing="2">:8080</text>
</svg>
