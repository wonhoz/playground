<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0808"/>
      <stop offset="100%" stop-color="#2A0E0E"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC2200"/>
      <stop offset="100%" stop-color="#881100"/>
    </linearGradient>
    <linearGradient id="shieldAccent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF4422" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield with bold red -->
  <path d="M 256,68 L 404,126 L 404,264 Q 404,378 256,444 Q 108,378 108,264 L 108,126 Z" fill="url(#shield)" filter="url(#glow)"/>
  <path d="M 256,68 L 404,126 L 404,264 Q 404,378 256,444 Q 108,378 108,264 L 108,126 Z" fill="url(#shieldAccent)"/>
  <!-- Shield border -->
  <path d="M 256,68 L 404,126 L 404,264 Q 404,378 256,444 Q 108,378 108,264 L 108,126 Z" fill="none" stroke="#FF6644" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <!-- Inner shield -->
  <path d="M 256,100 L 372,148 L 372,260 Q 372,356 256,414 Q 140,356 140,260 L 140,148 Z" fill="#991100" opacity="0.5"/>
  <!-- Windows service gear -->
  <circle cx="256" cy="264" r="70" fill="none" stroke="#FF8866" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="264" r="30" fill="#1A0808" stroke="#FFAA88" stroke-width="2.5"/>
  <!-- Gear teeth (8 teeth) -->
  <rect x="248" y="182" width="16" height="22" rx="4" fill="#FFAA88" opacity="0.8"/>
  <rect x="248" y="324" width="16" height="22" rx="4" fill="#FFAA88" opacity="0.8"/>
  <rect x="182" y="256" width="22" height="16" rx="4" fill="#FFAA88" opacity="0.8"/>
  <rect x="308" y="256" width="22" height="16" rx="4" fill="#FFAA88" opacity="0.8"/>
  <rect x="202" y="202" width="16" height="16" rx="3" fill="#FFAA88" opacity="0.7" transform="rotate(45, 210, 210)"/>
  <rect x="296" y="296" width="16" height="16" rx="3" fill="#FFAA88" opacity="0.7" transform="rotate(45, 304, 304)"/>
  <rect x="202" y="296" width="16" height="16" rx="3" fill="#FFAA88" opacity="0.7" transform="rotate(45, 210, 304)"/>
  <rect x="296" y="202" width="16" height="16" rx="3" fill="#FFAA88" opacity="0.7" transform="rotate(45, 304, 210)"/>
  <!-- Lightning bolt inside = protection/power -->
  <polygon points="266,236 248,268 258,268 246,296 278,256 264,256 278,236" fill="#FFCC44" filter="url(#glow)"/>
  <!-- Bottom status -->
  <text x="256" y="460" font-family="'Segoe UI', sans-serif" font-size="13" fill="#FF6644" text-anchor="middle" letter-spacing="2" filter="url(#glow)">GUARD ACTIVE</text>
</svg>
