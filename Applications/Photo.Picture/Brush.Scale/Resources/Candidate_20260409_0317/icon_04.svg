<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c4"><rect width="1024" height="1024" rx="190"/></clipPath>
    <clipPath id="lens"><circle cx="420" cy="460" r="220"/></clipPath>
  </defs>
  <!-- Layer 1: Mint green background -->
  <rect width="1024" height="1024" rx="190" fill="#D1FAE5"/>
  <g clip-path="url(#c4)">
    <!-- Layer 2: Lens glass (inner fill) -->
    <circle cx="420" cy="460" r="220" fill="#EFF6FF"/>
    <!-- Lens content: colorful sharp pixels inside lens -->
    <g clip-path="url(#lens)">
      <!-- Pixel grid showing sharp upscaled image -->
      <rect x="200" y="240" width="82" height="82" fill="#F97316"/>
      <rect x="282" y="240" width="82" height="82" fill="#2563EB"/>
      <rect x="364" y="240" width="82" height="82" fill="#059669"/>
      <rect x="446" y="240" width="82" height="82" fill="#EC4899"/>
      <rect x="528" y="240" width="82" height="82" fill="#FBBF24"/>
      <rect x="200" y="322" width="82" height="82" fill="#8B5CF6"/>
      <rect x="282" y="322" width="82" height="82" fill="#EF4444"/>
      <rect x="364" y="322" width="82" height="82" fill="#0EA5E9"/>
      <rect x="446" y="322" width="82" height="82" fill="#22C55E"/>
      <rect x="528" y="322" width="82" height="82" fill="#F97316"/>
      <rect x="200" y="404" width="82" height="82" fill="#06B6D4"/>
      <rect x="282" y="404" width="82" height="82" fill="#FBBF24"/>
      <rect x="364" y="404" width="82" height="82" fill="#F43F5E"/>
      <rect x="446" y="404" width="82" height="82" fill="#2563EB"/>
      <rect x="528" y="404" width="82" height="82" fill="#10B981"/>
      <rect x="200" y="486" width="82" height="82" fill="#EF4444"/>
      <rect x="282" y="486" width="82" height="82" fill="#7C3AED"/>
      <rect x="364" y="486" width="82" height="82" fill="#FBBF24"/>
      <rect x="446" y="486" width="82" height="82" fill="#F97316"/>
      <rect x="528" y="486" width="82" height="82" fill="#3B82F6"/>
      <rect x="200" y="568" width="82" height="82" fill="#059669"/>
      <rect x="282" y="568" width="82" height="82" fill="#EC4899"/>
      <rect x="364" y="568" width="82" height="82" fill="#0EA5E9"/>
      <rect x="446" y="568" width="82" height="82" fill="#22C55E"/>
      <rect x="528" y="568" width="82" height="82" fill="#EF4444"/>
      <rect x="200" y="650" width="82" height="82" fill="#FBBF24"/>
      <rect x="282" y="650" width="82" height="82" fill="#2563EB"/>
      <rect x="364" y="650" width="82" height="82" fill="#F97316"/>
      <rect x="446" y="650" width="82" height="82" fill="#8B5CF6"/>
      <rect x="528" y="650" width="82" height="82" fill="#10B981"/>
    </g>
    <!-- Layer 2: Magnifying glass ring (golden) -->
    <circle cx="420" cy="460" r="220" fill="none" stroke="#D97706" stroke-width="64"/>
    <!-- Layer 3: Handle (dark amber, thick diagonal) -->
    <line x1="588" y1="628" x2="810" y2="850" stroke="#78350F" stroke-width="80" stroke-linecap="round"/>
    <!-- Handle connector cap -->
    <circle cx="588" cy="628" r="40" fill="#78350F"/>
  </g>
</svg>
