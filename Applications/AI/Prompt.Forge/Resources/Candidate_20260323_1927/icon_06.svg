<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1B4D"/>
      <stop offset="100%" style="stop-color:#1A2F7A"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg6)"/>
  <!-- 망치 머리 -->
  <rect x="320" y="260" width="340" height="200" rx="40" fill="url(#hammer)" stroke="#B8860B" stroke-width="12"/>
  <!-- 망치 손잡이 -->
  <rect x="470" y="440" width="80" height="340" rx="30" fill="#D4A017" stroke="#B8860B" stroke-width="10"/>
  <!-- 망치 손잡이 하단 그립 -->
  <rect x="455" y="730" width="110" height="50" rx="20" fill="#B8860B"/>
  <!-- 오렌지 스파크 5개 -->
  <!-- 스파크 1 (우상) -->
  <line x1="700" y1="220" x2="760" y2="170" stroke="#FF6B00" stroke-width="18" stroke-linecap="round"/>
  <line x1="750" y1="210" x2="780" y2="230" stroke="#FF6B00" stroke-width="14" stroke-linecap="round"/>
  <!-- 스파크 2 (우) -->
  <line x1="740" y1="340" x2="820" y2="330" stroke="#FF8C00" stroke-width="16" stroke-linecap="round"/>
  <line x1="810" y1="310" x2="830" y2="360" stroke="#FF8C00" stroke-width="12" stroke-linecap="round"/>
  <!-- 스파크 3 (상) -->
  <line x1="490" y1="220" x2="480" y2="150" stroke="#FFA500" stroke-width="18" stroke-linecap="round"/>
  <line x1="460" y1="160" x2="510" y2="145" stroke="#FFA500" stroke-width="14" stroke-linecap="round"/>
  <!-- 스파크 4 (좌상) -->
  <line x1="300" y1="220" x2="240" y2="170" stroke="#FF6B00" stroke-width="16" stroke-linecap="round"/>
  <line x1="250" y1="160" x2="240" y2="200" stroke="#FF6B00" stroke-width="12" stroke-linecap="round"/>
  <!-- 스파크 5 (좌) -->
  <line x1="280" y1="360" x2="200" y2="370" stroke="#FFB300" stroke-width="16" stroke-linecap="round"/>
  <line x1="205" y1="345" x2="195" y2="385" stroke="#FFB300" stroke-width="12" stroke-linecap="round"/>
</svg>
