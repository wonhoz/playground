<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 스피너 룰렛 — 나라 선택 | 중앙심볼 | #1A0800 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0800"/>
  <!-- Layer 2: Spinning wheel with countries -->
  <!-- Wheel background -->
  <circle cx="512" cy="512" r="310" fill="#1A0800" stroke="#D97706" stroke-width="8"/>
  <!-- 8 segments -->
  <path d="M512 512 L512 202 A310 310 0 0 1 731 292 Z" fill="#1D4ED8" opacity="0.8"/>
  <path d="M512 512 L731 292 A310 310 0 0 1 822 512 Z" fill="#16A34A" opacity="0.8"/>
  <path d="M512 512 L822 512 A310 310 0 0 1 731 732 Z" fill="#DC2626" opacity="0.8"/>
  <path d="M512 512 L731 732 A310 310 0 0 1 512 822 Z" fill="#D97706" opacity="0.8"/>
  <path d="M512 512 L512 822 A310 310 0 0 1 293 732 Z" fill="#7C3AED" opacity="0.8"/>
  <path d="M512 512 L293 732 A310 310 0 0 1 202 512 Z" fill="#DC2626" opacity="0.8"/>
  <path d="M512 512 L202 512 A310 310 0 0 1 293 292 Z" fill="#16A34A" opacity="0.8"/>
  <path d="M512 512 L293 292 A310 512 0 0 1 512 202 Z" fill="#D97706" opacity="0.8"/>
  <!-- Country names on segments -->
  <text x="590" y="280" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(22 590 280)">한국</text>
  <text x="738" y="384" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(67 738 384)">일본</text>
  <text x="762" y="600" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(112 762 600)">프랑스</text>
  <text x="640" y="756" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(157 640 756)">독일</text>
  <text x="430" y="780" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(202 430 780)">미국</text>
  <text x="280" y="660" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(247 280 660)">브라질</text>
  <text x="252" y="440" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(292 252 440)">중국</text>
  <text x="374" y="278" font-family="Arial,sans-serif" font-size="16" fill="white" transform="rotate(337 374 278)">호주</text>
  <!-- Dividing lines -->
  <line x1="512" y1="202" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="731" y1="292" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="822" y1="512" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="731" y1="732" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="512" y1="822" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="293" y1="732" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="202" y1="512" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <line x1="293" y1="292" x2="512" y2="512" stroke="#D97706" stroke-width="3"/>
  <!-- Center hub -->
  <circle cx="512" cy="512" r="36" fill="#78350F" stroke="#D97706" stroke-width="4"/>
  <circle cx="512" cy="512" r="18" fill="#D97706"/>
  <!-- Layer 3: Pointer arrow (top) -->
  <polygon points="512,178 492,218 532,218" fill="#FCD34D" stroke="#D97706" stroke-width="3"/>
</svg>
