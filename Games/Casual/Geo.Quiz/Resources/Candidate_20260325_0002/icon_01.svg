<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#1565C0"/>

  <!-- Globe base circle -->
  <circle cx="512" cy="540" r="280" fill="#E3F2FD" stroke="#1565C0" stroke-width="10"/>

  <!-- Latitude lines -->
  <ellipse cx="512" cy="540" rx="280" ry="70" fill="none" stroke="#42A5F5" stroke-width="8"/>
  <ellipse cx="512" cy="540" rx="280" ry="160" fill="none" stroke="#42A5F5" stroke-width="8"/>
  <line x1="232" y1="540" x2="792" y2="540" stroke="#42A5F5" stroke-width="8"/>

  <!-- Longitude lines -->
  <ellipse cx="512" cy="540" rx="100" ry="280" fill="none" stroke="#42A5F5" stroke-width="8"/>
  <ellipse cx="512" cy="540" rx="200" ry="280" fill="none" stroke="#42A5F5" stroke-width="8"/>

  <!-- Continent silhouettes - simplified -->
  <!-- Americas -->
  <path d="M360,440 Q340,420 330,460 Q320,500 340,540 Q360,580 350,620 Q360,650 380,640 Q400,600 390,560 Q410,520 400,480 Q390,450 370,440 Z" fill="#4CAF50" opacity="0.85"/>
  <!-- Europe/Africa -->
  <path d="M490,420 Q510,410 520,430 Q540,420 550,440 Q560,460 545,490 Q555,510 550,540 Q545,575 530,595 Q510,610 495,600 Q475,590 470,565 Q460,540 470,510 Q460,485 465,460 Q470,435 490,420 Z" fill="#66BB6A" opacity="0.85"/>
  <!-- Asia -->
  <path d="M555,400 Q590,390 620,400 Q650,410 660,435 Q680,450 670,480 Q660,505 645,510 Q625,520 605,510 Q585,520 570,505 Q555,490 550,465 Q545,440 555,420 Z" fill="#81C784" opacity="0.85"/>

  <!-- Globe outline -->
  <circle cx="512" cy="540" r="280" fill="none" stroke="#0D47A1" stroke-width="14"/>

  <!-- Big question mark -->
  <text x="512" y="390" font-size="220" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" fill="#FFD600" stroke="#F57F17" stroke-width="8">?</text>

  <!-- Stars around globe -->
  <polygon points="215,310 225,340 255,340 232,358 241,388 215,368 189,388 198,358 175,340 205,340" fill="#FFD600"/>
  <polygon points="810,310 820,340 850,340 827,358 836,388 810,368 784,388 793,358 770,340 800,340" fill="#FFD600"/>
  <polygon points="215,700 222,722 246,722 228,735 235,758 215,744 195,758 202,735 184,722 208,722" fill="#FFD600"/>
  <polygon points="810,700 817,722 841,722 823,735 830,758 810,744 790,758 797,735 779,722 803,722" fill="#FFD600"/>
</svg>
