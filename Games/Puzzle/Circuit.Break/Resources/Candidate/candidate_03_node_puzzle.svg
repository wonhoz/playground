<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#1a2e44"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines (faint) -->
  <line x1="160" y1="80" x2="160" y2="432" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="256" y1="80" x2="256" y2="432" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="352" y1="80" x2="352" y2="432" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="80" y1="160" x2="432" y2="160" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="80" y1="352" x2="432" y2="352" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Connected circuit path -->
  <line x1="160" y1="160" x2="256" y2="160" stroke="#00aaff" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="160" x2="256" y2="256" stroke="#00aaff" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="352" y2="256" stroke="#00aaff" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="352" y1="256" x2="352" y2="352" stroke="#00aaff" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Broken section -->
  <line x1="160" y1="256" x2="220" y2="256" stroke="#ff4400" stroke-width="8" stroke-linecap="round" stroke-dasharray="10 8"/>
  <!-- Nodes -->
  <circle cx="160" cy="160" r="24" fill="url(#active)" filter="url(#glow)"/>
  <circle cx="256" cy="160" r="20" fill="url(#active)"/>
  <circle cx="256" cy="256" r="24" fill="url(#active)" filter="url(#glow)"/>
  <circle cx="352" cy="256" r="20" fill="url(#active)"/>
  <circle cx="352" cy="352" r="24" fill="url(#active)" filter="url(#glow)"/>
  <!-- Broken node -->
  <circle cx="160" cy="256" r="22" fill="#440000" stroke="#ff4400" stroke-width="4"/>
  <line x1="148" y1="244" x2="172" y2="268" stroke="#ff4400" stroke-width="5"/>
  <line x1="172" y1="244" x2="148" y2="268" stroke="#ff4400" stroke-width="5"/>
  <!-- Inactive nodes -->
  <circle cx="160" cy="352" r="20" fill="#1a2e44" stroke="#2a4a6a" stroke-width="3"/>
  <circle cx="256" cy="352" r="20" fill="#1a2e44" stroke="#2a4a6a" stroke-width="3"/>
  <!-- Source indicator -->
  <circle cx="160" cy="160" r="32" fill="none" stroke="#00aaff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <text x="160" y="165" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff">S</text>
  <text x="352" y="357" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff">E</text>
</svg>