<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Folder icon -->
  <rect x="180" y="340" width="440" height="360" rx="24" fill="#F59E0B"/>
  <rect x="180" y="280" width="220" height="100" rx="20" fill="#FBBF24"/>
  <!-- Right-click menu popup (layered on folder) -->
  <rect x="440" y="300" width="380" height="440" rx="18" fill="#FFFFFF" stroke="#3B82F6" stroke-width="6"/>
  <rect x="440" y="300" width="380" height="58" rx="18" fill="#3B82F6"/>
  <rect x="440" y="336" width="380" height="22" rx="0" fill="#3B82F6"/>
  <text x="630" y="340" font-family="Arial,sans-serif" font-size="40" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Menu</text>
  <text x="480" y="408" font-family="Arial,sans-serif" font-size="40" fill="#374151">📂 Open</text>
  <line x1="460" y1="426" x2="800" y2="426" stroke="#E5E7EB" stroke-width="2"/>
  <text x="480" y="478" font-family="Arial,sans-serif" font-size="40" fill="#374151">✂ Cut</text>
  <text x="480" y="534" font-family="Arial,sans-serif" font-size="40" fill="#374151">📋 Copy</text>
  <line x1="460" y1="554" x2="800" y2="554" stroke="#E5E7EB" stroke-width="2"/>
  <text x="480" y="606" font-family="Arial,sans-serif" font-size="40" fill="#374151">🔗 New link</text>
  <text x="480" y="662" font-family="Arial,sans-serif" font-size="40" fill="#374151">⚙ Properties</text>
  <!-- Edit badge -->
  <circle cx="820" cy="740" r="90" fill="#3B82F6"/>
  <text x="820" y="762" font-family="Arial,sans-serif" font-size="76" fill="#FFFFFF" font-weight="bold" text-anchor="middle">✎</text>
</svg>
