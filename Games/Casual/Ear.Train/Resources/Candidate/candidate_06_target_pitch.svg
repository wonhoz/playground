<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <linearGradient id="target" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Target rings -->
  <circle cx="256" cy="240" r="180" stroke="url(#target)" stroke-width="4" fill="none" opacity="0.3"/>
  <circle cx="256" cy="240" r="140" stroke="url(#target)" stroke-width="4" fill="none" opacity="0.5"/>
  <circle cx="256" cy="240" r="100" stroke="url(#target)" stroke-width="5" fill="none" opacity="0.7"/>
  <circle cx="256" cy="240" r="60" stroke="url(#target)" stroke-width="6" fill="none" opacity="0.9"/>
  <circle cx="256" cy="240" r="24" fill="url(#target)"/>
  <!-- Crosshair -->
  <line x1="256" y1="60" x2="256" y2="420" stroke="url(#target)" stroke-width="2" opacity="0.4"/>
  <line x1="76" y1="240" x2="436" y2="240" stroke="url(#target)" stroke-width="2" opacity="0.4"/>
  <!-- Musical notes orbiting -->
  <text x="160" y="130" font-family="serif" font-size="48" fill="white" opacity="0.8">♩</text>
  <text x="340" y="150" font-family="serif" font-size="40" fill="white" opacity="0.7">♪</text>
  <text x="380" y="330" font-family="serif" font-size="44" fill="white" opacity="0.6">♫</text>
  <text x="110" y="360" font-family="serif" font-size="36" fill="white" opacity="0.5">♬</text>
  <!-- Ear at center -->
  <path d="M256 215 C245 215 236 223 236 233 C236 241 241 248 249 251 C252 252 255 250 254 247 C248 244 244 239 244 233 C244 227 249 223 256 223 C263 223 268 227 268 233 L275 233 C275 223 266 215 256 215Z" fill="white" opacity="0.9"/>
