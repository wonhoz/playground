<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF4FF"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: Multiple overlapping browser frames suggesting continuous capture -->
  <!-- Frame 3 (back) -->
  <rect x="300" y="200" width="560" height="400" rx="18" fill="#A855F7" opacity="0.35"/>
  <!-- Frame 2 -->
  <rect x="240" y="250" width="560" height="400" rx="18" fill="#C084FC" opacity="0.5"/>
  <!-- Frame 1 (front) -->
  <rect x="180" y="300" width="560" height="400" rx="18" fill="white" opacity="0.92"/>
  <!-- Content indicator in front frame -->
  <rect x="200" y="340" width="520" height="40" rx="10" fill="#9333EA" opacity="0.7"/>
  <text x="460" y="371" font-family="monospace" font-size="28" fill="white" text-anchor="middle">https://...</text>
  <rect x="200" y="400" width="520" height="260" rx="10" fill="#F3E8FF"/>
  <!-- Geometric web content suggestion: grid of colored blocks -->
  <rect x="210" y="410" width="170" height="100" rx="8" fill="#A855F7" opacity="0.6"/>
  <rect x="390" y="410" width="160" height="100" rx="8" fill="#3B82F6" opacity="0.6"/>
  <rect x="560" y="410" width="150" height="100" rx="8" fill="#10B981" opacity="0.6"/>
  <rect x="210" y="520" width="500" height="18" rx="6" fill="#D1D5DB"/>
  <rect x="210" y="548" width="380" height="18" rx="6" fill="#D1D5DB"/>
  <rect x="210" y="576" width="450" height="18" rx="6" fill="#D1D5DB"/>
  <!-- Layer 3: Camera icon at bottom right -->
  <circle cx="810" cy="780" r="88" fill="#9333EA" opacity="0.9"/>
  <rect x="762" y="750" width="96" height="68" rx="12" fill="white" opacity="0.9"/>
  <circle cx="810" cy="784" r="24" fill="#9333EA"/>
  <rect x="796" y="738" width="28" height="18" rx="6" fill="white" opacity="0.8"/>
</svg>
