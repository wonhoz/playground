<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="spot1" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="guitar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stage floor -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="#0d0808"/>
  <rect x="0" y="390" width="512" height="20" rx="0" fill="#1a1010"/>
  <!-- Spotlights -->
  <polygon points="180,0 60,400 300,400" fill="url(#spot1)"/>
  <polygon points="332,0 220,400 444,400" fill="url(#spot2)"/>
  <!-- Guitar silhouette on stage -->
  <ellipse cx="256" cy="340" rx="65" ry="75" fill="url(#guitar)" opacity="0.95"/>
  <ellipse cx="256" cy="278" rx="50" ry="58" fill="url(#guitar)" opacity="0.9"/>
  <rect x="244" y="165" width="24" height="125" rx="6" fill="#aa3300"/>
  <!-- Guitar sound hole -->
  <circle cx="256" cy="315" r="22" fill="#1a0a00"/>
  <!-- Guitar strings glow -->
  <line x1="250" y1="170" x2="250" y2="345" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>
  <line x1="255" y1="170" x2="255" y2="345" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="170" x2="260" y2="345" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>
  <!-- Audience dots -->
  <circle cx="100" cy="420" r="8" fill="#333"/>
  <circle cx="140" cy="415" r="8" fill="#333"/>
  <circle cx="180" cy="422" r="8" fill="#333"/>
  <circle cx="332" cy="420" r="8" fill="#333"/>
  <circle cx="372" cy="415" r="8" fill="#333"/>
  <circle cx="412" cy="422" r="8" fill="#333"/>
  <!-- Lighters/phones light -->
  <circle cx="100" cy="412" r="4" fill="#ffcc00" opacity="0.7" filter="url(#glow)"/>
  <circle cx="372" cy="407" r="4" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="180" cy="414" r="3" fill="#ffaa00" opacity="0.7" filter="url(#glow)"/>
  <!-- Stars/sparkles -->
  <text x="80" y="100" font-size="30" fill="#ffcc00" opacity="0.4">✦</text>
  <text x="390" y="120" font-size="25" fill="#ffcc00" opacity="0.3">✦</text>
  <text x="430" y="70" font-size="20" fill="#ff6600" opacity="0.4">✦</text>
</svg>