  <rect x="160" y="540" width="480" height="22" rx="11" fill="#00838F" opacity="0.2"/>
  <rect x="160" y="624" width="520" height="22" rx="11" fill="#00838F" opacity="0.2"/>
  <rect x="160" y="668" width="440" height="22" rx="11" fill="#00838F" opacity="0.15"/>
