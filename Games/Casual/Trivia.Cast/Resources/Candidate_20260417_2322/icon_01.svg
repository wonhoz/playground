<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FF4081"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 2×2 카테고리 타일 -->
  <!-- 🔬 과학 -->
  <rect x="130" y="160" width="330" height="320" rx="28" fill="#E3F2FD"/>
  <text x="295" y="320" font-family="Segoe UI Emoji, sans-serif" font-size="160" text-anchor="middle">🔬</text>
  <!-- 🎬 영화 -->
  <rect x="564" y="160" width="330" height="320" rx="28" fill="#FFF9C4"/>
  <text x="729" y="320" font-family="Segoe UI Emoji, sans-serif" font-size="160" text-anchor="middle">🎬</text>
  <!-- ⚽ 스포츠 -->
  <rect x="130" y="544" width="330" height="320" rx="28" fill="#E8F5E9"/>
  <text x="295" y="704" font-family="Segoe UI Emoji, sans-serif" font-size="160" text-anchor="middle">⚽</text>
  <!-- 🎵 음악 -->
  <rect x="564" y="544" width="330" height="320" rx="28" fill="#F3E5F5"/>
  <text x="729" y="704" font-family="Segoe UI Emoji, sans-serif" font-size="160" text-anchor="middle">🎵</text>
  <!-- Layer 3: 중앙 퀴즈 배지 -->
  <circle cx="512" cy="512" r="68" fill="#FF4081"/>
  <text x="512" y="540" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">?</text>
</svg>
