<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 블루 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1A237E"/>
  <!-- Layer 2: 기능 태그 2×2 격자 -->
  <!-- JSON -->
  <rect x="100" y="100" width="380" height="180" rx="24" fill="#1565C0"/>
  <text x="290" y="218" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="96" fill="#64B5F6" text-anchor="middle">JSON</text>
  <!-- HASH -->
  <rect x="544" y="100" width="380" height="180" rx="24" fill="#6A1B9A"/>
  <text x="734" y="218" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="96" fill="#CE93D8" text-anchor="middle">HASH</text>
  <!-- JWT -->
  <rect x="100" y="320" width="380" height="180" rx="24" fill="#00695C"/>
  <text x="290" y="438" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="96" fill="#80CBC4" text-anchor="middle">JWT</text>
  <!-- Regex -->
  <rect x="544" y="320" width="380" height="180" rx="24" fill="#BF360C"/>
  <text x="734" y="438" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="96" fill="#FFAB91" text-anchor="middle">Regex</text>
  <!-- Layer 3: 하단 추가 태그들 -->
  <rect x="100" y="540" width="170" height="80" rx="16" fill="#F57F17" opacity="0.9"/>
  <text x="185" y="598" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">Base64</text>
  <rect x="294" y="540" width="170" height="80" rx="16" fill="#4527A0" opacity="0.9"/>
  <text x="379" y="598" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">Case</text>
  <rect x="488" y="540" width="200" height="80" rx="16" fill="#1B5E20" opacity="0.9"/>
  <text x="588" y="598" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">Epoch</text>
  <rect x="712" y="540" width="212" height="80" rx="16" fill="#880E4F" opacity="0.9"/>
  <text x="818" y="598" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">XML</text>
  <!-- 하단 브랜드 -->
  <text x="512" y="760" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="120" fill="white" text-anchor="middle">Text</text>
  <text x="512" y="880" font-family="'Segoe UI', Arial, sans-serif" font-weight="300" font-size="80" fill="#7986CB" text-anchor="middle">Forge</text>
</svg>
