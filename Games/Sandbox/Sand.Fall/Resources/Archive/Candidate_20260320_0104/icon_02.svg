<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
  <!-- 깔때기 + 모래 흐름: 깔때기 -->
  <!-- 깔때기 상단 (넓은 부분) -->
  <path d="M160,200 L864,200 L640,560 L384,560 Z" fill="#F9A825" opacity="0.85"/>
  <!-- 깔때기 입구 테두리 -->
  <rect x="160" y="188" width="704" height="26" rx="8" fill="#FFE082"/>
  <!-- 깔때기 목 -->
  <rect x="384" y="560" width="256" height="60" rx="0" fill="#F9A825" opacity="0.7"/>
  <!-- 모래 낙하 스트림 -->
  <rect x="454" y="620" width="116" height="200" rx="8" fill="#FFE082" opacity="0.6"/>
  <!-- 모래 알갱이들 (퍼지는) -->
  <circle cx="462" cy="840" r="10" fill="#FFE082"/>
  <circle cx="490" cy="860" r="8" fill="#F9A825"/>
  <circle cx="512" cy="870" r="10" fill="#FFE082"/>
  <circle cx="536" cy="855" r="7" fill="#F9A825"/>
  <circle cx="560" cy="840" r="9" fill="#FFE082"/>
  <circle cx="430" cy="860" r="7" fill="#F9A825"/>
  <circle cx="590" cy="860" r="8" fill="#FFE082"/>
  <circle cx="410" cy="880" r="6" fill="#F9A825"/>
  <circle cx="614" cy="878" r="6" fill="#FFE082"/>
  <!-- 깔때기 안 내용물 -->
  <ellipse cx="512" cy="370" rx="200" ry="80" fill="#FFE082" opacity="0.4"/>
  <!-- 깔때기 테두리 선 -->
  <path d="M160,200 L384,560 L384,620 L454,620 L454,820" stroke="#FFE082" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M864,200 L640,560 L640,620 L570,620 L570,820" stroke="#FFE082" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
