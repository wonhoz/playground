<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 수정 다이아몬드 -->
  <polygon points="256,90 370,200 370,340 256,440 142,340 142,200" fill="#8B5CF6" opacity="0.07"/>
  <polygon points="256,90 370,200 370,340 256,440 142,340 142,200" fill="none" stroke="#8B5CF6" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 수정 면들 -->
  <polygon points="256,90 370,200 256,250" fill="#8B5CF6" opacity="0.1"/>
  <polygon points="256,90 142,200 256,250" fill="#A78BFA" opacity="0.08"/>
  <polygon points="142,200 256,250 142,340" fill="#8B5CF6" opacity="0.07"/>
  <polygon points="370,200 256,250 370,340" fill="#A78BFA" opacity="0.07"/>
  <polygon points="142,340 256,250 256,440" fill="#8B5CF6" opacity="0.09"/>
  <polygon points="370,340 256,250 256,440" fill="#A78BFA" opacity="0.09"/>
  <!-- 수정 내부 선들 -->
  <line x1="256" y1="90" x2="256" y2="440" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3"/>
  <line x1="142" y1="200" x2="370" y2="340" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
  <line x1="370" y1="200" x2="142" y2="340" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <!-- 버텍스 -->
  <circle cx="256" cy="90" r="8" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="370" cy="200" r="7" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="370" cy="340" r="7" fill="#8B5CF6"/>
  <circle cx="256" cy="440" r="7" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="142" cy="340" r="7" fill="#8B5CF6"/>
  <circle cx="142" cy="200" r="7" fill="#A78BFA" filter="url(#glow)"/>
  <!-- 중앙 API 코어 -->
  <circle cx="256" cy="250" r="22" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="256" cy="250" r="14" fill="#8B5CF6" opacity="0.7" filter="url(#glow)"/>
  <text x="256" y="254" text-anchor="middle" fill="white" font-size="8" font-family="monospace">API</text>
</svg>