<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#2a1010"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff2200"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Thermometers arranged in a row -->
  <!-- Thermo 1 - CPU temp -->
  <rect x="100" y="120" width="30" height="240" rx="15" fill="#1a1a2a" stroke="#333" stroke-width="2"/>
  <rect x="108" y="130" width="14" height="220" rx="7" fill="#0a0a15"/>
  <!-- Mercury fill for CPU (62°C out of 100) -->
  <rect x="109" y="195" width="12" height="155" rx="6" fill="url(#mercury)"/>
  <circle cx="115" cy="370" r="20" fill="#ff4400"/>
  <circle cx="115" cy="370" r="14" fill="#ff6622"/>
  <!-- CPU label -->
  <text x="115" y="100" font-size="15" fill="#ff6622" font-family="monospace" text-anchor="middle">CPU</text>
  <text x="115" y="460" font-size="18" fill="#ff4400" font-family="monospace" text-anchor="middle" font-weight="bold">62°C</text>
  <!-- Tick marks for thermo 1 -->
  <line x1="130" y1="150" x2="145" y2="150" stroke="#555" stroke-width="1"/>
  <line x1="130" y1="200" x2="150" y2="200" stroke="#555" stroke-width="1"/>
  <text x="152" y="204" font-size="12" fill="#555">100</text>
  <line x1="130" y1="250" x2="145" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="130" y1="300" x2="150" y2="300" stroke="#555" stroke-width="1"/>
  <text x="152" y="304" font-size="12" fill="#555">50</text>
  <line x1="130" y1="350" x2="145" y2="350" stroke="#555" stroke-width="1"/>
  <!-- Thermo 2 - GPU temp -->
  <rect x="220" y="140" width="30" height="220" rx="15" fill="#1a1a2a" stroke="#333" stroke-width="2"/>
  <rect x="228" y="150" width="14" height="200" rx="7" fill="#0a0a15"/>
  <rect x="229" y="240" width="12" height="110" rx="6" fill="url(#mercury)"/>
  <circle cx="235" cy="370" r="20" fill="#ff8800"/>
  <circle cx="235" cy="370" r="14" fill="#ffaa44"/>
  <text x="235" y="118" font-size="15" fill="#ffaa44" font-family="monospace" text-anchor="middle">GPU</text>
  <text x="235" y="460" font-size="18" fill="#ff8800" font-family="monospace" text-anchor="middle" font-weight="bold">55°C</text>
  <!-- Thermo 3 - System temp -->
  <rect x="340" y="160" width="30" height="200" rx="15" fill="#1a1a2a" stroke="#333" stroke-width="2"/>
  <rect x="348" y="170" width="14" height="180" rx="7" fill="#0a0a15"/>
  <rect x="349" y="265" width="12" height="85" rx="6" fill="#4488ff"/>
  <circle cx="355" cy="370" r="20" fill="#2266dd"/>
  <circle cx="355" cy="370" r="14" fill="#4488ff"/>
  <text x="355" y="138" font-size="15" fill="#4488ff" font-family="monospace" text-anchor="middle">SYS</text>
  <text x="355" y="460" font-size="18" fill="#4488ff" font-family="monospace" text-anchor="middle" font-weight="bold">42°C</text>
  <!-- Fan speed indicator -->
  <circle cx="256" cy="256" r="22" fill="#1a1a2a" stroke="#333" stroke-width="2"/>
  <path d="M256 234 Q270 248 256 262 Q242 248 256 234Z" fill="#555" transform="rotate(0 256 256)"/>
  <path d="M256 234 Q270 248 256 262 Q242 248 256 234Z" fill="#555" transform="rotate(120 256 256)"/>
  <path d="M256 234 Q270 248 256 262 Q242 248 256 234Z" fill="#555" transform="rotate(240 256 256)"/>
  <circle cx="256" cy="256" r="5" fill="#888"/>
</svg>