  <!-- Row 2 -->
  <rect x="60" y="160" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="80" y="202" font-family="serif" font-size="30">📁</text>
  <rect x="140" y="160" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="160" y="202" font-family="serif" font-size="30">🎵</text>
  <rect x="220" y="160" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="242" y="202" font-family="serif" font-size="30">🌍</text>
  <rect x="300" y="160" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="320" y="202" font-family="serif" font-size="30">🚀</text>
  <rect x="380" y="160" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="400" y="202" font-family="serif" font-size="30">💡</text>
  <!-- Row 3 faded -->
  <rect x="60" y="240" width="64" height="64" rx="12" fill="#1e3a5a" fill-opacity="0.5"/>
  <rect x="140" y="240" width="64" height="64" rx="12" fill="#1e3a5a" fill-opacity="0.5"/>
  <rect x="220" y="240" width="64" height="64" rx="12" fill="#1e3a5a" fill-opacity="0.5"/>
  <rect x="300" y="240" width="64" height="64" rx="12" fill="#1e3a5a" fill-opacity="0.5"/>
  <rect x="380" y="240" width="64" height="64" rx="12" fill="#1e3a5a" fill-opacity="0.5"/>
  <!-- Magnifier over grid -->
  <circle cx="300" cy="108" r="55" fill="none" stroke="#4488ff" stroke-width="5"/>
  <line x1="342" y1="150" x2="380" y2="188" stroke="#4488ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Search bar -->
  <rect x="60" y="330" width="392" height="48" rx="24" fill="#1e3a5a" stroke="#4488ff" stroke-width="2"/>
  <text x="90" y="362" font-family="sans-serif" font-size="18" fill="#88aacc">Search icons...</text>
  <circle cx="432" cy="354" r="14" fill="#4488ff"/>
  <line x1="426" y1="348" x2="438" y2="360" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="422" cy="345" r="7" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Results count -->
  <text x="100" y="420" font-family="sans-serif" font-size="16" fill="#4488ff">2,847 icons found</text>
