<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0500"/>
  <!-- Crystal diamond — precision vector form -->
  <!-- Main diamond facets -->
  <polygon points="512,160 780,440 512,860 244,440" fill="#E65100" opacity="0.75"/>
  <!-- Top facet -->
  <polygon points="512,160 780,440 512,420 244,440" fill="#FF8A65" opacity="0.85"/>
  <!-- Left facet -->
  <polygon points="244,440 512,420 512,860" fill="#E65100" opacity="0.6"/>
  <!-- Right facet -->
  <polygon points="780,440 512,420 512,860" fill="#FF8A65" opacity="0.45"/>
  <!-- Center facet line -->
  <line x1="512" y1="160" x2="512" y2="860" stroke="#FF8A65" stroke-width="3" opacity="0.5"/>
  <line x1="244" y1="440" x2="780" y2="440" stroke="#FF8A65" stroke-width="3" opacity="0.5"/>
  <!-- Gem top cut lines -->
  <line x1="512" y1="160" x2="400" y2="310" stroke="#FF8A65" stroke-width="4" opacity="0.6"/>
  <line x1="512" y1="160" x2="624" y2="310" stroke="#FF8A65" stroke-width="4" opacity="0.6"/>
  <line x1="400" y1="310" x2="244" y2="440" stroke="#FF8A65" stroke-width="4" opacity="0.45"/>
  <line x1="624" y1="310" x2="780" y2="440" stroke="#FF8A65" stroke-width="4" opacity="0.45"/>
  <!-- Sparkle -->
  <circle cx="620" cy="250" r="10" fill="#FF8A65" opacity="0.9"/>
  <line x1="620" y1="225" x2="620" y2="275" stroke="#FF8A65" stroke-width="4" opacity="0.7"/>
  <line x1="595" y1="250" x2="645" y2="250" stroke="#FF8A65" stroke-width="4" opacity="0.7"/>
</svg>
