<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 포맷 확장자 레이블들 | 공간/장면 | #111827 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#111827"/>
  <!-- Layer 2: File format tiles scattered -->
  <!-- SVG file tile -->
  <rect x="160" y="230" width="200" height="220" rx="16" fill="#7C3AED"/>
  <polygon points="316,230 360,274 316,274" fill="#5B21B6"/>
  <text x="260" y="380" font-family="Arial,sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">SVG</text>
  <text x="260" y="416" font-family="Arial,sans-serif" font-size="16" fill="#DDD6FE" text-anchor="middle">Vector</text>
  <!-- PNG file tile -->
  <rect x="412" y="200" width="200" height="220" rx="16" fill="#2563EB"/>
  <polygon points="568,200 612,244 568,244" fill="#1D4ED8"/>
  <text x="512" y="350" font-family="Arial,sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">PNG</text>
  <text x="512" y="386" font-family="Arial,sans-serif" font-size="16" fill="#BFDBFE" text-anchor="middle">Raster</text>
  <!-- JPG file tile -->
  <rect x="664" y="230" width="200" height="220" rx="16" fill="#059669"/>
  <polygon points="820,230 864,274 820,274" fill="#047857"/>
  <text x="764" y="380" font-family="Arial,sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">JPG</text>
  <text x="764" y="416" font-family="Arial,sans-serif" font-size="16" fill="#D1FAE5" text-anchor="middle">Photo</text>
  <!-- ICO result tile (centered, highlighted) -->
  <rect x="312" y="560" width="400" height="260" rx="20" fill="#F59E0B" stroke="#FDE68A" stroke-width="4"/>
  <text x="512" y="660" font-family="Arial,sans-serif" font-size="72" fill="#1C1100" text-anchor="middle" font-weight="bold">ICO</text>
  <text x="512" y="710" font-family="Arial,sans-serif" font-size="20" fill="#451A00" text-anchor="middle">Multi-Size Icon</text>
  <!-- Size badges -->
  <rect x="335" y="740" width="70" height="32" rx="8" fill="#D97706"/>
  <text x="370" y="761" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle">256px</text>
  <rect x="422" y="740" width="70" height="32" rx="8" fill="#D97706"/>
  <text x="457" y="761" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle">48px</text>
  <rect x="509" y="740" width="60" height="32" rx="8" fill="#D97706"/>
  <text x="539" y="761" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle">32px</text>
  <rect x="586" y="740" width="60" height="32" rx="8" fill="#D97706"/>
  <text x="616" y="761" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle">16px</text>
  <!-- Layer 3: Conversion arrows -->
  <path d="M360 450 Q390 520 430 560" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <polygon points="420,556 446,570 430,545" fill="#F59E0B"/>
  <path d="M512 420 L512 560" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <polygon points="490,554 512,574 534,554" fill="#F59E0B"/>
  <path d="M664 450 Q630 520 594 560" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <polygon points="602,545 578,570 594,556" fill="#F59E0B"/>
</svg>
