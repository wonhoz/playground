<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: Literal / 중앙 심볼 / 플레이어 + 탄막 + 건설 망치 -->
  <!-- 배경: 딥 네이비 -->
  <rect width="1024" height="1024" rx="160" fill="#0D1B2A"/>

  <!-- 배경 장식 격자 -->
  <g opacity="0.08" stroke="#4A9EFF" stroke-width="1.5" fill="none">
    <line x1="200" y1="0" x2="200" y2="1024"/>
    <line x1="400" y1="0" x2="400" y2="1024"/>
    <line x1="600" y1="0" x2="600" y2="1024"/>
    <line x1="800" y1="0" x2="800" y2="1024"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="800" x2="1024" y2="800"/>
  </g>

  <!-- 중앙 방패/벽 구조물 (파랑) -->
  <rect x="390" y="370" width="244" height="284" rx="18" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="6"/>
  <rect x="420" y="400" width="80" height="80" rx="8" fill="#2E6FFF" opacity="0.7"/>
  <rect x="524" y="400" width="80" height="80" rx="8" fill="#2E6FFF" opacity="0.7"/>
  <rect x="420" y="504" width="80" height="80" rx="8" fill="#2E6FFF" opacity="0.7"/>
  <rect x="524" y="504" width="80" height="80" rx="8" fill="#2E6FFF" opacity="0.7"/>
  <rect x="420" y="608" width="184" height="22" rx="8" fill="#4A9EFF" opacity="0.5"/>

  <!-- 플레이어 (핑크, 중앙 위) -->
  <circle cx="512" cy="280" r="42" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="5"/>
  <polygon points="512,238 490,270 534,270" fill="#FF3399" opacity="0.9"/>
  <circle cx="512" cy="280" r="18" fill="#FFD6EC"/>
  <!-- 플레이어 방향 화살표 (아래로 이동) -->
  <path d="M512 326 L498 348 L512 342 L526 348 Z" fill="#FF6EB4" opacity="0.7"/>

  <!-- 탄막 총알들 (빨강, 날아오는 방향) -->
  <circle cx="310" cy="430" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="258" cy="510" r="11" fill="#FF3333" stroke="#FF6666" stroke-width="2.5"/>
  <circle cx="290" cy="590" r="9" fill="#FF5555" stroke="#FF8888" stroke-width="2"/>
  <circle cx="714" cy="450" r="14" fill="#FF3333" stroke="#FF6666" stroke-width="3"/>
  <circle cx="760" cy="520" r="11" fill="#FF3333" stroke="#FF6666" stroke-width="2.5"/>
  <circle cx="730" cy="610" r="9" fill="#FF5555" stroke="#FF8888" stroke-width="2"/>

  <!-- 탄막 궤적 -->
  <line x1="340" y1="430" x2="388" y2="450" stroke="#FF3333" stroke-width="2.5" opacity="0.5" stroke-dasharray="6,4"/>
  <line x1="680" y1="450" x2="636" y2="470" stroke="#FF3333" stroke-width="2.5" opacity="0.5" stroke-dasharray="6,4"/>

  <!-- 망치 (건설 요소, 우하단) -->
  <g transform="translate(660, 680) rotate(-35)">
    <rect x="-12" y="-80" width="24" height="100" rx="8" fill="#C8A45A"/>
    <rect x="-34" y="-112" width="68" height="40" rx="10" fill="#8B6914"/>
    <rect x="-28" y="-108" width="14" height="32" rx="4" fill="#C8A45A" opacity="0.5"/>
  </g>

  <!-- 자원 픽업 (오렌지 다이아몬드) -->
  <polygon points="512,740 535,768 512,796 489,768" fill="#FF8C00" stroke="#FFB347" stroke-width="3"/>
  <polygon points="512,752 525,768 512,784 499,768" fill="#FFD700" opacity="0.8"/>
</svg>
