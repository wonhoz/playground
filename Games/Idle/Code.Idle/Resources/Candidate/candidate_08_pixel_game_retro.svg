<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0221"/>
      <stop offset="100%" stop-color="#160537"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel art coder character -->
  <!-- Head -->
  <rect x="216" y="130" width="80" height="70" rx="0" fill="#FFCC80"/>
  <!-- Hair -->
  <rect x="216" y="130" width="80" height="20" fill="#4A148C"/>
  <rect x="200" y="134" width="20" height="16" fill="#4A148C"/>
  <!-- Eyes -->
  <rect x="232" y="164" width="12" height="12" fill="#1A237E"/>
  <rect x="268" y="164" width="12" height="12" fill="#1A237E"/>
  <!-- Glasses -->
  <rect x="228" y="162" width="20" height="16" rx="0" fill="none" stroke="#7C4DFF" stroke-width="3"/>
  <rect x="264" y="162" width="20" height="16" rx="0" fill="none" stroke="#7C4DFF" stroke-width="3"/>
  <line x1="248" y1="170" x2="264" y2="170" stroke="#7C4DFF" stroke-width="2"/>
  <!-- Body (hoodie) -->
  <rect x="196" y="200" width="120" height="90" fill="#311B92"/>
  <!-- Laptop -->
  <rect x="170" y="270" width="172" height="100" rx="6" fill="#1A1A2E"/>
  <rect x="178" y="278" width="156" height="70" rx="4" fill="#0D0D1F"/>
  <!-- Code on laptop screen -->
  <rect x="186" y="286" width="80" height="7" rx="2" fill="#7C4DFF"/>
  <rect x="186" y="300" width="60" height="7" rx="2" fill="#E040FB"/>
  <rect x="186" y="314" width="70" height="7" rx="2" fill="#40C4FF"/>
  <rect x="186" y="328" width="50" height="7" rx="2" fill="#69F0AE"/>
  <!-- Floating coins -->
  <circle cx="380" cy="200" r="20" fill="#FFD700"/>
  <text x="380" y="206" text-anchor="middle" font-size="16" fill="#1A1200" font-weight="bold" font-family="Arial">$</text>
  <circle cx="418" cy="240" r="15" fill="#FFD700" opacity="0.7"/>
  <circle cx="355" cy="248" r="12" fill="#FFD700" opacity="0.6"/>
</svg>
