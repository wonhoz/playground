<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#152232"/>
    </linearGradient>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magic wand staff -->
  <rect x="285" y="105" width="18" height="280" rx="9" fill="url(#wandGrad)" transform="rotate(35 294 245)" filter="url(#sparkGlow)"/>
  <!-- Wand tip gem -->
  <polygon points="305,118 325,148 305,168 285,148" fill="#ffd700" filter="url(#sparkGlow)"/>
  <ellipse cx="305" cy="143" rx="22" ry="22" fill="url(#tipGlow)"/>
  <!-- Sparkles around wand tip -->
  <g filter="url(#sparkGlow)">
    <line x1="305" y1="110" x2="305" y2="95" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="322" y1="117" x2="332" y2="107" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="328" y1="135" x2="345" y2="130" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="322" y1="155" x2="335" y2="162" stroke="#ff8c00" stroke-width="2.5"/>
    <line x1="288" y1="117" x2="278" y2="107" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="282" y1="135" x2="265" y2="130" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="288" y1="155" x2="275" y2="163" stroke="#ff8c00" stroke-width="2.5"/>
  </g>
  <!-- Floating stars -->
  <g fill="#ffd700" filter="url(#sparkGlow)">
    <polygon points="145,190 150,205 165,205 153,215 158,230 145,220 132,230 137,215 125,205 140,205" opacity="0.8" transform="scale(0.55) translate(120,155)"/>
    <polygon points="385,260 389,272 401,272 392,279 395,291 385,284 375,291 378,279 369,272 381,272" opacity="0.7" transform="scale(0.5) translate(400,270)"/>
    <polygon points="120,320 123,330 133,330 125,336 128,346 120,340 112,346 115,336 107,330 117,330" opacity="0.6"/>
  </g>
  <!-- Clipboard / paste target -->
  <rect x="120" y="240" width="175" height="220" rx="12" fill="url(#pageGrad)" stroke="#7c4dff" stroke-width="2.5"/>
  <rect x="168" y="228" width="80" height="26" rx="7" fill="url(#pageGrad)" stroke="#7c4dff" stroke-width="2.5"/>
  <rect x="176" y="233" width="64" height="16" rx="4" fill="#7c4dff" fill-opacity="0.4"/>
  <!-- Lines appearing (pasted) -->
  <line x1="140" y1="285" x2="277" y2="285" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>
  <line x1="140" y1="310" x2="265" y2="310" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
  <line x1="140" y1="335" x2="270" y2="335" stroke="#7c4dff" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="360" x2="250" y2="360" stroke="#7c4dff" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="383" x2="262" y2="383" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="406" x2="240" y2="406" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <!-- Magic paste particles -->
  <circle cx="285" cy="260" r="4" fill="#ffd700" opacity="0.7" filter="url(#sparkGlow)"/>
  <circle cx="300" cy="285" r="3" fill="#ff8c00" opacity="0.6" filter="url(#sparkGlow)"/>
  <circle cx="295" cy="310" r="5" fill="#ffd700" opacity="0.5" filter="url(#sparkGlow)"/>
</svg>