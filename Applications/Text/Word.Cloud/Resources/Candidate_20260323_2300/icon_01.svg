<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <clipPath id="clip01"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <g clip-path="url(#clip01)">
    <!-- 구름 실루엣 배경 -->
    <ellipse cx="512" cy="560" rx="340" ry="180" fill="#2563EB" opacity="0.35"/>
    <ellipse cx="370" cy="500" rx="180" ry="140" fill="#2563EB" opacity="0.35"/>
    <ellipse cx="650" cy="490" rx="200" ry="150" fill="#2563EB" opacity="0.35"/>
    <ellipse cx="512" cy="430" rx="250" ry="160" fill="#2563EB" opacity="0.35"/>
    <!-- 큰 단어 -->
    <text x="512" y="430" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="#FDE68A" opacity="0.97">CLOUD</text>
    <!-- 중간 단어들 -->
    <text x="310" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="62" fill="#60A5FA">WORD</text>
    <text x="680" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="58" fill="#60A5FA">DATA</text>
    <!-- 작은 단어들 -->
    <text x="240" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" fill="#BAE6FD" opacity="0.9">LOVE</text>
    <text x="430" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#FDE68A" opacity="0.8">life</text>
    <text x="600" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#BAE6FD" opacity="0.85">TEXT</text>
    <text x="760" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#FDE68A" opacity="0.75">art</text>
    <text x="340" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#60A5FA" opacity="0.7">font</text>
    <text x="520" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#BAE6FD" opacity="0.65">size</text>
    <text x="680" y="688" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#FDE68A" opacity="0.6">color</text>
    <!-- 맨 위 작은 단어들 -->
    <text x="390" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#BAE6FD" opacity="0.7">big</text>
    <text x="640" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#FDE68A" opacity="0.65">words</text>
  </g>
</svg>
