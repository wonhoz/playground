<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Growing bubbles (progress) -->
  <circle cx="260" cy="720" r="60" fill="#1B5E20" fill-opacity="0.5"/>
  <circle cx="400" cy="660" r="90" fill="#1B5E20" fill-opacity="0.6"/>
  <circle cx="560" cy="590" r="120" fill="#1B5E20" fill-opacity="0.7"/>
  <circle cx="740" cy="500" r="160" fill="#1B5E20" fill-opacity="0.8"/>
  <!-- Code in largest bubble -->
  <rect x="660" y="450" width="100" height="20" rx="7" fill="#A5D6A7"/>
  <rect x="672" y="485" width="75" height="20" rx="7" fill="#66BB6A"/>
  <rect x="660" y="520" width="90" height="20" rx="7" fill="#A5D6A7" fill-opacity="0.7"/>
  <!-- Code in medium bubble -->
  <rect x="494" y="558" width="70" height="16" rx="6" fill="#66BB6A"/>
  <rect x="500" y="584" width="55" height="16" rx="6" fill="#A5D6A7" fill-opacity="0.7"/>
  <!-- Small code in small bubbles -->
  <rect x="358" y="644" width="50" height="14" rx="5" fill="#66BB6A" fill-opacity="0.7"/>
  <!-- Connection path -->
  <path d="M320 720 Q480 680 640 600 Q740 560 740 500" fill="none" stroke="#66BB6A" stroke-width="12" stroke-opacity="0.4" stroke-dasharray="16,10"/>
</svg>