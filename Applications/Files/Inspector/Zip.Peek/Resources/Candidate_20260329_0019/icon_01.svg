  <!-- Search bar at bottom -->
  <rect x="86" y="628" width="500" height="44" rx="16" fill="#F5F5F5" filter="url(#sh1)"/>
  <text x="116" y="650" font-family="Arial, sans-serif" font-size="20" fill="#90A4AE"
        dominant-baseline="middle">🔍 파일 검색...</text>

  <!-- Status bar -->
  <rect x="86" y="692" width="852" height="44" rx="12" fill="#E3F2FD" filter="url(#sh1)"/>
  <text x="512" y="714" font-family="Arial, sans-serif" font-size="18" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">총 127개 항목 · 원본 48.3 MB → 압축 12.1 MB (75% 절감)</text>
</svg>
