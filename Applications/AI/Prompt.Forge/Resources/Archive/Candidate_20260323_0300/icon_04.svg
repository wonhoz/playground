  <circle cx="600" cy="660" r="180" fill="none" stroke="#C4B5FD" stroke-width="16"/>
  <circle cx="600" cy="660" r="155" fill="#1E1A4A" opacity="0.7"/>
  <line x1="725" y1="785" x2="820" y2="880" stroke="#C4B5FD" stroke-width="20" stroke-linecap="round"/>
  <!-- Highlighted result inside magnifier -->
  <text x="600" y="650" font-family="Arial,sans-serif" font-size="22" fill="#A78BFA" text-anchor="middle" font-weight="bold">AI 코드리뷰</text>
  <rect x="490" y="665" width="220" height="28" rx="5" fill="#7C3AED" opacity="0.4"/>
