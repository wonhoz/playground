<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <radialGradient id="signal" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#1DE9B6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#004D40" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <ellipse cx="256" cy="310" rx="200" ry="120" fill="url(#signal)"/>
  <!-- Tower -->
  <rect x="244" y="150" width="24" height="160" rx="4" fill="#1DE9B6"/>
  <polygon points="256,100 220,160 292,160" fill="#00BFA5"/>
  <!-- Signal arcs -->
  <path d="M180 230 Q256 170 332 230" stroke="#1DE9B6" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M150 260 Q256 180 362 260" stroke="#1DE9B6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M120 290 Q256 190 392 290" stroke="#1DE9B6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- File icon -->
  <rect x="200" y="340" width="112" height="90" rx="10" fill="#00897B"/>
  <rect x="215" y="358" width="80" height="8" rx="3" fill="#1DE9B6"/>
  <rect x="215" y="375" width="60" height="8" rx="3" fill="#1DE9B6" opacity="0.7"/>
  <rect x="215" y="392" width="70" height="8" rx="3" fill="#1DE9B6" opacity="0.5"/>
