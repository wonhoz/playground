<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Anvil -->
  <rect x="360" y="560" width="304" height="80" rx="10" fill="#33691E"/>
  <rect x="390" y="480" width="244" height="90" rx="8" fill="#33691E"/>
  <rect x="420" y="440" width="90" height="50" rx="6" fill="#AED581"/>
  <!-- Hammer hitting -->
  <rect x="600" y="340" width="40" height="130" rx="8" fill="#AED581" transform="rotate(-30,620,405)"/>
  <rect x="640" y="280" width="80" height="50" rx="10" fill="#AED581" transform="rotate(-30,680,305)"/>
  <!-- Impact sparks -->
  <circle cx="550" cy="470" r="10" fill="#AED581" opacity="0.9"/>
  <circle cx="580" cy="445" r="8" fill="#AED581" opacity="0.7"/>
  <circle cx="520" cy="450" r="7" fill="#AED581" opacity="0.6"/>
  <!-- Dodge arrow -->
  <polygon points="200,700 300,650 300,675 450,675 450,650 550,700 450,750 450,725 300,725 300,750" fill="#AED581" opacity="0.8"/>
  <!-- Bullets -->
  <circle cx="200" cy="400" r="20" fill="#33691E"/>
  <circle cx="160" cy="460" r="18" fill="#33691E" opacity="0.7"/>
  <circle cx="230" cy="520" r="16" fill="#33691E" opacity="0.5"/>
</svg>
