<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 화면 테두리 -->
  <rect x="70" y="90" width="372" height="280" rx="10" fill="#0d2030" stroke="#1e5070" stroke-width="2"/>
  <!-- 중앙 창 -->
  <rect x="150" y="140" width="212" height="180" rx="8" fill="#1e3a50" stroke="#38bdf8" stroke-width="2" filter="url(#glow)"/>
  <rect x="150" y="140" width="212" height="28" rx="8" fill="#164060"/>
  <rect x="150" y="155" width="212" height="13" rx="0" fill="#164060"/>
  <!-- 스냅 화살표 (4방향) -->
  <!-- 위 -->
  <polygon points="256,112 240,136 252,132 252,140 260,140 260,132 272,136" fill="url(#arrowGrad)" filter="url(#glow)"/>
  <!-- 아래 -->
  <polygon points="256,350 240,326 252,330 252,320 260,320 260,330 272,326" fill="url(#arrowGrad)" filter="url(#glow)"/>
  <!-- 왼쪽 -->
  <polygon points="92,230 116,214 112,226 120,226 120,234 112,234 116,246" fill="url(#arrowGrad)" filter="url(#glow)"/>
  <!-- 오른쪽 -->
  <polygon points="420,230 396,214 400,226 392,226 392,234 400,234 396,246" fill="url(#arrowGrad)" filter="url(#glow)"/>
  <!-- 하단 작업표시줄 -->
  <rect x="70" y="380" width="372" height="42" rx="6" fill="#0d1a22" stroke="#1e5070" stroke-width="1.5"/>
  <circle cx="104" cy="401" r="10" fill="#38bdf8" opacity="0.7"/>
  <circle cx="132" cy="401" r="10" fill="#38bdf8" opacity="0.4"/>
  <circle cx="160" cy="401" r="10" fill="#38bdf8" opacity="0.4"/>
  <text x="350" y="407" font-family="Arial" font-size="13" fill="#38bdf8" text-anchor="middle">PILOT</text>
</svg>
