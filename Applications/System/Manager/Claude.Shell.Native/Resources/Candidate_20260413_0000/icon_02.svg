<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal · 중앙심볼 · 마우스 + 우측 메뉴 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E8F5E9"/>
  <!-- 마우스 본체 -->
  <g>
    <path d="M 180 380 Q 180 240 340 240 Q 500 240 500 380 L 500 660 Q 500 800 340 800 Q 180 800 180 660 Z" fill="#FFFFFF" stroke="#1B5E20" stroke-width="18" stroke-linejoin="round"/>
    <!-- 우클릭 버튼 (강조) -->
    <path d="M 340 240 Q 500 240 500 380 L 500 480 L 340 480 Z" fill="#FFD93D" stroke="#E65100" stroke-width="16"/>
    <!-- 스크롤 휠 -->
    <rect x="300" y="340" width="80" height="110" rx="28" fill="#F5F5F5" stroke="#1B5E20" stroke-width="8"/>
    <line x1="340" y1="340" x2="340" y2="450" stroke="#1B5E20" stroke-width="6"/>
    <!-- 좌클릭 버튼 구분선 -->
    <line x1="180" y1="460" x2="300" y2="460" stroke="#1B5E20" stroke-width="10"/>
  </g>
  <!-- 클릭 효과 (우측 버튼 위) -->
  <g fill="none" stroke="#E65100" stroke-width="12" stroke-linecap="round">
    <path d="M 440 260 L 420 300"/>
    <path d="M 470 280 L 480 320"/>
    <path d="M 500 250 L 510 290"/>
  </g>
  <!-- 화살표 -->
  <g>
    <rect x="540" y="460" width="90" height="36" rx="18" fill="#3A86FF"/>
    <path d="M 620 440 L 680 478 L 620 516 Z" fill="#3A86FF" stroke="#0D47A1" stroke-width="10"/>
  </g>
  <!-- 우측 메뉴 -->
  <g>
    <rect x="680" y="280" width="280" height="440" rx="24" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14"/>
    <rect x="700" y="310" width="240" height="50" rx="8" fill="#E0F2F1"/>
    <rect x="700" y="370" width="240" height="50" rx="8" fill="#E0F2F1"/>
    <rect x="700" y="430" width="240" height="70" rx="8" fill="#FFD93D" stroke="#E65100" stroke-width="6"/>
    <text x="820" y="478" font-family="Arial Black, sans-serif" font-weight="700" font-size="32" fill="#3E2723" text-anchor="middle">Claude Code</text>
    <rect x="700" y="510" width="240" height="50" rx="8" fill="#E0F2F1"/>
    <rect x="700" y="570" width="240" height="50" rx="8" fill="#E0F2F1"/>
    <rect x="700" y="630" width="240" height="50" rx="8" fill="#E0F2F1"/>
  </g>
  <!-- 하단 라벨 -->
  <rect x="220" y="830" width="584" height="110" rx="38" fill="#1B5E20"/>
  <text x="512" y="908" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFD93D" text-anchor="middle">RIGHT → CLAUDE</text>
</svg>
