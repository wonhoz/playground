<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ink.Cast - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 140px; height: 140px; border-radius: 20px; border: 1px solid #333; background: #111; }
  .item span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>Ink.Cast — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_ink_brush.svg"><span>01<br>Ink Brush</span></div>
  <div class="item"><img src="candidate_02_neon_pen.svg"><span>02<br>Neon Pen</span></div>
  <div class="item"><img src="candidate_03_watercolor_splash.svg"><span>03<br>Watercolor Splash</span></div>
  <div class="item"><img src="candidate_04_tablet_stylus.svg"><span>04<br>Tablet Stylus</span></div>
  <div class="item"><img src="candidate_05_calligraphy_wave.svg"><span>05<br>Calligraphy Wave</span></div>
  <div class="item"><img src="candidate_06_broadcast_canvas.svg"><span>06<br>Broadcast Canvas</span></div>
  <div class="item"><img src="candidate_07_ink_drop.svg"><span>07<br>Ink Drop</span></div>
  <div class="item"><img src="candidate_08_sketch_stream.svg"><span>08<br>Sketch Stream</span></div>
  <div class="item"><img src="candidate_09_glowing_quill.svg"><span>09<br>Glowing Quill</span></div>
  <div class="item"><img src="candidate_10_draw_transmit.svg"><span>10<br>Draw &amp; Transmit</span></div>
</div>
</body>
</html>
