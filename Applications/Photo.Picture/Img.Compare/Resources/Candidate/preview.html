<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Img.Compare - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 140px; height: 140px; border-radius: 20px; border: 1px solid #333; background: #111; }
  .item span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>Img.Compare — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_split_vertical.svg"><span>01<br>Split Vertical</span></div>
  <div class="item"><img src="candidate_02_dual_frame.svg"><span>02<br>Dual Frame</span></div>
  <div class="item"><img src="candidate_03_eye_lens.svg"><span>03<br>Eye Lens</span></div>
  <div class="item"><img src="candidate_04_slider_magnify.svg"><span>04<br>Slider Magnify</span></div>
  <div class="item"><img src="candidate_05_diagonal_wipe.svg"><span>05<br>Diagonal Wipe</span></div>
  <div class="item"><img src="candidate_06_overlay_diff.svg"><span>06<br>Overlay Diff</span></div>
  <div class="item"><img src="candidate_07_pixel_grid.svg"><span>07<br>Pixel Grid</span></div>
  <div class="item"><img src="candidate_08_mirror_reflection.svg"><span>08<br>Mirror Reflection</span></div>
  <div class="item"><img src="candidate_09_histogram_compare.svg"><span>09<br>Histogram Compare</span></div>
  <div class="item"><img src="candidate_10_thermal_scan.svg"><span>10<br>Thermal Scan</span></div>
</div>
</body>
</html>
