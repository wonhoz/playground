<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: ZIP 파일 (열린 지퍼 모양, 기울어진) -->
  <rect x="160" y="220" width="480" height="560" rx="28" fill="#1565C0" transform="rotate(-8 400 500)"/>
  <!-- 지퍼 라인 -->
  <rect x="330" y="250" width="90" height="500" rx="10" fill="#0D47A1" transform="rotate(-8 375 500)"/>
  <!-- 지퍼 슬라이더 (열려있음 — 위로 올라간 모양) -->
  <rect x="310" y="220" width="130" height="60" rx="16" fill="#FF6F00" transform="rotate(-8 375 250)"/>
  <rect x="340" y="240" width="70" height="20" rx="8" fill="#FFCC02" transform="rotate(-8 375 250)"/>
  <!-- ZIP 라벨 -->
  <text x="400" y="700" font-family="'Consolas', monospace" font-size="80" fill="white" text-anchor="middle" font-weight="700" transform="rotate(-8 400 680)">ZIP</text>
  <!-- Layer 3: 파일들 쏟아져 나오는 모습 (역동적) -->
  <!-- 파일 카드 1 -->
  <rect x="560" y="200" width="220" height="120" rx="16" fill="#43A047" transform="rotate(12 670 260)"/>
  <text x="670" y="248" font-family="'Segoe UI', sans-serif" font-size="36" fill="white" text-anchor="middle" transform="rotate(12 670 260)">📝 main.cs</text>
  <text x="670" y="286" font-family="'Consolas', monospace" font-size="28" fill="#C8E6C9" text-anchor="middle" transform="rotate(12 670 260)">12.4 KB</text>
  <!-- 파일 카드 2 -->
  <rect x="600" y="380" width="220" height="120" rx="16" fill="#F57F17" transform="rotate(6 710 440)"/>
  <text x="710" y="428" font-family="'Segoe UI', sans-serif" font-size="36" fill="white" text-anchor="middle" transform="rotate(6 710 440)">🖼 icon.png</text>
  <text x="710" y="466" font-family="'Consolas', monospace" font-size="28" fill="#FFE0B2" text-anchor="middle" transform="rotate(6 710 440)">48.2 KB</text>
  <!-- 파일 카드 3 -->
  <rect x="560" y="560" width="220" height="120" rx="16" fill="#7B1FA2" transform="rotate(-4 670 620)"/>
  <text x="670" y="608" font-family="'Segoe UI', sans-serif" font-size="36" fill="white" text-anchor="middle" transform="rotate(-4 670 620)">📄 readme</text>
  <text x="670" y="646" font-family="'Consolas', monospace" font-size="28" fill="#E1BEE7" text-anchor="middle" transform="rotate(-4 670 620)">3.1 KB</text>
  <!-- 파일 카드 4 -->
  <rect x="600" y="740" width="220" height="100" rx="16" fill="#00838F" transform="rotate(8 710 790)"/>
  <text x="710" y="800" font-family="'Segoe UI', sans-serif" font-size="36" fill="white" text-anchor="middle" transform="rotate(8 710 790)">⚙ app.exe</text>
</svg>
