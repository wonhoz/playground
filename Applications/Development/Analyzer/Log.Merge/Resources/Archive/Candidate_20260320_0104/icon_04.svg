<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Y-junction: two paths converging -->
  <!-- Left arm -->
  <path d="M200 180 Q300 300 512 600" stroke="#006064" stroke-width="50" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M824 180 Q724 300 512 600" stroke="#006064" stroke-width="50" fill="none" stroke-linecap="round"/>
  <!-- Stem down -->
  <path d="M512 600 L512 860" stroke="#00BCD4" stroke-width="60" fill="none" stroke-linecap="round"/>
  <!-- Junction highlight -->
  <circle cx="512" cy="600" r="44" fill="#00BCD4"/>
  <!-- Flow arrows on arms -->
  <!-- Left arrow -->
  <polygon points="380,380 340,340 420,330" fill="#00BCD4" opacity="0.7"/>
  <!-- Right arrow -->
  <polygon points="644,380 684,340 604,330" fill="#00BCD4" opacity="0.7"/>
  <!-- Log dots on arms -->
  <circle cx="260" cy="240" r="22" fill="#00BCD4" opacity="0.5"/>
  <circle cx="340" cy="320" r="18" fill="#006064"/>
  <circle cx="764" cy="240" r="22" fill="#00BCD4" opacity="0.5"/>
  <circle cx="684" cy="320" r="18" fill="#006064"/>
</svg>