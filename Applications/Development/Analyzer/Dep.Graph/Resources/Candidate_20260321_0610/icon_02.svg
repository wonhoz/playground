<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgChain" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#C8E6F8"/>
    </linearGradient>
    <!-- 패키지 박스들 -->
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <!-- 화살표 색상 -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000033"/>
    </filter>
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgChain)"/>

  <!-- Layer2: 패키지 박스 체인 (대각선 방향 4단계) -->

  <!-- 패키지 1 (좌상) -->
  <rect x="200" y="210" width="200" height="180" rx="16" fill="url(#box1)" filter="url(#boxShadow)"/>
  <!-- 박스 상단 밴드 -->
  <rect x="200" y="210" width="200" height="50" rx="16" fill="#FFFFFF" opacity="0.15"/>
  <rect x="200" y="242" width="200" height="18" fill="#FFFFFF" opacity="0.08"/>
  <!-- 박스 아이콘 -->
  <rect x="224" y="278" width="72" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
  <rect x="224" y="296" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="224" y="314" width="86" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <!-- 버전 태그 -->
  <rect x="300" y="356" width="86" height="26" rx="13" fill="#FFFFFF" opacity="0.2"/>
  <text x="343" y="374" font-family="monospace" font-size="16" fill="#FFFFFF" text-anchor="middle">v2.1.0</text>
  <!-- 패키지 이름 -->
  <text x="300" y="242" font-family="monospace" font-size="18" fill="#FFFFFF" font-weight="bold" text-anchor="middle">React</text>

  <!-- 화살표 1→2 -->
  <path d="M 410 310 Q 470 310 510 360" fill="none" stroke="url(#arrowGrad)" stroke-width="10" stroke-linecap="round" filter="url(#arrowGlow)"/>
  <polygon points="514,378 496,352 530,348" fill="#FCD34D" filter="url(#arrowGlow)"/>

  <!-- 패키지 2 (중앙 위) -->
  <rect x="510" y="370" width="200" height="180" rx="16" fill="url(#box2)" filter="url(#boxShadow)"/>
  <rect x="510" y="370" width="200" height="50" rx="16" fill="#FFFFFF" opacity="0.15"/>
  <rect x="510" y="402" width="200" height="18" fill="#FFFFFF" opacity="0.08"/>
  <rect x="534" y="438" width="72" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
  <rect x="534" y="456" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="534" y="474" width="86" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="610" y="516" width="86" height="26" rx="13" fill="#FFFFFF" opacity="0.2"/>
  <text x="653" y="534" font-family="monospace" font-size="16" fill="#FFFFFF" text-anchor="middle">v18.2</text>
  <text x="610" y="402" font-family="monospace" font-size="18" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Redux</text>

  <!-- 화살표 2→3 -->
  <path d="M 620 558 Q 620 600 580 640" fill="none" stroke="url(#arrowGrad)" stroke-width="10" stroke-linecap="round" filter="url(#arrowGlow)"/>
  <polygon points="566,658 570,626 600,638" fill="#FCD34D" filter="url(#arrowGlow)"/>

  <!-- 패키지 3 (중앙 하) -->
  <rect x="340" y="654" width="200" height="180" rx="16" fill="url(#box3)" filter="url(#boxShadow)"/>
  <rect x="340" y="654" width="200" height="50" rx="16" fill="#FFFFFF" opacity="0.15"/>
  <rect x="340" y="686" width="200" height="18" fill="#FFFFFF" opacity="0.08"/>
  <rect x="364" y="722" width="72" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
  <rect x="364" y="740" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="364" y="758" width="86" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="440" y="800" width="86" height="26" rx="13" fill="#FFFFFF" opacity="0.2"/>
  <text x="483" y="818" font-family="monospace" font-size="16" fill="#FFFFFF" text-anchor="middle">v4.0.1</text>
  <text x="440" y="686" font-family="monospace" font-size="18" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Axios</text>

  <!-- 화살표 3→4 -->
  <path d="M 550 754 Q 610 720 656 700" fill="none" stroke="url(#arrowGrad)" stroke-width="10" stroke-linecap="round" filter="url(#arrowGlow)"/>
  <polygon points="674,692 646,680 652,714" fill="#FCD34D" filter="url(#arrowGlow)"/>

  <!-- 패키지 4 (우하) -->
  <rect x="664" y="590" width="160" height="140" rx="16" fill="url(#box4)" filter="url(#boxShadow)"/>
  <rect x="664" y="590" width="160" height="40" rx="16" fill="#FFFFFF" opacity="0.15"/>
  <rect x="680" y="644" width="60" height="7" rx="3" fill="#FFFFFF" opacity="0.6"/>
  <rect x="680" y="660" width="80" height="7" rx="3" fill="#FFFFFF" opacity="0.4"/>
  <text x="744" y="618" font-family="monospace" font-size="16" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Lodash</text>

  <!-- Layer3: 최상단 타이틀 -->
  <text x="300" y="192" font-family="sans-serif" font-size="22" fill="#1E40AF" text-anchor="middle" font-weight="bold">Dependency Chain</text>
</svg>
