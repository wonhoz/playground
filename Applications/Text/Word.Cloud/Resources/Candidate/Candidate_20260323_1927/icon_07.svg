<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg07)"/>
  <!-- Circle container -->
  <circle cx="512" cy="512" r="320" fill="rgba(255,255,255,0.12)"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="6"/>
  <!-- Center - largest word -->
  <text x="512" y="460" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="130" font-weight="900" fill="#FFFFFF">Cloud</text>
  <!-- Second ring words -->
  <text x="512" y="560" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FDE68A">Word</text>
  <text x="350" y="510" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="700" fill="#A7F3D0">Text</text>
  <text x="674" y="510" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="700" fill="#FCA5A5">Data</text>
  <!-- Third ring words -->
  <text x="512" y="640" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="44" font-weight="700" fill="#BAE6FD">font</text>
  <text x="360" y="620" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#DDD6FE">color</text>
  <text x="660" y="620" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#FED7AA">size</text>
  <text x="300" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="700" fill="#6EE7B7">art</text>
  <text x="720" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="700" fill="#FCD34D">viz</text>
  <text x="512" y="380" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="40" font-weight="700" fill="#C4B5FD">freq</text>
  <!-- Outer ring (small) -->
  <text x="430" y="718" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">export</text>
  <text x="600" y="718" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="24" fill="rgba(255,255,255,0.65)">image</text>
  <text x="270" y="580" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="26" fill="rgba(255,255,255,0.65)">layout</text>
  <text x="760" y="580" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="24" fill="rgba(255,255,255,0.65)">style</text>
</svg>
