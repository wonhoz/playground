<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E1B4B"/>
  <!-- Layer 2: Network nodes -->
  <!-- Client node (left) -->
  <circle cx="220" cy="512" r="90" fill="#312E81"/>
  <circle cx="220" cy="512" r="72" fill="#4338CA"/>
  <text x="220" y="502" font-family="Arial,sans-serif" font-size="16" fill="#C7D2FE" text-anchor="middle">Client</text>
  <text x="220" y="526" font-family="Consolas,monospace" font-size="22" fill="#818CF8" text-anchor="middle">⬡</text>
  <!-- API Server node (center) -->
  <circle cx="512" cy="512" r="110" fill="#1E1B4B"/>
  <circle cx="512" cy="512" r="90" fill="#4F46E5"/>
  <text x="512" y="498" font-family="Arial,sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="bold">API</text>
  <text x="512" y="524" font-family="Arial,sans-serif" font-size="13" fill="#C7D2FE" text-anchor="middle">Server</text>
  <!-- Database node (right) -->
  <circle cx="804" cy="512" r="90" fill="#312E81"/>
  <circle cx="804" cy="512" r="72" fill="#6D28D9"/>
  <text x="804" y="502" font-family="Arial,sans-serif" font-size="14" fill="#DDD6FE" text-anchor="middle">DB</text>
  <text x="804" y="526" font-family="Consolas,monospace" font-size="20" fill="#A78BFA" text-anchor="middle">⊕</text>
  <!-- Connection lines with arrows -->
  <!-- Client → API -->
  <line x1="312" y1="512" x2="422" y2="512" stroke="#60A5FA" stroke-width="12" stroke-linecap="round"/>
  <polygon points="422,492 462,512 422,532" fill="#60A5FA"/>
  <!-- API → DB -->
  <line x1="602" y1="512" x2="714" y2="512" stroke="#A78BFA" stroke-width="12" stroke-linecap="round"/>
  <polygon points="714,492 754,512 714,532" fill="#A78BFA"/>
  <!-- Layer 3: Request/response labels on lines -->
  <rect x="326" y="476" width="80" height="24" rx="8" fill="#1E3A8A"/>
  <text x="366" y="492" font-family="Consolas,monospace" font-size="13" fill="#93C5FD" text-anchor="middle">POST</text>
  <rect x="326" y="518" width="80" height="24" rx="8" fill="#065F46"/>
  <text x="366" y="534" font-family="Consolas,monospace" font-size="13" fill="#86EFAC" text-anchor="middle">200</text>
  <!-- Top and bottom nodes (secondary) -->
  <circle cx="512" cy="250" r="56" fill="#2E1065" stroke="#7C3AED" stroke-width="4"/>
  <text x="512" y="258" font-family="Arial,sans-serif" font-size="13" fill="#C4B5FD" text-anchor="middle">Cache</text>
  <line x1="512" y1="306" x2="512" y2="422" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" stroke-dasharray="12,8" opacity="0.6"/>
</svg>