<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#2D004D"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flowchart -->
  <!-- Start oval -->
  <ellipse cx="256" cy="115" rx="70" ry="30" fill="url(#box)" stroke="#CE93D8" stroke-width="2"/>
  <text x="228" y="121" font-family="monospace" font-size="15" fill="white">START</text>
  <!-- Arrow down -->
  <line x1="256" y1="145" x2="256" y2="175" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="256,180 248,168 264,168" fill="#CE93D8"/>
  <!-- Process box -->
  <rect x="186" y="180" width="140" height="50" rx="8" fill="url(#box)" stroke="#CE93D8" stroke-width="2"/>
  <text x="198" y="210" font-family="monospace" font-size="14" fill="white">PROCESS SIG</text>
  <!-- Arrow down -->
  <line x1="256" y1="230" x2="256" y2="260" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="256,265 248,253 264,253" fill="#CE93D8"/>
  <!-- Decision diamond -->
  <polygon points="256,265 196,310 256,355 316,310" fill="none" stroke="#CE93D8" stroke-width="2" fill-opacity="0"/>
  <polygon points="256,268 199,310 256,352 313,310" fill="#4A148C"/>
  <text x="225" y="316" font-family="monospace" font-size="13" fill="#E1BEE7">MATCH?</text>
  <!-- Yes arrow -->
  <line x1="256" y1="355" x2="256" y2="385" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="256,390 248,378 264,378" fill="#CE93D8"/>
  <text x="262" y="378" font-family="monospace" font-size="12" fill="#CE93D8">Y</text>
  <!-- No arrow right -->
  <line x1="316" y1="310" x2="370" y2="310" stroke="#CE93D8" stroke-width="2"/>
  <polygon points="375,310 363,303 363,317" fill="#CE93D8"/>
  <text x="320" y="305" font-family="monospace" font-size="12" fill="#CE93D8">N</text>
  <!-- End oval -->
  <ellipse cx="256" cy="415" rx="70" ry="28" fill="url(#box)" stroke="#CE93D8" stroke-width="2"/>
  <text x="232" y="421" font-family="monospace" font-size="15" fill="white">EMIT</text>
</svg>
