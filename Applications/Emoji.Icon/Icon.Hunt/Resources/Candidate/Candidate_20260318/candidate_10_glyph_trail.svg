<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 글리프 트레일 경로 -->
  <path d="M 100 350 Q 150 200 256 180 Q 362 160 400 250" fill="none" stroke="#10B981" stroke-width="2.5" opacity="0.4" stroke-dasharray="10,5"/>
  <!-- 트레일 위의 이모지들 -->
  <text x="100" y="358" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji" opacity="0.4">🌱</text>
  <text x="170" y="268" text-anchor="middle" font-size="24" font-family="Segoe UI Emoji" opacity="0.55"/>
  <text x="200" y="220" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji" opacity="0.6">🌿</text>
  <text x="256" y="195" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji" opacity="0.8">🍃</text>
  <text x="340" y="192" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji" opacity="0.6">🌳</text>
  <!-- 타깃 종점 -->
  <circle cx="400" cy="250" r="20" fill="#10B981" opacity="0.15" filter="url(#glow)"/>
  <circle cx="400" cy="250" r="10" fill="#10B981" opacity="0.5" filter="url(#glow)"/>
  <text x="400" y="258" text-anchor="middle" font-size="14" fill="white" opacity="0.8">🎯</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">GLYPH TRAIL</text>
</svg>
