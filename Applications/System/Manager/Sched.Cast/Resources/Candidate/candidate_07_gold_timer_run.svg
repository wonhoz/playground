<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#0D0900"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#2C1F00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stopwatch body -->
  <circle cx="256" cy="290" r="170" fill="url(#face)" stroke="url(#gold)" stroke-width="14"/>
  <!-- Stopwatch crown/button -->
  <rect x="230" y="96" width="52" height="30" rx="12" fill="url(#gold)"/>
  <rect x="244" y="82" width="24" height="26" rx="8" fill="url(#gold)"/>
  <!-- Side buttons -->
  <rect x="80" y="180" width="36" height="20" rx="8" fill="url(#gold)" opacity="0.7"/>
  <rect x="396" y="180" width="36" height="20" rx="8" fill="url(#gold)" opacity="0.7"/>
  <!-- Face markings -->
  <g stroke="url(#gold)" stroke-linecap="round" opacity="0.7">
    <line x1="256" y1="138" x2="256" y2="158" stroke-width="6"/>
    <line x1="256" y1="422" x2="256" y2="442" stroke-width="6"/>
    <line x1="104" y1="290" x2="124" y2="290" stroke-width="6"/>
    <line x1="388" y1="290" x2="408" y2="290" stroke-width="6"/>
    <line x1="145" y1="180" x2="159" y2="194" stroke-width="4" opacity="0.5"/>
    <line x1="367" y1="180" x2="353" y2="194" stroke-width="4" opacity="0.5"/>
    <line x1="145" y1="400" x2="159" y2="386" stroke-width="4" opacity="0.5"/>
    <line x1="367" y1="400" x2="353" y2="386" stroke-width="4" opacity="0.5"/>
  </g>
  <!-- Hands -->
  <line x1="256" y1="290" x2="256" y2="190" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="316" y2="338" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="290" r="10" fill="url(#gold)"/>
</svg>
