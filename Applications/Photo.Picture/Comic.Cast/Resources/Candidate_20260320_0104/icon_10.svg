<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- Camera body -->
  <rect x="440" y="380" width="400" height="300" rx="28" fill="#6A1B9A" opacity="0.85"/>
  <!-- Camera lens -->
  <circle cx="640" cy="530" r="90" fill="#1a0030" stroke="#CE93D8" stroke-width="18"/>
  <circle cx="640" cy="530" r="58" fill="#0A0010" stroke="#6A1B9A" stroke-width="10"/>
  <circle cx="640" cy="530" r="28" fill="#CE93D8" opacity="0.4"/>
  <circle cx="620" cy="510" r="10" fill="#ffffff" opacity="0.25"/>
  <!-- Camera top bump (viewfinder) -->
  <rect x="560" y="340" width="120" height="52" rx="14" fill="#6A1B9A"/>
  <!-- Camera shutter button -->
  <circle cx="800" cy="395" r="22" fill="#CE93D8" opacity="0.7"/>
  <!-- Pencil (left side) -->
  <!-- Pencil body -->
  <rect x="160" y="460" width="260" height="60" rx="10" fill="#CE93D8" transform="rotate(-15,290,490)"/>
  <!-- Pencil tip -->
  <polygon points="160,510 130,560 190,510" fill="#FFE57F" opacity="0.8" transform="rotate(-15,160,535)"/>
  <!-- Pencil eraser end -->
  <rect x="400" y="442" width="50" height="60" rx="8" fill="#6A1B9A" transform="rotate(-15,425,472)"/>
  <!-- Pencil tip point -->
  <polygon points="115,548 145,542 130,572" fill="#ffffff" opacity="0.5" transform="rotate(-15,130,557)"/>
  <!-- Connection arrow between pencil and camera -->
  <path d="M360 490 Q400 490 430 480" stroke="#CE93D8" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <polygon points="422,466 446,480 422,494" fill="#CE93D8" opacity="0.7"/>
</svg>
