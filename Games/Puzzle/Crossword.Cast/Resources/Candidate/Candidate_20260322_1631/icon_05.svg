    <rect x="515" y="534" width="136" height="136" rx="7" fill="#111"/>
    <rect x="657" y="534" width="136" height="136" rx="7" fill="#111"/>
    <rect x="799" y="534" width="136" height="136" rx="7" fill="#111"/>

    <!-- Layer 3: Completion overlay — "PUZZLE COMPLETE!" -->
    <!-- Success banner -->
    <rect x="89" y="700" width="846" height="110" rx="16" fill="#164A2A"/>
    <rect x="89" y="700" width="846" height="110" rx="16" fill="none" stroke="#2ECC71" stroke-width="5"/>
    <text x="512" y="769" font-family="'Segoe UI',Arial" font-size="54" font-weight="900" fill="#2ECC71" text-anchor="middle">✓ PUZZLE COMPLETE!</text>

