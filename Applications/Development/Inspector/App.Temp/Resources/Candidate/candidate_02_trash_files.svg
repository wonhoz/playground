<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#2A1010"/>
    </linearGradient>
    <linearGradient id="trash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trash can body -->
  <path d="M150,200 L170,420 Q170,440 190,440 L322,440 Q342,440 342,420 L362,200 Z" fill="url(#trash)"/>
  <!-- Lid -->
  <rect x="130" y="180" width="252" height="28" rx="8" fill="#9CA3AF"/>
  <!-- Handle on lid -->
  <rect x="216" y="160" width="80" height="28" rx="10" fill="#9CA3AF"/>
  <!-- Trash lines -->
  <line x1="210" y1="220" x2="210" y2="410" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="220" x2="256" y2="410" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="302" y1="220" x2="302" y2="410" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Flying files being deleted -->
  <rect x="60" y="130" width="44" height="54" rx="4" fill="#FEF3C7" transform="rotate(-20 82 157)"/>
  <text x="82" y="153" font-family="monospace" font-size="9" fill="#666" text-anchor="middle">.tmp</text>
  <text x="82" y="168" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">128KB</text>
  <rect x="400" y="120" width="44" height="54" rx="4" fill="#FEF3C7" transform="rotate(25 422 147)"/>
  <text x="422" y="143" font-family="monospace" font-size="9" fill="#666" text-anchor="middle">.cache</text>
  <text x="422" y="158" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">2.3MB</text>
  <!-- X delete marks -->
  <line x1="68" y1="75" x2="96" y2="103" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="75" x2="68" y2="103" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="408" y1="75" x2="436" y2="103" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="436" y1="75" x2="408" y2="103" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
</svg>