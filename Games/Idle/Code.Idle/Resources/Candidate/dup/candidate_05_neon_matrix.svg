<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#001100"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 매트릭스 코드 비 -->
  <text x="100" y="130" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.9" filter="url(#glow)">01</text>
  <text x="140" y="160" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.7">10</text>
  <text x="180" y="110" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.6">01</text>
  <text x="300" y="140" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.8">11</text>
  <text x="350" y="120" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.5">00</text>
  <text x="380" y="170" font-family="monospace" font-size="14" fill="#00FF41" fill-opacity="0.7">10</text>
  <!-- 중앙 아이콘 -->
  <rect x="156" y="196" width="200" height="130" rx="14" fill="#001800" stroke="#00FF41" stroke-width="2" filter="url(#glow)"/>
  <text x="176" y="234" font-family="monospace" font-size="15" fill="#00FF41">function idle()</text>
  <text x="176" y="256" font-family="monospace" font-size="13" fill="#00CC33">  xp += 100</text>
  <text x="176" y="276" font-family="monospace" font-size="13" fill="#00CC33">  coins++</text>
  <text x="176" y="296" font-family="monospace" font-size="13" fill="#00AA22">  level up!</text>
  <!-- 바닥 레벨 바 -->
  <rect x="106" y="360" width="300" height="14" rx="7" fill="#002200"/>
  <rect x="106" y="360" width="210" height="14" rx="7" fill="#00FF41" fill-opacity="0.7" filter="url(#glow)"/>
</svg>
