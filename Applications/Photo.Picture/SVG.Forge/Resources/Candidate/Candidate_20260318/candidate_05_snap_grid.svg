<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스냅/그리드 시스템 -->
  <!-- 배경 그리드 -->
  <g opacity="0.2" stroke="#C084FC" stroke-width="0.5">
    <line x1="60" y1="60" x2="60" y2="452"/>
    <line x1="100" y1="60" x2="100" y2="452"/>
    <line x1="140" y1="60" x2="140" y2="452"/>
    <line x1="180" y1="60" x2="180" y2="452"/>
    <line x1="220" y1="60" x2="220" y2="452"/>
    <line x1="260" y1="60" x2="260" y2="452"/>
    <line x1="300" y1="60" x2="300" y2="452"/>
    <line x1="340" y1="60" x2="340" y2="452"/>
    <line x1="380" y1="60" x2="380" y2="452"/>
    <line x1="420" y1="60" x2="420" y2="452"/>
    <line x1="60" y1="80" x2="452" y2="80"/>
    <line x1="60" y1="120" x2="452" y2="120"/>
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="200" x2="452" y2="200"/>
    <line x1="60" y1="240" x2="452" y2="240"/>
    <line x1="60" y1="280" x2="452" y2="280"/>
    <line x1="60" y1="320" x2="452" y2="320"/>
    <line x1="60" y1="360" x2="452" y2="360"/>
    <line x1="60" y1="400" x2="452" y2="400"/>
    <line x1="60" y1="440" x2="452" y2="440"/>
  </g>
  <!-- 스냅 포인트들 -->
  <circle cx="180" cy="160" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="220" cy="160" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="260" cy="160" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="300" cy="160" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="180" cy="200" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="220" cy="200" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="260" cy="200" r="3" fill="#C084FC" opacity="0.5"/>
  <circle cx="300" cy="200" r="3" fill="#C084FC" opacity="0.5"/>
  <!-- 스냅된 도형 -->
  <rect x="180" y="160" width="120" height="80" rx="4" fill="#C084FC" opacity="0.15" stroke="#C084FC" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- 스냅 가이드라인 -->
  <line x1="60" y1="160" x2="452" y2="160" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.7"/>
  <line x1="60" y1="240" x2="452" y2="240" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.7"/>
  <line x1="180" y1="60" x2="180" y2="452" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.7"/>
  <line x1="300" y1="60" x2="300" y2="452" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.7"/>
  <!-- 스냅 포인트 강조 -->
  <circle cx="180" cy="160" r="6" fill="none" stroke="#FDE047" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <circle cx="300" cy="160" r="6" fill="none" stroke="#FDE047" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <circle cx="180" cy="240" r="6" fill="none" stroke="#FDE047" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <circle cx="300" cy="240" r="6" fill="none" stroke="#FDE047" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <!-- 치수선 -->
  <line x1="180" y1="148" x2="300" y2="148" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <line x1="180" y1="145" x2="180" y2="151" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <line x1="300" y1="145" x2="300" y2="151" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <text x="240" y="144" text-anchor="middle" font-size="10" fill="#FDE047" opacity="0.9">120px</text>
  <line x1="310" y1="160" x2="310" y2="240" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <line x1="307" y1="160" x2="313" y2="160" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <line x1="307" y1="240" x2="313" y2="240" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <text x="320" y="204" font-size="10" fill="#FDE047" opacity="0.9">80px</text>
  <!-- 다른 스냅 도형 (이동 중) -->
  <rect x="320" y="295" width="80" height="60" rx="4" fill="#A855F7" opacity="0.2" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="340" y="280" width="80" height="60" rx="4" fill="#C084FC" opacity="0.3" stroke="#C084FC" stroke-width="2"/>
  <!-- 스냅 화살표 (이동 방향) -->
  <path d="M380,280 L380,320 L340,320 L340,280" fill="none" stroke="#C084FC" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- 하단 -->
  <rect x="130" y="432" width="252" height="48" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="461" text-anchor="middle" font-size="14" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">SNAP &amp; GRID</text>
</svg>
