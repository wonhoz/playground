<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0015"/>
      <stop offset="100%" stop-color="#4A0035"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#C71585"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#40E0D0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Split-tone photo frame -->
  <rect x="108" y="118" width="296" height="200" rx="12" fill="#0A000A"/>
  <!-- Left half (shadows) in pink -->
  <rect x="108" y="118" width="148" height="200" rx="12" fill="#FF1493" opacity="0.25"/>
  <!-- Right half (highlights) in cyan -->
  <rect x="256" y="118" width="148" height="200" rx="12" fill="#40E0D0" opacity="0.2"/>
  <!-- Dividing line -->
  <line x1="256" y1="118" x2="256" y2="318" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Shadow label -->
  <text x="182" y="230" text-anchor="middle" font-size="14" fill="#FF69B4" font-family="Arial" opacity="0.8">SHADOW</text>
  <!-- Highlight label -->
  <text x="330" y="230" text-anchor="middle" font-size="14" fill="#87CEEB" font-family="Arial" opacity="0.8">HIGHLIGHT</text>
  <!-- Tone sliders -->
  <rect x="108" y="348" width="130" height="18" rx="9" fill="url(#shadow)" opacity="0.8"/>
  <circle cx="180" cy="357" r="12" fill="white" stroke="#C71585" stroke-width="3"/>
  <text x="108" y="342" font-size="12" fill="#FF69B4" font-family="Arial">Shadows</text>
  <rect x="274" y="348" width="130" height="18" rx="9" fill="url(#highlight)" opacity="0.8"/>
  <circle cx="340" cy="357" r="12" fill="white" stroke="#00BCD4" stroke-width="3"/>
  <text x="274" y="342" font-size="12" fill="#87CEEB" font-family="Arial">Highlights</text>
  <!-- Midtone bar -->
  <rect x="156" y="400" width="200" height="18" rx="9" fill="#9C27B0" opacity="0.7"/>
  <circle cx="256" cy="409" r="12" fill="white" stroke="#7B1FA2" stroke-width="3"/>
  <text x="256" y="394" text-anchor="middle" font-size="12" fill="#CE93D8" font-family="Arial">Midtones</text>
</svg>
