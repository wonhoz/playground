<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="input_grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 - 인디고 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: 패턴 입력 UI 패널 -->
  <!-- 메인 패널 -->
  <rect x="120" y="160" width="784" height="704" rx="20" fill="#0F172A" opacity="0.8"/>

  <!-- 상단 타이틀바 -->
  <rect x="120" y="160" width="784" height="56" rx="20" fill="#1E40AF"/>
  <rect x="120" y="192" width="784" height="24" fill="#1E40AF"/>
  <text x="512" y="196" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="28" fill="white" font-weight="bold">Batch Rename</text>

  <!-- 패턴 입력 레이블 -->
  <text x="160" y="278" font-family="Consolas,monospace" font-size="28" fill="#94A3B8">Pattern:</text>

  <!-- 패턴 입력창 -->
  <rect x="152" y="292" width="720" height="72" rx="10" fill="url(#input_grad)" stroke="#334155" stroke-width="3"/>
  <!-- 패턴 텍스트: {date}_{name}.{ext} -->
  <text x="176" y="342" font-family="Consolas,monospace" font-size="40" fill="#F1F5F9">
    <tspan fill="#FBBF24">{</tspan><tspan fill="#34D399">date</tspan><tspan fill="#FBBF24">}</tspan>
    <tspan fill="#F1F5F9">_</tspan>
    <tspan fill="#FBBF24">{</tspan><tspan fill="#34D399">name</tspan><tspan fill="#FBBF24">}</tspan>
    <tspan fill="#94A3B8">.</tspan>
    <tspan fill="#FBBF24">{</tspan><tspan fill="#34D399">ext</tspan><tspan fill="#FBBF24">}</tspan>
  </text>

  <!-- 구분선 -->
  <line x1="152" y1="400" x2="872" y2="400" stroke="#1E293B" stroke-width="2"/>

  <!-- 미리보기 헤더 -->
  <text x="160" y="436" font-family="Segoe UI,sans-serif" font-size="26" fill="#64748B">Preview</text>

  <!-- 파일 행들 -->
  <!-- 행 1: 원본 → 변환 -->
  <rect x="152" y="448" width="720" height="58" rx="8" fill="#0F2744" opacity="0.7"/>
  <text x="172" y="484" font-family="Consolas,monospace" font-size="28" fill="#94A3B8">IMG_0042.jpg</text>
  <text x="490" y="484" font-family="Consolas,monospace" font-size="28" fill="#FBBF24">→</text>
  <text x="530" y="484" font-family="Consolas,monospace" font-size="28" fill="#34D399">20260321_IMG_0042.jpg</text>

  <!-- 행 2 -->
  <rect x="152" y="516" width="720" height="58" rx="8" fill="#0F2744" opacity="0.4"/>
  <text x="172" y="552" font-family="Consolas,monospace" font-size="28" fill="#94A3B8">photo_001.png</text>
  <text x="490" y="552" font-family="Consolas,monospace" font-size="28" fill="#FBBF24">→</text>
  <text x="530" y="552" font-family="Consolas,monospace" font-size="28" fill="#34D399">20260321_photo_001.png</text>

  <!-- 행 3 -->
  <rect x="152" y="584" width="720" height="58" rx="8" fill="#0F2744" opacity="0.2"/>
  <text x="172" y="620" font-family="Consolas,monospace" font-size="28" fill="#64748B">DSC_8812.jpg</text>
  <text x="490" y="620" font-family="Consolas,monospace" font-size="28" fill="#FBBF24">→</text>
  <text x="530" y="620" font-family="Consolas,monospace" font-size="28" fill="#4B5563">20260321_DSC_8812.jpg</text>

  <!-- 하단 버튼 -->
  <rect x="152" y="692" width="720" height="68" rx="10" fill="#1D4ED8"/>
  <text x="512" y="734" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="34" fill="white" font-weight="bold">Apply  ✓</text>

  <!-- Layer 3: 변수 태그 장식 -->
  <rect x="152" y="792" width="140" height="44" rx="22" fill="#FBBF24" opacity="0.9"/>
  <text x="222" y="820" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#1E1B4B" font-weight="bold">{num:3}</text>
  <rect x="308" y="792" width="140" height="44" rx="22" fill="#34D399" opacity="0.9"/>
  <text x="378" y="820" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#064E3B" font-weight="bold">{exif}</text>
  <rect x="464" y="792" width="148" height="44" rx="22" fill="#818CF8" opacity="0.9"/>
  <text x="538" y="820" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#1E1B4B" font-weight="bold">{date}</text>
</svg>
