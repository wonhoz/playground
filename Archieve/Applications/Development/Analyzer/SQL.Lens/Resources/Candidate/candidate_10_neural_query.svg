<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050010"/>
      <stop offset="100%" style="stop-color:#100025"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#AA44FF"/>
      <stop offset="100%" style="stop-color:#AA44FF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network connections -->
  <line x1="120" y1="200" x2="256" y2="160" stroke="#4422AA" stroke-width="2"/>
  <line x1="120" y1="200" x2="256" y2="256" stroke="#4422AA" stroke-width="2"/>
  <line x1="120" y1="320" x2="256" y2="256" stroke="#4422AA" stroke-width="2"/>
  <line x1="120" y1="320" x2="256" y2="350" stroke="#4422AA" stroke-width="2"/>
  <line x1="256" y1="160" x2="390" y2="200" stroke="#6633BB" stroke-width="2"/>
  <line x1="256" y1="256" x2="390" y2="200" stroke="#6633BB" stroke-width="2"/>
  <line x1="256" y1="256" x2="390" y2="320" stroke="#6633BB" stroke-width="2"/>
  <line x1="256" y1="350" x2="390" y2="320" stroke="#6633BB" stroke-width="2"/>
  <!-- Input nodes (SQL keywords) -->
  <circle cx="120" cy="200" r="28" fill="#1A0044" stroke="#8844FF" stroke-width="3"/>
  <text x="120" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#AA88FF">SEL</text>
  <circle cx="120" cy="320" r="28" fill="#1A0044" stroke="#8844FF" stroke-width="3"/>
  <text x="120" y="325" text-anchor="middle" font-family="monospace" font-size="10" fill="#AA88FF">JOI</text>
  <!-- Hidden nodes -->
  <circle cx="256" cy="160" r="22" fill="#220055" stroke="#AA44FF" stroke-width="2"/>
  <circle cx="256" cy="256" r="30" fill="#220055" stroke="#CC66FF" stroke-width="3"/>
  <text x="256" y="261" text-anchor="middle" font-family="monospace" font-size="10" fill="#EE88FF">SQL</text>
  <circle cx="256" cy="350" r="22" fill="#220055" stroke="#AA44FF" stroke-width="2"/>
  <!-- Output nodes -->
  <circle cx="390" cy="200" r="28" fill="#1A0044" stroke="#FF88FF" stroke-width="3"/>
  <text x="390" y="205" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF88FF">PLAN</text>
  <circle cx="390" cy="320" r="28" fill="#1A0044" stroke="#FF88FF" stroke-width="3"/>
  <text x="390" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF88FF">OPT</text>
  <!-- Title -->
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="20" fill="#9966FF">SQL.Lens</text>
</svg>
