<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="50%" stop-color="#11998E"/>
      <stop offset="100%" stop-color="#38EF7D"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E0FF" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#C0C0FF" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Disk icon at top -->
  <ellipse cx="256" cy="100" rx="60" ry="45" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
  <ellipse cx="256" cy="100" rx="60" ry="45" fill="none" stroke="white" stroke-width="5" opacity="0.4"/>
  <line x1="200" y1="108" x2="312" y2="108" stroke="white" stroke-width="3" opacity="0.6"/>
  <circle cx="282" cy="90" r="7" fill="#38EF7D" opacity="0.9"/>
  <!-- Bar chart -->
  <rect x="80" y="200" width="52" height="230" rx="6" fill="url(#bar1)" filter="url(#shadow)"/>
  <rect x="148" y="250" width="52" height="180" rx="6" fill="url(#bar1)" filter="url(#shadow)"/>
  <rect x="216" y="170" width="52" height="260" rx="6" fill="url(#bar1)" filter="url(#shadow)"/>
  <rect x="284" y="290" width="52" height="140" rx="6" fill="url(#bar2)" filter="url(#shadow)"/>
  <rect x="352" y="310" width="52" height="120" rx="6" fill="url(#bar2)" filter="url(#shadow)"/>
  <!-- Highlight tops -->
  <rect x="80" y="200" width="52" height="12" rx="6" fill="#38EF7D" opacity="0.8"/>
  <rect x="148" y="250" width="52" height="12" rx="6" fill="#38EF7D" opacity="0.7"/>
  <rect x="216" y="170" width="52" height="12" rx="6" fill="#FFFFFF" opacity="0.9"/>
  <rect x="284" y="290" width="52" height="12" rx="6" fill="#38EF7D" opacity="0.5"/>
  <rect x="352" y="310" width="52" height="12" rx="6" fill="#38EF7D" opacity="0.4"/>
  <!-- Baseline -->
  <line x1="60" y1="430" x2="452" y2="430" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <!-- Labels -->
  <text x="106" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">C:</text>
  <text x="174" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">D:</text>
  <text x="242" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">E:</text>
  <text x="310" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">F:</text>
  <text x="378" y="455" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">G:</text>
  <text x="256" y="495" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold" letter-spacing="2" opacity="0.85">DISK.LENS</text>
</svg>
