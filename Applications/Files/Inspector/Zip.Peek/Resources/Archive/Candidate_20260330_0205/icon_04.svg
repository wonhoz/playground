<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="gift4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#FF5252"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 빨강 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg4)"/>

  <!-- Layer 2: 선물 상자 (ZIP = 포장된 파일들) -->
  <!-- 상자 본체 -->
  <rect x="200" y="460" width="624" height="420" rx="20" fill="url(#gift4)" stroke="white" stroke-width="8"/>
  <!-- 상자 뚜껑 -->
  <rect x="160" y="380" width="704" height="100" rx="16" fill="#FF1744" stroke="white" stroke-width="6"/>
  <!-- 뚜껑 리본 가로 -->
  <rect x="160" y="420" width="704" height="40" rx="8" fill="#FFD740"/>
  <!-- 상자 리본 세로 -->
  <rect x="472" y="380" width="80" height="500" rx="16" fill="#FFD740"/>

  <!-- 뚜껑이 열린 효과 — 살짝 들린 모습 -->
  <rect x="140" y="290" width="744" height="110" rx="16" fill="#FF1744" stroke="white" stroke-width="5" transform="rotate(-8 512 345)"/>
  <rect x="140" y="320" width="744" height="40" rx="8" fill="#FFD740" transform="rotate(-8 512 340)"/>
  <rect x="472" y="290" width="80" height="130" rx="16" fill="#FFD740" transform="rotate(-8 512 355)"/>

  <!-- Layer 3: 파일 아이콘들이 튀어나오는 효과 -->
  <text x="320" y="360" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="56" fill="white" text-anchor="middle" transform="rotate(-15 320 360)" opacity="0.9">📄</text>
  <text x="512" y="290" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="64" fill="white" text-anchor="middle" opacity="0.95">📁</text>
  <text x="700" y="350" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="50" fill="white" text-anchor="middle" transform="rotate(12 700 350)" opacity="0.9">📄</text>

  <!-- 하단 포맷 배지들 -->
  <rect x="210" y="830" width="120" height="52" rx="14" fill="#B71C1C" stroke="white" stroke-width="3"/>
  <text x="270" y="858" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">ZIP</text>
  <rect x="350" y="830" width="120" height="52" rx="14" fill="#B71C1C" stroke="white" stroke-width="3"/>
  <text x="410" y="858" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">RAR</text>
  <rect x="490" y="830" width="120" height="52" rx="14" fill="#B71C1C" stroke="white" stroke-width="3"/>
  <text x="550" y="858" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">7Z</text>
  <rect x="630" y="830" width="120" height="52" rx="14" fill="#B71C1C" stroke="white" stroke-width="3"/>
  <text x="690" y="858" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="white" text-anchor="middle" dominant-baseline="middle">TAR</text>
</svg>
