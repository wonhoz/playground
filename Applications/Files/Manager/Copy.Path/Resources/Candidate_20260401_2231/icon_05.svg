<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (coral) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg05cp2)"/>

  <!-- Layer 2: Path branching scene -->
  <!-- Source path (top center) -->
  <rect x="280" y="80" width="464" height="100" rx="24" fill="white" opacity="0.95"/>
  <text x="512" y="147" font-family="'Courier New',monospace" font-size="62" font-weight="bold"
    fill="#BF360C" text-anchor="middle">C:\file.txt</text>

  <!-- Trunk line down -->
  <line x1="512" y1="180" x2="512" y2="300" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Fork point -->
  <circle cx="512" cy="310" r="24" fill="#FFF176"/>

  <!-- Branch lines -->
  <line x1="512" y1="334" x2="180" y2="430" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="334" x2="390" y2="430" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="334" x2="610" y2="430" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="334" x2="840" y2="430" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Format result boxes -->
  <rect x="88" y="440" width="200" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="188" y="494" font-family="'Courier New',monospace" font-size="38" fill="#0277BD" text-anchor="middle">C:/...</text>

  <rect x="305" y="440" width="200" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="405" y="494" font-family="'Courier New',monospace" font-size="38" fill="#2E7D32" text-anchor="middle">file.txt</text>

  <rect x="523" y="440" width="200" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="623" y="494" font-family="'Courier New',monospace" font-size="38" fill="#880E4F" text-anchor="middle">C:\\...</text>

  <rect x="740" y="440" width="200" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="840" y="494" font-family="'Courier New',monospace" font-size="32" fill="#E65100" text-anchor="middle">file:///...</text>

  <!-- Second row of branches -->
  <line x1="188" y1="528" x2="188" y2="580" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="405" y1="528" x2="405" y2="580" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="623" y1="528" x2="623" y2="580" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="840" y1="528" x2="840" y2="580" stroke="white" stroke-width="8" opacity="0.5"/>

  <!-- Format labels -->
  <text x="188" y="624" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="white"
    text-anchor="middle" opacity="0.8">slash</text>
  <text x="405" y="624" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="white"
    text-anchor="middle" opacity="0.8">name</text>
  <text x="623" y="624" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="white"
    text-anchor="middle" opacity="0.8">C#</text>
  <text x="840" y="624" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="white"
    text-anchor="middle" opacity="0.8">URL</text>

  <!-- Layer 3: "9 formats" bottom label -->
  <rect x="200" y="720" width="624" height="200" rx="28" fill="white" opacity="0.15"/>
  <text x="512" y="810" font-family="'Segoe UI',Arial,sans-serif" font-size="88" font-weight="bold"
    fill="white" text-anchor="middle">9 Formats</text>
  <text x="512" y="888" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="white"
    text-anchor="middle" opacity="0.8">instant clipboard</text>
</svg>
