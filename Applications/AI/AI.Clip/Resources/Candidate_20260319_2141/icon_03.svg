<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Text pipeline — clipboard in, processed text out -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#08001A"/>
  <!-- Pipeline tube -->
  <rect x="140" y="460" width="740" height="104" rx="52" fill="#1A0040" stroke="#9C27B0" stroke-width="20"/>
  <!-- Input clipboard (left) -->
  <rect x="140" y="280" width="220" height="280" rx="18" fill="#1A0040" stroke="#9C27B0" stroke-width="18"/>
  <rect x="190" y="254" width="120" height="52" rx="10" fill="#9C27B0"/>
  <rect x="166" y="340" width="160" height="14" rx="7" fill="#9C27B0" opacity="0.7"/>
  <rect x="166" y="372" width="130" height="14" rx="7" fill="#9C27B0" opacity="0.5"/>
  <rect x="166" y="404" width="145" height="14" rx="7" fill="#9C27B0" opacity="0.5"/>
  <rect x="166" y="436" width="100" height="14" rx="7" fill="#9C27B0" opacity="0.4"/>
  <!-- Flow dots in pipe -->
  <circle cx="320" cy="512" r="18" fill="#CE93D8"/>
  <circle cx="400" cy="512" r="18" fill="#CE93D8" opacity="0.8"/>
  <circle cx="480" cy="512" r="24" fill="#E040FB"/>
  <circle cx="560" cy="512" r="18" fill="#CE93D8" opacity="0.8"/>
  <circle cx="640" cy="512" r="18" fill="#CE93D8"/>
  <!-- AI chip in middle of pipe -->
  <rect x="446" y="478" width="68" height="68" rx="10" fill="#6A1B9A"/>
  <rect x="458" y="490" width="44" height="44" rx="6" fill="#1A0040"/>
  <rect x="466" y="498" width="12" height="12" rx="3" fill="#E040FB"/>
  <rect x="482" y="498" width="12" height="12" rx="3" fill="#E040FB"/>
  <rect x="466" y="514" width="12" height="12" rx="3" fill="#E040FB"/>
  <rect x="482" y="514" width="12" height="12" rx="3" fill="#E040FB"/>
  <!-- Output: cleaned text (right) -->
  <rect x="664" y="300" width="220" height="260" rx="18" fill="#1A0040" stroke="#E040FB" stroke-width="18"/>
  <rect x="690" y="340" width="160" height="14" rx="7" fill="#E040FB" opacity="0.9"/>
  <rect x="690" y="370" width="140" height="14" rx="7" fill="#E040FB" opacity="0.7"/>
  <rect x="690" y="400" width="155" height="14" rx="7" fill="#E040FB" opacity="0.7"/>
  <rect x="690" y="430" width="120" height="14" rx="7" fill="#E040FB" opacity="0.5"/>
  <!-- checkmark on output -->
  <path d="M734 480 L760 506 L820 440" fill="none" stroke="#76FF03" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
