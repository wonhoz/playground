  <line x1="393" y1="130" x2="421" y2="130" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="398" y1="155" x2="416" y2="155" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="399" y1="205" x2="415" y2="205" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="393" y1="230" x2="421" y2="230" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="398" y1="255" x2="416" y2="255" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="399" y1="305" x2="415" y2="305" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
