<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg13" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6B0829"/>
      <stop offset="100%" stop-color="#4C0519"/>
    </radialGradient>
    <linearGradient id="clock13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D0A15"/>
      <stop offset="100%" stop-color="#1A0510"/>
    </linearGradient>
    <filter id="glow13">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip13">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>
  <g clip-path="url(#clip13)">
    <!-- Layer 2: 타이머 시계 원형 -->
    <!-- 시계 배경 -->
    <circle cx="512" cy="480" r="280" fill="url(#clock13)"/>
    <!-- 시계 테두리 -->
    <circle cx="512" cy="480" r="280" fill="none" stroke="#F9A8D4" stroke-width="16"/>
    <!-- 시계 눈금들 (12개) -->
    <g filter="url(#glow13)">
      <line x1="512" y1="216" x2="512" y2="248" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="652" y1="252" x2="635" y2="279" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="744" y1="340" x2="720" y2="357" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="792" y1="480" x2="760" y2="480" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="744" y1="620" x2="720" y2="603" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="652" y1="708" x2="635" y2="681" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="512" y1="744" x2="512" y2="712" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="372" y1="708" x2="389" y2="681" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="280" y1="620" x2="304" y2="603" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="232" y1="480" x2="264" y2="480" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="280" y1="340" x2="304" y2="357" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="372" y1="252" x2="389" y2="279" stroke="#F9A8D4" stroke-width="10" stroke-linecap="round"/>
    </g>
    <!-- 시계 진행 원호 (약 80% 경과) -->
    <path d="M 512 200 A 280 280 0 1 1 346 714" fill="none" stroke="#FDE68A" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
    <!-- 시침 -->
    <line x1="512" y1="480" x2="620" y2="350" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    <!-- 분침 -->
    <line x1="512" y1="480" x2="512" y2="290" stroke="#F9A8D4" stroke-width="8" stroke-linecap="round"/>
    <!-- 중심점 -->
    <circle cx="512" cy="480" r="18" fill="#FDE68A"/>
    <circle cx="512" cy="480" r="8" fill="#FFFFFF"/>

    <!-- Layer 3: 생존 시간 텍스트 -->
    <!-- 하단 시간 표시 -->
    <rect x="260" y="800" width="504" height="90" rx="12" fill="#2D0A15" opacity="0.8"/>
    <rect x="260" y="800" width="504" height="90" rx="12" fill="none" stroke="#F9A8D4" stroke-width="2" opacity="0.4"/>
    <text x="512" y="862" font-family="Courier New, monospace" font-size="52" font-weight="bold" text-anchor="middle" fill="#FDE68A" letter-spacing="4">02:45</text>
    <!-- SURVIVE 레이블 -->
    <text x="512" y="790" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#F9A8D4" opacity="0.7" letter-spacing="6">SURVIVE TIME</text>
    <!-- 총알 위협 — 상단 좌우 -->
    <ellipse cx="200" cy="240" rx="11" ry="20" fill="#F9A8D4" opacity="0.7"/>
    <ellipse cx="824" cy="240" rx="11" ry="20" fill="#F9A8D4" opacity="0.7"/>
    <ellipse cx="160" cy="320" rx="11" ry="20" fill="#FDE68A" opacity="0.5"/>
    <ellipse cx="864" cy="320" rx="11" ry="20" fill="#FDE68A" opacity="0.5"/>
  </g>
</svg>
