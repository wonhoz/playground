<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_g5)"/>

  <!-- 4지선다 버튼들 (세로 배열) -->
  <!-- 버튼 1: 초록 체크 (정답) -->
  <rect x="212" y="220" width="600" height="130" rx="22" fill="white"/>
  <text x="280" y="302" font-family="Arial Black" font-size="70" font-weight="900" fill="#16A34A">A.</text>
  <text x="370" y="302" font-family="Arial Black" font-size="70" font-weight="900" fill="#1E293B">PARIS</text>
  <!-- 체크 배지 -->
  <circle cx="762" cy="285" r="44" fill="#22C55E"/>
  <text x="762" y="304" font-family="Arial Black" font-size="52" font-weight="900" text-anchor="middle" fill="white">✓</text>

  <!-- 버튼 2 -->
  <rect x="212" y="370" width="600" height="130" rx="22" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <text x="280" y="452" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.6)">B.</text>
  <text x="370" y="452" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.8)">LYON</text>

  <!-- 버튼 3 -->
  <rect x="212" y="520" width="600" height="130" rx="22" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <text x="280" y="602" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.6)">C.</text>
  <text x="370" y="602" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.8)">NICE</text>

  <!-- 버튼 4 -->
  <rect x="212" y="670" width="600" height="130" rx="22" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <text x="280" y="752" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.6)">D.</text>
  <text x="370" y="752" font-family="Arial Black" font-size="70" font-weight="900" fill="rgba(255,255,255,0.8)">BORDEAUX</text>

  <!-- 질문 텍스트 -->
  <text x="512" y="875" font-family="Arial Black" font-size="46" font-weight="900" text-anchor="middle" fill="rgba(255,255,255,0.5)">France의 수도는?</text>
</svg>
