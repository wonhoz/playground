  <text x="95" y="398" text-anchor="middle" font-family="monospace" font-size="7" fill="#FCD34D">Python</text>
  <text x="95" y="410" text-anchor="middle" font-family="monospace" font-size="7" fill="#F59E0B">★★★★★</text>
