  <rect x="86" y="398" width="852" height="44" fill="#E3F2FD" rx="4"/>
  <text x="148" y="420" font-family="Arial, sans-serif" font-size="20" fill="#FF6F00"
        dominant-baseline="middle">📁  Resources/ ▼</text>
  <text x="632" y="420" font-family="Consolas, monospace" font-size="18" fill="#546E7A"
