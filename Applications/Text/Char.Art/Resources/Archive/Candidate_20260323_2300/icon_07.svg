<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#DB2777"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Star shape made of characters -->
    <!-- Star polygon outline -->
    <polygon points="512,130 588,360 830,360 638,500 710,730 512,590 314,730 386,500 194,360 436,360"
             fill="none" stroke="#FDE68A" stroke-width="20" stroke-linejoin="round"/>
    <!-- Fill star arms with chars -->
    <!-- Top point -->
    <text x="490" y="220" font-size="36" font-weight="bold" font-family="monospace" fill="#FDE68A">@</text>
    <text x="460" y="265" font-size="32" font-family="monospace" fill="#FDE68A">#</text>
    <text x="520" y="265" font-size="32" font-family="monospace" fill="#FDE68A">@</text>
    <!-- Right upper arm -->
    <text x="660" y="330" font-size="30" font-family="monospace" fill="#FDE68A">$</text>
    <text x="720" y="340" font-size="30" font-family="monospace" fill="#FDE68A">#</text>
    <text x="775" y="345" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <!-- Left upper arm -->
    <text x="210" y="330" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <text x="270" y="340" font-size="30" font-family="monospace" fill="#FDE68A">#</text>
    <text x="330" y="345" font-size="30" font-family="monospace" fill="#FDE68A">$</text>
    <!-- Center -->
    <text x="430" y="440" font-size="34" font-family="monospace" fill="#22D3EE">@</text>
    <text x="490" y="430" font-size="40" font-weight="bold" font-family="monospace" fill="#FDE68A">*</text>
    <text x="548" y="440" font-size="34" font-family="monospace" fill="#22D3EE">#</text>
    <text x="460" y="490" font-size="36" font-family="monospace" fill="#22D3EE">$</text>
    <text x="520" y="490" font-size="36" font-family="monospace" fill="#FDE68A">%</text>
    <!-- Right lower arm -->
    <text x="650" y="490" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <text x="700" y="530" font-size="30" font-family="monospace" fill="#FDE68A">#</text>
    <!-- Left lower arm -->
    <text x="280" y="490" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <text x="240" y="530" font-size="30" font-family="monospace" fill="#FDE68A">#</text>
    <!-- Bottom right arm -->
    <text x="660" y="630" font-size="30" font-family="monospace" fill="#FDE68A">$</text>
    <text x="640" y="680" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <!-- Bottom left arm -->
    <text x="320" y="630" font-size="30" font-family="monospace" fill="#FDE68A">$</text>
    <text x="340" y="680" font-size="30" font-family="monospace" fill="#FDE68A">@</text>
    <!-- Bottom point -->
    <text x="485" y="730" font-size="34" font-family="monospace" fill="#FDE68A">.</text>
    <text x="460" y="780" font-size="34" font-family="monospace" fill="#FDE68A">-</text>
    <text x="510" y="780" font-size="34" font-family="monospace" fill="#FDE68A">.</text>
    <text x="488" y="840" font-size="34" font-family="monospace" fill="#FDE68A">.</text>
  </g>
</svg>
