<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Dep.Graph - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #ffffff; }
    p.desc { text-align: center; color: #888888; margin-bottom: 28px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
    .item img { width: 160px; height: 160px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #aaaaaa; text-align: center; word-break: break-all; }
    .item .num { font-size: 0.85rem; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Dep.Graph — 아이콘 후보 10종</h1>
  <p class="desc">프로젝트 의존성 그래프 시각화</p>
  <div class="grid">
    <div class="item">
      <img src="candidate_01_network_blue.svg" alt="01"/>
      <span class="num">01</span>
      <span>Network Blue</span>
    </div>
    <div class="item">
      <img src="candidate_02_tree_green.svg" alt="02"/>
      <span class="num">02</span>
      <span>Tree Green</span>
    </div>
    <div class="item">
      <img src="candidate_03_neon_green_flow.svg" alt="03"/>
      <span class="num">03</span>
      <span>Neon Green Flow</span>
    </div>
    <div class="item">
      <img src="candidate_04_orange_tree.svg" alt="04"/>
      <span class="num">04</span>
      <span>Orange Tree</span>
    </div>
    <div class="item">
      <img src="candidate_05_teal_circular.svg" alt="05"/>
      <span class="num">05</span>
      <span>Teal Circular</span>
    </div>
    <div class="item">
      <img src="candidate_06_slate_matrix.svg" alt="06"/>
      <span class="num">06</span>
      <span>Slate Matrix</span>
    </div>
    <div class="item">
      <img src="candidate_07_pink_radial.svg" alt="07"/>
      <span class="num">07</span>
      <span>Pink Radial</span>
    </div>
    <div class="item">
      <img src="candidate_08_layered_arch.svg" alt="08"/>
      <span class="num">08</span>
      <span>Layered Arch</span>
    </div>
    <div class="item">
      <img src="candidate_09_red_circular_dep.svg" alt="09"/>
      <span class="num">09</span>
      <span>Red Circular Dep</span>
    </div>
    <div class="item">
      <img src="candidate_10_golden_hub.svg" alt="10"/>
      <span class="num">10</span>
      <span>Golden Hub</span>
    </div>
  </div>
</body>
</html>
