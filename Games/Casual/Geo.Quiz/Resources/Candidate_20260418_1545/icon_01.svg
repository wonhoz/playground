<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 문제 텍스트 영역 -->
    <rect x="80" y="100" width="864" height="100" rx="20" fill="#1565C0"/>
    <text x="512" y="162" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">프랑스의 수도는?</text>

    <!-- 4지선다 버튼 그리드 (2x2) -->
    <!-- 버튼 A (정답 - 초록) -->
    <rect x="80" y="226" width="400" height="150" rx="20" fill="#2E7D32"/>
    <text x="200" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF">🇫🇷</text>
    <text x="280" y="316" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">파리</text>
    <!-- 정답 체크 -->
    <circle cx="440" cy="300" r="36" fill="#FFFFFF" opacity="0.2"/>
    <text x="440" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle">✓</text>

    <!-- 버튼 B -->
    <rect x="544" y="226" width="400" height="150" rx="20" fill="#1565C0"/>
    <text x="664" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF">🇩🇪</text>
    <text x="744" y="316" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">베를린</text>

    <!-- 버튼 C -->
    <rect x="80" y="400" width="400" height="150" rx="20" fill="#1565C0"/>
    <text x="200" y="444" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF">🇪🇸</text>
    <text x="280" y="490" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">마드리드</text>

    <!-- 버튼 D -->
    <rect x="544" y="400" width="400" height="150" rx="20" fill="#1565C0"/>
    <text x="664" y="444" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF">🇮🇹</text>
    <text x="744" y="490" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">로마</text>

    <!-- 타이머 바 -->
    <rect x="80" y="580" width="864" height="30" rx="12" fill="#90CAF9"/>
    <rect x="80" y="580" width="560" height="30" rx="12" fill="#FF6D00"/>
    <text x="512" y="650" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="#1565C0" text-anchor="middle">⏱ 9초</text>

    <!-- 스코어 / 스트릭 -->
    <rect x="80" y="690" width="400" height="70" rx="20" fill="#FF8F00"/>
    <text x="280" y="735" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">🔥 3연속!</text>
    <rect x="544" y="690" width="400" height="70" rx="20" fill="#0277BD"/>
    <text x="744" y="735" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">점수: 60</text>

    <!-- 타이틀 -->
    <rect x="200" y="848" width="624" height="70" rx="24" fill="#0D47A1"/>
    <text x="512" y="895" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">GEO.QUIZ</text>
  </g>
</svg>
