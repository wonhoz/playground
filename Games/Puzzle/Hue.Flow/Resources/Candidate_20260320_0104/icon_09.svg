<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050008"/>
  <!-- 색 수도관 (파이프 연결) -->
  <!-- 파이프들 -->
  <rect x="200" y="400" width="180" height="60" rx="30" fill="#CE93D8"/>
  <rect x="420" y="280" width="60" height="200" rx="30" fill="#9C27B0"/>
