<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 스탬프 — ICO 인장 찍기 | 공간/장면 | #FFF0E0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF0E0"/>
  <!-- Layer 2: Rubber stamp pressing onto surface -->
  <!-- Stamp imprint (on paper/surface below) -->
  <rect x="260" y="700" width="504" height="160" rx="8" fill="#FDE8D0" stroke="#D97706" stroke-width="3"/>
  <!-- Stamped ICO design (ink impression) -->
  <text x="512" y="774" font-family="Arial,sans-serif" font-size="52" fill="#B45309" text-anchor="middle" font-weight="bold" opacity="0.85">ICO</text>
  <rect x="288" y="718" width="448" height="2" fill="#B45309" opacity="0.3"/>
  <rect x="288" y="842" width="448" height="2" fill="#B45309" opacity="0.3"/>
  <text x="512" y="840" font-family="monospace" font-size="16" fill="#92400E" text-anchor="middle">16 · 32 · 48 · 256 px</text>
  <!-- Stamp body (handle) -->
  <!-- Handle -->
  <rect x="434" y="240" width="156" height="80" rx="12" fill="#7C2D12"/>
  <rect x="446" y="320" width="132" height="30" fill="#9A3412"/>
  <!-- Stamp plate -->
  <rect x="350" y="350" width="324" height="120" rx="10" fill="#B45309" stroke="#92400E" stroke-width="4"/>
  <!-- Rubber portion -->
  <rect x="360" y="460" width="304" height="70" rx="6" fill="#DC2626"/>
  <!-- ICO text on rubber -->
  <text x="512" y="507" font-family="Arial,sans-serif" font-size="38" fill="#FEF2F2" text-anchor="middle" font-weight="bold">ICO</text>
  <!-- Ink splash around stamp -->
  <circle cx="310" cy="700" r="10" fill="#B45309" opacity="0.4"/>
  <circle cx="714" cy="700" r="8" fill="#B45309" opacity="0.3"/>
  <circle cx="270" cy="730" r="6" fill="#92400E" opacity="0.3"/>
  <circle cx="754" cy="725" r="7" fill="#92400E" opacity="0.3"/>
  <!-- Layer 3: Action lines (pressing motion) -->
  <line x1="512" y1="200" x2="512" y2="240" stroke="#B45309" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="450" y1="210" x2="470" y2="245" stroke="#B45309" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="574" y1="210" x2="554" y2="245" stroke="#B45309" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</svg>
