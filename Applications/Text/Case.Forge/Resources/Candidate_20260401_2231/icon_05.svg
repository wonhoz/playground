<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (purple-magenta) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg05cf)"/>

  <!-- Layer 2: Dynamic transformation arrows -->
  <!-- Input text block -->
  <rect x="80" y="220" width="380" height="160" rx="24" fill="white" opacity="0.92"/>
  <text x="270" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="#880E4F" text-anchor="middle">Text</text>
  <text x="270" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="#AD1457"
    text-anchor="middle">Input</text>

  <!-- Multiple transformation arrows going right -->
  <path d="M480 280 L560 280" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M544 264 L562 280 L544 296" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Output text blocks stacked -->
  <rect x="574" y="100" width="370" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="759" y="156" font-family="'Courier New',monospace" font-size="52" font-weight="bold"
    fill="#1565C0" text-anchor="middle">camelCase</text>

  <rect x="574" y="210" width="370" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="759" y="266" font-family="'Courier New',monospace" font-size="52" font-weight="bold"
    fill="#2E7D32" text-anchor="middle">snake_case</text>

  <rect x="574" y="320" width="370" height="88" rx="16" fill="white" opacity="0.9"/>
  <text x="759" y="376" font-family="'Courier New',monospace" font-size="52" font-weight="bold"
    fill="#880E4F" text-anchor="middle">kebab-case</text>

  <rect x="574" y="430" width="370" height="88" rx="16" fill="white" opacity="0.85"/>
  <text x="759" y="486" font-family="'Courier New',monospace" font-size="44" font-weight="bold"
    fill="#4A148C" text-anchor="middle">PascalCase</text>

  <!-- Diverging lines from arrow -->
  <line x1="562" y1="270" x2="574" y2="144" stroke="white" stroke-width="8" opacity="0.6"/>
  <line x1="562" y1="280" x2="574" y2="254" stroke="white" stroke-width="8" opacity="0.6"/>
  <line x1="562" y1="290" x2="574" y2="364" stroke="white" stroke-width="8" opacity="0.6"/>
  <line x1="562" y1="300" x2="574" y2="474" stroke="white" stroke-width="8" opacity="0.6"/>

  <!-- Layer 3: "11 cases" badge + formula -->
  <rect x="80" y="600" width="864" height="300" rx="24" fill="white" opacity="0.12"/>
  <text x="512" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="84" fill="white"
    text-anchor="middle" opacity="0.95">Text → 11 Cases</text>
  <text x="512" y="800" font-family="'Courier New',monospace" font-size="60" fill="#FFF176"
    text-anchor="middle">1-click · instant copy</text>
  <text x="512" y="878" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white"
    text-anchor="middle" opacity="0.7">✦ clipboard auto-load ✦</text>
</svg>
