    <rect x="546" y="310" width="106" height="48" rx="8" fill="#4CD964"/>
    <rect x="662" y="310" width="106" height="48" rx="8" fill="#66EE80"/>
    <rect x="778" y="310" width="106" height="48" rx="8" fill="#4CD964"/>
    <rect x="82" y="310" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="198" y="310" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
    <rect x="314" y="310" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="430" y="310" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
    <rect x="546" y="310" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="662" y="310" width="106" height="14" rx="7" fill="white" opacity="0.10"/>
