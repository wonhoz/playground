<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000428"/>
      <stop offset="100%" stop-color="#004e92"/>
    </linearGradient>
    <linearGradient id="w1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c9ff"/>
      <stop offset="100%" stop-color="#92fe9d"/>
    </linearGradient>
    <linearGradient id="w2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fc5c7d"/>
      <stop offset="100%" stop-color="#6a3093"/>
    </linearGradient>
    <linearGradient id="w3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bezier waves -->
  <path d="M60 180 C130 120 180 240 256 180 C332 120 380 240 452 180" stroke="url(#w1)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M60 220 C130 160 180 280 256 220 C332 160 380 280 452 220" stroke="url(#w1)" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)"/>
  <path d="M60 280 C130 220 180 340 256 280 C332 220 380 340 452 280" stroke="url(#w2)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M60 320 C130 260 180 380 256 320 C332 260 380 380 452 320" stroke="url(#w2)" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)"/>
  <path d="M60 370 C130 310 180 430 256 370 C332 310 380 430 452 370" stroke="url(#w3)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <!-- Anchor nodes on waves -->
  <circle cx="256" cy="180" r="8" fill="url(#w1)" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="8" fill="url(#w2)" filter="url(#glow)"/>
  <circle cx="256" cy="370" r="8" fill="url(#w3)" filter="url(#glow)"/>
  <rect x="248" y="100" width="16" height="16" rx="3" fill="white" opacity="0.5"/>
</svg>