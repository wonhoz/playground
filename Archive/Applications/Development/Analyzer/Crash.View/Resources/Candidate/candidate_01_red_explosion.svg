<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#3D0000"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="50%" stop-color="#DD2C00"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bug/crash explosion -->
  <circle cx="256" cy="240" r="120" fill="url(#fire)" opacity="0.85"/>
  <!-- Fragments -->
  <polygon points="256,100 270,148 256,130 242,148" fill="#FF3D00" opacity="0.9"/>
  <polygon points="380,140 352,175 360,152 336,168" fill="#FF3D00" opacity="0.8" transform="rotate(30,360,155)"/>
  <polygon points="410,256 362,262 380,250 358,270" fill="#FF6D00" opacity="0.9" transform="rotate(60,385,260)"/>
  <polygon points="380,372 344,340 362,348 340,328" fill="#FF3D00" opacity="0.8" transform="rotate(90,360,350)"/>
  <polygon points="132,140 160,175 152,152 176,168" fill="#FF3D00" opacity="0.8" transform="rotate(-30,152,155)"/>
  <polygon points="102,256 150,262 132,250 154,270" fill="#FF6D00" opacity="0.9" transform="rotate(-60,127,260)"/>
  <polygon points="132,372 168,340 150,348 172,328" fill="#FF3D00" opacity="0.8" transform="rotate(-90,152,350)"/>
  <!-- Bug icon -->
  <ellipse cx="256" cy="240" rx="45" ry="55" fill="#1A0000" stroke="#FF3D00" stroke-width="3"/>
  <!-- Antennae -->
  <line x1="240" y1="190" x2="220" y2="160" stroke="#FF6D00" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="190" x2="292" y2="160" stroke="#FF6D00" stroke-width="4" stroke-linecap="round"/>
  <circle cx="220" cy="158" r="6" fill="#FF3D00"/>
  <circle cx="292" cy="158" r="6" fill="#FF3D00"/>
  <!-- Bug legs -->
  <line x1="220" y1="230" x2="188" y2="215" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="248" x2="188" y2="248" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="266" x2="188" y2="281" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <line x1="292" y1="230" x2="324" y2="215" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <line x1="292" y1="248" x2="324" y2="248" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <line x1="292" y1="266" x2="324" y2="281" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <!-- X eyes -->
  <line x1="240" y1="220" x2="250" y2="230" stroke="#FF3D00" stroke-width="3"/>
  <line x1="250" y1="220" x2="240" y2="230" stroke="#FF3D00" stroke-width="3"/>
  <line x1="262" y1="220" x2="272" y2="230" stroke="#FF3D00" stroke-width="3"/>
  <line x1="272" y1="220" x2="262" y2="230" stroke="#FF3D00" stroke-width="3"/>
  <!-- CRASH text -->
  <text x="256" y="416" text-anchor="middle" font-family="Impact, sans-serif" font-size="42" fill="#FF3D00" letter-spacing="3">CRASH</text>
</svg>
