<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#0369A1"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Top half: original mountain image -->
    <rect x="100" y="120" width="824" height="380" rx="18" fill="#0C4A6E" stroke="white" stroke-width="10"/>
    <text x="130" y="165" font-size="28" font-weight="bold" font-family="system-ui" fill="white">ORIGINAL</text>
    <!-- Mountain in photo -->
    <polygon points="200,480 380,260 470,360 560,240 740,480" fill="white" opacity="0.9"/>
    <!-- Sky gradient in photo -->
    <rect x="110" y="130" width="804" height="100" rx="10" fill="#38BDF8" opacity="0.3"/>
    <!-- Sun -->
    <circle cx="750" cy="230" r="45" fill="#FDE68A"/>
    <!-- Ground -->
    <rect x="100" y="440" width="824" height="60" rx="0" fill="#166534" opacity="0.7"/>
    <!-- Arrow between panels -->
    <polygon points="480,540 544,540 544,510 600,560 544,610 544,580 480,580" fill="#22D3EE"/>
    <!-- Bottom half: ASCII version -->
    <rect x="100" y="600" width="824" height="300" rx="18" fill="#164E63" stroke="#22D3EE" stroke-width="10"/>
    <text x="130" y="645" font-size="28" font-weight="bold" font-family="system-ui" fill="#22D3EE">ASCII ART</text>
    <text x="120" y="695" font-size="18" font-family="monospace" fill="#22D3EE">     .    @@@    .    #    .</text>
    <text x="120" y="725" font-size="18" font-family="monospace" fill="#22D3EE">   .  @@ @@@@@ @@ . @@@  .</text>
    <text x="120" y="755" font-size="18" font-family="monospace" fill="#22D3EE">  . @@@@@@@@@@@@@@@@@@@@ .</text>
    <text x="120" y="785" font-size="18" font-family="monospace" fill="#22D3EE"> @@@@@@@@@@@@@@@@@@@@@@@@ </text>
    <text x="120" y="815" font-size="18" font-family="monospace" fill="#22D3EE">##########################</text>
    <text x="120" y="845" font-size="18" font-family="monospace" fill="#22D3EE">##########################</text>
    <text x="120" y="875" font-size="18" font-family="monospace" fill="#22D3EE">##########################</text>
  </g>
</svg>
