<!-- Locale.Forge icon_05: 언어 트리 (branching tree of languages) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0F1A"/>
  <!-- Trunk -->
  <rect x="488" y="500" width="48" height="260" rx="24" fill="#5C6BC0"/>
  <!-- Root node -->
  <circle cx="512" cy="480" r="52" fill="#5C6BC0"/>
  <!-- Left branch -->
  <path d="M490 440 Q340 360 300 280" fill="none" stroke="#5C6BC0" stroke-width="36" stroke-linecap="round"/>
  <!-- Right branch -->
  <path d="M534 440 Q684 360 724 280" fill="none" stroke="#5C6BC0" stroke-width="36" stroke-linecap="round"/>
  <!-- Leaf nodes -->
  <circle cx="288" cy="256" r="44" fill="#7986CB"/>
  <circle cx="512" cy="230" r="44" fill="#7986CB"/>
  <circle cx="736" cy="256" r="44" fill="#7986CB"/>
  <!-- Center branch up -->
  <path d="M512 430 L512 274" fill="none" stroke="#5C6BC0" stroke-width="36" stroke-linecap="round"/>
</svg>
