<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | QR 코드 + 커스텀 색상/로고 — 나만의 QR 디자인 | 기하학 추상 | 코랄+황금+흰 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#BF360C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- QR 1: plain black/white -->
  <rect x="90" y="140" width="300" height="300" rx="14" fill="white" filter="url(#sh4)"/>
  <!-- Finder patterns -->
  <rect x="106" y="156" width="72" height="72" rx="5" fill="#212121"/>
  <rect x="114" y="164" width="56" height="56" rx="3" fill="white"/>
  <rect x="122" y="172" width="40" height="40" rx="2" fill="#212121"/>
  <rect x="302" y="156" width="72" height="72" rx="5" fill="#212121"/>
  <rect x="310" y="164" width="56" height="56" rx="3" fill="white"/>
  <rect x="318" y="172" width="40" height="40" rx="2" fill="#212121"/>
  <rect x="106" y="352" width="72" height="72" rx="5" fill="#212121"/>
  <rect x="114" y="360" width="56" height="56" rx="3" fill="white"/>
  <rect x="122" y="368" width="40" height="40" rx="2" fill="#212121"/>
  <!-- Data dots -->
  <rect x="196" y="156" width="88" height="88" rx="4" fill="#F5F5F5"/>
  <rect x="206" y="166" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="222" y="166" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="250" y="166" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="266" y="166" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="206" y="182" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="238" y="182" width="12" height="12" rx="2" fill="#212121"/>
  <rect x="222" y="250" width="130" height="100" rx="6" fill="#F5F5F5"/>
  <text x="240" y="420" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        text-anchor="middle">기본</text>

  <!-- Arrow right: → styled -->
  <polygon points="400,290 460,260 460,320" fill="#FF6F00"/>

  <!-- QR 2: colored (orange on cream) -->
  <rect x="470" y="140" width="300" height="300" rx="14" fill="#FFF9C4" filter="url(#sh4)"/>
  <!-- Same pattern, orange color -->
  <rect x="486" y="156" width="72" height="72" rx="5" fill="#E64A19"/>
  <rect x="494" y="164" width="56" height="56" rx="3" fill="#FFF9C4"/>
  <rect x="502" y="172" width="40" height="40" rx="2" fill="#E64A19"/>
  <rect x="682" y="156" width="72" height="72" rx="5" fill="#E64A19"/>
  <rect x="690" y="164" width="56" height="56" rx="3" fill="#FFF9C4"/>
  <rect x="698" y="172" width="40" height="40" rx="2" fill="#E64A19"/>
  <rect x="486" y="352" width="72" height="72" rx="5" fill="#E64A19"/>
  <rect x="494" y="360" width="56" height="56" rx="3" fill="#FFF9C4"/>
  <rect x="502" y="368" width="40" height="40" rx="2" fill="#E64A19"/>
  <rect x="580" y="200" width="90" height="90" rx="6" fill="#FFF9C4"/>
  <rect x="590" y="210" width="12" height="12" rx="2" fill="#E64A19"/>
  <rect x="606" y="210" width="12" height="12" rx="2" fill="#E64A19"/>
  <rect x="590" y="226" width="12" height="12" rx="2" fill="#E64A19"/>
  <rect x="622" y="226" width="12" height="12" rx="2" fill="#E64A19"/>
  <!-- Center logo -->
  <rect x="564" y="244" width="72" height="72" rx="8" fill="white"/>
  <text x="600" y="280" font-family="Arial Black, sans-serif" font-size="30" fill="#E64A19"
        text-anchor="middle" dominant-baseline="middle">🔗</text>
  <text x="620" y="420" font-family="Arial, sans-serif" font-size="18" fill="#E64A19"
        text-anchor="middle" font-weight="bold">색상 커스텀</text>

  <!-- Arrow down -->
  <polygon points="512,450 480,510 544,510" fill="#FF6F00"/>

  <!-- QR 3: gradient-colored with logo -->
  <rect x="270" y="540" width="484" height="300" rx="20" fill="white" filter="url(#sh4)"/>
  <!-- Gradient QR (colorful) -->
  <rect x="290" y="560" width="200" height="200" rx="12" fill="#F9FBE7"/>
  <rect x="302" y="572" width="60" height="60" rx="5" fill="#FF6F00"/>
  <rect x="310" y="580" width="44" height="44" rx="3" fill="#F9FBE7"/>
  <rect x="318" y="588" width="28" height="28" rx="2" fill="#FF6F00"/>
  <rect x="370" y="572" width="60" height="60" rx="5" fill="#FF6F00"/>
  <rect x="378" y="580" width="44" height="44" rx="3" fill="#F9FBE7"/>
  <rect x="386" y="588" width="28" height="28" rx="2" fill="#FF6F00"/>
  <rect x="302" y="640" width="60" height="60" rx="5" fill="#FF6F00"/>
  <rect x="310" y="648" width="44" height="44" rx="3" fill="#F9FBE7"/>
  <rect x="318" y="656" width="28" height="28" rx="2" fill="#FF6F00"/>
  <!-- Mini data dots colored -->
  <rect x="376" y="640" width="10" height="10" rx="2" fill="#1E88E5"/>
  <rect x="390" y="640" width="10" height="10" rx="2" fill="#43A047"/>
  <rect x="404" y="640" width="10" height="10" rx="2" fill="#E53935"/>
  <rect x="376" y="654" width="10" height="10" rx="2" fill="#7B1FA2"/>
  <rect x="404" y="654" width="10" height="10" rx="2" fill="#FF6F00"/>
  <rect x="376" y="668" width="10" height="10" rx="2" fill="#43A047"/>
  <rect x="390" y="668" width="10" height="10" rx="2" fill="#1E88E5"/>
  <!-- Center logo in gradient QR -->
  <rect x="340" y="660" width="60" height="60" rx="8" fill="white" filter="url(#sh4)"/>
  <text x="370" y="690" font-family="Arial Black, sans-serif" font-size="32" fill="#FF6F00"
        text-anchor="middle" dominant-baseline="middle">F</text>

  <!-- Sliders (color controls) on right -->
  <text x="520" y="580" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">전경색</text>
  <rect x="520" y="592" width="200" height="14" rx="7" fill="#E0E0E0"/>
  <rect x="520" y="592" width="140" height="14" rx="7" fill="#FF6F00"/>
  <circle cx="660" cy="599" r="14" fill="#FF6F00" filter="url(#sh4)"/>

  <text x="520" y="636" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">배경색</text>
  <rect x="520" y="648" width="200" height="14" rx="7" fill="#E0E0E0"/>
  <rect x="520" y="648" width="180" height="14" rx="7" fill="#FFF9C4"/>
  <circle cx="700" cy="655" r="14" fill="#FFF9C4" filter="url(#sh4)"/>
  <rect x="700" y="641" width="28" height="28" rx="14" fill="none" stroke="#E0E0E0" stroke-width="2"/>

  <text x="520" y="692" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">로고 삽입</text>
  <rect x="520" y="700" width="200" height="36" rx="10" fill="#FFD740"/>
  <text x="620" y="718" font-family="Arial Black, sans-serif" font-size="18" fill="#BF360C"
        text-anchor="middle" dominant-baseline="middle">로고 파일 선택...</text>

  <text x="270" y="858" font-family="Arial Black, sans-serif" font-size="28" fill="#E64A19"
        text-anchor="left">나만의 디자인 QR 코드</text>
</svg>
