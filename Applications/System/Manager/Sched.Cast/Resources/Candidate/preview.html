<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Sched.Cast - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 24px; color: #888; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; }
  .item span { font-size: 0.72rem; color: #666; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Sched.Cast — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_blue_calendar_clock.svg"/><span>01 blue_calendar_clock</span></div>
  <div class="item"><img src="candidate_02_green_task_check.svg"/><span>02 green_task_check</span></div>
  <div class="item"><img src="candidate_03_orange_broadcast_schedule.svg"/><span>03 orange_broadcast_schedule</span></div>
  <div class="item"><img src="candidate_04_purple_cron_gear.svg"/><span>04 purple_cron_gear</span></div>
  <div class="item"><img src="candidate_05_teal_timeline.svg"/><span>05 teal_timeline</span></div>
  <div class="item"><img src="candidate_06_red_alarm_scheduler.svg"/><span>06 red_alarm_scheduler</span></div>
  <div class="item"><img src="candidate_07_gold_timer_run.svg"/><span>07 gold_timer_run</span></div>
  <div class="item"><img src="candidate_08_dark_system_cog.svg"/><span>08 dark_system_cog</span></div>
  <div class="item"><img src="candidate_09_mint_recurring_arrow.svg"/><span>09 mint_recurring_arrow</span></div>
  <div class="item"><img src="candidate_10_indigo_cast_play.svg"/><span>10 indigo_cast_play</span></div>
</div>
</body>
</html>
