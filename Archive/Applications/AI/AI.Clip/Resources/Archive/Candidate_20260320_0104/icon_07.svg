<!-- AI.Clip icon_07: 엘리베이터 상승 (elevator arrow lifting) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0520"/>
  <!-- Elevator shaft -->
  <rect x="280" y="180" width="464" height="660" rx="32" fill="#1A0A2A" stroke="#7B1FA2" stroke-width="28"/>
  <!-- Elevator cabin -->
  <rect x="320" y="500" width="384" height="280" rx="20" fill="#7B1FA2"/>
  <!-- Cabin door line -->
  <line x1="512" y1="510" x2="512" y2="770" stroke="#9C27B0" stroke-width="20"/>
  <!-- Up arrow (above cabin) -->
  <polygon points="512,240 440,400 584,400" fill="#CE93D8"/>
  <rect x="488" y="390" width="48" height="120" rx="12" fill="#CE93D8"/>
  <!-- Cable lines -->
  <line x1="380" y1="180" x2="380" y2="510" stroke="#9C27B0" stroke-width="16"/>
  <line x1="644" y1="180" x2="644" y2="510" stroke="#9C27B0" stroke-width="16"/>
</svg>
