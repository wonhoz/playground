<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="60%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#003399"/>
    </radialGradient>
    <linearGradient id="splitLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00cc88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M80,256 Q256,120 432,256 Q256,392 80,256 Z" fill="#1e3a5f" opacity="0.9"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="100" fill="url(#lens)"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="45" fill="#000a1a"/>
  <!-- Reflection dots -->
  <circle cx="230" cy="232" r="14" fill="white" opacity="0.6"/>
  <circle cx="250" cy="222" r="7" fill="white" opacity="0.4"/>
  <!-- Vertical split line through eye -->
  <rect x="250" y="156" width="12" height="200" rx="6" fill="url(#splitLine)"/>
  <!-- Left half tint (before) -->
  <path d="M80,256 Q168,156 250,160 L250,352 Q168,356 80,256 Z" fill="#4a90d9" opacity="0.25"/>
  <!-- Right half tint (after) -->
  <path d="M432,256 Q344,156 262,160 L262,352 Q344,356 432,256 Z" fill="#f5a623" opacity="0.25"/>
  <!-- Eye outline -->
  <path d="M80,256 Q256,120 432,256 Q256,392 80,256 Z" fill="none" stroke="#00d2ff" stroke-width="4" opacity="0.6"/>
  <!-- B / A labels -->
  <text x="150" y="270" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#7ecbf5">B</text>
  <text x="362" y="270" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#f5c842">A</text>
</svg>
