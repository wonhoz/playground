<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="cell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 아이콘 그리드 셀 -->
  <rect x="60" y="60" width="110" height="110" rx="20" fill="url(#cell)" opacity="0.9"/>
  <rect x="200" y="60" width="110" height="110" rx="20" fill="url(#cell)" opacity="0.8"/>
  <rect x="340" y="60" width="110" height="110" rx="20" fill="url(#cell)" opacity="0.7"/>
  <rect x="60" y="200" width="110" height="110" rx="20" fill="url(#cell)" opacity="0.7"/>
  <rect x="200" y="200" width="110" height="110" rx="20" fill="#FFCCBC" opacity="0.9"/>
  <rect x="340" y="200" width="110" height="110" rx="20" fill="url(#cell)" opacity="0.6"/>
  <!-- 돋보기 오버레이 -->
  <circle cx="255" cy="255" r="70" fill="none" stroke="#FFF3E0" stroke-width="20" opacity="0.7"/>
  <line x1="305" y1="305" x2="360" y2="360" stroke="#FFF3E0" stroke-width="24" stroke-linecap="round" opacity="0.8"/>
  <!-- 이모지 in cells -->
  <text x="115" y="130" font-size="60" text-anchor="middle" font-family="Segoe UI Emoji">😊</text>
  <text x="255" y="130" font-size="60" text-anchor="middle" font-family="Segoe UI Emoji">🌟</text>
  <text x="395" y="130" font-size="60" text-anchor="middle" font-family="Segoe UI Emoji">🔥</text>
  <text x="115" y="270" font-size="60" text-anchor="middle" font-family="Segoe UI Emoji">💡</text>
  <!-- 검색바 하단 -->
  <rect x="60" y="360" width="390" height="60" rx="30" fill="#BF360C" stroke="#FF8A65" stroke-width="2"/>
  <text x="90" y="399" font-size="28" fill="#FFCCBC" font-family="Segoe UI">Search icons...</text>
</svg>