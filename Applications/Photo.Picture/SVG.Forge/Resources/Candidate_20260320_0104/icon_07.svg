<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0500"/>
  <!-- Path zoom-in — magnified path segment -->
  <!-- Magnifier -->
  <circle cx="480" cy="480" r="280" fill="none" stroke="#E65100" stroke-width="36"/>
  <circle cx="480" cy="480" r="262" fill="#E65100" opacity="0.07"/>
  <!-- Thick path inside magnifier -->
  <path d="M260 560 C340 360 500 620 680 380" fill="none" stroke="#FF8A65" stroke-width="22" stroke-linecap="round" clip-path="url(#lens)"/>
  <!-- Nodes on path -->
  <circle cx="260" cy="560" r="28" fill="#FF8A65"/>
  <circle cx="470" cy="490" r="22" fill="none" stroke="#FF8A65" stroke-width="10"/>
  <circle cx="680" cy="380" r="28" fill="#FF8A65"/>
  <!-- Control handles -->
  <line x1="260" y1="560" x2="340" y2="360" stroke="#FF8A65" stroke-width="7" opacity="0.55"/>
  <circle cx="340" cy="360" r="16" fill="#E65100" opacity="0.9"/>
  <line x1="680" y1="380" x2="500" y2="620" stroke="#FF8A65" stroke-width="7" opacity="0.55"/>
  <circle cx="500" cy="620" r="16" fill="#E65100" opacity="0.9"/>
  <!-- Handle (magnifier) -->
  <line x1="710" y1="710" x2="840" y2="840" stroke="#E65100" stroke-width="52" stroke-linecap="round"/>
</svg>
