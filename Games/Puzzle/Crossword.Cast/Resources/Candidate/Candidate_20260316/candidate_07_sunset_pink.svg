<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a0020"/>
      <stop offset="50%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- decorative diamond grid -->
  <g transform="translate(256,256) rotate(45)">
    <rect x="-160" y="-160" width="320" height="320" rx="6" fill="none" stroke="#fce7f3" stroke-width="4" opacity="0.5"/>
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#fce7f3" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#fce7f3" stroke-width="3" opacity="0.5"/>
    <line x1="-160" y1="-80" x2="160" y2="-80" stroke="#fce7f3" stroke-width="2" opacity="0.3"/>
    <line x1="-160" y1="80" x2="160" y2="80" stroke="#fce7f3" stroke-width="2" opacity="0.3"/>
    <line x1="-80" y1="-160" x2="-80" y2="160" stroke="#fce7f3" stroke-width="2" opacity="0.3"/>
    <line x1="80" y1="-160" x2="80" y2="160" stroke="#fce7f3" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- letter tiles -->
  <rect x="180" y="180" width="72" height="72" rx="10" fill="#ffffff" opacity="0.2"/>
  <rect x="260" y="180" width="72" height="72" rx="10" fill="#ffffff" opacity="0.2"/>
  <rect x="180" y="260" width="72" height="72" rx="10" fill="#fdf2f8" opacity="0.3"/>
  <rect x="260" y="260" width="72" height="72" rx="10" fill="#ffffff" opacity="0.2"/>
  <text x="216" y="216" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="296" y="216" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#fce7f3" text-anchor="middle" dominant-baseline="central">W</text>
  <text x="216" y="296" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#fce7f3" text-anchor="middle" dominant-baseline="central">R</text>
  <text x="296" y="296" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">D</text>
</svg>
