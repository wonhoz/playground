<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File body -->
  <rect x="110" y="130" width="220" height="280" rx="12" fill="url(#fileGrad)"/>
  <!-- Folded corner -->
  <polygon points="280,130 330,180 280,180" fill="#3949ab"/>
  <polygon points="280,130 330,130 330,180" fill="#7986cb"/>
  <!-- File lines -->
  <rect x="135" y="220" width="170" height="12" rx="6" fill="#9fa8da" opacity="0.7"/>
  <rect x="135" y="250" width="140" height="12" rx="6" fill="#9fa8da" opacity="0.7"/>
  <rect x="135" y="280" width="155" height="12" rx="6" fill="#9fa8da" opacity="0.7"/>
  <!-- Extension badge -->
  <rect x="140" y="310" width="90" height="30" rx="8" fill="#1a237e"/>
  <text x="185" y="331" font-family="Arial" font-size="16" font-weight="bold" fill="#7986cb" text-anchor="middle">.EXT</text>
  <!-- Crown -->
  <polygon points="290,80 310,110 330,90 350,110 370,80 370,130 290,130" fill="url(#crownGrad)"/>
  <circle cx="290" cy="80" r="10" fill="#ffd54f"/>
  <circle cx="330" cy="72" r="10" fill="#ffd54f"/>
  <circle cx="370" cy="80" r="10" fill="#ffd54f"/>
  <!-- Stars -->
  <circle cx="350" cy="200" r="5" fill="#ffd54f" opacity="0.8"/>
  <circle cx="370" cy="240" r="4" fill="#ffd54f" opacity="0.6"/>
  <circle cx="360" cy="280" r="3" fill="#ffd54f" opacity="0.5"/>
</svg>
