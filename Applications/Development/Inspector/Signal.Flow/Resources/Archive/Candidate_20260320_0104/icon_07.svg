<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Oscillator circular sine wave -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#1B5E20" stroke-width="16"/>
  <!-- Middle ring -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#33691E" stroke-width="10" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="512" cy="512" r="180" fill="none" stroke="#33691E" stroke-width="8" opacity="0.4"/>
  <!-- Sine wave along circular path (approximated with path) -->
  <path d="M 512,152
    C 560,152 590,200 620,200
    C 650,200 660,152 700,152
    C 730,152 740,175 760,195
    C 800,240 840,310 860,390
    C 870,430 872,512 860,590
    C 840,680 800,740 760,790
    C 730,820 700,872 660,872
    C 630,872 610,840 580,840
    C 550,840 530,872 500,872
    C 460,872 440,840 400,840
    C 360,840 340,872 300,860
    C 240,830 190,780 164,720
    C 145,680 152,620 160,570
    C 172,500 200,430 220,370
    C 240,310 268,240 300,200
    C 330,162 360,152 400,152
    C 440,152 460,200 500,200
    C 507,200 510,152 512,152 Z"
    fill="none" stroke="#558B2F" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="36" fill="#1B5E20"/>
  <circle cx="512" cy="512" r="20" fill="#76FF03"/>
  <!-- Peak markers -->
  <circle cx="512" cy="156" r="16" fill="#76FF03" opacity="0.9"/>
  <circle cx="512" cy="868" r="16" fill="#33691E" opacity="0.7"/>
  <circle cx="156" cy="512" r="16" fill="#33691E" opacity="0.7"/>
  <circle cx="868" cy="512" r="16" fill="#76FF03" opacity="0.9"/>
</svg>
