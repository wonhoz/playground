<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 카탈로그 배경판 -->
  <rect x="50" y="50" width="412" height="412" rx="24" fill="#1B5E20" stroke="#4CAF50" stroke-width="2"/>
  <!-- 아이콘 카드들 -->
  <rect x="70" y="70" width="90" height="90" rx="14" fill="url(#card)"/>
  <rect x="180" y="70" width="90" height="90" rx="14" fill="url(#card)" opacity="0.85"/>
  <rect x="290" y="70" width="90" height="90" rx="14" fill="url(#card)" opacity="0.7"/>
  <rect x="400" y="70" width="90" height="90" rx="14" fill="url(#card)" opacity="0.55"/>
  <rect x="70" y="180" width="90" height="90" rx="14" fill="url(#card)" opacity="0.85"/>
  <rect x="180" y="180" width="90" height="90" rx="14" fill="#A5D6A7"/>
  <rect x="290" y="180" width="90" height="90" rx="14" fill="url(#card)" opacity="0.8"/>
  <!-- 이모지 in cards -->
  <text x="115" y="130" font-size="50" text-anchor="middle" font-family="Segoe UI Emoji">🎨</text>
  <text x="225" y="130" font-size="50" text-anchor="middle" font-family="Segoe UI Emoji">🌈</text>
  <text x="335" y="130" font-size="50" text-anchor="middle" font-family="Segoe UI Emoji">⭐</text>
  <text x="115" y="240" font-size="50" text-anchor="middle" font-family="Segoe UI Emoji">🔎</text>
  <text x="225" y="240" font-size="50" text-anchor="middle" font-family="Segoe UI Emoji">🗂️</text>
  <!-- 검색바 -->
  <rect x="70" y="310" width="370" height="52" rx="26" fill="#2E7D32" stroke="#81C784" stroke-width="2"/>
  <circle cx="406" cy="336" r="18" fill="#4CAF50"/>
  <line x1="420" y1="350" x2="434" y2="364" stroke="#C8E6C9" stroke-width="8" stroke-linecap="round"/>
  <!-- 결과 줄 -->
  <rect x="70" y="384" width="280" height="14" rx="7" fill="#388E3C"/>
  <rect x="70" y="408" width="200" height="14" rx="7" fill="#388E3C" opacity="0.6"/>
</svg>