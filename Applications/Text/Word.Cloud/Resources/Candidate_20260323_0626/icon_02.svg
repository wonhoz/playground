<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 비구름 + 단어 비 | 공간/장면 | #1A2A1A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A2A1A"/>
  <!-- Layer 2: Storm cloud raining words -->
  <!-- Cloud body -->
  <circle cx="340" cy="320" r="100" fill="#2D4A2D"/>
  <circle cx="440" cy="280" r="120" fill="#3A5A3A"/>
  <circle cx="560" cy="280" r="120" fill="#3A5A3A"/>
  <circle cx="660" cy="310" r="100" fill="#2D4A2D"/>
  <circle cx="512" cy="360" r="110" fill="#3A5A3A"/>
  <rect x="260" y="340" width="504" height="80" fill="#3A5A3A"/>
  <!-- Lightning inside cloud -->
  <polygon points="520,290 500,330 518,330 498,370 530,320 510,320" fill="#FCD34D" opacity="0.8"/>
  <!-- Falling words (rain) -->
  <text x="240" y="500" font-family="Arial,sans-serif" font-size="28" fill="#4ADE80" font-weight="bold" transform="rotate(-8 240 500)">단어</text>
  <text x="360" y="540" font-family="Arial,sans-serif" font-size="22" fill="#86EFAC" transform="rotate(-3 360 540)">cloud</text>
  <text x="470" y="490" font-family="Arial,sans-serif" font-size="32" fill="#22C55E" font-weight="bold" transform="rotate(5 470 490)">텍스트</text>
  <text x="620" y="510" font-family="Arial,sans-serif" font-size="20" fill="#4ADE80" transform="rotate(-6 620 510)">빈도</text>
  <text x="200" y="600" font-family="Arial,sans-serif" font-size="18" fill="#6B9E6B" transform="rotate(-10 200 600)">분석</text>
  <text x="340" y="650" font-family="Arial,sans-serif" font-size="26" fill="#4ADE80" transform="rotate(3 340 650)">word</text>
  <text x="500" y="620" font-family="Arial,sans-serif" font-size="20" fill="#86EFAC" transform="rotate(-5 500 620)">생성</text>
  <text x="670" y="580" font-family="Arial,sans-serif" font-size="24" fill="#22C55E" transform="rotate(8 670 580)">색상</text>
  <text x="760" y="640" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" transform="rotate(-4 760 640)">크기</text>
  <text x="240" y="720" font-family="Arial,sans-serif" font-size="22" fill="#6B9E6B" transform="rotate(6 240 720)">폰트</text>
  <text x="420" y="740" font-family="Arial,sans-serif" font-size="28" fill="#4ADE80" font-weight="bold" transform="rotate(-2 420 740)">구름</text>
  <text x="610" y="720" font-family="Arial,sans-serif" font-size="20" fill="#86EFAC" transform="rotate(4 610 720)">시각화</text>
  <!-- Layer 3: Rain drop lines -->
  <line x1="310" y1="420" x2="280" y2="460" stroke="#4ADE80" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="420" x2="390" y2="460" stroke="#4ADE80" stroke-width="2" opacity="0.3"/>
  <line x1="540" y1="420" x2="510" y2="460" stroke="#4ADE80" stroke-width="2" opacity="0.3"/>
  <line x1="660" y1="420" x2="630" y2="460" stroke="#4ADE80" stroke-width="2" opacity="0.3"/>
</svg>
