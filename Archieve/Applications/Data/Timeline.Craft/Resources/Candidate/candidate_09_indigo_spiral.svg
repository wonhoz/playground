<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="spiral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7986CB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clock/circular timeline -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3F51B5" stroke-width="8" opacity="0.5"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#3F51B5" stroke-width="6" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#3F51B5" stroke-width="5" opacity="0.35"/>
  <!-- Arc progress (about 270deg) -->
  <path d="M 256,76 A 180,180 0 1 1 76,256" fill="none" stroke="url(#spiral)" stroke-width="14" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="256" y1="72" x2="256" y2="92" stroke="#9FA8DA" stroke-width="6" stroke-linecap="round"/>
  <line x1="436" y1="256" x2="416" y2="256" stroke="#9FA8DA" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="440" x2="256" y2="420" stroke="#9FA8DA" stroke-width="6" stroke-linecap="round"/>
  <line x1="76" y1="256" x2="96" y2="256" stroke="#9FA8DA" stroke-width="6" stroke-linecap="round"/>
  <!-- Milestone dots on arc -->
  <circle cx="256" cy="76" r="14" fill="#283593" stroke="#7986CB" stroke-width="6"/>
  <circle cx="422" cy="151" r="14" fill="#283593" stroke="#7986CB" stroke-width="6"/>
  <circle cx="436" cy="256" r="14" fill="#283593" stroke="#7986CB" stroke-width="6"/>
  <circle cx="384" cy="360" r="14" fill="#283593" stroke="#7986CB" stroke-width="6"/>
  <circle cx="256" cy="440" r="14" fill="#283593" stroke="#9FA8DA" stroke-width="6"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="36" fill="#3F51B5" stroke="#9FA8DA" stroke-width="6"/>
  <rect x="236" y="248" width="40" height="8" rx="4" fill="#E8EAF6" opacity="0.9"/>
  <rect x="240" y="260" width="32" height="6" rx="3" fill="#C5CAE9" opacity="0.7"/>
  <!-- Connector lines to center -->
  <line x1="256" y1="220" x2="256" y2="96" stroke="#5C6BC0" stroke-width="3" opacity="0.4"/>
  <line x1="276" y1="236" x2="406" y2="174" stroke="#5C6BC0" stroke-width="3" opacity="0.4"/>
</svg>
