<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#311B92"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#4527A0" stroke-width="16"/>

  <!-- Globe: circle with latitude/longitude grid lines -->
  <circle cx="512" cy="380" r="240" fill="#7C4DFF" stroke="#311B92" stroke-width="16"/>
  <!-- Globe grid lines (latitude) -->
  <ellipse cx="512" cy="380" rx="240" ry="80" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.5"/>
  <ellipse cx="512" cy="380" rx="240" ry="160" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.5"/>
  <!-- Globe grid lines (longitude) -->
  <ellipse cx="512" cy="380" rx="80" ry="240" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.5"/>
  <ellipse cx="512" cy="380" rx="160" ry="240" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.5"/>
  <!-- Equator line -->
  <line x1="272" y1="380" x2="752" y2="380" stroke="#FFFFFF" stroke-width="10" stroke-opacity="0.7"/>
  <!-- Prime meridian -->
  <line x1="512" y1="140" x2="512" y2="620" stroke="#FFFFFF" stroke-width="10" stroke-opacity="0.7"/>
  <!-- Globe clip overlay (circular mask effect) -->
  <circle cx="512" cy="380" r="240" fill="none" stroke="#311B92" stroke-width="16"/>

  <!-- Large ? in center of globe -->
  <circle cx="512" cy="380" r="100" fill="#FFFFFF" fill-opacity="0.92"/>
  <text x="512" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="128" fill="#7C4DFF" text-anchor="middle">?</text>

  <!-- WORLD badge -->
  <rect x="228" y="752" width="568" height="116" rx="36" fill="#311B92" stroke="#1A0070" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#E040FB" text-anchor="middle">WORLD</text>
</svg>
