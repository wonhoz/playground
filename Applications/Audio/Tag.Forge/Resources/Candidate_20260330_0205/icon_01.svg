<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 다크 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg1)"/>

  <!-- Layer 2: 앨범 아트 + ID3 태그 편집 폼 -->
  <!-- 앨범 커버 -->
  <rect x="80" y="180" width="300" height="300" rx="16" fill="#1565C0"/>
  <circle cx="230" cy="330" r="80" fill="#0D47A1" stroke="#42A5F5" stroke-width="4"/>
  <circle cx="230" cy="330" r="28" fill="#1565C0"/>
  <circle cx="230" cy="330" r="10" fill="#42A5F5"/>
  <!-- 음악 노트 -->
  <text x="230" y="218" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="44" fill="#90CAF9" text-anchor="middle">♪</text>

  <!-- 태그 편집 필드들 -->
  <!-- Title -->
  <text x="420" y="224" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#546E7A" dominant-baseline="middle">Title</text>
  <rect x="420" y="244" width="524" height="50" rx="10" fill="#263238"/>
  <text x="440" y="271" font-family="'Courier New',monospace" font-size="26" fill="#FFD740" dominant-baseline="middle">Bohemian Rhapsody</text>

  <!-- Artist -->
  <text x="420" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#546E7A" dominant-baseline="middle">Artist</text>
  <rect x="420" y="340" width="524" height="50" rx="10" fill="#263238"/>
  <text x="440" y="367" font-family="'Courier New',monospace" font-size="26" fill="#69F0AE" dominant-baseline="middle">Queen</text>

  <!-- Album -->
  <text x="420" y="416" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#546E7A" dominant-baseline="middle">Album</text>
  <rect x="420" y="436" width="524" height="50" rx="10" fill="#263238"/>
  <text x="440" y="463" font-family="'Courier New',monospace" font-size="26" fill="#90CAF9" dominant-baseline="middle">A Night at the Opera</text>

  <!-- Genre / Year -->
  <rect x="420" y="532" width="240" height="50" rx="10" fill="#263238"/>
  <text x="440" y="559" font-family="'Courier New',monospace" font-size="26" fill="#CE93D8" dominant-baseline="middle">Rock</text>
  <rect x="704" y="532" width="240" height="50" rx="10" fill="#263238"/>
  <text x="724" y="559" font-family="'Courier New',monospace" font-size="26" fill="#80CBC4" dominant-baseline="middle">1975</text>

  <!-- Layer 3: 저장 버튼 -->
  <rect x="200" y="840" width="624" height="74" rx="20" fill="#FFD740"/>
  <text x="512" y="878" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="38" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">💾  Save Tags</text>
</svg>
