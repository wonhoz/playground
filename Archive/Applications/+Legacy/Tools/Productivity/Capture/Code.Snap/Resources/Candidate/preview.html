<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Code.Snap — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    p  { color: #888; margin-bottom: 28px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #333; }
    .card img { width: 128px; height: 128px; border-radius: 16px; }
    .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Code.Snap — 아이콘 후보 10개</h1>
  <p>코드 스크린샷 캡처 도구 아이콘 후보</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_camera_code_blue.svg"/><span>01 · camera_code_blue</span></div>
    <div class="card"><img src="candidate_02_screenshot_purple.svg"/><span>02 · screenshot_purple</span></div>
    <div class="card"><img src="candidate_03_snap_flash_orange.svg"/><span>03 · snap_flash_orange</span></div>
    <div class="card"><img src="candidate_04_code_polaroid_teal.svg"/><span>04 · code_polaroid_teal</span></div>
    <div class="card"><img src="candidate_05_bracket_lens_red.svg"/><span>05 · bracket_lens_red</span></div>
    <div class="card"><img src="candidate_06_code_frame_green.svg"/><span>06 · code_frame_green</span></div>
    <div class="card"><img src="candidate_07_neon_capture_dark.svg"/><span>07 · neon_capture_dark</span></div>
    <div class="card"><img src="candidate_08_camera_shutter_gold.svg"/><span>08 · camera_shutter_gold</span></div>
    <div class="card"><img src="candidate_09_code_photo_pink.svg"/><span>09 · code_photo_pink</span></div>
    <div class="card"><img src="candidate_10_window_clip_indigo.svg"/><span>10 · window_clip_indigo</span></div>
  </div>
</body>
</html>
