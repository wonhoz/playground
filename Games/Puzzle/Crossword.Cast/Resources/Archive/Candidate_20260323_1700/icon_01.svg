<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — 밝은 크림 -->
  <rect width="1024" height="1024" rx="190" fill="#F5F0E0"/>
  <!-- Layer 2: 크로스워드 격자 (7×7) -->
  <!-- 격자 그리드 -->
  <rect x="80" y="80" width="864" height="864" rx="16" fill="#FFFFFF"/>
  <rect x="80" y="80" width="864" height="864" rx="16" fill="none" stroke="#2C2C2C" stroke-width="8"/>
  <!-- 검정 블럭 -->
  <rect x="80" y="80" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="328" y="80" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="700" y="204" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="204" y="452" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="576" y="576" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="80" y="820" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <rect x="820" y="700" width="124" height="124" rx="4" fill="#1E1E1E"/>
  <!-- 글자들 -->
  <text x="266" y="182" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">H</text>
  <text x="390" y="182" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">E</text>
  <text x="514" y="182" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">A</text>
  <text x="638" y="182" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">R</text>
  <text x="762" y="182" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">T</text>
  <!-- 세로 단어 -->
  <text x="514" y="328" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">G</text>
  <text x="514" y="452" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">L</text>
  <text x="514" y="576" font-size="80" fill="#1E1E1E" text-anchor="middle" font-weight="bold" font-family="Arial">E</text>
  <!-- Layer 3: 번호 (작게) -->
  <text x="212" y="114" font-size="28" fill="#1E1E1E" font-weight="bold" font-family="Arial">1</text>
  <text x="460" y="114" font-size="28" fill="#1E1E1E" font-weight="bold" font-family="Arial">2</text>
