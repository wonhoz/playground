<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE0B2"/>
      <stop offset="1" stop-color="#FFB74D"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g9)"/>
  <!-- machine body -->
  <rect x="220" y="340" width="584" height="380" rx="48" fill="#7E57C2" stroke="#311B92" stroke-width="14"/>
  <!-- machine top vents -->
  <g fill="#311B92">
    <rect x="280" y="370" width="40" height="12" rx="4"/>
    <rect x="340" y="370" width="40" height="12" rx="4"/>
    <rect x="400" y="370" width="40" height="12" rx="4"/>
    <rect x="460" y="370" width="40" height="12" rx="4"/>
    <rect x="520" y="370" width="40" height="12" rx="4"/>
    <rect x="580" y="370" width="40" height="12" rx="4"/>
    <rect x="640" y="370" width="40" height="12" rx="4"/>
    <rect x="700" y="370" width="40" height="12" rx="4"/>
  </g>
  <!-- screen with progress -->
  <rect x="380" y="430" width="264" height="120" rx="16" fill="#FFFFFF" stroke="#311B92" stroke-width="10"/>
  <text x="512" y="510" font-family="Verdana, sans-serif" font-size="62" font-weight="900" text-anchor="middle" fill="#311B92">CAST</text>
  <!-- gear indicators -->
  <circle cx="300" cy="600" r="32" fill="#FFEB3B" stroke="#311B92" stroke-width="8"/>
  <circle cx="300" cy="600" r="10" fill="#311B92"/>
  <circle cx="724" cy="600" r="32" fill="#4FC3F7" stroke="#311B92" stroke-width="8"/>
  <circle cx="724" cy="600" r="10" fill="#311B92"/>
  <!-- input file (left, going in) -->
  <g transform="translate(60 460)">
    <rect width="160" height="200" rx="20" fill="#FFFFFF" stroke="#311B92" stroke-width="12"/>
    <polygon points="120,0 160,40 120,40" fill="#E1BEE7"/>
    <text x="80" y="130" font-family="Verdana, sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="#7B1FA2">SVG</text>
  </g>
  <!-- arrow into machine -->
  <polygon points="220,540 270,520 270,560" fill="#311B92"/>
  <!-- output file (right, coming out) -->
  <g transform="translate(820 460)">
    <rect width="160" height="200" rx="20" fill="#FFFFFF" stroke="#311B92" stroke-width="12"/>
    <polygon points="120,0 160,40 120,40" fill="#FFCCBC"/>
    <text x="80" y="130" font-family="Verdana, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="#D84315">ICO</text>
  </g>
  <polygon points="820,540 770,520 770,560" fill="#311B92"/>
  <!-- legs -->
  <rect x="270" y="720" width="60" height="60" rx="10" fill="#311B92"/>
  <rect x="694" y="720" width="60" height="60" rx="10" fill="#311B92"/>
</svg>
