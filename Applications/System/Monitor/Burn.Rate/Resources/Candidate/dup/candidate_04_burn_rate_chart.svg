<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0500"/>
      <stop offset="100%" style="stop-color:#2d1000"/>
    </linearGradient>
    <linearGradient id="area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d00;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid -->
  <line x1="80" y1="420" x2="432" y2="420" stroke="#3d1800" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="432" y2="350" stroke="#3d1800" stroke-width="1" opacity="0.7"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#3d1800" stroke-width="1" opacity="0.7"/>
  <line x1="80" y1="210" x2="432" y2="210" stroke="#3d1800" stroke-width="1" opacity="0.7"/>
  <line x1="80" y1="140" x2="432" y2="140" stroke="#3d1800" stroke-width="1" opacity="0.7"/>
  <line x1="80" y1="100" x2="80" y2="430" stroke="#3d1800" stroke-width="1.5"/>
  <!-- Area fill -->
  <path d="M80 420 L130 400 L180 380 L210 350 L240 300 L270 240 L300 190 L330 170 L360 155 L390 148 L432 142 L432 420 Z" fill="url(#area)"/>
  <!-- Burn rate line -->
  <path d="M80 420 L130 400 L180 380 L210 350 L240 300 L270 240 L300 190 L330 170 L360 155 L390 148 L432 142" stroke="#ff3d00" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Data points with flames -->
  <circle cx="270" cy="240" r="6" fill="#ff9800" filter="url(#glow)"/>
  <circle cx="300" cy="190" r="6" fill="#ff6d00" filter="url(#glow)"/>
  <circle cx="330" cy="170" r="7" fill="#ff3d00" filter="url(#glow)"/>
  <circle cx="360" cy="155" r="7" fill="#ff1744" filter="url(#glow)"/>
  <circle cx="390" cy="148" r="8" fill="#ff1744" filter="url(#glow)"/>
  <circle cx="432" cy="142" r="9" fill="#ff1744" filter="url(#glow)"/>
  <!-- Mini flame at peak -->
  <path d="M432 142 Q422 120 428 105 Q436 90 432 80 Q440 90 444 105 Q448 120 432 142 Z" fill="#ff9800" filter="url(#glow)" opacity="0.8"/>
  <!-- Temperature markers on Y axis -->
  <circle cx="72" cy="420" r="4" fill="#00c853"/>
  <circle cx="72" cy="350" r="4" fill="#ffd600"/>
  <circle cx="72" cy="280" r="4" fill="#ff9800"/>
  <circle cx="72" cy="210" r="4" fill="#ff6d00"/>
  <circle cx="72" cy="140" r="4" fill="#ff1744" filter="url(#glow)"/>
</svg>