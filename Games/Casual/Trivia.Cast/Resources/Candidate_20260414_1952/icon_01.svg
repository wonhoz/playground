<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 보라+파랑 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A1B9A"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 물음표 (크게) + 4개 선택지 -->
  <!-- 큰 물음표 -->
  <text x="512" y="440" font-family="Segoe UI, sans-serif" font-size="320" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">?</text>
  <!-- Layer 3: 4개 선택지 버튼 (하단) -->
  <!-- A 버튼 -->
  <rect x="120" y="660" width="184" height="80" rx="14" fill="#4CAF50" opacity="0.9"/>
  <text x="212" y="712" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <!-- B 버튼 -->
  <rect x="320" y="660" width="184" height="80" rx="14" fill="#F44336" opacity="0.9"/>
  <text x="412" y="712" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">B</text>
  <!-- C 버튼 -->
  <rect x="520" y="660" width="184" height="80" rx="14" fill="#FF9800" opacity="0.9"/>
  <text x="612" y="712" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">C</text>
  <!-- D 버튼 -->
  <rect x="720" y="660" width="184" height="80" rx="14" fill="#2196F3" opacity="0.9"/>
  <text x="812" y="712" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">D</text>
  <!-- 타이틀 -->
  <text x="512" y="860" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">TRIVIA</text>
</svg>
