<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 딥 네이비 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1B2A"/>
  <!-- Layer 2: 코드 에디터 패널 느낌의 메인 프롬프트 영역 -->
  <rect x="140" y="180" width="744" height="520" rx="20" fill="#152338"/>
  <rect x="140" y="180" width="744" height="52" rx="20" fill="#1E3A5A"/>
  <rect x="140" y="210" width="744" height="22" fill="#1E3A5A"/>
  <!-- 타이틀바 점 -->
  <circle cx="192" cy="206" r="12" fill="#FF5F57"/>
  <circle cx="232" cy="206" r="12" fill="#FEBC2E"/>
  <circle cx="272" cy="206" r="12" fill="#28C840"/>
  <!-- Layer 3: 프롬프트 텍스트 내용 — {{변수}} 핵심 표현 -->
  <!-- 텍스트 라인들 -->
  <rect x="180" y="268" width="200" height="18" rx="4" fill="#4A90D9" opacity="0.7"/>
  <rect x="390" y="268" width="120" height="18" rx="4" fill="#8B8B8B" opacity="0.5"/>
  <rect x="180" y="308" width="320" height="18" rx="4" fill="#8B8B8B" opacity="0.5"/>
  <!-- {{변수}} 하이라이트 텍스트 -->
  <rect x="510" y="304" width="200" height="26" rx="6" fill="#F5A623" opacity="0.9"/>
  <text x="610" y="322" font-family="monospace" font-size="18" fill="#0D1B2A" text-anchor="middle" font-weight="bold">{{topic}}</text>
  <rect x="180" y="348" width="260" height="18" rx="4" fill="#8B8B8B" opacity="0.5"/>
  <!-- 두 번째 {{변수}} -->
  <rect x="180" y="388" width="180" height="26" rx="6" fill="#F5A623" opacity="0.9"/>
  <text x="270" y="406" font-family="monospace" font-size="18" fill="#0D1B2A" text-anchor="middle" font-weight="bold">{{tone}}</text>
  <rect x="370" y="388" width="240" height="18" rx="4" fill="#8B8B8B" opacity="0.5"/>
  <rect x="180" y="428" width="380" height="18" rx="4" fill="#8B8B8B" opacity="0.5"/>
  <rect x="180" y="468" width="300" height="18" rx="4" fill="#4A90D9" opacity="0.5"/>
  <!-- 복사 버튼 영역 -->
  <rect x="620" y="640" width="220" height="50" rx="25" fill="#F5A623"/>
  <text x="730" y="671" font-family="sans-serif" font-size="22" fill="#0D1B2A" text-anchor="middle" font-weight="bold">Copy ▶</text>
</svg>
