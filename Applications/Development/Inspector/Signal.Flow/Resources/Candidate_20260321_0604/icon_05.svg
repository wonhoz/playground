<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sf-bg-clip-05">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="sf-bg-grad-05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2010"/>
      <stop offset="100%" stop-color="#061408"/>
    </linearGradient>
    <linearGradient id="conn-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CCFF" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#00FFCC"/>
      <stop offset="60%" stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow-sf-05">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 (딥 그린) -->
  <rect width="1024" height="1024" rx="180" fill="url(#sf-bg-grad-05)"/>
  <g clip-path="url(#sf-bg-clip-05)">
    <!-- 서버탑 (왼쪽, 화이트) -->
