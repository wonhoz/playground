  <line x1="512" y1="512" x2="430" y2="594" stroke="#5C6BC0" stroke-width="16" opacity="0.6"/>
  <line x1="512" y1="512" x2="594" y2="594" stroke="#5C6BC0" stroke-width="16" opacity="0.6"/>
</svg>
