<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: Hybrid / 공간·장면 / 게임 화면 — 플레이어, 구조물 배치, 탄막 -->
  <!-- 배경: 다크 그린 테마 -->
  <rect width="1024" height="1024" rx="160" fill="#0A1F0A"/>

  <!-- 게임 필드 영역 -->
  <rect x="210" y="210" width="604" height="604" rx="20" fill="#0F2D0F" stroke="#1A5C1A" stroke-width="4"/>

  <!-- 격자 배경 -->
  <g stroke="#1A3A1A" stroke-width="1" opacity="0.8">
    <line x1="270" y1="210" x2="270" y2="814"/>
    <line x1="330" y1="210" x2="330" y2="814"/>
    <line x1="390" y1="210" x2="390" y2="814"/>
    <line x1="450" y1="210" x2="450" y2="814"/>
    <line x1="510" y1="210" x2="510" y2="814"/>
    <line x1="570" y1="210" x2="570" y2="814"/>
    <line x1="630" y1="210" x2="630" y2="814"/>
    <line x1="690" y1="210" x2="690" y2="814"/>
    <line x1="750" y1="210" x2="750" y2="814"/>
    <line x1="210" y1="270" x2="814" y2="270"/>
    <line x1="210" y1="330" x2="814" y2="330"/>
    <line x1="210" y1="390" x2="814" y2="390"/>
    <line x1="210" y1="450" x2="814" y2="450"/>
    <line x1="210" y1="510" x2="814" y2="510"/>
    <line x1="210" y1="570" x2="814" y2="570"/>
    <line x1="210" y1="630" x2="814" y2="630"/>
    <line x1="210" y1="690" x2="814" y2="690"/>
    <line x1="210" y1="750" x2="814" y2="750"/>
  </g>

  <!-- Wall 구조물들 (파랑) -->
  <rect x="420" y="420" width="56" height="56" rx="6" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="480" y="420" width="56" height="56" rx="6" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>
  <rect x="540" y="420" width="56" height="56" rx="6" fill="#1E4FD8" stroke="#4A9EFF" stroke-width="3"/>

  <!-- Mirror 구조물 (연두) -->
  <rect x="420" y="480" width="56" height="56" rx="6" fill="#145A14" stroke="#2ECC40" stroke-width="3"/>
  <line x1="426" y1="530" x2="470" y2="486" stroke="#7FFF7F" stroke-width="3.5"/>

  <!-- Fan 구조물 (시안) -->
  <rect x="600" y="480" width="56" height="56" rx="6" fill="#0A3D4A" stroke="#00CED1" stroke-width="3"/>
  <!-- 팬 블레이드 -->
  <g transform="translate(628,508)">
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="#00CED1" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="#00CED1" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="#00CED1" opacity="0.9" transform="rotate(240)"/>
    <circle cx="0" cy="0" r="5" fill="#00FFFF"/>
  </g>

  <!-- Bomb 구조물 (오렌지) -->
  <rect x="540" y="540" width="56" height="56" rx="6" fill="#4A1A00" stroke="#FF6600" stroke-width="3"/>
  <circle cx="568" cy="568" r="18" fill="#FF4500"/>
  <rect x="564" y="543" width="8" height="14" rx="3" fill="#8B4513"/>
  <circle cx="572" cy="542" r="4" fill="#FFD700"/>

  <!-- 적 (빨간, 우측에서 침입) -->
  <circle cx="760" cy="370" r="26" fill="#CC0000" stroke="#FF3333" stroke-width="4"/>
  <polygon points="760,344 748,372 772,372" fill="#FF0000" opacity="0.7"/>
  <circle cx="760" cy="370" r="10" fill="#FF6666" opacity="0.6"/>

  <!-- 탄막들 -->
  <circle cx="680" cy="350" r="10" fill="#FF3333" stroke="#FF6666" stroke-width="2"/>
  <circle cx="640" cy="370" r="8" fill="#FF4444"/>
  <circle cx="700" cy="410" r="10" fill="#FF3333" stroke="#FF6666" stroke-width="2"/>
  <circle cx="660" cy="430" r="8" fill="#FF4444"/>
  <circle cx="720" cy="450" r="7" fill="#FF5555" opacity="0.8"/>

  <!-- 플레이어 (핑크) -->
  <circle cx="320" cy="680" r="30" fill="#FF6EB4" stroke="#FFB3D9" stroke-width="4"/>
  <circle cx="320" cy="680" r="13" fill="#FFD6EC"/>
  <!-- 플레이어 이동 흔적 -->
  <circle cx="365" cy="640" r="8" fill="#FF6EB4" opacity="0.4"/>
  <circle cx="400" cy="610" r="5" fill="#FF6EB4" opacity="0.25"/>

  <!-- 자원 (금색 다이아몬드) -->
  <polygon points="512,280 530,305 512,330 494,305" fill="#FFD700" stroke="#FFA500" stroke-width="2.5"/>

  <!-- UI 상단바 -->
  <!-- Lives -->
  <circle cx="250" cy="165" r="10" fill="#FF6EB4"/>
  <circle cx="275" cy="165" r="10" fill="#FF6EB4"/>
  <circle cx="300" cy="165" r="10" fill="#FF6EB4"/>
  <!-- Wave 텍스트 -->
  <text x="512" y="172" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#AAFFAA" opacity="0.9">WAVE 3</text>
  <!-- 자원 카운터 -->
  <polygon points="750,158 762,172 750,186 738,172" fill="#FFD700"/>
  <text x="778" y="177" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFD700">42</text>
</svg>
