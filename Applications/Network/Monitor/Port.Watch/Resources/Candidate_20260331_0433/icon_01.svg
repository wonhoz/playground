  <text x="500" y="174" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">PROTO</text>
  <text x="800" y="174" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">STATE</text>
  <!-- 포트 80 LISTEN -->
  <rect x="80" y="214" width="864" height="80" rx="8" fill="#1A3A2A"/>
