<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134E4A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chain link left -->
  <rect x="80" y="210" width="140" height="92" rx="46" fill="none" stroke="url(#chain)" stroke-width="22"/>
  <!-- Chain link right -->
  <rect x="292" y="210" width="140" height="92" rx="46" fill="none" stroke="url(#chain)" stroke-width="22"/>
  <!-- Connecting bar -->
  <rect x="196" y="236" width="120" height="40" rx="0" fill="url(#bg)"/>
  <rect x="196" y="242" width="120" height="28" rx="0" fill="url(#chain)" opacity="0.9"/>
  <!-- Markdown text lines above -->
  <rect x="60" y="100" width="24" height="16" rx="3" fill="#2DD4BF" opacity="0.9"/>
  <rect x="92" y="100" width="200" height="16" rx="4" fill="white" opacity="0.5"/>
  <rect x="60" y="128" width="380" height="10" rx="4" fill="white" opacity="0.2"/>
  <rect x="60" y="148" width="300" height="10" rx="4" fill="white" opacity="0.15"/>
  <!-- Link syntax [text](url) highlighted -->
  <rect x="60" y="170" width="14" height="14" rx="2" fill="#2DD4BF" opacity="0.7"/>
  <rect x="78" y="170" width="80" height="14" rx="3" fill="#5EEAD4" opacity="0.7"/>
  <rect x="162" y="170" width="14" height="14" rx="2" fill="#2DD4BF" opacity="0.7"/>
  <rect x="178" y="170" width="14" height="14" rx="2" fill="#F472B6" opacity="0.8"/>
  <rect x="196" y="170" width="100" height="14" rx="3" fill="#34D399" opacity="0.6"/>
  <rect x="300" y="170" width="14" height="14" rx="2" fill="#F472B6" opacity="0.8"/>
  <!-- Below chains - more content -->
  <rect x="60" y="335" width="380" height="10" rx="4" fill="white" opacity="0.2"/>
  <rect x="60" y="355" width="260" height="10" rx="4" fill="white" opacity="0.15"/>
  <!-- Image syntax -->
  <rect x="60" y="385" width="18" height="14" rx="2" fill="#2DD4BF" opacity="0.7"/>
  <rect x="60" y="385" width="3" height="14" rx="1" fill="#F472B6" opacity="0.9"/>
  <rect x="82" y="385" width="80" height="14" rx="3" fill="#5EEAD4" opacity="0.6"/>
  <rect x="166" y="385" width="14" height="14" rx="2" fill="#2DD4BF" opacity="0.7"/>
  <rect x="180" y="385" width="14" height="14" rx="2" fill="#F472B6" opacity="0.8"/>
  <rect x="198" y="385" width="130" height="14" rx="3" fill="#34D399" opacity="0.5"/>
  <rect x="332" y="385" width="14" height="14" rx="2" fill="#F472B6" opacity="0.8"/>
  <!-- Globe icon hint -->
  <circle cx="440" cy="390" r="22" fill="none" stroke="#2DD4BF" stroke-width="3" opacity="0.6"/>
  <ellipse cx="440" cy="390" rx="10" ry="22" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  <line x1="418" y1="390" x2="462" y2="390" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  <line x1="440" y1="368" x2="440" y2="412" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
</svg>
