<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="rocket15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <clipPath id="clip15"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg15)"/>
  <g clip-path="url(#clip15)">
    <!-- Layer 2: 로켓 몸통 (대각선/동적) -->
    <g transform="translate(512,512) rotate(-45) translate(-140,-200)">
      <!-- 로켓 몸통 -->
      <ellipse cx="140" cy="200" rx="68" ry="180" fill="url(#rocket15)"/>
      <!-- 로켓 창 -->
      <circle cx="140" cy="160" r="38" fill="#4338CA" stroke="#C7D2FE" stroke-width="10"/>
      <circle cx="140" cy="160" r="20" fill="#818CF8"/>
      <!-- 로켓 날개 (왼쪽) -->
      <polygon points="72,310 20,400 140,340" fill="#A5B4FC"/>
      <!-- 로켓 날개 (오른쪽) -->
      <polygon points="208,310 260,400 140,340" fill="#A5B4FC"/>
      <!-- 로켓 노즐 -->
      <rect x="110" y="358" width="60" height="40" rx="10" fill="#818CF8"/>
    </g>
    <!-- Layer 2: 화염 꼬리 -->
    <g transform="translate(512,512) rotate(-45) translate(-140,-200)">
      <ellipse cx="140" cy="430" rx="30" ry="60" fill="#FDE68A" opacity="0.9"/>
      <ellipse cx="140" cy="460" rx="18" ry="40" fill="#FFFFFF" opacity="0.7"/>
    </g>
    <!-- Layer 3: API 전송 흔적 점선 -->
    <line x1="250" y1="774" x2="730" y2="294" stroke="#C7D2FE" stroke-width="10" stroke-dasharray="24 16" stroke-linecap="round" opacity="0.5"/>
    <!-- POST 배지 -->
    <rect x="240" y="720" width="180" height="76" rx="16" fill="#FDE68A"/>
    <text x="330" y="758" font-family="'Courier New', monospace" font-weight="900" font-size="44" fill="#312E81" text-anchor="middle" dominant-baseline="middle">POST</text>
    <!-- 별들 -->
    <circle cx="720" cy="280" r="14" fill="#FDE68A"/>
    <circle cx="760" cy="240" r="9" fill="#C7D2FE"/>
    <circle cx="690" cy="240" r="7" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="780" cy="300" r="6" fill="#FDE68A" opacity="0.7"/>
  </g>
</svg>
