<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF4FF"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Broadcast tower -->
  <rect x="482" y="500" width="60" height="280" rx="10" fill="#A21CAF"/>
  <!-- Tower base -->
  <rect x="342" y="760" width="340" height="50" rx="10" fill="#A21CAF"/>
  <!-- Broadcast waves -->
  <path d="M512,440 m-100,0 a100,100 0 0,1 200,0" fill="none" stroke="#C026D3" stroke-width="22" stroke-linecap="round"/>
  <path d="M512,440 m-170,0 a170,170 0 0,1 340,0" fill="none" stroke="#D946EF" stroke-width="22" stroke-linecap="round"/>
  <path d="M512,440 m-240,0 a240,240 0 0,1 480,0" fill="none" stroke="#E879F9" stroke-width="20" stroke-linecap="round"/>
  <path d="M512,440 m-320,0 a320,320 0 0,1 640,0" fill="none" stroke="#F0ABFC" stroke-width="16" stroke-linecap="round"/>
  <!-- Tower top dot -->
  <circle cx="512" cy="440" r="30" fill="#A21CAF"/>
  <!-- Clock overlay (scheduling) -->
  <circle cx="800" cy="720" r="110" fill="#FFFFFF" stroke="#A21CAF" stroke-width="14"/>
  <circle cx="800" cy="720" r="10" fill="#A21CAF"/>
  <line x1="800" y1="720" x2="800" y2="636" stroke="#A21CAF" stroke-width="16" stroke-linecap="round"/>
  <line x1="800" y1="720" x2="860" y2="752" stroke="#C026D3" stroke-width="12" stroke-linecap="round"/>
  <!-- Label -->
  <text x="512" y="920" font-family="Arial,sans-serif" font-size="60" fill="#86198F" font-weight="bold" text-anchor="middle">Sched Cast</text>
</svg>
