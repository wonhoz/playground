<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#2C1F00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6F00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="triangle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  <!-- Outer warning triangle -->
  <polygon points="256,62 474,434 38,434" fill="url(#triangle)" stroke="#1A1200" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner triangle (cutout) -->
  <polygon points="256,130 430,400 82,400" fill="#1A1200"/>
  <!-- Exclamation mark -->
  <rect x="238" y="175" width="36" height="150" rx="14" fill="#FFD600"/>
  <circle cx="256" cy="366" r="22" fill="#FFD600"/>
  <!-- Log lines overlaying lower -->
  <rect x="100" y="430" width="312" height="44" rx="10" fill="#2C1F00" stroke="#FF6F00" stroke-width="2"/>
  <text x="256" y="445" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF9800">EXCEPTION: 0xC0000005</text>
  <text x="256" y="462" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFD600">ACCESS VIOLATION READ</text>
  <!-- Small decorative dots -->
  <circle cx="100" cy="256" r="6" fill="#FF6F00" opacity="0.5"/>
  <circle cx="412" cy="256" r="6" fill="#FF6F00" opacity="0.5"/>
</svg>
