<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 큰 아카이브 파일 카드 (중앙) -->
  <rect x="200" y="160" width="624" height="560" rx="32" fill="#006064"/>
  <!-- 파일 귀접기 -->
  <polygon points="680,160 824,304 680,304" fill="#004D40"/>
  <!-- 지퍼 장식 라인 -->
  <rect x="340" y="200" width="100" height="400" rx="12" fill="#00838F"/>
  <!-- 지퍼 톱니 -->
  <rect x="340" y="220" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="268" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="316" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="364" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="412" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="460" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <rect x="340" y="508" width="100" height="28" rx="6" fill="#E0F7FA" opacity="0.7"/>
  <!-- ZIP 텍스트 -->
  <text x="512" y="620" font-family="'Consolas', monospace" font-size="90" fill="white" text-anchor="middle" font-weight="700">.ZIP</text>
  <!-- Layer 3: 파일 수+압축률 정보 배지들 -->
  <!-- 파일 수 -->
  <rect x="160" y="780" width="280" height="90" rx="24" fill="#FF6F00"/>
  <text x="300" y="820" font-family="'Consolas', monospace" font-size="40" fill="white" text-anchor="middle" font-weight="700">24 files</text>
  <text x="300" y="858" font-family="'Segoe UI', sans-serif" font-size="28" fill="#FFE0B2" text-anchor="middle">3 folders</text>
  <!-- 압축 크기 -->
  <rect x="480" y="780" width="280" height="90" rx="24" fill="#00897B"/>
  <text x="620" y="820" font-family="'Consolas', monospace" font-size="40" fill="white" text-anchor="middle" font-weight="700">8.4 MB</text>
  <text x="620" y="858" font-family="'Segoe UI', sans-serif" font-size="28" fill="#B2DFDB" text-anchor="middle">→ 4.9 MB</text>
  <!-- 압축률 원형 배지 -->
  <circle cx="840" cy="280" r="110" fill="#F57F17"/>
  <text x="840" y="264" font-family="'Consolas', monospace" font-size="52" fill="white" text-anchor="middle" font-weight="700">58%</text>
  <text x="840" y="316" font-family="'Segoe UI', sans-serif" font-size="32" fill="#FFF9C4" text-anchor="middle">saved</text>
</svg>
