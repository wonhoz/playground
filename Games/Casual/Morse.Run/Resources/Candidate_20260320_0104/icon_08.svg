<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- SOS morse pattern: ... --- ... -->
  <!-- S: dot dot dot -->
  <circle cx="200" cy="320" r="36" fill="#F57F17"/>
  <circle cx="300" cy="320" r="36" fill="#F57F17"/>
  <circle cx="400" cy="320" r="36" fill="#F57F17"/>
  <!-- O: dash dash dash -->
  <rect x="460" y="290" width="110" height="60" rx="30" fill="#FFD54F"/>
  <rect x="594" y="290" width="110" height="60" rx="30" fill="#FFD54F"/>
  <rect x="728" y="290" width="110" height="60" rx="30" fill="#FFD54F"/>
  <!-- S: dot dot dot -->
  <circle cx="200" cy="440" r="36" fill="#F57F17"/>
  <circle cx="300" cy="440" r="36" fill="#F57F17"/>
  <circle cx="400" cy="440" r="36" fill="#F57F17"/>
  <!-- Runner silhouette -->
  <circle cx="512" cy="620" r="50" fill="#FFD54F"/>
  <line x1="512" y1="670" x2="512" y2="780" stroke="#FFD54F" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="700" x2="440" y2="750" stroke="#FFD54F" stroke-width="22" stroke-linecap="round"/>
  <line x1="512" y1="700" x2="590" y2="665" stroke="#F57F17" stroke-width="22" stroke-linecap="round"/>
  <line x1="512" y1="780" x2="450" y2="880" stroke="#F57F17" stroke-width="22" stroke-linecap="round"/>
  <line x1="512" y1="780" x2="575" y2="870" stroke="#FFD54F" stroke-width="22" stroke-linecap="round"/>
</svg>