<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="ink1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </linearGradient>
    <linearGradient id="inkBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a3a"/>
      <stop offset="100%" stop-color="#000a1a"/>
    </linearGradient>
    <radialGradient id="splat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#1a0a0000"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Paper texture lines -->
  <line x1="60" y1="140" x2="452" y2="140" stroke="#d0c8b8" stroke-width="1"/>
  <line x1="60" y1="200" x2="452" y2="200" stroke="#d0c8b8" stroke-width="1"/>
  <line x1="60" y1="260" x2="452" y2="260" stroke="#d0c8b8" stroke-width="1"/>
  <line x1="60" y1="320" x2="452" y2="320" stroke="#d0c8b8" stroke-width="1"/>
  <!-- Calligraphy strokes (varying thickness) -->
  <path d="M80,180 Q140,140 200,175 Q240,200 220,240 Q200,270 160,260 Q110,248 90,210 Q80,195 80,180 Z" fill="url(#ink1)" opacity="0.85"/>
  <path d="M240,160 Q270,130 300,155 Q320,170 315,200 Q308,225 285,228 Q260,230 248,210 Q238,192 240,160 Z" fill="url(#ink1)" opacity="0.8"/>
  <path d="M330,150 Q370,120 410,148 Q430,162 420,192 Q408,218 380,220 Q350,220 338,198 Q325,175 330,150 Z" fill="url(#ink1)" opacity="0.75"/>
  <!-- Wave calligraphy stroke -->
  <path d="M70,300 Q120,275 170,300 Q220,325 270,295 Q320,265 370,295 Q410,318 450,300" fill="none" stroke="url(#inkBlue)" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <!-- Thin detail stroke -->
  <path d="M70,300 Q120,275 170,300 Q220,325 270,295 Q320,265 370,295 Q410,318 450,300" fill="none" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Ink splatter at start -->
  <circle cx="70" cy="300" r="18" fill="url(#inkBlue)" opacity="0.6"/>
  <circle cx="68" cy="315" r="5" fill="url(#inkBlue)" opacity="0.4"/>
  <circle cx="58" cy="295" r="4" fill="url(#inkBlue)" opacity="0.3"/>
  <!-- Broadcast (cast) lines at bottom -->
  <path d="M226,420 Q256,405 286,420" fill="none" stroke="#3a2a10" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M206,440 Q256,420 306,440" fill="none" stroke="#3a2a10" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="256" cy="402" r="5" fill="#3a2a10" opacity="0.6"/>
  <!-- Ink pen tip -->
  <g transform="translate(420,380) rotate(-30)">
    <rect x="-5" y="-50" width="10" height="36" rx="4" fill="#3a2a10" opacity="0.8"/>
    <polygon points="-5,-14 5,-14 2,10 -2,10" fill="#1a0a00" opacity="0.9"/>
  </g>
</svg>
