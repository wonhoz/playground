<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Tray icon representation (small square) -->
  <rect x="312" y="280" width="400" height="400" rx="36" fill="#059669"/>
  <rect x="342" y="310" width="340" height="340" rx="24" fill="#10B981"/>
  <!-- CPU% text in tray icon -->
  <text x="512" y="480" font-family="Arial,sans-serif" font-size="130" fill="#FFFFFF" font-weight="bold" text-anchor="middle">67</text>
  <text x="512" y="558" font-family="Arial,sans-serif" font-size="64" fill="#A7F3D0" text-anchor="middle">%</text>
  <!-- Taskbar strip at bottom -->
  <rect x="165" y="760" width="694" height="100" rx="16" fill="#1E293B"/>
  <!-- Tray area highlight -->
  <rect x="595" y="772" width="240" height="76" rx="10" fill="#334155"/>
  <!-- Mini tray icon in taskbar -->
  <rect x="618" y="784" width="54" height="54" rx="8" fill="#10B981"/>
  <text x="645" y="824" font-family="Arial,sans-serif" font-size="34" fill="#FFFFFF" font-weight="bold" text-anchor="middle">67</text>
  <!-- Clock in tray -->
  <text x="760" y="810" font-family="Arial,sans-serif" font-size="32" fill="#94A3B8" text-anchor="middle">12:05</text>
  <!-- Label -->
  <text x="512" y="930" font-family="Arial,sans-serif" font-size="60" fill="#047857" font-weight="bold" text-anchor="middle">Tray Stats</text>
</svg>
