<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0010"/>
      <stop offset="100%" stop-color="#1A0025"/>
    </linearGradient>
    <linearGradient id="router" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#701A75"/>
      <stop offset="100%" stop-color="#86198F"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Router box -->
  <rect x="130" y="220" width="252" height="90" rx="14" fill="url(#router)" stroke="#E879F9" stroke-width="2.5" filter="url(#neon)"/>
  <!-- LED lights -->
  <circle cx="158" cy="256" r="7" fill="#22C55E" filter="url(#neon)"/>
  <circle cx="178" cy="256" r="7" fill="#22C55E" filter="url(#neon)"/>
  <circle cx="198" cy="256" r="7" fill="#F59E0B" filter="url(#neon)"/>
  <circle cx="218" cy="256" r="7" fill="#22C55E" filter="url(#neon)"/>
  <circle cx="238" cy="256" r="7" fill="#22C55E" filter="url(#neon)"/>
  <!-- Router label -->
  <text x="316" y="260" font-family="Courier New" font-size="11" fill="#F5D0FE">MOCK</text>
  <text x="316" y="278" font-family="Courier New" font-size="14" fill="#E879F9" font-weight="bold">:3000</text>
  <!-- Antenna -->
  <rect x="215" y="180" width="10" height="40" rx="4" fill="#A21CAF" stroke="#E879F9" stroke-width="1.5"/>
  <circle cx="220" cy="175" r="8" fill="#E879F9" filter="url(#neon)"/>
  <rect x="282" y="170" width="10" height="50" rx="4" fill="#A21CAF" stroke="#E879F9" stroke-width="1.5"/>
  <circle cx="287" cy="165" r="8" fill="#E879F9" filter="url(#neon)"/>
  <!-- Wifi waves -->
  <path d="M256 140 Q310 115 364 140" fill="none" stroke="#E879F9" stroke-width="2.5" opacity="0.7" filter="url(#neon)"/>
  <path d="M256 115 Q330 82 400 115" fill="none" stroke="#E879F9" stroke-width="2" opacity="0.5"/>
  <path d="M256 90 Q350 50 440 90" fill="none" stroke="#E879F9" stroke-width="1.5" opacity="0.3"/>
  <!-- Connecting nodes -->
  <!-- Client 1 (left) -->
  <rect x="50" y="130" width="80" height="60" rx="8" fill="#1A0025" stroke="#E879F9" stroke-width="1.5"/>
  <rect x="60" y="145" width="60" height="28" rx="4" fill="#0D0010"/>
  <text x="90" y="201" font-family="Arial" font-size="10" fill="#F5D0FE" text-anchor="middle">App</text>
  <!-- Client 2 (right) -->
  <rect x="382" y="130" width="80" height="60" rx="8" fill="#1A0025" stroke="#E879F9" stroke-width="1.5"/>
  <rect x="392" y="145" width="60" height="28" rx="4" fill="#0D0010"/>
  <text x="422" y="201" font-family="Arial" font-size="10" fill="#F5D0FE" text-anchor="middle">Test</text>
  <!-- Client 3 (bottom left) -->
  <rect x="50" y="365" width="80" height="60" rx="8" fill="#1A0025" stroke="#E879F9" stroke-width="1.5"/>
  <text x="90" y="398" font-family="Arial" font-size="10" fill="#F5D0FE" text-anchor="middle">Browser</text>
  <!-- Client 4 (bottom right) -->
  <rect x="382" y="365" width="80" height="60" rx="8" fill="#1A0025" stroke="#E879F9" stroke-width="1.5"/>
  <text x="422" y="398" font-family="Arial" font-size="10" fill="#F5D0FE" text-anchor="middle">Postman</text>
  <!-- Connection lines -->
  <line x1="130" y1="160" x2="130" y2="240" stroke="#E879F9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <line x1="382" y1="160" x2="382" y2="240" stroke="#E879F9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <line x1="130" y1="310" x2="130" y2="365" stroke="#E879F9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <line x1="382" y1="310" x2="382" y2="365" stroke="#E879F9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <!-- Response status pills -->
  <rect x="156" y="178" width="44" height="16" rx="5" fill="#14532d"/>
  <text x="178" y="190" font-family="Arial" font-size="9" fill="#22C55E" text-anchor="middle">200 OK</text>
  <rect x="314" y="178" width="52" height="16" rx="5" fill="#1C1200"/>
  <text x="340" y="190" font-family="Arial" font-size="9" fill="#F59E0B" text-anchor="middle">201 Created</text>
</svg>
