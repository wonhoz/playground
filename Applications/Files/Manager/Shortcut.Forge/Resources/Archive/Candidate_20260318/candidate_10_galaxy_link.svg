<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#060015"/>
    </linearGradient>
    <radialGradient id="galaxyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.5"/>
      <stop offset="40%" style="stop-color:#7C3AED;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 은하 배경 글로우 -->
  <circle cx="256" cy="256" r="180" fill="url(#galaxyGrad)" filter="url(#coreGlow)"/>
  <!-- 은하 나선팔들 (링크 경로) -->
  <path d="M 256,256 Q 330,180 400,150 Q 440,135 445,160" fill="none" stroke="#8B5CF6" stroke-width="2.5" opacity="0.5" filter="url(#glow)"/>
  <path d="M 256,256 Q 160,190 100,150 Q 65,130 72,165" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.5" filter="url(#glow)"/>
  <path d="M 256,256 Q 340,332 390,395 Q 415,430 395,445" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <path d="M 256,256 Q 165,335 112,395 Q 85,428 108,443" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.4"/>
  <!-- 링크 바로가기들 (나선팔 끝에) -->
  <!-- 링크 1 (우상단) -->
  <g transform="translate(415,140)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#C4B5FD" stroke-width="3.5" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#8B5CF6" opacity="0.7"/>
    <line x1="22" y1="0" x2="38" y2="0" stroke="#C4B5FD" stroke-width="3.5" opacity="0.85" filter="url(#glow)" stroke-linecap="round"/>
  </g>
  <!-- 링크 2 (좌상단) -->
  <g transform="translate(97,150)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.85" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#8B5CF6" stroke-width="2.5" opacity="0.75"/>
    <circle cx="0" cy="0" r="4" fill="#7C3AED" opacity="0.65"/>
    <line x1="-20" y1="0" x2="-36" y2="0" stroke="#A78BFA" stroke-width="3" opacity="0.8" filter="url(#glow)" stroke-linecap="round"/>
  </g>
  <!-- 링크 3 (우하단) -->
  <g transform="translate(388,418)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#8B5CF6" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#6D28D9" opacity="0.6"/>
  </g>
  <!-- 링크 4 (좌하단) -->
  <g transform="translate(118,418)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#8B5CF6" stroke-width="3" opacity="0.78" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.68"/>
    <circle cx="0" cy="0" r="4" fill="#6D28D9" opacity="0.58"/>
  </g>
  <!-- 중앙 은하 핵 (바로가기 생성기) -->
  <circle cx="256" cy="256" r="32" fill="#7C3AED" opacity="0.8" filter="url(#coreGlow)"/>
  <circle cx="256" cy="256" r="20" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="11" fill="#EDE9FE" opacity="1" filter="url(#glow)"/>
  <!-- 바로가기 심볼 -->
  <path d="M 249,252 L 260,252 L 260,248 L 267,256 L 260,264 L 260,260 L 249,260 Z" fill="#030508" opacity="0.9"/>
  <!-- 배경 별들 -->
  <circle cx="180" cy="100" r="1.5" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="400" cy="90" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="460" cy="300" r="1.5" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="80" cy="380" r="1.5" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="350" cy="450" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="80" cy="180" r="1.5" fill="#8B5CF6" opacity="0.45"/>
  <circle cx="460" cy="420" r="1.5" fill="#C4B5FD" opacity="0.35"/>
</svg>