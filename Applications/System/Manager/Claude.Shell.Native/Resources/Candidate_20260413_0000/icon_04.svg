<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor · 대각선/동적 · 폴더 → 터미널 빠른 실행 -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCCBC"/>
      <stop offset="1" stop-color="#FF8A65"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg04)"/>
  <!-- 큰 폴더 -->
  <g>
    <path d="M 120 320 L 280 320 L 340 380 L 460 380 L 460 640 L 120 640 Z" fill="#FFD93D" stroke="#4E342E" stroke-width="18" stroke-linejoin="round"/>
