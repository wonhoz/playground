<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="passingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="labelDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of GitHub-style badges -->
  <!-- Badge 1: build | passing -->
  <rect x="96" y="148" width="320" height="48" rx="8" fill="url(#labelDark)"/>
  <rect x="236" y="148" width="180" height="48" rx="8" fill="url(#passingGrad)"/>
  <rect x="104" y="160" width="80" height="12" rx="3" fill="white" opacity="0.7"/>
  <rect x="250" y="160" width="70" height="12" rx="3" fill="white" opacity="0.9"/>
  <!-- Checkmark on passing -->
  <path d="M245 174 L254 183 L272 162" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Badge 2: version | 2.0 -->
  <rect x="96" y="212" width="320" height="48" rx="8" fill="url(#labelDark)"/>
  <rect x="236" y="212" width="180" height="48" rx="8" fill="#1565c0"/>
  <rect x="104" y="224" width="90" height="12" rx="3" fill="white" opacity="0.7"/>
  <rect x="260" y="224" width="55" height="12" rx="3" fill="white" opacity="0.9"/>
  <!-- Badge 3: status | failing -->
  <rect x="96" y="276" width="320" height="48" rx="8" fill="url(#labelDark)"/>
  <rect x="236" y="276" width="180" height="48" rx="8" fill="url(#failGrad)"/>
  <rect x="104" y="288" width="75" height="12" rx="3" fill="white" opacity="0.7"/>
  <rect x="252" y="288" width="68" height="12" rx="3" fill="white" opacity="0.9"/>
  <!-- X on failing -->
  <line x1="247" y1="296" x2="263" y2="312" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="263" y1="296" x2="247" y2="312" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Hammer/forge icon above -->
  <rect x="220" y="95" width="72" height="38" rx="8" fill="#8b6914"/>
  <rect x="248" y="133" width="16" height="28" rx="5" fill="#6b4d14"/>
</svg>