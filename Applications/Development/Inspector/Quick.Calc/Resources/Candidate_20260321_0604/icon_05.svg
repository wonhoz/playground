<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="qc-bg-clip-05">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="qc-bg-grad-05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80EED0"/>
      <stop offset="100%" stop-color="#40C8A0"/>
    </linearGradient>
    <linearGradient id="win-key-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A30"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="calc-overlay-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7070"/>
      <stop offset="100%" stop-color="#CC2020"/>
    </linearGradient>
  </defs>
  <!-- 배경 (민트) -->
  <rect width="1024" height="1024" rx="180" fill="url(#qc-bg-grad-05)"/>
  <g clip-path="url(#qc-bg-clip-05)">
    <!-- 배경 글로우 -->
    <circle cx="512" cy="512" r="380" fill="#A0F0D8" opacity="0.2"/>
    <!-- Win 키 (딥 네이비, 큰) -->
    <rect x="180" y="280" width="500" height="480" rx="36" fill="url(#win-key-grad)" stroke="#142840" stroke-width="8"/>
    <!-- Win 키 내부 Windows 로고 (4개 사각형) -->
    <!-- 좌상단 빨강 -->
    <rect x="250" y="350" width="170" height="160" rx="12" fill="#FF4444" opacity="0.9"/>
    <!-- 우상단 초록 -->
    <rect x="440" y="350" width="170" height="160" rx="12" fill="#22BB44" opacity="0.9"/>
    <!-- 좌하단 파랑 -->
    <rect x="250" y="530" width="170" height="160" rx="12" fill="#2288FF" opacity="0.9"/>
    <!-- 우하단 노랑 -->
    <rect x="440" y="530" width="170" height="160" rx="12" fill="#FFCC00" opacity="0.9"/>
    <!-- Win 키 하단 레이블 -->
    <rect x="310" y="718" width="160" height="28" rx="8" fill="#1A2840" opacity="0.7"/>
    <rect x="330" y="726" width="120" height="12" rx="4" fill="#4080AA" opacity="0.7"/>
    <!-- 계산기 오버레이 (우하단에 부각, 코랄) -->
    <!-- 계산기 그림자 -->
    <rect x="488" y="508" width="300" height="360" rx="24" fill="#000000" opacity="0.25"/>
    <!-- 계산기 본체 -->
    <rect x="474" y="494" width="300" height="360" rx="24" fill="url(#calc-overlay-grad)" stroke="#FF9090" stroke-width="5"/>
    <!-- 계산기 디스플레이 -->
    <rect x="496" y="516" width="256" height="66" rx="10" fill="#1A0808"/>
    <rect x="620" y="528" width="114" height="42" rx="6" fill="#FF9090" opacity="0.8"/>
    <!-- 계산기 버튼들 (소형) -->
    <rect x="496" y="598" width="54" height="42" rx="8" fill="#CC2020"/>
    <rect x="560" y="598" width="54" height="42" rx="8" fill="#CC2020"/>
    <rect x="624" y="598" width="54" height="42" rx="8" fill="#CC2020"/>
    <rect x="688" y="598" width="62" height="42" rx="8" fill="#AA1010"/>
    <rect x="496" y="650" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="560" y="650" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="624" y="650" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="688" y="650" width="62" height="42" rx="8" fill="#AA1010"/>
    <rect x="496" y="702" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="560" y="702" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="624" y="702" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="688" y="702" width="62" height="42" rx="8" fill="#AA1010"/>
    <rect x="496" y="754" width="118" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="624" y="754" width="54" height="42" rx="8" fill="#FF8080" opacity="0.8"/>
    <rect x="688" y="754" width="62" height="42" rx="8" fill="#880808"/>
    <!-- = 버튼 심볼 -->
    <rect x="700" y="772" width="38" height="7" rx="3" fill="#FFFFFF"/>
    <rect x="700" y="785" width="38" height="7" rx="3" fill="#FFFFFF"/>
    <!-- + 오버레이 바지 연결 표시 -->
    <circle cx="476" cy="496" r="22" fill="#80EED0" stroke="#40C8A0" stroke-width="4"/>
    <rect x="466" y="487" width="20" height="6" rx="3" fill="#0A1A30"/>
    <rect x="473" y="480" width="6" height="20" rx="3" fill="#0A1A30"/>
  </g>
</svg>
