<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </linearGradient>
    <radialGradient id="dial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#424200"/>
      <stop offset="100%" stop-color="#1a1400"/>
    </radialGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timer dial -->
  <circle cx="256" cy="220" r="155" fill="url(#dial)" stroke="#ffd600" stroke-width="2" opacity="0.8"/>
  <!-- Tick marks -->
  <circle cx="256" cy="220" r="155" fill="none" stroke="#ffd600" stroke-width="8"
          stroke-dasharray="4 26.7" stroke-dashoffset="0" opacity="0.6"
          transform="rotate(-90 256 220)"/>
  <!-- Arc (reaction zone: 80%) -->
  <!-- circumference of r=140 = 879 -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="#ffd600" stroke-width="18"
          stroke-dasharray="703 176" stroke-dashoffset="0" opacity="0.85"
          transform="rotate(-90 256 220)" filter="url(#glow)"/>
  <!-- Needle -->
  <line x1="256" y1="220" x2="256" y2="82" stroke="#ff1744" stroke-width="5" stroke-linecap="round" filter="url(#glow)" transform="rotate(65 256 220)"/>
  <!-- Center -->
  <circle cx="256" cy="220" r="16" fill="#1a1400" stroke="#ffd600" stroke-width="3"/>
  <circle cx="256" cy="220" r="7" fill="#ffd600" filter="url(#glow)"/>
  <!-- Readout -->
  <text x="256" y="212" font-family="monospace" font-size="38" fill="#ffd600" text-anchor="middle" font-weight="bold" filter="url(#glow)">0.18s</text>
  <text x="256" y="245" font-family="monospace" font-size="14" fill="#ff8f00" text-anchor="middle">REACTION</text>
  <!-- Winner banner -->
  <rect x="128" y="385" width="256" height="36" rx="10" fill="#1a1400" stroke="#ffd600" stroke-width="2"/>
  <text x="256" y="408" font-family="monospace" font-size="16" fill="#ffd600" text-anchor="middle" font-weight="bold">PLAYER 1 WINS!</text>
  <!-- Title -->
  <text x="256" y="462" font-family="sans-serif" font-size="22" fill="#ffd600" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.9">SNAP.DUEL</text>
</svg>
