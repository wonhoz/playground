<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0018"/>
      <stop offset="100%" stop-color="#1A0A30"/>
    </linearGradient>
    <clipPath id="c3e"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3e)"/>
  <circle cx="512" cy="480" r="320" fill="#3B528B" opacity="0.1" clip-path="url(#c3e)"/>

  <!-- Layer 2: 빈도수 → 크기 단어 배열 (기하학추상, Viridis 팔레트) -->
  <!-- 동심원 구조 — 중앙부터 큰 단어, 바깥으로 갈수록 작아짐 -->

  <!-- 1위: 중앙, 최대 크기 -->
  <text x="512" y="516" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="110" font-weight="800" fill="#FDE725">cloud</text>

  <!-- 2위 레이어 -->
  <text x="260" y="400" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="70" font-weight="700" fill="#5DC863">word</text>
  <text x="760" y="400" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="70" font-weight="700" fill="#5DC863">text</text>

  <!-- 3위 레이어 -->
  <text x="310" y="600" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="52" font-weight="600" fill="#21908C">font</text>
  <text x="712" y="600" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="52" font-weight="600" fill="#21908C">mask</text>
  <text x="512" y="290" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="52" font-weight="600" fill="#21908C">freq</text>

  <!-- 4위 레이어 -->
  <text x="185" y="500" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="38" font-weight="500" fill="#3B528B">rank</text>
  <text x="838" y="500" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="38" font-weight="500" fill="#3B528B">data</text>
  <text x="240" y="678" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="36" font-weight="500" fill="#3B528B">size</text>
  <text x="784" y="678" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="36" font-weight="500" fill="#3B528B">color</text>
  <text x="380" y="724" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="32" font-weight="500" fill="#3B528B">art</text>
  <text x="644" y="724" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="32" font-weight="500" fill="#3B528B">svg</text>

  <!-- 5위 레이어 (바깥, 최소) -->
  <text x="180" y="350" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" fill="#440154">skia</text>
  <text x="840" y="350" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="26" fill="#440154">png</text>
  <text x="180" y="640" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="24" fill="#440154">jpg</text>
  <text x="840" y="640" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="24" fill="#440154">vis</text>
  <text x="310" y="770" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#440154">hue</text>
  <text x="714" y="770" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="22" fill="#440154">fit</text>

  <!-- Layer 3: 동심원 가이드 (희미) -->
  <circle cx="512" cy="490" r="80"  fill="none" stroke="#FDE725" stroke-width="2" opacity="0.15"/>
  <circle cx="512" cy="490" r="200" fill="none" stroke="#5DC863" stroke-width="2" opacity="0.1"/>
  <circle cx="512" cy="490" r="310" fill="none" stroke="#21908C" stroke-width="1.5" opacity="0.08"/>
</svg>
