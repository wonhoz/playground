<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001818"/>
      <stop offset="100%" stop-color="#002020"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00AAAA"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree structure of binary file -->
  <!-- Root node -->
  <rect x="180" y="72" width="152" height="36" rx="6" fill="#001E1E" stroke="url(#node)" stroke-width="2"/>
  <text x="256" y="95" text-anchor="middle" fill="#00CCCC" font-size="14" font-family="monospace">binary.exe</text>
  <!-- Branch lines -->
  <line x1="256" y1="108" x2="256" y2="128" stroke="#006666" stroke-width="2"/>
  <line x1="152" y1="128" x2="360" y2="128" stroke="#006666" stroke-width="2"/>
  <line x1="152" y1="128" x2="152" y2="148" stroke="#006666" stroke-width="2"/>
  <line x1="256" y1="128" x2="256" y2="148" stroke="#006666" stroke-width="2"/>
  <line x1="360" y1="128" x2="360" y2="148" stroke="#006666" stroke-width="2"/>
  <!-- Level 2 nodes -->
  <rect x="96" y="148" width="112" height="32" rx="5" fill="#001616" stroke="#00AAAA" stroke-width="2"/>
  <text x="152" y="169" text-anchor="middle" fill="#00AAAA" font-size="12" font-family="monospace">DOS Header</text>
  <rect x="200" y="148" width="112" height="32" rx="5" fill="#001616" stroke="#00AAAA" stroke-width="2"/>
  <text x="256" y="169" text-anchor="middle" fill="#00AAAA" font-size="12" font-family="monospace">PE Header</text>
  <rect x="304" y="148" width="112" height="32" rx="5" fill="#001616" stroke="#00AAAA" stroke-width="2"/>
  <text x="360" y="169" text-anchor="middle" fill="#00AAAA" font-size="12" font-family="monospace">Sections</text>
  <!-- DOS Header subnodes -->
  <line x1="152" y1="180" x2="152" y2="200" stroke="#004444" stroke-width="2"/>
  <line x1="120" y1="200" x2="184" y2="200" stroke="#004444" stroke-width="2"/>
  <line x1="120" y1="200" x2="120" y2="215" stroke="#004444" stroke-width="2"/>
  <line x1="184" y1="200" x2="184" y2="215" stroke="#004444" stroke-width="2"/>
  <rect x="84" y="215" width="72" height="26" rx="4" fill="#001212" stroke="#008888" stroke-width="1"/>
  <text x="120" y="232" text-anchor="middle" fill="#008888" font-size="10" font-family="monospace">e_magic</text>
  <rect x="148" y="215" width="72" height="26" rx="4" fill="#001212" stroke="#008888" stroke-width="1"/>
  <text x="184" y="232" text-anchor="middle" fill="#008888" font-size="10" font-family="monospace">e_lfanew</text>
  <!-- Hex values for DOS -->
  <text x="88" y="260" fill="#004444" font-size="11" font-family="monospace">4D 5A</text>
  <text x="148" y="260" fill="#004444" font-size="11" font-family="monospace">80 00</text>
  <!-- Sections subnodes -->
  <line x1="360" y1="180" x2="360" y2="200" stroke="#004444" stroke-width="2"/>
  <line x1="316" y1="200" x2="404" y2="200" stroke="#004444" stroke-width="2"/>
  <line x1="316" y1="200" x2="316" y2="215" stroke="#004444" stroke-width="2"/>
  <line x1="360" y1="200" x2="360" y2="215" stroke="#004444" stroke-width="2"/>
  <line x1="404" y1="200" x2="404" y2="215" stroke="#004444" stroke-width="2"/>
  <rect x="284" y="215" width="64" height="26" rx="4" fill="#001212" stroke="#008888" stroke-width="1"/>
  <text x="316" y="232" text-anchor="middle" fill="#008888" font-size="10" font-family="monospace">.text</text>
  <rect x="328" y="215" width="64" height="26" rx="4" fill="#001212" stroke="#008888" stroke-width="1"/>
  <text x="360" y="232" text-anchor="middle" fill="#008888" font-size="10" font-family="monospace">.data</text>
  <rect x="372" y="215" width="64" height="26" rx="4" fill="#001212" stroke="#008888" stroke-width="1"/>
  <text x="404" y="232" text-anchor="middle" fill="#008888" font-size="10" font-family="monospace">.rsrc</text>
  <!-- Status strip -->
  <rect x="72" y="350" width="368" height="130" rx="10" fill="#001212" stroke="#008888" stroke-width="1" opacity="0.7"/>
  <text x="90" y="375" fill="#006666" font-size="12" font-family="monospace">Selected: DOS Header &gt; e_magic</text>
  <text x="90" y="398" fill="#00AAAA" font-size="12" font-family="monospace">Offset  : 0x00000000</text>
  <text x="90" y="420" fill="#00AAAA" font-size="12" font-family="monospace">Size    : 2 bytes</text>
  <text x="90" y="442" fill="#00AAAA" font-size="12" font-family="monospace">Hex     : 4D 5A</text>
  <text x="90" y="464" fill="#00FFCC" font-size="12" font-family="monospace">Value   : "MZ" (DOS signature)</text>
</svg>
