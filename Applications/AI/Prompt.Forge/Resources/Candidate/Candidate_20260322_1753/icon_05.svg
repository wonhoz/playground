<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 딥 퍼플 배경 -->
  <defs>
    <radialGradient id="glow5" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E1035" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#1E1035"/>
  <rect width="1024" height="1024" rx="190" fill="url(#glow5)"/>
  <!-- Layer 2: 마법 지팡이 대각선 -->
  <!-- 지팡이 몸통 -->
  <rect x="220" y="640" width="500" height="28" rx="14" fill="#C084FC" transform="rotate(-45 470 654)"/>
  <!-- 지팡이 끝 별 -->
  <circle cx="290" cy="750" r="20" fill="#A855F7"/>
  <!-- 마법 구슬 (지팡이 상단) -->
  <circle cx="680" cy="290" r="52" fill="#C084FC" opacity="0.9"/>
  <circle cx="680" cy="290" r="36" fill="#E9D5FF"/>
  <circle cx="665" cy="278" r="12" fill="white" opacity="0.8"/>
  <!-- Layer 3: 흩뿌려지는 별들 — 프롬프트가 생성되는 효과 -->
  <!-- 큰 별들 -->
  <text x="760" y="200" font-family="sans-serif" font-size="52" fill="#F0ABFC" text-anchor="middle">✦</text>
  <text x="840" y="350" font-family="sans-serif" font-size="36" fill="#E879F9" text-anchor="middle">★</text>
  <text x="820" y="460" font-family="sans-serif" font-size="28" fill="#C084FC" text-anchor="middle">✦</text>
  <!-- 작은 별들 -->
  <circle cx="600" cy="170" r="10" fill="#F0ABFC" opacity="0.9"/>
  <circle cx="750" cy="310" r="7" fill="#E879F9" opacity="0.8"/>
  <circle cx="870" cy="220" r="9" fill="#D8B4FE" opacity="0.9"/>
  <circle cx="700" cy="430" r="6" fill="#C084FC" opacity="0.7"/>
  <circle cx="780" cy="530" r="8" fill="#F0ABFC" opacity="0.8"/>
  <!-- 텍스트 파티클 효과 -->
  <text x="600" y="280" font-family="monospace" font-size="22" fill="#F0ABFC" opacity="0.7" transform="rotate(-15 600 280)">AI</text>
  <text x="820" y="410" font-family="monospace" font-size="18" fill="#E879F9" opacity="0.6" transform="rotate(10 820 410)">{}</text>
  <!-- 곡선 궤적 -->
  <path d="M680 290 Q750 250 760 180" stroke="#C084FC" stroke-width="3" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
  <path d="M680 290 Q810 320 840 340" stroke="#E879F9" stroke-width="3" fill="none" stroke-dasharray="6,4" opacity="0.6"/>
</svg>
