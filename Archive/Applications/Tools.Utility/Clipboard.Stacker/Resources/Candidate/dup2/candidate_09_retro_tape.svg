      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc4400"/>
