<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060e1a"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="lensBody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0d3a5c"/>
      <stop offset="40%" stop-color="#082840"/>
      <stop offset="100%" stop-color="#030f1a"/>
    </radialGradient>
    <radialGradient id="lensReflect" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#06B6D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="innerLens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Zoom grid in background -->
  <g opacity="0.12">
    <line x1="256" y1="50" x2="256" y2="462" stroke="#06B6D4" stroke-width="0.5"/>
    <line x1="50" y1="256" x2="462" y2="256" stroke="#06B6D4" stroke-width="0.5"/>
    <circle cx="256" cy="256" r="50" fill="none" stroke="#06B6D4" stroke-width="0.5"/>
    <circle cx="256" cy="256" r="100" fill="none" stroke="#06B6D4" stroke-width="0.5"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#06B6D4" stroke-width="0.5"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="#06B6D4" stroke-width="0.5"/>
  </g>

  <!-- Lens barrel outer ring -->
  <circle cx="220" cy="220" r="155" fill="url(#lensBody)" stroke="#0EA5E9" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="220" cy="220" r="148" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Lens aperture blades (hexagonal) -->
  <polygon points="220,120 305,145 305,295 220,320 135,295 135,145" fill="#0a2035" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Lens glass element -->
  <circle cx="220" cy="220" r="85" fill="url(#innerLens)" stroke="#06B6D4" stroke-width="2" stroke-opacity="0.8" filter="url(#softglow)"/>
  <circle cx="220" cy="220" r="85" fill="url(#lensReflect)"/>

  <!-- Inner lens rings (coatings) -->
  <circle cx="220" cy="220" r="70" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="220" cy="220" r="55" fill="none" stroke="#0EA5E9" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="220" cy="220" r="38" fill="none" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Center aperture -->
  <circle cx="220" cy="220" r="22" fill="#030508" stroke="#06B6D4" stroke-width="2" filter="url(#softglow)"/>
  <circle cx="220" cy="220" r="12" fill="#06B6D4" fill-opacity="0.2"/>

  <!-- Lens highlight -->
  <ellipse cx="190" cy="185" rx="30" ry="20" fill="white" fill-opacity="0.08" transform="rotate(-30 190 185)"/>

  <!-- Search handle -->
  <line x1="348" y1="348" x2="430" y2="430" stroke="#06B6D4" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="348" y1="348" x2="430" y2="430" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round"/>

  <!-- Magnification indicator lines -->
  <line x1="350" y1="135" x2="385" y2="115" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="370" y1="175" x2="415" y2="165" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="375" y1="220" x2="425" y2="220" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Disk data grid inside lens -->
  <g transform="translate(185,185)" opacity="0.5">
    <rect x="0" y="0" width="10" height="10" fill="#06B6D4" fill-opacity="0.6" rx="1"/>
    <rect x="14" y="0" width="10" height="10" fill="#0EA5E9" fill-opacity="0.4" rx="1"/>
    <rect x="28" y="0" width="10" height="10" fill="#06B6D4" fill-opacity="0.7" rx="1"/>
    <rect x="0" y="14" width="10" height="10" fill="#3B82F6" fill-opacity="0.5" rx="1"/>
    <rect x="14" y="14" width="10" height="10" fill="#06B6D4" fill-opacity="0.3" rx="1"/>
    <rect x="28" y="14" width="10" height="10" fill="#0EA5E9" fill-opacity="0.6" rx="1"/>
    <rect x="0" y="28" width="10" height="10" fill="#0EA5E9" fill-opacity="0.4" rx="1"/>
    <rect x="14" y="28" width="10" height="10" fill="#06B6D4" fill-opacity="0.8" rx="1"/>
    <rect x="28" y="28" width="10" height="10" fill="#3B82F6" fill-opacity="0.5" rx="1"/>
  </g>
</svg>
