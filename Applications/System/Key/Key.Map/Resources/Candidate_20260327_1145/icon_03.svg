<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Four modifier key symbols in grid -->
  <!-- ⌃ Ctrl - top left -->
  <rect x="170" y="180" width="280" height="260" rx="30" fill="#FFFFFF" opacity="0.18"/>
  <text x="310" y="360" font-family="Arial,sans-serif" font-size="160" fill="#FFFFFF" font-weight="bold" text-anchor="middle">⌃</text>
  <text x="310" y="420" font-family="Arial,sans-serif" font-size="52" fill="#E9D5FF" text-anchor="middle">Ctrl</text>
  <!-- ⌥ Alt - top right -->
  <rect x="570" y="180" width="280" height="260" rx="30" fill="#FFFFFF" opacity="0.18"/>
  <text x="710" y="360" font-family="Arial,sans-serif" font-size="160" fill="#FCD34D" font-weight="bold" text-anchor="middle">⌥</text>
  <text x="710" y="420" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" text-anchor="middle">Alt</text>
  <!-- ⇧ Shift - bottom left -->
  <rect x="170" y="540" width="280" height="260" rx="30" fill="#FFFFFF" opacity="0.18"/>
  <text x="310" y="720" font-family="Arial,sans-serif" font-size="160" fill="#6EE7B7" font-weight="bold" text-anchor="middle">⇧</text>
  <text x="310" y="780" font-family="Arial,sans-serif" font-size="52" fill="#A7F3D0" text-anchor="middle">Shift</text>
  <!-- ❖ Win - bottom right -->
  <rect x="570" y="540" width="280" height="260" rx="30" fill="#FFFFFF" opacity="0.18"/>
  <text x="710" y="720" font-family="Arial,sans-serif" font-size="160" fill="#93C5FD" font-weight="bold" text-anchor="middle">❖</text>
  <text x="710" y="780" font-family="Arial,sans-serif" font-size="52" fill="#BFDBFE" text-anchor="middle">Win</text>
</svg>
