<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#040a10"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="256" cy="256" r="126" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="84" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.45"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Cross hairs -->
  <line x1="46" y1="256" x2="466" y2="256" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="256" y1="46" x2="256" y2="466" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="107" y1="107" x2="405" y2="405" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="405" y1="107" x2="107" y2="405" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Radar sweep sector -->
  <path d="M256,256 L256,46 A210,210 0 0,1 445,330 Z" fill="url(#sweep)"/>
  <!-- Sweep leading edge -->
  <line x1="256" y1="256" x2="445" y2="330" stroke="#06B6D4" stroke-width="2.5" stroke-opacity="0.8" filter="url(#glow)"/>

  <!-- Storage blips on radar -->
  <!-- Large storage items -->
  <circle cx="340" cy="160" r="10" fill="#06B6D4" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="340" cy="160" r="16" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.4"/>

  <circle cx="180" cy="300" r="7" fill="#0EA5E9" fill-opacity="0.7" filter="url(#softglow)"/>
  <circle cx="180" cy="300" r="13" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.35"/>

  <circle cx="380" cy="310" r="14" fill="#06B6D4" fill-opacity="0.6" filter="url(#glow)"/>
  <circle cx="380" cy="310" r="22" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.35"/>

  <circle cx="145" cy="185" r="6" fill="#3B82F6" fill-opacity="0.7" filter="url(#softglow)"/>
  <circle cx="295" cy="390" r="8" fill="#0EA5E9" fill-opacity="0.65" filter="url(#softglow)"/>
  <circle cx="400" cy="200" r="5" fill="#06B6D4" fill-opacity="0.6" filter="url(#softglow)"/>

  <!-- Smaller blips -->
  <circle cx="310" cy="340" r="4" fill="#7DD3FC" fill-opacity="0.6"/>
  <circle cx="205" cy="155" r="3" fill="#06B6D4" fill-opacity="0.5"/>
  <circle cx="360" cy="250" r="3.5" fill="#0EA5E9" fill-opacity="0.5"/>
  <circle cx="150" cy="360" r="3" fill="#3B82F6" fill-opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="3" fill="#7DD3FC"/>

  <!-- Corner decorations -->
  <rect x="30" y="30" width="30" height="3" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="30" y="30" width="3" height="30" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="452" y="30" width="30" height="3" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="479" y="30" width="3" height="30" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="30" y="479" width="30" height="3" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="30" y="452" width="3" height="30" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="452" y="479" width="30" height="3" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
  <rect x="479" y="452" width="3" height="30" fill="#06B6D4" fill-opacity="0.5" rx="1.5"/>
</svg>
