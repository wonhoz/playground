<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#2d1a00"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCC44"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <linearGradient id="file" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9944"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Files in a row -->
  <rect x="80" y="200" width="90" height="115" rx="8" fill="url(#file)" opacity="0.7"/>
  <polygon points="150,200 170,200 170,220" fill="#1a0e00" opacity="0.4"/>
  <polygon points="150,200 150,220 170,220" fill="#CC5500" opacity="0.7"/>

  <rect x="196" y="200" width="90" height="115" rx="8" fill="url(#file)" opacity="0.8"/>
  <polygon points="266,200 286,200 286,220" fill="#1a0e00" opacity="0.4"/>
  <polygon points="266,200 266,220 286,220" fill="#CC5500" opacity="0.7"/>

  <rect x="312" y="200" width="90" height="115" rx="8" fill="url(#file)" opacity="0.9"/>
  <polygon points="382,200 402,200 402,220" fill="#1a0e00" opacity="0.4"/>
  <polygon points="382,200 382,220 402,220" fill="#CC5500" opacity="0.7"/>

  <!-- Big pencil diagonal -->
  <g transform="rotate(-40 256 320)">
    <rect x="226" y="100" width="60" height="280" rx="8" fill="url(#pencil)"/>
    <!-- Eraser -->
    <rect x="226" y="100" width="60" height="40" rx="8" fill="#FFAAAA"/>
    <!-- Tip -->
    <polygon points="226,380 286,380 256,440" fill="#FFEECC"/>
    <polygon points="240,380 272,380 256,430" fill="#333"/>
    <!-- Lines on pencil body -->
    <line x1="226" y1="160" x2="286" y2="160" stroke="#CC8800" stroke-width="2" opacity="0.5"/>
    <line x1="226" y1="180" x2="286" y2="180" stroke="#CC8800" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Batch counter badge -->
  <circle cx="390" cy="110" r="38" fill="#FF8800"/>
  <text x="390" y="124" font-family="Arial" font-size="30" font-weight="bold" fill="white" text-anchor="middle">×N</text>
</svg>