<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright vivid purple -->
  <rect width="1024" height="1024" rx="190" fill="#6C5CE7"/>

  <!-- Layer 2: Gamepad body (simple, bold, front view) -->
  <!-- Main body — white rounded rect -->
  <rect x="140" y="340" width="744" height="380" rx="100" fill="#FFFFFF" stroke="#2D3436" stroke-width="16"/>

  <!-- Left grip -->
  <ellipse cx="220" cy="660" rx="100" ry="80" fill="#FFFFFF" stroke="#2D3436" stroke-width="16"/>
  <!-- Right grip -->
  <ellipse cx="804" cy="660" rx="100" ry="80" fill="#FFFFFF" stroke="#2D3436" stroke-width="16"/>

  <!-- D-pad (left side) -->
  <!-- Horizontal bar -->
  <rect x="220" y="458" width="120" height="48" rx="10" fill="#B2BEC3" stroke="#636E72" stroke-width="6"/>
  <!-- Vertical bar -->
  <rect x="256" y="422" width="48" height="120" rx="10" fill="#B2BEC3" stroke="#636E72" stroke-width="6"/>

  <!-- Left analog stick -->
  <circle cx="324" cy="620" r="56" fill="#DFE6E9" stroke="#636E72" stroke-width="8"/>
  <circle cx="324" cy="620" r="36" fill="#B2BEC3"/>

  <!-- Right analog stick -->
  <circle cx="620" cy="620" r="56" fill="#DFE6E9" stroke="#636E72" stroke-width="8"/>
  <circle cx="620" cy="620" r="36" fill="#B2BEC3"/>

  <!-- Layer 3: ABXY buttons (BIG, colorful) -->
  <!-- B — right (red/coral) -->
  <circle cx="750" cy="482" r="48" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="10"/>
  <text x="750" y="499" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">B</text>

  <!-- A — bottom (green) -->
  <circle cx="750" cy="590" r="48" fill="#00B894" stroke="#FFFFFF" stroke-width="10"/>
  <text x="750" y="607" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">A</text>

  <!-- Y — top (yellow) -->
  <circle cx="750" cy="374" r="48" fill="#FFEAA7" stroke="#FFFFFF" stroke-width="10"/>
  <text x="750" y="391" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900" fill="#2D3436">Y</text>

  <!-- X — left (blue) -->
  <circle cx="642" cy="482" r="48" fill="#74B9FF" stroke="#FFFFFF" stroke-width="10"/>
  <text x="642" y="499" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">X</text>

  <!-- Center buttons: Start/Select (small) -->
  <rect x="442" y="478" width="60" height="28" rx="14" fill="#B2BEC3" stroke="#636E72" stroke-width="4"/>
  <rect x="530" y="478" width="60" height="28" rx="14" fill="#B2BEC3" stroke="#636E72" stroke-width="4"/>

  <!-- Home button -->
  <circle cx="512" cy="540" r="22" fill="#6C5CE7" stroke="#FFFFFF" stroke-width="6"/>
  <text x="512" y="549" text-anchor="middle" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="22" fill="#FFFFFF">⊙</text>

  <!-- Label -->
  <text x="512" y="930" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="62" font-weight="900" fill="#FFFFFF">Pad.Forge</text>
</svg>
