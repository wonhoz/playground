<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Running through falling code rain -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Code rain columns (descending characters represented as glowing bars) -->
  <!-- Column 1 -->
  <rect x="160" y="120" width="14" height="60" rx="4" fill="#00E5FF" opacity="0.9"/>
  <rect x="160" y="190" width="14" height="40" rx="4" fill="#00B0FF" opacity="0.6"/>
  <rect x="160" y="240" width="14" height="50" rx="4" fill="#00B0FF" opacity="0.4"/>
  <rect x="160" y="300" width="14" height="80" rx="4" fill="#004D70" opacity="0.3"/>
  <!-- Column 2 -->
  <rect x="220" y="180" width="14" height="70" rx="4" fill="#00E5FF" opacity="0.85"/>
  <rect x="220" y="260" width="14" height="50" rx="4" fill="#00B0FF" opacity="0.55"/>
  <rect x="220" y="320" width="14" height="60" rx="4" fill="#004D70" opacity="0.35"/>
  <!-- Column 3 (behind character) -->
  <rect x="280" y="120" width="14" height="90" rx="4" fill="#00B0FF" opacity="0.4"/>
  <rect x="280" y="220" width="14" height="120" rx="4" fill="#004D70" opacity="0.3"/>
  <!-- Column 4 (behind character) -->
  <rect x="340" y="160" width="14" height="50" rx="4" fill="#00E5FF" opacity="0.5"/>
  <rect x="340" y="220" width="14" height="100" rx="4" fill="#00B0FF" opacity="0.3"/>
  <!-- Column 5 (right side) -->
  <rect x="660" y="140" width="14" height="80" rx="4" fill="#00E5FF" opacity="0.9"/>
  <rect x="660" y="230" width="14" height="60" rx="4" fill="#00B0FF" opacity="0.6"/>
  <rect x="660" y="300" width="14" height="70" rx="4" fill="#004D70" opacity="0.4"/>
  <!-- Column 6 -->
  <rect x="720" y="100" width="14" height="100" rx="4" fill="#00E5FF" opacity="0.85"/>
  <rect x="720" y="210" width="14" height="70" rx="4" fill="#00B0FF" opacity="0.55"/>
  <rect x="720" y="290" width="14" height="80" rx="4" fill="#004D70" opacity="0.35"/>
  <!-- Column 7 -->
  <rect x="780" y="140" width="14" height="60" rx="4" fill="#00E5FF" opacity="0.9"/>
  <rect x="780" y="210" width="14" height="50" rx="4" fill="#00B0FF" opacity="0.6"/>
  <!-- Column 8 -->
  <rect x="840" y="180" width="14" height="80" rx="4" fill="#00E5FF" opacity="0.8"/>
  <rect x="840" y="270" width="14" height="50" rx="4" fill="#00B0FF" opacity="0.5"/>
  <!-- Running character (neon outline) -->
  <circle cx="512" cy="340" r="60" fill="none" stroke="#80D8FF" stroke-width="8"/>
  <circle cx="512" cy="340" r="60" fill="#00B0FF" opacity="0.08"/>
  <line x1="512" y1="400" x2="512" y2="560" stroke="#80D8FF" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="420" y2="418" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="460" x2="604" y2="500" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="496" y1="560" x2="430" y2="650" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="528" y1="560" x2="594" y2="650" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="430" y1="650" x2="400" y2="726" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="594" y1="650" x2="624" y2="726" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <!-- Ground neon line -->
  <line x1="140" y1="800" x2="884" y2="800" stroke="#00E5FF" stroke-width="4" opacity="0.8"/>
</svg>
