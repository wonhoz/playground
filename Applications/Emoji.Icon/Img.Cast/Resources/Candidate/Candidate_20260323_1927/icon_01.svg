  <text x="225" y="580" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.7)" text-anchor="middle">PNG · JPG · BMP</text>
  <text x="795" y="580" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.7)" text-anchor="middle">16 · 32 · 48 · 256</text>
  <!-- Top label -->
