<!-- AI.Clip icon_03: 컨베이어벨트 블록 (conveyor belt with text blocks) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0520"/>
  <!-- Belt track -->
  <rect x="160" y="560" width="700" height="60" rx="30" fill="#4A0472"/>
  <!-- Left roller -->
  <circle cx="200" cy="590" r="50" fill="#7B1FA2" stroke="#9C27B0" stroke-width="20"/>
  <!-- Right roller -->
  <circle cx="824" cy="590" r="50" fill="#7B1FA2" stroke="#9C27B0" stroke-width="20"/>
  <!-- Belt surface -->
  <rect x="200" y="550" width="624" height="20" rx="10" fill="#6A1B9A"/>
  <!-- Text blocks on belt -->
  <rect x="220" y="450" width="140" height="100" rx="16" fill="#9C27B0"/>
  <rect x="400" y="450" width="140" height="100" rx="16" fill="#9C27B0"/>
  <rect x="580" y="450" width="140" height="100" rx="16" fill="#CE93D8" opacity="0.8"/>
  <!-- Arrow direction -->
  <polygon points="780,380 840,420 780,460" fill="#CE93D8"/>
  <line x1="720" y1="420" x2="780" y2="420" stroke="#CE93D8" stroke-width="24" stroke-linecap="round"/>
</svg>
