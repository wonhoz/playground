<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_lm05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <filter id="sh_lm05">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000028"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg_lm05)" rx="120"/>

  <!-- Layer 2: Three input file icons (offset/stacked, different colors) -->
  <!-- File 3 (back) - Purple -->
  <rect x="160" y="200" width="220" height="280" rx="20" fill="#7B1FA2" filter="url(#sh_lm05)"/>
  <polygon points="310,200 380,200 380,264 310,264" fill="#9C27B0"/>
  <rect x="310" y="200" width="70" height="64" rx="0" fill="#6A1B9A"/>
  <!-- dog ear fold -->
  <polygon points="310,200 380,270 310,270" fill="#CE93D8" opacity="0.6"/>
  <rect x="186" y="290" width="168" height="16" rx="6" fill="#E1BEE7" opacity="0.8"/>
  <rect x="186" y="320" width="140" height="16" rx="6" fill="#E1BEE7" opacity="0.7"/>
  <rect x="186" y="350" width="158" height="16" rx="6" fill="#E1BEE7" opacity="0.6"/>

  <!-- File 2 (middle) - Teal -->
  <rect x="240" y="250" width="220" height="280" rx="20" fill="#00695C" filter="url(#sh_lm05)"/>
  <polygon points="390,250 460,250 460,314 390,314" fill="#00897B"/>
  <polygon points="390,250 460,320 390,320" fill="#80CBC4" opacity="0.6"/>
  <rect x="266" y="340" width="168" height="16" rx="6" fill="#B2DFDB" opacity="0.8"/>
  <rect x="266" y="370" width="140" height="16" rx="6" fill="#B2DFDB" opacity="0.7"/>
  <rect x="266" y="400" width="158" height="16" rx="6" fill="#B2DFDB" opacity="0.6"/>

  <!-- File 1 (front) - Orange -->
  <rect x="320" y="300" width="220" height="280" rx="20" fill="#E65100" filter="url(#sh_lm05)"/>
  <polygon points="470,300 540,300 540,364 470,364" fill="#F57C00"/>
  <polygon points="470,300 540,370 470,370" fill="#FFCC80" opacity="0.6"/>
  <rect x="346" y="390" width="168" height="16" rx="6" fill="#FFE0B2" opacity="0.8"/>
  <rect x="346" y="420" width="140" height="16" rx="6" fill="#FFE0B2" opacity="0.7"/>
  <rect x="346" y="450" width="158" height="16" rx="6" fill="#FFE0B2" opacity="0.6"/>

  <!-- Layer 3: Orange arrow pointing right to merged file -->
  <polygon points="570,440 680,510 570,580" fill="#F57F17" filter="url(#sh_lm05)"/>
  <rect x="540" y="488" width="140" height="44" rx="10" fill="#F57F17"/>

  <!-- Merged result file (green, right side) -->
  <rect x="710" y="330" width="220" height="300" rx="20" fill="#2E7D32" filter="url(#sh_lm05)"/>
  <polygon points="860,330 930,330 930,394 860,394" fill="#388E3C"/>
  <polygon points="860,330 930,400 860,400" fill="#A5D6A7" opacity="0.7"/>

  <!-- Merge symbol inside result file -->
  <!-- Mini 3 lines converging -->
  <line x1="736" y1="430" x2="820" y2="460" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="820" y1="460" x2="820" y2="600" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="736" y1="520" x2="820" y2="480" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="736" y1="600" x2="820" y2="540" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <rect x="736" y="430" width="148" height="16" rx="5" fill="#C8E6C9" opacity="0.7"/>
  <rect x="736" y="460" width="120" height="16" rx="5" fill="#C8E6C9" opacity="0.6"/>
  <rect x="736" y="490" width="138" height="16" rx="5" fill="#C8E6C9" opacity="0.7"/>
  <rect x="736" y="520" width="110" height="16" rx="5" fill="#C8E6C9" opacity="0.6"/>
  <rect x="736" y="550" width="148" height="16" rx="5" fill="#C8E6C9" opacity="0.7"/>
  <rect x="736" y="580" width="128" height="16" rx="5" fill="#C8E6C9" opacity="0.6"/>
</svg>
