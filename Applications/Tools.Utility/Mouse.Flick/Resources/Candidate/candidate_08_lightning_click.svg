<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A00"/>
      <stop offset="100%" stop-color="#0D0D00"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEE00"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mouse outline -->
  <rect x="186" y="180" width="140" height="200" rx="70" fill="#111100" stroke="#444400" stroke-width="4"/>
  <line x1="256" y1="180" x2="256" y2="270" stroke="#444400" stroke-width="3"/>
  <rect x="240" y="208" width="32" height="50" rx="16" fill="#2A2A00"/>
  <!-- Lightning bolt gesture -->
  <polygon points="320,120 285,240 315,240 260,390 310,255 275,255" fill="url(#bolt)" filter="url(#boltGlow)"/>
  <!-- Secondary bolt (smaller) -->
  <polygon points="380,180 360,270 375,270 345,360 370,278 350,278" fill="#FFDD00" opacity="0.6" filter="url(#boltGlow)"/>
  <!-- Click sparks -->
  <circle cx="256" cy="390" r="15" fill="#FFEE00" opacity="0.8" filter="url(#boltGlow)"/>
  <line x1="256" y1="408" x2="240" y2="430" stroke="#FFEE00" stroke-width="4" stroke-linecap="round" filter="url(#boltGlow)"/>
  <line x1="256" y1="408" x2="272" y2="430" stroke="#FFEE00" stroke-width="4" stroke-linecap="round" filter="url(#boltGlow)"/>
  <line x1="248" y1="407" x2="225" y2="420" stroke="#FF9900" stroke-width="3" stroke-linecap="round" filter="url(#boltGlow)"/>
  <line x1="264" y1="407" x2="287" y2="420" stroke="#FF9900" stroke-width="3" stroke-linecap="round" filter="url(#boltGlow)"/>
  <!-- Flick direction left -->
  <path d="M186,280 Q100,260 70,240" fill="none" stroke="#FFEE00" stroke-width="6" stroke-linecap="round" opacity="0.7" filter="url(#boltGlow)"/>
  <polygon points="70,240 90,224 88,250" fill="#FFEE00" opacity="0.7" filter="url(#boltGlow)"/>
  <!-- Energy rings -->
  <circle cx="256" cy="280" r="80" fill="none" stroke="#FFEE00" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="280" r="110" fill="none" stroke="#FF9900" stroke-width="1" opacity="0.15"/>
</svg>
