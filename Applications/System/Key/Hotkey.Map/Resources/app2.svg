<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1500"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="keyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#332800"/>
      <stop offset="100%" stop-color="#1a1400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard outline gold -->
  <rect x="44" y="196" width="424" height="196" rx="18" fill="#1a1400" stroke="url(#gold)" stroke-width="3"/>
  <!-- Top decorative bar -->
  <rect x="44" y="196" width="424" height="36" rx="18" fill="#221a00"/>
  <rect x="44" y="214" width="424" height="18" fill="#221a00"/>
  <text x="60" y="219" font-family="monospace" font-size="14" fill="#ffd700" opacity="0.7">HOTKEY.MAP</text>
  <text x="360" y="219" font-family="monospace" font-size="13" fill="#b8860b" opacity="0.6">v1.0</text>
  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="60" y="244" width="44" height="36" rx="6" fill="url(#keyGold)" stroke="#ffd700" stroke-width="2"/>
  <text x="72" y="267" font-family="monospace" font-size="13" fill="#ffd700" font-weight="bold">Ctrl</text>
  <rect x="110" y="244" width="44" height="36" rx="6" fill="url(#keyGold)" stroke="#ffd700" stroke-width="2"/>
  <text x="122" y="267" font-family="monospace" font-size="13" fill="#ffd700" font-weight="bold">Alt</text>
  <rect x="160" y="244" width="120" height="36" rx="6" fill="#332800" stroke="#ffd700" stroke-width="2.5"/>
  <text x="198" y="267" font-family="monospace" font-size="13" fill="#ffd700">Shift</text>
  <rect x="286" y="244" width="44" height="36" rx="6" fill="#ffd700" opacity="0.9"/>
  <text x="300" y="267" font-family="monospace" font-size="16" fill="#1a1400" font-weight="bold">F5</text>
  <rect x="336" y="244" width="44" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="350" y="267" font-family="monospace" font-size="16" fill="#b8860b">F6</text>
  <rect x="386" y="244" width="44" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="400" y="267" font-family="monospace" font-size="16" fill="#b8860b">F7</text>
  <!-- Row 2 -->
  <rect x="60" y="286" width="56" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="70" y="309" font-family="monospace" font-size="12" fill="#ffd700">Win</text>
  <rect x="122" y="286" width="36" height="36" rx="6" fill="#ffd700" opacity="0.85"/>
  <text x="134" y="309" font-family="monospace" font-size="16" fill="#1a1400" font-weight="bold">C</text>
  <rect x="164" y="286" width="36" height="36" rx="6" fill="url(#keyGold)" stroke="#ffd700" stroke-width="1.5"/>
  <text x="176" y="309" font-family="monospace" font-size="16" fill="#ffd700">V</text>
  <rect x="206" y="286" width="36" height="36" rx="6" fill="url(#keyGold)" stroke="#ffd700" stroke-width="1.5"/>
  <text x="218" y="309" font-family="monospace" font-size="16" fill="#ffd700">X</text>
  <rect x="248" y="286" width="36" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="260" y="309" font-family="monospace" font-size="16" fill="#b8860b">Z</text>
  <rect x="290" y="286" width="36" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="302" y="309" font-family="monospace" font-size="16" fill="#b8860b">A</text>
  <rect x="332" y="286" width="100" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="360" y="309" font-family="monospace" font-size="13" fill="#b8860b">Enter</text>
  <!-- Row 3 spacebar -->
  <rect x="60" y="328" width="180" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="120" y="351" font-family="monospace" font-size="12" fill="#b8860b">Space</text>
  <rect x="246" y="328" width="60" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="256" y="351" font-family="monospace" font-size="11" fill="#b8860b">PgUp</text>
  <rect x="312" y="328" width="60" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="322" y="351" font-family="monospace" font-size="11" fill="#b8860b">PgDn</text>
  <rect x="378" y="328" width="54" height="36" rx="6" fill="url(#keyGold)" stroke="#b8860b" stroke-width="1.5"/>
  <text x="388" y="351" font-family="monospace" font-size="11" fill="#b8860b">End</text>
  <!-- Shortcut badges above keyboard -->
  <rect x="60" y="148" width="120" height="36" rx="18" fill="#332800" stroke="#ffd700" stroke-width="2"/>
  <text x="72" y="170" font-family="monospace" font-size="14" fill="#ffd700">Ctrl+C</text>
  <rect x="194" y="148" width="124" height="36" rx="18" fill="#332800" stroke="#ffd700" stroke-width="2"/>
  <text x="206" y="170" font-family="monospace" font-size="14" fill="#ffd700">Shift+F5</text>
  <rect x="332" y="148" width="130" height="36" rx="18" fill="#ffd700" opacity="0.9"/>
  <text x="344" y="170" font-family="monospace" font-size="14" fill="#1a1400" font-weight="bold">Win+C</text>
  <!-- Connector dots -->
  <circle cx="122" cy="184" r="5" fill="#ffd700" opacity="0.8"/>
  <line x1="122" y1="184" x2="122" y2="244" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="286" cy="280" r="5" fill="#ffd700" opacity="0.8"/>
  <line x1="256" y1="184" x2="316" y2="244" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="397" cy="184" r="5" fill="#ffd700"/>
  <line x1="397" y1="184" x2="316" y2="244" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
</svg>
