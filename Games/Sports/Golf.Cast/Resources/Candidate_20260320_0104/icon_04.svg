<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 포물선 탄도 궤적: 공 궤도 호 -->
  <!-- ground -->
  <rect x="160" y="780" width="704" height="10" rx="5" fill="#388E3C" opacity="0.5"/>
  <!-- trajectory arc -->
  <path d="M220 760 Q512 180 800 760" fill="none" stroke="#388E3C" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 10" opacity="0.7"/>
  <!-- velocity dots along arc -->
  <circle cx="280" cy="650" r="10" fill="#81C784" opacity="0.5"/>
  <circle cx="360" cy="440" r="12" fill="#81C784" opacity="0.6"/>
  <circle cx="512" cy="290" r="14" fill="#81C784" opacity="0.7"/>
  <circle cx="664" cy="440" r="12" fill="#81C784" opacity="0.6"/>
  <circle cx="744" cy="650" r="10" fill="#81C784" opacity="0.5"/>
  <!-- launch ball (left) -->
  <circle cx="220" cy="762" r="44" fill="#81C784"/>
  <circle cx="206" cy="748" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="230" cy="748" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="212" cy="768" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="232" cy="770" r="6" fill="#388E3C" opacity="0.5"/>
  <!-- landing ball (right, smaller) -->
  <circle cx="800" cy="762" r="32" fill="#81C784" opacity="0.6"/>
  <!-- apex indicator -->
  <line x1="512" y1="200" x2="512" y2="270" stroke="#81C784" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <circle cx="512" cy="190" r="14" fill="#81C784" opacity="0.6"/>
</svg>
