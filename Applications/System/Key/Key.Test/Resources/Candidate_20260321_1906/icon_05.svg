<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8C0"/>
    </linearGradient>
    <linearGradient id="key5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEE8D8"/>
    </linearGradient>
    <filter id="mag_shadow">
      <feDropShadow dx="6" dy="10" stdDeviation="12" flood-color="#B86000" flood-opacity="0.35"/>
    </filter>
    <filter id="lens_shine">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: warm ivory -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Mini keyboard (tilted/perspective) -->
  <!-- Keyboard body -->
  <rect x="100" y="380" width="700" height="360" rx="20" fill="#F0E8D4" stroke="#D4C098" stroke-width="3" filter="url(#mag_shadow)"/>

  <!-- Keyboard rows (simplified, 4 rows of key blocks) -->
  <!-- Row 1 -->
  <g fill="#E8DEC8" stroke="#C8B890" stroke-width="1.5">
    <rect x="124" y="402" width="50" height="44" rx="6"/>
    <rect x="182" y="402" width="44" height="44" rx="6"/>
    <rect x="234" y="402" width="44" height="44" rx="6"/>
    <rect x="286" y="402" width="44" height="44" rx="6"/>
    <rect x="338" y="402" width="44" height="44" rx="6"/>
    <rect x="390" y="402" width="44" height="44" rx="6"/>
    <rect x="442" y="402" width="44" height="44" rx="6"/>
    <rect x="494" y="402" width="44" height="44" rx="6"/>
    <rect x="546" y="402" width="44" height="44" rx="6"/>
    <rect x="598" y="402" width="44" height="44" rx="6"/>
    <rect x="650" y="402" width="44" height="44" rx="6"/>
    <rect x="702" y="402" width="74" height="44" rx="6"/>
  </g>
  <!-- Row 2 -->
  <g fill="#E8DEC8" stroke="#C8B890" stroke-width="1.5">
    <rect x="124" y="454" width="66" height="44" rx="6"/>
    <rect x="198" y="454" width="44" height="44" rx="6"/>
    <rect x="250" y="454" width="44" height="44" rx="6"/>
    <rect x="302" y="454" width="44" height="44" rx="6"/>
    <rect x="354" y="454" width="44" height="44" rx="6"/>
    <rect x="406" y="454" width="44" height="44" rx="6"/>
    <rect x="458" y="454" width="44" height="44" rx="6"/>
    <rect x="510" y="454" width="44" height="44" rx="6"/>
    <rect x="562" y="454" width="44" height="44" rx="6"/>
    <rect x="614" y="454" width="44" height="44" rx="6"/>
    <rect x="666" y="454" width="110" height="44" rx="6"/>
  </g>
  <!-- Row 3 -->
  <g fill="#E8DEC8" stroke="#C8B890" stroke-width="1.5">
    <rect x="124" y="506" width="80" height="44" rx="6"/>
    <rect x="212" y="506" width="44" height="44" rx="6"/>
    <rect x="264" y="506" width="44" height="44" rx="6"/>
    <rect x="316" y="506" width="44" height="44" rx="6"/>
    <rect x="368" y="506" width="44" height="44" rx="6"/>
    <rect x="420" y="506" width="44" height="44" rx="6"/>
    <rect x="472" y="506" width="44" height="44" rx="6"/>
    <rect x="524" y="506" width="44" height="44" rx="6"/>
    <rect x="576" y="506" width="44" height="44" rx="6"/>
    <rect x="628" y="506" width="148" height="44" rx="6"/>
  </g>
  <!-- Row 4: space bar row -->
  <g fill="#E8DEC8" stroke="#C8B890" stroke-width="1.5">
    <rect x="124" y="558" width="70" height="44" rx="6"/>
    <rect x="202" y="558" width="56" height="44" rx="6"/>
    <rect x="266" y="558" width="56" height="44" rx="6"/>
    <rect x="330" y="558" width="272" height="44" rx="6"/>
    <rect x="610" y="558" width="56" height="44" rx="6"/>
    <rect x="674" y="558" width="56" height="44" rx="6"/>
    <rect x="738" y="558" width="38" height="44" rx="6"/>
    <rect x="784" y="558" width="38" height="44" rx="6"/>
  </g>
  <!-- Row 5: bottom -->
  <g fill="#E8DEC8" stroke="#C8B890" stroke-width="1.5">
    <rect x="124" y="610" width="56" height="44" rx="6"/>
    <rect x="188" y="610" width="50" height="44" rx="6"/>
    <rect x="246" y="610" width="50" height="44" rx="6"/>
    <rect x="304" y="610" width="210" height="44" rx="6"/>
    <rect x="522" y="610" width="50" height="44" rx="6"/>
    <rect x="580" y="610" width="50" height="44" rx="6"/>
    <rect x="638" y="610" width="50" height="44" rx="6"/>
    <rect x="696" y="610" width="80" height="44" rx="6"/>
  </g>

  <!-- Magnifying glass -->
  <!-- Glass circle (lens) -->
  <circle cx="680" cy="390" r="200" fill="none" stroke="#D07820" stroke-width="18" filter="url(#mag_shadow)"/>
  <!-- Lens tint (looking at T key area) -->
  <circle cx="680" cy="390" r="196" fill="#FFE090" opacity="0.25"/>
  <!-- Handle -->
  <line x1="828" y1="530" x2="930" y2="660" stroke="#B86010" stroke-width="30" stroke-linecap="round"/>
  <line x1="830" y1="528" x2="932" y2="658" stroke="#D07820" stroke-width="18" stroke-linecap="round"/>

  <!-- Zoomed-in key inside magnifier (the T key highlighted) -->
  <clipPath id="lens_clip">
    <circle cx="680" cy="390" r="190"/>
  </clipPath>
  <g clip-path="url(#lens_clip)">
    <!-- Enlarged T key -->
    <rect x="548" y="302" width="264" height="176" rx="12" fill="#FFF0D0" stroke="#D07820" stroke-width="4"/>
    <text x="680" y="412" text-anchor="middle" font-family="Consolas,monospace" font-size="100" font-weight="bold" fill="#C04000">T</text>
    <!-- Chattering warning inside lens -->
    <text x="680" y="462" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#FF4400">⚠ chatter</text>
    <!-- Lens shine effect -->
    <ellipse cx="620" cy="316" rx="60" ry="35" fill="white" opacity="0.25"/>
  </g>

  <!-- Title -->
  <text x="512" y="838" text-anchor="middle" font-family="Consolas,monospace" font-size="40" font-weight="bold" fill="#8A4010" letter-spacing="3">KEY.TEST</text>
  <text x="512" y="878" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#B07040">Keyboard Diagnostics</text>
</svg>
