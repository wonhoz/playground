<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 픽셀 비교 구분선 -->
    <line x1="512" y1="150" x2="512" y2="874" stroke="#FFFFFF" stroke-width="10" stroke-dasharray="20 12"/>
    <!-- 좌측 "변환 전" 격자 (어두운/거친 픽셀) -->
    <text x="256" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" fill="#1F2937" font-weight="bold">BEFORE</text>
    <!-- 격자 패턴 (불규칙) -->
    <rect x="140" y="250" width="80" height="80" rx="0" fill="#374151"/>
    <rect x="220" y="250" width="80" height="80" rx="0" fill="#1F2937"/>
    <rect x="300" y="250" width="80" height="80" rx="0" fill="#4B5563"/>
    <rect x="380" y="250" width="80" height="80" rx="0" fill="#374151"/>
    <rect x="140" y="330" width="80" height="80" rx="0" fill="#6B7280"/>
    <rect x="220" y="330" width="80" height="80" rx="0" fill="#374151"/>
    <rect x="300" y="330" width="80" height="80" rx="0" fill="#1F2937"/>
    <rect x="380" y="330" width="80" height="80" rx="0" fill="#4B5563"/>
    <rect x="140" y="410" width="80" height="80" rx="0" fill="#1F2937"/>
    <rect x="220" y="410" width="80" height="80" rx="0" fill="#4B5563"/>
    <rect x="300" y="410" width="80" height="80" rx="0" fill="#6B7280"/>
    <rect x="380" y="410" width="80" height="80" rx="0" fill="#1F2937"/>
    <rect x="140" y="490" width="80" height="80" rx="0" fill="#374151"/>
    <rect x="220" y="490" width="80" height="80" rx="0" fill="#1F2937"/>
    <rect x="300" y="490" width="80" height="80" rx="0" fill="#374151"/>
    <rect x="380" y="490" width="80" height="80" rx="0" fill="#6B7280"/>
    <!-- 좌측 포맷 라벨 -->
    <rect x="160" y="600" width="200" height="58" rx="29" fill="#1F2937" opacity="0.7"/>
    <text x="260" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#FDE68A" font-weight="bold">PNG</text>
    <!-- 우측 "변환 후" 격자 (선명/깔끔) -->
    <text x="768" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" fill="#1F2937" font-weight="bold">AFTER</text>
    <!-- 깔끔한 ICO 아이콘 패턴들 -->
    <rect x="540" y="250" width="80" height="80" rx="10" fill="#0EA5E9"/>
    <rect x="628" y="250" width="80" height="80" rx="10" fill="#22D3EE" opacity="0.8"/>
    <rect x="716" y="250" width="80" height="80" rx="10" fill="#0284C7"/>
    <rect x="804" y="250" width="80" height="80" rx="10" fill="#0EA5E9"/>
    <rect x="540" y="338" width="80" height="80" rx="10" fill="#7C3AED"/>
    <rect x="628" y="338" width="80" height="80" rx="10" fill="#0EA5E9"/>
    <rect x="716" y="338" width="80" height="80" rx="10" fill="#059669"/>
    <rect x="804" y="338" width="80" height="80" rx="10" fill="#7C3AED"/>
    <rect x="540" y="426" width="80" height="80" rx="10" fill="#22D3EE"/>
    <rect x="628" y="426" width="80" height="80" rx="10" fill="#059669"/>
    <rect x="716" y="426" width="80" height="80" rx="10" fill="#0EA5E9"/>
    <rect x="804" y="426" width="80" height="80" rx="10" fill="#22D3EE"/>
    <rect x="540" y="514" width="80" height="80" rx="10" fill="#0284C7"/>
    <rect x="628" y="514" width="80" height="80" rx="10" fill="#7C3AED"/>
    <rect x="716" y="514" width="80" height="80" rx="10" fill="#0EA5E9"/>
    <rect x="804" y="514" width="80" height="80" rx="10" fill="#059669"/>
    <!-- 우측 포맷 라벨 -->
    <rect x="664" y="600" width="200" height="58" rx="29" fill="#0F172A" opacity="0.7"/>
    <text x="764" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#FDE68A" font-weight="bold">ICO</text>
    <!-- 하단 중앙 화살표 -->
    <text x="512" y="780" text-anchor="middle" font-family="system-ui, sans-serif" font-size="80" fill="#1F2937">→</text>
    <text x="512" y="860" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#1F2937" font-weight="bold">Pixel Perfect</text>
  </g>
</svg>
