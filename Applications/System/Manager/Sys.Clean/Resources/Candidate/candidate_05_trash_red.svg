<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0505"/>
      <stop offset="100%" stop-color="#4A0C0C"/>
    </linearGradient>
    <linearGradient id="bin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trash bin body -->
  <path d="M170 195 L190 400 Q190 420 210 420 L302 420 Q322 420 322 400 L342 195 Z" fill="url(#bin)"/>
  <!-- Lid -->
  <rect x="152" y="170" width="208" height="28" rx="8" fill="#EF5350"/>
  <!-- Handle -->
  <rect x="225" y="140" width="62" height="32" rx="12" fill="none" stroke="#EF5350" stroke-width="8"/>
  <!-- Vertical lines on bin -->
  <line x1="222" y1="210" x2="215" y2="400" stroke="#FFCDD2" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="210" x2="256" y2="405" stroke="#FFCDD2" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="290" y1="210" x2="297" y2="400" stroke="#FFCDD2" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- X mark on bin -->
  <line x1="225" y1="280" x2="287" y2="335" stroke="#FFCDD2" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="287" y1="280" x2="225" y2="335" stroke="#FFCDD2" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Sparkle clean around bin -->
  <g fill="#FF8A80">
    <circle cx="148" cy="260" r="6" opacity="0.7"/>
    <circle cx="135" cy="290" r="4" opacity="0.5"/>
    <circle cx="365" cy="255" r="6" opacity="0.7"/>
    <circle cx="375" cy="285" r="4" opacity="0.5"/>
    <circle cx="155" cy="320" r="5" opacity="0.6"/>
    <circle cx="360" cy="320" r="5" opacity="0.6"/>
  </g>
</svg>
