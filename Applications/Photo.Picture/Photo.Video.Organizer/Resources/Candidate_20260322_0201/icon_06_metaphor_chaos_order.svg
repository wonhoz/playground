  <rect x="50" y="150" width="350" height="72" rx="10" fill="url(#card-chaos-06)" stroke="#446644" stroke-width="2"
        transform="rotate(-8 225 186)"/>
  <text x="90" y="204" font-family="'Courier New', monospace" font-size="28" fill="#778877" transform="rotate(-8 225 186)">IMG_0001.jpg</text>

  <!-- 파일 카드 2 - 비스듬 반대 -->
  <rect x="80" y="270" width="350" height="72" rx="10" fill="url(#card-chaos-06)" stroke="#446644" stroke-width="2"
        transform="rotate(5 255 306)"/>
  <text x="100" y="320" font-family="'Courier New', monospace" font-size="28" fill="#778877" transform="rotate(5 255 306)">VID_0001.mp4</text>

  <!-- 파일 카드 3 - 더 기울어짐 -->
  <rect x="30" y="390" width="350" height="72" rx="10" fill="url(#card-chaos-06)" stroke="#446644" stroke-width="2"
