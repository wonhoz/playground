<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <radialGradient id="glow08" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- 마법 글로우 -->
  <circle cx="560" cy="440" r="260" fill="url(#glow08)"/>
  <!-- Layer 2: 마법 지팡이 -->
  <line x1="200" y1="820" x2="640" y2="280" stroke="#FFD700" stroke-width="36" stroke-linecap="round"/>
  <!-- 지팡이 끝 별 -->
  <polygon points="640,200 660,270 735,270 675,315 698,388 640,340 582,388 605,315 545,270 620,270" fill="#FFD700"/>
  <!-- Layer 3: 파일 변환 파티클 -->
  <!-- 원래 파일 (왼쪽 아래) -->
  <rect x="140" y="580" width="200" height="160" rx="16" fill="white" opacity="0.85"/>
  <text x="240" y="672" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#9C27B0" text-anchor="middle">PNG</text>
  <!-- 변환된 파일 (오른쪽 위) -->
  <rect x="680" y="380" width="200" height="160" rx="16" fill="#FFF9C4" opacity="0.92"/>
  <text x="780" y="472" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#FF6F00" text-anchor="middle">ICO</text>
  <!-- 마법 별 파티클 -->
  <circle cx="420" cy="370" r="18" fill="#FFD700" opacity="0.9"/>
  <circle cx="370" cy="480" r="12" fill="#FF80AB" opacity="0.85"/>
  <circle cx="530" cy="310" r="14" fill="#80D8FF" opacity="0.9"/>
  <circle cx="680" cy="550" r="10" fill="#CCFF90" opacity="0.8"/>
  <circle cx="750" cy="350" r="16" fill="#FFD700" opacity="0.7"/>
</svg>
