<!-- icon_04 | Metaphor | 기하학 추상 | 방사형 레이저 폭발 — 격자 + 에너지 링 -->
<!-- 색조: 네온 그린 + 다크 차콜 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0A1A0A"/>
      <stop offset="100%" stop-color="#040A04"/>
    </radialGradient>
    <radialGradient id="energy04" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00FF88" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="120" fill="url(#bg04)"/>

  <!-- Grid lines (perspective) -->
  <!-- Horizontal grid lines -->
  <line x1="220" y1="580" x2="804" y2="580" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="250" y1="620" x2="774" y2="620" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="285" y1="660" x2="739" y2="660" stroke="#00FF88" stroke-width="1" opacity="0.10"/>
  <line x1="330" y1="700" x2="694" y2="700" stroke="#00FF88" stroke-width="1" opacity="0.08"/>
  <line x1="390" y1="740" x2="634" y2="740" stroke="#00FF88" stroke-width="1" opacity="0.07"/>
  <line x1="220" y1="540" x2="804" y2="540" stroke="#00FF88" stroke-width="1" opacity="0.18"/>
  <line x1="220" y1="500" x2="804" y2="500" stroke="#00FF88" stroke-width="1" opacity="0.14"/>
  <!-- Vertical grid lines (converging to center) -->
  <line x1="512" y1="400" x2="220" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="512" y1="400" x2="310" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="512" y1="400" x2="400" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="512" y1="400" x2="512" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.14"/>
  <line x1="512" y1="400" x2="624" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="512" y1="400" x2="714" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>
  <line x1="512" y1="400" x2="804" y2="760" stroke="#00FF88" stroke-width="1" opacity="0.12"/>

  <!-- Energy glow center -->
  <circle cx="512" cy="430" r="240" fill="url(#energy04)"/>

  <!-- Explosion rays (8 directions) -->
  <g filter="url(#neonGlow)">
    <!-- Up -->
    <rect x="506" y="210" width="12" height="180" rx="6" fill="#00FF88" opacity="0.95"/>
    <!-- Down -->
    <rect x="506" y="470" width="12" height="150" rx="6" fill="#00FF88" opacity="0.7"/>
    <!-- Left -->
    <rect x="250" y="424" width="220" height="12" rx="6" fill="#00FF88" opacity="0.95"/>
    <!-- Right -->
    <rect x="554" y="424" width="220" height="12" rx="6" fill="#00FF88" opacity="0.95"/>
    <!-- Up-left diagonal -->
    <rect x="310" y="250" width="180" height="10" rx="5" fill="#00FF88" opacity="0.85"
          transform="rotate(45 400 295)"/>
    <!-- Up-right diagonal -->
    <rect x="534" y="250" width="180" height="10" rx="5" fill="#00FF88" opacity="0.85"
          transform="rotate(-45 624 295)"/>
    <!-- Down-left diagonal -->
    <rect x="310" y="466" width="150" height="8" rx="4" fill="#00FF88" opacity="0.65"
          transform="rotate(-45 385 470)"/>
    <!-- Down-right diagonal -->
    <rect x="564" y="466" width="150" height="8" rx="4" fill="#00FF88" opacity="0.65"
          transform="rotate(45 639 470)"/>
  </g>

  <!-- Concentric energy rings -->
  <circle cx="512" cy="430" r="60" fill="none" stroke="#00FF88" stroke-width="3" opacity="0.9" filter="url(#neonGlow)"/>
  <circle cx="512" cy="430" r="110" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.6"/>
  <circle cx="512" cy="430" r="165" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.4"/>
  <circle cx="512" cy="430" r="220" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.25"/>

  <!-- Center core -->
  <circle cx="512" cy="430" r="36" fill="#00FF88" opacity="0.3"/>
  <circle cx="512" cy="430" r="22" fill="#88FFCC" opacity="0.7"/>
  <circle cx="512" cy="430" r="12" fill="#FFFFFF" opacity="0.9"/>

  <!-- Particle dots on rays -->
  <circle cx="512" cy="225" r="7" fill="#00FF88" filter="url(#neonGlow)"/>
  <circle cx="290" cy="430" r="7" fill="#00FF88" filter="url(#neonGlow)"/>
  <circle cx="734" cy="430" r="7" fill="#00FF88" filter="url(#neonGlow)"/>
  <circle cx="340" cy="280" r="6" fill="#00FF88" opacity="0.8"/>
  <circle cx="684" cy="280" r="6" fill="#00FF88" opacity="0.8"/>

  <!-- Score panel -->
  <rect x="312" y="820" width="400" height="54" rx="10" fill="#00FF88" opacity="0.08"/>
  <rect x="312" y="820" width="400" height="54" rx="10" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.4"/>
  <text x="512" y="856" font-family="'Courier New', monospace" font-size="36" font-weight="bold"
        fill="#00FF88" text-anchor="middle" letter-spacing="4" filter="url(#neonGlow)">HI-SCORE: 99900</text>
</svg>
