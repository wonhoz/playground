  <text x="745" y="668" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#FFB0B0" font-weight="700">2024-07-15</text>
  <text x="745" y="700" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#FFB0B0">_vacation.jpg</text>

