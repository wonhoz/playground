<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | {{변수}} 채우기 | 기하학 | #FF6B35 오렌지 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A00"/>
  <!-- Layer 2: Large template text with variable slots -->
  <!-- Template block -->
  <rect x="160" y="240" width="704" height="520" rx="20" fill="#1F0F00"/>
  <rect x="160" y="240" width="704" height="4" rx="2" fill="#FF6B35"/>
  <!-- Text lines -->
  <rect x="200" y="290" width="160" height="18" rx="9" fill="#6B3A1F"/>
  <!-- Variable highlight box 1 -->
  <rect x="372" y="282" width="180" height="34" rx="10" fill="#FF6B35" opacity="0.9"/>
  <text x="462" y="305" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold">{{role}}</text>
  <rect x="564" y="290" width="120" height="18" rx="9" fill="#6B3A1F"/>
  <!-- Line 2 -->
  <rect x="200" y="346" width="240" height="18" rx="9" fill="#6B3A1F"/>
  <!-- Variable 2 -->
  <rect x="452" y="338" width="200" height="34" rx="10" fill="#F59E0B" opacity="0.9"/>
  <text x="552" y="361" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold">{{task}}</text>
  <!-- Line 3 -->
  <rect x="200" y="402" width="180" height="18" rx="9" fill="#6B3A1F"/>
  <rect x="392" y="402" width="260" height="18" rx="9" fill="#6B3A1F"/>
  <!-- Variable 3 (inline) -->
  <rect x="200" y="450" width="130" height="34" rx="10" fill="#10B981" opacity="0.85"/>
  <text x="265" y="473" font-family="Consolas,monospace" font-size="20" fill="white" text-anchor="middle" font-weight="bold">{{lang}}</text>
  <rect x="344" y="458" width="280" height="18" rx="9" fill="#6B3A1F"/>
  <!-- Dots -->
  <rect x="200" y="514" width="120" height="18" rx="9" fill="#6B3A1F" opacity="0.5"/>
  <rect x="200" y="560" width="80" height="18" rx="9" fill="#6B3A1F" opacity="0.3"/>
  <!-- Layer 3: Fill-in cursor blinking -->
  <rect x="390" y="600" width="260" height="52" rx="14" fill="#FF6B35" opacity="0.15" stroke="#FF6B35" stroke-width="2"/>
  <text x="520" y="634" font-family="Consolas,monospace" font-size="22" fill="#FF6B35" text-anchor="middle">값 입력 중...</text>
  <!-- Corner bracket decorations -->
  <path d="M178 258 L178 240 L196 240" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <path d="M846 258 L846 240 L828 240" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <path d="M178 742 L178 760 L196 760" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <path d="M846 742 L846 760 L828 760" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
</svg>
