<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Clipboard + magic wand transform -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#12002A"/>
  <!-- Clipboard -->
  <rect x="240" y="240" width="380" height="500" rx="20" fill="#1E0050" stroke="#9B59B6" stroke-width="22"/>
  <rect x="330" y="210" width="200" height="60" rx="12" fill="#9B59B6"/>
  <!-- Text being transformed (fading) -->
  <rect x="280" y="340" width="200" height="18" rx="9" fill="#9B59B6" opacity="0.8"/>
  <rect x="280" y="380" width="160" height="18" rx="9" fill="#9B59B6" opacity="0.6"/>
  <rect x="280" y="420" width="180" height="18" rx="9" fill="#9B59B6" opacity="0.4"/>
  <!-- Arrow transform -->
  <path d="M640 460 L760 460 M720 420 L760 460 L720 500" fill="none" stroke="#E74C3C" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Result sparkles -->
  <circle cx="800" cy="360" r="12" fill="#F1C40F"/>
  <circle cx="840" cy="420" r="8" fill="#F1C40F" opacity="0.7"/>
  <circle cx="760" cy="520" r="10" fill="#F1C40F" opacity="0.8"/>
  <!-- Magic wand -->
  <line x1="620" y1="600" x2="780" y2="760" stroke="#F1C40F" stroke-width="22" stroke-linecap="round"/>
  <circle cx="612" cy="608" r="24" fill="#F1C40F"/>
  <circle cx="612" cy="608" r="12" fill="#FFF8E1"/>
</svg>
