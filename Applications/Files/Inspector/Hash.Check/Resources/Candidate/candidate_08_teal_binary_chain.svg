  <rect x="360" y="220" width="80" height="72" rx="36" fill="none" stroke="url(#chain)" stroke-width="12"/>
  <!-- Binary text rain behind chain -->
  <text x="82" y="155" fill="#004433" font-size="11" font-family="monospace">01101001</text>
  <text x="172" y="140" fill="#004433" font-size="11" font-family="monospace">11010110</text>
  <text x="262" y="150" fill="#004433" font-size="11" font-family="monospace">00101101</text>
