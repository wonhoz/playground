<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 딥 그린 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1B5E20"/>
  <!-- Layer 2: JSON 트리 구조 텍스트 -->
  <!-- 루트 중괄호 -->
  <text x="120" y="220" font-family="'Consolas', monospace" font-weight="900" font-size="110" fill="#FFD600">{</text>
  <!-- 키-값 노드들 -->
  <rect x="200" y="256" width="20" height="120" rx="4" fill="#66BB6A" opacity="0.7"/>
  <text x="240" y="310" font-family="'Consolas', monospace" font-size="72" fill="#A5D6A7">"name"</text>
  <text x="540" y="310" font-family="'Consolas', monospace" font-size="72" fill="#FFF9C4">: "Text"</text>
  <!-- 중첩 객체 -->
  <text x="240" y="410" font-family="'Consolas', monospace" font-size="72" fill="#80CBC4">"data"</text>
  <text x="480" y="410" font-family="'Consolas', monospace" font-size="72" fill="#FFD600">: {</text>
  <!-- 중첩 키-값 -->
  <rect x="320" y="442" width="20" height="120" rx="4" fill="#FFD600" opacity="0.6"/>
  <text x="360" y="510" font-family="'Consolas', monospace" font-size="68" fill="#EF9A9A">"id"</text>
  <text x="490" y="510" font-family="'Consolas', monospace" font-size="68" fill="#FFCCBC">: 42</text>
  <text x="360" y="596" font-family="'Consolas', monospace" font-size="68" fill="#EF9A9A">"ok"</text>
  <text x="490" y="596" font-family="'Consolas', monospace" font-size="68" fill="#FFCCBC">: true</text>
  <text x="320" y="668" font-family="'Consolas', monospace" font-size="72" fill="#FFD600">}</text>
  <text x="120" y="760" font-family="'Consolas', monospace" font-weight="900" font-size="110" fill="#FFD600">}</text>
  <!-- Layer 3: 트리 연결선 -->
  <line x1="150" y1="230" x2="150" y2="740" stroke="#33691E" stroke-width="8" stroke-dasharray="12,8"/>
</svg>
