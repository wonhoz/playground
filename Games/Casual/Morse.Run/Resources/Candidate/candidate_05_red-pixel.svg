  <rect x="228" y="148" width="56" height="48" rx="4" fill="#FF4444"/>
  <!-- Eyes -->
  <rect x="236" y="160" width="12" height="12" fill="#FFFFFF"/>
  <rect x="264" y="160" width="12" height="12" fill="#FFFFFF"/>
  <rect x="240" y="164" width="6" height="6" fill="#000"/>
  <rect x="268" y="164" width="6" height="6" fill="#000"/>
  <!-- Body -->
  <rect x="220" y="196" width="72" height="52" rx="4" fill="#CC3333"/>
  <!-- Arms -->
  <rect x="172" y="200" width="48" height="20" rx="4" fill="#FF4444"/>
  <rect x="292" y="210" width="48" height="20" rx="4" fill="#FF4444"/>
  <!-- Legs -->
  <rect x="228" y="248" width="24" height="40" rx="4" fill="#FF4444"/>
  <rect x="260" y="248" width="24" height="40" rx="4" fill="#FF4444"/>
  <!-- Morse obstacles -->
  <rect x="80" y="320" width="20" height="20" fill="#FF4444"/>
  <rect x="112" y="320" width="20" height="20" fill="#FF4444"/>
  <rect x="144" y="320" width="48" height="20" fill="#FF4444"/>
  <rect x="204" y="320" width="20" height="20" fill="#FF4444"/>
  <rect x="240" y="320" width="48" height="20" fill="#FF4444"/>
  <rect x="300" y="320" width="20" height="20" fill="#FF4444"/>
  <rect x="332" y="320" width="48" height="20" fill="#FF4444"/>
  <!-- Ground -->
  <rect x="60" y="356" width="392" height="12" fill="#FF4444" opacity="0.4"/>
  <!-- Score HUD -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="16" fill="#FF4444">· − · − −</text>
  <text x="256" y="455" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#FF4444">MORSE RUN</text>
</svg>