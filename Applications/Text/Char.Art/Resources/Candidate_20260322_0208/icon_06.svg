<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06 | Metaphor | 공간·장면 | 터미널/모니터 화면에 ASCII 얼굴 아트가 출력되는 장면 -->
  <!-- 색조: 청록색 터미널 + 밝은 그린 텍스트 (고전 CRT 터미널 감성) -->

  <!-- 배경 -->
