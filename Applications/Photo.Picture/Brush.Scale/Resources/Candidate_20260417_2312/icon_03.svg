<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 작은 이미지 (왼쪽 — 흐릿) -->
  <rect x="90" y="360" width="280" height="210" rx="16" fill="white" opacity="0.7"/>
  <rect x="106" y="376" width="248" height="164" rx="8" fill="#B0BEC5"/>
  <!-- 산 형태 — 흐릿 -->
  <polygon points="106,520 200,420 248,460 290,400 354,520" fill="#78909C" opacity="0.5"/>
  <circle cx="142" cy="410" r="20" fill="#CFD8DC" opacity="0.6"/>
  <!-- 흐릿 효과 레이블 -->
  <text x="230" y="596" font-family="Arial, sans-serif" font-size="44" fill="white" text-anchor="middle" opacity="0.8">Low</text>
  <!-- 화살표 (가운데) -->
  <polygon points="400,465 536,512 400,558" fill="white" opacity="0.9"/>
  <!-- 큰 이미지 (오른쪽 — 선명) -->
  <rect x="564" y="260" width="370" height="280" rx="20" fill="white" opacity="0.95"/>
  <rect x="582" y="278" width="334" height="222" rx="10" fill="#E3F2FD"/>
  <!-- 산 형태 — 선명 -->
  <polygon points="582,480 700,350 772,400 840,320 916,480" fill="#1565C0"/>
  <circle cx="636" cy="330" r="32" fill="#FFF176"/>
  <!-- 선명 레이블 -->
  <text x="749" y="575" font-family="Arial, sans-serif" font-size="44" fill="white" text-anchor="middle" font-weight="700">HD</text>
  <!-- Layer 3: 배율 배지 -->
  <circle cx="750" cy="278" r="60" fill="#FF6F00"/>
  <text x="750" y="298" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">4x</text>
</svg>
