<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Headphone arc -->
  <path d="M 120,256 A 136,136 0 0,1 392,256" fill="none" stroke="url(#phone)" stroke-width="24" stroke-linecap="round"/>
  <!-- Left cup -->
  <rect x="88" y="240" width="56" height="96" rx="28" fill="url(#phone)"/>
  <!-- Right cup -->
  <rect x="368" y="240" width="56" height="96" rx="28" fill="url(#phone)"/>
  <!-- Tag on cord -->
  <line x1="256" y1="120" x2="256" y2="300" stroke="#80CBC4" stroke-width="6" opacity="0.6"/>
  <path d="M 196,300 L 296,300 L 318,336 L 296,372 L 196,372 Z" fill="#26A69A" opacity="0.9"/>
  <circle cx="214" cy="336" r="12" fill="#004D40"/>
  <rect x="232" y="328" width="64" height="8" rx="4" fill="#E0F2F1" opacity="0.9"/>
  <rect x="232" y="340" width="48" height="7" rx="3" fill="#B2DFDB" opacity="0.7"/>
  <!-- Music note small -->
  <g fill="#E0F2F1" opacity="0.8">
    <rect x="160" y="264" width="10" height="44" rx="2"/>
    <ellipse cx="154" cy="310" rx="14" ry="10" transform="rotate(-10 154 310)"/>
    <rect x="170" y="264" width="10" height="34" rx="2"/>
    <ellipse cx="164" cy="300" rx="14" ry="10" transform="rotate(-10 164 300)"/>
    <rect x="160" y="264" width="20" height="8" rx="2"/>
  </g>
</svg>
