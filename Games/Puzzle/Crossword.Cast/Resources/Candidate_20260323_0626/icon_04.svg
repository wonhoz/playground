<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 마지막 칸 완성 — 퍼즐 완성 순간 | 공간/장면 | #101A00 -->
  <defs>
    <filter id="completeGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#101A00"/>
  <!-- Layer 2: Crossword grid (mostly complete) -->
  <!-- 5x5 grid -->
  <!-- Row 1 -->
  <rect x="212" y="280" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="262" y="342" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">가</text>
  <rect x="314" y="280" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="364" y="342" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">나</text>
  <rect x="416" y="280" width="100" height="100" rx="6" fill="#000000"/>
  <rect x="518" y="280" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="568" y="342" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">라</text>
  <rect x="620" y="280" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="670" y="342" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">마</text>
  <!-- Row 2 -->
  <rect x="212" y="382" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="262" y="444" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">바</text>
  <rect x="314" y="382" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="364" y="444" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">사</text>
  <rect x="416" y="382" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="466" y="444" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">아</text>
  <rect x="518" y="382" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="568" y="444" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">자</text>
  <rect x="620" y="382" width="100" height="100" rx="6" fill="#000000"/>
  <!-- Row 3 - last cell to fill (star cell) -->
  <rect x="212" y="484" width="100" height="100" rx="6" fill="#000000"/>
  <rect x="314" y="484" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="364" y="546" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">카</text>
  <rect x="416" y="484" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="466" y="546" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">타</text>
  <!-- LAST CELL - being filled with glow -->
  <rect x="518" y="484" width="100" height="100" rx="6" fill="#1E3A00" stroke="#FCD34D" stroke-width="5" filter="url(#completeGlow)"/>
  <text x="568" y="546" font-family="Arial,sans-serif" font-size="48" fill="#FCD34D" text-anchor="middle" font-weight="bold" filter="url(#completeGlow)">파</text>
  <rect x="620" y="484" width="100" height="100" rx="6" fill="#1A2E00" stroke="#4ADE80" stroke-width="2"/>
  <text x="670" y="546" font-family="Arial,sans-serif" font-size="48" fill="#86EFAC" text-anchor="middle" font-weight="bold">하</text>
  <!-- Layer 3: Completion confetti burst -->
  <circle cx="568" cy="534" r="80" fill="none" stroke="#FCD34D" stroke-width="3" opacity="0.3" filter="url(#completeGlow)"/>
  <text x="512" y="750" font-family="Arial,sans-serif" font-size="36" fill="#FCD34D" text-anchor="middle" font-weight="bold" filter="url(#completeGlow)">퍼즐 완성!</text>
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="22" fill="#86EFAC" text-anchor="middle">🎉</text>
</svg>
