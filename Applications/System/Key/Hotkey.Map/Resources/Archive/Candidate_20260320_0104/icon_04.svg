  <circle cx="300" cy="380" r="14" fill="#BCAAA4"/>
  <circle cx="720" cy="360" r="16" fill="#BCAAA4"/>
  <circle cx="220" cy="600" r="12" fill="#BCAAA4" opacity="0.7"/>
  <circle cx="800" cy="560" r="14" fill="#BCAAA4" opacity="0.7"/>
  <circle cx="400" cy="760" r="16" fill="#BCAAA4"/>
