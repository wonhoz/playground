<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 토양색 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="40%" stop-color="#DCEDC8"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 지층 단면 (파일 계층) -->
  <!-- 최상위 지층: 폴더 (파랑) -->
  <rect x="80" y="180" width="864" height="130" rx="12" fill="#1565C0"/>
  <text x="512" y="263" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="white" text-anchor="middle">📁 C:\Users\  256 GB</text>
  <!-- 2층: 하위 폴더 (오렌지) -->
  <rect x="80" y="326" width="864" height="120" rx="12" fill="#FF6F00"/>
  <text x="512" y="404" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="68" fill="white" text-anchor="middle">📁 Videos\  128 GB</text>
  <!-- 3층: 서브 폴더 (초록) -->
  <rect x="80" y="462" width="864" height="110" rx="12" fill="#388E3C"/>
  <text x="512" y="534" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="64" fill="white" text-anchor="middle">📁 2025\  64 GB</text>
  <!-- 4층: 파일들 (노랑) -->
  <rect x="80" y="588" width="864" height="96" rx="12" fill="#F9A825"/>
  <text x="512" y="654" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="60" fill="white" text-anchor="middle">🎬 movie.mp4   32 GB</text>
  <!-- 5층: 파일 (연주황) -->
  <rect x="80" y="700" width="864" height="80" rx="12" fill="#FFB74D"/>
  <text x="512" y="755" font-family="'Segoe UI', sans-serif" font-size="56" fill="white" text-anchor="middle">🎬 clip.mp4   18 GB</text>
  <!-- Layer 3: 렌즈 오버레이 효과 -->
  <circle cx="800" cy="200" r="140" fill="none" stroke="#0097A7" stroke-width="20" opacity="0.7"/>
  <line x1="896" y1="296" x2="960" y2="360" stroke="#0097A7" stroke-width="28" stroke-linecap="round" opacity="0.7"/>
  <text x="512" y="880" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#006064" text-anchor="middle">Disk.Lens</text>
</svg>
