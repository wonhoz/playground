<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Library/stack of prompts -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0F172A"/>
  <!-- Stack of cards/prompts (bottom) -->
  <rect x="220" y="640" width="540" height="80" rx="16" fill="#1E3A5F" stroke="#3B82F6" stroke-width="14"/>
  <rect x="240" y="570" width="500" height="80" rx="16" fill="#1E3A5F" stroke="#3B82F6" stroke-width="18"/>
  <!-- Top card (active) -->
  <rect x="260" y="340" width="460" height="240" rx="20" fill="#1E3A8A" stroke="#60A5FA" stroke-width="22"/>
  <!-- Prompt text symbol -->
  <text x="310" y="410" font-family="monospace" font-size="48" fill="#93C5FD" opacity="0.9">&gt;_</text>
  <rect x="310" y="440" width="280" height="16" rx="8" fill="#60A5FA" opacity="0.7"/>
  <rect x="310" y="472" width="220" height="16" rx="8" fill="#60A5FA" opacity="0.5"/>
  <rect x="310" y="504" width="250" height="16" rx="8" fill="#60A5FA" opacity="0.5"/>
  <!-- Search / hotkey icon -->
  <circle cx="680" cy="260" r="60" fill="none" stroke="#F59E0B" stroke-width="22"/>
  <line x1="726" y1="306" x2="770" y2="350" stroke="#F59E0B" stroke-width="22" stroke-linecap="round"/>
</svg>
