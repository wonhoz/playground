<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Neural network auto-labeling audio nodes -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030C18"/>
  <!-- Input nodes (left column) — audio files -->
  <circle cx="200" cy="300" r="48" fill="#0D2B4A" stroke="#1976D2" stroke-width="18"/>
  <circle cx="200" cy="512" r="48" fill="#0D2B4A" stroke="#1976D2" stroke-width="18"/>
  <circle cx="200" cy="724" r="48" fill="#0D2B4A" stroke="#1976D2" stroke-width="18"/>
  <!-- Mini note icons in input nodes -->
  <rect x="190" y="274" width="12" height="40" rx="4" fill="#1976D2"/>
  <ellipse cx="186" cy="314" rx="18" ry="12" fill="#1976D2" transform="rotate(-10,186,314)"/>
  <rect x="190" y="486" width="12" height="40" rx="4" fill="#1976D2"/>
  <ellipse cx="186" cy="526" rx="18" ry="12" fill="#1976D2" transform="rotate(-10,186,526)"/>
  <rect x="190" y="698" width="12" height="40" rx="4" fill="#1976D2"/>
  <ellipse cx="186" cy="738" rx="18" ry="12" fill="#1976D2" transform="rotate(-10,186,738)"/>
  <!-- Hidden layer (middle column) -->
  <circle cx="512" cy="220" r="40" fill="#0D2B4A" stroke="#5C6BC0" stroke-width="14"/>
  <circle cx="512" cy="400" r="40" fill="#0D2B4A" stroke="#5C6BC0" stroke-width="14"/>
  <circle cx="512" cy="580" r="40" fill="#0D2B4A" stroke="#5C6BC0" stroke-width="14"/>
  <circle cx="512" cy="760" r="40" fill="#0D2B4A" stroke="#5C6BC0" stroke-width="14"/>
  <!-- Output nodes (right column) — tags -->
  <rect x="756" y="340" width="100" height="50" rx="25" fill="#1A237E" stroke="#42A5F5" stroke-width="16"/>
  <rect x="756" y="490" width="100" height="50" rx="25" fill="#1A237E" stroke="#42A5F5" stroke-width="16"/>
  <rect x="756" y="640" width="100" height="50" rx="25" fill="#1A237E" stroke="#42A5F5" stroke-width="16"/>
  <!-- Label dots in output nodes -->
  <rect x="778" y="354" width="56" height="22" rx="11" fill="#42A5F5" opacity="0.7"/>
  <rect x="778" y="504" width="56" height="22" rx="11" fill="#42A5F5" opacity="0.7"/>
  <rect x="778" y="654" width="56" height="22" rx="11" fill="#42A5F5" opacity="0.7"/>
  <!-- Connections -->
  <line x1="248" y1="300" x2="472" y2="220" stroke="#1976D2" stroke-width="7" opacity="0.4"/>
  <line x1="248" y1="300" x2="472" y2="400" stroke="#1976D2" stroke-width="7" opacity="0.4"/>
  <line x1="248" y1="512" x2="472" y2="400" stroke="#1976D2" stroke-width="7" opacity="0.5"/>
  <line x1="248" y1="512" x2="472" y2="580" stroke="#1976D2" stroke-width="7" opacity="0.5"/>
  <line x1="248" y1="724" x2="472" y2="580" stroke="#1976D2" stroke-width="7" opacity="0.4"/>
  <line x1="248" y1="724" x2="472" y2="760" stroke="#1976D2" stroke-width="7" opacity="0.4"/>
  <line x1="552" y1="220" x2="756" y2="365" stroke="#5C6BC0" stroke-width="7" opacity="0.5"/>
  <line x1="552" y1="400" x2="756" y2="365" stroke="#5C6BC0" stroke-width="7" opacity="0.5"/>
  <line x1="552" y1="400" x2="756" y2="515" stroke="#5C6BC0" stroke-width="9" opacity="0.7"/>
  <line x1="552" y1="580" x2="756" y2="515" stroke="#5C6BC0" stroke-width="7" opacity="0.5"/>
  <line x1="552" y1="580" x2="756" y2="665" stroke="#5C6BC0" stroke-width="7" opacity="0.5"/>
  <line x1="552" y1="760" x2="756" y2="665" stroke="#5C6BC0" stroke-width="7" opacity="0.4"/>
</svg>
