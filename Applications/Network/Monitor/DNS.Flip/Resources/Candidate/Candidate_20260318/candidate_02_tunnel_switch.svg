<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="tunnel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 터널 입구 -->
  <ellipse cx="130" cy="256" rx="55" ry="90" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="130" cy="256" rx="35" ry="65" fill="#0EA5E9" opacity="0.1"/>
  <!-- 터널 출구 -->
  <ellipse cx="382" cy="256" rx="55" ry="90" fill="none" stroke="#38BDF8" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="382" cy="256" rx="35" ry="65" fill="#38BDF8" opacity="0.08"/>
  <!-- 터널 경로 -->
  <path d="M 130 166 Q 256 120 382 166" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
  <path d="M 130 346 Q 256 392 382 346" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
  <!-- 데이터 패킷들 -->
  <circle cx="200" cy="256" r="8" fill="#0EA5E9" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="248" r="6" fill="#38BDF8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="312" cy="256" r="8" fill="#0EA5E9" opacity="0.9" filter="url(#glow)"/>
  <!-- 전환 화살표 -->
  <path d="M 180 210 L 330 210 M 322 200 L 330 210 L 322 220" stroke="#0EA5E9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M 330 302 L 180 302 M 188 292 L 180 302 L 188 312" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- DNS 레이블 -->
  <text x="256" y="390" text-anchor="middle" fill="#0EA5E9" font-size="14" font-family="monospace" opacity="0.8">SWITCH</text>
  <!-- 빛 포인트 -->
  <circle cx="130" cy="256" r="6" fill="#0EA5E9" opacity="0.8" filter="url(#glow)"/>
  <circle cx="382" cy="256" r="6" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
</svg>