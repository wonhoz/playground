  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg02)"/>

  <!-- 문서 외곽 (로그 파일 시트) -->
  <rect x="170" y="130" width="684" height="764" rx="28" fill="#1E1830" stroke="#3A3060" stroke-width="6"/>

  <!-- 상단 도구모음 바 -->
  <rect x="170" y="130" width="684" height="72" rx="28" fill="#2A2048"/>
  <rect x="170" y="178" width="684" height="24" fill="#2A2048"/>
  <!-- 상단 바 컨트롤 도트 -->
  <circle cx="222" cy="166" r="16" fill="#FF5F57"/>
  <circle cx="270" cy="166" r="16" fill="#FFBD2E"/>
  <circle cx="318" cy="166" r="16" fill="#28CA41"/>
  <!-- 탭 타이틀 -->
  <rect x="360" y="148" width="220" height="36" rx="8" fill="#352C5A"/>
  <rect x="364" y="152" width="212" height="28" rx="6" fill="#251E45"/>

