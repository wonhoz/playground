<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 브러시+터미널: paintbrush over terminal window -->
  <!-- Terminal window (rotated/angled) -->
  <rect x="220" y="360" width="500" height="380" rx="18" fill="#4A148C" opacity="0.4" transform="rotate(-5 470 550)"/>
  <rect x="220" y="360" width="500" height="48" rx="14" fill="#4A148C" transform="rotate(-5 470 384)"/>
  <!-- Terminal text rows -->
  <rect x="248" y="444" width="180" height="20" rx="4" fill="#CE93D8" opacity="0.7" transform="rotate(-5 338 454)"/>
  <rect x="248" y="480" width="220" height="20" rx="4" fill="#4A148C" transform="rotate(-5 358 490)"/>
  <rect x="248" y="516" width="160" height="20" rx="4" fill="#CE93D8" opacity="0.5" transform="rotate(-5 328 526)"/>
  <rect x="248" y="552" width="200" height="20" rx="4" fill="#CE93D8" opacity="0.8" transform="rotate(-5 348 562)"/>
  <!-- Paintbrush (large, diagonal) -->
  <line x1="700" y1="200" x2="360" y2="700" stroke="#CE93D8" stroke-width="20" stroke-linecap="round"/>
  <!-- Brush head -->
  <ellipse cx="380" cy="680" rx="50" ry="30" fill="#CE93D8" transform="rotate(-45 380 680)"/>
  <ellipse cx="390" cy="692" rx="34" ry="20" fill="#CE93D8" opacity="0.5" transform="rotate(-45 390 692)"/>
  <!-- Brush handle end -->
  <circle cx="706" cy="200" r="24" fill="#4A148C" stroke="#CE93D8" stroke-width="6"/>
  <!-- Paint drips from brush -->
  <circle cx="420" cy="740" r="12" fill="#CE93D8" opacity="0.6"/>
  <circle cx="400" cy="768" r="8" fill="#CE93D8" opacity="0.4"/>
  <circle cx="440" cy="756" r="6" fill="#CE93D8" opacity="0.3"/>
</svg>