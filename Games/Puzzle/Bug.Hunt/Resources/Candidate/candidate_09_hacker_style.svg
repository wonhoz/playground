<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D00"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Skull on green circuit -->
  <!-- Circuit traces -->
  <line x1="80" y1="256" x2="180" y2="256" stroke="#004400" stroke-width="3"/>
  <line x1="332" y1="256" x2="432" y2="256" stroke="#004400" stroke-width="3"/>
  <line x1="256" y1="80" x2="256" y2="160" stroke="#004400" stroke-width="3"/>
  <line x1="256" y1="352" x2="256" y2="432" stroke="#004400" stroke-width="3"/>
  <!-- Pads -->
  <circle cx="80" cy="256" r="8" fill="#00AA00"/>
  <circle cx="432" cy="256" r="8" fill="#00AA00"/>
  <circle cx="256" cy="80" r="8" fill="#00AA00"/>
  <circle cx="256" cy="432" r="8" fill="#00AA00"/>
  <!-- Bug skull center -->
  <ellipse cx="256" cy="245" rx="72" ry="82" fill="#001A00" stroke="#00FF41" stroke-width="3"/>
  <!-- Skull face -->
  <ellipse cx="256" cy="230" rx="52" ry="58" fill="#003300"/>
  <!-- Eyes (bug eyes = big) -->
  <circle cx="236" cy="215" r="18" fill="#00FF41" opacity="0.3"/>
  <circle cx="276" cy="215" r="18" fill="#00FF41" opacity="0.3"/>
  <circle cx="236" cy="215" r="10" fill="#00FF41"/>
  <circle cx="276" cy="215" r="10" fill="#00FF41"/>
  <!-- Nose -->
  <ellipse cx="256" cy="240" rx="8" ry="5" fill="#001A00"/>
  <!-- Grinning teeth (code brackets) -->
  <text x="256" y="268" font-family="monospace" font-size="20" fill="#00FF41" text-anchor="middle">{  }</text>
  <!-- Antennae -->
  <line x1="236" y1="172" x2="220" y2="145" stroke="#00FF41" stroke-width="2.5"/>
  <line x1="276" y1="172" x2="292" y2="145" stroke="#00FF41" stroke-width="2.5"/>
  <circle cx="220" cy="143" r="5" fill="#00FF41"/>
  <circle cx="292" cy="143" r="5" fill="#00FF41"/>
  <!-- Legs -->
  <line x1="186" y1="260" x2="150" y2="245" stroke="#00CC33" stroke-width="2.5"/>
  <line x1="184" y1="275" x2="145" y2="275" stroke="#00CC33" stroke-width="2.5"/>
  <line x1="186" y1="290" x2="150" y2="305" stroke="#00CC33" stroke-width="2.5"/>
  <line x1="326" y1="260" x2="362" y2="245" stroke="#00CC33" stroke-width="2.5"/>
  <line x1="328" y1="275" x2="367" y2="275" stroke="#00CC33" stroke-width="2.5"/>
  <line x1="326" y1="290" x2="362" y2="305" stroke="#00CC33" stroke-width="2.5"/>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#00FF41" text-anchor="middle">Bug.Hunt</text>
</svg>
