<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#27272A"/>
    </linearGradient>
    <linearGradient id="block1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="block2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="block3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="block4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="block5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="block6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Treemap blocks with gaps -->
  <!-- Row 1: large block + medium -->
  <rect x="60" y="70" width="230" height="190" rx="6" fill="url(#block1)"/>
  <text x="175" y="155" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">System</text>
  <text x="175" y="173" font-family="sans-serif" font-size="12" fill="#DDD6FE" text-anchor="middle">186 GB</text>
  <rect x="298" y="70" width="154" height="90" rx="6" fill="url(#block2)"/>
  <text x="375" y="112" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Apps</text>
  <text x="375" y="128" font-family="sans-serif" font-size="11" fill="#A5F3FC" text-anchor="middle">102 GB</text>
  <rect x="298" y="168" width="154" height="92" rx="6" fill="url(#block3)"/>
  <text x="375" y="210" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Media</text>
  <text x="375" y="226" font-family="sans-serif" font-size="11" fill="#BBF7D0" text-anchor="middle">78 GB</text>
  <!-- Row 2 -->
  <rect x="60" y="268" width="120" height="80" rx="6" fill="url(#block4)"/>
  <text x="120" y="302" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Games</text>
  <text x="120" y="318" font-family="sans-serif" font-size="10" fill="#FCA5A5" text-anchor="middle">55 GB</text>
  <rect x="188" y="268" width="100" height="80" rx="6" fill="url(#block5)"/>
  <text x="238" y="302" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Docs</text>
  <text x="238" y="318" font-family="sans-serif" font-size="10" fill="#FDE68A" text-anchor="middle">32 GB</text>
  <rect x="296" y="268" width="156" height="80" rx="6" fill="url(#block6)"/>
  <text x="374" y="302" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Other</text>
  <text x="374" y="318" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">59 GB</text>
  <!-- Row 3: free space bar -->
  <rect x="60" y="356" width="392" height="50" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="64" y="360" width="240" height="42" rx="6" fill="#334155"/>
  <text x="184" y="385" font-family="sans-serif" font-size="13" fill="#E2E8F0" text-anchor="middle">Used: 512 GB</text>
  <rect x="308" y="360" width="140" height="42" rx="6" fill="#0F2027" opacity="0.8"/>
  <text x="378" y="385" font-family="sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Free: 488 GB</text>
  <!-- Disk icon top label -->
  <text x="256" y="438" font-family="sans-serif" font-size="15" fill="#7B7F8A" text-anchor="middle">Treemap View — C:\</text>
</svg>
