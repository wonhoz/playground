<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="toggleOn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5a0"/>
      <stop offset="100%" style="stop-color:#00d9f5"/>
    </linearGradient>
    <linearGradient id="toggleOff" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e96c4c"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
    <linearGradient id="knobGrad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- UP toggle (activated) -->
  <rect x="100" y="110" width="200" height="90" rx="45" fill="url(#toggleOn)" filter="url(#glow)"/>
  <circle cx="262" cy="155" r="38" fill="url(#knobGrad)" filter="url(#glow)"/>
  <!-- Up arrow above toggle -->
  <polygon points="200,85 180,105 192,105 192,95 208,95 208,105 220,105" fill="#00f5a0" filter="url(#glow)"/>
  <polygon points="256,65 236,85 248,85 248,75 264,75 264,85 276,85" fill="#00d9f5" filter="url(#glow)"/>
  <!-- DOWN toggle (deactivated) -->
  <rect x="212" y="312" width="200" height="90" rx="45" fill="url(#toggleOff)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="250" cy="357" r="38" fill="url(#knobGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Down arrow below toggle -->
  <polygon points="312,427 292,407 304,407 304,417 320,417 320,407 332,407" fill="#e96c4c" filter="url(#glow)" opacity="0.8"/>
  <!-- Divider -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#ffffff20" stroke-width="2" stroke-dasharray="8,8"/>
  <!-- Circuit lines connecting -->
  <path d="M300,155 Q380,155 380,256 Q380,357 312,357" stroke="#ffffff30" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="2.5" fill="#ffffff60"/>
  <circle cx="440" cy="90" r="2" fill="#ffffff50"/>
  <circle cx="70" cy="440" r="2" fill="#ffffff50"/>
  <circle cx="440" cy="420" r="2.5" fill="#ffffff60"/>
</svg>
