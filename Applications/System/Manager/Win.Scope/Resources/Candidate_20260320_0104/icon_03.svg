<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- X-ray 테두리 프레임 -->
  <rect x="200" y="220" width="624" height="520" rx="24" fill="#0D47A1" stroke="#42A5F5" stroke-width="16"/>
  <rect x="230" y="255" width="564" height="450" rx="16" fill="#050A0F" stroke="#42A5F5" stroke-width="8"/>
  <!-- 창 레이어들 (투시됨) -->
  <!-- 맨 아래 창 -->
  <rect x="260" y="290" width="280" height="200" rx="10" fill="#0D47A1" opacity="0.4" stroke="#42A5F5" stroke-width="6"/>
  <line x1="260" y1="320" x2="540" y2="320" stroke="#42A5F5" stroke-width="5" opacity="0.5"/>
  <!-- 중간 창 -->
  <rect x="330" y="360" width="280" height="200" rx="10" fill="#0D47A1" opacity="0.6" stroke="#42A5F5" stroke-width="7"/>
  <line x1="330" y1="390" x2="610" y2="390" stroke="#42A5F5" stroke-width="5" opacity="0.6"/>
  <!-- 앞쪽 창 -->
  <rect x="400" y="430" width="280" height="200" rx="10" fill="#0D47A1" stroke="#42A5F5" stroke-width="10"/>
  <line x1="400" y1="462" x2="680" y2="462" stroke="#42A5F5" stroke-width="7"/>
  <!-- 타이틀바 버튼들 -->
  <circle cx="418" cy="447" r="8" fill="#42A5F5"/>
  <circle cx="440" cy="447" r="8" fill="#42A5F5" opacity="0.7"/>
  <!-- X-ray 스캔 라인 -->
  <line x1="230" y1="512" x2="794" y2="512" stroke="#42A5F5" stroke-width="4" opacity="0.4" stroke-dasharray="20 8"/>
  <!-- 정보 패널 (아래) -->
  <rect x="260" y="650" width="500" height="36" rx="10" fill="#0D47A1" stroke="#42A5F5" stroke-width="6"/>
  <rect x="275" y="662" width="180" height="12" rx="4" fill="#42A5F5" opacity="0.7"/>
  <rect x="475" y="662" width="80" height="12" rx="4" fill="#42A5F5" opacity="0.5"/>
</svg>
