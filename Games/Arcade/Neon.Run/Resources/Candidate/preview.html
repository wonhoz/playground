<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neon.Run - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { color: #e0e0e0; text-align: center; margin-bottom: 8px; font-size: 24px; letter-spacing: 2px; }
  p.sub { color: #888; text-align: center; margin-bottom: 32px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
  .card:hover { transform: scale(1.07); border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
  .card img { width: 160px; height: 160px; border-radius: 8px; }
  .card span { color: #aaa; font-size: 11px; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>Neon.Run</h1>
<p class="sub">Neon Runner Arcade Game — Icon Candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_neon_runner_glow.svg"><span>01. Neon Runner Glow</span></div>
  <div class="card"><img src="candidate_02_neon_track_run.svg"><span>02. Neon Track Run</span></div>
  <div class="card"><img src="candidate_03_cyberpunk_runner.svg"><span>03. Cyberpunk Runner</span></div>
  <div class="card"><img src="candidate_04_neon_light_dash.svg"><span>04. Neon Light Dash</span></div>
  <div class="card"><img src="candidate_05_electric_run_art.svg"><span>05. Electric Run Art</span></div>
  <div class="card"><img src="candidate_06_neon_wire_runner.svg"><span>06. Neon Wire Runner</span></div>
  <div class="card"><img src="candidate_07_glowing_path_run.svg"><span>07. Glowing Path Run</span></div>
  <div class="card"><img src="candidate_08_neon_obstacle_runner.svg"><span>08. Neon Obstacle Runner</span></div>
  <div class="card"><img src="candidate_09_circuit_run_neon.svg"><span>09. Circuit Run Neon</span></div>
  <div class="card"><img src="candidate_10_neon_sprint_art.svg"><span>10. Neon Sprint Art</span></div>
</div>
</body>
</html>
