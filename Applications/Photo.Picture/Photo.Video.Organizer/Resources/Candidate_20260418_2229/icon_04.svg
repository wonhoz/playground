<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background coral gradient -->
  <defs>
    <radialGradient id="bg04" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: Scattered photos being pulled into calendar vortex -->
  <!-- Central calendar/target -->
  <rect x="340" y="340" width="344" height="344" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <rect x="340" y="340" width="344" height="72" rx="24" fill="#BF360C"/>
  <text x="512" y="392" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">2026 / 04</text>
  <!-- Calendar date grid -->
  <text x="390" y="465" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">7</text>
  <text x="460" y="465" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">8</text>
  <text x="530" y="465" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">9</text>
  <text x="600" y="465" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">10</text>
  <text x="390" y="530" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">14</text>
  <text x="460" y="530" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">15</text>
  <circle cx="530" cy="513" r="22" fill="#FF5252"/>
  <text x="530" y="528" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">16</text>
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="36" fill="#BF360C" text-anchor="middle">17</text>
  <!-- Scattered photo tiles flying toward center -->
  <rect x="80" y="100" width="160" height="130" rx="12" fill="#FF8A65" opacity="0.9" transform="rotate(-20 160 165)"/>
  <circle cx="120" cy="140" r="26" fill="#FFCA28" opacity="0.7"/>
  <path d="M200 160 Q280 250 360 360" stroke="#FFCCBC" stroke-width="14" stroke-linecap="round" stroke-dasharray="14 10" fill="none" opacity="0.6"/>
  <rect x="720" y="80" width="160" height="130" rx="12" fill="#FFCC02" opacity="0.9" transform="rotate(15 800 145)"/>
  <polygon points="800 100 760 180 840 180" fill="#FFFFFF" opacity="0.7"/>
  <path d="M720 160 Q650 250 640 350" stroke="#FFCCBC" stroke-width="14" stroke-linecap="round" stroke-dasharray="14 10" fill="none" opacity="0.6"/>
  <rect x="80" y="760" width="160" height="130" rx="12" fill="#80CBC4" opacity="0.9" transform="rotate(12 160 825)"/>
  <path d="M180 760 Q280 680 360 640" stroke="#FFCCBC" stroke-width="14" stroke-linecap="round" stroke-dasharray="14 10" fill="none" opacity="0.6"/>
  <rect x="750" y="750" width="150" height="120" rx="12" fill="#CE93D8" opacity="0.9" transform="rotate(-10 825 810)"/>
  <path d="M750 750 Q680 680 660 650" stroke="#FFCCBC" stroke-width="14" stroke-linecap="round" stroke-dasharray="14 10" fill="none" opacity="0.6"/>
  <!-- Layer 3: Arrows pointing to center -->
  <polygon points="330,500 280,480 280,520" fill="#FFCCBC" opacity="0.8"/>
  <polygon points="694,500 744,480 744,520" fill="#FFCCBC" opacity="0.8"/>
</svg>
