<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <linearGradient id="glass08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg08)"/>
  <!-- Layer 2: Magnifying glass with sharp image inside -->
  <!-- Handle -->
  <line x1="720" y1="720" x2="860" y2="860" stroke="#E65100" stroke-width="68" stroke-linecap="round"/>
  <!-- Glass frame -->
  <circle cx="470" cy="470" r="310" fill="url(#glass08)" stroke="#F57F17" stroke-width="36"/>
  <!-- Sharp image inside glass (crisp photo-like) -->
  <clipPath id="circle08">
    <circle cx="470" cy="470" r="274"/>
  </clipPath>
  <g clip-path="url(#circle08)">
    <!-- Clear image: mountain + sky -->
    <rect x="196" y="196" width="548" height="274" fill="#42A5F5"/>
    <rect x="196" y="470" width="548" height="274" fill="#66BB6A"/>
    <!-- Sun -->
    <circle cx="380" cy="310" r="62" fill="#FFF176"/>
    <!-- Mountain -->
    <polygon points="430,470 560,270 690,470" fill="white" opacity="0.9"/>
  </g>
  <!-- Glass shine -->
  <circle cx="340" cy="340" r="60" fill="white" opacity="0.25"/>
  <!-- Layer 3: x4 badge -->
  <rect x="620" y="180" width="180" height="110" rx="20" fill="#F57F17"/>
  <text x="640" y="264" font-family="'Segoe UI',Arial,sans-serif" font-size="104" font-weight="900" fill="white">×4</text>
</svg>
