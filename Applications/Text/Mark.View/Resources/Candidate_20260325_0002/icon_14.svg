<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1C1C2E"/>
  <!-- Layer 2: 분할 에디터 뷰 -->
  <!-- 왼쪽 에디터 패널 -->
  <rect x="220" y="250" width="258" height="520" rx="16" fill="#1E2030" stroke="#333355" stroke-width="4"/>
  <!-- 에디터 탭 -->
  <rect x="220" y="250" width="258" height="38" rx="16" fill="#252538"/>
  <rect x="220" y="268" width="258" height="20" fill="#252538"/>
  <text x="349" y="275" text-anchor="middle" font-family="Arial" font-size="28" fill="#90A4AE">edit.md</text>
  <!-- 에디터 내용 -->
  <text x="238" y="336" font-family="Courier New" font-size="46" fill="#4FC3F7"># Doc</text>
  <text x="238" y="386" font-family="Courier New" font-size="40" fill="#A5D6A7">**Hello**</text>
  <text x="238" y="432" font-family="Courier New" font-size="40" fill="#F48FB1">&gt; note</text>
  <text x="238" y="478" font-family="Courier New" font-size="40" fill="#CE93D8">- item 1</text>
  <text x="238" y="524" font-family="Courier New" font-size="40" fill="#CE93D8">- item 2</text>
  <text x="238" y="570" font-family="Courier New" font-size="40" fill="#80CBC4">`code`</text>
  <!-- 커서 -->
  <rect x="238" y="580" width="4" height="44" fill="#4FC3F7"/>
  <!-- 중앙 화살표 -->
  <text x="512" y="520" text-anchor="middle" font-family="Arial Black" font-size="100" fill="#FFD600">⇄</text>
  <!-- 오른쪽 프리뷰 패널 -->
  <rect x="546" y="250" width="258" height="520" rx="16" fill="#13131F" stroke="#333355" stroke-width="4"/>
  <rect x="546" y="250" width="258" height="38" rx="16" fill="#1A1A2E"/>
  <rect x="546" y="268" width="258" height="20" fill="#1A1A2E"/>
  <text x="675" y="275" text-anchor="middle" font-family="Arial" font-size="28" fill="#4FC3F7">preview</text>
  <!-- 프리뷰 내용 -->
  <text x="564" y="340" font-family="Arial Black" font-size="54" font-weight="900" fill="white">Doc</text>
  <rect x="564" y="350" width="220" height="5" rx="2" fill="#42A5F5"/>
  <text x="564" y="400" font-family="Arial Black" font-size="44" font-weight="900" fill="#E0E0E0">Hello</text>
  <rect x="554" y="416" width="6" height="42" rx="3" fill="#4FC3F7"/>
  <text x="568" y="450" font-family="Arial" font-size="38" fill="#B0BEC5" font-style="italic">note</text>
  <text x="574" y="496" font-family="Arial" font-size="38" fill="#E0E0E0">• item 1</text>
  <text x="574" y="538" font-family="Arial" font-size="38" fill="#E0E0E0">• item 2</text>
  <rect x="564" y="554" width="200" height="32" rx="6" fill="#1A2030"/>
  <text x="572" y="577" font-family="Courier New" font-size="34" fill="#80CBC4">code</text>
  <!-- Layer 3: 상단 타이틀 -->
  <text x="512" y="200" text-anchor="middle" font-family="Arial Black" font-size="82" font-weight="900" fill="#90A4AE">Live Split View</text>
</svg>