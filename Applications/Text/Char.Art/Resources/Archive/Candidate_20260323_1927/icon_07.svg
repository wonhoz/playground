<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg07)"/>
  <!-- Canvas frame -->
  <rect x="200" y="220" width="624" height="490" rx="16" fill="#FFFFFF"/>
  <!-- Canvas inner area -->
  <rect x="224" y="244" width="576" height="442" rx="8" fill="#F8FAFC"/>
  <!-- Canvas stand legs -->
  <line x1="380" y1="710" x2="320" y2="840" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round"/>
  <line x1="644" y1="710" x2="704" y2="840" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round"/>
  <line x1="512" y1="710" x2="512" y2="840" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>
  <!-- Canvas top rod -->
  <rect x="200" y="210" width="624" height="30" rx="15" fill="#FFFFFF"/>
  <!-- ASCII art text on canvas simulating brush strokes -->
  <text x="260" y="340" font-family="monospace" font-size="72" font-weight="900" fill="#1F2937">A</text>
  <text x="330" y="340" font-family="monospace" font-size="52" font-weight="700" fill="#374151">#</text>
  <text x="378" y="330" font-family="monospace" font-size="42" font-weight="700" fill="#6B7280">@</text>
  <text x="260" y="410" font-family="monospace" font-size="48" font-weight="700" fill="#374151">@</text>
  <text x="315" y="415" font-family="monospace" font-size="60" font-weight="900" fill="#1F2937">#</text>
  <text x="380" y="415" font-family="monospace" font-size="38" font-weight="700" fill="#4B5563">$</text>
  <text x="430" y="400" font-family="monospace" font-size="30" font-weight="700" fill="#9CA3AF">%</text>
  <!-- Brush stroke lines -->
  <line x1="480" y1="300" x2="760" y2="300" stroke="#E5E7EB" stroke-width="3"/>
  <line x1="480" y1="340" x2="760" y2="340" stroke="#E5E7EB" stroke-width="3"/>
  <line x1="480" y1="380" x2="760" y2="380" stroke="#E5E7EB" stroke-width="3"/>
  <line x1="480" y1="420" x2="760" y2="420" stroke="#E5E7EB" stroke-width="3"/>
  <!-- Paintbrush -->
  <rect x="700" y="460" width="20" height="160" rx="6" fill="#92400E" transform="rotate(-30, 710, 540)"/>
  <ellipse cx="698" cy="470" rx="16" ry="30" fill="#1D4ED8" transform="rotate(-30, 710, 540)"/>
  <!-- Label "A#@" on canvas -->
  <text x="512" y="630" text-anchor="middle" font-family="monospace" font-size="80" font-weight="900" fill="#D1D5DB">A#@</text>
</svg>
