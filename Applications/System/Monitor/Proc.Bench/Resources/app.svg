<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="gaugeGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <linearGradient id="gaugeRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gauge background arc -->
  <path d="M 100 310 A 160 160 0 0 1 412 310" fill="none" stroke="#333" stroke-width="30" stroke-linecap="round"/>
  <!-- Green zone (0-70%) -->
  <path d="M 100 310 A 160 160 0 0 1 340 155" fill="none" stroke="url(#gaugeGreen)" stroke-width="30" stroke-linecap="round"/>
  <!-- Red zone (70-100%) -->
  <path d="M 340 155 A 160 160 0 0 1 412 310" fill="none" stroke="url(#gaugeRed)" stroke-width="30" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(-90,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(-60,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(-30,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(0,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(30,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(60,256,310)"/>
  <line x1="100" y1="310" x2="115" y2="297" stroke="#888" stroke-width="2" transform="rotate(90,256,310)"/>
  <!-- Needle (at ~75%) -->
  <line x1="256" y1="310" x2="350" y2="165" stroke="#ff4444" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="310" r="14" fill="#444"/>
  <circle cx="256" cy="310" r="7" fill="#ff4444"/>
  <!-- Center text -->
  <text x="256" y="365" text-anchor="middle" font-family="monospace" font-size="36" fill="#ffffff" font-weight="bold">75%</text>
  <text x="256" y="395" text-anchor="middle" font-family="monospace" font-size="14" fill="#888888">CPU USAGE</text>
  <!-- Scale labels -->
  <text x="90" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">0</text>
  <text x="422" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">100</text>
  <text x="256" y="130" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">50</text>
</svg>
