<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>
    <linearGradient id="maze_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ccf2"/>
      <stop offset="100%" style="stop-color:#2f80ed"/>
    </linearGradient>
    <linearGradient id="exit_g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Maze walls -->
  <rect x="60" y="60" width="392" height="392" rx="10" stroke="url(#maze_g)" stroke-width="5" fill="none"/>
  <!-- Maze inner walls -->
  <line x1="60" y1="160" x2="260" y2="160" stroke="url(#maze_g)" stroke-width="5"/>
  <line x1="160" y1="160" x2="160" y2="360" stroke="url(#maze_g)" stroke-width="5"/>
  <line x1="160" y1="260" x2="360" y2="260" stroke="url(#maze_g)" stroke-width="5"/>
  <line x1="260" y1="60" x2="260" y2="160" stroke="url(#maze_g)" stroke-width="5"/>
  <line x1="360" y1="260" x2="360" y2="452" stroke="url(#maze_g)" stroke-width="5"/>
  <line x1="260" y1="360" x2="360" y2="360" stroke="url(#maze_g)" stroke-width="5"/>
  <!-- Solution path -->
  <polyline points="110,110 110,212 212,212 212,310 310,310 310,410" stroke="url(#exit_g)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="15,8"/>
  <!-- Player dot -->
  <circle cx="110" cy="110" r="16" fill="url(#exit_g)"/>
  <!-- Exit marker -->
  <circle cx="310" cy="410" r="20" fill="url(#exit_g)" opacity="0.9"/>
  <text x="310" y="418" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#0f2027" font-weight="bold">!</text>
  <!-- EXIT label -->
  <text x="350" y="450" font-family="monospace" font-size="22" fill="url(#exit_g)" font-weight="bold">EXIT</text>
</svg>
