<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e040fb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Center glow -->
  <circle cx="256" cy="256" r="180" fill="url(#centerGlow)"/>
  <!-- Hash symbol large -->
  <line x1="180" y1="140" x2="155" y2="372" stroke="url(#hashGrad)" stroke-width="22" stroke-linecap="round"/>
  <line x1="280" y1="140" x2="255" y2="372" stroke="url(#hashGrad)" stroke-width="22" stroke-linecap="round"/>
  <line x1="120" y1="200" x2="348" y2="200" stroke="url(#hashGrad)" stroke-width="22" stroke-linecap="round"/>
  <line x1="108" y1="295" x2="336" y2="295" stroke="url(#hashGrad)" stroke-width="22" stroke-linecap="round"/>
  <!-- File icons at corners -->
  <rect x="325" y="100" width="90" height="115" rx="8" fill="#6a1b9a" stroke="#e040fb" stroke-width="2"/>
  <polygon points="383,100 415,132 383,132" fill="#4a148c"/>
  <polygon points="383,100 415,100 415,132" fill="#ce93d8"/>
  <!-- Equal badge -->
  <rect x="330" y="248" width="80" height="14" rx="5" fill="#e040fb"/>
  <rect x="330" y="270" width="80" height="14" rx="5" fill="#e040fb"/>
  <!-- File 2 at bottom right -->
  <rect x="325" y="300" width="90" height="115" rx="8" fill="#6a1b9a" stroke="#e040fb" stroke-width="2"/>
  <polygon points="383,300 415,332 383,332" fill="#4a148c"/>
  <polygon points="383,300 415,300 415,332" fill="#ce93d8"/>
  <!-- Hash label -->
  <text x="160" y="455" font-family="'Courier New', monospace" font-size="13" fill="#e040fb" opacity="0.7">MD5: a1b2c3d4...</text>
  <text x="160" y="475" font-family="'Courier New', monospace" font-size="13" fill="#e040fb" opacity="0.7">MD5: a1b2c3d4...</text>
</svg>
