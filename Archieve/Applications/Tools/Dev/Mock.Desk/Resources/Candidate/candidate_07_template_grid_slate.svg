<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Template icon top left -->
  <rect x="60" y="65" width="160" height="165" rx="10" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- Template header -->
  <rect x="60" y="65" width="160" height="30" rx="10" fill="#334155"/>
  <rect x="60" y="82" width="160" height="13" fill="#334155"/>
  <rect x="76" y="72" width="80" height="10" rx="4" fill="url(#accent)" opacity="0.7"/>
  <!-- Template fields -->
  <rect x="75" y="106" width="130" height="9" rx="3" fill="#475569"/>
  <rect x="75" y="124" width="100" height="9" rx="3" fill="#475569"/>
  <rect x="75" y="142" width="115" height="9" rx="3" fill="#475569"/>
  <rect x="75" y="160" width="90" height="9" rx="3" fill="#475569"/>
  <rect x="75" y="178" width="110" height="9" rx="3" fill="#475569"/>
  <!-- Arrow right -->
  <polygon points="234,148 256,136 256,160" fill="url(#accent)"/>
  <!-- Generated data cards -->
  <rect x="270" y="65" width="170" height="60" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1.5"/>
  <rect x="285" y="78" width="80" height="8" rx="3" fill="#38BDF8" opacity="0.7"/>
  <rect x="285" y="94" width="110" height="7" rx="3" fill="#64748B"/>
  <rect x="285" y="108" width="90" height="7" rx="3" fill="#64748B"/>
  <rect x="270" y="140" width="170" height="60" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <rect x="285" y="153" width="80" height="8" rx="3" fill="#818CF8" opacity="0.7"/>
  <rect x="285" y="169" width="110" height="7" rx="3" fill="#64748B"/>
  <rect x="285" y="183" width="90" height="7" rx="3" fill="#64748B"/>
  <rect x="270" y="215" width="170" height="60" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1.5"/>
  <rect x="285" y="228" width="80" height="8" rx="3" fill="#38BDF8" opacity="0.7"/>
  <rect x="285" y="244" width="110" height="7" rx="3" fill="#64748B"/>
  <rect x="285" y="258" width="90" height="7" rx="3" fill="#64748B"/>
  <!-- More generated rows dots -->
  <circle cx="355" cy="295" r="4" fill="#38BDF8" opacity="0.5"/>
  <circle cx="355" cy="311" r="4" fill="#38BDF8" opacity="0.3"/>
  <circle cx="355" cy="327" r="4" fill="#38BDF8" opacity="0.2"/>
  <!-- Bottom toolbar -->
  <rect x="60" y="365" width="392" height="56" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <!-- Schema selector -->
  <rect x="76" y="378" width="130" height="30" rx="6" fill="#334155"/>
  <rect x="82" y="383" width="90" height="10" rx="3" fill="#64748B"/>
  <text x="163" y="397" font-family="Arial" font-size="14" fill="#64748B">▼</text>
  <!-- Count input -->
  <rect x="220" y="378" width="70" height="30" rx="6" fill="#334155"/>
  <text x="255" y="397" font-family="Courier New" font-size="14" fill="#38BDF8" text-anchor="middle">100</text>
  <!-- Generate button -->
  <rect x="304" y="378" width="130" height="30" rx="6" fill="#0284C7"/>
  <text x="369" y="397" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Generate</text>
  <!-- Count label -->
  <text x="256" y="445" font-family="Arial" font-size="13" fill="#64748B" text-anchor="middle">Generated: 1,200 records this session</text>
</svg>
