<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
    <radialGradient id="lensGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 돋보기 원 -->
  <circle cx="210" cy="210" r="148" fill="url(#lensGrad)" stroke="#3b82f6" stroke-width="8" filter="url(#glow)"/>
  <circle cx="210" cy="210" r="134" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.5"/>
  <!-- 렌즈 내부 반사광 -->
  <ellipse cx="170" cy="160" rx="40" ry="18" fill="white" opacity="0.08" transform="rotate(-30,170,160)"/>
  <!-- 렌즈 안 내용 (ZIP 파일 목록) -->
  <rect x="90" y="138" width="110" height="12" rx="3" fill="#3b82f6" opacity="0.7"/>
  <rect x="90" y="158" width="80" height="12" rx="3" fill="#2563eb" opacity="0.5"/>
  <rect x="90" y="178" width="100" height="12" rx="3" fill="#3b82f6" opacity="0.6"/>
  <rect x="90" y="198" width="70" height="12" rx="3" fill="#1d4ed8" opacity="0.5"/>
  <rect x="90" y="218" width="90" height="12" rx="3" fill="#3b82f6" opacity="0.7"/>
  <rect x="90" y="238" width="60" height="12" rx="3" fill="#2563eb" opacity="0.4"/>
  <!-- 렌즈 안 파일 아이콘 -->
  <rect x="246" y="138" width="42" height="54" rx="5" fill="#fbbf24" opacity="0.9"/>
  <polygon points="278,138 288,138 288,152 278,152" fill="#b45309" opacity="0.9"/>
  <text x="267" y="173" font-family="Arial" font-weight="bold" font-size="11" fill="#1c1400" text-anchor="middle">ZIP</text>
  <!-- 손잡이 -->
  <line x1="318" y1="318" x2="430" y2="430" stroke="url(#handleGrad)" stroke-width="22" stroke-linecap="round"/>
  <!-- 손잡이 하이라이트 -->
  <line x1="318" y1="318" x2="430" y2="430" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
