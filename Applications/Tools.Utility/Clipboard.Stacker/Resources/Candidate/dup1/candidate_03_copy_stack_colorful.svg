<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12001f"/>
      <stop offset="100%" stop-color="#1e0030"/>
    </linearGradient>
    <linearGradient id="copy1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5253"/>
    </linearGradient>
    <linearGradient id="copy2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#f9ca24"/>
    </linearGradient>
    <linearGradient id="copy3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#44bd32"/>
    </linearGradient>
    <linearGradient id="copy4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#1e90ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scattered colorful copy cards with arrows -->
  <!-- Cards spreading out from center -->
  <g transform="rotate(-15, 256, 256)">
    <rect x="166" y="186" width="180" height="130" rx="10" fill="url(#copy4)" opacity="0.6"/>
  </g>
  <g transform="rotate(10, 256, 256)">
    <rect x="166" y="186" width="180" height="130" rx="10" fill="url(#copy3)" opacity="0.7"/>
  </g>
  <g transform="rotate(-5, 256, 256)">
    <rect x="166" y="186" width="180" height="130" rx="10" fill="url(#copy2)" opacity="0.8"/>
  </g>
  <!-- Top card (active) -->
  <rect x="156" y="176" width="200" height="140" rx="12" fill="url(#copy1)"/>
  <!-- Clipboard head on top card -->
  <rect x="214" y="162" width="84" height="26" rx="8" fill="#c0392b"/>
  <rect x="232" y="156" width="48" height="14" rx="7" fill="#12001f"/>
  <!-- Content lines -->
  <rect x="175" y="200" width="140" height="10" rx="4" fill="white" opacity="0.5"/>
  <rect x="175" y="218" width="110" height="10" rx="4" fill="white" opacity="0.4"/>
  <rect x="175" y="236" width="130" height="10" rx="4" fill="white" opacity="0.45"/>
  <!-- Copy arrow -->
  <path d="M366 256 L406 256" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/>
  <polygon points="402,248 420,256 402,264" fill="#ff6b6b"/>
  <!-- Ghost copy destination -->
  <rect x="376" y="310" width="60" height="80" rx="8" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
</svg>