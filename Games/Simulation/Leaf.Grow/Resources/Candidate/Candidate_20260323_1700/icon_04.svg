<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1A0A"/>
  <!-- Layer 2: 꽃+잎+줄기 클로즈업 (단일 가지) -->
  <!-- 메인 줄기 -->
  <line x1="512" y1="960" x2="512" y2="520" stroke="#6D4C41" stroke-width="48" stroke-linecap="round"/>
  <!-- 좌측 가지 -->
  <line x1="512" y1="640" x2="260" y2="380" stroke="#795548" stroke-width="32" stroke-linecap="round"/>
  <!-- 우측 가지 -->
  <line x1="512" y1="580" x2="764" y2="320" stroke="#795548" stroke-width="32" stroke-linecap="round"/>
  <!-- 중앙 상단 가지 -->
  <line x1="512" y1="520" x2="512" y2="200" stroke="#8D6E63" stroke-width="24" stroke-linecap="round"/>
  <!-- 좌측 잎 (큰 타원) -->
  <ellipse cx="200" cy="310" rx="130" ry="80" fill="#388E3C" transform="rotate(-40 200 310)"/>
  <ellipse cx="200" cy="310" rx="90" ry="50" fill="#4CAF50" transform="rotate(-40 200 310)"/>
  <!-- 우측 잎 -->
  <ellipse cx="824" cy="250" rx="130" ry="80" fill="#388E3C" transform="rotate(40 824 250)"/>
  <ellipse cx="824" cy="250" rx="90" ry="50" fill="#4CAF50" transform="rotate(40 824 250)"/>
  <!-- 상단 꽃 -->
  <circle cx="512" cy="150" r="80" fill="#FF80AB"/>
  <circle cx="512" cy="150" r="50" fill="#FFD54F"/>
  <!-- 꽃잎들 -->
  <ellipse cx="512" cy="80" rx="36" ry="60" fill="#FF80AB"/>
  <ellipse cx="512" cy="220" rx="36" ry="60" fill="#FF80AB"/>
  <ellipse cx="442" cy="150" rx="60" ry="36" fill="#FF80AB"/>
  <ellipse cx="582" cy="150" rx="60" ry="36" fill="#FF80AB"/>
  <!-- Layer 3: 작은 꽃 포인트 -->
  <circle cx="512" cy="150" r="30" fill="#FFF176"/>
  <circle cx="250" cy="280" r="24" fill="#FFEB3B"/>
  <circle cx="774" cy="218" r="24" fill="#FFEB3B"/>
</svg>
