<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08001A"/>
      <stop offset="100%" stop-color="#120033"/>
    </linearGradient>
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon frame border -->
  <rect x="68" y="68" width="376" height="340" rx="12" fill="none" stroke="#FF00FF" stroke-width="3" opacity="0.6"/>
  <rect x="74" y="74" width="364" height="328" rx="10" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- ASCII art in neon style -->
  <text x="256" y="130" font-family="monospace" font-size="20" fill="#FF00FF" text-anchor="middle" opacity="0.9">░░░░░░░░░░░░░░░░</text>
  <text x="256" y="158" font-family="monospace" font-size="20" fill="#CC00CC" text-anchor="middle">░ CHAR  ART ░</text>
  <text x="256" y="186" font-family="monospace" font-size="20" fill="#FF00FF" text-anchor="middle" opacity="0.9">░░░░░░░░░░░░░░░░</text>
  <!-- Unicode art symbols -->
  <text x="256" y="230" font-family="monospace" font-size="24" fill="#00FFFF" text-anchor="middle">&#9608;&#9612;&#9616;&#9620;&#9624;&#9628;&#9632;</text>
  <text x="256" y="264" font-family="monospace" font-size="24" fill="#FF44FF" text-anchor="middle">&#9650;&#9660;&#9664;&#9654;&#9670;&#9733;&#9829;</text>
  <text x="256" y="298" font-family="monospace" font-size="20" fill="#88FFFF" text-anchor="middle">&#9484;&#9472;&#9488; &#9474; &#9492;&#9472;&#9496;</text>
  <!-- Neon glow line at bottom of frame -->
  <line x1="80" y1="372" x2="432" y2="372" stroke="#FF00FF" stroke-width="2" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="410" font-family="monospace" font-size="16" fill="#00FFFF" text-anchor="middle">Unicode &amp; Box Drawing</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#FF00FF" text-anchor="middle">Char.Art</text>
</svg>
