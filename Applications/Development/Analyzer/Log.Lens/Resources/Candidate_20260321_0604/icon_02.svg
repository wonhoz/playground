<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="ll2-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ll2-clip)">
    <!-- Background: Very Dark -->
    <rect width="1024" height="1024" fill="#0D1117"/>

    <!-- Window frame -->
    <rect x="200" y="180" width="624" height="660" rx="16" fill="#161B22" stroke="#30363D" stroke-width="3"/>

    <!-- Title bar -->
    <rect x="200" y="180" width="624" height="44" rx="16" fill="#21262D"/>
    <rect x="200" y="208" width="624" height="16" fill="#21262D"/>
    <!-- Traffic lights -->
    <circle cx="232" cy="202" r="10" fill="#FF5F57"/>
    <circle cx="262" cy="202" r="10" fill="#FEBC2E"/>
    <circle cx="292" cy="202" r="10" fill="#28C840"/>
    <!-- Tabs -->
    <rect x="320" y="188" width="120" height="26" rx="8" fill="#30363D"/>
    <text x="380" y="206" font-family="monospace" font-size="13" fill="#8090A0" text-anchor="middle">app.log</text>
    <rect x="452" y="188" width="120" height="26" rx="8" fill="#1A2030"/>
    <text x="512" y="206" font-family="monospace" font-size="13" fill="#5070A0" text-anchor="middle">error.log</text>
    <rect x="584" y="188" width="120" height="26" rx="8" fill="#1A2030"/>
    <text x="644" y="206" font-family="monospace" font-size="13" fill="#5070A0" text-anchor="middle">sys.log</text>

    <!-- Log lines -->
    <!-- Normal INFO lines (white/gray) -->
    <text x="216" y="260" font-family="monospace" font-size="14" fill="#7090B0">[06:04:11]</text>
    <text x="310" y="260" font-family="monospace" font-size="14" fill="#40AA60">INFO </text>
    <text x="360" y="260" font-family="monospace" font-size="14" fill="#C0C8D0">Service started on port 8080</text>

    <text x="216" y="284" font-family="monospace" font-size="14" fill="#7090B0">[06:04:12]</text>
    <text x="310" y="284" font-family="monospace" font-size="14" fill="#5080D0">DEBUG</text>
    <text x="362" y="284" font-family="monospace" font-size="14" fill="#8090A0">Connection pool initialized (size=10)</text>

    <text x="216" y="308" font-family="monospace" font-size="14" fill="#7090B0">[06:04:13]</text>
    <text x="310" y="308" font-family="monospace" font-size="14" fill="#40AA60">INFO </text>
    <text x="360" y="308" font-family="monospace" font-size="14" fill="#C0C8D0">Request received: GET /api/health</text>

    <!-- ERROR line (red highlight) -->
    <rect x="204" y="316" width="616" height="30" rx="4" fill="#FF000015"/>
    <text x="216" y="336" font-family="monospace" font-size="14" fill="#7090B0">[06:04:14]</text>
    <text x="310" y="336" font-family="monospace" font-size="14" fill="#FF4444" font-weight="bold">ERROR</text>
    <text x="362" y="336" font-family="monospace" font-size="14" fill="#FF8888">NullReferenceException at line 42</text>

    <text x="216" y="360" font-family="monospace" font-size="14" fill="#7090B0">[06:04:14]</text>
    <rect x="204" y="346" width="616" height="20" rx="0" fill="#FF000008"/>
    <text x="310" y="360" font-family="monospace" font-size="14" fill="#FF6666">TRACE</text>
    <text x="362" y="360" font-family="monospace" font-size="14" fill="#AA7070">  at UserService.GetUser(Int32 id)</text>

    <!-- WARN line (orange) -->
    <rect x="204" y="368" width="616" height="28" rx="4" fill="#FF800010"/>
    <text x="216" y="386" font-family="monospace" font-size="14" fill="#7090B0">[06:04:15]</text>
    <text x="310" y="386" font-family="monospace" font-size="14" fill="#FFAA30" font-weight="bold">WARN </text>
    <text x="362" y="386" font-family="monospace" font-size="14" fill="#FFCC80">Memory usage: 87% (threshold 80%)</text>

    <!-- More normal lines -->
    <text x="216" y="410" font-family="monospace" font-size="14" fill="#7090B0">[06:04:16]</text>
    <text x="310" y="410" font-family="monospace" font-size="14" fill="#40AA60">INFO </text>
    <text x="360" y="410" font-family="monospace" font-size="14" fill="#C0C8D0">Retry attempt 1/3...</text>

    <text x="216" y="434" font-family="monospace" font-size="14" fill="#7090B0">[06:04:17]</text>
    <text x="310" y="434" font-family="monospace" font-size="14" fill="#5080D0">DEBUG</text>
    <text x="362" y="434" font-family="monospace" font-size="14" fill="#8090A0">Cache hit ratio: 94.2%</text>

    <!-- Second ERROR -->
    <rect x="204" y="442" width="616" height="28" rx="4" fill="#FF000018"/>
    <text x="216" y="460" font-family="monospace" font-size="14" fill="#7090B0">[06:04:18]</text>
    <text x="310" y="460" font-family="monospace" font-size="14" fill="#FF4444" font-weight="bold">ERROR</text>
    <text x="362" y="460" font-family="monospace" font-size="14" fill="#FF8888">Connection timeout after 30000ms</text>

    <text x="216" y="486" font-family="monospace" font-size="14" fill="#7090B0">[06:04:19]</text>
    <text x="310" y="486" font-family="monospace" font-size="14" fill="#40AA60">INFO </text>
    <text x="360" y="486" font-family="monospace" font-size="14" fill="#C0C8D0">Background worker completed</text>

    <text x="216" y="510" font-family="monospace" font-size="14" fill="#7090B0">[06:04:20]</text>
    <text x="310" y="510" font-family="monospace" font-size="14" fill="#5080D0">DEBUG</text>
    <text x="362" y="510" font-family="monospace" font-size="14" fill="#8090A0">Queue flushed (124 items)</text>

    <!-- WARN -->
    <rect x="204" y="518" width="616" height="28" rx="4" fill="#FF800010"/>
    <text x="216" y="536" font-family="monospace" font-size="14" fill="#7090B0">[06:04:21]</text>
    <text x="310" y="536" font-family="monospace" font-size="14" fill="#FFAA30" font-weight="bold">WARN </text>
    <text x="362" y="536" font-family="monospace" font-size="14" fill="#FFCC80">Slow query detected (1240ms)</text>

    <!-- Filter bar at bottom -->
    <rect x="204" y="760" width="616" height="60" rx="10" fill="#1D2430" stroke="#30363D" stroke-width="2"/>
    <text x="224" y="780" font-family="monospace" font-size="13" fill="#5070A0">Filter:</text>
    <rect x="272" y="762" width="360" height="34" rx="8" fill="#0D1117" stroke="#406090" stroke-width="2"/>
    <text x="286" y="784" font-family="monospace" font-size="14" fill="#60A0FF">ERROR</text>
    <!-- Cursor blink -->
    <rect x="326" y="768" width="3" height="22" rx="1" fill="#60A0FF" opacity="0.8"/>
    <!-- Match count -->
    <text x="650" y="795" font-family="monospace" font-size="13" fill="#40AA60">2 matches</text>
  </g>
</svg>
