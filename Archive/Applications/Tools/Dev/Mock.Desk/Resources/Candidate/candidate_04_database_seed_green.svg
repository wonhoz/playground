<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Database cylinder -->
  <ellipse cx="256" cy="130" rx="120" ry="30" fill="#15803D"/>
  <rect x="136" y="130" width="240" height="160" fill="url(#db)"/>
  <ellipse cx="256" cy="290" rx="120" ry="30" fill="#15803D" opacity="0.9"/>
  <!-- Database inner rings -->
  <ellipse cx="256" cy="170" rx="120" ry="30" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="210" rx="120" ry="30" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="250" rx="120" ry="30" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.5"/>
  <!-- Seeding lines / data flowing down -->
  <line x1="256" y1="290" x2="200" y2="360" stroke="#22C55E" stroke-width="2" opacity="0.7" stroke-dasharray="6,4"/>
  <line x1="256" y1="290" x2="256" y2="380" stroke="#22C55E" stroke-width="2" opacity="0.7" stroke-dasharray="6,4"/>
  <line x1="256" y1="290" x2="312" y2="360" stroke="#22C55E" stroke-width="2" opacity="0.7" stroke-dasharray="6,4"/>
  <!-- Seed/leaf icons at end -->
  <ellipse cx="200" cy="372" rx="18" ry="10" fill="#22C55E" opacity="0.8" transform="rotate(-30 200 372)"/>
  <line x1="200" y1="362" x2="200" y2="385" stroke="#15803D" stroke-width="2"/>
  <ellipse cx="256" cy="392" rx="18" ry="10" fill="#22C55E" opacity="0.8" transform="rotate(0 256 392)"/>
  <line x1="256" y1="382" x2="256" y2="405" stroke="#15803D" stroke-width="2"/>
  <ellipse cx="312" cy="372" rx="18" ry="10" fill="#22C55E" opacity="0.8" transform="rotate(30 312 372)"/>
  <line x1="312" y1="362" x2="312" y2="385" stroke="#15803D" stroke-width="2"/>
  <!-- Small data rows visible inside cylinder -->
  <rect x="172" y="147" width="50" height="6" rx="2" fill="#4ADE80" opacity="0.6"/>
  <rect x="230" y="147" width="70" height="6" rx="2" fill="#86EFAC" opacity="0.5"/>
  <rect x="172" y="187" width="60" height="6" rx="2" fill="#4ADE80" opacity="0.6"/>
  <rect x="240" y="187" width="55" height="6" rx="2" fill="#86EFAC" opacity="0.5"/>
  <rect x="172" y="227" width="45" height="6" rx="2" fill="#4ADE80" opacity="0.6"/>
  <rect x="225" y="227" width="80" height="6" rx="2" fill="#86EFAC" opacity="0.5"/>
  <!-- Count badge -->
  <circle cx="376" cy="130" r="36" fill="#15803D" stroke="#22C55E" stroke-width="2"/>
  <text x="376" y="122" font-family="Arial" font-size="11" fill="#86EFAC" text-anchor="middle">SEED</text>
  <text x="376" y="142" font-family="Arial" font-size="18" fill="white" text-anchor="middle" font-weight="bold">×1K</text>
</svg>
