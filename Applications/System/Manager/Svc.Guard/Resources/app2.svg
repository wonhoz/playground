<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#0A1428"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#2A5CA8"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <g clip-path="url(#clip01)">
    <!-- Layer 2: Shield shape -->
    <path d="M512,160 L780,260 L780,520 Q780,720 512,860 Q244,720 244,520 L244,260 Z" fill="url(#shieldGrad)"/>
    <path d="M512,200 L748,292 L748,520 Q748,696 512,824 Q276,696 276,520 L276,292 Z" fill="#162B5A"/>

    <!-- Layer 3: Gear inside shield -->
    <!-- Gear body -->
    <circle cx="512" cy="490" r="120" fill="#1E3D70"/>
    <circle cx="512" cy="490" r="70" fill="#4ADE80"/>
    <circle cx="512" cy="490" r="35" fill="#162B5A"/>

    <!-- Gear teeth (8 teeth) -->
    <g fill="#4ADE80">
      <rect x="496" y="348" width="32" height="50" rx="8"/>
      <rect x="496" y="584" width="32" height="50" rx="8"/>
      <rect x="350" y="474" width="50" height="32" rx="8"/>
      <rect x="624" y="474" width="50" height="32" rx="8"/>
      <!-- Diagonal teeth -->
      <rect x="381" y="381" width="50" height="32" rx="8" transform="rotate(45 406 397)"/>
      <rect x="593" y="381" width="50" height="32" rx="8" transform="rotate(-45 618 397)"/>
      <rect x="381" y="565" width="50" height="32" rx="8" transform="rotate(-45 406 581)"/>
      <rect x="593" y="565" width="50" height="32" rx="8" transform="rotate(45 618 581)"/>
    </g>

    <!-- Shield outline accent -->
    <path d="M512,160 L780,260 L780,520 Q780,720 512,860 Q244,720 244,520 L244,260 Z" fill="none" stroke="#4A90E2" stroke-width="10" opacity="0.5"/>

    <!-- Running status indicator -->
    <circle cx="512" cy="490" r="20" fill="#162B5A"/>

    <!-- Stars/sparkle accent -->
    <circle cx="350" cy="200" r="8" fill="#4A90E2" opacity="0.6"/>
    <circle cx="674" cy="190" r="6" fill="#4ADE80" opacity="0.5"/>
    <circle cx="760" cy="380" r="5" fill="#4A90E2" opacity="0.4"/>
    <circle cx="264" cy="400" r="5" fill="#4ADE80" opacity="0.4"/>
  </g>
</svg>
