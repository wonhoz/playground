<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="64" y1="140" x2="448" y2="140" stroke="#1e4a6e" stroke-width="1"/>
  <line x1="64" y1="196" x2="448" y2="196" stroke="#1e4a6e" stroke-width="1"/>
  <line x1="64" y1="252" x2="448" y2="252" stroke="#1e4a6e" stroke-width="1"/>
  <line x1="64" y1="308" x2="448" y2="308" stroke="#1e4a6e" stroke-width="1"/>
  <line x1="64" y1="364" x2="448" y2="364" stroke="#1e4a6e" stroke-width="1"/>
  <!-- Vertical divider -->
  <line x1="136" y1="100" x2="136" y2="400" stroke="#1e4a6e" stroke-width="1"/>
  <!-- Offset column -->
  <text x="72" y="136" font-family="monospace" font-size="22" fill="#4a7fa5">00</text>
  <text x="72" y="192" font-family="monospace" font-size="22" fill="#4a7fa5">10</text>
  <text x="72" y="248" font-family="monospace" font-size="22" fill="#4a7fa5">20</text>
  <text x="72" y="304" font-family="monospace" font-size="22" fill="#4a7fa5">30</text>
  <text x="72" y="360" font-family="monospace" font-size="22" fill="#4a7fa5">40</text>
  <!-- Hex values -->
  <text x="148" y="136" font-family="monospace" font-size="22" fill="#00d4ff">4D 5A 90</text>
  <text x="148" y="192" font-family="monospace" font-size="22" fill="#e0e0e0">00 03 00</text>
  <text x="148" y="248" font-family="monospace" font-size="22" fill="#e0e0e0">00 00 04</text>
  <text x="148" y="304" font-family="monospace" font-size="22" fill="#ff6b6b">FF FF 00</text>
  <text x="148" y="360" font-family="monospace" font-size="22" fill="#e0e0e0">00 01 00</text>
  <!-- Magnifier -->
  <circle cx="370" cy="180" r="70" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <line x1="422" y1="232" x2="455" y2="265" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <!-- Highlighted hex in magnifier -->
  <text x="330" y="190" font-family="monospace" font-size="28" fill="#00d4ff" font-weight="bold">4D</text>
</svg>