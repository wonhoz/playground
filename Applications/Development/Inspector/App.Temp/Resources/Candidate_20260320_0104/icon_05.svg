<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- File body -->
  <rect x="280" y="260" width="340" height="440" rx="20" fill="#1565C0"/>
  <!-- File corner fold -->
  <polygon points="480,260 620,260 620,400 480,400" fill="#0A0D1A" opacity="0.4"/>
  <polyline points="480,260 480,400 620,400" fill="none" stroke="#42A5F5" stroke-width="16"/>
  <!-- Clock circle (overlapping bottom-right) -->
  <circle cx="640" cy="640" r="150" fill="#0A0D1A"/>
  <circle cx="640" cy="640" r="140" fill="#42A5F5"/>
  <circle cx="640" cy="640" r="110" fill="#0A0D1A"/>
  <!-- Clock hands -->
  <line x1="640" y1="640" x2="640" y2="560" stroke="#42A5F5" stroke-width="18" stroke-linecap="round"/>
  <line x1="640" y1="640" x2="700" y2="670" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <circle cx="640" cy="640" r="12" fill="#42A5F5"/>
</svg>