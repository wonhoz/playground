<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="scrollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="quillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c8e6f5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scroll -->
  <ellipse cx="256" cy="148" rx="120" ry="20" fill="#d4b896"/>
  <rect x="136" y="148" width="240" height="220" fill="url(#scrollGrad)"/>
  <ellipse cx="256" cy="368" rx="120" ry="20" fill="#d4b896"/>
  <!-- Text lines on scroll -->
  <rect x="168" y="178" width="170" height="10" rx="4" fill="url(#inkGrad)" opacity="0.8"/>
  <rect x="168" y="202" width="140" height="10" rx="4" fill="url(#inkGrad)" opacity="0.6"/>
  <rect x="168" y="226" width="155" height="10" rx="4" fill="url(#inkGrad)" opacity="0.7"/>
  <rect x="168" y="250" width="120" height="10" rx="4" fill="url(#inkGrad)" opacity="0.5"/>
  <rect x="168" y="274" width="160" height="10" rx="4" fill="url(#inkGrad)" opacity="0.7"/>
  <rect x="168" y="298" width="100" height="10" rx="4" fill="url(#inkGrad)" opacity="0.4"/>
  <!-- Quill pen -->
  <path d="M330 130 Q400 80 420 60 Q410 100 370 140 L355 155 Z" fill="url(#quillGrad)" opacity="0.95"/>
  <path d="M355 155 L340 200 L332 185 Z" fill="#1a4a7a"/>
  <line x1="353" y1="158" x2="338" y2="198" stroke="#3a7bd5" stroke-width="2"/>
  <!-- Ink drop -->
  <ellipse cx="338" cy="206" rx="6" ry="8" fill="url(#inkGrad)" opacity="0.9"/>
</svg>