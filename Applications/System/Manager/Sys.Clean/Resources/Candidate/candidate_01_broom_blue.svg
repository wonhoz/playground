  <circle cx="155" cy="370" r="6" fill="#64B5F6" opacity="0.6"/>
  <circle cx="170" cy="390" r="4" fill="#90CAF9" opacity="0.5"/>
  <circle cx="142" cy="385" r="5" fill="#64B5F6" opacity="0.4"/>
  <circle cx="368" cy="372" r="5" fill="#64B5F6" opacity="0.6"/>
  <circle cx="380" cy="388" r="3" fill="#90CAF9" opacity="0.5"/>
