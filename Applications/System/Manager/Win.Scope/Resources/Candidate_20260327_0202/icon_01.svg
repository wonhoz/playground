<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — deep purple -->
  <defs>
    <linearGradient id="bgWS1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0D0618"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bgWS1)"/>

  <!-- Layer 2: Layered windows (back to front) -->

  <!-- Window 3 (back, most transparent/faded) -->
  <rect x="260" y="220" width="480" height="360" rx="12" fill="#1A1A3A" stroke="#4A3A6A" stroke-width="6" opacity="0.6"/>
  <!-- Title bar -->
  <rect x="260" y="220" width="480" height="36" rx="12" fill="#2A1A4A" stroke="#4A3A6A" stroke-width="6" opacity="0.6"/>
  <rect x="270" y="220" width="480" height="18" rx="0" fill="#2A1A4A" opacity="0.6"/>
  <circle cx="704" cy="238" r="9" fill="#3A2A5A" opacity="0.6"/>
  <circle cx="680" cy="238" r="9" fill="#3A2A5A" opacity="0.6"/>
  <circle cx="656" cy="238" r="9" fill="#3A2A5A" opacity="0.6"/>

  <!-- Window 2 (middle) -->
  <rect x="210" y="300" width="480" height="360" rx="12" fill="#1A1E3A" stroke="#3A5A9A" stroke-width="7" opacity="0.8"/>
  <rect x="210" y="300" width="480" height="38" rx="12" fill="#1E2A54" stroke="#3A5A9A" stroke-width="7" opacity="0.8"/>
  <rect x="220" y="300" width="480" height="19" rx="0" fill="#1E2A54" opacity="0.8"/>
  <circle cx="668" cy="319" r="10" fill="#CC3333" opacity="0.8"/>
  <circle cx="644" cy="319" r="10" fill="#CCAA00" opacity="0.8"/>
  <circle cx="620" cy="319" r="10" fill="#33AA33" opacity="0.8"/>
  <!-- Window 2 content lines -->
  <rect x="228" y="356" width="320" height="10" rx="5" fill="#3A4A7A" opacity="0.7"/>
  <rect x="228" y="380" width="240" height="10" rx="5" fill="#3A4A7A" opacity="0.5"/>
  <rect x="228" y="404" width="360" height="10" rx="5" fill="#3A4A7A" opacity="0.4"/>

  <!-- Window 1 (front, fully opaque, brightest) -->
  <rect x="160" y="380" width="480" height="360" rx="12" fill="#1A2040" stroke="#00E5FF" stroke-width="8"/>
  <rect x="160" y="380" width="480" height="40" rx="12" fill="#1A3060" stroke="#00E5FF" stroke-width="8"/>
  <rect x="170" y="380" width="480" height="20" rx="0" fill="#1A3060"/>
  <!-- Close/min/max buttons -->
  <circle cx="608" cy="400" r="11" fill="#FF5F57"/>
  <circle cx="582" cy="400" r="11" fill="#FEBC2E"/>
  <circle cx="556" cy="400" r="11" fill="#28C840"/>
  <!-- Title text -->
  <text x="185" y="407" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#88CCFF">notepad.exe</text>
  <!-- Content area: window info rows -->
  <rect x="178" y="438" width="200" height="18" rx="4" fill="#2A3A60"/>
  <text x="184" y="451" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#00E5FF">Handle: 0x1A2B3C</text>
  <rect x="178" y="466" width="180" height="18" rx="4" fill="#2A3A60"/>
  <text x="184" y="479" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#88EECC">ZOrder: 0</text>
  <rect x="178" y="494" width="220" height="18" rx="4" fill="#2A3A60"/>
  <text x="184" y="507" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#FFCCAA">Opacity: 100%</text>
  <rect x="178" y="522" width="160" height="18" rx="4" fill="#2A3A60"/>
  <text x="184" y="535" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#CCAAFF">TopMost: ✓</text>

  <!-- Layer 3: Z-order indicator arrow -->
  <path d="M700 380 L760 340 L820 380" fill="none" stroke="#00E5FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="760" y1="340" x2="760" y2="650" stroke="#00E5FF" stroke-width="4" stroke-dasharray="12,8"/>
  <text x="774" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#00A0BB">Z</text>
  <text x="774" y="500" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#00607A">Z</text>
  <text x="774" y="600" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#003040">Z</text>
</svg>
