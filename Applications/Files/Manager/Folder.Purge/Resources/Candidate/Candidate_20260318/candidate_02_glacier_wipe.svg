<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120000"/>
    </linearGradient>
    <linearGradient id="glacierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FECACA"/>
      <stop offset="50%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#7F1D1D"/>
    </linearGradient>
    <linearGradient id="iceGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 빙하 형태 (대형 삼각형들) -->
  <polygon points="256,80 160,300 352,300" fill="url(#glacierGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- 빙하 측면 -->
  <polygon points="256,80 160,300 80,260" fill="#DC2626" opacity="0.5"/>
  <polygon points="256,80 352,300 432,260" fill="#EF4444" opacity="0.45"/>
  <!-- 빙하 내부 크랙 -->
  <line x1="256" y1="80" x2="230" y2="200" stroke="#FECACA" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="80" x2="280" y2="220" stroke="#FCA5A5" stroke-width="1.5" opacity="0.4"/>
  <line x1="220" y1="190" x2="250" y2="260" stroke="#FECACA" stroke-width="1" opacity="0.3"/>
  <!-- 빙하 표면 반사 -->
  <polygon points="256,80 230,150 282,150" fill="white" opacity="0.15"/>
  <!-- 아래 부분 (물 속) -->
  <polygon points="160,300 352,300 380,420 130,420" fill="#7F1D1D" opacity="0.7"/>
  <!-- 물 표면 -->
  <rect x="80" y="298" width="352" height="6" rx="3" fill="#EF4444" opacity="0.5"/>
  <path d="M 80,300 Q 130,310 180,300 Q 230,290 280,300 Q 330,310 380,300 Q 420,292 450,300" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.4"/>
  <!-- 폴더들 (아래로 침잠) -->
  <g transform="translate(145, 330)" opacity="0.7">
    <polygon points="0,0 45,0 55,12 55,65 0,65" fill="#EF4444" opacity="0.8"/>
    <polygon points="0,0 35,0 35,-14 55,0" fill="#DC2626" opacity="0.7"/>
  </g>
  <g transform="translate(290, 350)" opacity="0.55">
    <polygon points="0,0 40,0 48,11 48,58 0,58" fill="#F87171" opacity="0.75"/>
    <polygon points="0,0 30,0 30,-12 48,0" fill="#EF4444" opacity="0.65"/>
  </g>
  <!-- 빙산 꼭대기 빛 -->
  <circle cx="256" cy="100" r="20" fill="#EF4444" opacity="0.4" filter="url(#glow)"/>
  <!-- 균열 효과 -->
  <path d="M 200,280 L 230,240 L 210,260 L 240,220" fill="none" stroke="#FECACA" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
  <path d="M 310,270 L 290,235 L 305,255 L 280,218" fill="none" stroke="#FCA5A5" stroke-width="1.5" opacity="0.4" stroke-linejoin="round"/>
</svg>