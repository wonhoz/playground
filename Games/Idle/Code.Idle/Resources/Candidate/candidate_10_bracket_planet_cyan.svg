<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003333"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Planet -->
  <circle cx="256" cy="256" r="110" fill="url(#planet)"/>
  <!-- Planet rings (orbit) -->
  <ellipse cx="256" cy="256" rx="160" ry="40" fill="none" stroke="#00BCD4" stroke-width="6" opacity="0.5"/>
  <!-- Code brackets on planet surface -->
  <text x="256" y="276" text-anchor="middle" font-size="70" fill="#003333" font-family="Courier New" font-weight="bold" opacity="0.7">&lt;/&gt;</text>
  <!-- Orbiting XP tokens -->
  <circle cx="416" cy="256" r="16" fill="#FFCA28"/>
  <text x="416" y="261" text-anchor="middle" font-size="12" fill="#3E2723" font-weight="bold" font-family="Arial">XP</text>
  <circle cx="96" cy="256" r="16" fill="#FFCA28" opacity="0.7"/>
  <text x="96" y="261" text-anchor="middle" font-size="12" fill="#3E2723" font-weight="bold" font-family="Arial">XP</text>
  <!-- Stars -->
  <circle cx="148" cy="148" r="3" fill="#B2EBF2"/>
  <circle cx="380" cy="130" r="4" fill="#B2EBF2"/>
  <circle cx="420" cy="350" r="3" fill="#B2EBF2"/>
  <circle cx="130" cy="380" r="3" fill="#B2EBF2"/>
  <circle cx="350" cy="400" r="2" fill="#B2EBF2"/>
</svg>
