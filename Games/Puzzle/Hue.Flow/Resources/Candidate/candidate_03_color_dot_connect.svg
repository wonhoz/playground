<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181828"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm_glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 5x5 grid -->
  <line x1="86" y1="86" x2="86" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="171" y1="86" x2="171" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="256" y1="86" x2="256" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="341" y1="86" x2="341" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="426" y1="86" x2="426" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="86" y1="86" x2="426" y2="86" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="86" y1="171" x2="426" y2="171" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="86" y1="256" x2="426" y2="256" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="86" y1="341" x2="426" y2="341" stroke="#ffffff0a" stroke-width="1"/>
  <line x1="86" y1="426" x2="426" y2="426" stroke="#ffffff0a" stroke-width="1"/>
  <!-- Flow paths (thick, colored) -->
  <path d="M86,86 L171,86 L171,171 L256,171 L256,256 L341,256 L341,171 L426,171" stroke="#ef4444" stroke-width="16" fill="none" stroke-linecap="square" stroke-linejoin="round" opacity="0.85" filter="url(#sm_glow)"/>
  <path d="M86,341 L86,256 L171,256 L171,341 L256,341 L256,426 L341,426 L341,341 L426,341" stroke="#22c55e" stroke-width="16" fill="none" stroke-linecap="square" stroke-linejoin="round" opacity="0.85" filter="url(#sm_glow)"/>
  <path d="M86,426 L171,426 L171,341 Q171,300 215,290" stroke="#3b82f6" stroke-width="16" fill="none" stroke-linecap="square" stroke-linejoin="round" opacity="0.85" filter="url(#sm_glow)"/>
  <path d="M256,86 L256,171 L171,171" stroke="#f59e0b" stroke-width="16" fill="none" stroke-linecap="square" stroke-linejoin="round" opacity="0.85" filter="url(#sm_glow)"/>
  <!-- Endpoint dots (red) -->
  <circle cx="86" cy="86" r="16" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="426" cy="171" r="16" fill="#ef4444" filter="url(#glow)"/>
  <!-- Endpoint dots (green) -->
  <circle cx="86" cy="341" r="16" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="426" cy="341" r="16" fill="#22c55e" filter="url(#glow)"/>
  <!-- Endpoint dots (blue) -->
  <circle cx="86" cy="426" r="16" fill="#3b82f6" filter="url(#glow)"/>
  <!-- Endpoint dots (yellow) -->
  <circle cx="256" cy="86" r="16" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="171" cy="171" r="16" fill="#f59e0b" filter="url(#glow)"/>
</svg>
