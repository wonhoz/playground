<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a2d40"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard outline -->
  <rect x="40" y="160" width="432" height="220" rx="16" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="3"/>
  <!-- Row 1 keys - function row simplified -->
  <rect x="56" y="176" width="36" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="68" y="195" font-family="monospace" font-size="11" fill="#4488aa">Esc</text>
  <!-- Hotkey highlighted keys -->
  <rect x="100" y="176" width="28" height="28" rx="5" fill="#ff4400" fill-opacity="0.8"/>
  <text x="110" y="195" font-family="monospace" font-size="11" fill="white">F1</text>
  <rect x="132" y="176" width="28" height="28" rx="5" fill="#ff6600" fill-opacity="0.7"/>
  <text x="142" y="195" font-family="monospace" font-size="11" fill="white">F2</text>
  <rect x="164" y="176" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="174" y="195" font-family="monospace" font-size="11" fill="#4488aa">F3</text>
  <rect x="196" y="176" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="206" y="195" font-family="monospace" font-size="11" fill="#4488aa">F4</text>
  <rect x="228" y="176" width="28" height="28" rx="5" fill="#ff2200" fill-opacity="0.9"/>
  <text x="238" y="195" font-family="monospace" font-size="11" fill="white">F5</text>
  <!-- Row 2 - number row -->
  <rect x="56" y="212" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="65" y="231" font-family="monospace" font-size="12" fill="#4488aa">~</text>
  <!-- Ctrl highlight -->
  <rect x="56" y="316" width="44" height="28" rx="5" fill="#ff2200" fill-opacity="0.9"/>
  <text x="63" y="334" font-family="monospace" font-size="11" fill="white">Ctrl</text>
  <!-- Alt highlight -->
  <rect x="148" y="316" width="36" height="28" rx="5" fill="#ff4400" fill-opacity="0.8"/>
  <text x="156" y="334" font-family="monospace" font-size="11" fill="white">Alt</text>
  <!-- Various normal keys -->
  <rect x="104" y="212" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="113" y="231" font-family="monospace" font-size="12" fill="#4488aa">1</text>
  <rect x="136" y="212" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="145" y="231" font-family="monospace" font-size="12" fill="#4488aa">2</text>
  <rect x="168" y="212" width="28" height="28" rx="5" fill="#ff8800" fill-opacity="0.5"/>
  <text x="177" y="231" font-family="monospace" font-size="12" fill="white">3</text>
  <!-- Row 3 - QWERTY row -->
  <rect x="72" y="248" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="81" y="267" font-family="monospace" font-size="12" fill="#4488aa">Q</text>
  <rect x="104" y="248" width="28" height="28" rx="5" fill="#1e3a5a" stroke="#2a5a7a" stroke-width="1"/>
  <text x="113" y="267" font-family="monospace" font-size="12" fill="#4488aa">W</text>
  <rect x="136" y="248" width="28" height="28" rx="5" fill="#ff2200" fill-opacity="0.7"/>
  <text x="145" y="267" font-family="monospace" font-size="12" fill="white">E</text>
  <!-- Legend -->
  <rect x="320" y="176" width="14" height="14" rx="3" fill="#ff2200"/>
  <text x="340" y="187" font-family="sans-serif" font-size="12" fill="#e0e0e0">High</text>
  <rect x="320" y="198" width="14" height="14" rx="3" fill="#ff6600"/>
  <text x="340" y="209" font-family="sans-serif" font-size="12" fill="#e0e0e0">Med</text>
  <rect x="320" y="220" width="14" height="14" rx="3" fill="#ffaa00"/>
  <text x="340" y="231" font-family="sans-serif" font-size="12" fill="#e0e0e0">Low</text>
  <!-- Title -->
  <text x="160" y="430" font-family="sans-serif" font-size="26" fill="#4488ff" font-weight="bold">Hotkey.Map</text>
</svg>