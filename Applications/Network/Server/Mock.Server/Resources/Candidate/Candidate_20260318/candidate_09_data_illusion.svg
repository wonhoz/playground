<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 착시 그리드 (원근감) -->
  <line x1="256" y1="140" x2="80" y2="400" stroke="#EC4899" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="140" x2="432" y2="400" stroke="#EC4899" stroke-width="2" opacity="0.3"/>
  <!-- 가로선 (원근) -->
  <line x1="148" y1="200" x2="364" y2="200" stroke="#EC4899" stroke-width="1.5" opacity="0.3"/>
  <line x1="120" y1="260" x2="392" y2="260" stroke="#EC4899" stroke-width="1.5" opacity="0.25"/>
  <line x1="96" y1="320" x2="416" y2="320" stroke="#EC4899" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="380" x2="432" y2="380" stroke="#EC4899" stroke-width="1.5" opacity="0.15"/>
  <!-- 격자 세로선 -->
  <line x1="170" y1="200" x2="135" y2="380" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
  <line x1="210" y1="200" x2="180" y2="380" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="200" x2="256" y2="380" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
  <line x1="302" y1="200" x2="332" y2="380" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
  <line x1="342" y1="200" x2="377" y2="380" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
  <!-- 소실점 (서버 코어) -->
  <circle cx="256" cy="140" r="20" fill="#EC4899" opacity="0.15"/>
  <circle cx="256" cy="140" r="12" fill="#EC4899" opacity="0.6" filter="url(#glow)"/>
  <text x="256" y="144" text-anchor="middle" fill="white" font-size="8" font-family="monospace">API</text>
  <!-- 가짜 데이터 큐브들 -->
  <rect x="230" y="230" width="52" height="52" rx="6" fill="#EC4899" opacity="0.15" transform="rotate(-10,256,256)"/>
  <rect x="234" y="234" width="52" height="52" rx="6" fill="#EC4899" opacity="0.1" transform="rotate(-5,256,256)"/>
  <rect x="230" y="230" width="52" height="52" rx="6" fill="none" stroke="#EC4899" stroke-width="2" filter="url(#glow)"/>
  <text x="256" y="260" text-anchor="middle" fill="#F472B6" font-size="11" font-family="monospace">MOCK</text>
  <text x="256" y="275" text-anchor="middle" fill="#F472B6" font-size="9" font-family="monospace">DATA</text>
</svg>