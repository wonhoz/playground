<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#880e4f"/>
      <stop offset="100%" stop-color="#ad1457"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff80ab"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 지퍼 (두 로그가 하나로 합쳐지는 은유) -->
  <!-- 좌측 라인들 -->
  <line x1="120" y1="80" x2="240" y2="256" stroke="url(#fg)" stroke-width="8" stroke-linecap="round"/>
  <!-- 우측 라인들 -->
  <line x1="392" y1="80" x2="272" y2="256" stroke="url(#fg)" stroke-width="8" stroke-linecap="round"/>
  <!-- 합쳐진 라인 -->
  <line x1="256" y1="256" x2="256" y2="432" stroke="url(#fg)" stroke-width="10" stroke-linecap="round"/>
  <!-- 좌측 이빨들 -->
  <circle cx="148" cy="113" r="12" fill="url(#fg)" opacity="0.9"/>
  <circle cx="176" cy="146" r="12" fill="url(#fg)" opacity="0.9"/>
  <circle cx="204" cy="179" r="12" fill="url(#fg)" opacity="0.9"/>
  <circle cx="232" cy="212" r="12" fill="url(#fg)" opacity="0.9"/>
  <!-- 우측 이빨들 -->
  <circle cx="364" cy="113" r="12" fill="url(#fg)" opacity="0.7"/>
  <circle cx="336" cy="146" r="12" fill="url(#fg)" opacity="0.7"/>
  <circle cx="308" cy="179" r="12" fill="url(#fg)" opacity="0.7"/>
  <circle cx="280" cy="212" r="12" fill="url(#fg)" opacity="0.7"/>
  <!-- 지퍼 풀 -->
  <circle cx="256" cy="256" r="24" fill="white" opacity="0.9"/>
  <circle cx="256" cy="256" r="12" fill="url(#bg)"/>
  <!-- 합쳐진 이빨들 -->
  <circle cx="256" cy="300" r="10" fill="url(#fg)" opacity="0.8"/>
  <circle cx="256" cy="340" r="10" fill="url(#fg)" opacity="0.8"/>
  <circle cx="256" cy="380" r="10" fill="url(#fg)" opacity="0.8"/>
  <circle cx="256" cy="420" r="10" fill="url(#fg)" opacity="0.8"/>
</svg>
