<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg06)"/>
  <!-- Fishing rod handle -->
  <rect x="220" y="200" width="36" height="340" rx="18" fill="#92400E" transform="rotate(-30, 238, 380)"/>
  <!-- Fishing rod tip extension -->
  <line x1="380" y1="230" x2="720" y2="310" stroke="#D97706" stroke-width="18" stroke-linecap="round"/>
  <!-- Fishing line -->
  <path d="M 720 310 Q 780 380 680 560" stroke="rgba(255,255,255,0.8)" stroke-width="8" fill="none" stroke-dasharray="12,6"/>
  <!-- Hook -->
  <path d="M 680 560 Q 700 620 660 640 Q 620 650 620 610" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Star icon on hook -->
  <polygon points="640,650 655,694 702,694 666,720 680,764 640,738 600,764 614,720 578,694 625,694" fill="#FCD34D" stroke="white" stroke-width="8" stroke-linejoin="round"/>
  <!-- Small star sparkles -->
  <polygon points="760,420 766,438 784,438 771,449 776,467 760,456 744,467 749,449 736,438 754,438" fill="#FCD34D" opacity="0.7"/>
  <polygon points="790,500 794,512 806,512 797,519 800,531 790,524 780,531 783,519 774,512 786,512" fill="#FCD34D" opacity="0.5"/>
  <!-- Rod grip detail -->
  <rect x="218" y="480" width="40" height="20" rx="10" fill="#78350F" transform="rotate(-30, 238, 490)"/>
  <!-- Label -->
  <text x="512" y="880" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">IMG CAST</text>
</svg>