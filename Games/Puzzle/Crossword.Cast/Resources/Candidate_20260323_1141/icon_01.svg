<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 크림 화이트 -->
  <rect width="1024" height="1024" rx="180" fill="#FAFAF5"/>
  <!-- Layer 2: 크로스워드 격자 (5×5, 일부 검정 칸) -->
  <!-- 격자 배경 -->
  <rect x="120" y="180" width="784" height="584" rx="16" fill="#E8E8E0" stroke="#BDBDBD" stroke-width="4"/>
  <!-- 개별 셀들 (5열×4행 = 20셀) -->
  <!-- 행 1 -->
  <rect x="136" y="196" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="284" y="196" width="148" height="116" fill="#1A1A1A" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="432" y="196" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="580" y="196" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="728" y="196" width="160" height="116" fill="#1A1A1A" stroke="#9E9E9E" stroke-width="2"/>
  <!-- 행 2 -->
  <rect x="136" y="312" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="284" y="312" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="432" y="312" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="580" y="312" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="728" y="312" width="160" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <!-- 행 3 -->
  <rect x="136" y="428" width="148" height="116" fill="#1A1A1A" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="284" y="428" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="432" y="428" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="580" y="428" width="148" height="116" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="728" y="428" width="160" height="116" fill="#1A1A1A" stroke="#9E9E9E" stroke-width="2"/>
  <!-- 행 4 -->
  <rect x="136" y="544" width="148" height="220" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="284" y="544" width="148" height="220" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="432" y="544" width="148" height="220" fill="#1A1A1A" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="580" y="544" width="148" height="220" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="728" y="544" width="160" height="220" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  <!-- 글자들 -->
  <text x="210" y="272" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">C</text>
  <text x="506" y="272" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">A</text>
  <text x="654" y="272" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">T</text>
  <text x="210" y="388" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#2196F3" text-anchor="middle">R</text>
  <text x="358" y="388" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">O</text>
  <text x="506" y="388" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">S</text>
  <text x="654" y="388" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">E</text>
  <text x="808" y="388" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#1A1A1A" text-anchor="middle">S</text>
  <!-- Layer 3: 현재 입력 커서 -->
  <rect x="284" y="544" width="148" height="220" fill="none" stroke="#2196F3" stroke-width="6"/>
</svg>
