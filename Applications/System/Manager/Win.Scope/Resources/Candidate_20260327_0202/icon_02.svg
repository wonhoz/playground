<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — near black -->
  <rect width="1024" height="1024" rx="190" fill="#080C08"/>

  <!-- Layer 2: Crosshair scope rings -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="#00FF41" stroke-width="6" opacity="0.3"/>
  <circle cx="512" cy="512" r="260" fill="none" stroke="#00FF41" stroke-width="8" opacity="0.5"/>
  <circle cx="512" cy="512" r="180" fill="none" stroke="#00FF41" stroke-width="10" opacity="0.7"/>

  <!-- Crosshair lines -->
  <line x1="182" y1="512" x2="330" y2="512" stroke="#00FF41" stroke-width="5" opacity="0.8"/>
  <line x1="694" y1="512" x2="842" y2="512" stroke="#00FF41" stroke-width="5" opacity="0.8"/>
  <line x1="512" y1="182" x2="512" y2="330" stroke="#00FF41" stroke-width="5" opacity="0.8"/>
  <line x1="512" y1="694" x2="512" y2="842" stroke="#00FF41" stroke-width="5" opacity="0.8"/>

  <!-- Tick marks on scope rings -->
  <line x1="432" y1="512" x2="432" y2="525" stroke="#00FF41" stroke-width="3"/>
  <line x1="472" y1="512" x2="472" y2="520" stroke="#00FF41" stroke-width="2"/>
  <line x1="552" y1="512" x2="552" y2="520" stroke="#00FF41" stroke-width="2"/>
  <line x1="592" y1="512" x2="592" y2="525" stroke="#00FF41" stroke-width="3"/>
  <line x1="512" y1="432" x2="525" y2="432" stroke="#00FF41" stroke-width="3"/>
  <line x1="512" y1="472" x2="520" y2="472" stroke="#00FF41" stroke-width="2"/>
  <line x1="512" y1="552" x2="520" y2="552" stroke="#00FF41" stroke-width="2"/>
  <line x1="512" y1="592" x2="525" y2="592" stroke="#00FF41" stroke-width="3"/>

  <!-- Center: mini window -->
  <rect x="432" y="432" width="160" height="120" rx="6" fill="#0A1A0A" stroke="#00FF41" stroke-width="5"/>
  <!-- Window title bar -->
  <rect x="432" y="432" width="160" height="24" rx="6" fill="#0A2A0A" stroke="#00FF41" stroke-width="5"/>
  <rect x="442" y="432" width="160" height="12" rx="0" fill="#0A2A0A"/>
  <!-- Window min/max -->
  <rect x="558" y="438" width="10" height="10" rx="2" fill="none" stroke="#00CC33" stroke-width="2"/>
  <rect x="572" y="438" width="10" height="10" rx="2" fill="none" stroke="#00FF41" stroke-width="2"/>
  <!-- Window content lines -->
  <rect x="442" y="464" width="80" height="6" rx="3" fill="#00FF41" opacity="0.4"/>
  <rect x="442" y="476" width="100" height="6" rx="3" fill="#00FF41" opacity="0.3"/>
  <rect x="442" y="488" width="60" height="6" rx="3" fill="#00FF41" opacity="0.2"/>

  <!-- Layer 3: Data overlays at corners -->
  <!-- Top left HUD -->
  <text x="200" y="260" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#00FF41" opacity="0.7">ZOrder: 1</text>
  <text x="200" y="288" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#00CC33" opacity="0.6">Opacity: 85%</text>

  <!-- Top right HUD -->
  <text x="680" y="260" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#00FF41" opacity="0.7">TopMost</text>
  <text x="700" y="288" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#00BB22" opacity="0.6">✓ ON</text>

  <!-- Scanning text -->
  <text x="512" y="800" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="38" fill="#00FF41" opacity="0.9">WIN.SCOPE</text>
  <text x="512" y="840" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="24" fill="#009922" opacity="0.6">SCANNING 23 WINDOWS...</text>
</svg>
