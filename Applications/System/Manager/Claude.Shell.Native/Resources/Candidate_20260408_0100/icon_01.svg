<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01csn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background: dark navy -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01csn)"/>

  <!-- Explorer window (behind) -->
  <rect x="110" y="150" width="620" height="540" rx="14" fill="#1E3A5F" opacity="0.7"/>
  <rect x="110" y="150" width="620" height="40" rx="14" fill="#0F2744"/>
  <rect x="110" y="172" width="620" height="18" fill="#0F2744"/>
  <text x="420" y="177" font-family="Arial,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">File Explorer</text>
  <!-- Folders in explorer -->
  <rect x="130" y="210" width="580" height="36" rx="0" fill="#1E3A5F"/>
  <text x="156" y="233" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">📁  Projects</text>
  <rect x="130" y="248" width="580" height="36" rx="0" fill="#1D4ED8" opacity="0.4"/>
  <text x="156" y="271" font-family="Arial,sans-serif" font-size="18" fill="white">📁  my-app</text>
  <text x="130" y="309" font-family="Arial,sans-serif" font-size="18" fill="#64748B">📄  README.md</text>
  <text x="130" y="345" font-family="Arial,sans-serif" font-size="18" fill="#64748B">📄  package.json</text>

  <!-- Right-click context menu popup -->
  <rect x="340" y="290" width="360" height="390" rx="10" fill="#2D3748"/>
  <rect x="340" y="290" width="360" height="390" rx="10" fill="none" stroke="#4A5568" stroke-width="2"/>

  <!-- Menu items -->
  <rect x="348" y="298" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="322" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Open</text>

  <rect x="348" y="334" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="358" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Open in Terminal</text>

  <rect x="348" y="370" width="344" height="1" rx="0" fill="#4A5568"/>

  <!-- Claude menu item: HIGHLIGHTED -->
  <rect x="348" y="379" width="344" height="44" rx="6" fill="#F97316"/>
  <!-- Claude "C" logo -->
  <circle cx="378" cy="401" r="16" fill="white"/>
  <text x="378" y="407" font-family="Arial Black,Arial" font-size="16" fill="#F97316" text-anchor="middle" font-weight="900">C</text>
  <text x="408" y="407" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="bold">Open with Claude Code</text>

  <rect x="348" y="427" width="344" height="1" rx="0" fill="#4A5568"/>

  <rect x="348" y="432" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="456" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Copy</text>

  <rect x="348" y="468" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="492" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Paste</text>

  <rect x="348" y="504" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="528" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Rename</text>

  <rect x="348" y="540" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="564" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Delete</text>

  <rect x="348" y="576" width="344" height="36" rx="4" fill="transparent"/>
  <text x="368" y="600" font-family="Arial,sans-serif" font-size="18" fill="#CBD5E1">Properties</text>

  <!-- Mouse cursor -->
  <polygon points="420,380 440,420 430,416 426,430 420,416 410,420" fill="white" stroke="#1E293B" stroke-width="2"/>

  <!-- Bottom label -->
  <rect x="200" y="760" width="624" height="60" rx="14" fill="#F97316"/>
  <text x="512" y="798" font-family="Arial Black,Arial" font-size="30" fill="white" font-weight="900" text-anchor="middle">Claude.Shell.Native</text>
</svg>
