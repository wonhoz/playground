<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#020802"/>
    </radialGradient>
    <radialGradient id="shield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#44ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Defense shield (orbital ring) -->
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="url(#shield)" stroke="#44ff88" stroke-width="4"/>
  <!-- Orbit trajectory (attackers) -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="12,8"/>
  <!-- Planet core -->
  <circle cx="256" cy="256" r="55" fill="#112233" stroke="#2244aa" stroke-width="3"/>
  <!-- Puzzle ring segments (some broken by attackers) -->
  <path d="M256,116 A140,140 0 0,1 396,256" fill="none" stroke="#44ff88" stroke-width="6"/>
  <path d="M396,256 A140,140 0 0,1 256,396" fill="none" stroke="#44ff88" stroke-width="6"/>
  <!-- Broken segment (red) -->
  <path d="M256,396 A140,140 0 0,1 116,256" fill="none" stroke="#ff4444" stroke-width="6" stroke-dasharray="20,8"/>
  <path d="M116,256 A140,140 0 0,1 256,116" fill="none" stroke="#44ff88" stroke-width="6"/>
  <!-- Raiders approaching gap -->
  <polygon points="120,350 105,370 135,370" fill="#ff4444" transform="rotate(-45 120 360)"/>
  <polygon points="100,280 85,300 115,300" fill="#ff6633"/>
  <!-- Energy shot -->
  <line x1="256" y1="256" x2="115" y2="340" stroke="#44ffff" stroke-width="3" opacity="0.8"/>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#44ff88">ORBIT.RAID</text>
</svg>
