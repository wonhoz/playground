<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0d0508"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#F43F5E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 중앙 폭발 원 -->
  <circle cx="256" cy="230" r="180" fill="url(#burst)" opacity="0.4"/>
  <!-- 방사형 사진 조각들 (모자이크 폭발) -->
  <!-- 상단 -->
  <rect x="236" y="60" width="40" height="55" rx="4" fill="#F43F5E" opacity="0.9" filter="url(#glow)" transform="rotate(-5,256,87)"/>
  <!-- 상단 우 -->
  <rect x="330" y="80" width="38" height="52" rx="4" fill="#BE185D" opacity="0.8" transform="rotate(20,349,106)"/>
  <!-- 우 -->
  <rect x="380" y="175" width="52" height="38" rx="4" fill="#F43F5E" opacity="0.85" transform="rotate(10,406,194)"/>
  <!-- 하단 우 -->
  <rect x="350" y="270" width="42" height="55" rx="4" fill="#9F1239" opacity="0.75" transform="rotate(35,371,297)"/>
  <!-- 하단 -->
  <rect x="236" y="330" width="40" height="55" rx="4" fill="#F43F5E" opacity="0.8" transform="rotate(5,256,357)"/>
  <!-- 하단 좌 -->
  <rect x="125" y="270" width="42" height="55" rx="4" fill="#BE185D" opacity="0.75" transform="rotate(-30,146,297)"/>
  <!-- 좌 -->
  <rect x="80" y="175" width="52" height="38" rx="4" fill="#F43F5E" opacity="0.85" transform="rotate(-10,106,194)"/>
  <!-- 상단 좌 -->
  <rect x="148" y="80" width="38" height="52" rx="4" fill="#9F1239" opacity="0.8" transform="rotate(-20,167,106)"/>
  <!-- 중간 거리 작은 조각들 -->
  <rect x="274" y="100" width="28" height="38" rx="3" fill="#F43F5E" opacity="0.7" transform="rotate(15,288,119)"/>
  <rect x="360" y="130" width="30" height="28" rx="3" fill="#BE185D" opacity="0.65" transform="rotate(40,375,144)"/>
  <rect x="380" y="240" width="28" height="30" rx="3" fill="#F43F5E" opacity="0.7" transform="rotate(55,394,255)"/>
  <rect x="300" y="330" width="30" height="28" rx="3" fill="#9F1239" opacity="0.65" transform="rotate(70,315,344)"/>
  <rect x="170" y="330" width="30" height="28" rx="3" fill="#F43F5E" opacity="0.7" transform="rotate(-70,185,344)"/>
  <rect x="100" y="240" width="28" height="30" rx="3" fill="#BE185D" opacity="0.65" transform="rotate(-55,114,255)"/>
  <rect x="118" y="130" width="30" height="28" rx="3" fill="#F43F5E" opacity="0.7" transform="rotate(-40,133,144)"/>
  <rect x="210" y="100" width="28" height="38" rx="3" fill="#9F1239" opacity="0.7" transform="rotate(-15,224,119)"/>
  <!-- 중앙 카메라 -->
  <circle cx="256" cy="230" r="48" fill="#0a0508" stroke="#F43F5E" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <circle cx="256" cy="230" r="32" fill="#120508" stroke="#F43F5E" stroke-width="1.5" opacity="0.8"/>
  <circle cx="256" cy="230" r="18" fill="#F43F5E" opacity="0.3" filter="url(#softglow)"/>
  <circle cx="256" cy="225" r="6" fill="#fff" opacity="0.4"/>
  <!-- 하단 라벨 -->
  <rect x="130" y="400" width="252" height="60" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="426" text-anchor="middle" font-size="14" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">PHOTO BURST</text>
  <text x="256" y="448" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">폭발 모자이크 생성</text>
</svg>
