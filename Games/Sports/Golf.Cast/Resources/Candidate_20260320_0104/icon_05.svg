<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 홀인원 동심원: 홀 + 파문 -->
  <!-- ripple rings from hole -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#388E3C" stroke-width="10" opacity="0.20"/>
  <circle cx="512" cy="512" r="275" fill="none" stroke="#388E3C" stroke-width="12" opacity="0.30"/>
  <circle cx="512" cy="512" r="210" fill="none" stroke="#388E3C" stroke-width="14" opacity="0.45"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#81C784" stroke-width="16" opacity="0.60"/>
  <circle cx="512" cy="512" r="95"  fill="none" stroke="#81C784" stroke-width="18" opacity="0.80"/>
  <!-- hole -->
  <circle cx="512" cy="512" r="48" fill="#030A03"/>
  <circle cx="512" cy="512" r="48" fill="none" stroke="#81C784" stroke-width="6"/>
  <!-- ball dropping in -->
  <circle cx="512" cy="452" r="36" fill="#81C784"/>
  <circle cx="500" cy="440" r="5" fill="#388E3C" opacity="0.5"/>
  <circle cx="520" cy="440" r="5" fill="#388E3C" opacity="0.5"/>
  <!-- pin -->
  <line x1="512" y1="464" x2="512" y2="320" stroke="#81C784" stroke-width="8" stroke-linecap="round"/>
  <path d="M512 320 L600 355 L512 390 Z" fill="#388E3C"/>
</svg>
