<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
    <linearGradient id="left07" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="right07" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF3E0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFE0B2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow07">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#00000040"/>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Diagonal divider -->
  <polygon points="0,0 1024,0 1024,1024 0,1024" fill="#FFFFFF" fill-opacity="0.08"/>
  <line x1="200" y1="200" x2="824" y2="824" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="20,14" stroke-opacity="0.4"/>
  <!-- Layer 2: Left panel - Question mark (before) -->
  <rect x="100" y="240" width="360" height="480" rx="32" fill="url(#left07)" filter="url(#shadow07)"/>
  <text x="100" y="80" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="#0277BD" opacity="0.5">?</text>
  <text x="280" y="540" font-family="Arial Black, sans-serif" font-size="320" font-weight="900" fill="#0277BD" text-anchor="middle" dominant-baseline="middle">?</text>
  <!-- Right panel - Exclamation mark (after) -->
  <rect x="564" y="240" width="360" height="480" rx="32" fill="url(#right07)" filter="url(#shadow07)"/>
  <text x="744" y="540" font-family="Arial Black, sans-serif" font-size="320" font-weight="900" fill="#E64A19" text-anchor="middle" dominant-baseline="middle">!</text>
  <!-- Layer 3: Arrow between panels -->
  <path d="M460 500 L564 500" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
  <polygon points="564,470 620,500 564,530" fill="#FFFFFF"/>
  <!-- Top label: before/after -->
  <text x="280" y="190" font-family="Arial Bold, sans-serif" font-size="70" font-weight="700" fill="#0277BD" text-anchor="middle" opacity="0.7">QUIZ</text>
  <text x="744" y="190" font-family="Arial Bold, sans-serif" font-size="70" font-weight="700" fill="#E64A19" text-anchor="middle" opacity="0.7">GOT IT</text>
  <!-- Sparkles around exclamation -->
  <circle cx="700" cy="300" r="18" fill="#FFD740"/>
  <circle cx="810" cy="350" r="12" fill="#FF8A65"/>
  <circle cx="820" cy="640" r="18" fill="#FFD740"/>
</svg>
