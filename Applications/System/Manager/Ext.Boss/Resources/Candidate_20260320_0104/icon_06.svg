<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Key ring with bundled files -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0F"/>
  <!-- Key ring (large circle) -->
  <circle cx="512" cy="380" r="200" fill="none" stroke="#546E7A" stroke-width="36"/>
  <circle cx="512" cy="380" r="200" fill="none" stroke="#37474F" stroke-width="24"/>
  <!-- Ring highlight -->
  <path d="M 340,230 A 200 200 0 0 1 684,230" fill="none" stroke="#80CBC4" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- File cards hanging from ring -->
  <!-- File 1 -->
  <line x1="380" y1="574" x2="340" y2="700" stroke="#546E7A" stroke-width="10" stroke-linecap="round"/>
  <rect x="280" y="700" width="120" height="156" rx="10" fill="#263238" stroke="#37474F" stroke-width="5"/>
  <rect x="298" y="730" width="84" height="10" rx="4" fill="#546E7A" opacity="0.7"/>
  <rect x="298" y="752" width="64" height="10" rx="4" fill="#37474F" opacity="0.6"/>
  <!-- File 2 -->
  <line x1="512" y1="580" x2="512" y2="700" stroke="#546E7A" stroke-width="10" stroke-linecap="round"/>
  <rect x="452" y="700" width="120" height="156" rx="10" fill="#37474F" stroke="#546E7A" stroke-width="5"/>
  <rect x="470" y="730" width="84" height="10" rx="4" fill="#80CBC4" opacity="0.6"/>
  <rect x="470" y="752" width="64" height="10" rx="4" fill="#546E7A" opacity="0.6"/>
  <!-- File 3 -->
  <line x1="644" y1="574" x2="684" y2="700" stroke="#546E7A" stroke-width="10" stroke-linecap="round"/>
  <rect x="624" y="700" width="120" height="156" rx="10" fill="#263238" stroke="#37474F" stroke-width="5"/>
  <rect x="642" y="730" width="84" height="10" rx="4" fill="#546E7A" opacity="0.7"/>
  <rect x="642" y="752" width="64" height="10" rx="4" fill="#37474F" opacity="0.5"/>
  <!-- Ring clip point -->
  <circle cx="512" cy="182" r="30" fill="#546E7A"/>
  <circle cx="512" cy="182" r="18" fill="#80CBC4"/>
</svg>
