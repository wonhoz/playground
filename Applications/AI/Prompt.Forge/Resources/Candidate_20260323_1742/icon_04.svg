<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1A0A"/>
  <!-- Layer 2: v1/v2/v3 버전 카드 스택 (대각선) -->
  <!-- v1 카드 (맨 뒤, 가장 흐림) -->
  <rect x="180" y="200" width="620" height="380" rx="24" fill="#1A2A1A" stroke="#2D4A2D" stroke-width="6" opacity="0.6"/>
  <text x="240" y="290" font-size="56" fill="#4CAF50" font-family="monospace" opacity="0.6">v1  initial draft</text>
  <line x1="240" y1="330" x2="740" y2="330" stroke="#2D4A2D" stroke-width="4" opacity="0.6"/>
  <text x="240" y="400" font-size="36" fill="#2D4A2D" font-family="monospace" opacity="0.6">Write code to analyze...</text>
  <!-- v2 카드 (중간) -->
  <rect x="130" y="330" width="620" height="380" rx="24" fill="#1E301E" stroke="#4CAF50" stroke-width="6" opacity="0.8"/>
  <text x="190" y="420" font-size="56" fill="#66BB6A" font-family="monospace" opacity="0.8">v2  improved</text>
  <line x1="190" y1="460" x2="690" y2="460" stroke="#4CAF50" stroke-width="4" opacity="0.8"/>
  <text x="190" y="530" font-size="36" fill="#4CAF50" font-family="monospace" opacity="0.8">You are an expert in...</text>
  <!-- v3 카드 (맨 앞, 가장 선명) -->
  <rect x="80" y="460" width="620" height="380" rx="24" fill="#243A24" stroke="#81C784" stroke-width="8"/>
  <text x="140" y="550" font-size="56" fill="#A5D6A7" font-family="monospace" font-weight="bold">v3  latest ★</text>
  <line x1="140" y1="590" x2="640" y2="590" stroke="#66BB6A" stroke-width="6"/>
  <text x="140" y="660" font-size="40" fill="#81C784" font-family="monospace">Act as a senior dev...</text>
  <text x="140" y="720" font-size="40" fill="#66BB6A" font-family="monospace">Context: {{context}}</text>
  <!-- Layer 3: 우측 버전 번호 표시 -->
  <text x="900" y="340" font-size="100" fill="#1B5E20" text-anchor="middle" font-family="Arial" font-weight="bold">v3</text>
</svg>
