<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 앱 UI 미리보기 — 배율 선택 버튼 -->
  <!-- 패널 배경 -->
  <rect x="130" y="200" width="764" height="580" rx="32" fill="white" opacity="0.95"/>
  <!-- 이미지 영역 -->
  <rect x="155" y="225" width="714" height="300" rx="18" fill="#E8EAF6"/>
  <!-- 이미지 내용 -->
  <polygon points="155,510 370,310 470,380 570,290 869,510" fill="#3949AB" opacity="0.5"/>
  <circle cx="680" cy="330" r="56" fill="#FFF176" opacity="0.8"/>
  <!-- 배율 버튼 그룹 -->
  <!-- 2x 버튼 -->
  <rect x="155" y="550" width="220" height="90" rx="14" fill="#E8EAF6"/>
  <text x="265" y="607" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#3949AB" text-anchor="middle">2x</text>
  <!-- 4x 버튼 (선택됨 — 강조) -->
  <rect x="402" y="540" width="220" height="110" rx="14" fill="#3949AB"/>
  <text x="512" y="611" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle">4x</text>
  <!-- 8x 버튼 -->
  <rect x="649" y="550" width="220" height="90" rx="14" fill="#E8EAF6"/>
  <text x="759" y="607" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#3949AB" text-anchor="middle">8x</text>
  <!-- Layer 3: 상단 타이틀 -->
  <rect x="155" y="225" width="200" height="56" rx="10" fill="#1A237E" opacity="0.85"/>
  <text x="255" y="263" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">Scale</text>
</svg>
