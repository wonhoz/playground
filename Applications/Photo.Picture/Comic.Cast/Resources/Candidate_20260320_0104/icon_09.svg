<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- CMYK 4-color halftone dots overlapping -->
  <!-- Cyan circle (top-left) -->
  <circle cx="380" cy="400" r="180" fill="#00BCD4" opacity="0.55"/>
  <!-- Magenta circle (top-right) -->
  <circle cx="644" cy="400" r="180" fill="#CE93D8" opacity="0.55"/>
  <!-- Yellow circle (bottom-center) -->
  <circle cx="512" cy="620" r="180" fill="#FFE57F" opacity="0.45"/>
  <!-- Key/Black circle (center) -->
  <circle cx="512" cy="480" r="90" fill="#2a1040" opacity="0.7"/>
  <!-- Halftone dot grid overlay (decorative) -->
  <!-- Row 1 -->
  <circle cx="320" cy="300" r="22" fill="#6A1B9A" opacity="0.5"/>
  <circle cx="390" cy="280" r="18" fill="#6A1B9A" opacity="0.4"/>
  <circle cx="460" cy="300" r="22" fill="#6A1B9A" opacity="0.5"/>
  <circle cx="564" cy="300" r="22" fill="#CE93D8" opacity="0.5"/>
  <circle cx="634" cy="280" r="18" fill="#CE93D8" opacity="0.4"/>
  <circle cx="704" cy="300" r="22" fill="#CE93D8" opacity="0.5"/>
  <!-- Row 2 -->
  <circle cx="340" cy="500" r="14" fill="#6A1B9A" opacity="0.4"/>
  <circle cx="700" cy="500" r="14" fill="#CE93D8" opacity="0.4"/>
  <circle cx="420" cy="720" r="18" fill="#CE93D8" opacity="0.3"/>
  <circle cx="604" cy="720" r="18" fill="#CE93D8" opacity="0.3"/>
  <!-- Center bright overlap glow -->
  <circle cx="512" cy="480" r="40" fill="#CE93D8" opacity="0.6"/>
  <circle cx="512" cy="480" r="18" fill="#ffffff" opacity="0.25"/>
</svg>
