<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 체크리스트 — 마크다운 체크박스 | 기하학 | #FFF5F5 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF5F5"/>
  <!-- Layer 2: Checklist items with markdown checkboxes -->
  <!-- Card background -->
  <rect x="200" y="200" width="624" height="624" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="4"/>
  <!-- Header -->
  <text x="512" y="264" font-family="Arial,sans-serif" font-size="28" fill="#1E293B" text-anchor="middle" font-weight="bold">README.md</text>
  <line x1="220" y1="280" x2="804" y2="280" stroke="#E5E7EB" stroke-width="2"/>
  <!-- Checked item 1 -->
  <rect x="244" y="316" width="36" height="36" rx="6" fill="#059669" stroke="#065F46" stroke-width="2"/>
  <text x="262" y="340" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle">✓</text>
  <text x="310" y="342" font-family="Arial,sans-serif" font-size="20" fill="#64748B"><tspan text-decoration="line-through">설치 가이드 작성</tspan></text>
  <!-- Checked item 2 -->
  <rect x="244" y="376" width="36" height="36" rx="6" fill="#059669" stroke="#065F46" stroke-width="2"/>
  <text x="262" y="400" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle">✓</text>
  <text x="310" y="402" font-family="Arial,sans-serif" font-size="20" fill="#64748B"><tspan text-decoration="line-through">API 문서 완성</tspan></text>
  <!-- Unchecked item 3 -->
  <rect x="244" y="436" width="36" height="36" rx="6" fill="none" stroke="#CBD5E1" stroke-width="2"/>
  <text x="310" y="462" font-family="Arial,sans-serif" font-size="20" fill="#1E293B">예제 코드 추가</text>
  <!-- Active item 4 (in progress) -->
  <rect x="244" y="496" width="36" height="36" rx="6" fill="none" stroke="#3B82F6" stroke-width="3"/>
  <rect x="252" y="504" width="20" height="20" rx="3" fill="#DBEAFE"/>
  <text x="310" y="522" font-family="Arial,sans-serif" font-size="20" fill="#1D4ED8" font-weight="bold">스크린샷 업로드</text>
  <!-- Unchecked item 5 -->
  <rect x="244" y="556" width="36" height="36" rx="6" fill="none" stroke="#CBD5E1" stroke-width="2"/>
  <text x="310" y="582" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">버전 히스토리 정리</text>
  <!-- Unchecked item 6 -->
  <rect x="244" y="616" width="36" height="36" rx="6" fill="none" stroke="#CBD5E1" stroke-width="2"/>
  <text x="310" y="642" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">라이선스 파일</text>
  <!-- Progress bar -->
  <rect x="220" y="720" width="584" height="20" rx="10" fill="#F1F5F9"/>
  <rect x="220" y="720" width="194" height="20" rx="10" fill="#059669"/>
  <text x="512" y="774" font-family="Arial,sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2/6 완료</text>
  <!-- Layer 3: Markdown source hint -->
  <text x="760" y="340" font-family="monospace" font-size="14" fill="#94A3B8" opacity="0.6">- [x]</text>
  <text x="760" y="400" font-family="monospace" font-size="14" fill="#94A3B8" opacity="0.6">- [x]</text>
  <text x="760" y="460" font-family="monospace" font-size="14" fill="#94A3B8" opacity="0.6">- [ ]</text>
</svg>
