<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 봄 만개 벚꽃 나무 | 공간/장면 | #FFF0F0 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF0F0"/>
  <!-- Layer 2: Cherry blossom tree -->
  <!-- Trunk -->
  <line x1="512" y1="840" x2="512" y2="560" stroke="#5C2A0A" stroke-width="24" stroke-linecap="round"/>
  <!-- Root spread -->
  <line x1="512" y1="800" x2="440" y2="840" stroke="#7A3B14" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="800" x2="584" y2="840" stroke="#7A3B14" stroke-width="12" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="512" y1="640" x2="360" y2="460" stroke="#7A3B14" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="640" x2="664" y2="460" stroke="#7A3B14" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="580" x2="460" y2="440" stroke="#8B4513" stroke-width="13" stroke-linecap="round"/>
  <line x1="512" y1="580" x2="560" y2="436" stroke="#8B4513" stroke-width="13" stroke-linecap="round"/>
  <!-- Sub branches -->
  <line x1="360" y1="460" x2="280" y2="340" stroke="#9B5520" stroke-width="9" stroke-linecap="round"/>
  <line x1="360" y1="460" x2="340" y2="320" stroke="#9B5520" stroke-width="9" stroke-linecap="round"/>
  <line x1="664" y1="460" x2="740" y2="340" stroke="#9B5520" stroke-width="9" stroke-linecap="round"/>
  <line x1="664" y1="460" x2="688" y2="316" stroke="#9B5520" stroke-width="9" stroke-linecap="round"/>
  <line x1="460" y1="440" x2="400" y2="330" stroke="#8B4820" stroke-width="7" stroke-linecap="round"/>
  <line x1="560" y1="436" x2="622" y2="326" stroke="#8B4820" stroke-width="7" stroke-linecap="round"/>
  <!-- Cherry blossoms (pink clusters) -->
  <!-- Large cluster at main tips -->
  <circle cx="280" cy="330" r="50" fill="#FCB8CC" opacity="0.9"/>
  <circle cx="320" cy="308" r="44" fill="#FCA5C0" opacity="0.85"/>
  <circle cx="250" cy="300" r="40" fill="#FBCFE8" opacity="0.8"/>
  <circle cx="340" cy="312" r="38" fill="#FCB8CC" opacity="0.85"/>
  <circle cx="740" cy="330" r="50" fill="#F9A8D4" opacity="0.9"/>
  <circle cx="706" cy="308" r="44" fill="#FCB8CC" opacity="0.85"/>
  <circle cx="770" cy="302" r="40" fill="#FBCFE8" opacity="0.8"/>
  <circle cx="690" cy="316" r="38" fill="#F9A8D4" opacity="0.85"/>
  <!-- Mid branches clusters -->
  <circle cx="400" cy="320" r="42" fill="#FBCFE8" opacity="0.85"/>
  <circle cx="622" cy="318" r="42" fill="#FCA5C0" opacity="0.85"/>
  <circle cx="460" cy="428" r="38" fill="#FCB8CC" opacity="0.8"/>
  <circle cx="560" cy="424" r="38" fill="#FBCFE8" opacity="0.8"/>
  <!-- Top center bloom -->
  <circle cx="512" cy="510" r="52" fill="#F9A8D4" opacity="0.9"/>
  <!-- Layer 3: Falling petals -->
  <ellipse cx="200" cy="500" rx="8" ry="12" fill="#FCA5C0" opacity="0.7" transform="rotate(-20 200 500)"/>
  <ellipse cx="840" cy="460" rx="7" ry="11" fill="#FBCFE8" opacity="0.6" transform="rotate(15 840 460)"/>
  <ellipse cx="180" cy="640" rx="8" ry="12" fill="#F9A8D4" opacity="0.5" transform="rotate(-30 180 640)"/>
  <ellipse cx="860" cy="600" rx="7" ry="11" fill="#FCA5C0" opacity="0.5" transform="rotate(25 860 600)"/>
  <ellipse cx="160" cy="760" rx="6" ry="10" fill="#FBCFE8" opacity="0.4" transform="rotate(-10 160 760)"/>
  <ellipse cx="870" cy="720" rx="7" ry="11" fill="#F9A8D4" opacity="0.4" transform="rotate(20 870 720)"/>
  <!-- Ground -->
  <ellipse cx="512" cy="852" rx="280" ry="24" fill="#FECDD3" opacity="0.4"/>
</svg>
