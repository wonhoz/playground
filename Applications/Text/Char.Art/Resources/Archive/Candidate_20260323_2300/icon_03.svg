<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#6B21A8"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Giant @ character -->
    <text x="512" y="680" font-size="620" font-weight="bold" font-family="monospace" fill="#FDE68A" text-anchor="middle">@</text>
    <!-- Small white chars scattered -->
    <text x="160" y="280" font-size="52" font-weight="bold" font-family="monospace" fill="white" opacity="0.7">#</text>
    <text x="820" y="300" font-size="46" font-weight="bold" font-family="monospace" fill="white" opacity="0.7">$</text>
    <text x="140" y="700" font-size="48" font-weight="bold" font-family="monospace" fill="white" opacity="0.7">%</text>
    <text x="830" y="720" font-size="50" font-weight="bold" font-family="monospace" fill="white" opacity="0.7">&amp;</text>
    <text x="240" y="880" font-size="42" font-weight="bold" font-family="monospace" fill="white" opacity="0.6">*</text>
    <text x="740" y="870" font-size="44" font-weight="bold" font-family="monospace" fill="white" opacity="0.6">+</text>
    <text x="380" y="150" font-size="40" font-weight="bold" font-family="monospace" fill="white" opacity="0.5">.</text>
    <text x="580" y="140" font-size="40" font-weight="bold" font-family="monospace" fill="white" opacity="0.5">=</text>
    <text x="700" y="180" font-size="36" font-weight="bold" font-family="monospace" fill="#E9D5FF" opacity="0.8">-</text>
  </g>
</svg>
