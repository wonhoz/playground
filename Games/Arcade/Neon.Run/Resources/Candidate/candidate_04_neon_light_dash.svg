<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000510"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#ff8800;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <radialGradient id="burstGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dash light streak main -->
  <path d="M60 256 L340 256" stroke="url(#dashGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M80 256 L340 256" stroke="url(#dashGrad)" stroke-width="20" stroke-linecap="round" opacity="0.3" filter="url(#glow)"/>
  <!-- Secondary streaks -->
  <path d="M80 240 L310 242" stroke="#ff8800" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <path d="M80 272 L310 270" stroke="#ffff00" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <path d="M100 228 L280 230" stroke="#ff8800" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" opacity="0.3"/>
  <path d="M100 284 L280 282" stroke="#ffff00" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" opacity="0.3"/>
  <!-- Burst point -->
  <circle cx="350" cy="256" r="30" fill="url(#burstGrad)" filter="url(#glow)"/>
  <!-- Runner silhouette at burst -->
  <g transform="translate(350, 256)" filter="url(#glow)">
    <circle cx="0" cy="-45" r="12" fill="#ffffff"/>
    <line x1="0" y1="-32" x2="0" y2="5" stroke="#ffffff" stroke-width="3"/>
    <line x1="0" y1="-20" x2="-18" y2="-2" stroke="#ffff00" stroke-width="2.5"/>
    <line x1="0" y1="-20" x2="16" y2="-35" stroke="#ff8800" stroke-width="2.5"/>
    <line x1="0" y1="5" x2="-14" y2="28" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="-14" y1="28" x2="-5" y2="42" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="5" x2="15" y2="22" stroke="#ffff00" stroke-width="2.5"/>
    <line x1="15" y1="22" x2="22" y2="10" stroke="#ffff00" stroke-width="2"/>
  </g>
  <!-- Floor -->
  <line x1="60" y1="298" x2="450" y2="298" stroke="#ff8800" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <!-- Particle sparks -->
  <circle cx="380" cy="220" r="3" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="410" cy="235" r="2" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="395" cy="280" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="420" cy="268" r="1.5" fill="#ffff00" filter="url(#glow)"/>
  <line x1="375" y1="210" x2="390" y2="205" stroke="#ffff00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="405" y1="285" x2="415" y2="295" stroke="#ff8800" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
</svg>