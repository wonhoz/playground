<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 연결 링크 체인 — 마크다운 링크 | 대각선/동적 | #0F1628 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1628"/>
  <!-- Layer 2: Chain links connecting text to URL -->
  <!-- Source: Markdown link text [Label](url) -->
  <rect x="160" y="380" width="300" height="120" rx="14" fill="#1E2A40" stroke="#3B82F6" stroke-width="4"/>
  <text x="310" y="432" font-family="monospace" font-size="22" fill="#93C5FD" text-anchor="middle" font-weight="bold">[링크 텍스트]</text>
  <text x="310" y="462" font-family="monospace" font-size="16" fill="#60A5FA" text-anchor="middle">(https://...)</text>
  <!-- Chain links connecting -->
  <!-- Link ring 1 -->
  <ellipse cx="480" cy="440" rx="36" ry="22" fill="none" stroke="#3B82F6" stroke-width="10"/>
  <!-- Link ring 2 (perpendicular) -->
  <ellipse cx="544" cy="440" rx="22" ry="36" fill="none" stroke="#60A5FA" stroke-width="10"/>
  <!-- Link ring 3 -->
  <ellipse cx="608" cy="440" rx="36" ry="22" fill="none" stroke="#3B82F6" stroke-width="10"/>
  <!-- Destination: Rendered hyperlink -->
  <rect x="564" y="380" width="300" height="120" rx="14" fill="#0F2A1F" stroke="#22D3EE" stroke-width="4"/>
  <text x="714" y="432" font-family="Arial,sans-serif" font-size="22" fill="#22D3EE" text-anchor="middle" font-weight="bold" text-decoration="underline">링크 텍스트</text>
  <text x="714" y="462" font-family="monospace" font-size="14" fill="#0891B2" text-anchor="middle">https://example.com</text>
  <!-- Clickable indicator -->
  <circle cx="820" cy="390" r="14" fill="#0891B2"/>
  <text x="820" y="396" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle">↗</text>
  <!-- Layer 3: More markdown link examples below -->
  <!-- Image link -->
  <rect x="200" y="580" width="260" height="90" rx="10" fill="#1A1A2E" stroke="#7C3AED" stroke-width="3"/>
  <text x="330" y="612" font-family="monospace" font-size="16" fill="#A78BFA" text-anchor="middle">![이미지](img.png)</text>
  <text x="330" y="638" font-family="Arial,sans-serif" font-size="13" fill="#7C3AED" text-anchor="middle">이미지 링크</text>
  <!-- Reference link -->
  <rect x="564" y="580" width="260" height="90" rx="10" fill="#1A0A2E" stroke="#8B5CF6" stroke-width="3"/>
  <text x="694" y="612" font-family="monospace" font-size="16" fill="#C4B5FD" text-anchor="middle">[텍스트][ref]</text>
  <text x="694" y="638" font-family="Arial,sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle">참조 링크</text>
  <!-- Arrow between examples -->
  <line x1="460" y1="625" x2="564" y2="625" stroke="#3B82F6" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>
</svg>
