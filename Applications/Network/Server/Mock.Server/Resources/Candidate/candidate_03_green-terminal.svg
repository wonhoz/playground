<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1F0A"/>
      <stop offset="100%" stop-color="#0F2D0F"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3A1A"/>
      <stop offset="100%" stop-color="#0D200D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="80" y="100" width="352" height="240" rx="16" fill="#1A2A1A"/>
  <rect x="96" y="116" width="320" height="208" rx="8" fill="url(#screen)"/>
  <!-- Terminal lines -->
  <text x="112" y="152" font-family="monospace" font-size="18" fill="#00FF41">$ POST /api/users</text>
  <text x="112" y="178" font-family="monospace" font-size="15" fill="#39FF14" opacity="0.8">200 OK { mock: true }</text>
  <text x="112" y="204" font-family="monospace" font-size="18" fill="#00FF41">$ GET /api/orders</text>
  <text x="112" y="230" font-family="monospace" font-size="15" fill="#39FF14" opacity="0.8">200 OK [data...]</text>
  <text x="112" y="256" font-family="monospace" font-size="18" fill="#00FF41">$ <rect x="224" y="240" width="12" height="18" fill="#00FF41"/></text>
  <!-- Cursor blink block -->
  <rect x="238" y="240" width="12" height="18" fill="#00FF41"/>
  <!-- Stand -->
  <rect x="220" y="340" width="72" height="20" rx="4" fill="#1A2A1A"/>
  <rect x="180" y="355" width="152" height="14" rx="6" fill="#1A2A1A"/>
  <!-- Status bar -->
  <rect x="96" y="296" width="320" height="28" rx="4" fill="#0D3A0D"/>
  <circle cx="116" cy="310" r="6" fill="#00FF41"/>
  <text x="132" y="315" font-family="monospace" font-size="13" fill="#00FF41">Mock Server  :8080  3 routes</text>
</svg>