<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#ECEFF1"/>
  <!-- Layer 2: Code viewer -->
  <rect x="140" y="200" width="744" height="640" rx="16" fill="white" stroke="#CFD8DC" stroke-width="4"/>
  <!-- Line numbers -->
  <rect x="140" y="200" width="80" height="640" rx="16" fill="#F5F5F5"/>
  <text x="180" y="310" font-family="Consolas,monospace" font-size="28" fill="#9E9E9E" text-anchor="middle">1</text>
  <text x="180" y="370" font-family="Consolas,monospace" font-size="28" fill="#9E9E9E" text-anchor="middle">2</text>
  <text x="180" y="430" font-family="Consolas,monospace" font-size="28" fill="#9E9E9E" text-anchor="middle">3</text>
  <text x="180" y="490" font-family="Consolas,monospace" font-size="28" fill="#9E9E9E" text-anchor="middle">4</text>
  <text x="180" y="550" font-family="Consolas,monospace" font-size="28" fill="#9E9E9E" text-anchor="middle">5</text>
  <!-- JSON content -->
  <text x="250" y="310" font-family="Consolas,monospace" font-size="32" fill="#333">&#123;</text>
  <text x="280" y="370" font-family="Consolas,monospace" font-size="32" fill="#1976D2">"status":</text>
  <text x="540" y="370" font-family="Consolas,monospace" font-size="32" fill="#4CAF50">"ok"</text>
  <text x="280" y="430" font-family="Consolas,monospace" font-size="32" fill="#1976D2">"code":</text>
  <text x="510" y="430" font-family="Consolas,monospace" font-size="32" fill="#FF9800">200</text>
  <text x="280" y="490" font-family="Consolas,monospace" font-size="32" fill="#1976D2">"data":</text>
  <text x="510" y="490" font-family="Consolas,monospace" font-size="32" fill="#9C27B0">[...]</text>
  <text x="250" y="550" font-family="Consolas,monospace" font-size="32" fill="#333">&#125;</text>
</svg>