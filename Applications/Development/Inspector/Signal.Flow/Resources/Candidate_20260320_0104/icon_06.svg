<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Router Y-branch signal split -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Input signal line from top -->
  <line x1="512" y1="160" x2="512" y2="400" stroke="#33691E" stroke-width="28" stroke-linecap="round"/>
  <!-- Signal particle on input -->
  <circle cx="512" cy="260" r="22" fill="#76FF03"/>
  <!-- Y-junction node -->
  <circle cx="512" cy="430" r="44" fill="#1B5E20"/>
  <circle cx="512" cy="430" r="28" fill="#558B2F"/>
  <circle cx="512" cy="430" r="14" fill="#76FF03"/>
  <!-- Left branch -->
  <line x1="468" y1="462" x2="280" y2="700" stroke="#33691E" stroke-width="24" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="556" y1="462" x2="744" y2="700" stroke="#33691E" stroke-width="24" stroke-linecap="round"/>
  <!-- Left output node -->
  <circle cx="260" cy="728" r="40" fill="#1B5E20"/>
  <circle cx="260" cy="728" r="24" fill="#558B2F"/>
  <!-- Right output node -->
  <circle cx="764" cy="728" r="40" fill="#1B5E20"/>
  <circle cx="764" cy="728" r="24" fill="#558B2F"/>
  <!-- Branch labels (abstract signal dots) -->
  <circle cx="350" cy="580" r="14" fill="#76FF03" opacity="0.7"/>
  <circle cx="674" cy="580" r="14" fill="#76FF03" opacity="0.7"/>
  <!-- Output arrows -->
  <polygon points="260,782 224,750 296,750" fill="#558B2F"/>
  <polygon points="764,782 728,750 800,750" fill="#558B2F"/>
</svg>
