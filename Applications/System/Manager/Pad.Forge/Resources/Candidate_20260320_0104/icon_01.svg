<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
<!-- 컨셉: 메모장 + 연필 -->
<!-- 메모장 본체 -->
<rect x="200" y="200" width="520" height="620" rx="24" fill="#1A1400"/>
<rect x="200" y="200" width="520" height="620" rx="24" fill="none" stroke="#F9A825" stroke-width="24"/>
<!-- 스프링 링 (상단) -->
<rect x="340" y="180" width="240" height="56" rx="28" fill="#F9A825"/>
<!-- 내용 줄들 -->
<line x1="260" y1="340" x2="660" y2="340" stroke="#F9A825" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
<line x1="260" y1="410" x2="580" y2="410" stroke="#F9A825" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
<line x1="260" y1="480" x2="620" y2="480" stroke="#F9A825" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
<line x1="260" y1="550" x2="540" y2="550" stroke="#F9A825" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
<!-- 연필 -->
<rect x="660" y="440" width="60" height="320" rx="12" fill="#F9A825" transform="rotate(-30, 690, 600)"/>
<rect x="668" y="448" width="44" height="268" rx="8" fill="#FFE082" opacity="0.4" transform="rotate(-30, 690, 582)"/>
<!-- 연필 끝 (뾰족함) -->
<path d="M 640 720 L 690 780 L 740 720 Z" fill="#F9A825" transform="rotate(-30, 690, 740) translate(0, 0)"/>
<polygon points="768,820 798,900 828,820" fill="#F9A825" transform="rotate(-30, 798, 860)"/>
<!-- 연필 지우개 -->
<rect x="662" y="434" width="56" height="36" rx="10" fill="#FFE082" transform="rotate(-30, 690, 452)"/>
</svg>
