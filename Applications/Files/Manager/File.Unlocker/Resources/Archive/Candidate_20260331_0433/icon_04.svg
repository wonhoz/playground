<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 연한 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 사슬 링크들 (잠긴 상태 - 빨강) -->
  <!-- 왼쪽 사슬 -->
  <ellipse cx="220" cy="512" rx="120" ry="60" fill="none" stroke="#B71C1C" stroke-width="40"/>
  <ellipse cx="340" cy="512" rx="120" ry="60" fill="none" stroke="#B71C1C" stroke-width="40"/>
  <!-- 끊어지는 지점 (중앙) -->
  <!-- 오른쪽 사슬 (멀어짐) -->
  <ellipse cx="680" cy="440" rx="120" ry="60" fill="none" stroke="#388E3C" stroke-width="40" transform="rotate(15 680 440)"/>
  <ellipse cx="800" cy="400" rx="120" ry="60" fill="none" stroke="#388E3C" stroke-width="40" transform="rotate(20 800 400)"/>
  <!-- 파열 효과 (중앙) -->
  <line x1="480" y1="460" x2="540" y2="540" stroke="#FF5252" stroke-width="24" stroke-linecap="round"/>
  <line x1="540" y1="460" x2="480" y2="540" stroke="#FF5252" stroke-width="24" stroke-linecap="round"/>
  <!-- 파열 파편들 -->
  <circle cx="430" cy="400" r="16" fill="#FF8A80"/>
  <circle cx="560" cy="380" r="12" fill="#FF8A80"/>
  <circle cx="610" cy="460" r="14" fill="#FF8A80"/>
  <circle cx="380" cy="560" r="10" fill="#FF8A80"/>
  <!-- Layer 3: 상하 결과 표시 -->
  <rect x="180" y="680" width="300" height="100" rx="20" fill="#B71C1C"/>
  <text x="330" y="744" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="60" fill="white" text-anchor="middle">LOCKED</text>
  <text x="512" y="744" font-family="'Segoe UI', sans-serif" font-size="60" fill="#9E9E9E" text-anchor="middle">→</text>
  <rect x="544" y="680" width="300" height="100" rx="20" fill="#1B5E20"/>
  <text x="694" y="744" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="60" fill="#69F0AE" text-anchor="middle">FREE</text>
  <!-- 잠금 해제 폭발 별 -->
  <text x="512" y="540" font-size="120" text-anchor="middle">💥</text>
</svg>
