  <rect x="610" y="220" width="128" height="128" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
  <!-- 행 1 -->
  <rect x="220" y="350" width="128" height="128" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(0,0,0,0.3)" stroke-width="5"/>
