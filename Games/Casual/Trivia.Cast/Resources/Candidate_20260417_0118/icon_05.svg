<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="40%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Vivid background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Layer 2: Star/knowledge burst lines -->
  <line x1="512" y1="100" x2="512" y2="924" stroke="white" stroke-width="6" opacity="0.15"/>
  <line x1="100" y1="512" x2="924" y2="512" stroke="white" stroke-width="6" opacity="0.15"/>
  <line x1="200" y1="200" x2="824" y2="824" stroke="white" stroke-width="6" opacity="0.15"/>
  <line x1="824" y1="200" x2="200" y2="824" stroke="white" stroke-width="6" opacity="0.15"/>
  <line x1="140" y1="350" x2="884" y2="674" stroke="white" stroke-width="4" opacity="0.1"/>
  <line x1="350" y1="140" x2="674" y2="884" stroke="white" stroke-width="4" opacity="0.1"/>

  <!-- Flying "?" symbols -->
  <text x="130" y="320" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="#FFD600" opacity="0.95" transform="rotate(-20,130,320)">?</text>
  <text x="700" y="200" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="white" opacity="0.85" transform="rotate(15,700,200)">?</text>
  <text x="750" y="700" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFD600" opacity="0.9" transform="rotate(-10,750,700)">?</text>
  <text x="100" y="760" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="white" opacity="0.7" transform="rotate(12,100,760)">?</text>

  <!-- Scattered dot-stars -->
  <circle cx="300" cy="180" r="18" fill="#FFD600" opacity="0.9"/>
  <circle cx="780" cy="320" r="14" fill="white" opacity="0.8"/>
  <circle cx="860" cy="520" r="20" fill="#FFD600" opacity="0.85"/>
  <circle cx="200" cy="600" r="16" fill="white" opacity="0.75"/>
  <circle cx="500" cy="860" r="18" fill="#FFD600" opacity="0.8"/>
  <circle cx="680" cy="820" r="12" fill="white" opacity="0.7"/>

  <!-- Layer 3: Center explosion star -->
  <polygon points="512,260 548,420 700,380 590,490 660,640 512,560 364,640 434,490 324,380 476,420" fill="#FFD600" opacity="0.95"/>
  <circle cx="512" cy="512" r="110" fill="white"/>
  <text x="512" y="566" font-family="Arial Black, sans-serif" font-size="148" font-weight="900" fill="#E91E63" text-anchor="middle">!</text>
</svg>
