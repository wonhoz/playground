<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001F3F"/>
      <stop offset="100%" style="stop-color:#003366"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon globe outline -->
  <circle cx="256" cy="240" r="148" fill="none" stroke="#00E5FF" stroke-width="4" filter="url(#glow)" opacity="0.9"/>
  <!-- Neon latitude lines -->
  <ellipse cx="256" cy="240" rx="148" ry="48" fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
  <ellipse cx="256" cy="192" rx="118" ry="32" fill="none" stroke="#00BCD4" stroke-width="1.8" opacity="0.6"/>
  <ellipse cx="256" cy="288" rx="118" ry="32" fill="none" stroke="#00BCD4" stroke-width="1.8" opacity="0.6"/>
  <!-- Neon meridians -->
  <path d="M256,92 Q300,240 256,388" fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M256,92 Q212,240 256,388" fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="256" y1="92" x2="256" y2="388" stroke="#00E5FF" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <!-- Neon crosshair -->
  <line x1="108" y1="240" x2="404" y2="240" stroke="#FF4081" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <line x1="256" y1="92" x2="256" y2="388" stroke="#FF4081" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- Target dot -->
  <circle cx="256" cy="240" r="10" fill="#FF4081" filter="url(#glow)"/>
  <!-- Neon Q label -->
  <text x="256" y="458" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" fill="#00E5FF" filter="url(#glow)">GEO QUIZ</text>
</svg>
