<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A08"/>
  <!-- 트랜지스터 게이트: 게이트 기호 -->
  <!-- 트랜지스터 원 -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="#00897B" stroke-width="22"/>
  <!-- 베이스 단자 (왼쪽) -->
  <line x1="160" y1="512" x2="332" y2="512" stroke="#4DB6AC" stroke-width="16" stroke-linecap="round"/>
  <!-- 베이스 수직선 -->
  <line x1="332" y1="392" x2="332" y2="632" stroke="#4DB6AC" stroke-width="20" stroke-linecap="round"/>
  <!-- 컬렉터 단자 (위) -->
  <line x1="512" y1="272" x2="512" y2="160" stroke="#4DB6AC" stroke-width="16" stroke-linecap="round"/>
  <!-- 컬렉터 사선 -->
  <line x1="332" y1="432" x2="512" y2="272" stroke="#4DB6AC" stroke-width="14" stroke-linecap="round"/>
  <!-- 이미터 단자 (아래) -->
  <line x1="512" y1="752" x2="512" y2="864" stroke="#4DB6AC" stroke-width="16" stroke-linecap="round"/>
  <!-- 이미터 사선 (화살표) -->
  <line x1="332" y1="592" x2="512" y2="752" stroke="#4DB6AC" stroke-width="14" stroke-linecap="round"/>
  <!-- 이미터 화살표 -->
  <polygon points="512,752 460,720 490,770" fill="#4DB6AC"/>
  <!-- 단자 패드 -->
  <circle cx="160" cy="512" r="24" fill="#4DB6AC"/>
  <circle cx="512" cy="160" r="24" fill="#4DB6AC"/>
  <circle cx="512" cy="864" r="24" fill="#4DB6AC"/>
  <!-- NPN 타입 표시 전류 파동 -->
  <path d="M660,400 Q720,380 720,440 Q720,500 660,500 Q720,500 720,560 Q720,620 660,620" stroke="#00897B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
