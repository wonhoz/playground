<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스키마 다이어그램 -->
  <!-- 루트 노드 -->
  <rect x="186" y="70" width="140" height="50" rx="10" fill="#3949AB" stroke="#9FA8DA" stroke-width="2"/>
  <text x="256" y="100" font-size="16" text-anchor="middle" fill="#E8EAF6" font-family="Courier New">{ Root }</text>
  <!-- 레벨 1 노드들 -->
  <rect x="60" y="180" width="130" height="50" rx="10" fill="#303F9F" stroke="#7986CB" stroke-width="2"/>
  <text x="125" y="210" font-size="14" text-anchor="middle" fill="#C5CAE9" font-family="Courier New">"string"</text>
  <rect x="320" y="180" width="130" height="50" rx="10" fill="#303F9F" stroke="#7986CB" stroke-width="2"/>
  <text x="385" y="210" font-size="14" text-anchor="middle" fill="#C5CAE9" font-family="Courier New">"number"</text>
  <!-- 연결선 -->
  <line x1="256" y1="120" x2="125" y2="180" stroke="#7986CB" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="256" y1="120" x2="385" y2="180" stroke="#7986CB" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 레벨 2 노드들 -->
  <rect x="50" y="300" width="120" height="50" rx="10" fill="#283593" stroke="#5C6BC0" stroke-width="2"/>
  <text x="110" y="330" font-size="13" text-anchor="middle" fill="#9FA8DA" font-family="Courier New">[ array ]</text>
  <rect x="340" y="300" width="120" height="50" rx="10" fill="#283593" stroke="#5C6BC0" stroke-width="2"/>
  <text x="400" y="330" font-size="13" text-anchor="middle" fill="#9FA8DA" font-family="Courier New">{ object }</text>
  <!-- 연결선 레벨2 -->
  <line x1="125" y1="230" x2="110" y2="300" stroke="#5C6BC0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="385" y1="230" x2="400" y2="300" stroke="#5C6BC0" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 포맷 아이콘 -->
  <rect x="170" y="410" width="172" height="50" rx="14" fill="#3949AB" stroke="#9FA8DA" stroke-width="2"/>
  <text x="256" y="441" font-size="18" text-anchor="middle" fill="#E8EAF6" font-family="Segoe UI">JSON.Fmt</text>
</svg>