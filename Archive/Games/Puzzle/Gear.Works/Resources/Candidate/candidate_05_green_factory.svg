    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Factory/machine base -->
  <rect x="50" y="320" width="412" height="130" rx="12" fill="url(#machineGrad)" stroke="#a5d6a7" stroke-width="2"/>
  <!-- Conveyor belt -->
  <rect x="70" y="360" width="372" height="40" rx="8" fill="#1b5e20"/>
  <rect x="80" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.5"/>
  <rect x="125" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.4"/>
  <rect x="170" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.5"/>
  <rect x="215" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.4"/>
  <rect x="260" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.5"/>
  <rect x="305" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.4"/>
  <rect x="350" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.5"/>
  <rect x="395" y="365" width="30" height="30" rx="5" fill="#a5d6a7" opacity="0.4"/>
  <!-- Machine top part -->
  <rect x="80" y="200" width="120" height="120" rx="10" fill="url(#machineGrad)" stroke="#a5d6a7" stroke-width="1.5"/>
  <rect x="290" y="200" width="142" height="120" rx="10" fill="url(#machineGrad)" stroke="#a5d6a7" stroke-width="1.5"/>
  <!-- Gears on machines -->
  <circle cx="140" cy="260" r="40" fill="url(#gearGrad)"/>
  <circle cx="140" cy="260" r="24" fill="#1b5e20"/>
  <circle cx="140" cy="260" r="9" fill="url(#gearGrad)"/>
  <rect x="134" y="214" width="12" height="16" rx="3" fill="url(#gearGrad)"/>
  <rect x="134" y="290" width="12" height="16" rx="3" fill="url(#gearGrad)"/>
  <rect x="96" y="254" width="16" height="12" rx="3" fill="url(#gearGrad)"/>
  <rect x="168" y="254" width="16" height="12" rx="3" fill="url(#gearGrad)"/>
  <rect x="108" y="228" width="12" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45, 114, 234)"/>
  <rect x="162" y="228" width="12" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45, 168, 234)"/>
  <rect x="108" y="280" width="12" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45, 114, 286)"/>
  <rect x="162" y="280" width="12" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45, 168, 286)"/>
  <circle cx="362" cy="260" r="40" fill="url(#gearGrad)"/>
  <circle cx="362" cy="260" r="24" fill="#1b5e20"/>
  <circle cx="362" cy="260" r="9" fill="url(#gearGrad)"/>
  <rect x="356" y="214" width="12" height="16" rx="3" fill="url(#gearGrad)"/>
  <rect x="356" y="290" width="12" height="16" rx="3" fill="url(#gearGrad)"/>
  <rect x="318" y="254" width="16" height="12" rx="3" fill="url(#gearGrad)"/>
  <rect x="390" y="254" width="16" height="12" rx="3" fill="url(#gearGrad)"/>
  <!-- Connecting chain -->
  <line x1="184" y1="260" x2="318" y2="260" stroke="#a5d6a7" stroke-width="4" stroke-dasharray="10,6" opacity="0.7"/>
  <!-- Boxes on conveyor -->
  <rect x="172" y="340" width="32" height="22" rx="4" fill="#ffb300"/>
  <rect x="226" y="338" width="32" height="24" rx="4" fill="#ff7043"/>
  <!-- Title -->
  <text x="256" y="490" font-family="Arial" font-size="26" font-weight="bold" fill="#a5d6a7" text-anchor="middle">GEAR.WORKS</text>
