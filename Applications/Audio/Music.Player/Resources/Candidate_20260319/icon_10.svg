<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Neon music note with glow effect -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030014"/>
  <!-- Glow blobs -->
  <ellipse cx="480" cy="400" rx="200" ry="160" fill="#7C4DFF" opacity="0.15"/>
  <ellipse cx="560" cy="580" rx="160" ry="120" fill="#FF4081" opacity="0.12"/>
  <!-- Single eighth note -->
  <!-- Stem -->
  <rect x="470" y="220" width="44" height="380" rx="10" fill="#E040FB"/>
  <!-- Note head -->
  <ellipse cx="452" cy="600" rx="76" ry="54" fill="#E040FB" transform="rotate(-15, 452, 600)"/>
  <!-- Flag -->
  <path d="M514 220 Q620 270 600 380 Q580 440 514 440" fill="none" stroke="#E040FB" stroke-width="36" stroke-linecap="round"/>
  <!-- Glow outline (neon effect) -->
  <rect x="470" y="220" width="44" height="380" rx="10" fill="none" stroke="#FF80AB" stroke-width="6" opacity="0.5"/>
  <ellipse cx="452" cy="600" rx="76" ry="54" fill="none" stroke="#FF80AB" stroke-width="6" opacity="0.5" transform="rotate(-15, 452, 600)"/>
  <!-- Stars -->
  <circle cx="700" cy="300" r="10" fill="#FF80AB" opacity="0.8"/>
  <circle cx="740" cy="380" r="7" fill="#B388FF" opacity="0.7"/>
  <circle cx="680" cy="460" r="8" fill="#EA80FC" opacity="0.6"/>
  <circle cx="750" cy="540" r="6" fill="#FF80AB" opacity="0.5"/>
</svg>
