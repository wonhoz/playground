<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030510"/>
  <!-- Character (ship) -->
  <polygon points="512,200 440,380 512,340 584,380" fill="#42A5F5"/>
  <polygon points="512,340 440,380 380,460 512,420 644,460 584,380" fill="#0D47A1"/>
  <ellipse cx="512" cy="450" rx="80" ry="60" fill="#0D47A1"/>
  <!-- Engine glow -->
  <ellipse cx="512" cy="510" rx="30" ry="20" fill="#42A5F5" opacity="0.8"/>
  <!-- Bullets coming at player -->
  <circle cx="260" cy="600" r="22" fill="#42A5F5"/>
  <circle cx="340" cy="680" r="22" fill="#42A5F5"/>
  <circle cx="680" cy="580" r="22" fill="#42A5F5"/>
  <circle cx="760" cy="660" r="22" fill="#42A5F5"/>
  <circle cx="512" cy="750" r="22" fill="#42A5F5" opacity="0.5"/>
  <!-- Bullet trails -->
  <line x1="220" y1="600" x2="240" y2="600" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <line x1="300" y1="680" x2="320" y2="680" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <line x1="640" y1="580" x2="660" y2="580" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <line x1="720" y1="660" x2="740" y2="660" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
</svg>
