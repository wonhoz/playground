<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    icon_05 [hybrid] — 드롭 화살표 + 포맷 배지 4개
    컨셉: 드래그앤드롭 화살표(앱의 핵심 UX) 주변에 SVG/PNG/JPG/ICO 배지가 공전
    연결고리: "캐스팅(Cast)" = 드롭하면 포맷이 변환됨 — 화살표와 포맷 배지의 결합
    패턴: 기하학 추상
    색상: 딥 블루(#0F172A→#1E3A5F) + 컬러풀한 포맷 배지들
  -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <radialGradient id="arrowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <filter id="badgeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8"
                    flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="arrowFilter">
      <feDropShadow dx="0" dy="0" stdDeviation="14"
                    flood-color="#60A5FA" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Layer 1: 딥 블루 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- 중앙 은은한 발광 -->
  <ellipse cx="512" cy="512" rx="360" ry="360" fill="url(#arrowGlow)"/>

  <!-- Layer 2: 중앙 드롭 화살표 (아래 방향) -->
  <!-- 화살표 직선 부분 -->
  <rect x="468" y="290" width="88" height="330" rx="18"
        fill="#93C5FD" filter="url(#arrowFilter)"/>
  <!-- 화살촉 삼각형 -->
  <polygon points="512,750 352,560 672,560"
           fill="#93C5FD" filter="url(#arrowFilter)"/>
  <!-- 화살표 하이라이트 -->
  <rect x="482" y="290" width="28" height="240" rx="14" fill="white" opacity="0.25"/>

  <!-- Layer 3: 포맷 배지 4개 (상하좌우 배치) -->

  <!-- SVG 배지 — 좌상 -->
  <g filter="url(#badgeShadow)">
    <circle cx="254" cy="296" r="96" fill="#F97316"/>
    <text x="254" y="318"
          font-family="Arial Black, Arial, sans-serif"
          font-size="52" font-weight="900"
          fill="white" text-anchor="middle">SVG</text>
  </g>

  <!-- PNG 배지 — 우상 -->
  <g filter="url(#badgeShadow)">
    <circle cx="770" cy="296" r="96" fill="#0EA5E9"/>
    <text x="770" y="318"
          font-family="Arial Black, Arial, sans-serif"
          font-size="52" font-weight="900"
          fill="white" text-anchor="middle">PNG</text>
  </g>

  <!-- JPG 배지 — 좌하 -->
  <g filter="url(#badgeShadow)">
    <circle cx="254" cy="760" r="96" fill="#10B981"/>
    <text x="254" y="782"
          font-family="Arial Black, Arial, sans-serif"
          font-size="52" font-weight="900"
          fill="white" text-anchor="middle">JPG</text>
  </g>

  <!-- ICO 배지 — 우하 (강조: 출력 포맷) -->
  <g filter="url(#badgeShadow)">
    <circle cx="770" cy="760" r="104" fill="#EAB308"/>
    <!-- 강조 링 -->
    <circle cx="770" cy="760" r="104" fill="none"
            stroke="#FDE68A" stroke-width="10" opacity="0.7"/>
    <text x="770" y="782"
          font-family="Arial Black, Arial, sans-serif"
          font-size="56" font-weight="900"
          fill="white" text-anchor="middle">ICO</text>
  </g>

  <!-- 배지에서 화살표로 향하는 연결선 (점선) -->
  <line x1="338" y1="355" x2="450" y2="460"
        stroke="#475569" stroke-width="6" stroke-dasharray="12,8"
        stroke-linecap="round" opacity="0.55"/>
  <line x1="686" y1="355" x2="574" y2="460"
        stroke="#475569" stroke-width="6" stroke-dasharray="12,8"
        stroke-linecap="round" opacity="0.55"/>
  <line x1="338" y1="700" x2="450" y2="608"
        stroke="#475569" stroke-width="6" stroke-dasharray="12,8"
        stroke-linecap="round" opacity="0.55"/>
  <line x1="686" y1="700" x2="574" y2="608"
        stroke="#475569" stroke-width="6" stroke-dasharray="12,8"
        stroke-linecap="round" opacity="0.55"/>
</svg>
