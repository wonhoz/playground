<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Laser emitter device -->
  <rect x="180" y="430" width="300" height="120" rx="30" fill="#0277BD"/>
  <polygon points="480,430 560,480 480,530" fill="#0277BD"/>
  <!-- Laser beam -->
  <rect x="560" y="474" width="300" height="32" rx="16" fill="#4FC3F7" opacity="0.9"/>
  <!-- Beam glow layers -->
  <rect x="560" y="482" width="300" height="16" rx="8" fill="#4FC3F7"/>
  <!-- Screen capture target -->
  <rect x="620" y="310" width="220" height="160" rx="16" fill="none" stroke="#4FC3F7" stroke-width="14"/>
  <!-- Capture flash at impact -->
  <circle cx="730" cy="390" r="50" fill="#4FC3F7" opacity="0.15"/>
  <circle cx="730" cy="390" r="30" fill="#4FC3F7" opacity="0.25"/>
  <!-- Content lines in target -->
  <rect x="650" y="355" width="140" height="12" rx="6" fill="#0277BD" opacity="0.6"/>
  <rect x="650" y="380" width="110" height="12" rx="6" fill="#0277BD" opacity="0.6"/>
  <rect x="650" y="405" width="130" height="12" rx="6" fill="#0277BD" opacity="0.6"/>
  <!-- Device indicator lights -->
  <circle cx="250" cy="490" r="14" fill="#4FC3F7"/>
  <circle cx="300" cy="490" r="10" fill="#4FC3F7" opacity="0.5"/>
</svg>
