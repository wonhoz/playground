<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#07071a"/>
    </linearGradient>
    <radialGradient id="quantumCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#6366F1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 양자 궤도 타원들 -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#818CF8" stroke-width="1" opacity="0.3" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3" transform="rotate(120 256 256)"/>
  <!-- 양자 글로우 코어 -->
  <circle cx="256" cy="256" r="100" fill="url(#quantumCore)" filter="url(#strongGlow)"/>
  <circle cx="256" cy="256" r="55" fill="#6366F1" opacity="0.12"/>
  <circle cx="256" cy="256" r="28" fill="#818CF8" opacity="0.2" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#A5B4FC" opacity="0.7" filter="url(#glow)"/>
  <!-- 전자(파일) 궤도 위 점들 -->
  <!-- 궤도 1 -->
  <circle cx="436" cy="256" r="12" fill="#6366F1" opacity="0.9" filter="url(#glow)"/>
  <circle cx="76" cy="256" r="12" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <!-- 궤도 2 (60도 회전) -->
  <circle cx="346" cy="112" r="10" fill="#A5B4FC" opacity="0.85" filter="url(#glow)"/>
  <circle cx="166" cy="400" r="10" fill="#6366F1" opacity="0.8" filter="url(#glow)"/>
  <!-- 궤도 3 (120도 회전) -->
  <circle cx="166" cy="112" r="10" fill="#818CF8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="346" cy="400" r="10" fill="#A5B4FC" opacity="0.8" filter="url(#glow)"/>
  <!-- 전자 내 파일 심볼 -->
  <text x="436" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f1</text>
  <text x="76" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f2</text>
  <text x="346" y="116" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f3</text>
  <text x="166" y="404" text-anchor="middle" font-family="monospace" font-size="9" fill="#030508" font-weight="bold">f4</text>
  <!-- 중심 핵 심볼 -->
  <text x="256" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#030508" font-weight="bold">Rn</text>
  <!-- 슈퍼포지션 파동 -->
  <path d="M 150,180 Q 200,150 256,180 Q 312,210 362,180" fill="none" stroke="#818CF8" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M 150,332 Q 200,362 256,332 Q 312,302 362,332" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <!-- 불확정성 구름 -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#6366F1" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,5"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#818CF8" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,6"/>
  <!-- 파티클 -->
  <circle cx="310" cy="170" r="3" fill="#A5B4FC" opacity="0.7" filter="url(#glow)"/>
  <circle cx="180" cy="340" r="3" fill="#818CF8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="340" cy="340" r="2.5" fill="#6366F1" opacity="0.6" filter="url(#glow)"/>
  <circle cx="180" cy="170" r="2.5" fill="#A5B4FC" opacity="0.6" filter="url(#glow)"/>
</svg>