<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A0D2E"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground line -->
  <rect x="40" y="370" width="432" height="6" rx="3" fill="url(#neon)" opacity="0.6"/>
  <!-- Runner figure -->
  <circle cx="180" cy="260" r="28" fill="none" stroke="#00FFFF" stroke-width="6" filter="url(#glow)"/>
  <line x1="180" y1="288" x2="180" y2="340" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="310" x2="155" y2="340" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="310" x2="205" y2="330" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="340" x2="158" y2="372" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="340" x2="202" y2="372" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="300" x2="155" y2="280" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="300" x2="210" y2="285" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Morse dots and dashes -->
  <rect x="280" y="300" width="16" height="16" rx="8" fill="#FF00FF" filter="url(#glow)"/>
  <rect x="308" y="300" width="40" height="16" rx="8" fill="#FF00FF" filter="url(#glow)"/>
  <rect x="360" y="300" width="16" height="16" rx="8" fill="#FF00FF" filter="url(#glow)"/>
  <rect x="388" y="300" width="40" height="16" rx="8" fill="#FF00FF" filter="url(#glow)"/>
  <rect x="280" y="330" width="40" height="16" rx="8" fill="url(#neon)" opacity="0.8" filter="url(#glow)"/>
  <rect x="332" y="330" width="16" height="16" rx="8" fill="url(#neon)" opacity="0.8" filter="url(#glow)"/>
  <rect x="360" y="330" width="40" height="16" rx="8" fill="url(#neon)" opacity="0.8" filter="url(#glow)"/>
  <!-- Speed lines -->
  <line x1="60" y1="250" x2="130" y2="250" stroke="#00FFFF" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="40" y1="270" x2="120" y2="270" stroke="#00FFFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="50" y1="290" x2="110" y2="290" stroke="#00FFFF" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
