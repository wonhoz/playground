<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="doc06" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (gold-orange) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg06cp2)"/>

  <!-- Layer 2: File icon -->
  <!-- File body -->
  <path d="M240 140 L240 800 L784 800 L784 320 L600 140 Z" fill="url(#doc06)" stroke="#B0BEC5" stroke-width="8"/>
  <!-- Folded corner -->
  <path d="M600 140 L784 320 L600 320 Z" fill="#CFD8DC"/>
  <!-- File type tag -->
  <rect x="240" y="680" width="544" height="120" rx="0" fill="#E65100" opacity="0.9"/>
  <text x="512" y="760" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="bold"
    fill="white" text-anchor="middle">.txt · .exe · etc</text>

  <!-- Path text on file -->
  <text x="380" y="480" font-family="'Courier New',monospace" font-size="48" fill="#37474F" text-anchor="middle">C:\folder</text>
  <text x="380" y="540" font-family="'Courier New',monospace" font-size="48" fill="#37474F" text-anchor="middle">\file.txt</text>

  <!-- Layer 3: Large copy arrow flying to the right -->
  <path d="M800 480 L880 480" stroke="white" stroke-width="32" stroke-linecap="round"/>
  <path d="M860 444 L900 480 L860 516" fill="none" stroke="white" stroke-width="32"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Copy badge -->
  <circle cx="920" cy="840" r="84" fill="white" opacity="0.9"/>
  <text x="920" y="820" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="#E65100"
    text-anchor="middle" font-weight="bold">📋</text>
  <text x="920" y="880" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#E65100"
    text-anchor="middle" font-weight="bold">Copy</text>

  <!-- App label -->
  <text x="160" y="940" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="bold"
    fill="white" opacity="0.9">Copy.Path</text>
</svg>
