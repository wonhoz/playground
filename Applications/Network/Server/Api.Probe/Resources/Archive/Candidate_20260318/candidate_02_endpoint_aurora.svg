<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 오로라 기둥들 -->
  <rect x="90" y="180" width="16" height="240" rx="8" fill="url(#aurora)" opacity="0.7"/>
  <rect x="118" y="150" width="16" height="270" rx="8" fill="url(#aurora)" opacity="0.6"/>
  <rect x="146" y="170" width="16" height="250" rx="8" fill="url(#aurora)" opacity="0.8" filter="url(#glow)"/>
  <rect x="174" y="140" width="16" height="280" rx="8" fill="url(#aurora)" opacity="0.9" filter="url(#glow)"/>
  <rect x="202" y="160" width="16" height="260" rx="8" fill="url(#aurora)" opacity="0.7"/>
  <rect x="230" y="130" width="16" height="290" rx="8" fill="url(#aurora)" opacity="1" filter="url(#glow)"/>
  <rect x="258" y="150" width="16" height="270" rx="8" fill="url(#aurora)" opacity="0.9" filter="url(#glow)"/>
  <rect x="286" y="170" width="16" height="250" rx="8" fill="url(#aurora)" opacity="0.8"/>
  <rect x="314" y="145" width="16" height="275" rx="8" fill="url(#aurora)" opacity="0.7"/>
  <rect x="342" y="165" width="16" height="255" rx="8" fill="url(#aurora)" opacity="0.9" filter="url(#glow)"/>
  <rect x="370" y="155" width="16" height="265" rx="8" fill="url(#aurora)" opacity="0.6"/>
  <rect x="398" y="180" width="16" height="240" rx="8" fill="url(#aurora)" opacity="0.7"/>
  <!-- 지평선 -->
  <line x1="80" y1="420" x2="432" y2="420" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <!-- API 텍스트 -->
  <text x="256" y="465" text-anchor="middle" fill="#A78BFA" font-size="20" font-family="monospace" font-weight="bold" filter="url(#glow)">API AURORA</text>
  <!-- 헤더 별들 -->
  <circle cx="120" cy="110" r="3" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="90" r="4" fill="#A78BFA" opacity="0.7" filter="url(#glow)"/>
  <circle cx="390" cy="110" r="3" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
</svg>