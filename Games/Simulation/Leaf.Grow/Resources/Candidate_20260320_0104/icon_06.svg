<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 나이테 성장 원형: 동심원 나이테 -->
  <!-- tree rings (concentric circles) -->
  <circle cx="512" cy="512" r="350" fill="none" stroke="#2E7D32" stroke-width="22" opacity="0.25"/>
  <circle cx="512" cy="512" r="290" fill="none" stroke="#2E7D32" stroke-width="20" opacity="0.35"/>
  <circle cx="512" cy="512" r="230" fill="none" stroke="#2E7D32" stroke-width="18" opacity="0.50"/>
  <circle cx="512" cy="512" r="172" fill="none" stroke="#2E7D32" stroke-width="16" opacity="0.65"/>
  <circle cx="512" cy="512" r="116" fill="none" stroke="#66BB6A" stroke-width="14" opacity="0.80"/>
  <circle cx="512" cy="512" r="62"  fill="none" stroke="#66BB6A" stroke-width="12" opacity="0.95"/>
  <!-- center pith -->
  <circle cx="512" cy="512" r="28" fill="#66BB6A"/>
  <!-- radial crack lines -->
  <line x1="512" y1="162" x2="512" y2="860" stroke="#020A02" stroke-width="3" opacity="0.4"/>
  <line x1="162" y1="512" x2="860" y2="512" stroke="#020A02" stroke-width="3" opacity="0.4"/>
  <line x1="264" y1="264" x2="760" y2="760" stroke="#020A02" stroke-width="2" opacity="0.3"/>
  <line x1="760" y1="264" x2="264" y2="760" stroke="#020A02" stroke-width="2" opacity="0.3"/>
</svg>
