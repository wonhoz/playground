<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#010A08"/>
  <!-- Key-value pair grid -->
  <!-- Header row -->
  <rect x="160" y="200" width="280" height="64" rx="8" fill="#26A69A"/>
  <rect x="464" y="200" width="400" height="64" rx="8" fill="#26A69A"/>
  <!-- Row 1 -->
  <rect x="160" y="286" width="280" height="60" rx="6" fill="#1a3530"/>
  <rect x="160" y="286" width="280" height="60" rx="6" fill="none" stroke="#26A69A" stroke-width="6"/>
  <rect x="464" y="286" width="400" height="60" rx="6" fill="#0d2420"/>
  <rect x="464" y="286" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="6"/>
  <!-- Row 2 -->
  <rect x="160" y="368" width="280" height="60" rx="6" fill="#1a3530"/>
  <rect x="160" y="368" width="280" height="60" rx="6" fill="none" stroke="#26A69A" stroke-width="6"/>
  <rect x="464" y="368" width="400" height="60" rx="6" fill="#0d2420"/>
  <rect x="464" y="368" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="6"/>
  <!-- Row 3 -->
  <rect x="160" y="450" width="280" height="60" rx="6" fill="#1a3530"/>
  <rect x="160" y="450" width="280" height="60" rx="6" fill="none" stroke="#26A69A" stroke-width="6"/>
  <rect x="464" y="450" width="400" height="60" rx="6" fill="#0d2420"/>
  <rect x="464" y="450" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="6"/>
  <!-- Row 4 highlighted -->
  <rect x="160" y="532" width="280" height="60" rx="6" fill="#26A69A" opacity="0.8"/>
  <rect x="464" y="532" width="400" height="60" rx="6" fill="#4DB6AC" opacity="0.4"/>
  <rect x="464" y="532" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="8"/>
  <!-- Row 5 -->
  <rect x="160" y="614" width="280" height="60" rx="6" fill="#1a3530"/>
  <rect x="160" y="614" width="280" height="60" rx="6" fill="none" stroke="#26A69A" stroke-width="6"/>
  <rect x="464" y="614" width="400" height="60" rx="6" fill="#0d2420"/>
  <rect x="464" y="614" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="6"/>
  <!-- Row 6 -->
  <rect x="160" y="696" width="280" height="60" rx="6" fill="#1a3530"/>
  <rect x="160" y="696" width="280" height="60" rx="6" fill="none" stroke="#26A69A" stroke-width="6"/>
  <rect x="464" y="696" width="400" height="60" rx="6" fill="#0d2420"/>
  <rect x="464" y="696" width="400" height="60" rx="6" fill="none" stroke="#4DB6AC" stroke-width="6"/>
  <!-- Divider line -->
  <line x1="440" y1="200" x2="440" y2="756" stroke="#26A69A" stroke-width="10"/>
