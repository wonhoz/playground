<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#08081a"/>
    </linearGradient>
    <radialGradient id="starCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A5B4FC;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 성운 효과 -->
  <ellipse cx="256" cy="256" rx="180" ry="150" fill="#6366F1" opacity="0.04"/>
  <ellipse cx="256" cy="256" rx="120" ry="100" fill="#818CF8" opacity="0.06"/>
  <!-- 별자리 연결선 -->
  <line x1="120" y1="160" x2="200" y2="130" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="130" x2="310" y2="150" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="310" y1="150" x2="390" y2="110" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="130" x2="230" y2="240" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="240" x2="310" y2="150" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="240" x2="180" y2="340" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="340" x2="310" y2="370" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="310" y1="370" x2="390" y2="310" stroke="#818CF8" stroke-width="1.5" opacity="0.5"/>
  <line x1="310" y1="150" x2="310" y2="370" stroke="#A5B4FC" stroke-width="1" opacity="0.3"/>
  <!-- 파일 아이콘 (별로 표현) -->
  <!-- 파일 1 - 큰 별 -->
  <polygon points="200,115 205,127 218,127 208,135 211,148 200,140 189,148 192,135 182,127 195,127" fill="#818CF8" opacity="0.9" filter="url(#glow)"/>
  <!-- 파일 2 -->
  <polygon points="310,135 314,145 325,145 317,152 320,162 310,156 300,162 303,152 295,145 306,145" fill="#6366F1" opacity="0.9" filter="url(#glow)"/>
  <!-- 파일 3 -->
  <polygon points="230,225 234,237 246,237 237,244 240,256 230,250 220,256 223,244 214,237 226,237" fill="#A5B4FC" opacity="1" filter="url(#bigGlow)"/>
  <!-- 파일 4 -->
  <circle cx="120" cy="160" r="7" fill="#818CF8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="390" cy="110" r="6" fill="#6366F1" opacity="0.8" filter="url(#glow)"/>
  <circle cx="180" cy="340" r="8" fill="#818CF8" opacity="0.85" filter="url(#glow)"/>
  <circle cx="310" cy="370" r="7" fill="#A5B4FC" opacity="0.8" filter="url(#glow)"/>
  <circle cx="390" cy="310" r="6" fill="#6366F1" opacity="0.75" filter="url(#glow)"/>
  <!-- 파일 아이콘 형태 (중앙) -->
  <rect x="218" y="268" width="76" height="90" rx="8" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.6"/>
  <path d="M 234,268 L 234,258 L 278,258 L 294,268" fill="none" stroke="#818CF8" stroke-width="2" opacity="0.6"/>
  <line x1="234" y1="290" x2="278" y2="290" stroke="#A5B4FC" stroke-width="1.5" opacity="0.5"/>
  <line x1="234" y1="305" x2="265" y2="305" stroke="#818CF8" stroke-width="1.5" opacity="0.4"/>
  <!-- 배경 별들 -->
  <circle cx="150" cy="200" r="2" fill="#A5B4FC" opacity="0.4"/>
  <circle cx="360" cy="200" r="2" fill="#818CF8" opacity="0.3"/>
  <circle cx="100" cy="380" r="1.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="420" cy="380" r="2" fill="#A5B4FC" opacity="0.4"/>
  <circle cx="260" cy="420" r="1.5" fill="#818CF8" opacity="0.3"/>
  <circle cx="80" cy="280" r="1.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="440" cy="240" r="2" fill="#A5B4FC" opacity="0.4"/>
</svg>