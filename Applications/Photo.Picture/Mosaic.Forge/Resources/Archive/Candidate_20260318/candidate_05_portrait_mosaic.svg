<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0d0508"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9F1239" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 초상화를 작은 사진 타일로 만든 모자이크 -->
  <!-- 실루엣 (얼굴 윤곽) -->
  <ellipse cx="256" cy="180" rx="90" ry="110" fill="url(#face)" opacity="0.6"/>
  <rect x="186" y="260" width="140" height="100" rx="20" fill="url(#face)" opacity="0.5"/>
  <!-- 그 위에 작은 픽셀 타일들 -->
  <!-- 머리 영역 (진한 색) -->
  <g opacity="0.9">
    <rect x="196" y="100" width="16" height="16" rx="2" fill="#F43F5E"/>
    <rect x="216" y="100" width="16" height="16" rx="2" fill="#BE185D"/>
    <rect x="236" y="100" width="16" height="16" rx="2" fill="#F43F5E"/>
    <rect x="256" y="100" width="16" height="16" rx="2" fill="#9F1239"/>
    <rect x="276" y="100" width="16" height="16" rx="2" fill="#F43F5E"/>
    <rect x="296" y="100" width="16" height="16" rx="2" fill="#BE185D"/>
    <!-- 눈 행 -->
    <rect x="216" y="155" width="14" height="14" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="282" y="155" width="14" height="14" rx="2" fill="#fff" opacity="0.8"/>
    <rect x="216" y="155" width="14" height="14" rx="2" fill="#F43F5E" opacity="0.9"/>
    <rect x="282" y="155" width="14" height="14" rx="2" fill="#F43F5E" opacity="0.9"/>
    <!-- 코 -->
    <rect x="248" y="185" width="14" height="14" rx="2" fill="#BE185D" opacity="0.7"/>
    <!-- 입 -->
    <rect x="228" y="210" width="14" height="12" rx="2" fill="#F43F5E" opacity="0.8"/>
    <rect x="246" y="210" width="14" height="12" rx="2" fill="#9F1239" opacity="0.8"/>
    <rect x="264" y="210" width="14" height="12" rx="2" fill="#F43F5E" opacity="0.8"/>
  </g>
  <!-- 중간 영역 -->
  <g opacity="0.7">
    <rect x="176" y="120" width="14" height="14" rx="2" fill="#F43F5E"/>
    <rect x="176" y="138" width="14" height="14" rx="2" fill="#BE185D"/>
    <rect x="176" y="156" width="14" height="14" rx="2" fill="#F43F5E"/>
    <rect x="320" y="120" width="14" height="14" rx="2" fill="#9F1239"/>
    <rect x="320" y="138" width="14" height="14" rx="2" fill="#F43F5E"/>
    <rect x="320" y="156" width="14" height="14" rx="2" fill="#BE185D"/>
  </g>
  <!-- 몸통 영역 (작은 타일) -->
  <g opacity="0.65">
    <rect x="196" y="270" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="212" y="270" width="12" height="12" rx="2" fill="#9F1239"/>
    <rect x="228" y="270" width="12" height="12" rx="2" fill="#BE185D"/>
    <rect x="244" y="270" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="260" y="270" width="12" height="12" rx="2" fill="#9F1239"/>
    <rect x="276" y="270" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="292" y="270" width="12" height="12" rx="2" fill="#BE185D"/>
    <rect x="308" y="270" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="196" y="286" width="12" height="12" rx="2" fill="#BE185D"/>
    <rect x="212" y="286" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="228" y="286" width="12" height="12" rx="2" fill="#9F1239"/>
    <rect x="244" y="286" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="260" y="286" width="12" height="12" rx="2" fill="#BE185D"/>
    <rect x="276" y="286" width="12" height="12" rx="2" fill="#9F1239"/>
    <rect x="292" y="286" width="12" height="12" rx="2" fill="#F43F5E"/>
    <rect x="308" y="286" width="12" height="12" rx="2" fill="#BE185D"/>
  </g>
  <!-- 조각 분해 효과 (오른쪽 하단) -->
  <rect x="310" y="230" width="10" height="10" rx="2" fill="#F43F5E" opacity="0.5" transform="rotate(20,315,235)"/>
  <rect x="330" y="215" width="8" height="8" rx="2" fill="#BE185D" opacity="0.4" transform="rotate(35,334,219)"/>
  <rect x="350" y="200" width="6" height="6" rx="1" fill="#F43F5E" opacity="0.3" transform="rotate(50,353,203)"/>
  <!-- 하단 -->
  <rect x="130" y="395" width="252" height="60" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="421" text-anchor="middle" font-size="14" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">PORTRAIT MOSAIC</text>
  <text x="256" y="443" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">초상화 모자이크</text>
</svg>
