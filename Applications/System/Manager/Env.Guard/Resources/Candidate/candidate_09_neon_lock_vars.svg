<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon lock -->
  <rect x="168" y="240" width="176" height="160" rx="20" stroke="#00ff88" stroke-width="5" fill="none" filter="url(#glow)"/>
  <path d="M196 240 L196 195 C196 150 316 150 316 195 L316 240" stroke="#00ff88" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="305" r="25" fill="#00ff88" filter="url(#glow)" opacity="0.8"/>
  <rect x="250" y="315" width="12" height="30" rx="6" fill="#00ff88" filter="url(#glow)"/>
  <!-- Env variables neon text -->
  <text x="256" y="80" font-family="monospace" font-size="22" text-anchor="middle" fill="#ff00ff" filter="url(#glow)">$PATH=/usr/bin</text>
  <text x="256" y="115" font-family="monospace" font-size="22" text-anchor="middle" fill="#ffff00" filter="url(#glow)" opacity="0.8">$HOME=/root</text>
  <text x="256" y="150" font-family="monospace" font-size="22" text-anchor="middle" fill="#00ffff" filter="url(#glow)" opacity="0.6">$SECRET=•••••</text>
  <!-- Guard label -->
  <text x="256" y="460" font-family="monospace" font-size="32" text-anchor="middle" fill="#00ff88" font-weight="bold" filter="url(#glow)">ENV.GUARD</text>
</svg>
