<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | URL창+SEND버튼 UI | 공간/장면 | #1E3A8A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0C1A3A"/>
  <!-- Layer 2: Request panel UI -->
  <rect x="130" y="220" width="764" height="540" rx="20" fill="#111827"/>
  <!-- Panel header bar -->
  <rect x="130" y="220" width="764" height="52" rx="20" fill="#1E3A8A"/>
  <rect x="130" y="252" width="764" height="20" fill="#1E3A8A"/>
  <text x="512" y="252" font-family="Arial,sans-serif" font-size="20" fill="#93C5FD" text-anchor="middle" font-weight="bold">API Probe</text>
  <!-- Method dropdown -->
  <rect x="160" y="304" width="100" height="44" rx="10" fill="#16A34A"/>
  <text x="210" y="332" font-family="Consolas,monospace" font-size="20" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <!-- URL input field -->
  <rect x="272" y="304" width="450" height="44" rx="10" fill="#1E2535" stroke="#374151" stroke-width="2"/>
  <text x="286" y="332" font-family="Consolas,monospace" font-size="17" fill="#9CA3AF">https://api.example.com/v1</text>
  <!-- SEND button -->
  <rect x="736" y="304" width="128" height="44" rx="10" fill="#2563EB"/>
  <text x="800" y="332" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">SEND ▶</text>
  <!-- Divider -->
  <line x1="160" y1="370" x2="864" y2="370" stroke="#374151" stroke-width="1"/>
  <!-- Response body -->
  <rect x="160" y="390" width="320" height="330" rx="10" fill="#0F172A"/>
  <text x="175" y="418" font-family="Arial,sans-serif" font-size="14" fill="#64748B">Headers</text>
  <text x="175" y="446" font-family="Consolas,monospace" font-size="14" fill="#94A3B8">Content-Type:</text>
  <text x="175" y="466" font-family="Consolas,monospace" font-size="14" fill="#60A5FA"> application/json</text>
  <text x="175" y="494" font-family="Consolas,monospace" font-size="14" fill="#94A3B8">Authorization:</text>
  <text x="175" y="514" font-family="Consolas,monospace" font-size="14" fill="#60A5FA"> Bearer ...</text>
  <!-- Response panel -->
  <rect x="500" y="390" width="364" height="330" rx="10" fill="#0A1628"/>
  <!-- Status badge -->
  <rect x="516" y="406" width="100" height="34" rx="8" fill="#15803D"/>
  <text x="566" y="428" font-family="Consolas,monospace" font-size="18" fill="#4ADE80" text-anchor="middle" font-weight="bold">200 OK</text>
  <!-- JSON preview -->
  <text x="516" y="466" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">{</text>
  <text x="530" y="486" font-family="Consolas,monospace" font-size="14" fill="#F9A8D4">"id":</text>
  <text x="568" y="486" font-family="Consolas,monospace" font-size="14" fill="#FDE68A"> 42,</text>
  <text x="530" y="506" font-family="Consolas,monospace" font-size="14" fill="#F9A8D4">"name":</text>
  <text x="580" y="506" font-family="Consolas,monospace" font-size="14" fill="#86EFAC"> "Alice"</text>
  <text x="516" y="526" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">}</text>
  <!-- Layer 3: Tab bar -->
  <rect x="160" y="382" width="80" height="10" rx="3" fill="#2563EB"/>
</svg>
