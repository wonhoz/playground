<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#030510"/>
  <!-- 플랫폼 -->
  <rect x="100" y="720" width="240" height="40" rx="8" fill="#0D47A1"/>
  <rect x="440" y="600" width="180" height="40" rx="8" fill="#0D47A1"/>
  <rect x="720" y="700" width="200" height="40" rx="8" fill="#0D47A1"/>
  <!-- 장애물 -->
  <rect x="420" y="560" width="50" height="40" rx="6" fill="#1565C0"/>
  <rect x="700" y="660" width="60" height="40" rx="6" fill="#1565C0"/>
  <!-- 점프하는 캐릭터 -->
  <circle cx="360" cy="540" r="50" fill="#42A5F5"/>
  <!-- 몸통 -->
  <rect x="330" y="590" width="60" height="80" rx="12" fill="#42A5F5"/>
  <!-- 팔들 - 점프 자세 -->
  <line x1="330" y1="620" x2="260" y2="570" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <line x1="390" y1="620" x2="460" y2="580" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <!-- 다리들 - 점프 자세 (구부림) -->
  <line x1="342" y1="670" x2="290" y2="740" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <line x1="290" y1="740" x2="310" y2="800" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <line x1="378" y1="670" x2="430" y2="740" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <line x1="430" y1="740" x2="410" y2="800" stroke="#42A5F5" stroke-width="22" stroke-linecap="round"/>
  <!-- 점프 이펙트 -->
  <ellipse cx="360" cy="760" rx="70" ry="20" fill="#42A5F5" opacity="0.3"/>
  <!-- 포물선 궤적 -->
  <path d="M 160 720 Q 360 380 560 600" fill="none" stroke="#42A5F5" stroke-width="4" stroke-dasharray="20,15" opacity="0.5"/>
  <!-- 속도선 -->
  <line x1="80" y1="580" x2="240" y2="580" stroke="#42A5F5" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="620" x2="200" y2="620" stroke="#42A5F5" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="660" x2="220" y2="660" stroke="#42A5F5" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- 별/별똥 이펙트 -->
  <circle cx="560" cy="480" r="8" fill="#42A5F5" opacity="0.8"/>
  <circle cx="600" cy="440" r="5" fill="#42A5F5" opacity="0.5"/>
  <circle cx="640" cy="410" r="4" fill="#42A5F5" opacity="0.3"/>
</svg>
