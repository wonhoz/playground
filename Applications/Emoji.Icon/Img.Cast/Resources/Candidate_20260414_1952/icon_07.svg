<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 노랑+라임 -->
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9E900"/>
      <stop offset="100%" style="stop-color:#76FF03"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 파일 아이콘이 변환 화살표로 회전하며 형식이 바뀌는 모습 -->
  <!-- 원형 화살표 (변환 사이클) -->
  <circle cx="512" cy="480" r="230" fill="none" stroke="white" stroke-width="28" opacity="0.4"/>
  <!-- 원형 진행 화살표 (3/4 호) -->
  <path d="M 512 250 A 230 230 0 1 1 300 660" stroke="white" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 274 636 L 300 666 L 330 644" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 중앙: 변환 아이콘 -->
  <rect x="390" y="400" width="244" height="160" rx="20" fill="white" opacity="0.95"/>
  <text x="512" y="500" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="#558B2F" text-anchor="middle">Cast</text>
  <!-- 원 위 형식 레이블들 -->
  <!-- 상단: SVG -->
  <rect x="436" y="156" width="152" height="64" rx="14" fill="white" opacity="0.95"/>
  <text x="512" y="200" font-family="Segoe UI, sans-serif" font-size="46" font-weight="bold" fill="#1B5E20" text-anchor="middle">SVG</text>
  <!-- 오른쪽: PNG -->
  <rect x="692" y="340" width="152" height="64" rx="14" fill="white" opacity="0.95"/>
  <text x="768" y="384" font-family="Segoe UI, sans-serif" font-size="46" font-weight="bold" fill="#0D47A1" text-anchor="middle">PNG</text>
  <!-- 우하단: ICO -->
  <rect x="620" y="640" width="152" height="64" rx="14" fill="white" opacity="0.95"/>
  <text x="696" y="684" font-family="Segoe UI, sans-serif" font-size="46" font-weight="bold" fill="#BF360C" text-anchor="middle">ICO</text>
  <!-- 왼쪽: JPG -->
  <rect x="180" y="340" width="152" height="64" rx="14" fill="white" opacity="0.95"/>
  <text x="256" y="384" font-family="Segoe UI, sans-serif" font-size="46" font-weight="bold" fill="#880E4F" text-anchor="middle">JPG</text>
  <!-- Layer 3: 하단 부제 -->
  <text x="512" y="860" font-family="Segoe UI, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">Img.Cast</text>
</svg>
