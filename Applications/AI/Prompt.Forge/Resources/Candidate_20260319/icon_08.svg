<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Terminal/CLI look with forge glow -->
  <rect x="80" y="80" width="864" height="864" rx="120" ry="120" fill="#0C0C0C"/>
  <!-- Terminal window -->
  <rect x="120" y="180" width="784" height="580" rx="16" fill="#1A1A1A"/>
  <!-- Title bar -->
  <rect x="120" y="180" width="784" height="48" rx="16" fill="#2A2A2A"/>
  <rect x="120" y="204" width="784" height="24" fill="#2A2A2A"/>
  <!-- Window buttons -->
  <circle cx="164" cy="204" r="12" fill="#FF5F57"/>
  <circle cx="204" cy="204" r="12" fill="#FFBD2E"/>
  <circle cx="244" cy="204" r="12" fill="#28C840"/>
  <!-- Terminal content -->
  <text x="160" y="296" font-family="monospace" font-size="40" fill="#E040FB">&gt; </text>
  <rect x="230" y="266" width="240" height="28" rx="6" fill="#CE93D8" opacity="0.8"/>
  <!-- Cursor blink -->
  <rect x="482" y="266" width="18" height="28" rx="2" fill="#CE93D8"/>
  <!-- Line 2 -->
  <text x="160" y="360" font-family="monospace" font-size="36" fill="#E040FB" opacity="0.6">&gt; </text>
  <rect x="230" y="332" width="320" height="24" rx="6" fill="#CE93D8" opacity="0.5"/>
  <!-- Line 3 output -->
  <rect x="160" y="400" width="480" height="20" rx="6" fill="#F8BBD0" opacity="0.5"/>
  <rect x="160" y="434" width="380" height="20" rx="6" fill="#F8BBD0" opacity="0.4"/>
  <rect x="160" y="468" width="420" height="20" rx="6" fill="#F8BBD0" opacity="0.3"/>
  <!-- Forge glow at bottom -->
  <ellipse cx="512" cy="760" rx="300" ry="40" fill="#FF6D00" opacity="0.4"/>
  <ellipse cx="512" cy="760" rx="200" ry="25" fill="#FF6D00" opacity="0.5"/>
  <ellipse cx="512" cy="760" rx="100" ry="15" fill="#FFAB00" opacity="0.6"/>
</svg>
