<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: 키에서 빛이 뿜어나오는 하이라이트 (metaphor) | 대각선/동적 | 어둠+네온 -->
  <!-- Layer 1: 배경 - 완전한 어둠 -->
  <defs>
    <radialGradient id="glow04a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow04b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow04c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow04d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#050508"/>

  <!-- Layer 2: 키 배치 (4x4 패턴, 어두운 배경에서 특정 키만 빛남) -->
  <!-- 불 꺼진 키들 (행렬) -->
  <!-- 행 1 -->
  <rect x="160" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="262" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="364" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="466" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="568" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="670" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="772" y="200" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>

  <!-- 행 2 -->
  <rect x="160" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="262" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="364" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <!-- D 키 - 초록 빛 -->
  <circle cx="466" cy="332" r="110" fill="url(#glow04a)"/>
  <rect x="466" y="292" width="90" height="80" rx="8" fill="#10B981" stroke="#34D399" stroke-width="2"/>
  <text x="511" y="342" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="white">D</text>
  <rect x="568" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="670" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="772" y="292" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>

  <!-- 행 3 -->
  <rect x="160" y="384" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="262" y="384" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <!-- F 키 - 파랑 빛 -->
  <circle cx="364" cy="424" r="120" fill="url(#glow04b)"/>
  <rect x="364" y="384" width="90" height="80" rx="8" fill="#06B6D4" stroke="#22D3EE" stroke-width="2"/>
  <text x="409" y="434" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="white">F</text>
  <rect x="466" y="384" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="568" y="384" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <!-- P 키 - 시안 빛 -->
  <circle cx="670" cy="424" r="110" fill="url(#glow04b)"/>
  <rect x="670" y="384" width="90" height="80" rx="8" fill="#3B82F6" stroke="#60A5FA" stroke-width="2"/>
  <text x="715" y="434" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="white">P</text>
  <rect x="772" y="384" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>

  <!-- 행 4 -->
  <rect x="160" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <!-- X 키 - 주황 빛 -->
  <circle cx="262" cy="516" r="115" fill="url(#glow04c)"/>
  <rect x="262" y="476" width="90" height="80" rx="8" fill="#F59E0B" stroke="#FCD34D" stroke-width="2"/>
  <text x="307" y="526" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="white">X</text>
  <rect x="364" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="466" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="568" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="670" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="772" y="476" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>

  <!-- 행 5 -->
  <rect x="160" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="262" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="364" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <!-- V 키 - 보라 빛 -->
  <circle cx="466" cy="608" r="125" fill="url(#glow04d)"/>
  <rect x="466" y="568" width="90" height="80" rx="8" fill="#8B5CF6" stroke="#A78BFA" stroke-width="2"/>
  <text x="511" y="618" text-anchor="middle" font-family="Segoe UI,Arial" font-size="36" font-weight="bold" fill="white">V</text>
  <rect x="568" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="670" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>
  <rect x="772" y="568" width="90" height="80" rx="8" fill="#0A0A12" stroke="#151520" stroke-width="1.5"/>

  <!-- Layer 3: 빛 줄기 (대각선/동적 느낌) -->
  <line x1="511" y1="292" x2="409" y2="384" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.4" stroke-dasharray="6,4"/>
  <line x1="511" y1="292" x2="715" y2="384" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.35" stroke-dasharray="6,4"/>
  <line x1="307" y1="476" x2="511" y2="568" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- 하단 텍스트 -->
  <text x="512" y="740" text-anchor="middle" font-family="Segoe UI,Arial" font-size="22" fill="#1A1A2E">───────────────────────</text>
  <text x="512" y="780" text-anchor="middle" font-family="Segoe UI,Arial" font-size="30" font-weight="bold" fill="#2A2040">Key.Map</text>
  <text x="512" y="820" text-anchor="middle" font-family="Segoe UI,Arial" font-size="20" fill="#1A1530">단축키를 키보드로 시각화</text>
</svg>
