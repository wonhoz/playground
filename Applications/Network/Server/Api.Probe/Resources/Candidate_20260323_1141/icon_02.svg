<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#212121"/>
  <!-- Layer 2: 4 method badges in 2x2 -->
  <!-- GET (green) -->
  <rect x="140" y="220" width="320" height="200" rx="20" fill="#4CAF50"/>
  <text x="300" y="338" font-family="Arial" font-size="80" font-weight="900" fill="white" text-anchor="middle">GET</text>
  <!-- POST (blue) -->
  <rect x="564" y="220" width="320" height="200" rx="20" fill="#2196F3"/>
  <text x="724" y="338" font-family="Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">POST</text>
  <!-- PUT (orange) -->
  <rect x="140" y="604" width="320" height="200" rx="20" fill="#FF9800"/>
  <text x="300" y="722" font-family="Arial" font-size="80" font-weight="900" fill="white" text-anchor="middle">PUT</text>
  <!-- DELETE (red) -->
  <rect x="564" y="604" width="320" height="200" rx="20" fill="#F44336"/>
  <text x="724" y="710" font-family="Arial" font-size="56" font-weight="900" fill="white" text-anchor="middle">DELETE</text>
</svg>