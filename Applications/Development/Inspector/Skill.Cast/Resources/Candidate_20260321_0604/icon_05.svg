<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sc5-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="sc5-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2840"/>
      <stop offset="100%" stop-color="#0E1A2E"/>
    </linearGradient>
    <linearGradient id="sc5-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3020"/>
      <stop offset="100%" stop-color="#0F2015"/>
    </linearGradient>
    <filter id="sc5-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#sc5-clip)">
    <!-- Background: Dark Slate -->
    <rect width="1024" height="1024" fill="url(#sc5-bg)"/>

    <!-- Dashboard panel (lime green) -->
    <rect x="240" y="340" width="544" height="380" rx="20" fill="url(#sc5-panel)" stroke="#39FF14" stroke-width="3" opacity="0.95"/>

    <!-- Dashboard header bar -->
    <rect x="240" y="340" width="544" height="56" rx="20" fill="#39FF14" opacity="0.15"/>
    <rect x="240" y="376" width="544" height="20" fill="#39FF14" opacity="0.15"/>
    <!-- Header dots -->
    <circle cx="272" cy="368" r="10" fill="#FF5555" opacity="0.9"/>
    <circle cx="302" cy="368" r="10" fill="#FFAA00" opacity="0.9"/>
    <circle cx="332" cy="368" r="10" fill="#39FF14" opacity="0.9"/>
    <!-- Header title -->
    <rect x="370" y="360" width="180" height="16" rx="8" fill="#39FF14" opacity="0.6"/>

    <!-- Dashboard widgets row 1 -->
    <g filter="url(#sc5-glow)">
      <!-- Widget 1: Commands count -->
      <rect x="264" y="418" width="150" height="90" rx="10" fill="#1A2A18" stroke="#39FF14" stroke-width="2"/>
      <text x="339" y="450" font-family="monospace" font-size="11" fill="#39FF14" text-anchor="middle" opacity="0.8">Commands</text>
      <text x="339" y="485" font-family="monospace" font-size="28" fill="#39FF14" text-anchor="middle" font-weight="bold">12</text>

      <!-- Widget 2: Skills count -->
      <rect x="434" y="418" width="150" height="90" rx="10" fill="#1A2A18" stroke="#00E5FF" stroke-width="2"/>
      <text x="509" y="450" font-family="monospace" font-size="11" fill="#00E5FF" text-anchor="middle" opacity="0.8">Skills</text>
      <text x="509" y="485" font-family="monospace" font-size="28" fill="#00E5FF" text-anchor="middle" font-weight="bold">7</text>

      <!-- Widget 3: Memory -->
      <rect x="604" y="418" width="150" height="90" rx="10" fill="#1A2A18" stroke="#FF9040" stroke-width="2"/>
      <text x="679" y="450" font-family="monospace" font-size="11" fill="#FF9040" text-anchor="middle" opacity="0.8">Memory</text>
      <text x="679" y="485" font-family="monospace" font-size="28" fill="#FF9040" text-anchor="middle" font-weight="bold">3</text>
    </g>

    <!-- Dashboard log/list area -->
    <rect x="264" y="528" width="490" height="168" rx="10" fill="#0A1A08" stroke="#39FF14" stroke-width="1" opacity="0.8"/>
    <!-- Log lines -->
    <rect x="280" y="546" width="60" height="12" rx="6" fill="#39FF14" opacity="0.7"/>
    <rect x="348" y="546" width="200" height="12" rx="6" fill="#39FF14" opacity="0.5"/>
    <rect x="280" y="568" width="60" height="12" rx="6" fill="#00E5FF" opacity="0.7"/>
    <rect x="348" y="568" width="160" height="12" rx="6" fill="#00E5FF" opacity="0.4"/>
    <rect x="280" y="590" width="60" height="12" rx="6" fill="#FF9040" opacity="0.7"/>
    <rect x="348" y="590" width="220" height="12" rx="6" fill="#FF9040" opacity="0.4"/>
    <rect x="280" y="612" width="60" height="12" rx="6" fill="#39FF14" opacity="0.6"/>
    <rect x="348" y="612" width="180" height="12" rx="6" fill="#39FF14" opacity="0.4"/>
    <rect x="280" y="634" width="60" height="12" rx="6" fill="#00E5FF" opacity="0.5"/>
    <rect x="348" y="634" width="240" height="12" rx="6" fill="#00E5FF" opacity="0.3"/>
    <rect x="280" y="656" width="60" height="12" rx="6" fill="#7B3FBE" opacity="0.7"/>
    <rect x="348" y="656" width="150" height="12" rx="6" fill="#7B3FBE" opacity="0.4"/>
    <rect x="280" y="678" width="60" height="12" rx="6" fill="#39FF14" opacity="0.4"/>
    <rect x="348" y="678" width="190" height="12" rx="6" fill="#39FF14" opacity="0.3"/>

    <!-- AI Brain icon above dashboard -->
    <g filter="url(#sc5-glow)">
      <ellipse cx="480" cy="265" rx="70" ry="58" fill="#39FF14" opacity="0.9"/>
      <ellipse cx="544" cy="265" rx="70" ry="58" fill="#39FF14" opacity="0.9"/>
      <rect x="508" y="218" width="8" height="94" rx="4" fill="#0E1A2E" opacity="0.6"/>
      <!-- Brain wrinkles -->
      <path d="M420 255 Q460 240 500 255 Q540 240 580 255" stroke="#0E1A2E" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M425 278 Q470 262 512 278 Q554 262 598 278" stroke="#0E1A2E" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
      <!-- Connector stem -->
      <rect x="500" y="318" width="24" height="28" rx="6" fill="#39FF14" opacity="0.8"/>
    </g>

    <!-- Corner accents -->
    <circle cx="820" cy="240" r="18" fill="#39FF14" opacity="0.2"/>
    <circle cx="210" cy="800" r="24" fill="#00E5FF" opacity="0.15"/>
  </g>
</svg>
