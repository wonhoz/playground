<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1a4e"/>
    </linearGradient>
    <radialGradient id="lens1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#331a5a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Binoculars body -->
  <rect x="80" y="180" width="152" height="100" rx="20" fill="#2a1a44" stroke="#8844ff" stroke-width="3"/>
  <rect x="280" y="180" width="152" height="100" rx="20" fill="#2a1a44" stroke="#8844ff" stroke-width="3"/>
  <!-- Bridge -->
  <rect x="196" y="210" width="120" height="40" rx="8" fill="#221634" stroke="#6633cc" stroke-width="2"/>
  <!-- Lens circles -->
  <circle cx="156" cy="230" r="55" fill="url(#lens1)" stroke="#8844ff" stroke-width="5"/>
  <circle cx="356" cy="230" r="55" fill="url(#lens1)" stroke="#8844ff" stroke-width="5"/>
  <!-- Inner lens rings -->
  <circle cx="156" cy="230" r="40" fill="none" stroke="#6633cc" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="356" cy="230" r="40" fill="none" stroke="#6633cc" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Icon seen through lens -->
  <text x="131" y="242" font-family="serif" font-size="38">⭐</text>
  <text x="331" y="242" font-family="serif" font-size="38">🔍</text>
  <!-- Lens shine -->
  <ellipse cx="138" cy="210" rx="14" ry="8" fill="white" fill-opacity="0.15" transform="rotate(-30 138 210)"/>
  <ellipse cx="338" cy="210" rx="14" ry="8" fill="white" fill-opacity="0.15" transform="rotate(-30 338 210)"/>
  <!-- Ground strap -->
  <path d="M 80 230 Q 60 340 120 380 L 180 380 Q 200 380 200 360" fill="none" stroke="#6633cc" stroke-width="6" stroke-linecap="round"/>
  <path d="M 432 230 Q 452 340 392 380 L 332 380 Q 312 380 312 360" fill="none" stroke="#6633cc" stroke-width="6" stroke-linecap="round"/>
  <!-- Title -->
  <text x="160" y="460" font-family="sans-serif" font-size="26" fill="#8844ff" font-weight="bold">Icon.Hunt</text>
</svg>