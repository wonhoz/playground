<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0800"/>
  <!-- 물방울 + 모래 합류: 물 + 모래 혼합 -->
  <!-- 왼쪽: 물방울 -->
  <path d="M300,180 Q260,300 250,400 Q240,500 300,560 Q360,620 420,560 Q480,500 470,400 Q460,300 420,180 Q360,140 300,180 Z" fill="#FFE082" opacity="0.7"/>
  <!-- 물방울 하이라이트 -->
  <ellipse cx="320" cy="290" rx="26" ry="50" fill="#FFE082" opacity="0.5" transform="rotate(-20,320,290)"/>
  <!-- 오른쪽: 모래 더미 -->
  <path d="M680,560 Q580,560 560,580 Q540,600 560,620 L800,620 Q820,600 800,580 Q780,560 680,560 Z" fill="#F9A825"/>
  <path d="M680,480 Q620,480 600,520 Q590,545 610,560 L750,560 Q770,545 760,520 Q740,480 680,480 Z" fill="#F9A825" opacity="0.85"/>
  <path d="M680,420 Q635,420 620,455 Q610,480 630,490 L730,490 Q750,480 740,455 Q725,420 680,420 Z" fill="#FFE082" opacity="0.7"/>
  <!-- 합류 지점 -->
  <path d="M420,560 Q480,600 520,620 Q560,640 560,580" stroke="#F9A825" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M420,560 Q460,580 500,590 Q540,600 560,580" stroke="#FFE082" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 혼합 입자들 (합류 지점) -->
  <circle cx="500" cy="600" r="14" fill="#FFE082"/>
  <circle cx="530" cy="590" r="11" fill="#F9A825"/>
  <circle cx="510" cy="620" r="12" fill="#FFE082" opacity="0.8"/>
  <!-- 혼합 결과 (바닥) -->
  <path d="M400,720 Q512,680 624,720 Q680,740 720,780 L300,780 Q340,740 400,720 Z" fill="#F9A825" opacity="0.6"/>
  <path d="M420,740 Q512,710 600,740 Q640,755 660,780 L360,780 Q380,755 420,740 Z" fill="#FFE082" opacity="0.4"/>
  <!-- 혼합 입자 -->
  <circle cx="420" cy="760" r="10" fill="#FFE082" opacity="0.7"/>
  <circle cx="512" cy="750" r="12" fill="#F9A825" opacity="0.7"/>
  <circle cx="604" cy="760" r="10" fill="#FFE082" opacity="0.7"/>
</svg>
