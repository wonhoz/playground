  <text x="652" y="484" font-family="'Courier New', monospace" font-size="28" fill="#66EEEE">2024-07-18.jpg</text>

  <!-- 파일 카드 5 -->
  <rect x="624" y="530" width="340" height="68" rx="10" fill="url(#card-order-06)" stroke="#00BBBB" stroke-width="2"/>
  <text x="652" y="574" font-family="'Courier New', monospace" font-size="28" fill="#66EEEE">2024-07-19.mp4</text>

  <!-- 정렬 아이콘 (오른쪽 영역의 작은 체크 표시들) -->
  <circle cx="612" cy="204" r="10" fill="#00CCCC"/>
  <path d="M 606 204 L 610 210 L 618 196" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="612" cy="294" r="10" fill="#00CCCC"/>
  <path d="M 606 294 L 610 300 L 618 286" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="612" cy="384" r="10" fill="#00CCCC"/>
  <path d="M 606 384 L 610 390 L 618 376" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="612" cy="474" r="10" fill="#00CCCC"/>
  <path d="M 606 474 L 610 480 L 618 466" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="612" cy="564" r="10" fill="#00CCCC"/>
  <path d="M 606 564 L 610 570 L 618 556" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 구분선 -->
  <line x1="440" y1="100" x2="440" y2="700" stroke="#446644" stroke-width="2" stroke-dasharray="12,8" opacity="0.5"/>

  <!-- 하단 바 -->
  <rect x="80" y="790" width="864" height="80" rx="16" fill="#003333" stroke="#00CCCC" stroke-width="2"/>
  <text x="512" y="840" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#00CCCC">혼돈 → 정돈</text>
