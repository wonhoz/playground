<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Win.Scope - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; color: #aaa; margin-bottom: 8px; }
    p  { text-align: center; color: #555; margin-bottom: 24px; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
    .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
    .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Win.Scope — 아이콘 후보 10종</h1>
  <p>Windows 창 목록·정보 조회 도구</p>
  <div class="grid">
    <div class="item"><img src="candidate_01_window_list.svg" alt="01"/><span>01 window_list</span></div>
    <div class="item"><img src="candidate_02_crosshair_target.svg" alt="02"/><span>02 crosshair_target</span></div>
    <div class="item"><img src="candidate_03_desktop_inspector.svg" alt="03"/><span>03 desktop_inspector</span></div>
    <div class="item"><img src="candidate_04_process_tree.svg" alt="04"/><span>04 process_tree</span></div>
    <div class="item"><img src="candidate_05_zoom_lens.svg" alt="05"/><span>05 zoom_lens</span></div>
    <div class="item"><img src="candidate_06_layered_windows.svg" alt="06"/><span>06 layered_windows</span></div>
    <div class="item"><img src="candidate_07_window_control_panel.svg" alt="07"/><span>07 window_control_panel</span></div>
    <div class="item"><img src="candidate_08_opacity_slider.svg" alt="08"/><span>08 opacity_slider</span></div>
    <div class="item"><img src="candidate_09_window_manager_lens.svg" alt="09"/><span>09 window_manager_lens</span></div>
    <div class="item"><img src="candidate_10_window_stack_viewer.svg" alt="10"/><span>10 window_stack_viewer</span></div>
  </div>
</body>
</html>
