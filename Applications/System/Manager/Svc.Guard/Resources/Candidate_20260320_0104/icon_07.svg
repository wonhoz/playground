<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: 서비스 흐름 + 방패 (flow + shield: protected pipeline) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030810"/>
  <!-- 흐름 파이프 상단 -->
  <rect x="180" y="260" width="200" height="72" rx="36" fill="#1A237E"/>
  <!-- 화살표 -->
  <polygon points="402,270 440,296 402,322" fill="#5C6BC0"/>
  <!-- 파이프 중단 (방패 앞) -->
  <rect x="442" y="260" width="140" height="72" rx="36" fill="#1A237E"/>
  <!-- 화살표 2 -->
  <polygon points="604,270 642,296 604,322" fill="#5C6BC0"/>
  <!-- 파이프 하단 -->
  <rect x="644" y="260" width="200" height="72" rx="36" fill="#1A237E"/>
  <!-- 방패 (파이프 위에 오버레이) -->
  <path d="M512 760 L320 650 L320 430 L512 350 L704 430 L704 650 Z" fill="#1A237E" opacity="0.9"/>
  <path d="M512 710 L355 616 L355 450 L512 385 L669 450 L669 616 Z" fill="none" stroke="#5C6BC0" stroke-width="14"/>
  <!-- 방패 내부 체크 -->
  <polyline points="420,560 490,630 620,480" fill="none" stroke="#5C6BC0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 방패 상단 포인트 표시 -->
  <circle cx="512" cy="340" r="16" fill="#5C6BC0" opacity="0.7"/>
</svg>
