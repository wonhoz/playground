<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0A0F"/>
  <!-- Checklist paper -->
  <rect x="240" y="180" width="544" height="664" rx="28" fill="#3949AB" opacity="0.85"/>
  <rect x="260" y="200" width="504" height="624" rx="18" fill="#0A0A0F" opacity="0.55"/>
  <!-- Check rows -->
  <!-- Row 1: checked -->
  <rect x="310" y="290" width="48" height="48" rx="10" fill="#7986CB"/>
  <polyline points="320,316 336,332 356,308" fill="none" stroke="#0A0A0F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="390" y="302" width="300" height="22" rx="8" fill="#7986CB"/>
  <!-- Row 2: checked -->
  <rect x="310" y="374" width="48" height="48" rx="10" fill="#7986CB"/>
  <polyline points="320,400 336,416 356,392" fill="none" stroke="#0A0A0F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="390" y="386" width="240" height="22" rx="8" fill="#7986CB" opacity="0.7"/>
  <!-- Row 3: unchecked (event) -->
  <rect x="310" y="458" width="48" height="48" rx="10" fill="none" stroke="#7986CB" stroke-width="6"/>
  <rect x="390" y="470" width="280" height="22" rx="8" fill="#7986CB" opacity="0.5"/>
  <!-- Row 4: alert row -->
  <rect x="310" y="542" width="48" height="48" rx="10" fill="#7986CB" opacity="0.4"/>
  <rect x="390" y="554" width="320" height="22" rx="8" fill="#7986CB" opacity="0.35"/>
  <!-- Row 5 -->
  <rect x="310" y="626" width="48" height="48" rx="10" fill="none" stroke="#7986CB" stroke-width="6" opacity="0.5"/>
  <rect x="390" y="638" width="200" height="22" rx="8" fill="#7986CB" opacity="0.3"/>
  <!-- Alert badge -->
  <circle cx="760" cy="270" r="60" fill="#7986CB"/>
  <rect x="743" y="218" width="34" height="90" rx="12" fill="#0A0A0F"/>
  <circle cx="760" cy="334" r="16" fill="#0A0A0F"/>
</svg>
