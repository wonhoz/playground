<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#1a0500"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ee0979"/>
      <stop offset="40%" stop-color="#ff6a00"/>
      <stop offset="70%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#fff8c0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c0000a"/>
      <stop offset="50%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flameblur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Ground/base -->
  <ellipse cx="256" cy="450" rx="180" ry="20" fill="#300000" opacity="0.8"/>

  <!-- Outer flame -->
  <path d="M256,100 Q350,200 340,320 Q330,420 256,440 Q182,420 172,320 Q162,200 256,100 Z" fill="url(#flame2)" filter="url(#glow)"/>
  <!-- Mid flame -->
  <path d="M256,140 Q330,230 318,330 Q306,410 256,430 Q206,410 194,330 Q182,230 256,140 Z" fill="url(#flame1)" filter="url(#glow)"/>
  <!-- Inner flame core -->
  <path d="M256,200 Q300,270 290,350 Q280,420 256,430 Q232,420 222,350 Q212,270 256,200 Z" fill="#ffd200" opacity="0.7" filter="url(#glow)"/>
  <!-- White core -->
  <ellipse cx="256" cy="380" rx="30" ry="45" fill="#fff" opacity="0.4" filter="url(#glow)"/>

  <!-- Formula overlaid on flame -->
  <!-- Pi symbol shape -->
  <line x1="185" y1="280" x2="240" y2="280" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  <line x1="203" y1="280" x2="203" y2="340" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  <line x1="222" y1="280" x2="222" y2="340" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

  <!-- Sigma shape -->
  <path d="M272,275 L320,275 L295,310 L320,345 L272,345" fill="none" stroke="#ffd200" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#glow)"/>

  <!-- Divider line -->
  <rect x="185" y="258" width="135" height="4" rx="2" fill="#fff" opacity="0.4"/>

  <!-- Floating operator particles -->
  <circle cx="155" cy="180" r="6" fill="#ffd200" filter="url(#glow)"/>
  <line x1="151" y1="180" x2="159" y2="180" stroke="#ffd200" stroke-width="2" filter="url(#glow)"/>
  <line x1="155" y1="176" x2="155" y2="184" stroke="#ffd200" stroke-width="2" filter="url(#glow)"/>

  <circle cx="360" cy="200" r="6" fill="#ee0979" filter="url(#glow)"/>
  <line x1="356" y1="200" x2="364" y2="200" stroke="#ee0979" stroke-width="2" filter="url(#glow)"/>

  <circle cx="140" cy="350" r="6" fill="#56CCF2" filter="url(#glow)"/>
  <line x1="136" y1="347" x2="144" y2="353" stroke="#56CCF2" stroke-width="2" filter="url(#glow)"/>
  <line x1="144" y1="347" x2="136" y2="353" stroke="#56CCF2" stroke-width="2" filter="url(#glow)"/>

  <circle cx="375" cy="340" r="6" fill="#56ab2f" filter="url(#glow)"/>
  <line x1="371" y1="338" x2="379" y2="342" stroke="#56ab2f" stroke-width="2" filter="url(#glow)"/>
  <line x1="371" y1="342" x2="379" y2="338" stroke="#56ab2f" stroke-width="2" filter="url(#glow)"/>
</svg>
