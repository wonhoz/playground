<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Neon.Slice | 폭탄 아이템 (감점) | 중앙심볼 | #1A0000 -->
  <defs>
    <radialGradient id="bombGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <filter id="bombGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0000"/>
  <!-- Layer 2: Bomb body -->
  <circle cx="512" cy="560" r="220" fill="url(#bombGrad)" stroke="#444" stroke-width="6"/>
  <!-- Shine on bomb -->
  <ellipse cx="440" cy="480" rx="60" ry="40" fill="white" opacity="0.1" transform="rotate(-20 440 480)"/>
  <!-- Fuse -->
  <path d="M512 340 Q560 280 600 240 Q640 200 660 200" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <!-- Fuse spark -->
  <circle cx="660" cy="200" r="16" fill="#FFD700" filter="url(#bombGlow)"/>
  <circle cx="660" cy="200" r="28" fill="#FFA500" opacity="0.5" filter="url(#bombGlow)"/>
  <!-- Spark rays -->
  <line x1="660" y1="200" x2="690" y2="170" stroke="#FFD700" stroke-width="5" stroke-linecap="round" filter="url(#bombGlow)"/>
  <line x1="660" y1="200" x2="700" y2="200" stroke="#FFD700" stroke-width="5" stroke-linecap="round" filter="url(#bombGlow)"/>
  <line x1="660" y1="200" x2="690" y2="230" stroke="#FFD700" stroke-width="4" stroke-linecap="round" filter="url(#bombGlow)"/>
  <line x1="660" y1="200" x2="640" y2="168" stroke="#FF4500" stroke-width="4" stroke-linecap="round" filter="url(#bombGlow)"/>
  <!-- Layer 3: Warning label -->
  <!-- Triangle warning -->
  <polygon points="512,680 380,840 644,840" fill="none" stroke="#EF4444" stroke-width="8"/>
  <text x="512" y="826" font-family="Arial,sans-serif" font-size="52" fill="#EF4444" text-anchor="middle" font-weight="bold">!</text>
  <!-- Score penalty -->
  <text x="512" y="940" font-family="Arial,sans-serif" font-size="40" fill="#EF4444" text-anchor="middle" font-weight="bold" filter="url(#bombGlow)">-10</text>
</svg>
