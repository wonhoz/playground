<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 신문 레이아웃 — 텍스트로 구성된 이미지 | 레이어드 | #F5F0E8 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#F5F0E8"/>
  <!-- Layer 2: Newspaper-style layout with ASCII art as "photo" -->
  <!-- Newspaper background -->
  <rect x="180" y="180" width="664" height="664" rx="12" fill="#FAF7F0" stroke="#D1C4A0" stroke-width="4"/>
  <!-- Header / masthead -->
  <rect x="180" y="180" width="664" height="60" fill="#1C1C1C" rx="12"/>
  <text x="512" y="222" font-family="serif" font-size="30" fill="white" text-anchor="middle" font-weight="bold">ASCII ART GAZETTE</text>
  <!-- Column divider -->
  <line x1="460" y1="254" x2="460" y2="820" stroke="#D1C4A0" stroke-width="2"/>
  <!-- Left column: ASCII art "photo" -->
  <rect x="196" y="264" width="248" height="200" rx="4" fill="#F0EBE0" stroke="#C0B090" stroke-width="1"/>
  <!-- ASCII art in box -->
  <text x="200" y="286" font-family="monospace" font-size="10" fill="#374151">  __  _ _  _</text>
  <text x="200" y="298" font-family="monospace" font-size="10" fill="#374151"> / _|| | || |</text>
  <text x="200" y="310" font-family="monospace" font-size="10" fill="#374151">| |_ | | || |</text>
  <text x="200" y="322" font-family="monospace" font-size="10" fill="#374151">|  _|| | || |</text>
  <text x="200" y="334" font-family="monospace" font-size="10" fill="#374151">|_|  |___||_|</text>
  <text x="200" y="360" font-family="monospace" font-size="10" fill="#4B5563">░░░▒▒▒▓▓▓███</text>
  <text x="200" y="372" font-family="monospace" font-size="10" fill="#4B5563">░▒▓█ landscape</text>
  <text x="200" y="384" font-family="monospace" font-size="10" fill="#6B7280">▓▓▓▓▓▓▓▓▓▓▓▓</text>
  <text x="200" y="396" font-family="monospace" font-size="10" fill="#9CA3AF">░░░░░░░░░░░░░</text>
  <text x="200" y="408" font-family="monospace" font-size="10" fill="#9CA3AF">▒▒▒▒▒▒▒▒▒▒▒▒</text>
  <text x="200" y="432" font-family="monospace" font-size="10" fill="#374151">~~~▓▓▓▓▓▓~~~</text>
  <text x="200" y="444" font-family="monospace" font-size="10" fill="#4B5563">░▒▓▓▓▒▒░░░░░</text>
  <text x="200" y="456" font-family="monospace" font-size="10" fill="#6B7280">▓▓▒▒░░░░░▒▒▓</text>
  <!-- Photo caption -->
  <text x="320" y="480" font-family="serif" font-size="12" fill="#6B7280" text-anchor="middle" font-style="italic">ASCII 변환 결과물</text>
  <!-- Right column: Text content -->
  <text x="474" y="290" font-family="serif" font-size="18" fill="#1C1C1C" font-weight="bold">ASCII Art 변환기</text>
  <rect x="474" y="298" width="350" height="2" fill="#1C1C1C"/>
  <text x="474" y="320" font-family="serif" font-size="12" fill="#374151">이미지를 텍스트 아트로</text>
  <text x="474" y="336" font-family="serif" font-size="12" fill="#374151">변환하는 새로운 도구가</text>
  <text x="474" y="352" font-family="serif" font-size="12" fill="#374151">출시되었습니다. 이 앱은</text>
  <text x="474" y="368" font-family="serif" font-size="12" fill="#374151">어떤 이미지도 ASCII 문자</text>
  <text x="474" y="384" font-family="serif" font-size="12" fill="#374151">로 변환할 수 있습니다.</text>
  <!-- Layer 3: Publication date -->
  <text x="512" y="840" font-family="serif" font-size="14" fill="#9CA3AF" text-anchor="middle" font-style="italic">ASCII Art Generator — 모든 이미지를 텍스트로</text>
</svg>
