<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0040"/>
  <!-- Layer 2: 완성된 크로스워드 + 방송 전파 (Cast) -->
  <!-- 전파 원들 (방송 효과) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#7C4DFF" stroke-width="5" opacity="0.35"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#7C4DFF" stroke-width="6" opacity="0.5"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#9C27B0" stroke-width="8" opacity="0.7"/>
  <!-- 중앙 크로스워드 격자 -->
  <rect x="344" y="344" width="336" height="336" rx="12" fill="#2D0060"/>
  <!-- 격자 안 글자들 (3×3) -->
  <text x="400" y="434" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#CE93D8" text-anchor="middle">C</text>
  <text x="512" y="434" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">A</text>
  <text x="624" y="434" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#CE93D8" text-anchor="middle">S</text>
  <text x="400" y="544" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="512" y="544" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#E040FB" text-anchor="middle">+</text>
  <text x="624" y="544" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">T</text>
  <text x="400" y="654" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#CE93D8" text-anchor="middle">T</text>
  <text x="512" y="654" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="white" text-anchor="middle">W</text>
  <text x="624" y="654" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#CE93D8" text-anchor="middle">O</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="840" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#E040FB" text-anchor="middle">CROSSWORD.CAST</text>
</svg>
