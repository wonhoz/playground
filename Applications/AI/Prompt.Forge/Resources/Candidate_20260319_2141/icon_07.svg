<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Crystal gem — crystallized prompt (refined, faceted knowledge) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#05001A"/>
  <!-- Gem outline -->
  <path d="M512 160 L760 380 L680 780 L344 780 L264 380 Z" fill="#1A0050" stroke="#B39DDB" stroke-width="22"/>
  <!-- Gem facets -->
  <line x1="512" y1="160" x2="512" y2="780" stroke="#7C4DFF" stroke-width="10" opacity="0.4"/>
  <line x1="264" y1="380" x2="760" y2="380" stroke="#7C4DFF" stroke-width="10" opacity="0.4"/>
  <line x1="512" y1="160" x2="264" y2="380" stroke="#9575CD" stroke-width="12" opacity="0.5"/>
  <line x1="512" y1="160" x2="760" y2="380" stroke="#9575CD" stroke-width="12" opacity="0.5"/>
  <line x1="264" y1="380" x2="344" y2="780" stroke="#9575CD" stroke-width="10" opacity="0.4"/>
  <line x1="760" y1="380" x2="680" y2="780" stroke="#9575CD" stroke-width="10" opacity="0.4"/>
  <!-- Diagonal facecut -->
  <line x1="512" y1="160" x2="344" y2="780" stroke="#7C4DFF" stroke-width="8" opacity="0.3"/>
  <line x1="512" y1="160" x2="680" y2="780" stroke="#7C4DFF" stroke-width="8" opacity="0.3"/>
  <!-- Facet fills (slight color diff) -->
  <path d="M512 160 L760 380 L512 380 Z" fill="#7C4DFF" opacity="0.12"/>
  <path d="M264 380 L512 380 L344 780 Z" fill="#5C35B1" opacity="0.1"/>
  <path d="M512 380 L760 380 L680 780 Z" fill="#9C4DFF" opacity="0.08"/>
  <!-- Sparkle top -->
  <path d="M512 180 L518 210 L548 216 L518 222 L512 252 L506 222 L476 216 L506 210 Z" fill="#EDE7F6" opacity="0.9"/>
  <!-- Inner glow -->
  <circle cx="512" cy="480" r="60" fill="#7C4DFF" opacity="0.15"/>
  <!-- Small sparkles -->
  <circle cx="700" cy="300" r="8" fill="#EDE7F6" opacity="0.6"/>
  <circle cx="330" cy="460" r="6" fill="#EDE7F6" opacity="0.5"/>
</svg>
