<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080A00"/>
  <!-- Hammer -->
  <!-- Handle -->
  <rect x="480" y="400" width="36" height="380" rx="18" fill="#33691E" transform="rotate(30 498 590)"/>
  <!-- Hammer head -->
  <rect x="520" y="160" width="220" height="140" rx="20" fill="#33691E"/>
  <!-- Hammer face hitting -->
  <rect x="520" y="280" width="220" height="40" rx="10" fill="#AED581" opacity="0.8"/>
  <!-- Key being struck -->
  <rect x="220" y="400" width="300" height="220" rx="28" fill="#33691E" opacity="0.8"/>
  <rect x="242" y="422" width="256" height="176" rx="18" fill="#080A00"/>
  <!-- Impact wave from key -->
  <path d="M520 500 Q560 460 600 500 Q640 540 680 500" fill="none" stroke="#AED581" stroke-width="14" opacity="0.7"/>
  <path d="M540 540 Q590 490 640 540 Q690 590 740 540" fill="none" stroke="#AED581" stroke-width="10" opacity="0.5"/>
  <!-- Stars from impact -->
  <circle cx="620" cy="420" r="10" fill="#AED581" opacity="0.8"/>
  <circle cx="660" cy="380" r="8" fill="#AED581" opacity="0.6"/>
  <circle cx="700" cy="420" r="7" fill="#AED581" opacity="0.5"/>
  <!-- Key symbol -->
  <line x1="290" y1="494" x2="430" y2="494" stroke="#AED581" stroke-width="18" stroke-linecap="round"/>
  <line x1="310" y1="534" x2="410" y2="534" stroke="#AED581" stroke-width="18" stroke-linecap="round"/>
</svg>
