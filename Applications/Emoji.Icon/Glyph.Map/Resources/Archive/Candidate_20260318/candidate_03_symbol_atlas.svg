<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 아틀라스 원형 배치 -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="70" fill="none" stroke="#FDE68A" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="240" r="35" fill="#FBBF24" opacity="0.1" filter="url(#glow)"/>
  <!-- 중앙 심볼 -->
  <text x="256" y="256" text-anchor="middle" font-size="32" font-family="Segoe UI Emoji">🗺️</text>
  <!-- 주변 심볼들 -->
  <text x="256" y="148" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">⭐</text>
  <text x="352" y="188" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">♠</text>
  <text x="352" y="296" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">♦</text>
  <text x="256" y="336" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">♣</text>
  <text x="160" y="296" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">♥</text>
  <text x="160" y="188" text-anchor="middle" font-size="22" font-family="Segoe UI Emoji">☯</text>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">SYMBOL ATLAS</text>
</svg>
