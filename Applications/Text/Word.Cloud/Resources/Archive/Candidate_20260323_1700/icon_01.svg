<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0C1445"/>
  <!-- Layer 2: 타원형 워드 클라우드 -->
  <ellipse cx="512" cy="512" rx="440" ry="320" fill="#1E3A8A" opacity="0.5"/>
  <!-- 큰 단어들 -->
  <text x="512" y="420" font-size="120" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial">word</text>
  <text x="280" y="340" font-size="72" fill="#93C5FD" text-anchor="middle" font-weight="bold" font-family="Arial">cloud</text>
  <text x="760" y="360" font-size="60" fill="#60A5FA" text-anchor="middle" font-weight="bold" font-family="Arial">text</text>
  <text x="200" y="520" font-size="50" fill="#BFDBFE" text-anchor="middle" font-family="Arial">data</text>
  <text x="820" y="500" font-size="44" fill="#93C5FD" text-anchor="middle" font-family="Arial">font</text>
  <text x="512" y="590" font-size="80" fill="#DBEAFE" text-anchor="middle" font-weight="bold" font-family="Arial">visual</text>
  <text x="300" y="650" font-size="42" fill="#BFDBFE" text-anchor="middle" font-family="Arial">big</text>
  <text x="680" y="640" font-size="38" fill="#93C5FD" text-anchor="middle" font-family="Arial">color</text>
  <text x="160" y="620" font-size="32" fill="#60A5FA" text-anchor="middle" font-family="Arial">size</text>
  <text x="860" y="600" font-size="30" fill="#60A5FA" text-anchor="middle" font-family="Arial">mix</text>
  <!-- Layer 3: 테두리 타원 -->
  <ellipse cx="512" cy="512" rx="440" ry="320" fill="none" stroke="#3B82F6" stroke-width="12"/>
  <!-- 하단 단어들 (작게) -->
  <text x="400" y="700" font-size="28" fill="#3B82F6" text-anchor="middle" font-family="Arial">analyze</text>
  <text x="620" y="710" font-size="24" fill="#3B82F6" text-anchor="middle" font-family="Arial">render</text>
</svg>
