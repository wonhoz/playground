<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 울트라 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#000010"/>
  <!-- Layer 2: 화려한 3색 슬라이스 폭발 -->
  <!-- 슬라이스 1 (좌상→우하) -->
  <line x1="160" y1="260" x2="764" y2="864" stroke="#FF0066" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="260" x2="764" y2="864" stroke="#FF0066" stroke-width="60" stroke-linecap="round" opacity="0.15"/>
  <!-- 슬라이스 2 (우상→좌하) -->
  <line x1="864" y1="260" x2="260" y2="864" stroke="#00FFFF" stroke-width="10" stroke-linecap="round"/>
  <line x1="864" y1="260" x2="260" y2="864" stroke="#00FFFF" stroke-width="60" stroke-linecap="round" opacity="0.15"/>
  <!-- 슬라이스 3 (수평) -->
  <line x1="160" y1="512" x2="864" y2="512" stroke="#FFFF00" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="512" x2="864" y2="512" stroke="#FFFF00" stroke-width="60" stroke-linecap="round" opacity="0.15"/>
  <!-- 중앙 폭발 -->
  <circle cx="512" cy="512" r="100" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="512" cy="512" r="140" fill="none" stroke="#FFFF00" stroke-width="8" opacity="0.7"/>
  <circle cx="512" cy="512" r="180" fill="none" stroke="#00FFFF" stroke-width="5" opacity="0.5"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#FF0066" stroke-width="4" opacity="0.3"/>
  <!-- 교차점 포인트들 -->
  <circle cx="462" cy="320" r="16" fill="#FF0066" opacity="0.9"/>
  <circle cx="562" cy="700" r="16" fill="#00FFFF" opacity="0.9"/>
  <circle cx="320" cy="630" r="12" fill="#FFFF00" opacity="0.9"/>
  <circle cx="700" cy="390" r="12" fill="#FFFF00" opacity="0.9"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="890" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FF0066" text-anchor="middle">NEON.SLICE</text>
</svg>
