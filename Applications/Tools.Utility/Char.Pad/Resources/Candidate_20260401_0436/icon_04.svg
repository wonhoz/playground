<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F50057"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg4)"/>
  <!-- Layer 2: Magic wand (diagonal, white/gold) -->
  <!-- Wand stick -->
  <rect x="180" y="480" width="580" height="56" rx="28" fill="white" transform="rotate(-40 512 512)"/>
  <!-- Wand handle -->
  <rect x="170" y="470" width="120" height="70" rx="20" fill="#FFD600" transform="rotate(-40 512 512)"/>
  <!-- Wand tip star -->
  <circle cx="750" cy="270" r="48" fill="#FFD600"/>
  <text x="750" y="270" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="white">✦</text>
  <!-- Layer 3: Special chars orbiting the wand -->
  <!-- © upper left -->
  <circle cx="220" cy="280" r="68" fill="#FF6F00" opacity="0.9"/>
  <text x="220" y="280" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">©</text>
  <!-- ∑ upper right -->
  <circle cx="820" cy="350" r="58" fill="#FFD600" opacity="0.9"/>
  <text x="820" y="350" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="#BF360C">∑</text>
  <!-- → middle right -->
  <circle cx="860" cy="560" r="52" fill="#00E5FF" opacity="0.9"/>
  <text x="860" y="560" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Segoe UI,Arial,sans-serif" fill="#006064">→</text>
  <!-- ★ lower right -->
  <circle cx="740" cy="780" r="62" fill="#69F0AE" opacity="0.9"/>
  <text x="740" y="780" text-anchor="middle" dominant-baseline="middle" font-size="76" font-family="Segoe UI,Arial,sans-serif" fill="#1B5E20">★</text>
  <!-- ² lower left -->
  <circle cx="240" cy="740" r="54" fill="#FF8A65" opacity="0.9"/>
  <text x="240" y="740" text-anchor="middle" dominant-baseline="middle" font-size="70" font-family="Segoe UI,Arial,sans-serif" fill="white">²</text>
  <!-- ∞ bottom center -->
  <circle cx="450" cy="860" r="50" fill="#B388FF" opacity="0.9"/>
  <text x="450" y="860" text-anchor="middle" dominant-baseline="middle" font-size="66" font-family="Segoe UI,Arial,sans-serif" fill="white">∞</text>
  <!-- sparkle dots -->
  <circle cx="540" cy="170" r="16" fill="#FFD600"/>
  <circle cx="600" cy="140" r="10" fill="white"/>
  <circle cx="480" cy="155" r="12" fill="#FF80AB"/>
  <circle cx="880" cy="220" r="14" fill="#FFD600"/>
  <circle cx="140" cy="490" r="12" fill="white" opacity="0.6"/>
</svg>
