<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라이트 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#E8F5E9"/>
  <!-- Layer 2: 연필 + 크로스워드 격자 -->
  <!-- 격자 영역 (우측) -->
  <rect x="440" y="160" width="464" height="464" rx="16" fill="white" stroke="#9E9E9E" stroke-width="4"/>
  <!-- 격자 줄 (4×4) -->
  <line x1="556" y1="160" x2="556" y2="624" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="672" y1="160" x2="672" y2="624" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="788" y1="160" x2="788" y2="624" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="440" y1="276" x2="904" y2="276" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="440" y1="392" x2="904" y2="392" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="440" y1="508" x2="904" y2="508" stroke="#E0E0E0" stroke-width="2"/>
  <!-- 검정 칸들 -->
  <rect x="556" y="160" width="116" height="116" fill="#1A1A1A"/>
  <rect x="788" y="392" width="116" height="116" fill="#1A1A1A"/>
  <!-- 글자들 -->
  <text x="498" y="242" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#2E7D32" text-anchor="middle">G</text>
  <text x="614" y="358" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#1A1A1A" text-anchor="middle">O</text>
  <text x="730" y="242" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#1A1A1A" text-anchor="middle">A</text>
  <text x="846" y="242" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#1A1A1A" text-anchor="middle">L</text>
  <!-- 연필 (좌측 대각선) -->
  <!-- 연필 몸통 -->
  <rect x="80" y="300" width="320" height="80" rx="12" fill="#FFEB3B" transform="rotate(-45,240,340)"/>
  <!-- 연필 팁 -->
  <polygon points="80,460 160,400 80,380" fill="#FF8F00" transform="rotate(-45,240,340)"/>
  <!-- 연필 지우개 -->
  <rect x="320" y="220" width="80" height="60" rx="8" fill="#F48FB1" transform="rotate(-45,240,340)"/>
  <!-- Layer 3: 힌트 카드 -->
  <rect x="120" y="680" width="784" height="200" rx="16" fill="white" stroke="#9E9E9E" stroke-width="3"/>
  <text x="200" y="740" font-family="Arial" font-size="30" fill="#666">1 Across: Top of the net (4)</text>
  <text x="200" y="790" font-family="Arial" font-size="30" fill="#666">1 Down: Scoring target (4)</text>
  <text x="200" y="840" font-family="Arial Black,Arial" font-size="36" fill="#2E7D32">► GOAL ✓</text>
</svg>
