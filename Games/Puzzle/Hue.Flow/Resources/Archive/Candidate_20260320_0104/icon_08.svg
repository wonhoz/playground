<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050008"/>
  <!-- 격자 + 색 연결 -->
  <!-- 격자 점 (4x4) -->
  <g fill="#4A148C">
    <circle cx="280" cy="280" r="22"/>  <circle cx="420" cy="280" r="22"/>  <circle cx="560" cy="280" r="22"/>  <circle cx="700" cy="280" r="22"/>
    <circle cx="280" cy="420" r="22"/>  <circle cx="420" cy="420" r="22"/>  <circle cx="560" cy="420" r="22"/>  <circle cx="700" cy="420" r="22"/>
    <circle cx="280" cy="560" r="22"/>  <circle cx="420" cy="560" r="22"/>  <circle cx="560" cy="560" r="22"/>  <circle cx="700" cy="560" r="22"/>
    <circle cx="280" cy="700" r="22"/>  <circle cx="420" cy="700" r="22"/>  <circle cx="560" cy="700" r="22"/>  <circle cx="700" cy="700" r="22"/>
