<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="file" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
    <linearGradient id="bird" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#80deea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00838f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)" filter="url(#softglow)"/>
  <!-- file document -->
  <path d="M170 300 L260 300 L290 330 L290 410 L170 410 Z" fill="url(#file)"/>
  <path d="M260 300 L260 330 L290 330" fill="none" stroke="#00838f" stroke-width="3"/>
  <rect x="190" y="350" width="70" height="8" rx="4" fill="#e0f7fa" opacity="0.5"/>
  <rect x="190" y="365" width="55" height="8" rx="4" fill="#e0f7fa" opacity="0.35"/>
  <!-- bird flying up from file -->
  <path d="M230 295 Q240 250 210 210 Q240 230 256 200 Q272 230 302 210 Q280 250 270 295" fill="url(#bird)"/>
  <!-- wings spread -->
  <path d="M210 240 Q180 220 150 235 Q175 245 210 250" fill="url(#bird)" opacity="0.8"/>
  <path d="M302 240 Q332 220 362 235 Q337 245 302 250" fill="url(#bird)" opacity="0.8"/>
  <!-- trail particles -->
  <circle cx="250" cy="310" r="4" fill="#fff9c4" opacity="0.6"/>
  <circle cx="262" cy="325" r="3" fill="#f9a825" opacity="0.5"/>
  <circle cx="244" cy="335" r="2" fill="#fff9c4" opacity="0.4"/>
</svg>
