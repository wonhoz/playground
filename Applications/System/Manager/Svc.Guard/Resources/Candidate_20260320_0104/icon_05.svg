  <ellipse cx="360" cy="340" rx="70" ry="110" fill="#1A237E" transform="rotate(-20 360 340)"/>
  <ellipse cx="664" cy="340" rx="70" ry="110" fill="#1A237E" transform="rotate(20 664 340)"/>
  <!-- Eyes -->
  <circle cx="455" cy="400" r="32" fill="#5C6BC0"/>
  <circle cx="569" cy="400" r="32" fill="#5C6BC0"/>
  <circle cx="455" cy="400" r="16" fill="#030810"/>
  <circle cx="569" cy="400" r="16" fill="#030810"/>
  <!-- Snout -->
  <ellipse cx="512" cy="490" rx="80" ry="55" fill="#5C6BC0" opacity="0.7"/>
