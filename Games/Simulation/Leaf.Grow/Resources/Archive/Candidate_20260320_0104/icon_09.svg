<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 나비 + 꽃 공생: 나비 + 꽃 -->
  <!-- flower stem -->
  <line x1="512" y1="780" x2="512" y2="580" stroke="#2E7D32" stroke-width="16" stroke-linecap="round"/>
  <!-- side leaves -->
  <path d="M512 680 Q444 650 428 590 Q492 602 512 660Z" fill="#2E7D32"/>
  <path d="M512 680 Q580 650 596 590 Q532 602 512 660Z" fill="#2E7D32"/>
  <!-- flower petals -->
  <ellipse cx="512" cy="470" rx="36" ry="74" fill="#66BB6A" transform="rotate(0 512 512)"/>
  <ellipse cx="512" cy="470" rx="36" ry="74" fill="#66BB6A" transform="rotate(72 512 512)"/>
  <ellipse cx="512" cy="470" rx="36" ry="74" fill="#66BB6A" transform="rotate(144 512 512)"/>
  <ellipse cx="512" cy="470" rx="36" ry="74" fill="#66BB6A" transform="rotate(216 512 512)"/>
  <ellipse cx="512" cy="470" rx="36" ry="74" fill="#66BB6A" transform="rotate(288 512 512)"/>
  <!-- flower center -->
  <circle cx="512" cy="512" r="40" fill="#2E7D32"/>
  <!-- butterfly upper wings -->
  <path d="M512 440 Q430 350 360 370 Q340 430 400 460 Q460 480 512 460Z" fill="#66BB6A" opacity="0.9"/>
  <path d="M512 440 Q594 350 664 370 Q684 430 624 460 Q564 480 512 460Z" fill="#66BB6A" opacity="0.9"/>
  <!-- butterfly lower wings -->
  <path d="M512 480 Q450 490 410 540 Q430 590 480 570 Q510 550 512 500Z" fill="#2E7D32" opacity="0.8"/>
  <path d="M512 480 Q574 490 614 540 Q594 590 544 570 Q514 550 512 500Z" fill="#2E7D32" opacity="0.8"/>
  <!-- butterfly body -->
  <ellipse cx="512" cy="466" rx="8" ry="30" fill="#020A02"/>
  <!-- antennae -->
  <path d="M508 438 Q490 400 474 388" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
  <path d="M516 438 Q534 400 550 388" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="474" cy="388" r="6" fill="#66BB6A"/>
  <circle cx="550" cy="388" r="6" fill="#66BB6A"/>
</svg>
