  <text x="790" y="361" font-family="'Consolas', monospace" font-size="40" fill="#90CAF9" text-anchor="middle">ESTAB.</text>
  <!-- 포트 8080 LISTEN -->
  <rect x="80" y="406" width="864" height="80" rx="8" fill="#1A3A2A"/>
  <text x="200" y="458" font-family="'Consolas', monospace" font-size="60" fill="#FFD600" text-anchor="middle">8080</text>
  <text x="500" y="458" font-family="'Consolas', monospace" font-size="52" fill="#90CAF9" text-anchor="middle">TCP</text>
