<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#EDE9FE"/>
  <!-- Layer 2: Palette circle -->
  <circle cx="512" cy="512" r="310" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="8"/>
  <!-- Four theme color sectors -->
  <!-- Dark theme sector (top left) -->
  <path d="M 512 512 L 512 202 A 310 310 0 0 0 202 512 Z" fill="#1E1E2E"/>
  <!-- Light theme sector (top right) -->
  <path d="M 512 512 L 822 512 A 310 310 0 0 0 512 202 Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Nord theme sector (bottom left) -->
  <path d="M 512 512 L 202 512 A 310 310 0 0 0 512 822 Z" fill="#2E3440"/>
  <!-- Dracula theme sector (bottom right) -->
  <path d="M 512 512 L 512 822 A 310 310 0 0 0 822 512 Z" fill="#282A36"/>
  <!-- Center circle overlay -->
  <circle cx="512" cy="512" r="110" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="6"/>
  <!-- Layer 3: Theme labels and details -->
  <!-- Dark label -->
  <text x="360" y="380" font-family="Arial,sans-serif" font-size="20" fill="#CDD6F4" text-anchor="middle">Dark</text>
  <!-- Light label -->
  <text x="664" y="380" font-family="Arial,sans-serif" font-size="20" fill="#374151" text-anchor="middle">Light</text>
  <!-- Nord label -->
  <text x="360" y="664" font-family="Arial,sans-serif" font-size="20" fill="#88C0D0" text-anchor="middle">Nord</text>
  <!-- Dracula label -->
  <text x="664" y="664" font-family="Arial,sans-serif" font-size="20" fill="#BD93F9" text-anchor="middle">Dracula</text>
  <!-- Center: brush/palette icon text -->
  <text x="512" y="525" font-family="Arial,sans-serif" font-size="40" text-anchor="middle">🎨</text>
</svg>