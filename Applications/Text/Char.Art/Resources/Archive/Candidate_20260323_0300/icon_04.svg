<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 픽셀이 녹아 문자로 (분할 뷰) | 레이어드 | #FF6B35 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0800"/>
  <!-- Layer 2: Split view - left pixel, right ASCII -->
  <!-- Divider -->
  <line x1="512" y1="180" x2="512" y2="844" stroke="#F59E0B" stroke-width="3" stroke-dasharray="12,8"/>
  <!-- Left side: Pixel representation of simple image (smiley) -->
  <rect x="130" y="200" width="360" height="360" rx="12" fill="#0F0F1A"/>
  <!-- Simplified pixel face -->
  <rect x="190" y="260" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="350" y="260" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="190" y="420" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="270" y="460" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="350" y="420" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="150" y="340" width="40" height="80" rx="4" fill="#F59E0B" opacity="0.3"/>
  <rect x="390" y="340" width="40" height="80" rx="4" fill="#F59E0B" opacity="0.3"/>
  <!-- Right side: ASCII art version -->
  <rect x="532" y="200" width="360" height="360" rx="12" fill="#0F1A0F"/>
  <text x="552" y="286" font-family="Consolas,monospace" font-size="18" fill="#4ADE80">  o       o  </text>
  <text x="552" y="314" font-family="Consolas,monospace" font-size="18" fill="#4ADE80">             </text>
  <text x="552" y="342" font-family="Consolas,monospace" font-size="18" fill="#22C55E">|           |</text>
  <text x="552" y="370" font-family="Consolas,monospace" font-size="18" fill="#22C55E">  \_______/  </text>
  <text x="552" y="398" font-family="Consolas,monospace" font-size="18" fill="#16A34A">   \-----/   </text>
  <text x="552" y="426" font-family="Consolas,monospace" font-size="18" fill="#166534">    \---/    </text>
  <text x="552" y="454" font-family="Consolas,monospace" font-size="18" fill="#15803D">     \_/     </text>
  <!-- Layer 3: Labels and slider at divider -->
  <!-- Slider handle on divider -->
  <circle cx="512" cy="512" r="24" fill="#F59E0B" stroke="#FDE68A" stroke-width="3"/>
  <line x1="498" y1="512" x2="526" y2="512" stroke="#451A00" stroke-width="3" stroke-linecap="round"/>
  <text x="260" y="610" font-family="Arial,sans-serif" font-size="20" fill="#F59E0B" text-anchor="middle">이미지</text>
  <text x="764" y="610" font-family="Consolas,monospace" font-size="20" fill="#4ADE80" text-anchor="middle">ASCII</text>
  <!-- Bottom preview chars -->
  <text x="512" y="750" font-family="Consolas,monospace" font-size="20" fill="#6B7280" text-anchor="middle">@#$%&amp;*+==-::..   </text>
  <text x="512" y="780" font-family="Consolas,monospace" font-size="18" fill="#4B5563" text-anchor="middle">밀도순 문자셋</text>
</svg>
