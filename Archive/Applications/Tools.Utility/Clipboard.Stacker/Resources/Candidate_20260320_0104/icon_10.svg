<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030A10"/>
  <!-- Tower of clipboard items stacking upward -->
  <!-- Base clipboard (bottom, largest) -->
  <rect x="280" y="680" width="464" height="180" rx="18" fill="#0277BD" opacity="0.85"/>
  <rect x="280" y="680" width="464" height="40" rx="14" fill="#01579B" opacity="1"/>
  <rect x="300" y="736" width="200" height="18" rx="7" fill="#4FC3F7" opacity="0.5"/>
  <rect x="300" y="764" width="280" height="18" rx="7" fill="#4FC3F7" opacity="0.35"/>
  <!-- Middle clipboard -->
  <rect x="300" y="500" width="424" height="180" rx="18" fill="#0277BD" opacity="0.75"/>
  <rect x="300" y="500" width="424" height="40" rx="14" fill="#01579B" opacity="0.9"/>
  <rect x="320" y="556" width="160" height="18" rx="7" fill="#4FC3F7" opacity="0.45"/>
  <rect x="320" y="584" width="240" height="18" rx="7" fill="#4FC3F7" opacity="0.3"/>
  <!-- Upper clipboard -->
  <rect x="320" y="320" width="384" height="180" rx="18" fill="#0277BD" opacity="0.65"/>
  <rect x="320" y="320" width="384" height="40" rx="14" fill="#01579B" opacity="0.8"/>
  <rect x="340" y="376" width="120" height="18" rx="7" fill="#4FC3F7" opacity="0.4"/>
  <rect x="340" y="404" width="200" height="18" rx="7" fill="#4FC3F7" opacity="0.25"/>
  <!-- Top (smallest) clipboard -->
  <rect x="340" y="160" width="344" height="160" rx="18" fill="#0277BD" opacity="0.5"/>
  <rect x="340" y="160" width="344" height="40" rx="14" fill="#01579B" opacity="0.7"/>
  <rect x="360" y="218" width="80" height="18" rx="7" fill="#4FC3F7" opacity="0.35"/>
  <!-- Paperclips on each board -->
  <!-- Clip top -->
  <path d="M490 140 Q490 110 512 110 Q534 110 534 140 L534 165 L490 165" fill="none" stroke="#4FC3F7" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <!-- Clip mid -->
  <path d="M470 300 Q470 270 492 270 Q514 270 514 300 L514 325 L470 325" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" opacity="0.65"/>
  <!-- Clip lower -->
  <path d="M460 480 Q460 450 482 450 Q504 450 504 480 L504 505 L460 505" fill="none" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <!-- Tower upward arrow -->
  <polygon points="476,130 512,80 548,130" fill="#4FC3F7" opacity="0.6"/>
</svg>
