<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 날카로운 연필 심 클로즈업 | 중앙심볼 | #FFF8F0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF8F0"/>
  <!-- Layer 2: Large pencil centered -->
  <!-- Pencil body (hexagonal approximation with rect) -->
  <rect x="360" y="200" width="152" height="520" rx="8" fill="#F59E0B"/>
  <!-- Yellow wood grain lines -->
  <line x1="400" y1="200" x2="400" y2="720" stroke="#D97706" stroke-width="3" opacity="0.4"/>
  <line x1="440" y1="200" x2="440" y2="720" stroke="#D97706" stroke-width="3" opacity="0.4"/>
  <line x1="480" y1="200" x2="480" y2="720" stroke="#D97706" stroke-width="3" opacity="0.4"/>
  <!-- Eraser (top) -->
  <rect x="360" y="196" width="152" height="52" rx="8" fill="#FCA5A5"/>
  <!-- Metal band -->
  <rect x="354" y="240" width="164" height="20" rx="4" fill="#9CA3AF"/>
  <rect x="354" y="246" width="164" height="8" rx="2" fill="#6B7280"/>
  <!-- Pencil tip (wooden sharpened part) -->
  <polygon points="360,716 512,716 512,836 436,860" fill="#D97706"/>
  <polygon points="512,716 664,716 436,860" fill="#C2850A"/>
  <!-- Graphite tip -->
  <polygon points="430,848 436,860 442,848" fill="#1F2937"/>
  <ellipse cx="436" cy="848" rx="6" ry="4" fill="#374151"/>
  <!-- Layer 3: Writing on crossword -->
  <!-- Small grid preview below -->
  <rect x="280" y="880" width="60" height="60" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
  <text x="310" y="920" font-family="Arial,sans-serif" font-size="30" fill="#374151" text-anchor="middle" font-weight="bold">가</text>
  <rect x="342" y="880" width="60" height="60" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="372" y="920" font-family="Arial,sans-serif" font-size="30" fill="#1D4ED8" text-anchor="middle" font-weight="bold">나</text>
  <rect x="404" y="880" width="60" height="60" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
  <text x="434" y="920" font-family="Arial,sans-serif" font-size="30" fill="#374151" text-anchor="middle" font-weight="bold">다</text>
</svg>
