<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#042B1A"/>
  <!-- Layer 2: 지도 핀 (Location pin) -->
  <path d="M512 140 Q680 140 680 320 Q680 460 512 640 Q344 460 344 320 Q344 140 512 140 Z" fill="#22C55E"/>
  <circle cx="512" cy="320" r="80" fill="#042B1A"/>
  <circle cx="512" cy="320" r="50" fill="#22C55E"/>
  <!-- 그림자 (핀 끝) -->
  <ellipse cx="512" cy="700" rx="80" ry="20" fill="#000000" opacity="0.3"/>
  <!-- Layer 3: 큰 물음표 (핀 구멍 안) -->
  <text x="512" y="340" font-size="80" fill="#042B1A" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="Arial Black">?</text>
  <!-- 배경 세계지도 윤곽 (매우 간략) -->
  <ellipse cx="512" cy="820" rx="380" ry="100" fill="#0A4020" opacity="0.5"/>
  <ellipse cx="512" cy="820" rx="380" ry="100" fill="none" stroke="#22C55E" stroke-width="8" opacity="0.3"/>
  <!-- 점선 위도 -->
  <line x1="132" y1="820" x2="892" y2="820" stroke="#22C55E" stroke-width="6" stroke-dasharray="20,12" opacity="0.3"/>
</svg>
