      <stop offset="0" stop-color="#B2EBF2"/>
      <stop offset="1" stop-color="#4DD0E1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg07)"/>
  <!-- 큰 폴더 탭 -->
  <path d="M 120 240 L 380 240 L 440 320 L 900 320 L 900 840 L 120 840 Z" fill="#FFD93D" stroke="#004D5B" stroke-width="22" stroke-linejoin="round"/>
  <!-- 내부 터미널 스크린 -->
  <rect x="180" y="380" width="680" height="420" rx="28" fill="#1A1A1A" stroke="#004D5B" stroke-width="14"/>
