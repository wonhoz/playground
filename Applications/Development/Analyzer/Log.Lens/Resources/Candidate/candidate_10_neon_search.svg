<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon log lines -->
  <rect x="60" y="110" width="200" height="8" rx="4" fill="#00e5ff" filter="url(#glow)"/>
  <rect x="60" y="140" width="160" height="8" rx="4" fill="#ff1744" filter="url(#glow)"/>
  <rect x="60" y="170" width="220" height="8" rx="4" fill="#76ff03" filter="url(#glow)"/>
  <rect x="60" y="200" width="180" height="8" rx="4" fill="#ffd740" filter="url(#glow)"/>
  <rect x="60" y="230" width="210" height="8" rx="4" fill="#00e5ff" filter="url(#glow)"/>
  <rect x="60" y="260" width="150" height="8" rx="4" fill="#ff1744" filter="url(#glow)"/>
  <rect x="60" y="290" width="190" height="8" rx="4" fill="#76ff03" filter="url(#glow)"/>
  <rect x="60" y="320" width="170" height="8" rx="4" fill="#00e5ff" filter="url(#glow)"/>
  <!-- Large magnifying glass, neon -->
  <circle cx="330" cy="280" r="140" fill="none" stroke="#00e5ff" stroke-width="8" filter="url(#glow)"/>
  <circle cx="330" cy="280" r="126" fill="#050510" opacity="0.6"/>
  <!-- Lines inside lens highlighted -->
  <rect x="210" y="264" width="240" height="8" rx="4" fill="#ff1744" filter="url(#glow)"/>
  <!-- Handle -->
  <line x1="437" y1="387" x2="482" y2="432" stroke="#00e5ff" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Inner lens glow -->
  <circle cx="290" cy="240" r="40" fill="white" opacity="0.03"/>
</svg>
