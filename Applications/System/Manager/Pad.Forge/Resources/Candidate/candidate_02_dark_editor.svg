<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#13131F"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CDD6F4"/>
      <stop offset="100%" stop-color="#A6ADC8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- IDE/editor window chrome -->
  <rect x="60" y="80" width="392" height="320" rx="12" fill="#181825"/>
  <!-- Title bar -->
  <rect x="60" y="80" width="392" height="32" rx="12" fill="#11111B"/>
  <rect x="60" y="98" width="392" height="14" fill="#11111B"/>
  <!-- Window buttons -->
  <circle cx="90" cy="96" r="7" fill="#F38BA8"/>
  <circle cx="114" cy="96" r="7" fill="#F9E2AF"/>
  <circle cx="138" cy="96" r="7" fill="#A6E3A1"/>
  <!-- File tab -->
  <rect x="162" y="82" width="120" height="22" rx="4" fill="#1E1E2E"/>
  <text x="222" y="97" font-family="monospace" font-size="11" fill="#CDD6F4" text-anchor="middle">untitled.txt</text>
  <!-- Line numbers -->
  <rect x="60" y="112" width="36" height="288" fill="#11111B"/>
  <text x="78" y="136" font-family="monospace" font-size="11" fill="#585B70" text-anchor="middle">1</text>
  <text x="78" y="155" font-family="monospace" font-size="11" fill="#585B70" text-anchor="middle">2</text>
  <text x="78" y="174" font-family="monospace" font-size="11" fill="#585B70" text-anchor="middle">3</text>
  <text x="78" y="193" font-family="monospace" font-size="11" fill="#585B70" text-anchor="middle">4</text>
  <text x="78" y="212" font-family="monospace" font-size="11" fill="#585B70" text-anchor="middle">5</text>
  <text x="78" y="231" font-family="monospace" font-size="11" fill="#45475A" text-anchor="middle">6</text>
  <text x="78" y="250" font-family="monospace" font-size="11" fill="#45475A" text-anchor="middle">7</text>
  <text x="78" y="269" font-family="monospace" font-size="11" fill="#45475A" text-anchor="middle">8</text>
  <text x="78" y="288" font-family="monospace" font-size="11" fill="#45475A" text-anchor="middle">9</text>
  <!-- Code text (colored syntax) -->
  <text x="108" y="136" font-family="monospace" font-size="12" fill="#CBA6F7">Hello, </text>
  <text x="163" y="136" font-family="monospace" font-size="12" fill="#A6E3A1">Pad.Forge</text>
  <text x="238" y="136" font-family="monospace" font-size="12" fill="#CDD6F4">!</text>
  <text x="108" y="155" font-family="monospace" font-size="12" fill="#F38BA8">function </text>
  <text x="176" y="155" font-family="monospace" font-size="12" fill="#89B4FA">forge</text>
  <text x="218" y="155" font-family="monospace" font-size="12" fill="#CDD6F4">() {</text>
  <text x="108" y="174" font-family="monospace" font-size="12" fill="#F9E2AF">  return </text>
  <text x="172" y="174" font-family="monospace" font-size="12" fill="#A6E3A1">"✓ done"</text>
  <text x="108" y="193" font-family="monospace" font-size="12" fill="#CDD6F4">}</text>
  <!-- Blinking cursor -->
  <rect x="108" y="205" width="3" height="16" rx="1" fill="#CDD6F4"/>
  <!-- Status bar -->
  <rect x="60" y="370" width="392" height="30" rx="6" fill="#89B4FA"/>
  <text x="80" y="390" font-family="monospace" font-size="11" fill="#1E1E2E">Pad.Forge  |  UTF-8  |  Ln 5, Col 1</text>
  <!-- Scrollbar -->
  <rect x="436" y="112" width="16" height="258" rx="8" fill="#313244"/>
  <rect x="436" y="112" width="16" height="80" rx="8" fill="#585B70"/>
</svg>
