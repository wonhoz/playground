<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 밝은 스카이블루 배경 -->
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#clip04)">
    <!-- Layer 2: 빗자루 (청소 메타포) -->
    <!-- 빗자루 자루 -->
    <rect x="590" y="100" width="50" height="560" rx="25" fill="#8D6E63" transform="rotate(30 615 380)"/>
    <!-- 빗자루 헤드 -->
    <path d="M400 620 Q520 580 640 620 Q660 700 640 760 Q520 800 400 760 Q380 700 400 620 Z" fill="#795548"/>
    <!-- 빗자루 털 (세로선들) -->
    <line x1="420" y1="620" x2="400" y2="780" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>
    <line x1="460" y1="615" x2="445" y2="782" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>
    <line x1="500" y1="612" x2="490" y2="784" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>
    <line x1="540" y1="612" x2="534" y2="784" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>
    <line x1="580" y1="614" x2="578" y2="782" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>
    <line x1="618" y1="618" x2="620" y2="780" stroke="#5D4037" stroke-width="10" stroke-linecap="round"/>

    <!-- Layer 3: 날아가는 폴더들 (청소 효과) -->
    <!-- 폴더 1 (큰, 왼쪽 위) -->
    <rect x="90" y="220" width="220" height="180" rx="18" fill="#FF8F00" transform="rotate(-15 200 310)"/>
    <rect x="90" y="190" width="90" height="42" rx="12" fill="#FF8F00" transform="rotate(-15 135 211)"/>
    <text x="200" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#FFF8E1" text-anchor="middle" transform="rotate(-15 200 320)">bin</text>
    <!-- X 표시 -->
    <text x="200" y="360" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#F44336" text-anchor="middle" transform="rotate(-15 200 360)">✕</text>

    <!-- 폴더 2 (오른쪽 위) -->
    <rect x="720" y="150" width="200" height="160" rx="16" fill="#EF6C00" transform="rotate(20 820 230)"/>
    <rect x="720" y="120" width="80" height="38" rx="10" fill="#EF6C00" transform="rotate(20 760 139)"/>
    <text x="820" y="250" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#FFF3E0" text-anchor="middle" transform="rotate(20 820 250)">obj</text>
    <text x="820" y="295" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#F44336" text-anchor="middle" transform="rotate(20 820 295)">✕</text>

    <!-- 폴더 3 (작은, 위쪽 중앙) -->
    <rect x="440" y="100" width="160" height="130" rx="14" fill="#BF360C" transform="rotate(-5 520 165)"/>
    <rect x="440" y="75" width="65" height="34" rx="10" fill="#BF360C" transform="rotate(-5 472 92)"/>
    <text x="520" y="180" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#FFCCBC" text-anchor="middle" transform="rotate(-5 520 180)">empty</text>
    <text x="520" y="215" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="#F44336" text-anchor="middle" transform="rotate(-5 520 215)">✕</text>

    <!-- 먼지/폴더 조각들 -->
    <circle cx="280" cy="540" r="14" fill="#EF6C00" opacity="0.6"/>
    <circle cx="360" cy="580" r="10" fill="#FF8F00" opacity="0.5"/>
    <circle cx="760" cy="500" r="12" fill="#EF6C00" opacity="0.5"/>
    <circle cx="840" cy="560" r="8" fill="#FF8F00" opacity="0.4"/>

    <!-- 하단 타이틀 -->
    <rect x="180" y="840" width="664" height="80" rx="24" fill="#E65100"/>
    <text x="512" y="895" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">FOLDER PURGE</text>
  </g>
</svg>
