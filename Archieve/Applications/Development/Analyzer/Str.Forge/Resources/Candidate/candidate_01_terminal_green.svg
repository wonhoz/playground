<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0F0A"/>
      <stop offset="100%" stop-color="#0F180F"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111811"/>
      <stop offset="100%" stop-color="#0D140D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="80" width="392" height="352" rx="12" fill="url(#panel)" stroke="#1E2E1E" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="60" y="80" width="392" height="36" rx="12" fill="#1A241A"/>
  <rect x="60" y="104" width="392" height="12" fill="#1A241A"/>
  <!-- Window dots -->
  <circle cx="92" cy="98" r="7" fill="#FF5555" opacity="0.8"/>
  <circle cx="116" cy="98" r="7" fill="#FFAA00" opacity="0.8"/>
  <circle cx="140" cy="98" r="7" fill="#44FF88" opacity="0.8"/>
  <!-- Title text area -->
  <text x="256" y="102" font-family="monospace" font-size="13" fill="#44FF88" text-anchor="middle" opacity="0.7">str.forge</text>
  <!-- Code lines -->
  <!-- Line 1: prompt + command -->
  <text x="84" y="152" font-family="monospace" font-size="14" fill="#44FF88" filter="url(#glow)">$</text>
  <text x="100" y="152" font-family="monospace" font-size="14" fill="#88FF88">forge --input</text>
  <text x="244" y="152" font-family="monospace" font-size="14" fill="#FFDD44">"hello world"</text>
  <!-- Line 2 -->
  <text x="84" y="178" font-family="monospace" font-size="14" fill="#44FF88" filter="url(#glow)">$</text>
  <text x="100" y="178" font-family="monospace" font-size="14" fill="#88AAFF">--transform</text>
  <text x="212" y="178" font-family="monospace" font-size="14" fill="#FF8844">UPPER</text>
  <!-- Line 3: output -->
  <text x="84" y="204" font-family="monospace" font-size="14" fill="#AAFFAA">&gt; HELLO WORLD</text>
  <!-- Divider -->
  <line x1="84" y1="218" x2="428" y2="218" stroke="#1E3A1E" stroke-width="1"/>
  <!-- Line 4 -->
  <text x="84" y="242" font-family="monospace" font-size="14" fill="#44FF88" filter="url(#glow)">$</text>
  <text x="100" y="242" font-family="monospace" font-size="14" fill="#88AAFF">--encode</text>
  <text x="192" y="242" font-family="monospace" font-size="14" fill="#FF8844">base64</text>
  <!-- Line 5: result -->
  <text x="84" y="268" font-family="monospace" font-size="12" fill="#AAFFAA">&gt; aGVsbG8gd29ybGQ=</text>
  <!-- Line 6 -->
  <text x="84" y="294" font-family="monospace" font-size="14" fill="#44FF88" filter="url(#glow)">$</text>
  <text x="100" y="294" font-family="monospace" font-size="14" fill="#88AAFF">--regex</text>
  <text x="180" y="294" font-family="monospace" font-size="14" fill="#FFDD44">"\w+"</text>
  <!-- Line 7: match highlight -->
  <rect x="84" y="305" width="76" height="18" rx="3" fill="#44FF88" opacity="0.15"/>
  <rect x="168" y="305" width="50" height="18" rx="3" fill="#44FF88" opacity="0.15"/>
  <text x="84" y="319" font-family="monospace" font-size="12" fill="#AAFFAA">&gt;</text>
  <text x="98" y="319" font-family="monospace" font-size="12" fill="#FFFF44">hello</text>
  <text x="148" y="319" font-family="monospace" font-size="12" fill="#AAFFAA">·</text>
  <text x="162" y="319" font-family="monospace" font-size="12" fill="#FFFF44">world</text>
  <!-- Blinking cursor -->
  <rect x="84" y="346" width="10" height="18" rx="1" fill="#44FF88" filter="url(#glow)" opacity="0.9"/>
  <!-- Scanlines -->
  <rect x="60" y="80" width="392" height="352" rx="12" fill="none" opacity="0.03"/>
</svg>
