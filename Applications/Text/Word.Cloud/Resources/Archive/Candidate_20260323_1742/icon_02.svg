<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1020"/>
  <!-- Layer 2: 빈도수별 크기 단어 시각화 -->
  <!-- 가장 큰 단어들 (빈도 높음) -->
  <text x="512" y="320" font-size="180" fill="#4D96FF" text-anchor="middle" font-weight="bold" font-family="Arial">data</text>
  <text x="180" y="220" font-size="100" fill="#6EA8FE" text-anchor="middle" font-weight="bold" font-family="Arial">word</text>
  <text x="840" y="240" font-size="96" fill="#74C0FC" text-anchor="middle" font-weight="bold" font-family="Arial">text</text>
  <!-- 중간 크기 단어들 -->
  <text x="180" y="460" font-size="72" fill="#339AF0" text-anchor="middle" font-family="Arial">cloud</text>
  <text x="840" y="460" font-size="68" fill="#4C6EF5" text-anchor="middle" font-family="Arial">count</text>
  <text x="512" y="540" font-size="72" fill="#228BE6" text-anchor="middle" font-family="Arial">analysis</text>
  <!-- 작은 단어들 -->
  <text x="130" y="620" font-size="52" fill="#1971C2" text-anchor="middle" font-family="Arial">font</text>
  <text x="360" y="640" font-size="48" fill="#1C7ED6" text-anchor="middle" font-family="Arial">size</text>
  <text x="580" y="650" font-size="52" fill="#228BE6" text-anchor="middle" font-family="Arial">theme</text>
  <text x="800" y="630" font-size="48" fill="#1971C2" text-anchor="middle" font-family="Arial">mask</text>
  <!-- 더 작은 단어들 -->
  <text x="160" y="730" font-size="38" fill="#155FA0" text-anchor="middle" font-family="Arial">freq</text>
  <text x="340" y="740" font-size="36" fill="#1864AB" text-anchor="middle" font-family="Arial">color</text>
  <text x="512" y="740" font-size="40" fill="#1971C2" text-anchor="middle" font-family="Arial">export</text>
  <text x="680" y="735" font-size="36" fill="#1864AB" text-anchor="middle" font-family="Arial">shape</text>
  <text x="860" y="730" font-size="38" fill="#155FA0" text-anchor="middle" font-family="Arial">min</text>
  <!-- 가장 작은 단어들 -->
  <text x="160" y="820" font-size="28" fill="#0C4A6E" text-anchor="middle" font-family="Arial">stop</text>
  <text x="290" y="820" font-size="26" fill="#0C4A6E" text-anchor="middle" font-family="Arial">word</text>
  <text x="420" y="815" font-size="30" fill="#0C4A6E" text-anchor="middle" font-family="Arial">top100</text>
  <text x="580" y="820" font-size="26" fill="#0C4A6E" text-anchor="middle" font-family="Arial">orient</text>
  <text x="710" y="815" font-size="28" fill="#0C4A6E" text-anchor="middle" font-family="Arial">mixed</text>
  <text x="860" y="820" font-size="26" fill="#0C4A6E" text-anchor="middle" font-family="Arial">svg</text>
  <!-- Layer 3: 빈도 범례 -->
  <rect x="80" y="880" width="864" height="80" rx="16" fill="#0F1923" stroke="#1E3A5F" stroke-width="4"/>
  <rect x="100" y="904" width="24" height="24" rx="4" fill="#4D96FF"/>
  <text x="135" y="924" font-size="32" fill="#74C0FC" font-family="Arial">High freq</text>
  <rect x="340" y="904" width="24" height="24" rx="4" fill="#228BE6"/>
  <text x="375" y="924" font-size="32" fill="#74C0FC" font-family="Arial">Mid freq</text>
  <rect x="580" y="904" width="24" height="24" rx="4" fill="#1864AB"/>
  <text x="615" y="924" font-size="32" fill="#74C0FC" font-family="Arial">Low freq</text>
</svg>
