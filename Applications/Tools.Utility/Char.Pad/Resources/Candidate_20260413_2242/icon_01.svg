<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>
  <!-- Row 1 — special chars in colored circles -->
  <circle cx="222" cy="306" r="84" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="222" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="92" fill="#FFFFFF" text-anchor="middle">&#x2192;</text>
  <circle cx="512" cy="306" r="84" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
  <text x="512" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">&#x2211;</text>
  <circle cx="802" cy="306" r="84" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="802" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">&#xa9;</text>
  <!-- Row 2 — more special chars -->
  <circle cx="222" cy="520" r="84" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <text x="222" y="561" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#1A1A1A" text-anchor="middle">$</text>
  <circle cx="512" cy="520" r="84" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="561" font-family="Arial Black, sans-serif" font-weight="900" font-size="92" fill="#FFFFFF" text-anchor="middle">&#xb2;</text>
  <circle cx="802" cy="520" r="84" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
  <text x="802" y="561" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">&#x2014;</text>
  <!-- CHAR badge -->
  <rect x="236" y="736" width="552" height="116" rx="36" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="512" y="822" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">CHAR</text>
</svg>
