<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150520"/>
      <stop offset="100%" stop-color="#200a30"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffee00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffee00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="256" rx="180" ry="160" fill="url(#glow)"/>
  <!-- Large lightning bolt - speed symbol -->
  <polygon points="300,80 180,280 250,280 210,440 340,220 268,220 300,80" fill="url(#bolt)"/>
  <!-- Bolt highlight -->
  <polygon points="300,80 250,200 270,200 300,80" fill="#ffffff" opacity="0.4"/>
  <!-- Runner shoe at bottom of bolt -->
  <path d="M185,440 Q210,430 240,435 Q260,432 275,440 Q260,455 220,455 Q195,455 185,440Z" fill="#cc2020"/>
  <rect x="188" y="430" width="52" height="14" rx="4" fill="#ee3030"/>
  <!-- Speed lines -->
  <line x1="80" y1="180" x2="170" y2="180" stroke="#ffee00" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="220" x2="172" y2="220" stroke="#ffee00" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="260" x2="168" y2="260" stroke="#ffee00" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="100" y1="300" x2="170" y2="300" stroke="#ffee00" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Stars/sparks from bolt -->
  <circle cx="340" cy="130" r="6" fill="#ffee00" opacity="0.8"/>
  <circle cx="380" cy="200" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="360" cy="280" r="5" fill="#ffee00" opacity="0.6"/>
  <circle cx="150" cy="140" r="4" fill="#ff8800" opacity="0.7"/>
  <circle cx="410" cy="300" r="3" fill="#ffee00" opacity="0.5"/>
</svg>