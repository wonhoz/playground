<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 책 + 사전 십자 -->
  <!-- 책 몸통 -->
  <rect x="200" y="260" width="500" height="620" rx="16" fill="#1565C0"/>
  <!-- 책 등 -->
  <rect x="200" y="260" width="60" height="620" rx="16 0 0 16" fill="#1565C0" opacity="0.5"/>
  <!-- 페이지 -->
  <rect x="260" y="280" width="420" height="580" rx="4" fill="#000A14" opacity="0.4"/>
  <!-- 책 페이지 선 (내용) -->
  <line x1="290" y1="340" x2="650" y2="340" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <line x1="290" y1="380" x2="650" y2="380" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <line x1="290" y1="420" x2="560" y2="420" stroke="#42A5F5" stroke-width="6" opacity="0.5"/>
  <!-- 크로스워드 그리드 (책 안) -->
  <rect x="290" y="460" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <rect x="380" y="460" width="80" height="80" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="470" y="460" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <rect x="560" y="460" width="80" height="80" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="290" y="550" width="80" height="80" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="380" y="550" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <rect x="470" y="550" width="80" height="80" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="560" y="550" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <rect x="290" y="640" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <rect x="380" y="640" width="80" height="80" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="470" y="640" width="80" height="80" rx="4" fill="#42A5F5" opacity="0.6"/>
  <!-- 십자 표시 (크로스 강조) -->
  <line x1="430" y1="460" x2="430" y2="720" stroke="#42A5F5" stroke-width="8" opacity="0.5"/>
  <line x1="290" y1="590" x2="640" y2="590" stroke="#42A5F5" stroke-width="8" opacity="0.5"/>
  <!-- 연필 (책 위) -->
  <g transform="translate(780,300) rotate(30)">
    <rect x="-12" y="-100" width="24" height="160" rx="4" fill="#42A5F5"/>
    <rect x="-12" y="-120" width="24" height="20" rx="3" fill="#1565C0" opacity="0.7"/>
    <polygon points="-12,60 12,60 0,100" fill="#42A5F5" opacity="0.8"/>
  </g>
</svg>
