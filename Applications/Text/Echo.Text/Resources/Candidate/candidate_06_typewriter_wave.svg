  <text x="253" y="271" font-family="monospace" font-size="22" text-anchor="middle" fill="#333" font-weight="bold">O</text>
  <!-- Sound wave above -->
  <path d="M140 170 C150 155 170 155 180 170 C190 185 210 185 220 170 C230 155 250 155 260 170 C270 185 290 185 300 170 C310 155 330 155 340 170 C350 185 370 185 380 170" stroke="url(#key_grad)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M160 130 C175 110 200 110 215 130 C230 150 255 150 270 130 C285 110 310 110 325 130 C340 150 365 150 380 130" stroke="url(#key_grad)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
