<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 네온 그린 CRT 터미널 느낌 -->
  <rect width="1024" height="1024" rx="190" fill="#020A02"/>

  <!-- 네온 그린 글로우 배경 -->
  <circle cx="512" cy="520" r="340" fill="#003300" opacity="0.6"/>
  <circle cx="512" cy="520" r="240" fill="#004400" opacity="0.4"/>

  <!-- Layer 2: ESC[ 이스케이프 시퀀스 기호 (거대하게) -->
  <!-- ESC -->
  <text x="180" y="430" font-family="Consolas,monospace" font-size="200" fill="#00CC00" font-weight="bold" opacity="0.9">ESC</text>
  <!-- [ 기호 -->
  <text x="670" y="560" font-family="Consolas,monospace" font-size="260" fill="#00FF44" font-weight="bold">[</text>

  <!-- 파라미터 힌트 (32;1) -->
  <text x="790" y="540" font-family="Consolas,monospace" font-size="100" fill="#009900" font-weight="bold">32;1</text>

  <!-- m 종료 -->
  <text x="790" y="640" font-family="Consolas,monospace" font-size="100" fill="#00AA00" font-weight="bold">m</text>

  <!-- Layer 3: 하단 컬러 출력 줄 -->
  <rect x="130" y="700" width="764" height="80" rx="16" fill="#000D00"/>
  <!-- 컬러 블록들 (16색 기본) -->
  <rect x="148" y="718" width="44" height="44" rx="6" fill="#000000"/>
  <rect x="200" y="718" width="44" height="44" rx="6" fill="#800000"/>
  <rect x="252" y="718" width="44" height="44" rx="6" fill="#008000"/>
  <rect x="304" y="718" width="44" height="44" rx="6" fill="#808000"/>
  <rect x="356" y="718" width="44" height="44" rx="6" fill="#000080"/>
  <rect x="408" y="718" width="44" height="44" rx="6" fill="#800080"/>
  <rect x="460" y="718" width="44" height="44" rx="6" fill="#008080"/>
  <rect x="512" y="718" width="44" height="44" rx="6" fill="#C0C0C0"/>
  <rect x="564" y="718" width="44" height="44" rx="6" fill="#808080"/>
  <rect x="616" y="718" width="44" height="44" rx="6" fill="#FF0000"/>
  <rect x="668" y="718" width="44" height="44" rx="6" fill="#00FF00"/>
  <rect x="720" y="718" width="44" height="44" rx="6" fill="#FFFF00"/>
  <rect x="772" y="718" width="44" height="44" rx="6" fill="#0000FF"/>
  <rect x="824" y="718" width="44" height="44" rx="6" fill="#FF00FF"/>

  <!-- 커서 -->
  <rect x="148" y="820" width="28" height="50" rx="4" fill="#00FF44" opacity="0.9"/>
</svg>
