<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright sky blue rounded rect -->
  <rect width="1024" height="1024" rx="190" fill="#4FC3F7"/>
  <rect x="20" y="20" width="984" height="984" rx="175" fill="url(#bgGrad01)"/>
  <defs>
    <linearGradient id="bgGrad01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F6FF"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <filter id="shadow01" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 2: SVG badge (left) + arrow + ICO badge (right) -->
  <!-- SVG Badge -->
  <rect x="108" y="390" width="280" height="160" rx="24" fill="#1565C0" filter="url(#shadow01)"/>
  <text x="248" y="492" font-family="'Segoe UI', Arial, sans-serif" font-size="90" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">SVG</text>

  <!-- Arrow (thick, vivid orange) -->
  <line x1="420" y1="470" x2="600" y2="470" stroke="#FF6D00" stroke-width="52" stroke-linecap="round"/>
  <polygon points="604,470 548,430 548,510" fill="#FF6D00"/>

  <!-- ICO Badge -->
  <rect x="636" y="390" width="280" height="160" rx="24" fill="#E65100" filter="url(#shadow01)"/>
  <text x="776" y="492" font-family="'Segoe UI', Arial, sans-serif" font-size="90" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- Layer 3: Sub labels + pixel grid hint on ICO badge -->
  <!-- ICO pixel grid (tiny squares inside ICO badge) -->
  <rect x="650" y="404" width="16" height="16" rx="3" fill="#FF8A50" opacity="0.6"/>
  <rect x="670" y="404" width="16" height="16" rx="3" fill="#FF8A50" opacity="0.6"/>
  <rect x="690" y="404" width="16" height="16" rx="3" fill="#FF8A50" opacity="0.6"/>

  <!-- Format count chips below -->
  <rect x="180" y="582" width="136" height="48" rx="24" fill="#1976D2"/>
  <text x="248" y="607" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle">PNG·JPG</text>

  <rect x="700" y="582" width="156" height="48" rx="24" fill="#BF360C"/>
  <text x="778" y="607" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle">16~256px</text>

  <!-- Top label -->
  <text x="512" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700"
        fill="#0D47A1" text-anchor="middle" dominant-baseline="middle" opacity="0.8">이미지 변환</text>
</svg>
