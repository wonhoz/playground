<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 연한 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 저울 -->
  <!-- 저울 받침대 -->
  <rect x="468" y="720" width="88" height="200" rx="16" fill="#5D4037"/>
  <rect x="320" y="900" width="384" height="48" rx="16" fill="#5D4037"/>
  <!-- 저울 팔 -->
  <rect x="140" y="360" width="744" height="24" rx="12" fill="#8D6E63"/>
  <!-- 중앙 지지점 -->
  <circle cx="512" cy="372" r="36" fill="#6D4C41"/>
  <!-- 왼쪽 접시 줄 -->
  <line x1="220" y1="384" x2="220" y2="500" stroke="#8D6E63" stroke-width="12"/>
  <line x1="220" y1="384" x2="180" y2="500" stroke="#8D6E63" stroke-width="10"/>
  <line x1="220" y1="384" x2="260" y2="500" stroke="#8D6E63" stroke-width="10"/>
  <!-- 왼쪽 접시 (일치 - 초록) -->
  <ellipse cx="220" cy="510" rx="140" ry="40" fill="#388E3C"/>
  <text x="220" y="504" font-family="'Consolas', monospace" font-size="48" fill="white" text-anchor="middle">a3f8b2c1</text>
  <!-- 오른쪽 접시 줄 -->
  <line x1="804" y1="384" x2="804" y2="500" stroke="#8D6E63" stroke-width="12"/>
  <line x1="804" y1="384" x2="764" y2="500" stroke="#8D6E63" stroke-width="10"/>
  <line x1="804" y1="384" x2="844" y2="500" stroke="#8D6E63" stroke-width="10"/>
  <!-- 오른쪽 접시 (일치 - 초록) -->
  <ellipse cx="804" cy="510" rx="140" ry="40" fill="#388E3C"/>
  <text x="804" y="504" font-family="'Consolas', monospace" font-size="48" fill="white" text-anchor="middle">a3f8b2c1</text>
  <!-- Layer 3: 체크마크 (균형 일치) -->
  <circle cx="512" cy="240" r="120" fill="#1B5E20"/>
  <polyline points="452,240 492,280 572,200" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 결과 텍스트 -->
  <text x="512" y="830" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#2E7D32" text-anchor="middle">✓ MATCH</text>
</svg>
