<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E4A6E"/>
      <stop offset="100%" stop-color="#0D2B45"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Robot antenna -->
  <rect x="248" y="60" width="16" height="40" rx="5" fill="#0EA5E9"/>
  <circle cx="256" cy="55" r="12" fill="#38BDF8"/>
  <circle cx="256" cy="55" r="6" fill="#7DD3FC" opacity="0.9"/>
  <!-- Robot head -->
  <rect x="160" y="100" width="192" height="150" rx="20" fill="url(#robot)" stroke="#0EA5E9" stroke-width="2.5"/>
  <!-- Eyes -->
  <rect x="188" y="140" width="50" height="36" rx="8" fill="#0EA5E9" opacity="0.3"/>
  <circle cx="213" cy="158" r="14" fill="#38BDF8"/>
  <circle cx="213" cy="158" r="7" fill="#0C4A6E"/>
  <circle cx="218" cy="153" r="4" fill="white" opacity="0.6"/>
  <rect x="274" y="140" width="50" height="36" rx="8" fill="#0EA5E9" opacity="0.3"/>
  <circle cx="299" cy="158" r="14" fill="#38BDF8"/>
  <circle cx="299" cy="158" r="7" fill="#0C4A6E"/>
  <circle cx="304" cy="153" r="4" fill="white" opacity="0.6"/>
  <!-- Mouth display - JSON -->
  <rect x="195" y="200" width="122" height="34" rx="6" fill="#0C4A6E"/>
  <text x="256" y="222" font-family="Courier New" font-size="12" fill="#38BDF8" text-anchor="middle">&#123;"mock": true&#125;</text>
  <!-- Robot body -->
  <rect x="140" y="250" width="232" height="160" rx="14" fill="url(#robot)" stroke="#0EA5E9" stroke-width="2"/>
  <!-- Body panel: data output display -->
  <rect x="160" y="268" width="192" height="90" rx="8" fill="#0C1929"/>
  <rect x="170" y="278" width="50" height="8" rx="3" fill="#0EA5E9" opacity="0.7"/>
  <rect x="226" y="278" width="110" height="8" rx="3" fill="#38BDF8" opacity="0.6"/>
  <rect x="170" y="294" width="80" height="7" rx="3" fill="#7DD3FC" opacity="0.5"/>
  <rect x="256" y="294" width="80" height="7" rx="3" fill="#FCD34D" opacity="0.6"/>
  <rect x="170" y="309" width="60" height="7" rx="3" fill="#7DD3FC" opacity="0.5"/>
  <rect x="236" y="309" width="90" height="7" rx="3" fill="#38BDF8" opacity="0.5"/>
  <rect x="170" y="324" width="70" height="7" rx="3" fill="#34D399" opacity="0.7"/>
  <rect x="246" y="324" width="80" height="7" rx="3" fill="#7DD3FC" opacity="0.4"/>
  <!-- Gear indicator -->
  <circle cx="340" cy="385" r="20" fill="none" stroke="#0EA5E9" stroke-width="3"/>
  <circle cx="340" cy="385" r="8" fill="#0EA5E9" opacity="0.4"/>
  <!-- Arms -->
  <rect x="80" y="258" width="60" height="18" rx="9" fill="#1E4A6E" stroke="#0EA5E9" stroke-width="1.5"/>
  <rect x="372" y="258" width="60" height="18" rx="9" fill="#1E4A6E" stroke="#0EA5E9" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="175" y="410" width="40" height="60" rx="10" fill="#1E4A6E" stroke="#0EA5E9" stroke-width="1.5"/>
  <rect x="297" y="410" width="40" height="60" rx="10" fill="#1E4A6E" stroke="#0EA5E9" stroke-width="1.5"/>
</svg>
