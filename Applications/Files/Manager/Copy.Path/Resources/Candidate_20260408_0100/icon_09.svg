  <text x="148" y="438" font-family="Consolas,monospace" font-size="16" fill="#6B7280">C:\Users\ad...</text>

  <rect x="376" y="390" width="234" height="58" rx="10" fill="#FFF7ED"/>
  <rect x="376" y="390" width="8" height="58" rx="4" fill="#F59E0B"/>
  <text x="394" y="418" font-family="Consolas,monospace" font-size="20" fill="#92400E" font-weight="bold">slash /</text>
  <text x="394" y="438" font-family="Consolas,monospace" font-size="16" fill="#6B7280">C:/Users/ad...</text>

  <rect x="622" y="390" width="234" height="58" rx="10" fill="#F5F3FF"/>
  <rect x="622" y="390" width="8" height="58" rx="4" fill="#8B5CF6"/>
  <text x="640" y="418" font-family="Consolas,monospace" font-size="20" fill="#4C1D95" font-weight="bold">C#</text>
  <text x="640" y="438" font-family="Consolas,monospace" font-size="16" fill="#6B7280">C:\\Users\\a...</text>

  <!-- Row 2 -->
  <rect x="130" y="466" width="234" height="58" rx="10" fill="#F0FDF4"/>
  <rect x="130" y="466" width="8" height="58" rx="4" fill="#22C55E"/>
  <text x="148" y="494" font-family="Consolas,monospace" font-size="20" fill="#166534" font-weight="bold">filename</text>
  <text x="148" y="514" font-family="Consolas,monospace" font-size="16" fill="#6B7280">file.txt</text>

  <rect x="376" y="466" width="234" height="58" rx="10" fill="#FFF1F2"/>
  <rect x="376" y="466" width="8" height="58" rx="4" fill="#EF4444"/>
  <text x="394" y="494" font-family="Consolas,monospace" font-size="20" fill="#991B1B" font-weight="bold">no ext</text>
  <text x="394" y="514" font-family="Consolas,monospace" font-size="16" fill="#6B7280">file</text>

  <rect x="622" y="466" width="234" height="58" rx="10" fill="#F0F9FF"/>
  <rect x="622" y="390" width="8" height="134" rx="0" fill="transparent"/>
  <rect x="622" y="466" width="8" height="58" rx="4" fill="#0EA5E9"/>
  <text x="640" y="494" font-family="Consolas,monospace" font-size="20" fill="#0C4A6E" font-weight="bold">dir</text>
  <text x="640" y="514" font-family="Consolas,monospace" font-size="16" fill="#6B7280">C:\Users\admin</text>

  <!-- Row 3 -->
  <rect x="130" y="542" width="234" height="58" rx="10" fill="#FEFCE8"/>
  <rect x="130" y="542" width="8" height="58" rx="4" fill="#EAB308"/>
