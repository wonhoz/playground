<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 빨강-핑크 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg5)"/>

  <!-- Layer 2: 사슬 끊기 -->
  <!-- 사슬 링크 1 (왼쪽) -->
  <rect x="80" y="440" width="180" height="90" rx="30" fill="#D32F2F" stroke="#B71C1C" stroke-width="10"/>
  <rect x="100" y="458" width="140" height="54" rx="22" fill="none" stroke="#FFCDD2" stroke-width="12"/>
  <!-- 사슬 링크 2 -->
  <rect x="220" y="460" width="90" height="180" rx="30" fill="#D32F2F" stroke="#B71C1C" stroke-width="10" transform="rotate(90, 265, 550)"/>
  <!-- 사슬 링크 3 -->
  <rect x="310" y="440" width="160" height="90" rx="30" fill="#EF5350" stroke="#D32F2F" stroke-width="10"/>
  <rect x="330" y="458" width="120" height="54" rx="22" fill="none" stroke="#FFCDD2" stroke-width="12"/>

  <!-- 끊어진 부분 (중앙) -->
  <!-- 왼쪽 끊김 -->
  <rect x="460" y="440" width="80" height="90" rx="20" fill="#D32F2F" stroke="#B71C1C" stroke-width="10" transform="rotate(-15, 500, 485)"/>
  <!-- 오른쪽 끊김 -->
  <rect x="560" y="440" width="80" height="90" rx="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="10" transform="rotate(15, 600, 485)"/>

  <!-- 폭발 효과 (끊어진 중앙) -->
  <circle cx="512" cy="480" r="60" fill="#FF8F00" opacity="0.8"/>
  <circle cx="512" cy="480" r="40" fill="#FFD740" opacity="0.9"/>
  <circle cx="512" cy="480" r="22" fill="white"/>
  <!-- 파편 -->
  <line x1="450" y1="420" x2="408" y2="378" stroke="#FF8F00" stroke-width="12" stroke-linecap="round"/>
  <line x1="574" y1="420" x2="616" y2="378" stroke="#FF8F00" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="418" x2="512" y2="370" stroke="#FFD740" stroke-width="10" stroke-linecap="round"/>
  <circle cx="408" cy="370" r="14" fill="#FF8F00" opacity="0.7"/>
  <circle cx="616" cy="368" r="12" fill="#FF8F00" opacity="0.6"/>

  <!-- 오른쪽 — 해방된 파일 사슬 (초록) -->
  <rect x="644" y="440" width="160" height="90" rx="30" fill="#2E7D32" stroke="#1B5E20" stroke-width="10"/>
  <rect x="664" y="458" width="120" height="54" rx="22" fill="none" stroke="#C8E6C9" stroke-width="12"/>
  <rect x="764" y="460" width="90" height="180" rx="30" fill="#388E3C" stroke="#2E7D32" stroke-width="10" transform="rotate(90, 809, 550)"/>
  <rect x="854" y="440" width="90" height="90" rx="30" fill="#43A047" stroke="#388E3C" stroke-width="10"/>

  <!-- Layer 3: 파일 아이콘들 -->
  <!-- 왼쪽 잠긴 파일 -->
  <rect x="160" y="620" width="100" height="130" rx="10" fill="#EF5350" opacity="0.8"/>
  <text x="210" y="700" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="48" text-anchor="middle">🔒</text>
  <!-- 오른쪽 해방된 파일 -->
  <rect x="760" y="620" width="100" height="130" rx="10" fill="#43A047" opacity="0.8"/>
  <text x="810" y="700" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="48" text-anchor="middle">🔓</text>
</svg>
