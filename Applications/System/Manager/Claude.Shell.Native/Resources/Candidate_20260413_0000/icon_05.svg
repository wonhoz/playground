<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: hybrid · 중앙심볼 · 커서 + 터미널 프롬프트 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFF9C4"/>
  <!-- 터미널 창 -->
  <g>
    <rect x="140" y="260" width="744" height="560" rx="32" fill="#1A1A1A" stroke="#FFD93D" stroke-width="18"/>
    <rect x="140" y="260" width="744" height="80" rx="32" fill="#FFD93D"/>
    <rect x="140" y="306" width="744" height="34" fill="#FFD93D"/>
    <circle cx="200" cy="300" r="16" fill="#FF5252"/>
    <circle cx="244" cy="300" r="16" fill="#FF9800"/>
    <circle cx="288" cy="300" r="16" fill="#4CAF50"/>
    <text x="640" y="318" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#3E2723">claude — terminal</text>
    <!-- 프롬프트 -->
    <text x="170" y="420" font-family="Consolas, monospace" font-weight="700" font-size="56" fill="#06D6A0">$ cd my-app</text>
    <text x="170" y="500" font-family="Consolas, monospace" font-weight="700" font-size="56" fill="#06D6A0">$ claude</text>
    <text x="170" y="580" font-family="Consolas, monospace" font-weight="700" font-size="46" fill="#FFFFFF">&gt; Ready to code!</text>
    <text x="170" y="650" font-family="Consolas, monospace" font-weight="700" font-size="46" fill="#FFD93D">&gt; Start editing</text>
    <text x="170" y="720" font-family="Consolas, monospace" font-weight="700" font-size="46" fill="#FF6B9D">&gt; Open folder</text>
    <!-- 블링크 커서 -->
    <rect x="170" y="740" width="36" height="60" fill="#06D6A0"/>
  </g>
  <!-- 우클릭 커서 (배지 형태) -->
  <g transform="translate(770 540)">
    <circle cx="60" cy="60" r="90" fill="#FFD93D" stroke="#3E2723" stroke-width="14"/>
    <path d="M 40 20 L 40 110 L 62 90 L 80 128 L 92 120 L 74 86 L 106 86 Z" fill="#FFFFFF" stroke="#3E2723" stroke-width="8" stroke-linejoin="round"/>
  </g>
  <!-- 상단 라벨 -->
  <rect x="262" y="100" width="500" height="110" rx="38" fill="#3E2723"/>
  <text x="512" y="178" font-family="Arial Black, sans-serif" font-weight="900" font-size="76" fill="#FFD93D" text-anchor="middle">CLAUDE SHELL</text>
  <!-- 하단 라벨 -->
  <text x="512" y="900" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#3E2723" text-anchor="middle">RIGHT-CLICK LAUNCH</text>
</svg>
