<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d001a"/>
      <stop offset="100%" style="stop-color:#001a0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0030"/>
      <stop offset="100%" style="stop-color:#0d001a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- City silhouette -->
  <rect x="50" y="240" width="40" height="160" fill="#0a0015" opacity="0.8"/>
  <rect x="70" y="200" width="20" height="200" fill="#0a0015" opacity="0.8"/>
  <rect x="100" y="260" width="50" height="140" fill="#0a0015" opacity="0.8"/>
  <rect x="130" y="220" width="25" height="180" fill="#0a0015" opacity="0.8"/>
  <rect x="360" y="250" width="45" height="150" fill="#0a0015" opacity="0.8"/>
  <rect x="395" y="210" width="30" height="190" fill="#0a0015" opacity="0.8"/>
  <rect x="425" y="230" width="40" height="170" fill="#0a0015" opacity="0.8"/>
  <!-- Building neon lights -->
  <rect x="58" y="255" width="8" height="4" fill="#ff0066" filter="url(#glow)"/>
  <rect x="108" y="270" width="8" height="4" fill="#00ffcc" filter="url(#glow)"/>
  <rect x="368" y="260" width="8" height="4" fill="#ff0066" filter="url(#glow)"/>
  <rect x="405" y="225" width="8" height="4" fill="#8800ff" filter="url(#glow)"/>
  <!-- Ground -->
  <rect x="40" y="400" width="432" height="6" fill="#ff0066" filter="url(#neon)" opacity="0.8"/>
  <rect x="40" y="406" width="432" height="2" fill="#ff0066" opacity="0.3"/>
  <!-- Runner cyberpunk style -->
  <g filter="url(#neon)" transform="translate(256, 360)">
    <!-- Head with visor -->
    <rect x="-14" y="-62" width="28" height="22" rx="5" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <rect x="-10" y="-56" width="20" height="8" rx="2" fill="#ff0066" opacity="0.7"/>
    <!-- Body armored -->
    <rect x="-12" y="-40" width="24" height="38" rx="3" fill="none" stroke="#8800ff" stroke-width="2"/>
    <line x1="-6" y1="-35" x2="-6" y2="-8" stroke="#00ffcc" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="-35" x2="6" y2="-8" stroke="#00ffcc" stroke-width="1" opacity="0.6"/>
    <!-- Arms -->
    <line x1="-12" y1="-30" x2="-28" y2="-10" stroke="#00ffcc" stroke-width="2.5"/>
    <line x1="12" y1="-30" x2="26" y2="-48" stroke="#ff0066" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-6" y1="-2" x2="-14" y2="28" stroke="#8800ff" stroke-width="3"/>
    <line x1="-14" y1="28" x2="-4" y2="44" stroke="#8800ff" stroke-width="2.5"/>
    <line x1="6" y1="-2" x2="18" y2="22" stroke="#ff0066" stroke-width="3"/>
    <line x1="18" y1="22" x2="26" y2="10" stroke="#ff0066" stroke-width="2.5"/>
  </g>
  <!-- Exhaust trail -->
  <path d="M180 380 Q210 375 230 378" stroke="#ff0066" stroke-width="4" fill="none" filter="url(#glow)" opacity="0.7" stroke-linecap="round"/>
  <path d="M160 385 Q200 382 225 385" stroke="#ff0066" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.4" stroke-linecap="round"/>
  <!-- Floating particles -->
  <circle cx="300" cy="300" r="2" fill="#8800ff" filter="url(#glow)"/>
  <circle cx="320" cy="280" r="1.5" fill="#00ffcc" filter="url(#glow)"/>
  <circle cx="340" cy="310" r="1" fill="#ff0066" filter="url(#glow)"/>
</svg>