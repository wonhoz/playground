<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#200800"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="50%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FFFF44"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#FF4400" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="350" r="200" fill="url(#glow)"/>
  <!-- Beat bars (fire colored) -->
  <rect x="72" y="300" width="30" height="100" rx="6" fill="url(#flame)" opacity="0.7"/>
  <rect x="112" y="260" width="30" height="140" rx="6" fill="url(#flame)" opacity="0.75"/>
