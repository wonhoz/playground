<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background lime green -->
  <rect width="1024" height="1024" rx="190" fill="#69F0AE"/>
  <!-- Layer 2: Drop zone rectangle -->
  <rect x="150" y="260" width="724" height="500" rx="32" fill="#FFFFFF" opacity="0.9"/>
  <rect x="176" y="286" width="672" height="448" rx="20" fill="none" stroke="#7B1FA2" stroke-width="14" stroke-dasharray="28 16"/>
  <!-- Drop arrow pointing down into zone -->
  <path d="M512 180 L512 390" stroke="#7B1FA2" stroke-width="32" stroke-linecap="round"/>
  <polygon points="440,370 512,460 584,370" fill="#7B1FA2"/>
  <!-- File icons floating above -->
  <rect x="310" y="90" width="90" height="110" rx="12" fill="#E040FB" opacity="0.9"/>
  <text x="355" y="162" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">PNG</text>
  <rect x="624" y="90" width="90" height="110" rx="12" fill="#40C4FF" opacity="0.9"/>
  <text x="669" y="162" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">SVG</text>
  <!-- Layer 3: "Drop files here" text inside zone -->
  <text x="512" y="590" font-family="Arial, sans-serif" font-size="54" fill="#9C27B0" text-anchor="middle" opacity="0.7">Drop files here</text>
  <text x="512" y="660" font-family="Arial, sans-serif" font-size="38" fill="#AB47BC" text-anchor="middle" opacity="0.5">to convert</text>
</svg>
