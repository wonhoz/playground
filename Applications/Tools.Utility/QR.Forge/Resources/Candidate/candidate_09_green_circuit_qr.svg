<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1F0A"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit traces -->
  <g stroke="#1B5E20" stroke-width="3" fill="none" opacity="0.5">
    <line x1="60" y1="200" x2="120" y2="200"/>
    <line x1="120" y1="200" x2="120" y2="280"/>
    <line x1="60" y1="320" x2="100" y2="320"/>
    <line x1="400" y1="160" x2="450" y2="160"/>
    <line x1="450" y1="160" x2="450" y2="220"/>
    <line x1="380" y1="400" x2="450" y2="400"/>
  </g>
  <g fill="#1B5E20" opacity="0.5">
    <circle cx="120" cy="200" r="8"/>
    <circle cx="120" cy="280" r="8"/>
    <circle cx="100" cy="320" r="8"/>
    <circle cx="450" cy="160" r="8"/>
    <circle cx="450" cy="220" r="8"/>
  </g>
  <!-- QR corners -->
  <rect x="82" y="82" width="136" height="136" rx="12" fill="none" stroke="url(#green)" stroke-width="16"/>
  <rect x="106" y="106" width="88" height="88" rx="6" fill="url(#green)" opacity="0.9"/>
  <rect x="294" y="82" width="136" height="136" rx="12" fill="none" stroke="url(#green)" stroke-width="16"/>
  <rect x="318" y="106" width="88" height="88" rx="6" fill="url(#green)" opacity="0.9"/>
  <rect x="82" y="294" width="136" height="136" rx="12" fill="none" stroke="url(#green)" stroke-width="16"/>
  <rect x="106" y="318" width="88" height="88" rx="6" fill="url(#green)" opacity="0.9"/>
  <!-- Data cells -->
  <g fill="url(#green)">
    <rect x="294" y="294" width="24" height="24" rx="4"/>
    <rect x="326" y="294" width="24" height="24" rx="4" opacity="0.5"/>
    <rect x="358" y="294" width="24" height="24" rx="4"/>
    <rect x="390" y="294" width="24" height="24" rx="4" opacity="0.5"/>
    <rect x="294" y="326" width="24" height="24" rx="4" opacity="0.5"/>
    <rect x="358" y="326" width="24" height="24" rx="4"/>
    <rect x="326" y="358" width="24" height="24" rx="4"/>
    <rect x="390" y="358" width="24" height="24" rx="4" opacity="0.7"/>
    <rect x="294" y="390" width="24" height="24" rx="4"/>
    <rect x="358" y="390" width="24" height="24" rx="4" opacity="0.5"/>
    <rect x="390" y="390" width="24" height="24" rx="4"/>
  </g>
