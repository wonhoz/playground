<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 골든 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#0F0A00"/>

  <!-- 기하학추상 패턴: 브라우저 창을 황금 프레임으로 추상화 -->

  <!-- 황금 외곽 장식 프레임 (기하학) -->
  <rect x="80" y="80" width="864" height="864" rx="40" fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.3"/>
  <rect x="100" y="100" width="824" height="824" rx="32" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.4"/>

  <!-- 중앙 브라우저 프레임 (황금 테두리) -->
  <rect x="150" y="220" width="724" height="580" rx="20" fill="#160C00"/>
  <rect x="150" y="220" width="724" height="580" rx="20" fill="none" stroke="#F59E0B" stroke-width="8"/>

  <!-- 타이틀바 -->
  <rect x="150" y="220" width="724" height="64" rx="20" fill="#292400"/>
  <rect x="150" y="254" width="724" height="30" fill="#292400"/>

  <!-- URL 바 (황금) -->
  <rect x="280" y="233" width="460" height="36" rx="18" fill="#160C00"/>
  <rect x="280" y="233" width="460" height="36" rx="18" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <text x="510" y="257" font-family="monospace" font-size="16" fill="#FBBF24" text-anchor="middle">https://example.com</text>

  <!-- 트래픽 라이트 (황금 스타일) -->
  <circle cx="178" cy="252" r="10" fill="#F59E0B"/>
  <circle cx="204" cy="252" r="10" fill="#FCD34D"/>
  <circle cx="230" cy="252" r="10" fill="#FDE68A"/>

  <!-- 웹 페이지 콘텐츠 (황금 라인) -->
  <rect x="170" y="304" width="684" height="100" rx="8" fill="#1A0E00"/>
  <!-- 헤더 텍스트 시뮬레이션 -->
  <rect x="190" y="322" width="300" height="24" rx="6" fill="#292400"/>
  <rect x="190" y="354" width="500" height="14" rx="4" fill="#1F1500"/>
  <rect x="190" y="374" width="460" height="14" rx="4" fill="#1F1500"/>

  <rect x="170" y="420" width="684" height="80" rx="8" fill="#1A0E00"/>
  <rect x="190" y="438" width="220" height="18" rx="5" fill="#292400"/>
  <rect x="190" y="464" width="560" height="12" rx="3" fill="#1F1500"/>
  <rect x="190" y="482" width="520" height="12" rx="3" fill="#1F1500"/>

  <rect x="170" y="516" width="684" height="80" rx="8" fill="#1A0E00"/>
  <rect x="190" y="534" width="260" height="18" rx="5" fill="#292400"/>
  <rect x="190" y="560" width="540" height="12" rx="3" fill="#1F1500"/>
  <rect x="190" y="578" width="500" height="12" rx="3" fill="#1F1500"/>

  <rect x="170" y="612" width="684" height="80" rx="8" fill="#1A0E00"/>
  <rect x="190" y="630" width="200" height="18" rx="5" fill="#292400"/>
  <rect x="190" y="656" width="560" height="12" rx="3" fill="#1F1500"/>
  <rect x="190" y="674" width="480" height="12" rx="3" fill="#1F1500"/>
  <rect x="190" y="694" width="520" height="12" rx="3" fill="#1F1500"/>

  <!-- 황금 캡처 셔터 (중앙 오버레이 원형) -->
  <circle cx="512" cy="512" r="140" fill="#0F0A00" fill-opacity="0.7" stroke="#F59E0B" stroke-width="10"/>
  <circle cx="512" cy="512" r="100" fill="none" stroke="#FBBF24" stroke-width="6"/>
  <!-- 셔터 블레이드 -->
  <g transform="translate(512,512)" opacity="0.85">
    <path d="M0,-80 A80,80 0 0,1 69,-40 L34,-20 A40,40 0 0,0 0,-40 Z" fill="#F59E0B"/>
    <path d="M69,-40 A80,80 0 0,1 69,40 L34,20 A40,40 0 0,0 34,-20 Z" fill="#FBBF24"/>
    <path d="M69,40 A80,80 0 0,1 0,80 L0,40 A40,40 0 0,0 34,20 Z" fill="#FCD34D"/>
    <path d="M0,80 A80,80 0 0,1 -69,40 L-34,20 A40,40 0 0,0 0,40 Z" fill="#F59E0B"/>
    <path d="M-69,40 A80,80 0 0,1 -69,-40 L-34,-20 A40,40 0 0,0 -34,20 Z" fill="#FBBF24"/>
    <path d="M-69,-40 A80,80 0 0,1 0,-80 L0,-40 A40,40 0 0,0 -34,-20 Z" fill="#FCD34D"/>
    <circle cx="0" cy="0" r="28" fill="#0F0A00"/>
    <circle cx="0" cy="0" r="18" fill="#F59E0B"/>
  </g>

  <!-- 코너 황금 장식 -->
  <path d="M80,200 L80,80 L200,80" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M944,200 L944,80 L824,80" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80,824 L80,944 L200,944" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M944,824 L944,944 L824,944" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
