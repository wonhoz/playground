<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4km" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003333"/>
      <stop offset="100%" stop-color="#001A1A"/>
    </linearGradient>
    <clipPath id="c4km"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4km)"/>
  <circle cx="512" cy="512" r="340" fill="#006064" opacity="0.12" clip-path="url(#c4km)"/>

  <!-- Layer 2: 키 조합 네트워크 (기하학추상) -->
  <!-- 중앙 노드: 앱 -->
  <circle cx="512" cy="490" r="68" fill="#004D4D" stroke="#00ACC1" stroke-width="5"/>
  <text x="512" y="482" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#00E5FF">VS</text>
  <text x="512" y="504" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#00E5FF">Code</text>

  <!-- 키 조합 노드들 (주변 6개) -->
  <!-- 상단 -->
  <circle cx="512" cy="272" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="512" y="268" text-anchor="middle" font-family="Consolas,monospace" font-size="17" font-weight="700" fill="#4DD0E1">Ctrl</text>
  <text x="512" y="287" text-anchor="middle" font-family="Consolas,monospace" font-size="17" font-weight="700" fill="#4DD0E1">+S</text>

  <!-- 우상 -->
  <circle cx="710" cy="344" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="710" y="340" text-anchor="middle" font-family="Consolas,monospace" font-size="16" font-weight="700" fill="#4DD0E1">Ctrl</text>
  <text x="710" y="359" text-anchor="middle" font-family="Consolas,monospace" font-size="16" font-weight="700" fill="#4DD0E1">+P</text>

  <!-- 우하 -->
  <circle cx="710" cy="638" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="710" y="634" text-anchor="middle" font-family="Consolas,monospace" font-size="15" font-weight="700" fill="#4DD0E1">F5</text>
  <text x="710" y="653" text-anchor="middle" font-family="Consolas,monospace" font-size="13" fill="#26C6DA">Debug</text>

  <!-- 하단 -->
  <circle cx="512" cy="710" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="512" y="704" text-anchor="middle" font-family="Consolas,monospace" font-size="14" font-weight="700" fill="#4DD0E1">Ctrl</text>
  <text x="512" y="722" text-anchor="middle" font-family="Consolas,monospace" font-size="14" font-weight="700" fill="#4DD0E1">+⇧+P</text>

  <!-- 좌하 -->
  <circle cx="314" cy="638" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="314" y="634" text-anchor="middle" font-family="Consolas,monospace" font-size="16" font-weight="700" fill="#4DD0E1">Ctrl</text>
  <text x="314" y="653" text-anchor="middle" font-family="Consolas,monospace" font-size="16" font-weight="700" fill="#4DD0E1">+Z</text>

  <!-- 좌상 -->
  <circle cx="314" cy="344" r="52" fill="#002A2A" stroke="#00838F" stroke-width="4"/>
  <text x="314" y="340" text-anchor="middle" font-family="Consolas,monospace" font-size="15" font-weight="700" fill="#4DD0E1">Ctrl</text>
  <text x="314" y="359" text-anchor="middle" font-family="Consolas,monospace" font-size="15" font-weight="700" fill="#4DD0E1">+`</text>

  <!-- 연결선들 -->
  <line x1="512" y1="422" x2="512" y2="324" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="574" y1="444" x2="662" y2="394" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="574" y1="536" x2="662" y2="590" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="558" x2="512" y2="658" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="450" y1="536" x2="362" y2="590" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="450" y1="444" x2="362" y2="394" stroke="#00838F" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Layer 3: 카테고리 레이블 (연결선 위) -->
  <rect x="560" y="376" width="58" height="20" rx="6" fill="#001A1A"/>
  <text x="589" y="390" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#00ACC1">File</text>
  <rect x="560" y="554" width="60" height="20" rx="6" fill="#001A1A"/>
  <text x="590" y="568" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#00ACC1">Run</text>
  <rect x="404" y="554" width="60" height="20" rx="6" fill="#001A1A"/>
  <text x="434" y="568" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#00ACC1">Edit</text>
  <rect x="400" y="376" width="64" height="20" rx="6" fill="#001A1A"/>
  <text x="432" y="390" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#00ACC1">View</text>
</svg>
