<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2A38"/>
      <stop offset="100%" stop-color="#0D1F2D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="80" y="100" width="352" height="260" rx="14" fill="#1C2733" stroke="#455A64" stroke-width="6"/>
  <rect x="92" y="112" width="328" height="236" rx="6" fill="url(#screen)"/>
  <!-- Monitor stand -->
  <rect x="228" y="360" width="56" height="52" rx="4" fill="#455A64"/>
  <rect x="180" y="405" width="152" height="18" rx="9" fill="#546E7A"/>
  <!-- Broken glass crack pattern -->
  <g stroke="#FF5252" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="256" y1="112" x2="256" y2="348"/>
    <line x1="256" y1="230" x2="92" y2="160"/>
    <line x1="256" y1="230" x2="420" y2="148"/>
    <line x1="256" y1="230" x2="130" y2="348"/>
    <line x1="256" y1="230" x2="380" y2="330"/>
    <line x1="256" y1="230" x2="92" y2="295"/>
    <line x1="256" y1="230" x2="420" y2="280"/>
  </g>
  <!-- Impact point circle -->
  <circle cx="256" cy="230" r="22" fill="#FF5252" opacity="0.3"/>
  <circle cx="256" cy="230" r="12" fill="#FF5252" opacity="0.6"/>
  <circle cx="256" cy="230" r="5" fill="white"/>
  <!-- Error text on screen -->
  <text x="256" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#FF5252" opacity="0.7">Fatal Error</text>
  <text x="256" y="320" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF5252" opacity="0.6">0xC0000005</text>
  <!-- Shards at bottom -->
  <polygon points="92,348 130,348 100,380" fill="#1C2733" stroke="#FF5252" stroke-width="2"/>
  <polygon points="152,348 190,348 170,375" fill="#1C2733" stroke="#FF5252" stroke-width="2"/>
  <polygon points="380,330 420,330 410,360" fill="#1C2733" stroke="#FF5252" stroke-width="2"/>
</svg>
