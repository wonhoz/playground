<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#D50000"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg01)"/>
  <!-- Layer 2: Big ×4 with upscale arrow -->
  <!-- Arrow pointing up (upscale) -->
  <line x1="512" y1="650" x2="512" y2="330" stroke="white" stroke-width="48" stroke-linecap="round"/>
  <polygon points="380,430 512,240 644,430" fill="white"/>
  <!-- Layer 3: ×4 label at bottom -->
  <text x="330" y="870" font-family="'Segoe UI',Arial,sans-serif" font-size="200" font-weight="900" fill="white" opacity="0.95">×4</text>
  <!-- Small resolution hint -->
  <text x="198" y="960" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="700" fill="white" opacity="0.6">upscale</text>
</svg>
