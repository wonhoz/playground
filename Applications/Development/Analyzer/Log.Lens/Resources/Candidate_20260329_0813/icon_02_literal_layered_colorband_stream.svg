  <text x="210" y="875" font-family="Consolas, monospace" font-size="22" fill="#6EA8FE">6 lines shown</text>
  <text x="620" y="875" font-family="Consolas, monospace" font-size="22" fill="#00C8FF">UTF-8</text>
