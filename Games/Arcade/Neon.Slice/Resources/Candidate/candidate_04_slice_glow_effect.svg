<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080010"/>
      <stop offset="100%" style="stop-color:#100800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sliceFlash" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="20%" style="stop-color:#ffff00"/>
      <stop offset="60%" style="stop-color:#ff8800;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Slice flash center -->
  <circle cx="256" cy="256" r="80" fill="url(#sliceFlash)" opacity="0.6"/>
  <!-- Radial slice lines -->
  <line x1="256" y1="256" x2="156" y2="156" stroke="#ffff00" stroke-width="3" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="356" y2="356" stroke="#ffff00" stroke-width="3" filter="url(#glow)"/>
  <!-- Main diagonal cut -->
  <line x1="100" y1="100" x2="412" y2="412" stroke="#ff8800" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- Perpendicular cut -->
  <line x1="412" y1="100" x2="100" y2="412" stroke="#ff8800" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- 4 fragment pieces -->
  <path d="M256 256 L156 156 L256 80 L356 156 Z" fill="none" stroke="#ff8800" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="translate(-15,-15)"/>
  <path d="M256 256 L356 156 L432 256 L356 356 Z" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="translate(15,-5)"/>
  <path d="M256 256 L356 356 L256 432 L156 356 Z" fill="none" stroke="#ff8800" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="translate(15,15)"/>
  <path d="M256 256 L156 356 L80 256 L156 156 Z" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="translate(-15,5)"/>
  <!-- Center glow -->
  <circle cx="256" cy="256" r="10" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="5" fill="#ffff00" filter="url(#glow)"/>
  <!-- Particle sparks outward -->
  <circle cx="180" cy="180" r="3" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="332" cy="332" r="3" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="332" cy="180" r="3" fill="#ffcc00" filter="url(#glow)"/>
  <circle cx="180" cy="332" r="3" fill="#ffcc00" filter="url(#glow)"/>
  <circle cx="200" cy="150" r="2" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="312" cy="362" r="2" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="362" cy="200" r="2" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="150" cy="312" r="2" fill="#ffcc00" filter="url(#glow)"/>
</svg>