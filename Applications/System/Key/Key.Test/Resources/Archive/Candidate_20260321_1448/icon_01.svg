    <rect x="526" y="530" width="38" height="34" rx="5"/>
    <rect x="570" y="530" width="38" height="34" rx="5"/>
    <rect x="614" y="530" width="48" height="34" rx="5"/>
  </g>

  <!-- Layer 3: 진단 HUD (상단) -->
  <rect x="148" y="228" width="320" height="72" rx="14" fill="#111120" stroke="#2A2A3A" stroke-width="3"/>
  <text x="168" y="256" font-family="Consolas,monospace" font-size="14" fill="#6EFF6E">테스트 키: 58 / 104</text>
  <text x="168" y="278" font-family="Consolas,monospace" font-size="14" fill="#FF6B6B">문제 감지: 2개 (U, F12)</text>

  <!-- 진단 상태 배지 -->
  <rect x="488" y="228" width="388" height="72" rx="14" fill="#3A0808" stroke="#601010" stroke-width="3"/>
  <text x="682" y="256" text-anchor="middle" font-family="Consolas,monospace" font-size="14" fill="#FF6B6B">채터링 감지!</text>
  <text x="682" y="276" text-anchor="middle" font-family="Consolas,monospace" font-size="13" fill="#CC4444">[U]  간격: 23.4ms</text>
</svg>
