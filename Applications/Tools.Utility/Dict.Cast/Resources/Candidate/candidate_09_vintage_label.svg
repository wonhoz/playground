<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ornate frame -->
  <rect x="72" y="72" width="368" height="368" rx="20" fill="url(#label)" stroke="#5D4037" stroke-width="5"/>
  <!-- Inner ornate border -->
  <rect x="88" y="88" width="336" height="336" rx="14" fill="none" stroke="#8D6E63" stroke-width="2" stroke-dasharray="8,5"/>
  <!-- Corner ornaments -->
  <path d="M88,120 Q88,88 120,88" stroke="#5D4037" stroke-width="4" fill="none"/>
  <path d="M392,88 Q424,88 424,120" stroke="#5D4037" stroke-width="4" fill="none"/>
  <path d="M88,392 Q88,424 120,424" stroke="#5D4037" stroke-width="4" fill="none"/>
  <path d="M424,392 Q424,424 392,424" stroke="#5D4037" stroke-width="4" fill="none"/>
  <!-- Title banner -->
  <rect x="96" y="105" width="320" height="48" rx="6" fill="#5D4037"/>
  <text x="256" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#FFECB3">Dictionary</text>
  <!-- Big decorative initial -->
  <text x="140" y="260" font-family="Georgia, serif" font-size="120" fill="#8D6E63" opacity="0.25">D</text>
  <!-- Entry lines -->
  <line x1="105" y1="175" x2="407" y2="175" stroke="#8D6E63" stroke-width="2"/>
  <text x="115" y="198" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#3E2723">Lexicon</text>
  <text x="115" y="216" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6D4C41">  n. 사전; 어휘 목록</text>
  <line x1="105" y1="224" x2="407" y2="224" stroke="#BCAAA4" stroke-width="1"/>
  <text x="115" y="244" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#3E2723">Nomenclature</text>
  <text x="115" y="262" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6D4C41">  n. 명명법; 술어</text>
  <line x1="105" y1="270" x2="407" y2="270" stroke="#BCAAA4" stroke-width="1"/>
  <text x="115" y="290" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#3E2723">Vernacular</text>
  <text x="115" y="308" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6D4C41">  n. 방언; 일상 언어</text>
  <line x1="105" y1="316" x2="407" y2="316" stroke="#BCAAA4" stroke-width="1"/>
  <!-- Bottom flourish -->
  <text x="256" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#8D6E63">~ ~ ~</text>
  <text x="256" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5D4037">Knowledge is Power</text>
</svg>
