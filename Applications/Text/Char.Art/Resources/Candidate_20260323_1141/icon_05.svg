<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#FFF8DC"/>
  <!-- Layer 2: Typewriter -->
  <!-- Body -->
  <rect x="180" y="380" width="664" height="340" rx="24" fill="#795548"/>
  <!-- Keyboard area -->
  <rect x="200" y="540" width="624" height="160" rx="16" fill="#6D4C41"/>
  <!-- Keys row 1 -->
  <rect x="230" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="296" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="362" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="428" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="494" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="560" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <rect x="626" y="560" width="50" height="40" rx="8" fill="#8D6E63"/>
  <!-- Paper roll -->
  <rect x="300" y="200" width="424" height="200" rx="8" fill="white"/>
  <!-- Layer 3: ASCII stream coming out -->
  <text x="512" y="270" font-family="Consolas,monospace" font-size="28" fill="#333" text-anchor="middle">@#$% text art</text>
  <text x="512" y="308" font-family="Consolas,monospace" font-size="24" fill="#555" text-anchor="middle">##..##  ##</text>
  <text x="512" y="344" font-family="Consolas,monospace" font-size="20" fill="#777" text-anchor="middle">##....##</text>
</svg>