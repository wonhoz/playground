<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- anvil body -->
  <path d="M130 310 Q130 280 180 270 L360 270 Q400 275 400 310 L400 340 L130 340 Z" fill="url(#anvil)"/>
  <rect x="200" y="340" width="60" height="50" rx="6" fill="#616161"/>
  <rect x="270" y="340" width="50" height="50" rx="6" fill="#616161"/>
  <rect x="160" y="382" width="200" height="22" rx="8" fill="#424242"/>
  <!-- anvil top shine -->
  <ellipse cx="256" cy="275" rx="80" ry="8" fill="white" opacity="0.18"/>
  <!-- glowing arrow being forged on anvil -->
  <path d="M145 220 L290 220 L290 185 L390 240 L290 295 L290 260 L145 260 Z" fill="url(#arrow)" filter="url(#glow)"/>
  <ellipse cx="215" cy="227" rx="40" ry="7" fill="white" opacity="0.25" transform="rotate(-3 215 227)"/>
  <!-- hammer striking -->
  <rect x="360" y="105" width="70" height="45" rx="10" fill="#bdbdbd" transform="rotate(-40 395 127)"/>
  <rect x="408" y="150" width="14" height="100" rx="5" fill="#8d6e63" transform="rotate(-40 415 200)"/>
  <!-- sparks from strike -->
  <circle cx="295" cy="268" r="5" fill="#ffe082"/>
  <line x1="288" y1="261" x2="278" y2="252" stroke="#ffe082" stroke-width="2"/>
  <line x1="300" y1="260" x2="308" y2="250" stroke="#ff9800" stroke-width="2"/>
  <line x1="295" y1="258" x2="295" y2="246" stroke="#fff176" stroke-width="2"/>
</svg>
