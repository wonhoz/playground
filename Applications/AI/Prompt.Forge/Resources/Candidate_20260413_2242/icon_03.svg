<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <!-- TEMPLATE badge (top, large) -->
  <rect x="140" y="162" width="744" height="108" rx="28" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="238" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" text-anchor="middle">TEMPLATE</text>
  <!-- Variable placeholders row -->
  <rect x="140" y="298" width="234" height="96" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="257" y="364" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">{{role}}</text>
  <rect x="394" y="298" width="234" height="96" rx="24" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
  <text x="511" y="364" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">{{task}}</text>
  <rect x="648" y="298" width="216" height="96" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
  <text x="756" y="364" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">{{ctx}}</text>
  <!-- TAG badges row -->
  <rect x="140" y="424" width="180" height="80" rx="24" fill="#FFD93D" stroke="#B8860B" stroke-width="12"/>
  <text x="230" y="479" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1A1A1A" text-anchor="middle">#ai</text>
  <rect x="338" y="424" width="200" height="80" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="438" y="479" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#1A1A1A" text-anchor="middle">#dev</text>
  <rect x="556" y="424" width="206" height="80" rx="24" fill="#9B59B6" stroke="#4A148C" stroke-width="12"/>
  <text x="659" y="479" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">#work</text>
  <!-- CRAFT badge -->
  <rect x="236" y="744" width="552" height="116" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#06D6A0" text-anchor="middle">CRAFT</text>
</svg>
