<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <clipPath id="clip03"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <g clip-path="url(#clip03)">
    <!-- Layer 2: GET 배지 (파랑) -->
    <rect x="210" y="230" width="258" height="120" rx="18" fill="#1D4ED8"/>
    <text x="339" y="290" font-family="'Courier New', monospace" font-weight="900" font-size="68" fill="#93C5FD" text-anchor="middle" dominant-baseline="middle">GET</text>
    <!-- POST 배지 (초록) -->
    <rect x="556" y="230" width="258" height="120" rx="18" fill="#059669"/>
    <text x="685" y="290" font-family="'Courier New', monospace" font-weight="900" font-size="58" fill="#A7F3D0" text-anchor="middle" dominant-baseline="middle">POST</text>
    <!-- PUT 배지 (주황) -->
    <rect x="210" y="390" width="258" height="120" rx="18" fill="#D97706"/>
    <text x="339" y="450" font-family="'Courier New', monospace" font-weight="900" font-size="68" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">PUT</text>
    <!-- DELETE 배지 (빨강) -->
    <rect x="556" y="390" width="258" height="120" rx="18" fill="#DC2626"/>
    <text x="685" y="450" font-family="'Courier New', monospace" font-weight="900" font-size="48" fill="#F472B6" text-anchor="middle" dominant-baseline="middle">DELETE</text>
    <!-- Layer 3: 중앙 구분선 -->
    <line x1="512" y1="240" x2="512" y2="500" stroke="#334155" stroke-width="8"/>
    <line x1="220" y1="370" x2="804" y2="370" stroke="#334155" stroke-width="8"/>
    <!-- 하단 URL 바 -->
    <rect x="210" y="560" width="604" height="90" rx="18" fill="#1E293B" stroke="#334155" stroke-width="6"/>
    <text x="512" y="605" font-family="'Courier New', monospace" font-size="32" fill="#22D3EE" text-anchor="middle" dominant-baseline="middle">https://api.example.com</text>
    <!-- 전송 버튼 -->
    <rect x="228" y="690" width="568" height="90" rx="18" fill="#22D3EE"/>
    <text x="512" y="735" font-family="'Courier New', monospace" font-weight="700" font-size="42" fill="#0F172A" text-anchor="middle" dominant-baseline="middle">SEND</text>
  </g>
</svg>
