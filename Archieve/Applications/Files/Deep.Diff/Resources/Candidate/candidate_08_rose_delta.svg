<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f0010"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- delta symbol large -->
  <polygon points="256,80 420,380 92,380" fill="none" stroke="#fb7185" stroke-width="8"/>
  <!-- inner content: diff lines -->
  <rect x="160" y="240" width="192" height="12" rx="4" fill="#ff6b6b" opacity="0.7"/>
  <rect x="160" y="264" width="192" height="12" rx="4" fill="#4ade80" opacity="0.7"/>
  <rect x="170" y="290" width="172" height="10" rx="4" fill="#fda4af" opacity="0.4"/>
  <rect x="170" y="308" width="172" height="10" rx="4" fill="#fda4af" opacity="0.4"/>
  <!-- minus and plus -->
  <text x="144" y="247" font-family="monospace" font-size="22" font-weight="bold" fill="#ff6b6b">-</text>
  <text x="144" y="271" font-family="monospace" font-size="22" font-weight="bold" fill="#4ade80">+</text>
  <!-- depth lines at triangle sides -->
  <line x1="156" y1="370" x2="200" y2="370" stroke="#fb7185" stroke-width="3" opacity="0.5"/>
  <line x1="312" y1="370" x2="356" y2="370" stroke="#fb7185" stroke-width="3" opacity="0.5"/>
  <text x="256" y="450" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="#fb7185" text-anchor="middle">Δ DIFF</text>
</svg>
