<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 펜+격자 | 실루엣/캐릭터 | #FFF8DC 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF8DC"/>
  <!-- Layer 2: Crossword grid (partial, paper style) -->
  <rect x="200" y="200" width="480" height="480" rx="8" fill="white" stroke="#D1D5DB" stroke-width="3"/>
  <!-- Grid lines (5x5 cells, 96px each) -->
  <line x1="296" y1="200" x2="296" y2="680" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="392" y1="200" x2="392" y2="680" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="488" y1="200" x2="488" y2="680" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="584" y1="200" x2="584" y2="680" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="200" y1="296" x2="680" y2="296" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="200" y1="392" x2="680" y2="392" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="200" y1="488" x2="680" y2="488" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="200" y1="584" x2="680" y2="584" stroke="#E5E7EB" stroke-width="2"/>
  <!-- Black cells -->
  <rect x="200" y="200" width="96" height="96" fill="#1C1C1C"/>
  <rect x="488" y="200" width="96" height="96" fill="#1C1C1C"/>
  <rect x="296" y="392" width="96" height="96" fill="#1C1C1C"/>
  <rect x="584" y="392" width="96" height="96" fill="#1C1C1C"/>
  <rect x="200" y="584" width="96" height="96" fill="#1C1C1C"/>
  <rect x="488" y="584" width="96" height="96" fill="#1C1C1C"/>
  <!-- Letters in cells -->
  <text x="344" y="260" font-family="Arial,sans-serif" font-size="48" fill="#1F2937" text-anchor="middle" font-weight="bold">한</text>
  <text x="248" y="356" font-family="Arial,sans-serif" font-size="48" fill="#1F2937" text-anchor="middle" font-weight="bold">글</text>
  <text x="344" y="356" font-family="Arial,sans-serif" font-size="48" fill="#2563EB" text-anchor="middle" font-weight="bold">퀴</text>
  <text x="440" y="356" font-family="Arial,sans-serif" font-size="48" fill="#1F2937" text-anchor="middle" font-weight="bold">즈</text>
  <!-- Cell number -->
  <text x="306" y="220" font-family="Arial,sans-serif" font-size="14" fill="#6B7280">1</text>
  <!-- Layer 3: Pen (right side) -->
  <rect x="720" y="300" width="36" height="300" rx="10" fill="#1D4ED8" transform="rotate(-25 738 450)"/>
  <polygon points="738,620 718,680 758,680" fill="#FEF08A" transform="rotate(-25 738 450)"/>
  <rect x="728" y="296" width="20" height="30" rx="4" fill="#3B82F6" transform="rotate(-25 738 450)"/>
</svg>
