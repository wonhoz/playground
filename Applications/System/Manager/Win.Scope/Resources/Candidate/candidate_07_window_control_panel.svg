<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A35"/>
      <stop offset="100%" stop-color="#0F1E28"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Control panel frame -->
  <rect x="56" y="80" width="400" height="352" rx="14" fill="url(#panel)" stroke="#203A43" stroke-width="2"/>
  <!-- Header -->
  <rect x="56" y="80" width="400" height="42" rx="14" fill="#0F3460" opacity="0.8"/>
  <text x="76" y="107" font-family="Segoe UI" font-size="18" font-weight="700" fill="#00C9FF">Window Control Panel</text>
  <!-- Section: Target Window -->
  <text x="76" y="148" font-family="Segoe UI" font-size="14" fill="#888">Target Window</text>
  <rect x="76" y="156" width="294" height="32" rx="6" fill="#0A1A25" stroke="#203A43" stroke-width="1.5"/>
  <text x="92" y="177" font-family="Segoe UI" font-size="13" fill="#E0E0E0">chrome.exe — [1920x1080]</text>
  <rect x="378" y="156" width="60" height="32" rx="6" fill="url(#btn)" opacity="0.85"/>
  <text x="408" y="177" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#0A1A25">Pick</text>
  <!-- Section: Properties grid -->
  <line x1="76" y1="206" x2="436" y2="206" stroke="#203A43" stroke-width="1"/>
  <text x="76" y="228" font-family="Segoe UI" font-size="13" fill="#888">Handle</text>
  <text x="200" y="228" font-family="Segoe UI" font-size="13" fill="#00C9FF">0x00020034</text>
  <text x="76" y="252" font-family="Segoe UI" font-size="13" fill="#888">Class</text>
  <text x="200" y="252" font-family="Segoe UI" font-size="13" fill="#E0E0E0">Chrome_WidgetWin_1</text>
  <text x="76" y="276" font-family="Segoe UI" font-size="13" fill="#888">Position</text>
  <text x="200" y="276" font-family="Segoe UI" font-size="13" fill="#E0E0E0">X:0  Y:0</text>
  <text x="76" y="300" font-family="Segoe UI" font-size="13" fill="#888">Size</text>
  <text x="200" y="300" font-family="Segoe UI" font-size="13" fill="#E0E0E0">1920 x 1080</text>
  <text x="76" y="324" font-family="Segoe UI" font-size="13" fill="#888">Style</text>
  <text x="200" y="324" font-family="Segoe UI" font-size="13" fill="#E0E0E0">WS_OVERLAPPEDWINDOW</text>
  <text x="76" y="348" font-family="Segoe UI" font-size="13" fill="#888">Visible</text>
  <rect x="200" y="334" width="52" height="20" rx="10" fill="#00C9FF" opacity="0.8"/>
  <text x="226" y="348" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#0A1A25" font-weight="700">ON</text>
  <text x="76" y="372" font-family="Segoe UI" font-size="13" fill="#888">Z-Order</text>
  <text x="200" y="372" font-family="Segoe UI" font-size="13" fill="#92FE9D">1 (Topmost)</text>
  <!-- Action buttons -->
  <rect x="76" y="396" width="96" height="28" rx="6" fill="url(#btn)" opacity="0.85"/>
  <text x="124" y="414" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#0A1A25" font-weight="700">Highlight</text>
  <rect x="184" y="396" width="96" height="28" rx="6" fill="#203A43"/>
  <text x="232" y="414" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#E0E0E0">Focus</text>
  <rect x="292" y="396" width="96" height="28" rx="6" fill="#203A43"/>
  <text x="340" y="414" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#E0E0E0">Refresh</text>
  <text x="256" y="466" text-anchor="middle" font-family="Segoe UI" font-size="22" font-weight="700" fill="#00C9FF" opacity="0.7">WIN.SCOPE</text>
</svg>
