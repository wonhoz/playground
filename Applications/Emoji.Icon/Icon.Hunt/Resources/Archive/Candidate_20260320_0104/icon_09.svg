<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Telescope barrel -->
  <rect x="220" y="460" width="480" height="100" rx="20" fill="#BF360C" opacity="0.8"/>
  <!-- Telescope larger end (left) -->
  <rect x="160" y="420" width="100" height="180" rx="16" fill="#BF360C"/>
  <!-- Telescope eyepiece (right) -->
  <rect x="700" y="476" width="120" height="68" rx="14" fill="#FF7043" opacity="0.9"/>
  <!-- Telescope stand/tripod -->
  <line x1="400" y1="560" x2="320" y2="780" stroke="#BF360C" stroke-width="36" stroke-linecap="round"/>
  <line x1="560" y1="560" x2="640" y2="780" stroke="#BF360C" stroke-width="36" stroke-linecap="round"/>
  <line x1="320" y1="780" x2="640" y2="780" stroke="#BF360C" stroke-width="36" stroke-linecap="round"/>
  <!-- Stars/distant icons being viewed -->
  <circle cx="260" cy="300" r="24" fill="#FF7043"/>
  <circle cx="340" cy="220" r="18" fill="#FF7043" opacity="0.7"/>
  <!-- View through lens: small icon -->
  <rect x="178" y="450" width="64" height="64" rx="12" fill="#FF7043" opacity="0.4"/>
  <polygon points="210,458 218,474 236,474 222,484 227,500 210,490 193,500 198,484 184,474 202,474" fill="#FF7043"/>
</svg>