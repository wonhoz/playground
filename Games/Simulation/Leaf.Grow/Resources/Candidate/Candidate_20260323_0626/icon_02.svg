<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 타임랩스 성장 — 빠른 시간 가속 | 대각선/동적 | #1A0A28 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A28"/>
  <!-- Layer 2: Plant growing fast with speed lines -->
  <!-- Speed lines (diagonal, top-right) -->
  <line x1="560" y1="200" x2="860" y2="180" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  <line x1="580" y1="250" x2="880" y2="220" stroke="#7C3AED" stroke-width="2" opacity="0.25"/>
  <line x1="600" y1="300" x2="860" y2="270" stroke="#7C3AED" stroke-width="1.5" opacity="0.2"/>
  <!-- Ground -->
  <rect x="160" y="780" width="704" height="80" rx="8" fill="#2D1A00"/>
  <!-- Plant growing in accelerated time -->
  <!-- Main stem (thick, fast growing) -->
  <line x1="512" y1="780" x2="512" y2="400" stroke="#22C55E" stroke-width="14" stroke-linecap="round"/>
  <!-- Branches spreading outward quickly -->
  <line x1="512" y1="700" x2="380" y2="600" stroke="#4ADE80" stroke-width="9" stroke-linecap="round"/>
  <line x1="512" y1="700" x2="644" y2="600" stroke="#4ADE80" stroke-width="9" stroke-linecap="round"/>
  <line x1="512" y1="580" x2="340" y2="480" stroke="#22C55E" stroke-width="7" stroke-linecap="round"/>
  <line x1="512" y1="580" x2="684" y2="480" stroke="#22C55E" stroke-width="7" stroke-linecap="round"/>
  <!-- Leaves rapidly unfurling -->
  <ellipse cx="350" cy="575" rx="50" ry="28" fill="#4ADE80" transform="rotate(-30 350 575)"/>
  <ellipse cx="674" cy="575" rx="50" ry="28" fill="#22C55E" transform="rotate(30 674 575)"/>
  <ellipse cx="300" cy="465" rx="44" ry="24" fill="#4ADE80" transform="rotate(-25 300 465)"/>
  <ellipse cx="724" cy="465" rx="44" ry="24" fill="#4ADE80" transform="rotate(25 724 465)"/>
  <!-- Top budding flower -->
  <circle cx="512" cy="380" r="40" fill="#F9A8D4"/>
  <circle cx="512" cy="380" r="24" fill="#FCD34D"/>
  <!-- Motion blur trail of stem (ghost) -->
  <line x1="492" y1="780" x2="492" y2="450" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <line x1="532" y1="780" x2="532" y2="450" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <!-- Layer 3: Speed/time indicator -->
  <text x="760" y="340" font-family="Arial,sans-serif" font-size="28" fill="#C084FC" text-anchor="middle" opacity="0.9">×10</text>
  <circle cx="760" cy="306" r="36" fill="none" stroke="#7C3AED" stroke-width="3" opacity="0.7"/>
</svg>
