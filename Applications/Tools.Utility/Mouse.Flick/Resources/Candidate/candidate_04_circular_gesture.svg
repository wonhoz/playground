<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D18"/>
    </radialGradient>
    <linearGradient id="circGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <filter id="circGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circular gesture path -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#circGrad)" stroke-width="8" stroke-dasharray="16,10" filter="url(#circGlow)"/>
  <!-- Rotation arrow at top -->
  <path d="M256,100 Q310,90 340,130" fill="none" stroke="#667EEA" stroke-width="8" stroke-linecap="round" filter="url(#circGlow)"/>
  <polygon points="340,130 322,108 348,106" fill="#667EEA" filter="url(#circGlow)"/>
  <!-- Inner gesture circle -->
  <circle cx="256" cy="240" r="80" fill="none" stroke="#764BA2" stroke-width="4" opacity="0.5" stroke-dasharray="12,8"/>
  <!-- Mouse icon center -->
  <rect x="228" y="196" width="56" height="88" rx="28" fill="none" stroke="#AAAAFF" stroke-width="5" opacity="0.8"/>
  <line x1="256" y1="196" x2="256" y2="240" stroke="#AAAAFF" stroke-width="4" opacity="0.6"/>
  <rect x="244" y="218" width="24" height="36" rx="12" fill="#AAAAFF" opacity="0.4"/>
  <!-- Gesture labels (N/S/E/W) -->
  <text x="256" y="82" font-family="sans-serif" font-size="18" fill="#667EEA" text-anchor="middle" opacity="0.7">UP</text>
  <text x="256" y="415" font-family="sans-serif" font-size="18" fill="#667EEA" text-anchor="middle" opacity="0.7">DOWN</text>
  <text x="90" y="248" font-family="sans-serif" font-size="18" fill="#667EEA" text-anchor="middle" opacity="0.7">LEFT</text>
  <text x="422" y="248" font-family="sans-serif" font-size="18" fill="#667EEA" text-anchor="middle" opacity="0.7">RIGHT</text>
  <!-- Directional tick marks -->
  <line x1="256" y1="96" x2="256" y2="110" stroke="#667EEA" stroke-width="4" opacity="0.7"/>
  <line x1="256" y1="370" x2="256" y2="384" stroke="#667EEA" stroke-width="4" opacity="0.7"/>
  <line x1="112" y1="240" x2="126" y2="240" stroke="#667EEA" stroke-width="4" opacity="0.7"/>
  <line x1="386" y1="240" x2="400" y2="240" stroke="#667EEA" stroke-width="4" opacity="0.7"/>
  <!-- Corner speed indicators -->
  <line x1="80" y1="430" x2="130" y2="430" stroke="#764BA2" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="80" y1="450" x2="110" y2="450" stroke="#764BA2" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="466" x2="96" y2="466" stroke="#764BA2" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
