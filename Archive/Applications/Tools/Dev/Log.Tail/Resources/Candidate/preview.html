<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Log.Tail - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 1100px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .item img { width: 160px; height: 160px; border-radius: 20px; border: 1px solid #333; background: #111; }
    .item span { font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>Log.Tail — Icon Candidates</h1>
  <div class="grid">
    <div class="item"><img src="candidate_01_live_scroll.svg" alt="01"/><span>01 Live Scroll</span></div>
    <div class="item"><img src="candidate_02_orange_eye.svg" alt="02"/><span>02 Orange Eye</span></div>
    <div class="item"><img src="candidate_03_purple_stream.svg" alt="03"/><span>03 Purple Stream</span></div>
    <div class="item"><img src="candidate_04_minimal_white.svg" alt="04"/><span>04 Minimal White</span></div>
    <div class="item"><img src="candidate_05_blue_radar.svg" alt="05"/><span>05 Blue Radar</span></div>
    <div class="item"><img src="candidate_06_red_pulse.svg" alt="06"/><span>06 Red Pulse</span></div>
    <div class="item"><img src="candidate_07_teal_waterfall.svg" alt="07"/><span>07 Teal Waterfall</span></div>
    <div class="item"><img src="candidate_08_catppuccin.svg" alt="08"/><span>08 Catppuccin</span></div>
    <div class="item"><img src="candidate_09_gradient_ribbon.svg" alt="09"/><span>09 Gradient Ribbon</span></div>
    <div class="item"><img src="candidate_10_neon_cat.svg" alt="10"/><span>10 Neon Cat</span></div>
  </div>
</body>
</html>
