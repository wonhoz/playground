<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 기차 레일 교차 — 가로/세로 단어 교차점 | 기하학 | #0A1428 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A1428"/>
  <!-- Layer 2: Railroad crossing style cross pattern with words on tracks -->
  <!-- Horizontal rail (left-right) -->
  <rect x="160" y="490" width="704" height="44" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-width="3"/>
  <!-- Horizontal rail sleepers -->
  <rect x="200" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="260" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="320" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="380" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <!-- (around intersection leave gap) -->
  <rect x="620" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="680" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="740" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <rect x="800" y="480" width="16" height="64" rx="3" fill="#0F2040"/>
  <!-- Vertical rail (top-bottom) -->
  <rect x="490" y="160" width="44" height="704" rx="6" fill="#1A3A1A" stroke="#4ADE80" stroke-width="3"/>
  <!-- Vertical sleepers -->
  <rect x="480" y="200" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="260" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="320" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="380" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="620" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="680" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="740" width="64" height="16" rx="3" fill="#0A2010"/>
  <rect x="480" y="800" width="64" height="16" rx="3" fill="#0A2010"/>
  <!-- Intersection crossing highlight -->
  <rect x="480" y="480" width="64" height="64" rx="4" fill="#3B1E6A" stroke="#FCD34D" stroke-width="4"/>
  <!-- Words on horizontal track -->
  <text x="290" y="516" font-family="Arial,sans-serif" font-size="28" fill="#93C5FD" text-anchor="middle" font-weight="bold">세계</text>
  <text x="720" y="516" font-family="Arial,sans-serif" font-size="28" fill="#93C5FD" text-anchor="middle" font-weight="bold">여행</text>
  <!-- Words on vertical track -->
  <text x="512" y="350" font-family="Arial,sans-serif" font-size="28" fill="#86EFAC" text-anchor="middle" font-weight="bold">지</text>
  <text x="512" y="430" font-family="Arial,sans-serif" font-size="28" fill="#86EFAC" text-anchor="middle" font-weight="bold">리</text>
  <text x="512" y="660" font-family="Arial,sans-serif" font-size="28" fill="#86EFAC" text-anchor="middle" font-weight="bold">학</text>
  <text x="512" y="740" font-family="Arial,sans-serif" font-size="28" fill="#86EFAC" text-anchor="middle" font-weight="bold">습</text>
  <!-- Shared character at intersection -->
  <text x="512" y="518" font-family="Arial,sans-serif" font-size="28" fill="#FCD34D" text-anchor="middle" font-weight="bold">교</text>
  <!-- Layer 3: Direction arrows on rails -->
  <polygon points="864,505 848,497 848,513" fill="#3B82F6" opacity="0.7"/>
  <polygon points="512,864 504,848 520,848" fill="#4ADE80" opacity="0.7"/>
</svg>
