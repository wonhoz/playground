  <rect x="195" y="300" width="25" height="140" fill="#1E3A5F"/>
  <rect x="230" y="270" width="55" height="170" fill="#243B55"/>
  <rect x="280" y="295" width="30" height="145" fill="#1E3A5F"/>
  <rect x="305" y="310" width="45" height="130" fill="#1E3A5F"/>
  <rect x="345" y="285" width="35" height="155" fill="#1E3A5F"/>
  <rect x="375" y="305" width="30" height="135" fill="#1E3A5F"/>
  <rect x="400" y="275" width="52" height="165" fill="#243B55"/>
  <!-- Building windows (lit) -->
  <rect x="102" y="300" width="8" height="8" fill="#FFD740" opacity="0.8"/>
  <rect x="115" y="300" width="8" height="8" fill="#FFD740" opacity="0.6"/>
  <rect x="102" y="318" width="8" height="8" fill="#FFD740" opacity="0.9"/>
