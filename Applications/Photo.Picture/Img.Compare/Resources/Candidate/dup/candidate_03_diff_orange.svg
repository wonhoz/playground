<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 왼쪽 이미지 -->
  <rect x="40" y="80" width="190" height="190" rx="14" fill="#4E342E"/>
  <circle cx="100" cy="140" r="28" fill="#795548"/>
  <rect x="40" y="230" width="190" height="40" rx="0" fill="#3E2723"/>
  <!-- 오른쪽 이미지 -->
  <rect x="280" y="80" width="190" height="190" rx="14" fill="#E64A19"/>
  <circle cx="340" cy="140" r="28" fill="#FF8A65"/>
  <rect x="280" y="230" width="190" height="40" rx="0" fill="#BF360C"/>
  <!-- diff 하이라이트 영역 -->
  <rect x="280" y="150" width="90" height="70" rx="6" fill="#FF6D00" opacity="0.5" stroke="#FFB74D" stroke-width="2"/>
  <!-- 차이 표시 패널 -->
  <rect x="40" y="300" width="430" height="150" rx="16" fill="#3E2723"/>
  <text x="256" y="340" font-size="18" text-anchor="middle" fill="#FFCCBC" font-family="Segoe UI">Difference Map</text>
  <!-- 히트맵 바 -->
  <rect x="60" y="358" width="60" height="60" rx="6" fill="#212121"/>
  <rect x="130" y="358" width="60" height="60" rx="6" fill="#F44336" opacity="0.7"/>
  <rect x="200" y="358" width="60" height="60" rx="6" fill="#FF9800" opacity="0.6"/>
  <rect x="270" y="358" width="60" height="60" rx="6" fill="#FFEB3B" opacity="0.5"/>
  <rect x="340" y="358" width="60" height="60" rx="6" fill="#212121"/>
  <rect x="410" y="358" width="60" height="60" rx="6" fill="#212121"/>
  <!-- = 기호 -->
  <text x="256" y="255" font-size="40" text-anchor="middle" fill="#FFCCBC" font-family="Segoe UI">≠</text>
</svg>