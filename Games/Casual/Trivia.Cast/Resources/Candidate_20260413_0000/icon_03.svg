<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: metaphor · 공간/장면 · 퀴즈 쇼 무대 + 전광판 -->
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A148C"/>
      <stop offset="1" stop-color="#880E4F"/>
    </linearGradient>
    <linearGradient id="spot" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFD93D" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFD93D" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg03)"/>
  <!-- 스포트라이트 -->
  <path d="M 280 160 L 744 160 L 900 800 L 124 800 Z" fill="url(#spot)"/>
  <!-- 전광판 -->
  <rect x="140" y="180" width="744" height="340" rx="28" fill="#1A1A1A" stroke="#FFD93D" stroke-width="18"/>
  <!-- 테두리 전구 -->
  <g fill="#FFD93D">
    <circle cx="180" cy="210" r="12"/><circle cx="250" cy="210" r="12"/><circle cx="320" cy="210" r="12"/>
    <circle cx="390" cy="210" r="12"/><circle cx="460" cy="210" r="12"/><circle cx="530" cy="210" r="12"/>
    <circle cx="600" cy="210" r="12"/><circle cx="670" cy="210" r="12"/><circle cx="740" cy="210" r="12"/>
    <circle cx="810" cy="210" r="12"/><circle cx="850" cy="260" r="12"/><circle cx="850" cy="330" r="12"/>
    <circle cx="850" cy="400" r="12"/><circle cx="850" cy="460" r="12"/>
    <circle cx="180" cy="490" r="12"/><circle cx="250" cy="490" r="12"/><circle cx="320" cy="490" r="12"/>
    <circle cx="390" cy="490" r="12"/><circle cx="460" cy="490" r="12"/><circle cx="530" cy="490" r="12"/>
    <circle cx="600" cy="490" r="12"/><circle cx="670" cy="490" r="12"/><circle cx="740" cy="490" r="12"/>
    <circle cx="810" cy="490" r="12"/><circle cx="174" cy="260" r="12"/><circle cx="174" cy="330" r="12"/>
    <circle cx="174" cy="400" r="12"/><circle cx="174" cy="460" r="12"/>
  </g>
  <!-- 전광판 텍스트 -->
  <text x="512" y="330" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#06D6A0" text-anchor="middle">TRIVIA</text>
  <text x="512" y="430" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FF6B9D" text-anchor="middle">CAST</text>
  <!-- 물음표 기호 양옆 -->
  <text x="100" y="360" font-family="Arial Black, sans-serif" font-weight="900" font-size="180" fill="#FFD93D">?</text>
  <text x="830" y="360" font-family="Arial Black, sans-serif" font-weight="900" font-size="180" fill="#FFD93D">?</text>
  <!-- 무대 바닥 패널 (4지선다) -->
  <g>
    <rect x="120" y="580" width="180" height="260" rx="20" fill="#FF6B9D" stroke="#880E4F" stroke-width="10"/>
    <text x="210" y="730" font-family="Arial Black" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">A</text>
  </g>
  <g>
    <rect x="320" y="580" width="180" height="260" rx="20" fill="#06D6A0" stroke="#056B4F" stroke-width="10"/>
    <text x="410" y="730" font-family="Arial Black" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">B</text>
  </g>
  <g>
    <rect x="520" y="580" width="180" height="260" rx="20" fill="#3A86FF" stroke="#0D47A1" stroke-width="10"/>
    <text x="610" y="730" font-family="Arial Black" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">C</text>
  </g>
  <g>
    <rect x="720" y="580" width="180" height="260" rx="20" fill="#FFD93D" stroke="#B88A00" stroke-width="10"/>
    <text x="810" y="730" font-family="Arial Black" font-weight="900" font-size="100" fill="#B88A00" text-anchor="middle">D</text>
  </g>
</svg>
