<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- large X from crossing words concept -->
  <rect x="110" y="216" width="292" height="80" rx="10" fill="#ffffff" opacity="0.15"/>
  <rect x="216" y="110" width="80" height="292" rx="10" fill="#ffffff" opacity="0.15"/>
  <!-- intersection highlight -->
  <rect x="216" y="216" width="80" height="80" rx="6" fill="#a78bfa" opacity="0.6"/>
  <!-- letter cells -->
  <rect x="110" y="216" width="80" height="80" rx="6" fill="#ffffff" opacity="0.25"/>
  <rect x="322" y="216" width="80" height="80" rx="6" fill="#ffffff" opacity="0.25"/>
  <rect x="216" y="110" width="80" height="80" rx="6" fill="#ffffff" opacity="0.25"/>
  <rect x="216" y="322" width="80" height="80" rx="6" fill="#ffffff" opacity="0.25"/>
  <!-- center letter -->
  <text x="256" y="256" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">+</text>
  <text x="150" y="256" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#e9d5ff" text-anchor="middle" dominant-baseline="central">W</text>
  <text x="362" y="256" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#e9d5ff" text-anchor="middle" dominant-baseline="central">D</text>
  <text x="256" y="150" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#e9d5ff" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="256" y="362" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#e9d5ff" text-anchor="middle" dominant-baseline="central">S</text>
</svg>
