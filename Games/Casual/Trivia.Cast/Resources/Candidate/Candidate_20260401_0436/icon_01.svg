<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="qmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Central ? mark -->
  <text x="512" y="490" text-anchor="middle" dominant-baseline="middle" font-size="460" font-family="Georgia,serif" font-weight="bold" fill="url(#qmark)">?</text>
  <!-- Layer 3: A B C D answer bubbles radiating out -->
  <!-- A - top-left -->
  <circle cx="210" cy="240" r="90" fill="#EF5350"/>
  <text x="210" y="244" text-anchor="middle" dominant-baseline="middle" font-size="100" font-family="Georgia,serif" font-weight="bold" fill="white">A</text>
  <!-- B - top-right -->
  <circle cx="814" cy="240" r="90" fill="#42A5F5"/>
  <text x="814" y="244" text-anchor="middle" dominant-baseline="middle" font-size="100" font-family="Georgia,serif" font-weight="bold" fill="white">B</text>
  <!-- C - bottom-left -->
  <circle cx="210" cy="784" r="90" fill="#66BB6A"/>
  <text x="210" y="788" text-anchor="middle" dominant-baseline="middle" font-size="100" font-family="Georgia,serif" font-weight="bold" fill="white">C</text>
  <!-- D - bottom-right -->
  <circle cx="814" cy="784" r="90" fill="#FFA726"/>
  <text x="814" y="788" text-anchor="middle" dominant-baseline="middle" font-size="100" font-family="Georgia,serif" font-weight="bold" fill="white">D</text>
  <!-- Lines from center to circles -->
  <line x1="370" y1="370" x2="280" y2="300" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="654" y1="370" x2="744" y2="300" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="370" y1="634" x2="280" y2="724" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="654" y1="634" x2="744" y2="724" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
</svg>
