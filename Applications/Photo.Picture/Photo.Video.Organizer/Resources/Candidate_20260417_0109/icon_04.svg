<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="lens4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <clipPath id="lensClip4"><circle cx="512" cy="512" r="320"/></clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Camera body background -->
  <rect x="148" y="280" width="728" height="520" rx="40" fill="#1565C0" opacity="0.9"/>
  <rect x="184" y="196" width="240" height="100" rx="20" fill="#1976D2"/>

  <!-- Layer 2: Camera lens ring -->
  <circle cx="512" cy="520" r="350" fill="#0D47A1" opacity="0.3"/>
  <circle cx="512" cy="520" r="328" fill="white" opacity="0.9"/>
  <circle cx="512" cy="520" r="320" fill="url(#lens4)"/>

  <!-- Calendar inside lens -->
  <g clip-path="url(#lensClip4)">
    <!-- Calendar background -->
    <rect x="192" y="200" width="640" height="640" fill="white"/>
    <!-- Calendar header -->
    <rect x="192" y="200" width="640" height="110" fill="#F06292"/>
    <text x="512" y="272" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">2024 / 01</text>
    <!-- Grid of dates with mini photos -->
    <!-- Row 1 -->
    <rect x="210" y="328" width="144" height="108" rx="8" fill="#FCE4EC"/>
    <rect x="210" y="328" width="144" height="64" fill="#F48FB1"/>
    <text x="282" y="426" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#C2185B" text-anchor="middle">05</text>

    <rect x="374" y="328" width="144" height="108" rx="8" fill="#E8F5E9"/>
    <rect x="374" y="328" width="144" height="64" fill="#A5D6A7"/>
    <text x="446" y="426" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#2E7D32" text-anchor="middle">12</text>

    <rect x="538" y="328" width="144" height="108" rx="8" fill="#E3F2FD"/>
    <rect x="538" y="328" width="144" height="64" fill="#90CAF9"/>
    <text x="610" y="426" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#1565C0" text-anchor="middle">19</text>

    <rect x="702" y="328" width="108" height="108" rx="8" fill="#FFF9C4"/>
    <rect x="702" y="328" width="108" height="64" fill="#FFF176"/>
    <text x="756" y="426" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#F9A825" text-anchor="middle">25</text>

    <!-- Row 2 -->
    <rect x="210" y="456" width="144" height="108" rx="8" fill="#F3E5F5"/>
    <rect x="210" y="456" width="144" height="64" fill="#CE93D8"/>
    <text x="282" y="554" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#6A1B9A" text-anchor="middle">07</text>

    <rect x="374" y="456" width="144" height="108" rx="8" fill="#FFF3E0"/>
    <rect x="374" y="456" width="144" height="64" fill="#FFCC80"/>
    <text x="446" y="554" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#E65100" text-anchor="middle">14</text>

    <rect x="538" y="456" width="144" height="108" rx="8" fill="#E0F7FA"/>
    <rect x="538" y="456" width="144" height="64" fill="#80DEEA"/>
    <text x="610" y="554" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#006064" text-anchor="middle">21</text>

    <rect x="702" y="456" width="108" height="108" rx="8" fill="#FFEBEE"/>
    <rect x="702" y="456" width="108" height="64" fill="#EF9A9A"/>
    <text x="756" y="554" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#B71C1C" text-anchor="middle">28</text>
  </g>

  <!-- Lens outer ring -->
  <circle cx="512" cy="520" r="320" fill="none" stroke="#1565C0" stroke-width="36"/>
  <circle cx="512" cy="520" r="340" fill="none" stroke="#42A5F5" stroke-width="18" opacity="0.5"/>

  <!-- Layer 3: Flash / hot pink badge -->
  <circle cx="820" cy="280" r="72" fill="#F06292" stroke="white" stroke-width="8"/>
  <text x="820" y="303" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">📅</text>
  <!-- Camera viewfinder dot -->
  <circle cx="820" cy="280" r="30" fill="#E91E63"/>
  <circle cx="820" cy="280" r="16" fill="white" opacity="0.8"/>
</svg>
