<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="fileGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCCCCC"/>
    </linearGradient>
    <linearGradient id="charGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEEEEE"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="150" fill="url(#bg7)"/>

  <!-- 왼쪽: 이미지 파일 아이콘 (JPG) -->
  <rect x="100" y="200" width="300" height="380" rx="16" fill="url(#fileGrad7)"/>
  <!-- 접힌 모서리 -->
  <path d="M340 200 L400 260 L340 260 Z" fill="#AAAAAA"/>
  <path d="M340 200 L400 260 L400 260 L400 200 Z" fill="#DDDDDD"/>
  <!-- 파일 내 컬러 이미지 (산 모양) -->
  <rect x="116" y="250" width="268" height="200" rx="4" fill="#87CEEB"/>
  <!-- 하늘 -->
  <circle cx="200" cy="300" r="30" fill="#FFD700" opacity="0.8"/>
  <!-- 태양 -->
  <!-- 산 -->
  <polygon points="150,450 250,310 350,450" fill="#4A7C59"/>
  <polygon points="220,450 310,340 400,450" fill="#3D6B4A"/>
  <!-- 눈 -->
  <polygon points="220,380 250,310 280,380" fill="#EEEEEE"/>
  <!-- 파일 확장자 -->
  <rect x="116" y="460" width="268" height="50" rx="4" fill="#FF6B35"/>
  <text x="250" y="493" font-family="Consolas,monospace" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">JPG</text>
  <!-- 파일 이름 -->
  <text x="250" y="550" font-family="Consolas,monospace" font-size="18" fill="#555555" text-anchor="middle">photo.jpg</text>

  <!-- 변환 화살표 (대각선) -->
  <text x="512" y="430" font-family="Consolas,monospace" font-size="60" fill="#888888" text-anchor="middle">⟹</text>
  <text x="512" y="490" font-family="Consolas,monospace" font-size="18" fill="#555555" text-anchor="middle">Char.Art</text>

  <!-- 오른쪽: 텍스트 파일 아이콘 (TXT) - 내부에 ASCII 아트 -->
  <rect x="624" y="200" width="300" height="380" rx="16" fill="url(#charGrad7)"/>
  <!-- 접힌 모서리 -->
  <path d="M864 200 L924 260 L864 260 Z" fill="#666666"/>
  <path d="M864 200 L924 260 L924 260 L924 200 Z" fill="#999999"/>
  <!-- 파일 내 ASCII 아트 내용 -->
  <rect x="640" y="250" width="268" height="200" rx="4" fill="#1A1A1A"/>
  <!-- ASCII 아트 텍스트 라인들 -->
  <text x="648" y="273" font-family="Consolas,monospace" font-size="11" fill="#CCCCCC">. . @ @ @ @ @ . .</text>
  <text x="648" y="288" font-family="Consolas,monospace" font-size="11" fill="#DDDDDD">. @ @ @ @ @ @ @ .</text>
  <text x="648" y="303" font-family="Consolas,monospace" font-size="11" fill="#EEEEEE">@ @ # # @ # # @ @</text>
  <text x="648" y="318" font-family="Consolas,monospace" font-size="11" fill="#FFFFFF">@ @ 0 @ @ @ 0 @ @</text>
  <text x="648" y="333" font-family="Consolas,monospace" font-size="11" fill="#EEEEEE">@ @ @ @ @ @ @ @ @</text>
  <text x="648" y="348" font-family="Consolas,monospace" font-size="11" fill="#DDDDDD">@ @ @ : ; : @ @ @</text>
  <text x="648" y="363" font-family="Consolas,monospace" font-size="11" fill="#CCCCCC">@ @ # # # # # @ @</text>
  <text x="648" y="378" font-family="Consolas,monospace" font-size="11" fill="#BBBBBB">. @ @ @ @ @ @ @ .</text>
  <text x="648" y="393" font-family="Consolas,monospace" font-size="11" fill="#AAAAAA">. . @ # # # @ . .</text>
  <text x="648" y="408" font-family="Consolas,monospace" font-size="11" fill="#888888">. . . @ @ @ . . .</text>
  <text x="648" y="423" font-family="Consolas,monospace" font-size="11" fill="#666666">. . . . @ . . . .</text>
  <!-- 파일 확장자 -->
  <rect x="640" y="460" width="268" height="50" rx="4" fill="#444444"/>
  <text x="774" y="493" font-family="Consolas,monospace" font-size="28" fill="#EEEEEE" text-anchor="middle" font-weight="bold">TXT</text>
  <!-- 파일 이름 -->
  <text x="774" y="550" font-family="Consolas,monospace" font-size="18" fill="#555555" text-anchor="middle">char-art.txt</text>

  <!-- 하단 -->
  <text x="512" y="750" font-family="Consolas,monospace" font-size="32" fill="#CCCCCC" text-anchor="middle" font-weight="bold">photo.jpg → char-art.txt</text>
  <text x="512" y="792" font-family="Consolas,monospace" font-size="20" fill="#777777" text-anchor="middle">IMAGE FILE TO ASCII TEXT</text>
</svg>
