<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="60%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#0A1E0A"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="160" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="220" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="350" cy="70" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="420" cy="50" r="2" fill="white" opacity="0.6"/>
  <circle cx="450" cy="100" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="55" r="2" fill="white" opacity="0.9"/>
  <!-- Moon -->
  <circle cx="390" cy="100" r="36" fill="url(#moon)" opacity="0.9"/>
  <circle cx="405" cy="88" r="30" fill="#0A1428" opacity="0.85"/>
  <!-- Trees -->
  <polygon points="80,420 120,280 160,420" fill="#0D2E0D"/>
  <polygon points="100,420 150,240 200,420" fill="#143314"/>
  <polygon points="300,420 360,220 420,420" fill="#0D2E0D"/>
  <polygon points="330,420 380,260 430,420" fill="#143314"/>
  <!-- Ground -->
  <rect x="60" y="400" width="392" height="50" rx="0" fill="#0A1E0A"/>
  <!-- Sound waves from ground (ambient sounds) -->
  <path d="M180,380 Q256,340 332,380" fill="none" stroke="#34D399" stroke-width="2" opacity="0.4"/>
  <path d="M160,360 Q256,310 352,360" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.3"/>
  <path d="M140,340 Q256,280 372,340" fill="none" stroke="#34D399" stroke-width="1" opacity="0.2"/>
</svg>