<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A3A5C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg05)"/>
  <!-- Layer 2: Resolution counter — small px up-arrow to large px -->
  <!-- Input resolution label -->
  <text x="200" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="100" font-weight="800" fill="#546E7A">128px</text>
  <!-- Down-right arrow (transform) -->
  <path d="M240 430 Q512 580 660 560" fill="none" stroke="#00E5FF" stroke-width="14" stroke-linecap="round" stroke-dasharray="20 10"/>
  <polygon points="646,520 700,570 640,600" fill="#00E5FF"/>
  <!-- AI label on arrow -->
  <rect x="440" y="470" width="108" height="64" rx="14" fill="#00ACC1"/>
  <text x="460" y="518" font-family="'Segoe UI',Arial,sans-serif" font-size="62" font-weight="800" fill="white">AI</text>
  <!-- Output resolution label (large, bright) -->
  <text x="148" y="720" font-family="'Segoe UI',Arial,sans-serif" font-size="140" font-weight="900" fill="#00E5FF">512px</text>
  <!-- Layer 3: x4 badge -->
  <rect x="680" y="680" width="190" height="120" rx="24" fill="#00ACC1"/>
  <text x="700" y="772" font-family="'Segoe UI',Arial,sans-serif" font-size="112" font-weight="900" fill="white">×4</text>
  <!-- Small hint stars -->
  <circle cx="800" cy="320" r="14" fill="#00E5FF" opacity="0.6"/>
  <circle cx="860" cy="380" r="9" fill="#00E5FF" opacity="0.4"/>
  <circle cx="740" cy="380" r="11" fill="#00E5FF" opacity="0.5"/>
</svg>
