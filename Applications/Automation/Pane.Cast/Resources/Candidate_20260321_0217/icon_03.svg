<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark teal-navy -->
  <rect width="1024" height="1024" rx="200" fill="#081820"/>
  <!-- Terminal screen body -->
  <rect x="140" y="200" width="740" height="500" rx="32" fill="#0F2A3A" stroke="#00BCD4" stroke-width="10"/>
  <!-- Screen inner -->
  <rect x="172" y="232" width="676" height="436" rx="18" fill="#071520"/>
  <!-- Horizontal split line -->
  <line x1="172" y1="450" x2="848" y2="450" stroke="#00E5FF" stroke-width="8" opacity="0.8"/>
  <!-- Vertical split line -->
  <line x1="510" y1="232" x2="510" y2="668" stroke="#00E5FF" stroke-width="8" opacity="0.8"/>
  <!-- Prompt cursors in each pane -->
  <rect x="200" y="290" width="18" height="60" rx="4" fill="#00E5FF" opacity="0.9"/>
  <rect x="538" y="290" width="18" height="60" rx="4" fill="#00E5FF" opacity="0.6"/>
  <rect x="200" y="490" width="18" height="60" rx="4" fill="#00E5FF" opacity="0.6"/>
  <rect x="538" y="490" width="18" height="60" rx="4" fill="#AEEA00" opacity="0.9"/>
  <!-- Cast / broadcast arcs top-right -->
  <path d="M780 160 A120 120 0 0 1 900 280" stroke="#FF6D00" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M780 200 A80 80 0 0 1 860 280" stroke="#FF9800" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.9"/>
  <circle cx="780" cy="280" r="22" fill="#FFB300"/>
  <!-- Stand -->
  <rect x="432" y="700" width="160" height="24" rx="12" fill="#0F2A3A" stroke="#00BCD4" stroke-width="6"/>
  <rect x="382" y="724" width="260" height="20" rx="10" fill="#0F2A3A" stroke="#00BCD4" stroke-width="6"/>
</svg>
