<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background: amber/golden -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg09)"/>

  <!-- Explorer address bar (large, centered) -->
  <rect x="112" y="260" width="800" height="80" rx="16" fill="white" opacity="0.96"/>
  <!-- Back/Forward buttons -->
  <rect x="126" y="274" width="52" height="52" rx="10" fill="#E5E7EB"/>
  <text x="152" y="308" font-family="Arial,sans-serif" font-size="32" fill="#374151" text-anchor="middle">‹</text>
  <rect x="188" y="274" width="52" height="52" rx="10" fill="#E5E7EB"/>
  <text x="214" y="308" font-family="Arial,sans-serif" font-size="32" fill="#9CA3AF" text-anchor="middle">›</text>

  <!-- Path text in bar (highlighted/selected) -->
  <rect x="252" y="274" width="550" height="52" rx="8" fill="#DBEAFE"/>
  <text x="264" y="308" font-family="Consolas,monospace" font-size="26" fill="#1E3A5F" font-weight="bold">C:\Users\admin\Documents</text>

  <!-- Copy button in address bar -->
  <rect x="816" y="274" width="82" height="52" rx="10" fill="#2563EB"/>
  <text x="857" y="308" font-family="Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">⎘</text>

  <!-- Format selector panel below -->
