  <text x="272" y="345" font-family="Consolas, monospace" font-size="22" fill="#FF8888">ERROR</text>
  <rect x="360" y="327" width="420" height="14" rx="3" fill="#FF6B6B" opacity="0.35"/>
  <rect x="360" y="347" width="380" height="14" rx="3" fill="#FF6B6B" opacity="0.25"/>

