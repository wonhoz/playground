<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 프롬프트 카드 스택 라이브러리 | 레이어드 | #1E1B4B 딥인디고 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E1B4B"/>
  <!-- Layer 2: Stacked cards -->
  <!-- Card 3 (back) -->
  <rect x="230" y="310" width="580" height="380" rx="18" fill="#312E81" transform="rotate(-6 512 500)"/>
  <!-- Card 2 (mid) -->
  <rect x="220" y="290" width="580" height="380" rx="18" fill="#4338CA" transform="rotate(-2 512 480)"/>
  <!-- Card 1 (front) -->
  <rect x="200" y="270" width="580" height="380" rx="18" fill="#6366F1"/>
  <!-- Layer 3: Card content - prompt text lines -->
  <rect x="240" y="320" width="340" height="14" rx="7" fill="#C7D2FE"/>
  <rect x="240" y="348" width="280" height="14" rx="7" fill="#A5B4FC"/>
  <rect x="240" y="376" width="320" height="14" rx="7" fill="#A5B4FC"/>
  <!-- Variable highlight box -->
  <rect x="240" y="414" width="160" height="32" rx="8" fill="#F59E0B" opacity="0.9"/>
  <text x="320" y="436" font-family="Consolas,monospace" font-size="20" fill="#1E1B4B" text-anchor="middle" font-weight="bold">{{role}}</text>
  <!-- Tag badge -->
  <rect x="500" y="560" width="220" height="36" rx="12" fill="#312E81"/>
  <text x="610" y="583" font-family="Arial,sans-serif" font-size="18" fill="#A5B4FC" text-anchor="middle">✦ 프롬프트 라이브러리</text>
</svg>
