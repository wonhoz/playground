<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <clipPath id="c3b"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3b)"/>
  <circle cx="820" cy="200" r="240" fill="#4338CA" opacity="0.2" clip-path="url(#c3b)"/>

  <!-- Layer 2: 하트 형태를 문자들로 구성 -->
  <g font-family="Consolas,monospace" font-size="38" font-weight="bold">
    <!-- 하트 모양 문자 배열 -->
    <!-- 행 1 -->
    <text x="200" y="260">
      <tspan fill="#312E81"> </tspan>
      <tspan fill="#4338CA">@</tspan>
      <tspan fill="#6366F1">@</tspan>
      <tspan fill="#818CF8">@</tspan>
      <tspan fill="#312E81">   </tspan>
      <tspan fill="#4338CA">@</tspan>
      <tspan fill="#6366F1">@</tspan>
      <tspan fill="#818CF8">@</tspan>
    </text>
    <!-- 행 2 -->
    <text x="160" y="308">
      <tspan fill="#4338CA">@</tspan>
      <tspan fill="#6366F1">@</tspan>
      <tspan fill="#818CF8">#</tspan>
      <tspan fill="#A5B4FC">#</tspan>
      <tspan fill="#C7D2FE">#</tspan>
      <tspan fill="#818CF8">#</tspan>
      <tspan fill="#6366F1">@</tspan>
      <tspan fill="#818CF8">#</tspan>
      <tspan fill="#A5B4FC">#</tspan>
      <tspan fill="#C7D2FE">#</tspan>
      <tspan fill="#818CF8">@</tspan>
    </text>
    <!-- 행 3 -->
    <text x="160" y="356">
      <tspan fill="#6366F1">@</tspan>
      <tspan fill="#818CF8">#</tspan>
      <tspan fill="#A5B4FC">%</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#E0E7FF">*</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#A5B4FC">%</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#E0E7FF">*</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#818CF8">@</tspan>
    </text>
    <!-- 행 4 -->
    <text x="200" y="404">
      <tspan fill="#818CF8"> </tspan>
      <tspan fill="#A5B4FC">@</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#E0E7FF">*</tspan>
      <tspan fill="#F0F4FF">+</tspan>
      <tspan fill="#E0E7FF">*</tspan>
      <tspan fill="#C7D2FE">%</tspan>
      <tspan fill="#E0E7FF">*</tspan>
      <tspan fill="#F0F4FF">+</tspan>
      <tspan fill="#C7D2FE">@</tspan>
    </text>
    <!-- 행 5 -->
    <text x="240" y="452">
      <tspan fill="#A5B4FC"> </tspan>
      <tspan fill="#C7D2FE">@</tspan>
      <tspan fill="#E0E7FF">%</tspan>
      <tspan fill="#F0F4FF">+</tspan>
      <tspan fill="#FFFFFF">-</tspan>
      <tspan fill="#F0F4FF">+</tspan>
      <tspan fill="#E0E7FF">%</tspan>
      <tspan fill="#C7D2FE">@</tspan>
    </text>
    <!-- 행 6-8 좁아짐 -->
    <text x="280" y="500">
      <tspan fill="#C7D2FE">  @</tspan>
      <tspan fill="#E0E7FF">%*+</tspan>
      <tspan fill="#C7D2FE">@  </tspan>
    </text>
    <text x="340" y="548">
      <tspan fill="#A5B4FC">  @%*@  </tspan>
    </text>
    <text x="400" y="596">
      <tspan fill="#818CF8">  @%@  </tspan>
    </text>
    <text x="460" y="644">
      <tspan fill="#6366F1">  @  </tspan>
    </text>
  </g>

  <!-- Layer 3: 하단 설명 -->
  <rect x="200" y="720" width="624" height="60" rx="14" fill="#1E1B4B" opacity="0.8"/>
  <text x="512" y="758" text-anchor="middle" font-family="Consolas,monospace" font-size="30" fill="#818CF8">chars form shapes</text>
</svg>
