<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010108"/>
      <stop offset="100%" stop-color="#0A0A1E"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- AI Chip -->
  <rect x="152" y="152" width="208" height="208" rx="24" fill="url(#chip)" stroke="#546E7A" stroke-width="8"/>
  <!-- Inner chip grid -->
  <rect x="176" y="176" width="160" height="160" rx="12" fill="#1C262A" stroke="#37474F" stroke-width="4"/>
  <!-- Circuit lines on chip -->
  <line x1="196" y1="196" x2="196" y2="316" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <line x1="236" y1="196" x2="236" y2="316" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <line x1="276" y1="196" x2="276" y2="316" stroke="#7C4DFF" stroke-width="2" opacity="0.3"/>
