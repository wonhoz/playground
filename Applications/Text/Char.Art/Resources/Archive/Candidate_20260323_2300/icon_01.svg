<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#0F172A"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Face outline in white -->
    <ellipse cx="512" cy="480" rx="240" ry="270" fill="none" stroke="white" stroke-width="18"/>
    <!-- Eyes -->
    <ellipse cx="432" cy="420" rx="36" ry="38" fill="none" stroke="white" stroke-width="14"/>
    <ellipse cx="592" cy="420" rx="36" ry="38" fill="none" stroke="white" stroke-width="14"/>
    <!-- Nose -->
    <path d="M512 440 L488 510 Q512 530 536 510 Z" fill="none" stroke="white" stroke-width="12" stroke-linejoin="round"/>
    <!-- Smile -->
    <path d="M432 560 Q512 620 592 560" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <!-- ASCII chars scattered around face -->
    <text x="200" y="320" font-size="48" font-weight="bold" font-family="monospace" fill="#22D3EE">@</text>
    <text x="730" y="310" font-size="42" font-weight="bold" font-family="monospace" fill="#22D3EE">#</text>
    <text x="160" y="520" font-size="36" font-weight="bold" font-family="monospace" fill="#22D3EE">$</text>
    <text x="770" y="530" font-size="40" font-weight="bold" font-family="monospace" fill="#22D3EE">%</text>
    <text x="220" y="700" font-size="44" font-weight="bold" font-family="monospace" fill="#22D3EE">&amp;</text>
    <text x="740" y="710" font-size="38" font-weight="bold" font-family="monospace" fill="#22D3EE">*</text>
    <text x="300" y="800" font-size="34" font-weight="bold" font-family="monospace" fill="#22D3EE">+</text>
    <text x="660" y="800" font-size="36" font-weight="bold" font-family="monospace" fill="#22D3EE">=</text>
    <!-- Fill face area with chars -->
    <text x="436" y="430" font-size="30" font-weight="bold" font-family="monospace" fill="#22D3EE">@</text>
    <text x="596" y="430" font-size="30" font-weight="bold" font-family="monospace" fill="#22D3EE">@</text>
    <text x="500" y="480" font-size="26" font-weight="bold" font-family="monospace" fill="#22D3EE">#</text>
    <text x="460" y="570" font-size="26" font-weight="bold" font-family="monospace" fill="#22D3EE">$</text>
    <text x="530" y="570" font-size="26" font-weight="bold" font-family="monospace" fill="#22D3EE">%</text>
    <!-- Top chars -->
    <text x="380" y="260" font-size="38" font-weight="bold" font-family="monospace" fill="#22D3EE">.</text>
    <text x="510" y="235" font-size="38" font-weight="bold" font-family="monospace" fill="#22D3EE">-</text>
    <text x="630" y="260" font-size="38" font-weight="bold" font-family="monospace" fill="#22D3EE">.</text>
    <!-- Forehead chars -->
    <text x="430" y="300" font-size="30" font-family="monospace" fill="#22D3EE">*</text>
    <text x="560" y="295" font-size="30" font-family="monospace" fill="#22D3EE">+</text>
  </g>
</svg>
