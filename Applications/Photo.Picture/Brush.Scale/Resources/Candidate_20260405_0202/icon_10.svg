<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>
  <!-- Layer 2: Pixel grid dissolving into smooth curve -->
  <!-- Left side: jagged pixel blocks -->
  <rect x="140" y="420" width="80" height="80" rx="4" fill="#FFB300"/>
  <rect x="220" y="380" width="80" height="120" rx="4" fill="#FFA000"/>
  <rect x="300" y="340" width="80" height="160" rx="4" fill="#FF8F00"/>
  <rect x="380" y="300" width="80" height="200" rx="4" fill="#FF6F00"/>
  <rect x="460" y="280" width="80" height="220" rx="4" fill="#E65100"/>
  <!-- Transition: small dots/pixels becoming smooth -->
  <circle cx="560" cy="370" r="18" fill="#FF8F00" opacity="0.7"/>
  <circle cx="590" cy="340" r="14" fill="#FFA000" opacity="0.6"/>
  <circle cx="616" cy="316" r="10" fill="#FFB300" opacity="0.5"/>
  <!-- Right side: smooth curve -->
  <path d="M560 390 Q640 300 720 310 Q800 320 840 400 Q880 480 820 560 Q760 640 640 620 Q520 600 560 500"
        fill="none" stroke="#E65100" stroke-width="28" stroke-linecap="round"/>
  <path d="M560 390 Q640 300 720 310 Q800 320 840 400 Q880 480 820 560 Q760 640 640 620 Q520 600 560 500"
        fill="#FF8F00" opacity="0.15"/>
  <!-- Layer 3: Arrow from pixels to curve -->
  <line x1="480" y1="700" x2="620" y2="700" stroke="#E65100" stroke-width="14" stroke-linecap="round"/>
  <polygon points="604,670 660,700 604,730" fill="#E65100"/>
  <text x="136" y="800" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="600" fill="#FF8F00">pixelated</text>
  <text x="580" y="800" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="600" fill="#E65100">smooth</text>
</svg>
