<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (hot pink) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg10cp)"/>

  <!-- Layer 2: Favorite star background glow -->
  <path d="M512 120 L572 330 L800 330 L620 460 L690 670 L512 545 L334 670 L404 460 L224 330 L452 330 Z"
    fill="white" opacity="0.12"/>

  <!-- Layered cards with favorite symbols -->
  <!-- Back card -->
  <rect x="180" y="300" width="580" height="380" rx="28" fill="white" opacity="0.3"
    transform="rotate(-6 470 490)"/>
  <!-- Middle card -->
  <rect x="180" y="300" width="580" height="380" rx="28" fill="white" opacity="0.5"
    transform="rotate(3 470 490)"/>
  <!-- Front card -->
  <rect x="180" y="280" width="580" height="380" rx="28" fill="white" opacity="0.95"/>

  <!-- Star icon on front card -->
  <path d="M470 330 L502 430 L610 430 L522 490 L556 590 L470 528 L384 590 L418 490 L330 430 L438 430 Z"
    fill="#FFC107"/>
  <path d="M470 340 L498 426 L594 426 L518 480 L546 566 L470 514 L394 566 L422 480 L346 426 L442 426 Z"
    fill="#FFD54F"/>

  <!-- Symbols on card -->
  <text x="640" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="96" fill="#AD1457" text-anchor="middle">©</text>
  <text x="640" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#880E4F" text-anchor="middle">∑</text>

  <!-- Layer 3: Label + small hearts -->
  <text x="512" y="820" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle">⭐ FAVORITES</text>

  <text x="180" y="240" font-size="60" text-anchor="middle" opacity="0.6">❤️</text>
  <text x="850" y="260" font-size="52" text-anchor="middle" opacity="0.5">❤️</text>
  <text x="150" y="820" font-size="48" text-anchor="middle" opacity="0.4">❤️</text>
</svg>
