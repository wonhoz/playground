<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a00"/>
      <stop offset="100%" stop-color="#050d00"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#4d7c0f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard heatmap -->
  <rect x="40" y="160" width="432" height="220" rx="14" fill="#0a1400" stroke="#4d7c0f" stroke-width="2"/>
  <!-- Number row with heat colors -->
  <rect x="56" y="176" width="36" height="30" rx="5" fill="#1a2e00" stroke="#4d7c0f" stroke-width="1"/>
  <text x="68" y="196" font-family="monospace" font-size="12" fill="#4d7c0f">1</text>
  <rect x="98" y="176" width="36" height="30" rx="5" fill="#203600" stroke="#65a30d" stroke-width="1.5"/>
  <text x="110" y="196" font-family="monospace" font-size="12" fill="#65a30d">2</text>
  <rect x="140" y="176" width="36" height="30" rx="5" fill="#2d4d00" stroke="#84cc16" stroke-width="1.5"/>
  <text x="152" y="196" font-family="monospace" font-size="12" fill="#84cc16">3</text>
  <rect x="182" y="176" width="36" height="30" rx="5" fill="#84cc16" opacity="0.9"/>
  <text x="194" y="196" font-family="monospace" font-size="12" fill="#0a1400" font-weight="bold">4</text>
  <rect x="224" y="176" width="36" height="30" rx="5" fill="#a3e635" opacity="0.85"/>
  <text x="236" y="196" font-family="monospace" font-size="12" fill="#0a1400" font-weight="bold">5</text>
  <rect x="266" y="176" width="36" height="30" rx="5" fill="#84cc16" opacity="0.8"/>
  <text x="278" y="196" font-family="monospace" font-size="12" fill="#0a1400" font-weight="bold">6</text>
  <rect x="308" y="176" width="36" height="30" rx="5" fill="#4d7c0f" opacity="0.9"/>
  <text x="320" y="196" font-family="monospace" font-size="12" fill="#e8f5c0">7</text>
  <rect x="350" y="176" width="36" height="30" rx="5" fill="#2d4d00" stroke="#65a30d" stroke-width="1"/>
  <text x="362" y="196" font-family="monospace" font-size="12" fill="#65a30d">8</text>
  <rect x="392" y="176" width="36" height="30" rx="5" fill="#1a2e00" stroke="#4d7c0f" stroke-width="1"/>
  <text x="404" y="196" font-family="monospace" font-size="12" fill="#4d7c0f">9</text>
  <rect x="434" y="176" width="30" height="30" rx="5" fill="#0d1a00" stroke="#2a3e00" stroke-width="1"/>
  <text x="443" y="196" font-family="monospace" font-size="12" fill="#2a3e00">0</text>
  <!-- QWERTY row -->
  <rect x="56" y="212" width="36" height="30" rx="5" fill="#4d7c0f" opacity="0.7"/>
  <text x="68" y="232" font-family="monospace" font-size="14" fill="#e8f5c0">Q</text>
  <rect x="98" y="212" width="36" height="30" rx="5" fill="#84cc16" opacity="0.95"/>
  <text x="110" y="232" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">W</text>
  <rect x="140" y="212" width="36" height="30" rx="5" fill="#a3e635"/>
  <text x="152" y="232" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">E</text>
  <rect x="182" y="212" width="36" height="30" rx="5" fill="#bef264" opacity="0.9"/>
  <text x="194" y="232" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">R</text>
  <rect x="224" y="212" width="36" height="30" rx="5" fill="#84cc16" opacity="0.7"/>
  <text x="236" y="232" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">T</text>
  <rect x="266" y="212" width="36" height="30" rx="5" fill="#4d7c0f" opacity="0.6"/>
  <text x="278" y="232" font-family="monospace" font-size="14" fill="#e8f5c0">Y</text>
  <rect x="308" y="212" width="36" height="30" rx="5" fill="#2d4d00"/>
  <text x="320" y="232" font-family="monospace" font-size="14" fill="#65a30d">U</text>
  <rect x="350" y="212" width="36" height="30" rx="5" fill="#1a2e00"/>
  <text x="362" y="232" font-family="monospace" font-size="14" fill="#4d7c0f">I</text>
  <rect x="392" y="212" width="36" height="30" rx="5" fill="#0d1a00"/>
  <text x="404" y="232" font-family="monospace" font-size="14" fill="#2a3e00">O</text>
  <rect x="434" y="212" width="30" height="30" rx="5" fill="#080d00"/>
  <text x="443" y="232" font-family="monospace" font-size="14" fill="#1a2e00">P</text>
  <!-- Home row ASDF -->
  <rect x="72" y="248" width="36" height="30" rx="5" fill="#bef264" opacity="0.85"/>
  <text x="84" y="268" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">A</text>
  <rect x="114" y="248" width="36" height="30" rx="5" fill="#a3e635" opacity="0.9"/>
  <text x="126" y="268" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">S</text>
  <rect x="156" y="248" width="36" height="30" rx="5" fill="#84cc16"/>
  <text x="168" y="268" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">D</text>
  <rect x="198" y="248" width="36" height="30" rx="5" fill="#bef264"/>
  <text x="210" y="268" font-family="monospace" font-size="14" fill="#0a1400" font-weight="bold">F</text>
  <rect x="240" y="248" width="36" height="30" rx="5" fill="#65a30d" opacity="0.8"/>
  <text x="252" y="268" font-family="monospace" font-size="14" fill="#d4f197">G</text>
  <rect x="282" y="248" width="36" height="30" rx="5" fill="#4d7c0f" opacity="0.7"/>
  <text x="294" y="268" font-family="monospace" font-size="14" fill="#e8f5c0">H</text>
  <rect x="324" y="248" width="36" height="30" rx="5" fill="#1a2e00"/>
  <text x="336" y="268" font-family="monospace" font-size="14" fill="#4d7c0f">J</text>
  <!-- Heat legend -->
  <rect x="56" y="300" width="84" height="16" rx="3" fill="none" stroke="#4d7c0f" stroke-width="1"/>
  <rect x="56" y="300" width="28" height="16" rx="0" fill="#1a2e00"/>
  <rect x="84" y="300" width="28" height="16" rx="0" fill="#4d7c0f"/>
  <rect x="112" y="300" width="28" height="16" rx="3" fill="#bef264"/>
  <text x="56" y="332" font-family="monospace" font-size="11" fill="#4d7c0f">Low</text>
  <text x="116" y="332" font-family="monospace" font-size="11" fill="#84cc16">High frequency</text>
  <!-- Title -->
  <text x="56" y="358" font-family="monospace" font-size="13" fill="#65a30d" opacity="0.9">Hotkey Usage Heatmap</text>
  <text x="56" y="374" font-family="monospace" font-size="11" fill="#2d4d00">Most used: E, R, W, A, F</text>
</svg>
