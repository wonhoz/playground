<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150025"/>
      <stop offset="100%" stop-color="#0A0018"/>
    </linearGradient>
    <linearGradient id="film" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A004A"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Film strip main body -->
  <rect x="80" y="150" width="352" height="212" rx="8" fill="url(#film)" stroke="url(#purple)" stroke-width="4"/>
  <!-- Sprocket holes top -->
  <g fill="#150025">
    <rect x="100" y="158" width="24" height="28" rx="4"/>
    <rect x="140" y="158" width="24" height="28" rx="4"/>
    <rect x="180" y="158" width="24" height="28" rx="4"/>
    <rect x="220" y="158" width="24" height="28" rx="4"/>
    <rect x="260" y="158" width="24" height="28" rx="4"/>
    <rect x="300" y="158" width="24" height="28" rx="4"/>
    <rect x="340" y="158" width="24" height="28" rx="4"/>
    <rect x="380" y="158" width="24" height="28" rx="4"/>
  </g>
  <!-- Sprocket holes bottom -->
  <g fill="#150025">
    <rect x="100" y="326" width="24" height="28" rx="4"/>
    <rect x="140" y="326" width="24" height="28" rx="4"/>
    <rect x="180" y="326" width="24" height="28" rx="4"/>
    <rect x="220" y="326" width="24" height="28" rx="4"/>
    <rect x="260" y="326" width="24" height="28" rx="4"/>
    <rect x="300" y="326" width="24" height="28" rx="4"/>
    <rect x="340" y="326" width="24" height="28" rx="4"/>
    <rect x="380" y="326" width="24" height="28" rx="4"/>
  </g>
  <!-- Film frames -->
  <rect x="96" y="196" width="100" height="120" rx="4" fill="url(#frame)" opacity="0.8"/>
  <rect x="206" y="196" width="100" height="120" rx="4" fill="url(#frame)" opacity="0.6"/>
  <rect x="316" y="196" width="100" height="120" rx="4" fill="url(#frame)" opacity="0.8"/>
  <!-- Play icons in frames -->
  <polygon points="126,236 126,276 170,256" fill="url(#purple)" opacity="0.8"/>
  <polygon points="236,236 236,276 280,256" fill="url(#purple)" opacity="0.6"/>
  <polygon points="346,236 346,276 390,256" fill="url(#purple)" opacity="0.8"/>
  <!-- REC dot -->
  <circle cx="256" cy="456" r="20" fill="#FF1744"/>
  <rect x="282" y="448" width="40" height="16" rx="6" fill="#FF5252" opacity="0.7"/>
</svg>
