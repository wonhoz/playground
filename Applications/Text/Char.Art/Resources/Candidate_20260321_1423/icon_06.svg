<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <clipPath id="c6b"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6b)"/>
  <circle cx="512" cy="460" r="320" fill="#10B981" opacity="0.08" clip-path="url(#c6b)"/>
  <circle cx="820" cy="820" r="200" fill="#059669" opacity="0.1" clip-path="url(#c6b)"/>

  <!-- Layer 2: 실루엣 — 별 형태를 ASCII 문자들로 구성 -->
  <!-- 5각별 꼭짓점 배열 → 별 실루엣 -->
  <!-- 별 중심: (512, 460) -->

  <g font-family="Consolas,monospace" font-weight="bold">
    <!-- 별 꼭짓점 1 (상단) — 높은 밀도 (@) -->
    <text x="486" y="228" font-size="50" fill="#6EE7B7">@</text>

    <!-- 꼭짓점 근처 밀집 영역 -->
    <text x="448" y="272" font-size="44" fill="#34D399">#</text>
    <text x="524" y="272" font-size="44" fill="#34D399">#</text>

    <!-- 꼭짓점 2 (우하) -->
    <text x="758" y="392" font-size="50" fill="#6EE7B7">@</text>
    <text x="716" y="348" font-size="44" fill="#34D399">#</text>
    <text x="720" y="436" font-size="44" fill="#34D399">#</text>

    <!-- 꼭짓점 3 (우하-아래) -->
    <text x="668" y="666" font-size="50" fill="#6EE7B7">@</text>
    <text x="624" y="622" font-size="44" fill="#34D399">#</text>
    <text x="630" y="706" font-size="44" fill="#34D399">#</text>

    <!-- 꼭짓점 4 (좌하-아래) -->
    <text x="318" y="666" font-size="50" fill="#6EE7B7">@</text>
    <text x="364" y="622" font-size="44" fill="#34D399">#</text>
    <text x="360" y="706" font-size="44" fill="#34D399">#</text>

    <!-- 꼭짓점 5 (좌하) -->
    <text x="220" y="392" font-size="50" fill="#6EE7B7">@</text>
    <text x="268" y="348" font-size="44" fill="#34D399">#</text>
    <text x="264" y="436" font-size="44" fill="#34D399">#</text>

    <!-- 별 내부 연결선 — 중간 밀도 (%) * -->
    <!-- 상단 → 우하 -->
    <text x="590" y="308" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="646" y="350" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="700" y="390" font-size="36" fill="#10B981" opacity="0.9">*</text>

    <!-- 상단 → 좌하 -->
    <text x="388" y="308" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="330" y="350" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="276" y="390" font-size="36" fill="#10B981" opacity="0.9">*</text>

    <!-- 우하 → 중앙 하단 -->
    <text x="720" y="500" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="700" y="558" font-size="36" fill="#10B981" opacity="0.9">*</text>

    <!-- 좌하 → 중앙 하단 -->
    <text x="260" y="500" font-size="36" fill="#10B981" opacity="0.9">%</text>
    <text x="278" y="558" font-size="36" fill="#10B981" opacity="0.9">*</text>

    <!-- 중앙 -->
    <text x="480" y="600" font-size="36" fill="#10B981" opacity="0.9">+</text>
    <text x="520" y="600" font-size="36" fill="#10B981" opacity="0.9">+</text>

    <!-- 별 중심 채우기 -->
    <text x="460" y="430" font-size="32" fill="#059669" opacity="0.8">*</text>
    <text x="506" y="430" font-size="32" fill="#059669" opacity="0.8">*</text>
    <text x="552" y="430" font-size="32" fill="#059669" opacity="0.8">*</text>
    <text x="460" y="468" font-size="32" fill="#059669" opacity="0.8">+</text>
    <text x="506" y="468" font-size="32" fill="#059669" opacity="0.8">-</text>
    <text x="552" y="468" font-size="32" fill="#059669" opacity="0.8">+</text>
    <text x="460" y="506" font-size="32" fill="#059669" opacity="0.8">-</text>
    <text x="506" y="506" font-size="32" fill="#059669" opacity="0.8">.</text>
    <text x="552" y="506" font-size="32" fill="#059669" opacity="0.8">-</text>

    <!-- 별 바깥 희박 -->
    <text x="200" y="550" font-size="24" fill="#065F46" opacity="0.5">.</text>
    <text x="780" y="280" font-size="24" fill="#065F46" opacity="0.5">.</text>
    <text x="160" y="320" font-size="24" fill="#065F46" opacity="0.5">.</text>
    <text x="800" y="600" font-size="24" fill="#065F46" opacity="0.4">.</text>
  </g>

  <!-- Layer 3: 하단 레이블 -->
  <rect x="220" y="750" width="584" height="58" rx="14" fill="#022C22" opacity="0.85"/>
  <text x="512" y="787" text-anchor="middle" font-family="Consolas,monospace" font-size="30" fill="#6EE7B7">@#%*+-.  chars</text>
</svg>
