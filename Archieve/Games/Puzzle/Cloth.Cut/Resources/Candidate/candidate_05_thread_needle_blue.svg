  <path d="M305 128 Q260 200 290 240 Q320 280 270 330 Q240 360 222 388" stroke="#64B5F6" stroke-width="2.5" fill="none" stroke-dasharray="5,5"/>
  <!-- Scissors -->
  <circle cx="355" cy="200" r="12" fill="none" stroke="white" stroke-width="3.5"/>
  <circle cx="377" cy="200" r="12" fill="none" stroke="white" stroke-width="3.5"/>
  <line x1="366" y1="191" x2="430" y2="140" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="366" y1="209" x2="430" y2="260" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
