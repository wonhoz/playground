<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="mic6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: Microphone silhouette -->
  <!-- Mic body -->
  <rect x="390" y="160" width="244" height="380" rx="122" fill="url(#mic6)"/>
  <!-- Mic grille lines -->
  <line x1="390" y1="280" x2="634" y2="280" stroke="#EF9A9A" stroke-width="10" opacity="0.6"/>
  <line x1="390" y1="330" x2="634" y2="330" stroke="#EF9A9A" stroke-width="10" opacity="0.6"/>
  <line x1="390" y1="380" x2="634" y2="380" stroke="#EF9A9A" stroke-width="10" opacity="0.6"/>
  <line x1="390" y1="430" x2="634" y2="430" stroke="#EF9A9A" stroke-width="10" opacity="0.6"/>
  <line x1="390" y1="480" x2="634" y2="480" stroke="#EF9A9A" stroke-width="10" opacity="0.6"/>
  <!-- Mic stand arc -->
  <path d="M280,560 Q280,740 512,740 Q744,740 744,560" fill="none" stroke="#1A237E" stroke-width="28" stroke-linecap="round"/>
  <!-- Stand pole -->
  <line x1="512" y1="740" x2="512" y2="860" stroke="#1A237E" stroke-width="28" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="360" y="852" width="304" height="44" rx="22" fill="#1A237E"/>

  <!-- "?" on mic -->
  <text x="512" y="430" font-family="Arial Black, sans-serif" font-size="200" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">?</text>

  <!-- Layer 3: Sound waves -->
  <path d="M680,280 Q730,350 680,420" fill="none" stroke="#E53935" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <path d="M730,240 Q810,355 730,470" fill="none" stroke="#E53935" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <path d="M344,280 Q294,350 344,420" fill="none" stroke="#E53935" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <path d="M294,240 Q214,355 294,470" fill="none" stroke="#E53935" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
</svg>
