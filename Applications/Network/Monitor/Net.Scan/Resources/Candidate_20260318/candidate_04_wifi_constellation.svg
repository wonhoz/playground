<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- WiFi 반원들 -->
  <path d="M 140 300 A 116 116 0 0 1 372 300" fill="none" stroke="#14B8A6" stroke-width="2" opacity="0.3"/>
  <path d="M 170 300 A 86 86 0 0 1 342 300" fill="none" stroke="#14B8A6" stroke-width="3" opacity="0.5"/>
  <path d="M 200 300 A 56 56 0 0 1 312 300" fill="none" stroke="#2DD4BF" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <path d="M 230 300 A 26 26 0 0 1 282 300" fill="none" stroke="#14B8A6" stroke-width="5" filter="url(#glow)"/>
  <!-- 중심점 -->
  <circle cx="256" cy="300" r="10" fill="#14B8A6" filter="url(#glow)"/>
  <!-- 별자리 디바이스들 -->
  <circle cx="140" cy="160" r="8" fill="#2DD4BF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="120" r="10" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="372" cy="160" r="8" fill="#2DD4BF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="110" cy="240" r="7" fill="#14B8A6" opacity="0.7"/>
  <circle cx="402" cy="240" r="7" fill="#2DD4BF" opacity="0.7"/>
  <!-- 연결선들 -->
  <line x1="256" y1="300" x2="140" y2="160" stroke="#14B8A6" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="256" y1="300" x2="256" y2="120" stroke="#14B8A6" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="256" y1="300" x2="372" y2="160" stroke="#14B8A6" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="256" y1="300" x2="110" y2="240" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="4,5" opacity="0.3"/>
  <line x1="256" y1="300" x2="402" y2="240" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="4,5" opacity="0.3"/>
  <!-- 장식 별 -->
  <circle cx="320" cy="380" r="3" fill="#14B8A6" opacity="0.5"/>
  <circle cx="190" cy="390" r="3" fill="#2DD4BF" opacity="0.4"/>
</svg>