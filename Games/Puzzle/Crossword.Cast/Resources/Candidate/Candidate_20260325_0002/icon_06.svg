<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 오렌지 -->
  <rect width="1024" height="1024" rx="190" fill="#E65100"/>

  <!-- 퍼즐 조각들 — 각 조각에 알파벳 -->

  <!-- 조각 1 (좌상) -->
  <path d="M210 280 L430 280 L430 340 Q460 340 460 370 Q460 400 430 400 L430 430 L210 430 Z" fill="white" opacity="0.92"/>
  <text x="320" y="378" font-family="Arial Black" font-size="100" font-weight="bold" fill="#E65100" text-anchor="middle">W</text>

  <!-- 조각 2 (우상) — 조각1에 맞물림 -->
  <path d="M430 280 L650 280 L650 430 L430 430 L430 400 Q400 400 400 370 Q400 340 430 340 Z" fill="#FFCC80" opacity="0.92"/>
  <text x="540" y="378" font-family="Arial Black" font-size="100" font-weight="bold" fill="#E65100" text-anchor="middle">O</text>

  <!-- 조각 3 (우상2) -->
  <path d="M650 280 L870 280 L870 430 L650 430 Z" fill="white" opacity="0.92"/>
  <text x="760" y="378" font-family="Arial Black" font-size="100" font-weight="bold" fill="#E65100" text-anchor="middle">R</text>

  <!-- 조각 4 (중좌) -->
  <path d="M210 430 L430 430 L430 580 Q430 610 400 610 Q370 610 370 580 L370 580 L210 580 Z" fill="#FFCC80" opacity="0.92"/>
  <text x="300" y="528" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">D</text>

  <!-- 조각 5 (중앙) — 아래쪽 돌출 -->
  <path d="M430 430 L650 430 L650 580 L580 580 L580 610 Q580 640 550 640 Q520 640 520 610 L520 580 L430 580 Z" fill="white" opacity="0.92"/>
  <text x="540" y="528" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">S</text>

  <!-- 조각 6 (중우) -->
  <path d="M650 430 L870 430 L870 580 L650 580 Z" fill="#FFCC80" opacity="0.92"/>
  <text x="760" y="528" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">!</text>

  <!-- 조각 7 (하좌) -->
  <path d="M210 580 L370 580 L370 580 Q370 610 400 610 Q430 610 430 580 L430 580 L430 730 L210 730 Z" fill="white" opacity="0.92"/>
  <text x="320" y="678" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">A</text>

  <!-- 조각 8 (하중) -->
  <path d="M430 580 L520 580 L520 610 Q520 640 550 640 Q580 640 580 610 L580 580 L650 580 L650 730 L430 730 Z" fill="#FFCC80" opacity="0.92"/>
  <text x="540" y="678" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">T</text>

  <!-- 조각 9 (하우) -->
  <path d="M650 580 L870 580 L870 730 L650 730 Z" fill="white" opacity="0.92"/>
  <text x="760" y="678" font-family="Arial Black" font-size="100" font-weight="bold" fill="#BF360C" text-anchor="middle">E</text>

  <!-- 하단 "PUZZLE" 텍스트 -->
  <text x="512" y="870" font-family="Arial Black" font-size="90" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">PUZZLE</text>
</svg>
