<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="lockBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ethernet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ethernet connector bottom -->
  <rect x="216" y="360" width="80" height="55" rx="4" fill="url(#ethernet)"/>
  <rect x="228" y="372" width="14" height="32" rx="2" fill="#1e1b4b"/>
  <rect x="249" y="372" width="14" height="32" rx="2" fill="#1e1b4b"/>
  <rect x="270" y="372" width="14" height="32" rx="2" fill="#1e1b4b"/>
  <!-- Cable -->
  <rect x="238" y="330" width="36" height="30" rx="3" fill="#6366f1"/>
  <!-- Lock body -->
  <rect x="168" y="240" width="176" height="140" rx="16" fill="url(#lockBody)"/>
  <!-- Lock shackle -->
  <path d="M204,240 L204,195 Q204,155 256,155 Q308,155 308,195 L308,240" fill="none" stroke="#818cf8" stroke-width="20" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="256" cy="298" r="22" fill="#1e1b4b"/>
  <rect x="248" y="298" width="16" height="28" rx="4" fill="#1e1b4b"/>
  <!-- Port indicator -->
  <text x="256" y="360" text-anchor="middle" font-family="monospace" font-size="14" fill="#c7d2fe" font-weight="bold">:443 SECURED</text>
  <!-- Status pulse rings -->
  <circle cx="256" cy="298" r="32" fill="none" stroke="#a5b4fc" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="298" r="45" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
  <!-- Network lines to corners -->
  <line x1="168" y1="280" x2="90" y2="220" stroke="#6366f1" stroke-width="2" opacity="0.5" stroke-dasharray="6 4"/>
  <line x1="344" y1="280" x2="422" y2="220" stroke="#6366f1" stroke-width="2" opacity="0.5" stroke-dasharray="6 4"/>
  <circle cx="90" cy="220" r="10" fill="#818cf8" opacity="0.7"/>
  <circle cx="422" cy="220" r="10" fill="#818cf8" opacity="0.7"/>
</svg>
