  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256 72 L390 128 L390 270 Q390 374 256 444 Q122 374 122 270 L122 128 Z" fill="url(#shield)"/>
