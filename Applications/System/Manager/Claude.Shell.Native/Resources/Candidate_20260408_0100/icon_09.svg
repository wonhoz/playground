<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg09csn" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0A2E"/>
    </radialGradient>
  </defs>

  <!-- Background: very dark indigo -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg09csn)"/>

  <!-- Shell (seashell shape) as the main visual metaphor for "Shell Extension" -->
  <!-- Shell outer spiral -->
  <path d="M512,200 Q700,200 780,340 Q860,480 760,620 Q660,760 500,760 Q340,760 260,640 Q180,520 220,380 Q260,240 512,200 Z"
        fill="#7C3AED" opacity="0.8"/>
  <path d="M512,240 Q680,245 748,370 Q810,495 720,612 Q630,729 490,724 Q350,719 278,614 Q206,509 240,386 Q274,263 512,240 Z"
        fill="#5B21B6" opacity="0.9"/>
  <!-- Shell spiral lines -->
  <path d="M512,300 Q640,305 700,410 Q752,508 686,598 Q620,688 500,682 Q380,676 322,578 Q264,480 310,378 Q356,276 512,300 Z"
        fill="none" stroke="#A78BFA" stroke-width="8" opacity="0.5"/>
  <path d="M512,360 Q604,365 646,444 Q686,520 636,596 Q586,672 495,668 Q404,664 360,590 Q316,516 352,436 Q388,356 512,360 Z"
        fill="none" stroke="#C4B5FD" stroke-width="6" opacity="0.4"/>

  <!-- Claude "C" badge emerging from shell center -->
  <circle cx="512" cy="490" r="110" fill="#F97316"/>
  <circle cx="512" cy="490" r="92" fill="#EA580C"/>
  <text x="512" y="530" font-family="Arial Black,Arial" font-size="110" fill="white" font-weight="900" text-anchor="middle">C</text>

  <!-- Sparkle rays from Claude badge -->
  <line x1="512" y1="370" x2="512" y2="230" stroke="#FCD34D" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="624" y1="406" x2="710" y2="270" stroke="#FCD34D" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="400" y1="406" x2="314" y2="270" stroke="#A5F3FC" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- "Shell" labels around -->
  <text x="512" y="830" font-family="Arial Black,Arial" font-size="44" fill="#A78BFA" font-weight="900" text-anchor="middle">Shell Extension</text>
  <text x="512" y="878" font-family="Arial,sans-serif" font-size="26" fill="#7C3AED" text-anchor="middle">Claude.Shell.Native.dll</text>

  <!-- Stars -->
  <text x="200" y="244" font-family="Arial,sans-serif" font-size="24" fill="#FCD34D">✦</text>
  <text x="780" y="232" font-family="Arial,sans-serif" font-size="18" fill="#FCD34D">★</text>
  <text x="820" y="740" font-family="Arial,sans-serif" font-size="20" fill="#A5F3FC">✦</text>
</svg>
