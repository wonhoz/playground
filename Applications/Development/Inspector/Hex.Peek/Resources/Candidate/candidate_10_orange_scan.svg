<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d1500"/>
      <stop offset="100%" stop-color="#1a0d00"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File document shape -->
  <rect x="100" y="64" width="240" height="300" rx="10" fill="#1f0d00" stroke="#ea580c" stroke-width="2.5"/>
  <!-- Fold corner -->
  <polygon points="300,64 340,64 340,104 300,104" fill="#1f0d00" stroke="#ea580c" stroke-width="2.5"/>
  <polygon points="300,64 340,104 300,104" fill="#ea580c" opacity="0.5"/>
  <!-- File content lines (hex) -->
  <text x="116" y="108" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.4">4D 5A 90 00 03</text>
  <text x="116" y="128" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.35">04 00 FF FF 00</text>
  <text x="116" y="148" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.4">B8 00 00 00 00</text>
  <text x="116" y="168" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.35">40 00 00 00 00</text>
  <text x="116" y="188" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.4">00 00 00 00 00</text>
  <!-- Scan beam across document -->
  <rect x="100" y="200" width="240" height="32" fill="url(#scan)" opacity="0.8"/>
  <line x1="100" y1="216" x2="340" y2="216" stroke="#fb923c" stroke-width="2.5" opacity="0.9"/>
  <!-- Highlighted bytes under scan -->
  <text x="116" y="222" font-family="monospace" font-size="14" fill="#fdba74" font-weight="bold">E8 00 00 0E 1F</text>
  <text x="116" y="248" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.4">BA 0E B4 09 CD</text>
  <text x="116" y="268" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.35">21 B8 4C CD 21</text>
  <text x="116" y="288" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.4">54 68 69 73 20</text>
  <text x="116" y="308" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.3">70 72 6F 67 72</text>
  <text x="116" y="328" font-family="monospace" font-size="14" fill="#fb923c" opacity="0.25">61 6D 20 63 61</text>
  <!-- Scanner body right side -->
  <rect x="340" y="140" width="80" height="184" rx="12" fill="#2d1500" stroke="#ea580c" stroke-width="2"/>
  <!-- Scanner details -->
  <circle cx="380" cy="172" r="18" fill="#1f0d00" stroke="#fb923c" stroke-width="2"/>
  <circle cx="380" cy="172" r="8" fill="#fb923c" opacity="0.6"/>
  <rect x="356" y="200" width="48" height="6" rx="3" fill="#fb923c" opacity="0.5"/>
  <rect x="356" y="214" width="48" height="6" rx="3" fill="#ea580c" opacity="0.4"/>
  <rect x="356" y="228" width="48" height="6" rx="3" fill="#fb923c" opacity="0.3"/>
  <!-- Scan line from scanner -->
  <line x1="340" y1="224" x2="360" y2="224" stroke="#fdba74" stroke-width="2" opacity="0.8"/>
  <!-- Result panel bottom -->
  <rect x="100" y="388" width="320" height="72" rx="12" fill="#2d1500" stroke="#ea580c" stroke-width="1.5"/>
  <text x="116" y="412" font-family="monospace" font-size="13" fill="#fb923c">Found: PE/EXE signature</text>
  <text x="116" y="432" font-family="monospace" font-size="13" fill="#fdba74" font-weight="bold">Offset 0x14: E8 00 00 0E</text>
  <text x="116" y="452" font-family="monospace" font-size="12" fill="#92400e">4 bytes matched at 0x0014</text>
</svg>
