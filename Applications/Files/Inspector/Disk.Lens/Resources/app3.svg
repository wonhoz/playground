<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 연보라 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg1)"/>

  <!-- Layer 2: 트리맵 (크기 비례 박스들) -->
  <!-- 큰 파일 (Videos — 40%) -->
  <rect x="80" y="140" width="440" height="440" rx="16" fill="#EF5350"/>
  <text x="300" y="330" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="44" fill="white" text-anchor="middle" dominant-baseline="middle">Videos</text>
  <text x="300" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#FFCDD2" text-anchor="middle">85 GB</text>

  <!-- 중간 파일 (Games — 25%) -->
  <rect x="540" y="140" width="404" height="280" rx="16" fill="#42A5F5"/>
  <text x="742" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="42" fill="white" text-anchor="middle" dominant-baseline="middle">Games</text>
  <text x="742" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#BBDEFB" text-anchor="middle">52 GB</text>

  <!-- 중간 파일 (Docs — 15%) -->
  <rect x="540" y="440" width="240" height="140" rx="14" fill="#66BB6A"/>
  <text x="660" y="514" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="white" text-anchor="middle" dominant-baseline="middle">Docs</text>
  <text x="660" y="552" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#C8E6C9" text-anchor="middle">30 GB</text>

  <!-- 작은 파일 (System — 10%) -->
  <rect x="800" y="440" width="144" height="140" rx="14" fill="#FFA726"/>
  <text x="872" y="502" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">Sys</text>
  <text x="872" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#FFF3E0" text-anchor="middle">20 GB</text>

  <!-- 아래 행 -->
  <rect x="80" y="600" width="200" height="160" rx="14" fill="#AB47BC"/>
  <text x="180" y="682" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">Music</text>
  <text x="180" y="716" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#E1BEE7" text-anchor="middle">12 GB</text>

  <rect x="300" y="600" width="200" height="160" rx="14" fill="#26C6DA"/>
  <text x="400" y="682" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">Pics</text>
  <text x="400" y="716" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#B2EBF2" text-anchor="middle">8 GB</text>

  <rect x="520" y="600" width="424" height="160" rx="14" fill="#78909C"/>
  <text x="732" y="682" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">Others</text>
  <text x="732" y="716" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#CFD8DC" text-anchor="middle">6 GB</text>

  <!-- Layer 3: 합계 배지 -->
  <rect x="80" y="800" width="864" height="84" rx="20" fill="#3949AB"/>
  <text x="300" y="842" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="white" text-anchor="middle" dominant-baseline="middle">Total:</text>
  <text x="600" y="842" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFEB3B" text-anchor="middle" dominant-baseline="middle">213 GB</text>
</svg>
