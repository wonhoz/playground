<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A65"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAB40"/>
      <stop offset="100%" style="stop-color:#FF6D00"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="80" y1="360" x2="440" y2="360" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <line x1="80" y1="295" x2="440" y2="295" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="230" x2="440" y2="230" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="165" x2="440" y2="165" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="100" x2="440" y2="100" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>
  <!-- Y axis -->
  <line x1="80" y1="100" x2="80" y2="360" stroke="#FFF" stroke-width="2.5" opacity="0.4"/>
  <!-- Bars -->
  <rect x="108" y="200" width="58" height="160" rx="8" fill="url(#bar1)"/>
  <rect x="188" y="150" width="58" height="210" rx="8" fill="url(#bar2)"/>
  <rect x="268" y="120" width="58" height="240" rx="8" fill="url(#bar3)"/>
  <rect x="348" y="170" width="58" height="190" rx="8" fill="url(#bar1)"/>
  <!-- Git branch icon at top -->
  <circle cx="190" cy="90" r="12" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="256" cy="65" r="12" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="322" cy="90" r="12" fill="#FFFFFF" opacity="0.9"/>
  <line x1="190" y1="90" x2="256" y2="65" stroke="#FFF" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="65" x2="322" y2="90" stroke="#FFF" stroke-width="3" opacity="0.7"/>
  <!-- Label -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#FFD54F">GIT STATS</text>
</svg>
