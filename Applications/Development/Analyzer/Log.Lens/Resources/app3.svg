<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="ll1-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <radialGradient id="ll1-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#C86800"/>
      <stop offset="100%" stop-color="#7A3C00"/>
    </radialGradient>
    <filter id="ll1-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ll1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g clip-path="url(#ll1-clip)">
    <!-- Background: Deep Amber -->
    <rect width="1024" height="1024" fill="url(#ll1-bg)"/>

    <!-- Log text lines (dark, behind magnifier) -->
    <g font-family="monospace" font-size="18" fill="#3A2000" opacity="0.5">
      <text x="220" y="300">[2026-03-21 06:04:12] INFO  Starting service...</text>
      <text x="220" y="328">[2026-03-21 06:04:13] DEBUG Connection pool init</text>
      <text x="220" y="356">[2026-03-21 06:04:14] INFO  Listening on port 8080</text>
      <text x="220" y="384">[2026-03-21 06:04:15] WARN  Memory usage 82%</text>
      <text x="220" y="412">[2026-03-21 06:04:16] ERROR NullReferenceException</text>
      <text x="220" y="440">[2026-03-21 06:04:17] INFO  Retrying connection...</text>
      <text x="220" y="468">[2026-03-21 06:04:18] DEBUG Queue depth: 1024</text>
      <text x="220" y="496">[2026-03-21 06:04:19] INFO  Request processed OK</text>
      <text x="220" y="524">[2026-03-21 06:04:20] WARN  Slow query detected</text>
      <text x="220" y="552">[2026-03-21 06:04:21] ERROR Connection timeout</text>
      <text x="220" y="580">[2026-03-21 06:04:22] INFO  Graceful shutdown</text>
      <text x="220" y="608">[2026-03-21 06:04:23] DEBUG Cleanup complete</text>
    </g>

    <!-- Highlighted line under magnifier -->
    <rect x="220" y="396" width="584" height="32" rx="4" fill="#FF6600" opacity="0.25"/>

    <!-- Magnifying glass (white) - large, centered -->
    <g filter="url(#ll1-shadow)">
      <!-- Handle -->
      <line x1="680" y1="680" x2="780" y2="780" stroke="#FFFFFF" stroke-width="60" stroke-linecap="round"/>
      <line x1="680" y1="680" x2="780" y2="780" stroke="#E0A050" stroke-width="30" stroke-linecap="round"/>
      <!-- Lens ring -->
      <circle cx="500" cy="500" r="200" fill="none" stroke="#FFFFFF" stroke-width="52"/>
      <!-- Lens glass tint -->
      <circle cx="500" cy="500" r="174" fill="#C86800" opacity="0.4"/>
      <!-- Inner lens reflection -->
      <ellipse cx="450" cy="440" rx="50" ry="30" fill="#FFFFFF" opacity="0.18" transform="rotate(-30 450 440)"/>
    </g>

    <!-- Lines visible through the magnifier lens -->
    <clipPath id="ll1-lens">
      <circle cx="500" cy="500" r="174"/>
    </clipPath>
    <g clip-path="url(#ll1-lens)" font-family="monospace" font-size="22" fill="#1A0A00">
      <rect x="326" y="396" width="348" height="36" rx="4" fill="#FF6600" opacity="0.5"/>
      <text x="330" y="422" font-size="22" fill="#FFFFFF" font-weight="bold">[ERROR] NullReferenceException</text>
    </g>
  </g>
</svg>
