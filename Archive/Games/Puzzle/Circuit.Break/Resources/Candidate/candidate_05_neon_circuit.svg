<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#050515"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon circuit traces -->
  <!-- Outer frame -->
  <rect x="80" y="80" width="352" height="352" rx="20" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neon)"/>
  <!-- Inner maze-like circuit -->
  <line x1="80" y1="180" x2="180" y2="180" stroke="#00ffff" stroke-width="3" filter="url(#neon)"/>
  <line x1="180" y1="180" x2="180" y2="130" stroke="#00ffff" stroke-width="3" filter="url(#neon)"/>
  <line x1="180" y1="130" x2="332" y2="130" stroke="#ff00ff" stroke-width="3" filter="url(#neon)"/>
  <line x1="332" y1="130" x2="332" y2="180" stroke="#ff00ff" stroke-width="3" filter="url(#neon)"/>
  <line x1="332" y1="180" x2="432" y2="180" stroke="#ff00ff" stroke-width="3" filter="url(#neon)"/>
  <line x1="432" y1="180" x2="432" y2="332" stroke="#ffff00" stroke-width="3" filter="url(#neon)"/>
  <line x1="432" y1="332" x2="332" y2="332" stroke="#ffff00" stroke-width="3" filter="url(#neon)"/>
  <line x1="332" y1="332" x2="332" y2="382" stroke="#ff8800" stroke-width="3" filter="url(#neon)"/>
  <line x1="332" y1="382" x2="180" y2="382" stroke="#ff8800" stroke-width="3" filter="url(#neon)"/>
  <line x1="180" y1="382" x2="180" y2="332" stroke="#ff0066" stroke-width="3" filter="url(#neon)"/>
  <line x1="180" y1="332" x2="80" y2="332" stroke="#ff0066" stroke-width="3" filter="url(#neon)"/>
  <line x1="80" y1="332" x2="80" y2="180" stroke="#00ffff" stroke-width="3" filter="url(#neon)"/>
  <!-- Center crossing -->
  <line x1="180" y1="256" x2="332" y2="256" stroke="#00ff88" stroke-width="5" filter="url(#neon)"/>
  <line x1="256" y1="180" x2="256" y2="332" stroke="#00ff88" stroke-width="5" filter="url(#neon)"/>
  <!-- Junction nodes -->
  <circle cx="180" cy="180" r="10" fill="#00ffff" filter="url(#neon)"/>
  <circle cx="332" cy="180" r="10" fill="#ff00ff" filter="url(#neon)"/>
  <circle cx="332" cy="332" r="10" fill="#ffff00" filter="url(#neon)"/>
  <circle cx="180" cy="332" r="10" fill="#ff0066" filter="url(#neon)"/>
  <circle cx="256" cy="256" r="16" fill="#00ff88" filter="url(#neon)"/>
  <!-- Broken node at (256, 180) -->
  <circle cx="256" cy="180" r="12" fill="#220000" stroke="#ff4400" stroke-width="3"/>
  <line x1="248" y1="172" x2="264" y2="188" stroke="#ff4400" stroke-width="3"/>
  <line x1="264" y1="172" x2="248" y2="188" stroke="#ff4400" stroke-width="3"/>
</svg>