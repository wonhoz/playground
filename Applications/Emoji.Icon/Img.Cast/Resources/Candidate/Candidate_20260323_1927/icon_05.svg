  <rect x="240" y="255" width="40" height="40" rx="6" fill="white"/>
  <text x="335" y="293" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">16</text>
  <text x="335" y="340" font-family="Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.7)" text-anchor="middle">px</text>
  <!-- Top-right: 32px -->
  <rect x="554" y="220" width="270" height="250" rx="20" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="10"/>
  <rect x="594" y="250" width="58" height="58" rx="8" fill="white"/>
  <text x="695" y="293" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">32</text>
  <text x="695" y="340" font-family="Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.7)" text-anchor="middle">px</text>
  <!-- Bottom-left: 48px -->
  <rect x="200" y="554" width="270" height="250" rx="20" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="10"/>
