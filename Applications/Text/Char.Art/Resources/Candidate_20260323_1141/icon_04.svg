<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0A1F0A"/>
  <!-- Layer 2: Density gradient (5 zones) -->
  <!-- Dense zone (dark = many chars) -->
  <rect x="140" y="300" width="136" height="424" rx="12" fill="#0D2B0D"/>
  <text x="150" y="370" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">####</text>
  <text x="150" y="404" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">####</text>
  <text x="150" y="438" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">####</text>
  <text x="150" y="472" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">####</text>
  <text x="150" y="506" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">####</text>
  <!-- Zone 2 -->
  <rect x="296" y="300" width="136" height="424" rx="12" fill="#0D2B0D"/>
  <text x="306" y="370" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">@@@@</text>
  <text x="306" y="420" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">@@@@</text>
  <text x="306" y="470" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">@@@@</text>
  <text x="306" y="520" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">@@@@</text>
  <!-- Zone 3 -->
  <rect x="452" y="300" width="136" height="424" rx="12" fill="#0D2B0D"/>
  <text x="462" y="380" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">++++</text>
  <text x="462" y="440" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">++++</text>
  <text x="462" y="500" font-family="Consolas,monospace" font-size="24" fill="#7CFC00">++++</text>
  <!-- Zone 4 -->
  <rect x="608" y="300" width="136" height="424" rx="12" fill="#0D2B0D"/>
  <text x="618" y="390" font-family="Consolas,monospace" font-size="24" fill="#7CFC00" opacity="0.7">.  .</text>
  <text x="618" y="460" font-family="Consolas,monospace" font-size="24" fill="#7CFC00" opacity="0.5">.  .</text>
  <!-- Zone 5 (lightest) -->
  <rect x="764" y="300" width="120" height="424" rx="12" fill="#0D2B0D"/>
  <text x="784" y="440" font-family="Consolas,monospace" font-size="24" fill="#7CFC00" opacity="0.3">  </text>
  <!-- Labels -->
  <text x="208" y="760" font-family="Arial" font-size="24" fill="#7CFC00" text-anchor="middle">Dark</text>
  <text x="816" y="760" font-family="Arial" font-size="24" fill="#7CFC00" opacity="0.4" text-anchor="middle">Light</text>
</svg>