<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- App window -->
  <rect x="46" y="66" width="420" height="390" rx="12" fill="#1C2333" stroke="#334155" stroke-width="1.5"/>
  <!-- Sidebar -->
  <rect x="46" y="66" width="120" height="390" rx="12" fill="#161B2A"/>
  <rect x="46" y="116" width="120" height="340" fill="#161B2A"/>
  <!-- Sidebar items -->
  <rect x="58" y="90" width="96" height="22" rx="5" fill="#1E3A5F"/>
  <text x="106" y="105" font-family="Arial" font-size="11" fill="#60A5FA" text-anchor="middle">Overview</text>
  <rect x="58" y="120" width="96" height="22" rx="5" fill="#1E293B"/>
  <text x="106" y="135" font-family="Arial" font-size="11" fill="#8B949E" text-anchor="middle">Routes</text>
  <rect x="58" y="150" width="96" height="22" rx="5" fill="#1E293B"/>
  <text x="106" y="165" font-family="Arial" font-size="11" fill="#8B949E" text-anchor="middle">Schemas</text>
  <rect x="58" y="180" width="96" height="22" rx="5" fill="#1E293B"/>
  <text x="106" y="195" font-family="Arial" font-size="11" fill="#8B949E" text-anchor="middle">Logs</text>
  <rect x="58" y="210" width="96" height="22" rx="5" fill="#1E293B"/>
  <text x="106" y="225" font-family="Arial" font-size="11" fill="#8B949E" text-anchor="middle">Settings</text>
  <!-- Main content area -->
  <!-- Routes list -->
  <!-- GET /api/users -->
  <rect x="178" y="80" width="274" height="50" rx="8" fill="#0F172A" stroke="#15803D" stroke-width="1.5"/>
  <rect x="190" y="93" width="46" height="18" rx="4" fill="#15803D"/>
  <text x="213" y="106" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <text x="250" y="108" font-family="Courier New" font-size="12" fill="#4ADE80">/api/users</text>
  <text x="440" y="108" font-family="Arial" font-size="10" fill="#22C55E" text-anchor="end">200</text>
  <!-- POST /api/users -->
  <rect x="178" y="140" width="274" height="50" rx="8" fill="#0F172A" stroke="#B45309" stroke-width="1.5"/>
  <rect x="190" y="153" width="52" height="18" rx="4" fill="#B45309"/>
  <text x="216" y="166" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="256" y="168" font-family="Courier New" font-size="12" fill="#FCD34D">/api/users</text>
  <text x="440" y="168" font-family="Arial" font-size="10" fill="#F59E0B" text-anchor="end">201</text>
  <!-- GET /api/users/:id -->
  <rect x="178" y="200" width="274" height="50" rx="8" fill="#0F172A" stroke="#15803D" stroke-width="1.5"/>
  <rect x="190" y="213" width="46" height="18" rx="4" fill="#15803D"/>
  <text x="213" y="226" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <text x="250" y="228" font-family="Courier New" font-size="12" fill="#4ADE80">/api/users/:id</text>
  <text x="440" y="228" font-family="Arial" font-size="10" fill="#22C55E" text-anchor="end">200</text>
  <!-- DELETE /api/users/:id -->
  <rect x="178" y="260" width="274" height="50" rx="8" fill="#0F172A" stroke="#991B1B" stroke-width="1.5"/>
  <rect x="190" y="273" width="62" height="18" rx="4" fill="#991B1B"/>
  <text x="221" y="286" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">DELETE</text>
  <text x="268" y="288" font-family="Courier New" font-size="12" fill="#FCA5A5">/api/users/:id</text>
  <text x="440" y="288" font-family="Arial" font-size="10" fill="#EF4444" text-anchor="end">204</text>
  <!-- Status bar -->
  <rect x="166" y="355" width="286" height="60" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <circle cx="188" cy="375" r="7" fill="#22C55E"/>
  <text x="208" y="380" font-family="Courier New" font-size="11" fill="#4ADE80">Server: RUNNING</text>
  <text x="208" y="398" font-family="Courier New" font-size="11" fill="#64748B">http://localhost:3000</text>
  <text x="430" y="398" font-family="Courier New" font-size="11" fill="#64748B" text-anchor="end">4 routes</text>
</svg>
