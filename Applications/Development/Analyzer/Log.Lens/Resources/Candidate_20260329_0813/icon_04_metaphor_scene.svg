<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background - dark terminal feel (ok since vivid accent colors) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: Terminal/log viewer scene -->
  <!-- Terminal window frame -->
  <rect x="132" y="200" width="760" height="580" rx="24" fill="#1F2937" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="132" y="200" width="760" height="56" rx="24" fill="#374151"/>
  <rect x="132" y="232" width="760" height="24" fill="#374151"/>
  <!-- Window buttons -->
  <circle cx="188" cy="228" r="14" fill="#EF4444"/>
  <circle cx="228" cy="228" r="14" fill="#FBBF24"/>
  <circle cx="268" cy="228" r="14" fill="#4ADE80"/>
  <!-- Log lines with colored levels -->
  <text x="160" y="316" font-family="monospace" font-size="46" fill="#4ADE80">[INFO]  Server started on port 8080</text>
  <text x="160" y="376" font-family="monospace" font-size="46" fill="#FBBF24">[WARN]  Memory usage at 78%</text>
  <text x="160" y="436" font-family="monospace" font-size="46" fill="#EF4444">[ERROR] Connection timeout: 30s</text>
  <text x="160" y="496" font-family="monospace" font-size="46" fill="#4ADE80">[INFO]  Retrying... attempt 1/3</text>
  <text x="160" y="556" font-family="monospace" font-size="46" fill="#60A5FA">[DEBUG] Socket ID: 0xA3F2</text>
  <text x="160" y="616" font-family="monospace" font-size="46" fill="#EF4444">[ERROR] Disk write failed</text>
  <!-- Cursor blink -->
  <rect x="160" y="670" width="22" height="46" rx="2" fill="#4ADE80" opacity="0.8"/>
  <!-- Layer 3: Magnifying lens overlay -->
  <circle cx="790" cy="730" r="100" fill="none" stroke="#60A5FA" stroke-width="22" opacity="0.9"/>
  <line x1="862" y1="802" x2="920" y2="860" stroke="#60A5FA" stroke-width="26" stroke-linecap="round" opacity="0.9"/>
  <!-- Lens glass tint -->
  <circle cx="790" cy="730" r="96" fill="#60A5FA" opacity="0.12"/>
</svg>
