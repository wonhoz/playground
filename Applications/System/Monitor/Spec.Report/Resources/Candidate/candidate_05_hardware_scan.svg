<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b0d"/>
      <stop offset="100%" style="stop-color:#051005"/>
    </linearGradient>
    <filter id="scanline">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="80" y="100" width="352" height="260" rx="12" fill="#0a1a0a" stroke="#33ff33" stroke-width="3"/>
  <rect x="96" y="116" width="320" height="228" rx="6" fill="#000500"/>
  <!-- Scan line effect -->
  <line x1="96" y1="230" x2="416" y2="230" stroke="#33ff33" stroke-width="2" opacity="0.8"/>
  <!-- System info lines - green terminal style -->
  <rect x="108" y="128" width="120" height="8" rx="2" fill="#33ff33" opacity="0.8"/>
  <rect x="108" y="146" width="200" height="8" rx="2" fill="#33ff33" opacity="0.6"/>
  <rect x="108" y="164" width="180" height="8" rx="2" fill="#33ff33" opacity="0.6"/>
  <rect x="108" y="182" width="240" height="8" rx="2" fill="#33ff33" opacity="0.5"/>
  <rect x="108" y="200" width="160" height="8" rx="2" fill="#33ff33" opacity="0.5"/>
  <rect x="108" y="246" width="200" height="8" rx="2" fill="#33ff33" opacity="0.6"/>
  <rect x="108" y="264" width="220" height="8" rx="2" fill="#33ff33" opacity="0.5"/>
  <rect x="108" y="282" width="180" height="8" rx="2" fill="#33ff33" opacity="0.5"/>
  <rect x="108" y="300" width="260" height="8" rx="2" fill="#33ff33" opacity="0.4"/>
  <rect x="108" y="318" width="200" height="8" rx="2" fill="#33ff33" opacity="0.4"/>
  <!-- Cursor blink -->
  <rect x="108" y="336" width="10" height="12" rx="1" fill="#33ff33"/>
  <!-- Monitor stand -->
  <rect x="216" y="360" width="80" height="20" rx="4" fill="#1a2a1a"/>
  <rect x="176" y="380" width="160" height="12" rx="6" fill="#1a2a1a"/>
</svg>