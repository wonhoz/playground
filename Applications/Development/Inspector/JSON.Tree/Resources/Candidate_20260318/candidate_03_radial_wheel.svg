      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radial spokes from center -->
  <line x1="256" y1="256" x2="256" y2="96" stroke="#06B6D4" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="256" x2="380" y2="166" stroke="#06B6D4" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="420" y2="296" stroke="#06B6D4" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="340" y2="406" stroke="#06B6D4" stroke-width="2.5" opacity="0.5"/>
