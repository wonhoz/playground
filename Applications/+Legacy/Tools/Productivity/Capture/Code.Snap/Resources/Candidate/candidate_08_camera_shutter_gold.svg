<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33280A"/>
      <stop offset="100%" stop-color="#5D4C0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Camera body golden -->
  <rect x="100" y="188" width="312" height="210" rx="20" fill="#3E2E00" stroke="#F9A825" stroke-width="3"/>
  <rect x="190" y="158" width="132" height="40" rx="12" fill="#4A3600"/>
  <!-- Golden lens -->
  <circle cx="256" cy="294" r="80" fill="#2A1E00" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="256" cy="294" r="62" fill="#1A1200" stroke="#F9A825" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="294" r="44" fill="url(#gold)" opacity="0.12"/>
  <circle cx="256" cy="294" r="28" fill="#2A1E00"/>
  <!-- Code brackets in lens -->
  <text x="256" y="305" text-anchor="middle" font-size="26" fill="#FFF176" font-family="Courier New" font-weight="bold">&lt;/&gt;</text>
  <!-- Shutter blades -->
  <path d="M198 232 Q222 215 256 213 L246 240 Z" fill="#F9A825" opacity="0.5"/>
  <path d="M318 232 Q294 215 256 213 L266 240 Z" fill="#F9A825" opacity="0.5"/>
  <!-- Controls -->
  <circle cx="370" cy="215" r="18" fill="#4A3600" stroke="#F9A825" stroke-width="2"/>
  <rect x="136" y="210" width="38" height="24" rx="6" fill="#4A3600" stroke="#F9A825" stroke-width="2"/>
</svg>
