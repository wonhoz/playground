<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="starField" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Star field background -->
  <rect width="512" height="512" fill="url(#starField)"/>

  <!-- Stars -->
  <circle cx="320" cy="70" r="2" fill="#FDE68A" fill-opacity="0.8"/>
  <circle cx="380" cy="100" r="1.5" fill="#EAB308" fill-opacity="0.7"/>
  <circle cx="420" cy="65" r="1" fill="white" fill-opacity="0.6"/>
  <circle cx="460" cy="90" r="1.5" fill="#FDE68A" fill-opacity="0.6"/>
  <circle cx="350" cy="140" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="440" cy="150" r="1.5" fill="#EAB308" fill-opacity="0.5"/>
  <circle cx="490" cy="120" r="1" fill="white" fill-opacity="0.4"/>

  <!-- Archive file icons (stars/targets in telescope view) -->
  <g filter="url(#glow)">
    <!-- Target 1: ZIP file in star field -->
    <circle cx="390" cy="100" r="18" fill="#0f0e02" stroke="#EAB308" stroke-width="2" stroke-opacity="0.8"/>
    <rect x="380" y="92" width="20" height="16" rx="3" fill="#EAB308" fill-opacity="0.2"/>
    <line x1="380" y1="100" x2="400" y2="100" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="390" y1="92" x2="390" y2="108" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Target 2: smaller archive -->
    <circle cx="450" cy="160" r="12" fill="#0f0e02" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.7"/>
    <rect x="443" y="154" width="14" height="12" rx="2" fill="#F59E0B" fill-opacity="0.2"/>
  </g>

  <!-- Telescope barrel (main body) -->
  <!-- Outer barrel section (widest, near eyepiece) -->
  <rect x="40" y="235" width="130" height="42" rx="6" fill="#1a1800" stroke="#EAB308" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Middle section -->
  <rect x="170" y="240" width="100" height="32" rx="5" fill="#151400" stroke="#F59E0B" stroke-width="1.8" stroke-opacity="0.55"/>
  <!-- Objective lens section (narrowest at front) -->
  <rect x="270" y="244" width="130" height="24" rx="4" fill="#121100" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Focus ring details -->
  <rect x="160" y="237" width="18" height="38" rx="3" fill="#2a2500" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="163" y1="245" x2="175" y2="245" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="163" y1="252" x2="175" y2="252" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="163" y1="259" x2="175" y2="259" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="163" y1="266" x2="175" y2="266" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Eyepiece -->
  <rect x="30" y="228" width="22" height="56" rx="6" fill="#2a2500" stroke="#EAB308" stroke-width="2" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Eyepiece lens -->
  <circle cx="41" cy="256" r="14" fill="#0f0e02" stroke="#EAB308" stroke-width="2" filter="url(#glow)"/>
  <circle cx="41" cy="256" r="10" fill="#1a1800"/>
  <circle cx="41" cy="256" r="6" fill="#EAB308" fill-opacity="0.15"/>
  <circle cx="38" cy="252" r="3" fill="white" fill-opacity="0.15"/>

  <!-- Objective lens cap glow -->
  <circle cx="400" cy="256" r="16" fill="#0f0e02" stroke="#EAB308" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="400" cy="256" r="11" fill="#1a1800"/>
  <circle cx="400" cy="256" r="5" fill="#EAB308" fill-opacity="0.2"/>
  <!-- Light rays entering lens -->
  <line x1="415" y1="250" x2="440" y2="245" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="415" y1="256" x2="445" y2="256" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.6" filter="url(#softglow)"/>
  <line x1="415" y1="262" x2="440" y2="267" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Tripod legs -->
  <line x1="200" y1="277" x2="160" y2="400" stroke="#EAB308" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="277" x2="256" y2="430" stroke="#EAB308" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="312" y1="277" x2="352" y2="400" stroke="#EAB308" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Tripod feet -->
  <line x1="145" y1="400" x2="175" y2="400" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="241" y1="430" x2="271" y2="430" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="337" y1="400" x2="367" y2="400" stroke="#EAB308" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Crosshair sight indicator -->
  <line x1="390" y1="75" x2="390" y2="125" stroke="#EAB308" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="365" y1="100" x2="415" y2="100" stroke="#EAB308" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="390" cy="100" r="22" fill="none" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>

  <!-- ZIP label on telescope barrel -->
  <rect x="198" y="246" width="50" height="20" rx="5" fill="#EAB308" fill-opacity="0.15" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="205" y="251" width="36" height="10" rx="5" fill="#EAB308" fill-opacity="0.5"/>
</svg>
