<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card (split view frame) -->
  <rect x="72" y="128" width="880" height="546" rx="48" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <!-- Divider line in center -->
  <line x1="512" y1="144" x2="512" y2="658" stroke="#004D40" stroke-width="8" stroke-dasharray="16,12" opacity="0.5"/>
  <!-- Left pane label badge (raw .md) -->
  <rect x="96" y="152" width="220" height="66" rx="20" fill="#7B1FA2" stroke="#4A148C" stroke-width="12"/>
  <text x="206" y="200" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">.md RAW</text>
  <!-- Left pane: markdown text lines -->
  <text x="122" y="294" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#7B1FA2">##</text>
  <rect x="246" y="264" width="216" height="22" rx="11" fill="#9C27B0" opacity="0.6"/>
  <text x="122" y="382" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#CE93D8">**B**</text>
  <rect x="246" y="354" width="168" height="18" rx="9" fill="#CE93D8" opacity="0.5"/>
  <text x="122" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#E1BEE7">```</text>
  <rect x="246" y="434" width="188" height="18" rx="9" fill="#E1BEE7" opacity="0.5"/>
  <!-- Right pane label badge (rendered) -->
  <rect x="540" y="152" width="320" height="66" rx="20" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="700" y="200" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#004D40" text-anchor="middle">PREVIEW</text>
  <!-- Right pane: rendered HTML elements -->
  <!-- H2 large bold -->
  <text x="540" y="312" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#004D40">Title</text>
  <!-- Bold text line -->
  <rect x="540" y="342" width="296" height="18" rx="9" fill="#00796B" opacity="0.7"/>
  <!-- Normal paragraph lines -->
  <rect x="540" y="376" width="260" height="16" rx="8" fill="#80CBC4" opacity="0.6"/>
  <rect x="540" y="406" width="230" height="16" rx="8" fill="#80CBC4" opacity="0.5"/>
  <rect x="540" y="436" width="248" height="16" rx="8" fill="#80CBC4" opacity="0.4"/>
  <rect x="540" y="466" width="180" height="16" rx="8" fill="#80CBC4" opacity="0.35"/>
  <!-- PREVIEW badge -->
  <rect x="192" y="748" width="640" height="116" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#06D6A0" text-anchor="middle">PREVIEW</text>
</svg>
