<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01tc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background: purple -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01tc)"/>

  <!-- Quiz card -->
  <rect x="120" y="160" width="784" height="700" rx="24" fill="white" opacity="0.97"/>

  <!-- Question area -->
  <rect x="144" y="184" width="736" height="130" rx="16" fill="#F5F3FF"/>
  <text x="512" y="230" font-family="Arial,sans-serif" font-size="24" fill="#374151" text-anchor="middle">태양계에서 가장 큰 행성은?</text>
  <text x="512" y="272" font-family="Arial,sans-serif" font-size="20" fill="#6B7280" text-anchor="middle">Q.7 / 20</text>

  <!-- Timer bar -->
  <rect x="144" y="324" width="736" height="20" rx="6" fill="#E5E7EB"/>
  <rect x="144" y="324" width="460" height="20" rx="6" fill="#F59E0B"/>
  <!-- Timer text -->
  <text x="860" y="339" font-family="Arial Black,Arial" font-size="22" fill="#D97706" text-anchor="middle">9s</text>

  <!-- Answer buttons A, B, C, D -->
  <!-- A: correct (highlighted green on hover) -->
  <rect x="144" y="360" width="340" height="90" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="3"/>
  <circle cx="186" cy="405" r="26" fill="#3B82F6"/>
  <text x="186" y="412" font-family="Arial Black,Arial" font-size="22" fill="white" text-anchor="middle">A</text>
  <text x="360" y="410" font-family="Arial,sans-serif" font-size="22" fill="#1E3A5F" text-anchor="middle">목성</text>

  <!-- B -->
  <rect x="540" y="360" width="340" height="90" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <circle cx="582" cy="405" r="26" fill="#9CA3AF"/>
  <text x="582" y="412" font-family="Arial Black,Arial" font-size="22" fill="white" text-anchor="middle">B</text>
  <text x="756" y="410" font-family="Arial,sans-serif" font-size="22" fill="#374151" text-anchor="middle">토성</text>

  <!-- C -->
  <rect x="144" y="466" width="340" height="90" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <circle cx="186" cy="511" r="26" fill="#9CA3AF"/>
  <text x="186" y="518" font-family="Arial Black,Arial" font-size="22" fill="white" text-anchor="middle">C</text>
  <text x="360" y="516" font-family="Arial,sans-serif" font-size="22" fill="#374151" text-anchor="middle">천왕성</text>

  <!-- D -->
  <rect x="540" y="466" width="340" height="90" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <circle cx="582" cy="511" r="26" fill="#9CA3AF"/>
  <text x="582" y="518" font-family="Arial Black,Arial" font-size="22" fill="white" text-anchor="middle">D</text>
  <text x="756" y="516" font-family="Arial,sans-serif" font-size="22" fill="#374151" text-anchor="middle">해왕성</text>

  <!-- Bottom: score + streak -->
  <rect x="144" y="576" width="736" height="80" rx="14" fill="#F5F3FF"/>
  <!-- Score -->
  <text x="240" y="606" font-family="Arial,sans-serif" font-size="18" fill="#6B7280">점수</text>
  <text x="240" y="638" font-family="Arial Black,Arial" font-size="30" fill="#7C3AED" text-anchor="middle">850</text>
  <!-- Streak -->
  <text x="512" y="606" font-family="Arial,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">스트릭</text>
  <text x="512" y="638" font-family="Arial,sans-serif" font-size="30" fill="#F97316" text-anchor="middle">🔥 5</text>
  <!-- Category -->
  <text x="784" y="606" font-family="Arial,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">카테고리</text>
  <rect x="716" y="618" width="136" height="34" rx="8" fill="#7C3AED"/>
  <text x="784" y="640" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">🔬 과학</text>
</svg>
