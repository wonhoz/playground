<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon border frame -->
  <rect x="60" y="60" width="392" height="392" rx="20" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" opacity="0.7"/>
  <rect x="72" y="72" width="368" height="368" rx="16" fill="#050505"/>
  <!-- Corner accents -->
  <path d="M72,120 L72,72 L120,72" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M392,72 L440,72 L440,120" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M72,392 L72,440 L120,440" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M392,440 L440,440 L440,392" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Title -->
  <text x="256" y="116" text-anchor="middle" fill="#00ffcc" font-size="18" font-family="monospace" filter="url(#glow)">SYSTEM VIEW</text>
  <!-- Spec rows -->
  <rect x="92" y="140" width="328" height="2" fill="#00ffcc" opacity="0.2"/>
  <text x="92" y="172" fill="#00ffcc" font-size="12" font-family="monospace" opacity="0.8">CPU</text>
  <text x="170" y="172" fill="#80fff0" font-size="12" font-family="monospace">Intel Core i9-13900K</text>
  <text x="92" y="204" fill="#00ffcc" font-size="12" font-family="monospace" opacity="0.8">RAM</text>
  <text x="170" y="204" fill="#80fff0" font-size="12" font-family="monospace">32 GB DDR5-5600</text>
  <text x="92" y="236" fill="#00ffcc" font-size="12" font-family="monospace" opacity="0.8">GPU</text>
  <text x="170" y="236" fill="#80fff0" font-size="12" font-family="monospace">NVIDIA RTX 4090</text>
  <text x="92" y="268" fill="#00ffcc" font-size="12" font-family="monospace" opacity="0.8">OS</text>
  <text x="170" y="268" fill="#80fff0" font-size="12" font-family="monospace">Windows 11 Pro</text>
  <rect x="92" y="284" width="328" height="2" fill="#00ffcc" opacity="0.2"/>
  <!-- Progress indicators -->
  <text x="92" y="314" fill="#00ffcc" font-size="11" font-family="monospace" opacity="0.7">USAGE</text>
  <rect x="92" y="322" width="296" height="12" rx="4" fill="#0a2a20"/>
  <rect x="92" y="322" width="200" height="12" rx="4" fill="#00ffcc" opacity="0.6" filter="url(#glow)"/>
  <rect x="92" y="346" width="296" height="12" rx="4" fill="#0a2a20"/>
  <rect x="92" y="346" width="160" height="12" rx="4" fill="#00ddaa" opacity="0.6" filter="url(#glow)"/>
  <rect x="92" y="370" width="296" height="12" rx="4" fill="#0a2a20"/>
  <rect x="92" y="370" width="240" height="12" rx="4" fill="#00bb88" opacity="0.6" filter="url(#glow)"/>
  <!-- Blinking cursor -->
  <rect x="92" y="402" width="8" height="16" rx="1" fill="#00ffcc" opacity="0.9" filter="url(#glow)"/>
</svg>