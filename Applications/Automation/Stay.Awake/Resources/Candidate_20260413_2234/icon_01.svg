<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="110" y="155" width="804" height="510" rx="48" fill="#FFFFFF" stroke="#2C3E50" stroke-width="16"/>
  <!-- Eye shape (lens / vesica piscis) -->
  <path d="M 185,415 Q 350,240 512,230 Q 674,240 839,415 Q 674,592 512,602 Q 350,592 185,415 Z" fill="#FFFDE7" stroke="#2C3E50" stroke-width="16" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="512" cy="415" r="148" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <!-- Iris mid ring -->
  <circle cx="512" cy="415" r="118" fill="#2196F3" stroke="none"/>
  <!-- Pupil -->
  <circle cx="512" cy="415" r="70" fill="#0D0D0D"/>
  <!-- Eye shine -->
  <circle cx="558" cy="376" r="36" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="477" cy="393" r="18" fill="#FFFFFF" opacity="0.65"/>
  <!-- Top eyelashes -->
  <line x1="358" y1="308" x2="336" y2="255" stroke="#2C3E50" stroke-width="14" stroke-linecap="round"/>
  <line x1="445" y1="268" x2="433" y2="213" stroke="#2C3E50" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="252" x2="512" y2="195" stroke="#2C3E50" stroke-width="14" stroke-linecap="round"/>
  <line x1="579" y1="268" x2="591" y2="213" stroke="#2C3E50" stroke-width="14" stroke-linecap="round"/>
  <line x1="666" y1="308" x2="688" y2="255" stroke="#2C3E50" stroke-width="14" stroke-linecap="round"/>
  <!-- AWAKE badge -->
  <rect x="194" y="744" width="636" height="118" rx="36" fill="#FFB300" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#1A1A1A" text-anchor="middle">AWAKE</text>
</svg>
