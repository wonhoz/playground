<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000508"/>
      <stop offset="100%" stop-color="#000a10"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mandelbrot-like fractal with equation overlay -->
  <!-- Colored pixel regions (approximating fractal) -->
  <rect x="60" y="60" width="392" height="330" rx="10" fill="#00050a"/>
  <!-- Fractal regions (color blobs) -->
  <circle cx="256" cy="225" r="80" fill="#0D9488" opacity="0.15"/>
  <circle cx="220" cy="200" r="50" fill="#0891B2" opacity="0.2"/>
  <circle cx="290" cy="200" r="40" fill="#0E7490" opacity="0.2"/>
  <circle cx="256" cy="250" r="30" fill="#06B6D4" opacity="0.25"/>
  <circle cx="256" cy="225" r="10" fill="#67E8F9" opacity="0.5"/>
  <!-- Fractal edge detail lines -->
  <path d="M140,180 Q170,160 200,175 Q220,185 240,170 Q260,155 280,168 Q310,182 340,165 Q360,153 380,170" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <path d="M130,210 Q165,195 195,208 Q225,220 250,205 Q275,190 305,204 Q335,218 365,200 Q390,186 400,200" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
  <!-- Equation overlay -->
  <rect x="60" y="400" width="392" height="80" rx="8" fill="#04080f" stroke="#0891B2" stroke-width="1.5"/>
  <text x="256" y="428" text-anchor="middle" font-family="monospace" font-size="13" fill="#22D3EE">z(n+1) = z(n)² + c</text>
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="10" fill="#0EA5E9">|c| ≤ 2  →  bounded</text>
  <text x="256" y="468" text-anchor="middle" font-family="monospace" font-size="10" fill="#0891B2">|c| → ∞  →  escape</text>
  <!-- Iteration counter visualization -->
  <text x="80" y="350" font-family="monospace" font-size="9" fill="#06B6D4" opacity="0.7">iter: 0</text>
  <text x="140" y="350" font-family="monospace" font-size="9" fill="#22D3EE" opacity="0.7">iter: 5</text>
  <text x="200" y="350" font-family="monospace" font-size="9" fill="#38BDF8" opacity="0.7">iter: 15</text>
  <text x="270" y="350" font-family="monospace" font-size="9" fill="#67E8F9" opacity="0.8">iter: 50</text>
  <text x="350" y="350" font-family="monospace" font-size="9" fill="#BAE6FD" opacity="0.6">iter: ∞</text>
  <!-- Title -->
  <text x="256" y="100" text-anchor="middle" font-family="monospace" font-size="13" fill="#06B6D4" opacity="0.5">FRACTAL CALC</text>
</svg>
