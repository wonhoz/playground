  <polygon points="420,214 452,232 452,268 420,286 388,268 388,232" fill="#BE185D" opacity="0.75"/>
  <!-- 행 4 (페이드) -->
  <polygon points="68,286 100,304 100,340 68,358 36,340 36,304" fill="#F43F5E" opacity="0.4"/>
  <polygon points="132,286 164,304 164,340 132,358 100,340 100,304" fill="#9F1239" opacity="0.45"/>
  <polygon points="196,286 228,304 228,340 196,358 164,340 164,304" fill="#F43F5E" opacity="0.5"/>
