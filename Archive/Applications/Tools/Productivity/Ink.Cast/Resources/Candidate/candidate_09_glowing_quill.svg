<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="quill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="40%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <radialGradient id="inkGlow" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#b388ff60"/>
      <stop offset="100%" stop-color="#b388ff00"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ink glow at base -->
  <ellipse cx="256" cy="400" rx="120" ry="50" fill="url(#inkGlow)"/>
  <!-- Quill feather (large decorative) -->
  <!-- Main feather shaft -->
  <line x1="160" y1="400" x2="380" y2="100" stroke="url(#quill)" stroke-width="4" stroke-linecap="round"/>
  <!-- Feather barbs left side -->
  <path d="M380,100 Q340,130 300,160 Q270,185 250,220 Q240,240 238,270" fill="none" stroke="#fffde7" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M380,100 Q350,140 310,175 Q280,205 258,245 Q248,265 245,295" fill="none" stroke="#fff9c4" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <!-- Feather barbs right side -->
  <path d="M380,100 Q330,120 285,150 Q250,175 230,210 Q218,235 215,265" fill="none" stroke="#fffde7" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- Nib tip glow -->
  <circle cx="160" cy="400" r="15" fill="#b388ff" opacity="0.6"/>
  <circle cx="160" cy="400" r="8" fill="#ea80fc" opacity="0.8"/>
  <!-- Ink trail from nib -->
  <path d="M160,400 Q180,380 200,360 Q220,340 240,300" fill="none" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Written text glow lines (cast output) -->
  <path d="M80,320 Q140,305 200,315 Q240,322 270,310" fill="none" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M80,350 Q150,338 220,345 Q270,350 310,340" fill="none" stroke="#ea80fc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Broadcast rings -->
  <path d="M236,450 Q256,438 276,450" fill="none" stroke="#ea80fc" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M216,468 Q256,450 296,468" fill="none" stroke="#b388ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="256" cy="436" r="5" fill="#ea80fc" opacity="0.9"/>
  <!-- Star sparkles around quill tip -->
  <circle cx="145" cy="395" r="3" fill="white" opacity="0.7"/>
  <circle cx="170" cy="412" r="2" fill="white" opacity="0.6"/>
  <circle cx="152" cy="418" r="2" fill="#ea80fc" opacity="0.8"/>
</svg>
