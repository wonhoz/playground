<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2b0d"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="funnel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multiple log files at top -->
  <rect x="50" y="60" width="64" height="76" rx="8" fill="#1565c0" stroke="#42a5f5" stroke-width="2"/>
  <rect x="134" y="60" width="64" height="76" rx="8" fill="#6a1b9a" stroke="#ab47bc" stroke-width="2"/>
  <rect x="218" y="60" width="64" height="76" rx="8" fill="#b71c1c" stroke="#ef5350" stroke-width="2"/>
  <rect x="302" y="60" width="64" height="76" rx="8" fill="#e65100" stroke="#ff7043" stroke-width="2"/>
  <rect x="386" y="60" width="64" height="76" rx="8" fill="#004d40" stroke="#26a69a" stroke-width="2"/>
  <!-- File contents -->
  <rect x="58" y="76" width="48" height="5" rx="2" fill="#bbdefb"/>
  <rect x="58" y="86" width="40" height="5" rx="2" fill="#bbdefb"/>
  <rect x="142" y="76" width="48" height="5" rx="2" fill="#e1bee7"/>
  <rect x="142" y="86" width="36" height="5" rx="2" fill="#e1bee7"/>
  <rect x="226" y="76" width="48" height="5" rx="2" fill="#ffcdd2"/>
  <rect x="310" y="76" width="48" height="5" rx="2" fill="#ffe0b2"/>
  <rect x="394" y="76" width="48" height="5" rx="2" fill="#b2dfdb"/>
  <!-- Converging lines to funnel -->
  <line x1="82" y1="136" x2="180" y2="210" stroke="#42a5f5" stroke-width="4" stroke-linecap="round"/>
  <line x1="166" y1="136" x2="210" y2="210" stroke="#ab47bc" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="136" x2="256" y2="210" stroke="#ef5350" stroke-width="4" stroke-linecap="round"/>
  <line x1="334" y1="136" x2="300" y2="210" stroke="#ff7043" stroke-width="4" stroke-linecap="round"/>
  <line x1="418" y1="136" x2="330" y2="210" stroke="#26a69a" stroke-width="4" stroke-linecap="round"/>
  <!-- Funnel -->
  <path d="M130 210 L256 360 L382 210 Z" fill="url(#funnel)" stroke="#a5d6a7" stroke-width="3"/>
  <!-- Output -->
  <rect x="228" y="360" width="56" height="16" rx="8" fill="#a5d6a7"/>
  <rect x="218" y="376" width="76" height="76" rx="10" fill="#2e7d32" stroke="#66bb6a" stroke-width="3"/>
  <!-- Merged file contents -->
  <rect x="226" y="390" width="60" height="6" rx="3" fill="#42a5f5"/>
  <rect x="226" y="402" width="60" height="6" rx="3" fill="#ab47bc"/>
  <rect x="226" y="414" width="60" height="6" rx="3" fill="#ef5350"/>
  <rect x="226" y="426" width="60" height="6" rx="3" fill="#ff7043"/>
  <rect x="226" y="438" width="60" height="6" rx="3" fill="#26a69a"/>
</svg>
