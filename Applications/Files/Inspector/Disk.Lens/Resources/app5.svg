<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF59D"/>
    </linearGradient>
    <linearGradient id="hdd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 밝은 노랑 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg4)"/>

  <!-- Layer 2: HDD (하드디스크) -->
  <!-- HDD 케이스 -->
  <rect x="180" y="300" width="560" height="360" rx="30" fill="url(#hdd)" stroke="#B0BEC5" stroke-width="10"/>
  <!-- HDD 라벨 -->
  <rect x="220" y="340" width="320" height="180" rx="16" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="4"/>
  <text x="380" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="40" fill="#37474F" text-anchor="middle" dominant-baseline="middle">HDD</text>
  <text x="380" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#546E7A" text-anchor="middle" dominant-baseline="middle">1.0 TB</text>
  <text x="380" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#90A4AE" text-anchor="middle" dominant-baseline="middle">SATA III</text>
  <!-- HDD 용량 바 (내부) -->
  <rect x="220" y="540" width="320" height="50" rx="12" fill="#CFD8DC"/>
  <rect x="220" y="540" width="230" height="50" rx="12" fill="#1565C0"/>
  <text x="320" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">72%</text>
  <!-- HDD 오른쪽 커넥터 -->
  <rect x="588" y="360" width="104" height="60" rx="8" fill="#546E7A"/>
  <rect x="588" y="450" width="104" height="40" rx="8" fill="#455A64"/>
  <!-- HDD 나사 -->
  <circle cx="220" cy="320" r="16" fill="#90A4AE"/>
  <circle cx="720" cy="320" r="16" fill="#90A4AE"/>
  <circle cx="220" cy="640" r="16" fill="#90A4AE"/>
  <circle cx="720" cy="640" r="16" fill="#90A4AE"/>

  <!-- Layer 3: 돋보기 (렌즈) -->
  <circle cx="750" cy="750" r="170" fill="white" opacity="0.9"/>
  <!-- 트리맵 미리보기 (렌즈 안) -->
  <rect x="620" y="620" width="100" height="100" rx="10" fill="#EF5350" opacity="0.9"/>
  <rect x="730" y="620" width="80" height="100" rx="10" fill="#42A5F5" opacity="0.9"/>
  <rect x="620" y="730" width="70" height="60" rx="8" fill="#66BB6A" opacity="0.9"/>
  <rect x="700" y="730" width="110" height="60" rx="8" fill="#AB47BC" opacity="0.9"/>
  <circle cx="750" cy="750" r="170" fill="none" stroke="#FF8F00" stroke-width="28"/>
  <!-- 손잡이 -->
  <line x1="877" y1="877" x2="960" y2="960" stroke="#E65100" stroke-width="42" stroke-linecap="round"/>
</svg>
