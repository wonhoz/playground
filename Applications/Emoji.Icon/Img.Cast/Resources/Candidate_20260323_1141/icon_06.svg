<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#ECEFF1"/>
  <!-- Layer 2: Diagonal stream of format icons -->
  <!-- SVG icon (top left) -->
  <rect x="120" y="160" width="200" height="200" rx="20" fill="#1565C0"/>
  <text x="220" y="278" font-family="Arial" font-size="52" font-weight="bold" fill="white" text-anchor="middle">SVG</text>
  <!-- Arrow 1 -->
  <line x1="335" y1="345" x2="450" y2="440" stroke="#1976D2" stroke-width="32" stroke-linecap="round"/>
  <polygon points="390,480 500,470 440,370" fill="#1976D2"/>
  <!-- PNG icon (center) -->
  <rect x="412" y="412" width="200" height="200" rx="20" fill="#2E7D32"/>
  <text x="512" y="530" font-family="Arial" font-size="52" font-weight="bold" fill="white" text-anchor="middle">PNG</text>
  <!-- Arrow 2 -->
  <line x1="627" y1="597" x2="742" y2="692" stroke="#388E3C" stroke-width="32" stroke-linecap="round"/>
  <polygon points="682,732 792,722 732,622" fill="#388E3C"/>
  <!-- ICO icon (bottom right) -->
  <rect x="704" y="664" width="200" height="200" rx="20" fill="#E65100"/>
  <text x="804" y="782" font-family="Arial" font-size="52" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
</svg>