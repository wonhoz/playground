<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <clipPath id="c02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background — deep navy -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: Stacked source file cards (left side, fanned out) -->
  <!-- Card 3 (back, BMP, rotated +12°) -->
  <g transform="rotate(12, 228, 512)" clip-path="url(#c02)">
    <rect x="118" y="368" width="220" height="288" rx="18" fill="#DC2626"/>
    <text x="228" y="526" text-anchor="middle"
          font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="white" opacity="0.85">BMP</text>
  </g>
  <!-- Card 2 (middle, JPG, rotated +6°) -->
  <g transform="rotate(6, 228, 512)" clip-path="url(#c02)">
    <rect x="118" y="368" width="220" height="288" rx="18" fill="#16A34A"/>
    <text x="228" y="526" text-anchor="middle"
          font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="white" opacity="0.9">JPG</text>
  </g>
  <!-- Card 1 (front, SVG, upright) -->
  <rect x="118" y="368" width="220" height="288" rx="18" fill="#0891B2"/>
  <text x="228" y="526" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="white">SVG</text>

  <!-- Layer 3: Arrow + ICO result card -->
  <!-- Arrow shaft -->
  <rect x="378" y="494" width="168" height="36" rx="18" fill="white" opacity="0.9"/>
  <!-- Arrow head -->
  <path d="M524,446 L606,512 L524,578"
        fill="none" stroke="white" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ICO result card (larger, amber glow) -->
  <rect x="630" y="340" width="276" height="344" rx="24" fill="#D97706"/>
  <rect x="646" y="356" width="244" height="312" rx="16" fill="#FCD34D" opacity="0.2"/>
  <text x="768" y="536" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="86" font-weight="900" fill="white">ICO</text>
  <!-- Multi-resolution size dots inside ICO card -->
  <rect x="656" y="568" width="52" height="52" rx="8" fill="white" opacity="0.55"/>
  <rect x="724" y="574" width="40" height="40" rx="6" fill="white" opacity="0.4"/>
  <rect x="782" y="580" width="30" height="30" rx="5" fill="white" opacity="0.28"/>
  <rect x="830" y="584" width="22" height="22" rx="4" fill="white" opacity="0.18"/>
</svg>
