  <circle cx="156" cy="196" r="22" fill="#0c2830" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="156" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#06B6D4">type</text>
  <!-- Level 2 value nodes (outer ring, smaller) -->
  <circle cx="256" cy="90" r="16" fill="#041820" stroke="#0891B2" stroke-width="1.5"/>
  <text x="256" y="94" text-anchor="middle" font-family="monospace" font-size="7" fill="#22D3EE">"JSON"</text>
