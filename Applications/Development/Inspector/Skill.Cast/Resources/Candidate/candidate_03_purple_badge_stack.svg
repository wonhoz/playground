<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#1a0035"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ab47bc"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e57c2"/>
      <stop offset="100%" stop-color="#311b92"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Badge stack (3D perspective) -->
  <!-- Back badge -->
  <rect x="126" y="196" width="260" height="150" rx="16" fill="url(#b3)" opacity="0.6"/>
  <!-- Mid badge -->
  <rect x="116" y="178" width="260" height="150" rx="16" fill="url(#b2)" opacity="0.8"/>
  <!-- Front badge -->
  <rect x="106" y="160" width="260" height="150" rx="16" fill="url(#b1)"/>
  <!-- Badge content -->
  <circle cx="156" cy="235" r="30" fill="#311b92" stroke="#ce93d8" stroke-width="2"/>
  <text x="156" y="242" font-family="monospace" font-size="20" fill="#ce93d8" text-anchor="middle" font-weight="bold">⬡</text>
  <text x="216" y="218" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">C# Expert</text>
  <rect x="216" y="228" width="110" height="8" rx="4" fill="#1a0035" opacity="0.5"/>
  <rect x="216" y="228" width="90" height="8" rx="4" fill="#fce4ec"/>
  <text x="216" y="252" font-family="sans-serif" font-size="13" fill="#e1bee7">Level 8 · 2400 XP</text>
  <text x="216" y="272" font-family="sans-serif" font-size="12" fill="#ce93d8" opacity="0.8">.NET · WPF · ASP.NET</text>
  <!-- Stars below -->
  <text x="216" y="296" font-family="sans-serif" font-size="16" fill="#ffd600">★★★★☆</text>
  <!-- Bottom badges peaking out -->
  <text x="236" y="360" font-family="monospace" font-size="12" fill="#9fa8da" text-anchor="middle">+ 12 more skills</text>
  <!-- Cast icon top right -->
  <path d="M362 90 Q380 78 398 90" stroke="#ce93d8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M352 100 Q380 82 408 100" stroke="#ce93d8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <circle cx="380" cy="108" r="7" fill="#ab47bc"/>
</svg>
