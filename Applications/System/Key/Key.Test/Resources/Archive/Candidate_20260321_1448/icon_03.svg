  <rect x="220" y="678" width="590" height="68" rx="14" fill="#E8F5E9" stroke="#81C784" stroke-width="3"/>
  <text x="515" y="706" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#2E7D32">키보드 진단 중...</text>
  <text x="515" y="730" text-anchor="middle" font-family="Consolas,monospace" font-size="15" fill="#4CAF50">[U] 채터링 감지  |  23ms</text>
