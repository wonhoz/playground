<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001933"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <radialGradient id="splash" cx="50%" cy="100%">
      <stop offset="0%" stop-color="#E1F5FE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0288D1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Waterfall stream -->
  <path d="M 210 80 Q 220 150 226 220 Q 232 290 240 380" stroke="url(#water)" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 256 80 Q 256 160 256 240 Q 256 300 256 380" stroke="url(#water)" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 302 80 Q 292 150 286 220 Q 280 290 272 380" stroke="url(#water)" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Pool at bottom -->
  <ellipse cx="256" cy="410" rx="160" ry="40" fill="url(#pool)" opacity="0.85"/>
  <ellipse cx="256" cy="410" rx="160" ry="40" fill="url(#splash)"/>
  <!-- Water droplets -->
  <g fill="url(#water)" opacity="0.7">
    <ellipse cx="200" cy="300" rx="8" ry="12"/>
    <ellipse cx="315" cy="280" rx="7" ry="11"/>
    <ellipse cx="190" cy="200" rx="6" ry="9"/>
    <ellipse cx="325" cy="200" rx="6" ry="9"/>
  </g>
  <!-- Top source -->
  <rect x="196" y="70" width="120" height="20" rx="10" fill="url(#water)" opacity="0.9"/>
</svg>
