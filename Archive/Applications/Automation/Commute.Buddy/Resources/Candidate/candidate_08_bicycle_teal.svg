<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bicycle -->
  <!-- Rear wheel -->
  <circle cx="168" cy="320" r="95" fill="none" stroke="#80CBC4" stroke-width="8"/>
  <circle cx="168" cy="320" r="14" fill="#80CBC4"/>
  <!-- Spokes rear -->
  <line x1="168" y1="225" x2="168" y2="415" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="73" y1="320" x2="263" y2="320" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="101" y1="252" x2="235" y2="388" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="235" y1="252" x2="101" y2="388" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <!-- Front wheel -->
  <circle cx="344" cy="320" r="95" fill="none" stroke="#80CBC4" stroke-width="8"/>
  <circle cx="344" cy="320" r="14" fill="#80CBC4"/>
  <!-- Spokes front -->
  <line x1="344" y1="225" x2="344" y2="415" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="249" y1="320" x2="439" y2="320" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="277" y1="252" x2="411" y2="388" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <line x1="411" y1="252" x2="277" y2="388" stroke="#80CBC4" stroke-width="3" opacity="0.5"/>
  <!-- Frame -->
  <line x1="168" y1="320" x2="256" y2="200" stroke="#E0F2F1" stroke-width="9" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="344" y2="320" stroke="#E0F2F1" stroke-width="9" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="226" y2="280" stroke="#E0F2F1" stroke-width="9" stroke-linecap="round"/>
  <line x1="226" y1="280" x2="168" y2="320" stroke="#E0F2F1" stroke-width="9" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="226" y1="280" x2="210" y2="220" stroke="#B2DFDB" stroke-width="7" stroke-linecap="round"/>
  <rect x="188" y="212" width="44" height="12" rx="6" fill="#B2DFDB"/>
  <!-- Handlebar -->
  <line x1="344" y1="200" x2="256" y2="200" stroke="#B2DFDB" stroke-width="7" stroke-linecap="round"/>
  <line x1="344" y1="200" x2="344" y2="240" stroke="#B2DFDB" stroke-width="7" stroke-linecap="round"/>
  <line x1="325" y1="240" x2="363" y2="240" stroke="#80CBC4" stroke-width="10" stroke-linecap="round"/>
  <!-- Pedal -->
  <circle cx="226" cy="280" r="14" fill="#004D40" stroke="#80CBC4" stroke-width="4"/>
  <line x1="208" y1="280" x2="244" y2="280" stroke="#80CBC4" stroke-width="5" stroke-linecap="round"/>
  <!-- Timer -->
  <rect x="370" y="80" width="102" height="60" rx="16" fill="#004D40" stroke="#80CBC4" stroke-width="3"/>
  <text x="421" y="103" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#80CBC4">TIME</text>
  <text x="421" y="127" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="22" font-weight="bold" fill="white">22:15</text>
</svg>
