<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c2-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A5E"/>
      <stop offset="100%" stop-color="#0D1A3A"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c2-clip)">
    <!-- Background: deep navy -->
    <rect width="1024" height="1024" fill="url(#c2-bg)"/>

    <!-- Monitor body -->
    <rect x="200" y="220" width="624" height="420" rx="28" fill="#253366" stroke="#3A4E8C" stroke-width="8"/>
    <!-- Monitor screen inner -->
    <rect x="232" y="252" width="560" height="356" rx="16" fill="#0D1228"/>
    <!-- Screen shine -->
    <rect x="248" y="268" width="200" height="80" rx="10" fill="#FFFFFF" opacity="0.05"/>

    <!-- Screen content: "CLEAN" progress bar -->
    <rect x="290" y="370" width="444" height="18" rx="9" fill="#1A2550"/>
    <rect x="290" y="370" width="380" height="18" rx="9" fill="#4A90D9"/>
    <!-- Progress label -->
    <rect x="290" y="330" width="80" height="16" rx="4" fill="#3A5080" opacity="0.8"/>
    <rect x="390" y="330" width="120" height="16" rx="4" fill="#3A5080" opacity="0.6"/>
    <rect x="530" y="330" width="60" height="16" rx="4" fill="#3A5080" opacity="0.4"/>
    <!-- Small file rows -->
    <rect x="290" y="426" width="200" height="12" rx="3" fill="#2A3E6A" opacity="0.8"/>
    <rect x="290" y="450" width="300" height="12" rx="3" fill="#2A3E6A" opacity="0.6"/>
    <rect x="290" y="474" width="150" height="12" rx="3" fill="#2A3E6A" opacity="0.5"/>

    <!-- Gold checkmark circle overlay (bottom-right of screen) -->
    <circle cx="660" cy="430" r="80" fill="#1A2A4A" stroke="#FFD700" stroke-width="10"/>
    <!-- Checkmark -->
    <polyline points="624,430 650,458 700,398"
              fill="none" stroke="#FFD700" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Monitor stand -->
    <rect x="480" y="640" width="64" height="80" rx="6" fill="#253366"/>
    <rect x="380" y="720" width="264" height="28" rx="10" fill="#1E2B56"/>

    <!-- Sparkle top-right corner -->
    <circle cx="800" cy="240" r="8" fill="#FFD700" opacity="0.9"/>
    <line x1="800" y1="218" x2="800" y2="262" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="778" y1="240" x2="822" y2="240" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <circle cx="840" cy="280" r="5" fill="#FFD700" opacity="0.6"/>
    <circle cx="775" cy="270" r="4" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
