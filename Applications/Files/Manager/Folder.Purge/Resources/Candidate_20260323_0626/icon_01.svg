<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 빗자루 + 낙엽 쓸어내기 | 공간/장면 | #1A0800 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0800"/>
  <!-- Layer 2: Broom sweeping folders -->
  <!-- Floor line -->
  <line x1="160" y1="780" x2="864" y2="780" stroke="#3A1A00" stroke-width="6" stroke-linecap="round"/>
  <!-- Broom handle -->
  <line x1="600" y1="220" x2="420" y2="740" stroke="#8B4513" stroke-width="18" stroke-linecap="round"/>
  <!-- Broom head -->
  <ellipse cx="388" cy="752" rx="100" ry="24" fill="#D97706" transform="rotate(-15 388 752)"/>
  <line x1="310" y1="740" x2="350" y2="780" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="330" y1="738" x2="370" y2="780" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="352" y1="736" x2="390" y2="775" stroke="#92400E" stroke-width="8" stroke-linecap="round"/>
  <line x1="374" y1="736" x2="408" y2="775" stroke="#92400E" stroke-width="8" stroke-linecap="round"/>
  <line x1="396" y1="736" x2="426" y2="775" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="416" y1="738" x2="444" y2="778" stroke="#B45309" stroke-width="8" stroke-linecap="round"/>
  <line x1="436" y1="742" x2="462" y2="782" stroke="#D97706" stroke-width="8" stroke-linecap="round"/>
  <!-- Swept folders (flying away to left) -->
  <!-- Folder 1 -->
  <path d="M160 640 Q170 630 196 630 L196 620 Q196 614 210 614 L280 614 Q294 614 294 620 L294 700 Q294 706 280 706 L170 706 Q156 706 156 700 Z" fill="#FBBF24" opacity="0.7" transform="rotate(-20 230 660)"/>
  <!-- Folder 2 -->
  <path d="M220 700 Q230 690 256 690 L256 680 Q256 674 270 674 L340 674 Q354 674 354 680 L354 760 Q354 766 340 766 L230 766 Q216 766 216 760 Z" fill="#F87171" opacity="0.6" transform="rotate(-30 290 720)"/>
  <!-- Folder 3 -->
  <path d="M100 720 Q110 710 136 710 L136 700 Q136 694 150 694 L220 694 Q234 694 234 700 L234 780 Q234 786 220 786 L110 786 Q96 786 96 780 Z" fill="#60A5FA" opacity="0.5" transform="rotate(-10 165 740)"/>
  <!-- Layer 3: Dust particles -->
  <circle cx="240" cy="680" r="5" fill="#FCD34D" opacity="0.6"/>
  <circle cx="180" cy="650" r="4" fill="#FCD34D" opacity="0.5"/>
  <circle cx="300" cy="660" r="6" fill="#FCD34D" opacity="0.4"/>
  <circle cx="140" cy="700" r="3" fill="#FCD34D" opacity="0.5"/>
  <circle cx="260" cy="720" r="4" fill="#FCD34D" opacity="0.3"/>
</svg>
