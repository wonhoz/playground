<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04dl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 민트/시안 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04dl)"/>
  <!-- 배경 물결 장식 -->
  <ellipse cx="512" cy="1024" rx="600" ry="300" fill="rgba(255,255,255,0.08)"/>

  <!-- Layer 2: 크기별 쌓인 폴더들 -->

  <!-- 폴더 3: 가장 작은 (맨 위) — 노랑 -->
  <rect x="362" y="140" width="300" height="34" rx="12" fill="#FCD34D"/>
  <rect x="342" y="160" width="340" height="170" rx="14" fill="#FBBF24"/>
  <!-- 폴더 탭 -->
  <path d="M 362,160 L 432,160 L 460,140 L 682,140 L 682,160" fill="#FCD34D"/>
  <!-- 폴더 내용 표시 -->
  <text x="512" y="264" text-anchor="middle" font-family="Segoe UI" font-size="36"
        font-weight="bold" fill="#92400E">Games / 18.5 GB</text>

  <!-- 폴더 2: 중간 크기 — 보라 -->
  <rect x="292" y="342" width="440" height="34" rx="12" fill="#C4B5FD"/>
  <rect x="272" y="362" width="480" height="200" rx="14" fill="#8B5CF6"/>
  <!-- 폴더 탭 -->
  <path d="M 292,362 L 392,362 L 422,342 L 712,342 L 712,362" fill="#C4B5FD"/>
  <text x="512" y="476" text-anchor="middle" font-family="Segoe UI" font-size="40"
        font-weight="bold" fill="white">Users / 28.3 GB</text>

  <!-- 폴더 1: 가장 큰 (맨 아래) — 파랑 -->
  <rect x="212" y="584" width="600" height="38" rx="12" fill="#93C5FD"/>
  <rect x="192" y="608" width="640" height="240" rx="14" fill="#3B82F6"/>
  <!-- 폴더 탭 -->
  <path d="M 212,608 L 362,608 L 402,584 L 792,584 L 792,608" fill="#93C5FD"/>
  <text x="512" y="738" text-anchor="middle" font-family="Segoe UI" font-size="44"
        font-weight="bold" fill="white">Windows / 42.8 GB</text>

  <!-- Layer 3: 크기 비교 바 그래프 (우측) -->
  <!-- 바 그래프 배경 -->
  <rect x="860" y="140" width="20" height="706" rx="10" fill="rgba(255,255,255,0.20)"/>
  <!-- 각 폴더 크기 표시 막대 -->
  <rect x="856" y="494" width="28" height="352" rx="10" fill="rgba(255,255,255,0.50)"/>
  <!-- 라벨 -->
  <text x="900" y="674" font-family="Segoe UI" font-size="24" fill="white" opacity="0.8">43G</text>

  <!-- 하단 텍스트 -->
  <text x="512" y="908" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="58" font-weight="bold" fill="white">크기별 폴더 분석</text>
</svg>
