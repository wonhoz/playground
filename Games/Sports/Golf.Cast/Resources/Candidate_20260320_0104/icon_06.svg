<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 낚싯대 캐스팅: 골프+낚시 혼합 -->
  <!-- fishing rod / golf club hybrid shaft -->
  <path d="M260 760 Q380 600 520 380 Q580 300 620 260" fill="none" stroke="#81C784" stroke-width="14" stroke-linecap="round"/>
  <!-- rod tip flex curve -->
  <path d="M620 260 Q660 230 680 200" fill="none" stroke="#81C784" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- fishing line arc (like shot trajectory) -->
  <path d="M680 200 Q820 350 760 620" fill="none" stroke="#388E3C" stroke-width="5" stroke-dasharray="12 8" stroke-linecap="round" opacity="0.8"/>
  <!-- golf ball as "lure" at end of line -->
  <circle cx="760" cy="634" r="46" fill="#81C784"/>
  <circle cx="748" cy="622" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="768" cy="622" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="752" cy="642" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="772" cy="644" r="6" fill="#388E3C" opacity="0.5"/>
  <!-- handle grip -->
  <rect x="226" y="740" width="80" height="26" rx="13" fill="#388E3C" transform="rotate(-36 266 753)"/>
  <!-- water ripple at ball -->
  <ellipse cx="760" cy="680" rx="70" ry="20" fill="none" stroke="#81C784" stroke-width="4" opacity="0.4"/>
  <ellipse cx="760" cy="680" rx="110" ry="30" fill="none" stroke="#81C784" stroke-width="3" opacity="0.25"/>
</svg>
