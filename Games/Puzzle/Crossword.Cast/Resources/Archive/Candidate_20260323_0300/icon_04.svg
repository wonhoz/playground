<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 단어 채우기 (글자 입력 중) | 기하학 | #0D2137 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#070F1A"/>
  <!-- Layer 2: Large single word being entered across cells -->
  <!-- 6 cells in a row (word: 한글퀴즈) -->
  <rect x="120" y="360" width="130" height="130" rx="12" fill="#0F1E30" stroke="#2563EB" stroke-width="4"/>
  <text x="185" y="444" font-family="Arial,sans-serif" font-size="64" fill="#93C5FD" text-anchor="middle" font-weight="bold">한</text>
  <text x="138" y="385" font-family="Arial,sans-serif" font-size="16" fill="#3B82F6">1</text>
  <rect x="270" y="360" width="130" height="130" rx="12" fill="#0F1E30" stroke="#2563EB" stroke-width="4"/>
  <text x="335" y="444" font-family="Arial,sans-serif" font-size="64" fill="#93C5FD" text-anchor="middle" font-weight="bold">글</text>
  <rect x="420" y="360" width="130" height="130" rx="12" fill="#0F1E30" stroke="#2563EB" stroke-width="4"/>
  <text x="485" y="444" font-family="Arial,sans-serif" font-size="64" fill="#93C5FD" text-anchor="middle" font-weight="bold">퀴</text>
  <rect x="570" y="360" width="130" height="130" rx="12" fill="#1E3A8A" stroke="#3B82F6" stroke-width="5"/>
  <text x="635" y="444" font-family="Arial,sans-serif" font-size="64" fill="#DBEAFE" text-anchor="middle" font-weight="bold">즈</text>
  <!-- Active cell (being typed) -->
  <rect x="720" y="360" width="130" height="130" rx="12" fill="#172554" stroke="#60A5FA" stroke-width="5"/>
  <text x="785" y="440" font-family="Arial,sans-serif" font-size="64" fill="#60A5FA" text-anchor="middle" opacity="0.5">_</text>
  <!-- Cursor blink -->
  <rect x="780" y="388" width="8" height="80" rx="3" fill="#60A5FA" opacity="0.9"/>
  <rect x="870" y="360" width="130" height="130" rx="12" fill="#0F1E30" stroke="#1E3A8A" stroke-width="2"/>
  <!-- Layer 3: Hint below -->
  <rect x="120" y="540" width="880" height="80" rx="14" fill="#0F1E30" stroke="#1E3A8A" stroke-width="2"/>
  <text x="148" y="560" font-family="Arial,sans-serif" font-size="16" fill="#3B82F6">→ 1번</text>
  <text x="200" y="590" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">낱말 게임의 한 종류 (5자)</text>
  <!-- Progress indicator -->
  <rect x="120" y="660" width="880" height="20" rx="10" fill="#172554"/>
  <rect x="120" y="660" width="528" height="20" rx="10" fill="#2563EB"/>
  <text x="512" y="730" font-family="Arial,sans-serif" font-size="18" fill="#60A5FA" text-anchor="middle">4/5 입력됨</text>
</svg>
