<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="60%" stop-color="#0A1010"/>
      <stop offset="100%" stop-color="#041408"/>
    </linearGradient>
    <linearGradient id="windmill_body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC5500"/>
      <stop offset="100%" stop-color="#FF8822"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF9944"/>
    </linearGradient>
    <linearGradient id="grass3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#007722"/>
      <stop offset="100%" stop-color="#003311"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="60" y="400" width="392" height="72" rx="0" fill="url(#grass3)"/>
  <!-- Mini golf course path -->
  <rect x="80" y="380" width="352" height="30" rx="6" fill="#005511" opacity="0.8"/>
  <!-- Windmill tower -->
  <rect x="220" y="200" width="72" height="200" rx="6" fill="url(#windmill_body)"/>
  <!-- Windmill door -->
  <rect x="242" y="340" width="28" height="60" rx="4" fill="#882200"/>
  <!-- Windmill window -->
  <rect x="238" y="250" width="36" height="30" rx="4" fill="#FFCC88" opacity="0.6"/>
  <!-- Windmill center hub -->
  <circle cx="256" cy="210" r="18" fill="#FF6600"/>
  <!-- Windmill blades (4 blades rotated) -->
  <rect x="246" y="130" width="20" height="80" rx="5" fill="url(#blade)" transform="rotate(0 256 210)"/>
  <rect x="246" y="130" width="20" height="80" rx="5" fill="url(#blade)" transform="rotate(90 256 210)"/>
  <rect x="246" y="130" width="20" height="80" rx="5" fill="url(#blade)" transform="rotate(45 256 210)" opacity="0.7"/>
  <rect x="246" y="130" width="20" height="80" rx="5" fill="url(#blade)" transform="rotate(135 256 210)" opacity="0.7"/>
  <!-- Golf ball -->
  <circle cx="120" cy="388" r="16" fill="white"/>
  <circle cx="114" cy="383" r="3.5" fill="#EEEEEE" opacity="0.5"/>
  <circle cx="122" cy="381" r="3" fill="#EEEEEE" opacity="0.5"/>
  <!-- Flag far right -->
  <line x1="390" y1="380" x2="390" y2="340" stroke="#CCCCCC" stroke-width="3"/>
  <polygon points="390,340 414,350 390,360" fill="#FF2222"/>
  <ellipse cx="390" cy="381" rx="14" ry="6" fill="#003311"/>
</svg>
