<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main clipboard body -->
  <rect x="130" y="155" width="252" height="300" rx="16" fill="#6A1B9A" stroke="#CE93D8" stroke-width="2"/>
  <!-- Clip bar -->
  <rect x="130" y="155" width="252" height="48" rx="16" fill="url(#panel)"/>
  <rect x="130" y="179" width="252" height="24" fill="url(#panel)"/>
  <rect x="210" y="135" width="92" height="42" rx="10" fill="#8E24AA"/>
  <rect x="224" y="144" width="64" height="24" rx="5" fill="#4A148C"/>
  <!-- History rows -->
  <rect x="150" y="230" width="212" height="38" rx="8" fill="#7B1FA2" opacity="0.8"/>
  <rect x="150" y="278" width="212" height="38" rx="8" fill="#6A1B9A" opacity="0.9"/>
  <rect x="150" y="326" width="212" height="38" rx="8" fill="#5E1090" opacity="0.8"/>
  <rect x="150" y="374" width="212" height="38" rx="8" fill="#4A148C" opacity="0.7"/>
  <!-- Row text lines -->
  <rect x="165" y="244" width="110" height="10" rx="3" fill="#E1BEE7"/>
  <rect x="165" y="292" width="90" height="10" rx="3" fill="#E1BEE7" opacity="0.85"/>
  <rect x="165" y="340" width="100" height="10" rx="3" fill="#E1BEE7" opacity="0.7"/>
  <rect x="165" y="388" width="80" height="10" rx="3" fill="#E1BEE7" opacity="0.55"/>
  <!-- Clock icon -->
  <circle cx="350" cy="244" r="14" fill="none" stroke="#CE93D8" stroke-width="3"/>
  <line x1="350" y1="234" x2="350" y2="244" stroke="#CE93D8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="350" y1="244" x2="358" y2="250" stroke="#CE93D8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
