<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 에디터 -->
  <rect x="40" y="60" width="430" height="380" rx="16" fill="#1E1E2E"/>
  <rect x="40" y="60" width="430" height="36" rx="16" fill="#2A2A3E"/>
  <text x="256" y="84" font-size="15" text-anchor="middle" fill="#888888" font-family="Segoe UI">JSON Formatter</text>
  <!-- 큰 중괄호 심볼 -->
  <text x="256" y="340" font-size="260" text-anchor="middle" fill="#2A2A3E" font-family="Courier New" font-weight="bold">{}</text>
  <!-- 구문강조 라인들 -->
  <text x="70" y="140" font-size="18" fill="#89DDFF" font-family="Courier New">{</text>
  <text x="90" y="170" font-size="16" fill="#F07178" font-family="Courier New">"key"</text>
  <text x="160" y="170" font-size="16" fill="#89DDFF" font-family="Courier New">:</text>
  <text x="176" y="170" font-size="16" fill="#C3E88D" font-family="Courier New">"value"</text>
  <text x="90" y="200" font-size="16" fill="#F07178" font-family="Courier New">"num"</text>
  <text x="160" y="200" font-size="16" fill="#89DDFF" font-family="Courier New">:</text>
  <text x="176" y="200" font-size="16" fill="#F78C6C" font-family="Courier New">42</text>
  <text x="90" y="230" font-size="16" fill="#F07178" font-family="Courier New">"arr"</text>
  <text x="160" y="230" font-size="16" fill="#89DDFF" font-family="Courier New">:</text>
  <text x="176" y="230" font-size="16" fill="#89DDFF" font-family="Courier New">[ ... ]</text>
  <text x="70" y="260" font-size="18" fill="#89DDFF" font-family="Courier New">}</text>
</svg>