<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moltenGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#7F1D1D"/>
  <!-- Glow -->
  <ellipse cx="512" cy="400" rx="350" ry="300" fill="url(#moltenGlow)"/>
  <!-- Layer 2: ICO mold shape at bottom -->
  <!-- Mold outer -->
  <rect x="280" y="600" width="464" height="260" rx="24" fill="#B45309" stroke="#78350F" stroke-width="8"/>
  <!-- Mold inner (cavity) -->
  <rect x="308" y="628" width="408" height="204" rx="14" fill="#7F1D1D"/>
  <!-- ICO text forming inside mold -->
  <text x="512" y="760" font-family="Arial,sans-serif" font-size="90" fill="#F97316" text-anchor="middle" font-weight="900" opacity="0.9">ICO</text>
  <!-- Molten liquid pouring from above -->
  <!-- Pour stream -->
  <path d="M 460 220 Q 450 380 420 490 Q 460 560 512 580 Q 564 560 604 490 Q 574 380 564 220 Z" fill="#F97316" opacity="0.8"/>
  <!-- Stream highlight -->
  <path d="M 490 220 Q 488 380 480 480 Q 500 530 512 535 Q 524 530 544 480 Q 536 380 534 220 Z" fill="#FED7AA" opacity="0.5"/>
  <!-- Layer 3: Drip drops -->
  <ellipse cx="430" cy="600" rx="20" ry="28" fill="#F97316" opacity="0.7"/>
  <ellipse cx="594" cy="600" rx="20" ry="28" fill="#F97316" opacity="0.7"/>
  <circle cx="470" cy="570" r="12" fill="#FED7AA" opacity="0.5"/>
  <!-- Sparks -->
  <circle cx="380" cy="450" r="8" fill="#FDE047" opacity="0.8"/>
  <circle cx="640" cy="420" r="10" fill="#FDE047" opacity="0.75"/>
  <circle cx="350" cy="500" r="6" fill="#FDE047" opacity="0.6"/>
</svg>