<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#134E4A"/>
  <!-- Layer 2: Character set selection panel -->
  <rect x="130" y="200" width="764" height="580" rx="22" fill="#0F3D38"/>
  <!-- Panel header -->
  <rect x="130" y="200" width="764" height="58" rx="22" fill="#0D9488"/>
  <rect x="130" y="238" width="764" height="20" fill="#0D9488"/>
  <text x="512" y="237" font-family="Arial,sans-serif" font-size="20" fill="#CCFBF1" text-anchor="middle" font-weight="bold">문자셋 선택</text>
  <!-- Option 1: ASCII (selected) -->
  <rect x="165" y="286" width="695" height="88" rx="14" fill="#0D9488" opacity="0.8"/>
  <rect x="185" y="304" width="36" height="36" rx="6" fill="#2DD4BF"/>
  <text x="203" y="327" font-family="Arial,sans-serif" font-size="22" fill="#0F3D38" text-anchor="middle" font-weight="bold">✓</text>
  <text x="248" y="320" font-family="Arial,sans-serif" font-size="20" fill="#CCFBF1" font-weight="bold">ASCII</text>
  <text x="248" y="346" font-family="Consolas,monospace" font-size="16" fill="#5EEAD4">@#$%&amp;*+=-.,:;!?`</text>
  <!-- Option 2: Unicode -->
  <rect x="165" y="390" width="695" height="88" rx="14" fill="#134E4A" opacity="0.6"/>
  <rect x="185" y="408" width="36" height="36" rx="6" fill="#134E4A" stroke="#2DD4BF" stroke-width="3"/>
  <text x="248" y="424" font-family="Arial,sans-serif" font-size="20" fill="#5EEAD4" font-weight="bold">Unicode 블록</text>
  <text x="248" y="450" font-family="Consolas,monospace" font-size="16" fill="#2DD4BF" opacity="0.7">█▓▒░ ■□●○ ▲△▼▽</text>
  <!-- Option 3: Hangul chars -->
  <rect x="165" y="494" width="695" height="88" rx="14" fill="#134E4A" opacity="0.5"/>
  <rect x="185" y="512" width="36" height="36" rx="6" fill="#134E4A" stroke="#2DD4BF" stroke-width="3"/>
  <text x="248" y="528" font-family="Arial,sans-serif" font-size="20" fill="#5EEAD4" font-weight="bold">자음 (한글)</text>
  <text x="248" y="554" font-family="Consolas,monospace" font-size="16" fill="#2DD4BF" opacity="0.6">ㄱㄴㄷㄹㅁㅂㅅㅇㅈ</text>
  <!-- Option 4: Custom -->
  <rect x="165" y="598" width="695" height="88" rx="14" fill="#134E4A" opacity="0.4"/>
  <rect x="185" y="616" width="36" height="36" rx="6" fill="#134E4A" stroke="#2DD4BF" stroke-width="2" opacity="0.6"/>
  <text x="248" y="632" font-family="Arial,sans-serif" font-size="20" fill="#5EEAD4" opacity="0.7" font-weight="bold">커스텀</text>
  <text x="248" y="658" font-family="Consolas,monospace" font-size="16" fill="#2DD4BF" opacity="0.45">직접 입력...</text>
  <!-- Layer 3: Preview badge -->
  <rect x="700" y="292" width="145" height="34" rx="10" fill="#2DD4BF"/>
  <text x="773" y="314" font-family="Arial,sans-serif" font-size="16" fill="#0F3D38" text-anchor="middle" font-weight="bold">미리보기</text>
</svg>