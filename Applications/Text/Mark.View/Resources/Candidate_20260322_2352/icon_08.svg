<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#022C22"/>
  <!-- Layer 2: Table structure -->
  <!-- Header row -->
  <rect x="140" y="260" width="740" height="70" rx="8" fill="#2DD4BF"/>
  <!-- Header cells text -->
  <text x="265" y="303" font-family="Arial,sans-serif" font-size="22" fill="#022C22" text-anchor="middle" font-weight="bold">제목</text>
  <text x="512" y="303" font-family="Arial,sans-serif" font-size="22" fill="#022C22" text-anchor="middle" font-weight="bold">카테고리</text>
  <text x="759" y="303" font-family="Arial,sans-serif" font-size="22" fill="#022C22" text-anchor="middle" font-weight="bold">날짜</text>
  <!-- Vertical dividers in header -->
  <line x1="390" y1="260" x2="390" y2="330" stroke="#022C22" stroke-width="3" opacity="0.4"/>
  <line x1="634" y1="260" x2="634" y2="330" stroke="#022C22" stroke-width="3" opacity="0.4"/>
  <!-- Row 1 (normal) -->
  <rect x="140" y="330" width="740" height="66" rx="0" fill="#064E3B" opacity="0.7"/>
  <rect x="140" y="330" width="740" height="16" rx="0" fill="#065F46" opacity="0.4"/>
  <!-- Row 1 cells -->
  <rect x="160" y="346" width="200" height="14" rx="4" fill="#6EE7B7" opacity="0.6"/>
  <rect x="410" y="346" width="144" height="14" rx="4" fill="#34D399" opacity="0.5"/>
  <rect x="654" y="346" width="100" height="14" rx="4" fill="#6EE7B7" opacity="0.5"/>
  <rect x="160" y="372" width="160" height="12" rx="4" fill="#6EE7B7" opacity="0.4"/>
  <!-- Row 2 (alt) -->
  <rect x="140" y="396" width="740" height="66" rx="0" fill="#047857" opacity="0.35"/>
  <rect x="160" y="412" width="210" height="14" rx="4" fill="#6EE7B7" opacity="0.6"/>
  <rect x="410" y="412" width="110" height="14" rx="4" fill="#34D399" opacity="0.5"/>
  <rect x="654" y="412" width="100" height="14" rx="4" fill="#6EE7B7" opacity="0.5"/>
  <!-- Row 3 -->
  <rect x="140" y="462" width="740" height="66" rx="0" fill="#064E3B" opacity="0.5"/>
  <rect x="160" y="478" width="185" height="14" rx="4" fill="#6EE7B7" opacity="0.5"/>
  <rect x="410" y="478" width="130" height="14" rx="4" fill="#34D399" opacity="0.45"/>
  <rect x="654" y="478" width="100" height="14" rx="4" fill="#6EE7B7" opacity="0.45"/>
  <!-- Row 4 -->
  <rect x="140" y="528" width="740" height="66" rx="0" fill="#047857" opacity="0.3"/>
  <rect x="160" y="544" width="196" height="14" rx="4" fill="#6EE7B7" opacity="0.45"/>
  <rect x="410" y="544" width="100" height="14" rx="4" fill="#34D399" opacity="0.4"/>
  <!-- Table border -->
  <rect x="140" y="260" width="740" height="334" rx="8" fill="none" stroke="#2DD4BF" stroke-width="4" opacity="0.6"/>
  <!-- Vertical dividers -->
  <line x1="390" y1="260" x2="390" y2="594" stroke="#2DD4BF" stroke-width="2" opacity="0.35"/>
  <line x1="634" y1="260" x2="634" y2="594" stroke="#2DD4BF" stroke-width="2" opacity="0.35"/>
  <!-- Layer 3: MD source hint at top -->
  <text x="512" y="220" font-family="Consolas,monospace" font-size="22" fill="#2DD4BF" text-anchor="middle" opacity="0.7">| 제목 | 카테고리 | 날짜 |</text>
  <!-- Bottom page lines -->
  <rect x="140" y="630" width="740" height="14" rx="4" fill="#065F46" opacity="0.4"/>
  <rect x="140" y="658" width="600" height="14" rx="4" fill="#065F46" opacity="0.3"/>
</svg>