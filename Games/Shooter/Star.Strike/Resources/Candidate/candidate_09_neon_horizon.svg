<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030318"/>
      <stop offset="60%" stop-color="#050528"/>
      <stop offset="100%" stop-color="#0A0530"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0000FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDFFFF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon grid horizon -->
  <line x1="60" y1="380" x2="452" y2="380" stroke="#FF00FF" stroke-width="1.5" opacity="0.6" filter="url(#neon)"/>
  <!-- Grid perspective lines -->
  <line x1="256" y1="380" x2="60" y2="452" stroke="#FF00FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="256" y1="380" x2="452" y2="452" stroke="#FF00FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="256" y1="380" x2="140" y2="452" stroke="#8800FF" stroke-width="0.6" opacity="0.25"/>
  <line x1="256" y1="380" x2="372" y2="452" stroke="#8800FF" stroke-width="0.6" opacity="0.25"/>
  <!-- Horizontal grid lines -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#8800FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="90" y1="420" x2="422" y2="420" stroke="#8800FF" stroke-width="0.6" opacity="0.25"/>
  <!-- Stars scattered -->
  <circle cx="80" cy="80" r="2" fill="#00FFFF" opacity="0.9" filter="url(#neon)"/>
  <circle cx="350" cy="60" r="1.5" fill="#FF00FF" opacity="0.8" filter="url(#neon)"/>
  <circle cx="450" cy="140" r="1" fill="white" opacity="0.6"/>
  <circle cx="60" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="420" cy="300" r="1" fill="#00FFFF" opacity="0.6"/>
  <!-- Neon ship -->
  <g transform="translate(256, 290)">
    <polygon points="0,-72 -28,22 0,-10 28,22" fill="url(#ship)"/>
    <polygon points="-28,22 -84,50 -50,28 0,-6" fill="#006688"/>
    <polygon points="28,22 84,50 50,28 0,-6" fill="#006688"/>
    <!-- Neon outlines -->
    <polygon points="0,-72 -28,22 0,-10 28,22" fill="none" stroke="#00FFFF" stroke-width="1.5" filter="url(#neon)" opacity="0.7"/>
    <ellipse cx="0" cy="-44" rx="12" ry="18" fill="#FF00FF" opacity="0.8" filter="url(#neon)"/>
    <ellipse cx="-14" cy="24" rx="8" ry="13" fill="#FF8800" filter="url(#neon)" opacity="0.9"/>
    <ellipse cx="14" cy="24" rx="8" ry="13" fill="#FF8800" filter="url(#neon)" opacity="0.9"/>
  </g>
  <!-- Neon laser -->
  <rect x="250" y="80" width="12" height="140" rx="6" fill="#FF00FF" filter="url(#neon)" opacity="0.7"/>
  <rect x="253" y="80" width="6" height="140" rx="3" fill="white" opacity="0.8"/>
  <!-- Enemy: neon wireframe star -->
  <circle cx="256" cy="100" r="40" fill="none" stroke="#FF00FF" stroke-width="2" filter="url(#neon)" opacity="0.7"/>
  <polygon points="256,62 263,80 284,80 268,92 274,112 256,100 238,112 244,92 228,80 249,80" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#neon)"/>
  <!-- Scanline effect -->
  <rect x="60" y="100" width="392" height="1" fill="#00FFFF" opacity="0.08"/>
  <rect x="60" y="116" width="392" height="1" fill="#00FFFF" opacity="0.06"/>
  <rect x="60" y="132" width="392" height="1" fill="#00FFFF" opacity="0.06"/>
</svg>
