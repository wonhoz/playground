<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1A0E3A"/>
      <stop offset="70%" stop-color="#0D0620"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>
    <radialGradient id="planet" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="60%" stop-color="#4527A0"/>
      <stop offset="100%" stop-color="#1A0050"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#9C27B0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="dust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <g fill="white">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="180" cy="80" r="1.5"/>
    <circle cx="400" cy="90" r="2"/>
    <circle cx="440" cy="150" r="1.5"/>
    <circle cx="80" cy="300" r="2"/>
    <circle cx="450" cy="380" r="1.5"/>
    <circle cx="130" cy="420" r="2"/>
    <circle cx="380" cy="440" r="1"/>
    <circle cx="60" cy="200" r="1.5"/>
    <circle cx="460" cy="240" r="2"/>
  </g>
  <!-- Planet -->
  <circle cx="256" cy="230" r="110" fill="url(#planet)"/>
  <!-- Ring -->
  <ellipse cx="256" cy="240" rx="170" ry="30" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <!-- Stardust falling -->
  <g fill="url(#dust)">
    <circle cx="200" cy="380" r="5"/>
    <circle cx="220" cy="400" r="4"/>
    <circle cx="240" cy="420" r="6"/>
    <circle cx="260" cy="390" r="5"/>
    <circle cx="280" cy="410" r="4"/>
    <circle cx="300" cy="430" r="6"/>
    <circle cx="320" cy="380" r="4"/>
    <circle cx="180" cy="420" r="3"/>
    <circle cx="340" cy="400" r="5"/>
    <circle cx="160" cy="395" r="4"/>
    <circle cx="360" cy="415" r="3"/>
  </g>
  <!-- Dust trail from planet -->
  <g fill="#CE93D8" opacity="0.4">
    <circle cx="366" cy="300" r="4"/>
    <circle cx="376" cy="320" r="5"/>
    <circle cx="382" cy="340" r="4"/>
    <circle cx="375" cy="358" r="6"/>
    <circle cx="365" cy="372" r="5"/>
  </g>
</svg>
