<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 마트료시카 인형 — 파일 안에 파일 (중첩 아카이브 은유) | 기하학 추상 | 코랄+노랑+파랑 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#BF360C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Outermost: ZIP (large) -->
  <rect x="160" y="200" width="704" height="560" rx="40" fill="#E64A19" filter="url(#sh4)"/>
  <polygon points="816,200 864,248 816,248" fill="#FFCCBC"/>
  <!-- ZIP label -->
  <rect x="172" y="212" width="80" height="30" rx="10" fill="#FF6F00"/>
  <text x="212" y="227" font-family="Arial Black, sans-serif" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">ZIP</text>
  <!-- Size -->
  <text x="512" y="718" font-family="Consolas, monospace" font-size="20" fill="#FFCCBC"
        text-anchor="middle">48.3 MB → 12.1 MB</text>

  <!-- Middle: 7Z (medium) -->
  <rect x="240" y="290" width="544" height="420" rx="30" fill="#1E88E5" filter="url(#sh4)"/>
  <polygon points="736,290 784,338 736,338" fill="#90CAF9"/>
  <!-- 7Z label -->
  <rect x="252" y="302" width="60" height="28" rx="8" fill="#0D47A1"/>
  <text x="282" y="316" font-family="Arial Black, sans-serif" font-size="15" fill="white"
        text-anchor="middle" dominant-baseline="middle">7Z</text>
  <text x="512" y="668" font-family="Consolas, monospace" font-size="18" fill="#90CAF9"
        text-anchor="middle">22.1 MB</text>

  <!-- Inner: RAR (small) -->
  <rect x="320" y="370" width="384" height="280" rx="22" fill="#7B1FA2" filter="url(#sh4)"/>
  <polygon points="656,370 704,418 656,418" fill="#CE93D8"/>
  <!-- RAR label -->
  <rect x="332" y="382" width="64" height="26" rx="8" fill="#4A148C"/>
  <text x="364" y="395" font-family="Arial Black, sans-serif" font-size="14" fill="white"
        text-anchor="middle" dominant-baseline="middle">RAR</text>
  <text x="512" y="606" font-family="Consolas, monospace" font-size="16" fill="#CE93D8"
        text-anchor="middle">8.4 MB</text>

  <!-- Innermost: actual files (tiny) -->
  <rect x="400" y="440" width="224" height="140" rx="14" fill="#43A047" filter="url(#sh4)"/>
  <polygon points="580,440 624,484 580,484" fill="#A5D6A5"/>
  <text x="512" y="500" font-family="Arial, sans-serif" font-size="18" fill="white"
        text-anchor="middle">📝📄🖼</text>
  <text x="512" y="526" font-family="Consolas, monospace" font-size="16" fill="#A5D6A5"
        text-anchor="middle">127 files</text>
  <text x="512" y="548" font-family="Consolas, monospace" font-size="14" fill="#A5D6A5"
        text-anchor="middle">2.4 MB</text>

  <!-- Peek eye on top right -->
  <ellipse cx="820" cy="320" rx="80" ry="54" fill="white" filter="url(#sh4)"/>
  <circle cx="820" cy="320" r="30" fill="#1E88E5"/>
  <circle cx="820" cy="320" r="14" fill="#0D47A1"/>
  <circle cx="812" cy="312" r="5" fill="white"/>
</svg>
