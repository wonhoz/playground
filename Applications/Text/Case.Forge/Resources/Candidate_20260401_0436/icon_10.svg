<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="tape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (cream) -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Typewriter body -->
  <!-- Main body block -->
  <rect x="160" y="340" width="640" height="340" rx="32" fill="url(#body)"/>
  <!-- Top ridge -->
  <rect x="200" y="300" width="560" height="60" rx="20" fill="#6D4C41"/>
  <!-- Paper slot/roller -->
  <rect x="230" y="270" width="500" height="40" rx="8" fill="#4E342E"/>
  <!-- Paper coming out -->
  <rect x="330" y="130" width="300" height="160" rx="4" fill="url(#tape)"/>
  <!-- Paper shadow/fold at bottom -->
  <rect x="330" y="270" width="300" height="12" rx="4" fill="#E0E0E0"/>
  <!-- Printed text on paper — case format output -->
  <text x="480" y="178" text-anchor="middle" dominant-baseline="middle" font-size="52" font-family="Consolas,monospace" fill="#FF5722" font-weight="bold">camelCase</text>
  <text x="480" y="236" text-anchor="middle" dominant-baseline="middle" font-size="46" font-family="Consolas,monospace" fill="#5D4037" opacity="0.6">snake_case</text>
  <!-- Layer 3: Typewriter keys (3×4 grid) -->
  <!-- Row 1 -->
  <rect x="230" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="318" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="406" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="494" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="582" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="670" y="420" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <!-- Key tops (highlight) -->
  <rect x="234" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="322" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="410" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="498" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="586" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="674" y="423" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <!-- Row 2 -->
  <rect x="250" y="494" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="338" y="494" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="426" y="494" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="514" y="494" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <rect x="602" y="494" width="70" height="55" rx="10" fill="#D7CCC8"/>
  <!-- Row 2 key tops -->
  <rect x="254" y="497" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="342" y="497" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="430" y="497" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="518" y="497" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <rect x="606" y="497" width="62" height="30" rx="7" fill="#EFEBE9"/>
  <!-- Space bar row — highlight key (coral accent) -->
  <rect x="310" y="568" width="350" height="55" rx="10" fill="#FF7043"/>
  <rect x="318" y="572" width="334" height="26" rx="7" fill="#FF8A65"/>
  <!-- Space bar label -->
  <text x="485" y="598" text-anchor="middle" dominant-baseline="middle" font-size="42" font-family="Segoe UI,Arial,sans-serif" font-weight="bold" fill="white">FORGE</text>
  <!-- Carriage return lever -->
  <rect x="760" y="340" width="28" height="120" rx="14" fill="#4E342E"/>
  <circle cx="774" cy="340" r="20" fill="#FF7043"/>
</svg>
