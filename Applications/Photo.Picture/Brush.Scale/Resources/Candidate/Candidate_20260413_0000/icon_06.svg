<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid · 중앙심볼 · 큰 x4 배지 + 픽셀 아이콘 -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCDD2"/>
      <stop offset="1" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- 중앙 원형 프레임 -->
  <circle cx="512" cy="512" r="380" fill="#FFFFFF" stroke="#880E4F" stroke-width="20"/>
  <!-- ×4 큰 숫자 -->
  <text x="512" y="620" font-family="Arial Black, sans-serif" font-weight="900" font-size="480" fill="#E91E63" text-anchor="middle">×4</text>
  <!-- 상단 라벨 -->
  <rect x="292" y="160" width="440" height="110" rx="36" fill="#880E4F" stroke="#4A0625" stroke-width="12"/>
  <text x="512" y="238" font-family="Arial Black, sans-serif" font-weight="900" font-size="76" fill="#FFFFFF" text-anchor="middle">UPSCALE</text>
  <!-- 하단 작은 픽셀 아이콘들 -->
  <g>
    <rect x="220" y="800" width="48" height="48" fill="#FF6B9D"/>
    <rect x="268" y="800" width="48" height="48" fill="#FFD93D"/>
    <rect x="316" y="800" width="48" height="48" fill="#06D6A0"/>
    <rect x="220" y="848" width="48" height="48" fill="#FFD93D"/>
    <rect x="268" y="848" width="48" height="48" fill="#06D6A0"/>
    <rect x="316" y="848" width="48" height="48" fill="#3A86FF"/>
  </g>
  <!-- 화살표 -->
  <path d="M 400 856 L 540 856" stroke="#E91E63" stroke-width="18" stroke-linecap="round"/>
  <path d="M 520 830 L 560 856 L 520 882 Z" fill="#E91E63"/>
  <!-- 큰 스무스 원 -->
  <circle cx="740" cy="856" r="90" fill="#FFD93D" stroke="#E91E63" stroke-width="14"/>
</svg>
