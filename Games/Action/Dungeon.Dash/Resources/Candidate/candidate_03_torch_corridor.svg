<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="corridorLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#92400E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Perspective corridor walls -->
  <!-- Left wall -->
  <polygon points="0,0 180,130 180,382 0,512" fill="url(#wallGrad)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Right wall -->
  <polygon points="512,0 332,130 332,382 512,512" fill="url(#wallGrad)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Ceiling -->
  <polygon points="0,0 512,0 332,130 180,130" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Floor -->
  <polygon points="0,512 512,512 332,382 180,382" fill="#0D0D0D" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Corridor light glow -->
  <ellipse cx="256" cy="256" rx="140" ry="120" fill="url(#corridorLight)"/>
  <!-- Floor blocks perspective -->
  <line x1="180" y1="420" x2="332" y2="420" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="180" y1="460" x2="332" y2="460" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="210" y1="382" x2="210" y2="512" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="256" y1="382" x2="256" y2="512" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="302" y1="382" x2="302" y2="512" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Wall torches (left) -->
  <rect x="154" y="195" width="14" height="40" rx="4" fill="#78350F"/>
  <ellipse cx="161" cy="192" rx="12" ry="20" fill="#F97316"/>
  <ellipse cx="161" cy="190" rx="8" ry="14" fill="#FDE68A"/>
  <!-- Wall torches (right) -->
  <rect x="344" y="195" width="14" height="40" rx="4" fill="#78350F"/>
  <ellipse cx="351" cy="192" rx="12" ry="20" fill="#F97316"/>
  <ellipse cx="351" cy="190" rx="8" ry="14" fill="#FDE68A"/>
  <!-- Exit glow at end of corridor -->
  <ellipse cx="256" cy="256" rx="35" ry="50" fill="#7C3AED" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="20" ry="30" fill="#A855F7" opacity="0.4"/>
  <!-- Running figure silhouette -->
  <!-- Head -->
  <circle cx="256" cy="280" r="16" fill="#1A1A1A" stroke="#F97316" stroke-width="1.5"/>
  <!-- Body -->
  <rect x="246" y="296" width="20" height="36" rx="4" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <!-- Legs running -->
  <line x1="250" y1="332" x2="236" y2="365" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="262" y1="332" x2="270" y2="365" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
  <!-- Arm -->
  <line x1="246" y1="308" x2="228" y2="320" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Weapon trail -->
  <line x1="215" y1="310" x2="230" y2="290" stroke="#FDE68A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
