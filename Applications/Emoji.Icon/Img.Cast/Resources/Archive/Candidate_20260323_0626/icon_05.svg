  <rect x="472" y="224" width="40" height="40" fill="#60A5FA"/>
  <rect x="514" y="224" width="40" height="40" fill="#1D4ED8"/>
  <!-- Row 2 -->
  <rect x="220" y="266" width="40" height="40" fill="#1D4ED8"/>
