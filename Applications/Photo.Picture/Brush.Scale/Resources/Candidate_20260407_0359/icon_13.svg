<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 크리스탈+민트 -->
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="crystal13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="50%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>

  <!-- Layer 2: 수정/보석 (굴절 = 선명화 상징) — 기하학 추상 -->
  <!-- 다이아몬드 형태 -->
  <!-- 외부 다이아몬드 -->
  <polygon points="512,160 780,420 512,840 244,420" fill="url(#crystal13)" opacity="0.8"/>
  <!-- 다이아몬드 윗면 -->
  <polygon points="512,160 780,420 512,420 244,420" fill="#80DEEA" opacity="0.6"/>
  <!-- 다이아몬드 내부 면들 -->
  <polygon points="512,160 780,420 512,420" fill="#4DD0E1" opacity="0.5"/>
  <polygon points="512,160 244,420 512,420" fill="#26C6DA" opacity="0.4"/>
  <polygon points="512,840 780,420 512,420" fill="#00BCD4" opacity="0.4"/>
  <polygon points="512,840 244,420 512,420" fill="#26C6DA" opacity="0.5"/>
  <!-- 굴절 선들 (크리스탈 느낌) -->
  <line x1="512" y1="160" x2="512" y2="840" stroke="#FFFFFF" stroke-width="8" opacity="0.4"/>
  <line x1="244" y1="420" x2="780" y2="420" stroke="#FFFFFF" stroke-width="8" opacity="0.4"/>
  <line x1="512" y1="160" x2="690" y2="490" stroke="#FFFFFF" stroke-width="6" opacity="0.3"/>
  <line x1="512" y1="160" x2="334" y2="490" stroke="#FFFFFF" stroke-width="6" opacity="0.3"/>

  <!-- Layer 3: 중앙 이미지 + 해상도 표시 -->
  <!-- 중앙 사진 축소판 -->
  <clipPath id="diamond13">
    <polygon points="512,320 640,440 512,560 384,440"/>
  </clipPath>
  <g clip-path="url(#diamond13)">
    <rect x="384" y="320" width="256" height="240" fill="#FFF9C4"/>
    <!-- 선명한 산 -->
    <path d="M384,540 L460,380 L512,430 L564,360 L640,540 Z" fill="#FF6F00" opacity="0.8"/>
    <circle cx="610" cy="360" r="24" fill="#FFD740" opacity="0.9"/>
  </g>

  <!-- 크리스탈 반짝임 -->
  <path d="M244,420 L200,380 M244,420 L190,440 M244,420 L210,460" stroke="#00BCD4" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M780,420 L824,380 M780,420 L834,440 M780,420 L814,460" stroke="#00BCD4" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- 하단 해상도 표시 -->
  <rect x="330" y="870" width="364" height="68" rx="34" fill="#00897B"/>
  <text x="512" y="914" font-family="Arial Black" font-size="46" fill="white" text-anchor="middle">AI Upscale</text>
</svg>
