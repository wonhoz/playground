<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <linearGradient id="mainIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimalist circle with dust particle inside -->
  <circle cx="256" cy="220" r="130" fill="white" opacity="0.9"/>
  <circle cx="256" cy="220" r="130" fill="none" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Broom icon flat (minimal) -->
  <!-- Handle -->
  <line x1="220" y1="120" x2="290" y2="280" stroke="url(#mainIcon)" stroke-width="10" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="230" y="274" width="100" height="30" rx="8" fill="url(#mainIcon)"/>
  <!-- Bristles -->
  <line x1="240" y1="304" x2="236" y2="326" stroke="#2196F3" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="255" y1="304" x2="253" y2="328" stroke="#2196F3" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="270" y1="304" x2="270" y2="328" stroke="#2196F3" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="285" y1="304" x2="287" y2="326" stroke="#2196F3" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="300" y1="304" x2="304" y2="324" stroke="#2196F3" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Dust dots (minimal) -->
  <circle cx="190" cy="280" r="5" fill="#BBBBBB"/>
  <circle cx="175" cy="300" r="4" fill="#CCCCCC"/>
  <circle cx="165" cy="270" r="3" fill="#DDDDDD"/>
  <!-- Stats below -->
  <text x="256" y="396" font-family="'Segoe UI', sans-serif" font-size="28" fill="url(#mainIcon)" text-anchor="middle" font-weight="700">Sys.Clean</text>
  <!-- Progress bar -->
  <rect x="100" y="418" width="312" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="100" y="418" width="260" height="8" rx="4" fill="url(#progress)"/>
  <text x="256" y="444" font-family="'Segoe UI', sans-serif" font-size="12" fill="#999" text-anchor="middle">Optimizing system...</text>
  <!-- Small stat chips -->
  <rect x="120" y="458" width="80" height="24" rx="12" fill="#E3F2FD"/>
  <text x="160" y="474" font-family="'Segoe UI', sans-serif" font-size="11" fill="#2196F3" text-anchor="middle">4.2 GB free</text>
  <rect x="216" y="458" width="80" height="24" rx="12" fill="#E8F5E9"/>
  <text x="256" y="474" font-family="'Segoe UI', sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">Healthy</text>
  <rect x="312" y="458" width="80" height="24" rx="12" fill="#FFF3E0"/>
  <text x="352" y="474" font-family="'Segoe UI', sans-serif" font-size="11" fill="#FF9800" text-anchor="middle">83% fast</text>
</svg>
