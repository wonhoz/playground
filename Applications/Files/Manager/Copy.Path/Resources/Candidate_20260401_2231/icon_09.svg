<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg09cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (deep purple-navy) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg09cp2)"/>

  <!-- Layer 2: Explorer-like window -->
  <!-- Window frame -->
  <rect x="88" y="120" width="848" height="680" rx="20" fill="white" opacity="0.95"/>
  <!-- Title bar -->
  <rect x="88" y="120" width="848" height="64" rx="20" fill="#5E35B1"/>
  <rect x="88" y="160" width="848" height="24" fill="#5E35B1"/>
  <!-- Window title -->
  <text x="200" y="163" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="white"
    font-weight="bold">📁  C:\Users\file.txt</text>
  <!-- Window controls (dots) -->
  <circle cx="880" cy="152" r="18" fill="#F44336"/>
  <circle cx="840" cy="152" r="18" fill="#FF9800"/>
  <circle cx="800" cy="152" r="18" fill="#4CAF50"/>

  <!-- Path breadcrumb bar -->
  <rect x="104" y="196" width="816" height="52" rx="10" fill="#EDE7F6"/>
  <text x="128" y="232" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="#5E35B1">
    C: &gt; Users &gt; file.txt
  </text>

  <!-- File list with selected file highlighted -->
  <rect x="104" y="264" width="816" height="56" rx="8" fill="#F3E5F5" opacity="0.6"/>
  <text x="160" y="303" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#7B1FA2">📄  document.txt</text>

  <rect x="104" y="332" width="816" height="60" rx="8" fill="#7B1FA2" opacity="0.2"/>
  <rect x="104" y="332" width="816" height="60" rx="8" fill="#EDE7F6"/>
  <rect x="104" y="332" width="8" height="60" rx="4" fill="#7B1FA2"/>
  <text x="160" y="374" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#7B1FA2" font-weight="bold">📄  file.txt  ✓</text>

  <rect x="104" y="404" width="816" height="56" rx="8" fill="#F3E5F5" opacity="0.4"/>
  <text x="160" y="443" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#9575CD">📄  readme.md</text>

  <!-- Copy Path button at bottom of window -->
  <rect x="280" y="720" width="464" height="64" rx="18" fill="#5E35B1"/>
  <text x="512" y="762" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold"
    fill="white" text-anchor="middle">📋 Copy Path</text>

  <!-- Layer 3: Success checkmark badge -->
  <circle cx="840" cy="820" r="108" fill="#69F0AE"/>
  <circle cx="840" cy="820" r="90" fill="#00C853"/>
  <path d="M800 820 L828 852 L890 780" fill="none" stroke="white" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tooltip showing copied format -->
  <rect x="88" y="900" width="700" height="72" rx="18" fill="white" opacity="0.15"/>
  <text x="188" y="946" font-family="'Courier New',monospace" font-size="48" fill="white"
    opacity="0.9">C:/Users/file.txt  ✓</text>
</svg>
