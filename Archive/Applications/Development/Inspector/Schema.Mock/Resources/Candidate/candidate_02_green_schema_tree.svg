<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#051A05"/>
      <stop offset="100%" stop-color="#0A2A0A"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree lines -->
  <g stroke="#2E7D32" stroke-width="3" fill="none">
    <!-- Root to level 1 -->
    <line x1="256" y1="130" x2="150" y2="230"/>
    <line x1="256" y1="130" x2="362" y2="230"/>
    <!-- Level 1 to level 2 (left branch) -->
    <line x1="150" y1="268" x2="100" y2="360"/>
    <line x1="150" y1="268" x2="200" y2="360"/>
    <!-- Level 1 to level 2 (right branch) -->
    <line x1="362" y1="268" x2="312" y2="360"/>
    <line x1="362" y1="268" x2="412" y2="360"/>
  </g>
  <!-- Root node -->
  <rect x="216" y="90" width="80" height="40" rx="10" fill="url(#node)"/>
  <rect x="228" y="100" width="56" height="10" rx="3" fill="#0A2A0A"/>
  <rect x="228" y="114" width="40" height="8" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <!-- Level 1 nodes -->
  <rect x="110" y="230" width="80" height="38" rx="8" fill="url(#node)" opacity="0.85"/>
  <rect x="122" y="240" width="56" height="9" rx="3" fill="#0A2A0A"/>
  <rect x="122" y="253" width="38" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <rect x="322" y="230" width="80" height="38" rx="8" fill="url(#node)" opacity="0.85"/>
  <rect x="334" y="240" width="56" height="9" rx="3" fill="#0A2A0A"/>
  <rect x="334" y="253" width="42" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <!-- Level 2 nodes -->
  <rect x="68" y="360" width="64" height="34" rx="6" fill="url(#leaf)" opacity="0.8"/>
  <rect x="76" y="368" width="48" height="8" rx="3" fill="#0A2A0A"/>
  <rect x="76" y="380" width="34" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <rect x="168" y="360" width="64" height="34" rx="6" fill="url(#leaf)" opacity="0.8"/>
  <rect x="176" y="368" width="48" height="8" rx="3" fill="#0A2A0A"/>
  <rect x="176" y="380" width="36" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <rect x="280" y="360" width="64" height="34" rx="6" fill="url(#leaf)" opacity="0.7"/>
  <rect x="288" y="368" width="48" height="8" rx="3" fill="#0A2A0A"/>
  <rect x="288" y="380" width="32" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <rect x="380" y="360" width="64" height="34" rx="6" fill="url(#leaf)" opacity="0.7"/>
  <rect x="388" y="368" width="48" height="8" rx="3" fill="#0A2A0A"/>
  <rect x="388" y="380" width="38" height="7" rx="3" fill="#0A2A0A" opacity="0.5"/>
  <!-- Mock data badge -->
  <rect x="196" y="430" width="120" height="24" rx="10" fill="#00C853" opacity="0.7"/>
  <rect x="212" y="438" width="88" height="8" rx="3" fill="#0A2A0A"/>
</svg>
