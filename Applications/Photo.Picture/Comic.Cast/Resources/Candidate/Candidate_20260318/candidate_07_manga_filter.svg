<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 카메라 (원본) -->
  <rect x="80" y="190" width="130" height="100" rx="8" fill="none" stroke="#888888" stroke-width="2" opacity="0.4"/>
  <circle cx="145" cy="240" r="35" fill="none" stroke="#888888" stroke-width="2" opacity="0.4"/>
  <circle cx="145" cy="240" r="22" fill="#555555" opacity="0.3"/>
  <rect x="165" y="192" width="30" height="15" rx="3" fill="#888888" opacity="0.3"/>
  <!-- 변환 화살표 -->
  <path d="M 210 240 L 300 240 M 288 228 L 300 240 L 288 252" stroke="#FB923C" stroke-width="4" fill="none" filter="url(#glow)"/>
  <!-- 만화 필터 아이콘 (오른쪽) -->
  <rect x="302" y="170" width="150" height="140" rx="8" fill="#FB923C" opacity="0.1"/>
  <rect x="302" y="170" width="150" height="140" rx="8" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <!-- 만화화된 내용: 굵은 윤곽 + 하프톤 -->
  <circle cx="377" cy="230" r="40" fill="none" stroke="#FB923C" stroke-width="4" opacity="0.7"/>
  <circle cx="377" cy="230" r="25" fill="#FDBA74" opacity="0.2"/>
  <!-- 표정 -->
  <circle cx="367" cy="222" r="4" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="387" cy="222" r="4" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <path d="M 362 240 Q 377 252 392 240" fill="none" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
  <!-- 레이블 -->
  <text x="256" y="400" text-anchor="middle" fill="#FB923C" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">MANGA FILTER</text>
</svg>