<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#080005"/>
  <!-- 비트 파동 + 드롭 낙하: 파동 + 낙하 방울 -->
  <!-- 파동 동심원 -->
  <circle cx="512" cy="560" r="340" fill="none" stroke="#9C27B0" stroke-width="12" opacity="0.3"/>
  <circle cx="512" cy="560" r="260" fill="none" stroke="#9C27B0" stroke-width="14" opacity="0.5"/>
  <circle cx="512" cy="560" r="180" fill="none" stroke="#CE93D8" stroke-width="16" opacity="0.7"/>
  <circle cx="512" cy="560" r="100" fill="none" stroke="#CE93D8" stroke-width="18"/>
  <!-- 낙하 방울 -->
  <path d="M512,160 Q480,260 470,340 Q460,420 512,460 Q564,420 554,340 Q544,260 512,160 Z" fill="#CE93D8"/>
  <!-- 방울 하이라이트 -->
  <ellipse cx="497" cy="260" rx="18" ry="36" fill="#9C27B0" opacity="0.5" transform="rotate(-15,497,260)"/>
  <!-- 충격 파동 (낙하 지점) -->
  <circle cx="512" cy="560" r="40" fill="#CE93D8" opacity="0.6"/>
  <circle cx="512" cy="560" r="24" fill="#CE93D8"/>
</svg>
