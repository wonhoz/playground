<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0f0800"/>
    </linearGradient>
    <radialGradient id="qGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="qGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 양자 궤도들 -->
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#FBBF24" stroke-width="1.2" opacity="0.3" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="170" ry="58" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.3" transform="rotate(120 256 256)"/>
  <!-- 양자 글로우 -->
  <circle cx="256" cy="256" r="110" fill="url(#qGrad)" filter="url(#qGlow)"/>
  <circle cx="256" cy="256" r="60" fill="#F59E0B" opacity="0.08"/>
  <!-- 슈퍼포지션: 잠긴+열린 자물쇠 동시 표현 -->
  <!-- 잠긴 버전 (반투명) -->
  <rect x="210" y="248" width="92" height="75" rx="10" fill="#92400E" opacity="0.5" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M 230,248 L 230,216 Q 230,190 256,190 Q 282,190 282,216 L 282,240" fill="none" stroke="#D97706" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- 열린 버전 (반투명, 겹침) -->
  <rect x="220" y="258" width="92" height="75" rx="10" fill="#B45309" opacity="0.45" stroke="#FBBF24" stroke-width="1.5"/>
  <path d="M 240,258 L 240,230 Q 240,204 266,204 Q 292,204 292,230 L 292,248" fill="none" stroke="#FBBF24" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- 중앙 코어 (슈퍼포지션) -->
  <circle cx="256" cy="296" r="28" fill="#F59E0B" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="296" r="18" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="296" r="10" fill="#FEF3C7" opacity="1"/>
  <!-- 파동 함수 (불확정성) -->
  <path d="M 120,256 Q 160,226 200,256 Q 240,286 280,256 Q 320,226 360,256 Q 400,286 430,256" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <!-- 전자들 (궤도 위) -->
  <circle cx="426" cy="256" r="12" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="86" cy="256" r="12" fill="#F59E0B" opacity="0.85" filter="url(#glow)"/>
  <circle cx="346" cy="112" r="11" fill="#FCD34D" opacity="0.85" filter="url(#glow)"/>
  <circle cx="166" cy="400" r="11" fill="#FBBF24" opacity="0.8" filter="url(#glow)"/>
  <!-- 전자 내 심볼 -->
  <text x="426" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#030508">±</text>
  <text x="86" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="#030508">ψ</text>
  <!-- 파티클 -->
  <circle cx="310" cy="168" r="4" fill="#FCD34D" opacity="0.7" filter="url(#glow)"/>
  <circle cx="196" cy="350" r="4" fill="#F59E0B" opacity="0.65" filter="url(#glow)"/>
  <circle cx="346" cy="400" r="3.5" fill="#FBBF24" opacity="0.6"/>
  <circle cx="166" cy="112" r="3.5" fill="#FCD34D" opacity="0.6"/>
</svg>