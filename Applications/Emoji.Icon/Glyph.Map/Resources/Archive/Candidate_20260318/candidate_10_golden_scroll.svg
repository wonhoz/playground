<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 스크롤 (두루마리) -->
  <rect x="110" y="150" width="292" height="220" rx="8" fill="#FBBF24" opacity="0.05"/>
  <rect x="110" y="150" width="292" height="220" rx="8" fill="none" stroke="#FBBF24" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 스크롤 끝 원통 -->
  <ellipse cx="110" cy="260" rx="14" ry="110" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="402" cy="260" rx="14" ry="110" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="2" filter="url(#glow)"/>
  <!-- 스크롤 내용 (이모지 행들) -->
  <text x="256" y="205" text-anchor="middle" font-size="20" font-family="Segoe UI Emoji">😊 🌟 🎨 🔥 💎</text>
  <text x="256" y="245" text-anchor="middle" font-size="20" font-family="Segoe UI Emoji">⚡ 🌈 ✨ 🚀 🎵</text>
  <text x="256" y="285" text-anchor="middle" font-size="20" font-family="Segoe UI Emoji">💡 🎭 🦋 🌺 🍀</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">GOLDEN SCROLL</text>
</svg>
