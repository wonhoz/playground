<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 바람 + 공 경로: 바람 + 곡선 -->
  <!-- wind swirl lines -->
  <path d="M180 400 Q300 340 380 380 Q460 420 420 480 Q380 540 300 520 Q240 500 260 450" fill="none" stroke="#81C784" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M180 520 Q320 450 420 500 Q520 550 480 620 Q440 690 340 670 Q260 650 280 590" fill="none" stroke="#81C784" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M200 300 Q380 240 480 290 Q560 330 530 390 Q500 450 400 430" fill="none" stroke="#81C784" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <!-- curved ball flight path (wind-affected curve) -->
  <path d="M200 700 Q420 500 700 460 Q780 450 820 500" fill="none" stroke="#388E3C" stroke-width="10" stroke-linecap="round" stroke-dasharray="20 10" opacity="0.9"/>
  <!-- arrow at end of path -->
  <polygon points="818,500 840,470 846,508" fill="#388E3C" opacity="0.9"/>
  <!-- golf ball at start -->
  <circle cx="200" cy="700" r="52" fill="#81C784"/>
  <circle cx="186" cy="686" r="7" fill="#388E3C" opacity="0.5"/>
  <circle cx="210" cy="686" r="7" fill="#388E3C" opacity="0.5"/>
  <circle cx="192" cy="708" r="7" fill="#388E3C" opacity="0.5"/>
  <circle cx="214" cy="710" r="7" fill="#388E3C" opacity="0.5"/>
  <!-- wind direction indicator (small) -->
  <circle cx="780" cy="290" r="50" fill="none" stroke="#81C784" stroke-width="5" opacity="0.4"/>
  <line x1="780" y1="250" x2="780" y2="330" stroke="#81C784" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="740" y1="290" x2="820" y2="290" stroke="#81C784" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <polygon points="780,248 770,268 790,268" fill="#81C784" opacity="0.7"/>
</svg>
