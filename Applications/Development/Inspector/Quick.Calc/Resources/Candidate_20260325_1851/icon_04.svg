<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 변환 화살표 + 진법 레이블들이 무지개처럼 흐름 | 대각선/동적 | 핫핑크 배경 + 흰 화살표 + 컬러 레이블 -->
  <defs>
    <linearGradient id="bgHP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3CAC"/>
      <stop offset="100%" stop-color="#CC1080"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 핫핑크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgHP)"/>

  <!-- 배경 장식 원 -->
  <circle cx="200" cy="200" r="120" fill="white" opacity="0.06"/>
  <circle cx="820" cy="820" r="150" fill="white" opacity="0.06"/>

  <!-- Layer 2: 중앙 변환 흐름 다이어그램 -->

  <!-- 입력: "255" -->
  <rect x="110" y="430" width="240" height="164" rx="24" fill="white" opacity="0.95"/>
  <text x="230" y="496" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="34" fill="#888">입력</text>
  <text x="230" y="548" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="68" font-weight="bold" fill="#CC1080">255</text>

  <!-- 오른쪽 화살표 (두꺼운 흰색) -->
  <path d="M 362 512 L 500 512" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <polygon points="490,488 540,512 490,536" fill="white"/>

  <!-- 출력 카드들 (세로로 4개) -->
  <!-- DEC -->
  <rect x="560" y="170" width="354" height="128" rx="18" fill="#2979FF"/>
  <text x="630" y="237" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="white">DEC</text>
  <text x="896" y="237" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#BBDEFB">255</text>

  <!-- HEX -->
  <rect x="560" y="322" width="354" height="128" rx="18" fill="#FF6D00"/>
  <text x="630" y="387" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="white">HEX</text>
  <text x="896" y="387" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#FFE0B2">FF</text>

  <!-- OCT -->
  <rect x="560" y="474" width="354" height="128" rx="18" fill="#7B1FA2"/>
  <text x="630" y="539" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="white">OCT</text>
  <text x="896" y="539" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#E1BEE7">377</text>

  <!-- BIN -->
  <rect x="560" y="626" width="354" height="128" rx="18" fill="#00897B"/>
  <text x="630" y="691" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="white">BIN</text>
  <text x="896" y="691" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#B2DFDB">11111111</text>

  <!-- 연결선들 (화살표 → 각 출력) -->
  <line x1="540" y1="468" x2="560" y2="234" stroke="white" stroke-width="5" opacity="0.35" stroke-dasharray="10 6"/>
  <line x1="540" y1="490" x2="560" y2="387" stroke="white" stroke-width="5" opacity="0.4" stroke-dasharray="10 6"/>
  <line x1="540" y1="512" x2="560" y2="539" stroke="white" stroke-width="6" opacity="0.5"/>
  <line x1="540" y1="534" x2="560" y2="691" stroke="white" stroke-width="5" opacity="0.4" stroke-dasharray="10 6"/>

  <!-- Layer 3: 하단 IEEE 힌트 -->
  <rect x="110" y="790" width="784" height="66" rx="18" fill="white" opacity="0.18"/>
  <text x="512" y="825" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="38" fill="white" font-weight="bold">IEEE 754  ·  64bit  ·  Win+K</text>
</svg>
