<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a1e"/>
      <stop offset="100%" stop-color="#0a140a"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5dc"/>
      <stop offset="100%" stop-color="#e8e4c8"/>
    </linearGradient>
    <linearGradient id="clipMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pile of paper clipboards -->
  <rect x="155" y="365" width="202" height="8" rx="4" fill="#c8c4a8" opacity="0.6" transform="rotate(5,256,369)"/>
  <rect x="155" y="355" width="202" height="8" rx="4" fill="#d8d4b8" opacity="0.7" transform="rotate(-3,256,359)"/>
  <!-- Back clipboard -->
  <rect x="145" y="190" width="222" height="188" rx="12" fill="#ddd8b8" opacity="0.75" transform="rotate(-7,256,284)"/>
  <rect x="208" y="175" width="88" height="24" rx="8" fill="#aaa8a0" opacity="0.8" transform="rotate(-7,252,187)"/>
  <!-- Mid clipboard -->
  <rect x="148" y="195" width="216" height="185" rx="12" fill="#e8e4cc" opacity="0.85" transform="rotate(4,256,287)"/>
  <rect x="212" y="181" width="88" height="24" rx="8" fill="#b0aaa0" opacity="0.85" transform="rotate(4,256,193)"/>
  <!-- Front clipboard -->
  <rect x="152" y="198" width="208" height="182" rx="12" fill="url(#paperGrad)"/>
  <!-- Metal clip -->
  <rect x="214" y="183" width="84" height="26" rx="8" fill="url(#clipMetal)"/>
  <rect x="230" y="177" width="52" height="14" rx="7" fill="#333"/>
  <!-- Text lines -->
  <rect x="172" y="224" width="168" height="9" rx="4" fill="#888" opacity="0.5"/>
  <rect x="172" y="241" width="140" height="9" rx="4" fill="#888" opacity="0.4"/>
  <rect x="172" y="258" width="155" height="9" rx="4" fill="#888" opacity="0.45"/>
  <rect x="172" y="275" width="100" height="9" rx="4" fill="#888" opacity="0.35"/>
  <!-- Green highlighted text -->
  <rect x="172" y="295" width="130" height="11" rx="4" fill="#00b894" opacity="0.7"/>
</svg>