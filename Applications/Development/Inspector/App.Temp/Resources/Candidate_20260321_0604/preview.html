    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #1A2A1E;
    border: 1px solid #2A4030;
    border-radius: 16px;
    padding: 28px 24px 24px;
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .card:hover {
    transform: scale(1.10);
    box-shadow: 0 8px 32px rgba(0, 200, 160, 0.3);
    border-color: #00C8A0;
  }
  .card img {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .filename {
    font-size: 12px;
    font-weight: 600;
    color: #00C8A0;
    letter-spacing: 0.5px;
  }
  .concept {
    font-size: 11px;
    color: #90B8A0;
    text-align: center;
    line-height: 1.5;
  }
  .type-badge {
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .literal  { background: #0A4030; color: #00E8C8; }
  .metaphor { background: #3A2A0A; color: #FFB020; }
  .hybrid   { background: #2A0A0A; color: #FF6080; }
  .swatches {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    title: attr(title);
  }
