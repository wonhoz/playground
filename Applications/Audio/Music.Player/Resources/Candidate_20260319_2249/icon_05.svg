<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Turntable needle on vinyl record groove -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#080808"/>
  <!-- Vinyl record -->
  <circle cx="480" cy="520" r="360" fill="#141414"/>
  <!-- Groove rings -->
  <circle cx="480" cy="520" r="320" fill="none" stroke="#1E1E1E" stroke-width="10"/>
  <circle cx="480" cy="520" r="280" fill="none" stroke="#1E1E1E" stroke-width="8"/>
  <circle cx="480" cy="520" r="240" fill="none" stroke="#1E1E1E" stroke-width="8"/>
  <circle cx="480" cy="520" r="200" fill="none" stroke="#1E1E1E" stroke-width="7"/>
  <circle cx="480" cy="520" r="160" fill="none" stroke="#1E1E1E" stroke-width="6"/>
  <!-- Label -->
  <circle cx="480" cy="520" r="110" fill="#00897B"/>
  <circle cx="480" cy="520" r="22" fill="#080808"/>
  <!-- Tonearm pivot (top-right) -->
  <circle cx="790" cy="220" r="30" fill="#37474F"/>
  <!-- Tonearm rod -->
  <line x1="790" y1="220" x2="590" y2="510" stroke="#546E7A" stroke-width="16" stroke-linecap="round"/>
  <!-- Cartridge head -->
  <rect x="562" y="494" width="56" height="32" rx="8" fill="#78909C" transform="rotate(-35, 590, 510)"/>
  <!-- Needle tip (touching groove) -->
  <circle cx="578" cy="528" r="10" fill="#B0BEC5"/>
  <!-- Contact glow -->
  <circle cx="578" cy="528" r="18" fill="#00BCD4" opacity="0.25"/>
</svg>
