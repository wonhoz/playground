<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </linearGradient>
    <radialGradient id="forge" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#431407" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil/forge base -->
  <ellipse cx="256" cy="400" rx="160" ry="30" fill="#1C0A00" opacity="0.8"/>
  <rect x="120" y="350" width="272" height="50" rx="8" fill="#292524"/>
  <rect x="140" y="310" width="232" height="40" rx="6" fill="#374151"/>
  <!-- Forge glow -->
  <ellipse cx="256" cy="310" rx="100" ry="20" fill="url(#forge)" opacity="0.9"/>
  <!-- Hammer -->
  <rect x="310" y="100" width="60" height="40" rx="6" fill="#4B5563" transform="rotate(-35 340 120)"/>
  <rect x="330" y="135" width="16" height="130" rx="5" fill="#6B7280" transform="rotate(-35 338 200)"/>
  <!-- Sparks -->
  <circle cx="256" cy="280" r="6" fill="#FCD34D"/>
  <line x1="256" y1="274" x2="270" y2="258" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="274" x2="240" y2="255" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="274" x2="275" y2="275" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="274" x2="235" y2="272" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <circle cx="275" cy="255" r="3" fill="#FCD34D"/>
  <circle cx="236" cy="252" r="3" fill="#F97316"/>
  <circle cx="280" cy="272" r="2" fill="#FCD34D"/>
  <!-- JSON braces forming on anvil -->
  <text x="210" y="340" font-family="Courier New" font-size="36" fill="#FCD34D" font-weight="bold" opacity="0.9">&#123; &#125;</text>
  <!-- Small data labels floating -->
  <rect x="80" y="120" width="120" height="70" rx="8" fill="#292524" opacity="0.9" stroke="#F97316" stroke-width="1.5"/>
  <text x="100" y="142" font-family="Courier New" font-size="10" fill="#F97316">"name":</text>
  <text x="100" y="158" font-family="Courier New" font-size="10" fill="#FCD34D">  "John Doe"</text>
  <text x="100" y="174" font-family="Courier New" font-size="10" fill="#F97316">"age": </text>
  <text x="100" y="174" font-family="Courier New" font-size="10" fill="#FB7185" dx="44">28</text>
  <rect x="310" y="200" width="120" height="70" rx="8" fill="#292524" opacity="0.9" stroke="#F97316" stroke-width="1.5"/>
  <text x="330" y="222" font-family="Courier New" font-size="10" fill="#F97316">"email":</text>
  <text x="330" y="238" font-family="Courier New" font-size="10" fill="#FCD34D">  "fake@"</text>
  <text x="330" y="254" font-family="Courier New" font-size="10" fill="#F97316">"id": </text>
  <text x="330" y="254" font-family="Courier New" font-size="10" fill="#FB7185" dx="34">1024</text>
</svg>
