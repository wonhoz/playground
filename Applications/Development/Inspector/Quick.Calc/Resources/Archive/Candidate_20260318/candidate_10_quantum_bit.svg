<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000808"/>
      <stop offset="100%" stop-color="#001010"/>
    </linearGradient>
    <radialGradient id="qubit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bloch sphere for qubit -->
  <!-- Sphere -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <!-- Equator ellipse -->
  <ellipse cx="256" cy="256" rx="160" ry="50" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <!-- Vertical axis -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <!-- |0⟩ state at top -->
  <circle cx="256" cy="96" r="12" fill="#064e3b" stroke="#34D399" stroke-width="2"/>
  <text x="256" y="100" text-anchor="middle" font-family="monospace" font-size="9" fill="#34D399">|0⟩</text>
  <text x="256" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#6EE7B7">0</text>
  <!-- |1⟩ state at bottom -->
  <circle cx="256" cy="416" r="12" fill="#064e3b" stroke="#34D399" stroke-width="2"/>
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#34D399">|1⟩</text>
  <text x="256" y="444" text-anchor="middle" font-family="monospace" font-size="11" fill="#6EE7B7">1</text>
  <!-- Superposition state vector -->
  <line x1="256" y1="256" x2="340" y2="156" stroke="#34D399" stroke-width="3" opacity="0.9"/>
  <circle cx="340" cy="156" r="8" fill="#34D399"/>
  <text x="354" y="148" font-family="monospace" font-size="10" fill="#6EE7B7">|ψ⟩</text>
  <!-- Angles -->
  <path d="M256,200 A56,56 0 0,1 298,222" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <text x="280" y="206" font-family="monospace" font-size="9" fill="#10B981">θ</text>
  <!-- Calculation on the sphere surface -->
  <text x="160" y="240" font-family="monospace" font-size="10" fill="#6EE7B7" opacity="0.6">cos(θ/2)|0⟩</text>
  <text x="300" y="310" font-family="monospace" font-size="10" fill="#34D399" opacity="0.6">+ sin(θ/2)e^iφ|1⟩</text>
  <!-- XY plane indicators -->
  <text x="412" y="260" font-family="monospace" font-size="11" fill="#10B981" opacity="0.5">x</text>
  <text x="100" y="260" font-family="monospace" font-size="11" fill="#10B981" opacity="0.5">-x</text>
  <!-- Small result display -->
  <rect x="170" y="430" width="172" height="40" rx="6" fill="#001010" stroke="#10B981" stroke-width="1.5"/>
  <text x="256" y="447" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981">QUANTUM CALC</text>
  <text x="256" y="462" text-anchor="middle" font-family="monospace" font-size="9" fill="#34D399">superposition</text>
</svg>
