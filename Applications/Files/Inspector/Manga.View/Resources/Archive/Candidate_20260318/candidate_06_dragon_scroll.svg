<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#14060f"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="scrollGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0a1e"/>
      <stop offset="50%" stop-color="#1a0614"/>
      <stop offset="100%" stop-color="#2a0a1e"/>
    </linearGradient>
    <radialGradient id="dragonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Scroll body -->
  <rect x="80" y="110" width="352" height="292" rx="0" fill="url(#scrollGrad)" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Scroll rollers (top and bottom) -->
  <rect x="60" y="95" width="392" height="35" rx="17.5" fill="#1e0616" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <rect x="60" y="382" width="392" height="35" rx="17.5" fill="#1e0616" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.8" filter="url(#softglow)"/>
  <!-- Roller end caps -->
  <circle cx="60" cy="112" r="17.5" fill="#2a0a20" stroke="#EC4899" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="452" cy="112" r="17.5" fill="#2a0a20" stroke="#EC4899" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="60" cy="399" r="17.5" fill="#2a0a20" stroke="#EC4899" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="452" cy="399" r="17.5" fill="#2a0a20" stroke="#EC4899" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Roller knobs -->
  <circle cx="60" cy="112" r="7" fill="#EC4899" fill-opacity="0.5"/>
  <circle cx="452" cy="112" r="7" fill="#EC4899" fill-opacity="0.5"/>
  <circle cx="60" cy="399" r="7" fill="#F472B6" fill-opacity="0.5"/>
  <circle cx="452" cy="399" r="7" fill="#F472B6" fill-opacity="0.5"/>

  <!-- Dragon silhouette (simple but dramatic) -->
  <!-- Dragon body (sinuous) -->
  <path d="M120,350 Q150,290 200,260 Q240,235 256,200 Q272,165 310,150 Q350,135 380,160"
    fill="none" stroke="#EC4899" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Dragon body width -->
  <path d="M120,356 Q152,296 202,266 Q242,241 258,206 Q274,171 312,156 Q352,141 382,166"
    fill="none" stroke="#F472B6" stroke-width="8" stroke-opacity="0.25" stroke-linecap="round"/>

  <!-- Dragon head -->
  <ellipse cx="390" cy="163" rx="32" ry="22" fill="#1e0616" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.8" transform="rotate(-20 390 163)" filter="url(#softglow)"/>
  <!-- Dragon eye -->
  <circle cx="400" cy="153" r="6" fill="#FB7185" filter="url(#glow)"/>
  <circle cx="402" cy="151" r="2.5" fill="white" fill-opacity="0.8"/>
  <!-- Dragon horns -->
  <line x1="385" y1="143" x2="378" y2="125" stroke="#EC4899" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="400" y1="138" x2="398" y2="118" stroke="#F472B6" stroke-width="2.5" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Dragon mouth/teeth -->
  <path d="M405,168 Q418,175 415,185" fill="none" stroke="#EC4899" stroke-width="2" stroke-linecap="round"/>
  <line x1="407" y1="172" x2="413" y2="178" stroke="#FB7185" stroke-width="1.5"/>

  <!-- Dragon wing -->
  <path d="M330,160 Q300,120 270,130 Q290,150 310,170 Z" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Dragon tail -->
  <path d="M120,356 Q100,375 90,370 Q82,365 90,358 Q100,350 115,356"
    fill="#1e0616" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Manga text lines on scroll (story panels) -->
  <rect x="100" y="165" width="80" height="60" rx="4" fill="#EC4899" fill-opacity="0.08" stroke="#EC4899" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="108" y1="178" x2="172" y2="178" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="108" y1="192" x2="168" y2="192" stroke="#EC4899" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="108" y1="206" x2="172" y2="206" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Decorative corner ornaments -->
  <path d="M80,130 Q90,110 110,110" fill="none" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M402,110 Q422,110 432,130" fill="none" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M80,382 Q90,402 110,402" fill="none" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M402,402 Q422,402 432,382" fill="none" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Fire breath from dragon -->
  <path d="M418,180 Q440,185 448,200 Q455,215 440,220" fill="none" stroke="#FB7185" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M420,185 Q448,195 452,212" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Stars/sparkles around scroll -->
  <circle cx="55" cy="70" r="3" fill="#EC4899" fill-opacity="0.5" filter="url(#softglow)"/>
  <circle cx="460" cy="65" r="2.5" fill="#F472B6" fill-opacity="0.45"/>
  <circle cx="40" cy="450" r="3" fill="#EC4899" fill-opacity="0.4"/>
  <circle cx="470" cy="455" r="2.5" fill="#FB7185" fill-opacity="0.4"/>
</svg>
