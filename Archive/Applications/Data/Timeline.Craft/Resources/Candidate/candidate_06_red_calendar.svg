<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="72" y="112" width="368" height="320" rx="20" fill="#C62828" stroke="#EF9A9A" stroke-width="8"/>
  <!-- Calendar header -->
  <rect x="72" y="112" width="368" height="80" rx="20" fill="url(#header)"/>
  <rect x="72" y="172" width="368" height="20" fill="url(#header)"/>
  <!-- Binding hooks -->
  <rect x="160" y="88" width="20" height="50" rx="10" fill="#FFCDD2"/>
  <rect x="332" y="88" width="20" height="50" rx="10" fill="#FFCDD2"/>
  <!-- Month label -->
  <rect x="180" y="132" width="152" height="16" rx="8" fill="#FFEBEE" opacity="0.9"/>
  <!-- Timeline bar across center -->
  <rect x="96" y="268" width="320" height="12" rx="6" fill="#EF5350" opacity="0.7"/>
  <!-- Calendar day markers on timeline -->
  <circle cx="128" cy="274" r="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="4"/>
  <circle cx="208" cy="274" r="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="4"/>
  <circle cx="288" cy="274" r="18" fill="#FF1744" stroke="#FFCDD2" stroke-width="5"/>
  <circle cx="368" cy="274" r="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="4"/>
  <!-- Event cards above -->
  <rect x="96" y="216" width="64" height="40" rx="8" fill="#B71C1C" stroke="#FFCDD2" stroke-width="3"/>
  <rect x="104" y="225" width="48" height="6" rx="3" fill="#FFCDD2" opacity="0.9"/>
  <rect x="104" y="235" width="36" height="5" rx="2" fill="#EF9A9A" opacity="0.7"/>
  <rect x="256" y="210" width="64" height="44" rx="8" fill="#B71C1C" stroke="#FF1744" stroke-width="4"/>
  <rect x="264" y="220" width="48" height="6" rx="3" fill="#FFCDD2" opacity="0.9"/>
  <rect x="264" y="231" width="36" height="5" rx="2" fill="#EF9A9A" opacity="0.7"/>
  <rect x="264" y="241" width="44" height="5" rx="2" fill="#EF9A9A" opacity="0.6"/>
  <!-- Event cards below -->
  <rect x="176" y="300" width="64" height="40" rx="8" fill="#B71C1C" stroke="#FFCDD2" stroke-width="3"/>
  <rect x="184" y="309" width="48" height="6" rx="3" fill="#FFCDD2" opacity="0.9"/>
  <rect x="184" y="320" width="36" height="5" rx="2" fill="#EF9A9A" opacity="0.7"/>
  <rect x="336" y="300" width="64" height="48" rx="8" fill="#B71C1C" stroke="#FFCDD2" stroke-width="3"/>
  <rect x="344" y="310" width="48" height="6" rx="3" fill="#FFCDD2" opacity="0.9"/>
  <rect x="344" y="321" width="36" height="5" rx="2" fill="#EF9A9A" opacity="0.7"/>
  <rect x="344" y="331" width="44" height="5" rx="2" fill="#EF9A9A" opacity="0.6"/>
  <rect x="344" y="341" width="30" height="5" rx="2" fill="#EF9A9A" opacity="0.5"/>
</svg>
