<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 앤틱 지도 느낌 (베이지) -->
  <rect width="1024" height="1024" rx="180" fill="#F5E6C8"/>
  <!-- Layer 2: 나침반 + 지도 격자 -->
  <!-- 격자선 (지도 배경) -->
  <line x1="120" y1="200" x2="904" y2="200" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="340" x2="904" y2="340" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="480" x2="904" y2="480" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="620" x2="904" y2="620" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="760" x2="904" y2="760" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="160" x2="200" y2="840" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="380" y1="160" x2="380" y2="840" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="560" y1="160" x2="560" y2="840" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="740" y1="160" x2="740" y2="840" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="160" x2="900" y2="840" stroke="#D4B896" stroke-width="2" opacity="0.6"/>
  <!-- 나침반 (중앙) -->
  <circle cx="512" cy="460" r="220" fill="#FFF5E0" stroke="#8B6914" stroke-width="8"/>
  <!-- 나침반 N/S/E/W -->
  <text x="512" y="290" font-family="Arial Black,Arial" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">N</text>
  <text x="512" y="660" font-family="Arial Black,Arial" font-size="44" font-weight="700" fill="#5D4037" text-anchor="middle">S</text>
  <text x="310" y="480" font-family="Arial Black,Arial" font-size="44" font-weight="700" fill="#5D4037" text-anchor="middle">W</text>
  <text x="714" y="480" font-family="Arial Black,Arial" font-size="44" font-weight="700" fill="#5D4037" text-anchor="middle">E</text>
  <!-- 나침반 바늘 -->
  <polygon points="512,300 526,460 512,530 498,460" fill="#C62828"/>
  <polygon points="512,530 526,460 512,620 498,460" fill="#5D4037"/>
  <!-- Layer 3: GEO.QUIZ 타이틀 -->
  <text x="512" y="840" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#5D4037" text-anchor="middle">GEO.QUIZ</text>
</svg>
