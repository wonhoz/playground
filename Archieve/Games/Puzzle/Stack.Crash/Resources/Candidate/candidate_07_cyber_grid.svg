<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0A1E"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#8000FF"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF80"/>
      <stop offset="100%" stop-color="#00CC44"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines background -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#00FFFF" stroke-width="0.5" opacity="0.1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#00FFFF" stroke-width="0.5" opacity="0.1"/>
  <!-- Base platform -->
  <rect x="60" y="416" width="392" height="8" rx="4" fill="url(#cyan)" filter="url(#neon)" opacity="0.7"/>
  <!-- Cyber blocks - wireframe style -->
  <rect x="104" y="326" width="304" height="56" rx="4" fill="#001A1A" stroke="url(#cyan)" stroke-width="2"/>
  <rect x="104" y="326" width="304" height="56" rx="4" fill="url(#cyan)" opacity="0.08"/>
  <!-- Inner detail lines -->
  <line x1="180" y1="338" x2="180" y2="370" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <line x1="330" y1="338" x2="330" y2="370" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <rect x="136" y="266" width="240" height="56" rx="4" fill="#1A001A" stroke="url(#magenta)" stroke-width="2"/>
  <rect x="136" y="266" width="240" height="56" rx="4" fill="url(#magenta)" opacity="0.08"/>
  <line x1="220" y1="278" x2="220" y2="310" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
  <line x1="292" y1="278" x2="292" y2="310" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
  <rect x="180" y="206" width="152" height="56" rx="4" fill="#001A00" stroke="url(#lime)" stroke-width="2"/>
  <rect x="180" y="206" width="152" height="56" rx="4" fill="url(#lime)" opacity="0.08"/>
  <!-- Exploding block -->
  <g transform="translate(256, 168) rotate(-20)" filter="url(#neon)">
    <rect x="-76" y="-26" width="152" height="50" rx="4" fill="#100010" stroke="#FF00FF" stroke-width="2.5"/>
    <!-- Data corruption effect -->
    <rect x="-20" y="-26" width="4" height="50" fill="#FF00FF" opacity="0.3"/>
    <rect x="30" y="-26" width="2" height="50" fill="#00FFFF" opacity="0.3"/>
  </g>
  <!-- Glitch fragments -->
  <rect x="345" y="110" width="24" height="8" rx="1" fill="#FF00FF" opacity="0.8" filter="url(#neon)"/>
  <rect x="372" y="128" width="18" height="6" rx="1" fill="#00FFFF" opacity="0.8" filter="url(#neon)"/>
  <rect x="320" y="96" width="14" height="6" rx="1" fill="#00FF80" opacity="0.8" filter="url(#neon)"/>
  <rect x="358" y="88" width="20" height="5" rx="1" fill="#FF00FF" opacity="0.6" filter="url(#neon)"/>
  <!-- Corner brackets -->
  <path d="M90,90 L90,70 L110,70" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M422,90 L422,70 L402,70" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M90,422 L90,442 L110,442" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M422,422 L422,442 L402,442" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
