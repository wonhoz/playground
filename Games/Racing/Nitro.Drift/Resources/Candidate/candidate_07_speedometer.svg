<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cc00"/>
      <stop offset="60%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gauge background -->
  <circle cx="256" cy="280" r="180" fill="#111111" stroke="#333333" stroke-width="3"/>
  <!-- Arc scale -->
  <path d="M100,370 A180,180 0 1,1 412,370" fill="none" stroke="#333" stroke-width="20"/>
  <path d="M100,370 A180,180 0 1,1 412,370" fill="none" stroke="url(#arc)" stroke-width="12"/>
  <!-- Speed ticks -->
  <g stroke="#aaaaaa" stroke-width="2">
    <line x1="256" y1="105" x2="256" y2="125" transform="rotate(-120 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="120" transform="rotate(-90 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="120" transform="rotate(-60 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="125" transform="rotate(-30 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="125" transform="rotate(0 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="120" transform="rotate(30 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="120" transform="rotate(60 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="125" transform="rotate(90 256 280)"/>
    <line x1="256" y1="105" x2="256" y2="125" transform="rotate(120 256 280)"/>
  </g>
  <!-- Needle (pointing to ~280 km/h) -->
  <line x1="256" y1="280" x2="356" y2="148" stroke="#ff4400" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="280" r="14" fill="#ff4400"/>
  <circle cx="256" cy="280" r="7" fill="#222"/>
  <!-- Speed readout -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial Black" font-size="40" fill="#ff4400">280</text>
  <text x="256" y="362" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">km/h</text>
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black" font-size="32" font-weight="900" fill="#ff4400">NITRO.DRIFT</text>
</svg>
