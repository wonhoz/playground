<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#003300"/>
  <!-- Layer 2: 초원 + 여러 식물들 성장 -->
  <!-- 하늘 영역 -->
  <rect x="120" y="160" width="784" height="400" rx="12" fill="#004400"/>
  <!-- 구름 -->
  <circle cx="280" cy="280" r="60" fill="#005500" opacity="0.6"/>
  <circle cx="340" cy="260" r="70" fill="#006600" opacity="0.6"/>
  <circle cx="400" cy="280" r="56" fill="#005500" opacity="0.6"/>
  <!-- 땅 -->
  <rect x="120" y="600" width="784" height="284" rx="12" fill="#1B5E20"/>
  <rect x="120" y="600" width="784" height="40" rx="4" fill="#2E7D32"/>
  <!-- 풀들 (여러 높이) -->
  <!-- 작은 풀들 -->
  <line x1="200" y1="600" x2="180" y2="500" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="600" x2="258" y2="490" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="340" y1="600" x2="320" y2="480" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="600" x2="400" y2="470" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="660" y1="600" x2="640" y2="480" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
  <line x1="700" y1="600" x2="720" y2="490" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <line x1="820" y1="600" x2="800" y2="480" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
  <line x1="860" y1="600" x2="880" y2="490" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <!-- 중간 나무 (가운데) -->
  <line x1="512" y1="600" x2="512" y2="340" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <circle cx="512" cy="280" r="130" fill="#2E7D32"/>
  <circle cx="440" cy="300" r="90" fill="#388E3C"/>
  <circle cx="580" cy="290" r="100" fill="#43A047"/>
  <circle cx="512" cy="220" r="100" fill="#4CAF50"/>
  <!-- 꽃들 (작은) -->
  <circle cx="210" cy="596" r="12" fill="#FFEB3B"/>
  <circle cx="320" cy="596" r="10" fill="#FF4081"/>
  <circle cx="650" cy="596" r="12" fill="#FFEB3B"/>
  <circle cx="820" cy="596" r="10" fill="#FF4081"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#A5D6A7" text-anchor="middle">LEAF.GROW</text>
</svg>
