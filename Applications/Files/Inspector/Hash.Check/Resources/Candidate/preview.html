<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hash.Check - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { color: #00FF66; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .item img { width: 128px; height: 128px; border-radius: 8px; }
    .item .name { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .item .num { font-size: 18px; font-weight: bold; color: #00FF66; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Hash.Check — Icon Candidates</h1>
  <p>파일 해시 검증 도구 (MD5/SHA) 아이콘 후보 10종</p>
  <div class="grid">
    <div class="item"><div class="num">01</div><img src="candidate_01_green_shield_verified.svg" alt="01"><div class="name">green_shield_verified</div></div>
    <div class="item"><div class="num">02</div><img src="candidate_02_blue_fingerprint_hash.svg" alt="02"><div class="name">blue_fingerprint_hash</div></div>
    <div class="item"><div class="num">03</div><img src="candidate_03_red_warning_mismatch.svg" alt="03"><div class="name">red_warning_mismatch</div></div>
    <div class="item"><div class="num">04</div><img src="candidate_04_purple_lock_secure.svg" alt="04"><div class="name">purple_lock_secure</div></div>
    <div class="item"><div class="num">05</div><img src="candidate_05_gold_checksum_file.svg" alt="05"><div class="name">gold_checksum_file</div></div>
    <div class="item"><div class="num">06</div><img src="candidate_06_cyan_compare_split.svg" alt="06"><div class="name">cyan_compare_split</div></div>
    <div class="item"><div class="num">07</div><img src="candidate_07_orange_hash_symbol.svg" alt="07"><div class="name">orange_hash_symbol</div></div>
    <div class="item"><div class="num">08</div><img src="candidate_08_teal_binary_chain.svg" alt="08"><div class="name">teal_binary_chain</div></div>
    <div class="item"><div class="num">09</div><img src="candidate_09_silver_magnifier_inspect.svg" alt="09"><div class="name">silver_magnifier_inspect</div></div>
    <div class="item"><div class="num">10</div><img src="candidate_10_pink_dna_hash.svg" alt="10"><div class="name">pink_dna_hash</div></div>
  </div>
</body>
</html>
