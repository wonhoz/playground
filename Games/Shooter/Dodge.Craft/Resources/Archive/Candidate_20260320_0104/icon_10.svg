<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Hammer -->
  <rect x="490" y="280" width="44" height="280" rx="10" fill="#AED581" transform="rotate(-20,512,420)"/>
  <rect x="440" y="180" width="160" height="90" rx="14" fill="#AED581" transform="rotate(-20,520,225)"/>
  <rect x="440" y="180" width="60" height="90" rx="14" fill="#33691E" transform="rotate(-20,470,225)"/>
  <!-- Impact zone -->
  <circle cx="600" cy="560" r="60" fill="#33691E" opacity="0.4"/>
  <circle cx="600" cy="560" r="40" fill="#33691E" opacity="0.3"/>
  <!-- Sparks -->
  <line x1="600" y1="500" x2="580" y2="460" stroke="#AED581" stroke-width="5"/>
  <line x1="640" y1="510" x2="670" y2="475" stroke="#AED581" stroke-width="5"/>
  <line x1="650" y1="560" x2="700" y2="555" stroke="#AED581" stroke-width="5"/>
  <!-- Spaceship being crafted -->
  <polygon points="600,560 565,640 600,620 635,640" fill="#AED581" opacity="0.8"/>
  <polygon points="600,620 565,640 530,690 600,670 670,690 635,640" fill="#33691E" opacity="0.9"/>
  <!-- Item components flying in -->
  <circle cx="240" cy="300" r="24" fill="#33691E" stroke="#AED581" stroke-width="4"/>
  <circle cx="200" cy="400" r="20" fill="#33691E" stroke="#AED581" stroke-width="4"/>
  <polygon points="260,300 380,400" stroke="#AED581" stroke-width="3" fill="none" stroke-dasharray="10,8" opacity="0.6"/>
  <polygon points="200,400 380,440" stroke="#AED581" stroke-width="3" fill="none" stroke-dasharray="10,8" opacity="0.6"/>
</svg>
