<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0A00"/>
  <!-- Timeline line -->
  <line x1="160" y1="512" x2="864" y2="512" stroke="#F9A825" stroke-width="14" stroke-linecap="round"/>
  <!-- Commit dots + connectors -->
  <circle cx="220" cy="512" r="28" fill="#FFD54F"/>
  <circle cx="340" cy="512" r="28" fill="#F9A825"/>
  <circle cx="460" cy="512" r="28" fill="#FFD54F"/>
  <!-- Branch off -->
  <line x1="460" y1="484" x2="580" y2="340" stroke="#F9A825" stroke-width="12"/>
  <circle cx="580" cy="340" r="24" fill="#FFD54F"/>
  <line x1="580" y1="340" x2="680" y2="340" stroke="#F9A825" stroke-width="12"/>
  <circle cx="680" cy="340" r="24" fill="#F9A825"/>
  <!-- Merge back -->
  <line x1="680" y1="364" x2="740" y2="484" stroke="#F9A825" stroke-width="12"/>
  <circle cx="740" cy="512" r="28" fill="#FFD54F"/>
  <circle cx="840" cy="512" r="28" fill="#F9A825"/>
  <!-- Date ticks -->
  <line x1="220" y1="540" x2="220" y2="570" stroke="#FFD54F" stroke-width="8"/>
  <line x1="340" y1="540" x2="340" y2="570" stroke="#FFD54F" stroke-width="8"/>
  <line x1="460" y1="540" x2="460" y2="570" stroke="#FFD54F" stroke-width="8"/>
  <line x1="740" y1="540" x2="740" y2="570" stroke="#FFD54F" stroke-width="8"/>
  <line x1="840" y1="540" x2="840" y2="570" stroke="#FFD54F" stroke-width="8"/>
</svg>