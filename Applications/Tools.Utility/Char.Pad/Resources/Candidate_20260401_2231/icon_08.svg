<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4527A0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (deep purple) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg08cp)"/>

  <!-- Layer 2: Characters floating freely — "liberated" symbols -->
  <!-- Large background text (faint) -->
  <text x="512" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="600" fill="white"
    text-anchor="middle" opacity="0.05">Ω</text>

  <!-- Floating symbols at various angles and sizes -->
  <text x="200" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="140" fill="#FFF176"
    text-anchor="middle" transform="rotate(-15 200 280)">©</text>

  <text x="780" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#69F0AE"
    text-anchor="middle" transform="rotate(12 780 240)">∑</text>

  <text x="150" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#FF8A65"
    text-anchor="middle" transform="rotate(-8 150 560)">²</text>

  <text x="850" y="520" font-family="'Segoe UI',Arial,sans-serif" font-size="130" fill="#CE93D8"
    text-anchor="middle" transform="rotate(10 850 520)">∞</text>

  <text x="300" y="720" font-family="'Segoe UI',Arial,sans-serif" font-size="110" fill="#40C4FF"
    text-anchor="middle" transform="rotate(-5 300 720)">€</text>

  <text x="700" y="780" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#FFCA28"
    text-anchor="middle" transform="rotate(18 700 780)">π</text>

  <text x="512" y="900" font-family="'Segoe UI',Arial,sans-serif" font-size="96" fill="#F48FB1"
    text-anchor="middle">😀</text>

  <!-- Layer 3: Spotlight highlight in center -->
  <ellipse cx="512" cy="430" rx="240" ry="200" fill="white" opacity="0.06"/>
  <text x="512" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="200" fill="white"
    text-anchor="middle">→</text>

  <!-- Sparkle dots -->
  <circle cx="420" cy="150" r="12" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="600" cy="120" r="8" fill="#B2EBF2" opacity="0.8"/>
  <circle cx="820" cy="660" r="10" fill="#FFF176" opacity="0.7"/>
  <circle cx="200" cy="860" r="10" fill="#FFE0B2" opacity="0.7"/>
</svg>
