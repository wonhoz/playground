<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="card07a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <linearGradient id="card07b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: Two model option cards — Bicubic (gray/back) vs AI (gold/front) -->
  <!-- Bicubic card (back) -->
  <rect x="280" y="230" width="480" height="280" rx="20" fill="url(#card07a)"/>
  <text x="318" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="700" fill="#757575">Bicubic</text>
  <text x="318" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="500" fill="#9E9E9E">classic resize</text>
  <!-- AI model card (front, highlighted) -->
  <rect x="200" y="480" width="620" height="320" rx="20" fill="url(#card07b)"/>
  <!-- Checkmark indicator -->
  <circle cx="790" cy="520" r="40" fill="white"/>
  <polyline points="766,520 782,540 818,502" fill="none" stroke="#E65100" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="240" y="616" font-family="'Segoe UI',Arial,sans-serif" font-size="88" font-weight="900" fill="white">ESRGAN</text>
  <text x="240" y="704" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="600" fill="#FFF8E1">AI · ONNX model</text>
  <!-- Layer 3: x4 badge in corner of AI card -->
  <rect x="640" y="680" width="150" height="90" rx="16" fill="white" opacity="0.9"/>
  <text x="660" y="752" font-family="'Segoe UI',Arial,sans-serif" font-size="88" font-weight="900" fill="#E65100">×4</text>
</svg>
