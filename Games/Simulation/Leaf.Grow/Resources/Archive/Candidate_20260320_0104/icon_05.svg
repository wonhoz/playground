<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 꽃 피는 진화: 꽃잎 펼침 -->
  <!-- stem -->
  <line x1="512" y1="760" x2="512" y2="580" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <!-- two side leaves -->
  <path d="M512 680 Q440 640 420 580 Q490 590 512 660Z" fill="#2E7D32"/>
  <path d="M512 680 Q584 640 604 580 Q534 590 512 660Z" fill="#2E7D32"/>
  <!-- petals (6 petals radiating) -->
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(0 512 512)"/>
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(60 512 512)"/>
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(120 512 512)"/>
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(180 512 512)"/>
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(240 512 512)"/>
  <ellipse cx="512" cy="460" rx="44" ry="90" fill="#66BB6A" transform="rotate(300 512 512)"/>
  <!-- flower center -->
  <circle cx="512" cy="512" r="52" fill="#2E7D32"/>
  <circle cx="512" cy="512" r="30" fill="#66BB6A" opacity="0.8"/>
</svg>
