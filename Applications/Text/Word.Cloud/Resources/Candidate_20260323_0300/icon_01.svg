<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 단어 구름 배치 (빈도별 크기차이) | 공간/장면 | #0F172A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F172A"/>
  <!-- Layer 2: Word cloud layout -->
  <!-- Large words (high frequency) -->
  <text x="512" y="420" font-family="Arial,sans-serif" font-size="96" fill="#38BDF8" text-anchor="middle" font-weight="bold">구름</text>
  <text x="270" y="360" font-family="Arial,sans-serif" font-size="58" fill="#818CF8" text-anchor="middle" font-weight="bold">단어</text>
  <text x="760" y="370" font-family="Arial,sans-serif" font-size="52" fill="#34D399" text-anchor="middle" font-weight="bold">텍스트</text>
  <!-- Medium words -->
  <text x="190" y="490" font-family="Arial,sans-serif" font-size="36" fill="#FB923C" text-anchor="middle">빈도</text>
  <text x="820" y="480" font-family="Arial,sans-serif" font-size="32" fill="#F472B6" text-anchor="middle">언어</text>
  <text x="300" y="550" font-family="Arial,sans-serif" font-size="30" fill="#A78BFA" text-anchor="middle">분석</text>
  <text x="700" y="555" font-family="Arial,sans-serif" font-size="28" fill="#4ADE80" text-anchor="middle">시각화</text>
  <!-- Small words -->
  <text x="155" y="590" font-family="Arial,sans-serif" font-size="22" fill="#94A3B8" text-anchor="middle">words</text>
  <text x="855" y="600" font-family="Arial,sans-serif" font-size="20" fill="#64748B" text-anchor="middle">cloud</text>
  <text x="420" y="620" font-family="Arial,sans-serif" font-size="20" fill="#475569" text-anchor="middle">weight</text>
  <text x="620" y="610" font-family="Arial,sans-serif" font-size="18" fill="#334155" text-anchor="middle">rank</text>
  <text x="190" y="640" font-family="Arial,sans-serif" font-size="16" fill="#1E293B" opacity="0.8" text-anchor="middle">count</text>
  <!-- Layer 3: Frequency dots indicator -->
  <circle cx="512" cy="760" r="16" fill="#38BDF8"/>
  <circle cx="560" cy="764" r="11" fill="#818CF8"/>
  <circle cx="600" cy="767" r="8" fill="#34D399"/>
  <circle cx="630" cy="769" r="6" fill="#FB923C"/>
  <circle cx="652" cy="771" r="4" fill="#64748B"/>
  <text x="512" y="820" font-family="Arial,sans-serif" font-size="20" fill="#475569" text-anchor="middle">빈도 → 크기</text>
</svg>
