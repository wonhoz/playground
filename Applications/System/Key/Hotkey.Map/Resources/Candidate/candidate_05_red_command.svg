  <rect x="104" y="80" width="56" height="40" rx="8" fill="#2d0000" stroke="#ef4444" stroke-width="2"/>
  <text x="118" y="105" font-family="monospace" font-size="16" fill="#ef4444" font-weight="bold">F1</text>
  <rect x="172" y="80" width="56" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="186" y="105" font-family="monospace" font-size="16" fill="#b91c1c">F5</text>
  <rect x="240" y="80" width="56" height="40" rx="8" fill="#ef4444" opacity="0.85"/>
  <text x="254" y="105" font-family="monospace" font-size="16" fill="white" font-weight="bold">F9</text>
  <rect x="308" y="80" width="56" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="318" y="105" font-family="monospace" font-size="16" fill="#b91c1c">F12</text>
  <rect x="376" y="80" width="56" height="40" rx="8" fill="#2d0000" stroke="#ef4444" stroke-width="2"/>
