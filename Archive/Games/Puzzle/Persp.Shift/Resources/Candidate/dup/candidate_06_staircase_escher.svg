<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#999999" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#666666" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Penrose staircase (impossible staircase) simplified -->
  <!-- Top step -->
  <polygon points="156,156 256,116 356,156 356,196 256,236 156,196" fill="url(#step1)"/>
  <!-- Right descending steps -->
  <polygon points="356,156 396,176 396,276 356,256" fill="url(#step2)"/>
  <polygon points="356,196 396,216 396,316 356,296" fill="url(#step2)" opacity="0.7"/>
  <!-- Left descending steps -->
  <polygon points="156,156 116,176 116,276 156,256" fill="url(#step2)" opacity="0.8"/>
  <polygon points="156,196 116,216 116,316 156,296" fill="url(#step2)" opacity="0.6"/>
  <!-- Bottom step connecting (impossible) -->
  <polygon points="116,316 216,356 316,316 316,356 216,396 116,356" fill="url(#step1)" opacity="0.7"/>
  <!-- Connecting lines (impossible geometry) -->
  <line x1="316" y1="356" x2="396" y2="316" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Highlight edges -->
  <polyline points="156,156 256,116 356,156" fill="none" stroke="#ffffff" stroke-width="3"/>
  <polyline points="116,316 216,356 316,316" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
</svg>
