<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Spectrum analyzer bars rainbow -->
  <rect x="64" y="310" width="30" height="90" rx="5" fill="#FF4444" opacity="0.9"/>
  <rect x="104" y="280" width="30" height="120" rx="5" fill="#FF7744" opacity="0.9"/>
  <rect x="144" y="240" width="30" height="160" rx="5" fill="#FFAA44" opacity="0.9"/>
  <rect x="184" y="200" width="30" height="200" rx="5" fill="#FFEE44" opacity="0.9"/>
  <rect x="224" y="160" width="30" height="240" rx="5" fill="#88FF44" opacity="0.9"/>
  <rect x="264" y="180" width="30" height="220" rx="5" fill="#44FFAA" opacity="0.9"/>
  <rect x="304" y="210" width="30" height="190" rx="5" fill="#44CCFF" opacity="0.9"/>
  <rect x="344" y="255" width="30" height="145" rx="5" fill="#4488FF" opacity="0.9"/>
  <rect x="384" y="295" width="30" height="105" rx="5" fill="#AA44FF" opacity="0.9"/>
  <rect x="424" y="320" width="30" height="80" rx="5" fill="#FF44CC" opacity="0.9"/>
  <!-- Drop ball falling in center -->
  <circle cx="248" cy="100" r="26" fill="#FFEE44" opacity="0.95"/>
  <ellipse cx="240" cy="92" rx="7" ry="10" fill="white" opacity="0.35" transform="rotate(-20 240 92)"/>
  <!-- Motion line -->
  <line x1="248" y1="126" x2="248" y2="160" stroke="#FFEE44" stroke-width="3" stroke-dasharray="6,5" opacity="0.6"/>
  <!-- Floor line -->
  <line x1="64" y1="400" x2="454" y2="400" stroke="#333" stroke-width="2"/>
</svg>