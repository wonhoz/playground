<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 체크마크 폴더 계층 — 정리된 폴더 트리 | 레이어드 | #0F1A14 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1A14"/>
  <!-- Layer 2: Folder tree structure -->
  <!-- Root folder -->
  <rect x="280" y="200" width="180" height="70" rx="8" fill="#1A4A2A" stroke="#22AA5A" stroke-width="3"/>
  <rect x="280" y="185" width="70" height="20" rx="4" fill="#22AA5A"/>
  <text x="370" y="241" font-family="Arial,sans-serif" font-size="16" fill="#AAFFCC" text-anchor="middle" font-weight="bold">root</text>
  <!-- Root: cleaned badge -->
  <circle cx="484" cy="235" r="18" fill="#22AA5A"/>
  <text x="484" y="241" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">✓</text>
  <!-- Branch lines from root -->
  <line x1="370" y1="270" x2="370" y2="330" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="370" y1="330" x2="260" y2="330" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="370" y1="330" x2="512" y2="330" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="370" y1="330" x2="740" y2="330" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="260" y1="330" x2="260" y2="360" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="512" y1="330" x2="512" y2="360" stroke="#2A6A3A" stroke-width="3"/>
  <line x1="740" y1="330" x2="740" y2="360" stroke="#2A6A3A" stroke-width="3"/>
  <!-- Level 1 folders -->
  <rect x="180" y="360" width="160" height="60" rx="8" fill="#1A4A2A" stroke="#22AA5A" stroke-width="2"/>
  <rect x="180" y="347" width="60" height="16" rx="4" fill="#22AA5A"/>
  <text x="260" y="395" font-family="Arial,sans-serif" font-size="13" fill="#AAFFCC" text-anchor="middle">Documents</text>
  <circle cx="354" cy="390" r="14" fill="#22AA5A"/>
  <text x="354" y="396" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">✓</text>
  <rect x="432" y="360" width="160" height="60" rx="8" fill="#1A4A2A" stroke="#22AA5A" stroke-width="2"/>
  <rect x="432" y="347" width="60" height="16" rx="4" fill="#22AA5A"/>
  <text x="512" y="395" font-family="Arial,sans-serif" font-size="13" fill="#AAFFCC" text-anchor="middle">Downloads</text>
  <circle cx="606" cy="390" r="14" fill="#22AA5A"/>
  <text x="606" y="396" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">✓</text>
  <rect x="660" y="360" width="160" height="60" rx="8" fill="#2A1A0A" stroke="#FF8844" stroke-width="2" opacity="0.6"/>
  <rect x="660" y="347" width="60" height="16" rx="4" fill="#AA5522" opacity="0.6"/>
  <text x="740" y="395" font-family="Arial,sans-serif" font-size="13" fill="#FFBBAA" text-anchor="middle">Temp</text>
  <!-- Temp folder being deleted (X) -->
  <circle cx="834" cy="390" r="14" fill="#FF4444"/>
  <line x1="826" y1="382" x2="842" y2="398" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="842" y1="382" x2="826" y2="398" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Level 2 branches from Documents -->
  <line x1="260" y1="420" x2="260" y2="470" stroke="#2A6A3A" stroke-width="2"/>
  <line x1="260" y1="470" x2="210" y2="470" stroke="#2A6A3A" stroke-width="2"/>
  <line x1="260" y1="470" x2="310" y2="470" stroke="#2A6A3A" stroke-width="2"/>
  <line x1="210" y1="470" x2="210" y2="500" stroke="#2A6A3A" stroke-width="2"/>
  <line x1="310" y1="470" x2="310" y2="500" stroke="#2A6A3A" stroke-width="2"/>
  <!-- Level 2 folders -->
  <rect x="170" y="500" width="80" height="48" rx="6" fill="#1A4A2A" stroke="#22AA5A" stroke-width="2"/>
  <rect x="170" y="490" width="40" height="12" rx="3" fill="#22AA5A"/>
  <text x="210" y="530" font-family="Arial,sans-serif" font-size="10" fill="#AAFFCC" text-anchor="middle">Work</text>
  <rect x="270" y="500" width="80" height="48" rx="6" fill="#1A4A2A" stroke="#22AA5A" stroke-width="2"/>
  <rect x="270" y="490" width="40" height="12" rx="3" fill="#22AA5A"/>
  <text x="310" y="530" font-family="Arial,sans-serif" font-size="10" fill="#AAFFCC" text-anchor="middle">Personal</text>
  <!-- Layer 3: Stats summary at bottom -->
  <rect x="200" y="700" width="624" height="80" rx="12" fill="#0A2A18" stroke="#22AA5A" stroke-width="2"/>
  <text x="512" y="732" font-family="Arial,sans-serif" font-size="16" fill="#4ADE80" text-anchor="middle">✓ 8개 폴더 정리 완료</text>
  <text x="512" y="762" font-family="monospace" font-size="13" fill="#86EFAC" text-anchor="middle">Temp 폴더 삭제 → 2.3 GB 확보</text>
</svg>
