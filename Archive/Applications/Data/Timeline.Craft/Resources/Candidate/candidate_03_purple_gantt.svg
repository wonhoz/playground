<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Header row -->
  <rect x="56" y="72" width="400" height="40" rx="8" fill="#4A148C" stroke="#9C27B0" stroke-width="4"/>
  <!-- Time markers -->
  <rect x="160" y="76" width="2" height="32" fill="#CE93D8" opacity="0.6"/>
  <rect x="256" y="76" width="2" height="32" fill="#CE93D8" opacity="0.6"/>
  <rect x="352" y="76" width="2" height="32" fill="#CE93D8" opacity="0.6"/>
  <rect x="88" y="84" width="40" height="6" rx="3" fill="#E1BEE7" opacity="0.7"/>
  <rect x="180" y="84" width="40" height="6" rx="3" fill="#E1BEE7" opacity="0.7"/>
  <rect x="276" y="84" width="40" height="6" rx="3" fill="#E1BEE7" opacity="0.7"/>
  <rect x="372" y="84" width="40" height="6" rx="3" fill="#E1BEE7" opacity="0.7"/>
  <!-- Gantt rows -->
  <!-- Row 1 -->
  <rect x="56" y="128" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="160" y="120" width="192" height="24" rx="8" fill="url(#bar1)"/>
  <!-- Row 2 -->
  <rect x="56" y="176" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="208" y="168" width="144" height="24" rx="8" fill="url(#bar2)"/>
  <!-- Row 3 -->
  <rect x="56" y="224" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="160" y="216" width="96" height="24" rx="8" fill="url(#bar1)" opacity="0.9"/>
  <!-- Row 4 -->
  <rect x="56" y="272" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="256" y="264" width="160" height="24" rx="8" fill="url(#bar2)"/>
  <!-- Row 5 -->
  <rect x="56" y="320" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="176" y="312" width="224" height="24" rx="8" fill="url(#bar1)" opacity="0.85"/>
  <!-- Row 6 -->
  <rect x="56" y="368" width="104" height="8" rx="4" fill="#7B1FA2" opacity="0.8"/>
  <rect x="160" y="360" width="128" height="24" rx="8" fill="url(#bar2)" opacity="0.9"/>
  <!-- Today marker -->
  <line x1="312" y1="72" x2="312" y2="440" stroke="#FFCA28" stroke-width="4" stroke-dasharray="8,6" opacity="0.8"/>
  <!-- Vertical grid lines -->
  <line x1="160" y1="112" x2="160" y2="440" stroke="#CE93D8" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="112" x2="256" y2="440" stroke="#CE93D8" stroke-width="1" opacity="0.2"/>
  <line x1="352" y1="112" x2="352" y2="440" stroke="#CE93D8" stroke-width="1" opacity="0.2"/>
</svg>
