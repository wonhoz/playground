<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#2A1E00"/>
    </linearGradient>
    <linearGradient id="file" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CC9900"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File document shape -->
  <path d="M120 80 L340 80 L400 140 L400 440 L120 440 Z" fill="url(#file)" opacity="0.15" stroke="#FFD700" stroke-width="3"/>
  <!-- Folded corner -->
  <path d="M340 80 L340 140 L400 140 Z" fill="#FFD700" opacity="0.3"/>
  <!-- File content lines -->
  <rect x="148" y="170" width="220" height="12" rx="4" fill="#FFD700" opacity="0.4"/>
  <rect x="148" y="196" width="180" height="12" rx="4" fill="#CC9900" opacity="0.35"/>
  <rect x="148" y="222" width="200" height="12" rx="4" fill="#FFD700" opacity="0.4"/>
  <!-- Hash section divider -->
  <line x1="140" y1="250" x2="372" y2="250" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <!-- Hash rows with check marks -->
  <text x="152" y="276" fill="#FFAA00" font-size="12" font-family="monospace">MD5    a3f9b2c1...</text>
  <text x="356" y="276" fill="#00FF66" font-size="18" font-family="monospace">&#x2713;</text>
  <text x="152" y="302" fill="#FFAA00" font-size="12" font-family="monospace">SHA1   4d8e7f2c...</text>
  <text x="356" y="302" fill="#00FF66" font-size="18" font-family="monospace">&#x2713;</text>
  <text x="152" y="328" fill="#FFAA00" font-size="12" font-family="monospace">SHA256 b9c4a1e5...</text>
  <text x="356" y="328" fill="#00FF66" font-size="18" font-family="monospace">&#x2713;</text>
  <text x="152" y="354" fill="#FFAA00" font-size="12" font-family="monospace">SHA512 e2f7d3a8...</text>
  <text x="356" y="354" fill="#00FF66" font-size="18" font-family="monospace">&#x2713;</text>
  <!-- Verified stamp -->
  <circle cx="316" cy="148" r="38" fill="none" stroke="#00FF66" stroke-width="4" opacity="0.7" transform="rotate(-15 316 148)"/>
  <text x="316" y="140" text-anchor="middle" fill="#00FF66" font-size="14" font-family="monospace" font-weight="bold" transform="rotate(-15 316 148)">VALID</text>
  <text x="316" y="158" text-anchor="middle" fill="#00FF66" font-size="11" font-family="monospace" transform="rotate(-15 316 148)">CHECKSUM</text>
</svg>
