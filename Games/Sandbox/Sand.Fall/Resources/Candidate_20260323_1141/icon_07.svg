<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 미드나잇 블루 -->
  <rect width="1024" height="1024" rx="180" fill="#001830"/>
  <!-- Layer 2: 댐 + 물 흐름 -->
  <!-- 댐 구조물 -->
  <rect x="480" y="200" width="80" height="500" rx="8" fill="#546E7A"/>
  <rect x="460" y="200" width="120" height="40" rx="4" fill="#607D8B"/>
  <!-- 왼쪽 물 (높은 수위) -->
  <rect x="120" y="240" width="360" height="460" rx="8" fill="#1565C0" opacity="0.8"/>
  <!-- 물 표면 파동 -->
  <path d="M120,240 Q220,220 320,240 Q420,260 480,240" stroke="#42A5F5" stroke-width="6" fill="none" opacity="0.6"/>
  <!-- 오른쪽 (낮은 수위) -->
  <rect x="560" y="540" width="344" height="160" rx="8" fill="#0D47A1" opacity="0.7"/>
  <!-- 댐 아래 흘러나오는 물 -->
  <rect x="480" y="700" width="80" height="60" rx="4" fill="#2196F3" opacity="0.9"/>
  <!-- 물 흐름 -->
  <path d="M540,750 Q620,780 700,760 Q800,740 900,760" stroke="#42A5F5" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- 물 입자들 (올라가는) -->
  <rect x="280" y="200" width="16" height="16" rx="2" fill="#42A5F5" opacity="0.7"/>
  <rect x="310" y="185" width="14" height="14" rx="2" fill="#2196F3" opacity="0.6"/>
  <rect x="340" y="200" width="16" height="16" rx="2" fill="#64B5F6" opacity="0.8"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#42A5F5" text-anchor="middle">SAND.FALL</text>
</svg>
