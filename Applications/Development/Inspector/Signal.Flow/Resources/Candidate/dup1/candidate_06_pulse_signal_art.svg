<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a05"/>
      <stop offset="100%" stop-color="#001a10"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88"/>
      <stop offset="70%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#56CCF2" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heartglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Dark monitor display -->
  <rect x="60" y="120" width="392" height="280" rx="16" fill="#010f08" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <rect x="60" y="120" width="392" height="280" rx="16" fill="none" stroke="#00ff88" stroke-width="2"/>

  <!-- Monitor stand -->
  <rect x="220" y="400" width="72" height="18" rx="5" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <rect x="180" y="412" width="152" height="12" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>

  <!-- Grid lines on screen -->
  <g stroke="#003310" stroke-width="1">
    <line x1="60" y1="180" x2="452" y2="180"/>
    <line x1="60" y1="260" x2="452" y2="260"/>
    <line x1="60" y1="340" x2="452" y2="340"/>
    <line x1="160" y1="120" x2="160" y2="400"/>
    <line x1="256" y1="120" x2="256" y2="400"/>
    <line x1="352" y1="120" x2="352" y2="400"/>
  </g>

  <!-- ECG/Heartbeat style signal -->
  <!-- Flat, then spike, then flat -->
  <path d="M75,260 L155,260 L160,260 L170,220 L180,200 L190,300 L200,280 L210,260 L290,260 L295,260 L305,220 L315,200 L325,300 L335,280 L345,260 L437,260" fill="none" stroke="url(#pulseGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Moving dot on signal -->
  <circle cx="340" cy="250" r="8" fill="#00ff88" filter="url(#heartglow)"/>

  <!-- Vertical dashes from peaks -->
  <line x1="180" y1="200" x2="180" y2="260" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="315" y1="200" x2="315" y2="260" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Frequency markers on bottom -->
  <rect x="75" y="385" width="20" height="5" rx="2" fill="#00ff88" opacity="0.4"/>
  <rect x="105" y="385" width="20" height="5" rx="2" fill="#00ff88" opacity="0.35"/>
  <rect x="135" y="385" width="20" height="5" rx="2" fill="#56CCF2" opacity="0.3"/>
  <rect x="165" y="385" width="20" height="5" rx="2" fill="#56CCF2" opacity="0.25"/>
  <rect x="195" y="385" width="20" height="5" rx="2" fill="#56CCF2" opacity="0.2"/>

  <!-- Signal strength bars (right side) -->
  <rect x="425" y="350" width="14" height="30" rx="3" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <rect x="425" y="330" width="14" height="15" rx="3" fill="#56CCF2" opacity="0.7" filter="url(#glow)"/>
  <rect x="425" y="310" width="14" height="15" rx="3" fill="#ffd200" opacity="0.5" filter="url(#glow)"/>
  <rect x="425" y="290" width="14" height="15" rx="3" fill="#f7971e" opacity="0.35" filter="url(#glow)"/>
  <rect x="425" y="270" width="14" height="15" rx="3" fill="#555" opacity="0.3"/>
</svg>
