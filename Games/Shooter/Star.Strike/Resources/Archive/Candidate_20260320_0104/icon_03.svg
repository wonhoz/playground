<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#020510"/>
  <!-- Shooting star / meteor trails -->
  <line x1="820" y1="160" x2="300" y2="640" stroke="#5C6BC0" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="820" y1="160" x2="360" y2="600" stroke="#5C6BC0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="820" y1="160" x2="340" y2="580" stroke="#5C6BC0" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Meteor head -->
  <circle cx="820" cy="160" r="36" fill="#5C6BC0"/>
  <circle cx="820" cy="160" r="20" fill="#1A237E"/>
  <!-- Secondary meteor -->
  <line x1="700" y1="130" x2="260" y2="500" stroke="#1A237E" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="700" cy="130" r="24" fill="#1A237E"/>
  <circle cx="700" cy="130" r="12" fill="#5C6BC0" opacity="0.8"/>
  <!-- Impact star at landing -->
  <polygon points="300,640 314,680 358,680 322,704 336,748 300,724 264,748 278,704 242,680 286,680" fill="#5C6BC0"/>
  <circle cx="300" cy="640" r="50" fill="none" stroke="#5C6BC0" stroke-width="5" opacity="0.4"/>
  <circle cx="300" cy="640" r="80" fill="none" stroke="#1A237E" stroke-width="4" opacity="0.3"/>
</svg>
