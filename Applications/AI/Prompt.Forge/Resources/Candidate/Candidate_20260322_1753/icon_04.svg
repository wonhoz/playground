<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 라임 그린 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#22C55E"/>
  <!-- Layer 2: 클립보드 -->
  <!-- 클립보드 본체 -->
  <rect x="220" y="200" width="480" height="580" rx="24" fill="white"/>
  <!-- 클립 -->
  <rect x="370" y="170" width="180" height="70" rx="20" fill="#16A34A"/>
  <rect x="395" y="185" width="130" height="40" rx="10" fill="white"/>
  <!-- Layer 3: 텍스트 라인들 + 복사 화살표 -->
  <rect x="268" y="292" width="384" height="18" rx="4" fill="#CCCCCC"/>
  <rect x="268" y="326" width="320" height="18" rx="4" fill="#CCCCCC"/>
  <rect x="268" y="360" width="350" height="18" rx="4" fill="#CCCCCC"/>
  <!-- 복사 버튼 -->
  <rect x="268" y="500" width="384" height="64" rx="32" fill="#22C55E"/>
  <text x="460" y="540" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">Copy</text>
  <!-- 화살표 아이콘 -->
  <text x="590" y="542" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle">→</text>
  <!-- 복사 성공 체크 효과 (오른쪽 아래 배지) -->
  <circle cx="780" cy="750" r="80" fill="#16A34A"/>
  <polyline points="748,750 770,776 820,720" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
