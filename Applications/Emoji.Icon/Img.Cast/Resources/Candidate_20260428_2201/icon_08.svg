<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B3E5FC"/>
      <stop offset="1" stop-color="#4FC3F7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g8)"/>
  <!-- divider line -->
  <line x1="512" y1="220" x2="512" y2="820" stroke="#01579B" stroke-width="10" stroke-dasharray="14 14"/>
  <!-- left side: pixelated/raster heart -->
  <g transform="translate(120 320)">
    <text x="180" y="-40" font-family="Verdana, sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="#01579B">RASTER</text>
    <!-- pixel grid heart -->
    <g fill="#E91E63" stroke="#01579B" stroke-width="4">
      <rect x="40"  y="40" width="60" height="60"/>
      <rect x="100" y="40" width="60" height="60"/>
      <rect x="220" y="40" width="60" height="60"/>
      <rect x="280" y="40" width="60" height="60"/>
      <rect x="0"   y="100" width="60" height="60"/>
      <rect x="60"  y="100" width="60" height="60"/>
      <rect x="120" y="100" width="60" height="60"/>
      <rect x="180" y="100" width="60" height="60"/>
      <rect x="240" y="100" width="60" height="60"/>
      <rect x="300" y="100" width="60" height="60"/>
      <rect x="0"   y="160" width="60" height="60"/>
      <rect x="60"  y="160" width="60" height="60"/>
      <rect x="120" y="160" width="60" height="60"/>
      <rect x="180" y="160" width="60" height="60"/>
      <rect x="240" y="160" width="60" height="60"/>
      <rect x="300" y="160" width="60" height="60"/>
      <rect x="60"  y="220" width="60" height="60"/>
      <rect x="120" y="220" width="60" height="60"/>
      <rect x="180" y="220" width="60" height="60"/>
      <rect x="240" y="220" width="60" height="60"/>
      <rect x="120" y="280" width="60" height="60"/>
      <rect x="180" y="280" width="60" height="60"/>
    </g>
    <text x="180" y="420" font-family="Verdana, sans-serif" font-size="40" font-weight="900" text-anchor="middle" fill="#01579B">PNG</text>
  </g>
  <!-- right side: smooth vector heart -->
  <g transform="translate(560 320)">
    <text x="180" y="-40" font-family="Verdana, sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="#01579B">VECTOR</text>
    <path d="M 180 380 C 60 280 40 180 100 120 C 150 70 220 90 180 180 C 140 90 210 70 260 120 C 320 180 300 280 180 380 Z" fill="#E91E63" stroke="#01579B" stroke-width="14" stroke-linejoin="round"/>
    <text x="180" y="420" font-family="Verdana, sans-serif" font-size="40" font-weight="900" text-anchor="middle" fill="#01579B">SVG</text>
  </g>
  <!-- bottom convert arrow -->
  <g transform="translate(380 850)">
    <rect x="0" y="20" width="200" height="40" rx="20" fill="#FFEB3B" stroke="#01579B" stroke-width="10"/>
    <polygon points="180,0 280,40 180,80" fill="#FFEB3B" stroke="#01579B" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
