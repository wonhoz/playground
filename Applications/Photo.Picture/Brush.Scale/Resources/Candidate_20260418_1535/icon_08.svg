<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 좌측 패널: 저해상도 픽셀 격자 -->
    <rect x="80" y="180" width="380" height="660" rx="24" fill="url(#leftPanel)"/>
    <!-- 픽셀 격자 (대형, 흐릿한 느낌) -->
    <rect x="100" y="200" width="86" height="86" rx="8" fill="#78909C"/>
    <rect x="194" y="200" width="86" height="86" rx="8" fill="#607D8B"/>
    <rect x="288" y="200" width="86" height="86" rx="8" fill="#78909C"/>
    <rect x="382" y="200" width="70" height="86" rx="8" fill="#90A4AE"/>
    <rect x="100" y="294" width="86" height="86" rx="8" fill="#607D8B"/>
    <rect x="194" y="294" width="86" height="86" rx="8" fill="#78909C"/>
    <rect x="288" y="294" width="86" height="86" rx="8" fill="#B0BEC5"/>
    <rect x="382" y="294" width="70" height="86" rx="8" fill="#607D8B"/>
    <rect x="100" y="388" width="86" height="86" rx="8" fill="#90A4AE"/>
    <rect x="194" y="388" width="86" height="86" rx="8" fill="#546E7A"/>
    <rect x="288" y="388" width="86" height="86" rx="8" fill="#78909C"/>
    <rect x="382" y="388" width="70" height="86" rx="8" fill="#90A4AE"/>
    <rect x="100" y="482" width="86" height="86" rx="8" fill="#607D8B"/>
    <rect x="194" y="482" width="86" height="86" rx="8" fill="#B0BEC5"/>
    <rect x="288" y="482" width="86" height="86" rx="8" fill="#546E7A"/>
    <rect x="382" y="482" width="70" height="86" rx="8" fill="#78909C"/>
    <!-- 저해상도 라벨 -->
    <rect x="110" y="700" width="240" height="60" rx="18" fill="#546E7A"/>
    <text x="230" y="738" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">저해상도</text>
    <!-- 픽셀 크기 표시 -->
    <text x="230" y="790" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#546E7A" text-anchor="middle">256×256</text>

    <!-- 중앙 AI 화살표 -->
    <circle cx="512" cy="512" r="80" fill="#00897B"/>
    <text x="512" y="540" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">AI</text>
    <!-- 화살표 -->
    <text x="512" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#00897B" text-anchor="middle">↓</text>
    <text x="512" y="618" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#00897B" text-anchor="middle">↓</text>
    <!-- 수평 화살표 -->
    <text x="400" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#26A69A" text-anchor="middle">→</text>
    <text x="624" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#26A69A" text-anchor="middle">→</text>

    <!-- 우측 패널: 고해상도 선명한 이미지 -->
    <rect x="564" y="180" width="380" height="660" rx="24" fill="url(#rightPanel)"/>
    <!-- 선명한 이미지 내용 -->
    <!-- 하늘 부분 -->
    <rect x="580" y="196" width="348" height="200" rx="16" fill="#0288D1" opacity="0.8"/>
    <circle cx="700" cy="266" r="54" fill="#FFD54F"/>
    <ellipse cx="800" cy="300" rx="60" ry="28" fill="#FFFFFF" opacity="0.7"/>
    <!-- 땅 부분 -->
    <rect x="580" y="396" width="348" height="120" rx="4" fill="#388E3C" opacity="0.9"/>
    <rect x="580" y="476" width="348" height="60" rx="4" fill="#2E7D32"/>
    <!-- 나무 -->
    <rect x="650" y="380" width="20" height="96" rx="6" fill="#4E342E"/>
    <ellipse cx="660" cy="366" rx="40" ry="36" fill="#43A047"/>
    <rect x="850" y="390" width="18" height="86" rx="6" fill="#4E342E"/>
    <ellipse cx="859" cy="376" rx="36" ry="32" fill="#388E3C"/>
    <!-- 고해상도 라벨 -->
    <rect x="594" y="700" width="240" height="60" rx="18" fill="#004D40"/>
    <text x="714" y="738" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">고해상도</text>
    <text x="714" y="790" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#80CBC4" text-anchor="middle">1024×1024</text>

    <!-- 타이틀 -->
    <rect x="212" y="880" width="600" height="70" rx="24" fill="#004D40"/>
    <text x="512" y="927" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
  </g>
</svg>
