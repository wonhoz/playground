<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a001a"/>
      <stop offset="100%" style="stop-color:#001a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hot">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground -->
  <line x1="40" y1="400" x2="472" y2="400" stroke="#aa00ff" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- Obstacles -->
  <!-- Obstacle 1 - wall -->
  <rect x="320" y="330" width="22" height="70" rx="4" fill="none" stroke="#ff4400" stroke-width="2.5" filter="url(#hot)"/>
  <line x1="320" y1="345" x2="342" y2="345" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="360" x2="342" y2="360" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="375" x2="342" y2="375" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
  <!-- Obstacle 2 - spike -->
  <polygon points="370,400 382,355 394,400" fill="none" stroke="#ff0066" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="382" y1="355" x2="382" y2="400" stroke="#ff0066" stroke-width="1" opacity="0.4"/>
  <!-- Obstacle 3 - rotating ring -->
  <circle cx="430" cy="365" r="22" fill="none" stroke="#ffaa00" stroke-width="2.5" filter="url(#glow)" stroke-dasharray="8,4"/>
  <line x1="408" y1="365" x2="452" y2="365" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <line x1="430" y1="343" x2="430" y2="387" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Runner jumping -->
  <g filter="url(#glow)" transform="translate(240, 340)">
    <!-- Runner in jump pose -->
    <circle cx="0" cy="-62" r="14" fill="none" stroke="#aa00ff" stroke-width="2.5"/>
    <line x1="0" y1="-47" x2="0" y2="-8" stroke="#aa00ff" stroke-width="3"/>
    <line x1="0" y1="-32" x2="-22" y2="-18" stroke="#cc44ff" stroke-width="2.5"/>
    <line x1="0" y1="-32" x2="20" y2="-44" stroke="#aa00ff" stroke-width="2.5"/>
    <!-- Jump legs -->
    <line x1="0" y1="-8" x2="-18" y2="15" stroke="#cc44ff" stroke-width="2.5"/>
    <line x1="-18" y1="15" x2="-28" y2="5" stroke="#cc44ff" stroke-width="2"/>
    <line x1="0" y1="-8" x2="20" y2="10" stroke="#aa00ff" stroke-width="2.5"/>
    <line x1="20" y1="10" x2="32" y2="22" stroke="#aa00ff" stroke-width="2"/>
  </g>
  <!-- Jump shadow -->
  <ellipse cx="240" cy="402" rx="20" ry="6" fill="#aa00ff" opacity="0.3" filter="url(#glow)"/>
  <!-- Speed trail -->
  <path d="M80 348 Q160 340 225 342" stroke="#aa00ff" stroke-width="4" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.7"/>
  <path d="M80 356 Q155 349 220 351" stroke="#cc44ff" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.4"/>
  <path d="M90 338 Q155 333 218 335" stroke="#aa00ff" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.3"/>
</svg>