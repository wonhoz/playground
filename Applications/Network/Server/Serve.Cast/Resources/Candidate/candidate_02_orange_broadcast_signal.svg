<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#3d1a00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ant" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffab40"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Tower base -->
  <polygon points="256,110 230,370 282,370" fill="url(#ant)"/>
  <rect x="200" y="355" width="112" height="20" rx="8" fill="#ff6d00"/>
  <rect x="180" y="370" width="152" height="16" rx="6" fill="#e65100"/>
