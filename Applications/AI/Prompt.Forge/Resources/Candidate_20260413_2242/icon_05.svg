<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>
  <!-- AI Brain shape (simplified) -->
  <!-- Left hemisphere -->
  <path d="M 512,190 Q 380,190 310,280 Q 240,370 270,470 Q 290,540 370,570 L 512,570 Z"
        fill="#FFE082" stroke="#F9A825" stroke-width="16" stroke-linejoin="round"/>
  <!-- Right hemisphere -->
  <path d="M 512,190 Q 644,190 714,280 Q 784,370 754,470 Q 734,540 654,570 L 512,570 Z"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="16" stroke-linejoin="round"/>
  <!-- Brain center divider -->
  <line x1="512" y1="195" x2="512" y2="565" stroke="#F9A825" stroke-width="12" stroke-dasharray="16,12"/>
  <!-- Brain folds (wavy lines) -->
  <path d="M 330,300 Q 360,280 390,300 Q 420,320 450,300" fill="none" stroke="#E65100" stroke-width="10" stroke-linecap="round"/>
  <path d="M 330,360 Q 355,340 380,360 Q 405,380 430,360" fill="none" stroke="#E65100" stroke-width="10" stroke-linecap="round"/>
  <path d="M 574,300 Q 604,280 634,300 Q 664,320 694,300" fill="none" stroke="#E65100" stroke-width="10" stroke-linecap="round"/>
  <path d="M 574,360 Q 599,340 624,360 Q 649,380 674,360" fill="none" stroke="#E65100" stroke-width="10" stroke-linecap="round"/>
  <!-- "AI" label inside brain -->
  <text x="512" y="510" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#E65100" text-anchor="middle">AI</text>
  <!-- Prompt output arrow + text line -->
  <rect x="350" y="582" width="324" height="46" rx="22" fill="#E65100" stroke="#BF360C" stroke-width="12"/>
  <path d="M 670,556 L 730,605 L 670,654 Z" fill="#E65100" stroke="#BF360C" stroke-width="12" stroke-linejoin="round"/>
  <!-- AI badge -->
  <rect x="188" y="744" width="648" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">AI PROMPT</text>
</svg>
