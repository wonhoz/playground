<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 마법 지팡이 — 포맷이 즉시 변신하는 은유 | 중앙 심볼 | 코랄+보라+금 -->
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
    <filter id="sh5" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#BF360C" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="wand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Layer 2: Magic wand (diagonal) -->
  <!-- Wand shaft -->
  <rect x="340" y="200" width="80" height="560" rx="40"
        fill="url(#wand)" transform="rotate(45, 512, 512)" filter="url(#sh5)"/>
  <!-- Wand tip star -->
  <g transform="translate(760, 260)" filter="url(#sh5)">
    <!-- 8-point star -->
    <polygon points="0,-90 21,-21 90,0 21,21 0,90 -21,21 -90,0 -21,-21" fill="#FFD700"/>
    <polygon points="0,-60 15,-15 60,0 15,15 0,60 -15,15 -60,0 -15,-15" fill="#FFF176"/>
    <circle r="20" fill="white"/>
  </g>

  <!-- Layer 3: Floating format labels transformed by wand -->
  <!-- Before: SVG (top-left, grayish) -->
  <rect x="90" y="150" width="200" height="90" rx="18" fill="white" opacity="0.6" filter="url(#sh5)"/>
  <text x="190" y="195" font-family="Arial Black, sans-serif" font-size="56" font-weight="900"
        fill="#7B1FA2" text-anchor="middle" dominant-baseline="middle">SVG</text>

  <!-- After: ICO (bottom-right, vivid gold) -->
  <rect x="680" y="720" width="220" height="100" rx="20" fill="#FFD700" filter="url(#sh5)"/>
  <text x="790" y="770" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
        fill="#4A148C" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- Sparkles around wand path -->
  <circle cx="400" cy="400" r="22" fill="#FFF176" filter="url(#sh5)"/>
  <circle cx="460" cy="340" r="15" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="560" cy="480" r="18" fill="#FFF176" filter="url(#sh5)"/>
  <circle cx="620" cy="420" r="12" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="340" cy="520" r="14" fill="#FFF9C4" opacity="0.9"/>

  <!-- Arrow showing transformation -->
  <path d="M230,340 Q320,460 310,580" stroke="white" stroke-width="8" fill="none"
        stroke-dasharray="20,14" stroke-linecap="round" opacity="0.7"/>
  <polygon points="290,590 340,560 330,610" fill="white" opacity="0.7"/>
</svg>
