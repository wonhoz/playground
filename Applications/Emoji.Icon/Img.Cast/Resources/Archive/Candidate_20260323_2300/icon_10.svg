<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
    <linearGradient id="progressFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="75%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 파일 목록 영역 -->
    <rect x="120" y="180" width="784" height="440" rx="20" fill="#0F766E" opacity="0.5"/>
    <!-- 파일 항목들 -->
    <!-- 항목 1 (완료) -->
    <rect x="150" y="210" width="724" height="72" rx="12" fill="#115E59" opacity="0.8"/>
    <rect x="168" y="228" width="36" height="36" rx="6" fill="#6EE7B7"/>
    <text x="224" y="258" font-family="system-ui, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">portrait.png</text>
    <text x="820" y="258" text-anchor="end" font-family="system-ui, sans-serif" font-size="32" fill="#A7F3D0" font-weight="bold">✓ ICO</text>
    <!-- 항목 2 (완료) -->
    <rect x="150" y="294" width="724" height="72" rx="12" fill="#115E59" opacity="0.8"/>
    <rect x="168" y="312" width="36" height="36" rx="6" fill="#6EE7B7"/>
    <text x="224" y="342" font-family="system-ui, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">logo.svg</text>
    <text x="820" y="342" text-anchor="end" font-family="system-ui, sans-serif" font-size="32" fill="#A7F3D0" font-weight="bold">✓ ICO</text>
    <!-- 항목 3 (진행 중) -->
    <rect x="150" y="378" width="724" height="72" rx="12" fill="#0D9488" opacity="0.9"/>
    <rect x="168" y="396" width="36" height="36" rx="6" fill="#FDE68A"/>
    <text x="224" y="426" font-family="system-ui, sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">banner.jpg</text>
    <text x="820" y="426" text-anchor="end" font-family="system-ui, sans-serif" font-size="32" fill="#FDE68A" font-weight="bold">⏳ 75%</text>
    <!-- 항목 4 (대기) -->
    <rect x="150" y="462" width="724" height="72" rx="12" fill="#115E59" opacity="0.4"/>
    <rect x="168" y="480" width="36" height="36" rx="6" fill="#475569"/>
    <text x="224" y="510" font-family="system-ui, sans-serif" font-size="36" fill="#94A3B8" font-weight="bold">icon_set.bmp</text>
    <text x="820" y="510" text-anchor="end" font-family="system-ui, sans-serif" font-size="32" fill="#475569" font-weight="bold">Queued</text>
    <!-- 진행률 바 -->
    <rect x="120" y="660" width="784" height="50" rx="25" fill="#115E59"/>
    <rect x="120" y="660" width="588" height="50" rx="25" fill="url(#progressFill)"/>
    <!-- 진행률 텍스트 -->
    <text x="512" y="780" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="bold" fill="#A7F3D0">3 / 4  Converting...</text>
  </g>
</svg>
