<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <radialGradient id="engineGlow10" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg10)"/>
  <!-- Engine glow -->
  <ellipse cx="512" cy="660" rx="150" ry="90" fill="url(#engineGlow10)"/>
  <!-- Cyan spaceship -->
  <polygon points="512,260 390,620 512,570 634,620" fill="#00FFFF" stroke="#80FFFF" stroke-width="12" stroke-linejoin="round"/>
  <!-- Cockpit -->
  <ellipse cx="512" cy="430" rx="44" ry="60" fill="#A5F3FC"/>
  <!-- Engine flame -->
  <polygon points="455,620 512,720 569,620" fill="#FF6B00" opacity="0.9"/>
  <polygon points="472,620 512,700 552,620" fill="#FFD700"/>
  <!-- Neon pink bullets -->
  <circle cx="220" cy="300" r="36" fill="#FF10F0" stroke="#FF80F8" stroke-width="8"/>
  <circle cx="790" cy="280" r="36" fill="#FF10F0" stroke="#FF80F8" stroke-width="8"/>
  <circle cx="180" cy="480" r="36" fill="#FF10F0" stroke="#FF80F8" stroke-width="8"/>
  <circle cx="840" cy="460" r="36" fill="#FF10F0" stroke="#FF80F8" stroke-width="8"/>
  <!-- Neon green bullets -->
  <circle cx="240" cy="680" r="36" fill="#39FF14" stroke="#90FF70" stroke-width="8"/>
  <circle cx="780" cy="660" r="36" fill="#39FF14" stroke="#90FF70" stroke-width="8"/>
  <circle cx="350" cy="240" r="28" fill="#39FF14" stroke="#90FF70" stroke-width="8"/>
  <circle cx="660" cy="240" r="28" fill="#FF10F0" stroke="#FF80F8" stroke-width="8"/>
  <!-- BLITZ text -->
  <text x="512" y="870" font-family="Arial Black, sans-serif" font-size="92" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">BLITZ</text>
</svg>