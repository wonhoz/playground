<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FFF1F2"/>
  <!-- Layer 2: Stethoscope -->
  <!-- Ear tube (upper arc) -->
  <path d="M 260 280 Q 240 180 310 160 Q 380 140 380 240" stroke="#DC2626" stroke-width="30" fill="none" stroke-linecap="round"/>
  <path d="M 760 280 Q 780 180 710 160 Q 640 140 640 240" stroke="#DC2626" stroke-width="30" fill="none" stroke-linecap="round"/>
  <!-- Ear tips -->
  <circle cx="260" cy="285" r="18" fill="#DC2626"/>
  <circle cx="760" cy="285" r="18" fill="#DC2626"/>
  <circle cx="380" cy="244" r="16" fill="#B91C1C"/>
  <circle cx="640" cy="244" r="16" fill="#B91C1C"/>
  <!-- Main tube -->
  <path d="M 390 244 Q 450 330 512 350 Q 574 330 630 244" stroke="#DC2626" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M 512 350 L 512 680" stroke="#DC2626" stroke-width="26" stroke-linecap="round"/>
  <!-- Chest piece -->
  <circle cx="512" cy="720" r="90" fill="#DC2626"/>
  <circle cx="512" cy="720" r="68" fill="#FFF1F2"/>
  <circle cx="512" cy="720" r="46" fill="#DC2626"/>
  <!-- Heartbeat line on chest piece -->
  <polyline points="468,720 484,720 492,690 502,750 512,700 522,740 532,720 548,720" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Layer 3: Server device hint -->
  <rect x="360" y="820" width="304" height="80" rx="14" fill="#F1F5F9" stroke="#DC2626" stroke-width="3"/>
  <text x="512" y="865" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">API Server</text>
  <circle cx="424" cy="860" r="8" fill="#22C55E"/>
</svg>