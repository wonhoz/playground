<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="album1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="album2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="album3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Album stack back -->
  <rect x="160" y="140" width="220" height="280" rx="12" fill="url(#album1)" transform="rotate(-8,270,280)" filter="url(#shadow)"/>
  <!-- Album middle -->
  <rect x="150" y="130" width="220" height="280" rx="12" fill="url(#album2)" transform="rotate(4,260,270)" filter="url(#shadow)"/>
  <!-- Album front -->
  <rect x="140" y="120" width="220" height="280" rx="12" fill="url(#album3)" filter="url(#shadow)"/>
  <!-- Photo on front album -->
  <rect x="164" y="148" width="172" height="120" rx="8" fill="white" opacity="0.15"/>
  <circle cx="210" cy="192" r="28" fill="white" opacity="0.2"/>
  <polygon points="198,212 238,212 218,178" fill="white" opacity="0.35"/>
  <!-- Mountain landscape hint -->
  <path d="M164 268 L200 228 L236 255 L260 238 L306 268 Z" fill="white" opacity="0.25"/>
  <!-- Album binding lines -->
  <rect x="140" y="120" width="20" height="280" rx="4" fill="white" opacity="0.15"/>
  <line x1="150" y1="140" x2="150" y2="380" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>