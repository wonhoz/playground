  <circle cx="340" cy="180" r="8" fill="#69F0AE"/>
  <circle cx="362" cy="180" r="8" fill="#69F0AE"/>
  <circle cx="340" cy="245" r="8" fill="#FFD740"/>
  <circle cx="362" cy="245" r="8" fill="#69F0AE"/>
  <circle cx="340" cy="310" r="8" fill="#69F0AE"/>
  <circle cx="362" cy="310" r="8" fill="#69F0AE"/>
  <!-- Slash bar labels -->
  <rect x="148" y="167" width="70" height="14" rx="4" fill="#37474F"/>
  <rect x="148" y="232" width="90" height="14" rx="4" fill="#37474F"/>
  <rect x="148" y="297" width="50" height="14" rx="4" fill="#37474F"/>
