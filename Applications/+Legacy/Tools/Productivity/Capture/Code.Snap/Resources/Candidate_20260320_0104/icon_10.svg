<!-- Code.Snap icon_10: 돋보기 코드 확대 (magnifier enlarging code) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A1A0A"/>
  <!-- Magnifier circle -->
  <circle cx="460" cy="460" r="260" fill="#0F2A0F" stroke="#43A047" stroke-width="40"/>
  <!-- Handle -->
  <line x1="660" y1="660" x2="820" y2="820" stroke="#43A047" stroke-width="52" stroke-linecap="round"/>
  <!-- Enlarged code inside lens -->
  <rect x="300" y="380" width="200" height="32" rx="8" fill="#43A047"/>
  <rect x="300" y="428" width="280" height="32" rx="8" fill="#2E7D32"/>
  <rect x="300" y="476" width="160" height="32" rx="8" fill="#43A047"/>
</svg>
