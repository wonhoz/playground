<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 인디고 -->
  <rect width="1024" height="1024" rx="180" fill="#1A1035"/>
  <!-- Layer 2: 워드 클라우드 (크기별 단어 배치) -->
  <!-- 가장 큰 단어들 (중앙) -->
  <text x="512" y="460" font-family="Arial Black,Arial" font-size="148" font-weight="900" fill="#7C4DFF" text-anchor="middle">word</text>
  <text x="512" y="590" font-family="Arial Black,Arial" font-size="128" font-weight="900" fill="#E040FB" text-anchor="middle">cloud</text>
  <!-- 중간 단어들 -->
  <text x="200" y="340" font-family="Arial" font-size="64" font-weight="700" fill="#00BCD4" text-anchor="middle">text</text>
  <text x="820" y="340" font-family="Arial" font-size="60" font-weight="700" fill="#FF4081" text-anchor="middle">data</text>
  <text x="160" y="520" font-family="Arial" font-size="52" font-weight="700" fill="#FFD740" text-anchor="middle">tag</text>
  <text x="870" y="530" font-family="Arial" font-size="56" font-weight="700" fill="#69F0AE" text-anchor="middle">freq</text>
  <!-- 작은 단어들 -->
  <text x="280" y="680" font-family="Arial" font-size="40" fill="#B39DDB" text-anchor="middle">font</text>
  <text x="740" y="680" font-family="Arial" font-size="38" fill="#80CBC4" text-anchor="middle">size</text>
  <text x="512" y="720" font-family="Arial" font-size="36" fill="#FFCC02" text-anchor="middle">visual</text>
  <!-- Layer 3: 배경 포인트들 -->
  <circle cx="130" cy="200" r="8" fill="#7C4DFF" opacity="0.5"/>
  <circle cx="900" cy="200" r="6" fill="#E040FB" opacity="0.4"/>
  <circle cx="512" cy="150" r="5" fill="#00BCD4" opacity="0.4"/>
</svg>
