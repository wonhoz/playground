<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 레이어스택사양: stacked layer cards for specs -->
  <!-- Layer 3 (bottom, darkest) -->
  <rect x="280" y="600" width="480" height="120" rx="16" fill="#2E7D32" opacity="0.4"/>
  <line x1="316" y1="640" x2="480" y2="640" stroke="#81C784" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="316" y1="665" x2="440" y2="665" stroke="#2E7D32" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Layer 2 (middle) -->
  <rect x="250" y="480" width="480" height="140" rx="16" fill="#2E7D32" opacity="0.6"/>
  <line x1="286" y1="524" x2="520" y2="524" stroke="#81C784" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <line x1="286" y1="552" x2="460" y2="552" stroke="#81C784" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="286" y1="576" x2="490" y2="576" stroke="#81C784" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Layer 1 (top, brightest) -->
  <rect x="220" y="340" width="480" height="160" rx="16" fill="#2E7D32"/>
  <line x1="256" y1="385" x2="540" y2="385" stroke="#81C784" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="415" x2="490" y2="415" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="443" x2="510" y2="443" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="470" x2="470" y2="470" stroke="#81C784" stroke-width="5" stroke-linecap="round"/>
  <!-- Icons on top layer right side -->
  <rect x="564" y="370" width="100" height="80" rx="8" fill="#050A05"/>
  <line x1="584" y1="390" x2="644" y2="390" stroke="#81C784" stroke-width="4"/>
  <line x1="584" y1="406" x2="634" y2="406" stroke="#81C784" stroke-width="3"/>
  <line x1="584" y1="420" x2="640" y2="420" stroke="#81C784" stroke-width="3"/>
  <line x1="584" y1="434" x2="630" y2="434" stroke="#81C784" stroke-width="3"/>
  <!-- Layer edge connectors -->
  <line x1="700" y1="340" x2="730" y2="370" stroke="#81C784" stroke-width="4" stroke-dasharray="8 6" opacity="0.5"/>
  <line x1="700" y1="480" x2="730" y2="500" stroke="#81C784" stroke-width="4" stroke-dasharray="8 6" opacity="0.4"/>
  <line x1="700" y1="600" x2="730" y2="615" stroke="#81C784" stroke-width="4" stroke-dasharray="8 6" opacity="0.3"/>
</svg>