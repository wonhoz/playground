<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="xpbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="codebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code brackets -->
  <text x="130" y="230" font-size="100" fill="#7B1FA2" font-family="Courier New" opacity="0.5">&lt;/&gt;</text>
  <!-- XP bars -->
  <rect x="100" y="280" width="312" height="20" rx="10" fill="#4A148C"/>
  <rect x="100" y="280" width="260" height="20" rx="10" fill="url(#xpbar)"/>
  <text x="100" y="274" font-size="12" fill="#CE93D8" font-family="Arial">XP</text>
  <text x="372" y="274" font-size="12" fill="#CE93D8" font-family="Arial" text-anchor="end">8,320 / 10,000</text>
  <rect x="100" y="316" width="312" height="18" rx="9" fill="#4A148C"/>
  <rect x="100" y="316" width="200" height="18" rx="9" fill="url(#codebar)" opacity="0.85"/>
  <text x="100" y="310" font-size="12" fill="#CE93D8" font-family="Arial">CODE</text>
  <rect x="100" y="350" width="312" height="18" rx="9" fill="#4A148C"/>
  <rect x="100" y="350" width="290" height="18" rx="9" fill="url(#codebar)" opacity="0.7"/>
  <text x="100" y="344" font-size="12" fill="#CE93D8" font-family="Arial">BUG FIX</text>
  <!-- Level badge -->
  <circle cx="392" cy="170" r="48" fill="#7B1FA2"/>
  <text x="392" y="162" text-anchor="middle" font-size="13" fill="#E1BEE7" font-family="Arial">LV</text>
  <text x="392" y="192" text-anchor="middle" font-size="32" fill="white" font-weight="bold" font-family="Arial">42</text>
</svg>
