<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: light mint -->
  <rect width="1024" height="1024" rx="190" fill="#ECFDF5"/>

  <!-- Code editor panel -->
  <rect x="120" y="180" width="784" height="664" rx="24" fill="#1E293B"/>

  <!-- Editor top bar -->
  <rect x="120" y="180" width="784" height="54" rx="24" fill="#0F172A"/>
  <rect x="120" y="206" width="784" height="28" fill="#0F172A"/>
  <!-- Window dots -->
  <circle cx="172" cy="207" r="12" fill="#EF4444"/>
  <circle cx="212" cy="207" r="12" fill="#F59E0B"/>
  <circle cx="252" cy="207" r="12" fill="#22C55E"/>

  <!-- Line numbers column -->
  <rect x="120" y="234" width="68" height="610" fill="#1A2540"/>

  <!-- Code lines: dark background -->
  <!-- Line 1: dimmed -->
  <rect x="188" y="250" width="690" height="44" rx="0" fill="transparent"/>
  <text x="204" y="281" font-family="Consolas,monospace" font-size="28" fill="#64748B">C:/Users/admin/</text>
  <text x="158" y="281" font-family="Consolas,monospace" font-size="26" fill="#334155">1</text>

  <!-- Line 2: selected / highlighted -->
  <rect x="188" y="298" width="690" height="44" fill="#1D4ED8"/>
  <text x="204" y="329" font-family="Consolas,monospace" font-size="28" fill="white" font-weight="bold">C:\Users\admin\</text>
  <text x="158" y="329" font-family="Consolas,monospace" font-size="26" fill="#93C5FD">2</text>

  <!-- Line 3: dimmed -->
  <rect x="188" y="346" width="690" height="44" fill="transparent"/>
  <text x="204" y="377" font-family="Consolas,monospace" font-size="28" fill="#64748B">C:/c/Users/admin/</text>
  <text x="158" y="377" font-family="Consolas,monospace" font-size="26" fill="#334155">3</text>

  <!-- Line 4: dimmed -->
  <rect x="188" y="394" width="690" height="44" fill="transparent"/>
  <text x="204" y="425" font-family="Consolas,monospace" font-size="28" fill="#64748B">file:///C:/Users/</text>
  <text x="158" y="425" font-family="Consolas,monospace" font-size="26" fill="#334155">4</text>

  <!-- Line 5: -->
  <rect x="188" y="442" width="690" height="44" fill="transparent"/>
  <text x="204" y="473" font-family="Consolas,monospace" font-size="28" fill="#64748B">C:\\Users\\admin\\</text>
  <text x="158" y="473" font-family="Consolas,monospace" font-size="26" fill="#334155">5</text>

  <!-- Highlight glow for selected line -->
  <rect x="188" y="298" width="690" height="44" fill="#3B82F6" opacity="0.15"/>

  <!-- Copy button top-right of editor -->
  <rect x="760" y="248" width="118" height="40" rx="8" fill="#3B82F6"/>
  <text x="819" y="273" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">Copy</text>

  <!-- Bottom status bar -->
  <rect x="120" y="796" width="784" height="48" rx="0" fill="#0F172A"/>
  <rect x="120" y="820" width="784" height="24" rx="0" fill="#0F172A"/>
  <rect x="120" y="820" width="784" height="24" rx="0" fill="#1E3A5F" opacity="0.5"/>
  <text x="160" y="833" font-family="Consolas,monospace" font-size="20" fill="#60A5FA">full path (backslash)</text>
</svg>
