<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#4C1D95"/>
  <!-- Layer 2: Markdown symbols on left -->
  <text x="165" y="360" font-family="Consolas,monospace" font-size="68" fill="#C4B5FD" font-weight="bold">#</text>
  <text x="165" y="450" font-family="Consolas,monospace" font-size="48" fill="#DDD6FE">**bold**</text>
  <text x="165" y="530" font-family="Consolas,monospace" font-size="44" fill="#C4B5FD">`code`</text>
  <text x="165" y="610" font-family="Consolas,monospace" font-size="44" fill="#DDD6FE">- list</text>
  <!-- Arrow in center -->
  <line x1="480" y1="490" x2="600" y2="490" stroke="#F97316" stroke-width="16" stroke-linecap="round"/>
  <polygon points="600,470 640,490 600,510" fill="#F97316"/>
  <!-- Layer 3: Rendered result on right -->
  <text x="660" y="355" font-family="Arial,sans-serif" font-size="52" fill="#FDE68A" font-weight="bold">제목</text>
  <line x1="658" y1="372" x2="858" y2="372" stroke="#FDE68A" stroke-width="4" opacity="0.7"/>
  <text x="660" y="435" font-family="Arial,sans-serif" font-size="36" fill="white" font-weight="bold">bold</text>
  <rect x="658" y="462" width="200" height="42" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="670" y="490" font-family="Consolas,monospace" font-size="26" fill="#FB923C">code</text>
  <text x="660" y="560" font-family="Arial,sans-serif" font-size="30" fill="white">• list</text>
  <!-- Glow line divider -->
  <line x1="512" y1="200" x2="512" y2="780" stroke="#7C3AED" stroke-width="3" opacity="0.4"/>
</svg>