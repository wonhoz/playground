<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background mauve purple -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: Paint brush stroke enhancing image -->
  <!-- Canvas/image being painted -->
  <rect x="160" y="300" width="560" height="440" rx="24" fill="#FFFFFF" opacity="0.9"/>
  <!-- Blurry left half -->
  <rect x="170" y="310" width="260" height="420" rx="18" fill="#E1BEE7" opacity="0.6"/>
  <!-- Sharp right half with mountain scene -->
  <polygon points="600 380 500 600 700 600" fill="#7B1FA2" opacity="0.85"/>
  <polygon points="680 350 580 600 780 600" fill="#6A1B9A"/>
  <circle cx="510" cy="345" r="44" fill="#FFD740"/>
  <rect x="180" y="620" width="530" height="80" rx="10" fill="#CE93D8" opacity="0.7"/>
  <!-- Brush handle diagonal -->
  <rect x="560" y="160" width="36" height="400" rx="18" fill="#5D4037" transform="rotate(35 578 360)"/>
  <!-- Brush head -->
  <ellipse cx="684" cy="274" rx="50" ry="28" fill="#FF6F00" transform="rotate(35 684 274)"/>
  <!-- Brush paint streak -->
  <path d="M450 520 Q500 480 550 500 Q600 520 650 490" stroke="#CE93D8" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.8"/>
  <!-- Layer 3: Star sparkles -->
  <path d="M780 600 L790 630 L822 630 L798 648 L808 678 L780 660 L752 678 L762 648 L738 630 L770 630 Z" fill="#FFD740" opacity="0.9"/>
  <circle cx="200" cy="200" r="16" fill="#CE93D8" opacity="0.7"/>
</svg>
