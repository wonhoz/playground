<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 왕관 기지 보호: 왕관 + 기지 -->
  <!-- base platform -->
  <ellipse cx="512" cy="760" rx="260" ry="50" fill="#37474F" opacity="0.6"/>
  <!-- crown body -->
  <path d="M280 640 L280 460 L380 560 L512 340 L644 560 L744 460 L744 640 Z" fill="#37474F"/>
  <!-- crown outline -->
  <path d="M280 640 L280 460 L380 560 L512 340 L644 560 L744 460 L744 640 Z" fill="none" stroke="#B0BEC5" stroke-width="10"/>
  <!-- crown base band -->
  <rect x="280" y="600" width="464" height="50" rx="6" fill="#37474F"/>
  <rect x="280" y="600" width="464" height="50" rx="6" fill="none" stroke="#B0BEC5" stroke-width="8"/>
  <!-- jewels on crown band -->
  <circle cx="380" cy="625" r="16" fill="#B0BEC5" opacity="0.8"/>
  <circle cx="512" cy="625" r="20" fill="#B0BEC5"/>
  <circle cx="644" cy="625" r="16" fill="#B0BEC5" opacity="0.8"/>
  <!-- jewel at tip points -->
  <circle cx="512" cy="348" r="22" fill="#B0BEC5"/>
  <circle cx="380" cy="566" r="16" fill="#B0BEC5" opacity="0.7"/>
  <circle cx="644" cy="566" r="16" fill="#B0BEC5" opacity="0.7"/>
  <!-- shield glow beneath -->
  <circle cx="512" cy="760" r="90" fill="#37474F" opacity="0.2"/>
  <circle cx="512" cy="760" r="60" fill="#37474F" opacity="0.4"/>
  <circle cx="512" cy="760" r="30" fill="#B0BEC5" opacity="0.3"/>
</svg>
