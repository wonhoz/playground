<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- 신호막대: signal strength bars like mobile/wifi -->
  <!-- Ground bar -->
  <rect x="240" y="760" width="544" height="30" rx="8" fill="#1B5E20"/>
  <!-- Bar 1 (shortest, leftmost) -->
  <rect x="270" y="660" width="86" height="130" rx="10" fill="#1B5E20"/>
  <!-- Bar 2 -->
  <rect x="380" y="560" width="86" height="230" rx="10" fill="#A5D6A7" opacity="0.6"/>
  <!-- Bar 3 -->
  <rect x="490" y="440" width="86" height="350" rx="10" fill="#A5D6A7" opacity="0.8"/>
  <!-- Bar 4 (tallest) -->
  <rect x="600" y="300" width="86" height="490" rx="10" fill="#A5D6A7"/>
  <!-- Signal waves at top right to indicate live -->
  <path d="M740 380 Q780 340 820 380" fill="none" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round"/>
  <path d="M754 410 Q780 378 806 410" fill="none" stroke="#A5D6A7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="780" cy="434" r="12" fill="#A5D6A7"/>
</svg>