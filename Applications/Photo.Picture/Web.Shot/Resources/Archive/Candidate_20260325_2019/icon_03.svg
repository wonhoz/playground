<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7675"/>
      <stop offset="100%" stop-color="#E84393"/>
    </linearGradient>
    <clipPath id="clip03">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer1: 배경 -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#clip03)">
    <!-- Layer3(상단 텍스트를 먼저): CAPTURE 텍스트 -->
    <text x="512" y="228" font-size="76" fill="white" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">CAPTURE</text>

    <!-- Layer2: 좌측 모니터 -->
    <rect x="195" y="310" width="330" height="230" rx="20" fill="white" fill-opacity="0.9"/>
    <!-- 모니터 스탠드 -->
    <rect x="338" y="538" width="54" height="48" rx="8" fill="white" fill-opacity="0.7"/>
    <rect x="296" y="584" width="138" height="18" rx="9" fill="white" fill-opacity="0.6"/>
    <!-- 화면 내용 -->
    <rect x="213" y="328" width="294" height="194" rx="8" fill="#74B9FF"/>
    <rect x="225" y="340" width="270" height="22" rx="6" fill="white" fill-opacity="0.6"/>
    <rect x="225" y="374" width="250" height="12" rx="6" fill="white" fill-opacity="0.4"/>
    <rect x="225" y="396" width="230" height="12" rx="6" fill="white" fill-opacity="0.4"/>
    <rect x="225" y="418" width="260" height="12" rx="6" fill="white" fill-opacity="0.3"/>
    <rect x="225" y="440" width="220" height="12" rx="6" fill="white" fill-opacity="0.3"/>
    <rect x="225" y="462" width="250" height="12" rx="6" fill="white" fill-opacity="0.25"/>
    <rect x="225" y="484" width="200" height="12" rx="6" fill="white" fill-opacity="0.2"/>

    <!-- 중앙 카메라 셔터 (동작 중) -->
    <circle cx="512" cy="430" r="105" fill="white" fill-opacity="0.22"/>
    <!-- 카메라 몸체 -->
    <rect x="450" y="390" width="124" height="88" rx="16" fill="#FFD700"/>
    <!-- 렌즈 외부 -->
    <circle cx="512" cy="434" r="34" fill="#2D3436"/>
    <!-- 렌즈 내부 -->
    <circle cx="512" cy="434" r="22" fill="#636E72"/>
    <!-- 하이라이트 -->
    <circle cx="503" cy="425" r="8" fill="white" fill-opacity="0.7"/>
    <!-- 카메라 뷰파인더 -->
    <rect x="454" y="372" width="32" height="20" rx="5" fill="#FFD700"/>

    <!-- 속도감 선들 -->
    <line x1="625" y1="358" x2="682" y2="358" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
    <line x1="635" y1="400" x2="682" y2="400" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
    <line x1="630" y1="438" x2="680" y2="438" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

    <!-- 우측 날아가는 이미지 파일 -->
    <rect x="680" y="275" width="156" height="202" rx="16" fill="white" fill-opacity="0.92"/>
    <!-- 파일 상단 접힌 모서리 -->
    <polygon points="802,275 836,310 802,310" fill="#DDDDDD" fill-opacity="0.5"/>
    <!-- 파일 내부 썸네일 -->
    <rect x="700" y="295" width="116" height="112" rx="8" fill="#74B9FF"/>
    <!-- 썸네일 내용 -->
    <circle cx="734" cy="325" r="16" fill="#FFD700" fill-opacity="0.9"/>
    <polygon points="700,400 740,350 775,385 815,335 816,407" fill="#55EFC4" fill-opacity="0.7"/>
    <!-- .PNG 레이블 -->
    <text x="758" y="457" font-size="44" fill="#E84393" font-weight="900" text-anchor="middle" font-family="Arial Black, Arial, sans-serif">.PNG</text>

    <!-- 하단 배지 -->
    <rect x="260" y="780" width="504" height="76" rx="38" fill="white" fill-opacity="0.2"/>
    <text x="512" y="820" font-size="46" fill="white" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">WEB CAPTURE</text>
  </g>
</svg>
