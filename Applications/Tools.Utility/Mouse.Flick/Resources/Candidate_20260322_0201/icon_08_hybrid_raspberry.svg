<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg08" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#200818"/>
      <stop offset="100%" stop-color="#10040C"/>
    </radialGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg08)"/>

  <!-- 레이어드: 배경 원형 링 (제스처 공간) -->
  <circle cx="512" cy="480" r="320" fill="none" stroke="#5A0030" stroke-width="3" opacity="0.5"/>
  <circle cx="512" cy="480" r="240" fill="none" stroke="#5A0030" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="480" r="160" fill="none" stroke="#5A0030" stroke-width="2" opacity="0.3"/>

  <!-- 마우스 (중앙, 작게) -->
  <rect x="452" y="360" width="120" height="172" rx="60" fill="#1E0814" stroke="#E81068" stroke-width="8"/>
  <line x1="512" y1="360" x2="512" y2="444" stroke="#E81068" stroke-width="6"/>
  <rect x="497" y="382" width="30" height="52" rx="15" fill="#E81068"/>

  <!-- 4개 제스처 방향 — 확산 형태 -->
  <!-- 오른쪽: R → Ctrl+W -->
  <path d="M 572 480 L 740 480" fill="none" stroke="#FF4096" stroke-width="16" stroke-linecap="round" filter="url(#glow08)"/>
  <polyline points="706,450 744,480 706,510" fill="none" stroke="#FF4096" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow08)"/>
  <text x="780" y="470" font-family="monospace" font-size="20" fill="#FF80B8" text-anchor="start">Ctrl+W</text>

  <!-- 왼쪽: L → Alt+Left -->
  <path d="M 452 480 L 284 480" fill="none" stroke="#FF4096" stroke-width="16" stroke-linecap="round" filter="url(#glow08)"/>
  <polyline points="318,450 280,480 318,510" fill="none" stroke="#FF4096" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow08)"/>
  <text x="108" y="470" font-family="monospace" font-size="20" fill="#FF80B8" text-anchor="start">Alt+←</text>

  <!-- 위: U → PgUp -->
  <path d="M 512 360 L 512 200" fill="none" stroke="#FF70C0" stroke-width="16" stroke-linecap="round" filter="url(#glow08)"/>
  <polyline points="478,232 512,194 546,232" fill="none" stroke="#FF70C0" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow08)"/>
  <text x="526" y="180" font-family="monospace" font-size="20" fill="#FF80B8">PgUp</text>

  <!-- 아래: D → PgDn -->
  <path d="M 512 532 L 512 692" fill="none" stroke="#FF70C0" stroke-width="16" stroke-linecap="round" filter="url(#glow08)"/>
  <polyline points="478,660 512,698 546,660" fill="none" stroke="#FF70C0" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow08)"/>
  <text x="526" y="730" font-family="monospace" font-size="20" fill="#FF80B8">PgDn</text>

  <!-- 하단 타이틀 -->
  <text x="512" y="870" font-family="sans-serif" font-size="34" font-weight="bold" fill="#E81068" text-anchor="middle" filter="url(#glow08)">Mouse Flick</text>
</svg>
