<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Snap.Duel — 아이콘 후보</title>
  <style>
    body { background:#1a1a1a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:32px; }
    h1 { font-size:22px; margin-bottom:8px; color:#ef5350; letter-spacing:2px; }
    p  { color:#888; font-size:13px; margin-bottom:28px; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
    .card { background:#242424; border-radius:12px; padding:20px; text-align:center; border:1px solid #333; }
    .card img { width:120px; height:120px; border-radius:12px; }
    .card span { display:block; margin-top:10px; font-size:11px; color:#888; word-break:break-all; }
  </style>
</head>
<body>
  <h1>Snap.Duel</h1>
  <p>빠른 반응 결투 캐주얼 게임 — 아이콘 후보 10종</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_red_lightning_duel.svg"/><span>01 · red lightning duel</span></div>
    <div class="card"><img src="candidate_02_yellow_reaction_timer.svg"/><span>02 · yellow reaction timer</span></div>
    <div class="card"><img src="candidate_03_green_versus_screen.svg"/><span>03 · green versus screen</span></div>
    <div class="card"><img src="candidate_04_blue_crosshair_snap.svg"/><span>04 · blue crosshair snap</span></div>
    <div class="card"><img src="candidate_05_orange_fist_bump.svg"/><span>05 · orange fist bump</span></div>
    <div class="card"><img src="candidate_06_purple_card_flip.svg"/><span>06 · purple card flip</span></div>
    <div class="card"><img src="candidate_07_pink_countdown_burst.svg"/><span>07 · pink countdown burst</span></div>
    <div class="card"><img src="candidate_08_teal_shield_clash.svg"/><span>08 · teal shield clash</span></div>
    <div class="card"><img src="candidate_09_gold_crown_winner.svg"/><span>09 · gold crown winner</span></div>
    <div class="card"><img src="candidate_10_red_pixel_duel.svg"/><span>10 · red pixel duel</span></div>
  </div>
</body>
</html>
