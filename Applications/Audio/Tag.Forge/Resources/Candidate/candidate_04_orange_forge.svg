<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#3E1A00"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="50%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FFCA28"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil base -->
  <rect x="144" y="340" width="224" height="40" rx="8" fill="url(#metal)"/>
  <rect x="160" y="300" width="192" height="52" rx="8" fill="url(#metal)"/>
  <!-- Hammer -->
  <rect x="200" y="180" width="112" height="60" rx="10" fill="url(#metal)"/>
  <rect x="242" y="240" width="28" height="80" rx="6" fill="#78909C"/>
  <!-- Tag being forged -->
  <path d="M 176,260 L 284,260 L 312,292 L 284,324 L 176,324 Z" fill="#FF8F00" opacity="0.9"/>
  <circle cx="196" cy="292" r="14" fill="#1C0A00"/>
  <rect x="218" y="284" width="64" height="10" rx="5" fill="#FFF8E1" opacity="0.9"/>
  <rect x="218" y="298" width="48" height="8" rx="4" fill="#FFECB3" opacity="0.7"/>
  <!-- Sparks / fire -->
  <path d="M 200,200 Q 180,160 200,120 Q 220,160 200,200 Z" fill="url(#fire)" opacity="0.85"/>
  <path d="M 260,190 Q 248,155 268,120 Q 288,155 268,190 Z" fill="url(#fire)" opacity="0.75"/>
  <path d="M 320,200 Q 308,165 328,130 Q 348,165 328,200 Z" fill="url(#fire)" opacity="0.65"/>
  <!-- Sparkles -->
  <circle cx="156" cy="240" r="6" fill="#FFCA28" opacity="0.9"/>
  <circle cx="340" cy="250" r="5" fill="#FFCA28" opacity="0.8"/>
  <circle cx="148" cy="200" r="4" fill="#FF6D00" opacity="0.7"/>
  <circle cx="356" cy="208" r="3" fill="#FF6D00" opacity="0.6"/>
</svg>
