      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F2558"/>
    </linearGradient>
    <clipPath id="c_gq04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Deep sapphire background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_gq04)"/>
  <g clip-path="url(#c_gq04)">
    <!-- Layer 2: Earth/globe -->
