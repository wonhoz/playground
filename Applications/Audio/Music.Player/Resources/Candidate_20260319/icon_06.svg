<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Lyric scroll / LRC paper with music note -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0D0A00"/>
  <!-- Scroll body -->
  <rect x="240" y="200" width="480" height="600" rx="8" fill="#1A1400" stroke="#FF9800" stroke-width="20"/>
  <!-- Top scroll curl -->
  <ellipse cx="480" cy="200" rx="240" ry="32" fill="#FF9800" opacity="0.5"/>
  <ellipse cx="480" cy="800" rx="240" ry="32" fill="#FF9800" opacity="0.5"/>
  <!-- Lyric lines (highlighted current line) -->
  <rect x="290" y="300" width="380" height="22" rx="11" fill="#FF9800" opacity="0.4"/>
  <rect x="290" y="352" width="320" height="22" rx="11" fill="#FF9800" opacity="0.4"/>
  <!-- Highlighted current lyric -->
  <rect x="280" y="404" width="400" height="28" rx="8" fill="#FF9800"/>
  <rect x="290" y="460" width="350" height="22" rx="11" fill="#FF9800" opacity="0.4"/>
  <rect x="290" y="512" width="300" height="22" rx="11" fill="#FF9800" opacity="0.4"/>
  <rect x="290" y="564" width="340" height="22" rx="11" fill="#FF9800" opacity="0.3"/>
  <rect x="290" y="616" width="290" height="22" rx="11" fill="#FF9800" opacity="0.3"/>
  <!-- Music note top-right -->
  <rect x="640" y="220" width="28" height="100" rx="8" fill="#FF9800"/>
  <ellipse cx="626" cy="320" rx="30" ry="22" fill="#FF9800" transform="rotate(-15, 626, 320)"/>
  <path d="M640 220 L700 200 L700 228 L640 248 Z" fill="#FF9800"/>
</svg>
