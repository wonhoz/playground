<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c3c"/>
      <stop offset="100%" stop-color="#2c2c4c"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minify icon (compress arrows) -->
  <g transform="translate(256,160)">
    <line x1="-80" y1="-40" x2="-20" y2="-5" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="-20,-15 -5,-5 -20,5" fill="#e040fb"/>
    <line x1="80" y1="-40" x2="20" y2="-5" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="20,-15 5,-5 20,5" fill="#7c4dff"/>
    <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#2a1a4a"/>
    <text x="0" y="7" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#e040fb">{}</text>
  </g>
  <text x="256" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#e040fb" opacity="0.7">MINIFY</text>
  <!-- JSON lines being compressed (top section) -->
  <rect x="80" y="70" width="140" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="100" y="90" width="100" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
  <rect x="100" y="110" width="120" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="80" y="130" width="80" height="10" rx="5" fill="#e040fb" opacity="0.3"/>
  <rect x="292" y="70" width="140" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="292" y="90" width="110" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
  <rect x="292" y="110" width="130" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="292" y="130" width="90" height="10" rx="5" fill="#e040fb" opacity="0.3"/>
  <!-- Divider -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#3a3a6a" stroke-width="2"/>
  <!-- Expand icon (expand arrows) -->
  <g transform="translate(256,360)">
    <line x1="-20" y1="-5" x2="-80" y2="-40" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="-70,-46 -85,-38 -74,-26" fill="#e040fb"/>
    <line x1="20" y1="-5" x2="80" y2="-40" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="70,-46 85,-38 74,-26" fill="#7c4dff"/>
    <rect x="-28" y="-22" width="56" height="44" rx="8" fill="#1a1a3a"/>
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#7c4dff">{ }</text>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="Arial" font-size="12" fill="#7c4dff" opacity="0.7">PRETTY PRINT</text>
  <!-- Expanded lines -->
  <rect x="80" y="280" width="60" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="100" y="300" width="100" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
  <rect x="120" y="320" width="80" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="100" y="340" width="90" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
  <rect x="292" y="280" width="60" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="312" y="300" width="100" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
  <rect x="332" y="320" width="80" height="10" rx="5" fill="#7c4dff" opacity="0.5"/>
  <rect x="312" y="340" width="90" height="10" rx="5" fill="#e040fb" opacity="0.4"/>
</svg>
