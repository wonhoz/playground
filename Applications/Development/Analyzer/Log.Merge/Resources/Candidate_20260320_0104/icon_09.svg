<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Multiple incoming streams (top) -->
  <path d="M200 160 Q200 300 512 480" stroke="#00BCD4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M380 140 Q400 300 512 480" stroke="#00BCD4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M512 120 L512 480" stroke="#00BCD4" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M644 140 Q624 300 512 480" stroke="#00BCD4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M824 160 Q824 300 512 480" stroke="#00BCD4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Spiral integration center vortex -->
  <circle cx="512" cy="512" r="100" fill="none" stroke="#006064" stroke-width="28"/>
  <circle cx="512" cy="512" r="60" fill="none" stroke="#00BCD4" stroke-width="20" opacity="0.7"/>
  <circle cx="512" cy="512" r="28" fill="#00BCD4" opacity="0.9"/>
  <!-- Spiral arc -->
  <path d="M512 412 Q640 412 640 512 Q640 620 512 640 Q380 660 360 540 Q340 420 450 390 Q570 360 610 450"
    stroke="#00BCD4" stroke-width="14" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Outgoing merged stream (bottom) -->
  <path d="M512 612 Q512 760 512 880" stroke="#006064" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Arrow at bottom -->
  <polygon points="476,840 512,890 548,840" fill="#00BCD4"/>
  <!-- Stream dots -->
  <circle cx="200" cy="220" r="14" fill="#00BCD4" opacity="0.6"/>
  <circle cx="380" cy="200" r="14" fill="#00BCD4" opacity="0.7"/>
  <circle cx="644" cy="200" r="14" fill="#00BCD4" opacity="0.7"/>
  <circle cx="824" cy="220" r="14" fill="#00BCD4" opacity="0.6"/>
</svg>
