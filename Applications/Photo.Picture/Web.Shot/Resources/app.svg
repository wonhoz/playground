<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="browser" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="camera" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ed8936"/>
      <stop offset="100%" stop-color="#c05621"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4299e1"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Browser window -->
  <rect x="60" y="120" width="392" height="272" rx="12" fill="url(#browser)"/>
  <!-- Browser bar -->
  <rect x="60" y="120" width="392" height="40" rx="12" fill="#4a5568"/>
  <rect x="60" y="148" width="392" height="12" fill="#4a5568"/>
  <!-- Browser controls -->
  <circle cx="96" cy="140" r="8" fill="#fc8181"/>
  <circle cx="120" cy="140" r="8" fill="#f6e05e"/>
  <circle cx="144" cy="140" r="8" fill="#68d391"/>
  <!-- URL bar -->
  <rect x="168" y="130" width="240" height="20" rx="10" fill="#2d3748"/>
  <!-- Web content lines -->
  <rect x="80" y="176" width="352" height="12" rx="3" fill="#4a5568" opacity="0.5"/>
  <rect x="80" y="200" width="280" height="10" rx="3" fill="#4a5568" opacity="0.4"/>
  <rect x="80" y="220" width="320" height="10" rx="3" fill="#4a5568" opacity="0.4"/>
  <!-- Camera overlay -->
  <rect x="290" y="300" width="180" height="120" rx="14" fill="url(#camera)"/>
  <rect x="330" y="276" width="80" height="30" rx="8" fill="url(#camera)"/>
  <!-- Camera lens -->
  <circle cx="380" cy="360" r="44" fill="#1a202c"/>
  <circle cx="380" cy="360" r="34" fill="url(#lens)" filter="url(#glow)"/>
  <circle cx="380" cy="360" r="20" fill="#1a202c"/>
  <circle cx="380" cy="360" r="10" fill="url(#lens)" opacity="0.8"/>
  <circle cx="372" cy="352" r="5" fill="white" opacity="0.4"/>
  <!-- Shutter button -->
  <circle cx="440" cy="320" r="14" fill="#2d3748"/>
  <circle cx="440" cy="320" r="8" fill="#4a5568"/>
</svg>