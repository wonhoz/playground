<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 산호+빨강 -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#FF8A65"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 영사기/프로젝터 → 이미지 투사 = Cast 비유 -->
  <!-- 프로젝터 본체 -->
  <rect x="240" y="360" width="320" height="220" rx="28" fill="white" opacity="0.95"/>
  <!-- 렌즈 -->
  <circle cx="540" cy="470" r="70" fill="#EF5350" stroke="white" stroke-width="12"/>
  <circle cx="540" cy="470" r="48" fill="#FF5252"/>
  <circle cx="540" cy="470" r="28" fill="white" opacity="0.6"/>
  <circle cx="540" cy="470" r="14" fill="#C62828"/>
  <!-- 프로젝터 상단 -->
  <rect x="320" y="330" width="160" height="36" rx="10" fill="white" opacity="0.8"/>
  <!-- 투사 빔 (삼각형 광선) -->
  <polygon points="620,430 620,510 850,360 850,580" fill="white" opacity="0.15"/>
  <polygon points="620,430 620,510 850,360 850,580" fill="none" stroke="white" stroke-width="6" opacity="0.5"/>
  <!-- 투사된 이미지 (스크린) -->
  <rect x="780" y="300" width="164" height="340" rx="14" fill="white" opacity="0.95"/>
  <rect x="796" y="316" width="132" height="240" rx="8" fill="#FF8A65"/>
  <!-- 스크린 위 ICO 출력 -->
  <text x="862" y="440" font-family="Segoe UI, sans-serif" font-size="58" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
  <!-- Layer 3: Cast 레이블 -->
  <text x="380" y="660" font-family="Segoe UI, sans-serif" font-size="78" font-weight="bold" fill="#C62828" text-anchor="middle">Cast</text>
  <text x="512" y="850" font-family="Segoe UI, sans-serif" font-size="66" fill="white" text-anchor="middle">SVG · PNG · JPG</text>
  <text x="512" y="920" font-family="Segoe UI, sans-serif" font-size="56" fill="white" text-anchor="middle" opacity="0.8">→ ICO · BMP · WebP</text>
</svg>
