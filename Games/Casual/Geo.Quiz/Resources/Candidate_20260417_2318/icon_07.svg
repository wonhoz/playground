<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 질문 배너 -->
  <rect x="150" y="180" width="724" height="100" rx="18" fill="#4A148C" opacity="0.9"/>
  <text x="512" y="244" font-family="Arial, sans-serif" font-size="54" fill="#E1BEE7" text-anchor="middle">수도를 고르세요</text>
  <!-- 4지선다 버튼 그리드 2×2 -->
  <!-- A: 정답 (초록) -->
  <rect x="150" y="316" width="340" height="150" rx="20" fill="#1B5E20"/>
  <text x="320" y="378" font-family="Arial, sans-serif" font-size="40" fill="#A5D6A7" text-anchor="middle">A</text>
  <text x="320" y="432" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">Tokyo</text>
  <!-- B: 오답 (보라) -->
  <rect x="534" y="316" width="340" height="150" rx="20" fill="#4A148C" opacity="0.7"/>
  <text x="704" y="378" font-family="Arial, sans-serif" font-size="40" fill="#CE93D8" text-anchor="middle">B</text>
  <text x="704" y="432" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">Seoul</text>
  <!-- C: 오답 (보라) -->
  <rect x="150" y="494" width="340" height="150" rx="20" fill="#4A148C" opacity="0.7"/>
  <text x="320" y="556" font-family="Arial, sans-serif" font-size="40" fill="#CE93D8" text-anchor="middle">C</text>
  <text x="320" y="610" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">Beijing</text>
  <!-- D: 오답 (보라) -->
  <rect x="534" y="494" width="340" height="150" rx="20" fill="#4A148C" opacity="0.7"/>
  <text x="704" y="556" font-family="Arial, sans-serif" font-size="40" fill="#CE93D8" text-anchor="middle">D</text>
  <text x="704" y="610" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">Taipei</text>
  <!-- Layer 3: 진행 바 -->
  <rect x="150" y="690" width="724" height="26" rx="13" fill="#CE93D8" opacity="0.4"/>
  <rect x="150" y="690" width="362" height="26" rx="13" fill="#CE93D8"/>
  <text x="512" y="780" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#FDD835" text-anchor="middle">5 / 10</text>
</svg>
