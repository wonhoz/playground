  <text x="158" y="242" font-family="monospace" font-size="11" fill="#69f0ae" text-anchor="middle">▣ WPF/XAML</text>
  <rect x="96" y="253" width="123" height="7" rx="3.5" fill="#1b3a1b"/>
  <rect x="96" y="253" width="85" height="7" rx="3.5" fill="#00e676"/>
  <text x="96" y="278" font-family="monospace" font-size="10" fill="#a5d6a7">Intermediate</text>
  <!-- Card 4 -->
  <rect x="277" y="210" width="155" height="80" rx="10" fill="url(#card)" stroke="#388e3c" stroke-width="1.5"/>
  <text x="355" y="242" font-family="monospace" font-size="11" fill="#69f0ae" text-anchor="middle">▣ SQL Server</text>
  <rect x="293" y="253" width="123" height="7" rx="3.5" fill="#1b3a1b"/>
  <rect x="293" y="253" width="70" height="7" rx="3.5" fill="#00e676"/>
  <text x="293" y="278" font-family="monospace" font-size="10" fill="#a5d6a7">Intermediate</text>
  <!-- Card 5 -->
  <rect x="80" y="320" width="155" height="80" rx="10" fill="url(#card)" stroke="#2e7d32" stroke-width="1" opacity="0.8"/>
  <text x="158" y="352" font-family="monospace" font-size="11" fill="#a5d6a7" text-anchor="middle">▣ TypeScript</text>
  <rect x="96" y="363" width="123" height="7" rx="3.5" fill="#1b3a1b"/>
  <rect x="96" y="363" width="55" height="7" rx="3.5" fill="#69f0ae"/>
  <text x="96" y="388" font-family="monospace" font-size="10" fill="#81c784">Basic</text>
  <!-- Card 6 -->
  <rect x="277" y="320" width="155" height="80" rx="10" fill="url(#card)" stroke="#2e7d32" stroke-width="1" opacity="0.8"/>
  <text x="355" y="352" font-family="monospace" font-size="11" fill="#a5d6a7" text-anchor="middle">▣ Docker</text>
  <rect x="293" y="363" width="123" height="7" rx="3.5" fill="#1b3a1b"/>
  <rect x="293" y="363" width="45" height="7" rx="3.5" fill="#69f0ae"/>
  <text x="293" y="388" font-family="monospace" font-size="10" fill="#81c784">Basic</text>
  <!-- Title -->
  <text x="256" y="460" font-family="monospace" font-size="17" fill="#69f0ae" text-anchor="middle" letter-spacing="2" opacity="0.9">SKILL.CAST</text>
