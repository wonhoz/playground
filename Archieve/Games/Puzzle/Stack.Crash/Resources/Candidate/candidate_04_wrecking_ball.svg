<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a00"/>
      <stop offset="100%" style="stop-color:#0a0a00"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#bdbdbd"/>
      <stop offset="100%" style="stop-color:#424242"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tower of blocks being demolished -->
  <rect x="160" y="300" width="80" height="60" rx="4" fill="#ef5350"/>
  <rect x="160" y="240" width="80" height="60" rx="4" fill="#42a5f5"/>
  <rect x="160" y="180" width="80" height="60" rx="4" fill="#66bb6a"/>
  <rect x="160" y="120" width="80" height="60" rx="4" fill="#ffa726"/>
  <!-- Wrecking ball chain -->
  <line x1="320" y1="80" x2="340" y2="200" stroke="#888" stroke-width="8" stroke-dasharray="12,6"/>
  <!-- Wrecking ball -->
  <circle cx="356" cy="230" r="70" fill="url(#ball)" stroke="#757575" stroke-width="4"/>
  <!-- Ball spikes -->
  <circle cx="356" cy="160" r="10" fill="#757575"/>
  <circle cx="356" cy="300" r="10" fill="#757575"/>
  <circle cx="286" cy="230" r="10" fill="#757575"/>
  <circle cx="426" cy="230" r="10" fill="#757575"/>
  <circle cx="306" cy="180" r="8" fill="#757575"/>
  <circle cx="406" cy="180" r="8" fill="#757575"/>
  <circle cx="306" cy="280" r="8" fill="#757575"/>
  <circle cx="406" cy="280" r="8" fill="#757575"/>
  <!-- Debris -->
  <rect x="100" y="260" width="24" height="24" rx="3" fill="#ef5350" transform="rotate(30 112 272)" opacity="0.7"/>
  <rect x="110" y="180" width="20" height="20" rx="3" fill="#42a5f5" transform="rotate(-20 120 190)" opacity="0.7"/>
  <!-- Ground -->
  <rect x="60" y="390" width="392" height="16" rx="4" fill="#5d4037" opacity="0.8"/>
  <rect x="80" y="406" width="352" height="8" rx="4" fill="#4e342e" opacity="0.5"/>
</svg>