<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Calendar -->
  <rect x="180" y="200" width="440" height="440" rx="28" fill="#FFFFFF" stroke="#3B82F6" stroke-width="10"/>
  <rect x="180" y="200" width="440" height="100" rx="28" fill="#2563EB"/>
  <rect x="180" y="272" width="440" height="28" rx="0" fill="#2563EB"/>
  <text x="400" y="263" font-family="Arial,sans-serif" font-size="56" fill="#FFFFFF" font-weight="bold" text-anchor="middle">March</text>
  <!-- Calendar hooks -->
  <rect x="270" y="175" width="30" height="60" rx="8" fill="#1D4ED8"/>
  <rect x="500" y="175" width="30" height="60" rx="8" fill="#1D4ED8"/>
  <!-- Day grid -->
  <text x="218" y="382" font-family="Arial,sans-serif" font-size="36" fill="#93C5FD">Mo Tu We Th Fr</text>
  <text x="218" y="432" font-family="Arial,sans-serif" font-size="36" fill="#374151">  3   4   5   6   7</text>
  <text x="218" y="482" font-family="Arial,sans-serif" font-size="36" fill="#374151">10  11  12  13  14</text>
  <!-- Highlighted day 27 -->
  <circle cx="372" cy="528" r="28" fill="#2563EB"/>
  <text x="218" y="536" font-family="Arial,sans-serif" font-size="36" fill="#374151">17  18  </text>
  <text x="372" y="540" font-family="Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">27</text>
  <text x="440" y="536" font-family="Arial,sans-serif" font-size="36" fill="#374151">  28</text>
  <!-- Clock -->
  <circle cx="730" cy="480" r="180" fill="#FFFFFF" stroke="#3B82F6" stroke-width="14"/>
  <circle cx="730" cy="480" r="12" fill="#2563EB"/>
  <!-- Hour hand -->
  <line x1="730" y1="480" x2="730" y2="350" stroke="#1D4ED8" stroke-width="20" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="730" y1="480" x2="840" y2="520" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
  <!-- Clock ticks -->
  <line x1="730" y1="310" x2="730" y2="334" stroke="#BFDBFE" stroke-width="10"/>
  <line x1="730" y1="626" x2="730" y2="650" stroke="#BFDBFE" stroke-width="10"/>
  <line x1="560" y1="480" x2="584" y2="480" stroke="#BFDBFE" stroke-width="10"/>
  <line x1="876" y1="480" x2="900" y2="480" stroke="#BFDBFE" stroke-width="10"/>
</svg>
