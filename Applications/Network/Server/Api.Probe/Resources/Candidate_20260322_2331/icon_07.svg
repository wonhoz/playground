<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="50%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="plane07" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow07" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="12" flood-color="#0369A1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Layer 1: Sky gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Soft clouds -->
  <ellipse cx="220" cy="280" rx="140" ry="50" fill="white" opacity="0.3"/>
  <ellipse cx="160" cy="280" rx="80" ry="40" fill="white" opacity="0.25"/>
  <ellipse cx="280" cy="270" rx="90" ry="38" fill="white" opacity="0.2"/>
  <ellipse cx="760" cy="740" rx="120" ry="44" fill="white" opacity="0.2"/>
  <ellipse cx="700" cy="740" rx="70" ry="36" fill="white" opacity="0.18"/>

  <!-- Motion trail dots -->
  <circle cx="240" cy="640" r="10" fill="white" opacity="0.5"/>
  <circle cx="300" cy="600" r="8" fill="white" opacity="0.4"/>
  <circle cx="360" cy="560" r="6" fill="white" opacity="0.3"/>
  <circle cx="410" cy="528" r="5" fill="white" opacity="0.2"/>

  <!-- Layer 2: Paper airplane (facing top-right, classic 3D look) -->
  <g filter="url(#shadow07)" transform="translate(512,512) rotate(-30) translate(-512,-512)">
    <!-- Main body (right wing + fuselage) -->
    <polygon points="200,512 820,380 512,620" fill="url(#plane07)"/>
    <!-- Left wing (darker bottom) -->
    <polygon points="200,512 512,620 420,700" fill="#BAE6FD"/>
    <!-- Center fold line -->
    <polygon points="200,512 820,380 512,470" fill="#E0F2FE" opacity="0.8"/>
    <!-- Fold crease -->
    <line x1="200" y1="512" x2="820" y2="380" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="200" y1="512" x2="512" y2="620" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Layer 3: Speed lines (to the top-right) -->
  <line x1="760" y1="240" x2="880" y2="190" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <line x1="780" y1="300" x2="900" y2="265" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="750" y1="180" x2="850" y2="145" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
