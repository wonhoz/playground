<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg7)"/>

  <!-- Layer 2: Stacked photo cards -->
  <!-- Card 3 (back) -->
  <rect x="228" y="168" width="520" height="420" rx="24" fill="#EF9A9A" opacity="0.6" transform="rotate(-8, 488, 378)"/>
  <!-- Card 2 (middle) -->
  <rect x="218" y="188" width="520" height="420" rx="24" fill="#F48FB1" opacity="0.8" transform="rotate(-4, 478, 398)"/>
  <!-- Card 1 (front) — main photo -->
  <rect x="208" y="208" width="560" height="440" rx="24" fill="white" stroke="#F06292" stroke-width="10"/>
  <!-- Photo inside -->
  <rect x="226" y="226" width="524" height="298" rx="14" fill="#B3E5FC"/>
  <!-- Landscape scene -->
  <circle cx="380" cy="320" r="76" fill="#FFD600"/>
  <ellipse cx="500" cy="295" rx="80" ry="44" fill="white" opacity="0.7"/>
  <ellipse cx="610" cy="280" rx="60" ry="36" fill="white" opacity="0.6"/>
  <path d="M226,420 L310,340 L390,385 L490,320 L580,365 L680,300 L750,355 L750,524 L226,524 Z" fill="#388E3C"/>

  <!-- Date EXIF tag overlay (bottom of card) -->
  <rect x="226" y="540" width="524" height="90" rx="12" fill="#1565C0"/>
  <text x="488" y="600" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle">2024-01-25</text>

  <!-- Layer 3: EXIF badge -->
  <rect x="628" y="672" width="250" height="82" rx="16" fill="#1565C0"/>
  <text x="753" y="727" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">EXIF ▶</text>

  <!-- Folder target label below -->
  <rect x="208" y="776" width="560" height="100" rx="24" fill="#F06292"/>
  <text x="488" y="842" font-family="Arial Black, sans-serif" font-size="66" font-weight="900" fill="white" text-anchor="middle">2024 / 01</text>
</svg>
