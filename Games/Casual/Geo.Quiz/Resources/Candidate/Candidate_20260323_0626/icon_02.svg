<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 여권 — 세계 여행 컬렉션 | 공간/장면 | #003020 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#003020"/>
  <!-- Layer 2: Open passport with stamps -->
  <!-- Left page -->
  <rect x="180" y="240" width="290" height="400" rx="8" fill="#1A4A30" stroke="#4ADE80" stroke-width="3"/>
  <!-- Emblem -->
  <circle cx="325" cy="340" r="56" fill="none" stroke="#4ADE80" stroke-width="3"/>
  <circle cx="325" cy="340" r="40" fill="#0A3020"/>
  <text x="325" y="354" font-family="Arial,sans-serif" font-size="30" fill="#4ADE80" text-anchor="middle" font-weight="bold">GEO</text>
  <text x="325" y="430" font-family="Arial,sans-serif" font-size="13" fill="#6EE7B7" text-anchor="middle">WORLD QUIZ</text>
  <text x="325" y="448" font-family="Arial,sans-serif" font-size="13" fill="#6EE7B7" text-anchor="middle">PASSPORT</text>
  <!-- MRZ lines at bottom of left page -->
  <rect x="196" y="570" width="258" height="14" rx="2" fill="#0A2A1A"/>
  <rect x="196" y="592" width="258" height="14" rx="2" fill="#0A2A1A"/>
  <!-- Right page with stamps -->
  <rect x="554" y="240" width="290" height="400" rx="8" fill="#F5F5E8" stroke="#4ADE80" stroke-width="3"/>
  <!-- Stamp 1: Korea -->
  <rect x="572" y="258" width="110" height="80" rx="6" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="3" transform="rotate(8 627 298)"/>
  <text x="627" y="296" font-family="Arial,sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle" font-weight="bold" transform="rotate(8 627 296)">🇰🇷 KOR</text>
  <!-- Stamp 2: Japan -->
  <rect x="700" y="280" width="110" height="80" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="3" transform="rotate(-6 755 320)"/>
  <text x="755" y="318" font-family="Arial,sans-serif" font-size="14" fill="#DC2626" text-anchor="middle" font-weight="bold" transform="rotate(-6 755 318)">🇯🇵 JPN</text>
  <!-- Stamp 3: France -->
  <rect x="572" y="370" width="110" height="80" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3" transform="rotate(-4 627 410)"/>
  <text x="627" y="408" font-family="Arial,sans-serif" font-size="14" fill="#7C3AED" text-anchor="middle" font-weight="bold" transform="rotate(-4 627 408)">🇫🇷 FRA</text>
  <!-- Stamp 4: USA -->
  <rect x="700" y="390" width="110" height="80" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="3" transform="rotate(10 755 430)"/>
  <text x="755" y="428" font-family="Arial,sans-serif" font-size="14" fill="#15803D" text-anchor="middle" font-weight="bold" transform="rotate(10 755 428)">🇺🇸 USA</text>
  <!-- Stamp 5: Brazil -->
  <rect x="580" y="490" width="110" height="80" rx="6" fill="#FEF9C3" stroke="#CA8A04" stroke-width="3" transform="rotate(3 635 530)"/>
  <text x="635" y="528" font-family="Arial,sans-serif" font-size="14" fill="#A16207" text-anchor="middle" font-weight="bold" transform="rotate(3 635 528)">🇧🇷 BRA</text>
  <!-- Spine -->
  <rect x="464" y="240" width="90" height="400" fill="#065F46" stroke="#4ADE80" stroke-width="3"/>
  <text x="509" y="460" font-family="Arial,sans-serif" font-size="14" fill="#A7F3D0" text-anchor="middle" transform="rotate(90 509 460)">GEO QUIZ</text>
  <!-- Layer 3: Score badge -->
  <circle cx="512" cy="760" r="46" fill="#4ADE80"/>
  <text x="512" y="754" font-family="Arial,sans-serif" font-size="16" fill="#003020" text-anchor="middle" font-weight="bold">Level</text>
  <text x="512" y="774" font-family="Arial,sans-serif" font-size="20" fill="#003020" text-anchor="middle" font-weight="bold">42</text>
</svg>
