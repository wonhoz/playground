  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 메인 줄기 -->
  <line x1="256" y1="480" x2="256" y2="310" stroke="url(#branch)" stroke-width="18" stroke-linecap="round"/>
