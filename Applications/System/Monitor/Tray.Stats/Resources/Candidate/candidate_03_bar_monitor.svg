<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141E30"/>
      <stop offset="100%" stop-color="#243B55"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F7971E"/>
      <stop offset="100%" stop-color="#FFD200"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#11998E"/>
      <stop offset="100%" stop-color="#38EF7D"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6A11CB"/>
      <stop offset="100%" stop-color="#2575FC"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C94B4B"/>
      <stop offset="100%" stop-color="#4B134F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="70" y1="100" x2="442" y2="100" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="70" y1="160" x2="442" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="70" y1="220" x2="442" y2="220" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="70" y1="280" x2="442" y2="280" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <line x1="70" y1="340" x2="442" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>
  <!-- Bars -->
  <rect x="90" y="160" width="60" height="180" rx="8" fill="url(#b1)"/>
  <rect x="195" y="120" width="60" height="220" rx="8" fill="url(#b2)"/>
  <rect x="300" y="200" width="60" height="140" rx="8" fill="url(#b3)"/>
  <rect x="390" y="240" width="52" height="100" rx="8" fill="url(#b4)"/>
  <!-- Labels -->
  <text x="120" y="375" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#FFD200" font-weight="600">CPU</text>
  <text x="225" y="375" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#38EF7D" font-weight="600">RAM</text>
  <text x="330" y="375" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#2575FC" font-weight="600">DSK</text>
  <text x="416" y="375" text-anchor="middle" font-family="Segoe UI" font-size="22" fill="#C94B4B" font-weight="600">NET</text>
  <!-- Title -->
  <text x="256" y="458" text-anchor="middle" font-family="Segoe UI" font-size="28" font-weight="700" fill="#E0E0E0" opacity="0.7">SYSTEM STATS</text>
