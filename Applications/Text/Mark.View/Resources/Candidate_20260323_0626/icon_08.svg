<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 헤딩 계층 구조 — # ## ### 마크다운 헤딩 레벨 | 기하학 | #00142E -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#00142E"/>
  <!-- Layer 2: Heading hierarchy visualization -->
  <!-- H1 - largest bar -->
  <text x="210" y="274" font-family="monospace" font-size="28" fill="#60A5FA" font-weight="bold">#</text>
  <rect x="256" y="246" width="568" height="56" rx="8" fill="#1D4ED8" stroke="#3B82F6" stroke-width="2"/>
  <text x="540" y="284" font-family="serif" font-size="30" fill="white" text-anchor="middle" font-weight="bold">제목 1 (H1)</text>
  <!-- H2 -->
  <text x="210" y="366" font-family="monospace" font-size="22" fill="#93C5FD">##</text>
  <rect x="270" y="342" width="480" height="48" rx="8" fill="#1E40AF" stroke="#60A5FA" stroke-width="2"/>
  <text x="510" y="374" font-family="serif" font-size="24" fill="#DBEAFE" text-anchor="middle" font-weight="bold">제목 2 (H2)</text>
  <!-- H3 -->
  <text x="210" y="450" font-family="monospace" font-size="18" fill="#BFDBFE">###</text>
  <rect x="282" y="430" width="400" height="42" rx="8" fill="#1E3A8A" stroke="#93C5FD" stroke-width="2"/>
  <text x="482" y="458" font-family="serif" font-size="20" fill="#EFF6FF" text-anchor="middle">제목 3 (H3)</text>
  <!-- H4 -->
  <text x="210" y="528" font-family="monospace" font-size="15" fill="#93C5FD" opacity="0.8">####</text>
  <rect x="294" y="510" width="330" height="36" rx="8" fill="#172554" stroke="#BFDBFE" stroke-width="1"/>
  <text x="459" y="534" font-family="serif" font-size="17" fill="#DBEAFE" text-anchor="middle">제목 4 (H4)</text>
  <!-- H5 -->
  <text x="210" y="598" font-family="monospace" font-size="13" fill="#93C5FD" opacity="0.6">#####</text>
  <rect x="306" y="582" width="270" height="32" rx="8" fill="#0F172A" stroke="#BFDBFE" stroke-width="1" opacity="0.8"/>
  <text x="441" y="604" font-family="serif" font-size="15" fill="#DBEAFE" text-anchor="middle" opacity="0.8">제목 5 (H5)</text>
  <!-- H6 -->
  <text x="210" y="662" font-family="monospace" font-size="11" fill="#93C5FD" opacity="0.5">######</text>
  <rect x="318" y="648" width="218" height="28" rx="8" fill="#0F172A" stroke="#BFDBFE" stroke-width="1" opacity="0.6"/>
  <text x="427" y="668" font-family="serif" font-size="13" fill="#BFDBFE" text-anchor="middle" opacity="0.6">제목 6 (H6)</text>
  <!-- Body text section (smallest) -->
  <rect x="256" y="698" width="568" height="20" rx="4" fill="#1A2A3A" opacity="0.5"/>
  <text x="540" y="714" font-family="serif" font-size="12" fill="#8899AA" text-anchor="middle">본문 텍스트 (Body text)</text>
  <!-- Connecting lines showing hierarchy depth -->
  <line x1="232" y1="274" x2="232" y2="660" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="4,4" opacity="0.3"/>
  <!-- Layer 3: Markdown syntax annotation on right -->
  <rect x="750" y="246" width="100" height="460" rx="8" fill="#001828" stroke="#1D4ED8" stroke-width="2" opacity="0.7"/>
  <text x="800" y="276" font-family="monospace" font-size="12" fill="#60A5FA" text-anchor="middle" opacity="0.7"># h1</text>
  <text x="800" y="370" font-family="monospace" font-size="11" fill="#60A5FA" text-anchor="middle" opacity="0.6">## h2</text>
  <text x="800" y="454" font-family="monospace" font-size="10" fill="#60A5FA" text-anchor="middle" opacity="0.5">### h3</text>
  <text x="800" y="532" font-family="monospace" font-size="9" fill="#60A5FA" text-anchor="middle" opacity="0.4">#### h4</text>
  <text x="800" y="600" font-family="monospace" font-size="8" fill="#60A5FA" text-anchor="middle" opacity="0.3">##### h5</text>
  <text x="800" y="662" font-family="monospace" font-size="7" fill="#60A5FA" text-anchor="middle" opacity="0.2">###### h6</text>
</svg>
