<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#FFF8E1"/>
  <!-- Layer 2: 씨앗 → 새싹 → 나무 3단계 성장 시퀀스 -->
  <!-- 단계 1: 씨앗 (왼쪽) -->
  <ellipse cx="172" cy="820" rx="60" ry="44" fill="#8D6E63"/>
  <ellipse cx="172" cy="820" rx="40" ry="28" fill="#A1887F"/>
  <!-- 단계 2: 새싹 (중앙) -->
  <rect x="496" y="720" width="32" height="140" rx="10" fill="#6D4C41"/>
  <ellipse cx="512" cy="680" rx="80" ry="60" fill="#66BB6A"/>
  <ellipse cx="460" cy="710" rx="52" ry="38" fill="#4CAF50"/>
  <ellipse cx="564" cy="710" rx="52" ry="38" fill="#4CAF50"/>
  <!-- 단계 3: 나무 (오른쪽) -->
  <!-- 줄기 -->
  <line x1="852" y1="940" x2="852" y2="680" stroke="#5D4037" stroke-width="44" stroke-linecap="round"/>
  <!-- 가지들 -->
  <line x1="852" y1="720" x2="720" y2="540" stroke="#6D4C41" stroke-width="26" stroke-linecap="round"/>
  <line x1="852" y1="720" x2="984" y2="540" stroke="#6D4C41" stroke-width="26" stroke-linecap="round"/>
  <line x1="720" y1="540" x2="660" y2="410" stroke="#795548" stroke-width="16" stroke-linecap="round"/>
  <line x1="720" y1="540" x2="780" y2="400" stroke="#795548" stroke-width="16" stroke-linecap="round"/>
  <line x1="984" y1="540" x2="924" y2="400" stroke="#795548" stroke-width="16" stroke-linecap="round"/>
  <!-- 잎들 -->
  <circle cx="660" cy="380" r="52" fill="#43A047"/>
  <circle cx="780" cy="370" r="48" fill="#4CAF50"/>
  <circle cx="924" cy="370" r="52" fill="#43A047"/>
  <circle cx="984" cy="520" r="44" fill="#66BB6A"/>
  <!-- Layer 3: 화살표 (진행 방향) -->
  <text x="340" y="830" font-size="120" fill="#BCAAA4" text-anchor="middle">→</text>
  <text x="686" y="830" font-size="120" fill="#BCAAA4" text-anchor="middle">→</text>
  <!-- 꽃 점 -->
  <circle cx="730" cy="366" r="22" fill="#FF80AB"/>
  <circle cx="924" cy="356" r="22" fill="#FF80AB"/>
</svg>
