<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0600"/>
      <stop offset="100%" stop-color="#1A1000"/>
    </linearGradient>
    <linearGradient id="chestBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <linearGradient id="chestLid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <radialGradient id="goldGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gold glow -->
  <ellipse cx="256" cy="320" rx="160" ry="120" fill="url(#goldGlow2)"/>
  <!-- Chest body -->
  <rect x="120" y="310" width="272" height="150" rx="12" fill="url(#chestBody)" stroke="#D97706" stroke-width="3"/>
  <!-- Chest lid (open) -->
  <path d="M120,310 L120,240 Q120,200 256,200 Q392,200 392,240 L392,310 Z" fill="url(#chestLid)" stroke="#D97706" stroke-width="3"/>
  <!-- Lid arch detail -->
  <path d="M128,308 Q128,218 256,218 Q384,218 384,308" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
  <!-- Metal bands on chest -->
  <rect x="120" y="358" width="272" height="12" rx="4" fill="#D97706"/>
  <rect x="120" y="415" width="272" height="12" rx="4" fill="#D97706"/>
  <!-- Lock -->
  <rect x="232" y="340" width="48" height="38" rx="8" fill="#D97706" stroke="#FDE68A" stroke-width="2"/>
  <circle cx="256" cy="358" r="10" fill="#451A03" stroke="#FDE68A" stroke-width="2"/>
  <rect x="249" y="362" width="14" height="10" rx="3" fill="#FDE68A" opacity="0.7"/>
  <!-- Gold coins spilling out -->
  <ellipse cx="256" cy="305" rx="30" ry="10" fill="#F59E0B" opacity="0.9"/>
  <ellipse cx="220" cy="315" rx="16" ry="6" fill="#F59E0B" opacity="0.8"/>
  <ellipse cx="292" cy="318" rx="16" ry="6" fill="#F59E0B" opacity="0.8"/>
  <circle cx="200" cy="320" r="10" fill="#FDE68A"/>
  <circle cx="310" cy="320" r="10" fill="#FDE68A"/>
  <circle cx="240" cy="300" r="8" fill="#FDE68A"/>
  <circle cx="270" cy="295" r="8" fill="#FDE68A"/>
  <!-- Gems spilling -->
  <polygon points="180,335 195,315 210,335" fill="#EF4444" opacity="0.9"/>
  <polygon points="302,335 317,315 332,335" fill="#3B82F6" opacity="0.9"/>
  <polygon points="240,285 252,265 264,285" fill="#22C55E" opacity="0.9"/>
  <!-- Title -->
  <text x="256" y="472" font-family="serif" font-size="18" fill="#D97706" text-anchor="middle" font-weight="bold">DUNGEON DASH</text>
</svg>
