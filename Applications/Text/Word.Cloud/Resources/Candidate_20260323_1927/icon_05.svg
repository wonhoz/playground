  <text x="200" y="390" font-family="'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.8)">art</text>
  <text x="760" y="400" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.8)">font</text>
  <text x="200" y="640" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="rgba(255,255,255,0.75)">color</text>
  <text x="740" y="650" font-family="'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.75)">size</text>
  <text x="350" y="730" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="rgba(255,255,255,0.7)">export</text>
  <text x="580" y="730" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.7)">layout</text>
