<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_cc03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <clipPath id="c_cc03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Teal background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_cc03)"/>
  <g clip-path="url(#c_cc03)">
    <!-- Layer 2: Key shape (golden) -->
    <!-- Key bow (circle part) -->
    <circle cx="380" cy="380" r="200" fill="#F59E0B" stroke="#FDE68A" stroke-width="20"/>
    <circle cx="380" cy="380" r="120" fill="#0891B2"/>
    <circle cx="380" cy="380" r="80" fill="#F59E0B"/>
    <!-- Key shaft -->
    <rect x="540" y="348" width="360" height="64" rx="32" fill="#F59E0B"/>
    <!-- Key teeth -->
    <rect x="760" y="412" width="64" height="80" rx="16" fill="#FCD34D"/>
    <rect x="860" y="412" width="64" height="60" rx="16" fill="#FCD34D"/>
    <rect x="660" y="412" width="64" height="100" rx="16" fill="#FBBF24"/>
    <!-- Layer 3: Grid pattern behind key (hint at crossword) -->
    <!-- Small crossword grid in background -->
    <rect x="552" y="580" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="652" y="580" width="80" height="80" rx="8" fill="#0C4A6E" opacity="0.9"/>
    <rect x="752" y="580" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="552" y="680" width="80" height="80" rx="8" fill="#0C4A6E" opacity="0.9"/>
    <rect x="652" y="680" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="752" y="680" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="552" y="780" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="652" y="780" width="80" height="80" rx="8" fill="white" opacity="0.8"/>
    <rect x="752" y="780" width="80" height="80" rx="8" fill="#0C4A6E" opacity="0.9"/>
    <!-- Letters in white cells -->
    <text x="592" y="646" font-family="Arial Black" font-size="64" font-weight="900" fill="#0891B2" text-anchor="middle">A</text>
    <text x="792" y="646" font-family="Arial Black" font-size="64" font-weight="900" fill="#0891B2" text-anchor="middle">R</text>
    <text x="692" y="746" font-family="Arial Black" font-size="64" font-weight="900" fill="#0891B2" text-anchor="middle">T</text>
    <text x="592" y="846" font-family="Arial Black" font-size="64" font-weight="900" fill="#0891B2" text-anchor="middle">S</text>
    <text x="692" y="846" font-family="Arial Black" font-size="64" font-weight="900" fill="#0891B2" text-anchor="middle">O</text>
    <!-- Key hole sparkle -->
    <circle cx="380" cy="380" r="20" fill="#FEF08A"/>
  </g>
</svg>
