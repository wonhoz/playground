<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1C1C2E"/>
  <!-- Layer 2: 원소 팔레트 (4×3 컬러 원) -->
  <!-- Row 1 -->
  <circle cx="300" cy="300" r="90" fill="#E8C878"/>
  <text x="300" y="315" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="#3E2000">Sa</text>
  <circle cx="512" cy="300" r="90" fill="#3468C8"/>
  <text x="512" y="315" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Wa</text>
  <circle cx="724" cy="300" r="90" fill="#FF5500"/>
  <text x="724" y="315" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Fi</text>
  <!-- Row 2 -->
  <circle cx="300" cy="512" r="90" fill="#788090"/>
  <text x="300" y="527" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">St</text>
  <circle cx="512" cy="512" r="90" fill="#8B5E3C"/>
  <text x="512" y="527" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Wo</text>
  <circle cx="724" cy="512" r="90" fill="#A8D8F0"/>
  <text x="724" y="527" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="#0D4070">Ic</text>
  <!-- Row 3 -->
  <circle cx="300" cy="724" r="90" fill="#22A030"/>
  <text x="300" y="739" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Pl</text>
  <circle cx="512" cy="724" r="90" fill="#88FF10"/>
  <text x="512" y="739" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="#1A3A00">Ac</text>
  <circle cx="724" cy="724" r="90" fill="#6A4820"/>
  <text x="724" y="739" text-anchor="middle" font-family="Arial Black" font-size="58" font-weight="900" fill="white">Oi</text>
  <!-- Layer 3: 원들 사이 연결 효과 -->
  <line x1="390" y1="300" x2="422" y2="300" stroke="#444466" stroke-width="6"/>
  <line x1="602" y1="300" x2="634" y2="300" stroke="#444466" stroke-width="6"/>
  <line x1="390" y1="512" x2="422" y2="512" stroke="#444466" stroke-width="6"/>
  <line x1="602" y1="512" x2="634" y2="512" stroke="#444466" stroke-width="6"/>
</svg>