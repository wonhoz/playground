<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="bigA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Big A and small a -->
  <!-- Big A (uppercase) -->
  <text x="300" y="580" text-anchor="middle" dominant-baseline="middle" font-size="540" font-family="Georgia,serif" font-weight="bold" fill="url(#bigA)">A</text>
  <!-- Small a (lowercase) -->
  <text x="760" y="660" text-anchor="middle" dominant-baseline="middle" font-size="360" font-family="Georgia,serif" fill="#00E5FF" opacity="0.9">a</text>
  <!-- Layer 3: Transformation arrows -->
  <!-- Right arrow A→a -->
  <path d="M 420 440 Q 560 340 680 460" fill="none" stroke="#FFD600" stroke-width="18" stroke-linecap="round"/>
  <polygon points="680,460 650,420 720,430" fill="#FFD600"/>
  <!-- Left arrow a→A -->
  <path d="M 680 560 Q 560 680 440 580" fill="none" stroke="#69F0AE" stroke-width="14" stroke-linecap="round"/>
  <polygon points="440,580 470,620 410,610" fill="#69F0AE"/>
  <!-- Small label -->
  <text x="512" y="900" text-anchor="middle" dominant-baseline="middle" font-size="84" font-family="Segoe UI,Arial,sans-serif" fill="#B3E5FC" opacity="0.8">Aa → aA</text>
</svg>
