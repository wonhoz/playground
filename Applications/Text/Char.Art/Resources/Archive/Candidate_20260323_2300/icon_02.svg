<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#1E3A8A"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Left: photo/image side -->
    <rect x="80" y="200" width="380" height="620" rx="20" fill="#1E40AF" stroke="#60A5FA" stroke-width="12"/>
    <!-- Mountain silhouette in photo -->
    <polygon points="160,700 300,400 370,560 440,440 540,700" fill="#3B82F6"/>
    <rect x="80" y="200" width="380" height="50" rx="10" fill="#2563EB"/>
    <text x="120" y="238" font-size="30" font-weight="bold" font-family="system-ui" fill="#93C5FD">IMAGE</text>
    <!-- Sun in photo -->
    <circle cx="420" cy="300" r="50" fill="#FDE68A"/>
    <!-- Arrow in middle -->
    <polygon points="488,490 580,455 580,480 920,480 920,510 580,510 580,535" fill="#F8FAFC"/>
    <!-- Right: ASCII text side -->
    <rect x="568" y="200" width="380" height="620" rx="20" fill="#064E3B" stroke="#86EFAC" stroke-width="12"/>
    <rect x="568" y="200" width="380" height="50" rx="10" fill="#065F46"/>
    <text x="608" y="238" font-size="30" font-weight="bold" font-family="system-ui" fill="#86EFAC">ASCII</text>
    <!-- ASCII grid lines -->
    <text x="590" y="310" font-size="20" font-family="monospace" fill="#86EFAC">##@@##..  ##</text>
    <text x="590" y="345" font-size="20" font-family="monospace" fill="#86EFAC">@@$$%%++  @@</text>
    <text x="590" y="380" font-size="20" font-family="monospace" fill="#86EFAC">##@@##..  ##</text>
    <text x="590" y="415" font-size="20" font-family="monospace" fill="#86EFAC">$$##@@%%  ..</text>
    <text x="590" y="450" font-size="20" font-family="monospace" fill="#86EFAC">..##$$@@  ++</text>
    <text x="590" y="485" font-size="20" font-family="monospace" fill="#86EFAC">@@##..$$  ##</text>
    <text x="590" y="520" font-size="20" font-family="monospace" fill="#86EFAC">%%@@##..  @@</text>
    <text x="590" y="555" font-size="20" font-family="monospace" fill="#86EFAC">##$$@@##  ..</text>
    <text x="590" y="590" font-size="20" font-family="monospace" fill="#86EFAC">..@@##$$  ++</text>
    <text x="590" y="625" font-size="20" font-family="monospace" fill="#86EFAC">@@##%%..  ##</text>
    <text x="590" y="660" font-size="20" font-family="monospace" fill="#86EFAC">##@@..%%  @@</text>
    <text x="590" y="695" font-size="20" font-family="monospace" fill="#86EFAC">$$##@@##  ..</text>
    <text x="590" y="730" font-size="20" font-family="monospace" fill="#86EFAC">..##$$@@  ++</text>
    <text x="590" y="765" font-size="20" font-family="monospace" fill="#86EFAC">%%@@##..  @@</text>
  </g>
</svg>
