<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- 망원경 본체 -->
  <rect x="280" y="440" width="460" height="100" rx="50" fill="#0D47A1" stroke="#42A5F5" stroke-width="14" transform="rotate(-25 512 490)"/>
  <!-- 망원경 렌즈 (큰 쪽) -->
  <circle cx="320" cy="540" r="80" fill="#0D47A1" stroke="#42A5F5" stroke-width="16"/>
  <circle cx="320" cy="540" r="55" fill="#050A0F" stroke="#42A5F5" stroke-width="8"/>
  <!-- 망원경 아이피스 (작은 쪽) -->
  <circle cx="720" cy="430" r="45" fill="#0D47A1" stroke="#42A5F5" stroke-width="12"/>
  <!-- 삼각대 -->
  <line x1="512" y1="600" x2="420" y2="820" stroke="#42A5F5" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="604" y2="820" stroke="#42A5F5" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="512" y2="820" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <!-- 창 (윈도우) 타겟 -->
  <rect x="180" y="180" width="200" height="160" rx="14" fill="none" stroke="#42A5F5" stroke-width="12"/>
  <line x1="180" y1="220" x2="380" y2="220" stroke="#42A5F5" stroke-width="8"/>
  <!-- 조준 십자선 -->
  <line x1="280" y1="220" x2="280" y2="340" stroke="#42A5F5" stroke-width="6" stroke-dasharray="10 6"/>
  <line x1="180" y1="290" x2="380" y2="290" stroke="#42A5F5" stroke-width="6" stroke-dasharray="10 6"/>
  <!-- 연결선 -->
  <line x1="380" y1="300" x2="380" y2="490" stroke="#42A5F5" stroke-width="6" stroke-dasharray="12 8" opacity="0.5"/>
</svg>
