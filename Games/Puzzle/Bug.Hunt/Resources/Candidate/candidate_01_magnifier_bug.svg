<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A0A"/>
      <stop offset="100%" stop-color="#142814"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code lines background -->
  <rect x="68" y="90" width="280" height="12" rx="3" fill="#1E3A1E" opacity="0.8"/>
  <rect x="68" y="112" width="220" height="12" rx="3" fill="#1E3A1E" opacity="0.8"/>
  <rect x="68" y="134" width="260" height="12" rx="3" fill="#1E3A1E" opacity="0.8"/>
  <rect x="68" y="156" width="200" height="12" rx="3" fill="#FF3333" opacity="0.9"/>
  <rect x="68" y="178" width="240" height="12" rx="3" fill="#1E3A1E" opacity="0.8"/>
  <rect x="68" y="200" width="180" height="12" rx="3" fill="#1E3A1E" opacity="0.8"/>
  <!-- Bug icon on highlighted line -->
  <circle cx="310" cy="162" r="12" fill="#FF3333"/>
  <text x="310" y="167" font-family="Arial" font-size="14" fill="white" text-anchor="middle">!</text>
  <!-- Magnifier -->
  <circle cx="330" cy="240" r="90" fill="none" stroke="#44CC44" stroke-width="8"/>
  <circle cx="330" cy="240" r="78" fill="#1A2A1A" opacity="0.6"/>
  <!-- Bug inside magnifier -->
  <ellipse cx="330" cy="236" rx="22" ry="16" fill="#FF4444"/>
  <circle cx="320" cy="230" r="7" fill="#CC0000"/>
  <circle cx="340" cy="230" r="7" fill="#CC0000"/>
  <!-- Bug antennae -->
  <line x1="320" y1="224" x2="310" y2="212" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="340" y1="224" x2="350" y2="212" stroke="#FF6666" stroke-width="2.5"/>
  <!-- Bug legs -->
  <line x1="312" y1="236" x2="296" y2="230" stroke="#FF6666" stroke-width="2"/>
  <line x1="312" y1="240" x2="296" y2="240" stroke="#FF6666" stroke-width="2"/>
  <line x1="348" y1="236" x2="364" y2="230" stroke="#FF6666" stroke-width="2"/>
  <line x1="348" y1="240" x2="364" y2="240" stroke="#FF6666" stroke-width="2"/>
  <!-- Handle -->
  <line x1="398" y1="308" x2="440" y2="360" stroke="#44CC44" stroke-width="14" stroke-linecap="round"/>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#44CC44" text-anchor="middle">Bug.Hunt</text>
</svg>
