    <text x="212" y="438" font-family="monospace" font-size="20" fill="#FF5555" font-weight="bold">-</text>
    <rect x="228" y="426" width="160" height="14" rx="7" fill="#FF5555" opacity="0.5"/>

    <!-- Added lines (green, right only) -->
    <rect x="564" y="336" width="260" height="32" rx="0" fill="#30FF3020"/>
    <text x="576" y="358" font-family="monospace" font-size="20" fill="#44EE55" font-weight="bold">+</text>
    <rect x="592" y="346" width="200" height="14" rx="7" fill="#44EE55" opacity="0.7"/>

    <rect x="564" y="376" width="260" height="32" rx="0" fill="#30FF3020"/>
    <text x="576" y="398" font-family="monospace" font-size="20" fill="#44EE55" font-weight="bold">+</text>
    <rect x="592" y="386" width="160" height="14" rx="7" fill="#44EE55" opacity="0.6"/>

    <!-- Shared lines below diff -->
    <rect x="216" y="460" width="160" height="14" rx="7" fill="#6080A0" opacity="0.5"/>
    <rect x="580" y="460" width="160" height="14" rx="7" fill="#6080A0" opacity="0.5"/>
    <rect x="216" y="486" width="200" height="14" rx="7" fill="#6080A0" opacity="0.4"/>
    <rect x="580" y="486" width="200" height="14" rx="7" fill="#6080A0" opacity="0.4"/>
    <rect x="216" y="512" width="130" height="14" rx="7" fill="#6080A0" opacity="0.4"/>
    <rect x="580" y="512" width="130" height="14" rx="7" fill="#6080A0" opacity="0.4"/>

    <!-- More diff lines below -->
    <rect x="200" y="538" width="260" height="32" rx="0" fill="#FF303015"/>
    <text x="212" y="560" font-family="monospace" font-size="20" fill="#FF5555" font-weight="bold">-</text>
    <rect x="228" y="548" width="150" height="14" rx="7" fill="#FF5555" opacity="0.5"/>

    <rect x="564" y="538" width="260" height="32" rx="0" fill="#30FF3015"/>
    <text x="576" y="560" font-family="monospace" font-size="20" fill="#44EE55" font-weight="bold">+</text>
    <rect x="592" y="548" width="170" height="14" rx="7" fill="#44EE55" opacity="0.5"/>

    <rect x="564" y="578" width="260" height="32" rx="0" fill="#30FF3015"/>
    <text x="576" y="600" font-family="monospace" font-size="20" fill="#44EE55" font-weight="bold">+</text>
    <rect x="592" y="588" width="130" height="14" rx="7" fill="#44EE55" opacity="0.4"/>

    <!-- Center comparison arrows -->
    <line x1="460" y1="500" x2="564" y2="500" stroke="#5080B0" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <polygon points="552,492 568,500 552,508" fill="#5080B0" opacity="0.6"/>
    <polygon points="472,492 456,500 472,508" fill="#5080B0" opacity="0.6"/>

    <!-- VS badge -->
    <circle cx="512" cy="500" r="28" fill="#2D3F55" stroke="#5080B0" stroke-width="3"/>
    <text x="512" y="507" font-family="monospace" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">vs</text>
