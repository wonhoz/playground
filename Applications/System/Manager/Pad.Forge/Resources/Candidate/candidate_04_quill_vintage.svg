<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#100805"/>
    </radialGradient>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0E0C0"/>
      <stop offset="100%" stop-color="#D8C8A0"/>
    </linearGradient>
    <linearGradient id="quill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFEE"/>
      <stop offset="100%" stop-color="#DDDDCC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Parchment scroll -->
  <!-- Top roll -->
  <ellipse cx="256" cy="108" rx="145" ry="22" fill="#C8A870"/>
  <ellipse cx="256" cy="108" rx="130" ry="16" fill="#D8B880"/>
  <!-- Parchment body -->
  <rect x="111" y="108" width="290" height="290" fill="url(#parchment)"/>
  <!-- Bottom roll -->
  <ellipse cx="256" cy="398" rx="145" ry="22" fill="#C8A870"/>
  <ellipse cx="256" cy="398" rx="130" ry="16" fill="#D8B880"/>
  <!-- Parchment edges (shadows) -->
  <rect x="111" y="108" width="14" height="290" fill="#C0A870" opacity="0.4"/>
  <rect x="387" y="108" width="14" height="290" fill="#C0A870" opacity="0.4"/>
  <!-- Text lines on scroll -->
  <line x1="135" y1="148" x2="377" y2="148" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="168" x2="377" y2="168" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="188" x2="377" y2="188" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="208" x2="377" y2="208" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="228" x2="377" y2="228" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="248" x2="377" y2="248" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="268" x2="377" y2="268" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="288" x2="377" y2="288" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="308" x2="377" y2="308" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="328" x2="377" y2="328" stroke="#886644" stroke-width="1"/>
  <line x1="135" y1="348" x2="377" y2="348" stroke="#886644" stroke-width="1"/>
  <!-- Calligraphy title -->
  <text x="256" y="138" font-family="serif" font-size="18" fill="#553322" text-anchor="middle" font-style="italic">Pad.Forge</text>
  <!-- Written text (faux calligraphy) -->
  <rect x="145" y="158" width="110" height="7" rx="3" fill="#553322" opacity="0.5"/>
  <rect x="145" y="178" width="150" height="5" rx="2" fill="#665533" opacity="0.4"/>
  <rect x="145" y="198" width="130" height="5" rx="2" fill="#665533" opacity="0.4"/>
  <rect x="145" y="218" width="140" height="5" rx="2" fill="#665533" opacity="0.3"/>
  <!-- Quill pen -->
  <path d="M380,80 Q440,100 420,200 Q410,240 390,260 L385,255 Q402,238 408,200 Q425,108 370,90 Z" fill="url(#quill)"/>
  <line x1="388" y1="258" x2="340" y2="340" stroke="#333322" stroke-width="3" stroke-linecap="round"/>
  <!-- Ink drop -->
  <ellipse cx="338" cy="344" rx="8" ry="10" fill="#111100"/>
  <!-- Ink trail -->
  <line x1="338" y1="354" x2="338" y2="380" stroke="#111100" stroke-width="2" stroke-linecap="round"/>
</svg>
