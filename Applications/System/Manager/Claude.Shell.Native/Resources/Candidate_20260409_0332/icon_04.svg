<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <clipPath id="c4"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Lavender background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g4)"/>
  <g clip-path="url(#c4)">
    <!-- Layer 2: Layered panels (Explorer → Menu → Terminal) -->
    <!-- Bottom layer: Explorer window -->
    <rect x="140" y="360" width="560" height="380" rx="20" fill="#DBEAFE" opacity="0.9"/>
    <rect x="140" y="360" width="560" height="50" rx="20" fill="#3B82F6" opacity="0.8"/>
    <rect x="140" y="389" width="560" height="21" fill="#3B82F6" opacity="0.8"/>
    <text x="222" y="394" font-family="Arial,sans-serif" font-size="26" fill="white">Explorer</text>
    <!-- Middle layer: Context menu popup -->
    <rect x="290" y="290" width="420" height="300" rx="18" fill="white"/>
    <rect x="304" y="304" width="392" height="90" rx="12" fill="#7C3AED"/>
    <text x="500" y="362" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">CLAUDE</text>
    <rect x="304" y="402" width="392" height="80" rx="8" fill="#F3E8FF"/>
    <text x="500" y="456" font-family="Arial,sans-serif" font-size="80" fill="#6D28D9" font-weight="bold" text-anchor="middle">CODE 열기</text>
    <!-- Top layer: Terminal popup -->
    <rect x="440" y="220" width="440" height="240" rx="18" fill="#1E1B4B"/>
    <rect x="440" y="220" width="440" height="46" rx="18" fill="#312E81"/>
    <rect x="440" y="248" width="440" height="18" fill="#312E81"/>
    <text x="462" y="254" font-family="Arial,sans-serif" font-size="22" fill="#A5B4FC">Terminal</text>
    <!-- Terminal content -->
    <text x="462" y="340" font-family="Consolas,monospace" font-size="84" fill="#818CF8">&gt;_</text>
    <!-- Layer 3: Depth shadow lines -->
    <line x1="290" y1="590" x2="140" y2="740" stroke="#7C3AED" stroke-width="4" stroke-dasharray="12,8" opacity="0.4"/>
    <line x1="710" y1="590" x2="700" y2="460" stroke="#7C3AED" stroke-width="4" stroke-dasharray="12,8" opacity="0.4"/>
  </g>
</svg>
