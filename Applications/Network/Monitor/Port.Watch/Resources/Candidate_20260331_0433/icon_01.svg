<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1F2D"/>
  <!-- Layer 2: 포트 목록 테이블 -->
  <!-- 헤더 -->
  <rect x="80" y="120" width="864" height="76" rx="12" fill="#1565C0"/>
