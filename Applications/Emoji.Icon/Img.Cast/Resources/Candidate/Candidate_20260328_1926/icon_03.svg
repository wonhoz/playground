<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="rodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000035"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- 낚시대 (좌상단에서 우측으로 뻗음) -->
  <rect x="90" y="155" width="580" height="30" rx="15" fill="url(#rodGrad)" transform="rotate(12 90 155)"/>
  <!-- 핸들 그립 -->
  <rect x="82" y="148" width="110" height="44" rx="22" fill="#3E2723"/>

  <!-- 릴(reel) -->
  <circle cx="210" cy="230" r="38" fill="#4E342E" stroke="#795548" stroke-width="8"/>
  <circle cx="210" cy="230" r="18" fill="#8D6E63"/>

  <!-- 낚시줄 (대 끝에서 3개 파일로 연결되는 곡선) -->
  <!-- 대 끝 위치: 약 (680, 272) rotate 12도 적용 후 실제 끝점 계산
       90 + 580*cos(12°) ≈ 90 + 567 = 657
       155 + 580*sin(12°) ≈ 155 + 121 = 276 -->
  <!-- SVG 파일로 가는 줄 -->
  <path d="M657,276 Q580,420 340,560" stroke="#455A64" stroke-width="5" fill="none"/>
  <!-- PNG 파일로 가는 줄 -->
  <path d="M657,276 Q640,440 560,620" stroke="#455A64" stroke-width="5" fill="none"/>
  <!-- ICO 파일로 가는 줄 -->
  <path d="M657,276 Q700,460 780,600" stroke="#455A64" stroke-width="5" fill="none"/>

  <!-- SVG 파일 카드 (낚시에 걸림) -->
  <rect x="250" y="540" width="188" height="230" rx="18" fill="white" filter="url(#sh3)"/>
  <rect x="250" y="540" width="188" height="64" rx="18" fill="#FF7043"/>
  <rect x="250" y="572" width="188" height="32" fill="#FF7043"/>
  <text x="344" y="600" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">SVG</text>
  <rect x="278" y="626" width="130" height="16" rx="8" fill="#FFCCBC"/>
  <rect x="278" y="656" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="278" y="686" width="114" height="16" rx="8" fill="#E0E0E0"/>
  <!-- 낚시 훅 연결 -->
  <circle cx="344" cy="540" r="12" fill="#37474F"/>

  <!-- PNG 파일 카드 -->
  <rect x="466" y="600" width="188" height="230" rx="18" fill="white" filter="url(#sh3)"/>
  <rect x="466" y="600" width="188" height="64" rx="18" fill="#7E57C2"/>
  <rect x="466" y="632" width="188" height="32" fill="#7E57C2"/>
  <text x="560" y="660" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">PNG</text>
  <rect x="494" y="686" width="130" height="16" rx="8" fill="#D1C4E9"/>
  <rect x="494" y="716" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="494" y="746" width="114" height="16" rx="8" fill="#E0E0E0"/>
  <circle cx="560" cy="600" r="12" fill="#37474F"/>

  <!-- ICO 파일 카드 -->
  <rect x="686" y="555" width="188" height="230" rx="18" fill="white" filter="url(#sh3)"/>
  <rect x="686" y="555" width="188" height="64" rx="18" fill="#1565C0"/>
  <rect x="686" y="587" width="188" height="32" fill="#1565C0"/>
  <text x="780" y="615" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">ICO</text>
  <rect x="714" y="641" width="130" height="16" rx="8" fill="#BBDEFB"/>
  <rect x="714" y="671" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="714" y="701" width="114" height="16" rx="8" fill="#E0E0E0"/>
  <circle cx="780" cy="555" r="12" fill="#37474F"/>

  <!-- 물결 (하단) -->
  <path d="M80,920 Q180,890 280,920 Q380,950 480,920 Q580,890 680,920 Q780,950 880,920 Q960,898 944,920" stroke="#26C6DA" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M80,960 Q180,930 280,960 Q380,990 480,960 Q580,930 680,960 Q780,990 880,960 Q960,938 944,960" stroke="#00ACC1" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
