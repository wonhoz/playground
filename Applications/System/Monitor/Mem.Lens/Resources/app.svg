<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright emerald green -->
  <rect width="1024" height="1024" rx="250" fill="#00B894"/>

  <!-- Layer 2: RAM stick (large, simple, centered-left) -->
  <!-- PCB board — thick green rectangle -->
  <rect x="152" y="220" width="500" height="580" rx="24" fill="#27AE60" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Gold connector strip at bottom -->
  <rect x="168" y="700" width="468" height="80" rx="12" fill="#F9CA24" stroke="#FFFFFF" stroke-width="12"/>

  <!-- Gold contacts (4 big pins) -->
  <rect x="192" y="716" width="72" height="48" rx="8" fill="#E17055"/>
  <rect x="296" y="716" width="72" height="48" rx="8" fill="#E17055"/>
  <rect x="400" y="716" width="72" height="48" rx="8" fill="#E17055"/>
  <rect x="504" y="716" width="80" height="48" rx="8" fill="#E17055"/>

  <!-- 2 memory chips on PCB (large, simple) -->
  <rect x="186" y="268" width="200" height="180" rx="16" fill="#1A6634" stroke="#FFFFFF" stroke-width="10"/>
  <text x="286" y="365" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="58" font-weight="900" fill="#FFEAA7">DDR5</text>

  <rect x="416" y="268" width="200" height="180" rx="16" fill="#1A6634" stroke="#FFFFFF" stroke-width="10"/>
  <text x="516" y="365" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="58" font-weight="900" fill="#FFEAA7">32GB</text>

  <!-- LED bar at top of RAM -->
  <rect x="168" y="226" width="468" height="20" rx="6" fill="#55EFC4"/>

  <!-- Layer 3: Magnifier overlapping RAM (right side) -->
  <circle cx="762" cy="440" r="200" fill="none" stroke="#FFFFFF" stroke-width="22"/>
  <circle cx="762" cy="440" r="177" fill="#2D3436" opacity="0.88"/>

  <!-- Inside magnifier: zoom readout -->
  <text x="762" y="380" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="34" fill="#55EFC4">WorkingSet</text>
  <!-- Big progress bar -->
  <rect x="662" y="396" width="200" height="32" rx="8" fill="#3D5A3D"/>
  <rect x="662" y="396" width="156" height="32" rx="8" fill="#2ECC71"/>
  <text x="762" y="470" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">78%</text>

  <!-- Leak warning -->
  <text x="762" y="532" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" fill="#FF7675">⚠ LEAK</text>
  <text x="762" y="578" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="34" fill="#FDCB6E">+2.4MB/s</text>

  <!-- Handle -->
  <line x1="916" y1="595" x2="974" y2="670" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
</svg>
