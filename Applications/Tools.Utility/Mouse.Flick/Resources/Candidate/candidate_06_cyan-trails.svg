<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001B1E"/>
      <stop offset="100%" stop-color="#003540"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multi-gesture trails -->
  <!-- Swipe right trail -->
  <path d="M 80 180 Q 200 170 320 180" fill="none" stroke="#00F5FF" stroke-width="5" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <polygon points="325,168 345,180 325,192" fill="#00F5FF" filter="url(#glow)"/>
  <!-- Swipe down trail -->
  <path d="M 380 100 Q 390 220 380 340" fill="none" stroke="#00B4D8" stroke-width="5" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <polygon points="368,345 380,365 392,345" fill="#00B4D8" filter="url(#glow)"/>
  <!-- Circular gesture -->
  <circle cx="180" cy="310" r="70" fill="none" stroke="#90E0EF" stroke-width="4" stroke-dasharray="16,8" opacity="0.6" filter="url(#glow)"/>
  <polygon points="248,305 264,315 248,325" fill="#90E0EF" filter="url(#glow)"/>
  <!-- Mouse cursor at center -->
  <path d="M 256 256 L 270 230 L 274 246 L 286 240 L 272 270 L 268 256 Z" fill="#00F5FF" filter="url(#glow)"/>
  <!-- Title -->
  <text x="256" y="455" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#00F5FF" filter="url(#glow)">MOUSE.FLICK</text>
</svg>