<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg6)"/>

  <!-- 4x4 격자 -->
  <!-- 격자 시작: x=212, y=212, 칸크기=150, 총 600x600 -->
  <!-- 행 0 -->
  <rect x="212" y="212" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="362" y="212" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="512" y="212" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="662" y="212" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <!-- 행 1 -->
  <rect x="212" y="362" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="362" y="362" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="512" y="362" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="662" y="362" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <!-- 행 2 -->
  <rect x="212" y="512" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="362" y="512" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="512" y="512" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="662" y="512" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <!-- 행 3 -->
  <rect x="212" y="662" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="362" y="662" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="512" y="662" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>
  <rect x="662" y="662" width="148" height="148" rx="10" fill="#1E293B" stroke="#334155" stroke-width="4"/>

  <!-- 네온 글자들 + 글로우 효과 -->
  <!-- 행 0 -->
  <text x="286" y="322" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00FF88" filter="url(#glow1)">A</text>
  <text x="436" y="322" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF6B6B" filter="url(#glow2)">B</text>
  <text x="586" y="322" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FFD700" filter="url(#glow3)">C</text>
  <text x="736" y="322" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00D4FF" filter="url(#glow4)">D</text>
  <!-- 행 1 -->
  <text x="286" y="472" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF00FF" filter="url(#glow5)">E</text>
  <text x="436" y="472" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00FF88">F</text>
  <text x="586" y="472" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF6B6B">G</text>
  <text x="736" y="472" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FFD700">H</text>
  <!-- 행 2 -->
  <text x="286" y="622" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00D4FF">I</text>
  <text x="436" y="622" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF00FF">J</text>
  <text x="586" y="622" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00FF88">K</text>
  <text x="736" y="622" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF6B6B">L</text>
  <!-- 행 3 -->
  <text x="286" y="772" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FFD700">M</text>
  <text x="436" y="772" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00D4FF">N</text>
  <text x="586" y="772" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#FF00FF">O</text>
  <text x="736" y="772" font-family="Arial Black" font-size="110" font-weight="900" text-anchor="middle" fill="#00FF88">P</text>

  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
