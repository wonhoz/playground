<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#E0FAF4"/>
  <rect width="1024" height="1024" rx="180" fill="url(#bg01)"/>
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2F5E8"/>
      <stop offset="100%" stop-color="#00C9A7"/>
    </linearGradient>
  </defs>
  <!-- Layer 2: Main Object — three layered file cards -->
  <!-- Card 3 (back) -->
  <rect x="320" y="250" width="340" height="420" rx="28" fill="#0096A6" opacity="0.5"/>
  <!-- Card 2 (middle) -->
  <rect x="280" y="215" width="340" height="420" rx="28" fill="#00B4C8" opacity="0.75"/>
  <!-- Card 1 (front) -->
  <rect x="240" y="180" width="340" height="420" rx="28" fill="white"/>
  <!-- Dog-ear top-right -->
  <path d="M500 180 L580 260 L500 260 Z" fill="#00C9A7"/>
  <!-- Layer 3: Format label text on front card -->
  <text x="272" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="86" font-weight="800" fill="#009688">SVG</text>
  <rect x="272" y="330" width="240" height="6" rx="3" fill="#B2F5E8"/>
  <text x="272" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="700" fill="#00BCD4">PNG</text>
  <text x="272" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="700" fill="#26C6DA">ICO</text>
</svg>
