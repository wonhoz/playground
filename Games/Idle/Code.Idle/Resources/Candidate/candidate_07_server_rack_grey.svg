<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C2128"/>
      <stop offset="100%" stop-color="#2D333B"/>
    </linearGradient>
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444C56"/>
      <stop offset="100%" stop-color="#2D333B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Server rack frame -->
  <rect x="140" y="130" width="232" height="280" rx="10" fill="#22272E" stroke="#444C56" stroke-width="2"/>
  <!-- Server units -->
  <rect x="152" y="144" width="208" height="38" rx="6" fill="url(#rack)"/>
  <rect x="152" y="190" width="208" height="38" rx="6" fill="url(#rack)"/>
  <rect x="152" y="236" width="208" height="38" rx="6" fill="url(#rack)"/>
  <rect x="152" y="282" width="208" height="38" rx="6" fill="url(#rack)"/>
  <rect x="152" y="328" width="208" height="38" rx="6" fill="url(#rack)"/>
  <!-- Activity LEDs -->
  <circle cx="170" cy="163" r="5" fill="#00FF88"/><circle cx="186" cy="163" r="5" fill="#00AA55"/>
  <circle cx="170" cy="209" r="5" fill="#00FF88"/><circle cx="186" cy="209" r="5" fill="#FFAA00"/>
  <circle cx="170" cy="255" r="5" fill="#00FF88"/><circle cx="186" cy="255" r="5" fill="#00FF88"/>
  <circle cx="170" cy="301" r="5" fill="#FF4444"/><circle cx="186" cy="301" r="5" fill="#FF4444"/>
  <circle cx="170" cy="347" r="5" fill="#00FF88"/><circle cx="186" cy="347" r="5" fill="#FFAA00"/>
  <!-- Progress bars on racks -->
  <rect x="200" y="156" width="130" height="10" rx="5" fill="#1C2128"/>
  <rect x="200" y="156" width="110" height="10" rx="5" fill="#57AB5A"/>
  <rect x="200" y="202" width="130" height="10" rx="5" fill="#1C2128"/>
  <rect x="200" y="202" width="80" height="10" rx="5" fill="#E3B341"/>
  <rect x="200" y="248" width="130" height="10" rx="5" fill="#1C2128"/>
  <rect x="200" y="248" width="125" height="10" rx="5" fill="#57AB5A"/>
  <rect x="200" y="294" width="130" height="10" rx="5" fill="#1C2128"/>
  <rect x="200" y="294" width="40" height="10" rx="5" fill="#F47067"/>
  <rect x="200" y="340" width="130" height="10" rx="5" fill="#1C2128"/>
  <rect x="200" y="340" width="95" height="10" rx="5" fill="#57AB5A"/>
  <!-- Code idle label -->
  <rect x="360" y="380" width="28" height="16" rx="3" fill="#57AB5A"/>
  <rect x="140" y="420" width="232" height="6" rx="3" fill="#2D333B"/>
</svg>
