<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 브라우저 창 (기울어진) -->
  <rect x="100" y="180" width="640" height="480" rx="24" fill="#3F51B5" transform="rotate(-6 420 420)"/>
  <rect x="100" y="180" width="640" height="70" rx="24" fill="#283593" transform="rotate(-6 420 215)"/>
  <!-- URL -->
  <text x="200" y="228" font-family="'Consolas', monospace" font-size="36" fill="#9FA8DA" transform="rotate(-6 370 228)">example.com</text>
  <!-- 웹 콘텐츠 -->
  <rect x="120" y="270" width="400" height="30" rx="8" fill="#5C6BC0" transform="rotate(-6 320 285)"/>
  <rect x="120" y="316" width="560" height="20" rx="6" fill="#5C6BC0" opacity="0.7" transform="rotate(-6 400 326)"/>
  <rect x="120" y="348" width="520" height="20" rx="6" fill="#5C6BC0" opacity="0.6" transform="rotate(-6 380 358)"/>
  <!-- Layer 3: 카메라 셔터 (오른쪽 앞) -->
  <circle cx="760" cy="640" r="200" fill="#FF5722"/>
  <circle cx="760" cy="640" r="150" fill="#E64A19"/>
  <circle cx="760" cy="640" r="100" fill="white"/>
  <circle cx="760" cy="640" r="60" fill="#FF5722"/>
  <!-- PNG 파일 배지 -->
  <rect x="580" y="820" width="180" height="80" rx="16" fill="#1565C0"/>
  <text x="670" y="873" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">PNG</text>
</svg>
