<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 스카이 블루 -->
  <rect width="1024" height="1024" rx="180" fill="#B3E5FC"/>
  <!-- Layer 2: 메인 크로스워드 패턴 (+ 모양) -->
  <!-- 가로 막대 (파란색) -->
  <rect x="120" y="388" width="784" height="248" rx="16" fill="#0288D1"/>
  <!-- 세로 막대 (파란색) -->
  <rect x="388" y="160" width="248" height="704" rx="16" fill="#01579B"/>
  <!-- 교차점 (밝은) -->
  <rect x="388" y="388" width="248" height="248" rx="8" fill="#0097A7"/>
  <!-- 가로 단어 글자 -->
  <text x="245" y="530" font-family="Arial Black,Arial" font-size="120" font-weight="900" fill="white" text-anchor="middle">W</text>
  <text x="512" y="530" font-family="Arial Black,Arial" font-size="120" font-weight="900" fill="#E1F5FE" text-anchor="middle">O</text>
  <text x="779" y="530" font-family="Arial Black,Arial" font-size="120" font-weight="900" fill="white" text-anchor="middle">D</text>
  <!-- 세로 단어 글자 -->
  <text x="512" y="290" font-family="Arial Black,Arial" font-size="120" font-weight="900" fill="#B3E5FC" text-anchor="middle">C</text>
  <!-- O는 공유 -->
  <text x="512" y="760" font-family="Arial Black,Arial" font-size="120" font-weight="900" fill="#B3E5FC" text-anchor="middle">E</text>
  <!-- Layer 3: 교차점 번호들 -->
  <circle cx="388" cy="388" r="28" fill="#F57F17"/>
  <text x="388" y="398" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">1</text>
</svg>
