<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 파랑 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 방패 -->
  <path d="M512,120 L840,240 L840,560 Q840,800 512,920 Q184,800 184,560 L184,240 Z" fill="url(#shieldGrad)"/>
  <!-- 방패 테두리 -->
  <path d="M512,120 L840,240 L840,560 Q840,800 512,920 Q184,800 184,560 L184,240 Z" fill="none" stroke="#FFD600" stroke-width="20"/>
  <!-- 방패 안 PATH 텍스트 -->
  <text x="512" y="460" font-family="'Consolas', monospace" font-weight="900" font-size="140" fill="white" text-anchor="middle">PATH</text>
  <!-- 체크 마크 -->
  <polyline points="360,580 460,680 680,520" fill="none" stroke="#69F0AE" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Layer 3: 황금 별 장식들 -->
  <text x="220" y="260" font-size="60" text-anchor="middle" fill="#FFD600">★</text>
  <text x="804" y="260" font-size="60" text-anchor="middle" fill="#FFD600">★</text>
</svg>
