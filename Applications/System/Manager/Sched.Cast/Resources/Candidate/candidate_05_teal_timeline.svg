<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002233"/>
      <stop offset="100%" stop-color="#001A26"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#1DE9B6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#1DE9B6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#4DD0E1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline axis -->
  <line x1="100" y1="430" x2="430" y2="430" stroke="url(#teal)" stroke-width="4"/>
  <!-- Time ticks -->
  <g stroke="#00BFA5" stroke-width="3">
    <line x1="130" y1="420" x2="130" y2="440"/>
    <line x1="210" y1="420" x2="210" y2="440"/>
    <line x1="290" y1="420" x2="290" y2="440"/>
    <line x1="370" y1="420" x2="370" y2="440"/>
  </g>
  <!-- Gantt bars -->
  <rect x="130" y="120" width="180" height="40" rx="6" fill="url(#bar1)" opacity="0.9"/>
  <rect x="130" y="174" width="100" height="40" rx="6" fill="url(#bar2)" opacity="0.8"/>
  <rect x="244" y="174" width="140" height="40" rx="6" fill="url(#bar1)" opacity="0.7"/>
  <rect x="210" y="228" width="200" height="40" rx="6" fill="url(#bar2)" opacity="0.9"/>
  <rect x="130" y="282" width="80" height="40" rx="6" fill="url(#bar1)" opacity="0.6"/>
  <rect x="224" y="282" width="160" height="40" rx="6" fill="url(#bar2)" opacity="0.8"/>
  <rect x="130" y="336" width="260" height="40" rx="6" fill="url(#bar1)" opacity="0.85"/>
  <!-- Now marker -->
  <line x1="290" y1="100" x2="290" y2="430" stroke="#FF6D00" stroke-width="3" stroke-dasharray="8,6"/>
  <polygon points="290,96 282,112 298,112" fill="#FF6D00"/>
</svg>
