      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Dark cyberpunk background -->
  <rect width="1024" height="1024" rx="190" fill="#1A1A2E"/>
  <g clip-path="url(#c_fp05)">
