<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0f0800"/>
    </linearGradient>
    <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:0.9"/>
      <stop offset="30%" style="stop-color:#FBBF24;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="portalGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 포털 링들 -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#92400E" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#B45309" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#D97706" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#F59E0B" stroke-width="5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="88" fill="none" stroke="#FBBF24" stroke-width="6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="65" fill="none" stroke="#FCD34D" stroke-width="7" opacity="0.9" filter="url(#glow)"/>
  <!-- 포털 내부 빛 -->
  <circle cx="256" cy="256" r="180" fill="url(#portalGrad)" filter="url(#portalGlow)"/>
  <!-- 포털 중심 -->
  <circle cx="256" cy="256" r="45" fill="#F59E0B" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="30" fill="#FBBF24" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="18" fill="#FEF3C7" opacity="1" filter="url(#glow)"/>
  <!-- 자물쇠 진입 (왼쪽) -->
  <rect x="62" y="228" width="72" height="56" rx="8" fill="#92400E" opacity="0.85"/>
  <!-- 잠긴 고리 -->
  <path d="M 80,228 L 80,196 Q 80,170 98,170 Q 116,170 116,196 L 116,218" fill="none" stroke="#B45309" stroke-width="14" stroke-linecap="round"/>
  <!-- 포털 진입 화살표 -->
  <path d="M 134,256 L 165,256 M 158,247 L 165,256 L 158,265" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 자물쇠 해제 출현 (오른쪽) -->
  <rect x="378" y="228" width="72" height="56" rx="8" fill="#D97706" opacity="0.85"/>
  <!-- 열린 고리 -->
  <path d="M 396,228 L 396,206 Q 396,180 414,180 Q 432,180 432,206 L 432,220" fill="none" stroke="#FBBF24" stroke-width="14" stroke-linecap="round"/>
  <!-- 출현 화살표 -->
  <path d="M 347,256 L 378,256 M 371,247 L 378,256 L 371,265" stroke="#FCD34D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 중심 심볼 -->
  <text x="256" y="261" text-anchor="middle" font-family="Arial" font-size="18" fill="#030508" font-weight="bold">🔓</text>
  <!-- 포털 회전 효과 (호들) -->
  <path d="M 256,86 A 170,170 0 0,1 410,346" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3" stroke-dasharray="10,8"/>
  <path d="M 256,426 A 170,170 0 0,1 102,166" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.3" stroke-dasharray="10,8"/>
</svg>