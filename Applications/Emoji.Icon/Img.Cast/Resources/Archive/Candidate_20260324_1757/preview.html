<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Img.Cast — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1E0A3C; font-family: 'Segoe UI', sans-serif; color: #E9D5FF; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #C4B5FD; letter-spacing: 2px; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #A78BFA; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #150828; border: 2px solid #7C3AED; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #C4B5FD; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #DDD6FE; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #A78BFA; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #4C1D95; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>✨ Img.Cast</h1>
<p class="subtitle">이미지 포맷 변환기 (SVG·PNG·JPG·BMP·ICO) — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">마법 지팡이 SVG→ICO 변환</div>
    <span class="tag literal">literal</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#4C1D95"></div>
      <div class="swatch" style="background:#F59E0B"></div>
      <div class="swatch" style="background:#A78BFA"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">포맷 카드 (SVG PNG JPG ICO)</div>
    <span class="tag literal">literal</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#0284C7"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">용광로 주조 — 포맷 변환</div>
    <span class="tag metaphor">metaphor</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#991B1B"></div>
      <div class="swatch" style="background:#FDE047"></div>
      <div class="swatch" style="background:#22C55E"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">드래그&amp;드롭 포맷 변환</div>
    <span class="tag hybrid">hybrid</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#0F766E"></div>
      <div class="swatch" style="background:#5EEAD4"></div>
      <div class="swatch" style="background:#F9A8D4"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">순환 변환 포맷 바퀴</div>
    <span class="tag hybrid">hybrid</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#1A1A2E"></div>
      <div class="swatch" style="background:#22D3EE"></div>
      <div class="swatch" style="background:#F472B6"></div>
    </div>
  </div>
</div>
</body>
</html>
