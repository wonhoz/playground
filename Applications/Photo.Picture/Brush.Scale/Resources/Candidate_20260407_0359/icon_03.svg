<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 밝은 청록 -->
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <!-- Layer 2: 2x / 4x / 8x 배율 버튼 3개 (세로 배치) -->
  <!-- 2x 버튼 -->
  <rect x="200" y="170" width="624" height="160" rx="80" fill="#00838F"/>
  <text x="512" y="270" font-family="Arial Black" font-size="110" fill="white" text-anchor="middle">2x</text>

  <!-- 4x 버튼 (하이라이트) -->
  <rect x="160" y="390" width="704" height="200" rx="100" fill="#00ACC1"/>
  <rect x="160" y="390" width="704" height="200" rx="100" fill="none" stroke="#00E5FF" stroke-width="10"/>
  <text x="512" y="510" font-family="Arial Black" font-size="130" fill="white" text-anchor="middle">4x</text>
  <!-- 추천 뱃지 -->
  <rect x="760" y="360" width="140" height="56" rx="28" fill="#FF6D00"/>
  <text x="830" y="396" font-family="Arial Black" font-size="32" fill="white" text-anchor="middle">AI</text>

  <!-- 8x 버튼 -->
  <rect x="200" y="660" width="624" height="160" rx="80" fill="#0097A7"/>
  <text x="512" y="760" font-family="Arial Black" font-size="110" fill="white" text-anchor="middle">8x</text>

  <!-- Layer 3: 배경 소품 — 작은 이미지 아이콘 -->
  <rect x="130" y="880" width="80" height="80" rx="10" fill="#00838F" opacity="0.3"/>
  <rect x="816" y="880" width="80" height="80" rx="10" fill="#00838F" opacity="0.3"/>
  <!-- 확대 화살표 -->
  <path d="M240,880 L784,880" stroke="#00ACC1" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M760,858 L790,880 L760,902" stroke="#00ACC1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
</svg>
