<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#1A0A2E"/>
  <!-- Layer 2: Image file (left) -->
  <rect x="120" y="300" width="260" height="320" rx="20" fill="#3D1F6B"/>
  <!-- Mountain shape inside -->
  <polygon points="180,560 250,460 320,560" fill="#7C4DFF" opacity="0.6"/>
  <circle cx="310" cy="450" r="36" fill="#FF80AB" opacity="0.6"/>
  <!-- Arrow -->
  <line x1="400" y1="460" x2="580" y2="460" stroke="#FF4081" stroke-width="44" stroke-linecap="round"/>
  <polygon points="580,410 670,460 580,510" fill="#FF4081"/>
  <!-- Layer 3: ASCII art (right) - same shape in characters -->
  <text x="700" y="360" font-family="Consolas,monospace" font-size="28" fill="#FF4081">...#####...</text>
  <text x="700" y="396" font-family="Consolas,monospace" font-size="28" fill="#FF4081">..#######..</text>
  <text x="700" y="432" font-family="Consolas,monospace" font-size="28" fill="white">..##@@@##..</text>
  <text x="700" y="468" font-family="Consolas,monospace" font-size="28" fill="white">.##@@@@@##.</text>
  <text x="700" y="504" font-family="Consolas,monospace" font-size="28" fill="white">###########</text>
  <text x="700" y="540" font-family="Consolas,monospace" font-size="28" fill="white" opacity="0.5">###########</text>
</svg>