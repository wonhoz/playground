<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#006d32"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e4429"/>
      <stop offset="100%" stop-color="#0a2a18"/>
    </linearGradient>
    <filter id="pcbGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- PCB clipboard shape -->
  <rect x="150" y="140" width="212" height="260" rx="12" fill="url(#boardGrad)" stroke="#39d353" stroke-width="2.5"/>
  <!-- Clip top -->
  <rect x="208" y="126" width="96" height="28" rx="8" fill="url(#boardGrad)" stroke="#39d353" stroke-width="2.5"/>
  <rect x="218" y="131" width="76" height="18" rx="5" fill="#39d353" fill-opacity="0.3"/>
  <!-- Circuit traces horizontal -->
  <line x1="162" y1="190" x2="350" y2="190" stroke="#39d353" stroke-width="2" opacity="0.6" filter="url(#pcbGlow)"/>
  <line x1="162" y1="230" x2="290" y2="230" stroke="#39d353" stroke-width="2" opacity="0.5"/>
  <line x1="162" y1="270" x2="350" y2="270" stroke="#39d353" stroke-width="1.5" opacity="0.4"/>
  <line x1="162" y1="310" x2="315" y2="310" stroke="#39d353" stroke-width="2" opacity="0.5"/>
  <line x1="162" y1="350" x2="350" y2="350" stroke="#39d353" stroke-width="1.5" opacity="0.3"/>
  <!-- Circuit traces vertical -->
  <line x1="200" y1="165" x2="200" y2="385" stroke="#39d353" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="165" x2="256" y2="385" stroke="#39d353" stroke-width="1.5" opacity="0.2"/>
  <line x1="315" y1="165" x2="315" y2="385" stroke="#39d353" stroke-width="1.5" opacity="0.3"/>
  <!-- Solder pads / vias -->
  <circle cx="200" cy="190" r="7" fill="none" stroke="#39d353" stroke-width="2.5" filter="url(#pcbGlow)"/>
  <circle cx="200" cy="190" r="3" fill="#39d353"/>
  <circle cx="256" cy="190" r="7" fill="none" stroke="#39d353" stroke-width="2.5" filter="url(#pcbGlow)"/>
  <circle cx="256" cy="190" r="3" fill="#39d353"/>
  <circle cx="315" cy="190" r="7" fill="none" stroke="#39d353" stroke-width="2.5" filter="url(#pcbGlow)"/>
  <circle cx="315" cy="190" r="3" fill="#39d353"/>
  <circle cx="200" cy="270" r="6" fill="none" stroke="#39d353" stroke-width="2"/>
  <circle cx="200" cy="270" r="2.5" fill="#39d353"/>
  <circle cx="315" cy="270" r="6" fill="none" stroke="#39d353" stroke-width="2"/>
  <circle cx="315" cy="270" r="2.5" fill="#39d353"/>
  <circle cx="256" cy="350" r="6" fill="none" stroke="#39d353" stroke-width="2"/>
  <circle cx="256" cy="350" r="2.5" fill="#39d353"/>
  <!-- IC component in center -->
  <rect x="225" y="295" width="62" height="42" rx="4" fill="#0d1117" stroke="#39d353" stroke-width="2" filter="url(#pcbGlow)"/>
  <line x1="234" y1="295" x2="234" y2="285" stroke="#39d353" stroke-width="2"/>
  <line x1="248" y1="295" x2="248" y2="285" stroke="#39d353" stroke-width="2"/>
  <line x1="262" y1="295" x2="262" y2="285" stroke="#39d353" stroke-width="2"/>
  <line x1="276" y1="295" x2="276" y2="285" stroke="#39d353" stroke-width="2"/>
  <line x1="234" y1="337" x2="234" y2="347" stroke="#39d353" stroke-width="2"/>
  <line x1="248" y1="337" x2="248" y2="347" stroke="#39d353" stroke-width="2"/>
  <line x1="262" y1="337" x2="262" y2="347" stroke="#39d353" stroke-width="2"/>
  <line x1="276" y1="337" x2="276" y2="347" stroke="#39d353" stroke-width="2"/>
  <!-- AI label as dot pattern in IC -->
  <circle cx="241" cy="316" r="3" fill="#39d353" filter="url(#pcbGlow)"/>
  <circle cx="256" cy="316" r="3" fill="#39d353" filter="url(#pcbGlow)"/>
  <circle cx="271" cy="316" r="3" fill="#39d353" filter="url(#pcbGlow)"/>
</svg>