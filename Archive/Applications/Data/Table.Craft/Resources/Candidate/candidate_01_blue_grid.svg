<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Table outer -->
  <rect x="80" y="120" width="352" height="272" rx="12" fill="none" stroke="url(#table)" stroke-width="16"/>
  <!-- Header row -->
  <rect x="80" y="120" width="352" height="64" rx="12" fill="#42A5F5" opacity="0.9"/>
  <rect x="80" y="164" width="352" height="20" fill="#42A5F5" opacity="0.9"/>
  <!-- Horizontal dividers -->
  <line x1="80" y1="248" x2="432" y2="248" stroke="#90CAF9" stroke-width="8" opacity="0.7"/>
  <line x1="80" y1="312" x2="432" y2="312" stroke="#90CAF9" stroke-width="8" opacity="0.7"/>
  <!-- Vertical dividers -->
  <line x1="198" y1="120" x2="198" y2="392" stroke="#90CAF9" stroke-width="8" opacity="0.7"/>
  <line x1="314" y1="120" x2="314" y2="392" stroke="#90CAF9" stroke-width="8" opacity="0.7"/>
  <!-- Cell content dots -->
  <circle cx="139" cy="280" r="10" fill="#E3F2FD" opacity="0.8"/>
  <rect x="168" y="274" width="14" height="14" rx="2" fill="#E3F2FD" opacity="0.5"/>
  <circle cx="256" cy="280" r="10" fill="#E3F2FD" opacity="0.8"/>
  <circle cx="373" cy="280" r="10" fill="#E3F2FD" opacity="0.8"/>
  <circle cx="139" cy="344" r="10" fill="#E3F2FD" opacity="0.6"/>
  <circle cx="256" cy="344" r="10" fill="#E3F2FD" opacity="0.6"/>
  <circle cx="373" cy="344" r="10" fill="#E3F2FD" opacity="0.6"/>
  <!-- Header text lines -->
  <rect x="104" y="142" width="70" height="10" rx="5" fill="#E3F2FD" opacity="0.9"/>
  <rect x="218" y="142" width="70" height="10" rx="5" fill="#E3F2FD" opacity="0.9"/>
  <rect x="334" y="142" width="70" height="10" rx="5" fill="#E3F2FD" opacity="0.9"/>
</svg>
