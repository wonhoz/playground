<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#140e00"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="100%" stop-color="#57534E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stone tablet shape -->
  <path d="M140,80 Q256,60 372,80 L390,430 Q256,450 122,430 Z" fill="url(#stone)" opacity="0.3" stroke="#A8A29E" stroke-width="2"/>
  <!-- Three script sections -->
  <!-- Section 1: Egyptian Hieroglyphics (top) -->
  <line x1="150" y1="170" x2="360" y2="170" stroke="#A8A29E" stroke-width="1" opacity="0.4"/>
  <text x="175" y="118" font-family="monospace" font-size="18" fill="#D97706" opacity="0.8">𓀀 𓂋 𓏏 𓈖</text>
  <text x="175" y="142" font-family="monospace" font-size="18" fill="#B45309" opacity="0.7">𓃭 𓌀 𓆑 𓇋</text>
  <text x="175" y="165" font-family="monospace" font-size="16" fill="#92400E" opacity="0.6">𓄿 𓅱 𓅓 𓊪</text>
  <!-- Section 2: Demotic (middle) -->
  <line x1="150" y1="290" x2="360" y2="290" stroke="#A8A29E" stroke-width="1" opacity="0.4"/>
  <text x="200" y="208" font-family="serif" font-size="15" fill="#F59E0B" opacity="0.8" letter-spacing="3">語 言 文 字</text>
  <text x="185" y="232" font-family="monospace" font-size="13" fill="#D97706" opacity="0.7">مرحبا · שלום</text>
  <text x="190" y="256" font-family="monospace" font-size="13" fill="#B45309" opacity="0.6">नमस्ते · ОЮМ</text>
  <text x="195" y="282" font-family="monospace" font-size="13" fill="#92400E" opacity="0.5">Γεια · こんにちは</text>
  <!-- Section 3: Greek (bottom) -->
  <text x="180" y="320" font-family="serif" font-size="14" fill="#FDE68A" opacity="0.8">Hello · Hola · Bonjour</text>
  <text x="175" y="344" font-family="serif" font-size="14" fill="#F59E0B" opacity="0.7">Ciao · Olá · Hallo</text>
  <text x="180" y="368" font-family="serif" font-size="14" fill="#D97706" opacity="0.6">Привет · 你好 · مرحبا</text>
  <text x="185" y="392" font-family="serif" font-size="14" fill="#B45309" opacity="0.5">안녕 · こんにちは</text>
  <!-- Glow effect on stone -->
  <text x="256" y="480" text-anchor="middle" font-family="monospace" font-size="12" fill="#F59E0B" opacity="0.6">ROSETTA STONE</text>
</svg>
