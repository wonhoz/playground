<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#06080f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 컬러휠 A (좌측) -->
  <g transform="translate(148,220)">
    <!-- 색상 섹터들 -->
    <path d="M0,0 L0,-100 A100,100 0 0,1 86.6,-50 Z" fill="#F43F5E" opacity="0.7"/>
    <path d="M0,0 L86.6,-50 A100,100 0 0,1 86.6,50 Z" fill="#FB923C" opacity="0.7"/>
    <path d="M0,0 L86.6,50 A100,100 0 0,1 0,100 Z" fill="#FDE047" opacity="0.7"/>
    <path d="M0,0 L0,100 A100,100 0 0,1 -86.6,50 Z" fill="#4ADE80" opacity="0.7"/>
    <path d="M0,0 L-86.6,50 A100,100 0 0,1 -86.6,-50 Z" fill="#2DD4BF" opacity="0.7"/>
    <path d="M0,0 L-86.6,-50 A100,100 0 0,1 0,-100 Z" fill="#818CF8" opacity="0.7"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#2DD4BF" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
    <!-- 중앙 구멍 -->
    <circle cx="0" cy="0" r="30" fill="#030508"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.7"/>
    <!-- 포인터 -->
    <line x1="0" y1="0" x2="-70" y2="-40" stroke="#2DD4BF" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
    <circle cx="-70" cy="-40" r="6" fill="#2DD4BF" filter="url(#glow)" opacity="0.9"/>
    <text x="0" y="125" text-anchor="middle" font-size="12" fill="#2DD4BF" opacity="0.7">Image A</text>
  </g>
  <!-- 컬러휠 B (우측) — 포인터 위치 다름 -->
  <g transform="translate(364,220)">
    <path d="M0,0 L0,-100 A100,100 0 0,1 86.6,-50 Z" fill="#F43F5E" opacity="0.7"/>
    <path d="M0,0 L86.6,-50 A100,100 0 0,1 86.6,50 Z" fill="#FB923C" opacity="0.7"/>
    <path d="M0,0 L86.6,50 A100,100 0 0,1 0,100 Z" fill="#FDE047" opacity="0.7"/>
    <path d="M0,0 L0,100 A100,100 0 0,1 -86.6,50 Z" fill="#4ADE80" opacity="0.7"/>
    <path d="M0,0 L-86.6,50 A100,100 0 0,1 -86.6,-50 Z" fill="#2DD4BF" opacity="0.7"/>
    <path d="M0,0 L-86.6,-50 A100,100 0 0,1 0,-100 Z" fill="#818CF8" opacity="0.7"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="#030508"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#F43F5E" stroke-width="2" opacity="0.7"/>
    <!-- 포인터 (다른 위치) -->
    <line x1="0" y1="0" x2="60" y2="-75" stroke="#F43F5E" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
    <circle cx="60" cy="-75" r="6" fill="#F43F5E" filter="url(#glow)" opacity="0.9"/>
    <text x="0" y="125" text-anchor="middle" font-size="12" fill="#F43F5E" opacity="0.7">Image B</text>
  </g>
  <!-- 중앙 DELTA 표시 -->
  <rect x="210" y="190" width="92" height="60" rx="10" fill="#0a0e14" stroke="#2DD4BF" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="216" text-anchor="middle" font-size="12" fill="#888" opacity="0.8">Delta</text>
  <text x="256" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#FDE047" filter="url(#glow)" opacity="0.9">35°</text>
  <!-- 연결선 -->
  <line x1="248" y1="220" x2="210" y2="220" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="264" y1="220" x2="302" y2="220" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- 하단 -->
  <text x="256" y="455" text-anchor="middle" font-size="12" fill="#2DD4BF" opacity="0.5" letter-spacing="3">COLOR WHEEL COMPARE</text>
</svg>
