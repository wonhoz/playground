  <rect x="518" y="430" width="110" height="80" rx="10" fill="#0D47A1" opacity="0.9"/>
  <text x="573" y="481" text-anchor="middle" font-family="Arial Black" font-size="52" fill="#82B1FF">PNG</text>
  <rect x="390" y="530" width="110" height="80" rx="10" fill="#4A148C" opacity="0.9"/>
  <text x="445" y="581" text-anchor="middle" font-family="Arial Black" font-size="52" fill="#EA80FC">JPG</text>
  <!-- 회전 날 (X자) -->
