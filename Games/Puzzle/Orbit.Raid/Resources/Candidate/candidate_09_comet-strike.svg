<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a0a25"/>
      <stop offset="100%" stop-color="#020210"/>
    </radialGradient>
    <linearGradient id="comet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="420" cy="100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="460" cy="240" r="2" fill="white" opacity="0.6"/>
  <circle cx="60" cy="350" r="1" fill="white" opacity="0.5"/>
  <!-- Comet trails (raiders) -->
  <path d="M60,80 L240,240" fill="none" stroke="url(#comet)" stroke-width="8" opacity="0.7"/>
  <path d="M100,60 L260,230" fill="none" stroke="url(#comet)" stroke-width="5" opacity="0.5"/>
  <circle cx="242" cy="242" r="14" fill="#ffff88"/>
  <circle cx="242" cy="242" r="8" fill="#ffffff"/>
  <!-- Secondary comets -->
  <path d="M440,60 L320,210" fill="none" stroke="url(#comet)" stroke-width="6" opacity="0.6" transform="scale(-1,1) translate(-512,0)"/>
  <circle cx="320" cy="210" r="11" fill="#ffaa44"/>
  <!-- Planet being hit -->
  <circle cx="256" cy="320" r="70" fill="#1a2266" stroke="#3344aa" stroke-width="3"/>
  <circle cx="240" cy="300" r="18" fill="#ff6600" opacity="0.8"/>
  <circle cx="240" cy="300" r="10" fill="#ffff00" opacity="0.9"/>
  <!-- Orbit puzzle ring -->
  <ellipse cx="256" cy="320" rx="110" ry="40" fill="none" stroke="#4466ff" stroke-width="2" stroke-dasharray="10,8"/>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#ffaa00">ORBIT.RAID</text>
</svg>
