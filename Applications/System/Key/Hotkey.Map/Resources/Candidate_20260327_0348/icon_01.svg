<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright coral -->
  <rect width="1024" height="1024" rx="190" fill="#FF6B6B"/>

  <!-- Layer 2: 2×2 key grid (4 big keys) -->
  <!-- Top-left: Ctrl — GREEN (free) -->
  <rect x="120" y="200" width="360" height="260" rx="32" fill="#2ECC71" stroke="#FFFFFF" stroke-width="16"/>
  <text x="300" y="310" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">Ctrl</text>
  <circle cx="282" cy="396" r="18" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="318" cy="396" r="18" fill="#FFFFFF" opacity="0.7"/>

  <!-- Top-right: Alt — RED (busy) -->
  <rect x="544" y="200" width="360" height="260" rx="32" fill="#E74C3C" stroke="#FFFFFF" stroke-width="16"/>
  <text x="724" y="310" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">Alt</text>
  <text x="724" y="398" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="700" fill="#FFCCCC">점유됨</text>

  <!-- Bottom-left: ⊞ Win — GREEN (free) -->
  <rect x="120" y="532" width="360" height="260" rx="32" fill="#27AE60" stroke="#FFFFFF" stroke-width="16"/>
  <text x="300" y="638" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">⊞</text>
  <text x="300" y="734" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="700" fill="#AAFFCC">사용가능</text>

  <!-- Bottom-right: Shift — ORANGE (system) -->
  <rect x="544" y="532" width="360" height="260" rx="32" fill="#E67E22" stroke="#FFFFFF" stroke-width="16"/>
  <text x="724" y="638" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="900" fill="#FFFFFF">Shift</text>
  <text x="724" y="734" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="700" fill="#FFE0BB">시스템</text>

  <!-- Layer 3: Legend strip at bottom -->
  <rect x="120" y="844" width="784" height="60" rx="16" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="188" cy="874" r="16" fill="#2ECC71"/>
  <text x="216" y="882" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#333">가능</text>
  <circle cx="370" cy="874" r="16" fill="#E74C3C"/>
  <text x="398" y="882" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#333">점유</text>
  <circle cx="554" cy="874" r="16" fill="#E67E22"/>
  <text x="582" y="882" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#333">예약</text>
</svg>
