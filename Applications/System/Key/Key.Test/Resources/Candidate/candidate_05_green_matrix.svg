  <rect x="228" y="216" width="60" height="44" rx="8" fill="#001A00" stroke="#00FF41" stroke-width="1.5"/>
  <rect x="298" y="216" width="60" height="44" rx="8" fill="#001A00" stroke="#00FF41" stroke-width="1.5"/>
  <rect x="368" y="216" width="56" height="44" rx="8" fill="#001A00" stroke="#00FF41" stroke-width="1.5"/>
  <rect x="88" y="270" width="44" height="44" rx="8" fill="#001A00" stroke="#00FF41" stroke-width="1.5"/>
