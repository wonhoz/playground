<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCFBF1"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: Layered file cards from ZIP -->
  <!-- Card 3 (back) - data.csv -->
  <rect x="310" y="210" width="420" height="500" rx="20" fill="#0F766E" opacity="0.5"/>
  <text x="390" y="280" font-family="monospace" font-size="36" fill="#CCFBF1">data.csv</text>
  <!-- Card 2 - image.png -->
  <rect x="255" y="260" width="420" height="500" rx="20" fill="#0F766E" opacity="0.65"/>
  <text x="335" y="330" font-family="monospace" font-size="36" fill="#CCFBF1">image.png</text>
  <!-- Card 1 (front) - readme.txt -->
  <rect x="200" y="310" width="420" height="500" rx="20" fill="white" opacity="0.92"/>
  <!-- File icon on card -->
  <rect x="244" y="358" width="64" height="80" rx="8" fill="#0D9488"/>
  <polygon points="292,358 308,374 308,358" fill="#CCFBF1"/>
  <rect x="252" y="376" width="48" height="10" rx="4" fill="white" opacity="0.6"/>
  <rect x="252" y="396" width="40" height="10" rx="4" fill="white" opacity="0.6"/>
  <rect x="252" y="416" width="44" height="10" rx="4" fill="white" opacity="0.6"/>
  <!-- File name on front card -->
  <text x="330" y="400" font-family="monospace" font-size="44" fill="#0F766E" font-weight="bold">readme.txt</text>
  <text x="330" y="448" font-family="Arial" font-size="32" fill="#6B7280">1.2 KB</text>
  <!-- ZIP label -->
  <rect x="200" y="820" width="420" height="70" rx="20" fill="#0D9488"/>
  <text x="410" y="866" font-family="Arial" font-size="46" fill="white" text-anchor="middle" font-weight="bold">archive.zip</text>
  <!-- Layer 3: ZIP icon at top right corner -->
  <rect x="630" y="220" width="100" height="120" rx="12" fill="#0D9488" stroke="white" stroke-width="8"/>
  <text x="680" y="272" font-family="Arial" font-size="38" text-anchor="middle" fill="white" font-weight="bold">ZIP</text>
  <rect x="654" y="282" width="52" height="12" rx="4" fill="white" opacity="0.5"/>
  <rect x="654" y="300" width="52" height="12" rx="4" fill="white" opacity="0.3"/>
</svg>
