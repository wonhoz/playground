<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg3)"/>

  <!-- 격자 배경 패널 -->
  <rect x="200" y="200" width="624" height="624" rx="20" fill="rgba(255,255,255,0.15)"/>

  <!-- 가로 단어 "WORD" -->
  <!-- 각 글자 박스 -->
  <rect x="220" y="340" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <rect x="362" y="340" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <rect x="504" y="340" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <rect x="646" y="340" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>

  <!-- 가로 단어 글자 -->
  <text x="285" y="444" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">W</text>
  <text x="427" y="444" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">O</text>
  <text x="569" y="444" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">R</text>
  <text x="711" y="444" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">D</text>

  <!-- 세로 단어: W 공유, 아래로 W-I-L-D -->
  <!-- W는 공유 (노란 강조) -->
  <rect x="220" y="340" width="130" height="130" rx="12" fill="#FDE047" stroke="#D97706" stroke-width="8"/>
  <text x="285" y="444" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">W</text>

  <!-- 세로 아래 칸들 -->
  <rect x="220" y="482" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <rect x="220" y="624" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <rect x="220" y="766" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>

  <text x="285" y="584" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">I</text>
  <text x="285" y="726" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">L</text>
  <text x="285" y="868" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">D</text>

  <!-- 세로 단어 위 칸 -->
  <rect x="220" y="200" width="130" height="130" rx="12" fill="white" stroke="#0F766E" stroke-width="6"/>
  <text x="285" y="302" font-family="Arial Black" font-size="100" font-weight="900" text-anchor="middle" fill="#1E3A5F">O</text>

  <!-- 교차점 노란 강조 표시 (별 효과) -->
  <circle cx="285" cy="405" r="70" fill="#FDE047" opacity="0.3"/>

  <!-- 화살표 가로 -->
  <text x="512" y="270" font-family="Arial" font-size="60" text-anchor="middle" fill="white" opacity="0.8">→ WORD →</text>
  <!-- 화살표 세로 -->
  <text x="160" y="570" font-family="Arial" font-size="52" text-anchor="middle" fill="white" opacity="0.8" transform="rotate(-90, 160, 570)">↓ WILD ↓</text>
</svg>
