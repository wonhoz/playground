<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <radialGradient id="skill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree branches -->
  <line x1="256" y1="190" x2="256" y2="120" stroke="#42a5f5" stroke-width="2.5" opacity="0.8"/>
  <line x1="256" y1="190" x2="156" y2="270" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="190" x2="356" y2="270" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <line x1="156" y1="270" x2="106" y2="360" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <line x1="156" y1="270" x2="196" y2="360" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <line x1="356" y1="270" x2="316" y2="360" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <line x1="356" y1="270" x2="406" y2="360" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <!-- Nodes -->
  <circle cx="256" cy="190" r="34" fill="url(#core)" stroke="#90caf9" stroke-width="2.5"/>
  <text x="256" y="196" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">SKILLS</text>
  <circle cx="256" cy="108" r="22" fill="url(#skill)" stroke="#90caf9" stroke-width="2"/>
  <text x="256" y="114" font-family="monospace" font-size="9" fill="white" text-anchor="middle">ROOT</text>
  <circle cx="156" cy="270" r="26" fill="url(#skill)" stroke="#90caf9" stroke-width="2"/>
  <text x="156" y="276" font-family="monospace" font-size="9" fill="white" text-anchor="middle">LANG</text>
  <circle cx="356" cy="270" r="26" fill="url(#skill)" stroke="#90caf9" stroke-width="2"/>
  <text x="356" y="276" font-family="monospace" font-size="9" fill="white" text-anchor="middle">TOOLS</text>
  <circle cx="106" cy="360" r="20" fill="#1565c0" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="106" y="365" font-family="monospace" font-size="8" fill="white" text-anchor="middle">C#</text>
  <circle cx="196" cy="360" r="20" fill="#1565c0" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="196" y="365" font-family="monospace" font-size="8" fill="white" text-anchor="middle">JS</text>
  <circle cx="316" cy="360" r="20" fill="#1565c0" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="316" y="365" font-family="monospace" font-size="8" fill="white" text-anchor="middle">GIT</text>
  <circle cx="406" cy="360" r="20" fill="#1565c0" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="406" y="365" font-family="monospace" font-size="8" fill="white" text-anchor="middle">CI</text>
  <!-- Skill level rings -->
  <circle cx="106" cy="360" r="28" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  <circle cx="196" cy="360" r="28" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  <circle cx="316" cy="360" r="28" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  <circle cx="406" cy="360" r="28" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  <!-- Footer -->
  <text x="256" y="462" font-family="monospace" font-size="17" fill="#64b5f6" text-anchor="middle" letter-spacing="2" opacity="0.9">SKILL.CAST</text>
</svg>
