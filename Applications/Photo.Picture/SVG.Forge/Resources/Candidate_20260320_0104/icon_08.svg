<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0500"/>
  <!-- Canvas + compass -->
  <!-- Canvas frame -->
  <rect x="180" y="220" width="560" height="560" rx="12" fill="none" stroke="#E65100" stroke-width="24"/>
  <rect x="204" y="244" width="512" height="512" rx="8" fill="#E65100" opacity="0.08"/>
  <!-- Canvas content — abstract vector shapes -->
  <path d="M260 640 Q360 360 512 480 Q640 580 700 380" fill="none" stroke="#FF8A65" stroke-width="14" stroke-linecap="round"/>
  <circle cx="260" cy="640" r="16" fill="#FF8A65"/>
  <circle cx="700" cy="380" r="16" fill="#FF8A65"/>
  <!-- Compass overlaid (right side) -->
  <circle cx="730" cy="600" r="200" fill="none" stroke="#E65100" stroke-width="20" opacity="0.8"/>
  <!-- Compass needle -->
  <line x1="730" y1="420" x2="730" y2="600" stroke="#FF8A65" stroke-width="12" stroke-linecap="round"/>
  <line x1="730" y1="600" x2="850" y2="740" stroke="#E65100" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <circle cx="730" cy="600" r="18" fill="#FF8A65"/>
  <!-- Compass markings -->
  <line x1="730" y1="420" x2="730" y2="440" stroke="#FF8A65" stroke-width="8"/>
  <line x1="730" y1="760" x2="730" y2="780" stroke="#FF8A65" stroke-width="8"/>
  <line x1="550" y1="600" x2="570" y2="600" stroke="#FF8A65" stroke-width="8"/>
  <line x1="890" y1="600" x2="910" y2="600" stroke="#FF8A65" stroke-width="8"/>
</svg>
