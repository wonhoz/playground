<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
<!-- 컨셉: 돋보기 차이점 포착 -->
<!-- 왼쪽 이미지 작게 -->
<rect x="160" y="280" width="280" height="220" rx="12" fill="#1A0040" stroke="#4527A0" stroke-width="16"/>
<!-- 오른쪽 이미지 작게 -->
<rect x="580" y="280" width="280" height="220" rx="12" fill="#1A0040" stroke="#4527A0" stroke-width="16"/>
<!-- 두 이미지 연결 -->
<line x1="440" y1="390" x2="580" y2="390" stroke="#4527A0" stroke-width="18" stroke-linecap="round" stroke-dasharray="14 10" opacity="0.5"/>
<!-- 돋보기 (중앙 하단, 차이점 확대) -->
<circle cx="512" cy="640" r="180" fill="#100028" stroke="#CE93D8" stroke-width="32"/>
<circle cx="512" cy="640" r="140" fill="#1A0040"/>
<!-- 돋보기 손잡이 -->
<line x1="648" y1="776" x2="780" y2="880" stroke="#CE93D8" stroke-width="44" stroke-linecap="round"/>
<!-- 확대된 차이점 (빨간/보라 강조) -->
<circle cx="480" cy="620" r="28" fill="#4527A0" opacity="0.8"/>
<circle cx="544" cy="660" r="22" fill="#CE93D8" opacity="0.6"/>
<path d="M 420 660 L 600 660" fill="none" stroke="#CE93D8" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
<!-- 차이점 강조 원 -->
<circle cx="540" cy="650" r="48" fill="none" stroke="#CE93D8" stroke-width="16"/>
</svg>
