<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Bass speaker cone cross-section -->
  <!-- Outer frame ring -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="#3F51B5" stroke-width="28"/>
  <!-- Spider/surround ring -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#3F51B5" stroke-width="14"/>
  <!-- Cone (trapezoid cross-section lines) -->
  <line x1="240" y1="512" x2="392" y2="440" stroke="#7986CB" stroke-width="14"/>
  <line x1="240" y1="512" x2="392" y2="584" stroke="#7986CB" stroke-width="14"/>
  <line x1="784" y1="512" x2="632" y2="440" stroke="#7986CB" stroke-width="14"/>
  <line x1="784" y1="512" x2="632" y2="584" stroke="#7986CB" stroke-width="14"/>
  <!-- Dust cap (center dome) -->
  <circle cx="512" cy="512" r="100" fill="#3F51B5"/>
  <circle cx="512" cy="512" r="72" fill="#0a0e2a"/>
  <!-- Voice coil ring -->
  <circle cx="512" cy="512" r="130" fill="none" stroke="#7986CB" stroke-width="18"/>
  <!-- Surround ripples -->
  <circle cx="512" cy="512" r="220" fill="none" stroke="#3F51B5" stroke-width="8" opacity="0.5"/>
  <circle cx="512" cy="512" r="250" fill="none" stroke="#3F51B5" stroke-width="6" opacity="0.3"/>
</svg>