<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <radialGradient id="clockFace10" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </radialGradient>
    <clipPath id="clip10">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10)"/>

  <!-- 배경 지구선 -->
  <line x1="0" y1="560" x2="1024" y2="560" stroke="#374151" stroke-width="8"/>

  <!-- 시계 3개 -->
  <!-- 시계 1 (왼쪽, LON) -->
  <g transform="translate(210, 440)">
    <circle cx="0" cy="0" r="160" fill="#111827" stroke="#A5B4FC" stroke-width="14"/>
    <!-- 눈금 -->
    <g stroke="#6B7280" stroke-width="6">
      <line x1="0" y1="-145" x2="0" y2="-125"/>
      <line x1="0" y1="145" x2="0" y2="125"/>
      <line x1="-145" y1="0" x2="-125" y2="0"/>
      <line x1="145" y1="0" x2="125" y2="0"/>
    </g>
    <!-- 시침 (9시) -->
    <line x1="0" y1="0" x2="-80" y2="-20" stroke="#A5B4FC" stroke-width="14" stroke-linecap="round"/>
    <!-- 분침 (12시) -->
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>
    <!-- 중심 -->
    <circle cx="0" cy="0" r="12" fill="#A5B4FC"/>
    <!-- 레이블 -->
    <text y="195" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
          text-anchor="middle" fill="#A5B4FC">LON</text>
    <text y="238" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#6B7280">UTC+0</text>
  </g>

  <!-- 시계 2 (중앙, DXB) -->
  <g transform="translate(512, 440)">
    <circle cx="0" cy="0" r="160" fill="#111827" stroke="#FDE68A" stroke-width="14"/>
    <g stroke="#6B7280" stroke-width="6">
      <line x1="0" y1="-145" x2="0" y2="-125"/>
      <line x1="0" y1="145" x2="0" y2="125"/>
      <line x1="-145" y1="0" x2="-125" y2="0"/>
      <line x1="145" y1="0" x2="125" y2="0"/>
    </g>
    <!-- 시침 (1시) -->
    <line x1="0" y1="0" x2="42" y2="-68" stroke="#FDE68A" stroke-width="14" stroke-linecap="round"/>
    <!-- 분침 (0분) -->
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="#FDE68A"/>
    <text y="195" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
          text-anchor="middle" fill="#FDE68A">DXB</text>
    <text y="238" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#6B7280">UTC+4</text>
  </g>

  <!-- 시계 3 (오른쪽, TYO) -->
  <g transform="translate(814, 440)">
    <circle cx="0" cy="0" r="160" fill="#111827" stroke="#34D399" stroke-width="14"/>
    <g stroke="#6B7280" stroke-width="6">
      <line x1="0" y1="-145" x2="0" y2="-125"/>
      <line x1="0" y1="145" x2="0" y2="125"/>
      <line x1="-145" y1="0" x2="-125" y2="0"/>
      <line x1="145" y1="0" x2="125" y2="0"/>
    </g>
    <!-- 시침 (6시) -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#34D399" stroke-width="14" stroke-linecap="round"/>
    <!-- 분침 (30분) -->
    <line x1="0" y1="0" x2="0" y2="110" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="#34D399"/>
    <text y="195" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
          text-anchor="middle" fill="#34D399">TYO</text>
    <text y="238" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#6B7280">UTC+9</text>
  </g>

  <!-- 상단 레이블 -->
  <text x="512" y="130" font-family="Arial Black, sans-serif" font-size="60" font-weight="900"
        text-anchor="middle" fill="#A5B4FC" letter-spacing="4">TIME ZONES</text>

  <!-- 하단 장식 -->
  <text x="512" y="880" font-family="Arial, sans-serif" font-size="38" text-anchor="middle" fill="#4B5563">
    World Clock Challenge
  </text>
</svg>
