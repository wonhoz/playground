<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11024a"/>
    </linearGradient>
    <linearGradient id="beadPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="beadPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="beadCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 주판 외부 프레임 -->
  <rect x="80" y="100" width="352" height="312" rx="14" fill="none" stroke="url(#frame)" stroke-width="8"/>
  <!-- 가로 막대 (줄) -->
  <line x1="80" y1="170" x2="432" y2="170" stroke="#5b21b6" stroke-width="5"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#5b21b6" stroke-width="5"/>
  <line x1="80" y1="310" x2="432" y2="310" stroke="#5b21b6" stroke-width="5"/>
  <line x1="80" y1="380" x2="432" y2="380" stroke="#5b21b6" stroke-width="5"/>
  <!-- 줄1 구슬들 (퍼플) -->
  <ellipse cx="140" cy="170" rx="24" ry="24" fill="url(#beadPurple)"/>
  <ellipse cx="196" cy="170" rx="24" ry="24" fill="url(#beadPurple)"/>
  <ellipse cx="252" cy="170" rx="24" ry="24" fill="url(#beadPurple)"/>
  <ellipse cx="330" cy="170" rx="24" ry="24" fill="#3a1a6a"/>
  <ellipse cx="386" cy="170" rx="24" ry="24" fill="#3a1a6a"/>
  <!-- 줄2 구슬들 (핑크) -->
  <ellipse cx="140" cy="240" rx="24" ry="24" fill="url(#beadPink)"/>
  <ellipse cx="218" cy="240" rx="24" ry="24" fill="url(#beadPink)"/>
  <ellipse cx="308" cy="240" rx="24" ry="24" fill="#3a1a6a"/>
  <ellipse cx="364" cy="240" rx="24" ry="24" fill="#3a1a6a"/>
  <ellipse cx="386" cy="240" rx="24" ry="24" fill="#3a1a6a"/>
  <!-- 줄3 구슬들 (시안) -->
  <ellipse cx="140" cy="310" rx="24" ry="24" fill="url(#beadCyan)"/>
  <ellipse cx="196" cy="310" rx="24" ry="24" fill="url(#beadCyan)"/>
  <ellipse cx="252" cy="310" rx="24" ry="24" fill="url(#beadCyan)"/>
  <ellipse cx="308" cy="310" rx="24" ry="24" fill="url(#beadCyan)"/>
  <ellipse cx="386" cy="310" rx="24" ry="24" fill="#3a1a6a"/>
  <!-- 줄4 구슬들 (퍼플) -->
  <ellipse cx="140" cy="380" rx="24" ry="24" fill="url(#beadPurple)"/>
  <ellipse cx="218" cy="380" rx="24" ry="24" fill="url(#beadPurple)"/>
  <ellipse cx="386" cy="380" rx="24" ry="24" fill="#3a1a6a"/>
  <ellipse cx="364" cy="380" rx="24" ry="24" fill="#3a1a6a"/>
  <ellipse cx="308" cy="380" rx="24" ry="24" fill="url(#beadPurple)"/>
</svg>
