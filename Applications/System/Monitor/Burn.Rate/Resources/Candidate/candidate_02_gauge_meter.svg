<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A10"/>
      <stop offset="100%" stop-color="#15151F"/>
    </linearGradient>
    <linearGradient id="arcFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF00"/>
      <stop offset="50%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Background arc -->
  <path d="M80 300 A180 180 0 0 1 432 300" fill="none" stroke="#1A1A2A" stroke-width="28"/>
  <!-- Colored gauge arc -->
  <path d="M80 300 A180 180 0 0 1 432 300" fill="none" stroke="url(#arcFill)" stroke-width="28" stroke-linecap="round"/>
  <!-- Segment dividers -->
  <line x1="80" y1="300" x2="80" y2="272" stroke="#0A0A10" stroke-width="3"/>
  <line x1="432" y1="300" x2="432" y2="272" stroke="#0A0A10" stroke-width="3"/>
  <!-- Needle pointing high burn (toward red) -->
  <line x1="256" y1="300" x2="376" y2="178" stroke="#FF4500" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="300" r="16" fill="#1A1A2A" stroke="#FF4500" stroke-width="4"/>
  <!-- Labels -->
  <text x="88" y="336" font-family="Arial" font-size="16" fill="#00FF00">LOW</text>
  <text x="220" y="145" font-family="Arial" font-size="16" fill="#FFFF00" text-anchor="middle">MED</text>
  <text x="408" y="336" font-family="Arial" font-size="16" fill="#FF0000" text-anchor="end">HIGH</text>
  <!-- Value -->
  <text x="256" y="368" font-family="Arial" font-size="40" font-weight="bold" fill="#FF4500" text-anchor="middle">78%</text>
  <text x="256" y="400" font-family="Arial" font-size="18" fill="#888" text-anchor="middle">Drain Rate</text>
  <!-- Title -->
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#FF4500" text-anchor="middle">Burn.Rate</text>
</svg>
