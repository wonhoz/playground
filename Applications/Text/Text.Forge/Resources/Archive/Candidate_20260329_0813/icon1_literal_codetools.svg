<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <radialGradient id="bg1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFA000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#FF8C00" flood-opacity="0.55"/>
    </filter>
    <filter id="glow_text">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FFA000" flood-opacity="0.8"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg1)"/>
  <rect width="1024" height="1024" rx="180" fill="url(#glow1)"/>

  <!-- Layer 2: Main Object - Hammer silhouette -->
  <!-- Hammer head -->
  <rect x="340" y="280" width="270" height="130" rx="22"
        fill="#FFA000" filter="url(#shadow1)"/>
  <!-- Hammer head highlight -->
  <rect x="340" y="280" width="270" height="52" rx="22"
        fill="#FFD54F" opacity="0.5"/>
  <!-- Hammer handle -->
  <rect x="478" y="400" width="68" height="300" rx="20"
        fill="#C87A00"/>
  <!-- Handle grip lines -->
  <rect x="478" y="470" width="68" height="10" rx="5" fill="#8B5300" opacity="0.6"/>
  <rect x="478" y="510" width="68" height="10" rx="5" fill="#8B5300" opacity="0.6"/>
  <rect x="478" y="550" width="68" height="10" rx="5" fill="#8B5300" opacity="0.6"/>
  <rect x="478" y="590" width="68" height="10" rx="5" fill="#8B5300" opacity="0.6"/>

  <!-- Layer 3: Detail - Code symbols on hammer face -->
  <text x="370" y="362" font-family="Consolas, monospace" font-size="82" font-weight="bold"
        fill="#1A2744" filter="url(#glow_text)">{  }</text>

  <!-- Small floating code tokens around -->
  <text x="168" y="310" font-family="Consolas, monospace" font-size="64" font-weight="bold"
        fill="#4FC3F7" opacity="0.85">&lt;/&gt;</text>
  <text x="688" y="310" font-family="Consolas, monospace" font-size="64" font-weight="bold"
        fill="#CE93D8" opacity="0.85">#</text>
  <text x="168" y="740" font-family="Consolas, monospace" font-size="56" font-weight="bold"
        fill="#80DEEA" opacity="0.75">.*</text>
  <text x="710" y="740" font-family="Consolas, monospace" font-size="52" font-weight="bold"
        fill="#FFB74D" opacity="0.75">JWT</text>

  <!-- Spark particles -->
  <circle cx="310" cy="250" r="14" fill="#FFD54F" opacity="0.9"/>
  <circle cx="720" cy="240" r="10" fill="#FFA000" opacity="0.7"/>
  <circle cx="260" cy="420" r="8" fill="#FFD54F" opacity="0.6"/>
  <circle cx="760" cy="440" r="12" fill="#FF8C00" opacity="0.75"/>
  <circle cx="340" cy="170" r="7" fill="#FFE082" opacity="0.5"/>
  <circle cx="670" cy="180" r="9" fill="#FFD54F" opacity="0.55"/>
</svg>
