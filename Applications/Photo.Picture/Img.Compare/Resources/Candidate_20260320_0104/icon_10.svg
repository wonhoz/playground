<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
<!-- 컨셉: 체크마크 vs X 비교 -->
<!-- 왼쪽 이미지 + 체크 -->
<rect x="160" y="200" width="280" height="220" rx="16" fill="#1A0040" stroke="#4527A0" stroke-width="20"/>
<!-- 이미지 내용 A -->
<path d="M 200 360 L 260 300 L 300 330 L 390 250 L 420 370 Z" fill="#4527A0" opacity="0.5"/>
<!-- 체크 원 배지 -->
<circle cx="160" cy="200" r="64" fill="#1A0040" stroke="#4527A0" stroke-width="20"/>
<circle cx="160" cy="200" r="44" fill="#4527A0"/>
<path d="M 130 200 L 152 224 L 192 178" fill="none" stroke="#050010" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 오른쪽 이미지 + X -->
<rect x="584" y="200" width="280" height="220" rx="16" fill="#1A0040" stroke="#CE93D8" stroke-width="20"/>
<!-- 이미지 내용 B -->
<path d="M 624 360 L 684 300 L 724 330 L 814 250 L 844 370 Z" fill="#CE93D8" opacity="0.3"/>
<!-- X 원 배지 -->
<circle cx="584" cy="200" r="64" fill="#1A0040" stroke="#CE93D8" stroke-width="20"/>
<circle cx="584" cy="200" r="44" fill="#CE93D8" opacity="0.5"/>
<line x1="558" y1="174" x2="610" y2="226" stroke="#050010" stroke-width="22" stroke-linecap="round"/>
<line x1="610" y1="174" x2="558" y2="226" stroke="#050010" stroke-width="22" stroke-linecap="round"/>
<!-- vs 가운데 텍스트 대신 간격선 -->
<line x1="456" y1="280" x2="568" y2="280" stroke="#4527A0" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
<line x1="456" y1="330" x2="568" y2="330" stroke="#4527A0" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
<!-- 결과 화살표 -->
<line x1="512" y1="460" x2="512" y2="600" stroke="#CE93D8" stroke-width="28" stroke-linecap="round"/>
<path d="M 440 545 L 512 610 L 584 545" fill="none" stroke="#CE93D8" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 결과 표시 (체크 선택됨) -->
<rect x="370" y="640" width="284" height="160" rx="20" fill="#1A0040" stroke="#4527A0" stroke-width="20"/>
<path d="M 422 720 L 476 780 L 590 680" fill="none" stroke="#4527A0" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
