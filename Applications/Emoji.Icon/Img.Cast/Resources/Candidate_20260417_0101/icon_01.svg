<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#FFF8EE"/>
  <rect x="20" y="20" width="984" height="984" rx="175" fill="url(#bg1)"/>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#FFE8C8"/>
    </linearGradient>
  </defs>

  <!-- Layer 2: Main Object — file card stack -->
  <!-- Back card (PNG) -->
  <rect x="220" y="190" width="360" height="440" rx="28" fill="#2196F3" opacity="0.85"/>
  <text x="285" y="310" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="white" opacity="0.9">PNG</text>

  <!-- Front card (ICO) -->
  <rect x="300" y="300" width="360" height="440" rx="28" fill="white" stroke="#2196F3" stroke-width="10"/>
  <text x="355" y="430" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="#2196F3">ICO</text>

  <!-- Layer 3: Arrow detail -->
  <g transform="translate(512, 530)">
    <circle cx="0" cy="0" r="68" fill="#FF7043"/>
    <path d="M-28,-12 L14,-12 L14,-26 L36,0 L14,26 L14,12 L-28,12 Z" fill="white"/>
  </g>

  <!-- Bottom label -->
  <text x="512" y="800" font-family="Arial, sans-serif" font-size="68" font-weight="700" fill="#B0714A" text-anchor="middle">Format Cast</text>
</svg>
