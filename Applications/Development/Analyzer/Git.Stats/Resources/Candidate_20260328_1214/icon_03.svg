<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg03)" rx="120"/>

  <!-- Layer 2: Tree trunk and branches (dark green) -->
  <!-- Trunk -->
  <rect x="472" y="700" width="80" height="200" fill="#2E7D32" rx="12"/>

  <!-- Main branch left -->
  <path d="M512 700 Q380 580 260 500" fill="none" stroke="#2E7D32" stroke-width="52" stroke-linecap="round"/>
  <!-- Main branch right -->
  <path d="M512 700 Q640 560 760 480" fill="none" stroke="#2E7D32" stroke-width="52" stroke-linecap="round"/>

  <!-- Sub-branches left side -->
  <path d="M340 555 Q290 480 240 420" fill="none" stroke="#388E3C" stroke-width="38" stroke-linecap="round"/>
  <path d="M290 520 Q230 470 200 390" fill="none" stroke="#388E3C" stroke-width="30" stroke-linecap="round"/>

  <!-- Sub-branches right side -->
  <path d="M680 520 Q740 450 790 380" fill="none" stroke="#388E3C" stroke-width="38" stroke-linecap="round"/>
  <path d="M730 490 Q800 430 840 360" fill="none" stroke="#388E3C" stroke-width="30" stroke-linecap="round"/>

  <!-- Center top branch -->
  <path d="M512 680 Q512 580 512 460" fill="none" stroke="#388E3C" stroke-width="38" stroke-linecap="round"/>

  <!-- Layer 3: Commit dots (orange circles) at branch tips -->
  <circle cx="240" cy="420" r="38" fill="#FF6D00" stroke="white" stroke-width="14"/>
  <circle cx="200" cy="390" r="30" fill="#FF8F00" stroke="white" stroke-width="12"/>
  <circle cx="260" cy="500" r="34" fill="#FF6D00" stroke="white" stroke-width="14"/>

  <circle cx="790" cy="380" r="38" fill="#FF6D00" stroke="white" stroke-width="14"/>
  <circle cx="840" cy="360" r="30" fill="#FF8F00" stroke="white" stroke-width="12"/>
  <circle cx="760" cy="480" r="34" fill="#FF6D00" stroke="white" stroke-width="14"/>

  <circle cx="512" cy="460" r="38" fill="#FF6D00" stroke="white" stroke-width="14"/>
  <circle cx="512" cy="360" r="30" fill="#FF8F00" stroke="white" stroke-width="12"/>

  <!-- Root dots -->
  <circle cx="512" cy="870" r="42" fill="#1B5E20" stroke="#A5D6A7" stroke-width="16"/>
  <circle cx="512" cy="870" r="18" fill="#A5D6A7"/>

  <!-- Grass -->
  <ellipse cx="512" cy="920" rx="220" ry="30" fill="#A5D6A7" opacity="0.6"/>
</svg>
