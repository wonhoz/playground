<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="comboGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="50%" stop-color="#ff9100"/>
      <stop offset="100%" stop-color="#ffea00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Silhouette fighter -->
  <!-- Head -->
  <circle cx="256" cy="105" r="40" fill="#1a1a1a" stroke="#ff1744" stroke-width="3"/>
  <!-- Body -->
  <rect x="216" y="145" width="80" height="100" rx="10" fill="#1a1a1a" stroke="#ff1744" stroke-width="2"/>
  <!-- Right arm (punch forward) -->
  <rect x="296" y="155" width="110" height="35" rx="12" fill="#1a1a1a" stroke="#ff9100" stroke-width="2.5"/>
  <!-- Fist -->
  <rect x="392" y="148" width="50" height="48" rx="10" fill="#ff1744"/>
  <!-- Left arm guard -->
  <rect x="126" y="165" width="90" height="35" rx="12" fill="#1a1a1a" stroke="#ff1744" stroke-width="2"/>
  <!-- Legs stance -->
  <rect x="230" y="245" width="32" height="90" rx="8" fill="#1a1a1a" stroke="#ff1744" stroke-width="2" transform="rotate(-8, 246, 290)"/>
  <rect x="250" y="245" width="32" height="90" rx="8" fill="#1a1a1a" stroke="#ff1744" stroke-width="2" transform="rotate(12, 266, 290)"/>
  <!-- Combo counter -->
  <rect x="40" y="50" width="200" height="60" rx="12" fill="#1a0000" stroke="#ff1744" stroke-width="2"/>
  <text x="60" y="72" font-family="Arial" font-size="13" fill="#888">COMBO</text>
  <text x="60" y="98" font-family="Arial" font-size="30" font-weight="900" fill="url(#comboGrad)">x 47</text>
  <!-- Impact effects -->
  <circle cx="445" cy="172" r="30" fill="none" stroke="#ffea00" stroke-width="3" opacity="0.7"/>
  <circle cx="445" cy="172" r="20" fill="none" stroke="#ff9100" stroke-width="2" opacity="0.8"/>
  <!-- Star burst at fist -->
  <line x1="445" y1="142" x2="445" y2="122" stroke="#ffea00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="468" y1="155" x2="488" y2="148" stroke="#ffea00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="468" y1="190" x2="488" y2="197" stroke="#ffea00" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="445" y1="202" x2="445" y2="222" stroke="#ffea00" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- HP bars -->
  <rect x="40" y="400" width="180" height="14" rx="7" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="40" y="400" width="130" height="14" rx="7" fill="#4caf50"/>
  <text x="42" y="395" font-family="Arial" font-size="11" fill="#4caf50">HP</text>
  <!-- Title -->
  <text x="256" y="490" font-family="Arial" font-size="34" font-weight="900" fill="url(#comboGrad)" text-anchor="middle" letter-spacing="5">FIST FURY</text>
</svg>
