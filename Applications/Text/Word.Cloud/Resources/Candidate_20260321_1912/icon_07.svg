      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="50%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7E57C2"/>
    </linearGradient>
    <clipPath id="cc7">
      <circle cx="512" cy="565" r="222"/>
      <circle cx="308" cy="600" r="172"/>
      <circle cx="716" cy="600" r="172"/>
      <circle cx="512" cy="394" r="192"/>
      <circle cx="378" cy="448" r="162"/>
