<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="we-bg-clip-03">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="we-bg-03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#we-bg-03)"/>

  <g clip-path="url(#we-bg-clip-03)">
    <!-- 3단계 이벤트 레벨 삼각형 -->

    <!-- Error 삼각형 (상단 중앙, 가장 크고 진함) -->
    <polygon points="512,230 700,570 324,570" fill="#1A0500"/>
    <!-- 내부 삼각형 (밝게) -->
    <polygon points="512,280 670,545 354,545" fill="#2D0A00"/>
    <!-- 느낌표 -->
    <rect x="496" y="330" width="32" height="130" rx="16" fill="#FFFFFF"/>
    <circle cx="512" cy="506" r="18" fill="#FFFFFF"/>

    <!-- Warning 삼각형 (좌하) -->
    <polygon points="310,630 476,630 393,780" fill="#3E1F00" opacity="0.95"/>
    <polygon points="316,625 470,625 393,770" fill="#5C2D00"/>
    <rect x="383" y="648" width="20" height="78" rx="10" fill="#FFE082"/>
    <circle cx="393" cy="750" r="11" fill="#FFE082"/>

    <!-- Info 삼각형 (우하) -->
    <polygon points="548,630 714,630 631,780" fill="#0A1A2E" opacity="0.95"/>
    <polygon points="554,625 708,625 631,770" fill="#0D2745"/>
    <!-- i 아이콘 -->
    <circle cx="631" cy="659" r="11" fill="#64B5F6"/>
    <rect x="621" y="678" width="20" height="72" rx="10" fill="#64B5F6"/>
  </g>
</svg>
