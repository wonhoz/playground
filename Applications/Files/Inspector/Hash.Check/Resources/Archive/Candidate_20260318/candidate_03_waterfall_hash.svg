<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#060f0b"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="stream1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stream2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#6EE7B7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Input block at top -->
  <rect x="80" y="50" width="352" height="55" rx="10" fill="#061a0e" stroke="#10B981" stroke-width="2" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Input "file" segments -->
  <rect x="96" y="64" width="50" height="28" rx="5" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="154" y="64" width="70" height="28" rx="5" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="232" y="64" width="45" height="28" rx="5" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="285" y="64" width="85" height="28" rx="5" fill="#6EE7B7" fill-opacity="0.1" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="378" y="64" width="40" height="28" rx="5" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Waterfall streams (hash computation cascade) -->
  <!-- Wide center stream -->
  <rect x="232" y="105" width="48" height="160" fill="url(#stream1)" rx="6" filter="url(#glow)"/>
  <!-- Side streams -->
  <rect x="178" y="115" width="28" height="130" fill="url(#stream2)" rx="4" filter="url(#softglow)"/>
  <rect x="306" y="115" width="28" height="130" fill="url(#stream2)" rx="4" filter="url(#softglow)"/>
  <rect x="130" y="135" width="18" height="100" fill="#10B981" fill-opacity="0.35" rx="3"/>
  <rect x="364" y="135" width="18" height="100" fill="#10B981" fill-opacity="0.35" rx="3"/>
  <rect x="96" y="155" width="12" height="70" fill="#34D399" fill-opacity="0.25" rx="2"/>
  <rect x="404" y="155" width="12" height="70" fill="#34D399" fill-opacity="0.25" rx="2"/>

  <!-- Hash mixing pool -->
  <ellipse cx="256" cy="290" rx="180" ry="45" fill="#061a10" stroke="#10B981" stroke-width="2" stroke-opacity="0.6" filter="url(#softglow)"/>
  <ellipse cx="256" cy="290" rx="140" ry="35" fill="#10B981" fill-opacity="0.05"/>
  <ellipse cx="256" cy="290" rx="100" ry="25" fill="#10B981" fill-opacity="0.05"/>

  <!-- Mixing vortex lines -->
  <path d="M150,290 Q180,275 220,290 Q256,305 292,290 Q330,275 362,290" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.5" filter="url(#softglow)"/>
  <path d="M150,285 Q190,270 230,285 Q256,298 282,285 Q322,270 362,285" fill="none" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Output funnel -->
  <path d="M130,320 L200,390 L256,410 L312,390 L382,320 Z" fill="#061a0e" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Hash output bar (the result) -->
  <rect x="80" y="420" width="352" height="50" rx="10" fill="#051a0c" stroke="#10B981" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)"/>
  <!-- Hash hex characters -->
  <rect x="96" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.6"/>
  <rect x="120" y="433" width="18" height="24" rx="3" fill="#34D399" fill-opacity="0.5"/>
  <rect x="144" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.65"/>
  <rect x="168" y="433" width="18" height="24" rx="3" fill="#6EE7B7" fill-opacity="0.45"/>
  <rect x="192" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.6"/>
  <rect x="216" y="433" width="18" height="24" rx="3" fill="#34D399" fill-opacity="0.55"/>
  <rect x="240" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.7"/>
  <rect x="264" y="433" width="18" height="24" rx="3" fill="#6EE7B7" fill-opacity="0.5"/>
  <rect x="288" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.6"/>
  <rect x="312" y="433" width="18" height="24" rx="3" fill="#34D399" fill-opacity="0.55"/>
  <rect x="336" y="433" width="18" height="24" rx="3" fill="#10B981" fill-opacity="0.65"/>
  <rect x="360" y="433" width="18" height="24" rx="3" fill="#6EE7B7" fill-opacity="0.4"/>
  <!-- Verify checkmark -->
  <circle cx="416" cy="445" r="14" fill="#10B981" fill-opacity="0.25" stroke="#10B981" stroke-width="2" filter="url(#softglow)"/>
  <path d="M408,445 L414,451 L424,437" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
