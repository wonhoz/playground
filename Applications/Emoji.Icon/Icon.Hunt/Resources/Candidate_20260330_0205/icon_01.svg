<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#4DD0E1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 청록 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg1)"/>

  <!-- Layer 2: 아이콘 그리드 (3x3) -->
  <!-- 행 1 -->
  <rect x="100" y="120" width="160" height="160" rx="20" fill="white" opacity="0.85"/>
  <circle cx="180" cy="200" r="50" fill="#26C6DA"/>
  <rect x="292" y="120" width="160" height="160" rx="20" fill="white" opacity="0.85"/>
  <polygon points="372,145 412,215 332,215" fill="#FF7043"/>
  <rect x="484" y="120" width="160" height="160" rx="20" fill="white" opacity="0.85"/>
  <rect x="514" y="150" width="100" height="100" rx="12" fill="#AB47BC"/>
  <!-- 행 2 -->
  <rect x="100" y="304" width="160" height="160" rx="20" fill="white" opacity="0.85"/>
  <polygon points="180,320 220,380 180,380 140,380" fill="#43A047"/>
  <rect x="292" y="304" width="160" height="160" rx="20" fill="#FFF9C4" opacity="0.9"/>
  <text x="372" y="395" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="86" fill="#F57F17" text-anchor="middle" dominant-baseline="middle">★</text>
  <rect x="484" y="304" width="160" height="160" rx="20" fill="white" opacity="0.85"/>
  <circle cx="564" cy="384" r="36" fill="#EF5350" stroke="#B71C1C" stroke-width="8"/>

  <!-- Layer 3: 돋보기 (큰, 오른쪽 하단) -->
  <!-- 돋보기 원 -->
  <circle cx="660" cy="660" r="220" fill="none" stroke="#F9A825" stroke-width="46"/>
  <!-- 돋보기 손잡이 -->
  <line x1="824" y1="824" x2="940" y2="940" stroke="#F57F17" stroke-width="52" stroke-linecap="round"/>
  <!-- 돋보기 내 하이라이트 (선택된 아이콘) -->
  <rect x="550" y="554" width="220" height="220" rx="20" fill="#F9A825" opacity="0.3"/>
  <text x="660" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="86" fill="#E65100" text-anchor="middle" dominant-baseline="middle">★</text>
</svg>
