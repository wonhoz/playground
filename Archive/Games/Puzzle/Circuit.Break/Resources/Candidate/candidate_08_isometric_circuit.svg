<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric grid base -->
  <!-- Platform tiles (isometric) -->
  <!-- Tile 1 (top-left) -->
  <polygon points="140,180 220,136 300,180 220,224" fill="#1a1a3a" stroke="#3344aa" stroke-width="2"/>
  <polygon points="140,180 140,240 220,284 220,224" fill="#0d0d22" stroke="#2233aa" stroke-width="2"/>
  <polygon points="220,224 300,180 300,240 220,284" fill="#111133" stroke="#2244aa" stroke-width="2"/>
  <!-- Circuit wire on tile 1 top -->
  <line x1="180" y1="158" x2="220" y2="180" stroke="#00aaff" stroke-width="4" filter="url(#glow)"/>
  <line x1="220" y1="180" x2="260" y2="158" stroke="#00aaff" stroke-width="4" filter="url(#glow)"/>
  <!-- Tile 2 (center) -->
  <polygon points="220,224 300,180 380,224 300,268" fill="#1a2a3a" stroke="#3355bb" stroke-width="2"/>
  <polygon points="220,224 220,284 300,328 300,268" fill="#0d1a22" stroke="#2244bb" stroke-width="2"/>
  <polygon points="300,268 380,224 380,284 300,328" fill="#111a33" stroke="#2255bb" stroke-width="2"/>
  <!-- LED on tile 2 -->
  <circle cx="300" cy="224" r="16" fill="#00ffaa" filter="url(#glow)"/>
  <!-- Wire from tile1 to tile2 -->
  <line x1="260" y1="202" x2="300" y2="224" stroke="#00ffaa" stroke-width="5" filter="url(#glow)"/>
  <!-- Tile 3 (right) - broken -->
  <polygon points="300,268 380,224 460,268 380,312" fill="#2a1a1a" stroke="#aa3322" stroke-width="2"/>
  <polygon points="300,268 300,328 380,372 380,312" fill="#1a0d0d" stroke="#aa2222" stroke-width="2"/>
  <polygon points="380,312 460,268 460,328 380,372" fill="#221111" stroke="#aa2233" stroke-width="2"/>
  <!-- Broken wire -->
  <line x1="340" y1="290" x2="370" y2="268" stroke="#ff4400" stroke-width="4" stroke-dasharray="6 4" filter="url(#glow)"/>
  <!-- Spark at break -->
  <circle cx="355" cy="278" r="8" fill="#ffcc00" filter="url(#glow)" opacity="0.8"/>
  <!-- Tile 4 (bottom) -->
  <polygon points="140,324 220,280 300,324 220,368" fill="#1a2a1a" stroke="#335533" stroke-width="2"/>
  <polygon points="140,324 140,384 220,428 220,368" fill="#0d1a0d" stroke="#224422" stroke-width="2"/>
  <polygon points="220,368 300,324 300,384 220,428" fill="#112211" stroke="#225533" stroke-width="2"/>
  <!-- Wire on tile 4 -->
  <line x1="180" y1="302" x2="220" y2="324" stroke="#00ff44" stroke-width="4" filter="url(#glow)"/>
  <circle cx="220" cy="324" r="10" fill="#00ff44" filter="url(#glow)"/>
</svg>