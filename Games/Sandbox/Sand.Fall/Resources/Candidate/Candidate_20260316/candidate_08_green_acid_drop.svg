<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001A00"/>
      <stop offset="100%" stop-color="#0A2010"/>
    </linearGradient>
    <radialGradient id="acid" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="60%" stop-color="#76FF03"/>
      <stop offset="100%" stop-color="#33691E"/>
    </radialGradient>
    <linearGradient id="drip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="100%" stop-color="#76FF03" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Acid pool -->
  <ellipse cx="256" cy="430" rx="170" ry="36" fill="#1B5E20" opacity="0.8"/>
  <ellipse cx="256" cy="425" rx="140" ry="22" fill="#33691E"/>
  <!-- Bubbles in pool -->
  <g fill="#76FF03" opacity="0.7">
    <circle cx="190" cy="420" r="10"/>
    <circle cx="240" cy="418" r="14"/>
    <circle cx="296" cy="422" r="11"/>
    <circle cx="340" cy="420" r="9"/>
    <circle cx="160" cy="428" r="7"/>
  </g>
  <!-- Drips falling -->
  <ellipse cx="220" cy="280" rx="14" ry="40" fill="url(#drip)" opacity="0.9"/>
  <ellipse cx="256" cy="240" rx="16" ry="50" fill="url(#drip)" opacity="0.95"/>
  <ellipse cx="292" cy="300" rx="13" ry="36" fill="url(#drip)" opacity="0.85"/>
  <!-- Drop at tip -->
  <ellipse cx="220" cy="322" rx="16" ry="20" fill="url(#acid)"/>
  <ellipse cx="256" cy="294" rx="18" ry="22" fill="url(#acid)"/>
  <ellipse cx="292" cy="338" rx="15" ry="18" fill="url(#acid)"/>
  <!-- Source bar -->
  <rect x="120" y="100" width="272" height="30" rx="10" fill="#33691E"/>
  <rect x="120" y="100" width="272" height="14" rx="10" fill="#76FF03" opacity="0.7"/>
  <!-- Ooze lines from source -->
  <g stroke="url(#drip)" stroke-width="8" fill="none" stroke-linecap="round">
    <line x1="180" y1="130" x2="220" y2="240"/>
    <line x1="256" y1="130" x2="256" y2="190"/>
    <line x1="332" y1="130" x2="292" y2="264"/>
  </g>
</svg>
