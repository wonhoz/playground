<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stretching human figure (yoga-like) -->
  <!-- Head -->
  <circle cx="256" cy="112" r="36" fill="url(#glow)" opacity="0.9"/>
  <!-- Body -->
  <line x1="256" y1="148" x2="256" y2="280" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Arms raised -->
  <line x1="256" y1="200" x2="152" y2="140" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="200" x2="360" y2="140" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Hand dots -->
  <circle cx="148" cy="138" r="12" fill="#E1BEE7"/>
  <circle cx="364" cy="138" r="12" fill="#E1BEE7"/>
  <!-- Legs spread -->
  <line x1="256" y1="280" x2="176" y2="380" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="280" x2="336" y2="380" stroke="#CE93D8" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Foot dots -->
  <circle cx="172" cy="384" r="12" fill="#E1BEE7"/>
  <circle cx="340" cy="384" r="12" fill="#E1BEE7"/>
  <!-- Notification popup -->
  <rect x="72" y="400" width="368" height="80" rx="16" fill="#4A148C" stroke="#CE93D8" stroke-width="5"/>
  <!-- Bell icon -->
  <path d="M 116,420 A 20,20 0 0,1 136,440 L 136,452 L 96,452 L 96,440 A 20,20 0 0,1 116,420 Z" fill="#CE93D8"/>
  <circle cx="116" cy="456" r="7" fill="#CE93D8"/>
  <rect x="104" y="416" width="24" height="6" rx="3" fill="#CE93D8"/>
  <rect x="152" y="416" width="200" height="10" rx="5" fill="#E1BEE7" opacity="0.9"/>
  <rect x="152" y="432" width="160" height="8" rx="4" fill="#CE93D8" opacity="0.7"/>
  <rect x="152" y="446" width="180" height="8" rx="4" fill="#CE93D8" opacity="0.6"/>
  <!-- Timer -->
  <circle cx="400" cy="440" r="28" fill="#7B1FA2" stroke="#CE93D8" stroke-width="4"/>
  <text x="400" y="448" text-anchor="middle" font-size="18" font-weight="bold" fill="#E1BEE7" font-family="monospace">5m</text>
</svg>
