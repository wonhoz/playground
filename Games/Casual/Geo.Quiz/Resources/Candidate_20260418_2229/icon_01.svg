<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background blue -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: Flag emoji display + question -->
  <!-- Flag area -->
  <rect x="200" y="140" width="624" height="220" rx="20" fill="#FFFFFF" opacity="0.95"/>
  <text x="512" y="280" font-family="Segoe UI Emoji, sans-serif" font-size="150" text-anchor="middle">🇧🇷</text>
  <text x="512" y="338" font-family="Arial, sans-serif" font-size="34" fill="#1565C0" text-anchor="middle">이 나라의 수도는?</text>
  <!-- 4 choice buttons -->
  <rect x="130" y="420" width="340" height="100" rx="16" fill="#BBDEFB"/>
  <text x="300" y="482" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#0D47A1" text-anchor="middle">리마</text>
  <rect x="554" y="420" width="340" height="100" rx="16" fill="#66BB6A"/>
  <text x="724" y="482" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">브라질리아</text>
  <circle cx="556" cy="420" r="22" fill="#43A047"/>
  <path d="M541 420 L552 432 L574 406" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="130" y="548" width="340" height="100" rx="16" fill="#BBDEFB"/>
  <text x="300" y="608" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#0D47A1" text-anchor="middle">부에노스아이레스</text>
  <rect x="554" y="548" width="340" height="100" rx="16" fill="#BBDEFB"/>
  <text x="724" y="608" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#0D47A1" text-anchor="middle">상파울루</text>
  <!-- Layer 3: Score/streak -->
  <rect x="340" y="700" width="344" height="80" rx="16" fill="#1565C0"/>
  <text x="512" y="751" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle">🔥 3 streak</text>
