  <rect x="154" y="98" width="76" height="30" rx="4" fill="#336699"/>
  <rect x="240" y="98" width="76" height="30" rx="4" fill="#336699"/>
  <rect x="326" y="98" width="76" height="30" rx="4" fill="#336699"/>
  <rect x="110" y="138" width="76" height="30" rx="4" fill="#224488"/>
  <rect x="196" y="138" width="76" height="30" rx="4" fill="#224488"/>
  <rect x="282" y="138" width="76" height="30" rx="4" fill="#224488"/>
  <rect x="68" y="178" width="76" height="30" rx="4" fill="#112266"/>
