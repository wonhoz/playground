<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#102030"/>
      <stop offset="100%" style="stop-color:#060c14"/>
    </radialGradient>
    <radialGradient id="clock-face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3050"/>
      <stop offset="100%" style="stop-color:#0a1828"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clock outer ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#1565c0" stroke-width="4" opacity="0.5"/>
  <circle cx="256" cy="256" r="175" fill="url(#clock-face)"/>
  <!-- Boot progress arc (colored sectors) -->
  <!-- UEFI sector (0° - 45°) -->
  <path d="M256 256 L441 256 A185 185 0 0 1 387 387 Z" fill="#0091ea" opacity="0.4"/>
  <!-- Bootloader sector (45° - 90°) -->
  <path d="M256 256 L387 387 A185 185 0 0 1 256 441 Z" fill="#00c853" opacity="0.35"/>
  <!-- Kernel sector (90° - 180°) -->
  <path d="M256 256 L256 441 A185 185 0 0 1 71 256 Z" fill="#aa00ff" opacity="0.3"/>
  <!-- Services sector (180° - 270°) -->
  <path d="M256 256 L71 256 A185 185 0 0 1 256 71 Z" fill="#ff6d00" opacity="0.25"/>
  <!-- Desktop ready (270° - 360°) -->
  <path d="M256 256 L256 71 A185 185 0 0 1 441 256 Z" fill="#ffd600" opacity="0.2"/>
  <!-- Clock face overlay -->
  <circle cx="256" cy="256" r="150" fill="#0a1828" opacity="0.7"/>
  <!-- Hour markers -->
  <g stroke="#546e7a" stroke-width="2" opacity="0.7">
    <line x1="256" y1="90" x2="256" y2="110"/>
    <line x1="256" y1="402" x2="256" y2="422"/>
    <line x1="90" y1="256" x2="110" y2="256"/>
    <line x1="402" y1="256" x2="422" y2="256"/>
  </g>
  <!-- Minute markers -->
  <g stroke="#37474f" stroke-width="1.5" opacity="0.5">
    <line x1="323" y1="97" x2="318" y2="115"/>
    <line x1="380" y1="132" x2="370" y2="147"/>
    <line x1="415" y1="189" x2="400" y2="199"/>
    <line x1="415" y1="323" x2="400" y2="313"/>
    <line x1="380" y1="380" x2="370" y2="365"/>
    <line x1="323" y1="415" x2="318" y2="397"/>
    <line x1="189" y1="415" x2="194" y2="397"/>
    <line x1="132" y1="380" x2="142" y2="365"/>
    <line x1="97" y1="323" x2="112" y2="313"/>
    <line x1="97" y1="189" x2="112" y2="199"/>
    <line x1="132" y1="132" x2="142" y2="147"/>
    <line x1="189" y1="97" x2="194" y2="115"/>
  </g>
  <!-- Boot progress hand (pointing to ~72°) -->
  <line x1="256" y1="256" x2="340" y2="118" stroke="#00e5ff" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Sub-seconds hand -->
  <line x1="256" y1="256" x2="360" y2="310" stroke="#ea80fc" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="12" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="#0a1828"/>
</svg>