<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright vibrant orange -->
  <rect width="1024" height="1024" rx="190" fill="#E17055"/>

  <!-- Layer 2: Button remapping "X → B" -->

  <!-- FROM button: X (blue circle, left) -->
  <circle cx="260" cy="440" r="160" fill="#74B9FF" stroke="#FFFFFF" stroke-width="20"/>
  <text x="260" y="475" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="180" font-weight="900" fill="#FFFFFF">X</text>

  <!-- Remapping arrow (thick, bold, right-pointing) -->
  <line x1="446" y1="440" x2="582" y2="440" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
  <polygon points="620,440 570,406 570,474" fill="#FFFFFF"/>

  <!-- TO button: B (red circle, right) -->
  <circle cx="764" cy="440" r="160" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="20"/>
  <text x="764" y="475" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="180" font-weight="900" fill="#FFFFFF">B</text>

  <!-- Layer 3: Profile name + hold mapping row -->
  <!-- Profile pill -->
  <rect x="200" y="660" width="624" height="80" rx="28" fill="#FFFFFF" opacity="0.9"/>
  <text x="512" y="712" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="46" font-weight="900" fill="#E17055">🎮 sekiro.exe</text>

  <!-- Mapping label above -->
  <text x="260" y="296" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" opacity="0.9">원본</text>
  <text x="764" y="296" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" opacity="0.9">변환</text>

  <!-- Extra small mapping row: Y → A -->
  <rect x="200" y="786" width="280" height="64" rx="20" fill="#FFEAA7"/>
  <text x="340" y="826" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="900" fill="#2D3436">Y → A</text>

  <rect x="544" y="786" width="280" height="64" rx="20" fill="#55EFC4"/>
  <text x="684" y="826" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="900" fill="#2D3436">LT → RB</text>
</svg>
