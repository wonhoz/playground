<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- JSON 텍스트 블록 -->
  <rect x="50" y="80" width="300" height="280" rx="12" fill="#003D33"/>
  <!-- 코드 라인들 -->
  <text x="70" y="120" font-size="18" fill="#80CBC4" font-family="Courier New">{</text>
  <text x="90" y="150" font-size="16" fill="#26A69A" font-family="Courier New">"id": 42,</text>
  <text x="90" y="178" font-size="16" fill="#26A69A" font-family="Courier New">"ok": true,</text>
  <text x="90" y="206" font-size="16" fill="#26A69A" font-family="Courier New">"data": [...]</text>
  <text x="70" y="234" font-size="18" fill="#80CBC4" font-family="Courier New">}</text>
  <!-- 유효성 뱃지 -->
  <circle cx="390" cy="180" r="70" fill="#004D40" stroke="#4DB6AC" stroke-width="4"/>
  <circle cx="390" cy="180" r="55" fill="#1B5E20"/>
  <path d="M 360 180 L 382 202 L 422 155" fill="none" stroke="#69F0AE" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="390" y="240" font-size="16" text-anchor="middle" fill="#80CBC4" font-family="Segoe UI">Valid JSON</text>
  <!-- 포맷 버튼 -->
  <rect x="50" y="390" width="180" height="50" rx="14" fill="#00695C" stroke="#4DB6AC" stroke-width="2"/>
  <text x="140" y="421" font-size="18" text-anchor="middle" fill="#E0F2F1" font-family="Segoe UI">Format</text>
  <rect x="250" y="390" width="100" height="50" rx="14" fill="#00695C" stroke="#4DB6AC" stroke-width="2"/>
  <text x="300" y="421" font-size="18" text-anchor="middle" fill="#E0F2F1" font-family="Segoe UI">Minify</text>
</svg>