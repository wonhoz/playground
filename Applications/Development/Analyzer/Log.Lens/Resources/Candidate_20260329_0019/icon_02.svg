<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 탭 UI + 에러 하이라이트 로그 뷰어 | 레이어드 | 밝은회색+파랑탭+빨강 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: Tab bar -->
  <rect x="60" y="80" width="904" height="864" rx="24" fill="white" filter="url(#sh2)"/>
  <!-- Tab row -->
  <rect x="60" y="80" width="904" height="100" rx="24" fill="#1565C0"/>
  <rect x="60" y="142" width="904" height="38" fill="#1565C0"/>

  <!-- Tab 1 (active) -->
  <rect x="80" y="88" width="220" height="92" rx="14" fill="#42A5F5"/>
  <text x="190" y="134" font-family="Arial, sans-serif" font-size="28" fill="white"
        text-anchor="middle" dominant-baseline="middle">server.log</text>
  <!-- Close button -->
  <text x="284" y="134" font-family="Arial, sans-serif" font-size="24" fill="white"
        text-anchor="middle" dominant-baseline="middle">✕</text>

  <!-- Tab 2 -->
  <rect x="314" y="94" width="200" height="80" rx="12" fill="#1976D2" opacity="0.7"/>
  <text x="414" y="134" font-family="Arial, sans-serif" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">app.log</text>

  <!-- Tab 3 (error badge) -->
  <rect x="528" y="94" width="200" height="80" rx="12" fill="#1976D2" opacity="0.7"/>
  <text x="614" y="134" font-family="Arial, sans-serif" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">error.log</text>
  <!-- Error count badge -->
  <circle cx="718" cy="100" r="20" fill="#E53935"/>
  <text x="718" y="100" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">3</text>

  <!-- Layer 3: Filter bar + log content -->
  <!-- Filter/search bar -->
  <rect x="72" y="192" width="880" height="56" rx="16" fill="#F5F5F5" filter="url(#sh2)"/>
  <text x="110" y="220" font-family="Arial, sans-serif" font-size="30" fill="#90A4AE"
        dominant-baseline="middle">🔍  ERROR</text>
  <!-- Filter tag -->
  <rect x="700" y="202" width="120" height="36" rx="18" fill="#E53935"/>
  <text x="760" y="220" font-family="Arial, sans-serif" font-size="24" fill="white"
        text-anchor="middle" dominant-baseline="middle">ERROR</text>

  <!-- Log lines (filtered to ERRORs) -->
  <rect x="72" y="264" width="880" height="62" rx="6" fill="#FFEBEE"/>
  <rect x="72" y="264" width="10" height="62" rx="5" fill="#E53935"/>
  <text x="98" y="295" font-family="Consolas, monospace" font-size="32" fill="#B71C1C"
        dominant-baseline="middle">[ERROR] NullRef in AuthService.Login()</text>

  <rect x="72" y="340" width="880" height="62" rx="6" fill="#FFEBEE"/>
  <rect x="72" y="340" width="10" height="62" rx="5" fill="#E53935"/>
  <text x="98" y="371" font-family="Consolas, monospace" font-size="32" fill="#B71C1C"
        dominant-baseline="middle">[ERROR] DB timeout after 30s</text>

  <rect x="72" y="416" width="880" height="62" rx="6" fill="#FFEBEE"/>
  <rect x="72" y="416" width="10" height="62" rx="5" fill="#E53935"/>
  <text x="98" y="447" font-family="Consolas, monospace" font-size="32" fill="#B71C1C"
        dominant-baseline="middle">[ERROR] Unhandled exception in Srv</text>

  <!-- Summary bar -->
  <rect x="72" y="500" width="880" height="50" rx="8" fill="#FAFAFA"/>
  <text x="90" y="525" font-family="Arial, sans-serif" font-size="28" fill="#546E7A"
        dominant-baseline="middle">총 3개 오류 발견 · 필터: ERROR</text>

  <!-- Stats row -->
  <rect x="72" y="570" width="260" height="80" rx="16" fill="#E8F5E9" filter="url(#sh2)"/>
  <text x="202" y="610" font-family="Arial Black, sans-serif" font-size="24" fill="#2E7D32"
        text-anchor="middle" dominant-baseline="middle">INFO: 142</text>

  <rect x="350" y="570" width="260" height="80" rx="16" fill="#FFFDE7" filter="url(#sh2)"/>
  <text x="480" y="610" font-family="Arial Black, sans-serif" font-size="24" fill="#F57F17"
        text-anchor="middle" dominant-baseline="middle">WARN: 18</text>

  <rect x="628" y="570" width="260" height="80" rx="16" fill="#FFEBEE" filter="url(#sh2)"/>
  <text x="758" y="610" font-family="Arial Black, sans-serif" font-size="24" fill="#C62828"
        text-anchor="middle" dominant-baseline="middle">ERROR: 3</text>
</svg>
