<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05000f"/>
      <stop offset="100%" style="stop-color:#0f0500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sprinterAura" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="trailMulti" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#ffaa00;stop-opacity:0.5"/>
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sprint aura -->
  <ellipse cx="256" cy="300" rx="120" ry="80" fill="url(#sprinterAura)"/>
  <!-- Multi-colored sprint trails -->
  <path d="M60 280 L240 275" stroke="url(#trailMulti)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M60 295 L238 292" stroke="url(#trailMulti)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M60 265 L235 262" stroke="url(#trailMulti)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
  <path d="M80 310 L236 308" stroke="url(#trailMulti)" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <path d="M80 252 L234 250" stroke="url(#trailMulti)" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.4"/>
  <!-- Ghost runners (after images) -->
  <g opacity="0.15" transform="translate(220, 295)">
    <circle cx="0" cy="-50" r="12" fill="#ff6600"/>
    <line x1="0" y1="-37" x2="0" y2="3" stroke="#ff6600" stroke-width="3"/>
    <line x1="0" y1="-20" x2="-16" y2="0" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="0" y1="3" x2="-13" y2="28" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="0" y1="3" x2="14" y2="20" stroke="#ff6600" stroke-width="2.5"/>
  </g>
  <g opacity="0.1" transform="translate(205, 298)">
    <circle cx="0" cy="-50" r="12" fill="#ffaa00"/>
    <line x1="0" y1="-37" x2="0" y2="3" stroke="#ffaa00" stroke-width="3"/>
    <line x1="0" y1="3" x2="-13" y2="28" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="0" y1="3" x2="14" y2="20" stroke="#ffaa00" stroke-width="2.5"/>
  </g>
  <!-- Main sprinter -->
  <g filter="url(#glow)" transform="translate(256, 295)">
    <circle cx="0" cy="-55" r="15" fill="none" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="0" y1="-39" x2="0" y2="4" stroke="#ff6600" stroke-width="3"/>
    <line x1="0" y1="-22" x2="-20" y2="-4" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="0" y1="-22" x2="18" y2="-38" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="0" y1="4" x2="-15" y2="32" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="-15" y1="32" x2="-6" y2="48" stroke="#ffaa00" stroke-width="2"/>
    <line x1="0" y1="4" x2="17" y2="25" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="17" y1="25" x2="24" y2="13" stroke="#ffaa00" stroke-width="2"/>
  </g>
  <!-- Ground -->
  <line x1="40" y1="395" x2="472" y2="395" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <!-- Speed rings around runner -->
  <ellipse cx="256" cy="270" rx="50" ry="20" fill="none" stroke="#ff6600" stroke-width="1" filter="url(#glow)" opacity="0.3" stroke-dasharray="5,5"/>
  <ellipse cx="256" cy="268" rx="70" ry="28" fill="none" stroke="#ffaa00" stroke-width="1" filter="url(#glow)" opacity="0.2" stroke-dasharray="8,6"/>
</svg>