  <circle cx="150" cy="220" r="10" fill="#44ff88"/>
  <circle cx="362" cy="220" r="10" fill="#44ff88"/>
  <circle cx="130" cy="330" r="9" fill="#ffaa44"/>
  <circle cx="256" cy="300" r="14" fill="#ffffff"/>
  <circle cx="382" cy="330" r="9" fill="#ffaa44"/>
