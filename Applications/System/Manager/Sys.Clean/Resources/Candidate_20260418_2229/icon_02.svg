<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background teal -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="fullGauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: Before/After disk usage bars -->
  <!-- Before section -->
  <rect x="150" y="210" width="724" height="260" rx="20" fill="#FFFFFF" opacity="0.9"/>
  <text x="240" y="270" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#757575">Before</text>
  <rect x="190" y="295" width="644" height="52" rx="26" fill="#ECEFF1"/>
  <rect x="190" y="295" width="600" height="52" rx="26" fill="url(#fullGauge)"/>
  <text x="800" y="336" font-family="Arial Black, sans-serif" font-size="36" fill="#E53935" text-anchor="middle">93%</text>
  <!-- Breakdown bars -->
  <rect x="190" y="370" width="260" height="22" rx="11" fill="#EF9A9A"/>
  <text x="200" y="384" font-family="Arial, sans-serif" font-size="18" fill="#B71C1C">임시파일 3.2GB</text>
  <rect x="460" y="370" width="160" height="22" rx="11" fill="#CE93D8"/>
  <text x="470" y="384" font-family="Arial, sans-serif" font-size="18" fill="#6A1B9A">레지스트리 0.1GB</text>
  <!-- Arrow -->
  <polygon points="512,490 470,560 554,560" fill="#00695C" opacity="0.8"/>
  <!-- After section -->
  <rect x="150" y="580" width="724" height="230" rx="20" fill="#FFFFFF" opacity="0.95"/>
  <text x="240" y="640" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#00695C">After</text>
  <rect x="190" y="665" width="644" height="52" rx="26" fill="#ECEFF1"/>
  <rect x="190" y="665" width="170" height="52" rx="26" fill="#43A047"/>
  <text x="800" y="706" font-family="Arial Black, sans-serif" font-size="36" fill="#2E7D32" text-anchor="middle">26%</text>
  <!-- Layer 3: Freed label -->
  <rect x="300" y="860" width="424" height="90" rx="20" fill="#004D40"/>
  <text x="512" y="918" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#A5D6A7" text-anchor="middle">-4.0 GB freed</text>
</svg>
