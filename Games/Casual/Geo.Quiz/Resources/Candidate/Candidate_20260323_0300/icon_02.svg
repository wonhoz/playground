  <text x="512" y="648" font-family="Arial,sans-serif" font-size="24" fill="#93C5FD" text-anchor="middle">이 국기는 어느 나라? 🤔</text>
  <!-- Choices -->
  <rect x="160" y="702" width="330" height="52" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="325" y="734" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">① 아르헨티나</text>
