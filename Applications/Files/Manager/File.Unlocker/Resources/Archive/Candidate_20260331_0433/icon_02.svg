<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 자물쇠 (열린 상태) -->
  <!-- 자물쇠 몸통 -->
  <rect x="312" y="520" width="400" height="340" rx="32" fill="#1565C0"/>
  <!-- 열린 고리 (오른쪽으로 열림) -->
  <path d="M420,520 Q420,300 620,300 Q820,300 820,420" fill="none" stroke="#1565C0" stroke-width="60" stroke-linecap="round"/>
  <!-- 자물쇠 키홀 -->
  <circle cx="512" cy="660" r="52" fill="#0D47A1"/>
  <rect x="494" y="700" width="36" height="80" rx="10" fill="#0D47A1"/>
  <!-- Layer 3: 열쇠 -->
  <!-- 열쇠 헤드 -->
  <circle cx="800" cy="280" r="100" fill="#FF8F00"/>
  <circle cx="800" cy="280" r="64" fill="#FFFDE7"/>
  <!-- 열쇠 날 -->
  <rect x="856" y="260" width="120" height="40" rx="10" fill="#FF8F00"/>
  <rect x="930" y="300" width="30" height="36" rx="6" fill="#FF8F00"/>
  <rect x="966" y="300" width="30" height="28" rx="6" fill="#FF8F00"/>
  <!-- 잠금 해제 효과 -->
  <text x="512" y="940" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="80" fill="#1565C0" text-anchor="middle">File Unlocker</text>
</svg>
