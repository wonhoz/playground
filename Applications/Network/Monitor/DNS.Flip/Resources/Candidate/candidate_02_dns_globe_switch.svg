<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001020"/>
      <stop offset="100%" stop-color="#001830"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="land" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- globe -->
  <circle cx="256" cy="256" r="160" fill="url(#globe)"/>
  <!-- grid lines -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="#1565c0" stroke-width="2" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="160" ry="110" fill="none" stroke="#1565c0" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="96" x2="256" y2="416" stroke="#1565c0" stroke-width="2" opacity="0.4"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="#1565c0" stroke-width="2" opacity="0.3"/>
  <!-- land masses -->
  <ellipse cx="220" cy="220" rx="50" ry="30" fill="url(#land)" opacity="0.8"/>
  <ellipse cx="300" cy="270" rx="40" ry="25" fill="url(#land)" opacity="0.7"/>
  <!-- globe shine -->
  <ellipse cx="200" cy="175" rx="45" ry="25" fill="white" opacity="0.15" transform="rotate(-20 200 175)"/>
  <!-- flip switch arrow -->
  <path d="M256 96 Q340 70 380 120 Q400 150 380 180" stroke="#00e5ff" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="380,180 366,168 390,162" fill="#00e5ff"/>
  <!-- DNS provider dots -->
  <circle cx="380" cy="130" r="14" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="132" cy="300" r="12" fill="#42a5f5" filter="url(#glow)"/>
</svg>
