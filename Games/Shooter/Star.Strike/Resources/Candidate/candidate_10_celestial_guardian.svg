<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080820"/>
      <stop offset="100%" stop-color="#020210"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#FFFF88"/>
      <stop offset="60%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEEDD"/>
      <stop offset="100%" stop-color="#AA8866"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Distant sun glow -->
  <circle cx="256" cy="100" r="60" fill="url(#sun)" opacity="0.6" filter="url(#glow)"/>
  <!-- Solar rays -->
  <line x1="256" y1="30" x2="256" y2="10" stroke="#FFAA00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="298" y1="58" x2="312" y2="44" stroke="#FFAA00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="214" y1="58" x2="200" y2="44" stroke="#FFAA00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="316" y1="100" x2="336" y2="100" stroke="#FFAA00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="196" y1="100" x2="176" y2="100" stroke="#FFAA00" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="430" cy="90" r="2" fill="white" opacity="0.6"/>
  <circle cx="460" cy="250" r="1" fill="#FFFFAA" opacity="0.6"/>
  <circle cx="50" cy="320" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="420" r="1" fill="white" opacity="0.6"/>
  <!-- Main hero ship -->
  <g transform="translate(256, 340)">
    <!-- Main hull -->
    <polygon points="0,-100 -36,30 0,-15 36,30" fill="url(#ship)"/>
    <!-- Delta wings -->
    <polygon points="-36,30 -120,70 -70,40 0,-10" fill="#997755"/>
    <polygon points="36,30 120,70 70,40 0,-10" fill="#997755"/>
    <!-- Fin tips gold -->
    <polygon points="-120,70 -130,90 -100,78" fill="#FFCC44"/>
    <polygon points="120,70 130,90 100,78" fill="#FFCC44"/>
    <!-- Center cannon -->
    <rect x="-6" y="-110" width="12" height="26" rx="4" fill="#FFCC44"/>
    <!-- Cockpit -->
    <ellipse cx="0" cy="-58" rx="14" ry="22" fill="#FFCC44" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="0" cy="-58" rx="10" ry="16" fill="#FF8800" opacity="0.7"/>
    <!-- Engine glow -->
    <ellipse cx="-20" cy="34" rx="10" ry="16" fill="#FF6600" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="20" cy="34" rx="10" ry="16" fill="#FF6600" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="34" rx="7" ry="11" fill="#FFAA00" filter="url(#glow)" opacity="0.8"/>
  </g>
  <!-- Golden laser cannon shot -->
  <rect x="249" y="100" width="14" height="140" rx="7" fill="#FFCC44" filter="url(#glow)" opacity="0.8"/>
  <rect x="252" y="100" width="8" height="140" rx="4" fill="white" opacity="0.7"/>
  <!-- Impact on sun -->
  <circle cx="256" cy="100" r="22" fill="white" opacity="0.5" filter="url(#glow)"/>
</svg>
