<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080500"/>
  <!-- Drag move - key being moved -->
  <!-- Ghost key (source) -->
  <rect x="180" y="350" width="220" height="160" rx="24" fill="#4E342E" opacity="0.35"/>
  <rect x="180" y="350" width="220" height="160" rx="24" fill="none" stroke="#4E342E" stroke-width="12" stroke-dasharray="18,10"/>
  <!-- Moving key (destination) -->
  <rect x="580" y="500" width="260" height="180" rx="28" fill="#4E342E"/>
  <rect x="602" y="522" width="216" height="136" rx="18" fill="#080500"/>
  <!-- Key symbol in moving key -->
  <line x1="648" y1="576" x2="768" y2="576" stroke="#A1887F" stroke-width="18" stroke-linecap="round"/>
  <line x1="648" y1="614" x2="740" y2="614" stroke="#A1887F" stroke-width="18" stroke-linecap="round"/>
  <!-- Movement arrow -->
  <path d="M400 430 Q512 400 580 560" fill="none" stroke="#A1887F" stroke-width="20" stroke-linecap="round"/>
  <polygon points="560,535 583,562 606,539" fill="#A1887F"/>
  <!-- Cursor hand -->
  <path d="M310 550 L310 420 Q310 400 330 400 Q350 400 350 420 L350 490 Q360 480 374 486 Q388 492 388 510 L388 560 Q388 600 350 620 L310 620 Z" fill="#A1887F" opacity="0.7"/>
