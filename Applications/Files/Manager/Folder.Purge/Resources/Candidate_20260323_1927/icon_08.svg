<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="#FFFBEB"/>
  <!-- 체크리스트 종이 -->
  <rect x="240" y="230" width="544" height="580" rx="28" fill="white" stroke="#E5E7EB" stroke-width="8"/>
  <!-- 종이 상단 색상 띠 -->
  <rect x="240" y="230" width="544" height="60" rx="28" fill="#FEF3C7"/>
  <rect x="240" y="262" width="544" height="28" fill="#FEF3C7"/>
  <!-- 종이 제목 -->
  <text x="512" y="278" font-family="'Segoe UI', Arial" font-size="36" font-weight="700" fill="#92400E" text-anchor="middle">정리 대상 목록</text>
  <!-- 항목 1: 빈 폴더 ☑ -->
  <rect x="280" y="340" width="44" height="44" rx="8" fill="#10B981"/>
  <polyline points="287,362 300,375 324,351" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="372" font-family="'Segoe UI', Arial" font-size="40" font-weight="600" fill="#1F2937">빈 폴더</text>
  <rect x="348" y="382" width="160" height="6" rx="3" fill="#D1FAE5" opacity="0.8"/>
  <!-- 항목 2: 임시 파일 ☑ -->
  <rect x="280" y="430" width="44" height="44" rx="8" fill="#10B981"/>
  <polyline points="287,452 300,465 324,441" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="462" font-family="'Segoe UI', Arial" font-size="40" font-weight="600" fill="#1F2937">임시 파일</text>
  <rect x="348" y="472" width="180" height="6" rx="3" fill="#D1FAE5" opacity="0.8"/>
  <!-- 항목 3: 큰 파일 ☑ -->
  <rect x="280" y="520" width="44" height="44" rx="8" fill="#10B981"/>
  <polyline points="287,542 300,555 324,531" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="552" font-family="'Segoe UI', Arial" font-size="40" font-weight="600" fill="#1F2937">큰 파일</text>
  <rect x="348" y="562" width="140" height="6" rx="3" fill="#D1FAE5" opacity="0.8"/>
  <!-- 구분선 -->
  <line x1="280" y1="610" x2="744" y2="610" stroke="#E5E7EB" stroke-width="4" stroke-dasharray="12,8"/>
  <!-- 항목 4: 중복 파일 (미완료) -->
  <rect x="280" y="630" width="44" height="44" rx="8" fill="none" stroke="#D1D5DB" stroke-width="5"/>
  <text x="348" y="662" font-family="'Segoe UI', Arial" font-size="38" fill="#9CA3AF">중복 파일</text>
  <!-- 항목 5: 오래된 다운로드 (미완료) -->
  <rect x="280" y="712" width="44" height="44" rx="8" fill="none" stroke="#D1D5DB" stroke-width="5"/>
  <text x="348" y="744" font-family="'Segoe UI', Arial" font-size="38" fill="#9CA3AF">오래된 다운로드</text>
</svg>
