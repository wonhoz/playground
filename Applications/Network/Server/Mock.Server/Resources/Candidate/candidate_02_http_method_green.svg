<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- GET badge -->
  <rect x="60" y="80" width="120" height="50" rx="10" fill="#15803D"/>
  <text x="120" y="113" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="900">GET</text>
  <!-- POST badge -->
  <rect x="196" y="80" width="130" height="50" rx="10" fill="#B45309"/>
  <text x="261" y="113" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="900">POST</text>
  <!-- PUT badge -->
  <rect x="60" y="148" width="120" height="50" rx="10" fill="#1D4ED8"/>
  <text x="120" y="181" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="900">PUT</text>
  <!-- DELETE badge -->
  <rect x="196" y="148" width="130" height="50" rx="10" fill="#991B1B"/>
  <text x="261" y="181" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="900">DELETE</text>
  <!-- PATCH badge -->
  <rect x="342" y="80" width="120" height="50" rx="10" fill="#5B21B6"/>
  <text x="402" y="113" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="900">PATCH</text>
  <!-- Route / endpoint paths -->
  <rect x="60" y="220" width="392" height="36" rx="8" fill="#0a1a0f" stroke="#15803D" stroke-width="1.5"/>
  <text x="80" y="243" font-family="Courier New" font-size="12" fill="#15803D">GET</text>
  <text x="124" y="243" font-family="Courier New" font-size="12" fill="#4ADE80">/api/users</text>
  <text x="370" y="243" font-family="Courier New" font-size="11" fill="#22C55E" text-anchor="end">200 OK</text>
  <rect x="60" y="264" width="392" height="36" rx="8" fill="#0a1a0f" stroke="#B45309" stroke-width="1.5"/>
  <text x="80" y="287" font-family="Courier New" font-size="12" fill="#B45309">POST</text>
  <text x="130" y="287" font-family="Courier New" font-size="12" fill="#FCD34D">/api/users</text>
  <text x="370" y="287" font-family="Courier New" font-size="11" fill="#FCD34D" text-anchor="end">201 Created</text>
  <rect x="60" y="308" width="392" height="36" rx="8" fill="#0a1a0f" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="80" y="331" font-family="Courier New" font-size="12" fill="#1D4ED8">PUT</text>
  <text x="122" y="331" font-family="Courier New" font-size="12" fill="#93C5FD">/api/users/:id</text>
  <text x="370" y="331" font-family="Courier New" font-size="11" fill="#93C5FD" text-anchor="end">200 OK</text>
  <rect x="60" y="352" width="392" height="36" rx="8" fill="#0a1a0f" stroke="#991B1B" stroke-width="1.5"/>
  <text x="80" y="375" font-family="Courier New" font-size="12" fill="#991B1B">DEL</text>
  <text x="124" y="375" font-family="Courier New" font-size="12" fill="#FCA5A5">/api/users/:id</text>
  <text x="370" y="375" font-family="Courier New" font-size="11" fill="#FCA5A5" text-anchor="end">204 No Content</text>
  <!-- Footer status -->
  <rect x="60" y="415" width="392" height="44" rx="10" fill="#0a1a0f" stroke="#22C55E" stroke-width="1.5"/>
  <circle cx="85" cy="437" r="7" fill="#22C55E"/>
  <text x="104" y="441" font-family="Courier New" font-size="13" fill="#22C55E">Mock Server Running  ●  Port 3000</text>
</svg>
