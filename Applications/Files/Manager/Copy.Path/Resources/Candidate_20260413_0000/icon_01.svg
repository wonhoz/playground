<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal · 중앙심볼 · 민트 클립보드 + 경로 텍스트 -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B5F4E3"/>
      <stop offset="1" stop-color="#7DE0C8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg01)"/>
  <!-- 클립보드 본체 -->
  <rect x="220" y="220" width="584" height="680" rx="48" fill="#2C5248" stroke="#1A332C" stroke-width="16"/>
  <rect x="260" y="280" width="504" height="580" rx="28" fill="#F7F9F5"/>
  <!-- 클립 -->
  <rect x="402" y="160" width="220" height="120" rx="36" fill="#2C5248" stroke="#1A332C" stroke-width="16"/>
  <rect x="444" y="140" width="136" height="60" rx="20" fill="#FFD93D" stroke="#E6B800" stroke-width="10"/>
  <!-- 경로 텍스트 (monospace 느낌) -->
  <g font-family="Consolas, monospace" font-weight="700" fill="#2C5248">
    <text x="300" y="430" font-size="88">C:\docs\</text>
    <text x="300" y="540" font-size="88">file.txt</text>
  </g>
  <!-- 강조 언더라인 -->
  <rect x="300" y="560" width="380" height="14" rx="6" fill="#06D6A0"/>
  <rect x="300" y="600" width="280" height="14" rx="6" fill="#FF6B35"/>
  <rect x="300" y="640" width="340" height="14" rx="6" fill="#FFD93D"/>
  <!-- 복사 표시 -->
  <circle cx="720" cy="790" r="70" fill="#FFD93D" stroke="#2C5248" stroke-width="12"/>
  <text x="720" y="820" font-family="Arial Black, sans-serif" font-size="70" font-weight="900" fill="#2C5248" text-anchor="middle">✓</text>
</svg>
