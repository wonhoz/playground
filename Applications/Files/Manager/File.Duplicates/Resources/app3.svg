<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 파일 스택 (여러 겹) -->
  <rect x="220" y="360" width="340" height="420" rx="28" fill="#E91E63" opacity="0.4" transform="rotate(12 390 570)"/>
  <rect x="220" y="360" width="340" height="420" rx="28" fill="#E91E63" opacity="0.6" transform="rotate(6 390 570)"/>
  <rect x="220" y="360" width="340" height="420" rx="28" fill="#E91E63"/>
  <!-- 파일 내용 -->
  <text x="370" y="540" font-family="'Segoe UI', sans-serif" font-size="60" fill="white" text-anchor="middle">📄</text>
  <text x="370" y="630" font-family="'Consolas', monospace" font-size="40" fill="#FCE4EC" text-anchor="middle">photo.jpg</text>
  <text x="370" y="688" font-family="'Consolas', monospace" font-size="40" fill="#F48FB1" text-anchor="middle">×3 copies</text>
  <!-- Layer 3: 삭제 X 배지 -->
  <circle cx="760" cy="400" r="200" fill="#B71C1C"/>
  <line x1="680" y1="320" x2="840" y2="480" stroke="white" stroke-width="56" stroke-linecap="round"/>
  <line x1="840" y1="320" x2="680" y2="480" stroke="white" stroke-width="56" stroke-linecap="round"/>
  <!-- 삭제 텍스트 -->
  <rect x="180" y="860" width="664" height="100" rx="24" fill="#AD1457"/>
  <text x="512" y="928" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="64" fill="white" text-anchor="middle">중복 파일 제거</text>
</svg>
