<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1a00"/>
      <stop offset="100%" stop-color="#050d00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Track surface -->
  <path d="M80,380 Q80,200 256,160 Q432,120 432,300" fill="none" stroke="#2a2a2a" stroke-width="80"/>
  <!-- Track borders -->
  <path d="M80,380 Q80,200 256,160 Q432,120 432,300" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <path d="M80,380 Q80,200 256,160 Q432,120 432,300" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" stroke-dashoffset="0" transform="translate(0,0)"/>
  <!-- Outer track border -->
  <path d="M50,400 Q50,180 256,130 Q462,90 462,300" fill="none" stroke="#ff4400" stroke-width="4"/>
  <!-- Inner track border -->
  <path d="M110,360 Q110,230 256,190 Q402,150 402,300" fill="none" stroke="#ff4400" stroke-width="4"/>
  <!-- Center dashed line -->
  <path d="M80,380 Q80,200 256,160 Q432,120 432,300" fill="none" stroke="#ffff00" stroke-width="2" stroke-dasharray="20,15" opacity="0.7"/>
  <!-- Car (small) on track -->
  <rect x="330" y="175" width="36" height="20" rx="5" fill="#ff4400" transform="rotate(-30, 348, 185)"/>
  <!-- Drift trail -->
  <path d="M310,200 Q290,220 280,245" fill="none" stroke="#888" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <text x="256" y="470" text-anchor="middle" font-family="Arial Black" font-size="32" font-weight="900" fill="#ff4400">NITRO.DRIFT</text>
</svg>
