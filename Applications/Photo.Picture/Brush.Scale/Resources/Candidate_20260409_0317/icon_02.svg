<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <clipPath id="c2"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Sky blue gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#g2)"/>
  <g clip-path="url(#c2)">
    <!-- Layer 2: Small image frame (bottom-left) -->
    <rect x="106" y="620" width="240" height="200" rx="18" fill="#BFDBFE" stroke="#2563EB" stroke-width="10"/>
    <!-- Small landscape in small frame -->
    <polygon points="226,644 302,812 150,812" fill="#60A5FA" opacity="0.7"/>
    <rect x="106" y="620" width="240" height="100" rx="18" fill="#93C5FD" opacity="0.5"/>
    <!-- Layer 2: Large image frame (top-right) -->
    <rect x="560" y="220" width="360" height="300" rx="24" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="14"/>
    <!-- Large landscape in large frame -->
    <polygon points="740,248 870,502 610,502" fill="#3B82F6" opacity="0.7"/>
    <rect x="560" y="220" width="360" height="148" rx="24" fill="#93C5FD" opacity="0.5"/>
    <!-- Layer 3: Bold diagonal arrow -->
    <line x1="360" y1="720" x2="540" y2="500" stroke="#1D4ED8" stroke-width="72" stroke-linecap="round"/>
    <polygon points="506,540 590,424 622,570" fill="#1D4ED8"/>
    <!-- Scale label on arrow -->
    <rect x="374" y="556" width="168" height="76" rx="14" fill="#1D4ED8"/>
    <text x="458" y="610" font-family="Arial,sans-serif" font-size="82" fill="white" font-weight="900" text-anchor="middle">4×</text>
  </g>
</svg>
