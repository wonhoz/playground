<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a00"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1744"/>
      <stop offset="40%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#ff3d00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Thermometer body -->
  <rect x="226" y="90" width="60" height="300" rx="30" fill="#1a2a3a" stroke="#37474f" stroke-width="3"/>
  <!-- Mercury level (95% - very hot) -->
  <rect x="238" y="105" width="36" height="270" rx="18" fill="url(#mercury)" filter="url(#glow)"/>
  <!-- Temperature bulb -->
  <circle cx="256" cy="398" r="36" fill="#ff1744" filter="url(#glow)"/>
  <circle cx="256" cy="398" r="28" fill="#ff5252"/>
  <circle cx="248" cy="390" r="10" fill="#ff8a80" opacity="0.6"/>
  <!-- Tick marks -->
  <g stroke="#546e7a" stroke-width="2.5" opacity="0.8">
    <line x1="286" y1="120" x2="306" y2="120"/>
    <line x1="286" y1="165" x2="302" y2="165"/>
    <line x1="286" y1="210" x2="306" y2="210"/>
    <line x1="286" y1="255" x2="302" y2="255"/>
    <line x1="286" y1="300" x2="306" y2="300"/>
    <line x1="286" y1="345" x2="302" y2="345"/>
    <line x1="286" y1="390" x2="306" y2="390"/>
  </g>
  <!-- Temperature color zones (right) -->
  <rect x="320" y="90" width="14" height="60" rx="4" fill="#1b5e20" opacity="0.7"/>
  <rect x="320" y="154" width="14" height="60" rx="4" fill="#f57f17" opacity="0.7"/>
  <rect x="320" y="218" width="14" height="60" rx="4" fill="#e65100" opacity="0.7"/>
  <rect x="320" y="282" width="14" height="60" rx="4" fill="#b71c1c" opacity="0.7"/>
  <rect x="320" y="346" width="14" height="44" rx="4" fill="#ff1744" opacity="0.8" filter="url(#glow)"/>
  <!-- Heat radiation lines -->
  <path d="M220 250 Q200 250 185 245" stroke="#ff9800" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  <path d="M220 270 Q195 270 178 265" stroke="#ff6d00" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="5,5"/>
  <path d="M220 230 Q200 230 188 228" stroke="#ffa000" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="6,4"/>
</svg>