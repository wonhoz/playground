<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001219"/>
      <stop offset="100%" stop-color="#005F73"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A9396"/>
      <stop offset="50%" stop-color="#94D2BD"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wave track -->
  <path d="M 60 300 Q 120 270 180 300 Q 240 330 300 300 Q 360 270 420 300 L 452 300" fill="none" stroke="url(#wave)" stroke-width="8"/>
  <!-- Morse obstacles on wave -->
  <circle cx="120" cy="276" r="16" fill="#94D2BD"/>
  <rect x="178" y="288" width="40" height="24" rx="6" fill="#94D2BD"/>
  <circle cx="244" cy="320" r="16" fill="#94D2BD"/>
  <rect x="296" y="288" width="40" height="24" rx="6" fill="#94D2BD"/>
  <circle cx="362" cy="276" r="16" fill="#94D2BD"/>
  <!-- Surfer/runner -->
  <circle cx="256" cy="230" r="22" fill="#E9D8A6"/>
  <line x1="256" y1="252" x2="256" y2="290" stroke="#E9D8A6" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="266" x2="232" y2="252" stroke="#E9D8A6" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="266" x2="280" y2="258" stroke="#E9D8A6" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="238" y2="316" stroke="#E9D8A6" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="274" y2="310" stroke="#E9D8A6" stroke-width="5" stroke-linecap="round"/>
  <!-- Surfboard -->
  <ellipse cx="256" cy="302" rx="40" ry="10" fill="#0A9396" opacity="0.8"/>
  <!-- Title -->
  <text x="256" y="130" text-anchor="middle" font-family="monospace" font-size="18" fill="#94D2BD">· − · −   · · ·</text>
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#94D2BD">MORSE.RUN</text>
</svg>