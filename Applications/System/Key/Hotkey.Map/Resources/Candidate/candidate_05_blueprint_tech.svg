  <rect x="164" y="304" width="48" height="48" rx="8" fill="none" stroke="#ffaa44" stroke-width="2"/>
  <text x="183" y="333" font-family="monospace" font-size="18" fill="#ffaa44">E</text>
  <line x1="212" y1="318" x2="268" y2="298" stroke="#aaccff" stroke-width="1.5" stroke-dasharray="4,3"/>
