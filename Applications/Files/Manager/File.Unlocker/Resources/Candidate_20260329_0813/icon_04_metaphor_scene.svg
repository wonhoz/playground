<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: File liberation scene - locked file being freed -->
  <!-- Background file stack (locked) -->
  <rect x="200" y="280" width="240" height="300" rx="20" fill="#9CA3AF" opacity="0.5"/>
  <rect x="230" y="250" width="240" height="300" rx="20" fill="#6B7280" opacity="0.6"/>
  <!-- Main locked file -->
  <rect x="260" y="220" width="240" height="300" rx="20" fill="white" opacity="0.9"/>
  <polygon points="440,220 500,220 500,280" fill="#FB923C" opacity="0.4"/>
  <line x1="290" y1="350" x2="470" y2="350" stroke="#9CA3AF" stroke-width="20" stroke-linecap="round"/>
  <line x1="290" y1="400" x2="470" y2="400" stroke="#9CA3AF" stroke-width="20" stroke-linecap="round"/>
  <line x1="290" y1="450" x2="380" y2="450" stroke="#9CA3AF" stroke-width="20" stroke-linecap="round"/>
  <!-- Lock on file -->
  <rect x="335" y="460" width="90" height="80" rx="14" fill="#EF4444"/>
  <path d="M 352 464 L 352 444 Q 352 420 380 420 Q 408 420 408 444 L 408 464" fill="none" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <circle cx="380" cy="508" r="14" fill="white"/>
  <!-- Arrow pointing to unlocked state -->
  <path d="M 520 380 L 610 380" stroke="#FB923C" stroke-width="24" stroke-linecap="round"/>
  <polygon points="610,380 590,358 590,402" fill="#FB923C"/>
  <!-- Unlocked/freed file -->
  <rect x="630" y="220" width="240" height="300" rx="20" fill="white" opacity="0.95"/>
  <polygon points="810,220 870,220 870,280" fill="#4ADE80" opacity="0.5"/>
  <line x1="660" y1="350" x2="840" y2="350" stroke="#4ADE80" stroke-width="20" stroke-linecap="round"/>
  <line x1="660" y1="400" x2="840" y2="400" stroke="#4ADE80" stroke-width="20" stroke-linecap="round"/>
  <line x1="660" y1="450" x2="760" y2="450" stroke="#4ADE80" stroke-width="20" stroke-linecap="round"/>
  <!-- Open lock -->
  <rect x="705" y="460" width="90" height="80" rx="14" fill="#4ADE80"/>
  <path d="M 722 464 L 722 444 Q 722 420 750 420 Q 778 420 778 444" fill="none" stroke="#4ADE80" stroke-width="20" stroke-linecap="round"/>
  <circle cx="750" cy="508" r="14" fill="white"/>
  <!-- Layer 3: Sparkles of liberation -->
  <circle cx="600" cy="240" r="18" fill="#FDE047"/>
  <circle cx="560" cy="200" r="12" fill="#FDE047" opacity="0.7"/>
  <circle cx="640" cy="200" r="10" fill="#FDE047" opacity="0.5"/>
  <text x="512" y="850" font-family="Arial" font-size="74" fill="white" text-anchor="middle" font-weight="bold">Unlocked!</text>
</svg>
