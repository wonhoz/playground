<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#2E2E2E"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1A08"/>
      <stop offset="100%" stop-color="#050F04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Oscilloscope frame -->
  <rect x="70" y="100" width="372" height="260" rx="14" fill="#1A1A1A" stroke="#424242" stroke-width="3"/>
  <!-- Screen -->
  <rect x="88" y="115" width="280" height="230" rx="8" fill="url(#screen)"/>
  <!-- Grid -->
  <line x1="88" y1="230" x2="368" y2="230" stroke="#1B4D1B" stroke-width="1"/>
  <line x1="228" y1="115" x2="228" y2="345" stroke="#1B4D1B" stroke-width="1"/>
  <line x1="88" y1="172" x2="368" y2="172" stroke="#1B4D1B" stroke-width="0.5" opacity="0.5"/>
  <line x1="88" y1="288" x2="368" y2="288" stroke="#1B4D1B" stroke-width="0.5" opacity="0.5"/>
  <!-- Sine wave -->
  <path d="M95 230 C115 230 115 150 135 150 C155 150 155 310 175 310 C195 310 195 150 215 150 C235 150 235 310 255 310 C275 310 275 150 295 150 C315 150 315 310 335 310 C355 310 355 150 360 160" stroke="#FFB300" stroke-width="3" fill="none"/>
  <!-- Knobs on right -->
  <circle cx="405" cy="170" r="18" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="405" cy="215" r="18" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="405" cy="260" r="18" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="405" cy="305" r="18" fill="#333" stroke="#555" stroke-width="2"/>
  <!-- Knob indicators -->
  <line x1="405" y1="155" x2="405" y2="163" stroke="#FFB300" stroke-width="2"/>
  <line x1="405" y1="200" x2="405" y2="208" stroke="#FF5722" stroke-width="2"/>
  <line x1="405" y1="245" x2="405" y2="253" stroke="#4CAF50" stroke-width="2"/>
  <line x1="405" y1="290" x2="405" y2="298" stroke="#64B5F6" stroke-width="2"/>
  <!-- Bottom stand -->
  <rect x="180" y="360" width="152" height="14" rx="4" fill="#333"/>
  <rect x="160" y="372" width="192" height="10" rx="4" fill="#2A2A2A"/>
</svg>
