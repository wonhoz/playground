<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0900"/>
      <stop offset="100%" stop-color="#0d0500"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#spot)"/>
  <!-- Spotlight beam from top -->
  <path d="M200 0 L120 300 L392 300 L312 0 Z" fill="#fb923c" opacity="0.05"/>
  <path d="M220 0 L150 290 L362 290 L292 0 Z" fill="#fb923c" opacity="0.05"/>
  <!-- Scattered dim icons -->
  <text x="56" y="116" font-size="32" opacity="0.15">🔮</text>
  <text x="380" y="104" font-size="32" opacity="0.12">🎯</text>
  <text x="420" y="220" font-size="32" opacity="0.12">🌐</text>
  <text x="44" y="280" font-size="32" opacity="0.1">📁</text>
  <text x="430" y="340" font-size="32" opacity="0.1">⚙️</text>
  <text x="60" y="380" font-size="32" opacity="0.1">💡</text>
  <text x="380" y="400" font-size="32" opacity="0.1">🔑</text>
  <text x="120" y="420" font-size="32" opacity="0.08">🎪</text>
  <!-- Featured icon in spotlight center -->
  <circle cx="256" cy="220" r="90" fill="#2d1500" stroke="#fb923c" stroke-width="3"/>
  <text x="196" y="260" font-size="84">🎨</text>
  <!-- Spotlight rays -->
  <line x1="256" y1="60" x2="256" y2="130" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="80" x2="200" y2="145" stroke="#fb923c" stroke-width="1.5" opacity="0.35"/>
  <line x1="332" y1="80" x2="312" y2="145" stroke="#fb923c" stroke-width="1.5" opacity="0.35"/>
  <line x1="130" y1="130" x2="180" y2="175" stroke="#fb923c" stroke-width="1" opacity="0.2"/>
  <line x1="382" y1="130" x2="332" y2="175" stroke="#fb923c" stroke-width="1" opacity="0.2"/>
  <!-- Info cards below -->
  <rect x="96" y="336" width="320" height="52" rx="12" fill="#2d1500" stroke="#fb923c" stroke-width="2"/>
  <text x="112" y="357" font-family="monospace" font-size="14" fill="#fb923c" font-weight="bold">🎨 palette</text>
  <text x="112" y="378" font-family="monospace" font-size="12" fill="#92400e">Tags: art · color · design · paint</text>
  <!-- Category chips -->
  <rect x="96" y="408" width="68" height="28" rx="14" fill="#fb923c" opacity="0.8"/>
  <text x="108" y="427" font-family="monospace" font-size="12" fill="white">design</text>
  <rect x="172" y="408" width="52" height="28" rx="14" fill="#2d1500" stroke="#fb923c" stroke-width="1.5"/>
  <text x="184" y="427" font-family="monospace" font-size="12" fill="#fb923c">art</text>
  <rect x="232" y="408" width="68" height="28" rx="14" fill="#2d1500" stroke="#ea580c" stroke-width="1.5"/>
  <text x="244" y="427" font-family="monospace" font-size="12" fill="#ea580c">emoji</text>
  <rect x="308" y="408" width="52" height="28" rx="14" fill="#2d1500" stroke="#c2410c" stroke-width="1"/>
  <text x="314" y="427" font-family="monospace" font-size="12" fill="#c2410c">UI</text>
  <!-- Magnifier top right small -->
  <circle cx="420" cy="88" r="28" fill="none" stroke="#fb923c" stroke-width="3" opacity="0.7"/>
  <line x1="440" y1="108" x2="454" y2="122" stroke="#fb923c" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
