<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Skill.Cast — 아이콘 후보</title>
  <style>
    body { background:#1a1a1a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:32px; }
    h1 { font-size:22px; margin-bottom:8px; color:#80cbc4; letter-spacing:2px; }
    p  { color:#888; font-size:13px; margin-bottom:28px; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
    .card { background:#242424; border-radius:12px; padding:20px; text-align:center; border:1px solid #333; }
    .card img { width:120px; height:120px; border-radius:12px; }
    .card span { display:block; margin-top:10px; font-size:11px; color:#888; word-break:break-all; }
  </style>
</head>
<body>
  <h1>Skill.Cast</h1>
  <p>기술 스택 시각화·관리 도구 — 아이콘 후보 10종</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_blue_skill_tree.svg"/><span>01 · blue skill tree</span></div>
    <div class="card"><img src="candidate_02_gold_star_chart.svg"/><span>02 · gold star chart</span></div>
    <div class="card"><img src="candidate_03_purple_badge_stack.svg"/><span>03 · purple badge stack</span></div>
    <div class="card"><img src="candidate_04_teal_hexgrid_tech.svg"/><span>04 · teal hexgrid tech</span></div>
    <div class="card"><img src="candidate_05_orange_progress_bars.svg"/><span>05 · orange progress bars</span></div>
    <div class="card"><img src="candidate_06_green_terminal_stack.svg"/><span>06 · green terminal stack</span></div>
    <div class="card"><img src="candidate_07_red_code_magnify.svg"/><span>07 · red code magnify</span></div>
    <div class="card"><img src="candidate_08_indigo_brain_network.svg"/><span>08 · indigo brain network</span></div>
    <div class="card"><img src="candidate_09_cyan_donut_chart.svg"/><span>09 · cyan donut chart</span></div>
    <div class="card"><img src="candidate_10_lime_rocket_launch.svg"/><span>10 · lime rocket launch</span></div>
  </div>
</body>
</html>
