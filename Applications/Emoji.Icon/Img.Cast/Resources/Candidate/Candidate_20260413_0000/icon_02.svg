<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal · 레이어드 · 포맷 카드 스택 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E1F5FE"/>
  <!-- 뒷 카드 WebP -->
  <g transform="rotate(-10 512 500)">
    <rect x="180" y="220" width="640" height="200" rx="32" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
    <text x="500" y="355" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">WEBP</text>
  </g>
  <!-- 중간 카드 PNG -->
  <g transform="rotate(-2 512 560)">
    <rect x="160" y="420" width="680" height="200" rx="32" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
    <text x="500" y="555" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">PNG</text>
  </g>
  <!-- 앞 카드 ICO -->
  <g transform="rotate(6 512 700)">
    <rect x="140" y="620" width="720" height="200" rx="32" fill="#06D6A0" stroke="#056B4F" stroke-width="14"/>
    <text x="500" y="755" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">ICO</text>
  </g>
  <!-- 상단 라벨 -->
  <rect x="262" y="110" width="500" height="130" rx="40" fill="#FFD93D" stroke="#B88A00" stroke-width="14"/>
  <text x="512" y="206" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#5C4000" text-anchor="middle">IMG CAST</text>
</svg>
