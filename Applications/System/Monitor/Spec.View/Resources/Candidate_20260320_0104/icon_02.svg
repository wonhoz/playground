<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 모니터+사양: monitor displaying hardware spec -->
  <!-- Monitor frame -->
  <rect x="200" y="260" width="624" height="420" rx="24" fill="#2E7D32"/>
  <rect x="220" y="280" width="584" height="380" rx="16" fill="#050A05"/>
  <!-- Screen content - hardware spec -->
  <rect x="240" y="300" width="544" height="30" rx="6" fill="#2E7D32"/>
  <line x1="260" y1="358" x2="500" y2="358" stroke="#81C784" stroke-width="8" stroke-linecap="round"/>
  <line x1="260" y1="388" x2="460" y2="388" stroke="#2E7D32" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="414" x2="480" y2="414" stroke="#2E7D32" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="440" x2="440" y2="440" stroke="#2E7D32" stroke-width="6" stroke-linecap="round"/>
  <!-- Horizontal separator -->
  <line x1="260" y1="464" x2="744" y2="464" stroke="#2E7D32" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="490" x2="470" y2="490" stroke="#81C784" stroke-width="7" stroke-linecap="round"/>
  <line x1="260" y1="518" x2="450" y2="518" stroke="#2E7D32" stroke-width="5" stroke-linecap="round"/>
  <line x1="260" y1="542" x2="460" y2="542" stroke="#2E7D32" stroke-width="5" stroke-linecap="round"/>
  <!-- GPU mini icon on right -->
  <rect x="560" y="380" width="160" height="100" rx="10" fill="#2E7D32"/>
  <rect x="574" y="394" width="132" height="72" rx="6" fill="#050A05"/>
  <line x1="598" y1="394" x2="598" y2="466" stroke="#81C784" stroke-width="3"/>
  <line x1="628" y1="394" x2="628" y2="466" stroke="#81C784" stroke-width="3"/>
  <line x1="574" y1="420" x2="706" y2="420" stroke="#81C784" stroke-width="3"/>
  <line x1="574" y1="444" x2="706" y2="444" stroke="#81C784" stroke-width="3"/>
  <!-- Monitor stand -->
  <rect x="492" y="680" width="40" height="50" rx="4" fill="#2E7D32"/>
  <rect x="430" y="730" width="164" height="20" rx="10" fill="#2E7D32"/>
</svg>