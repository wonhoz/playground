<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 심박수+CPU: EKG heartbeat line with CPU chip -->
  <!-- EKG grid background -->
  <line x1="180" y1="400" x2="844" y2="400" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="180" y1="512" x2="844" y2="512" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="180" y1="624" x2="844" y2="624" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="340" x2="300" y2="700" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="340" x2="420" y2="700" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="604" y1="340" x2="604" y2="700" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <line x1="724" y1="340" x2="724" y2="700" stroke="#33691E" stroke-width="2" opacity="0.3"/>
  <!-- EKG heartbeat line -->
  <polyline points="180,512 300,512 340,512 360,440 390,600 420,380 450,640 480,512 512,512 604,512 640,512 660,460 680,560 700,512 844,512" fill="none" stroke="#AED581" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>
