<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 종이 배경 -->
  <rect x="80" y="80" width="352" height="352" rx="16" fill="#E3F2FD"/>
  <!-- 잉크 스트로크들 -->
  <path d="M 120 200 Q 180 150 240 200 Q 300 250 360 200" fill="none" stroke="#1565C0" stroke-width="8" stroke-linecap="round"/>
  <path d="M 120 260 Q 200 220 280 260 Q 340 290 380 250" fill="none" stroke="#42A5F5" stroke-width="6" stroke-linecap="round"/>
  <path d="M 140 320 Q 220 290 300 320 Q 350 340 400 310" fill="none" stroke="#0D47A1" stroke-width="5" stroke-linecap="round"/>
  <!-- 펜/스타일러스 -->
  <g transform="rotate(-45 350 100)">
    <rect x="330" y="60" width="20" height="120" rx="6" fill="url(#pen)"/>
    <polygon points="330,180 350,180 340,210" fill="#1976D2"/>
    <rect x="332" y="58" width="16" height="20" rx="4" fill="#E3F2FD"/>
  </g>
  <!-- 잉크 방울 -->
  <ellipse cx="145" cy="390" rx="12" ry="16" fill="#1565C0"/>
  <circle cx="145" cy="375" r="8" fill="#42A5F5"/>
  <!-- 레이블 -->
  <text x="256" y="470" font-size="20" text-anchor="middle" fill="#BBDEFB" font-family="Segoe UI">Ink.Cast</text>
</svg>