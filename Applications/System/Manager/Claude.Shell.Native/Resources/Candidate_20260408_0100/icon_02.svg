<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02csn" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#581C87"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <radialGradient id="glow02csn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep purple -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02csn)"/>

  <!-- Glow at center -->
  <circle cx="512" cy="480" r="280" fill="url(#glow02csn)"/>

  <!-- Large folder (right-click target) -->
  <!-- Folder body -->
  <path d="M150,400 L150,720 Q150,750 180,750 L700,750 Q730,750 730,720 L730,440 Q730,410 700,410 L450,410 L410,400 Z" fill="#FBBF24"/>
  <path d="M180,430 L180,735 Q180,745 195,745 L715,745 Q720,745 720,720 L720,445 Q720,425 700,425 L445,425 L415,412 Q408,404 395,404 L195,404 Q180,404 180,430 Z" fill="#FCD34D"/>
  <!-- Folder tab -->
  <path d="M200,400 L200,414 L408,414 L408,400 Q408,386 395,386 L213,386 Q200,386 200,400 Z" fill="#F59E0B"/>

  <!-- Right-click glow at folder -->
  <circle cx="580" cy="580" r="60" fill="#FB923C" opacity="0.3"/>

  <!-- Mouse cursor clicking on folder -->
  <polygon points="580,500 608,558 594,548 586,572 576,548 562,558" fill="white"/>
  <polygon points="580,500 608,558 594,548 586,572 576,548 562,558" fill="none" stroke="#FB923C" stroke-width="3"/>

  <!-- Context menu appearing (semi-transparent, partial) -->
  <rect x="620" y="550" width="280" height="220" rx="10" fill="#1E293B" opacity="0.95"/>
  <rect x="620" y="550" width="280" height="220" rx="10" fill="none" stroke="#FB923C" stroke-width="3"/>

  <!-- Menu items -->
  <text x="648" y="588" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Open</text>
  <text x="648" y="618" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Open in Terminal</text>
  <line x1="636" y1="630" x2="892" y2="630" stroke="#4A5568" stroke-width="1"/>
  <!-- Highlighted Claude item -->
  <rect x="628" y="638" width="264" height="38" rx="6" fill="#FB923C"/>
  <circle cx="656" cy="657" r="13" fill="white"/>
  <text x="656" y="662" font-family="Arial Black,Arial" font-size="12" fill="#F97316" text-anchor="middle" font-weight="900">C</text>
  <text x="680" y="662" font-family="Arial,sans-serif" font-size="16" fill="white">Open with Claude</text>
  <text x="648" y="712" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Copy</text>
  <text x="648" y="744" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Delete</text>

  <!-- Sparkle from menu appearing -->
  <text x="600" y="546" font-family="Arial,sans-serif" font-size="20" fill="#FB923C">✦</text>
  <text x="908" y="570" font-family="Arial,sans-serif" font-size="16" fill="#FCD34D">✦</text>
  <text x="910" y="780" font-family="Arial,sans-serif" font-size="14" fill="#C4B5FD">★</text>
</svg>
