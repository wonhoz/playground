<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7C59F"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFEF0"/>
      <stop offset="100%" stop-color="#FFF3D0"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Open book left page -->
  <path d="M80 150 Q80 130 100 130 L248 130 L248 390 Q180 380 100 390 Q80 385 80 370 Z" fill="url(#page)" stroke="#d4a96a" stroke-width="3"/>
  <!-- Open book right page -->
  <path d="M264 130 L412 130 Q432 130 432 150 L432 370 Q432 385 412 390 Q332 380 264 390 Z" fill="url(#page)" stroke="#d4a96a" stroke-width="3"/>
  <!-- Spine -->
  <rect x="248" y="130" width="16" height="260" fill="url(#spine)"/>
  <!-- Lines on left page -->
  <line x1="110" y1="170" x2="238" y2="170" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="195" x2="238" y2="195" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="220" x2="238" y2="220" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="245" x2="238" y2="245" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="270" x2="200" y2="270" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <!-- Image on right page -->
  <rect x="280" y="160" width="135" height="100" rx="6" fill="#FF6B35" opacity="0.3"/>
  <circle cx="330" cy="200" r="25" fill="#FF6B35" opacity="0.5"/>
  <polygon points="390,260 360,220 420,220" fill="#FF6B35" opacity="0.5"/>
  <!-- Lines on right page -->
  <line x1="280" y1="280" x2="420" y2="280" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="305" x2="420" y2="305" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="330" x2="380" y2="330" stroke="#d4a96a" stroke-width="2" opacity="0.6"/>
  <!-- Page curl bottom right -->
  <path d="M412 390 Q432 390 432 370 L432 390 Z" fill="#d4a96a" opacity="0.4"/>
</svg>
