<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: ICO multi-size frames (4 nested squares) -->
  <!-- 256px frame (largest) -->
  <rect x="200" y="200" width="624" height="624" rx="24" fill="none" stroke="#1976D2" stroke-width="12"/>
  <!-- 128px frame -->
  <rect x="312" y="312" width="400" height="400" rx="18" fill="none" stroke="#1E88E5" stroke-width="10"/>
  <!-- 64px frame -->
  <rect x="392" y="392" width="240" height="240" rx="14" fill="none" stroke="#42A5F5" stroke-width="9"/>
  <!-- 32px frame -->
  <rect x="448" y="448" width="128" height="128" rx="10" fill="#1565C0"/>
  <!-- Layer 3: Size labels on corners and center -->
  <text x="214" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="800" fill="#1565C0">256</text>
  <text x="320" y="365" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="700" fill="#1976D2">128</text>
  <text x="395" y="452" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="700" fill="#1E88E5">64</text>
  <text x="454" y="518" font-family="'Segoe UI',Arial,sans-serif" font-size="46" font-weight="800" fill="white">32</text>
  <!-- ICO label at bottom -->
  <text x="390" y="840" font-family="'Segoe UI',Arial,sans-serif" font-size="90" font-weight="900" fill="#1565C0">ICO</text>
</svg>
