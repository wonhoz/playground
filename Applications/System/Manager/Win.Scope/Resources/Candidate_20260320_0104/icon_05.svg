<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Radar background circle -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#0D47A1" stroke-width="28"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#0D47A1" stroke-width="18" opacity="0.7"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#0D47A1" stroke-width="12" opacity="0.5"/>
  <!-- Radar crosshairs -->
  <line x1="152" y1="512" x2="872" y2="512" stroke="#0D47A1" stroke-width="14" opacity="0.4"/>
  <line x1="512" y1="152" x2="512" y2="872" stroke="#0D47A1" stroke-width="14" opacity="0.4"/>
  <!-- Radar sweep arc (highlight sector) -->
  <path d="M512 512 L512 152 A360 360 0 0 1 818 642 Z" fill="#42A5F5" opacity="0.12"/>
  <path d="M512 512 L512 152 A360 360 0 0 1 818 642" fill="none" stroke="#42A5F5" stroke-width="6" opacity="0.6"/>
  <!-- Radar sweep line -->
  <line x1="512" y1="512" x2="818" y2="642" stroke="#42A5F5" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
  <!-- Window targets on radar -->
  <!-- Window 1 (detected) -->
  <rect x="580" y="340" width="80" height="60" rx="8" fill="none" stroke="#42A5F5" stroke-width="14"/>
  <rect x="580" y="340" width="80" height="18" rx="6" fill="#42A5F5" opacity="0.5"/>
  <circle cx="620" cy="370" r="14" fill="#42A5F5" opacity="0.7"/>
  <!-- Window 2 (faint) -->
  <rect x="310" y="560" width="70" height="52" rx="8" fill="none" stroke="#0D47A1" stroke-width="10" opacity="0.6"/>
  <!-- Radar center dot -->
  <circle cx="512" cy="512" r="18" fill="#42A5F5"/>
</svg>
