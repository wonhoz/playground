<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="abg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AED581"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 라임 그린 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#abg5)"/>
  <!-- Layer 2: 클립보드 (중앙) -->
  <rect x="220" y="280" width="460" height="560" rx="40" fill="white" opacity="0.95"/>
  <!-- 클립 -->
  <rect x="340" y="220" width="220" height="104" rx="36" fill="white" opacity="0.95"/>
  <rect x="372" y="248" width="156" height="64" rx="22" fill="#558B2F"/>
  <!-- 텍스트 라인 -->
  <rect x="272" y="408" width="356" height="30" rx="15" fill="#DCEDC8"/>
  <rect x="272" y="460" width="290" height="30" rx="15" fill="#DCEDC8"/>
  <rect x="272" y="512" width="330" height="30" rx="15" fill="#DCEDC8"/>
  <rect x="272" y="564" width="250" height="30" rx="15" fill="#E8F5E9"/>
  <!-- Layer 3: Claude 오렌지 다이아몬드 (우하 오버레이) -->
  <!-- 외부 다이아몬드 -->
  <rect x="556" y="556" width="280" height="280" rx="28" fill="url(#diamond)"
        transform="rotate(45 696 696)"/>
  <!-- 내부 흰 다이아몬드 -->
  <rect x="616" y="616" width="160" height="160" rx="16" fill="white" opacity="0.9"
        transform="rotate(45 696 696)"/>
  <!-- 중앙 점 -->
  <circle cx="696" cy="696" r="40" fill="url(#diamond)"/>
  <!-- 반짝임 -->
  <circle cx="792" cy="600" r="16" fill="#FFD740" opacity="0.9"/>
  <circle cx="600" cy="792" r="12" fill="#FFD740" opacity="0.7"/>
  <circle cx="820" cy="740" r="10" fill="white" opacity="0.8"/>
</svg>
