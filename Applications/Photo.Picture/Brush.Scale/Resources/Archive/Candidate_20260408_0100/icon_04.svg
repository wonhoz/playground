<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg04bs" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: mint/light green -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04bs)"/>

  <!-- Magnifying glass outer ring -->
  <circle cx="480" cy="470" r="270" fill="#E0F7FA" stroke="#0891B2" stroke-width="18"/>
  <circle cx="480" cy="470" r="252" fill="white" opacity="0.5"/>

  <!-- Inside the lens: sharp, colorful image content -->
  <clipPath id="lensClip">
    <circle cx="480" cy="470" r="246"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <defs>
      <radialGradient id="lensImg" cx="45%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#FDE68A"/>
        <stop offset="35%" stop-color="#FCA5A5"/>
        <stop offset="70%" stop-color="#A78BFA"/>
        <stop offset="100%" stop-color="#2563EB"/>
      </radialGradient>
    </defs>
    <rect x="234" y="224" width="492" height="492" fill="url(#lensImg)"/>
    <!-- Fine detail lines inside lens -->
    <line x1="280" y1="350" x2="680" y2="350" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <line x1="300" y1="390" x2="660" y2="390" stroke="white" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="310" y1="430" x2="650" y2="430" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    <line x1="280" y1="500" x2="680" y2="500" stroke="white" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="300" y1="540" x2="660" y2="540" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Lens glow -->
  <circle cx="480" cy="470" r="246" fill="url(#lensGlow)"/>
  <!-- Lens glass highlight -->
  <ellipse cx="400" cy="360" rx="80" ry="50" fill="white" opacity="0.2" transform="rotate(-20 400 360)"/>

  <!-- Magnifying handle -->
  <line x1="680" y1="668" x2="820" y2="820" stroke="#0891B2" stroke-width="36" stroke-linecap="round"/>
  <line x1="680" y1="668" x2="820" y2="820" stroke="#67E8F9" stroke-width="18" stroke-linecap="round" opacity="0.5"/>

  <!-- "AI" badge on lens -->
  <circle cx="480" cy="470" r="270" fill="none" stroke="#22C55E" stroke-width="8" stroke-dasharray="30,20"/>
  <rect x="380" y="690" width="200" height="60" rx="16" fill="#059669"/>
  <text x="480" y="730" font-family="Arial Black,Arial" font-size="36" fill="white" font-weight="900" text-anchor="middle">AI ×4</text>

  <!-- Stars around lens -->
  <text x="160" y="280" font-family="Arial,sans-serif" font-size="32" fill="#FCD34D">✦</text>
  <text x="720" y="240" font-family="Arial,sans-serif" font-size="24" fill="#FCD34D">✦</text>
  <text x="780" y="660" font-family="Arial,sans-serif" font-size="20" fill="#A5F3FC">✦</text>
</svg>
