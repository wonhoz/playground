<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="70" width="392" height="380" rx="12" fill="#0D0D0D" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="60" y="70" width="392" height="32" rx="12" fill="#1A1A1A"/>
  <rect x="60" y="86" width="392" height="16" fill="#1A1A1A"/>
  <circle cx="88" cy="86" r="7" fill="#FF5252" opacity="0.8"/>
  <circle cx="110" cy="86" r="7" fill="#FFD740" opacity="0.8"/>
  <circle cx="132" cy="86" r="7" fill="#69F0AE" opacity="0.8"/>
  <!-- Terminal content -->
  <!-- Prompt line 1 -->
  <rect x="84" y="120" width="12" height="12" rx="2" fill="#00FF88"/>
  <rect x="102" y="122" width="160" height="9" rx="3" fill="url(#green)" opacity="0.8"/>
  <!-- Output line 1 -->
  <rect x="84" y="144" width="8" height="9" rx="2" fill="#888"/>
  <rect x="100" y="144" width="240" height="9" rx="3" fill="url(#dim)" opacity="0.6"/>
  <!-- Output line 2 -->
  <rect x="84" y="160" width="8" height="9" rx="2" fill="#888"/>
  <rect x="100" y="160" width="200" height="9" rx="3" fill="url(#dim)" opacity="0.5"/>
  <!-- Prompt line 2 -->
  <rect x="84" y="184" width="12" height="12" rx="2" fill="#00FF88"/>
  <rect x="102" y="186" width="190" height="9" rx="3" fill="url(#green)" opacity="0.8"/>
  <!-- JSON output block -->
  <rect x="84" y="208" width="14" height="9" rx="3" fill="#CE93D8"/>
  <rect x="108" y="208" width="80" height="9" rx="3" fill="#80DEEA" opacity="0.7"/>
  <rect x="198" y="208" width="8" height="9" rx="3" fill="#888"/>
  <rect x="216" y="208" width="110" height="9" rx="3" fill="#FFB74D" opacity="0.8"/>
  <rect x="100" y="228" width="14" height="9" rx="3" fill="#CE93D8"/>
  <rect x="124" y="228" width="60" height="9" rx="3" fill="#80DEEA" opacity="0.7"/>
  <rect x="194" y="228" width="8" height="9" rx="3" fill="#888"/>
  <rect x="212" y="228" width="90" height="9" rx="3" fill="#A5D6A7" opacity="0.8"/>
  <rect x="100" y="248" width="14" height="9" rx="3" fill="#CE93D8"/>
  <rect x="124" y="248" width="74" height="9" rx="3" fill="#80DEEA" opacity="0.7"/>
  <rect x="208" y="248" width="8" height="9" rx="3" fill="#888"/>
  <rect x="226" y="248" width="70" height="9" rx="3" fill="#FFB74D" opacity="0.8"/>
  <rect x="84" y="268" width="14" height="9" rx="3" fill="#CE93D8"/>
  <!-- Prompt line 3 -->
  <rect x="84" y="296" width="12" height="12" rx="2" fill="#00FF88"/>
  <rect x="102" y="298" width="130" height="9" rx="3" fill="url(#green)" opacity="0.8"/>
  <!-- Blinking cursor -->
  <rect x="240" y="298" width="10" height="12" rx="1" fill="#00FF88" opacity="0.9"/>
  <!-- Row separators -->
  <line x1="84" y1="136" x2="428" y2="136" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="84" y1="176" x2="428" y2="176" stroke="#1A1A1A" stroke-width="1"/>
</svg>
