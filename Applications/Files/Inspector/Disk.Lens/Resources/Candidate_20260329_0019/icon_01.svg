  <!-- AppData: 15.2 GB -->
  <text x="90" y="474" font-family="Arial, sans-serif" font-size="34" fill="#37474F"
        dominant-baseline="middle">📁 AppData</text>
  <rect x="380" y="451" width="530" height="46" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="451" width="130" height="46" rx="6" fill="#43A047"/>
  <text x="445" y="474" font-family="Arial, sans-serif" font-size="30" fill="white"
