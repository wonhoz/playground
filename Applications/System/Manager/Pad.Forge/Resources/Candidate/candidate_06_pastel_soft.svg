  <circle cx="224" cy="93" r="7" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="262" cy="93" r="7" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="300" cy="93" r="7" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="338" cy="93" r="7" fill="#FFFFFF" opacity="0.8"/>
