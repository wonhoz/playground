<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Broom -->
  <!-- Handle -->
  <rect x="480" y="160" width="50" height="540" rx="20" fill="#A16207" transform="rotate(20,505,430)"/>
  <!-- Bristles -->
  <ellipse cx="660" cy="720" rx="200" ry="80" fill="#B45309" transform="rotate(20,660,720)"/>
  <!-- Bristle lines -->
  <line x1="480" y1="680" x2="460" y2="780" stroke="#92400E" stroke-width="14" stroke-linecap="round" transform="rotate(20,470,730)"/>
  <line x1="520" y1="680" x2="500" y2="780" stroke="#92400E" stroke-width="14" stroke-linecap="round" transform="rotate(20,510,730)"/>
  <line x1="560" y1="680" x2="540" y2="780" stroke="#92400E" stroke-width="14" stroke-linecap="round" transform="rotate(20,550,730)"/>
  <line x1="600" y1="680" x2="580" y2="780" stroke="#92400E" stroke-width="14" stroke-linecap="round" transform="rotate(20,590,730)"/>
  <line x1="640" y1="680" x2="620" y2="780" stroke="#92400E" stroke-width="14" stroke-linecap="round" transform="rotate(20,630,730)"/>
  <!-- Sparkles / cleaned effect -->
  <text x="260" y="380" font-family="Arial,sans-serif" font-size="80" fill="#0E7490">✨</text>
  <text x="170" y="560" font-family="Arial,sans-serif" font-size="60" fill="#06B6D4">✦</text>
  <text x="740" y="480" font-family="Arial,sans-serif" font-size="70" fill="#0E7490">✨</text>
  <!-- Dust/junk being swept -->
  <circle cx="580" cy="820" r="20" fill="#94A3B8"/>
  <circle cx="620" cy="840" r="14" fill="#94A3B8"/>
  <circle cx="655" cy="815" r="18" fill="#94A3B8"/>
  <circle cx="690" cy="838" r="12" fill="#94A3B8"/>
  <!-- Label -->
  <text x="512" y="950" font-family="Arial,sans-serif" font-size="58" fill="#0E7490" font-weight="bold" text-anchor="middle">Sys Clean</text>
</svg>
