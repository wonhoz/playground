<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | JSON {} 응답 파서 | 기하학 | #4C1D95 퍼플 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0A3A"/>
  <!-- Layer 2: Large JSON braces + content -->
  <!-- Opening brace -->
  <text x="180" y="620" font-family="Consolas,monospace" font-size="320" fill="#7C3AED" opacity="0.3" font-weight="bold">{</text>
  <!-- Closing brace -->
  <text x="660" y="620" font-family="Consolas,monospace" font-size="320" fill="#7C3AED" opacity="0.3" font-weight="bold">}</text>
  <!-- JSON content -->
  <text x="240" y="330" font-family="Consolas,monospace" font-size="26" fill="#C084FC">{</text>
  <text x="276" y="380" font-family="Consolas,monospace" font-size="22" fill="#F9A8D4">"status":</text>
  <text x="520" y="380" font-family="Consolas,monospace" font-size="22" fill="#4ADE80"> "ok",</text>
  <text x="276" y="426" font-family="Consolas,monospace" font-size="22" fill="#F9A8D4">"code":</text>
  <text x="500" y="426" font-family="Consolas,monospace" font-size="22" fill="#FDE68A"> 200,</text>
  <text x="276" y="472" font-family="Consolas,monospace" font-size="22" fill="#F9A8D4">"data":</text>
  <text x="498" y="472" font-family="Consolas,monospace" font-size="22" fill="#C084FC"> {</text>
  <text x="320" y="518" font-family="Consolas,monospace" font-size="22" fill="#93C5FD">"id":</text>
  <text x="440" y="518" font-family="Consolas,monospace" font-size="22" fill="#FDE68A"> 42,</text>
  <text x="320" y="562" font-family="Consolas,monospace" font-size="22" fill="#93C5FD">"name":</text>
  <text x="494" y="562" font-family="Consolas,monospace" font-size="22" fill="#86EFAC"> "Alice"</text>
  <text x="276" y="608" font-family="Consolas,monospace" font-size="22" fill="#C084FC">},</text>
  <text x="276" y="652" font-family="Consolas,monospace" font-size="22" fill="#F9A8D4">"time":</text>
  <text x="494" y="652" font-family="Consolas,monospace" font-size="22" fill="#FDE68A"> 42</text>
  <text x="240" y="700" font-family="Consolas,monospace" font-size="26" fill="#C084FC">}</text>
  <!-- Layer 3: Status badge overlay -->
  <rect x="560" y="720" width="200" height="60" rx="16" fill="#14532D"/>
  <text x="660" y="758" font-family="Consolas,monospace" font-size="26" fill="#4ADE80" text-anchor="middle" font-weight="bold">200 OK</text>
</svg>
