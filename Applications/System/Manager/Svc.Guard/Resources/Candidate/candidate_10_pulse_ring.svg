<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#88BBFF"/>
      <stop offset="70%" stop-color="#2255CC"/>
      <stop offset="100%" stop-color="#1133AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#00AAFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pulse rings (outermost to innermost) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1133AA" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#2244CC" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="136" fill="none" stroke="#3355DD" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="104" fill="none" stroke="#4466EE" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="72" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="48" fill="url(#core)" filter="url(#glow)"/>
  <!-- Shield icon in center -->
  <path d="M 256,228 L 280,238 L 280,262 Q 280,278 256,286 Q 232,278 232,262 L 232,238 Z" fill="#0A1A30" stroke="#88AAFF" stroke-width="2" filter="url(#glow)"/>
  <polyline points="244,259 253,268 269,248" stroke="#AACCFF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Service dots on ring perimeter -->
  <circle cx="256" cy="152" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="354" cy="178" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="388" cy="270" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="346" cy="358" r="8" fill="#FF4444" filter="url(#glow)"/>
  <circle cx="256" cy="390" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="166" cy="358" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="124" cy="270" r="8" fill="#44FF88" filter="url(#glow)"/>
  <circle cx="158" cy="178" r="8" fill="#44FF88" filter="url(#glow)"/>
  <!-- Labels for dots -->
  <text x="256" y="144" font-family="monospace" font-size="9" fill="#44FF88" text-anchor="middle">svc1</text>
  <text x="370" y="175" font-family="monospace" font-size="9" fill="#44FF88" text-anchor="start">svc2</text>
  <text x="346" y="373" font-family="monospace" font-size="9" fill="#FF4444" text-anchor="middle">svc4!</text>
  <!-- Scan line -->
  <line x1="256" y1="256" x2="388" y2="270" stroke="#4488FF" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
</svg>
