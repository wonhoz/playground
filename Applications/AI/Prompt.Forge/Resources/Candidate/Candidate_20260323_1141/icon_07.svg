<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D1B3E"/>
  <!-- Stars background -->
  <circle cx="200" cy="200" r="4" fill="white" opacity="0.4"/>
  <circle cx="820" cy="180" r="3" fill="white" opacity="0.3"/>
  <circle cx="150" cy="700" r="4" fill="white" opacity="0.3"/>
  <circle cx="880" cy="750" r="3" fill="white" opacity="0.4"/>
  <!-- Layer 2: Neural nodes -->
  <circle cx="300" cy="300" r="60" fill="#00BCD4"/>
  <circle cx="724" cy="300" r="60" fill="#00BCD4"/>
  <circle cx="512" cy="650" r="60" fill="#00BCD4"/>
  <!-- Connection lines -->
  <line x1="300" y1="300" x2="724" y2="300" stroke="#00BCD4" stroke-width="12" opacity="0.4"/>
  <line x1="300" y1="300" x2="512" y2="650" stroke="#00BCD4" stroke-width="12" opacity="0.4"/>
  <line x1="724" y1="300" x2="512" y2="650" stroke="#00BCD4" stroke-width="12" opacity="0.4"/>
  <!-- Center document -->
  <rect x="452" y="450" width="120" height="140" rx="8" fill="white"/>
  <rect x="468" y="468" width="88" height="10" rx="5" fill="#00BCD4"/>
  <rect x="468" y="486" width="68" height="10" rx="5" fill="#7C4DFF" opacity="0.7"/>
  <rect x="468" y="504" width="78" height="10" rx="5" fill="#00BCD4" opacity="0.5"/>
</svg>