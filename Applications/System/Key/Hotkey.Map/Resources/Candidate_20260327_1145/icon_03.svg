<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7FF"/>
      <stop offset="100%" stop-color="#D4C5FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Big Ctrl key -->
  <rect x="150" y="300" width="300" height="200" rx="28" fill="#7C3AED"/>
  <text x="300" y="420" font-family="Arial,sans-serif" font-size="88" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Ctrl</text>
  <!-- Plus sign -->
  <text x="478" y="430" font-family="Arial,sans-serif" font-size="120" fill="#9D74FF" font-weight="bold" text-anchor="middle">+</text>
  <!-- Alt key -->
  <rect x="570" y="300" width="260" height="200" rx="28" fill="#A78BFA"/>
  <text x="700" y="420" font-family="Arial,sans-serif" font-size="88" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Alt</text>
  <!-- Conflict warning badge -->
  <circle cx="700" cy="620" r="130" fill="#F44336"/>
  <circle cx="700" cy="620" r="100" fill="#FF5252"/>
  <text x="700" y="650" font-family="Arial,sans-serif" font-size="120" fill="#FFFFFF" font-weight="bold" text-anchor="middle">!</text>
  <!-- Label -->
  <text x="512" y="840" font-family="Arial,sans-serif" font-size="58" fill="#6D28D9" font-weight="bold" text-anchor="middle">Hotkey Map</text>
</svg>
