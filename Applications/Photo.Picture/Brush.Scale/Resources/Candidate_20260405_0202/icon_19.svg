<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg19" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#B39DDB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg19)"/>
  <!-- Layer 2: Layered scale cards (×2, ×4, ×8) stacked with AI brain badge -->
  <!-- ×2 card (back, smallest) -->
  <rect x="290" y="210" width="500" height="180" rx="20" fill="#9FA8DA" opacity="0.7"/>
  <text x="330" y="336" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="#3F51B5" opacity="0.8">×2</text>
  <!-- ×4 card (middle) -->
  <rect x="245" y="380" width="560" height="200" rx="20" fill="#7C83D8"/>
  <text x="286" y="518" font-family="'Segoe UI',Arial,sans-serif" font-size="130" font-weight="900" fill="white">×4</text>
  <!-- ×8 card (front, biggest) -->
  <rect x="188" y="560" width="620" height="230" rx="22" fill="#3F51B5"/>
  <text x="228" y="718" font-family="'Segoe UI',Arial,sans-serif" font-size="160" font-weight="900" fill="white">×8</text>
  <!-- Layer 3: AI brain badge on front card -->
  <circle cx="780" cy="670" r="110" fill="#00BCD4"/>
  <!-- Brain shape (simplified) -->
  <path d="M740 640 Q720 600 750 580 Q780 560 800 590 Q820 570 840 600 Q860 630 840 660 Q860 680 840 700 Q820 720 800 700 Q780 720 760 700 Q740 720 720 700 Q700 680 720 660 Q700 640 740 640Z" fill="white"/>
  <!-- Brain dividing line -->
  <line x1="780" y1="580" x2="780" y2="710" stroke="#00ACC1" stroke-width="6" stroke-linecap="round"/>
  <!-- Mint label on badge -->
  <text x="732" y="770" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="white">AI</text>
</svg>
