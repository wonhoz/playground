<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0015"/>
      <stop offset="100%" style="stop-color:#15002A"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC88FF"/>
      <stop offset="50%" style="stop-color:#8844FF"/>
      <stop offset="100%" style="stop-color:#4400CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#AA66FF;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#AA66FF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="200" cy="220" r="200" fill="url(#glow)"/>
  <!-- Crystal key shape -->
  <!-- Key head (diamond) -->
  <polygon points="180,120 240,180 180,240 120,180" fill="url(#crystal)" opacity="0.9"/>
  <polygon points="180,120 240,180 180,240 120,180" fill="none" stroke="#EE99FF" stroke-width="2"/>
  <!-- Inner crystal facets -->
  <line x1="180" y1="120" x2="180" y2="240" stroke="#EE99FF" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="180" x2="240" y2="180" stroke="#EE99FF" stroke-width="1" opacity="0.5"/>
  <!-- Key shaft -->
  <rect x="240" y="166" width="170" height="28" rx="8" fill="url(#crystal)" opacity="0.9"/>
  <!-- Key teeth -->
  <rect x="280" y="194" width="18" height="22" rx="4" fill="url(#crystal)"/>
  <rect x="320" y="194" width="18" height="30" rx="4" fill="url(#crystal)"/>
  <rect x="360" y="194" width="18" height="18" rx="4" fill="url(#crystal)"/>
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="4" fill="#EE99FF" opacity="0.8"/>
  <circle cx="210" cy="130" r="3" fill="#CC66FF" opacity="0.6"/>
  <circle cx="160" cy="200" r="3" fill="#EE99FF" opacity="0.7"/>
  <!-- Registry label -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial" font-size="22" fill="#AA66FF" opacity="0.9">REGISTRY</text>
  <rect x="116" y="370" width="280" height="3" rx="1" fill="#8844FF" opacity="0.5"/>
  <text x="256" y="400" text-anchor="middle" font-family="Arial" font-size="16" fill="#8844FF" opacity="0.7">VAULT</text>
</svg>
