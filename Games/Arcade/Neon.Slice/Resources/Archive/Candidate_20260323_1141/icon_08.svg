<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#001800"/>
  <!-- Layer 2: 점수판 + 레벨업 효과 -->
  <!-- 중앙 큰 점수 숫자 -->
  <text x="512" y="400" font-family="Arial Black,Arial" font-size="220" font-weight="900" fill="#00FF41" text-anchor="middle">99</text>
  <!-- 글로우 -->
  <text x="512" y="400" font-family="Arial Black,Arial" font-size="220" font-weight="900" fill="none" stroke="#00FF41" stroke-width="4" text-anchor="middle" opacity="0.4"/>
  <!-- 슬라이스 라인들 (점수 숫자 위에) -->
  <line x1="140" y1="300" x2="884" y2="350" stroke="#FFFF00" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="300" x2="884" y2="350" stroke="#FFFF00" stroke-width="32" stroke-linecap="round" opacity="0.25"/>
  <line x1="140" y1="420" x2="884" y2="460" stroke="#FF00FF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="140" y1="420" x2="884" y2="460" stroke="#FF00FF" stroke-width="24" stroke-linecap="round" opacity="0.2"/>
  <!-- Layer 3: 콤보 텍스트 + 별 -->
  <text x="512" y="580" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FFFF00" text-anchor="middle">COMBO</text>
  <!-- 별 장식들 -->
  <text x="200" y="560" font-family="Arial" font-size="60" fill="#FFFF00" text-anchor="middle" opacity="0.8">★</text>
  <text x="824" y="560" font-family="Arial" font-size="60" fill="#FFFF00" text-anchor="middle" opacity="0.8">★</text>
  <text x="512" y="700" font-family="Arial" font-size="48" fill="#00FF41" text-anchor="middle">PERFECT!</text>
</svg>
