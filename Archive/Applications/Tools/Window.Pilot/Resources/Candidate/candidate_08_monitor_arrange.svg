<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="monitor1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="monitor2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 모니터 1 (주 모니터) -->
  <rect x="156" y="100" width="200" height="150" rx="8" fill="url(#monitor1)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="166" y="110" width="180" height="120" rx="4" fill="#0f172a"/>
  <!-- 모니터 1 화면 속 창들 -->
  <rect x="172" y="116" width="80" height="60" rx="3" fill="#1e40af" opacity="0.8"/>
  <rect x="258" y="116" width="80" height="28" rx="3" fill="#1d4ed8" opacity="0.6"/>
  <rect x="258" y="150" width="80" height="28" rx="3" fill="#1d4ed8" opacity="0.6"/>
  <!-- 모니터 1 받침 -->
  <rect x="242" y="250" width="28" height="30" rx="2" fill="#374151"/>
  <rect x="210" y="278" width="92" height="10" rx="4" fill="#4b5563"/>
  <!-- 모니터 2 (보조) -->
  <rect x="72" y="140" width="100" height="76" rx="6" fill="url(#monitor2)" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="80" y="148" width="84" height="56" rx="3" fill="#0c1a2e"/>
  <rect x="110" y="216" width="20" height="18" rx="2" fill="#374151"/>
  <rect x="94" y="232" width="52" height="7" rx="3" fill="#4b5563"/>
  <!-- 모니터 3 (보조) -->
  <rect x="340" y="140" width="100" height="76" rx="6" fill="url(#monitor2)" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="348" y="148" width="84" height="56" rx="3" fill="#0c1a2e"/>
  <rect x="378" y="216" width="20" height="18" rx="2" fill="#374151"/>
  <rect x="362" y="232" width="52" height="7" rx="3" fill="#4b5563"/>
  <!-- 정렬 화살표 -->
  <line x1="172" y1="178" x2="80" y2="178" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="340" y1="178" x2="432" y2="178" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- 하단 설명 -->
  <text x="256" y="328" font-family="Arial" font-weight="bold" font-size="18" fill="#3b82f6" text-anchor="middle">MULTI-MONITOR</text>
  <text x="256" y="352" font-family="Arial" font-size="14" fill="#60a5fa" text-anchor="middle">Window Arrangement</text>
  <!-- 배치 그리드 미니맵 -->
  <rect x="160" y="372" width="192" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="172" y="382" width="52" height="38" rx="3" fill="#1e40af" opacity="0.7"/>
  <rect x="230" y="382" width="52" height="18" rx="3" fill="#0e7490" opacity="0.7"/>
  <rect x="230" y="404" width="52" height="16" rx="3" fill="#0e7490" opacity="0.7"/>
  <rect x="288" y="382" width="52" height="38" rx="3" fill="#1e40af" opacity="0.5"/>
