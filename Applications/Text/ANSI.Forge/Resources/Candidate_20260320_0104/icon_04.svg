<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 모루+아트: anvil with art sparks -->
  <!-- Anvil base -->
  <rect x="280" y="680" width="464" height="80" rx="16" fill="#4A148C"/>
  <!-- Anvil body -->
  <rect x="320" y="540" width="384" height="160" rx="16" fill="#4A148C"/>
  <!-- Anvil horn (left) -->
  <path d="M320 600 Q220 600 200 620 Q220 660 320 660 Z" fill="#4A148C"/>
  <!-- Anvil top flat surface -->
  <rect x="340" y="480" width="340" height="70" rx="10" fill="#CE93D8"/>
  <!-- Hammer -->
  <rect x="560" y="300" width="100" height="60" rx="10" fill="#CE93D8"/>
  <rect x="596" y="240" width="28" height="80" rx="8" fill="#4A148C"/>
  <!-- Sparks (pixel art colored blocks) -->
  <rect x="430" y="440" width="20" height="20" rx="3" fill="#CE93D8"/>
  <rect x="460" y="420" width="16" height="16" rx="3" fill="#CE93D8" opacity="0.8"/>
  <rect x="490" y="400" width="14" height="14" rx="3" fill="#CE93D8" opacity="0.6"/>
  <rect x="400" y="420" width="18" height="18" rx="3" fill="#CE93D8" opacity="0.7"/>
  <rect x="370" y="400" width="14" height="14" rx="3" fill="#CE93D8" opacity="0.5"/>
  <rect x="520" y="410" width="16" height="16" rx="3" fill="#CE93D8" opacity="0.7"/>
  <rect x="550" y="390" width="14" height="14" rx="3" fill="#CE93D8" opacity="0.5"/>
  <!-- Pixel art letter blocks on anvil -->
  <rect x="360" y="492" width="36" height="36" rx="4" fill="#030005"/>
  <rect x="408" y="492" width="36" height="36" rx="4" fill="#030005"/>
  <rect x="456" y="492" width="36" height="36" rx="4" fill="#030005"/>
  <rect x="504" y="492" width="36" height="36" rx="4" fill="#030005"/>
  <rect x="552" y="492" width="36" height="36" rx="4" fill="#030005"/>
  <rect x="600" y="492" width="36" height="36" rx="4" fill="#030005"/>
</svg>