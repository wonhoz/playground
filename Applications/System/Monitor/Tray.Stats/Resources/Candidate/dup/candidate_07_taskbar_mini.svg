<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#15202a"/>
    </linearGradient>
    <linearGradient id="taskbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Desktop background -->
  <rect x="70" y="90" width="372" height="280" rx="10" fill="#0a1520"/>
  <!-- Wallpaper gradient hint -->
  <rect x="70" y="90" width="372" height="280" rx="10" fill="none" stroke="#1a2a3a" stroke-width="2"/>
  <!-- Desktop icons -->
  <rect x="100" y="120" width="40" height="40" rx="8" fill="#2a3a4a" opacity="0.8"/>
  <rect x="100" y="170" width="40" height="40" rx="8" fill="#2a3a4a" opacity="0.8"/>
  <rect x="100" y="220" width="40" height="40" rx="8" fill="#2a3a4a" opacity="0.8"/>
  <!-- Taskbar -->
  <rect x="70" y="360" width="372" height="40" rx="10" fill="url(#taskbar)"/>
  <!-- Taskbar start button -->
  <rect x="82" y="368" width="32" height="24" rx="4" fill="#0066cc" opacity="0.8"/>
  <!-- Windows logo in start -->
  <rect x="88" y="374" width="7" height="7" fill="#ffffff" opacity="0.8"/>
  <rect x="97" y="374" width="7" height="7" fill="#ffffff" opacity="0.8"/>
  <rect x="88" y="383" width="7" height="7" fill="#ffffff" opacity="0.8"/>
  <rect x="97" y="383" width="7" height="7" fill="#ffffff" opacity="0.8"/>
  <!-- Taskbar apps -->
  <rect x="124" y="368" width="26" height="24" rx="4" fill="#2a3a4a" opacity="0.8"/>
  <rect x="158" y="368" width="26" height="24" rx="4" fill="#2a3a4a" opacity="0.8"/>
  <!-- System tray area highlighted -->
  <rect x="332" y="366" width="100" height="28" rx="4" fill="#1a2a3a" stroke="#4488ff" stroke-width="2"/>
  <!-- Tray icons - mini stats bars -->
  <rect x="340" y="374" width="8" height="8" rx="1" fill="#4488ff"/>
  <rect x="340" y="384" width="8" height="4" rx="1" fill="#4488ff" opacity="0.5"/>
  <rect x="354" y="378" width="8" height="4" rx="1" fill="#44ff88"/>
  <rect x="354" y="384" width="8" height="8" rx="1" fill="#44ff88"/>
  <rect x="368" y="374" width="8" height="12" rx="1" fill="#ff9944"/>
  <rect x="368" y="388" width="8" height="4" rx="1" fill="#ff9944" opacity="0.4"/>
  <!-- Time in tray -->
  <text x="386" y="382" font-size="10" fill="#aaa" font-family="monospace">11:32</text>
  <text x="386" y="393" font-size="10" fill="#888" font-family="monospace">AM</text>
  <!-- TRAY.STATS popup showing above tray -->
  <rect x="300" y="240" width="160" height="110" rx="10" fill="#0d1520" stroke="#4488ff" stroke-width="2"/>
  <!-- Popup arrow -->
  <polygon points="380,350 370,340 390,340" fill="#4488ff"/>
  <polygon points="380,351 371,342 389,342" fill="#0d1520"/>
  <!-- Stats in popup -->
  <text x="316" y="260" font-size="13" fill="#4488ff" font-family="monospace">CPU  48%</text>
  <rect x="314" y="264" width="68" height="5" rx="2" fill="#1a2a3a"/>
  <rect x="314" y="264" width="33" height="5" rx="2" fill="#4488ff"/>
  <text x="316" y="285" font-size="13" fill="#44ff88" font-family="monospace">MEM  72%</text>
  <rect x="314" y="289" width="68" height="5" rx="2" fill="#1a2a3a"/>
  <rect x="314" y="289" width="49" height="5" rx="2" fill="#44ff88"/>
  <text x="316" y="310" font-size="13" fill="#ff9944" font-family="monospace">DSK  29%</text>
  <rect x="314" y="314" width="68" height="5" rx="2" fill="#1a2a3a"/>
  <rect x="314" y="314" width="20" height="5" rx="2" fill="#ff9944"/>
  <text x="316" y="338" font-size="11" fill="#555" font-family="monospace">62C | 2400rpm</text>
</svg>