  <polygon points="324,142 356,160 356,196 324,214 292,196 292,160" fill="#BE185D" opacity="0.85"/>
  <polygon points="388,142 420,160 420,196 388,214 356,196 356,160" fill="#F43F5E" opacity="0.8"/>
  <polygon points="452,142 484,160 484,196 452,214 420,196 420,160" fill="#9F1239" opacity="0.7"/>
  <!-- 행 3 -->
  <polygon points="100,214 132,232 132,268 100,286 68,268 68,232" fill="#F43F5E" opacity="0.85"/>
  <polygon points="164,214 196,232 196,268 164,286 132,268 132,232" fill="#BE185D" opacity="0.8"/>
