<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1E293B"/>
  <!-- Layer 2: 멀티탭 UI -->
  <!-- 탭 바 -->
  <rect x="60" y="80" width="904" height="76" rx="12" fill="#0F172A"/>
  <!-- 탭 1 (활성) -->
  <rect x="80" y="84" width="240" height="68" rx="8" fill="#1E293B"/>
  <rect x="80" y="144" width="240" height="8" rx="0" fill="#1E293B"/>
  <text x="200" y="128" font-size="32" fill="#E2E8F0" text-anchor="middle" font-family="monospace">README.md</text>
  <!-- 탭 2 -->
  <rect x="332" y="90" width="220" height="56" rx="8" fill="#0F172A"/>
  <text x="442" y="126" font-size="32" fill="#64748B" text-anchor="middle" font-family="monospace">NOTES.md</text>
  <!-- 탭 3 -->
  <rect x="564" y="90" width="220" height="56" rx="8" fill="#0F172A"/>
  <text x="674" y="126" font-size="32" fill="#64748B" text-anchor="middle" font-family="monospace">PLAN.md •</text>
  <!-- 콘텐츠 영역 -->
  <rect x="60" y="156" width="904" height="788" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="4"/>
  <!-- 렌더링된 콘텐츠 -->
  <text x="100" y="250" font-size="80" fill="#58A6FF" font-family="Arial" font-weight="bold"># README</text>
  <rect x="100" y="290" width="600" height="6" rx="3" fill="#30363D"/>
  <text x="100" y="360" font-size="44" fill="#E2E8F0" font-family="Arial">A markdown viewer with</text>
  <text x="100" y="418" font-size="44" fill="#E2E8F0" font-family="Arial">live preview and multi-tab</text>
  <!-- 코드 블록 -->
  <rect x="100" y="460" width="820" height="140" rx="8" fill="#161B22"/>
  <text x="130" y="510" font-size="38" fill="#7EE787" font-family="monospace">## Features</text>
  <text x="130" y="556" font-size="38" fill="#A5D6A7" font-family="monospace">- Dark/Light theme</text>
  <text x="130" y="582" font-size="38" fill="#A5D6A7" font-family="monospace">- Syntax highlight</text>
  <!-- Layer 3: 수직 스크롤바 -->
  <rect x="936" y="156" width="28" height="788" rx="8" fill="#1E293B"/>
  <rect x="940" y="300" width="20" height="200" rx="8" fill="#475569"/>
</svg>
