<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright emerald mint -->
  <rect width="1024" height="1024" rx="190" fill="#00B894"/>

  <!-- Layer 2: Profile card deck (layered, 3 cards) -->

  <!-- Card 3 (back): "default" — light teal -->
  <rect x="220" y="240" width="580" height="340" rx="28" fill="#55EFC4" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Card 3 header -->
  <rect x="220" y="240" width="580" height="64" rx="28" fill="#00CEC9" stroke="#FFFFFF" stroke-width="14"/>
  <rect x="220" y="268" width="580" height="36" rx="0" fill="#00CEC9"/>
  <text x="510" y="282" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">🎮 default</text>
  <!-- Card 3 content rows (small) -->
  <rect x="240" y="322" width="200" height="20" rx="6" fill="#FFFFFF" opacity="0.6"/>
  <rect x="240" y="352" width="280" height="20" rx="6" fill="#FFFFFF" opacity="0.4"/>

  <!-- Card 2 (middle): "steam" — purple -->
  <rect x="180" y="320" width="580" height="340" rx="28" fill="#A29BFE" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Card 2 header -->
  <rect x="180" y="320" width="580" height="64" rx="28" fill="#6C5CE7" stroke="#FFFFFF" stroke-width="14"/>
  <rect x="180" y="348" width="580" height="36" rx="0" fill="#6C5CE7"/>
  <text x="470" y="362" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">🎮 steam.exe</text>
  <!-- Mapping rows -->
  <rect x="200" y="404" width="260" height="32" rx="10" fill="#FFEAA7"/>
  <text x="330" y="426" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="700" fill="#2D3436">LT → RB</text>
  <rect x="480" y="404" width="260" height="32" rx="10" fill="#FD79A8"/>
  <text x="610" y="426" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">B → A</text>

  <!-- Card 1 (front): "sekiro.exe" — golden yellow -->
  <rect x="140" y="400" width="580" height="380" rx="28" fill="#FFFFFF" stroke="#2D3436" stroke-width="16"/>
  <!-- Card 1 header -->
  <rect x="140" y="400" width="580" height="72" rx="28" fill="#F9CA24" stroke="#2D3436" stroke-width="16"/>
  <rect x="140" y="432" width="580" height="40" rx="0" fill="#F9CA24"/>
  <text x="430" y="447" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="900" fill="#2D3436">⚔ sekiro.exe</text>
  <!-- Active badge -->
  <rect x="640" y="408" width="70" height="34" rx="10" fill="#00B894"/>
  <text x="675" y="430" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">●ON</text>

  <!-- Mapping rows (front card — largest, most visible) -->
  <rect x="160" y="490" width="260" height="48" rx="14" fill="#FF6B6B"/>
  <text x="290" y="521" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">X → B</text>

  <rect x="440" y="490" width="260" height="48" rx="14" fill="#74B9FF"/>
  <text x="570" y="521" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">Y → A</text>

  <rect x="160" y="554" width="260" height="48" rx="14" fill="#A29BFE"/>
  <text x="290" y="585" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">LT→RB</text>

  <rect x="440" y="554" width="260" height="48" rx="14" fill="#FFEAA7"/>
  <text x="570" y="585" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="900" fill="#2D3436">RS→KB</text>

  <!-- Deadzone bar -->
  <text x="160" y="634" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#888">데드존</text>
  <rect x="160" y="644" width="540" height="22" rx="8" fill="#EEEEEE"/>
  <rect x="160" y="644" width="81" height="22" rx="8" fill="#E17055"/>
  <text x="254" y="662" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#2D3436">15%</text>

  <!-- Layer 3: Pad.Forge label -->
  <text x="512" y="930" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="900" fill="#FFFFFF">Pad.Forge</text>
</svg>
