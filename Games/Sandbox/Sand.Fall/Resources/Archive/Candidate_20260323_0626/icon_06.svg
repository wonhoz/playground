  <rect x="494" y="390" width="8" height="8" fill="#E8C840" rx="1" opacity="0.8"/>
  <rect x="508" y="384" width="8" height="8" fill="#D8B830" rx="1" opacity="0.8"/>
  <rect x="522" y="389" width="8" height="8" fill="#E8C840" rx="1" opacity="0.8"/>
  <rect x="536" y="393" width="8" height="8" fill="#C8A820" rx="1" opacity="0.8"/>
  <rect x="550" y="387" width="8" height="8" fill="#D8B830" rx="1" opacity="0.8"/>
