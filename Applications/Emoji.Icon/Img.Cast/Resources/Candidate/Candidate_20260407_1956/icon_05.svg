<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 에메랄드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Layer 2: 뒤쪽 이미지 카드 (입력) — 왼쪽 위로 기울어짐 -->
  <g transform="translate(90,120) rotate(-8, 310, 310)">
    <rect width="530" height="420" rx="28" fill="url(#sky5)" stroke="#B2EBF2" stroke-width="8"/>
    <!-- 산 실루엣 -->
    <polygon points="0,420 130,200 260,320 380,130 530,420" fill="#26A69A" opacity="0.85"/>
    <!-- 태양 -->
    <circle cx="420" cy="90" r="52" fill="#FFD54F"/>
    <!-- PNG 라벨 -->
    <rect x="16" y="16" width="120" height="52" rx="10" fill="#0097A7"/>
    <text x="76" y="52" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">PNG</text>
  </g>

  <!-- Layer 2: 앞쪽 이미지 카드 (출력) — 오른쪽 아래로 기울어짐 -->
  <g transform="translate(404,484) rotate(6, 310, 310)">
    <rect width="530" height="420" rx="28" fill="url(#card5)" stroke="#A5D6A7" stroke-width="8"/>
    <!-- 같은 산 실루엣, 변환된 느낌 -->
    <polygon points="0,420 130,200 260,320 380,130 530,420" fill="#00897B" opacity="0.85"/>
    <circle cx="420" cy="90" r="52" fill="#FF8A65"/>
    <!-- ICO 라벨 -->
    <rect x="16" y="16" width="120" height="52" rx="10" fill="#E64A19"/>
    <text x="76" y="52" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">ICO</text>
  </g>

  <!-- Layer 3: 변환 화살표 (카드 사이) -->
  <path d="M450 430 L600 560" stroke="#FF6D00" stroke-width="56" stroke-linecap="round" fill="none"/>
  <!-- 화살표 머리 -->
  <polygon points="600,560 545,530 570,585" fill="#FF6D00"/>
</svg>
