    <text x="157" y="208" font-family="'Segoe UI',Arial" font-size="88" font-weight="900" fill="#2ECC71" text-anchor="middle">G</text>
    <text x="89" y="128" font-family="'Segoe UI',Arial" font-size="22" font-weight="700" fill="#2ECC71">1</text>

