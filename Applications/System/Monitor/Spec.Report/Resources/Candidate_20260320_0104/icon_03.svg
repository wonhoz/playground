<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- 프린터+사양서: printer with document output -->
  <!-- Printer body -->
  <rect x="240" y="400" width="544" height="280" rx="20" fill="#01579B"/>
  <rect x="260" y="420" width="504" height="240" rx="14" fill="#000810"/>
  <!-- Paper slot -->
  <rect x="300" y="455" width="424" height="24" rx="6" fill="#01579B"/>
  <!-- Output document emerging -->
  <rect x="360" y="300" width="304" height="200" rx="10" fill="#29B6F6"/>
  <rect x="380" y="320" width="264" height="160" rx="6" fill="#000810"/>
  <!-- Document text lines -->
  <line x1="400" y1="348" x2="624" y2="348" stroke="#29B6F6" stroke-width="7" stroke-linecap="round"/>
  <line x1="400" y1="372" x2="580" y2="372" stroke="#01579B" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="392" x2="600" y2="392" stroke="#01579B" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="412" x2="560" y2="412" stroke="#01579B" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="432" x2="590" y2="432" stroke="#01579B" stroke-width="5" stroke-linecap="round"/>
  <!-- Printer indicator lights -->
  <circle cx="680" cy="500" r="14" fill="#29B6F6"/>
  <circle cx="720" cy="500" r="14" fill="#01579B"/>
  <!-- Paper tray at bottom -->
  <rect x="280" y="640" width="464" height="30" rx="6" fill="#01579B"/>
  <!-- Bottom stand -->
  <rect x="340" y="680" width="80" height="20" rx="4" fill="#01579B"/>
  <rect x="604" y="680" width="80" height="20" rx="4" fill="#01579B"/>
</svg>