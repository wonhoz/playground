    <circle cx="182" cy="463" r="7" fill="#00FF88"/>
    <rect x="196" y="457" width="70" height="12" rx="3" fill="#CCCCCC" opacity="0.7"/>
    <!-- 서버 하단 -->
    <rect x="165" y="490" width="150" height="20" rx="4" fill="#DDDDDD" opacity="0.7"/>
    <rect x="165" y="518" width="150" height="20" rx="4" fill="#DDDDDD" opacity="0.5"/>
