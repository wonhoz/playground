<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1A0830"/>
      <stop offset="60%" stop-color="#0A0420"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <radialGradient id="nebula" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8800FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FF0088" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0000AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCDDFF"/>
      <stop offset="100%" stop-color="#667799"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#nebula)"/>
  <!-- Star field -->
  <circle cx="70" cy="70" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="200" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="80" r="2" fill="#AAAAFF" opacity="0.8"/>
  <circle cx="460" cy="120" r="1" fill="white" opacity="0.6"/>
  <circle cx="440" cy="380" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="60" cy="400" r="1" fill="white" opacity="0.6"/>
  <circle cx="130" cy="140" r="1.5" fill="#FFAAAA" opacity="0.7"/>
  <circle cx="420" cy="250" r="1" fill="white" opacity="0.5"/>
  <!-- Bright star -->
  <circle cx="380" cy="100" r="4" fill="white" opacity="0.9" filter="url(#glow)"/>
  <line x1="380" y1="88" x2="380" y2="112" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="368" y1="100" x2="392" y2="100" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- Ship (angled, dynamic) -->
  <g transform="translate(200, 300) rotate(-30)">
    <polygon points="0,-70 -30,20 0,-10 30,20" fill="url(#ship)"/>
    <polygon points="-30,20 -80,50 -50,25 0,-5" fill="#99AACE"/>
    <polygon points="30,20 80,50 50,25 0,-5" fill="#99AACE"/>
    <ellipse cx="0" cy="-40" rx="10" ry="15" fill="#00CCFF" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="-15" cy="25" rx="8" ry="12" fill="#FF8800" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="15" cy="25" rx="8" ry="12" fill="#FF8800" filter="url(#glow)" opacity="0.9"/>
  </g>
  <!-- Multiple laser shots -->
  <rect x="185" y="120" width="6" height="50" rx="3" fill="#FF44FF" filter="url(#glow)" opacity="0.9" transform="rotate(-30, 188, 145)"/>
  <rect x="200" y="100" width="6" height="50" rx="3" fill="#AA44FF" filter="url(#glow)" opacity="0.8" transform="rotate(-30, 203, 125)"/>
  <!-- Explosion at impact -->
  <circle cx="340" cy="160" r="36" fill="#FF8800" opacity="0.3" filter="url(#glow)"/>
  <circle cx="340" cy="160" r="20" fill="#FFFF00" opacity="0.4" filter="url(#glow)"/>
  <circle cx="340" cy="160" r="8" fill="white" opacity="0.7"/>
  <!-- Star enemy shapes -->
  <polygon points="340,136 346,150 362,150 350,160 354,176 340,166 326,176 330,160 318,150 334,150" fill="#FF4466" filter="url(#glow)" opacity="0.9"/>
  <polygon points="410,320 415,332 428,332 418,340 422,352 410,344 398,352 402,340 392,332 405,332" fill="#FF6688" opacity="0.7"/>
</svg>
