  <text x="258" y="552" font-family="Courier New" font-size="40" fill="#80CBC4">`code`</text>
  <text x="258" y="604" font-family="Courier New" font-size="40" fill="#E0E0E0">**more**</text>
  <!-- 커서 -->
  <rect x="258" y="618" width="4" height="44" fill="#4FC3F7"/>
