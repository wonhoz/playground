<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
  <!-- 카이사르 암호 로터: 원형 알파벳 치환 -->
  <!-- 외부 링 (암호문) -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#4527A0" stroke-width="60"/>
  <!-- 중간 링 (평문) -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#CE93D8" stroke-width="40"/>
  <!-- 내부 원 (열쇠) -->
  <circle cx="512" cy="512" r="140" fill="#4527A0"/>
  <circle cx="512" cy="512" r="120" fill="#050010"/>
  <!-- 회전 화살표 -->
  <path d="M512,372 Q640,380 680,512" stroke="#CE93D8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <polygon points="680,512 650,480 710,475" fill="#CE93D8"/>
  <!-- 외부 눈금 마크 -->
  <line x1="512" y1="152" x2="512" y2="178" stroke="#4527A0" stroke-width="10"/>
  <line x1="640" y1="176" x2="628" y2="198" stroke="#4527A0" stroke-width="10"/>
  <line x1="742" y1="242" x2="724" y2="258" stroke="#4527A0" stroke-width="10"/>
  <line x1="800" y1="350" x2="778" y2="360" stroke="#4527A0" stroke-width="10"/>
  <line x1="384" y1="176" x2="396" y2="198" stroke="#4527A0" stroke-width="10"/>
  <line x1="282" y1="242" x2="300" y2="258" stroke="#4527A0" stroke-width="10"/>
  <line x1="224" y1="350" x2="246" y2="360" stroke="#4527A0" stroke-width="10"/>
  <!-- 내부 키 심볼 -->
  <circle cx="512" cy="490" r="24" fill="none" stroke="#CE93D8" stroke-width="10"/>
  <rect x="502" y="514" width="20" height="36" rx="4" fill="#CE93D8"/>
  <rect x="518" y="530" width="14" height="8" rx="2" fill="#CE93D8"/>
  <rect x="518" y="544" width="10" height="8" rx="2" fill="#CE93D8"/>
  <!-- 오프셋 3 표시 선 -->
  <line x1="512" y1="152" x2="640" y2="175" stroke="#CE93D8" stroke-width="6" stroke-dasharray="12,8" opacity="0.5"/>
</svg>
