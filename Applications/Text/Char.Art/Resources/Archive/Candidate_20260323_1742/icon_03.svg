<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#001400"/>
  <!-- Layer 2: 터미널 화면 + 텍스트 격자 -->
  <!-- 모니터 외곽 -->
  <rect x="60" y="80" width="904" height="700" rx="24" fill="#0D1A0D" stroke="#00AA00" stroke-width="10"/>
  <!-- 모니터 상단 바 -->
  <rect x="60" y="80" width="904" height="52" rx="24" fill="#1A2E1A"/>
  <rect x="60" y="112" width="904" height="20" fill="#1A2E1A"/>
  <circle cx="116" cy="106" r="14" fill="#FF5F57"/>
  <circle cx="162" cy="106" r="14" fill="#FEBC2E"/>
  <circle cx="208" cy="106" r="14" fill="#28C840"/>
  <text x="512" y="116" font-size="32" fill="#00FF41" text-anchor="middle" font-family="monospace">Char.Art - Terminal</text>
  <!-- 텍스트 격자 (ASCII 출력) -->
  <text x="90" y="188" font-size="28" fill="#00FF41" font-family="monospace">@@@@####****++++....    </text>
  <text x="90" y="224" font-size="28" fill="#00EE38" font-family="monospace">####****++++....        </text>
  <text x="90" y="260" font-size="28" fill="#00DD30" font-family="monospace">****++++....    @@@@####</text>
  <text x="90" y="296" font-size="28" fill="#00CC28" font-family="monospace">++++....    @@@@####****</text>
  <text x="90" y="332" font-size="28" fill="#00DD30" font-family="monospace">....    @@@@####****++++</text>
  <text x="90" y="368" font-size="28" fill="#00EE38" font-family="monospace">@@@@####****++++....    </text>
  <text x="90" y="404" font-size="28" fill="#00FF41" font-family="monospace">####****++++....@@@@####</text>
  <text x="90" y="440" font-size="28" fill="#00EE38" font-family="monospace">****++++....@@@@####****</text>
  <text x="90" y="476" font-size="28" fill="#00DD30" font-family="monospace">++++....@@@@####****++++</text>
  <text x="90" y="512" font-size="28" fill="#00CC28" font-family="monospace">....@@@@####****++++....</text>
  <text x="90" y="548" font-size="28" fill="#00DD30" font-family="monospace">@@@@####****++++....@@@@</text>
  <text x="90" y="584" font-size="28" fill="#00EE38" font-family="monospace">####****++++....@@@@####</text>
  <text x="90" y="620" font-size="28" fill="#00FF41" font-family="monospace">****++++....@@@@####****</text>
  <text x="90" y="656" font-size="28" fill="#00EE38" font-family="monospace">++++....@@@@####****++++</text>
  <text x="90" y="692" font-size="28" fill="#00DD30" font-family="monospace">....@@@@####****++++....▌</text>
  <!-- 모니터 받침대 -->
  <rect x="432" y="780" width="160" height="40" rx="4" fill="#00AA00" opacity="0.5"/>
  <rect x="340" y="820" width="344" height="40" rx="8" fill="#1A2E1A" stroke="#00AA00" stroke-width="4"/>
  <!-- Layer 3: 설정 패널 하단 -->
  <rect x="60" y="880" width="904" height="100" rx="20" fill="#0D1A0D" stroke="#005500" stroke-width="6"/>
  <text x="180" y="940" font-size="40" fill="#00AA00" font-family="monospace">Cols: 80</text>
  <text x="420" y="940" font-size="40" fill="#00AA00" font-family="monospace">Font: 8pt</text>
  <text x="660" y="940" font-size="40" fill="#00AA00" font-family="monospace">Chars: ASCII</text>
</svg>
