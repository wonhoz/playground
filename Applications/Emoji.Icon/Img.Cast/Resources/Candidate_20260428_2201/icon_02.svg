<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFAB91"/>
      <stop offset="1" stop-color="#FF7043"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#g2)"/>
  <!-- 6 stacked squares with size labels: 256 → 16 -->
  <g>
    <!-- 256 -->
    <rect x="200" y="200" width="624" height="624" rx="40" fill="#FFFFFF" stroke="#3E2723" stroke-width="14"/>
    <text x="252" y="282" font-family="Verdana, sans-serif" font-size="64" font-weight="900" fill="#3E2723">256</text>
    <!-- 128 -->
    <rect x="280" y="280" width="464" height="464" rx="36" fill="#FFE082" stroke="#3E2723" stroke-width="14"/>
    <text x="320" y="350" font-family="Verdana, sans-serif" font-size="56" font-weight="900" fill="#3E2723">128</text>
    <!-- 64 -->
    <rect x="350" y="350" width="324" height="324" rx="28" fill="#80CBC4" stroke="#3E2723" stroke-width="12"/>
    <text x="384" y="404" font-family="Verdana, sans-serif" font-size="48" font-weight="900" fill="#3E2723">64</text>
    <!-- 48 -->
    <rect x="402" y="402" width="220" height="220" rx="22" fill="#90CAF9" stroke="#3E2723" stroke-width="11"/>
    <text x="430" y="446" font-family="Verdana, sans-serif" font-size="40" font-weight="900" fill="#3E2723">48</text>
    <!-- 32 -->
    <rect x="436" y="436" width="152" height="152" rx="18" fill="#CE93D8" stroke="#3E2723" stroke-width="10"/>
    <text x="460" y="470" font-family="Verdana, sans-serif" font-size="34" font-weight="900" fill="#3E2723">32</text>
    <!-- 16 (center mark) -->
    <rect x="472" y="472" width="80" height="80" rx="10" fill="#F8BBD0" stroke="#3E2723" stroke-width="8"/>
    <text x="486" y="528" font-family="Verdana, sans-serif" font-size="26" font-weight="900" fill="#3E2723">16</text>
  </g>
</svg>
