    <text x="220" y="728" font-size="48" fill="#616161">Properties</text>
  </g>
  <!-- 마우스 커서 -->
  <g transform="translate(760 520)">
    <path d="M 0 0 L 0 100 L 28 76 L 48 118 L 64 112 L 44 72 L 80 72 Z" fill="#FFFFFF" stroke="#1B1B1B" stroke-width="8" stroke-linejoin="round"/>
  </g>
