<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- Bullet pattern: 5 orange circles in diagonal formation -->
  <!-- Speed lines behind each bullet -->
  <line x1="200" y1="250" x2="100" y2="250" stroke="rgba(255,255,255,0.4)" stroke-width="18" stroke-linecap="round"/>
  <line x1="340" y1="370" x2="200" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="18" stroke-linecap="round"/>
  <line x1="480" y1="490" x2="300" y2="460" stroke="rgba(255,255,255,0.4)" stroke-width="18" stroke-linecap="round"/>
  <line x1="620" y1="610" x2="420" y2="580" stroke="rgba(255,255,255,0.4)" stroke-width="18" stroke-linecap="round"/>
  <line x1="760" y1="730" x2="560" y2="700" stroke="rgba(255,255,255,0.4)" stroke-width="18" stroke-linecap="round"/>
  <!-- Bullets -->
  <circle cx="260" cy="250" r="60" fill="#F97316" stroke="white" stroke-width="12"/>
  <circle cx="400" cy="370" r="60" fill="#F97316" stroke="white" stroke-width="12"/>
  <circle cx="540" cy="490" r="60" fill="#F97316" stroke="white" stroke-width="12"/>
  <circle cx="680" cy="610" r="60" fill="#F97316" stroke="white" stroke-width="12"/>
  <circle cx="820" cy="730" r="60" fill="#F97316" stroke="white" stroke-width="12"/>
  <!-- Bullet inner highlight -->
  <circle cx="240" cy="232" r="20" fill="rgba(255,255,255,0.4)"/>
  <circle cx="380" cy="352" r="20" fill="rgba(255,255,255,0.4)"/>
  <circle cx="520" cy="472" r="20" fill="rgba(255,255,255,0.4)"/>
  <circle cx="660" cy="592" r="20" fill="rgba(255,255,255,0.4)"/>
  <circle cx="800" cy="712" r="20" fill="rgba(255,255,255,0.4)"/>
  <!-- Label -->
  <text x="512" y="890" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">BULLET RAIN</text>
</svg>