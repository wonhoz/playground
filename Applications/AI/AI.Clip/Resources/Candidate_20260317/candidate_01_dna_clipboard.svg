  <line x1="393" y1="430" x2="421" y2="430" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
  <line x1="398" y1="455" x2="416" y2="455" stroke="#00ffaa" stroke-width="2.5" opacity="0.7"/>
