<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="swarmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="25%" stop-color="#ffd93d"/>
      <stop offset="50%" stop-color="#6bcb77"/>
      <stop offset="75%" stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Swirling word particles arranged in spiral -->
  <!-- Outer ring -->
  <rect x="120" y="145" width="48" height="12" rx="4" fill="#ff6b6b" opacity="0.7" transform="rotate(-20,144,151)"/>
  <rect x="348" y="140" width="45" height="12" rx="4" fill="#ffd93d" opacity="0.7" transform="rotate(15,370,146)"/>
  <rect x="110" y="355" width="50" height="12" rx="4" fill="#6bcb77" opacity="0.7" transform="rotate(25,135,361)"/>
  <rect x="345" y="355" width="50" height="12" rx="4" fill="#4d96ff" opacity="0.7" transform="rotate(-15,370,361)"/>
  <!-- Mid ring -->
  <rect x="156" y="175" width="60" height="14" rx="4" fill="#c77dff" opacity="0.8" transform="rotate(-10,186,182)"/>
  <rect x="300" y="170" width="55" height="14" rx="4" fill="#ff6b6b" opacity="0.8" transform="rotate(8,327,177)"/>
  <rect x="148" y="325" width="60" height="14" rx="4" fill="#ffd93d" opacity="0.8" transform="rotate(12,178,332)"/>
  <rect x="306" y="322" width="58" height="14" rx="4" fill="#6bcb77" opacity="0.8" transform="rotate(-8,335,329)"/>
  <rect x="98" y="250" width="55" height="14" rx="4" fill="#4d96ff" opacity="0.75"/>
  <rect x="358" y="248" width="55" height="14" rx="4" fill="#c77dff" opacity="0.75"/>
  <!-- Inner ring -->
  <rect x="196" y="205" width="70" height="16" rx="5" fill="#ff6b6b" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="246" y="200" width="72" height="16" rx="5" fill="#ffd93d" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="190" y="292" width="68" height="16" rx="5" fill="#6bcb77" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="252" y="295" width="68" height="16" rx="5" fill="#4d96ff" opacity="0.9" filter="url(#softGlow)"/>
  <!-- Center big word -->
  <rect x="190" y="244" width="132" height="22" rx="6" fill="#c77dff" opacity="0.95" filter="url(#softGlow)"/>
</svg>