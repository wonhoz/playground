<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05 | Literal | 실루엣·캐릭터 | 고양이 실루엣이 ASCII 문자 격자로 구성됨 -->
  <!-- 색조: 선셋 오렌지-레드 배경 + 골드 문자 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="128" fill="#1A0A00"/>

  <defs>
    <!-- 고양이 실루엣 클립 -->
    <clipPath id="catClip05">
      <!-- 몸통 -->
      <ellipse cx="512" cy="620" rx="200" ry="170"/>
      <!-- 머리 -->
      <circle cx="512" cy="400" r="155"/>
      <!-- 왼쪽 귀 -->
      <polygon points="390,280 360,180 460,270"/>
      <!-- 오른쪽 귀 -->
      <polygon points="634,280 664,180 564,270"/>
      <!-- 꼬리 -->
      <path d="M712,720 Q820,650 800,540 Q780,450 740,500 Q780,540 760,620 Q740,700 712,720Z"/>
    </clipPath>
  </defs>

  <!-- 고양이 실루엣 도형들 (채우기용) -->
  <ellipse cx="512" cy="620" rx="200" ry="170" fill="#1A0A00"/>
  <circle cx="512" cy="400" r="155" fill="#1A0A00"/>
  <polygon points="390,280 360,180 460,270" fill="#1A0A00"/>
  <polygon points="634,280 664,180 564,270" fill="#1A0A00"/>
  <path d="M712,720 Q820,650 800,540 Q780,450 740,500 Q780,540 760,620 Q740,700 712,720Z" fill="#1A0A00"/>

  <!-- 고양이 형태를 채우는 ASCII 문자들 -->
  <g clip-path="url(#catClip05)" font-family="Courier New, monospace" font-size="20" fill="#FFB300">
    <!-- 귀 영역 -->
    <text x="362" y="210">@#*</text>
    <text x="350" y="232">@#*@#</text>
    <text x="344" y="254">*@#*@#*</text>

    <text x="564" y="210">@#*</text>
    <text x="556" y="232">@#*@#</text>
    <text x="548" y="254">*@#*@#*</text>

    <!-- 머리 영역 -->
    <text x="385" y="295">@  #  *  .  @  #  *  .</text>
    <text x="372" y="318">#  .  @  *  #  .  @  *  #</text>
    <text x="362" y="341">*  @  #  .  *  @  #  .  *  @</text>
    <text x="356" y="364">.  #  *  @  .  #  *  @  .  #  *</text>
    <text x="354" y="387">@  .  #  *  @  .  #  *  @  .  #</text>
    <text x="354" y="410">#  @  *  .  #  @  *  .  #  @  *</text>
    <text x="354" y="433">*  #  .  @  *  #  .  @  *  #  .</text>
    <text x="356" y="456">.  *  @  #  .  *  @  #  .  *  @</text>
    <text x="362" y="479">@  .  #  *  @  .  #  *  @  .  #</text>
    <text x="370" y="502">#  @  *  .  #  @  *  .  #  @</text>
    <text x="382" y="525">*  #  .  @  *  #  .  @  *</text>

    <!-- 몸통 영역 -->
    <text x="346" y="560">@  #  *  .  @  #  *  .  @  #  *</text>
    <text x="336" y="583">#  .  @  *  #  .  @  *  #  .  @  *</text>
    <text x="330" y="606">*  @  #  .  *  @  #  .  *  @  #  .  *</text>
    <text x="330" y="629">.  #  *  @  .  #  *  @  .  #  *  @  .</text>
    <text x="330" y="652">@  .  #  *  @  .  #  *  @  .  #  *  @</text>
    <text x="332" y="675">#  @  *  .  #  @  *  .  #  @  *  .  #</text>
    <text x="340" y="698">*  #  .  @  *  #  .  @  *  #  .  @</text>
    <text x="354" y="721">.  *  @  #  .  *  @  #  .  *  @</text>
    <text x="374" y="744">@  .  #  *  @  .  #  *  @</text>
    <text x="400" y="767">#  @  *  .  #  @  *</text>

    <!-- 꼬리 영역 -->
    <text x="716" y="580">@ # *</text>
    <text x="726" y="602">* . @</text>
    <text x="736" y="624"># @ *</text>
    <text x="726" y="646">. * #</text>
    <text x="716" y="668">@ . @</text>
    <text x="712" y="690">* # .</text>
  </g>

  <!-- 외곽선 글로우 -->
  <ellipse cx="512" cy="620" rx="200" ry="170" fill="none" stroke="#FF6600" stroke-width="4" opacity="0.6"/>
  <circle cx="512" cy="400" r="155" fill="none" stroke="#FF6600" stroke-width="4" opacity="0.6"/>

  <!-- 눈 (클립 외부 — 항상 보임) -->
  <circle cx="456" cy="390" r="18" fill="#FF6600"/>
  <circle cx="568" cy="390" r="18" fill="#FF6600"/>
  <circle cx="456" cy="390" r="8" fill="#1A0A00"/>
  <circle cx="568" cy="390" r="8" fill="#1A0A00"/>
</svg>
