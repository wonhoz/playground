<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7986cb"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7986cb"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Central hexagon -->
  <polygon points="256,100 326,140 326,220 256,260 186,220 186,140" fill="url(#hex)" opacity="0.9" stroke="#9fa8da" stroke-width="2"/>
  <!-- Server icon inside -->
  <rect x="214" y="135" width="84" height="18" rx="4" fill="#1a237e" stroke="#9fa8da" stroke-width="1"/>
  <circle cx="284" cy="144" r="4" fill="#69f0ae"/>
  <rect x="214" y="160" width="84" height="18" rx="4" fill="#1a237e" stroke="#9fa8da" stroke-width="1"/>
  <circle cx="284" cy="169" r="4" fill="#00e5ff"/>
  <rect x="214" y="185" width="84" height="18" rx="4" fill="#1a237e" stroke="#9fa8da" stroke-width="1"/>
  <circle cx="284" cy="194" r="4" fill="#ffd740"/>
  <!-- Connecting lines to smaller hexagons -->
  <line x1="256" y1="260" x2="256" y2="310" stroke="#7986cb" stroke-width="2" opacity="0.8"/>
  <line x1="186" y1="220" x2="136" y2="270" stroke="#7986cb" stroke-width="2" opacity="0.8"/>
  <line x1="326" y1="220" x2="376" y2="270" stroke="#7986cb" stroke-width="2" opacity="0.8"/>
  <line x1="186" y1="140" x2="120" y2="130" stroke="#7986cb" stroke-width="2" opacity="0.6"/>
  <line x1="326" y1="140" x2="392" y2="130" stroke="#7986cb" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="100" x2="256" y2="55" stroke="#7986cb" stroke-width="2" opacity="0.6"/>
  <!-- Small hexagons -->
  <polygon points="256,310 280,323 280,349 256,362 232,349 232,323" fill="#283593" stroke="#7986cb" stroke-width="1.5" opacity="0.85"/>
  <polygon points="136,270 160,283 160,309 136,322 112,309 112,283" fill="#283593" stroke="#7986cb" stroke-width="1.5" opacity="0.85"/>
  <polygon points="376,270 400,283 400,309 376,322 352,309 352,283" fill="#283593" stroke="#7986cb" stroke-width="1.5" opacity="0.85"/>
  <!-- Dots inside small hexagons -->
  <circle cx="256" cy="336" r="8" fill="url(#dot)"/>
  <circle cx="136" cy="296" r="8" fill="url(#dot)"/>
  <circle cx="376" cy="296" r="8" fill="url(#dot)"/>
  <!-- Top small hexagons -->
  <polygon points="256,55 276,67 276,91 256,103 236,91 236,67" fill="#283593" stroke="#7986cb" stroke-width="1.5" opacity="0.7"/>
  <circle cx="256" cy="79" r="6" fill="url(#dot)"/>
  <!-- Label -->
  <text x="256" y="445" font-family="sans-serif" font-size="22" fill="#9fa8da" text-anchor="middle" letter-spacing="4" opacity="0.85">SERVE.CAST</text>
</svg>
