<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 천 두 장 (위아래 분리된) -->
  <rect x="90" y="145" width="332" height="95" rx="10" fill="#7986CB" fill-opacity="0.3" stroke="#C5CAE9" stroke-width="2"/>
  <rect x="90" y="265" width="332" height="95" rx="10" fill="#5C6BC0" fill-opacity="0.3" stroke="#C5CAE9" stroke-width="2"/>
  <!-- 스티치 패턴 상 -->
  <line x1="110" y1="175" x2="402" y2="175" stroke="#C5CAE9" stroke-width="2" stroke-dasharray="8,6" stroke-opacity="0.5"/>
  <line x1="110" y1="205" x2="402" y2="205" stroke="#C5CAE9" stroke-width="2" stroke-dasharray="8,6" stroke-opacity="0.4"/>
  <!-- 스티치 패턴 하 -->
  <line x1="110" y1="290" x2="402" y2="290" stroke="#C5CAE9" stroke-width="2" stroke-dasharray="8,6" stroke-opacity="0.5"/>
  <line x1="110" y1="320" x2="402" y2="320" stroke="#C5CAE9" stroke-width="2" stroke-dasharray="8,6" stroke-opacity="0.4"/>
  <!-- 가위 중앙 -->
  <circle cx="256" cy="230" r="30" fill="#3949AB"/>
  <circle cx="244" cy="220" r="12" fill="none" stroke="#9FA8DA" stroke-width="3"/>
  <circle cx="268" cy="240" r="12" fill="none" stroke="#9FA8DA" stroke-width="3"/>
  <line x1="253" y1="213" x2="290" y2="188" stroke="#9FA8DA" stroke-width="4" stroke-linecap="round"/>
  <line x1="273" y1="249" x2="310" y2="274" stroke="#9FA8DA" stroke-width="4" stroke-linecap="round"/>
</svg>
