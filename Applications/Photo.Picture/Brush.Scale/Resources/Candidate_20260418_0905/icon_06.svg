<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <g clip-path="url(#clip06)">
    <!-- Layer 2: 작은 이미지가 대각선으로 확장되는 동적 줌인 구성 -->
    <!-- 원본 이미지 (좌상 작은 것) -->
    <rect x="110" y="110" width="200" height="200" rx="16" fill="#FFFFFF" opacity="0.2"/>
    <rect x="110" y="110" width="200" height="200" rx="16" fill="none" stroke="#FFFFFF" stroke-width="10"/>
    <!-- 작은 이미지 내용 (간단한 추상) -->
    <rect x="124" y="124" width="80" height="80" rx="6" fill="#FF8A65" opacity="0.8"/>
    <rect x="210" y="124" width="86" height="80" rx="6" fill="#FFE082" opacity="0.8"/>
    <rect x="124" y="210" width="80" height="86" rx="6" fill="#80DEEA" opacity="0.8"/>
    <rect x="210" y="210" width="86" height="86" rx="6" fill="#CE93D8" opacity="0.8"/>

    <!-- 확장 화살표들 (대각선 방향으로 뻗어나가는) -->
    <path d="M310 310 L540 540" stroke="#FFD54F" stroke-width="16" stroke-linecap="round" stroke-dasharray="24 16" opacity="0.8"/>
    <!-- 코너 확장 화살표 -->
    <path d="M310 110 Q460 110 540 200" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M110 310 Q110 460 200 540" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- 확대된 이미지 (우하 큰 것) -->
    <rect x="380" y="380" width="540" height="540" rx="28" fill="#FFFFFF" opacity="0.15"/>
    <rect x="380" y="380" width="540" height="540" rx="28" fill="none" stroke="#FFFFFF" stroke-width="14"/>
    <!-- 확대된 이미지 내용 — 선명한 큰 블록들 -->
    <rect x="396" y="396" width="240" height="240" rx="16" fill="#FF7043" opacity="0.9"/>
    <rect x="648" y="396" width="258" height="240" rx="16" fill="#FFCA28" opacity="0.9"/>
    <rect x="396" y="648" width="240" height="258" rx="16" fill="#40C4FF" opacity="0.9"/>
    <rect x="648" y="648" width="258" height="258" rx="16" fill="#E040FB" opacity="0.9"/>

    <!-- Layer 3: 확대 배율 표시 -->
    <rect x="386" y="780" width="520" height="92" rx="24" fill="#FFFFFF" opacity="0.2"/>
    <text x="646" y="842" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="76" fill="#FFFFFF" text-anchor="middle">4× BIGGER</text>

    <!-- 줌 아이콘 스파크 -->
    <circle cx="310" cy="310" r="28" fill="#FFD54F"/>
    <circle cx="310" cy="310" r="16" fill="#FFFFFF"/>
  </g>
</svg>
