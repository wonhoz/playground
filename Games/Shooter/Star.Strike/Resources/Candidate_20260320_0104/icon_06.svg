<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#020510"/>
  <!-- Bullet projectiles -->
  <ellipse cx="300" cy="400" rx="50" ry="20" fill="#5C6BC0" transform="rotate(-30,300,400)"/>
  <ellipse cx="512" cy="340" rx="50" ry="20" fill="#5C6BC0"/>
  <ellipse cx="724" cy="400" rx="50" ry="20" fill="#5C6BC0" transform="rotate(30,724,400)"/>
  <!-- Trails -->
  <line x1="250" y1="420" x2="180" y2="450" stroke="#5C6BC0" stroke-width="5" opacity="0.5"/>
  <line x1="512" y1="360" x2="512" y2="430" stroke="#5C6BC0" stroke-width="5" opacity="0.5"/>
  <line x1="774" y1="420" x2="844" y2="450" stroke="#5C6BC0" stroke-width="5" opacity="0.5"/>
  <!-- Stars they're heading toward -->
  <polygon points="300,600 314,642 360,642 322,668 336,710 300,684 264,710 278,668 240,642 286,642" fill="#5C6BC0"/>
  <polygon points="512,580 526,622 572,622 534,648 548,690 512,664 476,690 490,648 452,622 498,622" fill="#5C6BC0"/>
  <polygon points="724,600 738,642 784,642 746,668 760,710 724,684 688,710 702,668 664,642 710,642" fill="#5C6BC0"/>
  <!-- Impact glow -->
  <circle cx="300" cy="640" r="55" fill="none" stroke="#1A237E" stroke-width="6" opacity="0.6"/>
  <circle cx="512" cy="620" r="55" fill="none" stroke="#1A237E" stroke-width="6" opacity="0.6"/>
  <circle cx="724" cy="640" r="55" fill="none" stroke="#1A237E" stroke-width="6" opacity="0.6"/>
</svg>
