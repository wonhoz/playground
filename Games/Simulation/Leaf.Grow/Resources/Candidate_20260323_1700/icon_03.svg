<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1B2A1B"/>
  <!-- Layer 2: L-시스템 규칙 텍스트 + 가지 시각화 -->
  <!-- 규칙 텍스트 (상단) -->
  <rect x="60" y="80" width="904" height="200" rx="16" fill="#0D1A0D"/>
  <text x="512" y="160" font-size="60" fill="#66BB6A" text-anchor="middle" font-family="monospace" font-weight="bold">F → FF[+F][-F]</text>
  <text x="512" y="240" font-size="48" fill="#43A047" text-anchor="middle" font-family="monospace">axiom: F  iter: 4</text>
  <!-- 나무 가지 (하단 큰 영역) -->
  <!-- 줄기 -->
  <line x1="512" y1="940" x2="512" y2="680" stroke="#795548" stroke-width="40" stroke-linecap="round"/>
  <!-- 1차 가지 -->
  <line x1="512" y1="720" x2="310" y2="500" stroke="#8D6E63" stroke-width="26" stroke-linecap="round"/>
  <line x1="512" y1="720" x2="714" y2="500" stroke="#8D6E63" stroke-width="26" stroke-linecap="round"/>
  <!-- 2차 가지 좌 -->
  <line x1="310" y1="500" x2="180" y2="360" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
  <line x1="310" y1="500" x2="380" y2="340" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
  <!-- 2차 가지 우 -->
  <line x1="714" y1="500" x2="644" y2="340" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
  <line x1="714" y1="500" x2="844" y2="360" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
  <!-- 3차 잔가지 -->
  <line x1="180" y1="360" x2="120" y2="280" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="180" y1="360" x2="210" y2="270" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="380" y1="340" x2="340" y2="260" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="380" y1="340" x2="410" y2="250" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="644" y1="340" x2="614" y2="250" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="644" y1="340" x2="670" y2="260" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="844" y1="360" x2="814" y2="270" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <line x1="844" y1="360" x2="904" y2="280" stroke="#BCAAA4" stroke-width="10" stroke-linecap="round"/>
  <!-- Layer 3: 잎 + 꽃 -->
  <circle cx="120" cy="260" r="36" fill="#4CAF50"/>
  <circle cx="210" cy="252" r="32" fill="#66BB6A"/>
  <circle cx="340" cy="244" r="36" fill="#4CAF50"/>
  <circle cx="410" cy="234" r="32" fill="#66BB6A"/>
  <circle cx="614" cy="234" r="32" fill="#4CAF50"/>
  <circle cx="670" cy="244" r="36" fill="#66BB6A"/>
  <circle cx="814" cy="252" r="32" fill="#4CAF50"/>
  <circle cx="904" cy="260" r="36" fill="#66BB6A"/>
  <circle cx="170" cy="248" r="16" fill="#FF80AB"/>
  <circle cx="374" cy="230" r="16" fill="#FF80AB"/>
  <circle cx="648" cy="226" r="16" fill="#FFEB3B"/>
  <circle cx="858" cy="248" r="16" fill="#FF80AB"/>
</svg>
