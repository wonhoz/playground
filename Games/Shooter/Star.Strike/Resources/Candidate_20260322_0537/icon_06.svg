<!-- icon_06 | Hybrid | 레이어드 | 3-레이어 원근 별 배경 + 게임 HUD 오버레이 -->
<!-- 색조: 아이스 블루 + 다크 슬레이트 + 화이트 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
