<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 왼쪽 이미지 (차가운 색) -->
  <rect x="40" y="80" width="200" height="300" rx="14" fill="#001830" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>
  <circle cx="120" cy="190" r="50" fill="#00B8D4" opacity="0.6"/>
  <rect x="50" y="300" width="180" height="60" rx="0" fill="#001040"/>
  <!-- 오른쪽 이미지 (따뜻한 색) -->
  <rect x="272" y="80" width="200" height="300" rx="14" fill="#1A0020" stroke="#E040FB" stroke-width="3" filter="url(#glow)"/>
  <circle cx="392" cy="190" r="55" fill="#AA00FF" opacity="0.6"/>
  <rect x="282" y="300" width="180" height="60" rx="0" fill="#0D0018"/>
  <!-- 중앙 비교 핸들 -->
  <rect x="236" y="70" width="40" height="320" rx="8" fill="#16213E" stroke="#69F0AE" stroke-width="2" filter="url(#glow)"/>
  <circle cx="256" cy="230" r="26" fill="#0A0A1A" stroke="#69F0AE" stroke-width="3" filter="url(#glow)"/>
  <polygon points="244,230 228,215 228,245" fill="#00E5FF" filter="url(#glow)"/>
  <polygon points="268,230 284,215 284,245" fill="#E040FB" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="140" y="420" font-size="18" text-anchor="middle" fill="#00E5FF" font-family="Segoe UI" filter="url(#glow)">BEFORE</text>
  <text x="372" y="420" font-size="18" text-anchor="middle" fill="#E040FB" font-family="Segoe UI" filter="url(#glow)">AFTER</text>
  <text x="256" y="464" font-size="16" text-anchor="middle" fill="#546E7A" font-family="Segoe UI">Img.Compare</text>
</svg>