<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- Brick wall (right side) -->
  <rect x="500" y="300" width="190" height="80" rx="8" fill="#1A237E" opacity="0.85"/>
  <rect x="702" y="300" width="162" height="80" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="500" y="392" width="190" height="80" rx="8" fill="#1A237E" opacity="0.8"/>
  <rect x="702" y="392" width="162" height="80" rx="8" fill="#1A237E" opacity="0.75"/>
  <rect x="500" y="484" width="190" height="80" rx="8" fill="#1A237E" opacity="0.75"/>
  <rect x="702" y="484" width="162" height="80" rx="8" fill="#1A237E" opacity="0.7"/>
  <rect x="500" y="576" width="190" height="80" rx="8" fill="#5C6BC0" opacity="0.6"/>
  <rect x="702" y="576" width="162" height="80" rx="8" fill="#5C6BC0" opacity="0.55"/>
  <!-- Bomb body (sphere) -->
  <circle cx="300" cy="560" r="140" fill="#1A237E" opacity="0.9"/>
  <circle cx="300" cy="560" r="140" fill="none" stroke="#5C6BC0" stroke-width="16"/>
  <!-- Bomb shine -->
  <circle cx="258" cy="516" r="36" fill="#5C6BC0" opacity="0.3"/>
  <!-- Bomb fuse -->
  <path d="M300 420 Q340 380 360 320 Q380 260 430 240" fill="none" stroke="#9FA8DA" stroke-width="18" stroke-linecap="round"/>
  <!-- Fuse spark at top -->
  <circle cx="430" cy="240" r="20" fill="#9FA8DA" opacity="0.9"/>
  <line x1="430" y1="220" x2="410" y2="180" stroke="#9FA8DA" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="430" y1="220" x2="460" y2="185" stroke="#9FA8DA" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="430" y1="220" x2="450" y2="160" stroke="#9FA8DA" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Explosion-approaching warning glow -->
  <circle cx="300" cy="560" r="170" fill="none" stroke="#5C6BC0" stroke-width="8" opacity="0.25"/>
  <circle cx="300" cy="560" r="200" fill="none" stroke="#5C6BC0" stroke-width="4" opacity="0.15"/>
</svg>
