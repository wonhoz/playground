<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: warm amber-green gradient -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#1A2E00"/>
    </linearGradient>
    <linearGradient id="folder1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="folder2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="160" fill="url(#bg2)"/>

  <!-- Bottom folder (layer 3 - deepest) -->
  <rect x="200" y="460" width="624" height="360" rx="28" fill="url(#folder1Grad)" opacity="0.5" filter="url(#shadow2)"/>
  <rect x="200" y="410" width="220" height="60" rx="14" fill="#FFD54F" opacity="0.5"/>

  <!-- Middle folder (layer 2) -->
  <rect x="180" y="390" width="624" height="360" rx="28" fill="url(#folder1Grad)" opacity="0.75" filter="url(#shadow2)"/>
  <rect x="180" y="340" width="220" height="60" rx="14" fill="#FFD54F" opacity="0.75"/>

  <!-- Top folder (layer 1 - front) -->
  <rect x="160" y="320" width="624" height="360" rx="28" fill="url(#folder2Grad)" filter="url(#shadow2)"/>
  <rect x="160" y="270" width="220" height="60" rx="14" fill="#FFF59D"/>

  <!-- Folder lines (path entries) -->
  <rect x="210" y="410" width="380" height="22" rx="6" fill="#F57F17" opacity="0.6"/>
  <rect x="210" y="460" width="300" height="22" rx="6" fill="#F57F17" opacity="0.6"/>
  <rect x="210" y="510" width="440" height="22" rx="6" fill="#F57F17" opacity="0.4"/>
  <rect x="210" y="560" width="260" height="22" rx="6" fill="#EF6C00" opacity="0.5"/>

  <!-- Big checkmark badge (bottom right) -->
  <circle cx="740" cy="700" r="140" fill="#1A2E00"/>
  <circle cx="740" cy="700" r="128" fill="url(#checkGrad)"/>
  <path d="M660 700 L720 760 L840 620" fill="none" stroke="#FFFFFF" stroke-width="62"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
