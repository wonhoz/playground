<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 민트 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 입력 텍스트 박스 -->
  <rect x="80" y="260" width="340" height="500" rx="24" fill="white" stroke="#00897B" stroke-width="8"/>
  <text x="250" y="380" font-family="'Consolas', monospace" font-size="52" fill="#004D40" text-anchor="middle">Hello</text>
  <text x="250" y="450" font-family="'Consolas', monospace" font-size="52" fill="#80CBC4" text-anchor="middle">World</text>
  <text x="250" y="520" font-family="'Consolas', monospace" font-size="40" fill="#B2DFDB" text-anchor="middle">text...</text>
  <text x="160" y="310" font-family="'Segoe UI', sans-serif" font-size="44" fill="#00695C" font-weight="700">입력</text>
  <!-- 변환 화살표 -->
  <rect x="440" y="470" width="144" height="80" rx="40" fill="#00897B"/>
  <polygon points="540,450 620,510 540,570" fill="#004D40"/>
  <!-- Layer 3: 출력 텍스트 박스 -->
  <rect x="604" y="260" width="340" height="500" rx="24" fill="#E8F5E9" stroke="#388E3C" stroke-width="8"/>
  <text x="774" y="380" font-family="'Consolas', monospace" font-size="52" fill="#1B5E20" text-anchor="middle">HELLO</text>
  <text x="774" y="450" font-family="'Consolas', monospace" font-size="52" fill="#66BB6A" text-anchor="middle">WORLD</text>
  <text x="774" y="520" font-family="'Consolas', monospace" font-size="40" fill="#A5D6A7" text-anchor="middle">TEXT...</text>
  <text x="664" y="310" font-family="'Segoe UI', sans-serif" font-size="44" fill="#2E7D32" font-weight="700">출력</text>
  <!-- 하단 기능명 -->
  <text x="512" y="870" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="80" fill="#00695C" text-anchor="middle">Text Forge</text>
</svg>
