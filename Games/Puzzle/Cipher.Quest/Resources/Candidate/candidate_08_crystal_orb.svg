<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050020"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#aaaaff"/>
      <stop offset="40%" stop-color="#4444cc"/>
      <stop offset="100%" stop-color="#110044"/>
    </radialGradient>
    <radialGradient id="inner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8888ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="60" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="440" cy="100" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="420" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="430" cy="380" r="2" fill="#fff" opacity="0.6"/>
  <!-- Crystal orb -->
  <circle cx="256" cy="245" r="170" fill="url(#orb)"/>
  <circle cx="256" cy="245" r="170" fill="url(#inner)"/>
  <!-- Cipher symbols inside orb -->
  <text x="165" y="215" font-family="serif" font-size="28" fill="#ccccff" opacity="0.7" filter="url(#glow)">Σ Ψ Ω</text>
  <text x="178" y="255" font-family="serif" font-size="28" fill="#ffffff" opacity="0.9" filter="url(#glow)">Δ ? Λ</text>
  <text x="172" y="295" font-family="serif" font-size="28" fill="#ccccff" opacity="0.7" filter="url(#glow)">Φ Γ Θ</text>
  <!-- Orb base/stand -->
  <ellipse cx="256" cy="415" rx="80" ry="20" fill="#220044" opacity="0.8"/>
  <rect x="236" y="415" width="40" height="30" rx="6" fill="#330055"/>
  <ellipse cx="256" cy="445" rx="50" ry="12" fill="#220044"/>
  <!-- Glow rings around orb -->
  <circle cx="256" cy="245" r="180" fill="none" stroke="#6644ff" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="245" r="192" fill="none" stroke="#4422cc" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
</svg>