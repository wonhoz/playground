<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a18"/>
      <stop offset="100%" stop-color="#00332e"/>
    </linearGradient>
    <linearGradient id="hex1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4db6ac"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="hex2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80cbc4"/>
      <stop offset="100%" stop-color="#26a69a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hexagon grid: center + 6 around -->
  <!-- Center -->
  <polygon points="256,196 294,218 294,262 256,284 218,262 218,218" fill="url(#hex1)" stroke="#b2dfdb" stroke-width="2"/>
  <text x="256" y="246" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">.NET</text>
  <!-- Top -->
  <polygon points="256,108 294,130 294,174 256,196 218,174 218,130" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="158" font-family="monospace" font-size="10" fill="white" text-anchor="middle">C#</text>
  <!-- Top-right -->
  <polygon points="332,152 370,174 370,218 332,240 294,218 294,174" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.85"/>
  <text x="332" y="202" font-family="monospace" font-size="10" fill="white" text-anchor="middle">WPF</text>
  <!-- Bottom-right -->
  <polygon points="332,240 370,262 370,306 332,328 294,306 294,262" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.85"/>
  <text x="332" y="290" font-family="monospace" font-size="10" fill="white" text-anchor="middle">SQL</text>
  <!-- Bottom -->
  <polygon points="256,284 294,306 294,350 256,372 218,350 218,306" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.8"/>
  <text x="256" y="334" font-family="monospace" font-size="10" fill="white" text-anchor="middle">Git</text>
  <!-- Bottom-left -->
  <polygon points="180,240 218,262 218,306 180,328 142,306 142,262" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.8"/>
  <text x="180" y="290" font-family="monospace" font-size="10" fill="white" text-anchor="middle">Docker</text>
  <!-- Top-left -->
  <polygon points="180,152 218,174 218,218 180,240 142,218 142,174" fill="url(#hex2)" stroke="#b2dfdb" stroke-width="1.5" opacity="0.85"/>
  <text x="180" y="202" font-family="monospace" font-size="10" fill="white" text-anchor="middle">JS</text>
  <!-- Glow on center -->
  <polygon points="256,196 294,218 294,262 256,284 218,262 218,218" fill="none" stroke="#1de9b6" stroke-width="3" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="455" font-family="monospace" font-size="17" fill="#80cbc4" text-anchor="middle" letter-spacing="2" opacity="0.9">SKILL.CAST</text>
</svg>
