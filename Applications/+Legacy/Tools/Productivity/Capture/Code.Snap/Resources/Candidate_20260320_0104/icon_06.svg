<!-- Code.Snap icon_06: 붓 + 코드 줄 (brush painting code) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A1A0A"/>
  <!-- Brush handle (diagonal) -->
  <rect x="480" y="140" width="60" height="380" rx="30" transform="rotate(35 510 330)" fill="#2E7D32"/>
  <!-- Brush ferrule -->
  <rect x="360" y="400" width="80" height="50" rx="8" transform="rotate(35 400 425)" fill="#43A047"/>
  <!-- Brush bristles -->
  <ellipse cx="300" cy="520" rx="55" ry="90" transform="rotate(35 300 520)" fill="#66BB6A"/>
  <!-- Paint strokes (code lines being painted) -->
  <rect x="220" y="620" width="240" height="28" rx="8" fill="#43A047"/>
  <rect x="220" y="668" width="360" height="28" rx="8" fill="#43A047"/>
  <rect x="220" y="716" width="280" height="28" rx="8" fill="#43A047"/>
  <rect x="220" y="764" width="200" height="28" rx="8" fill="#2E7D32"/>
</svg>
