<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morse.Run - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    color: #00FFFF;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: #252525;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: #00FFFF;
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 12px;
    color: #ccc;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Morse.Run</h1>
<p class="subtitle">모스 부호 해독 + 사이드스크롤 러너 게임 — Icon Candidates (10)</p>
<div class="grid">
  <div class="card">
    <img src="candidate_01_neon_runner.svg" alt="01 neon_runner">
    <div class="card-num">#01</div>
    <div class="card-name">neon_runner</div>
  </div>
  <div class="card">
    <img src="candidate_02_retro_dash.svg" alt="02 retro_dash">
    <div class="card-num">#02</div>
    <div class="card-name">retro_dash</div>
  </div>
  <div class="card">
    <img src="candidate_03_electric_signal.svg" alt="03 electric_signal">
    <div class="card-num">#03</div>
    <div class="card-name">electric_signal</div>
  </div>
  <div class="card">
    <img src="candidate_04_jungle_dash.svg" alt="04 jungle_dash">
    <div class="card-num">#04</div>
    <div class="card-name">jungle_dash</div>
  </div>
  <div class="card">
    <img src="candidate_05_space_runner.svg" alt="05 space_runner">
    <div class="card-num">#05</div>
    <div class="card-name">space_runner</div>
  </div>
  <div class="card">
    <img src="candidate_06_fire_sprint.svg" alt="06 fire_sprint">
    <div class="card-num">#06</div>
    <div class="card-name">fire_sprint</div>
  </div>
  <div class="card">
    <img src="candidate_07_ice_cold.svg" alt="07 ice_cold">
    <div class="card-num">#07</div>
    <div class="card-name">ice_cold</div>
  </div>
  <div class="card">
    <img src="candidate_08_matrix_code.svg" alt="08 matrix_code">
    <div class="card-num">#08</div>
    <div class="card-name">matrix_code</div>
  </div>
  <div class="card">
    <img src="candidate_09_sunset_sprint.svg" alt="09 sunset_sprint">
    <div class="card-num">#09</div>
    <div class="card-name">sunset_sprint</div>
  </div>
  <div class="card">
    <img src="candidate_10_minimal_pulse.svg" alt="10 minimal_pulse">
    <div class="card-num">#10</div>
    <div class="card-name">minimal_pulse</div>
  </div>
</div>
</body>
</html>
