<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (BIG 가로 / BUN 세로, 교차점 B=(0,0)) -->
  <!-- 가로 하이라이트 배경 (row 0 전체) -->
  <rect x="205" y="205" width="614" height="210" fill="#FFD600" rx="14" opacity="0.95"/>
  <!-- 어두운 셀 -->
  <rect x="412" y="412" width="196" height="196" fill="#BF360C" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#BF360C" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#BF360C" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#BF360C" rx="10"/>
  <!-- 흰 셀 -->
  <rect x="212" y="212" width="196" height="196" fill="#FFFDE7" stroke="#E65100" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="212" width="196" height="196" fill="#FFFDE7" stroke="#E65100" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="212" width="196" height="196" fill="#FFFDE7" stroke="#E65100" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="412" width="196" height="196" fill="white" stroke="#E65100" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="#E65100" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- Layer 3: 글자 (BIG 가로 / BUN 세로) -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#E65100">B</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#BF360C">I</text>
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#BF360C">G</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="white">U</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="white">N</text>
  <!-- 클루 레이블 -->
  <text x="222" y="228" text-anchor="start" dominant-baseline="hanging" font-family="Arial,sans-serif" font-weight="700" font-size="40" fill="#E65100">1→</text>
</svg>
