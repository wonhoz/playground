  <line x1="444" y1="596" x2="438" y2="650" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <line x1="474" y1="598" x2="470" y2="656" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="512" y2="658" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <line x1="550" y1="598" x2="554" y2="656" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <line x1="580" y1="596" x2="586" y2="650" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <!-- SYS 텍스트 배지 -->
  <rect x="310" y="790" width="404" height="82" rx="22" fill="#1565C0"/>
  <text x="512" y="844" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle">SYS CLEAN</text>
