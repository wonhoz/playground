<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#BF360C"/>
  <!-- Layer 2: "ART" text (large outline) -->
  <text x="512" y="600" font-family="Arial Black,Arial" font-size="360" font-weight="900" fill="none" stroke="white" stroke-width="8" text-anchor="middle">ART</text>
  <!-- Layer 3: ASCII characters filling inside ART -->
  <!-- Simulate by overlaying small chars at low opacity -->
  <text x="200" y="380" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.8">@#$%@#$%@#$%@#$</text>
  <text x="200" y="412" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.7">$%@#$%@#$%@#$%@</text>
  <text x="200" y="444" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.6">#$%@#$%@#$%@#$%</text>
  <text x="200" y="476" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.5">@#$%@#$%@#$%@#$</text>
  <text x="200" y="508" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.4">$%@#$%@#$%@#$%@</text>
  <text x="200" y="540" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.6">#$%@#$%@#$%@#$%</text>
  <text x="200" y="572" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.7">@#$%@#$%@#$%@#$</text>
  <text x="200" y="604" font-family="Consolas,monospace" font-size="22" fill="white" opacity="0.5">$%@#$%@#$%@#$%@</text>
</svg>