<svg xmlns="http://www.w3.org/2020/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | 압축 폴더 아이콘 + 돋보기 + 내부 파일 목록 | 중앙 심볼 | 라임+파랑+주황 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCE775"/>
    </linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#33691E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Large folder (archive folder) -->
  <rect x="160" y="280" width="640" height="460" rx="28" fill="#FF6F00" filter="url(#sh6)"/>
  <rect x="160" y="240" width="280" height="70" rx="20" fill="#FF6F00"/>
  <!-- Folder open effect -->
  <rect x="184" y="308" width="592" height="408" rx="20" fill="#FFF8F0"/>

  <!-- ZIP teeth decoration on folder -->
  <rect x="480" y="248" width="18" height="16" rx="4" fill="#FFD700"/>
  <rect x="504" y="248" width="18" height="16" rx="4" fill="#FFD700"/>
  <rect x="528" y="248" width="18" height="16" rx="4" fill="#FFD700"/>
  <rect x="552" y="248" width="18" height="16" rx="4" fill="#FFD700"/>
  <!-- ZIP text on tab -->
  <rect x="200" y="248" width="70" height="32" rx="8" fill="#E65100"/>
  <text x="235" y="264" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">ZIP</text>

  <!-- File list inside folder -->
  <rect x="200" y="332" width="556" height="32" fill="#DCE775" rx="6"/>
  <text x="225" y="348" font-family="Arial, sans-serif" font-size="18" fill="#33691E"
        dominant-baseline="middle">📝  main.cs  · 14.2 KB · 78%</text>

  <rect x="200" y="370" width="556" height="32" fill="white" rx="6"/>
  <text x="225" y="386" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">🖼  banner.png  · 5.2 MB · 8%</text>

  <rect x="200" y="408" width="556" height="32" fill="#F9FBE7" rx="6"/>
  <text x="225" y="424" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">📄  README.md  · 4.8 KB · 82%</text>

  <rect x="200" y="446" width="556" height="32" fill="white" rx="6"/>
  <text x="225" y="462" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">📕  manual.pdf  · 2.1 MB · 65%</text>

  <rect x="200" y="484" width="556" height="32" fill="#F9FBE7" rx="6"/>
  <text x="225" y="500" font-family="Arial, sans-serif" font-size="18" fill="#546E7A"
        dominant-baseline="middle">🎵  music.mp3  · 8.4 MB · 12%</text>

  <!-- Summary bar inside folder -->
  <rect x="200" y="540" width="556" height="36" fill="#FF6F00" rx="10"/>
  <text x="478" y="558" font-family="Arial, sans-serif" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">127 files · 48.3 MB → 12.1 MB (75%)</text>

  <!-- Magnifier badge (overlapping, top right) -->
  <circle cx="780" cy="280" r="100" fill="#1565C0" filter="url(#sh6)"/>
  <circle cx="780" cy="280" r="74" fill="#E3F2FD"/>
  <!-- Eye inside magnifier (Peek) -->
  <ellipse cx="780" cy="280" rx="44" ry="30" fill="#1565C0"/>
  <circle cx="780" cy="280" r="16" fill="#0D47A1"/>
  <circle cx="773" cy="273" r="6" fill="white"/>
  <!-- Handle -->
  <line x1="840" y1="340" x2="900" y2="400" stroke="#1565C0" stroke-width="28" stroke-linecap="round"/>
  <line x1="840" y1="340" x2="900" y2="400" stroke="#42A5F5" stroke-width="18" stroke-linecap="round"/>

  <!-- Format chips (bottom) -->
  <rect x="184" y="780" width="130" height="40" rx="14" fill="#1565C0" filter="url(#sh6)"/>
  <text x="249" y="800" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">ZIP · 7Z</text>
  <rect x="330" y="780" width="130" height="40" rx="14" fill="#E53935" filter="url(#sh6)"/>
  <text x="395" y="800" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">RAR · GZ</text>
  <rect x="476" y="780" width="130" height="40" rx="14" fill="#7B1FA2" filter="url(#sh6)"/>
  <text x="541" y="800" font-family="Arial Black, sans-serif" font-size="20" fill="white"
        text-anchor="middle" dominant-baseline="middle">TAR · XZ</text>
</svg>
