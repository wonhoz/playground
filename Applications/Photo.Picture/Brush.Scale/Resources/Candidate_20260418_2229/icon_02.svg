<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background hot pink -->
  <rect width="1024" height="1024" rx="190" fill="#F8BBD9"/>
  <!-- Layer 2: Scale factor buttons 2x / 4x / 8x vertical stack -->
  <rect x="262" y="160" width="500" height="180" rx="28" fill="#E91E8C"/>
  <text x="512" y="278" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">2x</text>
  <rect x="262" y="380" width="500" height="180" rx="28" fill="#AD1457"/>
  <text x="512" y="498" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">4x</text>
  <rect x="262" y="600" width="500" height="180" rx="28" fill="#880E4F"/>
  <text x="512" y="718" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">8x</text>
  <!-- Layer 3: Selection indicator on 4x -->
  <rect x="254" y="372" width="516" height="196" rx="32" fill="none" stroke="#FFD740" stroke-width="14"/>
  <circle cx="812" cy="470" r="26" fill="#FFD740"/>
  <path d="M796 470 L806 482 L828 456" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
