<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D1B0E"/>
      <stop offset="100%" stop-color="#1A0F07"/>
    </linearGradient>
    <!-- 지층 색상들 -->
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="50%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CD853F"/>
      <stop offset="50%" stop-color="#DEB887"/>
      <stop offset="100%" stop-color="#CD853F"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B8E23"/>
      <stop offset="50%" stop-color="#9ACD32"/>
      <stop offset="100%" stop-color="#6B8E23"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4682B4"/>
      <stop offset="50%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4682B4"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9370DB"/>
      <stop offset="50%" stop-color="#BA55D3"/>
      <stop offset="100%" stop-color="#9370DB"/>
    </linearGradient>
    <linearGradient id="layer6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="50%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#E8D5A3"/>
    </linearGradient>
    <filter id="shadow04">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <!-- 배경 절벽 실루엣 암시 -->
  <rect x="200" y="240" width="624" height="560" rx="12" fill="#1E1209" opacity="0.6"/>

  <!-- Layer2: 지층 단면 (위에서 아래로 최신→오래된 순) -->
  <!-- 지층 6: 최근 레이어 (가장 위) - 크림색 -->
  <path d="M 212 260 C 350 248 500 272 812 256 L 812 316 C 650 328 400 308 212 320 Z" fill="url(#layer6)" filter="url(#shadow04)"/>

  <!-- 지층 5: 보라 -->
  <path d="M 212 320 C 400 308 650 328 812 316 L 812 386 C 660 398 410 374 212 390 Z" fill="url(#layer5)" filter="url(#shadow04)"/>

  <!-- 지층 4: 파랑 -->
  <path d="M 212 390 C 410 374 660 398 812 386 L 812 466 C 640 482 390 454 212 470 Z" fill="url(#layer4)" filter="url(#shadow04)"/>

  <!-- 지층 3: 초록 -->
  <path d="M 212 470 C 390 454 640 482 812 466 L 812 556 C 620 574 370 546 212 560 Z" fill="url(#layer3)" filter="url(#shadow04)"/>

  <!-- 지층 2: 밝은 갈색 -->
  <path d="M 212 560 C 370 546 620 574 812 556 L 812 656 C 600 670 360 640 212 658 Z" fill="url(#layer2)" filter="url(#shadow04)"/>

  <!-- 지층 1: 짙은 갈색 (가장 오래된 레이어) -->
  <path d="M 212 658 C 360 640 600 670 812 656 L 812 780 C 590 794 350 764 212 780 Z" fill="url(#layer1)" filter="url(#shadow04)"/>

  <!-- Layer3: 라벨 및 디테일 -->
  <!-- 분리선 (흰 실선) -->
  <line x1="212" y1="320" x2="812" y2="316" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="212" y1="390" x2="812" y2="386" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="212" y1="470" x2="812" y2="466" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="212" y1="560" x2="812" y2="556" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="212" y1="658" x2="812" y2="656" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>

  <!-- 연도 라벨 -->
  <text x="836" y="295" font-family="monospace" font-size="20" fill="#F5E6C8" opacity="0.9">2024</text>
  <text x="836" y="360" font-family="monospace" font-size="20" fill="#BA55D3" opacity="0.9">2023</text>
  <text x="836" y="434" font-family="monospace" font-size="20" fill="#87CEEB" opacity="0.9">2022</text>
  <text x="836" y="520" font-family="monospace" font-size="20" fill="#9ACD32" opacity="0.9">2021</text>
  <text x="836" y="614" font-family="monospace" font-size="20" fill="#DEB887" opacity="0.9">2020</text>
  <text x="836" y="720" font-family="monospace" font-size="20" fill="#A0522D" opacity="0.9">2019</text>

  <!-- 커밋 아이콘 (원형) 각 레이어에 -->
  <circle cx="420" cy="288" r="10" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="580" cy="352" r="10" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="350" cy="428" r="10" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="620" cy="513" r="10" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="450" cy="607" r="10" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="530" cy="717" r="10" fill="#FFFFFF" opacity="0.7"/>

  <!-- 제목 -->
  <text x="512" y="222" font-family="monospace" font-size="26" font-weight="bold" fill="#CD853F" text-anchor="middle">Commit History</text>
</svg>
