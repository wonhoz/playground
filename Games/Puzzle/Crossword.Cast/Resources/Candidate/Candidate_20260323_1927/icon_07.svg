  <text x="284" y="314" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#1E40AF">S</text>
  <text x="414" y="314" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#1E40AF">T</text>
