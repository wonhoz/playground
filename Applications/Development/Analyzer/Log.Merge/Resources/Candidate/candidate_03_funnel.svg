<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0044AA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input files at top -->
  <rect x="56" y="60" width="80" height="56" rx="8" fill="#003366" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="96" y="88" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" fill="#00D4FF">.log</text>
  <text x="96" y="104" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#0088CC">app</text>
  <rect x="216" y="60" width="80" height="56" rx="8" fill="#003366" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="256" y="88" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" fill="#00D4FF">.log</text>
  <text x="256" y="104" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#0088CC">sys</text>
  <rect x="376" y="60" width="80" height="56" rx="8" fill="#003366" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="416" y="88" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" fill="#00D4FF">.log</text>
  <text x="416" y="104" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#0088CC">net</text>
  <!-- Lines flowing to funnel -->
  <line x1="96" y1="116" x2="200" y2="170" stroke="#00D4FF" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="116" x2="256" y2="170" stroke="#00D4FF" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="416" y1="116" x2="312" y2="170" stroke="#00D4FF" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <!-- Funnel shape -->
  <path d="M88 170 L424 170 L300 310 L212 310 Z" fill="url(#funnelGrad)" opacity="0.15" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <!-- Funnel neck -->
  <rect x="212" y="310" width="88" height="80" rx="4" fill="url(#funnelGrad)" opacity="0.2" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <!-- Merged output -->
  <path d="M232 390 L232 430 M280 390 L280 430" stroke="#00D4FF" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  <rect x="180" y="430" width="152" height="56" rx="10" fill="#003366" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <text x="256" y="460" font-family="'Courier New', monospace" font-size="13" text-anchor="middle" fill="#00D4FF" filter="url(#glow)">merged.log</text>
  <text x="256" y="476" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#0088CC">5,582 lines</text>
  <!-- Filter particles in funnel -->
  <circle cx="188" cy="220" r="4" fill="#00D4FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="3" fill="#00D4FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="324" cy="215" r="4" fill="#00D4FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="220" cy="268" r="3" fill="#00AADD" opacity="0.5" filter="url(#glow)"/>
  <circle cx="290" cy="272" r="3" fill="#00AADD" opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="290" r="4" fill="#00D4FF" opacity="0.7" filter="url(#glow)"/>
</svg>
