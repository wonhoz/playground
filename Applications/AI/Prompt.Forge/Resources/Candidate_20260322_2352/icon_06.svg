<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E293B"/>
  <!-- Layer 2: Version cards stacked diagonally -->
  <!-- v1 card (bottom/back) -->
  <g transform="translate(20,20)">
    <rect x="180" y="290" width="430" height="300" rx="20" fill="#1D4ED8" opacity="0.75"/>
    <text x="395" y="460" font-family="Arial,sans-serif" font-size="80" fill="#93C5FD" text-anchor="middle" font-weight="bold" opacity="0.6">v1</text>
  </g>
  <!-- v2 card (middle) -->
  <g transform="translate(50,0)">
    <rect x="220" y="310" width="430" height="300" rx="20" fill="#7C3AED" opacity="0.85"/>
    <text x="435" y="480" font-family="Arial,sans-serif" font-size="80" fill="#C4B5FD" text-anchor="middle" font-weight="bold" opacity="0.7">v2</text>
  </g>
  <!-- v3 card (top/front) -->
  <rect x="265" y="330" width="470" height="310" rx="20" fill="#831843"/>
  <rect x="265" y="330" width="470" height="310" rx="20" fill="none" stroke="#F472B6" stroke-width="3"/>
  <!-- Layer 3: v3 content -->
  <text x="500" y="510" font-family="Arial,sans-serif" font-size="90" fill="#F9A8D4" text-anchor="middle" font-weight="bold">v3</text>
  <rect x="305" y="545" width="380" height="12" rx="4" fill="#F472B6" opacity="0.5"/>
  <rect x="305" y="570" width="300" height="12" rx="4" fill="#F472B6" opacity="0.35"/>
  <!-- Latest badge -->
  <rect x="568" y="342" width="90" height="26" rx="13" fill="#EC4899"/>
  <text x="613" y="359" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">최신</text>
</svg>