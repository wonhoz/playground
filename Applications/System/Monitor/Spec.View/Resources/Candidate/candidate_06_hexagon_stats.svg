<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a2a"/>
      <stop offset="100%" style="stop-color:#040d14"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Central hexagon -->
  <polygon points="256,80 360,138 360,254 256,312 152,254 152,138" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.4"/>
  <polygon points="256,110 336,155 336,245 256,290 176,245 176,155" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.3"/>
  <!-- Stats radar lines -->
  <line x1="256" y1="196" x2="256" y2="80" stroke="#2196f3" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="360" y2="138" stroke="#4caf50" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="360" y2="254" stroke="#ff9800" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="256" y2="312" stroke="#f44336" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="152" y2="254" stroke="#9c27b0" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="196" x2="152" y2="138" stroke="#00bcd4" stroke-width="2" opacity="0.6"/>
  <!-- Data polygon -->
  <polygon points="256,120 330,158 335,234 256,278 177,240 170,158" fill="#2196f3" opacity="0.15" stroke="#2196f3" stroke-width="2"/>
  <!-- Corner labels -->
  <text x="256" y="74" text-anchor="middle" fill="#2196f3" font-size="14" font-family="monospace">CPU</text>
  <text x="372" y="140" fill="#4caf50" font-size="14" font-family="monospace">RAM</text>
  <text x="372" y="260" fill="#ff9800" font-size="14" font-family="monospace">GPU</text>
  <text x="256" y="330" text-anchor="middle" fill="#f44336" font-size="14" font-family="monospace">DSK</text>
  <text x="80" y="260" fill="#9c27b0" font-size="14" font-family="monospace">NET</text>
  <text x="80" y="140" fill="#00bcd4" font-size="14" font-family="monospace">TMP</text>
  <!-- Bottom info bar -->
  <rect x="80" y="380" width="352" height="48" rx="12" fill="#0d1f2d" stroke="#0288d1" stroke-width="1"/>
  <rect x="96" y="394" width="200" height="10" rx="4" fill="#0288d1" opacity="0.5"/>
