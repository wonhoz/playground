<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Comb: organize media -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Comb spine (horizontal bar) -->
  <rect x="180" y="380" width="664" height="70" rx="35" fill="#7B1FA2"/>
  <!-- Comb teeth (downward) -->
  <rect x="230" y="450" width="50" height="220" rx="25" fill="#4A148C"/>
  <rect x="316" y="450" width="50" height="260" rx="25" fill="#4A148C"/>
  <rect x="402" y="450" width="50" height="200" rx="25" fill="#4A148C"/>
  <rect x="488" y="450" width="50" height="280" rx="25" fill="#4A148C"/>
  <rect x="574" y="450" width="50" height="210" rx="25" fill="#4A148C"/>
  <rect x="660" y="450" width="50" height="250" rx="25" fill="#4A148C"/>
  <rect x="746" y="450" width="50" height="190" rx="25" fill="#4A148C"/>
  <!-- Media thumbnails being sorted (above comb, scattered -> ordered) -->
  <!-- Disordered left side -->
  <rect x="180" y="220" width="80" height="60" rx="8" fill="#CE93D8" opacity="0.5" transform="rotate(-12 220 250)"/>
  <rect x="290" y="200" width="80" height="60" rx="8" fill="#CE93D8" opacity="0.5" transform="rotate(8 330 230)"/>
  <!-- Ordered right side (sorted by comb) -->
  <rect x="480" y="215" width="80" height="60" rx="8" fill="#CE93D8" opacity="0.9"/>
  <rect x="576" y="215" width="80" height="60" rx="8" fill="#CE93D8" opacity="0.9"/>
  <rect x="672" y="215" width="80" height="60" rx="8" fill="#CE93D8" opacity="0.9"/>
  <!-- Arrow showing direction -->
  <path d="M390 250 L440 250" stroke="#CE93D8" stroke-width="10" stroke-linecap="round"/>
  <path d="M430 230 L460 250 L430 270" stroke="#CE93D8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
