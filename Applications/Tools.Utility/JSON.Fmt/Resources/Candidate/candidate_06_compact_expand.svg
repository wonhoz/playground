  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Compact JSON (top) -->
  <rect x="60" y="70" width="392" height="70" rx="10" fill="#1a0a1a"/>
  <text x="80" y="100" font-family="monospace" font-size="12" fill="#e74c3c">{"n":"J","v":1,"ok":true,"d":[1,2]}</text>
  <!-- Label -->
  <rect x="60" y="148" width="90" height="22" rx="6" fill="url(#compact)"/>
  <text x="105" y="164" text-anchor="middle" font-family="Arial" font-size="12" fill="white">COMPACT</text>
  <!-- Arrows -->
  <line x1="256" y1="178" x2="256" y2="222" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polygon points="246,218 256,238 266,218" fill="white" opacity="0.8"/>
  <line x1="256" y1="330" x2="256" y2="286" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polygon points="246,290 256,270 266,290" fill="white" opacity="0.8"/>
  <!-- Expanded JSON (bottom) -->
  <rect x="60" y="246" width="392" height="188" rx="10" fill="#0a1a0a"/>
  <text x="80" y="274" font-family="monospace" font-size="12" fill="#2ecc71">{</text>
  <text x="80" y="298" font-family="monospace" font-size="12" fill="#27ae60">  "n": </text>
  <text x="146" y="298" font-family="monospace" font-size="12" fill="#f7d774">"J"</text>
  <text x="80" y="322" font-family="monospace" font-size="12" fill="#27ae60">  "v": </text>
  <text x="146" y="322" font-family="monospace" font-size="12" fill="#f0883e">1</text>
  <text x="80" y="346" font-family="monospace" font-size="12" fill="#27ae60">  "ok": </text>
  <text x="152" y="346" font-family="monospace" font-size="12" fill="#79c0ff">true</text>
  <text x="80" y="370" font-family="monospace" font-size="12" fill="#27ae60">  "d": [1, 2]</text>
  <text x="80" y="394" font-family="monospace" font-size="12" fill="#2ecc71">}</text>
  <!-- Label -->
