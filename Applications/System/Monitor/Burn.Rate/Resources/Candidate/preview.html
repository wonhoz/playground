<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Burn.Rate - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #FF8C00; margin-bottom: 8px; }
  p { text-align: center; color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 14px; text-align: center; }
  .item img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .item span { display: block; margin-top: 8px; font-size: 12px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Burn.Rate</h1>
<p>배터리 소모율 모니터 - 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_battery_flame.svg" alt="01"/><span>01 battery_flame</span></div>
  <div class="item"><img src="candidate_02_gauge_meter.svg" alt="02"/><span>02 gauge_meter</span></div>
  <div class="item"><img src="candidate_03_battery_drip.svg" alt="03"/><span>03 battery_drip</span></div>
  <div class="item"><img src="candidate_04_lightning_drain.svg" alt="04"/><span>04 lightning_drain</span></div>
  <div class="item"><img src="candidate_05_graph_trend.svg" alt="05"/><span>05 graph_trend</span></div>
  <div class="item"><img src="candidate_06_lava_battery.svg" alt="06"/><span>06 lava_battery</span></div>
  <div class="item"><img src="candidate_07_hourglass_drain.svg" alt="07"/><span>07 hourglass_drain</span></div>
  <div class="item"><img src="candidate_08_neon_bar.svg" alt="08"/><span>08 neon_bar</span></div>
  <div class="item"><img src="candidate_09_ice_hot.svg" alt="09"/><span>09 ice_hot</span></div>
  <div class="item"><img src="candidate_10_digital_monitor.svg" alt="10"/><span>10 digital_monitor</span></div>
</div>
</body>
</html>
