<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="blob1" cx="30%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E040FB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="70%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000050"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Color blobs (blurred background) -->
  <circle cx="160" cy="160" r="150" fill="url(#blob1)" filter="url(#blur)"/>
  <circle cx="360" cy="360" r="150" fill="url(#blob2)" filter="url(#blur)"/>
  <!-- Glass main panel -->
  <rect x="80" y="100" width="352" height="280" rx="20" fill="url(#glassGrad)" stroke="white" stroke-opacity="0.2" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Glass inner dividers -->
  <rect x="80" y="100" width="352" height="52" rx="20" fill="white" opacity="0.08"/>
  <line x1="80" y1="152" x2="432" y2="152" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="192" y1="152" x2="192" y2="380" stroke="white" stroke-width="1" opacity="0.15"/>
  <!-- Navbar content -->
  <circle cx="116" cy="126" r="12" fill="#E040FB" opacity="0.6"/>
  <rect x="140" y="120" width="60" height="12" rx="6" fill="white" opacity="0.4"/>
  <rect x="280" y="118" width="40" height="10" rx="5" fill="white" opacity="0.25"/>
  <rect x="332" y="118" width="40" height="10" rx="5" fill="white" opacity="0.25"/>
  <rect x="384" y="118" width="32" height="10" rx="5" fill="white" opacity="0.25"/>
  <!-- Sidebar content -->
  <rect x="96" y="168" width="80" height="10" rx="5" fill="white" opacity="0.3"/>
  <rect x="96" y="186" width="64" height="8" rx="4" fill="white" opacity="0.2"/>
  <rect x="96" y="202" width="72" height="8" rx="4" fill="white" opacity="0.2"/>
  <rect x="96" y="218" width="60" height="8" rx="4" fill="white" opacity="0.15"/>
  <!-- Main content area -->
  <rect x="208" y="164" width="208" height="100" rx="10" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="224" y="180" width="120" height="12" rx="6" fill="#00BCD4" opacity="0.5"/>
  <rect x="224" y="200" width="176" height="8" rx="4" fill="white" opacity="0.2"/>
  <rect x="224" y="216" width="150" height="8" rx="4" fill="white" opacity="0.15"/>
  <rect x="224" y="232" width="160" height="8" rx="4" fill="white" opacity="0.15"/>
  <!-- Bottom cards -->
  <rect x="208" y="280" width="95" height="84" rx="10" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="320" y="280" width="95" height="84" rx="10" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Floating label -->
  <rect x="136" y="400" width="240" height="44" rx="22" fill="white" opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="256" y="427" font-family="Arial, sans-serif" font-size="15" text-anchor="middle" fill="white" opacity="0.7" font-weight="600" letter-spacing="2">LAYOUT.FORGE</text>
</svg>
