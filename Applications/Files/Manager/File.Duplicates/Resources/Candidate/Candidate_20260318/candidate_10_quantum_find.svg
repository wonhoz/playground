<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#04100e"/>
    </linearGradient>
    <radialGradient id="qGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#22D3EE;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 양자 돋보기 외부 링 -->
  <circle cx="220" cy="220" r="130" fill="url(#qGrad)" opacity="0.15" filter="url(#strongGlow)"/>
  <!-- 양자 궤도들 -->
  <ellipse cx="220" cy="220" rx="100" ry="35" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="220" cy="220" rx="100" ry="35" fill="none" stroke="#22D3EE" stroke-width="1.2" opacity="0.35" transform="rotate(60 220 220)"/>
  <ellipse cx="220" cy="220" rx="100" ry="35" fill="none" stroke="#06B6D4" stroke-width="1.2" opacity="0.35" transform="rotate(120 220 220)"/>
  <!-- 돋보기 원 -->
  <circle cx="220" cy="220" r="120" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <circle cx="220" cy="220" r="120" fill="#06B6D4" opacity="0.04"/>
  <!-- 돋보기 내부 - 파일들 -->
  <!-- 파일 1 -->
  <rect x="140" y="180" width="50" height="62" rx="5" fill="#06B6D4" opacity="0.7"/>
  <polygon points="140,180 165,180 165,160 190,180" fill="#22D3EE" opacity="0.65"/>
  <line x1="152" y1="200" x2="182" y2="200" stroke="#E0F7FA" stroke-width="2" opacity="0.6"/>
  <line x1="152" y1="214" x2="172" y2="214" stroke="#E0F7FA" stroke-width="1.5" opacity="0.5"/>
  <!-- 파일 2 (복사본 - 겹쳐진) -->
  <rect x="157" y="190" width="50" height="62" rx="5" fill="#22D3EE" opacity="0.55" stroke="#67E8F9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="157,190 182,190 182,170 207,190" fill="#06B6D4" opacity="0.5" stroke="#67E8F9" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- 복사 수식어 -->
  <circle cx="217" cy="178" r="15" fill="#22D3EE" opacity="0.9" filter="url(#glow)"/>
  <text x="217" y="183" text-anchor="middle" font-family="Arial" font-size="12" fill="#030508" font-weight="bold">=</text>
  <!-- 돋보기 손잡이 -->
  <line x1="320" y1="320" x2="400" y2="400" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="320" y1="320" x2="400" y2="400" stroke="#67E8F9" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 전자(파티클)들 -->
  <circle cx="340" cy="220" r="8" fill="#22D3EE" opacity="0.85" filter="url(#glow)"/>
  <circle cx="100" cy="220" r="8" fill="#06B6D4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="260" cy="100" r="7" fill="#67E8F9" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="340" r="7" fill="#22D3EE" opacity="0.75" filter="url(#glow)"/>
  <!-- 파동 함수 붕괴 표시 -->
  <path d="M 130,300 Q 170,270 200,300 Q 230,330 260,300" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,4"/>
  <!-- 결과 텍스트 -->
  <text x="300" y="440" text-anchor="middle" font-family="monospace" font-size="12" fill="#22D3EE" opacity="0.7">QUANTUM FIND</text>
  <text x="300" y="460" text-anchor="middle" font-family="monospace" font-size="11" fill="#06B6D4" opacity="0.5">SUPERPOSITION</text>
</svg>