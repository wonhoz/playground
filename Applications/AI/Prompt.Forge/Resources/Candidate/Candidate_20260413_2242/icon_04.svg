<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
  <!-- Anvil base (stylized trapezoid) -->
  <path d="M 280,560 L 744,560 L 720,490 L 304,490 Z" fill="#455A64" stroke="#263238" stroke-width="14" stroke-linejoin="round"/>
  <rect x="360" y="570" width="304" height="56" rx="14" fill="#37474F" stroke="#263238" stroke-width="12"/>
  <!-- Anvil top surface (horn and body) -->
  <path d="M 220,490 L 740,490 L 740,400 L 560,400 L 510,340 L 460,400 L 220,400 Z" fill="#546E7A" stroke="#263238" stroke-width="16" stroke-linejoin="round"/>
  <!-- Hammer -->
  <g transform="rotate(-35 600 320)">
    <!-- Handle -->
    <rect x="560" y="170" width="24" height="200" rx="12" fill="#8D6E63" stroke="#4E342E" stroke-width="10"/>
    <!-- Hammer head -->
    <rect x="516" y="148" width="112" height="70" rx="14" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  </g>
  <!-- Sparks (impact effect) -->
  <circle cx="510" cy="395" r="12" fill="#FFD93D"/>
  <line x1="510" y1="395" x2="470" y2="350" stroke="#FFD93D" stroke-width="8" stroke-linecap="round"/>
  <line x1="510" y1="395" x2="548" y2="348" stroke="#FFD93D" stroke-width="8" stroke-linecap="round"/>
  <line x1="510" y1="395" x2="554" y2="374" stroke="#FF9800" stroke-width="6" stroke-linecap="round"/>
  <line x1="510" y1="395" x2="462" y2="372" stroke="#FF9800" stroke-width="6" stroke-linecap="round"/>
  <circle cx="490" cy="345" r="7" fill="#FFD93D" opacity="0.8"/>
  <circle cx="552" cy="344" r="5" fill="#FF9800" opacity="0.7"/>
  <!-- FORGE badge -->
  <rect x="236" y="748" width="552" height="116" rx="36" fill="#6A1B9A" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">FORGE</text>
</svg>
