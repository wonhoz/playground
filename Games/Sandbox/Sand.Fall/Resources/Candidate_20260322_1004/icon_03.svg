  <rect x="812" y="492" width="12" height="20" rx="2" fill="#FF6D00"/>
  <rect x="830" y="486" width="10" height="26" rx="2" fill="#FFC107"/>
  <rect x="848" y="492" width="12" height="20" rx="2" fill="#FF6D00"/>
  <rect x="864" y="500" width="10" height="14" rx="2" fill="#FF4500"/>
