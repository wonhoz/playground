<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1f0a"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="flower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- folder -->
  <path d="M90 215 L90 385 L410 385 L410 240 L220 240 L190 215 Z" fill="url(#folder)"/>
  <path d="M90 215 L90 244 L410 244 L410 240 L220 240 L190 215 Z" fill="#43a047"/>
  <ellipse cx="146" cy="230" rx="26" ry="7" fill="white" opacity="0.25"/>
  <!-- flower 1 -->
  <g transform="translate(150,145)">
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9" transform="rotate(240)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="url(#flower)" opacity="0.9" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="14" fill="#fff176"/>
  </g>
  <!-- flower 2 smaller -->
  <g transform="translate(340,125) scale(0.7)">
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#80deea" opacity="0.9"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#80deea" opacity="0.9" transform="rotate(72)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#80deea" opacity="0.9" transform="rotate(144)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#80deea" opacity="0.9" transform="rotate(216)"/>
    <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#80deea" opacity="0.9" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="14" fill="#fff9c4"/>
  </g>
  <!-- sparkles -->
  <path d="M400 200 L403 212 L415 215 L403 218 L400 230 L397 218 L385 215 L397 212 Z" fill="#fff9c4" opacity="0.8"/>
  <path d="M100 310 L103 320 L113 323 L103 326 L100 336 L97 326 L87 323 L97 320 Z" fill="#c8e6c9" opacity="0.6"/>
</svg>
