  <circle cx="512" cy="512" r="220" fill="none" stroke="#33691E" stroke-width="12" opacity="0.5"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#33691E" stroke-width="12" opacity="0.6"/>
  <!-- Radar sweep -->
  <path d="M512 512 L512 192" stroke="#AED581" stroke-width="12" opacity="0.8"/>
  <path d="M512 512 L768 300" stroke="#AED581" stroke-width="6" opacity="0.3"/>
  <path d="M512 512 L512 192" fill="none" stroke="#AED581" stroke-width="2" opacity="0.1"/>
