<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금/따뜻한 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="furnace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 주조 깔때기 (cast) -->
  <!-- 입구 깔때기 위쪽 -->
  <polygon points="200,160 824,160 680,440 344,440" fill="url(#furnace)"/>
  <!-- 깔때기 아래 통로 -->
  <rect x="420" y="440" width="184" height="180" rx="16" fill="#BF360C"/>
  <!-- 출구 새 포맷 박스 -->
  <rect x="350" y="680" width="324" height="140" rx="28" fill="#1565C0"/>
  <text x="512" y="775" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="90" fill="white" text-anchor="middle">ICO</text>
  <!-- Layer 3: 입력 파일 아이콘들 (위에 떠있는 형태) -->
  <rect x="130" y="60" width="120" height="90" rx="10" fill="#4CAF50"/>
  <text x="190" y="126" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle">SVG</text>
  <rect x="452" y="48" width="120" height="90" rx="10" fill="#E91E63"/>
  <text x="512" y="114" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle">PNG</text>
  <rect x="774" y="60" width="120" height="90" rx="10" fill="#9C27B0"/>
  <text x="834" y="126" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle">JPG</text>
  <!-- 용광로 열기 효과 -->
  <ellipse cx="512" cy="440" rx="80" ry="24" fill="#FFCC02" opacity="0.8"/>
</svg>
