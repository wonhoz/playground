  <!-- 위치: cx=512, cy=202 -->
  <circle cx="512" cy="202" r="88" fill="#1A1200"/>
  <circle cx="512" cy="202" r="82" fill="#2A1E00"/>
  <circle cx="512" cy="202" r="76" fill="#3A2A00"/>
  <!-- 모래 픽셀 허브 -->
  <rect x="474" y="168" width="16" height="16" rx="2" fill="#F9C040"/>
  <rect x="496" y="162" width="16" height="18" rx="2" fill="#FFD740"/>
  <rect x="518" y="165" width="16" height="16" rx="2" fill="#F9C040"/>
  <rect x="540" y="168" width="14" height="16" rx="2" fill="#FFD740"/>
  <rect x="480" y="186" width="16" height="16" rx="2" fill="#FFD740"/>
  <rect x="502" y="184" width="16" height="16" rx="2" fill="#F9C040"/>
  <rect x="524" y="186" width="16" height="16" rx="2" fill="#FFD740"/>
  <rect x="476" y="204" width="16" height="12" rx="2" fill="#F9C040"/>
  <rect x="498" y="206" width="16" height="10" rx="2" fill="#FFD740"/>
  <rect x="520" y="204" width="16" height="12" rx="2" fill="#F9C040"/>
  <rect x="542" y="206" width="14" height="10" rx="2" fill="#FFD740"/>
  <!-- 쌓임 표시 아래 -->
  <rect x="482" y="218" width="60" height="10" rx="2" fill="#E6A020" opacity="0.8"/>
  <!-- 레이블 "Sand" 픽셀 -->
  <rect x="498" y="234" width="5" height="10" rx="1" fill="#F9C040"/>
  <rect x="507" y="234" width="5" height="10" rx="1" fill="#F9C040"/>
  <rect x="516" y="234" width="5" height="10" rx="1" fill="#F9C040"/>
  <rect x="525" y="234" width="5" height="10" rx="1" fill="#F9C040"/>

