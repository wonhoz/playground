<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 카메라 몸체 -->
  <rect x="160" y="360" width="700" height="440" rx="48" fill="#0097A7"/>
  <!-- 카메라 뷰파인더 돌출부 -->
  <rect x="340" y="280" width="240" height="100" rx="24" fill="#00838F"/>
  <!-- 플래시 -->
  <rect x="200" y="390" width="80" height="50" rx="12" fill="#FFD600"/>
  <!-- 셔터 버튼 -->
  <circle cx="820" cy="350" r="50" fill="#FF6F00"/>
  <!-- Layer 3: 렌즈 + 웹페이지 -->
  <circle cx="510" cy="580" r="220" fill="#006064"/>
  <circle cx="510" cy="580" r="170" fill="#004D40"/>
  <circle cx="510" cy="580" r="130" fill="#E0F7FA"/>
  <!-- 렌즈 안 웹페이지 미니어처 -->
  <rect x="410" y="510" width="200" height="140" rx="8" fill="#1565C0"/>
  <rect x="410" y="510" width="200" height="36" rx="8" fill="#0D47A1"/>
  <rect x="422" y="558" width="100" height="12" rx="4" fill="#BBDEFB"/>
  <rect x="422" y="578" width="140" height="12" rx="4" fill="#90CAF9"/>
  <rect x="422" y="598" width="120" height="12" rx="4" fill="#90CAF9"/>
  <!-- 렌즈 반사 -->
  <ellipse cx="450" cy="520" rx="36" ry="24" fill="white" opacity="0.35" transform="rotate(-20 450 520)"/>
</svg>
