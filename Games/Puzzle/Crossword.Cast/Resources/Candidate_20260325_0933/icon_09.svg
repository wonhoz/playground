<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="7" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 말풍선 (힌트 표시) -->
  <rect x="160" y="100" width="704" height="200" fill="white" rx="30" filter="url(#sh)"/>
  <!-- 말풍선 꼬리 -->
  <polygon points="280,300 340,300 280,360" fill="white"/>
  <!-- 말풍선 텍스트: 힌트 예시 -->
  <text x="512" y="175" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="700" font-size="58" fill="#AD1457">1. 고양이 (3자)</text>
  <text x="512" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="600" font-size="48" fill="#888" fill-opacity="0.8">2. 경찰관 (3자)</text>
  <!-- Layer 2: 격자 (CAP 가로 / COP 세로, 교차점 C=(0,0)) -->
  <!-- 격자를 하단에 배치 (y_start=450) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="612" width="196" height="196" fill="#880E4F" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#880E4F" rx="10"/>
  <rect x="412" y="812" width="196" height="196" fill="#880E4F" rx="10"/>
  <rect x="612" y="812" width="196" height="196" fill="#880E4F" rx="10"/>
  <!-- 흰 셀 -->
  <rect x="212" y="412" width="196" height="196" fill="#FCE4EC" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="412" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="412" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="812" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- Layer 3: 글자 (CAP 가로 / COP 세로) -->
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#AD1457">C</text>
  <text x="512" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1565C0">A</text>
  <text x="712" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1565C0">P</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1565C0">O</text>
  <text x="312" y="915" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1565C0">P</text>
</svg>
