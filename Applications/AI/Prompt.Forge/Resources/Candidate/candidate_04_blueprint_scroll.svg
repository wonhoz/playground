<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#003070"/>
    </linearGradient>
    <linearGradient id="scrollGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4080"/>
      <stop offset="100%" stop-color="#0d2a5a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#81d4fa"/>
    </linearGradient>
    <filter id="blueprintGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scroll background body -->
  <rect x="110" y="130" width="292" height="280" rx="6" fill="url(#scrollGrad)"/>
  <!-- Scroll end roll (top) -->
  <ellipse cx="256" cy="130" rx="146" ry="22" fill="#234080"/>
  <ellipse cx="256" cy="130" rx="130" ry="14" fill="#1a3570"/>
  <!-- Scroll end roll (bottom) -->
  <ellipse cx="256" cy="410" rx="146" ry="22" fill="#234080"/>
  <ellipse cx="256" cy="410" rx="130" ry="14" fill="#1a3570"/>
  <!-- Blueprint grid lines -->
  <g stroke="#4fc3f7" stroke-width="0.8" opacity="0.3">
    <line x1="110" y1="170" x2="402" y2="170"/>
    <line x1="110" y1="210" x2="402" y2="210"/>
    <line x1="110" y1="250" x2="402" y2="250"/>
    <line x1="110" y1="290" x2="402" y2="290"/>
    <line x1="110" y1="330" x2="402" y2="330"/>
    <line x1="110" y1="370" x2="402" y2="370"/>
    <line x1="150" y1="130" x2="150" y2="410"/>
    <line x1="190" y1="130" x2="190" y2="410"/>
    <line x1="230" y1="130" x2="230" y2="410"/>
    <line x1="270" y1="130" x2="270" y2="410"/>
    <line x1="310" y1="130" x2="310" y2="410"/>
    <line x1="350" y1="130" x2="350" y2="410"/>
    <line x1="390" y1="130" x2="390" y2="410"/>
  </g>
  <!-- Blueprint prompt schema drawing -->
  <!-- Input box -->
  <rect x="135" y="162" width="100" height="36" rx="4" fill="none" stroke="url(#lineGrad)" stroke-width="2" filter="url(#blueprintGlow)"/>
  <!-- Arrow -->
  <line x1="235" y1="180" x2="265" y2="180" stroke="url(#lineGrad)" stroke-width="2.5" filter="url(#blueprintGlow)"/>
  <polygon points="265,175 275,180 265,185" fill="#4fc3f7" filter="url(#blueprintGlow)"/>
  <!-- Process box -->
  <rect x="275" y="162" width="100" height="36" rx="4" fill="none" stroke="#81d4fa" stroke-width="2" filter="url(#blueprintGlow)"/>
  <!-- Connection lines -->
  <line x1="185" y1="198" x2="185" y2="230" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="325" y1="198" x2="325" y2="230" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Output elements -->
  <rect x="155" y="230" width="60" height="28" rx="4" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="235" y="230" width="60" height="28" rx="4" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="315" y="230" width="60" height="28" rx="4" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Dimension lines -->
  <line x1="130" y1="162" x2="130" y2="198" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="162" x2="140" y2="162" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="198" x2="140" y2="198" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <!-- Prompt text lines bottom of scroll -->
  <line x1="135" y1="285" x2="385" y2="285" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7" filter="url(#blueprintGlow)"/>
  <line x1="135" y1="305" x2="360" y2="305" stroke="#81d4fa" stroke-width="1.5" opacity="0.6"/>
  <line x1="135" y1="325" x2="370" y2="325" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="135" y1="345" x2="350" y2="345" stroke="#81d4fa" stroke-width="1" opacity="0.5"/>
  <line x1="135" y1="363" x2="345" y2="363" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <!-- Corner annotations -->
  <path d="M110 140 L110 155 L125 155" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <path d="M402 140 L402 155 L387 155" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
</svg>