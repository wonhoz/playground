  <rect x="664" y="624" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="696" y="624" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="728" y="624" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="664" y="656" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="728" y="656" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="664" y="688" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="696" y="688" width="24" height="24" rx="4" fill="#00BCD4"/>
  <rect x="728" y="688" width="24" height="24" rx="4" fill="#00BCD4"/>
