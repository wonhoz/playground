<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#140020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mandala rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#9333EA" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.3"/>
