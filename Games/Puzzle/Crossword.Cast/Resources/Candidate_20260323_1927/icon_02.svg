<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg2)"/>

  <!-- 5x5 격자 (파랑 테두리) -->
  <!-- 격자: x=180, y=200, 칸크기=110, 총 550x550 -->
  <!-- 행 0 -->
  <rect x="180" y="200" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="290" y="200" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="400" y="200" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="510" y="200" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="620" y="200" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <!-- 행 1 -->
  <rect x="180" y="310" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="290" y="310" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="400" y="310" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="510" y="310" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="620" y="310" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <!-- 행 2 -->
  <rect x="180" y="420" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="290" y="420" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="400" y="420" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="510" y="420" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="620" y="420" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <!-- 행 3 -->
  <rect x="180" y="530" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="290" y="530" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="400" y="530" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="510" y="530" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="620" y="530" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <!-- 행 4 -->
  <rect x="180" y="640" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="290" y="640" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="400" y="640" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="510" y="640" width="108" height="108" fill="white" stroke="#1D4ED8" stroke-width="7"/>
  <rect x="620" y="640" width="108" height="108" fill="#1D4ED8" stroke="#1D4ED8" stroke-width="7"/>

  <!-- 글자들 -->
  <text x="234" y="280" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#1D4ED8">W</text>
  <text x="344" y="280" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#1D4ED8">O</text>
  <text x="454" y="280" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#1D4ED8">R</text>
  <text x="674" y="280" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#1D4ED8">D</text>
  <text x="234" y="390" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#7C3AED">O</text>
  <text x="454" y="390" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#059669">D</text>
  <text x="564" y="390" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#059669">O</text>
  <text x="674" y="390" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#059669">G</text>
  <text x="234" y="500" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#7C3AED">R</text>
  <text x="344" y="500" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#DC2626">A</text>
  <text x="454" y="500" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#7C3AED">D</text>
  <text x="674" y="500" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#DC2626">S</text>
  <text x="344" y="610" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#D97706">T</text>
  <text x="564" y="610" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#D97706">A</text>
  <text x="674" y="610" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#D97706">P</text>
  <text x="234" y="720" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#DC2626">C</text>
  <text x="344" y="720" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#DC2626">A</text>
  <text x="454" y="720" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#DC2626">T</text>
  <text x="564" y="720" font-family="Arial Black" font-size="72" font-weight="900" text-anchor="middle" fill="#2563EB">S</text>

  <!-- 빨간 연필 (오른쪽 상단 영역) -->
  <g transform="translate(700, 180) rotate(45)">
    <!-- 연필 몸통 -->
    <rect x="-18" y="-120" width="36" height="180" rx="4" fill="#EF4444"/>
    <!-- 연필 지우개 -->
    <rect x="-18" y="-140" width="36" height="22" rx="4" fill="#FCA5A5"/>
    <!-- 연필 클램프 -->
    <rect x="-18" y="-120" width="36" height="12" fill="#9CA3AF"/>
    <!-- 연필 끝 삼각형 -->
    <polygon points="-18,60 18,60 0,120" fill="#F5DEB3"/>
    <!-- 연필 심 -->
    <polygon points="-4,100 4,100 0,120" fill="#374151"/>
  </g>
</svg>
