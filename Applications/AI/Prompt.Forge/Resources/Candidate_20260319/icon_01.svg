<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Hammer + text document (forge + prompt) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#1A0A00"/>
  <!-- Anvil shape -->
  <rect x="280" y="600" width="464" height="80" rx="16" fill="#8B4513"/>
  <rect x="240" y="660" width="544" height="60" rx="12" fill="#6B3410"/>
  <!-- Document on anvil -->
  <rect x="320" y="280" width="280" height="340" rx="20" fill="#FFF8E1" stroke="#FF8F00" stroke-width="18"/>
  <!-- Fold corner -->
  <path d="M560 280 L600 280 L600 320 Z" fill="#FF8F00"/>
  <!-- Text lines on doc -->
  <rect x="355" y="360" width="170" height="14" rx="7" fill="#FF8F00" opacity="0.8"/>
  <rect x="355" y="395" width="130" height="14" rx="7" fill="#FF8F00" opacity="0.6"/>
  <rect x="355" y="430" width="150" height="14" rx="7" fill="#FF8F00" opacity="0.6"/>
  <rect x="355" y="465" width="110" height="14" rx="7" fill="#FF8F00" opacity="0.4"/>
  <!-- Hammer -->
  <rect x="600" y="240" width="80" height="160" rx="16" fill="#B0BEC5" transform="rotate(-35, 640, 320)"/>
  <rect x="590" y="200" width="100" height="60" rx="12" fill="#78909C" transform="rotate(-35, 640, 230)"/>
  <!-- Spark -->
  <circle cx="450" cy="600" r="8" fill="#FFD740"/>
  <circle cx="490" cy="590" r="5" fill="#FFD740" opacity="0.7"/>
  <circle cx="420" cy="590" r="6" fill="#FFD740" opacity="0.6"/>
</svg>
