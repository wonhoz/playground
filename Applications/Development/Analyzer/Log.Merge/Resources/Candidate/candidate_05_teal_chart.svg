<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003333"/>
      <stop offset="100%" stop-color="#001A1A"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00E5CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chart axes -->
  <line x1="80" y1="400" x2="460" y2="400" stroke="#00897B" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="100" x2="80" y2="400" stroke="#00897B" stroke-width="2" opacity="0.5"/>
  <!-- Horizontal grid lines -->
  <line x1="80" y1="320" x2="460" y2="320" stroke="#00897B" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="80" y1="240" x2="460" y2="240" stroke="#00897B" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="80" y1="160" x2="460" y2="160" stroke="#00897B" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <!-- Bars (log line counts per source) -->
  <!-- Source 1 -->
  <rect x="104" y="220" width="60" height="180" rx="4" fill="url(#barGrad)" filter="url(#glow)"/>
  <text x="134" y="415" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00E5CC" opacity="0.8">app</text>
  <!-- Source 2 -->
  <rect x="200" y="140" width="60" height="260" rx="4" fill="#00E5CC" opacity="0.7" filter="url(#glow)"/>
  <text x="230" y="415" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00E5CC" opacity="0.8">sys</text>
  <!-- Source 3 -->
  <rect x="296" y="310" width="60" height="90" rx="4" fill="url(#barGrad)" opacity="0.9" filter="url(#glow)"/>
  <text x="326" y="415" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#00E5CC" opacity="0.8">net</text>
  <!-- Merged total bar -->
  <rect x="392" y="108" width="60" height="292" rx="4" fill="#00E5CC" opacity="0.5" filter="url(#glow)"/>
  <rect x="392" y="108" width="60" height="292" rx="4" fill="none" stroke="#00E5CC" stroke-width="2" filter="url(#glow)"/>
  <text x="422" y="415" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00E5CC">merged</text>
  <!-- Y-axis labels -->
  <text x="68" y="404" font-family="'Courier New', monospace" font-size="11" text-anchor="end" fill="#00897B" opacity="0.7">0</text>
  <text x="68" y="324" font-family="'Courier New', monospace" font-size="11" text-anchor="end" fill="#00897B" opacity="0.7">1k</text>
  <text x="68" y="244" font-family="'Courier New', monospace" font-size="11" text-anchor="end" fill="#00897B" opacity="0.7">2k</text>
  <text x="68" y="164" font-family="'Courier New', monospace" font-size="11" text-anchor="end" fill="#00897B" opacity="0.7">3k</text>
  <!-- Title -->
  <text x="256" y="60" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#00E5CC" font-weight="600" filter="url(#glow)">Log Line Analysis</text>
  <!-- Arrow showing merge -->
  <path d="M380 250 L392 250" stroke="#00E5CC" stroke-width="2" stroke-dasharray="3 2" opacity="0.5" marker-end="url(#arrow)"/>
</svg>
