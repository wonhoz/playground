<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04ic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>

  <!-- Background: green -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04ic)"/>

  <!-- Central shape: a file/image icon that's "transforming" -->
  <!-- Back file (original) -->
  <rect x="200" y="300" width="260" height="320" rx="18" fill="#1D4ED8" opacity="0.8"/>
  <polygon points="420,300 420,356 476,356" fill="#3B82F6" opacity="0.8"/>
  <rect x="218" y="420" width="224" height="14" rx="4" fill="#93C5FD" opacity="0.7"/>
  <rect x="218" y="450" width="180" height="14" rx="4" fill="#93C5FD" opacity="0.5"/>
  <rect x="218" y="480" width="200" height="14" rx="4" fill="#93C5FD" opacity="0.5"/>
  <rect x="218" y="510" width="160" height="14" rx="4" fill="#93C5FD" opacity="0.4"/>
  <!-- SVG label on back file -->
  <rect x="218" y="548" width="110" height="44" rx="8" fill="#1E40AF"/>
  <text x="273" y="577" font-family="Arial Black,Arial" font-size="28" fill="white" text-anchor="middle">SVG</text>

  <!-- Transformation arrows (multi-directional burst) -->
  <line x1="470" y1="460" x2="570" y2="460" stroke="#FDE047" stroke-width="18" stroke-linecap="round"/>
  <polygon points="560,428 620,460 560,492" fill="#FDE047"/>

  <!-- Front file (result) - multiple overlapping ICO sizes -->
  <!-- 256px representation -->
  <rect x="590" y="240" width="240" height="296" rx="16" fill="#EA580C" opacity="0.95"/>
  <polygon points="790,240 790,292 830,292" fill="#FB923C"/>
  <!-- ICO sizes grid inside -->
  <rect x="608" y="332" width="52" height="52" rx="6" fill="#FEF3C7" opacity="0.9"/>
  <rect x="668" y="332" width="52" height="52" rx="6" fill="#FEF3C7" opacity="0.9"/>
  <rect x="608" y="392" width="52" height="52" rx="6" fill="#FEF3C7" opacity="0.9"/>
  <rect x="668" y="392" width="52" height="52" rx="6" fill="#FEF3C7" opacity="0.9"/>
  <text x="634" y="362" font-family="Arial,sans-serif" font-size="14" fill="#92400E" text-anchor="middle">16</text>
  <text x="694" y="362" font-family="Arial,sans-serif" font-size="14" fill="#92400E" text-anchor="middle">32</text>
  <text x="634" y="422" font-family="Arial,sans-serif" font-size="14" fill="#92400E" text-anchor="middle">48</text>
  <text x="694" y="422" font-family="Arial,sans-serif" font-size="14" fill="#92400E" text-anchor="middle">256</text>
  <!-- ICO label on front file -->
  <rect x="608" y="456" width="110" height="44" rx="8" fill="#9A3412"/>
  <text x="663" y="485" font-family="Arial Black,Arial" font-size="28" fill="white" text-anchor="middle">ICO</text>

  <!-- Also show PNG output (smaller) -->
  <rect x="550" y="580" width="180" height="220" rx="14" fill="#7C3AED" opacity="0.8"/>
  <polygon points="690,580 690,628 730,628" fill="#A78BFA"/>
  <rect x="566" y="668" width="148" height="40" rx="8" fill="#5B21B6"/>
  <text x="640" y="694" font-family="Arial Black,Arial" font-size="24" fill="white" text-anchor="middle">PNG</text>

  <!-- Checkmark badge -->
  <circle cx="780" cy="840" r="60" fill="#22C55E"/>
  <polyline points="754,840 774,862 808,814" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stars around conversion -->
  <text x="500" y="320" font-family="Arial,sans-serif" font-size="22" fill="#FDE047">✦</text>
  <text x="540" y="380" font-family="Arial,sans-serif" font-size="16" fill="#FCD34D">★</text>
  <text x="520" y="530" font-family="Arial,sans-serif" font-size="18" fill="#A7F3D0">✦</text>
</svg>
