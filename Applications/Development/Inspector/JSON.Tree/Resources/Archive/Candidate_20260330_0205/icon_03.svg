<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 밝은 초록 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- Layer 2: 실제 나무 (tree) -->
  <!-- 기둥 -->
  <rect x="462" y="560" width="100" height="340" rx="16" fill="url(#trunk)"/>
  <!-- 뿌리 -->
  <path d="M462 880 Q380 920 340 960" stroke="#5D4037" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M562 880 Q640 920 680 960" stroke="#5D4037" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M512 900 Q512 940 512 970" stroke="#5D4037" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- 나무 잎 (JSON 브레이스로 장식) -->
  <!-- 중앙 큰 원 -->
  <circle cx="512" cy="380" r="240" fill="#4CAF50"/>
  <circle cx="512" cy="380" r="210" fill="#66BB6A"/>
  <!-- 잎 텍스처 -->
  <circle cx="380" cy="300" r="100" fill="#81C784" opacity="0.7"/>
  <circle cx="640" cy="280" r="90" fill="#81C784" opacity="0.7"/>
  <circle cx="460" cy="240" r="80" fill="#A5D6A7" opacity="0.6"/>
  <circle cx="580" cy="460" r="70" fill="#2E7D32" opacity="0.4"/>

  <!-- JSON { } 브레이스 (나무 안에) -->
  <text x="440" y="420" font-family="'Courier New',monospace" font-weight="900" font-size="160" fill="white" opacity="0.7" text-anchor="middle">{</text>
  <text x="584" y="420" font-family="'Courier New',monospace" font-weight="900" font-size="160" fill="white" opacity="0.7" text-anchor="middle">}</text>

  <!-- Layer 3: 나뭇가지 노드 (데이터) -->
  <!-- 왼쪽 가지 -->
  <line x1="462" y1="600" x2="280" y2="500" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <rect x="160" y="464" width="180" height="52" rx="14" fill="#FF8F00"/>
  <text x="250" y="492" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">"key"</text>
  <!-- 오른쪽 가지 -->
  <line x1="562" y1="600" x2="744" y2="500" stroke="#795548" stroke-width="14" stroke-linecap="round"/>
  <rect x="684" y="464" width="180" height="52" rx="14" fill="#1565C0"/>
  <text x="774" y="492" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">[1,2]</text>
</svg>
