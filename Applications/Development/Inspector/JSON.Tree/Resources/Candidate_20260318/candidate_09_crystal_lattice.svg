<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="100%" stop-color="#060f1e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 3D lattice structure representing JSON nesting -->
  <!-- Back layer lines (faint) -->
  <line x1="130" y1="130" x2="256" y2="80" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="80" x2="382" y2="130" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <line x1="382" y1="130" x2="382" y2="256" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <line x1="382" y1="256" x2="256" y2="306" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <line x1="130" y1="130" x2="130" y2="256" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <line x1="130" y1="256" x2="256" y2="306" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <!-- Cross lines back -->
  <line x1="130" y1="130" x2="382" y2="256" stroke="#22C55E" stroke-width="0.5" opacity="0.15"/>
  <line x1="382" y1="130" x2="130" y2="256" stroke="#22C55E" stroke-width="0.5" opacity="0.15"/>
  <!-- Front layer lines -->
  <line x1="170" y1="206" x2="296" y2="156" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <line x1="296" y1="156" x2="422" y2="206" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <line x1="422" y1="206" x2="422" y2="332" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <line x1="422" y1="332" x2="296" y2="382" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="332" x2="296" y2="382" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="206" x2="170" y2="332" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  <!-- Diagonals front -->
  <line x1="170" y1="206" x2="422" y2="332" stroke="#22C55E" stroke-width="1" opacity="0.3"/>
  <line x1="422" y1="206" x2="170" y2="332" stroke="#22C55E" stroke-width="1" opacity="0.3"/>
  <!-- Corner nodes -->
  <!-- Back layer -->
  <circle cx="130" cy="130" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="130" y="134" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">{ }</text>
  <circle cx="256" cy="80" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="256" y="84" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">[ ]</text>
  <circle cx="382" cy="130" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="382" y="134" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">"x"</text>
  <circle cx="382" cy="256" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="382" y="260" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">42</text>
  <circle cx="256" cy="306" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="256" y="310" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">null</text>
  <circle cx="130" cy="256" r="8" fill="#0a1a0a" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <text x="130" y="260" text-anchor="middle" font-family="monospace" font-size="6" fill="#22C55E">true</text>
  <!-- Front layer nodes (brighter) -->
  <circle cx="170" cy="206" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="170" y="210" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">{ }</text>
  <circle cx="296" cy="156" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="296" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">[ ]</text>
  <circle cx="422" cy="206" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="422" y="210" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">"v"</text>
  <circle cx="422" cy="332" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="422" y="336" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">99</text>
  <circle cx="296" cy="382" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="296" y="386" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">false</text>
  <circle cx="170" cy="332" r="10" fill="#0f2a0f" stroke="#4ADE80" stroke-width="2"/>
  <text x="170" y="336" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">{ }</text>
  <!-- Center node -->
  <circle cx="296" cy="269" r="16" fill="#143d14" stroke="#6EE7B7" stroke-width="2"/>
  <text x="296" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="#6EE7B7">JSON</text>
  <text x="296" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ADE80">TREE</text>
</svg>
