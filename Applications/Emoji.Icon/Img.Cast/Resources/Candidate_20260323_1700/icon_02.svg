<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#3D1400"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 깔때기 모양 (포맷 변환기) -->
  <!-- 상단 넓은 입력 -->
  <path d="M100 160 L924 160 L680 460 L680 800 L344 800 L344 460 Z" fill="#7C2D12" stroke="#F97316" stroke-width="14" stroke-linejoin="round"/>
  <!-- Layer 3: 입력 포맷 아이콘들 (상단) -->
  <rect x="130" y="180" width="120" height="80" rx="12" fill="#FED7AA"/>
  <text x="190" y="236" font-size="32" fill="#7C2D12" text-anchor="middle" font-weight="bold">SVG</text>
  <rect x="280" y="180" width="120" height="80" rx="12" fill="#FED7AA"/>
  <text x="340" y="236" font-size="32" fill="#7C2D12" text-anchor="middle" font-weight="bold">PNG</text>
  <rect x="440" y="180" width="120" height="80" rx="12" fill="#FED7AA"/>
  <text x="500" y="236" font-size="32" fill="#7C2D12" text-anchor="middle" font-weight="bold">JPG</text>
  <rect x="600" y="180" width="120" height="80" rx="12" fill="#FED7AA"/>
  <text x="660" y="236" font-size="32" fill="#7C2D12" text-anchor="middle" font-weight="bold">BMP</text>
  <!-- 출력 ICO 배지 -->
  <rect x="374" y="830" width="276" height="120" rx="24" fill="#F97316"/>
  <text x="512" y="912" font-size="72" fill="#FFF7ED" text-anchor="middle" font-weight="bold" font-family="Arial">.ICO</text>
</svg>
