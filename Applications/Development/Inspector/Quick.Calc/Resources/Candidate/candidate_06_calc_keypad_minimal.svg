<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a38"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="keyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1e2a38"/>
    </linearGradient>
    <linearGradient id="accentKey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4776E6"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="equalsKey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Display area -->
  <rect x="80" y="80" width="352" height="90" rx="14" fill="#0d1520" stroke="#2a3a5a" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Display lines -->
  <rect x="100" y="102" width="180" height="10" rx="5" fill="#56CCF2" opacity="0.4"/>
  <rect x="200" y="125" width="210" height="20" rx="5" fill="#38ef7d" opacity="0.7"/>

  <!-- Keypad grid 4x5 -->
  <!-- Row 1 -->
  <rect x="80" y="196" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="118" cy="226" r="12" fill="#e74c3c" opacity="0.8"/>
  <line x1="112" y1="220" x2="124" y2="232" stroke="#fff" stroke-width="2.5"/>
  <line x1="124" y1="220" x2="112" y2="232" stroke="#fff" stroke-width="2.5"/>

  <rect x="168" y="196" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <rect x="188" y="218" width="36" height="7" rx="3" fill="#f7971e" opacity="0.8"/>

  <rect x="256" y="196" width="76" height="60" rx="12" fill="url(#accentKey)" opacity="0.85" filter="url(#shadow)"/>
  <line x1="282" y1="220" x2="306" y2="220" stroke="#fff" stroke-width="2.5"/>
  <line x1="294" y1="208" x2="294" y2="244" stroke="#fff" stroke-width="2.5"/>

  <rect x="344" y="196" width="88" height="60" rx="12" fill="url(#accentKey)" opacity="0.85" filter="url(#shadow)"/>
  <line x1="366" y1="220" x2="410" y2="220" stroke="#fff" stroke-width="2.5"/>

  <!-- Row 2 -->
  <rect x="80" y="268" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="118" cy="298" r="14" fill="#2a3a5a" stroke="#56CCF2" stroke-width="1.5"/>
  <circle cx="118" cy="298" r="5" fill="#56CCF2" opacity="0.7"/>

  <rect x="168" y="268" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="206" cy="298" r="14" fill="#2a3a5a" stroke="#56CCF2" stroke-width="1.5"/>
  <circle cx="206" cy="298" r="5" fill="#56CCF2" opacity="0.7"/>

  <rect x="256" y="268" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="294" cy="298" r="14" fill="#2a3a5a" stroke="#56CCF2" stroke-width="1.5"/>
  <circle cx="294" cy="298" r="5" fill="#56CCF2" opacity="0.7"/>

  <rect x="344" y="268" width="88" height="60" rx="12" fill="url(#accentKey)" opacity="0.85" filter="url(#shadow)"/>
  <line x1="366" y1="292" x2="410" y2="292" stroke="#fff" stroke-width="2.5"/>
  <line x1="366" y1="308" x2="410" y2="308" stroke="#fff" stroke-width="2.5"/>
  <line x1="376" y1="284" x2="400" y2="316" stroke="#fff" stroke-width="1" opacity="0.3"/>

  <!-- Row 3 -->
  <rect x="80" y="340" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="118" cy="370" r="14" fill="#2a3a5a" stroke="#8E54E9" stroke-width="1.5"/>
  <circle cx="118" cy="370" r="5" fill="#8E54E9" opacity="0.7"/>

  <rect x="168" y="340" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="206" cy="370" r="14" fill="#2a3a5a" stroke="#8E54E9" stroke-width="1.5"/>
  <circle cx="206" cy="370" r="5" fill="#8E54E9" opacity="0.7"/>

  <rect x="256" y="340" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="294" cy="370" r="14" fill="#2a3a5a" stroke="#8E54E9" stroke-width="1.5"/>
  <circle cx="294" cy="370" r="5" fill="#8E54E9" opacity="0.7"/>

  <rect x="344" y="340" width="88" height="60" rx="12" fill="url(#accentKey)" opacity="0.85" filter="url(#shadow)"/>
  <line x1="366" y1="366" x2="410" y2="366" stroke="#fff" stroke-width="2.5"/>
  <line x1="376" y1="356" x2="400" y2="376" stroke="#fff" stroke-width="2.5"/>

  <!-- Row 4 -->
  <rect x="80" y="412" width="164" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="162" cy="442" r="14" fill="#2a3a5a" stroke="#ffd200" stroke-width="1.5"/>
  <circle cx="162" cy="442" r="5" fill="#ffd200" opacity="0.7"/>

  <rect x="256" y="412" width="76" height="60" rx="12" fill="url(#keyBg)" filter="url(#shadow)"/>
  <circle cx="294" cy="442" r="14" fill="#2a3a5a" stroke="#56CCF2" stroke-width="1.5"/>

  <rect x="344" y="412" width="88" height="60" rx="12" fill="url(#equalsKey)" filter="url(#shadow)"/>
  <line x1="366" y1="436" x2="410" y2="436" stroke="#fff" stroke-width="2.5"/>
  <line x1="366" y1="452" x2="410" y2="452" stroke="#fff" stroke-width="2.5"/>
</svg>
