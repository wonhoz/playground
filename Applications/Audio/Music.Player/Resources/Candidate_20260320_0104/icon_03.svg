<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Microphone head (capsule) -->
  <rect x="432" y="220" width="160" height="280" rx="80" fill="#3F51B5"/>
  <!-- Microphone grille lines -->
  <line x1="432" y1="310" x2="592" y2="310" stroke="#030818" stroke-width="12" opacity="0.5"/>
  <line x1="432" y1="350" x2="592" y2="350" stroke="#030818" stroke-width="12" opacity="0.5"/>
  <line x1="432" y1="390" x2="592" y2="390" stroke="#030818" stroke-width="12" opacity="0.5"/>
  <!-- Microphone body -->
  <rect x="476" y="500" width="72" height="160" rx="8" fill="#7986CB"/>
  <!-- Stand arm -->
  <path d="M512 660 Q400 700 350 780" stroke="#7986CB" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Stand base -->
  <ellipse cx="512" cy="820" rx="160" ry="24" fill="#3F51B5"/>
  <line x1="512" y1="660" x2="512" y2="820" stroke="#7986CB" stroke-width="22"/>
  <!-- Sound waves -->
  <path d="M620 290 Q660 360 620 430" stroke="#7986CB" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M660 260 Q720 360 660 460" stroke="#3F51B5" stroke-width="14" fill="none" stroke-linecap="round"/>
</svg>