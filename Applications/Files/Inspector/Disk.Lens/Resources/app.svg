<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="300" fill="url(#bg6)"/>
  <!-- Layer 2 + 3 + Title: Y축 상단 고정, 아래 방향으로 10% 확대 -->
  <g transform="translate(512,120) scale(1.15) translate(-512,-120)">
    <!-- Layer 2: Layered disk drives with size analysis bars -->
    <!-- Drive card 3 (back) -->
    <rect x="200" y="500" width="640" height="130" rx="22" fill="#0284C7" opacity="0.5"/>
    <!-- Drive card 2 -->
    <rect x="200" y="395" width="640" height="130" rx="22" fill="#0284C7" opacity="0.7"/>
    <rect x="220" y="415" width="340" height="90" rx="12" fill="#38BDF8"/>
    <text x="390" y="473" font-family="Arial" font-size="56" fill="white" text-anchor="middle" font-weight="bold">D:\ 500GB</text>
    <rect x="570" y="415" width="250" height="24" rx="6" fill="white" opacity="0.3"/>
    <rect x="570" y="415" width="175" height="24" rx="6" fill="#4ADE80"/>
    <!-- Drive card 1 (top/front) -->
    <rect x="200" y="288" width="640" height="130" rx="22" fill="#0369A1"/>
    <rect x="220" y="308" width="340" height="90" rx="12" fill="#38BDF8"/>
    <text x="390" y="366" font-family="Arial" font-size="56" fill="white" text-anchor="middle" font-weight="bold">C:\ 256GB</text>
    <rect x="570" y="308" width="250" height="24" rx="6" fill="white" opacity="0.3"/>
    <rect x="570" y="308" width="220" height="24" rx="6" fill="#EF4444"/>
    <!-- Layer 3: Magnifying lens overlay at top right -->
    <circle cx="760" cy="220" r="100" fill="white" opacity="0.92"/>
    <circle cx="760" cy="220" r="80" fill="none" stroke="#0284C7" stroke-width="18"/>
    <!-- Mini pie chart inside lens -->
    <circle cx="760" cy="220" r="54" fill="#0284C7"/>
    <path d="M 760 220 L 760 166 A 54 54 0 1 1 714 246 Z" fill="#EF4444"/>
    <path d="M 760 220 L 814 220 A 54 54 0 0 1 760 274 Z" fill="#4ADE80"/>
    <!-- Lens handle -->
    <line x1="828" y1="288" x2="878" y2="338" stroke="#0284C7" stroke-width="22" stroke-linecap="round"/>
    <!-- Bottom label -->
    <text x="512" y="720" font-family="Arial" font-size="72" fill="#0369A1" text-anchor="middle" font-weight="bold">Disk Lens</text>
  </g>
</svg>
