  <ellipse cx="512" cy="240" rx="75" ry="130" fill="url(#petal09a)" stroke="#F9A8D4" stroke-width="6"/>
  <!-- 우상단 -->
  <ellipse cx="665" cy="290" rx="75" ry="130" fill="url(#petal09b)" stroke="#F9A8D4" stroke-width="6" transform="rotate(60 665 290)"/>
