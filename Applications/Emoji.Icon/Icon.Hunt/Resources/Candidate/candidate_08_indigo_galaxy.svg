<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#060618"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Star field -->
  <circle cx="80" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="160" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="400" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="450" cy="90" r="1" fill="white" opacity="0.4"/>
  <circle cx="60" cy="400" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="440" cy="420" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="300" r="1" fill="#818cf8" opacity="0.6"/>
  <circle cx="420" cy="280" r="1.5" fill="#818cf8" opacity="0.5"/>
  <!-- Galaxy orbit rings -->
  <ellipse cx="256" cy="256" rx="190" ry="60" fill="none" stroke="#4338ca" stroke-width="1" opacity="0.4" transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="150" ry="50" fill="none" stroke="#4338ca" stroke-width="1" opacity="0.3" transform="rotate(-20 256 256)"/>
  <!-- Orbiting icon planets -->
  <circle cx="118" cy="190" r="30" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="103" y="204" font-size="26">⭐</text>
  <circle cx="388" cy="180" r="26" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="374" y="194" font-size="22">🌙</text>
  <circle cx="400" cy="336" r="26" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="386" y="350" font-size="22">🚀</text>
  <circle cx="100" cy="340" r="30" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="85" y="354" font-size="26">💫</text>
  <!-- Center: magnifier / hub -->
  <circle cx="256" cy="256" r="88" fill="#1e1b4b" stroke="#818cf8" stroke-width="4"/>
  <circle cx="256" cy="256" r="72" fill="#0e0c29" stroke="#6366f1" stroke-width="1.5"/>
  <text x="206" y="286" font-size="72">🔍</text>
  <!-- Glow center -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <!-- Orbit connection dots -->
  <circle cx="148" cy="198" r="4" fill="#6366f1" opacity="0.7"/>
  <circle cx="370" cy="190" r="4" fill="#6366f1" opacity="0.7"/>
  <circle cx="378" cy="322" r="4" fill="#4338ca" opacity="0.7"/>
  <circle cx="128" cy="326" r="4" fill="#4338ca" opacity="0.7"/>
  <!-- Small orbit icon at top -->
  <circle cx="256" cy="88" r="20" fill="#1e1b4b" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="244" y="100" font-size="18">🎯</text>
  <!-- Result count -->
  <rect x="172" y="388" width="168" height="36" rx="18" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="186" y="411" font-family="monospace" font-size="14" fill="#a5b4fc">3,892 icons found</text>
</svg>
