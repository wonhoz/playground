  <line x1="512" y1="200" x2="360" y2="460" stroke="#4DD0E1" stroke-width="10" opacity="0.5"/>
  <line x1="740" y1="300" x2="600" y2="500" stroke="#4DD0E1" stroke-width="10" opacity="0.5"/>
