<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1410"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1410"/>
      <stop offset="100%" stop-color="#120e0a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clock outer ring -->
  <circle cx="256" cy="256" r="210" fill="url(#clockGrad)"/>
  <circle cx="256" cy="256" r="195" fill="url(#faceGrad)"/>
  <!-- Hour markers -->
  <rect x="249" y="68" width="14" height="30" rx="4" fill="url(#clockGrad)"/>
  <rect x="249" y="414" width="14" height="30" rx="4" fill="url(#clockGrad)"/>
  <rect x="68" y="249" width="30" height="14" rx="4" fill="url(#clockGrad)"/>
  <rect x="414" y="249" width="30" height="14" rx="4" fill="url(#clockGrad)"/>
  <!-- Diagonal hour markers -->
  <rect x="360" y="100" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(30, 367, 112)"/>
  <rect x="424" y="166" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(60, 431, 178)"/>
  <rect x="424" y="322" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(120, 431, 334)"/>
  <rect x="360" y="388" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(150, 367, 400)"/>
  <rect x="138" y="388" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(210, 145, 400)"/>
  <rect x="74" y="322" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(240, 81, 334)"/>
  <rect x="74" y="166" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(300, 81, 178)"/>
  <rect x="138" y="100" width="14" height="24" rx="3" fill="url(#clockGrad)" transform="rotate(330, 145, 112)"/>
  <!-- Gear decoration inner -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#clockGrad)" stroke-width="6" opacity="0.5"/>
  <!-- Inner gear teeth -->
  <rect x="249" y="152" width="14" height="20" rx="3" fill="url(#clockGrad)" opacity="0.7"/>
  <rect x="249" y="340" width="14" height="20" rx="3" fill="url(#clockGrad)" opacity="0.7"/>
  <rect x="152" y="249" width="20" height="14" rx="3" fill="url(#clockGrad)" opacity="0.7"/>
  <rect x="340" y="249" width="20" height="14" rx="3" fill="url(#clockGrad)" opacity="0.7"/>
  <!-- Hour hand (pointing to 10) -->
  <line x1="256" y1="256" x2="176" y2="162" stroke="url(#clockGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="256" y1="256" x2="340" y2="140" stroke="#bdbdbd" stroke-width="7" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="256" y1="256" x2="300" y2="380" stroke="#ff1744" stroke-width="3" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="256" cy="256" r="14" fill="url(#clockGrad)"/>
  <circle cx="256" cy="256" r="6" fill="#0a0806"/>
  <!-- Gear logo text -->
  <text x="256" y="440" font-family="Arial" font-size="26" font-weight="bold" fill="url(#clockGrad)" text-anchor="middle" opacity="0.8">GEAR.WORKS</text>
</svg>
