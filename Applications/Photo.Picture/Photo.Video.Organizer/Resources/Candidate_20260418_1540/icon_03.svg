<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 폴더 트리 구조 (계층) -->
    <!-- 루트 폴더 -->
    <rect x="80" y="140" width="280" height="80" rx="20" fill="#2E7D32"/>
    <text x="220" y="190" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">📁 사진</text>

    <!-- 트리 연결선 (수직) -->
    <line x1="170" y1="220" x2="170" y2="680" stroke="#4CAF50" stroke-width="6" stroke-dasharray="8,4"/>

    <!-- 2024 폴더 -->
    <line x1="170" y1="300" x2="240" y2="300" stroke="#4CAF50" stroke-width="6"/>
    <rect x="240" y="260" width="240" height="72" rx="16" fill="#388E3C"/>
    <text x="360" y="304" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">📁 2024</text>

    <!-- 2024 하위: 01월 -->
    <line x1="330" y1="332" x2="330" y2="580" stroke="#66BB6A" stroke-width="5" stroke-dasharray="6,4"/>
    <line x1="330" y1="390" x2="400" y2="390" stroke="#66BB6A" stroke-width="5"/>
    <rect x="400" y="360" width="220" height="62" rx="14" fill="#43A047"/>
    <text x="510" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#FFFFFF" text-anchor="middle">📁 01월</text>
    <!-- 01월 안의 파일들 -->
    <rect x="640" y="366" width="52" height="50" rx="8" fill="#42A5F5"/>
    <rect x="700" y="366" width="52" height="50" rx="8" fill="#E91E63"/>
    <rect x="760" y="366" width="52" height="50" rx="8" fill="#FF8F00"/>

    <!-- 02월 -->
    <line x1="330" y1="488" x2="400" y2="488" stroke="#66BB6A" stroke-width="5"/>
    <rect x="400" y="456" width="220" height="62" rx="14" fill="#43A047"/>
    <text x="510" y="496" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#FFFFFF" text-anchor="middle">📁 02월</text>
    <!-- 02월 안의 파일들 -->
    <rect x="640" y="462" width="52" height="50" rx="8" fill="#7E57C2"/>
    <rect x="700" y="462" width="52" height="50" rx="8" fill="#42A5F5"/>

    <!-- 03월 -->
    <line x1="330" y1="580" x2="400" y2="580" stroke="#66BB6A" stroke-width="5"/>
    <rect x="400" y="550" width="220" height="62" rx="14" fill="#2E7D32"/>
    <text x="510" y="590" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#FFFFFF" text-anchor="middle">📁 03월</text>
    <!-- 03월 안의 파일들 -->
    <rect x="640" y="558" width="52" height="50" rx="8" fill="#FF7043"/>
    <rect x="700" y="558" width="52" height="50" rx="8" fill="#26C6DA"/>
    <rect x="760" y="558" width="52" height="50" rx="8" fill="#E91E63"/>
    <rect x="820" y="558" width="52" height="50" rx="8" fill="#42A5F5"/>

    <!-- 2023 폴더 -->
    <line x1="170" y1="680" x2="240" y2="680" stroke="#4CAF50" stroke-width="6"/>
    <rect x="240" y="644" width="240" height="72" rx="16" fill="#1B5E20"/>
    <text x="360" y="688" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#A5D6A7" text-anchor="middle">📁 2023</text>
    <!-- 점선으로 접힌 상태 표시 -->
    <text x="510" y="690" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#4CAF50">···</text>

    <!-- 타이틀 -->
    <rect x="180" y="840" width="664" height="70" rx="24" fill="#1B5E20"/>
    <text x="512" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">PHOTO·VIDEO ORGANIZER</text>
  </g>
</svg>
