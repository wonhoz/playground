<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — sepia dark -->
  <rect width="1024" height="1024" rx="190" fill="#2D1B00"/>
  <!-- Layer 2: 큰 MD 로고 배지 -->
  <rect x="100" y="240" width="824" height="540" rx="48" fill="#451A00"/>
  <rect x="100" y="240" width="824" height="540" rx="48" fill="none" stroke="#D97706" stroke-width="16"/>
  <!-- "MD" 텍스트 -->
  <text x="512" y="580" font-size="340" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="Arial Black, sans-serif">MD</text>
  <!-- 아래 박스 장식 -->
  <rect x="100" y="720" width="824" height="60" rx="0" fill="#D97706" opacity="0.3"/>
  <rect x="100" y="720" width="824" height="60" rx="48" fill="none"/>
  <!-- Layer 3: 상단 마크다운 심볼들 -->
  <text x="160" y="220" font-size="72" fill="#FCD34D" opacity="0.6" font-family="monospace">#</text>
  <text x="280" y="220" font-size="72" fill="#FCD34D" opacity="0.4" font-family="monospace">**</text>
  <text x="450" y="220" font-size="72" fill="#FCD34D" opacity="0.3" font-family="monospace">[]</text>
</svg>
