<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- Compass rose -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#1B5E20" stroke-width="24"/>
  <circle cx="512" cy="512" r="60" fill="#1B5E20"/>
  <!-- N arrow -->
  <polygon points="512,260 492,480 532,480" fill="#66BB6A"/>
  <!-- S arrow -->
  <polygon points="512,764 492,544 532,544" fill="#1B5E20" fill-opacity="0.7"/>
  <!-- E arrow -->
  <polygon points="764,512 544,492 544,532" fill="#66BB6A" fill-opacity="0.6"/>
  <!-- W arrow -->
  <polygon points="260,512 480,492 480,532" fill="#66BB6A" fill-opacity="0.6"/>
  <!-- Tick marks -->
  <line x1="512" y1="252" x2="512" y2="290" stroke="#66BB6A" stroke-width="12"/>
  <line x1="512" y1="734" x2="512" y2="772" stroke="#66BB6A" stroke-width="12"/>
  <line x1="252" y1="512" x2="290" y2="512" stroke="#66BB6A" stroke-width="12"/>
  <line x1="734" y1="512" x2="772" y2="512" stroke="#66BB6A" stroke-width="12"/>
  <!-- Question mark overlay small -->
  <circle cx="720" cy="300" r="70" fill="#1B5E20"/>
  <text x="720" y="335" font-family="Arial" font-size="88" font-weight="bold" fill="#66BB6A" text-anchor="middle">?</text>
</svg>