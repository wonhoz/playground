<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#F5F5F5"/>
  <g clip-path="url(#cp)">
    <!-- 왼쪽 패널 — BEFORE 지저분한 시스템 -->
    <rect x="0" y="0" width="480" height="1024" fill="#FFEBEE"/>

    <!-- 어지러운 파일/폴더/레지스트리 아이콘들 -->
    <text x="100" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="90" transform="rotate(-20 100 200)">🗑</text>
    <text x="240" y="180" font-family="'Segoe UI',Arial,sans-serif" font-size="70" transform="rotate(15 240 180)">💾</text>
    <text x="80" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="80" transform="rotate(10 80 340)">📁</text>
    <text x="220" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="60" transform="rotate(-12 220 320)">⚠️</text>
    <text x="130" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="70" transform="rotate(18 130 460)">🔑</text>
    <text x="280" y="440" font-family="'Segoe UI',Arial,sans-serif" font-size="75" transform="rotate(-8 280 440)">📄</text>
    <text x="80" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="65" transform="rotate(-16 80 580)">❌</text>
    <text x="230" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="70" transform="rotate(12 230 570)">🗂</text>
    <text x="140" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="60" transform="rotate(-10 140 700)">💣</text>
    <text x="280" y="680" font-family="'Segoe UI',Arial,sans-serif" font-size="65" transform="rotate(20 280 680)">🔧</text>

    <!-- BEFORE 라벨 -->
    <rect x="40" y="800" width="400" height="64" rx="16" fill="#C62828"/>
    <text x="240" y="842" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">BEFORE</text>
    <text x="240" y="900" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#EF5350" text-anchor="middle">정크 · 오류 · 느림</text>

    <!-- 구분선과 화살표 -->
    <rect x="472" y="0" width="80" height="1024" fill="#FFFFFF"/>
    <circle cx="512" cy="512" r="44" fill="#37474F"/>
    <text x="512" y="526" font-family="'Segoe UI',Arial,sans-serif" font-size="44" text-anchor="middle" fill="#FFFFFF">→</text>

    <!-- 오른쪽 패널 — AFTER 깔끔한 시스템 -->
    <rect x="552" y="0" width="472" height="1024" fill="#E8F5E9"/>

    <!-- 깔끔하게 정돈된 아이콘들 -->
    <text x="620" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="100">⚙️</text>
    <text x="800" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="100">🛡</text>

    <!-- 게이지 바 (디스크 여유) -->
    <rect x="590" y="380" width="380" height="48" rx="12" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <rect x="590" y="380" width="300" height="48" rx="12" fill="#43A047"/>
    <text x="780" y="414" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="700" text-anchor="middle">여유 공간 +1.6GB</text>

    <!-- 레지스트리 OK -->
    <rect x="590" y="448" width="380" height="48" rx="12" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <rect x="590" y="448" width="340" height="48" rx="12" fill="#66BB6A"/>
    <text x="780" y="482" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#FFFFFF" font-weight="700" text-anchor="middle">레지스트리 오류 0</text>

    <!-- 큰 체크 마크 -->
    <circle cx="780" cy="640" r="120" fill="#2E7D32"/>
    <polyline points="726,640 762,682 840,580" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- AFTER 라벨 -->
    <rect x="572" y="800" width="400" height="64" rx="16" fill="#2E7D32"/>
    <text x="772" y="842" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">AFTER</text>
    <text x="772" y="900" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#43A047" text-anchor="middle">깔끔 · 최적 · 빠름</text>
  </g>
</svg>
