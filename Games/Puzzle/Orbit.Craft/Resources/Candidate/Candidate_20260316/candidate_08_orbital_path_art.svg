<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a001a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <linearGradient id="orbit1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="orbit2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="orbit3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Orbital paths as glowing ellipses at different angles -->
  <ellipse cx="256" cy="256" rx="170" ry="50" fill="none" stroke="url(#orbit1)" stroke-width="3" transform="rotate(0 256 256)" filter="url(#glow)" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="170" ry="50" fill="none" stroke="url(#orbit2)" stroke-width="3" transform="rotate(60 256 256)" filter="url(#glow)" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="170" ry="50" fill="none" stroke="url(#orbit3)" stroke-width="3" transform="rotate(120 256 256)" filter="url(#glow)" opacity="0.7"/>
  <!-- Armillary sphere effect: equatorial band -->
  <ellipse cx="256" cy="256" rx="170" ry="170" fill="none" stroke="#ffffff15" stroke-width="2"/>
  <!-- Central body -->
  <circle cx="256" cy="256" r="30" fill="#fde68a" filter="url(#glow)"/>
  <circle cx="248" cy="248" r="10" fill="#ffffff50"/>
  <!-- Orbital craft dots -->
  <circle cx="426" cy="256" r="10" fill="#c084fc" filter="url(#glow)"/>
  <circle cx="151" cy="120" r="10" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="151" cy="392" r="10" fill="#fb923c" filter="url(#glow)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="90" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="70" cy="420" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="450" cy="420" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="256" cy="60" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="256" cy="460" r="2" fill="#fff" opacity="0.8"/>
</svg>
