<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg08)"/>
  <!-- Speed lines (horizontal, multiple) -->
  <line x1="200" y1="300" x2="824" y2="300" stroke="rgba(255,255,255,0.8)" stroke-width="22" stroke-linecap="round"/>
  <line x1="160" y1="380" x2="780" y2="380" stroke="rgba(255,255,255,0.5)" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="450" x2="824" y2="450" stroke="rgba(255,255,255,0.8)" stroke-width="22" stroke-linecap="round"/>
  <line x1="160" y1="520" x2="780" y2="520" stroke="rgba(255,255,255,0.5)" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="590" x2="824" y2="590" stroke="rgba(255,255,255,0.8)" stroke-width="22" stroke-linecap="round"/>
  <line x1="160" y1="660" x2="780" y2="660" stroke="rgba(255,255,255,0.5)" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="730" x2="824" y2="730" stroke="rgba(255,255,255,0.8)" stroke-width="22" stroke-linecap="round"/>
  <!-- Center moving object (white square) -->
  <rect x="436" y="490" width="152" height="52" rx="10" fill="white"/>
  <!-- Motion blur trailing rects -->
  <rect x="360" y="494" width="80" height="44" rx="8" fill="white" opacity="0.4"/>
  <rect x="296" y="498" width="64" height="36" rx="8" fill="white" opacity="0.2"/>
  <!-- Label -->
  <text x="512" y="870" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">SPEED</text>
</svg>