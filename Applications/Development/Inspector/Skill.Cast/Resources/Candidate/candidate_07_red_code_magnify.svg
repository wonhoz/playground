<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2a0000"/>
    </linearGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ef9a9a"/>
      <stop offset="60%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </radialGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef9a9a"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Magnifying glass circle -->
  <circle cx="215" cy="215" r="130" fill="url(#lens)" opacity="0.18" stroke="#e53935" stroke-width="4"/>
  <!-- Code lines inside lens -->
  <text x="130" y="165" font-family="monospace" font-size="14" fill="#ef9a9a" opacity="0.9">&lt;skills&gt;</text>
  <text x="145" y="188" font-family="monospace" font-size="13" fill="#ef9a9a" opacity="0.85">  lang="C#"</text>
  <text x="145" y="210" font-family="monospace" font-size="13" fill="#ef9a9a" opacity="0.8">  lvl="9"</text>
  <text x="145" y="232" font-family="monospace" font-size="13" fill="#ef9a9a" opacity="0.75">  xp="2400"</text>
  <text x="130" y="255" font-family="monospace" font-size="14" fill="#ef9a9a" opacity="0.9">/&gt;</text>
  <!-- Highlight line -->
  <rect x="130" y="200" width="176" height="18" rx="3" fill="#e53935" opacity="0.15"/>
  <!-- Magnifier handle -->
  <line x1="318" y1="318" x2="410" y2="410" stroke="#e53935" stroke-width="18" stroke-linecap="round"/>
  <line x1="318" y1="318" x2="410" y2="410" stroke="#ef9a9a" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Sparkle tech tags floating outside -->
  <rect x="300" y="120" width="90" height="28" rx="8" fill="#7f0000" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="345" y="139" font-family="monospace" font-size="12" fill="#ef9a9a" text-anchor="middle">INSPECT</text>
  <rect x="310" y="200" width="80" height="28" rx="8" fill="#7f0000" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="350" y="219" font-family="monospace" font-size="12" fill="#ef9a9a" text-anchor="middle">ANALYZE</text>
  <rect x="290" y="280" width="85" height="28" rx="8" fill="#7f0000" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="333" y="299" font-family="monospace" font-size="12" fill="#ef9a9a" text-anchor="middle">EXPORT</text>
  <!-- Footer -->
  <text x="256" y="462" font-family="monospace" font-size="17" fill="#ef9a9a" text-anchor="middle" letter-spacing="2" opacity="0.9">SKILL.CAST</text>
</svg>
