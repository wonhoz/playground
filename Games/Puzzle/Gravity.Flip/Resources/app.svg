<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground lines -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#ffffff20" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Down arrow (gravity) -->
  <g filter="url(#glow)">
    <polygon points="256,310 196,200 226,200 226,140 286,140 286,200 316,200" fill="url(#arrow1)" opacity="0.9"/>
  </g>
  <!-- Up arrow (flipped gravity) -->
  <g filter="url(#glow)">
    <polygon points="256,202 196,312 226,312 226,372 286,372 286,312 316,312" fill="url(#arrow2)" opacity="0.9"/>
  </g>
  <!-- Center flip icon -->
  <circle cx="256" cy="256" r="22" fill="none" stroke="#ffffff60" stroke-width="3"/>
  <circle cx="256" cy="256" r="8" fill="#ffffff90"/>
  <!-- Orbit dots -->
  <circle cx="256" cy="110" r="6" fill="#00d2ff" filter="url(#softglow)"/>
  <circle cx="256" cy="402" r="6" fill="#ffd200" filter="url(#softglow)"/>
  <!-- Stars -->
  <circle cx="100" cy="100" r="2" fill="#ffffff80"/>
  <circle cx="400" cy="80" r="2" fill="#ffffff80"/>
  <circle cx="80" cy="380" r="2" fill="#ffffff80"/>
  <circle cx="430" cy="400" r="2" fill="#ffffff80"/>
  <circle cx="150" cy="440" r="1.5" fill="#ffffff60"/>
  <circle cx="370" cy="150" r="1.5" fill="#ffffff60"/>
</svg>
