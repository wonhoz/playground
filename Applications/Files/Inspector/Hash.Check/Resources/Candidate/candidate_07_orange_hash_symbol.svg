<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#281200"/>
    </linearGradient>
    <linearGradient id="hash_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Giant # symbol -->
  <!-- Horizontal bars of # -->
  <rect x="100" y="188" width="312" height="40" rx="10" fill="url(#hash_grad)"/>
  <rect x="100" y="284" width="312" height="40" rx="10" fill="url(#hash_grad)"/>
  <!-- Vertical bars of # (angled slightly) -->
  <rect x="168" y="110" width="40" height="292" rx="10" fill="url(#hash_grad)" transform="rotate(-8 188 256)"/>
  <rect x="304" y="110" width="40" height="292" rx="10" fill="url(#hash_grad)" transform="rotate(-8 324 256)"/>
  <!-- Checkmark overlay -->
  <circle cx="360" cy="370" r="70" fill="#1A0800"/>
  <circle cx="360" cy="370" r="65" fill="none" stroke="#00FF66" stroke-width="6"/>
  <polyline points="328,370 350,392 392,348" fill="none" stroke="#00FF66" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="256" y="470" text-anchor="middle" fill="#FF8800" font-size="20" font-family="monospace" font-weight="bold">Hash.Check</text>
</svg>
