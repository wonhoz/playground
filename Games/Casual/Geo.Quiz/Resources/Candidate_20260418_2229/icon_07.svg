<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background mint -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: Map silhouette + question mark overlay -->
  <!-- Map-like background shapes -->
  <ellipse cx="350" cy="420" rx="200" ry="160" fill="#26A69A" opacity="0.5"/>
  <ellipse cx="620" cy="380" rx="240" ry="140" fill="#00695C" opacity="0.4"/>
  <ellipse cx="500" cy="580" rx="180" ry="120" fill="#26A69A" opacity="0.45"/>
  <ellipse cx="720" cy="560" rx="130" ry="100" fill="#00695C" opacity="0.4"/>
  <!-- Grid lines (lat/lon) -->
  <line x1="130" y1="350" x2="894" y2="350" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <line x1="130" y1="512" x2="894" y2="512" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <line x1="130" y1="674" x2="894" y2="674" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <line x1="350" y1="130" x2="350" y2="894" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <line x1="512" y1="130" x2="512" y2="894" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <line x1="674" y1="130" x2="674" y2="894" stroke="#FFFFFF" stroke-width="4" opacity="0.2"/>
  <!-- Layer 3: Giant question mark -->
  <circle cx="512" cy="460" r="300" fill="#FFFFFF" opacity="0.15"/>
  <text x="512" y="620" font-family="Arial Black, sans-serif" font-size="500" font-weight="900" fill="#FFFFFF" text-anchor="middle" opacity="0.9">?</text>
  <!-- GEO text -->
  <rect x="310" y="820" width="404" height="90" rx="20" fill="#004D40"/>
  <text x="512" y="880" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#80CBC4" text-anchor="middle">GEO QUIZ</text>
</svg>
