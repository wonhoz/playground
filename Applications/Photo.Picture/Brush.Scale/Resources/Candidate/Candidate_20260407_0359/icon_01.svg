<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 파스텔 라벤더 -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: Before (작고 흐린 사진) → After (크고 선명한 사진) — 레이어드 -->
  <!-- Before 사진 (왼쪽 작게, 흐릿 느낌) -->
  <rect x="80" y="380" width="230" height="180" rx="16" fill="#9FA8DA" opacity="0.7"/>
  <!-- 흐릿한 픽셀 표현 (큰 사각형들) -->
  <rect x="95" y="395" width="46" height="46" rx="4" fill="#7986CB" opacity="0.8"/>
  <rect x="149" y="395" width="46" height="46" rx="4" fill="#5C6BC0" opacity="0.8"/>
  <rect x="203" y="395" width="46" height="46" rx="4" fill="#7986CB" opacity="0.8"/>
  <rect x="257" y="395" width="46" height="46" rx="4" fill="#9FA8DA" opacity="0.8"/>
  <rect x="95" y="449" width="46" height="46" rx="4" fill="#5C6BC0" opacity="0.8"/>
  <rect x="149" y="449" width="46" height="46" rx="4" fill="#9FA8DA" opacity="0.8"/>
  <rect x="203" y="449" width="46" height="46" rx="4" fill="#7986CB" opacity="0.8"/>
  <rect x="257" y="449" width="46" height="46" rx="4" fill="#5C6BC0" opacity="0.8"/>
  <rect x="95" y="503" width="46" height="46" rx="4" fill="#7986CB" opacity="0.8"/>
  <rect x="149" y="503" width="46" height="46" rx="4" fill="#5C6BC0" opacity="0.8"/>
  <rect x="203" y="503" width="46" height="46" rx="4" fill="#9FA8DA" opacity="0.8"/>
  <rect x="257" y="503" width="46" height="46" rx="4" fill="#7986CB" opacity="0.8"/>
  <!-- Before 라벨 -->
  <text x="195" y="590" font-family="Arial, sans-serif" font-weight="700" font-size="38" fill="#5C6BC0" text-anchor="middle" opacity="0.8">Before</text>

  <!-- 큰 화살표 (가운데) -->
  <g transform="translate(440,470)">
    <circle r="70" fill="#AB47BC"/>
    <!-- 4x 텍스트 -->
    <text x="0" y="18" font-family="Arial Black" font-size="52" fill="white" text-anchor="middle">4x</text>
  </g>

  <!-- After 사진 (오른쪽 크고 선명) -->
  <rect x="540" y="260" width="400" height="320" rx="20" fill="#CE93D8"/>
  <!-- 선명한 세밀한 픽셀 표현 (작은 픽셀들) -->
  <rect x="556" y="276" width="22" height="22" rx="3" fill="#9C27B0"/>
  <rect x="582" y="276" width="22" height="22" rx="3" fill="#E91E63"/>
  <rect x="608" y="276" width="22" height="22" rx="3" fill="#9C27B0"/>
