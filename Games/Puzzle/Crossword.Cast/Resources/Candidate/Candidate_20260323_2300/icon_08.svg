<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <g clip-path="url(#clip08)">
    <!-- Layer 2: 십자 교차 단어 WORD (가로) + WORD (세로) -->
    <!-- 가로 막대 배경 -->
    <rect x="110" y="420" width="804" height="184" fill="rgba(244,114,182,0.25)" stroke="#F472B6" stroke-width="8" rx="16"/>
    <!-- 세로 막대 배경 -->
    <rect x="420" y="110" width="184" height="804" fill="rgba(244,114,182,0.15)" stroke="#F472B6" stroke-width="8" rx="16"/>
    <!-- 교차점 강조 -->
    <rect x="420" y="420" width="184" height="184" fill="rgba(244,114,182,0.5)" stroke="#FFFFFF" stroke-width="8" rx="16"/>
    <!-- 가로: WORD 텍스트 -->
    <text x="222" y="515" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="370" y="515" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">O</text>
    <!-- 교차점 공유 글자 R -->
    <text x="512" y="515" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">R</text>
    <text x="654" y="515" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">D</text>
    <!-- 세로: W-O-[R]-D (위→아래, 교차점 제외) -->
    <text x="512" y="218" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#F472B6" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="512" y="360" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#F472B6" text-anchor="middle" dominant-baseline="middle">O</text>
    <text x="512" y="670" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#F472B6" text-anchor="middle" dominant-baseline="middle">D</text>
    <!-- Layer 3: 번호 + 장식 -->
    <circle cx="164" cy="430" r="22" fill="#FDE68A"/>
    <text x="164" y="430" font-family="Arial Black, sans-serif" font-size="22" fill="#831843" text-anchor="middle" dominant-baseline="middle">1</text>
    <circle cx="430" cy="164" r="22" fill="#FDE68A"/>
    <text x="430" y="164" font-family="Arial Black, sans-serif" font-size="22" fill="#831843" text-anchor="middle" dominant-baseline="middle">2</text>
    <!-- 가로 방향 화살표 -->
    <text x="800" y="516" font-family="Arial, sans-serif" font-size="56" fill="#FFFFFF" dominant-baseline="middle">→</text>
    <!-- 세로 방향 화살표 -->
    <text x="512" y="810" font-family="Arial, sans-serif" font-size="56" fill="#F472B6" text-anchor="middle">↓</text>
  </g>
</svg>
