<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E1A00"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="film" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A50"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Film strip -->
  <rect x="114" y="168" width="284" height="180" rx="8" fill="#1A0A00"/>
  <rect x="114" y="158" width="284" height="16" rx="6" fill="#1A0A00"/>
  <rect x="114" y="334" width="284" height="16" rx="6" fill="#1A0A00"/>
  <!-- Film perforations top -->
  <rect x="122" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="150" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="178" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="206" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="234" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="262" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="290" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="318" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="346" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="374" y="160" width="18" height="12" rx="3" fill="#3E1A00"/>
  <!-- Film perforations bottom -->
  <rect x="122" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="150" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="178" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="206" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="234" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="262" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="290" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="318" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="346" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <rect x="374" y="336" width="18" height="12" rx="3" fill="#3E1A00"/>
  <!-- 3 frame cells with color grade gradient -->
  <rect x="120" y="176" width="82" height="152" rx="4" fill="#200E00"/>
  <rect x="215" y="176" width="82" height="152" rx="4" fill="url(#film)" opacity="0.3"/>
  <rect x="310" y="176" width="82" height="152" rx="4" fill="url(#film)" opacity="0.6"/>
  <!-- Grade label -->
  <rect x="120" y="176" width="82" height="20" rx="4" fill="#FF5722" opacity="0.5"/>
  <rect x="215" y="176" width="82" height="20" rx="4" fill="#FF5722" opacity="0.7"/>
  <rect x="310" y="176" width="82" height="20" rx="4" fill="#FF5722" opacity="0.9"/>
</svg>
