<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 딥퍼플 — 텍스트 문서 → 구름 변환 화살표 -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1550"/>
      <stop offset="100%" stop-color="#1A0B35"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#6C3483"/>
    </linearGradient>
    <linearGradient id="cloudGrad02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7BDE2"/>
      <stop offset="100%" stop-color="#A569BD"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg02)"/>

  <!-- 왼쪽: 텍스트 문서 -->
  <rect x="130" y="290" width="270" height="340" rx="18" fill="url(#docGrad)" opacity="0.9"/>
  <!-- 문서 텍스트 줄들 -->
  <rect x="160" y="330" width="210" height="18" rx="6" fill="#F0E6FF" opacity="0.9"/>
  <rect x="160" y="362" width="180" height="14" rx="5" fill="#D7BDE2" opacity="0.7"/>
  <rect x="160" y="390" width="200" height="14" rx="5" fill="#D7BDE2" opacity="0.7"/>
  <rect x="160" y="418" width="160" height="14" rx="5" fill="#D7BDE2" opacity="0.7"/>
  <rect x="160" y="446" width="190" height="14" rx="5" fill="#D7BDE2" opacity="0.6"/>
  <rect x="160" y="474" width="150" height="14" rx="5" fill="#D7BDE2" opacity="0.6"/>
  <rect x="160" y="502" width="175" height="14" rx="5" fill="#D7BDE2" opacity="0.5"/>
  <rect x="160" y="530" width="140" height="14" rx="5" fill="#D7BDE2" opacity="0.5"/>
  <rect x="160" y="558" width="165" height="14" rx="5" fill="#D7BDE2" opacity="0.4"/>

  <!-- 가운데: 변환 화살표 -->
  <path d="M 430 480 L 580 480" stroke="#BB8FCE" stroke-width="18" stroke-linecap="round"/>
  <polygon points="580,455 625,480 580,505" fill="#BB8FCE"/>
  <!-- 화살표 위 sparkle -->
  <circle cx="490" cy="450" r="8" fill="#D7BDE2" opacity="0.6"/>
  <circle cx="510" cy="440" r="5" fill="#F0E6FF" opacity="0.5"/>
  <circle cx="540" cy="448" r="6" fill="#D7BDE2" opacity="0.5"/>

  <!-- 오른쪽: 워드클라우드 (구름 + 단어들) -->
  <!-- 구름 실루엣 -->
  <g fill="url(#cloudGrad02)" opacity="0.95">
    <circle cx="770" cy="450" r="140"/>
    <circle cx="650" cy="490" r="100"/>
    <circle cx="875" cy="480" r="105"/>
    <circle cx="720" cy="390" r="88"/>
    <circle cx="820" cy="385" r="95"/>
  </g>
  <!-- 구름 안 단어들 -->
  <text x="770" y="435" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#4A235A" text-anchor="middle">WORD</text>
  <text x="720" y="480" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5B2C6F" text-anchor="middle">cloud</text>
  <text x="830" y="475" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#5B2C6F" text-anchor="middle">text</text>
  <text x="700" y="515" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#6C3483" text-anchor="middle">love</text>
  <text x="790" y="510" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#7D3C98" text-anchor="middle">big</text>
  <text x="855" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#6C3483" text-anchor="middle">sky</text>
</svg>
