<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5F3C8"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 큰 배율 텍스트 -->
  <text x="512" y="420" font-family="Arial Black, Arial, sans-serif" font-size="260" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">4x</text>
  <!-- 업스케일 방향 화살표 (아래) -->
  <rect x="200" y="490" width="624" height="72" rx="36" fill="white" opacity="0.85"/>
  <!-- Layer 3: 포인트 — 해상도 표시 -->
  <text x="512" y="700" font-family="Arial, sans-serif" font-size="88" font-weight="700" fill="#A5F3C8" text-anchor="middle">Upscale</text>
  <!-- 화살표 확대 아이콘 -->
  <polygon points="340,880 512,760 684,880" fill="white" opacity="0.7"/>
</svg>
