<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F51B5"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="alertBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256,72 L420,140 L420,270 C420,360 340,430 256,460 C172,430 92,360 92,270 L92,140 Z" fill="url(#shield)" stroke="#5C6BC0" stroke-width="6"/>
  <!-- Shield inner glow -->
  <path d="M256,110 L390,165 L390,270 C390,345 320,406 256,432 C192,406 122,345 122,270 L122,165 Z" fill="none" stroke="#7986CB" stroke-width="3" opacity="0.5"/>
  <!-- Crack lines on shield -->
  <path d="M256,180 L230,260 L265,250 L240,340" stroke="#FF5252" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M256,180 L280,240 L255,250 L275,320" stroke="#FF7043" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Alert badge -->
  <circle cx="390" cy="140" r="68" fill="url(#alertBadge)" stroke="white" stroke-width="5"/>
  <!-- Warning triangle -->
  <polygon points="390,85 348,160 432,160" fill="white" opacity="0.95"/>
  <text x="390" y="152" text-anchor="middle" font-family="Arial Black" font-size="44" fill="#FF5252">!</text>
  <!-- Binary code around shield -->
  <text x="74" y="225" font-family="monospace" font-size="11" fill="#5C6BC0" opacity="0.6">01001110</text>
  <text x="74" y="295" font-family="monospace" font-size="11" fill="#5C6BC0" opacity="0.6">11010010</text>
  <text x="360" y="225" font-family="monospace" font-size="11" fill="#5C6BC0" opacity="0.6">10111001</text>
  <text x="360" y="295" font-family="monospace" font-size="11" fill="#5C6BC0" opacity="0.6">00110101</text>
</svg>
