<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="mouse_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="right_btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- 배경 빛 원 -->
  <circle cx="512" cy="400" r="320" fill="#1E3A5F" opacity="0.4" clip-path="url(#clip01)"/>

  <!-- Layer 2: 마우스 실루엣 (중앙) -->
  <!-- 마우스 몸체 -->
  <path d="
    M 512,190
    C 620,190 700,260 700,380
    L 700,650
    C 700,760 620,830 512,830
    C 404,830 324,760 324,650
    L 324,380
    C 324,260 404,190 512,190 Z
  " fill="url(#mouse_body)"/>

  <!-- 버튼 분리선 (가운데 세로선) -->
  <rect x="496" y="195" width="32" height="220" rx="12" fill="#0F172A"/>

  <!-- 오른쪽 버튼 강조 (파랑) -->
  <path d="
    M 512,190
    C 620,190 700,260 700,380
    L 700,415
    L 528,415
    L 528,195 Z
  " fill="url(#right_btn)" opacity="0.9"/>

  <!-- 왼쪽 버튼 (어둡게) -->
  <path d="
    M 512,190
    C 404,190 324,260 324,380
    L 324,415
    L 496,415
    L 496,195 Z
  " fill="#64748B" opacity="0.7"/>

  <!-- 스크롤 휠 -->
  <rect x="476" y="248" width="72" height="130" rx="36" fill="#0F172A" opacity="0.6"/>
  <rect x="488" y="260" width="48" height="106" rx="24" fill="#475569"/>

  <!-- Layer 3: 드래그 화살표 (초록, 오른쪽으로) -->
  <!-- 화살표 꼬리 -->
  <line x1="200" y1="780" x2="500" y2="780" stroke="#4ADE80" stroke-width="52" stroke-linecap="round"/>
  <!-- 화살표 머리 -->
  <polygon points="470,718 640,780 470,842" fill="#4ADE80"/>

  <!-- 파동 효과 (마우스 주변) -->
  <circle cx="512" cy="510" r="380" fill="none" stroke="#4ADE80" stroke-width="6" opacity="0.12" clip-path="url(#clip01)"/>
  <circle cx="512" cy="510" r="310" fill="none" stroke="#4ADE80" stroke-width="5" opacity="0.1" clip-path="url(#clip01)"/>
</svg>
