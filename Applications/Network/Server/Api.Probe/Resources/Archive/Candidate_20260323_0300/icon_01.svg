<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | GET/POST/DELETE HTTP 메서드 뱃지 스택 | 레이어드 | #0F172A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F172A"/>
  <!-- Layer 2: Method badges stacked -->
  <!-- DELETE badge (back) -->
  <rect x="190" y="560" width="640" height="72" rx="14" fill="#450A0A"/>
  <rect x="190" y="560" width="130" height="72" rx="14" fill="#DC2626"/>
  <text x="255" y="603" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold">DEL</text>
  <text x="500" y="603" font-family="Consolas,monospace" font-size="18" fill="#FCA5A5" text-anchor="middle">/api/users/42</text>
  <!-- POST badge (mid) -->
  <rect x="190" y="464" width="640" height="72" rx="14" fill="#1A2C1A"/>
  <rect x="190" y="464" width="130" height="72" rx="14" fill="#16A34A"/>
  <text x="255" y="507" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="500" y="507" font-family="Consolas,monospace" font-size="18" fill="#86EFAC" text-anchor="middle">/api/users</text>
  <!-- GET badge (front) -->
  <rect x="190" y="368" width="640" height="72" rx="14" fill="#172554"/>
  <rect x="190" y="368" width="130" height="72" rx="14" fill="#2563EB"/>
  <text x="255" y="411" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <text x="500" y="411" font-family="Consolas,monospace" font-size="18" fill="#93C5FD" text-anchor="middle">/api/users</text>
  <!-- Layer 3: 200 OK response badge -->
  <rect x="480" y="670" width="200" height="50" rx="14" fill="#14532D"/>
  <text x="580" y="702" font-family="Consolas,monospace" font-size="22" fill="#4ADE80" text-anchor="middle" font-weight="bold">200 OK</text>
  <!-- SEND button hint -->
  <rect x="700" y="280" width="140" height="46" rx="12" fill="#2563EB"/>
  <text x="770" y="309" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">SEND</text>
</svg>
