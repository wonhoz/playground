<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 가격표 태그 리본이 음악 파일에 붙는 — 라벨링 은유 | 기하학 추상 | 코랄+주황+흰 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#BF360C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Central music file (large) -->
  <rect x="300" y="280" width="280" height="360" rx="20" fill="#7B1FA2" filter="url(#sh4)"/>
  <polygon points="524,280 580,336 524,336" fill="#CE93D8"/>
  <!-- File content lines -->
  <rect x="320" y="372" width="240" height="14" rx="7" fill="white" opacity="0.6"/>
  <rect x="320" y="400" width="200" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="320" y="428" width="220" height="14" rx="7" fill="white" opacity="0.6"/>
  <!-- Music note on file -->
  <text x="440" y="520" font-family="Arial, sans-serif" font-size="80" fill="white"
        text-anchor="middle" dominant-baseline="middle" opacity="0.8">♪</text>

  <!-- Tag labels on strings (top-left) -->
  <!-- Tag 1: TITLE -->
  <line x1="300" y1="380" x2="160" y2="260" stroke="#E64A19" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M80,200 L200,200 L230,230 L200,260 L80,260 Z" fill="#E64A19" filter="url(#sh4)"/>
  <circle cx="84" cy="230" r="10" fill="white"/>
  <text x="155" y="222" font-family="Arial, sans-serif" font-size="14" fill="#FFCCBC"
        text-anchor="middle">TITLE</text>
  <text x="155" y="244" font-family="Arial Black, sans-serif" font-size="16" fill="white"
        text-anchor="middle">Song Name</text>

  <!-- Tag 2: ARTIST -->
  <line x1="300" y1="460" x2="120" y2="420" stroke="#FF6F00" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M40,390 L170,390 L200,420 L170,450 L40,450 Z" fill="#FF6F00" filter="url(#sh4)"/>
  <circle cx="44" cy="420" r="10" fill="white"/>
  <text x="120" y="412" font-family="Arial, sans-serif" font-size="14" fill="#FFE0B2"
        text-anchor="middle">ARTIST</text>
  <text x="120" y="434" font-family="Arial Black, sans-serif" font-size="16" fill="white"
        text-anchor="middle">Echo Valley</text>

  <!-- Tag 3: ALBUM -->
  <line x1="300" y1="540" x2="120" y2="580" stroke="#F9A825" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M40,550 L190,550 L220,580 L190,610 L40,610 Z" fill="#F9A825" filter="url(#sh4)"/>
  <circle cx="44" cy="580" r="10" fill="white"/>
  <text x="130" y="572" font-family="Arial, sans-serif" font-size="14" fill="#FFF8E1"
        text-anchor="middle">ALBUM</text>
  <text x="130" y="594" font-family="Arial Black, sans-serif" font-size="14" fill="white"
        text-anchor="middle">Night Sessions</text>

  <!-- Tag 4: GENRE (right side) -->
  <line x1="580" y1="380" x2="750" y2="280" stroke="#43A047" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M750,250 L880,250 L910,280 L880,310 L750,310 Z" fill="#43A047" filter="url(#sh4)"/>
  <circle cx="908" cy="280" r="10" fill="white"/>
  <text x="830" y="272" font-family="Arial, sans-serif" font-size="14" fill="#C8E6C9"
        text-anchor="middle">GENRE</text>
  <text x="830" y="294" font-family="Arial Black, sans-serif" font-size="16" fill="white"
        text-anchor="middle">Jazz</text>

  <!-- Tag 5: YEAR (right side) -->
  <line x1="580" y1="460" x2="750" y2="450" stroke="#1565C0" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M750,420 L880,420 L910,450 L880,480 L750,480 Z" fill="#1565C0" filter="url(#sh4)"/>
  <circle cx="908" cy="450" r="10" fill="white"/>
  <text x="830" y="442" font-family="Arial, sans-serif" font-size="14" fill="#BBDEFB"
        text-anchor="middle">YEAR / TRACK</text>
  <text x="830" y="464" font-family="Arial Black, sans-serif" font-size="16" fill="white"
        text-anchor="middle">2024 / 05</text>

  <!-- Tag 6: FORMAT (right side) -->
  <line x1="580" y1="540" x2="750" y2="610" stroke="#7B1FA2" stroke-width="4" stroke-dasharray="10,6"/>
  <path d="M750,580 L880,580 L910,610 L880,640 L750,640 Z" fill="#7B1FA2" filter="url(#sh4)"/>
  <circle cx="908" cy="610" r="10" fill="white"/>
  <text x="830" y="602" font-family="Arial, sans-serif" font-size="14" fill="#E1BEE7"
        text-anchor="middle">FORMAT</text>
  <text x="830" y="624" font-family="Arial Black, sans-serif" font-size="16" fill="white"
        text-anchor="middle">MP3 · FLAC</text>

  <!-- Bottom banner -->
  <rect x="230" y="800" width="564" height="70" rx="35" fill="white" filter="url(#sh4)"/>
  <text x="512" y="835" font-family="Arial Black, sans-serif" font-size="38" fill="#E64A19"
        text-anchor="middle" dominant-baseline="middle">오디오 태그 편집</text>
</svg>
