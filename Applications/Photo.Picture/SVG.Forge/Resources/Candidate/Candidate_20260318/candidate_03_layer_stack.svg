<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- SVG 레이어 패널 -->
  <!-- 레이어 패널 배경 -->
  <rect x="280" y="80" width="172" height="340" rx="8" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="366" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#C084FC" opacity="0.9">LAYERS</text>
  <line x1="280" y1="110" x2="452" y2="110" stroke="#3a0a5a" stroke-width="1" opacity="0.5"/>
  <!-- 레이어 항목들 -->
  <rect x="288" y="118" width="156" height="30" rx="4" fill="#1a0a2a" stroke="#C084FC" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <circle cx="303" cy="133" r="5" fill="#C084FC" opacity="0.8"/>
  <text x="315" y="137" font-size="11" fill="#C084FC" opacity="0.9">Text Layer</text>
  <text x="440" y="137" text-anchor="end" font-size="9" fill="#888" opacity="0.7">T</text>
  <rect x="288" y="152" width="156" height="28" rx="4" fill="#160a20" stroke="#A855F7" stroke-width="1" opacity="0.8"/>
  <circle cx="303" cy="166" r="5" fill="#A855F7" opacity="0.7"/>
  <text x="315" y="170" font-size="11" fill="#A855F7" opacity="0.8">Shape Layer</text>
  <text x="440" y="170" text-anchor="end" font-size="9" fill="#888" opacity="0.7">S</text>
  <rect x="288" y="184" width="156" height="28" rx="4" fill="#160a20" stroke="#A855F7" stroke-width="1" opacity="0.75"/>
  <circle cx="303" cy="198" r="5" fill="#A855F7" opacity="0.6"/>
  <text x="315" y="202" font-size="11" fill="#A855F7" opacity="0.75">Path Group</text>
  <text x="440" y="202" text-anchor="end" font-size="9" fill="#888" opacity="0.6">G</text>
  <rect x="288" y="216" width="156" height="28" rx="4" fill="#160a20" stroke="#7C3AED" stroke-width="1" opacity="0.7"/>
  <circle cx="303" cy="230" r="5" fill="#7C3AED" opacity="0.6"/>
  <text x="315" y="234" font-size="11" fill="#7C3AED" opacity="0.7">Circle</text>
  <text x="440" y="234" text-anchor="end" font-size="9" fill="#888" opacity="0.6">O</text>
  <rect x="288" y="248" width="156" height="28" rx="4" fill="#160a20" stroke="#7C3AED" stroke-width="1" opacity="0.65"/>
  <circle cx="303" cy="262" r="5" fill="#7C3AED" opacity="0.5"/>
  <text x="315" y="266" font-size="11" fill="#7C3AED" opacity="0.65">Rectangle</text>
  <text x="440" y="266" text-anchor="end" font-size="9" fill="#888" opacity="0.5">R</text>
  <rect x="288" y="280" width="156" height="28" rx="4" fill="#160a20" stroke="#4C1D95" stroke-width="1" opacity="0.55"/>
  <circle cx="303" cy="294" r="5" fill="#4C1D95" opacity="0.5"/>
  <text x="315" y="298" font-size="11" fill="#6D28D9" opacity="0.6">Background</text>
  <text x="440" y="298" text-anchor="end" font-size="9" fill="#888" opacity="0.5">B</text>
  <!-- 캔버스 영역 -->
  <rect x="60" y="80" width="200" height="340" rx="8" fill="#060810" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <!-- 체커보드 패턴 (투명 배경 표시) -->
  <rect x="68" y="88" width="184" height="324" rx="4" fill="#0a0814" opacity="0.8"/>
  <!-- 캔버스 내 SVG 요소들 -->
  <!-- 텍스트 -->
  <text x="160" y="148" text-anchor="middle" font-size="20" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">SVG</text>
  <!-- 도형들 -->
  <circle cx="145" cy="210" r="35" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <circle cx="145" cy="210" r="22" fill="#C084FC" opacity="0.15"/>
  <rect x="105" y="265" width="110" height="70" rx="8" fill="none" stroke="#C084FC" stroke-width="2" opacity="0.7"/>
  <rect x="115" y="275" width="90" height="50" rx="5" fill="#C084FC" opacity="0.1"/>
  <!-- 선택 핸들 -->
  <rect x="104" y="264" width="112" height="72" rx="2" fill="none" stroke="#FDE047" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#glow)" opacity="0.8"/>
  <rect x="99" y="259" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <rect x="154" y="259" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <rect x="209" y="259" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <rect x="209" y="329" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <rect x="154" y="329" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <rect x="99" y="329" width="10" height="10" rx="1" fill="#FDE047" opacity="0.9"/>
  <!-- 하단 -->
  <rect x="130" y="440" width="252" height="48" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="469" text-anchor="middle" font-size="14" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">LAYER PANEL</text>
</svg>
