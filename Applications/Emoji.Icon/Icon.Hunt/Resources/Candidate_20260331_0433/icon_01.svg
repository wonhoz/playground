<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 하늘파랑 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 아이콘 격자 (3×3) -->
  <!-- 행1 -->
  <rect x="110" y="110" width="150" height="150" rx="20" fill="#29B6F6"/>
  <rect x="290" y="110" width="150" height="150" rx="20" fill="#AB47BC"/>
  <rect x="470" y="110" width="150" height="150" rx="20" fill="#EF5350"/>
  <!-- 행2 -->
  <rect x="110" y="290" width="150" height="150" rx="20" fill="#66BB6A"/>
  <rect x="290" y="290" width="150" height="150" rx="20" fill="#FFA726"/>
  <rect x="470" y="290" width="150" height="150" rx="20" fill="#26C6DA"/>
  <!-- 행3 -->
  <rect x="110" y="470" width="150" height="150" rx="20" fill="#EC407A"/>
  <rect x="290" y="470" width="150" height="150" rx="20" fill="#7E57C2"/>
  <rect x="470" y="470" width="150" height="150" rx="20" fill="#8BC34A"/>
  <!-- Layer 3: 돋보기 -->
  <circle cx="730" cy="680" r="200" fill="none" stroke="#0277BD" stroke-width="64"/>
  <line x1="880" y1="830" x2="960" y2="910" stroke="#0277BD" stroke-width="64" stroke-linecap="round"/>
  <!-- 돋보기 반사 하이라이트 -->
  <circle cx="668" cy="618" r="52" fill="white" opacity="0.35"/>
</svg>
