<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="72" y="128" width="880" height="546" rx="48" fill="#FFFFFF" stroke="#01579B" stroke-width="16"/>
  <!-- Editor panel (left, dark) -->
  <rect x="104" y="168" width="368" height="420" rx="24" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <!-- Editor title bar -->
  <rect x="104" y="168" width="368" height="46" rx="24" fill="#1A252F" stroke="#1A252F" stroke-width="14"/>
  <rect x="104" y="190" width="368" height="24" fill="#1A252F"/>
  <text x="288" y="196" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#7F8C8D" text-anchor="middle">.md</text>
  <!-- Editor content: markdown syntax colored -->
  <text x="128" y="268" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#E91E63"># Title</text>
  <text x="128" y="328" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#74C0FC">**bold**</text>
  <text x="128" y="384" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#06D6A0">- item 1</text>
  <text x="128" y="434" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#06D6A0">- item 2</text>
  <text x="128" y="494" font-family="Arial Black, sans-serif" font-weight="900" font-size="34" fill="#FFD93D">```code```</text>
  <!-- Arrow between panels -->
  <rect x="506" y="370" width="80" height="40" rx="18" fill="#0288D1" stroke="#01579B" stroke-width="12"/>
  <path d="M 580,334 L 636,390 L 580,446 Z" fill="#0288D1" stroke="#01579B" stroke-width="12" stroke-linejoin="round"/>
  <!-- Preview panel (right, white with rendered content) -->
  <rect x="660" y="168" width="360" height="420" rx="24" fill="#FFFFFF" stroke="#01579B" stroke-width="14"/>
  <text x="688" y="258" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#0D47A1">Title</text>
  <rect x="688" y="274" width="300" height="14" rx="7" fill="#0288D1" opacity="0.8"/>
  <rect x="688" y="306" width="260" height="14" rx="7" fill="#81D4FA" opacity="0.7"/>
  <rect x="688" y="334" width="280" height="14" rx="7" fill="#81D4FA" opacity="0.6"/>
  <rect x="688" y="394" width="240" height="14" rx="7" fill="#E0F7FA" stroke="#80DEEA" stroke-width="6"/>
  <rect x="688" y="362" width="260" height="14" rx="7" fill="#81D4FA" opacity="0.5"/>
  <!-- EDIT badge -->
  <rect x="96" y="758" width="296" height="104" rx="36" fill="#01579B" stroke="#003A72" stroke-width="14"/>
  <text x="244" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">EDIT</text>
  <!-- VIEW badge -->
  <rect x="444" y="758" width="440" height="104" rx="36" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="664" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#1A1A1A" text-anchor="middle">VIEW</text>
</svg>
