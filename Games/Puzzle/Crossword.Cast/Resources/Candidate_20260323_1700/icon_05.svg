  <text x="510" y="362" font-size="110" fill="#4ADE80" text-anchor="middle" font-weight="bold" font-family="Arial">G</text>
  <rect x="596" y="252" width="172" height="172" rx="8" fill="#166534"/>
  <text x="682" y="362" font-size="110" fill="#4ADE80" text-anchor="middle" font-weight="bold" font-family="Arial">H</text>
