<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 비디오 썸네일 그리드 -->
  <rect x="80" y="110" width="160" height="100" rx="6" fill="#EF4444" opacity="0.07" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="256" y="110" width="160" height="100" rx="6" fill="#EF4444" opacity="0.05" stroke="#EF4444" stroke-width="1" opacity="0.4"/>
  <rect x="80" y="226" width="160" height="100" rx="6" fill="#EF4444" opacity="0.05" stroke="#EF4444" stroke-width="1" opacity="0.4"/>
  <rect x="256" y="226" width="160" height="100" rx="6" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="2" filter="url(#glow)"/>
  <!-- 재생 삼각형들 -->
  <polygon points="150,148 150,182 180,165" fill="#EF4444" opacity="0.7" filter="url(#glow)"/>
  <polygon points="326,148 326,182 356,165" fill="#EF4444" opacity="0.4"/>
  <polygon points="150,264 150,298 180,281" fill="#EF4444" opacity="0.4"/>
  <polygon points="326,264 326,298 356,281" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- REC 배지 -->
  <circle cx="390" cy="150" r="10" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="400" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">PLAY MATRIX</text>
</svg>
