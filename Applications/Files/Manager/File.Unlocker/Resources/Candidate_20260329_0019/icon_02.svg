<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 파일 자물쇠 잠김→열림 before/after | 레이어드 | 하늘+주황락→초록열림 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- BEFORE card (left) -->
  <rect x="60" y="160" width="380" height="520" rx="28" fill="white" filter="url(#sh2)"/>
  <rect x="60" y="160" width="380" height="70" rx="28" fill="#FF7043"/>
  <rect x="60" y="206" width="380" height="24" fill="#FF7043"/>
  <text x="250" y="193" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        text-anchor="middle" dominant-baseline="middle">LOCKED</text>
  <!-- File icon -->
  <rect x="140" y="280" width="220" height="260" rx="16" fill="#FFCCBC"/>
  <polygon points="300,280 360,340 300,340" fill="#FF7043"/>
  <!-- Lock on file -->
  <rect x="185" y="390" width="130" height="100" rx="14" fill="#E53935" filter="url(#sh2)"/>
  <path d="M195,400 C195,368 305,368 305,400" fill="none" stroke="#E53935" stroke-width="20" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="250" cy="430" r="18" fill="#B71C1C"/>
  <rect x="240" y="440" width="20" height="30" rx="6" fill="#B71C1C"/>

  <!-- ARROW -->
  <rect x="468" y="470" width="88" height="44" rx="22" fill="#1565C0" filter="url(#sh2)"/>
  <polygon points="556,430 640,492 556,554" fill="#1565C0" filter="url(#sh2)"/>

  <!-- AFTER card (right) -->
  <rect x="584" y="160" width="380" height="520" rx="28" fill="white" filter="url(#sh2)"/>
  <rect x="584" y="160" width="380" height="70" rx="28" fill="#43A047"/>
  <rect x="584" y="206" width="380" height="24" fill="#43A047"/>
  <text x="774" y="193" font-family="Arial Black, sans-serif" font-size="30" fill="white"
        text-anchor="middle" dominant-baseline="middle">UNLOCKED</text>
  <!-- File icon -->
  <rect x="664" y="280" width="220" height="260" rx="16" fill="#C8E6C9"/>
  <polygon points="824,280 884,340 824,340" fill="#43A047"/>
  <!-- Open lock on file -->
  <rect x="709" y="390" width="130" height="100" rx="14" fill="#43A047" filter="url(#sh2)"/>
  <path d="M709,400 C709,348 839,348 839,380" fill="none" stroke="#43A047" stroke-width="20" stroke-linecap="round"/>
  <!-- Checkmark -->
  <text x="774" y="460" font-family="Arial, sans-serif" font-size="72" fill="white"
        text-anchor="middle" dominant-baseline="middle">✓</text>

  <!-- Bottom status bar -->
  <rect x="60" y="720" width="904" height="100" rx="24" fill="white" filter="url(#sh2)"/>
  <text x="512" y="770" font-family="Arial Black, sans-serif" font-size="44" fill="#2E7D32"
        text-anchor="middle" dominant-baseline="middle">잠금 프로세스 탐지 후 즉시 해제</text>
</svg>
