<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Window frame -->
  <rect x="200" y="260" width="520" height="400" rx="20" fill="#0D47A1" opacity="0.55"/>
  <rect x="200" y="260" width="520" height="46" rx="14" fill="#0D47A1" opacity="0.85"/>
  <circle cx="228" cy="283" r="10" fill="#42A5F5" opacity="0.7"/>
  <circle cx="256" cy="283" r="10" fill="#42A5F5" opacity="0.5"/>
  <!-- Window content (grid of properties) -->
  <rect x="220" y="330" width="220" height="22" rx="6" fill="#42A5F5" opacity="0.25"/>
  <rect x="220" y="368" width="320" height="22" rx="6" fill="#42A5F5" opacity="0.2"/>
  <rect x="220" y="406" width="180" height="22" rx="6" fill="#42A5F5" opacity="0.25"/>
  <!-- Laser beam scanning left to right -->
  <rect x="200" y="458" width="520" height="16" rx="8" fill="#42A5F5" opacity="0.7"/>
  <!-- Laser glow line -->
  <rect x="200" y="460" width="520" height="8" rx="4" fill="#42A5F5" opacity="0.9"/>
  <!-- Laser source (right side emitter) -->
  <rect x="740" y="420" width="80" height="90" rx="14" fill="#0D47A1" opacity="0.85"/>
  <polygon points="740,450 700,466 740,482" fill="#42A5F5" opacity="0.9"/>
  <!-- Scan lines above and below laser -->
  <line x1="200" y1="430" x2="720" y2="430" stroke="#42A5F5" stroke-width="4" opacity="0.25"/>
  <line x1="200" y1="500" x2="720" y2="500" stroke="#42A5F5" stroke-width="4" opacity="0.25"/>
  <!-- Highlight area being scanned -->
  <rect x="200" y="440" width="520" height="50" rx="4" fill="#42A5F5" opacity="0.08"/>
  <!-- Scan cursor sparkle -->
  <circle cx="480" cy="466" r="14" fill="#42A5F5" opacity="0.9"/>
</svg>
