<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1C0E00"/>
  <!-- Layer 2: 모래시계 -->
  <!-- 상단 삼각형 -->
  <polygon points="160,100 864,100 512,480" fill="#D97706"/>
  <polygon points="160,100 864,100 512,480" fill="none" stroke="#F59E0B" stroke-width="14"/>
  <!-- 하단 삼각형 -->
  <polygon points="160,924 864,924 512,544" fill="#92400E"/>
  <polygon points="160,924 864,924 512,544" fill="none" stroke="#B45309" stroke-width="14"/>
  <!-- 가운데 좁은 부분 -->
  <rect x="480" y="476" width="64" height="72" rx="8" fill="#F59E0B"/>
  <!-- 모래 떨어지는 표현 (위에서 아래로) -->
  <rect x="500" y="540" width="24" height="80" rx="6" fill="#FCD34D" opacity="0.9"/>
  <!-- 아래 쌓인 모래 -->
  <polygon points="384,820 640,820 600,660 424,660" fill="#FDE68A"/>
  <!-- Layer 3: 입자들 (옆에 튀는 효과) -->
  <circle cx="440" cy="600" r="10" fill="#FCD34D"/>
  <circle cx="420" cy="560" r="7" fill="#F59E0B"/>
  <circle cx="590" cy="620" r="8" fill="#FCD34D"/>
  <circle cx="610" cy="570" r="6" fill="#F59E0B"/>
  <!-- 좌우 프레임 -->
  <rect x="140" y="96" width="40" height="832" rx="20" fill="#78350F"/>
  <rect x="844" y="96" width="40" height="832" rx="20" fill="#78350F"/>
</svg>
