<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg07)"/>
  <!-- Three stars of different sizes -->
  <!-- Big star -->
  <polygon points="512,220 540,308 632,308 558,362 586,450 512,396 438,450 466,362 392,308 484,308" fill="#FDE047" stroke="white" stroke-width="14" stroke-linejoin="round"/>
  <!-- Medium star -->
  <polygon points="280,550 300,610 362,610 314,648 334,708 280,670 226,708 246,648 198,610 260,610" fill="#FDE047" stroke="white" stroke-width="12" stroke-linejoin="round"/>
  <!-- Small star -->
  <polygon points="740,580 754,622 798,622 764,648 778,690 740,664 702,690 716,648 682,622 726,622" fill="#FDE047" stroke="white" stroke-width="10" stroke-linejoin="round"/>
  <!-- Bullets (small, dodging effect) at bottom -->
  <circle cx="230" cy="790" r="30" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  <circle cx="350" cy="830" r="30" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  <circle cx="470" cy="800" r="30" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  <circle cx="600" cy="830" r="30" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  <circle cx="730" cy="800" r="30" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="8"/>
  <!-- Small ship dodging -->
  <polygon points="512,730 480,810 512,790 544,810" fill="white" opacity="0.9"/>
  <!-- Label -->
  <text x="512" y="910" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="white" text-anchor="middle">STAR COLLECT</text>
</svg>