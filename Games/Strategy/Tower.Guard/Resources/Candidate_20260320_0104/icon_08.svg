<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 에너지 포탑 레이저: 포탑 + 레이저 -->
  <!-- turret base platform -->
  <rect x="380" y="680" width="264" height="60" rx="12" fill="#37474F"/>
  <!-- turret body -->
  <rect x="420" y="560" width="184" height="130" rx="16" fill="#37474F"/>
  <!-- turret dome top -->
  <ellipse cx="512" cy="560" rx="92" ry="46" fill="#37474F"/>
  <!-- turret barrel (pointing upper-right) -->
  <rect x="512" y="500" width="200" height="28" rx="14" fill="#B0BEC5" transform="rotate(-30 512 514)"/>
  <!-- barrel tip glow -->
  <circle cx="688" cy="400" r="22" fill="#B0BEC5" opacity="0.8"/>
  <!-- laser beam -->
  <line x1="700" y1="392" x2="860" y2="280" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- laser glow (wider, transparent) -->
  <line x1="700" y1="392" x2="860" y2="280" stroke="#B0BEC5" stroke-width="18" stroke-linecap="round" opacity="0.2"/>
  <!-- impact flash -->
  <circle cx="860" cy="278" r="34" fill="#B0BEC5" opacity="0.3"/>
  <circle cx="860" cy="278" r="20" fill="#B0BEC5" opacity="0.6"/>
  <!-- energy ring on turret -->
  <circle cx="512" cy="560" r="110" fill="none" stroke="#B0BEC5" stroke-width="5" opacity="0.25"/>
  <circle cx="512" cy="560" r="140" fill="none" stroke="#B0BEC5" stroke-width="3" opacity="0.15"/>
  <!-- detail: power indicators -->
  <rect x="452" y="590" width="24" height="10" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="500" y="590" width="24" height="10" rx="3" fill="#B0BEC5" opacity="0.6"/>
  <rect x="548" y="590" width="24" height="10" rx="3" fill="#B0BEC5" opacity="0.4"/>
</svg>
