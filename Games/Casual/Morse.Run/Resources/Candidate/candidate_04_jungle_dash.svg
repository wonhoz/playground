<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1F0A"/>
      <stop offset="100%" stop-color="#1A3A1A"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="30%" r="40%" fx="50%" fy="30%" gradientUnits="objectBoundingBox" id="sunGrad">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sky gradient zone -->
  <rect x="80" y="80" width="352" height="180" rx="8" fill="#0A2040" opacity="0.6"/>
  <!-- Sun -->
  <circle cx="380" cy="160" r="45" fill="#FFE066" opacity="0.85"/>
  <circle cx="380" cy="160" r="35" fill="#FFF0A0"/>
  <!-- Ground -->
  <rect x="0" y="370" width="512" height="142" rx="0" fill="#1A3A1A"/>
  <rect x="0" y="360" width="512" height="20" rx="0" fill="#2A5A2A"/>
  <!-- Trees -->
  <polygon points="80,360 120,220 160,360" fill="#0D280D"/>
  <polygon points="100,360 130,240 160,360" fill="#1A4A1A"/>
  <polygon points="340,360 390,200 440,360" fill="#0D280D"/>
  <polygon points="360,360 390,220 420,360" fill="#1A4A1A"/>
  <!-- Stick runner -->
  <circle cx="230" cy="300" r="22" fill="none" stroke="#7AFF4A" stroke-width="5"/>
  <line x1="230" y1="322" x2="230" y2="360" stroke="#7AFF4A" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="335" x2="210" y2="360" stroke="#7AFF4A" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="335" x2="250" y2="355" stroke="#7AFF4A" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="310" x2="208" y2="295" stroke="#7AFF4A" stroke-width="4" stroke-linecap="round"/>
  <line x1="230" y1="310" x2="255" y2="300" stroke="#7AFF4A" stroke-width="4" stroke-linecap="round"/>
  <!-- Morse dots above runner -->
  <circle cx="270" cy="260" r="8" fill="#7AFF4A" opacity="0.8"/>
  <rect x="290" y="253" width="24" height="14" rx="7" fill="#7AFF4A" opacity="0.8"/>
  <circle cx="326" cy="260" r="8" fill="#7AFF4A" opacity="0.8"/>
  <rect x="346" y="253" width="24" height="14" rx="7" fill="#7AFF4A" opacity="0.8"/>
</svg>
