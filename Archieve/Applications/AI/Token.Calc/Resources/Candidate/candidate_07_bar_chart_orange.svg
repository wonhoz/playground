<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#2d1200"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 축 -->
  <line x1="90" y1="400" x2="422" y2="400" stroke="#664422" stroke-width="3"/>
  <line x1="90" y1="100" x2="90" y2="400" stroke="#664422" stroke-width="3"/>
  <!-- 격자선 -->
  <line x1="90" y1="320" x2="422" y2="320" stroke="#442200" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="90" y1="240" x2="422" y2="240" stroke="#442200" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="90" y1="160" x2="422" y2="160" stroke="#442200" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- 바 1 (GPT-4) -->
  <rect x="110" y="180" width="64" height="220" rx="6" fill="url(#bar1)"/>
  <text x="142" y="415" font-family="Arial" font-size="14" fill="#fb923c" text-anchor="middle">GPT-4</text>
  <!-- 바 2 (Claude) -->
  <rect x="196" y="140" width="64" height="260" rx="6" fill="url(#bar2)"/>
  <text x="228" y="415" font-family="Arial" font-size="14" fill="#fbbf24" text-anchor="middle">Claude</text>
  <!-- 바 3 (Gemini) -->
  <rect x="282" y="220" width="64" height="180" rx="6" fill="url(#bar3)"/>
  <text x="314" y="415" font-family="Arial" font-size="14" fill="#f97316" text-anchor="middle">Gemini</text>
  <!-- 바 4 (GPT-3.5) -->
  <rect x="368" y="300" width="44" height="100" rx="6" fill="url(#bar4)"/>
  <text x="390" y="415" font-family="Arial" font-size="12" fill="#fdba74" text-anchor="middle">GPT-3</text>
  <!-- 타이틀 -->
  <text x="256" y="75" font-family="Arial" font-weight="bold" font-size="24" fill="#fb923c" text-anchor="middle">COST COMPARE</text>
</svg>
