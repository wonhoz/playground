<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00131A"/>
      <stop offset="100%" stop-color="#004D5A"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256 78 L378 128 L378 262 Q378 358 256 428 Q134 358 134 262 L134 128 Z" fill="url(#shield)" opacity="0.85"/>
  <!-- Circuit lines -->
  <g stroke="#80DEEA" stroke-width="3" fill="none" opacity="0.7">
    <line x1="190" y1="180" x2="322" y2="180"/>
    <line x1="190" y1="215" x2="322" y2="215"/>
    <line x1="190" y1="250" x2="322" y2="250"/>
    <line x1="190" y1="285" x2="322" y2="285"/>
    <line x1="210" y1="165" x2="210" y2="300"/>
    <line x1="256" y1="165" x2="256" y2="300"/>
    <line x1="302" y1="165" x2="302" y2="300"/>
  </g>
  <!-- Nodes -->
  <g fill="#E0F7FA">
    <circle cx="210" cy="180" r="7"/>
    <circle cx="256" cy="180" r="7"/>
    <circle cx="302" cy="180" r="7"/>
    <circle cx="210" cy="215" r="7"/>
    <circle cx="302" cy="215" r="7"/>
    <circle cx="256" cy="250" r="11" fill="#00E5FF"/>
    <circle cx="210" cy="285" r="7"/>
    <circle cx="256" cy="285" r="7"/>
    <circle cx="302" cy="285" r="7"/>
  </g>
  <!-- Shield outline highlight -->
  <path d="M256 78 L378 128 L378 262 Q378 358 256 428 Q134 358 134 262 L134 128 Z" fill="none" stroke="#80DEEA" stroke-width="4" opacity="0.5"/>
  <!-- Center badge -->
  <circle cx="256" cy="250" r="30" fill="none" stroke="#00E5FF" stroke-width="3"/>
  <text x="256" y="255" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0F7FA" font-weight="bold">SVC</text>
</svg>
