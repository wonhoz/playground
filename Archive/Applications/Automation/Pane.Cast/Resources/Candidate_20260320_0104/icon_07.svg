<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Tiled window stack: overlapping stacked window frames -->
  <rect x="260" y="580" width="380" height="260" rx="18" fill="none" stroke="#FF8F00" stroke-width="28"/>
  <rect x="310" y="500" width="380" height="260" rx="18" fill="none" stroke="#FFB300" stroke-width="26"/>
  <rect x="360" y="420" width="380" height="260" rx="18" fill="#1A0E00" stroke="#FF8F00" stroke-width="30"/>
  <!-- Title bar on top window -->
  <rect x="360" y="420" width="380" height="48" rx="18" fill="#FF8F00"/>
  <circle cx="404" cy="444" r="12" fill="#0F0A00"/>
  <circle cx="438" cy="444" r="12" fill="#0F0A00"/>
  <circle cx="472" cy="444" r="12" fill="#0F0A00"/>
</svg>
