<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 중복 파일들이 깔때기로 하나로 합쳐짐 — 정리/압축 은유 | 대각선/동적 | 라임+빨강+흰 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCE775"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#33691E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Multiple duplicate files (top, spread out) -->
  <!-- File A1 -->
  <rect x="80" y="130" width="150" height="190" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="188,130 230,172 188,172" fill="#EF9A9A"/>
  <rect x="100" y="200" width="110" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="100" y="222" width="90" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- File A2 -->
  <rect x="260" y="110" width="150" height="190" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="368,110 410,152 368,152" fill="#EF9A9A"/>
  <rect x="280" y="180" width="110" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="280" y="202" width="90" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- File A3 -->
  <rect x="440" y="130" width="150" height="190" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="548,130 590,172 548,172" fill="#EF9A9A"/>
  <rect x="460" y="200" width="110" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="460" y="222" width="90" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- File A4 -->
  <rect x="620" y="110" width="150" height="190" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="728,110 770,152 728,152" fill="#EF9A9A"/>
  <rect x="640" y="180" width="110" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="640" y="202" width="90" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- File A5 -->
  <rect x="800" y="130" width="150" height="190" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="908,130 950,172 908,172" fill="#EF9A9A"/>
  <rect x="820" y="200" width="110" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="820" y="222" width="90" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- Funnel shape (converging arrows) -->
  <!-- Arrows pointing down to center -->
  <line x1="155" y1="320" x2="390" y2="520" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <line x1="335" y1="300" x2="430" y2="500" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <line x1="515" y1="320" x2="512" y2="490" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <line x1="695" y1="300" x2="594" y2="500" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <line x1="875" y1="320" x2="634" y2="520" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>

  <!-- Funnel body -->
  <path d="M320,490 L704,490 L600,680 L424,680 Z" fill="#43A047" filter="url(#sh5)" opacity="0.85"/>
  <rect x="460" y="680" width="104" height="100" rx="10" fill="#2E7D32" filter="url(#sh5)"/>

  <!-- Arrow tips -->
  <polygon points="390,520 360,470 420,470" fill="#33691E"/>
  <polygon points="430,500 400,450 460,450" fill="#33691E"/>
  <polygon points="512,490 482,440 542,440" fill="#33691E"/>
  <polygon points="594,500 564,450 624,450" fill="#33691E"/>
  <polygon points="634,520 604,470 664,470" fill="#33691E"/>

  <!-- Result: single file at bottom -->
  <rect x="420" y="800" width="184" height="130" rx="16" fill="#2E7D32" filter="url(#sh5)"/>
  <polygon points="556,800 604,848 556,848" fill="#A5D6A5"/>
  <circle cx="512" cy="876" r="28" fill="#43A047"/>
  <text x="512" y="876" font-family="Arial, sans-serif" font-size="34" fill="white"
        text-anchor="middle" dominant-baseline="middle">✓</text>

  <!-- Label -->
  <text x="512" y="960" font-family="Arial Black, sans-serif" font-size="32" fill="#33691E"
        text-anchor="middle">1개만 남기기</text>
</svg>
