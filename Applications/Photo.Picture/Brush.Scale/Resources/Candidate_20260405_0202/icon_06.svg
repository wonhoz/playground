<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#AED581"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- Layer 2: Image expanding in 4 directions with arrows -->
  <!-- Center image -->
  <rect x="352" y="352" width="320" height="320" rx="18" fill="#558B2F"/>
  <!-- Mini landscape inside (hills + sky) -->
  <rect x="352" y="352" width="320" height="130" rx="18" fill="#7CB342"/>
  <rect x="352" y="482" width="320" height="190" rx="18" fill="#33691E"/>
  <!-- Sun in image -->
  <circle cx="460" cy="420" r="40" fill="#FFEB3B"/>
  <!-- 4 expansion arrows pointing outward -->
  <!-- Top arrow -->
  <line x1="512" y1="342" x2="512" y2="220" stroke="#33691E" stroke-width="22" stroke-linecap="round"/>
  <polygon points="452,270 512,180 572,270" fill="#33691E"/>
  <!-- Bottom arrow -->
  <line x1="512" y1="682" x2="512" y2="804" stroke="#33691E" stroke-width="22" stroke-linecap="round"/>
  <polygon points="452,754 512,844 572,754" fill="#33691E"/>
  <!-- Left arrow -->
  <line x1="342" y1="512" x2="220" y2="512" stroke="#33691E" stroke-width="22" stroke-linecap="round"/>
  <polygon points="270,452 180,512 270,572" fill="#33691E"/>
  <!-- Right arrow -->
  <line x1="682" y1="512" x2="804" y2="512" stroke="#33691E" stroke-width="22" stroke-linecap="round"/>
  <polygon points="754,452 844,512 754,572" fill="#33691E"/>
  <!-- Layer 3: x4 label in center of image -->
  <text x="404" y="544" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="white" opacity="0.85">×4</text>
</svg>
