<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
  <!-- 자물쇠 + 돋보기 해독 -->
  <!-- 자물쇠 몸체 -->
  <rect x="280" y="500" width="360" height="300" rx="30" fill="#4527A0"/>
  <!-- 자물쇠 걸쇠 -->
  <path d="M360,500 L360,360 Q360,240 460,240 Q560,240 560,360 L560,500" stroke="#4527A0" stroke-width="50" fill="none" stroke-linecap="round"/>
  <!-- 자물쇠 열쇠 구멍 -->
  <circle cx="460" cy="620" r="40" fill="#050010"/>
  <rect x="440" y="620" width="40" height="80" fill="#050010"/>
  <!-- 돋보기 렌즈 -->
  <circle cx="700" cy="340" r="130" fill="none" stroke="#CE93D8" stroke-width="22"/>
  <circle cx="700" cy="340" r="100" fill="#CE93D8" opacity="0.12"/>
  <!-- 돋보기 손잡이 -->
  <line x1="798" y1="438" x2="880" y2="530" stroke="#CE93D8" stroke-width="30" stroke-linecap="round"/>
  <!-- 돋보기 내부 스파크 (해독 완료) -->
  <line x1="660" y1="300" x2="740" y2="380" stroke="#CE93D8" stroke-width="12" opacity="0.7"/>
  <line x1="740" y1="300" x2="660" y2="380" stroke="#CE93D8" stroke-width="12" opacity="0.7"/>
</svg>
