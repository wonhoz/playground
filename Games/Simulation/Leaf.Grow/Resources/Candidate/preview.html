<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Leaf.Grow - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 1100px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .item img { width: 160px; height: 160px; border-radius: 20px; border: 1px solid #333; background: #111; }
    .item span { font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>Leaf.Grow — Icon Candidates</h1>
  <div class="grid">
    <div class="item"><img src="candidate_01_spring_leaf.svg" alt="01"/><span>01 Spring Leaf</span></div>
    <div class="item"><img src="candidate_02_neon_bonsai.svg" alt="02"/><span>02 Neon Bonsai</span></div>
    <div class="item"><img src="candidate_03_watercolor_bloom.svg" alt="03"/><span>03 Watercolor Bloom</span></div>
    <div class="item"><img src="candidate_04_pixel_plant.svg" alt="04"/><span>04 Pixel Plant</span></div>
    <div class="item"><img src="candidate_05_autumn_tree.svg" alt="05"/><span>05 Autumn Tree</span></div>
    <div class="item"><img src="candidate_06_dark_forest.svg" alt="06"/><span>06 Dark Forest</span></div>
    <div class="item"><img src="candidate_07_tropical.svg" alt="07"/><span>07 Tropical</span></div>
    <div class="item"><img src="candidate_08_minimalist_sprout.svg" alt="08"/><span>08 Minimalist Sprout</span></div>
    <div class="item"><img src="candidate_09_rainbow_garden.svg" alt="09"/><span>09 Rainbow Garden</span></div>
    <div class="item"><img src="candidate_10_cosmic_plant.svg" alt="10"/><span>10 Cosmic Plant</span></div>
  </div>
</body>
</html>
