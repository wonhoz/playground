<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="seg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="seg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="seg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Donut chart segments -->
  <!-- 35% orange: 0 to 126deg -->
  <path d="M256,256 L256,80 A176,176 0 0,1 432,256 Z" fill="url(#seg1)"/>
  <!-- 25% blue: 90 to 180deg -->
  <path d="M256,256 L432,256 A176,176 0 0,1 256,432 Z" fill="url(#seg2)"/>
  <!-- 20% green: 180 to 252deg -->
  <path d="M256,256 L256,432 A176,176 0 0,1 80,256 Z" fill="url(#seg3)"/>
  <!-- 20% purple: 252 to 360deg -->
  <path d="M256,256 L80,256 A176,176 0 0,1 256,80 Z" fill="url(#seg4)"/>
  <!-- Inner circle (donut hole) -->
  <circle cx="256" cy="256" r="100" fill="#162030"/>
  <!-- Center text -->
  <text x="256" y="248" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">512</text>
  <text x="256" y="272" font-family="sans-serif" font-size="14" fill="#7FB3C8" text-anchor="middle">GB total</text>
  <!-- Legend -->
  <rect x="60" y="440" width="14" height="14" rx="3" fill="url(#seg1)"/>
  <text x="80" y="453" font-family="sans-serif" font-size="12" fill="#E0E0E0">System 35%</text>
  <rect x="170" y="440" width="14" height="14" rx="3" fill="url(#seg2)"/>
  <text x="190" y="453" font-family="sans-serif" font-size="12" fill="#E0E0E0">Apps 25%</text>
  <rect x="268" y="440" width="14" height="14" rx="3" fill="url(#seg3)"/>
  <text x="288" y="453" font-family="sans-serif" font-size="12" fill="#E0E0E0">Media 20%</text>
  <rect x="366" y="440" width="14" height="14" rx="3" fill="url(#seg4)"/>
  <text x="386" y="453" font-family="sans-serif" font-size="12" fill="#E0E0E0">Other 20%</text>
</svg>
