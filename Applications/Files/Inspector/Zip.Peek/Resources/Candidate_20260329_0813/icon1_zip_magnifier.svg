<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: warm amber gradient -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <linearGradient id="zipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E84A1A"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8E6FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5BB8F5" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg1)"/>

  <!-- ZIP File body -->
  <rect x="200" y="160" width="420" height="520" rx="24" fill="url(#fileGrad)" stroke="#D0D8E0" stroke-width="8" filter="url(#shadow1)"/>

  <!-- File corner fold -->
  <path d="M 540 160 L 620 240 L 540 240 Z" fill="#C8D8E8"/>
  <path d="M 540 160 L 620 240 L 620 240" fill="none" stroke="#B0C0D0" stroke-width="4"/>

  <!-- ZIP stripe on file -->
  <rect x="320" y="160" width="60" height="520" rx="0" fill="#FF6B35" opacity="0.15"/>

  <!-- ZIP teeth pattern -->
  <rect x="330" y="200" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="244" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="288" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="332" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="376" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="420" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="464" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="508" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="552" width="40" height="28" rx="4" fill="#FF6B35"/>
  <rect x="330" y="596" width="40" height="28" rx="4" fill="#FF6B35"/>

  <!-- File text lines -->
  <rect x="240" y="280" width="180" height="14" rx="7" fill="#B0BEC5"/>
  <rect x="240" y="316" width="140" height="14" rx="7" fill="#B0BEC5"/>
  <rect x="240" y="352" width="160" height="14" rx="7" fill="#B0BEC5"/>
  <rect x="240" y="388" width="120" height="14" rx="7" fill="#B0BEC5"/>

  <!-- ZIP label -->
  <rect x="420" y="560" width="160" height="60" rx="10" fill="url(#zipGrad)"/>
  <text x="500" y="600" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" letter-spacing="2">ZIP</text>

  <!-- Magnifier glass -->
  <circle cx="660" cy="640" r="175" fill="url(#lensGrad)" stroke="#2196F3" stroke-width="28" filter="url(#shadow1)" opacity="0.92"/>
  <!-- Lens inner reflection -->
  <circle cx="620" cy="590" r="45" fill="#FFFFFF" opacity="0.35"/>

  <!-- Magnifier handle -->
  <line x1="792" y1="772" x2="880" y2="860" stroke="#1565C0" stroke-width="52" stroke-linecap="round"/>
  <line x1="792" y1="772" x2="876" y2="856" stroke="#42A5F5" stroke-width="30" stroke-linecap="round"/>

  <!-- Peek text inside lens -->
  <text x="660" y="640" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#0D47A1" opacity="0.7">PEEK</text>
</svg>
