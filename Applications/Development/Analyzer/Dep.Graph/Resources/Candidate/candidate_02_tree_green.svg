<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A2D"/>
      <stop offset="100%" stop-color="#2E7D52"/>
    </linearGradient>
    <linearGradient id="rootNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree edges -->
  <!-- Root to L1 -->
  <line x1="256" y1="120" x2="140" y2="240" stroke="#2E7D52" stroke-width="4"/>
  <line x1="256" y1="120" x2="372" y2="240" stroke="#2E7D52" stroke-width="4"/>
  <!-- L1 to L2 left -->
  <line x1="140" y1="240" x2="88" y2="360" stroke="#388E3C" stroke-width="3"/>
  <line x1="140" y1="240" x2="194" y2="360" stroke="#388E3C" stroke-width="3"/>
  <!-- L1 to L2 right -->
  <line x1="372" y1="240" x2="318" y2="360" stroke="#388E3C" stroke-width="3"/>
  <line x1="372" y1="240" x2="424" y2="360" stroke="#388E3C" stroke-width="3"/>
  <!-- L2 to L3 -->
  <line x1="88" y1="360" x2="68" y2="440" stroke="#43A047" stroke-width="2"/>
  <line x1="88" y1="360" x2="110" y2="440" stroke="#43A047" stroke-width="2"/>
  <line x1="424" y1="360" x2="402" y2="440" stroke="#43A047" stroke-width="2"/>
  <line x1="424" y1="360" x2="446" y2="440" stroke="#43A047" stroke-width="2"/>
  <!-- Leaf nodes L3 -->
  <circle cx="68" cy="440" r="14" fill="#1B3A2D" stroke="#69F0AE" stroke-width="2"/>
  <circle cx="110" cy="440" r="14" fill="#1B3A2D" stroke="#69F0AE" stroke-width="2"/>
  <circle cx="402" cy="440" r="14" fill="#1B3A2D" stroke="#69F0AE" stroke-width="2"/>
  <circle cx="446" cy="440" r="14" fill="#1B3A2D" stroke="#69F0AE" stroke-width="2"/>
  <!-- L2 nodes -->
  <circle cx="88" cy="360" r="20" fill="#1B3A2D" stroke="#00C853" stroke-width="3"/>
  <circle cx="194" cy="360" r="20" fill="#1B3A2D" stroke="#00C853" stroke-width="3"/>
  <circle cx="318" cy="360" r="20" fill="#1B3A2D" stroke="#00C853" stroke-width="3"/>
  <circle cx="424" cy="360" r="20" fill="#1B3A2D" stroke="#00C853" stroke-width="3"/>
  <!-- Leaf label in L2 nodes -->
  <text x="194" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#69F0AE">pkg</text>
  <text x="318" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#69F0AE">lib</text>
  <!-- L1 nodes -->
  <circle cx="140" cy="240" r="28" fill="#1B3A2D" stroke="#69F0AE" stroke-width="3"/>
  <circle cx="372" cy="240" r="28" fill="#1B3A2D" stroke="#69F0AE" stroke-width="3"/>
  <text x="140" y="244" text-anchor="middle" font-family="monospace" font-size="10" fill="#69F0AE">App</text>
  <text x="372" y="244" text-anchor="middle" font-family="monospace" font-size="10" fill="#69F0AE">Core</text>
  <!-- Root node -->
  <circle cx="256" cy="120" r="36" fill="url(#rootNode)" stroke="white" stroke-width="4"/>
  <text x="256" y="125" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1B3A2D">Main</text>
</svg>
