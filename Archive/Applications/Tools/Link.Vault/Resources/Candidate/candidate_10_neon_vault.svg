<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vault outline neon -->
  <rect x="100" y="100" width="312" height="312" rx="24" fill="none" stroke="#00e5ff" stroke-width="4" filter="url(#glow)"/>
  <!-- Inner vault lines -->
  <rect x="124" y="124" width="264" height="264" rx="16" fill="none" stroke="#00b0ff" stroke-width="2" opacity="0.6"/>
  <!-- Dial neon -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#00e5ff" stroke-width="4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="48" fill="none" stroke="#76ff03" stroke-width="3" filter="url(#glow)"/>
  <!-- Pointer -->
  <line x1="256" y1="256" x2="256" y2="200" stroke="#ff4081" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="8" fill="#ff4081" filter="url(#glow)"/>
  <!-- Corner bolts neon -->
  <circle cx="136" cy="136" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="376" cy="136" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="136" cy="376" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="376" cy="376" r="10" fill="#00e5ff" filter="url(#glow)"/>
  <!-- Link chain neon -->
  <path d="M156 330 Q180 310 204 330 Q228 350 252 330 Q276 310 300 330 Q324 350 348 330" fill="none" stroke="#76ff03" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Handle bar -->
  <rect x="344" y="236" width="48" height="40" rx="10" fill="none" stroke="#ffd740" stroke-width="4" filter="url(#glow)"/>
</svg>
