<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document -->
  <rect x="90" y="70" width="240" height="310" rx="12" fill="url(#doc)" stroke="#F59E0B" stroke-width="3"/>
  <!-- Dog-ear corner -->
  <polygon points="290,70 330,70 330,110" fill="#F59E0B" opacity="0.5"/>
  <polygon points="290,70 290,110 330,110" fill="#FEF3C7"/>
  <!-- Document lines - heading -->
  <rect x="115" y="100" width="160" height="16" rx="4" fill="#92400E" opacity="0.6"/>
  <rect x="115" y="126" width="190" height="10" rx="4" fill="#D97706" opacity="0.2"/>
  <!-- MD syntax colored lines -->
  <rect x="115" y="148" width="12" height="10" rx="2" fill="#D97706" opacity="0.8"/>
  <rect x="132" y="148" width="130" height="10" rx="3" fill="#92400E" opacity="0.5"/>
  <rect x="115" y="168" width="10" height="8" rx="2" fill="#D97706"/>
  <rect x="130" y="168" width="10" height="8" rx="2" fill="#D97706"/>
  <rect x="145" y="168" width="120" height="8" rx="3" fill="#92400E" opacity="0.45"/>
  <rect x="115" y="188" width="180" height="8" rx="3" fill="#92400E" opacity="0.3"/>
  <rect x="115" y="204" width="155" height="8" rx="3" fill="#92400E" opacity="0.3"/>
  <rect x="115" y="220" width="170" height="8" rx="3" fill="#92400E" opacity="0.3"/>
  <!-- Code block area -->
  <rect x="115" y="240" width="200" height="60" rx="6" fill="#FEF9C3"/>
  <rect x="125" y="252" width="100" height="7" rx="2" fill="#D97706" opacity="0.7"/>
  <rect x="125" y="268" width="150" height="7" rx="2" fill="#92400E" opacity="0.5"/>
  <rect x="125" y="284" width="80" height="7" rx="2" fill="#D97706" opacity="0.6"/>
  <!-- Remaining lines -->
  <rect x="115" y="316" width="180" height="8" rx="3" fill="#92400E" opacity="0.3"/>
  <rect x="115" y="332" width="140" height="8" rx="3" fill="#92400E" opacity="0.25"/>
  <!-- Pen/stylus diagonal -->
  <g transform="rotate(-35 350 300)">
    <rect x="310" y="180" width="22" height="200" rx="5" fill="url(#pen)"/>
    <rect x="310" y="180" width="22" height="30" rx="5" fill="#F59E0B"/>
    <polygon points="310,380 332,380 321,415" fill="#D97706"/>
    <circle cx="321" cy="416" r="4" fill="#1F2937"/>
    <!-- Pen clip -->
    <rect x="328" y="185" width="6" height="120" rx="3" fill="#6B7280"/>
  </g>
  <!-- Sparkle near pen tip -->
  <circle cx="330" cy="430" r="4" fill="#FCD34D" opacity="0.9"/>
  <line x1="330" y1="420" x2="330" y2="415" stroke="#FCD34D" stroke-width="2"/>
  <line x1="340" y1="430" x2="345" y2="430" stroke="#FCD34D" stroke-width="2"/>
  <line x1="337" y1="423" x2="341" y2="419" stroke="#FCD34D" stroke-width="2"/>
</svg>
