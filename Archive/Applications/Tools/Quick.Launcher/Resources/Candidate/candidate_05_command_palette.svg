<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1A1A2A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#252535"/>
      <stop offset="100%" style="stop-color:#1A1A28"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Command panel -->
  <rect x="70" y="130" width="372" height="260" rx="12" fill="url(#panel)" stroke="#3A3A5A" stroke-width="2"/>
  <!-- Search bar -->
  <rect x="86" y="146" width="340" height="48" rx="8" fill="#0D0D1A" stroke="#4A4A7A" stroke-width="2"/>
  <text x="106" y="176" font-family="monospace" font-size="18" fill="#8888AA">&#x276F; Quick launch...</text>
  <!-- Items list -->
  <rect x="86" y="204" width="340" height="44" rx="6" fill="#3A3A6A" opacity="0.8"/>
  <circle cx="112" cy="226" r="12" fill="#6688FF" opacity="0.8"/>
  <rect x="132" y="218" width="120" height="8" rx="4" fill="#AAAACC"/>
  <rect x="132" y="232" width="80" height="6" rx="3" fill="#555566"/>
  <!-- Item 2 -->
  <rect x="86" y="254" width="340" height="40" rx="6" fill="none"/>
  <circle cx="112" cy="274" r="12" fill="#44AAFF" opacity="0.6"/>
  <rect x="132" y="267" width="100" height="8" rx="4" fill="#888899"/>
  <rect x="132" y="280" width="70" height="6" rx="3" fill="#444455"/>
  <!-- Item 3 -->
  <rect x="86" y="300" width="340" height="40" rx="6" fill="none"/>
  <circle cx="112" cy="320" r="12" fill="#44FFAA" opacity="0.6"/>
  <rect x="132" y="313" width="90" height="8" rx="4" fill="#888899"/>
  <rect x="132" y="326" width="60" height="6" rx="3" fill="#444455"/>
  <!-- Keyboard hint -->
  <rect x="86" y="348" width="340" height="28" rx="4" fill="#111122"/>
  <rect x="96" y="356" width="36" height="14" rx="3" fill="#333344" stroke="#555566" stroke-width="1"/>
  <text x="114" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#9999AA">↵</text>
  <text x="148" y="368" font-family="Arial" font-size="9" fill="#666677">open</text>
  <rect x="186" y="356" width="36" height="14" rx="3" fill="#333344" stroke="#555566" stroke-width="1"/>
  <text x="204" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#9999AA">Esc</text>
  <text x="236" y="368" font-family="Arial" font-size="9" fill="#666677">close</text>
</svg>
