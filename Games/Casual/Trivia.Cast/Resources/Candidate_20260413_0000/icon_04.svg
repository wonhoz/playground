    <path d="M 512 190 Q 680 190 740 340 Q 760 480 680 570 Q 660 590 660 630 L 364 630 Q 364 590 344 570 Q 264 480 284 340 Q 344 190 512 190 Z" fill="#FFFFFF" stroke="#3E2723" stroke-width="18" stroke-linejoin="round"/>
