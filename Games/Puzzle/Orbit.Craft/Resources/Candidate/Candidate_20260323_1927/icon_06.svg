<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg06" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </radialGradient>
    <radialGradient id="p6a" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="p6b" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </radialGradient>
    <radialGradient id="p6c" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg06)"/>
  <!-- 별 -->
  <circle cx="230" cy="220" r="3" fill="#A7F3D0" opacity="0.5"/>
  <circle cx="790" cy="200" r="4" fill="#A7F3D0" opacity="0.6"/>
  <circle cx="200" cy="800" r="3" fill="#A7F3D0" opacity="0.4"/>
  <circle cx="820" cy="790" r="2" fill="#A7F3D0" opacity="0.5"/>
  <!-- 큰 타원 궤도 (바깥) -->
  <ellipse cx="512" cy="512" rx="295" ry="205" fill="none" stroke="#6EE7B7" stroke-width="9" opacity="0.7"/>
  <!-- 중간 타원 궤도 -->
  <ellipse cx="512" cy="512" rx="200" ry="135" fill="none" stroke="#34D399" stroke-width="8" opacity="0.6"/>
  <!-- 내부 작은 궤도 -->
  <ellipse cx="512" cy="512" rx="120" ry="80" fill="none" stroke="#10B981" stroke-width="7" opacity="0.5"/>
  <!-- 행성 A (큰, 좌측) -->
  <circle cx="330" cy="512" r="90" fill="url(#p6a)"/>
  <ellipse cx="315" cy="498" rx="66" ry="28" fill="none" stroke="#FDE68A" stroke-width="7" opacity="0.6"/>
  <!-- 행성 B (중간, 상단 오른) -->
  <circle cx="700" cy="320" r="65" fill="url(#p6b)"/>
  <!-- 행성 C (작은, 하단 오른) -->
  <circle cx="730" cy="720" r="50" fill="url(#p6c)"/>
  <!-- 탐사선 (큰 궤도 위) -->
  <g transform="translate(810,512) rotate(0)">
    <ellipse cx="0" cy="0" rx="28" ry="14" fill="#E0E0E0" stroke="#FFFFFF" stroke-width="7"/>
    <rect x="-8" y="-22" width="16" height="22" rx="8" fill="#93C5FD" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="-34" y="-4" width="20" height="8" rx="4" fill="#60A5FA" stroke="#FFFFFF" stroke-width="4"/>
    <rect x="14" y="-4" width="20" height="8" rx="4" fill="#60A5FA" stroke="#FFFFFF" stroke-width="4"/>
  </g>
  <!-- 탐사선 궤도 위치 표시 도트 -->
  <circle cx="512" cy="307" r="10" fill="#6EE7B7" opacity="0.8"/>
  <circle cx="512" cy="717" r="10" fill="#6EE7B7" opacity="0.8"/>
  <!-- 궤도 방향 화살표 -->
  <path d="M 810,490 Q 830,470 820,455" fill="none" stroke="#6EE7B7" stroke-width="8" stroke-linecap="round"/>
  <polygon points="820,455 834,472 807,472" fill="#6EE7B7"/>
</svg>
