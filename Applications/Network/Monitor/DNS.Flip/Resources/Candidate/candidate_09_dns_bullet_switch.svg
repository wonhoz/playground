<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100010"/>
      <stop offset="100%" stop-color="#200030"/>
    </linearGradient>
    <linearGradient id="bullet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- DNS servers (targets) -->
  <!-- server A -->
  <rect x="330" y="130" width="110" height="75" rx="10" fill="#4a148c"/>
  <rect x="344" y="148" width="82" height="10" rx="4" fill="#ce93d8" opacity="0.6"/>
  <rect x="344" y="165" width="62" height="10" rx="4" fill="#ce93d8" opacity="0.4"/>
  <circle cx="410" cy="155" r="7" fill="#00e676"/>
  <!-- server B -->
  <rect x="330" y="240" width="110" height="75" rx="10" fill="#311b92"/>
  <rect x="344" y="258" width="82" height="10" rx="4" fill="#b39ddb" opacity="0.6"/>
  <rect x="344" y="275" width="62" height="10" rx="4" fill="#b39ddb" opacity="0.4"/>
  <circle cx="410" cy="265" r="7" fill="#ff9800"/>
  <!-- bullet in flight -->
  <path d="M120 168 Q220 168 310 168" stroke="url(#trail)" stroke-width="6" fill="none"/>
  <ellipse cx="315" cy="168" rx="30" ry="14" fill="url(#bullet)" filter="url(#glow)"/>
  <!-- speed lines -->
  <line x1="90" y1="155" x2="140" y2="155" stroke="#ce93d8" stroke-width="3" opacity="0.4"/>
  <line x1="80" y1="168" x2="130" y2="168" stroke="#ce93d8" stroke-width="4" opacity="0.5"/>
  <line x1="90" y1="181" x2="140" y2="181" stroke="#ce93d8" stroke-width="3" opacity="0.4"/>
  <!-- switch arrow below -->
  <path d="M145 260 Q210 310 280 260" stroke="#ab47bc" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="280,260 266,248 280,242" fill="#ab47bc"/>
</svg>
