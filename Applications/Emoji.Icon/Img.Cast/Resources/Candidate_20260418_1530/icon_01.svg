<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: 왼쪽 입력 파일 (SVG) -->
    <rect x="100" y="340" width="230" height="290" rx="24" fill="#5C6BC0"/>
    <rect x="100" y="340" width="100" height="60" rx="12" fill="#7986CB" transform="skewX(-8)"/>
    <text x="215" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle">SVG</text>
    <text x="215" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#C5CAE9" text-anchor="middle">벡터</text>

    <!-- 큰 화살표 -->
    <rect x="368" y="490" width="200" height="44" rx="22" fill="#FF7043"/>
    <polygon points="568,462 640,512 568,562" fill="#FF7043"/>

    <!-- Layer 3: 오른쪽 출력 파일들 (3종) -->
    <!-- PNG -->
    <rect x="668" y="220" width="200" height="160" rx="18" fill="#26A69A"/>
    <text x="768" y="298" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">PNG</text>
    <text x="768" y="356" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#B2DFDB" text-anchor="middle">래스터</text>
    <!-- ICO -->
    <rect x="668" y="432" width="200" height="160" rx="18" fill="#EF6C00"/>
    <text x="768" y="510" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">ICO</text>
    <text x="768" y="568" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#FFCC80" text-anchor="middle">아이콘</text>
    <!-- WEBP -->
    <rect x="668" y="644" width="200" height="160" rx="18" fill="#7B1FA2"/>
    <text x="768" y="718" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">WEBP</text>
    <text x="768" y="776" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#CE93D8" text-anchor="middle">웹 최적화</text>

    <!-- 상단 타이틀 -->
    <rect x="220" y="130" width="584" height="80" rx="24" fill="#3F51B5"/>
    <text x="512" y="184" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
  </g>
</svg>
