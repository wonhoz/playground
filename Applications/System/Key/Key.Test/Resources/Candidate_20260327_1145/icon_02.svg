<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Stethoscope circle -->
  <circle cx="512" cy="420" r="240" fill="none" stroke="#0284C7" stroke-width="40"/>
  <!-- Stethoscope stem down -->
  <line x1="512" y1="660" x2="512" y2="800" stroke="#0284C7" stroke-width="40" stroke-linecap="round"/>
  <!-- Keyboard key at stethoscope end -->
  <rect x="422" y="780" width="180" height="110" rx="18" fill="#0EA5E9"/>
  <text x="512" y="855" font-family="Arial,sans-serif" font-size="72" fill="#FFFFFF" font-weight="bold" text-anchor="middle">⌨</text>
  <!-- Earpieces -->
  <circle cx="380" cy="220" r="36" fill="#0284C7"/>
  <circle cx="644" cy="220" r="36" fill="#0284C7"/>
  <line x1="380" y1="220" x2="380" y2="185" stroke="#0284C7" stroke-width="30" stroke-linecap="round"/>
  <line x1="644" y1="220" x2="644" y2="185" stroke="#0284C7" stroke-width="30" stroke-linecap="round"/>
  <line x1="380" y1="185" x2="644" y2="185" stroke="#0284C7" stroke-width="30" stroke-linecap="round"/>
  <!-- Chatter warning -->
  <circle cx="760" cy="420" r="80" fill="#F59E0B"/>
  <text x="760" y="445" font-family="Arial,sans-serif" font-size="76" fill="#FFFFFF" font-weight="bold" text-anchor="middle">!</text>
</svg>
