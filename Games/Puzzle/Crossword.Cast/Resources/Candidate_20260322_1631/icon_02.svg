<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C1432"/>
      <stop offset="100%" stop-color="#060A1C"/>
    </linearGradient>
    <clipPath id="frame02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <g clip-path="url(#frame02)">
    <!-- Layer 2: Compact crossword grid (5x5, cell=98px, gap=5px) on left -->
    <!-- Total: 5*98+4*5=510px, start at x=70, y=160 -->
    <!-- Row 0: C-R-O-S-S -->
    <rect x="70" y="160" width="98" height="98" rx="5" fill="white"/>
    <text x="119" y="232" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">C</text>
    <text x="70" y="178" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#888">1</text>

    <rect x="173" y="160" width="98" height="98" rx="5" fill="white"/>
    <text x="222" y="232" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">R</text>

    <rect x="276" y="160" width="98" height="98" rx="5" fill="white"/>
    <text x="325" y="232" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">O</text>

    <rect x="379" y="160" width="98" height="98" rx="5" fill="white"/>
    <text x="428" y="232" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">S</text>

    <rect x="482" y="160" width="98" height="98" rx="5" fill="white"/>
    <text x="531" y="232" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">S</text>

    <!-- Row 1: ■-■-N-■-■ -->
    <rect x="70" y="263" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="173" y="263" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="276" y="263" width="98" height="98" rx="5" fill="white"/>
    <text x="325" y="335" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">N</text>
    <rect x="379" y="263" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="482" y="263" width="98" height="98" rx="5" fill="#181830"/>

    <!-- Row 2: W-O-R-D-■ - highlighted active row -->
    <rect x="70" y="366" width="98" height="98" rx="5" fill="#E8F0FE"/>
    <rect x="70" y="366" width="98" height="98" rx="5" fill="none" stroke="#5C6BC0" stroke-width="4"/>
    <text x="119" y="438" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#3949AB" text-anchor="middle">W</text>
    <text x="70" y="384" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#5C6BC0">2</text>

    <rect x="173" y="366" width="98" height="98" rx="5" fill="#E8F0FE"/>
    <rect x="173" y="366" width="98" height="98" rx="5" fill="none" stroke="#5C6BC0" stroke-width="4"/>
    <text x="222" y="438" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#3949AB" text-anchor="middle">O</text>

    <rect x="276" y="366" width="98" height="98" rx="5" fill="#E8F0FE"/>
    <rect x="276" y="366" width="98" height="98" rx="5" fill="none" stroke="#5C6BC0" stroke-width="4"/>
    <text x="325" y="438" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#3949AB" text-anchor="middle">R</text>

    <rect x="379" y="366" width="98" height="98" rx="5" fill="#E8F0FE"/>
    <rect x="379" y="366" width="98" height="98" rx="5" fill="none" stroke="#5C6BC0" stroke-width="4"/>
    <text x="428" y="438" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#3949AB" text-anchor="middle">D</text>

    <rect x="482" y="366" width="98" height="98" rx="5" fill="#181830"/>

    <!-- Row 3: ■-■-D-■-P -->
    <rect x="70" y="469" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="173" y="469" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="276" y="469" width="98" height="98" rx="5" fill="white"/>
    <text x="325" y="541" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">D</text>
    <rect x="379" y="469" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="482" y="469" width="98" height="98" rx="5" fill="white"/>
    <text x="531" y="541" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">P</text>

    <!-- Row 4: ■-■-S-■-■ -->
    <rect x="70" y="572" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="173" y="572" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="276" y="572" width="98" height="98" rx="5" fill="white"/>
    <text x="325" y="644" font-family="'Segoe UI',Arial" font-size="58" font-weight="900" fill="#1A1A2E" text-anchor="middle">S</text>
    <rect x="379" y="572" width="98" height="98" rx="5" fill="#181830"/>
    <rect x="482" y="572" width="98" height="98" rx="5" fill="#181830"/>

    <!-- Layer 3: Clue panels (right side) -->
    <!-- ACROSS panel -->
    <rect x="615" y="160" width="340" height="250" rx="12" fill="#101828"/>
    <rect x="615" y="160" width="340" height="250" rx="12" fill="none" stroke="#2A3A5A" stroke-width="2"/>
    <text x="635" y="198" font-family="'Segoe UI',Arial" font-size="28" font-weight="800" fill="#5C6BC0">↔ ACROSS</text>
    <text x="635" y="236" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">1. CROSS — transverse</text>
    <text x="635" y="266" font-family="'Segoe UI',Arial" font-size="24" fill="#7C8BF0" font-weight="700">2. WORD — unit of lang.</text>
    <text x="635" y="296" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">3. —————</text>
    <text x="635" y="326" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">4. —————</text>
    <text x="635" y="392" font-family="'Segoe UI',Arial" font-size="20" fill="#444">active: 2 across</text>

    <!-- DOWN panel -->
    <rect x="615" y="430" width="340" height="242" rx="12" fill="#101828"/>
    <rect x="615" y="430" width="340" height="242" rx="12" fill="none" stroke="#2A3A5A" stroke-width="2"/>
    <text x="635" y="468" font-family="'Segoe UI',Arial" font-size="28" font-weight="800" fill="#E57373">↕ DOWN</text>
    <text x="635" y="506" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">1. ONDS — the </text>
    <text x="635" y="536" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">   seconds tick</text>
    <text x="635" y="572" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">2. WORDS — plural</text>
    <text x="635" y="608" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">3. DROPS — falls</text>
    <text x="635" y="644" font-family="'Segoe UI',Arial" font-size="24" fill="#AAA">4. PLAY</text>

    <!-- New puzzle button -->
    <rect x="615" y="695" width="340" height="62" rx="14" fill="#1E2A44"/>
    <rect x="615" y="695" width="340" height="62" rx="14" fill="none" stroke="#334" stroke-width="2"/>
    <text x="785" y="734" font-family="'Segoe UI',Arial" font-size="30" font-weight="700" fill="#888" text-anchor="middle">↺  New Puzzle</text>

    <!-- Status bar -->
    <rect x="70" y="705" width="530" height="62" rx="12" fill="#101828"/>
    <rect x="70" y="705" width="530" height="62" rx="12" fill="none" stroke="#2A3A5A" stroke-width="2"/>
    <text x="335" y="743" font-family="'Segoe UI',Arial" font-size="26" fill="#555" text-anchor="middle">Tab: 방향 전환  ·  ⌫: 지우기</text>

    <!-- Crossword.Cast title -->
    <text x="512" y="900" font-family="'Segoe UI',Arial" font-size="54" font-weight="900" fill="#2A3A6A" text-anchor="middle">CROSSWORD.CAST</text>
  </g>
</svg>
