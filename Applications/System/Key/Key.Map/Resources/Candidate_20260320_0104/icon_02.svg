<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080500"/>
  <!-- Two key caps with swap arrows -->
  <!-- Key A -->
  <rect x="180" y="380" width="240" height="200" rx="28" fill="#4E342E"/>
  <rect x="202" y="402" width="196" height="156" rx="18" fill="#080500"/>
  <!-- Arrow up-right from A -->
  <path d="M300 380 Q300 260 512 240 Q724 220 724 380" fill="none" stroke="#A1887F" stroke-width="20" stroke-linecap="round"/>
  <polygon points="700,360 724,400 748,360" fill="#A1887F"/>
  <!-- Arrow down-left to A -->
  <path d="M724 580 Q724 700 512 720 Q300 740 300 580" fill="none" stroke="#A1887F" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <polygon points="276,560 300,600 324,560" fill="#A1887F" opacity="0.7"/>
  <!-- Key B -->
  <rect x="604" y="380" width="240" height="200" rx="28" fill="#4E342E"/>
  <rect x="626" y="402" width="196" height="156" rx="18" fill="#080500"/>
  <!-- Diagonal marks on keys -->
  <line x1="240" y1="450" x2="360" y2="530" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
  <line x1="664" y1="450" x2="784" y2="530" stroke="#A1887F" stroke-width="16" stroke-linecap="round"/>
</svg>
