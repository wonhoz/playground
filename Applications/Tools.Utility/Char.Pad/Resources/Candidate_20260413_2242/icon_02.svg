<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FF8FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="138" width="872" height="538" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>
  <!-- Left sub-card: before (question / unknown char) -->
  <rect x="112" y="194" width="308" height="288" rx="28" fill="#FCE4EC" stroke="#E91E63" stroke-width="14"/>
  <text x="266" y="383" font-family="Arial Black, sans-serif" font-weight="900" font-size="150" fill="#EF9A9A" text-anchor="middle">?</text>
  <!-- Arrow: shaft + head -->
  <rect x="454" y="338" width="116" height="46" rx="22" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <path d="M 562,292 L 634,361 L 562,430 Z" fill="#E91E63" stroke="#880E4F" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right sub-card: after (copyright inserted, success) -->
  <rect x="604" y="194" width="308" height="288" rx="28" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <text x="758" y="383" font-family="Arial Black, sans-serif" font-weight="900" font-size="150" fill="#2E7D32" text-anchor="middle">&#xa9;</text>
  <!-- COPY badge -->
  <rect x="236" y="748" width="552" height="116" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">COPY</text>
</svg>
