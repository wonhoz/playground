<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="138" width="848" height="530" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>
  <!-- Keyboard body -->
  <rect x="124" y="195" width="776" height="380" rx="24" fill="#2C3E50" stroke="#1A252F" stroke-width="16"/>
  <!-- Key rows (3 rows of keys) -->
  <!-- Row 1: special char keys highlighted -->
  <rect x="152" y="228" width="100" height="88" rx="12" fill="#E91E63" stroke="#880E4F" stroke-width="10"/>
  <text x="202" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">&#x2192;</text>
  <rect x="268" y="228" width="100" height="88" rx="12" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10"/>
  <text x="318" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">&#x2211;</text>
  <rect x="384" y="228" width="100" height="88" rx="12" fill="#06D6A0" stroke="#004D40" stroke-width="10"/>
  <text x="434" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">&#xa9;</text>
  <rect x="500" y="228" width="100" height="88" rx="12" fill="#9B59B6" stroke="#4A148C" stroke-width="10"/>
  <text x="550" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">&#xb2;</text>
  <rect x="616" y="228" width="100" height="88" rx="12" fill="#FF6B35" stroke="#BF360C" stroke-width="10"/>
  <text x="666" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">$</text>
  <rect x="732" y="228" width="120" height="88" rx="12" fill="#FFD93D" stroke="#B8860B" stroke-width="10"/>
  <text x="792" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1A1A1A" text-anchor="middle">&#x2665;</text>
  <!-- Row 2: regular grey keys -->
  <rect x="152" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="254" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="356" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="458" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="560" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="662" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="764" y="334" width="88" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <!-- Row 3: wide spacebar area -->
  <rect x="152" y="440" width="180" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <rect x="346" y="440" width="380" height="88" rx="12" fill="#546E7A" stroke="#263238" stroke-width="8"/>
  <rect x="740" y="440" width="112" height="88" rx="12" fill="#455A64" stroke="#263238" stroke-width="8"/>
  <!-- SPECIAL badge -->
  <rect x="172" y="744" width="680" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">SPECIAL</text>
</svg>
