<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FFE66D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#grad02)"/>

  <!-- Star shape (5-pointed) filled with dark color -->
  <polygon points="512,200 590,420 830,420 640,560 710,790 512,650 314,790 384,560 194,420 434,420"
           fill="#C0392B" stroke="#8B0000" stroke-width="8"/>

  <!-- ASCII characters inside the star -->
  <text x="512" y="420" font-family="'Courier New', monospace" font-size="90" font-weight="900"
        text-anchor="middle" fill="white">@#$%</text>
  <text x="512" y="520" font-family="'Courier New', monospace" font-size="85" font-weight="900"
        text-anchor="middle" fill="white">#$@%#</text>
  <text x="512" y="615" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="white">$@#</text>

  <!-- Surrounding dots -->
  <text x="250" y="280" font-family="'Courier New', monospace" font-size="80" font-weight="700"
        text-anchor="middle" fill="rgba(139,0,0,0.6)">.</text>
  <text x="775" y="290" font-family="'Courier New', monospace" font-size="80" font-weight="700"
        text-anchor="middle" fill="rgba(139,0,0,0.6)">.</text>
  <text x="200" y="700" font-family="'Courier New', monospace" font-size="80" font-weight="700"
        text-anchor="middle" fill="rgba(139,0,0,0.6)">.</text>
  <text x="820" y="695" font-family="'Courier New', monospace" font-size="80" font-weight="700"
        text-anchor="middle" fill="rgba(139,0,0,0.6)">.</text>
  <text x="512" y="870" font-family="'Courier New', monospace" font-size="80" font-weight="700"
        text-anchor="middle" fill="rgba(139,0,0,0.6)">.</text>
</svg>
