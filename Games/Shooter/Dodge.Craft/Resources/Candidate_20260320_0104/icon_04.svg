<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Item boxes floating -->
  <rect x="180" y="200" width="100" height="100" rx="12" fill="#33691E" stroke="#AED581" stroke-width="5"/>
  <line x1="230" y1="200" x2="230" y2="300" stroke="#AED581" stroke-width="5"/>
  <line x1="180" y1="250" x2="280" y2="250" stroke="#AED581" stroke-width="5"/>
  <rect x="460" y="160" width="100" height="100" rx="12" fill="#33691E" stroke="#AED581" stroke-width="5"/>
  <line x1="510" y1="160" x2="510" y2="260" stroke="#AED581" stroke-width="5"/>
  <line x1="460" y1="210" x2="560" y2="210" stroke="#AED581" stroke-width="5"/>
  <rect x="740" y="200" width="100" height="100" rx="12" fill="#33691E" stroke="#AED581" stroke-width="5"/>
  <line x1="790" y1="200" x2="790" y2="300" stroke="#AED581" stroke-width="5"/>
  <line x1="740" y1="250" x2="840" y2="250" stroke="#AED581" stroke-width="5"/>
  <!-- Player dodging between items -->
  <polygon points="512,480 480,560 512,540 544,560" fill="#AED581"/>
  <ellipse cx="512" cy="575" rx="20" ry="12" fill="#33691E" opacity="0.8"/>
  <!-- Dodge arrows -->
  <polygon points="250,500 330,460 330,480 420,480 420,460 500,500 420,540 420,520 330,520 330,540" fill="#AED581" opacity="0.6"/>
  <polygon points="524,500 604,460 604,480 694,480 694,460 774,500 694,540 694,520 604,520 604,540" fill="#AED581" opacity="0.6"/>
  <!-- Bullets -->
  <circle cx="200" cy="650" r="22" fill="#AED581" opacity="0.7"/>
  <circle cx="512" cy="700" r="22" fill="#AED581" opacity="0.7"/>
  <circle cx="820" cy="650" r="22" fill="#AED581" opacity="0.7"/>
</svg>
