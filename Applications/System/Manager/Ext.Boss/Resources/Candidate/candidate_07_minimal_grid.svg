<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="512" height="100" rx="80" fill="url(#blueGrad)"/>
  <rect x="0" y="60" width="512" height="40" fill="url(#blueGrad)"/>
  <text x="256" y="65" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Ext.Boss</text>
  <!-- Grid rows -->
  <rect x="50" y="120" width="412" height="52" rx="8" fill="white"/>
  <rect x="50" y="120" width="80" height="52" rx="8" fill="#e3f2fd"/>
  <text x="90" y="152" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="url(#blueGrad)" text-anchor="middle">.pdf</text>
  <text x="260" y="152" font-family="Arial" font-size="15" fill="#37474f" text-anchor="middle">Adobe Acrobat Reader</text>
  <circle cx="430" cy="146" r="10" fill="#4caf50"/>

  <rect x="50" y="182" width="412" height="52" rx="8" fill="white"/>
  <rect x="50" y="182" width="80" height="52" rx="8" fill="#e8f5e9"/>
  <text x="90" y="214" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">.mp3</text>
  <text x="260" y="214" font-family="Arial" font-size="15" fill="#37474f" text-anchor="middle">VLC Media Player</text>
  <circle cx="430" cy="208" r="10" fill="#4caf50"/>

  <rect x="50" y="244" width="412" height="52" rx="8" fill="white"/>
  <rect x="50" y="244" width="80" height="52" rx="8" fill="#fff3e0"/>
  <text x="90" y="276" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#e65100" text-anchor="middle">.zip</text>
  <text x="260" y="276" font-family="Arial" font-size="15" fill="#37474f" text-anchor="middle">7-Zip File Manager</text>
  <circle cx="430" cy="270" r="10" fill="#ff9800"/>

  <rect x="50" y="306" width="412" height="52" rx="8" fill="white"/>
  <rect x="50" y="306" width="80" height="52" rx="8" fill="#fce4ec"/>
  <text x="90" y="338" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#880e4f" text-anchor="middle">.png</text>
  <text x="260" y="338" font-family="Arial" font-size="15" fill="#37474f" text-anchor="middle">Paint.NET</text>
  <circle cx="430" cy="332" r="10" fill="#4caf50"/>

  <!-- Add button -->
  <rect x="50" y="375" width="412" height="50" rx="10" fill="url(#accentGrad)"/>
  <text x="256" y="406" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">+ Add Extension</text>
</svg>
