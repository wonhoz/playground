  <text x="630" y="580" font-family="monospace" font-size="38" font-weight="700" fill="#333333">#</text>
  <!-- Main "A" letter in white on top (semi-transparent so chars show through) -->
  <text x="512" y="640" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, Impact, sans-serif" font-size="680" font-weight="900" fill="#FFFFFF" opacity="0.75">A</text>
