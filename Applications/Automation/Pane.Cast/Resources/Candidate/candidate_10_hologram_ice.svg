<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D14"/>
      <stop offset="100%" stop-color="#001A26"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <radialGradient id="hologram" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00B8D4" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#006064" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="60" y="60" width="392" height="392" rx="8" fill="url(#hologram)"/>
  <!-- Scanlines -->
  <rect x="60" y="60" width="392" height="392" rx="8" fill="url(#scan)" opacity="0.5"/>
  <!-- Holographic terminal pane outlines -->
  <rect x="80" y="90" width="160" height="150" rx="6" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7"/>
  <rect x="272" y="90" width="160" height="70" rx="6" fill="none" stroke="#B3E5FC" stroke-width="1.5" opacity="0.7"/>
  <rect x="272" y="172" width="160" height="68" rx="6" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7"/>
  <rect x="80" y="252" width="352" height="140" rx="6" fill="none" stroke="#B3E5FC" stroke-width="1.5" opacity="0.7"/>
  <!-- Ghost content lines (very faint) -->
  <rect x="92" y="106" width="100" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="92" y="116" width="130" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="92" y="126" width="80" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="92" y="136" width="120" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="92" y="146" width="90" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="92" y="156" width="140" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="92" y="166" width="70" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="92" y="176" width="110" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="284" y="106" width="120" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="284" y="116" width="90" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="284" y="126" width="110" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="284" y="136" width="70" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="284" y="188" width="100" height="3" rx="1" fill="#B3E5FC" opacity="0.5"/>
  <rect x="284" y="198" width="130" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <rect x="284" y="208" width="80" height="3" rx="1" fill="#4FC3F7" opacity="0.4"/>
  <!-- Large pane -->
  <rect x="92" y="268" width="200" height="3" rx="1" fill="#B3E5FC" opacity="0.6"/>
  <rect x="92" y="278" width="160" height="3" rx="1" fill="#4FC3F7" opacity="0.5"/>
  <rect x="92" y="288" width="220" height="3" rx="1" fill="#4FC3F7" opacity="0.5"/>
  <rect x="92" y="298" width="140" height="3" rx="1" fill="#B3E5FC" opacity="0.6"/>
  <rect x="92" y="308" width="190" height="3" rx="1" fill="#4FC3F7" opacity="0.5"/>
  <!-- Central hologram emitter -->
  <circle cx="256" cy="256" r="20" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="10" fill="none" stroke="#B3E5FC" stroke-width="2" opacity="0.8"/>
  <circle cx="256" cy="256" r="4" fill="#00E5FF" opacity="0.9"/>
  <!-- Connecting beams -->
  <line x1="150" y1="165" x2="246" y2="250" stroke="#4FC3F7" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="352" y1="125" x2="266" y2="246" stroke="#4FC3F7" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="256" y1="276" x2="256" y2="392" stroke="#4FC3F7" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
</svg>