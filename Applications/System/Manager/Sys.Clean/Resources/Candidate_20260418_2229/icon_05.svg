<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background warm orange -->
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: Janitor/cleaner character dusting PC -->
  <!-- Monitor (PC) -->
  <rect x="460" y="300" width="380" height="280" rx="18" fill="#37474F" opacity="0.9"/>
  <rect x="480" y="320" width="340" height="240" rx="10" fill="#546E7A"/>
  <!-- Monitor stand -->
  <rect x="610" y="580" width="80" height="60" rx="8" fill="#455A64"/>
  <rect x="580" y="640" width="140" height="24" rx="8" fill="#37474F"/>
  <!-- Dust cloud -->
  <ellipse cx="600" cy="340" rx="120" ry="70" fill="#ECEFF1" opacity="0.5"/>
  <circle cx="550" cy="320" r="44" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="640" cy="310" r="36" fill="#FFFFFF" opacity="0.3"/>
  <!-- Duster/broom character (simplified) -->
  <!-- Person head -->
  <circle cx="260" cy="280" r="70" fill="#FF8A65"/>
  <!-- Body -->
  <rect x="206" y="350" width="108" height="240" rx="30" fill="#EF6C00"/>
  <!-- Arms -->
  <rect x="314" y="360" width="200" height="34" rx="17" fill="#EF6C00" transform="rotate(-20 414 377)"/>
  <!-- Duster head -->
  <ellipse cx="520" cy="400" rx="80" ry="30" fill="#FFCA28" transform="rotate(-20 520 400)"/>
  <!-- Duster strands -->
  <line x1="490" y1="420" x2="460" y2="470" stroke="#FFE082" stroke-width="10" stroke-linecap="round"/>
  <line x1="515" y1="430" x2="500" y2="480" stroke="#FFE082" stroke-width="10" stroke-linecap="round"/>
  <line x1="545" y1="428" x2="540" y2="478" stroke="#FFE082" stroke-width="10" stroke-linecap="round"/>
  <!-- Eyes on character -->
  <circle cx="240" cy="270" r="10" fill="#FFFFFF"/>
  <circle cx="280" cy="270" r="10" fill="#FFFFFF"/>
  <circle cx="243" cy="272" r="5" fill="#212121"/>
  <circle cx="283" cy="272" r="5" fill="#212121"/>
  <!-- Layer 3: Junk labels flying off PC -->
  <rect x="650" y="180" width="120" height="44" rx="10" fill="#E53935" transform="rotate(15 710 202)"/>
  <text x="710" y="208" font-family="Arial, sans-serif" font-size="26" fill="#FFFFFF" text-anchor="middle" transform="rotate(15 710 202)">*.tmp</text>
  <rect x="760" y="240" width="100" height="40" rx="10" fill="#7B1FA2" transform="rotate(-10 810 260)"/>
  <text x="810" y="265" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" transform="rotate(-10 810 260)">junk</text>
  <!-- Clean label -->
  <rect x="320" y="840" width="384" height="80" rx="16" fill="#BF360C"/>
  <text x="512" y="893" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FFCCBC" text-anchor="middle">Sys.Clean</text>
</svg>
