  <text x="130" y="540" font-family="'Courier New', monospace" font-size="28" fill="#778877" transform="rotate(9 275 526)">DSC_4521.jpg</text>

  <!-- 파일 카드 5 - 많이 기울어짐 -->
  <rect x="50" y="600" width="350" height="72" rx="10" fill="url(#card-chaos-06)" stroke="#446644" stroke-width="2"
