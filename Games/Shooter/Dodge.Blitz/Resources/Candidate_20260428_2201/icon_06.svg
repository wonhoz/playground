<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD0E5"/>
      <stop offset="1" stop-color="#FFB6CC"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="190" fill="url(#bg06)"/>
  <!-- background pattern dots -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="180" cy="220" r="14"/>
    <circle cx="850" cy="180" r="12"/>
    <circle cx="900" cy="780" r="14"/>
