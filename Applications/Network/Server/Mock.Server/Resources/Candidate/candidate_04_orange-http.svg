<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#2D1500"/>
    </linearGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe/network -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="#FF6B00" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="220" r="80" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.3"/>
  <ellipse cx="256" cy="220" rx="120" ry="50" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.4"/>
  <ellipse cx="256" cy="220" rx="120" ry="80" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="100" x2="256" y2="340" stroke="#FF6B00" stroke-width="2" opacity="0.4"/>
  <line x1="136" y1="220" x2="376" y2="220" stroke="#FF6B00" stroke-width="2" opacity="0.4"/>
  <!-- Central orb -->
  <circle cx="256" cy="220" r="46" fill="url(#orb)"/>
  <!-- HTTP label -->
  <text x="256" y="214" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#1A0A00">HTTP</text>
  <text x="256" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#1A0A00">MOCK</text>
  <!-- Request/Response arrows -->
  <path d="M 256 360 L 180 420 L 332 420 Z" fill="#FF6B00" opacity="0.6"/>
  <text x="256" y="415" text-anchor="middle" font-family="monospace" font-size="14" fill="#1A0A00">Server</text>
  <!-- Port badge -->
  <rect x="174" y="440" width="164" height="36" rx="10" fill="#FF6B00" opacity="0.85"/>
  <text x="256" y="464" text-anchor="middle" font-family="monospace" font-size="16" fill="#1A0A00">localhost:8080</text>
</svg>