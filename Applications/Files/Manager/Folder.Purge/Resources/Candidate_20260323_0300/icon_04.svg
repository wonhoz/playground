<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | bin/obj 폴더 스캔 + 삭제 | 레이어드 | #1E293B -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F1A2A"/>
  <!-- Layer 2: Folder tree (file system) -->
  <!-- Root folder -->
  <rect x="120" y="210" width="200" height="64" rx="10" fill="#334155"/>
  <text x="220" y="250" font-family="Consolas,monospace" font-size="20" fill="#94A3B8" text-anchor="middle">📁 project/</text>
  <!-- Tree line down -->
  <line x1="200" y1="274" x2="200" y2="360" stroke="#334155" stroke-width="3"/>
  <!-- Src folder (normal) -->
  <line x1="200" y1="320" x2="260" y2="320" stroke="#334155" stroke-width="3"/>
  <rect x="260" y="296" width="200" height="48" rx="8" fill="#1E3A5F"/>
  <text x="360" y="326" font-family="Consolas,monospace" font-size="18" fill="#60A5FA" text-anchor="middle">📁 src/</text>
  <!-- bin folder (to be deleted) -->
  <line x1="200" y1="380" x2="260" y2="380" stroke="#334155" stroke-width="3"/>
  <rect x="260" y="356" width="200" height="48" rx="8" fill="#450A0A"/>
  <text x="360" y="386" font-family="Consolas,monospace" font-size="18" fill="#FCA5A5" text-anchor="middle">📁 bin/</text>
  <!-- obj folder (to be deleted) -->
  <line x1="200" y1="440" x2="260" y2="440" stroke="#334155" stroke-width="3"/>
  <rect x="260" y="416" width="200" height="48" rx="8" fill="#450A0A"/>
  <text x="360" y="446" font-family="Consolas,monospace" font-size="18" fill="#FCA5A5" text-anchor="middle">📁 obj/</text>
  <!-- Empty folder (to be deleted) -->
  <line x1="200" y1="500" x2="260" y2="500" stroke="#334155" stroke-width="3"/>
  <rect x="260" y="476" width="200" height="48" rx="8" fill="#4C1D00"/>
  <text x="360" y="506" font-family="Consolas,monospace" font-size="18" fill="#FDBA74" text-anchor="middle">📂 (empty)</text>
  <!-- Layer 3: Delete X marks on target folders -->
  <circle cx="520" cy="380" r="28" fill="#DC2626"/>
  <line x1="506" y1="366" x2="534" y2="394" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="534" y1="366" x2="506" y2="394" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="520" cy="440" r="28" fill="#DC2626"/>
  <line x1="506" y1="426" x2="534" y2="454" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="534" y1="426" x2="506" y2="454" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="520" cy="500" r="28" fill="#F97316"/>
  <line x1="506" y1="486" x2="534" y2="514" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="534" y1="486" x2="506" y2="514" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Stats panel -->
  <rect x="580" y="260" width="340" height="340" rx="16" fill="#111827"/>
  <text x="750" y="306" font-family="Arial,sans-serif" font-size="20" fill="#6B7280" text-anchor="middle">스캔 결과</text>
  <line x1="600" y1="320" x2="900" y2="320" stroke="#1F2937" stroke-width="2"/>
  <text x="600" y="360" font-family="Arial,sans-serif" font-size="17" fill="#94A3B8">발견된 폴더</text>
  <text x="900" y="360" font-family="Consolas,monospace" font-size="20" fill="#F87171" text-anchor="end">247</text>
  <text x="600" y="400" font-family="Arial,sans-serif" font-size="17" fill="#94A3B8">삭제 대상</text>
  <text x="900" y="400" font-family="Consolas,monospace" font-size="20" fill="#EF4444" text-anchor="end">183</text>
  <text x="600" y="440" font-family="Arial,sans-serif" font-size="17" fill="#94A3B8">절약 용량</text>
  <text x="900" y="440" font-family="Consolas,monospace" font-size="20" fill="#4ADE80" text-anchor="end">1.2 GB</text>
  <!-- Delete all button -->
  <rect x="600" y="530" width="300" height="52" rx="12" fill="#DC2626"/>
  <text x="750" y="562" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">모두 삭제</text>
</svg>
