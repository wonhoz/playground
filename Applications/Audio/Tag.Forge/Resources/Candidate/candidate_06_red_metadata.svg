<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Album art square -->
  <rect x="72" y="88" width="200" height="200" rx="16" fill="#C62828" stroke="#EF9A9A" stroke-width="6"/>
  <!-- Music note in album art -->
  <g fill="#FFCDD2" opacity="0.9">
    <rect x="136" y="140" width="14" height="72" rx="3"/>
    <ellipse cx="128" cy="216" rx="20" ry="14" transform="rotate(-15 128 216)"/>
    <rect x="152" y="140" width="14" height="56" rx="3"/>
    <ellipse cx="144" cy="200" rx="20" ry="14" transform="rotate(-15 144 200)"/>
    <rect x="136" y="140" width="30" height="12" rx="3"/>
  </g>
  <!-- Metadata panel -->
  <rect x="72" y="308" width="200" height="136" rx="16" fill="url(#card)" stroke="#EF9A9A" stroke-width="4"/>
  <!-- Metadata fields -->
  <rect x="92" y="328" width="40" height="8" rx="4" fill="#EF9A9A" opacity="0.8"/>
  <rect x="140" y="328" width="112" height="8" rx="4" fill="#FFCDD2" opacity="0.9"/>
  <rect x="92" y="352" width="48" height="8" rx="4" fill="#EF9A9A" opacity="0.8"/>
  <rect x="148" y="352" width="96" height="8" rx="4" fill="#FFCDD2" opacity="0.9"/>
  <rect x="92" y="376" width="40" height="8" rx="4" fill="#EF9A9A" opacity="0.8"/>
  <rect x="140" y="376" width="120" height="8" rx="4" fill="#FFCDD2" opacity="0.9"/>
  <rect x="92" y="400" width="56" height="8" rx="4" fill="#EF9A9A" opacity="0.8"/>
  <rect x="156" y="400" width="88" height="8" rx="4" fill="#FFCDD2" opacity="0.9"/>
  <rect x="92" y="420" width="40" height="8" rx="4" fill="#EF9A9A" opacity="0.7"/>
  <rect x="140" y="420" width="72" height="8" rx="4" fill="#FFCDD2" opacity="0.7"/>
  <!-- Right panel: tag -->
  <rect x="296" y="88" width="152" height="356" rx="16" fill="#C62828" stroke="#EF9A9A" stroke-width="6"/>
  <!-- Tag shape inside -->
  <path d="M 320,152 L 424,152 L 448,200 L 424,248 L 320,248 Z" fill="#EF5350" opacity="0.9"/>
  <circle cx="340" cy="200" r="14" fill="#1A0000"/>
  <rect x="360" y="192" width="64" height="8" rx="4" fill="#FFCDD2" opacity="0.9"/>
  <rect x="360" y="204" width="48" height="6" rx="3" fill="#FFCDD2" opacity="0.7"/>
  <!-- Edit icon -->
  <g transform="translate(372,320) rotate(-45)">
    <rect x="-8" y="-44" width="16" height="60" rx="3" fill="#FFCDD2"/>
    <polygon points="-8,16 8,16 0,32" fill="#FF5252"/>
    <rect x="-8" y="-54" width="16" height="14" rx="2" fill="#BDBDBD"/>
  </g>
</svg>
