<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 라이트 퍼플-핑크 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="50%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <g clip-path="url(#clip08)">
    <!-- Layer 2: 3가지 탐지 모드 카드 (레이어드) -->

    <!-- 빈 파일 탐지 카드 (우, 뒤) -->
    <rect x="554" y="240" width="380" height="340" rx="28" fill="#1565C0" transform="rotate(8 744 410)"/>
    <text x="806" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" transform="rotate(8 806 340)">빈 파일</text>
    <text x="806" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle" transform="rotate(8 806 420)">📄</text>
    <text x="806" y="500" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="#BBDEFB" text-anchor="middle" transform="rotate(8 806 500)">EMPTY FILE</text>

    <!-- VS 아티팩트 카드 (좌, 뒤) -->
    <rect x="90" y="240" width="380" height="340" rx="28" fill="#2E7D32" transform="rotate(-8 280 410)"/>
    <text x="218" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 218 340)">아티팩트</text>
    <text x="218" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle" transform="rotate(-8 218 420)">📁</text>
    <text x="218" y="500" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="34" fill="#C8E6C9" text-anchor="middle" transform="rotate(-8 218 500)">ARTIFACT</text>

    <!-- 빈 폴더 탐지 카드 (중앙, 앞) -->
    <rect x="292" y="200" width="440" height="400" rx="32" fill="#E65100"/>
    <text x="512" y="305" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">빈 폴더</text>
    <text x="512" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="110" text-anchor="middle">📁</text>
    <text x="512" y="530" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="40" fill="#FFCCBC" text-anchor="middle">EMPTY FOLDER</text>

    <!-- Layer 3: 하단 삭제 버튼 배지 -->
    <circle cx="512" cy="820" r="96" fill="#F44336"/>
    <text x="512" y="800" font-family="'Segoe UI',Arial,sans-serif" font-size="54" text-anchor="middle">🗑</text>
    <text x="512" y="862" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">삭제</text>

    <!-- 좌우 용량 표시 -->
    <text x="200" y="848" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#2E7D32" text-anchor="middle">✓</text>
    <text x="824" y="848" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#1565C0" text-anchor="middle">✓</text>

    <!-- 상단 타이틀 -->
    <rect x="220" y="118" width="584" height="72" rx="22" fill="#E65100"/>
    <text x="512" y="172" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">FOLDER PURGE</text>
  </g>
</svg>
