<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Geo.Quiz — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; padding: 32px; }
  h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
  p  { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }
  .card {
    background: #242424;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #42a5f5; transform: translateY(-3px); }
  .card img { width: 120px; height: 120px; border-radius: 8px; }
  .card .label {
    margin-top: 10px;
    font-size: 12px;
    color: #90caf9;
    word-break: break-all;
  }
  .card .num {
    font-size: 20px;
    font-weight: 900;
    color: #42a5f5;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>Geo.Quiz — Icon Candidates</h1>
<p>지리 퀴즈 캐주얼 게임 / 10개 디자인 후보</p>
<div class="grid">
  <div class="card"><div class="num">01</div><img src="candidate_01_globe_quiz.svg" alt="globe_quiz"><div class="label">globe_quiz</div></div>
  <div class="card"><div class="num">02</div><img src="candidate_02_map_pin.svg" alt="map_pin"><div class="label">map_pin</div></div>
  <div class="card"><div class="num">03</div><img src="candidate_03_neon_earth.svg" alt="neon_earth"><div class="label">neon_earth</div></div>
  <div class="card"><div class="num">04</div><img src="candidate_04_flags_quiz.svg" alt="flags_quiz"><div class="label">flags_quiz</div></div>
  <div class="card"><div class="num">05</div><img src="candidate_05_travel_stamps.svg" alt="travel_stamps"><div class="label">travel_stamps</div></div>
  <div class="card"><div class="num">06</div><img src="candidate_06_candy_world.svg" alt="candy_world"><div class="label">candy_world</div></div>
  <div class="card"><div class="num">07</div><img src="candidate_07_dark_atlas.svg" alt="dark_atlas"><div class="label">dark_atlas</div></div>
  <div class="card"><div class="num">08</div><img src="candidate_08_continent_tiles.svg" alt="continent_tiles"><div class="label">continent_tiles</div></div>
  <div class="card"><div class="num">09</div><img src="candidate_09_retro_compass.svg" alt="retro_compass"><div class="label">retro_compass</div></div>
  <div class="card"><div class="num">10</div><img src="candidate_10_streaks_score.svg" alt="streaks_score"><div class="label">streaks_score</div></div>
</div>
</body>
</html>
