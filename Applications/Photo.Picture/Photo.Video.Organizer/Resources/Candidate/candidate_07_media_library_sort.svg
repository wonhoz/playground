  <circle cx="204" cy="248" r="14" fill="white" opacity="0.3"/>
  <rect x="256" y="210" width="72" height="78" rx="6" fill="url(#card3)"/>
  <polygon points="278,236 302,252 278,268" fill="white" opacity="0.5"/>
  <rect x="344" y="216" width="72" height="72" rx="6" fill="url(#card1)" opacity="0.7"/>
  <!-- Cards on second shelf -->
  <rect x="80" y="316" width="60" height="78" rx="6" fill="url(#card3)" opacity="0.8"/>
  <rect x="156" y="316" width="60" height="78" rx="6" fill="url(#card2)" opacity="0.8"/>
  <rect x="232" y="316" width="60" height="78" rx="6" fill="url(#card1)" opacity="0.8"/>
  <rect x="308" y="316" width="60" height="78" rx="6" fill="#818cf8" opacity="0.8"/>
