<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Layered port cards (OPEN / CLOSED / FILTERED states) -->
  <!-- Card bottom (FILTERED) -->
  <rect x="180" y="420" width="680" height="200" rx="24" fill="#6B7280" opacity="0.7"/>
  <text x="300" y="492" font-family="monospace" font-size="68" fill="white" font-weight="bold">:8080</text>
  <rect x="520" y="458" width="240" height="68" rx="14" fill="#9CA3AF"/>
  <text x="640" y="505" font-family="monospace" font-size="56" fill="white" text-anchor="middle">FILTER</text>
  <!-- Card middle (CLOSED) -->
  <rect x="180" y="340" width="680" height="200" rx="24" fill="#EF4444" opacity="0.85"/>
  <text x="300" y="412" font-family="monospace" font-size="68" fill="white" font-weight="bold">:3306</text>
  <rect x="520" y="376" width="240" height="68" rx="14" fill="#DC2626"/>
  <text x="640" y="423" font-family="monospace" font-size="56" fill="white" text-anchor="middle">CLOSED</text>
  <!-- Card top (OPEN) -->
  <rect x="180" y="260" width="680" height="200" rx="24" fill="#10B981"/>
  <text x="300" y="332" font-family="monospace" font-size="68" fill="white" font-weight="bold">:443</text>
  <rect x="520" y="296" width="240" height="68" rx="14" fill="#059669"/>
  <text x="640" y="343" font-family="monospace" font-size="56" fill="white" text-anchor="middle">OPEN</text>
  <!-- Layer 3: Eye/watch icon overlaid -->
  <ellipse cx="512" cy="720" rx="160" ry="88" fill="white" opacity="0.9"/>
  <circle cx="512" cy="720" r="48" fill="#F59E0B"/>
  <circle cx="512" cy="720" r="24" fill="white"/>
  <!-- Scan line -->
  <line x1="220" y1="720" x2="352" y2="720" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="672" y1="720" x2="804" y2="720" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
</svg>
