<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050010"/>
      <stop offset="100%" style="stop-color:#100020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon blocks stacked -->
  <rect x="156" y="356" width="200" height="56" rx="6" fill="#1a0a30" stroke="#ff00ff" stroke-width="3" filter="url(#glow)"/>
  <rect x="172" y="300" width="168" height="56" rx="6" fill="#0a1a30" stroke="#00ffff" stroke-width="3" filter="url(#glow)"/>
  <rect x="188" y="244" width="136" height="56" rx="6" fill="#0a2a10" stroke="#00ff88" stroke-width="3" filter="url(#glow)"/>
  <rect x="204" y="188" width="104" height="56" rx="6" fill="#2a1a00" stroke="#ffcc00" stroke-width="3" filter="url(#glow)"/>
  <!-- Tipping top block -->
  <g transform="translate(256,150) rotate(18)">
    <rect x="-44" y="-28" width="88" height="56" rx="6" fill="#2a0010" stroke="#ff3366" stroke-width="3" filter="url(#glow)"/>
  </g>
  <!-- Neon crack effect -->
  <polyline points="220,244 208,270 232,300" stroke="#ff3366" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8"/>
  <!-- Particles -->
  <circle cx="100" cy="300" r="8" fill="#ff00ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="420" cy="280" r="6" fill="#00ffff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="90" cy="200" r="5" fill="#00ff88" filter="url(#glow)" opacity="0.6"/>
  <circle cx="430" cy="350" r="7" fill="#ffcc00" filter="url(#glow)" opacity="0.7"/>
  <!-- Ground glow -->
  <rect x="80" y="428" width="352" height="8" rx="4" fill="#ff00ff" opacity="0.3" filter="url(#glow)"/>
</svg>