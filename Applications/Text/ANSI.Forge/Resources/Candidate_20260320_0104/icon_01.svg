<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 픽셀아트+팔레트: pixel grid with color palette -->
  <!-- Pixel canvas (5x5 grid) -->
  <rect x="220" y="280" width="400" height="400" rx="8" fill="#4A148C" opacity="0.3"/>
  <!-- Colored pixel blocks -->
  <rect x="220" y="280" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="300" y="280" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="380" y="280" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="460" y="280" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="540" y="280" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="220" y="360" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="300" y="360" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="380" y="360" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="460" y="360" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="540" y="360" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="220" y="440" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="300" y="440" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="380" y="440" width="80" height="80" rx="4" fill="#CE93D8" opacity="0.5"/>
  <rect x="460" y="440" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="540" y="440" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="220" y="520" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="300" y="520" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="380" y="520" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="460" y="520" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="540" y="520" width="80" height="80" rx="4" fill="#CE93D8" opacity="0.6"/>
  <rect x="220" y="600" width="80" height="80" rx="4" fill="#CE93D8" opacity="0.7"/>
  <rect x="300" y="600" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="380" y="600" width="80" height="80" rx="4" fill="#CE93D8"/>
  <rect x="460" y="600" width="80" height="80" rx="4" fill="#4A148C"/>
  <rect x="540" y="600" width="80" height="80" rx="4" fill="#CE93D8"/>
  <!-- Palette circles -->
  <circle cx="680" cy="400" r="50" fill="#CE93D8"/>
  <circle cx="760" cy="400" r="50" fill="#4A148C"/>
  <circle cx="720" cy="480" r="50" fill="#CE93D8" opacity="0.5"/>
  <!-- Brush indicator -->
  <line x1="680" y1="580" x2="780" y2="720" stroke="#CE93D8" stroke-width="16" stroke-linecap="round"/>
  <rect x="648" y="548" width="60" height="50" rx="10" fill="#4A148C"/>
</svg>