<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#18181B"/>
  <!-- Layer 2: Trash can -->
  <!-- Trash body -->
  <rect x="300" y="460" width="380" height="380" rx="18" fill="#4B5563"/>
  <!-- Trash lid -->
  <rect x="255" y="400" width="470" height="60" rx="10" fill="#6B7280"/>
  <!-- Handle -->
  <rect x="415" y="350" width="150" height="55" rx="14" fill="#6B7280"/>
  <rect x="430" y="355" width="120" height="40" rx="10" fill="#18181B"/>
  <!-- Lines on trash body -->
  <line x1="400" y1="490" x2="390" y2="810" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
  <line x1="480" y1="490" x2="480" y2="810" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
  <line x1="560" y1="490" x2="570" y2="810" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
  <!-- Layer 3: Flying folders -->
  <!-- Folder 1 (top left) -->
  <g transform="rotate(-20 290 300)">
    <rect x="200" y="230" width="160" height="100" rx="10" fill="#EF4444" opacity="0.85"/>
    <rect x="200" y="200" width="80" height="40" rx="8" fill="#EF4444" opacity="0.85"/>
  </g>
  <!-- Folder 2 (top center) -->
  <g transform="rotate(5 512 250)">
    <rect x="432" y="200" width="160" height="100" rx="10" fill="#F97316" opacity="0.85"/>
    <rect x="432" y="170" width="80" height="40" rx="8" fill="#F97316" opacity="0.85"/>
  </g>
  <!-- Folder 3 (top right) -->
  <g transform="rotate(18 730 280)">
    <rect x="660" y="210" width="140" height="90" rx="10" fill="#DC2626" opacity="0.85"/>
    <rect x="660" y="183" width="70" height="34" rx="7" fill="#DC2626" opacity="0.85"/>
  </g>
  <!-- Motion lines -->
  <line x1="290" y1="340" x2="350" y2="420" stroke="#EF4444" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="310" x2="512" y2="400" stroke="#F97316" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="730" y1="330" x2="660" y2="410" stroke="#DC2626" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
</svg>