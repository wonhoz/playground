<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 쓰레기 봉투 — 버릴 폴더들 담기 | 실루엣/캐릭터 | #FFF5E0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF5E0"/>
  <!-- Layer 2: Garbage bag with folders inside -->
  <!-- Bag body -->
  <path d="M360 380 Q320 420 310 520 Q300 660 340 760 Q380 840 512 860 Q644 840 684 760 Q724 660 714 520 Q704 420 664 380 Z" fill="#374151" stroke="#1F2937" stroke-width="5"/>
  <!-- Bag tie at top -->
  <path d="M380 380 Q420 320 512 340 Q604 320 644 380" fill="none" stroke="#1F2937" stroke-width="8" stroke-linecap="round"/>
  <!-- Knot -->
  <circle cx="512" cy="338" r="22" fill="#1F2937"/>
  <!-- Folders visible inside bag (translucent) -->
  <!-- Folder 1 -->
  <path d="M400 480 Q408 474 424 474 L424 466 Q424 462 432 462 L480 462 Q488 462 488 466 L488 540 Q488 544 480 544 L410 544 Q400 544 400 540 Z" fill="#FBBF24" opacity="0.6"/>
  <!-- Folder 2 -->
  <path d="M448 540 Q456 534 472 534 L472 526 Q472 522 480 522 L540 522 Q548 522 548 526 L548 600 Q548 604 540 604 L458 604 Q448 604 448 600 Z" fill="#60A5FA" opacity="0.55"/>
  <!-- Folder 3 (empty indicator) -->
  <path d="M520 460 Q528 454 544 454 L544 446 Q544 442 552 442 L604 442 Q612 442 612 446 L612 520 Q612 524 604 524 L530 524 Q520 524 520 520 Z" fill="#F87171" opacity="0.5"/>
  <!-- Empty label on folder 3 -->
  <text x="566" y="488" font-family="Arial,sans-serif" font-size="14" fill="#991B1B" text-anchor="middle" opacity="0.8">empty</text>
  <!-- Bag sheen highlight -->
  <path d="M380 420 Q370 500 374 580" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.15"/>
  <!-- Layer 3: 삭제 확인 badge -->
  <circle cx="710" cy="390" r="50" fill="#EF4444"/>
  <text x="710" y="380" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">삭제</text>
  <text x="710" y="406" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">×3</text>
</svg>
