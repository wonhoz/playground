<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050A0A"/>
  <!-- 프리즘 삼각형 -->
  <polygon points="512,180 820,740 204,740" fill="#00695C" opacity="0.5" stroke="#4DB6AC" stroke-width="20"/>
  <!-- 굴절 광선 입력 -->
  <line x1="140" y1="360" x2="390" y2="460" stroke="#4DB6AC" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
  <!-- 굴절 광선 출력 (분산) -->
  <line x1="640" y1="460" x2="900" y2="340" stroke="#4DB6AC" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <line x1="640" y1="470" x2="920" y2="480" stroke="#00695C" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="640" y1="480" x2="900" y2="620" stroke="#4DB6AC" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- 프리즘 내부 빛 -->
  <line x1="390" y1="460" x2="640" y2="460" stroke="#4DB6AC" stroke-width="10" opacity="0.5" stroke-dasharray="20 10"/>
  <!-- 프리즘 빛 반짝임 -->
  <circle cx="512" cy="460" r="24" fill="#4DB6AC" opacity="0.6"/>
</svg>
