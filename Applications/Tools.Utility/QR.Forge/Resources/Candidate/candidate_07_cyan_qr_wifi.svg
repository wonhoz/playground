<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002233"/>
      <stop offset="100%" stop-color="#001A26"/>
    </linearGradient>
    <radialGradient id="cyan" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#E0FFFF"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </radialGradient>
    <linearGradient id="wifi" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- WiFi arcs -->
  <g fill="none" stroke="url(#wifi)" stroke-linecap="round">
    <path d="M 156 210 A 140 140 0 0 1 356 210" stroke-width="22" opacity="0.9"/>
    <path d="M 184 242 A 100 100 0 0 1 328 242" stroke-width="20" opacity="0.75"/>
    <path d="M 212 274 A 60 60 0 0 1 300 274" stroke-width="18" opacity="0.6"/>
    <circle cx="256" cy="308" r="20" fill="url(#wifi)" stroke="none"/>
  </g>
  <!-- QR corners bottom -->
  <rect x="76" y="340" width="100" height="100" rx="10" fill="none" stroke="url(#cyan)" stroke-width="14"/>
  <rect x="92" y="356" width="68" height="68" rx="4" fill="url(#cyan)" opacity="0.85"/>
  <rect x="336" y="340" width="100" height="100" rx="10" fill="none" stroke="url(#cyan)" stroke-width="14"/>
  <rect x="352" y="356" width="68" height="68" rx="4" fill="url(#cyan)" opacity="0.85"/>
  <!-- Mini data -->
  <rect x="200" y="390" width="16" height="16" rx="3" fill="url(#cyan)"/>
  <rect x="224" y="390" width="16" height="16" rx="3" fill="url(#cyan)" opacity="0.6"/>
  <rect x="248" y="390" width="16" height="16" rx="3" fill="url(#cyan)"/>
  <rect x="272" y="390" width="16" height="16" rx="3" fill="url(#cyan)" opacity="0.6"/>
  <rect x="296" y="390" width="16" height="16" rx="3" fill="url(#cyan)"/>
</svg>
