<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프리즘 삼각형 -->
  <polygon points="256,100 110,380 402,380" fill="#A78BFA" opacity="0.05"/>
  <polygon points="256,100 110,380 402,380" fill="none" stroke="#A78BFA" stroke-width="3" filter="url(#glow)"/>
  <!-- 입사 백색광 -->
  <line x1="80" y1="180" x2="196" y2="268" stroke="#E0E0E0" stroke-width="4" opacity="0.5" filter="url(#glow)"/>
  <!-- 굴절 색상 빔들 -->
  <line x1="316" y1="268" x2="420" y2="160" stroke="#FF6B6B" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="316" y1="273" x2="428" y2="200" stroke="#FFD166" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <line x1="316" y1="278" x2="428" y2="260" stroke="#06D6A0" stroke-width="2.5" opacity="0.7"/>
  <line x1="316" y1="283" x2="420" y2="320" stroke="#118AB2" stroke-width="2.5" opacity="0.7"/>
  <line x1="316" y1="288" x2="412" y2="370" stroke="#A78BFA" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="65" y="178" fill="#E0E0E0" font-size="11" font-family="monospace" opacity="0.5">RAW</text>
  <text x="424" y="162" fill="#FF6B6B" font-size="9" font-family="monospace" opacity="0.8">R</text>
  <text x="432" y="202" fill="#FFD166" font-size="9" font-family="monospace" opacity="0.7">G</text>
  <text x="432" y="262" fill="#06D6A0" font-size="9" font-family="monospace" opacity="0.7">B</text>
  <text x="424" y="322" fill="#118AB2" font-size="9" font-family="monospace" opacity="0.7">LUT</text>
  <text x="416" y="372" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.8">GRADE</text>
  <!-- 프리즘 코어 -->
  <circle cx="256" cy="285" r="8" fill="#A78BFA" opacity="0.4" filter="url(#glow)"/>
  <!-- 배경 별 -->
  <circle cx="140" cy="130" r="3" fill="#A78BFA" opacity="0.5"/>
  <circle cx="380" cy="130" r="3" fill="#C084FC" opacity="0.5" filter="url(#glow)"/>
</svg>