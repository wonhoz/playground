<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_fp03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <clipPath id="c_fp03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Purple background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_fp03)"/>
  <g clip-path="url(#c_fp03)">
    <!-- Layer 2: Funnel/filter shape -->
    <!-- Funnel top opening -->
    <rect x="152" y="160" width="720" height="80" rx="40" fill="#A78BFA"/>
    <!-- Funnel body (triangle) - using polygon -->
    <polygon points="152,200 872,200 632,560 392,560" fill="#8B5CF6"/>
    <!-- Funnel neck -->
    <rect x="392" y="540" width="240" height="80" rx="20" fill="#7C3AED"/>
    <!-- Funnel output pipe -->
    <rect x="452" y="600" width="120" height="200" rx="20" fill="#6D28D9"/>
    <!-- Clean output at bottom -->
    <circle cx="512" cy="860" r="60" fill="#FCD34D"/>
    <circle cx="512" cy="860" r="40" fill="#F59E0B"/>
    <!-- Layer 3: Folder icons going in from top (3 folders) -->
    <!-- Folder 1 (left) -->
    <g transform="translate(240, 80)">
      <rect x="0" y="28" width="120" height="90" rx="14" fill="#FDE68A"/>
      <rect x="0" y="0" width="70" height="36" rx="14" fill="#FDE68A"/>
    </g>
    <!-- Folder 2 (center) -->
    <g transform="translate(452, 60)">
      <rect x="0" y="28" width="120" height="90" rx="14" fill="#FCD34D"/>
      <rect x="0" y="0" width="70" height="36" rx="14" fill="#FCD34D"/>
    </g>
    <!-- Folder 3 (right) -->
    <g transform="translate(664, 80)">
      <rect x="0" y="28" width="120" height="90" rx="14" fill="#FDE68A"/>
      <rect x="0" y="0" width="70" height="36" rx="14" fill="#FDE68A"/>
    </g>
    <!-- X marks on bad folders (1 and 3) -->
    <line x1="258" y1="118" x2="338" y2="178" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
    <line x1="338" y1="118" x2="258" y2="178" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
    <line x1="682" y1="118" x2="762" y2="178" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
    <line x1="762" y1="118" x2="682" y2="178" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
    <!-- Check mark on good folder (center) -->
    <path d="M472 138 L492 162 L536 116" stroke="#22C55E" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
