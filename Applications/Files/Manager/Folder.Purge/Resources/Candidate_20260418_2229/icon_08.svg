<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background gradient dark to bright -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="gauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="40%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Big folder icon + disk gauge inside -->
  <!-- Folder shape -->
  <path d="M150 380 L150 760 L874 760 L874 380 L540 380 L500 300 L150 300 Z" fill="#37474F" opacity="0.9"/>
  <rect x="150" y="380" width="724" height="380" rx="0" fill="#455A64" opacity="0.9"/>
  <!-- Gauge bar inside folder -->
  <rect x="200" y="500" width="624" height="70" rx="35" fill="#263238" opacity="0.9"/>
  <!-- Gauge fill - Before -->
  <rect x="200" y="500" width="590" height="70" rx="35" fill="url(#gauge)" opacity="0.5"/>
  <text x="780" y="545" font-family="Arial Black, sans-serif" font-size="36" fill="#EF9A9A" text-anchor="middle">94%</text>
  <!-- Arrow down -->
  <polygon points="512,590 470,640 554,640" fill="#FFFFFF" opacity="0.7"/>
  <!-- Gauge After -->
  <rect x="200" y="650" width="624" height="70" rx="35" fill="#263238" opacity="0.9"/>
  <rect x="200" y="650" width="140" height="70" rx="35" fill="#43A047" opacity="0.85"/>
  <text x="780" y="695" font-family="Arial Black, sans-serif" font-size="36" fill="#A5D6A7" text-anchor="middle">18%</text>
  <!-- Layer 3: Freed space badge -->
  <rect x="290" y="810" width="444" height="90" rx="20" fill="#1B5E20" opacity="0.9"/>
  <text x="512" y="868" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FFFFFF" text-anchor="middle">-76% freed!</text>
</svg>
