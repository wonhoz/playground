<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000D0D"/>
  <!-- Honeycomb log structure (7 hexagons) -->
  <!-- Center hex -->
  <polygon points="512,390 580,430 580,510 512,550 444,510 444,430" fill="#00838F"/>
  <!-- Top hex -->
  <polygon points="512,230 580,270 580,350 512,390 444,350 444,270" fill="#0d2a2a" stroke="#00838F" stroke-width="10"/>
  <!-- Top-right hex -->
  <polygon points="648,310 716,350 716,430 648,470 580,430 580,350" fill="#0d2a2a" stroke="#26C6DA" stroke-width="10"/>
  <!-- Bottom-right hex -->
  <polygon points="648,470 716,510 716,590 648,630 580,590 580,510" fill="#0d2a2a" stroke="#00838F" stroke-width="10"/>
  <!-- Bottom hex -->
  <polygon points="512,550 580,590 580,670 512,710 444,670 444,590" fill="#0d2a2a" stroke="#26C6DA" stroke-width="10"/>
  <!-- Bottom-left hex -->
  <polygon points="376,470 444,510 444,590 376,630 308,590 308,510" fill="#0d2a2a" stroke="#00838F" stroke-width="10"/>
  <!-- Top-left hex -->
  <polygon points="376,310 444,350 444,430 376,470 308,430 308,350" fill="#0d2a2a" stroke="#00838F" stroke-width="10"/>
  <!-- Log lines inside center hex -->
  <line x1="468" y1="455" x2="556" y2="455" stroke="#26C6DA" stroke-width="10"/>
  <line x1="468" y1="480" x2="540" y2="480" stroke="#26C6DA" stroke-width="10"/>
  <line x1="468" y1="505" x2="548" y2="505" stroke="#26C6DA" stroke-width="10"/>
</svg>