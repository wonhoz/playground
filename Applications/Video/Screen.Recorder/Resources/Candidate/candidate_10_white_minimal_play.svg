<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#12121E"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clean monitor outline -->
  <rect x="70" y="90" width="372" height="248" rx="18" fill="none" stroke="url(#white)" stroke-width="6"/>
  <!-- Inner screen -->
  <rect x="84" y="104" width="344" height="220" rx="12" fill="#12121E"/>
  <!-- Play triangle -->
  <circle cx="256" cy="214" r="80" fill="none" stroke="url(#white)" stroke-width="6"/>
  <polygon points="234,180 234,248 306,214" fill="url(#white)"/>
  <!-- Monitor stand -->
  <rect x="240" y="338" width="32" height="40" rx="6" fill="none" stroke="url(#white)" stroke-width="5"/>
  <rect x="196" y="376" width="120" height="16" rx="7" fill="none" stroke="url(#white)" stroke-width="5"/>
  <!-- REC pill badge -->
  <rect x="100" y="118" width="80" height="26" rx="13" fill="url(#accent)"/>
  <circle cx="116" cy="131" r="7" fill="white" opacity="0.9"/>
  <rect x="128" y="125" width="40" height="12" rx="5" fill="white" opacity="0.8"/>
  <!-- Duration bar -->
  <rect x="84" y="306" width="344" height="10" rx="5" fill="#1E1E2E"/>
  <rect x="84" y="306" width="200" height="10" rx="5" fill="url(#white)" opacity="0.4"/>
  <!-- Timestamp dots -->
  <circle cx="256" cy="311" r="8" fill="url(#white)"/>
</svg>
