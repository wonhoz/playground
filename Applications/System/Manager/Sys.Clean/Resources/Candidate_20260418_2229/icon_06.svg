<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background medical blue -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: PC on operation table, surgeon with tools -->
  <!-- Operation table -->
  <rect x="150" y="620" width="724" height="30" rx="8" fill="#90A4AE"/>
  <rect x="220" y="650" width="584" height="80" rx="8" fill="#78909C"/>
  <!-- PC (patient) on table -->
  <rect x="280" y="380" width="464" height="280" rx="18" fill="#37474F"/>
  <rect x="300" y="400" width="424" height="220" rx="10" fill="#546E7A"/>
  <!-- Screen showing vitals/status -->
  <rect x="320" y="418" width="384" height="182" rx="8" fill="#1A237E"/>
  <!-- Progress bar (scan) -->
  <rect x="340" y="460" width="340" height="24" rx="12" fill="#283593"/>
  <rect x="340" y="460" width="220" height="24" rx="12" fill="#42A5F5"/>
  <text x="512" y="520" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">Scanning...</text>
  <!-- Surgeon glove hands with scalpel tool -->
  <!-- Left hand / tweezers -->
  <path d="M220 480 Q260 430 300 470" stroke="#80CBC4" stroke-width="18" stroke-linecap="round" fill="none"/>
  <circle cx="300" cy="472" r="14" fill="#B2DFDB"/>
  <!-- Right hand / scalpel -->
  <path d="M804 480 Q760 430 720 470" stroke="#80CBC4" stroke-width="18" stroke-linecap="round" fill="none"/>
  <rect x="710" y="455" width="12" height="60" rx="6" fill="#ECEFF1" transform="rotate(20 716 485)"/>
  <!-- Layer 3: Health badge -->
  <circle cx="800" cy="760" r="90" fill="#43A047"/>
  <path d="M753 760 L780 788 L848 718" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Medical cross -->
  <rect x="200" y="200" width="90" height="90" rx="12" fill="#F44336"/>
  <rect x="215" y="225" width="60" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="230" y="210" width="30" height="70" rx="6" fill="#FFFFFF"/>
</svg>
