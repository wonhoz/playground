<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Layer 2: Folder tree structure -->
  <!-- Root folder (2024) -->
  <g>
    <path d="M148,180 L148,290 L490,290 L490,218 L340,218 L318,180 Z" fill="#33691E"/>
    <rect x="148" y="218" width="342" height="72" rx="8" fill="#558B2F"/>
    <text x="319" y="272" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle">2024</text>
  </g>

  <!-- Tree line from root -->
  <line x1="220" y1="290" x2="220" y2="760" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>

  <!-- Sub-folder Jan -->
  <line x1="220" y1="380" x2="308" y2="380" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <g>
    <path d="M308,344 L308,416 L570,416 L570,362 L450,362 L434,344 Z" fill="#689F38"/>
    <rect x="308" y="362" width="262" height="54" rx="6" fill="#7CB342"/>
    <text x="439" y="407" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">01 / Jan</text>
  </g>
  <!-- Photo in Jan -->
  <rect x="590" y="322" width="150" height="116" rx="10" fill="white" stroke="#7CB342" stroke-width="6"/>
  <rect x="598" y="330" width="134" height="72" fill="#81D4FA"/>
  <circle cx="634" cy="356" r="20" fill="#FFD600"/>
  <path d="M598,376 L626,350 L654,366 L682,346 L732,376 L732,402 L598,402 Z" fill="#4CAF50" opacity="0.6"/>
  <!-- × 3 count badge -->
  <circle cx="782" cy="360" r="36" fill="#33691E"/>
  <text x="782" y="375" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle">×3</text>

  <!-- Sub-folder Feb -->
  <line x1="220" y1="530" x2="308" y2="530" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <g>
    <path d="M308,494 L308,566 L570,566 L570,512 L450,512 L434,494 Z" fill="#689F38"/>
    <rect x="308" y="512" width="262" height="54" rx="6" fill="#8BC34A"/>
    <text x="439" y="557" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">02 / Feb</text>
  </g>
  <!-- Photos in Feb -->
  <rect x="590" y="472" width="150" height="116" rx="10" fill="white" stroke="#8BC34A" stroke-width="6"/>
  <rect x="598" y="480" width="134" height="72" fill="#B3E5FC"/>
  <circle cx="782" cy="510" r="36" fill="#33691E"/>
  <text x="782" y="525" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle">×7</text>

  <!-- Sub-folder Mar -->
  <line x1="220" y1="680" x2="308" y2="680" stroke="#33691E" stroke-width="14" stroke-linecap="round"/>
  <g>
    <path d="M308,644 L308,716 L570,716 L570,662 L450,662 L434,644 Z" fill="#689F38"/>
    <rect x="308" y="662" width="262" height="54" rx="6" fill="#9CCC65"/>
    <text x="439" y="707" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#1B5E20" text-anchor="middle">03 / Mar</text>
  </g>
  <circle cx="782" cy="660" r="36" fill="#33691E"/>
  <text x="782" y="675" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle">×12</text>

  <!-- Layer 3: Camera icon (bottom) -->
  <g transform="translate(148, 790)">
    <rect x="0" y="28" width="290" height="190" rx="20" fill="#1A237E"/>
    <rect x="30" y="0" width="100" height="40" rx="8" fill="#283593"/>
    <circle cx="145" cy="123" r="66" fill="#3F51B5"/>
    <circle cx="145" cy="123" r="46" fill="#5C6BC0"/>
    <circle cx="145" cy="123" r="30" fill="#E8EAF6"/>
    <rect x="218" y="44" width="40" height="26" rx="6" fill="#FFD600"/>
  </g>
</svg>
