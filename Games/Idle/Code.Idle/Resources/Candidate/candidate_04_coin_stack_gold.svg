<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#3E2C00"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="coinside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code symbol on top coin -->
  <!-- Coin stack bottom -->
  <ellipse cx="256" cy="376" rx="100" ry="28" fill="url(#coinside)"/>
  <rect x="156" y="340" width="200" height="36" fill="url(#coinside)"/>
  <ellipse cx="256" cy="340" rx="100" ry="28" fill="url(#coin)"/>
  <text x="256" y="348" text-anchor="middle" font-size="24" fill="#3E2C00" font-weight="bold" font-family="Courier New">&lt;/&gt;</text>
  <!-- Coin stack middle -->
  <ellipse cx="256" cy="312" rx="100" ry="28" fill="url(#coinside)"/>
  <rect x="156" y="276" width="200" height="36" fill="url(#coinside)"/>
  <ellipse cx="256" cy="276" rx="100" ry="28" fill="url(#coin)"/>
  <text x="256" y="284" text-anchor="middle" font-size="24" fill="#3E2C00" font-weight="bold" font-family="Courier New">XP</text>
  <!-- Coin stack top -->
  <ellipse cx="256" cy="248" rx="100" ry="28" fill="url(#coinside)"/>
  <rect x="156" y="212" width="200" height="36" fill="url(#coinside)"/>
  <ellipse cx="256" cy="212" rx="100" ry="28" fill="url(#coin)"/>
  <text x="256" y="220" text-anchor="middle" font-size="24" fill="#3E2C00" font-weight="bold" font-family="Courier New">$$$</text>
  <!-- Floating coins -->
  <ellipse cx="160" cy="170" rx="30" ry="10" fill="url(#coin)" opacity="0.8"/>
  <ellipse cx="358" cy="158" rx="24" ry="8" fill="url(#coin)" opacity="0.7"/>
  <ellipse cx="390" cy="190" rx="18" ry="6" fill="url(#coin)" opacity="0.6"/>
</svg>
