<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 초시계+프로세스: stopwatch with CPU core inside -->
  <!-- Stopwatch outer ring -->
  <circle cx="512" cy="560" r="280" fill="none" stroke="#33691E" stroke-width="40"/>
  <!-- Stopwatch progress arc (about 60%) -->
  <path d="M512 280 A280 280 0 1 1 231 415" fill="none" stroke="#AED581" stroke-width="40" stroke-linecap="round"/>
  <!-- Tick marks on ring -->
  <line x1="512" y1="296" x2="512" y2="324" stroke="#050A00" stroke-width="8"/>
  <line x1="792" y1="560" x2="764" y2="560" stroke="#050A00" stroke-width="8"/>
  <line x1="512" y1="824" x2="512" y2="796" stroke="#050A00" stroke-width="8"/>
  <line x1="232" y1="560" x2="260" y2="560" stroke="#050A00" stroke-width="8"/>
  <!-- Stopwatch top button -->
  <rect x="488" y="200" width="48" height="50" rx="10" fill="#33691E"/>
  <rect x="470" y="190" width="84" height="30" rx="10" fill="#33691E"/>
  <!-- Second hand needle -->
  <line x1="512" y1="560" x2="512" y2="340" stroke="#AED581" stroke-width="10" stroke-linecap="round"/>
  <circle cx="512" cy="560" r="18" fill="#AED581"/>
  <!-- CPU chip inside -->
  <rect x="452" y="500" width="120" height="120" rx="12" fill="#33691E"/>
  <rect x="466" y="514" width="92" height="92" rx="8" fill="#050A00"/>
  <line x1="492" y1="514" x2="492" y2="606" stroke="#33691E" stroke-width="4"/>
  <line x1="512" y1="514" x2="512" y2="606" stroke="#33691E" stroke-width="4"/>
  <line x1="532" y1="514" x2="532" y2="606" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="540" x2="558" y2="540" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="560" x2="558" y2="560" stroke="#33691E" stroke-width="4"/>
  <line x1="466" y1="580" x2="558" y2="580" stroke="#33691E" stroke-width="4"/>
</svg>