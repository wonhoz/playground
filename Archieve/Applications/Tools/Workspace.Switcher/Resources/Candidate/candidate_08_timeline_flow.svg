<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#152035"/>
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 타임라인 선 -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="url(#timelineGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- 노드 1 (Desk 1) -->
  <circle cx="140" cy="256" r="22" fill="url(#node1)" stroke="#60a5fa" stroke-width="3"/>
  <text x="140" y="261" font-family="Arial" font-weight="bold" font-size="14" fill="white" text-anchor="middle">1</text>
  <rect x="90" y="160" width="100" height="72" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="190" font-family="Arial" font-size="11" fill="#bfdbfe" text-anchor="middle">Work</text>
  <rect x="100" y="200" width="80" height="8" rx="2" fill="#2563eb" opacity="0.6"/>
  <rect x="100" y="214" width="60" height="8" rx="2" fill="#2563eb" opacity="0.4"/>
  <line x1="140" y1="232" x2="140" y2="234" stroke="#60a5fa" stroke-width="2"/>
  <!-- 노드 2 (Desk 2 - 활성) -->
  <circle cx="256" cy="256" r="28" fill="url(#node2)" stroke="#a78bfa" stroke-width="4"/>
  <circle cx="256" cy="256" r="14" fill="#7c3aed"/>
  <rect x="194" y="310" width="124" height="80" rx="8" fill="#4c1d95" stroke="#8b5cf6" stroke-width="2"/>
  <text x="256" y="336" font-family="Arial" font-weight="bold" font-size="12" fill="#ddd6fe" text-anchor="middle">Browser</text>
  <text x="256" y="354" font-family="Arial" font-size="11" fill="#c4b5fd" text-anchor="middle">(Active)</text>
  <rect x="206" y="364" width="100" height="8" rx="2" fill="#6d28d9" opacity="0.6"/>
  <line x1="256" y1="284" x2="256" y2="310" stroke="#a78bfa" stroke-width="2"/>
  <!-- 노드 3 (Desk 3) -->
  <circle cx="372" cy="256" r="22" fill="url(#node3)" stroke="#f472b6" stroke-width="3"/>
  <text x="372" y="261" font-family="Arial" font-weight="bold" font-size="14" fill="white" text-anchor="middle">3</text>
  <rect x="322" y="160" width="100" height="72" rx="8" fill="#9d174d" stroke="#ec4899" stroke-width="1.5"/>
  <text x="372" y="190" font-family="Arial" font-size="11" fill="#fbcfe8" text-anchor="middle">Media</text>
  <rect x="332" y="200" width="80" height="8" rx="2" fill="#be185d" opacity="0.6"/>
