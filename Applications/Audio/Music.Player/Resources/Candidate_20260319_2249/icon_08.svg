<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Musical staff with notes flowing -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#001008"/>
  <!-- 5 staff lines -->
  <rect x="120" y="354" width="784" height="12" rx="6" fill="#2E7D32" opacity="0.7"/>
  <rect x="120" y="416" width="784" height="12" rx="6" fill="#2E7D32" opacity="0.7"/>
  <rect x="120" y="478" width="784" height="12" rx="6" fill="#2E7D32" opacity="0.7"/>
  <rect x="120" y="540" width="784" height="12" rx="6" fill="#2E7D32" opacity="0.7"/>
  <rect x="120" y="602" width="784" height="12" rx="6" fill="#2E7D32" opacity="0.7"/>
  <!-- Treble clef (simplified) -->
  <path d="M180 660 Q140 580 200 520 Q260 460 220 390 Q180 320 240 280 Q300 240 320 300 Q340 360 290 400 Q260 420 270 480 Q280 540 270 600 Q260 660 280 700 Q300 740 260 760 Q220 780 200 740 Q180 700 210 680" fill="none" stroke="#4CAF50" stroke-width="18" stroke-linecap="round"/>
  <!-- Quarter notes on staff -->
  <!-- Note 1 (E - bottom space) -->
  <ellipse cx="340" cy="572" rx="32" ry="23" fill="#4CAF50" transform="rotate(-15, 340, 572)"/>
  <rect x="372" y="380" width="16" height="196" rx="6" fill="#4CAF50"/>
  <!-- Note 2 (G - 2nd line) — higher -->
  <ellipse cx="480" cy="416" rx="32" ry="23" fill="#A5D6A7" transform="rotate(-15, 480, 416)"/>
  <rect x="512" y="220" width="16" height="200" rx="6" fill="#A5D6A7"/>
  <!-- Note 3 (C - 3rd space) -->
  <ellipse cx="620" cy="509" rx="32" ry="23" fill="#4CAF50" transform="rotate(-15, 620, 509)"/>
  <rect x="652" y="316" width="16" height="197" rx="6" fill="#4CAF50"/>
  <!-- Note 4 (A - 4th line) -->
  <ellipse cx="760" cy="447" rx="32" ry="23" fill="#A5D6A7" transform="rotate(-15, 760, 447)"/>
  <rect x="792" y="254" width="16" height="197" rx="6" fill="#A5D6A7"/>
  <!-- Beam connecting note 3 and 4 -->
  <path d="M652 316 L792 254" stroke="#4CAF50" stroke-width="22" stroke-linecap="round"/>
  <!-- Bar line -->
  <rect x="560" y="348" width="10" height="264" rx="4" fill="#2E7D32" opacity="0.6"/>
</svg>
