<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#080d14"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071510"/>
      <stop offset="100%" stop-color="#030a08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="screenglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 오실로스코프 외관 -->
  <rect x="60" y="90" width="392" height="280" rx="16" fill="#0a0e14" stroke="#2DD4BF" stroke-width="2.5" opacity="0.9"/>
  <!-- 스크린 -->
  <rect x="80" y="110" width="352" height="220" rx="8" fill="url(#screen)" stroke="#1a3a30" stroke-width="1.5"/>
  <!-- 격자선 -->
  <line x1="80" y1="220" x2="432" y2="220" stroke="#1a3a30" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="165" x2="432" y2="165" stroke="#1a3a30" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="275" x2="432" y2="275" stroke="#1a3a30" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="110" x2="168" y2="330" stroke="#1a3a30" stroke-width="1" opacity="0.4"/>
  <line x1="256" y1="110" x2="256" y2="330" stroke="#1a3a30" stroke-width="1" opacity="0.4"/>
  <line x1="344" y1="110" x2="344" y2="330" stroke="#1a3a30" stroke-width="1" opacity="0.4"/>
  <!-- 채널 A 파형 (이미지1 픽셀 강도) -->
  <path d="M80,220 Q100,160 120,200 Q140,240 160,180 Q180,120 200,200 Q220,240 240,170 Q260,140 280,200 Q300,240 320,175 Q340,130 360,210 Q380,250 400,190 Q415,165 432,200" fill="none" stroke="#2DD4BF" stroke-width="2.5" filter="url(#screenglow)" opacity="0.9"/>
  <!-- 채널 B 파형 (이미지2 픽셀 강도) -->
  <path d="M80,220 Q100,175 120,210 Q140,245 160,195 Q180,145 200,215 Q220,250 240,185 Q260,155 280,215 Q300,250 320,190 Q340,145 360,225 Q380,258 400,205 Q415,178 432,210" fill="none" stroke="#F43F5E" stroke-width="2" stroke-dasharray="6,4" filter="url(#screenglow)" opacity="0.8"/>
  <!-- 차이 영역 채우기 -->
  <path d="M200,200 Q220,240 240,170 Q260,140 280,200 Q300,240 320,175" fill="#FDE047" opacity="0.08"/>
  <!-- 하단 컨트롤 패널 -->
  <rect x="80" y="342" width="70" height="16" rx="4" fill="#1a3a30" stroke="#2DD4BF" stroke-width="1" opacity="0.8"/>
  <text x="115" y="354" text-anchor="middle" font-size="9" fill="#2DD4BF" opacity="0.9">CH.A</text>
  <rect x="165" y="342" width="70" height="16" rx="4" fill="#1a2030" stroke="#F43F5E" stroke-width="1" opacity="0.8"/>
  <text x="200" y="354" text-anchor="middle" font-size="9" fill="#F43F5E" opacity="0.9">CH.B</text>
  <rect x="290" y="342" width="90" height="16" rx="4" fill="#1a1a10" stroke="#FDE047" stroke-width="1" opacity="0.8"/>
  <text x="335" y="354" text-anchor="middle" font-size="9" fill="#FDE047" opacity="0.9">DIFF: 2.4%</text>
  <!-- 하단 버튼들 -->
  <circle cx="90" cy="400" r="16" fill="#0d1520" stroke="#2DD4BF" stroke-width="1.5" opacity="0.8"/>
  <circle cx="130" cy="400" r="16" fill="#0d1520" stroke="#333" stroke-width="1" opacity="0.6"/>
  <circle cx="170" cy="400" r="16" fill="#0d1520" stroke="#333" stroke-width="1" opacity="0.6"/>
  <rect x="220" y="384" width="220" height="32" rx="6" fill="#0a0e14" stroke="#2DD4BF" stroke-width="1" opacity="0.7"/>
  <text x="330" y="404" text-anchor="middle" font-size="11" fill="#2DD4BF" opacity="0.8">COMPARE</text>
</svg>
