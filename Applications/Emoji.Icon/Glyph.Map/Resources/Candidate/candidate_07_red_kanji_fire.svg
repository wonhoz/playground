<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#200000"/>
      <stop offset="100%" stop-color="#0A0000"/>
    </radialGradient>
    <linearGradient id="stroke_grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large CJK character background (watermark) -->
  <text x="256" y="310" text-anchor="middle" fill="#FF2200" font-size="280" font-family="serif" opacity="0.15">&#x6587;</text>
  <!-- Medium sized glyphs arranged artistically -->
  <text x="140" y="200" text-anchor="middle" fill="#FF4400" font-size="80" font-family="serif" opacity="0.9">&#x6587;</text>
  <text x="372" y="200" text-anchor="middle" fill="#FFAA00" font-size="80" font-family="serif" opacity="0.9">&#x5B57;</text>
  <text x="140" y="350" text-anchor="middle" fill="#FF6600" font-size="80" font-family="serif" opacity="0.8">&#x8A9E;</text>
  <text x="372" y="350" text-anchor="middle" fill="#FF3300" font-size="80" font-family="serif" opacity="0.8">&#x8A00;</text>
  <!-- Center glyph -->
  <text x="256" y="290" text-anchor="middle" fill="white" font-size="90" font-family="serif">&#x5B57;</text>
  <!-- Decorative strokes -->
  <line x1="72" y1="400" x2="440" y2="400" stroke="#FF4400" stroke-width="3" opacity="0.4"/>
  <!-- Unicode code point -->
  <text x="256" y="440" text-anchor="middle" fill="#FF6600" font-size="18" font-family="monospace">U+5B57  CJK UNIFIED IDEOGRAPH</text>
  <!-- Brush stroke accent -->
  <path d="M90 90 Q120 70 150 90 Q120 110 90 90" fill="#FF4400" opacity="0.6"/>
  <path d="M362 90 Q392 70 422 90 Q392 110 362 90" fill="#FFAA00" opacity="0.6"/>
</svg>
