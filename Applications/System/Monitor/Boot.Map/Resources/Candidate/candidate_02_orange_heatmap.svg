<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150800"/>
      <stop offset="100%" stop-color="#251200"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FFDD66"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBB44"/>
      <stop offset="100%" stop-color="#FFE8AA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Heatmap grid -->
  <rect x="80" y="140" width="352" height="280" rx="8" fill="#200a00" stroke="#553300" stroke-width="1.5"/>
  <!-- Heatmap cells -->
  <!-- Row 1 -->
  <rect x="88" y="148" width="70" height="48" rx="3" fill="#FFCC00" opacity="0.9"/>
  <rect x="166" y="148" width="70" height="48" rx="3" fill="#FF8800" opacity="0.85"/>
  <rect x="244" y="148" width="70" height="48" rx="3" fill="#FF4400" opacity="0.9"/>
  <rect x="322" y="148" width="102" height="48" rx="3" fill="#FFCC00" opacity="0.8"/>
  <!-- Row 2 -->
  <rect x="88" y="204" width="70" height="48" rx="3" fill="#FF4400" opacity="0.95"/>
  <rect x="166" y="204" width="150" height="48" rx="3" fill="#FFCC00" opacity="0.7"/>
  <rect x="324" y="204" width="100" height="48" rx="3" fill="#FF8800" opacity="0.8"/>
  <!-- Row 3 -->
  <rect x="88" y="260" width="120" height="48" rx="3" fill="#FF8800" opacity="0.85"/>
  <rect x="216" y="260" width="70" height="48" rx="3" fill="#FF4400" opacity="0.9"/>
  <rect x="294" y="260" width="130" height="48" rx="3" fill="#FFCC00" opacity="0.75"/>
  <!-- Row 4 -->
  <rect x="88" y="316" width="70" height="96" rx="3" fill="#FFCC00" opacity="0.7"/>
  <rect x="166" y="316" width="70" height="96" rx="3" fill="#FF4400" opacity="0.85"/>
  <rect x="244" y="316" width="180" height="96" rx="3" fill="#FF8800" opacity="0.8"/>
  <!-- Boot clock icon top right -->
  <circle cx="400" cy="96" r="36" fill="#150800" stroke="#FFAA44" stroke-width="2.5"/>
  <circle cx="400" cy="96" r="4" fill="#FFAA44"/>
  <line x1="400" y1="96" x2="400" y2="70" stroke="#FFAA44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="96" x2="420" y2="102" stroke="#FFAA44" stroke-width="2.5" stroke-linecap="round"/>
