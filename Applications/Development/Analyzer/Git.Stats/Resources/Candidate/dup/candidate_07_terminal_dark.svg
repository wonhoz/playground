<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="80" width="392" height="320" rx="12" fill="#0F3460" stroke="#533483" stroke-width="3"/>
  <!-- Terminal title bar -->
  <rect x="60" y="80" width="392" height="36" rx="12" fill="#533483"/>
  <rect x="60" y="98" width="392" height="18" fill="#533483"/>
  <!-- Traffic lights -->
  <circle cx="94" cy="98" r="8" fill="#FF5F57"/>
  <circle cx="118" cy="98" r="8" fill="#FFBD2E"/>
  <circle cx="142" cy="98" r="8" fill="#28CA41"/>
  <!-- Title -->
  <text x="256" y="103" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0E0E0">git-stats</text>
  <!-- Terminal content -->
  <text x="80" y="145" font-family="monospace" font-size="15" fill="#69F0AE">$ git log --oneline | wc -l</text>
  <text x="80" y="168" font-family="monospace" font-size="15" fill="#E0E0E0">  247</text>
  <text x="80" y="195" font-family="monospace" font-size="15" fill="#69F0AE">$ git shortlog -s -n | head -5</text>
  <text x="80" y="218" font-family="monospace" font-size="15" fill="#40C4FF">  128  wonhoz</text>
  <text x="80" y="238" font-family="monospace" font-size="15" fill="#40C4FF">   74  alice</text>
  <text x="80" y="258" font-family="monospace" font-size="15" fill="#40C4FF">   45  bob</text>
  <text x="80" y="282" font-family="monospace" font-size="15" fill="#69F0AE">$ git diff --stat HEAD~1</text>
  <text x="80" y="302" font-family="monospace" font-size="14" fill="#FFD54F">  5 files, +312/-48</text>
  <!-- Cursor -->
  <rect x="80" y="335" width="10" height="20" fill="#69F0AE" opacity="0.8"/>
  <!-- Bottom bar chart -->
  <rect x="80" y="425" width="50" height="30" rx="4" fill="#42A5F5" opacity="0.8"/>
  <rect x="140" y="415" width="50" height="40" rx="4" fill="#69F0AE" opacity="0.8"/>
  <rect x="200" y="400" width="50" height="55" rx="4" fill="#FFD54F" opacity="0.8"/>
  <rect x="260" y="410" width="50" height="45" rx="4" fill="#FF7043" opacity="0.8"/>
  <rect x="320" y="420" width="50" height="35" rx="4" fill="#CE93D8" opacity="0.8"/>
  <rect x="380" y="430" width="50" height="25" rx="4" fill="#80CBC4" opacity="0.8"/>
</svg>
