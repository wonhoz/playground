<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Traffic light priority system -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0F"/>
  <!-- Signal pole -->
  <rect x="486" y="700" width="52" height="200" rx="10" fill="#263238"/>
  <rect x="436" y="880" width="152" height="40" rx="10" fill="#263238"/>
  <!-- Signal housing -->
  <rect x="346" y="200" width="332" height="520" rx="40" fill="#1C252B"/>
  <rect x="346" y="200" width="332" height="520" rx="40" fill="none" stroke="#37474F" stroke-width="10"/>
  <!-- Red light (top - highest priority) -->
  <circle cx="512" cy="320" r="90" fill="#B71C1C" opacity="0.25"/>
  <circle cx="512" cy="320" r="72" fill="#EF5350" opacity="0.9"/>
  <circle cx="512" cy="320" r="56" fill="#FFCDD2" opacity="0.15"/>
  <!-- Yellow light (mid - medium priority) -->
  <circle cx="512" cy="512" r="72" fill="#F57F17" opacity="0.5"/>
  <!-- Green light (bottom - low priority / pass) -->
  <circle cx="512" cy="700" r="72" fill="#37474F" opacity="0.4"/>
  <!-- Active indicator glow on red -->
  <circle cx="512" cy="320" r="86" fill="none" stroke="#EF5350" stroke-width="8" opacity="0.3"/>
  <!-- Priority label (abstract dots) -->
  <circle cx="460" cy="320" r="8" fill="#FFCDD2" opacity="0.5"/>
  <circle cx="484" cy="320" r="8" fill="#FFCDD2" opacity="0.5"/>
</svg>
