<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Stamp marking file extension -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0F"/>
  <!-- Stamp handle -->
  <rect x="420" y="120" width="184" height="100" rx="16" fill="#37474F"/>
  <rect x="450" y="220" width="124" height="60" rx="8" fill="#37474F"/>
  <!-- Stamp body -->
  <rect x="290" y="280" width="444" height="200" rx="20" fill="#263238"/>
  <rect x="290" y="280" width="444" height="200" rx="20" fill="none" stroke="#546E7A" stroke-width="8"/>
  <!-- Stamp face with extension pattern -->
  <rect x="310" y="300" width="404" height="160" rx="12" fill="#37474F" opacity="0.5"/>
  <!-- Extension label blocks -->
  <rect x="334" y="326" width="90" height="50" rx="8" fill="#546E7A" opacity="0.8"/>
  <rect x="444" y="326" width="90" height="50" rx="8" fill="#546E7A" opacity="0.6"/>
  <rect x="554" y="326" width="90" height="50" rx="8" fill="#37474F" opacity="0.7"/>
  <rect x="334" y="392" width="310" height="20" rx="6" fill="#37474F" opacity="0.5"/>
  <!-- Stamped imprint on file below -->
  <rect x="300" y="580" width="424" height="280" rx="16" fill="#1C252B"/>
  <rect x="300" y="580" width="424" height="280" rx="16" fill="none" stroke="#37474F" stroke-width="6"/>
  <polygon points="640,580 724,580 724,664" fill="#263238" opacity="0.8"/>
  <!-- Stamp mark on file (inked impression) -->
  <rect x="336" y="650" width="80" height="44" rx="8" fill="#546E7A" opacity="0.7"/>
  <rect x="436" y="650" width="80" height="44" rx="8" fill="#546E7A" opacity="0.5"/>
  <rect x="536" y="650" width="80" height="44" rx="8" fill="#546E7A" opacity="0.3"/>
  <!-- Ink splatter effect -->
  <circle cx="512" cy="620" r="16" fill="#80CBC4" opacity="0.25"/>
  <circle cx="460" cy="610" r="8" fill="#546E7A" opacity="0.3"/>
  <circle cx="564" cy="614" r="6" fill="#546E7A" opacity="0.25"/>
  <!-- File lines -->
  <rect x="336" y="716" width="260" height="12" rx="4" fill="#37474F" opacity="0.5"/>
  <rect x="336" y="740" width="200" height="10" rx="4" fill="#37474F" opacity="0.4"/>
  <!-- Stamp press glow -->
  <rect x="286" y="276" width="452" height="208" rx="24" fill="none" stroke="#80CBC4" stroke-width="4" opacity="0.2"/>
</svg>
