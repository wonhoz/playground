<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 오렌지 -->
  <rect width="1024" height="1024" rx="180" fill="#0D0800"/>
  <!-- Layer 2: 아케이드 조이스틱 + 탄알들 -->
  <!-- 조이스틱 기판 -->
  <rect x="240" y="480" width="544" height="360" rx="28" fill="#1A1A1A"/>
  <rect x="240" y="480" width="544" height="360" rx="28" fill="none" stroke="#FF6D00" stroke-width="6"/>
  <!-- 조이스틱 볼 -->
  <rect x="328" y="540" width="160" height="8" rx="4" fill="#333"/>
  <rect x="328" y="572" width="160" height="8" rx="4" fill="#333"/>
  <rect x="328" y="604" width="160" height="8" rx="4" fill="#333"/>
  <circle cx="408" cy="600" r="60" fill="#222"/>
  <circle cx="408" cy="600" r="44" fill="#FF6D00"/>
  <circle cx="408" cy="580" r="32" fill="#FF8F00"/>
  <!-- 액션 버튼들 -->
  <circle cx="680" cy="560" r="44" fill="#FF4081"/>
  <circle cx="748" cy="620" r="44" fill="#FFFF00"/>
  <circle cx="680" cy="680" r="44" fill="#69F0AE"/>
  <circle cx="612" cy="620" r="44" fill="#00E5FF"/>
  <!-- 버튼 레이블 -->
  <text x="680" y="572" font-family="Arial Black,Arial" font-size="32" fill="white" text-anchor="middle" font-weight="900">B</text>
  <text x="748" y="632" font-family="Arial Black,Arial" font-size="32" fill="#1A1A1A" text-anchor="middle" font-weight="900">A</text>
  <text x="680" y="692" font-family="Arial Black,Arial" font-size="32" fill="#1A1A1A" text-anchor="middle" font-weight="900">X</text>
  <text x="612" y="632" font-family="Arial Black,Arial" font-size="32" fill="#1A1A1A" text-anchor="middle" font-weight="900">Y</text>
  <!-- 총알들 (위에서 날아옴) -->
  <rect x="280" y="200" width="20" height="48" rx="7" fill="#FF4081"/>
  <rect x="480" y="180" width="20" height="48" rx="7" fill="#FF4081"/>
  <rect x="680" y="200" width="20" height="48" rx="7" fill="#FF80AB"/>
  <rect x="860" y="220" width="20" height="48" rx="7" fill="#FF4081"/>
  <!-- 꼬리 -->
  <line x1="290" y1="200" x2="290" y2="160" stroke="#FF4081" stroke-width="5" opacity="0.4"/>
  <line x1="490" y1="180" x2="490" y2="140" stroke="#FF4081" stroke-width="5" opacity="0.4"/>
  <!-- Layer 3: -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#FF6D00" text-anchor="middle">DODGE.BLITZ</text>
</svg>
