<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0512"/>
      <stop offset="100%" stop-color="#180A28"/>
    </linearGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <radialGradient id="torchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dungeon floor -->
  <rect x="0" y="390" width="512" height="122" fill="url(#stoneGrad)"/>
  <!-- Stone block lines -->
  <line x1="0" y1="390" x2="512" y2="390" stroke="#4B5563" stroke-width="3"/>
  <line x1="100" y1="390" x2="100" y2="512" stroke="#374151" stroke-width="1.5"/>
  <line x1="200" y1="390" x2="200" y2="512" stroke="#374151" stroke-width="1.5"/>
  <line x1="300" y1="390" x2="300" y2="512" stroke="#374151" stroke-width="1.5"/>
  <line x1="400" y1="390" x2="400" y2="512" stroke="#374151" stroke-width="1.5"/>
  <line x1="50" y1="430" x2="150" y2="430" stroke="#374151" stroke-width="1"/>
  <line x1="150" y1="450" x2="250" y2="450" stroke="#374151" stroke-width="1"/>
  <line x1="300" y1="440" x2="400" y2="440" stroke="#374151" stroke-width="1"/>
  <!-- Dungeon walls -->
  <rect x="0" y="0" width="80" height="390" fill="url(#stoneGrad)" stroke="#4B5563" stroke-width="2"/>
  <rect x="432" y="0" width="80" height="390" fill="url(#stoneGrad)" stroke="#4B5563" stroke-width="2"/>
  <!-- Wall blocks -->
  <line x1="0" y1="100" x2="80" y2="100" stroke="#374151" stroke-width="1.5"/>
  <line x1="0" y1="200" x2="80" y2="200" stroke="#374151" stroke-width="1.5"/>
  <line x1="0" y1="300" x2="80" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="432" y1="100" x2="512" y2="100" stroke="#374151" stroke-width="1.5"/>
  <line x1="432" y1="200" x2="512" y2="200" stroke="#374151" stroke-width="1.5"/>
  <line x1="432" y1="300" x2="512" y2="300" stroke="#374151" stroke-width="1.5"/>
  <!-- Torch glow -->
  <circle cx="80" cy="160" r="50" fill="url(#torchGlow)"/>
  <!-- Torch -->
  <rect x="74" y="130" width="12" height="40" rx="4" fill="#92400E"/>
  <ellipse cx="80" cy="128" rx="10" ry="18" fill="#F97316"/>
  <ellipse cx="80" cy="126" rx="6" ry="12" fill="#FDE68A"/>
  <ellipse cx="80" cy="124" rx="3" ry="7" fill="white" opacity="0.8"/>
  <!-- Knight character -->
  <!-- Helmet -->
  <rect x="226" y="240" width="60" height="44" rx="8" fill="url(#armorGrad)" stroke="#9CA3AF" stroke-width="2"/>
  <rect x="230" y="258" width="52" height="16" rx="2" fill="#111827"/>
  <polygon points="226,240 256,218 286,240" fill="#9CA3AF" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Body armor -->
  <rect x="216" y="284" width="80" height="70" rx="6" fill="url(#armorGrad)" stroke="#9CA3AF" stroke-width="2"/>
  <!-- Chest emblem -->
  <polygon points="256,298 263,316 280,316 267,327 272,344 256,334 240,344 245,327 232,316 249,316" fill="#FDE68A" opacity="0.8"/>
  <!-- Legs (running) -->
  <rect x="220" y="354" width="28" height="40" rx="6" fill="#6B7280" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="264" y="360" width="28" height="34" rx="6" fill="#6B7280" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- Boots -->
  <rect x="214" y="388" width="40" height="14" rx="5" fill="#374151" stroke="#4B5563" stroke-width="1.5"/>
  <rect x="258" y="386" width="38" height="14" rx="5" fill="#374151" stroke="#4B5563" stroke-width="1.5"/>
  <!-- Sword (right arm) -->
  <rect x="296" y="270" width="10" height="80" rx="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="283" y="308" width="36" height="8" rx="3" fill="#F59E0B"/>
  <polygon points="301,268 297,256 305,256" fill="#D1D5DB"/>
  <!-- Shield (left arm) -->
  <path d="M200,288 L220,288 L220,340 Q210,360 200,354 Q190,348 190,340 L190,288 Z" fill="#7C3AED" stroke="#A855F7" stroke-width="2"/>
  <polygon points="205,300 210,292 215,300 210,310" fill="#FDE68A" opacity="0.8"/>
</svg>
