<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 유령 서버 (반투명) -->
  <rect x="150" y="160" width="212" height="200" rx="12" fill="#EC4899" opacity="0.08"/>
  <rect x="150" y="160" width="212" height="200" rx="12" fill="none" stroke="#EC4899" stroke-width="2.5" stroke-dasharray="8,5" filter="url(#glow)"/>
  <!-- 서버 슬롯들 (유령처럼) -->
  <rect x="170" y="185" width="172" height="18" rx="9" fill="#EC4899" opacity="0.3"/>
  <rect x="170" y="213" width="172" height="18" rx="9" fill="#EC4899" opacity="0.25"/>
  <rect x="170" y="241" width="172" height="18" rx="9" fill="#EC4899" opacity="0.2"/>
  <rect x="170" y="269" width="172" height="18" rx="9" fill="#EC4899" opacity="0.15"/>
  <rect x="170" y="297" width="172" height="18" rx="9" fill="#EC4899" opacity="0.1"/>
  <!-- LED 표시 -->
  <circle cx="316" cy="194" r="5" fill="#10B981" opacity="0.8" filter="url(#glow)"/>
  <circle cx="316" cy="222" r="5" fill="#10B981" opacity="0.8" filter="url(#glow)"/>
  <circle cx="316" cy="250" r="5" fill="#EC4899" opacity="0.7" filter="url(#glow)"/>
  <circle cx="316" cy="278" r="5" fill="#EC4899" opacity="0.6"/>
  <!-- MOCK 레이블 -->
  <rect x="176" y="318" width="160" height="30" rx="6" fill="#EC4899" opacity="0.2"/>
  <text x="256" y="338" text-anchor="middle" fill="#F472B6" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">MOCK</text>
  <!-- 유령 효과 (파동) -->
  <path d="M 130 360 Q 170 340 200 360 Q 230 380 256 360 Q 282 340 312 360 Q 342 380 382 360" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <path d="M 150 390 Q 190 370 220 390 Q 250 410 280 390 Q 310 370 350 390 Q 380 410 400 390" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.2"/>
  <!-- 별 장식 -->
  <circle cx="120" cy="130" r="3" fill="#EC4899" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="130" r="4" fill="#F472B6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="110" cy="420" r="3" fill="#EC4899" opacity="0.4"/>
</svg>