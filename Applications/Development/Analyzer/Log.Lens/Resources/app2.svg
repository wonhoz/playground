<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg_ll01" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="magnifier" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#AAAAAA"/>
    </linearGradient>
    <radialGradient id="lensGlass" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#E8FFE8" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#004400" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#002200" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="shadow_ll01">
      <feDropShadow dx="6" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow_ll01">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lensClip">
      <circle cx="420" cy="420" r="200"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_ll01)"/>
  <!-- 터미널 텍스트 배경 라인들 -->
  <rect x="220" y="260" width="580" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.6"/>
  <rect x="220" y="296" width="520" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="332" width="560" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.6"/>
  <rect x="220" y="368" width="480" height="20" rx="4" fill="#3A1A1A" fill-opacity="0.6"/>
  <rect x="220" y="404" width="540" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="440" width="500" height="20" rx="4" fill="#3A3A1A" fill-opacity="0.6"/>
  <rect x="220" y="476" width="560" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="512" width="520" height="20" rx="4" fill="#1A1A3A" fill-opacity="0.6"/>
  <rect x="220" y="548" width="480" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="584" width="540" height="20" rx="4" fill="#3A1A1A" fill-opacity="0.6"/>
  <rect x="220" y="620" width="510" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="656" width="560" height="20" rx="4" fill="#3A1A3A" fill-opacity="0.6"/>
  <rect x="220" y="692" width="490" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.5"/>
  <rect x="220" y="728" width="520" height="20" rx="4" fill="#1A3A1A" fill-opacity="0.6"/>

  <!-- 로그 텍스트 -->
  <text x="232" y="278" font-size="18" fill="#22AA22" fill-opacity="0.8" font-family="monospace">[INFO] Application started successfully</text>
  <text x="232" y="314" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Config loaded: 42 entries</text>
  <text x="232" y="350" font-size="18" fill="#22AA22" fill-opacity="0.75" font-family="monospace">[INFO] Server listening on :8080</text>
  <text x="232" y="386" font-size="18" fill="#FF6666" fill-opacity="0.85" font-family="monospace">[ERROR] Connection timeout: 30s</text>
  <text x="232" y="422" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Retry attempt 1/3</text>
  <text x="232" y="458" font-size="18" fill="#FFAA22" fill-opacity="0.85" font-family="monospace">[WARN] Memory usage: 87%</text>
  <text x="232" y="494" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Cache miss: key=user_123</text>
  <text x="232" y="530" font-size="18" fill="#6699FF" fill-opacity="0.8" font-family="monospace">[DEBUG] Query took 234ms</text>
  <text x="232" y="566" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Request processed OK</text>
  <text x="232" y="602" font-size="18" fill="#FF6666" fill-opacity="0.85" font-family="monospace">[ERROR] NullPointerException line 492</text>
  <text x="232" y="638" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Health check passed</text>
  <text x="232" y="674" font-size="18" fill="#FFAA22" fill-opacity="0.8" font-family="monospace">[WARN] Disk space low: 15% remaining</text>
  <text x="232" y="710" font-size="18" fill="#22AA22" fill-opacity="0.65" font-family="monospace">[INFO] Scheduled task completed</text>
  <text x="232" y="746" font-size="18" fill="#22AA22" fill-opacity="0.7" font-family="monospace">[INFO] Connection pool: 8/10</text>

  <!-- Layer 2: 돋보기 -->
  <!-- 렌즈 유리 내부 강조 (돋보기 안에서 로그 확대) -->
  <circle cx="420" cy="420" r="208" fill="#000000" fill-opacity="0.6" filter="url(#shadow_ll01)"/>
  <circle cx="420" cy="420" r="200" fill="#004400" fill-opacity="0.3"/>
  <circle cx="420" cy="420" r="200" fill="url(#lensGlass)"/>

  <!-- 렌즈 안의 확대된 로그 라인 강조 -->
  <g clip-path="url(#lensClip)">
    <rect x="240" y="448" width="500" height="28" rx="4" fill="#FFAA22" fill-opacity="0.2"/>
    <text x="244" y="468" font-size="26" fill="#FFEE66" fill-opacity="0.95" font-family="monospace" font-weight="bold">[WARN] Memory usage: 87%</text>
    <rect x="240" y="378" width="500" height="28" rx="4" fill="#FF3333" fill-opacity="0.2"/>
    <text x="244" y="398" font-size="26" fill="#FF7777" fill-opacity="0.95" font-family="monospace" font-weight="bold">[ERROR] Connection timeout</text>
    <rect x="240" y="514" width="500" height="28" rx="4" fill="#3355FF" fill-opacity="0.15"/>
    <text x="244" y="534" font-size="26" fill="#88AAFF" fill-opacity="0.9" font-family="monospace">[DEBUG] Query took 234ms</text>
  </g>

  <!-- 렌즈 테두리 -->
  <circle cx="420" cy="420" r="200" fill="none" stroke="url(#magnifier)" stroke-width="28" filter="url(#shadow_ll01)"/>
  <!-- 렌즈 하이라이트 -->
  <ellipse cx="360" cy="350" rx="70" ry="40" fill="#FFFFFF" fill-opacity="0.15" transform="rotate(-20, 360, 350)"/>

  <!-- 손잡이 -->
  <line x1="584" y1="584" x2="730" y2="730" stroke="url(#magnifier)" stroke-width="60" stroke-linecap="round" filter="url(#shadow_ll01)"/>
  <!-- 손잡이 하이라이트 -->
  <line x1="576" y1="595" x2="720" y2="740" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Layer 3: 렌즈 초점 하이라이트 -->
  <circle cx="420" cy="420" r="200" fill="none" stroke="#00FF44" stroke-width="4" stroke-opacity="0.5" filter="url(#glow_ll01)"/>
</svg>
