<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Mini dashboard panel (tray = small panel) -->
  <rect x="175" y="200" width="674" height="560" rx="28" fill="#1E293B"/>
  <rect x="175" y="200" width="674" height="58" rx="28" fill="#0F172A"/>
  <rect x="175" y="230" width="674" height="28" rx="0" fill="#0F172A"/>
  <!-- Panel dots -->
  <circle cx="218" cy="229" r="12" fill="#EF4444"/>
  <circle cx="254" cy="229" r="12" fill="#F59E0B"/>
  <circle cx="290" cy="229" r="12" fill="#22C55E"/>
  <text x="512" y="238" font-family="Arial,sans-serif" font-size="34" fill="#94A3B8" text-anchor="middle">System Tray Monitor</text>
  <!-- CPU gauge -->
  <text x="260" y="334" font-family="Arial,sans-serif" font-size="34" fill="#60A5FA">CPU</text>
  <rect x="340" y="300" width="380" height="48" rx="10" fill="#1E3A5F"/>
  <rect x="340" y="300" width="254" height="48" rx="10" fill="#3B82F6"/>
  <text x="736" y="336" font-family="Arial,sans-serif" font-size="34" fill="#60A5FA" font-weight="bold">67%</text>
  <!-- RAM gauge -->
  <text x="260" y="420" font-family="Arial,sans-serif" font-size="34" fill="#34D399">RAM</text>
  <rect x="340" y="386" width="380" height="48" rx="10" fill="#1E3A5F"/>
  <rect x="340" y="386" width="304" height="48" rx="10" fill="#10B981"/>
  <text x="736" y="422" font-family="Arial,sans-serif" font-size="34" fill="#34D399" font-weight="bold">80%</text>
  <!-- Net gauge -->
  <text x="260" y="506" font-family="Arial,sans-serif" font-size="34" fill="#F472B6">NET</text>
  <rect x="340" y="472" width="380" height="48" rx="10" fill="#1E3A5F"/>
  <rect x="340" y="472" width="152" height="48" rx="10" fill="#EC4899"/>
  <text x="736" y="508" font-family="Arial,sans-serif" font-size="34" fill="#F472B6" font-weight="bold">40%</text>
  <!-- Disk gauge -->
  <text x="260" y="592" font-family="Arial,sans-serif" font-size="34" fill="#FCD34D">DISK</text>
  <rect x="340" y="558" width="380" height="48" rx="10" fill="#1E3A5F"/>
  <rect x="340" y="558" width="76" height="48" rx="10" fill="#F59E0B"/>
  <text x="736" y="594" font-family="Arial,sans-serif" font-size="34" fill="#FCD34D" font-weight="bold">20%</text>
  <!-- GPU gauge -->
  <text x="260" y="678" font-family="Arial,sans-serif" font-size="34" fill="#C084FC">GPU</text>
  <rect x="340" y="644" width="380" height="48" rx="10" fill="#1E3A5F"/>
  <rect x="340" y="644" width="228" height="48" rx="10" fill="#A855F7"/>
  <text x="736" y="680" font-family="Arial,sans-serif" font-size="34" fill="#C084FC" font-weight="bold">60%</text>
</svg>
