<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d976c"/>
      <stop offset="100%" style="stop-color:#93f9b9"/>
    </linearGradient>
    <linearGradient id="note_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#333"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Staff -->
  <line x1="50" y1="200" x2="462" y2="200" stroke="white" stroke-width="4" opacity="0.8"/>
  <line x1="50" y1="230" x2="462" y2="230" stroke="white" stroke-width="4" opacity="0.8"/>
  <line x1="50" y1="260" x2="462" y2="260" stroke="white" stroke-width="4" opacity="0.8"/>
  <line x1="50" y1="290" x2="462" y2="290" stroke="white" stroke-width="4" opacity="0.8"/>
  <line x1="50" y1="320" x2="462" y2="320" stroke="white" stroke-width="4" opacity="0.8"/>
  <!-- Note pairs showing intervals -->
  <ellipse cx="130" cy="275" rx="22" ry="15" fill="url(#note_grad)" stroke="white" stroke-width="2" transform="rotate(-10,130,275)"/>
  <line x1="150" y1="270" x2="150" y2="180" stroke="white" stroke-width="6"/>
  <ellipse cx="200" cy="245" rx="22" ry="15" fill="url(#note_grad)" stroke="white" stroke-width="2" transform="rotate(-10,200,245)"/>
  <line x1="220" y1="240" x2="220" y2="150" stroke="white" stroke-width="6"/>
  <!-- Interval bracket -->
  <path d="M130 380 L130 410 L200 410 L200 380" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="165" y="440" font-family="sans-serif" font-size="28" text-anchor="middle" fill="white" font-weight="bold">3rd</text>
  <!-- Second pair -->
  <ellipse cx="310" cy="260" rx="22" ry="15" fill="url(#note_grad)" stroke="white" stroke-width="2" transform="rotate(-10,310,260)"/>
  <line x1="330" y1="255" x2="330" y2="165" stroke="white" stroke-width="6"/>
  <ellipse cx="390" cy="215" rx="22" ry="15" fill="url(#note_grad)" stroke="white" stroke-width="2" transform="rotate(-10,390,215)"/>
  <line x1="410" y1="210" x2="410" y2="120" stroke="white" stroke-width="6"/>
  <path d="M310 380 L310 410 L390 410 L390 380" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="350" y="440" font-family="sans-serif" font-size="28" text-anchor="middle" fill="white" font-weight="bold">5th</text>
  <!-- Ear icon -->
  <path d="M256 80 C243 80 232 90 232 103 C232 114 239 123 249 127 C252 128 254 126 253 123 C246 120 240 112 240 103 C240 94 247 88 256 88 C265 88 272 94 272 103 L280 103 C280 90 269 80 256 80Z" fill="white" opacity="0.9"/>
  <path d="M256 88 L256 130" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
