<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c5-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="c5-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#4A1B8A"/>
      <stop offset="100%" stop-color="#1A0640"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#c5-clip)">
    <!-- Background: deep violet -->
    <rect width="1024" height="1024" fill="url(#c5-bg)"/>

    <!-- Large central sparkle -->
    <line x1="512" y1="260" x2="512" y2="764" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <line x1="260" y1="512" x2="764" y2="512" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <line x1="334" y1="334" x2="690" y2="690" stroke="#FFD700" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <line x1="690" y1="334" x2="334" y2="690" stroke="#FFD700" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <circle cx="512" cy="512" r="44" fill="#FFD700" opacity="0.95"/>

    <!-- Medium sparkle top-left -->
    <line x1="248" y1="280" x2="248" y2="396" stroke="#C89BFF" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <line x1="190" y1="338" x2="306" y2="338" stroke="#C89BFF" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <line x1="214" y1="304" x2="282" y2="372" stroke="#C89BFF" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <line x1="282" y1="304" x2="214" y2="372" stroke="#C89BFF" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <circle cx="248" cy="338" r="20" fill="#C89BFF" opacity="0.90"/>

    <!-- Medium sparkle bottom-right -->
    <line x1="776" y1="640" x2="776" y2="756" stroke="#80EDFF" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <line x1="718" y1="698" x2="834" y2="698" stroke="#80EDFF" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <line x1="742" y1="664" x2="810" y2="732" stroke="#80EDFF" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <line x1="810" y1="664" x2="742" y2="732" stroke="#80EDFF" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <circle cx="776" cy="698" r="20" fill="#80EDFF" opacity="0.90"/>

    <!-- Small sparkles scattered -->
    <circle cx="700" cy="240" r="12" fill="#FFD700" opacity="0.80"/>
    <line x1="700" y1="224" x2="700" y2="256" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="684" y1="240" x2="716" y2="240" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <circle cx="310" cy="720" r="10" fill="#C89BFF" opacity="0.70"/>
    <line x1="310" y1="706" x2="310" y2="734" stroke="#C89BFF" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <line x1="296" y1="720" x2="324" y2="720" stroke="#C89BFF" stroke-width="4" stroke-linecap="round" opacity="0.65"/>

    <circle cx="800" cy="440" r="8" fill="#80EDFF" opacity="0.65"/>
    <circle cx="220" cy="560" r="7" fill="#FFD700" opacity="0.55"/>
    <circle cx="740" cy="800" r="9" fill="#C89BFF" opacity="0.60"/>
    <circle cx="260" cy="180" r="6" fill="#80EDFF" opacity="0.50"/>

    <!-- Orbit ring around center -->
    <circle cx="512" cy="512" r="160" fill="none" stroke="#C89BFF" stroke-width="4" opacity="0.30" stroke-dasharray="20 14"/>
    <circle cx="512" cy="512" r="240" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.18" stroke-dasharray="16 20"/>
  </g>
</svg>
