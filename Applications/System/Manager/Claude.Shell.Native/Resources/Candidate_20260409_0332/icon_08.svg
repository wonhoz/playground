<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <clipPath id="c8"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Deep indigo background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g8)"/>
  <g clip-path="url(#c8)">
    <!-- Layer 2: Three-step flow (Folder → Menu → Terminal) -->
    <!-- Step 1: Folder -->
    <rect x="100" y="430" width="190" height="54" rx="14" fill="#F59E0B"/>
    <rect x="100" y="476" width="250" height="190" rx="16" fill="#FBBF24"/>
    <text x="225" y="592" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="#92400E" font-weight="900" text-anchor="middle">DIR</text>
    <!-- Right-click dot on folder -->
    <circle cx="318" cy="450" r="34" fill="#F43F5E"/>
    <text x="318" y="468" font-family="Arial Black,Arial,sans-serif" font-size="36" fill="white" font-weight="900" text-anchor="middle">R</text>
    <!-- Arrow 1 -->
    <line x1="362" y1="560" x2="420" y2="560" stroke="#A78BFA" stroke-width="40" stroke-linecap="round"/>
    <polygon points="400,520 460,560 400,600" fill="#A78BFA"/>
    <!-- Step 2: Context menu -->
    <rect x="436" y="400" width="240" height="260" rx="18" fill="white"/>
    <rect x="450" y="414" width="212" height="96" rx="12" fill="#7C3AED"/>
    <text x="556" y="474" font-family="Arial Black,Arial,sans-serif" font-size="80" fill="white" font-weight="900" text-anchor="middle">MENU</text>
    <line x1="450" y1="518" x2="648" y2="518" stroke="#E2E8F0" stroke-width="4"/>
    <text x="556" y="584" font-family="Arial,sans-serif" font-size="80" fill="#94A3B8" text-anchor="middle">CLAUDE</text>
    <!-- Arrow 2 -->
    <line x1="684" y1="560" x2="740" y2="560" stroke="#A78BFA" stroke-width="40" stroke-linecap="round"/>
    <polygon points="720,520 780,560 720,600" fill="#A78BFA"/>
    <!-- Step 3: Terminal -->
    <rect x="756" y="400" width="230" height="260" rx="18" fill="#0F172A"/>
    <rect x="756" y="400" width="230" height="44" rx="18" fill="#1E293B"/>
    <rect x="756" y="426" width="230" height="18" fill="#1E293B"/>
    <text x="772" y="510" font-family="Consolas,monospace" font-size="120" fill="#34D399" font-weight="bold">&gt;_</text>
    <!-- Layer 3: "SHELL EXT" label at bottom -->
    <text x="512" y="848" font-family="Arial Black,Arial,sans-serif" font-size="96" fill="#C4B5FD" font-weight="900" text-anchor="middle">SHELL EXT</text>
  </g>
</svg>
