  <path d="M340,250 L340,600 Q340,680 420,700 L460,720 L460,780 L380,780 L380,830 L644,830 L644,780 L564,780 L564,720 L604,700 Q684,680 684,600 L684,250 Z" fill="#558B2F"/>
