<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Forge fire + prompt cursor -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0D0500"/>
  <!-- Fire base -->
  <ellipse cx="512" cy="720" rx="200" ry="40" fill="#5D1A00" opacity="0.8"/>
  <!-- Fire flames -->
  <path d="M512 280 C460 360 380 400 390 500 C400 580 460 620 512 640 C564 620 624 580 634 500 C644 400 564 360 512 280 Z" fill="#FF6D00"/>
  <path d="M512 350 C480 410 440 440 448 510 C455 570 484 600 512 615 C540 600 569 570 576 510 C584 440 544 410 512 350 Z" fill="#FFAB00"/>
  <path d="M512 420 C494 460 474 480 478 530 C482 565 496 585 512 595 C528 585 542 565 546 530 C550 480 530 460 512 420 Z" fill="#FFD740"/>
  <!-- Prompt cursor / bracket symbol -->
  <path d="M320 440 L280 512 L320 584" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M704 440 L744 512 L704 584" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Blinking cursor line in fire -->
  <rect x="500" cy="512" x="500" y="500" width="24" height="60" rx="4" fill="#fff" opacity="0.8"/>
</svg>
