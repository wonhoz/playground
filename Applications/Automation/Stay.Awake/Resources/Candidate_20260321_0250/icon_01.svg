<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep warm dark brown-black -->
  <rect width="1024" height="1024" rx="190" fill="#160C04"/>

  <!-- Chair support pole -->
  <rect x="472" y="620" width="80" height="220" rx="22" fill="#3E2723"/>

  <!-- Armrests -->
  <rect x="154" y="430" width="108" height="150" rx="22" fill="#4E342E"/>
  <rect x="762" y="430" width="108" height="150" rx="22" fill="#4E342E"/>

  <!-- Chair seat -->
  <rect x="170" y="570" width="684" height="110" rx="36" fill="#4E342E"/>

  <!-- Chair backrest body -->
  <rect x="282" y="170" width="460" height="390" rx="80" fill="#5D4037"/>
  <!-- Backrest cushion inner panel -->
  <rect x="316" y="204" width="392" height="322" rx="60" fill="#795548"/>
  <!-- Subtle stitching detail lines -->
  <rect x="342" y="270" width="340" height="10" rx="5" fill="#8D6E63" opacity="0.5"/>
  <rect x="342" y="350" width="340" height="10" rx="5" fill="#8D6E63" opacity="0.5"/>
  <rect x="342" y="430" width="340" height="10" rx="5" fill="#8D6E63" opacity="0.5"/>

  <!-- Online status badge (top-right, floating) -->
  <circle cx="810" cy="210" r="108" fill="#0D2E14" stroke="#00C853" stroke-width="16"/>
  <circle cx="810" cy="210" r="68" fill="#00C853"/>
  <circle cx="810" cy="210" r="30" fill="#CCFF90"/>

  <!-- Small signal arc (suggests "connected") -->
  <path d="M 740,130 A 100,100 0 0 1 890,130" fill="none" stroke="#69F0AE" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
</svg>
