<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 고양이 ASCII 아트 | 실루엣/캐릭터 | #FFFBEB -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFFBEB"/>
  <!-- Layer 2: ASCII art cat silhouette using text blocks -->
  <!-- Cat made of ASCII chars -->
  <text x="512" y="280" font-family="Consolas,monospace" font-size="22" fill="#92400E" text-anchor="middle">  /\_____/\  </text>
  <text x="512" y="308" font-family="Consolas,monospace" font-size="22" fill="#92400E" text-anchor="middle"> /  o   o  \ </text>
  <text x="512" y="336" font-family="Consolas,monospace" font-size="22" fill="#92400E" text-anchor="middle">( ==  ^  == )</text>
  <text x="512" y="364" font-family="Consolas,monospace" font-size="22" fill="#B45309" text-anchor="middle"> )         ( </text>
  <text x="512" y="392" font-family="Consolas,monospace" font-size="22" fill="#B45309" text-anchor="middle">(           )</text>
  <text x="512" y="420" font-family="Consolas,monospace" font-size="22" fill="#D97706" text-anchor="middle">(_____,____ )</text>
  <text x="512" y="448" font-family="Consolas,monospace" font-size="22" fill="#D97706" text-anchor="middle">  __|__ __|_  </text>
  <text x="512" y="476" font-family="Consolas,monospace" font-size="22" fill="#F59E0B" text-anchor="middle"> /         \ </text>
  <!-- Smaller surrounding ASCII texture -->
  <text x="170" y="340" font-family="Consolas,monospace" font-size="16" fill="#F59E0B" opacity="0.4">@#$%</text>
  <text x="170" y="368" font-family="Consolas,monospace" font-size="16" fill="#D97706" opacity="0.3">++==</text>
  <text x="790" y="340" font-family="Consolas,monospace" font-size="16" fill="#F59E0B" opacity="0.4">%$#@</text>
  <text x="790" y="368" font-family="Consolas,monospace" font-size="16" fill="#D97706" opacity="0.3">==++</text>
  <!-- Layer 3: App title label -->
  <rect x="300" y="560" width="424" height="64" rx="16" fill="#92400E"/>
  <text x="512" y="601" font-family="Consolas,monospace" font-size="28" fill="#FEF3C7" text-anchor="middle" font-weight="bold">Char.Art</text>
  <!-- Decorative dots -->
  <circle cx="200" cy="280" r="8" fill="#F59E0B" opacity="0.4"/>
  <circle cx="820" cy="280" r="8" fill="#F59E0B" opacity="0.4"/>
  <circle cx="180" cy="480" r="6" fill="#D97706" opacity="0.3"/>
  <circle cx="840" cy="480" r="6" fill="#D97706" opacity="0.3"/>
</svg>
