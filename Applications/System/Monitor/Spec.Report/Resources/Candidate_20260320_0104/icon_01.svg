<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- 문서+컴퓨터: document with computer screen icon -->
  <!-- Monitor -->
  <rect x="240" y="320" width="440" height="300" rx="20" fill="#01579B"/>
  <rect x="260" y="340" width="400" height="260" rx="12" fill="#000810"/>
  <!-- Screen content lines -->
  <line x1="290" y1="380" x2="630" y2="380" stroke="#29B6F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="290" y1="410" x2="580" y2="410" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <line x1="290" y1="435" x2="560" y2="435" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <line x1="290" y1="460" x2="600" y2="460" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <line x1="290" y1="485" x2="540" y2="485" stroke="#01579B" stroke-width="6" stroke-linecap="round"/>
  <!-- Monitor stand -->
  <rect x="480" y="620" width="40" height="60" rx="4" fill="#01579B"/>
  <rect x="420" y="680" width="160" height="20" rx="10" fill="#01579B"/>
  <!-- Document overlay -->
  <rect x="580" y="400" width="160" height="200" rx="12" fill="#000810" stroke="#29B6F6" stroke-width="6"/>
  <line x1="600" y1="435" x2="720" y2="435" stroke="#29B6F6" stroke-width="6" stroke-linecap="round"/>
  <line x1="600" y1="460" x2="700" y2="460" stroke="#29B6F6" stroke-width="5" stroke-linecap="round"/>
  <line x1="600" y1="485" x2="710" y2="485" stroke="#29B6F6" stroke-width="5" stroke-linecap="round"/>
  <line x1="600" y1="510" x2="690" y2="510" stroke="#29B6F6" stroke-width="5" stroke-linecap="round"/>
  <!-- Dog ear on document -->
  <path d="M720 400 L760 400 L760 440 Z" fill="#29B6F6"/>
  <path d="M720 400 L720 440 L760 440" fill="none" stroke="#29B6F6" stroke-width="3"/>
</svg>