<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <radialGradient id="screen02" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 모니터 -->
  <!-- 스크린 외곽 -->
  <rect x="220" y="200" width="584" height="420" rx="24" fill="#37474F"/>
  <!-- 스크린 내부 (반짝이는) -->
  <rect x="244" y="224" width="536" height="372" rx="14" fill="url(#screen02)"/>
  <!-- 반짝이 효과 (청소 후 밝아짐) -->
  <polygon points="512,290 548,370 636,370 568,420 594,500 512,450 430,500 456,420 388,370 476,370" fill="#FDD835" opacity="0.9"/>
  <!-- 별 빛 줄기 -->
  <line x1="512" y1="240" x2="512" y2="224" stroke="#FDD835" stroke-width="10" stroke-linecap="round"/>
  <line x1="590" y1="260" x2="608" y2="248" stroke="#FDD835" stroke-width="8" stroke-linecap="round"/>
  <line x1="434" y1="260" x2="416" y2="248" stroke="#FDD835" stroke-width="8" stroke-linecap="round"/>
  <!-- 모니터 스탠드 -->
  <rect x="472" y="620" width="80" height="80" rx="8" fill="#546E7A"/>
  <rect x="380" y="694" width="264" height="30" rx="10" fill="#455A64"/>
  <!-- Layer 3: CLEAN 배지 -->
  <rect x="264" y="480" width="496" height="72" rx="20" fill="#4CAF50" opacity="0.95"/>
  <text x="512" y="530" font-family="Arial Black, Arial, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle">SYSTEM CLEAN</text>
  <!-- 반짝 입자들 -->
  <circle cx="300" cy="310" r="10" fill="#FDD835" opacity="0.7"/>
  <circle cx="724" cy="290" r="8" fill="#FDD835" opacity="0.6"/>
  <circle cx="280" cy="470" r="7" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="740" cy="450" r="9" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="350" cy="350" r="6" fill="#FDD835" opacity="0.5"/>
  <circle cx="680" cy="360" r="6" fill="#FDD835" opacity="0.5"/>
</svg>
