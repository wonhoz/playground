<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Scroll unrolling with forge flame tip -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#100800"/>
  <!-- Scroll body -->
  <rect x="240" y="280" width="460" height="480" rx="12" fill="#1A1000"/>
  <!-- Scroll top curl -->
  <ellipse cx="470" cy="280" rx="230" ry="36" fill="#CC6600" opacity="0.6"/>
  <ellipse cx="470" cy="280" rx="200" ry="26" fill="#FF8F00" opacity="0.5"/>
  <!-- Scroll bottom curl -->
  <ellipse cx="470" cy="760" rx="230" ry="36" fill="#CC6600" opacity="0.6"/>
  <ellipse cx="470" cy="760" rx="200" ry="26" fill="#FF8F00" opacity="0.5"/>
  <!-- Left edge roll shadow -->
  <ellipse cx="240" cy="520" rx="28" ry="240" fill="#CC6600" opacity="0.4"/>
  <!-- Prompt template text on scroll -->
  <rect x="280" y="360" width="360" height="22" rx="11" fill="#FF8F00" opacity="0.9"/>
  <rect x="280" y="410" width="300" height="18" rx="9" fill="#FF8F00" opacity="0.6"/>
  <!-- Variable placeholder box -->
  <rect x="280" y="450" width="180" height="34" rx="8" fill="#FF8F00" opacity="0.25" stroke="#FF8F00" stroke-width="10" stroke-dasharray="16 8"/>
  <rect x="470" y="450" width="170" height="34" rx="8" fill="#FF8F00" opacity="0.6"/>
  <rect x="280" y="506" width="360" height="18" rx="9" fill="#FF8F00" opacity="0.6"/>
  <rect x="280" y="546" width="280" height="18" rx="9" fill="#FF8F00" opacity="0.4"/>
  <rect x="280" y="586" width="320" height="18" rx="9" fill="#FF8F00" opacity="0.4"/>
  <!-- Flame at bottom right -->
  <path d="M700 680 C660 620 680 560 700 520 C720 560 740 560 720 500 C760 540 780 600 740 680 Z" fill="#FF6D00" opacity="0.9"/>
  <path d="M700 680 C680 636 692 590 700 560 C712 590 724 590 712 540 C740 572 748 624 728 680 Z" fill="#FFD740" opacity="0.8"/>
</svg>
