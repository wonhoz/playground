<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#2D1500"/>
    </linearGradient>
    <linearGradient id="pad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF0"/>
      <stop offset="100%" stop-color="#F5EDD8"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF3300"/>
      <stop offset="50%" stop-color="#FF7700"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <filter id="padGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Notepad body -->
  <rect x="120" y="80" width="240" height="310" rx="10" fill="url(#pad)"/>
  <!-- Top spiral binding -->
  <rect x="115" y="76" width="250" height="24" rx="8" fill="#8B6914"/>
  <!-- Spiral holes -->
  <circle cx="155" cy="88" r="7" fill="#1A0A00"/>
  <circle cx="195" cy="88" r="7" fill="#1A0A00"/>
  <circle cx="235" cy="88" r="7" fill="#1A0A00"/>
  <circle cx="275" cy="88" r="7" fill="#1A0A00"/>
  <circle cx="315" cy="88" r="7" fill="#1A0A00"/>
  <circle cx="355" cy="88" r="7" fill="#1A0A00"/>
  <!-- Ruled lines -->
  <line x1="140" y1="130" x2="340" y2="130" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="150" x2="340" y2="150" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="170" x2="340" y2="170" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="190" x2="340" y2="190" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="210" x2="340" y2="210" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="230" x2="340" y2="230" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="250" x2="340" y2="250" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="270" x2="340" y2="270" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="290" x2="340" y2="290" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="310" x2="340" y2="310" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="330" x2="340" y2="330" stroke="#BBBBAA" stroke-width="1.5"/>
  <line x1="140" y1="350" x2="340" y2="350" stroke="#BBBBAA" stroke-width="1.5"/>
  <!-- Margin line -->
  <line x1="165" y1="100" x2="165" y2="390" stroke="#FF9999" stroke-width="1.5"/>
  <!-- Some text written on notepad -->
  <rect x="175" y="124" width="100" height="10" rx="5" fill="#445566" opacity="0.6"/>
  <rect x="175" y="144" width="140" height="8" rx="4" fill="#667788" opacity="0.4"/>
  <rect x="175" y="164" width="120" height="8" rx="4" fill="#667788" opacity="0.4"/>
  <!-- Forge fire at bottom of notepad -->
  <path d="M120,370 Q145,340 170,365 Q195,330 220,360 Q245,325 270,358 Q295,328 320,355 Q345,332 360,360 L360,390 Q310,400 240,400 Q180,400 120,390 Z" fill="url(#fire)" opacity="0.9" filter="url(#padGlow)"/>
  <!-- Pen/pencil -->
  <rect x="365" y="200" width="18" height="140" rx="6" fill="#D4A843" transform="rotate(-20, 374, 270)"/>
  <polygon points="360,330 378,335 368,355" fill="#F5EDD8" transform="rotate(-20, 368, 343)"/>
  <rect x="365" y="198" width="18" height="16" rx="3" fill="#CC8888" transform="rotate(-20, 374, 206)"/>
</svg>
