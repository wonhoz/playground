<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tetris-like grid border -->
  <rect x="100" y="60" width="312" height="392" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Stacked tetris blocks -->
  <!-- Bottom row - full -->
  <rect x="108" y="420" width="56" height="56" rx="4" fill="#e91e63" stroke="#c2185b" stroke-width="1"/>
  <rect x="164" y="420" width="56" height="56" rx="4" fill="#9c27b0" stroke="#7b1fa2" stroke-width="1"/>
  <rect x="220" y="420" width="56" height="56" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="1"/>
  <rect x="276" y="420" width="56" height="56" rx="4" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <rect x="332" y="420" width="56" height="56" rx="4" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
  <!-- Middle rows partial -->
  <rect x="108" y="364" width="56" height="56" rx="4" fill="#ff5722" stroke="#bf360c" stroke-width="1"/>
  <rect x="220" y="364" width="56" height="56" rx="4" fill="#03a9f4" stroke="#0277bd" stroke-width="1"/>
  <rect x="276" y="364" width="56" height="56" rx="4" fill="#8bc34a" stroke="#558b2f" stroke-width="1"/>
  <rect x="332" y="364" width="56" height="56" rx="4" fill="#ffc107" stroke="#ff6f00" stroke-width="1"/>
  <rect x="164" y="308" width="56" height="56" rx="4" fill="#7c4dff" stroke="#4527a0" stroke-width="1"/>
  <rect x="220" y="308" width="56" height="56" rx="4" fill="#00bcd4" stroke="#006064" stroke-width="1"/>
  <rect x="276" y="308" width="56" height="56" rx="4" fill="#cddc39" stroke="#827717" stroke-width="1"/>
  <!-- Upper unstable -->
  <rect x="220" y="252" width="56" height="56" rx="4" fill="#ff6b35" stroke="#cc3300" stroke-width="1"/>
  <!-- Falling block with tilt -->
  <g transform="translate(256,180) rotate(15)">
    <rect x="-28" y="-28" width="56" height="56" rx="4" fill="#ff4444" stroke="#cc0000" stroke-width="2"/>
  </g>
  <!-- Crack lines -->
  <line x1="164" y1="364" x2="220" y2="420" stroke="#ff4444" stroke-width="3" opacity="0.6"/>
</svg>