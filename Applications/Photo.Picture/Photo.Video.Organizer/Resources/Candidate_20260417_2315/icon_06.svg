<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 폴더 카드 스택 (뒤→앞) -->
  <!-- 뒤 폴더 카드 (2022) -->
  <rect x="160" y="200" width="520" height="300" rx="24" fill="#F3E5F5" transform="rotate(-8 420 350)"/>
  <rect x="160" y="200" width="160" height="50" rx="12" fill="#CE93D8" transform="rotate(-8 240 225)"/>
  <text x="240" y="235" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#4A148C" text-anchor="middle" transform="rotate(-8 240 225)">2022</text>
  <!-- 중간 폴더 카드 (2023) -->
  <rect x="190" y="280" width="520" height="300" rx="24" fill="#FFF9C4" transform="rotate(-3 450 430)"/>
  <rect x="190" y="280" width="160" height="50" rx="12" fill="#FFD54F" transform="rotate(-3 270 305)"/>
  <text x="270" y="315" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#E65100" text-anchor="middle" transform="rotate(-3 270 305)">2023</text>
  <!-- 앞 폴더 카드 (2024) -->
  <rect x="230" y="360" width="560" height="320" rx="24" fill="white"/>
  <!-- 폴더 탭 -->
  <rect x="230" y="348" width="170" height="50" rx="12" fill="#43A047"/>
  <text x="315" y="383" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">2024</text>
  <!-- 사진 썸네일 3개 -->
  <rect x="258" y="400" width="140" height="110" rx="10" fill="#E8F5E9"/>
  <polygon points="258,498 310,430 338,458 366,416 398,498" fill="#43A047" opacity="0.5"/>
  <rect x="420" y="400" width="140" height="110" rx="10" fill="#F3E5F5"/>
  <polygon points="420,498 472,430 500,458 528,416 560,498" fill="#CE93D8" opacity="0.5"/>
  <rect x="582" y="400" width="140" height="110" rx="10" fill="#FFF9C4"/>
  <circle cx="622" cy="430" r="24" fill="#FFD54F" opacity="0.7"/>
  <!-- Layer 3: 파일 수 배지 -->
  <circle cx="740" cy="760" r="80" fill="#1B5E20" opacity="0.9"/>
  <text x="740" y="745" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">248</text>
  <text x="740" y="796" font-family="Arial, sans-serif" font-size="34" fill="#A5D6A7" text-anchor="middle">files</text>
