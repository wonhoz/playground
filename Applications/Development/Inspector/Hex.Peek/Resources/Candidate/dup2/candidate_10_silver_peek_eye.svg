<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0C10"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6688AA"/>
      <stop offset="60%" stop-color="#334466"/>
      <stop offset="100%" stop-color="#112233"/>
    </radialGradient>
    <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#001122"/>
    </radialGradient>
    <linearGradient id="silver2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C8D0"/>
      <stop offset="100%" stop-color="#8090A0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M80 256 Q170 140 256 140 Q342 140 432 256 Q342 372 256 372 Q170 372 80 256 Z" fill="#112233" stroke="url(#silver2)" stroke-width="6"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="88" fill="url(#iris)"/>
  <!-- Iris detail rings -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="#4466AA" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#335577" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="52" fill="none" stroke="#224466" stroke-width="1" opacity="0.3"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="46" fill="url(#pupil)"/>
  <!-- Hex code reflection in pupil -->
  <text x="256" y="248" text-anchor="middle" fill="#003355" font-size="10" font-family="monospace">4D 5A</text>
  <text x="256" y="262" text-anchor="middle" fill="#002244" font-size="10" font-family="monospace">90 00</text>
  <text x="256" y="276" text-anchor="middle" fill="#003355" font-size="10" font-family="monospace">PE32</text>
  <!-- Pupil highlight -->
  <ellipse cx="240" cy="238" rx="12" ry="8" fill="white" opacity="0.15" transform="rotate(-20 240 238)"/>
  <!-- Hex data floating around the eye -->
  <text x="76" y="210" fill="#223344" font-size="11" font-family="monospace">4D 5A</text>
  <text x="76" y="300" fill="#223344" font-size="11" font-family="monospace">FF FE</text>
  <text x="394" y="210" fill="#223344" font-size="11" font-family="monospace">90 00</text>
  <text x="394" y="300" fill="#223344" font-size="11" font-family="monospace">00 00</text>
  <!-- Top hex strip -->
  <text x="256" y="105" text-anchor="middle" fill="#334455" font-size="12" font-family="monospace">4D 5A 90 00 50 45 00 00</text>
  <!-- Bottom hex strip -->
  <text x="256" y="410" text-anchor="middle" fill="#334455" font-size="12" font-family="monospace">DE AD BE EF CA FE BA BE</text>
  <!-- Title -->
  <text x="256" y="455" text-anchor="middle" fill="#8899AA" font-size="20" font-family="monospace" font-weight="bold">Hex.Peek</text>
  <text x="256" y="478" text-anchor="middle" fill="#445566" font-size="13" font-family="monospace">Hex File Inspector</text>
</svg>
