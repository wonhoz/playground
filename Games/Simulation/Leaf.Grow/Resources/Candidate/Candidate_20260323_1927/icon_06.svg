<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg_lg06" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D2B0D"/>
