<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0D0D2E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 코드 블록 네온 -->
  <rect x="80" y="124" width="272" height="190" rx="12" fill="#050518" stroke="#7C4DFF" stroke-width="2" filter="url(#glow)"/>
  <rect x="80" y="124" width="272" height="22" rx="12" fill="#0D0D2E"/>
  <rect x="80" y="136" width="272" height="10" fill="#0D0D2E"/>
  <circle cx="98" cy="135" r="5" fill="#FF5F57"/>
  <circle cx="114" cy="135" r="5" fill="#FEBC2E"/>
  <circle cx="130" cy="135" r="5" fill="#28C840"/>
  <!-- 네온 코드 -->
  <rect x="98" y="158" width="100" height="7" rx="3" fill="#7C4DFF" fill-opacity="0.9" filter="url(#glow)"/>
  <rect x="98" y="175" width="140" height="7" rx="3" fill="#00E5FF" fill-opacity="0.7"/>
  <rect x="98" y="192" width="80" height="7" rx="3" fill="#69F0AE" fill-opacity="0.7"/>
  <rect x="98" y="209" width="120" height="7" rx="3" fill="#7C4DFF" fill-opacity="0.5"/>
  <rect x="98" y="226" width="100" height="7" rx="3" fill="#00E5FF" fill-opacity="0.5"/>
  <rect x="98" y="243" width="60" height="7" rx="3" fill="#69F0AE" fill-opacity="0.4"/>
  <rect x="98" y="260" width="140" height="7" rx="3" fill="#7C4DFF" fill-opacity="0.4"/>
  <!-- 캡처 코너 네온 -->
  <path d="M80 124 L80 102 L102 102" stroke="#00E5FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M352 124 L352 102 L330 102" stroke="#00E5FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M80 314 L80 336 L102 336" stroke="#00E5FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M352 314 L352 336 L330 336" stroke="#00E5FF" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 카메라 (우하단) -->
  <rect x="320" y="326" width="112" height="82" rx="12" fill="#0D0D2E" stroke="#7C4DFF" stroke-width="2" filter="url(#glow)"/>
  <circle cx="376" cy="367" r="26" fill="#050518" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="376" cy="367" r="14" fill="#0D0D2E" stroke="#7C4DFF" stroke-width="1.5"/>
  <rect x="332" y="334" width="20" height="14" rx="5" fill="#7C4DFF"/>
</svg>
