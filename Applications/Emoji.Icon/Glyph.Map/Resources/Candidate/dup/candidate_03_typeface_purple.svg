<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A148C"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Big A letterform -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="280" font-weight="bold" fill="#CE93D8" opacity="0.18">A</text>
  <!-- Glyph specimen overlays -->
  <rect x="80" y="90" width="68" height="68" rx="8" fill="#6A1B9A" stroke="#CE93D8" stroke-width="2"/>
  <text x="114" y="143" text-anchor="middle" font-family="serif" font-size="50" fill="#E040FB">Ω</text>
  <rect x="222" y="72" width="68" height="68" rx="8" fill="#6A1B9A" stroke="#CE93D8" stroke-width="2"/>
  <text x="256" y="125" text-anchor="middle" font-family="serif" font-size="50" fill="#FFD54F">★</text>
  <rect x="364" y="90" width="68" height="68" rx="8" fill="#6A1B9A" stroke="#CE93D8" stroke-width="2"/>
  <text x="398" y="143" text-anchor="middle" font-family="serif" font-size="50" fill="#80DEEA">∞</text>
  <!-- Middle row -->
  <rect x="140" y="178" width="68" height="68" rx="8" fill="#7B1FA2" stroke="#CE93D8" stroke-width="2"/>
  <text x="174" y="231" text-anchor="middle" font-family="serif" font-size="50" fill="#FF8A80">♥</text>
  <rect x="304" y="178" width="68" height="68" rx="8" fill="#7B1FA2" stroke="#CE93D8" stroke-width="2"/>
  <text x="338" y="231" text-anchor="middle" font-family="serif" font-size="50" fill="#CCFF90">π</text>
  <!-- Bottom section magnifier -->
  <circle cx="256" cy="390" r="82" fill="none" stroke="#CE93D8" stroke-width="5"/>
  <text x="256" y="418" text-anchor="middle" font-family="serif" font-size="68" fill="#FFD54F">G</text>
  <!-- Magnifier handle -->
  <line x1="318" y1="452" x2="368" y2="492" stroke="#CE93D8" stroke-width="8" stroke-linecap="round"/>
</svg>
