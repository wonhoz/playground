<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A3F"/>
      <stop offset="100%" stop-color="#0C0C1F"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg05)"/>
  <!-- 별 -->
  <circle cx="220" cy="210" r="3" fill="white" opacity="0.5"/>
  <circle cx="800" cy="240" r="4" fill="white" opacity="0.6"/>
  <circle cx="180" cy="800" r="3" fill="white" opacity="0.4"/>
  <circle cx="840" cy="810" r="2" fill="white" opacity="0.5"/>
  <circle cx="600" cy="190" r="3" fill="white" opacity="0.4"/>
  <circle cx="160" cy="550" r="2" fill="white" opacity="0.3"/>
  <!-- 발사 지점 (왼쪽 하단) -->
  <circle cx="240" cy="760" r="30" fill="#EF4444" stroke="#FCA5A5" stroke-width="12"/>
  <!-- 발사 플랫폼 -->
  <rect x="210" y="780" width="60" height="20" rx="6" fill="#6B7280" stroke="#9CA3AF" stroke-width="6"/>
  <!-- 포물선 궤적 (빨간 점선) -->
