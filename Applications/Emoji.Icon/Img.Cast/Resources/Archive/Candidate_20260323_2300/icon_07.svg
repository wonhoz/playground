<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="bigIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 256px 큰 아이콘 (중앙 좌측) -->
    <rect x="130" y="240" width="360" height="360" rx="36" fill="url(#bigIcon)"/>
    <!-- 큰 아이콘 내용 (이미지 심볼) -->
    <rect x="150" y="260" width="320" height="200" rx="16" fill="#1E40AF" opacity="0.6"/>
    <polygon points="160,440 260,340 330,400 380,350 450,440" fill="#BFDBFE" opacity="0.8"/>
    <circle cx="210" cy="310" r="38" fill="#FDE68A" opacity="0.8"/>
    <text x="310" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#BFDBFE" font-weight="bold">256px</text>
    <!-- 48px -->
    <rect x="540" y="240" width="160" height="160" rx="20" fill="#22D3EE" opacity="0.9"/>
    <polygon points="548,385 580,330 610,360 638,335 698,385" fill="#CFFAFE" opacity="0.7"/>
    <circle cx="570" cy="275" r="20" fill="#FDE68A" opacity="0.8"/>
    <text x="620" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#22D3EE" font-weight="bold">48px</text>
    <!-- 32px -->
    <rect x="726" y="240" width="110" height="110" rx="16" fill="#A7F3D0" opacity="0.9"/>
    <polygon points="730,340 760,305 790,325 836,340" fill="#6EE7B7" opacity="0.7"/>
    <text x="781" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#34D399" font-weight="bold">32px</text>
    <!-- 16px -->
    <rect x="540" y="440" width="72" height="72" rx="12" fill="#F472B6" opacity="0.9"/>
    <text x="576" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">16</text>
    <!-- 레이블 ICO -->
    <text x="512" y="720" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="#60A5FA">ICO</text>
    <text x="512" y="780" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#94A3B8">Multi-size</text>
  </g>
</svg>
