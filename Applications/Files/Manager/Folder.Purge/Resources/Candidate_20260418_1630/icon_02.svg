<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 3x3 빈 폴더 격자 — 점선 윤곽 -->
    <!-- Row 1 -->
    <rect x="80" y="100" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="200" y="215" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="200" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">빈 폴더</text>

    <rect x="392" y="100" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="512" y="215" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="512" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">bin</text>

    <rect x="704" y="100" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="824" y="215" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="824" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">obj</text>

    <!-- Row 2 -->
    <rect x="80" y="336" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="200" y="451" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="200" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">.vs</text>

    <rect x="392" y="336" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="512" y="451" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="512" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">Temp</text>

    <rect x="704" y="336" width="240" height="200" rx="20" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="16,10"/>
    <text x="824" y="451" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle">📁</text>
    <text x="824" y="506" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#BF360C" text-anchor="middle" font-weight="700">Cache</text>

    <!-- 큰 삭제 X 오버레이 -->
    <line x1="120" y1="580" x2="904" y2="880" stroke="#D84315" stroke-width="32" stroke-linecap="round" opacity="0.85"/>
    <line x1="904" y1="580" x2="120" y2="880" stroke="#D84315" stroke-width="32" stroke-linecap="round" opacity="0.85"/>

    <!-- 하단 Purge 텍스트 -->
    <rect x="200" y="900" width="624" height="72" rx="20" fill="#E64A19"/>
    <text x="512" y="950" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">PURGE</text>
  </g>
</svg>
