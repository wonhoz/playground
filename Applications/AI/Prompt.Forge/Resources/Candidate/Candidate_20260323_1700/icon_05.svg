<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E00"/>
      <stop offset="100%" stop-color="#1C1000"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 큰 번개 모양 -->
  <polygon points="560,80 260,540 480,540 440,940 760,460 540,460" fill="url(#bolt)" stroke="#FCD34D" stroke-width="8" stroke-linejoin="round"/>
  <!-- Layer 3: 번개 안의 텍스트 라인 (밝은) -->
  <rect x="330" y="260" width="200" height="28" rx="6" fill="#FFFBEB" opacity="0.6"/>
  <rect x="300" y="308" width="230" height="22" rx="5" fill="#FFFBEB" opacity="0.5"/>
  <rect x="310" y="350" width="190" height="22" rx="5" fill="#FFFBEB" opacity="0.4"/>
</svg>
