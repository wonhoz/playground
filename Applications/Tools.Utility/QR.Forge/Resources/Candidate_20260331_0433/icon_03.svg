<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금빛 배경 (대장간 컨셉) -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <radialGradient id="forge-glow" cx="50%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#FF6F00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <rect width="1024" height="1024" rx="190" fill="url(#forge-glow)"/>
  <!-- Layer 2: QR 코드 블록 (모루 위에) -->
  <!-- 모루 -->
  <rect x="220" y="700" width="584" height="70" rx="14" fill="#4E342E"/>
  <rect x="260" y="600" width="504" height="120" rx="20" fill="#6D4C41"/>
  <polygon points="260,600 180,640 260,680" fill="#5D4037"/>
  <!-- QR 코드 (큰 블록, 파란색) — 망치에 두드려지는 중 -->
  <rect x="300" y="280" width="424" height="324" rx="16" fill="#1565C0" transform="rotate(-3 512 442)"/>
  <!-- QR 위치 마커 좌상단 (미니) -->
  <rect x="320" y="298" width="96" height="96" rx="8" fill="white" transform="rotate(-3 368 346)"/>
  <rect x="336" y="314" width="64" height="64" rx="4" fill="#1565C0" transform="rotate(-3 368 346)"/>
  <rect x="352" y="330" width="32" height="32" rx="2" fill="white" transform="rotate(-3 368 346)"/>
  <!-- QR 위치 마커 우상단 -->
  <rect x="608" y="298" width="96" height="96" rx="8" fill="white" transform="rotate(-3 656 346)"/>
  <rect x="624" y="314" width="64" height="64" rx="4" fill="#1565C0" transform="rotate(-3 656 346)"/>
  <rect x="640" y="330" width="32" height="32" rx="2" fill="white" transform="rotate(-3 656 346)"/>
  <!-- QR 위치 마커 좌하단 -->
  <rect x="320" y="490" width="96" height="96" rx="8" fill="white" transform="rotate(-3 368 538)"/>
  <rect x="336" y="506" width="64" height="64" rx="4" fill="#1565C0" transform="rotate(-3 368 538)"/>
  <rect x="352" y="522" width="32" height="32" rx="2" fill="white" transform="rotate(-3 368 538)"/>
  <!-- Layer 3: 망치 (내려치는 모습) -->
  <!-- 망치 머리 -->
  <rect x="540" y="140" width="200" height="120" rx="20" fill="#37474F" transform="rotate(30 640 200)"/>
  <!-- 망치 자루 -->
  <rect x="700" y="250" width="40" height="260" rx="12" fill="#8D6E63" transform="rotate(30 720 380)"/>
  <!-- 충격파 / 스파크 -->
  <circle cx="440" cy="580" r="30" fill="#FF6F00" opacity="0.9"/>
  <circle cx="490" cy="555" r="20" fill="#FFCA28"/>
  <circle cx="380" cy="555" r="24" fill="#FF8F00"/>
  <circle cx="460" cy="525" r="16" fill="#FFD54F"/>
  <!-- URL 배지 -->
  <rect x="300" y="800" width="424" height="72" rx="24" fill="#E65100"/>
  <text x="512" y="847" font-family="'Consolas', monospace" font-size="48" fill="white" text-anchor="middle" font-weight="700">QR FORGE</text>
</svg>
