  <polygon points="488,800 512,830 536,800" fill="#22C55E"/>
  <!-- Layer 2: Hand + file -->
  <!-- Hand (simplified) -->
  <path d="M 380 280 L 380 460 Q 380 500 420 520 L 560 520 Q 600 520 620 480 L 660 380 Q 668 340 640 325 Q 614 312 600 345 L 590 375 L 590 290 Q 590 255 560 250 Q 530 245 520 280 L 520 280 L 520 270 Q 520 235 490 230 Q 460 225 450 260 L 450 270 Q 445 240 420 238 Q 392 238 380 265 Z" fill="#22C55E"/>
