  <rect x="470" y="190" width="130" height="130" rx="6" fill="#1565C0"/>
  <rect x="470" y="330" width="130" height="130" rx="6" fill="#1565C0"/>
  <rect x="470" y="610" width="130" height="130" rx="6" fill="#1565C0"/>
  <rect x="470" y="750" width="130" height="80" rx="6" fill="#1565C0"/>
  <!-- 번호 마커 -->
  <rect x="192" y="192" width="24" height="24" rx="3" fill="#42A5F5" opacity="0.8"/>
  <rect x="332" y="192" width="24" height="24" rx="3" fill="#42A5F5" opacity="0.8"/>
  <rect x="192" y="472" width="24" height="24" rx="3" fill="#42A5F5" opacity="0.8"/>
