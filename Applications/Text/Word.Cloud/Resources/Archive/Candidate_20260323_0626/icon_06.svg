<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 히트맵 — 단어 빈도 열분포 시각화 | 레이어드 | #0A001A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A001A"/>
  <!-- Layer 2: Heatmap grid of word frequencies -->
  <!-- Grid title -->
  <text x="512" y="230" font-family="Arial,sans-serif" font-size="18" fill="#A78BFA" text-anchor="middle" font-weight="bold">단어 빈도 히트맵</text>
  <!-- Heatmap cells (8x6 grid of word bubbles, colored by frequency) -->
  <!-- Row 1 (low frequency) -->
  <rect x="180" y="260" width="90" height="50" rx="8" fill="#1E0044" stroke="#3A1A60" stroke-width="1"/>
  <text x="225" y="291" font-family="Arial,sans-serif" font-size="11" fill="#7C5FA0" text-anchor="middle">하늘</text>
  <rect x="278" y="260" width="90" height="50" rx="8" fill="#220055" stroke="#3A1A60" stroke-width="1"/>
  <text x="323" y="291" font-family="Arial,sans-serif" font-size="11" fill="#8060AA" text-anchor="middle">바람</text>
  <rect x="376" y="260" width="90" height="50" rx="8" fill="#280066" stroke="#4A2A80" stroke-width="1"/>
  <text x="421" y="291" font-family="Arial,sans-serif" font-size="12" fill="#9A70C0" text-anchor="middle">구름</text>
  <rect x="474" y="260" width="90" height="50" rx="8" fill="#2E0077" stroke="#4A2A80" stroke-width="1"/>
  <text x="519" y="291" font-family="Arial,sans-serif" font-size="12" fill="#A080CC" text-anchor="middle">기쁨</text>
  <rect x="572" y="260" width="90" height="50" rx="8" fill="#220055" stroke="#3A1A60" stroke-width="1"/>
  <text x="617" y="291" font-family="Arial,sans-serif" font-size="11" fill="#8060AA" text-anchor="middle">노래</text>
  <rect x="670" y="260" width="90" height="50" rx="8" fill="#1E0044" stroke="#3A1A60" stroke-width="1"/>
  <text x="715" y="291" font-family="Arial,sans-serif" font-size="11" fill="#7C5FA0" text-anchor="middle">빛</text>
  <rect x="768" y="260" width="90" height="50" rx="8" fill="#280066" stroke="#4A2A80" stroke-width="1"/>
  <text x="813" y="291" font-family="Arial,sans-serif" font-size="12" fill="#9A70C0" text-anchor="middle">꿈</text>
  <!-- Row 2 -->
  <rect x="180" y="318" width="90" height="56" rx="8" fill="#340088" stroke="#5A3A9A" stroke-width="1"/>
  <text x="225" y="352" font-family="Arial,sans-serif" font-size="13" fill="#B090D8" text-anchor="middle">사랑</text>
  <rect x="278" y="318" width="90" height="56" rx="8" fill="#4A00AA" stroke="#6A4ABB" stroke-width="1"/>
  <text x="323" y="352" font-family="Arial,sans-serif" font-size="14" fill="#C0A0E8" text-anchor="middle">행복</text>
  <rect x="376" y="318" width="90" height="56" rx="8" fill="#5500BB" stroke="#7744CC" stroke-width="2"/>
  <text x="421" y="352" font-family="Arial,sans-serif" font-size="15" fill="#D0B0F8" text-anchor="middle">자연</text>
  <rect x="474" y="318" width="90" height="56" rx="8" fill="#6600CC" stroke="#8855DD" stroke-width="2"/>
  <text x="519" y="352" font-family="Arial,sans-serif" font-size="16" fill="#DEC0FF" text-anchor="middle">사람</text>
  <rect x="572" y="318" width="90" height="56" rx="8" fill="#5500BB" stroke="#7744CC" stroke-width="2"/>
  <text x="617" y="352" font-family="Arial,sans-serif" font-size="15" fill="#D0B0F8" text-anchor="middle">세상</text>
  <rect x="670" y="318" width="90" height="56" rx="8" fill="#4A00AA" stroke="#6A4ABB" stroke-width="1"/>
  <text x="715" y="352" font-family="Arial,sans-serif" font-size="14" fill="#C0A0E8" text-anchor="middle">마음</text>
  <rect x="768" y="318" width="90" height="56" rx="8" fill="#340088" stroke="#5A3A9A" stroke-width="1"/>
  <text x="813" y="352" font-family="Arial,sans-serif" font-size="13" fill="#B090D8" text-anchor="middle">길</text>
  <!-- Row 3 (medium-high frequency) -->
  <rect x="180" y="382" width="90" height="64" rx="8" fill="#7700EE" stroke="#9960FF" stroke-width="2"/>
  <text x="225" y="420" font-family="Arial,sans-serif" font-size="17" fill="#ECD0FF" text-anchor="middle">빈도</text>
  <rect x="278" y="382" width="90" height="64" rx="8" fill="#8811FF" stroke="#AA66FF" stroke-width="2"/>
  <text x="323" y="420" font-family="Arial,sans-serif" font-size="18" fill="#F0D8FF" text-anchor="middle">텍스트</text>
  <rect x="376" y="382" width="90" height="64" rx="8" fill="#9922FF" stroke="#BB77FF" stroke-width="2"/>
  <text x="421" y="420" font-family="Arial,sans-serif" font-size="19" fill="#F4E0FF" text-anchor="middle">단어</text>
  <rect x="474" y="382" width="90" height="64" rx="8" fill="#AA33FF" stroke="#CC88FF" stroke-width="2"/>
  <text x="519" y="420" font-family="Arial,sans-serif" font-size="20" fill="#F8EAFF" font-weight="bold" text-anchor="middle">클라우드</text>
  <rect x="572" y="382" width="90" height="64" rx="8" fill="#9922FF" stroke="#BB77FF" stroke-width="2"/>
  <text x="617" y="420" font-family="Arial,sans-serif" font-size="19" fill="#F4E0FF" text-anchor="middle">분석</text>
  <rect x="670" y="382" width="90" height="64" rx="8" fill="#8811FF" stroke="#AA66FF" stroke-width="2"/>
  <text x="715" y="420" font-family="Arial,sans-serif" font-size="18" fill="#F0D8FF" text-anchor="middle">언어</text>
  <rect x="768" y="382" width="90" height="64" rx="8" fill="#7700EE" stroke="#9960FF" stroke-width="2"/>
  <text x="813" y="420" font-family="Arial,sans-serif" font-size="17" fill="#ECD0FF" text-anchor="middle">AI</text>
  <!-- Row 4 (highest - hot colors breaking through) -->
  <rect x="180" y="454" width="90" height="70" rx="8" fill="#CC44FF" stroke="#EE99FF" stroke-width="2"/>
  <text x="225" y="496" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold" text-anchor="middle">검색</text>
  <rect x="278" y="454" width="90" height="70" rx="8" fill="#DD55FF" stroke="#FFAAFF" stroke-width="2"/>
  <text x="323" y="496" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">문서</text>
  <rect x="376" y="454" width="90" height="70" rx="8" fill="#EE66FF" stroke="#FFBBFF" stroke-width="3"/>
  <text x="421" y="496" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">데이터</text>
  <rect x="474" y="454" width="90" height="70" rx="8" fill="#FF77FF" stroke="#FFCCFF" stroke-width="3"/>
  <text x="519" y="496" font-family="Arial,sans-serif" font-size="24" fill="white" font-weight="bold" text-anchor="middle">cloud</text>
  <rect x="572" y="454" width="90" height="70" rx="8" fill="#EE66FF" stroke="#FFBBFF" stroke-width="3"/>
  <text x="617" y="496" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold" text-anchor="middle">word</text>
  <rect x="670" y="454" width="90" height="70" rx="8" fill="#DD55FF" stroke="#FFAAFF" stroke-width="2"/>
  <text x="715" y="496" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">NLP</text>
  <rect x="768" y="454" width="90" height="70" rx="8" fill="#CC44FF" stroke="#EE99FF" stroke-width="2"/>
  <text x="813" y="496" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold" text-anchor="middle">형태소</text>
  <!-- Layer 3: Color scale legend at bottom -->
  <text x="512" y="600" font-family="Arial,sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle">빈도 낮음</text>
  <rect x="240" y="614" width="544" height="20" rx="6" fill="url(#scaleGrad)"/>
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E0044"/>
      <stop offset="50%" stop-color="#7700EE"/>
      <stop offset="100%" stop-color="#FF77FF"/>
    </linearGradient>
  </defs>
  <text x="512" y="654" font-family="Arial,sans-serif" font-size="14" fill="#FF88FF" text-anchor="middle">빈도 높음</text>
</svg>
