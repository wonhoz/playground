<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="100%" stop-color="#0f0000"/>
    </radialGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong01">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad01" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FF2200" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg01)"/>

  <!-- Grid lines - horizontal -->
  <g stroke="#2a0800" stroke-width="1" opacity="0.6">
    <line x1="20" y1="128" x2="492" y2="128"/>
    <line x1="20" y1="192" x2="492" y2="192"/>
    <line x1="20" y1="256" x2="492" y2="256"/>
    <line x1="20" y1="320" x2="492" y2="320"/>
    <line x1="20" y1="384" x2="492" y2="384"/>
  </g>
  <!-- Grid lines - vertical -->
  <g stroke="#2a0800" stroke-width="1" opacity="0.6">
    <line x1="100" y1="80" x2="100" y2="440"/>
    <line x1="180" y1="80" x2="180" y2="440"/>
    <line x1="260" y1="80" x2="260" y2="440"/>
    <line x1="340" y1="80" x2="340" y2="440"/>
    <line x1="420" y1="80" x2="420" y2="440"/>
  </g>

  <!-- Center baseline -->
  <line x1="20" y1="256" x2="492" y2="256" stroke="#FF4500" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Paper roll texture - left side -->
  <rect x="20" y="60" width="472" height="392" fill="none" stroke="#3a1000" stroke-width="2" rx="4"/>

  <!-- Seismograph drum icon - top left -->
  <ellipse cx="65" cy="100" rx="30" ry="30" fill="none" stroke="#FF6020" stroke-width="2" opacity="0.7"/>
  <ellipse cx="65" cy="100" rx="22" ry="22" fill="none" stroke="#FF4500" stroke-width="1" opacity="0.5"/>
  <line x1="65" y1="70" x2="65" y2="130" stroke="#FF6020" stroke-width="1.5" opacity="0.7"/>
  <line x1="35" y1="100" x2="95" y2="100" stroke="#FF6020" stroke-width="1.5" opacity="0.7"/>

  <!-- Seismograph needle/arm -->
  <line x1="88" y1="90" x2="128" y2="256" stroke="#888" stroke-width="2" opacity="0.8"/>
  <circle cx="128" cy="256" r="4" fill="#FF4500" filter="url(#glow01)"/>

  <!-- INFO event waveform (blue, calm) - bottom track -->
  <polyline points="20,380 60,378 80,382 100,375 120,379 140,381 160,377 200,383 220,378 240,380 280,376 300,382 320,379 360,381 380,377 420,380 460,378 492,380"
    fill="none" stroke="#4A9EFF" stroke-width="2" filter="url(#glow01)" opacity="0.8"/>

  <!-- WARNING event waveform (orange, moderate) - middle track -->
  <polyline points="20,310 40,308 60,320 80,295 90,330 100,280 110,335 130,305 160,315 180,300 200,318 230,308 260,320 290,305 310,315 340,308 370,320 400,310 440,312 492,310"
    fill="none" stroke="#FF8C00" stroke-width="2.5" filter="url(#glow01)" opacity="0.9"/>

  <!-- ERROR event waveform (red, dramatic spikes) - main track -->
  <polyline points="20,256 30,254 40,260 50,240 60,280 70,200 80,320 90,180 95,340 100,256 110,252 120,258 130,240 140,270 160,245 180,265 200,248 210,270 220,245 240,260 260,240 270,275 280,235 290,280 300,256 320,250 340,258 360,248 380,260 420,254 460,258 492,256"
    fill="none" stroke="url(#lineGrad01)" stroke-width="3" filter="url(#glowStrong01)"/>

  <!-- AUDIT event waveform (purple, steady) - top track -->
  <polyline points="20,180 50,178 80,184 110,176 130,182 160,179 190,183 220,177 250,181 280,179 310,183 340,177 370,181 400,178 430,183 460,179 492,180"
    fill="none" stroke="#9B59B6" stroke-width="2" filter="url(#glow01)" opacity="0.8"/>

  <!-- Major ERROR spike highlight -->
  <line x1="80" y1="190" x2="80" y2="330" stroke="#FF0000" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="95" y1="170" x2="95" y2="350" stroke="#FF0000" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Event markers on timeline -->
  <g filter="url(#glow01)">
    <!-- ERROR marker -->
    <circle cx="80" cy="205" r="6" fill="#FF2200" opacity="0.9"/>
    <polygon points="80,175 86,195 74,195" fill="#FF2200" opacity="0.9"/>
    <!-- WARN marker -->
    <circle cx="200" cy="300" r="5" fill="#FF8C00" opacity="0.9"/>
    <!-- INFO marker -->
    <circle cx="300" cy="370" r="4" fill="#4A9EFF" opacity="0.9"/>
    <!-- AUDIT marker -->
    <circle cx="420" cy="170" r="4" fill="#9B59B6" opacity="0.9"/>
  </g>

  <!-- Labels -->
  <g font-family="'Consolas','Courier New',monospace" font-size="11" fill="#FF4500" opacity="0.8">
    <text x="28" y="175">AUDIT</text>
    <text x="28" y="253">ERROR</text>
    <text x="28" y="308">WARN</text>
    <text x="28" y="378">INFO</text>
  </g>

  <!-- Title -->
  <text x="256" y="45" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="bold" fill="#FF6020" opacity="0.9" filter="url(#glow01)">SEISMOGRAPH EVENTS</text>
  <text x="256" y="465" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="10" fill="#FF4500" opacity="0.5">SYSTEM EVENT INTENSITY MONITOR</text>

  <!-- Time axis arrow -->
  <line x1="20" y1="445" x2="492" y2="445" stroke="#FF4500" stroke-width="1.5" opacity="0.5"/>
  <polygon points="492,441 506,445 492,449" fill="#FF4500" opacity="0.5"/>
  <text x="30" y="457" font-family="monospace" font-size="9" fill="#FF4500" opacity="0.4">T+0</text>
  <text x="470" y="457" font-family="monospace" font-size="9" fill="#FF4500" opacity="0.4">NOW</text>
</svg>
