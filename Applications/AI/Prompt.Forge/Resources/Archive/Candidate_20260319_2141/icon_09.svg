<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Database with prompt rows (prompt library as structured data) -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#010A18"/>
  <!-- Database cylinder top -->
  <ellipse cx="512" cy="260" rx="300" ry="60" fill="#0D3349" stroke="#0288D1" stroke-width="22"/>
  <!-- Database body -->
  <rect x="212" y="260" width="600" height="480" rx="0" fill="#061A28" stroke="#0288D1" stroke-width="22"/>
  <rect x="212" y="712" width="600" height="10" fill="#061A28"/>
  <!-- Database cylinder bottom -->
  <ellipse cx="512" cy="740" rx="300" ry="60" fill="#0D3349" stroke="#0288D1" stroke-width="22"/>
  <!-- Shelf dividers inside -->
  <line x1="212" y1="380" x2="812" y2="380" stroke="#0288D1" stroke-width="14" opacity="0.5"/>
  <line x1="212" y1="500" x2="812" y2="500" stroke="#0288D1" stroke-width="14" opacity="0.5"/>
  <line x1="212" y1="620" x2="812" y2="620" stroke="#0288D1" stroke-width="14" opacity="0.5"/>
  <!-- Row 1 — title prompt -->
  <rect x="260" y="300" width="240" height="22" rx="11" fill="#0288D1" opacity="0.9"/>
  <rect x="520" y="300" width="120" height="22" rx="11" fill="#0288D1" opacity="0.5"/>
  <rect x="660" y="300" width="100" height="22" rx="11" fill="#0288D1" opacity="0.3"/>
  <!-- Row 2 -->
  <rect x="260" y="420" width="200" height="22" rx="11" fill="#0288D1" opacity="0.8"/>
  <rect x="480" y="420" width="160" height="22" rx="11" fill="#0288D1" opacity="0.5"/>
  <rect x="660" y="420" width="100" height="22" rx="11" fill="#0288D1" opacity="0.3"/>
  <!-- Row 3 (highlighted) -->
  <rect x="240" y="530" width="540" height="44" rx="10" fill="#0288D1" opacity="0.15" stroke="#0288D1" stroke-width="8"/>
  <rect x="260" y="542" width="200" height="20" rx="10" fill="#03A9F4"/>
  <rect x="480" y="542" width="140" height="20" rx="10" fill="#0288D1" opacity="0.7"/>
  <!-- Row 4 -->
  <rect x="260" y="648" width="220" height="22" rx="11" fill="#0288D1" opacity="0.6"/>
  <rect x="500" y="648" width="120" height="22" rx="11" fill="#0288D1" opacity="0.4"/>
  <!-- Top label -->
  <rect x="368" y="236" width="288" height="28" rx="14" fill="#0288D1" opacity="0.3"/>
</svg>
