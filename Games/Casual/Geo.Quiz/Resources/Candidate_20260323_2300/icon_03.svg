      <stop offset="0%" stop-color="#0E7BB5"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <radialGradient id="globeGrad03" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#BAE6FD"/>
