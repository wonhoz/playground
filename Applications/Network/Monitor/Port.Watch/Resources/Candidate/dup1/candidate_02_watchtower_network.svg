<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001010"/>
      <stop offset="100%" stop-color="#002020"/>
    </linearGradient>
    <linearGradient id="tower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffca28"/>
    </linearGradient>
    <radialGradient id="beam" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffe082" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- light beam from tower -->
  <path d="M256 210 L140 420 L372 420 Z" fill="url(#beam)"/>
  <!-- tower base -->
  <rect x="210" y="300" width="92" height="150" rx="6" fill="url(#tower)"/>
  <!-- tower observation deck -->
  <rect x="185" y="260" width="142" height="55" rx="8" fill="#455a64"/>
  <!-- battlements -->
  <rect x="185" y="244" width="25" height="22" rx="4" fill="url(#tower)"/>
  <rect x="222" y="244" width="25" height="22" rx="4" fill="url(#tower)"/>
  <rect x="259" y="244" width="25" height="22" rx="4" fill="url(#tower)"/>
  <rect x="296" y="244" width="25" height="22" rx="4" fill="url(#tower)"/>
  <!-- spotlight -->
  <circle cx="256" cy="210" r="36" fill="url(#light)" filter="url(#glow)"/>
  <circle cx="256" cy="210" r="20" fill="white" opacity="0.8"/>
  <!-- windows in tower -->
  <rect x="238" y="315" width="36" height="30" rx="5" fill="#37474f"/>
  <rect x="240" y="317" width="15" height="26" rx="3" fill="#00acc1" opacity="0.6"/>
  <!-- network signal arcs -->
  <path d="M320 175 Q350 195 355 220" stroke="#00e5ff" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M340 155 Q385 185 390 230" stroke="#00e5ff" stroke-width="4" fill="none" opacity="0.35" stroke-linecap="round"/>
</svg>
