<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080000"/>
      <stop offset="100%" stop-color="#120000"/>
    </linearGradient>
    <linearGradient id="lava" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Volcano mountain -->
  <path d="M60,440 L180,200 L256,140 L332,200 L452,440 Z" fill="#1C0A00" stroke="#B45309" stroke-width="2"/>
  <!-- Crater -->
  <ellipse cx="256" cy="145" rx="45" ry="18" fill="#0a0000" stroke="#F97316" stroke-width="2"/>
  <!-- Lava flow on mountain -->
  <path d="M220,200 Q210,250 200,310 Q192,360 185,410 L215,410 Q220,360 228,310 Q235,250 245,200 Z" fill="url(#lava)" opacity="0.6"/>
  <path d="M290,200 Q300,250 308,310 Q316,360 322,410 L292,410 Q288,360 282,310 Q276,250 267,200 Z" fill="url(#lava)" opacity="0.5"/>
  <!-- Eruption flames -->
  <path d="M230,142 Q240,110 250,80 Q256,60 262,80 Q268,100 278,130 Q270,100 256,100 Q242,100 234,130 Z" fill="url(#fire)" opacity="0.9"/>
  <path d="M240,142 Q248,115 256,90 Q264,115 272,142" fill="url(#fire)" opacity="0.7"/>
  <!-- Skill badges ejected from volcano -->
  <rect x="80" y="120" width="70" height="30" rx="8" fill="#1C0A00" stroke="#F97316" stroke-width="1.5"/>
  <text x="115" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#FCD34D">★ Python</text>
  <text x="115" y="143" text-anchor="middle" font-family="monospace" font-size="7" fill="#F97316">Lv.9</text>
  <rect x="360" y="100" width="72" height="30" rx="8" fill="#1C0A00" stroke="#F97316" stroke-width="1.5"/>
  <text x="396" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#FCD34D">★ Docker</text>
  <text x="396" y="123" text-anchor="middle" font-family="monospace" font-size="7" fill="#F97316">Lv.7</text>
  <rect x="380" y="200" width="60" height="26" rx="6" fill="#1C0A00" stroke="#B45309" stroke-width="1.5"/>
  <text x="410" y="210" text-anchor="middle" font-family="monospace" font-size="7" fill="#FCD34D">★ React</text>
  <text x="410" y="221" text-anchor="middle" font-family="monospace" font-size="6" fill="#F97316">Lv.6</text>
  <rect x="72" y="210" width="60" height="26" rx="6" fill="#1C0A00" stroke="#B45309" stroke-width="1.5"/>
  <text x="102" y="220" text-anchor="middle" font-family="monospace" font-size="7" fill="#FCD34D">★ SQL</text>
  <text x="102" y="231" text-anchor="middle" font-family="monospace" font-size="6" fill="#F97316">Lv.8</text>
  <!-- Flying sparks -->
  <circle cx="180" cy="90" r="3" fill="#F97316" opacity="0.7"/>
  <circle cx="330" cy="80" r="4" fill="#EF4444" opacity="0.6"/>
  <circle cx="200" cy="60" r="2" fill="#FDE68A" opacity="0.5"/>
  <circle cx="300" cy="55" r="3" fill="#F97316" opacity="0.5"/>
  <circle cx="160" cy="150" r="2" fill="#FCD34D" opacity="0.6"/>
  <circle cx="360" cy="155" r="2" fill="#F97316" opacity="0.5"/>
</svg>
