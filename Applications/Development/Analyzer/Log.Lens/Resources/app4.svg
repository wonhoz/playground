<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 하늘 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg2)"/>

  <!-- Layer 2: 탭 바 + 로그 파일들 -->
  <!-- 창 배경 -->
  <rect x="80" y="160" width="864" height="720" rx="22" fill="#1E1E2E" opacity="0.9"/>
  <!-- 탭 바 -->
  <rect x="80" y="160" width="864" height="68" rx="22" fill="#12121E"/>
  <!-- 탭 1 (선택됨) -->
  <rect x="96" y="168" width="200" height="52" rx="12" fill="#1565C0"/>
  <text x="196" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">server.log</text>
  <!-- 탭 2 -->
  <rect x="308" y="176" width="180" height="44" rx="10" fill="#263238" opacity="0.8"/>
  <text x="398" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">app.log</text>
  <!-- 탭 3 -->
  <rect x="500" y="176" width="180" height="44" rx="10" fill="#263238" opacity="0.8"/>
  <text x="590" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">error.log</text>

  <!-- 로그 내용 (선택된 탭) -->
  <rect x="96" y="252" width="832" height="54" rx="8" fill="#1A3A5A" opacity="0.7"/>
  <rect x="96" y="252" width="120" height="54" rx="8" fill="#1565C0" opacity="0.9"/>
  <text x="156" y="281" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">INFO</text>
  <text x="250" y="281" font-family="'Courier New',monospace" font-size="28" fill="#90CAF9" dominant-baseline="middle"> 12:00:01 — startup</text>

  <rect x="96" y="320" width="832" height="54" rx="8" fill="#2D1A0E" opacity="0.7"/>
  <rect x="96" y="320" width="120" height="54" rx="8" fill="#D32F2F" opacity="0.9"/>
  <text x="156" y="349" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">ERR</text>
  <text x="248" y="349" font-family="'Courier New',monospace" font-size="28" fill="#FF8A80" dominant-baseline="middle"> 12:00:05 — timeout</text>

  <rect x="96" y="388" width="832" height="54" rx="8" fill="#1A2D0E" opacity="0.6"/>
  <rect x="96" y="388" width="120" height="54" rx="8" fill="#388E3C" opacity="0.9"/>
  <text x="156" y="417" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">DBG</text>
  <text x="248" y="417" font-family="'Courier New',monospace" font-size="28" fill="#A5D6A7" dominant-baseline="middle"> 12:00:07 — retry</text>

  <rect x="96" y="456" width="832" height="54" rx="8" fill="#1A3A5A" opacity="0.6"/>
  <rect x="96" y="456" width="120" height="54" rx="8" fill="#F57F17" opacity="0.9"/>
  <text x="156" y="485" font-family="'Courier New',monospace" font-size="30" fill="white" text-anchor="middle" dominant-baseline="middle">WRN</text>
  <text x="248" y="485" font-family="'Courier New',monospace" font-size="28" fill="#FFD54F" dominant-baseline="middle"> 12:00:09 — slow</text>

  <!-- Layer 3: 라인 카운트 배지 -->
  <rect x="716" y="770" width="240" height="66" rx="16" fill="#1565C0"/>
  <text x="836" y="805" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="white" text-anchor="middle" dominant-baseline="middle">1,247 lines</text>
