<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg04)"/>
  <!-- Zigzag dodge path (white arrows) -->
  <polyline points="200,750 350,400 500,650 650,350 820,550" fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head at end -->
  <polygon points="820,550 760,480 880,480" fill="white"/>
  <!-- Orange bullets near path (threats) -->
  <circle cx="210" cy="380" r="52" fill="#F97316" stroke="white" stroke-width="10"/>
  <circle cx="630" cy="260" r="52" fill="#F97316" stroke="white" stroke-width="10"/>
  <circle cx="730" cy="650" r="52" fill="#F97316" stroke="white" stroke-width="10"/>
  <circle cx="380" cy="720" r="42" fill="#F97316" stroke="white" stroke-width="10"/>
  <circle cx="860" cy="380" r="42" fill="#F97316" stroke="white" stroke-width="10"/>
  <!-- Highlight on bullets -->
  <circle cx="196" cy="367" r="16" fill="rgba(255,255,255,0.4)"/>
  <circle cx="616" cy="247" r="16" fill="rgba(255,255,255,0.4)"/>
  <circle cx="716" cy="637" r="16" fill="rgba(255,255,255,0.4)"/>
  <!-- Label -->
  <text x="512" y="900" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">DODGE!</text>
</svg>