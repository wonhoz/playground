<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 오렌지 선셋 -->
  <rect width="1024" height="1024" rx="180" fill="#E65100"/>
  <!-- Layer 2: 여행 경로 지도 스타일 -->
  <!-- 점선 경로 -->
  <path d="M200,700 Q300,400 512,350 Q700,300 820,500" stroke="white" stroke-width="8" fill="none" stroke-dasharray="20,15" stroke-linecap="round"/>
  <!-- 출발점 -->
  <circle cx="200" cy="700" r="30" fill="white"/>
  <circle cx="200" cy="700" r="18" fill="#E65100"/>
  <!-- 중간 경유지들 -->
  <circle cx="350" cy="490" r="20" fill="white" opacity="0.8"/>
  <circle cx="512" cy="350" r="24" fill="white" opacity="0.9"/>
  <circle cx="670" cy="360" r="20" fill="white" opacity="0.8"/>
  <!-- 도착점 (목적지 핀) -->
  <circle cx="820" cy="440" r="40" fill="white"/>
  <circle cx="820" cy="440" r="24" fill="#E65100"/>
  <path d="M790,470 Q820,540 850,470" fill="white"/>
  <!-- 물음표 핀 (중간) -->
  <circle cx="512" cy="280" r="50" fill="#FF8F00"/>
  <text x="512" y="300" font-family="Arial Black,Arial" font-size="56" font-weight="900" fill="white" text-anchor="middle">?</text>
  <path d="M476,318 Q512,380 548,318" fill="#FF8F00"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="800" font-family="Arial Black,Arial" font-size="90" font-weight="900" fill="white" text-anchor="middle">GEO QUIZ</text>
  <text x="512" y="870" font-family="Arial" font-size="40" fill="#FFCCBC" text-anchor="middle">Geography Challenge</text>
</svg>
