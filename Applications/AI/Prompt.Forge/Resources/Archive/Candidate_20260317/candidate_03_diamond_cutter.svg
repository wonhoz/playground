<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050f1f"/>
      <stop offset="100%" stop-color="#030b1a"/>
    </radialGradient>
    <linearGradient id="diamondTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F4FF"/>
      <stop offset="50%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#0050a0"/>
    </linearGradient>
    <linearGradient id="diamondLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="diamondRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0050a0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#003070" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cutterBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow03">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bgGrad03)" rx="40"/>

  <!-- 배경 격자 (정밀 가공 느낌) -->
  <g opacity="0.08" stroke="#1E90FF" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- 커터 도구 (왼쪽) -->
  <g filter="url(#glow03)">
    <!-- 커터 핸들 -->
    <rect x="40" y="230" width="160" height="52" rx="8" fill="#0d2a4a" stroke="#1E90FF" stroke-width="2"/>
    <!-- 핸들 디테일 -->
    <rect x="50" y="238" width="140" height="36" rx="5" fill="#0a1f38" stroke="#00BFFF" stroke-width="1" opacity="0.7"/>
    <line x1="90" y1="238" x2="90" y2="274" stroke="#1E90FF" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="238" x2="130" y2="274" stroke="#1E90FF" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="238" x2="170" y2="274" stroke="#1E90FF" stroke-width="1" opacity="0.5"/>

    <!-- 커터 날 -->
    <polygon points="200,230 200,282 240,256" fill="#00BFFF" opacity="0.95"/>
    <polygon points="200,230 240,256 200,243" fill="#E0F4FF" opacity="0.6"/>

    <!-- 커팅 빔 (레이저) -->
    <rect x="240" y="252" width="180" height="8" rx="2" fill="url(#cutterBeam)" filter="url(#strongGlow03)"/>
    <!-- 빔 중심선 -->
    <line x1="240" y1="256" x2="420" y2="256" stroke="#00BFFF" stroke-width="2" opacity="0.9" filter="url(#strongGlow03)"/>
  </g>

  <!-- 다이아몬드 (커팅 대상) -->
  <g transform="translate(256, 256)" filter="url(#glow03)">
    <!-- 다이아몬드 상단 크라운 -->
    <polygon points="0,-100 -80,-20 0,-40 80,-20" fill="url(#diamondTop)" opacity="0.95"/>
    <!-- 크라운 파싯들 -->
    <polygon points="0,-100 -40,-20 0,-40" fill="#E0F4FF" opacity="0.4"/>
    <polygon points="0,-100 40,-20 0,-40" fill="#1E90FF" opacity="0.3"/>
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#00BFFF" stroke-width="1" opacity="0.6"/>

    <!-- 다이아몬드 파빌리온 (하단) -->
    <polygon points="-80,-20 0,-40 80,-20 60,40 0,80 -60,40" fill="url(#diamondLeft)" opacity="0.85"/>
    <polygon points="60,40 0,80 -60,40 0,100" fill="url(#diamondRight)" opacity="0.9"/>
    <!-- 파빌리온 파싯 라인들 -->
    <line x1="-80" y1="-20" x2="0" y2="100" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="-20" x2="0" y2="100" stroke="#1E90FF" stroke-width="1" opacity="0.4"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#00BFFF" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="0" y2="100" stroke="#E0F4FF" stroke-width="1" opacity="0.3"/>

    <!-- 반짝임 -->
    <circle cx="-25" cy="-55" r="6" fill="white" opacity="0.9" filter="url(#strongGlow03)"/>
    <circle cx="40" cy="-30" r="4" fill="#E0F4FF" opacity="0.7" filter="url(#glow03)"/>
  </g>

  <!-- 각인된 텍스트 (커팅 라인 위아래) -->
  <!-- 텍스트 블록 (각인 결과) -->
  <g filter="url(#glow03)">
    <text x="256" y="390" font-family="monospace" font-size="16" font-weight="bold"
          fill="#00BFFF" text-anchor="middle" letter-spacing="3" opacity="0.9">PROMPT</text>
    <text x="256" y="412" font-family="monospace" font-size="11"
          fill="#1E90FF" text-anchor="middle" letter-spacing="2" opacity="0.7">&gt; &lt; / &gt; { } _</text>
  </g>

  <!-- 커팅 스파크 효과 -->
  <g filter="url(#strongGlow03)" opacity="0.9">
    <circle cx="420" cy="256" r="6" fill="#00BFFF"/>
    <circle cx="430" cy="248" r="3" fill="#E0F4FF"/>
    <circle cx="435" cy="262" r="2" fill="#00BFFF"/>
    <line x1="420" y1="256" x2="440" y2="240" stroke="#00BFFF" stroke-width="1.5" opacity="0.7"/>
    <line x1="420" y1="256" x2="445" y2="265" stroke="#1E90FF" stroke-width="1" opacity="0.6"/>
    <line x1="420" y1="256" x2="438" y2="275" stroke="#00BFFF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 측정 눈금 (정밀도 표현) -->
  <g opacity="0.4" stroke="#1E90FF" stroke-width="1" filter="url(#glow03)">
    <line x1="256" y1="140" x2="256" y2="150"/>
    <line x1="296" y1="145" x2="296" y2="150"/>
    <line x1="216" y1="145" x2="216" y2="150"/>
    <line x1="336" y1="145" x2="336" y2="150"/>
    <line x1="176" y1="145" x2="176" y2="150"/>
    <line x1="106" y1="135" x2="106" y2="512"/>
    <line x1="406" y1="135" x2="406" y2="160"/>
  </g>
  <text x="256" y="135" font-family="monospace" font-size="9" fill="#1E90FF" text-anchor="middle" opacity="0.5">◄────────────────────►</text>

  <!-- 하단 라벨 -->
  <rect x="155" y="455" width="202" height="28" rx="5" fill="#030b1a" stroke="#1E90FF" stroke-width="1" opacity="0.7"/>
  <text x="256" y="474" font-family="monospace" font-size="13" font-weight="bold"
        fill="#00BFFF" text-anchor="middle" opacity="0.9">PROMPT.FORGE</text>
</svg>
