<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#212121"/>
  <!-- Layer 2: 스탬프 기계 -->
  <!-- 스탬프 손잡이 -->
  <rect x="432" y="230" width="160" height="240" rx="20" fill="#616161"/>
  <rect x="412" y="230" width="200" height="60" rx="16" fill="#757575"/>
  <!-- 스탬프 패드 -->
  <rect x="352" y="462" width="320" height="120" rx="20" fill="#C62828"/>
  <text x="512" y="538" text-anchor="middle" font-family="Arial Black" font-size="72" font-weight="900" fill="white">→ICO</text>
  <!-- 찍힌 자국 (아래) -->
  <circle cx="512" cy="740" r="130" fill="none" stroke="#C62828" stroke-width="24" opacity="0.8"/>
  <text x="512" y="762" text-anchor="middle" font-family="Arial Black" font-size="100" font-weight="900" fill="#C62828">ICO</text>
  <!-- 잉크 번짐 효과 -->
  <circle cx="400" cy="760" r="18" fill="#C62828" opacity="0.4"/>
