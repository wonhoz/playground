           fill="#FFD740" stroke="white" stroke-width="12" stroke-linejoin="round"/>
  <!-- 주변 스파크 -->
  <circle cx="836" cy="176" r="20" fill="#FFEE58"/>
  <circle cx="932" cy="360" r="14" fill="#FFD740"/>
  <circle cx="776" cy="844" r="16" fill="#FFEE58"/>
  <circle cx="940" cy="680" r="12" fill="#FFD740" opacity="0.8"/>
