<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sc3-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <filter id="sc3-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#sc3-clip)">
    <!-- Background: Deep Navy -->
    <rect width="1024" height="1024" fill="#0A1628"/>

    <!-- Connection edges (white lines) -->
    <!-- Center to all nodes -->
    <line x1="512" y1="512" x2="512" y2="260" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="260" y2="430" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="260" y2="640" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="764" y2="430" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="764" y2="640" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="512" y2="764" stroke="#FFFFFF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <!-- Outer connections -->
    <line x1="512" y1="260" x2="764" y2="430" stroke="#00E5FF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <line x1="260" y1="430" x2="260" y2="640" stroke="#00E5FF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <line x1="764" y1="430" x2="764" y2="640" stroke="#00E5FF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <line x1="260" y1="640" x2="512" y2="764" stroke="#00E5FF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <line x1="764" y1="640" x2="512" y2="764" stroke="#00E5FF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>

    <!-- Center node (main hub) -->
    <g filter="url(#sc3-glow)">
      <circle cx="512" cy="512" r="56" fill="#00E5FF"/>
      <circle cx="512" cy="512" r="38" fill="#0A1628"/>
      <text x="512" y="521" font-family="monospace" font-size="24" fill="#00E5FF" text-anchor="middle" font-weight="bold">AI</text>
    </g>

    <!-- Outer nodes: Skill, Command, Memory, Plugin, Config -->
    <!-- Top: Commands -->
    <g filter="url(#sc3-glow)">
      <circle cx="512" cy="260" r="44" fill="#E84040"/>
      <text x="512" y="255" font-family="monospace" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CMD</text>
    </g>
    <!-- Left-top: Skills -->
    <g filter="url(#sc3-glow)">
      <circle cx="260" cy="430" r="44" fill="#3DAA50"/>
      <text x="260" y="425" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">SKL</text>
    </g>
    <!-- Left-bottom: Memory -->
    <g filter="url(#sc3-glow)">
      <circle cx="260" cy="640" r="44" fill="#7B3FBE"/>
      <text x="260" y="635" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">MEM</text>
    </g>
    <!-- Right-top: Plugins -->
    <g filter="url(#sc3-glow)">
      <circle cx="764" cy="430" r="44" fill="#FF8C00"/>
      <text x="764" y="425" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PLG</text>
    </g>
    <!-- Right-bottom: Config -->
    <g filter="url(#sc3-glow)">
      <circle cx="764" cy="640" r="44" fill="#E84088"/>
      <text x="764" y="635" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CFG</text>
    </g>
    <!-- Bottom: Tools -->
    <g filter="url(#sc3-glow)">
      <circle cx="512" cy="764" r="44" fill="#00BCD4"/>
      <text x="512" y="759" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TLS</text>
    </g>

    <!-- Floating mini nodes -->
    <circle cx="380" cy="300" r="14" fill="#00E5FF" opacity="0.5"/>
    <circle cx="680" cy="780" r="10" fill="#3DAA50" opacity="0.4"/>
    <circle cx="820" cy="320" r="12" fill="#E84040" opacity="0.3"/>
  </g>
</svg>
