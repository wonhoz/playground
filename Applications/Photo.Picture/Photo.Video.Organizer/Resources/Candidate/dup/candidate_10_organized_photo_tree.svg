<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b4db"/>
      <stop offset="100%" stop-color="#0083b0"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree trunk/root -->
  <line x1="256" y1="100" x2="256" y2="280" stroke="url(#trunk)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Branch left -->
  <line x1="256" y1="180" x2="140" y2="280" stroke="url(#trunk)" stroke-width="4" opacity="0.8"/>
  <!-- Branch right -->
  <line x1="256" y1="180" x2="372" y2="280" stroke="url(#trunk)" stroke-width="4" opacity="0.8"/>
  <!-- Leaf branches -->
  <line x1="140" y1="280" x2="90" y2="360" stroke="url(#trunk)" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="280" x2="190" y2="360" stroke="url(#trunk)" stroke-width="3" opacity="0.6"/>
  <line x1="372" y1="280" x2="322" y2="360" stroke="url(#trunk)" stroke-width="3" opacity="0.6"/>
  <line x1="372" y1="280" x2="422" y2="360" stroke="url(#trunk)" stroke-width="3" opacity="0.6"/>
  <!-- Root node (photo icon) -->
  <rect x="228" y="72" width="56" height="44" rx="6" fill="url(#node)" filter="url(#glow)"/>
  <circle cx="244" cy="87" r="7" fill="white" opacity="0.4"/>
  <path d="M228 106 L240 92 L252 100 L264 90 L284 106 Z" fill="white" opacity="0.35"/>
  <!-- Branch photo nodes -->
  <rect x="112" y="256" width="56" height="44" rx="6" fill="#00b4db" opacity="0.8"/>
  <circle cx="128" cy="271" r="7" fill="white" opacity="0.4"/>
  <rect x="228" y="256" width="56" height="44" rx="6" fill="#f6d365" opacity="0.4"/>
  <rect x="344" y="256" width="56" height="44" rx="6" fill="#fda085" opacity="0.8"/>
  <!-- Leaf photo nodes -->
  <rect x="62" y="354" width="52" height="40" rx="5" fill="#a29bfe" opacity="0.9"/>
  <polygon points="74,368 94,380 74,392" fill="white" opacity="0.4"/>
  <rect x="164" y="354" width="52" height="40" rx="5" fill="#fd79a8" opacity="0.9"/>
  <rect x="296" y="354" width="52" height="40" rx="5" fill="#55efc4" opacity="0.9"/>
  <rect x="398" y="354" width="52" height="40" rx="5" fill="#fdcb6e" opacity="0.9"/>
  <circle cx="424" cy="370" r="8" fill="white" opacity="0.3"/>
</svg>