<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 바이올렛/퍼플 계열 -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#1A0A2E"/>

  <!-- Layer 1: 배경 글로우 효과 -->
  <circle cx="512" cy="512" r="320" fill="#4A148C" opacity="0.15"/>
  <circle cx="512" cy="512" r="200" fill="#6A1B9A" opacity="0.1"/>

  <!-- Layer 2: 십자형 퍼즐 조각 — 알파벳 블록 교차 -->
  <!-- 가로 단어 블록들: C R O S S -->
  <!-- C -->
  <rect x="190" y="442" width="112" height="140" rx="14" fill="#7B1FA2"/>
  <rect x="196" y="448" width="100" height="128" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="246" y="514" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">C</text>

  <!-- R -->
  <rect x="312" y="442" width="112" height="140" rx="14" fill="#7B1FA2"/>
  <rect x="318" y="448" width="100" height="128" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="368" y="514" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">R</text>

  <!-- O 교차점 — 강조 -->
  <rect x="434" y="420" width="156" height="184" rx="18" fill="#AB47BC"/>
  <rect x="444" y="430" width="136" height="164" rx="12" fill="#CE93D8" opacity="0.3"/>
  <text x="512" y="514" font-family="'Arial Black', Arial" font-weight="900" font-size="120" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">O</text>

  <!-- S -->
  <rect x="600" y="442" width="112" height="140" rx="14" fill="#7B1FA2"/>
  <rect x="606" y="448" width="100" height="128" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="656" y="514" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- S -->
  <rect x="722" y="442" width="112" height="140" rx="14" fill="#7B1FA2"/>
  <rect x="728" y="448" width="100" height="128" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="778" y="514" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- 세로 단어 블록들: W O R D (공유 O) -->
  <!-- W -->
  <rect x="434" y="210" width="156" height="122" rx="14" fill="#7B1FA2"/>
  <rect x="444" y="220" width="136" height="102" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="512" y="273" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">W</text>

  <!-- R -->
  <rect x="434" y="342" width="156" height="122" rx="14" fill="#7B1FA2"/>
  <rect x="444" y="352" width="136" height="102" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="512" y="405" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">R</text>

  <!-- D -->
  <rect x="434" y="614" width="156" height="122" rx="14" fill="#7B1FA2"/>
  <rect x="444" y="624" width="136" height="102" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="512" y="677" font-family="'Arial Black', Arial" font-weight="900" font-size="100" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">D</text>

  <!-- S -->
  <rect x="434" y="746" width="156" height="78" rx="14" fill="#7B1FA2"/>
  <rect x="444" y="756" width="136" height="58" rx="10" fill="#9C27B0" opacity="0.6"/>
  <text x="512" y="787" font-family="'Arial Black', Arial" font-weight="900" font-size="66" fill="#E040FB" text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- Layer 3: 연결 조각 힌트 (교차점 강조선) -->
  <line x1="512" y1="420" x2="512" y2="210" stroke="#E040FB" stroke-width="3" opacity="0.3" stroke-dasharray="8,6"/>
  <line x1="512" y1="604" x2="512" y2="824" stroke="#E040FB" stroke-width="3" opacity="0.3" stroke-dasharray="8,6"/>
  <line x1="190" y1="512" x2="434" y2="512" stroke="#E040FB" stroke-width="3" opacity="0.3" stroke-dasharray="8,6"/>
  <line x1="590" y1="512" x2="834" y2="512" stroke="#E040FB" stroke-width="3" opacity="0.3" stroke-dasharray="8,6"/>

  <!-- 글로우 링 (교차점) -->
  <circle cx="512" cy="512" r="90" fill="none" stroke="#E040FB" stroke-width="3" opacity="0.4"/>
  <circle cx="512" cy="512" r="72" fill="none" stroke="#CE93D8" stroke-width="2" opacity="0.3"/>
</svg>
