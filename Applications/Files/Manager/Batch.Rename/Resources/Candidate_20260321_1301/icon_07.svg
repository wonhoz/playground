<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="pipe07" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 - 보라 그라데이션 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>

  <!-- 배경 육각형 격자 장식 -->
  <g opacity="0.08" clip-path="url(#clip07)">
    <path d="M200,100 L260,135 L260,205 L200,240 L140,205 L140,135 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M320,100 L380,135 L380,205 L320,240 L260,205 L260,135 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M440,100 L500,135 L500,205 L440,240 L380,205 L380,135 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M260,240 L320,275 L320,345 L260,380 L200,345 L200,275 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M380,240 L440,275 L440,345 L380,380 L320,345 L320,275 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M140,380 L200,415 L200,485 L140,520 L80,485 L80,415 Z" stroke="white" stroke-width="4" fill="none"/>
    <path d="M260,380 L320,415 L320,485 L260,520 L200,485 L200,415 Z" stroke="white" stroke-width="4" fill="none"/>
  </g>

  <!-- Layer 2: 정규식 표현식 블록들 -->
  <!-- 입력 블록 (왼쪽) -->
  <rect x="120" y="340" width="330" height="344" rx="20" fill="#3B0764" opacity="0.9"/>
  <rect x="120" y="340" width="330" height="344" rx="20" fill="none" stroke="#A78BFA" stroke-width="4"/>

  <!-- 헤더 -->
  <rect x="120" y="340" width="330" height="56" rx="20" fill="#5B21B6" opacity="0.9"/>
  <rect x="120" y="372" width="330" height="24" fill="#5B21B6" opacity="0.9"/>
  <text x="285" y="378" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#DDD6FE">Find (Regex)</text>

  <!-- 정규식 패턴 텍스트 -->
  <text x="148" y="444" font-family="Consolas,monospace" font-size="42" fill="#F0ABFC">IMG_</text>
  <text x="148" y="494" font-family="Consolas,monospace" font-size="42" fill="#FDE68A">(\d+)</text>
  <text x="148" y="544" font-family="Consolas,monospace" font-size="42" fill="#F0ABFC">\.jpg</text>

  <!-- 커서 깜빡임 -->
  <rect x="148" y="596" width="6" height="52" rx="3" fill="#C4B5FD" opacity="0.8"/>

  <!-- 화살표 (변환) - 동적 -->
  <g transform="translate(512,512)">
    <!-- 화살표 파이프 -->
    <rect x="-46" y="-26" width="92" height="52" rx="26" fill="url(#pipe07)"/>
    <!-- 화살표 머리 -->
    <polygon points="52,-36 106,0 52,36" fill="#FBBF24"/>
    <!-- 화살표 꼬리 -->
    <line x1="-46" y1="0" x2="-106" y2="0" stroke="#A78BFA" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- 출력 블록 (오른쪽) -->
  <rect x="574" y="340" width="330" height="344" rx="20" fill="#3B0764" opacity="0.9"/>
  <rect x="574" y="340" width="330" height="344" rx="20" fill="none" stroke="#FBBF24" stroke-width="4"/>

  <!-- 헤더 -->
  <rect x="574" y="340" width="330" height="56" rx="20" fill="#78350F" opacity="0.9"/>
  <rect x="574" y="372" width="330" height="24" fill="#78350F" opacity="0.9"/>
  <text x="739" y="378" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#FDE68A">Replace</text>

  <!-- 치환 패턴 텍스트 -->
  <text x="602" y="444" font-family="Consolas,monospace" font-size="42" fill="#34D399">photo_</text>
  <text x="602" y="494" font-family="Consolas,monospace" font-size="42" fill="#FDE68A">$1</text>
  <text x="602" y="544" font-family="Consolas,monospace" font-size="42" fill="#FDE68A">_{num:3}</text>
  <text x="602" y="594" font-family="Consolas,monospace" font-size="42" fill="#34D399">.jpg</text>

  <!-- Layer 3: 상단/하단 샘플 변환 결과 -->
  <rect x="200" y="754" width="624" height="62" rx="14" fill="#1E1038" opacity="0.8"/>
  <text x="512" y="793" text-anchor="middle" font-family="Consolas,monospace" font-size="30" fill="#94A3B8">IMG_0042.jpg  </text>
  <text x="512" y="793" text-anchor="middle" font-family="Consolas,monospace" font-size="30">
    <tspan fill="#94A3B8">IMG_0042.jpg  </tspan>
    <tspan fill="#FBBF24">→  </tspan>
    <tspan fill="#34D399">photo_0042_001.jpg</tspan>
  </text>

  <!-- 상단 설명 -->
  <text x="512" y="256" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="44" fill="white" font-weight="bold" opacity="0.9">Regex Mode</text>
  <text x="512" y="310" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="32" fill="#A78BFA" opacity="0.7">Find &amp; Replace</text>
</svg>
