<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Hot pink -->
  <rect width="1024" height="1024" rx="190" fill="#E91E63"/>

  <!-- Left half: pixel mosaic -->
  <!-- Row 1 -->
  <rect x="210" y="280" width="80" height="80" rx="4" fill="#FF5252"/>
  <rect x="300" y="280" width="80" height="80" rx="4" fill="#FF6D00"/>
  <rect x="390" y="280" width="80" height="80" rx="4" fill="#FFD600"/>
  <rect x="480" y="280" width="80" height="80" rx="4" fill="#69F0AE"/>
  <!-- Row 2 -->
  <rect x="210" y="370" width="80" height="80" rx="4" fill="#40C4FF"/>
  <rect x="300" y="370" width="80" height="80" rx="4" fill="#E040FB"/>
  <rect x="390" y="370" width="80" height="80" rx="4" fill="#FF5252"/>
  <rect x="480" y="370" width="80" height="80" rx="4" fill="#FFD600"/>
  <!-- Row 3 -->
  <rect x="210" y="460" width="80" height="80" rx="4" fill="#69F0AE"/>
  <rect x="300" y="460" width="80" height="80" rx="4" fill="#40C4FF"/>
  <rect x="390" y="460" width="80" height="80" rx="4" fill="#FF6D00"/>
  <rect x="480" y="460" width="80" height="80" rx="4" fill="#E040FB"/>
  <!-- Row 4 -->
  <rect x="210" y="550" width="80" height="80" rx="4" fill="#FFD600"/>
  <rect x="300" y="550" width="80" height="80" rx="4" fill="#FF5252"/>
  <rect x="390" y="550" width="80" height="80" rx="4" fill="#69F0AE"/>
  <rect x="480" y="550" width="80" height="80" rx="4" fill="#40C4FF"/>
  <!-- Row 5 -->
  <rect x="210" y="640" width="80" height="80" rx="4" fill="#E040FB"/>
  <rect x="300" y="640" width="80" height="80" rx="4" fill="#FF6D00"/>
  <rect x="390" y="640" width="80" height="80" rx="4" fill="#FFD600"/>
  <rect x="480" y="640" width="80" height="80" rx="4" fill="#FF5252"/>

  <!-- Center divider diagonal + arrow -->
  <line x1="570" y1="260" x2="570" y2="764" stroke="white" stroke-width="10" stroke-dasharray="none"/>
  <!-- Arrow on divider -->
  <text x="570" y="545" font-family="Arial" font-size="90" font-weight="900"
        text-anchor="middle" fill="white">→</text>

  <!-- Right half: ASCII text grid -->
  <text x="620" y="355" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white">@#$%</text>
  <text x="620" y="420" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white">#$@.</text>
  <text x="620" y="485" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white">$@#*</text>
  <text x="620" y="550" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white">@.#$</text>
  <text x="620" y="615" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white">.  ..</text>
  <text x="620" y="680" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        fill="white"> .   </text>

  <!-- Top/bottom labels -->
  <text x="380" y="245" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">PIX</text>
  <text x="726" y="245" font-family="'Courier New', monospace" font-size="80" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">TXT</text>
  <text x="512" y="820" font-family="'Courier New', monospace" font-size="70" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.65)">Char.Art</text>
</svg>
