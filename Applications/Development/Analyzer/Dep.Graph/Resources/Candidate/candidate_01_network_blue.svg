<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- edges -->
  <g stroke="#60a5fa" stroke-width="3" opacity="0.6">
    <line x1="256" y1="120" x2="130" y2="240"/>
    <line x1="256" y1="120" x2="256" y2="260"/>
    <line x1="256" y1="120" x2="382" y2="240"/>
    <line x1="130" y1="240" x2="100" y2="370"/>
    <line x1="130" y1="240" x2="200" y2="370"/>
    <line x1="256" y1="260" x2="256" y2="370"/>
    <line x1="382" y1="240" x2="340" y2="370"/>
    <line x1="382" y1="240" x2="420" y2="370"/>
  </g>
  <!-- nodes -->
  <circle cx="256" cy="120" r="32" fill="#1d4ed8" stroke="#93c5fd" stroke-width="4"/>
  <circle cx="130" cy="240" r="24" fill="#1e40af" stroke="#60a5fa" stroke-width="3"/>
  <circle cx="256" cy="260" r="24" fill="#1e40af" stroke="#60a5fa" stroke-width="3"/>
  <circle cx="382" cy="240" r="24" fill="#1e40af" stroke="#60a5fa" stroke-width="3"/>
  <circle cx="100" cy="370" r="18" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="200" cy="370" r="18" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="256" cy="370" r="18" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="340" cy="370" r="18" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="420" cy="370" r="18" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <!-- root label -->
  <text x="256" y="120" font-family="monospace" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="130" y="240" font-family="monospace" font-size="16" fill="#bfdbfe" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="256" y="260" font-family="monospace" font-size="16" fill="#bfdbfe" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="382" y="240" font-family="monospace" font-size="16" fill="#bfdbfe" text-anchor="middle" dominant-baseline="central">D</text>
</svg>
