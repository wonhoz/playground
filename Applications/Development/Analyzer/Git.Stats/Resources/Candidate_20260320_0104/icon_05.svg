<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0A00"/>
  <!-- Branch fork diagram -->
  <!-- Main trunk -->
  <line x1="512" y1="820" x2="512" y2="580" stroke="#F9A825" stroke-width="18" stroke-linecap="round"/>
  <!-- Main commits on trunk -->
  <circle cx="512" cy="820" r="26" fill="#FFD54F"/>
  <circle cx="512" cy="700" r="26" fill="#F9A825"/>
  <circle cx="512" cy="580" r="26" fill="#FFD54F"/>
  <!-- Branch left -->
  <path d="M512 580 Q400 500 320 360" stroke="#F9A825" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="420" cy="490" r="22" fill="#F9A825"/>
  <circle cx="320" cy="360" r="26" fill="#FFD54F"/>
  <!-- Branch right -->
  <path d="M512 580 Q624 500 704 360" stroke="#F9A825" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="604" cy="490" r="22" fill="#F9A825"/>
  <circle cx="704" cy="360" r="26" fill="#FFD54F"/>
  <!-- Merge point (top) -->
  <path d="M320 360 Q380 240 512 200" stroke="#FFD54F" stroke-width="12" fill="none" stroke-dasharray="16,10" stroke-linecap="round"/>
  <path d="M704 360 Q644 240 512 200" stroke="#FFD54F" stroke-width="12" fill="none" stroke-dasharray="16,10" stroke-linecap="round"/>
  <circle cx="512" cy="200" r="30" fill="#F9A825"/>
</svg>