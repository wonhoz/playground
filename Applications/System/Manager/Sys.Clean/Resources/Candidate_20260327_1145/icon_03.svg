<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#86EFAC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Trash bin -->
  <!-- Bin body -->
  <rect x="320" y="450" width="384" height="380" rx="24" fill="#15803D"/>
  <rect x="350" y="470" width="324" height="340" rx="16" fill="#16A34A"/>
  <!-- Bin lines -->
  <line x1="450" y1="490" x2="430" y2="770" stroke="#15803D" stroke-width="20" stroke-linecap="round"/>
  <line x1="512" y1="490" x2="512" y2="770" stroke="#15803D" stroke-width="20" stroke-linecap="round"/>
  <line x1="574" y1="490" x2="594" y2="770" stroke="#15803D" stroke-width="20" stroke-linecap="round"/>
  <!-- Bin lid -->
  <rect x="294" y="410" width="436" height="60" rx="12" fill="#166534"/>
  <!-- Lid handle -->
  <rect x="450" y="370" width="124" height="50" rx="14" fill="#14532D"/>
  <!-- Gear badge (auto clean) -->
  <circle cx="780" cy="380" r="120" fill="#22C55E"/>
  <circle cx="780" cy="380" r="90" fill="#16A34A"/>
  <!-- Gear teeth -->
  <rect x="760" y="250" width="40" height="50" rx="8" fill="#22C55E"/>
  <rect x="760" y="460" width="40" height="50" rx="8" fill="#22C55E"/>
  <rect x="650" y="360" width="50" height="40" rx="8" fill="#22C55E"/>
  <rect x="860" y="360" width="50" height="40" rx="8" fill="#22C55E"/>
  <circle cx="780" cy="380" r="40" fill="#22C55E"/>
  <circle cx="780" cy="380" r="24" fill="#15803D"/>
  <!-- Junk items flying in -->
  <text x="200" y="380" font-family="Arial,sans-serif" font-size="64" fill="#9CA3AF" transform="rotate(-30,220,360)">🗑</text>
  <!-- Label -->
  <text x="512" y="900" font-family="Arial,sans-serif" font-size="60" fill="#14532D" font-weight="bold" text-anchor="middle">Auto Clean</text>
</svg>
