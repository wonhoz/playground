<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 지구본 위 물음표 | 중앙심볼 | #0F3460 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F3460"/>
  <!-- Layer 2: Globe -->
  <circle cx="512" cy="520" r="300" fill="#1E4D8C" stroke="#3B82F6" stroke-width="8"/>
  <!-- Latitude lines -->
  <ellipse cx="512" cy="520" rx="300" ry="80" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.4"/>
  <ellipse cx="512" cy="440" rx="260" ry="50" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <ellipse cx="512" cy="600" rx="260" ry="50" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <!-- Longitude arc -->
  <path d="M512 220 Q620 380 512 820" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.4"/>
  <path d="M512 220 Q404 380 512 820" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.4"/>
  <!-- Equator -->
  <line x1="212" y1="520" x2="812" y2="520" stroke="#3B82F6" stroke-width="3" opacity="0.5"/>
  <!-- Continents (simplified) -->
  <ellipse cx="420" cy="440" rx="70" ry="50" fill="#16A34A" opacity="0.8"/>
  <ellipse cx="600" cy="420" rx="85" ry="60" fill="#15803D" opacity="0.7"/>
  <ellipse cx="560" cy="530" rx="60" ry="40" fill="#22C55E" opacity="0.6"/>
  <ellipse cx="380" cy="560" rx="45" ry="35" fill="#4ADE80" opacity="0.5"/>
  <!-- Layer 3: Large question mark badge -->
  <circle cx="720" cy="280" r="120" fill="#F59E0B"/>
  <text x="720" y="316" font-family="Arial,sans-serif" font-size="110" fill="#1C1100" text-anchor="middle" font-weight="bold">?</text>
</svg>
