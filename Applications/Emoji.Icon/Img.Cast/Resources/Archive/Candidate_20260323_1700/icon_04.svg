<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A0030"/>
  <!-- Layer 2: 이미지 캔버스 (큰) -->
  <rect x="80" y="130" width="660" height="500" rx="28" fill="#2D0060"/>
  <rect x="80" y="130" width="660" height="500" rx="28" fill="none" stroke="#A855F7" stroke-width="12"/>
  <!-- 산 + 태양 이미지 -->
  <circle cx="560" cy="230" r="70" fill="#FBBF24"/>
  <polygon points="140,600 280,340 380,450 500,290 620,600" fill="#7C3AED" clip-path="url(#imgc)"/>
  <clipPath id="imgc"><rect x="80" y="130" width="660" height="500" rx="28"/></clipPath>
  <!-- 포맷 드롭다운 화살표 (우측) -->
  <rect x="780" y="130" width="160" height="80" rx="16" fill="#6D28D9"/>
  <text x="860" y="185" font-size="36" fill="#EDE9FE" text-anchor="middle" font-weight="bold">ICO</text>
  <polygon points="840,220 860,250 880,220" fill="#C4B5FD"/>
  <rect x="780" y="260" width="160" height="60" rx="8" fill="#4C1D95"/>
  <text x="860" y="300" font-size="28" fill="#DDD6FE" text-anchor="middle">PNG</text>
  <rect x="780" y="332" width="160" height="60" rx="8" fill="#4C1D95"/>
  <text x="860" y="372" font-size="28" fill="#DDD6FE" text-anchor="middle">JPG</text>
  <rect x="780" y="404" width="160" height="60" rx="8" fill="#4C1D95"/>
  <text x="860" y="444" font-size="28" fill="#DDD6FE" text-anchor="middle">BMP</text>
  <!-- 변환 버튼 -->
  <rect x="80" y="680" width="860" height="120" rx="32" fill="#A855F7"/>
  <text x="512" y="758" font-size="52" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Convert</text>
  <!-- Layer 3: 아이콘 출력 미리보기 -->
  <rect x="780" y="560" width="60" height="60" rx="10" fill="#E879F9"/>
  <rect x="860" y="560" width="40" height="40" rx="6" fill="#F0ABFC" opacity="0.8"/>
  <rect x="780" y="640" width="30" height="30" rx="4" fill="#FAE8FF" opacity="0.7"/>
  <rect x="826" y="640" width="20" height="20" rx="3" fill="#F5D0FE" opacity="0.6"/>
</svg>
