      <stop offset="0%" stop-color="#FF8FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="138" width="872" height="538" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>
  <!-- Left: broken registry key -->
  <rect x="112" y="180" width="310" height="302" rx="28" fill="#FFEBEE" stroke="#D32F2F" stroke-width="14"/>
  <!-- Key icon (stylized) -->
  <circle cx="220" cy="296" r="70" fill="#FFCDD2" stroke="#D32F2F" stroke-width="14"/>
  <circle cx="220" cy="296" r="38" fill="#FFFFFF" stroke="#D32F2F" stroke-width="10"/>
  <rect x="274" y="282" width="120" height="28" rx="14" fill="#D32F2F" stroke="#B71C1C" stroke-width="10"/>
