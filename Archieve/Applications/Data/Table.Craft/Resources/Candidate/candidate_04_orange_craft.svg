<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="tool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Table surface -->
  <rect x="64" y="140" width="384" height="240" rx="16" fill="#BF360C" stroke="#FF9800" stroke-width="8"/>
  <!-- Table header -->
  <rect x="64" y="140" width="384" height="56" rx="16" fill="#FF9800" opacity="0.9"/>
  <rect x="64" y="180" width="384" height="16" fill="#FF9800" opacity="0.9"/>
  <!-- Column dividers -->
  <line x1="192" y1="196" x2="192" y2="380" stroke="#FF9800" stroke-width="6" opacity="0.7"/>
  <line x1="320" y1="196" x2="320" y2="380" stroke="#FF9800" stroke-width="6" opacity="0.7"/>
  <!-- Row dividers -->
  <line x1="64" y1="252" x2="448" y2="252" stroke="#FF9800" stroke-width="6" opacity="0.7"/>
