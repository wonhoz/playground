<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="70%" stop-color="#142440"/>
      <stop offset="100%" stop-color="#1A3A1A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="60" y="400" width="392" height="20" rx="4" fill="#2D4A1E"/>
  <!-- Buildings (auto-building) -->
  <!-- Building 1 (tall) -->
  <rect x="80" y="220" width="70" height="180" rx="4" fill="#1E3A5F"/>
  <rect x="90" y="232" width="14" height="18" rx="2" fill="#FFE066" opacity="0.9"/>
  <rect x="112" y="232" width="14" height="18" rx="2" fill="#FFE066" opacity="0.7"/>
  <rect x="90" y="262" width="14" height="18" rx="2" fill="#FFE066" opacity="0.8"/>
  <rect x="112" y="262" width="14" height="18" rx="2" fill="#FFE066" opacity="0.4"/>
  <rect x="90" y="292" width="14" height="18" rx="2" fill="#4299E1" opacity="0.6"/>
  <rect x="112" y="292" width="14" height="18" rx="2" fill="#FFE066" opacity="0.8"/>
  <rect x="90" y="322" width="14" height="18" rx="2" fill="#FFE066" opacity="0.9"/>
  <rect x="112" y="322" width="14" height="18" rx="2" fill="#4299E1" opacity="0.5"/>
  <!-- Building 2 (medium, being built - with crane) -->
  <rect x="180" y="280" width="80" height="120" rx="4" fill="#2A4A6A"/>
  <rect x="190" y="292" width="16" height="20" rx="2" fill="#FFE066" opacity="0.8"/>
  <rect x="216" y="292" width="16" height="20" rx="2" fill="#4299E1" opacity="0.5"/>
  <rect x="190" y="322" width="16" height="20" rx="2" fill="#FFE066" opacity="0.6"/>
  <!-- Crane on top of building 2 -->
  <rect x="216" y="200" width="6" height="80" rx="2" fill="#FFD700"/>
  <rect x="210" y="200" width="80" height="6" rx="2" fill="#FFD700"/>
  <line x1="216" y1="203" x2="260" y2="240" stroke="#FFD700" stroke-width="2"/>
  <!-- Hanging block -->
  <rect x="274" y="238" width="20" height="20" rx="3" fill="#E53E3E"/>
  <line x1="284" y1="206" x2="284" y2="238" stroke="#AAA" stroke-width="2"/>
  <!-- Building 3 (small, just started) -->
  <rect x="300" y="340" width="60" height="60" rx="4" fill="#1E3A5F"/>
  <rect x="312" y="352" width="12" height="14" rx="2" fill="#FFE066" opacity="0.7"/>
  <rect x="332" y="352" width="12" height="14" rx="2" fill="#FFE066" opacity="0.5"/>
  <!-- Building 4 (blueprint outline) -->
  <rect x="390" y="300" width="60" height="100" rx="4" fill="none" stroke="#4299E1" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Stars / sky -->
  <circle cx="300" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="370" cy="120" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="430" cy="80" r="2" fill="white" opacity="0.6"/>
</svg>