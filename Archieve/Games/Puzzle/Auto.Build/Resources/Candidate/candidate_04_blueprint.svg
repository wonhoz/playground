<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A3A"/>
      <stop offset="100%" stop-color="#0E2244"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <line x1="80" y1="100" x2="80" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="130" y1="100" x2="130" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="180" y1="100" x2="180" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="230" y1="100" x2="230" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="280" y1="100" x2="280" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="330" y1="100" x2="330" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="380" y1="100" x2="380" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="430" y1="100" x2="430" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="100" x2="430" y2="100" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="150" x2="430" y2="150" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="200" x2="430" y2="200" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="250" x2="430" y2="250" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="300" x2="430" y2="300" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="350" x2="430" y2="350" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="400" x2="430" y2="400" stroke="#1E3A6A" stroke-width="1"/>
  <line x1="80" y1="440" x2="430" y2="440" stroke="#1E3A6A" stroke-width="1"/>
  <!-- Building blueprint drawing -->
  <rect x="130" y="250" width="100" height="150" fill="none" stroke="#60A5FA" stroke-width="2.5"/>
  <line x1="130" y1="290" x2="230" y2="290" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="130" y1="330" x2="230" y2="330" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="180" y1="250" x2="180" y2="400" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Windows on blueprint -->
  <rect x="143" y="260" width="24" height="24" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="189" y="260" width="24" height="24" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="143" y="300" width="24" height="24" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="189" y="300" width="24" height="24" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Taller building blueprint -->
  <rect x="280" y="150" width="100" height="250" fill="none" stroke="#34D399" stroke-width="2.5"/>
  <!-- Dimension arrows -->
  <line x1="255" y1="150" x2="255" y2="400" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="240" y="280" font-family="monospace" font-size="11" fill="#FCD34D" transform="rotate(-90 240 280)">250px</text>
  <!-- Measurement lines -->
  <line x1="130" y1="420" x2="230" y2="420" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="180" y="436" font-family="monospace" font-size="11" fill="#FCD34D" text-anchor="middle">100</text>
  <!-- Title block -->
  <rect x="80" y="80" width="110" height="24" rx="4" fill="#1E3A6A"/>
  <text x="135" y="97" font-family="monospace" font-size="12" fill="#60A5FA" text-anchor="middle">AUTO.BUILD</text>
</svg>