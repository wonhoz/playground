<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e5e"/>
      <stop offset="100%" style="stop-color:#71b280"/>
    </linearGradient>
    <linearGradient id="hp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Headphone arc -->
  <path d="M130 270 C130 160 186 80 256 80 C326 80 382 160 382 270" stroke="url(#hp)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <rect x="88" y="250" width="70" height="110" rx="20" fill="url(#hp)"/>
  <rect x="100" y="262" width="46" height="86" rx="14" fill="#134e5e" opacity="0.7"/>
  <!-- Right ear cup -->
  <rect x="354" y="250" width="70" height="110" rx="20" fill="url(#hp)"/>
  <rect x="366" y="262" width="46" height="86" rx="14" fill="#134e5e" opacity="0.7"/>
  <!-- Sound waves inside cups -->
  <path d="M113 295 C128 305 128 325 113 335" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 285 C142 298 142 332 120 345" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M379 295 C394 305 394 325 379 335" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M386 285 C408 298 408 332 386 345" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Musical note in center -->
  <text x="256" y="430" font-family="serif" font-size="80" text-anchor="middle" fill="white" opacity="0.9">♪</text>
</svg>
