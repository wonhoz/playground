<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vertical timeline spine -->
  <line x1="110" y1="90" x2="110" y2="420" stroke="#2C5364" stroke-width="3"/>
  <!-- Timeline nodes -->
  <circle cx="110" cy="140" r="11" fill="#00C6FF"/>
  <circle cx="110" cy="210" r="11" fill="#56CCF2"/>
  <circle cx="110" cy="280" r="11" fill="#43E97B"/>
  <circle cx="110" cy="350" r="11" fill="#F7971E"/>
  <!-- Horizontal bars -->
  <rect x="136" y="126" width="210" height="28" rx="7" fill="#00C6FF"/>
  <rect x="136" y="196" width="150" height="28" rx="7" fill="#56CCF2"/>
  <rect x="136" y="266" width="185" height="28" rx="7" fill="#43E97B"/>
  <rect x="136" y="336" width="120" height="28" rx="7" fill="#F7971E"/>
  <!-- Time labels -->
  <text x="356" y="146" font-family="Arial" font-size="19" fill="#E0E0E0">2.1s</text>
  <text x="296" y="216" font-family="Arial" font-size="19" fill="#E0E0E0">1.4s</text>
  <text x="331" y="286" font-family="Arial" font-size="19" fill="#E0E0E0">1.8s</text>
  <text x="266" y="356" font-family="Arial" font-size="19" fill="#E0E0E0">1.1s</text>
  <!-- Power icon -->
  <circle cx="256" cy="66" r="26" fill="none" stroke="#00C6FF" stroke-width="5" stroke-dasharray="108 42"/>
  <line x1="256" y1="40" x2="256" y2="66" stroke="#00C6FF" stroke-width="5" stroke-linecap="round"/>
  <!-- Title -->
  <text x="256" y="458" font-family="Arial" font-size="26" font-weight="bold" fill="#00C6FF" text-anchor="middle">Boot.Map</text>
</svg>
