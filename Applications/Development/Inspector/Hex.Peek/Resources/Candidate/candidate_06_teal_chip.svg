<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a1a"/>
      <stop offset="100%" stop-color="#002626"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#00b3a0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- CPU chip body -->
  <rect x="136" y="136" width="240" height="240" rx="16" fill="#001f1f" stroke="#00b3a0" stroke-width="3"/>
  <!-- Chip inner grid -->
  <rect x="168" y="168" width="176" height="176" rx="8" fill="#001414" stroke="#009988" stroke-width="1.5"/>
  <!-- Circuit traces left -->
  <line x1="56" y1="176" x2="136" y2="176" stroke="#00e5cc" stroke-width="3"/>
  <line x1="56" y1="212" x2="136" y2="212" stroke="#00b3a0" stroke-width="3"/>
  <line x1="56" y1="248" x2="136" y2="248" stroke="#00e5cc" stroke-width="3"/>
  <line x1="56" y1="284" x2="136" y2="284" stroke="#00b3a0" stroke-width="3"/>
  <line x1="56" y1="320" x2="136" y2="320" stroke="#00e5cc" stroke-width="3"/>
  <!-- Circuit traces right -->
  <line x1="376" y1="176" x2="456" y2="176" stroke="#00e5cc" stroke-width="3"/>
  <line x1="376" y1="212" x2="456" y2="212" stroke="#00b3a0" stroke-width="3"/>
  <line x1="376" y1="248" x2="456" y2="248" stroke="#00e5cc" stroke-width="3"/>
  <line x1="376" y1="284" x2="456" y2="284" stroke="#00b3a0" stroke-width="3"/>
  <line x1="376" y1="320" x2="456" y2="320" stroke="#00e5cc" stroke-width="3"/>
  <!-- Circuit traces top -->
  <line x1="176" y1="56" x2="176" y2="136" stroke="#00e5cc" stroke-width="3"/>
  <line x1="216" y1="56" x2="216" y2="136" stroke="#00b3a0" stroke-width="3"/>
  <line x1="256" y1="56" x2="256" y2="136" stroke="#00e5cc" stroke-width="3"/>
  <line x1="296" y1="56" x2="296" y2="136" stroke="#00b3a0" stroke-width="3"/>
  <line x1="336" y1="56" x2="336" y2="136" stroke="#00e5cc" stroke-width="3"/>
  <!-- Circuit traces bottom -->
  <line x1="176" y1="376" x2="176" y2="456" stroke="#00e5cc" stroke-width="3"/>
  <line x1="216" y1="376" x2="216" y2="456" stroke="#00b3a0" stroke-width="3"/>
  <line x1="256" y1="376" x2="256" y2="456" stroke="#00e5cc" stroke-width="3"/>
  <line x1="296" y1="376" x2="296" y2="456" stroke="#00b3a0" stroke-width="3"/>
  <line x1="336" y1="376" x2="336" y2="456" stroke="#00e5cc" stroke-width="3"/>
  <!-- Pin dots -->
  <circle cx="56" cy="176" r="5" fill="#00e5cc"/>
  <circle cx="56" cy="212" r="5" fill="#00b3a0"/>
  <circle cx="56" cy="248" r="5" fill="#00e5cc"/>
  <circle cx="56" cy="284" r="5" fill="#00b3a0"/>
  <circle cx="56" cy="320" r="5" fill="#00e5cc"/>
  <circle cx="456" cy="176" r="5" fill="#00e5cc"/>
  <circle cx="456" cy="212" r="5" fill="#00b3a0"/>
  <circle cx="456" cy="248" r="5" fill="#00e5cc"/>
  <circle cx="456" cy="284" r="5" fill="#00b3a0"/>
  <circle cx="456" cy="320" r="5" fill="#00e5cc"/>
  <!-- Hex text in chip center -->
  <text x="178" y="235" font-family="monospace" font-size="20" font-weight="bold" fill="#00e5cc">4D 5A</text>
  <text x="178" y="260" font-family="monospace" font-size="20" font-weight="bold" fill="#00b3a0">90 FF</text>
  <text x="178" y="285" font-family="monospace" font-size="20" font-weight="bold" fill="#00e5cc">B8 E8</text>
  <!-- Notch -->
  <path d="M136 248 Q136 136 248 136" fill="none" stroke="none"/>
  <circle cx="136" cy="136" r="10" fill="#001a1a" stroke="#00e5cc" stroke-width="2"/>
</svg>
