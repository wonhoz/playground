<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#150000"/>
    </linearGradient>
    <radialGradient id="supernovaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF5F5;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#F87171;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#EF4444;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="novaGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 초신성 외곽 폭발 -->
  <circle cx="256" cy="256" r="210" fill="url(#supernovaGrad)" filter="url(#novaGlow)"/>
  <circle cx="256" cy="256" r="160" fill="#EF4444" opacity="0.08"/>
  <circle cx="256" cy="256" r="110" fill="#F87171" opacity="0.1"/>
  <!-- 폭발 스파이크들 -->
  <line x1="256" y1="256" x2="256" y2="50" stroke="#F87171" stroke-width="4" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="256" y2="462" stroke="#EF4444" stroke-width="4" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="50" y2="256" stroke="#F87171" stroke-width="4" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="462" y2="256" stroke="#EF4444" stroke-width="4" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="110" y2="110" stroke="#F87171" stroke-width="3" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="402" y2="402" stroke="#EF4444" stroke-width="3" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="402" y2="110" stroke="#F87171" stroke-width="3" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="110" y2="402" stroke="#EF4444" stroke-width="3" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 폴더 파편들 (폭발하는) -->
  <g transform="translate(156, 105) rotate(-25)">
    <polygon points="0,0 40,0 50,10 50,55 0,55" fill="#DC2626" opacity="0.8"/>
    <polygon points="0,0 30,0 30,-12 50,0" fill="#EF4444" opacity="0.7"/>
  </g>
  <g transform="translate(320, 80) rotate(15)">
    <polygon points="0,0 35,0 45,10 45,50 0,50" fill="#F87171" opacity="0.75"/>
    <polygon points="0,0 28,0 28,-10 45,0" fill="#DC2626" opacity="0.65"/>
  </g>
  <g transform="translate(80, 310) rotate(40)">
    <polygon points="0,0 32,0 40,10 40,46 0,46" fill="#EF4444" opacity="0.75"/>
    <polygon points="0,0 25,0 25,-9 40,0" fill="#F87171" opacity="0.65"/>
  </g>
  <g transform="translate(380, 360) rotate(-30)">
    <polygon points="0,0 30,0 38,9 38,44 0,44" fill="#DC2626" opacity="0.7"/>
    <polygon points="0,0 24,0 24,-9 38,0" fill="#EF4444" opacity="0.6"/>
  </g>
  <!-- 중심 코어 -->
  <circle cx="256" cy="256" r="40" fill="#EF4444" opacity="0.85" filter="url(#novaGlow)"/>
  <circle cx="256" cy="256" r="25" fill="#F87171" opacity="0.95" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="white" opacity="0.8" filter="url(#glow)"/>
  <!-- 충격파 링들 -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.2"/>
</svg>