<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#0E7490"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg10)"/>
  <!-- 2x2 Grid container -->
  <rect x="170" y="220" width="684" height="584" rx="28" fill="rgba(255,255,255,0.1)"/>
  <!-- GET badge (top-left) -->
  <rect x="196" y="246" width="306" height="258" rx="20" fill="#22C55E"/>
  <text x="349" y="365" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF">GET</text>
  <text x="349" y="458" text-anchor="middle" font-family="monospace" font-size="36" fill="rgba(255,255,255,0.7)">200 OK</text>
  <!-- POST badge (top-right) -->
  <rect x="522" y="246" width="306" height="258" rx="20" fill="#3B82F6"/>
  <text x="675" y="365" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#FFFFFF">POST</text>
  <text x="675" y="458" text-anchor="middle" font-family="monospace" font-size="36" fill="rgba(255,255,255,0.7)">201 OK</text>
  <!-- PUT badge (bottom-left) -->
  <rect x="196" y="524" width="306" height="258" rx="20" fill="#F59E0B"/>
  <text x="349" y="643" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF">PUT</text>
  <text x="349" y="736" text-anchor="middle" font-family="monospace" font-size="36" fill="rgba(255,255,255,0.7)">200 OK</text>
  <!-- DELETE badge (bottom-right) -->
  <rect x="522" y="524" width="306" height="258" rx="20" fill="#EF4444"/>
  <text x="675" y="635" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF">DELETE</text>
  <text x="675" y="736" text-anchor="middle" font-family="monospace" font-size="36" fill="rgba(255,255,255,0.7)">204 OK</text>
</svg>
