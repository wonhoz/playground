<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 거울 선 (수직 중앙) -->
  <rect x="490" y="100" width="44" height="824" rx="16" fill="#0097A7"/>
  <!-- 거울 반사 효과 -->
  <rect x="460" y="100" width="8" height="824" rx="4" fill="white" opacity="0.6"/>
  <!-- 왼쪽 파일 (원본) -->
  <rect x="140" y="220" width="300" height="400" rx="28" fill="#1565C0"/>
  <polygon points="360,220 440,220 440,300" fill="#0D47A1"/>
  <line x1="360" y1="220" x2="360" y2="300" stroke="#0D47A1" stroke-width="6"/>
  <text x="290" y="400" font-family="'Segoe UI', sans-serif" font-size="60" fill="white" text-anchor="middle">📷</text>
  <text x="290" y="480" font-family="'Consolas', monospace" font-size="36" fill="#BBDEFB" text-anchor="middle">photo.jpg</text>
  <text x="290" y="530" font-family="'Consolas', monospace" font-size="36" fill="#64B5F6" text-anchor="middle">4.2 MB</text>
  <!-- 오른쪽 파일 (복제 - 거울상) -->
  <rect x="584" y="220" width="300" height="400" rx="28" fill="#1565C0" opacity="0.7"/>
  <polygon points="824,220 744,220 744,300" fill="#0D47A1" opacity="0.7"/>
  <line x1="824" y1="220" x2="824" y2="300" stroke="#0D47A1" stroke-width="6" opacity="0.7"/>
  <text x="734" y="400" font-family="'Segoe UI', sans-serif" font-size="60" fill="white" text-anchor="middle" opacity="0.8">📷</text>
  <text x="734" y="480" font-family="'Consolas', monospace" font-size="36" fill="#BBDEFB" text-anchor="middle" opacity="0.8">photo.jpg</text>
  <text x="734" y="530" font-family="'Consolas', monospace" font-size="36" fill="#64B5F6" text-anchor="middle" opacity="0.8">4.2 MB</text>
  <!-- Layer 3: 원본/복제 레이블 -->
  <rect x="160" y="680" width="240" height="72" rx="16" fill="#00697A"/>
  <text x="280" y="728" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle">원본</text>
  <rect x="624" y="680" width="240" height="72" rx="16" fill="#BF360C"/>
  <text x="744" y="728" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle">복제</text>
  <text x="512" y="880" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#006064" text-anchor="middle">= DUPLICATE</text>
</svg>
