<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Filter funnel signal selection -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Funnel outer shape -->
  <path d="M200,300 L824,300 L620,520 L620,760 L404,760 L404,520 Z" fill="#1B5E20" opacity="0.9"/>
  <!-- Funnel highlight -->
  <path d="M200,300 L824,300 L700,420 L324,420 Z" fill="#2E7D32" opacity="0.7"/>
  <!-- Signal lines entering funnel -->
  <line x1="260" y1="220" x2="280" y2="300" stroke="#558B2F" stroke-width="10" stroke-linecap="round"/>
  <line x1="370" y1="200" x2="380" y2="300" stroke="#558B2F" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="190" x2="512" y2="300" stroke="#76FF03" stroke-width="10" stroke-linecap="round"/>
  <line x1="654" y1="200" x2="644" y2="300" stroke="#558B2F" stroke-width="10" stroke-linecap="round"/>
  <line x1="764" y1="220" x2="744" y2="300" stroke="#558B2F" stroke-width="10" stroke-linecap="round"/>
  <!-- Filtered signal exiting -->
  <line x1="512" y1="760" x2="512" y2="860" stroke="#76FF03" stroke-width="16" stroke-linecap="round"/>
  <polygon points="512,880 476,840 548,840" fill="#76FF03"/>
  <!-- Inner funnel glow -->
  <path d="M404,520 L620,520 L620,760 L404,760 Z" fill="#33691E" opacity="0.4"/>
</svg>
