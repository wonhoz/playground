<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#000A10"/>
  <!-- Pipe segments -->
  <rect x="120" y="460" width="300" height="104" rx="30" fill="#01579B"/>
  <!-- Elbow bend down -->
  <path d="M420 460 Q560 460 560 600 L560 704" stroke="#01579B" stroke-width="100" stroke-linecap="round" fill="none"/>
  <!-- Pipe segment right at bottom -->
  <rect x="560" y="650" width="344" height="104" rx="30" fill="#01579B"/>
  <!-- Signal arrow in pipe -->
  <polygon points="370,490 430,512 370,534" fill="#29B6F6"/>
  <polygon points="750,680 810,702 750,724" fill="#29B6F6"/>
  <!-- Pipe highlight -->
  <rect x="130" y="476" width="280" height="30" rx="15" fill="#29B6F6" opacity="0.3"/>
  <rect x="576" y="666" width="310" height="30" rx="15" fill="#29B6F6" opacity="0.3"/>
  <!-- Flow particles -->
  <circle cx="220" cy="512" r="14" fill="#29B6F6" opacity="0.7"/>
  <circle cx="660" cy="702" r="14" fill="#29B6F6" opacity="0.7"/>
</svg>
