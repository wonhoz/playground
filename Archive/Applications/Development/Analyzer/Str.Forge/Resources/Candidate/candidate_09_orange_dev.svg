<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0C00"/>
      <stop offset="100%" stop-color="#2A1400"/>
    </linearGradient>
    <linearGradient id="tool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFDD00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main icon: wrench + text symbol -->
  <!-- Wrench body -->
  <g transform="translate(256, 256) rotate(-45)">
    <!-- Head circle -->
    <circle cx="0" cy="-100" r="44" fill="url(#tool)" opacity="0.9"/>
    <circle cx="0" cy="-100" r="28" fill="#1A0C00"/>
    <!-- Handle -->
    <rect x="-14" y="-56" width="28" height="160" rx="8" fill="url(#tool)"/>
    <rect x="-14" y="-56" width="10" height="160" rx="4" fill="#FF9920" opacity="0.4"/>
    <!-- Tip -->
    <rect x="-12" y="100" width="24" height="20" rx="4" fill="#CC5500"/>
  </g>
  <!-- Text "<>" symbol overlay -->
  <text x="256" y="280" font-family="monospace" font-size="80" fill="#FF8C00" text-anchor="middle" font-weight="900" opacity="0.15">&lt;/&gt;</text>
  <!-- Small str label -->
  <rect x="186" y="220" width="140" height="44" rx="8" fill="#200A00" stroke="#FF8C00" stroke-width="2"/>
  <text x="256" y="248" font-family="monospace" font-size="20" fill="url(#accent)" text-anchor="middle" font-weight="bold" filter="url(#glow)">str.forge</text>
  <!-- Feature icons around -->
  <rect x="68" y="140" width="72" height="32" rx="6" fill="#2A1400" stroke="#CC5500" stroke-width="1"/>
  <text x="104" y="160" font-family="monospace" font-size="11" fill="#FF8844" text-anchor="middle">regex</text>
  <rect x="372" y="140" width="72" height="32" rx="6" fill="#2A1400" stroke="#CC5500" stroke-width="1"/>
  <text x="408" y="160" font-family="monospace" font-size="11" fill="#FF8844" text-anchor="middle">encode</text>
  <rect x="68" y="340" width="72" height="32" rx="6" fill="#2A1400" stroke="#CC5500" stroke-width="1"/>
  <text x="104" y="360" font-family="monospace" font-size="11" fill="#FF8844" text-anchor="middle">hash</text>
  <rect x="372" y="340" width="72" height="32" rx="6" fill="#2A1400" stroke="#CC5500" stroke-width="1"/>
  <text x="408" y="360" font-family="monospace" font-size="11" fill="#FF8844" text-anchor="middle">format</text>
  <!-- Connecting lines -->
  <line x1="140" y1="156" x2="186" y2="232" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <line x1="372" y1="156" x2="326" y2="232" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="356" x2="186" y2="252" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <line x1="372" y1="356" x2="326" y2="252" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="256" y="460" font-family="'Segoe UI', sans-serif" font-size="15" fill="#FF8C00" text-anchor="middle" letter-spacing="4" opacity="0.7">DEVELOPER TOOL</text>
</svg>
