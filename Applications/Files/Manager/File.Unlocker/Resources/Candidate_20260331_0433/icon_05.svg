<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 파일 아이콘 (대각선) -->
  <rect x="160" y="200" width="420" height="560" rx="32" fill="#1565C0" transform="rotate(-8 370 480)"/>
  <polygon points="500,200 560,200 560,260" fill="#0D47A1" transform="rotate(-8 370 480)"/>
  <text x="330" y="490" font-family="'Segoe UI', sans-serif" font-size="64" fill="#90CAF9" text-anchor="middle" transform="rotate(-8 330 490)">📄</text>
  <text x="330" y="570" font-family="'Segoe UI', sans-serif" font-size="52" fill="#BBDEFB" text-anchor="middle" transform="rotate(-8 330 570)">file.exe</text>
  <!-- Layer 3: 열린 자물쇠 (오른쪽 위) -->
  <!-- 자물쇠 몸통 -->
  <rect x="620" y="320" width="260" height="220" rx="24" fill="#FF6F00"/>
  <!-- 열린 고리 (위로 올라감, 오른쪽으로 기울어진) -->
  <path d="M680,320 Q680,140 780,140 Q860,140 860,240" fill="none" stroke="#FF6F00" stroke-width="44" stroke-linecap="round"/>
  <!-- 키홀 -->
  <circle cx="750" cy="420" r="36" fill="#BF360C"/>
  <rect x="736" y="448" width="28" height="56" rx="8" fill="#BF360C"/>
  <!-- 체크마크 배지 -->
  <circle cx="820" cy="640" r="120" fill="#1B5E20"/>
  <polyline points="756,640 796,680 884,600" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
