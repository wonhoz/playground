<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0A1929"/>
  <!-- Layer 2: 변환 완료 UI -->
  <!-- 상단 파일 정보 -->
  <text x="512" y="280" text-anchor="middle" font-family="Arial" font-size="64" fill="#546E7A">4 files converted</text>
  <!-- 큰 진행 바 -->
  <rect x="230" y="320" width="564" height="80" rx="40" fill="#1E3A5F" stroke="#2196F3" stroke-width="6"/>
  <!-- 진행 바 채워짐 (100%) -->
  <rect x="230" y="320" width="564" height="80" rx="40" fill="#00C853"/>
  <!-- "100%" 텍스트 -->
  <text x="512" y="377" text-anchor="middle" font-family="Arial Black" font-size="60" font-weight="900" fill="white">100%</text>
  <!-- 완료 체크 아이콘 (크게) -->
  <circle cx="512" cy="580" r="160" fill="#00C853" opacity="0.15"/>
  <circle cx="512" cy="580" r="140" fill="none" stroke="#00E676" stroke-width="16"/>
  <path d="M430,580 L490,640 L600,520" fill="none" stroke="#00E676" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 완료 텍스트 -->
  <text x="512" y="790" text-anchor="middle" font-family="Arial Black" font-size="120" font-weight="900" fill="#00E676">Done!</text>
  <!-- Layer 3: 서브 정보 -->
  <text x="512" y="880" text-anchor="middle" font-family="Arial" font-size="60" fill="#546E7A">✓ SVG → ICO</text>
</svg>