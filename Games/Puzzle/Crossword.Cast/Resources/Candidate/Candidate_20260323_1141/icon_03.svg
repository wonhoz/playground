<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 버건디 -->
  <rect width="1024" height="1024" rx="180" fill="#4A0010"/>
  <!-- Layer 2: 십자형 크로스워드 패턴 -->
  <!-- 가로 단어 영역 -->
  <rect x="120" y="380" width="784" height="264" rx="12" fill="#6A001A"/>
  <!-- 세로 단어 영역 -->
  <rect x="380" y="120" width="264" height="784" rx="12" fill="#6A001A"/>
  <!-- 교차점 강조 -->
  <rect x="380" y="380" width="264" height="264" rx="8" fill="#8A0022"/>
  <!-- 가로 단어 글자들 (PUZZLE) -->
  <text x="185" y="534" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#FFCDD2" text-anchor="middle">P</text>
  <text x="345" y="534" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#FFCDD2" text-anchor="middle">U</text>
  <text x="512" y="534" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="white" text-anchor="middle">Z</text>
  <text x="679" y="534" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#FFCDD2" text-anchor="middle">Z</text>
  <text x="840" y="534" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#FFCDD2" text-anchor="middle">L</text>
  <!-- 세로 단어 글자들 (CROSS) -->
  <text x="512" y="216" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#F48FB1" text-anchor="middle">C</text>
  <text x="512" y="370" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#F48FB1" text-anchor="middle">R</text>
  <!-- Z는 공유 -->
  <text x="512" y="680" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#F48FB1" text-anchor="middle">S</text>
  <text x="512" y="836" font-family="Arial Black,Arial" font-size="100" font-weight="900" fill="#F48FB1" text-anchor="middle">S</text>
  <!-- Layer 3: 교차점 번호 -->
  <circle cx="380" cy="380" r="20" fill="#FF4081"/>
  <text x="380" y="388" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">1</text>
</svg>
