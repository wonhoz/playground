<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="hue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="17%" stop-color="#FFFF00"/>
      <stop offset="33%" stop-color="#00FF00"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="67%" stop-color="#0000FF"/>
      <stop offset="83%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
    <linearGradient id="sat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#FF4444"/>
    </linearGradient>
    <linearGradient id="lum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Photo thumbnail at top -->
  <rect x="108" y="118" width="296" height="140" rx="10" fill="#0D2040"/>
  <!-- Simulated sky/photo -->
  <rect x="108" y="118" width="296" height="70" rx="10" fill="#1565C0" opacity="0.7"/>
  <rect x="108" y="188" width="296" height="70" rx="0" fill="#0D3060" opacity="0.5"/>
  <rect x="108" y="230" width="296" height="28" rx="10" fill="#0D3060" opacity="0.5"/>
  <!-- HSL Labels -->
  <text x="108" y="296" font-size="14" fill="#90CAF9" font-family="Arial" font-weight="bold">H</text>
  <text x="108" y="342" font-size="14" fill="#90CAF9" font-family="Arial" font-weight="bold">S</text>
  <text x="108" y="388" font-size="14" fill="#90CAF9" font-family="Arial" font-weight="bold">L</text>
  <!-- Hue slider -->
  <rect x="128" y="282" width="278" height="18" rx="9" fill="url(#hue)"/>
  <circle cx="248" cy="291" r="13" fill="white" stroke="#0D47A1" stroke-width="3"/>
  <!-- Sat slider -->
  <rect x="128" y="328" width="278" height="18" rx="9" fill="url(#sat)"/>
  <circle cx="310" cy="337" r="13" fill="white" stroke="#0D47A1" stroke-width="3"/>
  <!-- Lum slider -->
  <rect x="128" y="374" width="278" height="18" rx="9" fill="url(#lum)"/>
  <circle cx="280" cy="383" r="13" fill="white" stroke="#0D47A1" stroke-width="3"/>
</svg>
