<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | 지퍼가 열리며 파일들이 쏟아지는 — ZIP의 지퍼 이중 의미 | 대각선/동적 | 노랑+금+파랑 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#F57F17" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- Bag/fabric (ZIP container) - left half closed -->
  <path d="M100,300 L500,200 L500,850 L100,900 Z" fill="#1565C0" filter="url(#sh5)"/>
  <!-- Bag texture lines -->
  <line x1="100" y1="400" x2="500" y2="333" stroke="#90CAF9" stroke-width="6" opacity="0.3"/>
  <line x1="100" y1="500" x2="500" y2="433" stroke="#90CAF9" stroke-width="6" opacity="0.3"/>
  <line x1="100" y1="600" x2="500" y2="533" stroke="#90CAF9" stroke-width="6" opacity="0.3"/>
  <line x1="100" y1="700" x2="500" y2="633" stroke="#90CAF9" stroke-width="6" opacity="0.3"/>
  <line x1="100" y1="800" x2="500" y2="733" stroke="#90CAF9" stroke-width="6" opacity="0.3"/>

  <!-- Bag/fabric - right half open -->
  <path d="M524,200 L900,300 L900,900 L524,850 Z" fill="#0D47A1" filter="url(#sh5)" opacity="0.7"/>

  <!-- ZIP teeth: left side -->
  <rect x="490" y="220" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="490" y="260" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="490" y="300" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="490" y="340" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="490" y="380" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="490" y="420" width="24" height="20" rx="4" fill="#FFD700"/>
  <!-- ZIP teeth: right side (open gap) -->
  <rect x="514" y="500" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="540" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="580" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="620" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="660" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="700" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="740" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="780" width="24" height="20" rx="4" fill="#FFD700"/>
  <rect x="514" y="820" width="24" height="20" rx="4" fill="#FFD700"/>

  <!-- ZIP slider -->
  <rect x="464" y="435" width="100" height="54" rx="14" fill="#FFD700" filter="url(#sh5)"/>
  <rect x="476" y="447" width="76" height="30" rx="8" fill="#F9A825"/>
  <!-- Slider handle -->
  <rect x="500" y="422" width="28" height="80" rx="8" fill="#FFC107"/>

  <!-- Files spilling out from open side -->
  <!-- File 1 -->
  <rect x="560" y="220" width="140" height="180" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <polygon points="660,220 700,260 660,260" fill="#EF9A9A"/>
  <text x="630" y="330" font-family="Consolas, monospace" font-size="22" fill="white"
        text-anchor="middle">.cs</text>

  <!-- File 2 -->
  <rect x="720" y="280" width="130" height="160" rx="14" fill="#43A047" filter="url(#sh5)"/>
  <polygon points="804,280 850,320 804,320" fill="#A5D6A5"/>
  <text x="785" y="380" font-family="Arial, sans-serif" font-size="28" fill="white"
        text-anchor="middle">🖼</text>

  <!-- File 3 -->
  <rect x="600" y="420" width="130" height="160" rx="14" fill="#7B1FA2" filter="url(#sh5)"/>
  <polygon points="690,420 730,460 690,460" fill="#CE93D8"/>
  <text x="665" y="520" font-family="Arial Black, sans-serif" font-size="22" fill="white"
        text-anchor="middle">PDF</text>

  <!-- File 4 -->
  <rect x="760" y="470" width="130" height="160" rx="14" fill="#FF6F00" filter="url(#sh5)"/>
  <polygon points="850,470 890,510 850,510" fill="#FFCCBC"/>
  <text x="825" y="570" font-family="Arial, sans-serif" font-size="28" fill="white"
        text-anchor="middle">📄</text>

  <!-- ZIP count label -->
  <rect x="100" y="800" width="380" height="60" rx="20" fill="white" filter="url(#sh5)" opacity="0.9"/>
  <text x="290" y="830" font-family="Arial Black, sans-serif" font-size="24" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">127 files inside</text>
</svg>
