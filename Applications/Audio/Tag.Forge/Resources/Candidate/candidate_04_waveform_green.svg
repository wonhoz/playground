  <!-- Tag overlay -->
  <rect x="135" y="370" width="242" height="70" rx="12" fill="#021A0A" opacity="0.9" stroke="#00C853" stroke-width="2"/>
  <!-- ID3 fields -->
  <text x="155" y="392" font-family="monospace" font-size="12" fill="#69F0AE" opacity="0.8">Title:</text>
  <rect x="198" y="382" width="155" height="8" rx="4" fill="#00C853" opacity="0.5"/>
  <text x="155" y="410" font-family="monospace" font-size="12" fill="#69F0AE" opacity="0.8">Artist:</text>
  <rect x="200" y="400" width="120" height="8" rx="4" fill="#00C853" opacity="0.5"/>
  <!-- Edit cursor blink -->
  <rect x="323" y="382" width="3" height="12" fill="#69F0AE" opacity="0.9"/>
  <!-- Pen icon top right -->
  <g transform="translate(390,130) rotate(45)">
    <rect x="-6" y="-35" width="12" height="50" rx="4" fill="#69F0AE"/>
    <polygon points="-6,15 6,15 0,28" fill="#00C853"/>
    <rect x="-6" y="-45" width="12" height="12" rx="2" fill="#A5D6A7"/>
  </g>
