<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2447"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="qr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- QR corner markers -->
  <rect x="100" y="100" width="130" height="130" rx="12" fill="none" stroke="url(#qr)" stroke-width="20"/>
  <rect x="120" y="120" width="90" height="90" rx="6" fill="url(#qr)" opacity="0.9"/>
  <rect x="282" y="100" width="130" height="130" rx="12" fill="none" stroke="url(#qr)" stroke-width="20"/>
  <rect x="302" y="120" width="90" height="90" rx="6" fill="url(#qr)" opacity="0.9"/>
  <rect x="100" y="282" width="130" height="130" rx="12" fill="none" stroke="url(#qr)" stroke-width="20"/>
  <rect x="120" y="302" width="90" height="90" rx="6" fill="url(#qr)" opacity="0.9"/>
  <!-- QR data dots -->
  <rect x="282" y="282" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="318" y="282" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="354" y="282" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="282" y="318" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="354" y="318" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="318" y="354" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="390" y="282" width="24" height="24" rx="4" fill="url(#qr)"/>
  <rect x="390" y="354" width="24" height="24" rx="4" fill="url(#qr)"/>
  <!-- Scan line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#64B5F6" stroke-width="4" stroke-dasharray="12,8" opacity="0.6"/>
</svg>
