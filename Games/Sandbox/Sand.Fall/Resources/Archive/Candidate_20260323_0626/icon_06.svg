  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A1408"/>
  <rect width="1024" height="1024" rx="160" fill="url(#sandGlow6)"/>
  <!-- Layer 2: Hourglass structure -->
  <!-- Hourglass frame (outer) -->
  <path d="M 300 200 L 724 200 L 724 230 L 560 490 L 724 750 L 724 780 L 300 780 L 300 750 L 464 490 L 300 230 Z" fill="#2A2010" stroke="#6A5020" stroke-width="6" stroke-linejoin="round"/>
  <!-- Top cap -->
