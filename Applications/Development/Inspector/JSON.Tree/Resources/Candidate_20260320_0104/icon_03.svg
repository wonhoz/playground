<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Vertical spine -->
  <line x1="340" y1="200" x2="340" y2="824" stroke="#E65100" stroke-width="28" stroke-linecap="round"/>
  <!-- Horizontal connectors -->
  <line x1="340" y1="300" x2="500" y2="300" stroke="#E65100" stroke-width="20" stroke-linecap="round"/>
  <line x1="340" y1="450" x2="500" y2="450" stroke="#E65100" stroke-width="20" stroke-linecap="round"/>
  <line x1="340" y1="600" x2="500" y2="600" stroke="#E65100" stroke-width="20" stroke-linecap="round"/>
  <line x1="340" y1="750" x2="500" y2="750" stroke="#E65100" stroke-width="20" stroke-linecap="round"/>
  <!-- Collapse arrow (down pointing triangle at top) -->
  <polygon points="512,260 580,340 444,340" fill="#FF8A65"/>
  <!-- Expand arrow (right pointing triangle) at a node -->
  <polygon points="508,410 508,490 576,450" fill="#FF8A65"/>
  <!-- Child items (indented lines) -->
  <line x1="500" y1="450" x2="500" y2="600" stroke="#E65100" stroke-width="16" stroke-linecap="round"/>
  <line x1="500" y1="510" x2="640" y2="510" stroke="#FF8A65" stroke-width="14" stroke-linecap="round"/>
  <line x1="500" y1="560" x2="640" y2="560" stroke="#FF8A65" stroke-width="14" stroke-linecap="round"/>
  <!-- Dots at nodes -->
  <circle cx="500" cy="300" r="18" fill="#FF8A65"/>
  <circle cx="500" cy="600" r="18" fill="#FF8A65"/>
  <circle cx="500" cy="750" r="18" fill="#FF8A65"/>
</svg>