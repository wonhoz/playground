<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | # 해시 심볼 + 체크마크 | 중앙 심볼 | 라임+파랑+초록 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#C5E1A5"/>
    </linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#33691E" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: Large # (hash symbol) -->
  <!-- Horizontal bars -->
  <rect x="180" y="380" width="664" height="70" rx="35" fill="#1565C0" filter="url(#sh6)"/>
  <rect x="180" y="574" width="664" height="70" rx="35" fill="#1565C0" filter="url(#sh6)"/>
  <!-- Vertical bars (diagonal/tilted) -->
  <rect x="340" y="200" width="70" height="624" rx="35" fill="#1565C0" filter="url(#sh6)"
        transform="rotate(-10, 375, 512)"/>
  <rect x="614" y="200" width="70" height="624" rx="35" fill="#1565C0" filter="url(#sh6)"
        transform="rotate(-10, 649, 512)"/>

  <!-- Layer 3: Large checkmark overlay (bottom-right) -->
  <circle cx="760" cy="760" r="180" fill="#43A047" filter="url(#sh6)"/>
  <!-- Checkmark path -->
  <polyline points="650,770 730,850 880,660" fill="none" stroke="white" stroke-width="52"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- SHA256 label badge -->
  <rect x="120" y="120" width="270" height="80" rx="24" fill="#1565C0" filter="url(#sh6)"/>
  <text x="255" y="160" font-family="Arial Black, sans-serif" font-size="42" fill="white"
        text-anchor="middle" dominant-baseline="middle">SHA256</text>
</svg>
