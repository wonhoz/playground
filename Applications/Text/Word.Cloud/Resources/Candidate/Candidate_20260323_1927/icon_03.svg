<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <radialGradient id="explosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- Explosion glow from center -->
  <circle cx="512" cy="512" r="300" fill="url(#explosion)"/>
  <!-- Words radiating outward from center -->
  <!-- Center -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="#FFFFFF">Word</text>
  <!-- Up -->
  <text x="512" y="310" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="58" font-weight="700" fill="#FEF3C7">cloud</text>
  <!-- Up-right -->
  <text x="680" y="360" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="700" fill="#FDE68A">text</text>
  <!-- Right -->
  <text x="760" y="512" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="54" font-weight="700" fill="#FEF3C7">data</text>
  <!-- Down-right -->
  <text x="680" y="666" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#FBBF24">freq</text>
  <!-- Down -->
  <text x="512" y="718" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="700" fill="#FEF3C7">font</text>
  <!-- Down-left -->
  <text x="338" y="666" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#FDE68A">color</text>
  <!-- Left -->
  <text x="256" y="512" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="700" fill="#FEF3C7">art</text>
  <!-- Up-left -->
  <text x="338" y="360" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="44" font-weight="700" fill="#FBBF24">viz</text>
</svg>
