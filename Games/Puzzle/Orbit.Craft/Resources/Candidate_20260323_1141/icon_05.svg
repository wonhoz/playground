<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 미드나잇 블루 -->
  <rect width="1024" height="1024" rx="180" fill="#020A28"/>
  <!-- 별들 -->
  <circle cx="200" cy="250" r="2" fill="white" opacity="0.7"/>
  <circle cx="750" cy="200" r="3" fill="white" opacity="0.6"/>
  <circle cx="880" cy="400" r="2" fill="white" opacity="0.5"/>
  <circle cx="160" cy="700" r="2" fill="white" opacity="0.6"/>
  <circle cx="900" cy="800" r="3" fill="white" opacity="0.7"/>
  <!-- Layer 2: 위성 발사 장면 -->
  <!-- 지구 (좌하) -->
  <circle cx="240" cy="760" r="180" fill="#1565C0"/>
  <ellipse cx="240" cy="760" rx="90" ry="180" fill="none" stroke="#1976D2" stroke-width="3" opacity="0.5"/>
  <!-- 대륙들 -->
  <ellipse cx="200" cy="700" rx="50" ry="40" fill="#2E7D32" opacity="0.8"/>
  <ellipse cx="280" cy="800" rx="40" ry="30" fill="#388E3C" opacity="0.7"/>
  <!-- 발사 경로 (곡선) -->
  <path d="M320,600 Q500,200 840,280" stroke="#FF6D00" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M320,600 Q500,200 840,280" stroke="#FF6D00" stroke-width="32" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- 궤도 (목적지) -->
  <circle cx="840" cy="280" r="120" fill="none" stroke="#42A5F5" stroke-width="5" stroke-dasharray="15,10" opacity="0.7"/>
  <!-- 위성 -->
  <rect x="305" y="575" width="40" height="24" rx="6" fill="#90CAF9"/>
  <rect x="273" y="583" width="32" height="8" rx="4" fill="#FFD740"/>
  <rect x="345" y="583" width="32" height="8" rx="4" fill="#FFD740"/>
  <!-- 목적지 행성 -->
  <circle cx="840" cy="280" r="40" fill="#AB47BC"/>
  <!-- Layer 3: 타이틀 -->
  <text x="600" y="840" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#42A5F5" text-anchor="middle">ORBIT</text>
  <text x="600" y="920" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#FF6D00" text-anchor="middle">CRAFT</text>
</svg>
