<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: metaphor · 기하학 추상 · 사진 프레임이 다른 확장자로 "플래시 변환" -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFEBEE"/>
  <!-- 4개 사분면 = 4개 포맷 -->
  <g>
    <!-- 좌상 PNG -->
    <rect x="120" y="120" width="380" height="380" rx="36" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
    <rect x="160" y="160" width="300" height="200" rx="12" fill="#FCE4EC"/>
    <circle cx="230" cy="230" r="28" fill="#FFD93D"/>
    <path d="M 170 340 Q 240 270 310 310 Q 370 270 450 330 L 450 354 L 170 354 Z" fill="#66BB6A"/>
    <text x="310" y="460" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" text-anchor="middle">PNG</text>
  </g>
  <g>
    <!-- 우상 JPG -->
    <rect x="524" y="120" width="380" height="380" rx="36" fill="#FFD93D" stroke="#B88A00" stroke-width="14"/>
    <rect x="564" y="160" width="300" height="200" rx="12" fill="#FFFBEA"/>
    <circle cx="634" cy="230" r="28" fill="#FF6B35"/>
    <path d="M 574 340 Q 644 270 714 310 Q 774 270 854 330 L 854 354 L 574 354 Z" fill="#8B4513"/>
    <text x="714" y="460" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#5C4000" text-anchor="middle">JPG</text>
  </g>
  <g>
    <!-- 좌하 ICO -->
    <rect x="120" y="524" width="380" height="380" rx="36" fill="#06D6A0" stroke="#056B4F" stroke-width="14"/>
    <rect x="160" y="564" width="300" height="200" rx="12" fill="#E8F5E9"/>
    <rect x="200" y="600" width="80" height="80" fill="#06D6A0"/>
    <rect x="290" y="600" width="80" height="80" fill="#4CAF50"/>
    <rect x="200" y="690" width="80" height="80" fill="#2E7D32"/>
    <rect x="290" y="690" width="80" height="80" fill="#1B5E20"/>
    <text x="310" y="864" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" text-anchor="middle">ICO</text>
  </g>
  <g>
    <!-- 우하 WEBP -->
    <rect x="524" y="524" width="380" height="380" rx="36" fill="#3A86FF" stroke="#1A5CC9" stroke-width="14"/>
    <rect x="564" y="564" width="300" height="200" rx="12" fill="#E3F2FD"/>
    <circle cx="714" cy="660" r="58" fill="#FFD93D" stroke="#FF9500" stroke-width="8"/>
    <text x="714" y="864" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">WEBP</text>
  </g>
  <!-- 중앙 교환 심볼 -->
  <circle cx="512" cy="512" r="90" fill="#FFFFFF" stroke="#2C3E50" stroke-width="16"/>
  <g stroke="#9C27B0" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M 470 480 L 560 480"/>
    <path d="M 560 480 L 540 460"/>
    <path d="M 560 480 L 540 500"/>
    <path d="M 560 544 L 470 544"/>
    <path d="M 470 544 L 490 524"/>
    <path d="M 470 544 L 490 564"/>
  </g>
</svg>
