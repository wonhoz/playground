<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020f05"/>
      <stop offset="50%" stop-color="#041208"/>
      <stop offset="100%" stop-color="#070f07"/>
    </linearGradient>
    <linearGradient id="strand08a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39D353"/>
      <stop offset="50%" stop-color="#2EA043"/>
      <stop offset="100%" stop-color="#39D353"/>
    </linearGradient>
    <linearGradient id="strand08b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#E85A2A"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="rung08" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#39D353"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow08b">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="commitGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg08)"/>

  <!-- 배경 격자 (희미한) -->
  <line x1="0" y1="64" x2="512" y2="64" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="128" x2="512" y2="128" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="192" x2="512" y2="192" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="320" x2="512" y2="320" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="448" x2="512" y2="448" stroke="#39D353" stroke-width="0.5" opacity="0.1"/>

  <!-- DNA 나선 - 왼쪽 가닥 (초록) -->
  <!-- 사인파 형태의 초록 가닥 -->
  <path d="M256,20
           C220,35 180,55 180,80
           C180,105 220,125 256,140
           C292,155 332,175 332,200
           C332,225 292,245 256,260
           C220,275 180,295 180,320
           C180,345 220,365 256,380
           C292,395 332,415 332,440
           C332,465 292,485 256,500"
        fill="none" stroke="url(#strand08a)" stroke-width="5" stroke-linecap="round" filter="url(#glow08)" opacity="0.9"/>
  <path d="M256,20
           C220,35 180,55 180,80
           C180,105 220,125 256,140
           C292,155 332,175 332,200
           C332,225 292,245 256,260
           C220,275 180,295 180,320
           C180,345 220,365 256,380
           C292,395 332,415 332,440
           C332,465 292,485 256,500"
        fill="none" stroke="#39D353" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- DNA 나선 - 오른쪽 가닥 (오렌지) -->
  <path d="M256,20
           C292,35 332,55 332,80
           C332,105 292,125 256,140
           C220,155 180,175 180,200
           C180,225 220,245 256,260
           C292,275 332,295 332,320
           C332,345 292,365 256,380
           C220,395 180,415 180,440
           C180,465 220,485 256,500"
        fill="none" stroke="url(#strand08b)" stroke-width="5" stroke-linecap="round" filter="url(#glow08)" opacity="0.9"/>
  <path d="M256,20
           C292,35 332,55 332,80
           C332,105 292,125 256,140
           C220,155 180,175 180,200
           C180,225 220,245 256,260
           C292,275 332,295 332,320
           C332,345 292,365 256,380
           C220,395 180,415 180,440
           C180,465 220,485 256,500"
        fill="none" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 가로 연결 (커밋 연결선 - rung) -->
  <!-- 주기: 40px 간격 -->
  <line x1="180" y1="80" x2="332" y2="80" stroke="url(#rung08)" stroke-width="3" opacity="0.8" filter="url(#glow08)"/>
  <line x1="332" y1="120" x2="180" y2="120" stroke="url(#rung08)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="140" x2="256" y2="140" stroke="#FFFFFF" stroke-width="4" opacity="0"/>
  <line x1="180" y1="160" x2="332" y2="160" stroke="url(#rung08)" stroke-width="3" opacity="0.8" filter="url(#glow08)"/>
  <line x1="332" y1="200" x2="180" y2="200" stroke="url(#rung08)" stroke-width="2.5" opacity="0.7"/>
  <line x1="180" y1="240" x2="332" y2="240" stroke="url(#rung08)" stroke-width="3" opacity="0.8" filter="url(#glow08)"/>
  <line x1="332" y1="280" x2="180" y2="280" stroke="url(#rung08)" stroke-width="2.5" opacity="0.7"/>
  <line x1="180" y1="320" x2="332" y2="320" stroke="url(#rung08)" stroke-width="3" opacity="0.8" filter="url(#glow08)"/>
  <line x1="332" y1="360" x2="180" y2="360" stroke="url(#rung08)" stroke-width="2.5" opacity="0.7"/>
  <line x1="180" y1="400" x2="332" y2="400" stroke="url(#rung08)" stroke-width="3" opacity="0.8" filter="url(#glow08)"/>
  <line x1="332" y1="440" x2="180" y2="440" stroke="url(#rung08)" stroke-width="2.5" opacity="0.7"/>

  <!-- 커밋 노드들 (가닥 교차점) -->
  <!-- 초록 가닥 위 커밋 (좌측 극점) -->
  <circle cx="180" cy="80" r="8" fill="#39D353" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="180" cy="80" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="180" cy="200" r="8" fill="#39D353" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="180" cy="200" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="180" cy="320" r="8" fill="#39D353" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="180" cy="320" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="180" cy="440" r="8" fill="#39D353" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="180" cy="440" r="4" fill="#FFFFFF" opacity="0.8"/>

  <!-- 오렌지 가닥 위 커밋 (우측 극점) -->
  <circle cx="332" cy="80" r="8" fill="#FF6B35" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="332" cy="80" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="332" cy="200" r="8" fill="#FF6B35" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="332" cy="200" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="332" cy="320" r="8" fill="#FF6B35" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="332" cy="320" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="332" cy="440" r="8" fill="#FF6B35" filter="url(#commitGlow)" opacity="0.95"/>
  <circle cx="332" cy="440" r="4" fill="#FFFFFF" opacity="0.8"/>

  <!-- 교차점 노드 (두 가닥이 만나는 지점) -->
  <circle cx="256" cy="140" r="10" fill="#070f07" stroke="#FFFFFF" stroke-width="2" filter="url(#glow08b)"/>
  <circle cx="256" cy="140" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="256" cy="260" r="12" fill="#070f07" stroke="#FFD700" stroke-width="2.5" filter="url(#glow08b)"/>
  <circle cx="256" cy="260" r="6" fill="#FFD700" opacity="0.9" filter="url(#glow08)"/>
  <circle cx="256" cy="380" r="10" fill="#070f07" stroke="#FFFFFF" stroke-width="2" filter="url(#glow08b)"/>
  <circle cx="256" cy="380" r="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- 중간 작은 노드들 (rung 위) -->
  <circle cx="256" cy="80" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="160" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="200" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="240" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="280" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="320" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="360" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="400" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="440" r="4" fill="#FFFFFF" opacity="0.6"/>

  <!-- 측면 장식 (타임라인 눈금) -->
  <line x1="80" y1="80" x2="100" y2="80" stroke="#39D353" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="140" x2="100" y2="140" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="200" x2="100" y2="200" stroke="#39D353" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="260" x2="100" y2="260" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="320" x2="100" y2="320" stroke="#39D353" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="380" x2="100" y2="380" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="440" x2="100" y2="440" stroke="#39D353" stroke-width="1.5" opacity="0.5"/>

  <line x1="412" y1="80" x2="432" y2="80" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <line x1="412" y1="140" x2="432" y2="140" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="412" y1="200" x2="432" y2="200" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <line x1="412" y1="260" x2="432" y2="260" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  <line x1="412" y1="320" x2="432" y2="320" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <line x1="412" y1="380" x2="432" y2="380" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="412" y1="440" x2="432" y2="440" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>

  <!-- 상단/하단 페이드 -->
  <rect x="0" y="0" width="512" height="25" fill="url(#bg08)" opacity="0.8"/>
  <rect x="0" y="490" width="512" height="22" fill="url(#bg08)" opacity="0.8"/>
</svg>
