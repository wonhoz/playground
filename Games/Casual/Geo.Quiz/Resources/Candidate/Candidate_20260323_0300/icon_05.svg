<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 퀴즈 문제+선택지 UI | 공간/장면 | #1A1A2E -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A1A2E"/>
  <!-- Layer 2: Quiz question panel -->
  <rect x="120" y="200" width="784" height="580" rx="20" fill="#16213E"/>
  <!-- Progress bar -->
  <rect x="120" y="200" width="784" height="12" rx="10" fill="#0F3460"/>
  <rect x="120" y="200" width="350" height="12" rx="10" fill="#E94560"/>
  <!-- Question counter -->
  <text x="892" y="228" font-family="Arial,sans-serif" font-size="20" fill="#E94560" text-anchor="end">5/10</text>
  <!-- Question flag display -->
  <rect x="180" y="240" width="664" height="200" rx="16" fill="#0F3460"/>
  <text x="512" y="290" font-family="Arial,sans-serif" font-size="20" fill="#A3B1CC" text-anchor="middle">다음 국기는 어느 나라의 것인가요?</text>
  <!-- Flag emoji (large) -->
  <text x="512" y="400" font-family="Segoe UI Emoji,sans-serif" font-size="100" text-anchor="middle">🇩🇪</text>
  <!-- Layer 3: Answer choices (2x2 grid) -->
  <!-- Choice A -->
  <rect x="150" y="470" width="330" height="80" rx="14" fill="#0F3460" stroke="#1E3A8A" stroke-width="2"/>
  <text x="185" y="510" font-family="Arial,sans-serif" font-size="18" fill="#60A5FA" font-weight="bold">A</text>
  <text x="220" y="510" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8"> 오스트리아</text>
  <text x="460" y="517" font-family="Arial,sans-serif" font-size="24" text-anchor="middle">🇦🇹</text>
  <!-- Choice B (correct, highlighted) -->
  <rect x="544" y="470" width="330" height="80" rx="14" fill="#14532D" stroke="#22C55E" stroke-width="3"/>
  <text x="579" y="510" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" font-weight="bold">B</text>
  <text x="614" y="510" font-family="Arial,sans-serif" font-size="18" fill="#86EFAC"> 독일 ✓</text>
  <text x="854" y="517" font-family="Arial,sans-serif" font-size="24" text-anchor="middle">🇩🇪</text>
  <!-- Choice C -->
  <rect x="150" y="568" width="330" height="80" rx="14" fill="#0F3460" stroke="#1E3A8A" stroke-width="2"/>
  <text x="185" y="608" font-family="Arial,sans-serif" font-size="18" fill="#60A5FA" font-weight="bold">C</text>
  <text x="220" y="608" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8"> 스위스</text>
  <text x="460" y="615" font-family="Arial,sans-serif" font-size="24" text-anchor="middle">🇨🇭</text>
  <!-- Choice D -->
  <rect x="544" y="568" width="330" height="80" rx="14" fill="#0F3460" stroke="#1E3A8A" stroke-width="2"/>
  <text x="579" y="608" font-family="Arial,sans-serif" font-size="18" fill="#60A5FA" font-weight="bold">D</text>
  <text x="614" y="608" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8"> 벨기에</text>
  <text x="854" y="615" font-family="Arial,sans-serif" font-size="24" text-anchor="middle">🇧🇪</text>
  <!-- Timer bar -->
  <rect x="150" y="680" width="724" height="18" rx="9" fill="#0F3460"/>
  <rect x="150" y="680" width="400" height="18" rx="9" fill="#E94560"/>
</svg>
