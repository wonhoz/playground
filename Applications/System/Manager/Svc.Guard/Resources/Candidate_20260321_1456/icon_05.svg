<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background – dark green gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <g clip-path="url(#clip05)">
    <!-- Layer 2: Game controller (simplified) -->
    <!-- Controller body -->
    <path d="M240,400 Q240,280 400,280 L624,280 Q784,280 784,400 L784,560 Q784,700 624,700 L400,700 Q240,700 240,560 Z" fill="#065F46"/>
    <!-- Left grip -->
    <ellipse cx="300" cy="620" rx="90" ry="120" fill="#065F46"/>
    <!-- Right grip -->
    <ellipse cx="724" cy="620" rx="90" ry="120" fill="#065F46"/>

    <!-- D-pad (left) -->
    <rect x="320" y="430" width="40" height="120" rx="10" fill="#FFFFFF" opacity="0.8"/>
    <rect x="280" y="470" width="120" height="40" rx="10" fill="#FFFFFF" opacity="0.8"/>

    <!-- Buttons (right) - A,B,X,Y -->
    <circle cx="680" cy="450" r="22" fill="#22C55E"/>
    <circle cx="640" cy="490" r="22" fill="#3B82F6"/>
    <circle cx="720" cy="490" r="22" fill="#F97316"/>
    <circle cx="680" cy="530" r="22" fill="#EF4444"/>

    <!-- Layer 3: Lightning bolt (GAMING preset activation) -->
    <path d="M500,160 L430,460 L500,460 L430,860 L610,420 L530,420 L590,160 Z" fill="#F97316"/>
    <!-- Glow around lightning -->
    <path d="M500,160 L430,460 L500,460 L430,860 L610,420 L530,420 L590,160 Z" fill="none" stroke="#FBBF24" stroke-width="12" opacity="0.5"/>

    <!-- GAMING text -->
    <text x="512" y="930" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" opacity="0.9">GAMING</text>

    <!-- Sparkle effects -->
    <circle cx="200" cy="260" r="10" fill="#F97316" opacity="0.7"/>
    <circle cx="840" cy="280" r="8" fill="#FBBF24" opacity="0.6"/>
    <circle cx="180" cy="700" r="7" fill="#22C55E" opacity="0.5"/>
    <circle cx="860" cy="700" r="9" fill="#22C55E" opacity="0.5"/>
  </g>
</svg>
