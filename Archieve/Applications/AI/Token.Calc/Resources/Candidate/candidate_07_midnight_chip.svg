  <rect x="176" y="360" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="216" y="360" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="256" y="360" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
  <rect x="296" y="360" width="8" height="40" rx="4" fill="url(#circuit)" opacity="0.7"/>
