<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#BBDEFB"/>
  <!-- App bar -->
  <rect x="130" y="180" width="764" height="64" rx="12" fill="#1565C0"/>
  <text x="512" y="222" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Mark.View</text>
  <!-- Left panel: editor -->
  <rect x="130" y="256" width="370" height="600" rx="8" fill="#1E2D40"/>
  <text x="160" y="310" font-family="Consolas,monospace" font-size="28" fill="#66BB6A"># Hello</text>
  <text x="160" y="360" font-family="Consolas,monospace" font-size="24" fill="#66BB6A">**world**</text>
  <rect x="160" y="390" width="300" height="12" rx="6" fill="#37474F"/>
  <rect x="160" y="414" width="260" height="12" rx="6" fill="#37474F"/>
  <!-- Divider -->
  <rect x="492" y="256" width="10" height="600" rx="5" fill="#90CAF9"/>
  <!-- Right panel: preview -->
  <rect x="506" y="256" width="388" height="600" rx="8" fill="white"/>
  <text x="536" y="310" font-family="Arial" font-size="36" font-weight="bold" fill="#1565C0">Hello</text>
  <rect x="536" y="326" width="320" height="3" fill="#1565C0" opacity="0.3"/>
  <text x="536" y="374" font-family="Arial" font-size="28" font-weight="bold" fill="#333">world</text>
  <rect x="536" y="400" width="300" height="14" rx="7" fill="#BBDEFB"/>
  <rect x="536" y="424" width="260" height="14" rx="7" fill="#BBDEFB" opacity="0.7"/>
</svg>