<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e96c1f"/>
      <stop offset="100%" style="stop-color:#6b37ba"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Microphone -->
  <rect x="210" y="80" width="92" height="150" rx="46" fill="url(#mic)"/>
  <!-- Mic arc stand -->
  <path d="M155 245 C155 310 200 350 256 350 C312 350 357 310 357 245" stroke="url(#mic)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="256" y2="400" stroke="url(#mic)" stroke-width="12" stroke-linecap="round"/>
  <line x1="200" y1="400" x2="312" y2="400" stroke="url(#mic)" stroke-width="12" stroke-linecap="round"/>
  <!-- Mic lines -->
  <line x1="230" y1="130" x2="282" y2="130" stroke="#e96c1f" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="155" x2="282" y2="155" stroke="#e96c1f" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="180" x2="282" y2="180" stroke="#e96c1f" stroke-width="6" stroke-linecap="round"/>
  <!-- Text flowing in -->
  <rect x="50" y="200" width="100" height="14" rx="7" fill="white" opacity="0.8"/>
  <rect x="50" y="224" width="80" height="14" rx="7" fill="white" opacity="0.6"/>
  <rect x="50" y="248" width="110" height="14" rx="7" fill="white" opacity="0.4"/>
  <!-- Arrow to mic -->
  <path d="M152 230 L180 230" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <polygon points="175,218 195,230 175,242" fill="white" opacity="0.8"/>
</svg>
