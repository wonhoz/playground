<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 책 + 책갈피 — 즐겨찾기 프롬프트 컬렉션 | 레이어드 | #FFF8E7 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF8E7"/>
  <!-- Layer 2: Stack of books -->
  <!-- Book 3 (bottom) -->
  <rect x="240" y="640" width="544" height="80" rx="10" fill="#7C3AED" stroke="#5B21B6" stroke-width="3"/>
  <rect x="240" y="640" width="30" height="80" rx="6" fill="#6D28D9"/>
  <text x="390" y="690" font-family="Arial,sans-serif" font-size="20" fill="#DDD6FE" font-weight="bold">AI Prompts Vol.3</text>
  <!-- Book 2 -->
  <rect x="256" y="540" width="512" height="80" rx="10" fill="#B45309" stroke="#92400E" stroke-width="3"/>
  <rect x="256" y="540" width="30" height="80" rx="6" fill="#A16207"/>
  <text x="400" y="590" font-family="Arial,sans-serif" font-size="20" fill="#FEF3C7" font-weight="bold">AI Prompts Vol.2</text>
  <!-- Book 1 (main, open) -->
  <rect x="272" y="320" width="480" height="200" rx="12" fill="#1E3A5F" stroke="#1D4ED8" stroke-width="4"/>
  <rect x="272" y="320" width="34" height="200" rx="8" fill="#1D4ED8"/>
  <!-- Page content -->
  <text x="340" y="380" font-family="monospace" font-size="16" fill="#93C5FD">role: 마케터</text>
  <text x="340" y="406" font-family="monospace" font-size="16" fill="#93C5FD">task: 제품 소개</text>
  <text x="340" y="432" font-family="monospace" font-size="16" fill="#60A5FA">tone: 친근하게</text>
  <text x="340" y="460" font-family="monospace" font-size="16" fill="#60A5FA">lang: 한국어</text>
  <!-- Bookmark ribbons -->
  <polygon points="660,318 690,318 690,420 675,400 660,420" fill="#EF4444"/>
  <polygon points="700,318 726,318 726,400 713,382 700,400" fill="#FCD34D"/>
  <!-- Layer 3: Reading hand indicator -->
  <text x="512" y="820" font-family="Arial,sans-serif" font-size="22" fill="#92400E" text-anchor="middle" opacity="0.7">프롬프트 컬렉션</text>
</svg>
