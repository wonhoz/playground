<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D47A1"/>
  <!-- Layer 2: Bar chart with folders -->
  <!-- Bar 1 (small, blue) -->
  <rect x="180" y="520" width="160" height="260" rx="12" fill="#42A5F5"/>
  <!-- Bar 2 (medium, green) -->
  <rect x="380" y="400" width="160" height="380" rx="12" fill="#66BB6A"/>
  <!-- Bar 3 (large, red = delete target) -->
  <rect x="580" y="260" width="160" height="520" rx="12" fill="#EF5350"/>
  <!-- Layer 3: Folder icons on top of bars -->
  <!-- Folder on bar 1 -->
  <rect x="195" y="480" width="70" height="28" rx="8" fill="white"/>
  <rect x="185" y="502" width="100" height="70" rx="8" fill="white"/>
  <!-- Folder on bar 2 -->
  <rect x="395" y="360" width="70" height="28" rx="8" fill="white"/>
  <rect x="385" y="382" width="100" height="70" rx="8" fill="white"/>
  <!-- Folder on bar 3 + X (delete) -->
  <rect x="595" y="220" width="70" height="28" rx="8" fill="white"/>
  <rect x="585" y="242" width="100" height="70" rx="8" fill="white"/>
  <line x1="595" y1="252" x2="675" y2="302" stroke="#EF5350" stroke-width="12" stroke-linecap="round"/>
  <line x1="675" y1="252" x2="595" y2="302" stroke="#EF5350" stroke-width="12" stroke-linecap="round"/>
  <!-- X axis -->
  <rect x="140" y="790" width="744" height="10" rx="5" fill="white" opacity="0.4"/>
</svg>