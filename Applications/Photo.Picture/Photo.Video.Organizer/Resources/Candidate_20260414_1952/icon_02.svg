<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 보라+파랑 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 카메라 + 캘린더 오버랩 -->
  <!-- 캘린더 (배경) -->
  <rect x="260" y="440" width="504" height="420" rx="24" fill="white" opacity="0.95"/>
  <rect x="260" y="440" width="504" height="80" rx="24" fill="#7B1FA2" opacity="0.85"/>
  <rect x="260" y="494" width="504" height="26" fill="#7B1FA2" opacity="0.85"/>
  <!-- 캘린더 헤더 -->
  <text x="512" y="498" font-family="Segoe UI, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">2024. 06</text>
  <!-- 날짜 격자 -->
  <text x="312" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">1</text>
  <text x="384" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">2</text>
  <text x="456" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">3</text>
  <text x="528" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">4</text>
  <text x="600" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">5</text>
  <text x="672" y="590" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">6</text>
  <text x="312" y="656" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">8</text>
  <text x="384" y="656" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">9</text>
  <!-- 하이라이트 날짜 -->
  <circle cx="456" cy="638" r="30" fill="#7B1FA2"/>
  <text x="456" y="654" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">10</text>
  <text x="528" y="656" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">11</text>
  <text x="600" y="656" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">12</text>
  <text x="672" y="656" font-family="Segoe UI, sans-serif" font-size="44" fill="#555" text-anchor="middle">13</text>
  <!-- 카메라 (상단) -->
  <rect x="300" y="200" width="424" height="300" rx="32" fill="white" opacity="0.95"/>
  <!-- 카메라 본체 -->
  <rect x="316" y="216" width="392" height="252" rx="24" fill="#E8EAF6"/>
  <!-- 렌즈 -->
  <circle cx="512" cy="342" r="100" fill="#7B1FA2" opacity="0.9"/>
  <circle cx="512" cy="342" r="78" fill="#5E35B1"/>
  <circle cx="512" cy="342" r="54" fill="#311B92"/>
  <circle cx="512" cy="342" r="28" fill="white" opacity="0.3"/>
  <!-- 뷰파인더 -->
  <rect x="580" y="224" width="60" height="36" rx="8" fill="#7B1FA2" opacity="0.7"/>
  <!-- 플래시 -->
  <rect x="340" y="224" width="48" height="30" rx="6" fill="#FFD700" opacity="0.8"/>
  <!-- Layer 3: EXIF 텍스트 -->
  <text x="512" y="790" font-family="Consolas, monospace" font-size="42" fill="#7B1FA2" text-anchor="middle">EXIF → 2024/06/10</text>
  <!-- 하단 -->
  <text x="512" y="880" font-family="Segoe UI, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">Organizer</text>
