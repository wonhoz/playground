<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg5)"/>
  <!-- 배경 "화면" 느낌 — 흐릿한 데스크탑 표시 -->
  <rect x="160" y="200" width="704" height="560" rx="20" fill="#388E3C" opacity="0.15"/>
  <!-- Layer 2: 팝업 창 (중앙에 띄워짐) -->
  <!-- 그림자 -->
  <rect x="196" y="286" width="640" height="440" rx="28" fill="#1B5E20" opacity="0.3"/>
  <!-- 팝업 창 본체 -->
  <rect x="184" y="272" width="640" height="440" rx="28" fill="white" opacity="0.98"/>
  <!-- 타이틀바 -->
  <rect x="184" y="272" width="640" height="64" rx="28" fill="#43A047"/>
  <!-- 타이틀바 하단 모서리 수정 -->
  <rect x="184" y="300" width="640" height="36" fill="#43A047"/>
  <!-- 창 닫기 버튼 -->
  <circle cx="784" cy="304" r="14" fill="#EF5350"/>
  <circle cx="748" cy="304" r="14" fill="#FFA726"/>
  <!-- 창 제목 -->
  <text x="370" y="320" font-family="Arial" font-size="52" fill="white" text-anchor="middle" font-weight="bold">Quick Calc</text>
  <!-- 계산기 디스플레이 -->
  <rect x="216" y="360" width="576" height="100" rx="16" fill="#E8F5E9"/>
  <text x="776" y="428" font-family="'Courier New'" font-size="88" fill="#1B5E20" text-anchor="end" font-weight="bold">42 × 3</text>
  <!-- 결과줄 -->
  <rect x="216" y="472" width="576" height="60" rx="12" fill="#F1F8E9"/>
  <text x="776" y="518" font-family="'Courier New'" font-size="64" fill="#388E3C" text-anchor="end" font-weight="bold">= 126</text>
  <!-- 버튼 줄 (간략) -->
  <rect x="216" y="552" width="130" height="60" rx="12" fill="#E3F2FD"/>
  <text x="281" y="595" font-family="Arial" font-size="52" fill="#1565C0" text-anchor="middle">C</text>
  <rect x="360" y="552" width="130" height="60" rx="12" fill="#E3F2FD"/>
  <text x="425" y="595" font-family="Arial" font-size="52" fill="#1565C0" text-anchor="middle">÷</text>
  <rect x="504" y="552" width="130" height="60" rx="12" fill="#E3F2FD"/>
  <text x="569" y="595" font-family="Arial" font-size="52" fill="#1565C0" text-anchor="middle">×</text>
  <rect x="648" y="552" width="120" height="60" rx="12" fill="#FF8F00"/>
  <text x="708" y="595" font-family="Arial" font-size="60" fill="white" text-anchor="middle" font-weight="bold">=</text>
  <!-- Layer 3: Win+K 레이블 -->
  <rect x="312" y="754" width="400" height="72" rx="36" fill="#1B5E20" opacity="0.9"/>
  <text x="512" y="802" font-family="'Courier New', monospace" font-size="56" fill="#CCFF90" text-anchor="middle" font-weight="bold">Win + K</text>
  <!-- 팝업 출현 화살표 -->
  <line x1="512" y1="730" x2="512" y2="760" stroke="#1B5E20" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <polygon points="512,758 492,730 532,730" fill="#1B5E20" opacity="0.6"/>
</svg>
