  <rect x="408" y="285" width="8" height="8" fill="#FFD740" opacity="0.7"/>
  <rect x="422" y="285" width="8" height="8" fill="#FFD740" opacity="0.9"/>
  <!-- Route/path -->
  <path d="M80,440 Q180,400 256,380 Q332,360 432,440" stroke="#64B5F6" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="10,6"/>
  <!-- Person walking -->
  <circle cx="256" cy="375" r="12" fill="#64B5F6"/>
  <line x1="256" y1="387" x2="256" y2="415" stroke="#64B5F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="395" x2="244" y2="410" stroke="#64B5F6" stroke-width="3" stroke-linecap="round"/>
