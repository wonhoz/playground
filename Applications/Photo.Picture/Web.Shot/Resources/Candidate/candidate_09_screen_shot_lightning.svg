<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a00"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffffa0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#2a3a4a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Screen frame -->
  <rect x="60" y="100" width="392" height="260" rx="14" fill="url(#screen)"/>
  <rect x="74" y="114" width="364" height="232" rx="6" fill="#0d1520"/>
  <!-- Screen content (web page mock) -->
  <rect x="88" y="128" width="336" height="14" rx="3" fill="#1e3a4a" opacity="0.8"/>
  <rect x="88" y="152" width="260" height="10" rx="3" fill="#1e3a4a" opacity="0.6"/>
  <rect x="88" y="172" width="300" height="10" rx="3" fill="#1e3a4a" opacity="0.6"/>
  <rect x="88" y="196" width="336" height="80" rx="6" fill="#1e3a4a" opacity="0.4"/>
  <rect x="88" y="288" width="240" height="10" rx="3" fill="#1e3a4a" opacity="0.5"/>
  <!-- Lightning bolt -->
  <polygon points="256,80 224,200 252,200 220,360 300,220 270,220 304,80" fill="url(#lightning)" filter="url(#glow)"/>
  <!-- Screen stand -->
  <rect x="222" y="360" width="68" height="28" rx="0" fill="url(#screen)"/>
  <rect x="178" y="386" width="156" height="14" rx="7" fill="url(#screen)"/>
</svg>