<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background — emerald green -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: Large Markdown # hash symbol (dominant, centered upper) -->
  <!-- Horizontal bars of # -->
  <rect x="244" y="334" width="536" height="68" rx="34" fill="white" opacity="0.95"/>
  <rect x="244" y="454" width="536" height="68" rx="34" fill="white" opacity="0.95"/>
  <!-- Vertical bars of # -->
  <rect x="332" y="248" width="68" height="340" rx="34" fill="white" opacity="0.95"/>
  <rect x="624" y="248" width="68" height="340" rx="34" fill="white" opacity="0.95"/>

  <!-- Layer 3: Text lines below — rendered document content hint -->
  <!-- Thin separator suggesting heading ↓ content -->
  <rect x="222" y="622" width="580" height="4" rx="2" fill="white" opacity="0.25"/>
  <!-- Paragraph lines -->
  <rect x="222" y="644" width="580" height="24" rx="12" fill="white" opacity="0.65"/>
  <rect x="222" y="686" width="520" height="24" rx="12" fill="white" opacity="0.55"/>
  <rect x="222" y="728" width="548" height="24" rx="12" fill="white" opacity="0.45"/>
  <rect x="222" y="770" width="480" height="24" rx="12" fill="white" opacity="0.35"/>
</svg>
