<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000005"/>
      <stop offset="100%" style="stop-color:#050000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="saberGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="saberGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4400ff"/>
      <stop offset="50%" style="stop-color:#aaaaff"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lightsaber hilt -->
  <rect x="230" y="370" width="52" height="80" rx="8" fill="#555" stroke="#888" stroke-width="2"/>
  <rect x="234" y="374" width="44" height="12" rx="4" fill="#666" stroke="#999" stroke-width="1"/>
  <rect x="234" y="394" width="8" height="8" rx="2" fill="#4400ff" filter="url(#glow)"/>
  <circle cx="268" cy="415" r="5" fill="#ff0000" filter="url(#glow)"/>
  <rect x="230" y="425" width="52" height="4" fill="#444"/>
  <!-- Lightsaber blade -->
  <rect x="245" y="100" width="22" height="270" rx="11" fill="url(#saberGrad)" filter="url(#saberGlow)"/>
  <rect x="250" y="105" width="12" height="260" rx="6" fill="#ffffff" opacity="0.7"/>
  <!-- Blade edge glow -->
  <rect x="243" y="100" width="26" height="270" rx="13" fill="#6644ff" opacity="0.3" filter="url(#saberGlow)"/>
  <!-- Swing arc trace -->
  <path d="M140 420 Q200 200 350 120" stroke="#6644ff" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.5" stroke-linecap="round"/>
  <path d="M155 420 Q210 210 355 135" stroke="#aaaaff" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.3" stroke-linecap="round"/>
  <!-- Sliced object fragments -->
  <path d="M320 200 L380 240 Q370 280 330 270 Z" fill="none" stroke="#ff4400" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(15,-10)"/>
  <path d="M320 200 L380 240 Q370 280 330 270 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)" opacity="0.8" transform="translate(-5,12)"/>
  <!-- Impact particles -->
  <circle cx="348" cy="200" r="4" fill="#6644ff" filter="url(#glow)"/>
  <circle cx="335" cy="188" r="2.5" fill="#aaaaff" filter="url(#glow)"/>
  <circle cx="360" cy="210" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <line x1="345" y1="190" x2="337" y2="178" stroke="#6644ff" stroke-width="2" filter="url(#glow)"/>
  <line x1="358" y1="196" x2="368" y2="186" stroke="#aaaaff" stroke-width="2" filter="url(#glow)"/>
</svg>