<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0F1A"/>
      <stop offset="100%" style="stop-color:#1A2340"/>
    </linearGradient>
    <radialGradient id="probe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0.5"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- Radar rings -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.25"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#00FFFF" stroke-width="4" opacity="0.35"/>
  <circle cx="512" cy="512" r="100" fill="none" stroke="#00FFFF" stroke-width="5" opacity="0.5"/>
  <!-- Radiating lines from center -->
  <line x1="512" y1="212" x2="512" y2="812" stroke="#06B6D4" stroke-width="2" opacity="0.3"/>
  <line x1="212" y1="512" x2="812" y2="512" stroke="#06B6D4" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="300" x2="724" y2="724" stroke="#06B6D4" stroke-width="2" opacity="0.3"/>
  <line x1="724" y1="300" x2="300" y2="724" stroke="#06B6D4" stroke-width="2" opacity="0.3"/>
  <!-- Center probe circle -->
  <circle cx="512" cy="512" r="65" fill="url(#probe)"/>
  <circle cx="512" cy="512" r="35" fill="#FFFFFF"/>
  <!-- Outer nodes -->
  <circle cx="512" cy="230" r="28" fill="#00FFFF"/>
  <circle cx="794" cy="512" r="22" fill="#22D3EE"/>
  <circle cx="512" cy="794" r="28" fill="#00FFFF"/>
  <circle cx="230" cy="512" r="22" fill="#22D3EE"/>
  <circle cx="686" cy="338" r="18" fill="#67E8F9"/>
  <circle cx="686" cy="686" r="18" fill="#67E8F9"/>
  <circle cx="338" cy="338" r="18" fill="#67E8F9"/>
  <circle cx="338" cy="686" r="18" fill="#67E8F9"/>
  <!-- Connection lines to nodes -->
  <line x1="512" y1="447" x2="512" y2="258" stroke="#00FFFF" stroke-width="3" opacity="0.7"/>
  <line x1="577" y1="512" x2="766" y2="512" stroke="#00FFFF" stroke-width="3" opacity="0.7"/>
  <line x1="560" y1="560" x2="668" y2="668" stroke="#00FFFF" stroke-width="3" opacity="0.5"/>
  <line x1="464" y1="464" x2="356" y2="356" stroke="#00FFFF" stroke-width="3" opacity="0.5"/>
</svg>
