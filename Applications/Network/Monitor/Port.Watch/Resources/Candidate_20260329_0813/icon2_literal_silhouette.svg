<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A3A"/>
      <stop offset="100%" stop-color="#0A0020"/>
    </linearGradient>
    <linearGradient id="plug2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B47FFF"/>
      <stop offset="100%" stop-color="#6C3FCC"/>
    </linearGradient>
    <linearGradient id="pin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8CFFF"/>
      <stop offset="100%" stop-color="#A06AEE"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg2)"/>

  <!-- Layer 2: Main Object — 플러그/소켓 커넥터 실루엣 -->
  <!-- 플러그 몸체 (사각형 커넥터) -->
  <rect x="262" y="280" width="500" height="360" rx="40" fill="url(#plug2)" stroke="#D0A0FF" stroke-width="10"/>
  <!-- 플러그 헤드 (왼쪽 연결부) -->
  <rect x="142" y="370" width="120" height="90" rx="18" fill="#9060DD"/>
  <rect x="142" y="490" width="120" height="90" rx="18" fill="#9060DD"/>
  <!-- 소켓 구멍들 -->
  <rect x="340" y="350" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>
  <rect x="460" y="350" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>
  <rect x="580" y="350" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>
  <rect x="340" y="470" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>
  <rect x="460" y="470" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>
  <rect x="580" y="470" width="60" height="100" rx="14" fill="#1A0A3A" opacity="0.9"/>

  <!-- 케이블 라인 (오른쪽) -->
  <rect x="762" y="430" width="130" height="60" rx="30" fill="#7B4FBB"/>

  <!-- Layer 3: Detail — 태그 배지 TCP / UDP -->
  <rect x="295" y="700" width="180" height="72" rx="16" fill="#7B2FFF"/>
  <text x="385" y="750" font-family="'Segoe UI', 'Consolas', monospace"
        font-size="44" font-weight="800" fill="#FFFFFF"
        text-anchor="middle" dominant-baseline="central">TCP</text>

  <rect x="549" y="700" width="180" height="72" rx="16" fill="#5520BB"/>
  <text x="639" y="750" font-family="'Segoe UI', 'Consolas', monospace"
        font-size="44" font-weight="800" fill="#D0B0FF"
        text-anchor="middle" dominant-baseline="central">UDP</text>

  <!-- 타이틀 -->
  <text x="512" y="888" font-family="'Segoe UI', sans-serif"
        font-size="80" font-weight="900" fill="#B47FFF"
        text-anchor="middle" letter-spacing="4">WATCH</text>
</svg>
