<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 속도계 반원 -->
  <!-- 배경 반원 -->
  <path d="M 180 640 A 332 332 0 0 1 844 640" fill="none" stroke="#C8E6C9" stroke-width="60" stroke-linecap="round"/>
