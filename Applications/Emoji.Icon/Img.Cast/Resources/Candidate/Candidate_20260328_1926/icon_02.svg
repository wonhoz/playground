<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000035"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- 드롭존 영역 -->
  <rect x="110" y="190" width="804" height="580" rx="40" fill="white" filter="url(#sh2)" opacity="0.92"/>
  <rect x="130" y="210" width="764" height="540" rx="30" fill="none" stroke="#4CAF50" stroke-width="14" stroke-dasharray="30 15"/>

  <!-- 상단 드롭 힌트 화살표 (중앙 상단) -->
  <path d="M512,248 L512,360" stroke="#4CAF50" stroke-width="28" stroke-linecap="round"/>
  <path d="M432,320 L512,400 L592,320" stroke="#4CAF50" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 파일 카드 3개 (가로 배치) -->
  <!-- SVG 카드 -->
  <rect x="166" y="430" width="188" height="240" rx="18" fill="white" filter="url(#sh2)"/>
  <rect x="166" y="430" width="188" height="64" rx="18" fill="#FF7043"/>
  <rect x="166" y="462" width="188" height="32" fill="#FF7043"/>
  <text x="260" y="490" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">SVG</text>
  <rect x="196" y="514" width="128" height="16" rx="8" fill="#FFCCBC"/>
  <rect x="196" y="544" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="196" y="574" width="114" height="16" rx="8" fill="#E0E0E0"/>

  <!-- PNG 카드 -->
  <rect x="418" y="415" width="188" height="240" rx="18" fill="white" filter="url(#sh2)"/>
  <rect x="418" y="415" width="188" height="64" rx="18" fill="#7E57C2"/>
  <rect x="418" y="447" width="188" height="32" fill="#7E57C2"/>
  <text x="512" y="475" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">PNG</text>
  <rect x="448" y="499" width="128" height="16" rx="8" fill="#D1C4E9"/>
  <rect x="448" y="529" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="448" y="559" width="114" height="16" rx="8" fill="#E0E0E0"/>

  <!-- JPG 카드 -->
  <rect x="670" y="430" width="188" height="240" rx="18" fill="white" filter="url(#sh2)"/>
  <rect x="670" y="430" width="188" height="64" rx="18" fill="#29B6F6"/>
  <rect x="670" y="462" width="188" height="32" fill="#29B6F6"/>
  <text x="764" y="490" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="Arial, sans-serif">JPG</text>
  <rect x="700" y="514" width="128" height="16" rx="8" fill="#B3E5FC"/>
  <rect x="700" y="544" width="100" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="700" y="574" width="114" height="16" rx="8" fill="#E0E0E0"/>

  <!-- 하단 ICO 결과 배지 -->
  <rect x="340" y="830" width="344" height="72" rx="36" fill="#388E3C"/>
  <text x="512" y="879" text-anchor="middle" fill="white" font-size="52" font-weight="bold" font-family="Arial, sans-serif">→ ICO</text>
</svg>
