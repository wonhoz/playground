<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: AI filter funnel — raw text in, refined text out -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#001A08"/>
  <!-- Funnel shape -->
  <path d="M180 220 L844 220 L620 520 L620 780 L404 780 L404 520 Z" fill="#003320" stroke="#00C853" stroke-width="24" stroke-linejoin="round"/>
  <!-- Funnel glow fill -->
  <path d="M220 260 L804 260 L600 520 L600 740 L424 740 L424 520 Z" fill="#00C853" opacity="0.08"/>
  <!-- Input noise dots (top, chaotic) -->
  <circle cx="280" cy="180" r="14" fill="#00C853" opacity="0.4"/>
  <circle cx="350" cy="160" r="10" fill="#00C853" opacity="0.3"/>
  <circle cx="430" cy="175" r="16" fill="#00C853" opacity="0.5"/>
  <circle cx="512" cy="165" r="12" fill="#00C853" opacity="0.4"/>
  <circle cx="600" cy="178" r="14" fill="#00C853" opacity="0.35"/>
  <circle cx="680" cy="162" r="11" fill="#00C853" opacity="0.4"/>
  <circle cx="750" cy="180" r="13" fill="#00C853" opacity="0.3"/>
  <!-- AI processing grid inside funnel -->
  <line x1="380" y1="320" x2="644" y2="320" stroke="#00C853" stroke-width="10" opacity="0.3"/>
  <line x1="350" y1="380" x2="674" y2="380" stroke="#00C853" stroke-width="10" opacity="0.3"/>
  <line x1="340" y1="440" x2="684" y2="440" stroke="#00C853" stroke-width="10" opacity="0.3"/>
  <!-- Refined output (bottom) — clean single line -->
  <rect x="380" y="800" width="264" height="28" rx="14" fill="#00C853" opacity="0.9"/>
  <circle cx="360" cy="814" r="18" fill="#00C853"/>
  <circle cx="668" cy="814" r="18" fill="#00C853"/>
</svg>
