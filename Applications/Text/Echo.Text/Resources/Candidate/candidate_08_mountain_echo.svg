<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mountain silhouette -->
  <polygon points="50,420 190,160 256,240 330,140 462,420" fill="url(#mountain)"/>
  <polygon points="50,420 190,160 256,240 330,140 462,420" fill="white" opacity="0.05"/>
  <!-- Snow caps -->
  <polygon points="190,160 215,215 165,215" fill="white" opacity="0.9"/>
  <polygon points="330,140 355,195 305,195" fill="white" opacity="0.8"/>
  <!-- ECHO text -->
  <text x="100" y="370" font-family="sans-serif" font-size="38" fill="white" font-weight="bold" opacity="0.9">ECHO</text>
  <!-- Echo ripples -->
  <text x="130" y="400" font-family="sans-serif" font-size="28" fill="white" font-weight="bold" opacity="0.5">ECHO</text>
  <text x="155" y="425" font-family="sans-serif" font-size="20" fill="white" font-weight="bold" opacity="0.25">ECHO</text>
  <!-- Sound lines from person -->
  <circle cx="90" cy="330" r="14" fill="white"/>
  <path d="M55 310 C42 298 40 282 50 270 C60 258 76 258 88 266" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M40 300 C24 284 22 262 36 247 C50 232 72 232 88 244" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
