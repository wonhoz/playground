<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#0D1830"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111828"/>
      <stop offset="100%" stop-color="#0E1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#00B0FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Code editor panel -->
  <rect x="56" y="76" width="400" height="360" rx="12" fill="url(#card)" stroke="#1A2A3A" stroke-width="1.5"/>
  <!-- Top accent line -->
  <rect x="56" y="76" width="400" height="4" rx="2" fill="url(#accent)"/>
  <!-- Tab bar -->
  <rect x="56" y="80" width="400" height="32" rx="0" fill="#0F1C2C"/>
  <rect x="72" y="84" width="80" height="24" rx="4" fill="#1A2A3A"/>
  <text x="112" y="100" font-family="monospace" font-size="11" fill="#88AAFF" text-anchor="middle">str.forge</text>
  <!-- Line numbers gutter -->
  <rect x="56" y="112" width="44" height="320" fill="#0C1520"/>
  <text x="84" y="136" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">1</text>
  <text x="84" y="158" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">2</text>
  <text x="84" y="180" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">3</text>
  <text x="84" y="202" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">4</text>
  <text x="84" y="224" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">5</text>
  <text x="84" y="246" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">6</text>
  <text x="84" y="268" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">7</text>
  <text x="84" y="290" font-family="monospace" font-size="11" fill="#334455" text-anchor="end">8</text>
  <!-- Code content -->
  <text x="112" y="136" font-family="monospace" font-size="12" fill="#88AAFF">var</text>
  <text x="138" y="136" font-family="monospace" font-size="12" fill="#E0E8FF">input</text>
  <text x="186" y="136" font-family="monospace" font-size="12" fill="#88CCFF">=</text>
  <text x="200" y="136" font-family="monospace" font-size="12" fill="#FFDD44">"hello world"</text>
  <text x="112" y="158" font-family="monospace" font-size="12" fill="#FF8844">Forge</text>
  <text x="154" y="158" font-family="monospace" font-size="12" fill="#E0E8FF">.of(input)</text>
  <!-- Highlight active line -->
  <rect x="100" y="168" width="340" height="20" rx="2" fill="#1E3A5A" opacity="0.6"/>
  <text x="116" y="180" font-family="monospace" font-size="12" fill="#88AAFF" filter="url(#glow)">.toUpper()</text>
  <text x="112" y="202" font-family="monospace" font-size="12" fill="#AADDFF">.replace(</text>
  <text x="196" y="202" font-family="monospace" font-size="12" fill="#FFDD44">" "</text>
  <text x="220" y="202" font-family="monospace" font-size="12" fill="#E0E8FF">,</text>
  <text x="228" y="202" font-family="monospace" font-size="12" fill="#FFDD44">"_"</text>
  <text x="252" y="202" font-family="monospace" font-size="12" fill="#AADDFF">)</text>
  <text x="112" y="224" font-family="monospace" font-size="12" fill="#AADDFF">.encode(</text>
  <text x="182" y="224" font-family="monospace" font-size="12" fill="#88FF88">Base64</text>
  <text x="234" y="224" font-family="monospace" font-size="12" fill="#AADDFF">)</text>
  <text x="112" y="246" font-family="monospace" font-size="12" fill="#AADDFF">.trim()</text>
  <text x="112" y="268" font-family="monospace" font-size="12" fill="#AADDFF">.build()</text>
  <!-- Result output -->
  <rect x="100" y="280" width="340" height="1" fill="#1A3A5A"/>
  <text x="112" y="300" font-family="monospace" font-size="11" fill="#555">// output:</text>
  <rect x="100" y="306" width="340" height="20" rx="2" fill="#1A3A2A" opacity="0.5"/>
  <text x="112" y="319" font-family="monospace" font-size="12" fill="#88FF88">"HELLO_WORLD" (base64)</text>
  <!-- Cursor -->
  <rect x="112" y="354" width="8" height="16" rx="1" fill="#2979FF" filter="url(#glow)" opacity="0.9"/>
</svg>
