<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="lm-bg-clip-04">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="lm-bg-04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#2D1060"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#lm-bg-04)"/>

  <g clip-path="url(#lm-bg-clip-04)">
    <!-- 무지개 화살표들이 하나로 수렴 -->
    <!-- 화살표 1: 빨강 (좌상) -->
    <path d="M230 260 C340 290 430 370 510 490" fill="none" stroke="#FF4757" stroke-width="58" stroke-linecap="round"/>
