<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0033"/>
  <!-- Layer 2: 3개 ASCII 아트 프레임 갤러리 -->
  <!-- 프레임 1: 하트 ASCII -->
  <rect x="80" y="220" width="260" height="260" rx="16" fill="#2D0057"/>
  <rect x="80" y="220" width="260" height="260" rx="16" fill="none" stroke="#9C27B0" stroke-width="4"/>
  <text x="96" y="288" font-family="Consolas,monospace" font-size="32" fill="#CE93D8">.**. .**.</text>
  <text x="96" y="328" font-family="Consolas,monospace" font-size="32" fill="#CE93D8">*****</text>
  <text x="96" y="368" font-family="Consolas,monospace" font-size="32" fill="#CE93D8"> ***</text>
  <text x="96" y="408" font-family="Consolas,monospace" font-size="32" fill="#CE93D8">  *</text>
  <!-- 프레임 2: 사람 ASCII (가운데, 크게) -->
  <rect x="382" y="160" width="260" height="320" rx="16" fill="#2D0057"/>
  <rect x="382" y="160" width="260" height="320" rx="16" fill="none" stroke="#E040FB" stroke-width="4"/>
  <text x="398" y="228" font-family="Consolas,monospace" font-size="32" fill="#F48FB1"> O</text>
  <text x="398" y="268" font-family="Consolas,monospace" font-size="32" fill="#F48FB1">/|\</text>
  <text x="398" y="308" font-family="Consolas,monospace" font-size="32" fill="#F48FB1"> | </text>
  <text x="398" y="348" font-family="Consolas,monospace" font-size="32" fill="#F48FB1">/ \</text>
  <!-- 프레임 3: 집 ASCII -->
  <rect x="684" y="220" width="260" height="260" rx="16" fill="#2D0057"/>
  <rect x="684" y="220" width="260" height="260" rx="16" fill="none" stroke="#7C4DFF" stroke-width="4"/>
  <text x="700" y="288" font-family="Consolas,monospace" font-size="32" fill="#B39DDB"> /\ </text>
  <text x="700" y="328" font-family="Consolas,monospace" font-size="32" fill="#B39DDB">/##\</text>
  <text x="700" y="368" font-family="Consolas,monospace" font-size="32" fill="#B39DDB">|[]|</text>
  <!-- Layer 3: 하단 선택 도트 + 타이틀 -->
  <circle cx="352" cy="560" r="14" fill="#9C27B0"/>
  <circle cx="512" cy="560" r="20" fill="#E040FB"/>
  <circle cx="672" cy="560" r="14" fill="#7C4DFF"/>
  <text x="512" y="680" font-family="Consolas,monospace" font-size="52" fill="#CE93D8" text-anchor="middle" font-weight="bold">GALLERY</text>
  <text x="512" y="740" font-family="Arial" font-size="36" fill="#7C4DFF" text-anchor="middle">ASCII Art</text>
</svg>
