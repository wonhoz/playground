<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0B2333"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Donut chart -->
  <!-- Background track -->
  <circle cx="220" cy="230" r="130" fill="none" stroke="#1E3A4C" stroke-width="44"/>
  <!-- Used: 68% = 244.8deg, stroke-dasharray for circle circumference 816.8 -->
  <!-- Segment 1: System 15% -->
  <circle cx="220" cy="230" r="130" fill="none" stroke="#06B6D4" stroke-width="44"
    stroke-dasharray="122.5 694.3" stroke-dashoffset="0" transform="rotate(-90 220 230)"/>
  <!-- Segment 2: Apps 43% -->
  <circle cx="220" cy="230" r="130" fill="none" stroke="#0891B2" stroke-width="44"
    stroke-dasharray="351.2 465.6" stroke-dashoffset="-122.5" transform="rotate(-90 220 230)"/>
  <!-- Segment 3: Cache 10% -->
  <circle cx="220" cy="230" r="130" fill="none" stroke="#EAB308" stroke-width="44"
    stroke-dasharray="81.7 735.1" stroke-dashoffset="-473.7" transform="rotate(-90 220 230)"/>
  <!-- Segment 4: Free 32% -->
  <!-- (automatically fills remaining) -->
  <!-- Center text -->
  <text x="220" y="215" font-family="Arial" font-size="40" fill="white" text-anchor="middle" font-weight="bold">68%</text>
  <text x="220" y="245" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">IN USE</text>
  <text x="220" y="265" font-family="Arial" font-size="12" fill="#64748B" text-anchor="middle">21.8 / 32 GB</text>
  <!-- Legend -->
  <rect x="370" y="130" width="14" height="14" rx="3" fill="#06B6D4"/>
  <text x="390" y="142" font-family="Arial" font-size="13" fill="#CBD5E1">System</text>
  <text x="390" y="157" font-family="Arial" font-size="11" fill="#64748B">4.8 GB · 15%</text>
  <rect x="370" y="175" width="14" height="14" rx="3" fill="#0891B2"/>
  <text x="390" y="187" font-family="Arial" font-size="13" fill="#CBD5E1">Apps</text>
  <text x="390" y="202" font-family="Arial" font-size="11" fill="#64748B">13.8 GB · 43%</text>
  <rect x="370" y="220" width="14" height="14" rx="3" fill="#EAB308"/>
  <text x="390" y="232" font-family="Arial" font-size="13" fill="#CBD5E1">Cache</text>
  <text x="390" y="247" font-family="Arial" font-size="11" fill="#64748B">3.2 GB · 10%</text>
  <rect x="370" y="265" width="14" height="14" rx="3" fill="#1E3A4C"/>
  <text x="390" y="277" font-family="Arial" font-size="13" fill="#CBD5E1">Free</text>
  <text x="390" y="292" font-family="Arial" font-size="11" fill="#64748B">10.2 GB · 32%</text>
  <!-- Bottom bar summary -->
  <rect x="60" y="400" width="392" height="20" rx="10" fill="#1E3A4C"/>
  <rect x="60" y="400" width="265" height="20" rx="10" fill="#06B6D4"/>
  <rect x="325" y="400" width="127" height="20" rx="10" fill="#EAB308"/>
  <text x="256" y="440" font-family="Arial" font-size="12" fill="#94A3B8" text-anchor="middle">Total Memory: 32 GB</text>
</svg>
