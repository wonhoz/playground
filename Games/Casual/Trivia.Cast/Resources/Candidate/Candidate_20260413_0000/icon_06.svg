<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: metaphor · 실루엣·캐릭터 · 물음표 캐릭터가 퀴즈를 냄 -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B2DFDB"/>
      <stop offset="1" stop-color="#4DB6AC"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- 물음표 캐릭터 (큰 ?) -->
  <g>
    <!-- 물음표 곡선 -->
    <path d="M 280 320 Q 280 160 460 160 Q 640 160 640 320 Q 640 400 560 450 Q 480 500 480 580 L 400 580 Q 400 460 480 400 Q 560 350 560 300 Q 560 240 460 240 Q 360 240 360 320 Z" fill="#FFD93D" stroke="#1B5E20" stroke-width="22" stroke-linejoin="round"/>
    <!-- 물음표 점 -->
    <circle cx="440" cy="680" r="56" fill="#FFD93D" stroke="#1B5E20" stroke-width="22"/>
    <!-- 눈 (캐릭터화) -->
    <circle cx="420" cy="300" r="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="10"/>
    <circle cx="520" cy="300" r="30" fill="#FFFFFF" stroke="#1B5E20" stroke-width="10"/>
    <circle cx="425" cy="310" r="14" fill="#1B5E20"/>
    <circle cx="525" cy="310" r="14" fill="#1B5E20"/>
    <!-- 미소 -->
    <path d="M 420 370 Q 470 410 520 370" stroke="#1B5E20" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
  <!-- 말풍선 (오른쪽) -->
  <g>
    <path d="M 620 280 L 900 280 Q 940 280 940 320 L 940 460 Q 940 500 900 500 L 760 500 L 720 560 L 730 500 L 620 500 Q 580 500 580 460 L 580 320 Q 580 280 620 280 Z" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14"/>
    <text x="760" y="410" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#1B5E20" text-anchor="middle">Q?</text>
  </g>
  <!-- ABCD 하단 -->
  <g>
    <rect x="120" y="770" width="180" height="140" rx="30" fill="#FF6B9D" stroke="#880E4F" stroke-width="10"/>
    <text x="210" y="868" font-family="Arial Black" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">A</text>
  </g>
  <g>
    <rect x="320" y="770" width="180" height="140" rx="30" fill="#06D6A0" stroke="#056B4F" stroke-width="10"/>
    <text x="410" y="868" font-family="Arial Black" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">B</text>
  </g>
  <g>
    <rect x="520" y="770" width="180" height="140" rx="30" fill="#3A86FF" stroke="#0D47A1" stroke-width="10"/>
    <text x="610" y="868" font-family="Arial Black" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">C</text>
  </g>
  <g>
    <rect x="720" y="770" width="180" height="140" rx="30" fill="#FF9800" stroke="#E65100" stroke-width="10"/>
    <text x="810" y="868" font-family="Arial Black" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">D</text>
  </g>
</svg>
