<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Continent tile grid (7 continents) -->
  <!-- Asia (largest) -->
  <rect x="50" y="60" width="190" height="130" rx="14" fill="#1565c0"/>
  <text x="80" y="95" font-family="Arial" font-size="11" fill="#90caf9" opacity="0.8">ASIA</text>
  <text x="80" y="118" font-family="Arial" font-size="30">🌏</text>
  <text x="80" y="145" font-family="'Courier New', monospace" font-size="11" fill="#b0bec5">44.6M km²</text>
  <!-- Europe -->
  <rect x="252" y="60" width="110" height="130" rx="14" fill="#283593"/>
  <text x="272" y="95" font-family="Arial" font-size="11" fill="#9fa8da" opacity="0.8">EUROPE</text>
  <text x="282" y="118" font-family="Arial" font-size="28">🌍</text>
  <text x="272" y="145" font-family="'Courier New', monospace" font-size="10" fill="#b0bec5">10.5M km²</text>
  <!-- North America -->
  <rect x="374" y="60" width="88" height="130" rx="14" fill="#0277bd"/>
  <text x="384" y="90" font-family="Arial" font-size="10" fill="#80d8ff" opacity="0.8">N. AMERICA</text>
  <text x="400" y="118" font-family="Arial" font-size="28">🌎</text>
  <text x="384" y="145" font-family="'Courier New', monospace" font-size="10" fill="#b0bec5">24.7M</text>
  <!-- Africa -->
  <rect x="50" y="204" width="145" height="130" rx="14" fill="#e65100"/>
  <text x="70" y="235" font-family="Arial" font-size="11" fill="#ffcc80" opacity="0.8">AFRICA</text>
  <text x="70" y="258" font-family="Arial" font-size="30">🌍</text>
  <text x="70" y="286" font-family="'Courier New', monospace" font-size="11" fill="#ffe0b2">30.4M km²</text>
  <!-- South America -->
  <rect x="207" y="204" width="145" height="130" rx="14" fill="#2e7d32"/>
  <text x="220" y="235" font-family="Arial" font-size="11" fill="#a5d6a7" opacity="0.8">S. AMERICA</text>
  <text x="250" y="258" font-family="Arial" font-size="30">🌎</text>
  <text x="220" y="286" font-family="'Courier New', monospace" font-size="11" fill="#c8e6c9">17.8M km²</text>
  <!-- Australia -->
  <rect x="364" y="204" width="98" height="130" rx="14" fill="#f57f17"/>
  <text x="375" y="232" font-family="Arial" font-size="10" fill="#fff8e1" opacity="0.8">AUSTRALIA</text>
  <text x="395" y="256" font-family="Arial" font-size="28">🦘</text>
  <text x="375" y="292" font-family="'Courier New', monospace" font-size="9" fill="#ffe0b2">7.7M km²</text>
  <!-- Antarctica -->
  <rect x="50" y="348" width="412" height="80" rx="14" fill="#546e7a"/>
  <text x="256" y="380" font-family="Arial" font-size="14" fill="#b0bec5" text-anchor="middle">ANTARCTICA — 14.2M km² ❄️</text>
  <text x="256" y="410" font-family="'Courier New', monospace" font-size="11" fill="#78909c" text-anchor="middle">Coldest continent · No permanent residents</text>
  <!-- Title -->
  <text x="256" y="472" font-family="Arial" font-size="28" font-weight="900" fill="white" text-anchor="middle">GEO.QUIZ</text>
  <text x="256" y="497" font-family="Arial" font-size="14" fill="#90a4ae" text-anchor="middle">Know Your Continents</text>
</svg>
