<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10cp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (hot pink-magenta) -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg10cp2)"/>

  <!-- Layer 2: 9 format badges arranged diagonally -->
  <!-- Row 1 (top-left) -->
  <rect x="60" y="80" width="220" height="76" rx="20" fill="white" opacity="0.92"/>
  <text x="170" y="130" font-family="'Courier New',monospace" font-size="44" fill="#0277BD"
    text-anchor="middle">full\path</text>

  <rect x="300" y="80" width="220" height="76" rx="20" fill="white" opacity="0.9"/>
  <text x="410" y="130" font-family="'Courier New',monospace" font-size="44" fill="#2E7D32"
    text-anchor="middle">slash/</text>

  <rect x="540" y="80" width="220" height="76" rx="20" fill="white" opacity="0.88"/>
  <text x="650" y="130" font-family="'Courier New',monospace" font-size="44" fill="#880E4F"
    text-anchor="middle">C# \\</text>

  <!-- Row 2 (middle) -->
  <rect x="60" y="280" width="220" height="76" rx="20" fill="white" opacity="0.9"/>
  <text x="170" y="330" font-family="'Courier New',monospace" font-size="44" fill="#E65100"
    text-anchor="middle">filename</text>

  <rect x="300" y="280" width="220" height="76" rx="20" fill="#FFF176" opacity="0.95"/>
  <text x="410" y="330" font-family="'Courier New',monospace" font-size="44" fill="#E65100"
    text-anchor="middle" font-weight="bold">noext</text>

  <rect x="540" y="280" width="220" height="76" rx="20" fill="white" opacity="0.9"/>
  <text x="650" y="330" font-family="'Courier New',monospace" font-size="44" fill="#4A148C"
    text-anchor="middle">dir/</text>

  <!-- Row 3 (bottom) -->
  <rect x="60" y="480" width="220" height="76" rx="20" fill="white" opacity="0.88"/>
  <text x="170" y="530" font-family="'Courier New',monospace" font-size="38" fill="#1565C0"
    text-anchor="middle">file://</text>

  <rect x="300" y="480" width="220" height="76" rx="20" fill="white" opacity="0.86"/>
  <text x="410" y="530" font-family="'Courier New',monospace" font-size="44" fill="#1B5E20"
    text-anchor="middle">/c/unix</text>

  <rect x="540" y="480" width="220" height="76" rx="20" fill="white" opacity="0.84"/>
  <text x="650" y="530" font-family="'Courier New',monospace" font-size="44" fill="#37474F"
    text-anchor="middle">\\unc</text>

  <!-- Diagonal line accent -->
  <line x1="100" y1="600" x2="924" y2="200" stroke="white" stroke-width="6" opacity="0.15" stroke-linecap="round"/>

  <!-- Layer 3: Large copy icon + "9" count badge -->
  <circle cx="836" cy="700" r="190" fill="white" opacity="0.1"/>
  <circle cx="836" cy="700" r="160" fill="white" opacity="0.15"/>
  <text x="836" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="white"
    text-anchor="middle">📋</text>
  <circle cx="940" cy="580" r="60" fill="#FFF176"/>
  <text x="940" y="600" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold"
    fill="#E65100" text-anchor="middle">9</text>

  <text x="512" y="900" font-family="'Segoe UI',Arial,sans-serif" font-size="84" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.95">COPY · PATH</text>
</svg>
