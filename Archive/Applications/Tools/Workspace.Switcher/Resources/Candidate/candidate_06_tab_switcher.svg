<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="activeTab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="inactiveTab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="content" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 탭 바 -->
  <rect x="68" y="108" width="376" height="46" rx="8" fill="#1f2937"/>
  <!-- 탭 1 (활성) -->
  <rect x="76" y="112" width="90" height="38" rx="6" fill="url(#activeTab)"/>
  <text x="121" y="136" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Work</text>
  <!-- 탭 2 -->
  <rect x="174" y="116" width="80" height="30" rx="5" fill="url(#inactiveTab)"/>
  <text x="214" y="136" font-family="Arial" font-size="12" fill="#9ca3af" text-anchor="middle">Browse</text>
  <!-- 탭 3 -->
  <rect x="262" y="116" width="80" height="30" rx="5" fill="url(#inactiveTab)"/>
  <text x="302" y="136" font-family="Arial" font-size="12" fill="#9ca3af" text-anchor="middle">Media</text>
  <!-- 탭 4 -->
  <rect x="350" y="116" width="80" height="30" rx="5" fill="url(#inactiveTab)"/>
  <text x="390" y="136" font-family="Arial" font-size="12" fill="#9ca3af" text-anchor="middle">Dev</text>
  <!-- 컨텐츠 영역 -->
  <rect x="68" y="154" width="376" height="268" rx="8" fill="url(#content)" stroke="#374151" stroke-width="1.5"/>
  <!-- 활성 탭 컨텐츠 (창들) -->
  <rect x="84" y="170" width="160" height="120" rx="6" fill="#be185d" opacity="0.3" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="84" y="170" width="160" height="22" rx="6" fill="#be185d" opacity="0.5"/>
  <rect x="256" y="170" width="172" height="56" rx="6" fill="#9d174d" opacity="0.3" stroke="#f472b6" stroke-width="1.5"/>
  <rect x="256" y="170" width="172" height="22" rx="6" fill="#9d174d" opacity="0.5"/>
  <rect x="256" y="238" width="172" height="52" rx="6" fill="#9d174d" opacity="0.3" stroke="#f472b6" stroke-width="1.5"/>
  <rect x="256" y="238" width="172" height="22" rx="6" fill="#9d174d" opacity="0.5"/>
  <rect x="84" y="302" width="356" height="104" rx="6" fill="#831843" opacity="0.2" stroke="#db2777" stroke-width="1.5"/>
  <rect x="84" y="302" width="356" height="22" rx="6" fill="#831843" opacity="0.4"/>
  <!-- 전환 힌트 -->
  <rect x="68" y="438" width="376" height="36" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="256" y="460" font-family="'Courier New',monospace" font-size="13" fill="#6b7280" text-anchor="middle">Win + Tab  /  Ctrl + Win + ←→</text>
</svg>
