<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ee7df"/>
      <stop offset="100%" stop-color="#b490ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Three clipboards arranged side by side -->
  <!-- Left clipboard -->
  <rect x="72" y="200" width="120" height="160" rx="10" fill="url(#c1)" opacity="0.8"/>
  <rect x="102" y="186" width="60" height="20" rx="6" fill="#0073aa"/>
  <rect x="116" y="180" width="32" height="12" rx="6" fill="#001a33"/>
  <rect x="86" y="220" width="92" height="8" rx="3" fill="white" opacity="0.4"/>
  <rect x="86" y="234" width="70" height="8" rx="3" fill="white" opacity="0.35"/>
  <rect x="86" y="248" width="84" height="8" rx="3" fill="white" opacity="0.4"/>
  <!-- Center clipboard (larger, front) -->
  <rect x="188" y="170" width="136" height="190" rx="12" fill="url(#c3)" opacity="0.9"/>
  <rect x="224" y="154" width="64" height="24" rx="7" fill="#5a4a7a"/>
  <rect x="238" y="147" width="36" height="14" rx="7" fill="#001a33"/>
  <rect x="204" y="196" width="104" height="9" rx="3" fill="white" opacity="0.5"/>
  <rect x="204" y="212" width="82" height="9" rx="3" fill="white" opacity="0.4"/>
  <rect x="204" y="228" width="96" height="9" rx="3" fill="white" opacity="0.45"/>
  <rect x="204" y="244" width="60" height="9" rx="3" fill="white" opacity="0.35"/>
  <!-- Right clipboard -->
  <rect x="320" y="200" width="120" height="160" rx="10" fill="url(#c2)" opacity="0.8"/>
  <rect x="350" y="186" width="60" height="20" rx="6" fill="#aa0055"/>
  <rect x="364" y="180" width="32" height="12" rx="6" fill="#001a33"/>
  <rect x="334" y="220" width="92" height="8" rx="3" fill="white" opacity="0.4"/>
  <rect x="334" y="234" width="70" height="8" rx="3" fill="white" opacity="0.35"/>
  <!-- Connection lines between clipboards -->
  <line x1="192" y1="280" x2="168" y2="280" stroke="#4facfe" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="324" y1="280" x2="348" y2="280" stroke="#f093fb" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>
</svg>