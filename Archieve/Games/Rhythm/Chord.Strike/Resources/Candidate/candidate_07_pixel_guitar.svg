<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel art guitar (each rect = 1 pixel block, 16px each) -->
  <!-- Body lower bout row 1 -->
  <rect x="144" y="304" width="224" height="16" fill="#cc4400"/>
  <!-- Body lower bout row 2 -->
  <rect x="112" y="320" width="288" height="16" fill="#dd5500"/>
  <rect x="128" y="336" width="256" height="16" fill="#dd5500"/>
  <rect x="128" y="352" width="256" height="16" fill="#ee6600"/>
  <rect x="144" y="368" width="224" height="16" fill="#ee6600"/>
  <rect x="160" y="384" width="192" height="16" fill="#cc4400"/>
  <rect x="176" y="400" width="160" height="16" fill="#aa3300"/>
  <rect x="192" y="416" width="128" height="16" fill="#882200"/>
  <!-- Waist -->
  <rect x="192" y="256" width="128" height="16" fill="#aa3300"/>
  <rect x="192" y="272" width="128" height="16" fill="#cc4400"/>
  <rect x="192" y="288" width="128" height="16" fill="#cc4400"/>
  <!-- Upper bout -->
  <rect x="160" y="208" width="192" height="16" fill="#cc4400"/>
  <rect x="144" y="224" width="224" height="16" fill="#dd5500"/>
  <rect x="144" y="240" width="224" height="16" fill="#dd5500"/>
  <!-- Sound hole -->
  <rect x="224" y="320" width="64" height="16" fill="#1a0a00"/>
  <rect x="208" y="336" width="96" height="16" fill="#1a0a00"/>
  <rect x="208" y="352" width="96" height="16" fill="#1a0a00"/>
  <rect x="224" y="368" width="64" height="16" fill="#1a0a00"/>
  <!-- Neck -->
  <rect x="240" y="64" width="32" height="144" fill="#884400"/>
  <!-- Frets -->
  <rect x="240" y="112" width="32" height="4" fill="#ffcc00"/>
  <rect x="240" y="144" width="32" height="4" fill="#ffcc00"/>
  <rect x="240" y="176" width="32" height="4" fill="#ffcc00"/>
  <!-- Strings (pixel dots) -->
  <rect x="244" y="70" width="4" height="200" fill="#ffffff" opacity="0.6"/>
  <rect x="252" y="70" width="4" height="200" fill="#ffffff" opacity="0.6"/>
  <rect x="260" y="70" width="4" height="200" fill="#ffffff" opacity="0.6"/>
  <!-- Hit indicators -->
  <rect x="80" y="440" width="32" height="32" rx="4" fill="#ff0055"/>
  <rect x="128" y="440" width="32" height="32" rx="4" fill="#00aaff"/>
  <rect x="176" y="440" width="32" height="32" rx="4" fill="#ffcc00"/>
  <rect x="224" y="440" width="32" height="32" rx="4" fill="#00ff88"/>
  <rect x="272" y="440" width="32" height="32" rx="4" fill="#ff6600"/>
  <rect x="320" y="440" width="32" height="32" rx="4" fill="#aa00ff"/>
  <rect x="368" y="440" width="32" height="32" rx="4" fill="#ff0055"/>
  <rect x="416" y="440" width="32" height="32" rx="4" fill="#00aaff"/>
</svg>