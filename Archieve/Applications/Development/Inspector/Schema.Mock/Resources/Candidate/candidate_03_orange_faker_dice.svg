<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#0D0400"/>
    </radialGradient>
    <linearGradient id="dice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFAB40"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric dice - large -->
  <!-- Top face -->
  <polygon points="256,100 390,175 256,250 122,175" fill="url(#top)"/>
  <!-- Left face -->
  <polygon points="122,175 256,250 256,380 122,305" fill="url(#dice)"/>
  <!-- Right face -->
  <polygon points="390,175 390,305 256,380 256,250" fill="url(#side)"/>
  <!-- Dots on top -->
  <g fill="#0D0400" opacity="0.8">
    <circle cx="220" cy="168" r="11"/>
    <circle cx="256" cy="185" r="11"/>
    <circle cx="292" cy="168" r="11"/>
    <circle cx="236" cy="208" r="11"/>
    <circle cx="272" cy="195" r="11" opacity="0.5"/>
  </g>
  <!-- Dots on right face -->
  <g fill="#0D0400" opacity="0.6">
    <circle cx="340" cy="240" r="9"/>
    <circle cx="360" cy="270" r="9"/>
    <circle cx="320" cy="290" r="9"/>
    <circle cx="356" cy="305" r="9" opacity="0.5"/>
  </g>
  <!-- Schema brackets background -->
  <text x="110" y="460" font-family="monospace" font-size="44" fill="#FF8F00" opacity="0.5">{ }</text>
</svg>
