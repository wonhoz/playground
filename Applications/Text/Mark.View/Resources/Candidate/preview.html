<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mark.View — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; margin: 0; padding: 32px; font-family: Arial, sans-serif; color: #e0e0e0; }
    h1 { color: #34d399; margin-bottom: 8px; font-size: 20px; }
    p { color: #888; margin: 0 0 24px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
    .item:hover { border-color: #34d399; }
    .item img { width: 120px; height: 120px; border-radius: 16px; display: block; margin: 0 auto 10px; }
    .item span { font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Mark.View — App Icon Candidates</h1>
  <p>마크다운 프리뷰어 | 10개 아이콘 후보</p>
  <div class="grid">
    <div class="item"><img src="candidate_01_markdown_symbol_blue.svg"><span>01 · markdown_symbol_blue</span></div>
    <div class="item"><img src="candidate_02_split_preview_green.svg"><span>02 · split_preview_green</span></div>
    <div class="item"><img src="candidate_03_document_pen_amber.svg"><span>03 · document_pen_amber</span></div>
    <div class="item"><img src="candidate_04_heading_hash_purple.svg"><span>04 · heading_hash_purple</span></div>
    <div class="item"><img src="candidate_05_eye_preview_cyan.svg"><span>05 · eye_preview_cyan</span></div>
    <div class="item"><img src="candidate_06_code_block_dark.svg"><span>06 · code_block_dark</span></div>
    <div class="item"><img src="candidate_07_feather_writing_rose.svg"><span>07 · feather_writing_rose</span></div>
    <div class="item"><img src="candidate_08_table_chart_slate.svg"><span>08 · table_chart_slate</span></div>
    <div class="item"><img src="candidate_09_links_chain_teal.svg"><span>09 · links_chain_teal</span></div>
    <div class="item"><img src="candidate_10_render_split_sunset.svg"><span>10 · render_split_sunset</span></div>
  </div>
</body>
</html>
