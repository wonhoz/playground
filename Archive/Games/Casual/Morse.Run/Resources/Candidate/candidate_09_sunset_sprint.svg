<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="40%" stop-color="#8B0050"/>
      <stop offset="70%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#8B0050"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun on horizon -->
  <circle cx="256" cy="340" r="80" fill="#FFB300" opacity="0.85"/>
  <circle cx="256" cy="340" r="65" fill="#FF8C00" opacity="0.7"/>
  <!-- Horizon line -->
  <rect x="0" y="335" width="512" height="180" rx="0" fill="#1A0010" opacity="0.9"/>
  <rect x="0" y="330" width="512" height="10" fill="#FF4500" opacity="0.6"/>
  <!-- Sun rays through horizon -->
  <rect x="248" y="250" width="16" height="80" fill="#FFB300" opacity="0.3"/>
  <!-- Runner silhouette -->
  <circle cx="200" cy="255" r="24" fill="#1A0010"/>
  <line x1="200" y1="279" x2="200" y2="330" stroke="#1A0010" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="305" x2="178" y2="330" stroke="#1A0010" stroke-width="9" stroke-linecap="round"/>
  <line x1="200" y1="305" x2="222" y2="325" stroke="#1A0010" stroke-width="9" stroke-linecap="round"/>
  <line x1="200" y1="292" x2="176" y2="276" stroke="#1A0010" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="292" x2="226" y2="280" stroke="#1A0010" stroke-width="8" stroke-linecap="round"/>
  <!-- Morse reflection on ground -->
  <circle cx="150" cy="360" r="9" fill="#FF8C00" opacity="0.6"/>
  <rect x="170" y="353" width="26" height="14" rx="7" fill="#FF8C00" opacity="0.6"/>
  <circle cx="208" cy="360" r="9" fill="#FF8C00" opacity="0.6"/>
  <rect x="228" y="353" width="26" height="14" rx="7" fill="#FFB300" opacity="0.5"/>
  <circle cx="266" cy="360" r="9" fill="#FFB300" opacity="0.5"/>
</svg>
