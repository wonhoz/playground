<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 보라 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 음악 파일 카드 -->
  <rect x="180" y="160" width="664" height="700" rx="32" fill="#5E35B1"/>
  <!-- 파일 상단 귀접기 -->
  <polygon points="700,160 844,304 700,304" fill="#4527A0"/>
  <!-- 음표 아이콘 -->
  <text x="512" y="340" font-family="'Segoe UI', sans-serif" font-size="140" fill="#EDE7F6" text-anchor="middle">♪</text>
  <!-- Layer 3: 태그 필드 레이블들 -->
  <!-- Title 필드 -->
  <rect x="220" y="390" width="584" height="72" rx="12" fill="#7E57C2"/>
  <text x="260" y="441" font-family="'Consolas', monospace" font-size="44" fill="#FFF176" font-weight="700">Title</text>
  <text x="500" y="441" font-family="'Consolas', monospace" font-size="38" fill="white">Bohemian...</text>
  <!-- Artist 필드 -->
  <rect x="220" y="476" width="584" height="72" rx="12" fill="#7E57C2" opacity="0.85"/>
  <text x="260" y="527" font-family="'Consolas', monospace" font-size="44" fill="#FFF176" font-weight="700">Artist</text>
  <text x="500" y="527" font-family="'Consolas', monospace" font-size="38" fill="white">Queen</text>
  <!-- Album 필드 -->
  <rect x="220" y="562" width="584" height="72" rx="12" fill="#7E57C2" opacity="0.7"/>
  <text x="260" y="613" font-family="'Consolas', monospace" font-size="44" fill="#FFF176" font-weight="700">Album</text>
  <text x="500" y="613" font-family="'Consolas', monospace" font-size="38" fill="white">A Night...</text>
  <!-- Genre 필드 -->
  <rect x="220" y="648" width="584" height="72" rx="12" fill="#7E57C2" opacity="0.55"/>
  <text x="260" y="699" font-family="'Consolas', monospace" font-size="44" fill="#FFF176" font-weight="700">Genre</text>
  <text x="500" y="699" font-family="'Consolas', monospace" font-size="38" fill="white">Rock</text>
  <!-- 편집 완료 체크 배지 -->
  <circle cx="820" cy="820" r="80" fill="#F9A825"/>
  <text x="820" y="848" font-family="'Segoe UI', sans-serif" font-size="90" fill="white" text-anchor="middle">✓</text>
</svg>
