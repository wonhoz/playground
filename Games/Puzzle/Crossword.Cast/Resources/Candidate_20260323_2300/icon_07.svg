<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <clipPath id="clip07">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <g clip-path="url(#clip07)">
    <!-- Layer 2: 격자 + 화살표 -->
    <!-- 격자 4x4 -->
    <g transform="translate(162, 162)">
      <rect x="0"   y="0"   width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="170" y="0"   width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="340" y="0"   width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="510" y="0"   width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>

      <rect x="0"   y="170" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="170" y="170" width="160" height="160" fill="rgba(253,230,138,0.3)" stroke="#FDE68A" stroke-width="10" rx="12"/>
      <rect x="340" y="170" width="160" height="160" fill="rgba(253,230,138,0.3)" stroke="#FDE68A" stroke-width="10" rx="12"/>
      <rect x="510" y="170" width="160" height="160" fill="rgba(253,230,138,0.3)" stroke="#FDE68A" stroke-width="10" rx="12"/>

      <rect x="0"   y="340" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="170" y="340" width="160" height="160" fill="rgba(125,211,252,0.3)" stroke="#7DD3FC" stroke-width="10" rx="12"/>
      <rect x="340" y="340" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="510" y="340" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>

      <rect x="0"   y="510" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="170" y="510" width="160" height="160" fill="rgba(125,211,252,0.3)" stroke="#7DD3FC" stroke-width="10" rx="12"/>
      <rect x="340" y="510" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
      <rect x="510" y="510" width="160" height="160" fill="rgba(125,211,252,0.2)" stroke="#7DD3FC" stroke-width="7" rx="12"/>
    </g>
    <!-- 가로 화살표 (→) -->
    <line x1="232" y1="332" x2="780" y2="332" stroke="#FDE68A" stroke-width="20" stroke-linecap="round"/>
    <polygon points="780,302 840,332 780,362" fill="#FDE68A"/>
    <!-- 세로 화살표 (↓) -->
    <line x1="332" y1="232" x2="332" y2="780" stroke="#7DD3FC" stroke-width="20" stroke-linecap="round"/>
    <polygon points="302,780 332,840 362,780" fill="#7DD3FC"/>
    <!-- Layer 3: 레이블 -->
    <text x="860" y="342" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FDE68A" dominant-baseline="middle">→</text>
    <text x="342" y="870" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#7DD3FC" text-anchor="middle">↓</text>
  </g>
</svg>
