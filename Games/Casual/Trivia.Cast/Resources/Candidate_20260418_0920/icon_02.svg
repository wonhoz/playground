<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 크림-아이보리 배경 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <g clip-path="url(#clip02)">
    <!-- Layer 2: 12카테고리 이모지 격자 (4×3) -->
    <!-- 행 1 -->
    <!-- 과학 🔬 -->
    <rect x="80" y="110" width="196" height="180" rx="20" fill="#E3F2FD"/>
    <text x="178" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🔬</text>
    <text x="178" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#1565C0" text-anchor="middle">과학</text>

    <!-- 역사 📜 -->
    <rect x="296" y="110" width="196" height="180" rx="20" fill="#F3E5F5"/>
    <text x="394" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📜</text>
    <text x="394" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#7B1FA2" text-anchor="middle">역사</text>

    <!-- IT 💻 -->
    <rect x="512" y="110" width="196" height="180" rx="20" fill="#E8F5E9"/>
    <text x="610" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">💻</text>
    <text x="610" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#2E7D32" text-anchor="middle">IT</text>

    <!-- 스포츠 ⚽ -->
    <rect x="728" y="110" width="196" height="180" rx="20" fill="#FFF3E0"/>
    <text x="826" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">⚽</text>
    <text x="826" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#E65100" text-anchor="middle">스포츠</text>

    <!-- 행 2 -->
    <!-- 영화 🎬 -->
    <rect x="80" y="310" width="196" height="180" rx="20" fill="#FCE4EC"/>
    <text x="178" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎬</text>
    <text x="178" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#C62828" text-anchor="middle">영화</text>

    <!-- 음악 🎵 -->
    <rect x="296" y="310" width="196" height="180" rx="20" fill="#E8EAF6"/>
    <text x="394" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎵</text>
    <text x="394" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#3949AB" text-anchor="middle">음악</text>

    <!-- 음식 🍜 -->
    <rect x="512" y="310" width="196" height="180" rx="20" fill="#F9FBE7"/>
    <text x="610" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🍜</text>
    <text x="610" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#558B2F" text-anchor="middle">음식</text>

    <!-- 지리 🌍 -->
    <rect x="728" y="310" width="196" height="180" rx="20" fill="#E0F2F1"/>
    <text x="826" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🌍</text>
    <text x="826" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#00695C" text-anchor="middle">지리</text>

    <!-- 행 3 (나머지 4개 카드를 한 줄로) -->
    <!-- 수학 🔢 -->
    <rect x="80" y="510" width="196" height="180" rx="20" fill="#E8EAF6"/>
    <text x="178" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🔢</text>
    <text x="178" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#283593" text-anchor="middle">수학</text>

    <!-- 예술 🎨 -->
    <rect x="296" y="510" width="196" height="180" rx="20" fill="#FBE9E7"/>
    <text x="394" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎨</text>
    <text x="394" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#BF360C" text-anchor="middle">예술</text>

    <!-- 게임 🎮 -->
    <rect x="512" y="510" width="196" height="180" rx="20" fill="#E8F5E9"/>
    <text x="610" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎮</text>
    <text x="610" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#1B5E20" text-anchor="middle">게임</text>

    <!-- 일반상식 🌟 -->
    <rect x="728" y="510" width="196" height="180" rx="20" fill="#FFFDE7"/>
    <text x="826" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🌟</text>
    <text x="826" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="#F57F17" text-anchor="middle">일반상식</text>

    <!-- Layer 3: 하단 타이틀 배너 -->
    <rect x="130" y="740" width="764" height="100" rx="28" fill="#1A1464"/>
    <text x="512" y="804" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="66" fill="#FFD54F" text-anchor="middle">TRIVIA CAST</text>
  </g>
</svg>
