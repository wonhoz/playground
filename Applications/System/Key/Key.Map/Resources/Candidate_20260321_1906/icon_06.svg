<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: 치트시트 종이가 키보드에 투영 (metaphor) | 레이어드 | 아이보리+형광 포인트 -->
  <!-- Layer 1: 배경 - 따뜻한 아이보리 -->
  <defs>
    <linearGradient id="bg06k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFEF8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06k)"/>

  <!-- Layer 2: 뒤쪽 종이 (치트시트) - 살짝 기울어짐 -->
  <g transform="rotate(-4, 512, 500)">
    <rect x="200" y="170" width="624" height="660" rx="12" fill="#FFFEF5" stroke="#D4CAAA" stroke-width="2"/>
    <!-- 종이 줄 (선) -->
    <line x1="230" y1="240" x2="794" y2="240" stroke="#E8E0C8" stroke-width="1.5"/>
    <line x1="230" y1="270" x2="794" y2="270" stroke="#E8E0C8" stroke-width="1.5"/>
    <line x1="230" y1="300" x2="794" y2="300" stroke="#E8E0C8" stroke-width="1.5"/>
    <line x1="230" y1="330" x2="794" y2="330" stroke="#E8E0C8" stroke-width="1.5"/>
    <line x1="230" y1="360" x2="794" y2="360" stroke="#E8E0C8" stroke-width="1.5"/>
    <!-- 단축키 텍스트들 -->
    <text x="248" y="233" font-family="Consolas,monospace" font-size="18" fill="#8B5CF6" font-weight="bold">Ctrl+Shift+P</text>
    <text x="440" y="233" font-family="Segoe UI,Arial" font-size="16" fill="#6B5E8A">— 명령 팔레트</text>
    <text x="248" y="263" font-family="Consolas,monospace" font-size="18" fill="#3B82F6" font-weight="bold">Ctrl+P</text>
    <text x="390" y="263" font-family="Segoe UI,Arial" font-size="16" fill="#3A5A8A">— 파일 빠른 열기</text>
    <text x="248" y="293" font-family="Consolas,monospace" font-size="18" fill="#F59E0B" font-weight="bold">Ctrl+Z / Ctrl+Y</text>
    <text x="490" y="293" font-family="Segoe UI,Arial" font-size="16" fill="#8A6A30">— Undo/Redo</text>
    <text x="248" y="323" font-family="Consolas,monospace" font-size="18" fill="#10B981" font-weight="bold">F5</text>
    <text x="310" y="323" font-family="Segoe UI,Arial" font-size="16" fill="#2A7A50">— 디버그 시작</text>
    <text x="248" y="353" font-family="Consolas,monospace" font-size="18" fill="#06B6D4" font-weight="bold">F12</text>
    <text x="318" y="353" font-family="Segoe UI,Arial" font-size="16" fill="#0A6080">— 정의로 이동</text>
    <!-- 제목 -->
    <text x="512" y="208" text-anchor="middle" font-family="Segoe UI,Arial" font-size="22" font-weight="bold" fill="#2A1A5A">VS Code 단축키</text>
  </g>

  <!-- Layer 2: 앞쪽 키보드 (키들이 치트시트 위에 겹쳐짐) -->
  <rect x="120" y="500" width="784" height="260" rx="16" fill="#1A1A2E" stroke="#2A2A45" stroke-width="2"/>

  <!-- 키 행들 -->
  <!-- 행 1 (기능키 행) -->
  <rect x="140" y="520" width="46" height="40" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <text x="163" y="546" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#555577">Esc</text>
  <rect x="196" y="520" width="40" height="40" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <text x="216" y="546" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#555577">F1</text>
  <rect x="242" y="520" width="40" height="40" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <text x="262" y="546" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#555577">F2</text>
  <!-- F5 하이라이트 -->
  <rect x="372" y="520" width="40" height="40" rx="5" fill="#10B981" stroke="#34D399" stroke-width="1.5"/>
  <text x="392" y="546" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="white">F5</text>
  <!-- F12 하이라이트 -->
  <rect x="672" y="520" width="40" height="40" rx="5" fill="#06B6D4" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="692" y="546" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" font-weight="bold" fill="white">F12</text>

  <!-- 행 2 -->
  <rect x="140" y="568" width="46" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="163" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#666688">`</text>
  <rect x="192" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="213" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">1</text>
  <rect x="240" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="261" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">2</text>
  <rect x="288" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="309" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">3</text>
  <rect x="336" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="357" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">4</text>
  <rect x="384" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="405" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">5</text>
  <rect x="432" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="453" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">6</text>
  <rect x="480" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="501" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">7</text>
  <rect x="528" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="549" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">8</text>
  <rect x="576" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="597" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">9</text>
  <rect x="624" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="645" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">0</text>
  <rect x="672" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <rect x="720" y="568" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <rect x="768" y="568" width="60" height="42" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <text x="798" y="595" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#555577">Back</text>

  <!-- 행 3 (QWERTY) -->
  <rect x="140" y="618" width="58" height="42" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <text x="169" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#555577">Tab</text>
  <!-- P 키 하이라이트 -->
  <rect x="204" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="225" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">Q</text>
  <rect x="252" y="618" width="42" height="42" rx="5" fill="#8B5CF6" stroke="#A78BFA" stroke-width="1.5"/><text x="273" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" font-weight="bold" fill="white">W</text>
  <rect x="300" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="321" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">E</text>
  <rect x="348" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="369" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">R</text>
  <rect x="396" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="417" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">T</text>
  <rect x="444" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="465" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">Y</text>
  <rect x="492" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="513" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">U</text>
  <rect x="540" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="561" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">I</text>
  <rect x="588" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/><text x="609" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" fill="#888899">O</text>
  <rect x="636" y="618" width="42" height="42" rx="5" fill="#8B5CF6" stroke="#A78BFA" stroke-width="1.5"/><text x="657" y="645" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" font-weight="bold" fill="white">P</text>
  <rect x="684" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <rect x="732" y="618" width="42" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <rect x="780" y="618" width="48" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>

  <!-- 행 4 (Ctrl 행) -->
  <rect x="140" y="668" width="66" height="42" rx="5" fill="#3B82F6" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="173" y="695" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="white">Ctrl</text>
  <rect x="212" y="668" width="42" height="42" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <rect x="260" y="668" width="42" height="42" rx="5" fill="#F59E0B" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="281" y="695" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="white">Alt</text>
  <rect x="308" y="668" width="210" height="42" rx="5" fill="#1E1E30" stroke="#252538" stroke-width="1"/>
  <text x="413" y="695" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#555577">Space</text>
  <rect x="524" y="668" width="42" height="42" rx="5" fill="#F59E0B" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="545" y="695" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="white">Alt</text>
  <rect x="572" y="668" width="42" height="42" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <rect x="620" y="668" width="42" height="42" rx="5" fill="#161622" stroke="#252538" stroke-width="1"/>
  <rect x="668" y="668" width="160" height="42" rx="5" fill="#3B82F6" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="748" y="695" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="white">Ctrl</text>

  <!-- Layer 3: 종이에서 키보드로 내려오는 투영 선 (레이어드 효과) -->
  <line x1="430" y1="380" x2="392" y2="520" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="692" y1="380" x2="692" y2="520" stroke="#06B6D4" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
</svg>
