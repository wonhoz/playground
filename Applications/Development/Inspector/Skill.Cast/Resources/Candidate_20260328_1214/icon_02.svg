<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 파스텔 하늘 -->
  <defs>
    <linearGradient id="bg_sc02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_sc02)"/>

  <!-- Commands 카드 (좌상) -->
  <rect x="100" y="160" width="380" height="280" rx="20" fill="#1565C0" stroke="white" stroke-width="8"/>
  <text x="290" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="bold" fill="#BBDEFB">Commands</text>
  <text x="290" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="900" fill="white">12</text>
  <text x="290" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#90CAF9">/commit /review ...</text>

  <!-- Skills 카드 (우상) -->
  <rect x="544" y="160" width="380" height="280" rx="20" fill="#2E7D32" stroke="white" stroke-width="8"/>
  <text x="734" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="bold" fill="#C8E6C9">Skills</text>
  <text x="734" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="900" fill="white">8</text>
  <text x="734" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#A5D6A7">brainstorm, review...</text>

  <!-- Memory 카드 (좌하) -->
  <rect x="100" y="484" width="380" height="280" rx="20" fill="#6A1B9A" stroke="white" stroke-width="8"/>
  <text x="290" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="bold" fill="#E1BEE7">Memory</text>
  <text x="290" y="654" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="900" fill="white">5</text>
  <text x="290" y="720" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#CE93D8">feedback, context...</text>

  <!-- Plugins 카드 (우하) -->
  <rect x="544" y="484" width="380" height="280" rx="20" fill="#E65100" stroke="white" stroke-width="8"/>
  <text x="734" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="bold" fill="#FFE0B2">Plugins</text>
  <text x="734" y="654" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="900" fill="white">3</text>
  <text x="734" y="720" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#FFCCBC">mcp, hooks, ext...</text>

  <!-- 하단 타이틀 바 -->
  <rect x="100" y="808" width="824" height="80" rx="20" fill="#0D47A1" stroke="white" stroke-width="6"/>
  <text x="512" y="860" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="900" fill="white">Skill.Cast Dashboard</text>

  <!-- 중앙 연결 점 -->
  <circle cx="512" cy="422" r="28" fill="white" stroke="#1565C0" stroke-width="8"/>
  <text x="512" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900" fill="#1565C0">C</text>
</svg>
