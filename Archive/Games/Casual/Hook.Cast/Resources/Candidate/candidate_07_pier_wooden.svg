<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="50%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0522d"/>
      <stop offset="100%" stop-color="#7a3b1e"/>
    </linearGradient>
    <linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8cbc"/>
      <stop offset="100%" stop-color="#1066a0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="80" rx="52" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="155" cy="72" rx="36" ry="24" fill="white" opacity="0.8"/>
  <ellipse cx="85" cy="76" rx="32" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="380" cy="100" rx="44" ry="24" fill="white" opacity="0.7"/>
  <ellipse cx="412" cy="94" rx="30" ry="20" fill="white" opacity="0.7"/>
  <!-- Water -->
  <path d="M0 320 Q64 310 128 320 Q192 330 256 320 Q320 310 384 320 Q448 330 512 320 L512 512 L0 512 Z" fill="url(#water2)"/>
  <path d="M0 332 Q64 322 128 332 Q192 342 256 332 Q320 322 384 332 Q448 342 512 332" fill="none" stroke="#3aa8d8" stroke-width="2" opacity="0.5"/>
  <!-- Pier platform -->
  <rect x="140" y="280" width="260" height="40" rx="4" fill="url(#wood)"/>
  <line x1="160" y1="280" x2="160" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="280" x2="200" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="280" x2="240" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="280" x2="280" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="280" x2="320" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <line x1="360" y1="280" x2="360" y2="320" stroke="#5d3209" stroke-width="2" opacity="0.5"/>
  <!-- Pier pillars -->
  <rect x="160" y="318" width="18" height="80" rx="4" fill="#6b3a1f"/>
  <rect x="220" y="318" width="18" height="80" rx="4" fill="#6b3a1f"/>
  <rect x="280" y="318" width="18" height="80" rx="4" fill="#6b3a1f"/>
  <rect x="340" y="318" width="18" height="80" rx="4" fill="#6b3a1f"/>
  <!-- Railing -->
  <rect x="140" y="258" width="260" height="10" rx="4" fill="#8B4513"/>
  <line x1="160" y1="258" x2="160" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="200" y1="258" x2="200" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="240" y1="258" x2="240" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="280" y1="258" x2="280" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="320" y1="258" x2="320" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="360" y1="258" x2="360" y2="280" stroke="#8B4513" stroke-width="5"/>
  <line x1="395" y1="258" x2="395" y2="280" stroke="#8B4513" stroke-width="5"/>
  <!-- Fisherman on pier -->
  <circle cx="370" cy="250" r="12" fill="#34495e"/>
  <rect x="364" y="261" width="12" height="22" rx="4" fill="#34495e"/>
  <!-- Fishing rod -->
  <line x1="374" y1="265" x2="430" y2="230" stroke="#5d4037" stroke-width="6" stroke-linecap="round"/>
  <line x1="430" y1="230" x2="460" y2="215" stroke="#5d4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Fishing line -->
  <line x1="460" y1="215" x2="460" y2="338" stroke="#bbb" stroke-width="1.5"/>
  <!-- Hook -->
  <path d="M460 338 Q462 358 448 368 Q436 376 430 368 Q424 360 430 354 Q436 348 440 354" fill="none" stroke="#888" stroke-width="5" stroke-linecap="round"/>
  <!-- Fish jumping -->
  <ellipse cx="280" cy="336" rx="28" ry="12" fill="#ff7043" transform="rotate(-30 280 336)"/>
  <path d="M302 322 L318 312 L314 328 Z" fill="#ff7043"/>
  <circle cx="270" cy="330" r="4" fill="white"/>
  <circle cx="272" cy="330" r="2" fill="#333"/>
</svg>
