<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#102030"/>
    </linearGradient>
    <linearGradient id="area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="80" y1="140" x2="432" y2="140" stroke="#37474f" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="210" x2="432" y2="210" stroke="#37474f" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#37474f" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="350" x2="432" y2="350" stroke="#37474f" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="420" x2="432" y2="420" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Vertical axis -->
  <line x1="80" y1="100" x2="80" y2="430" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Boot graph area fill -->
  <path d="M80 420 L130 415 L180 390 L200 340 L220 280 L260 260 L300 240 L340 230 L380 220 L432 215 L432 420 Z" fill="url(#area)"/>
  <!-- Boot graph line -->
  <path d="M80 420 L130 415 L180 390 L200 340 L220 280 L260 260 L300 240 L340 230 L380 220 L432 215" stroke="#00e5ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- CPU load during boot (separate line) -->
  <path d="M80 350 L130 300 L180 250 L200 280 L220 200 L260 180 L300 210 L340 230 L380 240 L432 245" stroke="#ea80fc" stroke-width="2.5" fill="none" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.8"/>
  <!-- Data points -->
  <circle cx="130" cy="415" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="180" cy="390" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="200" cy="340" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="220" cy="280" r="6" fill="#ffd740" filter="url(#glow)"/>
  <circle cx="260" cy="260" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="300" cy="240" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <!-- X-axis ticks -->
  <line x1="130" y1="420" x2="130" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="180" y1="420" x2="180" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="220" y1="420" x2="220" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="260" y1="420" x2="260" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="300" y1="420" x2="300" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="340" y1="420" x2="340" y2="428" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="380" y1="420" x2="380" y2="428" stroke="#546e7a" stroke-width="1.5"/>
</svg>