<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0520"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon outlined mosaic tiles - large checker pattern -->
  <rect x="80" y="80" width="76" height="76" rx="8" fill="none" stroke="#FF0080" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="80" y="80" width="76" height="76" rx="8" fill="#FF0080" opacity="0.1"/>
  <rect x="164" y="80" width="76" height="76" rx="8" fill="none" stroke="#00FFFF" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="164" y="80" width="76" height="76" rx="8" fill="#00FFFF" opacity="0.1"/>
  <rect x="248" y="80" width="76" height="76" rx="8" fill="none" stroke="#FFFF00" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="248" y="80" width="76" height="76" rx="8" fill="#FFFF00" opacity="0.1"/>
  <rect x="332" y="80" width="76" height="76" rx="8" fill="none" stroke="#00FF80" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="332" y="80" width="76" height="76" rx="8" fill="#00FF80" opacity="0.1"/>
  <!-- Gapped row 1: filled -->
  <rect x="80" y="164" width="76" height="76" rx="8" fill="#00FFFF" opacity="0.15" stroke="#00FFFF" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="164" y="164" width="76" height="76" rx="8" fill="#FF0080" opacity="0.15" stroke="#FF0080" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="248" y="164" width="76" height="76" rx="8" fill="#00FF80" opacity="0.15" stroke="#00FF80" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="332" y="164" width="76" height="76" rx="8" fill="#FFFF00" opacity="0.15" stroke="#FFFF00" stroke-width="3" filter="url(#neonGlow)"/>
  <!-- Row 3 -->
  <rect x="80" y="248" width="76" height="76" rx="8" fill="#FFFF00" opacity="0.15" stroke="#FFFF00" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="164" y="248" width="76" height="76" rx="8" fill="#00FF80" opacity="0.15" stroke="#00FF80" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="248" y="248" width="76" height="76" rx="8" fill="#FF0080" opacity="0.35" stroke="#FF0080" stroke-width="5" filter="url(#neonGlow)"/>
  <rect x="332" y="248" width="76" height="76" rx="8" fill="#00FFFF" opacity="0.15" stroke="#00FFFF" stroke-width="3" filter="url(#neonGlow)"/>
  <!-- Row 4 -->
  <rect x="80" y="332" width="76" height="76" rx="8" fill="#00FF80" opacity="0.15" stroke="#00FF80" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="164" y="332" width="76" height="76" rx="8" fill="#FFFF00" opacity="0.15" stroke="#FFFF00" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="248" y="332" width="76" height="76" rx="8" fill="#00FFFF" opacity="0.15" stroke="#00FFFF" stroke-width="3" filter="url(#neonGlow)"/>
  <rect x="332" y="332" width="76" height="76" rx="8" fill="#FF0080" opacity="0.15" stroke="#FF0080" stroke-width="3" filter="url(#neonGlow)"/>
  <!-- Central pixel art camera icon -->
  <rect x="213" y="213" width="86" height="66" rx="6" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.8"/>
  <circle cx="256" cy="246" r="20" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.8"/>
  <circle cx="256" cy="246" r="10" fill="#FFFFFF" opacity="0.6"/>
  <rect x="228" y="205" width="30" height="14" rx="7" fill="#FFFFFF" opacity="0.6"/>
  <!-- Fifth column hint -->
  <rect x="420" y="80" width="48" height="76" rx="6" fill="none" stroke="#FF0080" stroke-width="2" opacity="0.4"/>
  <rect x="420" y="164" width="48" height="76" rx="6" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.4"/>
  <rect x="420" y="248" width="48" height="76" rx="6" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.4"/>
  <rect x="420" y="332" width="48" height="76" rx="6" fill="none" stroke="#00FF80" stroke-width="2" opacity="0.4"/>
</svg>
