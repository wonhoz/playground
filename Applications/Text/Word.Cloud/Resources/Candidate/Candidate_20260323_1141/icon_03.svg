<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 앰버 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0F00"/>
  <!-- Layer 2: 빈도수 막대 → 단어로 변환 (좌: 바, 우: 단어) -->
  <!-- 좌측 바 차트 -->
  <text x="140" y="240" font-family="Arial" font-size="28" fill="#FF8F00">freq</text>
  <!-- 5개 막대 (크기별) -->
  <rect x="140" y="440" width="80" height="240" rx="6" fill="#FFB300"/>
  <rect x="240" y="380" width="80" height="300" rx="6" fill="#FF8F00"/>
  <rect x="340" y="300" width="80" height="380" rx="6" fill="#FF6D00"/>
  <rect x="440" y="360" width="80" height="320" rx="6" fill="#FF8F00"/>
  <rect x="540" y="440" width="80" height="240" rx="6" fill="#FFB300"/>
  <!-- 화살표 -->
  <line x1="650" y1="512" x2="730" y2="512" stroke="#FFD740" stroke-width="24" stroke-linecap="round"/>
  <polygon points="720,484 770,512 720,540" fill="#FFD740"/>
  <!-- 우측 워드 클라우드 단어들 -->
  <text x="780" y="370" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FFD740" text-anchor="middle">big</text>
  <text x="820" y="460" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#FF8F00" text-anchor="middle">med</text>
  <text x="780" y="530" font-family="Arial" font-size="48" font-weight="700" fill="#FFB300" text-anchor="middle">mid</text>
  <text x="830" y="590" font-family="Arial" font-size="40" fill="#FF6D00" text-anchor="middle">sm</text>
  <text x="790" y="640" font-family="Arial" font-size="28" fill="#FFB300" opacity="0.7" text-anchor="middle">tiny</text>
  <!-- Layer 3: 기준선 -->
  <line x1="140" y1="700" x2="880" y2="700" stroke="#FF6D00" stroke-width="4" opacity="0.5"/>
</svg>
