<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#064E3B"/>
  <!-- Layer 2: Split view - left image, right text art -->
  <!-- Left panel (image thumbnail) -->
  <rect x="120" y="220" width="350" height="520" rx="16" fill="#0F3D22"/>
  <rect x="120" y="220" width="350" height="50" rx="16" fill="#166534"/>
  <rect x="120" y="250" width="350" height="20" fill="#166534"/>
  <text x="295" y="252" font-family="Arial,sans-serif" font-size="15" fill="#86EFAC" text-anchor="middle">입력 이미지</text>
  <!-- Colorful image content in left panel -->
  <rect x="140" y="290" width="310" height="220" rx="8" fill="#1A5C34"/>
  <!-- Simple mountain/landscape colors -->
  <rect x="140" y="290" width="310" height="90" rx="0" fill="#1D4ED8" opacity="0.6"/>
  <polygon points="220,380 295,290 370,380" fill="#22C55E" opacity="0.8"/>
  <polygon points="280,380 370,300 460,380" fill="#16A34A" opacity="0.7"/>
  <rect x="140" y="420" width="310" height="90" rx="0" fill="#92400E" opacity="0.5"/>
  <!-- Image meta -->
  <text x="295" y="550" font-family="Consolas,monospace" font-size="15" fill="#6EE7B7" text-anchor="middle">photo.jpg</text>
  <text x="295" y="572" font-family="Consolas,monospace" font-size="13" fill="#4ADE80" text-anchor="middle">640 × 480</text>
  <!-- Divider + Arrow -->
  <line x1="485" y1="440" x2="540" y2="440" stroke="#4ADE80" stroke-width="12" stroke-linecap="round"/>
  <polygon points="540,420 580,440 540,460" fill="#4ADE80"/>
  <!-- Right panel (text art result) -->
  <rect x="575" y="220" width="350" height="520" rx="16" fill="#0A1F12"/>
  <rect x="575" y="220" width="350" height="50" rx="16" fill="#166534"/>
  <rect x="575" y="250" width="350" height="20" fill="#166534"/>
  <text x="750" y="252" font-family="Arial,sans-serif" font-size="15" fill="#86EFAC" text-anchor="middle">텍스트 아트</text>
  <!-- ASCII art content in right panel -->
  <text x="595" y="300" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">...:::---===++*</text>
  <text x="595" y="324" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">..::--==++**##@</text>
  <text x="595" y="348" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">..:--=+*#@@@@@@</text>
  <text x="595" y="372" font-family="Consolas,monospace" font-size="14" fill="#4ADE80">..:-=+*#@@@####</text>
  <text x="595" y="396" font-family="Consolas,monospace" font-size="14" fill="#86EFAC">...::--==+++**#</text>
  <text x="595" y="420" font-family="Consolas,monospace" font-size="14" fill="#86EFAC">....:::---==++*</text>
  <text x="595" y="444" font-family="Consolas,monospace" font-size="14" fill="#6EE7B7" opacity="0.8">......::---==++</text>
  <text x="595" y="468" font-family="Consolas,monospace" font-size="14" fill="#6EE7B7" opacity="0.7">.......:::---==</text>
</svg>