<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#001A0A"/>
  <!-- Layer 2: curl 코드 터미널 스타일 -->
  <!-- 터미널 창 -->
  <rect x="60" y="80" width="904" height="864" rx="20" fill="#0D1117"/>
  <!-- 터미널 상단 바 -->
  <rect x="60" y="80" width="904" height="60" rx="20" fill="#161B22"/>
  <rect x="60" y="120" width="904" height="20" fill="#161B22"/>
  <circle cx="116" cy="110" r="16" fill="#FF5F57"/>
  <circle cx="168" cy="110" r="16" fill="#FEBC2E"/>
  <circle cx="220" cy="110" r="16" fill="#28C840"/>
  <!-- curl 명령어 -->
  <text x="100" y="210" font-size="42" fill="#3FB950" font-family="monospace">$ curl -X POST \</text>
  <text x="100" y="265" font-size="42" fill="#79C0FF" font-family="monospace">  -H "Authorization: \</text>
  <text x="100" y="320" font-size="42" fill="#79C0FF" font-family="monospace">       Bearer {{token}}" \</text>
  <text x="100" y="375" font-size="42" fill="#79C0FF" font-family="monospace">  -H "Content-Type: \</text>
  <text x="100" y="430" font-size="42" fill="#79C0FF" font-family="monospace">       application/json" \</text>
  <text x="100" y="485" font-size="42" fill="#A5D6A7" font-family="monospace">  -d '&#123;"name":"test"&#125;' \</text>
  <text x="100" y="540" font-size="42" fill="#E6EDF3" font-family="monospace">  https://api.example/v1/</text>
  <!-- 구분선 -->
  <rect x="100" y="580" width="824" height="4" rx="2" fill="#30363D"/>
  <!-- 응답 -->
  <text x="100" y="640" font-size="42" fill="#6E7681" font-family="monospace">HTTP/2 200 OK</text>
  <text x="100" y="695" font-size="42" fill="#7EE787" font-family="monospace">&#123;</text>
  <text x="100" y="750" font-size="42" fill="#79C0FF" font-family="monospace">  "status": "created",</text>
  <text x="100" y="805" font-size="42" fill="#79C0FF" font-family="monospace">  "id": "abc-123"</text>
  <text x="100" y="860" font-size="42" fill="#7EE787" font-family="monospace">&#125;</text>
  <!-- Layer 3: 커서 블링크 -->
  <rect x="100" y="890" width="24" height="44" rx="3" fill="#3FB950"/>
</svg>
