<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 하늘색 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#38BDF8"/>
  <!-- Layer 2: 돋보기 -->
  <!-- 돋보기 원 -->
  <circle cx="450" cy="430" r="240" fill="white" stroke="#0EA5E9" stroke-width="30"/>
  <circle cx="450" cy="430" r="204" fill="#F0F9FF"/>
  <!-- 돋보기 손잡이 -->
  <line x1="637" y1="617" x2="820" y2="800" stroke="#0EA5E9" stroke-width="60" stroke-linecap="round"/>
  <!-- Layer 3: 돋보기 안에 프롬프트 텍스트 -->
  <rect x="286" y="320" width="328" height="16" rx="4" fill="#BAE6FD"/>
  <rect x="286" y="350" width="260" height="16" rx="4" fill="#BAE6FD"/>
  <!-- 검색어 강조 -->
  <rect x="286" y="385" width="180" height="24" rx="6" fill="#0EA5E9"/>
  <text x="376" y="403" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">{{topic}}</text>
  <rect x="286" y="422" width="300" height="16" rx="4" fill="#BAE6FD"/>
  <rect x="286" y="452" width="240" height="16" rx="4" fill="#BAE6FD"/>
  <!-- 검색 결과 수 -->
  <text x="450" y="530" font-family="sans-serif" font-size="36" fill="#0369A1" text-anchor="middle" font-weight="bold">47</text>
  <text x="450" y="556" font-family="sans-serif" font-size="18" fill="#0369A1" text-anchor="middle">results</text>
</svg>
