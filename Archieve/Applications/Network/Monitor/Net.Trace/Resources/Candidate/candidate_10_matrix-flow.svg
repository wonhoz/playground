<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000a00"/>
      <stop offset="100%" stop-color="#001400"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Matrix rain columns -->
  <g font-family="monospace" font-size="14" opacity="0.4">
    <text x="70" y="100" fill="#00ff00">1</text>
    <text x="70" y="118" fill="#00ff00">0</text>
    <text x="70" y="136" fill="#00cc00">1</text>
    <text x="70" y="154" fill="#008800">0</text>
    <text x="100" y="140" fill="#00ff00">0</text>
    <text x="100" y="158" fill="#00ff00">1</text>
    <text x="100" y="176" fill="#00cc00">1</text>
    <text x="130" y="90" fill="#00ff00">1</text>
    <text x="130" y="108" fill="#00ff00">0</text>
    <text x="130" y="126" fill="#00cc00">1</text>
    <text x="130" y="144" fill="#008800">0</text>
    <text x="380" y="110" fill="#00ff00">0</text>
    <text x="380" y="128" fill="#00ff00">1</text>
    <text x="380" y="146" fill="#00cc00">0</text>
    <text x="410" y="130" fill="#00ff00">1</text>
    <text x="410" y="148" fill="#00ff00">0</text>
    <text x="410" y="166" fill="#008800">1</text>
    <text x="440" y="100" fill="#00ff00">0</text>
    <text x="440" y="118" fill="#00ff00">1</text>
  </g>
  <!-- Central trace path highlighted -->
  <polyline points="80,280 140,260 180,290 220,250 256,270 290,240 340,265 380,245 432,270" fill="none" stroke="#00ff00" stroke-width="4" stroke-linecap="round"/>
  <!-- Hop circles -->
  <circle cx="80" cy="280" r="8" fill="#00ff00"/>
  <circle cx="180" cy="290" r="7" fill="#00cc00"/>
  <circle cx="256" cy="270" r="9" fill="#00ff44" stroke="#00ff00" stroke-width="2"/>
  <circle cx="340" cy="265" r="7" fill="#00cc00"/>
  <circle cx="432" cy="270" r="8" fill="#00ff00"/>
  <!-- Labels -->
  <text x="80" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff00">1ms</text>
  <text x="180" y="318" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff00">5ms</text>
  <text x="256" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff44">12ms</text>
  <text x="340" y="293" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff00">22ms</text>
  <text x="432" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff00">35ms</text>
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#00ff00">NET.TRACE</text>
</svg>
