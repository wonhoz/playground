<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="layerA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="layerB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="layerC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="layerD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="layerE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric layer stack -->
  <!-- Layer 5 (bottom) -->
  <rect x="126" y="380" width="260" height="26" rx="6" fill="url(#layerE)" opacity="0.7"/>
  <rect x="134" y="378" width="8" height="26" rx="3" fill="#92400e"/>
  <!-- Layer 4 -->
  <rect x="126" y="344" width="260" height="26" rx="6" fill="url(#layerD)" opacity="0.78"/>
  <rect x="134" y="342" width="8" height="26" rx="3" fill="#064e3b"/>
  <!-- Layer 3 -->
  <rect x="126" y="308" width="260" height="26" rx="6" fill="url(#layerC)" opacity="0.85"/>
  <rect x="134" y="306" width="8" height="26" rx="3" fill="#0c4a6e"/>
  <!-- Layer 2 -->
  <rect x="126" y="272" width="260" height="26" rx="6" fill="url(#layerB)" opacity="0.9"/>
  <rect x="134" y="270" width="8" height="26" rx="3" fill="#831843"/>
  <!-- Layer 1 (top / active) -->
  <rect x="126" y="228" width="260" height="36" rx="8" fill="url(#layerA)"/>
  <rect x="134" y="226" width="8" height="36" rx="3" fill="#4c1d95"/>
  <!-- Clipboard clip on top -->
  <rect x="218" y="212" width="76" height="22" rx="6" fill="#6d28d9"/>
  <rect x="238" y="206" width="36" height="12" rx="6" fill="#0d0d0d"/>
  <!-- Content lines on top layer -->
  <rect x="150" y="238" width="140" height="8" rx="3" fill="white" opacity="0.5"/>
  <rect x="150" y="250" width="110" height="8" rx="3" fill="white" opacity="0.35"/>
  <!-- Lines on lower layers -->
  <rect x="150" y="280" width="120" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="150" y="316" width="100" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="150" y="352" width="130" height="8" rx="3" fill="white" opacity="0.3"/>
  <rect x="150" y="388" width="90" height="8" rx="3" fill="white" opacity="0.25"/>
</svg>