<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 메인 패널 -->
    <rect x="80" y="90" width="864" height="844" rx="28" fill="#FFFFFF" stroke="#90CAF9" stroke-width="4"/>
    <!-- 헤더 -->
    <rect x="80" y="90" width="864" height="76" rx="28" fill="#1565C0"/>
    <rect x="80" y="138" width="864" height="28" fill="#1565C0"/>
    <text x="160" y="142" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF">🛡 Sys.Clean</text>
    <text x="760" y="142" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#90CAF9" text-anchor="middle">v1.4</text>

    <!-- 카테고리 제목 -->
    <text x="110" y="210" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#1565C0">🗂 임시 파일</text>

    <!-- 항목 1 -->
    <rect x="100" y="224" width="824" height="72" rx="10" fill="#FFEBEE"/>
    <rect x="116" y="240" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#EF5350" stroke-width="3"/>
    <line x1="126" y1="260" x2="146" y2="260" stroke="#EF5350" stroke-width="4"/>
    <text x="174" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#B71C1C">Windows Temp</text>
    <text x="820" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#EF5350" font-weight="700" text-anchor="end">1.2 GB</text>

    <!-- 항목 2 -->
    <rect x="100" y="306" width="824" height="72" rx="10" fill="#FFEBEE"/>
    <rect x="116" y="322" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#EF5350" stroke-width="3"/>
    <line x1="126" y1="342" x2="146" y2="342" stroke="#EF5350" stroke-width="4"/>
    <text x="174" y="352" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#B71C1C">브라우저 캐시</text>
    <text x="820" y="352" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#EF5350" font-weight="700" text-anchor="end">430 MB</text>

    <!-- 카테고리 제목 2 -->
    <text x="110" y="420" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#6A1B9A">🔑 레지스트리</text>

    <!-- 항목 3 -->
    <rect x="100" y="434" width="824" height="72" rx="10" fill="#F3E5F5"/>
    <rect x="116" y="450" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#AB47BC" stroke-width="3"/>
    <line x1="126" y1="470" x2="146" y2="470" stroke="#AB47BC" stroke-width="4"/>
    <text x="174" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#4A148C">공유 DLL 오류</text>
    <text x="820" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#AB47BC" font-weight="700" text-anchor="end">47개</text>

    <!-- 항목 4 -->
    <rect x="100" y="516" width="824" height="72" rx="10" fill="#F3E5F5"/>
    <rect x="116" y="532" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#AB47BC" stroke-width="3"/>
    <line x1="126" y1="552" x2="146" y2="552" stroke="#AB47BC" stroke-width="4"/>
    <text x="174" y="562" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#4A148C">시작 프로그램 오류</text>
    <text x="820" y="562" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#AB47BC" font-weight="700" text-anchor="end">12개</text>

    <!-- 카테고리 제목 3 -->
    <text x="110" y="636" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#2E7D32">📦 설치 프로그램</text>

    <!-- 항목 5 -->
    <rect x="100" y="650" width="824" height="72" rx="10" fill="#E8F5E9"/>
    <rect x="116" y="666" width="40" height="40" rx="8" fill="#43A047" stroke="#43A047" stroke-width="3"/>
    <polyline points="124,686 134,698 152,678" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="174" y="696" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#1B5E20">Visual Studio 2019</text>
    <text x="820" y="696" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#43A047" font-weight="700" text-anchor="end">유효</text>

    <!-- 하단 액션 바 -->
    <rect x="100" y="828" width="824" height="76" rx="20" fill="#1565C0"/>
    <text x="512" y="878" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">🧹 선택 항목 청소 (1.6 GB)</text>
