<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 북마크 리본 달린 문서 | 중앙심볼 | #1A0E3A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A0E3A"/>
  <!-- Layer 2: Document with bookmark -->
  <!-- Document base -->
  <rect x="260" y="180" width="440" height="560" rx="18" fill="#2A1E50" stroke="#4A3880" stroke-width="5"/>
  <!-- Page lines -->
  <line x1="308" y1="280" x2="652" y2="280" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="320" x2="652" y2="320" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="360" x2="580" y2="360" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <!-- Markdown heading -->
  <text x="308" y="250" font-family="monospace" font-size="36" fill="#A78BFA" font-weight="bold"># Hello World</text>
  <!-- Code block -->
  <rect x="308" y="390" width="312" height="80" rx="6" fill="#1A1030"/>
  <text x="324" y="420" font-family="monospace" font-size="16" fill="#4ADE80">**bold** _italic_</text>
  <text x="324" y="448" font-family="monospace" font-size="16" fill="#60A5FA">[link](url)</text>
  <!-- More lines -->
  <line x1="308" y1="500" x2="652" y2="500" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="534" x2="620" y2="534" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <line x1="308" y1="568" x2="640" y2="568" stroke="#3D2E6A" stroke-width="3" stroke-linecap="round"/>
  <!-- Layer 3: Bookmark ribbon -->
  <polygon points="640,178 700,178 700,340 670,310 640,340" fill="#F472B6"/>
  <line x1="640" y1="200" x2="700" y2="200" stroke="#FBCFE8" stroke-width="2" opacity="0.5"/>
  <!-- Star on bookmark -->
  <polygon points="670,220 676,240 696,240 681,252 686,272 670,260 654,272 659,252 644,240 664,240" fill="#FDE68A" opacity="0.9"/>
</svg>
