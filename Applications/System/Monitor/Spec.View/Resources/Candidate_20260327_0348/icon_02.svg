<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright cyan/teal -->
  <rect width="1024" height="1024" rx="190" fill="#00CEC9"/>

  <!-- Layer 2: Stethoscope shape (simple, bold) -->

  <!-- Stethoscope tube (thick, U-shape) -->
  <path d="M320 220 Q320 100 512 100 Q704 100 704 220 L704 560 Q704 660 604 700"
        fill="none" stroke="#2D3436" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Earpieces (bold circles) -->
  <circle cx="320" cy="220" r="42" fill="#2D3436" stroke="#FFFFFF" stroke-width="14"/>
  <circle cx="704" cy="220" r="42" fill="#2D3436" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Ear tip highlights -->
  <circle cx="296" cy="196" r="22" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="680" cy="196" r="22" fill="#FFFFFF" opacity="0.5"/>

  <!-- Chest piece (large circle) -->
  <circle cx="512" cy="780" r="160" fill="#2D3436" stroke="#FFFFFF" stroke-width="20"/>

  <!-- Inside chest piece: PCB dot grid (3×3, within 4×4 rule) -->
  <circle cx="452" cy="720" r="14" fill="#55EFC4"/>
  <circle cx="512" cy="720" r="14" fill="#55EFC4"/>
  <circle cx="572" cy="720" r="14" fill="#55EFC4"/>
  <circle cx="452" cy="780" r="14" fill="#FFEAA7"/>
  <circle cx="512" cy="780" r="14" fill="#FFEAA7"/>
  <circle cx="572" cy="780" r="14" fill="#FFEAA7"/>
  <circle cx="452" cy="840" r="14" fill="#FD79A8"/>
  <circle cx="512" cy="840" r="14" fill="#FD79A8"/>
  <circle cx="572" cy="840" r="14" fill="#FD79A8"/>
  <!-- PCB trace lines connecting dots (short lines) -->
  <line x1="466" y1="720" x2="498" y2="720" stroke="#55EFC4" stroke-width="5"/>
  <line x1="526" y1="720" x2="558" y2="720" stroke="#55EFC4" stroke-width="5"/>
  <line x1="452" y1="734" x2="452" y2="766" stroke="#FFEAA7" stroke-width="5"/>
  <line x1="512" y1="734" x2="512" y2="766" stroke="#FFEAA7" stroke-width="5"/>
  <line x1="572" y1="734" x2="572" y2="766" stroke="#FFEAA7" stroke-width="5"/>
  <line x1="466" y1="780" x2="498" y2="780" stroke="#FFEAA7" stroke-width="5"/>
  <line x1="452" y1="794" x2="452" y2="826" stroke="#FD79A8" stroke-width="5"/>
  <line x1="512" y1="794" x2="512" y2="826" stroke="#FD79A8" stroke-width="5"/>

  <!-- Layer 3: Spec card (right side, floating) -->
  <rect x="730" y="300" width="220" height="360" rx="24" fill="#FFFFFF" stroke="#2D3436" stroke-width="10"/>
  <!-- Card header -->
  <rect x="730" y="300" width="220" height="52" rx="24" fill="#2D3436"/>
  <rect x="730" y="322" width="220" height="30" rx="0" fill="#2D3436"/>
  <text x="840" y="334" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#00CEC9">Spec</text>
  <!-- Rows -->
  <text x="750" y="386" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#E17055">● CPU</text>
  <text x="750" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#A29BFE">● GPU</text>
  <text x="750" y="478" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#55EFC4">● RAM</text>
  <text x="750" y="524" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#FFEAA7">● SSD</text>
  <text x="750" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#FD79A8">● NET</text>

  <!-- Tube connector to spec card -->
  <line x1="700" y1="590" x2="730" y2="490" stroke="#2D3436" stroke-width="16" stroke-linecap="round" stroke-dasharray="20,10"/>
</svg>
