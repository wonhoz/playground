<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 연보라 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg5)"/>

  <!-- Layer 2: 파이 차트 (디스크 섹터) -->
  <!-- 섹터 1: Videos 40% (빨강) -->
  <path d="M512 512 L512 120 A392 392 0 0 1 820 760 Z" fill="#EF5350"/>
  <!-- 섹터 2: Games 25% (파랑) -->
  <path d="M512 512 L820 760 A392 392 0 0 1 260 870 Z" fill="#42A5F5"/>
  <!-- 섹터 3: Docs 15% (초록) -->
  <path d="M512 512 L260 870 A392 392 0 0 1 120 400 Z" fill="#66BB6A"/>
  <!-- 섹터 4: Music 10% (보라) -->
  <path d="M512 512 L120 400 A392 392 0 0 1 360 130 Z" fill="#AB47BC"/>
  <!-- 섹터 5: Others 10% (회색) -->
  <path d="M512 512 L360 130 A392 392 0 0 1 512 120 Z" fill="#78909C"/>
  <!-- 파이 중앙 흰 원 (도넛) -->
  <circle cx="512" cy="512" r="180" fill="white"/>

  <!-- 중앙 용량 표시 -->
  <text x="512" y="490" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="68" fill="#1A1A2E" text-anchor="middle" dominant-baseline="middle">72%</text>
  <text x="512" y="548" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#546E7A" text-anchor="middle" dominant-baseline="middle">used</text>

  <!-- Layer 3: 범례 (우측) -->
  <rect x="108" y="86" width="20" height="20" rx="4" fill="#EF5350"/>
  <text x="136" y="103" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#1A1A2E" dominant-baseline="middle">Videos 40%</text>
  <rect x="108" y="132" width="20" height="20" rx="4" fill="#42A5F5"/>
  <text x="136" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#1A1A2E" dominant-baseline="middle">Games 25%</text>
  <rect x="108" y="178" width="20" height="20" rx="4" fill="#66BB6A"/>
  <text x="136" y="195" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#1A1A2E" dominant-baseline="middle">Docs 15%</text>
  <rect x="534" y="86" width="20" height="20" rx="4" fill="#AB47BC"/>
  <text x="562" y="103" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#1A1A2E" dominant-baseline="middle">Music 10%</text>
  <rect x="534" y="132" width="20" height="20" rx="4" fill="#78909C"/>
  <text x="562" y="149" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#1A1A2E" dominant-baseline="middle">Others 10%</text>
</svg>
