<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#080f1e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Recursive rings (each ring is a JSON nesting level) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#22C55E" stroke-width="2.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="105" fill="none" stroke="#16A34A" stroke-width="2.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#15803D" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="35" fill="none" stroke="#166534" stroke-width="3" opacity="0.7"/>
  <!-- Center: innermost value -->
  <circle cx="256" cy="256" r="14" fill="#166534"/>
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ADE80">42</text>
  <!-- Ring labels (JSON context) -->
  <text x="280" y="226" font-family="monospace" font-size="9" fill="#22C55E" opacity="0.8">{ val:</text>
  <text x="290" y="204" font-family="monospace" font-size="9" fill="#16A34A" opacity="0.7">{ inner:</text>
  <text x="306" y="180" font-family="monospace" font-size="9" fill="#15803D" opacity="0.6">{ data:</text>
  <text x="320" y="155" font-family="monospace" font-size="9" fill="#166534" opacity="0.5">{ items:</text>
  <!-- Bracket notation on rings -->
  <text x="66" y="260" text-anchor="middle" font-family="monospace" font-size="14" fill="#4ADE80" opacity="0.4">{</text>
  <text x="446" y="260" text-anchor="middle" font-family="monospace" font-size="14" fill="#4ADE80" opacity="0.4">}</text>
  <text x="116" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#22C55E" opacity="0.5">{</text>
  <text x="396" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#22C55E" opacity="0.5">}</text>
  <text x="152" y="260" text-anchor="middle" font-family="monospace" font-size="11" fill="#16A34A" opacity="0.6">{</text>
  <text x="360" y="260" text-anchor="middle" font-family="monospace" font-size="11" fill="#16A34A" opacity="0.6">}</text>
  <text x="187" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#15803D" opacity="0.7">{</text>
  <text x="325" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#15803D" opacity="0.7">}</text>
  <text x="222" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#166534" opacity="0.9">{</text>
  <text x="290" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#166534" opacity="0.9">}</text>
  <!-- Connecting dots on each ring -->
  <circle cx="256" cy="46" r="4" fill="#4ADE80" opacity="0.4"/>
  <circle cx="256" cy="81" r="4" fill="#22C55E" opacity="0.5"/>
  <circle cx="256" cy="116" r="4" fill="#16A34A" opacity="0.6"/>
  <circle cx="256" cy="151" r="4" fill="#15803D" opacity="0.7"/>
  <circle cx="256" cy="186" r="4" fill="#166534" opacity="0.8"/>
  <circle cx="256" cy="221" r="4" fill="#4ADE80" opacity="0.9"/>
</svg>
