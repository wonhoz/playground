<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="100%" stop-color="#3E2700"/>
    </linearGradient>
    <radialGradient id="coin1" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <radialGradient id="coin2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="50%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of coins with perspective -->
  <!-- Bottom shadow layer -->
  <ellipse cx="256" cy="392" rx="140" ry="28" fill="#1A0F00" opacity="0.6"/>
  <!-- Coin stack -->
  <ellipse cx="256" cy="372" rx="120" ry="24" fill="#FF8F00"/>
  <rect x="136" y="316" width="240" height="56" fill="#FFA000"/>
  <ellipse cx="256" cy="316" rx="120" ry="24" fill="url(#coin1)"/>
  <ellipse cx="256" cy="300" rx="120" ry="24" fill="#FF8F00"/>
  <rect x="136" y="244" width="240" height="56" fill="#FFA000"/>
  <ellipse cx="256" cy="244" rx="120" ry="24" fill="url(#coin1)"/>
  <ellipse cx="256" cy="228" rx="120" ry="24" fill="#FF8F00"/>
  <rect x="136" y="172" width="240" height="56" fill="#FFA000"/>
  <ellipse cx="256" cy="172" rx="120" ry="24" fill="url(#coin2)"/>
  <!-- Token "T" on top coin -->
  <text x="256" y="182" text-anchor="middle" font-size="24" font-weight="bold" fill="#1A0F00" font-family="monospace" opacity="0.8">TOKEN</text>
  <!-- Sparkle / money elements -->
  <circle cx="100" cy="140" r="8" fill="#FFD54F" opacity="0.9"/>
  <circle cx="120" cy="100" r="6" fill="#FFC107" opacity="0.7"/>
  <circle cx="400" cy="140" r="8" fill="#FFD54F" opacity="0.9"/>
  <circle cx="380" cy="100" r="6" fill="#FFC107" opacity="0.7"/>
  <!-- Price tag -->
  <path d="M 152,72 L 296,72 L 320,100 L 296,128 L 152,128 Z" fill="#FF8F00" opacity="0.9"/>
  <circle cx="172" cy="100" r="12" fill="#1A0F00"/>
  <text x="248" y="108" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A0F00" font-family="monospace" opacity="0.9">$0.015</text>
</svg>
