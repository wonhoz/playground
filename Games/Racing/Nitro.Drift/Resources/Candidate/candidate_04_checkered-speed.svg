<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Checkered flag pattern (distorted/speed) -->
  <g opacity="0.85">
    <!-- Row 1 -->
    <rect x="80" y="120" width="46" height="46" fill="white"/>
    <rect x="172" y="120" width="46" height="46" fill="white"/>
    <rect x="264" y="120" width="46" height="46" fill="white"/>
    <rect x="356" y="120" width="46" height="46" fill="white"/>
    <!-- Row 2 -->
    <rect x="126" y="166" width="46" height="46" fill="white"/>
    <rect x="218" y="166" width="46" height="46" fill="white"/>
    <rect x="310" y="166" width="46" height="46" fill="white"/>
    <rect x="402" y="166" width="46" height="46" fill="white"/>
    <!-- Row 3 -->
    <rect x="80" y="212" width="46" height="46" fill="white"/>
    <rect x="172" y="212" width="46" height="46" fill="white"/>
    <rect x="264" y="212" width="46" height="46" fill="white"/>
    <rect x="356" y="212" width="46" height="46" fill="white"/>
    <!-- Row 4 -->
    <rect x="126" y="258" width="46" height="46" fill="white"/>
    <rect x="218" y="258" width="46" height="46" fill="white"/>
    <rect x="310" y="258" width="46" height="46" fill="white"/>
    <rect x="402" y="258" width="46" height="46" fill="white"/>
  </g>
  <!-- Speed overlay gradient -->
  <rect x="60" y="100" width="392" height="220" rx="8" fill="url(#bg)" opacity="0.55"/>
  <!-- Diagonal motion blur on flag -->
  <rect x="60" y="100" width="392" height="220" rx="8" fill="none" stroke="#ff4400" stroke-width="4"/>
  <!-- Speed lines from right -->
  <line x1="290" y1="340" x2="460" y2="310" stroke="#ff4400" stroke-width="3" opacity="0.8"/>
  <line x1="250" y1="360" x2="460" y2="340" stroke="#ff6600" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="380" x2="460" y2="368" stroke="#ff4400" stroke-width="2" opacity="0.5"/>
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black" font-size="34" font-weight="900" fill="#ff4400">NITRO.DRIFT</text>
</svg>
