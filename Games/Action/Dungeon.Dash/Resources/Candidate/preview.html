<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon.Dash — Icon Candidates</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #c084fc; }
    p.subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .card:hover { border-color: #7c3aed; transform: translateY(-3px); }
    .card img { width: 128px; height: 128px; border-radius: 20px; }
    .card .label { font-size: 11px; color: #888; text-align: center; word-break: break-all; }
    .card .num { font-size: 18px; font-weight: 700; color: #a855f7; }
  </style>
</head>
<body>
  <h1>Dungeon.Dash — Icon Candidates</h1>
  <p class="subtitle">던전 달리기 액션 게임 | 10 candidates</p>
  <div class="grid">
    <div class="card"><span class="num">01</span><img src="candidate_01_knight_run.svg" alt="knight run"><span class="label">knight_run</span></div>
    <div class="card"><span class="num">02</span><img src="candidate_02_skull_dungeon.svg" alt="skull dungeon"><span class="label">skull_dungeon</span></div>
    <div class="card"><span class="num">03</span><img src="candidate_03_torch_corridor.svg" alt="torch corridor"><span class="label">torch_corridor</span></div>
    <div class="card"><span class="num">04</span><img src="candidate_04_sword_shield.svg" alt="sword shield"><span class="label">sword_shield</span></div>
    <div class="card"><span class="num">05</span><img src="candidate_05_monster_chase.svg" alt="monster chase"><span class="label">monster_chase</span></div>
    <div class="card"><span class="num">06</span><img src="candidate_06_treasure_chest.svg" alt="treasure chest"><span class="label">treasure_chest</span></div>
    <div class="card"><span class="num">07</span><img src="candidate_07_portal_magic.svg" alt="portal magic"><span class="label">portal_magic</span></div>
    <div class="card"><span class="num">08</span><img src="candidate_08_dragon_fire.svg" alt="dragon fire"><span class="label">dragon_fire</span></div>
    <div class="card"><span class="num">09</span><img src="candidate_09_map_room.svg" alt="map room"><span class="label">map_room</span></div>
    <div class="card"><span class="num">10</span><img src="candidate_10_pixel_dungeon.svg" alt="pixel dungeon"><span class="label">pixel_dungeon</span></div>
  </div>
</body>
</html>
