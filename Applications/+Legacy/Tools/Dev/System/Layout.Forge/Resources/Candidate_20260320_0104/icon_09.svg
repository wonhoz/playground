<!-- Layout.Forge icon_09: 자석 정렬 (magnet snapping to grid) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Grid dots -->
  <circle cx="280" cy="280" r="14" fill="#3949AB"/>
  <circle cx="420" cy="280" r="14" fill="#3949AB"/>
  <circle cx="560" cy="280" r="14" fill="#3949AB"/>
  <circle cx="700" cy="280" r="14" fill="#3949AB"/>
  <circle cx="280" cy="420" r="14" fill="#3949AB"/>
  <circle cx="420" cy="420" r="14" fill="#3949AB"/>
  <circle cx="560" cy="420" r="14" fill="#3949AB"/>
  <circle cx="700" cy="420" r="14" fill="#3949AB"/>
  <circle cx="280" cy="560" r="14" fill="#3949AB"/>
  <circle cx="420" cy="560" r="14" fill="#3949AB"/>
  <circle cx="560" cy="560" r="14" fill="#3949AB"/>
  <circle cx="700" cy="560" r="14" fill="#3949AB"/>
  <!-- Magnet (horseshoe) snapping to grid point -->
  <path d="M380 650 L380 750 Q380 870 500 870 Q620 870 620 750 L620 650" fill="none" stroke="#5C6BC0" stroke-width="56" stroke-linecap="round"/>
  <rect x="352" y="620" width="56" height="80" rx="8" fill="#3949AB"/>
  <rect x="592" y="620" width="56" height="80" rx="8" fill="#5C6BC0"/>
  <!-- Snap highlight at grid point -->
  <circle cx="560" cy="560" r="32" fill="none" stroke="#5C6BC0" stroke-width="16"/>
</svg>
