<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: hybrid | 비트 바 (8비트 컬러 블록) + 아래 "0xFF" | 공간/장면 | 미드나잇 블루 + 형광 비트 + 오렌지 -->
  <defs>
    <linearGradient id="bgMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B54"/>
      <stop offset="100%" stop-color="#060E30"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 미드나잇 블루 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgMid)"/>

  <!-- 배경 점 패턴 -->
  <circle cx="200" cy="300" r="4" fill="#1A3A8A" opacity="0.6"/>
  <circle cx="400" cy="200" r="4" fill="#1A3A8A" opacity="0.5"/>
  <circle cx="800" cy="350" r="4" fill="#1A3A8A" opacity="0.6"/>
  <circle cx="700" cy="800" r="4" fill="#1A3A8A" opacity="0.5"/>

  <!-- Layer 2: 비트 시각화 패널 (64비트 = 8개씩 2줄 = 16개 큰 블록) -->
  <!-- 상단 레이블 -->
  <text x="512" y="178" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="44" fill="#4A6ABA">bit 63 ─────────────────── 0</text>

  <!-- 상위 8비트 (비트 63-56): 1111 1111 = 0xFF (형광 민트) -->
  <!-- 비트 1 (ON) -->
  <rect x="90" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="140" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <rect x="208" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="258" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <rect x="326" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="376" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <rect x="444" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="494" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <!-- 비트 그룹 구분 -->
  <rect x="562" y="225" width="8" height="150" rx="4" fill="#1A3A8A"/>

  <rect x="588" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="638" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <rect x="706" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="756" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <rect x="824" y="210" width="100" height="180" rx="16" fill="#00E5AA"/>
  <text x="874" y="302" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="72" font-weight="bold" fill="#004D40">1</text>

  <!-- 두 번째 줄: 0000 0000 (OFF 비트들) -->
  <rect x="90" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="140" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="208" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="258" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="326" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="376" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="444" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="494" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="562" y="225" width="8" height="150" rx="4" fill="#1A3A8A" y="325" height="225"/>
  <rect x="562" y="420" width="8" height="130" rx="4" fill="#1A3A8A"/>

  <rect x="588" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="638" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="706" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="756" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <rect x="824" y="420" width="100" height="130" rx="16" fill="#0D2A60"/>
  <text x="874" y="488" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="60" fill="#1E4A9A">0</text>

  <!-- 비트 값 레이블 (희미) -->
  <text x="140" y="568" text-anchor="middle" font-family="Consolas" font-size="26" fill="#2A4A8A">63</text>
  <text x="874" y="568" text-anchor="middle" font-family="Consolas" font-size="26" fill="#2A4A8A">56</text>

  <!-- Layer 3: 하단 변환 결과 -->
  <rect x="90" y="610" width="844" height="100" rx="20" fill="#FF8C00" opacity="0.15"/>
  <text x="180" y="662" dominant-baseline="middle" font-family="Consolas" font-size="50" fill="#FF8C00">DEC</text>
  <text x="924" y="662" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="62" font-weight="bold" fill="#FF6600">255</text>

  <rect x="90" y="730" width="844" height="100" rx="20" fill="#00E5AA" opacity="0.12"/>
  <text x="180" y="782" dominant-baseline="middle" font-family="Consolas" font-size="50" fill="#00C896">HEX</text>
  <text x="924" y="782" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="62" font-weight="bold" fill="#00E5AA">0xFF</text>

  <rect x="90" y="850" width="844" height="88" rx="20" fill="#6A7AFF" opacity="0.1"/>
  <text x="180" y="896" dominant-baseline="middle" font-family="Consolas" font-size="44" fill="#6A7AFF">BIN</text>
  <text x="924" y="896" text-anchor="end" dominant-baseline="middle" font-family="Consolas" font-size="48" font-weight="bold" fill="#7A8AFF">1111 1111</text>
</svg>
