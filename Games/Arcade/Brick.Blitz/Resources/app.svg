<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E0A32"/>
      <stop offset="100%" stop-color="#08040E"/>
    </radialGradient>
    <radialGradient id="flash02" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FF8C00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF2D55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball02" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#BBDDFF"/>
    </radialGradient>
    <clipPath id="frame02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <g clip-path="url(#frame02)">
    <!-- Layer 2: Surrounding intact bricks (context) -->
    <!-- Left bricks -->
    <rect x="80" y="320" width="120" height="52" rx="8" fill="#FF2D55" opacity="0.8"/>
    <rect x="80" y="382" width="120" height="52" rx="8" fill="#FF9500" opacity="0.8"/>
    <rect x="80" y="220" width="120" height="52" rx="8" fill="#4CD964" opacity="0.8"/>

    <!-- Right bricks -->
    <rect x="820" y="320" width="120" height="52" rx="8" fill="#FF2D55" opacity="0.8"/>
    <rect x="820" y="382" width="120" height="52" rx="8" fill="#FF9500" opacity="0.8"/>
    <rect x="820" y="220" width="120" height="52" rx="8" fill="#5AC8FA" opacity="0.8"/>

    <!-- Top bricks -->
    <rect x="300" y="160" width="120" height="52" rx="8" fill="#FFD700" opacity="0.8"/>
    <rect x="604" y="160" width="120" height="52" rx="8" fill="#4CD964" opacity="0.8"/>

    <!-- Exploding center brick - 4 flying pieces -->
    <!-- Piece top-left -->
    <rect x="320" y="280" width="74" height="40" rx="6" fill="#FF6A00" transform="rotate(-18 357 300) translate(-60,-55)"/>
    <!-- Piece top-right -->
    <rect x="630" y="280" width="74" height="40" rx="6" fill="#FF8C00" transform="rotate(22 667 300) translate(55,-50)"/>
    <!-- Piece bottom-left -->
    <rect x="320" y="430" width="74" height="40" rx="6" fill="#FFAA00" transform="rotate(15 357 450) translate(-55,55)"/>
    <!-- Piece bottom-right -->
    <rect x="630" y="430" width="74" height="40" rx="6" fill="#FF6600" transform="rotate(-20 667 450) translate(60,50)"/>

    <!-- Impact flash radial -->
    <circle cx="512" cy="390" r="220" fill="url(#flash02)"/>

    <!-- Particle debris -->
    <circle cx="380" cy="290" r="12" fill="#FF8C00" opacity="0.9"/>
    <circle cx="640" cy="295" r="10" fill="#FFD700" opacity="0.85"/>
    <circle cx="360" cy="460" r="9" fill="#FF6A00" opacity="0.8"/>
    <circle cx="660" cy="465" r="11" fill="#FF9500" opacity="0.85"/>
    <circle cx="420" cy="240" r="8" fill="#FFD700" opacity="0.7"/>
    <circle cx="600" cy="238" r="8" fill="#FF8C00" opacity="0.7"/>
    <circle cx="350" cy="390" r="7" fill="white" opacity="0.5"/>
    <circle cx="672" cy="392" r="7" fill="white" opacity="0.5"/>
    <circle cx="512" cy="220" r="9" fill="#FFD700" opacity="0.65"/>
    <circle cx="512" cy="560" r="8" fill="#FF8C00" opacity="0.65"/>
    <!-- Spark lines -->
    <line x1="512" y1="380" x2="430" y2="295" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="512" y1="380" x2="594" y2="295" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="512" y1="380" x2="430" y2="465" stroke="#FF9500" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="512" y1="380" x2="594" y2="465" stroke="#FF9500" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <!-- Ball (coming from below, causing the explosion) -->
    <circle cx="512" cy="480" r="52" fill="url(#ball02)"/>
    <ellipse cx="497" cy="466" rx="20" ry="13" fill="white" opacity="0.55"/>

    <!-- Layer 3: Bright explosion core -->
    <circle cx="512" cy="378" r="38" fill="#FFFFFF" opacity="0.92"/>
    <circle cx="512" cy="378" r="22" fill="#FFFDE0" opacity="0.98"/>

    <!-- Paddle at bottom -->
    <rect x="312" y="870" width="400" height="48" rx="24" fill="#8B44FF"/>
    <rect x="312" y="870" width="400" height="18" rx="18" fill="white" opacity="0.18"/>
  </g>
</svg>
