<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 연보라 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- Layer 2: 지문 (fingerprint) -->
  <!-- 지문 중앙 코어 -->
  <ellipse cx="512" cy="480" rx="320" ry="360" fill="none" stroke="#1565C0" stroke-width="16" opacity="0.15"/>
  <!-- 지문 선들 (타원형 반복) -->
  <ellipse cx="512" cy="480" rx="40" ry="50" fill="none" stroke="#1565C0" stroke-width="12"/>
  <ellipse cx="512" cy="480" rx="80" ry="100" fill="none" stroke="#1565C0" stroke-width="10" opacity="0.9"/>
  <ellipse cx="512" cy="480" rx="120" ry="150" fill="none" stroke="#1565C0" stroke-width="10" opacity="0.85"/>
  <ellipse cx="512" cy="480" rx="160" ry="200" fill="none" stroke="#1565C0" stroke-width="10" opacity="0.8"/>
  <ellipse cx="512" cy="480" rx="200" ry="250" fill="none" stroke="#1565C0" stroke-width="9" opacity="0.75"/>
  <ellipse cx="512" cy="480" rx="240" ry="300" fill="none" stroke="#3F51B5" stroke-width="9" opacity="0.7"/>
  <ellipse cx="512" cy="480" rx="280" ry="345" fill="none" stroke="#3F51B5" stroke-width="8" opacity="0.6"/>
  <!-- 지문 끊김 효과 (ridge endings) -->
  <ellipse cx="512" cy="480" rx="200" ry="250" fill="none" stroke="#E8EAF6" stroke-width="18" stroke-dasharray="30 20" opacity="0.5"/>
  <ellipse cx="512" cy="480" rx="160" ry="200" fill="none" stroke="#E8EAF6" stroke-width="14" stroke-dasharray="25 30" opacity="0.4"/>

  <!-- Layer 3: 해시 텍스트 오버레이 (지문 위) -->
  <!-- 중앙 SHA256 배지 -->
  <rect x="370" y="448" width="284" height="64" rx="16" fill="#1565C0" opacity="0.9"/>
  <text x="512" y="482" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="white" text-anchor="middle" dominant-baseline="middle">SHA-256</text>
  <!-- 아래 해시값 미리보기 -->
  <rect x="260" y="780" width="504" height="56" rx="14" fill="#1A237E" opacity="0.8"/>
  <text x="512" y="810" font-family="'Courier New',monospace" font-size="28" fill="#C5CAE9" text-anchor="middle" dominant-baseline="middle">e3b0c44298fc1c14...</text>

  <!-- 체크마크 (지문 하단) -->
  <circle cx="512" cy="860" r="56" fill="#2E7D32"/>
  <text x="512" y="860" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="52" text-anchor="middle" dominant-baseline="middle">✓</text>
</svg>
