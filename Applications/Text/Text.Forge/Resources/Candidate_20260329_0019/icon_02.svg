<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 8가지 도구 레이블 그리드 | 기하학 추상 | 연오렌지+다색 카드 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#E65100" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: 4x2 tool card grid -->
  <!-- Row 1 -->
  <rect x="60"  y="80"  width="206" height="190" rx="22" fill="#1565C0" filter="url(#sh2)"/>
  <text x="163" y="175" font-family="Arial Black, sans-serif" font-size="54" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">JSON</text>

  <rect x="286" y="80"  width="206" height="190" rx="22" fill="#6A1B9A" filter="url(#sh2)"/>
  <text x="389" y="175" font-family="Arial Black, sans-serif" font-size="44" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Encode</text>

  <rect x="512" y="80"  width="206" height="190" rx="22" fill="#E53935" filter="url(#sh2)"/>
  <text x="615" y="175" font-family="Arial Black, sans-serif" font-size="54" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Hash</text>

  <rect x="738" y="80"  width="226" height="190" rx="22" fill="#00897B" filter="url(#sh2)"/>
  <text x="851" y="175" font-family="Arial Black, sans-serif" font-size="54" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">JWT</text>

  <!-- Row 2 -->
  <rect x="60"  y="290" width="206" height="190" rx="22" fill="#F57F17" filter="url(#sh2)"/>
  <text x="163" y="385" font-family="Arial Black, sans-serif" font-size="44" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Regex</text>

  <rect x="286" y="290" width="206" height="190" rx="22" fill="#2E7D32" filter="url(#sh2)"/>
  <text x="389" y="385" font-family="Arial Black, sans-serif" font-size="38" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Timestamp</text>

  <rect x="512" y="290" width="206" height="190" rx="22" fill="#AD1457" filter="url(#sh2)"/>
  <text x="615" y="385" font-family="Arial Black, sans-serif" font-size="44" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Case</text>

  <rect x="738" y="290" width="226" height="190" rx="22" fill="#0277BD" filter="url(#sh2)"/>
  <text x="851" y="385" font-family="Arial Black, sans-serif" font-size="40" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">Generate</text>

  <!-- Layer 3: Large "Text.Forge" branding below grid -->
  <text x="512" y="600" font-family="Arial Black, sans-serif" font-size="96" font-weight="900"
        fill="#E65100" text-anchor="middle" dominant-baseline="middle" filter="url(#sh2)">Text</text>
  <!-- Forge anvil icon -->
  <rect x="312" y="660" width="400" height="60" rx="30" fill="#BF360C" filter="url(#sh2)"/>
  <rect x="262" y="714" width="500" height="40" rx="20" fill="#8D2B00"/>
  <!-- Hammer -->
  <rect x="600" y="560" width="60" height="160" rx="16" fill="#5D4037" transform="rotate(-40, 630, 640)"
        filter="url(#sh2)"/>
  <rect x="570" y="510" width="100" height="60" rx="12" fill="#795548" transform="rotate(-40, 620, 540)"
        filter="url(#sh2)"/>
  <!-- Spark -->
  <circle cx="430" cy="650" r="16" fill="#FFD740"/>
  <circle cx="460" cy="630" r="10" fill="#FF6D00"/>
  <circle cx="490" cy="655" r="8" fill="#FFD740" opacity="0.7"/>
</svg>
