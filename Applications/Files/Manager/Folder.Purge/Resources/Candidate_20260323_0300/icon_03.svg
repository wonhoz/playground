<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2020/svg">
  <!-- Folder.Purge | 청소기 흡입 | 실루엣/캐릭터 | #DBEAFE 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#EFF6FF"/>
  <!-- Layer 2: Vacuum cleaner silhouette -->
  <!-- Main body cylinder -->
  <ellipse cx="512" cy="580" rx="180" ry="120" fill="#2563EB"/>
  <ellipse cx="512" cy="460" rx="180" ry="48" fill="#3B82F6"/>
  <rect x="332" y="460" width="360" height="120" fill="#2563EB"/>
  <!-- Body shading -->
  <ellipse cx="512" cy="460" rx="180" ry="48" fill="none" stroke="#1D4ED8" stroke-width="4"/>
  <!-- Handle -->
  <path d="M692 520 Q780 460 800 380 Q810 320 760 280" fill="none" stroke="#1E40AF" stroke-width="24" stroke-linecap="round"/>
  <!-- Nozzle/hose -->
  <path d="M332 560 Q240 580 180 600 Q140 614 120 640" fill="none" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
  <!-- Nozzle tip -->
  <rect x="80" y="610" width="80" height="50" rx="10" fill="#1D4ED8"/>
  <!-- Suction lines (dotted) indicating suction -->
  <line x1="80" y1="580" x2="40" y2="540" stroke="#60A5FA" stroke-width="4" stroke-dasharray="8,6" opacity="0.7"/>
  <line x1="80" y1="620" x2="36" y2="620" stroke="#60A5FA" stroke-width="4" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="80" y1="650" x2="40" y2="680" stroke="#60A5FA" stroke-width="4" stroke-dasharray="8,6" opacity="0.5"/>
  <!-- Layer 3: Empty folders being sucked in -->
  <!-- Mini folder 1 -->
  <g transform="translate(-30 -100) rotate(15 200 580)">
    <path d="M160 550 L200 550 L212 538 L280 538 L280 550" fill="#F59E0B" opacity="0.8"/>
    <rect x="160" y="550" width="120" height="80" rx="6" fill="#FBBF24" opacity="0.7"/>
  </g>
  <!-- Mini folder 2 -->
  <g transform="translate(20 -160) rotate(-10 200 500)">
    <path d="M200 480 L236 480 L246 468 L310 468 L310 480" fill="#EF4444" opacity="0.8"/>
    <rect x="200" y="480" width="110" height="74" rx="6" fill="#F87171" opacity="0.7"/>
  </g>
  <!-- Mini folder 3 -->
  <g transform="translate(-10 -210) rotate(5 200 440)">
    <path d="M140 430 L176 430 L186 418 L250 418 L250 430" fill="#8B5CF6" opacity="0.7"/>
    <rect x="140" y="430" width="110" height="72" rx="6" fill="#A78BFA" opacity="0.6"/>
  </g>
  <!-- Suction swirl dots -->
  <circle cx="60" cy="540" r="8" fill="#93C5FD" opacity="0.5"/>
  <circle cx="48" cy="590" r="6" fill="#60A5FA" opacity="0.4"/>
  <circle cx="56" cy="640" r="7" fill="#93C5FD" opacity="0.45"/>
</svg>
