<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080415"/>
      <stop offset="100%" style="stop-color:#150408"/>
    </linearGradient>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEE44"/>
      <stop offset="100%" style="stop-color:#FF8800;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44EEFF"/>
      <stop offset="100%" style="stop-color:#0044AA;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4488"/>
      <stop offset="100%" style="stop-color:#AA0044;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Three flowing streams of particles -->
  <!-- Stream 1 - sand/yellow -->
  <path d="M 150 80 C 140 150 160 200 150 280 C 140 350 160 400 150 432" fill="none" stroke="url(#flow1)" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  <!-- Stream 2 - water/cyan -->
  <path d="M 256 80 C 270 160 240 220 260 300 C 275 360 245 400 256 432" fill="none" stroke="url(#flow2)" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  <!-- Stream 3 - fire/red -->
  <path d="M 362 80 C 370 150 350 200 365 280 C 378 350 355 400 362 432" fill="none" stroke="url(#flow3)" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  <!-- Particle dots scattered -->
  <circle cx="148" cy="140" r="5" fill="#FFEE44" opacity="0.9"/>
  <circle cx="155" cy="190" r="4" fill="#FFCC33" opacity="0.8"/>
  <circle cx="145" cy="240" r="5" fill="#FFAA22" opacity="0.7"/>
  <circle cx="258" cy="130" r="5" fill="#44EEFF" opacity="0.9"/>
  <circle cx="262" cy="200" r="4" fill="#44CCFF" opacity="0.8"/>
  <circle cx="255" cy="270" r="5" fill="#0088CC" opacity="0.7"/>
  <circle cx="360" cy="150" r="5" fill="#FF4488" opacity="0.9"/>
  <circle cx="366" cy="220" r="4" fill="#FF2266" opacity="0.8"/>
  <circle cx="358" cy="300" r="5" fill="#CC0044" opacity="0.7"/>
  <!-- Bottom pool -->
  <ellipse cx="256" cy="432" rx="180" ry="20" fill="#553300" opacity="0.6"/>
</svg>
