<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 사이버 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#000A20"/>
  <!-- Layer 2: 체력바 + 점수 게임 UI -->
  <!-- 상단 HUD -->
  <rect x="120" y="160" width="784" height="100" rx="14" fill="#0D1F3A"/>
  <!-- 체력바 -->
  <rect x="148" y="182" width="300" height="36" rx="8" fill="#1A1A2E"/>
  <rect x="148" y="182" width="200" height="36" rx="8" fill="#F44336"/>
  <text x="160" y="210" font-family="Arial" font-size="24" fill="white" font-weight="bold">HP</text>
  <!-- 점수 -->
  <text x="760" y="222" font-family="Arial Black,Arial" font-size="40" font-weight="900" fill="#FFFF00" text-anchor="middle">9,840</text>
  <!-- 메인 게임 화면 -->
  <rect x="120" y="280" width="784" height="520" rx="12" fill="#030818"/>
  <!-- 격자선 (배경) -->
  <line x1="120" y1="380" x2="904" y2="380" stroke="#0A1A30" stroke-width="2"/>
  <line x1="120" y1="480" x2="904" y2="480" stroke="#0A1A30" stroke-width="2"/>
  <line x1="120" y1="580" x2="904" y2="580" stroke="#0A1A30" stroke-width="2"/>
  <line x1="120" y1="680" x2="904" y2="680" stroke="#0A1A30" stroke-width="2"/>
  <!-- 총알들 -->
  <rect x="220" y="300" width="16" height="36" rx="5" fill="#FF4081"/>
  <rect x="350" y="320" width="16" height="36" rx="5" fill="#FF4081"/>
  <rect x="480" y="300" width="16" height="36" rx="5" fill="#FF8A80"/>
  <rect x="610" y="310" width="16" height="36" rx="5" fill="#FF4081"/>
  <rect x="740" y="300" width="16" height="36" rx="5" fill="#FF8A80"/>
  <rect x="290" y="420" width="16" height="36" rx="5" fill="#FF4081" opacity="0.8"/>
  <rect x="550" y="430" width="16" height="36" rx="5" fill="#FF4081" opacity="0.8"/>
  <rect x="820" y="420" width="16" height="36" rx="5" fill="#FF8A80" opacity="0.7"/>
  <!-- 플레이어 (하단) -->
  <polygon points="512,720 460,780 564,780" fill="#00E5FF"/>
  <rect x="480" y="748" width="64" height="28" rx="6" fill="#0097A7"/>
  <!-- 발사 레이저 -->
  <line x1="512" y1="720" x2="512" y2="340" stroke="#00E5FF" stroke-width="6" opacity="0.8"/>
  <line x1="512" y1="720" x2="512" y2="340" stroke="#00E5FF" stroke-width="20" opacity="0.2"/>
  <!-- Layer 3: -->
  <text x="512" y="910" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#FF4081" text-anchor="middle">DODGE.BLITZ</text>
</svg>
