<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- merge/diff concept: two streams converging -->
  <!-- left stream -->
  <path d="M80 100 Q80 256 256 330" fill="none" stroke="#f87171" stroke-width="6" stroke-linecap="round"/>
  <!-- right stream -->
  <path d="M432 100 Q432 256 256 330" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
  <!-- merge point -->
  <circle cx="256" cy="330" r="20" fill="#f59e0b" stroke="#fde68a" stroke-width="3"/>
  <!-- flow down -->
  <path d="M256 350 L256 430" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <polygon points="246,420 266,420 256,440" fill="#f59e0b"/>
  <!-- file nodes -->
  <rect x="48" y="70" width="80" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <rect x="56" y="82" width="64" height="8" rx="2" fill="#fca5a5" opacity="0.6"/>
  <rect x="56" y="96" width="50" height="8" rx="2" fill="#fca5a5" opacity="0.4"/>
  <rect x="56" y="110" width="60" height="8" rx="2" fill="#fca5a5" opacity="0.4"/>
  <rect x="384" y="70" width="80" height="60" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <rect x="392" y="82" width="64" height="8" rx="2" fill="#86efac" opacity="0.6"/>
  <rect x="392" y="96" width="50" height="8" rx="2" fill="#86efac" opacity="0.4"/>
  <rect x="392" y="110" width="60" height="8" rx="2" fill="#86efac" opacity="0.4"/>
  <!-- delta labels -->
  <text x="130" y="200" font-family="monospace" font-size="36" fill="#f87171" text-anchor="middle">-3</text>
  <text x="382" y="200" font-family="monospace" font-size="36" fill="#4ade80" text-anchor="middle">+5</text>
</svg>
