<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>
    <linearGradient id="mouse" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large centered mouse -->
  <path d="M 176 200 Q 176 120 256 120 Q 336 120 336 200 L 336 340 Q 336 400 256 400 Q 176 400 176 340 Z" fill="#001A40" stroke="url(#mouse)" stroke-width="4"/>
  <!-- Left button active -->
  <path d="M 176 200 Q 176 120 256 120 L 256 240 L 176 240 Z" fill="#48CAE4" opacity="0.3"/>
  <!-- Wheel -->
  <rect x="243" y="148" width="26" height="56" rx="13" fill="#48CAE4" opacity="0.8"/>
  <!-- Divider -->
  <line x1="256" y1="120" x2="256" y2="260" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <!-- Click ripple -->
  <circle cx="220" cy="185" r="20" fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.6"/>
  <circle cx="220" cy="185" r="32" fill="none" stroke="#48CAE4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="220" cy="185" r="44" fill="none" stroke="#48CAE4" stroke-width="1" opacity="0.2"/>
  <!-- Gesture arrow -->
  <path d="M 336 260 Q 400 200 420 140" fill="none" stroke="#90E0EF" stroke-width="5" stroke-linecap="round"/>
  <polygon points="420,120 435,150 405,148" fill="#90E0EF"/>
  <!-- Title -->
  <text x="256" y="440" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#48CAE4">MOUSE.FLICK</text>
</svg>