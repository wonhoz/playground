<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Shadow / lift effect for popup card -->
  <rect x="138" y="188" width="748" height="490" rx="44" fill="#4A148C" opacity="0.35"/>
  <!-- White popup card (slightly elevated) -->
  <rect x="118" y="158" width="788" height="510" rx="44" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
  <!-- Popup title bar -->
  <rect x="118" y="158" width="788" height="72" rx="44" fill="#7B1FA2" stroke="#4A148C" stroke-width="16"/>
  <rect x="118" y="196" width="788" height="34" fill="#7B1FA2"/>
  <!-- Title bar dots -->
  <circle cx="168" cy="194" r="14" fill="#FF5F57"/>
  <circle cx="214" cy="194" r="14" fill="#FFBD2E"/>
  <circle cx="260" cy="194" r="14" fill="#28C840"/>
  <!-- Popup title text -->
  <text x="512" y="205" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle" opacity="0.85">Char.Pad</text>
  <!-- Characters floating in popup -->
  <!-- Row 1 -->
  <rect x="158" y="264" width="130" height="110" rx="18" fill="#FCE4EC" stroke="#E91E63" stroke-width="12"/>
  <text x="223" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#E91E63" text-anchor="middle">&#x2192;</text>
  <rect x="310" y="264" width="130" height="110" rx="18" fill="#E8EAF6" stroke="#3A86FF" stroke-width="12"/>
  <text x="375" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#3A86FF" text-anchor="middle">&#x2211;</text>
  <rect x="462" y="264" width="130" height="110" rx="18" fill="#E8F5E9" stroke="#388E3C" stroke-width="12"/>
  <text x="527" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#2E7D32" text-anchor="middle">&#xa9;</text>
  <rect x="614" y="264" width="130" height="110" rx="18" fill="#FFF8E1" stroke="#FFB300" stroke-width="12"/>
  <text x="679" y="347" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#F57F17" text-anchor="middle">$</text>
  <!-- Row 2 -->
  <rect x="158" y="398" width="130" height="110" rx="18" fill="#F3E5F5" stroke="#9B59B6" stroke-width="12"/>
  <text x="223" y="481" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#7B1FA2" text-anchor="middle">&#xb2;</text>
  <rect x="310" y="398" width="130" height="110" rx="18" fill="#FBE9E7" stroke="#FF6B35" stroke-width="12"/>
  <text x="375" y="481" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#BF360C" text-anchor="middle">&#x2014;</text>
  <rect x="462" y="398" width="130" height="110" rx="18" fill="#E0F2F1" stroke="#00897B" stroke-width="12"/>
  <text x="527" y="481" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#00695C" text-anchor="middle">&#x2260;</text>
  <rect x="614" y="398" width="130" height="110" rx="18" fill="#FCE4EC" stroke="#E91E63" stroke-width="12"/>
  <text x="679" y="481" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#E91E63" text-anchor="middle">&#x2665;</text>
  <!-- CHAR.PAD badge -->
  <rect x="172" y="748" width="680" height="116" rx="36" fill="#6A1B9A" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#CE93D8" text-anchor="middle">CHAR.PAD</text>
</svg>
