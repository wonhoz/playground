<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0015"/>
      <stop offset="100%" stop-color="#2d002a"/>
    </linearGradient>
    <linearGradient id="wand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAAEE"/>
      <stop offset="100%" stop-color="#CC44AA"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEEAA"/>
      <stop offset="100%" stop-color="#FF88CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF44CC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF44CC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="180" cy="180" r="220" fill="url(#glow)"/>
  <!-- Magic wand -->
  <line x1="130" y1="390" x2="360" y2="160" stroke="url(#wand)" stroke-width="14" stroke-linecap="round"/>
  <!-- Star tip -->
  <polygon points="360,125 372,155 405,155 380,174 389,205 360,185 331,205 340,174 315,155 348,155" fill="url(#spark)"/>
  <!-- Sparkles -->
  <circle cx="200" cy="120" r="8" fill="#FFEEAA" opacity="0.9"/>
  <circle cx="420" cy="200" r="6" fill="#FF88CC" opacity="0.8"/>
  <circle cx="100" cy="260" r="5" fill="#FFEEAA" opacity="0.7"/>
  <circle cx="380" cy="330" r="7" fill="#FF88CC" opacity="0.6"/>
  <circle cx="150" cy="380" r="4" fill="#FFEEAA" opacity="0.5"/>
  <!-- Files being renamed (before/after) -->
  <rect x="68" y="300" width="100" height="120" rx="8" fill="#CC44AA" opacity="0.3" stroke="#FFAAEE" stroke-width="1.5"/>
  <line x1="84" y1="340" x2="152" y2="340" stroke="#FFAAEE" stroke-width="3" opacity="0.4"/>
  <line x1="84" y1="358" x2="152" y2="358" stroke="#FFAAEE" stroke-width="3" opacity="0.3"/>
  <rect x="344" y="300" width="100" height="120" rx="8" fill="#CC44AA" opacity="0.5" stroke="#FFAAEE" stroke-width="2"/>
  <line x1="360" y1="340" x2="428" y2="340" stroke="#FFEEAA" stroke-width="3" opacity="0.8"/>
  <line x1="360" y1="358" x2="428" y2="358" stroke="#FFEEAA" stroke-width="3" opacity="0.7"/>
  <line x1="360" y1="376" x2="410" y2="376" stroke="#FFEEAA" stroke-width="3" opacity="0.6"/>
</svg>