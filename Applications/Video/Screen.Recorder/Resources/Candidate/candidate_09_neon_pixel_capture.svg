<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#7B00FF"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Capture rectangle glow -->
  <rect x="100" y="120" width="312" height="220" rx="10" fill="none" stroke="#FF00FF" stroke-width="6" filter="url(#blur)" opacity="0.6"/>
  <rect x="100" y="120" width="312" height="220" rx="10" fill="none" stroke="url(#neon1)" stroke-width="3"/>
  <!-- Corner accents -->
  <g stroke="url(#neon2)" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M 110 176 L 110 130 L 156 130"/>
    <path d="M 356 130 L 402 130 L 402 176"/>
    <path d="M 110 284 L 110 330 L 156 330"/>
    <path d="M 356 330 L 402 330 L 402 284"/>
  </g>
  <!-- Pixel grid inside -->
  <g fill="#FF00FF" opacity="0.3">
    <rect x="130" y="150" width="16" height="16" rx="2"/>
    <rect x="154" y="150" width="16" height="16" rx="2"/>
    <rect x="178" y="166" width="16" height="16" rx="2"/>
    <rect x="202" y="150" width="16" height="16" rx="2"/>
  </g>
  <g fill="#00FFFF" opacity="0.3">
    <rect x="300" y="280" width="16" height="16" rx="2"/>
    <rect x="324" y="264" width="16" height="16" rx="2"/>
    <rect x="348" y="280" width="16" height="16" rx="2"/>
    <rect x="372" y="264" width="16" height="16" rx="2"/>
  </g>
  <!-- Record controls at bottom -->
  <rect x="136" y="384" width="240" height="60" rx="16" fill="#0A0A1A" stroke="url(#neon1)" stroke-width="2"/>
  <!-- Stop button -->
  <rect x="160" y="400" width="28" height="28" rx="4" fill="url(#neon1)"/>
  <!-- Record button -->
  <circle cx="222" cy="414" r="16" fill="#FF1744"/>
  <!-- Pause -->
  <rect x="252" y="402" width="10" height="24" rx="3" fill="url(#neon2)"/>
  <rect x="268" y="402" width="10" height="24" rx="3" fill="url(#neon2)"/>
  <!-- Play -->
  <polygon points="300,402 300,426 322,414" fill="url(#neon2)"/>
  <!-- Timer display -->
  <rect x="336" y="406" width="70" height="16" rx="6" fill="url(#neon1)" opacity="0.5"/>
</svg>
