  <path d="M230 520 Q245 440 260 390 Q255 450 280 420 Q275 370 300 330 Q305 400 330 375 Q305 450 340 430 Q350 380 365 350 Q368 420 390 400 Q365 470 385 455 Q400 410 415 375 Q418 440 438 425 Q415 490 425 480 L200 520 Z" fill="#FF6D00" opacity="0.85"/>
  <!-- Layer 3: Purge text + ash particles -->
  <rect x="310" y="810" width="404" height="90" rx="20" fill="#BF360C" opacity="0.9"/>
  <text x="512" y="870" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="#FFCCBC" text-anchor="middle">PURGE</text>
  <!-- Ember particles -->
  <circle cx="280" cy="280" r="8" fill="#FFCA28" opacity="0.8"/>
  <circle cx="400" cy="220" r="6" fill="#FF8A65" opacity="0.7"/>
  <circle cx="560" cy="260" r="10" fill="#FFCA28" opacity="0.75"/>
  <circle cx="700" cy="240" r="7" fill="#FF6D00" opacity="0.8"/>
  <circle cx="820" cy="300" r="8" fill="#FFCA28" opacity="0.7"/>
