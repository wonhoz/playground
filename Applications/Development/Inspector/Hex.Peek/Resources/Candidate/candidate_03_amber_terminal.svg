<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window frame -->
  <rect x="56" y="80" width="400" height="352" rx="12" fill="#1c1500" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="56" y="80" width="400" height="36" rx="12" fill="#2a1e00"/>
  <rect x="56" y="100" width="400" height="16" fill="#2a1e00"/>
  <circle cx="88" cy="98" r="7" fill="#ef4444"/>
  <circle cx="112" cy="98" r="7" fill="#f59e0b"/>
  <circle cx="136" cy="98" r="7" fill="#22c55e"/>
  <text x="180" y="103" font-family="monospace" font-size="13" fill="#f59e0b" opacity="0.7">hex.peek — 0x0000</text>
  <!-- Hex dump lines -->
  <text x="72" y="152" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0000</text>
  <text x="175" y="152" font-family="monospace" font-size="15" fill="#fbbf24">4D 5A 90 00 03 00 00 00</text>
  <text x="72" y="176" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0008</text>
  <text x="175" y="176" font-family="monospace" font-size="15" fill="#fbbf24">04 00 00 00 FF FF 00 00</text>
  <text x="72" y="200" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0010</text>
  <text x="175" y="200" font-family="monospace" font-size="15" fill="#fbbf24">B8 00 00 00 00 00 00 00</text>
  <!-- Highlighted row -->
  <rect x="68" y="207" width="376" height="26" rx="3" fill="#f59e0b" opacity="0.15"/>
  <text x="72" y="225" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0018</text>
  <text x="175" y="225" font-family="monospace" font-size="15" fill="#ffd060">40 00 00 00 00 00 00 00</text>
  <text x="72" y="249" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0020</text>
  <text x="175" y="249" font-family="monospace" font-size="15" fill="#fbbf24">00 00 00 00 00 00 00 00</text>
  <text x="72" y="273" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0028</text>
  <text x="175" y="273" font-family="monospace" font-size="15" fill="#fbbf24">00 00 00 00 00 00 00 00</text>
  <text x="72" y="297" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0030</text>
  <text x="175" y="297" font-family="monospace" font-size="15" fill="#fbbf24">00 00 00 00 00 00 00 00</text>
  <text x="72" y="321" font-family="monospace" font-size="15" fill="#f59e0b" opacity="0.5">0000 0038</text>
  <text x="175" y="321" font-family="monospace" font-size="15" fill="#fbbf24">E8 00 00 00 0E 1F BA 0E</text>
  <!-- Cursor blink -->
  <rect x="175" y="350" width="10" height="20" rx="2" fill="#fbbf24" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Status bar -->
  <rect x="56" y="400" width="400" height="32" rx="0" fill="#2a1e00"/>
  <rect x="56" y="420" width="400" height="12" rx="12" fill="#2a1e00"/>
  <text x="72" y="420" font-family="monospace" font-size="13" fill="#f59e0b" opacity="0.7">Offset: 0x0018   Size: 512B   EXE</text>
</svg>
