<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030510"/>
  <!-- Laser beams crossing -->
  <rect x="160" y="400" width="704" height="20" fill="#42A5F5" opacity="0.9" rx="10"/>
  <rect x="160" y="480" width="704" height="20" fill="#0D47A1" opacity="0.8" rx="10"/>
  <rect x="160" y="560" width="704" height="20" fill="#42A5F5" opacity="0.6" rx="10"/>
  <!-- Vertical laser -->
  <rect x="400" y="160" width="20" height="704" fill="#42A5F5" opacity="0.7" rx="10"/>
  <rect x="600" y="160" width="20" height="704" fill="#0D47A1" opacity="0.6" rx="10"/>
  <!-- Player dodging (small ship in gap) -->
  <polygon points="512,300 480,360 512,345 544,360" fill="#ffffff"/>
  <!-- Glow effects -->
  <circle cx="410" cy="490" r="15" fill="#42A5F5" opacity="0.9"/>
  <circle cx="610" cy="490" r="15" fill="#42A5F5" opacity="0.9"/>
  <circle cx="410" cy="570" r="15" fill="#42A5F5" opacity="0.6"/>
  <circle cx="610" cy="570" r="15" fill="#42A5F5" opacity="0.6"/>
</svg>
