<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100000"/>
      <stop offset="100%" stop-color="#200800"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3000"/>
      <stop offset="40%" stop-color="#ff7700"/>
      <stop offset="80%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil shape -->
  <rect x="140" y="310" width="232" height="80" rx="10" fill="url(#anvil)"/>
  <rect x="160" y="270" width="192" height="50" rx="6" fill="url(#anvil)"/>
  <rect x="180" y="390" width="60" height="32" rx="4" fill="url(#anvil)"/>
  <rect x="272" y="390" width="60" height="32" rx="4" fill="url(#anvil)"/>
  <!-- Vector shape being forged (glowing triangle) -->
  <path d="M256 120 L360 300 L152 300 Z" stroke="url(#fire)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M256 140 L340 285 L172 285 Z" fill="url(#fire)" opacity="0.25" filter="url(#glow)"/>
  <!-- Sparks -->
  <circle cx="200" cy="180" r="5" fill="#ffcc00" filter="url(#glow)" opacity="0.9"/>
  <circle cx="310" cy="160" r="4" fill="#ff7700" filter="url(#glow)" opacity="0.8"/>
  <circle cx="270" cy="130" r="3" fill="#fff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="230" cy="150" r="4" fill="#ffcc00" filter="url(#glow)" opacity="0.8"/>
  <circle cx="180" cy="230" r="3" fill="#ff3000" filter="url(#glow)"/>
  <circle cx="330" cy="220" r="4" fill="#ff7700" filter="url(#glow)"/>
</svg>