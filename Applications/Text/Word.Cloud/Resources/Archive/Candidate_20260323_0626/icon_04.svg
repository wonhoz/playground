<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Word.Cloud | 나이테 단면 — 빈도별 동심원 단어 배치 | 기하학 | #100A00 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#100A00"/>
  <!-- Layer 2: Tree rings cross-section with words at different rings -->
  <!-- Outermost ring -->
  <circle cx="512" cy="512" r="340" fill="#2A1800"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="#4A2E00" stroke-width="6"/>
  <!-- Ring layers -->
  <circle cx="512" cy="512" r="280" fill="#221400" stroke="#3D2500" stroke-width="5"/>
  <circle cx="512" cy="512" r="240" fill="#1C1000" stroke="#3A2200" stroke-width="4"/>
  <circle cx="512" cy="512" r="196" fill="#161000" stroke="#342000" stroke-width="4"/>
  <circle cx="512" cy="512" r="148" fill="#120C00" stroke="#2C1A00" stroke-width="3"/>
  <circle cx="512" cy="512" r="100" fill="#0C0800" stroke="#241400" stroke-width="3"/>
  <circle cx="512" cy="512" r="52" fill="#080400" stroke="#1C1000" stroke-width="2"/>
  <!-- Center (most frequent word) -->
  <circle cx="512" cy="512" r="40" fill="#D97706"/>
  <text x="512" y="520" font-family="Arial,sans-serif" font-size="18" fill="#FEF3C7" text-anchor="middle" font-weight="bold">단어</text>
  <!-- Ring 2 words (high frequency) -->
  <text x="512" y="440" font-family="Arial,sans-serif" font-size="20" fill="#FCD34D" text-anchor="middle" font-weight="bold">cloud</text>
  <text x="580" y="526" font-family="Arial,sans-serif" font-size="18" fill="#FBBF24" text-anchor="middle">텍스트</text>
  <text x="444" y="526" font-family="Arial,sans-serif" font-size="18" fill="#FBBF24" text-anchor="middle">word</text>
  <text x="512" y="592" font-family="Arial,sans-serif" font-size="16" fill="#F59E0B" text-anchor="middle">생성</text>
  <!-- Ring 3 words -->
  <text x="512" y="360" font-family="Arial,sans-serif" font-size="16" fill="#D97706" text-anchor="middle">빈도</text>
  <text x="660" y="512" font-family="Arial,sans-serif" font-size="14" fill="#B45309" text-anchor="middle">AI</text>
  <text x="364" y="512" font-family="Arial,sans-serif" font-size="14" fill="#B45309" text-anchor="middle">분석</text>
  <text x="512" y="665" font-family="Arial,sans-serif" font-size="14" fill="#B45309" text-anchor="middle">크기</text>
  <text x="620" y="390" font-family="Arial,sans-serif" font-size="13" fill="#A16207">색상</text>
  <text x="400" y="395" font-family="Arial,sans-serif" font-size="13" fill="#A16207">폰트</text>
  <!-- Outermost ring words (low freq) -->
  <text x="512" y="228" font-family="Arial,sans-serif" font-size="13" fill="#78350F" text-anchor="middle">시각화</text>
  <text x="820" y="512" font-family="Arial,sans-serif" font-size="12" fill="#713F12" text-anchor="middle">레이아웃</text>
  <text x="200" y="512" font-family="Arial,sans-serif" font-size="12" fill="#713F12" text-anchor="middle">워드클라우드</text>
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="12" fill="#713F12" text-anchor="middle">입력</text>
  <!-- Layer 3: Growth ring count -->
  <text x="512" y="900" font-family="Arial,sans-serif" font-size="20" fill="#D97706" text-anchor="middle" opacity="0.7">빈도 = 나이테</text>
</svg>
