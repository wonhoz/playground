<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="qc-bg-clip-01">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <linearGradient id="qc-bg-grad-01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#CC3030"/>
    </linearGradient>
    <linearGradient id="calc-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>
  <!-- 배경 (비비드 코랄) -->
  <rect width="1024" height="1024" rx="180" fill="url(#qc-bg-grad-01)"/>
  <g clip-path="url(#qc-bg-clip-01)">
    <!-- 배경 원형 그라디언트 -->
    <circle cx="512" cy="512" r="380" fill="#FF8888" opacity="0.25"/>
    <!-- 계산기 본체 (화이트) -->
    <rect x="240" y="200" width="544" height="620" rx="36" fill="url(#calc-body-grad)" stroke="#EEEEEE" stroke-width="6"/>
    <!-- 계산기 디스플레이 -->
    <rect x="276" y="240" width="472" height="120" rx="16" fill="#1A2A1A" stroke="#333333" stroke-width="4"/>
    <!-- 디스플레이 숫자 -->
    <rect x="480" y="268" width="240" height="60" rx="8" fill="#22DD44" opacity="0.9"/>
    <!-- 디스플레이 작은 표시 -->
    <rect x="290" y="280" width="140" height="24" rx="5" fill="#2A3A2A" opacity="0.6"/>
    <!-- 계산기 버튼들 - 4x4 그리드 -->
    <!-- 행 1: AC, +/-, %, ÷ -->
    <rect x="276" y="394" width="100" height="76" rx="14" fill="#D0D0D0"/>
    <rect x="394" y="394" width="100" height="76" rx="14" fill="#D0D0D0"/>
    <rect x="512" y="394" width="100" height="76" rx="14" fill="#D0D0D0"/>
    <rect x="630" y="394" width="86" height="76" rx="14" fill="#FF6B6B"/>
    <!-- 행 2: 7, 8, 9, × -->
    <rect x="276" y="486" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="394" y="486" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="512" y="486" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="630" y="486" width="86" height="76" rx="14" fill="#FF6B6B"/>
    <!-- 행 3: 4, 5, 6, - -->
    <rect x="276" y="578" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="394" y="578" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="512" y="578" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="630" y="578" width="86" height="76" rx="14" fill="#FF6B6B"/>
    <!-- 행 4: 1, 2, 3, + -->
    <rect x="276" y="670" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="394" y="670" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="512" y="670" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="630" y="670" width="86" height="76" rx="14" fill="#FF6B6B"/>
    <!-- 행 5: 0 (와이드), ., = -->
    <rect x="276" y="762" width="218" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="512" y="762" width="100" height="76" rx="14" fill="#F5F5F5"/>
    <rect x="630" y="762" width="86" height="76" rx="14" fill="#CC2020"/>
    <!-- 버튼 심볼들 (간략화 - 작은 사각형) -->
    <!-- AC -->
    <rect x="300" y="420" width="52" height="24" rx="5" fill="#666666" opacity="0.7"/>
    <!-- 숫자들 점으로 표현 -->
    <circle cx="326" cy="524" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="444" cy="524" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="562" cy="524" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="326" cy="616" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="444" cy="616" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="562" cy="616" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="326" cy="708" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="444" cy="708" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="562" cy="708" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="385" cy="800" r="12" fill="#333333" opacity="0.5"/>
    <circle cx="562" cy="800" r="12" fill="#333333" opacity="0.5"/>
    <!-- = 심볼 -->
    <rect x="644" y="785" width="58" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="644" y="801" width="58" height="8" rx="4" fill="#FFFFFF"/>
    <!-- 연산자 심볼 -->
    <rect x="644" y="420" width="58" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="644" y="430" width="8" height="28" rx="4" fill="#FFFFFF"/>
    <!-- × 심볼 -->
    <rect x="644" y="510" width="58" height="8" rx="4" fill="#FFFFFF" transform="rotate(45,673,514)"/>
    <rect x="644" y="510" width="58" height="8" rx="4" fill="#FFFFFF" transform="rotate(-45,673,514)"/>
    <!-- - 심볼 -->
    <rect x="644" y="612" width="58" height="8" rx="4" fill="#FFFFFF"/>
    <!-- + 심볼 -->
    <rect x="644" y="700" width="58" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="665" y="679" width="16" height="50" rx="4" fill="#FFFFFF"/>
  </g>
</svg>
