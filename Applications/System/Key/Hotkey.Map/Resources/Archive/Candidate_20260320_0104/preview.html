<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hotkey.Map Icon Candidates</title>
<style>
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
  h1 { font-size: 1.4rem; color: #BCAAA4; margin-bottom: 8px; }
  p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img {
    width: 140px; height: 140px; border-radius: 28px;
    border: 1px solid #1a1410;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }
  .item img:hover { transform: scale(1.12); box-shadow: 0 8px 32px rgba(188,170,164,0.35); }
  .label { font-size: 0.78rem; color: #888; }
</style>
</head>
<body>
<h1>Hotkey.Map — Icon Candidates</h1>
<p>bg=#050500 · accent=#5D4037 · accentLight=#BCAAA4 · 단축키 매퍼</p>
<div class="grid">
  <div class="item"><img src="icon_01.svg" alt="01"><span class="label">01. 지도+키보드</span></div>
  <div class="item"><img src="icon_02.svg" alt="02"><span class="label">02. 번개단축</span></div>
  <div class="item"><img src="icon_03.svg" alt="03"><span class="label">03. 손가락+키</span></div>
  <div class="item"><img src="icon_04.svg" alt="04"><span class="label">04. 별자리단축키</span></div>
  <div class="item"><img src="icon_05.svg" alt="05"><span class="label">05. 나침반탐색</span></div>
  <div class="item"><img src="icon_06.svg" alt="06"><span class="label">06. 퍼즐키</span></div>
  <div class="item"><img src="icon_07.svg" alt="07"><span class="label">07. 방사형키맵</span></div>
  <div class="item"><img src="icon_08.svg" alt="08"><span class="label">08. 화살표조합</span></div>
  <div class="item"><img src="icon_09.svg" alt="09"><span class="label">09. 지문+키</span></div>
  <div class="item"><img src="icon_10.svg" alt="10"><span class="label">10. 기어설정</span></div>
</div>
</body>
</html>
