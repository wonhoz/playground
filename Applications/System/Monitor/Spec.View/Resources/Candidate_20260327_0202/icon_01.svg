<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — near black with subtle grid -->
  <defs>
    <linearGradient id="bgSV1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050A18"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bgSV1)"/>

  <!-- Subtle circuit grid lines -->
  <line x1="200" y1="0" x2="200" y2="1024" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="1024" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="1024" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="1024" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="0" y1="200" x2="1024" y2="200" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="0" y1="400" x2="1024" y2="400" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="0" y1="600" x2="1024" y2="600" stroke="#0A1A2A" stroke-width="1"/>
  <line x1="0" y1="800" x2="1024" y2="800" stroke="#0A1A2A" stroke-width="1"/>

  <!-- Layer 2: CPU chip (center-left) -->
  <!-- CPU package -->
  <rect x="280" y="320" width="320" height="320" rx="16" fill="#0A1428" stroke="#1E90FF" stroke-width="10"/>

  <!-- CPU die (inner square) -->
  <rect x="320" y="360" width="240" height="240" rx="8" fill="#0A1E3A" stroke="#4169E1" stroke-width="6"/>

  <!-- CPU die sectors -->
  <line x1="440" y1="360" x2="440" y2="600" stroke="#1E4A8A" stroke-width="2"/>
  <line x1="320" y1="480" x2="560" y2="480" stroke="#1E4A8A" stroke-width="2"/>

  <!-- CPU text -->
  <text x="440" y="445" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="26" font-weight="bold" fill="#1E90FF">Intel</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="20" fill="#4169E1">Core i9</text>
  <text x="370" y="560" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#2A5A9A">LLC</text>
  <text x="515" y="560" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#2A5A9A">iGPU</text>

  <!-- CPU pins along edges -->
  <!-- Left pins -->
  <rect x="256" y="340" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="360" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="380" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="400" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="420" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="440" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="460" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="480" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="500" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="520" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="540" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="256" y="560" width="24" height="8" rx="2" fill="#FFD700"/>
  <!-- Right pins -->
  <rect x="600" y="340" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="360" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="380" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="400" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="420" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="440" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="460" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="480" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="500" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="520" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="540" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="600" y="560" width="24" height="8" rx="2" fill="#FFD700"/>
  <!-- Top pins -->
  <rect x="340" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="360" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="380" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="400" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="420" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="440" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="460" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="480" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="500" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="520" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="540" y="296" width="8" height="24" rx="2" fill="#FFD700"/>
  <!-- Bottom pins -->
  <rect x="340" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="360" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="380" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="400" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="420" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="440" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="460" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="480" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="500" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="520" y="640" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="540" y="640" width="8" height="24" rx="2" fill="#FFD700"/>

  <!-- Layer 3: Spec tags around chip -->
  <!-- GPU tag (top right) -->
  <rect x="680" y="210" width="200" height="48" rx="10" fill="#0A1428" stroke="#9C27B0" stroke-width="4"/>
  <text x="780" y="242" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#CE93D8">GPU: RTX4080</text>
  <!-- connector line -->
  <line x1="680" y1="234" x2="600" y2="360" stroke="#9C27B0" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- RAM tag (right) -->
  <rect x="700" y="440" width="200" height="48" rx="10" fill="#0A1428" stroke="#4CAF50" stroke-width="4"/>
  <text x="800" y="472" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#81C784">RAM: 32 GB</text>
  <line x1="700" y1="464" x2="624" y2="480" stroke="#4CAF50" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- Storage tag (bottom right) -->
  <rect x="680" y="660" width="200" height="48" rx="10" fill="#0A1428" stroke="#FF9800" stroke-width="4"/>
  <text x="780" y="692" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="22" fill="#FFCC80">SSD: 2 TB</text>
  <line x1="720" y1="660" x2="560" y2="600" stroke="#FF9800" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- OS tag (top left) -->
  <rect x="140" y="210" width="200" height="48" rx="10" fill="#0A1428" stroke="#00BCD4" stroke-width="4"/>
  <text x="240" y="242" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="20" fill="#80DEEA">Win11 24H2</text>
  <line x1="340" y1="234" x2="320" y2="350" stroke="#00BCD4" stroke-width="3" stroke-dasharray="8,5"/>
</svg>
