<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#312E81"/>
  <!-- Layer 2: Stamp body -->
  <!-- Stamp handle (top) -->
  <rect x="390" y="150" width="244" height="110" rx="20" fill="#EF4444"/>
  <!-- Handle grip -->
  <rect x="420" y="160" width="184" height="30" rx="8" fill="#DC2626"/>
  <!-- Stamp connector -->
  <rect x="450" y="248" width="124" height="60" rx="8" fill="#B91C1C"/>
  <!-- Stamp pad (bottom) -->
  <rect x="310" y="296" width="404" height="120" rx="16" fill="#DC2626"/>
  <!-- Stamp face (inked area) -->
  <rect x="328" y="314" width="368" height="84" rx="10" fill="#7F1D1D"/>
  <!-- Layer 3: Stamped text on paper below -->
  <!-- Paper -->
  <rect x="180" y="460" width="664" height="380" rx="18" fill="#FEF9C3"/>
  <!-- Stamp impression (red-tinted text) -->
  <text x="512" y="545" font-family="Consolas,monospace" font-size="32" fill="#EF4444" text-anchor="middle" opacity="0.8">@##$$%&amp;*++==</text>
  <text x="512" y="585" font-family="Consolas,monospace" font-size="32" fill="#DC2626" text-anchor="middle" opacity="0.75">**##@@$$%%&amp;&amp;</text>
  <text x="512" y="625" font-family="Consolas,monospace" font-size="32" fill="#B91C1C" text-anchor="middle" opacity="0.7">::--==..::--=</text>
  <text x="512" y="665" font-family="Consolas,monospace" font-size="28" fill="#9B1C1C" text-anchor="middle" opacity="0.65">...::  ;;::.</text>
  <text x="512" y="705" font-family="Consolas,monospace" font-size="24" fill="#7F1D1D" text-anchor="middle" opacity="0.5">  .  .  .  .  </text>
  <!-- "STAMPED" label hint -->
  <rect x="310" y="780" width="400" height="40" rx="10" fill="#EF4444" opacity="0.2"/>
  <text x="512" y="805" font-family="Arial,sans-serif" font-size="18" fill="#EF4444" text-anchor="middle" opacity="0.6">텍스트 아트 출력</text>
</svg>