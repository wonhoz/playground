  <!-- 색상 분류 화살표 -->
  <path d="M256,145 L256,175" stroke="#34D399" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <polygon points="250,170 262,170 256,180" fill="#34D399" opacity="0.8" filter="url(#glow)"/>
  <text x="256" y="200" text-anchor="middle" font-size="12" fill="#34D399" opacity="0.7" font-weight="bold">COLOR SORT</text>
  <!-- 색상 스펙트럼 바 -->
  <rect x="60" y="208" width="392" height="24" rx="12" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.5"/>
  <rect x="60" y="208" width="56" height="24" rx="0" fill="#EF4444" opacity="0.8"/>
  <rect x="116" y="208" width="56" height="24" rx="0" fill="#F97316" opacity="0.8"/>
  <rect x="172" y="208" width="56" height="24" rx="0" fill="#FDE047" opacity="0.8"/>
  <rect x="228" y="208" width="56" height="24" rx="0" fill="#34D399" opacity="0.8"/>
  <rect x="284" y="208" width="56" height="24" rx="0" fill="#38BDF8" opacity="0.8"/>
  <rect x="340" y="208" width="56" height="24" rx="0" fill="#818CF8" opacity="0.8"/>
  <rect x="396" y="208" width="56" height="24" rx="12" fill="#C084FC" opacity="0.8"/>
  <rect x="60" y="208" width="392" height="24" rx="12" fill="none" stroke="#34D399" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- 정렬된 결과 그리드 -->
  <text x="256" y="256" text-anchor="middle" font-size="12" fill="#34D399" opacity="0.6" letter-spacing="2">SORTED</text>
  <!-- 빨강 그룹 -->
