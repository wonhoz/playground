<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#831843"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Pyramid of characters - bottom to top gets smaller/sparser -->
    <!-- Row 1 (bottom, widest) -->
    <text x="512" y="880" font-size="32" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">@@@@@@@@@@@@@@@@@@@@@</text>
    <!-- Row 2 -->
    <text x="512" y="830" font-size="32" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">##################</text>
    <!-- Row 3 -->
    <text x="512" y="780" font-size="32" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">###############</text>
    <!-- Row 4 -->
    <text x="512" y="730" font-size="32" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">############</text>
    <!-- Row 5 -->
    <text x="512" y="680" font-size="32" font-weight="bold" font-family="monospace" fill="#F472B6" text-anchor="middle">@@@@@@@@@</text>
    <!-- Row 6 -->
    <text x="512" y="630" font-size="32" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">$$$$$$</text>
    <!-- Row 7 -->
    <text x="512" y="580" font-size="32" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">$$$</text>
    <!-- Row 8 -->
    <text x="512" y="530" font-size="36" font-weight="bold" font-family="monospace" fill="white" text-anchor="middle">##</text>
    <!-- Row 9 (top, single) -->
    <text x="512" y="470" font-size="42" font-weight="bold" font-family="monospace" fill="#FDE68A" text-anchor="middle">@</text>
    <!-- Pyramid outline guidelines -->
    <line x1="512" y1="440" x2="180" y2="900" stroke="#F472B6" stroke-width="6" stroke-dasharray="16,12" opacity="0.4"/>
    <line x1="512" y1="440" x2="844" y2="900" stroke="#F472B6" stroke-width="6" stroke-dasharray="16,12" opacity="0.4"/>
    <!-- Label -->
    <text x="512" y="200" font-size="52" font-weight="bold" font-family="system-ui" fill="white" text-anchor="middle">ASCII</text>
    <text x="512" y="265" font-size="52" font-weight="bold" font-family="system-ui" fill="#FDE68A" text-anchor="middle">PYRAMID</text>
  </g>
</svg>
