<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Q&A 카드들 (대각선 방향으로 정렬) -->

    <!-- Q1: 일본 질문 -->
    <rect x="80" y="120" width="460" height="130" rx="20" fill="#FF8F00"/>
    <text x="200" y="164" font-family="'Segoe UI',Arial,sans-serif" font-size="52">🇯🇵</text>
    <text x="380" y="196" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">일본 수도?</text>
    <!-- 화살표 -->
    <text x="590" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="#E65100" text-anchor="middle">→</text>
    <!-- A1: 정답 -->
    <rect x="640" y="120" width="304" height="130" rx="20" fill="#2E7D32"/>
    <text x="792" y="196" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">도쿄 ✓</text>

    <!-- Q2: 브라질 -->
    <rect x="80" y="278" width="460" height="130" rx="20" fill="#FF8F00"/>
    <text x="200" y="322" font-family="'Segoe UI',Arial,sans-serif" font-size="52">🇧🇷</text>
    <text x="380" y="354" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">브라질 수도?</text>
    <text x="590" y="354" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="#E65100" text-anchor="middle">→</text>
    <rect x="640" y="278" width="304" height="130" rx="20" fill="#EF5350"/>
    <text x="792" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">상파울루 ✗</text>
    <text x="792" y="385" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#FFCDD2" text-anchor="middle">→ 브라질리아</text>

    <!-- Q3: 호주 -->
    <rect x="80" y="436" width="460" height="130" rx="20" fill="#E65100"/>
    <text x="200" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="52">🇦🇺</text>
    <text x="380" y="512" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">호주 수도?</text>
    <text x="590" y="512" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="#E65100" text-anchor="middle">→</text>
    <rect x="640" y="436" width="304" height="130" rx="20" fill="#2E7D32"/>
    <text x="792" y="512" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">캔버라 ✓</text>

    <!-- Q4: 캐나다 -->
    <rect x="80" y="594" width="460" height="130" rx="20" fill="#E65100"/>
    <text x="200" y="638" font-family="'Segoe UI',Arial,sans-serif" font-size="52">🇨🇦</text>
    <text x="380" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">캐나다 수도?</text>
    <text x="590" y="670" font-family="'Segoe UI',Arial,sans-serif" font-size="60" fill="#E65100" text-anchor="middle">→</text>
    <rect x="640" y="594" width="304" height="130" rx="20" fill="#2E7D32"/>
    <text x="792" y="670" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">오타와 ✓</text>

    <!-- 스코어 -->
    <rect x="80" y="752" width="864" height="72" rx="24" fill="#FF6D00"/>
    <text x="512" y="800" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">3/4  •  🔥 2연속  •  75점</text>

    <!-- 타이틀 -->
    <rect x="200" y="860" width="624" height="70" rx="24" fill="#BF360C"/>
    <text x="512" y="907" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">GEO.QUIZ</text>
  </g>
</svg>
