<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#04100e"/>
    </linearGradient>
    <radialGradient id="galaxyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#06B6D4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 은하 배경 -->
  <circle cx="256" cy="256" r="180" fill="url(#galaxyCore)" filter="url(#glow)"/>
  <!-- 은하 나선팔 -->
  <path d="M 256,256 Q 340,180 400,140 Q 440,120 445,150" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.4"/>
  <path d="M 256,256 Q 160,180 100,140 Q 65,120 70,155" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.4"/>
  <path d="M 256,256 Q 340,330 390,390 Q 420,430 400,445" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.35"/>
  <path d="M 256,256 Q 160,330 112,390 Q 85,430 105,445" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.35"/>
  <!-- 쌍 파일들 (은하에 쌍으로 배치) -->
  <!-- 쌍 1 (위) -->
