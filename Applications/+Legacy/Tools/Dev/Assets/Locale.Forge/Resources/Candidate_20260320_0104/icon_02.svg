<!-- Locale.Forge icon_02: 번역 화살표 쌍 (two arrows exchanging) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0D0F1A"/>
  <!-- Top arrow: left to right -->
  <path d="M200 400 L700 400" stroke="#5C6BC0" stroke-width="48" stroke-linecap="round"/>
  <polygon points="700,340 820,400 700,460" fill="#5C6BC0"/>
  <!-- Bottom arrow: right to left -->
