<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-color="#764ba2" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document being copied -->
  <rect x="280" y="140" width="150" height="195" rx="8" fill="url(#pageGrad)" opacity="0.9" filter="url(#shadow)"/>
  <line x1="300" y1="180" x2="412" y2="180" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="300" y1="205" x2="412" y2="205" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="300" y1="230" x2="390" y2="230" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="300" y1="255" x2="405" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <line x1="300" y1="278" x2="380" y2="278" stroke="#94a3b8" stroke-width="2"/>
  <!-- Dog-ear corner -->
  <path d="M400 140 L430 170 L400 170Z" fill="#cbd5e1"/>
  <path d="M400 140 L430 140 L430 170Z" fill="#e2e8f0"/>
  <!-- Robot arm/hand -->
  <!-- Arm -->
  <rect x="88" y="270" width="40" height="120" rx="12" fill="url(#robotGrad)" filter="url(#shadow)"/>
  <!-- Forearm joint -->
  <ellipse cx="108" cy="270" rx="22" ry="16" fill="#764ba2"/>
  <!-- Hand palm -->
  <rect x="72" y="185" width="75" height="95" rx="14" fill="url(#robotGrad)"/>
  <!-- Finger 1 (index pointing at page) -->
  <rect x="140" y="178" width="22" height="55" rx="8" fill="url(#robotGrad)"/>
  <ellipse cx="151" cy="178" rx="11" ry="9" fill="#764ba2"/>
  <!-- Finger 2 -->
  <rect x="140" y="240" width="22" height="48" rx="8" fill="#667eea"/>
  <!-- Finger 3 -->
  <rect x="140" y="295" width="22" height="42" rx="8" fill="#667eea"/>
  <!-- Thumb -->
  <rect x="62" y="195" width="18" height="52" rx="8" fill="#764ba2"/>
  <!-- Fingertip glow on index -->
  <ellipse cx="151" cy="175" rx="8" ry="6" fill="#00e5ff" opacity="0.8" filter="url(#shadow)"/>
  <!-- Copy beam from fingertip to document -->
  <line x1="163" y1="180" x2="278" y2="210" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.7"/>
  <!-- Circuit lines on robot arm -->
  <line x1="85" y1="310" x2="115" y2="310" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="330" x2="115" y2="330" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="85" cy="310" r="3" fill="#00e5ff" opacity="0.8"/>
  <circle cx="115" cy="330" r="3" fill="#00e5ff" opacity="0.8"/>
  <!-- Eye on hand -->
  <ellipse cx="105" cy="215" rx="12" ry="10" fill="#0d1b2a"/>
  <circle cx="105" cy="215" r="6" fill="#00e5ff" opacity="0.9"/>
  <circle cx="107" cy="213" r="2" fill="#ffffff" opacity="0.8"/>
</svg>