<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라벤더 -->
  <rect width="1024" height="1024" rx="180" fill="#EDE7F6"/>
  <!-- Layer 2: 힌트 목록 + 격자 미리보기 -->
  <!-- 힌트 패널 (좌) -->
  <rect x="120" y="180" width="340" height="580" rx="16" fill="white" stroke="#CE93D8" stroke-width="4"/>
  <text x="290" y="240" font-family="Arial Black,Arial" font-size="36" font-weight="900" fill="#6A1B9A" text-anchor="middle">ACROSS</text>
  <line x1="140" y1="256" x2="440" y2="256" stroke="#CE93D8" stroke-width="2"/>
  <text x="160" y="308" font-family="Arial" font-size="28" fill="#4A148C">1. Type of puzzle</text>
  <text x="160" y="350" font-family="Arial" font-size="28" fill="#666">3. Word game</text>
  <text x="160" y="392" font-family="Arial" font-size="28" fill="#666">5. Square grid</text>
  <text x="290" y="460" font-family="Arial Black,Arial" font-size="36" font-weight="900" fill="#6A1B9A" text-anchor="middle">DOWN</text>
  <line x1="140" y1="476" x2="440" y2="476" stroke="#CE93D8" stroke-width="2"/>
  <text x="160" y="528" font-family="Arial" font-size="28" fill="#666">1. Cross + word</text>
  <text x="160" y="570" font-family="Arial" font-size="28" fill="#666">2. Fill blanks</text>
  <text x="160" y="612" font-family="Arial" font-size="28" fill="#666">4. Letter tile</text>
  <!-- 격자 패널 (우) -->
  <rect x="484" y="180" width="420" height="420" rx="16" fill="white" stroke="#CE93D8" stroke-width="4"/>
  <!-- 4×4 격자 -->
  <line x1="589" y1="180" x2="589" y2="600" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="694" y1="180" x2="694" y2="600" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="799" y1="180" x2="799" y2="600" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="484" y1="285" x2="904" y2="285" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="484" y1="390" x2="904" y2="390" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="484" y1="495" x2="904" y2="495" stroke="#E0E0E0" stroke-width="2"/>
  <!-- 검정 칸 -->
  <rect x="694" y="180" width="105" height="105" fill="#333"/>
  <rect x="484" y="390" width="105" height="105" fill="#333"/>
  <!-- 일부 글자 -->
  <text x="537" y="252" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#6A1B9A" text-anchor="middle">C</text>
  <text x="747" y="252" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#1A1A1A" text-anchor="middle">W</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#6A1B9A" text-anchor="middle">CROSSWORD</text>
</svg>
