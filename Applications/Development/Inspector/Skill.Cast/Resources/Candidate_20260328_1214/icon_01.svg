<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 짙은 남색 그라데이션 -->
  <defs>
    <linearGradient id="bg_sc01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_sc01)"/>

  <!-- "/" 심볼 — 크고 굵게 중앙 좌측 -->
  <text x="200" y="680" font-family="Segoe UI, Arial, sans-serif" font-size="560" font-weight="900"
        fill="none" stroke="#7986CB" stroke-width="8" opacity="0.3">/</text>
  <text x="200" y="680" font-family="Segoe UI, Arial, sans-serif" font-size="560" font-weight="900"
        fill="#E8EAF6" opacity="0.9">/</text>

  <!-- 명령어 목록 (우측) -->
  <!-- 배경 패널 -->
  <rect x="480" y="220" width="420" height="580" rx="16" fill="#283593" opacity="0.9"/>

  <!-- 명령어 항목들 -->
  <!-- commit -->
  <rect x="500" y="252" width="380" height="68" rx="10" fill="#3949AB"/>
  <text x="520" y="283" font-family="Consolas, monospace" font-size="30" fill="#FFD600" font-weight="bold">commit</text>
  <text x="520" y="308" font-family="Consolas, monospace" font-size="22" fill="#90CAF9" opacity="0.8">변경사항 커밋하기</text>

  <!-- review -->
  <rect x="500" y="334" width="380" height="68" rx="10" fill="#3949AB"/>
  <text x="520" y="365" font-family="Consolas, monospace" font-size="30" fill="#80DEEA" font-weight="bold">review</text>
  <text x="520" y="390" font-family="Consolas, monospace" font-size="22" fill="#90CAF9" opacity="0.8">코드 리뷰 실행</text>

  <!-- fix -->
  <rect x="500" y="416" width="380" height="68" rx="10" fill="#3949AB"/>
  <text x="520" y="447" font-family="Consolas, monospace" font-size="30" fill="#F48FB1" font-weight="bold">fix</text>
  <text x="520" y="472" font-family="Consolas, monospace" font-size="22" fill="#90CAF9" opacity="0.8">버그 자동 수정</text>

  <!-- test -->
  <rect x="500" y="498" width="380" height="68" rx="10" fill="#3949AB"/>
  <text x="520" y="529" font-family="Consolas, monospace" font-size="30" fill="#A5D6A7" font-weight="bold">test</text>
  <text x="520" y="554" font-family="Consolas, monospace" font-size="22" fill="#90CAF9" opacity="0.8">테스트 생성 실행</text>

  <!-- deploy -->
  <rect x="500" y="580" width="380" height="68" rx="10" fill="#3949AB" opacity="0.8"/>
  <text x="520" y="611" font-family="Consolas, monospace" font-size="30" fill="#FFAB40" font-weight="bold">deploy</text>
  <text x="520" y="636" font-family="Consolas, monospace" font-size="22" fill="#90CAF9" opacity="0.8">배포 파이프라인</text>

  <!-- 더보기 점선 -->
  <text x="680" y="730" text-anchor="middle" font-family="Consolas, monospace" font-size="40" fill="#7986CB" opacity="0.7">• • •</text>

  <!-- 상단 타이틀 -->
  <rect x="480" y="148" width="420" height="60" rx="12" fill="#1A237E"/>
  <text x="690" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="bold" fill="#E8EAF6">Skill.Cast</text>

  <!-- 커서 라인 -->
  <rect x="480" y="848" width="420" height="54" rx="10" fill="#1A237E" opacity="0.9"/>
  <text x="500" y="884" font-family="Consolas, monospace" font-size="34" fill="#69FF47">$ /</text>
  <rect x="548" y="858" width="16" height="30" rx="2" fill="#69FF47" opacity="0.9"/>
</svg>
