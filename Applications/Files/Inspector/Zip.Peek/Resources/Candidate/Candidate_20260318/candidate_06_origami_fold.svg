<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="panel1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="panel2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Origami crane silhouette (representing folded/compressed data) -->

  <!-- Wing 1 (left, upper) -->
  <polygon points="256,220 100,120 180,256" fill="url(#panel1)" stroke="#EAB308" stroke-width="2" stroke-opacity="0.8" filter="url(#softglow)"/>
  <!-- Wing 2 (right, upper) -->
  <polygon points="256,220 412,120 332,256" fill="url(#panel2)" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Body (center) -->
  <polygon points="180,256 332,256 256,340" fill="url(#panel3)" stroke="#FBBF24" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Head/beak -->
  <polygon points="256,220 220,170 256,200 292,170" fill="#EAB308" fill-opacity="0.3" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Tail -->
  <polygon points="256,340 216,400 256,380 296,400" fill="#EAB308" fill-opacity="0.25" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Fold line details (crease marks) -->
  <line x1="100" y1="120" x2="256" y2="256" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="412" y1="120" x2="256" y2="256" stroke="#EAB308" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="256" x2="256" y2="220" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="332" y1="256" x2="256" y2="220" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="256" y1="256" x2="256" y2="340" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Archive files folded into crane form -->
  <!-- Small file hint in left wing -->
  <line x1="140" y1="145" x2="180" y2="155" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="135" y1="160" x2="178" y2="168" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="132" y1="175" x2="176" y2="180" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Small file hint in right wing -->
  <line x1="340" y1="145" x2="375" y2="148" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="338" y1="160" x2="374" y2="162" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="337" y1="175" x2="372" y2="176" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Dotted fold guide lines -->
  <line x1="100" y1="120" x2="412" y2="120" stroke="#EAB308" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="180" y1="256" x2="332" y2="256" stroke="#EAB308" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="5,5"/>

  <!-- Shadow/reflection below -->
  <polygon points="180,400 332,400 256,470" fill="#EAB308" fill-opacity="0.04"/>

  <!-- Corner fold marks -->
  <path d="M80,480 L80,460 L100,480 Z" fill="#EAB308" fill-opacity="0.2" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M432,480 L432,460 L412,480 Z" fill="#EAB308" fill-opacity="0.2" stroke="#EAB308" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M80,32 L80,52 L100,32 Z" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M432,32 L432,52 L412,32 Z" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Sparkle dots -->
  <circle cx="256" cy="120" r="4" fill="#EAB308" fill-opacity="0.6" filter="url(#softglow)"/>
  <circle cx="256" cy="340" r="4" fill="#F59E0B" fill-opacity="0.5" filter="url(#softglow)"/>
  <circle cx="100" cy="120" r="3.5" fill="#EAB308" fill-opacity="0.5"/>
  <circle cx="412" cy="120" r="3.5" fill="#FBBF24" fill-opacity="0.5"/>
</svg>
