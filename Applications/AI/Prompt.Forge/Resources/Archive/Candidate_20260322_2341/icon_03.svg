<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <linearGradient id="hat03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Burnt orange background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Subtle circular highlight -->
  <circle cx="512" cy="420" r="340" fill="white" opacity="0.04"/>

  <!-- Layer 2: Chef's hat (toque blanche) -->
  <!-- Hat brim / band -->
  <rect x="262" y="600" width="500" height="80" rx="10" fill="#F5F5F5"/>
  <rect x="262" y="600" width="500" height="80" rx="10" fill="none" stroke="#E5E7EB" stroke-width="3"/>
  <!-- Vertical pleats on band -->
  <line x1="320" y1="600" x2="320" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="378" y1="600" x2="378" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="436" y1="600" x2="436" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="494" y1="600" x2="494" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="552" y1="600" x2="552" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="610" y1="600" x2="610" y2="680" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="668" y1="600" x2="668" y2="680" stroke="#D1D5DB" stroke-width="2"/>

  <!-- Hat puff (the tall round top) -->
  <ellipse cx="512" cy="420" rx="220" ry="230" fill="url(#hat03)"/>
  <ellipse cx="512" cy="600" rx="245" ry="30" fill="#F5F5F5"/>
  <!-- Hat shadow crease -->
  <ellipse cx="512" cy="380" rx="170" ry="160" fill="none" stroke="#E5E7EB" stroke-width="3" opacity="0.5"/>

  <!-- Layer 3: AI sparkles / neural pattern inside hat -->
  <g filter="url(#glow03)">
    <!-- Central star / AI spark -->
    <circle cx="512" cy="430" r="38" fill="#F97316" opacity="0.85"/>
    <circle cx="512" cy="430" r="20" fill="#FEF08A"/>
    <!-- Surrounding nodes -->
    <circle cx="430" cy="370" r="14" fill="#F97316" opacity="0.7"/>
    <circle cx="594" cy="370" r="14" fill="#F97316" opacity="0.7"/>
    <circle cx="420" cy="490" r="12" fill="#F97316" opacity="0.6"/>
    <circle cx="604" cy="490" r="12" fill="#F97316" opacity="0.6"/>
    <circle cx="512" cy="320" r="10" fill="#FEF08A" opacity="0.8"/>
    <!-- Connection lines -->
    <line x1="512" y1="430" x2="430" y2="370" stroke="#F97316" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="430" x2="594" y2="370" stroke="#F97316" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="430" x2="420" y2="490" stroke="#F97316" stroke-width="3" opacity="0.4"/>
    <line x1="512" y1="430" x2="604" y2="490" stroke="#F97316" stroke-width="3" opacity="0.4"/>
    <line x1="512" y1="430" x2="512" y2="320" stroke="#FEF08A" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- "AI" text on band -->
  <text x="512" y="654" font-family="'Segoe UI',sans-serif" font-size="36" font-weight="900" fill="#EA580C" text-anchor="middle" opacity="0.7">PROMPT</text>

  <!-- Small fork icon on right (chef decoration) -->
  <line x1="790" y1="540" x2="790" y2="700" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <line x1="770" y1="560" x2="770" y2="620" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="810" y1="560" x2="810" y2="620" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <path d="M770,620 Q790,650 810,620" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
</svg>
