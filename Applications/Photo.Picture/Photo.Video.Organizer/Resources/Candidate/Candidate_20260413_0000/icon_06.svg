<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: metaphor · 실루엣/캐릭터 · 카메라 캐릭터가 폴더에 사진 넣음 -->
  <defs>
    <radialGradient id="bg06" cx="0.5" cy="0.4" r="0.9">
      <stop offset="0" stop-color="#E8F5E9"/>
      <stop offset="1" stop-color="#A5D6A7"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- 카메라 캐릭터 (좌측) -->
  <g>
    <!-- 바디 -->
    <rect x="120" y="300" width="460" height="360" rx="40" fill="#37474F" stroke="#102027" stroke-width="18"/>
    <!-- 상단 뷰파인더 -->
    <rect x="280" y="240" width="180" height="80" rx="14" fill="#37474F" stroke="#102027" stroke-width="18"/>
    <!-- 플래시 -->
    <rect x="160" y="340" width="60" height="40" rx="8" fill="#FFD93D" stroke="#B88A00" stroke-width="8"/>
    <!-- 렌즈 (눈 역할) -->
    <circle cx="360" cy="490" r="150" fill="#FFFFFF" stroke="#102027" stroke-width="18"/>
    <circle cx="360" cy="490" r="110" fill="#3A86FF" stroke="#0D47A1" stroke-width="14"/>
    <circle cx="360" cy="490" r="60" fill="#102027"/>
    <circle cx="390" cy="460" r="26" fill="#FFFFFF"/>
    <!-- 미소 (카메라 하단) -->
    <path d="M 200 620 Q 250 660 300 620" stroke="#FFD93D" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
  <!-- 우측 폴더 -->
  <g>
    <path d="M 600 520 L 720 520 L 760 480 L 940 480 Q 960 480 960 500 L 960 820 Q 960 840 940 840 L 600 840 Q 580 840 580 820 L 580 540 Q 580 520 600 520 Z" fill="#FF6B9D" stroke="#880E4F" stroke-width="16"/>
    <text x="770" y="720" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">2026</text>
  </g>
  <!-- 사진 (카메라→폴더로 이동 중) -->
  <g transform="rotate(-10 540 440)">
    <rect x="470" y="380" width="140" height="110" rx="12" fill="#FFFFFF" stroke="#102027" stroke-width="10"/>
    <rect x="480" y="390" width="120" height="80" fill="#FFD93D"/>
    <circle cx="565" cy="418" r="18" fill="#FF6B35"/>
  </g>
  <!-- 이동 라인 -->
  <g stroke="#880E4F" stroke-width="10" stroke-linecap="round" stroke-dasharray="4 14">
    <path d="M 530 460 Q 600 400 700 500" fill="none"/>
  </g>
</svg>
