<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#e64a19"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hammer head -->
  <rect x="200" y="80" width="200" height="120" rx="16" fill="url(#hammer)" stroke="#ffe0b2" stroke-width="4"/>
  <!-- Hammer handle -->
  <rect x="268" y="190" width="36" height="220" rx="12" fill="#8d6e63" stroke="#a1887f" stroke-width="3"/>
  <!-- Globe/language symbol -->
  <circle cx="150" cy="350" r="80" fill="none" stroke="#ffccbc" stroke-width="6"/>
  <ellipse cx="150" cy="350" rx="80" ry="28" fill="none" stroke="#ffccbc" stroke-width="4"/>
  <line x1="150" y1="270" x2="150" y2="430" stroke="#ffccbc" stroke-width="4"/>
  <!-- Letter A -->
  <text x="340" y="390" font-family="serif" font-size="90" font-weight="bold" fill="#ffe0b2" opacity="0.9">A</text>
  <!-- Letter in another script (looking like Japanese) -->
  <text x="316" y="320" font-family="serif" font-size="44" fill="#ffccbc" opacity="0.7">あ</text>
  <!-- Spark from hammer -->
  <circle cx="390" cy="190" r="6" fill="#fff9c4"/>
  <circle cx="408" cy="172" r="4" fill="#fff9c4"/>
  <circle cx="370" cy="168" r="5" fill="#fff9c4"/>
</svg>
