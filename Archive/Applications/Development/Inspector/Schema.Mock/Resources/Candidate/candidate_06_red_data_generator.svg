<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Funnel/generator top -->
  <path d="M 100 80 L 412 80 L 320 200 L 192 200 Z" fill="url(#red)" opacity="0.75"/>
  <!-- Funnel tube -->
  <rect x="208" y="200" width="96" height="80" rx="0" fill="url(#tube)" opacity="0.8"/>
  <!-- Data stream output -->
  <g opacity="0.9">
    <rect x="130" y="310" width="252" height="32" rx="6" fill="#2D0000"/>
    <rect x="130" y="310" width="180" height="32" rx="6" fill="url(#red)" opacity="0.7"/>
    <rect x="130" y="358" width="252" height="32" rx="6" fill="#2D0000"/>
    <rect x="130" y="358" width="220" height="32" rx="6" fill="url(#red)" opacity="0.5"/>
    <rect x="130" y="406" width="252" height="32" rx="6" fill="#2D0000"/>
    <rect x="130" y="406" width="140" height="32" rx="6" fill="url(#red)" opacity="0.6"/>
  </g>
  <!-- Data labels on bars -->
  <g fill="white" opacity="0.6">
    <rect x="140" y="322" width="60" height="8" rx="3"/>
    <rect x="210" y="322" width="40" height="8" rx="3"/>
    <rect x="140" y="370" width="70" height="8" rx="3"/>
    <rect x="220" y="370" width="50" height="8" rx="3"/>
    <rect x="140" y="418" width="50" height="8" rx="3"/>
    <rect x="200" y="418" width="35" height="8" rx="3"/>
  </g>
  <!-- Lightening spark in funnel -->
  <path d="M 256 90 L 240 140 L 258 135 L 242 190" stroke="#FFD740" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
