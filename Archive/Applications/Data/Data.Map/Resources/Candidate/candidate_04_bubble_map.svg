<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="b1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
    <radialGradient id="b2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
    <radialGradient id="b3" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff6e40"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
    <radialGradient id="b4" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="b5" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bubble chart -->
  <!-- Large center bubble -->
  <circle cx="256" cy="230" r="88" fill="url(#b1)" opacity="0.85" filter="url(#glow)"/>
  <text x="256" y="225" font-family="Arial Black, sans-serif" font-size="15" fill="#fff" text-anchor="middle">Dataset A</text>
  <text x="256" y="245" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">4,892</text>
  <!-- Medium bubbles -->
  <circle cx="130" cy="160" r="58" fill="url(#b2)" opacity="0.8" filter="url(#glow)"/>
  <text x="130" y="155" font-family="Arial Black, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Set B</text>
  <text x="130" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2,340</text>

  <circle cx="382" cy="168" r="52" fill="url(#b3)" opacity="0.8" filter="url(#glow)"/>
  <text x="382" y="163" font-family="Arial Black, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Set C</text>
  <text x="382" y="178" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">1,890</text>

  <circle cx="138" cy="330" r="48" fill="url(#b4)" opacity="0.8" filter="url(#glow)"/>
  <text x="138" y="325" font-family="Arial Black, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Set D</text>
  <text x="138" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">1,550</text>

  <circle cx="380" cy="325" r="42" fill="url(#b5)" opacity="0.8" filter="url(#glow)"/>
  <text x="380" y="320" font-family="Arial Black, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Set E</text>
  <text x="380" y="334" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">1,120</text>

  <!-- Small bubbles -->
  <circle cx="96" cy="248" r="28" fill="url(#b3)" opacity="0.6"/>
  <text x="96" y="252" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">F:580</text>
  <circle cx="416" cy="260" r="26" fill="url(#b2)" opacity="0.6"/>
  <text x="416" y="264" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">G:440</text>
  <circle cx="240" cy="390" r="24" fill="url(#b1)" opacity="0.6"/>
  <text x="240" y="394" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">H:320</text>
  <circle cx="310" cy="400" r="20" fill="url(#b4)" opacity="0.6"/>
  <text x="310" y="404" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">I:210</text>

  <!-- Title -->
  <text x="256" y="466" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#7c4dff" text-anchor="middle" filter="url(#glow)" letter-spacing="2">DATA MAP</text>
  <text x="256" y="492" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">Bubble Chart View</text>
</svg>
