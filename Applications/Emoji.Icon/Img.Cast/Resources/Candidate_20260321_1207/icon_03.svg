<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 진한 남색 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <linearGradient id="wand3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <radialGradient id="glow3" cx="70%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="file3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- 빛나는 후광 -->
  <ellipse cx="700" cy="310" rx="220" ry="200" fill="url(#glow3)"/>

  <!-- Layer 2: 메인 오브젝트 - 마법 지팡이 -->
  <!-- 지팡이 몸체 -->
  <line x1="220" y1="820" x2="660" y2="310"
        stroke="url(#wand3)" stroke-width="44" stroke-linecap="round"/>
  <!-- 지팡이 끝 손잡이 장식 -->
  <circle cx="220" cy="820" r="30" fill="#8B6914"/>
  <circle cx="220" cy="820" r="18" fill="#C9A227"/>

  <!-- 지팡이 끝 빛나는 별 -->
  <circle cx="660" cy="310" r="48" fill="#FFD700" opacity="0.9"/>
  <circle cx="660" cy="310" r="28" fill="white"/>

  <!-- 별 광선 -->
  <line x1="660" y1="240" x2="660" y2="210" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="660" y1="380" x2="660" y2="410" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="590" y1="310" x2="560" y2="310" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="730" y1="310" x2="760" y2="310" stroke="#FFD700" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="610" y1="260" x2="589" y2="239" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="710" y1="260" x2="731" y2="239" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="610" y1="360" x2="589" y2="381" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="710" y1="360" x2="731" y2="381" stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Layer 3: 디테일 - 변환 전 파일 (왼쪽 아래) -->
  <rect x="80" y="560" width="150" height="170" rx="14" fill="url(#file3)" opacity="0.85"/>
  <path d="M 80 560 L 200 560 L 230 590 L 80 590 Z" fill="#5B48CC" opacity="0.9"/>
  <text x="155" y="700" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.95">SVG</text>

  <!-- 변환 후 파일 (오른쪽) - 빛나는 ICO -->
  <rect x="760" y="480" width="160" height="185" rx="14" fill="#FF6B35" opacity="0.9"/>
  <path d="M 760 480 L 890 480 L 920 510 L 760 510 Z" fill="#E64A19" opacity="0.9"/>
  <text x="840" y="630" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.95">ICO</text>

  <!-- 변환 화살표 -->
  <path d="M 240 640 C 400 620 520 580 740 560"
        stroke="#FFD700" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="18 10" opacity="0.6"/>

  <!-- 반짝이 파티클들 -->
  <circle cx="370" cy="500" r="8" fill="#FFD700" opacity="0.8"/>
  <circle cx="450" cy="540" r="5" fill="#FF69B4" opacity="0.7"/>
  <circle cx="320" cy="560" r="6" fill="#00FFFF" opacity="0.6"/>
  <circle cx="500" cy="480" r="7" fill="#FFD700" opacity="0.75"/>
  <circle cx="600" cy="520" r="5" fill="#FF69B4" opacity="0.65"/>
</svg>
