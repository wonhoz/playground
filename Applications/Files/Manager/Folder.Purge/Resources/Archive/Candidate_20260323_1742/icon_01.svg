<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A0000"/>
  <!-- Layer 2: 빗자루 + 폴더들 날아가는 (청소) -->
  <!-- 빗자루 자루 (대각선) -->
  <line x1="200" y1="900" x2="780" y2="200" stroke="#CD853F" stroke-width="36" stroke-linecap="round"/>
  <!-- 빗자루 머리 (하단 왼쪽) -->
  <polygon points="80,820 280,920 160,960" fill="#D2691E"/>
  <polygon points="80,820 200,900 80,920" fill="#A0522D"/>
  <!-- 빗자루 머리 털 -->
  <line x1="80" y1="820" x2="60" y2="940" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="110" y1="840" x2="100" y2="960" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="140" y1="858" x2="140" y2="964" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="170" y1="874" x2="186" y2="964" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="888" x2="226" y2="962" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="230" y1="900" x2="264" y2="958" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <!-- 날아가는 폴더들 -->
  <!-- 폴더 1 -->
  <rect x="560" y="80" width="160" height="120" rx="12" fill="#FF6B6B"/>
  <rect x="560" y="60" width="80" height="30" rx="8" fill="#FF8E8E"/>
  <!-- 폴더 2 -->
  <rect x="760" y="140" width="140" height="110" rx="12" fill="#FF6B6B" opacity="0.8"/>
  <rect x="760" y="122" width="70" height="26" rx="6" fill="#FF8E8E" opacity="0.8"/>
  <!-- 폴더 3 -->
  <rect x="680" y="280" width="130" height="100" rx="12" fill="#FF6B6B" opacity="0.6"/>
  <rect x="680" y="264" width="65" height="24" rx="6" fill="#FF8E8E" opacity="0.6"/>
  <!-- 먼지 파티클 -->
  <circle cx="500" cy="180" r="12" fill="#FF8E8E" opacity="0.5"/>
  <circle cx="540" cy="240" r="9" fill="#FF8E8E" opacity="0.4"/>
  <circle cx="620" cy="200" r="7" fill="#FF8E8E" opacity="0.3"/>
  <!-- Layer 3: PURGE 텍스트 -->
  <text x="512" y="740" font-size="120" fill="#FF4444" text-anchor="middle" font-weight="bold" font-family="Arial">PURGE</text>
</svg>
