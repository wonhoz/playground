<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Clipboard with gradient AI halo — premium minimal -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#070714"/>
  <!-- Halo / glow ring behind clipboard -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#7C4DFF" stroke-width="6" opacity="0.2"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#E040FB" stroke-width="4" opacity="0.15"/>
  <!-- Clipboard body (filled) -->
  <rect x="270" y="230" width="484" height="600" rx="36" fill="#12122A"/>
  <rect x="270" y="230" width="484" height="600" rx="36" fill="none" stroke="#7C4DFF" stroke-width="26"/>
  <!-- Clip top bar -->
  <rect x="376" y="196" width="272" height="72" rx="16" fill="#7C4DFF"/>
  <rect x="426" y="176" width="172" height="68" rx="16" fill="#4A148C"/>
  <!-- AI content: summary icon (3 lines decreasing) -->
  <rect x="330" y="370" width="364" height="26" rx="13" fill="#7C4DFF" opacity="0.9"/>
  <rect x="330" y="424" width="290" height="22" rx="11" fill="#7C4DFF" opacity="0.6"/>
  <rect x="330" y="472" width="320" height="22" rx="11" fill="#7C4DFF" opacity="0.6"/>
  <!-- Divider -->
  <rect x="330" y="524" width="364" height="4" rx="2" fill="#7C4DFF" opacity="0.25"/>
  <!-- AI badge: small hexagon bottom right -->
  <path d="M560 580 L600 558 L640 580 L640 624 L600 646 L560 624 Z" fill="#E040FB"/>
  <path d="M578 602 L590 594 L608 594 L620 602 L620 618 L608 626 L590 626 L578 618 Z" fill="#12122A"/>
  <!-- AI text hint inside badge -->
  <rect x="588" y="604" width="24" height="8" rx="4" fill="#E040FB"/>
  <rect x="588" y="616" width="18" height="8" rx="4" fill="#E040FB" opacity="0.7"/>
</svg>
