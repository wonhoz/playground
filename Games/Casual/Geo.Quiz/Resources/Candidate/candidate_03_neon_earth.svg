<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#000a00"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#002171"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="120" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="430" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="470" cy="140" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="80" cy="420" r="2" fill="white" opacity="0.6"/>
  <circle cx="460" cy="400" r="1.5" fill="white" opacity="0.7"/>
  <!-- Earth -->
  <circle cx="256" cy="256" r="170" fill="url(#earthGrad)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#00e676" stroke-width="3" filter="url(#glow)"/>
  <!-- Neon land masses -->
  <ellipse cx="230" cy="220" rx="55" ry="38" fill="#00e676" opacity="0.25"/>
  <ellipse cx="290" cy="235" rx="40" ry="28" fill="#00e676" opacity="0.2"/>
  <ellipse cx="210" cy="275" rx="35" ry="25" fill="#00e676" opacity="0.22"/>
  <ellipse cx="275" cy="285" rx="28" ry="20" fill="#00e676" opacity="0.18"/>
  <ellipse cx="190" cy="245" rx="22" ry="16" fill="#00e676" opacity="0.2"/>
  <!-- Neon land outlines -->
  <ellipse cx="230" cy="220" rx="55" ry="38" fill="none" stroke="#00e676" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="290" cy="235" rx="40" ry="28" fill="none" stroke="#00e676" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <ellipse cx="210" cy="275" rx="35" ry="25" fill="none" stroke="#00e676" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  <!-- Neon latitude lines -->
  <ellipse cx="256" cy="256" rx="170" ry="34" fill="none" stroke="#00e676" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <ellipse cx="256" cy="205" rx="155" ry="24" fill="none" stroke="#00e676" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="256" cy="307" rx="155" ry="24" fill="none" stroke="#00e676" stroke-width="0.8" opacity="0.3"/>
  <!-- Quiz question mark floating -->
  <circle cx="390" cy="140" r="42" fill="none" stroke="#f6c90e" stroke-width="3" filter="url(#glow)"/>
  <text x="390" y="158" font-family="Arial" font-size="44" font-weight="900" fill="#f6c90e" text-anchor="middle" filter="url(#glow)">?</text>
  <!-- Multiple choice style buttons -->
  <rect x="80" y="390" width="80" height="32" rx="8" fill="none" stroke="#ff5252" stroke-width="2" filter="url(#glow)"/>
  <text x="120" y="412" font-family="Arial" font-size="14" font-weight="bold" fill="#ff5252" text-anchor="middle" filter="url(#glow)">A. Japan</text>
  <rect x="175" y="390" width="80" height="32" rx="8" fill="#00e676" opacity="0.8"/>
  <text x="215" y="412" font-family="Arial" font-size="14" font-weight="bold" fill="#001a00" text-anchor="middle">B. Korea</text>
  <rect x="270" y="390" width="80" height="32" rx="8" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
  <text x="310" y="412" font-family="Arial" font-size="14" font-weight="bold" fill="#00e5ff" text-anchor="middle" filter="url(#glow)">C. China</text>
  <rect x="365" y="390" width="80" height="32" rx="8" fill="none" stroke="#7c4dff" stroke-width="2" filter="url(#glow)"/>
  <text x="405" y="412" font-family="Arial" font-size="14" font-weight="bold" fill="#7c4dff" text-anchor="middle" filter="url(#glow)">D. India</text>
  <!-- Title -->
  <text x="256" y="472" font-family="Arial" font-size="32" font-weight="900" fill="#00e676" text-anchor="middle" filter="url(#glow)" letter-spacing="3">GEO.QUIZ</text>
</svg>
