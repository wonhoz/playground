<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#3A86FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg1)"/>

  <!-- BEFORE card (left) -->
  <rect x="50" y="180" width="350" height="400" rx="28" fill="#FFFFFF" stroke="#1565C0" stroke-width="16"/>
  <!-- Scattered chaotic files -->
  <!-- File pile, random angles -->
  <rect x="80" y="210" width="110" height="130" rx="12" fill="#BBDEFB" stroke="#1565C0" stroke-width="10" transform="rotate(12, 135, 275)"/>
  <rect x="75" y="205" width="80" height="96" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="7" transform="rotate(12, 115, 253)"/>
  <polygon points="75,205 155,205 155,235 75,235" fill="#3A86FF" transform="rotate(12, 115, 220)"/>

  <rect x="160" y="220" width="110" height="130" rx="12" fill="#BBDEFB" stroke="#1565C0" stroke-width="10" transform="rotate(-15, 215, 285)"/>
  <rect x="155" y="215" width="80" height="96" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="7" transform="rotate(-15, 195, 263)"/>
  <polygon points="155,215 235,215 235,245 155,245" fill="#FF6B9D" transform="rotate(-15, 195, 230)"/>

  <rect x="230" y="300" width="110" height="130" rx="12" fill="#BBDEFB" stroke="#1565C0" stroke-width="10" transform="rotate(8, 285, 365)"/>
  <rect x="225" y="295" width="80" height="96" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="7" transform="rotate(8, 265, 343)"/>
  <polygon points="225,295 305,295 305,325 225,325" fill="#06D6A0" transform="rotate(8, 265, 310)"/>

  <rect x="80" y="350" width="130" height="150" rx="12" fill="#BBDEFB" stroke="#1565C0" stroke-width="10" transform="rotate(-8, 145, 425)"/>
  <polygon points="80,350 210,350 210,380 80,380" fill="#FFD93D" transform="rotate(-8, 145, 365)"/>

  <!-- BEFORE label -->
  <rect x="80" y="540" width="280" height="22" rx="8" fill="#90CAF9" stroke="#1565C0" stroke-width="8"/>
  <rect x="70" y="576" width="300" height="62" rx="20" fill="#90CAF9" stroke="#1565C0" stroke-width="10"/>
  <text x="220" y="619" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#1565C0" text-anchor="middle">CHAOS</text>

  <!-- Arrow -->
  <rect x="418" y="378" width="130" height="44" rx="18" fill="url(#arrowG)" stroke="#1A5CC9" stroke-width="12"/>
  <polygon points="548,350 632,400 548,450" fill="#1565C0" stroke="#1A5CC9" stroke-width="12" stroke-linejoin="round"/>

  <!-- AFTER card (right) — organized date folders -->
  <rect x="642" y="180" width="332" height="400" rx="28" fill="#FFFFFF" stroke="#1565C0" stroke-width="16"/>
  <!-- Folder tree: year/month/day -->
  <!-- 2024 folder -->
  <rect x="662" y="210" width="292" height="54" rx="14" fill="#3A86FF" stroke="#1565C0" stroke-width="12"/>
  <text x="808" y="248" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">2024</text>
  <!-- L-branch -->
  <rect x="680" y="268" width="12" height="100" rx="4" fill="#1565C0"/>
  <!-- Jan folder -->
  <rect x="700" y="270" width="234" height="46" rx="12" fill="#64B5F6" stroke="#1565C0" stroke-width="10"/>
  <text x="817" y="302" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle">01 JAN</text>
  <!-- L-branch -->
  <rect x="718" y="320" width="10" height="80" rx="4" fill="#1565C0"/>
  <!-- Day files -->
  <rect x="736" y="322" width="196" height="38" rx="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="8"/>
  <text x="834" y="349" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#1565C0" text-anchor="middle">01/  ▶ 12 files</text>

  <rect x="736" y="366" width="196" height="38" rx="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="8"/>
  <text x="834" y="393" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#1565C0" text-anchor="middle">15/  ▶ 8 files</text>

  <!-- Feb folder -->
  <rect x="700" y="412" width="234" height="46" rx="12" fill="#64B5F6" stroke="#1565C0" stroke-width="10"/>
  <text x="817" y="444" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle">02 FEB</text>

  <!-- L-branch to Feb -->
  <rect x="680" y="316" width="20" height="12" rx="4" fill="#1565C0"/>
  <rect x="680" y="364" width="20" height="12" rx="4" fill="#1565C0"/>
  <rect x="680" y="412" width="20" height="12" rx="4" fill="#1565C0"/>

  <!-- SORTED label -->
  <rect x="672" y="554" width="282" height="62" rx="20" fill="#1565C0" stroke="#0D47A1" stroke-width="10"/>
  <text x="813" y="597" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">SORTED</text>

  <!-- Title badge -->
  <rect x="112" y="694" width="800" height="100" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="760" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PHOTO ORGANIZER</text>

  <!-- ORGANIZE badge -->
  <rect x="262" y="826" width="500" height="76" rx="28" fill="#3A86FF" stroke="#1565C0" stroke-width="12"/>
  <text x="512" y="878" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">BY DATE</text>
</svg>
