<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000D1A"/>
      <stop offset="100%" stop-color="#001F3F"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon tag outline -->
  <path d="M 100,160 L 300,160 L 340,256 L 300,352 L 100,352 Z" fill="none" stroke="#00FFFF" stroke-width="6" filter="url(#glow)" opacity="0.9"/>
  <path d="M 100,160 L 300,160 L 340,256 L 300,352 L 100,352 Z" fill="#00FFFF" opacity="0.05"/>
  <!-- Tag hole -->
  <circle cx="132" cy="256" r="20" fill="none" stroke="#00FFFF" stroke-width="5" filter="url(#glow)"/>
  <!-- Neon music note -->
  <g stroke="#00FFFF" stroke-width="5" fill="none" filter="url(#glow)">
    <rect x="204" y="196" width="14" height="72" rx="3" fill="#00FFFF" stroke="none" opacity="0.8"/>
    <ellipse cx="196" cy="272" rx="22" ry="16" transform="rotate(-15 196 272)"/>
    <rect x="218" y="196" width="14" height="56" rx="3" fill="#00FFFF" stroke="none" opacity="0.8"/>
    <ellipse cx="210" cy="256" rx="22" ry="16" transform="rotate(-15 210 256)"/>
    <line x1="204" y1="196" x2="232" y2="196" stroke="#00FFFF" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Equalizer bars on the right -->
  <rect x="364" y="296" width="18" height="80" rx="9" fill="#00FFFF" opacity="0.7" filter="url(#glow)"/>
  <rect x="390" y="256" width="18" height="120" rx="9" fill="#00FFFF" opacity="0.8" filter="url(#glow)"/>
  <rect x="416" y="276" width="18" height="100" rx="9" fill="#00FFFF" opacity="0.7" filter="url(#glow)"/>
  <!-- Edit cursor -->
  <rect x="364" y="152" width="4" height="28" rx="2" fill="#00FFFF" opacity="0.9"/>
  <rect x="370" y="160" width="60" height="6" rx="3" fill="#00FFFF" opacity="0.6"/>
  <rect x="370" y="172" width="44" height="6" rx="3" fill="#00FFFF" opacity="0.4"/>
</svg>
