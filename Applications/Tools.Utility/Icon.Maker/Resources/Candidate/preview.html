<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Icon.Maker - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #f97316; font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .card:hover { border-color: #f97316; }
    .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .label { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .num { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Icon.Maker — Icon Candidates</h1>
  <p>아이콘 제작·ICO 생성 도구 아이콘 후보 10개</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_palette_forge.svg" alt="palette_forge"/>
      <div class="label">palette_forge</div>
      <div class="num">#01</div>
    </div>
    <div class="card">
      <img src="candidate_02_neon_pixel.svg" alt="neon_pixel"/>
      <div class="label">neon_pixel</div>
      <div class="num">#02</div>
    </div>
    <div class="card">
      <img src="candidate_03_blue_studio.svg" alt="blue_studio"/>
      <div class="label">blue_studio</div>
      <div class="num">#03</div>
    </div>
    <div class="card">
      <img src="candidate_04_green_craft.svg" alt="green_craft"/>
      <div class="label">green_craft</div>
      <div class="num">#04</div>
    </div>
    <div class="card">
      <img src="candidate_05_red_ico_stack.svg" alt="red_ico_stack"/>
      <div class="label">red_ico_stack</div>
      <div class="num">#05</div>
    </div>
    <div class="card">
      <img src="candidate_06_teal_wizard.svg" alt="teal_wizard"/>
      <div class="label">teal_wizard</div>
      <div class="num">#06</div>
    </div>
    <div class="card">
      <img src="candidate_07_golden_sizes.svg" alt="golden_sizes"/>
      <div class="label">golden_sizes</div>
      <div class="num">#07</div>
    </div>
    <div class="card">
      <img src="candidate_08_purple_layers.svg" alt="purple_layers"/>
      <div class="label">purple_layers</div>
      <div class="num">#08</div>
    </div>
    <div class="card">
      <img src="candidate_09_slate_professional.svg" alt="slate_professional"/>
      <div class="label">slate_professional</div>
      <div class="num">#09</div>
    </div>
    <div class="card">
      <img src="candidate_10_white_simple.svg" alt="white_simple"/>
      <div class="label">white_simple</div>
      <div class="num">#10</div>
    </div>
  </div>
</body>
</html>
