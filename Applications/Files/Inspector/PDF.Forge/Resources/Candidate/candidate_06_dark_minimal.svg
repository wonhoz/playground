<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimal document icon -->
  <rect x="130" y="90" width="220" height="290" rx="12" fill="#252525" stroke="#333333" stroke-width="3"/>
  <!-- Top corner fold -->
  <polygon points="290,90 350,90 350,150 290,150" fill="#1A1A1A"/>
  <polygon points="290,90 350,150 290,150" fill="#111111"/>
  <line x1="290" y1="90" x2="350" y2="150" stroke="#333333" stroke-width="2"/>
  <!-- Red accent left border -->
  <rect x="130" y="90" width="8" height="290" rx="4" fill="url(#accent)"/>
  <!-- PDF badge - large and bold -->
  <rect x="148" y="140" width="140" height="72" rx="10" fill="url(#accent)"/>
  <text x="218" y="194" font-family="sans-serif" font-size="44" fill="#FFFFFF" text-anchor="middle" font-weight="900">PDF</text>
  <!-- Minimal text lines -->
  <rect x="148" y="234" width="160" height="7" rx="3.5" fill="#444444"/>
  <rect x="148" y="250" width="140" height="7" rx="3.5" fill="#3A3A3A"/>
  <rect x="148" y="266" width="150" height="7" rx="3.5" fill="#3A3A3A"/>
  <rect x="148" y="282" width="120" height="7" rx="3.5" fill="#3A3A3A"/>
  <rect x="148" y="310" width="100" height="7" rx="3.5" fill="#3A3A3A"/>
  <rect x="148" y="326" width="140" height="7" rx="3.5" fill="#3A3A3A"/>
  <rect x="148" y="342" width="130" height="7" rx="3.5" fill="#3A3A3A"/>
  <!-- Forge small icon at bottom -->
  <rect x="250" y="400" width="90" height="30" rx="6" fill="#1A1A1A" stroke="#444444" stroke-width="2"/>
  <text x="295" y="421" font-family="sans-serif" font-size="13" fill="#888888" text-anchor="middle">FORGE</text>
  <!-- Subtle shadow at bottom of doc -->
  <rect x="130" y="368" width="220" height="12" rx="6" fill="url(#accent)" opacity="0.3"/>
</svg>
