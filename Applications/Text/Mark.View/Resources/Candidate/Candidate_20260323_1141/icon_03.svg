<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#FFF8E1"/>
  <!-- Layer 2: Open book -->
  <!-- Book spine -->
  <rect x="488" y="280" width="28" height="480" rx="8" fill="#795548"/>
  <!-- Left page -->
  <rect x="180" y="280" width="308" height="480" rx="8" fill="white" stroke="#795548" stroke-width="4"/>
  <!-- Right page -->
  <rect x="516" y="280" width="308" height="480" rx="8" fill="white" stroke="#795548" stroke-width="4"/>
  <!-- Layer 3: # on left page -->
  <text x="335" y="560" font-family="Arial Black" font-size="220" font-weight="900" fill="#F57F17" text-anchor="middle">#</text>
  <!-- Lines on right page -->
  <rect x="546" y="340" width="248" height="16" rx="8" fill="#795548" opacity="0.3"/>
  <rect x="546" y="374" width="200" height="16" rx="8" fill="#795548" opacity="0.3"/>
  <rect x="546" y="408" width="228" height="16" rx="8" fill="#795548" opacity="0.3"/>
  <rect x="546" y="442" width="180" height="16" rx="8" fill="#795548" opacity="0.2"/>
  <!-- Star -->
  <polygon points="512,240 522,270 554,270 529,288 538,318 512,300 486,318 495,288 470,270 502,270" fill="#F57F17"/>
