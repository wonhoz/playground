<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff2200"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cc1a00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flame graph rows (process call stack) -->
  <!-- Bottom row (widest) -->
  <rect x="90" y="350" width="332" height="28" rx="3" fill="url(#flame1)" opacity="0.9"/>
  <text x="256" y="369" text-anchor="middle" font-family="monospace" font-size="11" fill="#000" font-weight="bold">main() — 100%</text>
  <!-- Row 2 -->
  <rect x="90" y="318" width="240" height="28" rx="3" fill="url(#flame1)" opacity="0.85"/>
  <text x="210" y="337" text-anchor="middle" font-family="monospace" font-size="11" fill="#000">processData() 72%</text>
  <rect x="334" y="318" width="88" height="28" rx="3" fill="url(#flame2)" opacity="0.8"/>
  <text x="378" y="337" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">render() 26%</text>
  <!-- Row 3 -->
  <rect x="90" y="286" width="160" height="28" rx="3" fill="url(#flame1)" opacity="0.8"/>
  <text x="170" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#000">parse() 48%</text>
  <rect x="254" y="286" width="76" height="28" rx="3" fill="url(#flame2)" opacity="0.75"/>
  <text x="292" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">calc() 23%</text>
  <rect x="334" y="286" width="88" height="28" rx="3" fill="url(#flame2)" opacity="0.7"/>
  <text x="378" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">draw() 26%</text>
  <!-- Row 4 -->
  <rect x="90" y="254" width="80" height="28" rx="3" fill="url(#flame1)" opacity="0.75"/>
  <text x="130" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#000">read() 24%</text>
  <rect x="174" y="254" width="76" height="28" rx="3" fill="url(#flame1)" opacity="0.7"/>
  <text x="212" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#000">sort() 23%</text>
  <rect x="254" y="254" width="40" height="28" rx="3" fill="url(#flame2)" opacity="0.65"/>
  <text x="274" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">fft()</text>
  <!-- Title -->
  <text x="256" y="120" text-anchor="middle" font-family="monospace" font-size="20" fill="#ff8c00" font-weight="bold">FLAME GRAPH</text>
  <text x="256" y="145" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff6600" opacity="0.8">Process Call Stack</text>
  <!-- Flame decoration -->
  <path d="M220 200 Q230 165 256 155 Q282 165 292 200 Q272 180 256 185 Q240 180 220 200 Z" fill="url(#flame1)" opacity="0.6"/>
  <!-- Benchmark score -->
  <text x="256" y="235" text-anchor="middle" font-family="monospace" font-size="15" fill="#ffd700" font-weight="bold">SCORE: 9842</text>
</svg>
