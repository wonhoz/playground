  <path d="M200,250 C350,350 500,500 650,650 C720,720 790,760 860,800" fill="none" stroke="#CE93D8" stroke-width="44" stroke-linecap="round"/>
  <!-- 흐름 2: 오른쪽위 → 왼쪽아래 -->
