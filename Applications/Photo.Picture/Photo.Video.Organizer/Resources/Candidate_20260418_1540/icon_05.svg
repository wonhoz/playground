<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="camera" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="cal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 카메라 몸체 (하단) -->
    <rect x="140" y="440" width="560" height="380" rx="36" fill="url(#camera)"/>
    <!-- 카메라 뷰파인더 -->
    <rect x="200" y="380" width="200" height="80" rx="18" fill="#1E3A8A"/>
    <!-- 카메라 렌즈 -->
    <circle cx="420" cy="630" r="130" fill="#0D47A1"/>
    <circle cx="420" cy="630" r="105" fill="#1565C0"/>
    <circle cx="420" cy="630" r="80" fill="#0D47A1"/>
    <circle cx="420" cy="630" r="56" fill="#1E88E5"/>
    <circle cx="420" cy="630" r="32" fill="#90CAF9"/>
    <circle cx="420" cy="630" r="14" fill="#FFFFFF"/>
    <!-- 렌즈 반사 -->
    <ellipse cx="400" cy="606" rx="18" ry="10" fill="#FFFFFF" opacity="0.5"/>
    <!-- 카메라 플래시 -->
    <rect x="560" y="470" width="80" height="48" rx="12" fill="#FFD54F"/>
    <!-- 셔터 버튼 -->
    <circle cx="640" cy="430" r="28" fill="#E0E0E0"/>
    <circle cx="640" cy="430" r="18" fill="#BDBDBD"/>

    <!-- 달력 (우측 상단, 카메라와 결합) -->
    <rect x="580" y="120" width="360" height="420" rx="28" fill="url(#cal)"/>
    <!-- 달력 상단 고리 -->
    <rect x="640" y="96" width="30" height="48" rx="10" fill="#BF360C"/>
    <rect x="860" y="96" width="30" height="48" rx="10" fill="#BF360C"/>
    <!-- 달력 헤더 -->
    <rect x="580" y="120" width="360" height="72" rx="28" fill="#BF360C"/>
    <text x="760" y="170" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">3월</text>
    <!-- 달력 날짜 그리드 (4x3) -->
    <text x="620" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="680" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="740" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="800" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="860" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFD54F" text-anchor="middle">5</text>
    <text x="920" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFD54F" text-anchor="middle">6</text>
    <text x="620" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">7</text>
    <text x="680" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">8</text>
    <text x="740" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">9</text>
    <!-- 하이라이트 날짜 (촬영일) -->
    <circle cx="800" cy="284" r="26" fill="#FFD54F"/>
    <text x="800" y="298" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="36" fill="#BF360C" text-anchor="middle">15</text>
    <text x="860" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">16</text>
    <text x="920" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">17</text>
    <text x="620" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">21</text>
    <text x="680" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">22</text>
    <text x="740" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">23</text>
    <text x="800" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">28</text>
    <text x="860" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">29</text>
    <text x="920" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">30</text>
    <!-- EXIF 라벨 -->
    <rect x="600" y="430" width="320" height="54" rx="16" fill="#BF360C" opacity="0.8"/>
    <text x="760" y="466" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">EXIF 자동 정렬</text>

    <!-- 타이틀 -->
    <rect x="140" y="850" width="744" height="70" rx="24" fill="#0D47A1"/>
    <text x="512" y="897" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">PHOTO·VIDEO ORGANIZER</text>
  </g>
</svg>
