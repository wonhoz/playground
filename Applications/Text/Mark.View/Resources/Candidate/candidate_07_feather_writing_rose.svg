<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#881337"/>
      <stop offset="100%" stop-color="#BE123C"/>
    </linearGradient>
    <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FFE4E6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scroll/parchment -->
  <rect x="120" y="100" width="270" height="320" rx="8" fill="url(#scroll)"/>
  <!-- Scroll ends (rolled) -->
  <ellipse cx="256" cy="100" rx="135" ry="20" fill="#FECDD3"/>
  <ellipse cx="256" cy="420" rx="135" ry="20" fill="#FECDD3"/>
  <!-- Text on scroll - markdown style -->
  <rect x="150" y="130" width="10" height="14" rx="2" fill="#BE123C" opacity="0.8"/>
  <rect x="166" y="130" width="140" height="14" rx="3" fill="#881337" opacity="0.6"/>
  <rect x="150" y="156" width="200" height="9" rx="3" fill="#be123c" opacity="0.3"/>
  <rect x="150" y="173" width="175" height="9" rx="3" fill="#be123c" opacity="0.3"/>
  <rect x="150" y="190" width="185" height="9" rx="3" fill="#be123c" opacity="0.3"/>
  <rect x="150" y="215" width="10" height="10" rx="2" fill="#BE123C" opacity="0.7"/>
  <rect x="166" y="215" width="110" height="10" rx="3" fill="#881337" opacity="0.5"/>
  <rect x="150" y="233" width="195" height="9" rx="3" fill="#be123c" opacity="0.3"/>
  <rect x="150" y="250" width="155" height="9" rx="3" fill="#be123c" opacity="0.3"/>
  <!-- Bullet list on scroll -->
  <circle cx="156" cy="277" r="4" fill="#BE123C" opacity="0.7"/>
  <rect x="168" y="273" width="140" height="8" rx="3" fill="#be123c" opacity="0.35"/>
  <circle cx="156" cy="295" r="4" fill="#BE123C" opacity="0.7"/>
  <rect x="168" y="291" width="120" height="8" rx="3" fill="#be123c" opacity="0.35"/>
  <circle cx="156" cy="313" r="4" fill="#BE123C" opacity="0.7"/>
  <rect x="168" y="309" width="150" height="8" rx="3" fill="#be123c" opacity="0.35"/>
  <!-- Feather quill -->
  <path d="M380 80 Q440 140 390 220 Q370 260 330 300 L320 310 Q315 290 325 270 Q350 200 360 130 Q370 100 380 80 Z" fill="url(#feather)" stroke="#FECDD3" stroke-width="1.5"/>
  <!-- Feather barbs -->
  <path d="M370 100 Q340 130 330 160" stroke="#FECDD3" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M380 115 Q350 145 345 175" stroke="#FECDD3" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M385 135 Q360 165 355 200" stroke="#FECDD3" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M385 160 Q365 190 360 225" stroke="#FECDD3" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M380 185 Q365 215 355 248" stroke="#FECDD3" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Quill nib -->
  <path d="M320 310 L300 360 L330 300 Z" fill="#881337"/>
  <!-- Ink drop -->
  <ellipse cx="305" cy="370" rx="8" ry="12" fill="#881337" opacity="0.8"/>
  <!-- Ink trail -->
  <path d="M305 382 Q302 400 305 415" stroke="#881337" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
