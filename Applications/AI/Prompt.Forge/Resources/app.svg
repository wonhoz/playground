<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#2D1060"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="250" fill="url(#bg1)"/>
  <!-- Layer 2: Main — 3개 문서 카드 스택 -->
  <rect x="192" y="332" width="680" height="420" rx="28" fill="#3B1A7A" opacity="0.7"/>
  <rect x="172" y="302" width="680" height="420" rx="28" fill="#4C2494" opacity="0.8"/>
  <rect x="152" y="272" width="680" height="430" rx="28" fill="url(#card)"/>
  <!-- Layer 3: 텍스트 라인들 -->
  <rect x="212" y="352" width="380" height="44" rx="10" fill="#C4B5FD"/>
  <rect x="212" y="420" width="520" height="36" rx="8" fill="#A78BFA" opacity="0.7"/>
  <rect x="212" y="480" width="460" height="36" rx="8" fill="#A78BFA" opacity="0.7"/>
  <rect x="212" y="540" width="320" height="36" rx="8" fill="#A78BFA" opacity="0.5"/>
  <!-- 태그 라벨 -->
  <rect x="212" y="620" width="140" height="44" rx="22" fill="#FBBF24"/>
  <rect x="372" y="620" width="120" height="44" rx="22" fill="#34D399" opacity="0.9"/>
  <!-- 즐겨찾기 별 -->
  <text x="772" y="342" font-size="90" fill="#FBBF24" text-anchor="middle" dominant-baseline="middle">★</text>
</svg>
