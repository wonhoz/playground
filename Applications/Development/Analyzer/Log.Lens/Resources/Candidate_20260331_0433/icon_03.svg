<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 멀티탭 UI -->
  <!-- 탭 헤더 바 -->
  <rect x="80" y="120" width="864" height="80" rx="12" fill="#006064"/>
  <!-- 탭 아이템들 -->
  <rect x="96" y="128" width="200" height="64" rx="8" fill="#00BCD4"/>
  <text x="196" y="172" font-family="'Segoe UI', sans-serif" font-size="40" fill="white" text-anchor="middle">app.log</text>
  <rect x="310" y="132" width="180" height="56" rx="8" fill="#00838F" opacity="0.7"/>
  <text x="400" y="172" font-family="'Segoe UI', sans-serif" font-size="36" fill="#B2EBF2" text-anchor="middle">err.log</text>
  <rect x="504" y="132" width="180" height="56" rx="8" fill="#00838F" opacity="0.5"/>
  <text x="594" y="172" font-family="'Segoe UI', sans-serif" font-size="36" fill="#B2EBF2" text-anchor="middle">sys.log</text>
  <!-- 탭 콘텐츠 패널 -->
  <rect x="80" y="200" width="864" height="720" rx="12" fill="white" stroke="#00897B" stroke-width="6"/>
  <!-- 로그 라인들 -->
  <rect x="96" y="220" width="832" height="56" rx="8" fill="#E8F5E9"/>
  <text x="120" y="258" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">[INFO] 2026-03-31 App started</text>
  <rect x="96" y="290" width="832" height="56" rx="8" fill="#FFF3E0"/>
  <text x="120" y="328" font-family="'Consolas', monospace" font-size="44" fill="#E65100">[WARN] Memory 85%</text>
  <rect x="96" y="360" width="832" height="56" rx="8" fill="#FFEBEE"/>
  <text x="120" y="398" font-family="'Consolas', monospace" font-size="44" fill="#B71C1C">[ERROR] DB timeout</text>
  <rect x="96" y="430" width="832" height="56" rx="8" fill="#E8F5E9"/>
  <text x="120" y="468" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">[INFO] Retry success</text>
  <rect x="96" y="500" width="832" height="56" rx="8" fill="#E8F5E9"/>
  <text x="120" y="538" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">[INFO] Request /api</text>
  <!-- Layer 3: 검색 필터바 -->
  <rect x="96" y="580" width="832" height="68" rx="16" fill="#E0F7FA" stroke="#00BCD4" stroke-width="6"/>
  <text x="170" y="626" font-family="'Segoe UI', sans-serif" font-size="44" fill="#78909C">🔍 Filter logs...</text>
</svg>
