<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05000f"/>
      <stop offset="100%" stop-color="#0f0520"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#8338ec"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb5607"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#8338ec"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of clipboards (back) -->
  <rect x="176" y="185" width="175" height="220" rx="10" fill="#1a0030" stroke="url(#c1)" stroke-width="2.5" transform="rotate(-8 263 295)" filter="url(#neon)" opacity="0.7"/>
  <!-- Stack of clipboards (middle) -->
  <rect x="166" y="180" width="175" height="220" rx="10" fill="#100025" stroke="url(#c2)" stroke-width="2.5" transform="rotate(-3 253 290)" filter="url(#neon)" opacity="0.85"/>
  <!-- Main clipboard (front) -->
  <rect x="158" y="170" width="195" height="240" rx="12" fill="#080015" stroke="url(#c3)" stroke-width="3" filter="url(#neon)"/>
  <!-- Clip top (front) -->
  <rect x="218" y="155" width="76" height="28" rx="8" fill="#080015" stroke="url(#c3)" stroke-width="3" filter="url(#neon)"/>
  <rect x="228" y="161" width="56" height="16" rx="4" fill="#3a86ff" fill-opacity="0.45"/>
  <!-- Neon lines on front clipboard -->
  <line x1="178" y1="218" x2="335" y2="218" stroke="#3a86ff" stroke-width="2" filter="url(#neon)" opacity="0.8"/>
  <line x1="178" y1="248" x2="320" y2="248" stroke="#8338ec" stroke-width="2" filter="url(#neon)" opacity="0.7"/>
  <line x1="178" y1="278" x2="330" y2="278" stroke="#3a86ff" stroke-width="2" filter="url(#neon)" opacity="0.7"/>
  <line x1="178" y1="308" x2="310" y2="308" stroke="#8338ec" stroke-width="1.5" filter="url(#neon)" opacity="0.6"/>
  <line x1="178" y1="338" x2="325" y2="338" stroke="#3a86ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="178" y1="365" x2="300" y2="365" stroke="#8338ec" stroke-width="1.5" opacity="0.4"/>
  <!-- Floating number badge -->
  <circle cx="370" cy="160" r="32" fill="#080015" stroke="url(#c2)" stroke-width="3" filter="url(#neon)"/>
  <!-- Number "3" indicator (as dots) -->
  <circle cx="361" cy="155" r="4" fill="#fb5607" filter="url(#neon)"/>
  <circle cx="376" cy="155" r="4" fill="#fb5607" filter="url(#neon)"/>
  <circle cx="368" cy="168" r="4" fill="#ff006e" filter="url(#neon)"/>
  <!-- AI star burst bottom right -->
  <circle cx="370" cy="380" r="18" fill="#080015" stroke="url(#c1)" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="370" y1="357" x2="370" y2="345" stroke="#8338ec" stroke-width="2" filter="url(#neon)"/>
  <line x1="388" y1="362" x2="397" y2="354" stroke="#8338ec" stroke-width="2" filter="url(#neon)"/>
  <line x1="393" y1="380" x2="405" y2="380" stroke="#8338ec" stroke-width="2" filter="url(#neon)"/>
  <line x1="352" y1="362" x2="343" y2="354" stroke="#ff006e" stroke-width="2" filter="url(#neon)"/>
  <line x1="347" y1="380" x2="335" y2="380" stroke="#ff006e" stroke-width="2" filter="url(#neon)"/>
</svg>