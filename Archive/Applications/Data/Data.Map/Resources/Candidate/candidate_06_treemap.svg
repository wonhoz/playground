  <text x="156" y="170" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#90caf9" text-anchor="middle">42%</text>
  <!-- Right top block -->
  <rect x="264" y="80" width="192" height="100" rx="4" fill="#4a148c"/>
