<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 수정 구조 (만화 필터 수정) -->
  <polygon points="256,90 380,220 380,340 256,440 132,340 132,220" fill="#FB923C" opacity="0.07"/>
  <polygon points="256,90 380,220 380,340 256,440 132,340 132,220" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <!-- 면들 -->
  <polygon points="256,90 380,220 256,240" fill="#FB923C" opacity="0.12"/>
  <polygon points="256,90 132,220 256,240" fill="#FDBA74" opacity="0.08"/>
  <!-- 만화 요소들 (버텍스마다) -->
  <circle cx="256" cy="90" r="11" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <!-- 하프톤 별 (상단) -->
  <polygon points="256,90 260,102 272,102 263,110 267,122 256,114 245,122 249,110 240,102 252,102" fill="white" opacity="0.6"/>
  <circle cx="380" cy="220" r="10" fill="#FDBA74" opacity="0.8" filter="url(#glow)"/>
  <circle cx="380" cy="340" r="10" fill="#FB923C" opacity="0.8"/>
  <circle cx="256" cy="440" r="11" fill="#FDBA74" opacity="0.9" filter="url(#glow)"/>
  <circle cx="132" cy="340" r="10" fill="#FB923C" opacity="0.8"/>
  <circle cx="132" cy="220" r="10" fill="#FDBA74" opacity="0.8" filter="url(#glow)"/>
  <!-- 중앙 변환 심볼 -->
  <circle cx="256" cy="240" r="22" fill="#FB923C" opacity="0.2"/>
  <circle cx="256" cy="240" r="14" fill="#FB923C" opacity="0.7" filter="url(#glow)"/>
  <text x="256" y="244" text-anchor="middle" fill="white" font-size="8" font-family="monospace">★</text>
</svg>