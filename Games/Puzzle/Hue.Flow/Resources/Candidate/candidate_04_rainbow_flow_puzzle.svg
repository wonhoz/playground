<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Rainbow arches (concentric semicircles) -->
  <path d="M90,340 A166,166 0 0,1 422,340" stroke="#ef4444" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M110,340 A146,146 0 0,1 402,340" stroke="#f97316" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M130,340 A126,126 0 0,1 382,340" stroke="#eab308" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M150,340 A106,106 0 0,1 362,340" stroke="#22c55e" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M170,340 A86,86 0 0,1 342,340" stroke="#3b82f6" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M190,340 A66,66 0 0,1 322,340" stroke="#8b5cf6" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M210,340 A46,46 0 0,1 302,340" stroke="#ec4899" stroke-width="18" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Ground line -->
  <line x1="60" y1="340" x2="452" y2="340" stroke="#ffffff20" stroke-width="2"/>
  <!-- Puzzle board frame -->
  <rect x="60" y="80" width="392" height="280" rx="16" fill="none" stroke="#ffffff15" stroke-width="2"/>
  <!-- Dot pairs in puzzle area -->
  <circle cx="130" cy="160" r="14" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="380" cy="240" r="14" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="200" cy="120" r="14" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="350" cy="200" r="14" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="280" cy="120" r="14" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="130" cy="270" r="14" fill="#3b82f6" filter="url(#glow)"/>
</svg>
