<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: Twin file silhouettes - exact clones facing each other -->
  <!-- File silhouette left -->
  <g opacity="0.9">
    <rect x="185" y="265" width="240" height="310" rx="22" fill="white"/>
    <polygon points="365,265 425,265 425,325" fill="#0284C7" opacity="0.4"/>
    <line x1="215" y1="380" x2="395" y2="380" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <line x1="215" y1="430" x2="395" y2="430" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <line x1="215" y1="480" x2="340" y2="480" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <!-- Clone badge "1" -->
    <circle cx="250" cy="290" r="32" fill="#0284C7"/>
    <text x="250" y="303" font-family="Arial" font-size="36" fill="white" text-anchor="middle" font-weight="bold">1</text>
  </g>
  <!-- Mirror image file right (identical) -->
  <g opacity="0.9">
    <rect x="599" y="265" width="240" height="310" rx="22" fill="white"/>
    <polygon points="779,265 839,265 839,325" fill="#0284C7" opacity="0.4"/>
    <line x1="629" y1="380" x2="809" y2="380" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <line x1="629" y1="430" x2="809" y2="430" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <line x1="629" y1="480" x2="754" y2="480" stroke="#93C5FD" stroke-width="20" stroke-linecap="round"/>
    <!-- Clone badge "2" -->
    <circle cx="664" cy="290" r="32" fill="#0284C7"/>
    <text x="664" y="303" font-family="Arial" font-size="36" fill="white" text-anchor="middle" font-weight="bold">2</text>
  </g>
  <!-- Equal sign connecting them -->
  <text x="512" y="450" font-family="Arial" font-size="120" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">=</text>
  <!-- Layer 3: "DUPLICATE" label -->
  <rect x="200" y="660" width="624" height="82" rx="20" fill="white" opacity="0.85"/>
  <text x="512" y="718" font-family="Arial" font-size="62" fill="#EF4444" text-anchor="middle" font-weight="bold">DUPLICATE</text>
</svg>
