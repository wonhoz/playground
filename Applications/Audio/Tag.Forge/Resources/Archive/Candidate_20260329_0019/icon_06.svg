<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | 음표 + 가격표 태그 결합 — Tag.Forge 심볼 | 중앙 심볼 | 하늘+파랑+주황 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#1565C0" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Large price tag / label shape (center) -->
  <!-- Tag body: rounded rect with notch for string -->
  <path d="M220,240 L740,240 L820,400 L740,560 L220,560 L140,400 Z"
        fill="#1565C0" filter="url(#sh6)"/>
  <!-- Tag inner highlight -->
  <path d="M240,264 L720,264 L794,400 L720,536 L240,536 L166,400 Z"
        fill="white" opacity="0.1"/>
  <!-- String hole -->
  <circle cx="220" cy="400" r="28" fill="#E3F2FD"/>
  <circle cx="220" cy="400" r="14" fill="#1565C0"/>
  <!-- String -->
  <line x1="160" y1="400" x2="80" y2="360" stroke="#546E7A" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="360" x2="80" y2="310" stroke="#546E7A" stroke-width="8" stroke-linecap="round"/>

  <!-- Musical note on tag -->
  <!-- Note head (oval) -->
  <ellipse cx="430" cy="440" rx="52" ry="40" fill="#FFD740" filter="url(#sh6)"/>
  <!-- Note stem -->
  <rect x="476" y="220" width="18" height="220" rx="9" fill="#FFD740"/>
  <!-- Note flag -->
  <path d="M494,220 C580,260 600,320 494,350" fill="none" stroke="#FFD740" stroke-width="18"
        stroke-linecap="round"/>
  <!-- Second note head (chord) -->
  <ellipse cx="560" cy="390" rx="44" ry="34" fill="#FFD740" opacity="0.8" filter="url(#sh6)"/>

  <!-- Tag text: metadata fields -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="18" fill="#90CAF9"
        text-anchor="middle">Title · Artist</text>
  <text x="620" y="348" font-family="Arial, sans-serif" font-size="18" fill="#90CAF9"
        text-anchor="middle">Album · Year</text>
  <text x="610" y="376" font-family="Arial, sans-serif" font-size="18" fill="#90CAF9"
        text-anchor="middle">Genre · Track</text>

  <!-- Format tags at bottom of main tag -->
  <rect x="250" y="490" width="90" height="34" rx="10" fill="#FF6F00"/>
  <text x="295" y="507" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">MP3</text>
  <rect x="356" y="490" width="100" height="34" rx="10" fill="#7B1FA2"/>
  <text x="406" y="507" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">FLAC</text>
  <rect x="472" y="490" width="90" height="34" rx="10" fill="#00897B"/>
  <text x="517" y="507" font-family="Arial Black, sans-serif" font-size="18" fill="white"
        text-anchor="middle" dominant-baseline="middle">OGG</text>

  <!-- Floating small tags (background) -->
  <rect x="750" y="200" width="180" height="60" rx="14" fill="#FF6F00" filter="url(#sh6)" opacity="0.8"/>
  <text x="840" y="222" font-family="Arial, sans-serif" font-size="14" fill="white"
        text-anchor="middle">MusicBrainz</text>
  <text x="840" y="244" font-family="Arial, sans-serif" font-size="16" fill="white"
        text-anchor="middle">자동 조회</text>

  <rect x="750" y="560" width="180" height="60" rx="14" fill="#43A047" filter="url(#sh6)" opacity="0.8"/>
  <text x="840" y="582" font-family="Arial, sans-serif" font-size="14" fill="white"
        text-anchor="middle">앨범 아트</text>
  <text x="840" y="604" font-family="Arial, sans-serif" font-size="16" fill="white"
        text-anchor="middle">자동 저장</text>

  <!-- Bottom badge -->
  <rect x="220" y="680" width="584" height="76" rx="24" fill="white" filter="url(#sh6)"/>
  <text x="512" y="718" font-family="Arial Black, sans-serif" font-size="42" fill="#1565C0"
        text-anchor="middle" dominant-baseline="middle">Tag.Forge</text>
</svg>
