<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 레이어드 이미지 스택 -->
  <!-- 뒤 카드 — 흐릿(저화질) 회색 -->
  <rect x="150" y="200" width="480" height="340" rx="22" fill="#ECEFF1" transform="rotate(-8 390 370)"/>
  <!-- 흐릿 표현 — 블러 직사각형들 -->
  <rect x="180" y="240" width="200" height="120" rx="8" fill="#B0BEC5" transform="rotate(-8 280 300)" opacity="0.7"/>
  <rect x="390" y="260" width="180" height="140" rx="8" fill="#CFD8DC" transform="rotate(-8 480 330)" opacity="0.6"/>
  <!-- 중간 카드 -->
  <rect x="200" y="260" width="480" height="340" rx="22" fill="#E0F7FA" transform="rotate(-3 440 430)"/>
  <!-- 앞 카드 — 선명 (고화질) -->
  <rect x="260" y="330" width="520" height="370" rx="22" fill="white"/>
  <!-- 선명한 이미지 표현 -->
  <rect x="280" y="350" width="480" height="320" rx="12" fill="#E0F7FA"/>
  <polygon points="280,640 430,430 510,490 590,390 760,640" fill="#00838F"/>
  <circle cx="340" cy="420" r="44" fill="#FFF176"/>
  <!-- Layer 3: 화질 배지 -->
  <rect x="680" y="340" width="100" height="50" rx="10" fill="#006064"/>
  <text x="730" y="375" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">HD</text>
</svg>
