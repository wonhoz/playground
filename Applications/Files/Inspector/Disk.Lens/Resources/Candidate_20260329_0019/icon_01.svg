  <rect x="380" y="615" width="530" height="44" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="615" width="46" height="44" rx="6" fill="#B0BEC5"/>

  <text x="90" y="718" font-family="Arial, sans-serif" font-size="32" fill="#90A4AE"
