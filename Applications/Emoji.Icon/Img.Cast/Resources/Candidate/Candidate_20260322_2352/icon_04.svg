  <rect x="450" y="335" width="110" height="10" rx="3" fill="#D1D5DB" opacity="0.7" transform="rotate(8 520 340)"/>
  <!-- Layer 3: Arrow from hand to drop zone -->
  <line x1="540" y1="520" x2="540" y2="568" stroke="#3B82F6" stroke-width="10" stroke-linecap="round"/>
  <polygon points="516,568 540,598 564,568" fill="#3B82F6"/>
</svg>