<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
  <!-- Left: raw markdown # symbol (large, grey) -->
  <text x="280" y="490" font-family="Arial Black, sans-serif" font-weight="900" font-size="280" fill="#E1BEE7" text-anchor="middle">#</text>
  <!-- Arrow shaft + head (transformation) -->
  <rect x="398" y="358" width="140" height="52" rx="24" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  <path d="M 530,306 L 616,384 L 530,462 Z" fill="#7B1FA2" stroke="#4A148C" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right: rendered H1 in vivid badge style -->
  <rect x="638" y="282" width="258" height="140" rx="32" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <text x="767" y="385" font-family="Arial Black, sans-serif" font-weight="900" font-size="108" fill="#1A1A1A" text-anchor="middle">H1</text>
  <!-- VIEW badge -->
  <rect x="236" y="744" width="552" height="116" rx="36" fill="#6A1B9A" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">VIEW</text>
</svg>
