<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="zipperGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 지퍼 트랙 (세로) -->
  <rect x="240" y="80" width="32" height="352" rx="6" fill="#3a3a3a"/>
  <!-- 지퍼 이빨들 -->
  <rect x="222" y="100" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="270" y="100" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="222" y="122" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="270" y="122" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="222" y="144" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="270" y="144" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <!-- 슬라이더 (열린 위치 중간) -->
  <rect x="228" y="196" width="56" height="40" rx="8" fill="url(#zipperGold)" filter="url(#glow)"/>
  <circle cx="256" cy="216" r="8" fill="#78350f"/>
  <!-- 열린 부분 (눈 모양) -->
  <path d="M100,300 C100,240 170,190 256,190 C342,190 412,240 412,300 C412,360 342,410 256,410 C170,410 100,360 100,300Z" fill="#0c1a2e" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 눈동자 -->
  <circle cx="256" cy="300" r="60" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle cx="256" cy="300" r="32" fill="#0c4a6e"/>
  <circle cx="256" cy="300" r="16" fill="#38bdf8" opacity="0.9"/>
  <circle cx="266" cy="290" r="6" fill="white" opacity="0.4"/>
  <!-- 지퍼 이빨 (아래 - 열린 구간 아래) -->
  <rect x="222" y="400" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="270" y="400" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="222" y="352" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
  <rect x="270" y="352" width="20" height="12" rx="3" fill="url(#zipperGold)"/>
</svg>
