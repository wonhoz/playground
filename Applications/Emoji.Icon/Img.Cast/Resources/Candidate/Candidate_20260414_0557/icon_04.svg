<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="wand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- White card (body) -->
  <rect x="100" y="120" width="824" height="680" rx="32" fill="#FFFFFF" stroke="#4A3C65" stroke-width="16"/>

  <!-- Wizard wand (diagonal) -->
  <rect x="220" y="250" width="40" height="380" rx="16" fill="url(#wand)" stroke="#4A3C65" stroke-width="14" transform="rotate(-35, 370, 440)"/>
  <!-- Wand tip star -->
  <circle cx="290" cy="220" r="44" fill="url(#spark)" stroke="#4A3C65" stroke-width="12"/>
  <polygon points="290,178 301,208 335,208 309,227 319,261 290,242 261,261 271,227 245,208 279,208" fill="#FFFFFF" stroke="#4A3C65" stroke-width="6"/>

  <!-- Spark particles -->
  <circle cx="380" cy="180" r="16" fill="#FFD93D" stroke="#4A3C65" stroke-width="8"/>
  <circle cx="440" cy="150" r="22" fill="#FF6B35" stroke="#4A3C65" stroke-width="8"/>
  <circle cx="490" cy="200" r="12" fill="#FFD93D" stroke="#4A3C65" stroke-width="6"/>
  <circle cx="350" cy="140" r="10" fill="#9B59B6" stroke="#4A3C65" stroke-width="6"/>

  <!-- Transformation: PNG file on left -->
  <rect x="460" y="210" width="170" height="210" rx="18" fill="#F3E5F5" stroke="#4A3C65" stroke-width="12"/>
  <rect x="476" y="226" width="138" height="100" rx="10" fill="#E1BEE7" stroke="#4A3C65" stroke-width="8"/>
  <rect x="476" y="338" width="138" height="52" rx="16" fill="#9B59B6" stroke="#4A3C65" stroke-width="10"/>
  <text x="545" y="374" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">PNG</text>

  <!-- Arrow right -->
  <rect x="650" y="300" width="90" height="36" rx="14" fill="#9B59B6" stroke="#4A3C65" stroke-width="10"/>
  <polygon points="740,278 800,318 740,358" fill="#7B1FA2" stroke="#4A3C65" stroke-width="10" stroke-linejoin="round"/>

  <!-- ICO file on right (transformed) -->
  <rect x="810" y="210" width="160" height="210" rx="18" fill="#F3E5F5" stroke="#4A3C65" stroke-width="12"/>
  <rect x="826" y="226" width="128" height="100" rx="10" fill="#E1BEE7" stroke="#4A3C65" stroke-width="8"/>
  <!-- ICO multi-size dots -->
  <rect x="840" y="240" width="28" height="28" rx="6" fill="#9B59B6" stroke="#4A3C65" stroke-width="5"/>
  <rect x="876" y="236" width="36" height="36" rx="6" fill="#7B1FA2" stroke="#4A3C65" stroke-width="5"/>
  <rect x="920" y="232" width="24" height="24" rx="4" fill="#9B59B6" stroke="#4A3C65" stroke-width="4"/>
  <rect x="840" y="278" width="54" height="42" rx="6" fill="#7B1FA2" stroke="#4A3C65" stroke-width="5"/>
  <rect x="902" y="270" width="48" height="48" rx="6" fill="#9B59B6" stroke="#4A3C65" stroke-width="5"/>
  <rect x="826" y="338" width="128" height="52" rx="16" fill="#7B1FA2" stroke="#4A3C65" stroke-width="10"/>
  <text x="890" y="374" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">ICO</text>

  <!-- CAST badge center -->
  <rect x="262" y="500" width="500" height="140" rx="36" fill="#9B59B6" stroke="#4A3C65" stroke-width="16"/>
  <text x="512" y="596" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">CAST</text>

  <!-- Title -->
  <rect x="212" y="820" width="600" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="884" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
</svg>
