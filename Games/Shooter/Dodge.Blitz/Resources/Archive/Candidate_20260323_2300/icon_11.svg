<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg11" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
    <linearGradient id="triangle11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="glow11">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip11">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg11)"/>
  <g clip-path="url(#clip11)">
    <!-- Layer 2: 경고 삼각형 메인 -->
    <g filter="url(#glow11)">
      <polygon points="512,160 820,700 204,700" fill="url(#triangle11)"/>
    </g>
    <!-- 삼각형 테두리 -->
    <polygon points="512,160 820,700 204,700" fill="none" stroke="#FFFFFF" stroke-width="14"/>
    <!-- 삼각형 광택 -->
    <polygon points="512,190 790,670 234,670" fill="#FFFFFF" opacity="0.08"/>

    <!-- Layer 3: 느낌표 -->
    <!-- ! 몸통 -->
    <rect x="486" y="280" width="52" height="260" rx="26" fill="#B45309"/>
    <!-- ! 점 -->
    <circle cx="512" cy="612" r="32" fill="#B45309"/>

    <!-- 총알들 — 삼각형 주변 위협 -->
    <ellipse cx="160" cy="480" rx="12" ry="22" fill="#FFFFFF" transform="rotate(60 160 480)"/>
    <ellipse cx="200" cy="380" rx="12" ry="22" fill="#FFFFFF" transform="rotate(50 200 380)"/>
    <ellipse cx="280" cy="300" rx="12" ry="22" fill="#FFFFFF" transform="rotate(40 280 300)"/>
    <ellipse cx="864" cy="480" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-60 864 480)"/>
    <ellipse cx="824" cy="380" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-50 824 380)"/>
    <ellipse cx="744" cy="300" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-40 744 300)"/>
    <ellipse cx="512" cy="100" rx="12" ry="22" fill="#FFFFFF"/>
    <ellipse cx="420" cy="120" rx="12" ry="22" fill="#FFFFFF"/>
    <ellipse cx="604" cy="120" rx="12" ry="22" fill="#FFFFFF"/>

    <!-- 하단 텍스트 -->
    <text x="512" y="820" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" text-anchor="middle" fill="#FDE68A" letter-spacing="4">DANGER!</text>
  </g>
</svg>
