<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="seg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7971E"/>
      <stop offset="100%" stop-color="#FFD200"/>
    </linearGradient>
    <linearGradient id="seg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ED213A"/>
      <stop offset="100%" stop-color="#93291E"/>
    </linearGradient>
    <linearGradient id="seg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#834D9B"/>
      <stop offset="100%" stop-color="#D04ED6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Donut segments -->
  <!-- 35% segment -->
  <path d="M256,256 L256,96 A160,160 0 0,1 416,256 Z" fill="url(#seg1)" opacity="0.95" filter="url(#glow)"/>
  <!-- 25% segment -->
  <path d="M256,256 L416,256 A160,160 0 0,1 256,416 Z" fill="url(#seg2)" opacity="0.95" filter="url(#glow)"/>
  <!-- 20% segment -->
  <path d="M256,256 L256,416 A160,160 0 0,1 96,256 Z" fill="url(#seg3)" opacity="0.95" filter="url(#glow)"/>
  <!-- 20% segment -->
  <path d="M256,256 L96,256 A160,160 0 0,1 256,96 Z" fill="url(#seg4)" opacity="0.95" filter="url(#glow)"/>
  <!-- Inner hole -->
  <circle cx="256" cy="256" r="95" fill="url(#bg)"/>
  <!-- Center disk icon -->
  <ellipse cx="256" cy="256" rx="45" ry="35" fill="none" stroke="#00C9FF" stroke-width="4" opacity="0.8"/>
  <line x1="226" y1="262" x2="286" y2="262" stroke="#00C9FF" stroke-width="3" opacity="0.6"/>
  <circle cx="270" cy="251" r="5" fill="#92FE9D" opacity="0.9"/>
  <!-- Labels -->
  <text x="256" y="470" text-anchor="middle" fill="#AECFDE" font-family="Arial" font-size="22" font-weight="bold" letter-spacing="2">DISK.LENS</text>
</svg>
