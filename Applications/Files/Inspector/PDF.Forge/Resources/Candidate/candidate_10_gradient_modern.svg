<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <linearGradient id="docWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0FF"/>
    </linearGradient>
    <linearGradient id="pdfStrip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF416C"/>
      <stop offset="100%" stop-color="#FF4B2B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document with drop shadow -->
  <rect x="158" y="108" width="210" height="275" rx="16" fill="#000000" opacity="0.25"/>
  <rect x="150" y="100" width="210" height="275" rx="16" fill="url(#docWhite)"/>
  <!-- Corner fold -->
  <polygon points="300,100 360,100 360,160 300,100" fill="#E8E8FF"/>
  <polygon points="300,100 360,160 300,160" fill="#D8D8EE"/>
  <!-- PDF color stripe at top -->
  <rect x="150" y="100" width="210" height="56" rx="16" fill="url(#pdfStrip)"/>
  <rect x="150" y="130" width="210" height="26" fill="url(#pdfStrip)"/>
  <!-- PDF text in stripe -->
  <text x="225" y="137" font-family="sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="900">PDF</text>
  <!-- Document content lines -->
  <rect x="170" y="175" width="150" height="8" rx="4" fill="#AAAACC"/>
  <rect x="170" y="192" width="130" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="206" width="140" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="220" width="110" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="244" width="140" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="258" width="120" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="272" width="130" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="296" width="100" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="310" width="140" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="324" width="120" height="6" rx="3" fill="#CCCCEE"/>
  <rect x="170" y="348" width="130" height="6" rx="3" fill="#CCCCEE"/>
  <!-- Floating action badge -->
  <circle cx="360" cy="390" r="52" fill="url(#pdfStrip)"/>
  <text x="360" y="380" font-family="sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">FORGE</text>
  <text x="360" y="400" font-family="sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle">&#9874;</text>
</svg>
