<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Search bar large -->
  <rect x="56" y="72" width="400" height="60" rx="30" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="96" cy="102" r="15" fill="none" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="107" y1="113" x2="118" y2="124" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  <text x="130" y="109" font-family="sans-serif" font-size="17" fill="#94a3b8">Search icons, emoji, symbols...</text>
  <!-- Icon grid cards -->
  <!-- Row 1 -->
  <rect x="56" y="160" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="72" y="218" font-size="52">⭐</text>
  <rect x="160" y="160" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="176" y="218" font-size="52">🎨</text>
  <!-- Featured / selected -->
  <rect x="264" y="148" width="112" height="112" rx="20" fill="white" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="320" cy="172" r="8" fill="#8b5cf6"/>
  <text x="280" y="238" font-size="64">🔍</text>
  <rect x="392" y="160" width="64" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="218" font-size="44">🚀</text>
  <!-- Row 2 -->
  <rect x="56" y="264" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="72" y="322" font-size="52">🌐</text>
  <rect x="160" y="264" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="176" y="322" font-size="52">💡</text>
  <rect x="264" y="264" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="280" y="322" font-size="52">🎯</text>
  <rect x="368" y="264" width="88" height="88" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="384" y="322" font-size="52">🦋</text>
  <!-- Detail tooltip for selected icon -->
  <rect x="264" y="276" width="190" height="68" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="290,276 306,258 322,276" fill="white" stroke="#8b5cf6" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="292,276 305,260 320,276" fill="white"/>
  <text x="278" y="300" font-family="sans-serif" font-size="14" fill="#7c3aed" font-weight="bold">🔍 magnifier</text>
  <text x="278" y="318" font-family="sans-serif" font-size="12" fill="#94a3b8">U+1F50D  •  Search</text>
  <text x="278" y="336" font-family="sans-serif" font-size="11" fill="#cbd5e1">Copy  •  PNG  •  SVG</text>
  <!-- Status bar -->
  <rect x="56" y="432" width="400" height="44" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="80" cy="454" r="6" fill="#8b5cf6"/>
  <text x="96" y="459" font-family="sans-serif" font-size="13" fill="#7c3aed">8,214 icons</text>
  <text x="204" y="459" font-family="sans-serif" font-size="13" fill="#cbd5e1">|</text>
  <text x="218" y="459" font-family="sans-serif" font-size="13" fill="#94a3b8">Filter: All</text>
  <text x="324" y="459" font-family="sans-serif" font-size="13" fill="#cbd5e1">|</text>
  <text x="338" y="459" font-family="sans-serif" font-size="13" fill="#94a3b8">Sort: Popular</text>
</svg>
