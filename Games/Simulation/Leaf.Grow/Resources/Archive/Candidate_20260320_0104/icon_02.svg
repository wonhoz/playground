<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 나뭇잎 + 햇살: 잎 + 태양 빛 -->
  <!-- sun rays -->
  <g stroke="#66BB6A" stroke-width="10" stroke-linecap="round" opacity="0.7">
    <line x1="512" y1="180" x2="512" y2="260"/>
    <line x1="660" y1="220" x2="618" y2="286"/>
    <line x1="740" y1="350" x2="672" y2="374"/>
    <line x1="364" y1="220" x2="406" y2="286"/>
    <line x1="284" y1="350" x2="352" y2="374"/>
  </g>
  <!-- sun core -->
  <circle cx="512" cy="330" r="70" fill="#66BB6A" opacity="0.9"/>
  <!-- leaf blade -->
  <path d="M512 460 Q640 400 660 560 Q580 620 512 580 Q444 620 364 560 Q384 400 512 460Z" fill="#2E7D32"/>
  <!-- leaf midrib -->
  <line x1="512" y1="460" x2="512" y2="590" stroke="#66BB6A" stroke-width="8" stroke-linecap="round"/>
  <!-- leaf veins -->
  <line x1="512" y1="500" x2="570" y2="530" stroke="#66BB6A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="530" x2="560" y2="560" stroke="#66BB6A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="500" x2="454" y2="530" stroke="#66BB6A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="530" x2="464" y2="560" stroke="#66BB6A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- stem -->
  <line x1="512" y1="580" x2="512" y2="680" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
</svg>
