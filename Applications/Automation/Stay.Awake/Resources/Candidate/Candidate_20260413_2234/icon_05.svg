<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#3A86FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="148" cy="175" r="8" fill="#FFD93D" opacity="0.85"/>
  <circle cx="276" cy="118" r="6" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="852" cy="158" r="7" fill="#FFD93D" opacity="0.85"/>
  <circle cx="918" cy="258" r="5" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="184" cy="362" r="5" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="774" cy="108" r="6" fill="#FFFFFF" opacity="0.60"/>
  <!-- White card -->
  <rect x="110" y="140" width="804" height="560" rx="48" fill="#FFFFFF" stroke="#0D1B7A" stroke-width="16"/>
  <!-- Owl body -->
  <ellipse cx="512" cy="452" rx="198" ry="208" fill="#7B1FA2" stroke="#4A148C" stroke-width="16"/>
  <!-- Left wing -->
  <path d="M 316,386 Q 238,428 266,534 Q 292,588 366,566" fill="#9C27B0" stroke="#4A148C" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right wing -->
  <path d="M 708,386 Q 786,428 758,534 Q 732,588 658,566" fill="#9C27B0" stroke="#4A148C" stroke-width="14" stroke-linejoin="round"/>
  <!-- Ear tufts -->
  <path d="M 444,264 L 422,192 L 482,234 Z" fill="#7B1FA2" stroke="#4A148C" stroke-width="14" stroke-linejoin="round"/>
  <path d="M 580,264 L 602,192 L 542,234 Z" fill="#7B1FA2" stroke="#4A148C" stroke-width="14" stroke-linejoin="round"/>
  <!-- Owl face disc (light feathers) -->
  <ellipse cx="512" cy="382" rx="164" ry="148" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="12"/>
  <!-- Left eye -->
  <circle cx="448" cy="362" r="62" fill="#FFFFFF" stroke="#4A148C" stroke-width="14"/>
  <circle cx="448" cy="362" r="42" fill="#FFD93D" stroke="#4A148C" stroke-width="10"/>
  <circle cx="448" cy="362" r="24" fill="#1A1A1A"/>
  <circle cx="461" cy="349" r="10" fill="#FFFFFF" opacity="0.92"/>
  <!-- Right eye -->
  <circle cx="576" cy="362" r="62" fill="#FFFFFF" stroke="#4A148C" stroke-width="14"/>
  <circle cx="576" cy="362" r="42" fill="#FFD93D" stroke="#4A148C" stroke-width="10"/>
  <circle cx="576" cy="362" r="24" fill="#1A1A1A"/>
  <circle cx="589" cy="349" r="10" fill="#FFFFFF" opacity="0.92"/>
  <!-- Beak -->
  <path d="M 494,406 L 512,442 L 530,406 Z" fill="#FF9800" stroke="#E65100" stroke-width="12" stroke-linejoin="round"/>
  <!-- Feet/talons -->
  <path d="M 444,638 L 422,678 M 444,638 L 464,678 M 444,638 L 444,678" stroke="#FF9800" stroke-width="16" stroke-linecap="round"/>
  <path d="M 580,638 L 558,678 M 580,638 L 600,678 M 580,638 L 580,678" stroke="#FF9800" stroke-width="16" stroke-linecap="round"/>
  <!-- AWAKE badge -->
  <rect x="194" y="766" width="636" height="118" rx="36" fill="#7B1FA2" stroke="#4A148C" stroke-width="14"/>
  <text x="512" y="852" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">AWAKE</text>
</svg>
