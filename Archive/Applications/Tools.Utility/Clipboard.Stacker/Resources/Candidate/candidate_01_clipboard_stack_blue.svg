<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of papers -->
  <rect x="148" y="200" width="220" height="260" rx="12" fill="url(#paper)" opacity="0.4"/>
  <rect x="138" y="185" width="220" height="260" rx="12" fill="url(#paper)" opacity="0.6"/>
  <rect x="128" y="170" width="220" height="260" rx="12" fill="url(#paper)" opacity="0.85"/>
  <!-- Clipboard top bar -->
  <rect x="128" y="140" width="220" height="50" rx="10" fill="#5C6BC0"/>
  <rect x="216" y="120" width="80" height="40" rx="8" fill="#7986CB"/>
  <rect x="228" y="130" width="56" height="20" rx="4" fill="#3949AB"/>
  <!-- Text lines -->
  <rect x="150" y="240" width="140" height="12" rx="4" fill="#5C6BC0" opacity="0.8"/>
  <rect x="150" y="264" width="120" height="12" rx="4" fill="#5C6BC0" opacity="0.6"/>
  <rect x="150" y="288" width="100" height="12" rx="4" fill="#5C6BC0" opacity="0.4"/>
  <!-- Copy icon -->
  <rect x="300" y="320" width="70" height="80" rx="8" fill="#3F51B5" stroke="#7986CB" stroke-width="3"/>
  <rect x="316" y="305" width="70" height="80" rx="8" fill="#5C6BC0" stroke="#9FA8DA" stroke-width="2"/>
</svg>
