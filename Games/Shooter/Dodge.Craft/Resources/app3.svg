<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="craft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#A0A0C0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel grid background hint -->
  <rect x="40" y="40" width="16" height="16" fill="#22FF88" opacity="0.15"/>
  <rect x="72" y="40" width="16" height="16" fill="#22FF88" opacity="0.1"/>
  <rect x="56" y="72" width="16" height="16" fill="#22FF88" opacity="0.12"/>
  <!-- Craft (pixel art style) -->
  <!-- Body -->
  <rect x="208" y="180" width="96" height="140" fill="url(#craft)"/>
  <!-- Nose -->
  <rect x="224" y="148" width="64" height="32" fill="#D0D0E8"/>
  <rect x="240" y="116" width="32" height="32" fill="#C0C0D8"/>
  <rect x="248" y="100" width="16" height="16" fill="#B0B0CC"/>
  <!-- Wings -->
  <rect x="128" y="240" width="80" height="32" fill="#8888AA"/>
  <rect x="304" y="240" width="80" height="32" fill="#8888AA"/>
  <rect x="112" y="256" width="16" height="16" fill="#6666AA"/>
  <rect x="384" y="256" width="16" height="16" fill="#6666AA"/>
  <!-- Engine -->
  <rect x="224" y="320" width="24" height="32" fill="#555577"/>
  <rect x="264" y="320" width="24" height="32" fill="#555577"/>
  <!-- Flames pixel -->
  <rect x="224" y="352" width="24" height="16" fill="#FF8800"/>
  <rect x="264" y="352" width="24" height="16" fill="#FF8800"/>
  <rect x="228" y="368" width="16" height="16" fill="#FFDD00"/>
  <rect x="268" y="368" width="16" height="16" fill="#FFDD00"/>
  <!-- Cockpit -->
  <rect x="240" y="196" width="32" height="32" fill="#66AAFF" opacity="0.9"/>
  <!-- Pixel obstacles -->
  <rect x="80" y="150" width="48" height="48" fill="#FF4466"/>
  <rect x="88" y="158" width="32" height="32" fill="#FF6688"/>
  <rect x="384" y="180" width="48" height="48" fill="#FF6600"/>
  <rect x="392" y="188" width="32" height="32" fill="#FF8822"/>
  <rect x="160" y="100" width="32" height="32" fill="#FF2244"/>
  <!-- Score pixels -->
  <rect x="60" y="430" width="8" height="8" fill="#22FF88" opacity="0.8"/>
  <rect x="76" y="430" width="8" height="8" fill="#22FF88" opacity="0.8"/>
  <rect x="92" y="430" width="8" height="8" fill="#22FF88" opacity="0.6"/>
  <rect x="108" y="430" width="8" height="8" fill="#22FF88" opacity="0.4"/>
  <text x="256" y="455" font-family="'Courier New'" font-size="24" font-weight="bold" fill="#22FF88" text-anchor="middle">DODGE·CRAFT</text>
</svg>
