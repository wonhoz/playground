<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <clipPath id="pc">
      <rect x="234" y="224" width="556" height="414" rx="10"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 (보라-라벤더 그라데이션) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>

  <!-- Layer 2: 사진 프레임 (흰색 라운드 박스) -->
  <rect x="214" y="204" width="596" height="454" rx="20" fill="white"/>
  <!-- 사진 내부 - 하늘 -->
  <rect x="234" y="224" width="556" height="414" fill="#64B5F6" clip-path="url(#pc)"/>
  <!-- 사진 내부 - 땅 -->
  <rect x="234" y="464" width="556" height="174" fill="#81C784" clip-path="url(#pc)"/>
  <!-- 언덕 -->
  <ellipse cx="378" cy="464" rx="188" ry="94" fill="#4CAF50" clip-path="url(#pc)"/>
  <ellipse cx="668" cy="478" rx="208" ry="104" fill="#388E3C" clip-path="url(#pc)"/>
  <!-- 태양 -->
  <circle cx="728" cy="280" r="64" fill="#FFD54F" clip-path="url(#pc)"/>
  <circle cx="728" cy="280" r="86" fill="#FFE082" fill-opacity="0.4" clip-path="url(#pc)"/>

  <!-- Layer 3: 포맷 배지들 -->
  <rect x="124" y="706" width="240" height="92" rx="14" fill="#FF7043"/>
  <text x="244" y="778" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">SVG</text>

  <rect x="392" y="706" width="240" height="92" rx="14" fill="#43A047"/>
  <text x="512" y="778" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">PNG</text>

  <rect x="660" y="706" width="240" height="92" rx="14" fill="#1E88E5"/>
  <text x="780" y="778" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">ICO</text>
</svg>
