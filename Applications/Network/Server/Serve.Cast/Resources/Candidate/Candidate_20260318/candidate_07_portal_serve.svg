<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 포털 링들 -->
  <ellipse cx="256" cy="256" rx="170" ry="100" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.35"/>
  <ellipse cx="256" cy="256" rx="110" ry="62" fill="none" stroke="#60A5FA" stroke-width="3" opacity="0.55" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="80" ry="45" fill="none" stroke="#3B82F6" stroke-width="3.5" opacity="0.7" filter="url(#glow)"/>
  <!-- 포털 코어 -->
  <ellipse cx="256" cy="256" rx="50" ry="28" fill="url(#portal)"/>
  <ellipse cx="256" cy="256" rx="50" ry="28" fill="none" stroke="#60A5FA" stroke-width="2" filter="url(#glow)"/>
  <!-- 서버 아이콘 (포털 안) -->
  <rect x="234" y="243" width="44" height="26" rx="4" fill="#3B82F6" opacity="0.4" filter="url(#glow)"/>
  <rect x="238" y="247" width="36" height="6" rx="3" fill="#60A5FA" opacity="0.7"/>
  <rect x="238" y="257" width="36" height="6" rx="3" fill="#3B82F6" opacity="0.6"/>
  <!-- 진입 화살표 -->
  <path d="M 90 256 L 146 256 M 138 248 L 146 256 L 138 264" stroke="#3B82F6" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- 출력 빔들 -->
  <line x1="366" y1="256" x2="420" y2="220" stroke="#3B82F6" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="366" y1="256" x2="432" y2="256" stroke="#60A5FA" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="366" y1="256" x2="420" y2="292" stroke="#3B82F6" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <!-- 클라이언트 -->
  <circle cx="420" cy="220" r="8" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="432" cy="256" r="8" fill="#60A5FA" opacity="0.7" filter="url(#glow)"/>
  <circle cx="420" cy="292" r="8" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
</svg>