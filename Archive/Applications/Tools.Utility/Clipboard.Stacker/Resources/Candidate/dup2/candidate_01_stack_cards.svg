<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#2a2a44"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a5c"/>
      <stop offset="100%" stop-color="#2a2a44"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6c"/>
      <stop offset="100%" stop-color="#3a3a5c"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a5a8c"/>
      <stop offset="100%" stop-color="#4a4a6c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stack of clipboard cards -->
  <!-- Bottom card -->
  <rect x="120" y="200" width="280" height="220" rx="12" fill="url(#card1)" stroke="#555577" stroke-width="2"/>
  <!-- Middle card -->
  <rect x="108" y="185" width="280" height="220" rx="12" fill="url(#card2)" stroke="#6666aa" stroke-width="2"/>
  <!-- Top card -->
  <rect x="96" y="170" width="280" height="220" rx="12" fill="url(#card3)" stroke="#8888cc" stroke-width="2"/>
  <!-- Clipboard clip on top -->
  <rect x="196" y="155" width="100" height="28" rx="8" fill="#aaaadd"/>
  <rect x="216" y="148" width="60" height="22" rx="6" fill="#8888bb"/>
  <!-- Content lines on top card -->
  <rect x="116" y="215" width="200" height="10" rx="4" fill="#9999cc" opacity="0.7"/>
  <rect x="116" y="235" width="160" height="10" rx="4" fill="#8888bb" opacity="0.6"/>
  <rect x="116" y="255" width="220" height="10" rx="4" fill="#9999cc" opacity="0.7"/>
  <rect x="116" y="275" width="140" height="10" rx="4" fill="#7777aa" opacity="0.5"/>
  <rect x="116" y="295" width="180" height="10" rx="4" fill="#8888bb" opacity="0.6"/>
  <!-- Stack indicator -->
  <text x="350" y="420" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#aaaaee">x5</text>
  <circle cx="350" cy="400" r="22" fill="#3a3a7c" stroke="#8888cc" stroke-width="2"/>
  <text x="350" y="407" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#ccccff">5</text>
  <!-- Copy icon bottom right -->
  <rect x="320" y="300" width="50" height="60" rx="6" fill="#4a4a8c" stroke="#8888cc" stroke-width="2"/>
  <rect x="330" y="290" width="50" height="60" rx="6" fill="#5a5aac" stroke="#aaaaee" stroke-width="2"/>
  <rect x="336" y="303" width="30" height="6" rx="2" fill="#aaaaee" opacity="0.7"/>
  <rect x="336" y="316" width="24" height="6" rx="2" fill="#9999cc" opacity="0.6"/>
  <rect x="336" y="329" width="28" height="6" rx="2" fill="#aaaaee" opacity="0.7"/>
</svg>