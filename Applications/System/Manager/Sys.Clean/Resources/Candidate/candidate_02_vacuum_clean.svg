<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b0030"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <radialGradient id="suction" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#9c27b0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vacuum body -->
  <ellipse cx="320" cy="300" rx="120" ry="80" fill="url(#body)" filter="url(#glow)"/>
  <!-- Vacuum hose -->
  <path d="M200 300 Q150 280 130 260 Q110 240 100 260" stroke="#ba68c8" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Vacuum head/nozzle -->
  <rect x="65" y="255" width="50" height="35" rx="8" fill="#e040fb" filter="url(#glow)"/>
  <!-- Suction effect -->
  <ellipse cx="80" cy="272" rx="50" ry="50" fill="url(#suction)" opacity="0.6"/>
  <!-- Suction spiral -->
  <path d="M80 272 Q100 252 120 272 Q140 292 120 312 Q100 332 80 312 Q60 292 80 272" stroke="#e040fb" stroke-width="3" fill="none" opacity="0.7" stroke-dasharray="10,5"/>
  <!-- Dust being sucked in -->
  <circle cx="55" cy="265" r="6" fill="#fff9c4" opacity="0.8"/>
  <circle cx="40" cy="280" r="4" fill="#f0f4c3" opacity="0.7"/>
  <circle cx="45" cy="255" r="5" fill="#e8f5e9" opacity="0.6"/>
  <circle cx="35" cy="268" r="3" fill="#fff9c4" opacity="0.5"/>
  <!-- Power indicator -->
  <circle cx="360" cy="270" r="18" fill="#e040fb" filter="url(#glow)"/>
  <path d="M352 270 L368 270 M360 262 L360 278" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Status dots -->
  <circle cx="290" cy="310" r="8" fill="#00e5ff" opacity="0.9"/>
  <circle cx="320" cy="318" r="8" fill="#00e5ff" opacity="0.7"/>
  <circle cx="350" cy="310" r="8" fill="#00bcd4" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="255" cy="365" r="22" fill="#6a1b9a"/>
  <circle cx="255" cy="365" r="12" fill="#ab47bc"/>
  <circle cx="385" cy="365" r="22" fill="#6a1b9a"/>
  <circle cx="385" cy="365" r="12" fill="#ab47bc"/>
</svg>