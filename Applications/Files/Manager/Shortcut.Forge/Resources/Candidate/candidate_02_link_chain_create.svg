<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003333"/>
      <stop offset="100%" stop-color="#004d40"/>
    </linearGradient>
    <linearGradient id="chain1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80cbc4"/>
      <stop offset="100%" stop-color="#00796b"/>
    </linearGradient>
    <linearGradient id="chain2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b2dfdb"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- link 1 -->
  <path d="M130 200 Q130 150 180 150 L230 150 Q280 150 280 200 Q280 250 230 250 L180 250 Q130 250 130 200 Z" fill="none" stroke="url(#chain1)" stroke-width="35"/>
  <!-- link 2 (interlocked) -->
  <path d="M232 200 Q232 150 282 150 L332 150 Q382 150 382 200 Q382 250 332 250 L282 250 Q232 250 232 200 Z" fill="none" stroke="url(#chain2)" stroke-width="35"/>
  <!-- link 3 smaller -->
  <path d="M170 290 Q170 258 200 258 L218 258 Q246 258 246 290 Q246 322 218 322 L200 322 Q170 322 170 290 Z" fill="none" stroke="#4db6ac" stroke-width="25"/>
  <!-- link 4 smaller interlocked -->
  <path d="M220 290 Q220 258 250 258 L268 258 Q296 258 296 290 Q296 322 268 322 L250 322 Q220 322 220 290 Z" fill="none" stroke="#80cbc4" stroke-width="25"/>
  <!-- plus / create icon -->
  <circle cx="380" cy="330" r="50" fill="#00897b"/>
  <rect x="368" y="305" width="24" height="50" rx="6" fill="white"/>
  <rect x="355" y="318" width="50" height="24" rx="6" fill="white"/>
  <!-- shine -->
  <circle cx="380" cy="330" r="50" fill="url(#glow)" opacity="0.15"/>
</svg>
