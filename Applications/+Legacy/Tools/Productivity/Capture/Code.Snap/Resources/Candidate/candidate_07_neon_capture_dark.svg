  <path d="M392 332 L392 364 L360 364" stroke="#00FFFF" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Code content area -->
  <rect x="120" y="148" width="272" height="216" rx="0" fill="#00FFFF" opacity="0.03"/>
  <!-- Syntax highlight lines -->
  <rect x="136" y="174" width="90" height="10" rx="3" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
  <rect x="148" y="194" width="70" height="10" rx="3" fill="#00FF88" opacity="0.7"/>
  <rect x="148" y="214" width="80" height="10" rx="3" fill="#00FFFF" opacity="0.7"/>
  <rect x="136" y="234" width="110" height="10" rx="3" fill="#FF00FF" opacity="0.65"/>
  <rect x="148" y="254" width="60" height="10" rx="3" fill="#FFFF00" opacity="0.7"/>
  <rect x="148" y="274" width="85" height="10" rx="3" fill="#00FF88" opacity="0.65"/>
  <rect x="136" y="294" width="100" height="10" rx="3" fill="#00FFFF" opacity="0.6"/>
  <rect x="136" y="314" width="70" height="10" rx="3" fill="#FF00FF" opacity="0.55"/>
  <!-- Shutter flash -->
  <path d="M320 200 L302 240 L316 240 L296 288 L352 228 L336 228 Z" fill="#FFFF00" opacity="0.8" filter="url(#glow)"/>
