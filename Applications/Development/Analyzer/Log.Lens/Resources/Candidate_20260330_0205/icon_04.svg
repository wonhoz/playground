<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <linearGradient id="scope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 하늘색 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg4)"/>

  <!-- Layer 2: 현미경 -->
  <!-- 렌즈 튜브 -->
  <rect x="440" y="160" width="100" height="360" rx="20" fill="url(#scope)"/>
  <!-- 조절 다이얼 -->
  <rect x="390" y="260" width="200" height="60" rx="16" fill="#455A64"/>
  <rect x="390" y="340" width="200" height="44" rx="12" fill="#37474F"/>
  <!-- 아이피스 -->
  <ellipse cx="490" cy="180" rx="80" ry="30" fill="#37474F"/>
  <!-- 스테이지 -->
  <rect x="300" y="520" width="380" height="40" rx="10" fill="#455A64"/>
  <!-- 스테이지 클립 -->
  <rect x="350" y="490" width="50" height="70" rx="8" fill="#546E7A"/>
  <rect x="580" y="490" width="50" height="70" rx="8" fill="#546E7A"/>
  <!-- 받침대 -->
  <rect x="360" y="558" width="260" height="30" rx="8" fill="#37474F"/>
  <rect x="400" y="588" width="180" height="200" rx="12" fill="url(#scope)"/>
  <ellipse cx="490" cy="788" rx="160" ry="40" fill="#37474F"/>

  <!-- 현미경 접안렌즈 아래 — 로그 표본 (슬라이드) -->
  <rect x="340" y="504" width="300" height="46" rx="8" fill="white" opacity="0.9"/>
  <text x="352" y="527" font-family="'Courier New',monospace" font-size="26" fill="#B71C1C" dominant-baseline="middle">[ERR] timeout 42ms</text>

  <!-- Layer 3: 렌즈 뷰 (위) — 확대된 로그 -->
  <circle cx="720" cy="280" r="190" fill="white" opacity="0.92"/>
  <text x="620" y="220" font-family="'Courier New',monospace" font-size="38" fill="#D32F2F">[ERROR]</text>
  <text x="620" y="270" font-family="'Courier New',monospace" font-size="32" fill="#1A1A1A">NullRef at</text>
  <text x="620" y="316" font-family="'Courier New',monospace" font-size="32" fill="#1A1A1A">  line: 42</text>
  <circle cx="720" cy="280" r="190" fill="none" stroke="#0097A7" stroke-width="16"/>
</svg>
