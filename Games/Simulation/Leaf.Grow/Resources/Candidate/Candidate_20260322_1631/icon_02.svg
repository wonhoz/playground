<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02lg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#080E08"/>
      <stop offset="100%" stop-color="#0C1A0C"/>
    </linearGradient>
    <clipPath id="frame02lg">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02lg)"/>
  <g clip-path="url(#frame02lg)">

    <!-- Title -->
    <text x="512" y="90" font-family="'Segoe UI',Arial" font-size="32" font-weight="900" fill="#3AC95A" text-anchor="middle" opacity="0.85" letter-spacing="2">L - S Y S T E M  성장</text>

    <!-- 4 growth stages, each in its own cell -->
    <!-- Stage cards background -->
    <rect x="80" y="130" width="200" height="720" rx="16" fill="#0A140A" stroke="#1A3A1A" stroke-width="1"/>
    <rect x="295" y="130" width="200" height="720" rx="16" fill="#0C1A0C" stroke="#1A3A1A" stroke-width="1"/>
    <rect x="510" y="130" width="200" height="720" rx="16" fill="#0E200E" stroke="#204420" stroke-width="1"/>
    <rect x="725" y="130" width="220" height="720" rx="16" fill="#112614" stroke="#2A5A20" stroke-width="1"/>

    <!-- ===== STAGE 1: Iteration 1 (seedling) ===== -->
    <!-- Just a trunk with 2 tiny branches -->
    <!-- Trunk: (180, 830) → (180, 640) -->
    <line x1="180" y1="830" x2="180" y2="640" stroke="#7A4010" stroke-width="7" stroke-linecap="round"/>
    <!-- L branch: (180,640) → (154,580) -->
    <line x1="180" y1="640" x2="154" y2="580" stroke="#8B5020" stroke-width="4" stroke-linecap="round"/>
    <!-- R branch: (180,640) → (206,580) -->
    <line x1="180" y1="640" x2="206" y2="580" stroke="#8B5020" stroke-width="4" stroke-linecap="round"/>
    <!-- Leaf blobs -->
    <ellipse cx="148" cy="572" rx="20" ry="14" fill="#3AC95A" opacity="0.8"/>
    <ellipse cx="212" cy="572" rx="20" ry="14" fill="#3AC95A" opacity="0.8"/>
    <!-- Stage label -->
    <rect x="130" y="840" width="100" height="30" rx="8" fill="#1A3A1A"/>
    <text x="180" y="860" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#88CC88" text-anchor="middle">반복 1</text>

    <!-- ===== STAGE 2: Iteration 2 ===== -->
    <!-- Trunk: (395, 830) → (395, 665) -->
    <line x1="395" y1="830" x2="395" y2="665" stroke="#7A4010" stroke-width="6" stroke-linecap="round"/>
    <!-- L: (395,665) → (366,596) -->
    <line x1="395" y1="665" x2="366" y2="596" stroke="#8B5020" stroke-width="3.5" stroke-linecap="round"/>
    <!-- R: (395,665) → (424,596) -->
    <line x1="395" y1="665" x2="424" y2="596" stroke="#8B5020" stroke-width="3.5" stroke-linecap="round"/>
    <!-- LL: (366,596) → (342,544) -->
    <line x1="366" y1="596" x2="342" y2="544" stroke="#9A6030" stroke-width="2" stroke-linecap="round"/>
    <!-- LR: (366,596) → (368,540) -->
    <line x1="366" y1="596" x2="368" y2="540" stroke="#9A6030" stroke-width="2" stroke-linecap="round"/>
    <!-- RL: (424,596) → (422,540) -->
    <line x1="424" y1="596" x2="422" y2="540" stroke="#9A6030" stroke-width="2" stroke-linecap="round"/>
    <!-- RR: (424,596) → (448,544) -->
    <line x1="424" y1="596" x2="448" y2="544" stroke="#9A6030" stroke-width="2" stroke-linecap="round"/>
    <!-- Leaves -->
    <ellipse cx="338" cy="537" rx="16" ry="11" fill="#3AC95A" opacity="0.8"/>
    <ellipse cx="364" cy="532" rx="16" ry="11" fill="#50DD70" opacity="0.75"/>
    <ellipse cx="420" cy="532" rx="16" ry="11" fill="#3AC95A" opacity="0.8"/>
    <ellipse cx="450" cy="536" rx="16" ry="11" fill="#50DD70" opacity="0.75"/>
    <!-- Flowers -->
    <circle cx="362" cy="528" r="5" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="422" cy="528" r="5" fill="#FFA0D0" opacity="0.9"/>
    <!-- Stage label -->
    <rect x="345" y="840" width="100" height="30" rx="8" fill="#1A3A1A"/>
    <text x="395" y="860" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#88CC88" text-anchor="middle">반복 2</text>

    <!-- ===== STAGE 3: Iteration 3 ===== -->
    <!-- Trunk: (610, 830) → (610, 680) -->
    <line x1="610" y1="830" x2="610" y2="680" stroke="#7A4010" stroke-width="6" stroke-linecap="round"/>
    <!-- L: 680 → (582,614) -->
    <line x1="610" y1="680" x2="582" y2="614" stroke="#8B5020" stroke-width="3.5" stroke-linecap="round"/>
    <!-- R: → (638,614) -->
    <line x1="610" y1="680" x2="638" y2="614" stroke="#8B5020" stroke-width="3.5" stroke-linecap="round"/>
    <!-- LL: (582,614) → (560,565) -->
    <line x1="582" y1="614" x2="560" y2="565" stroke="#9A6030" stroke-width="2.2" stroke-linecap="round"/>
    <!-- LR: (582,614) → (582,562) -->
    <line x1="582" y1="614" x2="582" y2="562" stroke="#9A6030" stroke-width="2.2" stroke-linecap="round"/>
    <!-- RL: → (638,562) -->
    <line x1="638" y1="614" x2="638" y2="562" stroke="#9A6030" stroke-width="2.2" stroke-linecap="round"/>
    <!-- RR: → (660,565) -->
    <line x1="638" y1="614" x2="660" y2="565" stroke="#9A6030" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Level 3 twigs -->
    <line x1="560" y1="565" x2="542" y2="532" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="560" y1="565" x2="562" y2="530" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="582" y1="562" x2="565" y2="528" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="582" y1="562" x2="590" y2="526" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="638" y1="562" x2="630" y2="526" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="638" y1="562" x2="656" y2="528" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="660" y1="565" x2="658" y2="530" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="660" y1="565" x2="678" y2="532" stroke="#AA7040" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Leaf clusters -->
    <ellipse cx="542" cy="526" rx="14" ry="9" fill="#3AC95A" opacity="0.85"/>
    <ellipse cx="562" cy="522" rx="13" ry="9" fill="#50DD70" opacity="0.8"/>
    <ellipse cx="566" cy="520" rx="14" ry="9" fill="#3AC95A" opacity="0.85"/>
    <ellipse cx="590" cy="518" rx="13" ry="9" fill="#50DD70" opacity="0.8"/>
    <ellipse cx="630" cy="518" rx="14" ry="9" fill="#3AC95A" opacity="0.85"/>
    <ellipse cx="656" cy="520" rx="13" ry="9" fill="#50DD70" opacity="0.8"/>
    <ellipse cx="658" cy="524" rx="14" ry="9" fill="#3AC95A" opacity="0.85"/>
    <ellipse cx="678" cy="526" rx="13" ry="9" fill="#50DD70" opacity="0.8"/>
    <!-- Flowers -->
    <circle cx="563" cy="519" r="5" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="632" cy="515" r="5" fill="#FFA0D0" opacity="0.9"/>
    <circle cx="658" cy="521" r="5" fill="#FFD0E8" opacity="0.85"/>
    <!-- Stage label -->
    <rect x="560" y="840" width="100" height="30" rx="8" fill="#204420"/>
    <text x="610" y="860" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#88DD88" text-anchor="middle">반복 3</text>

    <!-- ===== STAGE 4: Iteration 4 (fully grown) ===== -->
    <!-- Trunk: (835, 830) → (835, 685) -->
    <line x1="835" y1="830" x2="835" y2="685" stroke="#7A4010" stroke-width="7" stroke-linecap="round"/>
    <!-- L: → (800,598) -->
    <line x1="835" y1="685" x2="800" y2="598" stroke="#8B5020" stroke-width="4.5" stroke-linecap="round"/>
    <!-- R: → (870,598) -->
    <line x1="835" y1="685" x2="870" y2="598" stroke="#8B5020" stroke-width="4.5" stroke-linecap="round"/>
    <!-- LL: → (770,546) -->
    <line x1="800" y1="598" x2="770" y2="546" stroke="#9A6030" stroke-width="3" stroke-linecap="round"/>
    <!-- LR: → (800,542) -->
    <line x1="800" y1="598" x2="800" y2="542" stroke="#9A6030" stroke-width="3" stroke-linecap="round"/>
    <!-- RL: → (870,542) -->
    <line x1="870" y1="598" x2="870" y2="542" stroke="#9A6030" stroke-width="3" stroke-linecap="round"/>
    <!-- RR: → (900,546) -->
    <line x1="870" y1="598" x2="900" y2="546" stroke="#9A6030" stroke-width="3" stroke-linecap="round"/>
    <!-- Level 3 -->
    <line x1="770" y1="546" x2="750" y2="508" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="770" y1="546" x2="772" y2="506" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="800" y1="542" x2="782" y2="502" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="800" y1="542" x2="808" y2="500" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="870" y1="542" x2="860" y2="500" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="870" y1="542" x2="878" y2="502" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="900" y1="546" x2="898" y2="506" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="900" y1="546" x2="918" y2="508" stroke="#AA7040" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Large leaf clusters -->
    <ellipse cx="748" cy="500" rx="22" ry="14" fill="#3AC95A" opacity="0.9" transform="rotate(-15 748 500)"/>
    <ellipse cx="770" cy="494" rx="19" ry="12" fill="#50DD70" opacity="0.85"/>
    <ellipse cx="780" cy="492" rx="22" ry="14" fill="#3AC95A" opacity="0.9"/>
    <ellipse cx="808" cy="490" rx="19" ry="12" fill="#50DD70" opacity="0.85"/>
    <ellipse cx="858" cy="490" rx="22" ry="14" fill="#3AC95A" opacity="0.9"/>
    <ellipse cx="876" cy="492" rx="19" ry="12" fill="#50DD70" opacity="0.85"/>
    <ellipse cx="898" cy="494" rx="22" ry="14" fill="#3AC95A" opacity="0.9" transform="rotate(15 898 494)"/>
    <ellipse cx="918" cy="500" rx="19" ry="12" fill="#50DD70" opacity="0.85"/>
    <!-- Flowers (bright, fully grown) -->
    <circle cx="772" cy="491" r="7" fill="#FFA0D0" opacity="0.95"/>
    <circle cx="808" cy="487" r="7" fill="#FFD0E8" opacity="0.9"/>
    <circle cx="860" cy="487" r="7" fill="#FFA0D0" opacity="0.95"/>
    <circle cx="900" cy="491" r="7" fill="#FFD0E8" opacity="0.9"/>
    <!-- Stage label -->
    <rect x="782" y="840" width="106" height="30" rx="8" fill="#2A5A20"/>
    <text x="835" y="860" font-family="'Segoe UI',Arial" font-size="20" font-weight="700" fill="#AAFFAA" text-anchor="middle">반복 4 ✓</text>

    <!-- Growth arrows between stages -->
    <text x="248" y="720" font-family="'Segoe UI',Arial" font-size="32" fill="#3A6030" text-anchor="middle" opacity="0.7">→</text>
    <text x="463" y="720" font-family="'Segoe UI',Arial" font-size="32" fill="#3A6030" text-anchor="middle" opacity="0.7">→</text>
    <text x="678" y="720" font-family="'Segoe UI',Arial" font-size="32" fill="#3A6030" text-anchor="middle" opacity="0.7">→</text>
  </g>
</svg>
