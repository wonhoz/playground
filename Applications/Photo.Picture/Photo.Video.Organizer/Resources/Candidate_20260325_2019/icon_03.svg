<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FD79A8"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <clipPath id="clip03">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer1: 배경 -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#clip03)">
    <!-- Layer2: 메인 오브젝트 -->

    <!-- 좌측 레이블 "전" -->
    <text x="295" y="228" font-size="52" fill="white" fill-opacity="0.75" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">전</text>

    <!-- 우측 레이블 "후" -->
    <text x="720" y="228" font-size="52" fill="white" fill-opacity="0.75" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">후</text>

    <!-- 좌측: 어수선한 사진 카드들 -->
    <!-- 카드1 (파란색, 기울어짐) -->
    <g transform="rotate(-15, 295, 370)">
      <rect x="195" y="290" width="200" height="160" rx="16" fill="white" fill-opacity="0.92"/>
      <rect x="215" y="310" width="160" height="100" rx="8" fill="#74B9FF"/>
    </g>
    <!-- 카드2 (민트색, 반대 기울어짐) -->
    <g transform="rotate(12, 305, 455)">
      <rect x="210" y="380" width="190" height="155" rx="16" fill="white" fill-opacity="0.88"/>
      <rect x="228" y="398" width="154" height="100" rx="8" fill="#55EFC4"/>
    </g>
    <!-- 카드3 (노란색, 살짝 기울어짐) -->
    <g transform="rotate(-8, 297, 555)">
      <rect x="200" y="480" width="195" height="150" rx="16" fill="white" fill-opacity="0.82"/>
      <rect x="218" y="498" width="159" height="96" rx="8" fill="#FFEAA7"/>
    </g>

    <!-- 중앙 굵은 화살표 -->
    <line x1="445" y1="490" x2="555" y2="490" stroke="white" stroke-width="78" stroke-linecap="round"/>
    <polygon points="530,428 628,490 530,552" fill="white"/>

    <!-- 우측: 정렬된 폴더들 -->
    <!-- 2024 폴더 -->
    <rect x="624" y="290" width="200" height="80" rx="16" fill="#F9CA24"/>
    <rect x="624" y="278" width="80" height="26" rx="10" fill="#F9CA24"/>
    <text x="724" y="330" font-size="44" fill="#2D3436" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">2024</text>

    <!-- 01 폴더 -->
    <rect x="624" y="390" width="200" height="70" rx="16" fill="#F9CA24" fill-opacity="0.88"/>
    <rect x="624" y="379" width="70" height="24" rx="10" fill="#F9CA24" fill-opacity="0.88"/>
    <text x="724" y="426" font-size="42" fill="#2D3436" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">01</text>

    <!-- 02 폴더 -->
    <rect x="624" y="480" width="200" height="70" rx="16" fill="#F9CA24" fill-opacity="0.72"/>
    <rect x="624" y="469" width="70" height="24" rx="10" fill="#F9CA24" fill-opacity="0.72"/>
    <text x="724" y="516" font-size="42" fill="#2D3436" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">02</text>

    <!-- 03 폴더 -->
    <rect x="624" y="570" width="200" height="70" rx="16" fill="#F9CA24" fill-opacity="0.56"/>
    <rect x="624" y="559" width="70" height="24" rx="10" fill="#F9CA24" fill-opacity="0.56"/>
    <text x="724" y="606" font-size="42" fill="#2D3436" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">03</text>

    <!-- 04 폴더 -->
    <rect x="624" y="660" width="200" height="70" rx="16" fill="#F9CA24" fill-opacity="0.40"/>
    <rect x="624" y="649" width="70" height="24" rx="10" fill="#F9CA24" fill-opacity="0.40"/>
    <text x="724" y="696" font-size="42" fill="#2D3436" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">04</text>

    <!-- Layer3: 화살표 아래 작은 설명 텍스트 -->
    <rect x="396" y="568" width="232" height="46" rx="23" fill="white" fill-opacity="0.22"/>
    <text x="512" y="591" font-size="30" fill="white" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">SORT</text>
  </g>
</svg>
