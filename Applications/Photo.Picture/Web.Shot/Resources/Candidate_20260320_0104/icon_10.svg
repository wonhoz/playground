  <path d="M420 460 Q512 560 640 420" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round"/>
  <path d="M604 460 Q512 560 384 420" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round"/>
