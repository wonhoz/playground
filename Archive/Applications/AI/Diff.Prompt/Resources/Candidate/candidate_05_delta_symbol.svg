<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </linearGradient>
    <linearGradient id="deltaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)"/>
  <!-- Large Delta symbol -->
  <path d="M256,90 L420,390 L92,390 Z" fill="url(#deltaGrad)" opacity="0.15" stroke="url(#deltaGrad)" stroke-width="6" stroke-linejoin="round"/>
  <path d="M256,110 L400,375 L112,375 Z" fill="none" stroke="#FB923C" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner delta -->
  <path d="M256,170 L340,330 L172,330 Z" fill="url(#deltaGrad)" opacity="0.3"/>
  <!-- Diff lines inside -->
  <rect x="195" y="275" width="50" height="10" rx="5" fill="#EF4444"/>
  <rect x="255" y="275" width="62" height="10" rx="5" fill="#22C55E"/>
  <rect x="210" y="298" width="45" height="10" rx="5" fill="#EF4444"/>
  <rect x="265" y="298" width="55" height="10" rx="5" fill="#22C55E"/>
  <!-- AI chip top -->
  <rect x="196" y="420" width="120" height="44" rx="10" fill="#92400E" stroke="#F97316" stroke-width="2"/>
  <text x="256" y="448" font-family="monospace" font-size="20" fill="#FED7AA" text-anchor="middle" font-weight="bold">∆ DIFF</text>
</svg>
