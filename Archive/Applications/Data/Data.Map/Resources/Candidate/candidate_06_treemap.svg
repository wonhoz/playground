  <!-- Bottom-left block -->
  <rect x="56" y="248" width="120" height="120" rx="4" fill="#1b5e20"/>
  <rect x="58" y="250" width="116" height="116" rx="3" fill="#2e7d32" opacity="0.7"/>
  <text x="116" y="304" font-family="Arial Black, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Cat E</text>
  <text x="116" y="322" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#a5d6a7" text-anchor="middle">18%</text>
  <!-- Bottom middle -->
  <rect x="184" y="248" width="80" height="55" rx="4" fill="#e65100"/>
