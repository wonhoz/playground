<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Net handle -->
  <line x1="680" y1="720" x2="810" y2="850" stroke="#E65100" stroke-width="36" stroke-linecap="round"/>
  <!-- Net hoop -->
  <circle cx="520" cy="480" r="200" fill="none" stroke="#E65100" stroke-width="28"/>
  <!-- Net mesh -->
  <line x1="520" y1="280" x2="520" y2="680" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="320" y1="480" x2="720" y2="480" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.5"/>
  <line x1="378" y1="338" x2="662" y2="622" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.4"/>
  <line x1="662" y1="338" x2="378" y2="622" stroke="#FFAB40" stroke-width="10" stroke-opacity="0.4"/>
  <!-- Connect hoop to handle -->
  <line x1="672" y1="612" x2="680" y2="720" stroke="#E65100" stroke-width="28" stroke-linecap="round"/>
  <!-- Bug inside net -->
  <ellipse cx="520" cy="500" rx="60" ry="80" fill="#FFAB40" fill-opacity="0.7"/>
  <circle cx="520" cy="430" r="42" fill="#FFAB40" fill-opacity="0.7"/>
  <!-- Code lines behind -->
  <rect x="160" y="280" width="180" height="16" rx="6" fill="#E65100" fill-opacity="0.4"/>
  <rect x="160" y="316" width="140" height="16" rx="6" fill="#FFAB40" fill-opacity="0.3"/>
  <rect x="160" y="352" width="160" height="16" rx="6" fill="#E65100" fill-opacity="0.4"/>
</svg>