<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2d1a4a"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="190" fill="url(#vinyl)"/>
  <!-- Grooves -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Label -->
  <circle cx="256" cy="256" r="75" fill="url(#label)"/>
  <!-- Guitar silhouette on label -->
  <ellipse cx="256" cy="275" rx="28" ry="34" fill="#fff" opacity="0.9"/>
  <ellipse cx="256" cy="248" rx="22" ry="26" fill="#fff" opacity="0.9"/>
  <rect x="249" y="188" width="14" height="65" rx="5" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="256" r="8" fill="#cc3300"/>
  <!-- Beat indicators -->
  <rect x="60" y="230" width="50" height="12" rx="6" fill="#ff6600" opacity="0.8"/>
  <rect x="60" y="252" width="35" height="12" rx="6" fill="#ff9900" opacity="0.6"/>
  <rect x="60" y="274" width="45" height="12" rx="6" fill="#ff6600" opacity="0.8"/>
  <rect x="402" y="230" width="50" height="12" rx="6" fill="#ff6600" opacity="0.8"/>
  <rect x="418" y="252" width="35" height="12" rx="6" fill="#ff9900" opacity="0.6"/>
  <rect x="408" y="274" width="45" height="12" rx="6" fill="#ff6600" opacity="0.8"/>
</svg>