<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1A1400"/>
  <!-- Layer 2: 전파탑 + 동심원 파동 -->
  <!-- 동심원 파동 (배경) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#F59E0B" stroke-width="6" opacity="0.15"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="#F59E0B" stroke-width="8" opacity="0.25"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#F59E0B" stroke-width="10" opacity="0.4"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#FBBF24" stroke-width="12" opacity="0.6"/>
  <!-- 전파탑 -->
  <!-- 탑 몸체 -->
  <polygon points="512,80 562,880 462,880" fill="#78350F"/>
  <polygon points="512,80 538,880 512,880" fill="#92400E"/>
  <!-- 탑 가로대들 -->
  <rect x="452" y="300" width="120" height="16" rx="4" fill="#A16207"/>
  <rect x="440" y="480" width="144" height="16" rx="4" fill="#A16207"/>
  <rect x="424" y="660" width="176" height="16" rx="4" fill="#A16207"/>
  <!-- 안테나 꼭대기 -->
  <rect x="504" y="60" width="16" height="60" rx="4" fill="#FCD34D"/>
  <circle cx="512" cy="55" r="20" fill="#FCD34D"/>
  <!-- Layer 3: 신호 방사 (4방향) -->
  <path d="M440,480 Q260,360 140,280" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M584,480 Q764,360 884,280" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- HTTP 메서드 뱃지들 -->
  <rect x="80" y="200" width="130" height="54" rx="12" fill="#1F6FEB"/>
  <text x="145" y="237" font-size="36" fill="white" text-anchor="middle" font-family="monospace">GET</text>
  <rect x="80" y="280" width="150" height="54" rx="12" fill="#238636"/>
  <text x="155" y="317" font-size="36" fill="white" text-anchor="middle" font-family="monospace">POST</text>
  <rect x="814" y="200" width="130" height="54" rx="12" fill="#D29922"/>
  <text x="879" y="237" font-size="36" fill="white" text-anchor="middle" font-family="monospace">PUT</text>
  <rect x="800" y="280" width="160" height="54" rx="12" fill="#B91C1C"/>
  <text x="880" y="317" font-size="36" fill="white" text-anchor="middle" font-family="monospace">DEL</text>
</svg>
