<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FFF0"/>
      <stop offset="100%" stop-color="#E0F8E0"/>
    </linearGradient>
    <linearGradient id="greenTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8EDD8E"/>
      <stop offset="100%" stop-color="#5CB85C"/>
    </linearGradient>
    <linearGradient id="greenCenter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0E8A0"/>
      <stop offset="100%" stop-color="#68CC68"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Light green background — completion celebration -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <!-- Layer 2: 3x3 Tiles — ALL same green (won!) -->
  <!-- tile size=230, gap=24, start=143 -->
  <!-- Row 0 -->
  <rect x="143" y="143" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <rect x="397" y="143" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <rect x="651" y="143" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <!-- Row 1 -->
  <rect x="143" y="397" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <rect x="397" y="397" width="230" height="230" rx="24" fill="url(#greenCenter)"/>
  <rect x="651" y="397" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <!-- Row 2 -->
  <rect x="143" y="651" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <rect x="397" y="651" width="230" height="230" rx="24" fill="url(#greenTile)"/>
  <rect x="651" y="651" width="230" height="230" rx="24" fill="url(#greenTile)"/>

  <!-- Layer 3: Center checkmark (completion symbol) -->
  <polyline points="454,514 496,556 570,482" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkle dots (celebration) -->
  <circle cx="512" cy="90" r="18" fill="#FFE040" opacity="0.9"/>
  <circle cx="90" cy="512" r="14" fill="#FFE040" opacity="0.7"/>
  <circle cx="934" cy="512" r="14" fill="#FFE040" opacity="0.7"/>
  <circle cx="512" cy="934" r="18" fill="#FFE040" opacity="0.9"/>
  <circle cx="160" cy="160" r="12" fill="#FFE040" opacity="0.6"/>
  <circle cx="864" cy="160" r="12" fill="#FFE040" opacity="0.6"/>
  <circle cx="160" cy="864" r="12" fill="#FFE040" opacity="0.6"/>
  <circle cx="864" cy="864" r="12" fill="#FFE040" opacity="0.6"/>

  <!-- Star lines radiating from corners -->
  <line x1="512" y1="72" x2="512" y2="108" stroke="#FFE040" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="490" y1="78" x2="482" y2="62" stroke="#FFE040" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <line x1="534" y1="78" x2="542" y2="62" stroke="#FFE040" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
</svg>
