<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: 파일 카드 3장 스택 (뒤→앞) -->
  <!-- 뒤 카드 (SVG) — 보라 -->
  <rect x="180" y="260" width="500" height="380" rx="28" fill="#EDE7F6" transform="rotate(-10 430 450)"/>
  <text x="350" y="490" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" fill="#7B1FA2" text-anchor="middle" transform="rotate(-10 350 480)">SVG</text>
  <!-- 중간 카드 (ICO) — 파랑 -->
  <rect x="210" y="290" width="500" height="380" rx="28" fill="#E3F2FD" transform="rotate(-3 460 480)"/>
  <text x="430" y="510" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" fill="#1565C0" text-anchor="middle" transform="rotate(-3 430 500)">ICO</text>
  <!-- 앞 카드 (PNG) — 연두 -->
  <rect x="250" y="330" width="500" height="380" rx="28" fill="#F1F8E9"/>
  <text x="500" y="550" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" fill="#33691E" text-anchor="middle">PNG</text>
  <!-- Layer 3: 변환 화살표 배지 -->
  <circle cx="780" cy="720" r="100" fill="#FF6F00"/>
  <text x="780" y="748" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="white" text-anchor="middle">⇄</text>
</svg>
