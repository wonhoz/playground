<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#4A148C"/>
  <!-- Layer 2: Format card -->
  <rect x="152" y="200" width="720" height="520" rx="20" fill="#311B92"/>
  <!-- Layer 3: **Bold** line -->
  <text x="220" y="340" font-family="Arial" font-size="72" font-weight="900" fill="white">**Bold**</text>
  <!-- *Italic* line -->
  <text x="220" y="450" font-family="Arial" font-size="64" font-style="italic" fill="#26C6DA">*Italic*</text>
  <!-- ~~Strike~~ -->
  <text x="220" y="555" font-family="Arial" font-size="60" fill="#FF80AB" text-decoration="line-through">~~Strike~~</text>
  <!-- Decorative line separator -->
  <rect x="220" y="590" width="500" height="4" rx="2" fill="white" opacity="0.2"/>
</svg>