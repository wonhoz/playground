<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#040d0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 색상별 정렬 — 무지개 스펙트럼으로 사진 분류 -->
  <!-- 상단 무작위 사진들 -->
  <text x="256" y="76" text-anchor="middle" font-size="12" fill="#34D399" opacity="0.6" letter-spacing="2">UNSORTED</text>
  <rect x="68" y="88" width="44" height="44" rx="5" fill="#F43F5E" opacity="0.7" transform="rotate(-5,90,110)"/>
  <rect x="120" y="90" width="44" height="44" rx="5" fill="#FDE047" opacity="0.7" transform="rotate(3,142,112)"/>
  <rect x="174" y="86" width="44" height="44" rx="5" fill="#38BDF8" opacity="0.7" transform="rotate(-2,196,108)"/>
