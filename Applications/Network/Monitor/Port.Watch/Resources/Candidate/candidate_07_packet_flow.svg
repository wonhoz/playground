<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#003060"/>
    </linearGradient>
    <linearGradient id="packet1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <linearGradient id="packet2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <linearGradient id="packet3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56ab2f"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main pipe/channel -->
  <rect x="80" y="235" width="352" height="42" rx="10" fill="#0a2040" stroke="#0072ff" stroke-width="2"/>
  <!-- Packet flow -->
  <rect x="95" y="243" width="60" height="26" rx="5" fill="url(#packet1)"/>
  <text x="125" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">:443</text>
  <rect x="175" y="243" width="60" height="26" rx="5" fill="url(#packet3)"/>
  <text x="205" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">:80</text>
  <rect x="255" y="243" width="70" height="26" rx="5" fill="url(#packet2)"/>
  <text x="290" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">:3389</text>
  <rect x="345" y="243" width="60" height="26" rx="5" fill="url(#packet1)" opacity="0.6"/>
  <text x="375" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">:22</text>
  <!-- Flow arrow -->
  <path d="M 430 256 L 460 256 M 448 244 L 460 256 L 448 268" stroke="#0072ff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Source -->
  <rect x="60" y="190" width="80" height="40" rx="6" fill="#0a2040" stroke="#0072ff" stroke-width="2"/>
  <text x="100" y="215" text-anchor="middle" font-family="monospace" font-size="12" fill="#00c6ff" font-weight="bold">CLIENT</text>
  <line x1="100" y1="230" x2="100" y2="235" stroke="#0072ff" stroke-width="2"/>
  <!-- Destination -->
  <rect x="372" y="190" width="80" height="40" rx="6" fill="#0a2040" stroke="#0072ff" stroke-width="2"/>
  <text x="412" y="215" text-anchor="middle" font-family="monospace" font-size="12" fill="#00c6ff" font-weight="bold">SERVER</text>
  <line x1="412" y1="230" x2="412" y2="235" stroke="#0072ff" stroke-width="2"/>
  <!-- Port monitor display above -->
  <rect x="160" y="100" width="192" height="100" rx="8" fill="#061020" stroke="#0072ff" stroke-width="2"/>
  <text x="256" y="125" text-anchor="middle" font-family="monospace" font-size="13" fill="#00c6ff" font-weight="bold">ACTIVE PORTS</text>
  <line x1="168" y1="132" x2="344" y2="132" stroke="#0072ff" stroke-width="1" opacity="0.5"/>
  <text x="185" y="150" font-family="monospace" font-size="11" fill="#56ab2f">443 HTTPS  SECURE</text>
  <text x="185" y="166" font-family="monospace" font-size="11" fill="#f7971e">3389 RDP   WARN</text>
  <text x="185" y="182" font-family="monospace" font-size="11" fill="#56ab2f">80  HTTP   OK</text>
  <line x1="256" y1="200" x2="256" y2="235" stroke="#0072ff" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Alert badge on 3389 -->
  <circle cx="345" cy="164" r="8" fill="#f7971e" opacity="0.9"/>
  <text x="345" y="168" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">!</text>
</svg>
