<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050510"/>
  <!-- Original server (left, slightly back) -->
  <rect x="200" y="380" width="260" height="180" rx="16" fill="#283593" opacity="0.6"/>
  <rect x="220" y="404" width="220" height="12" rx="6" fill="#5C6BC0" opacity="0.5"/>
  <rect x="220" y="424" width="160" height="12" rx="6" fill="#5C6BC0" opacity="0.35"/>
  <!-- Clone server (right, forward) -->
  <rect x="564" y="380" width="260" height="180" rx="16" fill="#283593"/>
  <rect x="584" y="404" width="220" height="12" rx="6" fill="#5C6BC0"/>
  <rect x="584" y="424" width="160" height="12" rx="6" fill="#5C6BC0" opacity="0.6"/>
  <rect x="584" y="444" width="180" height="12" rx="6" fill="#5C6BC0" opacity="0.4"/>
  <!-- Clone arrow between them -->
  <path d="M468 470 L556 470" stroke="#5C6BC0" stroke-width="12" stroke-linecap="round"/>
  <polygon points="556,450 596,470 556,490" fill="#5C6BC0"/>
  <!-- Clone symbol (copy icon) on arrow -->
  <rect x="488" y="444" width="36" height="36" rx="6" fill="#283593" stroke="#5C6BC0" stroke-width="4"/>
  <rect x="500" y="432" width="36" height="36" rx="6" fill="#050510" stroke="#5C6BC0" stroke-width="4"/>
  <!-- DNA-like double helix suggesting clone -->
  <path d="M460 620 Q480 600 500 620 Q520 640 540 620 Q560 600 580 620" stroke="#5C6BC0" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M460 650 Q480 630 500 650 Q520 670 540 650 Q560 630 580 650" stroke="#5C6BC0" stroke-width="8" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>