    <rect x="108" y="438" width="180" height="8" rx="4" fill="#A7F3D0" opacity="0.25"/>
    <!-- 오른쪽 Rendered -->
    <text x="582" y="264" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#FFFFFF" font-weight="800">Hello</text>
    <rect x="582" y="285" width="200" height="8" rx="4" fill="#FFFFFF" opacity="0.5"/>
