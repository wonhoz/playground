<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0000"/>
<!-- 컨셉: 압축 다이어트 — 폴더가 압축되어 작아짐 -->
<!-- 큰 폴더 (왼쪽, before) -->
<path d="M 160 340 Q 160 300 192 300 L 340 300 L 368 265 L 500 265 Q 532 265 532 296 L 532 580 Q 532 612 500 612 L 192 612 Q 160 612 160 580 Z" fill="#C62828" opacity="0.7"/>
<!-- 화살표 변환 (오른쪽으로) -->
<path d="M 560 440 L 680 440" fill="none" stroke="#EF9A9A" stroke-width="28" stroke-linecap="round"/>
<path d="M 636 380 L 688 440 L 636 500" fill="none" stroke="#EF9A9A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 작은 폴더 (오른쪽, after) -->
<path d="M 700 380 Q 700 356 720 356 L 808 356 L 824 334 L 900 334 Q 920 334 920 354 L 920 520 Q 920 540 900 540 L 720 540 Q 700 540 700 520 Z" fill="#C62828"/>
<!-- 압축 아이콘 (지퍼선) -->
<line x1="300" y1="340" x2="420" y2="580" stroke="#EF9A9A" stroke-width="16" stroke-linecap="round" stroke-dasharray="14 10" opacity="0.5"/>
<!-- 압축률 퍼센트 표시 원 -->
<circle cx="810" cy="680" r="100" fill="none" stroke="#C62828" stroke-width="28"/>
<circle cx="810" cy="680" r="100" fill="none" stroke="#EF9A9A" stroke-width="28" stroke-dasharray="440 188" stroke-dashoffset="0" opacity="0.8"/>
</svg>
