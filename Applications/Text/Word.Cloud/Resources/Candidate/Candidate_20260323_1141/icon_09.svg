<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 비비드 핫핑크 -->
  <rect width="1024" height="1024" rx="180" fill="#880E4F"/>
  <!-- Layer 2: 확대경 + 텍스트 속 단어들 분석 -->
  <!-- 확대경 렌즈 (큰, 중앙) -->
  <circle cx="480" cy="480" r="280" fill="#AD1457" stroke="#F48FB1" stroke-width="20"/>
  <!-- 렌즈 안 워드 클라우드 -->
  <text x="480" y="430" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">word</text>
  <text x="350" y="510" font-family="Arial" font-size="60" font-weight="700" fill="#FCE4EC" text-anchor="middle">tag</text>
  <text x="600" y="510" font-family="Arial" font-size="52" font-weight="700" fill="#F8BBD0" text-anchor="middle">text</text>
  <text x="480" y="570" font-family="Arial" font-size="44" fill="#FCE4EC" text-anchor="middle">freq  vis</text>
  <!-- 확대경 손잡이 -->
  <line x1="710" y1="710" x2="860" y2="860" stroke="#F48FB1" stroke-width="48" stroke-linecap="round"/>
  <!-- Layer 3: 검색/분석 아이콘 포인트 -->
  <circle cx="480" cy="480" r="280" fill="none" stroke="white" stroke-width="6" opacity="0.3"/>
  <!-- 상단 라벨 -->
  <text x="512" y="190" font-family="Arial Black,Arial" font-size="60" font-weight="900" fill="#F48FB1" text-anchor="middle">ANALYZE</text>
</svg>
