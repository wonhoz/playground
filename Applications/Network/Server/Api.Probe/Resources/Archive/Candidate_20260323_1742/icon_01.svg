<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1A0A"/>
  <!-- Layer 2: HTTP 상태코드 신호등 -->
  <!-- 신호등 외곽 -->
  <rect x="312" y="80" width="400" height="760" rx="40" fill="#0F1F0F" stroke="#2D4A2D" stroke-width="12"/>
  <!-- 200 OK (초록) -->
  <circle cx="512" cy="260" r="140" fill="#1B5E20"/>
  <circle cx="512" cy="260" r="120" fill="#4CAF50"/>
  <text x="512" y="240" font-size="60" fill="white" text-anchor="middle" font-weight="bold" font-family="monospace">200</text>
  <text x="512" y="306" font-size="44" fill="white" text-anchor="middle" font-family="monospace">OK</text>
  <!-- 404 Not Found (주황) -->
  <circle cx="512" cy="512" r="140" fill="#4A1800"/>
  <circle cx="512" cy="512" r="120" fill="#FF6D00"/>
  <text x="512" y="492" font-size="60" fill="white" text-anchor="middle" font-weight="bold" font-family="monospace">404</text>
  <text x="512" y="558" font-size="44" fill="white" text-anchor="middle" font-family="monospace">Not Found</text>
  <!-- 500 Error (빨강) -->
  <circle cx="512" cy="764" r="140" fill="#3B0000"/>
  <circle cx="512" cy="764" r="120" fill="#D32F2F"/>
  <text x="512" y="744" font-size="60" fill="white" text-anchor="middle" font-weight="bold" font-family="monospace">500</text>
  <text x="512" y="810" font-size="44" fill="white" text-anchor="middle" font-family="monospace">Server Error</text>
  <!-- Layer 3: 활성 표시 빛 (200 주변) -->
  <circle cx="512" cy="260" r="150" fill="none" stroke="#4CAF50" stroke-width="8" opacity="0.4"/>
  <circle cx="512" cy="260" r="168" fill="none" stroke="#4CAF50" stroke-width="4" opacity="0.2"/>
</svg>
