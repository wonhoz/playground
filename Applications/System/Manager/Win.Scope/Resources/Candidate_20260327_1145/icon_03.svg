<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Window opacity demo: opaque -> transparent -->
  <!-- Opaque window (left) -->
  <rect x="155" y="270" width="290" height="220" rx="14" fill="#7C3AED"/>
  <rect x="155" y="270" width="290" height="40" rx="14" fill="#6D28D9"/>
  <text x="300" y="298" font-family="Arial,sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">Window</text>
  <rect x="175" y="326" width="250" height="12" rx="4" fill="#A78BFA"/>
  <rect x="175" y="350" width="200" height="12" rx="4" fill="#A78BFA"/>
  <rect x="175" y="374" width="230" height="12" rx="4" fill="#A78BFA"/>
  <text x="300" y="456" font-family="Arial,sans-serif" font-size="36" fill="#DDD6FE" text-anchor="middle">100%</text>
  <!-- Arrow -->
  <path d="M462,380 L562,380" stroke="#6D28D9" stroke-width="16" stroke-linecap="round"/>
  <polygon points="562,360 600,380 562,400" fill="#6D28D9"/>
  <!-- Semi-transparent window (middle) -->
  <rect x="600" y="270" width="290" height="220" rx="14" fill="#7C3AED" opacity="0.55"/>
  <rect x="600" y="270" width="290" height="40" rx="14" fill="#6D28D9" opacity="0.55"/>
  <text x="745" y="298" font-family="Arial,sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle">Window</text>
  <text x="745" y="456" font-family="Arial,sans-serif" font-size="36" fill="#C4B5FD" text-anchor="middle">50%</text>
  <!-- Opacity slider -->
  <rect x="155" y="580" width="735" height="36" rx="18" fill="#EDE9FE"/>
  <rect x="155" y="580" width="430" height="36" rx="18" fill="#7C3AED"/>
  <circle cx="585" cy="598" r="30" fill="#FFFFFF" stroke="#7C3AED" stroke-width="10"/>
  <text x="512" y="680" font-family="Arial,sans-serif" font-size="52" fill="#6D28D9" font-weight="bold" text-anchor="middle">Opacity Control</text>
  <!-- Z-order arrows -->
  <text x="350" y="800" font-family="Arial,sans-serif" font-size="52" fill="#8B5CF6" text-anchor="middle">↕ Z-Order</text>
  <text x="700" y="800" font-family="Arial,sans-serif" font-size="52" fill="#8B5CF6" text-anchor="middle">📌 TopMost</text>
</svg>
