  <text x="574" y="423" font-family="Segoe UI, sans-serif" font-size="40" fill="#BF360C">📁 07</text>
  <!-- 08 폴더 -->
  <rect x="526" y="468" width="360" height="60" rx="12" fill="#FFECB3" opacity="0.9"/>
  <text x="574" y="509" font-family="Segoe UI, sans-serif" font-size="40" fill="#BF360C">📁 08</text>
