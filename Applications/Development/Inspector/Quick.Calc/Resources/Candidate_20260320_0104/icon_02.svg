<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050010"/>
  <!-- Formula: a + b = c style -->
  <!-- Left operand box -->
  <rect x="120" y="380" width="180" height="140" rx="20" fill="#4527A0" opacity="0.8"/>
  <rect x="148" y="418" width="124" height="64" rx="10" fill="#9575CD" opacity="0.6"/>
  <!-- Plus operator -->
  <rect x="336" y="432" width="80" height="36" rx="12" fill="#9575CD"/>
  <rect x="358" y="410" width="36" height="80" rx="12" fill="#9575CD"/>
  <!-- Right operand box -->
  <rect x="452" y="380" width="180" height="140" rx="20" fill="#4527A0" opacity="0.8"/>
  <rect x="480" y="418" width="124" height="64" rx="10" fill="#9575CD" opacity="0.6"/>
  <!-- Equals sign -->
  <rect x="670" y="430" width="80" height="24" rx="10" fill="#9575CD"/>
  <rect x="670" y="470" width="80" height="24" rx="10" fill="#9575CD"/>
  <!-- Result box -->
  <rect x="784" y="360" width="120" height="180" rx="20" fill="#9575CD" opacity="0.8"/>
  <rect x="804" y="400" width="80" height="100" rx="10" fill="#050010" opacity="0.6"/>
  <!-- Bottom: binary 0101 -->
  <rect x="160" y="600" width="50" height="50" rx="10" fill="#4527A0" opacity="0.6"/>
  <rect x="228" y="600" width="50" height="50" rx="10" fill="#9575CD" opacity="0.7"/>
  <rect x="296" y="600" width="50" height="50" rx="10" fill="#4527A0" opacity="0.6"/>
  <rect x="364" y="600" width="50" height="50" rx="10" fill="#9575CD" opacity="0.7"/>
  <rect x="432" y="600" width="50" height="50" rx="10" fill="#4527A0" opacity="0.6"/>
  <rect x="500" y="600" width="50" height="50" rx="10" fill="#9575CD" opacity="0.7"/>
  <rect x="568" y="600" width="50" height="50" rx="10" fill="#4527A0" opacity="0.6"/>
  <rect x="636" y="600" width="50" height="50" rx="10" fill="#9575CD" opacity="0.7"/>
</svg>
