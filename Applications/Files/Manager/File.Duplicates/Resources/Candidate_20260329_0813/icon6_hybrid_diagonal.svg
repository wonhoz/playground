<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Before vs after - cluttered duplicates diagonal to clean freed space -->
  <!-- "Before" side: pile of duplicate files (top-left) -->
  <g opacity="0.85" transform="rotate(-8, 300, 350)">
    <rect x="150" y="250" width="180" height="230" rx="16" fill="#FEF9C3"/>
    <rect x="185" y="230" width="180" height="230" rx="16" fill="#FDE68A"/>
    <rect x="220" y="210" width="180" height="230" rx="16" fill="white"/>
    <text x="310" y="310" font-size="80" text-anchor="middle">📄</text>
    <text x="310" y="395" font-family="monospace" font-size="36" fill="#9CA3AF" text-anchor="middle">×3</text>
  </g>
  <!-- Diagonal arrow from pile to clean -->
  <path d="M 440 370 Q 560 480 680 590" stroke="#059669" stroke-width="28" stroke-linecap="round" fill="none"/>
  <polygon points="680,590 650,562 674,556" fill="#059669"/>
  <!-- Broom/cleanup metaphor at arrow middle -->
  <circle cx="555" cy="470" r="52" fill="white" opacity="0.9"/>
  <text x="555" y="492" font-size="62" text-anchor="middle">🧹</text>
  <!-- "After" side: single clean file (bottom-right) -->
  <rect x="640" y="580" width="230" height="290" rx="20" fill="white" opacity="0.95"/>
  <polygon points="810,580 870,580 870,640" fill="#059669" opacity="0.4"/>
  <text x="755" y="720" font-size="88" text-anchor="middle">📄</text>
  <!-- Green checkmark on clean file -->
  <circle cx="755" cy="820" r="40" fill="#059669"/>
  <polyline points="730,820 748,842 784,798" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: Space saved indicator -->
  <rect x="130" y="840" width="390" height="80" rx="20" fill="white" opacity="0.85"/>
  <text x="325" y="894" font-family="Arial" font-size="54" fill="#059669" text-anchor="middle" font-weight="bold">-2.4 GB</text>
</svg>
