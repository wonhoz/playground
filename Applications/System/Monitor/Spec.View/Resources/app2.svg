<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright lime green -->
  <rect width="1024" height="1024" rx="190" fill="#00B894"/>

  <!-- Layer 2: Spec clipboard card (main object) -->
  <!-- Clipboard top clip -->
  <rect x="380" y="132" width="264" height="80" rx="20" fill="#2D3436" stroke="#FFFFFF" stroke-width="12"/>
  <rect x="460" y="148" width="104" height="48" rx="12" fill="#636E72"/>

  <!-- Card body -->
  <rect x="180" y="180" width="664" height="700" rx="32" fill="#FFFFFF" stroke="#2D3436" stroke-width="14"/>

  <!-- Card header -->
  <rect x="180" y="180" width="664" height="72" rx="32" fill="#2D3436"/>
  <rect x="180" y="210" width="664" height="42" rx="0" fill="#2D3436"/>
  <text x="512" y="228" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="900" fill="#00B894">Hardware Spec</text>

  <!-- Row 1: CPU -->
  <rect x="202" y="264" width="620" height="80" rx="14" fill="#FFF3F0"/>
  <circle cx="254" cy="304" r="28" fill="#E17055"/>
  <text x="254" y="316" text-anchor="middle" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="32" fill="#FFFFFF">🖥</text>
  <text x="300" y="298" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#E17055">CPU</text>
  <text x="300" y="334" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#636E72">Intel Core i9-14900K</text>

  <!-- Row 2: GPU -->
  <rect x="202" y="356" width="620" height="80" rx="14" fill="#F3F0FF"/>
  <circle cx="254" cy="396" r="28" fill="#6C5CE7"/>
  <text x="254" y="408" text-anchor="middle" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="32" fill="#FFFFFF">🎮</text>
  <text x="300" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#6C5CE7">GPU</text>
  <text x="300" y="426" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#636E72">NVIDIA RTX 4080</text>

  <!-- Row 3: RAM -->
  <rect x="202" y="448" width="620" height="80" rx="14" fill="#F0FFF9"/>
  <circle cx="254" cy="488" r="28" fill="#00B894"/>
  <text x="300" y="482" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#00834D">RAM</text>
  <text x="300" y="518" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#636E72">DDR5 32 GB  6400MHz</text>

  <!-- Row 4: SSD -->
  <rect x="202" y="540" width="620" height="80" rx="14" fill="#FFFBF0"/>
  <circle cx="254" cy="580" r="28" fill="#F9CA24"/>
  <text x="300" y="574" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#CC9900">SSD</text>
  <text x="300" y="610" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#636E72">Samsung 990 Pro 2TB</text>

  <!-- Row 5: NET -->
  <rect x="202" y="632" width="620" height="80" rx="14" fill="#FFF0F7"/>
  <circle cx="254" cy="672" r="28" fill="#FD79A8"/>
  <text x="300" y="666" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#CC3377">NET</text>
  <text x="300" y="702" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#636E72">2.5 GbE  +  WiFi 7</text>

  <!-- Layer 3: Export button at bottom of card -->
  <rect x="322" y="738" width="380" height="64" rx="20" fill="#2D3436" stroke="#FFFFFF" stroke-width="8"/>
  <text x="512" y="780" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">📋 Export Report</text>
</svg>
