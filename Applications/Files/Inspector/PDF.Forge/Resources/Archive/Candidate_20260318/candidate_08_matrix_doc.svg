<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#160804"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Matrix code rain (vertical streams of data) -->
  <!-- Column 1 -->
  <rect x="40" y="30" width="14" height="180" rx="4" fill="#F97316" fill-opacity="0.6" filter="url(#softglow)"/>
  <rect x="40" y="220" width="14" height="80" rx="4" fill="#F97316" fill-opacity="0.3"/>
  <rect x="40" y="315" width="14" height="120" rx="4" fill="#EF4444" fill-opacity="0.2"/>

  <!-- Column 2 -->
  <rect x="68" y="80" width="14" height="220" rx="4" fill="#EF4444" fill-opacity="0.5" filter="url(#softglow)"/>
  <rect x="68" y="315" width="14" height="100" rx="4" fill="#EF4444" fill-opacity="0.25"/>

  <!-- Column 3 -->
  <rect x="96" y="40" width="14" height="140" rx="4" fill="#F97316" fill-opacity="0.45"/>
  <rect x="96" y="195" width="14" height="200" rx="4" fill="#EF4444" fill-opacity="0.35" filter="url(#softglow)"/>
  <rect x="96" y="410" width="14" height="70" rx="4" fill="#F97316" fill-opacity="0.2"/>

  <!-- Column 4 -->
  <rect x="124" y="60" width="14" height="250" rx="4" fill="#DC2626" fill-opacity="0.4"/>
  <rect x="124" y="325" width="14" height="150" rx="4" fill="#F97316" fill-opacity="0.3"/>

  <!-- Column 5 -->
  <rect x="152" y="30" width="14" height="100" rx="4" fill="#F97316" fill-opacity="0.55" filter="url(#softglow)"/>
  <rect x="152" y="145" width="14" height="280" rx="4" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="152" y="440" width="14" height="50" rx="4" fill="#F97316" fill-opacity="0.2"/>

  <!-- Right columns (more sparse, background feel) -->
  <rect x="358" y="50" width="14" height="190" rx="4" fill="#F97316" fill-opacity="0.4"/>
  <rect x="358" y="255" width="14" height="120" rx="4" fill="#EF4444" fill-opacity="0.25"/>
  <rect x="386" y="90" width="14" height="230" rx="4" fill="#EF4444" fill-opacity="0.35" filter="url(#softglow)"/>
  <rect x="414" y="40" width="14" height="170" rx="4" fill="#F97316" fill-opacity="0.4"/>
  <rect x="414" y="225" width="14" height="200" rx="4" fill="#DC2626" fill-opacity="0.25"/>
  <rect x="442" y="70" width="14" height="260" rx="4" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="442" y="345" width="14" height="120" rx="4" fill="#F97316" fill-opacity="0.2"/>
  <rect x="470" y="30" width="14" height="150" rx="4" fill="#F97316" fill-opacity="0.45" filter="url(#softglow)"/>
  <rect x="470" y="195" width="14" height="180" rx="4" fill="#EF4444" fill-opacity="0.3"/>

  <!-- Central document emerging from matrix -->
  <rect x="175" y="100" width="162" height="310" rx="8" fill="#120606" stroke="#F97316" stroke-width="3" stroke-opacity="0.9" filter="url(#glow)"/>
  <!-- Doc corner fold -->
  <polygon points="306,100 337,100 337,131" fill="#0a0304" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="306" y1="100" x2="337" y2="131" stroke="#F97316" stroke-width="2" stroke-opacity="0.7"/>

  <!-- PDF label -->
  <rect x="190" y="120" width="55" height="16" rx="8" fill="#F97316" fill-opacity="0.6" filter="url(#softglow)"/>

  <!-- Document content (matrix code inside) -->
  <g fill="#F97316" fill-opacity="0.4">
    <rect x="192" y="148" width="8" height="12" rx="2"/>
    <rect x="204" y="148" width="8" height="12" rx="2"/>
    <rect x="216" y="148" width="8" height="12" rx="2"/>
    <rect x="228" y="148" width="8" height="12" rx="2"/>
    <rect x="240" y="148" width="8" height="12" rx="2"/>
    <rect x="252" y="148" width="8" height="12" rx="2"/>
    <rect x="264" y="148" width="8" height="12" rx="2"/>
    <rect x="276" y="148" width="8" height="12" rx="2"/>
    <rect x="288" y="148" width="8" height="12" rx="2"/>
    <rect x="300" y="148" width="8" height="12" rx="2"/>
    <rect x="312" y="148" width="8" height="12" rx="2"/>
  </g>
  <!-- Bright line (current writing) -->
  <rect x="190" y="168" width="140" height="3" rx="1.5" fill="#F97316" fill-opacity="0.8" filter="url(#glow)"/>
  <!-- More code lines -->
  <g fill="#EF4444" fill-opacity="0.35">
    <rect x="192" y="178" width="8" height="10" rx="2"/>
    <rect x="216" y="178" width="8" height="10" rx="2"/>
    <rect x="240" y="178" width="8" height="10" rx="2"/>
    <rect x="264" y="178" width="8" height="10" rx="2"/>
    <rect x="300" y="178" width="8" height="10" rx="2"/>
    <rect x="324" y="178" width="8" height="10" rx="2"/>
  </g>
  <rect x="190" y="196" width="140" height="2" rx="1" fill="#F97316" fill-opacity="0.4" filter="url(#softglow)"/>
  <g fill="#F97316" fill-opacity="0.3">
    <rect x="192" y="205" width="8" height="10" rx="2"/>
    <rect x="204" y="205" width="8" height="10" rx="2"/>
    <rect x="228" y="205" width="8" height="10" rx="2"/>
    <rect x="252" y="205" width="8" height="10" rx="2"/>
    <rect x="276" y="205" width="8" height="10" rx="2"/>
    <rect x="288" y="205" width="8" height="10" rx="2"/>
    <rect x="312" y="205" width="8" height="10" rx="2"/>
  </g>
  <!-- Lower section content bars -->
  <rect x="190" y="230" width="140" height="6" rx="3" fill="#F97316" fill-opacity="0.5"/>
  <rect x="190" y="244" width="120" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="190" y="257" width="135" height="5" rx="2.5" fill="#F97316" fill-opacity="0.45"/>
  <rect x="190" y="270" width="100" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="190" y="295" width="140" height="6" rx="3" fill="#F97316" fill-opacity="0.5"/>
  <rect x="190" y="309" width="115" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="190" y="322" width="130" height="5" rx="2.5" fill="#F97316" fill-opacity="0.4"/>
  <rect x="190" y="347" width="140" height="5" rx="2.5" fill="#F97316" fill-opacity="0.45"/>
  <rect x="190" y="360" width="110" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.35"/>
  <rect x="190" y="373" width="125" height="5" rx="2.5" fill="#F97316" fill-opacity="0.4"/>
  <rect x="190" y="386" width="140" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.3"/>
</svg>
