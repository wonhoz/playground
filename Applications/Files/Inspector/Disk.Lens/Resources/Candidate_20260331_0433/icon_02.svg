<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 청록 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: HDD 실린더 -->
  <ellipse cx="420" cy="360" rx="240" ry="60" fill="#90A4AE"/>
  <rect x="180" y="360" width="480" height="320" fill="#78909C"/>
  <ellipse cx="420" cy="680" rx="240" ry="60" fill="#607D8B"/>
  <!-- HDD 플래터 줄무늬 -->
  <ellipse cx="420" cy="360" rx="180" ry="44" fill="none" stroke="#B0BEC5" stroke-width="8"/>
  <ellipse cx="420" cy="360" rx="120" ry="30" fill="none" stroke="#B0BEC5" stroke-width="6"/>
  <ellipse cx="420" cy="360" rx="60" ry="16" fill="#CFD8DC"/>
  <!-- Layer 3: 돋보기 렌즈 -->
  <circle cx="680" cy="640" r="240" fill="none" stroke="#0097A7" stroke-width="40"/>
  <circle cx="680" cy="640" r="180" fill="#E0F7FA" opacity="0.5"/>
  <!-- 렌즈 안 용량 수치 -->
  <text x="680" y="610" font-family="'Segoe UI', sans-serif" font-weight="900" font-size="88" fill="#006064" text-anchor="middle">78</text>
  <text x="680" y="686" font-family="'Segoe UI', sans-serif" font-size="56" fill="#00838F" text-anchor="middle">GB used</text>
  <!-- 돋보기 손잡이 -->
  <line x1="876" y1="836" x2="960" y2="920" stroke="#0097A7" stroke-width="48" stroke-linecap="round"/>
  <!-- 렌즈 반사 -->
  <ellipse cx="610" cy="570" rx="48" ry="32" fill="white" opacity="0.4" transform="rotate(-25 610 570)"/>
</svg>
