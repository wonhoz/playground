<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001219"/>
      <stop offset="100%" stop-color="#005F73"/>
    </linearGradient>
    <linearGradient id="cam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A9396"/>
      <stop offset="100%" stop-color="#005F73"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="100" y="160" width="312" height="220" rx="20" fill="url(#cam)"/>
  <!-- Camera bump top -->
  <rect x="190" y="130" width="80" height="36" rx="12" fill="#0A9396"/>
  <!-- Lens ring -->
  <circle cx="256" cy="270" r="82" fill="#001219"/>
  <circle cx="256" cy="270" r="70" fill="#0A3D40"/>
  <circle cx="256" cy="270" r="55" fill="#001219"/>
  <!-- Lens reflection highlight -->
  <ellipse cx="238" cy="252" rx="18" ry="12" fill="#94D2BD" opacity="0.3" transform="rotate(-30 238 252)"/>
  <!-- Pixel mosaic overlay on lens -->
  <rect x="220" y="250" width="16" height="16" rx="2" fill="#94D2BD" opacity="0.6"/>
  <rect x="240" y="250" width="16" height="16" rx="2" fill="#0A9396" opacity="0.8"/>
  <rect x="260" y="250" width="16" height="16" rx="2" fill="#94D2BD" opacity="0.6"/>
  <rect x="220" y="270" width="16" height="16" rx="2" fill="#0A9396" opacity="0.8"/>
  <rect x="240" y="270" width="16" height="16" rx="2" fill="#E9D8A6" opacity="0.7"/>
  <rect x="260" y="270" width="16" height="16" rx="2" fill="#0A9396" opacity="0.8"/>
  <rect x="220" y="290" width="16" height="16" rx="2" fill="#94D2BD" opacity="0.6"/>
  <rect x="240" y="290" width="16" height="16" rx="2" fill="#0A9396" opacity="0.8"/>
  <rect x="260" y="290" width="16" height="16" rx="2" fill="#94D2BD" opacity="0.6"/>
  <!-- Flash -->
  <circle cx="370" cy="200" r="18" fill="#E9D8A6" opacity="0.8"/>
  <!-- Shutter button -->
  <circle cx="380" cy="180" r="14" fill="#001219"/>
  <!-- Title -->
  <text x="256" y="435" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#94D2BD">MOSAIC.FORGE</text>
</svg>