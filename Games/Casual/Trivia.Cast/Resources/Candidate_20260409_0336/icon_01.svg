<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <clipPath id="c1"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Sky blue background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g1)"/>
  <g clip-path="url(#c1)">
    <!-- Layer 2: Question mark speech bubble (center-top) -->
    <rect x="212" y="160" width="500" height="400" rx="40" fill="white"/>
    <!-- Bubble tail pointing down -->
    <polygon points="340,556 440,556 390,640" fill="white"/>
    <!-- Large "?" inside bubble -->
    <text x="462" y="460" font-family="Arial Black,Arial,sans-serif" font-size="280" fill="#0284C7" font-weight="900" text-anchor="middle">?</text>
    <!-- Layer 3: A B C D answer buttons (bottom row) -->
    <rect x="100" y="680" width="180" height="100" rx="18" fill="#0369A1"/>
    <text x="190" y="748" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">A</text>
    <rect x="296" y="680" width="180" height="100" rx="18" fill="#0891B2"/>
    <text x="386" y="748" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">B</text>
    <rect x="492" y="680" width="180" height="100" rx="18" fill="#059669"/>
    <text x="582" y="748" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">C</text>
    <rect x="688" y="680" width="180" height="100" rx="18" fill="#7C3AED"/>
    <text x="778" y="748" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="white" font-weight="900" text-anchor="middle">D</text>
    <!-- "TRIVIA" label -->
    <text x="512" y="868" font-family="Arial Black,Arial,sans-serif" font-size="84" fill="#0C4A6E" font-weight="900" text-anchor="middle">TRIVIA</text>
  </g>
</svg>
