  <text x="190" y="175" font-family="sans-serif" font-size="24" fill="#ffcc44">search</text>
  <text x="340" y="185" font-family="sans-serif" font-size="16" fill="#88aaff">bell</text>
  <text x="410" y="160" font-family="sans-serif" font-size="22" fill="#ff8844">mail</text>
  <text x="70" y="230" font-family="sans-serif" font-size="26" fill="#ff44aa">user</text>
  <text x="170" y="240" font-family="sans-serif" font-size="16" fill="#44ffcc">download</text>
