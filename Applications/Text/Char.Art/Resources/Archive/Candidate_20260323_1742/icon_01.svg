<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A0A"/>
  <!-- Layer 2: 고양이 실루엣 = ASCII 문자로 구성 -->
  <!-- 고양이 몸 (초록 문자 격자로 표현) -->
  <!-- 귀 왼쪽 -->
  <text x="180" y="160" font-size="40" fill="#00FF41" font-family="monospace">/\</text>
  <!-- 귀 오른쪽 -->
  <text x="620" y="160" font-size="40" fill="#00FF41" font-family="monospace">/\</text>
  <!-- 머리 줄 1 -->
  <text x="160" y="200" font-size="36" fill="#00FF41" font-family="monospace">/@@@@@@@@@@\</text>
  <!-- 머리 줄 2 (눈) -->
  <text x="160" y="238" font-size="36" fill="#00FF41" font-family="monospace">| O       O |</text>
  <!-- 머리 줄 3 (코) -->
  <text x="160" y="276" font-size="36" fill="#00FF41" font-family="monospace">|     ^     |</text>
  <!-- 머리 줄 4 (수염) -->
  <text x="160" y="314" font-size="36" fill="#00FF41" font-family="monospace">|  ---V---  |</text>
  <!-- 머리 하단 -->
  <text x="160" y="352" font-size="36" fill="#00FF41" font-family="monospace">\__________/</text>
  <!-- 몸통 줄들 -->
  <text x="200" y="400" font-size="36" fill="#00FF41" font-family="monospace">  /@@@@@@@@\  </text>
  <text x="200" y="438" font-size="36" fill="#00FF41" font-family="monospace"> /@@@@@@@@@@ \</text>
  <text x="200" y="476" font-size="36" fill="#00FF41" font-family="monospace"> \@@@@@@@@@@ /</text>
  <text x="200" y="514" font-size="36" fill="#00FF41" font-family="monospace">  \@@@@@@@@/  </text>
  <!-- 다리들 -->
  <text x="200" y="558" font-size="36" fill="#00FF41" font-family="monospace"> /|  |    |\ </text>
  <text x="200" y="596" font-size="36" fill="#00FF41" font-family="monospace"> \|  |    |/ </text>
  <!-- 꼬리 -->
  <text x="760" y="480" font-size="36" fill="#00FF41" font-family="monospace">~\</text>
  <text x="780" y="440" font-size="36" fill="#00FF41" font-family="monospace">  \</text>
  <text x="796" y="400" font-size="36" fill="#00FF41" font-family="monospace">  /</text>
  <text x="780" y="360" font-size="36" fill="#00FF41" font-family="monospace"> /</text>
  <!-- Layer 3: 문자셋 힌트 -->
  <text x="512" y="730" font-size="52" fill="#006600" text-anchor="middle" font-family="monospace">charset: @/\|^~ O</text>
  <text x="512" y="800" font-size="36" fill="#004400" text-anchor="middle" font-family="monospace">80 columns · Consolas 8pt</text>
  <rect x="80" y="860" width="864" height="60" rx="8" fill="#001400"/>
  <text x="512" y="900" font-size="36" fill="#00FF41" text-anchor="middle" font-family="monospace">█ Char.Art  ▌</text>
</svg>
