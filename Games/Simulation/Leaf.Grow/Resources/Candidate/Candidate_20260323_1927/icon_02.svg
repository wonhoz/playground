  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_lg02)"/>
  <!-- 성장 단계 화살표 선 (배경) -->
  <path d="M 230,600 Q 512,580 784,540" fill="none" stroke="white" stroke-width="10" stroke-dasharray="20 15" opacity="0.5" stroke-linecap="round"/>
  <!-- 단계 1: 씨앗 (왼쪽) -->
  <!-- 흙 -->
  <ellipse cx="280" cy="700" rx="100" ry="35" fill="#92400E"/>
  <ellipse cx="280" cy="695" rx="85" ry="25" fill="#A16207" opacity="0.7"/>
