<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Typewriter body -->
  <rect x="80" y="170" width="352" height="200" rx="16" fill="#222" stroke="#444" stroke-width="2.5"/>
  <!-- Paper -->
  <rect x="140" y="90" width="232" height="100" rx="4" fill="#F5F5DC" stroke="#CCC" stroke-width="1.5"/>
  <!-- Text on paper -->
  <text x="256" y="118" font-family="monospace" font-size="13" fill="#222" text-anchor="middle">Hello, World!</text>
  <text x="256" y="136" font-family="monospace" font-size="13" fill="#222" text-anchor="middle">  (\(\)  (\(\)</text>
  <text x="256" y="154" font-family="monospace" font-size="13" fill="#222" text-anchor="middle">  (._.)/  (._.)</text>
  <!-- Paper roll -->
  <rect x="140" y="168" width="232" height="12" rx="2" fill="#DDD"/>
  <!-- Keys grid -->
  <rect x="108" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="144" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="180" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="216" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="252" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="288" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="324" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="360" y="208" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="126" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="162" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="198" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="234" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="270" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="306" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <rect x="342" y="240" width="28" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- Space bar -->
  <rect x="162" y="272" width="188" height="22" rx="5" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- ASCII text below -->
  <text x="256" y="416" font-family="monospace" font-size="18" fill="#DDAA44" text-anchor="middle">ASCII / Unicode Art</text>
  <text x="256" y="462" font-family="Arial" font-size="26" font-weight="bold" fill="#DDAA44" text-anchor="middle">Char.Art</text>
</svg>
