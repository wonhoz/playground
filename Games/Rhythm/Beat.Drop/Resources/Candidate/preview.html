<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Beat.Drop - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; color: #aaa; margin-bottom: 24px; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; background: #111; }
  .item span { font-size: 0.72rem; color: #888; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Beat.Drop — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_purple_wave.svg"><span>01 Purple Wave</span></div>
  <div class="item"><img src="candidate_02_neon_equalizer.svg"><span>02 Neon Equalizer</span></div>
  <div class="item"><img src="candidate_03_red_heartbeat.svg"><span>03 Red Heartbeat</span></div>
  <div class="item"><img src="candidate_04_gold_vinyl.svg"><span>04 Gold Vinyl</span></div>
  <div class="item"><img src="candidate_05_cyan_ripple.svg"><span>05 Cyan Ripple</span></div>
  <div class="item"><img src="candidate_06_fire_beat.svg"><span>06 Fire Beat</span></div>
  <div class="item"><img src="candidate_07_rainbow_spectrum.svg"><span>07 Rainbow Spectrum</span></div>
  <div class="item"><img src="candidate_08_green_matrix.svg"><span>08 Green Matrix</span></div>
  <div class="item"><img src="candidate_09_pink_disco.svg"><span>09 Pink Disco</span></div>
  <div class="item"><img src="candidate_10_white_minimal.svg"><span>10 White Minimal</span></div>
</div>
</body>
</html>
