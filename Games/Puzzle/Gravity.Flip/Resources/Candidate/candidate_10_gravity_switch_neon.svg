<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0030"/>
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0050ff"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00c8"/>
      <stop offset="100%" style="stop-color:#ff6f00"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongneon" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon grid floor (normal gravity side) -->
  <line x1="60" y1="390" x2="452" y2="390" stroke="#00f0ff40" stroke-width="1.5"/>
  <line x1="100" y1="390" x2="256" y2="256" stroke="#00f0ff20" stroke-width="1"/>
  <line x1="200" y1="390" x2="256" y2="256" stroke="#00f0ff20" stroke-width="1"/>
  <line x1="300" y1="390" x2="256" y2="256" stroke="#00f0ff20" stroke-width="1"/>
  <line x1="400" y1="390" x2="256" y2="256" stroke="#00f0ff20" stroke-width="1"/>
  <!-- Neon grid ceiling (reversed gravity side) -->
  <line x1="60" y1="122" x2="452" y2="122" stroke="#ff00c840" stroke-width="1.5"/>
  <line x1="100" y1="122" x2="256" y2="256" stroke="#ff00c820" stroke-width="1"/>
  <line x1="200" y1="122" x2="256" y2="256" stroke="#ff00c820" stroke-width="1"/>
  <line x1="300" y1="122" x2="256" y2="256" stroke="#ff00c820" stroke-width="1"/>
  <line x1="400" y1="122" x2="256" y2="256" stroke="#ff00c820" stroke-width="1"/>
  <!-- Player (neon blue) falling down normally -->
  <rect x="140" y="330" width="44" height="52" rx="10" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#neon)"/>
  <circle cx="162" cy="320" r="16" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#neon)"/>
  <!-- Player (neon pink) stuck to ceiling -->
  <rect x="328" y="132" width="44" height="52" rx="10" fill="none" stroke="#ff00c8" stroke-width="3" filter="url(#neon)"/>
  <circle cx="350" cy="194" r="16" fill="none" stroke="#ff00c8" stroke-width="3" filter="url(#neon)"/>
  <!-- Central switch symbol -->
  <circle cx="256" cy="256" r="46" fill="#1a0030" stroke="#ffffff30" stroke-width="2"/>
  <!-- Neon lightning bolt (switch) -->
  <polygon points="256,220 235,258 252,258 248,292 277,250 260,250 270,220" fill="url(#neonBlue)" filter="url(#strongneon)"/>
  <!-- Neon corner accents -->
  <line x1="70" y1="70" x2="100" y2="70" stroke="#00f0ff" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="70" y1="70" x2="70" y2="100" stroke="#00f0ff" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="442" y1="70" x2="412" y2="70" stroke="#ff00c8" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="442" y1="70" x2="442" y2="100" stroke="#ff00c8" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="70" y1="442" x2="100" y2="442" stroke="#ff00c8" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="70" y1="442" x2="70" y2="412" stroke="#ff00c8" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="442" y1="442" x2="412" y2="442" stroke="#00f0ff" stroke-width="2.5" filter="url(#neon)"/>
  <line x1="442" y1="442" x2="442" y2="412" stroke="#00f0ff" stroke-width="2.5" filter="url(#neon)"/>
</svg>
