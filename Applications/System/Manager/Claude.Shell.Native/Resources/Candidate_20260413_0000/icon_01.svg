<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal · 중앙심볼 · 컨텍스트 메뉴 + 하이라이트 항목 -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE0B2"/>
      <stop offset="1" stop-color="#FFA726"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg01)"/>
  <!-- 우클릭 메뉴 패널 -->
  <rect x="160" y="190" width="704" height="644" rx="32" fill="#FFFFFF" stroke="#3E2723" stroke-width="16"/>
  <!-- 헤더 -->
  <rect x="160" y="190" width="704" height="90" rx="32" fill="#3E2723"/>
  <rect x="160" y="260" width="704" height="30" fill="#3E2723"/>
  <text x="200" y="252" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF">context menu</text>
  <!-- 항목들 -->
  <g font-family="Consolas, monospace" font-weight="700">
    <rect x="180" y="310" width="664" height="80" rx="14" fill="#F5F5F5"/>
    <text x="220" y="366" font-size="48" fill="#616161">Open in Explorer</text>
    <rect x="180" y="398" width="664" height="80" rx="14" fill="#F5F5F5"/>
    <text x="220" y="454" font-size="48" fill="#616161">Open with VSCode</text>
    <!-- 하이라이트 항목 -->
    <rect x="180" y="486" width="664" height="90" rx="14" fill="#FFD93D" stroke="#E65100" stroke-width="6"/>
    <circle cx="230" cy="531" r="22" fill="#E65100"/>
    <text x="270" y="548" font-size="52" fill="#3E2723">Open Claude Code</text>
    <rect x="180" y="584" width="664" height="80" rx="14" fill="#F5F5F5"/>
    <text x="220" y="640" font-size="48" fill="#616161">Open Claude (danger)</text>
