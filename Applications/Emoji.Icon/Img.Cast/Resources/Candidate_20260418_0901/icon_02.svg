<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 따뜻한 코랄 배경 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FFE08A"/>
    </linearGradient>
    <linearGradient id="zone02" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: 드롭 존 UI -->
  <rect x="120" y="180" width="784" height="480" rx="36" fill="url(#zone02)" stroke="#FFFFFF" stroke-width="10" stroke-dasharray="28 18"/>

  <!-- 드롭 화살표 아이콘 -->
  <path d="M512 290 L512 490" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round"/>
  <path d="M370 400 L512 490 L654 400" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Layer 3: 포맷 변환 레이블 -->
  <rect x="120" y="710" width="224" height="110" rx="22" fill="#FFFFFF" opacity="0.9"/>
  <text x="232" y="782" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="84" fill="#FF6B6B" text-anchor="middle">PNG</text>

  <!-- 화살표 -->
  <path d="M360 765 L530 765" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round"/>
  <path d="M490 720 L560 765 L490 810" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <rect x="560" y="710" width="224" height="110" rx="22" fill="#1E3A5F" opacity="0.85"/>
  <text x="672" y="782" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="84" fill="#FFE08A" text-anchor="middle">ICO</text>

  <!-- + BMP -->
  <text x="820" y="782" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">…</text>
</svg>
