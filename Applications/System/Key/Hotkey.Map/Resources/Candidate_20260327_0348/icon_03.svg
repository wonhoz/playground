<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright mint/teal -->
  <rect width="1024" height="1024" rx="190" fill="#1ABC9C"/>

  <!-- Layer 2: Map pin shape (teardrop) in white -->
  <!-- Pin body -->
  <path d="M512 140 C360 140 248 262 248 410 C248 590 512 860 512 860 C512 860 776 590 776 410 C776 262 664 140 512 140Z" fill="#FFFFFF" stroke="#0E8A6E" stroke-width="20"/>

  <!-- Pin inner circle -->
  <circle cx="512" cy="410" r="180" fill="#F0FDFB" stroke="#1ABC9C" stroke-width="16"/>

  <!-- Inside pin: 2x2 key grid (small but bold) -->
  <!-- Key 1: green -->
  <rect x="362" y="296" width="120" height="100" rx="16" fill="#2ECC71" stroke="#FFFFFF" stroke-width="8"/>
  <text x="422" y="356" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="900" fill="#FFFFFF">C</text>

  <!-- Key 2: red -->
  <rect x="502" y="296" width="120" height="100" rx="16" fill="#E74C3C" stroke="#FFFFFF" stroke-width="8"/>
  <text x="562" y="356" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="900" fill="#FFFFFF">A</text>

  <!-- Key 3: green -->
  <rect x="362" y="414" width="120" height="100" rx="16" fill="#27AE60" stroke="#FFFFFF" stroke-width="8"/>
  <text x="422" y="474" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="900" fill="#FFFFFF">S</text>

  <!-- Key 4: orange -->
  <rect x="502" y="414" width="120" height="100" rx="16" fill="#E67E22" stroke="#FFFFFF" stroke-width="8"/>
  <text x="562" y="474" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="900" fill="#FFFFFF">W</text>

  <!-- Layer 3: ".Map" label on pin tail bottom area -->
  <text x="512" y="936" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">Hotkey.Map</text>
</svg>
