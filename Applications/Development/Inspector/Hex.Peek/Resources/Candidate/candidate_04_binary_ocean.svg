<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#spotlight)"/>
  <!-- Binary rain background -->
  <text x="68" y="90" font-family="monospace" font-size="13" fill="#005580" opacity="0.5">01101101 01011010</text>
  <text x="68" y="110" font-family="monospace" font-size="13" fill="#004466" opacity="0.4">10010000 00000000</text>
  <text x="68" y="130" font-family="monospace" font-size="13" fill="#005580" opacity="0.3">00000011 00000000</text>
  <text x="68" y="410" font-family="monospace" font-size="13" fill="#005580" opacity="0.4">11111111 11111111</text>
  <text x="68" y="430" font-family="monospace" font-size="13" fill="#004466" opacity="0.3">00000000 00000000</text>
  <!-- Central document with hex bytes -->
  <rect x="96" y="148" width="320" height="216" rx="16" fill="#002a4d" stroke="#0099cc" stroke-width="2"/>
  <!-- File icon ear -->
  <polygon points="356,148 396,148 396,178 356,178" fill="#002a4d" stroke="#0099cc" stroke-width="2"/>
  <polygon points="356,148 396,178 356,178" fill="#0099cc" opacity="0.4"/>
  <!-- Hex rows -->
  <text x="112" y="186" font-family="monospace" font-size="18" fill="#00e5ff" font-weight="bold">4D 5A</text>
  <text x="220" y="186" font-family="monospace" font-size="18" fill="#0099cc">90 00</text>
  <text x="328" y="186" font-family="monospace" font-size="18" fill="#007ab3">03 00</text>
  <text x="112" y="216" font-family="monospace" font-size="18" fill="#0099cc">B8 00</text>
  <text x="220" y="216" font-family="monospace" font-size="18" fill="#00e5ff" font-weight="bold">FF FF</text>
  <text x="328" y="216" font-family="monospace" font-size="18" fill="#0099cc">00 00</text>
  <text x="112" y="246" font-family="monospace" font-size="18" fill="#007ab3">40 00</text>
  <text x="220" y="246" font-family="monospace" font-size="18" fill="#0099cc">00 00</text>
  <text x="328" y="246" font-family="monospace" font-size="18" fill="#00e5ff" font-weight="bold">E8 00</text>
  <!-- Highlighted selection -->
  <rect x="108" y="254" width="210" height="26" rx="4" fill="#00aaff" opacity="0.2"/>
  <rect x="108" y="254" width="210" height="26" rx="4" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <text x="112" y="272" font-family="monospace" font-size="18" fill="#00e5ff" font-weight="bold">0E 1F</text>
  <text x="220" y="272" font-family="monospace" font-size="18" fill="#00e5ff" font-weight="bold">BA 0E</text>
  <text x="112" y="302" font-family="monospace" font-size="18" fill="#007ab3">00 B4</text>
  <text x="220" y="302" font-family="monospace" font-size="18" fill="#0099cc">09 CD</text>
  <text x="328" y="302" font-family="monospace" font-size="18" fill="#00e5ff">21 B8</text>
  <!-- Search bar at bottom -->
  <rect x="96" y="384" width="320" height="44" rx="22" fill="#002a4d" stroke="#0099cc" stroke-width="2"/>
  <circle cx="120" cy="406" r="12" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
  <line x1="128" y1="414" x2="137" y2="423" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="148" y="412" font-family="monospace" font-size="15" fill="#00aaff">Search bytes...</text>
</svg>
