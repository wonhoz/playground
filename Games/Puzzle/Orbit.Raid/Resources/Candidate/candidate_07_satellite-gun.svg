<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020210"/>
      <stop offset="100%" stop-color="#08081c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="380" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="450" cy="300" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="70" cy="400" r="1" fill="white" opacity="0.5"/>
  <!-- Orbital path -->
  <ellipse cx="256" cy="280" rx="160" ry="60" fill="none" stroke="#1a2266" stroke-width="2"/>
  <!-- Planet -->
  <circle cx="256" cy="280" r="60" fill="#1a1a55" stroke="#3344aa" stroke-width="2"/>
  <path d="M215,268 Q256,256 297,272" fill="none" stroke="#2233aa" stroke-width="4" opacity="0.6"/>
  <!-- Satellite weapon on orbit -->
  <g transform="translate(390, 248)">
    <rect x="-20" y="-10" width="40" height="20" rx="5" fill="#445577"/>
    <rect x="-30" y="-5" width="14" height="10" rx="2" fill="#aaaaff"/>
    <rect x="16" y="-5" width="14" height="10" rx="2" fill="#aaaaff"/>
    <rect x="18" y="-3" width="18" height="6" rx="2" fill="#ff4444"/>
  </g>
  <!-- Laser beam -->
  <line x1="408" y1="248" x2="300" y2="268" stroke="#ff4444" stroke-width="3" opacity="0.8"/>
  <circle cx="300" cy="268" r="8" fill="#ff8800" opacity="0.7"/>
  <!-- Another satellite (friendly) -->
  <g transform="translate(144, 252)">
    <rect x="-15" y="-8" width="30" height="16" rx="4" fill="#224455"/>
    <rect x="-22" y="-4" width="10" height="8" rx="2" fill="#44aaff"/>
    <rect x="12" y="-4" width="10" height="8" rx="2" fill="#44aaff"/>
  </g>
  <!-- Defense shot from friendly -->
  <line x1="144" y1="252" x2="390" y2="248" stroke="#44ffcc" stroke-width="2" stroke-dasharray="10,6" opacity="0.6"/>
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#4466ff">ORBIT.RAID</text>
</svg>
