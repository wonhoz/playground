<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#122540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <line x1="0" y1="64" x2="512" y2="64" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="128" x2="512" y2="128" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="192" x2="512" y2="192" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="320" x2="512" y2="320" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="448" x2="512" y2="448" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="64" y1="0" x2="64" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="192" y1="0" x2="192" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="320" y1="0" x2="320" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <line x1="448" y1="0" x2="448" y2="512" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  <!-- Keyboard body -->
  <rect x="48" y="176" width="416" height="200" rx="16" fill="#0d2040" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Row 1: function-like keys -->
  <rect x="64" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="213" font-family="monospace" font-size="11" fill="#60a5fa">Ctrl</text>
  <rect x="106" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="114" y="213" font-family="monospace" font-size="11" fill="#93c5fd" font-weight="bold">Alt</text>
  <!-- Highlighted key combo -->
  <rect x="148" y="192" width="36" height="32" rx="5" fill="#3b82f6" opacity="0.8"/>
  <text x="156" y="213" font-family="monospace" font-size="11" fill="white" font-weight="bold">Shift</text>
  <rect x="190" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="202" y="213" font-family="monospace" font-size="14" fill="#60a5fa">A</text>
  <rect x="232" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="244" y="213" font-family="monospace" font-size="14" fill="#60a5fa">S</text>
  <rect x="274" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="286" y="213" font-family="monospace" font-size="14" fill="#60a5fa">D</text>
  <rect x="316" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="328" y="213" font-family="monospace" font-size="14" fill="#60a5fa">F</text>
  <rect x="358" y="192" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="213" font-family="monospace" font-size="14" fill="#60a5fa">G</text>
  <rect x="400" y="192" width="60" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="412" y="213" font-family="monospace" font-size="11" fill="#60a5fa">Enter</text>
  <!-- Row 2 -->
  <rect x="64" y="232" width="52" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="74" y="253" font-family="monospace" font-size="11" fill="#60a5fa">Tab</text>
  <rect x="122" y="232" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="134" y="253" font-family="monospace" font-size="14" fill="#60a5fa">Q</text>
  <rect x="164" y="232" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="176" y="253" font-family="monospace" font-size="14" fill="#60a5fa">W</text>
  <rect x="206" y="232" width="36" height="32" rx="5" fill="#3b82f6" opacity="0.6"/>
  <text x="218" y="253" font-family="monospace" font-size="14" fill="white" font-weight="bold">E</text>
  <rect x="248" y="232" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="253" font-family="monospace" font-size="14" fill="#60a5fa">R</text>
  <rect x="290" y="232" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="302" y="253" font-family="monospace" font-size="14" fill="#60a5fa">T</text>
  <rect x="332" y="232" width="36" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="344" y="253" font-family="monospace" font-size="14" fill="#60a5fa">Y</text>
  <rect x="374" y="232" width="86" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="394" y="253" font-family="monospace" font-size="11" fill="#60a5fa">Backspace</text>
  <!-- Spacebar row -->
  <rect x="64" y="272" width="60" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="293" font-family="monospace" font-size="10" fill="#60a5fa">CapsLock</text>
  <rect x="130" y="272" width="220" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="293" font-family="monospace" font-size="10" fill="#60a5fa">Space</text>
  <rect x="356" y="272" width="104" height="32" rx="5" fill="url(#key)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="293" font-family="monospace" font-size="11" fill="#60a5fa">Windows</text>
  <!-- Connection arrows between highlighted keys -->
  <line x1="166" y1="172" x2="166" y2="192" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="166" y1="172" x2="215" y2="172" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="215" y1="172" x2="215" y2="192" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Labels above highlighted keys -->
  <rect x="140" y="152" width="90" height="20" rx="4" fill="#1e3a5f"/>
  <text x="148" y="166" font-family="monospace" font-size="11" fill="#93c5fd">Hotkey #1</text>
</svg>
