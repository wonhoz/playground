<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#0A0000"/>
    </radialGradient>
    <linearGradient id="swing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
    <radialGradient id="impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEE00"/>
      <stop offset="50%" stop-color="#FF8800" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Power impact flash -->
  <circle cx="330" cy="330" r="80" fill="url(#impact)"/>
  <!-- Club shaft (backswing) -->
  <line x1="180" y1="100" x2="340" y2="340" stroke="url(#swing)" stroke-width="10" stroke-linecap="round"/>
  <!-- Club head -->
  <rect x="320" y="320" width="40" height="30" rx="5" fill="#FF6600" transform="rotate(40 340 335)"/>
  <!-- Swing arc lines -->
  <path d="M160 90 Q200 60 240 70 Q280 80 320 100" fill="none" stroke="#FF4400" stroke-width="3" stroke-dasharray="8,5" opacity="0.5"/>
  <path d="M155 95 Q195 55 235 65 Q275 75 315 95" fill="none" stroke="#FF6600" stroke-width="2" opacity="0.3"/>
  <!-- Speed lines -->
  <line x1="330" y1="280" x2="370" y2="265" stroke="#FFCC00" stroke-width="3" opacity="0.6"/>
  <line x1="345" y1="295" x2="390" y2="285" stroke="#FFCC00" stroke-width="2" opacity="0.5"/>
  <line x1="355" y1="315" x2="400" y2="310" stroke="#FFCC00" stroke-width="2" opacity="0.4"/>
  <!-- Golf ball flying -->
  <circle cx="410" cy="240" r="18" fill="white"/>
  <circle cx="405" cy="235" r="4" fill="#EEEEEE" opacity="0.5"/>
  <circle cx="414" cy="233" r="3" fill="#EEEEEE" opacity="0.5"/>
  <!-- Ball trail -->
  <circle cx="390" cy="260" r="5" fill="white" opacity="0.5"/>
  <circle cx="370" cy="280" r="4" fill="white" opacity="0.3"/>
  <circle cx="350" cy="302" r="3" fill="white" opacity="0.2"/>
  <!-- Power meter -->
  <rect x="80" y="420" width="200" height="22" rx="6" fill="#330000"/>
  <rect x="80" y="420" width="180" height="22" rx="6" fill="#FF4400"/>
  <text x="90" y="437" fill="white" font-size="13" font-family="monospace">POWER  90%</text>
</svg>
