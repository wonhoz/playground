<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8BBD9"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <radialGradient id="circle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F06292" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="200" fill="url(#circle)" stroke="white" stroke-width="3"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10,8"/>
  <!-- Camera body -->
  <rect x="150" y="185" width="212" height="158" rx="22" fill="white" stroke="#E91E8C" stroke-width="5"/>
  <!-- Lens -->
  <circle cx="256" cy="264" r="55" fill="#FCE4EC" stroke="#E91E8C" stroke-width="5"/>
  <circle cx="256" cy="264" r="38" fill="#F48FB1" stroke="#C2185B" stroke-width="3"/>
  <circle cx="241" cy="250" r="12" fill="white" opacity="0.55"/>
  <!-- Kawaii eyes on lens -->
  <circle cx="244" cy="258" r="7" fill="#880E4F"/>
  <circle cx="268" cy="258" r="7" fill="#880E4F"/>
  <circle cx="246" cy="255" r="2" fill="white"/>
  <circle cx="270" cy="255" r="2" fill="white"/>
  <path d="M244,274 Q256,284 268,274" stroke="#880E4F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Viewfinder bump -->
  <rect x="208" y="165" width="96" height="28" rx="10" fill="white" stroke="#E91E8C" stroke-width="4"/>
  <!-- Stars & hearts -->
  <text x="105" y="175" font-size="34" fill="#E91E8C">♥</text>
  <text x="375" y="175" font-size="28" fill="#AB47BC">★</text>
  <text x="108" y="365" font-size="28" fill="#AB47BC">✿</text>
  <text x="372" y="365" font-size="30" fill="#E91E8C">♥</text>
  <!-- Flash button -->
  <circle cx="348" cy="205" r="16" fill="#FFD6E8" stroke="#E91E8C" stroke-width="3"/>
  <text x="348" y="212" text-anchor="middle" font-size="16" fill="#E91E8C">✦</text>
</svg>
