<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 에메랄드 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <!-- 배경 장식 -->
  <circle cx="820" cy="200" r="220" fill="#047857" opacity="0.3" clip-path="url(#clip08)"/>
  <circle cx="200" cy="820" r="180" fill="#064E3B" opacity="0.3" clip-path="url(#clip08)"/>

  <!-- Layer 2: SVG 코드 블록 (왼쪽) -->
  <rect x="130" y="210" width="440" height="600" rx="18" fill="#022C22" opacity="0.9"/>
  <rect x="130" y="210" width="440" height="44" rx="18" fill="#064E3B" opacity="0.9"/>
  <rect x="130" y="240" width="440" height="14" fill="#064E3B" opacity="0.9"/>
  <!-- 코드 에디터 탭 -->
  <rect x="148" y="218" width="100" height="28" rx="8" fill="#059669" opacity="0.9"/>
  <text x="198" y="238" text-anchor="middle" font-family="Consolas,monospace" font-size="18" fill="white">export.svg</text>
  <!-- 코드 내용 -->
  <text x="158" y="296" font-family="Consolas,monospace" font-size="26" fill="#6EE7B7">&lt;svg</text>
  <text x="158" y="296">
    <tspan font-family="Consolas,monospace" font-size="26" fill="#6EE7B7">&lt;svg </tspan>
  </text>
  <text x="158" y="296" font-family="Consolas,monospace" font-size="26" fill="#6EE7B7">&lt;svg</text>

  <!-- 라인별 코드 -->
  <text x="158" y="296" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#34D399">&lt;svg</tspan>
    <tspan fill="#6EE7B7"> viewBox=</tspan>
    <tspan fill="#FDE68A">"0 0 512 512"</tspan>
    <tspan fill="#34D399">&gt;</tspan>
  </text>

  <text x="158" y="340" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#94A3B8">  </tspan>
    <tspan fill="#34D399">&lt;rect</tspan>
  </text>
  <text x="158" y="370" font-family="Consolas,monospace" font-size="22">
    <tspan fill="#6EE7B7">    x=</tspan><tspan fill="#FDE68A">"60"</tspan>
    <tspan fill="#6EE7B7"> y=</tspan><tspan fill="#FDE68A">"60"</tspan>
  </text>
  <text x="158" y="398" font-family="Consolas,monospace" font-size="22">
    <tspan fill="#6EE7B7">    w=</tspan><tspan fill="#FDE68A">"392"</tspan>
    <tspan fill="#6EE7B7"> h=</tspan><tspan fill="#FDE68A">"200"</tspan>
  </text>
  <text x="158" y="426" font-family="Consolas,monospace" font-size="22">
    <tspan fill="#6EE7B7">    fill=</tspan><tspan fill="#FDE68A">"#6366F1"</tspan>
  </text>
  <text x="158" y="454" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#34D399">  /&gt;</tspan>
  </text>

  <text x="158" y="498" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#94A3B8">  </tspan>
    <tspan fill="#34D399">&lt;ellipse</tspan>
  </text>
  <text x="158" y="528" font-family="Consolas,monospace" font-size="22">
    <tspan fill="#6EE7B7">    cx=</tspan><tspan fill="#FDE68A">"380"</tspan>
    <tspan fill="#6EE7B7"> cy=</tspan><tspan fill="#FDE68A">"400"</tspan>
  </text>
  <text x="158" y="556" font-family="Consolas,monospace" font-size="22">
    <tspan fill="#6EE7B7">    fill=</tspan><tspan fill="#FDE68A">"#F59E0B"</tspan>
  </text>
  <text x="158" y="582" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#34D399">  /&gt;</tspan>
  </text>

  <text x="158" y="626" font-family="Consolas,monospace" font-size="24">
    <tspan fill="#34D399">&lt;/svg&gt;</tspan>
  </text>

  <!-- 커서 깜빡임 -->
  <rect x="236" y="632" width="5" height="26" rx="2" fill="#34D399" opacity="0.9"/>

  <!-- Layer 3: 렌더링 결과 (오른쪽 패널) -->
  <rect x="590" y="210" width="310" height="600" rx="18" fill="#022C22" opacity="0.85"/>
  <rect x="590" y="210" width="310" height="44" rx="18" fill="#064E3B" opacity="0.9"/>
  <rect x="590" y="240" width="310" height="14" fill="#064E3B" opacity="0.9"/>
  <text x="745" y="238" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#6EE7B7">Preview</text>

  <!-- 렌더링된 사각형 -->
  <rect x="618" y="282" width="254" height="130" rx="8" fill="#6366F1" opacity="0.9"/>
  <!-- 렌더링된 타원 -->
  <ellipse cx="745" cy="530" rx="108" ry="72" fill="#F59E0B" opacity="0.9"/>

  <!-- 오른쪽 화살표 (코드 → 렌더링) -->
  <g transform="translate(570,512)">
    <circle cx="0" cy="0" r="26" fill="#059669"/>
    <polygon points="-8,-12 12,0 -8,12" fill="white"/>
  </g>
</svg>
