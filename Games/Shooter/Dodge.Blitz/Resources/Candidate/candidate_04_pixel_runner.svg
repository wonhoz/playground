<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#05051A"/>
      <stop offset="100%" stop-color="#0F0F35"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ground platform -->
  <rect x="0" y="380" width="512" height="132" rx="0" fill="url(#groundGrad)"/>
  <rect x="0" y="378" width="512" height="6" fill="#6366F1"/>
  <!-- Pixel player (running pose) - 8x8 pixel art style -->
  <!-- Head -->
  <rect x="212" y="280" width="32" height="32" rx="4" fill="#FCD34D"/>
  <!-- Eyes -->
  <rect x="220" y="290" width="6" height="6" fill="#1E1B4B"/>
  <rect x="234" y="290" width="6" height="6" fill="#1E1B4B"/>
  <!-- Body -->
  <rect x="204" y="314" width="48" height="36" rx="4" fill="#4F46E5"/>
  <!-- Arms -->
  <rect x="178" y="318" width="26" height="14" rx="4" fill="#4F46E5"/>
  <rect x="252" y="330" width="26" height="14" rx="4" fill="#4F46E5"/>
  <!-- Legs (running) -->
  <rect x="208" y="350" width="18" height="30" rx="4" fill="#1E1B4B"/>
  <rect x="232" y="355" width="18" height="25" rx="4" fill="#1E1B4B"/>
  <!-- Shoes -->
  <rect x="202" y="376" width="28" height="10" rx="4" fill="#EF4444"/>
  <rect x="232" y="374" width="24" height="10" rx="4" fill="#EF4444"/>
  <!-- Bullets (pixel style) -->
  <rect x="80" y="290" width="24" height="12" rx="3" fill="#EF4444"/>
  <rect x="60" y="290" width="14" height="12" rx="3" fill="#EF4444" opacity="0.5"/>
  <rect x="100" y="330" width="24" height="12" rx="3" fill="#F97316"/>
  <rect x="80" y="330" width="14" height="12" rx="3" fill="#F97316" opacity="0.5"/>
  <rect x="370" y="280" width="24" height="12" rx="3" fill="#EF4444" transform="scale(-1,1) translate(-764,0)"/>
  <rect x="390" y="280" width="14" height="12" rx="3" fill="#EF4444" opacity="0.5" transform="scale(-1,1) translate(-794,0)"/>
  <!-- Stars in bg -->
  <circle cx="80" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="350" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="460" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="420" cy="140" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="160" r="1.5" fill="white" opacity="0.5"/>
  <!-- Score HUD -->
  <rect x="60" y="60" width="110" height="30" rx="8" fill="#1E1B4B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="115" y="80" font-family="monospace" font-size="13" fill="#A5B4FC" text-anchor="middle">SCORE 1200</text>
  <rect x="342" y="60" width="110" height="30" rx="8" fill="#1E1B4B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="397" y="80" font-family="monospace" font-size="13" fill="#A5B4FC" text-anchor="middle">LIVES ♥♥♥</text>
</svg>
