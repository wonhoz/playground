<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#021a0d"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Paintbrush + pencil crossed -->
  <!-- Paintbrush (diagonal /) -->
  <rect x="280" y="80" width="18" height="180" rx="8" fill="#7c5209" transform="rotate(-35 289 170)"/>
  <ellipse cx="224" cy="264" rx="14" ry="28" fill="#4ade80" transform="rotate(-35 224 264)"/>
  <ellipse cx="218" cy="274" rx="8" ry="16" fill="#22c55e" transform="rotate(-35 218 274)"/>
  <!-- Pencil (diagonal \) -->
  <rect x="214" y="80" width="18" height="180" rx="5" fill="#fbbf24" transform="rotate(35 223 170)"/>
  <rect x="213" y="80" width="18" height="20" rx="3" fill="#fca5a5" transform="rotate(35 222 90)"/>
  <polygon points="214,258 232,258 223,278" fill="#f8fafc" transform="rotate(35 223 268)"/>
  <!-- Color splash at intersection -->
  <circle cx="256" cy="256" r="48" fill="#166534" stroke="#4ade80" stroke-width="3"/>
  <circle cx="256" cy="256" r="36" fill="#052e16"/>
  <text x="232" y="272" font-size="36">🎨</text>
  <!-- ICO file stack output -->
  <!-- Size cards -->
  <rect x="56" y="360" width="56" height="56" rx="12" fill="#0d3a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="66" y="397" font-family="monospace" font-size="20" fill="#4ade80">16</text>
  <text x="64" y="412" font-family="monospace" font-size="10" fill="#16a34a">px</text>
  <rect x="124" y="348" width="68" height="68" rx="12" fill="#0d3a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="138" y="391" font-family="monospace" font-size="22" fill="#4ade80">32</text>
  <text x="136" y="407" font-family="monospace" font-size="10" fill="#16a34a">px</text>
  <rect x="204" y="336" width="82" height="82" rx="12" fill="#0d3a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="222" y="385" font-family="monospace" font-size="24" fill="#22c55e" font-weight="bold">48</text>
  <text x="220" y="403" font-family="monospace" font-size="10" fill="#16a34a">px</text>
  <rect x="300" y="300" width="156" height="156" rx="16" fill="#0d3a1a" stroke="#4ade80" stroke-width="2.5"/>
  <text x="338" y="392" font-family="monospace" font-size="30" fill="#4ade80" font-weight="bold">256</text>
  <text x="344" y="414" font-family="monospace" font-size="12" fill="#16a34a">px</text>
  <!-- Arrow: canvas -> ICO -->
  <line x1="256" y1="304" x2="256" y2="336" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="256,340 248,326 264,326" fill="#4ade80" opacity="0.7"/>
  <!-- Ruler decoration top -->
  <rect x="56" y="64" width="400" height="24" rx="6" fill="#0d3a1a" stroke="#16a34a" stroke-width="1"/>
  <line x1="100" y1="64" x2="100" y2="88" stroke="#16a34a" stroke-width="1"/>
  <line x1="150" y1="64" x2="150" y2="88" stroke="#16a34a" stroke-width="1"/>
  <line x1="200" y1="64" x2="200" y2="88" stroke="#16a34a" stroke-width="1"/>
  <line x1="250" y1="64" x2="250" y2="88" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="300" y1="64" x2="300" y2="88" stroke="#16a34a" stroke-width="1"/>
  <line x1="350" y1="64" x2="350" y2="88" stroke="#16a34a" stroke-width="1"/>
  <line x1="400" y1="64" x2="400" y2="88" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="82" font-family="monospace" font-size="10" fill="#16a34a">100</text>
  <text x="220" y="82" font-family="monospace" font-size="10" fill="#4ade80">250</text>
  <text x="320" y="82" font-family="monospace" font-size="10" fill="#16a34a">350</text>
</svg>
