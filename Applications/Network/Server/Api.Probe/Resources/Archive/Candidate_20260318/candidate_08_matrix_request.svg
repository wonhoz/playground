<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 요청/응답 테이블 -->
  <rect x="80" y="100" width="352" height="320" rx="8" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <!-- 헤더 행 -->
  <rect x="80" y="100" width="352" height="38" rx="8" fill="#8B5CF6" opacity="0.15"/>
  <line x1="80" y1="138" x2="432" y2="138" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
  <text x="130" y="124" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">METHOD</text>
  <text x="256" y="124" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">ENDPOINT</text>
  <text x="390" y="124" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">STATUS</text>
  <!-- 세로 구분선 -->
  <line x1="175" y1="100" x2="175" y2="420" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  <line x1="335" y1="100" x2="335" y2="420" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  <!-- 데이터 행들 -->
  <g fill="#8B5CF6" opacity="0.7" font-family="monospace" font-size="10">
    <text x="130" y="163" text-anchor="middle">GET</text>
    <text x="256" y="163" text-anchor="middle">/api/users</text>
    <circle cx="390" cy="158" r="6" fill="#10B981" opacity="0.8"/>
    <text x="402" y="163" fill="#34D399" font-size="9">200</text>
  </g>
  <line x1="80" y1="175" x2="432" y2="175" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <g fill="#A78BFA" opacity="0.7" font-family="monospace" font-size="10">
    <text x="130" y="200" text-anchor="middle">POST</text>
    <text x="256" y="200" text-anchor="middle">/api/auth</text>
    <circle cx="390" cy="195" r="6" fill="#10B981" opacity="0.8"/>
    <text x="402" y="200" fill="#34D399" font-size="9">201</text>
  </g>
  <line x1="80" y1="212" x2="432" y2="212" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <g fill="#8B5CF6" opacity="0.7" font-family="monospace" font-size="10">
    <text x="130" y="237" text-anchor="middle">PUT</text>
    <text x="256" y="237" text-anchor="middle">/api/users/42</text>
    <circle cx="390" cy="232" r="6" fill="#10B981" opacity="0.8"/>
    <text x="402" y="237" fill="#34D399" font-size="9">200</text>
  </g>
  <line x1="80" y1="249" x2="432" y2="249" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <g fill="#A78BFA" opacity="0.7" font-family="monospace" font-size="10">
    <text x="130" y="274" text-anchor="middle">DELETE</text>
    <text x="256" y="274" text-anchor="middle">/api/items/7</text>
    <circle cx="390" cy="269" r="6" fill="#EF4444" opacity="0.7"/>
    <text x="402" y="274" fill="#FCA5A5" font-size="9">404</text>
  </g>
  <line x1="80" y1="286" x2="432" y2="286" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <g fill="#8B5CF6" opacity="0.6" font-family="monospace" font-size="10">
    <text x="130" y="311" text-anchor="middle">GET</text>
    <text x="256" y="311" text-anchor="middle">/api/stats</text>
    <circle cx="390" cy="306" r="6" fill="#10B981" opacity="0.8"/>
    <text x="402" y="311" fill="#34D399" font-size="9">200</text>
  </g>
  <!-- 하단 요약 -->
  <text x="256" y="455" text-anchor="middle" fill="#8B5CF6" font-size="12" font-family="monospace" filter="url(#glow)">5 REQUESTS | 4 OK | 1 FAIL</text>
</svg>