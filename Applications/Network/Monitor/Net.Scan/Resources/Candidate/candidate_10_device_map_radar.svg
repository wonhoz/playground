<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100020"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aa00ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- radar rings -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="#ce93d8" stroke-width="2" opacity="0.8"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ce93d8" stroke-width="2" opacity="0.55"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.35"/>
  <line x1="256" y1="96" x2="256" y2="416" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
  <!-- sweep -->
  <path d="M256 256 L180 110 A160 160 0 0 1 390 190 Z" fill="url(#sweep)"/>
  <!-- center -->
  <circle cx="256" cy="256" r="12" fill="#e040fb" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="white"/>
  <!-- device blips with icons -->
  <circle cx="310" cy="175" r="12" fill="#e040fb" filter="url(#glow)"/>
  <circle cx="310" cy="175" r="6" fill="white"/>
  <circle cx="185" cy="315" r="10" fill="#ce93d8" filter="url(#glow)"/>
  <circle cx="185" cy="315" r="5" fill="white"/>
  <circle cx="365" cy="305" r="9" fill="#e040fb" filter="url(#glow)"/>
  <circle cx="140" cy="195" r="8" fill="#ab47bc" filter="url(#glow)"/>
  <circle cx="340" cy="345" r="7" fill="#ce93d8" filter="url(#glow)"/>
  <!-- connection lines (dim) -->
  <line x1="256" y1="256" x2="310" y2="175" stroke="#ce93d8" stroke-width="1.5" opacity="0.3" stroke-dasharray="8,6"/>
  <line x1="256" y1="256" x2="185" y2="315" stroke="#ce93d8" stroke-width="1.5" opacity="0.3" stroke-dasharray="8,6"/>
</svg>
