  <rect x="470" y="750" width="130" height="80" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="610" y="750" width="130" height="80" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="750" y="750" width="80" height="80" rx="6" fill="#1565C0" opacity="0.3"/>
  <!-- 크로스워드 채워진 칸 (십자형) -->
  <!-- 가로 중앙 행 -->
  <rect x="190" y="470" width="130" height="130" rx="6" fill="#1565C0"/>
  <rect x="330" y="470" width="130" height="130" rx="6" fill="#1565C0"/>
  <rect x="470" y="470" width="130" height="130" rx="6" fill="#42A5F5"/>
  <rect x="610" y="470" width="130" height="130" rx="6" fill="#1565C0"/>
