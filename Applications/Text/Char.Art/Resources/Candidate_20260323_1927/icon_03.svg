<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581C87"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg03)"/>
  <!-- Left: photo frame -->
  <rect x="165" y="320" width="270" height="240" rx="16" fill="#FFFFFF" opacity="0.95"/>
  <!-- Photo landscape inside -->
  <rect x="180" y="335" width="240" height="210" rx="10" fill="#93C5FD"/>
  <!-- Mountain in photo -->
  <polygon points="200,525 300,370 400,525" fill="#3B82F6"/>
  <polygon points="280,525 360,410 440,525" fill="#1D4ED8"/>
  <!-- Sun in photo -->
  <circle cx="390" cy="380" r="28" fill="#FDE68A"/>
  <!-- Center arrow -->
  <polygon points="480,490 590,512 480,534" fill="#F97316"/>
  <rect x="444" y="505" width="148" height="14" rx="7" fill="#F97316"/>
  <!-- Right: ASCII art characters -->
  <text x="640" y="380" font-family="monospace" font-size="72" font-weight="900" fill="#FDE68A">@</text>
  <text x="730" y="380" font-family="monospace" font-size="50" font-weight="700" fill="#FFFFFF">#</text>
  <text x="670" y="450" font-family="monospace" font-size="58" font-weight="700" fill="#A78BFA">$</text>
  <text x="640" y="520" font-family="monospace" font-size="42" font-weight="700" fill="#FFFFFF">@</text>
  <text x="700" y="520" font-family="monospace" font-size="68" font-weight="900" fill="#FDE68A">#</text>
  <text x="770" y="510" font-family="monospace" font-size="36" font-weight="700" fill="#A78BFA">$</text>
  <text x="650" y="580" font-family="monospace" font-size="30" font-weight="700" fill="#C4B5FD">@</text>
  <text x="700" y="580" font-family="monospace" font-size="28" font-weight="700" fill="#FFFFFF">%</text>
  <text x="745" y="580" font-family="monospace" font-size="24" font-weight="700" fill="#E9D5FF">.</text>
  <text x="770" y="575" font-family="monospace" font-size="20" font-weight="700" fill="#C4B5FD">*</text>
  <!-- Labels -->
  <text x="300" y="600" text-anchor="middle" font-family="monospace" font-size="30" fill="rgba(255,255,255,0.6)">image</text>
  <text x="710" y="620" text-anchor="middle" font-family="monospace" font-size="30" fill="rgba(255,255,255,0.6)">ASCII</text>
</svg>
