<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#06000f"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#cc00cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid floor perspective -->
  <line x1="0" y1="380" x2="512" y2="380" stroke="#440044" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="400" x2="512" y2="400" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="420" x2="512" y2="420" stroke="#440044" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="380" x2="0" y2="512" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <line x1="192" y1="380" x2="160" y2="512" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <line x1="256" y1="380" x2="256" y2="512" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="380" x2="352" y2="512" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <line x1="448" y1="380" x2="512" y2="512" stroke="#440044" stroke-width="1" opacity="0.5"/>
  <!-- Water neon surface -->
  <path d="M0 310 Q80 298 160 310 Q240 322 320 310 Q400 298 480 310 L512 310 L512 380 L0 380 Z" fill="#000033" opacity="0.9"/>
  <path d="M0 312 Q80 300 160 312 Q240 324 320 312 Q400 300 480 312 L512 312" stroke="#00ffff" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Neon title -->
  <text x="62" y="82" font-family="Impact, sans-serif" font-size="64" fill="none" stroke="#ff00ff" stroke-width="2.5" opacity="0.9">HOOK</text>
  <text x="204" y="82" font-family="Impact, sans-serif" font-size="64" fill="none" stroke="#00ffff" stroke-width="2.5" opacity="0.9">CAST</text>
  <!-- Fishing line neon -->
  <line x1="256" y1="92" x2="280" y2="318" stroke="#ffff00" stroke-width="2.5" opacity="0.9"/>
  <!-- Neon hook -->
  <path d="M280 318 Q282 355 260 370 Q242 382 234 370 Q226 358 235 348 Q244 338 252 346" fill="none" stroke="#ff00ff" stroke-width="7" stroke-linecap="round"/>
  <line x1="252" y1="346" x2="244" y2="362" stroke="#ff00ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Pixel fish body -->
  <rect x="140" y="330" width="80" height="36" fill="#00ff88"/>
  <rect x="118" y="336" width="26" height="24" fill="#00ff88"/>
  <rect x="94" y="330" width="28" height="12" fill="#00ff88"/>
  <rect x="94" y="354" width="28" height="12" fill="#00ff88"/>
  <rect x="216" y="336" width="18" height="12" fill="#00cc66"/>
  <rect x="150" y="336" width="14" height="12" fill="white"/>
  <rect x="154" y="340" width="7" height="7" fill="#111"/>
  <!-- Score popup -->
  <rect x="318" y="218" width="148" height="58" rx="8" fill="#1a0030" stroke="#ff00ff" stroke-width="2"/>
  <text x="330" y="244" font-family="monospace" font-size="14" fill="#ff00ff">SCORE</text>
  <text x="330" y="268" font-family="monospace" font-size="24" font-weight="bold" fill="#ffff00">+150</text>
  <!-- Sparkles -->
  <text x="56" y="162" font-size="22" fill="#ffff00" opacity="0.7">★</text>
  <text x="418" y="182" font-size="18" fill="#ff00ff" opacity="0.6">★</text>
  <text x="78" y="222" font-size="14" fill="#00ffff" opacity="0.5">★</text>
