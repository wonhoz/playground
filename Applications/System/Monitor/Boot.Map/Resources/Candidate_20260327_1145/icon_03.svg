<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Timeline horizontal -->
  <line x1="180" y1="440" x2="844" y2="440" stroke="#059669" stroke-width="12"/>
  <!-- Arrowhead -->
  <polygon points="844,420 880,440 844,460" fill="#059669"/>
  <!-- Phase markers on timeline -->
  <!-- FW -->
  <circle cx="240" cy="440" r="22" fill="#059669"/>
  <rect x="210" y="320" width="60" height="110" rx="6" fill="#6EE7B7"/>
  <text x="240" y="296" font-family="Arial,sans-serif" font-size="32" fill="#059669" text-anchor="middle">FW</text>
  <text x="240" y="480" font-family="Arial,sans-serif" font-size="28" fill="#047857" text-anchor="middle">2.1s</text>
  <!-- Kernel -->
  <circle cx="380" cy="440" r="22" fill="#059669"/>
  <rect x="350" y="340" width="60" height="90" rx="6" fill="#34D399"/>
  <text x="380" y="316" font-family="Arial,sans-serif" font-size="32" fill="#059669" text-anchor="middle">KNL</text>
  <text x="380" y="480" font-family="Arial,sans-serif" font-size="28" fill="#047857" text-anchor="middle">1.6s</text>
  <!-- Driver -->
  <circle cx="510" cy="440" r="22" fill="#059669"/>
  <rect x="480" y="360" width="60" height="70" rx="6" fill="#6EE7B7"/>
  <text x="510" y="336" font-family="Arial,sans-serif" font-size="32" fill="#059669" text-anchor="middle">DRV</text>
  <text x="510" y="480" font-family="Arial,sans-serif" font-size="28" fill="#047857" text-anchor="middle">1.4s</text>
  <!-- Services -->
  <circle cx="640" cy="440" r="22" fill="#F59E0B"/>
  <rect x="610" y="310" width="60" height="120" rx="6" fill="#FCD34D"/>
  <text x="640" y="286" font-family="Arial,sans-serif" font-size="32" fill="#D97706" text-anchor="middle">SVC</text>
  <text x="640" y="480" font-family="Arial,sans-serif" font-size="28" fill="#D97706" text-anchor="middle">1.8s</text>
  <!-- Shell -->
  <circle cx="770" cy="440" r="22" fill="#059669"/>
  <rect x="740" y="380" width="60" height="50" rx="6" fill="#A7F3D0"/>
  <text x="770" y="356" font-family="Arial,sans-serif" font-size="32" fill="#059669" text-anchor="middle">EXP</text>
  <text x="770" y="480" font-family="Arial,sans-serif" font-size="28" fill="#047857" text-anchor="middle">1.1s</text>
  <!-- Degradation warning -->
  <rect x="590" y="540" width="190" height="68" rx="14" fill="#FEF3C7"/>
  <text x="685" y="582" font-family="Arial,sans-serif" font-size="36" fill="#D97706" text-anchor="middle">⚠ +0.3s</text>
  <!-- Label -->
  <text x="512" y="750" font-family="Arial,sans-serif" font-size="60" fill="#047857" font-weight="bold" text-anchor="middle">Boot Map</text>
  <text x="512" y="820" font-family="Arial,sans-serif" font-size="44" fill="#6EE7B7" text-anchor="middle">부팅 단계 분석</text>
</svg>
