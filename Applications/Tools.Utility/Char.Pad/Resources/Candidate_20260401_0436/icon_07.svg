<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCFF90"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg7)"/>
  <!-- Layer 2: Colorful bubbles -->
  <!-- Large center bubble -->
  <circle cx="512" cy="512" r="160" fill="#FF3D00" opacity="0.92"/>
  <!-- Upper left -->
  <circle cx="248" cy="292" r="128" fill="#7C4DFF" opacity="0.92"/>
  <!-- Upper right -->
  <circle cx="776" cy="292" r="128" fill="#FF6D00" opacity="0.92"/>
  <!-- Lower left -->
  <circle cx="248" cy="732" r="128" fill="#0091EA" opacity="0.92"/>
  <!-- Lower right -->
  <circle cx="776" cy="732" r="128" fill="#00C853" opacity="0.92"/>
  <!-- Mid left -->
  <circle cx="160" cy="512" r="98" fill="#FFD600" opacity="0.92"/>
  <!-- Mid right -->
  <circle cx="864" cy="512" r="98" fill="#FF4081" opacity="0.92"/>
  <!-- Layer 3: Characters in bubbles -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="middle" font-size="148" font-family="Segoe UI,Arial,sans-serif" fill="white" font-weight="bold">∑</text>
  <text x="248" y="292" text-anchor="middle" dominant-baseline="middle" font-size="118" font-family="Segoe UI,Arial,sans-serif" fill="white">©</text>
  <text x="776" y="292" text-anchor="middle" dominant-baseline="middle" font-size="118" font-family="Segoe UI,Arial,sans-serif" fill="white">→</text>
  <text x="248" y="732" text-anchor="middle" dominant-baseline="middle" font-size="118" font-family="Segoe UI,Arial,sans-serif" fill="white">★</text>
  <text x="776" y="732" text-anchor="middle" dominant-baseline="middle" font-size="118" font-family="Segoe UI,Arial,sans-serif" fill="white">∞</text>
  <text x="160" y="512" text-anchor="middle" dominant-baseline="middle" font-size="88" font-family="Segoe UI,Arial,sans-serif" fill="#BF360C">²</text>
  <text x="864" y="512" text-anchor="middle" dominant-baseline="middle" font-size="88" font-family="Segoe UI,Arial,sans-serif" fill="white">€</text>
  <!-- Bubble highlight dots -->
  <circle cx="278" cy="256" r="22" fill="white" opacity="0.5"/>
  <circle cx="806" cy="256" r="22" fill="white" opacity="0.5"/>
  <circle cx="542" cy="476" r="28" fill="white" opacity="0.3"/>
</svg>
