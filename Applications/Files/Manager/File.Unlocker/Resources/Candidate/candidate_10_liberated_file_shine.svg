<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003533"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="file" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#80cbc4"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#80cbc4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- outer shine ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#80cbc4" stroke-width="3" opacity="0.2"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#b2dfdb" stroke-width="2" opacity="0.15"/>
  <!-- star shine rays -->
  <g fill="#a7ffeb" opacity="0.35">
    <polygon points="256,90 262,230 256,240 250,230"/>
    <polygon points="256,422 262,282 256,272 250,282"/>
    <polygon points="90,256 230,250 240,256 230,262"/>
    <polygon points="422,256 282,250 272,256 282,262"/>
    <polygon points="148,148 228,216 230,228 218,226"/>
    <polygon points="364,364 284,296 282,284 294,286"/>
    <polygon points="364,148 296,228 284,230 286,218"/>
    <polygon points="148,364 216,284 228,282 226,294"/>
  </g>
  <!-- glow center -->
  <circle cx="256" cy="256" r="120" fill="#4db6ac" opacity="0.1" filter="url(#glow)"/>
  <!-- file -->
  <path d="M188 200 L308 200 L348 240 L348 370 L188 370 Z" fill="url(#file)"/>
  <path d="M308 200 L308 240 L348 240" fill="none" stroke="#80cbc4" stroke-width="3"/>
  <rect x="210" y="272" width="108" height="10" rx="5" fill="#00695c" opacity="0.4"/>
  <rect x="210" y="294" width="82" height="10" rx="5" fill="#00695c" opacity="0.3"/>
  <!-- shine overlay on file -->
  <path d="M188 200 L308 200 L348 240 L348 370 L188 370 Z" fill="url(#shine)"/>
  <!-- unlocked check mark -->
  <circle cx="310" cy="175" r="32" fill="#00c853"/>
  <polyline points="297,175 308,186 326,162" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
