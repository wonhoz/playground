<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: hybrid · 중앙심볼 · 타이머(15s) + 퀴즈 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E0F7FA"/>
  <!-- 원형 타이머 -->
  <circle cx="512" cy="512" r="380" fill="#FFFFFF" stroke="#006064" stroke-width="22"/>
  <!-- 타이머 진행 (70%) -->
  <path d="M 512 152 A 360 360 0 1 1 176 480 L 216 480 A 320 320 0 1 0 512 192 Z" fill="#FF6B35"/>
  <!-- 중앙 원 -->
  <circle cx="512" cy="512" r="280" fill="#FFFFFF" stroke="#006064" stroke-width="14"/>
  <!-- 큰 Q? -->
  <text x="512" y="620" font-family="Arial Black, sans-serif" font-weight="900" font-size="400" fill="#006064" text-anchor="middle">?</text>
  <!-- 눈금 -->
  <g stroke="#006064" stroke-width="10" stroke-linecap="round">
    <line x1="512" y1="150" x2="512" y2="180"/>
    <line x1="512" y1="844" x2="512" y2="874"/>
    <line x1="150" y1="512" x2="180" y2="512"/>
    <line x1="844" y1="512" x2="874" y2="512"/>
  </g>
  <!-- "15s" 배지 -->
  <g>
    <circle cx="820" cy="200" r="110" fill="#FFD93D" stroke="#006064" stroke-width="14"/>
    <text x="820" y="220" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#006064" text-anchor="middle">15s</text>
  </g>
  <!-- 상단 라벨 -->
  <rect x="302" y="70" width="420" height="100" rx="36" fill="#006064"/>
  <text x="512" y="144" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#FFD93D" text-anchor="middle">QUICK QUIZ</text>
</svg>
