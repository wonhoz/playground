<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 골프공 + 클럽 스윙: 공 + 아이언 -->
  <!-- club shaft -->
  <line x1="320" y1="240" x2="640" y2="680" stroke="#81C784" stroke-width="14" stroke-linecap="round"/>
  <!-- club head (iron) -->
  <rect x="618" y="668" width="70" height="28" rx="8" fill="#388E3C" transform="rotate(50 653 682)"/>
  <!-- golf ball -->
  <circle cx="340" cy="700" r="70" fill="#81C784"/>
  <!-- dimple pattern -->
  <circle cx="310" cy="670" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="350" cy="658" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="388" cy="672" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="330" cy="700" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="368" cy="700" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="316" cy="726" r="8" fill="#388E3C" opacity="0.5"/>
  <circle cx="356" cy="730" r="8" fill="#388E3C" opacity="0.5"/>
  <!-- swing arc -->
  <path d="M320 240 Q280 440 340 620" fill="none" stroke="#388E3C" stroke-width="6" stroke-dasharray="14 8" stroke-linecap="round" opacity="0.6"/>
</svg>
