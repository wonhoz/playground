<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="50%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#ad1457"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4081" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#ff4081" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Looping ribbon trail (aerobatic path) -->
  <path d="M80 350 Q150 350 200 280 Q250 210 256 170 Q262 130 280 120 Q310 108 340 130 Q370 152 370 200 Q370 260 320 300 Q280 330 256 310 Q220 285 220 240 Q220 195 256 180 Q292 165 320 190 Q350 215 345 250 Q338 290 300 310 Q260 332 220 340 Q180 350 130 360 Q100 366 80 370"
        stroke="url(#ribbon)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trail glow (wider, faded) -->
  <path d="M80 350 Q150 350 200 280 Q250 210 256 170 Q262 130 280 120 Q310 108 340 130 Q370 152 370 200 Q370 260 320 300 Q280 330 256 310 Q220 285 220 240 Q220 195 256 180 Q292 165 320 190 Q350 215 345 250 Q338 290 300 310 Q260 332 220 340 Q180 350 130 360 Q100 366 80 370"
        stroke="#ff4081" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.18"/>
  <!-- Plane at the tip -->
  <circle cx="80" cy="360" r="14" fill="#ad1457" stroke="#f48fb1" stroke-width="2"/>
  <path d="M68 354 L80 348 L92 354 L80 372 Z" fill="#f48fb1"/>
  <!-- Speed dots on trail -->
  <circle cx="200" cy="280" r="6" fill="#ff4081" opacity="0.8"/>
  <circle cx="256" cy="180" r="6" fill="#ff4081" opacity="0.7"/>
  <circle cx="340" cy="130" r="5" fill="#ff4081" opacity="0.6"/>
  <circle cx="320" cy="300" r="5" fill="#ff4081" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="455" font-family="sans-serif" font-size="26" fill="#f48fb1" text-anchor="middle" font-weight="bold" letter-spacing="4" opacity="0.9">SKY.DRIFT</text>
</svg>
