<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0510"/>
      <stop offset="100%" stop-color="#180C28"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="40%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#581C87"/>
    </linearGradient>
    <radialGradient id="diamondGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E9D5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="url(#diamondGlow)"/>
  <!-- Diamond shape -->
  <polygon points="256,80 390,240 256,430 122,240" fill="url(#diamondGrad)" stroke="#E9D5FF" stroke-width="2" opacity="0.9"/>
  <!-- Diamond facets -->
  <line x1="256" y1="80" x2="256" y2="430" stroke="#E9D5FF" stroke-width="1" opacity="0.3"/>
  <line x1="122" y1="240" x2="390" y2="240" stroke="#E9D5FF" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="80" x2="122" y2="240" stroke="#C084FC" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="80" x2="390" y2="240" stroke="#C084FC" stroke-width="1.5" opacity="0.5"/>
  <line x1="122" y1="240" x2="256" y2="430" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
  <line x1="390" y1="240" x2="256" y2="430" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
  <!-- Performance stats overlaid -->
  <text x="256" y="225" font-family="monospace" font-size="20" fill="white" text-anchor="middle" font-weight="bold">5,542</text>
  <text x="256" y="248" font-family="monospace" font-size="11" fill="#E9D5FF" text-anchor="middle">MB/s READ</text>
  <text x="256" y="275" font-family="monospace" font-size="16" fill="#C084FC" text-anchor="middle">4,128</text>
  <text x="256" y="294" font-family="monospace" font-size="11" fill="#DDD6FE" text-anchor="middle">MB/s WRITE</text>
  <!-- Corner stats -->
  <text x="256" y="110" font-family="monospace" font-size="11" fill="#A78BFA" text-anchor="middle">SEQ</text>
  <text x="256" y="420" font-family="monospace" font-size="11" fill="#A78BFA" text-anchor="middle">4K</text>
  <text x="138" y="244" font-family="monospace" font-size="11" fill="#A78BFA" text-anchor="middle">R</text>
  <text x="374" y="244" font-family="monospace" font-size="11" fill="#A78BFA" text-anchor="middle">W</text>
  <!-- Score label -->
  <text x="256" y="468" font-family="sans-serif" font-size="14" fill="#6B21A8" text-anchor="middle">Drive Benchmark Score</text>
</svg>
