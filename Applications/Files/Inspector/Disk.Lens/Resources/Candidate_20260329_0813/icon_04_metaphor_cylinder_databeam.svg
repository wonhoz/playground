<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#3D0020"/>
      <stop offset="100%" stop-color="#1A000E"/>
    </linearGradient>
    <linearGradient id="cylBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B1A4A"/>
      <stop offset="40%" stop-color="#D63384"/>
      <stop offset="100%" stop-color="#8B1A4A"/>
    </linearGradient>
    <radialGradient id="cylTop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6EB4"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </radialGradient>
    <filter id="beamGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#FF1493" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg4)"/>

  <!-- Data beam rays (behind cylinder) -->
  <!-- Ray 1: left-up -->
  <line x1="512" y1="380" x2="200" y2="160" stroke="#FF6EB4" stroke-width="12" stroke-linecap="round" stroke-opacity="0.6" filter="url(#beamGlow)"/>
  <line x1="512" y1="380" x2="200" y2="160" stroke="#FFB3D9" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Ray 2: up -->
  <line x1="512" y1="380" x2="512" y2="100" stroke="#FF6EB4" stroke-width="12" stroke-linecap="round" stroke-opacity="0.6" filter="url(#beamGlow)"/>
  <line x1="512" y1="380" x2="512" y2="100" stroke="#FFB3D9" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Ray 3: right-up -->
  <line x1="512" y1="380" x2="824" y2="160" stroke="#FF6EB4" stroke-width="12" stroke-linecap="round" stroke-opacity="0.6" filter="url(#beamGlow)"/>
  <line x1="512" y1="380" x2="824" y2="160" stroke="#FFB3D9" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Ray 4: left -->
  <line x1="512" y1="540" x2="120" y2="580" stroke="#FF6EB4" stroke-width="12" stroke-linecap="round" stroke-opacity="0.5" filter="url(#beamGlow)"/>
  <line x1="512" y1="540" x2="120" y2="580" stroke="#FFB3D9" stroke-width="5" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- Ray 5: right -->
  <line x1="512" y1="540" x2="904" y2="580" stroke="#FF6EB4" stroke-width="12" stroke-linecap="round" stroke-opacity="0.5" filter="url(#beamGlow)"/>
  <line x1="512" y1="540" x2="904" y2="580" stroke="#FFB3D9" stroke-width="5" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- Cylinder body -->
  <rect x="292" y="380" width="440" height="360" rx="0" fill="url(#cylBody)" filter="url(#softShadow)"/>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="512" cy="740" rx="220" ry="56" fill="#8B1A4A"/>
  <ellipse cx="512" cy="740" rx="220" ry="56" fill="none" stroke="#FF6EB4" stroke-width="6" stroke-opacity="0.5"/>
  <!-- Cylinder top ellipse -->
  <ellipse cx="512" cy="380" rx="220" ry="56" fill="url(#cylTop)" filter="url(#softShadow)"/>
  <!-- Cylinder side shine -->
  <rect x="310" y="400" width="50" height="300" rx="25" fill="#FFFFFF" fill-opacity="0.12"/>

  <!-- Data lines on cylinder face -->
  <line x1="310" y1="460" x2="714" y2="460" stroke="#FF6EB4" stroke-opacity="0.35" stroke-width="6"/>
  <line x1="310" y1="530" x2="714" y2="530" stroke="#FF6EB4" stroke-opacity="0.35" stroke-width="6"/>
  <line x1="310" y1="600" x2="714" y2="600" stroke="#FF6EB4" stroke-opacity="0.35" stroke-width="6"/>
  <line x1="310" y1="670" x2="714" y2="670" stroke="#FF6EB4" stroke-opacity="0.35" stroke-width="6"/>

  <!-- Ray endpoints (dots) -->
  <circle cx="200" cy="160" r="22" fill="#FFB3D9" filter="url(#beamGlow)"/>
  <circle cx="512" cy="100" r="22" fill="#FFB3D9" filter="url(#beamGlow)"/>
  <circle cx="824" cy="160" r="22" fill="#FFB3D9" filter="url(#beamGlow)"/>
  <circle cx="120" cy="580" r="18" fill="#FF6EB4" filter="url(#beamGlow)"/>
  <circle cx="904" cy="580" r="18" fill="#FF6EB4" filter="url(#beamGlow)"/>

  <!-- Bottom label: size text -->
  <text x="512" y="900" font-family="Arial, sans-serif" font-size="100" font-weight="700"
        text-anchor="middle" fill="#FF6EB4" fill-opacity="0.8">2.4 TB</text>
</svg>
