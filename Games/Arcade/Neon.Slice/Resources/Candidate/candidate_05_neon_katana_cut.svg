<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050010"/>
      <stop offset="100%" style="stop-color:#000510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="katanaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc44ff"/>
      <stop offset="60%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#aaddff;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Katana blade - long diagonal -->
  <path d="M80 420 L400 120 L420 140 L92 436 Z" fill="url(#katanaGrad)" filter="url(#glow)" opacity="0.8"/>
  <!-- Blade edge -->
  <line x1="80" y1="420" x2="410" y2="120" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Blade back edge -->
  <line x1="92" y1="436" x2="420" y2="140" stroke="#cc44ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Tsuba (guard) -->
  <ellipse cx="196" cy="322" rx="25" ry="12" fill="#aa00cc" stroke="#cc44ff" stroke-width="1.5" filter="url(#glow)" transform="rotate(-45 196 322)"/>
  <!-- Handle (tsuka) -->
  <path d="M160 360 L90 430 L80 420 L150 352 Z" fill="#440066" stroke="#cc44ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Handle wrap lines -->
  <line x1="155" y1="358" x2="88" y2="426" stroke="#cc44ff" stroke-width="1" opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Slash arc -->
  <path d="M150 100 Q256 50 380 140" stroke="#cc44ff" stroke-width="4" fill="none" filter="url(#glow)" opacity="0.7"/>
  <path d="M155 115 Q256 68 375 155" stroke="#aa00cc" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.4"/>
  <!-- Neon particles from cut -->
  <circle cx="320" cy="200" r="4" fill="#cc44ff" filter="url(#glow)"/>
  <circle cx="335" cy="185" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="308" cy="215" r="2.5" fill="#aa00cc" filter="url(#glow)"/>
  <line x1="318" y1="192" x2="310" y2="180" stroke="#cc44ff" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="328" y1="208" x2="338" y2="218" stroke="#aa00cc" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Decorative elements -->
  <circle cx="410" cy="128" r="5" fill="#cc44ff" filter="url(#glow)"/>
  <circle cx="410" cy="128" r="12" fill="none" stroke="#aa00cc" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
</svg>