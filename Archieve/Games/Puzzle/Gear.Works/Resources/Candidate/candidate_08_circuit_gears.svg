<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002400"/>
      <stop offset="100%" stop-color="#003300"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit board traces -->
  <path d="M80,100 L80,200 L160,200 L160,160 L260,160 L260,120 L380,120" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.5"/>
  <path d="M80,380 L80,300 L180,300 L180,360 L290,360 L290,320 L400,320" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.5"/>
  <path d="M430,80 L430,220 L380,220 L380,280 L430,280 L430,440" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.4"/>
  <!-- Circuit nodes -->
  <circle cx="80" cy="150" r="6" fill="#00e676" filter="url(#glow)"/>
  <circle cx="160" cy="200" r="5" fill="#00e676" filter="url(#glow)"/>
  <circle cx="260" cy="160" r="5" fill="#00e676" filter="url(#glow)"/>
  <circle cx="80" cy="340" r="6" fill="#00e676" filter="url(#glow)"/>
  <circle cx="180" cy="330" r="5" fill="#00e676" filter="url(#glow)"/>
  <!-- Main gear (circuit style) -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#circuitGrad)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#circuitGrad)" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <circle cx="256" cy="256" r="25" fill="url(#circuitGrad)" filter="url(#glow)"/>
  <!-- Gear teeth (circuit style) -->
  <rect x="244" y="124" width="24" height="24" rx="4" fill="url(#circuitGrad)" filter="url(#glow)"/>
  <rect x="244" y="364" width="24" height="24" rx="4" fill="url(#circuitGrad)" filter="url(#glow)"/>
  <rect x="124" y="244" width="24" height="24" rx="4" fill="url(#circuitGrad)" filter="url(#glow)"/>
  <rect x="364" y="244" width="24" height="24" rx="4" fill="url(#circuitGrad)" filter="url(#glow)"/>
  <rect x="163" y="163" width="22" height="22" rx="4" fill="url(#circuitGrad)" filter="url(#glow)" transform="rotate(45, 174, 174)"/>
  <rect x="327" y="163" width="22" height="22" rx="4" fill="url(#circuitGrad)" filter="url(#glow)" transform="rotate(45, 338, 174)"/>
  <rect x="163" y="327" width="22" height="22" rx="4" fill="url(#circuitGrad)" filter="url(#glow)" transform="rotate(45, 174, 338)"/>
  <rect x="327" y="327" width="22" height="22" rx="4" fill="url(#circuitGrad)" filter="url(#glow)" transform="rotate(45, 338, 338)"/>
  <!-- Spokes circuit traces -->
  <line x1="256" y1="176" x2="256" y2="336" stroke="url(#circuitGrad)" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <line x1="176" y1="256" x2="336" y2="256" stroke="url(#circuitGrad)" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <!-- Title -->
  <text x="256" y="480" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#circuitGrad)" text-anchor="middle" filter="url(#glow)">GEAR.WORKS</text>
</svg>
