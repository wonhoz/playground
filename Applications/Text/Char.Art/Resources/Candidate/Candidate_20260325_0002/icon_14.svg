<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Deep red -->
  <rect width="1024" height="1024" rx="190" fill="#B71C1C"/>

  <!-- Heart shape path (white outline) -->
  <path d="M512 780
           C512 780 220 590 220 390
           C220 290 300 210 400 210
           C450 210 490 240 512 270
           C534 240 574 210 624 210
           C724 210 804 290 804 390
           C804 590 512 780 512 780 Z"
        fill="#C62828" stroke="white" stroke-width="28"/>

  <!-- ASCII text filling the heart -->
  <!-- Row 1 (near top, narrow) -->
  <text x="512" y="310" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">@#$</text>
  <!-- Row 2 -->
  <text x="512" y="375" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">*@#$%@*</text>
  <!-- Row 3 -->
  <text x="512" y="438" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">#+@.#$*@#</text>
  <!-- Row 4 -->
  <text x="512" y="502" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">@#$%+@#$.</text>
  <!-- Row 5 -->
  <text x="512" y="563" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">$@.+#@$*</text>
  <!-- Row 6 -->
  <text x="512" y="623" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">#+@#$+</text>
  <!-- Row 7 -->
  <text x="512" y="680" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">@#$</text>
  <!-- Row 8 (tip) -->
  <text x="512" y="736" font-family="'Courier New', monospace" font-size="52" font-weight="900"
        text-anchor="middle" fill="white">.</text>

  <!-- Small hearts around -->
  <text x="240" y="340" font-family="Arial" font-size="65" text-anchor="middle" fill="#F48FB1" opacity="0.8">♥</text>
  <text x="785" y="330" font-family="Arial" font-size="65" text-anchor="middle" fill="#F48FB1" opacity="0.8">♥</text>
  <text x="210" y="560" font-family="Arial" font-size="50" text-anchor="middle" fill="#F48FB1" opacity="0.6">♥</text>
  <text x="810" y="540" font-family="Arial" font-size="50" text-anchor="middle" fill="#F48FB1" opacity="0.6">♥</text>
  <text x="512" y="870" font-family="Arial" font-size="55" text-anchor="middle" fill="#F48FB1" opacity="0.7">♥ Char.Art ♥</text>
</svg>
