<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141e30"/>
      <stop offset="100%" style="stop-color:#243b55"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="50" y="100" width="412" height="280" rx="14" fill="#0d0d0d"/>
  <rect x="50" y="100" width="412" height="36" rx="14" fill="#1a1a1a"/>
  <!-- Terminal buttons -->
  <circle cx="82" cy="118" r="8" fill="#ff5f57"/>
  <circle cx="108" cy="118" r="8" fill="#febc2e"/>
  <circle cx="134" cy="118" r="8" fill="#28c840"/>
  <!-- Terminal text -->
  <text x="75" y="170" font-family="monospace" font-size="18" fill="#43e97b">$ env</text>
  <text x="75" y="198" font-family="monospace" font-size="14" fill="#aaa">PATH=/usr/local/sbin</text>
  <text x="75" y="220" font-family="monospace" font-size="14" fill="#aaa">JAVA_HOME=/opt/java</text>
  <text x="75" y="242" font-family="monospace" font-size="14" fill="url(#lock)">SECRET_KEY=••••••••</text>
  <text x="75" y="264" font-family="monospace" font-size="14" fill="url(#lock)">API_KEY=••••••••••</text>
  <text x="75" y="286" font-family="monospace" font-size="14" fill="#43e97b">$ _</text>
  <!-- Lock icon overlay -->
  <rect x="340" y="220" width="80" height="90" rx="12" fill="url(#lock)"/>
  <path d="M355 220 L355 200 C355 175 395 175 395 200 L395 220" stroke="url(#lock)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="380" cy="255" r="14" fill="#141e30"/>
  <rect x="377" y="260" width="6" height="20" rx="3" fill="#141e30"/>
  <!-- Label -->
  <text x="256" y="430" font-family="monospace" font-size="26" text-anchor="middle" fill="url(#lock)" font-weight="bold">ENV.GUARD</text>
</svg>
