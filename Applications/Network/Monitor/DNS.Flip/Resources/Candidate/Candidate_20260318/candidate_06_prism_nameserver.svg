<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프리즘 삼각형 -->
  <polygon points="256,100 110,380 402,380" fill="#0EA5E9" opacity="0.08"/>
  <polygon points="256,100 110,380 402,380" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)"/>
  <!-- 입사 빔 -->
  <line x1="80" y1="200" x2="190" y2="270" stroke="url(#beam)" stroke-width="5" filter="url(#glow)"/>
  <!-- 굴절 빔들 (DNS A/AAAA/CNAME) -->
  <line x1="320" y1="270" x2="420" y2="200" stroke="#0EA5E9" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="320" y1="278" x2="430" y2="250" stroke="#38BDF8" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="320" y1="285" x2="430" y2="310" stroke="#7DD3FC" stroke-width="2" opacity="0.4"/>
  <!-- 레이블 -->
  <text x="55" y="205" fill="#38BDF8" font-size="11" font-family="monospace" opacity="0.8">Query</text>
  <text x="425" y="200" fill="#0EA5E9" font-size="10" font-family="monospace" opacity="0.9">A</text>
  <text x="435" y="252" fill="#38BDF8" font-size="10" font-family="monospace" opacity="0.7">AAAA</text>
  <text x="435" y="312" fill="#7DD3FC" font-size="10" font-family="monospace" opacity="0.5">CNAME</text>
  <!-- 프리즘 중앙 빛 -->
  <circle cx="256" cy="260" r="12" fill="#0EA5E9" opacity="0.4" filter="url(#glow)"/>
  <!-- 장식 -->
  <circle cx="150" cy="130" r="3" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="390" cy="140" r="4" fill="#38BDF8" opacity="0.5" filter="url(#glow)"/>
</svg>