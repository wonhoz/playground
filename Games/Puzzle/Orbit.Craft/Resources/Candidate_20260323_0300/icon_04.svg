<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbit.Craft | 우주 퍼즐 레벨 선택 | 기하학 | #0F0F1A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0F0F1A"/>
  <!-- Layer 2: Level selection puzzle grid -->
  <rect x="130" y="180" width="764" height="600" rx="20" fill="#141428"/>
  <text x="512" y="240" font-family="Arial,sans-serif" font-size="26" fill="#6B7280" text-anchor="middle">궤도 퍼즐 — 레벨 선택</text>
  <!-- Level cells 3x3 -->
  <!-- Row 1 -->
  <rect x="180" y="270" width="184" height="154" rx="14" fill="#1A1A3A"/>
  <text x="272" y="335" font-family="Arial,sans-serif" font-size="22" fill="#60A5FA" text-anchor="middle">Level 1</text>
  <text x="272" y="366" font-family="Consolas,monospace" font-size="14" fill="#374151" text-anchor="middle">●○○</text>
  <text x="272" y="404" font-family="Arial,sans-serif" font-size="16" fill="#22C55E" text-anchor="middle">✓ 완료</text>
  <rect x="420" y="270" width="184" height="154" rx="14" fill="#1A1A3A"/>
  <text x="512" y="335" font-family="Arial,sans-serif" font-size="22" fill="#60A5FA" text-anchor="middle">Level 2</text>
  <text x="512" y="366" font-family="Consolas,monospace" font-size="14" fill="#374151" text-anchor="middle">●●○</text>
  <text x="512" y="404" font-family="Arial,sans-serif" font-size="16" fill="#22C55E" text-anchor="middle">✓ 완료</text>
  <!-- Current level (highlighted) -->
  <rect x="660" y="270" width="184" height="154" rx="14" fill="#1E3A8A" stroke="#3B82F6" stroke-width="3"/>
  <text x="752" y="335" font-family="Arial,sans-serif" font-size="22" fill="#93C5FD" text-anchor="middle">Level 3</text>
  <!-- Planet + orbit mini preview -->
  <circle cx="752" cy="366" r="14" fill="#F59E0B"/>
  <ellipse cx="752" cy="366" rx="30" ry="8" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.7"/>
  <circle cx="782" cy="364" r="5" fill="#00FFCC"/>
  <text x="752" y="404" font-family="Arial,sans-serif" font-size="16" fill="#3B82F6" text-anchor="middle">▶ 진행 중</text>
  <!-- Row 2 -->
  <rect x="180" y="444" width="184" height="154" rx="14" fill="#111128"/>
  <text x="272" y="528" font-family="Arial,sans-serif" font-size="22" fill="#4B5563" text-anchor="middle">Level 4</text>
  <text x="272" y="574" font-family="Arial,sans-serif" font-size="16" fill="#374151" text-anchor="middle">🔒</text>
  <rect x="420" y="444" width="184" height="154" rx="14" fill="#111128"/>
  <text x="512" y="528" font-family="Arial,sans-serif" font-size="22" fill="#4B5563" text-anchor="middle">Level 5</text>
  <text x="512" y="574" font-family="Arial,sans-serif" font-size="16" fill="#374151" text-anchor="middle">🔒</text>
  <rect x="660" y="444" width="184" height="154" rx="14" fill="#111128"/>
  <text x="752" y="528" font-family="Arial,sans-serif" font-size="22" fill="#4B5563" text-anchor="middle">Level 6</text>
  <text x="752" y="574" font-family="Arial,sans-serif" font-size="16" fill="#374151" text-anchor="middle">🔒</text>
  <!-- Layer 3: Stars in background -->
  <circle cx="160" cy="160" r="2" fill="white" opacity="0.3"/>
  <circle cx="860" cy="180" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="900" cy="820" r="2" fill="white" opacity="0.3"/>
</svg>
