<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Comic.Cast - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #ffffff; }
    p.desc { text-align: center; color: #888888; margin-bottom: 28px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
    .item img { width: 160px; height: 160px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #aaaaaa; text-align: center; word-break: break-all; }
    .item .num { font-size: 0.85rem; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Comic.Cast — 아이콘 후보 10종</h1>
  <p class="desc">사진을 만화/카툰 스타일로 변환하는 도구</p>
  <div class="grid">
    <div class="item">
      <img src="candidate_01_pop_art_burst.svg" alt="01"/>
      <span class="num">01</span>
      <span>Pop Art Burst</span>
    </div>
    <div class="item">
      <img src="candidate_02_halftone_blue.svg" alt="02"/>
      <span class="num">02</span>
      <span>Halftone Blue</span>
    </div>
    <div class="item">
      <img src="candidate_03_manga_ink.svg" alt="03"/>
      <span class="num">03</span>
      <span>Manga Ink</span>
    </div>
    <div class="item">
      <img src="candidate_04_neon_cartoon.svg" alt="04"/>
      <span class="num">04</span>
      <span>Neon Cartoon</span>
    </div>
    <div class="item">
      <img src="candidate_05_retro_panel.svg" alt="05"/>
      <span class="num">05</span>
      <span>Retro Panel</span>
    </div>
    <div class="item">
      <img src="candidate_06_pastel_kawaii.svg" alt="06"/>
      <span class="num">06</span>
      <span>Pastel Kawaii</span>
    </div>
    <div class="item">
      <img src="candidate_07_bold_comic_action.svg" alt="07"/>
      <span class="num">07</span>
      <span>Bold Comic Action</span>
    </div>
    <div class="item">
      <img src="candidate_08_watercolor_toon.svg" alt="08"/>
      <span class="num">08</span>
      <span>Watercolor Toon</span>
    </div>
    <div class="item">
      <img src="candidate_09_pixel_art.svg" alt="09"/>
      <span class="num">09</span>
      <span>Pixel Art</span>
    </div>
    <div class="item">
      <img src="candidate_10_vintage_comic.svg" alt="10"/>
      <span class="num">10</span>
      <span>Vintage Comic</span>
    </div>
  </div>
</body>
</html>
