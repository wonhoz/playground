<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 파일 겹침: SVG (뒤) -->
    <rect x="140" y="260" width="220" height="280" rx="18" fill="#7C3AED" opacity="0.85"/>
    <rect x="140" y="260" width="220" height="280" rx="18" fill="none" stroke="#C4B5FD" stroke-width="8"/>
    <text x="250" y="420" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="52" fill="#FFFFFF">SVG</text>
    <!-- PNG -->
    <rect x="220" y="310" width="220" height="280" rx="18" fill="#0891B2" opacity="0.9"/>
    <rect x="220" y="310" width="220" height="280" rx="18" fill="none" stroke="#67E8F9" stroke-width="8"/>
    <text x="330" y="468" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="52" fill="#FFFFFF">PNG</text>
    <!-- JPG -->
    <rect x="300" y="360" width="220" height="280" rx="18" fill="#059669" opacity="0.9"/>
    <rect x="300" y="360" width="220" height="280" rx="18" fill="none" stroke="#6EE7B7" stroke-width="8"/>
    <text x="410" y="518" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="52" fill="#FFFFFF">JPG</text>
    <!-- BMP -->
    <rect x="380" y="410" width="220" height="280" rx="18" fill="#B45309" opacity="0.9"/>
    <rect x="380" y="410" width="220" height="280" rx="18" fill="none" stroke="#FCD34D" stroke-width="8"/>
    <text x="490" y="568" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="52" fill="#FFFFFF">BMP</text>
    <!-- 화살표 -->
    <path d="M 630 512 L 800 512" stroke="#FDE68A" stroke-width="52" stroke-linecap="round"/>
    <polygon points="798,478 858,512 798,546" fill="#FDE68A"/>
    <!-- ICO 결과 -->
    <rect x="858" y="400" width="130" height="130" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <rect x="858" y="400" width="130" height="130" rx="18" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <text x="923" y="482" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="44" fill="#FFFFFF">ICO</text>
  </g>
</svg>
