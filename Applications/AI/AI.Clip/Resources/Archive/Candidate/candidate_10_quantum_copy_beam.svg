<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a14"/>
      <stop offset="100%" stop-color="#001a0f"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a1a"/>
      <stop offset="100%" stop-color="#051510"/>
    </linearGradient>
    <radialGradient id="portal1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portal2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#00aaff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Source document (left) -->
  <rect x="65" y="155" width="150" height="200" rx="10" fill="url(#docGrad)" stroke="#00ff88" stroke-width="2.5"/>
  <line x1="85" y1="195" x2="197" y2="195" stroke="#00ff88" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="85" y1="220" x2="185" y2="220" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="245" x2="192" y2="245" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="270" x2="180" y2="270" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
  <line x1="85" y1="295" x2="188" y2="295" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
  <line x1="85" y1="318" x2="175" y2="318" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <!-- Portal left -->
  <ellipse cx="215" cy="255" rx="25" ry="75" fill="url(#portal1)" filter="url(#glow)"/>
  <ellipse cx="215" cy="255" rx="18" ry="65" fill="none" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <!-- Quantum beam -->
  <rect x="215" y="245" width="82" height="20" rx="5" fill="url(#beamGrad)" filter="url(#glow)"/>
  <!-- Particles in beam -->
  <circle cx="240" cy="255" r="4" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <circle cx="265" cy="255" r="3" fill="#00aaff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="285" cy="255" r="4" fill="#00ff88" filter="url(#glow)" opacity="0.7"/>
  <!-- Portal right -->
  <ellipse cx="297" cy="255" rx="25" ry="75" fill="url(#portal2)" filter="url(#glow)"/>
  <ellipse cx="297" cy="255" rx="18" ry="65" fill="none" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Destination document (right) -->
  <rect x="297" y="155" width="150" height="200" rx="10" fill="url(#docGrad)" stroke="#00aaff" stroke-width="2.5"/>
  <line x1="317" y1="195" x2="429" y2="195" stroke="#00aaff" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <line x1="317" y1="220" x2="417" y2="220" stroke="#00aaff" stroke-width="2" opacity="0.6"/>
  <line x1="317" y1="245" x2="424" y2="245" stroke="#00aaff" stroke-width="1.5" opacity="0.5"/>
  <line x1="317" y1="270" x2="410" y2="270" stroke="#00aaff" stroke-width="1.5" opacity="0.4"/>
  <line x1="317" y1="295" x2="420" y2="295" stroke="#00aaff" stroke-width="1.5" opacity="0.4"/>
  <line x1="317" y1="318" x2="405" y2="318" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  <!-- Quantum dots floating -->
  <circle cx="155" cy="390" r="5" fill="#00ff88" filter="url(#glow)" opacity="0.7"/>
  <circle cx="255" cy="410" r="8" fill="none" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <circle cx="355" cy="390" r="5" fill="#00aaff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="255" cy="115" r="8" fill="none" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
</svg>