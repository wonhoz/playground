<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FEF08A"/>
  <!-- Layer 2: Magnifying glass -->
  <!-- Lens circle -->
  <circle cx="430" cy="430" r="220" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="55"/>
  <!-- Handle -->
  <line x1="600" y1="600" x2="790" y2="790" stroke="#1E3A8A" stroke-width="60" stroke-linecap="round"/>
  <!-- Lens interior - text preview -->
  <rect x="290" y="340" width="270" height="16" rx="4" fill="#1E3A8A" opacity="0.5"/>
  <rect x="290" y="368" width="220" height="16" rx="4" fill="#1E3A8A" opacity="0.4"/>
  <rect x="290" y="396" width="250" height="16" rx="4" fill="#1E3A8A" opacity="0.35"/>
  <rect x="290" y="424" width="180" height="16" rx="4" fill="#1E3A8A" opacity="0.3"/>
  <!-- Title bar in lens -->
  <rect x="290" y="308" width="160" height="22" rx="6" fill="#3B82F6" opacity="0.7"/>
  <text x="370" y="324" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">번역 프롬프트</text>
  <!-- Layer 3: Highlight on lens -->
  <ellipse cx="355" cy="330" rx="55" ry="35" fill="white" opacity="0.35" transform="rotate(-25 355 330)"/>
  <!-- Search icon overlay at bottom -->
  <circle cx="430" cy="430" r="220" fill="none" stroke="#1E40AF" stroke-width="10" opacity="0.3"/>
</svg>