  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tech stack cards (floating) -->
  <!-- Card 1 -->
  <rect x="80" y="100" width="155" height="80" rx="10" fill="url(#card)" stroke="#388e3c" stroke-width="1.5"/>
