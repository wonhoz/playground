<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150010"/>
      <stop offset="100%" stop-color="#250020"/>
    </linearGradient>
    <radialGradient id="disco" cx="50%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FF88CC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCEE"/>
      <stop offset="50%" stop-color="#FF44AA"/>
      <stop offset="100%" stop-color="#AA0066"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Disco ball -->
  <circle cx="256" cy="160" r="80" fill="url(#ball)"/>
  <!-- Disco ball grid lines -->
  <circle cx="256" cy="160" r="80" fill="none" stroke="#FFCCEE" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="256" cy="160" rx="80" ry="30" fill="none" stroke="#FFCCEE" stroke-width="1" opacity="0.25"/>
  <ellipse cx="256" cy="160" rx="80" ry="55" fill="none" stroke="#FFCCEE" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="80" x2="256" y2="240" stroke="#FFCCEE" stroke-width="1.5" opacity="0.3"/>
  <line x1="196" y1="95" x2="316" y2="225" stroke="#FFCCEE" stroke-width="1" opacity="0.2"/>
  <line x1="316" y1="95" x2="196" y2="225" stroke="#FFCCEE" stroke-width="1" opacity="0.2"/>
  <!-- Light rays from disco ball -->
  <circle cx="256" cy="160" r="100" fill="url(#disco)"/>
  <!-- Light beams -->
  <line x1="256" y1="240" x2="140" y2="420" stroke="#FF88CC" stroke-width="3" opacity="0.3"/>
  <line x1="256" y1="240" x2="370" y2="420" stroke="#FFAADD" stroke-width="3" opacity="0.3"/>
  <line x1="256" y1="240" x2="80" y2="380" stroke="#FF44AA" stroke-width="2" opacity="0.25"/>
  <line x1="256" y1="240" x2="432" y2="380" stroke="#FF44AA" stroke-width="2" opacity="0.25"/>
  <!-- Beat bars at bottom -->
  <rect x="80" y="360" width="22" height="80" rx="5" fill="#FF44AA" opacity="0.7"/>
  <rect x="114" y="340" width="22" height="100" rx="5" fill="#FF88CC" opacity="0.75"/>
  <rect x="148" y="320" width="22" height="120" rx="5" fill="#FF44AA" opacity="0.8"/>
  <rect x="182" y="308" width="22" height="132" rx="5" fill="#FF88CC" opacity="0.85"/>
  <rect x="288" y="308" width="22" height="132" rx="5" fill="#FF88CC" opacity="0.85"/>
  <rect x="322" y="320" width="22" height="120" rx="5" fill="#FF44AA" opacity="0.8"/>
  <rect x="356" y="340" width="22" height="100" rx="5" fill="#FF88CC" opacity="0.75"/>
  <rect x="390" y="360" width="22" height="80" rx="5" fill="#FF44AA" opacity="0.7"/>
</svg>