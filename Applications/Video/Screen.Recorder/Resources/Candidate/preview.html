<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Screen.Recorder - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 24px; color: #888; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { width: 128px; height: 128px; border-radius: 16px; border: 1px solid #333; }
  .item span { font-size: 0.72rem; color: #666; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<h1>Screen.Recorder — Icon Candidates</h1>
<div class="grid">
  <div class="item"><img src="candidate_01_red_record_button.svg"/><span>01 red_record_button</span></div>
  <div class="item"><img src="candidate_02_blue_screen_capture.svg"/><span>02 blue_screen_capture</span></div>
  <div class="item"><img src="candidate_03_purple_video_film.svg"/><span>03 purple_video_film</span></div>
  <div class="item"><img src="candidate_04_teal_clapperboard.svg"/><span>04 teal_clapperboard</span></div>
  <div class="item"><img src="candidate_05_dark_camera_lens.svg"/><span>05 dark_camera_lens</span></div>
  <div class="item"><img src="candidate_06_orange_timeline_edit.svg"/><span>06 orange_timeline_edit</span></div>
  <div class="item"><img src="candidate_07_green_cursor_record.svg"/><span>07 green_cursor_record</span></div>
  <div class="item"><img src="candidate_08_gold_4k_quality.svg"/><span>08 gold_4k_quality</span></div>
  <div class="item"><img src="candidate_09_neon_pixel_capture.svg"/><span>09 neon_pixel_capture</span></div>
  <div class="item"><img src="candidate_10_white_minimal_play.svg"/><span>10 white_minimal_play</span></div>
</div>
</body>
</html>
