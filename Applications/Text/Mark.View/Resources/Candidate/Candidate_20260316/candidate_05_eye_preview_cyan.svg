<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </radialGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Text lines (markdown source) behind eye -->
  <rect x="60" y="80" width="280" height="10" rx="5" fill="white" opacity="0.15"/>
  <rect x="60" y="100" width="200" height="10" rx="5" fill="white" opacity="0.12"/>
  <rect x="60" y="120" width="240" height="10" rx="5" fill="white" opacity="0.1"/>
  <rect x="60" y="140" width="180" height="10" rx="5" fill="white" opacity="0.12"/>
  <rect x="60" y="380" width="260" height="10" rx="5" fill="white" opacity="0.15"/>
  <rect x="60" y="400" width="190" height="10" rx="5" fill="white" opacity="0.12"/>
  <rect x="60" y="420" width="210" height="10" rx="5" fill="white" opacity="0.1"/>
  <!-- Eye shape -->
  <path d="M60 256 Q256 100 452 256 Q256 412 60 256 Z" fill="#0C4A6E" stroke="#22D3EE" stroke-width="3"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="90" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="45" fill="#0A0E1A"/>
  <!-- Pupil highlight -->
  <circle cx="280" cy="236" r="16" fill="white" opacity="0.3"/>
  <circle cx="235" cy="270" r="8" fill="white" opacity="0.15"/>
  <!-- Eye shine lines in iris -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="256" r="55" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.3"/>
  <!-- Eyelashes top -->
  <line x1="180" y1="175" x2="172" y2="155" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="220" y1="158" x2="215" y2="136" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="152" x2="256" y2="130" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="292" y1="158" x2="297" y2="136" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="332" y1="175" x2="340" y2="155" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- MD badge inside pupil -->
  <text x="256" y="262" font-family="Arial" font-size="18" fill="white" text-anchor="middle" font-weight="bold" opacity="0.8">MD</text>
</svg>
