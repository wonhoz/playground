  <rect x="660" y="300" width="14" height="300" fill="white"/>
  <rect x="686" y="300" width="18" height="300" fill="white"/>
  <rect x="716" y="300" width="8" height="300" fill="white"/>
  <rect x="736" y="300" width="20" height="300" fill="white"/>
