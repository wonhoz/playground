<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FF8FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="110" y="155" width="804" height="510" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>
  <!-- ZZZ letters (staggered, grey = sleeping) -->
  <text x="218" y="530" font-family="Arial Black, sans-serif" font-weight="900" font-size="210" fill="#CFD8DC" text-anchor="middle">Z</text>
  <text x="412" y="455" font-family="Arial Black, sans-serif" font-weight="900" font-size="225" fill="#B0BEC5" text-anchor="middle">Z</text>
  <text x="614" y="378" font-family="Arial Black, sans-serif" font-weight="900" font-size="240" fill="#90A4AE" text-anchor="middle">Z</text>
  <!-- Prohibition circle (red, thick) -->
  <circle cx="512" cy="418" r="204" fill="none" stroke="#D32F2F" stroke-width="26"/>
  <!-- Prohibition diagonal line -->
  <line x1="368" y1="270" x2="658" y2="564" stroke="#D32F2F" stroke-width="26" stroke-linecap="round"/>
  <!-- NO SLEEP badge -->
  <rect x="126" y="744" width="772" height="118" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" text-anchor="middle">NO SLEEP</text>
</svg>
