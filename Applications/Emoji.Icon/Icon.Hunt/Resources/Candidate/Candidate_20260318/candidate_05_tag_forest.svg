<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 태그 클라우드 (크기별) -->
  <rect x="160" y="150" width="90" height="32" rx="16" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1.5" filter="url(#glow)"/>
  <text x="205" y="170" text-anchor="middle" fill="#34D399" font-size="12" font-family="monospace" font-weight="bold">emoji</text>
  <rect x="270" y="145" width="110" height="36" rx="18" fill="#10B981" opacity="0.15" stroke="#34D399" stroke-width="1.5"/>
  <text x="325" y="168" text-anchor="middle" fill="#10B981" font-size="14" font-family="monospace" font-weight="bold">icons</text>
  <rect x="110" y="205" width="130" height="40" rx="20" fill="#10B981" opacity="0.25" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
  <text x="175" y="230" text-anchor="middle" fill="#34D399" font-size="16" font-family="monospace" font-weight="bold">glyphs</text>
  <rect x="260" y="202" width="150" height="44" rx="22" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
  <text x="335" y="229" text-anchor="middle" fill="#10B981" font-size="18" font-family="monospace" font-weight="bold">symbols</text>
  <rect x="140" y="265" width="100" height="34" rx="17" fill="#10B981" opacity="0.12" stroke="#34D399" stroke-width="1"/>
  <text x="190" y="287" text-anchor="middle" fill="#10B981" font-size="11" font-family="monospace">unicode</text>
  <rect x="260" y="268" width="80" height="30" rx="15" fill="#10B981" opacity="0.12" stroke="#34D399" stroke-width="1"/>
  <text x="300" y="288" text-anchor="middle" fill="#10B981" font-size="11" font-family="monospace">search</text>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">TAG FOREST</text>
</svg>
