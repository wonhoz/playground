<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Book spine shadow -->
  <rect x="248" y="110" width="16" height="310" rx="3" fill="#0D47A1" opacity="0.4"/>
  <!-- Left page -->
  <path d="M80,120 L248,120 L248,420 Q164,410 80,420 Z" fill="url(#pageL)" stroke="#1565C0" stroke-width="3"/>
  <!-- Right page -->
  <path d="M264,120 L432,120 L432,420 Q348,410 264,420 Z" fill="url(#pageR)" stroke="#1565C0" stroke-width="3"/>
  <!-- Page curl bottom-left -->
  <path d="M80,420 Q100,400 130,415 Q100,428 80,420 Z" fill="#BBDEFB" stroke="#90CAF9" stroke-width="2"/>
  <!-- Text lines left page -->
  <line x1="100" y1="155" x2="235" y2="155" stroke="#1565C0" stroke-width="3"/>
  <line x1="100" y1="173" x2="220" y2="173" stroke="#90CAF9" stroke-width="2"/>
  <line x1="100" y1="191" x2="230" y2="191" stroke="#90CAF9" stroke-width="2"/>
  <line x1="100" y1="209" x2="215" y2="209" stroke="#90CAF9" stroke-width="2"/>
  <!-- Word highlight left -->
  <rect x="100" y="144" width="80" height="18" rx="4" fill="#1976D2" opacity="0.3"/>
  <text x="140" y="157" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">WORD</text>
  <!-- Text lines right page (translation) -->
  <line x1="278" y1="155" x2="415" y2="155" stroke="#1565C0" stroke-width="3"/>
  <line x1="278" y1="173" x2="400" y2="173" stroke="#90CAF9" stroke-width="2"/>
  <line x1="278" y1="191" x2="408" y2="191" stroke="#90CAF9" stroke-width="2"/>
  <line x1="278" y1="209" x2="395" y2="209" stroke="#90CAF9" stroke-width="2"/>
  <!-- Word highlight right -->
  <rect x="278" y="144" width="80" height="18" rx="4" fill="#42A5F5" opacity="0.4"/>
  <text x="318" y="157" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">단어</text>
  <!-- Translation arrows -->
  <path d="M240,270 C244,262 252,262 256,270 C260,262 268,262 272,270" stroke="#1976D2" stroke-width="4" fill="none"/>
  <!-- More text lines -->
  <line x1="100" y1="240" x2="235" y2="240" stroke="#90CAF9" stroke-width="2"/>
  <line x1="100" y1="258" x2="220" y2="258" stroke="#90CAF9" stroke-width="2"/>
  <line x1="100" y1="276" x2="228" y2="276" stroke="#90CAF9" stroke-width="2"/>
  <line x1="278" y1="240" x2="415" y2="240" stroke="#90CAF9" stroke-width="2"/>
  <line x1="278" y1="258" x2="400" y2="258" stroke="#90CAF9" stroke-width="2"/>
  <line x1="278" y1="276" x2="410" y2="276" stroke="#90CAF9" stroke-width="2"/>
  <!-- Globe icon -->
  <circle cx="256" cy="370" r="46" fill="#1565C0" stroke="#64B5F6" stroke-width="3"/>
  <circle cx="256" cy="370" r="36" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
  <ellipse cx="256" cy="370" rx="20" ry="36" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
  <line x1="220" y1="370" x2="292" y2="370" stroke="#90CAF9" stroke-width="1.5"/>
  <line x1="224" y1="352" x2="288" y2="352" stroke="#90CAF9" stroke-width="1.5"/>
  <line x1="224" y1="388" x2="288" y2="388" stroke="#90CAF9" stroke-width="1.5"/>
</svg>
