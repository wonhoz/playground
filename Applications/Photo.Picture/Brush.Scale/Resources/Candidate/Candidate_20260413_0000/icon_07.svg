<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: metaphor · 실루엣 · 붓이 이미지에 AI 마법을 칠함 -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF9C4"/>
      <stop offset="1" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg07)"/>
  <!-- 캔버스 이미지 -->
  <rect x="140" y="220" width="744" height="560" rx="32" fill="#FFFFFF" stroke="#5D4037" stroke-width="18"/>
  <!-- 이미지의 왼쪽 (픽셀) -->
  <g>
    <rect x="170" y="250" width="80" height="80" fill="#90CAF9"/>
    <rect x="250" y="250" width="80" height="80" fill="#64B5F6"/>
    <rect x="170" y="330" width="80" height="80" fill="#42A5F5"/>
    <rect x="250" y="330" width="80" height="80" fill="#1E88E5"/>
    <rect x="170" y="410" width="80" height="80" fill="#66BB6A"/>
    <rect x="250" y="410" width="80" height="80" fill="#43A047"/>
    <rect x="170" y="490" width="80" height="80" fill="#2E7D32"/>
    <rect x="250" y="490" width="80" height="80" fill="#1B5E20"/>
    <rect x="170" y="570" width="160" height="180" fill="#795548"/>
  </g>
  <!-- 이미지의 오른쪽 (스무스) -->
  <g>
    <defs>
      <linearGradient id="sky07" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#64B5F6"/>
        <stop offset="1" stop-color="#BBDEFB"/>
      </linearGradient>
    </defs>
    <rect x="330" y="250" width="524" height="340" fill="url(#sky07)"/>
    <circle cx="720" cy="340" r="50" fill="#FFD93D" stroke="#FF9500" stroke-width="6"/>
    <path d="M 330 590 Q 460 450 580 540 Q 700 470 854 580 L 854 750 L 330 750 Z" fill="#43A047" stroke="#1B5E20" stroke-width="10" stroke-linejoin="round"/>
  </g>
  <!-- 경계선(진행 중) -->
  <rect x="328" y="250" width="6" height="500" fill="#FFD93D"/>
  <!-- 붓 (대각선) -->
  <g transform="rotate(35 340 400)">
    <!-- 손잡이 -->
    <rect x="120" y="350" width="280" height="50" rx="20" fill="#6D4C41" stroke="#3E2723" stroke-width="12"/>
    <!-- 밴드 -->
    <rect x="400" y="340" width="70" height="70" rx="8" fill="#FFB300" stroke="#E65100" stroke-width="8"/>
    <!-- 털 -->
    <path d="M 470 340 L 570 320 L 590 440 L 470 420 Z" fill="#FFFFFF" stroke="#5D4037" stroke-width="10" stroke-linejoin="round"/>
    <!-- 팁 페인트 -->
    <ellipse cx="600" cy="380" rx="40" ry="20" fill="#FF6B9D"/>
  </g>
  <!-- 스파클 -->
  <g fill="#FFFFFF" stroke="#FFD93D" stroke-width="6">
    <circle cx="780" cy="200" r="18"/>
    <circle cx="880" cy="340" r="14"/>
    <circle cx="600" cy="180" r="12"/>
  </g>
  <!-- 하단 AI 라벨 -->
  <rect x="362" y="820" width="300" height="100" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="12"/>
  <text x="512" y="898" font-family="Arial Black, sans-serif" font-weight="900" font-size="74" fill="#FFFFFF" text-anchor="middle">AI HD</text>
</svg>
