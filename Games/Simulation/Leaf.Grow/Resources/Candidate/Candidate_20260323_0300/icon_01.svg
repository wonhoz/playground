<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | L-시스템 나무 성장 | 공간/장면 | #0A1A05 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A1A05"/>
  <!-- Layer 2: L-system tree branches (turtle graphics style) -->
  <!-- Trunk -->
  <line x1="512" y1="850" x2="512" y2="600" stroke="#6B3A1F" stroke-width="18" stroke-linecap="round"/>
  <!-- Level 1 branches -->
  <line x1="512" y1="660" x2="380" y2="520" stroke="#8B4513" stroke-width="13" stroke-linecap="round"/>
  <line x1="512" y1="660" x2="644" y2="520" stroke="#8B4513" stroke-width="13" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="460" y2="480" stroke="#7A3B14" stroke-width="11" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="560" y2="476" stroke="#7A3B14" stroke-width="11" stroke-linecap="round"/>
  <!-- Level 2 branches -->
  <line x1="380" y1="520" x2="300" y2="420" stroke="#9B5520" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="520" x2="360" y2="400" stroke="#9B5520" stroke-width="8" stroke-linecap="round"/>
  <line x1="644" y1="520" x2="720" y2="420" stroke="#9B5520" stroke-width="8" stroke-linecap="round"/>
  <line x1="644" y1="520" x2="668" y2="396" stroke="#9B5520" stroke-width="8" stroke-linecap="round"/>
  <line x1="460" y1="480" x2="400" y2="380" stroke="#8B4820" stroke-width="7" stroke-linecap="round"/>
  <line x1="560" y1="476" x2="620" y2="376" stroke="#8B4820" stroke-width="7" stroke-linecap="round"/>
  <!-- Level 3 branches (thin) -->
  <line x1="300" y1="420" x2="250" y2="340" stroke="#A0612A" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="420" x2="270" y2="320" stroke="#A0612A" stroke-width="5" stroke-linecap="round"/>
  <line x1="720" y1="420" x2="770" y2="340" stroke="#A0612A" stroke-width="5" stroke-linecap="round"/>
  <line x1="720" y1="420" x2="760" y2="316" stroke="#A0612A" stroke-width="5" stroke-linecap="round"/>
  <line x1="360" y1="400" x2="320" y2="310" stroke="#9B5A22" stroke-width="4" stroke-linecap="round"/>
  <line x1="668" y1="396" x2="710" y2="306" stroke="#9B5A22" stroke-width="4" stroke-linecap="round"/>
  <!-- Leaves (small circles at branch tips) -->
  <circle cx="250" cy="340" r="22" fill="#22C55E"/>
  <circle cx="270" cy="320" r="20" fill="#16A34A"/>
  <circle cx="300" cy="306" r="18" fill="#4ADE80"/>
  <circle cx="360" cy="390" r="20" fill="#22C55E"/>
  <circle cx="320" cy="298" r="16" fill="#15803D"/>
  <circle cx="400" cy="366" r="20" fill="#4ADE80"/>
  <circle cx="460" cy="368" r="22" fill="#22C55E"/>
  <circle cx="560" cy="364" r="22" fill="#16A34A"/>
  <circle cx="620" cy="362" r="20" fill="#4ADE80"/>
  <circle cx="668" cy="296" r="18" fill="#22C55E"/>
  <circle cx="710" cy="294" r="16" fill="#15803D"/>
  <circle cx="760" cy="316" r="20" fill="#4ADE80"/>
  <circle cx="770" cy="340" r="22" fill="#22C55E"/>
  <!-- Flowers (pink dots) -->
  <circle cx="270" cy="312" r="8" fill="#F9A8D4"/>
  <circle cx="462" cy="360" r="7" fill="#F472B6"/>
  <circle cx="770" cy="330" r="8" fill="#EC4899"/>
  <!-- Layer 3: Ground -->
  <ellipse cx="512" cy="860" rx="220" ry="24" fill="#1A3A0A"/>
</svg>
