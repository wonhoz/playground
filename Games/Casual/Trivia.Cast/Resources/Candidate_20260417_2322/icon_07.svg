<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 달력 카드 (레이어드) -->
  <!-- 달력 뒷 카드 -->
  <rect x="200" y="220" width="620" height="500" rx="24" fill="#A5D6A7" opacity="0.5" transform="rotate(4 512 470)"/>
  <!-- 달력 앞 카드 -->
  <rect x="190" y="210" width="640" height="520" rx="24" fill="white"/>
  <!-- 달력 헤더 -->
  <rect x="190" y="210" width="640" height="104" rx="24" fill="#2E7D32"/>
  <rect x="190" y="270" width="640" height="44" fill="#2E7D32"/>
  <text x="512" y="272" font-family="Arial Black, Arial, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle">DAILY</text>
  <!-- 날짜 숫자 그리드 4×3 -->
  <text x="280" y="380" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">17</text>
  <text x="430" y="380" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">18</text>
  <text x="580" y="380" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">19</text>
  <text x="730" y="380" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">20</text>
  <text x="280" y="460" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">21</text>
  <!-- 오늘 날짜 강조 -->
  <circle cx="430" cy="445" r="44" fill="#FDD835"/>
  <text x="430" y="463" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="#1B5E20" text-anchor="middle">22</text>
  <text x="580" y="460" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">23</text>
  <text x="730" y="460" font-family="Arial, sans-serif" font-size="50" fill="#C8E6C9" text-anchor="middle">24</text>
  <!-- Layer 3: CHALLENGE 배지 -->
  <rect x="240" y="580" width="540" height="100" rx="22" fill="#2E7D32"/>
  <text x="512" y="641" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#FDD835" text-anchor="middle">CHALLENGE</text>
  <!-- 별 장식 -->
  <text x="260" y="510" font-family="Arial, sans-serif" font-size="52" fill="#FDD835" text-anchor="middle">★</text>
  <text x="764" y="510" font-family="Arial, sans-serif" font-size="52" fill="#FDD835" text-anchor="middle">★</text>
</svg>
