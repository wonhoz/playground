<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 민트 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Layer 2: 드롭존 박스 -->
  <rect x="140" y="340" width="744" height="420" rx="32" fill="url(#box2)" stroke="#43A047" stroke-width="8" stroke-dasharray="24,16"/>

  <!-- Layer 2: 하강 화살표 (드롭 아이콘) -->
  <path d="M512 220 L512 500 M512 500 L420 400 M512 500 L604 400" stroke="#FF4081" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Layer 3: 파일 이미지들이 드롭되는 느낌 -->
  <!-- 작은 파일 아이콘 1 -->
  <rect x="220" y="580" width="140" height="110" rx="12" fill="#29B6F6"/>
  <text x="290" y="645" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">SVG</text>

  <!-- 작은 파일 아이콘 2 -->
  <rect x="440" y="580" width="140" height="110" rx="12" fill="#66BB6A"/>
  <text x="510" y="645" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">PNG</text>

  <!-- 작은 파일 아이콘 3 -->
  <rect x="660" y="580" width="140" height="110" rx="12" fill="#FFA726"/>
  <text x="730" y="645" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">ICO</text>

  <!-- Layer 3: 하단 상태 바 -->
  <rect x="200" y="730" width="624" height="14" rx="7" fill="#C8E6C9"/>
  <rect x="200" y="730" width="390" height="14" rx="7" fill="#43A047"/>
</svg>
