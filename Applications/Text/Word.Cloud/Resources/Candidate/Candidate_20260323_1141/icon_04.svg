<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 슬레이트 -->
  <rect width="1024" height="1024" rx="180" fill="#0D1B2A"/>
  <!-- Layer 2: 컬러풀한 단어들이 폭발적으로 퍼지는 구성 -->
  <!-- 중앙 단어 (가장 큰) -->
  <text x="512" y="520" font-family="Arial Black,Arial" font-size="160" font-weight="900" fill="#00E5FF" text-anchor="middle" opacity="0.95">data</text>
  <!-- 주변 단어들 (다양한 방향, 각도, 색상) -->
  <text x="200" y="320" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FF4081" text-anchor="middle" transform="rotate(-15,200,320)">info</text>
  <text x="810" y="300" font-family="Arial Black,Arial" font-size="70" font-weight="900" fill="#69F0AE" text-anchor="middle" transform="rotate(12,810,300)">text</text>
  <text x="160" y="650" font-family="Arial Black,Arial" font-size="64" font-weight="900" fill="#FFD740" text-anchor="middle" transform="rotate(8,160,650)">tag</text>
  <text x="850" y="660" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#E040FB" text-anchor="middle" transform="rotate(-10,850,660)">freq</text>
  <!-- 더 작은 단어들 -->
  <text x="350" y="220" font-family="Arial" font-size="44" font-weight="700" fill="#FF6E40" text-anchor="middle">word</text>
  <text x="700" y="230" font-family="Arial" font-size="40" font-weight="700" fill="#40C4FF" text-anchor="middle">font</text>
  <text x="280" y="750" font-family="Arial" font-size="38" fill="#B9F6CA" text-anchor="middle">vis</text>
  <text x="740" y="760" font-family="Arial" font-size="42" fill="#FFFF00" text-anchor="middle">size</text>
  <!-- Layer 3: 방사형 선들 -->
  <line x1="512" y1="420" x2="512" y2="160" stroke="#00E5FF" stroke-width="3" opacity="0.2"/>
  <line x1="512" y1="580" x2="512" y2="840" stroke="#00E5FF" stroke-width="3" opacity="0.2"/>
  <line x1="412" y1="470" x2="200" y2="320" stroke="#FF4081" stroke-width="3" opacity="0.2"/>
  <line x1="612" y1="470" x2="810" y2="300" stroke="#69F0AE" stroke-width="3" opacity="0.2"/>
</svg>
