<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 따뜻한 살구 -->
  <defs>
    <linearGradient id="bg_sc04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCCBC"/>
    </linearGradient>
    <filter id="shadow04">
      <feDropShadow dx="6" dy="6" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_sc04)"/>

  <!-- 배경 카드 (가장 뒤, 회전) -->
  <rect x="240" y="460" width="560" height="400" rx="20" fill="#FFAB91" transform="rotate(-8, 512, 660)" filter="url(#shadow04)"/>
  <!-- 두번째 카드 -->
  <rect x="200" y="430" width="560" height="400" rx="20" fill="#FFCCBC" transform="rotate(-4, 480, 630)" filter="url(#shadow04)"/>

  <!-- 메인 카드 (앞) -->
  <rect x="172" y="380" width="600" height="460" rx="20" fill="white" filter="url(#shadow04)"/>
  <!-- 카드 헤더 줄 -->
  <rect x="172" y="380" width="600" height="68" rx="20" fill="#FF7043"/>
  <rect x="172" y="418" width="600" height="30" fill="#FF7043"/>
  <text x="472" y="424" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="bold" fill="white">Skill Recipe</text>

  <!-- 레시피 내용 -->
  <!-- 제목 줄 -->
  <rect x="210" y="472" width="220" height="28" rx="6" fill="#00BCD4"/>
  <rect x="444" y="472" width="100" height="28" rx="6" fill="#B2EBF2"/>

  <!-- 재료 목록 -->
  <circle cx="230" cy="536" r="10" fill="#FF7043"/>
  <rect x="252" y="522" width="200" height="22" rx="6" fill="#FFCCBC"/>
  <circle cx="230" cy="578" r="10" fill="#26C6DA"/>
  <rect x="252" y="564" width="240" height="22" rx="6" fill="#B2EBF2"/>
  <circle cx="230" cy="620" r="10" fill="#A5D6A7"/>
  <rect x="252" y="606" width="180" height="22" rx="6" fill="#DCEDC8"/>
  <circle cx="230" cy="662" r="10" fill="#CE93D8"/>
  <rect x="252" y="648" width="220" height="22" rx="6" fill="#F3E5F5"/>
  <circle cx="230" cy="704" r="10" fill="#FFD54F"/>
  <rect x="252" y="690" width="200" height="22" rx="6" fill="#FFFDE7"/>

  <!-- 구분선 -->
  <line x1="210" y1="734" x2="742" y2="734" stroke="#FFCCBC" stroke-width="4"/>

  <!-- 실행 버튼 -->
  <rect x="480" y="756" width="260" height="60" rx="14" fill="#FF7043"/>
  <text x="610" y="796" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="bold" fill="white">▶ Run Skill</text>

  <!-- 오른쪽에 더 많은 카드 더미 표시 -->
  <rect x="800" y="420" width="120" height="180" rx="12" fill="white" opacity="0.9" filter="url(#shadow04)"/>
  <rect x="810" y="432" width="100" height="16" rx="4" fill="#FFAB91"/>
  <rect x="810" y="458" width="80" height="10" rx="4" fill="#FFCCBC"/>
  <rect x="810" y="476" width="90" height="10" rx="4" fill="#FFCCBC"/>
  <rect x="810" y="494" width="70" height="10" rx="4" fill="#FFCCBC"/>
  <text x="858" y="582" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#FF7043">+7</text>

  <!-- 상단 레이블 -->
  <text x="512" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="900" fill="#BF360C">Skill.Cast</text>
  <text x="512" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#FF7043">Skills as Recipes</text>

  <!-- 장식 요소 -->
  <circle cx="880" cy="200" r="36" fill="#FF7043" opacity="0.3"/>
  <circle cx="140" cy="800" r="28" fill="#00BCD4" opacity="0.3"/>
  <circle cx="900" cy="750" r="22" fill="#A5D6A7" opacity="0.4"/>
</svg>
