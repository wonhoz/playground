<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep navy rounded square -->
  <rect width="1024" height="1024" rx="200" fill="#0D0D2B"/>
  <!-- Pane grid: 4 terminal panes with cyan dividers -->
  <!-- Top-left pane -->
  <rect x="130" y="130" width="330" height="310" rx="18" fill="#131330" stroke="#50C8DC" stroke-width="8"/>
  <!-- Top-right pane -->
  <rect x="564" y="130" width="330" height="310" rx="18" fill="#131330" stroke="#50C8DC" stroke-width="8"/>
  <!-- Bottom-left pane -->
  <rect x="130" y="544" width="330" height="310" rx="18" fill="#131330" stroke="#50C8DC" stroke-width="8"/>
  <!-- Bottom-right pane: highlighted / active -->
  <rect x="564" y="544" width="330" height="310" rx="18" fill="#1A1A40" stroke="#00E5FF" stroke-width="12"/>
  <!-- Prompt symbols in panes -->
  <text x="158" y="218" font-family="monospace" font-size="72" fill="#50C8DC" opacity="0.7">&gt;_</text>
  <text x="592" y="218" font-family="monospace" font-size="72" fill="#50C8DC" opacity="0.7">&gt;_</text>
  <text x="158" y="630" font-family="monospace" font-size="72" fill="#50C8DC" opacity="0.7">&gt;_</text>
  <!-- Active pane: bright prompt + play arrow -->
  <text x="592" y="630" font-family="monospace" font-size="72" fill="#FFFFFF">&gt;_</text>
  <!-- Play arrow: launch indicator -->
  <polygon points="640,700 780,699 710,776" fill="#4FFFB0" opacity="0.9"/>
</svg>
