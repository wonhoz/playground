<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#3d0000"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="50%" stop-color="#ffab00"/>
      <stop offset="100%" stop-color="#ffff00" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fire glow -->
  <circle cx="256" cy="360" r="220" fill="url(#fireGlow)"/>
  <!-- Flames -->
  <path d="M180,420 C160,350 220,310 200,260 C230,300 215,340 240,300 C250,280 245,250 265,230 C270,270 255,295 275,280 C300,260 290,300 310,280 C315,310 295,340 320,320 C340,360 310,400 330,420 Z" fill="url(#flameGrad)" opacity="0.85"/>
  <!-- Fist silhouette -->
  <rect x="190" y="220" width="130" height="100" rx="18" fill="url(#fistGrad)"/>
  <!-- Knuckles -->
  <rect x="195" y="212" width="28" height="22" rx="8" fill="url(#fistGrad)"/>
  <rect x="231" y="207" width="28" height="22" rx="8" fill="url(#fistGrad)"/>
  <rect x="267" y="210" width="28" height="22" rx="8" fill="url(#fistGrad)"/>
  <rect x="298" y="215" width="22" height="20" rx="8" fill="url(#fistGrad)"/>
  <!-- Thumb -->
  <rect x="190" y="245" width="25" height="45" rx="10" fill="#e65100" transform="rotate(-15, 202, 267)"/>
  <!-- Knuckle lines -->
  <line x1="210" y1="222" x2="210" y2="228" stroke="#bf360c" stroke-width="2" opacity="0.5"/>
  <line x1="246" y1="217" x2="246" y2="223" stroke="#bf360c" stroke-width="2" opacity="0.5"/>
  <line x1="282" y1="220" x2="282" y2="226" stroke="#bf360c" stroke-width="2" opacity="0.5"/>
  <!-- Impact lines -->
  <line x1="356" y1="140" x2="390" y2="108" stroke="#ffab00" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <line x1="370" y1="165" x2="415" y2="155" stroke="#ffab00" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="360" y1="190" x2="410" y2="200" stroke="#ffab00" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- FURY text -->
  <text x="256" y="470" font-family="Arial" font-size="42" font-weight="900" fill="#ff6d00" text-anchor="middle" letter-spacing="8">FURY</text>
</svg>
