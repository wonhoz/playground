<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | # 헤딩 마크다운 문서 | 레이어드 | #F0F4F8 밝은 배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#F0F4F8"/>
  <!-- Layer 2: Document page -->
  <rect x="200" y="180" width="560" height="660" rx="18" fill="white" stroke="#D1D5DB" stroke-width="3"/>
  <!-- Page fold corner -->
  <polygon points="660,180 760,280 660,280" fill="#E5E7EB"/>
  <polygon points="660,180 760,280 660,280" fill="none" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Layer 3: Markdown content preview -->
  <!-- H1 heading with # -->
  <text x="240" y="270" font-family="Consolas,monospace" font-size="36" fill="#4F46E5" font-weight="bold">#</text>
  <rect x="286" y="246" width="200" height="26" rx="6" fill="#C7D2FE"/>
  <!-- H2 -->
  <text x="240" y="332" font-family="Consolas,monospace" font-size="26" fill="#7C3AED">##</text>
  <rect x="302" y="312" width="150" height="20" rx="5" fill="#DDD6FE"/>
  <!-- Body lines -->
  <rect x="240" y="368" width="320" height="12" rx="6" fill="#D1D5DB"/>
  <rect x="240" y="392" width="280" height="12" rx="6" fill="#D1D5DB"/>
  <rect x="240" y="416" width="300" height="12" rx="6" fill="#D1D5DB"/>
  <!-- Code block -->
  <rect x="240" y="450" width="380" height="70" rx="8" fill="#1E1E2E"/>
  <text x="258" y="480" font-family="Consolas,monospace" font-size="17" fill="#4ADE80">```javascript</text>
  <text x="258" y="502" font-family="Consolas,monospace" font-size="17" fill="#94A3B8">const x = 42;</text>
  <!-- Table preview -->
  <rect x="240" y="540" width="380" height="80" rx="6" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="240" y1="568" x2="620" y2="568" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="240" y="540" width="380" height="28" rx="6" fill="#F3F4F6"/>
  <text x="350" y="558" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">열 1</text>
  <text x="490" y="558" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">열 2</text>
  <line x1="420" y1="540" x2="420" y2="620" stroke="#E5E7EB" stroke-width="2"/>
</svg>
