<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1445"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="pins" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- RAM chip body -->
  <rect x="120" y="170" width="272" height="172" rx="10" fill="url(#chip)" stroke="#42A5F5" stroke-width="2.5"/>
  <!-- Chip top notch -->
  <path d="M226 170 Q256 150 286 170" fill="none" stroke="#42A5F5" stroke-width="2.5"/>
  <!-- Circuit pattern on chip -->
  <line x1="140" y1="200" x2="372" y2="200" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="256" x2="372" y2="256" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="312" x2="372" y2="312" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="175" x2="200" y2="337" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <line x1="256" y1="175" x2="256" y2="337" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <line x1="312" y1="175" x2="312" y2="337" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <!-- Memory cells -->
  <rect x="155" y="210" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.4"/>
  <rect x="197" y="210" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.7"/>
  <rect x="239" y="210" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.3"/>
  <rect x="281" y="210" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.8"/>
  <rect x="323" y="210" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.5"/>
  <rect x="155" y="266" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.6"/>
  <rect x="197" y="266" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.4"/>
  <rect x="239" y="266" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.9"/>
  <rect x="281" y="266" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.3"/>
  <rect x="323" y="266" width="28" height="28" rx="3" fill="#42A5F5" opacity="0.7"/>
  <!-- Bottom pins -->
  <rect x="138" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="162" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="186" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="210" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="234" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="258" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="282" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="306" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="330" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="354" y="342" width="12" height="30" rx="3" fill="url(#pins)"/>
  <!-- Top pins -->
  <rect x="138" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="162" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="186" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="210" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="234" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="258" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="282" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="306" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="330" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <rect x="354" y="140" width="12" height="30" rx="3" fill="url(#pins)"/>
  <!-- Label -->
  <text x="256" y="262" font-family="Courier New" font-size="16" fill="#90CAF9" text-anchor="middle" font-weight="bold">DDR5</text>
  <text x="256" y="282" font-family="Courier New" font-size="11" fill="#64B5F6" text-anchor="middle">32GB</text>
</svg>
