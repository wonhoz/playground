<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#00363A"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B2EBF2" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#00ACC1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Water glass -->
  <path d="M 180,100 L 200,340 L 312,340 L 332,100 Z" fill="url(#glass)" stroke="#80DEEA" stroke-width="6" stroke-linejoin="round"/>
  <!-- Water fill in glass -->
  <path d="M 224,260 Q 256,240 288,260 L 308,340 L 204,340 Z" fill="#00ACC1" opacity="0.85"/>
  <!-- Water waves on fill -->
  <path d="M 210,270 Q 230,258 256,268 Q 280,278 304,268" fill="none" stroke="#B2EBF2" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Droplets -->
  <path d="M 144,88 Q 144,64 128,76 Q 112,88 128,104 Q 144,120 160,104 Q 176,88 160,76 Q 144,64 144,88Z" fill="url(#drop)" opacity="0.9"/>
  <path d="M 370,140 Q 370,120 356,130 Q 342,140 356,154 Q 370,168 384,154 Q 398,140 384,130 Q 370,120 370,140Z" fill="url(#drop)" opacity="0.8"/>
  <path d="M 160,180 Q 160,164 148,172 Q 136,180 148,192 Q 160,204 172,192 Q 184,180 172,172 Q 160,164 160,180Z" fill="url(#drop)" opacity="0.6"/>
  <!-- Notification card -->
  <rect x="64" y="364" width="384" height="108" rx="16" fill="#00363A" stroke="#80DEEA" stroke-width="5"/>
  <!-- Water drop small in notification -->
  <path d="M 112,390 Q 112,376 100,384 Q 88,392 100,404 Q 112,416 124,404 Q 136,392 124,384 Q 112,376 112,390Z" fill="#00ACC1" opacity="0.9"/>
  <!-- Text -->
  <rect x="148" y="380" width="212" height="10" rx="5" fill="#B2EBF2" opacity="0.9"/>
  <rect x="148" y="396" width="172" height="8" rx="4" fill="#80DEEA" opacity="0.7"/>
  <rect x="148" y="410" width="192" height="8" rx="4" fill="#80DEEA" opacity="0.6"/>
  <!-- Drink counter -->
  <rect x="360" y="376" width="76" height="68" rx="14" fill="#00ACC1" opacity="0.8"/>
  <text x="398" y="406" text-anchor="middle" font-size="28" font-weight="bold" fill="#E0F7FA" font-family="monospace">4/8</text>
  <rect x="372" y="418" width="52" height="7" rx="3" fill="#B2EBF2" opacity="0.7"/>
  <rect x="376" y="430" width="44" height="5" rx="2" fill="#B2EBF2" opacity="0.5"/>
</svg>
