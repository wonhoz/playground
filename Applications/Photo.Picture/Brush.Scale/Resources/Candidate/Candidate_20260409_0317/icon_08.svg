<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <clipPath id="c8"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Deep teal background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g8)"/>
  <g clip-path="url(#c8)">
    <!-- Decorative circuit/neural pattern (subtle) -->
    <circle cx="512" cy="512" r="380" fill="none" stroke="#134E4A" stroke-width="6" opacity="0.5"/>
    <circle cx="512" cy="512" r="280" fill="none" stroke="#134E4A" stroke-width="6" opacity="0.5"/>
    <!-- Layer 2: "AI" text centered (large, vivid purple) -->
    <text x="512" y="580" font-family="Arial Black,Arial,sans-serif" font-size="460" fill="#A855F7" font-weight="900" text-anchor="middle">AI</text>
    <!-- Layer 3: Pixel enhancement dots around the AI text (before/after pixels) -->
    <!-- Small blurry pixels (left side, gray) -->
    <rect x="196" y="302" width="68" height="68" rx="8" fill="#94A3B8" opacity="0.8"/>
    <rect x="196" y="380" width="68" height="68" rx="8" fill="#CBD5E1" opacity="0.8"/>
    <rect x="196" y="458" width="68" height="68" rx="8" fill="#94A3B8" opacity="0.8"/>
    <!-- Arrow from blurry to sharp (left side) -->
    <line x1="272" y1="416" x2="330" y2="416" stroke="#FCD34D" stroke-width="20" stroke-linecap="round"/>
    <polygon points="322,396 354,416 322,436" fill="#FCD34D"/>
    <!-- Sharp pixels (top, colorful) -->
    <rect x="340" y="218" width="60" height="60" rx="8" fill="#F97316"/>
    <rect x="410" y="218" width="60" height="60" rx="8" fill="#EC4899"/>
    <rect x="556" y="218" width="60" height="60" rx="8" fill="#2563EB"/>
    <rect x="626" y="218" width="60" height="60" rx="8" fill="#22C55E"/>
    <!-- Small blurry pixels (right side, gray) -->
    <rect x="760" y="302" width="68" height="68" rx="8" fill="#94A3B8" opacity="0.8"/>
    <rect x="760" y="380" width="68" height="68" rx="8" fill="#CBD5E1" opacity="0.8"/>
    <rect x="760" y="458" width="68" height="68" rx="8" fill="#94A3B8" opacity="0.8"/>
    <!-- Arrow (right side) -->
    <line x1="694" y1="416" x2="752" y2="416" stroke="#FCD34D" stroke-width="20" stroke-linecap="round"/>
    <polygon points="700,396 668,416 700,436" fill="#FCD34D"/>
    <!-- Sharp pixels (bottom, colorful) -->
    <rect x="340" y="754" width="60" height="60" rx="8" fill="#FBBF24"/>
    <rect x="410" y="754" width="60" height="60" rx="8" fill="#7C3AED"/>
    <rect x="556" y="754" width="60" height="60" rx="8" fill="#EF4444"/>
    <rect x="626" y="754" width="60" height="60" rx="8" fill="#10B981"/>
    <!-- Scale label at bottom -->
    <text x="512" y="892" font-family="Arial,sans-serif" font-size="82" fill="#99F6E4" font-weight="bold" text-anchor="middle">×2  ×4  ×8</text>
  </g>
</svg>
