<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>
  <!-- Prompt card stack (layered cards effect) -->
  <!-- Back card 3 -->
  <rect x="200" y="200" width="520" height="340" rx="24" fill="#E3F2FD" stroke="#90CAF9" stroke-width="12" transform="rotate(8 460 370)"/>
  <!-- Back card 2 -->
  <rect x="200" y="200" width="520" height="340" rx="24" fill="#BBDEFB" stroke="#64B5F6" stroke-width="12" transform="rotate(4 460 370)"/>
  <!-- Front card (main prompt) -->
  <rect x="200" y="200" width="520" height="340" rx="24" fill="#FFFFFF" stroke="#1565C0" stroke-width="16"/>
  <!-- Prompt content on front card -->
  <text x="270" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#E91E63">{{role}}</text>
  <rect x="270" y="308" width="380" height="14" rx="7" fill="#90CAF9" opacity="0.7"/>
  <rect x="270" y="336" width="330" height="14" rx="7" fill="#90CAF9" opacity="0.55"/>
  <text x="270" y="398" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#3A86FF">{{task}}</text>
  <rect x="270" y="416" width="350" height="14" rx="7" fill="#90CAF9" opacity="0.5"/>
  <rect x="270" y="444" width="300" height="14" rx="7" fill="#90CAF9" opacity="0.4"/>
  <!-- AI badge on card -->
  <rect x="584" y="214" width="100" height="56" rx="18" fill="#1565C0" stroke="#0D47A1" stroke-width="10"/>
  <text x="634" y="255" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">AI</text>
  <!-- PROMPT badge -->
  <rect x="192" y="744" width="640" height="116" rx="36" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">PROMPT</text>
</svg>
