<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050500"/>
  <!-- Compass circle -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#5D4037" stroke-width="20"/>
  <circle cx="512" cy="512" r="260" fill="none" stroke="#5D4037" stroke-width="8" opacity="0.4"/>
  <!-- Compass needle N (BCAAA4) -->
  <polygon points="512,220 490,512 512,480 534,512" fill="#BCAAA4"/>
  <!-- Compass needle S (darker) -->
  <polygon points="512,804 490,512 512,544 534,512" fill="#5D4037"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="20" fill="#BCAAA4"/>
  <!-- Cardinal marks -->
  <rect x="500" y="170" width="24" height="30" rx="4" fill="#BCAAA4"/>
  <rect x="500" y="824" width="24" height="30" rx="4" fill="#5D4037" opacity="0.7"/>
  <rect x="170" y="500" width="30" height="24" rx="4" fill="#5D4037" opacity="0.7"/>
  <rect x="824" y="500" width="30" height="24" rx="4" fill="#5D4037" opacity="0.7"/>
  <!-- Key hints at cardinal positions -->
  <rect x="430" y="330" width="80" height="60" rx="10" fill="#5D4037"/>
  <rect x="440" y="340" width="60" height="40" rx="7" fill="#050500"/>
  <rect x="630" y="440" width="80" height="60" rx="10" fill="#5D4037"/>
  <rect x="640" y="450" width="60" height="40" rx="7" fill="#050500"/>
</svg>
