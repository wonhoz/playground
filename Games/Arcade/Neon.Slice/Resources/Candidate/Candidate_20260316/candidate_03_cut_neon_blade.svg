<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100005"/>
      <stop offset="100%" style="stop-color:#001005"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bladeNeon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00aa"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Diagonal cut line -->
  <line x1="80" y1="150" x2="432" y2="400" stroke="#ff00aa" stroke-width="3" filter="url(#glow)" opacity="0.4"/>
  <line x1="80" y1="150" x2="432" y2="400" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <!-- Blade shape - horizontal slash -->
  <path d="M80 240 L420 275 L415 285 L76 248 Z" fill="url(#bladeNeon)" filter="url(#glow)" opacity="0.85"/>
  <!-- Blade tip glow -->
  <circle cx="420" cy="280" r="12" fill="#ff00aa" filter="url(#glow)" opacity="0.7"/>
  <circle cx="420" cy="280" r="6" fill="#ffffff" filter="url(#glow)"/>
  <!-- Objects sliced - top pieces fall up/right -->
  <rect x="200" y="170" width="70" height="65" rx="8" fill="none" stroke="#00ffcc" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="rotate(-5 235 202)"/>
  <rect x="310" y="185" width="55" height="52" rx="6" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="rotate(4 337 211)"/>
  <!-- Objects sliced - bottom pieces fall down/left -->
  <rect x="202" y="270" width="70" height="65" rx="8" fill="none" stroke="#00ffcc" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="rotate(5 237 302)"/>
  <rect x="312" y="278" width="55" height="52" rx="6" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)" opacity="0.7" transform="rotate(-4 339 304)"/>
  <!-- Cut sparks -->
  <circle cx="235" cy="248" r="4" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="220" cy="235" r="2.5" fill="#ff00aa" filter="url(#glow)"/>
  <circle cx="250" cy="260" r="2.5" fill="#ff00aa" filter="url(#glow)"/>
  <circle cx="340" cy="260" r="3" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="325" cy="248" r="2" fill="#ffcc00" filter="url(#glow)"/>
  <circle cx="355" cy="270" r="2" fill="#ffcc00" filter="url(#glow)"/>
  <!-- Neon glow handle -->
  <rect x="65" y="234" width="18" height="18" rx="4" fill="#ff00aa" filter="url(#glow)" opacity="0.6"/>
  <rect x="63" y="228" width="22" height="8" rx="3" fill="#880044" filter="url(#glow)" opacity="0.8"/>
</svg>