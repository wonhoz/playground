<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1500"/>
      <stop offset="100%" stop-color="#2D2000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Route map lines -->
  <line x1="100" y1="150" x2="256" y2="256" stroke="#FFD60A" stroke-width="4" opacity="0.5"/>
  <line x1="412" y1="150" x2="256" y2="256" stroke="#FFD60A" stroke-width="4" opacity="0.5"/>
  <line x1="100" y1="362" x2="256" y2="256" stroke="#FFD60A" stroke-width="4" opacity="0.5"/>
  <line x1="412" y1="362" x2="256" y2="256" stroke="#FFD60A" stroke-width="4" opacity="0.5"/>
  <!-- Endpoint nodes -->
  <circle cx="100" cy="150" r="28" fill="#2D2000" stroke="#FFD60A" stroke-width="3"/>
  <text x="100" y="156" text-anchor="middle" font-family="monospace" font-size="12" fill="#FFD60A">GET</text>
  <circle cx="412" cy="150" r="28" fill="#2D2000" stroke="#FFD60A" stroke-width="3"/>
  <text x="412" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFD60A">POST</text>
  <circle cx="100" cy="362" r="28" fill="#2D2000" stroke="#FFD60A" stroke-width="3"/>
  <text x="100" y="368" text-anchor="middle" font-family="monospace" font-size="12" fill="#FFD60A">PUT</text>
  <circle cx="412" cy="362" r="28" fill="#2D2000" stroke="#E85D04" stroke-width="3"/>
  <text x="412" y="368" text-anchor="middle" font-family="monospace" font-size="11" fill="#E85D04">DEL</text>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="56" fill="url(#gold)"/>
  <text x="256" y="250" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#1C1500">MOCK</text>
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="13" fill="#1C1500">SERVER</text>
</svg>