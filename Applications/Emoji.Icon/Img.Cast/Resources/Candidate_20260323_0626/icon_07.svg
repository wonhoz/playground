<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | 사진 프레임→ICO 변환 실루엣 — 사진이 작은 아이콘으로 | 실루엣 | #1E3A1E -->
  <defs>
    <linearGradient id="convertArrow7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E3A1E"/>
  <!-- Layer 2: Large photo frame on left (before) -->
  <!-- Photo frame border -->
  <rect x="140" y="280" width="320" height="260" rx="8" fill="#2A4A2A" stroke="#4ADE80" stroke-width="5"/>
  <!-- Photo mount -->
  <rect x="156" y="296" width="288" height="228" rx="4" fill="#F5F0E8"/>
  <!-- Photo content: landscape scene silhouette -->
  <!-- Sky -->
  <rect x="156" y="296" width="288" height="140" rx="4" fill="#87CEEB"/>
  <!-- Sun -->
  <circle cx="340" cy="340" r="28" fill="#FFD700"/>
  <!-- Mountains -->
  <polygon points="156,436 220,360 284,436" fill="#6A8A6A"/>
  <polygon points="230,436 310,358 390,436" fill="#5A7A5A"/>
  <polygon points="340,436 400,372 444,436" fill="#4A6A4A"/>
  <!-- Ground -->
  <rect x="156" y="436" width="288" height="88" rx="0" fill="#4A6A30"/>
  <!-- Frame label -->
  <rect x="156" y="496" width="120" height="28" rx="4" fill="#E8DCC8"/>
  <text x="216" y="515" font-family="serif" font-size="13" fill="#3A2800" text-anchor="middle">landscape.png</text>
  <!-- Frame size label -->
  <text x="300" y="515" font-family="monospace" font-size="11" fill="#6A6A4A">2048×1536</text>
  <!-- Big arrow with magic sparkle in center -->
  <line x1="480" y1="410" x2="560" y2="410" stroke="url(#convertArrow7)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="560,390 600,410 560,430" fill="#22D3EE"/>
  <!-- Magic effect -->
  <circle cx="520" cy="380" r="8" fill="#4ADE80" opacity="0.8"/>
  <circle cx="536" cy="396" r="6" fill="#22D3EE" opacity="0.7"/>
  <circle cx="510" cy="402" r="5" fill="#4ADE80" opacity="0.6"/>
  <!-- Tool icon -->
  <text x="520" y="445" font-family="Arial,sans-serif" font-size="24" text-anchor="middle">⚡</text>
  <!-- Layer 3: Right side - ICO sizes output (after) -->
  <!-- ICO file icon large -->
  <rect x="620" y="280" width="120" height="150" rx="8" fill="#1A2A1A" stroke="#4ADE80" stroke-width="3"/>
  <polygon points="700,280 740,280 740,308 712,308" fill="#2A4A2A"/>
  <polygon points="700,280 740,308 712,308" fill="#4ADE80"/>
  <text x="680" y="380" font-family="Arial,sans-serif" font-size="14" fill="#4ADE80" text-anchor="middle" font-weight="bold">.ICO</text>
  <!-- Size samples coming out of ICO -->
  <!-- 256px sample -->
  <rect x="760" y="280" width="80" height="80" rx="4" fill="#2A4A2A" stroke="#22D3EE" stroke-width="2"/>
  <rect x="762" y="282" width="76" height="56" rx="3" fill="#87CEEB" opacity="0.6"/>
  <polygon points="762,338 796,310 838,338" fill="#4A6A30" opacity="0.7"/>
  <text x="800" y="378" font-family="monospace" font-size="10" fill="#22D3EE" text-anchor="middle">256px</text>
  <!-- 48px sample -->
  <rect x="760" y="390" width="48" height="48" rx="3" fill="#2A4A2A" stroke="#22D3EE" stroke-width="2"/>
  <rect x="762" y="392" width="44" height="32" rx="2" fill="#87CEEB" opacity="0.6"/>
  <polygon points="762,424 780,412 806,424" fill="#4A6A30" opacity="0.7"/>
  <text x="784" y="448" font-family="monospace" font-size="10" fill="#22D3EE" text-anchor="middle">48px</text>
  <!-- 16px sample -->
  <rect x="820" y="390" width="24" height="24" rx="2" fill="#2A4A2A" stroke="#22D3EE" stroke-width="1"/>
  <rect x="821" y="391" width="22" height="14" rx="1" fill="#87CEEB" opacity="0.6"/>
  <polygon points="821,405 829,400 843,405" fill="#4A6A30" opacity="0.7"/>
  <text x="832" y="424" font-family="monospace" font-size="9" fill="#22D3EE" text-anchor="middle">16px</text>
  <!-- Img.Cast label -->
  <text x="512" y="800" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" text-anchor="middle" font-weight="bold">PNG / SVG → ICO</text>
</svg>
