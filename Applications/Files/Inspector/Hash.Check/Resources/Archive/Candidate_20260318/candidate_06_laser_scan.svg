<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060f0a"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <linearGradient id="scanBeam" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="20%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#34D399" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1f14"/>
      <stop offset="100%" stop-color="#061208"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Document being scanned -->
  <rect x="120" y="80" width="272" height="352" rx="8" fill="url(#docGrad)" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Document corner fold -->
  <polygon points="336,80 392,80 392,136" fill="#061812" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="336" y1="80" x2="392" y2="136" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Data lines in document (file content) -->
  <line x1="148" y1="130" x2="340" y2="130" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="150" x2="320" y2="150" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="170" x2="340" y2="170" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="190" x2="295" y2="190" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="250" x2="340" y2="250" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="270" x2="310" y2="270" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="290" x2="340" y2="290" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="310" x2="280" y2="310" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="350" x2="340" y2="350" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="370" x2="300" y2="370" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="148" y1="390" x2="340" y2="390" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Laser scan line -->
  <rect x="80" y="216" width="352" height="24" fill="url(#scanBeam)" filter="url(#scanGlow)"/>
  <!-- Scan line core -->
  <line x1="80" y1="228" x2="432" y2="228" stroke="#34D399" stroke-width="3" stroke-opacity="0.9" filter="url(#glow)"/>
  <!-- Scan line fine edge -->
  <line x1="80" y1="228" x2="432" y2="228" stroke="#6EE7B7" stroke-width="1" stroke-opacity="0.8"/>

  <!-- Lines already scanned glow (above scan line) -->
  <rect x="120" y="80" width="272" height="148" fill="#10B981" fill-opacity="0.04"/>

  <!-- Scan position indicator (left) -->
  <polygon points="68,220 90,228 68,236" fill="#10B981" fill-opacity="0.9" filter="url(#softglow)"/>
  <!-- Scan position indicator (right) -->
  <polygon points="444,220 422,228 444,236" fill="#10B981" fill-opacity="0.9" filter="url(#softglow)"/>

  <!-- Hash output building up on right -->
  <rect x="430" y="80" width="60" height="320" rx="6" fill="#040e06" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Hash chars building -->
  <rect x="438" y="90" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.7"/>
  <rect x="438" y="105" width="44" height="9" rx="4.5" fill="#34D399" fill-opacity="0.6"/>
  <rect x="438" y="120" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.65"/>
  <rect x="438" y="135" width="44" height="9" rx="4.5" fill="#6EE7B7" fill-opacity="0.5"/>
  <rect x="438" y="150" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.7"/>
  <rect x="438" y="165" width="44" height="9" rx="4.5" fill="#34D399" fill-opacity="0.6"/>
  <rect x="438" y="180" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.7"/>
  <rect x="438" y="195" width="44" height="9" rx="4.5" fill="#6EE7B7" fill-opacity="0.55"/>
  <!-- Incomplete hash chars (below scan) -->
  <rect x="438" y="213" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.2"/>
  <rect x="438" y="228" width="44" height="9" rx="4.5" fill="#10B981" fill-opacity="0.1"/>

  <!-- Scan tick marks on document sides -->
  <g stroke="#10B981" stroke-width="1" stroke-opacity="0.4">
    <line x1="120" y1="130" x2="110" y2="130"/>
    <line x1="120" y1="150" x2="112" y2="150"/>
    <line x1="120" y1="170" x2="110" y2="170"/>
    <line x1="120" y1="190" x2="112" y2="190"/>
    <line x1="120" y1="228" x2="105" y2="228"/>
    <line x1="120" y1="250" x2="112" y2="250"/>
  </g>
</svg>
