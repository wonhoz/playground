<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 배경 그라데이션: 에메랄드 민트 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#A8F0D8"/>
      <stop offset="100%" stop-color="#2ECC8A"/>
    </radialGradient>
    <!-- 초록 빛 글로우 -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00E676" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00C853" stop-opacity="0"/>
    </radialGradient>
    <!-- 빨간 빛 (꺼진 상태) -->
    <radialGradient id="redDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A1A1A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2A0A0A" stop-opacity="0.3"/>
    </radialGradient>
    <!-- 노란 빛 (꺼진 상태) -->
    <radialGradient id="yellowDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A2A0A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A1000" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: 밝은 에메랄드 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgGrad)"/>

  <!-- Layer 2: 신호등 기둥 (clipPath 필요 없이 안전한 위치에 배치) -->
  <!-- 기둥 -->
  <rect x="476" y="740" width="72" height="180" rx="16" fill="#2C3A2E"/>
  <!-- 기둥 받침 -->
  <rect x="390" y="892" width="244" height="36" rx="18" fill="#243028"/>

  <!-- 신호등 박스 (둥근 모서리, rx 단일값) -->
  <rect x="326" y="210" width="372" height="544" rx="60" fill="#1E2820"/>
  <!-- 박스 테두리 -->
  <rect x="326" y="210" width="372" height="544" rx="60" fill="none" stroke="#3A4A3C" stroke-width="14"/>
  <!-- 박스 내부 패딩 영역 (장식) -->
  <rect x="350" y="234" width="324" height="496" rx="46" fill="#242E26" opacity="0.5"/>

  <!-- 빨간 등 (꺼진 상태 — 어둡게) -->
  <circle cx="512" cy="342" r="88" fill="url(#redDim)"/>
  <circle cx="512" cy="342" r="72" fill="#3A1010" opacity="0.7"/>

  <!-- 노란 등 (꺼진 상태 — 어둡게) -->
  <circle cx="512" cy="512" r="88" fill="url(#yellowDim)"/>
  <circle cx="512" cy="512" r="72" fill="#2A1E08" opacity="0.7"/>

  <!-- Layer 3: 초록 등 (켜진 상태 — 강렬하게) -->
  <!-- 글로우 후광 (뒤에서 먼저 그림) -->
  <circle cx="512" cy="682" r="130" fill="url(#greenGlow)" opacity="0.7"/>
  <!-- 초록 등 본체 -->
  <circle cx="512" cy="682" r="88" fill="#00C853"/>
  <!-- 등 내부 밝은 반사 하이라이트 -->
  <ellipse cx="490" cy="654" rx="32" ry="22" fill="#A8FFD8" opacity="0.55"/>
  <!-- 초록 테두리 링 -->
  <circle cx="512" cy="682" r="88" fill="none" stroke="#00FF88" stroke-width="8"/>

  <!-- 신호등 상단 후드 (좌우 차양) -->
  <rect x="306" y="628" width="412" height="28" rx="14" fill="#1A2018" opacity="0.8"/>

  <!-- 박스 볼트 (리얼리티 디테일) -->
  <circle cx="356" cy="248" r="10" fill="#2A3C2C"/>
  <circle cx="668" cy="248" r="10" fill="#2A3C2C"/>
  <circle cx="356" cy="738" r="10" fill="#2A3C2C"/>
  <circle cx="668" cy="738" r="10" fill="#2A3C2C"/>
</svg>
