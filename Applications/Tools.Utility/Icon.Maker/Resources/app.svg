<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050e1e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- App window chrome -->
  <rect x="40" y="64" width="432" height="384" rx="14" fill="#0d1e38" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Titlebar -->
  <rect x="40" y="64" width="432" height="36" rx="14" fill="#152a48"/>
  <rect x="40" y="84" width="432" height="16" fill="#152a48"/>
  <circle cx="64" cy="82" r="7" fill="#ef4444"/>
  <circle cx="88" cy="82" r="7" fill="#f59e0b"/>
  <circle cx="112" cy="82" r="7" fill="#22c55e"/>
  <text x="138" y="87" font-family="monospace" font-size="13" fill="#60a5fa">Icon Maker Studio</text>
  <!-- Canvas area center -->
  <rect x="128" y="112" width="256" height="256" rx="8" fill="#071020" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Checkerboard pattern (transparent bg) -->
  <rect x="128" y="112" width="16" height="16" fill="#0d1a2e"/>
  <rect x="144" y="112" width="16" height="16" fill="#071020"/>
  <rect x="128" y="128" width="16" height="16" fill="#071020"/>
  <rect x="144" y="128" width="16" height="16" fill="#0d1a2e"/>
  <rect x="160" y="112" width="16" height="16" fill="#0d1a2e"/>
  <rect x="176" y="112" width="16" height="16" fill="#071020"/>
  <rect x="160" y="128" width="16" height="16" fill="#071020"/>
  <rect x="176" y="128" width="16" height="16" fill="#0d1a2e"/>
  <!-- Icon being edited -->
  <rect x="168" y="152" width="176" height="176" rx="36" fill="#3b82f6" opacity="0.9"/>
  <!-- Tool icon inside -->
  <polygon points="256,178 270,214 308,214 278,236 290,272 256,250 222,272 234,236 204,214 242,214" fill="white" opacity="0.95"/>
  <!-- Left toolbar -->
  <rect x="48" y="112" width="72" height="256" rx="8" fill="#0d1e38" stroke="#1e3a5f" stroke-width="1"/>
  <text x="54" y="140" font-family="monospace" font-size="11" fill="#3b82f6">Tools</text>
  <!-- Tool buttons -->
  <rect x="54" y="148" width="52" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="62" y="169" font-family="sans-serif" font-size="18">✏️</text>
  <rect x="54" y="186" width="52" height="32" rx="6" fill="#152a48"/>
  <text x="62" y="207" font-family="sans-serif" font-size="18">🖌️</text>
  <rect x="54" y="224" width="52" height="32" rx="6" fill="#152a48"/>
  <text x="62" y="245" font-family="sans-serif" font-size="18">◻</text>
  <rect x="54" y="262" width="52" height="32" rx="6" fill="#152a48"/>
  <text x="62" y="283" font-family="sans-serif" font-size="18">⬤</text>
  <rect x="54" y="300" width="52" height="32" rx="6" fill="#152a48"/>
  <text x="60" y="321" font-family="sans-serif" font-size="16">🪣</text>
  <!-- Right panel: sizes -->
  <rect x="392" y="112" width="72" height="256" rx="8" fill="#0d1e38" stroke="#1e3a5f" stroke-width="1"/>
  <text x="398" y="138" font-family="monospace" font-size="11" fill="#3b82f6">Export</text>
  <!-- Size previews -->
  <rect x="406" y="148" width="20" height="20" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="430" y="163" font-family="monospace" font-size="10" fill="#60a5fa">16</text>
  <rect x="402" y="178" width="28" height="28" rx="5" fill="#3b82f6" opacity="0.8"/>
  <text x="434" y="197" font-family="monospace" font-size="10" fill="#60a5fa">32</text>
  <rect x="400" y="216" width="36" height="36" rx="6" fill="#3b82f6" opacity="0.85"/>
  <text x="440" y="240" font-family="monospace" font-size="10" fill="#60a5fa">48</text>
  <rect x="398" y="262" width="48" height="48" rx="8" fill="#3b82f6"/>
  <polygon points="422,278 430,298 450,298 434,308 440,328 422,318 404,328 410,308 394,298 414,298" fill="white" opacity="0.9" transform="scale(0.6) translate(166 180)"/>
  <text x="450" y="293" font-family="monospace" font-size="10" fill="white">256</text>
  <!-- Bottom status bar -->
  <rect x="40" y="420" width="432" height="28" rx="0" fill="#0d1e38"/>
  <rect x="40" y="432" width="432" height="16" rx="14" fill="#0d1e38"/>
  <text x="56" y="440" font-family="monospace" font-size="11" fill="#3b82f6">256x256  |  32-bit RGBA  |  ICO ready</text>
</svg>
