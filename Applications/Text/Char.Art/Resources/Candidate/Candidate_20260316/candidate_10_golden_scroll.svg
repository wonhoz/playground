      <stop offset="100%" stop-color="#1E1200"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#DEB887"/>
