<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#101030"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <radialGradient id="vortex" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#311b92" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a237e" stop-opacity="0"/>
    </radialGradient>
    <filter id="vglow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- vortex glow -->
  <circle cx="256" cy="300" r="130" fill="url(#vortex)" filter="url(#vglow)"/>
  <!-- folder -->
  <path d="M90 195 L90 350 L420 350 L420 220 L225 220 L195 195 Z" fill="url(#folder)"/>
  <path d="M90 195 L90 224 L420 224 L420 220 L225 220 L195 195 Z" fill="#ef6c00"/>
  <!-- vortex spiral -->
  <path d="M256 300 Q290 270 310 300 Q330 330 290 350 Q250 370 220 340 Q190 310 220 275 Q250 240 295 260" fill="none" stroke="#b39ddb" stroke-width="5" opacity="0.7"/>
  <path d="M256 300 Q272 288 280 300 Q288 312 272 318 Q256 324 244 312 Q232 300 244 286 Q256 272 274 280" fill="none" stroke="#d1c4e9" stroke-width="4" opacity="0.5"/>
  <!-- spiral center -->
  <circle cx="256" cy="300" r="18" fill="#7c4dff" opacity="0.9"/>
  <circle cx="256" cy="300" r="8" fill="#ede7f6"/>
  <!-- debris orbiting -->
  <circle cx="310" cy="270" r="7" fill="#ffcc80" opacity="0.7"/>
  <circle cx="300" cy="340" r="5" fill="#ffe0b2" opacity="0.6"/>
  <circle cx="215" cy="335" r="6" fill="#ffcc80" opacity="0.5"/>
  <rect x="220" y="268" width="12" height="8" rx="2" fill="#ffe0b2" opacity="0.5" transform="rotate(30 226 272)"/>
</svg>
