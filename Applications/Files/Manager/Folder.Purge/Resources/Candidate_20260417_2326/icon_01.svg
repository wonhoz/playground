<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 폴더 계층 구조 -->
  <!-- 루트 폴더 -->
  <rect x="200" y="200" width="260" height="90" rx="14" fill="#F57F17"/>
  <rect x="200" y="220" width="260" height="85" rx="14" fill="#FF8F00"/>
  <text x="330" y="273" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" fill="white" text-anchor="middle">Root</text>
  <!-- 연결선 -->
  <line x1="330" y1="305" x2="330" y2="360" stroke="#E65100" stroke-width="8"/>
  <line x1="330" y1="360" x2="220" y2="360" stroke="#E65100" stroke-width="8"/>
  <line x1="330" y1="360" x2="440" y2="360" stroke="#E65100" stroke-width="8"/>
  <line x1="220" y1="360" x2="220" y2="400" stroke="#E65100" stroke-width="8"/>
  <line x1="440" y1="360" x2="440" y2="400" stroke="#E65100" stroke-width="8"/>
  <!-- 빈 폴더들 (빨간 테두리) -->
  <rect x="140" y="400" width="160" height="76" rx="12" fill="#FFCCBC" stroke="#D32F2F" stroke-width="6"/>
  <text x="220" y="446" font-family="Arial, sans-serif" font-size="38" fill="#D32F2F" text-anchor="middle">empty</text>
  <rect x="360" y="400" width="160" height="76" rx="12" fill="#FFCCBC" stroke="#D32F2F" stroke-width="6"/>
  <text x="440" y="446" font-family="Arial, sans-serif" font-size="38" fill="#D32F2F" text-anchor="middle">obj</text>
  <!-- 연결선 아래 -->
  <line x1="220" y1="476" x2="220" y2="540" stroke="#E65100" stroke-width="8"/>
  <line x1="440" y1="476" x2="440" y2="540" stroke="#E65100" stroke-width="8"/>
  <line x1="220" y1="540" x2="330" y2="540" stroke="#E65100" stroke-width="8"/>
  <line x1="440" y1="540" x2="330" y2="540" stroke="#E65100" stroke-width="8"/>
  <rect x="250" y="540" width="160" height="76" rx="12" fill="#FFCCBC" stroke="#D32F2F" stroke-width="6"/>
  <text x="330" y="586" font-family="Arial, sans-serif" font-size="38" fill="#D32F2F" text-anchor="middle">bin</text>
  <!-- Layer 3: PURGE 배지 -->
  <rect x="220" y="700" width="584" height="88" rx="22" fill="#D32F2F"/>
  <text x="512" y="759" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#FDD835" text-anchor="middle">PURGE</text>
</svg>
