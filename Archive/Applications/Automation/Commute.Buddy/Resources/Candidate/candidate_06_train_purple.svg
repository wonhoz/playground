<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="train" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Train tracks -->
  <line x1="60" y1="390" x2="452" y2="390" stroke="#9C27B0" stroke-width="6"/>
  <line x1="60" y1="410" x2="452" y2="410" stroke="#9C27B0" stroke-width="6"/>
  <line x1="90" y1="385" x2="90" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <line x1="150" y1="385" x2="150" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <line x1="210" y1="385" x2="210" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <line x1="270" y1="385" x2="270" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <line x1="330" y1="385" x2="330" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <line x1="390" y1="385" x2="390" y2="415" stroke="#CE93D8" stroke-width="4"/>
  <!-- Train body -->
  <rect x="80" y="200" width="352" height="195" rx="20" fill="url(#train)" stroke="#7B1FA2" stroke-width="5"/>
  <!-- Train front bump -->
  <ellipse cx="432" cy="297" rx="22" ry="80" fill="#CE93D8" stroke="#7B1FA2" stroke-width="4"/>
  <!-- Windows -->
  <rect x="108" y="225" width="68" height="60" rx="10" fill="#B39DDB" stroke="#7B1FA2" stroke-width="3"/>
  <rect x="196" y="225" width="68" height="60" rx="10" fill="#B39DDB" stroke="#7B1FA2" stroke-width="3"/>
  <rect x="284" y="225" width="68" height="60" rx="10" fill="#B39DDB" stroke="#7B1FA2" stroke-width="3"/>
  <!-- Door -->
  <rect x="108" y="300" width="68" height="88" rx="8" fill="#D1C4E9" stroke="#7B1FA2" stroke-width="3"/>
  <line x1="142" y1="300" x2="142" y2="388" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Headlight -->
  <circle cx="434" cy="250" r="16" fill="#FFF176" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="154" cy="390" r="22" fill="#4A148C" stroke="#CE93D8" stroke-width="4"/>
  <circle cx="270" cy="390" r="22" fill="#4A148C" stroke="#CE93D8" stroke-width="4"/>
  <circle cx="386" cy="390" r="22" fill="#4A148C" stroke="#CE93D8" stroke-width="4"/>
  <!-- Route indicator -->
  <rect x="370" y="200" width="80" height="30" rx="6" fill="#4A148C"/>
  <text x="410" y="220" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="white">LINE 2</text>
  <!-- Speed indicator -->
  <rect x="80" y="450" width="160" height="34" rx="17" fill="#9C27B0"/>
  <text x="160" y="473" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="17" font-weight="bold" fill="white">42 km/h</text>
</svg>
