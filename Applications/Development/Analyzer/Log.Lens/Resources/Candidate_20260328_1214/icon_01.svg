<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ll01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="sh_ll01">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg_ll01)" rx="120"/>

  <!-- Layer 2: Viewer panel (rounded rect, white) -->
  <rect x="140" y="200" width="744" height="640" rx="36" fill="white" opacity="0.96" filter="url(#sh_ll01)"/>

  <!-- Panel header bar -->
  <rect x="140" y="200" width="744" height="72" rx="36" fill="#1565C0"/>
  <rect x="140" y="236" width="744" height="36" fill="#1565C0"/>

  <!-- Header dots (traffic lights style) -->
  <circle cx="210" cy="236" r="18" fill="#FF5F57"/>
  <circle cx="268" cy="236" r="18" fill="#FFBD2E"/>
  <circle cx="326" cy="236" r="18" fill="#28CA41"/>

  <!-- Layer 3: Log lines with level indicators -->
  <!-- INFO line -->
  <circle cx="210" cy="360" r="22" fill="#4CAF50"/>
  <rect x="260" y="340" width="120" height="40" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="320" y="370" font-family="'Segoe UI', monospace, Arial" font-size="32" font-weight="700"
    text-anchor="middle" fill="white">INFO</text>
  <rect x="400" y="348" width="440" height="24" rx="6" fill="#BBDEFB" opacity="0.8"/>

  <!-- WARN line -->
  <circle cx="210" cy="460" r="22" fill="#FF9800"/>
  <rect x="260" y="440" width="130" height="40" rx="8" fill="#FF9800" opacity="0.9"/>
  <text x="325" y="470" font-family="'Segoe UI', monospace, Arial" font-size="32" font-weight="700"
    text-anchor="middle" fill="white">WARN</text>
  <rect x="410" y="448" width="380" height="24" rx="6" fill="#FFE0B2" opacity="0.8"/>

  <!-- ERROR line -->
  <circle cx="210" cy="560" r="22" fill="#F44336"/>
  <rect x="260" y="540" width="150" height="40" rx="8" fill="#F44336" opacity="0.9"/>
  <text x="335" y="570" font-family="'Segoe UI', monospace, Arial" font-size="32" font-weight="700"
    text-anchor="middle" fill="white">ERROR</text>
  <rect x="430" y="548" width="310" height="24" rx="6" fill="#FFCDD2" opacity="0.8"/>

  <!-- INFO line 2 -->
  <circle cx="210" cy="660" r="22" fill="#4CAF50"/>
  <rect x="260" y="640" width="120" height="40" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="320" y="670" font-family="'Segoe UI', monospace, Arial" font-size="32" font-weight="700"
    text-anchor="middle" fill="white">INFO</text>
  <rect x="400" y="648" width="480" height="24" rx="6" fill="#BBDEFB" opacity="0.8"/>

  <!-- Divider lines -->
  <line x1="170" y1="410" x2="854" y2="410" stroke="#E3F2FD" stroke-width="2"/>
  <line x1="170" y1="510" x2="854" y2="510" stroke="#E3F2FD" stroke-width="2"/>
  <line x1="170" y1="610" x2="854" y2="610" stroke="#E3F2FD" stroke-width="2"/>
</svg>
