<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0e02"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- DNA double helix (representing data structure/compression) -->
  <!-- Strand 1 (front) - sinuous -->
  <path d="M256,40 C 310,80 320,140 256,180 C 192,220 202,280 256,320 C 310,360 320,420 256,460"
    fill="none" stroke="#EAB308" stroke-width="6" stroke-opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M256,40 C 310,80 320,140 256,180 C 192,220 202,280 256,320 C 310,360 320,420 256,460"
    fill="none" stroke="#FDE68A" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Strand 2 (back) - sinuous opposite phase -->
  <path d="M256,40 C 202,80 192,140 256,180 C 320,220 310,280 256,320 C 202,360 192,420 256,460"
    fill="none" stroke="#F59E0B" stroke-width="6" stroke-opacity="0.7" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M256,40 C 202,80 192,140 256,180 C 320,220 310,280 256,320 C 202,360 192,420 256,460"
    fill="none" stroke="#FDE68A" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Base pairs (rungs - archive file pairs) -->
  <!-- Rung 1 -->
  <line x1="298" y1="72" x2="214" y2="88" stroke="#FBBF24" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#softglow)"/>
  <circle cx="298" cy="72" r="7" fill="#EAB308" filter="url(#glow)"/>
  <circle cx="214" cy="88" r="7" fill="#F59E0B" filter="url(#glow)"/>

  <!-- Rung 2 -->
  <line x1="316" y1="115" x2="196" y2="115" stroke="#EAB308" stroke-width="4" stroke-opacity="0.65" stroke-linecap="round"/>
  <circle cx="316" cy="115" r="6" fill="#FBBF24" filter="url(#softglow)"/>
  <circle cx="196" cy="115" r="6" fill="#EAB308" filter="url(#softglow)"/>

  <!-- Rung 3 -->
  <line x1="300" y1="157" x2="212" y2="143" stroke="#F59E0B" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#softglow)"/>
  <circle cx="300" cy="157" r="7" fill="#EAB308" filter="url(#glow)"/>
  <circle cx="212" cy="143" r="7" fill="#FBBF24" filter="url(#glow)"/>

  <!-- Rung 4 (center) -->
  <line x1="256" y1="180" x2="256" y2="180" stroke="#EAB308" stroke-width="4" stroke-opacity="0.6"/>
  <line x1="216" y1="180" x2="296" y2="180" stroke="#EAB308" stroke-width="4" stroke-opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="216" cy="180" r="8" fill="#EAB308" filter="url(#glow)"/>
  <circle cx="296" cy="180" r="8" fill="#EAB308" filter="url(#glow)"/>

  <!-- Rung 5 -->
  <line x1="212" y1="224" x2="300" y2="236" stroke="#FBBF24" stroke-width="4" stroke-opacity="0.65" stroke-linecap="round" filter="url(#softglow)"/>
  <circle cx="212" cy="224" r="6" fill="#F59E0B" filter="url(#softglow)"/>
  <circle cx="300" cy="236" r="6" fill="#EAB308" filter="url(#softglow)"/>

  <!-- Rung 6 -->
  <line x1="196" y1="275" x2="316" y2="275" stroke="#EAB308" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="196" cy="275" r="7" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="316" cy="275" r="7" fill="#EAB308" filter="url(#glow)"/>

  <!-- Rung 7 -->
  <line x1="212" y1="317" x2="300" y2="303" stroke="#F59E0B" stroke-width="4" stroke-opacity="0.65" stroke-linecap="round"/>
  <circle cx="212" cy="317" r="6" fill="#EAB308" filter="url(#softglow)"/>
  <circle cx="300" cy="303" r="6" fill="#FBBF24" filter="url(#softglow)"/>

  <!-- Rung 8 -->
  <line x1="196" y1="355" x2="316" y2="355" stroke="#EAB308" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="196" cy="355" r="7" fill="#F59E0B" filter="url(#glow)"/>
  <circle cx="316" cy="355" r="7" fill="#EAB308" filter="url(#glow)"/>

  <!-- Rung 9 -->
  <line x1="214" y1="395" x2="298" y2="408" stroke="#FBBF24" stroke-width="4" stroke-opacity="0.65" stroke-linecap="round" filter="url(#softglow)"/>
  <circle cx="214" cy="395" r="6" fill="#EAB308" filter="url(#softglow)"/>
  <circle cx="298" cy="408" r="6" fill="#FBBF24" filter="url(#softglow)"/>

  <!-- Rung 10 -->
  <line x1="196" y1="435" x2="316" y2="435" stroke="#EAB308" stroke-width="4" stroke-opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="196" cy="435" r="7" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="316" cy="435" r="7" fill="#F59E0B" filter="url(#glow)"/>

  <!-- Compression arrows (both ends converging) -->
  <g fill="#EAB308" fill-opacity="0.5">
    <polygon points="256,20 244,40 268,40"/>
    <polygon points="256,492 244,472 268,472"/>
  </g>

  <!-- Label: ZIP compression = DNA encoding -->
  <rect x="350" y="245" width="100" height="22" rx="11" fill="#EAB308" fill-opacity="0.12" stroke="#EAB308" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="358" y="251" width="84" height="10" rx="5" fill="#EAB308" fill-opacity="0.5"/>
</svg>
