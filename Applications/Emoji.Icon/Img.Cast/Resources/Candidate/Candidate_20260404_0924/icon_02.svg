<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <filter id="sh02">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000028"/>
    </filter>
  </defs>

  <!-- Layer 1: Background warm cream -->
  <rect width="1024" height="1024" rx="190" fill="#F9A825"/>
  <rect x="16" y="16" width="992" height="992" rx="178" fill="url(#bg02)"/>

  <!-- Layer 2: Drop zone (dashed border rect) -->
  <rect x="130" y="420" width="764" height="440" rx="32"
        fill="none" stroke="#FF8F00" stroke-width="14" stroke-dasharray="28,18"/>

  <!-- Drop zone label -->
  <text x="512" y="728" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700"
        fill="#E65100" text-anchor="middle" dominant-baseline="middle" opacity="0.8">여기에 드롭</text>

  <!-- Layer 3: File icons falling down -->
  <!-- File 1 (SVG) — top-left, rotated slightly -->
  <g transform="translate(240,200) rotate(-12)">
    <rect width="160" height="200" rx="16" fill="#42A5F5" filter="url(#sh02)"/>
    <rect x="0" y="0" width="100" height="200" rx="16" fill="#42A5F5"/>
    <polygon points="100,0 160,60 100,60" fill="#1565C0"/>
    <text x="80" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900"
          fill="white" text-anchor="middle" dominant-baseline="middle">SVG</text>
  </g>

  <!-- File 2 (PNG) — top-center -->
  <g transform="translate(430,120)">
    <rect width="160" height="200" rx="16" fill="#66BB6A" filter="url(#sh02)"/>
    <rect x="0" y="0" width="100" height="200" rx="16" fill="#66BB6A"/>
    <polygon points="100,0 160,60 100,60" fill="#2E7D32"/>
    <text x="80" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900"
          fill="white" text-anchor="middle" dominant-baseline="middle">PNG</text>
  </g>

  <!-- File 3 (JPG) — top-right, rotated slightly -->
  <g transform="translate(610,200) rotate(10)">
    <rect width="160" height="200" rx="16" fill="#FF7043" filter="url(#sh02)"/>
    <rect x="0" y="0" width="100" height="200" rx="16" fill="#FF7043"/>
    <polygon points="100,0 160,60 100,60" fill="#BF360C"/>
    <text x="80" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900"
          fill="white" text-anchor="middle" dominant-baseline="middle">JPG</text>
  </g>

  <!-- Motion lines (falling arrows) -->
  <line x1="320" y1="380" x2="320" y2="430" stroke="#FF8F00" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <polygon points="320,445 305,415 335,415" fill="#FF8F00" opacity="0.6"/>

  <line x1="512" y1="305" x2="512" y2="430" stroke="#FF8F00" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <polygon points="512,445 497,415 527,415" fill="#FF8F00" opacity="0.6"/>

  <line x1="700" y1="380" x2="700" y2="430" stroke="#FF8F00" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <polygon points="700,445 685,415 715,415" fill="#FF8F00" opacity="0.6"/>
</svg>
