<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0000"/>
<!-- 컨셉: 다이어트 저울 — 무거운 폴더를 가볍게 -->
<!-- 저울 지지대 -->
<line x1="512" y1="300" x2="512" y2="720" stroke="#EF9A9A" stroke-width="32" stroke-linecap="round"/>
<rect x="380" y="700" width="264" height="40" rx="20" fill="#EF9A9A"/>
<!-- 저울 팔 (기울어짐 — 왼쪽이 무거움) -->
<line x1="220" y1="380" x2="804" y2="440" stroke="#C62828" stroke-width="32" stroke-linecap="round"/>
<!-- 중심 피벗 -->
<circle cx="512" cy="410" r="28" fill="#EF9A9A"/>
<!-- 왼쪽 접시 (무거운 폴더들) -->
<path d="M 160 540 Q 140 520 220 500 L 400 500 Q 480 500 460 540 Z" fill="#C62828"/>
<line x1="220" y1="388" x2="220" y2="500" stroke="#EF9A9A" stroke-width="20"/>
<line x1="400" y1="393" x2="400" y2="500" stroke="#EF9A9A" stroke-width="20"/>
<!-- 왼쪽 폴더 아이콘들 (무거움) -->
<path d="M 200 440 Q 200 420 216 420 L 264 420 L 276 404 L 360 404 Q 376 404 376 420 L 376 492 Q 376 508 360 508 L 216 508 Q 200 508 200 492 Z" fill="#1A0000" stroke="#EF9A9A" stroke-width="14"/>
<!-- 오른쪽 접시 (빈/가벼운) -->
<path d="M 564 500 Q 544 520 524 540 L 700 540 Q 680 520 660 500 Z" fill="#C62828" opacity="0.6"/>
<line x1="580" y1="432" x2="580" y2="500" stroke="#EF9A9A" stroke-width="20"/>
<line x1="660" y1="436" x2="660" y2="500" stroke="#EF9A9A" stroke-width="20"/>
<!-- 오른쪽: 작은 파일 하나 (가벼움) -->
<rect x="598" y="450" width="44" height="36" rx="6" fill="#1A0000" stroke="#EF9A9A" stroke-width="12"/>
<!-- 화살표 (감량) -->
<path d="M 700 440 Q 760 420 800 360" fill="none" stroke="#EF9A9A" stroke-width="20" stroke-linecap="round" stroke-dasharray="14 10"/>
</svg>
