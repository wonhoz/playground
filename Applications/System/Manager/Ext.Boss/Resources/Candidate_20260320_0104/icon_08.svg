<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Magnet attracting file icons -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A0F"/>
  <!-- Magnet U-shape -->
  <path d="M 260,220 L 260,560 A 252 252 0 0 0 764,560 L 764,220" fill="none" stroke="#37474F" stroke-width="90" stroke-linecap="round"/>
  <path d="M 260,220 L 260,560 A 252 252 0 0 0 764,560 L 764,220" fill="none" stroke="#546E7A" stroke-width="60" stroke-linecap="round"/>
  <!-- Magnet poles (red/blue tips) -->
  <rect x="215" y="180" width="90" height="100" rx="12" fill="#546E7A"/>
  <rect x="719" y="180" width="90" height="100" rx="12" fill="#80CBC4"/>
  <!-- File icons being attracted -->
  <!-- File 1 - close, strongly pulled -->
  <rect x="380" y="700" width="100" height="130" rx="10" fill="#37474F" opacity="0.95"/>
  <polygon points="450,700 480,700 480,730" fill="#263238" opacity="0.8"/>
  <rect x="396" y="756" width="68" height="10" rx="4" fill="#546E7A" opacity="0.7"/>
  <!-- File 2 - further right -->
  <rect x="600" y="730" width="90" height="120" rx="10" fill="#263238" opacity="0.8" transform="rotate(-12,645,790)"/>
  <rect x="616" y="762" width="58" height="10" rx="4" fill="#37474F" opacity="0.6" transform="rotate(-12,645,790)"/>
  <!-- File 3 - far left -->
  <rect x="200" y="750" width="90" height="120" rx="10" fill="#263238" opacity="0.7" transform="rotate(14,245,810)"/>
  <!-- Attraction lines (force field) -->
  <path d="M 430 700 Q 430 650 440 610" fill="none" stroke="#546E7A" stroke-width="5" stroke-dasharray="10,8" opacity="0.6"/>
  <path d="M 640 730 Q 620 660 560 620" fill="none" stroke="#546E7A" stroke-width="5" stroke-dasharray="10,8" opacity="0.5"/>
  <path d="M 245 750 Q 290 680 370 640" fill="none" stroke="#546E7A" stroke-width="5" stroke-dasharray="10,8" opacity="0.5"/>
</svg>
