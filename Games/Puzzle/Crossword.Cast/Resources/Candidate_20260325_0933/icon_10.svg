<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="7" flood-color="#00000055"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (HOP 가로 / HOT 세로, 교차점 H=(0,0)) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="412" width="196" height="196" fill="#0A1F6B" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#0A1F6B" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#0A1F6B" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#0A1F6B" rx="10"/>
  <!-- 흰 셀 (HOP row 0) -->
  <rect x="212" y="212" width="196" height="196" fill="#E3F2FD" stroke="#00BCD4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="212" width="196" height="196" fill="white" stroke="#00BCD4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- P 셀은 ?로 표시 (비어있는 느낌) -->
  <rect x="612" y="212" width="196" height="196" fill="#263238" stroke="#FFD600" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- 흰 셀 (HOT col 0) -->
  <rect x="212" y="412" width="196" height="196" fill="white" stroke="#00BCD4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="#00BCD4" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- Layer 3: 글자 -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#00BCD4">H</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="white">O</text>
  <!-- 미완성 P 셀: 물음표 -->
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#FFD600">?</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="white">O</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="white">T</text>
  <!-- 클루 번호 -->
  <text x="222" y="228" text-anchor="start" dominant-baseline="hanging" font-family="Arial,sans-serif" font-weight="700" font-size="46" fill="#00BCD4">1</text>
</svg>
