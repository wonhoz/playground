<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b2d42"/>
      <stop offset="100%" style="stop-color:#8d99ae"/>
    </linearGradient>
    <linearGradient id="key_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef233c"/>
      <stop offset="100%" style="stop-color:#d90429"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard body -->
  <rect x="50" y="220" width="412" height="220" rx="20" fill="#1a1a2e"/>
