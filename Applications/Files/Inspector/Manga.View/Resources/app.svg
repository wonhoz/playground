<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
    <radialGradient id="explosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speed lines radiating from center -->
  <g stroke="#FF4500" stroke-width="3" opacity="0.5">
    <line x1="256" y1="256" x2="80" y2="60"/>
    <line x1="256" y1="256" x2="256" y2="40"/>
    <line x1="256" y1="256" x2="432" y2="60"/>
    <line x1="256" y1="256" x2="472" y2="256"/>
    <line x1="256" y1="256" x2="432" y2="452"/>
    <line x1="256" y1="256" x2="256" y2="472"/>
    <line x1="256" y1="256" x2="80" y2="452"/>
    <line x1="256" y1="256" x2="40" y2="256"/>
    <line x1="256" y1="256" x2="160" y2="50"/>
    <line x1="256" y1="256" x2="352" y2="50"/>
    <line x1="256" y1="256" x2="460" y2="160"/>
    <line x1="256" y1="256" x2="460" y2="352"/>
    <line x1="256" y1="256" x2="352" y2="462"/>
    <line x1="256" y1="256" x2="160" y2="462"/>
    <line x1="256" y1="256" x2="52" y2="352"/>
    <line x1="256" y1="256" x2="52" y2="160"/>
  </g>
  <!-- Explosion glow -->
  <circle cx="256" cy="256" r="160" fill="url(#explosion)" opacity="0.8"/>
  <!-- Jagged explosion shape -->
  <polygon points="256,80 280,160 340,120 300,200 380,190 316,248 390,290 310,280 330,360 260,310 256,400 252,310 182,360 202,280 122,290 196,248 132,190 212,200 172,120 232,160" fill="#FFD700" opacity="0.9"/>
  <!-- Inner bright core -->
  <circle cx="256" cy="256" r="50" fill="#FFFACD"/>
  <circle cx="256" cy="256" r="30" fill="white"/>
  <!-- Manga text effect "BOOM" style -->
  <text x="256" y="270" font-family="Arial Black, Arial" font-size="32" fill="#8B0000" text-anchor="middle" font-weight="900">BANG</text>
  <!-- Comic panel border pieces -->
  <rect x="60" y="60" width="80" height="6" rx="3" fill="#FF4500" opacity="0.6"/>
  <rect x="60" y="60" width="6" height="80" rx="3" fill="#FF4500" opacity="0.6"/>
  <rect x="372" y="60" width="80" height="6" rx="3" fill="#FF4500" opacity="0.6"/>
  <rect x="446" y="60" width="6" height="80" rx="3" fill="#FF4500" opacity="0.6"/>
  <rect x="60" y="446" width="80" height="6" rx="3" fill="#FF4500" opacity="0.6"/>
  <rect x="60" y="372" width="6" height="80" rx="3" fill="#FF4500" opacity="0.6"/>
</svg>
