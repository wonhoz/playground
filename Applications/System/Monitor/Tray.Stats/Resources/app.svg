<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tray icon shape -->
  <rect x="60" y="320" width="392" height="6" rx="3" fill="#1E3A4A" opacity="0.8"/>
  <!-- Pulse line -->
  <polyline points="60,280 120,280 150,200 180,340 210,180 240,300 270,240 300,280 330,160 360,290 390,260 420,280 452,280"
    fill="none" stroke="url(#pulse)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- CPU/MEM labels -->
  <text x="80" y="390" font-family="Segoe UI" font-size="34" font-weight="700" fill="#00C9FF" opacity="0.9">CPU</text>
  <text x="220" y="390" font-family="Segoe UI" font-size="34" font-weight="700" fill="#92FE9D" opacity="0.9">MEM</text>
  <text x="360" y="390" font-family="Segoe UI" font-size="34" font-weight="700" fill="#FFD700" opacity="0.9">DSK</text>
  <!-- Tray dots -->
  <circle cx="256" cy="130" r="28" fill="none" stroke="#00C9FF" stroke-width="5" opacity="0.6"/>
  <circle cx="256" cy="130" r="14" fill="#00C9FF" opacity="0.8"/>
  <!-- Mini bars -->
  <rect x="80" y="408" width="50" height="12" rx="3" fill="#00C9FF" opacity="0.7"/>
  <rect x="220" y="408" width="70" height="12" rx="3" fill="#92FE9D" opacity="0.7"/>
  <rect x="360" y="408" width="40" height="12" rx="3" fill="#FFD700" opacity="0.7"/>
  <rect x="80" y="428" width="392" height="3" rx="1.5" fill="#FFFFFF" opacity="0.08"/>
  <rect x="80" y="440" width="392" height="3" rx="1.5" fill="#FFFFFF" opacity="0.05"/>
</svg>
