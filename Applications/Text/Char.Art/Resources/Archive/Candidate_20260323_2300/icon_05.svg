<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#0C4A6E"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Monitor body -->
    <rect x="160" y="200" width="700" height="500" rx="28" fill="#1E3A8A" stroke="#38BDF8" stroke-width="14"/>
    <!-- Screen -->
    <rect x="190" y="230" width="640" height="440" rx="12" fill="#0F172A"/>
    <!-- Monitor stand -->
    <rect x="440" y="700" width="140" height="80" rx="8" fill="#1E3A8A"/>
    <rect x="360" y="770" width="300" height="40" rx="20" fill="#1E40AF" stroke="#38BDF8" stroke-width="8"/>
    <!-- ASCII art on screen - mountain shape -->
    <text x="210" y="295" font-size="18" font-family="monospace" fill="#86EFAC">         .         </text>
    <text x="210" y="325" font-size="18" font-family="monospace" fill="#86EFAC">        @#@        </text>
    <text x="210" y="355" font-size="18" font-family="monospace" fill="#86EFAC">       @###@       </text>
    <text x="210" y="385" font-size="18" font-family="monospace" fill="#86EFAC">      @#####@      </text>
    <text x="210" y="415" font-size="18" font-family="monospace" fill="#86EFAC">     @#######@     </text>
    <text x="210" y="445" font-size="18" font-family="monospace" fill="#86EFAC">    @#########@    </text>
    <text x="210" y="475" font-size="18" font-family="monospace" fill="#86EFAC">   @###########@   </text>
    <text x="210" y="505" font-size="18" font-family="monospace" fill="#86EFAC">  @#############@  </text>
    <text x="210" y="535" font-size="18" font-family="monospace" fill="#86EFAC"> @###############@ </text>
    <text x="210" y="565" font-size="18" font-family="monospace" fill="#86EFAC">@#################@</text>
    <text x="210" y="595" font-size="18" font-family="monospace" fill="#86EFAC">@#################@</text>
    <text x="210" y="625" font-size="18" font-family="monospace" fill="#86EFAC">@#################@</text>
    <!-- Screen reflection highlight -->
    <rect x="190" y="230" width="640" height="20" rx="12" fill="white" opacity="0.08"/>
  </g>
</svg>
