<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Button grid label: A/B/X/Y + shoulder buttons -->
  <!-- Title bar -->
  <rect x="170" y="190" width="684" height="64" rx="16" fill="#059669"/>
  <text x="512" y="236" font-family="Arial,sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Button Mapping</text>
  <!-- L1/L2 buttons top left -->
  <rect x="170" y="280" width="160" height="64" rx="16" fill="#3B82F6"/>
  <text x="250" y="323" font-family="Arial,sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle">L1</text>
  <rect x="170" y="356" width="160" height="64" rx="16" fill="#6366F1"/>
  <text x="250" y="399" font-family="Arial,sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle">L2</text>
  <!-- R1/R2 buttons top right -->
  <rect x="694" y="280" width="160" height="64" rx="16" fill="#3B82F6"/>
  <text x="774" y="323" font-family="Arial,sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle">R1</text>
  <rect x="694" y="356" width="160" height="64" rx="16" fill="#6366F1"/>
  <text x="774" y="399" font-family="Arial,sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle">R2</text>
  <!-- Main button grid 2×2 -->
  <circle cx="380" cy="540" r="90" fill="#22C55E"/>
  <text x="380" y="562" font-family="Arial,sans-serif" font-size="80" fill="#FFFFFF" font-weight="bold" text-anchor="middle">A</text>
  <circle cx="540" cy="540" r="90" fill="#EF4444"/>
  <text x="540" y="562" font-family="Arial,sans-serif" font-size="80" fill="#FFFFFF" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="700" cy="540" r="90" fill="#F59E0B"/>
  <text x="700" y="562" font-family="Arial,sans-serif" font-size="80" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Y</text>
  <circle cx="860" cy="540" r="90" fill="#3B82F6"/>
  <text x="860" y="562" font-family="Arial,sans-serif" font-size="80" fill="#FFFFFF" font-weight="bold" text-anchor="middle">X</text>
  <!-- Remap arrows -->
  <path d="M282,690 L742,690" stroke="#059669" stroke-width="10" stroke-dasharray="20,12"/>
  <polygon points="742,670 780,690 742,710" fill="#059669"/>
  <text x="512" y="790" font-family="Arial,sans-serif" font-size="52" fill="#065F46" font-weight="bold" text-anchor="middle">Remap</text>
</svg>
