  <text x="277" y="460" font-family="Arial Black, sans-serif" font-weight="900" font-size="280" fill="#9C27B0" text-anchor="middle">?</text>

  <!-- Arrow (center) -->
  <rect x="458" y="358" width="108" height="40" rx="20" fill="#7C4DFF" stroke="#311B92" stroke-width="12"/>
  <path d="M 562,330 L 640,378 L 562,426 Z" fill="#7C4DFF" stroke="#311B92" stroke-width="12" stroke-linejoin="round"/>

