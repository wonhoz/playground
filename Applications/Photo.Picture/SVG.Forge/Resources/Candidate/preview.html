<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SVG.Forge — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
  p.desc { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-6px) scale(1.03); border-color: #555; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; }
</style>
</head>
<body>
<h1>SVG.Forge</h1>
<p class="desc">SVG editor and creator — create vector graphics</p>
<div class="grid">
  <div class="card"><img src="candidate_01_vector_pen_tool.svg"/><span>01 · Vector Pen Tool</span></div>
  <div class="card"><img src="candidate_02_bezier_curve_art.svg"/><span>02 · Bezier Curve Art</span></div>
  <div class="card"><img src="candidate_03_anchor_point_tool.svg"/><span>03 · Anchor Point Tool</span></div>
  <div class="card"><img src="candidate_04_svg_path_forge.svg"/><span>04 · SVG Path Forge</span></div>
  <div class="card"><img src="candidate_05_vector_forge_fire.svg"/><span>05 · Vector Forge Fire</span></div>
  <div class="card"><img src="candidate_06_pen_nib_gradient.svg"/><span>06 · Pen Nib Gradient</span></div>
  <div class="card"><img src="candidate_07_bezier_wave_art.svg"/><span>07 · Bezier Wave Art</span></div>
  <div class="card"><img src="candidate_08_vector_shape_craft.svg"/><span>08 · Vector Shape Craft</span></div>
  <div class="card"><img src="candidate_09_anchor_path_glow.svg"/><span>09 · Anchor Path Glow</span></div>
  <div class="card"><img src="candidate_10_svg_diamond_tool.svg"/><span>10 · SVG Diamond Tool</span></div>
</div>
</body>
</html>
