<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#2C1E00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 터미널 창 -->
  <rect x="40" y="60" width="430" height="390" rx="14" fill="#0A0A00" stroke="#FFD54F" stroke-width="2"/>
  <rect x="40" y="60" width="430" height="36" rx="14" fill="#1A1200"/>
  <circle cx="72" cy="78" r="8" fill="#FF5252" opacity="0.8"/>
  <circle cx="100" cy="78" r="8" fill="#FFD740" opacity="0.8"/>
  <circle cx="128" cy="78" r="8" fill="#69F0AE" opacity="0.8"/>
  <text x="256" y="83" font-size="14" text-anchor="middle" fill="#FFB300" font-family="Courier New">JSON Formatter v2.0</text>
  <!-- 터미널 텍스트 (앰버 컬러) -->
  <text x="60" y="125" font-size="16" fill="#FFD54F" font-family="Courier New">$ format input.json</text>
  <text x="60" y="155" font-size="15" fill="#FFB300" font-family="Courier New">{</text>
  <text x="80" y="180" font-size="14" fill="#FFCA28" font-family="Courier New">  "name": "World",</text>
  <text x="80" y="205" font-size="14" fill="#FFCA28" font-family="Courier New">  "version": 3,</text>
  <text x="80" y="230" font-size="14" fill="#FFCA28" font-family="Courier New">  "active": true,</text>
  <text x="80" y="255" font-size="14" fill="#FFCA28" font-family="Courier New">  "tags": [</text>
  <text x="100" y="280" font-size="14" fill="#FFE082" font-family="Courier New">    "json",</text>
  <text x="100" y="305" font-size="14" fill="#FFE082" font-family="Courier New">    "formatter"</text>
  <text x="80" y="330" font-size="14" fill="#FFCA28" font-family="Courier New">  ]</text>
  <text x="60" y="355" font-size="15" fill="#FFB300" font-family="Courier New">}</text>
  <!-- 커서 -->
  <rect x="60" y="375" width="12" height="20" rx="2" fill="#FFD54F"/>
  <!-- Done -->
  <text x="256" y="430" font-size="15" text-anchor="middle" fill="#69F0AE" font-family="Courier New">✓ Formatted successfully</text>
</svg>