    <rect x="150" y="334" width="720" height="66" rx="8" fill="white" opacity="0.05"/>
    <rect x="163" y="348" width="40" height="40" rx="6" fill="#A78BFA"/>
    <text x="218" y="376" font-family="system-ui" font-size="30" font-weight="bold" fill="white">logo.svg</text>
    <text x="800" y="376" text-anchor="end" font-family="system-ui" font-size="26" fill="#93C5FD">48 KB</text>

    <rect x="150" y="410" width="720" height="66" rx="8" fill="white" opacity="0.05"/>
    <rect x="163" y="424" width="40" height="40" rx="6" fill="#34D399"/>
    <text x="218" y="452" font-family="system-ui" font-size="30" font-weight="bold" fill="white">banner.jpg</text>
