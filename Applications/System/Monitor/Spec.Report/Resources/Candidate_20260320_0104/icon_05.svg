<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000810"/>
  <!-- 돋보기+하드웨어: magnifying glass over hardware chip -->
  <!-- Magnifying glass circle -->
  <circle cx="460" cy="460" r="220" fill="none" stroke="#01579B" stroke-width="44"/>
  <!-- Hardware chip inside lens -->
  <rect x="340" y="340" width="240" height="240" rx="20" fill="#01579B"/>
  <rect x="360" y="360" width="200" height="200" rx="14" fill="#000810"/>
  <!-- Chip grid -->
  <line x1="400" y1="360" x2="400" y2="560" stroke="#29B6F6" stroke-width="4"/>
  <line x1="440" y1="360" x2="440" y2="560" stroke="#01579B" stroke-width="3"/>
  <line x1="480" y1="360" x2="480" y2="560" stroke="#01579B" stroke-width="3"/>
  <line x1="520" y1="360" x2="520" y2="560" stroke="#29B6F6" stroke-width="4"/>
  <line x1="360" y1="400" x2="560" y2="400" stroke="#29B6F6" stroke-width="4"/>
  <line x1="360" y1="440" x2="560" y2="440" stroke="#01579B" stroke-width="3"/>
  <line x1="360" y1="480" x2="560" y2="480" stroke="#01579B" stroke-width="3"/>
  <line x1="360" y1="520" x2="560" y2="520" stroke="#29B6F6" stroke-width="4"/>
  <!-- Chip pins -->
  <line x1="400" y1="340" x2="400" y2="320" stroke="#29B6F6" stroke-width="5"/>
  <line x1="460" y1="340" x2="460" y2="320" stroke="#29B6F6" stroke-width="5"/>
  <line x1="520" y1="340" x2="520" y2="320" stroke="#29B6F6" stroke-width="5"/>
  <!-- Magnifier handle -->
  <line x1="640" y1="640" x2="790" y2="790" stroke="#01579B" stroke-width="48" stroke-linecap="round"/>
  <line x1="640" y1="640" x2="790" y2="790" stroke="#29B6F6" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
</svg>