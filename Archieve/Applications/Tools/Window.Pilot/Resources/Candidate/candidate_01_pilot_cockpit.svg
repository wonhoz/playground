<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#001A3A"/>
      <stop offset="100%" stop-color="#000814"/>
    </radialGradient>
    <linearGradient id="hud" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- HUD circle -->
  <circle cx="256" cy="220" r="160" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="220" r="120" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="220" r="80" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.7"/>
  <!-- Crosshair -->
  <line x1="96" y1="220" x2="186" y2="220" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <line x1="326" y1="220" x2="416" y2="220" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <line x1="256" y1="60" x2="256" y2="150" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <line x1="256" y1="290" x2="256" y2="380" stroke="#00D4FF" stroke-width="2" filter="url(#glow)"/>
  <!-- Horizon line -->
  <line x1="136" y1="220" x2="376" y2="220" stroke="#00FF88" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <!-- Altitude indicator -->
  <rect x="60" y="140" width="36" height="160" rx="6" fill="#001A3A" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <rect x="62" y="180" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.7"/>
  <rect x="62" y="196" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.4"/>
  <rect x="62" y="212" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.4"/>
  <rect x="62" y="228" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.4"/>
  <!-- Speed indicator -->
  <rect x="416" y="140" width="36" height="160" rx="6" fill="#001A3A" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <rect x="418" y="210" width="32" height="6" rx="2" fill="#00FF88" opacity="0.7"/>
  <rect x="418" y="226" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.4"/>
  <rect x="418" y="242" width="32" height="6" rx="2" fill="#00D4FF" opacity="0.4"/>
  <!-- Window grid targets -->
  <rect x="176" y="155" width="60" height="50" rx="4" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <rect x="276" y="155" width="60" height="50" rx="4" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <rect x="176" y="220" width="60" height="50" rx="4" fill="none" stroke="#00FF88" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="276" y="220" width="60" height="50" rx="4" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <!-- Autopilot label -->
  <rect x="130" y="390" width="252" height="38" rx="10" fill="#001A3A" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="256" y="414" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#00D4FF" filter="url(#glow)">WINDOW PILOT</text>
  <text x="256" y="470" text-anchor="middle" font-family="Segoe UI" font-size="18" fill="#00FF88" opacity="0.7">AUTO ARRANGE</text>
</svg>
