<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg02)"/>
  <!-- Drop zone dashed rectangle -->
  <rect x="160" y="200" width="704" height="480" rx="30" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="14" stroke-dasharray="36,20"/>
  <!-- Cloud shape -->
  <ellipse cx="512" cy="390" rx="110" ry="75" fill="white"/>
  <ellipse cx="425" cy="415" rx="75" ry="60" fill="white"/>
  <ellipse cx="600" cy="415" rx="75" ry="60" fill="white"/>
  <!-- Down arrow -->
  <line x1="512" y1="460" x2="512" y2="570" stroke="white" stroke-width="52" stroke-linecap="round"/>
  <polygon points="450,545 512,625 574,545" fill="white"/>
  <!-- File icons at bottom -->
  <rect x="250" y="610" width="80" height="96" rx="10" fill="rgba(255,255,255,0.9)"/>
  <text x="290" y="672" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0284C7" text-anchor="middle">PNG</text>
  <rect x="470" y="610" width="80" height="96" rx="10" fill="rgba(255,255,255,0.9)"/>
  <text x="510" y="672" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0284C7" text-anchor="middle">SVG</text>
  <rect x="690" y="610" width="80" height="96" rx="10" fill="rgba(255,255,255,0.9)"/>
  <text x="730" y="672" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0284C7" text-anchor="middle">ICO</text>
  <!-- Drag label -->
  <text x="512" y="840" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">DRAG &amp; DROP</text>
</svg>