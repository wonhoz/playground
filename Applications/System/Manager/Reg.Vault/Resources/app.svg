<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A00"/>
      <stop offset="100%" style="stop-color:#2A1500"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888888"/>
      <stop offset="50%" style="stop-color:#CCCCCC"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#444444"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vault door frame -->
  <rect x="80" y="80" width="352" height="352" rx="20" fill="#333" stroke="#555" stroke-width="6"/>
  <!-- Vault door -->
  <rect x="95" y="95" width="322" height="322" rx="16" fill="url(#metal)"/>
  <rect x="110" y="110" width="292" height="292" rx="12" fill="url(#inner)"/>
  <!-- Bolt handles (4 corners) -->
  <circle cx="130" cy="130" r="16" fill="url(#metal)"/>
  <circle cx="382" cy="130" r="16" fill="url(#metal)"/>
  <circle cx="130" cy="382" r="16" fill="url(#metal)"/>
  <circle cx="382" cy="382" r="16" fill="url(#metal)"/>
  <!-- Combination dial -->
  <circle cx="256" cy="256" r="70" fill="#555" stroke="url(#metal)" stroke-width="6"/>
  <circle cx="256" cy="256" r="56" fill="#333"/>
  <!-- Dial marks -->
  <line x1="256" y1="186" x2="256" y2="196" stroke="#AAA" stroke-width="3"/>
  <line x1="326" y1="256" x2="316" y2="256" stroke="#AAA" stroke-width="3"/>
  <line x1="256" y1="326" x2="256" y2="316" stroke="#AAA" stroke-width="3"/>
  <line x1="186" y1="256" x2="196" y2="256" stroke="#AAA" stroke-width="3"/>
  <!-- Dial pointer -->
  <line x1="256" y1="256" x2="290" y2="222" stroke="#FF6600" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="8" fill="url(#metal)"/>
  <!-- Registry key symbol -->
  <text x="256" y="168" text-anchor="middle" font-family="monospace" font-size="20" fill="#FFAA44">REG</text>
</svg>
