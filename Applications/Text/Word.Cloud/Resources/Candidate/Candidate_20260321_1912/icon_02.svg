    <text x="210" y="645" font-size="42" fill="#80D8FF">Text</text>
    <text x="213" y="740" font-size="33" fill="#B388FF">Data</text>
    <!-- 2열 -->
    <text x="415" y="505" font-size="50" fill="#FFFF00">Hello</text>
    <text x="412" y="608" font-size="65" fill="#64FFDA">Cloud</text>
    <text x="415" y="718" font-size="38" fill="#FF80AB">Love</text>
