<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Puzzle piece left (tab right, blank bottom) -->
  <path d="M160 360 L380 360
    L380 440 Q420 440 420 480 Q420 520 380 520
    L380 600 L160 600 Z"
    fill="#006064" stroke="#00BCD4" stroke-width="12"/>
  <!-- Tab on top of left piece (notch out) -->
  <path d="M220 360 Q220 300 260 300 Q300 300 300 360" fill="#000A0D" stroke="#00BCD4" stroke-width="12"/>
  <!-- Puzzle piece right (notch left, tab top) -->
  <path d="M644 360 L864 360 L864 600 L644 600
    L644 520 Q604 520 604 480 Q604 440 644 440 Z"
    fill="#006064" stroke="#00BCD4" stroke-width="12"/>
  <!-- Tab on top of right piece -->
  <path d="M724 360 Q724 300 764 300 Q804 300 804 360" fill="#00BCD4" opacity="0.6" stroke="#00BCD4" stroke-width="12"/>
  <!-- Merge arrows pointing inward -->
  <polygon points="460,460 500,480 460,500" fill="#00BCD4"/>
  <polygon points="564,460 524,480 564,500" fill="#00BCD4"/>
  <!-- Combined piece indicator glow -->
  <rect x="460" y="440" width="104" height="80" rx="8" fill="#00BCD4" opacity="0.18"/>
  <!-- Data dots on pieces -->
  <circle cx="240" cy="480" r="18" fill="#00BCD4" opacity="0.7"/>
  <circle cx="310" cy="480" r="14" fill="#00BCD4" opacity="0.5"/>
  <circle cx="750" cy="480" r="18" fill="#00BCD4" opacity="0.7"/>
  <circle cx="810" cy="480" r="14" fill="#00BCD4" opacity="0.5"/>
</svg>
