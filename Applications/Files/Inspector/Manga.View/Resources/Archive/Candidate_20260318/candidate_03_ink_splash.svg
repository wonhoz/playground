<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12060e"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="inkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#F472B6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ink splash main body (asymmetric organic shape) -->
  <path d="M256,256
    C 256,256 300,180 340,140
    C 380,100 410,90 430,110
    C 450,130 440,160 420,170
    C 440,165 460,175 455,195
    C 450,215 430,215 415,205
    C 430,220 435,245 415,255
    C 395,265 380,255 375,240
    C 385,265 380,290 360,295
    C 340,300 325,285 330,265
    C 325,285 310,305 290,300
    C 270,295 268,275 275,260
    C 265,280 250,300 230,295
    C 210,290 210,268 225,255
    C 205,265 182,265 175,245
    C 168,225 182,208 200,210
    C 182,200 170,182 178,162
    C 186,142 208,140 220,155
    C 208,135 210,108 230,100
    C 250,92 268,108 265,128
    C 268,108 280,88 300,88
    C 320,88 328,108 318,125
    Z"
    fill="url(#inkCore)" filter="url(#glow)"/>

  <!-- Secondary smaller splashes -->
  <path d="M160,320 C 150,295 125,285 110,300 C 95,315 105,338 125,338 C 108,338 95,352 105,368 C 115,384 135,378 140,362 Z"
    fill="#EC4899" fill-opacity="0.5" filter="url(#softglow)"/>

  <path d="M370,380 C 395,365 415,375 410,395 C 405,415 384,415 375,400 C 380,420 368,438 350,432 C 332,426 333,408 345,400 Z"
    fill="#F472B6" fill-opacity="0.45" filter="url(#softglow)"/>

  <path d="M120,170 C 100,158 85,165 88,182 C 91,199 108,200 118,190 C 110,202 112,218 126,218 C 140,218 144,202 135,192 Z"
    fill="#FB7185" fill-opacity="0.4" filter="url(#softglow)"/>

  <!-- Ink drips -->
  <path d="M320,290 Q322,320 318,360 Q316,380 320,395" fill="none" stroke="#EC4899" stroke-width="8" stroke-opacity="0.6" stroke-linecap="round" filter="url(#softglow)"/>
  <ellipse cx="320" cy="400" rx="10" ry="14" fill="#EC4899" fill-opacity="0.6" filter="url(#softglow)"/>

  <path d="M200,270 Q196,305 192,340 Q190,360 194,375" fill="none" stroke="#F472B6" stroke-width="6" stroke-opacity="0.5" stroke-linecap="round" filter="url(#softglow)"/>
  <ellipse cx="193" cy="382" rx="8" ry="11" fill="#F472B6" fill-opacity="0.5" filter="url(#softglow)"/>

  <path d="M380,230 Q415,228 445,232 Q465,234 478,240" fill="none" stroke="#EC4899" stroke-width="5" stroke-opacity="0.45" stroke-linecap="round"/>
  <ellipse cx="484" cy="242" rx="10" ry="7" fill="#EC4899" fill-opacity="0.5"/>

  <!-- Manga pen nib (the tool) -->
  <path d="M80,80 L130,130 L120,145 L105,140 L80,80 Z" fill="#EC4899" fill-opacity="0.8" filter="url(#glow)"/>
  <line x1="80" y1="80" x2="130" y2="130" stroke="#FB7185" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Splatter dots -->
  <circle cx="165" cy="135" r="5" fill="#EC4899" fill-opacity="0.7" filter="url(#softglow)"/>
  <circle cx="350" cy="120" r="4" fill="#F472B6" fill-opacity="0.6"/>
  <circle cx="420" cy="300" r="6" fill="#EC4899" fill-opacity="0.65" filter="url(#softglow)"/>
  <circle cx="130" cy="390" r="4" fill="#FB7185" fill-opacity="0.55"/>
  <circle cx="440" cy="400" r="5" fill="#EC4899" fill-opacity="0.5"/>
  <circle cx="90" cy="260" r="3" fill="#F472B6" fill-opacity="0.5"/>
  <circle cx="450" cy="160" r="3" fill="#EC4899" fill-opacity="0.4"/>
  <circle cx="280" cy="430" r="5" fill="#F472B6" fill-opacity="0.5" filter="url(#softglow)"/>
  <circle cx="90" cy="340" r="4" fill="#EC4899" fill-opacity="0.4"/>
</svg>
