<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- API 엔드포인트 파동 -->
  <path d="M 80 160 Q 130 120 180 160 Q 230 200 280 160 Q 330 120 380 160 Q 415 185 432 160" fill="none" stroke="#8B5CF6" stroke-width="3" filter="url(#glow)"/>
  <path d="M 80 230 Q 130 190 180 230 Q 230 270 280 230 Q 330 190 380 230 Q 415 255 432 230" fill="none" stroke="#A78BFA" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M 80 300 Q 130 260 180 300 Q 230 340 280 300 Q 330 260 380 300 Q 415 325 432 300" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <path d="M 80 370 Q 130 330 180 370 Q 230 410 280 370 Q 330 330 380 370 Q 415 395 432 370" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
  <!-- 엔드포인트 마커들 -->
  <circle cx="80" cy="160" r="9" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="180" cy="160" r="7" fill="#A78BFA" opacity="0.8"/>
  <circle cx="280" cy="160" r="9" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="380" cy="160" r="7" fill="#A78BFA" opacity="0.8"/>
  <circle cx="432" cy="160" r="7" fill="#8B5CF6"/>
  <!-- HTTP 메서드 레이블 -->
  <text x="80" y="145" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.8">GET</text>
  <text x="180" y="145" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.7">POST</text>
  <text x="280" y="145" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.8">PUT</text>
  <text x="380" y="145" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.7">DEL</text>
  <text x="432" y="145" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace" opacity="0.6">PATCH</text>
  <!-- 응답 구분선 -->
  <rect x="80" y="420" width="352" height="6" rx="3" fill="#8B5CF6" opacity="0.3"/>
  <text x="256" y="458" text-anchor="middle" fill="#8B5CF6" font-size="13" font-family="monospace" opacity="0.7">RESPONSE WAVE</text>
</svg>