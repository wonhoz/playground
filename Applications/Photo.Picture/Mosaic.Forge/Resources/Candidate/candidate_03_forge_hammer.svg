<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A882"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4A1E"/>
    </linearGradient>
    <linearGradient id="lava" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Mosaic tiles being forged -->
  <rect x="60" y="300" width="44" height="44" rx="4" fill="#FF4081" opacity="0.9"/>
  <rect x="112" y="300" width="44" height="44" rx="4" fill="#4ECDC4" opacity="0.9"/>
  <rect x="60" y="352" width="44" height="44" rx="4" fill="#FFEAA7" opacity="0.9"/>
  <rect x="112" y="352" width="44" height="44" rx="4" fill="#96CEB4" opacity="0.9"/>
  <!-- Anvil base -->
  <rect x="180" y="370" width="200" height="60" rx="8" fill="url(#metal)"/>
  <rect x="200" y="340" width="160" height="40" rx="6" fill="#9A7A40"/>
  <!-- Pixelated image on anvil -->
  <rect x="205" y="270" width="30" height="30" rx="3" fill="#FF6B6B"/>
  <rect x="240" y="270" width="30" height="30" rx="3" fill="#4ECDC4"/>
  <rect x="275" y="270" width="30" height="30" rx="3" fill="#FFEAA7"/>
  <rect x="310" y="270" width="30" height="30" rx="3" fill="#DDA0DD"/>
  <!-- Hammer -->
  <rect x="330" y="120" width="50" height="70" rx="8" fill="url(#metal)"/>
  <rect x="350" y="190" width="12" height="130" rx="6" fill="#8B6914"/>
  <!-- Sparks from hammer strike -->
  <circle cx="290" cy="265" r="8" fill="#FFEE00" opacity="0.9"/>
  <circle cx="310" cy="250" r="6" fill="#FF8800" opacity="0.8"/>
  <circle cx="265" cy="255" r="5" fill="#FFEE00" opacity="0.7"/>
  <circle cx="325" cy="270" r="4" fill="#FF4400" opacity="0.6"/>
  <circle cx="280" cy="240" r="7" fill="#FFAA00" opacity="0.8"/>
  <!-- Lava/fire at base -->
  <ellipse cx="280" cy="395" rx="60" ry="15" fill="url(#lava)" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="460" font-family="sans-serif" font-size="20" fill="#C8A882" text-anchor="middle" font-weight="bold">MOSAIC FORGE</text>
</svg>
