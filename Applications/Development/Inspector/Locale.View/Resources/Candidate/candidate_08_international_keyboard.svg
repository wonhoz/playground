<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="kbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d44"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Keyboard body -->
  <rect x="55" y="165" width="400" height="220" rx="18" fill="url(#kbGrad)" stroke="#3a3a5a" stroke-width="2"/>
  <!-- Keyboard highlight -->
  <rect x="55" y="165" width="400" height="30" rx="18" fill="#ffffff" opacity="0.05"/>

  <!-- Row 1 keys - colored to represent different language scripts -->
  <!-- Keys with script symbols represented as colored rectangles -->
  <rect x="72" y="188" width="34" height="30" rx="5" fill="#4776E6" opacity="0.85"/>
  <rect x="112" y="188" width="34" height="30" rx="5" fill="#8E54E9" opacity="0.85"/>
  <rect x="152" y="188" width="34" height="30" rx="5" fill="#ee0979" opacity="0.85"/>
  <rect x="192" y="188" width="34" height="30" rx="5" fill="#f7971e" opacity="0.85"/>
  <rect x="232" y="188" width="34" height="30" rx="5" fill="#ffd200" opacity="0.85"/>
  <rect x="272" y="188" width="34" height="30" rx="5" fill="#56ab2f" opacity="0.85"/>
  <rect x="312" y="188" width="34" height="30" rx="5" fill="#11998e" opacity="0.85"/>
  <rect x="352" y="188" width="34" height="30" rx="5" fill="#56CCF2" opacity="0.85"/>
  <rect x="392" y="188" width="38" height="30" rx="5" fill="#2F80ED" opacity="0.85"/>

  <!-- Script symbols on keys (simplified as abstract shapes) -->
  <!-- Key 1: Latin A-like -->
  <polygon points="89,207 84,215 94,215" fill="#fff" opacity="0.9"/>
  <line x1="86" y1="213" x2="92" y2="213" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Key 2: Cyrillic-like -->
  <path d="M120,198 L120,214 M120,205 Q130,202 130,205 Q130,208 120,208" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Key 3: Arabic-like -->
  <path d="M160,205 Q168,200 168,206 Q168,212 160,210" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Key 4: Chinese/Kanji-like cross -->
  <line x1="204" y1="198" x2="204" y2="214" stroke="#fff" stroke-width="2" opacity="0.9"/>
  <line x1="198" y1="204" x2="210" y2="204" stroke="#fff" stroke-width="2" opacity="0.9"/>
  <!-- Key 5: Hebrew-like -->
  <path d="M240,198 L248,198 L248,206 L240,214" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Key 6: Greek-like -->
  <path d="M280,198 Q288,198 288,205 Q288,214 280,214 M284,205 L284,214" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Key 7: Hangul-like box -->
  <rect x="318" y="199" width="18" height="14" rx="2" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <line x1="327" y1="199" x2="327" y2="213" stroke="#fff" stroke-width="1" opacity="0.7"/>
  <!-- Key 8: Devanagari-like -->
  <path d="M360,198 L370,198 M365,198 L365,214 M360,204 L370,204" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>

  <!-- Row 2 keys -->
  <rect x="72" y="228" width="38" height="30" rx="5" fill="#2d2d44" stroke="#56CCF2" stroke-width="1.5" opacity="0.8"/>
  <rect x="116" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#8E54E9" stroke-width="1.5" opacity="0.8"/>
  <rect x="156" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#ee0979" stroke-width="1.5" opacity="0.8"/>
  <rect x="196" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#f7971e" stroke-width="1.5" opacity="0.8"/>
  <rect x="236" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#ffd200" stroke-width="1.5" opacity="0.8"/>
  <rect x="276" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#56ab2f" stroke-width="1.5" opacity="0.8"/>
  <rect x="316" y="228" width="34" height="30" rx="5" fill="#2d2d44" stroke="#11998e" stroke-width="1.5" opacity="0.8"/>
  <rect x="356" y="228" width="74" height="30" rx="5" fill="#2d2d44" stroke="#56CCF2" stroke-width="1.5" opacity="0.8"/>

  <!-- Row 3 keys -->
  <rect x="72" y="268" width="50" height="30" rx="5" fill="#2d2d44" stroke="#4776E6" stroke-width="1.5" opacity="0.8"/>
  <rect x="128" y="268" width="34" height="30" rx="5" fill="#2d2d44" stroke="#f7971e" stroke-width="1.5" opacity="0.8"/>
  <rect x="168" y="268" width="34" height="30" rx="5" fill="#2d2d44" stroke="#56ab2f" stroke-width="1.5" opacity="0.8"/>
  <rect x="208" y="268" width="34" height="30" rx="5" fill="#2d2d44" stroke="#ee0979" stroke-width="1.5" opacity="0.8"/>
  <rect x="248" y="268" width="34" height="30" rx="5" fill="#2d2d44" stroke="#8E54E9" stroke-width="1.5" opacity="0.8"/>
  <rect x="288" y="268" width="34" height="30" rx="5" fill="#2d2d44" stroke="#ffd200" stroke-width="1.5" opacity="0.8"/>
  <rect x="328" y="268" width="102" height="30" rx="5" fill="#2d2d44" stroke="#56CCF2" stroke-width="1.5" opacity="0.8"/>

  <!-- Row 4 - spacebar row -->
  <rect x="72" y="308" width="60" height="30" rx="5" fill="#2d2d44" stroke="#444" stroke-width="1" opacity="0.8"/>
  <rect x="138" y="308" width="44" height="30" rx="5" fill="#2d2d44" stroke="#444" stroke-width="1" opacity="0.8"/>
  <rect x="188" y="308" width="136" height="30" rx="5" fill="#3a3a5a" stroke="#56CCF2" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <rect x="330" y="308" width="44" height="30" rx="5" fill="#2d2d44" stroke="#444" stroke-width="1" opacity="0.8"/>
  <rect x="380" y="308" width="50" height="30" rx="5" fill="#2d2d44" stroke="#444" stroke-width="1" opacity="0.8"/>

  <!-- Globe icon above keyboard -->
  <circle cx="256" cy="120" r="40" fill="none" stroke="#56CCF2" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="256" cy="120" rx="40" ry="18" fill="none" stroke="#56CCF2" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="80" x2="256" y2="160" stroke="#56CCF2" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="120" r="8" fill="#ffd200" filter="url(#glow)"/>
</svg>
