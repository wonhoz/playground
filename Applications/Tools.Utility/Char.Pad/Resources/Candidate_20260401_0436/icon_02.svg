<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg2)"/>
  <!-- Layer 2: Popup window shadow + body -->
  <rect x="162" y="218" width="730" height="630" rx="28" fill="#4A148C" opacity="0.4"/>
  <rect x="148" y="200" width="730" height="630" rx="28" fill="white"/>
  <!-- Header bar -->
  <rect x="148" y="200" width="730" height="90" rx="28" fill="#7B1FA2"/>
  <rect x="148" y="262" width="730" height="28" fill="#7B1FA2"/>
  <!-- Tab labels in header -->
  <text x="230" y="252" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="white">🕐</text>
  <text x="380" y="252" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="white">⭐</text>
  <text x="530" y="252" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="white">∑</text>
  <text x="680" y="252" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Segoe UI,Arial,sans-serif" fill="white">😀</text>
  <!-- Layer 3: Character grid (2×4) inside popup -->
  <rect x="176" y="318" width="148" height="120" rx="14" fill="#F3E5F5"/>
  <rect x="340" y="318" width="148" height="120" rx="14" fill="#F3E5F5"/>
  <rect x="504" y="318" width="148" height="120" rx="14" fill="#E8F5E9"/>
  <rect x="668" y="318" width="148" height="120" rx="14" fill="#FFF8E1"/>
  <rect x="176" y="454" width="148" height="120" rx="14" fill="#E3F2FD"/>
  <rect x="340" y="454" width="148" height="120" rx="14" fill="#FCE4EC"/>
  <rect x="504" y="454" width="148" height="120" rx="14" fill="#E8EAF6"/>
  <rect x="668" y="454" width="148" height="120" rx="14" fill="#E0F7FA"/>
  <rect x="176" y="590" width="148" height="120" rx="14" fill="#FFF3E0"/>
  <rect x="340" y="590" width="148" height="120" rx="14" fill="#F3E5F5"/>
  <rect x="504" y="590" width="148" height="120" rx="14" fill="#E8F5E9"/>
  <rect x="668" y="590" width="148" height="120" rx="14" fill="#E1F5FE"/>
  <text x="250" y="381" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#7B1FA2">©</text>
  <text x="414" y="381" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#2E7D32">→</text>
  <text x="578" y="381" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#E65100">★</text>
  <text x="742" y="381" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#F57F17">²</text>
  <text x="250" y="517" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#1565C0">€</text>
  <text x="414" y="517" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#AD1457">♪</text>
  <text x="578" y="517" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#4527A0">∞</text>
  <text x="742" y="517" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#00695C">∑</text>
  <text x="250" y="653" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#BF360C">™</text>
  <text x="414" y="653" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#880E4F">±</text>
  <text x="578" y="653" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#1A237E">≠</text>
  <text x="742" y="653" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="#006064">×</text>
</svg>
