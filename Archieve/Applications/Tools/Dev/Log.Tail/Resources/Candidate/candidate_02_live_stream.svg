<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="live" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="100%" stop-color="#ff6090"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40c4ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- LIVE 배지 -->
  <rect x="176" y="80" width="160" height="56" rx="28" fill="url(#live)"/>
  <circle cx="206" cy="108" r="12" fill="white" opacity="0.9"/>
  <!-- 텍스트 영역 (LIVE 텍스트 시뮬) -->
  <rect x="228" y="94" width="90" height="28" rx="4" fill="white" opacity="0.3"/>
  <!-- 스트리밍 로그 파이프 -->
  <rect x="80" y="180" width="352" height="180" rx="12" fill="#0d1117"/>
  <!-- 흐르는 로그 데이터 표현 -->
  <rect x="100" y="200" width="250" height="12" rx="3" fill="url(#stream)" opacity="0.9"/>
  <rect x="100" y="222" width="300" height="12" rx="3" fill="url(#stream)" opacity="0.7"/>
  <rect x="100" y="244" width="220" height="12" rx="3" fill="#f44336" opacity="0.9"/>
  <rect x="100" y="266" width="280" height="12" rx="3" fill="url(#stream)" opacity="0.8"/>
  <rect x="100" y="288" width="260" height="12" rx="3" fill="#ffeb3b" opacity="0.8"/>
  <rect x="100" y="310" width="310" height="12" rx="3" fill="url(#stream)" opacity="0.95"/>
  <rect x="100" y="332" width="235" height="12" rx="3" fill="url(#stream)" opacity="0.5"/>
  <!-- 하단 정보 바 -->
  <rect x="80" y="380" width="352" height="80" rx="12" fill="#111827"/>
  <!-- 바이트 카운터 시각화 -->
  <rect x="100" y="400" width="140" height="18" rx="4" fill="#1565c0"/>
  <rect x="100" y="400" width="98" height="18" rx="4" fill="url(#stream)"/>
  <rect x="100" y="428" width="180" height="18" rx="4" fill="#1b5e20"/>
  <rect x="100" y="428" width="130" height="18" rx="4" fill="#4caf50"/>
  <!-- 전송 화살표 -->
  <polygon points="420,400 400,390 400,410" fill="url(#live)" opacity="0.9"/>
  <polygon points="420,428 400,418 400,438" fill="#4caf50" opacity="0.9"/>
</svg>
