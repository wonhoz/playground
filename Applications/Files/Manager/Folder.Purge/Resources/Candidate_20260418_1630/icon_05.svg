<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <radialGradient id="suck" cx="70%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00ACC1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ACC1" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 흡입 효과 호 -->
    <ellipse cx="780" cy="600" rx="480" ry="420" fill="url(#suck)"/>

    <!-- 청소기 몸통 (오른쪽) -->
    <!-- 본체 -->
    <ellipse cx="780" cy="600" rx="140" ry="100" fill="#00838F"/>
    <!-- 본체 하이라이트 -->
    <ellipse cx="755" cy="570" rx="70" ry="45" fill="#00ACC1" opacity="0.5"/>
    <!-- 호스 연결부 -->
    <rect x="640" y="568" width="100" height="64" rx="16" fill="#006064"/>
    <!-- 호스 -->
    <path d="M 640 600 Q 560 550 480 510 Q 400 470 340 520 Q 280 570 200 560" fill="none" stroke="#00838F" stroke-width="28" stroke-linecap="round"/>
    <!-- 노즐 끝 -->
    <rect x="120" y="530" width="90" height="60" rx="12" fill="#006064"/>

    <!-- 흡입되는 폴더들 (호스 방향으로) -->
    <!-- 폴더 1 (큰, 멀리) -->
    <g transform="translate(200 280) rotate(-12)">
      <rect x="-50" y="0" width="130" height="100" rx="14" fill="#FF7043"/>
      <rect x="-50" y="-28" width="75" height="32" rx="10" fill="#FF7043"/>
      <text x="15" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="40" text-anchor="middle" fill="#FFFFFF" font-weight="700">bin</text>
    </g>

    <!-- 폴더 2 (중간) -->
    <g transform="translate(330 380) rotate(-8)">
      <rect x="-40" y="0" width="110" height="88" rx="12" fill="#EF5350"/>
      <rect x="-40" y="-26" width="64" height="30" rx="9" fill="#EF5350"/>
      <text x="15" y="58" font-family="'Segoe UI',Arial,sans-serif" font-size="36" text-anchor="middle" fill="#FFFFFF" font-weight="700">obj</text>
    </g>

    <!-- 폴더 3 (작은, 가까이) -->
    <g transform="translate(430 470) rotate(-4)">
      <rect x="-30" y="0" width="90" height="72" rx="10" fill="#78909C"/>
      <rect x="-30" y="-22" width="52" height="25" rx="8" fill="#78909C"/>
      <text x="15" y="50" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle" fill="#FFFFFF" font-weight="700">.vs</text>
    </g>

    <!-- 파티클 -->
    <circle cx="260" cy="450" r="10" fill="#FF7043" opacity="0.6"/>
    <circle cx="310" cy="420" r="7" fill="#EF5350" opacity="0.5"/>
    <circle cx="380" cy="440" r="8" fill="#78909C" opacity="0.5"/>
    <circle cx="420" cy="460" r="5" fill="#FF7043" opacity="0.4"/>

    <!-- 타이틀 -->
    <rect x="100" y="820" width="824" height="72" rx="20" fill="#006064"/>
    <text x="512" y="870" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#E0F7FA" text-anchor="middle">🌀 Folder.Purge</text>
  </g>
</svg>
