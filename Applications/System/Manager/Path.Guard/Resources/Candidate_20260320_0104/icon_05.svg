<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
<!-- 컨셉: 눈금 측정자 정렬 -->
<!-- 측정자 (수평) -->
<rect x="160" y="440" width="704" height="100" rx="12" fill="#2E7D32"/>
<!-- 눈금들 -->
<line x1="240" y1="452" x2="240" y2="484" stroke="#66BB6A" stroke-width="12"/>
<line x1="320" y1="452" x2="320" y2="496" stroke="#66BB6A" stroke-width="14"/>
<line x1="400" y1="452" x2="400" y2="484" stroke="#66BB6A" stroke-width="12"/>
<line x1="480" y1="452" x2="480" y2="500" stroke="#66BB6A" stroke-width="16"/>
<line x1="560" y1="452" x2="560" y2="484" stroke="#66BB6A" stroke-width="12"/>
<line x1="640" y1="452" x2="640" y2="496" stroke="#66BB6A" stroke-width="14"/>
<line x1="720" y1="452" x2="720" y2="484" stroke="#66BB6A" stroke-width="12"/>
<line x1="800" y1="452" x2="800" y2="500" stroke="#66BB6A" stroke-width="16"/>
<!-- PATH 항목들 (정렬된 줄) -->
<rect x="200" y="280" width="280" height="40" rx="8" fill="#1A2A1A" stroke="#2E7D32" stroke-width="14"/>
<circle cx="200" cy="300" r="14" fill="#66BB6A"/>
<rect x="200" y="340" width="400" height="40" rx="8" fill="#1A2A1A" stroke="#2E7D32" stroke-width="14"/>
<circle cx="200" cy="360" r="14" fill="#66BB6A"/>
<!-- 맞지 않는 항목 (빨간 표시 → 녹색 수정) -->
<rect x="200" y="600" width="520" height="40" rx="8" fill="#1A2A1A" stroke="#66BB6A" stroke-width="14" stroke-dasharray="14 8"/>
<circle cx="200" cy="620" r="14" fill="#2E7D32"/>
<!-- 수정 화살표 -->
<path d="M 740" y1="620" x2="840" y2="620" fill="none"/>
<line x1="740" y1="620" x2="820" y2="620" stroke="#66BB6A" stroke-width="20" stroke-linecap="round"/>
<path d="M 788 590 L 824 620 L 788 650" fill="none" stroke="#66BB6A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 수직 측정자 (왼쪽) -->
<rect x="140" y="200" width="60" height="600" rx="12" fill="#2E7D32" opacity="0.5"/>
<line x1="152" y1="300" x2="184" y2="300" stroke="#66BB6A" stroke-width="10" opacity="0.7"/>
<line x1="152" y1="420" x2="192" y2="420" stroke="#66BB6A" stroke-width="12" opacity="0.7"/>
<line x1="152" y1="540" x2="184" y2="540" stroke="#66BB6A" stroke-width="10" opacity="0.7"/>
<line x1="152" y1="660" x2="192" y2="660" stroke="#66BB6A" stroke-width="12" opacity="0.7"/>
</svg>
