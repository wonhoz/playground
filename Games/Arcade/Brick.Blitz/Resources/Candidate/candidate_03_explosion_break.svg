<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0500"/>
      <stop offset="100%" stop-color="#2D0A00"/>
    </linearGradient>
    <radialGradient id="exp" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#1A0500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Broken bricks scattered -->
  <rect x="80" y="95" width="70" height="32" rx="4" fill="#CC4400" transform="rotate(-5 115 111)"/>
  <rect x="170" y="88" width="70" height="32" rx="4" fill="#DD5500" transform="rotate(3 205 104)"/>
  <rect x="330" y="92" width="70" height="32" rx="4" fill="#CC4400" transform="rotate(-8 365 108)"/>
  <rect x="80" y="145" width="70" height="32" rx="4" fill="#BB3300" transform="rotate(4 115 161)"/>
  <rect x="350" y="148" width="70" height="32" rx="4" fill="#DD5500" transform="rotate(-3 385 164)"/>
  <!-- Brick fragments -->
  <rect x="220" y="100" width="30" height="18" rx="3" fill="#FF6600" transform="rotate(25 235 109)"/>
  <rect x="260" y="90" width="24" height="16" rx="3" fill="#FF4400" transform="rotate(-15 272 98)"/>
  <rect x="200" y="135" width="28" height="16" rx="3" fill="#FF8800" transform="rotate(35 214 143)"/>
  <rect x="290" y="125" width="22" height="14" rx="3" fill="#FF5500" transform="rotate(-20 301 132)"/>
  <!-- Explosion center -->
  <circle cx="256" cy="190" r="80" fill="url(#exp)"/>
  <!-- Explosion rays -->
  <line x1="256" y1="110" x2="256" y2="80" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <line x1="313" y1="133" x2="336" y2="110" stroke="#FF8C00" stroke-width="3" opacity="0.7"/>
  <line x1="336" y1="190" x2="366" y2="190" stroke="#FF4500" stroke-width="3" opacity="0.7"/>
  <line x1="199" y1="133" x2="176" y2="110" stroke="#FF8C00" stroke-width="3" opacity="0.7"/>
  <line x1="176" y1="190" x2="146" y2="190" stroke="#FF4500" stroke-width="3" opacity="0.7"/>
  <!-- Paddle -->
  <rect x="156" y="390" width="140" height="22" rx="11" fill="#FF6600"/>
  <text x="256" y="460" font-family="Arial" font-size="26" font-weight="bold" fill="#FF6600" text-anchor="middle">Brick.Blitz</text>
</svg>
