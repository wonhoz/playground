  <line x1="220" y1="266" x2="556" y2="266" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="308" x2="556" y2="308" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="350" x2="556" y2="350" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
