<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 배경: 따뜻한 아이보리 -->
    <radialGradient id="bg1" cx="40%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#FFE4B5"/>
    </radialGradient>
    <!-- 초록 배지 그라데이션 -->
    <radialGradient id="greenBadge" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#15803D"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: 따뜻한 아이보리 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- 바닥선 (공간/장면감 암시) -->
  <rect x="130" y="826" width="764" height="4" rx="2" fill="#D4A574" opacity="0.30"/>
  <!-- 바닥 그림자 -->
  <ellipse cx="460" cy="826" rx="200" ry="12" fill="#C89050" opacity="0.14"/>

  <!-- Layer 2: 의자 실루엣 (딥 앰버 브라운, 왼쪽 중앙 배치) -->
  <!-- 등받이 -->
  <rect x="330" y="214" width="258" height="296" rx="34" fill="#3A2010"/>
  <!-- 등받이 하이라이트 (좌측 빛 반사) -->
  <rect x="348" y="232" width="82" height="238" rx="22" fill="white" opacity="0.09"/>
  <!-- 등받이 중앙 세로 스티치 -->
  <line x1="459" y1="232" x2="459" y2="494" stroke="#5C3A1E" stroke-width="6" stroke-linecap="round" opacity="0.40"/>
  <!-- 등받이 하단 패딩 라인 -->
  <line x1="348" y1="440" x2="570" y2="440" stroke="#5C3A1E" stroke-width="5" stroke-linecap="round" opacity="0.30"/>

  <!-- 시트 (등받이보다 넓음) -->
  <rect x="268" y="500" width="384" height="120" rx="24" fill="#3A2010"/>
  <!-- 시트 전면 엣지 (약간 어둡게) -->
  <rect x="268" y="594" width="384" height="26" rx="13" fill="#1E0E04" opacity="0.45"/>

  <!-- 중앙 기둥 -->
  <rect x="436" y="620" width="48" height="148" rx="12" fill="#26160A"/>

  <!-- 바퀴 베이스 (타원형) -->
  <ellipse cx="460" cy="792" rx="152" ry="24" fill="#26160A"/>
  <!-- 바퀴 5개 포인트 -->
  <circle cx="308" cy="790" r="17" fill="#1A0E06"/>
  <circle cx="384" cy="812" r="14" fill="#1A0E06"/>
  <circle cx="460" cy="814" r="14" fill="#1A0E06"/>
  <circle cx="536" cy="812" r="14" fill="#1A0E06"/>
  <circle cx="612" cy="790" r="17" fill="#1A0E06"/>

  <!-- Layer 3: 초록 Active 배지 (오른쪽 상단) -->
  <!-- 배지 외곽 글로우 3중 -->
  <circle cx="718" cy="268" r="126" fill="#22C55E" opacity="0.14"/>
  <circle cx="718" cy="268" r="100" fill="#22C55E" opacity="0.22"/>
  <circle cx="718" cy="268" r="80" fill="#22C55E" opacity="0.30"/>
  <!-- 배지 본체 -->
  <circle cx="718" cy="268" r="78" fill="url(#greenBadge)"/>
  <!-- 배지 흰색 테두리 (배경과 구분) -->
  <circle cx="718" cy="268" r="78" fill="none" stroke="white" stroke-width="11" opacity="0.50"/>
  <!-- 체크마크 (흰색) -->
  <path d="M 681,270 L 706,296 L 760,232"
        fill="none" stroke="white" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
