  <polygon points="170,300 176,286 183,300 169,291 183,291" fill="#FFD9B3"/>
  <!-- Title text -->
  <text x="230" y="120" font-family="sans-serif" font-size="14" fill="#9B59B6" text-anchor="middle" font-weight="bold">My Notepad</text>
  <!-- Text scribbles -->
  <rect x="138" y="140" width="80" height="6" rx="3" fill="#B388FF" opacity="0.5"/>
  <rect x="138" y="160" width="110" height="5" rx="2.5" fill="#64B5F6" opacity="0.4"/>
  <rect x="138" y="178" width="90" height="5" rx="2.5" fill="#81C784" opacity="0.4"/>
  <rect x="138" y="198" width="100" height="5" rx="2.5" fill="#FFB74D" opacity="0.4"/>
