<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="sky11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip11">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg11)"/>
  <rect width="1024" height="1024" rx="190" fill="url(#sky11)"/>

  <!-- 별 -->
  <g fill="#FFFFFF" opacity="0.4">
    <circle cx="120" cy="120" r="5"/>
    <circle cx="900" cy="100" r="4"/>
    <circle cx="200" cy="220" r="3"/>
    <circle cx="800" cy="200" r="3"/>
    <circle cx="950" cy="300" r="4"/>
  </g>

  <!-- 지평선 -->
  <rect x="0" y="680" width="1024" height="344" fill="#172554" clip-path="url(#clip11)"/>
  <line x1="0" y1="680" x2="1024" y2="680" stroke="#3B82F6" stroke-width="6"/>

  <!-- 랜드마크들 -->

  <!-- 에펠탑 (좌측) -->
  <g fill="#93C5FD" clip-path="url(#clip11)">
    <polygon points="280,680 300,680 310,560 270,560"/>
    <polygon points="270,560 310,560 320,460 260,460"/>
    <polygon points="260,460 320,460 340,380 240,380"/>
    <polygon points="240,380 340,380 360,300 220,300"/>
    <!-- 첨탑 -->
    <rect x="286" y="220" width="28" height="82" rx="6"/>
    <!-- 가로대 -->
    <rect x="245" y="440" width="110" height="14" rx="4"/>
    <rect x="225" y="555" width="150" height="14" rx="4"/>
  </g>

  <!-- 자유의 여신상 (중앙 약간 왼쪽) -->
  <g fill="#93C5FD" clip-path="url(#clip11)">
    <!-- 받침대 -->
    <rect x="460" y="600" width="90" height="80" rx="6"/>
    <!-- 몸체 -->
    <rect x="474" y="460" width="62" height="142" rx="8"/>
    <!-- 머리 -->
    <circle cx="505" cy="430" r="36"/>
    <!-- 왕관 -->
    <polygon points="505,394 495,370 510,385 505,360 515,385 520,370" fill="#FDE68A"/>
    <!-- 횃불 팔 -->
    <line x1="505" y1="490" x2="560" y2="420" stroke="#93C5FD" stroke-width="16" stroke-linecap="round"/>
    <!-- 횃불 -->
    <ellipse cx="568" cy="408" rx="16" ry="24" fill="#FDE68A"/>
  </g>

  <!-- 타지마할 (우측) -->
  <g fill="#93C5FD" clip-path="url(#clip11)">
    <!-- 기단 -->
    <rect x="660" y="600" width="180" height="80" rx="6"/>
    <!-- 중앙 돔 -->
    <ellipse cx="750" cy="580" rx="52" ry="60"/>
    <!-- 첨탑 -->
    <rect x="744" y="448" width="12" height="70" rx="4"/>
    <ellipse cx="750" cy="448" rx="14" ry="20"/>
    <!-- 측면 미나렛 -->
    <rect x="668" y="520" width="16" height="80" rx="4"/>
    <ellipse cx="676" cy="520" rx="10" ry="16"/>
    <rect x="820" y="520" width="16" height="80" rx="4"/>
    <ellipse cx="828" cy="520" rx="10" ry="16"/>
    <!-- 아치 -->
    <path d="M 692 600 Q 692 560 750 556 Q 808 560 808 600" fill="#1E3A8A"/>
  </g>

  <!-- 피라미드 (우측 끝) -->
  <g clip-path="url(#clip11)">
    <polygon points="940,680 1010,680 975,560" fill="#BFDBFE"/>
    <polygon points="910,680 990,680 950,580" fill="#93C5FD"/>
  </g>

  <!-- 상단 텍스트 -->
  <text x="512" y="180" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
        text-anchor="middle" fill="#FFFFFF" letter-spacing="2">LANDMARKS</text>
  <text x="512" y="250" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#93C5FD">Can you name them all?</text>
</svg>
