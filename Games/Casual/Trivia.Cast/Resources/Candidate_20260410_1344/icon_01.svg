<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="card01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="shadow01">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000003A"/>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: 4 answer buttons in 2x2 grid -->
  <!-- Top-left A -->
  <rect x="130" y="200" width="340" height="240" rx="22" fill="url(#card01)" filter="url(#shadow01)"/>
  <rect x="130" y="200" width="70" height="240" rx="22" fill="#FFD54F"/>
  <rect x="178" y="200" width="22" height="240" fill="#FFD54F"/>
  <text x="165" y="340" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#E65100" text-anchor="middle" dominant-baseline="middle">A</text>
  <!-- Top-right B -->
  <rect x="554" y="200" width="340" height="240" rx="22" fill="url(#card01)" filter="url(#shadow01)"/>
  <rect x="554" y="200" width="70" height="240" rx="22" fill="#F48FB1"/>
  <rect x="602" y="200" width="22" height="240" fill="#F48FB1"/>
  <text x="589" y="340" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#880E4F" text-anchor="middle" dominant-baseline="middle">B</text>
  <!-- Bottom-left C -->
  <rect x="130" y="584" width="340" height="240" rx="22" fill="url(#card01)" filter="url(#shadow01)"/>
  <rect x="130" y="584" width="70" height="240" rx="22" fill="#A5D6A7"/>
  <rect x="178" y="584" width="22" height="240" fill="#A5D6A7"/>
  <text x="165" y="724" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#1B5E20" text-anchor="middle" dominant-baseline="middle">C</text>
  <!-- Bottom-right D -->
  <rect x="554" y="584" width="340" height="240" rx="22" fill="url(#card01)" filter="url(#shadow01)"/>
  <rect x="554" y="584" width="70" height="240" rx="22" fill="#CE93D8"/>
  <rect x="602" y="584" width="22" height="240" fill="#CE93D8"/>
  <text x="589" y="724" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#4A148C" text-anchor="middle" dominant-baseline="middle">D</text>
  <!-- Layer 3: Gold accent star top center -->
  <polygon points="512,80 530,135 588,135 541,168 558,224 512,192 466,224 483,168 436,135 494,135" fill="#FFD700"/>
</svg>
