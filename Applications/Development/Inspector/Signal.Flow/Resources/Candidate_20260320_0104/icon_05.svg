<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Floodgate / sluice gate control -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Channel walls -->
  <rect x="160" y="300" width="140" height="440" rx="12" fill="#1B5E20"/>
  <rect x="724" y="300" width="140" height="440" rx="12" fill="#1B5E20"/>
  <!-- Gate panel (raised = open) -->
  <rect x="300" y="200" width="424" height="100" rx="16" fill="#33691E"/>
  <!-- Gate panel detail lines -->
  <line x1="320" y1="230" x2="704" y2="230" stroke="#558B2F" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="260" x2="704" y2="260" stroke="#558B2F" stroke-width="8" stroke-linecap="round"/>
  <!-- Gate handle / lift mechanism -->
  <rect x="484" y="140" width="56" height="68" rx="8" fill="#558B2F"/>
  <rect x="496" y="120" width="32" height="30" rx="6" fill="#76FF03"/>
  <!-- Signal flow through open gate (flowing particles) -->
  <circle cx="350" cy="560" r="18" fill="#76FF03" opacity="0.9"/>
  <circle cx="440" cy="520" r="14" fill="#558B2F" opacity="0.8"/>
  <circle cx="512" cy="580" r="18" fill="#76FF03" opacity="0.85"/>
  <circle cx="600" cy="530" r="14" fill="#558B2F" opacity="0.75"/>
  <circle cx="680" cy="570" r="18" fill="#76FF03" opacity="0.9"/>
  <!-- Flow direction arrows -->
  <path d="M 280 545 Q 512 490 744 545" fill="none" stroke="#33691E" stroke-width="8" stroke-dasharray="16,10"/>
  <!-- Gate open indicator light -->
  <circle cx="512" cy="350" r="28" fill="#76FF03" opacity="0.8"/>
  <circle cx="512" cy="350" r="18" fill="#CCFF90"/>
</svg>
