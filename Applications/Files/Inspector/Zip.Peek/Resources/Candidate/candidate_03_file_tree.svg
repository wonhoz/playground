<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="zipIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="fileIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ZIP 파일 루트 아이콘 -->
  <rect x="64" y="96" width="56" height="68" rx="6" fill="url(#zipIcon)"/>
  <polygon points="108,96 120,96 120,112 108,112" fill="#92400e"/>
  <text x="92" y="135" font-family="Arial" font-weight="bold" font-size="14" fill="white" text-anchor="middle">ZIP</text>
  <text x="92" y="153" font-family="Arial" font-size="10" fill="#fde68a" text-anchor="middle">archive</text>
  <!-- 트리 연결선 -->
  <line x1="92" y1="164" x2="92" y2="196" stroke="#475569" stroke-width="2"/>
  <line x1="92" y1="196" x2="130" y2="196" stroke="#475569" stroke-width="2"/>
  <line x1="92" y1="196" x2="92" y2="270" stroke="#475569" stroke-width="2"/>
  <line x1="92" y1="270" x2="130" y2="270" stroke="#475569" stroke-width="2"/>
  <line x1="92" y1="270" x2="92" y2="344" stroke="#475569" stroke-width="2"/>
  <line x1="92" y1="344" x2="130" y2="344" stroke="#475569" stroke-width="2"/>
  <!-- 파일 1 -->
  <rect x="130" y="174" width="46" height="54" rx="5" fill="url(#fileIcon)"/>
  <polygon points="164,174 176,174 176,188 164,188" fill="#1d4ed8"/>
  <text x="153" y="207" font-family="Arial" font-size="9" fill="#bfdbfe" text-anchor="middle">readme</text>
  <text x="153" y="219" font-family="Arial" font-size="9" fill="#93c5fd" text-anchor="middle">.txt</text>
  <!-- 파일 2 (큰 파일) -->
  <rect x="130" y="248" width="46" height="54" rx="5" fill="#166534"/>
  <polygon points="164,248 176,248 176,262 164,262" fill="#14532d"/>
  <text x="153" y="281" font-family="Arial" font-size="9" fill="#bbf7d0" text-anchor="middle">data</text>
  <text x="153" y="293" font-family="Arial" font-size="9" fill="#86efac" text-anchor="middle">.csv</text>
  <!-- 폴더 -->
  <rect x="130" y="322" width="62" height="54" rx="5" fill="#92400e"/>
  <path d="M130,322 L130,310 L162,310 L174,322Z" fill="#78350f"/>
  <text x="161" y="356" font-family="Arial" font-size="9" fill="#fde68a" text-anchor="middle">assets/</text>
  <!-- 폴더 하위 연결 -->
  <line x1="192" y1="355" x2="220" y2="355" stroke="#475569" stroke-width="2"/>
  <line x1="220" y1="330" x2="220" y2="380" stroke="#475569" stroke-width="2"/>
  <line x1="220" y1="330" x2="256" y2="330" stroke="#475569" stroke-width="2"/>
  <line x1="220" y1="380" x2="256" y2="380" stroke="#475569" stroke-width="2"/>
  <!-- 하위 파일들 -->
  <rect x="256" y="312" width="40" height="38" rx="4" fill="#7c3aed"/>
  <text x="276" y="336" font-family="Arial" font-size="8" fill="#e9d5ff" text-anchor="middle">.png</text>
  <rect x="256" y="360" width="40" height="38" rx="4" fill="#7c3aed"/>
  <text x="276" y="384" font-family="Arial" font-size="8" fill="#e9d5ff" text-anchor="middle">.jpg</text>
  <!-- 크기 정보 -->
  <rect x="330" y="130" width="130" height="84" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="395" y="155" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">Files: 4</text>
  <text x="395" y="175" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">Folders: 1</text>
  <text x="395" y="200" font-family="'Courier New',monospace" font-weight="bold" font-size="14" fill="#38bdf8" text-anchor="middle">18.4 MB</text>
</svg>
