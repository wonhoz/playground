<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Timeline event markers -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Timeline axis -->
  <line x1="140" y1="512" x2="884" y2="512" stroke="#33691E" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrow at end -->
  <polygon points="900,512 862,488 862,536" fill="#558B2F"/>
  <!-- Tick marks on timeline -->
  <line x1="220" y1="480" x2="220" y2="544" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <line x1="370" y1="480" x2="370" y2="544" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <line x1="512" y1="480" x2="512" y2="544" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <line x1="654" y1="480" x2="654" y2="544" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="480" x2="800" y2="544" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <!-- Event dots above timeline -->
  <circle cx="220" cy="420" r="22" fill="#558B2F"/>
  <circle cx="220" cy="420" r="14" fill="#76FF03"/>
  <line x1="220" y1="442" x2="220" y2="480" stroke="#558B2F" stroke-width="6"/>
  <!-- Larger event -->
  <circle cx="512" cy="360" r="30" fill="#1B5E20"/>
  <circle cx="512" cy="360" r="20" fill="#76FF03"/>
  <circle cx="512" cy="360" r="10" fill="#CCFF90"/>
  <line x1="512" y1="390" x2="512" y2="480" stroke="#558B2F" stroke-width="6"/>
  <!-- Small event -->
  <circle cx="654" cy="430" r="18" fill="#558B2F"/>
  <circle cx="654" cy="430" r="10" fill="#76FF03"/>
  <line x1="654" y1="448" x2="654" y2="480" stroke="#558B2F" stroke-width="6"/>
  <!-- Event below timeline -->
  <circle cx="370" cy="600" r="22" fill="#33691E"/>
  <circle cx="370" cy="600" r="12" fill="#558B2F"/>
  <line x1="370" y1="544" x2="370" y2="578" stroke="#558B2F" stroke-width="6"/>
  <!-- Time label areas (abstract) -->
  <rect x="140" y="660" width="120" height="8" rx="4" fill="#33691E" opacity="0.5"/>
  <rect x="290" y="660" width="80" height="8" rx="4" fill="#33691E" opacity="0.4"/>
  <rect x="432" y="660" width="100" height="8" rx="4" fill="#33691E" opacity="0.5"/>
</svg>
