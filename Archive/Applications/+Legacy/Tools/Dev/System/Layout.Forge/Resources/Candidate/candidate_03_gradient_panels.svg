<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <linearGradient id="panel1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="100%" stop-color="#3DC887"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="panel4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000040"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Drag handle dots top -->
  <circle cx="256" cy="60" r="5" fill="white" opacity="0.5"/>
  <circle cx="276" cy="60" r="5" fill="white" opacity="0.5"/>
  <circle cx="236" cy="60" r="5" fill="white" opacity="0.5"/>
  <!-- Layout panels with gaps (drag-n-drop style) -->
  <!-- Large panel top-left -->
  <rect x="72" y="80" width="220" height="150" rx="12" fill="url(#panel1)" filter="url(#shadow)"/>
  <rect x="88" y="104" width="120" height="12" rx="6" fill="white" opacity="0.4"/>
  <rect x="88" y="124" width="90" height="10" rx="5" fill="white" opacity="0.3"/>
  <rect x="88" y="142" width="100" height="10" rx="5" fill="white" opacity="0.3"/>
  <!-- Small panel top-right -->
  <rect x="308" y="80" width="132" height="150" rx="12" fill="url(#panel2)" filter="url(#shadow)"/>
  <circle cx="374" cy="144" r="36" fill="white" opacity="0.25"/>
  <text x="374" y="152" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="white" font-weight="bold">UI</text>
  <!-- Bottom left panel -->
  <rect x="72" y="248" width="132" height="184" rx="12" fill="url(#panel3)" filter="url(#shadow)"/>
  <rect x="88" y="268" width="100" height="60" rx="8" fill="white" opacity="0.2"/>
  <rect x="88" y="340" width="80" height="12" rx="6" fill="white" opacity="0.35"/>
  <rect x="88" y="360" width="60" height="10" rx="5" fill="white" opacity="0.25"/>
  <!-- Bottom right panel -->
  <rect x="220" y="248" width="220" height="184" rx="12" fill="url(#panel4)" filter="url(#shadow)"/>
  <rect x="236" y="268" width="188" height="12" rx="6" fill="white" opacity="0.4"/>
  <rect x="236" y="290" width="150" height="10" rx="5" fill="white" opacity="0.3"/>
  <rect x="236" y="308" width="170" height="10" rx="5" fill="white" opacity="0.3"/>
  <rect x="236" y="340" width="80" height="32" rx="8" fill="white" opacity="0.3"/>
  <!-- Resize corner handles -->
  <circle cx="440" cy="432" r="8" fill="white" opacity="0.5"/>
  <path d="M436 432 L440 428 L444 432 L440 436 Z" fill="white" opacity="0.8"/>
</svg>
