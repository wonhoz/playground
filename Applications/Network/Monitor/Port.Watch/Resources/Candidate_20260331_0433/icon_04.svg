<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 하늘 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 망원경 (감시) -->
  <!-- 망원경 몸통 -->
  <ellipse cx="512" cy="400" rx="340" ry="140" fill="#006064" transform="rotate(-15 512 400)"/>
  <ellipse cx="512" cy="400" rx="300" ry="110" fill="#00838F" transform="rotate(-15 512 400)"/>
  <!-- 렌즈 (왼쪽) -->
  <ellipse cx="220" cy="480" rx="100" ry="100" fill="#00BCD4"/>
  <ellipse cx="220" cy="480" rx="70" ry="70" fill="#E0F7FA"/>
  <ellipse cx="220" cy="480" rx="40" ry="40" fill="#006064"/>
  <!-- 렌즈 (오른쪽) -->
  <ellipse cx="800" cy="330" rx="80" ry="80" fill="#00BCD4"/>
  <ellipse cx="800" cy="330" rx="55" ry="55" fill="#E0F7FA"/>
  <ellipse cx="800" cy="330" rx="30" ry="30" fill="#006064"/>
  <!-- 삼각대 -->
  <line x1="512" y1="540" x2="360" y2="820" stroke="#5D4037" stroke-width="24" stroke-linecap="round"/>
  <line x1="512" y1="540" x2="664" y2="820" stroke="#5D4037" stroke-width="24" stroke-linecap="round"/>
  <line x1="512" y1="540" x2="512" y2="820" stroke="#5D4037" stroke-width="20" stroke-linecap="round"/>
  <line x1="360" y1="820" x2="664" y2="820" stroke="#5D4037" stroke-width="16" stroke-linecap="round"/>
  <!-- Layer 3: 렌즈 안 포트 번호 (감시 대상) -->
  <text x="220" y="498" font-family="'Consolas', monospace" font-weight="700" font-size="36" fill="#80DEEA" text-anchor="middle">:443</text>
  <!-- 포트 배지들 -->
  <rect x="700" y="720" width="200" height="72" rx="16" fill="#FF6F00"/>
  <text x="800" y="772" font-family="'Consolas', monospace" font-weight="700" font-size="52" fill="white" text-anchor="middle">:8080</text>
</svg>
