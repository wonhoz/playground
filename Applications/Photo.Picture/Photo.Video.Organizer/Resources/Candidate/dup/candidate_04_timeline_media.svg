<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="50%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline line -->
  <rect x="60" y="248" width="392" height="6" rx="3" fill="url(#line)" filter="url(#glow)"/>
  <!-- Timeline nodes -->
  <circle cx="120" cy="251" r="10" fill="#a29bfe" filter="url(#glow)"/>
  <circle cx="220" cy="251" r="10" fill="#fd79a8" filter="url(#glow)"/>
  <circle cx="320" cy="251" r="10" fill="#fdcb6e" filter="url(#glow)"/>
  <circle cx="400" cy="251" r="10" fill="#55efc4" filter="url(#glow)"/>
  <!-- Photo cards above timeline -->
  <rect x="88" y="140" width="68" height="90" rx="6" fill="#a29bfe" opacity="0.5"/>
  <circle cx="122" cy="166" r="14" fill="white" opacity="0.3"/>
  <path d="M88 216 L108 196 L124 208 L140 196 L156 216 Z" fill="white" opacity="0.3"/>
  <rect x="188" y="120" width="68" height="110" rx="6" fill="#fd79a8" opacity="0.5"/>
  <circle cx="222" cy="148" r="14" fill="white" opacity="0.3"/>
  <!-- Video cards below timeline -->
  <rect x="288" y="270" width="68" height="90" rx="6" fill="#fdcb6e" opacity="0.5"/>
  <polygon points="310,296 336,310 310,324" fill="white" opacity="0.5"/>
  <rect x="368" y="280" width="68" height="80" rx="6" fill="#55efc4" opacity="0.5"/>
  <polygon points="390,300 416,314 390,328" fill="white" opacity="0.5"/>
  <!-- Connector lines -->
  <line x1="122" y1="230" x2="122" y2="241" stroke="#a29bfe" stroke-width="2" opacity="0.6"/>
  <line x1="222" y1="230" x2="222" y2="241" stroke="#fd79a8" stroke-width="2" opacity="0.6"/>
  <line x1="320" y1="261" x2="320" y2="270" stroke="#fdcb6e" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="261" x2="400" y2="280" stroke="#55efc4" stroke-width="2" opacity="0.6"/>
</svg>