<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large command symbol center -->
  <path d="M196 256 Q196 216 216 196 Q236 176 256 196 Q276 176 296 196 Q316 216 316 256 Q316 296 296 316 Q276 336 256 316 Q236 336 216 316 Q196 296 196 256 Z" fill="none" stroke="#ef4444" stroke-width="6" opacity="0.2"/>
  <!-- Command key symbol (⌘ like) -->
  <rect x="230" y="230" width="52" height="52" rx="8" fill="none" stroke="#ef4444" stroke-width="5"/>
  <circle cx="216" cy="216" r="14" fill="none" stroke="#ef4444" stroke-width="5"/>
  <circle cx="296" cy="216" r="14" fill="none" stroke="#ef4444" stroke-width="5"/>
  <circle cx="216" cy="296" r="14" fill="none" stroke="#ef4444" stroke-width="5"/>
  <circle cx="296" cy="296" r="14" fill="none" stroke="#ef4444" stroke-width="5"/>
  <line x1="216" y1="216" x2="230" y2="230" stroke="#ef4444" stroke-width="5"/>
  <line x1="296" y1="216" x2="282" y2="230" stroke="#ef4444" stroke-width="5"/>
  <line x1="216" y1="296" x2="230" y2="282" stroke="#ef4444" stroke-width="5"/>
  <line x1="296" y1="296" x2="282" y2="282" stroke="#ef4444" stroke-width="5"/>
  <!-- Keyboard keys arranged around command symbol -->
