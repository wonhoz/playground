<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg05)"/>
  <!-- 포맷 카드들이 fan처럼 펼쳐짐 -->
  <!-- 카드 5 (맨 뒤, SVG) — 왼쪽 회전 -->
  <g transform="rotate(-30 512 680)">
    <rect x="362" y="290" width="300" height="390" rx="22" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="6"/>
    <rect x="382" y="310" width="260" height="160" rx="12" fill="#FCA5A5" opacity="0.4"/>
    <text x="512" y="570" font-family="Arial Black" font-weight="900" font-size="58" fill="#DC2626" text-anchor="middle">SVG</text>
  </g>
  <!-- 카드 4 (PNG) — 약간 회전 -->
  <g transform="rotate(-15 512 680)">
    <rect x="362" y="270" width="300" height="390" rx="22" fill="#DBEAFE" stroke="#93C5FD" stroke-width="6"/>
    <rect x="382" y="290" width="260" height="160" rx="12" fill="#93C5FD" opacity="0.4"/>
    <text x="512" y="550" font-family="Arial Black" font-weight="900" font-size="58" fill="#1D4ED8" text-anchor="middle">PNG</text>
  </g>
  <!-- 카드 3 (JPG) — 중앙 -->
  <g transform="rotate(0 512 680)">
    <rect x="362" y="260" width="300" height="390" rx="22" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="6"/>
    <rect x="382" y="280" width="260" height="160" rx="12" fill="#6EE7B7" opacity="0.4"/>
    <text x="512" y="540" font-family="Arial Black" font-weight="900" font-size="58" fill="#065F46" text-anchor="middle">JPG</text>
  </g>
  <!-- 카드 2 (BMP) — 오른쪽 약간 -->
  <g transform="rotate(15 512 680)">
    <rect x="362" y="270" width="300" height="390" rx="22" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="6"/>
    <rect x="382" y="290" width="260" height="160" rx="12" fill="#C4B5FD" opacity="0.4"/>
    <text x="512" y="550" font-family="Arial Black" font-weight="900" font-size="58" fill="#6D28D9" text-anchor="middle">BMP</text>
  </g>
  <!-- 카드 1 (ICO, 맨 앞) — 오른쪽 회전 -->
  <g transform="rotate(30 512 680)">
    <rect x="362" y="290" width="300" height="390" rx="22" fill="#FEF3C7" stroke="#FCD34D" stroke-width="6"/>
    <rect x="382" y="310" width="260" height="160" rx="12" fill="#FCD34D" opacity="0.4"/>
    <!-- ICO 내부 — 멀티사이즈 아이콘 표현 -->
    <rect x="400" y="320" width="52" height="52" rx="8" fill="#F59E0B"/>
    <rect x="464" y="330" width="40" height="40" rx="6" fill="#FBBF24"/>
    <rect x="516" y="340" width="30" height="30" rx="5" fill="#FCD34D"/>
    <rect x="558" y="348" width="22" height="22" rx="4" fill="#FDE68A"/>
    <text x="512" y="570" font-family="Arial Black" font-weight="900" font-size="58" fill="#92400E" text-anchor="middle">ICO</text>
  </g>
  <!-- 하단 텍스트 -->
  <text x="512" y="900" font-family="Arial Black" font-weight="900" font-size="44" fill="#78350F" text-anchor="middle">5 Formats</text>
</svg>
