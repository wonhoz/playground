<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 은하 중심 (API 서버) -->
  <circle cx="256" cy="256" r="30" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="256" cy="256" r="20" fill="#8B5CF6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="260" text-anchor="middle" fill="white" font-size="8" font-family="monospace">API</text>
  <!-- 은하 팔 (엔드포인트들) -->
  <path d="M 256 256 C 280 220 340 200 380 170" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <path d="M 256 256 C 290 256 340 270 390 290" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.4"/>
  <path d="M 256 256 C 240 290 220 340 200 380" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <path d="M 256 256 C 220 256 170 240 130 220" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.4"/>
  <path d="M 256 256 C 270 230 300 200 330 140" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3"/>
  <path d="M 256 256 C 240 270 200 300 150 340" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
  <!-- 엔드포인트 노드들 -->
  <circle cx="380" cy="170" r="12" fill="#8B5CF6" opacity="0.8" filter="url(#glow)"/>
  <text x="380" y="174" text-anchor="middle" fill="white" font-size="8" font-family="monospace">GET</text>
  <circle cx="390" cy="290" r="12" fill="#A78BFA" opacity="0.8" filter="url(#glow)"/>
  <text x="390" y="294" text-anchor="middle" fill="white" font-size="7" font-family="monospace">POST</text>
  <circle cx="200" cy="380" r="12" fill="#8B5CF6" opacity="0.8" filter="url(#glow)"/>
  <text x="200" y="384" text-anchor="middle" fill="white" font-size="8" font-family="monospace">PUT</text>
  <circle cx="130" cy="220" r="11" fill="#A78BFA" opacity="0.7"/>
  <text x="130" y="224" text-anchor="middle" fill="white" font-size="7" font-family="monospace">DEL</text>
  <circle cx="330" cy="140" r="10" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="150" cy="340" r="10" fill="#A78BFA" opacity="0.6"/>
  <!-- 별 장식 -->
  <circle cx="100" cy="130" r="3" fill="#8B5CF6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="430" cy="400" r="4" fill="#A78BFA" opacity="0.5"/>
  <circle cx="430" cy="130" r="3" fill="#8B5CF6" opacity="0.4"/>
</svg>