<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A1A"/>
      <stop offset="100%" stop-color="#0A1433"/>
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
    <linearGradient id="arc_green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#64DD17"/>
    </linearGradient>
    <linearGradient id="arc_yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FFAB00"/>
    </linearGradient>
    <linearGradient id="arc_red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#DD2C00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speedometer gauge -->
  <!-- Outer arc (background) -->
  <path d="M96 320 A180 180 0 0 1 416 320" fill="none" stroke="#1A2040" stroke-width="28" stroke-linecap="round"/>
  <!-- Green zone (0-60%) -->
  <path d="M96 320 A180 180 0 0 1 234 132" fill="none" stroke="url(#arc_green)" stroke-width="24" stroke-linecap="round"/>
  <!-- Yellow zone (60-80%) -->
  <path d="M234 132 A180 180 0 0 1 340 148" fill="none" stroke="url(#arc_yellow)" stroke-width="24" stroke-linecap="round"/>
  <!-- Red zone (80-100%) -->
  <path d="M340 148 A180 180 0 0 1 416 320" fill="none" stroke="url(#arc_red)" stroke-width="24" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="96" y1="320" x2="116" y2="309" stroke="#E0E0E0" stroke-width="3" transform="rotate(-90 96 320)"/>
  <!-- Needle (pointing to ~78%) -->
  <line x1="256" y1="300" x2="326" y2="160" stroke="url(#needle)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="300" r="20" fill="#0A1433" stroke="#1E90FF" stroke-width="3"/>
  <circle cx="256" cy="300" r="8" fill="#FF6D00"/>
  <!-- Labels -->
  <text x="84" y="348" font-family="Consolas" font-size="14" fill="#888">0</text>
  <text x="406" y="348" font-family="Consolas" font-size="14" fill="#888">100</text>
  <text x="240" y="100" font-family="Consolas" font-size="14" fill="#888">50</text>
  <!-- Value display -->
  <text x="256" y="380" text-anchor="middle" font-family="Consolas" font-size="32" fill="#1E90FF" font-weight="bold">78%</text>
  <text x="256" y="410" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#888">CPU Usage</text>
  <!-- Benchmark bars at bottom -->
  <rect x="80" y="440" width="352" height="36" rx="6" fill="#0A1433" stroke="#1E90FF" stroke-width="1.5"/>
  <rect x="88" y="448" width="220" height="20" rx="4" fill="#1E90FF" opacity="0.7"/>
  <text x="320" y="463" font-family="Consolas" font-size="11" fill="#888">Score: 8240</text>
</svg>