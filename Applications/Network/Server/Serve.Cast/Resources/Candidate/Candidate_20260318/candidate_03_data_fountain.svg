<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 분수 기반 (서버) -->
  <rect x="206" y="340" width="100" height="70" rx="8" fill="#3B82F6" opacity="0.2"/>
  <rect x="206" y="340" width="100" height="70" rx="8" fill="none" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="218" y="355" width="76" height="10" rx="5" fill="#3B82F6" opacity="0.6"/>
  <rect x="218" y="371" width="76" height="10" rx="5" fill="#60A5FA" opacity="0.5"/>
  <rect x="218" y="387" width="50" height="10" rx="5" fill="#3B82F6" opacity="0.4"/>
  <!-- 분수 줄기 -->
  <line x1="256" y1="340" x2="256" y2="240" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
  <!-- 물방울들 (파일 전송) -->
  <path d="M 256 160 Q 256 130 256 120" stroke="#60A5FA" stroke-width="2" fill="none"/>
  <path d="M 256 240 C 200 200 140 240 120 270" fill="none" stroke="url(#drop)" stroke-width="3" filter="url(#glow)"/>
  <path d="M 256 240 C 220 190 190 160 180 130" fill="none" stroke="url(#drop)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M 256 240 C 256 195 256 155 256 120" fill="none" stroke="url(#drop)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M 256 240 C 292 190 322 160 332 130" fill="none" stroke="url(#drop)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M 256 240 C 312 200 372 240 392 270" fill="none" stroke="url(#drop)" stroke-width="3" filter="url(#glow)"/>
  <!-- 물방울 끝점 (클라이언트들) -->
  <circle cx="120" cy="270" r="10" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="180" cy="130" r="9" fill="#60A5FA" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="120" r="10" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="332" cy="130" r="9" fill="#60A5FA" opacity="0.7" filter="url(#glow)"/>
  <circle cx="392" cy="270" r="10" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <!-- 분수 코어 -->
  <circle cx="256" cy="240" r="16" fill="#3B82F6" opacity="0.3"/>
  <circle cx="256" cy="240" r="9" fill="#60A5FA" opacity="0.8" filter="url(#glow)"/>
</svg>