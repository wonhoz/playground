<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#4C1D95"/>
  <!-- Layer 2: JSON brackets large -->
  <text x="180" y="620" font-family="Consolas,monospace" font-size="380" fill="#6D28D9" font-weight="900" opacity="0.6">{</text>
  <text x="700" y="620" font-family="Consolas,monospace" font-size="380" fill="#6D28D9" font-weight="900" opacity="0.6">}</text>
  <!-- Layer 2: Content inside braces -->
  <text x="512" y="390" font-family="Consolas,monospace" font-size="30" fill="#C4B5FD" text-anchor="middle">"status":</text>
  <rect x="300" y="404" width="424" height="54" rx="12" fill="#22C55E" opacity="0.9"/>
  <text x="512" y="442" font-family="Consolas,monospace" font-size="32" fill="white" text-anchor="middle" font-weight="bold">200 OK</text>
  <text x="512" y="510" font-family="Consolas,monospace" font-size="26" fill="#A78BFA" text-anchor="middle">"message": "success"</text>
  <text x="512" y="554" font-family="Consolas,monospace" font-size="22" fill="#7C3AED" text-anchor="middle">"count": 42</text>
  <!-- Layer 3: Response code highlight glow -->
  <ellipse cx="512" cy="431" rx="240" ry="50" fill="#22C55E" opacity="0.15"/>
</svg>