<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#1E1E1E"/>
  <!-- Layer 2: Code editor card -->
  <rect x="130" y="200" width="764" height="500" rx="16" fill="#2D2D2D"/>
  <!-- Window buttons -->
  <circle cx="210" cy="270" r="22" fill="#FF5F57"/>
  <circle cx="270" cy="270" r="22" fill="#FEBC2E"/>
  <circle cx="330" cy="270" r="22" fill="#28C840"/>
  <!-- Divider -->
  <rect x="130" y="306" width="764" height="4" fill="#444444"/>
  <!-- Layer 3: [PROMPT] text -->
  <text x="512" y="460" font-family="Consolas,monospace" font-size="96" font-weight="bold" fill="#A8FF78" text-anchor="middle">[PROMPT]</text>
  <!-- Code lines -->
  <rect x="200" y="510" width="300" height="14" rx="7" fill="#888888"/>
  <rect x="200" y="540" width="420" height="14" rx="7" fill="#888888" opacity="0.6"/>
  <rect x="200" y="570" width="240" height="14" rx="7" fill="#888888" opacity="0.4"/>
</svg>