<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Anvil/forge base -->
  <rect x="220" y="600" width="584" height="160" rx="20" fill="#78716C"/>
  <rect x="260" y="560" width="504" height="80" rx="16" fill="#92928B"/>
  <!-- Gamepad on anvil being forged -->
  <ellipse cx="512" cy="500" rx="240" ry="170" fill="#DC2626"/>
  <ellipse cx="512" cy="500" rx="215" ry="148" fill="#EF4444"/>
  <!-- D-pad -->
  <rect x="360" y="470" width="80" height="26" rx="4" fill="#FFFFFF"/>
  <rect x="387" y="445" width="26" height="78" rx="4" fill="#FFFFFF"/>
  <!-- Buttons -->
  <circle cx="620" cy="468" r="22" fill="#22C55E"/>
  <circle cx="655" cy="500" r="22" fill="#EF4444"/>
  <circle cx="585" cy="500" r="22" fill="#3B82F6"/>
  <circle cx="620" cy="532" r="22" fill="#F59E0B"/>
  <!-- Forge sparks/fire -->
  <path d="M480,420 Q490,360 512,340 Q520,380 530,350 Q545,300 560,340 Q570,320 580,360 Q590,300 610,340 Q580,420 560,440 Q540,400 512,440 Q490,400 480,420Z" fill="url(#fire)"/>
  <!-- Hammer -->
  <rect x="650" y="300" width="140" height="80" rx="14" fill="#6B7280"/>
  <rect x="750" y="220" width="40" height="180" rx="8" fill="#9CA3AF"/>
  <!-- Label -->
  <text x="512" y="860" font-family="Arial,sans-serif" font-size="60" fill="#C2410C" font-weight="bold" text-anchor="middle">Pad Forge</text>
</svg>
