<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1500"/>
      <stop offset="100%" stop-color="#2a2000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffdd44"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d0e0"/>
      <stop offset="100%" stop-color="#8090a0"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e08040"/>
      <stop offset="100%" stop-color="#a04010"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Podium blocks -->
  <!-- Silver (2nd) -->
  <rect x="100" y="320" width="110" height="110" rx="6" fill="url(#silver)"/>
  <text x="155" y="395" font-size="48" fill="#ffffff" font-family="Arial" font-weight="bold" text-anchor="middle">2</text>
  <!-- Gold (1st) -->
  <rect x="201" y="270" width="110" height="160" rx="6" fill="url(#gold)"/>
  <text x="256" y="395" font-size="48" fill="#ffffff" font-family="Arial" font-weight="bold" text-anchor="middle">1</text>
  <!-- Bronze (3rd) -->
  <rect x="302" y="350" width="110" height="80" rx="6" fill="url(#bronze)"/>
  <text x="357" y="410" font-size="48" fill="#ffffff" font-family="Arial" font-weight="bold" text-anchor="middle">3</text>
  <!-- Podium base -->
  <rect x="80" y="425" width="352" height="22" rx="6" fill="#3a3010"/>
  <!-- Athletes -->
  <!-- 1st place with arms up -->
  <circle cx="256" cy="218" r="20" fill="#f0c080"/>
  <rect x="245" y="238" width="22" height="30" rx="4" fill="#cc2020"/>
  <!-- Arms raised in victory -->
  <line x1="245" y1="248" x2="220" y2="225" stroke="#f0c080" stroke-width="8" stroke-linecap="round"/>
  <line x1="267" y1="248" x2="292" y2="225" stroke="#f0c080" stroke-width="8" stroke-linecap="round"/>
  <!-- 2nd place -->
  <circle cx="155" cy="285" r="18" fill="#f0c080"/>
  <rect x="145" y="303" width="20" height="18" rx="4" fill="#2020aa"/>
  <!-- 3rd place -->
  <circle cx="357" cy="315" r="18" fill="#f0c080"/>
  <rect x="347" y="333" width="20" height="18" rx="4" fill="#20aa20"/>
  <!-- Gold medal hanging on 1st -->
  <circle cx="256" cy="148" r="26" fill="url(#gold)" stroke="#cc8800" stroke-width="3"/>
  <circle cx="256" cy="148" r="18" fill="#ffee88"/>
  <polygon points="256,132 260,143 272,143 263,150 267,161 256,154 245,161 249,150 240,143 252,143" fill="#cc8800"/>
  <!-- Medal ribbon -->
  <rect x="251" y="122" width="10" height="20" fill="#cc2020"/>
  <!-- Stars background -->
  <circle cx="130" cy="110" r="3" fill="#ffdd44" opacity="0.6"/>
  <circle cx="380" cy="90" r="3" fill="#ffdd44" opacity="0.7"/>
  <circle cx="420" cy="150" r="2" fill="#ffdd44" opacity="0.5"/>
  <circle cx="90" cy="180" r="2" fill="#ffdd44" opacity="0.6"/>
</svg>