<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000040"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- White card -->
  <rect x="60" y="100" width="392" height="312" rx="24" fill="white" filter="url(#shadow)" opacity="0.95"/>
  <!-- Key visual 3x3 grid -->
  <!-- Row 1 -->
  <rect x="88" y="128" width="80" height="72" rx="10" fill="#FFD6E7"/>
  <text x="128" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#D63384">Q</text>
  <rect x="184" y="128" width="80" height="72" rx="10" fill="#D6F5E7"/>
  <text x="224" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#198754">W</text>
  <rect x="280" y="128" width="80" height="72" rx="10" fill="#D6E8FF"/>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#0D6EFD">E</text>
  <rect x="376" y="128" width="56" height="72" rx="10" fill="#FFF3CD"/>
  <text x="404" y="175" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#997404">DEL</text>
  <!-- Row 2 -->
  <rect x="88" y="216" width="80" height="72" rx="10" fill="#E2D9F3"/>
  <text x="128" y="263" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#6F42C1">A</text>
  <rect x="184" y="216" width="80" height="72" rx="10" fill="#FFDDBF"/>
  <text x="224" y="263" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FD7E14">S</text>
  <rect x="280" y="216" width="80" height="72" rx="10" fill="#D1ECF1"/>
  <text x="320" y="263" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#0DCAF0">D</text>
  <!-- Active indicator -->
  <rect x="376" y="216" width="56" height="72" rx="10" fill="#4CAF50"/>
  <path d="M392 254 L402 266 L420 240" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Row 3 - space bar -->
  <rect x="88" y="304" width="344" height="80" rx="10" fill="#F0F0F0"/>
  <text x="260" y="350" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#888888">SPACE</text>
</svg>
