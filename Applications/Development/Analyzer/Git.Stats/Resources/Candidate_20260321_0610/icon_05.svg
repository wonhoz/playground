<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#041225"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#00FF41" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ADFF2F"/>
      <stop offset="80%" stop-color="#00FF41" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow05">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 스파이크 그라데이션 -->
    <linearGradient id="spikeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- 배경 격자선 -->
  <line x1="180" y1="300" x2="844" y2="300" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="180" y1="400" x2="844" y2="400" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="180" y1="512" x2="844" y2="512" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="180" y1="624" x2="844" y2="624" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="180" y1="724" x2="844" y2="724" stroke="#0D3B5E" stroke-width="1.5"/>

  <line x1="280" y1="260" x2="280" y2="764" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="400" y1="260" x2="400" y2="764" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="512" y1="260" x2="512" y2="764" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="624" y1="260" x2="624" y2="764" stroke="#0D3B5E" stroke-width="1.5"/>
  <line x1="744" y1="260" x2="744" y2="764" stroke="#0D3B5E" stroke-width="1.5"/>

  <!-- 기준선 (중앙) -->
  <line x1="180" y1="512" x2="844" y2="512" stroke="#1E4D7A" stroke-width="3"/>

  <!-- Layer2: 펄스 파형 (심전도 스타일 커밋 활동) -->
  <!-- 낮은 활동 구간 → 스파이크 → 낮은 구간 반복 -->
  <polyline
    points="
      180,512
      220,512 230,505 240,512
      260,512 270,500 280,512
      300,512
      310,490 318,430 325,290 332,430 340,490
      350,512
      370,508 380,512
      400,512
      410,495 420,512
      440,512
      450,488 458,400 465,260 472,400 480,488
      490,512
      510,506 520,512
      540,512
      550,500 560,512
      580,512
      590,482 598,370 605,240 612,370 620,482
      630,512
      650,508 660,512
      680,512
      690,498 700,512
      720,512
      730,490 738,420 745,300 752,420 760,490
      770,512
      790,506 800,512
      820,512
      844,512
    "
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="8"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#pulseGlow)"
  />

  <!-- Layer3: 스파이크 위 하이라이트 점 -->
  <circle cx="325" cy="290" r="14" fill="#ADFF2F" filter="url(#softGlow05)"/>
  <circle cx="325" cy="290" r="7" fill="#FFFFFF"/>

  <circle cx="465" cy="260" r="14" fill="#ADFF2F" filter="url(#softGlow05)"/>
  <circle cx="465" cy="260" r="7" fill="#FFFFFF"/>

  <circle cx="605" cy="240" r="18" fill="#ADFF2F" filter="url(#pulseGlow)"/>
  <circle cx="605" cy="240" r="9" fill="#FFFFFF"/>

  <circle cx="745" cy="300" r="14" fill="#ADFF2F" filter="url(#softGlow05)"/>
  <circle cx="745" cy="300" r="7" fill="#FFFFFF"/>

  <!-- X축 월 라벨 -->
  <text x="290" y="800" font-family="monospace" font-size="20" fill="#2D6A4F" text-anchor="middle">Jan</text>
  <text x="410" y="800" font-family="monospace" font-size="20" fill="#2D6A4F" text-anchor="middle">Mar</text>
  <text x="522" y="800" font-family="monospace" font-size="20" fill="#2D6A4F" text-anchor="middle">May</text>
  <text x="634" y="800" font-family="monospace" font-size="20" fill="#2D6A4F" text-anchor="middle">Jul</text>
  <text x="754" y="800" font-family="monospace" font-size="20" fill="#2D6A4F" text-anchor="middle">Sep</text>

  <!-- 제목 -->
  <text x="512" y="856" font-family="monospace" font-size="26" font-weight="bold" fill="#00FF41" text-anchor="middle" opacity="0.8">Commit Activity</text>
</svg>
