<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080818"/>
      <stop offset="100%" style="stop-color:#180808"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wire network background -->
  <line x1="100" y1="100" x2="200" y2="180" stroke="#ff6600" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="180" x2="350" y2="150" stroke="#ff6600" stroke-width="1" opacity="0.2"/>
  <line x1="350" y1="150" x2="420" y2="250" stroke="#ff6600" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="300" x2="180" y2="250" stroke="#ffaa00" stroke-width="1" opacity="0.2"/>
  <line x1="180" y1="250" x2="280" y2="300" stroke="#ffaa00" stroke-width="1" opacity="0.2"/>
  <line x1="280" y1="300" x2="400" y2="280" stroke="#ffaa00" stroke-width="1" opacity="0.2"/>
  <!-- Wire nodes -->
  <circle cx="200" cy="180" r="4" fill="#ff6600" filter="url(#glow)" opacity="0.6"/>
  <circle cx="350" cy="150" r="4" fill="#ffaa00" filter="url(#glow)" opacity="0.6"/>
  <circle cx="180" cy="250" r="4" fill="#ff6600" filter="url(#glow)" opacity="0.6"/>
  <circle cx="280" cy="300" r="4" fill="#ffaa00" filter="url(#glow)" opacity="0.6"/>
  <!-- Main running wire path -->
  <path d="M60 390 Q150 370 200 380 Q250 390 280 375 Q330 360 380 370 Q420 378 470 365" stroke="url(#wireGrad)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M60 390 Q150 370 200 380 Q250 390 280 375 Q330 360 380 370 Q420 378 470 365" stroke="#ff6600" stroke-width="8" fill="none" opacity="0.2" filter="url(#glow)"/>
  <!-- Runner on wire -->
  <g filter="url(#glow)" transform="translate(256, 345)">
    <circle cx="0" cy="-50" r="14" fill="none" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="0" y1="-35" x2="0" y2="5" stroke="#ff6600" stroke-width="3"/>
    <line x1="0" y1="-20" x2="-19" y2="-2" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="0" y1="-20" x2="17" y2="-36" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="0" y1="5" x2="-14" y2="32" stroke="#ffaa00" stroke-width="2.5"/>
    <line x1="-14" y1="32" x2="-5" y2="48" stroke="#ffaa00" stroke-width="2"/>
    <line x1="0" y1="5" x2="16" y2="26" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="16" y1="26" x2="23" y2="13" stroke="#ff6600" stroke-width="2"/>
  </g>
  <!-- Wire sparks at feet -->
  <circle cx="252" cy="393" r="3" fill="#ffff00" filter="url(#glow)"/>
  <line x1="250" y1="395" x2="242" y2="403" stroke="#ffff00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="258" y1="394" x2="264" y2="405" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
</svg>