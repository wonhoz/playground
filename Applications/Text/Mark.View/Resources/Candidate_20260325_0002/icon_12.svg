<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1A1A2E"/>
  <!-- Layer 2: 코드 에디터 창 -->
  <rect x="220" y="230" width="584" height="540" rx="20" fill="#1E1E2E" stroke="#333355" stroke-width="6"/>
  <!-- 창 상단 탭 -->
  <rect x="220" y="230" width="584" height="44" rx="20" fill="#252535"/>
  <rect x="220" y="253" width="584" height="21" fill="#252535"/>
  <!-- 탭 점들 -->
  <circle cx="258" cy="252" r="10" fill="#FF5F57"/>
  <circle cx="290" cy="252" r="10" fill="#FEBC2E"/>
  <circle cx="322" cy="252" r="10" fill="#28C840"/>
  <!-- 파일 탭 -->
  <rect x="346" y="238" width="130" height="28" rx="6" fill="#1A1A2E"/>
  <text x="411" y="258" text-anchor="middle" font-family="Arial" font-size="28" fill="#90A4AE">README.md</text>
  <!-- 줄 번호 -->
  <rect x="220" y="274" width="44" height="496" fill="#1A1A2E"/>
  <text x="242" y="320" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">1</text>
  <text x="242" y="366" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">2</text>
  <text x="242" y="412" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">3</text>
  <text x="242" y="458" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">4</text>
  <text x="242" y="504" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">5</text>
  <text x="242" y="550" text-anchor="middle" font-family="Courier New" font-size="36" fill="#546E7A">6</text>
  <!-- 코드 내용 -->
  <text x="282" y="320" font-family="Courier New" font-size="52" fill="#4FC3F7"># Title</text>
  <text x="282" y="366" font-family="Courier New" font-size="52" fill="#546E7A">---</text>
  <text x="282" y="412" font-family="Courier New" font-size="52" fill="#A5D6A7">## Section</text>
  <text x="282" y="458" font-family="Courier New" font-size="52" fill="#E0E0E0">- list item</text>
  <text x="282" y="504" font-family="Courier New" font-size="52" fill="#CE93D8">**bold**</text>
  <text x="282" y="550" font-family="Courier New" font-size="52" fill="#80CBC4">`code`</text>
  <!-- 커서 -->
  <rect x="282" y="558" width="4" height="50" fill="#4FC3F7"/>
  <!-- Layer 3: 문법 하이라이트 강조선 -->
  <rect x="278" y="296" width="340" height="38" rx="6" fill="#4FC3F7" opacity="0.1"/>
</svg>