<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03 | Metaphor | 기하학 추상 | @ 기호가 픽셀/타일처럼 분해되어 이미지를 구성 -->
  <!-- 색조: 진한 보라 + 핫핑크 -->

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="128" fill="#1A0030"/>

  <defs>
    <!-- 빛나는 @ 심볼 그라디언트 -->
    <radialGradient id="glowGrad03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="60%" stop-color="#CC0066"/>
      <stop offset="100%" stop-color="#660033" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 중앙 글로우 -->
  <circle cx="512" cy="512" r="340" fill="url(#glowGrad03)" opacity="0.25"/>

  <!-- 거대한 @ 문자를 타일 격자로 구성 -->
  <!-- @ 형태를 만드는 핑크 사각형 타일들 (각 타일 안에 ASCII 문자) -->

  <!-- @ 글자의 외곽 원형 부분 (도넛) — 타일 배열로 -->
  <!-- 상단 호 -->
  <g font-family="Courier New, monospace" font-size="28" fill="#FF69B4">
    <!-- Row 1: 상단 중앙 -->
    <rect x="412" y="222" width="56" height="56" rx="6" fill="#330044"/><text x="425" y="261" fill="#FF69B4">@</text>
    <rect x="468" y="222" width="56" height="56" rx="6" fill="#330044"/><text x="481" y="261" fill="#FF69B4">@</text>
    <rect x="524" y="222" width="56" height="56" rx="6" fill="#330044"/><text x="537" y="261" fill="#FF69B4">@</text>

    <!-- Row 2 -->
    <rect x="300" y="278" width="56" height="56" rx="6" fill="#330044"/><text x="313" y="317" fill="#FF1493">#</text>
    <rect x="356" y="278" width="56" height="56" rx="6" fill="#330044"/><text x="369" y="317" fill="#FF69B4">@</text>
    <rect x="580" y="278" width="56" height="56" rx="6" fill="#330044"/><text x="593" y="317" fill="#FF69B4">@</text>
    <rect x="636" y="278" width="56" height="56" rx="6" fill="#330044"/><text x="649" y="317" fill="#FF1493">*</text>

    <!-- 왼쪽 세로 -->
    <rect x="244" y="334" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="373" fill="#FF69B4">@</text>
    <rect x="244" y="390" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="429" fill="#CC0066">#</text>
    <rect x="244" y="446" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="485" fill="#FF69B4">@</text>
    <rect x="244" y="502" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="541" fill="#FF1493">*</text>
    <rect x="244" y="558" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="597" fill="#FF69B4">@</text>
    <rect x="244" y="614" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="653" fill="#CC0066">#</text>

    <!-- 오른쪽 세로 -->
    <rect x="692" y="334" width="56" height="56" rx="6" fill="#330044"/><text x="705" y="373" fill="#FF69B4">@</text>
    <rect x="692" y="390" width="56" height="56" rx="6" fill="#330044"/><text x="705" y="429" fill="#CC0066">#</text>
    <rect x="692" y="446" width="56" height="56" rx="6" fill="#330044"/><text x="705" y="485" fill="#FF69B4">@</text>

    <!-- @ 안쪽 a 부분 -->
    <rect x="468" y="390" width="56" height="56" rx="6" fill="#4A0066"/><text x="481" y="429" fill="#FFB3D9">a</text>
    <rect x="524" y="390" width="56" height="56" rx="6" fill="#4A0066"/><text x="537" y="429" fill="#FFB3D9">a</text>
    <rect x="580" y="390" width="56" height="56" rx="6" fill="#4A0066"/><text x="593" y="429" fill="#FFB3D9">a</text>

    <rect x="412" y="446" width="56" height="56" rx="6" fill="#4A0066"/><text x="425" y="485" fill="#FFB3D9">*</text>
    <rect x="636" y="446" width="56" height="56" rx="6" fill="#330044"/><text x="649" y="485" fill="#FF69B4">@</text>

    <rect x="412" y="502" width="56" height="56" rx="6" fill="#4A0066"/><text x="425" y="541" fill="#FFB3D9">.</text>
    <rect x="468" y="502" width="56" height="56" rx="6" fill="#4A0066"/><text x="481" y="541" fill="#FFB3D9">.</text>
    <rect x="524" y="502" width="56" height="56" rx="6" fill="#4A0066"/><text x="537" y="541" fill="#FFB3D9">.</text>
    <rect x="580" y="502" width="56" height="56" rx="6" fill="#330044"/><text x="593" y="541" fill="#FF69B4">@</text>
    <rect x="636" y="502" width="56" height="56" rx="6" fill="#330044"/><text x="649" y="541" fill="#FF1493">@</text>

    <!-- 하단 꼬리 (@ 의 오른쪽 꼬리) -->
    <rect x="580" y="558" width="56" height="56" rx="6" fill="#330044"/><text x="593" y="597" fill="#FF69B4">@</text>
    <rect x="636" y="558" width="56" height="56" rx="6" fill="#330044"/><text x="649" y="597" fill="#CC0066">#</text>
    <rect x="692" y="558" width="56" height="56" rx="6" fill="#330044"/><text x="705" y="597" fill="#FF69B4">@</text>

    <!-- 하단 호 -->
    <rect x="300" y="670" width="56" height="56" rx="6" fill="#330044"/><text x="313" y="709" fill="#FF1493">#</text>
    <rect x="356" y="670" width="56" height="56" rx="6" fill="#330044"/><text x="369" y="709" fill="#FF69B4">@</text>
    <rect x="412" y="670" width="56" height="56" rx="6" fill="#330044"/><text x="425" y="709" fill="#CC0066">@</text>
    <rect x="468" y="726" width="56" height="56" rx="6" fill="#330044"/><text x="481" y="765" fill="#FF69B4">@</text>
    <rect x="524" y="726" width="56" height="56" rx="6" fill="#330044"/><text x="537" y="765" fill="#FF69B4">@</text>
    <rect x="580" y="726" width="56" height="56" rx="6" fill="#330044"/><text x="593" y="765" fill="#FF1493">#</text>

    <rect x="244" y="670" width="56" height="56" rx="6" fill="#330044"/><text x="257" y="709" fill="#FF69B4">@</text>
  </g>
</svg>
