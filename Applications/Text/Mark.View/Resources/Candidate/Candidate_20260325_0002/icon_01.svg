  <text x="512" y="610" text-anchor="middle" font-family="Arial Black" font-size="580" font-weight="900" fill="white">#</text>
  <!-- Layer 3: 우측하단 작은 ## ### -->
  <text x="760" y="840" text-anchor="middle" font-family="Arial Black" font-size="88" font-weight="900" fill="white" opacity="0.4">##</text>
  <text x="760" y="920" text-anchor="middle" font-family="Arial Black" font-size="70" font-weight="900" fill="white" opacity="0.3">###</text>
</svg>