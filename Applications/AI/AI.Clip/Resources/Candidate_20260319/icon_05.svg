  <rect x="180" y="280" width="260" height="340" rx="20" fill="#1A2F47" stroke="#3498DB" stroke-width="20"/>
  <rect x="210" y="340" width="180" height="16" rx="8" fill="#3498DB" opacity="0.9"/>
  <rect x="210" y="375" width="140" height="16" rx="8" fill="#3498DB" opacity="0.7"/>
  <rect x="210" y="410" width="160" height="16" rx="8" fill="#3498DB" opacity="0.7"/>
  <rect x="210" y="445" width="120" height="16" rx="8" fill="#3498DB" opacity="0.5"/>
  <rect x="210" y="480" width="150" height="16" rx="8" fill="#3498DB" opacity="0.5"/>
  <!-- Arrow dots (transform flow) -->
  <circle cx="490" cy="450" r="10" fill="#3498DB" opacity="0.9"/>
  <circle cx="530" cy="450" r="10" fill="#3498DB" opacity="0.7"/>
  <circle cx="570" cy="450" r="10" fill="#3498DB" opacity="0.5"/>
