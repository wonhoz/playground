<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Clipboard with robot arm holding pen -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#001020"/>
  <!-- Clipboard -->
  <rect x="200" y="220" width="400" height="540" rx="24" fill="#001830" stroke="#29B6F6" stroke-width="22"/>
  <rect x="300" y="190" width="200" height="64" rx="14" fill="#29B6F6"/>
  <!-- Text lines on clipboard -->
  <rect x="250" y="320" width="280" height="18" rx="9" fill="#29B6F6" opacity="0.7"/>
  <rect x="250" y="362" width="220" height="18" rx="9" fill="#29B6F6" opacity="0.5"/>
  <rect x="250" y="404" width="250" height="18" rx="9" fill="#29B6F6" opacity="0.5"/>
  <rect x="250" y="446" width="190" height="18" rx="9" fill="#29B6F6" opacity="0.4"/>
  <!-- Highlight line (AI editing) -->
  <rect x="240" y="488" width="300" height="24" rx="6" fill="#29B6F6" opacity="0.2" stroke="#29B6F6" stroke-width="4"/>
  <!-- Robot arm (right side) -->
  <!-- Arm upper segment -->
  <rect x="610" y="360" width="36" height="180" rx="14" fill="#37474F" transform="rotate(20, 628, 450)"/>
  <!-- Arm lower segment -->
  <rect x="660" y="480" width="32" height="160" rx="12" fill="#455A64" transform="rotate(-10, 676, 560)"/>
  <!-- Claw/hand holding pen -->
  <circle cx="700" cy="640" r="30" fill="#37474F"/>
  <!-- Pen -->
  <path d="M700 620 L760 540 L790 570 L730 650 Z" fill="#B0BEC5"/>
  <path d="M760 540 L782 518 Q796 504 810 518 L824 532 Q838 546 824 560 L790 570 Z" fill="#78909C"/>
  <path d="M700 620 L680 700 L760 680 Z" fill="#90A4AE" opacity="0.7"/>
  <!-- Joint circles on arm -->
  <circle cx="628" cy="365" r="20" fill="#546E7A"/>
  <circle cx="676" cy="542" r="18" fill="#546E7A"/>
</svg>
