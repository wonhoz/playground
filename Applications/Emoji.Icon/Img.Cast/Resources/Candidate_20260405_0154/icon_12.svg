<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
    <linearGradient id="belt12" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg12)"/>
  <!-- Layer 2: Conveyor belt with files moving -->
  <!-- Belt surface -->
  <rect x="100" y="560" width="824" height="80" rx="40" fill="url(#belt12)"/>
  <!-- Belt stripes -->
  <rect x="200" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <rect x="320" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <rect x="440" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <rect x="560" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <rect x="680" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <rect x="800" y="560" width="20" height="80" rx="4" fill="#00E676" opacity="0.4"/>
  <!-- Belt rollers at ends -->
  <circle cx="140" cy="600" r="50" fill="#2E7D32"/>
  <circle cx="884" cy="600" r="50" fill="#2E7D32"/>
  <!-- Files on belt (left=SVG, mid=PNG, right=ICO) -->
  <!-- SVG file (left, moving right) -->
  <rect x="130" y="370" width="170" height="210" rx="14" fill="white"/>
  <path d="M270 370 L300 400 L270 400 Z" fill="#A5D6A7"/>
  <text x="148" y="470" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#2E7D32">SVG</text>
  <!-- PNG file (mid) -->
  <rect x="424" y="360" width="176" height="218" rx="14" fill="white" opacity="0.9"/>
  <path d="M570 360 L600 390 L570 390 Z" fill="#A5D6A7"/>
  <text x="440" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#1B5E20">PNG</text>
  <!-- ICO file (right, almost off belt) -->
  <rect x="720" y="350" width="180" height="224" rx="14" fill="white" opacity="0.7"/>
  <path d="M868 350 L900 380 L868 380 Z" fill="#A5D6A7"/>
  <text x="738" y="458" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#388E3C">ICO</text>
  <!-- Layer 3: Right arrow indicating direction -->
  <polygon points="900,720 970,760 900,800" fill="#1B5E20" opacity="0.6"/>
</svg>
