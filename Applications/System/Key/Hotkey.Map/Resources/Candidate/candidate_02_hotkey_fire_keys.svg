<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100500"/>
      <stop offset="100%" stop-color="#200a00"/>
    </linearGradient>
    <linearGradient id="key1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="key2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Three hot keys -->
  <rect x="90" y="180" width="90" height="90" rx="12" fill="url(#key1)" filter="url(#glow)"/>
  <rect x="90" y="180" width="90" height="90" rx="12" fill="none" stroke="#ff4500" stroke-width="3" opacity="0.5"/>
  <rect x="211" y="180" width="90" height="90" rx="12" fill="url(#key1)" filter="url(#glow)"/>
  <rect x="332" y="180" width="90" height="90" rx="12" fill="url(#key2)" filter="url(#glow)"/>
  <!-- Plus connectors -->
  <circle cx="196" cy="225" r="12" fill="#ff8c00" filter="url(#glow)"/>
  <line x1="190" y1="225" x2="202" y2="225" stroke="white" stroke-width="3"/>
  <line x1="196" y1="219" x2="196" y2="231" stroke="white" stroke-width="3"/>
  <circle cx="317" cy="225" r="12" fill="#ff8c00" filter="url(#glow)"/>
  <line x1="311" y1="225" x2="323" y2="225" stroke="white" stroke-width="3"/>
  <line x1="317" y1="219" x2="317" y2="231" stroke="white" stroke-width="3"/>
  <!-- Fire flames above keys -->
  <ellipse cx="135" cy="155" rx="16" ry="30" fill="#ff4500" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="135" cy="148" rx="9" ry="20" fill="#ffd700" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="256" cy="155" rx="16" ry="30" fill="#ff4500" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="256" cy="148" rx="9" ry="20" fill="#ffd700" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="377" cy="150" rx="20" ry="36" fill="#ff8c00" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="377" cy="142" rx="12" ry="24" fill="#ffd700" opacity="0.8" filter="url(#glow)"/>
  <!-- Action arrow -->
  <path d="M180 330 L256 370 L332 330" stroke="url(#key2)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="256" cy="400" r="24" fill="url(#key1)" filter="url(#glow)"/>
  <polygon points="246,390 270,400 246,410" fill="white" opacity="0.8"/>
</svg>