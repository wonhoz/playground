<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 선생님 칠판 — 지리 수업 | 공간/장면 | #0A1E0A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A1E0A"/>
  <!-- Layer 2: Blackboard with geography question -->
  <!-- Board frame -->
  <rect x="140" y="200" width="744" height="480" rx="12" fill="#1A1A1A" stroke="#3A5A3A" stroke-width="8"/>
  <!-- Board surface (green chalkboard) -->
  <rect x="154" y="214" width="716" height="452" rx="8" fill="#1A3A1A"/>
  <!-- Chalk tray -->
  <rect x="140" y="680" width="744" height="22" rx="4" fill="#2D4A2D"/>
  <!-- Board content: Quiz question -->
  <text x="512" y="280" font-family="Arial,sans-serif" font-size="26" fill="#ECFDF5" text-anchor="middle" font-weight="bold">세계 지리 퀴즈</text>
  <line x1="180" y1="298" x2="844" y2="298" stroke="#4ADE80" stroke-width="2" opacity="0.4"/>
  <!-- Question -->
  <text x="512" y="360" font-family="Arial,sans-serif" font-size="22" fill="#D1FAE5" text-anchor="middle">프랑스의 수도는?</text>
  <!-- Answer choices (chalk style) -->
  <circle cx="220" cy="410" r="16" fill="none" stroke="#86EFAC" stroke-width="3"/>
  <text x="250" y="418" font-family="Arial,sans-serif" font-size="20" fill="#86EFAC">① 베를린</text>
  <circle cx="220" cy="456" r="16" fill="#065F46" stroke="#4ADE80" stroke-width="3"/>
  <text x="250" y="464" font-family="Arial,sans-serif" font-size="20" fill="#4ADE80" font-weight="bold">② 파리 ✓</text>
  <circle cx="540" cy="410" r="16" fill="none" stroke="#86EFAC" stroke-width="3"/>
  <text x="570" y="418" font-family="Arial,sans-serif" font-size="20" fill="#86EFAC">③ 로마</text>
  <circle cx="540" cy="456" r="16" fill="none" stroke="#86EFAC" stroke-width="3"/>
  <text x="570" y="464" font-family="Arial,sans-serif" font-size="20" fill="#86EFAC">④ 마드리드</text>
  <!-- Map outline hint on board -->
  <path d="M180 530 Q220 510 260 520 Q300 510 340 530 Q380 550 400 540 Q440 520 480 540 Q520 560 540 550" fill="none" stroke="#4ADE80" stroke-width="3" opacity="0.4"/>
  <!-- Score: 8/10 -->
  <text x="800" y="590" font-family="Arial,sans-serif" font-size="28" fill="#FCD34D" text-anchor="middle" font-weight="bold">8/10</text>
  <!-- Layer 3: Chalk pieces on tray -->
  <rect x="200" y="682" width="30" height="10" rx="3" fill="#D1FAE5"/>
  <rect x="240" y="684" width="20" height="8" rx="2" fill="#FEF3C7"/>
  <rect x="270" y="682" width="26" height="10" rx="3" fill="#D1FAE5"/>
</svg>
