<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 딥 블루 -->
  <circle cx="512" cy="512" r="512" fill="#0D1B2A"/>
  <!-- Layer 2: 글자 타일들 (스크래블 느낌) -->
  <!-- 타일 그룹 1 (C-R-O-S-S) -->
  <rect x="120" y="200" width="136" height="136" rx="16" fill="#F5F0E0"/>
  <text x="188" y="286" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1A1A1A" text-anchor="middle">C</text>
  <text x="230" y="320" font-family="Arial" font-size="24" fill="#5D4037" text-anchor="middle">3</text>
  <rect x="276" y="200" width="136" height="136" rx="16" fill="#F5F0E0"/>
  <text x="344" y="286" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1A1A1A" text-anchor="middle">R</text>
  <rect x="432" y="200" width="136" height="136" rx="16" fill="#F5F0E0"/>
  <text x="500" y="286" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1A1A1A" text-anchor="middle">O</text>
  <rect x="588" y="200" width="136" height="136" rx="16" fill="#F5F0E0"/>
  <text x="656" y="286" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1A1A1A" text-anchor="middle">S</text>
  <rect x="744" y="200" width="140" height="136" rx="16" fill="#F5F0E0"/>
  <text x="814" y="286" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1A1A1A" text-anchor="middle">S</text>
  <!-- 타일 그룹 2 (W-O-R-D) -->
  <rect x="120" y="360" width="136" height="136" rx="16" fill="#FFE0B2"/>
  <text x="188" y="446" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#E65100" text-anchor="middle">W</text>
  <rect x="276" y="360" width="136" height="136" rx="16" fill="#FFE0B2"/>
  <text x="344" y="446" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#E65100" text-anchor="middle">O</text>
  <rect x="432" y="360" width="136" height="136" rx="16" fill="#FFE0B2"/>
  <text x="500" y="446" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#E65100" text-anchor="middle">R</text>
  <rect x="588" y="360" width="136" height="136" rx="16" fill="#FFE0B2"/>
  <text x="656" y="446" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#E65100" text-anchor="middle">D</text>
  <!-- 빈 타일 (입력 대기) -->
  <rect x="744" y="360" width="140" height="136" rx="16" fill="none" stroke="#2196F3" stroke-width="6" stroke-dasharray="12,8"/>
  <text x="814" y="446" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#2196F3" opacity="0.6" text-anchor="middle">_</text>
  <!-- Layer 3: 힌트 텍스트 -->
  <rect x="120" y="540" width="784" height="100" rx="14" fill="#1A2B4A"/>
  <text x="512" y="602" font-family="Arial" font-size="36" fill="#90CAF9" text-anchor="middle">Hint: A puzzle of words (7)</text>
  <!-- 점수 -->
  <text x="512" y="760" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#F5F0E0" text-anchor="middle">CROSSWORD</text>
</svg>
