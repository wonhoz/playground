  <path d="M120 180 L120 148 L152 148" stroke="#00FFFF" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M392 180 L392 148 L360 148" stroke="#00FFFF" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
