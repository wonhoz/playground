<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2340"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#FFD740"/>
    </linearGradient>
    <filter id="glow1">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#FF7043" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg1)"/>

  <!-- Layer 2: Left format pill (IMG) -->
  <rect x="80" y="390" width="340" height="160" rx="24" fill="#1E3A5F" stroke="#4A90D9" stroke-width="8"/>
  <text x="250" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="92" font-weight="900"
        fill="#4FC3F7" text-anchor="middle" dominant-baseline="middle">IMG</text>

  <!-- Layer 2: Arrow center -->
  <path d="M 460 512 L 600 512" stroke="url(#arrowGrad)" stroke-width="64" stroke-linecap="round" filter="url(#glow1)"/>
  <polygon points="590,458 680,512 590,566" fill="#FFD740" filter="url(#glow1)"/>

  <!-- Layer 2: Right format pill (ICO) -->
  <rect x="604" y="390" width="340" height="160" rx="24" fill="#3D1A0A" stroke="#FF7043" stroke-width="8"/>
  <text x="774" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="92" font-weight="900"
        fill="#FF7043" text-anchor="middle" dominant-baseline="middle">ICO</text>

  <!-- Layer 3: Small format tags below -->
  <text x="180" y="640" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700"
        fill="#4A90D9" opacity="0.55" text-anchor="middle">PNG</text>
  <text x="340" y="640" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700"
        fill="#4A90D9" opacity="0.55" text-anchor="middle">SVG</text>
  <text x="660" y="640" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700"
        fill="#FF7043" opacity="0.45" text-anchor="middle">BMP</text>
  <text x="840" y="640" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700"
        fill="#FF7043" opacity="0.45" text-anchor="middle">JPG</text>

  <!-- Layer 3: App name tag -->
  <text x="512" y="760" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="600"
        fill="#888" text-anchor="middle">Img.Cast</text>

  <!-- Layer 3: Corner pixel dots -->
  <circle cx="140" cy="200" r="14" fill="#4FC3F7" opacity="0.4"/>
  <circle cx="200" cy="180" r="10" fill="#FFD740" opacity="0.35"/>
  <circle cx="884" cy="200" r="14" fill="#FF7043" opacity="0.4"/>
  <circle cx="824" cy="180" r="10" fill="#A5D6A7" opacity="0.35"/>
</svg>
