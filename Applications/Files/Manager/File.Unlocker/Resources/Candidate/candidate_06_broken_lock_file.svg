<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#2d1b00"/>
    </linearGradient>
    <linearGradient id="lockbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
    <linearGradient id="crack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
    <filter id="fireglow"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- glow -->
  <circle cx="256" cy="280" r="150" fill="#ff5722" opacity="0.15" filter="url(#fireglow)"/>
  <!-- broken shackle left -->
  <path d="M185 240 Q185 165 256 165" stroke="#ff7043" stroke-width="26" fill="none" stroke-linecap="round"/>
  <!-- broken shackle right (offset) -->
  <path d="M256 175 Q327 175 327 250" stroke="#bf360c" stroke-width="26" fill="none" stroke-linecap="round"/>
  <!-- lock body cracked -->
  <rect x="165" y="255" width="182" height="145" rx="18" fill="url(#lockbody)"/>
  <!-- crack lines -->
  <polyline points="230,260 242,300 225,340 240,380" fill="none" stroke="url(#crack)" stroke-width="5"/>
  <polyline points="245,262 252,295 265,325 258,385" fill="none" stroke="url(#crack)" stroke-width="3" opacity="0.6"/>
  <!-- keyhole -->
  <circle cx="256" cy="315" r="20" fill="#1c0a00"/>
  <rect x="246" y="328" width="20" height="35" rx="5" fill="#1c0a00"/>
  <!-- sparks -->
  <circle cx="256" cy="255" r="8" fill="#ffeb3b" opacity="0.9"/>
  <line x1="248" y1="248" x2="240" y2="238" stroke="#ffeb3b" stroke-width="3"/>
  <line x1="264" y1="248" x2="272" y2="238" stroke="#ff9800" stroke-width="3"/>
  <line x1="256" y1="244" x2="256" y2="232" stroke="#fff" stroke-width="2"/>
</svg>
