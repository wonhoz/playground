<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <linearGradient id="pdfg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- PDF 내보내기 -->
  <!-- 웹 페이지 아이콘 -->
  <rect x="80" y="100" width="140" height="180" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="2" opacity="0.9"/>
  <!-- 내용 -->
  <rect x="80" y="100" width="140" height="16" rx="8" fill="#0a1520" opacity="0.9"/>
  <circle cx="94" cy="108" r="3" fill="#EF4444" opacity="0.7"/>
  <circle cx="104" cy="108" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="114" cy="108" r="3" fill="#4ADE80" opacity="0.7"/>
  <!-- 웹 내용 -->
  <rect x="90" y="124" width="120" height="12" rx="3" fill="#0a2030" opacity="0.7"/>
  <rect x="90" y="143" width="120" height="50" rx="3" fill="#0a1828" opacity="0.6"/>
  <rect x="90" y="200" width="120" height="30" rx="3" fill="#0a1828" opacity="0.5"/>
  <rect x="90" y="238" width="120" height="32" rx="3" fill="#0a1828" opacity="0.5"/>
  <!-- 변환 화살표 -->
  <path d="M228,190 L284,190" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="280,184 290,190 280,196" fill="#38BDF8" opacity="0.9" filter="url(#glow)"/>
  <!-- PDF 변환 아이콘 -->
  <circle cx="256" cy="190" r="20" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.8"/>
  <text x="256" y="195" text-anchor="middle" font-size="12" fill="#38BDF8" opacity="0.8">→</text>
  <!-- PDF 파일 아이콘 -->
  <rect x="292" y="100" width="140" height="180" rx="8" fill="url(#pdfg)" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <!-- PDF 헤더 색상 -->
  <rect x="292" y="100" width="140" height="30" rx="8" fill="#EF4444" opacity="0.4"/>
  <rect x="292" y="122" width="140" height="8" rx="0" fill="#EF4444" opacity="0.4"/>
  <text x="362" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444" filter="url(#glow)" opacity="0.9">PDF</text>
  <!-- PDF 내용 라인들 -->
  <rect x="306" y="140" width="112" height="6" rx="2" fill="#38BDF8" opacity="0.3"/>
  <rect x="306" y="152" width="100" height="5" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="306" y="162" width="108" height="5" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="306" y="172" width="90" height="5" rx="2" fill="#38BDF8" opacity="0.2"/>
  <!-- 이미지 영역 -->
  <rect x="306" y="186" width="112" height="40" rx="3" fill="#0a2030" opacity="0.6"/>
  <path d="M306,212 Q330,196 352,210 Q370,222 418,208" fill="#1a3a50" opacity="0.5"/>
  <!-- 더 많은 텍스트 -->
  <rect x="306" y="234" width="112" height="5" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="306" y="244" width="100" height="5" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="306" y="254" width="108" height="5" rx="2" fill="#38BDF8" opacity="0.15"/>
  <!-- 페이지 번호 -->
  <text x="362" y="272" text-anchor="middle" font-size="8" fill="#38BDF8" opacity="0.5">- 1 -</text>
  <!-- 다운로드 화살표 -->
  <path d="M256,310 L256,360" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <polygon points="248,354 264,354 256,366" fill="#38BDF8" opacity="0.8" filter="url(#glow)"/>
  <!-- 저장 아이콘 -->
  <rect x="218" y="370" width="76" height="60" rx="8" fill="#0a2030" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <rect x="226" y="378" width="60" height="36" rx="4" fill="#0d3040" opacity="0.8"/>
  <text x="256" y="408" text-anchor="middle" font-size="18" fill="#EF4444" opacity="0.8">PDF</text>
  <path d="M234,428 L256,438 L278,428" fill="#38BDF8" opacity="0.3"/>
  <!-- 하단 -->
  <rect x="80" y="448" width="352" height="42" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">PDF EXPORT</text>
</svg>
