<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1565c0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="40" cy="60" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="90" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="460" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="490" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="30" cy="450" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="480" cy="440" r="1" fill="white" opacity="0.7"/>
  <circle cx="470" cy="460" r="1.5" fill="white" opacity="0.5"/>
  <!-- Globe glow -->
  <circle cx="256" cy="240" r="200" fill="url(#globeGlow)"/>
  <!-- Globe -->
  <circle cx="256" cy="240" r="155" fill="url(#earthGrad)"/>
  <circle cx="256" cy="240" r="155" fill="none" stroke="#64b5f6" stroke-width="2" filter="url(#softGlow)" opacity="0.6"/>
  <!-- Lat/lon grid -->
  <ellipse cx="256" cy="240" rx="155" ry="32" fill="none" stroke="#64b5f6" stroke-width="1" opacity="0.3"/>
  <ellipse cx="256" cy="188" rx="142" ry="23" fill="none" stroke="#64b5f6" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="256" cy="292" rx="142" ry="23" fill="none" stroke="#64b5f6" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="256" cy="240" rx="45" ry="155" fill="none" stroke="#64b5f6" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="256" cy="240" rx="100" ry="155" fill="none" stroke="#64b5f6" stroke-width="0.8" opacity="0.2"/>
  <!-- Land masses -->
  <ellipse cx="235" cy="210" rx="50" ry="33" fill="#2e7d32" opacity="0.7"/>
  <ellipse cx="292" cy="223" rx="38" ry="25" fill="#388e3c" opacity="0.65"/>
  <ellipse cx="212" cy="262" rx="30" ry="21" fill="#2e7d32" opacity="0.7"/>
  <ellipse cx="275" cy="270" rx="26" ry="18" fill="#388e3c" opacity="0.6"/>
  <ellipse cx="186" cy="238" rx="20" ry="14" fill="#2e7d32" opacity="0.65"/>
  <!-- City lights dots -->
  <circle cx="240" cy="215" r="2" fill="#ffee58" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="260" cy="220" r="1.5" fill="#ffee58" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="295" cy="225" r="2" fill="#ffee58" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="215" cy="258" r="1.5" fill="#ffee58" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="280" cy="268" r="2" fill="#ffee58" opacity="0.9" filter="url(#softGlow)"/>
  <!-- Quiz HUD elements -->
  <rect x="50" y="60" width="130" height="50" rx="10" fill="#0d1117" stroke="#1976d2" stroke-width="1.5"/>
  <text x="65" y="80" font-family="Arial" font-size="11" fill="#64b5f6">SCORE</text>
  <text x="65" y="100" font-family="Arial" font-size="22" font-weight="bold" fill="#ffee58">1,240</text>
  <rect x="332" y="60" width="130" height="50" rx="10" fill="#0d1117" stroke="#1976d2" stroke-width="1.5"/>
  <text x="347" y="80" font-family="Arial" font-size="11" fill="#64b5f6">STREAK</text>
  <text x="347" y="100" font-family="Arial" font-size="22" font-weight="bold" fill="#ff9100">x 8 🔥</text>
  <!-- Floating question -->
  <rect x="175" y="390" width="162" height="55" rx="14" fill="#0d2137" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="256" y="410" font-family="Arial" font-size="11" fill="#90caf9" text-anchor="middle">Capital of Australia?</text>
  <text x="256" y="434" font-family="Arial" font-size="15" font-weight="bold" fill="#ffee58" text-anchor="middle">→ Canberra</text>
  <!-- Title -->
  <text x="256" y="486" font-family="Arial" font-size="28" font-weight="900" fill="#64b5f6" text-anchor="middle" filter="url(#softGlow)">GEO.QUIZ</text>
</svg>
