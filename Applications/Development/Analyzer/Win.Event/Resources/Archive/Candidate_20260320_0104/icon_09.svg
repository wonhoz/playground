<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0A0F"/>
  <!-- Calendar body -->
  <rect x="200" y="280" width="624" height="544" rx="28" fill="#3949AB" opacity="0.9"/>
  <rect x="200" y="280" width="624" height="100" rx="28" fill="#3949AB"/>
  <rect x="200" y="356" width="624" height="24" fill="#3949AB"/>
  <!-- Calendar top pegs -->
  <rect x="340" y="220" width="40" height="100" rx="20" fill="#7986CB"/>
  <rect x="644" y="220" width="40" height="100" rx="20" fill="#7986CB"/>
  <!-- Calendar grid lines -->
  <line x1="200" y1="460" x2="824" y2="460" stroke="#0A0A0F" stroke-width="4" opacity="0.4"/>
  <line x1="200" y1="556" x2="824" y2="556" stroke="#0A0A0F" stroke-width="4" opacity="0.4"/>
  <line x1="200" y1="652" x2="824" y2="652" stroke="#0A0A0F" stroke-width="4" opacity="0.4"/>
  <!-- Day cells -->
  <circle cx="312" cy="508" r="28" fill="#7986CB" opacity="0.3"/>
  <circle cx="424" cy="508" r="28" fill="#7986CB" opacity="0.3"/>
  <circle cx="536" cy="508" r="28" fill="#7986CB" opacity="0.3"/>
  <circle cx="648" cy="508" r="28" fill="#7986CB" opacity="0.3"/>
  <circle cx="760" cy="508" r="28" fill="#7986CB" opacity="0.3"/>
  <!-- Highlighted event day -->
  <circle cx="536" cy="604" r="38" fill="#7986CB"/>
  <circle cx="312" cy="604" r="28" fill="#7986CB" opacity="0.3"/>
  <circle cx="648" cy="700" r="28" fill="#7986CB" opacity="0.3"/>
  <!-- Event dot on highlighted -->
  <circle cx="536" cy="604" r="14" fill="#0A0A0F"/>
</svg>
