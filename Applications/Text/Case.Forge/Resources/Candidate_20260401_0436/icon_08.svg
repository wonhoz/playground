<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Toggle switch track (ON position) -->
  <!-- Switch outer track -->
  <rect x="148" y="378" width="728" height="268" rx="134" fill="url(#track)"/>
  <!-- Switch track ON fill -->
  <rect x="148" y="378" width="728" height="268" rx="134" fill="#00897B" opacity="0.9"/>
  <!-- Switch thumb (circle, right side = ON) -->
  <circle cx="698" cy="512" r="124" fill="white" opacity="0.2"/>
  <circle cx="698" cy="512" r="118" fill="white"/>
  <!-- Thumb highlight -->
  <circle cx="668" cy="484" r="34" fill="white" opacity="0.4"/>
  <!-- Layer 3: aA labels on switch -->
  <!-- OFF side label -->
  <text x="282" y="516" text-anchor="middle" dominant-baseline="middle" font-size="140" font-family="Georgia,serif" font-weight="bold" fill="white" opacity="0.7">a</text>
  <!-- ON side label (on thumb) -->
  <text x="698" y="516" text-anchor="middle" dominant-baseline="middle" font-size="140" font-family="Georgia,serif" font-weight="bold" fill="#00695C">A</text>
  <!-- Top label: case mode indicators -->
  <text x="512" y="240" text-anchor="middle" dominant-baseline="middle" font-size="88" font-family="Consolas,monospace" fill="#1B5E20" opacity="0.8">camel ↔ UPPER</text>
  <!-- Bottom label -->
  <text x="512" y="800" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Consolas,monospace" fill="#004D40" opacity="0.7">snake ↔ kebab</text>
</svg>
