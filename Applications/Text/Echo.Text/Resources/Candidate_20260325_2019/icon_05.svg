<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 코랄/레드 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 스피커 바디 -->
  <!-- 스피커 본체 사각형 -->
  <rect x="248" y="356" width="248" height="312" rx="32" fill="white"/>
  <!-- 스피커 뿔(horn) -->
  <polygon points="496,356 496,668 740,768 740,256" fill="white"/>
  <!-- 스피커 원형 그릴 (장식) -->
  <circle cx="360" cy="512" r="80" fill="#FFCCBC" opacity="0.3"/>
  <circle cx="360" cy="512" r="50" fill="#FFCCBC" opacity="0.3"/>
  <!-- Layer 3: 음파 아크 (노란/흰색) -->
  <path d="M766,392 Q844,392 844,512 Q844,632 766,632" fill="none" stroke="#FFD740" stroke-width="52" stroke-linecap="round"/>
  <path d="M824,340 Q928,340 928,512 Q928,684 824,684" fill="none" stroke="#FFEE58" stroke-width="40" stroke-linecap="round" opacity="0.8"/>
  <!-- "echo" 텍스트 -->
  <text x="512" y="890" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="136"
        font-weight="900" fill="white" text-anchor="middle" opacity="0.9">echo</text>
</svg>
