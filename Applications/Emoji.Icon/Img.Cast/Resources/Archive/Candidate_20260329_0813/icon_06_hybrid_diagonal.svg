<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="card1g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8F4FF" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- Layer 2: Diagonal image format cards cascading -->
  <!-- Card 3 (back) -->
  <g transform="rotate(-15, 512, 512)">
    <rect x="580" y="280" width="200" height="260" rx="18" fill="#A78BFA" opacity="0.7"/>
    <text x="680" y="350" font-family="monospace" font-size="80" fill="white" text-anchor="middle" font-weight="bold">PNG</text>
    <rect x="600" y="370" width="160" height="120" rx="8" fill="white" opacity="0.3"/>
  </g>
  <!-- Card 2 (mid) -->
  <g transform="rotate(-5, 512, 512)">
    <rect x="420" y="320" width="200" height="260" rx="18" fill="#34D399" opacity="0.85"/>
    <text x="520" y="390" font-family="monospace" font-size="80" fill="white" text-anchor="middle" font-weight="bold">JPG</text>
    <rect x="440" y="410" width="160" height="120" rx="8" fill="white" opacity="0.3"/>
  </g>
  <!-- Card 1 (front) -->
  <g transform="rotate(8, 512, 512)">
    <rect x="260" y="360" width="210" height="270" rx="18" fill="#FFFFFF" opacity="0.95"/>
    <text x="365" y="435" font-family="monospace" font-size="75" fill="#FF6B9D" text-anchor="middle" font-weight="bold">SVG</text>
    <rect x="280" y="460" width="170" height="130" rx="8" fill="#FFB347" opacity="0.4"/>
    <circle cx="365" cy="525" r="35" fill="#FF6B9D" opacity="0.6"/>
  </g>
  <!-- Layer 3: Arrow showing diagonal direction/transform -->
  <path d="M 680 680 L 780 720" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <polygon points="780,720 750,695 760,725" fill="white" opacity="0.8"/>
  <circle cx="300" cy="730" r="22" fill="white" opacity="0.5"/>
  <circle cx="370" cy="750" r="16" fill="white" opacity="0.35"/>
  <circle cx="430" cy="762" r="10" fill="white" opacity="0.2"/>
</svg>
