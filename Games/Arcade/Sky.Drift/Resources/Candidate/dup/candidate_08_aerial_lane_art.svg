<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001520"/>
      <stop offset="100%" style="stop-color:#003040"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Horizon glow -->
  <rect x="40" y="380" width="432" height="80" rx="20" fill="url(#horizonGrad)" opacity="0.3"/>
  <line x1="40" y1="380" x2="472" y2="380" stroke="#00aaff" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Perspective aerial lanes converging at horizon -->
  <path d="M40 380 L256 180 L472 380" stroke="#00aaff" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.4"/>
  <path d="M120 380 L256 180 L392 380" stroke="#00aaff" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.3"/>
  <path d="M180 380 L256 180 L332 380" stroke="#00ccff" stroke-width="1" fill="none" filter="url(#glow)" opacity="0.25"/>
  <!-- Horizontal lane dividers -->
  <path d="M100 330 Q256 320 412 330" stroke="#00aaff" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.4"/>
  <path d="M135 290 Q256 282 377 290" stroke="#00aaff" stroke-width="1" fill="none" filter="url(#glow)" opacity="0.35"/>
  <path d="M165 258 Q256 251 347 258" stroke="#00ccff" stroke-width="1" fill="none" filter="url(#glow)" opacity="0.3"/>
  <!-- Vanishing point light -->
  <circle cx="256" cy="180" r="8" fill="#ffffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="180" r="22" fill="none" stroke="#00aaff" stroke-width="1.5" filter="url(#glow)" opacity="0.4"/>
  <!-- Plane top-down view -->
  <g transform="translate(256, 310)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="50" ry="12" fill="#aaddff"/>
    <path d="M-8 -12 L-35 -48 L15 -48 L22 -12 Z" fill="#88aacc"/>
    <path d="M-8 12 L-35 48 L15 48 L22 12 Z" fill="#88aacc"/>
    <path d="M-44 0 L-58 -22 L-36 -12 Z" fill="#6688aa"/>
    <path d="M-44 0 L-56 18 L-36 12 Z" fill="#6688aa"/>
    <ellipse cx="30" cy="0" rx="14" ry="6" fill="#0066aa" opacity="0.9"/>
    <!-- Wing lights -->
    <circle cx="-32" cy="-48" r="4" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="-32" cy="48" r="4" fill="#00ff88" filter="url(#glow)"/>
  </g>
  <!-- Clouds far ahead near horizon -->
  <ellipse cx="160" cy="210" rx="50" ry="18" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="370" cy="225" rx="45" ry="16" fill="#ffffff" opacity="0.10"/>
</svg>