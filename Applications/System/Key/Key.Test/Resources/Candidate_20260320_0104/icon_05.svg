<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080A00"/>
  <!-- Oscilloscope screen -->
  <rect x="180" y="260" width="580" height="380" rx="24" fill="#33691E" opacity="0.2"/>
  <rect x="180" y="260" width="580" height="380" rx="24" fill="none" stroke="#33691E" stroke-width="18"/>
  <!-- Grid lines -->
  <line x1="323" y1="260" x2="323" y2="640" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <line x1="466" y1="260" x2="466" y2="640" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <line x1="609" y1="260" x2="609" y2="640" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <line x1="180" y1="354" x2="760" y2="354" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <line x1="180" y1="450" x2="760" y2="450" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <line x1="180" y1="546" x2="760" y2="546" stroke="#33691E" stroke-width="6" opacity="0.3"/>
  <!-- Oscilloscope signal - key press detected -->
