<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2km" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2A"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2km)"/>

  <!-- Layer 2: 앱 선택 + 단축키 테이블 UI (공간/장면) -->
  <!-- 앱 창 전체 -->
  <rect x="148" y="195" width="728" height="590" rx="18" fill="#181820"/>
  <rect x="148" y="195" width="728" height="590" rx="18" fill="none" stroke="#2A2A3A" stroke-width="4"/>

  <!-- 타이틀바 -->
  <rect x="148" y="195" width="728" height="42" rx="18" fill="#202030"/>
  <rect x="148" y="217" width="728" height="20" fill="#202030"/>
  <circle cx="186" cy="216" r="8" fill="#FF5F57"/>
  <circle cx="212" cy="216" r="8" fill="#FFBD2E"/>
  <circle cx="238" cy="216" r="8" fill="#28CA42"/>
  <text x="512" y="224" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#444455">Key.Map</text>

  <!-- 좌측 사이드바: 앱 프리셋 목록 -->
  <rect x="148" y="237" width="200" height="548" rx="8" fill="#14141E"/>
  <text x="170" y="268" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">Presets</text>

  <!-- 프리셋 항목들 -->
  <rect x="156" y="278" width="184" height="36" rx="8" fill="#3F51B5"/>
  <text x="176" y="300" font-family="Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#E8EAF6">⚡ VS Code</text>
  <text x="176" y="330" font-family="Segoe UI,sans-serif" font-size="14" fill="#5C6BC0">⚡ Visual Studio</text>
  <text x="176" y="360" font-family="Segoe UI,sans-serif" font-size="14" fill="#5C6BC0">⚡ IntelliJ IDEA</text>
  <text x="176" y="390" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">⚡ Excel</text>
  <text x="176" y="420" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">⚡ Chrome</text>
  <text x="176" y="450" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">⚡ Word</text>
  <text x="176" y="480" font-family="Segoe UI,sans-serif" font-size="14" fill="#444455">⚡ Windows</text>

  <!-- 우측 메인: 단축키 테이블 -->
  <!-- 카테고리 필터 탭 -->
  <rect x="358" y="248" width="60" height="26" rx="6" fill="#3F51B5"/>
  <text x="388" y="265" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#E8EAF6">All</text>
  <rect x="422" y="248" width="60" height="26" rx="6" fill="#1E1E2E"/>
  <text x="452" y="265" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#5C6BC0">File</text>
  <rect x="486" y="248" width="60" height="26" rx="6" fill="#1E1E2E"/>
  <text x="516" y="265" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#5C6BC0">Edit</text>
  <rect x="550" y="248" width="60" height="26" rx="6" fill="#1E1E2E"/>
  <text x="580" y="265" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#5C6BC0">View</text>

  <!-- 테이블 헤더 -->
  <rect x="356" y="282" width="504" height="30" rx="6" fill="#1E2040"/>
  <text x="376" y="300" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#9FA8DA">Keys</text>
  <text x="520" y="300" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#9FA8DA">Description</text>
  <text x="720" y="300" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#9FA8DA">Category</text>

  <!-- 테이블 행들 -->
  <g font-family="Consolas,monospace" font-size="15">
    <rect x="356" y="314" width="504" height="30" rx="4" fill="#16182E"/>
    <text x="376" y="334" font-weight="600" fill="#C5CAE9">Ctrl + S</text>
    <text x="520" y="334" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">저장</text>
    <rect x="718" y="318" width="66" height="20" rx="6" fill="#1A237E"/>
    <text x="751" y="332" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#7986CB">File</text>

    <rect x="356" y="346" width="504" height="30" rx="4" fill="#14141E"/>
    <text x="376" y="366" font-weight="600" fill="#C5CAE9">Ctrl + Z</text>
    <text x="520" y="366" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">실행 취소</text>
    <rect x="718" y="350" width="66" height="20" rx="6" fill="#1A237E"/>
    <text x="751" y="364" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#7986CB">Edit</text>

    <rect x="356" y="378" width="504" height="30" rx="4" fill="#16182E"/>
    <text x="376" y="398" font-weight="600" fill="#C5CAE9">Ctrl + P</text>
    <text x="520" y="398" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">Quick Open</text>
    <rect x="718" y="382" width="66" height="20" rx="6" fill="#0D1B3E"/>
    <text x="751" y="396" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#5C6BC0">Navigate</text>

    <rect x="356" y="410" width="504" height="30" rx="4" fill="#14141E"/>
    <text x="376" y="430" font-weight="600" fill="#C5CAE9">Ctrl + `</text>
    <text x="520" y="430" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">터미널 토글</text>
    <rect x="718" y="414" width="66" height="20" rx="6" fill="#0D1B3E"/>
    <text x="751" y="428" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#5C6BC0">View</text>

    <rect x="356" y="442" width="504" height="30" rx="4" fill="#16182E"/>
    <text x="376" y="462" font-weight="600" fill="#C5CAE9">F5</text>
    <text x="520" y="462" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">디버그 시작</text>
    <rect x="718" y="446" width="66" height="20" rx="6" fill="#1A2E10"/>
    <text x="751" y="460" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#66BB6A">Run</text>

    <rect x="356" y="474" width="504" height="30" rx="4" fill="#14141E"/>
    <text x="376" y="494" font-weight="600" fill="#C5CAE9">Ctrl + Shift + P</text>
    <text x="520" y="494" font-family="Segoe UI,sans-serif" font-size="14" fill="#9FA8DA">커맨드 팔레트</text>
    <rect x="718" y="478" width="66" height="20" rx="6" fill="#0D1B3E"/>
    <text x="751" y="492" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#5C6BC0">Other</text>
  </g>

  <!-- 하단 상태바 -->
  <rect x="148" y="737" width="728" height="48" rx="18" fill="#14141E"/>
  <rect x="148" y="737" width="728" height="24" fill="#14141E"/>
  <text x="176" y="767" font-family="Segoe UI,sans-serif" font-size="14" fill="#3F51B5">VS Code — 48개 단축키</text>
</svg>
