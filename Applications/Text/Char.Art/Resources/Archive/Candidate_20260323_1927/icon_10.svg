  <text x="440" y="320" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <!-- Right diagonal characters -->
  <text x="730" y="720" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="712" y="680" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="694" y="640" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="674" y="600" font-family="monospace" font-size="38" font-weight="700" fill="#333333">.</text>
  <text x="654" y="560" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="634" y="520" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="614" y="480" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="592" y="440" font-family="monospace" font-size="38" font-weight="700" fill="#333333">.</text>
  <text x="570" y="400" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="548" y="360" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="524" y="320" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <!-- Crossbar characters -->
  <text x="348" y="580" font-family="monospace" font-size="38" font-weight="700" fill="#111111">@</text>
  <text x="390" y="580" font-family="monospace" font-size="38" font-weight="700" fill="#222222">#</text>
  <text x="430" y="580" font-family="monospace" font-size="38" font-weight="700" fill="#111111">.</text>
