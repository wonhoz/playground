<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a00"/>
      <stop offset="100%" stop-color="#1a1400"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#222200"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="32%" stop-color="#111100"/>
      <stop offset="55%" stop-color="#FFD700"/>
      <stop offset="57%" stop-color="#111100"/>
      <stop offset="75%" stop-color="#FFD700"/>
      <stop offset="77%" stop-color="#111100"/>
      <stop offset="90%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#111100"/>
    </radialGradient>
    <radialGradient id="label" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEE88"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="200" fill="url(#vinyl)" opacity="0.9"/>
  <!-- Center label -->
  <circle cx="256" cy="256" r="70" fill="url(#label)"/>
  <!-- Center hole -->
  <circle cx="256" cy="256" r="12" fill="#0f0a00"/>
  <!-- Groove highlights -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.25"/>
  <circle cx="256" cy="256" r="85" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  <!-- Beat note on label -->
  <circle cx="248" cy="265" r="14" fill="#0f0a00"/>
  <rect x="258" y="238" width="6" height="30" rx="3" fill="#0f0a00"/>
  <path d="M264,238 Q292,230 290,248 Q288,256 264,256" fill="#0f0a00"/>
  <!-- Drop splash at bottom -->
  <ellipse cx="256" cy="470" rx="60" ry="14" fill="#FFD700" opacity="0.4"/>
  <path d="M256,440 Q268,455 256,470 Q244,455 256,440 Z" fill="#FFD700" opacity="0.7"/>
</svg>