<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#042B1A"/>
  <!-- Layer 2: 큰 GET 텍스트 + URL 바 -->
  <!-- GET 메서드 배지 -->
  <rect x="80" y="200" width="400" height="220" rx="32" fill="#166534"/>
  <rect x="80" y="200" width="400" height="220" rx="32" fill="none" stroke="#22C55E" stroke-width="14"/>
  <text x="280" y="348" font-size="160" fill="#4ADE80" text-anchor="middle" font-weight="bold" font-family="Arial Black">GET</text>
  <!-- URL 바 -->
  <rect x="80" y="460" width="860" height="90" rx="20" fill="#0A3A20"/>
  <rect x="80" y="460" width="860" height="90" rx="20" fill="none" stroke="#22C55E" stroke-width="10"/>
  <text x="140" y="520" font-size="38" fill="#86EFAC" font-family="monospace">https://api.example.com/v1/</text>
  <!-- 응답 패널 -->
  <rect x="80" y="590" width="860" height="340" rx="20" fill="#0A3A20"/>
  <rect x="80" y="590" width="860" height="340" rx="20" fill="none" stroke="#166534" stroke-width="8"/>
  <!-- JSON 응답 -->
  <text x="120" y="640" font-size="36" fill="#4ADE80" font-family="monospace">&#123;</text>
  <text x="160" y="688" font-size="32" fill="#86EFAC" font-family="monospace">"status": "ok",</text>
  <text x="160" y="732" font-size="32" fill="#86EFAC" font-family="monospace">"data": &#123; ... &#125;</text>
  <text x="120" y="776" font-size="36" fill="#4ADE80" font-family="monospace">&#125;</text>
  <!-- Layer 3: 200 OK 배지 -->
  <rect x="650" y="200" width="290" height="220" rx="32" fill="#15803D"/>
  <rect x="650" y="200" width="290" height="220" rx="32" fill="none" stroke="#4ADE80" stroke-width="10"/>
  <text x="795" y="290" font-size="64" fill="#DCFCE7" text-anchor="middle" font-weight="bold">200</text>
  <text x="795" y="370" font-size="40" fill="#86EFAC" text-anchor="middle" font-weight="bold">OK</text>
</svg>
