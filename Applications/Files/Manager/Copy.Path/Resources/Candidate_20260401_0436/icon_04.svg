<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Crossroads / road fork (path = multiple formats) -->
  <!-- Vertical road (main) -->
  <rect x="440" y="120" width="140" height="380" rx="12" fill="#6A1B9A" opacity="0.8"/>
  <!-- Road center line (dashes) vertical -->
  <line x1="512" y1="140" x2="512" y2="480" stroke="white" stroke-width="10" stroke-dasharray="36 24" stroke-linecap="round"/>
  <!-- Fork left road -->
  <rect x="160" y="490" width="380" height="120" rx="12" fill="#7B1FA2" opacity="0.8" transform="rotate(-18 350 550)"/>
  <!-- Fork right road -->
  <rect x="490" y="490" width="380" height="120" rx="12" fill="#7B1FA2" opacity="0.8" transform="rotate(18 680 550)"/>
  <!-- Fork center road (straight down) -->
  <rect x="440" y="490" width="140" height="280" rx="12" fill="#6A1B9A" opacity="0.8"/>
  <!-- Signs on each fork -->
  <!-- Left sign -->
  <rect x="128" y="570" width="230" height="90" rx="12" fill="#AB47BC"/>
  <text x="243" y="617" text-anchor="middle" dominant-baseline="middle" font-size="58" font-family="Consolas,monospace" fill="white" font-weight="bold">C:/…</text>
  <!-- Right sign -->
  <rect x="680" y="570" width="230" height="90" rx="12" fill="#AB47BC"/>
  <text x="795" y="617" text-anchor="middle" dominant-baseline="middle" font-size="58" font-family="Consolas,monospace" fill="white" font-weight="bold">\\…</text>
  <!-- Bottom sign -->
  <rect x="390" y="788" width="244" height="90" rx="12" fill="#AB47BC"/>
  <text x="512" y="833" text-anchor="middle" dominant-baseline="middle" font-size="58" font-family="Consolas,monospace" fill="white" font-weight="bold">./…</text>
  <!-- Layer 3: Top path label entering the fork -->
  <rect x="352" y="126" width="320" height="84" rx="14" fill="#6A1B9A"/>
  <text x="512" y="170" text-anchor="middle" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#FFD600" font-weight="bold">C:\path</text>
  <!-- Fork junction circle -->
  <circle cx="512" cy="500" r="38" fill="#FFD600"/>
  <circle cx="512" cy="500" r="22" fill="#6A1B9A"/>
</svg>
