<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6EB4"/>
      <stop offset="100%" stop-color="#A020A0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00000040"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Floating cards representing layout elements -->
  <!-- Card 1 (rotated) -->
  <rect x="80" y="100" width="160" height="110" rx="14" fill="url(#cardGrad)" stroke="white" stroke-opacity="0.3" stroke-width="1.5" filter="url(#shadow)" transform="rotate(-8 160 155)"/>
  <rect x="95" y="118" width="80" height="12" rx="6" fill="white" opacity="0.5" transform="rotate(-8 135 124)"/>
  <rect x="95" y="138" width="60" height="10" rx="5" fill="white" opacity="0.3" transform="rotate(-8 125 143)"/>
  <!-- Card 2 (center, main) -->
  <rect x="140" y="160" width="232" height="180" rx="16" fill="white" opacity="0.15" stroke="white" stroke-opacity="0.4" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Card content -->
  <rect x="158" y="178" width="100" height="16" rx="8" fill="white" opacity="0.5"/>
  <rect x="158" y="202" width="196" height="10" rx="5" fill="white" opacity="0.3"/>
  <rect x="158" y="220" width="170" height="10" rx="5" fill="white" opacity="0.25"/>
  <rect x="158" y="238" width="180" height="10" rx="5" fill="white" opacity="0.2"/>
  <!-- Grid icon in card -->
  <rect x="158" y="264" width="44" height="44" rx="6" fill="white" opacity="0.2"/>
  <line x1="179" y1="264" x2="179" y2="308" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="285" x2="202" y2="285" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <rect x="212" y="268" width="60" height="10" rx="5" fill="white" opacity="0.35"/>
  <rect x="212" y="286" width="44" height="10" rx="5" fill="white" opacity="0.25"/>
  <!-- Card 3 (rotated right) -->
  <rect x="280" y="108" width="152" height="100" rx="14" fill="url(#cardGrad)" stroke="white" stroke-opacity="0.3" stroke-width="1.5" filter="url(#shadow)" transform="rotate(6 356 158)"/>
  <!-- Pen cursor bottom right -->
  <path d="M396 360 L440 316 L460 336 L416 380 Z" fill="white" opacity="0.7"/>
  <path d="M396 360 L388 380 L408 372 Z" fill="white" opacity="0.5"/>
  <line x1="420" y1="320" x2="440" y2="340" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Bottom label -->
  <text x="256" y="456" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white" font-weight="700" opacity="0.9">Layout.Forge</text>
</svg>
