<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Snowflake (TEMP = temporary = cold) -->
  <!-- Main cross -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <!-- Diagonal arms -->
  <line x1="132" y1="132" x2="380" y2="380" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="132" x2="132" y2="380" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <!-- Branch details -->
  <line x1="256" y1="140" x2="228" y2="120" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="284" y2="120" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="372" x2="228" y2="392" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="372" x2="284" y2="392" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="256" x2="120" y2="228" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="256" x2="120" y2="284" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="372" y1="256" x2="392" y2="228" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <line x1="372" y1="256" x2="392" y2="284" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="20" fill="#2563EB"/>
  <circle cx="256" cy="256" r="10" fill="white"/>
  <!-- TEMP label -->
  <text x="256" y="490" font-family="monospace" font-weight="bold" font-size="28" fill="#1D4ED8" text-anchor="middle">TEMP Files</text>
</svg>