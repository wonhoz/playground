<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 레드블랙 — 레이어드 구성 / QR 코드 + 로고 삽입 모티프 (로고 기능 표현) -->
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="qrBg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF0F0"/>
    </linearGradient>
    <radialGradient id="logoBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="145" fill="url(#bg9)"/>
  <!-- 빨간 빛 번짐 -->
  <circle cx="512" cy="512" r="350" fill="#FF0000" opacity="0.04"/>
  <circle cx="850" cy="850" r="200" fill="#FF1744" opacity="0.05"/>

  <!-- QR 코드 패널 -->
  <rect x="152" y="152" width="720" height="720" rx="22" fill="url(#qrBg9)"/>
  <!-- 빨간 테두리 강조 -->
  <rect x="152" y="152" width="720" height="720" rx="22" fill="none" stroke="#FF1744" stroke-width="5" opacity="0.7"/>

  <!-- 좌상 코너 파인더 -->
  <rect x="182" y="182" width="178" height="178" rx="14" fill="url(#redGrad)"/>
  <rect x="200" y="200" width="142" height="142" rx="10" fill="url(#qrBg9)"/>
  <rect x="218" y="218" width="106" height="106" rx="7" fill="url(#redGrad)"/>

  <!-- 우상 코너 파인더 -->
  <rect x="664" y="182" width="178" height="178" rx="14" fill="url(#redGrad)"/>
  <rect x="682" y="200" width="142" height="142" rx="10" fill="url(#qrBg9)"/>
  <rect x="700" y="218" width="106" height="106" rx="7" fill="url(#redGrad)"/>

