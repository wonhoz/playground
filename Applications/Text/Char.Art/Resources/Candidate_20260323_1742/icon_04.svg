<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#050505"/>
  <!-- Layer 2: 밝기 스케일 → 문자 매핑 시각화 -->
  <!-- 그라데이션 바 (어두움→밝음) -->
  <!-- 블록 1 (가장 어두움 = @) -->
  <rect x="60" y="80" width="132" height="280" rx="8" fill="#050505" stroke="#444" stroke-width="4"/>
  <text x="126" y="220" font-size="120" fill="#111111" text-anchor="middle" font-family="monospace">@</text>
  <text x="126" y="330" font-size="40" fill="#555" text-anchor="middle" font-family="monospace">darkest</text>
  <!-- 블록 2 -->
  <rect x="204" y="80" width="132" height="280" rx="8" fill="#1A1A1A" stroke="#555" stroke-width="4"/>
  <text x="270" y="220" font-size="120" fill="#333333" text-anchor="middle" font-family="monospace">#</text>
  <text x="270" y="330" font-size="40" fill="#666" text-anchor="middle" font-family="monospace">dark</text>
  <!-- 블록 3 -->
  <rect x="348" y="80" width="132" height="280" rx="8" fill="#3A3A3A" stroke="#777" stroke-width="4"/>
  <text x="414" y="220" font-size="120" fill="#666666" text-anchor="middle" font-family="monospace">*</text>
  <text x="414" y="330" font-size="40" fill="#888" text-anchor="middle" font-family="monospace">mid</text>
  <!-- 블록 4 -->
  <rect x="492" y="80" width="132" height="280" rx="8" fill="#5A5A5A" stroke="#888" stroke-width="4"/>
  <text x="558" y="220" font-size="120" fill="#AAAAAA" text-anchor="middle" font-family="monospace">+</text>
  <text x="558" y="330" font-size="40" fill="#AAA" text-anchor="middle" font-family="monospace">med</text>
  <!-- 블록 5 -->
  <rect x="636" y="80" width="132" height="280" rx="8" fill="#808080" stroke="#AAA" stroke-width="4"/>
  <text x="702" y="220" font-size="120" fill="#CCCCCC" text-anchor="middle" font-family="monospace">.</text>
  <text x="702" y="330" font-size="40" fill="#CCC" text-anchor="middle" font-family="monospace">light</text>
  <!-- 블록 6 (가장 밝음 = 공백) -->
  <rect x="780" y="80" width="184" height="280" rx="8" fill="#EEEEEE" stroke="#CCC" stroke-width="4"/>
  <text x="872" y="220" font-size="120" fill="#BBBBBB" text-anchor="middle" font-family="monospace">' '</text>
  <text x="872" y="330" font-size="40" fill="#999" text-anchor="middle" font-family="monospace">brightest</text>
  <!-- 화살표 (밝기 → 문자 매핑) -->
  <rect x="60" y="420" width="904" height="8" rx="4" fill="#333"/>
  <polygon points="60,444 130,414 130,474" fill="#555"/>
  <polygon points="964,444 894,414 894,474" fill="#EEE"/>
  <text x="100" y="415" font-size="32" fill="#333" font-family="monospace">dark</text>
  <text x="840" y="415" font-size="32" fill="#CCC" font-family="monospace">bright</text>
  <!-- Layer 3: 결과 텍스트 아트 (하단) -->
  <rect x="60" y="480" width="904" height="460" rx="16" fill="#001400"/>
  <text x="100" y="540" font-size="32" fill="#00FF41" font-family="monospace">@@@@####****++++....    </text>
  <text x="100" y="580" font-size="32" fill="#00EE38" font-family="monospace">@@##****++..  @@####**++</text>
  <text x="100" y="620" font-size="32" fill="#00DD30" font-family="monospace">##****++..    @@####****</text>
  <text x="100" y="660" font-size="32" fill="#00CC28" font-family="monospace">++++..    @@@@####****++</text>
  <text x="100" y="700" font-size="32" fill="#00DD30" font-family="monospace">....    @@@@####****++++</text>
  <text x="100" y="740" font-size="32" fill="#00EE38" font-family="monospace">    @@@@####****++++....*</text>
  <text x="100" y="780" font-size="32" fill="#00FF41" font-family="monospace">@@@@####**++....  @@####</text>
  <text x="100" y="820" font-size="32" fill="#00EE38" font-family="monospace">####**++....  @@####****</text>
  <text x="100" y="860" font-size="32" fill="#00DD30" font-family="monospace">**++....  @@@@####****++</text>
  <text x="100" y="900" font-size="32" fill="#00CC28" font-family="monospace">++++....@@@@####****++▌</text>
</svg>
