<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c4ff"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 물방울 -->
  <path d="M256 90 Q310 180 310 260 Q310 330 256 360 Q202 330 202 260 Q202 180 256 90 Z" fill="url(#drop)" opacity="0.85"/>
  <!-- 물방울 반짝임 -->
  <ellipse cx="230" cy="180" rx="18" ry="30" fill="white" opacity="0.3" transform="rotate(-20 230 180)"/>
  <!-- 잎이 자라는 모습 -->
  <path d="M256 360 Q200 400 180 440 Q230 420 256 380" fill="url(#leaf)" opacity="0.9"/>
  <path d="M256 360 Q312 400 332 440 Q282 420 256 380" fill="url(#leaf)" opacity="0.8"/>
  <!-- 줄기 -->
  <line x1="256" y1="380" x2="256" y2="450" stroke="#4caf50" stroke-width="12" stroke-linecap="round"/>
  <!-- 땅 -->
  <ellipse cx="256" cy="460" rx="120" ry="30" fill="#3e2723"/>
  <!-- 잎맥 -->
  <path d="M260 120 Q290 200 280 300" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
</svg>
