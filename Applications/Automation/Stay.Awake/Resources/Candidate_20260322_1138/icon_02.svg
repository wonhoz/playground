<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background — deep violet -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- Layer 2: Messenger chat bubble (white) -->
  <!-- Bubble body -->
  <rect x="158" y="188" width="600" height="408" rx="80" fill="white"/>
  <!-- Bubble tail (bottom-left notch) -->
  <path d="M 224,596 L 178,774 L 392,636" fill="white"/>

  <!-- Layer 3: Active badge (bottom-right of bubble, prominent) -->
  <!-- White border ring -->
  <circle cx="796" cy="638" r="186" fill="white"/>
  <!-- Green fill -->
  <circle cx="796" cy="638" r="160" fill="#22C55E"/>
  <!-- Inner glow -->
  <circle cx="796" cy="638" r="80" fill="#86EFAC" opacity="0.45"/>

  <!-- "Online" dots inside bubble (Slack-style status row) -->
  <circle cx="270" cy="392" r="28" fill="#22C55E"/>
  <rect x="316" y="372" width="246" height="40" rx="12" fill="#E2E8F0" opacity="0.7"/>
  <circle cx="270" cy="476" r="28" fill="#94A3B8"/>
  <rect x="316" y="456" width="196" height="40" rx="12" fill="#E2E8F0" opacity="0.5"/>
</svg>
