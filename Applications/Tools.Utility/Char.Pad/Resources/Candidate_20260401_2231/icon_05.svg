<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg05cp)"/>

  <!-- Layer 2: Math symbols arranged in scene -->
  <!-- Large central Sigma -->
  <text x="512" y="600" font-family="'Segoe UI',Arial,sans-serif" font-size="520" fill="white"
    text-anchor="middle" opacity="0.15">∑</text>

  <!-- Foreground math symbols in white boxes -->
  <rect x="88" y="200" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="188" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#6A1B9A" text-anchor="middle">∑</text>

  <rect x="88" y="420" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="188" y="526" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#1B5E20" text-anchor="middle">∞</text>

  <rect x="88" y="640" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="188" y="748" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#0D47A1" text-anchor="middle">π</text>

  <rect x="736" y="200" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="836" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#BF360C" text-anchor="middle">±</text>

  <rect x="736" y="420" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="836" y="526" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#880E4F" text-anchor="middle">≠</text>

  <rect x="736" y="640" width="200" height="160" rx="20" fill="white" opacity="0.9"/>
  <text x="836" y="748" font-family="'Segoe UI',Arial,sans-serif" font-size="120" fill="#37474F" text-anchor="middle">÷</text>

  <!-- Layer 3: Center big symbol + label -->
  <circle cx="512" cy="420" r="175" fill="white" opacity="0.18"/>
  <text x="512" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="200" fill="white" text-anchor="middle">∑</text>
  <text x="512" y="740" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">MATH</text>
  <text x="512" y="840" font-family="'Segoe UI',Arial,sans-serif" font-size="64"
    fill="white" text-anchor="middle" opacity="0.75">symbols</text>
</svg>
