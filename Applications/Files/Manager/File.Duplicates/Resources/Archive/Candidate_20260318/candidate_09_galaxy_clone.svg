  </g>
  <g transform="translate(92, 260)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="#22D3EE" opacity="0.65"/>
    <polygon points="0,0 16,0 16,-12 32,0" fill="#67E8F9" opacity="0.6"/>
  </g>
  <!-- 중심 - DNA 나선 표시 -->
  <circle cx="256" cy="256" r="26" fill="#06B6D4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="18" fill="#22D3EE" opacity="1" filter="url(#glow)"/>
  <text x="256" y="261" text-anchor="middle" font-family="Arial" font-size="11" fill="#030508" font-weight="bold">CLN</text>
