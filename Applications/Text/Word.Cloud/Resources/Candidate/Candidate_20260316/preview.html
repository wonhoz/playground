<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Word.Cloud - Icon Candidates</title>
<style>
  body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { color: #74b9ff; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.25s ease; }
  .card:hover { transform: translateY(-6px) scale(1.04); border-color: #74b9ff; box-shadow: 0 12px 32px rgba(116,185,255,0.3); }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card span { display: block; margin-top: 10px; font-size: 12px; color: #888; }
  .card:hover span { color: #74b9ff; }
</style>
</head>
<body>
<h1>Word.Cloud</h1>
<p>Word cloud generator — 10 icon candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_word_cloud_art.svg" alt="01"><span>01 · Word Cloud Art</span></div>
  <div class="card"><img src="candidate_02_text_bubble_cluster.svg" alt="02"><span>02 · Text Bubble Cluster</span></div>
  <div class="card"><img src="candidate_03_word_swarm.svg" alt="03"><span>03 · Word Swarm</span></div>
  <div class="card"><img src="candidate_04_letter_constellation.svg" alt="04"><span>04 · Letter Constellation</span></div>
  <div class="card"><img src="candidate_05_text_cloud_colorful.svg" alt="05"><span>05 · Text Cloud Colorful</span></div>
  <div class="card"><img src="candidate_06_word_galaxy.svg" alt="06"><span>06 · Word Galaxy</span></div>
  <div class="card"><img src="candidate_07_word_frequency_art.svg" alt="07"><span>07 · Word Frequency Art</span></div>
  <div class="card"><img src="candidate_08_text_vortex.svg" alt="08"><span>08 · Text Vortex</span></div>
  <div class="card"><img src="candidate_09_word_cloud_minimal.svg" alt="09"><span>09 · Word Cloud Minimal</span></div>
  <div class="card"><img src="candidate_10_letter_nebula.svg" alt="10"><span>10 · Letter Nebula</span></div>
</div>
</body>
</html>
