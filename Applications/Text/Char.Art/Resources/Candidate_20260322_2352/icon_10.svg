<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FDF2F8"/>
  <!-- Layer 2: Large eye silhouette -->
  <!-- Eye outline (ellipse) -->
  <ellipse cx="512" cy="420" rx="360" ry="200" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="18"/>
  <!-- Pupil outer -->
  <circle cx="512" cy="420" r="130" fill="#1E3A8A"/>
  <!-- Pupil inner (contains text art) -->
  <circle cx="512" cy="420" r="108" fill="#0F172A"/>
  <!-- Iris ring -->
  <circle cx="512" cy="420" r="130" fill="none" stroke="#3B82F6" stroke-width="16" opacity="0.6"/>
  <!-- Layer 3: Text art characters in pupil -->
  <text x="512" y="390" font-family="Consolas,monospace" font-size="22" fill="#4ADE80" text-anchor="middle">@##$$%</text>
  <text x="512" y="420" font-family="Consolas,monospace" font-size="22" fill="#22C55E" text-anchor="middle">*+==-.</text>
  <text x="512" y="450" font-family="Consolas,monospace" font-size="22" fill="#16A34A" text-anchor="middle">:::...</text>
  <!-- Eyelashes (curved lines) -->
  <line x1="512" y1="220" x2="512" y2="175" stroke="#1E3A8A" stroke-width="10" stroke-linecap="round"/>
  <line x1="420" y1="234" x2="398" y2="195" stroke="#1E3A8A" stroke-width="9" stroke-linecap="round"/>
  <line x1="340" y1="278" x2="306" y2="248" stroke="#1E3A8A" stroke-width="9" stroke-linecap="round"/>
  <line x1="604" y1="234" x2="626" y2="195" stroke="#1E3A8A" stroke-width="9" stroke-linecap="round"/>
  <line x1="684" y1="278" x2="718" y2="248" stroke="#1E3A8A" stroke-width="9" stroke-linecap="round"/>
  <!-- Highlight spot in pupil -->
  <ellipse cx="455" cy="380" rx="28" ry="20" fill="white" opacity="0.4" transform="rotate(-20 455 380)"/>
  <!-- Text art flowing out from eye -->
  <text x="200" y="680" font-family="Consolas,monospace" font-size="22" fill="#6B7280">@#$%&amp;*+==-::.</text>
  <text x="240" y="716" font-family="Consolas,monospace" font-size="20" fill="#9CA3AF" opacity="0.8">++==-::;.. </text>
  <text x="280" y="748" font-family="Consolas,monospace" font-size="18" fill="#D1D5DB" opacity="0.6">:-  .  .  </text>
</svg>