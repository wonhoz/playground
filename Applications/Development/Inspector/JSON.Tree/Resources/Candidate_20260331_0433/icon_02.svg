<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 연한 청록 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: A 패널 (왼쪽) -->
  <rect x="80" y="120" width="390" height="784" rx="20" fill="white" stroke="#00897B" stroke-width="6"/>
  <text x="275" y="188" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="60" fill="#00695C" text-anchor="middle">A</text>
  <!-- A 패널 라인들 -->
  <rect x="96" y="210" width="358" height="56" rx="8" fill="#C8E6C9"/>
  <text x="120" y="250" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">"name": "foo"</text>
  <rect x="96" y="280" width="358" height="56" rx="8" fill="#FFCDD2"/>
  <text x="120" y="320" font-family="'Consolas', monospace" font-size="44" fill="#B71C1C">"ver": 1</text>
  <rect x="96" y="350" width="358" height="56" rx="8" fill="none"/>
  <text x="120" y="390" font-family="'Consolas', monospace" font-size="44" fill="#546E7A">"ok": true</text>
  <rect x="96" y="420" width="358" height="56" rx="8" fill="#FFCDD2"/>
  <text x="120" y="460" font-family="'Consolas', monospace" font-size="44" fill="#B71C1C">"old": "x"</text>
  <rect x="96" y="490" width="358" height="56" rx="8" fill="none"/>
  <text x="120" y="530" font-family="'Consolas', monospace" font-size="44" fill="#546E7A">"id": 42</text>
  <!-- B 패널 (오른쪽) -->
  <rect x="554" y="120" width="390" height="784" rx="20" fill="white" stroke="#1976D2" stroke-width="6"/>
  <text x="749" y="188" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="60" fill="#1565C0" text-anchor="middle">B</text>
  <!-- B 패널 라인들 -->
  <rect x="570" y="210" width="358" height="56" rx="8" fill="#C8E6C9"/>
  <text x="594" y="250" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">"name": "foo"</text>
  <rect x="570" y="280" width="358" height="56" rx="8" fill="#C8E6C9"/>
  <text x="594" y="320" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">"ver": 2</text>
  <rect x="570" y="350" width="358" height="56" rx="8" fill="none"/>
  <text x="594" y="390" font-family="'Consolas', monospace" font-size="44" fill="#546E7A">"ok": true</text>
  <rect x="570" y="420" width="358" height="56" rx="8" fill="none"/>
  <rect x="570" y="490" width="358" height="56" rx="8" fill="none"/>
  <text x="594" y="530" font-family="'Consolas', monospace" font-size="44" fill="#546E7A">"id": 42</text>
  <rect x="570" y="560" width="358" height="56" rx="8" fill="#C8E6C9"/>
  <text x="594" y="600" font-family="'Consolas', monospace" font-size="44" fill="#1B5E20">"new": "y"</text>
  <!-- Layer 3: 중앙 구분선 + 화살표 -->
  <line x1="512" y1="160" x2="512" y2="864" stroke="#90A4AE" stroke-width="6" stroke-dasharray="16,10"/>
  <text x="512" y="840" font-family="'Segoe UI', sans-serif" font-size="56" fill="#00838F" text-anchor="middle">diff</text>
</svg>
