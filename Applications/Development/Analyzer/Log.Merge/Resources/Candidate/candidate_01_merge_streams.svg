<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b0030"/>
      <stop offset="100%" stop-color="#2d0046"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stream 1 (left) -->
  <path d="M80 80 L80 260 Q80 300 256 300" fill="none" stroke="#7c4dff" stroke-width="10" stroke-linecap="round"/>
  <!-- Stream 2 (right) -->
  <path d="M432 80 L432 260 Q432 300 256 300" fill="none" stroke="#00e5ff" stroke-width="10" stroke-linecap="round"/>
  <!-- Stream 3 (center) -->
  <path d="M256 80 L256 300" fill="none" stroke="#69f0ae" stroke-width="10" stroke-linecap="round"/>
  <!-- Merge point -->
  <circle cx="256" cy="300" r="24" fill="#ff4081" stroke="#ff80ab" stroke-width="4"/>
  <!-- Merged output stream -->
  <path d="M256 300 L256 440" fill="none" stroke="#ff4081" stroke-width="14" stroke-linecap="round"/>
  <!-- Log file icons on streams -->
  <rect x="56" y="88" width="48" height="60" rx="8" fill="#7c4dff" opacity="0.8"/>
  <rect x="408" y="88" width="48" height="60" rx="8" fill="#00e5ff" opacity="0.8"/>
  <rect x="232" y="88" width="48" height="60" rx="8" fill="#69f0ae" opacity="0.8"/>
  <!-- File lines -->
  <rect x="62" y="102" width="36" height="5" rx="2" fill="#e1bee7"/>
  <rect x="62" y="114" width="28" height="5" rx="2" fill="#e1bee7"/>
  <rect x="62" y="126" width="32" height="5" rx="2" fill="#e1bee7"/>
  <rect x="414" y="102" width="36" height="5" rx="2" fill="#e0f7fa"/>
  <rect x="414" y="114" width="28" height="5" rx="2" fill="#e0f7fa"/>
  <rect x="238" y="102" width="36" height="5" rx="2" fill="#f1f8e9"/>
  <rect x="238" y="114" width="28" height="5" rx="2" fill="#f1f8e9"/>
  <!-- Output file icon -->
  <rect x="228" y="440" width="56" height="60" rx="8" fill="#ff4081" opacity="0.9"/>
  <rect x="234" y="452" width="44" height="5" rx="2" fill="#fce4ec"/>
  <rect x="234" y="464" width="36" height="5" rx="2" fill="#fce4ec"/>
  <rect x="234" y="476" width="40" height="5" rx="2" fill="#fce4ec"/>
</svg>
