<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Score bar chart: CPU / RAM / Disk -->
  <text x="512" y="238" font-family="Arial,sans-serif" font-size="52" fill="#047857" font-weight="bold" text-anchor="middle">Benchmark Results</text>
  <!-- CPU bar -->
  <text x="195" y="340" font-family="Arial,sans-serif" font-size="44" fill="#374151" text-anchor="end">CPU</text>
  <rect x="210" y="302" width="574" height="66" rx="14" fill="#D1FAE5"/>
  <rect x="210" y="302" width="574" height="66" rx="14" fill="#10B981"/>
  <text x="800" y="346" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">9840</text>
  <!-- RAM bar -->
  <text x="195" y="440" font-family="Arial,sans-serif" font-size="44" fill="#374151" text-anchor="end">RAM</text>
  <rect x="210" y="402" width="450" height="66" rx="14" fill="#D1FAE5"/>
  <rect x="210" y="402" width="450" height="66" rx="14" fill="#34D399"/>
  <text x="674" y="446" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">7680</text>
  <!-- Disk bar -->
  <text x="195" y="540" font-family="Arial,sans-serif" font-size="44" fill="#374151" text-anchor="end">Disk</text>
  <rect x="210" y="502" width="380" height="66" rx="14" fill="#D1FAE5"/>
  <rect x="210" y="502" width="380" height="66" rx="14" fill="#6EE7B7"/>
  <text x="604" y="546" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">6490</text>
  <!-- Total score -->
  <rect x="210" y="620" width="604" height="100" rx="20" fill="#059669"/>
  <text x="512" y="660" font-family="Arial,sans-serif" font-size="40" fill="#A7F3D0" text-anchor="middle">Total Score</text>
  <text x="512" y="712" font-family="Arial,sans-serif" font-size="64" fill="#FFFFFF" font-weight="bold" text-anchor="middle">8003 pts</text>
  <!-- System info snippet -->
  <text x="512" y="840" font-family="Arial,sans-serif" font-size="40" fill="#065F46" text-anchor="middle">i9-14900K · 64GB DDR5 · NVMe</text>
</svg>
