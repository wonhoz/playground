<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Cloth.Cut — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    p  { color: #888; margin-bottom: 28px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
    .card { background: #252525; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #333; }
    .card img { width: 128px; height: 128px; border-radius: 16px; }
    .card span { display: block; margin-top: 10px; font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Cloth.Cut — 아이콘 후보 10개</h1>
  <p>천 자르기 퍼즐 게임 아이콘 후보</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_scissors_fabric_teal.svg"/><span>01 · scissors_fabric_teal</span></div>
    <div class="card"><img src="candidate_02_scissors_puzzle_purple.svg"/><span>02 · scissors_puzzle_purple</span></div>
    <div class="card"><img src="candidate_03_fabric_wave_red.svg"/><span>03 · fabric_wave_red</span></div>
    <div class="card"><img src="candidate_04_patchwork_orange.svg"/><span>04 · patchwork_orange</span></div>
    <div class="card"><img src="candidate_05_thread_needle_blue.svg"/><span>05 · thread_needle_blue</span></div>
    <div class="card"><img src="candidate_06_cut_game_lime.svg"/><span>06 · cut_game_lime</span></div>
    <div class="card"><img src="candidate_07_fabric_ribbon_pink.svg"/><span>07 · fabric_ribbon_pink</span></div>
    <div class="card"><img src="candidate_08_cloth_golden_weave.svg"/><span>08 · cloth_golden_weave</span></div>
    <div class="card"><img src="candidate_09_scissors_cyan_neon.svg"/><span>09 · scissors_cyan_neon</span></div>
    <div class="card"><img src="candidate_10_cloth_star_indigo.svg"/><span>10 · cloth_star_indigo</span></div>
  </div>
</body>
</html>
