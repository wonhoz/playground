<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="brainG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg7)"/>

  <!-- Back card (tilted) -->
  <rect x="120" y="160" width="680" height="520" rx="28" fill="#B3E5FC" stroke="#0277BD" stroke-width="14" transform="rotate(-6, 460, 420)"/>

  <!-- Middle card -->
  <rect x="130" y="155" width="680" height="520" rx="28" fill="#E1F5FE" stroke="#0277BD" stroke-width="14" transform="rotate(-2, 470, 415)"/>

  <!-- Front white card -->
  <rect x="140" y="150" width="680" height="520" rx="28" fill="#FFFFFF" stroke="#0277BD" stroke-width="16"/>

  <!-- AI Brain illustration (stylized) -->
  <!-- Brain outline as rounded connected shapes -->
  <ellipse cx="400" cy="380" rx="120" ry="100" fill="url(#brainG)" stroke="#0277BD" stroke-width="14"/>
  <ellipse cx="540" cy="360" rx="100" ry="90" fill="url(#brainG)" stroke="#0277BD" stroke-width="14"/>
  <!-- Brain wrinkle lines -->
  <path d="M320,380 Q360,340 400,360 Q440,380 460,350" fill="none" stroke="#0277BD" stroke-width="8" stroke-linecap="round"/>
  <path d="M340,420 Q380,395 420,410 Q450,425 470,400" fill="none" stroke="#0277BD" stroke-width="7" stroke-linecap="round"/>
  <path d="M460,380 Q490,345 530,360 Q560,375 580,350" fill="none" stroke="#0277BD" stroke-width="7" stroke-linecap="round"/>
  <!-- Neural connections dots -->
  <circle cx="280" cy="340" r="14" fill="#FFD93D" stroke="#0277BD" stroke-width="8"/>
  <circle cx="300" cy="430" r="10" fill="#FFD93D" stroke="#0277BD" stroke-width="6"/>
  <circle cx="660" cy="320" r="14" fill="#FFD93D" stroke="#0277BD" stroke-width="8"/>
  <circle cx="650" cy="410" r="10" fill="#FFD93D" stroke="#0277BD" stroke-width="6"/>
  <!-- Connection lines from brain to neural dots -->
  <line x1="295" y1="355" x2="320" y2="380" stroke="#0277BD" stroke-width="8" stroke-linecap="round"/>
  <line x1="295" y1="428" x2="320" y2="420" stroke="#0277BD" stroke-width="7" stroke-linecap="round"/>
  <line x1="650" y1="326" x2="636" y2="352" stroke="#0277BD" stroke-width="8" stroke-linecap="round"/>
  <line x1="646" y1="408" x2="634" y2="400" stroke="#0277BD" stroke-width="7" stroke-linecap="round"/>

  <!-- AI badge overlay on brain -->
  <rect x="420" y="420" width="130" height="70" rx="22" fill="#0277BD" stroke="#01579B" stroke-width="12"/>
  <text x="485" y="467" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">AI</text>

  <!-- Resolution output indicators -->
  <rect x="180" y="530" width="110" height="50" rx="16" fill="#29B6F6" stroke="#0277BD" stroke-width="10"/>
  <text x="235" y="563" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">HD</text>
  <rect x="310" y="530" width="130" height="50" rx="16" fill="#0288D1" stroke="#0277BD" stroke-width="10"/>
  <text x="375" y="563" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">FHD</text>
  <rect x="460" y="530" width="130" height="50" rx="16" fill="#0277BD" stroke="#01579B" stroke-width="10"/>
  <text x="525" y="563" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">4K</text>
  <rect x="610" y="530" width="150" height="50" rx="16" fill="#01579B" stroke="#0277BD" stroke-width="10"/>
  <text x="685" y="563" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">8K</text>

  <!-- UPSCALE badge (floating top-right) -->
  <rect x="730" y="160" width="250" height="90" rx="28" fill="#29B6F6" stroke="#0277BD" stroke-width="14"/>
  <text x="855" y="222" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">4x</text>

  <!-- Scale badge -->
  <rect x="740" y="270" width="240" height="80" rx="28" fill="#0277BD" stroke="#01579B" stroke-width="14"/>
  <text x="860" y="325" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SCALE</text>

  <!-- Title -->
  <rect x="162" y="846" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="910" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
