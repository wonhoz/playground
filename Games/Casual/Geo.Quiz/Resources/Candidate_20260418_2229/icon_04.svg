<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background ocean teal -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: Globe (circle with continents) -->
  <circle cx="460" cy="490" r="280" fill="#1565C0" opacity="0.9"/>
  <!-- Continent shapes on globe -->
  <ellipse cx="380" cy="420" rx="70" ry="80" fill="#43A047" opacity="0.9"/>
  <ellipse cx="400" cy="540" rx="48" ry="70" fill="#66BB6A" opacity="0.9"/>
  <ellipse cx="470" cy="400" rx="52" ry="44" fill="#43A047" opacity="0.9"/>
  <ellipse cx="490" cy="490" rx="56" ry="76" fill="#388E3C" opacity="0.9"/>
  <ellipse cx="600" cy="400" rx="100" ry="60" fill="#2E7D32" opacity="0.9"/>
  <ellipse cx="610" cy="520" rx="50" ry="38" fill="#43A047" opacity="0.9"/>
  <!-- Globe grid -->
  <circle cx="460" cy="490" r="280" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.2"/>
  <ellipse cx="460" cy="490" rx="280" ry="140" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.15"/>
  <!-- Magnifying glass handle + circle -->
  <circle cx="480" cy="490" r="290" fill="none" stroke="#FFD740" stroke-width="30" opacity="0.9"/>
  <rect x="696" y="680" width="50" height="200" rx="25" fill="#FFD740" transform="rotate(40 721 780)"/>
  <!-- Layer 3: Question mark on magnifier -->
  <circle cx="800" cy="280" r="80" fill="#FF7043"/>
  <text x="800" y="312" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">?</text>
</svg>
