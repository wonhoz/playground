<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A2E"/>
  <!-- Layer 2: 컬러 픽셀 → ASCII 문자 변환 -->
  <!-- 왼쪽: 컬러 이미지 픽셀 격자 (5×5) -->
  <rect x="60" y="200" width="380" height="620" rx="16" fill="#1C1C3A" stroke="#3A3A7A" stroke-width="6"/>
  <text x="250" y="160" font-size="44" fill="#7B8CDE" text-anchor="middle" font-family="Arial">Image</text>
  <!-- 픽셀 격자 (5열 × 8행) -->
  <rect x="80" y="220" width="72" height="72" rx="4" fill="#FF6B6B"/>
  <rect x="164" y="220" width="72" height="72" rx="4" fill="#FF8E53"/>
  <rect x="248" y="220" width="72" height="72" rx="4" fill="#FFD93D"/>
  <rect x="332" y="220" width="72" height="72" rx="4" fill="#6BCB77"/>
  <rect x="80" y="304" width="72" height="72" rx="4" fill="#4D96FF"/>
  <rect x="164" y="304" width="72" height="72" rx="4" fill="#9B5DE5"/>
  <rect x="248" y="304" width="72" height="72" rx="4" fill="#FF6B6B"/>
  <rect x="332" y="304" width="72" height="72" rx="4" fill="#F7B731"/>
  <rect x="80" y="388" width="72" height="72" rx="4" fill="#1A1A3A"/>
  <rect x="164" y="388" width="72" height="72" rx="4" fill="#4D96FF"/>
  <rect x="248" y="388" width="72" height="72" rx="4" fill="#6BCB77"/>
  <rect x="332" y="388" width="72" height="72" rx="4" fill="#1A1A3A"/>
  <rect x="80" y="472" width="72" height="72" rx="4" fill="#FFD93D"/>
  <rect x="164" y="472" width="72" height="72" rx="4" fill="#FF6B6B"/>
  <rect x="248" y="472" width="72" height="72" rx="4" fill="#1A1A3A"/>
  <rect x="332" y="472" width="72" height="72" rx="4" fill="#9B5DE5"/>
  <rect x="80" y="556" width="72" height="72" rx="4" fill="#6BCB77"/>
  <rect x="164" y="556" width="72" height="72" rx="4" fill="#1A1A3A"/>
  <rect x="248" y="556" width="72" height="72" rx="4" fill="#FF8E53"/>
  <rect x="332" y="556" width="72" height="72" rx="4" fill="#4D96FF"/>
  <!-- 더 많은 픽셀들 -->
  <rect x="80" y="640" width="72" height="72" rx="4" fill="#F7B731"/>
  <rect x="164" y="640" width="72" height="72" rx="4" fill="#FF6B6B"/>
  <rect x="248" y="640" width="72" height="72" rx="4" fill="#9B5DE5"/>
  <rect x="332" y="640" width="72" height="72" rx="4" fill="#6BCB77"/>
  <rect x="80" y="724" width="72" height="72" rx="4" fill="#1A1A3A"/>
  <rect x="164" y="724" width="72" height="72" rx="4" fill="#4D96FF"/>
  <rect x="248" y="724" width="72" height="72" rx="4" fill="#FFD93D"/>
  <rect x="332" y="724" width="72" height="72" rx="4" fill="#FF8E53"/>
  <!-- 화살표 -->
  <text x="512" y="550" font-size="100" fill="#5555CC" text-anchor="middle">→</text>
  <text x="512" y="640" font-size="40" fill="#3333AA" text-anchor="middle" font-family="monospace">ASCII</text>
  <!-- 오른쪽: ASCII 텍스트 결과 -->
  <rect x="644" y="200" width="320" height="620" rx="16" fill="#001400" stroke="#00AA00" stroke-width="6"/>
  <text x="804" y="160" font-size="44" fill="#00FF41" text-anchor="middle" font-family="monospace">ASCII</text>
  <!-- Layer 3: ASCII 문자들 -->
  <text x="664" y="280" font-size="34" fill="#00FF41" font-family="monospace">@@@##**++</text>
  <text x="664" y="326" font-size="34" fill="#00CC33" font-family="monospace">##**++..  </text>
  <text x="664" y="372" font-size="34" fill="#009922" font-family="monospace">  ..    ..</text>
  <text x="664" y="418" font-size="34" fill="#00CC33" font-family="monospace">++..@@@**+</text>
  <text x="664" y="464" font-size="34" fill="#00FF41" font-family="monospace">**@@##....+</text>
  <text x="664" y="510" font-size="34" fill="#009922" font-family="monospace">..  **@@##</text>
  <text x="664" y="556" font-size="34" fill="#00CC33" font-family="monospace">  @+..  **</text>
  <text x="664" y="602" font-size="34" fill="#00FF41" font-family="monospace">@@##**++..</text>
  <text x="664" y="648" font-size="34" fill="#009922" font-family="monospace">  ++@@##**</text>
  <text x="664" y="694" font-size="34" fill="#00CC33" font-family="monospace">**..  ++@@</text>
  <text x="664" y="740" font-size="34" fill="#00FF41" font-family="monospace">@@**++..  </text>
  <text x="664" y="786" font-size="34" fill="#009922" font-family="monospace">  ..@@**++</text>
</svg>
