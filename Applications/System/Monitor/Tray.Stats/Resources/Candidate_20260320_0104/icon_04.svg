<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- 온도계+트레이: thermometer with tray frame -->
  <!-- Tray frame background -->
  <rect x="220" y="320" width="584" height="400" rx="20" fill="#1B5E20" opacity="0.2"/>
  <!-- Thermometer bulb and tube (large, centered) -->
  <circle cx="512" cy="680" r="80" fill="#1B5E20"/>
  <circle cx="512" cy="680" r="60" fill="#A5D6A7"/>
  <!-- Thermometer tube -->
  <rect x="478" y="280" width="68" height="420" rx="34" fill="#1B5E20"/>
  <!-- Mercury level fill -->
  <rect x="492" y="380" width="40" height="330" rx="20" fill="#A5D6A7"/>
  <!-- Thermometer tick marks -->
  <line x1="546" y1="320" x2="580" y2="320" stroke="#A5D6A7" stroke-width="7"/>
  <line x1="546" y1="380" x2="570" y2="380" stroke="#A5D6A7" stroke-width="5"/>
  <line x1="546" y1="440" x2="580" y2="440" stroke="#A5D6A7" stroke-width="7"/>
  <line x1="546" y1="500" x2="570" y2="500" stroke="#A5D6A7" stroke-width="5"/>
  <line x1="546" y1="560" x2="580" y2="560" stroke="#A5D6A7" stroke-width="7"/>
  <line x1="546" y1="620" x2="570" y2="620" stroke="#A5D6A7" stroke-width="5"/>
  <!-- High temp indicator -->
  <line x1="546" y1="340" x2="640" y2="340" stroke="#A5D6A7" stroke-width="6" stroke-linecap="round"/>
</svg>