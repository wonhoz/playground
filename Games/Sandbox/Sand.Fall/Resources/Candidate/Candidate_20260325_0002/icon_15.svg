<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A1A"/>
  <!-- Layer 2: 마우스 커서 -->
  <path d="M440,200 L440,500 L480,460 L520,560 L552,548 L512,448 L560,448 Z" fill="white" stroke="#404060" stroke-width="8"/>
  <!-- 커서 아래 파티클들 (원소 색상) -->
  <!-- 모래 (황토) -->
  <circle cx="370" cy="560" r="28" fill="#E8C878"/>
  <circle cx="330" cy="620" r="22" fill="#E8C878" opacity="0.8"/>
  <circle cx="280" cy="680" r="18" fill="#E8C878" opacity="0.6"/>
  <circle cx="350" cy="700" r="14" fill="#E8C878" opacity="0.5"/>
  <!-- 물 (파랑) -->
  <circle cx="550" cy="580" r="26" fill="#3468C8"/>
  <circle cx="600" cy="640" r="20" fill="#3468C8" opacity="0.8"/>
  <circle cx="640" cy="710" r="16" fill="#3468C8" opacity="0.6"/>
  <!-- 불 (오렌지) -->
  <circle cx="620" cy="540" r="24" fill="#FF5500"/>
  <circle cx="680" cy="590" r="18" fill="#FF7700" opacity="0.8"/>
  <circle cx="720" cy="650" r="14" fill="#FF9900" opacity="0.7"/>
  <!-- 식물 (초록) -->
  <circle cx="420" cy="640" r="22" fill="#22A030"/>
  <circle cx="380" cy="720" r="17" fill="#22A030" opacity="0.7"/>
  <!-- 얼음 (하늘) -->
  <circle cx="560" cy="680" r="20" fill="#A8D8F0"/>
  <circle cx="520" cy="740" r="15" fill="#A8D8F0" opacity="0.7"/>
  <!-- 산 (형광 연두) -->
  <circle cx="460" cy="780" r="18" fill="#88FF10"/>
  <!-- 낙하 궤적 선들 -->
  <line x1="370" y1="540" x2="330" y2="600" stroke="#E8C878" stroke-width="4" opacity="0.3"/>
  <line x1="550" y1="560" x2="600" y2="620" stroke="#3468C8" stroke-width="4" opacity="0.3"/>
  <line x1="620" y1="520" x2="680" y2="570" stroke="#FF5500" stroke-width="4" opacity="0.3"/>
  <!-- Layer 3: 하단에 쌓이는 원소들 -->
  <rect x="220" y="820" width="584" height="30" rx="15" fill="#E8C878" opacity="0.6"/>
  <text x="512" y="920" text-anchor="middle" font-family="Arial Black" font-size="72" font-weight="900" fill="#4FC3F7">Draw &amp; Fall</text>
</svg>