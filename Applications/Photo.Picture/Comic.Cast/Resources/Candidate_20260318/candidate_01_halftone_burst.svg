<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폭발 방사선들 -->
  <line x1="256" y1="256" x2="256" y2="80" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="400" y2="136" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="432" y2="256" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="400" y2="376" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="256" y2="432" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="112" y2="376" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="80" y2="256" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="256" x2="112" y2="136" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <!-- 하프톤 점들 -->
  <circle cx="256" cy="80" r="5" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="136" r="5" fill="#FDBA74" opacity="0.8"/>
  <circle cx="432" cy="256" r="5" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="376" r="5" fill="#FDBA74" opacity="0.8"/>
  <circle cx="256" cy="432" r="5" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="112" cy="376" r="5" fill="#FDBA74" opacity="0.8"/>
  <circle cx="80" cy="256" r="5" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="112" cy="136" r="5" fill="#FDBA74" opacity="0.8"/>
  <!-- 중앙 만화 폭발 -->
  <polygon points="256,196 270,240 316,240 278,268 292,312 256,284 220,312 234,268 196,240 242,240" fill="#FB923C" opacity="0.3" filter="url(#glow)"/>
  <polygon points="256,196 270,240 316,240 278,268 292,312 256,284 220,312 234,268 196,240 242,240" fill="none" stroke="#FB923C" stroke-width="2.5" filter="url(#glow)"/>
  <!-- POW 텍스트 -->
  <text x="256" y="268" text-anchor="middle" fill="#FDBA74" font-size="20" font-family="sans-serif" font-weight="900" filter="url(#glow)">POW!</text>
</svg>