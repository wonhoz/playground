<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A0F2E"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1A4A"/>
      <stop offset="100%" stop-color="#1A1035"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A2A"/>
      <stop offset="100%" stop-color="#102A1A"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#AA44FF"/>
      <stop offset="100%" stop-color="#44DDFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input box -->
  <rect x="60" y="160" width="168" height="80" rx="10" fill="url(#box1)" stroke="#6633AA" stroke-width="2"/>
  <text x="144" y="196" font-family="monospace" font-size="13" fill="#CC88FF" text-anchor="middle">INPUT</text>
  <text x="144" y="218" font-family="monospace" font-size="11" fill="#8855CC" text-anchor="middle">"hello world"</text>
  <!-- Output box -->
  <rect x="284" y="160" width="168" height="80" rx="10" fill="url(#box2)" stroke="#33AA66" stroke-width="2"/>
  <text x="368" y="196" font-family="monospace" font-size="13" fill="#88FFAA" text-anchor="middle">OUTPUT</text>
  <text x="368" y="218" font-family="monospace" font-size="11" fill="#55CC88" text-anchor="middle">aGVsbG8…</text>
  <!-- Transform arrow (main) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="url(#arrow)"/>
    </marker>
  </defs>
  <line x1="234" y1="200" x2="278" y2="200" stroke="url(#arrow)" stroke-width="4" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <!-- Center forge icon -->
  <circle cx="256" cy="200" r="22" fill="#1A1A30" stroke="url(#arrow)" stroke-width="2" filter="url(#glow)"/>
  <text x="256" y="206" font-family="monospace" font-size="16" fill="#AADDFF" text-anchor="middle" font-weight="bold">SF</text>
  <!-- Transform options below -->
  <rect x="76" y="288" width="100" height="28" rx="6" fill="#2A1A4A" stroke="#6633AA" stroke-width="1"/>
  <text x="126" y="306" font-family="monospace" font-size="11" fill="#CC88FF" text-anchor="middle">UPPER</text>
  <rect x="190" y="288" width="100" height="28" rx="6" fill="#2A1A4A" stroke="#6633AA" stroke-width="1"/>
  <text x="240" y="306" font-family="monospace" font-size="11" fill="#CC88FF" text-anchor="middle">base64</text>
  <rect x="304" y="288" width="100" height="28" rx="6" fill="#1A3A2A" stroke="#33AA66" stroke-width="1.5"/>
  <text x="354" y="306" font-family="monospace" font-size="11" fill="#88FFAA" text-anchor="middle">regex</text>
  <rect x="76" y="328" width="100" height="28" rx="6" fill="#2A1A4A" stroke="#6633AA" stroke-width="1"/>
  <text x="126" y="346" font-family="monospace" font-size="11" fill="#CC88FF" text-anchor="middle">trim</text>
  <rect x="190" y="328" width="100" height="28" rx="6" fill="#2A1A4A" stroke="#6633AA" stroke-width="1"/>
  <text x="240" y="346" font-family="monospace" font-size="11" fill="#CC88FF" text-anchor="middle">replace</text>
  <rect x="304" y="328" width="100" height="28" rx="6" fill="#2A1A4A" stroke="#6633AA" stroke-width="1"/>
  <text x="354" y="346" font-family="monospace" font-size="11" fill="#CC88FF" text-anchor="middle">hash</text>
  <!-- Title -->
  <text x="256" y="128" font-family="'Segoe UI', sans-serif" font-size="24" fill="#AADDFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Str.Forge</text>
  <line x1="130" y1="138" x2="382" y2="138" stroke="url(#arrow)" stroke-width="1" opacity="0.4"/>
  <!-- Status bar -->
  <rect x="60" y="390" width="392" height="28" rx="6" fill="#0F0F1A" stroke="#222240" stroke-width="1"/>
  <text x="80" y="408" font-family="monospace" font-size="11" fill="#44FFAA">Ready</text>
  <text x="360" y="408" font-family="monospace" font-size="11" fill="#666">UTF-8</text>
</svg>
