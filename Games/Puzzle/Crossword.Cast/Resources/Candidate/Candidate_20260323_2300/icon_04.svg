<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <g clip-path="url(#clip04)">
    <!-- Layer 2: 연필 모양 -->
    <!-- 연필 몸통 -->
    <rect x="460" y="80" width="130" height="580" fill="#FDE68A" rx="12"/>
    <!-- 연필 지우개 부분 -->
    <rect x="460" y="80" width="130" height="80" fill="#F472B6" rx="12"/>
    <!-- 연필 금속 밴드 -->
    <rect x="460" y="160" width="130" height="30" fill="#D97706"/>
    <!-- 연필 끝 (삼각형) -->
    <polygon points="460,660 590,660 525,760" fill="#FBBF24"/>
    <!-- 연필 심 -->
    <polygon points="500,700 540,700 520,760" fill="#1C1917"/>
    <!-- Layer 3: 격자 (연필 옆) -->
    <!-- 우측 작은 격자 -->
    <rect x="630" y="340" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="720" y="340" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="810" y="340" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="630" y="430" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="720" y="430" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="810" y="430" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="630" y="520" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="720" y="520" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="810" y="520" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <!-- 격자 문자 -->
    <text x="670" y="390" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">A</text>
    <text x="760" y="390" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">T</text>
    <text x="850" y="390" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">E</text>
    <text x="670" y="480" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">P</text>
    <text x="760" y="480" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
    <text x="670" y="570" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">E</text>
    <text x="760" y="570" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">N</text>
    <!-- 왼쪽도 작은 격자 -->
    <rect x="114" y="340" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="204" y="340" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="294" y="340" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="114" y="430" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="204" y="430" width="80" height="80" fill="none" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <rect x="294" y="430" width="80" height="80" fill="rgba(253,230,138,0.25)" stroke="#FDE68A" stroke-width="6" rx="6"/>
    <text x="204" y="390" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FDE68A" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="154" y="480" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">O</text>
    <text x="334" y="480" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">D</text>
  </g>
</svg>
