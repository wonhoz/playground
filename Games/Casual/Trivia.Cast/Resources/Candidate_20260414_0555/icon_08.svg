<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#00838F" stroke-width="16"/>

  <!-- Buzz radiating rings (outer → inner) -->
  <circle cx="512" cy="390" r="230" fill="none" stroke="#B2EBF2" stroke-width="16" stroke-opacity="0.7"/>
  <circle cx="512" cy="390" r="190" fill="none" stroke="#80DEEA" stroke-width="16" stroke-opacity="0.85"/>

  <!-- Buzzer button: outer ring -->
  <circle cx="512" cy="390" r="160" fill="#006064" stroke="#004D40" stroke-width="16"/>
  <!-- Buzzer button: inner highlight ring -->
  <circle cx="512" cy="390" r="140" fill="#00838F" stroke="#006064" stroke-width="12"/>
  <!-- Buzzer button: press face -->
  <circle cx="512" cy="390" r="112" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>

  <!-- BUZZ! text on button -->
  <text x="512" y="378" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">BUZZ</text>
  <text x="512" y="438" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFD93D" text-anchor="middle">!</text>

  <!-- Buzz lines (radiating) -->
  <line x1="318" y1="222" x2="280" y2="186" stroke="#00ACC1" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="170" x2="512" y2="120" stroke="#00ACC1" stroke-width="14" stroke-linecap="round"/>
  <line x1="706" y1="222" x2="744" y2="186" stroke="#00ACC1" stroke-width="14" stroke-linecap="round"/>
  <line x1="270" y1="390" x2="210" y2="390" stroke="#00ACC1" stroke-width="14" stroke-linecap="round"/>
  <line x1="754" y1="390" x2="814" y2="390" stroke="#00ACC1" stroke-width="14" stroke-linecap="round"/>

  <!-- ANSWER FAST strip -->
  <rect x="112" y="566" width="800" height="72" rx="20" fill="#006064" stroke="#004D40" stroke-width="12"/>
  <text x="512" y="616" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">ANSWER FAST!</text>

  <!-- BUZZER badge -->
  <rect x="208" y="752" width="608" height="116" rx="36" fill="#004D40" stroke="#002D26" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#00E5FF" text-anchor="middle">BUZZER</text>
</svg>
