<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 액션 프레임 (만화 속도선) -->
  <line x1="256" y1="256" x2="80" y2="80" stroke="#FB923C" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="80" stroke="#FDBA74" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="432" y2="80" stroke="#FB923C" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="432" y2="256" stroke="#FDBA74" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="432" y2="432" stroke="#FB923C" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="256" y2="432" stroke="#FDBA74" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="256" x2="80" y2="432" stroke="#FB923C" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="80" y2="256" stroke="#FDBA74" stroke-width="2.5" opacity="0.5"/>
  <!-- 대각선들 -->
  <line x1="256" y1="256" x2="160" y2="80" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="352" y2="80" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="432" y2="160" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="432" y2="352" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="352" y2="432" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="160" y2="432" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="80" y2="352" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="80" y2="160" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <!-- 중앙 사진 변환 심볼 -->
  <circle cx="256" cy="256" r="40" fill="#FB923C" opacity="0.15"/>
  <rect x="226" y="238" width="60" height="36" rx="4" fill="#FB923C" opacity="0.3" filter="url(#glow)"/>
  <!-- 카메라 + 만화 심볼 -->
  <circle cx="256" cy="256" r="12" fill="none" stroke="#FDBA74" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="248" y="250" width="16" height="12" rx="2" fill="#FB923C" opacity="0.6"/>
</svg>