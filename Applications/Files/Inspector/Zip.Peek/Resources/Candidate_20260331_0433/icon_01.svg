<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 노랑 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: ZIP 파일 아이콘 (왼쪽) -->
  <rect x="100" y="180" width="380" height="480" rx="28" fill="#F57F17"/>
  <!-- 지퍼 줄무늬 (ZIP 특유) -->
  <rect x="220" y="180" width="80" height="480" rx="0" fill="#E65100"/>
  <rect x="220" y="200" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <rect x="220" y="260" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <rect x="220" y="320" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <rect x="220" y="380" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <rect x="220" y="440" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <rect x="220" y="500" width="80" height="40" rx="8" fill="#FFF9C4"/>
  <!-- ZIP 라벨 -->
  <text x="290" y="720" font-family="'Consolas', monospace" font-size="72" fill="white" text-anchor="middle" font-weight="700">ZIP</text>
  <!-- Layer 3: 내부 파일 트리뷰 패널 (오른쪽) -->
  <rect x="520" y="160" width="400" height="700" rx="24" fill="#1565C0"/>
  <!-- 트리 헤더 -->
  <rect x="520" y="160" width="400" height="64" rx="24" fill="#0D47A1"/>
  <text x="720" y="203" font-family="'Consolas', monospace" font-size="36" fill="white" text-anchor="middle">Contents</text>
  <!-- 트리 아이템들 -->
  <text x="548" y="270" font-family="'Segoe UI', sans-serif" font-size="36" fill="#FFF9C4">📁 src/</text>
  <text x="580" y="320" font-family="'Segoe UI', sans-serif" font-size="34" fill="#90CAF9">📝 main.cs</text>
  <text x="580" y="368" font-family="'Segoe UI', sans-serif" font-size="34" fill="#90CAF9">📝 util.cs</text>
  <text x="548" y="416" font-family="'Segoe UI', sans-serif" font-size="36" fill="#FFF9C4">📁 docs/</text>
  <text x="580" y="464" font-family="'Segoe UI', sans-serif" font-size="34" fill="#90CAF9">📄 README</text>
  <text x="548" y="512" font-family="'Segoe UI', sans-serif" font-size="36" fill="#FFF9C4">📁 bin/</text>
  <text x="580" y="560" font-family="'Segoe UI', sans-serif" font-size="34" fill="#90CAF9">⚙ app.exe</text>
  <text x="548" y="608" font-family="'Segoe UI', sans-serif" font-size="34" fill="#BBDEFB">📄 license.txt</text>
  <!-- 압축률 배지 -->
  <rect x="540" y="680" width="360" height="60" rx="16" fill="#00897B"/>
  <text x="720" y="720" font-family="'Consolas', monospace" font-size="40" fill="white" text-anchor="middle" font-weight="700">압축률 42%</text>
</svg>
