<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#11998E"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0e6ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Comic panel grid -->
  <rect x="60" y="60" width="180" height="220" rx="8" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <rect x="260" y="60" width="190" height="100" rx="8" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <rect x="260" y="180" width="190" height="100" rx="8" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <rect x="60" y="300" width="390" height="152" rx="8" fill="url(#panel)" stroke="#fff" stroke-width="3"/>
  <!-- Speed lines in main panel -->
  <line x1="150" y1="170" x2="60" y2="60" stroke="#c084fc" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="170" x2="240" y2="60" stroke="#c084fc" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="170" x2="60" y2="280" stroke="#c084fc" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="170" x2="240" y2="280" stroke="#c084fc" stroke-width="2" opacity="0.6"/>
  <!-- Star burst -->
  <polygon points="150,130 158,155 185,155 163,170 171,195 150,180 129,195 137,170 115,155 142,155" fill="#a855f7" opacity="0.9"/>
  <!-- Small figure in bottom panel -->
  <circle cx="180" cy="345" r="20" fill="#7c3aed" opacity="0.7"/>
  <rect x="165" y="368" width="30" height="40" rx="5" fill="#7c3aed" opacity="0.7"/>
  <!-- Speech bubble -->
  <ellipse cx="320" cy="360" rx="60" ry="30" fill="white" opacity="0.9"/>
  <polygon points="310,390 300,415 330,390" fill="white" opacity="0.9"/>
  <!-- Dot screen effect -->
  <circle cx="350" cy="100" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="370" cy="100" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="390" cy="100" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="360" cy="118" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="380" cy="118" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="400" cy="118" r="4" fill="#c084fc" opacity="0.7"/>
</svg>
