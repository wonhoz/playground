<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050010"/>
  <!-- 거울 프레임 -->
  <rect x="430" y="200" width="20" height="624" rx="10" fill="#1A237E"/>
  <!-- 왼쪽 물체 (위에서 아래로 낙하) -->
  <rect x="240" y="280" width="80" height="80" rx="12" fill="#7986CB"/>
  <polygon points="280,380 260,420 300,420" fill="#7986CB"/>
  <!-- 오른쪽 거울상 (아래에서 위로, 반전 중력) -->
  <rect x="704" y="664" width="80" height="80" rx="12" fill="#7986CB" opacity="0.7"/>
  <polygon points="744,644 724,604 764,604" fill="#7986CB" opacity="0.7"/>
  <!-- 중력 화살표 왼쪽 -->
  <line x1="280" y1="480" x2="280" y2="640" stroke="#1A237E" stroke-width="10" stroke-linecap="round"/>
  <polygon points="280,660 258,628 302,628" fill="#1A237E"/>
  <!-- 중력 화살표 오른쪽 (반전) -->
  <line x1="744" y1="544" x2="744" y2="384" stroke="#1A237E" stroke-width="10" stroke-linecap="round"/>
  <polygon points="744,364 722,396 766,396" fill="#1A237E"/>
</svg>
