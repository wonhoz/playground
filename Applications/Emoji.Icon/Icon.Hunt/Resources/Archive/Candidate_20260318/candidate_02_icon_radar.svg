<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 레이더 동심원 -->
  <circle cx="256" cy="256" r="30" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.2"/>
  <!-- 십자선 -->
  <line x1="256" y1="106" x2="256" y2="406" stroke="#10B981" stroke-width="1" opacity="0.2"/>
  <line x1="106" y1="256" x2="406" y2="256" stroke="#10B981" stroke-width="1" opacity="0.2"/>
  <!-- 레이더 스윕 -->
  <path d="M 256 256 L 370 170" stroke="#10B981" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 256 256 L 256 106 A 150 150 0 0 1 370 170 Z" fill="#10B981" opacity="0.07"/>
  <!-- 타깃 점들 -->
  <circle cx="310" cy="180" r="6" fill="#34D399" opacity="0.9" filter="url(#glow)"/>
  <circle cx="180" cy="310" r="5" fill="#10B981" opacity="0.7"/>
  <circle cx="330" cy="320" r="4" fill="#34D399" opacity="0.6"/>
  <!-- 레이블 -->
  <text x="256" y="440" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">ICON RADAR</text>
</svg>
