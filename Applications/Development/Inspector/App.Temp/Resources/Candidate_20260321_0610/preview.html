<!DOCTYPE html>

<title>App.Temp — Icon Candidates (20260321_0610)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #D6EAF8;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 24px;
  }
  h1 {
    text-align: center;
    color: #1A4A7A;
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .subtitle {
    text-align: center;
    color: #4A7AAA;
    font-size: 14px;
    margin-bottom: 40px;
  }
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 24px;
    width: 200px;
    box-shadow: 0 4px 20px rgba(30,80,140,0.12);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .card:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 36px rgba(30,80,140,0.22);
  }
  .card img {
    width: 128px;
    height: 128px;
    border-radius: 28px;
    display: block;
  }
  .card-filename {
    font-size: 13px;
    font-weight: 700;
    color: #1A4A7A;
    text-align: center;
  }
  .card-concept {
    font-size: 12px;
    color: #5A7A9A;
    text-align: center;
    line-height: 1.5;
  }
  .palette {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;

    font-weight: 600;
    letter-spacing: 0.03em;

  .tag-literal { background: #DBEAFE; color: #1E40AF; }
