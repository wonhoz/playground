<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D2840"/>
    </linearGradient>
    <linearGradient id="ice1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8E6F0"/>
      <stop offset="100%" stop-color="#4FC3D4"/>
    </linearGradient>
    <linearGradient id="ice2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="ice3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="shatter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="frost">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Snow ground -->
  <ellipse cx="256" cy="440" rx="200" ry="30" fill="#1A3A5C" opacity="0.5"/>
  <rect x="80" y="418" width="352" height="30" rx="15" fill="#C8E8F5"/>
  <!-- Tower blocks - ice style -->
  <rect x="120" y="322" width="272" height="58" rx="8" fill="url(#ice1)" filter="url(#frost)"/>
  <rect x="120" y="322" width="272" height="10" rx="4" fill="white" opacity="0.4"/>
  <rect x="156" y="260" width="200" height="58" rx="8" fill="url(#ice2)" filter="url(#frost)"/>
  <rect x="156" y="260" width="200" height="10" rx="4" fill="white" opacity="0.4"/>
  <rect x="188" y="198" width="136" height="58" rx="8" fill="url(#ice3)" filter="url(#frost)"/>
  <rect x="188" y="198" width="136" height="10" rx="4" fill="white" opacity="0.4"/>
  <!-- Shattering top block -->
  <g transform="translate(256, 160) rotate(-15)" opacity="0.85">
    <rect x="-76" y="-28" width="152" height="52" rx="6" fill="#E0F7FA"/>
    <rect x="-76" y="-28" width="152" height="8" rx="4" fill="white" opacity="0.5"/>
    <!-- crack lines -->
    <line x1="0" y1="-28" x2="-20" y2="24" stroke="#4FC3D4" stroke-width="2" opacity="0.8"/>
    <line x1="30" y1="-28" x2="10" y2="24" stroke="#4FC3D4" stroke-width="2" opacity="0.8"/>
  </g>
  <!-- Ice shards flying -->
  <polygon points="345,110 360,95 370,120" fill="#BAE6FD" opacity="0.8"/>
  <polygon points="375,130 392,115 398,142" fill="#7DD3FC" opacity="0.7"/>
  <polygon points="315,90 328,78 332,100" fill="#E0F7FA" opacity="0.8"/>
  <polygon points="355,88 366,75 374,95" fill="#4FC3D4" opacity="0.6"/>
  <!-- Shatter glow -->
  <circle cx="345" cy="150" r="30" fill="url(#shatter)" opacity="0.4"/>
  <!-- Snowflakes -->
  <circle cx="100" cy="120" r="3" fill="white" opacity="0.4"/>
  <circle cx="420" cy="180" r="2" fill="white" opacity="0.3"/>
  <circle cx="140" cy="200" r="2" fill="white" opacity="0.3"/>
  <circle cx="400" cy="100" r="3" fill="white" opacity="0.4"/>
</svg>
