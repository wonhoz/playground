<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 파일 강 (흐름) -->
  <path d="M 80 200 Q 130 180 180 200 Q 230 220 280 200 Q 330 180 380 200 Q 415 215 432 200" fill="none" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
  <path d="M 80 256 Q 130 236 180 256 Q 230 276 280 256 Q 330 236 380 256 Q 415 271 432 256" fill="none" stroke="#60A5FA" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <path d="M 80 312 Q 130 292 180 312 Q 230 332 280 312 Q 330 292 380 312 Q 415 327 432 312" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <!-- 파일 아이콘들 (강 위에 떠내려가는) -->
  <rect x="100" y="192" width="24" height="18" rx="3" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <path d="M 112 192 L 112 188 L 117 188 L 124 192" fill="#60A5FA" opacity="0.7"/>
  <rect x="220" y="248" width="24" height="18" rx="3" fill="#60A5FA" opacity="0.8" filter="url(#glow)"/>
  <path d="M 232 248 L 232 244 L 237 244 L 244 248" fill="#3B82F6" opacity="0.7"/>
  <rect x="350" y="192" width="24" height="18" rx="3" fill="#3B82F6" opacity="0.7"/>
  <path d="M 362 192 L 362 188 L 367 188 L 374 192" fill="#60A5FA" opacity="0.6"/>
  <rect x="155" y="304" width="24" height="18" rx="3" fill="#60A5FA" opacity="0.6"/>
  <rect x="310" y="248" width="24" height="18" rx="3" fill="#3B82F6" opacity="0.7"/>
  <!-- 서버 소스 (왼쪽) -->
  <rect x="80" y="172" width="16" height="140" rx="4" fill="#3B82F6" opacity="0.3" filter="url(#glow)"/>
  <circle cx="88" cy="155" r="10" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <!-- 목적지 (오른쪽) -->
  <rect x="416" y="172" width="16" height="140" rx="4" fill="#60A5FA" opacity="0.3" filter="url(#glow)"/>
  <circle cx="424" cy="155" r="10" fill="#60A5FA" opacity="0.7" filter="url(#glow)"/>
  <!-- 텍스트 -->
  <text x="256" y="410" text-anchor="middle" fill="#3B82F6" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">FILE STREAM</text>
</svg>