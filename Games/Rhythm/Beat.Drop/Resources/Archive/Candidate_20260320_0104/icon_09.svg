<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#080005"/>
  <!-- 공 + 패드 바운스: 공 + 패드 -->
  <!-- 패드 (하단) -->
  <rect x="200" y="780" width="624" height="80" rx="20" fill="#9C27B0"/>
  <rect x="220" y="790" width="584" height="58" rx="14" fill="#CE93D8" opacity="0.3"/>
  <!-- 바운스 궤적 (포물선) -->
  <path d="M280,760 Q512,200 744,760" stroke="#9C27B0" stroke-width="8" fill="none" stroke-dasharray="20,14" opacity="0.5"/>
  <path d="M280,760 Q400,500 512,600 Q624,700 744,760" stroke="#CE93D8" stroke-width="6" fill="none" stroke-dasharray="16,12" opacity="0.4"/>
  <!-- 공 (최고점) -->
  <circle cx="512" cy="320" r="90" fill="#9C27B0"/>
  <circle cx="512" cy="320" r="70" fill="#CE93D8" opacity="0.5"/>
  <!-- 공 광택 -->
  <ellipse cx="485" cy="290" rx="28" ry="20" fill="#CE93D8" opacity="0.6" transform="rotate(-20,485,290)"/>
  <!-- 공 그림자 (패드 위) -->
  <ellipse cx="512" cy="790" rx="80" ry="20" fill="#CE93D8" opacity="0.3"/>
  <!-- 음표 (공에서 나오는 비트) -->
  <ellipse cx="660" cy="260" rx="34" ry="26" fill="#CE93D8" opacity="0.7"/>
  <line x1="694" y1="244" x2="694" y2="160" stroke="#CE93D8" stroke-width="14" opacity="0.7"/>
  <path d="M694,160 Q744,174 738,210" stroke="#CE93D8" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- 파동 -->
  <path d="M440,320 Q420,290 440,260" stroke="#CE93D8" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M400,320 Q370,290 400,260" stroke="#CE93D8" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>
</svg>
