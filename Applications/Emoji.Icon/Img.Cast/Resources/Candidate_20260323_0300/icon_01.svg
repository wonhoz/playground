<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Img.Cast | SVG→ICO 변환 화살표 | 대각선/동적 | #EA580C 오렌지레드 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1C0A00"/>
  <!-- Layer 2: Left side - SVG source -->
  <rect x="100" y="280" width="300" height="320" rx="16" fill="#EA580C" opacity="0.15" stroke="#EA580C" stroke-width="3"/>
  <text x="250" y="390" font-family="Arial,sans-serif" font-size="28" fill="#FED7AA" text-anchor="middle" font-weight="bold">SVG</text>
  <!-- SVG content indicator (vector curves) -->
  <path d="M140 430 Q200 390 250 440 Q300 490 350 420" fill="none" stroke="#FB923C" stroke-width="3"/>
  <path d="M140 460 Q190 430 240 465 Q290 500 350 455" fill="none" stroke="#FB923C" stroke-width="2" opacity="0.6"/>
  <!-- Conversion arrow (large, dynamic) -->
  <path d="M420 490 L560 490" stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <polygon points="560,465 610,490 560,515" fill="#F59E0B"/>
  <!-- Spark particles along arrow -->
  <circle cx="450" cy="478" r="5" fill="#FDE68A" opacity="0.8"/>
  <circle cx="490" cy="502" r="4" fill="#FDE68A" opacity="0.6"/>
  <circle cx="530" cy="476" r="6" fill="#FDE68A" opacity="0.7"/>
  <!-- Right side - ICO result -->
  <rect x="630" y="280" width="300" height="320" rx="16" fill="#FBBF24" opacity="0.15" stroke="#FBBF24" stroke-width="3"/>
  <text x="780" y="390" font-family="Arial,sans-serif" font-size="28" fill="#FEF3C7" text-anchor="middle" font-weight="bold">ICO</text>
  <!-- Multi-size ICO grid -->
  <rect x="660" y="410" width="56" height="56" rx="8" fill="#F59E0B" opacity="0.8"/>
  <rect x="730" y="422" width="40" height="40" rx="6" fill="#FBBF24" opacity="0.7"/>
  <rect x="786" y="434" width="28" height="28" rx="4" fill="#FDE68A" opacity="0.6"/>
  <rect x="830" y="444" width="16" height="16" rx="3" fill="#FEF3C7" opacity="0.5"/>
  <!-- Layer 3: Format labels -->
  <text x="250" y="644" font-family="Arial,sans-serif" font-size="20" fill="#FB923C" text-anchor="middle">.svg / .png</text>
  <text x="780" y="644" font-family="Arial,sans-serif" font-size="20" fill="#FBBF24" text-anchor="middle">.ico</text>
</svg>
