<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Tap rhythm circles -->
  <circle cx="300" cy="380" r="80" fill="none" stroke="#F57F17" stroke-width="24"/>
  <circle cx="300" cy="380" r="40" fill="#F57F17"/>
  <circle cx="560" cy="380" r="80" fill="none" stroke="#FFD54F" stroke-width="24"/>
  <circle cx="560" cy="380" r="40" fill="#FFD54F"/>
  <circle cx="760" cy="380" r="55" fill="none" stroke="#F57F17" stroke-width="20"/>
  <circle cx="760" cy="380" r="28" fill="#F57F17" fill-opacity="0.7"/>
  <!-- Beat line -->
  <line x1="180" y1="550" x2="844" y2="550" stroke="#F57F17" stroke-width="10" stroke-opacity="0.3"/>
  <!-- Running legs -->
  <line x1="512" y1="600" x2="460" y2="730" stroke="#FFD54F" stroke-width="28" stroke-linecap="round"/>
  <line x1="512" y1="600" x2="580" y2="710" stroke="#F57F17" stroke-width="28" stroke-linecap="round"/>
  <!-- Speed blur -->
  <line x1="300" y1="700" x2="150" y2="700" stroke="#F57F17" stroke-width="14" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="300" y1="740" x2="180" y2="740" stroke="#F57F17" stroke-width="10" stroke-opacity="0.25" stroke-linecap="round"/>
</svg>