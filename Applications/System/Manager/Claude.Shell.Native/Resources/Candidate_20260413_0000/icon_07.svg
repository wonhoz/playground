  <text x="420" y="555" font-family="Consolas, monospace" font-weight="700" font-size="68" fill="#FFD93D">claude</text>
  <text x="220" y="700" font-family="Consolas, monospace" font-weight="700" font-size="50" fill="#FFFFFF">Right-click → run</text>
  <!-- 상단 라벨 -->
  <rect x="302" y="130" width="420" height="100" rx="36" fill="#004D5B"/>
  <text x="512" y="202" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#FFD93D" text-anchor="middle">FOLDER + CLI</text>
