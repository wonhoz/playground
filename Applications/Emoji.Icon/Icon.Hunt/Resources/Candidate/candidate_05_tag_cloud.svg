  <text x="360" y="340" font-family="sans-serif" font-size="20" fill="#44ff88">info</text>
  <!-- Central magnifier -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#4488ff" stroke-width="4" stroke-opacity="0.7"/>
