<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="lbg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#lbg3)"/>
  <!-- Layer 2: 세계 지도 (단순화된 윤곽선) -->
  <!-- 바다 배경 -->
  <ellipse cx="512" cy="520" rx="430" ry="300" fill="#00ACC1" opacity="0.4"/>
  <!-- 북아메리카 -->
  <path d="M200 380 L260 340 L300 350 L320 410 L290 480 L240 500 L200 460 Z" fill="#80DEEA" opacity="0.9"/>
  <!-- 남아메리카 -->
  <path d="M280 510 L320 500 L340 560 L320 650 L280 680 L260 620 L260 560 Z" fill="#80DEEA" opacity="0.9"/>
  <!-- 유럽 -->
  <path d="M430 330 L490 310 L510 350 L490 390 L450 400 L430 370 Z" fill="#B2EBF2" opacity="0.9"/>
  <!-- 아프리카 -->
  <path d="M440 400 L510 380 L540 440 L530 560 L490 620 L450 590 L430 500 Z" fill="#80DEEA" opacity="0.9"/>
  <!-- 아시아 -->
  <path d="M510 290 L650 280 L720 320 L740 400 L680 440 L580 430 L520 380 Z" fill="#B2EBF2" opacity="0.9"/>
  <!-- 오세아니아 -->
  <path d="M680 510 L750 490 L780 540 L740 580 L680 560 Z" fill="#80DEEA" opacity="0.9"/>
  <!-- 지도 경계선 -->
  <g stroke="#00838F" stroke-width="3" fill="none" opacity="0.5">
    <line x1="82" y1="430" x2="942" y2="430"/>
    <line x1="82" y1="520" x2="942" y2="520"/>
    <line x1="400" y1="220" x2="400" y2="800"/>
    <line x1="600" y1="220" x2="600" y2="800"/>
  </g>
  <!-- Layer 3: 컬러 핀들 -->
  <!-- 핀 디자인: 원+삼각형 -->
  <!-- 미국 핀 (빨강) -->
  <circle cx="240" cy="400" r="32" fill="#E53935"/>
  <polygon points="240,440 220,468 260,468" fill="#E53935"/>
  <circle cx="240" cy="400" r="18" fill="white"/>
  <!-- 영국 핀 (파랑) -->
  <circle cx="460" cy="340" r="28" fill="#1E88E5"/>
  <polygon points="460,372 442,398 478,398" fill="#1E88E5"/>
  <circle cx="460" cy="340" r="16" fill="white"/>
  <!-- 일본 핀 (노랑) -->
  <circle cx="700" cy="340" r="32" fill="#FFD600"/>
  <polygon points="700,376 680,404 720,404" fill="#FFD600"/>
  <circle cx="700" cy="340" r="18" fill="#F57F17"/>
  <!-- 한국 핀 (초록) -->
  <circle cx="680" cy="380" r="24" fill="#43A047"/>
  <polygon points="680,408 664,430 696,430" fill="#43A047"/>
  <circle cx="680" cy="380" r="13" fill="white"/>
  <!-- 브라질 핀 (주황) -->
  <circle cx="300" cy="570" r="26" fill="#FF7043"/>
  <polygon points="300,600 282,626 318,626" fill="#FF7043"/>
  <circle cx="300" cy="570" r="14" fill="white"/>
</svg>
