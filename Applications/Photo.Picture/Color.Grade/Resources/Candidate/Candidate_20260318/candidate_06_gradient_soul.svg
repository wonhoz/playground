<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <linearGradient id="soul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#06D6A0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 나비 날개 형태 (색상 영혼) -->
  <path d="M 256 256 C 180 180 90 140 80 220 C 70 300 150 320 256 256 Z" fill="url(#soul)" opacity="0.4" filter="url(#glow)"/>
  <path d="M 256 256 C 332 180 422 140 432 220 C 442 300 362 320 256 256 Z" fill="url(#soul)" opacity="0.4" filter="url(#glow)"/>
  <path d="M 256 256 C 180 332 90 372 80 292 C 70 212 150 192 256 256 Z" fill="url(#soul)" opacity="0.3"/>
  <path d="M 256 256 C 332 332 422 372 432 292 C 442 212 362 192 256 256 Z" fill="url(#soul)" opacity="0.3"/>
  <!-- 중앙 코어 -->
  <circle cx="256" cy="256" r="20" fill="url(#soul)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="white" opacity="0.7"/>
  <!-- 커브 윤곽선 -->
  <path d="M 256 256 C 180 180 90 140 80 220 C 70 300 150 320 256 256 Z" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.6"/>
  <path d="M 256 256 C 332 180 422 140 432 220 C 442 300 362 320 256 256 Z" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <!-- 색상 점들 -->
  <circle cx="80" cy="220" r="8" fill="#FF6B6B" opacity="0.8" filter="url(#glow)"/>
  <circle cx="432" cy="220" r="8" fill="#A78BFA" opacity="0.8" filter="url(#glow)"/>
  <circle cx="80" cy="292" r="8" fill="#06D6A0" opacity="0.7"/>
  <circle cx="432" cy="292" r="8" fill="#FFD166" opacity="0.7"/>
</svg>