<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgAlert" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#4A0000"/>
      <stop offset="100%" stop-color="#1A0000"/>
    </radialGradient>
    <!-- 벨 흰색/아이보리 -->
    <linearGradient id="bellWhite" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <!-- 벨 그림자 면 -->
    <linearGradient id="bellShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCCCCC"/>
      <stop offset="100%" stop-color="#AAAAAA"/>
    </linearGradient>
    <!-- 울림 라인 노랑 -->
    <filter id="alertGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bellShadowFilter">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#FF000044"/>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgAlert)"/>

  <!-- 배경 방사형 글로우 -->
  <circle cx="512" cy="480" r="380" fill="#FF0000" opacity="0.06"/>
  <circle cx="512" cy="480" r="280" fill="#FF0000" opacity="0.06"/>
  <circle cx="512" cy="480" r="180" fill="#FF2222" opacity="0.06"/>

  <!-- Layer2: 큰 알림 벨 -->
  <!-- 벨 손잡이 고리 -->
  <path d="M 490 245 Q 490 215 512 215 Q 534 215 534 245" fill="none" stroke="url(#bellWhite)" stroke-width="18" stroke-linecap="round"/>

  <!-- 벨 몸통 (큰 돔) -->
  <path d="M 512 240 C 440 240 350 310 330 420 L 310 620 L 714 620 L 694 420 C 674 310 584 240 512 240 Z" fill="url(#bellWhite)" filter="url(#bellShadowFilter)"/>

  <!-- 벨 측면 그림자 -->
  <path d="M 512 240 C 584 240 674 310 694 420 L 714 620 L 630 620 L 614 440 C 598 330 560 258 512 240 Z" fill="url(#bellShadow)" opacity="0.4"/>

  <!-- 벨 바닥 플레이트 -->
  <rect x="290" y="615" width="444" height="44" rx="10" fill="url(#bellWhite)"/>
  <!-- 벨 추 -->
  <circle cx="512" cy="695" r="30" fill="#E8E8E8"/>
  <line x1="512" y1="658" x2="512" y2="665" stroke="#CCCCCC" stroke-width="12" stroke-linecap="round"/>

  <!-- Layer3: 울림 효과 라인들 -->
  <!-- 왼쪽 울림 -->
  <path d="M 310 360 Q 255 435 310 510" fill="none" stroke="#FFD700" stroke-width="12" stroke-linecap="round" filter="url(#alertGlow)" opacity="0.95"/>
  <path d="M 272 320 Q 195 435 272 550" fill="none" stroke="#FFD700" stroke-width="9" stroke-linecap="round" filter="url(#alertGlow)" opacity="0.7"/>
  <path d="M 234 280 Q 136 435 234 590" fill="none" stroke="#FF9500" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- 오른쪽 울림 -->
  <path d="M 714 360 Q 769 435 714 510" fill="none" stroke="#FFD700" stroke-width="12" stroke-linecap="round" filter="url(#alertGlow)" opacity="0.95"/>
  <path d="M 752 320 Q 829 435 752 550" fill="none" stroke="#FFD700" stroke-width="9" stroke-linecap="round" filter="url(#alertGlow)" opacity="0.7"/>
  <path d="M 790 280 Q 888 435 790 590" fill="none" stroke="#FF9500" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- 긴급 느낌표 -->
  <circle cx="512" cy="780" r="38" fill="#FF2222" filter="url(#alertGlow)"/>
  <text x="512" y="796" font-family="sans-serif" font-size="38" font-weight="bold" fill="#FFFFFF" text-anchor="middle">!</text>
</svg>
