<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 보라+분홍 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#FF6EB4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: SVG 라벨(왼쪽) → 화살표 → ICO 라벨(오른쪽) -->
  <!-- 왼쪽 파일 카드 -->
  <rect x="100" y="360" width="300" height="280" rx="24" fill="white" opacity="0.95"/>
  <rect x="100" y="360" width="300" height="72" rx="24" fill="#9B59B6" opacity="0.85"/>
  <rect x="100" y="410" width="300" height="22" fill="#9B59B6" opacity="0.85"/>
  <text x="250" y="418" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">SVG</text>
  <!-- SVG 아이콘 내용 표시 (경로 심볼) -->
  <path d="M 160 500 Q 200 460 250 500 Q 300 540 340 490" stroke="#9B59B6" stroke-width="16" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="570" r="30" fill="#FF6EB4" opacity="0.5"/>
  <polygon points="280,555 310,590 250,590" fill="#9B59B6" opacity="0.6"/>
  <!-- 변환 화살표 -->
  <rect x="424" y="460" width="176" height="80" rx="40" fill="white" opacity="0.3"/>
  <path d="M 444 500 L 580 500 M 556 468 L 590 500 L 556 532" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 오른쪽 파일 카드 -->
  <rect x="624" y="360" width="300" height="280" rx="24" fill="white" opacity="0.95"/>
  <rect x="624" y="360" width="300" height="72" rx="24" fill="#E91E63" opacity="0.85"/>
  <rect x="624" y="410" width="300" height="22" fill="#E91E63" opacity="0.85"/>
  <text x="774" y="418" font-family="Segoe UI, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
  <!-- ICO 멀티사이즈 표현 -->
  <rect x="654" y="468" width="44" height="44" rx="6" fill="#E91E63" opacity="0.7"/>
  <rect x="706" y="462" width="56" height="56" rx="8" fill="#E91E63" opacity="0.8"/>
  <rect x="672" y="530" width="80" height="80" rx="12" fill="#E91E63" opacity="0.9"/>
  <!-- Layer 3: 하단 레이블 -->
  <text x="512" y="830" font-family="Segoe UI, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Img.Cast</text>
</svg>
