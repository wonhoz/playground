<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="correct10" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="wrong10" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF6E6E"/>
      <stop offset="100%" stop-color="#D50000"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg10)"/>

  <!-- Diagonal divider line -->
  <line x1="100" y1="924" x2="924" y2="100" stroke="white" stroke-width="14" opacity="0.3" stroke-linecap="round"/>

  <!-- Layer 2: CORRECT side (top-left) — green check circle -->
  <circle cx="310" cy="340" r="210" fill="url(#correct10)" opacity="0.95"/>
  <!-- Checkmark -->
  <path d="M195 340 L278 428 L430 258" fill="none" stroke="white" stroke-width="68"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- WRONG side (bottom-right) — red X circle -->
  <circle cx="714" cy="684" r="210" fill="url(#wrong10)" opacity="0.95"/>
  <!-- X mark -->
  <line x1="614" y1="584" x2="814" y2="784" stroke="white" stroke-width="68" stroke-linecap="round"/>
  <line x1="814" y1="584" x2="614" y2="784" stroke="white" stroke-width="68" stroke-linecap="round"/>

  <!-- Layer 3: Labels -->
  <text x="310" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">O</text>
  <text x="714" y="964" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.9">X</text>

  <!-- Score indicators -->
  <rect x="100" y="100" width="170" height="70" rx="20" fill="white" opacity="0.85"/>
  <text x="185" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold"
    fill="#00C853" text-anchor="middle">+100</text>

  <rect x="754" y="854" width="170" height="70" rx="20" fill="white" opacity="0.85"/>
  <text x="839" y="902" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold"
    fill="#D50000" text-anchor="middle">MISS</text>
</svg>
