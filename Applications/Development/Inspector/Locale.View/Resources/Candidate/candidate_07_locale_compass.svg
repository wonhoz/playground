<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="compassRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <linearGradient id="needleN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ee0979"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="needleS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#bdc3c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#compassRing)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ffd200" stroke-width="1" opacity="0.4"/>

  <!-- Degree tick marks -->
  <g stroke="#ffd200" stroke-width="2" opacity="0.6">
    <line x1="256" y1="65" x2="256" y2="85"/>
    <line x1="256" y1="427" x2="256" y2="447"/>
    <line x1="65" y1="256" x2="85" y2="256"/>
    <line x1="427" y1="256" x2="447" y2="256"/>
    <!-- Diagonal ticks -->
    <line x1="392" y1="120" x2="380" y2="132"/>
    <line x1="120" y1="120" x2="132" y2="132"/>
    <line x1="392" y1="392" x2="380" y2="380"/>
    <line x1="120" y1="392" x2="132" y2="380"/>
  </g>

  <!-- Compass background -->
  <circle cx="256" cy="256" r="150" fill="#0d1b2a" opacity="0.85"/>

  <!-- Wind rose decorative lines -->
  <line x1="256" y1="106" x2="256" y2="406" stroke="#2c5364" stroke-width="1.5" opacity="0.5"/>
  <line x1="106" y1="256" x2="406" y2="256" stroke="#2c5364" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="150" x2="362" y2="362" stroke="#2c5364" stroke-width="1" opacity="0.3"/>
  <line x1="362" y1="150" x2="150" y2="362" stroke="#2c5364" stroke-width="1" opacity="0.3"/>

  <!-- Cardinal direction shapes (instead of text) -->
  <!-- N marker (north) - triangle up -->
  <polygon points="256,118 248,145 264,145" fill="#ee0979" filter="url(#glow)"/>
  <!-- S marker - triangle down -->
  <polygon points="256,394 248,367 264,367" fill="#ecf0f1" opacity="0.8"/>
  <!-- E marker - right chevron -->
  <polygon points="394,256 367,248 367,264" fill="#56CCF2" opacity="0.9"/>
  <!-- W marker - left chevron -->
  <polygon points="118,256 145,248 145,264" fill="#56CCF2" opacity="0.9"/>

  <!-- Compass needle - pointing NE (locale direction indicator) -->
  <polygon points="256,160 248,256 264,256" fill="url(#needleN)" filter="url(#glow)"/>
  <polygon points="256,352 248,256 264,256" fill="url(#needleS)"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="22" fill="url(#compassRing)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#0d1b2a"/>
  <circle cx="256" cy="256" r="6" fill="#ffd200"/>

  <!-- Language code bubbles at cardinal points -->
  <circle cx="256" cy="95" r="18" fill="#ee0979" opacity="0.2"/>
  <circle cx="256" cy="417" r="18" fill="#56CCF2" opacity="0.2"/>
  <circle cx="95" cy="256" r="18" fill="#56ab2f" opacity="0.2"/>
  <circle cx="417" cy="256" r="18" fill="#f7971e" opacity="0.2"/>
</svg>
