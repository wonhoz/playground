<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- Compass body -->
  <circle cx="256" cy="256" r="170" fill="#1a1200" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.2"/>
  <!-- Cardinal direction marks -->
  <text x="242" y="108" font-family="sans-serif" font-size="22" fill="#ffd700" font-weight="bold">N</text>
  <text x="242" y="420" font-family="sans-serif" font-size="22" fill="#ffd700" opacity="0.7">S</text>
  <text x="100" y="264" font-family="sans-serif" font-size="22" fill="#ffd700" opacity="0.7">W</text>
  <text x="400" y="264" font-family="sans-serif" font-size="22" fill="#ffd700" opacity="0.7">E</text>
  <!-- Tick marks -->
  <line x1="256" y1="92" x2="256" y2="110" stroke="#ffd700" stroke-width="3"/>
  <line x1="256" y1="402" x2="256" y2="420" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <line x1="92" y1="256" x2="110" y2="256" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <line x1="402" y1="256" x2="420" y2="256" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <!-- 45 degree marks -->
  <line x1="164" y1="164" x2="176" y2="176" stroke="#b8860b" stroke-width="1.5" opacity="0.5"/>
  <line x1="348" y1="164" x2="336" y2="176" stroke="#b8860b" stroke-width="1.5" opacity="0.5"/>
  <line x1="164" y1="348" x2="176" y2="336" stroke="#b8860b" stroke-width="1.5" opacity="0.5"/>
  <line x1="348" y1="348" x2="336" y2="336" stroke="#b8860b" stroke-width="1.5" opacity="0.5"/>
  <!-- Compass needle (pointing to icon) -->
  <polygon points="256,130 248,256 256,268 264,256" fill="#ffd700"/>
  <polygon points="256,382 248,256 256,244 264,256" fill="#b8860b" opacity="0.7"/>
  <!-- Center pivot -->
  <circle cx="256" cy="256" r="14" fill="#ffd700"/>
  <circle cx="256" cy="256" r="8" fill="#1a1200"/>
  <circle cx="256" cy="256" r="4" fill="#ffd700"/>
  <!-- Icon chips in compass quadrants -->
  <rect x="196" y="136" width="48" height="48" rx="10" fill="#221a00" stroke="#b8860b" stroke-width="1.5"/>
  <text x="206" y="172" font-size="28">⭐</text>
  <rect x="268" y="136" width="48" height="48" rx="10" fill="#221a00" stroke="#b8860b" stroke-width="1.5"/>
  <text x="278" y="172" font-size="28">🏆</text>
  <rect x="134" y="220" width="48" height="48" rx="10" fill="#221a00" stroke="#b8860b" stroke-width="1.5" opacity="0.7"/>
  <text x="144" y="256" font-size="28">🔮</text>
  <rect x="330" y="220" width="48" height="48" rx="10" fill="#221a00" stroke="#ffd700" stroke-width="2"/>
  <text x="340" y="256" font-size="28">🎯</text>
  <!-- Small magnifier overlay -->
  <circle cx="380" cy="380" r="44" fill="none" stroke="#ffd700" stroke-width="4"/>
  <text x="358" y="396" font-size="28">🔍</text>
  <line x1="410" y1="410" x2="428" y2="428" stroke="#ffd700" stroke-width="10" stroke-linecap="round"/>
</svg>
