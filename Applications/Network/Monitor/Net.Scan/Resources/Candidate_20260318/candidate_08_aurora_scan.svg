<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d14"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2DD4BF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 오로라 컬럼들 (스캔 신호) -->
  <rect x="100" y="200" width="18" height="230" rx="9" fill="url(#aurora1)" opacity="0.7"/>
  <rect x="135" y="150" width="18" height="280" rx="9" fill="url(#aurora2)" opacity="0.6"/>
  <rect x="170" y="180" width="18" height="250" rx="9" fill="url(#aurora1)" opacity="0.8"/>
  <rect x="205" y="130" width="18" height="300" rx="9" fill="url(#aurora2)" opacity="0.5"/>
  <rect x="240" y="160" width="18" height="270" rx="9" fill="url(#aurora1)" opacity="0.9" filter="url(#glow)"/>
  <rect x="275" y="140" width="18" height="290" rx="9" fill="url(#aurora2)" opacity="0.8" filter="url(#glow)"/>
  <rect x="310" y="170" width="18" height="260" rx="9" fill="url(#aurora1)" opacity="0.7"/>
  <rect x="345" y="190" width="18" height="240" rx="9" fill="url(#aurora2)" opacity="0.6"/>
  <rect x="380" y="155" width="18" height="275" rx="9" fill="url(#aurora1)" opacity="0.8"/>
  <!-- 수평 스캔 바 -->
  <rect x="80" y="355" width="352" height="8" rx="4" fill="#14B8A6" opacity="0.4" filter="url(#glow)"/>
  <!-- 지평선 -->
  <line x1="80" y1="430" x2="432" y2="430" stroke="#14B8A6" stroke-width="2" opacity="0.5"/>
  <!-- 탐지 점들 -->
  <circle cx="155" cy="390" r="5" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="257" cy="390" r="5" fill="#2DD4BF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="385" cy="390" r="5" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="470" text-anchor="middle" fill="#14B8A6" font-size="12" font-family="monospace" opacity="0.6">NET AURORA SCAN</text>
</svg>