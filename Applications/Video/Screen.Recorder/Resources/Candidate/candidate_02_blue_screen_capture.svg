<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#052040"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor -->
  <rect x="70" y="80" width="372" height="270" rx="16" fill="url(#screen)" stroke="url(#blue)" stroke-width="6"/>
  <!-- Screen content -->
  <rect x="84" y="94" width="344" height="242" rx="10" fill="#0D1B2A"/>
  <!-- Capture frame corners -->
  <g stroke="url(#blue)" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M 134 140 L 134 110 L 164 110"/>
    <path d="M 348 110 L 378 110 L 378 140"/>
    <path d="M 134 276 L 134 306 L 164 306"/>
    <path d="M 348 306 L 378 306 L 378 276"/>
  </g>
  <!-- Desktop content inside -->
  <rect x="150" y="130" width="100" height="70" rx="6" fill="#1565C0" opacity="0.4"/>
  <rect x="264" y="130" width="100" height="40" rx="6" fill="#1565C0" opacity="0.3"/>
  <rect x="264" y="180" width="100" height="30" rx="6" fill="#1565C0" opacity="0.25"/>
  <!-- Monitor stand -->
  <rect x="236" y="350" width="40" height="40" rx="4" fill="#1E3A5F"/>
  <rect x="196" y="386" width="120" height="16" rx="6" fill="#1E3A5F"/>
  <!-- REC indicator -->
  <circle cx="368" cy="108" r="10" fill="#FF1744"/>
  <rect x="382" y="103" width="30" height="10" rx="4" fill="#FF5252" opacity="0.8"/>
</svg>
