<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="glow08" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FFF9C4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: 이미지 프레임 (왼쪽 아래 — 작고 흐릿) -->
  <rect x="110" y="580" width="280" height="210" rx="16" fill="white" opacity="0.6"/>
  <rect x="126" y="596" width="248" height="164" rx="8" fill="#FFCC80" opacity="0.7"/>
  <text x="250" y="698" font-family="Arial, sans-serif" font-size="44" fill="#BF360C" text-anchor="middle" opacity="0.8">Low</text>
  <!-- 변환 빛 방사 (중앙) -->
  <circle cx="512" cy="430" r="220" fill="url(#glow08)"/>
  <!-- 이미지 프레임 (오른쪽 위 — 크고 선명) -->
  <rect x="620" y="180" width="300" height="240" rx="20" fill="white" opacity="0.97"/>
  <rect x="638" y="198" width="264" height="188" rx="12" fill="#FFF9C4"/>
  <!-- 선명한 이미지 내용 -->
  <polygon points="638,368 738,250 802,298 869,218 902,368" fill="#E65100"/>
  <circle cx="694" cy="248" r="32" fill="#FF6F00"/>
  <!-- Layer 3: 동적 빛 선들 (대각선) -->
  <line x1="280" y1="560" x2="530" y2="340" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="240" y1="620" x2="510" y2="460" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="320" y1="500" x2="550" y2="310" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <!-- 배율 배지 -->
  <circle cx="512" cy="430" r="90" fill="#E65100" opacity="0.9"/>
  <text x="512" y="460" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">4x</text>
</svg>
