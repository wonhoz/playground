<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg08" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <clipPath id="clip08">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <!-- 배경 별들 -->
  <g fill="#FFFFFF" opacity="0.3">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="900" cy="150" r="3"/>
    <circle cx="150" cy="900" r="4"/>
    <circle cx="950" cy="880" r="3"/>
    <circle cx="500" cy="80" r="2"/>
    <circle cx="80" cy="500" r="2"/>
    <circle cx="950" cy="500" r="2"/>
  </g>

  <!-- 대륙 5개 링 (올림픽 영감, 독립 링) -->
  <!-- 링 1 — 파랑 (유럽) -->
  <circle cx="260" cy="400" r="140" fill="none" stroke="#22D3EE" stroke-width="60"/>
  <!-- 링 2 — 노랑 (아시아) -->
  <circle cx="512" cy="400" r="140" fill="none" stroke="#FDE68A" stroke-width="60"/>
  <!-- 링 3 — 검정→흰 (아프리카) -->
  <circle cx="764" cy="400" r="140" fill="none" stroke="#E2E8F0" stroke-width="60"/>
  <!-- 링 4 — 빨강 (아메리카) -->
  <circle cx="386" cy="590" r="140" fill="none" stroke="#F472B6" stroke-width="60"/>
  <!-- 링 5 — 초록 (오세아니아) -->
  <circle cx="638" cy="590" r="140" fill="none" stroke="#4ADE80" stroke-width="60"/>

  <!-- 대륙 레이블 (작게) -->
  <g font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#FFFFFF" opacity="0.7">
    <text x="260" y="412">EU</text>
    <text x="512" y="412">AS</text>
    <text x="764" y="412">AF</text>
    <text x="386" y="602">AM</text>
    <text x="638" y="602">OC</text>
  </g>

  <!-- 하단 장식 텍스트 -->
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        text-anchor="middle" fill="#22D3EE" letter-spacing="6">WORLD</text>
  <text x="512" y="900" font-family="Arial, sans-serif" font-size="36"
        text-anchor="middle" fill="#64748B">5 Continents</text>
</svg>
