<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050A0A"/>
  <!-- 렌즈 테두리 -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#00695C" stroke-width="32"/>
  <!-- 렌즈 내부 -->
  <circle cx="512" cy="512" r="268" fill="#00695C" opacity="0.1"/>
  <!-- 렌즈 굴절선 (수직) -->
  <line x1="512" y1="212" x2="512" y2="812" stroke="#4DB6AC" stroke-width="16" opacity="0.6"/>
  <!-- 렌즈 반사광 -->
  <path d="M350 350 Q420 300 480 380" fill="none" stroke="#4DB6AC" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  <!-- 외부 오브젝트 (작음) -->
  <rect x="160" y="470" width="80" height="80" rx="8" fill="#00695C" opacity="0.7"/>
  <!-- 내부 오브젝트 (렌즈로 확대) -->
  <rect x="440" y="420" width="144" height="144" rx="14" fill="#4DB6AC" opacity="0.5"/>
  <!-- 광선 -->
  <line x1="240" y1="480" x2="420" y2="480" stroke="#4DB6AC" stroke-width="8" opacity="0.5" stroke-dasharray="16 8"/>
  <line x1="240" y1="560" x2="420" y2="560" stroke="#4DB6AC" stroke-width="8" opacity="0.5" stroke-dasharray="16 8"/>
  <!-- 렌즈 하이라이트 -->
  <path d="M380 330 Q440 290 500 340" fill="none" stroke="#4DB6AC" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
</svg>
