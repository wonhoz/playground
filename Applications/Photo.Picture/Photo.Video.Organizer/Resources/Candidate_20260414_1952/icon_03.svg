<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 초록+민트 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 폴더 트리 구조 (2024/06/15) -->
  <!-- 루트 폴더 -->
  <rect x="160" y="180" width="320" height="80" rx="16" fill="#FFD54F" opacity="0.95"/>
  <text x="205" y="232" font-family="Segoe UI, sans-serif" font-size="48" font-weight="bold" fill="#E65100">📁 Photos</text>
  <!-- 연결선: Photos → 2024 -->
  <line x1="240" y1="260" x2="240" y2="310" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="240" y1="310" x2="360" y2="310" stroke="white" stroke-width="8" opacity="0.7"/>
  <!-- 2024 폴더 -->
  <rect x="360" y="280" width="280" height="70" rx="14" fill="#FFCC80" opacity="0.95"/>
  <text x="395" y="326" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="#BF360C">📁 2024</text>
  <!-- 연결선: 2024 → 06, 07 -->
  <line x1="440" y1="350" x2="440" y2="400" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="440" y1="400" x2="540" y2="400" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="440" y1="400" x2="440" y2="480" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="440" y1="480" x2="540" y2="480" stroke="white" stroke-width="8" opacity="0.7"/>
  <!-- 06 폴더 -->
  <rect x="540" y="374" width="220" height="60" rx="12" fill="#A5D6A7" opacity="0.95"/>
  <text x="568" y="414" font-family="Segoe UI, sans-serif" font-size="40" font-weight="bold" fill="#1B5E20">📁 06</text>
  <!-- 07 폴더 -->
  <rect x="540" y="454" width="220" height="60" rx="12" fill="#A5D6A7" opacity="0.95"/>
  <text x="568" y="494" font-family="Segoe UI, sans-serif" font-size="40" font-weight="bold" fill="#1B5E20">📁 07</text>
  <!-- 06 → 15 -->
  <line x1="620" y1="434" x2="620" y2="480" stroke="white" stroke-width="6" opacity="0.7"/>
  <line x1="620" y1="480" x2="700" y2="480" stroke="white" stroke-width="6" opacity="0.7"/>
  <!-- 15 폴더 -->
  <rect x="700" y="458" width="188" height="54" rx="10" fill="#C8E6C9" opacity="0.95"/>
  <text x="722" y="494" font-family="Segoe UI, sans-serif" font-size="36" font-weight="bold" fill="#2E7D32">📁 15</text>
  <!-- Layer 3: 사진 파일 (최하단) -->
  <line x1="760" y1="512" x2="760" y2="560" stroke="white" stroke-width="6" opacity="0.6"/>
  <rect x="700" y="560" width="220" height="52" rx="10" fill="white" opacity="0.9"/>
  <text x="716" y="595" font-family="Consolas, monospace" font-size="30" fill="#1B5E20">📷 001.jpg</text>
  <line x1="760" y1="612" x2="760" y2="630" stroke="white" stroke-width="6" opacity="0.6"/>
  <rect x="700" y="630" width="220" height="52" rx="10" fill="white" opacity="0.9"/>
  <text x="716" y="665" font-family="Consolas, monospace" font-size="30" fill="#1B5E20">🎬 002.mp4</text>
  <!-- 하단 레이블 -->
  <text x="512" y="860" font-family="Segoe UI, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Auto Sort</text>
  <text x="512" y="930" font-family="Segoe UI, sans-serif" font-size="50" fill="white" text-anchor="middle" opacity="0.8">2024 / 06 / 15</text>
</svg>
