  <line x1="434" y1="590" x2="294" y2="730" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <line x1="590" y1="590" x2="730" y2="730" stroke="#42A5F5" stroke-width="14" stroke-linecap="round"/>
  <!-- 외부 포맷 노드들 -->
  <circle cx="512" cy="180" r="70" fill="#E91E63"/>
  <text x="512" y="203" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="48" fill="white" text-anchor="middle">SVG</text>
  <circle cx="512" cy="844" r="70" fill="#FF6F00"/>
  <text x="512" y="867" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="48" fill="white" text-anchor="middle">ICO</text>
  <circle cx="180" cy="512" r="70" fill="#388E3C"/>
