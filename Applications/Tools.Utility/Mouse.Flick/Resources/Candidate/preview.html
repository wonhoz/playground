<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse.Flick - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    color: #92FE9D;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: #252525;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: #92FE9D;
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 12px;
    color: #ccc;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Mouse.Flick</h1>
<p class="subtitle">마우스 제스처·플릭 도구 — Icon Candidates (10)</p>
<div class="grid">
  <div class="card">
    <img src="candidate_01_gesture_swipe.svg" alt="01 gesture_swipe">
    <div class="card-num">#01</div>
    <div class="card-name">gesture_swipe</div>
  </div>
  <div class="card">
    <img src="candidate_02_hand_gesture.svg" alt="02 hand_gesture">
    <div class="card-num">#02</div>
    <div class="card-name">hand_gesture</div>
  </div>
  <div class="card">
    <img src="candidate_03_velocity_arrow.svg" alt="03 velocity_arrow">
    <div class="card-num">#03</div>
    <div class="card-name">velocity_arrow</div>
  </div>
  <div class="card">
    <img src="candidate_04_circular_gesture.svg" alt="04 circular_gesture">
    <div class="card-num">#04</div>
    <div class="card-name">circular_gesture</div>
  </div>
  <div class="card">
    <img src="candidate_05_dark_cursor.svg" alt="05 dark_cursor">
    <div class="card-num">#05</div>
    <div class="card-name">dark_cursor</div>
  </div>
  <div class="card">
    <img src="candidate_06_wave_motion.svg" alt="06 wave_motion">
    <div class="card-num">#06</div>
    <div class="card-name">wave_motion</div>
  </div>
  <div class="card">
    <img src="candidate_07_compass_rose.svg" alt="07 compass_rose">
    <div class="card-num">#07</div>
    <div class="card-name">compass_rose</div>
  </div>
  <div class="card">
    <img src="candidate_08_lightning_click.svg" alt="08 lightning_click">
    <div class="card-num">#08</div>
    <div class="card-name">lightning_click</div>
  </div>
  <div class="card">
    <img src="candidate_09_minimalist_swipe.svg" alt="09 minimalist_swipe">
    <div class="card-num">#09</div>
    <div class="card-name">minimalist_swipe</div>
  </div>
  <div class="card">
    <img src="candidate_10_retro_joystick.svg" alt="10 retro_joystick">
    <div class="card-num">#10</div>
    <div class="card-name">retro_joystick</div>
  </div>
</div>
</body>
</html>
