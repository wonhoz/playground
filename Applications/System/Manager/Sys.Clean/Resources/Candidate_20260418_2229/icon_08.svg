<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background purple to dark -->
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#1A0030"/>
    </linearGradient>
    <linearGradient id="gaugeFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="50%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Monitor/PC + broom overlay + gauge -->
  <!-- Monitor body -->
  <rect x="200" y="200" width="624" height="440" rx="24" fill="#37474F" opacity="0.9"/>
  <rect x="224" y="224" width="576" height="392" rx="14" fill="#1A237E"/>
  <!-- Screen content: Sys.Clean running -->
  <rect x="244" y="244" width="536" height="60" rx="10" fill="#283593"/>
  <text x="512" y="284" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#7986CB" text-anchor="middle">Sys.Clean v1.4</text>
  <!-- Progress gauge on screen -->
  <rect x="264" y="330" width="496" height="40" rx="20" fill="#0D1B6E"/>
  <rect x="264" y="330" width="380" height="40" rx="20" fill="url(#gaugeFill)"/>
  <text x="512" y="410" font-family="Arial, sans-serif" font-size="36" fill="#90CAF9" text-anchor="middle">Scanning Registry...</text>
  <!-- Issue list on screen -->
  <rect x="264" y="450" width="240" height="30" rx="8" fill="#3949AB" opacity="0.8"/>
  <text x="384" y="471" font-family="Arial, sans-serif" font-size="22" fill="#BBDEFB" text-anchor="middle">임시파일 3.2 GB</text>
  <rect x="264" y="490" width="200" height="30" rx="8" fill="#512DA8" opacity="0.8"/>
  <text x="364" y="511" font-family="Arial, sans-serif" font-size="22" fill="#EDE7F6" text-anchor="middle">레지스트리 47개</text>
  <!-- Monitor stand -->
  <rect x="472" y="640" width="80" height="60" rx="8" fill="#455A64"/>
  <rect x="412" y="700" width="200" height="24" rx="8" fill="#37474F"/>
  <!-- Broom sweeping away from bottom right -->
  <rect x="660" y="560" width="32" height="280" rx="16" fill="#8D6E63" transform="rotate(-30 676 700)"/>
  <rect x="564" y="720" width="200" height="72" rx="12" fill="#795548" transform="rotate(-30 664 756)"/>
  <!-- Broom bristle lines -->
  <line x1="545" y1="790" x2="515" y2="870" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <line x1="575" y1="800" x2="555" y2="880" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <line x1="605" y1="808" x2="593" y2="888" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <!-- Layer 3: Gold star badge -->
  <path d="M840 200 L852 236 L890 236 L860 256 L872 292 L840 272 L808 292 L820 256 L790 236 L828 236 Z" fill="#FFD600" opacity="0.95"/>
</svg>
