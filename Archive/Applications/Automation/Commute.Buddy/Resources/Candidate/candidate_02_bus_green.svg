<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="bus" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Road -->
  <rect x="60" y="340" width="392" height="60" rx="10" fill="#388E3C" opacity="0.5"/>
  <line x1="60" y1="370" x2="452" y2="370" stroke="white" stroke-width="4" stroke-dasharray="24,16"/>
  <!-- Bus body -->
  <rect x="90" y="200" width="332" height="160" rx="22" fill="url(#bus)" stroke="#1B5E20" stroke-width="5"/>
  <!-- Bus front/roof -->
  <rect x="90" y="200" width="332" height="44" rx="22" fill="#43A047"/>
  <!-- Destination sign -->
  <rect x="130" y="206" width="200" height="28" rx="6" fill="#1B5E20"/>
  <text x="230" y="225" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="15" fill="#69F0AE">CITY CENTER</text>
  <!-- Windows -->
  <rect x="108" y="256" width="72" height="52" rx="8" fill="#B3E5FC" stroke="#43A047" stroke-width="2"/>
  <rect x="200" y="256" width="72" height="52" rx="8" fill="#B3E5FC" stroke="#43A047" stroke-width="2"/>
  <rect x="292" y="256" width="72" height="52" rx="8" fill="#B3E5FC" stroke="#43A047" stroke-width="2"/>
  <!-- Door -->
  <rect x="366" y="256" width="44" height="88" rx="8" fill="#DCEDC8" stroke="#43A047" stroke-width="2"/>
  <line x1="388" y1="256" x2="388" y2="344" stroke="#43A047" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="160" cy="356" r="36" fill="#1B5E20" stroke="#A5D6A7" stroke-width="4"/>
  <circle cx="160" cy="356" r="20" fill="#388E3C" stroke="#A5D6A7" stroke-width="2"/>
  <circle cx="352" cy="356" r="36" fill="#1B5E20" stroke="#A5D6A7" stroke-width="4"/>
  <circle cx="352" cy="356" r="20" fill="#388E3C" stroke="#A5D6A7" stroke-width="2"/>
  <!-- Clock icon top right -->
  <circle cx="390" cy="160" r="40" fill="#1B5E20" stroke="white" stroke-width="4"/>
  <circle cx="390" cy="160" r="32" fill="#2E7D32"/>
  <line x1="390" y1="140" x2="390" y2="160" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="390" y1="160" x2="406" y2="172" stroke="#69F0AE" stroke-width="4" stroke-linecap="round"/>
</svg>
