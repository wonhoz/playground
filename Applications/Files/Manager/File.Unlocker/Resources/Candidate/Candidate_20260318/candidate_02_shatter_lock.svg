<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#130900"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shatterGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폭발 충격파 -->
  <circle cx="256" cy="280" r="140" fill="#F59E0B" opacity="0.05" filter="url(#shatterGlow)"/>
  <circle cx="256" cy="280" r="100" fill="#FBBF24" opacity="0.06" filter="url(#glow)"/>
  <!-- 파편들 (자물쇠 조각들) -->
  <polygon points="180,240 210,220 225,260 195,270" fill="url(#lockGrad)" opacity="0.85" filter="url(#glow)"/>
  <polygon points="290,195 320,180 335,225 300,230" fill="#FBBF24" opacity="0.8" filter="url(#glow)"/>
  <polygon points="310,290 345,275 350,320 318,325" fill="url(#lockGrad)" opacity="0.85" filter="url(#glow)"/>
  <polygon points="155,310 185,295 195,340 160,345" fill="#FCD34D" opacity="0.75" filter="url(#glow)"/>
  <polygon points="360,230 390,215 400,250 372,258" fill="#F59E0B" opacity="0.8" filter="url(#glow)"/>
  <polygon points="145,200 170,188 178,220 150,225" fill="#FBBF24" opacity="0.7"/>
  <polygon points="365,335 395,322 402,360 370,365" fill="url(#lockGrad)" opacity="0.75"/>
  <!-- 작은 파편들 -->
  <rect x="240" y="180" width="12" height="8" rx="2" fill="#FCD34D" opacity="0.8" transform="rotate(25 246 184)"/>
  <rect x="385" y="290" width="10" height="7" rx="2" fill="#F59E0B" opacity="0.7" transform="rotate(-20 390 293)"/>
  <rect x="130" y="350" width="10" height="6" rx="2" fill="#FBBF24" opacity="0.65" transform="rotate(40 135 353)"/>
  <rect x="270" y="390" width="11" height="7" rx="2" fill="#FCD34D" opacity="0.7" transform="rotate(-30 275 393)"/>
  <!-- 중앙 폭발 핵 -->
  <circle cx="256" cy="280" r="35" fill="#F59E0B" opacity="0.85" filter="url(#shatterGlow)"/>
  <circle cx="256" cy="280" r="22" fill="#FCD34D" opacity="1" filter="url(#glow)"/>
  <!-- 폭발선 -->
  <line x1="256" y1="245" x2="256" y2="215" stroke="#FCD34D" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="256" y1="315" x2="256" y2="345" stroke="#F59E0B" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="221" y1="280" x2="191" y2="280" stroke="#FBBF24" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="291" y1="280" x2="321" y2="280" stroke="#FBBF24" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="232" y1="256" x2="212" y2="236" stroke="#FCD34D" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="256" x2="300" y2="236" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <!-- 열쇠 구멍 조각 (중앙) -->
  <circle cx="256" cy="276" r="8" fill="#92400E" opacity="0.9"/>
  <rect x="250" y="278" width="12" height="14" rx="3" fill="#92400E" opacity="0.9"/>
  <!-- 자물쇠 고리 파편 -->
  <path d="M 218,240 Q 218,200 256,200" fill="none" stroke="#FBBF24" stroke-width="14" opacity="0.7" stroke-linecap="round"/>
  <path d="M 294,240 Q 294,200 256,200" fill="none" stroke="#F59E0B" stroke-width="14" opacity="0.6" stroke-linecap="round"/>
  <!-- 파열 텍스트 -->
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="#F59E0B" opacity="0.7" font-weight="bold">SHATTERED</text>
</svg>