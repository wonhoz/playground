<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d4a"/>
      <stop offset="100%" stop-color="#1a1a33"/>
    </linearGradient>
    <linearGradient id="hotspot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- CPU pins left -->
  <line x1="100" y1="176" x2="140" y2="176" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="206" x2="140" y2="206" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="236" x2="140" y2="236" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="266" x2="140" y2="266" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="296" x2="140" y2="296" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="326" x2="140" y2="326" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <!-- CPU pins right -->
  <line x1="372" y1="176" x2="412" y2="176" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="372" y1="206" x2="412" y2="206" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="372" y1="236" x2="412" y2="236" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="372" y1="266" x2="412" y2="266" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="372" y1="296" x2="412" y2="296" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="372" y1="326" x2="412" y2="326" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <!-- CPU pins top -->
  <line x1="176" y1="100" x2="176" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="206" y1="100" x2="206" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="236" y1="100" x2="236" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="266" y1="100" x2="266" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="296" y1="100" x2="296" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="326" y1="100" x2="326" y2="140" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <!-- CPU pins bottom -->
  <line x1="176" y1="372" x2="176" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="206" y1="372" x2="206" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="236" y1="372" x2="236" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="266" y1="372" x2="266" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="296" y1="372" x2="296" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="326" y1="372" x2="326" y2="412" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Chip body -->
  <rect x="140" y="140" width="232" height="232" rx="12" fill="url(#chip)" stroke="#00d4ff" stroke-width="3"/>
  <!-- Core blocks with heat color -->
  <rect x="160" y="160" width="92" height="92" rx="6" fill="url(#hotspot)" opacity="0.7"/>
  <rect x="260" y="160" width="92" height="92" rx="6" fill="#ff8c00" opacity="0.5"/>
  <rect x="160" y="260" width="92" height="92" rx="6" fill="#ff8c00" opacity="0.4"/>
  <rect x="260" y="260" width="92" height="92" rx="6" fill="#ffd700" opacity="0.4"/>
  <!-- Performance percentage labels -->
  <text x="206" y="210" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">92%</text>
  <text x="306" y="210" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">78%</text>
  <text x="206" y="310" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">65%</text>
  <text x="306" y="310" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">41%</text>
</svg>
