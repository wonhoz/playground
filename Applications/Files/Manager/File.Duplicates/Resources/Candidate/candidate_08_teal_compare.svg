<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a35"/>
      <stop offset="100%" stop-color="#0d2e29"/>
    </linearGradient>
    <linearGradient id="matchBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1de9b6"/>
      <stop offset="100%" stop-color="#00bfa5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Compare panels -->
  <rect x="50" y="100" width="180" height="310" rx="14" fill="url(#panel)" stroke="#1de9b6" stroke-width="1.5"/>
  <rect x="282" y="100" width="180" height="310" rx="14" fill="url(#panel)" stroke="#1de9b6" stroke-width="1.5"/>
  <!-- Panel headers -->
  <rect x="50" y="100" width="180" height="40" rx="14" fill="#1de9b6" opacity="0.2"/>
  <rect x="50" y="128" width="180" height="12" fill="#1de9b6" opacity="0.2"/>
  <text x="140" y="126" font-family="Arial" font-size="14" font-weight="bold" fill="#1de9b6" text-anchor="middle">file_a.pdf</text>
  <rect x="282" y="100" width="180" height="40" rx="14" fill="#ff5252" opacity="0.2"/>
  <rect x="282" y="128" width="180" height="12" fill="#ff5252" opacity="0.2"/>
  <text x="372" y="126" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8a80" text-anchor="middle">file_b.pdf</text>
  <!-- File content lines (left) -->
  <rect x="68" y="158" width="144" height="8" rx="4" fill="#1de9b6" opacity="0.4"/>
  <rect x="68" y="174" width="120" height="8" rx="4" fill="#1de9b6" opacity="0.35"/>
  <rect x="68" y="190" width="135" height="8" rx="4" fill="#1de9b6" opacity="0.3"/>
  <rect x="68" y="215" width="144" height="8" rx="4" fill="#ff5252" opacity="0.6"/>
  <rect x="68" y="231" width="110" height="8" rx="4" fill="#1de9b6" opacity="0.3"/>
  <!-- File content lines (right) -->
  <rect x="300" y="158" width="144" height="8" rx="4" fill="#1de9b6" opacity="0.4"/>
  <rect x="300" y="174" width="120" height="8" rx="4" fill="#1de9b6" opacity="0.35"/>
  <rect x="300" y="190" width="135" height="8" rx="4" fill="#1de9b6" opacity="0.3"/>
  <rect x="300" y="215" width="144" height="8" rx="4" fill="#ff5252" opacity="0.6"/>
  <rect x="300" y="231" width="110" height="8" rx="4" fill="#1de9b6" opacity="0.3"/>
  <!-- Match percentage bar -->
  <rect x="68" y="260" width="144" height="18" rx="9" fill="#0a2520"/>
  <rect x="68" y="260" width="130" height="18" rx="9" fill="url(#matchBar)"/>
  <text x="140" y="273" font-family="Arial" font-size="11" font-weight="bold" fill="#004d40" text-anchor="middle">98.5%</text>
  <rect x="300" y="260" width="144" height="18" rx="9" fill="#0a2520"/>
  <rect x="300" y="260" width="130" height="18" rx="9" fill="url(#matchBar)"/>
  <text x="372" y="273" font-family="Arial" font-size="11" font-weight="bold" fill="#004d40" text-anchor="middle">98.5%</text>
  <!-- Equal sign center -->
  <rect x="238" y="242" width="36" height="10" rx="5" fill="#1de9b6"/>
  <rect x="238" y="260" width="36" height="10" rx="5" fill="#1de9b6"/>
  <!-- Action buttons -->
  <rect x="68" y="360" width="144" height="32" rx="8" fill="#00695c"/>
  <text x="140" y="381" font-family="Arial" font-size="13" font-weight="bold" fill="#1de9b6" text-anchor="middle">KEEP</text>
  <rect x="300" y="360" width="144" height="32" rx="8" fill="#b71c1c"/>
  <text x="372" y="381" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8a80" text-anchor="middle">DELETE</text>
  <!-- Size info -->
  <text x="140" y="422" font-family="Arial" font-size="12" fill="#1de9b6" text-anchor="middle" opacity="0.7">2.4 MB</text>
  <text x="372" y="422" font-family="Arial" font-size="12" fill="#ff8a80" text-anchor="middle" opacity="0.7">2.4 MB</text>
</svg>
