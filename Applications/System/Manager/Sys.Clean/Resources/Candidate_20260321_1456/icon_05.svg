<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A3A"/>
      <stop offset="100%" stop-color="#162030"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background – dark slate -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <g clip-path="url(#clip05)">
    <!-- Layer 2: 4 section tiles (2x2 grid) -->
    <!-- Tile 1: Cleaner (top-left) -->
    <rect x="100" y="100" width="380" height="380" rx="24" fill="#1E3A2E"/>
    <!-- Broom icon inside tile 1 -->
    <rect x="220" y="150" width="20" height="220" rx="10" fill="#FFFFFF" transform="rotate(-20 230 260)"/>
    <ellipse cx="265" cy="350" rx="70" ry="24" fill="#4FC3F7" transform="rotate(-20 265 350)"/>
    <text x="148" y="440" font-family="Arial, sans-serif" font-size="28" fill="#4FC3F7" font-weight="bold">Cleaner</text>

    <!-- Tile 2: Registry (top-right) -->
    <rect x="544" y="100" width="380" height="380" rx="24" fill="#1E2A4A"/>
    <!-- Registry key icon (folder tree lines) -->
    <line x1="610" y1="160" x2="610" y2="360" stroke="#818CF8" stroke-width="8"/>
    <line x1="610" y1="200" x2="680" y2="200" stroke="#818CF8" stroke-width="8"/>
    <line x1="610" y1="250" x2="680" y2="250" stroke="#818CF8" stroke-width="8"/>
    <line x1="610" y1="300" x2="680" y2="300" stroke="#818CF8" stroke-width="8"/>
    <rect x="680" y="186" width="140" height="28" rx="6" fill="#818CF8"/>
    <rect x="680" y="236" width="120" height="28" rx="6" fill="#818CF8" opacity="0.7"/>
    <rect x="680" y="286" width="100" height="28" rx="6" fill="#818CF8" opacity="0.5"/>
    <text x="590" y="440" font-family="Arial, sans-serif" font-size="28" fill="#818CF8" font-weight="bold">Registry</text>

    <!-- Tile 3: Startup (bottom-left) -->
    <rect x="100" y="544" width="380" height="380" rx="24" fill="#2A1E3A"/>
    <!-- Lightning bolt (startup) -->
    <path d="M280,590 L230,720 L270,720 L220,880 L320,680 L280,680 L330,590 Z" fill="#A78BFA"/>
    <text x="142" y="890" font-family="Arial, sans-serif" font-size="28" fill="#A78BFA" font-weight="bold">Startup</text>

    <!-- Tile 4: Programs (bottom-right) -->
    <rect x="544" y="544" width="380" height="380" rx="24" fill="#2A2A1E"/>
    <!-- Grid of app icons -->
    <rect x="600" y="600" width="70" height="70" rx="12" fill="#22C55E"/>
    <rect x="690" y="600" width="70" height="70" rx="12" fill="#F97316"/>
    <rect x="780" y="600" width="70" height="70" rx="12" fill="#3B82F6"/>
    <rect x="600" y="690" width="70" height="70" rx="12" fill="#EF4444"/>
    <rect x="690" y="690" width="70" height="70" rx="12" fill="#8B5CF6"/>
    <rect x="780" y="690" width="70" height="70" rx="12" fill="#06B6D4"/>
    <rect x="600" y="780" width="70" height="70" rx="12" fill="#F59E0B"/>
    <rect x="690" y="780" width="70" height="70" rx="12" fill="#EC4899"/>
    <!-- Minus/remove icon on last tile -->
    <rect x="780" y="780" width="70" height="70" rx="12" fill="#374151"/>
    <rect x="798" y="809" width="34" height="12" rx="6" fill="#EF4444"/>
    <text x="580" y="890" font-family="Arial, sans-serif" font-size="28" fill="#22C55E" font-weight="bold">Programs</text>

    <!-- Layer 3: Corner accent glow dots -->
    <circle cx="512" cy="512" r="16" fill="#4FC3F7" opacity="0.4"/>
  </g>
</svg>
