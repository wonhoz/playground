<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 카메라 본체 -->
  <rect x="80" y="180" width="280" height="180" rx="16" fill="#EF4444" opacity="0.07"/>
  <rect x="80" y="180" width="280" height="180" rx="16" fill="none" stroke="#EF4444" stroke-width="3" filter="url(#glow)"/>
  <!-- 렌즈 -->
  <circle cx="210" cy="270" r="60" fill="#EF4444" opacity="0.08" filter="url(#glow)"/>
  <circle cx="210" cy="270" r="60" fill="none" stroke="#EF4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="210" cy="270" r="40" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.5"/>
  <circle cx="210" cy="270" r="22" fill="#EF4444" opacity="0.3" filter="url(#glow)"/>
  <!-- 뷰파인더 -->
  <rect x="310" y="200" width="50" height="30" rx="4" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <!-- REC 표시등 -->
  <circle cx="330" cy="170" r="10" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">CRIMSON CAMERA</text>
</svg>
