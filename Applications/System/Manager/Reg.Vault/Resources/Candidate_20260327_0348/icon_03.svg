<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright lavender purple -->
  <rect width="1024" height="1024" rx="190" fill="#A29BFE"/>

  <!-- Layer 2: Large key shape -->
  <!-- Key bow (big circle, left side) -->
  <circle cx="356" cy="460" r="240" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="22"/>
  <!-- Inner hole of key bow -->
  <circle cx="356" cy="460" r="120" fill="#A29BFE" stroke="#6C5CE7" stroke-width="18"/>

  <!-- Key blade (extending right) -->
  <rect x="556" y="420" width="380" height="80" rx="18" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="18"/>

  <!-- Key teeth (3 notches, simple and large) -->
  <rect x="660" y="500" width="58" height="80" rx="12" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="14"/>
  <rect x="760" y="500" width="58" height="80" rx="12" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="14"/>
  <rect x="860" y="500" width="56" height="58" rx="12" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="14"/>

  <!-- Layer 3: "REG" text inside key bow -->
  <text x="356" y="420" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="96" font-weight="900" fill="#6C5CE7">REG</text>
  <text x="356" y="500" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="52" font-weight="700" fill="#6C5CE7">VAULT</text>

  <!-- Decorative sparkles -->
  <circle cx="820" cy="220" r="28" fill="#FFEAA7" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="900" cy="280" r="18" fill="#FD79A8" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="760" cy="160" r="16" fill="#00CEC9" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="148" cy="220" r="22" fill="#FFEAA7" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="148" cy="740" r="18" fill="#FD79A8" stroke="#FFFFFF" stroke-width="6"/>
</svg>
