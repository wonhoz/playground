<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 천 (어두운) -->
  <rect x="90" y="165" width="332" height="170" rx="12" fill="#424242" stroke="#616161" stroke-width="2"/>
  <!-- 질감 줄 -->
  <line x1="90" y1="195" x2="422" y2="195" stroke="#757575" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="90" y1="225" x2="422" y2="225" stroke="#757575" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="90" y1="285" x2="422" y2="285" stroke="#757575" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="90" y1="315" x2="422" y2="315" stroke="#757575" stroke-width="1" stroke-opacity="0.5"/>
  <!-- 절단 빛줄기 -->
  <line x1="90" y1="250" x2="422" y2="250" stroke="#FF6F00" stroke-width="4" filter="url(#glow)"/>
  <!-- 가위 -->
  <circle cx="340" cy="225" r="19" fill="none" stroke="#FF8F00" stroke-width="4" filter="url(#glow)"/>
  <circle cx="340" cy="275" r="19" fill="none" stroke="#FF8F00" stroke-width="4" filter="url(#glow)"/>
  <line x1="354" y1="234" x2="420" y2="182" stroke="#FFB300" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="354" y1="266" x2="420" y2="318" stroke="#FFB300" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
</svg>
