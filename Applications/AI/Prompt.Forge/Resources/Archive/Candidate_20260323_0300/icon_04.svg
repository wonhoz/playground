  <rect x="760" y="215" width="170" height="46" rx="23" fill="#DC2626" opacity="0.8"/>
  <text x="845" y="245" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">📊 분석</text>
  <rect x="170" y="306" width="200" height="46" rx="23" fill="#EA580C" opacity="0.8"/>
