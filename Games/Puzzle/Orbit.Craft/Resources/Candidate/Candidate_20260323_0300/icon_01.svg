<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbit.Craft | 탐사선 궤도 곡선 | 대각선/동적 | #050A20 -->
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <filter id="probeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background - deep space -->
  <rect width="1024" height="1024" rx="160" fill="#050A20"/>
  <!-- Stars -->
  <circle cx="180" cy="200" r="2" fill="white" opacity="0.6"/>
  <circle cx="400" cy="160" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="220" r="2" fill="white" opacity="0.7"/>
  <circle cx="880" cy="380" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="150" cy="600" r="2" fill="white" opacity="0.6"/>
  <circle cx="900" cy="700" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="600" cy="850" r="2" fill="white" opacity="0.4"/>
  <!-- Layer 2: Sun/star (gravity center) -->
  <circle cx="260" cy="700" r="90" fill="url(#sunGlow)"/>
  <!-- Orbit path (elliptical, dashed) -->
  <ellipse cx="480" cy="580" rx="360" ry="240" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="20,12" opacity="0.4"/>
  <!-- Target planet -->
  <circle cx="760" cy="380" r="60" fill="url(#planetGrad)" stroke="#93C5FD" stroke-width="4"/>
  <!-- Target ring -->
  <ellipse cx="760" cy="380" rx="90" ry="22" fill="none" stroke="#60A5FA" stroke-width="3" opacity="0.6"/>
  <!-- Probe trajectory (curved path) -->
  <path d="M260 700 Q380 300 760 380" fill="none" stroke="#00FFCC" stroke-width="4" stroke-linecap="round" filter="url(#probeGlow)"/>
  <!-- Probe -->
  <polygon points="750,340 770,360 750,380 730,360" fill="#00FFCC" filter="url(#probeGlow)"/>
  <!-- Gravity lines from sun -->
  <path d="M260 700 Q340 620 420 590" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3" stroke-dasharray="8,6"/>
  <!-- Layer 3: Destination marker -->
  <circle cx="760" cy="380" r="80" fill="none" stroke="#4ADE80" stroke-width="3" stroke-dasharray="12,8" opacity="0.7"/>
  <text x="760" y="320" font-family="Arial,sans-serif" font-size="18" fill="#4ADE80" text-anchor="middle">목표</text>
</svg>
