  <circle cx="256" cy="256" r="40" fill="none" stroke="#E9D5FF" stroke-width="2" opacity="0.6"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="16" fill="#4C1D95"/>
  <text x="256" y="260" text-anchor="middle" font-family="serif" font-size="14" fill="#DDD6FE">文</text>
  <!-- Inner ring scripts (8 directions) -->
  <text x="256" y="220" text-anchor="middle" font-family="serif" font-size="14" fill="#C084FC">語</text>
  <text x="285" y="228" font-family="serif" font-size="12" fill="#A855F7">A</text>
  <text x="294" y="258" font-family="serif" font-size="14" fill="#C084FC">α</text>
  <text x="284" y="288" font-family="serif" font-size="12" fill="#A855F7">あ</text>
  <text x="256" y="298" text-anchor="middle" font-family="serif" font-size="13" fill="#C084FC">ا</text>
  <text x="222" y="288" font-family="serif" font-size="12" fill="#A855F7">가</text>
  <text x="214" y="258" font-family="serif" font-size="14" fill="#C084FC">Я</text>
  <text x="222" y="228" font-family="serif" font-size="12" fill="#A855F7">ก</text>
  <!-- Middle ring (locale codes) -->
  <text x="256" y="102" text-anchor="middle" font-family="monospace" font-size="10" fill="#9333EA">en-US</text>
  <text x="370" y="152" font-family="monospace" font-size="10" fill="#9333EA">ja-JP</text>
  <text x="398" y="264" font-family="monospace" font-size="10" fill="#9333EA">zh-CN</text>
  <text x="370" y="376" font-family="monospace" font-size="10" fill="#9333EA">ar-SA</text>
  <text x="230" y="416" text-anchor="middle" font-family="monospace" font-size="10" fill="#9333EA">ko-KR</text>
  <text x="88" y="376" font-family="monospace" font-size="10" fill="#9333EA">de-DE</text>
  <text x="72" y="264" font-family="monospace" font-size="10" fill="#9333EA">fr-FR</text>
  <text x="88" y="152" font-family="monospace" font-size="10" fill="#9333EA">ru-RU</text>
  <!-- Decorative petals -->
  <ellipse cx="256" cy="192" rx="12" ry="28" fill="#4C1D95" opacity="0.4"/>
  <ellipse cx="256" cy="192" rx="12" ry="28" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5"/>
  <ellipse cx="256" cy="320" rx="12" ry="28" fill="#4C1D95" opacity="0.4"/>
