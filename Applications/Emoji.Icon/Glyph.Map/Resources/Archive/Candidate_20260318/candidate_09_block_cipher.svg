<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 블록 코드 패턴 (문자 블록들) -->
  <rect x="100" y="130" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="180" y="130" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.08" stroke="#FDE68A" stroke-width="1"/>
  <rect x="260" y="130" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="340" y="130" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.08" stroke="#FDE68A" stroke-width="1"/>
  <rect x="100" y="210" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.08" stroke="#FDE68A" stroke-width="1"/>
  <rect x="180" y="210" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="260" y="210" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.08" stroke="#FDE68A" stroke-width="1"/>
  <rect x="340" y="210" width="64" height="64" rx="6" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="1.5" filter="url(#glow)"/>
  <!-- 블록 내 텍스트 -->
  <text x="132" y="169" text-anchor="middle" fill="#FBBF24" font-size="14" font-family="monospace" font-weight="bold" opacity="0.9">A</text>
  <text x="212" y="169" text-anchor="middle" fill="#FDE68A" font-size="14" font-family="monospace" opacity="0.7">→</text>
  <text x="292" y="169" text-anchor="middle" fill="#FBBF24" font-size="14" font-family="monospace" font-weight="bold" opacity="0.9">😀</text>
  <text x="372" y="169" text-anchor="middle" fill="#FDE68A" font-size="14" font-family="monospace" opacity="0.7">★</text>
  <text x="132" y="249" text-anchor="middle" fill="#FDE68A" font-size="14" font-family="monospace" opacity="0.7">♠</text>
  <text x="212" y="249" text-anchor="middle" fill="#FBBF24" font-size="14" font-family="monospace" font-weight="bold" opacity="0.9">Ω</text>
  <text x="292" y="249" text-anchor="middle" fill="#FDE68A" font-size="14" font-family="monospace" opacity="0.7">⬛</text>
  <text x="372" y="249" text-anchor="middle" fill="#FBBF24" font-size="14" font-family="monospace" font-weight="bold" opacity="0.9">∞</text>
  <!-- 레이블 -->
  <text x="256" y="420" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">BLOCK CIPHER</text>
</svg>
