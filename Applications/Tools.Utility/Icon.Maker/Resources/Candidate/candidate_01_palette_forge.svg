<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0d0500"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil/forge base -->
  <ellipse cx="256" cy="390" rx="100" ry="24" fill="#1a0a00" stroke="#7c2d12" stroke-width="2"/>
  <rect x="196" y="350" width="120" height="44" rx="4" fill="#2d1500" stroke="#7c2d12" stroke-width="1.5"/>
  <rect x="170" y="370" width="172" height="24" rx="4" fill="#3d1e00"/>
  <!-- Anvil top -->
  <rect x="160" y="310" width="192" height="44" rx="8" fill="#3d1e00" stroke="#c2410c" stroke-width="2"/>
  <!-- Sparks -->
  <circle cx="310" cy="275" r="5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="324" cy="260" r="4" fill="#fb923c" opacity="0.8"/>
  <circle cx="295" cy="258" r="3.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="335" cy="280" r="3" fill="#fcd34d" opacity="0.6"/>
  <circle cx="280" cy="268" r="3" fill="#fb923c" opacity="0.6"/>
  <circle cx="348" cy="265" r="2.5" fill="#fbbf24" opacity="0.5"/>
  <!-- Icon being forged (on anvil) -->
  <rect x="210" y="278" width="92" height="92" rx="20" fill="#fbbf24" opacity="0.95"/>
  <rect x="218" y="286" width="76" height="76" rx="16" fill="#d97706"/>
  <!-- Hammer -->
  <rect x="300" y="180" width="40" height="100" rx="8" fill="#5d3209" stroke="#7c2d12" stroke-width="2" transform="rotate(35 320 230)"/>
  <rect x="290" y="172" width="56" height="32" rx="6" fill="#374151" stroke="#4b5563" stroke-width="2" transform="rotate(35 320 230)"/>
  <!-- Color palette -->
  <circle cx="120" cy="200" r="64" fill="#2d1500" stroke="#c2410c" stroke-width="2"/>
  <circle cx="100" cy="185" r="14" fill="#ef4444"/>
  <circle cx="130" cy="172" r="14" fill="#fb923c"/>
  <circle cx="158" cy="178" r="14" fill="#fbbf24"/>
  <circle cx="170" cy="205" r="14" fill="#22c55e"/>
  <circle cx="158" cy="232" r="14" fill="#3b82f6"/>
  <circle cx="130" cy="240" r="14" fill="#a855f7"/>
  <circle cx="100" cy="232" r="12" fill="#ec4899"/>
  <!-- Thumb hole -->
  <circle cx="108" cy="210" r="10" fill="#1a0a00"/>
  <!-- ICO output shape right -->
  <rect x="360" y="160" width="100" height="100" rx="16" fill="#2d1500" stroke="#c2410c" stroke-width="2.5"/>
  <text x="380" y="230" font-family="sans-serif" font-size="42">⚡</text>
  <text x="368" y="280" font-family="monospace" font-size="14" fill="#fb923c">.ico</text>
  <!-- Fire below anvil -->
  <path d="M220 395 Q230 370 240 388 Q250 360 260 385 Q270 365 280 390 Q290 375 300 398 Q280 420 256 420 Q232 420 220 398 Z" fill="url(#fire)" opacity="0.7"/>
  <!-- Title -->
  <text x="60" y="460" font-family="monospace" font-size="18" fill="#fb923c" font-weight="bold">ICON.MAKER</text>
  <text x="60" y="480" font-family="monospace" font-size="12" fill="#7c2d12">ICO Generator · 16/32/48/256px</text>
</svg>
