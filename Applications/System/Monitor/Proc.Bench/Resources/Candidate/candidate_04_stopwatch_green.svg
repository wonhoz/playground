<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001400"/>
      <stop offset="100%" stop-color="#002000"/>
    </linearGradient>
    <linearGradient id="watch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stopwatch body -->
  <circle cx="256" cy="290" r="180" fill="#001E00" stroke="url(#watch)" stroke-width="5"/>
  <circle cx="256" cy="290" r="155" fill="none" stroke="#1B5E20" stroke-width="2"/>
  <!-- Crown/button -->
  <rect x="236" y="106" width="40" height="22" rx="6" fill="url(#watch)"/>
  <rect x="244" y="100" width="24" height="12" rx="4" fill="url(#watch)"/>
  <!-- Lap button (side) -->
  <rect x="424" y="260" width="22" height="16" rx="4" fill="url(#watch)"/>
  <!-- Second markers -->
  <line x1="256" y1="118" x2="256" y2="134" stroke="#00E676" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="446" x2="256" y2="462" stroke="#00E676" stroke-width="3" stroke-linecap="round" transform="rotate(180 256 290)"/>
  <line x1="86" y1="290" x2="102" y2="290" stroke="#00E676" stroke-width="3" stroke-linecap="round"/>
  <line x1="410" y1="290" x2="426" y2="290" stroke="#00E676" stroke-width="3" stroke-linecap="round"/>
  <!-- Minor ticks -->
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(30 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(60 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(120 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(150 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(210 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(240 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(300 256 290)"/>
  <line x1="256" y1="122" x2="256" y2="132" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" transform="rotate(330 256 290)"/>
  <!-- Progress arc (80% of circle) -->
  <path d="M256 130 A160 160 0 1 1 158 466" fill="none" stroke="url(#green)" stroke-width="8" stroke-linecap="round"/>
  <!-- Hands -->
  <!-- Minute hand -->
  <line x1="256" y1="290" x2="256" y2="178" stroke="#69F0AE" stroke-width="5" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="256" y1="290" x2="344" y2="196" stroke="#00E676" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="230" y2="322" stroke="#00E676" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Center -->
  <circle cx="256" cy="290" r="10" fill="url(#green)"/>
  <circle cx="256" cy="290" r="4" fill="#001400"/>
  <!-- Time display -->
  <text x="256" y="380" text-anchor="middle" font-family="Consolas" font-size="22" fill="#69F0AE">00:02.847</text>
</svg>