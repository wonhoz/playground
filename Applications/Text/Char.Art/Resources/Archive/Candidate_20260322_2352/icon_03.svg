<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E0A3C"/>
  <!-- Layer 2: Character density gradient bar -->
  <!-- Dense characters (leftmost = darkest/fullest) -->
  <rect x="120" y="350" width="112" height="280" rx="10" fill="#2D1B5E"/>
  <text x="176" y="440" font-family="Consolas,monospace" font-size="32" fill="#E9D5FF" text-anchor="middle" font-weight="bold">@</text>
  <text x="176" y="480" font-family="Consolas,monospace" font-size="32" fill="#E9D5FF" text-anchor="middle" font-weight="bold">#</text>
  <text x="176" y="520" font-family="Consolas,monospace" font-size="32" fill="#E9D5FF" text-anchor="middle" font-weight="bold">$</text>
  <text x="176" y="560" font-family="Consolas,monospace" font-size="32" fill="#E9D5FF" text-anchor="middle" font-weight="bold">%</text>
  <!-- Medium dense -->
  <rect x="244" y="350" width="112" height="280" rx="10" fill="#3B2070"/>
  <text x="300" y="450" font-family="Consolas,monospace" font-size="32" fill="#C4B5FD" text-anchor="middle">&amp;</text>
  <text x="300" y="490" font-family="Consolas,monospace" font-size="32" fill="#C4B5FD" text-anchor="middle">*</text>
  <text x="300" y="530" font-family="Consolas,monospace" font-size="32" fill="#C4B5FD" text-anchor="middle">+</text>
  <!-- Medium -->
  <rect x="368" y="350" width="112" height="280" rx="10" fill="#4A2880"/>
  <text x="424" y="460" font-family="Consolas,monospace" font-size="32" fill="#A78BFA" text-anchor="middle">=</text>
  <text x="424" y="500" font-family="Consolas,monospace" font-size="32" fill="#A78BFA" text-anchor="middle">-</text>
  <text x="424" y="540" font-family="Consolas,monospace" font-size="32" fill="#A78BFA" text-anchor="middle">~</text>
  <!-- Light medium -->
  <rect x="492" y="350" width="112" height="280" rx="10" fill="#59328F"/>
  <text x="548" y="470" font-family="Consolas,monospace" font-size="32" fill="#8B5CF6" text-anchor="middle">:</text>
  <text x="548" y="510" font-family="Consolas,monospace" font-size="32" fill="#8B5CF6" text-anchor="middle">;</text>
  <text x="548" y="550" font-family="Consolas,monospace" font-size="32" fill="#8B5CF6" text-anchor="middle">!</text>
  <!-- Light -->
  <rect x="616" y="350" width="112" height="280" rx="10" fill="#673A9E"/>
  <text x="672" y="480" font-family="Consolas,monospace" font-size="32" fill="#7C3AED" text-anchor="middle">,</text>
  <text x="672" y="520" font-family="Consolas,monospace" font-size="32" fill="#7C3AED" text-anchor="middle">.</text>
  <!-- Lightest -->
  <rect x="740" y="350" width="112" height="280" rx="10" fill="#7641AC"/>
  <text x="796" y="500" font-family="Consolas,monospace" font-size="32" fill="#6D28D9" text-anchor="middle">`</text>
  <!-- Very light -->
  <rect x="864" y="350" width="112" height="280" rx="10" fill="#8548BA"/>
  <text x="920" y="510" font-family="Consolas,monospace" font-size="32" fill="#4C1D95" text-anchor="middle">&nbsp;</text>
  <!-- Layer 3: Gradient arrow above -->
  <defs>
    <linearGradient id="densGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#2D1B5E"/>
    </linearGradient>
  </defs>
  <rect x="120" y="285" width="858" height="40" rx="8" fill="url(#densGrad)"/>
  <text x="512" y="760" font-family="Consolas,monospace" font-size="26" fill="#C4B5FD" text-anchor="middle" opacity="0.8">밀도: 어두움 ← → 밝음</text>
</svg>