  <!-- Top label area -->
  <rect x="116" y="116" width="280" height="120" rx="8" fill="#dddddd"/>
  <!-- Label lines -->
  <rect x="128" y="128" width="200" height="10" rx="4" fill="#ff6600"/>
  <rect x="128" y="148" width="180" height="8" rx="3" fill="#aaaaaa"/>
  <rect x="128" y="164" width="160" height="8" rx="3" fill="#aaaaaa"/>
  <rect x="128" y="180" width="140" height="8" rx="3" fill="#aaaaaa"/>
  <rect x="128" y="196" width="170" height="8" rx="3" fill="#aaaaaa"/>
  <!-- Window/slot -->
  <rect x="116" y="252" width="280" height="100" rx="8" fill="#111111"/>
  <ellipse cx="186" cy="302" rx="44" ry="44" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <ellipse cx="186" cy="302" rx="28" ry="28" fill="#333333"/>
  <ellipse cx="186" cy="302" rx="14" ry="14" fill="#111111"/>
  <ellipse cx="326" cy="302" rx="44" ry="44" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
