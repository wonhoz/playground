  <circle cx="712" cy="502" r="14" fill="#00BCD4" opacity="0.8"/>
  <circle cx="764" cy="512" r="12" fill="#00BCD4" opacity="0.6"/>
  <circle cx="660" cy="564" r="12" fill="#00BCD4" opacity="0.5"/>
  <circle cx="712" cy="574" r="12" fill="#00BCD4" opacity="0.5"/>
