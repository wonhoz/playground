<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_01: literal | 헥스 그리드 (3x4) FF D8 FF E0 같은 값들 | 기하학 추상 | 다크 네이비 + 사이언 + 오렌지 하이라이트 -->
  <defs>
    <linearGradient id="bgNav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1B3A"/>
      <stop offset="100%" stop-color="#0A1128"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 다크 네이비 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgNav)"/>

  <!-- 배경 미세 격자선 -->
  <line x1="512" y1="80" x2="512" y2="944" stroke="#1A2A50" stroke-width="2"/>
  <line x1="80" y1="512" x2="944" y2="512" stroke="#1A2A50" stroke-width="2"/>

  <!-- Layer 2: 오프셋 컬럼 -->
  <rect x="80" y="160" width="180" height="640" rx="12" fill="#0D1F40"/>
  <text x="170" y="290" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0000</text>
  <text x="170" y="390" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0010</text>
  <text x="170" y="490" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0020</text>
  <text x="170" y="590" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0030</text>
  <text x="170" y="690" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0040</text>
  <text x="170" y="790" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="38" fill="#405A8A">0050</text>

  <!-- Layer 3: 헥스 값 그리드 (3열 6행) -->
  <!-- 행 1 - 오렌지 하이라이트 (선택됨) -->
  <rect x="278" y="258" width="664" height="68" rx="8" fill="#FF8C00" opacity="0.25"/>
  <text x="370" y="292" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#FFB347">FF</text>
  <text x="510" y="292" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#FFB347">D8</text>
  <text x="650" y="292" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#FFB347">FF</text>
  <text x="800" y="292" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#FFD700">E0</text>

  <!-- 행 2 -->
  <text x="370" y="392" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#00E5FF">00</text>
  <text x="510" y="392" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#00E5FF">10</text>
  <text x="650" y="392" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#00E5FF">4A</text>
  <text x="800" y="392" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" font-weight="bold" fill="#00E5FF">46</text>

  <!-- 행 3 -->
  <text x="370" y="492" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#4DD0E1">49</text>
  <text x="510" y="492" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#4DD0E1">46</text>
  <text x="650" y="492" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#4DD0E1">00</text>
  <text x="800" y="492" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#4DD0E1">01</text>

  <!-- 행 4 -->
  <text x="370" y="592" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#26C6DA">3C</text>
  <text x="510" y="592" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#26C6DA">7F</text>
  <text x="650" y="592" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#26C6DA">A2</text>
  <text x="800" y="592" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#26C6DA">B8</text>

  <!-- 행 5 -->
  <text x="370" y="692" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#1BA8B8" opacity="0.8">E7</text>
  <text x="510" y="692" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#1BA8B8" opacity="0.8">02</text>
  <text x="650" y="692" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#1BA8B8" opacity="0.8">55</text>
  <text x="800" y="692" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#1BA8B8" opacity="0.8">C3</text>

  <!-- 행 6 희미 -->
  <text x="370" y="792" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#0D7A88" opacity="0.5">8A</text>
  <text x="510" y="792" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#0D7A88" opacity="0.5">1F</text>
  <text x="650" y="792" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#0D7A88" opacity="0.5">D4</text>
  <text x="800" y="792" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="52" fill="#0D7A88" opacity="0.5">09</text>
</svg>
