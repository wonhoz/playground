<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Anvil body -->
  <rect x="100" y="300" width="312" height="100" rx="12" fill="url(#anvil)" stroke="#bdbdbd" stroke-width="4"/>
  <!-- Anvil top -->
  <path d="M120 220 L150 300 L362 300 L392 220 Q392 190 360 190 L280 190 L270 160 L180 160 L160 190 L152 190 Q120 190 120 220 Z" fill="url(#anvil)" stroke="#bdbdbd" stroke-width="4"/>
  <!-- Forging sparks -->
  <circle cx="256" cy="150" r="7" fill="#ffd740"/>
  <circle cx="240" cy="130" r="5" fill="#ff6d00"/>
  <circle cx="272" cy="125" r="6" fill="#ffd740"/>
  <circle cx="226" cy="148" r="4" fill="#ff6d00"/>
  <circle cx="285" cy="142" r="5" fill="#ffd740"/>
  <!-- i18n text on anvil -->
  <text x="256" y="265" font-family="monospace" font-size="44" font-weight="bold" fill="#e0e0e0" text-anchor="middle">i18n</text>
  <!-- L10n below -->
  <text x="256" y="348" font-family="monospace" font-size="32" fill="#bdbdbd" text-anchor="middle">l10n</text>
  <!-- Hammer striking -->
  <rect x="290" y="90" width="100" height="56" rx="10" fill="#ff8f00" stroke="#ffc107" stroke-width="3"/>
  <rect x="326" y="140" width="28" height="60" rx="8" fill="#795548"/>
</svg>
