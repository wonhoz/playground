<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Diamond tag shape + music note (premium tagging) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#100800"/>
  <!-- Diamond/price-tag shape -->
  <path d="M512 160 L820 512 L512 864 L204 512 Z" fill="#1A1000" stroke="#FFC107" stroke-width="28"/>
  <!-- Inner diamond -->
  <path d="M512 240 L756 512 L512 784 L268 512 Z" fill="none" stroke="#FFC107" stroke-width="12" opacity="0.4"/>
  <!-- Music note centered -->
  <rect x="482" y="330" width="36" height="240" rx="10" fill="#FFC107"/>
  <ellipse cx="462" cy="570" rx="70" ry="50" fill="#FFC107" transform="rotate(-15, 462, 570)"/>
  <path d="M518 330 L630 298 L630 336 L518 368 Z" fill="#FFC107"/>
  <!-- Shine lines top-left -->
  <line x1="310" y1="360" x2="360" y2="310" stroke="#FFE57F" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="340" y1="400" x2="380" y2="360" stroke="#FFE57F" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
</svg>
