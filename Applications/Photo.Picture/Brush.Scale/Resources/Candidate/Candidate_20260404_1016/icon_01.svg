<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="cardLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <linearGradient id="cardRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <filter id="sh01">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 1: Bright sky-blue background -->
  <rect width="1024" height="1024" rx="190" fill="#42A5F5"/>
  <rect x="16" y="16" width="992" height="992" rx="178" fill="url(#bg01)"/>

  <!-- Layer 2: Before card (left, blurry/gray) -->
  <rect x="90" y="310" width="340" height="340" rx="24" fill="url(#cardLeft)" filter="url(#sh01)"/>
  <!-- Blurry pixel blocks inside left card -->
  <rect x="110" y="330" width="60" height="60" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <rect x="178" y="330" width="60" height="60" rx="4" fill="#90A4AE" opacity="0.9"/>
  <rect x="246" y="330" width="60" height="60" rx="4" fill="#78909C" opacity="0.9"/>
  <rect x="314" y="330" width="96" height="60" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <rect x="110" y="398" width="80" height="60" rx="4" fill="#78909C" opacity="0.9"/>
  <rect x="198" y="398" width="60" height="60" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <rect x="266" y="398" width="80" height="60" rx="4" fill="#90A4AE" opacity="0.9"/>
  <rect x="110" y="466" width="60" height="60" rx="4" fill="#90A4AE" opacity="0.9"/>
  <rect x="178" y="466" width="80" height="60" rx="4" fill="#78909C" opacity="0.9"/>
  <rect x="266" y="466" width="60" height="60" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <rect x="334" y="466" width="76" height="60" rx="4" fill="#90A4AE" opacity="0.9"/>
  <rect x="110" y="534" width="60" height="96" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <rect x="178" y="534" width="60" height="96" rx="4" fill="#90A4AE" opacity="0.9"/>
  <rect x="246" y="534" width="80" height="96" rx="4" fill="#78909C" opacity="0.9"/>
  <rect x="334" y="534" width="76" height="96" rx="4" fill="#B0BEC5" opacity="0.9"/>
  <!-- "LOW" label on left card -->
  <text x="260" y="672" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700"
        fill="#546E7A" text-anchor="middle" dominant-baseline="middle">LOW</text>

  <!-- Arrow -->
  <line x1="458" y1="480" x2="560" y2="480" stroke="#1976D2" stroke-width="48" stroke-linecap="round"/>
  <polygon points="580,480 536,448 536,512" fill="#1976D2"/>

  <!-- Layer 2: After card (right, sharp/colorful) -->
  <rect x="594" y="310" width="340" height="340" rx="24" fill="url(#cardRight)" filter="url(#sh01)"/>
  <!-- Sharp colorful image inside right card -->
  <!-- Sky gradient strip -->
  <rect x="614" y="330" width="300" height="80" rx="8" fill="#64B5F6"/>
  <!-- Sun -->
  <circle cx="870" cy="370" r="30" fill="#FFD54F"/>
  <!-- Green hill -->
  <ellipse cx="700" cy="460" rx="130" ry="70" fill="#66BB6A"/>
  <ellipse cx="840" cy="490" rx="80" ry="50" fill="#4CAF50"/>
  <!-- Ground -->
  <rect x="614" y="530" width="300" height="100" rx="0" fill="#8D6E63"/>
  <rect x="614" y="600" width="300" height="30" rx="0" fill="#795548"/>
  <clipPath id="cardClip">
    <rect x="614" y="330" width="300" height="300" rx="8"/>
  </clipPath>
  <!-- "HIGH" label on right card -->
  <text x="764" y="672" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700"
        fill="#2E7D32" text-anchor="middle" dominant-baseline="middle">HIGH</text>

  <!-- Layer 3: Resolution info chips -->
  <rect x="110" y="270" width="180" height="44" rx="22" fill="#78909C"/>
  <text x="200" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle">128 × 128</text>

  <rect x="630" y="270" width="200" height="44" rx="22" fill="#388E3C"/>
  <text x="730" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle">512 × 512</text>

  <!-- Title -->
  <text x="512" y="730" font-family="'Segoe UI', Arial, sans-serif" font-size="68" font-weight="900"
        fill="#0D47A1" text-anchor="middle" dominant-baseline="middle">AI 업스케일</text>
</svg>
