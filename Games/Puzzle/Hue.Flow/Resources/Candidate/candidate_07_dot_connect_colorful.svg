<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1f1235"/>
      <stop offset="100%" style="stop-color:#0d0718"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dotglow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Colorful connecting lines (bezier curves) -->
  <path d="M120,120 Q256,80 380,200" stroke="#f72585" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M380,200 Q440,300 380,400" stroke="#7209b7" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M120,400 Q180,256 380,400" stroke="#3a0ca3" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M120,120 Q80,256 120,400" stroke="#4361ee" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M120,120 Q180,200 256,256" stroke="#4cc9f0" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M380,200 Q310,256 256,256" stroke="#f72585" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M120,400 Q180,330 256,256" stroke="#4361ee" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <path d="M380,400 Q310,330 256,256" stroke="#7209b7" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <!-- Large endpoint dots -->
  <circle cx="120" cy="120" r="22" fill="#f72585" filter="url(#dotglow)"/>
  <circle cx="380" cy="200" r="22" fill="#4cc9f0" filter="url(#dotglow)"/>
  <circle cx="120" cy="400" r="22" fill="#4361ee" filter="url(#dotglow)"/>
  <circle cx="380" cy="400" r="22" fill="#7209b7" filter="url(#dotglow)"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="30" fill="#ffffff15" stroke="#ffffff30" stroke-width="3"/>
  <circle cx="256" cy="256" r="14" fill="#4cc9f080" filter="url(#dotglow)"/>
  <!-- Smaller junction dots -->
  <circle cx="180" cy="170" r="10" fill="#f7258580"/>
  <circle cx="340" cy="300" r="10" fill="#7209b780"/>
  <circle cx="180" cy="340" r="10" fill="#4361ee80"/>
  <circle cx="320" cy="220" r="10" fill="#4cc9f080"/>
</svg>
