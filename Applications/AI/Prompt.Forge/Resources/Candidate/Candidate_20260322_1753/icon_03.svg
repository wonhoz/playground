<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 다크 차콜 배경 -->
  <defs>
    <radialGradient id="fire3" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#1A1A1A"/>
  <rect width="1024" height="1024" rx="190" fill="url(#fire3)"/>
  <!-- Layer 2: 대장간 모루(Anvil) -->
  <!-- 모루 상단 -->
  <rect x="250" y="540" width="524" height="100" rx="12" fill="#5A5A5A"/>
  <!-- 모루 본체 -->
  <rect x="320" y="620" width="384" height="80" rx="8" fill="#4A4A4A"/>
  <!-- 모루 뿔 -->
  <path d="M250 560 Q200 580 180 600 L250 600 Z" fill="#5A5A5A"/>
  <!-- Layer 3: 망치 내리치기 -->
  <!-- 망치 손잡이 -->
  <rect x="490" y="220" width="44" height="300" rx="10" fill="#8B5E3C" transform="rotate(20 512 370)"/>
  <!-- 망치 헤드 -->
  <rect x="440" y="185" width="180" height="100" rx="16" fill="#C0C0C0" transform="rotate(20 512 235)"/>
  <rect x="450" y="200" width="160" height="80" rx="12" fill="#D8D8D8" transform="rotate(20 512 240)"/>
  <!-- 불꽃/스파크 -->
  <circle cx="500" cy="540" r="12" fill="#FF8C00" opacity="0.9"/>
  <circle cx="540" cy="520" r="8" fill="#FFD700" opacity="0.9"/>
  <circle cx="470" cy="510" r="10" fill="#FF4500" opacity="0.9"/>
  <circle cx="560" cy="550" r="6" fill="#FFB300" opacity="0.8"/>
  <circle cx="450" cy="545" r="7" fill="#FF6600" opacity="0.8"/>
  <!-- AI 별 (골드) — 모루 위에 빛나는 -->
  <text x="512" y="530" font-family="sans-serif" font-size="60" fill="#FFD700" text-anchor="middle" opacity="0.8">✦</text>
  <!-- 단어 FORGE -->
  <text x="512" y="760" font-family="sans-serif" font-size="52" fill="#FF8C00" text-anchor="middle" font-weight="bold" letter-spacing="8">FORGE</text>
</svg>
