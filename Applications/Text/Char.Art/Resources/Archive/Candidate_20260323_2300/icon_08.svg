<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#065F46"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Header -->
    <text x="512" y="170" font-size="50" font-weight="bold" font-family="system-ui" fill="#A7F3D0" text-anchor="middle">DENSITY</text>
    <!-- Density grid: chars with varying density from dense to sparse -->
    <!-- Row 1: full dense -->
    <text x="120" y="270" font-size="26" font-family="monospace" fill="#A7F3D0">@@@@@@@@@@@@@@@@@@@@@@</text>
    <!-- Row 2 -->
    <text x="120" y="320" font-size="26" font-family="monospace" fill="#A7F3D0">####################</text>
    <!-- Row 3 -->
    <text x="120" y="370" font-size="26" font-family="monospace" fill="#A7F3D0">$$$$$$$$$$$$$$$$$$</text>
    <!-- Row 4 -->
    <text x="120" y="420" font-size="26" font-family="monospace" fill="#FDE68A">%%%%%%%%%%%%%%%%</text>
    <!-- Row 5 -->
    <text x="120" y="470" font-size="26" font-family="monospace" fill="#A7F3D0">&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;</text>
    <!-- Row 6 -->
    <text x="120" y="520" font-size="26" font-family="monospace" fill="#A7F3D0">++++++++++++</text>
    <!-- Row 7 -->
    <text x="120" y="570" font-size="26" font-family="monospace" fill="#FDE68A">==========</text>
    <!-- Row 8 -->
    <text x="120" y="620" font-size="26" font-family="monospace" fill="#A7F3D0">--------</text>
    <!-- Row 9 -->
    <text x="120" y="670" font-size="26" font-family="monospace" fill="#A7F3D0">......  </text>
    <!-- Row 10 -->
    <text x="120" y="720" font-size="26" font-family="monospace" fill="#A7F3D0">. . . </text>
    <!-- Row 11: sparse -->
    <text x="120" y="770" font-size="26" font-family="monospace" fill="#A7F3D0">.  .  </text>
    <!-- Density arrow on right -->
    <line x1="890" y1="220" x2="890" y2="780" stroke="#A7F3D0" stroke-width="14" stroke-linecap="round"/>
    <polygon points="870,220 890,160 910,220" fill="#A7F3D0"/>
    <text x="912" y="220" font-size="26" font-weight="bold" font-family="system-ui" fill="#FDE68A" writing-mode="tb">HIGH</text>
    <text x="912" y="680" font-size="26" font-weight="bold" font-family="system-ui" fill="#FDE68A" writing-mode="tb">LOW</text>
    <!-- Bottom label -->
    <text x="512" y="880" font-size="38" font-weight="bold" font-family="monospace" fill="#34D399" text-anchor="middle">@#$%+=-. </text>
  </g>
</svg>
