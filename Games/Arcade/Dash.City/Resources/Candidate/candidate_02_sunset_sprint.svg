<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="road2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="50%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="256" cy="240" r="80" fill="url(#sun)" opacity="0.9"/>
  <!-- Horizon buildings silhouette -->
  <rect x="40" y="220" width="50" height="100" fill="#1a0505"/>
  <rect x="60" y="200" width="20" height="20" fill="#1a0505"/>
  <rect x="100" y="200" width="70" height="120" fill="#1a0505"/>
  <rect x="115" y="180" width="15" height="20" fill="#1a0505"/>
  <rect x="145" y="180" width="15" height="20" fill="#1a0505"/>
  <rect x="180" y="190" width="60" height="130" fill="#1a0505"/>
  <rect x="190" y="175" width="12" height="15" fill="#1a0505"/>
  <rect x="260" y="200" width="55" height="120" fill="#1a0505"/>
  <rect x="330" y="185" width="70" height="135" fill="#1a0505"/>
  <rect x="345" y="165" width="14" height="20" fill="#1a0505"/>
  <rect x="375" y="165" width="14" height="20" fill="#1a0505"/>
  <rect x="410" y="210" width="65" height="110" fill="#1a0505"/>
  <rect x="425" y="190" width="20" height="20" fill="#1a0505"/>
  <!-- Road -->
  <polygon points="80,420 432,420 380,310 132,310" fill="url(#road2)"/>
  <!-- Road center lines -->
  <polygon points="230,310 282,310 268,380 244,380" fill="#ffee58" opacity="0.6"/>
  <!-- Runner -->
  <ellipse cx="256" cy="295" rx="18" ry="18" fill="#ff6b35"/>
  <rect x="244" y="310" width="24" height="36" rx="8" fill="#c0392b"/>
  <line x1="244" y1="332" x2="226" y2="352" stroke="#c0392b" stroke-width="9" stroke-linecap="round"/>
  <line x1="268" y1="332" x2="280" y2="354" stroke="#c0392b" stroke-width="9" stroke-linecap="round"/>
  <line x1="250" y1="346" x2="238" y2="368" stroke="#c0392b" stroke-width="9" stroke-linecap="round"/>
  <line x1="262" y1="346" x2="274" y2="366" stroke="#c0392b" stroke-width="9" stroke-linecap="round"/>
  <!-- Motion streaks -->
  <line x1="80" y1="305" x2="200" y2="305" stroke="#ffee58" stroke-width="4" opacity="0.7"/>
  <line x1="80" y1="295" x2="180" y2="295" stroke="#ff8c00" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="315" x2="190" y2="315" stroke="#ffee58" stroke-width="2" opacity="0.4"/>
</svg>
