<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 네온 만화 프레임 -->
  <rect x="90" y="90" width="332" height="332" rx="12" fill="#FB923C" opacity="0.05"/>
  <rect x="90" y="90" width="332" height="332" rx="12" fill="none" stroke="#FB923C" stroke-width="4" filter="url(#glow)"/>
  <!-- 대각 분할선 -->
  <line x1="90" y1="90" x2="422" y2="422" stroke="#FDBA74" stroke-width="2.5" opacity="0.6"/>
  <!-- 좌상단: BEFORE (원본) -->
  <text x="175" y="200" text-anchor="middle" fill="#888888" font-size="14" font-family="sans-serif" opacity="0.4">BEFORE</text>
  <circle cx="175" cy="230" r="35" fill="none" stroke="#888888" stroke-width="2" opacity="0.3"/>
  <circle cx="175" cy="230" r="22" fill="#333333" opacity="0.3"/>
  <!-- 우하단: AFTER (만화) -->
  <text x="337" y="310" text-anchor="middle" fill="#FB923C" font-size="14" font-family="sans-serif" font-weight="bold" filter="url(#glow)">AFTER</text>
  <circle cx="337" cy="340" r="35" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <circle cx="337" cy="340" r="22" fill="#FB923C" opacity="0.2" filter="url(#glow)"/>
  <!-- 표정 (만화화) -->
  <circle cx="328" cy="333" r="3" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <circle cx="346" cy="333" r="3" fill="#FB923C" opacity="0.9" filter="url(#glow)"/>
  <path d="M 322 345 Q 337 356 352 345" fill="none" stroke="#FDBA74" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 레이블 -->
  <text x="256" y="460" text-anchor="middle" fill="#FB923C" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">NEON COMIC</text>
</svg>