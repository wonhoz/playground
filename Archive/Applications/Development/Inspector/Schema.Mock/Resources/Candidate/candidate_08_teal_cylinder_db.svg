<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001A1F"/>
      <stop offset="100%" stop-color="#00131A"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DE9B6"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="mock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- DB Cylinder body -->
  <rect x="136" y="180" width="240" height="200" rx="0" fill="url(#cyl)"/>
  <!-- Top ellipse -->
  <ellipse cx="256" cy="180" rx="120" ry="36" fill="url(#top)"/>
  <!-- Middle ellipse rings (layers) -->
  <ellipse cx="256" cy="230" rx="120" ry="36" fill="none" stroke="url(#top)" stroke-width="3" opacity="0.6"/>
  <ellipse cx="256" cy="280" rx="120" ry="36" fill="none" stroke="url(#top)" stroke-width="3" opacity="0.45"/>
  <ellipse cx="256" cy="330" rx="120" ry="36" fill="none" stroke="url(#top)" stroke-width="3" opacity="0.3"/>
  <!-- Bottom ellipse -->
  <ellipse cx="256" cy="380" rx="120" ry="36" fill="url(#cyl)"/>
  <ellipse cx="256" cy="380" rx="120" ry="36" fill="none" stroke="url(#top)" stroke-width="6" opacity="0.7"/>
  <!-- Mock data wand/arrow coming out -->
  <line x1="376" y1="260" x2="430" y2="220" stroke="url(#top)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="430" cy="220" r="18" fill="url(#top)"/>
  <polygon points="424,212 436,220 424,228" fill="#001A1F"/>
  <!-- Mock badge -->
  <rect x="80" y="400" width="110" height="34" rx="12" fill="url(#mock)" opacity="0.8"/>
  <rect x="94" y="411" width="82" height="12" rx="5" fill="#001A1F"/>
  <!-- Stack indicator -->
  <rect x="136" y="420" width="240" height="8" rx="4" fill="url(#top)" opacity="0.3"/>
</svg>
