<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0020"/>
      <stop offset="100%" stop-color="#200010"/>
    </linearGradient>
    <radialGradient id="plasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FF44FF"/>
      <stop offset="60%" stop-color="#8800CC"/>
      <stop offset="100%" stop-color="#440066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EED8FF"/>
      <stop offset="100%" stop-color="#775599"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Star field magenta tint -->
  <circle cx="90" cy="100" r="1.5" fill="#FFAAFF" opacity="0.7"/>
  <circle cx="400" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="450" cy="200" r="1" fill="#AAAAFF" opacity="0.6"/>
  <circle cx="60" cy="360" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="430" cy="420" r="1" fill="#FFAAFF" opacity="0.5"/>
  <!-- Plasma explosion center -->
  <circle cx="256" cy="180" r="70" fill="url(#plasma)" filter="url(#glow)"/>
  <!-- Plasma rings -->
  <circle cx="256" cy="180" r="90" fill="none" stroke="#FF44FF" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="256" cy="180" r="110" fill="none" stroke="#8800CC" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <!-- Ship -->
  <g transform="translate(256, 380)">
    <polygon points="0,-68 -26,20 0,-8 26,20" fill="url(#ship)"/>
    <polygon points="-26,20 -80,48 -48,26 0,-4" fill="#AA88CC"/>
    <polygon points="26,20 80,48 48,26 0,-4" fill="#AA88CC"/>
    <ellipse cx="0" cy="-40" rx="11" ry="17" fill="#FF44FF" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="-13" cy="22" rx="8" ry="12" fill="#AA00FF" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="13" cy="22" rx="8" ry="12" fill="#AA00FF" filter="url(#glow)" opacity="0.9"/>
  </g>
  <!-- Plasma bolts -->
  <line x1="256" y1="310" x2="256" y2="250" stroke="#FF44FF" stroke-width="6" filter="url(#glow)" opacity="0.9"/>
  <line x1="256" y1="310" x2="256" y2="250" stroke="white" stroke-width="2"/>
  <line x1="244" y1="310" x2="244" y2="250" stroke="#AA00FF" stroke-width="4" filter="url(#glow)" opacity="0.7"/>
  <line x1="268" y1="310" x2="268" y2="250" stroke="#AA00FF" stroke-width="4" filter="url(#glow)" opacity="0.7"/>
  <!-- Enemy star fragments post-explosion -->
  <polygon points="140,120 144,132 158,132 146,140 150,154 140,146 130,154 134,140 122,132 136,132" fill="#FF44FF" opacity="0.6" filter="url(#glow)"/>
  <polygon points="380,130 384,140 396,140 386,148 390,160 380,152 370,160 374,148 364,140 376,140" fill="#FF44FF" opacity="0.5" filter="url(#glow)"/>
  <!-- Scattered enemy bits -->
  <circle cx="190" cy="150" r="5" fill="#FF00FF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="320" cy="110" r="4" fill="#FF00FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="200" cy="230" r="6" fill="#FFAAFF" opacity="0.5" filter="url(#glow)"/>
</svg>
