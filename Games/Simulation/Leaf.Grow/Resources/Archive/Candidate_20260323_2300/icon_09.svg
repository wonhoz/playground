  <ellipse cx="700" cy="460" rx="75" ry="130" fill="url(#petal09a)" stroke="#F9A8D4" stroke-width="6" transform="rotate(120 700 460)"/>
  <!-- 하단 -->
  <ellipse cx="512" cy="600" rx="75" ry="130" fill="url(#petal09b)" stroke="#F9A8D4" stroke-width="6" transform="rotate(180 512 600)"/>
  <!-- 좌하단 -->
  <ellipse cx="324" cy="460" rx="75" ry="130" fill="url(#petal09a)" stroke="#F9A8D4" stroke-width="6" transform="rotate(240 324 460)"/>
  <!-- 좌상단 -->
  <ellipse cx="359" cy="290" rx="75" ry="130" fill="url(#petal09b)" stroke="#F9A8D4" stroke-width="6" transform="rotate(300 359 290)"/>

  <!-- 꽃 중심 -->
  <circle cx="512" cy="420" r="90" fill="url(#center09)" stroke="#F59E0B" stroke-width="10"/>
  <!-- 꽃술 점점이 -->
  <circle cx="512" cy="395" r="12" fill="#F59E0B" opacity="0.8"/>
  <circle cx="540" cy="408" r="10" fill="#F59E0B" opacity="0.8"/>
  <circle cx="535" cy="440" r="11" fill="#F59E0B" opacity="0.8"/>
  <circle cx="508" cy="452" r="10" fill="#F59E0B" opacity="0.8"/>
  <circle cx="482" cy="440" r="11" fill="#F59E0B" opacity="0.8"/>
  <circle cx="480" cy="408" r="10" fill="#F59E0B" opacity="0.8"/>

  <!-- Layer 2: 줄기 -->
  <path d="M 512 685 L 512 870" stroke="#22C55E" stroke-width="30" fill="none" stroke-linecap="round"/>
  <!-- 잎사귀 -->
  <path d="M 510 760 Q 400 720 360 655 Q 438 668 510 735" fill="#4ADE80" stroke="#22C55E" stroke-width="8"/>
  <path d="M 514 800 Q 625 760 668 694 Q 590 708 514 774" fill="#4ADE80" stroke="#22C55E" stroke-width="8"/>

  <!-- 흙 -->
  <rect x="0" y="850" width="1024" height="174" fill="#2D1500" clip-path="url(#clip09)"/>
  <ellipse cx="512" cy="858" rx="250" ry="25" fill="#3D2000" opacity="0.8"/>

  <!-- Layer 3: FDE68A 빛 점들 -->
  <circle cx="720" cy="200" r="14" fill="#FDE68A" opacity="0.7"/>
  <circle cx="760" cy="300" r="10" fill="#FDE68A" opacity="0.6"/>
