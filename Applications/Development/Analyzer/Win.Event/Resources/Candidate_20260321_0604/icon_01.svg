<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="we-bg-clip-01">
      <rect width="1024" height="1024" rx="160"/>
    </clipPath>
    <linearGradient id="we-bg-01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#we-bg-01)"/>

  <g clip-path="url(#we-bg-clip-01)">
    <!-- Windows 로고 스타일 창 4분할 -->
    <!-- 좌상 -->
    <rect x="230" y="250" width="224" height="224" rx="20" fill="#FFFFFF"/>
    <!-- 우상 -->
    <rect x="474" y="250" width="224" height="224" rx="20" fill="#FFFFFF" opacity="0.88"/>
    <!-- 좌하 -->
    <rect x="230" y="494" width="224" height="224" rx="20" fill="#FFFFFF" opacity="0.88"/>
    <!-- 우하 -->
    <rect x="474" y="494" width="224" height="224" rx="20" fill="#FFFFFF" opacity="0.78"/>

    <!-- 중간 갭 (십자) -->
    <rect x="440" y="230" width="48" height="508" rx="24" fill="url(#we-bg-01)"/>
    <rect x="210" y="440" width="508" height="48" rx="24" fill="url(#we-bg-01)"/>

    <!-- 경고 배지 (우하 코너) -->
    <circle cx="730" cy="740" r="130" fill="#D32F2F"/>
    <circle cx="730" cy="740" r="108" fill="#E53935"/>
    <!-- 느낌표 -->
    <rect x="712" y="680" width="36" height="92" rx="18" fill="#FFFFFF"/>
    <circle cx="730" cy="798" r="20" fill="#FFFFFF"/>
  </g>
</svg>
