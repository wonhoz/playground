  <rect x="192" y="408" width="44" height="44" rx="6" fill="#F57F17"/>
  <rect x="192" y="464" width="44" height="44" rx="6" fill="#6A1B9A"/>
  <rect x="192" y="520" width="44" height="44" rx="6" fill="#E53935"/>
