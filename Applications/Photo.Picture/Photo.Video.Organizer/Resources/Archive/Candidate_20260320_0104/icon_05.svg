<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Folder Tree: media library -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Root folder -->
  <rect x="360" y="180" width="200" height="130" rx="16" fill="#7B1FA2"/>
  <rect x="360" y="160" width="100" height="40" rx="8" fill="#9C27B0"/>
  <!-- Trunk line -->
  <line x1="512" y1="310" x2="512" y2="390" stroke="#CE93D8" stroke-width="8"/>
  <!-- Branch lines -->
  <line x1="512" y1="390" x2="280" y2="430" stroke="#CE93D8" stroke-width="8"/>
  <line x1="512" y1="390" x2="512" y2="430" stroke="#CE93D8" stroke-width="8"/>
  <line x1="512" y1="390" x2="744" y2="430" stroke="#CE93D8" stroke-width="8"/>
  <!-- Left sub-folder -->
  <rect x="180" y="430" width="160" height="110" rx="14" fill="#4A148C"/>
  <rect x="180" y="414" width="80" height="30" rx="6" fill="#6A1B9A"/>
  <!-- Center sub-folder -->
  <rect x="412" y="430" width="160" height="110" rx="14" fill="#4A148C"/>
  <rect x="412" y="414" width="80" height="30" rx="6" fill="#6A1B9A"/>
  <!-- Right sub-folder -->
  <rect x="644" y="430" width="160" height="110" rx="14" fill="#4A148C"/>
  <rect x="644" y="414" width="80" height="30" rx="6" fill="#6A1B9A"/>
  <!-- Media icons in folders -->
  <!-- Left: photo icon -->
  <rect x="200" y="452" width="60" height="46" rx="6" fill="#CE93D8" opacity="0.7"/>
  <circle cx="218" cy="466" r="8" fill="#080010"/>
  <!-- Center: video icon -->
  <polygon points="446,452 446,498 494,475" fill="#CE93D8" opacity="0.8"/>
  <!-- Right: mixed icon -->
  <rect x="664" y="452" width="50" height="38" rx="6" fill="#CE93D8" opacity="0.7"/>
  <!-- Bottom level connectors -->
  <line x1="260" y1="540" x2="260" y2="590" stroke="#CE93D8" stroke-width="6" opacity="0.5"/>
  <line x1="492" y1="540" x2="492" y2="590" stroke="#CE93D8" stroke-width="6" opacity="0.5"/>
  <line x1="724" y1="540" x2="724" y2="590" stroke="#CE93D8" stroke-width="6" opacity="0.5"/>
  <!-- Leaf folders -->
  <rect x="180" y="590" width="160" height="80" rx="12" fill="#2D0060"/>
  <rect x="412" y="590" width="160" height="80" rx="12" fill="#2D0060"/>
  <rect x="644" y="590" width="160" height="80" rx="12" fill="#2D0060"/>
  <!-- Leaf content dots -->
  <circle cx="255" cy="630" r="10" fill="#CE93D8" opacity="0.6"/>
  <circle cx="285" cy="630" r="10" fill="#CE93D8" opacity="0.4"/>
  <circle cx="315" cy="630" r="10" fill="#CE93D8" opacity="0.6"/>
  <circle cx="487" cy="630" r="10" fill="#CE93D8" opacity="0.6"/>
  <circle cx="517" cy="630" r="10" fill="#CE93D8" opacity="0.4"/>
  <circle cx="719" cy="630" r="10" fill="#CE93D8" opacity="0.6"/>
  <circle cx="749" cy="630" r="10" fill="#CE93D8" opacity="0.4"/>
  <!-- Large media icon at bottom center -->
  <rect x="370" y="720" width="284" height="100" rx="16" fill="#4A148C"/>
  <circle cx="420" cy="770" r="20" fill="#CE93D8" opacity="0.7"/>
  <path d="M370 790 L430 750 L480 774 L540 750 L600 774 L654 750 L654 820 L370 820 Z" fill="#CE93D8" opacity="0.4"/>
</svg>
