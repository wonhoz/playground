<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Control panel -->
  <rect x="175" y="200" width="674" height="560" rx="36" fill="#FFFFFF" stroke="#34D399" stroke-width="8"/>
  <!-- Title -->
  <text x="512" y="278" font-family="Arial,sans-serif" font-size="52" fill="#059669" font-weight="bold" text-anchor="middle">Service Control</text>
  <!-- Power buttons -->
  <!-- Service 1: Running -->
  <rect x="215" y="310" width="300" height="100" rx="20" fill="#DCFCE7"/>
  <text x="280" y="352" font-family="Arial,sans-serif" font-size="36" fill="#374151">Spooler</text>
  <circle cx="460" cy="360" r="36" fill="#22C55E"/>
  <text x="460" y="372" font-family="Arial,sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold" text-anchor="middle">▶</text>
  <!-- Service 2: Stopped -->
  <rect x="215" y="425" width="300" height="100" rx="20" fill="#F1F5F9"/>
  <text x="280" y="467" font-family="Arial,sans-serif" font-size="36" fill="#9CA3AF">WSearch</text>
  <circle cx="460" cy="475" r="36" fill="#6B7280"/>
  <text x="460" y="487" font-family="Arial,sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold" text-anchor="middle">■</text>
  <!-- Service 3: Running -->
  <rect x="215" y="540" width="300" height="100" rx="20" fill="#DCFCE7"/>
  <text x="280" y="582" font-family="Arial,sans-serif" font-size="36" fill="#374151">WinDefend</text>
  <circle cx="460" cy="590" r="36" fill="#22C55E"/>
  <text x="460" y="602" font-family="Arial,sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold" text-anchor="middle">▶</text>
  <!-- Gaming preset badge -->
  <rect x="545" y="310" width="264" height="330" rx="20" fill="#059669"/>
  <text x="677" y="420" font-family="Arial,sans-serif" font-size="52" fill="#FFFFFF" text-anchor="middle">🎮</text>
  <text x="677" y="488" font-family="Arial,sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Game</text>
  <text x="677" y="544" font-family="Arial,sans-serif" font-size="44" fill="#A7F3D0" text-anchor="middle">Preset</text>
  <rect x="577" y="578" width="200" height="44" rx="16" fill="#047857"/>
  <text x="677" y="606" font-family="Arial,sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold" text-anchor="middle">APPLY</text>
</svg>
