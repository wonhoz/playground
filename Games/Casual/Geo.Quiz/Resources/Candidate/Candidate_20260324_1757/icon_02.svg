<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_gq02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <clipPath id="c_gq02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background sky -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_gq02)"/>
  <g clip-path="url(#c_gq02)">
    <!-- Layer 2: Flag card on top + 4 answer buttons below -->
    <!-- Flag frame -->
    <rect x="252" y="140" width="520" height="320" rx="36" fill="#1E3A8A"/>
    <!-- Simple flag (3 horizontal stripes - like a generic flag) -->
    <rect x="272" y="160" width="480" height="93" rx="12" fill="#EF4444"/>
    <rect x="272" y="253" width="480" height="93" rx="0" fill="#FFFFFF"/>
    <rect x="272" y="346" width="480" height="93" rx="12" fill="#1D4ED8"/>
    <!-- Question mark overlay -->
    <rect x="432" y="194" width="160" height="234" rx="20" fill="#1E3A8A" opacity="0.85"/>
    <text x="512" y="346" font-family="Arial Black" font-size="180" font-weight="900" fill="#FCD34D" text-anchor="middle">?</text>
    <!-- Answer buttons 2x2 -->
    <!-- A -->
    <rect x="152" y="520" width="320" height="160" rx="32" fill="#DCFCE7"/>
    <text x="312" y="617" font-family="Arial Black" font-size="80" font-weight="900" fill="#15803D" text-anchor="middle">A</text>
    <!-- B -->
    <rect x="552" y="520" width="320" height="160" rx="32" fill="#DBEAFE"/>
    <text x="712" y="617" font-family="Arial Black" font-size="80" font-weight="900" fill="#1D4ED8" text-anchor="middle">B</text>
    <!-- C (selected/correct highlight) -->
    <rect x="152" y="720" width="320" height="160" rx="32" fill="#FEF9C3"/>
    <text x="312" y="817" font-family="Arial Black" font-size="80" font-weight="900" fill="#CA8A04" text-anchor="middle">C</text>
    <!-- D -->
    <rect x="552" y="720" width="320" height="160" rx="32" fill="#FCE7F3"/>
    <text x="712" y="817" font-family="Arial Black" font-size="80" font-weight="900" fill="#BE185D" text-anchor="middle">D</text>
    <!-- Layer 3: Check/answer indicator -->
    <circle cx="762" cy="452" r="52" fill="#22C55E"/>
    <path d="M736 452 L752 472 L792 432" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
