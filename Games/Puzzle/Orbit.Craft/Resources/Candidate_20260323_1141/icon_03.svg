<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 퍼플 스페이스 -->
  <rect width="1024" height="1024" rx="180" fill="#0D0020"/>
  <!-- Layer 2: 여러 겹 궤도 고리들 (기하학) -->
  <!-- 수평 궤도 -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="#7C4DFF" stroke-width="6" opacity="0.9"/>
  <!-- 기울어진 궤도 1 -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="#E040FB" stroke-width="6" opacity="0.85" transform="rotate(60,512,512)"/>
  <!-- 기울어진 궤도 2 -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="#00E5FF" stroke-width="6" opacity="0.8" transform="rotate(120,512,512)"/>
  <!-- 중앙 행성 -->
  <circle cx="512" cy="512" r="100" fill="#4A0080"/>
  <circle cx="512" cy="512" r="80" fill="#6A0DAD"/>
  <circle cx="512" cy="512" r="56" fill="#9C27B0"/>
  <!-- 대기권 -->
  <circle cx="512" cy="512" r="110" fill="none" stroke="#CE93D8" stroke-width="4" opacity="0.5"/>
  <!-- 궤도 위의 위성들 -->
  <circle cx="912" cy="512" r="20" fill="#7C4DFF"/>
  <circle cx="712" cy="858" r="18" fill="#E040FB"/>
  <circle cx="170" cy="650" r="16" fill="#00E5FF"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="900" font-family="Arial Black,Arial" font-size="68" font-weight="900" fill="#CE93D8" text-anchor="middle">ORBIT.CRAFT</text>
</svg>
