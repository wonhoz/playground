<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 네온 사인 스타일 MOCK -->
  <text x="256" y="220" text-anchor="middle" fill="#EC4899" font-size="72" font-family="'Segoe UI', sans-serif" font-weight="900" filter="url(#glow)" opacity="0.9">MOCK</text>
  <!-- 네온 글로우 효과 -->
  <text x="256" y="220" text-anchor="middle" fill="none" stroke="#EC4899" stroke-width="2" font-size="72" font-family="'Segoe UI', sans-serif" font-weight="900" filter="url(#glow)">MOCK</text>
  <!-- 서버 아이콘 (하단) -->
  <rect x="178" y="270" width="156" height="110" rx="8" fill="#EC4899" opacity="0.1"/>
  <rect x="178" y="270" width="156" height="110" rx="8" fill="none" stroke="#EC4899" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="192" y="285" width="128" height="12" rx="6" fill="#EC4899" opacity="0.3"/>
  <rect x="192" y="303" width="128" height="12" rx="6" fill="#EC4899" opacity="0.25"/>
  <rect x="192" y="321" width="128" height="12" rx="6" fill="#EC4899" opacity="0.2"/>
  <rect x="192" y="339" width="80" height="12" rx="6" fill="#EC4899" opacity="0.15"/>
  <!-- 상태 LED -->
  <circle cx="316" cy="354" r="7" fill="#EC4899" opacity="0.8" filter="url(#glow)"/>
  <!-- 텍스트 -->
  <text x="256" y="420" text-anchor="middle" fill="#F472B6" font-size="13" font-family="monospace" opacity="0.7">FAKE HTTP SERVER</text>
  <!-- 장식 -->
  <circle cx="130" cy="220" r="4" fill="#EC4899" opacity="0.4" filter="url(#glow)"/>
  <circle cx="382" cy="220" r="4" fill="#F472B6" opacity="0.4" filter="url(#glow)"/>
</svg>