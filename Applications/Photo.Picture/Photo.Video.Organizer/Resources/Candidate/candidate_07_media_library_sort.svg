  <rect x="60" y="290" width="392" height="10" rx="5" fill="url(#shelf)" opacity="0.8"/>
  <rect x="60" y="400" width="392" height="10" rx="5" fill="url(#shelf)" opacity="0.6"/>
  <!-- Cards on first shelf -->
