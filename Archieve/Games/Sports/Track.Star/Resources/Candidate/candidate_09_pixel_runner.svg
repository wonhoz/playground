<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel grid runner - each pixel = 20x20 -->
  <!-- Head -->
  <rect x="220" y="120" width="60" height="60" rx="0" fill="#f0c080"/>
  <!-- Eyes -->
  <rect x="232" y="136" width="12" height="12" fill="#222"/>
  <rect x="256" y="136" width="12" height="12" fill="#222"/>
  <!-- Smile -->
  <rect x="232" y="156" width="8" height="8" fill="#222"/>
  <rect x="252" y="156" width="16" height="8" fill="#222"/>
  <rect x="260" y="164" width="8" height="8" fill="#222"/>
  <!-- Torso -->
  <rect x="200" y="180" width="100" height="80" fill="#cc2020"/>
  <!-- Number on jersey -->
  <rect x="244" y="192" width="12" height="56" fill="#ffdd44"/>
  <rect x="216" y="208" width="60" height="12" fill="#ffdd44"/>
  <!-- Left arm (forward) -->
  <rect x="140" y="180" width="60" height="40" fill="#cc2020"/>
  <rect x="120" y="220" width="60" height="40" fill="#f0c080"/>
  <!-- Right arm (back) -->
  <rect x="300" y="180" width="60" height="40" fill="#cc2020"/>
  <rect x="320" y="220" width="60" height="40" fill="#f0c080"/>
  <!-- Shorts -->
  <rect x="200" y="260" width="44" height="60" fill="#2244cc"/>
  <rect x="256" y="260" width="44" height="60" fill="#2244cc"/>
  <!-- Left leg (forward/up) -->
  <rect x="180" y="320" width="64" height="40" fill="#f0c080"/>
  <rect x="160" y="360" width="64" height="40" fill="#f0c080"/>
  <!-- Left shoe -->
  <rect x="140" y="400" width="84" height="24" fill="#222222"/>
  <!-- Right leg (back) -->
  <rect x="256" y="320" width="64" height="60" fill="#f0c080"/>
  <!-- Right shoe -->
  <rect x="276" y="380" width="64" height="24" fill="#222222"/>
  <!-- Ground line (pixel) -->
  <rect x="80" y="424" width="352" height="20" fill="#cc3300"/>
  <rect x="80" y="444" width="352" height="20" fill="#992200"/>
  <!-- Motion pixels -->
  <rect x="80" y="200" width="20" height="20" fill="#ffdd44" opacity="0.7"/>
  <rect x="100" y="240" width="20" height="20" fill="#ffdd44" opacity="0.5"/>
  <rect x="80" y="280" width="20" height="20" fill="#ffdd44" opacity="0.3"/>
</svg>