<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#100520"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF00FF"/>
      <stop offset="100%" style="stop-color:#00FFFF"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="80" y1="150" x2="432" y2="150" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="80" y1="250" x2="432" y2="250" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="80" y1="300" x2="432" y2="300" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="80" y1="350" x2="432" y2="350" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="150" y1="100" x2="150" y2="430" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="210" y1="100" x2="210" y2="430" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="300" y1="100" x2="300" y2="430" stroke="#1A1A3A" stroke-width="1"/>
  <line x1="362" y1="100" x2="362" y2="430" stroke="#1A1A3A" stroke-width="1"/>
  <!-- Neon magnifier -->
  <circle cx="230" cy="230" r="100" fill="none" stroke="url(#neon)" stroke-width="8" filter="url(#neonGlow)" opacity="0.9"/>
  <line x1="302" y1="302" x2="390" y2="390" stroke="url(#neon)" stroke-width="14" stroke-linecap="round" filter="url(#neonGlow)"/>
  <!-- Lightning bolt inside magnifier -->
  <path d="M242 170 L210 230 L232 230 L218 290 L278 220 L252 220 L272 170 Z" fill="#FF00FF" opacity="0.8" filter="url(#neonGlow)"/>
</svg>
