<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: JSON 중괄호 모양의 대륙 실루엣 (metaphor) | 실루엣/캐릭터 | 강렬한 붉은주황+황금 -->
  <!-- Layer 1: 배경 - 짙은 숯 -->
  <rect width="1024" height="1024" rx="190" fill="#1A1008"/>

  <!-- Layer 2: 대형 중괄호 { } - 지도를 감싸는 구조 -->
  <!-- 왼쪽 중괄호 { -->
  <path d="M220 220 Q160 220 160 280 L160 420 Q160 480 110 510 Q160 540 160 600 L160 740 Q160 800 220 800 L260 800 L260 750 Q210 750 210 700 L210 570 Q210 510 260 490 Q210 470 210 420 L210 300 Q210 250 260 250 L260 220 Z"
        fill="#FF6D00" stroke="#FFD600" stroke-width="3"/>

  <!-- 오른쪽 중괄호 } -->
  <path d="M804 220 Q864 220 864 280 L864 420 Q864 480 914 510 Q864 540 864 600 L864 740 Q864 800 804 800 L764 800 L764 750 Q814 750 814 700 L814 570 Q814 510 764 490 Q814 470 814 420 L814 300 Q814 250 764 250 L764 220 Z"
        fill="#FF6D00" stroke="#FFD600" stroke-width="3"/>

  <!-- Layer 2: 중괄호 안의 지도 요소들 -->
  <!-- 지도 배경 (지형색) -->
  <rect x="280" y="280" width="464" height="464" fill="#1A1008"/>

  <!-- 대륙 형태 -->
  <path d="M300 360 Q370 330 440 350 Q510 320 580 345 Q640 325 700 355 L720 450 Q680 480 620 465 Q560 490 490 472 Q420 495 360 478 Q320 460 300 430 Z"
        fill="#FF6D00" opacity="0.8"/>

  <path d="M320 490 Q400 470 480 490 Q540 475 610 495 L630 570 Q580 595 510 578 Q430 600 360 580 Q325 565 320 530 Z"
        fill="#FF8F00" opacity="0.7"/>

  <path d="M700 460 Q740 445 760 465 L770 520 Q750 535 720 520 Q700 515 700 490 Z"
        fill="#FF6D00" opacity="0.6"/>

  <!-- 바다/물 영역 표시 -->
  <circle cx="420" cy="640" r="15" fill="#1565C0" opacity="0.6"/>
  <circle cx="640" cy="360" r="12" fill="#1565C0" opacity="0.5"/>
  <circle cx="350" cy="420" r="10" fill="#1565C0" opacity="0.5"/>

  <!-- 데이터 마커들 -->
  <circle cx="440" cy="390" r="14" fill="#FFD600" stroke="#FF6D00" stroke-width="2"/>
  <circle cx="560" cy="420" r="11" fill="#FFD600" stroke="#FF6D00" stroke-width="2"/>
  <circle cx="500" cy="510" r="16" fill="#FFD600" stroke="#FF6D00" stroke-width="2"/>
  <circle cx="650" cy="480" r="10" fill="#FFD600" stroke="#FF6D00" stroke-width="2"/>
  <circle cx="370" cy="500" r="12" fill="#FFD600" stroke="#FF6D00" stroke-width="2"/>

  <!-- Layer 3: JSON 키워드 (타입 표시) -->
  <text x="330" y="340" font-family="Consolas,monospace" font-size="26" fill="#FFD600" opacity="0.7">"type": "FeatureCollection"</text>

  <!-- 하단 점 3개 (계속) -->
  <circle cx="460" cy="640" r="8" fill="#FF6D00"/>
  <circle cx="512" cy="640" r="8" fill="#FF6D00"/>
  <circle cx="564" cy="640" r="8" fill="#FF6D00"/>

  <!-- 쉼표 장식 -->
  <text x="280" y="680" font-family="Consolas,monospace" font-size="60" fill="#FF6D00" opacity="0.5">...</text>
  <text x="680" y="680" font-family="Consolas,monospace" font-size="60" fill="#FF6D00" opacity="0.5">}</text>
</svg>
