<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background — rich purple gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <!-- Layer 2: Slack-style chat bubble (white) -->
  <!-- Main bubble body -->
  <rect x="155" y="168" width="630" height="460" rx="82" fill="white"/>
  <!-- Bubble tail (bottom-left notch) -->
  <path d="M215,628 L172,782 L380,648" fill="white"/>

  <!-- # hash symbol inside bubble (Slack purple) -->
  <!-- Horizontal bars -->
  <rect x="248" y="332" width="358" height="62" rx="31" fill="#7B1FA2"/>
  <rect x="248" y="454" width="358" height="62" rx="31" fill="#7B1FA2"/>
  <!-- Vertical bars -->
  <rect x="322" y="252" width="62" height="368" rx="31" fill="#7B1FA2"/>
  <rect x="480" y="252" width="62" height="368" rx="31" fill="#7B1FA2"/>

  <!-- Layer 3: Green Active badge (bottom-right of bubble) -->
  <!-- White border ring -->
  <circle cx="740" cy="646" r="182" fill="white"/>
  <!-- Green fill -->
  <circle cx="740" cy="646" r="155" fill="#00C853"/>
  <!-- Inner glow dot -->
  <circle cx="740" cy="646" r="70" fill="#69F0AE" opacity="0.5"/>
</svg>
