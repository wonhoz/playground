<!-- Code.Snap icon_01: 카메라 + 코드 괄호 (camera with code brackets) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A1A0A"/>
  <!-- Camera body -->
  <rect x="180" y="340" width="660" height="440" rx="48" fill="#2E7D32"/>
  <!-- Camera lens -->
  <circle cx="512" cy="560" r="140" fill="#0A1A0A"/>
  <circle cx="512" cy="560" r="100" fill="#43A047"/>
  <circle cx="512" cy="560" r="56" fill="#0A1A0A"/>
  <!-- Camera viewfinder bump -->
  <rect x="370" y="280" width="200" height="80" rx="20" fill="#2E7D32"/>
  <!-- Code brackets in lens -->
  <path d="M468 530 L440 560 L468 590" fill="none" stroke="#66BB6A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M556 530 L584 560 L556 590" fill="none" stroke="#66BB6A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
