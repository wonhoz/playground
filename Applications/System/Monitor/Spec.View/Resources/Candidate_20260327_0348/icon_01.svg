<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright indigo violet -->
  <rect width="1024" height="1024" rx="190" fill="#6C5CE7"/>

  <!-- Layer 2: CPU chip (large, simple, 2x2 inner cells) -->
  <!-- CPU package outer -->
  <rect x="272" y="272" width="480" height="480" rx="28" fill="#2D3436" stroke="#FFFFFF" stroke-width="18"/>

  <!-- CPU die inner (2×2 grid — max rule satisfied) -->
  <rect x="320" y="320" width="384" height="384" rx="16" fill="#353B48" stroke="#74B9FF" stroke-width="14"/>
  <!-- 2×2 grid dividers -->
  <line x1="512" y1="320" x2="512" y2="704" stroke="#74B9FF" stroke-width="8" opacity="0.7"/>
  <line x1="320" y1="512" x2="704" y2="512" stroke="#74B9FF" stroke-width="8" opacity="0.7"/>
  <!-- Die labels (large, bold) -->
  <text x="416" y="434" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="52" font-weight="900" fill="#74B9FF">CPU</text>
  <text x="608" y="434" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="52" font-weight="900" fill="#A29BFE">LLC</text>
  <text x="416" y="626" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="42" font-weight="900" fill="#55EFC4">iGPU</text>
  <text x="608" y="626" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="42" font-weight="900" fill="#FFEAA7">I/O</text>

  <!-- CPU pins (8 per side, large) -->
  <!-- Left side -->
  <rect x="232" y="310" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="352" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="394" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="436" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="478" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="520" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="562" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="232" y="604" width="40" height="26" rx="5" fill="#F9CA24"/>
  <!-- Right side -->
  <rect x="752" y="310" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="352" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="394" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="436" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="478" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="520" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="562" width="40" height="26" rx="5" fill="#F9CA24"/>
  <rect x="752" y="604" width="40" height="26" rx="5" fill="#F9CA24"/>
  <!-- Top side -->
  <rect x="310" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="352" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="394" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="436" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="478" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="520" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="562" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="604" y="232" width="26" height="40" rx="5" fill="#F9CA24"/>
  <!-- Bottom side -->
  <rect x="310" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="352" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="394" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="436" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="478" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="520" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="562" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>
  <rect x="604" y="752" width="26" height="40" rx="5" fill="#F9CA24"/>

  <!-- Layer 3: 4 spec tags (corners) -->
  <!-- GPU — top right -->
  <rect x="758" y="148" width="182" height="60" rx="16" fill="#A29BFE" stroke="#FFFFFF" stroke-width="8"/>
  <text x="849" y="190" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" fill="#FFFFFF">GPU</text>

  <!-- RAM — right center -->
  <rect x="800" y="492" width="182" height="60" rx="16" fill="#55EFC4" stroke="#FFFFFF" stroke-width="8"/>
  <text x="891" y="534" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" fill="#2D3436">RAM</text>

  <!-- SSD — bottom right -->
  <rect x="758" y="820" width="182" height="60" rx="16" fill="#FFEAA7" stroke="#FFFFFF" stroke-width="8"/>
  <text x="849" y="862" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" fill="#2D3436">SSD</text>

  <!-- OS — top left -->
  <rect x="84" y="148" width="182" height="60" rx="16" fill="#FD79A8" stroke="#FFFFFF" stroke-width="8"/>
  <text x="175" y="190" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" fill="#FFFFFF">WIN</text>
</svg>
