<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004D40"/>
      <stop offset="100%" style="stop-color:#00251A"/>
    </linearGradient>
    <linearGradient id="maze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DE9B6"/>
      <stop offset="100%" style="stop-color:#00BFA5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Perspective floor grid -->
  <line x1="256" y1="200" x2="60" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="200" x2="140" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="200" x2="220" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="200" x2="300" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="200" x2="372" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="200" x2="452" y2="440" stroke="#1DE9B6" stroke-width="1" opacity="0.3"/>
  <!-- Horizontal depth lines -->
  <line x1="110" y1="310" x2="402" y2="310" stroke="#1DE9B6" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="360" x2="432" y2="360" stroke="#1DE9B6" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="410" x2="452" y2="410" stroke="#1DE9B6" stroke-width="1" opacity="0.4"/>
  <!-- Maze walls -->
  <rect x="140" y="220" width="12" height="80" rx="3" fill="url(#maze)" opacity="0.9"/>
  <rect x="200" y="240" width="70" height="12" rx="3" fill="url(#maze)" opacity="0.9"/>
  <rect x="320" y="220" width="12" height="100" rx="3" fill="url(#maze)" opacity="0.9"/>
  <rect x="256" y="280" width="60" height="12" rx="3" fill="url(#maze)" opacity="0.9"/>
  <!-- Player dot -->
  <circle cx="170" cy="370" r="12" fill="#FFEB3B"/>
  <circle cx="170" cy="370" r="6" fill="#FF6F00"/>
  <!-- Exit glow -->
  <circle cx="380" cy="350" r="18" fill="#1DE9B6" opacity="0.3"/>
  <circle cx="380" cy="350" r="10" fill="#1DE9B6" opacity="0.8"/>
</svg>
