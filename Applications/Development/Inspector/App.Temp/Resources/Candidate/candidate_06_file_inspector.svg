<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File icon -->
  <polygon points="140,80 320,80 380,140 380,380 140,380" fill="#1E2D3D" stroke="#374151" stroke-width="2"/>
  <polygon points="320,80 380,140 320,140" fill="#374151"/>
  <!-- File content lines with temp data -->
  <rect x="170" y="180" width="180" height="10" rx="3" fill="#374151"/>
  <rect x="170" y="200" width="140" height="10" rx="3" fill="#374151"/>
  <rect x="170" y="220" width="160" height="10" rx="3" fill="#374151"/>
  <rect x="170" y="240" width="120" height="10" rx="3" fill="#374151"/>
  <!-- TMP badge -->
  <rect x="155" y="120" width="80" height="30" rx="6" fill="#EF4444"/>
  <text x="195" y="140" font-family="monospace" font-weight="bold" font-size="16" fill="white" text-anchor="middle">.TMP</text>
  <!-- Crosshair/delete overlay -->
  <circle cx="380" cy="330" r="70" fill="#0A1628" stroke="#EF4444" stroke-width="4"/>
  <line x1="340" y1="290" x2="420" y2="370" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
  <line x1="420" y1="290" x2="340" y2="370" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
  <!-- Size info -->
  <text x="256" y="430" font-family="monospace" font-size="16" fill="#888" text-anchor="middle">Size: 234.5 MB</text>
  <text x="256" y="458" font-family="monospace" font-size="14" fill="#555" text-anchor="middle">Modified: 3 days ago</text>
</svg>