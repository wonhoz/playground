<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#031020"/>
      <stop offset="50%" stop-color="#041828"/>
      <stop offset="100%" stop-color="#020c18"/>
    </linearGradient>
    <linearGradient id="fall04a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="fall04b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0C4A6E" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pool04" cx="50%" cy="50%" r="50%" id="pool04r">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="poolRG" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#031020" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="glow04">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow04b">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="splash04">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg04)"/>

  <!-- 배경 별/빛 -->
  <circle cx="30" cy="40" r="1" fill="#00FFFF" opacity="0.4"/>
  <circle cx="480" cy="30" r="1" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="60" cy="200" r="1" fill="#0EA5E9" opacity="0.3"/>
  <circle cx="450" cy="180" r="1" fill="#00FFFF" opacity="0.4"/>

  <!-- 절벽 (왼쪽) -->
  <path d="M0,0 L170,0 L170,150 Q160,160 150,200 L0,200 Z" fill="#071a30"/>
  <path d="M0,0 L160,0 L160,150 Q152,158 145,195 L0,195 Z" fill="#0a2540"/>

  <!-- 절벽 (오른쪽) -->
  <path d="M342,0 L512,0 L512,200 L355,200 Q348,158 342,150 Z" fill="#071a30"/>
  <path d="M350,0 L512,0 L512,195 L358,195 Q352,155 350,145 Z" fill="#0a2540"/>

  <!-- 절벽 에지 라인 -->
  <path d="M160,150 Q170,165 175,200" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
  <path d="M352,145 Q345,162 340,200" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>

  <!-- 폭포 본체 - 커밋 스트림들 -->
  <!-- 메인 폭포 흐름 (굵은) -->
  <rect x="200" y="0" width="45" height="320" fill="url(#fall04a)" opacity="0.6" filter="url(#glow04)"/>
  <rect x="215" y="0" width="20" height="320" fill="#00FFFF" opacity="0.4"/>

  <!-- 보조 폭포 1 -->
  <rect x="155" y="0" width="28" height="280" fill="url(#fall04b)" opacity="0.5" filter="url(#glow04)"/>
  <rect x="163" y="0" width="12" height="280" fill="#22D3EE" opacity="0.35"/>

  <!-- 보조 폭포 2 -->
  <rect x="270" y="0" width="32" height="295" fill="url(#fall04b)" opacity="0.5" filter="url(#glow04)"/>
  <rect x="280" y="0" width="14" height="295" fill="#22D3EE" opacity="0.35"/>

  <!-- 작은 폭포 3 -->
  <rect x="320" y="0" width="18" height="240" fill="url(#fall04a)" opacity="0.35" filter="url(#glow04)"/>

  <!-- 작은 폭포 4 -->
  <rect x="130" y="0" width="15" height="200" fill="url(#fall04b)" opacity="0.3" filter="url(#glow04)"/>

  <!-- 커밋 노드들 (폭포 흐름 위의 빛나는 점) -->
  <circle cx="222" cy="40" r="7" fill="#00FFFF" filter="url(#glow04b)" opacity="0.9"/>
  <circle cx="222" cy="85" r="6" fill="#FFFFFF" filter="url(#glow04)" opacity="0.8"/>
  <circle cx="222" cy="130" r="7" fill="#00FFFF" filter="url(#glow04b)" opacity="0.9"/>
  <circle cx="222" cy="175" r="5" fill="#FFFFFF" filter="url(#glow04)" opacity="0.7"/>
  <circle cx="222" cy="220" r="7" fill="#00FFFF" filter="url(#glow04b)" opacity="0.9"/>
  <circle cx="222" cy="265" r="6" fill="#FFFFFF" filter="url(#glow04)" opacity="0.8"/>

  <circle cx="168" cy="50" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.8"/>
  <circle cx="168" cy="110" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.7"/>
  <circle cx="168" cy="170" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.8"/>
  <circle cx="168" cy="230" r="4" fill="#22D3EE" filter="url(#glow04)" opacity="0.6"/>

  <circle cx="285" cy="55" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.8"/>
  <circle cx="285" cy="120" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.7"/>
  <circle cx="285" cy="185" r="5" fill="#22D3EE" filter="url(#glow04)" opacity="0.8"/>
  <circle cx="285" cy="250" r="4" fill="#22D3EE" filter="url(#glow04)" opacity="0.6"/>

  <!-- 날리는 물방울 (커밋 파편) -->
  <circle cx="140" cy="290" r="3" fill="#00FFFF" filter="url(#splash04)" opacity="0.7"/>
  <circle cx="120" cy="310" r="2" fill="#22D3EE" filter="url(#splash04)" opacity="0.6"/>
  <circle cx="170" cy="305" r="2.5" fill="#00FFFF" filter="url(#splash04)" opacity="0.6"/>
  <circle cx="370" cy="285" r="3" fill="#00FFFF" filter="url(#splash04)" opacity="0.7"/>
  <circle cx="390" cy="308" r="2" fill="#22D3EE" filter="url(#splash04)" opacity="0.6"/>
  <circle cx="350" cy="300" r="2.5" fill="#00FFFF" filter="url(#splash04)" opacity="0.6"/>
  <circle cx="100" cy="260" r="2" fill="#0EA5E9" filter="url(#splash04)" opacity="0.5"/>
  <circle cx="420" cy="255" r="2" fill="#0EA5E9" filter="url(#splash04)" opacity="0.5"/>
  <circle cx="330" cy="270" r="2" fill="#22D3EE" filter="url(#splash04)" opacity="0.5"/>

  <!-- 물보라 영역 -->
  <ellipse cx="256" cy="330" rx="140" ry="30" fill="#00FFFF" opacity="0.15" filter="url(#glow04b)"/>
  <ellipse cx="256" cy="322" rx="100" ry="18" fill="#00FFFF" opacity="0.2" filter="url(#glow04)"/>

  <!-- 웅덩이 (폭포 아래) -->
  <ellipse cx="256" cy="360" rx="200" ry="50" fill="url(#poolRG)"/>
  <ellipse cx="256" cy="358" rx="180" ry="40" fill="#031020" opacity="0.7"/>
  <ellipse cx="256" cy="355" rx="160" ry="32" fill="#041828"/>

  <!-- 웅덩이 물결 -->
  <ellipse cx="256" cy="355" rx="130" ry="20" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5" filter="url(#glow04)"/>
  <ellipse cx="256" cy="355" rx="95" ry="13" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="256" cy="355" rx="60" ry="8" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>

  <!-- 물 표면 광택 -->
  <ellipse cx="240" cy="348" rx="45" ry="8" fill="#FFFFFF" opacity="0.08"/>

  <!-- 양쪽 절벽 아래 -->
  <path d="M0,200 L100,200 Q90,250 85,400 L0,400 Z" fill="#071a30"/>
  <path d="M412,200 L512,200 L512,400 Q505,250 415,200 Z" fill="#071a30"/>

  <!-- 하단 지면 -->
  <rect x="0" y="400" width="512" height="112" fill="#020c18"/>
  <path d="M0,400 Q128,395 256,398 Q384,395 512,400" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3"/>

  <!-- 하단 수면 반사 -->
  <ellipse cx="256" cy="405" rx="220" ry="15" fill="#0EA5E9" opacity="0.1" filter="url(#glow04)"/>
</svg>
