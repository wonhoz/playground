  <text x="112" y="425" font-family="monospace" font-size="14" fill="#b91c1c">Win</text>
  <rect x="180" y="400" width="152" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="228" y="425" font-family="monospace" font-size="14" fill="#b91c1c">Space</text>
  <rect x="340" y="400" width="68" height="40" rx="8" fill="#2d0000" stroke="#ef4444" stroke-width="2"/>
  <text x="352" y="425" font-family="monospace" font-size="14" fill="#ef4444">Map</text>
  <line x1="256" y1="316" x2="256" y2="400" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
