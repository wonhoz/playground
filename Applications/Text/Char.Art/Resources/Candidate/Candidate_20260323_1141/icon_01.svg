<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D1117"/>
  <!-- Layer 2: ASCII face made of characters -->
  <!-- Top row (dark = #'s) -->
  <text x="170" y="280" font-family="Consolas,monospace" font-size="34" fill="#39FF14">##########</text>
  <text x="170" y="320" font-family="Consolas,monospace" font-size="34" fill="#39FF14">##........</text>
  <text x="170" y="360" font-family="Consolas,monospace" font-size="34" fill="#39FF14">#..@@@@..#</text>
  <text x="170" y="400" font-family="Consolas,monospace" font-size="34" fill="#39FF14">#.@@@@@@.#</text>
  <text x="170" y="440" font-family="Consolas,monospace" font-size="34" fill="#39FF14">##..@@..##</text>
  <text x="170" y="480" font-family="Consolas,monospace" font-size="34" fill="#39FF14">###....###</text>
  <text x="170" y="520" font-family="Consolas,monospace" font-size="34" fill="#39FF14">##########</text>
  <!-- Wider rows -->
  <text x="100" y="560" font-family="Consolas,monospace" font-size="34" fill="#39FF14">############</text>
  <text x="100" y="600" font-family="Consolas,monospace" font-size="34" fill="#39FF14">##..####..##</text>
  <text x="100" y="640" font-family="Consolas,monospace" font-size="34" fill="#39FF14">####....####</text>
  <text x="100" y="680" font-family="Consolas,monospace" font-size="34" fill="#39FF14">############</text>
</svg>