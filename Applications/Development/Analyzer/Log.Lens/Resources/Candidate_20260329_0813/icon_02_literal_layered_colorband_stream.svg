  <rect x="170" y="630" width="10" height="68" fill="url(#trace02)"/>
  <rect x="200" y="642" width="60" height="18" rx="4" fill="#8888A8" opacity="0.9"/>
  <text x="272" y="657" font-family="Consolas, monospace" font-size="22" fill="#AAAACC">TRACE</text>
  <rect x="360" y="639" width="380" height="14" rx="3" fill="#8888A8" opacity="0.35"/>
  <rect x="360" y="659" width="440" height="14" rx="3" fill="#8888A8" opacity="0.25"/>

  <!-- 하단 상태 바 -->
  <rect x="170" y="844" width="684" height="50" rx="14" fill="#2A2048"/>
