  <rect x="112" y="176" width="72" height="22" rx="4" fill="#9C27B0"/>
  <rect x="152" y="209" width="120" height="22" rx="4" fill="#FF9800"/>
  <rect x="232" y="242" width="80" height="22" rx="4" fill="#F44336"/>
  <rect x="282" y="275" width="150" height="22" rx="4" fill="#00BCD4"/>
  <rect x="390" y="308" width="68" height="22" rx="4" fill="#CDDC39"/>
  <!-- Row labels -->
  <text x="58" y="126" font-family="Arial" font-size="13" fill="#888" text-anchor="end">UEFI</text>
  <text x="58" y="159" font-family="Arial" font-size="13" fill="#888" text-anchor="end">Loader</text>
  <text x="58" y="192" font-family="Arial" font-size="13" fill="#888" text-anchor="end">Kernel</text>
  <text x="58" y="225" font-family="Arial" font-size="13" fill="#888" text-anchor="end">Drivers</text>
