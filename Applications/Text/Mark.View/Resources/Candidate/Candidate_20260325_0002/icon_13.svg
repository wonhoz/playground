<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#0D1117"/>
  <!-- Layer 2: 마크다운 기호들 패턴 -->
  <!-- "#" 파랑 (크게, 중앙 왼쪽) -->
  <text x="230" y="400" font-family="Arial Black" font-size="260" font-weight="900" fill="#4FC3F7">#</text>
  <!-- "**" 노랑 (우측상단) -->
  <text x="560" y="320" font-family="Arial Black" font-size="190" font-weight="900" fill="#FFD600">**</text>
  <!-- ">" 초록 (좌측하단) -->
  <text x="220" y="720" font-family="Arial Black" font-size="230" font-weight="900" fill="#66BB6A">&gt;</text>
  <!-- "-" 오렌지 (우측중간) -->
  <text x="600" y="580" font-family="Arial Black" font-size="280" font-weight="900" fill="#FF9800">-</text>
  <!-- "`" 보라 (우측하단) -->
  <text x="540" y="830" font-family="Arial Black" font-size="220" font-weight="900" fill="#CE93D8">`</text>
  <!-- Layer 3: 연결선 -->
  <line x1="430" y1="280" x2="560" y2="200" stroke="#444455" stroke-width="6" opacity="0.6"/>
  <line x1="380" y1="480" x2="600" y2="460" stroke="#444455" stroke-width="6" opacity="0.6"/>
  <line x1="420" y1="640" x2="600" y2="590" stroke="#444455" stroke-width="6" opacity="0.6"/>
</svg>