<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
    <linearGradient id="rib" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ribbon strips -->
  <rect x="110" y="200" width="295" height="55" rx="8" fill="url(#rib)" opacity="0.9"/>
  <rect x="110" y="268" width="295" height="55" rx="8" fill="url(#rib)" opacity="0.7"/>
  <!-- Ribbon texture lines -->
  <line x1="110" y1="218" x2="405" y2="218" stroke="#C2185B" stroke-width="1.5" opacity="0.4"/>
  <line x1="110" y1="236" x2="405" y2="236" stroke="#C2185B" stroke-width="1.5" opacity="0.4"/>
  <line x1="110" y1="286" x2="405" y2="286" stroke="#C2185B" stroke-width="1.5" opacity="0.35"/>
  <line x1="110" y1="304" x2="405" y2="304" stroke="#C2185B" stroke-width="1.5" opacity="0.35"/>
  <!-- Scissors cutting horizontal -->
  <circle cx="178" cy="258" r="15" fill="none" stroke="white" stroke-width="4.5"/>
  <circle cx="206" cy="258" r="15" fill="none" stroke="white" stroke-width="4.5"/>
  <line x1="192" y1="245" x2="440" y2="180" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="192" y1="271" x2="440" y2="336" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Cut mark -->
  <line x1="255" y1="175" x2="255" y2="345" stroke="white" stroke-width="2" stroke-dasharray="8,6" opacity="0.7"/>
  <!-- Flying piece -->
  <rect x="320" y="390" width="80" height="30" rx="6" fill="url(#rib)" opacity="0.8" transform="rotate(-15 360 405)"/>
</svg>
