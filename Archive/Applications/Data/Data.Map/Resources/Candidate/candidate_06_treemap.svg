  <text x="360" y="406" font-family="Arial, sans-serif" font-size="13" fill="#85929e" text-anchor="middle">Other: 8%</text>
  <!-- Title -->
  <text x="256" y="458" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#42a5f5" text-anchor="middle" letter-spacing="2">DATA MAP</text>
