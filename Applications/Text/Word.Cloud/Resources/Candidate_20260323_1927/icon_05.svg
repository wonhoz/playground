<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16"/>
      <stop offset="100%" style="stop-color:#65A30D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg05)"/>
  <!-- Cloud silhouette (dark green) -->
  <ellipse cx="512" cy="520" rx="290" ry="175" fill="#166534"/>
  <ellipse cx="360" cy="490" rx="165" ry="140" fill="#166534"/>
  <ellipse cx="664" cy="495" rx="155" ry="130" fill="#166534"/>
  <ellipse cx="450" cy="400" rx="150" ry="130" fill="#166534"/>
  <ellipse cx="570" cy="385" rx="160" ry="135" fill="#166534"/>
  <!-- Words inside cloud -->
  <text x="512" y="495" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="86" font-weight="900" fill="#FFFFFF">Cloud</text>
  <text x="380" y="570" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="700" fill="#FDE68A">Word</text>
  <text x="630" y="565" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="40" font-weight="700" fill="#FCA5A5">Text</text>
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="700" fill="#BAE6FD">data</text>
  <text x="620" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="700" fill="#FED7AA">viz</text>
