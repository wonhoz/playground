<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
    <clipPath id="clip06"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <g clip-path="url(#clip06)">
    <!-- Layer 2: 신호 원파 (레이더) -->
    <circle cx="512" cy="520" r="340" fill="none" stroke="#22D3EE" stroke-width="12" opacity="0.25"/>
    <circle cx="512" cy="520" r="260" fill="none" stroke="#22D3EE" stroke-width="16" opacity="0.4"/>
    <circle cx="512" cy="520" r="180" fill="none" stroke="#22D3EE" stroke-width="20" opacity="0.6"/>
    <circle cx="512" cy="520" r="100" fill="none" stroke="#22D3EE" stroke-width="26" opacity="0.85"/>
    <!-- 안테나 기둥 -->
    <line x1="512" y1="520" x2="512" y2="260" stroke="#22D3EE" stroke-width="22" stroke-linecap="round"/>
    <!-- 안테나 가지 -->
    <line x1="512" y1="280" x2="430" y2="330" stroke="#22D3EE" stroke-width="16" stroke-linecap="round"/>
    <line x1="512" y1="280" x2="594" y2="330" stroke="#22D3EE" stroke-width="16" stroke-linecap="round"/>
    <!-- 안테나 끝 볼 -->
    <circle cx="512" cy="252" r="26" fill="#FFFFFF"/>
