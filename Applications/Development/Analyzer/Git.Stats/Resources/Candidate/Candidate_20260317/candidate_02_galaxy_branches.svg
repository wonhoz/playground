  <circle cx="50" cy="430" r="6" fill="#FFD700" filter="url(#starGlow)" opacity="0.9"/>
  <circle cx="120" cy="60" r="5" fill="#AED6F1" filter="url(#starGlow)" opacity="0.8"/>
  <circle cx="410" cy="445" r="5" fill="#AED6F1" filter="url(#starGlow)" opacity="0.8"/>
