<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
    <linearGradient id="shieldGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00a152"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Green glow aura -->
  <ellipse cx="256" cy="256" rx="170" ry="180" fill="url(#glowGreen)" opacity="0.6"/>
  <!-- Shield with dramatic tilt -->
  <g transform="rotate(-5, 256, 256)">
    <path d="M256 100 L375 152 L375 282 Q375 368 256 415 Q137 368 137 282 L137 152 Z" fill="url(#shieldGreen)" filter="url(#greenGlow)"/>
    <!-- Shield inner edge -->
    <path d="M256 128 L353 172 L353 282 Q353 348 256 387 Q159 348 159 282 L159 172 Z" fill="none" stroke="white" stroke-width="2.5" opacity="0.3"/>
    <!-- Giant checkmark -->
    <path d="M192 256 L238 302 L326 210" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
    <!-- Checkmark glow -->
    <path d="M192 256 L238 302 L326 210" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.15"/>
  </g>
  <!-- Floating badge pill -->
  <rect x="152" y="430" width="208" height="36" rx="18" fill="#004d20" stroke="#00e676" stroke-width="2"/>
  <rect x="160" y="442" width="70" height="12" rx="5" fill="#666" opacity="0.7"/>
  <rect x="240" y="442" width="70" height="12" rx="5" fill="#00e676" opacity="0.9"/>
</svg>