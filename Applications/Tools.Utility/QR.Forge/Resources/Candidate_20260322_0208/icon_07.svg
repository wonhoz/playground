<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07 | Hybrid | 중앙 심볼 | QR 코드 중앙에 + (생성) 심볼 강조 | 코랄 + 핑크 -->

  <defs>
    <radialGradient id="bgGrad07" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3D001A"/>
      <stop offset="100%" stop-color="#1A0010"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6B9D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad07)"/>
  <!-- 중앙 글로우 -->
  <circle cx="512" cy="512" r="380" fill="url(#centerGlow)"/>

  <!-- Layer 2: QR 코드 -->
  <g fill="#FF6B9D">
    <!-- 좌상단 파인더 -->
    <rect x="148" y="148" width="220" height="220" rx="18"/>
    <rect x="170" y="170" width="176" height="176" rx="12" fill="#1A0010"/>
    <rect x="194" y="194" width="128" height="128" rx="7" fill="#FF6B9D"/>

    <!-- 우상단 파인더 -->
    <rect x="656" y="148" width="220" height="220" rx="18"/>
    <rect x="678" y="170" width="176" height="176" rx="12" fill="#1A0010"/>
    <rect x="702" y="194" width="128" height="128" rx="7" fill="#FF6B9D"/>

    <!-- 좌하단 파인더 -->
    <rect x="148" y="656" width="220" height="220" rx="18"/>
    <rect x="170" y="678" width="176" height="176" rx="12" fill="#1A0010"/>
    <rect x="194" y="702" width="128" height="128" rx="7" fill="#FF6B9D"/>

    <!-- 데이터 모듈 (QR 패턴) -->
    <rect x="406" y="390" width="32" height="32" rx="5"/>
    <rect x="454" y="390" width="32" height="32" rx="5"/>
    <rect x="538" y="390" width="32" height="32" rx="5"/>
    <rect x="586" y="390" width="32" height="32" rx="5"/>
    <rect x="406" y="438" width="32" height="32" rx="5"/>
    <rect x="586" y="438" width="32" height="32" rx="5"/>
    <rect x="406" y="538" width="32" height="32" rx="5"/>
    <rect x="586" y="538" width="32" height="32" rx="5"/>
    <rect x="406" y="586" width="32" height="32" rx="5"/>
    <rect x="454" y="586" width="32" height="32" rx="5"/>
    <rect x="538" y="586" width="32" height="32" rx="5"/>
    <rect x="586" y="586" width="32" height="32" rx="5"/>

    <!-- 우측 열 -->
    <rect x="694" y="406" width="32" height="32" rx="5"/>
    <rect x="742" y="406" width="32" height="32" rx="5"/>
    <rect x="790" y="406" width="32" height="32" rx="5"/>
    <rect x="838" y="406" width="32" height="32" rx="5"/>
    <rect x="694" y="454" width="32" height="32" rx="5"/>
    <rect x="790" y="454" width="32" height="32" rx="5"/>
    <rect x="742" y="454" width="32" height="32" rx="5"/>
    <rect x="838" y="454" width="32" height="32" rx="5"/>
    <rect x="694" y="502" width="32" height="32" rx="5"/>
    <rect x="742" y="502" width="32" height="32" rx="5"/>
    <rect x="838" y="502" width="32" height="32" rx="5"/>
    <rect x="694" y="550" width="32" height="32" rx="5"/>
    <rect x="790" y="550" width="32" height="32" rx="5"/>
    <rect x="838" y="550" width="32" height="32" rx="5"/>
    <rect x="742" y="598" width="32" height="32" rx="5"/>
    <rect x="790" y="598" width="32" height="32" rx="5"/>

    <!-- 하단 행 -->
    <rect x="406" y="694" width="32" height="32" rx="5"/>
    <rect x="454" y="694" width="32" height="32" rx="5"/>
    <rect x="502" y="694" width="32" height="32" rx="5"/>
    <rect x="586" y="694" width="32" height="32" rx="5"/>
    <rect x="634" y="694" width="32" height="32" rx="5"/>
    <rect x="406" y="742" width="32" height="32" rx="5"/>
    <rect x="502" y="742" width="32" height="32" rx="5"/>
    <rect x="634" y="742" width="32" height="32" rx="5"/>
    <rect x="454" y="790" width="32" height="32" rx="5"/>
    <rect x="550" y="790" width="32" height="32" rx="5"/>
    <rect x="634" y="790" width="32" height="32" rx="5"/>
    <rect x="406" y="838" width="32" height="32" rx="5"/>
    <rect x="502" y="838" width="32" height="32" rx="5"/>
    <rect x="586" y="838" width="32" height="32" rx="5"/>
    <rect x="634" y="838" width="32" height="32" rx="5"/>
  </g>

  <!-- Layer 3: 중앙 생성(+) 심볼 -->
  <!-- 흰 원형 배경 -->
  <circle cx="512" cy="512" r="110" fill="#FF6B9D"/>
  <circle cx="512" cy="512" r="94"  fill="#1A0010"/>
  <!-- + 기호 -->
  <rect x="484" y="446" width="56" height="132" rx="10" fill="url(#plusGrad)"/>
  <rect x="446" y="484" width="132" height="56" rx="10" fill="url(#plusGrad)"/>
</svg>
