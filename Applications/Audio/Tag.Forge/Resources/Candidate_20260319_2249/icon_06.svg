  <path d="M256 568 Q256 548 270 540 Q290 530 300 548 Q310 566 290 578 Q280 584 278 598" fill="none" stroke="#81C784" stroke-width="14" stroke-linecap="round"/>
  <circle cx="278" cy="614" r="7" fill="#81C784"/>
  <!-- Arrow (forge transform) -->
  <path d="M444 460 L580 460 M550 430 L580 460 L550 490" fill="none" stroke="#FF8F00" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Forge spark on arrow -->
  <circle cx="512" cy="440" r="8" fill="#FFD740"/>
  <circle cx="512" cy="480" r="6" fill="#FFD740" opacity="0.7"/>
  <!-- After: clean card (right) -->
  <rect x="604" y="280" width="300" height="380" rx="20" fill="#143018" stroke="#4CAF50" stroke-width="18"/>
  <!-- Album thumb -->
  <rect x="634" y="316" width="80" height="80" rx="10" fill="#1B5E20"/>
  <rect x="652" y="334" width="14" height="46" rx="5" fill="#4CAF50"/>
