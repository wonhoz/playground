<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 두 서버 (위/아래) -->
  <!-- 실제 서버 (상단) -->
  <rect x="150" y="100" width="212" height="140" rx="10" fill="#EC4899" opacity="0.12"/>
  <rect x="150" y="100" width="212" height="140" rx="10" fill="none" stroke="#EC4899" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="168" y="118" width="176" height="14" rx="7" fill="#EC4899" opacity="0.6"/>
  <rect x="168" y="138" width="176" height="14" rx="7" fill="#EC4899" opacity="0.5"/>
  <rect x="168" y="158" width="176" height="14" rx="7" fill="#EC4899" opacity="0.4"/>
  <rect x="168" y="178" width="176" height="14" rx="7" fill="#EC4899" opacity="0.3"/>
  <rect x="168" y="198" width="120" height="14" rx="7" fill="#EC4899" opacity="0.2"/>
  <text x="256" y="258" text-anchor="middle" fill="#F472B6" font-size="12" font-family="monospace" opacity="0.8">REAL</text>
  <!-- 연결 심볼 -->
  <line x1="256" y1="240" x2="256" y2="272" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
  <path d="M 240 256 L 256 272 L 272 256" fill="none" stroke="#EC4899" stroke-width="2" filter="url(#glow)"/>
  <!-- 목 서버 (하단, 점선) -->
  <rect x="150" y="272" width="212" height="140" rx="10" fill="#EC4899" opacity="0.06"/>
  <rect x="150" y="272" width="212" height="140" rx="10" fill="none" stroke="#EC4899" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <rect x="168" y="290" width="176" height="14" rx="7" fill="#EC4899" opacity="0.3"/>
  <rect x="168" y="310" width="176" height="14" rx="7" fill="#EC4899" opacity="0.25"/>
  <rect x="168" y="330" width="176" height="14" rx="7" fill="#EC4899" opacity="0.2"/>
  <rect x="168" y="350" width="176" height="14" rx="7" fill="#EC4899" opacity="0.15"/>
  <rect x="168" y="370" width="120" height="14" rx="7" fill="#EC4899" opacity="0.1"/>
  <text x="256" y="430" text-anchor="middle" fill="#F472B6" font-size="12" font-family="monospace" opacity="0.6">MOCK TWIN</text>
  <!-- 상태 표시 -->
  <circle cx="340" cy="118" r="6" fill="#10B981" opacity="0.8" filter="url(#glow)"/>
  <circle cx="340" cy="290" r="6" fill="#EC4899" opacity="0.7" filter="url(#glow)"/>
</svg>