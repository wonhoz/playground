<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FF80AB"/>
    </linearGradient>
    <linearGradient id="body14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#F50057"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg14)"/>
  <!-- Layer 2: Chameleon silhouette (side view) -->
  <!-- Body -->
  <ellipse cx="520" cy="560" rx="280" ry="180" fill="url(#body14)"/>
  <!-- Head -->
  <ellipse cx="790" cy="460" rx="140" ry="120" fill="#FF6090"/>
  <!-- Distinctive chameleon eye (big round) -->
  <circle cx="840" cy="430" r="50" fill="white"/>
  <circle cx="850" cy="432" r="30" fill="#AD1457"/>
  <circle cx="858" cy="424" r="10" fill="white"/>
  <!-- Crest on head -->
  <path d="M760 340 Q790 280 820 340" fill="none" stroke="#FF4081" stroke-width="18" stroke-linecap="round"/>
  <path d="M790 320 Q810 265 835 320" fill="none" stroke="#FF6090" stroke-width="14" stroke-linecap="round"/>
  <!-- Curly tail -->
  <path d="M250 540 Q160 480 180 380 Q200 280 300 320 Q340 340 310 400" fill="none" stroke="#F50057" stroke-width="30" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="440" y1="720" x2="410" y2="820" stroke="#E91E63" stroke-width="28" stroke-linecap="round"/>
  <line x1="540" y1="730" x2="520" y2="830" stroke="#E91E63" stroke-width="28" stroke-linecap="round"/>
  <line x1="620" y1="720" x2="610" y2="820" stroke="#E91E63" stroke-width="28" stroke-linecap="round"/>
  <!-- Layer 3: Color swatches changing on body (format labels as color patches) -->
  <rect x="380" y="490" width="120" height="60" rx="10" fill="#FCE4EC"/>
  <text x="394" y="537" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="800" fill="#E91E63">SVG</text>
  <rect x="520" y="490" width="120" height="60" rx="10" fill="#E8F5E9"/>
  <text x="534" y="537" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="800" fill="#43A047">ICO</text>
  <rect x="390" y="570" width="220" height="56" rx="10" fill="#E3F2FD"/>
  <text x="402" y="615" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="800" fill="#1565C0">PNG · JPG</text>
</svg>
