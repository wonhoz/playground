<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: warm amber/gold -->
  <rect width="1024" height="1024" rx="190" fill="#F59E0B"/>

  <!-- Right-click menu as central element (large, prominent) -->
  <rect x="200" y="180" width="520" height="590" rx="16" fill="#1E293B"/>
  <rect x="200" y="180" width="520" height="590" rx="16" fill="none" stroke="#475569" stroke-width="4"/>

  <!-- Menu title bar -->
  <rect x="200" y="180" width="520" height="44" rx="16" fill="#0F172A"/>
  <rect x="200" y="206" width="520" height="18" fill="#0F172A"/>
  <text x="460" y="208" font-family="Arial,sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Context Menu</text>

  <!-- Menu items list -->
  <rect x="216" y="240" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="265" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">🖊 Open</text>

  <rect x="216" y="285" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="310" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📋 Copy</text>

  <rect x="216" y="330" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="355" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📎 Pin to Quick access</text>

  <line x1="224" y1="374" x2="704" y2="374" stroke="#334155" stroke-width="2"/>

  <!-- Claude item: HIGHLIGHTED in orange -->
  <rect x="216" y="382" width="488" height="56" rx="8" fill="#F97316"/>
  <circle cx="256" cy="410" r="20" fill="white"/>
  <text x="256" y="416" font-family="Arial Black,Arial" font-size="18" fill="#F97316" text-anchor="middle" font-weight="900">C</text>
  <text x="292" y="416" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold">Open with Claude Code</text>
  <!-- Arrow indicating it's new/added -->
  <rect x="616" y="391" width="78" height="28" rx="6" fill="white" opacity="0.25"/>
  <text x="655" y="410" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">NEW</text>

  <line x1="224" y1="442" x2="704" y2="442" stroke="#334155" stroke-width="2"/>

  <rect x="216" y="450" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="475" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">🔤 Rename</text>

  <rect x="216" y="495" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="520" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">🗑 Delete</text>

  <rect x="216" y="540" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="565" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">📂 Open file location</text>

  <line x1="224" y1="584" x2="704" y2="584" stroke="#334155" stroke-width="2"/>

  <rect x="216" y="592" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="617" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">ℹ Properties</text>

  <rect x="216" y="636" width="488" height="40" rx="6" fill="transparent"/>
  <text x="246" y="661" font-family="Arial,sans-serif" font-size="20" fill="#94A3B8">🛡 Run as administrator</text>

  <!-- Mouse cursor at the side -->
  <polygon points="800,390 826,442 812,434 806,454 798,434 784,442" fill="#1E293B" stroke="white" stroke-width="3" stroke-linejoin="round"/>

  <!-- Bottom label -->
  <rect x="166" y="820" width="692" height="60" rx="14" fill="#92400E"/>
  <text x="512" y="858" font-family="Arial Black,Arial" font-size="28" fill="white" font-weight="900" text-anchor="middle">Shell Extension DLL</text>
</svg>
