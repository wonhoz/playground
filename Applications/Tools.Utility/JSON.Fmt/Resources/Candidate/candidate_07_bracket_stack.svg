  <path d="M322,168 Q364,168 378,198 L378,314 Q364,344 322,344" fill="none" stroke="url(#b2)" stroke-width="14" stroke-linecap="round"/>
  <!-- Layer 1 (outermost) -->
  <path d="M170,110 Q112,110 96,152 L96,360 Q112,402 170,402" fill="none" stroke="url(#b1)" stroke-width="14" stroke-linecap="round"/>
  <path d="M342,110 Q400,110 416,152 L416,360 Q400,402 342,402" fill="none" stroke="url(#b1)" stroke-width="14" stroke-linecap="round"/>
  <!-- Content dots between brackets -->
  <circle cx="256" cy="220" r="8" fill="#f7d774" opacity="0.7"/>
  <circle cx="256" cy="256" r="8" fill="#ff9f40" opacity="0.7"/>
  <circle cx="256" cy="292" r="8" fill="#ff6b6b" opacity="0.7"/>
  <!-- Labels -->
  <text x="80" y="460" font-family="monospace" font-size="13" fill="#f7d774">{ }</text>
  <text x="160" y="460" font-family="monospace" font-size="13" fill="#ff9f40">{ }</text>
  <text x="240" y="460" font-family="monospace" font-size="13" fill="#ff6b6b">[ ]</text>
  <text x="320" y="460" font-family="monospace" font-size="13" fill="#ff9f40">{ }</text>
  <text x="400" y="460" font-family="monospace" font-size="13" fill="#f7d774">{ }</text>
</svg>
