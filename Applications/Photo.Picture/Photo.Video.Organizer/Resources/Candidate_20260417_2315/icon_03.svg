<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: 사진 파일 (왼쪽) -->
  <rect x="130" y="320" width="280" height="220" rx="20" fill="white" opacity="0.9"/>
  <!-- 사진 내용 -->
  <rect x="150" y="340" width="240" height="150" rx="10" fill="#B2EBF2"/>
  <polygon points="150,470 230,380 280,410 310,360 390,470" fill="#00838F" opacity="0.5"/>
  <circle cx="196" cy="360" r="22" fill="#FFF176"/>
  <!-- EXIF 태그 라벨 -->
  <rect x="130" y="556" width="280" height="56" rx="12" fill="#00838F" opacity="0.9"/>
  <text x="270" y="592" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle">EXIF</text>
  <!-- 화살표 추출 -->
  <path d="M 420 435 L 570 435" stroke="white" stroke-width="60" stroke-linecap="round"/>
  <polygon points="558,388 640,435 558,482" fill="white"/>
  <!-- Layer 3: 날짜 추출 결과 (오른쪽) -->
  <rect x="590" y="340" width="300" height="190" rx="20" fill="#FFF9C4" opacity="0.95"/>
  <text x="740" y="410" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#006064" text-anchor="middle">2024</text>
  <text x="740" y="470" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#006064" text-anchor="middle">/ 01 / 25</text>
  <!-- 폴더 아이콘 -->
  <rect x="630" y="580" width="220" height="80" rx="14" fill="#00838F"/>
  <text x="740" y="630" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle">folder</text>
</svg>
