<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030d08"/>
      <stop offset="60%" stop-color="#041510"/>
      <stop offset="100%" stop-color="#020a05"/>
    </linearGradient>
    <linearGradient id="peak03a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#E8F8E8"/>
      <stop offset="60%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1A8745"/>
    </linearGradient>
    <linearGradient id="peak03b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0FFF0"/>
      <stop offset="30%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#145A32"/>
    </linearGradient>
    <linearGradient id="peak03c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#D5F5E3"/>
      <stop offset="55%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1E8449"/>
    </linearGradient>
    <linearGradient id="aurora03" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2ECC71" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00FF88" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#27AE60" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#27AE60" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="snowGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg03)"/>

  <!-- 오로라 효과 -->
  <path d="M0,120 Q128,90 256,100 Q384,110 512,85 L512,160 Q384,185 256,175 Q128,165 0,190 Z"
        fill="url(#aurora03)" opacity="0.35"/>
  <path d="M0,140 Q128,115 256,125 Q384,135 512,110 L512,175 Q384,200 256,190 Q128,180 0,205 Z"
        fill="url(#aurora03)" opacity="0.2"/>

  <!-- 별 -->
  <circle cx="40" cy="40" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="90" cy="25" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="160" cy="55" r="1.5" fill="#2ECC71" opacity="0.6"/>
  <circle cx="350" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="440" cy="45" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="480" cy="20" r="1" fill="#2ECC71" opacity="0.5"/>
  <circle cx="25" cy="170" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="500" cy="150" r="1.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- 기여도 바 (하단) - 히스토그램 스타일 -->
  <!-- 기여도 막대들 - 산 아래에 표현 -->
  <rect x="40" y="400" width="14" height="30" fill="#2ECC71" opacity="0.4" rx="2"/>
  <rect x="58" y="390" width="14" height="40" fill="#2ECC71" opacity="0.5" rx="2"/>
  <rect x="76" y="380" width="14" height="50" fill="#27AE60" opacity="0.6" rx="2"/>
  <rect x="94" y="395" width="14" height="35" fill="#2ECC71" opacity="0.4" rx="2"/>
  <rect x="112" y="370" width="14" height="60" fill="#2ECC71" opacity="0.7" rx="2"/>
  <rect x="130" y="360" width="14" height="70" fill="#27AE60" opacity="0.8" rx="2"/>
  <rect x="148" y="375" width="14" height="55" fill="#2ECC71" opacity="0.6" rx="2"/>
  <rect x="166" y="355" width="14" height="75" fill="#2ECC71" opacity="0.8" rx="2"/>
  <rect x="184" y="385" width="14" height="45" fill="#27AE60" opacity="0.5" rx="2"/>
  <rect x="202" y="365" width="14" height="65" fill="#2ECC71" opacity="0.7" rx="2"/>
  <rect x="220" y="345" width="14" height="85" fill="#2ECC71" opacity="0.9" rx="2"/>
  <rect x="238" y="340" width="14" height="90" fill="#00FF88" opacity="0.85" rx="2" filter="url(#glow03)"/>
  <rect x="256" y="335" width="14" height="95" fill="#2ECC71" opacity="0.9" rx="2"/>
  <rect x="274" y="342" width="14" height="88" fill="#27AE60" opacity="0.85" rx="2"/>
  <rect x="292" y="358" width="14" height="72" fill="#2ECC71" opacity="0.75" rx="2"/>
  <rect x="310" y="368" width="14" height="62" fill="#2ECC71" opacity="0.65" rx="2"/>
  <rect x="328" y="382" width="14" height="48" fill="#27AE60" opacity="0.55" rx="2"/>
  <rect x="346" y="372" width="14" height="58" fill="#2ECC71" opacity="0.65" rx="2"/>
  <rect x="364" y="390" width="14" height="40" fill="#2ECC71" opacity="0.5" rx="2"/>
  <rect x="382" y="395" width="14" height="35" fill="#27AE60" opacity="0.4" rx="2"/>
  <rect x="400" y="402" width="14" height="28" fill="#2ECC71" opacity="0.35" rx="2"/>
  <rect x="418" y="408" width="14" height="22" fill="#2ECC71" opacity="0.3" rx="2"/>
  <rect x="436" y="398" width="14" height="32" fill="#27AE60" opacity="0.4" rx="2"/>
  <rect x="454" y="410" width="14" height="20" fill="#2ECC71" opacity="0.3" rx="2"/>

  <!-- 산맥 실루엣 - 뒷배경 (작은 산들) -->
  <polygon points="0,430 80,240 160,430" fill="#0a2a15" opacity="0.6"/>
  <polygon points="100,430 200,200 300,430" fill="#0d3a1e" opacity="0.5"/>
  <polygon points="280,430 400,220 512,430" fill="#0a2a15" opacity="0.6"/>
  <polygon points="350,430 450,260 512,430" fill="#0d3a1e" opacity="0.4"/>

  <!-- 메인 산 - 중앙 (가장 큰) -->
  <polygon points="256,80 100,430 412,430" fill="url(#peak03a)"/>

  <!-- 메인 산 - 왼쪽 -->
  <polygon points="140,160 30,430 260,430" fill="url(#peak03b)" opacity="0.85"/>

  <!-- 메인 산 - 오른쪽 -->
  <polygon points="370,150 245,430 490,430" fill="url(#peak03c)" opacity="0.85"/>

  <!-- 설산 정상 눈 (메인) -->
  <polygon points="256,80 225,160 287,160" fill="#FFFFFF" opacity="0.95" filter="url(#snowGlow)"/>
  <polygon points="256,80 233,145 279,145" fill="#F0FFF0"/>

  <!-- 설산 정상 눈 (왼쪽) -->
  <polygon points="140,160 120,210 162,210" fill="#FFFFFF" opacity="0.9" filter="url(#snowGlow)"/>

  <!-- 설산 정상 눈 (오른쪽) -->
  <polygon points="370,150 350,200 392,200" fill="#FFFFFF" opacity="0.9" filter="url(#snowGlow)"/>

  <!-- 달 / 별 효과 -->
  <circle cx="450" cy="60" r="18" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="455" cy="57" r="15" fill="#0a2a15"/>
  <circle cx="450" cy="60" r="8" fill="#FFFFFF" opacity="0.8" filter="url(#snowGlow)"/>

  <!-- 반짝이는 정상 -->
  <circle cx="256" cy="78" r="5" fill="#FFFFFF" filter="url(#glow03)" opacity="0.9"/>

  <!-- 지면 -->
  <rect x="0" y="430" width="512" height="82" fill="#020a05"/>
  <path d="M0,430 Q128,425 256,428 Q384,425 512,430" fill="none" stroke="#2ECC71" stroke-width="2" opacity="0.4"/>
</svg>
