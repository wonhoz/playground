<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 막대경주: racing bar chart bars competing -->
  <!-- Ground line -->
  <line x1="180" y1="780" x2="844" y2="780" stroke="#33691E" stroke-width="8"/>
  <!-- Bar 1 (shortest, dark) -->
  <rect x="210" y="640" width="100" height="140" rx="10" fill="#33691E"/>
  <!-- Bar 2 (medium) -->
  <rect x="340" y="520" width="100" height="260" rx="10" fill="#33691E"/>
  <!-- Bar 3 (tallest - winner, accent light) -->
  <rect x="470" y="350" width="100" height="430" rx="10" fill="#AED581"/>
  <!-- Racing flag on top of bar 3 -->
  <line x1="520" y1="350" x2="520" y2="260" stroke="#AED581" stroke-width="8"/>
  <rect x="520" y="260" width="60" height="40" fill="#AED581"/>
  <rect x="540" y="260" width="20" height="20" fill="#050A00"/>
  <rect x="520" y="280" width="20" height="20" fill="#050A00"/>
  <!-- Bar 4 (medium-low) -->
  <rect x="600" y="580" width="100" height="200" rx="10" fill="#33691E"/>
  <!-- Bar 5 (low) -->
  <rect x="730" y="660" width="100" height="120" rx="10" fill="#33691E"/>
  <!-- Speed lines on winning bar -->
  <line x1="590" y1="380" x2="640" y2="380" stroke="#AED581" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="590" y1="410" x2="650" y2="410" stroke="#AED581" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="590" y1="440" x2="635" y2="440" stroke="#AED581" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>