<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#374151"/>
  <!-- Layer 2: Three status circles (traffic light style) -->
  <!-- 200 OK (green) -->
  <circle cx="512" cy="300" r="160" fill="#065F46"/>
  <circle cx="512" cy="300" r="140" fill="#059669"/>
  <text x="512" y="270" font-family="Consolas,monospace" font-size="52" fill="white" text-anchor="middle" font-weight="900">200</text>
  <text x="512" y="326" font-family="Arial,sans-serif" font-size="30" fill="#BBF7D0" text-anchor="middle" font-weight="bold">OK</text>
  <!-- 404 Not Found (orange) -->
  <circle cx="300" cy="680" r="130" fill="#7C2D12"/>
  <circle cx="300" cy="680" r="112" fill="#C2410C"/>
  <text x="300" y="653" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="900">404</text>
  <text x="300" y="700" font-family="Arial,sans-serif" font-size="22" fill="#FDBA74" text-anchor="middle">Not Found</text>
  <!-- 500 Server Error (red) -->
  <circle cx="724" cy="680" r="130" fill="#7F1D1D"/>
  <circle cx="724" cy="680" r="112" fill="#DC2626"/>
  <text x="724" y="653" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="900">500</text>
  <text x="724" y="700" font-family="Arial,sans-serif" font-size="22" fill="#FCA5A5" text-anchor="middle">Server Err</text>
  <!-- Layer 3: Connector lines -->
  <line x1="406" y1="430" x2="300" y2="548" stroke="#6B7280" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="618" y1="430" x2="724" y2="548" stroke="#6B7280" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
</svg>