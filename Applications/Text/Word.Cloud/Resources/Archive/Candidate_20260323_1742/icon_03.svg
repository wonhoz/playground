<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A1A1A"/>
  <!-- Layer 2: 텍스트 파일 → 화살표 → 워드클라우드 변환 -->
  <!-- 텍스트 파일 (왼쪽) -->
  <rect x="60" y="200" width="280" height="340" rx="20" fill="#1A2A2A" stroke="#00BCD4" stroke-width="8"/>
  <!-- 파일 접힌 모서리 -->
  <polygon points="280,200 340,200 340,260 280,260" fill="#0A1A1A"/>
  <polygon points="280,200 340,260 280,260" fill="#1A3A3A" stroke="#00BCD4" stroke-width="4"/>
  <!-- 텍스트 라인들 -->
  <rect x="80" y="260" width="220" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="284" width="200" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="308" width="220" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="332" width="180" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="356" width="220" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="380" width="160" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="404" width="220" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="428" width="200" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="452" width="220" height="10" rx="3" fill="#4DD0E1"/>
  <rect x="80" y="476" width="140" height="10" rx="3" fill="#4DD0E1"/>
  <!-- 파일명 -->
  <text x="200" y="570" font-size="48" fill="#00BCD4" text-anchor="middle" font-family="monospace">text.txt</text>
  <!-- 큰 화살표 -->
  <rect x="380" y="480" width="264" height="60" rx="12" fill="#00BCD4"/>
  <polygon points="644,430 764,510 644,590" fill="#00BCD4"/>
  <text x="512" y="522" font-size="44" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Analyze</text>
  <!-- 워드클라우드 결과 (오른쪽) -->
  <ellipse cx="812" cy="380" rx="200" ry="240" fill="#0D2A2A" stroke="#00BCD4" stroke-width="8"/>
  <!-- 클라우드 안 단어들 -->
  <text x="812" y="310" font-size="68" fill="#00BCD4" text-anchor="middle" font-weight="bold" font-family="Arial">cloud</text>
  <text x="740" y="375" font-size="44" fill="#4DD0E1" text-anchor="middle" font-family="Arial">word</text>
  <text x="880" y="380" font-size="44" fill="#26C6DA" text-anchor="middle" font-family="Arial">text</text>
  <text x="812" y="430" font-size="36" fill="#80DEEA" text-anchor="middle" font-family="Arial">data · freq</text>
  <text x="720" y="480" font-size="28" fill="#4DD0E1" text-anchor="middle" font-family="Arial">love</text>
  <text x="900" y="470" font-size="28" fill="#26C6DA" text-anchor="middle" font-family="Arial">happy</text>
  <text x="812" y="510" font-size="24" fill="#80DEEA" text-anchor="middle" font-family="Arial">dream · hope</text>
  <!-- Layer 3: 처리 단계 표시 -->
  <text x="200" y="680" font-size="36" fill="#00838F" text-anchor="middle" font-family="Arial">Input</text>
  <text x="512" y="680" font-size="36" fill="#00838F" text-anchor="middle" font-family="Arial">Process</text>
  <text x="812" y="680" font-size="36" fill="#00838F" text-anchor="middle" font-family="Arial">Output</text>
</svg>
