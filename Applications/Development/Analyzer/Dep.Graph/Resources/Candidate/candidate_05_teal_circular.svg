<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- circular layout edges -->
  <g stroke="#2dd4bf" stroke-width="2.5" opacity="0.5">
    <line x1="256" y1="110" x2="390" y2="180"/>
    <line x1="390" y1="180" x2="420" y2="310"/>
    <line x1="420" y1="310" x2="340" y2="420"/>
    <line x1="340" y1="420" x2="172" y2="420"/>
    <line x1="172" y1="420" x2="92" y2="310"/>
    <line x1="92" y1="310" x2="122" y2="180"/>
    <line x1="122" y1="180" x2="256" y2="110"/>
    <!-- cross connections -->
    <line x1="256" y1="110" x2="420" y2="310"/>
    <line x1="256" y1="110" x2="172" y2="420"/>
    <line x1="390" y1="180" x2="92" y2="310"/>
    <line x1="340" y1="420" x2="122" y2="180"/>
    <!-- to center -->
    <line x1="256" y1="256" x2="256" y2="110"/>
    <line x1="256" y1="256" x2="390" y2="180"/>
    <line x1="256" y1="256" x2="420" y2="310"/>
    <line x1="256" y1="256" x2="340" y2="420"/>
    <line x1="256" y1="256" x2="172" y2="420"/>
    <line x1="256" y1="256" x2="92" y2="310"/>
    <line x1="256" y1="256" x2="122" y2="180"/>
  </g>
  <!-- center -->
  <circle cx="256" cy="256" r="32" fill="#134e4a" stroke="#14b8a6" stroke-width="4"/>
  <text x="256" y="256" font-family="monospace" font-size="16" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">ROOT</text>
  <!-- outer nodes -->
  <circle cx="256" cy="110" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="390" cy="180" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="420" cy="310" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="340" cy="420" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="172" cy="420" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="92" cy="310" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
  <circle cx="122" cy="180" r="20" fill="#115e59" stroke="#2dd4bf" stroke-width="3"/>
</svg>
