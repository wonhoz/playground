<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 짙은 초록 -->
  <rect width="1024" height="1024" rx="190" fill="#33691E"/>

  <!-- 3×3 크로스워드 그리드 (중앙) -->
  <!-- 그리드: x=212, y=212, 셀=200px, 총 600×600 -->

  <!-- 블랙 셀들 -->
  <rect x="212" y="212" width="200" height="200" fill="#1A1A1A"/>
  <rect x="612" y="412" width="200" height="200" fill="#1A1A1A"/>
  <rect x="212" y="612" width="200" height="200" fill="#1A1A1A"/>

  <!-- 흰 셀들 -->
  <rect x="412" y="212" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>
  <rect x="612" y="212" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>
  <rect x="212" y="412" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>
  <rect x="412" y="412" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>
  <rect x="412" y="612" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>
  <rect x="612" y="612" width="200" height="200" fill="white" stroke="#A5D6A7" stroke-width="5"/>

  <!-- 힌트 번호 -->
  <text x="418" y="248" font-family="Arial" font-size="42" font-weight="bold" fill="#4CAF50">1</text>
  <text x="618" y="248" font-family="Arial" font-size="42" font-weight="bold" fill="#4CAF50">2</text>
  <text x="218" y="448" font-family="Arial" font-size="42" font-weight="bold" fill="white">3</text>

  <!-- 셀 안 알파벳 -->
  <text x="512" y="360" font-family="Arial Black" font-size="110" font-weight="bold" fill="#33691E" text-anchor="middle">W</text>
  <text x="712" y="360" font-family="Arial Black" font-size="110" font-weight="bold" fill="#33691E" text-anchor="middle">I</text>
  <text x="312" y="560" font-family="Arial Black" font-size="110" font-weight="bold" fill="#1A1A1A" text-anchor="middle">N</text>
  <text x="512" y="560" font-family="Arial Black" font-size="110" font-weight="bold" fill="#1A1A1A" text-anchor="middle">O</text>
  <text x="512" y="760" font-family="Arial Black" font-size="110" font-weight="bold" fill="#33691E" text-anchor="middle">R</text>
  <text x="712" y="760" font-family="Arial Black" font-size="110" font-weight="bold" fill="#33691E" text-anchor="middle">D</text>

  <!-- 완성 표시: 초록 체크 별 -->
  <text x="512" y="175" font-family="Arial" font-size="80" fill="#76FF03" text-anchor="middle">★ ★ ★</text>

  <!-- 그리드 외곽 테두리 -->
  <rect x="212" y="212" width="600" height="600" fill="none" stroke="#76FF03" stroke-width="8"/>
</svg>
