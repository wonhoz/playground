<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee0979"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56ab2f"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="230" cy="270" r="155" fill="url(#globeGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Latitude lines -->
  <ellipse cx="230" cy="270" rx="155" ry="50" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="230" cy="220" rx="130" ry="40" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="230" cy="320" rx="130" ry="40" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Longitude lines -->
  <path d="M230,115 Q290,270 230,425" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <path d="M230,115 Q170,270 230,425" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <path d="M75,270 Q230,310 385,270" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Globe outline -->
  <circle cx="230" cy="270" r="155" fill="none" stroke="#56CCF2" stroke-width="3" opacity="0.6"/>
  <!-- Speech bubble 1 (top right) -->
  <rect x="320" y="80" width="140" height="75" rx="18" fill="url(#bubble1)"/>
  <polygon points="340,155 360,155 350,175" fill="url(#bubble1)"/>
  <!-- Dots inside bubble 1 -->
  <rect x="335" y="100" width="50" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="335" y="116" width="35" height="8" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="335" y="132" width="44" height="8" rx="4" fill="#fff" opacity="0.7"/>
  <!-- Speech bubble 2 (right) -->
  <rect x="340" y="210" width="130" height="70" rx="18" fill="url(#bubble2)"/>
  <polygon points="340,240 320,250 340,260" fill="url(#bubble2)"/>
  <rect x="355" y="228" width="45" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="355" y="244" width="60" height="8" rx="4" fill="#fff" opacity="0.6"/>
  <!-- Speech bubble 3 (top left) -->
  <rect x="50" y="100" width="120" height="70" rx="18" fill="url(#bubble3)"/>
  <polygon points="140,170 160,170 150,190" fill="url(#bubble3)"/>
  <rect x="65" y="118" width="40" height="8" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="65" y="134" width="55" height="8" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="65" y="150" width="30" height="8" rx="4" fill="#fff" opacity="0.7"/>
  <!-- Highlight on globe -->
  <ellipse cx="185" cy="210" rx="45" ry="30" fill="white" opacity="0.12"/>
</svg>
