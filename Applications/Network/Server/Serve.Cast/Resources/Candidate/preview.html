<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Serve.Cast — 아이콘 후보</title>
  <style>
    body { background:#1a1a1a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:32px; }
    h1 { font-size:22px; margin-bottom:8px; color:#4fc3f7; letter-spacing:2px; }
    p  { color:#888; font-size:13px; margin-bottom:28px; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
    .card { background:#242424; border-radius:12px; padding:20px; text-align:center; border:1px solid #333; }
    .card img { width:120px; height:120px; border-radius:12px; }
    .card span { display:block; margin-top:10px; font-size:11px; color:#888; word-break:break-all; }
  </style>
</head>
<body>
  <h1>Serve.Cast</h1>
  <p>로컬 정적 파일 서버 — 아이콘 후보 10종</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_blue_server_tower.svg"/><span>01 · blue server tower</span></div>
    <div class="card"><img src="candidate_02_orange_broadcast_signal.svg"/><span>02 · orange broadcast signal</span></div>
    <div class="card"><img src="candidate_03_green_folder_network.svg"/><span>03 · green folder network</span></div>
    <div class="card"><img src="candidate_04_purple_globe_serve.svg"/><span>04 · purple globe serve</span></div>
    <div class="card"><img src="candidate_05_teal_terminal_http.svg"/><span>05 · teal terminal http</span></div>
    <div class="card"><img src="candidate_06_red_rocket_deploy.svg"/><span>06 · red rocket deploy</span></div>
    <div class="card"><img src="candidate_07_gold_database_cast.svg"/><span>07 · gold database cast</span></div>
    <div class="card"><img src="candidate_08_cyan_wifi_file.svg"/><span>08 · cyan wifi file</span></div>
    <div class="card"><img src="candidate_09_pink_cloud_upload.svg"/><span>09 · pink cloud upload</span></div>
    <div class="card"><img src="candidate_10_indigo_hexagon_network.svg"/><span>10 · indigo hexagon network</span></div>
  </div>
</body>
</html>
