<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor · 대각선/동적 · 사진 → 폴더 이동 (컨베이어 느낌) -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFF9C4"/>
  <!-- 좌측: 사진 스택 (원본) -->
  <g>
    <g transform="rotate(-4 180 560)">
      <rect x="100" y="460" width="260" height="200" rx="18" fill="#FFFFFF" stroke="#BF360C" stroke-width="14"/>
      <rect x="114" y="474" width="232" height="150" fill="#3A86FF"/>
      <circle cx="310" cy="510" r="22" fill="#FFD93D"/>
    </g>
    <g transform="rotate(6 160 620)">
      <rect x="80" y="520" width="260" height="200" rx="18" fill="#FFFFFF" stroke="#BF360C" stroke-width="14"/>
      <rect x="94" y="534" width="232" height="150" fill="#FF6B9D"/>
    </g>
    <g>
      <rect x="90" y="600" width="260" height="200" rx="18" fill="#FFFFFF" stroke="#BF360C" stroke-width="14"/>
      <rect x="104" y="614" width="232" height="150" fill="#4CAF50"/>
      <path d="M 104 764 L 160 714 L 220 740 L 280 700 L 336 730 L 336 764 Z" fill="#1B5E20"/>
    </g>
  </g>
  <!-- 대각선 화살표 (이동) -->
  <g>
    <path d="M 400 620 L 680 380" stroke="#FF6B35" stroke-width="40" stroke-linecap="round"/>
    <path d="M 630 360 L 710 360 L 710 440" fill="none" stroke="#FF6B35" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- 우측 상단: 폴더 (목적지) -->
  <g>
    <path d="M 660 280 L 780 280 L 820 240 L 960 240 Q 980 240 980 260 L 980 500 Q 980 520 960 520 L 660 520 Q 640 520 640 500 L 640 300 Q 640 280 660 280 Z" fill="#FFD93D" stroke="#BF360C" stroke-width="16"/>
    <text x="810" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#BF360C" text-anchor="middle">13</text>
  </g>
  <!-- 하단 라벨 -->
  <rect x="192" y="840" width="640" height="120" rx="36" fill="#BF360C"/>
  <text x="512" y="920" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFD93D" text-anchor="middle">ORGANIZE</text>
</svg>
