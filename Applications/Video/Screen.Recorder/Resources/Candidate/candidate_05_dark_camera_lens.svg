<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="lens" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="40%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#01205A"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="60" y="160" width="340" height="220" rx="20" fill="#222"/>
  <rect x="60" y="160" width="340" height="50" rx="20" fill="#2A2A2A"/>
  <rect x="60" y="192" width="340" height="18" fill="#2A2A2A"/>
  <!-- Viewfinder -->
  <rect x="300" y="128" width="80" height="50" rx="10" fill="#2A2A2A" stroke="#444" stroke-width="2"/>
  <!-- Shutter button -->
  <circle cx="360" cy="165" r="18" fill="#444"/>
  <circle cx="360" cy="165" r="12" fill="#FF1744"/>
  <!-- Lens housing -->
  <circle cx="220" cy="280" r="120" fill="url(#chrome)"/>
  <circle cx="220" cy="280" r="104" fill="#1A1A1A"/>
  <circle cx="220" cy="280" r="90" fill="url(#lens)"/>
  <!-- Iris blades -->
  <g opacity="0.25" fill="#000">
    <ellipse cx="220" cy="230" rx="18" ry="50" transform="rotate(0,220,280)"/>
    <ellipse cx="220" cy="230" rx="18" ry="50" transform="rotate(45,220,280)"/>
    <ellipse cx="220" cy="230" rx="18" ry="50" transform="rotate(90,220,280)"/>
    <ellipse cx="220" cy="230" rx="18" ry="50" transform="rotate(135,220,280)"/>
  </g>
  <circle cx="220" cy="280" r="42" fill="url(#iris)"/>
  <!-- Lens reflection -->
  <ellipse cx="200" cy="258" rx="18" ry="12" fill="white" opacity="0.12" transform="rotate(-30,200,258)"/>
  <!-- REC dot -->
  <circle cx="370" cy="210" r="12" fill="#FF1744"/>
</svg>
