<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="20%" stop-color="#FF9800"/>
      <stop offset="40%" stop-color="#FFEB3B"/>
      <stop offset="60%" stop-color="#4CAF50"/>
      <stop offset="80%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Rainbow arc -->
  <path d="M64 380 Q64 160 256 160 Q448 160 448 380" stroke="url(#rainbow)" stroke-width="28" fill="none" opacity="0.3"/>
  <path d="M80 380 Q80 186 256 186 Q432 186 432 380" stroke="url(#rainbow)" stroke-width="16" fill="none" opacity="0.5"/>
  <path d="M96 380 Q96 210 256 210 Q416 210 416 380" stroke="url(#rainbow)" stroke-width="8" fill="none" opacity="0.4"/>
  <!-- Ground -->
  <ellipse cx="256" cy="440" rx="220" ry="30" fill="#A5D6A7" opacity="0.7"/>
  <!-- Flowers row -->
  <!-- Flower 1 (red) -->
  <line x1="120" y1="440" x2="120" y2="360" stroke="#388E3C" stroke-width="4"/>
  <circle cx="120" cy="350" r="24" fill="#EF5350"/>
  <circle cx="120" cy="350" r="12" fill="#FFD740"/>
  <!-- Flower 2 (orange) -->
  <line x1="190" y1="440" x2="190" y2="350" stroke="#388E3C" stroke-width="4"/>
  <circle cx="190" cy="338" r="22" fill="#FF9800"/>
  <circle cx="190" cy="338" r="10" fill="#FFF176"/>
  <!-- Flower 3 (yellow/center) -->
  <line x1="256" y1="440" x2="256" y2="335" stroke="#388E3C" stroke-width="5"/>
  <circle cx="256" cy="320" r="28" fill="#FFEB3B"/>
  <circle cx="256" cy="320" r="14" fill="#FF8F00"/>
  <!-- Flower 4 (blue) -->
  <line x1="322" y1="440" x2="322" y2="350" stroke="#388E3C" stroke-width="4"/>
  <circle cx="322" cy="338" r="22" fill="#2196F3"/>
  <circle cx="322" cy="338" r="10" fill="#E3F2FD"/>
  <!-- Flower 5 (purple) -->
  <line x1="392" y1="440" x2="392" y2="360" stroke="#388E3C" stroke-width="4"/>
  <circle cx="392" cy="350" r="24" fill="#9C27B0"/>
  <circle cx="392" cy="350" r="12" fill="#F3E5F5"/>
  <!-- Leaves on stems -->
  <path d="M120 400 Q100 385 92 370" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M256 390 Q240 370 234 356" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M256 390 Q272 370 278 356" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Butterflies -->
  <path d="M160 290 Q172 278 180 290 Q172 302 160 290" fill="#FF9800" opacity="0.6"/>
  <path d="M160 290 Q148 278 140 290 Q148 302 160 290" fill="#FFEB3B" opacity="0.6"/>
  <path d="M360 270 Q372 258 380 270 Q372 282 360 270" fill="#9C27B0" opacity="0.6"/>
  <path d="M360 270 Q348 258 340 270 Q348 282 360 270" fill="#2196F3" opacity="0.6"/>
  <!-- Clouds -->
  <ellipse cx="130" cy="100" rx="50" ry="28" fill="white" opacity="0.7"/>
  <ellipse cx="150" cy="90" rx="40" ry="24" fill="white" opacity="0.7"/>
  <ellipse cx="108" cy="90" rx="36" ry="22" fill="white" opacity="0.7"/>
</svg>
