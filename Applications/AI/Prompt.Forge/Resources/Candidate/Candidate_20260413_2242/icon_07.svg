<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="72" y="128" width="880" height="546" rx="48" fill="#FFFFFF" stroke="#01579B" stroke-width="16"/>
  <!-- Template card (left) -->
  <rect x="104" y="166" width="330" height="400" rx="28" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="14"/>
  <text x="269" y="256" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#7B1FA2" text-anchor="middle">TEMPLATE</text>
  <!-- Variable fields -->
  <rect x="130" y="280" width="278" height="58" rx="16" fill="#FFFFFF" stroke="#9B59B6" stroke-width="10"/>
  <text x="183" y="319" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9B59B6">{{name}}</text>
  <rect x="130" y="356" width="278" height="58" rx="16" fill="#FFFFFF" stroke="#9B59B6" stroke-width="10"/>
  <text x="183" y="395" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9B59B6">{{task}}</text>
  <rect x="130" y="432" width="278" height="58" rx="16" fill="#FFFFFF" stroke="#9B59B6" stroke-width="10"/>
  <text x="183" y="471" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#9B59B6">{{tone}}</text>
  <!-- Arrow -->
  <rect x="474" y="370" width="80" height="40" rx="18" fill="#0288D1" stroke="#01579B" stroke-width="12"/>
  <path d="M 548,334 L 608,390 L 548,446 Z" fill="#0288D1" stroke="#01579B" stroke-width="12" stroke-linejoin="round"/>
  <!-- Filled prompt (right) -->
  <rect x="640" y="166" width="380" height="400" rx="28" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <text x="748" y="248" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#1B5E20" text-anchor="middle">RESULT</text>
  <rect x="664" y="272" width="330" height="16" rx="8" fill="#66BB6A" opacity="0.7"/>
  <rect x="664" y="302" width="290" height="16" rx="8" fill="#66BB6A" opacity="0.6"/>
  <rect x="664" y="332" width="310" height="16" rx="8" fill="#66BB6A" opacity="0.55"/>
  <rect x="664" y="362" width="270" height="16" rx="8" fill="#66BB6A" opacity="0.5"/>
  <rect x="664" y="392" width="300" height="16" rx="8" fill="#66BB6A" opacity="0.45"/>
  <rect x="664" y="422" width="260" height="16" rx="8" fill="#66BB6A" opacity="0.4"/>
  <rect x="664" y="452" width="280" height="16" rx="8" fill="#66BB6A" opacity="0.35"/>
  <!-- FILL badge -->
  <rect x="104" y="758" width="280" height="104" rx="36" fill="#01579B" stroke="#003A72" stroke-width="14"/>
  <text x="244" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">FILL</text>
  <!-- VARS badge -->
  <rect x="440" y="758" width="512" height="104" rx="36" fill="#388E3C" stroke="#1B5E20" stroke-width="14"/>
  <text x="696" y="829" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle">VARS</text>
</svg>
