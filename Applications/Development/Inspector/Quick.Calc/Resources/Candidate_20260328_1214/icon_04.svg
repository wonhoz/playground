<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg4)"/>
  <!-- Layer 2: 키보드 키캡 2개 -->
  <!-- Win 키 -->
  <rect x="88" y="300" width="376" height="424" rx="48" fill="#1976D2"/>
  <rect x="100" y="312" width="352" height="400" rx="40" fill="#1E88E5"/>
  <!-- Win 로고 (4분할 격자) -->
  <rect x="168" y="390" width="90" height="90" rx="10" fill="white"/>
  <rect x="274" y="390" width="90" height="90" rx="10" fill="white"/>
  <rect x="168" y="498" width="90" height="90" rx="10" fill="white"/>
  <rect x="274" y="498" width="90" height="90" rx="10" fill="white"/>
  <text x="276" y="682" font-family="Arial" font-size="60" fill="#E3F2FD" text-anchor="middle" opacity="0.8">Win</text>

  <!-- + 연결 기호 -->
  <text x="512" y="550" font-family="Arial Black" font-size="160" fill="#00838F" text-anchor="middle" font-weight="900">+</text>

  <!-- K 키 -->
  <rect x="560" y="300" width="376" height="424" rx="48" fill="#00838F"/>
  <rect x="572" y="312" width="352" height="400" rx="40" fill="#0097A7"/>
  <text x="748" y="572" font-family="Arial Black" font-size="260" fill="white" text-anchor="middle" font-weight="900">K</text>

  <!-- Layer 3: 단축키 설명 + 화살표 -->
  <rect x="200" y="780" width="624" height="90" rx="28" fill="#006064" opacity="0.85"/>
  <text x="512" y="840" font-family="Arial" font-size="60" fill="white" text-anchor="middle" font-weight="bold">opens calculator</text>
</svg>
