<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 거울 반사 — 원본 이미지와 ASCII 반사 | 공간/장면 | #1E0028 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E0028"/>
  <!-- Layer 2: Mirror split scene -->
  <!-- Mirror dividing line -->
  <line x1="512" y1="180" x2="512" y2="840" stroke="#CC88FF" stroke-width="6"/>
  <!-- Mirror frame top -->
  <rect x="498" y="180" width="28" height="660" rx="4" fill="#2A0044" stroke="#CC88FF" stroke-width="3"/>
  <!-- Mirror glare effect -->
  <line x1="514" y1="190" x2="524" y2="350" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Left side: Original photo (camera icon + landscape) -->
  <text x="340" y="230" font-family="Arial,sans-serif" font-size="16" fill="#AA66DD" text-anchor="middle">원본 이미지</text>
  <!-- Photo frame -->
  <rect x="200" y="250" width="280" height="200" rx="8" fill="#2A1040" stroke="#7C3AED" stroke-width="3"/>
  <!-- Landscape in photo -->
  <!-- Sky -->
  <rect x="202" y="252" width="276" height="130" rx="6" fill="#1A1060"/>
  <circle cx="300" cy="300" r="30" fill="#FFD700" opacity="0.7"/>
  <!-- Mountains -->
  <polygon points="202,382 260,312 318,382" fill="#3A0050" opacity="0.8"/>
  <polygon points="270,382 340,306 410,382" fill="#4A0060" opacity="0.8"/>
  <polygon points="358,382 430,316 478,382" fill="#3A0050" opacity="0.8"/>
  <!-- Ground in photo -->
  <rect x="202" y="382" width="276" height="68" rx="0" fill="#1A0020"/>
  <!-- Photo caption -->
  <text x="340" y="478" font-family="monospace" font-size="12" fill="#AA66DD" text-anchor="middle">landscape.jpg (640×480)</text>
  <!-- Left side body text section (rest of original) -->
  <rect x="210" y="500" width="264" height="300" rx="6" fill="#1A0830" stroke="#5B21B6" stroke-width="1" opacity="0.5"/>
  <text x="342" y="528" font-family="monospace" font-size="10" fill="#7C3AED" text-anchor="middle" opacity="0.5">(이미지 픽셀 데이터)</text>
  <!-- Right side: ASCII Art reflection -->
  <text x="680" y="230" font-family="Arial,sans-serif" font-size="16" fill="#CC88FF" text-anchor="middle">ASCII 변환 결과</text>
  <!-- ASCII art box (mirrored size) -->
  <rect x="528" y="250" width="280" height="200" rx="8" fill="#140020" stroke="#9333EA" stroke-width="3"/>
  <!-- ASCII landscape content -->
  <text x="538" y="278" font-family="monospace" font-size="9.5" fill="#CC88FF">......░░░░░░░░░░░░░░░....</text>
  <text x="538" y="292" font-family="monospace" font-size="9.5" fill="#CC88FF">....░░░▒▒▒ * ▒▒▒░░░░...</text>
  <text x="538" y="306" font-family="monospace" font-size="9.5" fill="#CC88FF">...░▒▒▓▓ ☀ ▓▓▒▒░░░...</text>
  <text x="538" y="320" font-family="monospace" font-size="9.5" fill="#CC88FF">....░░░░░░░░░░░░░░░.....</text>
  <text x="538" y="334" font-family="monospace" font-size="9.5" fill="#9A66BB">..░░░░░░░░░░░░░░░░░░...</text>
  <text x="538" y="348" font-family="monospace" font-size="9.5" fill="#9A66BB">.░▒▒ /\ ░░░░ /\ ░░░░▒.</text>
  <text x="538" y="362" font-family="monospace" font-size="9.5" fill="#9A66BB">░▒▓/ \▒░░░ / \░░▒▓▒░</text>
  <text x="538" y="376" font-family="monospace" font-size="9.5" fill="#7A5599">▓█/ V \█▒░ /  V\▒░▒▓</text>
  <text x="538" y="390" font-family="monospace" font-size="9.5" fill="#7A5599">███████████████████████</text>
  <text x="538" y="404" font-family="monospace" font-size="9.5" fill="#5A3A77">███████████████████████</text>
  <text x="538" y="418" font-family="monospace" font-size="9.5" fill="#3A2255">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</text>
  <text x="538" y="432" font-family="monospace" font-size="9.5" fill="#2A1A44">▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒</text>
  <text x="538" y="446" font-family="monospace" font-size="9.5" fill="#1A0A33">░░░░░░░░░░░░░░░░░░░░░</text>
  <!-- ASCII art caption -->
  <text x="668" y="478" font-family="monospace" font-size="12" fill="#CC88FF" text-anchor="middle">80×24 chars (텍스트)</text>
  <!-- Right body section (ASCII data) -->
  <rect x="528" y="500" width="264" height="300" rx="6" fill="#100018" stroke="#5B21B6" stroke-width="1" opacity="0.5"/>
  <text x="540" y="520" font-family="monospace" font-size="9" fill="#7C3AED" opacity="0.7">░▒▓█▓▒░░▒▒▒▓▓▒░░....</text>
  <text x="540" y="536" font-family="monospace" font-size="9" fill="#7C3AED" opacity="0.6">.░░▒▒▓▓▓▒▒░░ + . ..</text>
  <text x="540" y="552" font-family="monospace" font-size="9" fill="#7C3AED" opacity="0.5">..░▒▓▒░ + . . . . ..</text>
  <!-- Layer 3: Conversion quality label at bottom -->
  <rect x="250" y="820" width="524" height="44" rx="8" fill="#140020" stroke="#7C3AED" stroke-width="2"/>
  <text x="512" y="847" font-family="monospace" font-size="14" fill="#CC88FF" text-anchor="middle">1px → 1char  |  품질: 高 ▰▰▰▰▱</text>
</svg>
