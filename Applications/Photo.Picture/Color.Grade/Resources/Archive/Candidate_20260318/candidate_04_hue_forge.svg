<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <linearGradient id="hue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="25%" style="stop-color:#FFD166"/>
      <stop offset="50%" style="stop-color:#06D6A0"/>
      <stop offset="75%" style="stop-color:#118AB2"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 색상환 -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#hue)" stroke-width="30" opacity="0.7"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#hue)" stroke-width="20" opacity="0.4"/>
  <!-- 중앙 단조기 (색조 조절) -->
  <circle cx="256" cy="256" r="50" fill="#A78BFA" opacity="0.15"/>
  <circle cx="256" cy="256" r="36" fill="#A78BFA" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="22" fill="#A78BFA" opacity="0.7" filter="url(#glow)"/>
  <!-- 색조 바늘 -->
  <line x1="256" y1="256" x2="256" y2="116" stroke="white" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="116" r="7" fill="white" opacity="0.9"/>
  <!-- 채도 슬라이더 -->
  <rect x="100" y="430" width="312" height="12" rx="6" fill="url(#hue)" opacity="0.7"/>
  <circle cx="256" cy="436" r="10" fill="white" opacity="0.9" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="80" y="420" fill="#A78BFA" font-size="10" font-family="monospace" opacity="0.6">Hue</text>
  <text x="256" y="480" text-anchor="middle" fill="#A78BFA" font-size="13" font-family="monospace" opacity="0.7">HUE FORGE</text>
</svg>