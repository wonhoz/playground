<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#330a5c"/>
    </linearGradient>
    <linearGradient id="reel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c471f5"/>
      <stop offset="100%" stop-color="#fa71cd"/>
    </linearGradient>
    <linearGradient id="cal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Film reel outer ring -->
  <circle cx="200" cy="256" r="150" fill="none" stroke="url(#reel)" stroke-width="12" filter="url(#glow)"/>
  <circle cx="200" cy="256" r="130" fill="#1a0533" opacity="0.8"/>
  <!-- Reel spokes -->
  <line x1="200" y1="126" x2="200" y2="386" stroke="url(#reel)" stroke-width="6" opacity="0.5"/>
  <line x1="70" y1="256" x2="330" y2="256" stroke="url(#reel)" stroke-width="6" opacity="0.5"/>
  <line x1="108" y1="164" x2="292" y2="348" stroke="url(#reel)" stroke-width="6" opacity="0.5"/>
  <line x1="108" y1="348" x2="292" y2="164" stroke="url(#reel)" stroke-width="6" opacity="0.5"/>
  <!-- Reel hub -->
  <circle cx="200" cy="256" r="40" fill="url(#reel)" filter="url(#glow)"/>
  <circle cx="200" cy="256" r="20" fill="#1a0533"/>
  <!-- Holes in reel -->
  <circle cx="200" cy="180" r="18" fill="url(#reel)" opacity="0.6"/>
  <circle cx="200" cy="332" r="18" fill="url(#reel)" opacity="0.6"/>
  <circle cx="127" cy="218" r="18" fill="url(#reel)" opacity="0.6"/>
  <circle cx="127" cy="294" r="18" fill="url(#reel)" opacity="0.6"/>
  <circle cx="273" cy="218" r="18" fill="url(#reel)" opacity="0.6"/>
  <circle cx="273" cy="294" r="18" fill="url(#reel)" opacity="0.6"/>
  <!-- Calendar overlay -->
  <rect x="300" y="160" width="152" height="152" rx="14" fill="#1a0533" opacity="0.95"/>
  <rect x="300" y="160" width="152" height="40" rx="14" fill="url(#cal)"/>
  <rect x="300" y="188" width="152" height="12" fill="url(#cal)"/>
  <!-- Calendar dots -->
  <circle cx="322" cy="224" r="6" fill="white" opacity="0.6"/>
  <circle cx="346" cy="224" r="6" fill="white" opacity="0.6"/>
  <circle cx="370" cy="224" r="6" fill="white" opacity="0.6"/>
  <circle cx="394" cy="224" r="6" fill="white" opacity="0.6"/>
  <circle cx="418" cy="224" r="6" fill="white" opacity="0.6"/>
  <circle cx="322" cy="250" r="6" fill="#ffd200" opacity="0.9"/>
  <circle cx="346" cy="250" r="6" fill="white" opacity="0.6"/>
  <circle cx="370" cy="250" r="6" fill="white" opacity="0.6"/>
  <circle cx="394" cy="250" r="6" fill="white" opacity="0.6"/>
  <circle cx="322" cy="276" r="6" fill="white" opacity="0.6"/>
  <circle cx="346" cy="276" r="6" fill="white" opacity="0.6"/>
  <circle cx="370" cy="276" r="6" fill="#c471f5" opacity="0.9"/>
  <circle cx="394" cy="276" r="6" fill="white" opacity="0.6"/>
  <circle cx="418" cy="276" r="6" fill="white" opacity="0.6"/>
  <circle cx="322" cy="302" r="6" fill="white" opacity="0.6"/>
  <circle cx="346" cy="302" r="6" fill="white" opacity="0.6"/>
</svg>