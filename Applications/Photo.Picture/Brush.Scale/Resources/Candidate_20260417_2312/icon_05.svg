<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="lens05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 돋보기 -->
  <!-- 렌즈 -->
  <circle cx="430" cy="430" r="240" fill="url(#lens05)" stroke="#1565C0" stroke-width="56"/>
  <!-- 손잡이 -->
  <line x1="624" y1="624" x2="800" y2="800" stroke="#1565C0" stroke-width="80" stroke-linecap="round"/>
  <!-- 렌즈 안 배율 텍스트 -->
  <text x="430" y="480" font-family="Arial Black, Arial, sans-serif" font-size="180" font-weight="900" fill="#0D47A1" text-anchor="middle">4x</text>
  <!-- Layer 3: 상단 해상도 포인트 -->
  <text x="512" y="880" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="#0D47A1" text-anchor="middle" opacity="0.85">HD ↑</text>
</svg>
