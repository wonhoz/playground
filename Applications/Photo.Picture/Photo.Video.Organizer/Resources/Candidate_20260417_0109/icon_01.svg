<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="cal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: Calendar main body -->
  <rect x="148" y="180" width="728" height="664" rx="24" fill="white" stroke="#EF9A9A" stroke-width="8"/>
  <!-- Calendar header (red) -->
  <rect x="148" y="180" width="728" height="140" rx="24" fill="url(#cal1)"/>
  <rect x="148" y="280" width="728" height="40" fill="url(#cal1)"/>
  <!-- Month label -->
  <text x="512" y="272" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" fill="white" text-anchor="middle">JAN 2024</text>
  <!-- Ring holes -->
  <circle cx="310" cy="176" r="28" fill="#B71C1C"/>
  <circle cx="714" cy="176" r="28" fill="#B71C1C"/>

  <!-- Day grid 3x3 with photo thumbnails -->
  <!-- Row 1 -->
  <rect x="178" y="336" width="192" height="148" rx="12" fill="#FFCDD2"/>
  <!-- Mountain photo -->
  <rect x="178" y="336" width="192" height="90" fill="#81D4FA"/>
  <circle cx="240" cy="376" r="28" fill="#FFD600"/>
  <path d="M178,390 L220,345 L260,370 L300,330 L370,384 L370,426 L178,426 Z" fill="#4CAF50" opacity="0.7"/>
  <text x="274" y="476" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">01</text>

  <rect x="390" y="336" width="192" height="148" rx="12" fill="#FCE4EC"/>
  <!-- Beach photo -->
  <rect x="390" y="336" width="192" height="90" fill="#B3E5FC"/>
  <path d="M390,390 L440,360 L490,380 L540,355 L582,385 L582,426 L390,426 Z" fill="#FF8F00" opacity="0.7"/>
  <text x="486" y="476" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">12</text>

  <rect x="602" y="336" width="244" height="148" rx="12" fill="#FFF9C4"/>
  <!-- City photo -->
  <rect x="602" y="336" width="244" height="90" fill="#CFD8DC"/>
  <rect x="630" y="360" width="36" height="66" fill="#607D8B"/>
  <rect x="678" y="348" width="36" height="78" fill="#546E7A"/>
  <rect x="726" y="356" width="36" height="70" fill="#607D8B"/>
  <rect x="774" y="345" width="36" height="81" fill="#455A64"/>
  <text x="724" y="476" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">25</text>

  <!-- Row 2 — simpler colored photo boxes -->
  <rect x="178" y="504" width="192" height="148" rx="12" fill="#E8F5E9"/>
  <rect x="178" y="504" width="192" height="90" fill="#A5D6A7"/>
  <text x="274" y="644" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">07</text>

  <rect x="390" y="504" width="192" height="148" rx="12" fill="#E3F2FD"/>
  <rect x="390" y="504" width="192" height="90" fill="#90CAF9"/>
  <text x="486" y="644" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">18</text>

  <rect x="602" y="504" width="244" height="148" rx="12" fill="#F3E5F5"/>
  <rect x="602" y="504" width="244" height="90" fill="#CE93D8"/>
  <text x="724" y="644" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#C62828" text-anchor="middle">31</text>

  <!-- Layer 3: Gold folder badge (bottom right) -->
  <circle cx="820" cy="820" r="92" fill="#FFD600" stroke="white" stroke-width="8"/>
  <!-- Folder icon inside -->
  <path d="M760,804 L760,860 L880,860 L880,780 L820,780 L810,804 Z" fill="#F57F17"/>
  <rect x="760" y="804" width="120" height="60" rx="6" fill="#FF8F00"/>
</svg>
