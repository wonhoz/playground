<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1a0a04"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="fireCore" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#EF4444" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#DC2626" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Forge furnace body -->
  <rect x="100" y="250" width="312" height="220" rx="10" fill="#1a0804" stroke="#F97316" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Furnace opening -->
  <ellipse cx="256" cy="250" rx="130" ry="50" fill="#0a0302" stroke="#F97316" stroke-width="3" stroke-opacity="0.7" filter="url(#glow)"/>
  <!-- Inner furnace glow -->
  <ellipse cx="256" cy="260" rx="110" ry="40" fill="#F97316" fill-opacity="0.15" filter="url(#fireglow)"/>
  <ellipse cx="256" cy="268" rx="80" ry="28" fill="#EF4444" fill-opacity="0.12"/>

  <!-- Forge bellows (sides) -->
  <rect x="62" y="310" width="50" height="110" rx="8" fill="#2a0e04" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="400" y="310" width="50" height="110" rx="8" fill="#2a0e04" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Bellows folds -->
  <line x1="70" y1="340" x2="104" y2="340" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="70" y1="360" x2="104" y2="360" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="70" y1="380" x2="104" y2="380" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="408" y1="340" x2="442" y2="340" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="408" y1="360" x2="442" y2="360" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="408" y1="380" x2="442" y2="380" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Fire flames shooting up from furnace -->
  <!-- Main flame 1 -->
  <path d="M256,250 Q240,200 248,150 Q255,110 256,80 Q258,110 265,150 Q273,200 256,250"
    fill="#F97316" fill-opacity="0.4" filter="url(#glow)"/>
  <!-- Main flame 2 (thinner, inner) -->
  <path d="M256,250 Q246,205 252,162 Q256,130 256,90 Q257,130 261,162 Q267,205 256,250"
    fill="#EF4444" fill-opacity="0.5" filter="url(#glow)"/>
  <!-- Inner flame (hottest) -->
  <path d="M256,248 Q250,215 254,185 Q256,160 256,140 Q257,160 259,185 Q262,215 256,248"
    fill="white" fill-opacity="0.2" filter="url(#softglow)"/>

  <!-- Side flames -->
  <path d="M200,248 Q185,215 190,180 Q196,155 195,130 Q200,155 210,180 Q218,210 200,248"
    fill="#EF4444" fill-opacity="0.3" filter="url(#softglow)"/>
  <path d="M312,248 Q328,218 325,183 Q320,157 322,132 Q328,157 336,183 Q345,215 312,248"
    fill="#EF4444" fill-opacity="0.3" filter="url(#softglow)"/>

  <!-- Document floating above forge (being created by fire) -->
  <rect x="185" y="40" width="142" height="100" rx="6" fill="#2a0e04" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glow)"/>
  <!-- Doc fold -->
  <polygon points="293,40 327,40 327,74" fill="#1a0804" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="293" y1="40" x2="327" y2="74" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- PDF label on doc -->
  <rect x="198" y="54" width="50" height="14" rx="7" fill="#F97316" fill-opacity="0.6" filter="url(#softglow)"/>
  <!-- Doc lines -->
  <line x1="198" y1="78" x2="310" y2="78" stroke="#F97316" stroke-width="2" stroke-opacity="0.55" filter="url(#softglow)"/>
  <line x1="198" y1="92" x2="295" y2="92" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="198" y1="106" x2="310" y2="106" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="198" y1="120" x2="280" y2="120" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Sparks -->
  <g filter="url(#fireglow)">
    <circle cx="170" cy="220" r="5" fill="#F97316"/>
    <circle cx="340" cy="210" r="4" fill="#EF4444"/>
    <circle cx="145" cy="185" r="3.5" fill="#DC2626"/>
    <circle cx="365" cy="175" r="3.5" fill="#F97316"/>
    <circle cx="195" cy="165" r="3" fill="#EF4444"/>
    <circle cx="318" cy="158" r="3" fill="#F97316"/>
    <circle cx="225" cy="140" r="2.5" fill="#DC2626"/>
    <circle cx="288" cy="135" r="2.5" fill="#F97316"/>
  </g>
</svg>
