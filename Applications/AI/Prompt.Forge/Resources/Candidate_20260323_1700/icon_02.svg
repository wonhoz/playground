<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C0800"/>
      <stop offset="100%" stop-color="#3D1400"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <rect width="1024" height="1024" rx="190" fill="url(#glow)"/>
  <!-- Layer 2: 채팅 버블 (프롬프트 입력창) -->
  <rect x="80" y="160" width="864" height="600" rx="60" fill="#2A1200"/>
  <rect x="80" y="160" width="864" height="600" rx="60" fill="none" stroke="#F97316" stroke-width="14"/>
  <!-- 꼬리 -->
  <polygon points="200,760 140,840 340,760" fill="#2A1200"/>
  <polygon points="200,760 140,840 340,760" fill="none" stroke="#F97316" stroke-width="14" stroke-linejoin="round"/>
  <!-- Layer 3: 프롬프트 텍스트 -->
  <text x="160" y="390" font-size="120" fill="#FF8C00" font-family="monospace" font-weight="bold">&gt;_</text>
  <text x="160" y="540" font-size="56" fill="#FCD34D" font-family="monospace" opacity="0.9">Write a prompt...</text>
  <!-- 커서 깜빡임 블록 -->
  <rect x="550" y="484" width="36" height="68" rx="4" fill="#FF8C00" opacity="0.8"/>
</svg>
