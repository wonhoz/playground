<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0A00"/>
  <!-- Timeline horizontal line -->
  <line x1="160" y1="512" x2="864" y2="512" stroke="#F9A825" stroke-width="14"/>
  <!-- Milestone flags -->
  <!-- Flag 1 -->
  <line x1="260" y1="512" x2="260" y2="340" stroke="#FFD54F" stroke-width="12" stroke-linecap="round"/>
  <polygon points="260,340 360,370 260,400" fill="#F9A825"/>
  <circle cx="260" cy="512" r="22" fill="#FFD54F"/>
  <!-- Flag 2 -->
  <line x1="440" y1="512" x2="440" y2="280" stroke="#FFD54F" stroke-width="12" stroke-linecap="round"/>
  <polygon points="440,280 540,310 440,340" fill="#FFD54F"/>
  <circle cx="440" cy="512" r="22" fill="#F9A825"/>
  <!-- Flag 3 (achieved — larger) -->
  <line x1="640" y1="512" x2="640" y2="240" stroke="#FFD54F" stroke-width="14" stroke-linecap="round"/>
  <polygon points="640,240 760,278 640,316" fill="#FFD54F"/>
  <circle cx="640" cy="512" r="28" fill="#FFD54F"/>
  <!-- Check mark on flag 3 -->
  <path d="M650,270 L666,292 L696,258" stroke="#0A0A00" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Future milestone (dashed) -->
  <line x1="820" y1="512" x2="820" y2="340" stroke="#F9A825" stroke-width="10" stroke-dasharray="14,8" stroke-linecap="round"/>
  <circle cx="820" cy="512" r="18" fill="none" stroke="#F9A825" stroke-width="8"/>
</svg>