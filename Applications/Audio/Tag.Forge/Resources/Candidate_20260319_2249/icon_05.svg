<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Puzzle pieces assembling album art / metadata -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0A0600"/>
  <!-- 4 puzzle pieces forming album art square -->
  <!-- Piece 1: top-left (filled) -->
  <path d="M180 180 L490 180 L490 340 Q510 340 510 360 Q510 380 490 380 L490 490 L330 490 Q330 510 310 510 Q290 510 290 490 L180 490 Z" fill="#E65100"/>
  <!-- Piece 2: top-right (filled) -->
  <path d="M534 180 L844 180 L844 490 L694 490 Q694 510 674 510 Q654 510 654 490 L534 490 L534 380 Q514 380 514 360 Q514 340 534 340 Z" fill="#BF360C"/>
  <!-- Piece 3: bottom-left (filled) -->
  <path d="M180 534 L290 534 Q290 514 310 514 Q330 514 330 534 L490 534 L490 844 L180 844 Z" fill="#FF7043"/>
  <!-- Piece 4: bottom-right (partially unfilled = being placed) -->
  <path d="M534 534 L654 534 Q654 514 674 514 Q694 514 694 534 L844 534 L844 844 L534 844 Z" fill="#BF360C" opacity="0.4" stroke="#FF7043" stroke-width="14" stroke-dasharray="20 10"/>
  <!-- Music note in assembled area (overlap) -->
  <rect x="460" y="340" width="28" height="200" rx="8" fill="#FFCCBC"/>
  <ellipse cx="444" cy="540" rx="50" ry="36" fill="#FFCCBC" transform="rotate(-12, 444, 540)"/>
  <path d="M488 340 L570 314 L570 344 L488 370 Z" fill="#FFCCBC"/>
  <!-- Corner snap indicator (placing piece 4) -->
  <path d="M820 820 L844 820 L844 844" fill="none" stroke="#FF7043" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
