<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1C1C1C"/>
    </linearGradient>
    <linearGradient id="seqRead" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="seqWrite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="rndRead" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="rndWrite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Title -->
  <text x="256" y="70" font-family="monospace" font-size="16" fill="#E2E8F0" text-anchor="middle" font-weight="bold">Drive Benchmark</text>
  <!-- Seq Read bar: 5542 / 7000 = 79% -->
  <text x="80" y="122" font-family="monospace" font-size="12" fill="#7DD3FC">Seq Read</text>
  <rect x="196" y="108" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="108" width="202" height="24" rx="4" fill="url(#seqRead)"/>
  <text x="406" y="125" font-family="monospace" font-size="11" fill="#7DD3FC">5,542 MB/s</text>
  <!-- Seq Write bar: 4128 / 7000 = 59% -->
  <text x="80" y="172" font-family="monospace" font-size="12" fill="#FCA5A5">Seq Write</text>
  <rect x="196" y="158" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="158" width="150" height="24" rx="4" fill="url(#seqWrite)"/>
  <text x="406" y="175" font-family="monospace" font-size="11" fill="#FCA5A5">4,128 MB/s</text>
  <!-- Rnd Read 4K: 680K IOPS / 800K = 85% -->
  <text x="80" y="222" font-family="monospace" font-size="12" fill="#C4B5FD">Rnd 4K R</text>
  <rect x="196" y="208" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="208" width="218" height="24" rx="4" fill="url(#rndRead)"/>
  <text x="406" y="225" font-family="monospace" font-size="11" fill="#C4B5FD">680K IOPS</text>
  <!-- Rnd Write 4K: 520K IOPS / 800K = 65% -->
  <text x="80" y="272" font-family="monospace" font-size="12" fill="#6EE7B7">Rnd 4K W</text>
  <rect x="196" y="258" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="258" width="168" height="24" rx="4" fill="url(#rndWrite)"/>
  <text x="406" y="275" font-family="monospace" font-size="11" fill="#6EE7B7">520K IOPS</text>
  <!-- Latency: read 0.04ms bar (excellent) -->
  <text x="80" y="322" font-family="monospace" font-size="12" fill="#FDE68A">Latency R</text>
  <rect x="196" y="308" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="308" width="230" height="24" rx="4" fill="#EAB308" opacity="0.7"/>
  <text x="406" y="325" font-family="monospace" font-size="11" fill="#FDE68A">0.04 ms</text>
  <!-- Latency write: 0.06ms -->
  <text x="80" y="372" font-family="monospace" font-size="12" fill="#FDA4AF">Latency W</text>
  <rect x="196" y="358" width="256" height="24" rx="4" fill="#1E293B"/>
  <rect x="196" y="358" width="190" height="24" rx="4" fill="#F43F5E" opacity="0.7"/>
  <text x="406" y="375" font-family="monospace" font-size="11" fill="#FDA4AF">0.06 ms</text>
  <!-- Drive info -->
  <rect x="100" y="410" width="312" height="44" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="256" y="428" font-family="monospace" font-size="11" fill="#64748B" text-anchor="middle">Samsung 990 Pro 1TB NVMe</text>
  <text x="256" y="446" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">PCIe 4.0 x4 — Temp: 42C</text>
</svg>
