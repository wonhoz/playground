<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 청록+초록 -->
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4CC"/>
      <stop offset="100%" style="stop-color:#00D68F"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: 경로가 3갈래로 분기하는 다이어그램 -->
  <!-- 입력 박스 -->
  <rect x="280" y="200" width="464" height="110" rx="18" fill="white" opacity="0.95"/>
  <text x="512" y="272" font-family="Consolas, monospace" font-size="68" font-weight="bold" fill="#006688" text-anchor="middle">path\to</text>
  <!-- 세 줄기 선 -->
  <line x1="512" y1="310" x2="512" y2="390" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- 왼쪽 분기 -->
  <line x1="512" y1="390" x2="250" y2="480" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- 중간 직선 -->
  <line x1="512" y1="390" x2="512" y2="480" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- 오른쪽 분기 -->
  <line x1="512" y1="390" x2="774" y2="480" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- 왼쪽 결과 박스 -->
  <rect x="120" y="480" width="260" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="250" y="537" font-family="Consolas, monospace" font-size="52" fill="#005566" text-anchor="middle">C:\to\</text>
  <!-- 가운데 결과 박스 -->
  <rect x="382" y="480" width="260" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="512" y="537" font-family="Consolas, monospace" font-size="52" fill="#005566" text-anchor="middle">C:/to/</text>
  <!-- 오른쪽 결과 박스 -->
  <rect x="644" y="480" width="260" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="774" y="537" font-family="Consolas, monospace" font-size="46" fill="#005566" text-anchor="middle">file:///</text>
  <!-- Layer 3: 복사 클릭 효과 (하단 체크) -->
  <circle cx="512" cy="760" r="110" fill="white" opacity="0.25"/>
  <circle cx="512" cy="760" r="88" fill="white" opacity="0.4"/>
  <path d="M 448 760 L 492 808 L 580 716" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 하단 텍스트 -->
  <text x="512" y="920" font-family="Segoe UI, sans-serif" font-size="62" font-weight="bold" fill="white" text-anchor="middle">COPY PATH</text>
</svg>
