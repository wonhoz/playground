<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Read/Write bar chart -->
  <!-- Title -->
  <text x="512" y="238" font-family="Arial,sans-serif" font-size="52" fill="#047857" font-weight="bold" text-anchor="middle">Drive Benchmark</text>
  <!-- Read bar -->
  <text x="200" y="328" font-family="Arial,sans-serif" font-size="44" fill="#065F46">Read</text>
  <rect x="330" y="292" width="500" height="60" rx="12" fill="#D1FAE5"/>
  <rect x="330" y="292" width="500" height="60" rx="12" fill="#10B981"/>
  <text x="844" y="334" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">5250</text>
  <!-- Write bar -->
  <text x="200" y="428" font-family="Arial,sans-serif" font-size="44" fill="#065F46">Write</text>
  <rect x="330" y="392" width="400" height="60" rx="12" fill="#D1FAE5"/>
  <rect x="330" y="392" width="400" height="60" rx="12" fill="#34D399"/>
  <text x="744" y="434" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">4200</text>
  <!-- Seq Read -->
  <text x="200" y="528" font-family="Arial,sans-serif" font-size="44" fill="#065F46">Seq R</text>
  <rect x="330" y="492" width="460" height="60" rx="12" fill="#D1FAE5"/>
  <rect x="330" y="492" width="460" height="60" rx="12" fill="#059669"/>
  <text x="804" y="534" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">4800</text>
  <!-- Random Read -->
  <text x="200" y="628" font-family="Arial,sans-serif" font-size="44" fill="#065F46">Rnd R</text>
  <rect x="330" y="592" width="230" height="60" rx="12" fill="#D1FAE5"/>
  <rect x="330" y="592" width="230" height="60" rx="12" fill="#6EE7B7"/>
  <text x="574" y="634" font-family="Arial,sans-serif" font-size="44" fill="#047857" font-weight="bold">2400</text>
  <!-- MB/s unit -->
  <text x="512" y="760" font-family="Arial,sans-serif" font-size="48" fill="#065F46" text-anchor="middle">MB/s</text>
  <!-- SMART badge -->
  <rect x="360" y="810" width="304" height="70" rx="20" fill="#047857"/>
  <text x="512" y="856" font-family="Arial,sans-serif" font-size="46" fill="#FFFFFF" font-weight="bold" text-anchor="middle">SMART ✓</text>
</svg>
