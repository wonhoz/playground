<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 가로세로 교차 패턴 (교차하는 단어) | 기하학 | #2C1A00 갈색 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1C1000"/>
  <!-- Layer 2: Two intersecting words (highlighted cells) -->
  <!-- Horizontal word: "세계" -->
  <!-- Cell row y=360~490 -->
  <rect x="120" y="360" width="130" height="130" rx="12" fill="#451A00"/>
  <text x="185" y="444" font-family="Arial,sans-serif" font-size="64" fill="#FDBA74" text-anchor="middle" font-weight="bold">세</text>
  <rect x="270" y="360" width="130" height="130" rx="12" fill="#451A00"/>
  <text x="335" y="444" font-family="Arial,sans-serif" font-size="64" fill="#FDBA74" text-anchor="middle" font-weight="bold">계</text>
  <!-- Intersection cell (shared letter) - highlighted -->
  <rect x="420" y="360" width="130" height="130" rx="12" fill="#B45309" stroke="#F59E0B" stroke-width="4"/>
  <text x="485" y="444" font-family="Arial,sans-serif" font-size="64" fill="#FEF3C7" text-anchor="middle" font-weight="bold">지</text>
  <rect x="570" y="360" width="130" height="130" rx="12" fill="#451A00"/>
  <text x="635" y="444" font-family="Arial,sans-serif" font-size="64" fill="#FDBA74" text-anchor="middle" font-weight="bold">도</text>
  <rect x="720" y="360" width="130" height="130" rx="12" fill="#451A00"/>
  <text x="785" y="444" font-family="Arial,sans-serif" font-size="64" fill="#FDBA74" text-anchor="middle" font-weight="bold">자</text>
  <!-- Vertical word: "지리" sharing '지' at (420,360) -->
  <rect x="420" y="210" width="130" height="130" rx="12" fill="#1C3A5C"/>
  <text x="485" y="294" font-family="Arial,sans-serif" font-size="64" fill="#93C5FD" text-anchor="middle" font-weight="bold">경</text>
  <!-- Intersection already drawn above -->
  <rect x="420" y="510" width="130" height="130" rx="12" fill="#1C3A5C"/>
  <text x="485" y="594" font-family="Arial,sans-serif" font-size="64" fill="#93C5FD" text-anchor="middle" font-weight="bold">리</text>
  <rect x="420" y="660" width="130" height="130" rx="12" fill="#1C3A5C"/>
  <text x="485" y="744" font-family="Arial,sans-serif" font-size="64" fill="#60A5FA" text-anchor="middle" font-weight="bold">학</text>
  <!-- Layer 3: Horizontal arrow label -->
  <text x="938" y="436" font-family="Arial,sans-serif" font-size="22" fill="#FDBA74" text-anchor="end">→ 1번</text>
  <!-- Vertical arrow label -->
  <text x="336" y="180" font-family="Arial,sans-serif" font-size="22" fill="#93C5FD" text-anchor="end">↓ 2번</text>
  <!-- Intersection glow -->
  <circle cx="485" cy="425" r="80" fill="none" stroke="#F59E0B" stroke-width="3" opacity="0.3"/>
</svg>
