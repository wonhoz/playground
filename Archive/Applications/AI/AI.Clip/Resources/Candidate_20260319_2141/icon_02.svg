<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: AI lens / camera eye scanning text -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#001A1A"/>
  <!-- Outer lens ring -->
  <circle cx="512" cy="420" r="280" fill="#002A2A" stroke="#00E5FF" stroke-width="28"/>
  <circle cx="512" cy="420" r="220" fill="#003A3A" stroke="#00E5FF" stroke-width="14" opacity="0.5"/>
  <!-- Iris -->
  <circle cx="512" cy="420" r="150" fill="#00ACC1"/>
  <!-- Pupil -->
  <circle cx="512" cy="420" r="80" fill="#001A1A"/>
  <!-- AI crosshair in pupil -->
  <line x1="472" y1="420" x2="552" y2="420" stroke="#00E5FF" stroke-width="10"/>
  <line x1="512" y1="380" x2="512" y2="460" stroke="#00E5FF" stroke-width="10"/>
  <!-- Reflection dot -->
  <circle cx="538" cy="398" r="14" fill="#E0F7FA" opacity="0.7"/>
  <!-- Scan line through bottom -->
  <rect x="160" y="700" width="704" height="8" rx="4" fill="#00E5FF" opacity="0.4"/>
  <!-- Scanned text lines below lens -->
  <rect x="240" y="740" width="480" height="18" rx="9" fill="#00E5FF" opacity="0.6"/>
  <rect x="280" y="772" width="400" height="18" rx="9" fill="#00E5FF" opacity="0.4"/>
  <rect x="260" y="804" width="440" height="18" rx="9" fill="#00E5FF" opacity="0.3"/>
  <!-- Lens glare diagonal -->
  <line x1="360" y1="290" x2="420" y2="350" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
</svg>
