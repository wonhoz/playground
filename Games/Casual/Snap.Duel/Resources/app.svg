<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0a001a"/>
    </linearGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#flash)"/>
  <!-- Two figures facing off -->
  <!-- Left fighter silhouette -->
  <circle cx="140" cy="160" r="22" fill="#c62828"/>
  <path d="M140 182 L120 260 L155 260 Z" fill="#c62828"/>
  <path d="M140 210 L90 240 L100 255 L145 230 Z" fill="#c62828"/>
  <path d="M140 210 L180 230 L180 245 L140 230 Z" fill="#c62828"/>
  <line x1="140" y1="260" x2="120" y2="320" stroke="#c62828" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="260" x2="160" y2="320" stroke="#c62828" stroke-width="8" stroke-linecap="round"/>
  <!-- Right fighter silhouette (mirrored) -->
  <circle cx="372" cy="160" r="22" fill="#1565c0"/>
  <path d="M372 182 L352 260 L387 260 Z" fill="#1565c0"/>
  <path d="M372 210 L332 230 L332 245 L372 230 Z" fill="#1565c0"/>
  <path d="M372 210 L422 240 L412 255 L367 230 Z" fill="#1565c0"/>
  <line x1="372" y1="260" x2="352" y2="320" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/>
  <line x1="372" y1="260" x2="392" y2="320" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/>
  <!-- VS lightning bolt in center -->
  <polygon points="276,130 244,260 272,260 236,390 296,250 264,250" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- SNAP text -->
  <text x="256" y="445" font-family="sans-serif" font-size="28" fill="#ff1744" text-anchor="middle" font-weight="bold" letter-spacing="3" filter="url(#glow)">SNAP.DUEL</text>
</svg>
