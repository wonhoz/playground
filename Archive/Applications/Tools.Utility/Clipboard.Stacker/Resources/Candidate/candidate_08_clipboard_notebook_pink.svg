<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Notebook spine -->
  <rect x="128" y="140" width="40" height="240" rx="8" fill="#AD1457"/>
  <!-- Notebook pages -->
  <rect x="162" y="148" width="224" height="224" rx="6" fill="url(#page)"/>
  <!-- Ring holes -->
  <circle cx="148" cy="180" r="8" fill="#880E4F"/>
  <circle cx="148" cy="220" r="8" fill="#880E4F"/>
  <circle cx="148" cy="260" r="8" fill="#880E4F"/>
  <circle cx="148" cy="300" r="8" fill="#880E4F"/>
  <circle cx="148" cy="340" r="8" fill="#880E4F"/>
  <!-- Lines on page -->
  <rect x="180" y="178" width="180" height="11" rx="4" fill="#E91E63" opacity="0.5"/>
  <rect x="180" y="202" width="160" height="11" rx="4" fill="#E91E63" opacity="0.4"/>
  <rect x="180" y="226" width="170" height="11" rx="4" fill="#E91E63" opacity="0.35"/>
  <rect x="180" y="250" width="140" height="11" rx="4" fill="#E91E63" opacity="0.3"/>
  <rect x="180" y="274" width="155" height="11" rx="4" fill="#E91E63" opacity="0.25"/>
  <rect x="180" y="298" width="165" height="11" rx="4" fill="#E91E63" opacity="0.2"/>
  <!-- Bookmark ribbon -->
  <path d="M352 148 L368 148 L368 210 L360 200 L352 210 Z" fill="#F06292"/>
  <!-- Pencil -->
  <rect x="295" y="370" width="16" height="80" rx="4" fill="#F48FB1" transform="rotate(-30 303 410)"/>
  <polygon points="303,370 311,370 307,355" fill="#FFCA28" transform="rotate(-30 307 362)"/>
</svg>
