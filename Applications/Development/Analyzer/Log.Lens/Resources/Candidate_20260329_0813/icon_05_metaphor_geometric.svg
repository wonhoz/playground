<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEE2E2"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background - soft pink/red -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: Log level bars as geometric pattern - bar chart of log counts -->
  <!-- X axis -->
  <line x1="180" y1="720" x2="860" y2="720" stroke="#EF4444" stroke-width="16" stroke-linecap="round"/>
  <!-- DEBUG bar -->
  <rect x="210" y="520" width="100" height="200" rx="12" fill="#60A5FA"/>
  <text x="260" y="772" font-family="monospace" font-size="38" fill="#374151" text-anchor="middle">DBG</text>
  <!-- INFO bar -->
  <rect x="340" y="340" width="100" height="380" rx="12" fill="#4ADE80"/>
  <text x="390" y="772" font-family="monospace" font-size="38" fill="#374151" text-anchor="middle">INFO</text>
  <!-- WARN bar -->
  <rect x="470" y="460" width="100" height="260" rx="12" fill="#FBBF24"/>
  <text x="520" y="772" font-family="monospace" font-size="38" fill="#374151" text-anchor="middle">WARN</text>
  <!-- ERROR bar -->
  <rect x="600" y="560" width="100" height="160" rx="12" fill="#EF4444"/>
  <text x="650" y="772" font-family="monospace" font-size="38" fill="#374151" text-anchor="middle">ERR</text>
  <!-- FATAL bar (small) -->
  <rect x="730" y="640" width="100" height="80" rx="12" fill="#7C3AED"/>
  <text x="780" y="772" font-family="monospace" font-size="34" fill="#374151" text-anchor="middle">FATAL</text>
  <!-- Layer 3: Magnifier lens on top of chart -->
  <circle cx="440" cy="390" r="80" fill="none" stroke="#EF4444" stroke-width="18"/>
  <circle cx="440" cy="390" r="74" fill="#EF4444" opacity="0.1"/>
  <line x1="502" y1="452" x2="548" y2="498" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <!-- Title -->
  <text x="512" y="910" font-family="Arial" font-size="72" fill="#EF4444" text-anchor="middle" font-weight="bold">Log Stats</text>
</svg>
