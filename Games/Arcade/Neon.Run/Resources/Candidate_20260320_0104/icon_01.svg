<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#000510"/>
  <!-- 네온 달리는 실루엣 -->
  <!-- 글로우 효과 (뒤 레이어) -->
  <circle cx="512" cy="280" r="60" fill="#00B0FF" opacity="0.15"/>
  <rect x="458" y="340" width="108" height="160" rx="20" fill="#00B0FF" opacity="0.1"/>
  <!-- 머리 글로우 -->
  <circle cx="512" cy="280" r="52" fill="none" stroke="#00B0FF" stroke-width="16" opacity="0.4"/>
  <!-- 머리 -->
  <circle cx="512" cy="280" r="44" fill="none" stroke="#80D8FF" stroke-width="8"/>
  <!-- 몸통 -->
  <line x1="512" y1="324" x2="512" y2="500" stroke="#80D8FF" stroke-width="12" stroke-linecap="round"/>
  <!-- 앞팔 -->
  <line x1="512" y1="390" x2="420" y2="348" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="390" x2="600" y2="430" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <!-- 앞다리 (차올림) -->
  <line x1="500" y1="500" x2="430" y2="590" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="430" y1="590" x2="380" y2="660" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <!-- 뒷다리 (뒤로) -->
  <line x1="524" y1="500" x2="594" y2="590" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <line x1="594" y1="590" x2="640" y2="670" stroke="#80D8FF" stroke-width="10" stroke-linecap="round"/>
  <!-- 네온 트레일 -->
  <line x1="60" y1="310" x2="380" y2="310" stroke="#00B0FF" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="40" y1="350" x2="370" y2="350" stroke="#00B0FF" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="390" x2="360" y2="390" stroke="#00B0FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- 바닥 네온선 -->
  <line x1="60" y1="760" x2="964" y2="760" stroke="#00B0FF" stroke-width="4" opacity="0.7"/>
  <line x1="60" y1="760" x2="964" y2="760" stroke="#80D8FF" stroke-width="2" opacity="0.9"/>
  <!-- 바닥 반사 -->
  <line x1="60" y1="776" x2="964" y2="776" stroke="#00B0FF" stroke-width="2" opacity="0.3"/>
  <line x1="60" y1="790" x2="964" y2="790" stroke="#00B0FF" stroke-width="1" opacity="0.15"/>
</svg>
