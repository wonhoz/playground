<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001122"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2266FF"/>
      <stop offset="100%" stop-color="#44AAFF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44AAFF"/>
      <stop offset="100%" stop-color="#88CCFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline axis -->
  <line x1="80" y1="420" x2="440" y2="420" stroke="#44AAFF" stroke-width="2" opacity="0.5"/>
  <!-- Boot service bars (gantt chart style) -->
  <rect x="90" y="140" width="200" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
  <text x="98" y="159" font-family="monospace" font-size="14" fill="white" opacity="0.85">kernel</text>

  <rect x="90" y="180" width="140" height="28" rx="5" fill="url(#bar2)" opacity="0.85"/>
  <text x="98" y="199" font-family="monospace" font-size="14" fill="white" opacity="0.8">drivers</text>

  <rect x="140" y="220" width="180" height="28" rx="5" fill="url(#bar)" opacity="0.8"/>
  <text x="148" y="239" font-family="monospace" font-size="14" fill="white" opacity="0.75">services</text>

  <rect x="200" y="260" width="160" height="28" rx="5" fill="url(#bar2)" opacity="0.75"/>
  <text x="208" y="279" font-family="monospace" font-size="14" fill="white" opacity="0.7">network</text>

  <rect x="240" y="300" width="130" height="28" rx="5" fill="url(#bar)" opacity="0.7"/>
  <text x="248" y="319" font-family="monospace" font-size="14" fill="white" opacity="0.65">autorun</text>

  <rect x="300" y="340" width="100" height="28" rx="5" fill="url(#bar2)" opacity="0.65"/>
  <text x="308" y="359" font-family="monospace" font-size="14" fill="white" opacity="0.6">login</text>

  <!-- Time markers -->
  <line x1="90" y1="130" x2="90" y2="420" stroke="#44AAFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="200" y1="130" x2="200" y2="420" stroke="#44AAFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="320" y1="130" x2="320" y2="420" stroke="#44AAFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="420" y1="130" x2="420" y2="420" stroke="#44AAFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <!-- Boot icon -->
  <rect x="350" y="120" width="80" height="60" rx="8" fill="#002244" stroke="#44AAFF" stroke-width="2"/>
  <polygon points="370,135 410,150 370,165" fill="#44AAFF"/>
</svg>