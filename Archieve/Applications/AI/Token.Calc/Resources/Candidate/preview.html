<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token.Calc — 아이콘 후보 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #f0f0f0; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .card { background: #252535; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: border-color .2s; }
    .card:hover { border-color: #666; }
    .card img { width: 100%; max-width: 160px; height: 160px; object-fit: contain; display: block; margin: 0 auto 12px; }
    .card .num  { font-size: 11px; color: #555; margin-bottom: 4px; }
    .card .name { font-size: 13px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Token.Calc — 아이콘 후보</h1>
  <p>LLM 멀티모델 토큰 수·비용 계산기 | 10개 디자인 컨셉</p>
  <div class="grid">
    <div class="card">
      <img src="candidate_01_coin_stack.svg" alt="coin_stack">
      <div class="num">#01</div>
      <div class="name">coin_stack</div>
    </div>
    <div class="card">
      <img src="candidate_02_neural_chip.svg" alt="neural_chip">
      <div class="num">#02</div>
      <div class="name">neural_chip</div>
    </div>
    <div class="card">
      <img src="candidate_03_abacus_purple.svg" alt="abacus_purple">
      <div class="num">#03</div>
      <div class="name">abacus_purple</div>
    </div>
    <div class="card">
      <img src="candidate_04_calculator_neon.svg" alt="calculator_neon">
      <div class="num">#04</div>
      <div class="name">calculator_neon</div>
    </div>
    <div class="card">
      <img src="candidate_05_brain_circuit.svg" alt="brain_circuit">
      <div class="num">#05</div>
      <div class="name">brain_circuit</div>
    </div>
    <div class="card">
      <img src="candidate_06_price_tag.svg" alt="price_tag">
      <div class="num">#06</div>
      <div class="name">price_tag</div>
    </div>
    <div class="card">
      <img src="candidate_07_bar_chart_orange.svg" alt="bar_chart_orange">
      <div class="num">#07</div>
      <div class="name">bar_chart_orange</div>
    </div>
    <div class="card">
      <img src="candidate_08_token_flow.svg" alt="token_flow">
      <div class="num">#08</div>
      <div class="name">token_flow</div>
    </div>
    <div class="card">
      <img src="candidate_09_infinity_cost.svg" alt="infinity_cost">
      <div class="num">#09</div>
      <div class="name">infinity_cost</div>
    </div>
    <div class="card">
      <img src="candidate_10_multimodel_grid.svg" alt="multimodel_grid">
      <div class="num">#10</div>
      <div class="name">multimodel_grid</div>
    </div>
  </div>
</body>
</html>
