<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04csn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
  </defs>

  <!-- Background: deep emerald -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04csn)"/>

  <!-- Large gear/cog: Windows system -->
  <circle cx="400" cy="480" r="260" fill="#0D4A2F" stroke="#10B981" stroke-width="8"/>
  <!-- Gear teeth (12 teeth) -->
  <rect x="364" y="200" width="72" height="52" rx="8" fill="#10B981"/>
  <rect x="364" y="708" width="72" height="52" rx="8" fill="#10B981"/>
  <rect x="140" y="444" width="52" height="72" rx="8" fill="#10B981"/>
  <rect x="608" y="444" width="52" height="72" rx="8" fill="#10B981"/>
  <!-- Diagonal teeth -->
  <rect x="218" y="252" width="52" height="52" rx="6" fill="#10B981" transform="rotate(45 244 278)"/>
  <rect x="530" y="252" width="52" height="52" rx="6" fill="#10B981" transform="rotate(45 556 278)"/>
  <rect x="218" y="664" width="52" height="52" rx="6" fill="#10B981" transform="rotate(45 244 690)"/>
  <rect x="530" y="664" width="52" height="52" rx="6" fill="#10B981" transform="rotate(45 556 690)"/>

  <!-- Gear inner circle -->
  <circle cx="400" cy="480" r="170" fill="#022C22"/>
  <circle cx="400" cy="480" r="130" fill="#064E3B" stroke="#6EE7B7" stroke-width="4"/>

  <!-- Windows logo-ish symbol inside gear -->
  <rect x="326" y="406" width="62" height="62" rx="6" fill="#3B82F6" opacity="0.9"/>
  <rect x="396" y="406" width="62" height="62" rx="6" fill="#EF4444" opacity="0.9"/>
  <rect x="326" y="476" width="62" height="62" rx="6" fill="#22C55E" opacity="0.9"/>
  <rect x="396" y="476" width="62" height="62" rx="6" fill="#FCD34D" opacity="0.9"/>

  <!-- Connecting arrow to Claude "C" badge (right) -->
  <line x1="660" y1="480" x2="740" y2="480" stroke="#6EE7B7" stroke-width="16" stroke-linecap="round"/>
  <polygon points="730,446 790,480 730,514" fill="#6EE7B7"/>

  <!-- Claude "C" badge -->
  <circle cx="850" cy="480" r="120" fill="#F97316"/>
  <circle cx="850" cy="480" r="100" fill="#EA580C"/>
  <text x="850" y="510" font-family="Arial Black,Arial" font-size="120" fill="white" font-weight="900" text-anchor="middle">C</text>

  <!-- DLL badge at bottom-left of gear -->
  <rect x="280" y="700" width="144" height="52" rx="10" fill="#1E3A5F"/>
  <text x="352" y="732" font-family="Arial Black,Arial" font-size="28" fill="#60A5FA" text-anchor="middle">.DLL</text>

  <!-- "Shell Extension" label -->
  <rect x="140" y="800" width="344" height="50" rx="12" fill="#10B981" opacity="0.25"/>
  <text x="312" y="832" font-family="Arial,sans-serif" font-size="24" fill="#6EE7B7" text-anchor="middle">Shell Extension</text>
</svg>
