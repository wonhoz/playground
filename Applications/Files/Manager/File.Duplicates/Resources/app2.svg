  <text x="290" y="350" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#e8eaf6" text-anchor="middle">file(2).txt</text>
  <!-- X delete badge -->
  <circle cx="390" cy="130" r="40" fill="url(#xGrad)"/>
  <line x1="368" y1="108" x2="412" y2="152" stroke="white" stroke-width="8" stroke-linecap="round"/>
