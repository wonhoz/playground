<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg14" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="nucleus14" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </radialGradient>
    <clipPath id="clip14">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>
  <g clip-path="url(#clip14)">
    <!-- Layer 2: 원자 궤도 -->
    <!-- 궤도 1 (수평 기울기) -->
    <ellipse cx="512" cy="512" rx="280" ry="100" fill="none" stroke="#60A5FA" stroke-width="8" opacity="0.60"/>
    <!-- 궤도 2 (60도 기울기) -->
    <ellipse cx="512" cy="512" rx="280" ry="100" fill="none" stroke="#60A5FA" stroke-width="8" opacity="0.60"
             transform="rotate(60 512 512)"/>
    <!-- 궤도 3 (120도 기울기) -->
    <ellipse cx="512" cy="512" rx="280" ry="100" fill="none" stroke="#60A5FA" stroke-width="8" opacity="0.60"
             transform="rotate(120 512 512)"/>
    <!-- Layer 2: 핵 (중앙) -->
    <circle cx="512" cy="512" r="70" fill="url(#nucleus14)" opacity="0.95"/>
    <circle cx="512" cy="512" r="48" fill="#BFDBFE" opacity="0.70"/>
    <circle cx="512" cy="512" r="28" fill="#FFFFFF" opacity="0.60"/>
    <!-- 핵 글로우 -->
    <circle cx="512" cy="512" r="90" fill="#60A5FA" opacity="0.12"/>
    <!-- Layer 3: 전자들 -->
    <!-- 전자 1 (궤도 1 — 오른쪽) -->
    <circle cx="792" cy="512" r="28" fill="#F472B6" opacity="0.95"/>
    <circle cx="792" cy="512" r="16" fill="#FDF2F8" opacity="0.80"/>
    <!-- 전자 2 (궤도 2 — 왼쪽 상단) -->
    <circle cx="372" cy="270" r="28" fill="#F472B6" opacity="0.95"/>
    <circle cx="372" cy="270" r="16" fill="#FDF2F8" opacity="0.80"/>
    <!-- 전자 3 (궤도 3 — 왼쪽 하단) -->
    <circle cx="372" cy="754" r="28" fill="#F472B6" opacity="0.95"/>
    <circle cx="372" cy="754" r="16" fill="#FDF2F8" opacity="0.80"/>
    <!-- 전자 트레일 -->
    <path d="M792 512 Q750 490 720 500" stroke="#F472B6" stroke-width="6" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M372 270 Q380 300 370 330" stroke="#F472B6" stroke-width="6" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M372 754 Q380 730 368 710" stroke="#F472B6" stroke-width="6" fill="none" opacity="0.45" stroke-linecap="round"/>
    <!-- 입자 표시 (핵 주변 양성자/중성자) -->
    <circle cx="492" cy="495" r="14" fill="#93C5FD" opacity="0.80"/>
    <circle cx="532" cy="495" r="14" fill="#FCA5A5" opacity="0.80"/>
    <circle cx="492" cy="529" r="14" fill="#FCA5A5" opacity="0.80"/>
    <circle cx="532" cy="529" r="14" fill="#93C5FD" opacity="0.80"/>
    <!-- 주변 파티클 -->
    <circle cx="640" cy="380" r="10" fill="#60A5FA" opacity="0.55"/>
    <circle cx="680" cy="340" r="7" fill="#60A5FA" opacity="0.45"/>
    <circle cx="380" cy="420" r="8" fill="#60A5FA" opacity="0.50"/>
    <circle cx="340" cy="460" r="6" fill="#60A5FA" opacity="0.40"/>
    <circle cx="640" cy="640" r="10" fill="#60A5FA" opacity="0.55"/>
    <circle cx="680" cy="680" r="7" fill="#60A5FA" opacity="0.45"/>
  </g>
</svg>
