<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#120800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 비콘 신호 원들 -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="220" r="115" fill="none" stroke="#F97316" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="220" r="80" fill="none" stroke="#F97316" stroke-width="2.5" opacity="0.4"/>
  <circle cx="256" cy="220" r="50" fill="none" stroke="#FB923C" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <!-- 경보등 -->
  <circle cx="256" cy="220" r="28" fill="#F97316" opacity="0.2"/>
  <circle cx="256" cy="220" r="20" fill="#F97316" opacity="0.6" filter="url(#glow)"/>
  <circle cx="256" cy="220" r="12" fill="white" opacity="0.9" filter="url(#glow)"/>
  <!-- 빛 방사선들 -->
  <line x1="256" y1="192" x2="256" y2="155" stroke="#F97316" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="281" y1="195" x2="305" y2="168" stroke="#F97316" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="283" y1="220" x2="318" y2="220" stroke="#F97316" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="281" y1="245" x2="305" y2="272" stroke="#F97316" stroke-width="3" opacity="0.5"/>
  <line x1="231" y1="195" x2="207" y2="168" stroke="#F97316" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="229" y1="220" x2="194" y2="220" stroke="#F97316" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="231" y1="245" x2="207" y2="272" stroke="#F97316" stroke-width="3" opacity="0.5"/>
  <!-- 기둥 -->
  <rect x="242" y="248" width="28" height="80" rx="4" fill="#F97316" opacity="0.4"/>
  <rect x="210" y="328" width="92" height="16" rx="8" fill="#F97316" opacity="0.5"/>
  <!-- 포트 레이블 -->
  <text x="256" y="390" text-anchor="middle" fill="#F97316" font-size="14" font-family="monospace" font-weight="bold" opacity="0.8">PORT ALERT</text>
</svg>