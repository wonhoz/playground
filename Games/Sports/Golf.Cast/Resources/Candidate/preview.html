<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Golf.Cast - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { color: #00CC44; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; }
    .item img { width: 128px; height: 128px; border-radius: 8px; }
    .item .name { margin-top: 10px; font-size: 12px; color: #888; word-break: break-all; }
    .item .num { font-size: 18px; font-weight: bold; color: #00CC44; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Golf.Cast — Icon Candidates</h1>
  <p>미니 골프 게임 아이콘 후보 10종</p>
  <div class="grid">
    <div class="item"><div class="num">01</div><img src="candidate_01_green_fairway_arc.svg" alt="01"><div class="name">green_fairway_arc</div></div>
    <div class="item"><div class="num">02</div><img src="candidate_02_sunset_hole_flag.svg" alt="02"><div class="name">sunset_hole_flag</div></div>
    <div class="item"><div class="num">03</div><img src="candidate_03_blue_water_hazard.svg" alt="03"><div class="name">blue_water_hazard</div></div>
    <div class="item"><div class="num">04</div><img src="candidate_04_neon_arcade_golf.svg" alt="04"><div class="name">neon_arcade_golf</div></div>
    <div class="item"><div class="num">05</div><img src="candidate_05_gold_trophy_ace.svg" alt="05"><div class="name">gold_trophy_ace</div></div>
    <div class="item"><div class="num">06</div><img src="candidate_06_purple_top_down_course.svg" alt="06"><div class="name">purple_top_down_course</div></div>
    <div class="item"><div class="num">07</div><img src="candidate_07_red_power_swing.svg" alt="07"><div class="name">red_power_swing</div></div>
    <div class="item"><div class="num">08</div><img src="candidate_08_cyan_scorecard.svg" alt="08"><div class="name">cyan_scorecard</div></div>
    <div class="item"><div class="num">09</div><img src="candidate_09_white_minimalist_ball.svg" alt="09"><div class="name">white_minimalist_ball</div></div>
    <div class="item"><div class="num">10</div><img src="candidate_10_orange_windmill_obstacle.svg" alt="10"><div class="name">orange_windmill_obstacle</div></div>
  </div>
</body>
</html>
