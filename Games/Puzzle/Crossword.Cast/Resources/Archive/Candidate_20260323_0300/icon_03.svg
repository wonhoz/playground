<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossword.Cast | 힌트 번호+가로/세로 클루 | 공간/장면 | #1E1E1E -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E1E1E"/>
  <!-- Layer 2: Clue list panel -->
  <!-- Across column -->
  <rect x="120" y="200" width="360" height="600" rx="16" fill="#252526"/>
  <rect x="120" y="200" width="360" height="50" rx="16" fill="#2563EB"/>
  <rect x="120" y="230" width="360" height="20" fill="#2563EB"/>
  <text x="300" y="231" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">→ 가로</text>
  <!-- Across clues -->
  <text x="145" y="292" font-family="Arial,sans-serif" font-size="16" fill="#60A5FA" font-weight="bold">1.</text>
  <text x="175" y="292" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">나라의 중심 도시 (4자)</text>
  <line x1="145" y1="302" x2="460" y2="302" stroke="#374151" stroke-width="1"/>
  <text x="145" y="332" font-family="Arial,sans-serif" font-size="16" fill="#60A5FA" font-weight="bold">3.</text>
  <text x="175" y="332" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">가을에 붉어지는 것 (3자)</text>
  <line x1="145" y1="342" x2="460" y2="342" stroke="#374151" stroke-width="1"/>
  <text x="145" y="372" font-family="Arial,sans-serif" font-size="16" fill="#60A5FA" font-weight="bold">5.</text>
  <text x="175" y="372" font-family="Arial,sans-serif" font-size="16" fill="#93C5FD">지구를 도는 위성 (2자)</text>
  <!-- Highlighted clue -->
  <rect x="130" y="354" width="340" height="32" rx="6" fill="#1E3A8A" opacity="0.4"/>
  <line x1="145" y1="382" x2="460" y2="382" stroke="#374151" stroke-width="1"/>
  <text x="145" y="412" font-family="Arial,sans-serif" font-size="16" fill="#60A5FA" font-weight="bold">7.</text>
  <text x="175" y="412" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">달리기 경주 (3자)</text>
  <!-- Down column -->
  <rect x="544" y="200" width="360" height="600" rx="16" fill="#252526"/>
  <rect x="544" y="200" width="360" height="50" rx="16" fill="#7C3AED"/>
  <rect x="544" y="230" width="360" height="20" fill="#7C3AED"/>
  <text x="724" y="231" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">↓ 세로</text>
  <text x="569" y="292" font-family="Arial,sans-serif" font-size="16" fill="#C084FC" font-weight="bold">2.</text>
  <text x="599" y="292" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">물에서 헤엄치는 것 (2자)</text>
  <line x1="569" y1="302" x2="884" y2="302" stroke="#374151" stroke-width="1"/>
  <text x="569" y="332" font-family="Arial,sans-serif" font-size="16" fill="#C084FC" font-weight="bold">4.</text>
  <text x="599" y="332" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">하늘을 나는 동물 (2자)</text>
  <line x1="569" y1="342" x2="884" y2="342" stroke="#374151" stroke-width="1"/>
  <text x="569" y="372" font-family="Arial,sans-serif" font-size="16" fill="#C084FC" font-weight="bold">6.</text>
  <text x="599" y="372" font-family="Arial,sans-serif" font-size="16" fill="#D1D5DB">봄에 피는 꽃 (3자)</text>
  <line x1="569" y1="382" x2="884" y2="382" stroke="#374151" stroke-width="1"/>
  <!-- Layer 3: Small grid preview at bottom -->
  <rect x="360" y="840" width="300" height="60" rx="10" fill="#111827"/>
  <text x="512" y="878" font-family="Arial,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">13×13 한글 퍼즐</text>
</svg>
