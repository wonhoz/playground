<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 실제 서버 (밝게) -->
  <rect x="100" y="180" width="120" height="150" rx="10" fill="#EC4899" opacity="0.15" filter="url(#glow)"/>
  <rect x="100" y="180" width="120" height="150" rx="10" fill="none" stroke="#EC4899" stroke-width="3" filter="url(#glow)"/>
  <rect x="114" y="196" width="92" height="13" rx="6" fill="#EC4899" opacity="0.7"/>
  <rect x="114" y="215" width="92" height="13" rx="6" fill="#EC4899" opacity="0.6"/>
  <rect x="114" y="234" width="92" height="13" rx="6" fill="#EC4899" opacity="0.5"/>
  <rect x="114" y="253" width="92" height="13" rx="6" fill="#EC4899" opacity="0.4"/>
  <rect x="114" y="272" width="92" height="13" rx="6" fill="#EC4899" opacity="0.3"/>
  <rect x="114" y="291" width="60" height="13" rx="6" fill="#EC4899" opacity="0.2"/>
  <!-- 그림자 (목 서버) -->
  <rect x="292" y="200" width="120" height="150" rx="10" fill="#EC4899" opacity="0.06"/>
  <rect x="292" y="200" width="120" height="150" rx="10" fill="none" stroke="#EC4899" stroke-width="2" stroke-dasharray="7,4" opacity="0.5"/>
  <rect x="306" y="216" width="92" height="13" rx="6" fill="#EC4899" opacity="0.2"/>
  <rect x="306" y="235" width="92" height="13" rx="6" fill="#EC4899" opacity="0.18"/>
  <rect x="306" y="254" width="92" height="13" rx="6" fill="#EC4899" opacity="0.15"/>
  <rect x="306" y="273" width="92" height="13" rx="6" fill="#EC4899" opacity="0.12"/>
  <rect x="306" y="292" width="92" height="13" rx="6" fill="#EC4899" opacity="0.1"/>
  <rect x="306" y="311" width="60" height="13" rx="6" fill="#EC4899" opacity="0.07"/>
  <!-- 그림자 투영 선들 -->
  <line x1="220" y1="190" x2="292" y2="210" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="220" y1="330" x2="292" y2="350" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- 레이블 -->
  <text x="160" y="360" text-anchor="middle" fill="#F472B6" font-size="11" font-family="monospace" opacity="0.8">SERVER</text>
  <text x="352" y="380" text-anchor="middle" fill="#F472B6" font-size="11" font-family="monospace" opacity="0.5">SHADOW MOCK</text>
  <!-- 빛 장식 -->
  <circle cx="80" cy="150" r="3" fill="#EC4899" opacity="0.5" filter="url(#glow)"/>
  <circle cx="432" cy="160" r="4" fill="#F472B6" opacity="0.5" filter="url(#glow)"/>
</svg>