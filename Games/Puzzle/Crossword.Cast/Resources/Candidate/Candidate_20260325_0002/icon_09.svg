<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 다크 체스 스타일 -->
  <rect width="1024" height="1024" rx="190" fill="#1B1B1B"/>

  <!-- 체스보드 패턴 (4×4 흑백) -->
  <!-- 그리드: x=212, y=212, 셀=150px, 총 600×600 -->

  <!-- 행 1 -->
  <rect x="212" y="212" width="150" height="150" fill="#F5F5F5"/>
  <rect x="362" y="212" width="150" height="150" fill="#424242"/>
  <rect x="512" y="212" width="150" height="150" fill="#F5F5F5"/>
  <rect x="662" y="212" width="150" height="150" fill="#424242"/>

  <!-- 행 2 -->
  <rect x="212" y="362" width="150" height="150" fill="#424242"/>
  <rect x="362" y="362" width="150" height="150" fill="#F5F5F5"/>
  <rect x="512" y="362" width="150" height="150" fill="#424242"/>
  <rect x="662" y="362" width="150" height="150" fill="#F5F5F5"/>

  <!-- 행 3 -->
  <rect x="212" y="512" width="150" height="150" fill="#F5F5F5"/>
  <rect x="362" y="512" width="150" height="150" fill="#424242"/>
  <rect x="512" y="512" width="150" height="150" fill="#F5F5F5"/>
  <rect x="662" y="512" width="150" height="150" fill="#424242"/>

  <!-- 행 4 -->
  <rect x="212" y="662" width="150" height="150" fill="#424242"/>
  <rect x="362" y="662" width="150" height="150" fill="#F5F5F5"/>
  <rect x="512" y="662" width="150" height="150" fill="#424242"/>
  <rect x="662" y="662" width="150" height="150" fill="#F5F5F5"/>

  <!-- 체스 말 위에 알파벳 (흰 셀에 크게) -->
  <text x="287" y="326" font-family="Arial Black" font-size="90" font-weight="bold" fill="#D32F2F" text-anchor="middle">A</text>
  <text x="587" y="326" font-family="Arial Black" font-size="90" font-weight="bold" fill="#1565C0" text-anchor="middle">R</text>
  <text x="437" y="476" font-family="Arial Black" font-size="90" font-weight="bold" fill="#33691E" text-anchor="middle">T</text>
  <text x="737" y="476" font-family="Arial Black" font-size="90" font-weight="bold" fill="#F57F17" text-anchor="middle">S</text>
  <text x="287" y="626" font-family="Arial Black" font-size="90" font-weight="bold" fill="#7B1FA2" text-anchor="middle">W</text>
  <text x="587" y="626" font-family="Arial Black" font-size="90" font-weight="bold" fill="#00838F" text-anchor="middle">O</text>
  <text x="437" y="776" font-family="Arial Black" font-size="90" font-weight="bold" fill="#BF360C" text-anchor="middle">R</text>
  <text x="737" y="776" font-family="Arial Black" font-size="90" font-weight="bold" fill="#37474F" text-anchor="middle">D</text>

  <!-- 그리드 테두리 -->
  <rect x="212" y="212" width="600" height="600" fill="none" stroke="#FFD700" stroke-width="8"/>

  <!-- 상단 타이틀 -->
  <text x="512" y="175" font-family="Arial Black" font-size="68" font-weight="bold" fill="#FFD700" text-anchor="middle">WORD CHESS</text>

  <!-- 하단 텍스트 -->
  <text x="512" y="870" font-family="Arial" font-size="60" fill="#9E9E9E" text-anchor="middle">CROSSWORD</text>
</svg>
