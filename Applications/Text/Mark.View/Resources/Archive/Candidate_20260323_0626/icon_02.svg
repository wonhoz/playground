<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark.View | 안경 + 문서 — 읽기 전용 뷰어 | 실루엣/캐릭터 | #F0F8FF -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#F0F8FF"/>
  <!-- Layer 2: Reading glasses over document -->
  <!-- Document background -->
  <rect x="220" y="400" width="584" height="400" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="4"/>
  <!-- Document text lines -->
  <rect x="260" y="440" width="320" height="16" rx="4" fill="#1E293B"/>
  <rect x="260" y="470" width="460" height="12" rx="4" fill="#64748B"/>
  <rect x="260" y="494" width="420" height="12" rx="4" fill="#64748B"/>
  <rect x="260" y="518" width="380" height="12" rx="4" fill="#94A3B8"/>
  <!-- Code block inside -->
  <rect x="260" y="544" width="480" height="70" rx="6" fill="#F1F5F9"/>
  <text x="280" y="572" font-family="monospace" font-size="18" fill="#3B82F6"># Heading</text>
  <text x="280" y="596" font-family="monospace" font-size="18" fill="#16A34A">**bold** _italic_</text>
  <!-- More lines -->
  <rect x="260" y="630" width="460" height="12" rx="4" fill="#CBD5E1"/>
  <rect x="260" y="654" width="380" height="12" rx="4" fill="#CBD5E1"/>
  <!-- Layer 3: Large glasses silhouette -->
  <!-- Left lens -->
  <circle cx="368" cy="340" r="110" fill="none" stroke="#1E293B" stroke-width="18"/>
  <circle cx="368" cy="340" r="94" fill="#DBEAFE" opacity="0.6"/>
  <!-- Right lens -->
  <circle cx="656" cy="340" r="110" fill="none" stroke="#1E293B" stroke-width="18"/>
  <circle cx="656" cy="340" r="94" fill="#DBEAFE" opacity="0.6"/>
  <!-- Bridge -->
  <line x1="476" y1="340" x2="548" y2="340" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="258" y1="294" x2="192" y2="260" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
  <line x1="766" y1="294" x2="832" y2="260" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
  <!-- Markdown symbol in left lens -->
  <text x="368" y="352" font-family="monospace" font-size="40" fill="#1D4ED8" text-anchor="middle" font-weight="bold">MD</text>
  <!-- Preview in right lens -->
  <text x="656" y="352" font-family="Arial,sans-serif" font-size="30" fill="#374151" text-anchor="middle" font-weight="bold">👁</text>
</svg>
