<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg11" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <clipPath id="clip11">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
    <filter id="neonGlow11" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur1"/>
      <feGaussianBlur stdDeviation="28" in="SourceGraphic" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow11lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" fill="url(#bg11)" rx="190"/>

  <g clip-path="url(#clip11)">
    <!-- 배경 네온 반사 (바닥) -->
    <ellipse cx="512" cy="860" rx="340" ry="40" fill="#22D3EE" opacity="0.12"/>
    <ellipse cx="512" cy="860" rx="200" ry="22" fill="#F472B6" opacity="0.10"/>

    <!-- "SLICE" 네온 사인 메인 글자 -->
    <g filter="url(#neonGlow11lg)">
      <text x="512" y="420" font-family="Arial Black, Impact, sans-serif" font-size="220" font-weight="900"
            fill="none" stroke="#22D3EE" stroke-width="18"
            text-anchor="middle" dominant-baseline="auto" letter-spacing="-8">SLICE</text>
    </g>
    <text x="512" y="420" font-family="Arial Black, Impact, sans-serif" font-size="220" font-weight="900"
          fill="none" stroke="#22D3EE" stroke-width="8"
          text-anchor="middle" dominant-baseline="auto" letter-spacing="-8" opacity="0.95"/>
    <!-- 글자 내부 밝은 fill -->
    <text x="512" y="420" font-family="Arial Black, Impact, sans-serif" font-size="220" font-weight="900"
          fill="#22D3EE" fill-opacity="0.15"
          text-anchor="middle" dominant-baseline="auto" letter-spacing="-8">SLICE</text>

    <!-- "NEON" 보조 라인 -->
    <g filter="url(#neonGlow11)">
      <text x="512" y="560" font-family="Arial Black, Impact, sans-serif" font-size="110" font-weight="900"
            fill="none" stroke="#F472B6" stroke-width="14"
            text-anchor="middle" dominant-baseline="auto" letter-spacing="20">NEON</text>
    </g>
    <text x="512" y="560" font-family="Arial Black, Impact, sans-serif" font-size="110" font-weight="900"
          fill="#F472B6" fill-opacity="0.18"
          text-anchor="middle" dominant-baseline="auto" letter-spacing="20">NEON</text>

    <!-- 네온 사인 틀 (직사각형 외곽) -->
    <g filter="url(#neonGlow11)">
      <rect x="190" y="195" width="644" height="410" rx="32"
            fill="none" stroke="#22D3EE" stroke-width="10" opacity="0.7"/>
    </g>

    <!-- 슬라이시 이펙트 (가로 칼날 궤적) -->
    <g filter="url(#neonGlow11)">
      <line x1="180" y1="490" x2="844" y2="450" stroke="#F472B6" stroke-width="60" stroke-linecap="round" opacity="0.75"/>
      <line x1="180" y1="490" x2="844" y2="450" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- 스파크 -->
    <g filter="url(#neonGlow11)" fill="#22D3EE">
      <circle cx="188" cy="490" r="20"/>
      <circle cx="844" cy="450" r="20"/>
    </g>
    <g fill="#F472B6" opacity="0.9">
      <circle cx="350" cy="620" r="10"/>
      <circle cx="680" cy="600" r="8"/>
      <circle cx="420" cy="650" r="6"/>
    </g>
  </g>
</svg>
