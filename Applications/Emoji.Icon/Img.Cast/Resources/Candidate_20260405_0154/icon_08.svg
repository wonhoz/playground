<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
    <linearGradient id="funnel08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#AA00FF"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Funnel shape — files enter top, single output exits bottom -->
  <!-- Funnel body -->
  <path d="M160 200 L864 200 L660 520 L660 820 L364 820 L364 520 Z" fill="url(#funnel08)" opacity="0.85"/>
  <!-- Inner highlight -->
  <path d="M200 240 L820 240 L640 510 L640 790 L384 790 L384 510 Z" fill="#AB47BC" opacity="0.4"/>
  <!-- Layer 3: Multiple format labels entering top -->
  <text x="148" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#D1C4E9">SVG</text>
  <text x="380" y="168" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#D1C4E9">PNG</text>
  <text x="620" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="68" font-weight="800" fill="#D1C4E9">BMP</text>
  <!-- Output label at bottom -->
  <text x="390" y="920" font-family="'Segoe UI',Arial,sans-serif" font-size="90" font-weight="900" fill="#6A1B9A">ICO</text>
  <!-- Down arrow below funnel -->
  <line x1="512" y1="820" x2="512" y2="870" stroke="#6A1B9A" stroke-width="16" stroke-linecap="round"/>
  <polygon points="462,855 512,920 562,855" fill="#6A1B9A"/>
</svg>
