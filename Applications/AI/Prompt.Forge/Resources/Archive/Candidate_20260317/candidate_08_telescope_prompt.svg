<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad08" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d0520"/>
      <stop offset="60%" stop-color="#060015"/>
      <stop offset="100%" stop-color="#020008"/>
    </radialGradient>
    <radialGradient id="starField" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a3a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="telescopeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a3a20"/>
      <stop offset="40%" stop-color="#8a6a30"/>
      <stop offset="70%" stop-color="#b08030"/>
      <stop offset="100%" stop-color="#6a5025"/>
    </linearGradient>
    <linearGradient id="lensGrad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8D5A0"/>
      <stop offset="100%" stop-color="#6a5025"/>
    </linearGradient>
    <radialGradient id="glowGold08" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="promptStar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#9B59B6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2C1654" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow08">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 (밤하늘) -->
  <rect width="512" height="512" fill="url(#bgGrad08)" rx="40"/>
  <ellipse cx="200" cy="180" rx="250" ry="200" fill="url(#starField)" opacity="0.5"/>

  <!-- 별들 -->
  <g fill="white">
    <circle cx="50" cy="50" r="1.5" opacity="0.8"/>
    <circle cx="120" cy="30" r="1" opacity="0.6"/>
    <circle cx="200" cy="60" r="2" opacity="0.9"/>
    <circle cx="300" cy="40" r="1.5" opacity="0.7"/>
    <circle cx="420" cy="70" r="1" opacity="0.6"/>
    <circle cx="470" cy="120" r="1.5" opacity="0.5"/>
    <circle cx="80" cy="150" r="1" opacity="0.7"/>
    <circle cx="160" cy="100" r="1.5" opacity="0.6"/>
    <circle cx="380" cy="90" r="1" opacity="0.8"/>
    <circle cx="440" cy="160" r="2" opacity="0.7"/>
    <circle cx="30" cy="230" r="1" opacity="0.5"/>
    <circle cx="490" cy="200" r="1.5" opacity="0.6"/>
  </g>

  <!-- 황금 별들 (작은) -->
  <g fill="#FFD700" filter="url(#softGlow08)">
    <circle cx="340" cy="55" r="2" opacity="0.8"/>
    <circle cx="100" cy="80" r="1.5" opacity="0.7"/>
    <circle cx="460" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="250" cy="35" r="1" opacity="0.8"/>
  </g>

  <!-- 망원경 삼각대 -->
  <g stroke="#6a5025" stroke-width="4" fill="none" opacity="0.8">
    <line x1="256" y1="350" x2="160" y2="460"/>
    <line x1="256" y1="350" x2="352" y2="460"/>
    <line x1="256" y1="380" x2="256" y2="460"/>
  </g>
  <!-- 삼각대 발 -->
  <ellipse cx="160" cy="462" rx="20" ry="6" fill="#4a3a20" opacity="0.8"/>
  <ellipse cx="352" cy="462" rx="20" ry="6" fill="#4a3a20" opacity="0.8"/>
  <ellipse cx="256" cy="462" rx="16" ry="5" fill="#4a3a20" opacity="0.8"/>

  <!-- 망원경 본체 (대각선으로 하늘을 향함) -->
  <g transform="translate(256, 290) rotate(-35)">
    <!-- 경통 메인 -->
    <rect x="-20" y="-140" width="40" height="170" rx="10" fill="url(#telescopeGrad)" stroke="#b08030" stroke-width="1.5"/>
    <!-- 포커서 링들 -->
    <rect x="-22" y="-50" width="44" height="12" rx="4" fill="#6a5025" stroke="#b08030" stroke-width="1"/>
    <rect x="-22" y="-20" width="44" height="12" rx="4" fill="#6a5025" stroke="#b08030" stroke-width="1"/>
    <!-- 대물렌즈 (앞쪽) -->
    <ellipse cx="0" cy="-140" rx="24" ry="12" fill="#1a0a3a" stroke="#b08030" stroke-width="2"/>
    <ellipse cx="0" cy="-140" rx="18" ry="8" fill="#2C1654" opacity="0.9"/>
    <ellipse cx="-5" cy="-143" rx="6" ry="4" fill="#4a3570" opacity="0.7"/>
    <!-- 접안렌즈 (뒤쪽) -->
    <ellipse cx="0" cy="30" rx="16" ry="8" fill="#4a3a20" stroke="#b08030" stroke-width="1.5"/>
    <ellipse cx="0" cy="30" rx="10" ry="5" fill="#1a0a0a"/>
  </g>

  <!-- 망원경이 보는 방향 - 빔 라인 -->
  <line x1="180" y1="108" x2="100" y2="60"
        stroke="#FFD700" stroke-width="1" opacity="0.3" stroke-dasharray="4 6" filter="url(#softGlow08)"/>

  <!-- 타겟 - 빛나는 프롬프트 아이디어 별 -->
  <g transform="translate(120, 80)">
    <!-- 별 외부 글로우 -->
    <circle cx="0" cy="0" r="50" fill="url(#promptStar)" filter="url(#starGlow)" opacity="0.8"/>
    <!-- 별 중간 -->
    <circle cx="0" cy="0" r="25" fill="#FFD700" opacity="0.7" filter="url(#glow08)"/>
    <!-- 별 코어 -->
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.95" filter="url(#glow08)"/>

    <!-- 별 광선들 -->
    <g stroke="#FFD700" stroke-width="2" filter="url(#glow08)" opacity="0.8">
      <line x1="0" y1="-55" x2="0" y2="-35"/>
      <line x1="0" y1="35" x2="0" y2="55"/>
      <line x1="-55" y1="0" x2="-35" y2="0"/>
      <line x1="35" y1="0" x2="55" y2="0"/>
      <line x1="-40" y1="-40" x2="-26" y2="-26"/>
      <line x1="26" y1="26" x2="40" y2="40"/>
      <line x1="26" y1="-26" x2="40" y2="-40"/>
      <line x1="-40" y1="40" x2="-26" y2="26"/>
    </g>

    <!-- 별 안에 프롬프트 심볼 -->
    <text x="0" y="6" font-family="monospace" font-size="14" font-weight="bold"
          fill="#2C1654" text-anchor="middle" opacity="0.9">&gt;_</text>
  </g>

  <!-- 뷰파인더 원 (별을 향해) -->
  <circle cx="120" cy="80" r="65" fill="none" stroke="#FFD700" stroke-width="1.5"
          opacity="0.5" stroke-dasharray="3 5" filter="url(#softGlow08)"/>
  <!-- 십자선 -->
  <g stroke="#FFD700" stroke-width="1" opacity="0.5" filter="url(#softGlow08)">
    <line x1="55" y1="80" x2="185" y2="80"/>
    <line x1="120" y1="15" x2="120" y2="145"/>
  </g>

  <!-- 아이피스 근처 - 관측 데이터 디스플레이 -->
  <g filter="url(#softGlow08)" opacity="0.8">
    <rect x="310" y="320" width="160" height="80" rx="6" fill="#0d0520" stroke="#9B59B6" stroke-width="1.5"/>
    <text x="390" y="345" font-family="monospace" font-size="10" fill="#FFD700" text-anchor="middle">TARGET ACQUIRED</text>
    <text x="390" y="362" font-family="monospace" font-size="10" fill="#9B59B6" text-anchor="middle">&gt; prompt.idea[0]</text>
    <text x="390" y="379" font-family="monospace" font-size="10" fill="#C9B1FF" text-anchor="middle">magnitude: 9.8/10</text>
    <text x="390" y="393" font-family="monospace" font-size="9" fill="#FFD700" text-anchor="middle">★ FORGING...</text>
  </g>

  <!-- 하단 라벨 -->
  <rect x="155" y="472" width="202" height="26" rx="5" fill="#020008" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
  <text x="256" y="489" font-family="monospace" font-size="12" font-weight="bold"
        fill="#FFD700" text-anchor="middle" opacity="0.9" filter="url(#softGlow08)">PROMPT.FORGE</text>
</svg>
