  <rect x="170" y="474" width="10" height="68" fill="url(#info02)"/>
  <rect x="200" y="486" width="60" height="18" rx="4" fill="#00C8FF" opacity="0.9"/>
  <text x="272" y="501" font-family="Consolas, monospace" font-size="22" fill="#44DDFF"> INFO</text>
