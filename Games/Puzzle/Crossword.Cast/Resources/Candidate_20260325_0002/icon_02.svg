<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 파란색 -->
  <rect width="1024" height="1024" rx="190" fill="#1565C0"/>

  <!-- 격자 선 (흰 반투명 배경) -->
  <!-- 가로줄들 -->
  <line x1="210" y1="290" x2="814" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="210" y1="420" x2="814" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="210" y1="550" x2="814" y2="550" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="210" y1="680" x2="814" y2="680" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- 세로줄들 -->
  <line x1="210" y1="290" x2="210" y2="810" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="360" y1="290" x2="360" y2="810" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="510" y1="290" x2="510" y2="810" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="660" y1="290" x2="660" y2="810" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="814" y1="290" x2="814" y2="810" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>

  <!-- 가로 "WORD" — 중간 행 (y=355 중앙선) -->
  <!-- W 교차점: 노란 배경 강조 -->
  <rect x="215" y="295" width="140" height="120" rx="8" fill="#FFD600"/>
  <text x="285" y="395" font-family="Arial Black" font-size="110" font-weight="bold" fill="#1565C0" text-anchor="middle">W</text>
  <text x="435" y="395" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">O</text>
  <text x="585" y="395" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">R</text>
  <text x="735" y="395" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">D</text>

  <!-- 세로 "WINS" — W 시작으로 아래로 -->
  <!-- W는 이미 위에 있음 -->
  <text x="285" y="535" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">I</text>
  <text x="285" y="665" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">N</text>
  <text x="285" y="795" font-family="Arial Black" font-size="110" font-weight="bold" fill="white" text-anchor="middle">S</text>

  <!-- 라벨 표시 -->
  <text x="512" y="210" font-family="Arial" font-size="64" font-weight="bold" fill="rgba(255,255,255,0.5)" text-anchor="middle">CROSSWORD</text>
</svg>
