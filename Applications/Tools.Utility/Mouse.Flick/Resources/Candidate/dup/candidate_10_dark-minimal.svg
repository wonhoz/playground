<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#4361EE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clean mouse icon -->
  <path d="M 196 180 Q 196 120 256 120 Q 316 120 316 180 L 316 320 Q 316 360 256 360 Q 196 360 196 320 Z" fill="#1E1E1E" stroke="#333" stroke-width="3"/>
  <!-- Accent left button active -->
  <path d="M 196 180 Q 196 120 256 120 L 256 230 L 196 230 Z" fill="#4361EE" opacity="0.4"/>
  <!-- Scroll wheel -->
  <rect x="244" y="145" width="24" height="54" rx="12" fill="url(#accent)" opacity="0.8"/>
  <!-- Button divider -->
  <line x1="256" y1="120" x2="256" y2="240" stroke="#333" stroke-width="2"/>
  <!-- Minimal flick arrow -->
  <path d="M 316 230 L 430 200" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="430,186 450,200 430,214" fill="#4CC9F0"/>
  <!-- Title -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#4CC9F0">MOUSE.FLICK</text>
  <text x="256" y="448" text-anchor="middle" font-family="monospace" font-size="12" fill="#555">gesture utility</text>
</svg>