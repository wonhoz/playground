    <text x="694" y="870" font-family="Arial Black, sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">ICO</text>
  </g>
  <g>
    <rect x="784" y="800" width="160" height="100" rx="24" fill="#3A86FF" stroke="#1A5CC9" stroke-width="10"/>
    <text x="864" y="870" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">WEBP</text>
  </g>
