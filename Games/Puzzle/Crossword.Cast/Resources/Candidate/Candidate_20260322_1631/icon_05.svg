<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#071820"/>
