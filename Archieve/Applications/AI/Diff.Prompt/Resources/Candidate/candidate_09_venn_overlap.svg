<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="circA" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="circB" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9D174D" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="overlap" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circle A -->
  <circle cx="196" cy="230" r="140" fill="url(#circA)" stroke="#3B82F6" stroke-width="3"/>
  <!-- Circle B -->
  <circle cx="316" cy="230" r="140" fill="url(#circB)" stroke="#EC4899" stroke-width="3"/>
  <!-- Overlap label -->
  <text x="256" y="222" font-family="sans-serif" font-size="13" fill="#E9D5FF" text-anchor="middle">shared</text>
  <text x="256" y="242" font-family="sans-serif" font-size="13" fill="#E9D5FF" text-anchor="middle">tokens</text>
  <!-- Left label -->
  <text x="155" y="218" font-family="sans-serif" font-size="12" fill="#93C5FD" text-anchor="middle">only in</text>
  <text x="155" y="236" font-family="sans-serif" font-size="12" fill="#93C5FD" text-anchor="middle">A</text>
  <!-- Right label -->
  <text x="357" y="218" font-family="sans-serif" font-size="12" fill="#F9A8D4" text-anchor="middle">only in</text>
  <text x="357" y="236" font-family="sans-serif" font-size="12" fill="#F9A8D4" text-anchor="middle">B</text>
  <!-- Stats bar -->
  <rect x="76" y="400" width="360" height="48" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="90" y="414" width="80" height="20" rx="10" fill="#1D4ED8" opacity="0.8"/>
  <text x="130" y="429" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">-18 unique</text>
  <rect x="216" y="414" width="80" height="20" rx="10" fill="#7C3AED" opacity="0.8"/>
  <text x="256" y="429" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">74% match</text>
  <rect x="342" y="414" width="80" height="20" rx="10" fill="#9D174D" opacity="0.8"/>
  <text x="382" y="429" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">+22 new</text>
</svg>
