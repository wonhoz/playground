<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 레시피 카드 — 프롬프트를 요리하는 레시피 | 레이어드 | #0D2A0D -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0D2A0D"/>
  <!-- Layer 2: Recipe card stack -->
  <!-- Card shadow/back -->
  <rect x="210" y="220" width="500" height="580" rx="16" fill="#1A3A1A" transform="rotate(5 460 510)"/>
  <!-- Main recipe card -->
  <rect x="200" y="210" width="500" height="580" rx="16" fill="#FFF8E8" stroke="#D4B870" stroke-width="4"/>
  <!-- Card header band -->
  <rect x="200" y="210" width="500" height="70" rx="16" fill="#2D5A1A"/>
  <rect x="200" y="246" width="500" height="34" fill="#2D5A1A"/>
  <text x="450" y="254" font-family="serif" font-size="22" fill="#FFEEAA" text-anchor="middle" font-weight="bold">PROMPT RECIPE</text>
  <!-- Ingredients section -->
  <text x="230" y="316" font-family="serif" font-size="16" fill="#3A1A00" font-weight="bold">재료 (Ingredients):</text>
  <line x1="228" y1="322" x2="680" y2="322" stroke="#C0A860" stroke-width="1"/>
  <!-- Ingredient items with checkboxes -->
  <rect x="236" y="336" width="16" height="16" rx="3" fill="#4A7A2A" stroke="#2D5A1A" stroke-width="2"/>
  <text x="258" y="350" font-family="serif" font-size="14" fill="#3A1A00">✓  역할 (Role): 전문가 설정</text>
  <rect x="236" y="362" width="16" height="16" rx="3" fill="#4A7A2A" stroke="#2D5A1A" stroke-width="2"/>
  <text x="258" y="376" font-family="serif" font-size="14" fill="#3A1A00">✓  맥락 (Context): 배경 정보</text>
  <rect x="236" y="388" width="16" height="16" rx="3" fill="#4A7A2A" stroke="#2D5A1A" stroke-width="2"/>
  <text x="258" y="402" font-family="serif" font-size="14" fill="#3A1A00">✓  과제 (Task): 구체적 요청</text>
  <rect x="236" y="414" width="16" height="16" rx="3" fill="#D4B870" stroke="#C0A860" stroke-width="2"/>
  <text x="258" y="428" font-family="serif" font-size="14" fill="#3A1A00">○  형식 (Format): 출력 형태</text>
  <rect x="236" y="440" width="16" height="16" rx="3" fill="#D4B870" stroke="#C0A860" stroke-width="2"/>
  <text x="258" y="454" font-family="serif" font-size="14" fill="#888888">○  톤 (Tone): 말투 설정</text>
  <!-- Instructions section -->
  <text x="230" y="486" font-family="serif" font-size="16" fill="#3A1A00" font-weight="bold">조리법 (Instructions):</text>
  <line x1="228" y1="492" x2="680" y2="492" stroke="#C0A860" stroke-width="1"/>
  <text x="236" y="512" font-family="serif" font-size="13" fill="#3A1A00">1. 역할 선언으로 시작하기</text>
  <text x="236" y="530" font-family="serif" font-size="13" fill="#3A1A00">2. 맥락을 2-3문장으로 설명</text>
  <text x="236" y="548" font-family="serif" font-size="13" fill="#3A1A00">3. 과제를 동사로 명확히 서술</text>
  <text x="236" y="566" font-family="serif" font-size="13" fill="#3A1A00">4. 형식 지정 (목록/코드/텍스트)</text>
  <text x="236" y="584" font-family="serif" font-size="13" fill="#3A1A00">5. 결과 확인 후 반복 개선</text>
  <!-- Tips note at bottom -->
  <rect x="228" y="610" width="436" height="60" rx="8" fill="#FFFADC" stroke="#D4B870" stroke-width="2"/>
  <text x="446" y="634" font-family="serif" font-size="13" fill="#6A4A00" text-anchor="middle" font-style="italic">💡 Tip: 예시 포함 시 응답 품질 2배</text>
  <text x="446" y="654" font-family="serif" font-size="12" fill="#8A6A20" text-anchor="middle">Few-shot prompting 활용 권장</text>
  <!-- Layer 3: Right side decorative card with short prompt preview -->
  <rect x="730" y="250" width="140" height="200" rx="12" fill="#1A4A2A" stroke="#4ADE80" stroke-width="3" transform="rotate(8 800 350)"/>
  <text x="800" y="290" font-family="monospace" font-size="9" fill="#86EFAC" text-anchor="middle" transform="rotate(8 800 350)">당신은 Python</text>
  <text x="800" y="306" font-family="monospace" font-size="9" fill="#86EFAC" text-anchor="middle" transform="rotate(8 800 350)">전문가입니다.</text>
  <text x="800" y="330" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="middle" transform="rotate(8 800 350)">다음 코드를</text>
  <text x="800" y="346" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="middle" transform="rotate(8 800 350)">리뷰해주세요:</text>
</svg>
