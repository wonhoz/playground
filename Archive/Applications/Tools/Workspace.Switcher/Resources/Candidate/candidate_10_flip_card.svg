<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0015"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="flipArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/>
    </marker>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 뒤 카드 (기울어짐) -->
  <g transform="rotate(-12, 256, 256)">
    <rect x="136" y="146" width="240" height="180" rx="12" fill="url(#card1)" stroke="#4338ca" stroke-width="1.5" opacity="0.7"/>
    <rect x="136" y="146" width="240" height="28" rx="12" fill="#1e1b4b" opacity="0.7"/>
    <rect x="156" y="188" width="80" height="8" rx="2" fill="#4338ca" opacity="0.5"/>
    <rect x="156" y="204" width="120" height="8" rx="2" fill="#4338ca" opacity="0.4"/>
    <rect x="156" y="220" width="60" height="8" rx="2" fill="#4338ca" opacity="0.3"/>
    <text x="256" y="168" font-family="Arial" font-size="12" fill="#818cf8" text-anchor="middle" opacity="0.6">Desktop 1</text>
  </g>
  <!-- 앞 카드 (활성, 약간 기울어짐) -->
  <g transform="rotate(8, 256, 256)">
    <rect x="136" y="186" width="240" height="180" rx="12" fill="url(#card2)" stroke="#a78bfa" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="136" y="186" width="240" height="28" rx="12" fill="#3b0764"/>
    <rect x="136" y="200" width="240" height="14" rx="0" fill="#3b0764"/>
    <circle cx="156" cy="200" r="5" fill="#ef4444"/>
    <circle cx="174" cy="200" r="5" fill="#fbbf24"/>
    <circle cx="192" cy="200" r="5" fill="#22c55e"/>
    <rect x="156" y="228" width="90" height="10" rx="3" fill="#6d28d9" opacity="0.7"/>
    <rect x="156" y="246" width="140" height="10" rx="3" fill="#6d28d9" opacity="0.5"/>
    <rect x="156" y="264" width="80" height="10" rx="3" fill="#6d28d9" opacity="0.6"/>
    <rect x="156" y="282" width="120" height="10" rx="3" fill="#6d28d9" opacity="0.4"/>
    <text x="256" y="208" font-family="Arial" font-size="12" fill="#c4b5fd" text-anchor="middle">Desktop 2 (Active)</text>
  </g>
  <!-- 플립 호 화살표 -->
  <path d="M178,420 C178,460 334,460 334,420" fill="none" stroke="url(#flipArc)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowPurple)" filter="url(#glow)"/>
  <text x="256" y="478" font-family="Arial" font-size="14" fill="#a78bfa" text-anchor="middle">Ctrl + Win + →</text>
</svg>
