  <line x1="300" y1="770" x2="270" y2="850" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
  <line x1="340" y1="790" x2="320" y2="870" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
  <line x1="380" y1="800" x2="370" y2="880" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
  <line x1="420" y1="790" x2="420" y2="870" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
  <line x1="460" y1="770" x2="470" y2="850" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
