<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2137"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="cal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="80" y="130" width="260" height="280" rx="16" fill="url(#cal)" opacity="0.85"/>
  <!-- Calendar header -->
  <rect x="80" y="130" width="260" height="60" rx="16" fill="#1565C0"/>
  <rect x="80" y="160" width="260" height="30" fill="#1565C0"/>
  <!-- Calendar rings -->
  <rect x="150" y="108" width="20" height="50" rx="8" fill="url(#white)"/>
  <rect x="250" y="108" width="20" height="50" rx="8" fill="url(#white)"/>
  <!-- Day grid dots -->
  <g fill="url(#white)" opacity="0.8">
    <rect x="100" y="214" width="28" height="28" rx="4"/>
    <rect x="140" y="214" width="28" height="28" rx="4"/>
    <rect x="180" y="214" width="28" height="28" rx="4"/>
    <rect x="220" y="214" width="28" height="28" rx="4"/>
    <rect x="260" y="214" width="28" height="28" rx="4"/>
    <rect x="100" y="254" width="28" height="28" rx="4"/>
    <rect x="140" y="254" width="28" height="28" rx="4"/>
    <rect x="180" y="254" width="28" height="28" rx="4" fill="#FF6D00"/>
    <rect x="220" y="254" width="28" height="28" rx="4"/>
    <rect x="260" y="254" width="28" height="28" rx="4"/>
    <rect x="100" y="294" width="28" height="28" rx="4"/>
    <rect x="140" y="294" width="28" height="28" rx="4"/>
    <rect x="180" y="294" width="28" height="28" rx="4"/>
  </g>
  <!-- Clock overlay -->
  <circle cx="360" cy="340" r="100" fill="#0D2137" stroke="url(#cal)" stroke-width="10"/>
  <circle cx="360" cy="340" r="6" fill="url(#white)"/>
  <!-- Clock hands -->
  <line x1="360" y1="340" x2="360" y2="280" stroke="url(#white)" stroke-width="8" stroke-linecap="round"/>
  <line x1="360" y1="340" x2="400" y2="360" stroke="url(#white)" stroke-width="6" stroke-linecap="round"/>
  <!-- Clock ticks -->
  <g stroke="url(#white)" stroke-width="4" opacity="0.6">
    <line x1="360" y1="248" x2="360" y2="260"/>
    <line x1="360" y1="420" x2="360" y2="432"/>
    <line x1="268" y1="340" x2="280" y2="340"/>
    <line x1="440" y1="340" x2="452" y2="340"/>
  </g>
</svg>
