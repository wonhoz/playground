<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Road with lane markings -->
  <rect x="60" y="330" width="392" height="80" rx="12" fill="#333333" opacity="0.6"/>
  <line x1="80" y1="370" x2="432" y2="370" stroke="white" stroke-width="3" stroke-dasharray="20,14" opacity="0.6"/>
  <!-- Car body -->
  <rect x="90" y="255" width="332" height="100" rx="14" fill="url(#car)" stroke="#E65100" stroke-width="4"/>
  <!-- Car roof/cabin -->
  <path d="M160,255 L190,185 H340 L370,255 Z" fill="url(#car)" stroke="#E65100" stroke-width="4"/>
  <!-- Windshield -->
  <path d="M200,255 L224,198 H320 L344,255 Z" fill="#B3E5FC" stroke="#E65100" stroke-width="2"/>
  <!-- Side windows -->
  <rect x="162" y="200" width="50" height="55" rx="4" fill="#B3E5FC" stroke="#E65100" stroke-width="2"/>
  <rect x="340" y="200" width="22" height="55" rx="4" fill="#B3E5FC" stroke="#E65100" stroke-width="2"/>
  <!-- Headlights -->
  <ellipse cx="400" cy="295" rx="22" ry="14" fill="#FFF176" stroke="#E65100" stroke-width="2"/>
  <!-- Taillights -->
  <rect x="88" y="278" width="18" height="22" rx="4" fill="#FF1744"/>
  <!-- Wheels -->
  <circle cx="175" cy="350" r="38" fill="#222222" stroke="#FF9800" stroke-width="4"/>
  <circle cx="175" cy="350" r="22" fill="#444444" stroke="#FF9800" stroke-width="2"/>
  <circle cx="338" cy="350" r="38" fill="#222222" stroke="#FF9800" stroke-width="4"/>
  <circle cx="338" cy="350" r="22" fill="#444444" stroke="#FF9800" stroke-width="2"/>
  <!-- Speed lines -->
  <line x1="60" y1="270" x2="110" y2="270" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="290" x2="95" y2="290" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="310" x2="105" y2="310" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Timer badge -->
  <circle cx="388" cy="140" r="52" fill="#E65100" stroke="white" stroke-width="4"/>
  <text x="388" y="134" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#FFE0B2">ETA</text>
  <text x="388" y="158" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="22" font-weight="bold" fill="white">8:40</text>
</svg>
