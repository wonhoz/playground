<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0A14"/>
  <!-- Layer 2: 문서에서 방사형 빛 (MD → HTML 렌더링) -->
  <!-- 중앙 문서 -->
  <rect x="340" y="300" width="344" height="424" rx="20" fill="#1C2128" stroke="#30363D" stroke-width="6"/>
  <!-- 문서 접힌 모서리 -->
  <polygon points="600,300 684,300 684,380" fill="#30363D"/>
  <polygon points="600,300 684,380 600,380" fill="#161B22"/>
  <!-- 문서 내용 -->
  <rect x="370" y="350" width="40" height="40" rx="3" fill="#58A6FF"/>
  <rect x="420" y="358" width="180" height="24" rx="3" fill="#E6EDF3"/>
  <rect x="370" y="420" width="240" height="12" rx="3" fill="#6E7681"/>
  <rect x="370" y="446" width="200" height="12" rx="3" fill="#6E7681"/>
  <rect x="370" y="490" width="220" height="40" rx="4" fill="#0D1117"/>
  <rect x="370" y="556" width="220" height="12" rx="3" fill="#6E7681"/>
  <rect x="370" y="582" width="180" height="12" rx="3" fill="#6E7681"/>
  <!-- Layer 3: 방사형 색깔 빛 (HTML 색상들) -->
  <line x1="512" y1="512" x2="100" y2="100" stroke="#FF6B6B" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="512" y2="80" stroke="#FFD93D" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="924" y2="100" stroke="#6BCB77" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="924" y2="512" stroke="#4D96FF" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="924" y2="924" stroke="#C77DFF" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="512" y2="944" stroke="#FF9A3C" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="100" y2="924" stroke="#4ECDC4" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="80" y2="512" stroke="#FF6B6B" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
  <!-- 빛 끝점 원들 -->
  <circle cx="100" cy="100" r="32" fill="#FF6B6B"/>
  <circle cx="512" cy="80" r="32" fill="#FFD93D"/>
  <circle cx="924" cy="100" r="32" fill="#6BCB77"/>
  <circle cx="924" cy="512" r="32" fill="#4D96FF"/>
  <circle cx="924" cy="924" r="32" fill="#C77DFF"/>
  <circle cx="512" cy="944" r="32" fill="#FF9A3C"/>
  <circle cx="100" cy="924" r="32" fill="#4ECDC4"/>
  <circle cx="80" cy="512" r="32" fill="#FF6B6B"/>
</svg>
