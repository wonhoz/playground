  <path d="M 180 640 A 332 332 0 0 1 310 356" fill="none" stroke="#EF5350" stroke-width="60" stroke-linecap="round"/>
  <!-- 중간 구간 (노랑) -->
  <path d="M 310 356 A 332 332 0 0 1 512 308" fill="none" stroke="#FDD835" stroke-width="60" stroke-linecap="round"/>
