<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | <T> 타입 레터링 + 망치 | 중앙 심볼 | 라임+파랑+주황 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#AED581"/>
    </linearGradient>
    <filter id="sh6" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#33691E" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="512" cy="512" r="512" fill="url(#bg6)"/>

  <!-- Layer 2: Large <T> symbol -->
  <!-- Angle brackets -->
  <text x="512" y="480" font-family="Arial Black, sans-serif" font-size="420" font-weight="900"
        fill="#1565C0" text-anchor="middle" dominant-baseline="middle" filter="url(#sh6)"
        opacity="0.15">&lt;T&gt;</text>
  <text x="512" y="480" font-family="Arial Black, sans-serif" font-size="360" font-weight="900"
        fill="#1565C0" text-anchor="middle" dominant-baseline="middle" filter="url(#sh6)">&lt;T&gt;</text>

  <!-- Layer 3: Hammer (small, diagonal, bottom-right) -->
  <g transform="rotate(-40, 800, 820)" filter="url(#sh6)">
    <!-- Handle -->
    <rect x="764" y="700" width="28" height="200" rx="14" fill="#5D4037"/>
    <!-- Head -->
    <rect x="720" y="648" width="120" height="68" rx="12" fill="#FF6D00"/>
    <!-- Head highlight -->
    <rect x="720" y="648" width="120" height="22" rx="11" fill="#FF8A65" opacity="0.6"/>
  </g>
  <!-- Spark at hammer impact point -->
  <circle cx="640" cy="700" r="20" fill="#FFD740" filter="url(#sh6)"/>
  <circle cx="620" cy="680" r="12" fill="#FF6D00"/>
  <circle cx="655" cy="675" r="9" fill="#FFFFFF" opacity="0.8"/>

  <!-- "Forge" word at bottom -->
  <text x="512" y="870" font-family="Arial Black, sans-serif" font-size="110" font-weight="900"
        fill="#558B2F" text-anchor="middle" dominant-baseline="middle" filter="url(#sh6)">Forge</text>
</svg>
