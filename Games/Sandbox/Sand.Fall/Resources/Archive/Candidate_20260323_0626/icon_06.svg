<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 모래시계 — 시간 제한 내 모래 시뮬레이션 | 레이어드 | #1A1408 -->
  <defs>
    <radialGradient id="sandGlow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1408" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="topBulb">
      <ellipse cx="512" cy="340" rx="180" ry="150"/>
    </clipPath>
    <clipPath id="botBulb">
      <ellipse cx="512" cy="680" rx="180" ry="150"/>
