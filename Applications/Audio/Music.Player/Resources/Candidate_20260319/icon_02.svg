<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Music note on dark background -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#111"/>
  <!-- Double eighth note (beamed) -->
  <!-- Note 1 stem -->
  <rect x="320" y="240" width="40" height="340" rx="10" fill="#E91E63"/>
  <!-- Note 1 head -->
  <ellipse cx="304" cy="580" rx="64" ry="46" fill="#E91E63" transform="rotate(-15, 304, 580)"/>
  <!-- Note 2 stem -->
  <rect x="560" y="200" width="40" height="300" rx="10" fill="#E91E63"/>
  <!-- Note 2 head -->
  <ellipse cx="544" cy="500" rx="64" ry="46" fill="#E91E63" transform="rotate(-15, 544, 500)"/>
  <!-- Beam connecting both -->
  <rect x="316" y="236" width="288" height="36" rx="8" fill="#E91E63"/>
  <rect x="316" y="292" width="288" height="28" rx="8" fill="#E91E63" opacity="0.7"/>
  <!-- Sound waves right -->
  <path d="M680 380 Q730 440 730 512 Q730 584 680 640" fill="none" stroke="#E91E63" stroke-width="24" stroke-linecap="round" opacity="0.6"/>
  <path d="M740 340 Q810 420 810 512 Q810 604 740 680" fill="none" stroke="#E91E63" stroke-width="20" stroke-linecap="round" opacity="0.35"/>
</svg>
