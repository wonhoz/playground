<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#121224"/>
    </linearGradient>
    <linearGradient id="barFull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#FF8844"/>
    </linearGradient>
    <linearGradient id="barEmpty" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44FF88"/>
      <stop offset="100%" stop-color="#44FFCC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dashboard panel -->
  <rect x="56" y="68" width="400" height="376" rx="14" fill="#0F0F20" stroke="#1A1A34" stroke-width="2"/>
  <!-- Header -->
  <rect x="56" y="68" width="400" height="40" rx="14" fill="#141428"/>
  <rect x="56" y="96" width="400" height="12" fill="#141428"/>
  <text x="136" y="93" font-family="'Segoe UI', sans-serif" font-size="14" fill="#AACCFF" font-weight="bold">Sys.Clean</text>
  <!-- Broom icon in header -->
  <rect x="75" y="78" width="18" height="22" rx="2" fill="#4488FF" opacity="0.7"/>
  <rect x="72" y="100" width="24" height="6" rx="3" fill="#4488FF" opacity="0.5"/>
  <!-- BEFORE section -->
  <text x="80" y="134" font-family="'Segoe UI', sans-serif" font-size="11" fill="#666688">BEFORE</text>
  <!-- Disk bar before (very full = bad) -->
  <rect x="80" y="143" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="143" width="162" height="16" rx="8" fill="url(#barFull)" filter="url(#glow)"/>
  <text x="274" y="155" font-family="monospace" font-size="10" fill="#FF8844">C: 90%</text>
  <!-- RAM bar before (high) -->
  <rect x="80" y="167" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="167" width="144" height="16" rx="8" fill="#FF6644" filter="url(#glow)" opacity="0.9"/>
  <text x="274" y="179" font-family="monospace" font-size="10" fill="#FF8844">RAM 80%</text>
  <!-- Temp files count -->
  <rect x="80" y="191" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="191" width="128" height="16" rx="8" fill="#FFAA22" filter="url(#glow)" opacity="0.8"/>
  <text x="274" y="203" font-family="monospace" font-size="10" fill="#FFAA22">3.2 GB</text>
  <!-- Arrow down (cleaning process) -->
  <text x="256" y="234" font-family="'Segoe UI', sans-serif" font-size="24" fill="#4488FF" text-anchor="middle" filter="url(#glow)">&#8595;</text>
  <rect x="80" y="236" width="352" height="24" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="236" width="260" height="24" rx="8" fill="#4488FF" opacity="0.7" filter="url(#glow)"/>
  <text x="256" y="252" font-family="'Segoe UI', sans-serif" font-size="11" fill="white" text-anchor="middle">Cleaning... 74%</text>
  <!-- AFTER section -->
  <text x="80" y="284" font-family="'Segoe UI', sans-serif" font-size="11" fill="#44FF88">AFTER</text>
  <!-- Disk bar after (clean) -->
  <rect x="80" y="293" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="293" width="54" height="16" rx="8" fill="url(#barEmpty)" filter="url(#glow)"/>
  <text x="274" y="305" font-family="monospace" font-size="10" fill="#44FF88">C: 30%</text>
  <!-- RAM after -->
  <rect x="80" y="317" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="317" width="72" height="16" rx="8" fill="#44FFCC" filter="url(#glow)" opacity="0.9"/>
  <text x="274" y="329" font-family="monospace" font-size="10" fill="#44FF88">RAM 40%</text>
  <!-- Temp after -->
  <rect x="80" y="341" width="180" height="16" rx="8" fill="#1A1A2A"/>
  <rect x="80" y="341" width="22" height="16" rx="8" fill="#44FF88" filter="url(#glow)" opacity="0.8"/>
  <text x="274" y="353" font-family="monospace" font-size="10" fill="#44FF88">0.1 GB</text>
  <!-- Summary -->
  <rect x="80" y="372" width="352" height="56" rx="10" fill="#0A1A0A" stroke="#228844" stroke-width="1"/>
  <text x="256" y="395" font-family="'Segoe UI', sans-serif" font-size="12" fill="#66CC88" text-anchor="middle">Cleanup Complete</text>
  <text x="200" y="416" font-family="monospace" font-size="11" fill="#44FF88">Freed: 3.1 GB</text>
  <text x="320" y="416" font-family="monospace" font-size="11" fill="#44AAFF">Speed: +32%</text>
</svg>
