  <!-- 카메라 상단 돌출부 (뷰파인더 영역) -->
  <rect x="340" y="180" width="200" height="70" rx="20" fill="#CC2222" stroke="#FF6666" stroke-width="3"/>
  <!-- 뷰파인더 창 -->
  <rect x="370" y="196" width="140" height="38" rx="8" fill="#440000"/>

  <!-- 플래시 -->
  <rect x="240" y="236" width="60" height="40" rx="8" fill="#FF8888"/>
  <circle cx="270" cy="256" r="14" fill="#FFCCCC"/>

  <!-- 셔터 버튼 -->
  <circle cx="740" cy="252" r="34" fill="#CC1111" stroke="#FF4444" stroke-width="3"/>
  <circle cx="740" cy="252" r="20" fill="#AA0000"/>

  <!-- 카메라 렌즈 (중앙) -->
  <circle cx="512" cy="400" r="130" fill="#333333" stroke="#FF4444" stroke-width="5"/>
  <circle cx="512" cy="400" r="100" fill="url(#lens-grad-07)"/>
  <circle cx="512" cy="400" r="60" fill="#111111"/>
  <circle cx="512" cy="400" r="30" fill="#1A1A1A"/>
  <!-- 렌즈 반사 -->
  <ellipse cx="490" cy="378" rx="20" ry="14" fill="#444444" opacity="0.8"/>

