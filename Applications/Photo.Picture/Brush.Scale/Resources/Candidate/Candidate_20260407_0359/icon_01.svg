  <rect x="894" y="276" width="22" height="22" rx="3" fill="#E91E63"/>
  <!-- (패턴 반복 2행) -->
  <rect x="556" y="302" width="22" height="22" rx="3" fill="#E91E63"/>
  <rect x="582" y="302" width="22" height="22" rx="3" fill="#7B1FA2"/>
  <rect x="608" y="302" width="22" height="22" rx="3" fill="#E91E63"/>
  <rect x="634" y="302" width="22" height="22" rx="3" fill="#9C27B0"/>
  <!-- 중앙에 산 풍경 모양 (선명한 이미지 상징) -->
  <path d="M556,530 L670,380 L760,460 L830,360 L920,530 Z" fill="#7B1FA2" opacity="0.7"/>
  <path d="M556,530 L670,380 L760,460 L830,360 L920,530 Z" fill="none" stroke="#CE93D8" stroke-width="3"/>
  <!-- After 라벨 -->
  <text x="740" y="620" font-family="Arial, sans-serif" font-weight="700" font-size="38" fill="#7B1FA2" text-anchor="middle">After</text>

  <!-- Layer 3: 오른쪽 위 AI 뱃지 -->
  <rect x="738" y="205" width="140" height="56" rx="28" fill="#E91E63"/>
  <text x="808" y="241" font-family="Arial Black" font-size="36" fill="white" text-anchor="middle">AI</text>
</svg>
