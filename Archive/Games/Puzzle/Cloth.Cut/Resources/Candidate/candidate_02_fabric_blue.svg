<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <pattern id="fabric" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="#90CAF9" stroke-width="1" stroke-opacity="0.4"/>
      <line x1="10" y1="0" x2="10" y2="20" stroke="#90CAF9" stroke-width="1" stroke-opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 직물 패턴 배경 -->
  <rect x="90" y="160" width="332" height="180" rx="10" fill="url(#fabric)" stroke="#90CAF9" stroke-opacity="0.5" stroke-width="2"/>
  <!-- 절단선 -->
  <line x1="90" y1="250" x2="422" y2="250" stroke="#FFEB3B" stroke-width="3" stroke-dasharray="14,6"/>
  <!-- 가위 아이콘 (심플) -->
  <circle cx="370" cy="228" r="18" fill="none" stroke="#E3F2FD" stroke-width="4"/>
  <circle cx="370" cy="272" r="18" fill="none" stroke="#E3F2FD" stroke-width="4"/>
  <line x1="382" y1="237" x2="440" y2="190" stroke="#E3F2FD" stroke-width="5" stroke-linecap="round"/>
  <line x1="382" y1="263" x2="440" y2="310" stroke="#E3F2FD" stroke-width="5" stroke-linecap="round"/>
  <!-- 조각들 -->
  <rect x="90" y="160" width="332" height="82" rx="8" fill="#42A5F5" fill-opacity="0.2"/>
  <rect x="90" y="254" width="332" height="86" rx="8" fill="#1E88E5" fill-opacity="0.15"/>
</svg>
