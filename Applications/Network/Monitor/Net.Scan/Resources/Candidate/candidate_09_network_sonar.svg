<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000d14"/>
      <stop offset="100%" stop-color="#001a24"/>
    </linearGradient>
    <radialGradient id="sonar" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- sonar rings (semi-circle going up from bottom) -->
  <path d="M256 380 Q256 280 180 256 Q256 230 332 256 Q408 282 256 380" fill="url(#sonar)"/>
  <path d="M80 380 Q80 200 256 160 Q432 200 432 380" fill="none" stroke="#00bcd4" stroke-width="4" opacity="0.6"/>
  <path d="M120 380 Q120 220 256 190 Q392 220 392 380" fill="none" stroke="#00bcd4" stroke-width="3" opacity="0.45"/>
  <path d="M160 380 Q160 246 256 226 Q352 246 352 380" fill="none" stroke="#0097a7" stroke-width="3" opacity="0.35"/>
  <path d="M200 380 Q200 272 256 262 Q312 272 312 380" fill="none" stroke="#0097a7" stroke-width="2.5" opacity="0.3"/>
  <!-- sonar source at bottom -->
  <circle cx="256" cy="380" r="16" fill="#00bcd4" filter="url(#glow)"/>
  <circle cx="256" cy="380" r="8" fill="white"/>
  <!-- detected targets -->
  <circle cx="186" cy="240" r="9" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="340" cy="225" r="7" fill="#00bcd4" filter="url(#glow)"/>
  <circle cx="256" cy="180" r="8" fill="#4dd0e1" filter="url(#glow)"/>
  <!-- vertical axis -->
  <line x1="256" y1="160" x2="256" y2="380" stroke="#00bcd4" stroke-width="1.5" opacity="0.3"/>
</svg>
