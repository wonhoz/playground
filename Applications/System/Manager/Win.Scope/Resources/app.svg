<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright sky blue -->
  <rect width="1024" height="1024" rx="250" fill="#74B9FF"/>

  <!-- Layer 2: 3 stacked/fanned window cards -->

  <!-- Window 3 (back): coral/salmon -->
  <rect x="200" y="260" width="560" height="400" rx="24" fill="#FD79A8" stroke="#FFFFFF" stroke-width="16"/>
  <!-- Title bar -->
  <rect x="200" y="260" width="560" height="60" rx="24" fill="#E84393" stroke="#FFFFFF" stroke-width="16"/>
  <rect x="200" y="282" width="560" height="38" rx="0" fill="#E84393"/>
  <circle cx="716" cy="290" r="14" fill="#FF6B6B"/>
  <circle cx="685" cy="290" r="14" fill="#FFEAA7"/>
  <circle cx="654" cy="290" r="14" fill="#55EFC4"/>
  <text x="248" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">explorer.exe</text>

  <!-- Window 2 (middle): lime green -->
  <rect x="160" y="320" width="560" height="400" rx="24" fill="#55EFC4" stroke="#FFFFFF" stroke-width="16"/>
  <rect x="160" y="320" width="560" height="60" rx="24" fill="#00B894" stroke="#FFFFFF" stroke-width="16"/>
  <rect x="160" y="342" width="560" height="38" rx="0" fill="#00B894"/>
  <circle cx="676" cy="350" r="14" fill="#FF6B6B"/>
  <circle cx="645" cy="350" r="14" fill="#FFEAA7"/>
  <circle cx="614" cy="350" r="14" fill="#55EFC4"/>
  <text x="208" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">code.exe</text>

  <!-- Window 1 (front): white/clean -->
  <rect x="120" y="380" width="560" height="400" rx="24" fill="#FFFFFF" stroke="#2D3436" stroke-width="16"/>
  <rect x="120" y="380" width="560" height="60" rx="24" fill="#6C5CE7" stroke="#2D3436" stroke-width="16"/>
  <rect x="120" y="402" width="560" height="38" rx="0" fill="#6C5CE7"/>
  <circle cx="636" cy="410" r="14" fill="#FF6B6B"/>
  <circle cx="605" cy="410" r="14" fill="#FFEAA7"/>
  <circle cx="574" cy="410" r="14" fill="#55EFC4"/>
  <text x="168" y="420" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">chrome.exe</text>
  <!-- Front window content rows -->
  <rect x="148" y="460" width="260" height="22" rx="6" fill="#F0F0F0"/>
  <rect x="148" y="494" width="360" height="22" rx="6" fill="#F0F0F0"/>
  <rect x="148" y="528" width="200" height="22" rx="6" fill="#F0F0F0"/>
  <!-- Property pills -->
  <rect x="148" y="580" width="160" height="44" rx="14" fill="#A29BFE"/>
  <text x="228" y="608" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">TopMost</text>
  <rect x="328" y="580" width="160" height="44" rx="14" fill="#00CEC9"/>
  <text x="408" y="608" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">100%</text>
  <rect x="508" y="580" width="140" height="44" rx="14" fill="#FDCB6E"/>
  <text x="578" y="608" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#2D3436">Z: 0</text>

  <!-- Layer 3: Z-order label -->
  <rect x="730" y="380" width="174" height="400" rx="20" fill="#2D3436" opacity="0.85"/>
  <text x="817" y="430" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="700" fill="#74B9FF">Z 순서</text>
  <text x="817" y="490" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="58" fill="#FFFFFF">①</text>
  <text x="817" y="570" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="58" fill="#BBBBBB">②</text>
  <text x="817" y="650" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="58" fill="#666666">③</text>
</svg>
