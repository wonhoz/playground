<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16"/>
      <stop offset="100%" style="stop-color:#3F6212"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg9)"/>

  <!-- 완성된 십자말 격자 -->
  <!-- 격자: x=210, y=210, 칸크기=120, 4x4 가시 영역 -->

  <!-- 행 0: C A T -->
  <rect x="210" y="210" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="330" y="210" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="450" y="210" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="570" y="210" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <rect x="690" y="210" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <text x="269" y="300" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#F97316">C</text>
  <text x="389" y="300" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#F97316">A</text>
  <text x="509" y="300" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#F97316">T</text>

  <!-- 행 1: A (세로 교차) -->
  <rect x="210" y="330" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <rect x="330" y="330" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="450" y="330" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <rect x="570" y="330" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="690" y="330" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>

  <text x="389" y="420" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#2563EB">A</text>
