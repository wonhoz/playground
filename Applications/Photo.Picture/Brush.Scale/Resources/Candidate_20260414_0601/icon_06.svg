<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <linearGradient id="stairArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg6)"/>

  <!-- White card -->
  <rect x="70" y="100" width="884" height="720" rx="32" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>

  <!-- Step 1: tiny image (100px equiv) -->
  <rect x="110" y="530" width="120" height="120" rx="16" fill="#FFF9C4" stroke="#F57F17" stroke-width="12"/>
  <rect x="124" y="544" width="92" height="70" rx="8" fill="#FFE082" stroke="#F57F17" stroke-width="8"/>
  <polygon points="130,604 162,578 180,592 206,568 220,604" fill="#FFB300" stroke="#F57F17" stroke-width="5" stroke-linejoin="round"/>
  <rect x="124" y="620" width="92" height="22" rx="8" fill="#FFB300" stroke="#F57F17" stroke-width="6"/>
  <!-- Label -->
  <rect x="100" y="664" width="140" height="46" rx="16" fill="#FFB300" stroke="#F57F17" stroke-width="10"/>
  <text x="170" y="696" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle">100px</text>

  <!-- Arrow 1 -->
  <rect x="248" y="556" width="70" height="34" rx="12" fill="url(#stairArrow)" stroke="#F57F17" stroke-width="10"/>
  <polygon points="318,538 368,573 318,608" fill="#FF6F00" stroke="#F57F17" stroke-width="10" stroke-linejoin="round"/>
  <!-- 2x label -->
  <rect x="264" y="608" width="80" height="38" rx="12" fill="#FFD93D" stroke="#F57F17" stroke-width="8"/>
  <text x="304" y="635" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#7B4800" text-anchor="middle">×2</text>

  <!-- Step 2: medium image (200px equiv) -->
  <rect x="370" y="464" width="190" height="190" rx="20" fill="#FFF9C4" stroke="#F57F17" stroke-width="14"/>
  <rect x="388" y="482" width="154" height="114" rx="10" fill="#FFE082" stroke="#F57F17" stroke-width="10"/>
  <polygon points="395,586 440,545 468,565 498,538 534,586" fill="#FFB300" stroke="#F57F17" stroke-width="7" stroke-linejoin="round"/>
  <rect x="388" y="600" width="154" height="32" rx="10" fill="#FFB300" stroke="#F57F17" stroke-width="8"/>
  <rect x="374" y="666" width="180" height="50" rx="16" fill="#F57F17" stroke="#E65100" stroke-width="10"/>
  <text x="464" y="701" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle">200px</text>

  <!-- Arrow 2 -->
  <rect x="570" y="512" width="80" height="38" rx="14" fill="url(#stairArrow)" stroke="#F57F17" stroke-width="10"/>
  <polygon points="650,488 710,531 650,574" fill="#FF6F00" stroke="#F57F17" stroke-width="10" stroke-linejoin="round"/>
  <!-- 4x label -->
  <rect x="578" y="562" width="90" height="42" rx="14" fill="#FFD93D" stroke="#F57F17" stroke-width="8"/>
  <text x="623" y="593" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#7B4800" text-anchor="middle">×4</text>

  <!-- Step 3: large image (400px equiv) -->
  <rect x="710" y="310" width="244" height="244" rx="24" fill="#FFF9C4" stroke="#F57F17" stroke-width="16"/>
  <rect x="730" y="330" width="204" height="150" rx="12" fill="#FFE082" stroke="#F57F17" stroke-width="12"/>
  <polygon points="738,470 800,410 840,440 884,400 928,470" fill="#FF8F00" stroke="#F57F17" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="738,470 800,448 840,460 884,432 928,470" fill="#FFB300" stroke="#F57F17" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="906" cy="358" r="30" fill="#FFD93D" stroke="#F57F17" stroke-width="8"/>
  <rect x="730" y="486" width="204" height="40" rx="12" fill="#FFB300" stroke="#F57F17" stroke-width="10"/>
  <rect x="710" y="566" width="244" height="58" rx="20" fill="#FF6F00" stroke="#E65100" stroke-width="12"/>
  <text x="832" y="608" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">800px</text>

  <!-- Diagonal UP arrow decoration -->
  <line x1="110" y1="530" x2="710" y2="310" stroke="#FFD93D" stroke-width="8" stroke-dasharray="16,10" stroke-linecap="round"/>

  <!-- SCALE UP badge -->
  <rect x="182" y="160" width="660" height="110" rx="36" fill="#FFB300" stroke="#F57F17" stroke-width="16"/>
  <text x="512" y="238" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">SCALE UP</text>

  <!-- Title -->
  <rect x="162" y="848" width="700" height="88" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="910" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
