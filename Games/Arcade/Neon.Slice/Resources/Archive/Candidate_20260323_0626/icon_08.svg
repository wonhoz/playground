<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Neon.Slice | 타임어택 시계 — 제한 시간 내 슬라이스 | 공간/장면 | #200000 -->
  <defs>
    <filter id="redGlow8">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="clockFace8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A0000"/>
      <stop offset="100%" stop-color="#140000"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#200000"/>
  <!-- Layer 2: Clock face with time running out -->
  <!-- Clock outer ring (pulsing, danger) -->
  <circle cx="512" cy="460" r="260" fill="none" stroke="#FF0000" stroke-width="8" filter="url(#redGlow8)"/>
  <circle cx="512" cy="460" r="252" fill="none" stroke="#AA0000" stroke-width="4" opacity="0.6"/>
  <!-- Clock face -->
  <circle cx="512" cy="460" r="240" fill="url(#clockFace8)"/>
  <!-- Clock tick marks -->
  <line x1="512" y1="224" x2="512" y2="248" stroke="#FF4444" stroke-width="4"/>
  <line x1="752" y1="460" x2="728" y2="460" stroke="#FF4444" stroke-width="4"/>
  <line x1="512" y1="696" x2="512" y2="672" stroke="#FF4444" stroke-width="4"/>
  <line x1="272" y1="460" x2="296" y2="460" stroke="#FF4444" stroke-width="4"/>
  <!-- Minute markers -->
  <line x1="586" y1="228" x2="578" y2="242" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <line x1="650" y1="262" x2="638" y2="272" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <line x1="696" y1="318" x2="684" y2="330" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <line x1="722" y1="390" x2="710" y2="396" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <line x1="302" y1="390" x2="314" y2="396" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <line x1="328" y1="318" x2="340" y2="330" stroke="#FF6666" stroke-width="2" opacity="0.6"/>
  <!-- Remaining time arc (only ~8 seconds left out of 60) -->
  <!-- Full circle background (time used) -->
  <path d="M 512 224 A 236 236 0 1 1 511.999 224" stroke="#330000" stroke-width="20" fill="none"/>
  <!-- Remaining time (8 sec = 48 degrees from 12 o'clock) -->
  <path d="M 512 224 A 236 236 0 0 1 602 246" stroke="#FF0000" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#redGlow8)"/>
  <!-- Clock hands showing ~8 seconds to midnight -->
  <!-- Hour hand -->
  <line x1="512" y1="460" x2="512" y2="312" stroke="#FF6666" stroke-width="8" stroke-linecap="round"/>
  <!-- Minute hand (at 52 - almost out of time) -->
  <line x1="512" y1="460" x2="570" y2="248" stroke="#FF2222" stroke-width="6" stroke-linecap="round" filter="url(#redGlow8)"/>
  <!-- Second hand (ticking - red) -->
  <line x1="512" y1="460" x2="596" y2="252" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" filter="url(#redGlow8)"/>
  <!-- Center pivot -->
  <circle cx="512" cy="460" r="14" fill="#FF0000" filter="url(#redGlow8)"/>
  <circle cx="512" cy="460" r="7" fill="white"/>
  <!-- Digital time display -->
  <rect x="432" y="530" width="160" height="50" rx="8" fill="#1A0000" stroke="#FF0000" stroke-width="2"/>
  <text x="512" y="562" font-family="monospace" font-size="28" fill="#FF0000" text-anchor="middle" font-weight="bold" filter="url(#redGlow8)">00:08</text>
  <!-- Layer 3: Shapes to slice in danger zone -->
  <!-- Several shapes with X warning -->
  <polygon points="260,680 304,740 216,740" fill="#330000" stroke="#FF4444" stroke-width="3" opacity="0.8"/>
  <text x="260" y="725" font-family="Arial,sans-serif" font-size="16" fill="#FF4444" text-anchor="middle" font-weight="bold">!</text>
  <rect x="420" y="680" width="70" height="70" rx="8" fill="#330000" stroke="#FF6600" stroke-width="3" opacity="0.8" transform="rotate(15 455 715)"/>
  <circle cx="670" cy="715" r="35" fill="#330000" stroke="#FF4444" stroke-width="3" opacity="0.8"/>
  <text x="670" y="722" font-family="Arial,sans-serif" font-size="22" fill="#FF4444" text-anchor="middle" font-weight="bold">!</text>
  <!-- HURRY text -->
  <text x="512" y="860" font-family="monospace" font-size="24" fill="#FF0000" text-anchor="middle" font-weight="bold" filter="url(#redGlow8)">HURRY UP!</text>
</svg>
