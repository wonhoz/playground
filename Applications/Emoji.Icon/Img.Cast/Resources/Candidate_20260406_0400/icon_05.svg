<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 (에메랄드→시안 그라데이션) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>

  <!-- Layer 2: 드롭존 테두리 (점선, 흰색) -->
  <rect x="155" y="148" width="714" height="572" rx="28"
        fill="white" fill-opacity="0.08"
        stroke="white" stroke-width="8" stroke-dasharray="28,16" stroke-opacity="0.72"
        stroke-linecap="round"/>

  <!-- Layer 2: 드롭존 내부 파일 아이콘 (이미지 파일, 살짝 기울어짐) -->
  <g transform="translate(512,384) rotate(-8)">
    <path d="M -100,-134 L 60,-134 L 104,-90 L 104,134 Q 104,152 84,152 L -84,152 Q -104,152 -104,134 Z" fill="white"/>
    <path d="M 60,-134 L 104,-90 L 60,-90 Z" fill="black" fill-opacity="0.15"/>
    <!-- 이미지 미리보기 (경관) -->
    <rect x="-76" y="-80" width="168" height="128" rx="4" fill="#64B5F6"/>
    <rect x="-76" y="38" width="168" height="50" rx="4" fill="#81C784"/>
    <ellipse cx="-12" cy="38" rx="50" ry="26" fill="#4CAF50"/>
    <ellipse cx="60" cy="44" rx="56" ry="28" fill="#388E3C"/>
    <circle cx="52" cy="-36" r="22" fill="#FFD54F"/>
    <rect x="-62" y="102" width="124" height="8" rx="4" fill="#B0BEC5"/>
  </g>

  <!-- Layer 3: 드롭 화살표 (파일이 떨어지는 동작) -->
  <path d="M 474,570 L 474,626 L 447,626 L 512,698 L 577,626 L 550,626 L 550,570 Z"
        fill="white" fill-opacity="0.86"/>

  <!-- Layer 3: 포맷 출력 배지 (PNG / ICO / JPG) -->
  <rect x="138" y="772" width="224" height="92" rx="14" fill="#FF7043"/>
  <text x="250" y="844" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">PNG</text>

  <rect x="400" y="772" width="224" height="92" rx="14" fill="#F9A825"/>
  <text x="512" y="844" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">ICO</text>

  <rect x="662" y="772" width="224" height="92" rx="14" fill="#1E88E5"/>
  <text x="774" y="844" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" text-anchor="middle" fill="white">JPG</text>
</svg>
