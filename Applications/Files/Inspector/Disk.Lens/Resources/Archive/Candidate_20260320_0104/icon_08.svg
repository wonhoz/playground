<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: 원통 스토리지 (cylinder storage tank) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 원통 몸통 -->
  <rect x="252" y="320" width="520" height="420" fill="#2E7D32"/>
  <!-- 원통 상단 타원 -->
  <ellipse cx="512" cy="320" rx="260" ry="60" fill="#81C784" opacity="0.9"/>
  <!-- 원통 하단 타원 -->
  <ellipse cx="512" cy="740" rx="260" ry="60" fill="#2E7D32" opacity="0.7"/>
  <!-- 원통 내부 레이어 선 (용량 구분) -->
  <line x1="252" y1="460" x2="772" y2="460" stroke="#001A00" stroke-width="6" opacity="0.4"/>
  <line x1="252" y1="570" x2="772" y2="570" stroke="#001A00" stroke-width="6" opacity="0.4"/>
  <line x1="252" y1="650" x2="772" y2="650" stroke="#001A00" stroke-width="6" opacity="0.4"/>
  <!-- 채워진 레벨 표시 (70%) -->
  <rect x="252" y="460" width="520" height="280" fill="#81C784" opacity="0.25"/>
  <ellipse cx="512" cy="460" rx="260" ry="55" fill="#81C784" opacity="0.35"/>
  <!-- 레벨 눈금자 -->
  <line x1="782" y1="320" x2="782" y2="740" stroke="#81C784" stroke-width="6" opacity="0.5"/>
  <line x1="782" y1="460" x2="802" y2="460" stroke="#81C784" stroke-width="6"/>
  <line x1="782" y1="570" x2="802" y2="570" stroke="#81C784" stroke-width="6"/>
  <line x1="782" y1="650" x2="802" y2="650" stroke="#81C784" stroke-width="6"/>
  <!-- 상단 캡 -->
  <ellipse cx="512" cy="320" rx="200" ry="40" fill="#81C784" opacity="0.4"/>
</svg>
