  <line x1="512" y1="150" x2="512" y2="110" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
  <line x1="620" y1="185" x2="647" y2="152" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
  <line x1="680" y1="280" x2="718" y2="268" stroke="#FDE68A" stroke-width="18" stroke-linecap="round"/>
