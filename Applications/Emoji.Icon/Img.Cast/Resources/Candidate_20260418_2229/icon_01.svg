<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#29B6F6"/>
  <!-- Layer 2: Main object - SVG file box left, arrow, ICO box right -->
  <rect x="100" y="340" width="240" height="300" rx="24" fill="#FFFFFF" opacity="0.95"/>
  <text x="220" y="470" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#0288D1" text-anchor="middle">SVG</text>
  <text x="220" y="560" font-family="Arial, sans-serif" font-size="36" fill="#4FC3F7" text-anchor="middle">.svg</text>
  <!-- Arrow -->
  <path d="M370 512 L650 512" stroke="#FF6F00" stroke-width="28" stroke-linecap="round"/>
  <polygon points="650,470 740,512 650,554" fill="#FF6F00"/>
  <!-- ICO box right -->
  <rect x="684" y="340" width="240" height="300" rx="24" fill="#FF8F00" opacity="0.95"/>
  <text x="804" y="470" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" text-anchor="middle">ICO</text>
  <text x="804" y="560" font-family="Arial, sans-serif" font-size="36" fill="#FFE082" text-anchor="middle">.ico</text>
  <!-- Layer 3: Sparkle detail -->
  <circle cx="512" cy="230" r="28" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="512" cy="790" r="18" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="310" cy="760" r="14" fill="#FFE082" opacity="0.8"/>
  <circle cx="714" cy="760" r="14" fill="#FFFFFF" opacity="0.8"/>
</svg>
