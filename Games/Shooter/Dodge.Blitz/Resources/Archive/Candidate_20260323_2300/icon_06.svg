<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg06" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#9D174D"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <radialGradient id="center06" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F9A8D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <circle cx="512" cy="512" r="450" fill="url(#center06)" clip-path="url(#clip06)"/>
  <g clip-path="url(#clip06)">
    <!-- Layer 2: 소용돌이 경로 (나선형) -->
    <!-- 소용돌이 바깥 레이어 -->
    <path d="M 512 512
             C 512 512 700 420 780 300
             C 860 180 820 80 700 120
             C 580 160 520 280 560 380
             C 600 480 700 520 760 600
             C 820 680 800 800 680 820
             C 560 840 460 760 420 660
             C 380 560 400 440 460 360
             C 520 280 600 260 660 300"
      fill="none" stroke="#F472B6" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
    <!-- 소용돌이 안 레이어 -->
    <path d="M 512 512
             C 512 512 600 470 640 400
             C 680 330 660 270 600 280
             C 540 290 510 350 530 400
             C 550 450 600 470 620 510
             C 640 550 630 600 590 620
             C 550 640 510 620 490 580"
      fill="none" stroke="#F472B6" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
    <!-- 소용돌이 화살표 방향 마커들 -->
    <polygon points="780,300 810,270 760,260 790,290" fill="#FFFFFF" opacity="0.8"/>
    <polygon points="420,660 390,690 430,710 400,680" fill="#FFFFFF" opacity="0.8"/>

    <!-- Layer 3: 회피 경로 상의 총알들 -->
    <!-- 총알들 나선 주변에 배치 -->
    <ellipse cx="300" cy="350" rx="12" ry="22" fill="#FFFFFF"/>
    <ellipse cx="250" cy="500" rx="12" ry="22" fill="#FFFFFF" transform="rotate(30 250 500)"/>
    <ellipse cx="320" cy="650" rx="12" ry="22" fill="#FFFFFF"/>
    <ellipse cx="500" cy="760" rx="12" ry="22" fill="#FFFFFF" transform="rotate(90 500 760)"/>
    <ellipse cx="700" cy="700" rx="12" ry="22" fill="#FFFFFF" transform="rotate(45 700 700)"/>
    <ellipse cx="830" cy="550" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-20 830 550)"/>
    <ellipse cx="820" cy="380" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-50 820 380)"/>
    <ellipse cx="700" cy="220" rx="12" ry="22" fill="#FFFFFF" transform="rotate(-80 700 220)"/>
    <ellipse cx="550" cy="180" rx="12" ry="22" fill="#FFFFFF" transform="rotate(90 550 180)"/>
    <ellipse cx="380" cy="220" rx="12" ry="22" fill="#FFFFFF" transform="rotate(80 380 220)"/>
    <!-- 중앙 플레이어 도트 -->
    <circle cx="512" cy="512" r="22" fill="#FFFFFF"/>
    <circle cx="512" cy="512" r="12" fill="#F472B6"/>
    <!-- 경로 궤적 점선 -->
    <circle cx="512" cy="512" r="120" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10 20" opacity="0.3"/>
    <circle cx="512" cy="512" r="220" fill="none" stroke="#F472B6" stroke-width="2" stroke-dasharray="8 24" opacity="0.2"/>
  </g>
</svg>
