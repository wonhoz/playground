<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimal morse signal line -->
  <line x1="70" y1="256" x2="442" y2="256" stroke="#333" stroke-width="3"/>
  <!-- Dots and dashes on line -->
  <circle cx="100" cy="256" r="14" fill="#EEEEEE"/>
  <rect x="128" y="242" width="40" height="28" rx="6" fill="#EEEEEE"/>
  <circle cx="188" cy="256" r="14" fill="#EEEEEE"/>
  <circle cx="222" cy="256" r="14" fill="#EEEEEE"/>
  <rect x="250" y="242" width="40" height="28" rx="6" fill="#EEEEEE"/>
  <circle cx="312" cy="256" r="14" fill="#EEEEEE"/>
  <rect x="338" y="242" width="40" height="28" rx="6" fill="#EEEEEE"/>
  <circle cx="400" cy="256" r="14" fill="#EEEEEE"/>
  <!-- Running figure above line -->
  <circle cx="256" cy="178" r="20" fill="#EEEEEE"/>
  <line x1="256" y1="198" x2="256" y2="236" stroke="#EEEEEE" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="214" x2="234" y2="202" stroke="#EEEEEE" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="214" x2="278" y2="208" stroke="#EEEEEE" stroke-width="5" stroke-linecap="round"/>
  <!-- Jump arc dashed -->
  <path d="M 200 256 Q 256 170 312 256" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5,5"/>
  <!-- Title -->
  <text x="256" y="340" text-anchor="middle" font-family="monospace" font-size="13" fill="#888">· − · · · −−−</text>
  <text x="256" y="380" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#EEEEEE">MORSE.RUN</text>
</svg>