<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 타임라인 베이스 -->
  <line x1="80" y1="300" x2="432" y2="300" stroke="#EF4444" stroke-width="2" opacity="0.3"/>
  <!-- 오디오 파형 -->
  <path d="M 80 300 L 100 280 L 115 320 L 130 260 L 145 340 L 160 250 L 175 350 L 190 240 L 205 340 L 220 260 L 235 320 L 250 270 L 265 330 L 280 255 L 295 345 L 310 265 L 325 325 L 340 280 L 355 310 L 370 290 L 385 300 L 400 295 L 415 300 L 432 300"
        fill="none" stroke="#EF4444" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 재생 헤드 -->
  <line x1="250" y1="230" x2="250" y2="370" stroke="#EF4444" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
  <polygon points="250,220 240,238 260,238" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <!-- REC 점 -->
  <circle cx="390" cy="160" r="14" fill="#EF4444" opacity="0.9" filter="url(#glow)"/>
  <text x="415" y="166" fill="#EF4444" font-size="14" font-family="monospace" font-weight="bold">REC</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#EF4444" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">TIMELINE WAVE</text>
</svg>
