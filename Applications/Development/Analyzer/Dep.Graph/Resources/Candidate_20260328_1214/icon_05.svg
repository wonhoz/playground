<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 밝은 청록 -->
  <defs>
    <linearGradient id="bg_dg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg_dg05)"/>

  <!-- 배경 그래프 네트워크 (연하게) -->
  <line x1="200" y1="300" x2="400" y2="200" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="400" y1="200" x2="620" y2="280" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="620" y1="280" x2="820" y2="200" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="200" y1="300" x2="300" y2="480" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="620" y1="280" x2="720" y2="460" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="300" y1="480" x2="500" y2="540" stroke="white" stroke-width="8" opacity="0.35"/>
  <line x1="720" y1="460" x2="820" y2="600" stroke="white" stroke-width="8" opacity="0.35"/>

  <circle cx="200" cy="300" r="20" fill="white" opacity="0.4"/>
  <circle cx="400" cy="200" r="20" fill="white" opacity="0.4"/>
  <circle cx="620" cy="280" r="20" fill="white" opacity="0.4"/>
  <circle cx="820" cy="200" r="20" fill="white" opacity="0.4"/>
  <circle cx="300" cy="480" r="20" fill="white" opacity="0.4"/>
  <circle cx="720" cy="460" r="20" fill="white" opacity="0.4"/>

  <!-- npm 뱃지 (좌측) -->
  <rect x="100" y="520" width="320" height="180" rx="24" fill="#CC3534"/>
  <!-- npm 내부 블록 형태 -->
  <rect x="130" y="548" width="80" height="120" rx="6" fill="white"/>
  <rect x="220" y="548" width="80" height="120" rx="6" fill="white"/>
  <rect x="310" y="548" width="80" height="120" rx="6" fill="white"/>
  <rect x="220" y="608" width="80" height="60" rx="6" fill="#CC3534"/>
  <text x="260" y="742" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="900" fill="white">npm</text>

  <!-- 연결선 (가운데) -->
  <line x1="420" y1="610" x2="604" y2="610" stroke="#006064" stroke-width="18" stroke-linecap="round"/>
  <circle cx="512" cy="610" r="20" fill="#006064"/>
  <!-- 연결 화살표 양방향 -->
  <polygon points="604,610 572,592 572,628" fill="#006064"/>
  <polygon points="420,610 452,592 452,628" fill="#006064"/>

  <!-- NuGet 뱃지 (우측) -->
  <rect x="604" y="520" width="320" height="180" rx="24" fill="#004880"/>
  <!-- NuGet 내부 — 공 모양 -->
  <circle cx="730" cy="610" r="68" fill="white"/>
  <circle cx="730" cy="610" r="48" fill="#004880"/>
  <!-- NuGet 텍스트 -->
  <text x="764" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" fill="white">Nu</text>
  <text x="800" y="742" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="white">NuGet</text>

  <!-- pip 뱃지 (하단 중앙) -->
  <rect x="340" y="760" width="344" height="140" rx="24" fill="#3572A5"/>
  <text x="512" y="850" text-anchor="middle" font-family="Consolas, monospace" font-size="60" font-weight="900" fill="white">pip</text>

  <!-- 연결선: npm → pip -->
  <path d="M260,700 Q260,760 380,790" fill="none" stroke="#CC3534" stroke-width="12" stroke-linecap="round" stroke-dasharray="18 12"/>
  <!-- 연결선: NuGet → pip -->
  <path d="M764,700 Q764,760 644,790" fill="none" stroke="#004880" stroke-width="12" stroke-linecap="round" stroke-dasharray="18 12"/>

  <!-- 상단 타이틀 -->
  <rect x="280" y="120" width="464" height="76" rx="20" fill="#006064"/>
  <text x="512" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="900" fill="white">Dep.Graph</text>
</svg>
