<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 라벤더 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: 드롭존 점선 박스 -->
  <rect x="140" y="240" width="744" height="500" rx="36"
        fill="none" stroke="#9C27B0" stroke-width="20" stroke-dasharray="40,20"/>
  <!-- 파일 낙하 중 (코럴 색 파일 카드) -->
  <rect x="350" y="120" width="220" height="280" rx="20" fill="#FF7043"/>
  <!-- 파일 상단 접힌 귀퉁이 -->
  <polygon points="510,120 570,120 570,180" fill="#BF360C"/>
  <line x1="510" y1="120" x2="510" y2="180" stroke="#BF360C" stroke-width="6"/>
  <!-- 파일 텍스트 -->
  <text x="460" y="260" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle">IMG</text>
  <!-- 낙하 화살표 -->
  <line x1="460" y1="420" x2="460" y2="540" stroke="#7B1FA2" stroke-width="24" stroke-linecap="round" stroke-dasharray="20,16"/>
  <polygon points="420,540 500,540 460,600" fill="#7B1FA2"/>
  <!-- Layer 3: 드롭 힌트 텍스트 -->
  <text x="512" y="680" font-family="'Segoe UI', Arial, sans-serif" font-size="72" fill="#6A1B9A" text-anchor="middle">여기에 드롭</text>
  <!-- 포맷 배지들 -->
  <rect x="160" y="780" width="140" height="56" rx="28" fill="#E91E63"/>
  <text x="230" y="823" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="40" fill="white" text-anchor="middle">SVG</text>
  <rect x="320" y="780" width="140" height="56" rx="28" fill="#1976D2"/>
  <text x="390" y="823" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="40" fill="white" text-anchor="middle">PNG</text>
  <rect x="480" y="780" width="140" height="56" rx="28" fill="#388E3C"/>
  <text x="550" y="823" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="40" fill="white" text-anchor="middle">ICO</text>
  <rect x="640" y="780" width="140" height="56" rx="28" fill="#F57C00"/>
  <text x="710" y="823" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="40" fill="white" text-anchor="middle">JPG</text>
</svg>
