<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCFF90"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 왼쪽 — 뒤섞인 사진들 (혼돈) -->
  <rect x="80" y="300" width="200" height="150" rx="14" fill="white" opacity="0.85" transform="rotate(15 180 375)"/>
  <rect x="100" y="350" width="200" height="150" rx="14" fill="#FFF9C4" opacity="0.8" transform="rotate(-8 200 425)"/>
  <rect x="60" y="400" width="200" height="150" rx="14" fill="#FCE4EC" opacity="0.8" transform="rotate(22 160 475)"/>
  <!-- 혼돈 표시 -->
  <text x="220" y="660" font-family="Arial, sans-serif" font-size="56" fill="#33691E" text-anchor="middle" font-weight="700">chaos</text>
  <!-- 화살표 (가운데) -->
  <polygon points="450,490 580,512 450,534" fill="#33691E" opacity="0.9"/>
  <!-- Layer 2: 오른쪽 — 날짜별 정리된 폴더들 (질서) -->
  <!-- 폴더 01 -->
  <rect x="610" y="260" width="280" height="90" rx="14" fill="#FFF9C4"/>
  <text x="750" y="316" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#33691E" text-anchor="middle">2024-01</text>
  <!-- 폴더 02 -->
  <rect x="610" y="370" width="280" height="90" rx="14" fill="#E8F5E9"/>
  <text x="750" y="426" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#2E7D32" text-anchor="middle">2024-02</text>
  <!-- 폴더 03 -->
  <rect x="610" y="480" width="280" height="90" rx="14" fill="#DCEDC8"/>
  <text x="750" y="536" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#558B2F" text-anchor="middle">2024-03</text>
  <!-- Layer 3: 정리됨 레이블 -->
  <text x="750" y="650" font-family="Arial, sans-serif" font-size="52" fill="#33691E" text-anchor="middle" font-weight="700">sorted!</text>
</svg>
