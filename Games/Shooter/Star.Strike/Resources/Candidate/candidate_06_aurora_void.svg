<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050520"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0088FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF00AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8800FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F8FF"/>
      <stop offset="100%" stop-color="#668899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Aurora bands -->
  <path d="M 0,200 Q 256,100 512,180 L 512,512 L 0,512 Z" fill="url(#aurora1)"/>
  <path d="M 0,160 Q 256,280 512,140 L 512,512 L 0,512 Z" fill="url(#aurora2)"/>
  <!-- Star field -->
  <circle cx="80" cy="80" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="350" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="460" cy="140" r="1" fill="#AAFFCC" opacity="0.7"/>
  <circle cx="420" cy="400" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="70" cy="350" r="1" fill="white" opacity="0.5"/>
  <!-- Constellation lines -->
  <line x1="80" y1="80" x2="350" y2="60" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <line x1="350" y1="60" x2="460" y2="140" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <!-- Ship -->
  <g transform="translate(256, 320)">
    <polygon points="0,-80 -30,24 0,-10 30,24" fill="url(#ship)"/>
    <polygon points="-30,24 -90,58 -54,30 0,-6" fill="#8899AA"/>
    <polygon points="30,24 90,58 54,30 0,-6" fill="#8899AA"/>
    <ellipse cx="0" cy="-48" rx="13" ry="20" fill="#00FF88" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="-16" cy="27" rx="9" ry="14" fill="#0088FF" filter="url(#glow)" opacity="0.85"/>
    <ellipse cx="16" cy="27" rx="9" ry="14" fill="#0088FF" filter="url(#glow)" opacity="0.85"/>
  </g>
  <!-- Aurora laser -->
  <path d="M 244,80 Q 250,150 248,240" stroke="#00FF88" stroke-width="6" fill="none" filter="url(#glow)" opacity="0.8"/>
  <path d="M 256,80 Q 258,150 256,240" stroke="#AAFFCC" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M 268,80 Q 262,150 264,240" stroke="#0088FF" stroke-width="6" fill="none" filter="url(#glow)" opacity="0.8"/>
  <!-- Enemy cluster -->
  <circle cx="370" cy="130" r="18" fill="#FF00AA" opacity="0.7" filter="url(#glow)"/>
  <polygon points="370,106 376,120 392,120 380,130 384,146 370,136 356,146 360,130 348,120 364,120" fill="#FF44CC" opacity="0.9"/>
  <circle cx="130" cy="180" r="14" fill="#FF6600" opacity="0.6" filter="url(#glow)"/>
  <polygon points="130,160 135,171 148,171 138,178 142,191 130,184 118,191 122,178 112,171 125,171" fill="#FFAA44" opacity="0.9"/>
</svg>
