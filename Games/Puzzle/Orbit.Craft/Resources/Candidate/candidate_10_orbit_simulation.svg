<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#08091a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="star_center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="40%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </radialGradient>
    <filter id="starglow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="18" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="60" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="460" cy="220" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="60" cy="400" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="440" cy="430" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="180" cy="460" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="330" cy="470" r="1" fill="#fff" opacity="0.4"/>
  <!-- Solar system simulation: multiple planets -->
  <!-- Orbit rings (simulation grid) -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="#ffffff12" stroke-width="1"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#ffffff10" stroke-width="1"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#ffffff08" stroke-width="1"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ffffff06" stroke-width="1"/>
  <!-- Central star -->
  <circle cx="256" cy="256" r="28" fill="url(#star_center)" filter="url(#starglow)"/>
  <!-- Planet 1 (Mercury-like) -->
  <circle cx="306" cy="256" r="6" fill="#94a3b8" filter="url(#sm)"/>
  <!-- Planet 2 (Venus-like) -->
  <circle cx="256" cy="346" r="9" fill="#fde68a" filter="url(#sm)"/>
  <!-- Planet 3 (Earth-like) -->
  <circle cx="121" cy="256" r="11" fill="#2563eb" filter="url(#sm)"/>
  <!-- Planet 4 (Mars-like) -->
  <circle cx="391" cy="256" r="9" fill="#ef4444" filter="url(#sm)"/>
  <!-- Comet (elliptical path) -->
  <ellipse cx="256" cy="256" rx="185" ry="50" fill="none" stroke="#a5f3fc20" stroke-width="1.5" transform="rotate(-30 256 256)" stroke-dasharray="8,6"/>
  <circle cx="428" cy="180" r="5" fill="#a5f3fc" filter="url(#sm)"/>
  <!-- Comet tail -->
  <path d="M428,180 Q400,195 380,210" stroke="#a5f3fc60" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
