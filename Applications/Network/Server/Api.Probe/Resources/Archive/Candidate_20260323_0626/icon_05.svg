<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Api.Probe | 체온계 — API 건강 상태 체크 | 실루엣/캐릭터 | #FFFBF0 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFFBF0"/>
  <!-- Layer 2: Medical thermometer showing API health -->
  <!-- Thermometer tube -->
  <rect x="458" y="200" width="108" height="500" rx="54" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="4"/>
  <!-- Mercury fill (healthy - green) -->
  <rect x="472" y="350" width="80" height="356" rx="40" fill="#4ADE80"/>
  <!-- Bulb at bottom -->
  <circle cx="512" cy="700" r="60" fill="#4ADE80" stroke="#9CA3AF" stroke-width="4"/>
  <circle cx="512" cy="700" r="46" fill="#22C55E"/>
  <!-- Scale markings on thermometer -->
  <line x1="554" y1="240" x2="580" y2="240" stroke="#6B7280" stroke-width="3"/>
  <text x="592" y="246" font-family="monospace" font-size="16" fill="#6B7280">500</text>
  <line x1="554" y1="310" x2="580" y2="310" stroke="#6B7280" stroke-width="3"/>
  <text x="592" y="316" font-family="monospace" font-size="16" fill="#6B7280">400</text>
  <line x1="554" y1="380" x2="580" y2="380" stroke="#6B7280" stroke-width="3"/>
  <text x="592" y="386" font-family="monospace" font-size="16" fill="#DC2626">300</text>
  <!-- Current reading line (healthy zone) -->
  <line x1="440" y1="352" x2="600" y2="352" stroke="#16A34A" stroke-width="4" stroke-dasharray="8,4"/>
  <text x="600" y="348" font-family="monospace" font-size="18" fill="#16A34A" font-weight="bold">200</text>
  <!-- Layer 3: API status labels -->
  <!-- Danger zone (top) -->
  <rect x="200" y="220" width="220" height="100" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="310" y="262" font-family="Arial,sans-serif" font-size="16" fill="#DC2626" text-anchor="middle" font-weight="bold">🔴 5xx Error</text>
  <text x="310" y="288" font-family="monospace" font-size="13" fill="#DC2626" text-anchor="middle">서버 오류</text>
  <!-- Warning zone -->
  <rect x="200" y="336" width="220" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="310" y="378" font-family="Arial,sans-serif" font-size="16" fill="#D97706" text-anchor="middle" font-weight="bold">🟡 4xx Warn</text>
  <text x="310" y="404" font-family="monospace" font-size="13" fill="#D97706" text-anchor="middle">클라이언트 오류</text>
  <!-- Healthy zone -->
  <rect x="200" y="452" width="220" height="100" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="310" y="494" font-family="Arial,sans-serif" font-size="16" fill="#15803D" text-anchor="middle" font-weight="bold">🟢 2xx OK</text>
  <text x="310" y="520" font-family="monospace" font-size="13" fill="#16A34A" text-anchor="middle">정상 응답 ✓</text>
  <!-- Connecting lines -->
  <line x1="420" y1="270" x2="458" y2="270" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="420" y1="386" x2="458" y2="386" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="420" y1="502" x2="458" y2="502" stroke="#16A34A" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
