<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0500"/>
      <stop offset="100%" stop-color="#1A0800"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame1" x1="0%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="70%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FFE000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="380" r="200" fill="url(#glow)"/>
  <!-- Logs -->
  <rect x="160" y="370" width="200" height="22" rx="11" fill="#5C3A1E" transform="rotate(-15 260 381)"/>
  <rect x="155" y="370" width="200" height="22" rx="11" fill="#7A4E2D" transform="rotate(15 255 381)"/>
  <!-- Flames -->
  <ellipse cx="236" cy="300" rx="30" ry="80" fill="url(#flame1)" opacity="0.9"/>
  <ellipse cx="270" cy="280" rx="36" ry="100" fill="url(#flame2)" opacity="0.9"/>
  <ellipse cx="290" cy="310" rx="24" ry="70" fill="url(#flame1)" opacity="0.8"/>
  <!-- Inner bright flame -->
  <ellipse cx="262" cy="320" rx="18" ry="55" fill="#FFE000" opacity="0.6"/>
  <ellipse cx="258" cy="340" rx="10" ry="30" fill="white" opacity="0.3"/>
  <!-- Sparks -->
  <circle cx="220" cy="220" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="290" cy="200" r="2" fill="#FF8C00" opacity="0.8"/>
  <circle cx="240" cy="175" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="300" cy="230" r="3" fill="#FFA500" opacity="0.9"/>
  <!-- Sound waves -->
  <path d="M180,400 Q256,370 332,400" fill="none" stroke="#FF6600" stroke-width="2" opacity="0.3"/>
  <path d="M150,420 Q256,385 362,420" fill="none" stroke="#FF4500" stroke-width="1.5" opacity="0.2"/>
</svg>