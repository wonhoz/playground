<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2E1A"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="file" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Audio file document -->
  <rect x="112" y="72" width="240" height="300" rx="16" fill="url(#file)" stroke="#81C784" stroke-width="6"/>
  <!-- Folded corner -->
  <polygon points="352,72 400,72 400,120 352,120" fill="#1B5E20"/>
  <polygon points="352,72 400,120 352,120" fill="#A5D6A7" opacity="0.8"/>
  <!-- Music note on file -->
  <g fill="#A5D6A7" opacity="0.9">
    <rect x="188" y="148" width="14" height="64" rx="3"/>
    <ellipse cx="180" cy="216" rx="18" ry="12" transform="rotate(-15 180 216)"/>
    <rect x="202" y="148" width="14" height="50" rx="3"/>
    <ellipse cx="194" cy="202" rx="18" ry="12" transform="rotate(-15 194 202)"/>
    <rect x="188" y="148" width="28" height="10" rx="3"/>
  </g>
  <!-- File type label -->
  <rect x="112" y="324" width="240" height="48" rx="16" fill="#43A047" opacity="0.9"/>
  <text x="232" y="356" text-anchor="middle" font-size="28" font-weight="bold" fill="#E8F5E9" font-family="monospace">MP3</text>
  <!-- ID3 tag badge -->
  <path d="M 268,360 L 380,360 L 408,400 L 380,440 L 268,440 Z" fill="url(#badge)" opacity="0.95"/>
  <circle cx="288" cy="400" r="12" fill="#0A2E1A"/>
  <rect x="310" y="392" width="72" height="10" rx="5" fill="#E8F5E9" opacity="0.9"/>
  <rect x="310" y="406" width="56" height="8" rx="4" fill="#C8E6C9" opacity="0.7"/>
</svg>
