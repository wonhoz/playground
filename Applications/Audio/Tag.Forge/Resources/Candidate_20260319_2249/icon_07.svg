<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: DNA double helix made of tag labels -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#00081A"/>
  <!-- Left strand -->
  <path d="M380 140 Q280 260 380 380 Q480 500 380 620 Q280 740 380 880" fill="none" stroke="#1565C0" stroke-width="18" stroke-linecap="round"/>
  <!-- Right strand -->
  <path d="M644 140 Q744 260 644 380 Q544 500 644 620 Q744 740 644 880" fill="none" stroke="#1565C0" stroke-width="18" stroke-linecap="round"/>
  <!-- Rungs (tag labels connecting strands) -->
  <!-- Rung 1 -->
  <rect x="330" y="200" width="364" height="36" rx="18" fill="#0D3B8A" stroke="#1976D2" stroke-width="10"/>
  <rect x="360" y="210" width="120" height="16" rx="8" fill="#1976D2" opacity="0.8"/>
  <rect x="490" y="210" width="80" height="16" rx="8" fill="#1976D2" opacity="0.5"/>
  <!-- Rung 2 -->
  <rect x="290" y="322" width="444" height="36" rx="18" fill="#0D3B8A" stroke="#1976D2" stroke-width="10"/>
  <rect x="320" y="332" width="150" height="16" rx="8" fill="#1976D2" opacity="0.8"/>
  <rect x="480" y="332" width="100" height="16" rx="8" fill="#1976D2" opacity="0.5"/>
  <!-- Rung 3 (center) — highlighted -->
  <rect x="280" y="444" width="464" height="44" rx="22" fill="#0D2B6A" stroke="#42A5F5" stroke-width="14"/>
  <rect x="314" y="456" width="160" height="20" rx="10" fill="#42A5F5" opacity="0.9"/>
  <rect x="484" y="456" width="120" height="20" rx="10" fill="#42A5F5" opacity="0.6"/>
  <!-- Rung 4 -->
  <rect x="290" y="566" width="444" height="36" rx="18" fill="#0D3B8A" stroke="#1976D2" stroke-width="10"/>
  <rect x="320" y="576" width="130" height="16" rx="8" fill="#1976D2" opacity="0.8"/>
  <rect x="460" y="576" width="110" height="16" rx="8" fill="#1976D2" opacity="0.5"/>
  <!-- Rung 5 -->
  <rect x="330" y="688" width="364" height="36" rx="18" fill="#0D3B8A" stroke="#1976D2" stroke-width="10"/>
  <rect x="360" y="698" width="140" height="16" rx="8" fill="#1976D2" opacity="0.8"/>
  <rect x="510" y="698" width="90" height="16" rx="8" fill="#1976D2" opacity="0.5"/>
  <!-- Rung 6 -->
  <rect x="370" y="810" width="284" height="36" rx="18" fill="#0D3B8A" stroke="#1976D2" stroke-width="10"/>
  <rect x="400" y="820" width="110" height="16" rx="8" fill="#1976D2" opacity="0.7"/>
</svg>
