<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 회로 기판 패턴 -->
  <line x1="120" y1="150" x2="200" y2="150" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="150" x2="200" y2="200" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="200" x2="280" y2="200" stroke="#8B5CF6" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="280" y1="200" x2="280" y2="150" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="150" x2="390" y2="150" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="256" x2="180" y2="256" stroke="#A78BFA" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="180" y1="256" x2="180" y2="310" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="180" y1="310" x2="330" y2="310" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="330" y1="310" x2="330" y2="256" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
  <line x1="330" y1="256" x2="390" y2="256" stroke="#A78BFA" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="120" y1="370" x2="240" y2="370" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <line x1="240" y1="370" x2="240" y2="420" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <line x1="240" y1="420" x2="390" y2="420" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <!-- 회로 컴포넌트 (API 컴포넌트) -->
  <rect x="228" y="178" width="52" height="22" rx="4" fill="#8B5CF6" opacity="0.3" filter="url(#glow)"/>
  <text x="254" y="193" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace">REST</text>
  <rect x="150" y="240" width="60" height="32" rx="4" fill="#A78BFA" opacity="0.2" filter="url(#glow)"/>
  <text x="180" y="260" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace">AUTH</text>
  <rect x="290" y="240" width="60" height="32" rx="4" fill="#A78BFA" opacity="0.2" filter="url(#glow)"/>
  <text x="320" y="260" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace">RATE</text>
  <!-- 노드들 -->
  <circle cx="120" cy="150" r="8" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="390" cy="150" r="8" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="120" cy="256" r="8" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="390" cy="256" r="8" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="120" cy="370" r="7" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="390" cy="420" r="7" fill="#8B5CF6" opacity="0.7"/>
</svg>