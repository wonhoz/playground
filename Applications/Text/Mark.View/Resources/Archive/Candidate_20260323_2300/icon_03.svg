<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <clipPath id="clip03"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <g clip-path="url(#clip03)">
    <!-- Layer 2: .MD 파일 뱃지 -->
    <!-- 파일 카드 -->
    <rect x="230" y="180" width="440" height="520" rx="28" fill="#FFFFFF" opacity="0.95"/>
    <!-- 파일 상단 탭 (접힌 모서리) -->
    <polygon points="560,180 670,180 670,280 560,180" fill="#C4B5FD"/>
    <polygon points="560,180 670,280 560,280" fill="#A78BFA"/>
    <!-- .MD 뱃지 -->
    <rect x="248" y="440" width="212" height="88" rx="14" fill="#7C3AED"/>
    <text x="354" y="500" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">.MD</text>
    <!-- Layer 3: 눈 아이콘 -->
    <!-- 눈 테두리 -->
    <ellipse cx="600" cy="740" rx="160" ry="100" fill="none" stroke="#FDE68A" stroke-width="28"/>
    <!-- 눈 흰자 채움 -->
    <ellipse cx="600" cy="740" rx="155" ry="95" fill="#FDE68A" opacity="0.15"/>
    <!-- 눈동자 -->
    <circle cx="600" cy="740" r="44" fill="#FDE68A"/>
    <circle cx="600" cy="740" r="22" fill="#7C3AED"/>
    <!-- 하이라이트 -->
    <circle cx="616" cy="726" r="10" fill="#FFFFFF" opacity="0.8"/>
    <!-- 속눈썹 -->
    <line x1="510" y1="700" x2="496" y2="682" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <line x1="560" y1="672" x2="554" y2="650" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <line x1="612" y1="662" x2="612" y2="638" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <line x1="664" y1="672" x2="670" y2="650" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <line x1="710" y1="700" x2="726" y2="682" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
