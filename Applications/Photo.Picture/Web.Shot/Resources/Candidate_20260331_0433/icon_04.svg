<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 크림 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F0"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 폴라로이드 사진 (살짝 기울어진) -->
  <rect x="200" y="140" width="624" height="740" rx="16" fill="white" stroke="#E0E0E0" stroke-width="8" transform="rotate(-5 512 510)"/>
  <!-- 사진 영역 (웹페이지) -->
  <rect x="220" y="160" width="584" height="560" rx="8" fill="#1565C0" transform="rotate(-5 512 440)"/>
  <!-- 웹페이지 미니어처 -->
  <rect x="240" y="180" width="584" height="60" rx="8" fill="#0D47A1" transform="rotate(-5 532 210)"/>
  <text x="532" y="213" font-family="'Segoe UI', sans-serif" font-size="36" fill="white" text-anchor="middle" transform="rotate(-5 532 213)">https://example.com</text>
  <!-- 사진 하단 여백 (폴라로이드 특유) -->
  <rect x="220" y="720" width="584" height="140" rx="0" fill="white" transform="rotate(-5 512 790)"/>
  <text x="512" y="806" font-family="'Segoe UI', sans-serif" font-size="40" fill="#9E9E9E" text-anchor="middle" transform="rotate(-5 512 806)">2026-03-31</text>
  <!-- Layer 3: 카메라 플래시 효과 (우상단) -->
  <circle cx="820" cy="200" r="100" fill="#FFD600" opacity="0.8"/>
  <circle cx="820" cy="200" r="60" fill="white" opacity="0.6"/>
  <!-- 빛 방사선 -->
  <line x1="820" y1="80" x2="820" y2="40" stroke="#FFD600" stroke-width="16" stroke-linecap="round"/>
  <line x1="940" y1="80" x2="970" y2="50" stroke="#FFD600" stroke-width="16" stroke-linecap="round"/>
  <line x1="940" y1="200" x2="980" y2="200" stroke="#FFD600" stroke-width="16" stroke-linecap="round"/>
  <line x1="700" y1="80" x2="670" y2="50" stroke="#FFD600" stroke-width="16" stroke-linecap="round"/>
</svg>
