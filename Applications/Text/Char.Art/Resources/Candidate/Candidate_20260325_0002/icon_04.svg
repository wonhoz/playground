<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Navy blue -->
  <rect width="1024" height="1024" rx="190" fill="#1565C0"/>

  <!-- "A" letterform silhouette (white fill) -->
  <!-- Two legs + crossbar of A -->
  <polygon points="512,190 680,810 620,810 512,480 404,810 344,810"
           fill="white"/>
  <!-- Crossbar cutout to make A shape more visible -->
  <polygon points="445,560 579,560 555,630 469,630"
           fill="#1565C0"/>

  <!-- Overlay: tiny "#@$*" texture characters on the A shape (navy color) -->
  <!-- Left leg area -->
  <text x="420" y="500" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">#@</text>
  <text x="388" y="600" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">$*#</text>
  <text x="365" y="700" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">@#$</text>
  <!-- Right leg area -->
  <text x="604" y="500" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">$*</text>
  <text x="635" y="600" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">#@$</text>
  <text x="659" y="700" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">*#@</text>
  <!-- Top of A -->
  <text x="512" y="310" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">@</text>
  <text x="512" y="400" font-family="'Courier New', monospace" font-size="55" font-weight="700"
        text-anchor="middle" fill="#0D47A1" opacity="0.85">#$</text>

  <!-- Surrounding dots -->
  <text x="240" y="400" font-family="'Courier New', monospace" font-size="80"
        text-anchor="middle" fill="rgba(255,255,255,0.4)">.</text>
  <text x="785" y="380" font-family="'Courier New', monospace" font-size="80"
        text-anchor="middle" fill="rgba(255,255,255,0.4)">.</text>
  <text x="215" y="750" font-family="'Courier New', monospace" font-size="80"
        text-anchor="middle" fill="rgba(255,255,255,0.3)">.</text>
  <text x="810" y="750" font-family="'Courier New', monospace" font-size="80"
        text-anchor="middle" fill="rgba(255,255,255,0.3)">.</text>
</svg>
