<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#020510"/>
  <!-- Stars background -->
  <circle cx="200" cy="200" r="4" fill="#5C6BC0" opacity="0.6"/>
  <circle cx="380" cy="160" r="3" fill="#5C6BC0" opacity="0.5"/>
  <circle cx="700" cy="220" r="5" fill="#5C6BC0" opacity="0.7"/>
  <circle cx="850" cy="300" r="3" fill="#5C6BC0" opacity="0.4"/>
  <circle cx="160" cy="500" r="4" fill="#5C6BC0" opacity="0.5"/>
  <circle cx="900" cy="600" r="4" fill="#5C6BC0" opacity="0.6"/>
  <!-- Big star -->
  <polygon points="512,180 540,270 634,270 558,326 586,416 512,360 438,416 466,326 390,270 484,270" fill="#5C6BC0"/>
  <!-- Laser beams from star -->
  <line x1="512" y1="416" x2="512" y2="820" stroke="#5C6BC0" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="416" x2="200" y2="700" stroke="#1A237E" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="416" x2="824" y2="700" stroke="#1A237E" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- Impact flashes -->
  <circle cx="512" cy="820" r="30" fill="#5C6BC0" opacity="0.8"/>
  <circle cx="200" cy="700" r="24" fill="#5C6BC0" opacity="0.7"/>
  <circle cx="824" cy="700" r="24" fill="#5C6BC0" opacity="0.7"/>
</svg>
