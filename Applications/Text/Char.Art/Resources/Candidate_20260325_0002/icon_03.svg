<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Deep purple -->
  <rect width="1024" height="1024" rx="190" fill="#2D1B69"/>

  <!-- Grid lines (4x4 grid: 4 columns x 4 rows) -->
  <!-- Vertical lines -->
  <line x1="390" y1="210" x2="390" y2="814" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="551" y1="210" x2="551" y2="814" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="712" y1="210" x2="712" y2="814" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Horizontal lines -->
  <line x1="229" y1="361" x2="833" y2="361" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="229" y1="512" x2="833" y2="512" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="229" y1="663" x2="833" y2="663" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Border -->
  <rect x="229" y="210" width="604" height="604" rx="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

  <!-- Row 1: dense → sparse (top = dark/dense) -->
  <!-- Cell (0,0): very dense @@@-->
  <text x="270" y="335" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,1.0)">@@@</text>
  <!-- Cell (0,1) -->
  <text x="470" y="335" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.9)">##</text>
  <!-- Cell (0,2) -->
  <text x="631" y="335" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.75)">$$</text>
  <!-- Cell (0,3) -->
  <text x="792" y="335" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.55)">%%</text>

  <!-- Row 2 -->
  <text x="270" y="485" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">##</text>
  <text x="470" y="485" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.70)">$*</text>
  <text x="631" y="485" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.50)">+ +</text>
  <text x="792" y="485" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.35)">: :</text>

  <!-- Row 3 -->
  <text x="270" y="635" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.65)">$$</text>
  <text x="470" y="635" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.45)">+ .</text>
  <text x="631" y="635" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.30)">. .</text>
  <text x="792" y="635" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.18)">  .</text>

  <!-- Row 4: sparse -->
  <text x="270" y="785" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.45)">+ .</text>
  <text x="470" y="785" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.28)">. .</text>
  <text x="631" y="785" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.16)"> . </text>
  <text x="792" y="785" font-family="'Courier New', monospace" font-size="82" font-weight="900"
        text-anchor="middle" fill="rgba(255,255,255,0.08)">  .</text>
</svg>
