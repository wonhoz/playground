<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 산호-핑크 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="50%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E91E8C"/>
    </linearGradient>
    <clipPath id="clip06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>

  <g clip-path="url(#clip06)">
    <!-- Layer 2: 도전자 실루엣 (앉아서 생각하는 포즈) -->
    <!-- 몸통 -->
    <rect x="320" y="550" width="260" height="380" rx="60" fill="#4A148C"/>
    <!-- 머리 -->
    <circle cx="450" cy="470" r="120" fill="#FFCCBC"/>
    <!-- 머리카락 -->
    <ellipse cx="450" cy="365" rx="118" ry="56" fill="#4E342E"/>
    <!-- 눈 (고민하는 눈) -->
    <circle cx="414" cy="465" r="16" fill="#37474F"/>
    <circle cx="488" cy="465" r="16" fill="#37474F"/>
    <!-- 눈썹 (찌푸림) -->
    <path d="M400 440 Q414 430 428 438" stroke="#4E342E" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M474 438 Q488 430 502 440" stroke="#4E342E" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 입 (고민 표정) -->
    <path d="M424 510 Q450 498 476 510" stroke="#8D6E63" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 팔 (손으로 턱을 받침) -->
    <path d="M320 600 Q240 560 200 620 Q180 680 230 720 Q280 755 340 700" stroke="#FFCCBC" stroke-width="60" stroke-linecap="round" fill="none"/>
    <!-- 손 (턱받침) -->
    <circle cx="310" cy="510" r="54" fill="#FFCCBC"/>

    <!-- Layer 3: 물음표 말풍선들 (여러 개) -->
    <!-- 큰 말풍선 (우상단) -->
    <rect x="540" y="180" width="380" height="260" rx="32" fill="#FFFFFF"/>
    <path d="M555 440 L540 490 L610 440 Z" fill="#FFFFFF"/>
    <text x="730" y="330" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="140" fill="#E91E8C" text-anchor="middle">?</text>
    <!-- 카테고리 힌트 텍스트 -->
    <text x="730" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="36" fill="#7B1FA2" text-anchor="middle">수학 · IT · 역사</text>

    <!-- 작은 말풍선 (좌상) -->
    <rect x="110" y="220" width="180" height="120" rx="20" fill="#FFFFFF" opacity="0.9"/>
    <path d="M270 340 L290 380 L250 340 Z" fill="#FFFFFF" opacity="0.9"/>
    <text x="200" y="298" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="80" fill="#FF6B6B" text-anchor="middle">?</text>

    <!-- 떠다니는 ? 여러 개 -->
    <text x="160" y="500" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" opacity="0.5">?</text>
    <text x="780" y="600" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" opacity="0.4">?</text>
    <text x="860" y="760" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" opacity="0.3">?</text>

    <!-- 하단 TRIVIA CAST 배너 -->
    <rect x="110" y="860" width="804" height="82" rx="24" fill="#4A148C"/>
    <text x="512" y="916" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFD54F" text-anchor="middle">TRIVIA CAST</text>
  </g>
</svg>
