  <text x="790" y="457" font-family="'Consolas', monospace" font-size="44" fill="#69F0AE" text-anchor="middle">LISTEN</text>
  <!-- 포트 3306 CLOSE_WAIT -->
  <rect x="80" y="502" width="864" height="80" rx="8" fill="#2A1A1A"/>
  <text x="200" y="554" font-family="'Consolas', monospace" font-size="60" fill="#FFD600" text-anchor="middle">3306</text>
  <text x="500" y="554" font-family="'Consolas', monospace" font-size="52" fill="#90CAF9" text-anchor="middle">TCP</text>
  <rect x="650" y="516" width="280" height="52" rx="26" fill="#BF360C"/>
  <text x="790" y="553" font-family="'Consolas', monospace" font-size="36" fill="#FFAB91" text-anchor="middle">CLOSE_WAIT</text>
  <!-- 포트 5432 LISTEN -->
  <rect x="80" y="598" width="864" height="80" rx="8" fill="#1A3A2A"/>
