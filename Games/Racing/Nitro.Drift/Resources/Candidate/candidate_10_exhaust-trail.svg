<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0d0d00"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffff00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Exhaust trail curves -->
  <path d="M60,256 Q120,200 180,256 Q240,312 300,256 Q360,200 420,256" fill="none" stroke="url(#trail)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <path d="M60,256 Q120,200 180,256 Q240,312 300,256 Q360,200 420,256" fill="none" stroke="url(#trail)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- Car silhouette at end -->
  <g transform="translate(355, 230)">
    <rect x="0" y="0" width="80" height="48" rx="12" fill="#cc2200"/>
    <rect x="8" y="6" width="64" height="28" rx="6" fill="#001a33" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="16" cy="52" r="12" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="64" cy="52" r="12" fill="#333" stroke="#555" stroke-width="2"/>
  </g>
  <!-- Particle sparks -->
  <circle cx="350" cy="248" r="3" fill="#ffff00"/>
  <circle cx="320" cy="266" r="2" fill="#ffcc00"/>
  <circle cx="290" cy="255" r="3" fill="#ff8800"/>
  <circle cx="260" cy="270" r="2" fill="#ff6600"/>
  <circle cx="230" cy="258" r="3" fill="#ff4400"/>
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black" font-size="32" font-weight="900" fill="#ff6600">NITRO.DRIFT</text>
</svg>
