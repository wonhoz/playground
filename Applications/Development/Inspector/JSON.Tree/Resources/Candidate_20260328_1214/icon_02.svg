  <text x="300" y="712" font-family="monospace" font-size="72" fill="#FFFFFF">&#125;</text>
  <text x="168" y="790" font-family="monospace" font-size="72" fill="#FFD54F">&#125;</text>
  <!-- 들여쓰기 가이드선 -->
  <line x1="222" y1="306" x2="222" y2="730" stroke="#42A5F5" stroke-width="3" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="292" y1="512" x2="292" y2="718" stroke="#42A5F5" stroke-width="3" stroke-dasharray="6,4" opacity="0.6"/>
