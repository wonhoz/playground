<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel grid camera (32x32 pixel art upscaled) -->
  <!-- Camera body pixels (each pixel = 16x16) -->
  <!-- Row 5-6: viewfinder bump -->
  <rect x="176" y="128" width="160" height="32" fill="#E0E0E0"/>
  <!-- Row 7-14: camera body -->
  <rect x="112" y="160" width="288" height="192" fill="#F5F5F5"/>
  <!-- Lens bezel -->
  <circle cx="256" cy="256" r="80" fill="#BDBDBD"/>
  <circle cx="256" cy="256" r="66" fill="#9C27B0"/>
  <circle cx="256" cy="256" r="50" fill="#CE93D8"/>
  <circle cx="256" cy="256" r="32" fill="#7B1FA2"/>
  <!-- Pixel corners (camera body) -->
  <rect x="112" y="160" width="16" height="16" fill="#BDBDBD"/>
  <rect x="384" y="160" width="16" height="16" fill="#BDBDBD"/>
  <rect x="112" y="336" width="16" height="16" fill="#BDBDBD"/>
  <rect x="384" y="336" width="16" height="16" fill="#BDBDBD"/>
  <!-- Flash pixel -->
  <rect x="336" y="176" width="48" height="32" fill="#FFF176"/>
  <!-- Shutter button pixel -->
  <rect x="208" y="128" width="96" height="32" fill="#CE93D8"/>
  <!-- Pixel lens highlight -->
  <rect x="226" y="226" width="16" height="16" fill="white" opacity="0.6"/>
  <rect x="242" y="212" width="16" height="16" fill="white" opacity="0.3"/>
  <!-- Pixel art sparkles around -->
  <rect x="80" y="96" width="16" height="16" fill="#FFD600"/>
  <rect x="96" y="80" width="16" height="16" fill="#FFD600"/>
  <rect x="80" y="80" width="16" height="16" fill="#FFD600" opacity="0.5"/>
  <rect x="400" y="96" width="16" height="16" fill="#FF4081"/>
  <rect x="416" y="80" width="16" height="16" fill="#FF4081"/>
  <rect x="400" y="80" width="16" height="16" fill="#FF4081" opacity="0.5"/>
  <rect x="80" y="400" width="16" height="16" fill="#00E5FF"/>
  <rect x="96" y="416" width="16" height="16" fill="#00E5FF"/>
  <rect x="416" y="400" width="16" height="16" fill="#69F0AE"/>
  <rect x="400" y="416" width="16" height="16" fill="#69F0AE"/>
  <!-- "8BIT" label -->
  <rect x="160" y="368" width="192" height="40" rx="4" fill="#4A148C"/>
  <text x="256" y="394" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#FFD600" letter-spacing="4">8-BIT</text>
</svg>
