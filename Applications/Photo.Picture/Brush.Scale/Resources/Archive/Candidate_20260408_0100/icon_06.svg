<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: sky blue -->
  <rect width="1024" height="1024" rx="190" fill="#0EA5E9"/>

  <!-- App window frame -->
  <rect x="120" y="170" width="784" height="700" rx="20" fill="white" opacity="0.95"/>

  <!-- Title bar -->
  <rect x="120" y="170" width="784" height="52" rx="20" fill="#0284C7"/>
  <rect x="120" y="194" width="784" height="28" fill="#0284C7"/>
  <text x="512" y="205" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">Brush.Scale</text>

  <!-- File drop area -->
  <rect x="146" y="238" width="730" height="200" rx="14" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="3" stroke-dasharray="12,8"/>
  <!-- Drop icon -->
  <path d="M512,280 L512,370" stroke="#0EA5E9" stroke-width="8" stroke-linecap="round"/>
  <path d="M480,348 L512,384 L544,348" fill="none" stroke="#0EA5E9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="512" y="422" font-family="Arial,sans-serif" font-size="24" fill="#0284C7" text-anchor="middle">Drop image here or click to browse</text>

  <!-- Model selector -->
  <text x="152" y="478" font-family="Arial,sans-serif" font-size="22" fill="#374151" font-weight="bold">AI Model:</text>
  <rect x="268" y="456" width="380" height="44" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="288" y="484" font-family="Arial,sans-serif" font-size="22" fill="#374151">RealESRGAN ×4</text>
  <text x="624" y="484" font-family="Arial,sans-serif" font-size="22" fill="#64748B">▼</text>

  <!-- Scale selector -->
  <text x="152" y="538" font-family="Arial,sans-serif" font-size="22" fill="#374151" font-weight="bold">Scale:</text>
  <rect x="238" y="518" width="80" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="278" y="543" font-family="Arial,sans-serif" font-size="22" fill="#1D4ED8" text-anchor="middle" font-weight="bold">×2</text>
  <rect x="330" y="518" width="80" height="40" rx="8" fill="#1D4ED8"/>
  <text x="370" y="543" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">×4</text>
  <rect x="422" y="518" width="80" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="462" y="543" font-family="Arial,sans-serif" font-size="22" fill="#1D4ED8" text-anchor="middle" font-weight="bold">×8</text>

  <!-- Progress bar (in progress) -->
  <rect x="146" y="578" width="730" height="40" rx="10" fill="#F1F5F9"/>
  <rect x="146" y="578" width="475" height="40" rx="10" fill="#0EA5E9"/>
  <text x="512" y="604" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">Processing... 65%</text>

  <!-- Upscale button -->
  <rect x="146" y="638" width="730" height="60" rx="12" fill="#0369A1"/>
  <text x="512" y="678" font-family="Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Upscale Image</text>

  <!-- Bottom info -->
  <text x="512" y="806" font-family="Consolas,monospace" font-size="22" fill="white" text-anchor="middle" opacity="0.8">800×600 → 3200×2400 px</text>
</svg>
