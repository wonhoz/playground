  <text x="406" y="324" font-family="'Courier New', monospace" font-size="14" fill="#7C3AED">{"name": "Alice"}</text>

  <!-- 서버 박스 (오른쪽) -->
  <rect x="724" y="380" width="220" height="264" rx="16" fill="#1E3A5F"/>
  <rect x="736" y="392" width="196" height="240" rx="12" fill="#1E4D80"/>
  <!-- 서버 아이콘 -->
