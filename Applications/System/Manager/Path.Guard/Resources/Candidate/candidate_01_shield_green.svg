  <path d="M256 60 L400 120 L400 260 Q400 370 256 440 Q112 370 112 260 L112 120 Z" fill="url(#shield)" opacity="0.2" stroke="url(#shield)" stroke-width="4"/>
  <path d="M256 90 L376 142 L376 260 Q376 352 256 414 Q136 352 136 260 L136 142 Z" fill="#001A00" stroke="#00C853" stroke-width="2"/>
