<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#030012"/>
  <!-- Layer 2: 네온 검 실루엣 + 잔상 -->
  <!-- 검 손잡이 -->
  <rect x="460" y="700" width="104" height="40" rx="8" fill="#FFD700"/>
  <rect x="380" y="720" width="264" height="24" rx="6" fill="#FFA000"/>
  <!-- 검날 (대각선) -->
  <line x1="512" y1="700" x2="512" y2="180" stroke="#E0E0E0" stroke-width="28" stroke-linecap="round"/>
  <!-- 검날 빛 -->
  <line x1="512" y1="700" x2="512" y2="180" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- 네온 잔상들 (슬라이스 궤적) -->
  <line x1="200" y1="450" x2="820" y2="360" stroke="#00FF88" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="450" x2="820" y2="360" stroke="#00FF88" stroke-width="20" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="500" x2="820" y2="400" stroke="#00BFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="200" y1="400" x2="820" y2="310" stroke="#7B2FFF" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- 슬라이스 입자 -->
  <circle cx="300" cy="434" r="10" fill="#00FF88" opacity="0.8"/>
  <circle cx="500" cy="417" r="8" fill="#00FF88" opacity="0.6"/>
  <circle cx="700" cy="400" r="12" fill="#00FF88" opacity="0.9"/>
  <!-- Layer 3: NEON 텍스트 -->
  <text x="512" y="870" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#00FF88" text-anchor="middle">NEON</text>
  <text x="512" y="870" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="none" stroke="#00FF88" stroke-width="2" text-anchor="middle" opacity="0.5"/>
</svg>
