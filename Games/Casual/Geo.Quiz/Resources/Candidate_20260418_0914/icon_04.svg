<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 흰 배경 -->
  <defs>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#FFFFFF"/>

  <g clip-path="url(#clip04)">
    <!-- Layer 2: 국기 색조 원들이 원형으로 배치 (8개 대륙/나라 색상) -->
    <!-- 중앙 배치 원: 각 국가 국기 색상의 원형 깃발 심볼들 -->

    <!-- 원1: 🇯🇵 일본 (12시) -->
    <circle cx="512" cy="160" r="96" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <circle cx="512" cy="160" r="50" fill="#C62828"/>

    <!-- 원2: 🇩🇪 독일 (1:30) -->
    <circle cx="752" cy="262" r="96" fill="#FFCE00" stroke="#E0E0E0" stroke-width="6"/>
    <rect x="656" y="202" width="192" height="40" rx="20" fill="#000000"/>
    <rect x="656" y="282" width="192" height="40" rx="20" fill="#DD0000"/>

    <!-- 원3: 🇫🇷 프랑스 (3시) -->
    <circle cx="864" cy="512" r="96" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <rect x="768" y="416" width="64" height="192" rx="32" fill="#003189"/>
    <rect x="864" y="416" width="64" height="192" rx="32" fill="#C62828"/>

    <!-- 원4: 🇧🇷 브라질 (4:30) -->
    <circle cx="752" cy="762" r="96" fill="#009C3B" stroke="#E0E0E0" stroke-width="6"/>
    <polygon points="752,672 840,762 752,852 664,762" fill="#FEDF00"/>
    <circle cx="752" cy="762" r="36" fill="#002776"/>

    <!-- 원5: 🇰🇷 한국 (6시) -->
    <circle cx="512" cy="864" r="96" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="6"/>
    <circle cx="512" cy="864" r="44" fill="none" stroke="#C62828" stroke-width="16"/>
    <path d="M488 840 Q512 816 536 840" stroke="#C62828" stroke-width="16" fill="none"/>
    <path d="M488 888 Q512 912 536 888" stroke="#003580" stroke-width="16" fill="none"/>

    <!-- 원6: 🇦🇺 호주 (7:30) -->
    <circle cx="272" cy="762" r="96" fill="#00008B" stroke="#E0E0E0" stroke-width="6"/>
    <line x1="176" y1="666" x2="368" y2="858" stroke="#FFFFFF" stroke-width="14"/>
    <line x1="368" y1="666" x2="176" y2="858" stroke="#FFFFFF" stroke-width="14"/>
    <line x1="272" y1="666" x2="272" y2="858" stroke="#FFFFFF" stroke-width="10"/>
    <line x1="176" y1="762" x2="368" y2="762" stroke="#FFFFFF" stroke-width="10"/>

    <!-- 원7: 🇺🇸 미국 (9시) -->
    <circle cx="160" cy="512" r="96" fill="#B22234" stroke="#E0E0E0" stroke-width="6"/>
    <rect x="64" y="512" width="192" height="30" fill="#FFFFFF"/>
    <rect x="64" y="572" width="192" height="30" fill="#FFFFFF"/>
    <rect x="64" y="416" width="80" height="96" rx="6" fill="#3C3B6E"/>

    <!-- 원8: 🇨🇳 중국 (10:30) -->
    <circle cx="272" cy="262" r="96" fill="#DE2910" stroke="#E0E0E0" stroke-width="6"/>
    <text x="272" y="282" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#FFDE00" text-anchor="middle">★</text>

    <!-- Layer 3: 중앙 퀴즈 심볼 -->
    <circle cx="512" cy="512" r="180" fill="#1565C0"/>
    <text x="512" y="580" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="220" fill="#FFFFFF" text-anchor="middle">?</text>
  </g>
