<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>
  <!-- Palette shape -->
  <ellipse cx="240" cy="260" rx="160" ry="140" fill="#2A1A3E" stroke="#6B3FA0" stroke-width="3"/>
  <!-- Color blobs on palette -->
  <circle cx="160" cy="220" r="28" fill="#FF3366"/>
  <circle cx="220" cy="180" r="28" fill="#FF8C00"/>
  <circle cx="290" cy="175" r="28" fill="#FFD700"/>
  <circle cx="340" cy="215" r="28" fill="#00E676"/>
  <circle cx="350" cy="280" r="28" fill="#40C4FF"/>
  <circle cx="310" cy="330" r="28" fill="#E040FB"/>
  <!-- Thumb hole -->
  <circle cx="200" cy="310" r="22" fill="#1A0A2E"/>
  <!-- Brush -->
  <rect x="330" y="120" width="16" height="100" rx="8" fill="#8B6914" transform="rotate(35 338 170)"/>
  <ellipse cx="368" cy="112" rx="12" ry="22" fill="#FF4081" transform="rotate(35 368 112)"/>
  <!-- ANSI label -->
  <text x="256" y="490" font-family="monospace" font-size="32" fill="#A0A0A0" text-anchor="middle" opacity="0.5">ANSI</text>
</svg>