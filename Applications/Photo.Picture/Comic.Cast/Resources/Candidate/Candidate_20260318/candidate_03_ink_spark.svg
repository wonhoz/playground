<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#140800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 잉크 방울 형태 -->
  <path d="M 256 120 Q 320 200 320 280 Q 320 370 256 390 Q 192 370 192 280 Q 192 200 256 120 Z" fill="#FB923C" opacity="0.15" filter="url(#glow)"/>
  <path d="M 256 120 Q 320 200 320 280 Q 320 370 256 390 Q 192 370 192 280 Q 192 200 256 120 Z" fill="none" stroke="#FB923C" stroke-width="3" filter="url(#glow)"/>
  <!-- 잉크 방울 하이라이트 -->
  <path d="M 240 160 Q 230 200 230 240" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- 스파크들 -->
  <line x1="256" y1="120" x2="220" y2="85" stroke="#FDBA74" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="120" x2="292" y2="85" stroke="#FDBA74" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <line x1="256" y1="120" x2="256" y2="75" stroke="#FB923C" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
  <line x1="256" y1="120" x2="300" y2="100" stroke="#FDBA74" stroke-width="2.5" opacity="0.6"/>
  <line x1="256" y1="120" x2="212" y2="100" stroke="#FDBA74" stroke-width="2.5" opacity="0.6"/>
  <!-- 만화 변환 화살표 -->
  <path d="M 140 256 L 192 256 M 184 246 L 192 256 L 184 266" stroke="#FB923C" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- 변환 전/후 표시 -->
  <rect x="80" y="230" width="60" height="50" rx="4" fill="#888888" opacity="0.2"/>
  <text x="110" y="260" text-anchor="middle" fill="#888888" font-size="10" font-family="monospace" opacity="0.5">PHOTO</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#FB923C" font-size="14" font-family="monospace" font-weight="bold" filter="url(#glow)">INK SPARK</text>
</svg>