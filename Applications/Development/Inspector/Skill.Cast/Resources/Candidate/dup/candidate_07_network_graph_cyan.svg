<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003040"/>
      <stop offset="100%" stop-color="#004050"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Skill network connections -->
  <line x1="256" y1="200" x2="150" y2="150" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="360" y2="145" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="140" y2="310" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="370" y2="300" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="256" y2="360" stroke="#00E5FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="150" x2="360" y2="145" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="310" x2="256" y2="360" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="300" x2="256" y2="360" stroke="#00BCD4" stroke-width="1" opacity="0.3"/>
  <!-- Central node -->
  <circle cx="256" cy="200" r="42" fill="#006064" stroke="#00E5FF" stroke-width="3"/>
  <text x="228" y="196" font-family="monospace" font-size="15" fill="#E0F7FA" font-weight="bold">SKILL</text>
  <text x="228" y="213" font-family="monospace" font-size="13" fill="#80DEEA">CAST</text>
  <!-- Outer nodes -->
  <circle cx="150" cy="150" r="30" fill="#004D55" stroke="#26C6DA" stroke-width="2"/>
  <text x="133" y="155" font-family="monospace" font-size="13" fill="#E0F7FA">Frontend</text>
  <circle cx="360" cy="145" r="30" fill="#004D55" stroke="#26C6DA" stroke-width="2"/>
  <text x="343" y="150" font-family="monospace" font-size="13" fill="#E0F7FA">Backend</text>
  <circle cx="140" cy="310" r="30" fill="#004D55" stroke="#26C6DA" stroke-width="2"/>
  <text x="122" y="315" font-family="monospace" font-size="13" fill="#E0F7FA">DevOps</text>
  <circle cx="370" cy="300" r="30" fill="#004D55" stroke="#26C6DA" stroke-width="2"/>
  <text x="352" y="305" font-family="monospace" font-size="13" fill="#E0F7FA">Database</text>
  <circle cx="256" cy="360" r="28" fill="#004D55" stroke="#26C6DA" stroke-width="2"/>
  <text x="240" y="365" font-family="monospace" font-size="13" fill="#E0F7FA">Mobile</text>
  <!-- Outer ring pulse -->
  <circle cx="256" cy="200" r="60" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="200" r="80" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.1"/>
</svg>
