<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg02bs" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#0F0A2E"/>
    </radialGradient>
    <radialGradient id="glowBrush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep purple/dark -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02bs)"/>

  <!-- Glow orb at brush tip -->
  <circle cx="600" cy="420" r="160" fill="url(#glowBrush)"/>

  <!-- Paintbrush silhouette -->
  <!-- Handle -->
  <rect x="200" y="470" width="380" height="44" rx="22" fill="#B45309" transform="rotate(-40 390 492)"/>
  <!-- Metal ferrule -->
  <rect x="475" y="390" width="56" height="80" rx="8" fill="#9CA3AF" transform="rotate(-40 503 430)"/>
  <!-- Bristles -->
  <path d="M538,340 L570,300 Q590,280 608,298 L590,380 Q570,400 545,395 Z" fill="#FCD34D"/>
  <path d="M550,330 L575,285 Q588,268 606,282" stroke="#F59E0B" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Brush stroke trail (sparkle/magic) -->
  <path d="M620,290 Q700,220 800,240 Q870,255 880,320 Q890,390 820,420 Q760,445 700,430"
        stroke="#FDE047" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="18,10" opacity="0.7"/>

  <!-- Before: pixelated region (left-bottom) -->
  <rect x="106" y="600" width="200" height="200" rx="10" fill="#1E1B4B" opacity="0.8"/>
  <rect x="116" y="610" width="46" height="46" fill="#6B5B7A" opacity="0.9"/>
  <rect x="162" y="610" width="46" height="46" fill="#8B7B9A" opacity="0.9"/>
  <rect x="208" y="610" width="46" height="46" fill="#5B4B6A" opacity="0.9"/>
  <rect x="254" y="610" width="46" height="46" fill="#7B6B8A" opacity="0.9"/>
  <rect x="116" y="656" width="46" height="46" fill="#9B8BAA" opacity="0.9"/>
  <rect x="162" y="656" width="46" height="46" fill="#C8A8C0" opacity="0.9"/>
  <rect x="208" y="656" width="46" height="46" fill="#A888A0" opacity="0.9"/>
  <rect x="254" y="656" width="46" height="46" fill="#8B7B9A" opacity="0.9"/>
  <rect x="116" y="702" width="46" height="46" fill="#4B3B5A" opacity="0.9"/>
  <rect x="162" y="702" width="46" height="46" fill="#6B5B7A" opacity="0.9"/>
  <rect x="208" y="702" width="46" height="46" fill="#5B4B6A" opacity="0.9"/>
  <rect x="254" y="702" width="46" height="46" fill="#7B6B8A" opacity="0.9"/>
  <rect x="116" y="748" width="184" height="46" fill="#3B2B4A" opacity="0.9"/>
  <text x="206" y="806" font-family="Arial,sans-serif" font-size="22" fill="#A5B4FC" text-anchor="middle">before</text>

  <!-- After: smooth image (right-bottom) -->
  <rect x="720" y="600" width="200" height="200" rx="10" fill="#0F2744" opacity="0.8"/>
  <defs>
    <radialGradient id="afterImg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="60%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
  </defs>
  <rect x="730" y="610" width="180" height="180" fill="url(#afterImg)" rx="4"/>
  <text x="820" y="806" font-family="Arial,sans-serif" font-size="22" fill="#4ADE80" text-anchor="middle">after</text>

  <!-- Arrow between before/after -->
  <line x1="322" y1="700" x2="714" y2="700" stroke="#FDE047" stroke-width="10" stroke-linecap="round" stroke-dasharray="16,10"/>
  <polygon points="706,672 742,700 706,728" fill="#FDE047"/>

  <!-- Stars around brush tip -->
  <text x="640" y="260" font-family="Arial,sans-serif" font-size="22" fill="#FDE047">★</text>
  <text x="700" y="310" font-family="Arial,sans-serif" font-size="16" fill="#A5F3FC">✦</text>
  <text x="580" y="240" font-family="Arial,sans-serif" font-size="14" fill="#FCD34D">✦</text>
  <text x="750" y="250" font-family="Arial,sans-serif" font-size="18" fill="#FDE047">★</text>
</svg>
