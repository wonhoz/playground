<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1000"/>
      <stop offset="100%" style="stop-color:#2a1800"/>
    </linearGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ffeecc;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffaa44;stop-opacity:0.05"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Large vintage magnifier frame -->
  <circle cx="220" cy="220" r="160" fill="url(#lens)" stroke="#cc8822" stroke-width="8"/>
  <circle cx="220" cy="220" r="148" fill="none" stroke="#886611" stroke-width="3"/>
  <!-- Handle -->
  <rect x="330" y="320" width="130" height="28" rx="14" fill="#8b4513" transform="rotate(45 330 320)"/>
  <rect x="333" y="323" width="126" height="20" rx="10" fill="#a0522d" transform="rotate(45 333 323)"/>
  <!-- Content through lens - icons arranged -->
  <text x="160" y="200" font-family="serif" font-size="36">🏷️</text>
  <text x="220" y="200" font-family="serif" font-size="36">⭐</text>
  <text x="160" y="258" font-family="serif" font-size="36">🔔</text>
  <text x="220" y="258" font-family="serif" font-size="36">🎯</text>
  <!-- Footprint clues -->
  <text x="60" y="380" font-family="serif" font-size="20">👣</text>
  <text x="100" y="400" font-family="serif" font-size="18">👣</text>
  <text x="140" y="390" font-family="serif" font-size="16">👣</text>
  <!-- Clue cards floating -->
  <rect x="340" y="80" width="120" height="72" rx="8" fill="#221500" stroke="#cc8822" stroke-width="2" transform="rotate(8 340 80)"/>
  <text x="352" y="110" font-family="sans-serif" font-size="11" fill="#ffaa44" transform="rotate(8 352 110)">CLUE: icon name</text>
  <text x="352" y="130" font-family="sans-serif" font-size="11" fill="#aa7722" transform="rotate(8 352 130)">"search" / "find"</text>
  <!-- Title -->
  <text x="168" y="445" font-family="serif" font-size="26" fill="#cc8822" font-weight="bold">Icon Hunt</text>
</svg>