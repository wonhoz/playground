<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg_ca05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9D174D"/>
      <stop offset="100%" stop-color="#500724"/>
    </radialGradient>
    <clipPath id="c_ca05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Hot pink/magenta radial background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_ca05)"/>
  <g clip-path="url(#c_ca05)">
    <!-- Layer 2: @ symbol as a sun (with rays) -->
    <!-- Sun rays (light beams) -->
    <line x1="512" y1="120" x2="512" y2="60" stroke="#FDE047" stroke-width="24" stroke-linecap="round"/>
    <line x1="512" y1="904" x2="512" y2="964" stroke="#FDE047" stroke-width="24" stroke-linecap="round"/>
    <line x1="120" y1="512" x2="60" y2="512" stroke="#FDE047" stroke-width="24" stroke-linecap="round"/>
    <line x1="904" y1="512" x2="964" y2="512" stroke="#FDE047" stroke-width="24" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="280" y1="280" x2="228" y2="228" stroke="#FDE047" stroke-width="20" stroke-linecap="round"/>
    <line x1="744" y1="280" x2="796" y2="228" stroke="#FDE047" stroke-width="20" stroke-linecap="round"/>
    <line x1="280" y1="744" x2="228" y2="796" stroke="#FDE047" stroke-width="20" stroke-linecap="round"/>
    <line x1="744" y1="744" x2="796" y2="796" stroke="#FDE047" stroke-width="20" stroke-linecap="round"/>
    <!-- Glow halo -->
    <circle cx="512" cy="512" r="360" fill="#FCD34D" opacity="0.18"/>
    <circle cx="512" cy="512" r="300" fill="#F59E0B" opacity="0.12"/>
    <!-- Layer 3: Big @ symbol (gold) -->
    <text x="512" y="660" font-family="Arial Black" font-size="520" font-weight="900" fill="#FCD34D" text-anchor="middle">@</text>
    <!-- Small character rain around @ -->
    <text x="180" y="340" font-family="Courier New" font-size="48" fill="#F9A8D4" opacity="0.8">#</text>
    <text x="820" y="360" font-family="Courier New" font-size="48" fill="#F9A8D4" opacity="0.8">%</text>
    <text x="160" y="680" font-family="Courier New" font-size="44" fill="#FDA4AF" opacity="0.7">$</text>
    <text x="830" y="700" font-family="Courier New" font-size="44" fill="#FDA4AF" opacity="0.7">*</text>
    <text x="270" y="860" font-family="Courier New" font-size="40" fill="#F9A8D4" opacity="0.6">!</text>
    <text x="740" y="860" font-family="Courier New" font-size="40" fill="#F9A8D4" opacity="0.6">&amp;</text>
  </g>
</svg>
