<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000a0a"/>
      <stop offset="100%" style="stop-color:#000515"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit board traces -->
  <line x1="40" y1="420" x2="472" y2="420" stroke="#00ff44" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
  <line x1="40" y1="410" x2="472" y2="410" stroke="#00ff44" stroke-width="1" filter="url(#glow)" opacity="0.3"/>
  <!-- Circuit paths in background -->
  <path d="M80 200 L80 280 L140 280 L140 320" stroke="#00ff44" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.25"/>
  <path d="M100 180 L100 260 L160 260 L160 300" stroke="#00ff44" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.2"/>
  <path d="M350 200 L350 280 L400 280 L400 320" stroke="#00ff44" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.25"/>
  <path d="M380 180 L380 260 L430 260 L430 300" stroke="#00ff44" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.2"/>
  <!-- Circuit nodes -->
  <circle cx="80" cy="280" r="4" fill="#00ff44" filter="url(#glow)" opacity="0.5"/>
  <circle cx="140" cy="280" r="4" fill="#00ff44" filter="url(#glow)" opacity="0.5"/>
  <circle cx="350" cy="280" r="4" fill="#00ff44" filter="url(#glow)" opacity="0.5"/>
  <circle cx="400" cy="280" r="4" fill="#00ff44" filter="url(#glow)" opacity="0.5"/>
  <!-- Main running circuit path -->
  <path d="M40 390 L120 390 L120 370 L200 370 L200 390 L280 390 L280 360 L350 360 L350 390 L472 390" stroke="#00ff44" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- Circuit runner -->
  <g filter="url(#glow)" transform="translate(200, 338)">
    <!-- Digital/circuit style runner -->
    <rect x="-12" y="-58" width="24" height="20" rx="3" fill="none" stroke="#00ff44" stroke-width="2"/>
    <line x1="-8" y1="-52" x2="8" y2="-52" stroke="#00ff44" stroke-width="1.5" opacity="0.7"/>
    <line x1="-8" y1="-46" x2="8" y2="-46" stroke="#00ff44" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-38" x2="0" y2="-2" stroke="#00ff44" stroke-width="3"/>
    <line x1="0" y1="-24" x2="-20" y2="-8" stroke="#00ff44" stroke-width="2.5"/>
    <line x1="0" y1="-24" x2="18" y2="-38" stroke="#00ff44" stroke-width="2.5"/>
    <line x1="0" y1="-2" x2="-14" y2="26" stroke="#00ff44" stroke-width="2.5"/>
    <line x1="-14" y1="26" x2="-5" y2="40" stroke="#00ff44" stroke-width="2"/>
    <line x1="0" y1="-2" x2="15" y2="20" stroke="#00ff44" stroke-width="2.5"/>
    <line x1="15" y1="20" x2="22" y2="9" stroke="#00ff44" stroke-width="2"/>
  </g>
  <!-- Data packets moving on circuit -->
  <rect x="290" y="384" width="14" height="12" rx="2" fill="#00ff44" filter="url(#glow)" opacity="0.8"/>
  <rect x="320" y="384" width="10" height="12" rx="2" fill="#00ff44" filter="url(#glow)" opacity="0.6"/>
  <rect x="344" y="354" width="10" height="10" rx="2" fill="#00ff44" filter="url(#glow)" opacity="0.5"/>
</svg>