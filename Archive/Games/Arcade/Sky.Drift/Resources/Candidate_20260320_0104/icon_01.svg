<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 비행기 드리프트 기울기: 비행기 측면 기울임 -->
  <g transform="translate(512,512) rotate(-28)">
    <!-- 동체 -->
    <ellipse cx="0" cy="0" rx="220" ry="48" fill="#0288D1"/>
    <!-- 주익 -->
    <polygon points="40,0 -60,-160 -160,-20 -60,20" fill="#4FC3F7"/>
    <!-- 꼬리익 수평 -->
    <polygon points="-160,0 -220,-70 -260,-10 -200,10" fill="#4FC3F7"/>
    <!-- 꼬리익 수직 -->
    <polygon points="-180,-10 -200,-90 -230,-10" fill="#0288D1"/>
    <!-- 조종석 -->
    <ellipse cx="100" cy="-18" rx="44" ry="24" fill="#4FC3F7" opacity="0.7"/>
    <!-- 엔진 -->
    <ellipse cx="-40" cy="20" rx="30" ry="14" fill="#01579B"/>
    <!-- 드리프트 흔적 -->
    <path d="M220,0 Q350,60 480,20" stroke="#4FC3F7" stroke-width="8" fill="none" stroke-dasharray="20,14" opacity="0.5"/>
  </g>
</svg>
