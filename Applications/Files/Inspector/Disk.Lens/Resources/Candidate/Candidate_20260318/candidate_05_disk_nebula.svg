<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#04080f"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="40%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="65%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="diskCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#0EA5E9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebulablur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="200" cy="230" rx="160" ry="120" fill="url(#nebula1)" filter="url(#nebulablur)"/>
  <ellipse cx="320" cy="280" rx="140" ry="100" fill="url(#nebula2)" filter="url(#nebulablur)"/>
  <ellipse cx="256" cy="256" rx="80" ry="60" fill="#06B6D4" fill-opacity="0.08" filter="url(#nebulablur)"/>

  <!-- Star field -->
  <circle cx="80" cy="90" r="1.5" fill="white" fill-opacity="0.8"/>
  <circle cx="145" cy="65" r="1" fill="#7DD3FC" fill-opacity="0.7"/>
  <circle cx="380" cy="80" r="2" fill="white" fill-opacity="0.9"/>
  <circle cx="430" cy="130" r="1" fill="#7DD3FC"/>
  <circle cx="60" cy="380" r="1.5" fill="white" fill-opacity="0.7"/>
  <circle cx="450" cy="400" r="1" fill="white" fill-opacity="0.8"/>
  <circle cx="110" cy="440" r="1.5" fill="#7DD3FC" fill-opacity="0.6"/>
  <circle cx="420" cy="450" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="160" cy="130" r="1" fill="white" fill-opacity="0.6"/>
  <circle cx="350" cy="140" r="1.5" fill="#06B6D4" fill-opacity="0.8"/>
  <circle cx="90" cy="280" r="1" fill="white" fill-opacity="0.5"/>
  <circle cx="460" cy="260" r="1.5" fill="white" fill-opacity="0.7"/>

  <!-- Disk nebula ring (galactic disk shape) -->
  <ellipse cx="256" cy="256" rx="195" ry="55" fill="none" stroke="#06B6D4" stroke-width="2" stroke-opacity="0.4" filter="url(#softglow)"/>
  <ellipse cx="256" cy="256" rx="170" ry="48" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="140" ry="40" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="110" ry="31" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <ellipse cx="256" cy="256" rx="80" ry="23" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Nebula gas trails along disk -->
  <path d="M61,256 Q140,230 256,256 Q372,282 451,256" fill="none" stroke="#06B6D4" stroke-width="3" stroke-opacity="0.25" filter="url(#glow)"/>
  <path d="M61,256 Q140,270 256,256 Q372,242 451,256" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.2" filter="url(#glow)"/>

  <!-- Central star / disk core -->
  <circle cx="256" cy="256" r="40" fill="url(#diskCore)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#06B6D4" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="#7DD3FC"/>
  <circle cx="256" cy="256" r="5" fill="white"/>

  <!-- Radiant spikes from core -->
  <line x1="256" y1="256" x2="256" y2="195" stroke="#7DD3FC" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="256" y1="256" x2="256" y2="317" stroke="#7DD3FC" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="256" y1="256" x2="195" y2="256" stroke="#7DD3FC" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="256" y1="256" x2="317" y2="256" stroke="#7DD3FC" stroke-width="1.5" stroke-opacity="0.5" filter="url(#softglow)"/>
  <line x1="256" y1="256" x2="213" y2="213" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="299" y2="213" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="299" y2="299" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="256" y1="256" x2="213" y2="299" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Storage sector markers on disk ring -->
  <circle cx="451" cy="256" r="5" fill="#06B6D4" filter="url(#softglow)"/>
  <circle cx="61" cy="256" r="5" fill="#0EA5E9" filter="url(#softglow)"/>
  <circle cx="350" cy="216" r="3.5" fill="#3B82F6" filter="url(#softglow)"/>
  <circle cx="162" cy="296" r="3.5" fill="#06B6D4" filter="url(#softglow)"/>
</svg>
