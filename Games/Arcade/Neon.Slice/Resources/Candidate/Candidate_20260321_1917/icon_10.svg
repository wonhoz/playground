<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="n10-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="n10-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001828"/>
      <stop offset="100%" stop-color="#000810"/>
    </radialGradient>
    <radialGradient id="n10-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#78E8FF" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#78E8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#n10-clip)">
    <!-- Background: deep arctic -->
    <rect width="1024" height="1024" fill="url(#n10-bg)"/>

    <!-- Ice/frost overlay — diagonal frost streaks -->
    <g stroke="#A8F0FF" stroke-linecap="round" opacity="0.12">
      <line x1="0" y1="200" x2="400" y2="0" stroke-width="3"/>
      <line x1="0" y1="350" x2="500" y2="0" stroke-width="2"/>
      <line x1="0" y1="500" x2="600" y2="0" stroke-width="2"/>
      <line x1="100" y1="1024" x2="1024" y2="200" stroke-width="3"/>
      <line x1="300" y1="1024" x2="1024" y2="380" stroke-width="2"/>
      <line x1="0" y1="700" x2="700" y2="0" stroke-width="2"/>
      <line x1="500" y1="1024" x2="1024" y2="560" stroke-width="2"/>
    </g>

    <!-- Ice glow core -->
    <circle cx="512" cy="512" r="400" fill="url(#n10-glow)"/>

    <!-- SLOW MO overlay ring (hexagonal ice crystal) -->
    <!-- Outer ring -->
    <polygon points="512,260 710,375 710,605 512,720 314,605 314,375"
             fill="none" stroke="#78E8FF" stroke-width="8" opacity="0.60"/>
    <!-- Inner ring -->
    <polygon points="512,330 660,413 660,582 512,664 364,582 364,413"
             fill="none" stroke="#78E8FF" stroke-width="5" opacity="0.40"/>
    <!-- Fill -->
    <polygon points="512,330 660,413 660,582 512,664 364,582 364,413"
             fill="#78E8FF" opacity="0.06"/>

    <!-- ICE shape (circle + snowflake) in center -->
    <circle cx="512" cy="512" r="120" fill="#001F30" stroke="#78E8FF" stroke-width="8" opacity="0.95"/>
    <!-- Snowflake arms -->
    <line x1="512" y1="392" x2="512" y2="632" stroke="#78E8FF" stroke-width="7" stroke-linecap="round" opacity="0.90"/>
    <line x1="408" y1="452" x2="616" y2="572" stroke="#78E8FF" stroke-width="7" stroke-linecap="round" opacity="0.90"/>
    <line x1="408" y1="572" x2="616" y2="452" stroke="#78E8FF" stroke-width="7" stroke-linecap="round" opacity="0.90"/>
    <!-- Snowflake tips -->
    <circle cx="512" cy="394" r="10" fill="#78E8FF" opacity="0.95"/>
    <circle cx="512" cy="630" r="10" fill="#78E8FF" opacity="0.95"/>
    <circle cx="410" cy="454" r="10" fill="#78E8FF" opacity="0.95"/>
    <circle cx="614" cy="570" r="10" fill="#78E8FF" opacity="0.95"/>
    <circle cx="410" cy="570" r="10" fill="#78E8FF" opacity="0.95"/>
    <circle cx="614" cy="454" r="10" fill="#78E8FF" opacity="0.95"/>
    <!-- Snowflake branches -->
    <line x1="512" y1="430" x2="490" y2="410" stroke="#78E8FF" stroke-width="4" stroke-linecap="round" opacity="0.70"/>
    <line x1="512" y1="430" x2="534" y2="410" stroke="#78E8FF" stroke-width="4" stroke-linecap="round" opacity="0.70"/>
    <line x1="512" y1="594" x2="490" y2="614" stroke="#78E8FF" stroke-width="4" stroke-linecap="round" opacity="0.70"/>
    <line x1="512" y1="594" x2="534" y2="614" stroke="#78E8FF" stroke-width="4" stroke-linecap="round" opacity="0.70"/>

    <!-- "SLOW" text indicator -->
    <text x="512" y="818"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="72"
          fill="#78E8FF"
          text-anchor="middle"
          opacity="0.80">SLOW MO</text>

    <!-- Frozen particles -->
    <circle cx="280" cy="320" r="8" fill="#78E8FF" opacity="0.65"/>
    <line x1="280" y1="306" x2="280" y2="334" stroke="#78E8FF" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
    <line x1="266" y1="320" x2="294" y2="320" stroke="#78E8FF" stroke-width="3" stroke-linecap="round" opacity="0.60"/>

    <circle cx="760" cy="280" r="7" fill="#A8F0FF" opacity="0.60"/>
    <line x1="760" y1="268" x2="760" y2="292" stroke="#A8F0FF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="748" y1="280" x2="772" y2="280" stroke="#A8F0FF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

    <circle cx="240" cy="700" r="6" fill="#78E8FF" opacity="0.50"/>
    <circle cx="800" cy="680" r="7" fill="#A8F0FF" opacity="0.55"/>
    <circle cx="750" cy="790" r="5" fill="#78E8FF" opacity="0.45"/>
    <circle cx="260" cy="780" r="5" fill="#A8F0FF" opacity="0.45"/>
  </g>
</svg>
