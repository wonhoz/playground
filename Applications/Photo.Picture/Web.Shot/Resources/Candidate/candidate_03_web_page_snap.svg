<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="snap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="web" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4776e6"/>
      <stop offset="100%" stop-color="#8e54e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Browser/webpage -->
  <rect x="70" y="80" width="372" height="280" rx="16" fill="#1a0533" stroke="url(#web)" stroke-width="3"/>
  <rect x="70" y="80" width="372" height="44" rx="16" fill="url(#web)" opacity="0.7"/>
  <rect x="70" y="112" width="372" height="12" fill="url(#web)" opacity="0.7"/>
  <circle cx="100" cy="102" r="8" fill="#f5576c"/>
  <circle cx="124" cy="102" r="8" fill="#f6e05e"/>
  <circle cx="148" cy="102" r="8" fill="#68d391"/>
  <rect x="164" y="94" width="228" height="16" rx="8" fill="#2d1b69"/>
  <!-- Page scroll content -->
  <rect x="90" y="140" width="332" height="14" rx="3" fill="url(#web)" opacity="0.3"/>
  <rect x="90" y="164" width="260" height="10" rx="3" fill="url(#web)" opacity="0.2"/>
  <rect x="90" y="184" width="300" height="10" rx="3" fill="url(#web)" opacity="0.2"/>
  <rect x="90" y="210" width="332" height="80" rx="6" fill="url(#web)" opacity="0.15"/>
  <rect x="90" y="304" width="260" height="10" rx="3" fill="url(#web)" opacity="0.2"/>
  <!-- Snap flash effect -->
  <rect x="70" y="80" width="372" height="280" rx="16" fill="white" opacity="0.08"/>
  <!-- Camera snap icon -->
  <circle cx="390" cy="340" r="60" fill="#1a0533" stroke="url(#snap)" stroke-width="4" filter="url(#glow)"/>
  <rect x="360" y="316" width="60" height="48" rx="8" fill="url(#snap)" opacity="0.9"/>
  <rect x="372" y="308" width="28" height="14" rx="6" fill="url(#snap)"/>
  <circle cx="390" cy="340" r="16" fill="#1a0533"/>
  <circle cx="390" cy="340" r="10" fill="url(#snap)" opacity="0.8"/>
  <circle cx="384" cy="334" r="4" fill="white" opacity="0.5"/>
</svg>