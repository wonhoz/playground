<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#001A00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="90" width="392" height="330" rx="12" fill="#0A0A0A" stroke="#1A3A1A" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="60" y="90" width="392" height="36" rx="12" fill="#1A2A1A"/>
  <rect x="60" y="108" width="392" height="18" fill="#1A2A1A"/>
  <circle cx="88" cy="108" r="7" fill="#FF5F57"/>
  <circle cx="110" cy="108" r="7" fill="#FFBD2E"/>
  <circle cx="132" cy="108" r="7" fill="#28C840"/>
  <text x="256" y="114" text-anchor="middle" font-family="monospace" font-size="12" fill="#44AA44">SQL.Lens — Query Analyzer</text>
  <!-- SQL code lines -->
  <text x="80" y="158" font-family="monospace" font-size="14" fill="#569CD6">SELECT</text>
  <text x="155" y="158" font-family="monospace" font-size="14" fill="#9CDCFE"> id, name, score</text>
  <text x="80" y="182" font-family="monospace" font-size="14" fill="#569CD6">FROM</text>
  <text x="140" y="182" font-family="monospace" font-size="14" fill="#9CDCFE"> users u</text>
  <text x="80" y="206" font-family="monospace" font-size="14" fill="#569CD6">JOIN</text>
  <text x="130" y="206" font-family="monospace" font-size="14" fill="#9CDCFE"> scores s </text>
  <text x="248" y="206" font-family="monospace" font-size="14" fill="#569CD6">ON</text>
  <text x="274" y="206" font-family="monospace" font-size="14" fill="#9CDCFE"> u.id=s.uid</text>
  <text x="80" y="230" font-family="monospace" font-size="14" fill="#569CD6">WHERE</text>
  <text x="155" y="230" font-family="monospace" font-size="14" fill="#CE9178"> score &gt; 90</text>
  <!-- Analysis output -->
  <line x1="72" y1="250" x2="440" y2="250" stroke="#1A3A1A" stroke-width="1"/>
  <text x="80" y="274" font-family="monospace" font-size="12" fill="#44AA44">-- Analysis: Index on score recommended</text>
  <text x="80" y="296" font-family="monospace" font-size="12" fill="#FFAA00">-- Execution plan: Seq Scan [cost=240]</text>
  <text x="80" y="318" font-family="monospace" font-size="12" fill="#44AA44">-- Estimated rows: 1,240 | Time: 8ms</text>
  <!-- Cursor -->
  <rect x="80" y="334" width="10" height="18" rx="1" fill="#44AA44" opacity="0.8"/>
</svg>
