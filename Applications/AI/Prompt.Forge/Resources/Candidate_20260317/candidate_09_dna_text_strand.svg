  <g filter="url(#glow09)">
    <line x1="210" y1="390" x2="302" y2="390" stroke="#00CED1" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="386" font-family="monospace" font-size="11" fill="#00CED1" text-anchor="middle" opacity="0.9">{ }</text>
  </g>

  <!-- 쌍 15 (y=415) -->
  <g filter="url(#glow09)">
    <line x1="210" y1="415" x2="302" y2="415" stroke="#00FF7F" stroke-width="1.5" opacity="0.7"/>
    <text x="256" y="411" font-family="monospace" font-size="11" fill="#00FF7F" text-anchor="middle" opacity="0.9">AI</text>
  </g>

  <!-- 나선 끝 노드들 (상단) -->
  <circle cx="166" cy="50" r="6" fill="#00FF7F" filter="url(#dnaGlow)" opacity="0.9"/>
  <circle cx="346" cy="50" r="6" fill="#00CED1" filter="url(#dnaGlow)" opacity="0.9"/>

  <!-- 나선 끝 노드들 (하단) -->
  <circle cx="166" cy="450" r="6" fill="#00FF7F" filter="url(#dnaGlow)" opacity="0.9"/>
  <circle cx="346" cy="450" r="6" fill="#00CED1" filter="url(#dnaGlow)" opacity="0.9"/>

  <!-- 중앙 강조 글로우 -->
  <ellipse cx="256" cy="256" rx="120" ry="200" fill="#00FF7F" opacity="0.02" filter="url(#dnaGlow)"/>

  <!-- 하단 라벨 -->
  <rect x="155" y="465" width="202" height="26" rx="5" fill="#001f12" stroke="#00FF7F" stroke-width="1" opacity="0.7"/>
  <text x="256" y="482" font-family="monospace" font-size="12" font-weight="bold"
        fill="#00FF7F" text-anchor="middle" opacity="0.9" filter="url(#glow09)">PROMPT.FORGE</text>
</svg>
