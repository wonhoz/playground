<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#130000"/>
    </linearGradient>
    <radialGradient id="plasmaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#F87171;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#EF4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="plasmaGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 플라즈마 구 -->
  <circle cx="256" cy="256" r="160" fill="url(#plasmaGrad)" filter="url(#plasmaGlow)"/>
  <!-- 플라즈마 아크들 -->
  <path d="M 256,96 Q 340,140 380,256 Q 340,372 256,416" fill="none" stroke="#F87171" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <path d="M 256,96 Q 172,140 132,256 Q 172,372 256,416" fill="none" stroke="#EF4444" stroke-width="4" opacity="0.7" filter="url(#glow)"/>
  <path d="M 96,256 Q 140,172 256,132 Q 372,172 416,256" fill="none" stroke="#F87171" stroke-width="3" opacity="0.5"/>
  <path d="M 96,256 Q 140,340 256,380 Q 372,340 416,256" fill="none" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
  <!-- 플라즈마 코어 -->
  <circle cx="256" cy="256" r="70" fill="#EF4444" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="45" fill="#F87171" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="25" fill="#FEE2E2" opacity="0.7" filter="url(#glow)"/>
  <!-- 폴더 아이콘들 (플라즈마에 의해 정화됨) -->
  <!-- 폴더 1 (왼쪽, 진입 중) -->
  <g opacity="0.7" filter="url(#glow)">
    <polygon points="80,215 125,215 138,228 178,228 178,298 80,298" fill="#DC2626" opacity="0.8"/>
    <polygon points="80,215 125,215 138,228 80,228" fill="#991B1B" opacity="0.8"/>
  </g>
  <!-- 폴더 1→코어 화살표 -->
  <path d="M 178,256 Q 205,256 215,256" fill="none" stroke="#F87171" stroke-width="2.5" opacity="0.6"/>
  <polygon points="211,250 218,256 211,262" fill="#EF4444" opacity="0.7"/>
  <!-- 폴더 2 (오른쪽) -->
  <g opacity="0.65" filter="url(#glow)">
    <polygon points="334,225 370,225 380,235 432,235 432,295 334,295" fill="#EF4444" opacity="0.75"/>
    <polygon points="334,225 370,225 380,235 334,235" fill="#DC2626" opacity="0.7"/>
  </g>
  <path d="M 334,260 Q 307,259 297,258" fill="none" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <polygon points="301,252 294,258 301,264" fill="#EF4444" opacity="0.65"/>
  <!-- 폴더 3 (위) -->
  <g opacity="0.6">
    <polygon points="216,80 250,80 260,90 296,90 296,145 216,145" fill="#F87171" opacity="0.7"/>
    <polygon points="216,80 250,80 260,90 216,90" fill="#EF4444" opacity="0.65"/>
  </g>
  <path d="M 256,145 Q 256,172 256,180" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  <polygon points="250,176 256,183 262,176" fill="#F87171" opacity="0.6"/>
  <!-- X 지우기 심볼 -->
  <text x="256" y="263" text-anchor="middle" font-family="Arial" font-size="22" fill="#030508" font-weight="bold" opacity="0.9">✕</text>
</svg>