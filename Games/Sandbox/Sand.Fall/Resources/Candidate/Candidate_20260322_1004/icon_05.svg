    <rect x="616" y="398" width="18" height="18" rx="2" fill="#FFD740"/>
    <rect x="642" y="402" width="18" height="18" rx="2" fill="#F9C040"/>
    <rect x="668" y="398" width="18" height="18" rx="2" fill="#FFD740"/>
