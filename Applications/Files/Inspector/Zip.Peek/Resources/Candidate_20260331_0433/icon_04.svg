<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 산호/핑크 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: 중첩 박스 (폴더 안에 폴더 — 압축 중첩 구조 은유) -->
  <!-- 가장 바깥 박스 (ZIP) -->
  <rect x="120" y="200" width="784" height="624" rx="32" fill="#AD1457" opacity="0.9"/>
  <text x="200" y="280" font-family="'Consolas', monospace" font-size="52" fill="white" font-weight="700">archive.zip</text>
  <!-- 두 번째 박스 (폴더) -->
  <rect x="180" y="300" width="664" height="480" rx="28" fill="#7B1FA2"/>
  <text x="260" y="374" font-family="'Consolas', monospace" font-size="46" fill="#F8BBD0">📁 project/</text>
  <!-- 세 번째 박스 (서브폴더) -->
  <rect x="240" y="400" width="544" height="336" rx="24" fill="#512DA8"/>
  <text x="320" y="468" font-family="'Consolas', monospace" font-size="42" fill="#CE93D8">📁 src/</text>
  <!-- 가장 안쪽 파일 -->
  <rect x="300" y="496" width="424" height="200" rx="20" fill="#00838F"/>
  <text x="512" y="572" font-family="'Segoe UI', sans-serif" font-size="44" fill="white" text-anchor="middle">📝 main.cs</text>
  <text x="512" y="624" font-family="'Segoe UI', sans-serif" font-size="44" fill="white" text-anchor="middle">📄 readme.md</text>
  <text x="512" y="676" font-family="'Segoe UI', sans-serif" font-size="44" fill="white" text-anchor="middle">⚙ app.exe</text>
  <!-- 미리보기 눈 배지 (우상단) -->
  <circle cx="840" cy="220" r="100" fill="#F57F17"/>
  <ellipse cx="840" cy="220" rx="60" ry="40" fill="white"/>
  <circle cx="840" cy="220" r="22" fill="#E65100"/>
</svg>
