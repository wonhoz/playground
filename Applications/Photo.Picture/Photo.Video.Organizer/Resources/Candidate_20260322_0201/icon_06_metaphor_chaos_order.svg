<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-06">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg-grad-06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#005555"/>
      <stop offset="100%" stop-color="#003344"/>
    </linearGradient>
    <linearGradient id="card-chaos-06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3A3A"/>
      <stop offset="100%" stop-color="#1A2A2A"/>
    </linearGradient>
    <linearGradient id="card-order-06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006666"/>
      <stop offset="100%" stop-color="#004444"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg-grad-06)"/>

  <!-- 왼쪽 혼돈 영역 (삐뚤빼뚤 파일명들) -->
