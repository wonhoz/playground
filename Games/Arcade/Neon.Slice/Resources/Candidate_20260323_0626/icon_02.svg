<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Neon.Slice | 균열 순간 — 도형이 갈라지는 찰나 | 중앙심볼 | #100000 -->
  <defs>
    <filter id="crackGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#100000"/>
  <!-- Layer 2: Hexagon cracking in half -->
  <!-- Left half of hexagon (drifting slightly left) -->
  <polygon points="320,320 512,220 512,500 320,600" fill="#2A0000" stroke="#EF4444" stroke-width="6" transform="translate(-12, 0)"/>
  <!-- Right half of hexagon (drifting slightly right) -->
  <polygon points="512,220 704,320 704,500 512,500" fill="#1A0010" stroke="#F472B6" stroke-width="6" transform="translate(12, 0)"/>
  <!-- Crack line (lightning bolt style) -->
  <polyline points="512,210 520,310 500,390 520,480 512,510" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" filter="url(#crackGlow)"/>
  <!-- Inner glow of crack -->
  <polyline points="512,210 520,310 500,390 520,480 512,510" fill="none" stroke="#FCD34D" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Debris particles -->
  <polygon points="490,250 500,240 510,252 498,260" fill="#EF4444" opacity="0.8"/>
  <polygon points="516,350 530,342 534,356 520,362" fill="#F472B6" opacity="0.7"/>
  <polygon points="488,440 500,430 508,444 496,452" fill="#FCD34D" opacity="0.8"/>
  <circle cx="460" cy="290" r="6" fill="#EF4444" opacity="0.6"/>
  <circle cx="560" cy="350" r="5" fill="#F472B6" opacity="0.6"/>
  <circle cx="450" cy="460" r="7" fill="#FCD34D" opacity="0.5"/>
  <circle cx="570" cy="420" r="4" fill="#EF4444" opacity="0.7"/>
  <!-- Layer 3: Score flash -->
  <text x="512" y="720" font-family="Arial,sans-serif" font-size="60" fill="#FCD34D" text-anchor="middle" font-weight="bold" filter="url(#crackGlow)">+200</text>
</svg>
