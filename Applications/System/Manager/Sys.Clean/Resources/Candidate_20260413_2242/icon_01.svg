<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="128" width="824" height="538" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>
  <!-- Category badges: 3 rows showing clean targets -->
  <!-- Row 1 -->
  <rect x="132" y="168" width="256" height="96" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="260" y="230" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">TEMP</text>
  <rect x="404" y="168" width="484" height="96" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="646" y="230" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">1.8 GB</text>
  <!-- Row 2 -->
  <rect x="132" y="284" width="256" height="96" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
  <text x="260" y="346" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">CACHE</text>
  <rect x="404" y="284" width="484" height="96" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="14"/>
  <text x="646" y="346" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">640 MB</text>
  <!-- Row 3 -->
  <rect x="132" y="400" width="256" height="96" rx="24" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="260" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">REG</text>
  <rect x="404" y="400" width="484" height="96" rx="24" fill="#9B59B6" stroke="#4A148C" stroke-width="14"/>
  <text x="646" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">128 err</text>
  <!-- Total saved size badge -->
  <rect x="132" y="516" width="756" height="96" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="510" y="578" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#1A1A1A" text-anchor="middle">TOTAL: 2.5 GB</text>
  <!-- SYS.CLEAN badge -->
  <rect x="188" y="744" width="648" height="116" rx="36" fill="#1565C0" stroke="#0D47A1" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">SYS.CLEAN</text>
</svg>
