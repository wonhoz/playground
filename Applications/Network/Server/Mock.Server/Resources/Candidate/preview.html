<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mock.Server — Icon Candidates</title>
  <style>
    body { background: #1a1a1a; margin: 0; padding: 32px; font-family: Arial, sans-serif; color: #e0e0e0; }
    h1 { color: #60a5fa; margin-bottom: 8px; font-size: 20px; }
    p { color: #888; margin: 0 0 24px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }

    .item:hover { border-color: #60a5fa; }
    .item img { width: 120px; height: 120px; border-radius: 16px; display: block; margin: 0 auto 10px; }
    .item span { font-size: 11px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Mock.Server — App Icon Candidates</h1>

  <div class="grid">
    <div class="item"><img src="candidate_01_server_rack_blue.svg"><span>01 · server_rack_blue</span></div>
    <div class="item"><img src="candidate_02_http_method_green.svg"><span>02 · http_method_green</span></div>
    <div class="item"><img src="candidate_03_network_globe_purple.svg"><span>03 · network_globe_purple</span></div>
    <div class="item"><img src="candidate_04_terminal_log_dark.svg"><span>04 · terminal_log_dark</span></div>
    <div class="item"><img src="candidate_05_plug_connect_orange.svg"><span>05 · plug_connect_orange</span></div>
    <div class="item"><img src="candidate_06_api_docs_slate.svg"><span>06 · api_docs_slate</span></div>
    <div class="item"><img src="candidate_07_shield_proxy_red.svg"><span>07 · shield_proxy_red</span></div>
    <div class="item"><img src="candidate_08_wave_request_cyan.svg"><span>08 · wave_request_cyan</span></div>
    <div class="item"><img src="candidate_09_lightning_api_yellow.svg"><span>09 · lightning_api_yellow</span></div>
    <div class="item"><img src="candidate_10_router_neon_pink.svg"><span>10 · router_neon_pink</span></div>
  </div>
</body>
</html>
