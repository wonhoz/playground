<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 따뜻한 어스 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#1B5E20"/>
  <!-- Layer 2: 나무 성장 단계 (씨앗→새싹→나무) -->
  <!-- 땅 -->
  <rect x="120" y="720" width="784" height="180" rx="16" fill="#4E342E"/>
  <rect x="120" y="720" width="784" height="32" rx="4" fill="#5D4037"/>
  <!-- 씨앗 (좌) -->
  <ellipse cx="250" cy="730" rx="28" ry="20" fill="#8D6E63"/>
  <text x="250" y="810" font-family="Arial" font-size="28" fill="#A5D6A7" text-anchor="middle">seed</text>
  <!-- 새싹 (중좌) -->
  <line x1="420" y1="720" x2="420" y2="620" stroke="#4CAF50" stroke-width="10" stroke-linecap="round"/>
  <!-- 잎 1개 -->
  <ellipse cx="400" cy="650" rx="30" ry="16" fill="#66BB6A" transform="rotate(-30,400,650)"/>
  <text x="420" y="810" font-family="Arial" font-size="28" fill="#A5D6A7" text-anchor="middle">sprout</text>
  <!-- 어린 나무 (중) -->
  <line x1="580" y1="720" x2="580" y2="540" stroke="#388E3C" stroke-width="14" stroke-linecap="round"/>
  <!-- 가지들 -->
  <line x1="580" y1="620" x2="540" y2="580" stroke="#388E3C" stroke-width="8" stroke-linecap="round"/>
  <line x1="580" y1="600" x2="620" y2="560" stroke="#388E3C" stroke-width="8" stroke-linecap="round"/>
  <!-- 잎 여러개 -->
  <circle cx="540" cy="564" r="30" fill="#4CAF50"/>
  <circle cx="620" cy="544" r="32" fill="#66BB6A"/>
  <circle cx="580" cy="520" r="36" fill="#43A047"/>
  <text x="580" y="810" font-family="Arial" font-size="28" fill="#A5D6A7" text-anchor="middle">sapling</text>
  <!-- 다 자란 나무 (우) -->
  <line x1="770" y1="720" x2="770" y2="480" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <!-- 굵은 가지들 -->
  <line x1="770" y1="560" x2="700" y2="500" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
  <line x1="770" y1="540" x2="840" y2="480" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
  <line x1="770" y1="520" x2="730" y2="460" stroke="#388E3C" stroke-width="10" stroke-linecap="round"/>
  <!-- 잎 관 (원형) -->
  <circle cx="750" cy="450" r="80" fill="#2E7D32" opacity="0.9"/>
  <circle cx="810" cy="420" r="64" fill="#388E3C" opacity="0.9"/>
  <circle cx="760" cy="380" r="72" fill="#43A047" opacity="0.9"/>
  <text x="770" y="810" font-family="Arial" font-size="28" fill="#A5D6A7" text-anchor="middle">tree</text>
  <!-- Layer 3: 화살표들 -->
  <polygon points="320,660 360,680 320,700" fill="#A5D6A7" opacity="0.7"/>
  <polygon points="490,620 530,640 490,660" fill="#A5D6A7" opacity="0.7"/>
  <polygon points="650,560 690,580 650,600" fill="#A5D6A7" opacity="0.7"/>
</svg>
