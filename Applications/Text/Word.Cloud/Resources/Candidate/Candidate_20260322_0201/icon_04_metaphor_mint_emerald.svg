<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 민트에메랄드 — 구름 + 비처럼 단어들이 떨어짐, 공간·장면 패턴 -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D4A3A"/>
      <stop offset="100%" stop-color="#062C22"/>
    </linearGradient>
    <linearGradient id="cloudMint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8F0D8"/>
      <stop offset="100%" stop-color="#50D0A0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="120" fill="url(#bg04)"/>

  <!-- 구름 (상단) -->
  <g fill="url(#cloudMint)">
    <circle cx="512" cy="330" r="185"/>
    <circle cx="360" cy="375" r="130"/>
    <circle cx="665" cy="365" r="140"/>
    <circle cx="450" cy="280" r="105"/>
    <circle cx="590" cy="270" r="115"/>
  </g>

  <!-- 구름 안 주요 단어 -->
  <text x="512" y="315" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#054030" text-anchor="middle">WORD</text>
  <text x="400" y="368" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#065040" text-anchor="middle">cloud</text>
  <text x="630" y="362" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#065040" text-anchor="middle">text</text>

  <!-- 비처럼 떨어지는 단어들 (빗줄기 같은 패턴) -->
  <!-- 왼쪽 열 -->
  <text x="230" y="510" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#50D0A0" text-anchor="middle" opacity="0.95">love</text>
  <text x="235" y="580" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#30C090" text-anchor="middle" opacity="0.80">big</text>
  <text x="225" y="638" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#22A070" text-anchor="middle" opacity="0.60">art</text>

  <!-- 중앙 왼쪽 열 -->
  <text x="395" y="490" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#60E0B0" text-anchor="middle" opacity="0.95">hello</text>
  <text x="400" y="565" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#40C090" text-anchor="middle" opacity="0.80">sky</text>
  <text x="392" y="630" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#28A068" text-anchor="middle" opacity="0.60">tag</text>
  <text x="388" y="682" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1A8050" text-anchor="middle" opacity="0.40">map</text>

  <!-- 중앙 열 -->
  <text x="512" y="480" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#70F0C0" text-anchor="middle" opacity="0.95">world</text>
  <text x="515" y="558" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#50D0A0" text-anchor="middle" opacity="0.80">data</text>
  <text x="510" y="620" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#30B080" text-anchor="middle" opacity="0.60">key</text>
  <text x="512" y="675" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#20906A" text-anchor="middle" opacity="0.40">hot</text>

  <!-- 중앙 오른쪽 열 -->
  <text x="630" y="495" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#60E0B0" text-anchor="middle" opacity="0.95">small</text>
  <text x="632" y="568" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#40C090" text-anchor="middle" opacity="0.80">read</text>
  <text x="625" y="630" font-family="Arial, sans-serif" font-size="17" font-weight="500" fill="#28A068" text-anchor="middle" opacity="0.55">fast</text>

  <!-- 오른쪽 열 -->
  <text x="780" y="510" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#50D0A0" text-anchor="middle" opacity="0.90">word</text>
  <text x="785" y="580" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#30B080" text-anchor="middle" opacity="0.70">list</text>
  <text x="780" y="638" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#209060" text-anchor="middle" opacity="0.50">raw</text>

  <!-- 빗방울 느낌의 작은 원들 -->
  <circle cx="300" cy="690" r="5" fill="#50D0A0" opacity="0.4"/>
  <circle cx="460" cy="710" r="4" fill="#60E0B0" opacity="0.35"/>
  <circle cx="560" cy="705" r="5" fill="#50D0A0" opacity="0.35"/>
  <circle cx="700" cy="695" r="4" fill="#40C090" opacity="0.3"/>

  <!-- 구름 → 비 연결선들 (빗줄기) -->
  <line x1="230" y1="460" x2="228" y2="490" stroke="#50D0A0" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="395" y1="455" x2="393" y2="482" stroke="#60E0B0" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="512" y1="450" x2="512" y2="478" stroke="#70F0C0" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="630" y1="455" x2="628" y2="484" stroke="#60E0B0" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="780" y1="460" x2="778" y2="490" stroke="#50D0A0" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
