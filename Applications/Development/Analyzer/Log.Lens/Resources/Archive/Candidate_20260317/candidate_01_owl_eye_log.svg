  <circle cx="302" cy="215" r="48" fill="#0d0800"/>
  <circle cx="302" cy="215" r="44" fill="url(#eye_iris)"/>
  <circle cx="302" cy="215" r="44" fill="none" stroke="#E65100" stroke-width="2" opacity="0.5"/>
  <circle cx="302" cy="215" r="36" fill="none" stroke="#FF8C00" stroke-width="1" opacity="0.4"/>
  <circle cx="302" cy="215" r="28" fill="none" stroke="#FFB300" stroke-width="1" opacity="0.3"/>
  <line x1="302" y1="171" x2="302" y2="181" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
  <line x1="302" y1="249" x2="302" y2="259" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
  <line x1="258" y1="215" x2="268" y2="215" stroke="#E65100" stroke-width="1.5" opacity="0.6"/>
