<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1500"/>
      <stop offset="100%" stop-color="#2D2200"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Compass ring -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="#FFD60A" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="230" r="128" fill="none" stroke="#E85D04" stroke-width="2" opacity="0.4"/>
  <!-- Cardinal directions -->
  <text x="256" y="90" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFD60A">N</text>
  <text x="400" y="235" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFD60A">E</text>
  <text x="256" y="378" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFD60A">S</text>
  <text x="112" y="235" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFD60A">W</text>
  <!-- Compass needle (pointing NE - flick direction) -->
  <path d="M 256 230 L 320 160 L 256 210 Z" fill="#FFD60A" opacity="0.9"/>
  <path d="M 256 230 L 192 300 L 256 250 Z" fill="#E85D04" opacity="0.7"/>
  <!-- Center circle with mouse icon -->
  <circle cx="256" cy="230" r="28" fill="#2D2200" stroke="url(#gold)" stroke-width="2"/>
  <path d="M 244 218 Q 244 208 256 208 Q 268 208 268 218 L 268 244 Q 268 252 256 252 Q 244 252 244 244 Z" fill="none" stroke="#FFD60A" stroke-width="2"/>
  <rect x="251" y="212" width="10" height="24" rx="5" fill="#FFD60A" opacity="0.7"/>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FFD60A">MOUSE.FLICK</text>
</svg>