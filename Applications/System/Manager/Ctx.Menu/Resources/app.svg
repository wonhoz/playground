<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="512" cy="512" r="512" fill="url(#bg1)"/>
  <!-- Mouse cursor -->
  <polygon points="220,200 220,600 310,510 390,700 450,675 370,480 510,480" fill="#16A34A" stroke="#FFFFFF" stroke-width="14" stroke-linejoin="round"/>
  <!-- Context menu popup -->
  <rect x="400" y="320" width="420" height="460" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="6"/>
  <!-- Menu items -->
  <rect x="418" y="355" width="384" height="58" rx="8" fill="#DCFCE7"/>
  <text x="450" y="395" font-family="Arial,sans-serif" font-size="44" fill="#15803D">✓ Open</text>
  <line x1="418" y1="428" x2="802" y2="428" stroke="#D1FAE5" stroke-width="3"/>
  <text x="450" y="482" font-family="Arial,sans-serif" font-size="44" fill="#374151">  Edit</text>
  <text x="450" y="546" font-family="Arial,sans-serif" font-size="44" fill="#374151">  Copy path</text>
  <line x1="418" y1="566" x2="802" y2="566" stroke="#D1FAE5" stroke-width="3"/>
  <rect x="418" y="580" width="384" height="58" rx="8" fill="#FEE2E2"/>
  <text x="450" y="620" font-family="Arial,sans-serif" font-size="44" fill="#DC2626">✗ Delete</text>
  <text x="450" y="680" font-family="Arial,sans-serif" font-size="44" fill="#374151">  Properties</text>
  <text x="450" y="740" font-family="Arial,sans-serif" font-size="44" fill="#9CA3AF">  Send to ▶</text>
  <!-- Label -->
  <text x="512" y="880" font-family="Arial,sans-serif" font-size="54" fill="#15803D" font-weight="bold" text-anchor="middle">Ctx Menu</text>
</svg>
