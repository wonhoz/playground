<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#110000"/>
    </linearGradient>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#EF4444;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="acidGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 산 웅덩이 (하단) -->
  <ellipse cx="256" cy="400" rx="200" ry="50" fill="#DC2626" opacity="0.25" filter="url(#acidGlow)"/>
  <ellipse cx="256" cy="400" rx="160" ry="35" fill="#EF4444" opacity="0.2"/>
  <!-- 폴더 (녹는 중) -->
  <!-- 폴더 상단 (온전) -->
  <polygon points="166,180 230,180 244,196 356,196 356,310 166,310" fill="#7F1D1D" opacity="0.9"/>
  <polygon points="166,180 230,180 244,196 166,196" fill="#991B1B" opacity="0.85"/>
  <!-- 폴더 아래 (녹는 효과) -->
  <path d="M 166,310 Q 185,330 200,380 Q 215,420 220,440" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path d="M 356,310 Q 337,332 322,384 Q 308,422 304,442" fill="none" stroke="#DC2626" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path d="M 210,310 Q 220,345 225,390 Q 228,420 230,440" fill="none" stroke="#F87171" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 256,310 Q 256,350 260,395 Q 262,425 258,445" fill="none" stroke="#EF4444" stroke-width="2.5" opacity="0.65" stroke-linecap="round"/>
  <path d="M 300,310 Q 292,347 288,392 Q 285,422 282,442" fill="none" stroke="#DC2626" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <!-- 산 버블들 -->
  <circle cx="200" cy="340" r="8" fill="#EF4444" opacity="0.6" filter="url(#glow)"/>
  <circle cx="230" cy="360" r="6" fill="#F87171" opacity="0.55" filter="url(#glow)"/>
  <circle cx="280" cy="355" r="7" fill="#EF4444" opacity="0.6" filter="url(#glow)"/>
  <circle cx="310" cy="345" r="5" fill="#DC2626" opacity="0.55"/>
  <circle cx="255" cy="380" r="9" fill="#F87171" opacity="0.5" filter="url(#glow)"/>
  <!-- 산 거품 튀기기 -->
  <circle cx="170" cy="325" r="5" fill="#FCA5A5" opacity="0.5"/>
  <circle cx="360" cy="330" r="4" fill="#FCA5A5" opacity="0.45"/>
  <!-- 폴더 내용 (파일들 - 녹는 중) -->
  <line x1="200" y1="240" x2="320" y2="240" stroke="#F87171" stroke-width="2.5" opacity="0.6"/>
  <line x1="200" y1="260" x2="290" y2="258" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="280" x2="300" y2="276" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
  <!-- 산 위에서 퍼지는 연기 효과 -->
  <path d="M 180,310 Q 200,295 220,310 Q 240,325 260,310 Q 280,295 300,310 Q 320,325 340,310" fill="url(#acidGrad)" opacity="0.4" filter="url(#acidGlow)"/>
  <!-- 경고 심볼 -->
  <circle cx="400" cy="145" r="30" fill="#EF4444" opacity="0.8" stroke="#FCA5A5" stroke-width="2"/>
  <text x="400" y="152" text-anchor="middle" font-family="Arial" font-size="26" fill="#030508" font-weight="bold">!</text>
</svg>