<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0A28"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="p10a" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <radialGradient id="p10b" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <radialGradient id="p10c" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg10)"/>
  <!-- 별 (많이) -->
  <circle cx="240" cy="220" r="3" fill="white" opacity="0.6"/>
  <circle cx="800" cy="200" r="2" fill="white" opacity="0.5"/>
  <circle cx="180" cy="600" r="2" fill="white" opacity="0.4"/>
  <circle cx="850" cy="650" r="3" fill="white" opacity="0.5"/>
  <circle cx="600" cy="180" r="2" fill="white" opacity="0.4"/>
  <circle cx="300" cy="850" r="2" fill="white" opacity="0.4"/>
  <circle cx="750" cy="860" r="3" fill="white" opacity="0.5"/>
  <circle cx="870" cy="350" r="2" fill="white" opacity="0.4"/>
  <circle cx="160" cy="380" r="2" fill="white" opacity="0.3"/>
  <!-- 교차 궤도들 (시안/핑크/노랑 네온) -->
  <!-- 시안 궤도 (크게) -->
  <ellipse cx="512" cy="512" rx="290" ry="190" fill="none" stroke="#00FFFF" stroke-width="10" opacity="0.85" filter="url(#neon)"/>
  <!-- 핑크 궤도 (기울어짐) -->
  <ellipse cx="512" cy="512" rx="270" ry="150" fill="none" stroke="#FF69B4" stroke-width="10" opacity="0.85" transform="rotate(55 512 512)" filter="url(#neon)"/>
  <!-- 노랑 궤도 (다르게 기울어짐) -->
  <ellipse cx="512" cy="512" rx="260" ry="130" fill="none" stroke="#FFE500" stroke-width="10" opacity="0.85" transform="rotate(-55 512 512)" filter="url(#neon)"/>
  <!-- 행성 A (중앙) -->
  <circle cx="512" cy="512" r="70" fill="url(#p10a)"/>
  <ellipse cx="497" cy="498" rx="52" ry="22" fill="none" stroke="#FDE68A" stroke-width="7" opacity="0.6"/>
  <!-- 행성 B (오른쪽) -->
  <circle cx="760" cy="400" r="50" fill="url(#p10b)"/>
  <!-- 행성 C (왼쪽 하단) -->
  <circle cx="300" cy="680" r="45" fill="url(#p10c)"/>
  <!-- 궤도 위 탐사선들 (3개) -->
  <!-- 탐사선 1 (시안 궤도) -->
  <g transform="translate(800,512) rotate(0)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="white" stroke="#00FFFF" stroke-width="6"/>
    <rect x="-6" y="-16" width="12" height="16" rx="6" fill="#BAE6FD" stroke="#00FFFF" stroke-width="5"/>
    <rect x="-28" y="-3" width="16" height="6" rx="3" fill="#7DD3FC" stroke="#00FFFF" stroke-width="4"/>
    <rect x="12" y="-3" width="16" height="6" rx="3" fill="#7DD3FC" stroke="#00FFFF" stroke-width="4"/>
  </g>
  <!-- 탐사선 2 (핑크 궤도) -->
  <g transform="translate(350,255) rotate(55)">
    <ellipse cx="0" cy="0" rx="18" ry="9" fill="white" stroke="#FF69B4" stroke-width="5"/>
    <rect x="-5" y="-14" width="10" height="14" rx="5" fill="#FBCFE8" stroke="#FF69B4" stroke-width="4"/>
    <rect x="-24" y="-3" width="14" height="5" rx="3" fill="#F9A8D4" stroke="#FF69B4" stroke-width="3"/>
    <rect x="10" y="-3" width="14" height="5" rx="3" fill="#F9A8D4" stroke="#FF69B4" stroke-width="3"/>
  </g>
  <!-- 탐사선 3 (노랑 궤도) -->
  <g transform="translate(750,750) rotate(-55)">
    <ellipse cx="0" cy="0" rx="18" ry="9" fill="white" stroke="#FFE500" stroke-width="5"/>
    <rect x="-5" y="-14" width="10" height="14" rx="5" fill="#FEF08A" stroke="#FFE500" stroke-width="4"/>
    <rect x="-24" y="-3" width="14" height="5" rx="3" fill="#FDE047" stroke="#FFE500" stroke-width="3"/>
    <rect x="10" y="-3" width="14" height="5" rx="3" fill="#FDE047" stroke="#FFE500" stroke-width="3"/>
  </g>
</svg>
