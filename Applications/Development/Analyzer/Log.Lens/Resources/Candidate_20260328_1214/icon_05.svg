<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ll05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8BBD9"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
    <filter id="sh_ll05">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg_ll05)" rx="120"/>

  <!-- Layer 2: Input lines at top (multiple log streams) -->
  <rect x="120" y="150" width="760" height="42" rx="10" fill="#6A0DAD" opacity="0.7"/>
  <rect x="120" y="210" width="760" height="42" rx="10" fill="#9C27B0" opacity="0.7"/>
  <rect x="120" y="270" width="760" height="42" rx="10" fill="#6A0DAD" opacity="0.7"/>
  <rect x="120" y="330" width="760" height="42" rx="10" fill="#9C27B0" opacity="0.7"/>
  <rect x="120" y="390" width="760" height="42" rx="10" fill="#6A0DAD" opacity="0.7"/>

  <!-- Converging lines -->
  <line x1="500" y1="192" x2="500" y2="450" stroke="#4A148C" stroke-width="6" opacity="0.3"/>

  <!-- Funnel body (dark purple) -->
  <polygon points="140,450 884,450 680,650 340,650"
    fill="#4A148C" opacity="0.9" filter="url(#sh_ll05)"/>

  <!-- Funnel neck -->
  <rect x="340" y="648" width="340" height="120" rx="12" fill="#4A148C" opacity="0.9"/>

  <!-- Funnel output spout -->
  <rect x="420" y="768" width="180" height="100" rx="16" fill="#6A0DAD" opacity="0.95"/>

  <!-- "LOG" text on funnel body -->
  <text x="512" y="578" font-family="'Segoe UI', Arial Black, sans-serif" font-size="130"
    font-weight="900" text-anchor="middle" fill="white" letter-spacing="4">LOG</text>

  <!-- Tiny filtered output dots -->
  <circle cx="470" cy="830" r="14" fill="#FF6B9D"/>
  <circle cx="512" cy="830" r="14" fill="#FFEB3B"/>
  <circle cx="554" cy="830" r="14" fill="#4CAF50"/>
</svg>
