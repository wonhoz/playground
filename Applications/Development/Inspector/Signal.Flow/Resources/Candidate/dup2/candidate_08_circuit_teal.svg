<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00251A"/>
      <stop offset="100%" stop-color="#003829"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Circuit board traces -->
  <line x1="80" y1="200" x2="160" y2="200" stroke="#00BFA5" stroke-width="3"/>
  <line x1="160" y1="200" x2="160" y2="260" stroke="#00BFA5" stroke-width="3"/>
  <line x1="160" y1="260" x2="260" y2="260" stroke="#00BFA5" stroke-width="3"/>
  <line x1="260" y1="260" x2="260" y2="200" stroke="#00BFA5" stroke-width="3"/>
  <line x1="260" y1="200" x2="380" y2="200" stroke="#00BFA5" stroke-width="3"/>
  <line x1="380" y1="200" x2="380" y2="320" stroke="#00BFA5" stroke-width="3"/>
  <line x1="380" y1="320" x2="260" y2="320" stroke="#00BFA5" stroke-width="3"/>
  <line x1="260" y1="320" x2="260" y2="380" stroke="#00BFA5" stroke-width="3"/>
  <line x1="160" y1="260" x2="160" y2="380" stroke="#00BFA5" stroke-width="3" opacity="0.6"/>
  <line x1="160" y1="380" x2="260" y2="380" stroke="#00BFA5" stroke-width="3" opacity="0.6"/>
  <!-- Resistor symbols -->
  <rect x="195" y="253" width="30" height="14" rx="2" fill="none" stroke="#1DE9B6" stroke-width="2"/>
  <rect x="368" y="255" width="24" height="14" rx="2" fill="none" stroke="#1DE9B6" stroke-width="2"/>
  <!-- IC chip center -->
  <rect x="200" y="160" width="112" height="80" rx="6" fill="#004D40" stroke="#1DE9B6" stroke-width="2"/>
  <text x="222" y="195" font-family="monospace" font-size="13" fill="#1DE9B6">SIG MCU</text>
  <!-- IC pins -->
  <line x1="220" y1="160" x2="220" y2="145" stroke="#1DE9B6" stroke-width="2"/>
  <line x1="245" y1="160" x2="245" y2="145" stroke="#1DE9B6" stroke-width="2"/>
  <line x1="270" y1="160" x2="270" y2="145" stroke="#1DE9B6" stroke-width="2"/>
  <line x1="295" y1="160" x2="295" y2="145" stroke="#1DE9B6" stroke-width="2"/>
  <!-- Signal nodes -->
  <circle cx="80" cy="200" r="8" fill="#00E5FF"/>
  <circle cx="160" cy="200" r="6" fill="#1DE9B6"/>
  <circle cx="260" cy="260" r="6" fill="#1DE9B6"/>
  <circle cx="380" cy="200" r="8" fill="#00E5FF"/>
  <circle cx="380" cy="320" r="6" fill="#1DE9B6"/>
  <!-- Data flow dots animated -->
  <circle cx="200" cy="200" r="5" fill="#80CBC4" opacity="0.8"/>
  <circle cx="320" cy="200" r="5" fill="#80CBC4" opacity="0.6"/>
  <circle cx="380" cy="260" r="5" fill="#80CBC4" opacity="0.4"/>
</svg>
