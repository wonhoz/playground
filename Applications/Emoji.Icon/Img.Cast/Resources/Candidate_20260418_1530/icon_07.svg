<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- Layer 2: 마법사 지팡이 실루엣 -->
    <!-- 지팡이 자루 -->
    <rect x="460" y="300" width="40" height="560" rx="20" fill="#7E57C2" transform="rotate(-30 480 580)"/>
    <!-- 지팡이 끝 별 -->
    <circle cx="720" cy="200" r="70" fill="#FFD54F"/>
    <text x="720" y="232" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">⭐</text>

    <!-- Layer 3: 변환 이펙트 (좌 → 우) -->
    <!-- 입력 파일 (SVG, 좌하단) -->
    <rect x="130" y="640" width="220" height="200" rx="20" fill="#78909C" opacity="0.9"/>
    <text x="240" y="738" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">SVG</text>
    <text x="240" y="810" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#B0BEC5" text-anchor="middle">입력</text>

    <!-- 스파클 이펙트 -->
    <text x="420" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="52">✨</text>
    <text x="500" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="40">✨</text>
    <text x="360" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="36">⭐</text>
    <text x="580" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="44">💫</text>

    <!-- 출력 파일 (ICO, 우하단) -->
    <rect x="670" y="640" width="220" height="200" rx="20" fill="#7B1FA2"/>
    <text x="780" y="738" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">ICO</text>
    <text x="780" y="810" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#CE93D8" text-anchor="middle">출력!</text>

    <!-- 변환 화살표 -->
    <text x="512" y="770" font-family="'Segoe UI',Arial,sans-serif" font-size="70" fill="#9C27B0" text-anchor="middle">→</text>

    <!-- 타이틀 -->
    <rect x="230" y="130" width="564" height="80" rx="24" fill="#512DA8"/>
    <text x="512" y="184" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
  </g>
</svg>
