<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <radialGradient id="circle1" cx="40%" cy="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="circle2" cx="60%" cy="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="overlap" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 벤다이어그램 — 좌측 원 -->
  <circle cx="200" cy="256" r="140" fill="url(#circle1)" stroke="#2DD4BF" stroke-width="2.5" filter="url(#glow)" opacity="0.85"/>
  <!-- 우측 원 -->
  <circle cx="312" cy="256" r="140" fill="url(#circle2)" stroke="#F43F5E" stroke-width="2.5" filter="url(#glow)" opacity="0.85"/>
  <!-- 겹치는 영역 강조 -->
  <clipPath id="clipLeft">
    <circle cx="200" cy="256" r="140"/>
  </clipPath>
  <circle cx="312" cy="256" r="140" fill="url(#overlap)" clip-path="url(#clipLeft)" opacity="0.8"/>
  <!-- 좌측 이미지 아이콘 -->
  <rect x="118" y="210" width="60" height="50" rx="6" fill="#0d1a20" stroke="#2DD4BF" stroke-width="1.5" opacity="0.9"/>
  <circle cx="132" cy="224" r="5" fill="#2DD4BF" opacity="0.8"/>
  <path d="M118 248 L138 230 L155 245 L162 238 L178 255" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- 우측 이미지 아이콘 -->
  <rect x="334" y="210" width="60" height="50" rx="6" fill="#0d1a20" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <circle cx="348" cy="224" r="5" fill="#F43F5E" opacity="0.8"/>
  <path d="M334 248 L354 228 L371 243 L378 236 L394 255" stroke="#F43F5E" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- 중앙 교차 영역 텍스트 = DIFF -->
  <text x="256" y="250" text-anchor="middle" font-size="18" font-weight="bold" fill="#FDE047" filter="url(#glow)" opacity="0.95">DIFF</text>
  <rect x="234" y="260" width="44" height="16" rx="4" fill="#FDE047" opacity="0.3"/>
  <text x="256" y="272" text-anchor="middle" font-size="10" fill="#FDE047" opacity="0.9">0.3%</text>
  <!-- 하단 라벨 -->
  <text x="170" y="420" text-anchor="middle" font-size="13" fill="#2DD4BF" opacity="0.7">Image A</text>
  <text x="342" y="420" text-anchor="middle" font-size="13" fill="#F43F5E" opacity="0.7">Image B</text>
</svg>
