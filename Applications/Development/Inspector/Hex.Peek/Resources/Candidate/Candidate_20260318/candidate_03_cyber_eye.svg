<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000f0f"/>
      <stop offset="100%" stop-color="#001515"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0E7490" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Eye outline -->
  <path d="M60,256 Q180,120 256,120 Q332,120 452,256 Q332,392 256,392 Q180,392 60,256 Z" fill="#001515" stroke="#00FFFF" stroke-width="3" opacity="0.8"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="90" fill="url(#iris)" stroke="#00FFFF" stroke-width="2"/>
  <!-- Iris pattern (hex-like rings) -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#0891B2" stroke-width="1" opacity="0.5"/>
  <!-- Pupil (shows hex data) -->
  <circle cx="256" cy="256" r="32" fill="#000f0f"/>
  <!-- Hex data in pupil -->
  <text x="256" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFFF">FF A3</text>
  <text x="256" y="262" text-anchor="middle" font-family="monospace" font-size="8" fill="#22D3EE">4B 0E</text>
  <!-- Pupil highlight -->
  <ellipse cx="244" cy="244" rx="8" ry="5" fill="white" opacity="0.15"/>
  <!-- Circuit lines from eye -->
  <line x1="60" y1="256" x2="40" y2="256" stroke="#00FFFF" stroke-width="2" opacity="0.5"/>
  <line x1="452" y1="256" x2="472" y2="256" stroke="#00FFFF" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="256" x2="40" y2="200" stroke="#00FFFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="256" x2="40" y2="310" stroke="#00FFFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="472" y1="256" x2="472" y2="200" stroke="#00FFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Hex stream around eye -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.5">00 FF 4A B2 33 E1 7C 90</text>
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="9" fill="#06B6D4" opacity="0.4">C2 88 5D 3F A0 11 6E D7</text>
  <!-- Eye lashes / scan lines -->
  <line x1="160" y1="180" x2="156" y2="160" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="155" x2="198" y2="135" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="145" x2="256" y2="120" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <line x1="312" y1="155" x2="314" y2="135" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <line x1="352" y1="180" x2="356" y2="160" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
</svg>
