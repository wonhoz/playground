  <!-- 내부 껍질 -->
  <ellipse cx="512" cy="500" rx="180" ry="220" fill="none" stroke="#26A69A" stroke-width="26" opacity="0.7"/>
  <!-- 더 내부 -->
  <ellipse cx="512" cy="500" rx="120" ry="160" fill="none" stroke="#26A69A" stroke-width="24" opacity="0.9"/>
