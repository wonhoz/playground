<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg01cp)"/>

  <!-- Layer 2: Special character grid 4x3 -->
  <!-- Row 1 -->
  <rect x="88"  y="100" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="180" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0277BD" text-anchor="middle">©</text>

  <rect x="295" y="100" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="387" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#1565C0" text-anchor="middle">∑</text>

  <rect x="502" y="100" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="594" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#0D47A1" text-anchor="middle">→</text>

  <rect x="709" y="100" width="227" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="822" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="100" fill="#E65100" text-anchor="middle">€</text>

  <!-- Row 2 -->
  <rect x="88"  y="278" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="180" y="376" font-family="'Segoe UI',Arial,sans-serif" font-size="96" fill="#6A1B9A" text-anchor="middle">²</text>

  <rect x="295" y="278" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="387" y="378" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#1B5E20" text-anchor="middle">±</text>

  <rect x="502" y="278" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="594" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#880E4F" text-anchor="middle">∞</text>

  <rect x="709" y="278" width="227" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="822" y="378" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#37474F" text-anchor="middle">π</text>

  <!-- Row 3: emoji row -->
  <rect x="88"  y="456" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="180" y="556" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle">😀</text>

  <rect x="295" y="456" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="387" y="556" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle">⭐</text>

  <rect x="502" y="456" width="185" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="594" y="556" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle">❤️</text>

  <rect x="709" y="456" width="227" height="155" rx="18" fill="white" opacity="0.9"/>
  <text x="822" y="556" font-family="'Segoe UI',Arial,sans-serif" font-size="96" text-anchor="middle">🔥</text>

  <!-- Layer 3: App name label -->
  <rect x="88" y="670" width="848" height="90" rx="18" fill="white" opacity="0.15"/>
  <text x="512" y="734" font-family="'Segoe UI',Arial,sans-serif" font-size="76" font-weight="bold"
    fill="white" text-anchor="middle" letter-spacing="4">CHAR · PAD</text>

  <!-- Search box hint -->
  <rect x="88" y="790" width="848" height="68" rx="34" fill="white" opacity="0.2"/>
  <text x="180" y="837" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white" opacity="0.8">🔍  search symbols...</text>
</svg>
