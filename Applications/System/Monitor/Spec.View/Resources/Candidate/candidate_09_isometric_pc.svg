<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a5a"/>
      <stop offset="100%" style="stop-color:#2a2a4a"/>
    </linearGradient>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e3a"/>
      <stop offset="100%" style="stop-color:#2a2a4a"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#282848"/>
      <stop offset="100%" style="stop-color:#1a1a30"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Isometric PC Tower -->
  <!-- Top face -->
  <polygon points="256,120 380,185 256,250 132,185" fill="url(#top)" stroke="#5c5c8a" stroke-width="2"/>
  <!-- Left face -->
  <polygon points="132,185 132,370 256,435 256,250" fill="url(#left)" stroke="#4a4a7a" stroke-width="2"/>
  <!-- Right face -->
  <polygon points="256,250 256,435 380,370 380,185" fill="url(#right)" stroke="#4a4a7a" stroke-width="2"/>
  <!-- LED strips on right face -->
  <line x1="280" y1="270" x2="360" y2="223" stroke="#7c4dff" stroke-width="4" opacity="0.8"/>
  <line x1="280" y1="290" x2="360" y2="243" stroke="#7c4dff" stroke-width="4" opacity="0.6"/>
  <!-- Drive bays on left face -->
  <rect x="148" y="220" width="60" height="16" rx="3" fill="#0a0a1e" stroke="#3a3a6a" stroke-width="1"/>
  <rect x="148" y="244" width="60" height="16" rx="3" fill="#0a0a1e" stroke="#3a3a6a" stroke-width="1"/>
  <!-- Power button -->
  <circle cx="200" cy="290" r="12" fill="#0a0a1e" stroke="#7c4dff" stroke-width="2"/>
  <circle cx="200" cy="290" r="6" fill="#7c4dff" opacity="0.8"/>
  <!-- Stats HUD overlay -->
  <rect x="80" y="380" width="352" height="80" rx="12" fill="#0d0d20" stroke="#3949ab" stroke-width="1" opacity="0.9"/>
  <rect x="96" y="394" width="80" height="8" rx="3" fill="#7c4dff" opacity="0.5"/>
  <rect x="96" y="410" width="200" height="8" rx="3" fill="#5c6bc0" opacity="0.4"/>
  <rect x="96" y="426" width="160" height="8" rx="3" fill="#5c6bc0" opacity="0.4"/>
  <circle cx="380" cy="420" r="22" fill="#7c4dff" opacity="0.2" stroke="#7c4dff" stroke-width="2"/>
  <text x="380" y="427" text-anchor="middle" fill="#b388ff" font-size="18" font-weight="bold">i</text>
</svg>