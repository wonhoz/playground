<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clipboard board -->
  <rect x="100" y="100" width="312" height="370" rx="12" fill="url(#board)" stroke="#10B981" stroke-width="2.5"/>
  <!-- Clipboard clip at top -->
  <rect x="196" y="85" width="120" height="36" rx="8" fill="#047857" stroke="#10B981" stroke-width="2"/>
  <rect x="220" y="90" width="72" height="20" rx="5" fill="#065F46"/>
  <!-- Header section -->
  <rect x="120" y="130" width="272" height="36" rx="6" fill="#047857" opacity="0.6"/>
  <rect x="134" y="140" width="160" height="12" rx="4" fill="#34D399" opacity="0.8"/>
  <rect x="304" y="140" width="70" height="12" rx="4" fill="#6EE7B7" opacity="0.6"/>
  <!-- Data rows with checkmarks -->
  <!-- Row 1 - name -->
  <rect x="120" y="180" width="272" height="28" rx="4" fill="#047857" opacity="0.3"/>
  <circle cx="142" cy="194" r="9" fill="#10B981"/>
  <path d="M137 194 L141 198 L148 190" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="162" y="188" width="60" height="10" rx="3" fill="#6EE7B7" opacity="0.7"/>
  <rect x="240" y="188" width="130" height="10" rx="3" fill="#34D399" opacity="0.6"/>
  <!-- Row 2 - email -->
  <rect x="120" y="216" width="272" height="28" rx="4" fill="#047857" opacity="0.2"/>
  <circle cx="142" cy="230" r="9" fill="#10B981"/>
  <path d="M137 230 L141 234 L148 226" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="162" y="224" width="60" height="10" rx="3" fill="#6EE7B7" opacity="0.7"/>
  <rect x="240" y="224" width="110" height="10" rx="3" fill="#34D399" opacity="0.6"/>
  <!-- Row 3 - age -->
  <rect x="120" y="252" width="272" height="28" rx="4" fill="#047857" opacity="0.3"/>
  <circle cx="142" cy="266" r="9" fill="#10B981"/>
  <path d="M137 266 L141 270 L148 262" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="162" y="260" width="60" height="10" rx="3" fill="#6EE7B7" opacity="0.7"/>
  <rect x="240" y="260" width="70" height="10" rx="3" fill="#FCD34D" opacity="0.7"/>
  <!-- Row 4 - active -->
  <rect x="120" y="288" width="272" height="28" rx="4" fill="#047857" opacity="0.2"/>
  <circle cx="142" cy="302" r="9" fill="#10B981"/>
  <path d="M137 302 L141 306 L148 298" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="162" y="296" width="60" height="10" rx="3" fill="#6EE7B7" opacity="0.7"/>
  <rect x="240" y="296" width="50" height="10" rx="3" fill="#34D399" opacity="0.8"/>
  <!-- Row 5 - createdAt -->
  <rect x="120" y="324" width="272" height="28" rx="4" fill="#047857" opacity="0.3"/>
  <circle cx="142" cy="338" r="9" fill="#10B981"/>
  <path d="M137 338 L141 342 L148 334" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="162" y="332" width="80" height="10" rx="3" fill="#6EE7B7" opacity="0.7"/>
  <rect x="260" y="332" width="110" height="10" rx="3" fill="#A7F3D0" opacity="0.5"/>
  <!-- Generate button at bottom of clipboard -->
  <rect x="128" y="396" width="256" height="44" rx="10" fill="#10B981"/>
  <text x="256" y="423" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">✓ Generate 1000 Records</text>
</svg>
