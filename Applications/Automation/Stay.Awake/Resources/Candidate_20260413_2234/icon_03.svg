<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="72" y="155" width="880" height="510" rx="48" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <!-- Left mouse cursor -->
  <path d="M 148,248 L 148,432 L 196,394 L 230,462 L 264,445 L 230,377 L 282,377 Z"
        fill="#06D6A0" stroke="#004D40" stroke-width="14" stroke-linejoin="round"/>
  <!-- Motion trail dots -->
  <circle cx="310" cy="318" r="11" fill="#06D6A0" opacity="0.45"/>
  <circle cx="340" cy="305" r="9" fill="#06D6A0" opacity="0.30"/>
  <circle cx="368" cy="290" r="7" fill="#06D6A0" opacity="0.18"/>
  <!-- Arrow shaft -->
  <rect x="400" y="390" width="180" height="46" rx="22" fill="#FFD93D" stroke="#B8860B" stroke-width="14"/>
  <!-- Arrow head -->
  <path d="M 574,346 L 648,413 L 574,480 Z" fill="#FFD93D" stroke="#B8860B" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right mouse cursor (moved) -->
  <path d="M 680,228 L 680,412 L 728,374 L 762,442 L 796,425 L 762,357 L 814,357 Z"
        fill="#06D6A0" stroke="#004D40" stroke-width="14" stroke-linejoin="round"/>
  <!-- KEEP ALIVE badge -->
  <rect x="110" y="744" width="804" height="118" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#06D6A0" text-anchor="middle">KEEP ALIVE</text>
</svg>
