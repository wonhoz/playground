<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#200122"/>
      <stop offset="100%" style="stop-color:#6f0000"/>
    </linearGradient>
    <linearGradient id="platform" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
    <linearGradient id="flipPlatform" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Puzzle grid lines -->
  <line x1="60" y1="170" x2="452" y2="170" stroke="#ffffff15" stroke-width="1"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#ffffff15" stroke-width="1"/>
  <line x1="60" y1="340" x2="452" y2="340" stroke="#ffffff15" stroke-width="1"/>
  <line x1="170" y1="60" x2="170" y2="452" stroke="#ffffff15" stroke-width="1"/>
  <line x1="256" y1="60" x2="256" y2="452" stroke="#ffffff15" stroke-width="1"/>
  <line x1="340" y1="60" x2="340" y2="452" stroke="#ffffff15" stroke-width="1"/>
  <!-- Puzzle pieces top half -->
  <rect x="80" y="80" width="80" height="80" rx="8" fill="url(#platform)" opacity="0.9" filter="url(#glow)"/>
  <rect x="180" y="80" width="80" height="80" rx="8" fill="url(#platform)" opacity="0.7"/>
  <rect x="280" y="80" width="80" height="80" rx="8" fill="url(#platform)" opacity="0.9" filter="url(#glow)"/>
  <rect x="380" y="80" width="52" height="80" rx="8" fill="url(#platform)" opacity="0.6"/>
  <!-- Flip zone center -->
  <rect x="80" y="176" width="352" height="160" rx="12" fill="#ffffff08"/>
  <!-- Rotating arrow -->
  <path d="M176,256 A80,80 0 0,1 336,256" stroke="#ff6b6b" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M176,256 A80,80 0 0,0 336,256" stroke="#a18cd1" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="336,256 320,240 320,272" fill="#ff6b6b" filter="url(#glow)"/>
  <polygon points="176,256 192,272 192,240" fill="#a18cd1" filter="url(#glow)"/>
  <!-- Puzzle pieces bottom half (flipped) -->
  <rect x="80" y="352" width="80" height="80" rx="8" fill="url(#flipPlatform)" opacity="0.8" filter="url(#glow)"/>
  <rect x="180" y="352" width="80" height="80" rx="8" fill="url(#flipPlatform)" opacity="0.6"/>
  <rect x="280" y="352" width="80" height="80" rx="8" fill="url(#flipPlatform)" opacity="0.8" filter="url(#glow)"/>
  <rect x="380" y="352" width="52" height="80" rx="8" fill="url(#flipPlatform)" opacity="0.5"/>
</svg>
