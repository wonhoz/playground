<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1F0A"/>
      <stop offset="100%" stop-color="#0D2A0D"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flow graph lines -->
  <line x1="100" y1="200" x2="200" y2="200" stroke="#388E3C" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="260" y1="200" x2="360" y2="200" stroke="#388E3C" stroke-width="3"/>
  <line x1="200" y1="240" x2="200" y2="300" stroke="#388E3C" stroke-width="3"/>
  <line x1="200" y1="360" x2="360" y2="360" stroke="#388E3C" stroke-width="3"/>
  <line x1="360" y1="240" x2="360" y2="320" stroke="#388E3C" stroke-width="3"/>
  <!-- Event nodes -->
  <circle cx="100" cy="200" r="28" fill="url(#node)"/>
  <text x="86" y="206" font-family="monospace" font-size="14" fill="white">E1</text>
  <circle cx="230" cy="200" r="28" fill="url(#node)"/>
  <text x="216" y="206" font-family="monospace" font-size="14" fill="white">E2</text>
  <circle cx="390" cy="200" r="28" fill="url(#node)"/>
  <text x="376" y="206" font-family="monospace" font-size="14" fill="white">E3</text>
  <circle cx="200" cy="330" r="28" fill="#1B5E20" stroke="#66BB6A" stroke-width="2"/>
  <text x="186" y="336" font-family="monospace" font-size="14" fill="#69F0AE">E4</text>
  <circle cx="390" cy="360" r="28" fill="#1B5E20" stroke="#66BB6A" stroke-width="2"/>
  <text x="376" y="366" font-family="monospace" font-size="14" fill="#69F0AE">E5</text>
  <!-- Pulse indicator -->
  <circle cx="230" cy="200" r="42" fill="none" stroke="#69F0AE" stroke-width="2" opacity="0.4"/>
  <circle cx="230" cy="200" r="56" fill="none" stroke="#69F0AE" stroke-width="1" opacity="0.2"/>
  <!-- Flow label -->
  <text x="160" y="450" font-family="monospace" font-size="20" fill="#4CAF50">EVENT FLOW ANALYZER</text>
</svg>
