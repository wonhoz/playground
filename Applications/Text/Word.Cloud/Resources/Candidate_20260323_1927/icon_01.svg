<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg01)"/>
  <!-- Cloud shape (white fluffy cloud) -->
  <ellipse cx="512" cy="540" rx="310" ry="190" fill="#FFFFFF"/>
  <ellipse cx="340" cy="500" rx="180" ry="150" fill="#FFFFFF"/>
  <ellipse cx="684" cy="510" rx="170" ry="140" fill="#FFFFFF"/>
  <ellipse cx="460" cy="420" rx="160" ry="140" fill="#FFFFFF"/>
  <ellipse cx="580" cy="400" rx="170" ry="145" fill="#FFFFFF"/>
  <!-- Words inside cloud -->
  <text x="512" y="510" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="98" font-weight="900" fill="#0369A1">Hello</text>
  <text x="360" y="590" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#0891B2">World</text>
  <text x="660" y="580" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="700" fill="#7C3AED">text</text>
  <text x="430" y="430" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="600" fill="#059669">data</text>
  <text x="620" y="440" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#D97706">word</text>
  <text x="300" y="540" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#DC2626">cloud</text>
  <text x="700" y="530" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#9333EA">font</text>
</svg>
