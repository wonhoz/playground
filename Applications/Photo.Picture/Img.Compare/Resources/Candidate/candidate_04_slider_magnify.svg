<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a6a"/>
      <stop offset="100%" stop-color="#252550"/>
    </linearGradient>
    <linearGradient id="slider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main image panel -->
  <rect x="56" y="80" width="400" height="280" rx="16" fill="url(#panel)"/>
  <!-- Left side (greyscale before) -->
  <rect x="56" y="80" width="210" height="280" rx="16" fill="#404060" opacity="0.8"/>
  <!-- Right side (color after) -->
  <rect x="266" y="80" width="190" height="280" rx="0" fill="#2d5a6a" opacity="0.8"/>
  <rect x="413" y="80" width="43" height="280" rx="0 16 16 0" fill="#2d5a6a" opacity="0.8"/>
  <!-- Landscape scene left (greyscale) -->
  <rect x="70" y="280" width="196" height="68" rx="0 0 0 12" fill="#555570"/>
  <polygon points="130,200 80,280 180,280" fill="#888899"/>
  <polygon points="200,220 150,280 250,280" fill="#777788"/>
  <circle cx="160" cy="130" r="30" fill="#aaaacc" opacity="0.6"/>
  <!-- Landscape scene right (color) -->
  <rect x="266" y="280" width="190" height="68" rx="0 0 12 0" fill="#3a7a3a"/>
  <polygon points="340,200 290,280 390,280" fill="#5a8a3a"/>
  <polygon points="420,220 370,280 456,280" fill="#4a7a2a"/>
  <circle cx="380" cy="130" r="30" fill="#ffd700" opacity="0.7"/>
  <!-- Slider handle -->
  <rect x="252" y="70" width="16" height="300" rx="8" fill="url(#slider)"/>
  <circle cx="260" cy="220" r="22" fill="url(#slider)"/>
  <rect x="252" y="211" width="16" height="18" fill="#c4b5fd"/>
  <!-- Slider arrows -->
  <polygon points="248,220 238,210 238,230" fill="white"/>
  <polygon points="272,220 282,210 282,230" fill="white"/>
  <!-- Magnifier -->
  <circle cx="380" cy="390" r="55" fill="none" stroke="#a78bfa" stroke-width="8"/>
  <circle cx="380" cy="390" r="44" fill="#1a1a3a" opacity="0.7"/>
  <line x1="422" y1="432" x2="450" y2="460" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
  <!-- Zoom detail -->
  <circle cx="370" cy="380" r="6" fill="#a78bfa"/>
  <circle cx="390" cy="390" r="6" fill="#7c3aed"/>
  <circle cx="370" cy="400" r="6" fill="#c4b5fd"/>
  <text x="256" y="490" text-anchor="middle" font-family="Arial" font-size="20" fill="white" opacity="0.7">BEFORE / AFTER</text>
</svg>
