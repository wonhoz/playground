<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pad.Forge - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    color: #B388FF;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: #252525;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover {
    border-color: #B388FF;
    transform: translateY(-4px);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 12px;
    color: #ccc;
    word-break: break-all;
  }
</style>
</head>
<body>
<h1>Pad.Forge</h1>
<p class="subtitle">노트패드·텍스트 편집기 — Icon Candidates (10)</p>
<div class="grid">
  <div class="card">
    <img src="candidate_01_forge_notepad.svg" alt="01 forge_notepad">
    <div class="card-num">#01</div>
    <div class="card-name">forge_notepad</div>
  </div>
  <div class="card">
    <img src="candidate_02_dark_editor.svg" alt="02 dark_editor">
    <div class="card-num">#02</div>
    <div class="card-name">dark_editor</div>
  </div>
  <div class="card">
    <img src="candidate_03_neon_writer.svg" alt="03 neon_writer">
    <div class="card-num">#03</div>
    <div class="card-name">neon_writer</div>
  </div>
  <div class="card">
    <img src="candidate_04_quill_vintage.svg" alt="04 quill_vintage">
    <div class="card-num">#04</div>
    <div class="card-name">quill_vintage</div>
  </div>
  <div class="card">
    <img src="candidate_05_green_terminal.svg" alt="05 green_terminal">
    <div class="card-num">#05</div>
    <div class="card-name">green_terminal</div>
  </div>
  <div class="card">
    <img src="candidate_06_pastel_soft.svg" alt="06 pastel_soft">
    <div class="card-num">#06</div>
    <div class="card-name">pastel_soft</div>
  </div>
  <div class="card">
    <img src="candidate_07_cosmic_note.svg" alt="07 cosmic_note">
    <div class="card-num">#07</div>
    <div class="card-name">cosmic_note</div>
  </div>
  <div class="card">
    <img src="candidate_08_minimal_white.svg" alt="08 minimal_white">
    <div class="card-num">#08</div>
    <div class="card-name">minimal_white</div>
  </div>
  <div class="card">
    <img src="candidate_09_retro_typewriter.svg" alt="09 retro_typewriter">
    <div class="card-num">#09</div>
    <div class="card-name">retro_typewriter</div>
  </div>
  <div class="card">
    <img src="candidate_10_sunset_notes.svg" alt="10 sunset_notes">
    <div class="card-num">#10</div>
    <div class="card-name">sunset_notes</div>
  </div>
</div>
</body>
</html>
