<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Log.Merge - Icon Candidates</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
    h1 { color: #888; font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 1100px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .item img { width: 160px; height: 160px; border-radius: 20px; border: 1px solid #333; background: #111; }
    .item span { font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>Log.Merge — Icon Candidates</h1>
  <div class="grid">
    <div class="item"><img src="candidate_01_stream_merge.svg" alt="01"/><span>01 Stream Merge</span></div>
    <div class="item"><img src="candidate_02_dark_terminal.svg" alt="02"/><span>02 Dark Terminal</span></div>
    <div class="item"><img src="candidate_03_funnel.svg" alt="03"/><span>03 Funnel</span></div>
    <div class="item"><img src="candidate_04_amber_analyze.svg" alt="04"/><span>04 Amber Analyze</span></div>
    <div class="item"><img src="candidate_05_teal_chart.svg" alt="05"/><span>05 Teal Chart</span></div>
    <div class="item"><img src="candidate_06_red_alert.svg" alt="06"/><span>06 Red Alert</span></div>
    <div class="item"><img src="candidate_07_pastel_docs.svg" alt="07"/><span>07 Pastel Docs</span></div>
    <div class="item"><img src="candidate_08_git_branch.svg" alt="08"/><span>08 Git Branch</span></div>
    <div class="item"><img src="candidate_09_matrix_stack.svg" alt="09"/><span>09 Matrix Stack</span></div>
    <div class="item"><img src="candidate_10_neon_zipper.svg" alt="10"/><span>10 Neon Zipper</span></div>
  </div>
</body>
</html>
