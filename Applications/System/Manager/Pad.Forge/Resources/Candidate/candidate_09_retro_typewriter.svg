  <line x1="148" y1="242" x2="364" y2="242" stroke="#CCCC99" stroke-width="1"/>
  <!-- Typed text -->
  <text x="155" y="167" font-family="monospace" font-size="13" fill="#443322">Pad.Forge v1.0</text>
  <text x="155" y="185" font-family="monospace" font-size="12" fill="#555533">Text editor forged</text>
  <text x="155" y="202" font-family="monospace" font-size="12" fill="#555533">for productivity.</text>
  <!-- Carriage return bar -->
