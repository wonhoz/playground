<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Laser X-cross beams -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020510"/>
  <!-- Starfield background -->
  <circle cx="200" cy="200" r="3" fill="#E65100" opacity="0.3"/>
  <circle cx="820" cy="180" r="3" fill="#E65100" opacity="0.25"/>
  <circle cx="150" cy="750" r="4" fill="#FF6D00" opacity="0.2"/>
  <circle cx="880" cy="700" r="3" fill="#E65100" opacity="0.25"/>
  <!-- Diagonal beam 1 (top-left to bottom-right) -->
  <!-- Glow outer -->
  <line x1="180" y1="180" x2="844" y2="844" stroke="#BF360C" stroke-width="30" stroke-linecap="round" opacity="0.25"/>
  <!-- Core beam -->
  <line x1="180" y1="180" x2="844" y2="844" stroke="#E65100" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Bright center -->
  <line x1="180" y1="180" x2="844" y2="844" stroke="#FF6D00" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Diagonal beam 2 (top-right to bottom-left) -->
  <line x1="844" y1="180" x2="180" y2="844" stroke="#BF360C" stroke-width="30" stroke-linecap="round" opacity="0.25"/>
  <line x1="844" y1="180" x2="180" y2="844" stroke="#E65100" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <line x1="844" y1="180" x2="180" y2="844" stroke="#FF6D00" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Center intersection flash -->
  <circle cx="512" cy="512" r="80" fill="#E65100" opacity="0.2"/>
  <circle cx="512" cy="512" r="50" fill="#E65100" opacity="0.4"/>
  <circle cx="512" cy="512" r="28" fill="#FF6D00" opacity="0.8"/>
  <circle cx="512" cy="512" r="14" fill="#FFAB00"/>
  <!-- Beam endpoints (impact flashes) -->
  <circle cx="180" cy="180" r="30" fill="#E65100" opacity="0.5"/>
  <circle cx="180" cy="180" r="16" fill="#FF6D00" opacity="0.8"/>
  <circle cx="844" cy="180" r="30" fill="#E65100" opacity="0.5"/>
  <circle cx="844" cy="180" r="16" fill="#FF6D00" opacity="0.8"/>
  <circle cx="180" cy="844" r="30" fill="#E65100" opacity="0.5"/>
  <circle cx="180" cy="844" r="16" fill="#FF6D00" opacity="0.8"/>
  <circle cx="844" cy="844" r="30" fill="#E65100" opacity="0.5"/>
  <circle cx="844" cy="844" r="16" fill="#FF6D00" opacity="0.8"/>
</svg>
