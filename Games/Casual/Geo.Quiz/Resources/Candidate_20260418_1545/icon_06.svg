<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 국기 카드 레이어드 (뒤에서 앞으로) -->

    <!-- 맨 뒤 카드 (독일) -->
    <rect x="100" y="130" width="460" height="320" rx="24" fill="#1565C0" transform="rotate(-12 330 290)"/>
    <text x="330" y="260" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(-12 330 260)">🇩🇪</text>
    <text x="330" y="360" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle" transform="rotate(-12 330 360)">독일</text>

    <!-- 두 번째 카드 (브라질) -->
    <rect x="160" y="160" width="460" height="320" rx="24" fill="#2E7D32" transform="rotate(-5 390 320)"/>
    <text x="390" y="290" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(-5 390 290)">🇧🇷</text>
    <text x="390" y="390" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle" transform="rotate(-5 390 390)">브라질</text>

    <!-- 세 번째 카드 (일본) -->
    <rect x="240" y="140" width="460" height="320" rx="24" fill="#D32F2F" transform="rotate(5 470 300)"/>
    <text x="470" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(5 470 270)">🇯🇵</text>
    <text x="470" y="380" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle" transform="rotate(5 470 380)">일본</text>

    <!-- 앞 메인 카드 (프랑스) -->
    <rect x="340" y="120" width="540" height="380" rx="28" fill="#1A237E"/>
    <text x="610" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="170" text-anchor="middle">🇫🇷</text>
    <text x="610" y="440" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">프랑스</text>

    <!-- 수도 물음표 -->
    <rect x="340" y="530" width="540" height="100" rx="24" fill="#FF8F00"/>
    <text x="610" y="597" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">수도는? 🤔</text>

    <!-- 힌트 버튼 -->
    <rect x="80" y="660" width="240" height="72" rx="24" fill="#7B1FA2" opacity="0.85"/>
    <text x="200" y="704" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">💡 힌트</text>

    <!-- 정답 배지 -->
    <rect x="700" y="660" width="244" height="72" rx="24" fill="#388E3C"/>
    <text x="822" y="704" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">파리 ✓</text>

    <!-- 타이틀 -->
    <rect x="200" y="860" width="624" height="70" rx="24" fill="#0D47A1"/>
    <text x="512" y="907" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">GEO.QUIZ</text>
  </g>
</svg>
