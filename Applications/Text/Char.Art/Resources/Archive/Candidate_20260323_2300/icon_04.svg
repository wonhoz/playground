<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="190" fill="#059669"/>
  <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#clip)">
    <!-- Hand/arm silhouette typing -->
    <!-- Arm -->
    <path d="M200 900 Q280 820 350 780 L650 780 Q720 820 800 900 Z" fill="#1F2937"/>
    <!-- Palm -->
    <ellipse cx="512" cy="740" rx="180" ry="100" fill="#1F2937"/>
    <!-- Fingers -->
    <rect x="290" y="600" width="70" height="180" rx="35" fill="#1F2937"/>
    <rect x="380" y="560" width="70" height="200" rx="35" fill="#1F2937"/>
    <rect x="470" y="545" width="70" height="215" rx="35" fill="#1F2937"/>
    <rect x="560" y="555" width="70" height="205" rx="35" fill="#1F2937"/>
    <rect x="650" y="590" width="65" height="175" rx="32" fill="#1F2937"/>
    <!-- ASCII chars being typed around hand -->
    <text x="180" y="380" font-size="58" font-weight="bold" font-family="monospace" fill="#A7F3D0">@</text>
    <text x="320" y="300" font-size="52" font-weight="bold" font-family="monospace" fill="#A7F3D0">#</text>
    <text x="480" y="260" font-size="56" font-weight="bold" font-family="monospace" fill="#A7F3D0">$</text>
    <text x="640" y="290" font-size="50" font-weight="bold" font-family="monospace" fill="#A7F3D0">%</text>
    <text x="790" y="370" font-size="54" font-weight="bold" font-family="monospace" fill="#A7F3D0">&amp;</text>
    <text x="150" y="540" font-size="44" font-weight="bold" font-family="monospace" fill="#D1FAE5">*</text>
    <text x="810" y="520" font-size="46" font-weight="bold" font-family="monospace" fill="#D1FAE5">+</text>
    <text x="260" y="480" font-size="38" font-weight="bold" font-family="monospace" fill="#D1FAE5">=</text>
    <text x="730" y="460" font-size="40" font-weight="bold" font-family="monospace" fill="#D1FAE5">-</text>
    <!-- Motion lines -->
    <line x1="325" y1="595" x2="325" y2="530" stroke="#A7F3D0" stroke-width="6" stroke-dasharray="10,8" opacity="0.8"/>
    <line x1="415" y1="558" x2="415" y2="488" stroke="#A7F3D0" stroke-width="6" stroke-dasharray="10,8" opacity="0.8"/>
    <line x1="505" y1="543" x2="505" y2="473" stroke="#A7F3D0" stroke-width="6" stroke-dasharray="10,8" opacity="0.8"/>
    <line x1="595" y1="553" x2="595" y2="483" stroke="#A7F3D0" stroke-width="6" stroke-dasharray="10,8" opacity="0.8"/>
  </g>
</svg>
