<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#7C2D12"/>
  <!-- Layer 2: Typewriter body -->
  <!-- Main body -->
  <rect x="150" y="360" width="724" height="380" rx="24" fill="#FEF9C3"/>
  <!-- Typewriter top (platen area) -->
  <rect x="175" y="290" width="674" height="90" rx="14" fill="#E5E1B0"/>
  <!-- Platen roller -->
  <rect x="190" y="300" width="644" height="60" rx="24" fill="#D4C89A"/>
  <!-- Layer 2: Paper coming out -->
  <rect x="340" y="140" width="344" height="180" rx="6" fill="white" stroke="#D4C89A" stroke-width="3"/>
  <!-- ASCII art on paper -->
  <text x="356" y="188" font-family="Consolas,monospace" font-size="18" fill="#92400E">@##$$%%&amp;&amp;**</text>
  <text x="356" y="214" font-family="Consolas,monospace" font-size="18" fill="#92400E">++==--::;..  </text>
  <text x="356" y="240" font-family="Consolas,monospace" font-size="16" fill="#B45309" opacity="0.8">...:::---===</text>
  <text x="356" y="264" font-family="Consolas,monospace" font-size="14" fill="#D97706" opacity="0.6">   .   .   .  </text>
  <!-- Typewriter keys (row of circles) -->
  <circle cx="226" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="280" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="334" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="388" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="442" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="496" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="550" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="604" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="658" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="712" cy="540" r="22" fill="#D4C89A"/>
  <circle cx="766" cy="540" r="22" fill="#D4C89A"/>
  <!-- Key labels -->
  <text x="226" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">@</text>
  <text x="280" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">#</text>
  <text x="334" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">$</text>
  <text x="388" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">%</text>
  <text x="442" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">&amp;</text>
  <text x="496" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">*</text>
  <text x="550" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">+</text>
  <text x="604" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">=</text>
  <text x="658" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">-</text>
  <text x="712" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">:</text>
  <text x="766" y="547" font-family="Consolas,monospace" font-size="16" fill="#7C2D12" text-anchor="middle">.</text>
  <!-- Space bar -->
  <rect x="250" y="602" width="520" height="36" rx="12" fill="#D4C89A"/>
  <!-- Layer 3: Typewriter base shadow -->
  <rect x="175" y="722" width="674" height="18" rx="8" fill="#92400E" opacity="0.5"/>
</svg>