  <circle cx="512" cy="512" r="148" fill="#121828"/>
  <circle cx="512" cy="512" r="136" fill="#161E30" stroke="#2A3860" stroke-width="3"/>

  <!-- 중앙 픽셀 아트 — 모래+물 상호작용 장면 (미니어처) -->
