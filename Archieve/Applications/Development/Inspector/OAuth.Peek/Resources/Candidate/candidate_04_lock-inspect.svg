<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100a20"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aa66ff"/>
      <stop offset="100%" stop-color="#6622cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lock body -->
  <rect x="156" y="240" width="200" height="160" rx="20" fill="url(#lock)"/>
  <!-- Lock shackle -->
  <path d="M196,240 L196,180 Q196,130 256,130 Q316,130 316,180 L316,240" fill="none" stroke="#aa66ff" stroke-width="22" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="256" cy="310" r="24" fill="#1a0040"/>
  <rect x="248" y="310" width="16" height="30" rx="4" fill="#1a0040"/>
  <!-- Magnifier overlay -->
  <circle cx="340" cy="200" r="65" fill="none" stroke="#ffff44" stroke-width="4" opacity="0.9"/>
  <circle cx="340" cy="200" r="55" fill="#1a1030" opacity="0.7"/>
  <line x1="390" y1="250" x2="435" y2="295" stroke="#ffff44" stroke-width="8" stroke-linecap="round"/>
  <!-- Inspect content inside lens -->
  <text x="340" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#aa66ff">scope:</text>
  <text x="340" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#cc88ff">read write</text>
  <text x="340" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#44ff88">exp: OK</text>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#aa66ff">OAUTH.PEEK</text>
</svg>
