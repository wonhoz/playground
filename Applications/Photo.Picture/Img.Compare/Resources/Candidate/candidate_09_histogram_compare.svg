<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a0a"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00b4db"/>
      <stop offset="100%" stop-color="#0083b0"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Photo thumbnails at top -->
  <rect x="60" y="60" width="170" height="120" rx="8" fill="#1a2a3a"/>
  <rect x="282" y="60" width="170" height="120" rx="8" fill="#3a2a1a"/>
  <!-- Simple photo contents -->
  <circle cx="145" cy="100" r="25" fill="#00b4db" opacity="0.6"/>
  <rect x="70" y="140" width="150" height="30" rx="4" fill="#0083b0" opacity="0.4"/>
  <circle cx="367" cy="100" r="25" fill="#f7971e" opacity="0.6"/>
  <rect x="292" y="140" width="150" height="30" rx="4" fill="#ffd200" opacity="0.4"/>
  <!-- Arrow between thumbnails -->
  <text x="256" y="132" text-anchor="middle" font-family="Arial" font-size="28" fill="white" opacity="0.5">⇄</text>
  <!-- Histogram area -->
  <rect x="50" y="210" width="412" height="200" rx="8" fill="#111111" opacity="0.6"/>
  <!-- X axis -->
  <line x1="70" y1="398" x2="442" y2="398" stroke="#444" stroke-width="2"/>
  <!-- Y axis -->
  <line x1="70" y1="398" x2="70" y2="218" stroke="#444" stroke-width="2"/>
  <!-- Before bars (blue) -->
  <rect x="85" y="350" width="18" height="48" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="110" y="310" width="18" height="88" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="135" y="280" width="18" height="118" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="160" y="258" width="18" height="140" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="185" y="270" width="18" height="128" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="210" y="300" width="18" height="98" rx="3" fill="url(#barB)" opacity="0.8"/>
  <rect x="235" y="340" width="18" height="58" rx="3" fill="url(#barB)" opacity="0.8"/>
  <!-- After bars (orange) - overlaid -->
  <rect x="93" y="330" width="18" height="68" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="118" y="285" width="18" height="113" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="143" y="260" width="18" height="138" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="168" y="240" width="18" height="158" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="193" y="255" width="18" height="143" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="218" y="288" width="18" height="110" rx="3" fill="url(#barA)" opacity="0.7"/>
  <rect x="243" y="320" width="18" height="78" rx="3" fill="url(#barA)" opacity="0.7"/>
  <!-- Legend -->
  <rect x="290" y="298" width="18" height="18" rx="3" fill="url(#barB)"/>
  <text x="316" y="312" font-family="Arial" font-size="16" fill="#00b4db">Before</text>
  <rect x="290" y="328" width="18" height="18" rx="3" fill="url(#barA)"/>
  <text x="316" y="342" font-family="Arial" font-size="16" fill="#ffd200">After</text>
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white" opacity="0.7">HISTOGRAM COMPARE</text>
</svg>
