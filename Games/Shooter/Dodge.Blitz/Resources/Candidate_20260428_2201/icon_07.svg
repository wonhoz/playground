<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E2BFF"/>
      <stop offset="1" stop-color="#040A4D"/>
    </linearGradient>
    <linearGradient id="bolt07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE74A"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="190" fill="url(#bg07)"/>
  <!-- speed lines -->
  <g stroke="#74C8FF" stroke-width="10" stroke-linecap="round" opacity="0.7">
    <line x1="160" y1="180" x2="280" y2="220"/>
    <line x1="140" y1="320" x2="240" y2="340"/>
    <line x1="780" y1="700" x2="900" y2="740"/>
    <line x1="780" y1="820" x2="880" y2="840"/>
  </g>
  <!-- lightning bolt -->
  <polygon points="600,160 360,560 520,560 420,860 720,420 540,420 660,160"
           fill="url(#bolt07)" stroke="#FF9D00" stroke-width="14" stroke-linejoin="round"/>
  <!-- diamond core -->
  <polygon points="540,500 620,580 540,660 460,580" fill="#0FFFD0" stroke="#FFFFFF" stroke-width="8"/>
</svg>
