<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050e08"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- PCB background grid -->
  <g stroke="#10B981" stroke-width="0.5" stroke-opacity="0.08">
    <line x1="0" y1="60" x2="512" y2="60"/><line x1="0" y1="120" x2="512" y2="120"/>
    <line x1="0" y1="180" x2="512" y2="180"/><line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="300" x2="512" y2="300"/><line x1="0" y1="360" x2="512" y2="360"/>
    <line x1="0" y1="420" x2="512" y2="420"/>
    <line x1="60" y1="0" x2="60" y2="512"/><line x1="120" y1="0" x2="120" y2="512"/>
    <line x1="180" y1="0" x2="180" y2="512"/><line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/><line x1="360" y1="0" x2="360" y2="512"/>
    <line x1="420" y1="0" x2="420" y2="512"/>
  </g>

  <!-- Circuit traces (hash algorithm paths) -->
  <g stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main data bus -->
    <polyline points="40,256 120,256 120,180 200,180 200,120 300,120 300,180 380,180 380,256 460,256" filter="url(#softglow)" stroke-opacity="0.8"/>
    <!-- Sub-paths -->
    <polyline points="120,256 120,300 180,300 180,360 260,360" stroke-opacity="0.6"/>
    <polyline points="380,256 380,300 320,300 320,360 260,360" stroke-opacity="0.6"/>
    <polyline points="200,180 200,240 260,240 260,300" stroke-opacity="0.5"/>
    <polyline points="300,180 300,240 260,240" stroke-opacity="0.5"/>
    <polyline points="260,360 260,420 180,420 180,460" stroke-opacity="0.55"/>
    <polyline points="260,420 340,420 340,460" stroke-opacity="0.55"/>
    <!-- Upper branches -->
    <polyline points="200,120 200,80 260,80 260,40" stroke-opacity="0.45"/>
    <polyline points="300,120 300,80 260,80" stroke-opacity="0.45"/>
  </g>

  <!-- Solder pads / nodes -->
  <g fill="#10B981" filter="url(#softglow)">
    <circle cx="120" cy="256" r="6"/>
    <circle cx="380" cy="256" r="6"/>
    <circle cx="200" cy="180" r="6"/>
    <circle cx="300" cy="180" r="6"/>
    <circle cx="200" cy="120" r="6"/>
    <circle cx="300" cy="120" r="6"/>
    <circle cx="120" cy="300" r="5"/>
    <circle cx="380" cy="300" r="5"/>
    <circle cx="180" cy="360" r="5"/>
    <circle cx="340" cy="360" r="5"/>
    <circle cx="260" cy="240" r="6"/>
    <circle cx="260" cy="360" r="6"/>
    <circle cx="260" cy="80" r="5"/>
  </g>

  <!-- Hash processor chip (center) -->
  <rect x="196" y="196" width="120" height="120" rx="8" fill="#061a0c" stroke="#10B981" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="206" y="206" width="100" height="100" rx="5" fill="#071e0f" stroke="#34D399" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Chip pins (left) -->
  <g stroke="#10B981" stroke-width="2" stroke-opacity="0.7">
    <line x1="174" y1="216" x2="196" y2="216"/>
    <line x1="174" y1="236" x2="196" y2="236"/>
    <line x1="174" y1="256" x2="196" y2="256"/>
    <line x1="174" y1="276" x2="196" y2="276"/>
    <line x1="174" y1="296" x2="196" y2="296"/>
    <!-- Right pins -->
    <line x1="316" y1="216" x2="338" y2="216"/>
    <line x1="316" y1="236" x2="338" y2="236"/>
    <line x1="316" y1="256" x2="338" y2="256"/>
    <line x1="316" y1="276" x2="338" y2="276"/>
    <line x1="316" y1="296" x2="338" y2="296"/>
    <!-- Top pins -->
    <line x1="226" y1="174" x2="226" y2="196"/>
    <line x1="246" y1="174" x2="246" y2="196"/>
    <line x1="266" y1="174" x2="266" y2="196"/>
    <line x1="286" y1="174" x2="286" y2="196"/>
    <!-- Bottom pins -->
    <line x1="226" y1="316" x2="226" y2="338"/>
    <line x1="246" y1="316" x2="246" y2="338"/>
    <line x1="266" y1="316" x2="266" y2="338"/>
    <line x1="286" y1="316" x2="286" y2="338"/>
  </g>

  <!-- Chip interior: checksum verify symbol -->
  <circle cx="256" cy="256" r="35" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Large checkmark -->
  <path d="M236,256 L250,270 L278,238" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M236,256 L250,270 L278,238" fill="none" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Input/Output ports -->
  <circle cx="40" cy="256" r="8" fill="#34D399" filter="url(#glow)"/>
  <circle cx="460" cy="256" r="8" fill="#10B981" filter="url(#glow)"/>
  <!-- Output checkmark -->
  <path d="M453,256 L459,262 L469,248" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
