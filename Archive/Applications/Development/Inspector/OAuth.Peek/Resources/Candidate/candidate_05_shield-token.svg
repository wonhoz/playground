<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001a10"/>
      <stop offset="100%" stop-color="#003020"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256,80 L380,125 L380,250 Q380,340 256,400 Q132,340 132,250 L132,125 Z" fill="url(#shield)" opacity="0.9"/>
  <!-- OAuth text on shield -->
  <text x="256" y="195" text-anchor="middle" font-family="Arial Black" font-size="38" font-weight="900" fill="#ffffff">OAuth</text>
  <text x="256" y="238" text-anchor="middle" font-family="monospace" font-size="14" fill="#aaffcc">2.0</text>
  <!-- Token line -->
  <rect x="166" y="258" width="180" height="24" rx="6" fill="#001a10" stroke="#44ff88" stroke-width="1.5"/>
  <text x="256" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#44ff88">Bearer eyJ...</text>
  <!-- Checkmark -->
  <polyline points="200,310 240,345 315,280" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#00cc66">OAUTH.PEEK</text>
</svg>
