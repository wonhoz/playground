<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A0F"/>
  <!-- Window (target) -->
  <rect x="200" y="200" width="500" height="380" rx="20" fill="#0D47A1" opacity="0.55"/>
  <rect x="200" y="200" width="500" height="46" rx="14" fill="#0D47A1" opacity="0.85"/>
  <circle cx="228" cy="223" r="10" fill="#42A5F5" opacity="0.7"/>
  <circle cx="256" cy="223" r="10" fill="#42A5F5" opacity="0.5"/>
  <!-- Window content -->
  <rect x="220" y="272" width="280" height="20" rx="6" fill="#42A5F5" opacity="0.25"/>
  <rect x="220" y="308" width="200" height="20" rx="6" fill="#42A5F5" opacity="0.2"/>
  <rect x="220" y="344" width="340" height="20" rx="6" fill="#42A5F5" opacity="0.2"/>
  <!-- Injection point circle on window -->
  <circle cx="450" cy="440" r="60" fill="#42A5F5" opacity="0.2" stroke="#42A5F5" stroke-width="14"/>
  <!-- Syringe barrel -->
  <rect x="680" y="400" width="120" height="50" rx="10" fill="#0D47A1" opacity="0.85" stroke="#42A5F5" stroke-width="8"/>
  <!-- Syringe plunger -->
  <rect x="790" y="390" width="30" height="70" rx="6" fill="#42A5F5" opacity="0.6"/>
  <!-- Syringe needle -->
  <rect x="610" y="418" width="80" height="14" rx="7" fill="#42A5F5" opacity="0.9"/>
  <!-- Needle tip pointing at window -->
  <polygon points="610,418 560,424 610,432" fill="#42A5F5" opacity="0.9"/>
  <!-- Injection liquid in barrel -->
  <rect x="688" y="410" width="80" height="30" rx="6" fill="#42A5F5" opacity="0.35"/>
  <!-- Measurement marks on barrel -->
  <line x1="710" y1="402" x2="710" y2="408" stroke="#42A5F5" stroke-width="6" opacity="0.6"/>
  <line x1="730" y1="402" x2="730" y2="408" stroke="#42A5F5" stroke-width="6" opacity="0.6"/>
  <line x1="750" y1="402" x2="750" y2="408" stroke="#42A5F5" stroke-width="6" opacity="0.6"/>
  <!-- Inject path line -->
  <line x1="560" y1="425" x2="510" y2="435" stroke="#42A5F5" stroke-width="8" stroke-dasharray="12,8" opacity="0.5"/>
</svg>
