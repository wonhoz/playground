<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="warpBlur">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 원래 도형 (왼쪽) -->
  <g transform="translate(0,0)">
    <text x="64" y="78" font-size="11" fill="#888" opacity="0.6">Original</text>
    <rect x="60" y="88" width="160" height="160" rx="8" fill="none" stroke="#5a1a8a" stroke-width="1" opacity="0.5"/>
    <!-- 격자 -->
    <g stroke="#3a0a5a" stroke-width="0.8" opacity="0.4">
      <line x1="60" y1="128" x2="220" y2="128"/>
      <line x1="60" y1="168" x2="220" y2="168"/>
      <line x1="60" y1="208" x2="220" y2="208"/>
      <line x1="100" y1="88" x2="100" y2="248"/>
      <line x1="140" y1="88" x2="140" y2="248"/>
      <line x1="180" y1="88" x2="180" y2="248"/>
    </g>
    <rect x="80" y="108" width="120" height="120" rx="4" fill="#C084FC" opacity="0.2" stroke="#C084FC" stroke-width="2"/>
    <text x="140" y="175" text-anchor="middle" font-size="24" font-weight="bold" fill="#C084FC" opacity="0.7">S</text>
  </g>
  <!-- 왜곡된 도형 (오른쪽) -->
  <g transform="translate(232,0)">
    <text x="64" y="78" font-size="11" fill="#C084FC" opacity="0.8">Warped</text>
    <rect x="60" y="88" width="160" height="160" rx="8" fill="none" stroke="#5a1a8a" stroke-width="1" opacity="0.5"/>
    <!-- 왜곡된 격자 -->
    <path d="M60,128 Q100,118 140,130 Q180,142 220,128" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <path d="M60,168 Q100,155 140,172 Q180,188 220,168" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <path d="M60,208 Q100,198 140,212 Q180,225 220,208" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <path d="M100,88 Q95,128 102,168 Q108,208 100,248" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <path d="M140,88 Q148,128 138,168 Q128,208 140,248" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <path d="M180,88 Q185,128 178,168 Q172,208 180,248" fill="none" stroke="#3a0a5a" stroke-width="0.8" opacity="0.5"/>
    <!-- 왜곡된 도형 -->
    <path d="M80,108 Q130,100 160,108 Q172,140 168,180 Q155,228 120,228 Q82,230 80,198 Q78,165 80,108 Z" fill="#C084FC" opacity="0.2" stroke="#C084FC" stroke-width="2" filter="url(#glow)"/>
    <text x="132" y="175" text-anchor="middle" font-size="24" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.85">S</text>
  </g>
  <!-- 변환 화살표 -->
  <path d="M224,168 L228,168" stroke="#C084FC" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <text x="228" y="162" text-anchor="middle" font-size="18" fill="#C084FC" filter="url(#glow)" opacity="0.9">→</text>
  <!-- 하단 왜곡 도구 패널 -->
  <rect x="60" y="290" width="392" height="160" rx="10" fill="#06040e" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">WARP TOOLS</text>
  <line x1="60" y1="322" x2="452" y2="322" stroke="#2a0a4a" stroke-width="1" opacity="0.5"/>
  <!-- 도구 버튼들 -->
  <rect x="80" y="334" width="78" height="50" rx="8" fill="#0d0820" stroke="#C084FC" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <text x="119" y="356" text-anchor="middle" font-size="18" fill="#C084FC" opacity="0.8">〜</text>
  <text x="119" y="374" text-anchor="middle" font-size="9" fill="#C084FC" opacity="0.8">Wave</text>
  <rect x="170" y="334" width="78" height="50" rx="8" fill="#0d0820" stroke="#A855F7" stroke-width="1" opacity="0.8"/>
  <text x="209" y="356" text-anchor="middle" font-size="18" fill="#A855F7" opacity="0.7">⊙</text>
  <text x="209" y="374" text-anchor="middle" font-size="9" fill="#A855F7" opacity="0.8">Bulge</text>
  <rect x="260" y="334" width="78" height="50" rx="8" fill="#0d0820" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
  <text x="299" y="356" text-anchor="middle" font-size="18" fill="#7C3AED" opacity="0.7">⊕</text>
  <text x="299" y="374" text-anchor="middle" font-size="9" fill="#7C3AED" opacity="0.8">Pinch</text>
  <rect x="350" y="334" width="78" height="50" rx="8" fill="#0d0820" stroke="#A855F7" stroke-width="1" opacity="0.8"/>
  <text x="389" y="356" text-anchor="middle" font-size="18" fill="#A855F7" opacity="0.7">◈</text>
  <text x="389" y="374" text-anchor="middle" font-size="9" fill="#A855F7" opacity="0.8">Twist</text>
  <!-- 슬라이더 -->
  <text x="80" y="405" font-size="10" fill="#888" opacity="0.7">Intensity</text>
  <rect x="80" y="412" width="312" height="8" rx="3" fill="#1a0a2a" opacity="0.7"/>
  <rect x="80" y="412" width="185" height="8" rx="3" fill="#C084FC" filter="url(#glow)" opacity="0.8"/>
  <circle cx="265" cy="416" r="8" fill="#C084FC" filter="url(#glow)" opacity="0.9"/>
  <text x="400" y="422" font-size="10" fill="#C084FC" opacity="0.8">59%</text>
  <!-- 하단 라벨 -->
  <rect x="130" y="463" width="252" height="36" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="486" text-anchor="middle" font-size="13" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">WARP &amp; DISTORT</text>
</svg>
