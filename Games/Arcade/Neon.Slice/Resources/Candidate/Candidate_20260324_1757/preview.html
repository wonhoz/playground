<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neon.Slice — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020208; font-family: 'Segoe UI', sans-serif; color: #E0F2FE; padding: 40px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; color: #22D3EE; letter-spacing: 4px; text-shadow: 0 0 20px #22D3EE; }
  .subtitle { text-align: center; font-size: 0.95rem; color: #0EA5E9; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
  .card { background: #040410; border: 2px solid #1E40AF; border-radius: 20px; padding: 24px; width: 260px; text-align: center; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; cursor: pointer; }
  .card:hover { transform: scale(1.08); border-color: #22D3EE; box-shadow: 0 0 24px #22D3EE44; }
  .card img { width: 200px; height: 200px; border-radius: 12px; display: block; margin: 0 auto 16px; }
  .icon-name { font-size: 1.1rem; font-weight: 700; color: #67E8F9; margin-bottom: 6px; }
  .concept { font-size: 0.82rem; color: #06B6D4; margin-bottom: 6px; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #0C4A6E; }
  .tag { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; margin: 2px; }
  .literal { background: #1E3A5F; color: #93C5FD; }
  .metaphor { background: #3B1F00; color: #FDE68A; }
  .hybrid { background: #1A2B1A; color: #86EFAC; }
</style>
</head>
<body>
<h1>⚡ NEON.SLICE ⚡</h1>
<p class="subtitle">네온 도형 슬라이스 아케이드 게임 — 아이콘 후보 5종</p>
<div class="grid">
  <div class="card">
    <img src="icon_01.svg" alt="icon_01">
    <div class="icon-name">icon_01.svg</div>
    <div class="concept">네온 도형 + 슬라이스 궤적</div>
    <span class="tag literal">literal</span><span class="tag">대각선/동적</span>
    <div class="palette">
      <div class="swatch" style="background:#080812"></div>
      <div class="swatch" style="background:#22D3EE"></div>
      <div class="swatch" style="background:#F472B6"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_02.svg" alt="icon_02">
    <div class="icon-name">icon_02.svg</div>
    <div class="concept">X 슬래시 폭발 파티클</div>
    <span class="tag literal">literal</span><span class="tag">중앙심볼</span>
    <div class="palette">
      <div class="swatch" style="background:#030712"></div>
      <div class="swatch" style="background:#4ADE80"></div>
      <div class="swatch" style="background:#FCD34D"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_03.svg" alt="icon_03">
    <div class="icon-name">icon_03.svg</div>
    <div class="concept">번개로 도형 분할</div>
    <span class="tag metaphor">metaphor</span><span class="tag">기하학추상</span>
    <div class="palette">
      <div class="swatch" style="background:#3B0764"></div>
      <div class="swatch" style="background:#FDE047"></div>
      <div class="swatch" style="background:#A855F7"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_04.svg" alt="icon_04">
    <div class="icon-name">icon_04.svg</div>
    <div class="concept">사이버 아케이드 스코어보드</div>
    <span class="tag metaphor">metaphor</span><span class="tag">공간/장면</span>
    <div class="palette">
      <div class="swatch" style="background:#0C4A6E"></div>
      <div class="swatch" style="background:#F472B6"></div>
      <div class="swatch" style="background:#FFFFFF"></div>
    </div>
  </div>
  <div class="card">
    <img src="icon_05.svg" alt="icon_05">
    <div class="icon-name">icon_05.svg</div>
    <div class="concept">콤보 ×7 슬라이스 효과</div>
    <span class="tag hybrid">hybrid</span><span class="tag">레이어드</span>
    <div class="palette">
      <div class="swatch" style="background:#BE185D"></div>
      <div class="swatch" style="background:#22D3EE"></div>
      <div class="swatch" style="background:#FDE047"></div>
    </div>
  </div>
</div>
</body>
</html>
