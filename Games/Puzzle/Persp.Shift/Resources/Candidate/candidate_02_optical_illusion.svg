<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Necker cube optical illusion -->
  <!-- Front face -->
  <rect x="156" y="176" width="140" height="140" fill="none" stroke="#a78bfa" stroke-width="3"/>
  <!-- Back face -->
  <rect x="216" y="196" width="140" height="140" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <!-- Connecting edges -->
  <line x1="156" y1="176" x2="216" y2="196" stroke="#c4b5fd" stroke-width="2"/>
  <line x1="296" y1="176" x2="356" y2="196" stroke="#c4b5fd" stroke-width="2"/>
  <line x1="156" y1="316" x2="216" y2="336" stroke="#c4b5fd" stroke-width="2"/>
  <line x1="296" y1="316" x2="356" y2="336" stroke="#c4b5fd" stroke-width="2"/>
  <!-- Question mark for ambiguity -->
  <text x="256" y="270" text-anchor="middle" font-family="Arial" font-size="60" fill="#7c3aed" opacity="0.4">?</text>
  <!-- Eye symbol -->
  <ellipse cx="256" cy="410" rx="50" ry="25" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="256" cy="410" r="12" fill="#7c3aed"/>
  <circle cx="261" cy="406" r="4" fill="#c4b5fd"/>
</svg>
