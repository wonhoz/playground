<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050520"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <linearGradient id="lockBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A6A"/>
      <stop offset="100%" stop-color="#0E2244"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0088FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer lock shackle (arc) -->
  <path d="M 166,230 L 166,170 Q 166,100 256,100 Q 346,100 346,170 L 346,230" stroke="url(#neon)" stroke-width="22" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 166,230 L 166,170 Q 166,100 256,100 Q 346,100 346,170 L 346,230" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Lock body -->
  <rect x="130" y="230" width="252" height="200" rx="20" fill="url(#lockBody)" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <!-- Lock body highlight -->
  <rect x="130" y="230" width="252" height="36" rx="20" fill="#1A3A6A" opacity="0.5"/>
  <!-- Keyhole -->
  <circle cx="256" cy="316" r="28" fill="#050520" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <rect x="244" y="316" width="24" height="40" rx="12" fill="#050520" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="256" cy="316" r="12" fill="url(#neon)" filter="url(#glow)" opacity="0.9"/>
  <!-- Guard status light -->
  <circle cx="256" cy="420" r="10" fill="#00FF88" filter="url(#glow)"/>
  <text x="256" y="452" font-family="'Segoe UI', sans-serif" font-size="14" fill="#00CCFF" text-anchor="middle" letter-spacing="2" filter="url(#glow)">PROTECTED</text>
  <!-- Decorative circuit lines -->
  <line x1="130" y1="316" x2="90" y2="316" stroke="#00FFFF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="90" y1="316" x2="90" y2="360" stroke="#00FFFF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="382" y1="316" x2="422" y2="316" stroke="#00FFFF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="422" y1="316" x2="422" y2="360" stroke="#00FFFF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <circle cx="90" cy="360" r="4" fill="#00FFFF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="422" cy="360" r="4" fill="#00FFFF" opacity="0.6" filter="url(#glow)"/>
  <!-- Corner decorations -->
  <path d="M 80,80 L 80,60 L 100,60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 432,80 L 432,60 L 412,60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.35"/>
</svg>
