<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg14" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </radialGradient>
    <linearGradient id="key14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>
  <!-- 열쇠 (황금) -->
  <g transform="translate(380,420)">
    <!-- 열쇠 고리 -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#key14)" stroke-width="70"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#key14)" stroke-width="50"/>
    <!-- 열쇠 손잡이 채움 -->
    <circle cx="0" cy="0" r="120" fill="#B45309" opacity="0.3"/>
    <!-- 열쇠 자루 -->
    <rect x="140" y="-35" width="360" height="70" rx="35" fill="url(#key14)"/>
    <!-- 열쇠 이빨들 -->
    <rect x="340" y="35" width="50" height="70" rx="12" fill="url(#key14)"/>
    <rect x="430" y="35" width="50" height="50" rx="12" fill="url(#key14)"/>
    <rect x="470" y="35" width="30" height="80" rx="10" fill="url(#key14)"/>
    <!-- 열쇠 구멍 (원 안) -->
    <circle cx="0" cy="0" r="40" fill="#B45309"/>
  </g>
  <!-- AI 신경망 점 네트워크 (오른쪽) -->
  <g transform="translate(580,520)">
    <!-- 신경망 연결선들 -->
    <line x1="60" y1="-160" x2="180" y2="-80" stroke="white" stroke-width="6" opacity="0.4"/>
    <line x1="60" y1="-160" x2="200" y2="0" stroke="white" stroke-width="5" opacity="0.35"/>
    <line x1="60" y1="-160" x2="180" y2="80" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="80" y1="0" x2="200" y2="-80" stroke="white" stroke-width="6" opacity="0.4"/>
    <line x1="80" y1="0" x2="200" y2="0" stroke="white" stroke-width="7" opacity="0.5"/>
    <line x1="80" y1="0" x2="200" y2="80" stroke="white" stroke-width="5" opacity="0.4"/>
    <line x1="60" y1="160" x2="180" y2="80" stroke="white" stroke-width="6" opacity="0.4"/>
    <line x1="60" y1="160" x2="200" y2="0" stroke="white" stroke-width="5" opacity="0.35"/>
    <!-- 출력 노드 연결 -->
    <line x1="200" y1="-80" x2="310" y2="0" stroke="white" stroke-width="6" opacity="0.45"/>
    <line x1="200" y1="0" x2="310" y2="0" stroke="white" stroke-width="8" opacity="0.55"/>
    <line x1="200" y1="80" x2="310" y2="0" stroke="white" stroke-width="6" opacity="0.45"/>
    <!-- 입력 노드들 -->
    <circle cx="60" cy="-160" r="22" fill="white" opacity="0.9"/>
    <circle cx="80" cy="0" r="26" fill="white"/>
    <circle cx="60" cy="160" r="22" fill="white" opacity="0.9"/>
    <!-- 은닉층 노드들 -->
    <circle cx="200" cy="-80" r="22" fill="white" opacity="0.8"/>
    <circle cx="200" cy="0" r="28" fill="#FDE68A"/>
    <circle cx="200" cy="80" r="22" fill="white" opacity="0.8"/>
    <!-- 출력 노드 (황금) -->
    <circle cx="310" cy="0" r="34" fill="#F59E0B"/>
    <circle cx="310" cy="0" r="22" fill="#FDE68A"/>
  </g>
  <!-- 열쇠와 네트워크 연결 화살표 -->
  <path d="M690,420 Q710,420 730,440" stroke="#FDE68A" stroke-width="12" stroke-dasharray="18,12" fill="none" stroke-linecap="round"/>
</svg>
