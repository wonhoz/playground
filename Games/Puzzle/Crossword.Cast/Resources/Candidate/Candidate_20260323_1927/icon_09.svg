  <text x="749" y="420" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#7C3AED">I</text>

  <!-- 행 2: D O G -->
  <rect x="210" y="450" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="330" y="450" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
