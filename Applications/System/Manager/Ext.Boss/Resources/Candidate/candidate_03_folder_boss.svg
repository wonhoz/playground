<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#654ea3"/>
      <stop offset="100%" style="stop-color:#eaafc8"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd080"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Big folder -->
  <path d="M60 200 L60 420 C60 434 72 446 86 446 L426 446 C440 446 452 434 452 420 L452 200 Z" fill="url(#folder)" opacity="0.9"/>
  <path d="M60 200 L60 180 C60 166 72 154 86 154 L200 154 L230 200 L452 200 C452 200 452 200 452 200 L60 200 Z" fill="url(#folder)"/>
  <!-- Boss crown on folder -->
  <polygon points="200,130 200,80 246,100 256,60 266,100 312,80 312,130" fill="#1a1a2e" opacity="0.9"/>
  <rect x="200" y="130" width="112" height="30" rx="5" fill="#1a1a2e" opacity="0.9"/>
  <!-- Ext list inside folder -->
  <rect x="90" y="230" width="80" height="36" rx="8" fill="white" opacity="0.9"/>
  <text x="130" y="253" font-family="monospace" font-size="14" text-anchor="middle" fill="#1a1a2e" font-weight="bold">.MP3</text>
  <rect x="185" y="230" width="80" height="36" rx="8" fill="white" opacity="0.9"/>
  <text x="225" y="253" font-family="monospace" font-size="14" text-anchor="middle" fill="#1a1a2e" font-weight="bold">.AVI</text>
  <rect x="280" y="230" width="80" height="36" rx="8" fill="white" opacity="0.9"/>
  <text x="320" y="253" font-family="monospace" font-size="14" text-anchor="middle" fill="#1a1a2e" font-weight="bold">.JPG</text>
  <rect x="375" y="230" width="64" height="36" rx="8" fill="white" opacity="0.9"/>
  <text x="407" y="253" font-family="monospace" font-size="14" text-anchor="middle" fill="#1a1a2e" font-weight="bold">.TXT</text>
  <!-- Arrow to program -->
  <rect x="90" y="300" width="330" height="60" rx="12" fill="white" opacity="0.2" stroke="white" stroke-width="2"/>
  <text x="255" y="335" font-family="monospace" font-size="16" text-anchor="middle" fill="white" font-weight="bold">→ Default Program</text>
</svg>
