<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2A1A1A"/>
      <stop offset="100%" stop-color="#120808"/>
    </radialGradient>
    <radialGradient id="glow05" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F38BA8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F38BA8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Dark warm background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <g clip-path="url(#frame05)">
    <!-- Layer 2: Fully completed grid — all Coral Red (victory state!) -->
    <!-- 8x8 grid, cell=100px, gap=5px, total=8*100+7*5=835, start x=95, y=90 -->
    <!-- All cells filled with #F38BA8 (Red/Coral) -->
    <!-- Row 0-7: all red -->
    <rect x="95" y="90" width="835" height="835" rx="8" fill="#F38BA8"/>
    <!-- Grid lines overlay to show individual cells -->
    <line x1="200" y1="90" x2="200" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="305" y1="90" x2="305" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="410" y1="90" x2="410" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="515" y1="90" x2="515" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="620" y1="90" x2="620" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="725" y1="90" x2="725" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="830" y1="90" x2="830" y2="925" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="195" x2="930" y2="195" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="300" x2="930" y2="300" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="405" x2="930" y2="405" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="510" x2="930" y2="510" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="615" x2="930" y2="615" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="720" x2="930" y2="720" stroke="#E07080" stroke-width="3"/>
    <line x1="95" y1="825" x2="930" y2="825" stroke="#E07080" stroke-width="3"/>

    <!-- Glow radiating from center -->
    <circle cx="512" cy="512" r="400" fill="url(#glow05)"/>

    <!-- Layer 3: Victory overlay banner -->
    <!-- Semi-transparent dark overlay -->
    <rect x="95" y="330" width="835" height="365" rx="0" fill="#1E0A0A" opacity="0.82"/>

    <!-- "승리!" text -->
    <text x="512" y="480" font-family="'Segoe UI',Arial" font-size="120" font-weight="900" fill="#F38BA8" text-anchor="middle">승리!</text>

    <!-- Move count result -->
    <text x="512" y="570" font-family="'Segoe UI',Arial" font-size="56" font-weight="700" fill="#FAB387" text-anchor="middle">7회 만에 완성!</text>

    <!-- New best indicator -->
    <rect x="282" y="610" width="460" height="60" rx="16" fill="#3A1A20"/>
    <rect x="282" y="610" width="460" height="60" rx="16" fill="none" stroke="#F38BA8" stroke-width="3"/>
    <text x="512" y="651" font-family="'Segoe UI',Arial" font-size="36" font-weight="700" fill="#F38BA8" text-anchor="middle">🏆 NEW BEST!</text>

    <!-- Color chips at bottom (showing what was used) -->
    <text x="512" y="745" font-family="'Segoe UI',Arial" font-size="30" fill="#585B70" text-anchor="middle">최종 색상 선택 순서</text>
    <circle cx="330" cy="795" r="30" fill="#A6E3A1"/>
    <circle cx="390" cy="795" r="30" fill="#89DCEB"/>
    <circle cx="450" cy="795" r="30" fill="#89B4FA"/>
    <circle cx="512" cy="795" r="30" fill="#CBA6F7"/>
    <circle cx="574" cy="795" r="30" fill="#FAB387"/>
    <circle cx="634" cy="795" r="38" fill="#F38BA8"/>
    <circle cx="634" cy="795" r="38" fill="none" stroke="white" stroke-width="5"/>
    <text x="634" y="808" font-family="'Segoe UI',Arial" font-size="26" font-weight="900" fill="white" text-anchor="middle">✓</text>

    <!-- Move counter display (bottom area, outside the grid) -- actually the grid covers 90-925 so just show at very bottom -->
  </g>
</svg>
