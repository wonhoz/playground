<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: Literal / 공간·장면 / 우주 전장 파노라마 / 보라-마젠타 -->
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E0018"/>
      <stop offset="50%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#0A0012"/>
    </linearGradient>
    <radialGradient id="nebula03" cx="60%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B00FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B00FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula03b" cx="30%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#FF00AA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow03">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="160" fill="url(#bg03)"/>
  <rect width="1024" height="1024" rx="160" fill="url(#nebula03)"/>
  <rect width="1024" height="1024" rx="160" fill="url(#nebula03b)"/>

  <!-- 별들 -->
