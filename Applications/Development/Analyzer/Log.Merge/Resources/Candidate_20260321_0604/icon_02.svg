    <line x1="270" y1="416" x2="270" y2="464" stroke="#3A4460" stroke-width="36" stroke-linecap="round"/>
    <line x1="270" y1="516" x2="270" y2="564" stroke="#3A4460" stroke-width="36" stroke-linecap="round"/>
    <line x1="270" y1="616" x2="270" y2="664" stroke="#3A4460" stroke-width="36" stroke-linecap="round"/>
