<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff176"/>
    </radialGradient>
    <linearGradient id="road3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lightGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="90" cy="80" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="150" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="90" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="310" cy="70" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="380" cy="55" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="430" cy="85" r="1.5" fill="#ffffff" opacity="0.7"/>
