<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — warm golden yellow -->
  <rect width="1024" height="1024" rx="190" fill="#F9CA24"/>

  <!-- Layer 2: Cute vault/safe door -->
  <!-- Main vault body -->
  <rect x="152" y="180" width="720" height="640" rx="50" fill="#2C3E50" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Vault door face -->
  <rect x="200" y="228" width="624" height="544" rx="36" fill="#34495E" stroke="#F9CA24" stroke-width="10"/>

  <!-- 4 bolt circles (corners) -->
  <circle cx="262" cy="290" r="36" fill="#E67E22" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="762" cy="290" r="36" fill="#E67E22" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="262" cy="710" r="36" fill="#E67E22" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="762" cy="710" r="36" fill="#E67E22" stroke="#FFFFFF" stroke-width="10"/>

  <!-- Main dial wheel -->
  <circle cx="512" cy="500" r="200" fill="#2C3E50" stroke="#F9CA24" stroke-width="18"/>
  <circle cx="512" cy="500" r="150" fill="#3D5166" stroke="#FFFFFF" stroke-width="10"/>

  <!-- Dial tick marks -->
  <line x1="512" y1="316" x2="512" y2="342" stroke="#F9CA24" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="658" x2="512" y2="684" stroke="#F9CA24" stroke-width="10" stroke-linecap="round"/>
  <line x1="328" y1="500" x2="354" y2="500" stroke="#F9CA24" stroke-width="10" stroke-linecap="round"/>
  <line x1="670" y1="500" x2="696" y2="500" stroke="#F9CA24" stroke-width="10" stroke-linecap="round"/>
  <line x1="642" y1="370" x2="622" y2="395" stroke="#F9CA24" stroke-width="8" stroke-linecap="round"/>
  <line x1="382" y1="370" x2="402" y2="395" stroke="#F9CA24" stroke-width="8" stroke-linecap="round"/>
  <line x1="642" y1="630" x2="622" y2="605" stroke="#F9CA24" stroke-width="8" stroke-linecap="round"/>
  <line x1="382" y1="630" x2="402" y2="605" stroke="#F9CA24" stroke-width="8" stroke-linecap="round"/>

  <!-- Pointer line -->
  <line x1="512" y1="500" x2="612" y2="415" stroke="#F9CA24" stroke-width="12" stroke-linecap="round"/>
  <circle cx="512" cy="500" r="18" fill="#F9CA24"/>

  <!-- Layer 3: HKEY text center of dial -->
  <text x="512" y="486" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="56" font-weight="900" fill="#F9CA24">HKEY</text>
  <text x="512" y="540" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="36" fill="#AAAACC">Reg.Vault</text>

  <!-- Door handle -->
  <rect x="824" y="444" width="52" height="112" rx="26" fill="#E67E22" stroke="#FFFFFF" stroke-width="8"/>
</svg>
