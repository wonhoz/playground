<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </radialGradient>
    <radialGradient id="btn" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="60%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Screen frame -->
  <rect x="70" y="120" width="372" height="240" rx="14" fill="#0D0000" stroke="#3E0000" stroke-width="6"/>
  <!-- Screen content (desktop) -->
  <rect x="82" y="132" width="348" height="216" rx="8" fill="#1A0A0A"/>
  <rect x="82" y="132" width="348" height="28" rx="8" fill="#2D0000"/>
  <rect x="82" y="148" width="348" height="12" fill="#2D0000"/>
  <!-- Desktop windows -->
  <rect x="100" y="176" width="140" height="90" rx="6" fill="#2A0000"/>
  <rect x="100" y="176" width="140" height="18" rx="6" fill="#3E0000"/>
  <rect x="260" y="176" width="150" height="60" rx="6" fill="#2A0000"/>
  <rect x="260" y="176" width="150" height="18" rx="6" fill="#3E0000"/>
  <!-- Record button large -->
  <circle cx="256" cy="370" r="70" fill="#1A0000" stroke="#3E0000" stroke-width="8"/>
  <circle cx="256" cy="370" r="50" fill="url(#btn)"/>
  <circle cx="256" cy="370" r="70" fill="url(#glow)"/>
  <!-- REC label -->
  <rect x="222" y="362" width="68" height="16" rx="5" fill="white" opacity="0.9"/>
  <!-- Stand -->
  <rect x="226" y="360" width="60" height="8" rx="4" fill="white" opacity="0"/>
  <rect x="216" y="455" width="80" height="10" rx="5" fill="#3E0000"/>
  <rect x="246" y="430" width="20" height="28" rx="6" fill="#3E0000"/>
</svg>
