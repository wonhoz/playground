<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card (answer sheet style) -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#BF360C" stroke-width="16"/>

  <!-- Question header -->
  <rect x="112" y="152" width="800" height="72" rx="20" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="512" y="203" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">Q. Capital of Japan?</text>

  <!-- Answer choice A -->
  <rect x="112" y="248" width="64" height="64" rx="16" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="144" y="294" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">A</text>
  <rect x="192" y="248" width="720" height="64" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="552" y="294" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">Osaka</text>

  <!-- Answer choice B (correct, highlighted) -->
  <rect x="112" y="336" width="64" height="64" rx="16" fill="#388E3C" stroke="#1B5E20" stroke-width="14"/>
  <text x="144" y="382" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">B</text>
  <rect x="192" y="336" width="720" height="64" rx="16" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <text x="552" y="382" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1B5E20" text-anchor="middle">Tokyo</text>
  <!-- Checkmark -->
  <path d="M 840,352 L 868,388 L 904,340" fill="none" stroke="#388E3C" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Answer choice C -->
  <rect x="112" y="424" width="64" height="64" rx="16" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="144" y="470" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">C</text>
  <rect x="192" y="424" width="720" height="64" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="552" y="470" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">Kyoto</text>

  <!-- Answer choice D -->
  <rect x="112" y="512" width="64" height="64" rx="16" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="144" y="558" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">D</text>
  <rect x="192" y="512" width="720" height="64" rx="16" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="10"/>
  <text x="552" y="558" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#757575" text-anchor="middle">Nagoya</text>

  <!-- QUIZ badge -->
  <rect x="268" y="752" width="488" height="116" rx="36" fill="#BF360C" stroke="#7F0000" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">QUIZ</text>
</svg>
