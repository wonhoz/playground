<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Tray.Stats - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; color: #aaa; margin-bottom: 8px; }
    p  { text-align: center; color: #555; margin-bottom: 24px; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
    .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
    .item img { width: 128px; height: 128px; display: block; margin: 0 auto 10px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Tray.Stats — 아이콘 후보 10종</h1>
  <p>시스템 트레이 리소스 통계 표시 앱</p>
  <div class="grid">
    <div class="item"><img src="candidate_01_pulse_chart.svg" alt="01"/><span>01 pulse_chart</span></div>
    <div class="item"><img src="candidate_02_neon_gauge.svg" alt="02"/><span>02 neon_gauge</span></div>
    <div class="item"><img src="candidate_03_bar_monitor.svg" alt="03"/><span>03 bar_monitor</span></div>
    <div class="item"><img src="candidate_04_tray_chip.svg" alt="04"/><span>04 tray_chip</span></div>
    <div class="item"><img src="candidate_05_donut_stats.svg" alt="05"/><span>05 donut_stats</span></div>
    <div class="item"><img src="candidate_06_retro_terminal.svg" alt="06"/><span>06 retro_terminal</span></div>
    <div class="item"><img src="candidate_07_heatmap_grid.svg" alt="07"/><span>07 heatmap_grid</span></div>
    <div class="item"><img src="candidate_08_speedometer.svg" alt="08"/><span>08 speedometer</span></div>
    <div class="item"><img src="candidate_09_hex_network.svg" alt="09"/><span>09 hex_network</span></div>
    <div class="item"><img src="candidate_10_minimal_tray.svg" alt="10"/><span>10 minimal_tray</span></div>
  </div>
</body>
</html>
