<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01ic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background: vivid blue -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01ic)"/>

  <!-- Left file: SVG badge -->
  <rect x="108" y="330" width="270" height="340" rx="20" fill="#EFF6FF"/>
  <!-- File corner fold -->
  <path d="M108,330 L108,670 Q108,670 378,670 L378,406 L302,330 Z" fill="#DBEAFE"/>
  <polygon points="302,330 302,406 378,406" fill="#93C5FD"/>
  <!-- SVG label -->
  <rect x="128" y="500" width="230" height="70" rx="10" fill="#3B82F6"/>
  <text x="243" y="545" font-family="Arial Black,Arial" font-size="44" fill="white" font-weight="900" text-anchor="middle">SVG</text>

  <!-- Transformation arrow (center) -->
  <line x1="392" y1="500" x2="616" y2="500" stroke="#FDE047" stroke-width="26" stroke-linecap="round"/>
  <polygon points="606,460 680,500 606,540" fill="#FDE047"/>
  <!-- "Cast" label on arrow -->
  <text x="504" y="476" font-family="Arial,sans-serif" font-size="24" fill="white" font-weight="bold" text-anchor="middle" opacity="0.9">Cast</text>

  <!-- Right file: ICO badge -->
  <rect x="646" y="330" width="270" height="340" rx="20" fill="#FFF7ED"/>
  <path d="M646,330 L646,670 Q646,670 916,670 L916,406 L840,330 Z" fill="#FEF3C7"/>
  <polygon points="840,330 840,406 916,406" fill="#FCD34D"/>
  <!-- ICO label -->
  <rect x="666" y="500" width="230" height="70" rx="10" fill="#F97316"/>
  <text x="781" y="545" font-family="Arial Black,Arial" font-size="44" fill="white" font-weight="900" text-anchor="middle">ICO</text>

  <!-- Multi-size indicator under ICO -->
  <text x="781" y="618" font-family="Arial,sans-serif" font-size="22" fill="#FCD34D" text-anchor="middle">16 · 32 · 48 · 256</text>

  <!-- Bottom: other format badges -->
  <rect x="200" y="740" width="100" height="46" rx="10" fill="white" opacity="0.25"/>
  <text x="250" y="770" font-family="Arial Black,Arial" font-size="26" fill="white" text-anchor="middle">PNG</text>
  <rect x="320" y="740" width="100" height="46" rx="10" fill="white" opacity="0.25"/>
  <text x="370" y="770" font-family="Arial Black,Arial" font-size="26" fill="white" text-anchor="middle">JPG</text>
  <rect x="440" y="740" width="100" height="46" rx="10" fill="white" opacity="0.25"/>
  <text x="490" y="770" font-family="Arial Black,Arial" font-size="26" fill="white" text-anchor="middle">BMP</text>
  <rect x="560" y="740" width="100" height="46" rx="10" fill="white" opacity="0.25"/>
  <text x="610" y="770" font-family="Arial Black,Arial" font-size="26" fill="white" text-anchor="middle">ICO</text>
  <rect x="680" y="740" width="100" height="46" rx="10" fill="white" opacity="0.25"/>
  <text x="730" y="770" font-family="Arial Black,Arial" font-size="26" fill="white" text-anchor="middle">SVG</text>
</svg>
