<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_mv2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#0E7490"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_mv2)"/>
  <!-- 왼쪽 카드 (소스) -->
  <rect x="210" y="300" width="270" height="340" rx="20" fill="white" opacity="0.2"/>
  <rect x="230" y="320" width="230" height="300" rx="16" fill="#0C4A6E" opacity="0.9"/>
  <!-- 소스 텍스트: # Title -->
  <text x="245" y="380" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#FDE68A">#</text>
  <text x="295" y="380" font-family="'Courier New', monospace" font-size="44" font-weight="bold" fill="white"> Title</text>
  <!-- 소스 텍스트 줄들 -->
  <text x="245" y="430" font-family="'Courier New', monospace" font-size="30" fill="#67E8F9">**bold**</text>
  <text x="245" y="470" font-family="'Courier New', monospace" font-size="28" fill="#A5F3FC">_italic_</text>
  <rect x="245" y="490" width="180" height="18" rx="5" fill="#164E63" opacity="0.8"/>
  <rect x="245" y="520" width="150" height="18" rx="5" fill="#164E63" opacity="0.8"/>
  <!-- 화살표 -->
  <line x1="500" y1="470" x2="600" y2="470" stroke="white" stroke-width="32" stroke-linecap="round"/>
  <polygon points="600,440 650,470 600,500" fill="white"/>
  <!-- 오른쪽 카드 (렌더) -->
  <rect x="660" y="290" width="270" height="360" rx="20" fill="white"/>
  <!-- 렌더된 제목 -->
  <rect x="678" y="318" width="200" height="40" rx="8" fill="#1E3A5F"/>
  <text x="688" y="346" font-family="Arial" font-size="30" font-weight="bold" fill="white">Title</text>
  <!-- 렌더된 내용 줄들 -->
  <text x="678" y="398" font-family="Arial" font-size="28" font-weight="bold" fill="#1E293B">Bold text</text>
  <text x="678" y="436" font-family="Arial" font-size="26" font-style="italic" fill="#374151">Italic text</text>
  <rect x="678" y="455" width="200" height="16" rx="5" fill="#E2E8F0"/>
  <rect x="678" y="482" width="160" height="14" rx="5" fill="#E2E8F0"/>
  <rect x="678" y="506" width="180" height="14" rx="5" fill="#E2E8F0"/>
  <rect x="678" y="530" width="140" height="14" rx="5" fill="#E2E8F0"/>
  <rect x="678" y="553" width="190" height="14" rx="5" fill="#E2E8F0"/>
  <rect x="678" y="577" width="150" height="14" rx="5" fill="#E2E8F0"/>
</svg>
