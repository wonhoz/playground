<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#glow)"/>
  <!-- Map grid lines -->
  <line x1="80" y1="180" x2="432" y2="180" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="332" x2="432" y2="332" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="80" x2="180" y2="432" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="80" x2="256" y2="432" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="80" x2="332" y2="432" stroke="#3F51B5" stroke-width="1.5" opacity="0.4"/>
  <!-- Metro line 1 (horizontal) -->
  <path d="M90,256 H200 Q220,256 220,236 V180" stroke="#FF5252" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Metro line 2 -->
  <path d="M200,256 H320 Q340,256 340,276 V332" stroke="#69F0AE" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Metro line 3 -->
  <path d="M180,332 H256 V256 H340" stroke="#FFD740" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stations -->
  <circle cx="90" cy="256" r="12" fill="white" stroke="#FF5252" stroke-width="4"/>
  <circle cx="220" cy="180" r="14" fill="white" stroke="#FF5252" stroke-width="4"/>
  <circle cx="200" cy="256" r="16" fill="white" stroke="#3949AB" stroke-width="5"/>
  <circle cx="320" cy="256" r="14" fill="white" stroke="#69F0AE" stroke-width="4"/>
  <circle cx="340" cy="332" r="12" fill="white" stroke="#69F0AE" stroke-width="4"/>
  <circle cx="180" cy="332" r="12" fill="white" stroke="#FFD740" stroke-width="4"/>
  <circle cx="340" cy="256" r="16" fill="white" stroke="#3949AB" stroke-width="5"/>
  <!-- Current location pin -->
  <circle cx="256" cy="256" r="18" fill="#FF5252"/>
  <circle cx="256" cy="256" r="10" fill="white"/>
  <!-- Time badge -->
  <rect x="162" y="380" width="188" height="52" rx="26" fill="#FF5252"/>
  <text x="256" y="413" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="white">35 min</text>
