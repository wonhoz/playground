<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a14"/>
      <stop offset="100%" stop-color="#00111f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.3"/>
  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="140" ry="40" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.15"/>
  <line x1="256" y1="76" x2="256" y2="436" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="76" y1="256" x2="436" y2="256" stroke="#0EA5E9" stroke-width="1" opacity="0.15"/>
  <!-- Network nodes at geo locations (locale positions) -->
  <!-- North America (en-US) -->
  <circle cx="160" cy="200" r="10" fill="#0EA5E9" opacity="0.8"/>
  <text x="160" y="188" text-anchor="middle" font-family="monospace" font-size="8" fill="#38BDF8">en-US</text>
  <!-- Europe (fr-FR, de-DE) -->
  <circle cx="256" cy="170" r="10" fill="#06B6D4" opacity="0.8"/>
  <text x="256" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#22D3EE">fr-FR</text>
  <circle cx="290" cy="180" r="8" fill="#0891B2" opacity="0.7"/>
  <text x="312" y="172" font-family="monospace" font-size="7" fill="#38BDF8">de-DE</text>
  <!-- Middle East (ar-SA) -->
  <circle cx="310" cy="220" r="9" fill="#0EA5E9" opacity="0.7"/>
  <text x="330" y="212" font-family="monospace" font-size="7" fill="#38BDF8">ar-SA</text>
  <!-- India (hi-IN) -->
  <circle cx="330" cy="260" r="9" fill="#06B6D4" opacity="0.7"/>
  <text x="350" y="252" font-family="monospace" font-size="7" fill="#22D3EE">hi-IN</text>
  <!-- East Asia (ja-JP, zh-CN, ko-KR) -->
  <circle cx="390" cy="210" r="10" fill="#0EA5E9" opacity="0.8"/>
  <text x="390" y="198" text-anchor="middle" font-family="monospace" font-size="8" fill="#38BDF8">ja-JP</text>
  <circle cx="370" cy="240" r="8" fill="#0891B2" opacity="0.7"/>
  <text x="390" y="234" font-family="monospace" font-size="7" fill="#38BDF8">zh-CN</text>
  <circle cx="400" cy="230" r="7" fill="#06B6D4" opacity="0.6"/>
  <!-- Korea (ko-KR) -->
  <circle cx="408" cy="195" r="7" fill="#0EA5E9" opacity="0.6"/>
  <text x="416" y="188" font-family="monospace" font-size="7" fill="#38BDF8">ko-KR</text>
  <!-- Russia (ru-RU) -->
  <circle cx="320" cy="165" r="8" fill="#06B6D4" opacity="0.7"/>
  <text x="338" y="156" font-family="monospace" font-size="7" fill="#22D3EE">ru-RU</text>
  <!-- South America (pt-BR) -->
  <circle cx="190" cy="310" r="8" fill="#0891B2" opacity="0.7"/>
  <text x="168" y="330" font-family="monospace" font-size="7" fill="#38BDF8">pt-BR</text>
  <!-- Network connections -->
  <line x1="160" y1="200" x2="256" y2="170" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="170" x2="290" y2="180" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="290" y1="180" x2="320" y2="165" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="165" x2="390" y2="210" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="390" y1="210" x2="370" y2="240" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="220" x2="330" y2="260" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="200" x2="190" y2="310" stroke="#38BDF8" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="170" x2="310" y2="220" stroke="#38BDF8" stroke-width="1" opacity="0.25"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="12" fill="#0c2d3d" stroke="#38BDF8" stroke-width="2"/>
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="#38BDF8">i18n</text>
</svg>
