<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#2D1060"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>
  <circle cx="512" cy="512" r="512" fill="url(#bg1)"/>
  <!-- Layer 2: Main — 3개 문서 카드 스택 -->
  <rect x="180" y="260" width="680" height="420" rx="28" fill="#3B1A7A" opacity="0.7"/>
  <rect x="160" y="230" width="680" height="420" rx="28" fill="#4C2494" opacity="0.8"/>
  <rect x="140" y="200" width="680" height="430" rx="28" fill="url(#card)"/>
  <!-- Layer 3: 텍스트 라인들 -->
  <rect x="200" y="280" width="380" height="44" rx="10" fill="#C4B5FD"/>
  <rect x="200" y="348" width="520" height="36" rx="8" fill="#A78BFA" opacity="0.7"/>
  <rect x="200" y="408" width="460" height="36" rx="8" fill="#A78BFA" opacity="0.7"/>
  <rect x="200" y="468" width="320" height="36" rx="8" fill="#A78BFA" opacity="0.5"/>
  <!-- 태그 라벨 -->
  <rect x="200" y="548" width="140" height="44" rx="22" fill="#FBBF24"/>
  <rect x="360" y="548" width="120" height="44" rx="22" fill="#34D399" opacity="0.9"/>
  <!-- 즐겨찾기 별 -->
  <text x="760" y="270" font-size="90" fill="#FBBF24" text-anchor="middle" dominant-baseline="middle">★</text>
</svg>
