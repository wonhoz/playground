<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network lines -->
  <line x1="256" y1="180" x2="140" y2="300" stroke="#CE93D8" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="180" x2="256" y2="330" stroke="#CE93D8" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="180" x2="372" y2="300" stroke="#CE93D8" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="300" x2="256" y2="330" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <line x1="372" y1="300" x2="256" y2="330" stroke="#CE93D8" stroke-width="2" opacity="0.4"/>
  <!-- Central server node -->
  <circle cx="256" cy="180" r="40" fill="url(#node)"/>
  <rect x="240" y="164" width="32" height="6" rx="2" fill="white" opacity="0.8"/>
  <rect x="240" y="176" width="32" height="6" rx="2" fill="white" opacity="0.6"/>
  <rect x="240" y="188" width="20" height="6" rx="2" fill="white" opacity="0.4"/>
  <!-- Client nodes -->
  <circle cx="140" cy="300" r="28" fill="#7B1FA2" stroke="#CE93D8" stroke-width="2"/>
  <text x="128" y="307" font-family="monospace" font-size="16" fill="#CE93D8">PC</text>
  <circle cx="256" cy="330" r="28" fill="#7B1FA2" stroke="#CE93D8" stroke-width="2"/>
  <text x="244" y="337" font-family="monospace" font-size="16" fill="#CE93D8">PC</text>
  <circle cx="372" cy="300" r="28" fill="#7B1FA2" stroke="#CE93D8" stroke-width="2"/>
  <text x="360" y="307" font-family="monospace" font-size="16" fill="#CE93D8">PC</text>
  <!-- Port label -->
  <rect x="190" y="390" width="132" height="36" rx="8" fill="#7B1FA2" stroke="#CE93D8" stroke-width="1"/>
  <text x="204" y="414" font-family="monospace" font-size="18" fill="#CE93D8">:8080 SERVE</text>
</svg>
