<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="100%" stop-color="#150030"/>
    </linearGradient>
    <radialGradient id="radar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8833FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8833FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8833FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8833FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#8833FF" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="125" fill="none" stroke="#8833FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#8833FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="35" fill="none" stroke="#8833FF" stroke-width="1.5" opacity="0.6"/>
  <!-- Radar crosshairs -->
  <line x1="86" y1="256" x2="426" y2="256" stroke="#8833FF" stroke-width="1" opacity="0.25"/>
  <line x1="256" y1="86" x2="256" y2="426" stroke="#8833FF" stroke-width="1" opacity="0.25"/>
  <!-- Sweep sector -->
  <path d="M256,256 L256,86 A170,170 0 0,1 400,170 Z" fill="url(#sweep)" opacity="0.4"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="170" fill="url(#radar)"/>
  <!-- Boot process dots on radar -->
  <circle cx="256" cy="176" r="8" fill="#AA66FF" opacity="0.9"/>
  <circle cx="340" cy="210" r="6" fill="#CC88FF" opacity="0.8"/>
  <circle cx="310" cy="290" r="10" fill="#AA66FF" opacity="0.85"/>
  <circle cx="186" cy="300" r="7" fill="#CC88FF" opacity="0.75"/>
  <circle cx="200" cy="200" r="5" fill="#AA66FF" opacity="0.7"/>
  <!-- Center marker -->
  <circle cx="256" cy="256" r="12" fill="#8833FF"/>
  <circle cx="256" cy="256" r="5" fill="white" opacity="0.9"/>
</svg>