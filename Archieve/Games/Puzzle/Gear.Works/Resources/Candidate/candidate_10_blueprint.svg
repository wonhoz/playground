<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <line x1="0" y1="64" x2="512" y2="64" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="128" x2="512" y2="128" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="192" x2="512" y2="192" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="320" x2="512" y2="320" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="448" x2="512" y2="448" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="64" y1="0" x2="64" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="192" y1="0" x2="192" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="320" y1="0" x2="320" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <line x1="448" y1="0" x2="448" y2="512" stroke="#1565c0" stroke-width="0.7" opacity="0.4"/>
  <!-- Gear blueprint drawing -->
  <circle cx="200" cy="220" r="100" fill="none" stroke="url(#lineGrad)" stroke-width="2.5"/>
  <circle cx="200" cy="220" r="65" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="8,5"/>
  <circle cx="200" cy="220" r="22" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <!-- Teeth lines -->
  <rect x="192" y="108" width="16" height="20" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <rect x="192" y="312" width="16" height="20" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <rect x="88" y="212" width="20" height="16" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <rect x="292" y="212" width="20" height="16" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="2"/>
  <!-- Dimension lines -->
  <line x1="96" y1="130" x2="304" y2="130" stroke="#90caf9" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="126" x2="96" y2="134" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
  <line x1="304" y1="126" x2="304" y2="134" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="124" font-family="'Courier New', monospace" font-size="11" fill="#90caf9" text-anchor="middle" opacity="0.8">Ø200mm</text>
  <!-- Small gear blueprint right -->
  <circle cx="370" cy="300" r="65" fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.8"/>
  <circle cx="370" cy="300" r="20" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>
  <rect x="362" y="228" width="16" height="18" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>
  <rect x="362" y="354" width="16" height="18" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>
  <rect x="300" y="292" width="18" height="16" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>
  <rect x="434" y="292" width="18" height="16" rx="3" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>
  <!-- Connecting line center to center -->
  <line x1="200" y1="220" x2="370" y2="300" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Cross hairs at center -->
  <line x1="185" y1="220" x2="215" y2="220" stroke="#90caf9" stroke-width="1.5" opacity="0.8"/>
  <line x1="200" y1="205" x2="200" y2="235" stroke="#90caf9" stroke-width="1.5" opacity="0.8"/>
  <!-- TITLE in blueprint style -->
  <text x="256" y="450" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#90caf9" text-anchor="middle">GEAR.WORKS v1.0</text>
  <text x="256" y="475" font-family="'Courier New', monospace" font-size="11" fill="#64b5f6" text-anchor="middle" opacity="0.7">MECHANICAL PUZZLE DESIGN</text>
</svg>
