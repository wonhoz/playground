<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="chest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#795548"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Treasure chest body -->
  <rect x="96" y="280" width="320" height="180" rx="14" fill="url(#chest)" stroke="#a1887f" stroke-width="4"/>
  <!-- Chest lid (open) -->
  <path d="M96 280 Q96 160 256 160 Q416 160 416 280" fill="url(#lid)" stroke="#a1887f" stroke-width="4"/>
  <!-- Metal bands -->
  <rect x="96" y="295" width="320" height="14" fill="#fdd835" opacity="0.8"/>
  <rect x="96" y="420" width="320" height="14" fill="#fdd835" opacity="0.8"/>
  <rect x="238" y="280" width="36" height="120" fill="#fdd835" opacity="0.8"/>
  <!-- Lock on chest -->
  <rect x="228" y="325" width="56" height="44" rx="10" fill="#ffd740" stroke="#ffe57f" stroke-width="3"/>
  <path d="M236 335 Q236 306 256 306 Q276 306 276 335" fill="none" stroke="#ffc107" stroke-width="8" stroke-linecap="round"/>
  <!-- Links/URLs floating out -->
  <path d="M140 240 Q170 200 200 220" fill="none" stroke="#80cbc4" stroke-width="6" stroke-linecap="round"/>
  <path d="M310 200 Q340 170 370 190" fill="none" stroke="#80cbc4" stroke-width="6" stroke-linecap="round"/>
  <circle cx="140" cy="240" r="8" fill="#4db6ac"/>
  <circle cx="310" cy="200" r="8" fill="#4db6ac"/>
  <!-- Glow from chest -->
  <ellipse cx="256" cy="220" rx="80" ry="30" fill="#ffd740" opacity="0.15"/>
</svg>
