<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05: metaphor | MusicBrainz 구슬에서 메타데이터가 음악 파일로 흘러들어옴 | 대각선/동적 | 라임+초록+보라 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCE775"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#33691E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- MusicBrainz logo-like orb (top left) -->
  <circle cx="240" cy="240" r="150" fill="#7B1FA2" filter="url(#sh5)"/>
  <circle cx="240" cy="240" r="120" fill="#9C27B0"/>
  <circle cx="240" cy="240" r="90" fill="#7B1FA2"/>
  <!-- MB text -->
  <text x="240" y="228" font-family="Arial Black, sans-serif" font-size="44" fill="white"
        text-anchor="middle" dominant-baseline="middle">MB</text>
  <text x="240" y="270" font-family="Arial, sans-serif" font-size="18" fill="#CE93D8"
        text-anchor="middle">MusicBrainz</text>

  <!-- Data stream: metadata flowing down-right -->
  <!-- Particle trail: Title -->
  <rect x="290" y="190" width="160" height="36" rx="14" fill="#43A047" filter="url(#sh5)"/>
  <text x="370" y="208" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">TITLE: Midnight Blue</text>

  <rect x="360" y="250" width="160" height="36" rx="14" fill="#1E88E5" filter="url(#sh5)"/>
  <text x="440" y="268" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">ARTIST: Echo Valley</text>

  <rect x="450" y="310" width="150" height="36" rx="14" fill="#FF6F00" filter="url(#sh5)"/>
  <text x="525" y="328" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">ALBUM: Vol.2</text>

  <rect x="520" y="372" width="140" height="36" rx="14" fill="#E53935" filter="url(#sh5)"/>
  <text x="590" y="390" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">YEAR: 2024</text>

  <rect x="580" y="434" width="140" height="36" rx="14" fill="#6A1B9A" filter="url(#sh5)"/>
  <text x="650" y="452" font-family="Consolas, monospace" font-size="17" fill="white"
        text-anchor="middle" dominant-baseline="middle">GENRE: Jazz</text>

  <!-- Flow trail line -->
  <path d="M370,240 C460,340 560,420 660,500" fill="none" stroke="#43A047" stroke-width="8"
        stroke-dasharray="16,10" stroke-linecap="round" opacity="0.6"/>

  <!-- Target: MP3 file with tags applied -->
  <rect x="640" y="520" width="260" height="340" rx="20" fill="#2E7D32" filter="url(#sh5)"/>
  <polygon points="852,520 900,568 852,568" fill="#A5D6A5"/>
  <!-- Music note -->
  <text x="770" y="640" font-family="Arial, sans-serif" font-size="80" fill="white"
        text-anchor="middle" dominant-baseline="middle" opacity="0.9">♪</text>
  <!-- Tag lines inside file -->
  <rect x="660" y="700" width="220" height="12" rx="6" fill="#A5D6A5" opacity="0.8"/>
  <rect x="660" y="724" width="190" height="12" rx="6" fill="#A5D6A5" opacity="0.6"/>
  <rect x="660" y="748" width="210" height="12" rx="6" fill="#A5D6A5" opacity="0.7"/>
  <rect x="660" y="772" width="170" height="12" rx="6" fill="#A5D6A5" opacity="0.5"/>
  <!-- Check mark -->
  <circle cx="900" cy="640" r="40" fill="#43A047" filter="url(#sh5)"/>
  <text x="900" y="640" font-family="Arial, sans-serif" font-size="48" fill="white"
        text-anchor="middle" dominant-baseline="middle">✓</text>

  <!-- Format labels -->
  <rect x="120" y="640" width="220" height="200" rx="16" fill="white" filter="url(#sh5)"/>
  <text x="230" y="670" font-family="Arial, sans-serif" font-size="16" fill="#546E7A"
        text-anchor="middle">지원 형식</text>
  <text x="230" y="698" font-family="Consolas, monospace" font-size="18" fill="#7B1FA2"
        text-anchor="middle">.mp3</text>
  <text x="230" y="722" font-family="Consolas, monospace" font-size="18" fill="#1E88E5"
        text-anchor="middle">.flac</text>
  <text x="230" y="746" font-family="Consolas, monospace" font-size="18" fill="#43A047"
        text-anchor="middle">.ogg</text>
  <text x="230" y="770" font-family="Consolas, monospace" font-size="18" fill="#FF6F00"
        text-anchor="middle">.m4a .aac</text>
  <text x="230" y="794" font-family="Consolas, monospace" font-size="18" fill="#E53935"
        text-anchor="middle">.wma .opus</text>

  <!-- Arrow from orb to trail -->
  <polygon points="380,240 400,210 400,270" fill="#43A047"/>
</svg>
