<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00695c"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speech bubble 1 (left, English) -->
  <path d="M60 120 Q60 80 100 80 L280 80 Q320 80 320 120 L320 210 Q320 250 280 250 L140 250 L100 300 L120 250 L100 250 Q60 250 60 210 Z" fill="#26a69a" stroke="#80cbc4" stroke-width="3"/>
  <text x="190" y="175" font-family="serif" font-size="36" font-weight="bold" fill="#e0f2f1" text-anchor="middle">Hello</text>
  <!-- Speech bubble 2 (right, Korean) -->
  <path d="M200 290 Q200 250 240 250 L420 250 Q460 250 460 290 L460 380 Q460 420 420 420 L300 420 L360 460 L340 420 L240 420 Q200 420 200 380 Z" fill="#00897b" stroke="#80cbc4" stroke-width="3"/>
  <text x="330" y="345" font-family="serif" font-size="36" font-weight="bold" fill="#e0f2f1" text-anchor="middle">안녕</text>
  <!-- Wrench/edit overlay -->
  <circle cx="400" cy="120" r="40" fill="#004d40" stroke="#4db6ac" stroke-width="3"/>
  <text x="400" y="130" font-family="monospace" font-size="28" fill="#80cbc4" text-anchor="middle">✎</text>
</svg>
