<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030818"/>
  <!-- Guitar body silhouette -->
  <!-- Lower bout -->
  <ellipse cx="512" cy="680" rx="180" ry="160" fill="#3F51B5"/>
  <!-- Upper bout -->
  <ellipse cx="512" cy="450" rx="130" ry="120" fill="#3F51B5"/>
  <!-- Waist cutaway -->
  <rect x="382" y="540" width="260" height="80" fill="#030818"/>
  <ellipse cx="460" cy="580" rx="60" ry="42" fill="#030818"/>
  <ellipse cx="564" cy="580" rx="60" ry="42" fill="#030818"/>
  <!-- Sound hole -->
  <circle cx="512" cy="580" r="55" fill="#030818"/>
  <circle cx="512" cy="580" r="42" fill="none" stroke="#7986CB" stroke-width="10"/>
  <!-- Neck -->
  <rect x="490" y="220" width="44" height="250" rx="10" fill="#7986CB"/>
  <!-- Headstock -->
  <rect x="478" y="180" width="68" height="60" rx="8" fill="#7986CB"/>
  <!-- Strings -->
  <line x1="505" y1="200" x2="505" y2="680" stroke="#030818" stroke-width="3"/>
  <line x1="512" y1="200" x2="512" y2="680" stroke="#030818" stroke-width="3"/>
  <line x1="519" y1="200" x2="519" y2="680" stroke="#030818" stroke-width="3"/>
</svg>