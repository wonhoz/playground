<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 프리즘 -->
  <polygon points="256,100 110,380 402,380" fill="#8B5CF6" opacity="0.07"/>
  <polygon points="256,100 110,380 402,380" fill="none" stroke="#8B5CF6" stroke-width="3" filter="url(#glow)"/>
  <!-- 입사 빔 (API 요청) -->
  <line x1="80" y1="200" x2="193" y2="277" stroke="url(#beam)" stroke-width="5" filter="url(#glow)"/>
  <text x="60" y="196" fill="#8B5CF6" font-size="11" font-family="monospace" opacity="0.8">REQUEST</text>
  <!-- 굴절 빔들 (응답 코드) -->
  <line x1="319" y1="277" x2="420" y2="180" stroke="#10B981" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="319" y1="283" x2="430" y2="240" stroke="#F59E0B" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <line x1="319" y1="290" x2="430" y2="320" stroke="#EF4444" stroke-width="2.5" opacity="0.6"/>
  <line x1="319" y1="296" x2="420" y2="380" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <!-- 응답 레이블 -->
  <text x="424" y="178" fill="#10B981" font-size="10" font-family="monospace" opacity="0.9">2xx OK</text>
  <text x="434" y="238" fill="#F59E0B" font-size="10" font-family="monospace" opacity="0.8">3xx REDIR</text>
  <text x="434" y="318" fill="#EF4444" font-size="10" font-family="monospace" opacity="0.7">4xx ERR</text>
  <text x="424" y="378" fill="#8B5CF6" font-size="10" font-family="monospace" opacity="0.6">5xx SVR</text>
  <!-- 중앙 빛 -->
  <circle cx="256" cy="290" r="10" fill="#8B5CF6" opacity="0.4" filter="url(#glow)"/>
</svg>