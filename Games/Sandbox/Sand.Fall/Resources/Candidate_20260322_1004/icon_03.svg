  <rect x="818" y="516" width="14" height="10" rx="2" fill="#FF5722"/>
  <rect x="838" y="516" width="14" height="10" rx="2" fill="#E53935"/>
  <rect x="858" y="516" width="10" height="10" rx="2" fill="#FF5722"/>
