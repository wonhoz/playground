  <rect x="489" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="499" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="509" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="519" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="529" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="539" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="549" y="618" width="6" height="12" rx="1" fill="#4A6090"/>
  <rect x="559" y="618" width="6" height="12" rx="1" fill="#4A6090"/>

  <!-- 별빛 장식 (배경 스파클) -->
