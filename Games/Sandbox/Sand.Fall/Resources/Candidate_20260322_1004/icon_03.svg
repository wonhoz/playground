  <circle cx="512" cy="822" r="88" fill="#101218"/>
  <circle cx="512" cy="822" r="82" fill="#151A24"/>
  <circle cx="512" cy="822" r="76" fill="#1A2030"/>
  <!-- 증기 픽셀 (위로 올라가는 물결) -->
  <rect x="476" y="800" width="10" height="16" rx="3" fill="#B0BEC5" opacity="0.8"/>
  <rect x="494" y="792" width="10" height="22" rx="3" fill="#CFD8DC" opacity="0.75"/>
  <rect x="512" y="788" width="10" height="26" rx="3" fill="#ECEFF1" opacity="0.85"/>
