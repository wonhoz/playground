<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2e1a0a"/>
    </linearGradient>
    <linearGradient id="mod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="mainKey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Combo row 1: Ctrl + Alt + T -->
  <rect x="50" y="80" width="72" height="60" rx="10" fill="url(#mod)"/>
  <text x="86" y="116" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">CTRL</text>
  <text x="134" y="116" text-anchor="middle" font-family="Arial" font-size="20" fill="#f59e0b">+</text>
  <rect x="148" y="80" width="60" height="60" rx="10" fill="url(#mod)"/>
  <text x="178" y="116" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">ALT</text>
  <text x="220" y="116" text-anchor="middle" font-family="Arial" font-size="20" fill="#f59e0b">+</text>
  <rect x="234" y="80" width="60" height="60" rx="10" fill="url(#mainKey)"/>
  <text x="264" y="116" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="white">T</text>
  <text x="308" y="116" text-anchor="middle" font-family="Arial" font-size="24" fill="white">→</text>
  <!-- Result action -->
  <rect x="330" y="80" width="130" height="60" rx="10" fill="url(#result)"/>
  <text x="395" y="116" text-anchor="middle" font-family="Arial" font-size="14" fill="white">Terminal</text>
  <!-- Combo row 2: Win + L -->
  <rect x="50" y="170" width="72" height="60" rx="10" fill="url(#mod)"/>
  <text x="86" y="206" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">WIN</text>
  <text x="134" y="206" text-anchor="middle" font-family="Arial" font-size="20" fill="#f59e0b">+</text>
  <rect x="148" y="170" width="60" height="60" rx="10" fill="url(#mainKey)"/>
  <text x="178" y="206" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="white">L</text>
  <text x="222" y="206" text-anchor="middle" font-family="Arial" font-size="24" fill="white">→</text>
  <rect x="246" y="170" width="214" height="60" rx="10" fill="url(#result)"/>
  <text x="353" y="206" text-anchor="middle" font-family="Arial" font-size="14" fill="white">Lock Screen</text>
  <!-- Combo row 3: CapsLock -> Esc -->
  <rect x="50" y="260" width="120" height="60" rx="10" fill="url(#mod)" opacity="0.7"/>
  <text x="110" y="296" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">CAPS</text>
  <text x="184" y="296" text-anchor="middle" font-family="Arial" font-size="24" fill="white">→</text>
  <rect x="206" y="260" width="80" height="60" rx="10" fill="url(#result)"/>
  <text x="246" y="296" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">ESC</text>
  <!-- Add new remap button -->
  <rect x="50" y="360" width="412" height="52" rx="12" fill="#2a1a3a"/>
  <text x="256" y="391" text-anchor="middle" font-family="Arial" font-size="16" fill="#a78bfa">+ Add New Mapping</text>
  <text x="256" y="455" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#f59e0b" opacity="0.7">KEY MAPPER</text>
</svg>
