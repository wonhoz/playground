<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="cloud1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="cloud2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#e84393"/>
    </linearGradient>
    <linearGradient id="cloud3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Word blocks of varying sizes forming a cloud shape -->
  <!-- Large center words -->
  <rect x="188" y="228" width="136" height="36" rx="8" fill="url(#cloud1)" opacity="0.95"/>
  <rect x="155" y="278" width="202" height="30" rx="7" fill="url(#cloud2)" opacity="0.9"/>
  <!-- Medium words -->
  <rect x="168" y="190" width="90" height="26" rx="6" fill="url(#cloud3)" opacity="0.85"/>
  <rect x="270" y="190" width="78" height="26" rx="6" fill="url(#cloud1)" opacity="0.8"/>
  <rect x="148" y="318" width="85" height="24" rx="5" fill="url(#cloud3)" opacity="0.8"/>
  <rect x="246" y="320" width="120" height="24" rx="5" fill="url(#cloud1)" opacity="0.75"/>
  <!-- Small words -->
  <rect x="182" y="158" width="55" height="20" rx="5" fill="url(#cloud2)" opacity="0.7"/>
  <rect x="252" y="155" width="80" height="20" rx="5" fill="url(#cloud3)" opacity="0.7"/>
  <rect x="176" y="352" width="60" height="18" rx="4" fill="url(#cloud1)" opacity="0.65"/>
  <rect x="250" y="354" width="90" height="18" rx="4" fill="url(#cloud2)" opacity="0.65"/>
  <rect x="354" y="258" width="55" height="18" rx="4" fill="url(#cloud3)" opacity="0.6"/>
  <rect x="100" y="254" width="48" height="18" rx="4" fill="url(#cloud2)" opacity="0.6"/>
  <!-- Tiny words -->
  <rect x="200" y="128" width="40" height="15" rx="4" fill="url(#cloud1)" opacity="0.5"/>
  <rect x="255" y="126" width="60" height="15" rx="4" fill="url(#cloud2)" opacity="0.5"/>
  <rect x="186" y="378" width="45" height="14" rx="3" fill="url(#cloud3)" opacity="0.45"/>
  <rect x="244" y="380" width="70" height="14" rx="3" fill="url(#cloud1)" opacity="0.45"/>
</svg>