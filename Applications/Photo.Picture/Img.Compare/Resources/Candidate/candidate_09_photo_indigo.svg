<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 폴라로이드 왼쪽 (기울어짐) -->
  <g transform="rotate(-8 145 240)">
    <rect x="60" y="100" width="170" height="220" rx="6" fill="white"/>
    <rect x="70" y="110" width="150" height="150" rx="4" fill="#546E7A"/>
    <circle cx="130" cy="170" r="35" fill="#78909C"/>
    <rect x="70" y="280" width="150" height="30" rx="0" fill="white"/>
    <text x="145" y="301" font-size="14" text-anchor="middle" fill="#9E9E9E" font-family="Segoe UI">before.jpg</text>
  </g>
  <!-- 폴라로이드 오른쪽 (기울어짐) -->
  <g transform="rotate(8 367 240)">
    <rect x="282" y="100" width="170" height="220" rx="6" fill="white"/>
    <rect x="292" y="110" width="150" height="150" rx="4" fill="#3949AB"/>
    <circle cx="362" cy="170" r="35" fill="#7986CB"/>
    <rect x="292" y="280" width="150" height="30" rx="0" fill="white"/>
    <text x="367" y="301" font-size="14" text-anchor="middle" fill="#9E9E9E" font-family="Segoe UI">after.jpg</text>
  </g>
  <!-- vs 텍스트 -->
  <circle cx="256" cy="240" r="38" fill="#1A237E" stroke="#9FA8DA" stroke-width="3"/>
  <text x="256" y="248" font-size="22" text-anchor="middle" fill="#C5CAE9" font-family="Segoe UI" font-weight="bold">VS</text>
  <!-- 하단 레이블 -->
  <text x="256" y="440" font-size="22" text-anchor="middle" fill="#9FA8DA" font-family="Segoe UI">Image Compare</text>
</svg>