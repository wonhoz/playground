<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0500"/>
      <stop offset="100%" stop-color="#1a0800"/>
    </linearGradient>
    <linearGradient id="anvilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="sparksGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fire at base -->
  <ellipse cx="256" cy="415" rx="120" ry="30" fill="#ff4500" fill-opacity="0.25" filter="url(#sparksGlow)"/>
  <!-- Anvil body -->
  <rect x="155" y="300" width="202" height="100" rx="12" fill="url(#anvilGrad)"/>
  <!-- Anvil top flat surface -->
  <rect x="135" y="280" width="242" height="32" rx="8" fill="#606060"/>
  <!-- Anvil base feet -->
  <rect x="175" y="395" width="55" height="20" rx="5" fill="#3a3a3a"/>
  <rect x="285" y="395" width="55" height="20" rx="5" fill="#3a3a3a"/>
  <!-- Hot glowing text on anvil surface -->
  <rect x="155" y="270" width="202" height="22" rx="4" fill="#ff6b35" fill-opacity="0.2" filter="url(#sparksGlow)"/>
  <!-- Text bars on anvil (glowing letters) -->
  <rect x="168" y="276" width="35" height="10" rx="3" fill="url(#textGrad)" filter="url(#sparksGlow)"/>
  <rect x="212" y="276" width="55" height="10" rx="3" fill="url(#textGrad)" filter="url(#sparksGlow)"/>
  <rect x="276" y="276" width="40" height="10" rx="3" fill="url(#textGrad)" filter="url(#sparksGlow)"/>
  <rect x="325" y="276" width="22" height="10" rx="3" fill="url(#textGrad)" filter="url(#sparksGlow)"/>
  <!-- Sparks flying up -->
  <g filter="url(#sparksGlow)">
    <line x1="200" y1="265" x2="185" y2="230" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="230" y1="260" x2="215" y2="205" stroke="#ff8c00" stroke-width="2.5"/>
    <line x1="256" y1="258" x2="256" y2="195" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="282" y1="260" x2="300" y2="205" stroke="#ff8c00" stroke-width="2.5"/>
    <line x1="310" y1="265" x2="330" y2="228" stroke="#ffd700" stroke-width="2"/>
    <line x1="215" y1="255" x2="195" y2="210" stroke="#ff4500" stroke-width="1.5"/>
    <line x1="270" y1="255" x2="280" y2="215" stroke="#ff4500" stroke-width="1.5"/>
  </g>
  <!-- Spark tips (dots) -->
  <circle cx="185" cy="228" r="4" fill="#ffd700" filter="url(#sparksGlow)"/>
  <circle cx="213" cy="202" r="4" fill="#ff8c00" filter="url(#sparksGlow)"/>
  <circle cx="256" cy="193" r="5" fill="#ffd700" filter="url(#sparksGlow)"/>
  <circle cx="302" cy="202" r="4" fill="#ff8c00" filter="url(#sparksGlow)"/>
  <circle cx="332" cy="226" r="3" fill="#ffd700" filter="url(#sparksGlow)"/>
  <!-- AI chat bubble floating above -->
  <path d="M180 110 L340 110 L340 180 L275 180 L256 205 L237 180 L180 180Z" fill="#1a0800" stroke="url(#textGrad)" stroke-width="2.5" filter="url(#sparksGlow)"/>
  <line x1="200" y1="135" x2="320" y2="135" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="155" x2="305" y2="155" stroke="#ff8c00" stroke-width="2" opacity="0.6"/>
</svg>