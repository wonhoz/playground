<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1C1C1C"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1744"/>
      <stop offset="40%" style="stop-color:#FF6D00"/>
      <stop offset="70%" style="stop-color:#FFEA00"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flame shape -->
  <path d="M256 80 Q310 130 300 180 Q340 140 335 200 Q380 160 360 230 Q400 210 380 280 Q390 330 350 360 Q300 400 256 410 Q212 400 162 360 Q122 330 132 280 Q112 210 152 230 Q132 160 176 200 Q171 140 212 180 Q202 130 256 80 Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Inner flame -->
  <path d="M256 160 Q285 195 278 230 Q300 210 295 255 Q316 240 305 290 Q300 330 256 355 Q212 330 207 290 Q196 240 217 255 Q212 210 234 230 Q227 195 256 160 Z" fill="#FFEA00" opacity="0.7"/>
  <!-- CPU chip outline -->
  <rect x="196" y="280" width="120" height="100" rx="10" fill="none" stroke="#FFEA00" stroke-width="3" opacity="0.6"/>
  <!-- CPU pins -->
  <line x1="220" y1="280" x2="220" y2="265" stroke="#FF6D00" stroke-width="3"/>
  <line x1="246" y1="280" x2="246" y2="265" stroke="#FF6D00" stroke-width="3"/>
  <line x1="272" y1="280" x2="272" y2="265" stroke="#FF6D00" stroke-width="3"/>
  <line x1="298" y1="280" x2="298" y2="265" stroke="#FF6D00" stroke-width="3"/>
  <line x1="220" y1="380" x2="220" y2="395" stroke="#FF6D00" stroke-width="3"/>
  <line x1="246" y1="380" x2="246" y2="395" stroke="#FF6D00" stroke-width="3"/>
  <line x1="272" y1="380" x2="272" y2="395" stroke="#FF6D00" stroke-width="3"/>
  <line x1="298" y1="380" x2="298" y2="395" stroke="#FF6D00" stroke-width="3"/>
</svg>
