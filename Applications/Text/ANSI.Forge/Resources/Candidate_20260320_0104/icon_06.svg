<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 레이어 색상: stacked colored layer panels -->
  <!-- Layer 3 (bottom) -->
  <rect x="300" y="620" width="480" height="110" rx="14" fill="#4A148C" opacity="0.5"/>
  <line x1="330" y1="657" x2="500" y2="657" stroke="#CE93D8" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <line x1="330" y1="685" x2="460" y2="685" stroke="#CE93D8" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Layer 2 (middle) -->
  <rect x="260" y="490" width="480" height="140" rx="14" fill="#4A148C" opacity="0.75"/>
  <line x1="290" y1="528" x2="520" y2="528" stroke="#CE93D8" stroke-width="8" stroke-linecap="round"/>
  <line x1="290" y1="557" x2="480" y2="557" stroke="#CE93D8" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="290" y1="583" x2="500" y2="583" stroke="#CE93D8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- Layer 1 (top) - with palette swatches -->
  <rect x="220" y="340" width="480" height="160" rx="14" fill="#4A148C"/>
  <!-- Color swatches on top layer -->
  <rect x="256" y="370" width="56" height="56" rx="8" fill="#CE93D8"/>
  <rect x="322" y="370" width="56" height="56" rx="8" fill="#CE93D8" opacity="0.7"/>
  <rect x="388" y="370" width="56" height="56" rx="8" fill="#CE93D8" opacity="0.4"/>
  <rect x="454" y="370" width="56" height="56" rx="8" fill="#030005" stroke="#CE93D8" stroke-width="4"/>
  <rect x="520" y="370" width="56" height="56" rx="8" fill="#030005" stroke="#CE93D8" stroke-width="3" opacity="0.6"/>
  <rect x="586" y="370" width="56" height="56" rx="8" fill="#4A148C" stroke="#CE93D8" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="448" x2="620" y2="448" stroke="#CE93D8" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Stack depth indicator lines -->
  <line x1="700" y1="340" x2="740" y2="368" stroke="#CE93D8" stroke-width="5" stroke-dasharray="10 6" opacity="0.5"/>
  <line x1="700" y1="490" x2="740" y2="510" stroke="#CE93D8" stroke-width="4" stroke-dasharray="10 6" opacity="0.4"/>
  <line x1="700" y1="620" x2="740" y2="636" stroke="#CE93D8" stroke-width="3" stroke-dasharray="10 6" opacity="0.3"/>
</svg>