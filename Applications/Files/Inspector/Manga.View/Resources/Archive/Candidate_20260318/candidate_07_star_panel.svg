<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12060f"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Manga panel layout (asymmetric, dynamic) -->

  <!-- Panel 1 (top-left, large) -->
  <rect x="30" y="30" width="240" height="220" fill="#0f0410" stroke="#EC4899" stroke-width="3" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Panel 1 content: action star burst -->
  <g transform="translate(150,140)" filter="url(#glow)">
    <polygon points="0,-80 18,-28 72,-24 30,12 44,66 0,36 -44,66 -30,12 -72,-24 -18,-28" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="2" stroke-opacity="0.8"/>
    <polygon points="0,-55 12,-19 49,-16 20,8 30,45 0,24 -30,45 -20,8 -49,-16 -12,-19" fill="#F472B6" fill-opacity="0.15" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle r="20" fill="#EC4899" fill-opacity="0.4"/>
  </g>

  <!-- Panel 2 (top-right, tall) -->
  <rect x="282" y="30" width="200" height="310" fill="#100310" stroke="#F472B6" stroke-width="3" stroke-opacity="0.6" filter="url(#softglow)"/>
  <!-- Panel 2 content: vertical speed lines -->
  <g opacity="0.4" clip-path="">
    <line x1="310" y1="40" x2="310" y2="330" stroke="#F472B6" stroke-width="1"/>
    <line x1="330" y1="40" x2="330" y2="330" stroke="#EC4899" stroke-width="1.5"/>
    <line x1="355" y1="40" x2="355" y2="330" stroke="#F472B6" stroke-width="1"/>
    <line x1="380" y1="40" x2="380" y2="330" stroke="#EC4899" stroke-width="1.5"/>
    <line x1="405" y1="40" x2="405" y2="330" stroke="#F472B6" stroke-width="1"/>
    <line x1="435" y1="40" x2="435" y2="330" stroke="#EC4899" stroke-width="1.5"/>
    <line x1="460" y1="40" x2="460" y2="330" stroke="#F472B6" stroke-width="1"/>
  </g>
  <!-- Panel 2 character shape -->
  <ellipse cx="382" cy="130" rx="45" ry="55" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>
  <ellipse cx="382" cy="80" rx="30" ry="35" fill="#F472B6" fill-opacity="0.2" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Panel 3 (middle-left) -->
  <rect x="30" y="262" width="115" height="115" fill="#0d030e" stroke="#FB7185" stroke-width="3" stroke-opacity="0.6" filter="url(#softglow)"/>
  <!-- Panel 3 content: close-up eye -->
  <path d="M45,320 Q87,285 130,320 Q87,355 45,320 Z" fill="#1e0618" stroke="#FB7185" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="87" cy="320" r="22" fill="#EC4899" fill-opacity="0.4"/>
  <circle cx="87" cy="320" r="14" fill="#0a0308"/>
  <circle cx="92" cy="315" r="6" fill="white" fill-opacity="0.7"/>

  <!-- Panel 4 (middle-center) -->
  <rect x="157" y="262" width="113" height="115" fill="#100312" stroke="#EC4899" stroke-width="3" stroke-opacity="0.5" filter="url(#softglow)"/>
  <!-- Panel 4 content: speech bubble -->
  <path d="M175,290 Q175,275 190,275 L250,275 Q265,275 265,290 L265,315 Q265,330 250,330 L220,330 L210,345 L215,330 L190,330 Q175,330 175,315 Z"
    fill="#1e0618" stroke="#EC4899" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Dots in bubble -->
  <circle cx="205" cy="302" r="6" fill="#EC4899" fill-opacity="0.6"/>
  <circle cx="220" cy="302" r="6" fill="#F472B6" fill-opacity="0.5"/>
  <circle cx="235" cy="302" r="6" fill="#EC4899" fill-opacity="0.6"/>

  <!-- Panel 5 (bottom-left, wide) -->
  <rect x="30" y="389" width="452" height="93" fill="#0e030f" stroke="#EC4899" stroke-width="3" stroke-opacity="0.65" filter="url(#softglow)"/>
  <!-- Panel 5 content: horizontal scroll/action lines -->
  <line x1="40" y1="435" x2="472" y2="435" stroke="#EC4899" stroke-width="2" stroke-opacity="0.4" filter="url(#softglow)"/>
  <line x1="40" y1="415" x2="472" y2="415" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="40" y1="455" x2="472" y2="455" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Star in bottom panel -->
  <polygon points="256,420 262,436 279,436 266,446 271,462 256,453 241,462 246,446 233,436 250,436" fill="#EC4899" fill-opacity="0.5" stroke="#EC4899" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Panel 6 (middle-right-bottom, square) -->
  <rect x="282" y="352" width="200" height="25" fill="#EC4899" fill-opacity="0.05"/>

  <!-- Panel borders neon glow overlay -->
  <rect x="30" y="30" width="452" height="452" fill="none" stroke="#EC4899" stroke-width="4" stroke-opacity="0.2" filter="url(#panelglow)"/>

  <!-- Star highlights -->
  <circle cx="30" cy="30" r="5" fill="#EC4899" filter="url(#softglow)"/>
  <circle cx="482" cy="30" r="5" fill="#F472B6" filter="url(#softglow)"/>
  <circle cx="30" cy="482" r="5" fill="#EC4899" filter="url(#softglow)"/>
  <circle cx="482" cy="482" r="5" fill="#FB7185" filter="url(#softglow)"/>
</svg>
