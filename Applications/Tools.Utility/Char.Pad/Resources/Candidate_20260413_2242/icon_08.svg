<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- Artist palette shape (oval with thumb hole) -->
  <ellipse cx="504" cy="402" rx="336" ry="240" fill="#FFECC8" stroke="#F57F17" stroke-width="18"/>
  <!-- Thumb hole -->
  <ellipse cx="340" cy="290" rx="72" ry="56" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- Color dots on palette (each has a special char) -->
  <circle cx="390" cy="210" r="58" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="390" y="240" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">&#x2192;</text>
  <circle cx="570" cy="186" r="58" fill="#3A86FF" stroke="#1A5CC9" stroke-width="12"/>
  <text x="570" y="216" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">&#x2211;</text>
  <circle cx="738" cy="238" r="58" fill="#06D6A0" stroke="#004D40" stroke-width="12"/>
  <text x="738" y="268" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">&#xa9;</text>
  <circle cx="766" cy="432" r="58" fill="#9B59B6" stroke="#4A148C" stroke-width="12"/>
  <text x="766" y="462" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">$</text>
  <circle cx="672" cy="580" r="58" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="672" y="610" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" text-anchor="middle">&#xb2;</text>
  <circle cx="476" cy="572" r="58" fill="#FFD93D" stroke="#B8860B" stroke-width="12"/>
  <text x="476" y="600" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1A1A1A" text-anchor="middle">&#x2665;</text>
  <!-- TYPE badge -->
  <rect x="236" y="744" width="552" height="116" rx="36" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">TYPE</text>
</svg>
