<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#161B22"/>
  <!-- Layer 2: Markdown 문법 기호 격자 (4개 큰 칸) -->
  <!-- 좌상: # 헤딩 -->
  <rect x="60" y="60" width="420" height="420" rx="20" fill="#1C2128"/>
  <text x="270" y="320" font-size="280" fill="#58A6FF" text-anchor="middle" font-family="monospace" font-weight="bold">#</text>
  <!-- 우상: ** 볼드 -->
  <rect x="544" y="60" width="420" height="420" rx="20" fill="#1C2128"/>
  <text x="754" y="310" font-size="220" fill="#E8BB7A" text-anchor="middle" font-family="monospace" font-weight="bold">**</text>
  <!-- 좌하: ` 인라인코드 -->
  <rect x="60" y="544" width="420" height="420" rx="20" fill="#1C2128"/>
  <text x="270" y="800" font-size="260" fill="#7EE787" text-anchor="middle" font-family="monospace" font-weight="bold">`</text>
  <!-- 우하: [] 링크/이미지 -->
  <rect x="544" y="544" width="420" height="420" rx="20" fill="#1C2128"/>
  <text x="754" y="800" font-size="220" fill="#F778BA" text-anchor="middle" font-family="monospace" font-weight="bold">[]</text>
  <!-- Layer 3: 격자 구분선 -->
  <rect x="492" y="60" width="40" height="904" rx="8" fill="#161B22"/>
  <rect x="60" y="492" width="904" height="40" rx="8" fill="#161B22"/>
</svg>
