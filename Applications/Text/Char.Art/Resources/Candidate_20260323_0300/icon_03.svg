<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Char.Art | 문자 밀도 그라데이션 스케일 | 기하학 | #1E0A3C -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1E0A3C"/>
  <!-- Layer 2: Character density gradient blocks (dark to bright) -->
  <!-- 8 columns, each getting brighter/denser -->
  <rect x="120" y="280" width="98" height="440" rx="8" fill="#10082A"/>
  <text x="169" y="360" font-family="Consolas,monospace" font-size="16" fill="#A855F7" text-anchor="middle">  </text>
  <text x="169" y="390" font-family="Consolas,monospace" font-size="16" fill="#A855F7" text-anchor="middle">  </text>
  <text x="169" y="420" font-family="Consolas,monospace" font-size="16" fill="#A855F7" text-anchor="middle">. </text>
  <text x="169" y="450" font-family="Consolas,monospace" font-size="16" fill="#A855F7" text-anchor="middle">.</text>
  <rect x="230" y="280" width="98" height="440" rx="8" fill="#150A30"/>
  <text x="279" y="360" font-family="Consolas,monospace" font-size="18" fill="#C084FC" text-anchor="middle">. .</text>
  <text x="279" y="390" font-family="Consolas,monospace" font-size="18" fill="#C084FC" text-anchor="middle">: .</text>
  <text x="279" y="420" font-family="Consolas,monospace" font-size="18" fill="#C084FC" text-anchor="middle">:.</text>
  <text x="279" y="450" font-family="Consolas,monospace" font-size="18" fill="#C084FC" text-anchor="middle">::</text>
  <rect x="340" y="280" width="98" height="440" rx="8" fill="#1A0A38"/>
  <text x="389" y="360" font-family="Consolas,monospace" font-size="18" fill="#D946EF" text-anchor="middle">::</text>
  <text x="389" y="390" font-family="Consolas,monospace" font-size="18" fill="#D946EF" text-anchor="middle">;::</text>
  <text x="389" y="420" font-family="Consolas,monospace" font-size="18" fill="#D946EF" text-anchor="middle">;;:</text>
  <text x="389" y="450" font-family="Consolas,monospace" font-size="18" fill="#D946EF" text-anchor="middle">--;</text>
  <rect x="450" y="280" width="98" height="440" rx="8" fill="#200A40"/>
  <text x="499" y="360" font-family="Consolas,monospace" font-size="18" fill="#E879F9" text-anchor="middle">--=</text>
  <text x="499" y="390" font-family="Consolas,monospace" font-size="18" fill="#E879F9" text-anchor="middle">==-</text>
  <text x="499" y="420" font-family="Consolas,monospace" font-size="18" fill="#E879F9" text-anchor="middle">+==</text>
  <text x="499" y="450" font-family="Consolas,monospace" font-size="18" fill="#E879F9" text-anchor="middle">++=</text>
  <rect x="560" y="280" width="98" height="440" rx="8" fill="#2A1050"/>
  <text x="609" y="360" font-family="Consolas,monospace" font-size="18" fill="#F0ABFC" text-anchor="middle">##$</text>
  <text x="609" y="390" font-family="Consolas,monospace" font-size="18" fill="#F0ABFC" text-anchor="middle">$##</text>
  <text x="609" y="420" font-family="Consolas,monospace" font-size="18" fill="#F0ABFC" text-anchor="middle">@##</text>
  <text x="609" y="450" font-family="Consolas,monospace" font-size="18" fill="#F0ABFC" text-anchor="middle">##@</text>
  <rect x="670" y="280" width="98" height="440" rx="8" fill="#351260"/>
  <text x="719" y="360" font-family="Consolas,monospace" font-size="18" fill="#F5D0FE" text-anchor="middle">@@@</text>
  <text x="719" y="390" font-family="Consolas,monospace" font-size="18" fill="#F5D0FE" text-anchor="middle">@@@</text>
  <text x="719" y="420" font-family="Consolas,monospace" font-size="18" fill="#F5D0FE" text-anchor="middle">@@@</text>
  <text x="719" y="450" font-family="Consolas,monospace" font-size="18" fill="#F5D0FE" text-anchor="middle">@@@</text>
  <rect x="780" y="280" width="98" height="440" rx="8" fill="#3D1470"/>
  <text x="829" y="360" font-family="Consolas,monospace" font-size="16" fill="white" text-anchor="middle">████</text>
  <text x="829" y="390" font-family="Consolas,monospace" font-size="16" fill="white" text-anchor="middle">████</text>
  <text x="829" y="420" font-family="Consolas,monospace" font-size="16" fill="white" text-anchor="middle">████</text>
  <text x="829" y="450" font-family="Consolas,monospace" font-size="16" fill="white" text-anchor="middle">████</text>
  <!-- Layer 3: Labels -->
  <text x="169" y="768" font-family="Arial,sans-serif" font-size="16" fill="#7C3AED" text-anchor="middle">어두움</text>
  <text x="829" y="768" font-family="Arial,sans-serif" font-size="16" fill="#F0ABFC" text-anchor="middle">밝음</text>
  <!-- Gradient arrow -->
  <line x1="200" y1="780" x2="800" y2="780" stroke="none"/>
  <defs>
    <linearGradient id="densityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#F5D0FE"/>
    </linearGradient>
  </defs>
  <rect x="180" y="800" width="664" height="16" rx="8" fill="url(#densityGrad)"/>
</svg>
