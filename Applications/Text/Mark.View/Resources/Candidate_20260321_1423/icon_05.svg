<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282A36"/>
      <stop offset="100%" stop-color="#1E1F29"/>
    </linearGradient>
    <clipPath id="c5d"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5d)"/>
  <circle cx="820" cy="200" r="250" fill="#BD93F9" opacity="0.07" clip-path="url(#c5d)"/>

  <!-- Layer 2: Dracula 테마 코드블록 + 텍스트 뷰 (공간/장면) -->
  <!-- 문서 전체 영역 -->
  <rect x="155" y="210" width="714" height="574" rx="16" fill="#1E1F29"/>
  <rect x="155" y="210" width="714" height="574" rx="16" fill="none" stroke="#44475A" stroke-width="3"/>

  <!-- H1 헤더 -->
  <text x="194" y="278" font-family="Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#FF79C6">Getting Started</text>
  <line x1="194" y1="288" x2="826" y2="288" stroke="#44475A" stroke-width="2"/>

  <!-- 본문 -->
  <text x="194" y="320" font-family="Segoe UI,sans-serif" font-size="17" fill="#F8F8F2">Install and configure your environment</text>
  <text x="194" y="348" font-family="Segoe UI,sans-serif" font-size="17" fill="#F8F8F2">before running the app.</text>

  <!-- 코드블록 (Dracula 스타일) -->
  <rect x="194" y="365" width="636" height="160" rx="10" fill="#1E1F29" stroke="#44475A" stroke-width="2"/>
  <!-- 코드블록 상단 언어 표시 -->
  <rect x="194" y="365" width="636" height="28" rx="10" fill="#313442"/>
  <rect x="194" y="379" width="636" height="14" fill="#313442"/>
  <text x="214" y="383" font-family="Consolas,monospace" font-size="14" fill="#6272A4">csharp</text>

  <!-- 코드 내용 -->
  <text x="214" y="418" font-family="Consolas,monospace" font-size="16" fill="#FF79C6">var </text>
  <text x="244" y="418" font-family="Consolas,monospace" font-size="16" fill="#F8F8F2">renderer = </text>
  <text x="360" y="418" font-family="Consolas,monospace" font-size="16" fill="#50FA7B">new </text>
  <text x="400" y="418" font-family="Consolas,monospace" font-size="16" fill="#8BE9FD">MarkdownRenderer</text>
  <text x="656" y="418" font-family="Consolas,monospace" font-size="16" fill="#F8F8F2">();</text>

  <text x="214" y="448" font-family="Consolas,monospace" font-size="16" fill="#FF79C6">var </text>
  <text x="244" y="448" font-family="Consolas,monospace" font-size="16" fill="#F8F8F2">html = renderer.</text>
  <text x="430" y="448" font-family="Consolas,monospace" font-size="16" fill="#50FA7B">RenderToHtml</text>
  <text x="570" y="448" font-family="Consolas,monospace" font-size="16" fill="#F8F8F2">(md,</text>
  <text x="214" y="476" font-family="Consolas,monospace" font-size="16" fill="#6272A4">    // theme: "dracula"</text>
  <text x="214" y="504" font-family="Consolas,monospace" font-size="16" fill="#FFB86C">"dracula"</text>
  <text x="290" y="504" font-family="Consolas,monospace" font-size="16" fill="#F8F8F2">);</text>

  <!-- 인용구 (Dracula 핑크 왼쪽 바) -->
  <rect x="194" y="543" width="8" height="56" rx="4" fill="#FF79C6"/>
  <text x="216" y="565" font-family="Segoe UI,sans-serif" font-size="16" fill="#6272A4">Live Markdown preview with</text>
  <text x="216" y="590" font-family="Segoe UI,sans-serif" font-size="16" fill="#6272A4">syntax highlighting.</text>

  <!-- 체크박스 리스트 -->
  <rect x="194" y="615" width="16" height="16" rx="3" fill="#44475A" stroke="#6272A4" stroke-width="2"/>
  <path d="M 196,623 L 201,628 L 210,618" stroke="#50FA7B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="222" y="628" font-family="Segoe UI,sans-serif" font-size="15" fill="#F8F8F2">Multiple themes</text>

  <rect x="194" y="645" width="16" height="16" rx="3" fill="#44475A" stroke="#6272A4" stroke-width="2"/>
  <path d="M 196,653 L 201,658 L 210,648" stroke="#50FA7B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="222" y="658" font-family="Segoe UI,sans-serif" font-size="15" fill="#F8F8F2">Task list support</text>

  <!-- Layer 3: Dracula 로고 배지 -->
  <rect x="194" y="710" width="160" height="36" rx="10" fill="#282A36" stroke="#BD93F9" stroke-width="2"/>
  <text x="274" y="733" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" fill="#BD93F9">Dracula theme</text>
</svg>
