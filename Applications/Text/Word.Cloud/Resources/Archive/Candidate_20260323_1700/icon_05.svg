<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1C0700"/>
  <!-- Layer 2: 별 모양 마스크 안에 단어들 -->
  <defs>
    <clipPath id="star">
      <polygon points="512,80 612,360 912,360 672,540 760,820 512,640 264,820 352,540 112,360 412,360"/>
    </clipPath>
  </defs>
  <polygon points="512,80 612,360 912,360 672,540 760,820 512,640 264,820 352,540 112,360 412,360" fill="#451A00"/>
  <polygon points="512,80 612,360 912,360 672,540 760,820 512,640 264,820 352,540 112,360 412,360" fill="none" stroke="#F97316" stroke-width="14"/>
  <!-- 별 안 단어들 -->
  <text x="512" y="380" font-size="90" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#star)">word</text>
  <text x="370" y="480" font-size="54" fill="#FED7AA" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#star)">cloud</text>
  <text x="660" y="460" font-size="42" fill="#FBBF24" text-anchor="middle" font-family="Arial" clip-path="url(#star)">text</text>
  <text x="512" y="570" font-size="68" fill="#FDE68A" text-anchor="middle" font-weight="bold" font-family="Arial" clip-path="url(#star)">visual</text>
  <text x="310" y="630" font-size="36" fill="#FCD34D" text-anchor="middle" font-family="Arial" clip-path="url(#star)">big</text>
  <text x="700" y="610" font-size="32" fill="#FDE68A" text-anchor="middle" font-family="Arial" clip-path="url(#star)">data</text>
  <text x="512" y="700" font-size="44" fill="#FCD34D" text-anchor="middle" font-family="Arial" clip-path="url(#star)">size</text>
  <!-- Layer 3: 그라데이션 오버레이 힌트 -->
  <polygon points="512,80 612,360 912,360 672,540 760,820 512,640 264,820 352,540 112,360 412,360" fill="none" stroke="#F97316" stroke-width="14"/>
</svg>
