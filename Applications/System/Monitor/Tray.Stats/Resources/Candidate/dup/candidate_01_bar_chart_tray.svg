<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#4499ff"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00aa44"/>
      <stop offset="100%" stop-color="#44dd88"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cc6600"/>
      <stop offset="100%" stop-color="#ff9933"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor outline -->
  <rect x="80" y="90" width="352" height="260" rx="16" fill="#1e2a3a" stroke="#2a3a4a" stroke-width="3"/>
  <!-- Screen area -->
  <rect x="96" y="106" width="320" height="228" rx="8" fill="#0d1520"/>
  <!-- Grid lines on screen -->
  <line x1="96" y1="170" x2="416" y2="170" stroke="#1a2a3a" stroke-width="1"/>
  <line x1="96" y1="220" x2="416" y2="220" stroke="#1a2a3a" stroke-width="1"/>
  <line x1="96" y1="270" x2="416" y2="270" stroke="#1a2a3a" stroke-width="1"/>
  <!-- CPU Bar (blue) -->
  <rect x="115" y="140" width="56" height="194" rx="4" fill="#0d1a28"/>
  <rect x="115" y="220" width="56" height="114" rx="4" fill="url(#bar1)"/>
  <!-- Memory Bar (green) -->
  <rect x="195" y="140" width="56" height="194" rx="4" fill="#0d1a28"/>
  <rect x="195" y="180" width="56" height="154" rx="4" fill="url(#bar2)"/>
  <!-- Disk Bar (orange) -->
  <rect x="275" y="140" width="56" height="194" rx="4" fill="#0d1a28"/>
  <rect x="275" y="256" width="56" height="78" rx="4" fill="url(#bar3)"/>
  <!-- Net Bar (purple) -->
  <rect x="355" y="140" width="46" height="194" rx="4" fill="#0d1a28"/>
  <rect x="355" y="298" width="46" height="36" rx="4" fill="#8844ff"/>
  <!-- Labels -->
  <text x="143" y="352" font-size="18" fill="#4499ff" font-family="monospace" text-anchor="middle">CPU</text>
  <text x="223" y="352" font-size="18" fill="#44dd88" font-family="monospace" text-anchor="middle">MEM</text>
  <text x="303" y="352" font-size="18" fill="#ff9933" font-family="monospace" text-anchor="middle">DSK</text>
  <text x="378" y="352" font-size="18" fill="#aa66ff" font-family="monospace" text-anchor="middle">NET</text>
  <!-- Monitor stand -->
  <rect x="228" y="350" width="56" height="40" rx="4" fill="#1e2a3a"/>
  <rect x="192" y="385" width="128" height="16" rx="8" fill="#2a3a4a"/>
  <!-- Tray icon in system tray indicator -->
  <rect x="148" y="420" width="216" height="42" rx="8" fill="#1a2535"/>
  <rect x="160" y="430" width="22" height="22" rx="4" fill="#4499ff" opacity="0.9"/>
  <rect x="192" y="430" width="22" height="22" rx="4" fill="#44dd88" opacity="0.9"/>
  <rect x="224" y="430" width="22" height="22" rx="4" fill="#ff9933" opacity="0.9"/>
  <text x="260" y="446" font-size="14" fill="#888" font-family="monospace">11:32</text>
</svg>