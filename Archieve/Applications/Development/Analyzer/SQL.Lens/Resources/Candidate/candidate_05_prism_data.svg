<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#101020"/>
    </linearGradient>
    <linearGradient id="prism" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CCDDFF"/>
      <stop offset="100%" style="stop-color:#8899CC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Prism triangle -->
  <polygon points="256,100 100,360 412,360" fill="url(#prism)" opacity="0.15" stroke="#8899CC" stroke-width="3"/>
  <!-- Light beam in -->
  <line x1="80" y1="230" x2="188" y2="230" stroke="white" stroke-width="4" opacity="0.8"/>
  <!-- Dispersed rainbow beams out -->
  <line x1="330" y1="280" x2="440" y2="220" stroke="#FF4444" stroke-width="4" opacity="0.8"/>
  <line x1="330" y1="290" x2="440" y2="255" stroke="#FF8800" stroke-width="4" opacity="0.8"/>
  <line x1="330" y1="300" x2="440" y2="285" stroke="#FFFF00" stroke-width="4" opacity="0.8"/>
  <line x1="330" y1="310" x2="440" y2="316" stroke="#44FF44" stroke-width="4" opacity="0.8"/>
  <line x1="330" y1="318" x2="440" y2="347" stroke="#4488FF" stroke-width="4" opacity="0.8"/>
  <line x1="330" y1="326" x2="440" y2="378" stroke="#8844FF" stroke-width="4" opacity="0.8"/>
  <!-- SQL tables as data points -->
  <rect x="100" y="390" width="80" height="30" rx="5" fill="#1A2233" stroke="#4466AA" stroke-width="1"/>
  <text x="140" y="410" text-anchor="middle" font-family="monospace" font-size="12" fill="#6688CC">SELECT</text>
  <rect x="196" y="390" width="70" height="30" rx="5" fill="#1A2233" stroke="#4466AA" stroke-width="1"/>
  <text x="231" y="410" text-anchor="middle" font-family="monospace" font-size="12" fill="#6688CC">FROM</text>
  <rect x="282" y="390" width="80" height="30" rx="5" fill="#1A2233" stroke="#4466AA" stroke-width="1"/>
  <text x="322" y="410" text-anchor="middle" font-family="monospace" font-size="12" fill="#6688CC">WHERE</text>
  <!-- Lens highlight -->
  <circle cx="188" cy="230" r="22" fill="none" stroke="#CCDDFF" stroke-width="3" opacity="0.7"/>
  <text x="256" y="80" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22" fill="#AABBCC">SQL.Lens</text>
</svg>
