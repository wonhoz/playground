<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Server rack -->
  <rect x="120" y="140" width="272" height="60" rx="8" fill="url(#glow)" opacity="0.9"/>
  <rect x="120" y="220" width="272" height="60" rx="8" fill="url(#glow)" opacity="0.75"/>
  <rect x="120" y="300" width="272" height="60" rx="8" fill="url(#glow)" opacity="0.6"/>
  <!-- LED lights -->
  <circle cx="345" cy="170" r="7" fill="#69F0AE"/>
  <circle cx="365" cy="170" r="7" fill="#69F0AE"/>
  <circle cx="345" cy="250" r="7" fill="#69F0AE"/>
  <circle cx="365" cy="250" r="7" fill="#FFF176"/>
  <circle cx="345" cy="330" r="7" fill="#FF5252"/>
  <circle cx="365" cy="330" r="7" fill="#69F0AE"/>
  <!-- Broadcast waves -->
  <path d="M256 390 Q256 390 256 410" stroke="#42A5F5" stroke-width="3" fill="none"/>
  <path d="M230 400 Q256 370 282 400" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M205 415 Q256 360 307 415" stroke="#42A5F5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M180 430 Q256 350 332 430" stroke="#42A5F5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Drive slots -->
  <rect x="140" y="158" width="60" height="24" rx="4" fill="#0D47A1"/>
  <rect x="210" y="158" width="60" height="24" rx="4" fill="#0D47A1"/>
