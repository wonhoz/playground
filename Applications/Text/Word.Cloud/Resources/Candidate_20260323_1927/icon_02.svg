<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg02)"/>
  <!-- Oval container -->
  <ellipse cx="512" cy="512" rx="360" ry="290" fill="rgba(255,255,255,0.12)"/>
  <ellipse cx="512" cy="512" rx="360" ry="290" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <!-- WORD - largest, white -->
  <text x="512" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="200" font-weight="900" fill="#FFFFFF">WORD</text>
  <!-- CLOUD - medium, yellow -->
  <text x="512" y="560" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#FDE68A">CLOUD</text>
  <!-- TEXT - smaller, orange -->
  <text x="512" y="654" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="76" font-weight="700" fill="#FB923C">TEXT</text>
  <!-- DATA - smallest, light -->
  <text x="512" y="720" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="700" fill="rgba(255,255,255,0.7)">DATA</text>
</svg>
