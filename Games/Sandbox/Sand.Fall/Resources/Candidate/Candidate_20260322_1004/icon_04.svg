<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04 | metaphor | 중력의 손 — 물질 낙하 -->
  <!-- 컨셉: 손에서 세 가지 물질(모래/물/불)이 서로 다른 궤적으로 흘러내림 -->
  <!-- 물질마다 낙하 패턴이 다름을 픽셀 도트로 시각화 -->

  <!-- 배경: 깊은 보라-남색 그라데이션 느낌 -->
  <rect x="80" y="80" width="864" height="864" rx="160" fill="#0E0820"/>
  <!-- 미세 그레인 오버레이 -->
  <rect x="80" y="80" width="864" height="864" rx="160" fill="url(#grain)" opacity="0.08"/>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#0A0510"/>
    </radialGradient>
  </defs>
  <rect x="80" y="80" width="864" height="864" rx="160" fill="url(#bgGlow)"/>

