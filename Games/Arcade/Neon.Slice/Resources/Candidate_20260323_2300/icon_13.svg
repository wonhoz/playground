<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg13" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <clipPath id="clip13">
      <rect x="0" y="0" width="1024" height="1024" rx="190"/>
    </clipPath>
    <filter id="glow13" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow13lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" fill="url(#bg13)" rx="190"/>

  <g clip-path="url(#clip13)">
    <!-- 파티클 이펙트 — 조각들 (크고 밝은 것들) -->

    <!-- 큰 조각들 (오각형, 삼각형, 마름모) -->
    <g filter="url(#glow13lg)">
      <!-- 중앙 큰 폭발 -->
      <polygon points="512,380 560,470 660,470 580,530 610,630 512,570 414,630 444,530 364,470 464,470"
               fill="#7DD3FC" opacity="0.9"/>
    </g>

    <!-- 산란된 큰 조각들 -->
    <g filter="url(#glow13)" opacity="0.95">
      <!-- 상단 좌 -->
      <polygon points="230,220 270,260 230,300 190,260" fill="#FDE68A"/>
      <!-- 상단 우 -->
      <polygon points="760,180 800,240 740,260 720,200" fill="#7DD3FC"/>
      <!-- 좌 중간 -->
      <polygon points="170,480 220,520 180,560" fill="#FDE68A"/>
      <!-- 우 중간 -->
      <polygon points="820,450 870,490 840,530" fill="#FDE68A"/>
      <!-- 하단 좌 -->
      <polygon points="250,720 300,740 280,790 230,770" fill="#7DD3FC"/>
      <!-- 하단 우 -->
      <polygon points="730,730 780,720 800,770 750,780" fill="#FDE68A"/>
      <!-- 상단 중간 -->
      <polygon points="490,160 530,160 520,210 480,210" fill="#FFFFFF" opacity="0.8"/>
      <!-- 하단 중간 -->
      <polygon points="480,820 540,820 530,870 490,870" fill="#7DD3FC"/>
    </g>

    <!-- 중간 조각들 -->
    <g filter="url(#glow13)" fill="#7DD3FC" opacity="0.8">
      <circle cx="310" cy="350" r="22"/>
      <circle cx="690" cy="320" r="18"/>
      <circle cx="280" cy="610" r="20"/>
      <circle cx="730" cy="600" r="16"/>
      <circle cx="420" cy="760" r="18"/>
      <circle cx="600" cy="770" r="14"/>
    </g>

    <!-- 작은 파티클들 -->
    <g fill="#FFFFFF" opacity="0.7">
      <circle cx="360" cy="270" r="10"/>
      <circle cx="640" cy="250" r="8"/>
      <circle cx="200" cy="400" r="9"/>
      <circle cx="800" cy="380" r="7"/>
      <circle cx="350" cy="650" r="11"/>
      <circle cx="660" cy="670" r="9"/>
      <circle cx="440" cy="840" r="8"/>
      <circle cx="560" cy="150" r="10"/>
    </g>

    <!-- 슬라이스 방사형 궤적 (중앙에서 폭발) -->
    <g filter="url(#glow13)" stroke="#FDE68A" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7">
      <line x1="512" y1="512" x2="230" y2="240"/>
      <line x1="512" y1="512" x2="780" y2="200"/>
      <line x1="512" y1="512" x2="880" y2="512"/>
      <line x1="512" y1="512" x2="780" y2="800"/>
      <line x1="512" y1="512" x2="240" y2="780"/>
      <line x1="512" y1="512" x2="140" y2="512"/>
    </g>

    <!-- 중앙 폭발 코어 -->
    <g filter="url(#glow13lg)">
      <circle cx="512" cy="512" r="60" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="512" cy="512" r="35" fill="#FDE68A"/>
    </g>
  </g>
</svg>
