<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06040F"/>
      <stop offset="100%" stop-color="#100820"/>
    </linearGradient>
    <linearGradient id="flowRead" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="flowWrite" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <radialGradient id="driveGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0E1A"/>
    </radialGradient>
    <radialGradient id="cpuGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14532D"/>
      <stop offset="100%" stop-color="#052E16"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Drive icon (left) -->
  <rect x="60" y="210" width="110" height="90" rx="12" fill="url(#driveGrad)" stroke="#6366F1" stroke-width="2.5"/>
  <circle cx="105" cy="255" r="28" fill="#312E81" stroke="#818CF8" stroke-width="2"/>
  <circle cx="105" cy="255" r="10" fill="#4F46E5"/>
  <line x1="105" y1="255" x2="126" y2="240" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
  <!-- Drive label -->
  <text x="115" y="290" font-family="monospace" font-size="10" fill="#A5B4FC">NVMe</text>
  <!-- CPU/RAM icon (right) -->
  <rect x="342" y="210" width="110" height="90" rx="12" fill="url(#cpuGrad)" stroke="#22C55E" stroke-width="2.5"/>
  <rect x="366" y="230" width="62" height="50" rx="4" fill="#166534" stroke="#4ADE80" stroke-width="1.5"/>
  <!-- CPU pins -->
  <line x1="376" y1="230" x2="376" y2="220" stroke="#4ADE80" stroke-width="2"/>
  <line x1="396" y1="230" x2="396" y2="220" stroke="#4ADE80" stroke-width="2"/>
  <line x1="416" y1="230" x2="416" y2="220" stroke="#4ADE80" stroke-width="2"/>
  <line x1="376" y1="280" x2="376" y2="290" stroke="#4ADE80" stroke-width="2"/>
  <line x1="396" y1="280" x2="396" y2="290" stroke="#4ADE80" stroke-width="2"/>
  <line x1="416" y1="280" x2="416" y2="290" stroke="#4ADE80" stroke-width="2"/>
  <text x="397" y="259" font-family="monospace" font-size="9" fill="#86EFAC" text-anchor="middle">CPU</text>
  <!-- READ flow arrow (drive -> CPU, blue) -->
  <path d="M174,242 Q256,210 340,242" fill="none" stroke="url(#flowRead)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="336,234 348,242 336,250" fill="#22D3EE"/>
  <!-- Read speed label -->
  <rect x="192" y="192" width="128" height="26" rx="8" fill="#0C1A3A"/>
  <text x="256" y="210" font-family="monospace" font-size="12" fill="#22D3EE" text-anchor="middle">5,542 MB/s R</text>
  <!-- WRITE flow arrow (CPU -> drive, orange) -->
  <path d="M340,270 Q256,302 174,270" fill="none" stroke="url(#flowWrite)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="178,278 166,270 178,262" fill="#FB923C"/>
  <!-- Write speed label -->
  <rect x="192" y="290" width="128" height="26" rx="8" fill="#2D1200"/>
  <text x="256" y="308" font-family="monospace" font-size="12" fill="#FB923C" text-anchor="middle">4,128 MB/s W</text>
  <!-- IOPS stats at bottom -->
  <rect x="80" y="370" width="140" height="50" rx="10" fill="#0C1A3A" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="150" y="392" font-family="monospace" font-size="11" fill="#38BDF8" text-anchor="middle">Rnd 4K R</text>
  <text x="150" y="410" font-family="monospace" font-size="12" fill="#7DD3FC" text-anchor="middle" font-weight="bold">680K IOPS</text>
  <rect x="292" y="370" width="140" height="50" rx="10" fill="#2D1200" stroke="#F97316" stroke-width="1.5"/>
  <text x="362" y="392" font-family="monospace" font-size="11" fill="#FB923C" text-anchor="middle">Rnd 4K W</text>
  <text x="362" y="410" font-family="monospace" font-size="12" fill="#FCA5A5" text-anchor="middle" font-weight="bold">520K IOPS</text>
</svg>
