<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0030"/>
      <stop offset="100%" style="stop-color:#2d0060"/>
    </linearGradient>
    <linearGradient id="dial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <radialGradient id="dial-face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#1a0030"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dial outer ring -->
  <circle cx="256" cy="256" r="170" fill="url(#dial)" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="165" fill="url(#dial-face)"/>
  <!-- Dial tick marks -->
  <g opacity="0.7">
    <line x1="256" y1="96" x2="256" y2="116" stroke="#ce93d8" stroke-width="3"/>
    <line x1="256" y1="396" x2="256" y2="416" stroke="#ce93d8" stroke-width="3"/>
    <line x1="96" y1="256" x2="116" y2="256" stroke="#ce93d8" stroke-width="3"/>
    <line x1="396" y1="256" x2="416" y2="256" stroke="#ce93d8" stroke-width="3"/>
  </g>
  <g opacity="0.5">
    <line x1="176" y1="116" x2="183" y2="134" stroke="#ce93d8" stroke-width="2"/>
    <line x1="116" y1="176" x2="134" y2="183" stroke="#ce93d8" stroke-width="2"/>
    <line x1="336" y1="116" x2="329" y2="134" stroke="#ce93d8" stroke-width="2"/>
    <line x1="396" y1="176" x2="378" y2="183" stroke="#ce93d8" stroke-width="2"/>
    <line x1="116" y1="336" x2="134" y2="329" stroke="#ce93d8" stroke-width="2"/>
    <line x1="176" y1="396" x2="183" y2="378" stroke="#ce93d8" stroke-width="2"/>
    <line x1="396" y1="336" x2="378" y2="329" stroke="#ce93d8" stroke-width="2"/>
    <line x1="336" y1="396" x2="329" y2="378" stroke="#ce93d8" stroke-width="2"/>
  </g>
  <!-- Transparency arc (0 to 75%) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#e040fb" stroke-width="12" stroke-dasharray="659 220" stroke-dashoffset="-55" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <!-- Dial needle -->
  <line x1="256" y1="256" x2="354" y2="158" stroke="#f3e5f5" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="20" fill="url(#dial)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="#1a0030"/>
  <!-- Window preview with opacity effect -->
  <rect x="156" y="276" width="200" height="120" rx="8" fill="#9c27b0" opacity="0.15" stroke="#ce93d8" stroke-width="1.5"/>
  <!-- Opacity fade pattern inside preview -->
  <rect x="160" y="280" width="192" height="112" rx="6" fill="url(#dial-face)" opacity="0.5"/>
</svg>