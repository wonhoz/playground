<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001A18"/>
      <stop offset="100%" stop-color="#000A08"/>
    </radialGradient>
    <radialGradient id="teal_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFCC" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#00DDAA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="explosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00FFCC" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#00AA88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strong_glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur5s">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>

  <!-- 스크롤 별 배경 (세로 스트릭 암시) -->
  <!-- 긴 별 스트릭들 -->
  <line x1="230" y1="200" x2="230" y2="230" stroke="#AAFFEE" stroke-width="1.5" opacity="0.5"/>
  <line x1="310" y1="215" x2="310" y2="240" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="200" x2="420" y2="232" stroke="#AAFFEE" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="205" x2="600" y2="230" stroke="#AAFFEE" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="200" x2="700" y2="235" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="790" y1="210" x2="790" y2="238" stroke="#AAFFEE" stroke-width="1" opacity="0.4"/>
  <line x1="215" y1="400" x2="215" y2="420" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="380" x2="820" y2="405" stroke="#AAFFEE" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="600" x2="200" y2="625" stroke="#AAFFEE" stroke-width="1" opacity="0.4"/>
  <line x1="830" y1="620" x2="830" y2="648" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="780" x2="250" y2="808" stroke="#AAFFEE" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="800" x2="360" y2="825" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="660" y1="790" x2="660" y2="818" stroke="#AAFFEE" stroke-width="1" opacity="0.5"/>
  <line x1="760" y1="795" x2="760" y2="820" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>

  <!-- 별 점들 -->
  <circle cx="230" cy="200" r="2.5" fill="#AAFFEE" opacity="0.8"/>
  <circle cx="310" cy="215" r="1.8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="420" cy="200" r="2" fill="#AAFFEE" opacity="0.7"/>
  <circle cx="600" cy="205" r="1.5" fill="#AAFFEE" opacity="0.6"/>
  <circle cx="700" cy="200" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="790" cy="210" r="1.8" fill="#AAFFEE" opacity="0.5"/>
  <circle cx="215" cy="400" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="820" cy="380" r="2" fill="#AAFFEE" opacity="0.6"/>
  <circle cx="200" cy="600" r="1.5" fill="#AAFFEE" opacity="0.5"/>
  <circle cx="830" cy="620" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="250" cy="780" r="1.5" fill="#AAFFEE" opacity="0.5"/>
  <circle cx="660" cy="790" r="2" fill="#AAFFEE" opacity="0.6"/>
  <circle cx="760" cy="795" r="1.5" fill="#FFFFFF" opacity="0.5"/>

  <!-- 메인 오브젝트 레이어 -->

  <!-- 폭발 파티클 글로우 (청록 Color.FromRgb(0,255,204) 파티클) -->
  <circle cx="512" cy="512" r="220" fill="url(#teal_core)"/>

  <!-- 폭발 파티클들 (산발적으로 퍼짐) -->
  <!-- 위쪽 파티클들 -->
  <ellipse cx="512" cy="355" rx="6" ry="16" fill="#00FFCC" opacity="0.85" filter="url(#glow5)"/>
  <ellipse cx="475" cy="370" rx="5" ry="12" fill="#00FFCC" opacity="0.75" transform="rotate(-20 475 370)"/>
  <ellipse cx="549" cy="370" rx="5" ry="12" fill="#00FFCC" opacity="0.75" transform="rotate(20 549 370)"/>
  <ellipse cx="446" cy="390" rx="4" ry="10" fill="#00DDAA" opacity="0.6" transform="rotate(-35 446 390)"/>
  <ellipse cx="578" cy="390" rx="4" ry="10" fill="#00DDAA" opacity="0.6" transform="rotate(35 578 390)"/>

  <!-- 아래쪽 파티클들 -->
  <ellipse cx="512" cy="669" rx="6" ry="16" fill="#00FFCC" opacity="0.85" filter="url(#glow5)"/>
  <ellipse cx="475" cy="654" rx="5" ry="12" fill="#00FFCC" opacity="0.75" transform="rotate(20 475 654)"/>
  <ellipse cx="549" cy="654" rx="5" ry="12" fill="#00FFCC" opacity="0.75" transform="rotate(-20 549 654)"/>
  <ellipse cx="446" cy="634" rx="4" ry="10" fill="#00DDAA" opacity="0.6" transform="rotate(35 446 634)"/>
  <ellipse cx="578" cy="634" rx="4" ry="10" fill="#00DDAA" opacity="0.6" transform="rotate(-35 578 634)"/>

  <!-- 왼쪽 파티클들 -->
  <ellipse cx="355" cy="512" rx="16" ry="6" fill="#00FFCC" opacity="0.85" filter="url(#glow5)"/>
  <ellipse cx="370" cy="475" rx="12" ry="5" fill="#00FFCC" opacity="0.75" transform="rotate(20 370 475)"/>
  <ellipse cx="370" cy="549" rx="12" ry="5" fill="#00FFCC" opacity="0.75" transform="rotate(-20 370 549)"/>

  <!-- 오른쪽 파티클들 -->
  <ellipse cx="669" cy="512" rx="16" ry="6" fill="#00FFCC" opacity="0.85" filter="url(#glow5)"/>
  <ellipse cx="654" cy="475" rx="12" ry="5" fill="#00FFCC" opacity="0.75" transform="rotate(-20 654 475)"/>
  <ellipse cx="654" cy="549" rx="12" ry="5" fill="#00FFCC" opacity="0.75" transform="rotate(20 654 549)"/>

  <!-- 대각 파티클들 -->
  <ellipse cx="392" cy="392" rx="4" ry="14" fill="#00FFCC" opacity="0.75" transform="rotate(-45 392 392)" filter="url(#glow5)"/>
  <ellipse cx="632" cy="392" rx="4" ry="14" fill="#00FFCC" opacity="0.75" transform="rotate(45 632 392)" filter="url(#glow5)"/>
  <ellipse cx="392" cy="632" rx="4" ry="14" fill="#00FFCC" opacity="0.75" transform="rotate(45 392 632)" filter="url(#glow5)"/>
  <ellipse cx="632" cy="632" rx="4" ry="14" fill="#00FFCC" opacity="0.75" transform="rotate(-45 632 632)" filter="url(#glow5)"/>

  <!-- 외곽 총알들 (원형) -->
  <circle cx="512" cy="250" r="15" fill="#00FFCC" filter="url(#strong_glow)" opacity="0.9"/>
  <circle cx="512" cy="774" r="15" fill="#00FFCC" filter="url(#strong_glow)" opacity="0.9"/>
  <circle cx="250" cy="512" r="15" fill="#00FFCC" filter="url(#strong_glow)" opacity="0.9"/>
  <circle cx="774" cy="512" r="15" fill="#00FFCC" filter="url(#strong_glow)" opacity="0.9"/>

  <circle cx="330" cy="330" r="12" fill="#00DDAA" filter="url(#glow5)" opacity="0.85"/>
  <circle cx="694" cy="330" r="12" fill="#00DDAA" filter="url(#glow5)" opacity="0.85"/>
  <circle cx="330" cy="694" r="12" fill="#00DDAA" filter="url(#glow5)" opacity="0.85"/>
  <circle cx="694" cy="694" r="12" fill="#00DDAA" filter="url(#glow5)" opacity="0.85"/>

  <!-- 디테일 레이어 -->

  <!-- 폭발 중심 코어 -->
  <circle cx="512" cy="512" r="70" fill="url(#explosion)" filter="url(#blur5s)"/>
  <circle cx="512" cy="512" r="40" fill="#00FFCC" opacity="0.15"/>

  <!-- 중앙 비행기 (파티클 위에 살아남은 비행기) -->
  <polygon points="512,450 550,558 512,538 474,558" fill="#FFFFFF" filter="url(#strong_glow)"/>
  <!-- 날개 -->
  <polygon points="474,558 448,582 512,538" fill="#AAFFEE"/>
  <polygon points="550,558 576,582 512,538" fill="#AAFFEE"/>
  <!-- 엔진 글로우 (청록) -->
  <ellipse cx="512" cy="560" rx="11" ry="18" fill="#00FFCC" opacity="0.75" filter="url(#glow5)"/>
  <ellipse cx="512" cy="558" rx="5" ry="7" fill="#FFFFFF" opacity="0.95"/>
  <!-- 조종석 -->
  <ellipse cx="512" cy="475" rx="7" ry="10" fill="#AAFFEE" opacity="0.8"/>

  <!-- 조이스틱 힌트 (하단 작은 UI 요소) -->
  <circle cx="512" cy="780" r="22" fill="none" stroke="#00FFCC" stroke-width="2" opacity="0.3"/>
  <circle cx="512" cy="780" r="8" fill="#00FFCC" opacity="0.4"/>
</svg>
