<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#DBEAFE"/>
  <!-- Layer 2: Vacuum cleaner body -->
  <!-- Nozzle (horizontal) -->
  <rect x="120" y="520" width="480" height="70" rx="20" fill="#1D4ED8"/>
  <!-- Body (large oval) -->
  <ellipse cx="700" cy="555" rx="180" ry="130" fill="#2563EB"/>
  <!-- Body highlight -->
  <ellipse cx="680" cy="510" rx="100" ry="60" fill="#3B82F6" opacity="0.5"/>
  <!-- Handle -->
  <path d="M 820 555 Q 880 520 900 440 Q 920 360 870 310" stroke="#1D4ED8" stroke-width="40" fill="none" stroke-linecap="round"/>
  <!-- Suction hose -->
  <path d="M 120 555 Q 80 500 100 440 Q 120 380 180 360" stroke="#1D4ED8" stroke-width="30" fill="none" stroke-linecap="round"/>
  <!-- Cord -->
  <path d="M 700 685 Q 720 740 680 780 Q 650 810 620 800" stroke="#1E40AF" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Layer 3: Particles being sucked in -->
  <!-- Small folder icons getting sucked in -->
  <g transform="rotate(-10 240 420)">
    <rect x="200" y="370" width="70" height="50" rx="6" fill="#F97316" opacity="0.85"/>
    <rect x="200" y="355" width="35" height="20" rx="4" fill="#F97316" opacity="0.85"/>
  </g>
  <g transform="rotate(5 340 390)">
    <rect x="310" y="340" width="60" height="44" rx="5" fill="#EF4444" opacity="0.8"/>
    <rect x="310" y="328" width="30" height="18" rx="4" fill="#EF4444" opacity="0.8"/>
  </g>
  <circle cx="200" cy="450" r="12" fill="#9CA3AF" opacity="0.5"/>
  <circle cx="280" cy="430" r="8" fill="#9CA3AF" opacity="0.4"/>
  <circle cx="360" cy="460" r="10" fill="#9CA3AF" opacity="0.45"/>
  <!-- Suction arrows -->
  <line x1="170" y1="490" x2="130" y2="545" stroke="#1D4ED8" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="250" y1="480" x2="190" y2="540" stroke="#1D4ED8" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
</svg>