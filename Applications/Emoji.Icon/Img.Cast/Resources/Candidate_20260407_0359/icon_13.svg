<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 크림 화이트 -->
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8F1"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>

  <!-- Layer 2: 사진 필름 스트립 (레이어드) -->
  <!-- 필름 스트립 메인 -->
  <rect x="100" y="320" width="570" height="380" rx="20" fill="#1A1A2E"/>
  <!-- 필름 스프로킷 (위) -->
  <rect x="120" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="200" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="280" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="360" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="440" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="520" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="600" y="310" width="50" height="30" rx="8" fill="#2D2D44"/>
  <!-- 필름 스프로킷 (아래) -->
  <rect x="120" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="200" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="280" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="360" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="440" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="520" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>
  <rect x="600" y="680" width="50" height="30" rx="8" fill="#2D2D44"/>

  <!-- 필름 프레임들 (컬러 이미지) -->
  <rect x="118" y="370" width="150" height="200" rx="8" fill="#EF5350"/>
  <text x="193" y="485" font-family="Arial Black" font-size="52" fill="white" text-anchor="middle">IMG</text>
  <rect x="288" y="370" width="150" height="200" rx="8" fill="#42A5F5"/>
  <text x="363" y="485" font-family="Arial Black" font-size="52" fill="white" text-anchor="middle">IMG</text>
  <rect x="458" y="370" width="150" height="200" rx="8" fill="#66BB6A"/>
  <text x="533" y="485" font-family="Arial Black" font-size="52" fill="white" text-anchor="middle">IMG</text>

  <!-- Layer 3: 디지털 파일 변환 (오른쪽) — 화살표 + 디지털 파일 -->
  <!-- 변환 화살표 -->
  <path d="M685,510 L810,510" stroke="#FF6D00" stroke-width="22" stroke-linecap="round"/>
  <path d="M788,480 L820,510 L788,540" stroke="#FF6D00" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 디지털 파일 아이콘들 (겹쳐진) -->
  <!-- PNG 파일 -->
  <rect x="820" y="380" width="150" height="190" rx="16" fill="#29B6F6" opacity="0.7" transform="rotate(-8, 895, 475)"/>
  <!-- JPG 파일 -->
  <rect x="840" y="400" width="150" height="190" rx="16" fill="#FFA726" opacity="0.8" transform="rotate(-2, 915, 495)"/>
  <!-- ICO 파일 (앞) -->
  <rect x="850" y="380" width="150" height="190" rx="16" fill="#7E57C2"/>
  <path d="M952,380 L1000,428 L952,428 Z" fill="#4527A0"/>
  <text x="925" y="498" font-family="Arial Black" font-size="60" fill="white" text-anchor="middle">ICO</text>
</svg>
