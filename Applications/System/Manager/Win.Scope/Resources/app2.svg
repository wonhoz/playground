<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Stacked windows (layers) -->
  <!-- Window 3 (back) -->
  <rect x="280" y="250" width="520" height="400" rx="16" fill="#E2E8F0" opacity="0.6" stroke="#CBD5E1" stroke-width="4"/>
  <rect x="280" y="250" width="520" height="40" rx="16" fill="#94A3B8" opacity="0.6"/>
  <!-- Window 2 (middle) -->
  <rect x="220" y="310" width="520" height="400" rx="16" fill="#BFDBFE" opacity="0.75" stroke="#93C5FD" stroke-width="5"/>
  <rect x="220" y="310" width="520" height="40" rx="16" fill="#60A5FA" opacity="0.75"/>
  <!-- Window 1 (front) -->
  <rect x="160" y="370" width="520" height="400" rx="16" fill="#FFFFFF" opacity="0.9" stroke="#3B82F6" stroke-width="7"/>
  <rect x="160" y="370" width="520" height="40" rx="16" fill="#3B82F6"/>
  <!-- Title bar controls -->
  <circle cx="200" cy="390" r="10" fill="#EF4444"/>
  <circle cx="228" cy="390" r="10" fill="#F59E0B"/>
  <circle cx="256" cy="390" r="10" fill="#22C55E"/>
  <!-- Window content -->
  <rect x="185" y="430" width="470" height="16" rx="4" fill="#E2E8F0"/>
  <rect x="185" y="460" width="380" height="16" rx="4" fill="#E2E8F0"/>
  <rect x="185" y="490" width="430" height="16" rx="4" fill="#E2E8F0"/>
  <!-- Magnifier -->
  <circle cx="800" cy="700" r="120" fill="none" stroke="#0284C7" stroke-width="32"/>
  <line x1="882" y1="782" x2="960" y2="860" stroke="#0284C7" stroke-width="32" stroke-linecap="round"/>
  <!-- Opacity slider hint -->
  <rect x="170" y="820" width="300" height="24" rx="12" fill="#BFDBFE"/>
  <rect x="170" y="820" width="200" height="24" rx="12" fill="#3B82F6"/>
  <circle cx="370" cy="832" r="18" fill="#FFFFFF" stroke="#3B82F6" stroke-width="6"/>
  <text x="490" y="840" font-family="Arial,sans-serif" font-size="36" fill="#0284C7">α 80%</text>
</svg>
