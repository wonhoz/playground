<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="gear1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gear2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Left gear -->
  <g transform="translate(148, 200)">
    <circle r="55" fill="url(#gear1)" opacity="0.9"/>
    <circle r="30" fill="#0f0c29"/>
    <rect x="-62" y="-12" width="24" height="24" rx="4" fill="url(#gear1)"/>
    <rect x="38" y="-12" width="24" height="24" rx="4" fill="url(#gear1)"/>
    <rect x="-12" y="-62" width="24" height="24" rx="4" fill="url(#gear1)"/>
    <rect x="-12" y="38" width="24" height="24" rx="4" fill="url(#gear1)"/>
    <rect x="-50" y="-50" width="20" height="20" rx="4" fill="url(#gear1)" transform="rotate(45)"/>
  </g>
  <!-- Right gear -->
  <g transform="translate(364, 200)">
    <circle r="45" fill="url(#gear2)" opacity="0.9"/>
    <circle r="24" fill="#0f0c29"/>
    <rect x="-52" y="-10" width="20" height="20" rx="3" fill="url(#gear2)"/>
    <rect x="32" y="-10" width="20" height="20" rx="3" fill="url(#gear2)"/>
    <rect x="-10" y="-52" width="20" height="20" rx="3" fill="url(#gear2)"/>
    <rect x="-10" y="32" width="20" height="20" rx="3" fill="url(#gear2)"/>
  </g>
  <!-- Transform arrow -->
  <path d="M210 200 L302 200" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round" stroke-dasharray="12,6"/>
  <polygon points="302,192 322,200 302,208" fill="#00f2fe"/>
  <!-- Text blocks input/output -->
  <rect x="90" y="300" width="140" height="80" rx="10" fill="#1a1a3e" stroke="#667eea" stroke-width="2"/>
  <rect x="100" y="315" width="90" height="8" rx="3" fill="#667eea" opacity="0.7"/>
  <rect x="100" y="330" width="70" height="8" rx="3" fill="#667eea" opacity="0.5"/>
  <rect x="100" y="345" width="85" height="8" rx="3" fill="#667eea" opacity="0.6"/>
  <rect x="282" y="300" width="140" height="80" rx="10" fill="#1a1a3e" stroke="#f5576c" stroke-width="2"/>
  <rect x="292" y="315" width="90" height="8" rx="3" fill="#f5576c" opacity="0.7"/>
  <rect x="292" y="330" width="65" height="8" rx="3" fill="#f093fb" opacity="0.5"/>
  <rect x="292" y="345" width="80" height="8" rx="3" fill="#f5576c" opacity="0.6"/>
</svg>