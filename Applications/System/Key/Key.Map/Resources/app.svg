<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="key1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a5a"/>
      <stop offset="100%" stop-color="#2a2a4a"/>
    </linearGradient>
    <linearGradient id="keyHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard row 1 -->
  <rect x="56" y="80" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="77" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">Q</text>
  <rect x="104" y="80" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="125" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">W</text>
  <rect x="152" y="80" width="42" height="42" rx="8" fill="url(#keyHL)"/>
  <text x="173" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="white">E</text>
  <rect x="200" y="80" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="221" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">R</text>
  <!-- Keyboard row 2 -->
  <rect x="72" y="132" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="93" y="159" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">A</text>
  <rect x="120" y="132" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="141" y="159" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">S</text>
  <rect x="168" y="132" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="189" y="159" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">D</text>
  <!-- Remap arrow -->
  <path d="M260,130 L320,130" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="323,123 338,130 323,137" fill="#a78bfa"/>
  <!-- Mapped keyboard (right side) -->
  <rect x="346" y="80" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="367" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">Q</text>
  <rect x="394" y="80" width="42" height="42" rx="8" fill="url(#key1)"/>
  <text x="415" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">W</text>
  <rect x="442" y="80" width="42" height="42" rx="8" fill="#22c55e" opacity="0.8"/>
  <text x="463" y="107" text-anchor="middle" font-family="monospace" font-size="14" fill="white">F</text>
  <!-- Connection line: E -> F (remap) -->
  <path d="M173,124 Q256,64 463,124" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <circle cx="173" cy="124" r="5" fill="#7c3aed"/>
  <circle cx="463" cy="124" r="5" fill="#22c55e"/>
  <!-- More keys bottom section -->
  <rect x="56" y="200" width="400" height="50" rx="10" fill="url(#key1)"/>
  <text x="256" y="231" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">SPACE</text>
  <!-- Modifier keys -->
  <rect x="56" y="260" width="80" height="40" rx="8" fill="url(#key1)"/>
  <text x="96" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">CTRL</text>
  <rect x="144" y="260" width="60" height="40" rx="8" fill="url(#keyHL)" opacity="0.7"/>
  <text x="174" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="white">ALT</text>
  <rect x="212" y="260" width="60" height="40" rx="8" fill="url(#key1)"/>
  <text x="242" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">WIN</text>
  <!-- Remap label -->
  <rect x="100" y="340" width="312" height="44" rx="10" fill="#2a1a4a"/>
  <text x="256" y="362" text-anchor="middle" font-family="Arial" font-size="14" fill="#a78bfa">E</text>
  <text x="256" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">remapped to F</text>
  <text x="240" y="362" text-anchor="middle" font-family="Arial" font-size="14" fill="#7c3aed">→</text>
  <text x="270" y="362" text-anchor="middle" font-family="Arial" font-size="14" fill="#22c55e">F</text>
  <text x="256" y="440" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#a78bfa" opacity="0.7">KEY MAP</text>
</svg>
