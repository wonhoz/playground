<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B1A"/>
      <stop offset="100%" stop-color="#071C10"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background – dark green -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>

  <g clip-path="url(#clip04)">
    <!-- Layer 2: Magnifying glass -->
    <!-- Lens outer (glass border) -->
    <circle cx="440" cy="430" r="240" fill="none" stroke="#FFFFFF" stroke-width="50"/>
    <!-- Lens inner (glass fill) -->
    <circle cx="440" cy="430" r="215" fill="#0A2015" opacity="0.95"/>
    <!-- Handle -->
    <rect x="618" y="568" width="60" height="230" rx="30" fill="#FFFFFF" transform="rotate(40 648 683)"/>

    <!-- Layer 3: Registry content inside magnifying glass -->
    <!-- HKCR key path text -->
    <text x="290" y="340" font-family="'Courier New', Courier, monospace" font-size="36" fill="#FFDD00" font-weight="bold">HKCR</text>
    <text x="290" y="385" font-family="'Courier New', Courier, monospace" font-size="36" fill="#FFDD00" font-weight="bold">\.pdf</text>
    <!-- Arrow / sub-key indicator -->
    <text x="316" y="425" font-family="'Courier New', Courier, monospace" font-size="28" fill="#88CC88">→ AcroEx</text>
    <!-- Status line -->
    <rect x="290" y="450" width="60" height="26" rx="8" fill="#0E3A1E"/>
    <text x="298" y="470" font-family="Arial, sans-serif" font-size="22" fill="#50E080" font-weight="bold">OK</text>

    <!-- Scanning line (horizontal sweep across lens) -->
    <rect x="230" y="458" width="420" height="8" rx="4" fill="#FFDD00" opacity="0.35"/>

    <!-- Sparkle dots in lens area -->
    <circle cx="360" cy="480" r="6" fill="#FFDD00" opacity="0.5"/>
    <circle cx="540" cy="380" r="5" fill="#50E080" opacity="0.4"/>

    <!-- Outer lens flare highlight -->
    <circle cx="360" cy="300" r="40" fill="#FFFFFF" opacity="0.06"/>
  </g>
</svg>
