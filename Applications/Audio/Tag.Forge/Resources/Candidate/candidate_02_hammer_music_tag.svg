<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#1e1030"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="impactGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hammer (rotated) -->
  <g transform="rotate(-45 256 256)">
    <!-- Handle -->
    <rect x="240" y="220" width="32" height="165" rx="10" fill="#8B6914"/>
    <!-- Head -->
    <rect x="195" y="140" width="122" height="88" rx="10" fill="url(#hammerGrad)"/>
    <!-- Head shine -->
    <rect x="200" y="143" width="112" height="12" rx="4" fill="#ffffff" fill-opacity="0.25"/>
  </g>
  <!-- Music tag being hit -->
  <path d="M225 285 L355 285 L395 340 L355 395 L225 395 Z" fill="#100820" stroke="url(#tagGrad)" stroke-width="2.5"/>
  <!-- Tag string hole -->
  <circle cx="248" cy="340" r="14" fill="#100820" stroke="url(#tagGrad)" stroke-width="2.5"/>
  <!-- Tag detail lines -->
  <line x1="265" y1="312" x2="372" y2="312" stroke="#f59e0b" stroke-width="1.8" opacity="0.7"/>
  <line x1="265" y1="332" x2="365" y2="332" stroke="#f59e0b" stroke-width="1.8" opacity="0.6"/>
  <line x1="265" y1="364" x2="370" y2="364" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <!-- Music note on tag -->
  <g transform="translate(355,345)" filter="url(#impactGlow)">
    <ellipse cx="0" cy="0" rx="13" ry="9" fill="#f59e0b" transform="rotate(-20)"/>
    <line x1="13" y1="-2" x2="13" y2="-48" stroke="#f59e0b" stroke-width="3.5"/>
    <line x1="13" y1="-48" x2="34" y2="-41" stroke="#f59e0b" stroke-width="3"/>
  </g>
  <!-- Impact sparks at hammer-tag contact -->
  <g filter="url(#impactGlow)">
    <line x1="228" y1="282" x2="210" y2="256" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="240" y1="278" x2="230" y2="248" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="255" y1="276" x2="252" y2="248" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <circle cx="210" cy="253" r="4" fill="#fbbf24" filter="url(#impactGlow)"/>
  <circle cx="228" cy="244" r="3" fill="#f59e0b" filter="url(#impactGlow)"/>
  <circle cx="250" cy="244" r="4" fill="#fbbf24" filter="url(#impactGlow)"/>
</svg>