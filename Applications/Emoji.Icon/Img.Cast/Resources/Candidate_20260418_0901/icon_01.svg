<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 딥블루 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980"/>
      <stop offset="100%" stop-color="#26D0CE"/>
    </linearGradient>
    <linearGradient id="card01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="clip01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: 포맷 카드 그리드 2×2 -->
  <g clip-path="url(#clip01)">
    <!-- SVG 카드 (좌상) -->
    <rect x="110" y="130" width="360" height="330" rx="28" fill="url(#card01)" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.4"/>
    <text x="290" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="160" fill="#FFFFFF" text-anchor="middle">SVG</text>

    <!-- PNG 카드 (우상) -->
    <rect x="554" y="130" width="360" height="330" rx="28" fill="url(#card01)" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.4"/>
    <text x="734" y="340" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="160" fill="#FFE066" text-anchor="middle">PNG</text>

    <!-- ICO 카드 (좌하) -->
    <rect x="110" y="500" width="360" height="330" rx="28" fill="url(#card01)" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.4"/>
    <text x="290" y="710" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="160" fill="#7FFFCF" text-anchor="middle">ICO</text>

    <!-- JPG 카드 (우하) -->
    <rect x="554" y="500" width="360" height="330" rx="28" fill="url(#card01)" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.4"/>
    <text x="734" y="710" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="160" fill="#FF8A65" text-anchor="middle">JPG</text>
  </g>

  <!-- Layer 3: 중앙 변환 심볼 -->
  <circle cx="512" cy="512" r="52" fill="#FFFFFF" opacity="0.95"/>
  <text x="512" y="534" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="70" fill="#1A2980" text-anchor="middle">⇄</text>
</svg>
