<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: metaphor | 붓 터치 → 선명 스파크 | 대각선/동적 | 민트+골든+인디고 -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2550"/>
      <stop offset="50%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#112244"/>
    </linearGradient>
    <linearGradient id="brushBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FFFD4"/>
      <stop offset="100%" stop-color="#00CED1"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 인디고 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <!-- 붓 스트로크 흔적 (대각선) -->
  <g clip-path="url(#clip02)">
    <ellipse cx="512" cy="512" rx="480" ry="120" transform="rotate(-35 512 512)" fill="#00CED1" opacity="0.12"/>

    <!-- Layer 2: 붓 본체 (대각선 방향) -->
    <!-- 붓대 -->
    <rect x="160" y="820" width="80" height="320" rx="16" fill="#C8A86B" transform="rotate(-45 160 820)"/>
    <!-- 붓 손잡이 금속 링 -->
    <rect x="290" y="540" width="80" height="40" rx="8" fill="#888" transform="rotate(-45 290 540)"/>
    <!-- 붓털 (민트) -->
    <ellipse cx="400" cy="450" rx="55" ry="110" transform="rotate(-45 400 450)" fill="url(#brushBody)" filter="url(#glow02)"/>
    <!-- 붓털 끝 뾰족 -->
    <polygon points="440,380 420,310 460,310" fill="#7FFFD4" transform="rotate(-45 440 380)" filter="url(#glow02)"/>

    <!-- Layer 3: 스파크/픽셀 선명 효과 -->
    <!-- 큰 스파크 중심 -->
    <circle cx="580" cy="340" r="90" fill="url(#spark)" opacity="0.9"/>
    <!-- 별 스파크 -->
    <polygon points="580,270 598,328 660,328 610,364 628,422 580,386 532,422 550,364 500,328 562,328" fill="#FFD700" opacity="0.95"/>
    <!-- 작은 스파크들 -->
    <circle cx="680" cy="260" r="22" fill="#FFE066" opacity="0.85"/>
    <circle cx="720" cy="350" r="14" fill="#FFA500" opacity="0.8"/>
    <circle cx="640" cy="200" r="16" fill="#FFD700" opacity="0.75"/>
    <circle cx="760" cy="290" r="10" fill="#FFE066" opacity="0.7"/>
    <!-- 픽셀 점 (선명 효과) -->
    <rect x="620" y="160" width="18" height="18" rx="3" fill="#7FFFD4" opacity="0.8"/>
    <rect x="700" y="200" width="14" height="14" rx="2" fill="#00CED1" opacity="0.7"/>
    <rect x="760" y="160" width="12" height="12" rx="2" fill="#7FFFD4" opacity="0.65"/>
    <!-- 선명도 광선 -->
    <line x1="580" y1="230" x2="580" y2="160" stroke="#FFE066" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="640" y1="260" x2="700" y2="200" stroke="#FFE066" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="520" y1="260" x2="460" y2="200" stroke="#FFE066" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="580" y1="420" x2="580" y2="490" stroke="#FFA500" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
