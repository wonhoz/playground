<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_06: hybrid | {} 괄호 + 나뭇가지 라인 결합 | 중앙 심볼 | 라임+초록+주황 -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBE7"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#33691E" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>

  <!-- Layer 2: Large {} brace (styled like a tree trunk) -->
  <!-- Left brace { -->
  <text x="512" y="500" font-family="Arial Black, sans-serif" font-size="560" font-weight="900"
        fill="#2E7D32" text-anchor="middle" dominant-baseline="middle" filter="url(#sh6)">{}</text>

  <!-- Layer 3: Tree branches growing from {} -->
  <!-- Top branch -->
  <line x1="512" y1="180" x2="512" y2="100" stroke="#FF6D00" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="130" x2="430" y2="60" stroke="#FF6D00" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="130" x2="594" y2="60" stroke="#FF6D00" stroke-width="12" stroke-linecap="round"/>
  <!-- Left side branches -->
  <line x1="228" y1="400" x2="160" y2="320" stroke="#FF6D00" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="350" x2="150" y2="290" stroke="#FF6D00" stroke-width="10" stroke-linecap="round"/>
  <line x1="228" y1="560" x2="160" y2="640" stroke="#FF6D00" stroke-width="14" stroke-linecap="round"/>
  <!-- Right side branches -->
  <line x1="796" y1="400" x2="864" y2="320" stroke="#FF6D00" stroke-width="14" stroke-linecap="round"/>
  <line x1="820" y1="350" x2="874" y2="290" stroke="#FF6D00" stroke-width="10" stroke-linecap="round"/>
  <line x1="796" y1="560" x2="864" y2="640" stroke="#FF6D00" stroke-width="14" stroke-linecap="round"/>
  <!-- Bottom branch -->
  <line x1="512" y1="820" x2="512" y2="900" stroke="#FF6D00" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="870" x2="444" y2="940" stroke="#FF6D00" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="870" x2="580" y2="940" stroke="#FF6D00" stroke-width="12" stroke-linecap="round"/>

  <!-- Leaf nodes (small circles at branch tips) -->
  <circle cx="512" cy="90" r="20" fill="#FFD740" filter="url(#sh6)"/>
  <circle cx="428" cy="52" r="16" fill="#FFD740"/>
  <circle cx="596" cy="52" r="16" fill="#FFD740"/>
  <circle cx="150" cy="310" r="16" fill="#66BB6A"/>
  <circle cx="148" cy="280" r="12" fill="#66BB6A"/>
  <circle cx="150" cy="650" r="16" fill="#66BB6A"/>
  <circle cx="874" cy="310" r="16" fill="#66BB6A"/>
  <circle cx="876" cy="280" r="12" fill="#66BB6A"/>
  <circle cx="874" cy="650" r="16" fill="#66BB6A"/>
  <circle cx="512" cy="910" r="20" fill="#FFD740" filter="url(#sh6)"/>
  <circle cx="436" cy="952" r="16" fill="#FFD740"/>
  <circle cx="588" cy="952" r="16" fill="#FFD740"/>
</svg>
