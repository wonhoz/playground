<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="100%" stop-color="#5D2E00"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield with cut corners -->
  <path d="M256 80 L376 128 L390 260 Q390 368 256 440 Q122 368 122 260 L136 128 Z" fill="url(#shield)"/>
  <!-- Large gear -->
  <g transform="translate(256,252)">
    <!-- Outer ring -->
    <circle r="85" fill="none" stroke="#FFF3E0" stroke-width="12"/>
    <!-- Teeth -->
    <rect x="-8" y="-98" width="16" height="26" rx="4" fill="#FFF3E0"/>
    <rect x="-8" y="72" width="16" height="26" rx="4" fill="#FFF3E0"/>
    <rect x="-98" y="-8" width="26" height="16" rx="4" fill="#FFF3E0"/>
    <rect x="72" y="-8" width="26" height="16" rx="4" fill="#FFF3E0"/>
    <rect x="52" y="-80" width="16" height="26" rx="4" fill="#FFF3E0" transform="rotate(-45)"/>
    <rect x="52" y="-80" width="16" height="26" rx="4" fill="#FFF3E0" transform="rotate(45)"/>
    <rect x="52" y="-80" width="16" height="26" rx="4" fill="#FFF3E0" transform="rotate(135)"/>
    <rect x="52" y="-80" width="16" height="26" rx="4" fill="#FFF3E0" transform="rotate(-135)"/>
    <!-- Center hub -->
    <circle r="38" fill="#E65100"/>
    <circle r="18" fill="#FFF3E0"/>
    <!-- Service check -->
    <path d="M-10 0 L-2 8 L12 -8" fill="none" stroke="#E65100" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
