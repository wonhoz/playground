<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <radialGradient id="glow03cp" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#FFCCBC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFCCBC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg03cp)"/>
  <ellipse cx="512" cy="512" rx="350" ry="350" fill="url(#glow03cp)"/>

  <!-- Layer 2: Large arrow with orbiting symbols -->
  <!-- Central big arrow -->
  <text x="512" y="620" font-family="'Segoe UI',Arial,sans-serif" font-size="520" fill="white"
    text-anchor="middle" opacity="0.95">→</text>

  <!-- Layer 3: Orbiting symbols -->
  <circle cx="200" cy="200" r="78" fill="white" opacity="0.9"/>
  <text x="200" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#BF360C" text-anchor="middle">©</text>

  <circle cx="824" cy="200" r="78" fill="white" opacity="0.9"/>
  <text x="824" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#BF360C" text-anchor="middle">€</text>

  <circle cx="200" cy="824" r="78" fill="white" opacity="0.9"/>
  <text x="200" y="844" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#BF360C" text-anchor="middle">∑</text>

  <circle cx="824" cy="824" r="78" fill="white" opacity="0.9"/>
  <text x="824" y="844" font-family="'Segoe UI',Arial,sans-serif" font-size="88" fill="#BF360C" text-anchor="middle">²</text>

  <!-- Small badge -->
  <circle cx="780" cy="780" r="0"/>
</svg>
