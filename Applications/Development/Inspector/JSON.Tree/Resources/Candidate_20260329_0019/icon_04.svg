<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 방사형 노드 다이어그램 | 기하학 추상 | 보라+흰노드+노랑선 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#4A148C" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Connection lines (tree edges) -->
  <!-- Root to level 1 -->
  <line x1="512" y1="200" x2="240" y2="440" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="200" x2="512" y2="460" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="200" x2="784" y2="440" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>

  <!-- Level 1 to level 2 (left branch) -->
  <line x1="240" y1="440" x2="130" y2="680" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="240" y1="440" x2="290" y2="700" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Level 1 to level 2 (center branch) -->
  <line x1="512" y1="460" x2="420" y2="700" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="512" y1="460" x2="600" y2="700" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Level 1 to level 2 (right branch) -->
  <line x1="784" y1="440" x2="720" y2="680" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="784" y1="440" x2="880" y2="680" stroke="#FFD740" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Layer 3: Nodes -->
  <!-- Root node -->
  <circle cx="512" cy="200" r="70" fill="#7E57C2" filter="url(#sh4)"/>
  <text x="512" y="200" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">{ }</text>

  <!-- Level 1 nodes -->
  <circle cx="240" cy="440" r="54" fill="#5E35B1" filter="url(#sh4)"/>
  <text x="240" y="440" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">{ }</text>

  <circle cx="512" cy="460" r="54" fill="#5E35B1" filter="url(#sh4)"/>
  <text x="512" y="460" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">[ ]</text>

  <circle cx="784" cy="440" r="54" fill="#5E35B1" filter="url(#sh4)"/>
  <text x="784" y="440" font-family="Arial Black, sans-serif" font-size="34" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">"str"</text>

  <!-- Level 2 nodes (leaf nodes, smaller) -->
  <circle cx="130" cy="680" r="36" fill="white" filter="url(#sh4)"/>
  <text x="130" y="680" font-family="Consolas, monospace" font-size="22" fill="#5E35B1"
        text-anchor="middle" dominant-baseline="middle">42</text>

  <circle cx="290" cy="700" r="36" fill="white" filter="url(#sh4)"/>
  <text x="290" y="700" font-family="Consolas, monospace" font-size="20" fill="#1B5E20"
        text-anchor="middle" dominant-baseline="middle">"ok"</text>

  <circle cx="420" cy="700" r="36" fill="white" filter="url(#sh4)"/>
  <text x="420" y="700" font-family="Consolas, monospace" font-size="24" fill="#B71C1C"
        text-anchor="middle" dominant-baseline="middle">true</text>

  <circle cx="600" cy="700" r="36" fill="white" filter="url(#sh4)"/>
  <text x="600" y="700" font-family="Consolas, monospace" font-size="22" fill="#5E35B1"
        text-anchor="middle" dominant-baseline="middle">99</text>

  <circle cx="720" cy="680" r="36" fill="white" filter="url(#sh4)"/>
  <text x="720" y="680" font-family="Consolas, monospace" font-size="20" fill="#1B5E20"
        text-anchor="middle" dominant-baseline="middle">"hi"</text>

  <circle cx="880" cy="680" r="36" fill="white" filter="url(#sh4)"/>
  <text x="880" y="680" font-family="Consolas, monospace" font-size="20" fill="#B71C1C"
        text-anchor="middle" dominant-baseline="middle">null</text>
</svg>
