<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1A4E"/>
      <stop offset="100%" stop-color="#0D0A1A"/>
    </radialGradient>
    <filter id="glow01">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg01)"/>

  <!-- 마우스 본체 -->
  <rect x="390" y="260" width="244" height="340" rx="122" fill="#1C1030" stroke="#9B59F5" stroke-width="14"/>
  <!-- 마우스 중앙선 -->
  <line x1="512" y1="260" x2="512" y2="430" stroke="#9B59F5" stroke-width="10"/>
  <!-- 스크롤휠 -->
  <rect x="493" y="305" width="38" height="80" rx="19" fill="#9B59F5" opacity="0.9"/>

  <!-- 제스처 궤적: 오른쪽→아래 (RD) -->
  <path d="M 300 520 L 520 520 L 520 700" fill="none" stroke="#D580FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow01)"/>

  <!-- 방향 화살표 끝 (아래쪽) -->
  <polyline points="480,660 520,710 560,660" fill="none" stroke="#FF80FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow01)"/>

  <!-- 방향 화살표 (오른쪽 끝에는 없고 꺾인 부분에 암시) -->

  <!-- 동작 레이블 박스 -->
  <rect x="560" y="490" width="180" height="52" rx="10" fill="#9B59F5" opacity="0.85"/>
  <text x="650" y="526" font-family="monospace" font-size="30" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RD</text>

  <!-- 연결 점선 -->
  <line x1="560" y1="516" x2="530" y2="516" stroke="#D580FF" stroke-width="4" stroke-dasharray="6,4"/>
</svg>
