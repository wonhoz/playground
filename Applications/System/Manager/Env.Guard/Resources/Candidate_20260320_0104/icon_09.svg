<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- Safety pin body: coil head (top-left) -->
  <!-- Pin head coil -->
  <circle cx="320" cy="310" r="90" fill="none" stroke="#81C784" stroke-width="36"/>
  <circle cx="320" cy="310" r="44" fill="none" stroke="#2E7D32" stroke-width="20"/>
  <!-- Pin shaft going diagonally down-right -->
  <line x1="390" y1="380" x2="700" y2="700" stroke="#81C784" stroke-width="36" stroke-linecap="round"/>
  <!-- Pin clasp (bottom right, U-shape) -->
  <path d="M664 660 Q780 700 780 780 Q780 860 700 860 L660 860" fill="none" stroke="#81C784" stroke-width="36" stroke-linecap="round"/>
  <!-- Second pin shaft (parallel, slightly offset) -->
  <line x1="650" y1="720" x2="660" y2="860" stroke="#2E7D32" stroke-width="28" stroke-linecap="round"/>
  <!-- Variable being secured -->
  <rect x="400" y="440" width="200" height="56" rx="12" fill="#2E7D32" opacity="0.5"/>
  <rect x="410" y="452" width="80" height="32" rx="8" fill="#81C784" opacity="0.7"/>
  <!-- Security dots -->
  <circle cx="320" cy="310" r="18" fill="#81C784" opacity="0.8"/>
  <circle cx="700" cy="700" r="14" fill="#81C784" opacity="0.5"/>
</svg>
