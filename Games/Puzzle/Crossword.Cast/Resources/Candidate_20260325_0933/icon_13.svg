<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="6" dy="8" stdDeviation="8" flood-color="#00000055"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (ACE 가로 / ARM 세로, 교차점 A=(0,0)) 두꺼운 타일 -->
  <!-- 어두운 셀 (진한 테두리) -->
  <rect x="412" y="412" width="196" height="196" fill="#212121" rx="12"/>
  <rect x="612" y="412" width="196" height="196" fill="#212121" rx="12"/>
  <rect x="412" y="612" width="196" height="196" fill="#212121" rx="12"/>
  <rect x="612" y="612" width="196" height="196" fill="#212121" rx="12"/>
  <!-- 두꺼운 타일 (보드게임 스타일) -->
  <!-- 교차점 A (0,0) - 크림 배경 -->
  <rect x="206" y="206" width="208" height="208" fill="#FFF9C4" stroke="#212121" stroke-width="18" rx="16" filter="url(#sh)"/>
  <!-- C (0,1) - 연파랑 -->
  <rect x="406" y="206" width="208" height="208" fill="#E3F2FD" stroke="#212121" stroke-width="18" rx="16" filter="url(#sh)"/>
  <!-- E (0,2) - 연분홍 -->
  <rect x="606" y="206" width="208" height="208" fill="#FCE4EC" stroke="#212121" stroke-width="18" rx="16" filter="url(#sh)"/>
  <!-- R (1,0) - 연초록 -->
  <rect x="206" y="406" width="208" height="208" fill="#E8F5E9" stroke="#212121" stroke-width="18" rx="16" filter="url(#sh)"/>
  <!-- M (2,0) - 연보라 -->
  <rect x="206" y="606" width="208" height="208" fill="#F3E5F5" stroke="#212121" stroke-width="18" rx="16" filter="url(#sh)"/>
  <!-- Layer 3: 글자 -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#C62828">A</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#1565C0">C</text>
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#AD1457">E</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#2E7D32">R</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#6A1B9A">M</text>
</svg>
