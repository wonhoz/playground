<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 따뜻한 모래색 -->
  <rect width="1024" height="1024" rx="180" fill="#3E2000"/>
  <!-- Layer 2: 모래시계 -->
  <!-- 상단 삼각형 (모래 가득) -->
  <polygon points="200,180 824,180 512,512" fill="#FFA000"/>
  <!-- 하단 삼각형 (모래 쌓임) -->
  <polygon points="200,844 824,844 512,512" fill="#FF8F00"/>
  <!-- 모래시계 테두리 -->
  <polygon points="200,180 824,180 512,512" fill="none" stroke="#FFD740" stroke-width="8"/>
  <polygon points="200,844 824,844 512,512" fill="none" stroke="#FFD740" stroke-width="8"/>
  <!-- 상단 가로바 -->
  <rect x="180" y="160" width="664" height="36" rx="8" fill="#FFD740"/>
  <!-- 하단 가로바 -->
  <rect x="180" y="828" width="664" height="36" rx="8" fill="#FFD740"/>
  <!-- 모래 흘러내리는 선 (중앙 좁은 부분) -->
  <line x1="512" y1="480" x2="512" y2="544" stroke="#FFCC02" stroke-width="12" stroke-linecap="round"/>
  <!-- 모래 입자들 (상단에서 떨어지는) -->
  <rect x="500" y="500" width="24" height="20" rx="4" fill="#FFCC02"/>
  <rect x="494" y="524" width="36" height="20" rx="4" fill="#FFCC02"/>
  <!-- Layer 3: SAND.FALL 텍스트 (양쪽 가로바 밖) -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="56" font-weight="900" fill="#FFD740" text-anchor="middle">SAND.FALL</text>
</svg>
