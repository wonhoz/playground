<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background — deep navy night -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <!-- Small stars (night / Away atmosphere) -->
  <circle cx="740" cy="190" r="16" fill="#FFF9C4"/>
  <circle cx="820" cy="308" r="10" fill="#FFF9C4" opacity="0.7"/>
  <circle cx="168" cy="248" r="12" fill="#FFF9C4" opacity="0.6"/>
  <circle cx="840" cy="430" r="8"  fill="#FFF9C4" opacity="0.5"/>

  <!-- Layer 2: Yellow crescent moon (Away / sleeping state) -->
  <circle cx="390" cy="340" r="230" fill="#FDD835"/>
  <!-- Cutout to make crescent -->
  <circle cx="520" cy="268" r="204" fill="#1E3A8A"/>
  <!-- Blend with gradient bg -->
  <circle cx="520" cy="268" r="204" fill="#1E40AF" opacity="0.5"/>

  <!-- Layer 3: Green shield — blocking / protecting Active state -->
  <!-- Shield outer glow -->
  <path d="M 524,440 L 716,488 L 716,660 Q 716,778 524,832 Q 332,778 332,660 L 332,488 Z"
        fill="#15803D" opacity="0.4"/>
  <!-- Shield body -->
  <path d="M 524,456 L 704,500 L 704,656 Q 704,766 524,816 Q 344,766 344,656 L 344,500 Z"
        fill="#16A34A"/>
  <!-- Shield highlight (top band) -->
  <path d="M 524,456 L 704,500 L 704,560 L 344,560 L 344,500 Z"
        fill="#4ADE80" opacity="0.3"/>
  <!-- White checkmark inside shield -->
  <polyline points="420,638 490,710 644,554"
            fill="none" stroke="white" stroke-width="56"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
