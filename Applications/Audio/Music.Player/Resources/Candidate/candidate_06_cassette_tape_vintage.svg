<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2e1200"/>
    </linearGradient>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1800"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>
    <filter id="cassetteGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cassette body -->
  <rect x="80" y="155" width="352" height="230" rx="20" fill="url(#caseGrad)" stroke="#b87333" stroke-width="3"/>
  <!-- Cassette label -->
  <rect x="105" y="170" width="302" height="140" rx="10" fill="url(#labelGrad)"/>
  <!-- Label stripe -->
  <rect x="105" y="210" width="302" height="30" fill="#ff2d55" opacity="0.5"/>
  <!-- Label lines (song lines) -->
  <line x1="125" y1="188" x2="385" y2="188" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="125" y1="253" x2="365" y2="253" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="125" y1="270" x2="375" y2="270" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="125" y1="287" x2="360" y2="287" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Tape reels -->
  <circle cx="178" cy="348" r="50" fill="#1a1000" stroke="#b87333" stroke-width="2.5"/>
  <circle cx="178" cy="348" r="35" fill="none" stroke="#c8962a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="178" cy="348" r="20" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="178" cy="348" r="8" fill="#b87333"/>
  <!-- Reel spokes -->
  <line x1="178" y1="300" x2="178" y2="328" stroke="#b87333" stroke-width="2"/>
  <line x1="152" y1="316" x2="168" y2="338" stroke="#b87333" stroke-width="2"/>
  <line x1="152" y1="380" x2="168" y2="358" stroke="#b87333" stroke-width="2"/>
  <line x1="178" y1="396" x2="178" y2="368" stroke="#b87333" stroke-width="2"/>
  <line x1="204" y1="380" x2="188" y2="358" stroke="#b87333" stroke-width="2"/>
  <line x1="204" y1="316" x2="188" y2="338" stroke="#b87333" stroke-width="2"/>
  <!-- Right reel -->
  <circle cx="334" cy="348" r="50" fill="#1a1000" stroke="#b87333" stroke-width="2.5"/>
  <circle cx="334" cy="348" r="35" fill="none" stroke="#c8962a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="334" cy="348" r="20" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="334" cy="348" r="8" fill="#b87333"/>
  <line x1="334" y1="300" x2="334" y2="328" stroke="#b87333" stroke-width="2"/>
  <line x1="308" y1="316" x2="324" y2="338" stroke="#b87333" stroke-width="2"/>
  <line x1="308" y1="380" x2="324" y2="358" stroke="#b87333" stroke-width="2"/>
  <line x1="334" y1="396" x2="334" y2="368" stroke="#b87333" stroke-width="2"/>
  <line x1="360" y1="380" x2="344" y2="358" stroke="#b87333" stroke-width="2"/>
  <line x1="360" y1="316" x2="344" y2="338" stroke="#b87333" stroke-width="2"/>
  <!-- Tape path between reels -->
  <path d="M228 348 C228 330 284 330 284 348" fill="none" stroke="#1a0a00" stroke-width="8"/>
  <!-- Playback window -->
  <rect x="210" y="320" width="92" height="22" rx="4" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <!-- Corner peg holes -->
  <circle cx="105" cy="155" r="8" fill="#1a1000"/>
  <circle cx="407" cy="155" r="8" fill="#1a1000"/>
  <circle cx="105" cy="385" r="8" fill="#1a1000"/>
  <circle cx="407" cy="385" r="8" fill="#1a1000"/>
</svg>