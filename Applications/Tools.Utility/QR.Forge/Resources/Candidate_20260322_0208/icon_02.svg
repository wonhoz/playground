<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02 | Literal | 기하학 추상 | QR 파인더 패턴 3코너 클로즈업 | 순백 + 흑 -->

  <!-- Layer 1: 배경 (밝은 크림색) -->
  <rect width="1024" height="1024" rx="180" fill="#F5F0E8"/>

  <!-- Layer 2: 대형 QR 파인더 패턴 3개 -->
  <!-- 좌상단 파인더 패턴 (크게, 200x200 영역) -->
  <g fill="#1A1A1A">
    <!-- 외곽 (7단위) -->
    <rect x="140" y="140" width="200" height="200" rx="18"/>
    <rect x="164" y="164" width="152" height="152" rx="12" fill="#F5F0E8"/>
    <rect x="188" y="188" width="104" height="104" rx="8"/>
  </g>

  <!-- 우상단 파인더 패턴 -->
  <g fill="#1A1A1A">
    <rect x="684" y="140" width="200" height="200" rx="18"/>
    <rect x="708" y="164" width="152" height="152" rx="12" fill="#F5F0E8"/>
    <rect x="732" y="188" width="104" height="104" rx="8"/>
  </g>

  <!-- 좌하단 파인더 패턴 -->
  <g fill="#1A1A1A">
    <rect x="140" y="684" width="200" height="200" rx="18"/>
    <rect x="164" y="708" width="152" height="152" rx="12" fill="#F5F0E8"/>
    <rect x="188" y="732" width="104" height="104" rx="8"/>
  </g>

  <!-- Layer 3: 데이터 모듈 패턴 (우하단 영역에 랜덤 픽셀) -->
  <g fill="#1A1A1A" opacity="0.85">
    <!-- 타이밍 패턴 라인 (가로) -->
    <rect x="360" y="424" width="44" height="44" rx="6"/>
    <rect x="448" y="424" width="44" height="44" rx="6"/>
    <rect x="536" y="424" width="44" height="44" rx="6"/>
    <rect x="624" y="424" width="44" height="44" rx="6"/>
    <!-- 타이밍 패턴 라인 (세로) -->
    <rect x="424" y="360" width="44" height="44" rx="6"/>
    <rect x="424" y="448" width="44" height="44" rx="6"/>
    <rect x="424" y="536" width="44" height="44" rx="6"/>
    <rect x="424" y="624" width="44" height="44" rx="6"/>
    <!-- 데이터 영역 -->
    <rect x="536" y="536" width="44" height="44" rx="6"/>
    <rect x="624" y="536" width="44" height="44" rx="6"/>
    <rect x="712" y="536" width="44" height="44" rx="6"/>
    <rect x="800" y="536" width="44" height="44" rx="6"/>
    <rect x="536" y="624" width="44" height="44" rx="6"/>
    <rect x="712" y="624" width="44" height="44" rx="6"/>
    <rect x="536" y="712" width="44" height="44" rx="6"/>
    <rect x="624" y="712" width="44" height="44" rx="6"/>
    <rect x="800" y="712" width="44" height="44" rx="6"/>
    <rect x="624" y="800" width="44" height="44" rx="6"/>
    <rect x="712" y="800" width="44" height="44" rx="6"/>
    <rect x="800" y="800" width="44" height="44" rx="6"/>
    <!-- 중간 영역 -->
    <rect x="360" y="536" width="44" height="44" rx="6"/>
    <rect x="360" y="624" width="44" height="44" rx="6"/>
    <rect x="360" y="712" width="44" height="44" rx="6"/>
    <rect x="536" y="360" width="44" height="44" rx="6"/>
    <rect x="624" y="360" width="44" height="44" rx="6"/>
    <rect x="712" y="360" width="44" height="44" rx="6"/>
    <rect x="800" y="360" width="44" height="44" rx="6"/>
  </g>
</svg>
