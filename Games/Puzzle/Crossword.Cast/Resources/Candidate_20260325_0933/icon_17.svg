<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F50057"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#00000055"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- Layer 2: 격자 (JAM 가로 / JOT 세로, 교차점 J=(0,0)) -->
  <!-- 어두운 셀 -->
  <rect x="412" y="412" width="196" height="196" fill="#4A0030" rx="10"/>
  <rect x="612" y="412" width="196" height="196" fill="#4A0030" rx="10"/>
  <rect x="412" y="612" width="196" height="196" fill="#4A0030" rx="10"/>
  <rect x="612" y="612" width="196" height="196" fill="#4A0030" rx="10"/>
  <!-- 흰 셀 -->
  <rect x="212" y="212" width="196" height="196" fill="#FCE4EC" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="412" y="212" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="612" y="212" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="412" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <rect x="212" y="612" width="196" height="196" fill="white" stroke="white" stroke-width="9" rx="10" filter="url(#sh)"/>
  <!-- 교차점 J(0,0) 위에 노란 원형 강조 -->
  <circle cx="312" cy="312" r="108" fill="#FFD600" opacity="0.35" filter="url(#glow)"/>
  <circle cx="312" cy="312" r="90" fill="none" stroke="#FFD600" stroke-width="10" opacity="0.9"/>
  <!-- Layer 3: 글자 (JAM 가로 / JOT 세로) -->
  <text x="312" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#FFD600">J</text>
  <text x="512" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#F50057">A</text>
  <text x="712" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#F50057">M</text>
  <text x="312" y="515" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#F50057">O</text>
  <text x="312" y="715" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,sans-serif" font-weight="900" font-size="148" fill="#F50057">T</text>
</svg>
