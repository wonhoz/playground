<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 흰색 배경 (QR 코드는 흰 배경이 기본) -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: QR 코드 패턴 (비비드 컬러) -->
  <!-- QR 셀 크기: 64px, 그리드 시작: x=128, y=128 -->
  <!-- 좌상단 위치 마커 (7×7) -->
  <rect x="128" y="128" width="448" height="448" rx="20" fill="#1565C0"/>
  <rect x="192" y="192" width="320" height="320" rx="12" fill="white"/>
  <rect x="256" y="256" width="192" height="192" rx="8" fill="#1565C0"/>
  <!-- 우상단 위치 마커 (7×7) -->
  <rect x="448" y="128" width="448" height="448" rx="20" fill="#E53935"/>
  <rect x="512" y="192" width="320" height="320" rx="12" fill="white"/>
  <rect x="576" y="256" width="192" height="192" rx="8" fill="#E53935"/>
  <!-- 좌하단 위치 마커 (7×7) -->
  <rect x="128" y="448" width="448" height="448" rx="20" fill="#2E7D32"/>
  <rect x="192" y="512" width="320" height="320" rx="12" fill="white"/>
  <rect x="256" y="576" width="192" height="192" rx="8" fill="#2E7D32"/>
  <!-- Layer 3: 데이터 영역 (우하단) 랜덤 패턴 느낌 -->
  <rect x="512" y="512" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="640" y="512" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="768" y="512" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="576" y="576" width="64" height="64" rx="6" fill="#F57F17"/>
  <rect x="704" y="576" width="64" height="64" rx="6" fill="#F57F17"/>
  <rect x="512" y="640" width="64" height="64" rx="6" fill="#00838F"/>
  <rect x="640" y="640" width="64" height="64" rx="6" fill="#00838F"/>
  <rect x="768" y="640" width="64" height="64" rx="6" fill="#00838F"/>
  <rect x="576" y="704" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="768" y="704" width="64" height="64" rx="6" fill="#F57F17"/>
  <rect x="512" y="768" width="64" height="64" rx="6" fill="#F57F17"/>
  <rect x="640" y="768" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="704" y="768" width="64" height="64" rx="6" fill="#00838F"/>
  <rect x="768" y="768" width="64" height="64" rx="6" fill="#6A1B9A"/>
  <rect x="512" y="832" width="64" height="64" rx="6" fill="#00838F"/>
  <rect x="704" y="832" width="64" height="64" rx="6" fill="#F57F17"/>
  <rect x="768" y="832" width="64" height="64" rx="6" fill="#6A1B9A"/>
</svg>
