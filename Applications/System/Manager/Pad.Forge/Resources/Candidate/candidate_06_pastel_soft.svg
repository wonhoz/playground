<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#F0F5FF"/>
    </linearGradient>
    <linearGradient id="padSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F0FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Soft notepad -->
  <rect x="115" y="90" width="250" height="310" rx="16" fill="#FFFFFF" opacity="0.3"/>
  <rect x="110" y="85" width="250" height="310" rx="16" fill="url(#padSoft)" stroke="#E0D0F0" stroke-width="3"/>
