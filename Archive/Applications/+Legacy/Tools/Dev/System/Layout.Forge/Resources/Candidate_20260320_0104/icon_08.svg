<!-- Layout.Forge icon_08: 패널 분할 (split panel divider) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Left panel -->
  <rect x="180" y="240" width="270" height="540" rx="20" fill="#3949AB"/>
  <!-- Right panel (top) -->
  <rect x="490" y="240" width="360" height="250" rx="20" fill="#3949AB"/>
  <!-- Right panel (bottom) -->
  <rect x="490" y="530" width="360" height="250" rx="20" fill="#3949AB"/>
  <!-- Dividers (highlighted) -->
  <line x1="460" y1="240" x2="460" y2="780" stroke="#5C6BC0" stroke-width="20"/>
  <line x1="490" y1="500" x2="850" y2="500" stroke="#5C6BC0" stroke-width="20"/>
  <!-- Drag handles -->
  <circle cx="460" cy="512" r="22" fill="#5C6BC0"/>
  <circle cx="670" cy="500" r="22" fill="#5C6BC0"/>
</svg>
