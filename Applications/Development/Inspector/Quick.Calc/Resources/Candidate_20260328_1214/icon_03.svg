<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="qbg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
    <linearGradient id="bolt3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 (어두운 파랑 — 번개를 돋보이게) -->
  <rect width="1024" height="1024" rx="190" fill="url(#qbg3)"/>
  <!-- 배경 빛번짐 효과 -->
  <circle cx="512" cy="512" r="350" fill="#3949AB" opacity="0.3"/>
  <!-- Layer 2: 번개 실루엣 (대각선) -->
  <polygon points="600,110 380,530 510,530 424,920 780,420 610,420 760,110" fill="url(#bolt3)" stroke="#FFD600" stroke-width="8" stroke-linejoin="round"/>
  <!-- Layer 3: 연산 기호들 (번개 주변) -->
  <!-- + 기호 (좌상) -->
  <text x="180" y="320" font-family="Arial Black" font-size="130" fill="#E8EAF6" text-anchor="middle" font-weight="900" opacity="0.9">+</text>
  <!-- × 기호 (우상) -->
  <text x="860" y="300" font-family="Arial Black" font-size="110" fill="#BBDEFB" text-anchor="middle" font-weight="900" opacity="0.8">×</text>
  <!-- - 기호 (좌하) -->
  <text x="170" y="760" font-family="Arial Black" font-size="140" fill="#C5CAE9" text-anchor="middle" font-weight="900" opacity="0.8">-</text>
  <!-- = 기호 (우하) -->
  <text x="870" y="770" font-family="Arial Black" font-size="120" fill="#E8EAF6" text-anchor="middle" font-weight="900" opacity="0.9">=</text>
  <!-- 번개 하이라이트 (내부 흰색 광선) -->
  <polygon points="590,170 430,500 528,500 462,840 700,470 558,470 690,170" fill="white" opacity="0.25"/>
</svg>
