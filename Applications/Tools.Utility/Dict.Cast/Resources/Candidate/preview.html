<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Dict.Cast - 아이콘 후보</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; color: #ffffff; }
    p.desc { text-align: center; color: #888888; margin-bottom: 28px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
    .item img { width: 160px; height: 160px; border-radius: 8px; }
    .item span { font-size: 0.78rem; color: #aaaaaa; text-align: center; word-break: break-all; }
    .item .num { font-size: 0.85rem; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Dict.Cast — 아이콘 후보 10종</h1>
  <p class="desc">사전·번역 도구</p>
  <div class="grid">
    <div class="item">
      <img src="candidate_01_open_book_blue.svg" alt="01"/>
      <span class="num">01</span>
      <span>Open Book Blue</span>
    </div>
    <div class="item">
      <img src="candidate_02_translate_arrows.svg" alt="02"/>
      <span class="num">02</span>
      <span>Translate Arrows</span>
    </div>
    <div class="item">
      <img src="candidate_03_globe_purple.svg" alt="03"/>
      <span class="num">03</span>
      <span>Globe Purple</span>
    </div>
    <div class="item">
      <img src="candidate_04_magnifier_word.svg" alt="04"/>
      <span class="num">04</span>
      <span>Magnifier Word</span>
    </div>
    <div class="item">
      <img src="candidate_05_neon_letter.svg" alt="05"/>
      <span class="num">05</span>
      <span>Neon Letter</span>
    </div>
    <div class="item">
      <img src="candidate_06_flashcard_orange.svg" alt="06"/>
      <span class="num">06</span>
      <span>Flashcard Orange</span>
    </div>
    <div class="item">
      <img src="candidate_07_ink_brush.svg" alt="07"/>
      <span class="num">07</span>
      <span>Ink Brush</span>
    </div>
    <div class="item">
      <img src="candidate_08_chat_bubble_teal.svg" alt="08"/>
      <span class="num">08</span>
      <span>Chat Bubble Teal</span>
    </div>
    <div class="item">
      <img src="candidate_09_vintage_label.svg" alt="09"/>
      <span class="num">09</span>
      <span>Vintage Label</span>
    </div>
    <div class="item">
      <img src="candidate_10_minimalist_ab.svg" alt="10"/>
      <span class="num">10</span>
      <span>Minimalist AB</span>
    </div>
  </div>
</body>
</html>
