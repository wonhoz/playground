<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="25%" stop-color="#FFFF00"/>
      <stop offset="50%" stop-color="#00FF80"/>
      <stop offset="75%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#BF00FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="60" y="100" width="392" height="312" rx="12" fill="#1E1E1E" stroke="#333" stroke-width="2"/>
  <rect x="60" y="100" width="392" height="36" rx="12" fill="#2D2D2D"/>
  <rect x="60" y="118" width="392" height="18" fill="#2D2D2D"/>
  <!-- Traffic lights -->
  <circle cx="92" cy="118" r="7" fill="#FF5F56"/>
  <circle cx="116" cy="118" r="7" fill="#FFBD2E"/>
  <circle cx="140" cy="118" r="7" fill="#27C93F"/>
  <!-- Rainbow text lines -->
  <rect x="88" y="160" width="200" height="8" rx="4" fill="url(#rainbow)"/>
  <rect x="88" y="182" width="160" height="8" rx="4" fill="#FF6B6B"/>
  <rect x="88" y="204" width="220" height="8" rx="4" fill="#4ECDC4"/>
  <rect x="88" y="226" width="140" height="8" rx="4" fill="#FFE66D"/>
  <rect x="88" y="248" width="180" height="8" rx="4" fill="#A8E6CF"/>
  <!-- ANSI color blocks -->
  <rect x="88" y="270" width="20" height="20" rx="2" fill="#FF0000"/>
  <rect x="114" y="270" width="20" height="20" rx="2" fill="#00FF00"/>
  <rect x="140" y="270" width="20" height="20" rx="2" fill="#0000FF"/>
  <rect x="166" y="270" width="20" height="20" rx="2" fill="#FFFF00"/>
  <rect x="192" y="270" width="20" height="20" rx="2" fill="#FF00FF"/>
  <rect x="218" y="270" width="20" height="20" rx="2" fill="#00FFFF"/>
  <rect x="244" y="270" width="20" height="20" rx="2" fill="#FFFFFF"/>
  <!-- Cursor -->
  <rect x="88" y="310" width="12" height="20" rx="2" fill="#00FF80" opacity="0.9"/>
</svg>