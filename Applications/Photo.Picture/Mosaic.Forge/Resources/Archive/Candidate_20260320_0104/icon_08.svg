<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0005"/>
  <!-- Building made of tiles/blocks stacking -->
  <!-- Foundation row -->
  <rect x="162" y="780" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.7"/>
  <rect x="312" y="780" width="140" height="80" rx="6" fill="#880E4F" opacity="0.85"/>
  <rect x="462" y="780" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.7"/>
  <rect x="612" y="780" width="140" height="80" rx="6" fill="#880E4F" opacity="0.85"/>
  <rect x="762" y="780" width="100" height="80" rx="6" fill="#F48FB1" opacity="0.7"/>
  <!-- Row 2 -->
  <rect x="200" y="690" width="140" height="80" rx="6" fill="#880E4F" opacity="0.85"/>
  <rect x="350" y="690" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.7"/>
  <rect x="500" y="690" width="140" height="80" rx="6" fill="#880E4F" opacity="0.85"/>
  <rect x="650" y="690" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.7"/>
  <!-- Row 3 -->
  <rect x="262" y="600" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.8"/>
  <rect x="412" y="600" width="140" height="80" rx="6" fill="#880E4F" opacity="0.9"/>
  <rect x="562" y="600" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.8"/>
  <!-- Row 4 -->
  <rect x="312" y="510" width="140" height="80" rx="6" fill="#880E4F" opacity="0.9"/>
  <rect x="462" y="510" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.8"/>
  <!-- Row 5 -->
  <rect x="362" y="420" width="140" height="80" rx="6" fill="#F48FB1" opacity="0.85"/>
  <!-- Top block -->
  <rect x="412" y="320" width="100" height="90" rx="6" fill="#880E4F" opacity="0.95"/>
  <!-- Floating incoming block (being placed) -->
  <rect x="680" y="300" width="100" height="80" rx="6" fill="#F48FB1" opacity="0.6"/>
  <line x1="730" y1="380" x2="620" y2="480" stroke="#F48FB1" stroke-width="3" stroke-dasharray="8,6" opacity="0.5"/>
</svg>
