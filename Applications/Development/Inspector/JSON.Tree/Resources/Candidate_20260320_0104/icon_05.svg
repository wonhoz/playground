<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- Root folder (top) -->
  <path d="M360 200 L380 240 L680 240 L680 320 L320 320 L320 200 Z" fill="#E65100"/>
  <!-- Root folder body -->
  <rect x="300" y="280" width="400" height="120" rx="10" fill="#E65100"/>
  <!-- Branch line to children -->
  <line x1="400" y1="400" x2="400" y2="480" stroke="#E65100" stroke-width="16" stroke-linecap="round"/>
  <line x1="620" y1="400" x2="620" y2="480" stroke="#E65100" stroke-width="16" stroke-linecap="round"/>
  <line x1="400" y1="480" x2="620" y2="480" stroke="#E65100" stroke-width="16" stroke-linecap="round"/>
  <!-- Child folder 1 -->
  <path d="M290 480 L308 514 L530 514 L530 580 L270 580 L270 480 Z" fill="#FF8A65"/>
  <rect x="260" y="540" width="280" height="80" rx="8" fill="#FF8A65"/>
  <!-- Child folder 2 -->
  <path d="M510 480 L528 514 L760 514 L760 580 L490 580 L490 480 Z" fill="#FF8A65"/>
  <rect x="480" y="540" width="280" height="80" rx="8" fill="#FF8A65"/>
  <!-- Grandchild folders (small) -->
  <rect x="270" y="650" width="120" height="70" rx="6" fill="#E65100" opacity="0.7"/>
  <rect x="410" y="650" width="120" height="70" rx="6" fill="#E65100" opacity="0.7"/>
  <line x1="330" y1="620" x2="330" y2="650" stroke="#E65100" stroke-width="12" stroke-linecap="round"/>
  <line x1="470" y1="620" x2="470" y2="650" stroke="#E65100" stroke-width="12" stroke-linecap="round"/>
  <line x1="330" y1="650" x2="470" y2="650" stroke="#E65100" stroke-width="12" stroke-linecap="round"/>
</svg>