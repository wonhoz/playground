<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Terminal/log panel -->
  <rect x="150" y="180" width="724" height="560" rx="28" fill="#1C1917"/>
  <rect x="150" y="180" width="724" height="60" rx="0" fill="#292524"/>
  <rect x="150" y="180" width="724" height="60" rx="28" fill="#292524"/>
  <!-- Terminal title dots -->
  <circle cx="205" cy="210" r="14" fill="#EF4444"/>
  <circle cx="250" cy="210" r="14" fill="#F59E0B"/>
  <circle cx="295" cy="210" r="14" fill="#22C55E"/>
  <!-- Log lines -->
  <text x="185" y="310" font-family="Consolas,monospace" font-size="48" fill="#22C55E">[DOWN] Enter</text>
  <text x="185" y="375" font-family="Consolas,monospace" font-size="48" fill="#EF4444">[UP]   Enter</text>
  <text x="185" y="440" font-family="Consolas,monospace" font-size="48" fill="#22C55E">[DOWN] Space</text>
  <text x="185" y="505" font-family="Consolas,monospace" font-size="48" fill="#EF4444">[UP]   Space</text>
  <text x="185" y="570" font-family="Consolas,monospace" font-size="48" fill="#F59E0B">!! CHATTER F2</text>
  <text x="185" y="635" font-family="Consolas,monospace" font-size="48" fill="#22C55E">[DOWN] A</text>
  <!-- Cursor blink -->
  <rect x="453" y="648" width="28" height="40" rx="2" fill="#22C55E"/>
  <!-- Label -->
  <text x="512" y="840" font-family="Arial,sans-serif" font-size="58" fill="#EA580C" font-weight="bold" text-anchor="middle">Key Logger</text>
</svg>
