<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥퍼플 -->
  <rect width="1024" height="1024" rx="180" fill="#120820"/>

  <!-- 중앙 심볼: 브라우저 창 → 사진 변환 순간 -->
  <!-- 브라우저 창 (좌측) -->
  <rect x="80" y="280" width="360" height="460" rx="16" fill="#1E1040"/>
  <rect x="80" y="280" width="360" height="460" rx="16" fill="none" stroke="#7B2FBE" stroke-width="6"/>
  <rect x="80" y="280" width="360" height="52" rx="16" fill="#7B2FBE"/>
  <rect x="80" y="308" width="360" height="24" fill="#7B2FBE"/>
  <circle cx="102" cy="306" r="9" fill="#FF5F57"/>
  <circle cx="124" cy="306" r="9" fill="#FEBC2E"/>
  <circle cx="146" cy="306" r="9" fill="#28C840"/>
  <rect x="160" y="291" width="200" height="28" rx="14" fill="#120820"/>
  <text x="260" y="311" font-family="monospace" font-size="14" fill="#9B6FDE" text-anchor="middle">https://</text>

  <!-- 브라우저 내용 -->
  <rect x="98" y="352" width="324" height="80" rx="6" fill="#1A0D38"/>
  <rect x="98" y="444" width="280" height="12" rx="3" fill="#3A1878"/>
  <rect x="98" y="464" width="310" height="10" rx="3" fill="#2A1060"/>
  <rect x="98" y="482" width="290" height="10" rx="3" fill="#2A1060"/>
  <rect x="98" y="510" width="320" height="50" rx="6" fill="#1A0D38"/>
  <rect x="98" y="572" width="260" height="10" rx="3" fill="#2A1060"/>
  <rect x="98" y="590" width="300" height="10" rx="3" fill="#2A1060"/>
  <rect x="98" y="620" width="320" height="60" rx="6" fill="#1A0D38"/>
  <rect x="98" y="692" width="240" height="10" rx="3" fill="#2A1060"/>

  <!-- 변환 화살표 (중앙) -->
  <g transform="translate(512, 512)">
    <path d="M-60,0 L60,0" stroke="#A855F7" stroke-width="12" stroke-linecap="round"/>
    <path d="M36,-28 L64,0 L36,28" fill="none" stroke="#A855F7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 변환 스파크 -->
    <circle cx="-8" cy="-22" r="5" fill="#C084FC" opacity="0.8"/>
    <circle cx="10" cy="24" r="4" fill="#C084FC" opacity="0.7"/>
    <circle cx="-20" cy="18" r="3" fill="#E879F9" opacity="0.6"/>
    <circle cx="20" cy="-18" r="3" fill="#E879F9" opacity="0.6"/>
  </g>

  <!-- 사진 파일 (우측) -->
  <rect x="584" y="280" width="360" height="460" rx="16" fill="#1E1040"/>
  <rect x="584" y="280" width="360" height="460" rx="16" fill="none" stroke="#A855F7" stroke-width="6"/>
  <!-- 이미지 폴더 귀접힘 -->
  <path d="M880,280 L944,344 L944,740 L584,740 L584,280 Z" fill="#1E1040"/>
  <path d="M880,280 L944,344 L880,344 Z" fill="#7B2FBE"/>
  <!-- 이미지 아이콘 (산 + 태양) -->
  <rect x="620" y="360" width="290" height="200" rx="8" fill="#120820"/>
  <circle cx="700" cy="408" r="28" fill="#FEBC2E"/>
  <polygon points="620,560 700,440 780,540 830,480 910,560" fill="#3A1878"/>
  <!-- 파일 확장자 표시 -->
  <rect x="620" y="580" width="140" height="40" rx="8" fill="#7B2FBE"/>
  <text x="690" y="607" font-family="monospace" font-size="22" font-weight="bold" fill="white" text-anchor="middle">PNG</text>
  <rect x="620" y="634" width="260" height="12" rx="3" fill="#3A1878"/>
  <rect x="620" y="654" width="220" height="10" rx="3" fill="#2A1060"/>
  <rect x="620" y="672" width="240" height="10" rx="3" fill="#2A1060"/>
  <rect x="620" y="696" width="200" height="10" rx="3" fill="#2A1060"/>
</svg>
