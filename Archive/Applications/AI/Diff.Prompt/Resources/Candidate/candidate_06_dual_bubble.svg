<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0C1E"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="bubbleB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <linearGradient id="vsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Chat bubble A (left) -->
  <rect x="44" y="80" width="190" height="150" rx="18" fill="url(#bubbleA)"/>
  <polygon points="80,230 44,260 110,230" fill="#1D4ED8"/>
  <!-- Lines in bubble A -->
  <rect x="64" y="105" width="150" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="64" y="125" width="130" height="10" rx="5" fill="white" opacity="0.5"/>
  <rect x="64" y="145" width="145" height="10" rx="5" fill="#FCA5A5" opacity="0.9"/>
  <rect x="64" y="165" width="120" height="10" rx="5" fill="white" opacity="0.5"/>
  <rect x="64" y="185" width="140" height="10" rx="5" fill="#FCA5A5" opacity="0.9"/>
  <!-- Chat bubble B (right) -->
  <rect x="278" y="80" width="190" height="150" rx="18" fill="url(#bubbleB)"/>
  <polygon points="432,230 468,260 402,230" fill="#9D174D"/>
  <!-- Lines in bubble B -->
  <rect x="298" y="105" width="150" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="298" y="125" width="130" height="10" rx="5" fill="white" opacity="0.5"/>
  <rect x="298" y="145" width="145" height="10" rx="5" fill="#BBF7D0" opacity="0.9"/>
  <rect x="298" y="165" width="120" height="10" rx="5" fill="white" opacity="0.5"/>
  <rect x="298" y="185" width="140" height="10" rx="5" fill="#BBF7D0" opacity="0.9"/>
  <!-- VS badge in center -->
  <circle cx="256" cy="175" r="36" fill="#0C0C1E" stroke="url(#vsGrad)" stroke-width="3"/>
  <text x="256" y="183" font-family="sans-serif" font-size="22" fill="url(#vsGrad)" text-anchor="middle" font-weight="bold">VS</text>
  <!-- Bottom diff bar -->
  <rect x="60" y="310" width="390" height="40" rx="12" fill="#1E1E3F" stroke="#3B3B6E" stroke-width="1.5"/>
  <rect x="72" y="322" width="90" height="16" rx="8" fill="#EF4444" opacity="0.8"/>
  <rect x="172" y="322" width="90" height="16" rx="8" fill="#22C55E" opacity="0.8"/>
  <rect x="272" y="322" width="90" height="16" rx="8" fill="#F59E0B" opacity="0.8"/>
  <!-- Labels -->
  <text x="117" y="334" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">removed</text>
  <text x="217" y="334" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">added</text>
  <text x="317" y="334" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">changed</text>
  <!-- Score bars -->
  <rect x="60" y="370" width="390" height="20" rx="10" fill="#1E1E3F"/>
  <rect x="60" y="370" width="240" height="20" rx="10" fill="url(#vsGrad)" opacity="0.7"/>
  <text x="256" y="420" font-family="sans-serif" font-size="16" fill="#93C5FD" text-anchor="middle">Similarity: 62%</text>
</svg>
