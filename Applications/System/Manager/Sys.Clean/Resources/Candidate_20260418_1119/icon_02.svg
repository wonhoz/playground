<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: 라이트 그린-민트 배경 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>

  <g clip-path="url(#clip02)">
    <!-- Layer 2: 3가지 청소 카테고리 카드 레이어드 -->

    <!-- 뒤 카드 (레지스트리) -->
    <rect x="160" y="170" width="380" height="460" rx="28" fill="#3F51B5" transform="rotate(-6 350 400)"/>
    <text x="340" y="280" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle" transform="rotate(-6 340 280)">레지스트리</text>
    <text x="340" y="370" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle" transform="rotate(-6 340 370)">🔑</text>
    <text x="340" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#C5CAE9" text-anchor="middle" transform="rotate(-6 340 470)">47개 수정</text>
    <text x="340" y="520" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#9FA8DA" text-anchor="middle" transform="rotate(-6 340 520)">REGISTRY</text>

    <!-- 뒤 카드2 (캐시) -->
    <rect x="480" y="160" width="380" height="460" rx="28" fill="#00695C" transform="rotate(5 670 390)"/>
    <text x="680" y="270" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle" transform="rotate(5 680 270)">브라우저캐시</text>
    <text x="680" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="90" text-anchor="middle" transform="rotate(5 680 360)">🌐</text>
    <text x="680" y="460" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#80CBC4" text-anchor="middle" transform="rotate(5 680 460)">856 MB</text>
    <text x="680" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#4DB6AC" text-anchor="middle" transform="rotate(5 680 510)">CACHE</text>

    <!-- 앞 카드 (임시 파일 - 메인) -->
    <rect x="300" y="140" width="424" height="520" rx="32" fill="#00897B"/>
    <!-- 카테고리 아이콘 -->
    <text x="512" y="290" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" text-anchor="middle">임시 파일</text>
    <text x="512" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="110" text-anchor="middle">🗂</text>
    <!-- 크기 표시 -->
    <text x="512" y="510" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="66" fill="#FFD54F" text-anchor="middle">2.3 GB</text>
    <text x="512" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#A7FFEB" text-anchor="middle">TEMP FILES</text>

    <!-- Layer 3: 총 절약 배지 -->
    <rect x="160" y="740" width="704" height="96" rx="28" fill="#1B5E20"/>
    <text x="512" y="790" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#A5D6A7" text-anchor="middle">총 정리 용량</text>
    <text x="512" y="826" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">3.2 GB + 47 항목</text>

    <!-- 상단 타이틀 -->
    <rect x="240" y="860" width="544" height="78" rx="22" fill="#00838F"/>
    <text x="512" y="912" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SYS.CLEAN</text>
  </g>
</svg>
