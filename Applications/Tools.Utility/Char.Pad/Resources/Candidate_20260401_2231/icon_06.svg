<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg06cp)"/>

  <!-- Layer 2: Magnifying glass + symbol inside -->
  <!-- Glass circle -->
  <circle cx="480" cy="430" r="285" fill="white" opacity="0.92"/>
  <circle cx="480" cy="430" r="245" fill="#FFF8E1"/>
  <!-- The symbol being searched -->
  <text x="480" y="530" font-family="'Segoe UI',Arial,sans-serif" font-size="280" fill="#E65100"
    text-anchor="middle">©</text>
  <!-- Magnifier ring -->
  <circle cx="480" cy="430" r="265" fill="none" stroke="white" stroke-width="44"/>

  <!-- Handle -->
  <line x1="698" y1="648" x2="860" y2="820" stroke="white" stroke-width="72" stroke-linecap="round"/>
  <line x1="698" y1="648" x2="860" y2="820" stroke="#FFB300" stroke-width="44" stroke-linecap="round"/>

  <!-- Layer 3: Small symbols scattered around suggesting "found it" -->
  <circle cx="180" cy="200" r="55" fill="white" opacity="0.85"/>
  <text x="180" y="218" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#E65100" text-anchor="middle">∑</text>

  <circle cx="820" cy="200" r="55" fill="white" opacity="0.85"/>
  <text x="820" y="218" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#E65100" text-anchor="middle">→</text>

  <circle cx="140" cy="760" r="55" fill="white" opacity="0.85"/>
  <text x="140" y="778" font-family="'Segoe UI',Arial,sans-serif" font-size="56" fill="#E65100" text-anchor="middle">€</text>

  <!-- Search box at bottom -->
  <rect x="88" y="870" width="848" height="72" rx="36" fill="white" opacity="0.2"/>
  <text x="180" y="916" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="white" opacity="0.85">🔍  search...</text>
</svg>
