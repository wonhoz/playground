<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#155E75"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg06)"/>
  <!-- 스코어보드 패널 -->
  <rect x="152" y="170" width="720" height="580" rx="28" fill="url(#panelGrad)" stroke="#22D3EE" stroke-width="6"/>
  <!-- 패널 상단 바 -->
  <rect x="152" y="170" width="720" height="70" rx="28" fill="#0891B2"/>
  <rect x="152" y="210" width="720" height="30" fill="#0891B2"/>
  <!-- DODGE BLITZ 텍스트 -->
  <text x="512" y="225" font-family="Arial Black" font-weight="900" font-size="42" fill="white" text-anchor="middle">DODGE · BLITZ</text>
  <!-- 스코어 라인들 -->
  <!-- BEST TIME -->
  <text x="220" y="316" font-family="Arial" font-size="30" fill="#7DD3FC" font-weight="bold">BEST TIME</text>
  <text x="804" y="316" font-family="Arial Black" font-weight="900" font-size="38" fill="#22D3EE" text-anchor="end">02:47.8</text>
  <!-- 구분선 -->
  <line x1="180" y1="335" x2="844" y2="335" stroke="#1E40AF" stroke-width="2" opacity="0.6"/>
  <!-- SCORE -->
  <text x="220" y="388" font-family="Arial" font-size="30" fill="#7DD3FC" font-weight="bold">SCORE</text>
  <text x="804" y="388" font-family="Arial Black" font-weight="900" font-size="38" fill="#FCD34D" text-anchor="end">12,840</text>
  <line x1="180" y1="407" x2="844" y2="407" stroke="#1E40AF" stroke-width="2" opacity="0.6"/>
  <!-- LEVEL -->
  <text x="220" y="460" font-family="Arial" font-size="30" fill="#7DD3FC" font-weight="bold">LEVEL</text>
  <text x="804" y="460" font-family="Arial Black" font-weight="900" font-size="38" fill="#4ADE80" text-anchor="end">★★★★</text>
  <line x1="180" y1="479" x2="844" y2="479" stroke="#1E40AF" stroke-width="2" opacity="0.6"/>
  <!-- DODGED -->
  <text x="220" y="532" font-family="Arial" font-size="30" fill="#7DD3FC" font-weight="bold">DODGED</text>
  <text x="804" y="532" font-family="Arial Black" font-weight="900" font-size="38" fill="#F472B6" text-anchor="end">247</text>
  <!-- 다이아몬드 아이콘 (오른쪽 하단 패널 안) -->
  <polygon points="512,640 590,720 512,800 434,720" fill="#22D3EE" opacity="0.9"/>
  <polygon points="512,660 572,720 512,780 452,720" fill="#38BDF8"/>
  <polygon points="512,686 548,720 512,754 476,720" fill="#7DD3FC"/>
  <!-- 하단 "새 게임" 버튼 느낌 -->
  <rect x="290" y="850" width="444" height="70" rx="22" fill="#22D3EE"/>
  <text x="512" y="896" font-family="Arial Black" font-weight="900" font-size="40" fill="#0C4A6E" text-anchor="middle">PLAY AGAIN</text>
</svg>
