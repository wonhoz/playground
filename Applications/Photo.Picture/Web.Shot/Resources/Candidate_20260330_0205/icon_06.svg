<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="browser6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#1A2A2A"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 다크 그린 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg6)"/>

  <!-- Layer 2: 브라우저 창 -->
  <rect x="80" y="160" width="760" height="560" rx="20" fill="url(#browser6)" stroke="#4CAF50" stroke-width="4"/>
  <!-- 헤더 바 -->
  <rect x="80" y="160" width="760" height="54" rx="20" fill="#0A1A0A"/>
  <circle cx="124" cy="187" r="11" fill="#EF5350"/>
  <circle cx="158" cy="187" r="11" fill="#FFD740"/>
  <circle cx="192" cy="187" r="11" fill="#4CAF50"/>
  <rect x="226" y="166" width="480" height="36" rx="10" fill="#1B3A1B"/>
  <text x="466" y="186" font-family="'Courier New',monospace" font-size="20" fill="#69F0AE" text-anchor="middle" dominant-baseline="middle">https://example.com</text>
  <!-- 웹 콘텐츠 -->
  <rect x="100" y="234" width="720" height="40" rx="6" fill="#1B3A1B" opacity="0.8"/>
  <rect x="100" y="286" width="540" height="18" rx="4" fill="#2E7D32" opacity="0.6"/>
  <rect x="100" y="316" width="460" height="18" rx="4" fill="#2E7D32" opacity="0.5"/>
  <rect x="100" y="370" width="340" height="240" rx="8" fill="#1B3A1B" opacity="0.7"/>
  <text x="270" y="492" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#69F0AE" text-anchor="middle" dominant-baseline="middle">[ screenshot ]</text>

  <!-- Layer 3: 카메라 배지 (오른쪽 하단, 레이어드) -->
  <circle cx="800" cy="680" r="140" fill="#4CAF50" stroke="white" stroke-width="8"/>
  <!-- 카메라 몸체 -->
  <rect x="720" y="638" width="160" height="110" rx="16" fill="#1B5E20"/>
  <circle cx="800" cy="693" r="38" fill="#263238" stroke="white" stroke-width="5"/>
  <circle cx="800" cy="693" r="22" fill="#388E3C"/>
  <circle cx="800" cy="693" r="10" fill="#69F0AE"/>
  <rect x="800" y="625" width="38" height="22" rx="6" fill="#2E7D32"/>

  <!-- PNG 저장 배지 -->
  <rect x="140" y="788" width="580" height="72" rx="20" fill="#388E3C"/>
  <text x="430" y="826" font-family="'Courier New',monospace" font-weight="900" font-size="36" fill="white" text-anchor="middle" dominant-baseline="middle">→  screenshot.png</text>
</svg>
