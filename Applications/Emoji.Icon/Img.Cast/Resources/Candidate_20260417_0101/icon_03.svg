<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Layer 2: Stacked file icons -->
  <!-- File 3 (back) - SVG -->
  <rect x="278" y="168" width="300" height="370" rx="22" fill="#0288D1" opacity="0.7"/>
  <polygon points="528,168 578,218 578,218 528,218" fill="#01579B" opacity="0.7"/>
  <rect x="528" y="168" width="50" height="50" rx="0" fill="#01579B" opacity="0.7"/>
  <text x="428" y="370" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" opacity="0.8">SVG</text>

  <!-- File 2 (middle) - PNG -->
  <rect x="328" y="228" width="300" height="370" rx="22" fill="#0277BD"/>
  <polygon points="578,228 628,278 628,278 578,278" fill="#01579B"/>
  <rect x="578" y="228" width="50" height="50" rx="0" fill="#01579B"/>
  <text x="478" y="430" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">PNG</text>

  <!-- File 1 (front) - ICO -->
  <rect x="388" y="292" width="300" height="370" rx="22" fill="white" stroke="#0288D1" stroke-width="8"/>
  <polygon points="638,292 688,342 638,342" fill="#E1F5FE"/>
  <rect x="638" y="292" width="50" height="50" rx="0" fill="#E1F5FE" stroke="#0288D1" stroke-width="8"/>
  <text x="538" y="494" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#0277BD" text-anchor="middle">ICO</text>

  <!-- Layer 3: Gold star badge -->
  <circle cx="720" cy="730" r="95" fill="#FFD600"/>
  <text x="720" y="755" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="#0277BD" text-anchor="middle">✓</text>

  <!-- Bottom text -->
  <text x="380" y="830" font-family="Arial, sans-serif" font-size="66" font-weight="700" fill="white" text-anchor="middle">Img.Cast</text>
</svg>
