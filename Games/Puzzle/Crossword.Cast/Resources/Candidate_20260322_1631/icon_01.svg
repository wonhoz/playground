<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121222"/>
      <stop offset="100%" stop-color="#080816"/>
    </linearGradient>
    <clipPath id="frame01">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <g clip-path="url(#frame01)">
    <!-- Layer 2: Crossword grid (6x6, cell=130px, gap=6px) -->
    <!-- Starting at x=82, y=108. Total: 6*130+5*6=810 -->
    <!-- Row 0: W-O-R-D-■-■ -->
    <rect x="82" y="108" width="130" height="130" rx="6" fill="white"/>
    <text x="147" y="190" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">W</text>
    <text x="82" y="126" font-family="'Segoe UI',Arial" font-size="24" font-weight="700" fill="#888">1</text>

    <rect x="218" y="108" width="130" height="130" rx="6" fill="white"/>
    <text x="283" y="190" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">O</text>

    <rect x="354" y="108" width="130" height="130" rx="6" fill="white"/>
    <text x="419" y="190" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">R</text>

    <rect x="490" y="108" width="130" height="130" rx="6" fill="white"/>
    <text x="555" y="190" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">D</text>

    <rect x="626" y="108" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="762" y="108" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <!-- Row 1: ■-■-D-■-P-■ -->
    <rect x="82" y="244" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="218" y="244" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="354" y="244" width="130" height="130" rx="6" fill="white"/>
    <text x="419" y="326" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">D</text>

    <rect x="490" y="244" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="626" y="244" width="130" height="130" rx="6" fill="white"/>
    <text x="691" y="326" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">P</text>
    <text x="626" y="262" font-family="'Segoe UI',Arial" font-size="24" font-weight="700" fill="#888">2</text>

    <rect x="762" y="244" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <!-- Row 2: G-A-M-E-■-L — highlighted row "GAME" across -->
    <rect x="82" y="380" width="130" height="130" rx="6" fill="white"/>
    <text x="147" y="462" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">G</text>
    <text x="82" y="398" font-family="'Segoe UI',Arial" font-size="24" font-weight="700" fill="#888">3</text>

    <!-- Highlighted selected cell -->
    <rect x="218" y="380" width="130" height="130" rx="6" fill="#FFF8E0"/>
    <rect x="218" y="380" width="130" height="130" rx="6" fill="none" stroke="#FFD700" stroke-width="5"/>
    <text x="283" y="462" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">A</text>

    <rect x="354" y="380" width="130" height="130" rx="6" fill="white"/>
    <text x="419" y="462" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">M</text>

    <rect x="490" y="380" width="130" height="130" rx="6" fill="white"/>
    <text x="555" y="462" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">E</text>

    <rect x="626" y="380" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="762" y="380" width="130" height="130" rx="6" fill="white"/>
    <text x="827" y="462" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">L</text>

    <!-- Row 3: ■-■-E-■-L-A -->
    <rect x="82" y="516" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="218" y="516" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="354" y="516" width="130" height="130" rx="6" fill="white"/>
    <text x="419" y="598" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">E</text>

    <rect x="490" y="516" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="626" y="516" width="130" height="130" rx="6" fill="white"/>
    <text x="691" y="598" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">L</text>

    <rect x="762" y="516" width="130" height="130" rx="6" fill="white"/>
    <text x="827" y="598" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">A</text>

    <!-- Row 4: ■-■-■-■-A-Y -->
    <rect x="82" y="652" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="218" y="652" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="354" y="652" width="130" height="130" rx="6" fill="#1A1A2E"/>
    <rect x="490" y="652" width="130" height="130" rx="6" fill="#1A1A2E"/>

    <rect x="626" y="652" width="130" height="130" rx="6" fill="white"/>
    <text x="691" y="734" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">A</text>

    <rect x="762" y="652" width="130" height="130" rx="6" fill="white"/>
    <text x="827" y="734" font-family="'Segoe UI',Arial" font-size="78" font-weight="900" fill="#1A1A2E" text-anchor="middle">Y</text>

    <!-- Layer 3: Status bar bottom -->
    <rect x="82" y="820" width="860" height="70" rx="12" fill="#1E1E32"/>
    <text x="512" y="863" font-family="'Segoe UI',Arial" font-size="34" fill="#666" text-anchor="middle">셀 클릭 후 알파벳 입력 · Tab: 방향 전환</text>

    <!-- Across/Down labels -->
    <text x="147" y="912" font-family="'Segoe UI',Arial" font-size="38" font-weight="700" fill="#5C6BC0" text-anchor="middle">↔ ACROSS</text>
    <text x="775" y="912" font-family="'Segoe UI',Arial" font-size="38" font-weight="700" fill="#E57373" text-anchor="middle">↕ DOWN</text>
  </g>
</svg>
