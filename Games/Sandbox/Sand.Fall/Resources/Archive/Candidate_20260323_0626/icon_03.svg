<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 파이프라인 재질 흐름 | 대각선/동적 | #0A0A14 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A0A14"/>
  <!-- Layer 2: Pipes with different materials flowing through -->
  <!-- Pipe 1: Sand (top, going right) -->
  <rect x="160" y="260" width="704" height="64" rx="32" fill="#1A1400" stroke="#6B5A00" stroke-width="4"/>
  <!-- Sand flowing inside -->
  <rect x="170" y="275" width="500" height="34" rx="17" fill="#E8C878" opacity="0.7"/>
  <text x="340" y="302" font-family="Arial,sans-serif" font-size="18" fill="#A0751A" text-anchor="middle" font-weight="bold">모래</text>
  <!-- Flow arrow -->
  <polygon points="770,292 790,280 790,304" fill="#E8C878" opacity="0.8"/>
  <!-- Pipe 2: Water (middle, going left) -->
  <rect x="160" y="470" width="704" height="64" rx="32" fill="#001428" stroke="#1E40AF" stroke-width="4"/>
  <rect x="344" y="485" width="510" height="34" rx="17" fill="#3B82F6" opacity="0.7"/>
  <text x="600" y="512" font-family="Arial,sans-serif" font-size="18" fill="#93C5FD" text-anchor="middle" font-weight="bold">물</text>
  <polygon points="254,502 234,490 234,514" fill="#3B82F6" opacity="0.8"/>
  <!-- Pipe 3: Fire (bottom, going right) -->
  <rect x="160" y="680" width="704" height="64" rx="32" fill="#200000" stroke="#991B1B" stroke-width="4"/>
  <rect x="170" y="695" width="560" height="34" rx="17" fill="#EF4444" opacity="0.7"/>
  <text x="380" y="722" font-family="Arial,sans-serif" font-size="18" fill="#FCA5A5" text-anchor="middle" font-weight="bold">불</text>
  <polygon points="830,712 850,700 850,724" fill="#EF4444" opacity="0.8"/>
  <!-- Pipe connections (vertical) -->
  <rect x="464" y="324" width="96" height="150" rx="12" fill="#1A1428" stroke="#4A4A6A" stroke-width="3"/>
  <!-- Mixing indicator -->
  <circle cx="512" cy="400" r="22" fill="#7C3AED" opacity="0.8"/>
  <text x="512" y="408" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">+</text>
  <!-- Layer 3: Result (steam coming out from mixing) -->
  <ellipse cx="600" cy="250" rx="30" ry="16" fill="#D1D5DB" opacity="0.4"/>
  <ellipse cx="640" cy="224" rx="22" ry="14" fill="#D1D5DB" opacity="0.3"/>
  <ellipse cx="570" cy="214" rx="26" ry="12" fill="#D1D5DB" opacity="0.25"/>
  <text x="610" y="200" font-family="Arial,sans-serif" font-size="16" fill="#9CA3AF" text-anchor="middle">증기</text>
</svg>
