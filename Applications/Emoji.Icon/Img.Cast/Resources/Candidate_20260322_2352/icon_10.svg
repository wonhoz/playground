<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qualGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="url(#qualGrad)"/>
  <!-- Layer 2: Two image panels side by side -->
  <!-- Left panel: Low quality / blurry -->
  <rect x="100" y="230" width="340" height="400" rx="20" fill="#374151"/>
  <text x="270" y="210" font-family="Arial,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="middle">저품질</text>
  <!-- Blurry pixel grid (simulated) -->
  <rect x="120" y="254" width="300" height="352" rx="10" fill="#4B5563"/>
  <!-- Blurry colored blocks -->
  <rect x="130" y="264" width="90" height="80" rx="4" fill="#6B7280"/>
  <rect x="228" y="264" width="90" height="80" rx="4" fill="#9CA3AF"/>
  <rect x="326" y="264" width="80" height="80" rx="4" fill="#6B7280"/>
  <rect x="130" y="352" width="90" height="80" rx="4" fill="#9CA3AF"/>
  <rect x="228" y="352" width="90" height="80" rx="4" fill="#6B7280"/>
  <rect x="326" y="352" width="80" height="80" rx="4" fill="#9CA3AF"/>
  <rect x="130" y="440" width="276" height="80" rx="4" fill="#6B7280" opacity="0.6"/>
  <rect x="130" y="528" width="276" height="60" rx="4" fill="#4B5563" opacity="0.6"/>
  <!-- Arrow in center -->
  <line x1="464" y1="430" x2="560" y2="430" stroke="#FDE047" stroke-width="22" stroke-linecap="round"/>
  <polygon points="560,404 610,430 560,456" fill="#FDE047"/>
  <text x="512" y="486" font-family="Arial,sans-serif" font-size="18" fill="#FDE047" text-anchor="middle">2x 슈퍼샘플링</text>
  <!-- Right panel: High quality / sharp -->
  <rect x="584" y="230" width="340" height="400" rx="20" fill="#4C1D95"/>
  <text x="754" y="210" font-family="Arial,sans-serif" font-size="20" fill="#C4B5FD" text-anchor="middle">고품질</text>
  <!-- Sharp colored blocks -->
  <rect x="604" y="254" width="300" height="352" rx="10" fill="#3730A3"/>
  <rect x="614" y="264" width="90" height="80" rx="3" fill="#EF4444"/>
  <rect x="712" y="264" width="90" height="80" rx="3" fill="#22C55E"/>
  <rect x="810" y="264" width="74" height="80" rx="3" fill="#3B82F6"/>
  <rect x="614" y="352" width="90" height="80" rx="3" fill="#F97316"/>
  <rect x="712" y="352" width="90" height="80" rx="3" fill="#8B5CF6"/>
  <rect x="810" y="352" width="74" height="80" rx="3" fill="#EC4899"/>
  <rect x="614" y="440" width="270" height="80" rx="3" fill="#EAB308"/>
  <rect x="614" y="528" width="270" height="60" rx="3" fill="#0EA5E9" opacity="0.8"/>
  <!-- Layer 3: Quality badge -->
  <rect x="640" y="668" width="220" height="44" rx="14" fill="#7C3AED"/>
  <text x="750" y="695" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">선명한 ICO</text>
</svg>