<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Comic page panels -->
  <rect x="60" y="60" width="186" height="186" rx="6" fill="url(#paper)" stroke="#1A1A1A" stroke-width="5"/>
  <rect x="266" y="60" width="186" height="186" rx="6" fill="#BBDEFB" stroke="#1A1A1A" stroke-width="5"/>
  <rect x="60" y="266" width="392" height="186" rx="6" fill="#C8E6C9" stroke="#1A1A1A" stroke-width="5"/>
  <!-- Panel 1: photo icon -->
  <rect x="90" y="90" width="126" height="96" rx="8" fill="#FFECB3" stroke="#1A1A1A" stroke-width="3"/>
  <circle cx="153" cy="138" r="28" fill="#FF9800"/>
  <circle cx="153" cy="138" r="18" fill="#FFD54F"/>
  <!-- Panel 1: person silhouette -->
  <circle cx="153" cy="120" r="10" fill="#1A1A1A"/>
  <path d="M133,156 Q153,142 173,156 L178,186 H128 Z" fill="#1A1A1A"/>
  <!-- Panel 2: cartoon effect arrows -->
  <text x="290" y="148" font-size="80" fill="#1A1A1A" opacity="0.85">→</text>
  <!-- Panel 3: cartoon output -->
  <rect x="90" y="296" width="332" height="126" rx="6" fill="#DCEDC8" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Simplified cartoon face -->
  <circle cx="195" cy="359" r="50" fill="#FFD54F" stroke="#1A1A1A" stroke-width="4"/>
  <circle cx="180" cy="349" r="7" fill="#1A1A1A"/>
  <circle cx="210" cy="349" r="7" fill="#1A1A1A"/>
  <path d="M175,372 Q195,390 215,372" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Speech bubble -->
  <ellipse cx="340" cy="340" rx="68" ry="36" fill="white" stroke="#1A1A1A" stroke-width="4"/>
  <polygon points="290,360 270,385 315,365" fill="white" stroke="#1A1A1A" stroke-width="3"/>
  <text x="340" y="348" text-anchor="middle" font-family="Arial Black" font-size="18" fill="#1A1A1A">WOW!</text>
</svg>
