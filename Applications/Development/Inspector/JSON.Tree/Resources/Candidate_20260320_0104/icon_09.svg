<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09: 러시안 인형 (matryoshka: nested objects) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0500"/>
  <!-- 가장 바깥 인형 -->
  <ellipse cx="512" cy="500" rx="290" ry="340" fill="none" stroke="#E65100" stroke-width="22"/>
  <!-- 중간 인형 -->
  <ellipse cx="512" cy="500" rx="210" ry="250" fill="none" stroke="#FF8A65" stroke-width="18"/>
  <!-- 안쪽 인형 -->
  <ellipse cx="512" cy="500" rx="130" ry="160" fill="none" stroke="#E65100" stroke-width="14" opacity="0.8"/>
  <!-- 핵심 인형 (채움) -->
  <ellipse cx="512" cy="500" rx="55" ry="70" fill="#FF8A65" opacity="0.9"/>
  <!-- 머리 장식 (바깥) -->
  <circle cx="512" cy="220" r="55" fill="#E65100"/>
  <!-- 머리 장식 (중간) -->
  <circle cx="512" cy="290" r="38" fill="#FF8A65" opacity="0.7"/>
  <!-- 허리선 (각 인형) -->
  <path d="M222 520 Q512 560 802 520" fill="none" stroke="#E65100" stroke-width="8" opacity="0.4"/>
  <path d="M302 520 Q512 555 722 520" fill="none" stroke="#FF8A65" stroke-width="6" opacity="0.4"/>
  <path d="M382 510 Q512 540 642 510" fill="none" stroke="#E65100" stroke-width="5" opacity="0.4"/>
</svg>
