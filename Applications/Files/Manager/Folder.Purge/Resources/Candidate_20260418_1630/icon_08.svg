<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0D1B33"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 3x3 폴더 격자 — 색상으로 상태 구분 -->
    <!-- 범례: 민트=정상, 레드=삭제대상, 회색=빈폴더 -->

    <!-- Row 1 -->
    <!-- 정상(민트) -->
