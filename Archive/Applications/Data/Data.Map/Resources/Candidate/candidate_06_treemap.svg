  <text x="224" y="343" font-family="Arial, sans-serif" font-size="11" fill="#b0bec5" text-anchor="middle">G: 7%</text>
  <!-- Bottom right -->
  <rect x="272" y="248" width="88" height="120" rx="4" fill="#880e4f"/>
  <rect x="274" y="250" width="84" height="116" rx="3" fill="#ad1457" opacity="0.7"/>
  <text x="316" y="308" font-family="Arial Black, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Cat H</text>
  <text x="316" y="326" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f48fb1" text-anchor="middle">11%</text>
  <!-- Right column blocks -->
  <rect x="368" y="248" width="88" height="56" rx="4" fill="#33691e"/>
  <text x="412" y="280" font-family="Arial, sans-serif" font-size="11" fill="#dcedc8" text-anchor="middle">I: 6%</text>
