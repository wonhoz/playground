<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#001D3D"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003566"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Track -->
  <rect x="60" y="320" width="392" height="16" rx="8" fill="url(#track)"/>
  <!-- Morse dots/dashes as obstacles -->
  <rect x="100" y="284" width="40" height="24" rx="6" fill="#FFC300" filter="url(#glow)"/>
  <rect x="165" y="284" width="14" height="24" rx="7" fill="#FFC300" filter="url(#glow)"/>
  <rect x="215" y="284" width="40" height="24" rx="6" fill="#FFC300" filter="url(#glow)"/>
  <rect x="290" y="284" width="14" height="24" rx="7" fill="#FFC300" filter="url(#glow)"/>
  <rect x="340" y="284" width="40" height="24" rx="6" fill="#FFC300" filter="url(#glow)"/>
  <!-- Runner figure -->
  <circle cx="256" cy="210" r="24" fill="#00B4D8"/>
  <line x1="256" y1="234" x2="256" y2="286" stroke="#00B4D8" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="228" y2="240" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="284" y2="248" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="286" x2="232" y2="318" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="286" x2="280" y2="310" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
  <!-- Speed lines -->
  <line x1="60" y1="256" x2="120" y2="256" stroke="#0077B6" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="270" x2="100" y2="270" stroke="#0077B6" stroke-width="2" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="120" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#FFC300" filter="url(#glow)">·  −  ·</text>
  <text x="256" y="156" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#00B4D8">MORSE.RUN</text>
</svg>