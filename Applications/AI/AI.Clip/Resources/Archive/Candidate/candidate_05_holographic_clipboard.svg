<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#001233"/>
    </linearGradient>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="35%" stop-color="#0099ff"/>
      <stop offset="70%" stop-color="#cc00ff"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </linearGradient>
    <filter id="holoGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ffcc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Holographic projection base platform -->
  <ellipse cx="256" cy="410" rx="130" ry="22" fill="none" stroke="url(#holoGrad)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="256" cy="410" rx="130" ry="22" fill="url(#holoGrad)" fill-opacity="0.08"/>
  <!-- Projection rays -->
  <line x1="156" y1="405" x2="176" y2="165" stroke="url(#holoGrad)" stroke-width="1" opacity="0.25"/>
  <line x1="356" y1="405" x2="336" y2="165" stroke="url(#holoGrad)" stroke-width="1" opacity="0.25"/>
  <!-- Holographic clipboard frame -->
  <rect x="176" y="145" width="160" height="218" rx="10" fill="none" stroke="url(#holoGrad)" stroke-width="2.5" filter="url(#holoGlow)"/>
  <rect x="176" y="145" width="160" height="218" rx="10" fill="url(#holoGrad)" fill-opacity="0.06"/>
  <!-- Scan line moving down -->
  <rect x="176" y="220" width="160" height="30" rx="4" fill="url(#scanGrad)"/>
  <!-- Clipboard clip -->
  <rect x="228" y="132" width="56" height="26" rx="7" fill="none" stroke="url(#holoGrad)" stroke-width="2" filter="url(#holoGlow)"/>
  <!-- Holo data lines -->
  <line x1="196" y1="190" x2="318" y2="190" stroke="#00ffcc" stroke-width="1.5" opacity="0.7" filter="url(#holoGlow)"/>
  <line x1="196" y1="210" x2="300" y2="210" stroke="#0099ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="196" y1="248" x2="318" y2="248" stroke="#cc00ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="196" y1="268" x2="305" y2="268" stroke="#0099ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="196" y1="310" x2="295" y2="310" stroke="#00ffcc" stroke-width="1.5" opacity="0.5"/>
  <line x1="196" y1="332" x2="315" y2="332" stroke="#ff0066" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner decorations -->
  <path d="M176 165 L176 148 L193 148" fill="none" stroke="#00ffcc" stroke-width="2.5" filter="url(#holoGlow)"/>
  <path d="M336 165 L336 148 L319 148" fill="none" stroke="#00ffcc" stroke-width="2.5" filter="url(#holoGlow)"/>
  <path d="M176 343 L176 360 L193 360" fill="none" stroke="#cc00ff" stroke-width="2.5" filter="url(#holoGlow)"/>
  <path d="M336 343 L336 360 L319 360" fill="none" stroke="#cc00ff" stroke-width="2.5" filter="url(#holoGlow)"/>
  <!-- Floating particles -->
  <circle cx="135" cy="195" r="3" fill="#00ffcc" opacity="0.7" filter="url(#holoGlow)"/>
  <circle cx="150" cy="280" r="2" fill="#0099ff" opacity="0.6"/>
  <circle cx="375" cy="220" r="3" fill="#cc00ff" opacity="0.7" filter="url(#holoGlow)"/>
  <circle cx="368" cy="310" r="2" fill="#ff0066" opacity="0.6"/>
  <circle cx="390" cy="260" r="4" fill="#00ffcc" opacity="0.5"/>
  <circle cx="120" cy="320" r="4" fill="#0099ff" opacity="0.5"/>
</svg>