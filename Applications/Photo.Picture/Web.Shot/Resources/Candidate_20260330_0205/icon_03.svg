<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="lens3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#0091EA"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 딥 인디고 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg3)"/>

  <!-- Layer 2: 지구본 (Web) -->
  <circle cx="512" cy="480" r="300" fill="#1565C0" stroke="#42A5F5" stroke-width="8"/>
  <!-- 위도선 -->
  <ellipse cx="512" cy="480" rx="300" ry="100" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.5"/>
  <ellipse cx="512" cy="480" rx="300" ry="200" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.3"/>
  <!-- 경도선 -->
  <ellipse cx="512" cy="480" rx="120" ry="300" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.5"/>
  <ellipse cx="512" cy="480" rx="240" ry="300" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.3"/>
  <!-- 수직 중심선 -->
  <line x1="512" y1="180" x2="512" y2="780" stroke="#42A5F5" stroke-width="3" opacity="0.4"/>

  <!-- Layer 3: 카메라 렌즈 오버레이 -->
  <circle cx="512" cy="480" r="180" fill="none" stroke="#FFD740" stroke-width="16"/>
  <circle cx="512" cy="480" r="120" fill="none" stroke="#FFD740" stroke-width="8" opacity="0.7"/>
  <circle cx="512" cy="480" r="60" fill="#FFD740" opacity="0.9"/>
  <circle cx="512" cy="480" r="32" fill="#FF8F00"/>
  <!-- 셔터 라인 (십자) -->
  <line x1="332" y1="480" x2="692" y2="480" stroke="#FFD740" stroke-width="6" opacity="0.6"/>
  <line x1="512" y1="300" x2="512" y2="660" stroke="#FFD740" stroke-width="6" opacity="0.6"/>
  <!-- 코너 포커스 마커 -->
  <path d="M260 260 L260 310 M260 260 L310 260" stroke="#FFD740" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M764 260 L764 310 M764 260 L714 260" stroke="#FFD740" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M260 700 L260 650 M260 700 L310 700" stroke="#FFD740" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M764 700 L764 650 M764 700 L714 700" stroke="#FFD740" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
