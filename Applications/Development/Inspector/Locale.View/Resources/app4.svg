<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="lv2-clip">
      <rect width="1024" height="1024" rx="180"/>
    </clipPath>
    <radialGradient id="lv2-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#C87800"/>
      <stop offset="100%" stop-color="#7A4200"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#lv2-clip)">
    <!-- Background: Deep Amber -->
    <rect width="1024" height="1024" fill="url(#lv2-bg)"/>
    <!-- Subtle radial overlay -->
    <circle cx="512" cy="512" r="380" fill="#A06000" opacity="0.25"/>

    <!-- Currency symbols flowing diagonally (white, large) -->
    <g font-family="Arial, sans-serif" font-weight="bold" fill="#FFFFFF">
      <!-- $ Dollar -->
      <text x="220" y="350" font-size="160" opacity="0.95">$</text>
      <!-- ¥ Yen -->
      <text x="440" y="280" font-size="140" opacity="0.9">¥</text>
      <!-- € Euro -->
      <text x="660" y="360" font-size="150" opacity="0.88">€</text>
      <!-- ₩ Won -->
      <text x="240" y="560" font-size="130" opacity="0.82">₩</text>
      <!-- £ Pound -->
      <text x="500" y="520" font-size="140" opacity="0.85">£</text>
      <!-- ₹ Rupee -->
      <text x="720" y="560" font-size="120" opacity="0.75">₹</text>
      <!-- ₿ Bitcoin (smaller accent) -->
      <text x="320" y="740" font-size="100" opacity="0.65">₿</text>
      <!-- ₺ Lira -->
      <text x="580" y="720" font-size="100" opacity="0.60">₺</text>
      <!-- CHF accent -->
      <text x="730" y="720" font-size="80" opacity="0.50">Fr</text>
    </g>

    <!-- Flowing motion lines (diagonal streaks) -->
    <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.15">
      <line x1="200" y1="200" x2="824" y2="824"/>
      <line x1="180" y1="280" x2="700" y2="800"/>
      <line x1="300" y1="180" x2="900" y2="780"/>
    </g>

    <!-- Corner accents -->
    <circle cx="820" cy="220" r="22" fill="#7A4200" opacity="0.5"/>
    <circle cx="210" cy="800" r="28" fill="#7A4200" opacity="0.4"/>
  </g>
</svg>
