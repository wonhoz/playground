<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: Phone silhouette scanning a QR code -->
  <!-- Phone body -->
  <rect x="280" y="210" width="240" height="440" rx="36" fill="#1F2937"/>
  <rect x="296" y="230" width="208" height="380" rx="18" fill="#374151"/>
  <!-- Phone screen showing QR scanner viewfinder -->
  <rect x="308" y="242" width="184" height="356" rx="12" fill="#1F2937"/>
  <!-- Viewfinder corners -->
  <path d="M 330 264 L 330 290 M 330 264 L 356 264" stroke="#4ADE80" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 470 264 L 470 290 M 470 264 L 444 264" stroke="#4ADE80" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 330 574 L 330 548 M 330 574 L 356 574" stroke="#4ADE80" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 470 574 L 470 548 M 470 574 L 444 574" stroke="#4ADE80" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Scan line -->
  <line x1="318" y1="418" x2="462" y2="418" stroke="#4ADE80" stroke-width="6" opacity="0.8"/>
  <!-- QR target in viewfinder -->
  <rect x="350" y="360" width="100" height="100" rx="6" fill="none" stroke="#4ADE80" stroke-width="8" opacity="0.7"/>
  <!-- QR code on right side being scanned -->
  <rect x="600" y="300" width="240" height="240" rx="16" fill="white" opacity="0.9"/>
  <!-- Simple QR pattern -->
  <rect x="624" y="324" width="64" height="64" rx="6" fill="#1F2937"/>
  <rect x="636" y="336" width="40" height="40" rx="3" fill="white"/>
  <rect x="645" y="345" width="22" height="22" fill="#1F2937"/>
  <rect x="752" y="324" width="64" height="64" rx="6" fill="#1F2937"/>
  <rect x="764" y="336" width="40" height="40" rx="3" fill="white"/>
  <rect x="773" y="345" width="22" height="22" fill="#1F2937"/>
  <rect x="624" y="452" width="64" height="64" rx="6" fill="#1F2937"/>
  <rect x="636" y="464" width="40" height="40" rx="3" fill="white"/>
  <rect x="645" y="473" width="22" height="22" fill="#1F2937"/>
  <rect x="706" y="324" width="22" height="22" fill="#1F2937"/>
  <rect x="706" y="356" width="22" height="22" fill="#1F2937"/>
  <rect x="706" y="388" width="22" height="22" fill="#1F2937"/>
  <!-- Scan beam from phone to QR -->
  <path d="M 522 418 L 600 418" stroke="#4ADE80" stroke-width="8" stroke-dasharray="16,8" opacity="0.7"/>
  <!-- Layer 3: Scan success indicator -->
  <circle cx="720" cy="608" r="64" fill="#16A34A"/>
  <polyline points="688,608 712,636 756,584" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
