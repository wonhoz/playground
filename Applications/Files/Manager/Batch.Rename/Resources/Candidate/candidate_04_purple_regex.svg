<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0015"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC88FF"/>
      <stop offset="100%" stop-color="#7700CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9933FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9933FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Terminal/code block -->
  <rect x="72" y="120" width="368" height="280" rx="14" fill="#110022" stroke="#7700CC" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="72" y="120" width="368" height="36" rx="14" fill="#220044"/>
  <circle cx="108" cy="138" r="8" fill="#FF5555" opacity="0.8"/>
  <circle cx="132" cy="138" r="8" fill="#FFAA44" opacity="0.8"/>
  <circle cx="156" cy="138" r="8" fill="#44FF88" opacity="0.8"/>
  <!-- Code lines -->
  <text x="96" y="186" font-family="monospace" font-size="18" fill="#CC88FF" opacity="0.9">$ rename -r</text>
  <text x="96" y="214" font-family="monospace" font-size="18" fill="#FF88CC" opacity="0.85">"s/old/new/g"</text>
  <text x="96" y="242" font-family="monospace" font-size="18" fill="#88FFCC" opacity="0.85">*.{txt,log}</text>
  <text x="96" y="270" font-family="monospace" font-size="18" fill="#CC88FF" opacity="0.7">→ 24 renamed</text>
  <text x="96" y="298" font-family="monospace" font-size="18" fill="#FFFF88" opacity="0.8">✓ 0 errors</text>
  <!-- Cursor blink -->
  <rect x="96" y="320" width="12" height="20" rx="2" fill="#CC88FF" opacity="0.9"/>
</svg>