<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg_jt01" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFE033"/>
      <stop offset="60%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#E08000"/>
    </radialGradient>
    <linearGradient id="brace01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D1F00"/>
      <stop offset="100%" stop-color="#5C3000"/>
    </linearGradient>
    <filter id="shadow_jt01">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="inner_glow01">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg_jt01)"/>
  <!-- 배경 하이라이트 -->
  <ellipse cx="512" cy="400" rx="300" ry="200" fill="#FFFACC" fill-opacity="0.3"/>

  <!-- Layer 2: 메인 오브젝트 — 큰 중괄호 { } -->
  <!-- 왼쪽 중괄호 { -->
  <path d="
    M 430 230
    Q 360 230 360 295
    L 360 440
    Q 360 490 300 510
    Q 360 530 360 580
    L 360 725
    Q 360 790 430 790
    L 450 790
    L 450 740
    L 440 740
    Q 400 740 400 700
    L 400 560
    Q 400 500 340 510
    Q 400 520 400 470
    L 400 320
    Q 400 280 440 280
    L 450 280
    L 450 230
    Z"
    fill="url(#brace01)" filter="url(#shadow_jt01)"/>

  <!-- 오른쪽 중괄호 } -->
  <path d="
    M 594 230
    Q 664 230 664 295
    L 664 440
    Q 664 490 724 510
    Q 664 530 664 580
    L 664 725
    Q 664 790 594 790
    L 574 790
    L 574 740
    L 584 740
    Q 624 740 624 700
    L 624 560
    Q 624 500 684 510
    Q 624 520 624 470
    L 624 320
    Q 624 280 584 280
    L 574 280
    L 574 230
    Z"
    fill="url(#brace01)" filter="url(#shadow_jt01)"/>

  <!-- 중앙 콜론 -->
  <circle cx="512" cy="420" r="22" fill="#3D1F00" filter="url(#inner_glow01)"/>
  <circle cx="512" cy="600" r="22" fill="#3D1F00" filter="url(#inner_glow01)"/>

  <!-- Layer 3: 내부 JSON 키-값 힌트 -->
  <!-- 키 텍스트 라인들 (배경보다 약간 어둡게) -->
  <rect x="468" y="330" width="88" height="14" rx="7" fill="#B87000" fill-opacity="0.5"/>
  <rect x="468" y="690" width="88" height="14" rx="7" fill="#B87000" fill-opacity="0.5"/>

  <!-- 위 주석: { 기호 강조 오렌지 하이라이트 -->
  <rect x="290" y="480" width="444" height="60" rx="10" fill="#FF8800" fill-opacity="0.15"/>
  <text x="512" y="521" font-size="52" text-anchor="middle" fill="#5C3000" fill-opacity="0.6" font-family="monospace" font-weight="bold">...</text>

  <!-- 장식 점들 -->
  <circle cx="680" cy="260" r="14" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="720" cy="295" r="9" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="330" cy="730" r="12" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="750" cy="730" r="10" fill="#FFFFFF" fill-opacity="0.35"/>
</svg>
