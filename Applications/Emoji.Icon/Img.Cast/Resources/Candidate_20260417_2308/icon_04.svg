<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- Layer 2: 2×2 포맷 타일 -->
  <!-- PNG -->
  <rect x="120" y="120" width="360" height="360" rx="32" fill="#E3F2FD"/>
  <text x="300" y="320" font-family="Arial Black, Arial, sans-serif" font-size="108" font-weight="900" fill="#1565C0" text-anchor="middle">PNG</text>
  <!-- JPG -->
  <rect x="544" y="120" width="360" height="360" rx="32" fill="#FCE4EC"/>
  <text x="724" y="320" font-family="Arial Black, Arial, sans-serif" font-size="108" font-weight="900" fill="#C62828" text-anchor="middle">JPG</text>
  <!-- ICO -->
  <rect x="120" y="544" width="360" height="360" rx="32" fill="#F3E5F5"/>
  <text x="300" y="744" font-family="Arial Black, Arial, sans-serif" font-size="108" font-weight="900" fill="#6A1B9A" text-anchor="middle">ICO</text>
  <!-- SVG -->
  <rect x="544" y="544" width="360" height="360" rx="32" fill="#E8F5E9"/>
  <text x="724" y="744" font-family="Arial Black, Arial, sans-serif" font-size="108" font-weight="900" fill="#2E7D32" text-anchor="middle">SVG</text>
  <!-- Layer 3: 중앙 교차점 강조 -->
  <circle cx="512" cy="512" r="52" fill="#FF6F00" opacity="0.9"/>
  <text x="512" y="530" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">↔</text>
</svg>
