  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_lg06)"/>
  <!-- 왼쪽 코드 텍스트 (L-시스템 규칙) -->
  <rect x="220" y="260" width="340" height="500" rx="20" fill="#0F2F0F" stroke="#1A4A1A" stroke-width="8"/>
