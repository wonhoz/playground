<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0000"/>
      <stop offset="100%" stop-color="#1F0500"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="70%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="flameGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <ellipse cx="330" cy="290" rx="180" ry="140" fill="url(#fireGlow)"/>
  <!-- Dragon body -->
  <!-- Tail -->
  <path d="M60,350 Q100,380 140,350 Q170,330 180,300" fill="none" stroke="#065F46" stroke-width="20" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="250" cy="280" rx="110" ry="70" fill="url(#dragonGrad)" stroke="#059669" stroke-width="2.5"/>
  <!-- Neck -->
  <path d="M340,255 Q380,220 400,200" fill="none" stroke="#065F46" stroke-width="28" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="415" cy="190" rx="55" ry="38" fill="url(#dragonGrad)" stroke="#059669" stroke-width="2.5"/>
  <!-- Snout -->
  <ellipse cx="455" cy="200" rx="30" ry="20" fill="#064E3B" stroke="#059669" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="408" cy="178" r="12" fill="#111" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="411" cy="178" r="6" fill="#F59E0B"/>
  <!-- Horn -->
  <polygon points="400,165 395,130 415,158" fill="#047857"/>
  <polygon points="420,162 420,128 434,158" fill="#047857"/>
  <!-- Flame breath -->
  <path d="M465,195 Q490,160 500,120 Q510,90 490,80 Q470,95 465,120 Q460,145 450,165 Z" fill="url(#flameGrad2)" opacity="0.9"/>
  <path d="M465,205 Q510,185 520,155 Q525,135 508,128 Q495,140 488,160 Q478,180 468,198 Z" fill="#F97316" opacity="0.7"/>
  <path d="M460,210 Q495,220 510,200 Q518,185 505,175 Q492,185 480,200 Q472,210 465,218 Z" fill="#FDE68A" opacity="0.5"/>
  <!-- Dragon wings -->
  <path d="M200,240 Q140,160 110,140 Q90,130 100,170 Q120,200 160,240" fill="#065F46" stroke="#059669" stroke-width="1.5"/>
  <path d="M220,230 Q170,200 160,180" fill="none" stroke="#047857" stroke-width="4" stroke-linecap="round"/>
  <path d="M240,225 Q200,200 195,185" fill="none" stroke="#047857" stroke-width="3" stroke-linecap="round"/>
  <!-- Scales texture -->
  <circle cx="220" cy="275" r="8" fill="#047857" opacity="0.6"/>
  <circle cx="240" cy="285" r="8" fill="#047857" opacity="0.6"/>
  <circle cx="260" cy="275" r="8" fill="#047857" opacity="0.6"/>
  <circle cx="280" cy="285" r="8" fill="#047857" opacity="0.6"/>
  <circle cx="230" cy="300" r="8" fill="#047857" opacity="0.5"/>
  <circle cx="250" cy="308" r="8" fill="#047857" opacity="0.5"/>
  <circle cx="270" cy="300" r="8" fill="#047857" opacity="0.5"/>
  <!-- Legs -->
  <path d="M200,320 Q195,370 190,400 Q185,420 210,415 Q220,400 215,360 Q215,340 210,325" fill="#065F46" stroke="#059669" stroke-width="2"/>
  <path d="M290,330 Q298,375 300,400 Q305,420 280,420 Q268,405 272,360 Q275,340 280,332" fill="#065F46" stroke="#059669" stroke-width="2"/>
</svg>
