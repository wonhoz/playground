<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c5"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Deep purple background -->
  <rect width="1024" height="1024" rx="190" fill="url(#g5)"/>
  <g clip-path="url(#c5)">
    <!-- Layer 2: Paintbrush (diagonal, golden) -->
    <!-- Handle (wooden) -->
    <path d="M 222,178 L 272,148 L 740,720 L 690,750 Z" fill="#92400E"/>
    <!-- Handle grain texture highlight -->
    <path d="M 238,186 L 282,166 L 720,730 L 698,738 Z" fill="#B45309" opacity="0.5"/>
    <!-- Ferrule (silver ring) -->
    <ellipse cx="710" cy="734" rx="50" ry="24" transform="rotate(-45 710 734)" fill="#D1D5DB"/>
    <ellipse cx="710" cy="734" rx="50" ry="24" transform="rotate(-45 710 734)" fill="none" stroke="#9CA3AF" stroke-width="6"/>
    <!-- Bristle tip (brush end, fan shape) -->
    <path d="M 680,762 Q 720,800 760,762 L 800,840 Q 756,900 710,862 Q 666,900 622,840 Z" fill="#FCD34D"/>
    <!-- Layer 3: Colorful pixels shooting from brush tip (upscaled pixels) -->
    <rect x="792" y="808" width="72" height="72" rx="10" fill="#F97316" transform="rotate(15 828 844)"/>
    <rect x="748" y="876" width="60" height="60" rx="8" fill="#EC4899" transform="rotate(-8 778 906)"/>
    <rect x="842" y="758" width="60" height="60" rx="8" fill="#2563EB" transform="rotate(20 872 788)"/>
    <rect x="692" y="910" width="60" height="60" rx="8" fill="#22C55E" transform="rotate(-15 722 940)"/>
    <rect x="862" y="840" width="52" height="52" rx="6" fill="#FBBF24" transform="rotate(10 888 866)"/>
    <rect x="792" y="908" width="52" height="52" rx="6" fill="#7C3AED" transform="rotate(-5 818 934)"/>
    <!-- Sparkle stars near tip -->
    <circle cx="840" cy="790" r="16" fill="#FDE68A"/>
    <circle cx="780" cy="850" r="12" fill="#FDE68A" opacity="0.8"/>
    <circle cx="870" cy="870" r="10" fill="white" opacity="0.7"/>
  </g>
</svg>
