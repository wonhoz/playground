<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="128" width="848" height="550" rx="48" fill="#FFFFFF" stroke="#004D40" stroke-width="16"/>
  <!-- Program list (uninstall manager style) -->
  <!-- Header row -->
  <rect x="120" y="168" width="784" height="54" rx="16" fill="#004D40" stroke="#002B25" stroke-width="12"/>
  <text x="228" y="206" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#06D6A0">PROGRAM</text>
  <text x="748" y="206" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#06D6A0" text-anchor="middle">SIZE</text>
  <!-- Row 1: selected (red to remove) -->
  <rect x="120" y="236" width="784" height="60" rx="12" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="8"/>
  <rect x="136" y="252" width="32" height="32" rx="8" fill="#D32F2F" stroke="#B71C1C" stroke-width="8"/>
  <text x="190" y="276" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F">OldApp 2019</text>
  <text x="832" y="276" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F" text-anchor="middle">1.2 GB</text>
  <!-- Row 2: selected (red to remove) -->
  <rect x="120" y="308" width="784" height="60" rx="12" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="8"/>
  <rect x="136" y="324" width="32" height="32" rx="8" fill="#D32F2F" stroke="#B71C1C" stroke-width="8"/>
  <text x="190" y="348" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F">Bloatware X</text>
  <text x="832" y="348" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F" text-anchor="middle">856 MB</text>
  <!-- Row 3: keep (green) -->
  <rect x="120" y="380" width="784" height="60" rx="12" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="8"/>
  <rect x="136" y="396" width="32" height="32" rx="8" fill="#388E3C" stroke="#1B5E20" stroke-width="8"/>
  <text x="190" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#388E3C">KeepApp Pro</text>
  <text x="832" y="420" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#388E3C" text-anchor="middle">124 MB</text>
  <!-- Row 4: selected (red) -->
  <rect x="120" y="452" width="784" height="60" rx="12" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="8"/>
  <rect x="136" y="468" width="32" height="32" rx="8" fill="#D32F2F" stroke="#B71C1C" stroke-width="8"/>
  <text x="190" y="492" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F">Trial ToolKit</text>
  <text x="832" y="492" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#D32F2F" text-anchor="middle">420 MB</text>
  <!-- Uninstall button row -->
  <rect x="120" y="524" width="784" height="112" rx="24" fill="#D32F2F" stroke="#B71C1C" stroke-width="14"/>
  <text x="512" y="598" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#FFFFFF" text-anchor="middle">UNINSTALL</text>
  <!-- APPS badge -->
  <rect x="236" y="756" width="552" height="114" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="842" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#06D6A0" text-anchor="middle">APPS</text>
</svg>
