  <rect x="262" y="308" width="40" height="40" fill="#DBEAFE"/>
  <rect x="304" y="308" width="40" height="40" fill="#4ADE80"/>
  <rect x="346" y="308" width="40" height="40" fill="#4ADE80"/>
