<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2A1A08"/>
      <stop offset="100%" stop-color="#100A04"/>
    </radialGradient>
    <linearGradient id="metalBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9A8A70"/>
      <stop offset="50%" stop-color="#7A6A50"/>
      <stop offset="100%" stop-color="#5A4A30"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFF0"/>
      <stop offset="100%" stop-color="#F0EED8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Typewriter body -->
  <rect x="60" y="240" width="392" height="200" rx="16" fill="url(#metalBody)"/>
  <rect x="70" y="250" width="372" height="180" rx="12" fill="#6A5A40"/>
