<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0D1A"/>
      <stop offset="100%" stop-color="#2A0812"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background – dark maroon -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <g clip-path="url(#clip03)">
    <!-- Layer 2: Guard silhouette (body) -->
    <!-- Torso -->
    <path d="M512,400 Q380,400 340,520 L340,800 L684,800 L684,520 Q644,400 512,400 Z" fill="#D4B240"/>
    <!-- Head -->
    <circle cx="512" cy="310" r="130" fill="#C9A227"/>
    <!-- Helmet top -->
    <path d="M400,260 Q512,160 624,260 L624,310 Q512,240 400,310 Z" fill="#B88C1A"/>

    <!-- White Guard silhouette details -->
    <!-- Visor slit -->
    <rect x="435" y="290" width="154" height="30" rx="8" fill="#1A0808"/>

    <!-- Layer 3: Shield in front -->
    <!-- Shield shape -->
    <path d="M512,440 L650,510 L650,650 Q650,760 512,820 Q374,760 374,650 L374,510 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- Shield inner -->
    <path d="M512,475 L624,535 L624,648 Q624,736 512,788 Q400,736 400,648 L400,535 Z" fill="#3B0D1A"/>
    <!-- Shield emblem: star -->
    <path d="M512,558 L528,612 L584,612 L538,644 L556,698 L512,666 L468,698 L486,644 L440,612 L496,612 Z" fill="#C9A227"/>

    <!-- Stars decorative -->
    <circle cx="280" cy="250" r="8" fill="#C9A227" opacity="0.5"/>
    <circle cx="744" cy="280" r="6" fill="#C9A227" opacity="0.4"/>
    <circle cx="820" cy="500" r="5" fill="#C9A227" opacity="0.3"/>
  </g>
</svg>
