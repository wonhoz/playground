<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#203a43"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Tree connector lines -->
  <line x1="256" y1="108" x2="256" y2="160" stroke="#38ef7d" stroke-width="2.5"/>
  <line x1="256" y1="160" x2="140" y2="230" stroke="#38ef7d" stroke-width="2.5"/>
  <line x1="256" y1="160" x2="372" y2="230" stroke="#38ef7d" stroke-width="2.5"/>
  <line x1="140" y1="230" x2="80" y2="310" stroke="#4facfe" stroke-width="2"/>
  <line x1="140" y1="230" x2="200" y2="310" stroke="#4facfe" stroke-width="2"/>
  <line x1="372" y1="230" x2="312" y2="310" stroke="#4facfe" stroke-width="2"/>
  <line x1="372" y1="230" x2="432" y2="310" stroke="#4facfe" stroke-width="2"/>
  <line x1="80" y1="310" x2="60" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <line x1="80" y1="310" x2="100" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <line x1="200" y1="310" x2="190" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <line x1="312" y1="310" x2="300" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <line x1="312" y1="310" x2="324" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <line x1="432" y1="310" x2="432" y2="390" stroke="#00f2fe" stroke-width="1.5"/>
  <!-- Root node -->
  <circle cx="256" cy="90" r="24" fill="url(#node)"/>
  <text x="256" y="96" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">{}</text>
  <!-- Level 2 nodes -->
  <circle cx="140" cy="246" r="20" fill="url(#node)" opacity="0.9"/>
  <text x="140" y="252" text-anchor="middle" font-family="monospace" font-size="11" fill="white">{}</text>
  <circle cx="372" cy="246" r="20" fill="url(#node)" opacity="0.9"/>
  <text x="372" y="252" text-anchor="middle" font-family="monospace" font-size="11" fill="white">[]</text>
  <!-- Level 3 nodes -->
  <circle cx="80" cy="326" r="16" fill="url(#leaf)" opacity="0.85"/>
  <text x="80" y="331" text-anchor="middle" font-family="monospace" font-size="9" fill="white">"a"</text>
  <circle cx="200" cy="326" r="16" fill="url(#leaf)" opacity="0.85"/>
  <text x="200" y="331" text-anchor="middle" font-family="monospace" font-size="9" fill="white">42</text>
  <circle cx="312" cy="326" r="16" fill="url(#leaf)" opacity="0.85"/>
  <text x="312" y="331" text-anchor="middle" font-family="monospace" font-size="9" fill="white">{}</text>
  <circle cx="432" cy="326" r="16" fill="url(#leaf)" opacity="0.85"/>
  <text x="432" y="331" text-anchor="middle" font-family="monospace" font-size="9" fill="white">true</text>
  <!-- Level 4 leaf nodes -->
  <circle cx="60" cy="406" r="10" fill="#38ef7d" opacity="0.7"/>
  <circle cx="100" cy="406" r="10" fill="#38ef7d" opacity="0.7"/>
  <circle cx="190" cy="406" r="10" fill="#00f2fe" opacity="0.7"/>
  <circle cx="300" cy="406" r="10" fill="#00f2fe" opacity="0.7"/>
  <circle cx="324" cy="406" r="10" fill="#00f2fe" opacity="0.7"/>
  <circle cx="432" cy="406" r="10" fill="#4facfe" opacity="0.7"/>
</svg>
