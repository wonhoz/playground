<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Track.Star - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { color: #ffcc00; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item:hover { border-color: #ffcc00; }
  img { width: 120px; height: 120px; display: block; margin: 0 auto 10px; }
  .name { font-size: 12px; color: #aaa; word-break: break-all; }
</style>
</head>
<body>
<h1>Track.Star</h1>
<p>육상 트랙 스포츠 게임 - 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_runner_finish.svg"><div class="name">candidate_01_runner_finish</div></div>
  <div class="item"><img src="candidate_02_sprint_star.svg"><div class="name">candidate_02_sprint_star</div></div>
  <div class="item"><img src="candidate_03_oval_track.svg"><div class="name">candidate_03_oval_track</div></div>
  <div class="item"><img src="candidate_04_medal_podium.svg"><div class="name">candidate_04_medal_podium</div></div>
  <div class="item"><img src="candidate_05_speed_lightning.svg"><div class="name">candidate_05_speed_lightning</div></div>
  <div class="item"><img src="candidate_06_hurdle_jump.svg"><div class="name">candidate_06_hurdle_jump</div></div>
  <div class="item"><img src="candidate_07_stopwatch.svg"><div class="name">candidate_07_stopwatch</div></div>
  <div class="item"><img src="candidate_08_relay_baton.svg"><div class="name">candidate_08_relay_baton</div></div>
  <div class="item"><img src="candidate_09_pixel_runner.svg"><div class="name">candidate_09_pixel_runner</div></div>
  <div class="item"><img src="candidate_10_victory_leap.svg"><div class="name">candidate_10_victory_leap</div></div>
</div>
</body>
</html>
