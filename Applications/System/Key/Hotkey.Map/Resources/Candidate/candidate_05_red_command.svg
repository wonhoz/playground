  <line x1="268" y1="120" x2="256" y2="230" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <line x1="336" y1="120" x2="282" y2="230" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <!-- Left keys -->
  <rect x="64" y="156" width="56" height="40" rx="8" fill="#2d0000" stroke="#ef4444" stroke-width="2"/>
  <text x="72" y="181" font-family="monospace" font-size="14" fill="#ef4444" font-weight="bold">Ctrl</text>
  <rect x="64" y="208" width="56" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="74" y="233" font-family="monospace" font-size="14" fill="#b91c1c">Alt</text>
  <rect x="64" y="260" width="56" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="68" y="285" font-family="monospace" font-size="12" fill="#b91c1c">Shift</text>
  <line x1="120" y1="176" x2="216" y2="256" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="120" y1="228" x2="216" y2="256" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <!-- Right keys -->
  <rect x="392" y="156" width="56" height="40" rx="8" fill="#2d0000" stroke="#ef4444" stroke-width="2"/>
  <text x="402" y="181" font-family="monospace" font-size="14" fill="#ef4444">Del</text>
  <rect x="392" y="208" width="56" height="40" rx="8" fill="#2d0000" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="402" y="233" font-family="monospace" font-size="13" fill="#b91c1c">PrtSc</text>
  <rect x="392" y="260" width="56" height="40" rx="8" fill="#ef4444" opacity="0.85"/>
  <text x="402" y="285" font-family="monospace" font-size="14" fill="white" font-weight="bold">Tab</text>
  <line x1="392" y1="176" x2="296" y2="256" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
