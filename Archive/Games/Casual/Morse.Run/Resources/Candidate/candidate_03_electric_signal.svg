<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A33"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DFFFF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#4DFFFF"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lightning bolt / runner silhouette -->
  <polygon points="280,80 220,260 265,260 200,430 310,230 255,230 300,80" fill="url(#electric)" filter="url(#blur)"/>
  <!-- Morse signal wave bottom -->
  <rect x="50" y="460" width="30" height="20" rx="10" fill="#4DFFFF" opacity="0.9"/>
  <rect x="100" y="450" width="60" height="20" rx="10" fill="#4DFFFF" opacity="0.9"/>
  <rect x="180" y="460" width="30" height="20" rx="10" fill="#4DFFFF" opacity="0.9"/>
  <rect x="230" y="450" width="60" height="20" rx="10" fill="#4DFFFF" opacity="0.9"/>
  <rect x="310" y="460" width="30" height="20" rx="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="360" y="450" width="60" height="20" rx="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="440" y="460" width="30" height="20" rx="10" fill="#4DFFFF" opacity="0.9"/>
  <!-- Signal lines -->
  <polyline points="50,420 80,420 80,390 110,390 110,420 180,420 180,390 210,390 210,420 310,420 310,390 340,390 340,420 360,420" fill="none" stroke="#4DFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#blur)"/>
  <!-- Stars/sparks -->
  <circle cx="100" cy="150" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="380" cy="120" r="3" fill="#4DFFFF" opacity="0.7"/>
  <circle cx="420" cy="280" r="5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="70" cy="320" r="3" fill="#4DFFFF" opacity="0.5"/>
</svg>
