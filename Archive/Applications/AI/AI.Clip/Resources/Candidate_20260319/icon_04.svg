  <rect x="360" y="168" width="220" height="64" rx="14" fill="#00BCD4"/>
  <!-- Content lines -->
  <rect x="310" y="320" width="320" height="20" rx="10" fill="#00BCD4" opacity="0.7"/>
  <rect x="310" y="370" width="260" height="20" rx="10" fill="#00BCD4" opacity="0.5"/>
  <rect x="310" y="420" width="290" height="20" rx="10" fill="#00BCD4" opacity="0.5"/>
  <!-- Scissors icon on clipboard -->
