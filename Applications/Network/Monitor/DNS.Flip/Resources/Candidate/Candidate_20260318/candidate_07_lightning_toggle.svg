<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 토글 스위치 베이스 -->
  <rect x="130" y="210" width="252" height="92" rx="46" fill="#0EA5E9" opacity="0.15"/>
  <rect x="130" y="210" width="252" height="92" rx="46" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)"/>
  <!-- 토글 버튼 (ON 위치) -->
  <circle cx="336" cy="256" r="36" fill="#0EA5E9" opacity="0.9" filter="url(#glow)"/>
  <!-- 번개 아이콘 (버튼 위) -->
  <path d="M 333 240 L 323 258 L 332 258 L 329 272 L 343 254 L 333 254 Z" fill="white" opacity="0.95"/>
  <!-- ON/OFF 텍스트 -->
  <text x="185" y="263" text-anchor="middle" fill="#38BDF8" font-size="20" font-family="monospace" font-weight="bold" opacity="0.7">OFF</text>
  <!-- 상단 DNS 서버 아이콘 -->
  <rect x="176" y="120" width="64" height="52" rx="6" fill="#050d1a" stroke="#0EA5E9" stroke-width="2" filter="url(#glow)"/>
  <rect x="184" y="130" width="48" height="8" rx="4" fill="#0EA5E9" opacity="0.7"/>
  <rect x="184" y="144" width="48" height="8" rx="4" fill="#38BDF8" opacity="0.5"/>
  <rect x="184" y="158" width="30" height="6" rx="3" fill="#0EA5E9" opacity="0.3"/>
  <!-- 하단 DNS 서버 아이콘 -->
  <rect x="272" y="340" width="64" height="52" rx="6" fill="#050d1a" stroke="#38BDF8" stroke-width="2" filter="url(#glow)"/>
  <rect x="280" y="350" width="48" height="8" rx="4" fill="#38BDF8" opacity="0.7"/>
  <rect x="280" y="364" width="48" height="8" rx="4" fill="#0EA5E9" opacity="0.5"/>
  <rect x="280" y="378" width="30" height="6" rx="3" fill="#38BDF8" opacity="0.3"/>
  <!-- 연결선 -->
  <line x1="208" y1="172" x2="256" y2="210" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="304" y1="302" x2="304" y2="340" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
</svg>