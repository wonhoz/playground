<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1000"/>
      <stop offset="100%" stop-color="#2A1A00"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Folder -->
  <path d="M80,180 L80,380 Q80,400 100,400 L412,400 Q432,400 432,380 L432,200 Q432,180 412,180 L240,180 L210,155 Q200,145 190,145 L100,145 Q80,145 80,165 Z" fill="url(#folder)"/>
  <path d="M80,200 L432,200" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <!-- Temp files (crumpled papers) -->
  <rect x="120" y="230" width="50" height="60" rx="4" fill="#FFF3CD" transform="rotate(-8 145 260)"/>
  <text x="145" y="258" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">.tmp</text>
  <rect x="200" y="225" width="50" height="60" rx="4" fill="#FFF3CD" transform="rotate(5 225 255)"/>
  <text x="225" y="253" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">.log</text>
  <rect x="280" y="235" width="50" height="60" rx="4" fill="#FFF3CD" transform="rotate(-3 305 265)"/>
  <text x="305" y="263" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">.cache</text>
  <rect x="350" y="228" width="50" height="60" rx="4" fill="#FFF3CD" transform="rotate(10 375 258)"/>
  <text x="375" y="256" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">.tmp</text>
  <!-- Broom sweeping -->
  <line x1="350" y1="420" x2="450" y2="310" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="362" cy="432" rx="30" ry="12" fill="#DAA520" transform="rotate(-45 362 432)"/>
  <!-- Dust/particles -->
  <circle cx="90" cy="420" r="4" fill="#888" opacity="0.5"/>
  <circle cx="105" cy="410" r="3" fill="#888" opacity="0.4"/>
  <circle cx="80" cy="405" r="3" fill="#888" opacity="0.3"/>
</svg>