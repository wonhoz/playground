<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <clipPath id="clip03">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <g clip-path="url(#clip03)">
    <!-- Layer 2: 십자(+) 형태 — 가로 단어 막대 -->
    <rect x="130" y="432" width="764" height="160" fill="#C4B5FD" rx="16"/>
    <!-- 세로 단어 막대 -->
    <rect x="432" y="130" width="160" height="764" fill="#C4B5FD" rx="16"/>
    <!-- 교차점 강조 -->
    <rect x="432" y="432" width="160" height="160" fill="#FDE68A" rx="16"/>
    <!-- Layer 3: 글자 배치 -->
    <!-- 가로: ACROSS -->
    <text x="230" y="515" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">A</text>
    <text x="340" y="515" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">C</text>
    <!-- 교차점 글자 -->
    <text x="512" y="515" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">R</text>
    <text x="684" y="515" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">O</text>
    <text x="794" y="515" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">S</text>
    <!-- 세로: DOWN -->
    <text x="512" y="240" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">D</text>
    <text x="512" y="352" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">O</text>
    <text x="512" y="685" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="512" y="795" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">N</text>
    <!-- 번호 라벨 -->
    <text x="163" y="452" font-family="Arial, sans-serif" font-size="32" fill="#FDE68A">1</text>
    <text x="445" y="162" font-family="Arial, sans-serif" font-size="32" fill="#FDE68A">2</text>
  </g>
</svg>
