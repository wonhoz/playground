<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: Abstract JSON bracket geometry - nested squares forming tree pattern -->
  <!-- Outer JSON braces as geometric squares -->
  <rect x="162" y="162" width="700" height="700" rx="40" fill="none" stroke="white" stroke-width="52" opacity="0.3"/>
  <rect x="230" y="230" width="564" height="564" rx="30" fill="none" stroke="white" stroke-width="42" opacity="0.4"/>
  <!-- Inner structure: tree node circles -->
  <!-- Root node -->
  <circle cx="512" cy="512" r="90" fill="white" opacity="0.95"/>
  <text x="512" y="530" font-family="monospace" font-size="82" fill="#3B82F6" text-anchor="middle" font-weight="bold">{}</text>
  <!-- Branch nodes -->
  <circle cx="312" cy="360" r="55" fill="white" opacity="0.8"/>
  <text x="312" y="378" font-family="monospace" font-size="50" fill="#6EE7B7" text-anchor="middle" font-weight="bold">[]</text>
  <circle cx="712" cy="360" r="55" fill="white" opacity="0.8"/>
  <text x="712" y="378" font-family="monospace" font-size="50" fill="#6EE7B7" text-anchor="middle" font-weight="bold">{}</text>
  <!-- Connecting lines -->
  <line x1="453" y1="450" x2="355" y2="405" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <line x1="571" y1="450" x2="669" y2="405" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <!-- Leaf nodes bottom -->
  <circle cx="370" cy="690" r="38" fill="white" opacity="0.6"/>
  <circle cx="512" cy="710" r="38" fill="white" opacity="0.6"/>
  <circle cx="654" cy="690" r="38" fill="white" opacity="0.6"/>
  <!-- Layer 3: small key:value text indicators -->
  <line x1="480" y1="595" x2="400" y2="658" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="600" x2="512" y2="673" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="544" y1="595" x2="624" y2="658" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
</svg>
