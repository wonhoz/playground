<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: 돋보기 + 드라이브 (magnifier over drive) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 드라이브 본체 -->
  <rect x="200" y="480" width="480" height="260" rx="40" fill="#2E7D32"/>
  <!-- 드라이브 슬롯 -->
  <rect x="260" y="620" width="360" height="20" rx="10" fill="#81C784" opacity="0.5"/>
  <!-- 드라이브 LED -->
  <circle cx="620" cy="550" r="18" fill="#81C784"/>
  <!-- 돋보기 원 -->
  <circle cx="580" cy="380" r="160" fill="none" stroke="#81C784" stroke-width="28"/>
  <circle cx="580" cy="380" r="120" fill="#001A00" opacity="0.7"/>
  <!-- 돋보기 손잡이 -->
  <line x1="690" y1="490" x2="790" y2="600" stroke="#81C784" stroke-width="36" stroke-linecap="round"/>
  <!-- 돋보기 내부 드라이브 미니어처 표시 -->
  <rect x="510" y="340" width="140" height="80" rx="12" fill="#2E7D32" opacity="0.8"/>
  <rect x="530" y="390" width="100" height="8" rx="4" fill="#81C784" opacity="0.6"/>
</svg>
