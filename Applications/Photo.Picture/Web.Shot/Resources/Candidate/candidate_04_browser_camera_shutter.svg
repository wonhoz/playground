<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="shutter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffecd2"/>
      <stop offset="100%" stop-color="#fcb69f"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4776e6"/>
      <stop offset="100%" stop-color="#8e54e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Globe/web icon -->
  <circle cx="200" cy="256" r="140" fill="none" stroke="url(#globe)" stroke-width="4" filter="url(#glow)"/>
  <!-- Globe latitude lines -->
  <ellipse cx="200" cy="256" rx="60" ry="140" fill="none" stroke="url(#globe)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="200" cy="256" rx="110" ry="140" fill="none" stroke="url(#globe)" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="256" x2="340" y2="256" stroke="url(#globe)" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="196" x2="320" y2="196" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="316" x2="320" y2="316" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <!-- Shutter blades -->
  <g transform="translate(340,256)" filter="url(#glow)">
    <circle r="100" fill="none" stroke="url(#shutter)" stroke-width="3"/>
    <path d="M0,-80 A80,80,0,0,1,69,40 L0,0 Z" fill="url(#shutter)" opacity="0.7"/>
    <path d="M69,40 A80,80,0,0,1,-69,40 L0,0 Z" fill="url(#shutter)" opacity="0.5"/>
    <path d="M-69,40 A80,80,0,0,1,0,-80 L0,0 Z" fill="url(#shutter)" opacity="0.6"/>
    <circle r="28" fill="#0a0a0a"/>
    <circle r="18" fill="url(#shutter)" opacity="0.9"/>
  </g>
</svg>