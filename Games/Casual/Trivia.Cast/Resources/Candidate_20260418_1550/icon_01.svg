<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 12개 카테고리 이모지 격자 (3x4) -->
    <!-- 1행: 과학 / 역사 / IT / 스포츠 -->
    <rect x="80" y="100" width="190" height="170" rx="20" fill="#1565C0"/>
    <text x="175" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">⚗️</text>
    <text x="175" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#90CAF9" text-anchor="middle">과학</text>

    <rect x="282" y="100" width="190" height="170" rx="20" fill="#6A1B9A"/>
    <text x="377" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">📜</text>
    <text x="377" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#CE93D8" text-anchor="middle">역사</text>

    <rect x="484" y="100" width="190" height="170" rx="20" fill="#00695C"/>
    <text x="579" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">💻</text>
    <text x="579" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#80CBC4" text-anchor="middle">IT</text>

    <rect x="686" y="100" width="258" height="170" rx="20" fill="#E65100"/>
    <text x="815" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">⚽</text>
    <text x="815" y="248" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#FFCC80" text-anchor="middle">스포츠</text>

    <!-- 2행: 영화 / 음악 / 음식 / 지리 -->
    <rect x="80" y="284" width="190" height="170" rx="20" fill="#B71C1C"/>
    <text x="175" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎬</text>
    <text x="175" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#EF9A9A" text-anchor="middle">영화</text>

    <rect x="282" y="284" width="190" height="170" rx="20" fill="#880E4F"/>
    <text x="377" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎵</text>
    <text x="377" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#F48FB1" text-anchor="middle">음악</text>

    <rect x="484" y="284" width="190" height="170" rx="20" fill="#FF6F00"/>
    <text x="579" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🍕</text>
    <text x="579" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#FFE0B2" text-anchor="middle">음식</text>

    <rect x="686" y="284" width="258" height="170" rx="20" fill="#1B5E20"/>
    <text x="815" y="380" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🌍</text>
    <text x="815" y="432" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#A5D6A7" text-anchor="middle">지리</text>

    <!-- 3행: 수학 / 예술 / 게임 / 일반상식 -->
    <rect x="80" y="468" width="190" height="170" rx="20" fill="#0277BD"/>
    <text x="175" y="564" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">➕</text>
    <text x="175" y="616" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#B3E5FC" text-anchor="middle">수학</text>

    <rect x="282" y="468" width="190" height="170" rx="20" fill="#AD1457"/>
    <text x="377" y="564" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎨</text>
    <text x="377" y="616" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#F8BBD0" text-anchor="middle">예술</text>

    <rect x="484" y="468" width="190" height="170" rx="20" fill="#37474F"/>
    <text x="579" y="564" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">🎮</text>
    <text x="579" y="616" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#B0BEC5" text-anchor="middle">게임</text>

    <rect x="686" y="468" width="258" height="170" rx="20" fill="#F57F17"/>
    <text x="815" y="564" font-family="'Segoe UI',Arial,sans-serif" font-size="80" text-anchor="middle">💡</text>
    <text x="815" y="616" font-family="'Segoe UI',Arial,sans-serif" font-size="34" fill="#FFF9C4" text-anchor="middle">일반상식</text>

    <!-- 타이틀 -->
    <rect x="140" y="708" width="744" height="70" rx="24" fill="#0A0A1A"/>
    <text x="512" y="755" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFD600" text-anchor="middle">TRIVIA.CAST</text>
  </g>
</svg>
