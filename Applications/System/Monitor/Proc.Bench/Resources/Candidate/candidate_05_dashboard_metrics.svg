<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2d3a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Title bar -->
  <rect x="80" y="80" width="352" height="40" rx="8" fill="#1a2d3a" stroke="#2a4a5a" stroke-width="2"/>
  <text x="256" y="105" text-anchor="middle" font-family="monospace" font-size="15" fill="#7dd3fc" font-weight="bold">PROC.BENCH DASHBOARD</text>
  <!-- CPU card -->
  <rect x="80" y="135" width="160" height="100" rx="8" fill="#1a2d3a" stroke="#2a4a5a" stroke-width="2"/>
  <text x="160" y="158" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc">CPU</text>
  <text x="160" y="200" text-anchor="middle" font-family="monospace" font-size="32" fill="#38bdf8" font-weight="bold">88%</text>
  <text x="160" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">3.2GHz · 8 cores</text>
  <!-- MEM card -->
  <rect x="272" y="135" width="160" height="100" rx="8" fill="#1a2d3a" stroke="#2a4a5a" stroke-width="2"/>
  <text x="352" y="158" text-anchor="middle" font-family="monospace" font-size="11" fill="#86efac">MEMORY</text>
  <text x="352" y="200" text-anchor="middle" font-family="monospace" font-size="32" fill="#4ade80" font-weight="bold">62%</text>
  <text x="352" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">9.9GB / 16GB</text>
  <!-- Process list -->
  <rect x="80" y="250" width="352" height="185" rx="8" fill="#1a2d3a" stroke="#2a4a5a" stroke-width="2"/>
  <text x="100" y="272" font-family="monospace" font-size="11" fill="#7dd3fc">PROCESS              CPU    MEM</text>
  <line x1="90" y1="278" x2="422" y2="278" stroke="#2a4a5a" stroke-width="1"/>
  <!-- Process rows -->
  <text x="100" y="296" font-family="monospace" font-size="11" fill="#ff8888">chrome.exe</text>
  <text x="340" y="296" font-family="monospace" font-size="11" fill="#ff8888">42.1%</text>
  <text x="400" y="296" font-family="monospace" font-size="11" fill="#ff8888">3.2GB</text>
  <text x="100" y="316" font-family="monospace" font-size="11" fill="#ffa500">vscode.exe</text>
  <text x="340" y="316" font-family="monospace" font-size="11" fill="#ffa500">18.5%</text>
  <text x="400" y="316" font-family="monospace" font-size="11" fill="#ffa500">1.1GB</text>
  <text x="100" y="336" font-family="monospace" font-size="11" fill="#86efac">dotnet.exe</text>
  <text x="340" y="336" font-family="monospace" font-size="11" fill="#86efac">12.3%</text>
  <text x="400" y="336" font-family="monospace" font-size="11" fill="#86efac">512MB</text>
  <text x="100" y="356" font-family="monospace" font-size="11" fill="#7dd3fc">explorer.exe</text>
  <text x="340" y="356" font-family="monospace" font-size="11" fill="#7dd3fc">3.8%</text>
  <text x="400" y="356" font-family="monospace" font-size="11" fill="#7dd3fc">215MB</text>
  <text x="100" y="376" font-family="monospace" font-size="11" fill="#888">svchost.exe</text>
  <text x="340" y="376" font-family="monospace" font-size="11" fill="#888">1.2%</text>
  <text x="400" y="376" font-family="monospace" font-size="11" fill="#888">88MB</text>
  <text x="100" y="424" font-family="monospace" font-size="11" fill="#555">+ 47 more processes</text>
</svg>
