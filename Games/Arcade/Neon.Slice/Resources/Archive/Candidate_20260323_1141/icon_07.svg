<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 코발트 블랙 -->
  <rect width="1024" height="1024" rx="180" fill="#001020"/>
  <!-- Layer 2: 속도감 있는 슬라이스 궤적들 -->
  <!-- 빠른 슬라이스 궤적 (곡선 느낌, 여러 선) -->
  <path d="M160,600 Q400,200 844,300" stroke="#00E5FF" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M160,600 Q400,200 844,300" stroke="#00E5FF" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M160,640 Q420,240 844,340" stroke="#00B8D4" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M160,560 Q380,160 844,260" stroke="#0097A7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 두 번째 슬라이스 -->
  <path d="M844,700 Q600,300 160,400" stroke="#FF6D00" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M844,700 Q600,300 160,400" stroke="#FF6D00" stroke-width="32" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- 잘린 오브젝트들 -->
  <circle cx="400" cy="360" r="60" fill="#00E5FF" opacity="0.7"/>
  <circle cx="400" cy="440" r="60" fill="#0097A7" opacity="0.6"/>
  <circle cx="650" cy="500" r="50" fill="#FF6D00" opacity="0.7"/>
  <circle cx="650" cy="580" r="50" fill="#BF360C" opacity="0.6"/>
  <!-- Layer 3: 속도 선들 (배경) -->
  <line x1="160" y1="750" x2="480" y2="750" stroke="#00E5FF" stroke-width="3" opacity="0.3"/>
  <line x1="200" y1="790" x2="520" y2="790" stroke="#00E5FF" stroke-width="2" opacity="0.2"/>
  <text x="512" y="880" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#00E5FF" text-anchor="middle">FAST!</text>
</svg>
