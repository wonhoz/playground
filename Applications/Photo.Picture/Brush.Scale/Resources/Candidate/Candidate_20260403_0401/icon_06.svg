<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B4E"/>
      <stop offset="50%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
    <linearGradient id="wandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="60%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg6)"/>
  <!-- 글로우 오버레이 -->
  <rect width="1024" height="1024" rx="190" fill="url(#glowCenter)"/>

  <!-- 배경 별들 -->
  <circle cx="150" cy="180" r="4" fill="#E8EAF6" opacity="0.6"/>
  <circle cx="300" cy="140" r="3" fill="#E8EAF6" opacity="0.4"/>
  <circle cx="820" cy="200" r="5" fill="#E8EAF6" opacity="0.5"/>
  <circle cx="880" cy="160" r="3" fill="#E8EAF6" opacity="0.6"/>
  <circle cx="200" cy="800" r="4" fill="#E8EAF6" opacity="0.3"/>
  <circle cx="900" cy="750" r="3" fill="#E8EAF6" opacity="0.4"/>
  <circle cx="100" cy="500" r="2" fill="#C5CAE9" opacity="0.5"/>
  <circle cx="920" cy="480" r="2" fill="#C5CAE9" opacity="0.5"/>

  <!-- 흐릿한 이미지 (변환 전) — 왼쪽 아래 -->
  <rect x="120" y="580" width="220" height="220" rx="16" fill="#1A237E" opacity="0.5" stroke="#3949AB" stroke-width="2"/>
  <!-- 흐릿한 내용 -->
  <rect x="140" y="600" width="40" height="40" rx="4" fill="#5C6BC0" opacity="0.5"/>
  <rect x="188" y="600" width="40" height="40" rx="4" fill="#3F51B5" opacity="0.5"/>
  <rect x="236" y="600" width="40" height="40" rx="4" fill="#5C6BC0" opacity="0.5"/>
  <rect x="284" y="600" width="40" height="40" rx="4" fill="#3F51B5" opacity="0.5"/>
  <rect x="140" y="648" width="40" height="40" rx="4" fill="#3F51B5" opacity="0.5"/>
  <rect x="188" y="648" width="40" height="40" rx="4" fill="#5C6BC0" opacity="0.5"/>
  <rect x="140" y="696" width="184" height="80" rx="8" fill="#3949AB" opacity="0.3"/>
  <text x="232" y="620" font-family="Arial" font-size="28" fill="#7986CB" text-anchor="middle" opacity="0.8">LOW</text>

  <!-- 변환 화살표 -->
  <path d="M360 700 Q512 620 660 700" stroke="#FFD700" stroke-width="8" fill="none" stroke-dasharray="16 8" opacity="0.7"/>
  <polygon points="668,700 640,682 640,718" fill="#FFD700" opacity="0.8"/>

  <!-- 선명한 이미지 (변환 후) — 오른쪽 아래 -->
  <rect x="680" y="540" width="240" height="240" rx="16" fill="#1A237E" stroke="#7986CB" stroke-width="3"/>
  <!-- 선명한 이미지 내용 -->
  <rect x="700" y="560" width="90" height="90" rx="8" fill="#5C6BC0"/>
  <rect x="800" y="560" width="100" height="90" rx="8" fill="#3F51B5"/>
  <rect x="700" y="660" width="100" height="100" rx="8" fill="#3949AB"/>
  <rect x="810" y="660" width="90" height="100" rx="8" fill="#5C6BC0"/>
  <!-- 선명도 스파클 -->
  <circle cx="900" cy="550" r="14" fill="#FFD700" filter="url(#starGlow)"/>
  <circle cx="870" cy="520" r="8" fill="#FFE57F" filter="url(#starGlow)"/>

  <!-- 마법봉 (메인 심볼) -->
  <!-- 봉 본체 -->
  <rect x="280" y="220" width="32" height="420" rx="16" fill="url(#wandGrad)" transform="rotate(-45 446 430)"/>
  <!-- 봉 끝 보석 -->
  <circle cx="620" cy="200" r="44" fill="#FFD700" filter="url(#starGlow)"/>
  <circle cx="620" cy="200" r="32" fill="#FFE57F"/>
  <circle cx="608" cy="188" r="12" fill="white" opacity="0.7"/>

  <!-- 마법 파티클 폭발 -->
  <!-- 큰 별들 -->
  <g filter="url(#starGlow)">
    <polygon points="680,320 690,360 730,360 698,384 710,424 680,400 650,424 662,384 630,360 670,360" fill="#FFD700" opacity="0.9" transform="scale(0.7) translate(280 80)"/>
    <polygon points="760,480 768,508 796,508 774,524 782,552 760,536 738,552 746,524 724,508 752,508" fill="#FFE57F" opacity="0.8"/>
    <polygon points="540,560 546,580 566,580 550,592 556,612 540,600 524,612 530,592 514,580 534,580" fill="#FFD700" opacity="0.7"/>
    <circle cx="700" cy="260" r="16" fill="#FFF9C4" opacity="0.9"/>
    <circle cx="560" cy="160" r="10" fill="#FFD700" opacity="0.8"/>
    <circle cx="780" cy="160" r="8" fill="#FFE57F" opacity="0.7"/>
  </g>

  <!-- "AI" 텍스트 배지 -->
  <rect x="380" y="840" width="264" height="80" rx="40" fill="#FFD700" opacity="0.15"/>
  <text x="512" y="895" font-family="Arial Black" font-size="64" font-weight="900" fill="#FFD700" text-anchor="middle">AI</text>
</svg>