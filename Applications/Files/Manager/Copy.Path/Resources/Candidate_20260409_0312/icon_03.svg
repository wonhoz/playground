<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c3"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <!-- Layer 1: Light yellow background -->
  <rect width="1024" height="1024" rx="190" fill="#FFFBEB"/>
  <g clip-path="url(#c3)">
    <!-- Layer 2: Folder shape (proper tab + body) -->
    <path d="M 216,290 L 438,290 L 490,344 L 808,344 Q 832,344 832,368 L 832,748 Q 832,772 808,772 L 216,772 Q 192,772 192,748 L 192,314 Q 192,290 216,290 Z" fill="#F97316"/>
