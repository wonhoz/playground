<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit.Craft — Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #5eead4; letter-spacing: 2px; }
  p.sub { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 32px #5eead440; border-color: #5eead4; }
  .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .card .label { margin-top: 10px; font-size: 12px; color: #aaa; line-height: 1.4; }
  .card .num { font-size: 18px; font-weight: bold; color: #5eead4; }
</style>
</head>
<body>
<h1>Orbit.Craft</h1>
<p class="sub">Orbital mechanics craft/puzzle game | Icon Candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_orbital_mechanics_art.svg" alt="01"/><div class="label"><span class="num">01</span><br>Orbital Mechanics Art</div></div>
  <div class="card"><img src="candidate_02_planet_orbit_craft.svg" alt="02"/><div class="label"><span class="num">02</span><br>Planet Orbit Craft</div></div>
  <div class="card"><img src="candidate_03_space_craft_orbit.svg" alt="03"/><div class="label"><span class="num">03</span><br>Space Craft Orbit</div></div>
  <div class="card"><img src="candidate_04_gravitational_orbit.svg" alt="04"/><div class="label"><span class="num">04</span><br>Gravitational Orbit</div></div>
  <div class="card"><img src="candidate_05_planet_ring_orbit.svg" alt="05"/><div class="label"><span class="num">05</span><br>Planet Ring Orbit</div></div>
  <div class="card"><img src="candidate_06_space_orbit_game.svg" alt="06"/><div class="label"><span class="num">06</span><br>Space Orbit Game</div></div>
  <div class="card"><img src="candidate_07_craft_in_orbit.svg" alt="07"/><div class="label"><span class="num">07</span><br>Craft in Orbit</div></div>
  <div class="card"><img src="candidate_08_orbital_path_art.svg" alt="08"/><div class="label"><span class="num">08</span><br>Orbital Path Art</div></div>
  <div class="card"><img src="candidate_09_space_trajectory.svg" alt="09"/><div class="label"><span class="num">09</span><br>Space Trajectory</div></div>
  <div class="card"><img src="candidate_10_orbit_simulation.svg" alt="10"/><div class="label"><span class="num">10</span><br>Orbit Simulation</div></div>
</div>
</body>
</html>
