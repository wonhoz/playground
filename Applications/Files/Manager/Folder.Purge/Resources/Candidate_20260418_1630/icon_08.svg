    <text x="816" y="564" font-family="'Segoe UI',Arial,sans-serif" font-size="28" text-anchor="middle" fill="#FFCDD2" font-weight="700">.vs</text>
    <line x1="760" y1="418" x2="832" y2="490" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <line x1="832" y1="418" x2="760" y2="490" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

