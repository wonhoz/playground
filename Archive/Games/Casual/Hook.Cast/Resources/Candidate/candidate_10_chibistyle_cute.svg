  <circle cx="180" cy="218" r="12" fill="#333"/>
  <circle cx="220" cy="218" r="12" fill="#333"/>
  <circle cx="184" cy="214" r="5" fill="white"/>
  <circle cx="224" cy="214" r="5" fill="white"/>
  <!-- Blush cheeks -->
  <ellipse cx="165" cy="232" rx="12" ry="8" fill="#ff8a80" opacity="0.6"/>
  <ellipse cx="235" cy="232" rx="12" ry="8" fill="#ff8a80" opacity="0.6"/>
  <!-- Smile -->
  <path d="M183 242 Q200 258 217 242" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="200" cy="308" rx="44" ry="52" fill="#42a5f5"/>
  <!-- Arms -->
  <ellipse cx="148" cy="296" rx="16" ry="36" fill="#42a5f5" transform="rotate(-20 148 296)"/>
  <ellipse cx="252" cy="290" rx="16" ry="38" fill="#42a5f5" transform="rotate(25 252 290)"/>
  <!-- Hands -->
  <circle cx="136" cy="322" r="12" fill="#ffcc99"/>
  <circle cx="264" cy="316" r="12" fill="#ffcc99"/>
  <!-- Rod in right hand -->
  <line x1="264" y1="310" x2="360" y2="255" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <line x1="360" y1="255" x2="410" y2="230" stroke="#795548" stroke-width="5" stroke-linecap="round"/>
  <!-- Fishing line -->
  <line x1="410" y1="230" x2="400" y2="345" stroke="#888" stroke-width="1.5"/>
  <!-- Tiny cute hook -->
  <path d="M400 345 Q402 364 390 372 Q380 378 374 372 Q368 366 374 360 Q380 354 384 360" fill="none" stroke="#777" stroke-width="5" stroke-linecap="round"/>
  <!-- Cute small fish on hook -->
  <ellipse cx="372" cy="374" rx="18" ry="10" fill="#ff7043" transform="rotate(-15 372 374)"/>
  <path d="M386 368 L398 362 L395 375 Z" fill="#ff7043"/>
  <circle cx="363" cy="371" r="3.5" fill="white"/>
  <circle cx="365" cy="371" r="1.8" fill="#333"/>
  <!-- Heart above fish -->
  <path d="M370 350 Q374 343 380 350 Q386 343 390 350 Q386 360 380 366 Q374 360 370 350 Z" fill="#ff4081" opacity="0.8"/>
  <!-- Stars -->
  <text x="68" y="180" font-size="18" fill="#ffcc02" opacity="0.7">✦</text>
  <text x="420" y="160" font-size="14" fill="#ff80ab" opacity="0.6">✦</text>
  <text x="440" y="300" font-size="16" fill="#80deea" opacity="0.5">✦</text>
</svg>
