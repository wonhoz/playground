<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ext.Boss — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; padding: 32px; }
  h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
  p  { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }
  .card {
    background: #242424;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #5c6bc0; transform: translateY(-3px); }
  .card img { width: 120px; height: 120px; border-radius: 8px; }
  .card .label {
    margin-top: 10px;
    font-size: 12px;
    color: #9fa8da;
    word-break: break-all;
  }
  .card .num {
    font-size: 20px;
    font-weight: 900;
    color: #5c6bc0;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>Ext.Boss — Icon Candidates</h1>
<p>파일 확장자 · 연결 프로그램 관리자 / 10개 디자인 후보</p>
<div class="grid">
  <div class="card"><div class="num">01</div><img src="candidate_01_file_crown.svg" alt="file_crown"><div class="label">file_crown</div></div>
  <div class="card"><div class="num">02</div><img src="candidate_02_gear_file.svg" alt="gear_file"><div class="label">gear_file</div></div>
  <div class="card"><div class="num">03</div><img src="candidate_03_neon_ext.svg" alt="neon_ext"><div class="label">neon_ext</div></div>
  <div class="card"><div class="num">04</div><img src="candidate_04_shield_ext.svg" alt="shield_ext"><div class="label">shield_ext</div></div>
  <div class="card"><div class="num">05</div><img src="candidate_05_folders_link.svg" alt="folders_link"><div class="label">folders_link</div></div>
  <div class="card"><div class="num">06</div><img src="candidate_06_orange_command.svg" alt="orange_command"><div class="label">orange_command</div></div>
  <div class="card"><div class="num">07</div><img src="candidate_07_minimal_grid.svg" alt="minimal_grid"><div class="label">minimal_grid</div></div>
  <div class="card"><div class="num">08</div><img src="candidate_08_cyber_tag.svg" alt="cyber_tag"><div class="label">cyber_tag</div></div>
  <div class="card"><div class="num">09</div><img src="candidate_09_sunset_file.svg" alt="sunset_file"><div class="label">sunset_file</div></div>
  <div class="card"><div class="num">10</div><img src="candidate_10_teal_boss.svg" alt="teal_boss"><div class="label">teal_boss</div></div>
</div>
</body>
</html>
