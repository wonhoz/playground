    <rect x="296" y="296" width="22" height="22" rx="4" opacity="0.9"/>
    <rect x="328" y="296" width="22" height="22" rx="4" opacity="0.7"/>
    <rect x="360" y="296" width="22" height="22" rx="4" opacity="0.9"/>
