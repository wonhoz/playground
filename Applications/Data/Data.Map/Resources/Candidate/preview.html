<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Data.Map - 아이콘 후보</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 24px; }
  h1 { color: #4a9eff; margin-bottom: 4px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .item { background: #252525; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #333; }
  .item img { width: 120px; height: 120px; border-radius: 8px; display: block; margin: 0 auto 10px; }
  .item span { font-size: 11px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Data.Map</h1>
<p>데이터 구조 시각화 맵 - 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_network_nodes.svg"><span>candidate_01_network_nodes</span></div>
  <div class="item"><img src="candidate_02_heatmap.svg"><span>candidate_02_heatmap</span></div>
  <div class="item"><img src="candidate_03_flow_chart.svg"><span>candidate_03_flow_chart</span></div>
  <div class="item"><img src="candidate_04_bubble_map.svg"><span>candidate_04_bubble_map</span></div>
  <div class="item"><img src="candidate_05_radar_chart.svg"><span>candidate_05_radar_chart</span></div>
  <div class="item"><img src="candidate_06_treemap.svg"><span>candidate_06_treemap</span></div>
  <div class="item"><img src="candidate_07_scatter_plot.svg"><span>candidate_07_scatter_plot</span></div>
  <div class="item"><img src="candidate_08_world_map.svg"><span>candidate_08_world_map</span></div>
  <div class="item"><img src="candidate_09_sankey.svg"><span>candidate_09_sankey</span></div>
  <div class="item"><img src="candidate_10_minimal_graph.svg"><span>candidate_10_minimal_graph</span></div>
</div>
</body>
</html>
