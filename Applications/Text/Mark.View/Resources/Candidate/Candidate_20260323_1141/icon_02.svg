<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#0D1B3E"/>
  <!-- Divider line -->
  <rect x="490" y="180" width="8" height="664" rx="4" fill="#5BB8FF"/>
  <!-- Layer 2 Left: MD source -->
  <text x="160" y="280" font-family="Consolas,monospace" font-size="40" fill="#66BB6A"># Heading</text>
  <text x="160" y="340" font-family="Consolas,monospace" font-size="32" fill="#66BB6A">**bold text**</text>
  <text x="160" y="400" font-family="Consolas,monospace" font-size="32" fill="#66BB6A">*italic*</text>
  <rect x="160" y="430" width="280" height="16" rx="8" fill="#66BB6A" opacity="0.4"/>
  <rect x="160" y="460" width="220" height="16" rx="8" fill="#66BB6A" opacity="0.3"/>
  <!-- Layer 3 Right: Rendered -->
  <text x="530" y="280" font-family="Arial" font-size="44" font-weight="bold" fill="white">Heading</text>
  <text x="530" y="350" font-family="Arial" font-size="34" font-weight="bold" fill="white">bold text</text>
  <text x="530" y="410" font-family="Arial" font-size="34" font-style="italic" fill="#BBDEFB">italic</text>
  <rect x="530" y="440" width="300" height="14" rx="7" fill="white" opacity="0.3"/>
  <rect x="530" y="466" width="240" height="14" rx="7" fill="white" opacity="0.2"/>
</svg>