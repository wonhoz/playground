  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg09)"/>
  <!-- 배경 빛 후광 -->
  <circle cx="512" cy="420" r="280" fill="#831843" opacity="0.5"/>

  <!-- Layer 2: 꽃잎 (6장) -->
