<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="vault" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vault door -->
  <rect x="96" y="96" width="320" height="320" rx="24" fill="url(#vault)" stroke="#7986cb" stroke-width="6"/>
  <!-- Handle ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#e8eaf6" stroke-width="14"/>
  <circle cx="256" cy="256" r="50" fill="#3949ab" stroke="#7986cb" stroke-width="6"/>
  <!-- Spokes -->
  <line x1="256" y1="176" x2="256" y2="210" stroke="#e8eaf6" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="302" x2="256" y2="336" stroke="#e8eaf6" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="210" y2="256" stroke="#e8eaf6" stroke-width="10" stroke-linecap="round"/>
  <line x1="302" y1="256" x2="336" y2="256" stroke="#e8eaf6" stroke-width="10" stroke-linecap="round"/>
  <!-- Lock bolt -->
  <rect x="340" y="230" width="40" height="52" rx="8" fill="#ffb300"/>
  <!-- Corner bolts -->
  <circle cx="128" cy="128" r="12" fill="#9fa8da"/>
  <circle cx="384" cy="128" r="12" fill="#9fa8da"/>
  <circle cx="128" cy="384" r="12" fill="#9fa8da"/>
  <circle cx="384" cy="384" r="12" fill="#9fa8da"/>
  <!-- Link icon small -->
  <path d="M216 248 Q256 220 296 248" fill="none" stroke="#ffb300" stroke-width="6" stroke-linecap="round"/>
</svg>
