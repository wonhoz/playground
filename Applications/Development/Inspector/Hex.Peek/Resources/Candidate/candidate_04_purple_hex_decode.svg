<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0018"/>
      <stop offset="100%" stop-color="#180030"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8800FF"/>
      <stop offset="100%" stop-color="#CC44FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Left: hex values -->
  <rect x="60" y="140" width="170" height="232" rx="10" fill="#0C0020" stroke="#6600CC" stroke-width="2"/>
  <text x="150" y="168" text-anchor="middle" fill="#9944FF" font-size="13" font-family="monospace">HEX</text>
  <line x1="72" y1="176" x2="218" y2="176" stroke="#6600CC" stroke-width="1" opacity="0.4"/>
  <text x="80" y="200" fill="#8833FF" font-size="13" font-family="monospace">48 65 6C 6C</text>
  <text x="80" y="222" fill="#7722EE" font-size="13" font-family="monospace">6F 20 57 6F</text>
  <text x="80" y="244" fill="#8833FF" font-size="13" font-family="monospace">72 6C 64 21</text>
  <text x="80" y="266" fill="#7722EE" font-size="13" font-family="monospace">0A 00 00 00</text>
  <text x="80" y="288" fill="#8833FF" font-size="13" font-family="monospace">FF FE 00 00</text>
  <text x="80" y="310" fill="#7722EE" font-size="13" font-family="monospace">4D 5A 90 00</text>
  <text x="80" y="332" fill="#8833FF" font-size="13" font-family="monospace">50 45 00 00</text>
  <!-- Arrow decode -->
  <polygon points="246,256 282,238 282,274" fill="url(#arrow)"/>
  <line x1="230" y1="256" x2="280" y2="256" stroke="url(#arrow)" stroke-width="5"/>
  <!-- Right: decoded text -->
  <rect x="282" y="140" width="170" height="232" rx="10" fill="#0C0020" stroke="#CC44FF" stroke-width="2"/>
  <text x="367" y="168" text-anchor="middle" fill="#CC88FF" font-size="13" font-family="monospace">ASCII</text>
  <line x1="294" y1="176" x2="440" y2="176" stroke="#CC44FF" stroke-width="1" opacity="0.4"/>
  <text x="300" y="200" fill="#AA66FF" font-size="15" font-family="monospace">Hell</text>
  <text x="300" y="222" fill="#9955EE" font-size="15" font-family="monospace">o Wo</text>
  <text x="300" y="244" fill="#AA66FF" font-size="15" font-family="monospace">rld!</text>
  <text x="300" y="266" fill="#9955EE" font-size="15" font-family="monospace">....[LF]</text>
  <text x="300" y="288" fill="#AA66FF" font-size="13" font-family="monospace">[BOM]</text>
  <text x="300" y="310" fill="#9955EE" font-size="15" font-family="monospace">MZ..</text>
  <text x="300" y="332" fill="#AA66FF" font-size="15" font-family="monospace">PE..</text>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" fill="#9944FF" font-size="20" font-family="monospace" font-weight="bold">Hex.Peek</text>
  <text x="256" y="460" text-anchor="middle" fill="#662288" font-size="14" font-family="monospace">Hex &#x2192; ASCII Decoder</text>
</svg>
