<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 이미지 프레임 (앱 미리보기) -->
  <rect x="130" y="200" width="764" height="560" rx="32" fill="white" opacity="0.95"/>
  <!-- 이미지 영역 -->
  <rect x="155" y="225" width="714" height="360" rx="18" fill="#FCE4EC"/>
  <!-- 산 + 태양 이미지 표현 -->
  <circle cx="640" cy="335" r="72" fill="#FFD54F"/>
  <polygon points="155,570 380,310 510,420 640,310 869,570" fill="#F48FB1" opacity="0.6"/>
  <!-- 포맷 선택 드롭다운 표현 -->
  <rect x="155" y="610" width="340" height="90" rx="14" fill="#F3E5F5"/>
  <text x="280" y="668" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#880E4F" text-anchor="middle">ICO ▾</text>
  <!-- 변환 버튼 -->
  <rect x="529" y="610" width="340" height="90" rx="14" fill="#880E4F"/>
  <text x="699" y="668" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">Convert</text>
  <!-- Layer 3: 포맷 배지 -->
  <rect x="155" y="225" width="160" height="60" rx="10" fill="#880E4F" opacity="0.85"/>
  <text x="235" y="268" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">PNG</text>
</svg>
