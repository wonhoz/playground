<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="50%" stop-color="#1a0a40"/>
      <stop offset="100%" stop-color="#3d1a00"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#220055"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="95%" r="40%">
      <stop offset="0%" stop-color="#FFAA00" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FF5500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF5500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#220044"/>
      <stop offset="100%" stop-color="#110022"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Sky gradient -->
  <rect x="80" y="80" width="352" height="352" rx="20" fill="url(#sky)" opacity="0.4"/>
  <!-- Sun glow -->
  <circle cx="256" cy="420" r="160" fill="url(#sun)"/>
  <!-- Silhouette buildings -->
  <rect x="80" y="280" width="60" height="152" fill="url(#bld)"/>
  <rect x="148" y="240" width="50" height="192" fill="url(#bld)"/>
  <rect x="206" y="200" width="70" height="232" fill="url(#bld)"/>
  <rect x="284" y="220" width="60" height="212" fill="url(#bld)"/>
  <rect x="352" y="260" width="50" height="172" fill="url(#bld)"/>
  <rect x="410" y="300" width="30" height="132" fill="url(#bld)"/>
  <!-- Building lights (windows) -->
  <rect x="216" y="215" width="8" height="10" rx="1" fill="#FFDD88" opacity="0.7"/>
  <rect x="234" y="215" width="8" height="10" rx="1" fill="#FFDD88" opacity="0.5"/>
  <rect x="216" y="240" width="8" height="10" rx="1" fill="#FFDD88" opacity="0.6"/>
  <rect x="156" y="258" width="8" height="10" rx="1" fill="#FFDD88" opacity="0.6"/>
  <!-- Gear/auto symbol overlay -->
  <circle cx="390" cy="120" r="36" fill="#FFAA00" opacity="0.2" stroke="#FFAA00" stroke-width="2"/>
  <circle cx="390" cy="120" r="15" fill="#0a0520" stroke="#FFAA00" stroke-width="2"/>
  <circle cx="390" cy="120" r="6" fill="#FFAA00"/>
  <rect x="384" y="78" width="12" height="14" rx="3" fill="#FFAA00"/>
  <rect x="384" y="148" width="12" height="14" rx="3" fill="#FFAA00"/>
  <rect x="348" y="114" width="14" height="12" rx="3" fill="#FFAA00"/>
  <rect x="418" y="114" width="14" height="12" rx="3" fill="#FFAA00"/>
</svg>