<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Sound speaker with equalizer bars -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0A14"/>
  <!-- Speaker cone -->
  <path d="M280 360 L280 664 L420 664 L600 800 L600 224 L420 360 Z" fill="#3F51B5"/>
  <!-- Speaker body -->
  <rect x="200" y="360" width="120" height="304" rx="16" fill="#283593"/>
  <!-- Sound waves -->
  <path d="M650 400 Q710 456 710 512 Q710 568 650 624" fill="none" stroke="#5C6BC0" stroke-width="32" stroke-linecap="round"/>
  <path d="M720 340 Q810 420 810 512 Q810 604 720 684" fill="none" stroke="#5C6BC0" stroke-width="26" stroke-linecap="round" opacity="0.6"/>
  <!-- EQ bars at bottom -->
  <rect x="200" y="760" width="44" height="80" rx="10" fill="#7986CB" opacity="0.5"/>
  <rect x="258" y="730" width="44" height="110" rx="10" fill="#7986CB" opacity="0.65"/>
  <rect x="316" y="710" width="44" height="130" rx="10" fill="#7986CB" opacity="0.8"/>
  <rect x="374" y="740" width="44" height="100" rx="10" fill="#7986CB" opacity="0.7"/>
  <rect x="432" y="760" width="44" height="80" rx="10" fill="#7986CB" opacity="0.55"/>
</svg>
