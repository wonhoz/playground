<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background medium blue -->
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: Quiz question + 4 answers + timer -->
  <rect x="120" y="150" width="784" height="120" rx="18" fill="#FFFFFF" opacity="0.9"/>
  <text x="512" y="226" font-family="Arial, sans-serif" font-size="42" fill="#283593" text-anchor="middle">대기 중 가장 많은 기체는?</text>
  <!-- Answer buttons 2x2 -->
  <rect x="120" y="310" width="370" height="100" rx="16" fill="#FFCA28"/>
  <text x="305" y="372" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#1A237E" text-anchor="middle">질소 78%</text>
  <rect x="534" y="310" width="370" height="100" rx="16" fill="#3949AB" opacity="0.85"/>
  <text x="719" y="372" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">산소 21%</text>
  <rect x="120" y="440" width="370" height="100" rx="16" fill="#3949AB" opacity="0.85"/>
  <text x="305" y="502" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">이산화탄소</text>
  <rect x="534" y="440" width="370" height="100" rx="16" fill="#3949AB" opacity="0.85"/>
  <text x="719" y="502" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">아르곤</text>
  <!-- Timer bar -->
  <rect x="120" y="590" width="784" height="36" rx="18" fill="#FFFFFF" opacity="0.3"/>
  <rect x="120" y="590" width="500" height="36" rx="18" fill="#FFCA28"/>
  <text x="904" y="616" font-family="Arial Black, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">9s</text>
  <!-- Layer 3: Streak badge -->
  <rect x="310" y="680" width="404" height="90" rx="20" fill="#1A237E"/>
  <text x="512" y="740" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#FFD740" text-anchor="middle">🔥 5 STREAK</text>
</svg>
