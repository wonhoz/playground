<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060020"/>
      <stop offset="100%" stop-color="#0D003A"/>
    </linearGradient>
    <radialGradient id="portal1" cx="35%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="60%" stop-color="#0097A7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portal2" cx="65%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="60%" stop-color="#E65100" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Portal glow backgrounds -->
  <ellipse cx="168" cy="256" rx="100" ry="140" fill="url(#portal1)"/>
  <ellipse cx="344" cy="256" rx="100" ry="140" fill="url(#portal2)"/>
  <!-- Portal 1 (blue/cyan) -->
  <ellipse cx="168" cy="256" rx="64" ry="100" fill="none" stroke="#00E5FF" stroke-width="6"/>
  <ellipse cx="168" cy="256" rx="54" ry="90" fill="none" stroke="#84FFFF" stroke-width="2" opacity="0.5"/>
  <!-- Portal 2 (orange) -->
  <ellipse cx="344" cy="256" rx="64" ry="100" fill="none" stroke="#FF6D00" stroke-width="6"/>
  <ellipse cx="344" cy="256" rx="54" ry="90" fill="none" stroke="#FFAB40" stroke-width="2" opacity="0.5"/>
  <!-- Geometric cube going through portals -->
  <!-- Cube entering portal 1 -->
  <rect x="100" y="220" width="68" height="68" rx="4" fill="#001A20" stroke="#00E5FF" stroke-width="2" opacity="0.8"/>
  <!-- Cube exiting portal 2 (shifted perspective / smaller) -->
  <rect x="292" y="228" width="52" height="52" rx="4" fill="#200D00" stroke="#FF6D00" stroke-width="2" opacity="0.8"/>
  <!-- Perspective grid lines on cube faces -->
  <line x1="100" y1="220" x2="115" y2="210" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="168" y1="220" x2="183" y2="210" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="115" y1="210" x2="183" y2="210" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrow from portal 1 to portal 2 -->
  <path d="M232 256 Q256 256 280 256" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5" stroke-dasharray="8,5"/>
  <!-- Isometric grid floor -->
  <line x1="80" y1="380" x2="432" y2="380" stroke="#3A3A3A" stroke-width="1"/>
  <line x1="80" y1="400" x2="432" y2="400" stroke="#3A3A3A" stroke-width="1"/>
  <line x1="80" y1="420" x2="432" y2="420" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Stars/particles -->
  <circle cx="256" cy="100" r="3" fill="#00E5FF" opacity="0.8"/>
  <circle cx="180" cy="140" r="2" fill="#FF6D00" opacity="0.8"/>
  <circle cx="340" cy="130" r="2" fill="#00E5FF" opacity="0.8"/>
  <circle cx="420" cy="160" r="3" fill="#FF6D00" opacity="0.6"/>
  <circle cx="90" cy="150" r="2" fill="#84FFFF" opacity="0.6"/>
</svg>