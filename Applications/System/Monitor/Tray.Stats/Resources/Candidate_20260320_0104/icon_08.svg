<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A05"/>
  <!-- 눈+미니 뷰어: compact eye with mini stats -->
  <!-- Eye outline -->
  <path d="M180 512 Q360 300 512 300 Q664 300 844 512 Q664 724 512 724 Q360 724 180 512 Z" fill="none" stroke="#1B5E20" stroke-width="32"/>
  <!-- Iris -->
  <circle cx="512" cy="512" r="150" fill="#1B5E20"/>
  <!-- Pupil -->
  <circle cx="512" cy="512" r="90" fill="#000A05"/>
  <!-- Mini stats inside pupil -->
  <rect x="454" y="488" width="28" height="60" rx="4" fill="#1B5E20"/>
  <rect x="492" y="474" width="28" height="74" rx="4" fill="#A5D6A7"/>
  <rect x="530" y="482" width="28" height="66" rx="4" fill="#1B5E20"/>
  <!-- Eye shine -->
  <circle cx="470" cy="476" r="22" fill="#A5D6A7" opacity="0.4"/>
  <!-- Outer ring glow -->
  <circle cx="512" cy="512" r="150" fill="none" stroke="#A5D6A7" stroke-width="6" opacity="0.3"/>
</svg>