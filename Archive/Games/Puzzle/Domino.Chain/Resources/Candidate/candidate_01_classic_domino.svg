<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#2D2000"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E8C0"/>
      <stop offset="100%" stop-color="#D4C080"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Falling chain of dominos -->
  <!-- Domino 1 (standing) -->
  <rect x="90" y="200" width="44" height="88" rx="6" fill="url(#tile)" stroke="#AA8840" stroke-width="2"/>
  <line x1="90" y1="244" x2="134" y2="244" stroke="#AA8840" stroke-width="2"/>
  <circle cx="105" cy="224" r="5" fill="#222200"/>
  <circle cx="119" cy="224" r="5" fill="#222200"/>
  <circle cx="105" cy="264" r="5" fill="#222200"/>
  <!-- Domino 2 (slight tilt falling) -->
  <g transform="rotate(-15 190 288)">
    <rect x="168" y="200" width="44" height="88" rx="6" fill="url(#tile)" stroke="#AA8840" stroke-width="2"/>
    <line x1="168" y1="244" x2="212" y2="244" stroke="#AA8840" stroke-width="2"/>
    <circle cx="183" cy="222" r="5" fill="#222200"/>
    <circle cx="197" cy="236" r="5" fill="#222200"/>
    <circle cx="183" cy="266" r="5" fill="#222200"/>
    <circle cx="197" cy="266" r="5" fill="#222200"/>
  </g>
  <!-- Domino 3 (more tilted) -->
  <g transform="rotate(-45 268 300)">
    <rect x="246" y="200" width="44" height="88" rx="6" fill="url(#tile)" stroke="#AA8840" stroke-width="2"/>
    <line x1="246" y1="244" x2="290" y2="244" stroke="#AA8840" stroke-width="2"/>
    <circle cx="261" cy="224" r="5" fill="#222200"/>
    <circle cx="275" cy="224" r="5" fill="#222200"/>
    <circle cx="261" cy="264" r="5" fill="#222200"/>
    <circle cx="275" cy="264" r="5" fill="#222200"/>
    <circle cx="268" cy="244" r="5" fill="#222200"/>
  </g>
  <!-- Domino 4 (nearly flat) -->
  <g transform="rotate(-75 360 310)">
    <rect x="338" y="200" width="44" height="88" rx="6" fill="url(#tile)" stroke="#AA8840" stroke-width="2"/>
    <line x1="338" y1="244" x2="382" y2="244" stroke="#AA8840" stroke-width="2"/>
    <circle cx="353" cy="224" r="5" fill="#222200"/>
    <circle cx="367" cy="264" r="5" fill="#222200"/>
    <circle cx="367" cy="248" r="5" fill="#222200"/>
  </g>
  <!-- Chain effect dots -->
  <circle cx="90" cy="310" r="4" fill="#FFDD88" opacity="0.8"/>
  <circle cx="170" cy="320" r="4" fill="#FFDD88" opacity="0.7"/>
  <circle cx="260" cy="330" r="4" fill="#FFDD88" opacity="0.6"/>
  <!-- Impact star -->
  <polygon points="430,250 440,230 450,250 472,252 456,266 462,290 440,276 418,290 424,266 408,252" fill="#FFDD00" opacity="0.9"/>
  <text x="256" y="455" font-family="Georgia" font-size="26" font-weight="bold" fill="#F5E8C0" text-anchor="middle">DOMINO·CHAIN</text>
</svg>
