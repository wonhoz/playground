<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#010108"/>
  <!-- 배경 별 -->
  <circle cx="180" cy="150" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="860" cy="200" r="2" fill="#FFF" opacity="0.5"/>
  <circle cx="100" cy="600" r="2" fill="#FFF" opacity="0.6"/>
  <circle cx="920" cy="700" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="750" cy="900" r="2" fill="#FFF" opacity="0.5"/>
  <!-- Layer 2: 태양계 (동심원 궤도) -->
  <!-- 궤도들 -->
  <circle cx="512" cy="512" r="140" fill="none" stroke="#334155" stroke-width="8"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#334155" stroke-width="8"/>
  <circle cx="512" cy="512" r="350" fill="none" stroke="#334155" stroke-width="8"/>
  <circle cx="512" cy="512" r="440" fill="none" stroke="#334155" stroke-width="6" opacity="0.6"/>
  <!-- 태양 -->
  <circle cx="512" cy="512" r="70" fill="#FFD700"/>
  <circle cx="512" cy="512" r="52" fill="#FEF08A"/>
  <!-- 행성 1 (작은, 내부) -->
  <circle cx="652" cy="512" r="22" fill="#6B7280"/>
  <!-- 행성 2 (중간) -->
  <circle cx="512" cy="272" r="32" fill="#3B82F6"/>
  <!-- 행성 3 (큰) -->
  <circle cx="236" cy="620" r="42" fill="#F97316"/>
  <!-- 목성 링 -->
  <ellipse cx="236" cy="620" rx="62" ry="14" fill="none" stroke="#FCD34D" stroke-width="6"/>
  <!-- 탐사선 (목표 궤도 위) -->
  <circle cx="862" cy="512" r="14" fill="#FFFFFF"/>
  <!-- Layer 3: 탐사선 경로 (발사 예측) -->
  <path d="M652 512 Q800 400 862 512" fill="none" stroke="#38BDF8" stroke-width="8" stroke-dasharray="14,8" opacity="0.8"/>
</svg>
