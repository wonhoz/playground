<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a2342"/>
      <stop offset="50%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a2342"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2d5a8e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d5a2d"/>
      <stop offset="100%" stop-color="#1a3a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Top half (sky) -->
  <path d="M80,80 Q80,80 432,80 L432,256 L80,256 Z" fill="url(#sky)" clip-path="inset(0 0 0 0 round 80px)"/>
  <!-- Bottom half (ground / inverted) -->
  <path d="M80,256 L432,256 L432,432 Q432,432 80,432 Z" fill="url(#ground)"/>
  <!-- Horizon line (flip axis) -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <!-- Flip indicator arrows -->
  <path d="M 200 200 Q 256 160 312 200" fill="none" stroke="#87ceeb" stroke-width="3"/>
  <polygon points="312,200 295,193 300,210" fill="#87ceeb"/>
  <path d="M 200 312 Q 256 352 312 312" fill="none" stroke="#90ee90" stroke-width="3"/>
  <polygon points="200,312 217,319 212,302" fill="#90ee90"/>
  <!-- Sky elements (stars/sun) -->
  <circle cx="350" cy="160" r="25" fill="#ffd700" opacity="0.8"/>
  <circle cx="140" cy="140" r="3" fill="#ffffff" opacity="0.7"/>
  <circle cx="200" cy="180" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="300" cy="130" r="2.5" fill="#ffffff" opacity="0.7"/>
  <!-- Ground elements (reflected) -->
  <circle cx="350" cy="352" r="25" fill="#ffd700" opacity="0.3"/>
  <line x1="100" y1="350" x2="412" y2="350" stroke="#3a6b3a" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="380" x2="432" y2="380" stroke="#3a6b3a" stroke-width="1.5" opacity="0.4"/>
  <!-- Perspective lines converging -->
  <line x1="256" y1="256" x2="80" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="5 5"/>
  <line x1="256" y1="256" x2="432" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="5 5"/>
</svg>
