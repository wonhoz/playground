<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8edea"/>
      <stop offset="100%" stop-color="#fed6e3"/>
    </linearGradient>
    <linearGradient id="inkFlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ink stroke (flowing brushstroke) -->
  <path d="M80,320 Q150,200 256,180 Q362,160 420,260" fill="none" stroke="url(#inkFlow)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
  <path d="M80,320 Q150,200 256,180 Q362,160 420,260" fill="none" stroke="url(#brush)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Ink splatter dots -->
  <circle cx="110" cy="310" r="8" fill="#667eea" opacity="0.7"/>
  <circle cx="95" cy="340" r="5" fill="#764ba2" opacity="0.6"/>
  <circle cx="430" cy="250" r="7" fill="#a8edea" opacity="0.7"/>
  <circle cx="445" cy="275" r="4" fill="#fed6e3" opacity="0.6"/>
  <circle cx="258" cy="165" r="5" fill="#667eea" opacity="0.5"/>
  <!-- Brush tool -->
  <g transform="translate(320,80) rotate(40)">
    <rect x="-10" y="-80" width="20" height="60" rx="6" fill="url(#brush)" opacity="0.9"/>
    <polygon points="-10,-20 10,-20 6,20 -6,20" fill="#c0a080"/>
    <polygon points="-6,20 6,20 2,40 -2,40" fill="#222"/>
  </g>
  <!-- Cast/broadcast signal waves -->
  <path d="M60,420 Q130,400 200,420 Q270,440 340,420 Q410,400 452,420" fill="none" stroke="#a8edea" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M80,445 Q150,430 220,445 Q290,460 360,445 Q420,430 445,445" fill="none" stroke="#fed6e3" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Screen/monitor shape (cast target) -->
  <rect x="170" y="340" width="172" height="110" rx="10" fill="none" stroke="#667eea" stroke-width="3" opacity="0.7"/>
  <rect x="220" y="450" width="72" height="16" rx="4" fill="#667eea" opacity="0.5"/>
  <!-- Ink inside screen -->
  <path d="M185,370 Q220,355 256,365 Q292,375 327,360" fill="none" stroke="url(#brush)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M185,390 Q230,380 270,390 Q300,398 327,385" fill="none" stroke="url(#inkFlow)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
</svg>
