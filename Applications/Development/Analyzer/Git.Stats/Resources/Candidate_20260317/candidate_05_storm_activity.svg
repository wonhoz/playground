<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg05" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#12073a"/>
      <stop offset="60%" stop-color="#080525"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <radialGradient id="storm05" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#4A1080" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt05a" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bolt05b" x1="0%" y1="0%" x2="15%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlowB">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cloudGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="#050510"/>
  <circle cx="256" cy="180" r="280" fill="url(#storm05)"/>

  <!-- 폭풍 구름 (어두운 소용돌이) -->
  <!-- 외곽 구름 레이어 -->
  <ellipse cx="256" cy="155" rx="230" ry="100" fill="#1a0a35" opacity="0.9"/>
  <ellipse cx="200" cy="130" rx="120" ry="60" fill="#220e40" opacity="0.8"/>
  <ellipse cx="310" cy="125" rx="110" ry="55" fill="#1e0c3a" opacity="0.8"/>
  <ellipse cx="256" cy="115" rx="160" ry="70" fill="#2a1050" opacity="0.9"/>

  <!-- 구름 내부 (더 어두운 소용돌이) -->
  <ellipse cx="180" cy="110" rx="90" ry="45" fill="#150828" opacity="0.95"/>
  <ellipse cx="330" cy="105" rx="85" ry="42" fill="#160930" opacity="0.95"/>
  <ellipse cx="256" cy="95" rx="120" ry="52" fill="#0d0520" opacity="0.95"/>

  <!-- 폭풍 아이 (밝은 중심) -->
  <ellipse cx="256" cy="140" rx="35" ry="20" fill="#7B2FBE" opacity="0.5" filter="url(#cloudGlow)"/>
  <ellipse cx="256" cy="140" rx="20" ry="12" fill="#9B59B6" opacity="0.6" filter="url(#cloudGlow)"/>

  <!-- 구름 테두리 글로우 -->
  <ellipse cx="256" cy="155" rx="230" ry="100" fill="none" stroke="#7B2FBE" stroke-width="2" opacity="0.4" filter="url(#cloudGlow)"/>

  <!-- 메인 번개 (중앙) -->
  <polyline points="256,55 240,130 262,140 235,230 258,240 225,340 265,345 240,430"
            fill="none" stroke="url(#bolt05a)" stroke-width="6" stroke-linejoin="round" filter="url(#boltGlowB)" opacity="0.95"/>
  <polyline points="256,55 240,130 262,140 235,230 258,240 225,340 265,345 240,430"
            fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>

  <!-- 번개 가지 1 (왼쪽) -->
  <polyline points="240,130 210,175 195,200 175,235"
            fill="none" stroke="#FFE600" stroke-width="3" stroke-linejoin="round" filter="url(#boltGlow)" opacity="0.8"/>
  <polyline points="240,130 210,175 195,200 175,235"
            fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.7"/>

  <!-- 번개 가지 2 (오른쪽) -->
  <polyline points="262,140 295,185 315,210 340,248"
            fill="none" stroke="#FFE600" stroke-width="3" stroke-linejoin="round" filter="url(#boltGlow)" opacity="0.8"/>
  <polyline points="262,140 295,185 315,210 340,248"
            fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.7"/>

  <!-- 번개 작은 가지들 -->
  <polyline points="258,240 290,270 305,285"
            fill="none" stroke="#FFD700" stroke-width="2" filter="url(#boltGlow)" opacity="0.6"/>
  <polyline points="225,340 200,360 185,375"
            fill="none" stroke="#FFD700" stroke-width="2" filter="url(#boltGlow)" opacity="0.6"/>

  <!-- 보조 번개 (왼쪽) -->
  <polyline points="130,70 115,140 130,150 105,230 120,238 95,310"
            fill="none" stroke="#FFE600" stroke-width="3" stroke-linejoin="round" filter="url(#boltGlow)" opacity="0.6"/>
  <polyline points="130,70 115,140 130,150 105,230 120,238 95,310"
            fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>

  <!-- 보조 번개 (오른쪽) -->
  <polyline points="385,75 400,145 385,155 410,235 395,245 420,320"
            fill="none" stroke="#FFE600" stroke-width="3" stroke-linejoin="round" filter="url(#boltGlow)" opacity="0.6"/>
  <polyline points="385,75 400,145 385,155 410,235 395,245 420,320"
            fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>

  <!-- 충격파 원 -->
  <circle cx="256" cy="430" r="60" fill="none" stroke="#FFE600" stroke-width="2" opacity="0.4" filter="url(#boltGlow)"/>
  <circle cx="256" cy="430" r="40" fill="none" stroke="#FFE600" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="430" r="20" fill="#FFE600" opacity="0.2" filter="url(#boltGlowB)"/>

  <!-- 보조 충격파 (좌) -->
  <circle cx="95" cy="310" r="30" fill="none" stroke="#7B2FBE" stroke-width="1.5" opacity="0.4" filter="url(#boltGlow)"/>
  <circle cx="95" cy="310" r="15" fill="#7B2FBE" opacity="0.2" filter="url(#cloudGlow)"/>

  <!-- 보조 충격파 (우) -->
  <circle cx="420" cy="320" r="30" fill="none" stroke="#7B2FBE" stroke-width="1.5" opacity="0.4" filter="url(#boltGlow)"/>
  <circle cx="420" cy="320" r="15" fill="#7B2FBE" opacity="0.2" filter="url(#cloudGlow)"/>

  <!-- 커밋 활동 바 (하단) -->
  <rect x="40" y="460" width="10" height="30" fill="#7B2FBE" opacity="0.5" rx="1"/>
  <rect x="58" y="450" width="10" height="40" fill="#9B59B6" opacity="0.6" rx="1"/>
  <rect x="76" y="445" width="10" height="45" fill="#FFE600" opacity="0.5" rx="1" filter="url(#boltGlow)"/>
  <rect x="94" y="455" width="10" height="35" fill="#7B2FBE" opacity="0.5" rx="1"/>
  <rect x="112" y="448" width="10" height="42" fill="#9B59B6" opacity="0.6" rx="1"/>
  <rect x="300" y="448" width="10" height="42" fill="#9B59B6" opacity="0.6" rx="1"/>
  <rect x="318" y="455" width="10" height="35" fill="#7B2FBE" opacity="0.5" rx="1"/>
  <rect x="336" y="442" width="10" height="48" fill="#FFE600" opacity="0.5" rx="1" filter="url(#boltGlow)"/>
  <rect x="354" y="450" width="10" height="40" fill="#9B59B6" opacity="0.6" rx="1"/>
  <rect x="372" y="460" width="10" height="30" fill="#7B2FBE" opacity="0.5" rx="1"/>
  <rect x="450" y="452" width="10" height="38" fill="#9B59B6" opacity="0.6" rx="1"/>
  <rect x="468" y="445" width="10" height="45" fill="#FFE600" opacity="0.4" rx="1"/>

  <!-- 지면 -->
  <rect x="0" y="490" width="512" height="22" fill="#050510"/>
  <path d="M0,490 Q256,485 512,490" fill="none" stroke="#7B2FBE" stroke-width="1" opacity="0.4"/>
</svg>
