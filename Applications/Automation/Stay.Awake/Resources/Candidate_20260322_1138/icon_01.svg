<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glow01" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </radialGradient>
  </defs>

  <!-- Layer 1: Background — near black slate -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>

  <!-- Layer 2: Pulse rings (broadcast active signal) -->
  <circle cx="512" cy="490" r="368" fill="none" stroke="#22C55E" stroke-width="10" opacity="0.12"/>
  <circle cx="512" cy="490" r="326" fill="none" stroke="#22C55E" stroke-width="14" opacity="0.22"/>

  <!-- Main ACTIVE status circle -->
  <circle cx="512" cy="490" r="282" fill="url(#glow01)"/>

  <!-- Layer 3: "ACTIVE" text label + small presence dot below -->
  <text x="512" y="516" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="88" font-weight="900" fill="white" letter-spacing="-2">ACTIVE</text>
  <!-- Small dot indicator below text (presence badge style) -->
  <circle cx="512" cy="584" r="18" fill="white" opacity="0.6"/>
</svg>
