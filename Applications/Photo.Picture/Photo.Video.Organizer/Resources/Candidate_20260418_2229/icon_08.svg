<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background hot pink gradient -->
  <defs>
    <radialGradient id="bg08" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: Big folder with camera + date inside -->
  <!-- Folder shape -->
  <path d="M150 440 L150 820 L874 820 L874 440 L550 440 L510 360 L150 360 Z" fill="#F06292" opacity="0.9"/>
  <rect x="150" y="440" width="724" height="380" rx="0" fill="#FFFFFF" opacity="0.9"/>
  <!-- Camera icon inside -->
  <rect x="300" y="480" width="280" height="200" rx="20" fill="#E91E63"/>
  <circle cx="440" cy="560" r="62" fill="#FCE4EC"/>
  <circle cx="440" cy="560" r="46" fill="#E91E63" opacity="0.4"/>
  <circle cx="440" cy="560" r="30" fill="#FFFFFF"/>
  <rect x="410" y="475" width="80" height="26" rx="10" fill="#C2185B"/>
  <!-- Date badge -->
  <rect x="620" y="500" width="220" height="80" rx="16" fill="#E91E63"/>
  <text x="730" y="553" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">04/18</text>
  <!-- Folder label -->
  <rect x="300" y="690" width="424" height="70" rx="14" fill="#AD1457"/>
  <text x="512" y="738" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">Auto Sort</text>
  <!-- Layer 3: Small video file badge -->
  <rect x="720" y="640" width="110" height="80" rx="12" fill="#F8BBD9"/>
  <polygon points="760 660 760 700 800 680" fill="#E91E63"/>
  <text x="775" y="720" font-family="Arial, sans-serif" font-size="22" fill="#AD1457" text-anchor="middle">MP4</text>
</svg>
