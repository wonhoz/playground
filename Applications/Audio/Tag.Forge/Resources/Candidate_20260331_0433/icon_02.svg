<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 크림/산호 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 앨범 커버 (큰 정사각형 이미지) -->
  <rect x="140" y="160" width="580" height="580" rx="24" fill="#1565C0"/>
  <!-- 앨범 커버 내부 — 음악 디자인 -->
  <rect x="140" y="160" width="580" height="80" rx="24" fill="#0D47A1"/>
  <circle cx="430" cy="450" r="180" fill="#1976D2" opacity="0.5"/>
  <circle cx="430" cy="450" r="100" fill="#0D47A1"/>
  <circle cx="430" cy="450" r="40" fill="#42A5F5"/>
  <!-- 앨범명 텍스트 -->
  <text x="430" y="680" font-family="'Segoe UI', sans-serif" font-size="52" fill="white" text-anchor="middle" font-weight="700">ALBUM</text>
  <!-- Layer 3: 편집 연필 오버레이 (우하단) -->
  <rect x="620" y="580" width="264" height="264" rx="40" fill="#FF7043"/>
  <!-- 연필 심볼 -->
  <!-- 연필 몸통 -->
  <rect x="700" y="620" width="56" height="160" rx="8" fill="white" transform="rotate(45 728 700)"/>
  <!-- 연필 끝 -->
  <polygon points="728,798 698,828 758,828" fill="#FFF176"/>
  <!-- 연필 지우개 -->
  <rect x="740" y="622" width="56" height="30" rx="8" fill="#FFCCBC" transform="rotate(45 768 637)"/>
  <!-- 태그 배지 -->
  <rect x="160" y="820" width="560" height="60" rx="30" fill="#FF7043"/>
  <text x="440" y="861" font-family="'Consolas', monospace" font-size="42" fill="white" text-anchor="middle" font-weight="700">EDIT TAGS</text>
</svg>
