<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#020510"/>
  <!-- 망치(모루) + 행성 제작 -->
  <!-- 망치 -->
  <rect x="460" y="220" width="120" height="80" rx="14" fill="#42A5F5"/>
  <rect x="500" y="300" width="40" height="180" rx="8" fill="#1565C0"/>
  <!-- 모루 -->
  <ellipse cx="512" cy="530" rx="130" ry="40" fill="#0D47A1"/>
  <rect x="440" y="528" width="144" height="50" rx="8" fill="#0D47A1"/>
  <rect x="460" y="570" width="104" height="30" rx="6" fill="#1565C0"/>
  <!-- 제작 중인 행성 -->
  <circle cx="512" cy="720" r="80" fill="#0D47A1"/>
  <circle cx="512" cy="720" r="60" fill="#1565C0"/>
  <!-- 별 파편 -->
  <circle cx="400" cy="660" r="10" fill="#42A5F5" opacity="0.8"/>
  <circle cx="624" cy="650" r="8" fill="#42A5F5" opacity="0.6"/>
  <circle cx="360" cy="720" r="6" fill="#42A5F5" opacity="0.5"/>
</svg>
