<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141400"/>
      <stop offset="100%" stop-color="#1a1a00"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="50%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ffd600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd600" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="240" r="190" fill="url(#halo)"/>
  <!-- Lightning bolt -->
  <polygon points="290,80 200,270 264,270 222,432 340,220 272,220 314,80" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Scan lines behind bolt -->
  <line x1="80" y1="180" x2="432" y2="180" stroke="#ffd600" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#ffd600" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="260" x2="432" y2="260" stroke="#ffd600" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="300" x2="432" y2="300" stroke="#ffd600" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="340" x2="432" y2="340" stroke="#ffd600" stroke-width="1" opacity="0.12"/>
  <!-- Debug tags -->
  <rect x="88" y="410" width="130" height="22" rx="5" fill="#1a1400" stroke="#ffd600" stroke-width="1"/>
  <text x="153" y="426" font-family="monospace" font-size="12" fill="#ffd600" text-anchor="middle">EVT: PULSE</text>
  <rect x="294" y="410" width="130" height="22" rx="5" fill="#1a1400" stroke="#ffd600" stroke-width="1"/>
  <text x="359" y="426" font-family="monospace" font-size="12" fill="#ffd600" text-anchor="middle">t: 1.342ms</text>
</svg>
