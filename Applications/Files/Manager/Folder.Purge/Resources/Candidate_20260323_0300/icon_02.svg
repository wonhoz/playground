<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 쓰레기통+빈 폴더들 낙하 | 공간/장면 | #18181B -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#18181B"/>
  <!-- Layer 2: Trash bin at bottom -->
  <!-- Bin body -->
  <rect x="336" y="660" width="352" height="260" rx="16" fill="#3F3F46"/>
  <!-- Bin lid -->
  <rect x="310" y="620" width="404" height="54" rx="12" fill="#52525B"/>
  <!-- Bin handle -->
  <rect x="462" y="590" width="100" height="34" rx="12" fill="#71717A"/>
  <!-- Vertical lines on bin -->
  <line x1="434" y1="680" x2="420" y2="900" stroke="#27272A" stroke-width="4"/>
  <line x1="514" y1="680" x2="514" y2="900" stroke="#27272A" stroke-width="4"/>
  <line x1="594" y1="680" x2="608" y2="900" stroke="#27272A" stroke-width="4"/>
  <!-- Layer 3: Falling empty folders -->
  <!-- Folder 1 -->
  <g transform="rotate(-12, 300, 380)">
    <path d="M220 340 L220 340 L280 340 L300 320 L400 320 L400 340" fill="#D97706"/>
    <rect x="220" y="340" width="180" height="120" rx="10" fill="#F59E0B"/>
    <!-- Empty indicator dashes -->
    <rect x="240" y="365" width="140" height="70" rx="6" fill="none" stroke="#FDE68A" stroke-width="3" stroke-dasharray="10,6"/>
  </g>
  <!-- Folder 2 -->
  <g transform="rotate(8, 680, 340)">
    <path d="M600 300 L600 300 L650 300 L668 280 L780 280 L780 300" fill="#0369A1"/>
    <rect x="600" y="300" width="180" height="120" rx="10" fill="#0EA5E9"/>
    <rect x="618" y="322" width="144" height="74" rx="6" fill="none" stroke="#BAE6FD" stroke-width="3" stroke-dasharray="10,6"/>
  </g>
  <!-- Folder 3 (small, above) -->
  <g transform="rotate(4, 500, 240)">
    <path d="M440 220 L440 220 L480 220 L494 204 L570 204 L570 220" fill="#7C3AED"/>
    <rect x="440" y="220" width="130" height="86" rx="8" fill="#8B5CF6"/>
    <rect x="456" y="238" width="98" height="52" rx="5" fill="none" stroke="#DDD6FE" stroke-width="2" stroke-dasharray="8,5"/>
  </g>
  <!-- Speed lines above bin -->
  <line x1="300" y1="480" x2="300" y2="560" stroke="#71717A" stroke-width="3" opacity="0.4" stroke-dasharray="12,8"/>
  <line x1="512" y1="460" x2="512" y2="550" stroke="#71717A" stroke-width="3" opacity="0.3" stroke-dasharray="12,8"/>
  <line x1="700" y1="470" x2="700" y2="555" stroke="#71717A" stroke-width="3" opacity="0.4" stroke-dasharray="12,8"/>
</svg>
