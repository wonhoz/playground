  <rect x="144" y="238" width="12" height="14" fill="#44aaff" opacity="0.3"/>
  <rect x="166" y="238" width="12" height="14" fill="#ffcc44" opacity="0.6"/>
  <rect x="188" y="238" width="12" height="14" fill="#44aaff" opacity="0.4"/>

  <rect x="224" y="120" width="100" height="240" fill="#060612"/>
  <rect x="256" y="104" width="36" height="16" fill="#060612"/>
  <circle cx="274" cy="98" r="5" fill="#ff4444" opacity="0.9" filter="url(#lightGlow)"/>
  <rect x="236" y="136" width="14" height="16" fill="#44aaff" opacity="0.8"/>
  <rect x="264" y="136" width="14" height="16" fill="#ffcc44" opacity="0.5"/>
  <rect x="292" y="136" width="14" height="16" fill="#44aaff" opacity="0.6"/>
