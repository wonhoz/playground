<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#F57F17" stroke-width="16"/>
  <!-- BEFORE section (left): large folder with size indicator -->
  <rect x="130" y="175" width="340" height="380" rx="24" fill="#FFF3E0" stroke="#FF9800" stroke-width="14"/>
  <!-- Folder icon inside -->
  <path d="M 165,255 L 165,345 Q 165,358 178,358 L 430,358 Q 443,358 443,345 L 443,268 Q 443,255 430,255 L 352,255 L 334,238 Q 328,232 320,232 L 178,232 Q 165,232 165,245 Z" fill="#FFB300" stroke="#E65100" stroke-width="12"/>
  <!-- Size bar (large, mostly full) -->
  <rect x="158" y="388" width="298" height="28" rx="14" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="8"/>
  <rect x="158" y="388" width="250" height="28" rx="14" fill="#FF6B35" stroke="none"/>
  <!-- Size text -->
  <text x="307" y="464" font-family="Arial Black, sans-serif" font-weight="900" font-size="56" fill="#E65100" text-anchor="middle">2.4 GB</text>
  <text x="307" y="516" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FF9800" text-anchor="middle">BEFORE</text>
  <!-- Arrow between before/after -->
  <rect x="498" y="378" width="80" height="40" rx="18" fill="#F57F17" stroke="#E65100" stroke-width="12"/>
  <path d="M 572,342 L 630,398 L 572,454 Z" fill="#F57F17" stroke="#E65100" stroke-width="12" stroke-linejoin="round"/>
  <!-- AFTER section (right): small folder, less size -->
  <rect x="660" y="175" width="240" height="380" rx="24" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <!-- Smaller folder icon -->
  <path d="M 688,255 L 688,320 Q 688,330 698,330 L 872,330 Q 882,330 882,320 L 882,266 Q 882,256 872,256 L 814,256 L 800,244 Q 795,238 788,238 L 698,238 Q 688,238 688,248 Z" fill="#A5D6A7" stroke="#388E3C" stroke-width="10"/>
  <!-- Size bar (small, nearly empty) -->
  <rect x="692" y="358" width="218" height="24" rx="12" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="8"/>
  <rect x="692" y="358" width="62" height="24" rx="12" fill="#06D6A0" stroke="none"/>
  <!-- Size text -->
  <text x="779" y="430" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#2E7D32" text-anchor="middle">180 MB</text>
  <text x="779" y="480" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#388E3C" text-anchor="middle">AFTER</text>
  <!-- SAVE SPACE badge -->
  <rect x="136" y="748" width="752" height="116" rx="36" fill="#F57F17" stroke="#E65100" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" text-anchor="middle">SAVE SPACE</text>
</svg>
