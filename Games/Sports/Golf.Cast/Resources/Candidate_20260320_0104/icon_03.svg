<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030A03"/>
  <!-- 그린 퍼팅 경사: 경사 그린 -->
  <!-- sloped green surface -->
  <path d="M180 760 Q400 640 840 720 L840 860 L180 860 Z" fill="#388E3C" opacity="0.8"/>
  <!-- contour lines on slope -->
  <path d="M200 780 Q420 670 820 740" fill="none" stroke="#81C784" stroke-width="4" opacity="0.4"/>
  <path d="M220 810 Q440 700 820 770" fill="none" stroke="#81C784" stroke-width="4" opacity="0.3"/>
  <!-- golf ball on slope -->
  <circle cx="380" cy="640" r="52" fill="#81C784"/>
  <!-- dimples -->
  <circle cx="364" cy="624" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="396" cy="624" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="370" cy="648" r="6" fill="#388E3C" opacity="0.5"/>
  <circle cx="396" cy="652" r="6" fill="#388E3C" opacity="0.5"/>
  <!-- putter -->
  <line x1="340" y1="420" x2="380" y2="620" stroke="#81C784" stroke-width="12" stroke-linecap="round"/>
  <rect x="348" y="608" width="64" height="20" rx="6" fill="#388E3C" transform="rotate(10 380 618)"/>
  <!-- flag in distance -->
  <line x1="720" y1="720" x2="720" y2="560" stroke="#81C784" stroke-width="8" stroke-linecap="round"/>
  <path d="M720 560 L800 595 L720 630 Z" fill="#388E3C"/>
</svg>
