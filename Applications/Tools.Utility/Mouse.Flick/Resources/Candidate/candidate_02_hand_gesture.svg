<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#0A0520"/>
    </radialGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C5A3"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </linearGradient>
    <filter id="handGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Hand making swipe gesture -->
  <!-- Palm -->
  <ellipse cx="240" cy="330" rx="70" ry="80" fill="url(#skin)"/>
  <!-- Fingers -->
  <!-- Index finger pointing right -->
  <rect x="300" y="260" width="100" height="32" rx="16" fill="url(#skin)"/>
  <!-- Other fingers curled -->
  <ellipse cx="248" cy="250" rx="22" ry="36" fill="url(#skin)"/>
  <ellipse cx="220" cy="248" rx="20" ry="32" fill="#E8A87C"/>
  <ellipse cx="194" cy="255" rx="18" ry="28" fill="#E8A87C"/>
  <!-- Thumb -->
  <ellipse cx="178" cy="310" rx="24" ry="18" fill="url(#skin)" transform="rotate(-30, 178, 310)"/>
  <!-- Gesture trail lines -->
  <path d="M380,276 Q420,268 455,262" fill="none" stroke="#CC88FF" stroke-width="5" stroke-linecap="round" stroke-dasharray="8,6" filter="url(#handGlow)"/>
  <polygon points="455,250 475,268 450,276" fill="#CC88FF" filter="url(#handGlow)"/>
  <!-- Swipe speed lines -->
  <line x1="380" y1="256" x2="455" y2="248" stroke="#CC88FF" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="380" y1="270" x2="455" y2="264" stroke="#CC88FF" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="380" y1="284" x2="455" y2="280" stroke="#CC88FF" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  <!-- Glow aura around finger tip -->
  <circle cx="395" cy="276" r="18" fill="#CC88FF" opacity="0.2" filter="url(#handGlow)"/>
  <!-- Action indicator circles -->
  <circle cx="420" cy="420" r="40" fill="none" stroke="#CC88FF" stroke-width="4" opacity="0.5" filter="url(#handGlow)"/>
  <circle cx="420" cy="420" r="26" fill="none" stroke="#CC88FF" stroke-width="4" opacity="0.3" filter="url(#handGlow)"/>
  <circle cx="420" cy="420" r="12" fill="#CC88FF" opacity="0.2"/>
  <!-- Top hint text area -->
  <rect x="80" y="80" width="180" height="50" rx="10" fill="#220040" opacity="0.8"/>
  <text x="170" y="112" font-family="sans-serif" font-size="16" fill="#CC88FF" text-anchor="middle">FLICK</text>
</svg>
