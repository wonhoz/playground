<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000500"/>
      <stop offset="100%" stop-color="#001500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="col1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="col2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#56CCF2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#56CCF2" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="col3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd200" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#ffd200" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Digit rain columns -->
  <!-- Column 1 - green digits -->
  <text x="75" y="100" font-family="monospace" font-size="20" fill="url(#col1)" opacity="0.9">1</text>
  <text x="75" y="126" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.7">7</text>
  <text x="75" y="152" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.6">3</text>
  <text x="75" y="178" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.5">9</text>
  <text x="75" y="204" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.4">+</text>
  <text x="75" y="230" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.3">5</text>
  <text x="75" y="256" font-family="monospace" font-size="20" fill="#00ff88" opacity="0.25">2</text>

  <!-- Column 2 - cyan digits -->
  <text x="130" y="140" font-family="monospace" font-size="20" fill="url(#col2)" opacity="0.9">8</text>
  <text x="130" y="166" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.75">×</text>
  <text x="130" y="192" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.65">4</text>
  <text x="130" y="218" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.55">6</text>
  <text x="130" y="244" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.4">0</text>
  <text x="130" y="270" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.3">1</text>
  <text x="130" y="296" font-family="monospace" font-size="20" fill="#56CCF2" opacity="0.2">÷</text>

  <!-- Column 3 - yellow digits -->
  <text x="185" y="80" font-family="monospace" font-size="20" fill="url(#col3)" opacity="0.9">5</text>
  <text x="185" y="106" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.8">2</text>
  <text x="185" y="132" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.65">-</text>
  <text x="185" y="158" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.5">9</text>
  <text x="185" y="184" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.4">3</text>
  <text x="185" y="210" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.3">7</text>
  <text x="185" y="236" font-family="monospace" font-size="20" fill="#ffd200" opacity="0.2">4</text>

  <!-- More columns on right side -->
  <text x="310" y="120" font-family="monospace" font-size="20" fill="#ee0979" opacity="0.9">3</text>
  <text x="310" y="146" font-family="monospace" font-size="20" fill="#ee0979" opacity="0.7">^</text>
  <text x="310" y="172" font-family="monospace" font-size="20" fill="#ee0979" opacity="0.55">6</text>
  <text x="310" y="198" font-family="monospace" font-size="20" fill="#ee0979" opacity="0.4">1</text>
  <text x="310" y="224" font-family="monospace" font-size="20" fill="#ee0979" opacity="0.3">8</text>

  <text x="365" y="90" font-family="monospace" font-size="20" fill="#8E54E9" opacity="0.9">π</text>
  <text x="365" y="116" font-family="monospace" font-size="20" fill="#8E54E9" opacity="0.7">7</text>
  <text x="365" y="142" font-family="monospace" font-size="20" fill="#8E54E9" opacity="0.55">0</text>
  <text x="365" y="168" font-family="monospace" font-size="20" fill="#8E54E9" opacity="0.4">e</text>
  <text x="365" y="194" font-family="monospace" font-size="20" fill="#8E54E9" opacity="0.3">4</text>

  <text x="420" y="160" font-family="monospace" font-size="20" fill="#56ab2f" opacity="0.9">2</text>
  <text x="420" y="186" font-family="monospace" font-size="20" fill="#56ab2f" opacity="0.7">8</text>
  <text x="420" y="212" font-family="monospace" font-size="20" fill="#56ab2f" opacity="0.5">5</text>
  <text x="420" y="238" font-family="monospace" font-size="20" fill="#56ab2f" opacity="0.35">÷</text>

  <!-- Central highlighted calculation -->
  <rect x="115" y="310" width="282" height="130" rx="16" fill="#001200" stroke="#00ff88" stroke-width="2"/>
  <rect x="115" y="310" width="282" height="130" rx="16" fill="none" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <!-- Expression display -->
  <text x="145" y="353" font-family="monospace" font-size="22" fill="#ffffff" opacity="0.7">3.14 × 9²</text>
  <rect x="135" y="363" width="220" height="2" fill="#00ff88" opacity="0.5"/>
  <text x="145" y="395" font-family="monospace" font-size="28" fill="#00ff88" filter="url(#glow)" opacity="0.95">= 282.6</text>
  <!-- Cursor -->
  <rect x="347" y="374" width="3" height="26" rx="1" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
</svg>
