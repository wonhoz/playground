<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep purple -->
  <rect width="1024" height="1024" rx="200" fill="#120820"/>
  <!-- Layer 3 (back) -->
  <rect x="220" y="280" width="580" height="380" rx="28" fill="#1E1040" stroke="#6B3FA0" stroke-width="8" opacity="0.7"/>
  <!-- Layer 2 (middle) -->
  <rect x="190" y="240" width="580" height="380" rx="28" fill="#2A1555" stroke="#9B6FD0" stroke-width="8" opacity="0.85"/>
  <!-- Layer 1 (front) -->
  <rect x="160" y="200" width="580" height="380" rx="28" fill="#3A1E70" stroke="#C49EFF" stroke-width="10"/>
  <!-- Terminal lines on front card -->
  <rect x="210" y="270" width="200" height="14" rx="7" fill="#50C8DC" opacity="0.9"/>
  <rect x="210" y="308" width="320" height="14" rx="7" fill="#50C8DC" opacity="0.6"/>
  <rect x="210" y="346" width="260" height="14" rx="7" fill="#50C8DC" opacity="0.6"/>
  <rect x="210" y="384" width="180" height="14" rx="7" fill="#50C8DC" opacity="0.4"/>
  <!-- Launch button on front card -->
  <rect x="490" y="490" width="180" height="56" rx="14" fill="#4CAF50"/>
  <polygon points="534,510 534,548 572,529" fill="white"/>
  <rect x="580" y="516" width="60" height="10" rx="5" fill="white" opacity="0.8"/>
  <rect x="580" y="534" width="40" height="10" rx="5" fill="white" opacity="0.5"/>
</svg>
