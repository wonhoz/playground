<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라이트 옐로우 -->
  <rect width="1024" height="1024" rx="180" fill="#F9FBE7"/>
  <!-- Layer 2: 큰 나무 실루엣 + 계절 (계절 순환) -->
  <!-- 나무 줄기 -->
  <line x1="512" y1="840" x2="512" y2="500" stroke="#5D4037" stroke-width="24" stroke-linecap="round"/>
  <!-- 큰 가지들 -->
  <line x1="512" y1="600" x2="380" y2="500" stroke="#6D4C41" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="570" x2="640" y2="470" stroke="#6D4C41" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="540" x2="440" y2="440" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
  <line x1="512" y1="520" x2="580" y2="420" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
  <!-- 봄/여름 잎 (초록) -->
  <circle cx="350" cy="380" r="100" fill="#4CAF50" opacity="0.9"/>
  <circle cx="440" cy="320" r="110" fill="#66BB6A" opacity="0.9"/>
  <circle cx="512" cy="280" r="130" fill="#43A047" opacity="0.9"/>
  <circle cx="600" cy="310" r="110" fill="#4CAF50" opacity="0.9"/>
  <circle cx="680" cy="360" r="100" fill="#388E3C" opacity="0.9"/>
  <!-- 단풍 잎 (가을색 - 일부) -->
  <circle cx="350" cy="380" r="50" fill="#FF8F00" opacity="0.7"/>
  <circle cx="680" cy="360" r="50" fill="#E64A19" opacity="0.7"/>
  <!-- 꽃 (봄) -->
  <circle cx="430" cy="300" r="16" fill="#FF4081"/>
  <circle cx="512" cy="260" r="14" fill="#FF80AB"/>
  <circle cx="600" cy="290" r="16" fill="#FF4081"/>
  <!-- 땅 -->
  <rect x="120" y="840" width="784" height="120" rx="16" fill="#8D6E63"/>
  <rect x="120" y="840" width="784" height="28" rx="4" fill="#A1887F"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="940" font-family="Arial Black,Arial" font-size="76" font-weight="900" fill="#2E7D32" text-anchor="middle">LEAF.GROW</text>
</svg>
