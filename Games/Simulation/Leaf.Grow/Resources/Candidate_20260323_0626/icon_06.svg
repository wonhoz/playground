<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 씨앗 발아 — 흙 속에서 첫 싹이 올라오는 순간 | 공간/장면 | #0A1000 -->
  <!-- Layer 1: Background (sky gradient feel) -->
  <rect width="1024" height="1024" rx="160" fill="#0A1000"/>
  <!-- Sky area (upper half) -->
  <rect x="0" y="0" width="1024" height="540" rx="0" fill="#0A1A06" opacity="0.5"/>
  <!-- Underground area indicator (darker) -->
  <rect x="0" y="540" width="1024" height="484" rx="0" fill="#0A0A00" opacity="0.4"/>
  <!-- Layer 2: Cross-section view of soil -->
  <!-- Ground surface -->
  <rect x="180" y="520" width="664" height="320" rx="0" fill="#2A1A00"/>
  <rect x="180" y="520" width="664" height="40" rx="0" fill="#3A2808"/>
  <!-- Soil texture: pebble/granule dots -->
  <circle cx="220" cy="540" r="5" fill="#5A4020" opacity="0.7"/>
  <circle cx="270" cy="545" r="4" fill="#4A3010" opacity="0.6"/>
  <circle cx="320" cy="535" r="6" fill="#5A4020" opacity="0.5"/>
  <circle cx="400" cy="542" r="4" fill="#4A3010" opacity="0.7"/>
  <circle cx="460" cy="530" r="5" fill="#6A5030" opacity="0.6"/>
  <circle cx="550" cy="543" r="4" fill="#5A4020" opacity="0.5"/>
  <circle cx="630" cy="536" r="6" fill="#4A3010" opacity="0.7"/>
  <circle cx="700" cy="541" r="5" fill="#5A4020" opacity="0.6"/>
  <circle cx="780" cy="533" r="4" fill="#6A5030" opacity="0.5"/>
  <!-- Underground layers -->
  <rect x="180" y="640" width="664" height="200" rx="0" fill="#1E1200"/>
  <!-- Deeper soil layer -->
  <rect x="180" y="760" width="664" height="80" rx="0" fill="#150E00"/>
  <!-- Seed shell (germinating underground) -->
  <ellipse cx="512" cy="680" rx="38" ry="28" fill="#6A4010" stroke="#8A6030" stroke-width="4"/>
  <!-- Seed crack (germination) -->
  <path d="M 490 672 Q 512 658 534 672" stroke="#2A1800" stroke-width="3" fill="none"/>
  <!-- Root system growing downward -->
  <line x1="512" y1="708" x2="512" y2="780" stroke="#4A3010" stroke-width="4" stroke-linecap="round"/>
  <line x1="512" y1="740" x2="480" y2="775" stroke="#4A3010" stroke-width="3" stroke-linecap="round"/>
  <line x1="512" y1="755" x2="545" y2="790" stroke="#4A3010" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="775" x2="460" y2="800" stroke="#4A3010" stroke-width="2" stroke-linecap="round"/>
  <line x1="545" y1="790" x2="570" y2="810" stroke="#4A3010" stroke-width="2" stroke-linecap="round"/>
  <!-- Hypocotyl (sprout pushing up through soil) -->
  <path d="M 512 652 Q 508 600 512 540" stroke="#4ADE80" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Soil crack where sprout emerges -->
  <line x1="488" y1="522" x2="498" y2="520" stroke="#5A4020" stroke-width="3"/>
  <line x1="530" y1="522" x2="520" y2="520" stroke="#5A4020" stroke-width="3"/>
  <!-- First leaves (cotyledons) unfolding above soil -->
  <path d="M 512 520 Q 480 490 454 480 Q 466 510 512 520 Z" fill="#4ADE80" stroke="#22C55E" stroke-width="2"/>
  <path d="M 512 520 Q 544 490 570 480 Q 558 510 512 520 Z" fill="#22C55E" stroke="#15803D" stroke-width="2"/>
  <!-- Young first true leaf emerging at tip -->
  <path d="M 512 490 Q 504 462 512 448 Q 520 462 512 490 Z" fill="#86EFAC" stroke="#4ADE80" stroke-width="2"/>
  <!-- Sunlight rays (above ground) -->
  <line x1="370" y1="250" x2="400" y2="360" stroke="#FFE040" stroke-width="2" opacity="0.4" stroke-dasharray="10,8"/>
  <line x1="512" y1="220" x2="512" y2="380" stroke="#FFE040" stroke-width="3" opacity="0.4" stroke-dasharray="10,8"/>
  <line x1="650" y1="250" x2="625" y2="360" stroke="#FFE040" stroke-width="2" opacity="0.4" stroke-dasharray="10,8"/>
  <!-- Sun (partial, at top) -->
  <circle cx="512" cy="230" r="56" fill="#FFD700" opacity="0.5"/>
  <!-- Layer 3: Underground / above ground dividing label -->
  <text x="820" y="515" font-family="Arial,sans-serif" font-size="13" fill="#4ADE80" text-anchor="middle" opacity="0.7">지상</text>
  <text x="820" y="555" font-family="Arial,sans-serif" font-size="13" fill="#8A6030" text-anchor="middle" opacity="0.7">지하</text>
  <line x1="800" y1="522" x2="836" y2="522" stroke="#3A2808" stroke-width="2" opacity="0.5"/>
</svg>
