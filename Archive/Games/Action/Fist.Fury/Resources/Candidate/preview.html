<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Fist.Fury — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; padding: 32px; }
  h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
  p  { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }
  .card {
    background: #242424;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #ff6d00; transform: translateY(-3px); }
  .card img { width: 120px; height: 120px; border-radius: 8px; }
  .card .label {
    margin-top: 10px;
    font-size: 12px;
    color: #ffcc80;
    word-break: break-all;
  }
  .card .num {
    font-size: 20px;
    font-weight: 900;
    color: #ff6d00;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>Fist.Fury — Icon Candidates</h1>
<p>격투 액션 게임 / 10개 디자인 후보</p>
<div class="grid">
  <div class="card"><div class="num">01</div><img src="candidate_01_fist_fire.svg" alt="fist_fire"><div class="label">fist_fire</div></div>
  <div class="card"><div class="num">02</div><img src="candidate_02_neon_fighter.svg" alt="neon_fighter"><div class="label">neon_fighter</div></div>
  <div class="card"><div class="num">03</div><img src="candidate_03_pixel_brawl.svg" alt="pixel_brawl"><div class="label">pixel_brawl</div></div>
  <div class="card"><div class="num">04</div><img src="candidate_04_dragon_punch.svg" alt="dragon_punch"><div class="label">dragon_punch</div></div>
  <div class="card"><div class="num">05</div><img src="candidate_05_impact_burst.svg" alt="impact_burst"><div class="label">impact_burst</div></div>
  <div class="card"><div class="num">06</div><img src="candidate_06_dark_combo.svg" alt="dark_combo"><div class="label">dark_combo</div></div>
  <div class="card"><div class="num">07</div><img src="candidate_07_street_sunset.svg" alt="street_sunset"><div class="label">street_sunset</div></div>
  <div class="card"><div class="num">08</div><img src="candidate_08_energy_gloves.svg" alt="energy_gloves"><div class="label">energy_gloves</div></div>
  <div class="card"><div class="num">09</div><img src="candidate_09_retro_arcade.svg" alt="retro_arcade"><div class="label">retro_arcade</div></div>
  <div class="card"><div class="num">10</div><img src="candidate_10_thunder_kick.svg" alt="thunder_kick"><div class="label">thunder_kick</div></div>
</div>
</body>
</html>
