<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F0E6"/>
      <stop offset="100%" stop-color="#EDE0D0"/>
    </linearGradient>
    <radialGradient id="inkDrop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Paper texture lines faint -->
  <g stroke="#D7C9B8" stroke-width="1" opacity="0.6">
    <line x1="68" y1="155" x2="444" y2="155"/>
    <line x1="68" y1="215" x2="444" y2="215"/>
    <line x1="68" y1="275" x2="444" y2="275"/>
    <line x1="68" y1="335" x2="444" y2="335"/>
    <line x1="68" y1="395" x2="444" y2="395"/>
  </g>
  <!-- Ink brush strokes for 'A' (left side) -->
  <path d="M110,380 L158,145 L206,380" stroke="#1A1A1A" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="127" y1="295" x2="189" y2="295" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round"/>
  <!-- Arrow separator -->
  <line x1="235" y1="262" x2="278" y2="262" stroke="#C62828" stroke-width="5" stroke-linecap="round"/>
  <polygon points="278,255 295,262 278,269" fill="#C62828"/>
  <!-- Korean character 가 (right side) - stylized brush strokes -->
  <path d="M330,145 L330,380" stroke="#1A1A1A" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M295,185 L365,185" stroke="#1A1A1A" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M365,185 Q390,210 388,280 Q386,340 370,380" stroke="#1A1A1A" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ink splash dots -->
  <circle cx="115" cy="390" r="5" fill="#1A1A1A" opacity="0.5"/>
  <circle cx="130" cy="400" r="3" fill="#1A1A1A" opacity="0.4"/>
  <circle cx="375" cy="392" r="4" fill="#1A1A1A" opacity="0.4"/>
  <!-- Red seal stamp (hanko style) -->
  <rect x="400" y="75" width="72" height="72" rx="10" fill="#C62828"/>
  <rect x="408" y="83" width="56" height="56" rx="6" fill="none" stroke="#F9F0E6" stroke-width="2"/>
  <text x="436" y="114" text-anchor="middle" font-family="'Malgun Gothic', serif" font-size="22" fill="#F9F0E6">辭</text>
  <text x="436" y="134" text-anchor="middle" font-family="monospace" font-size="10" fill="#F9F0E6">Dict</text>
</svg>
