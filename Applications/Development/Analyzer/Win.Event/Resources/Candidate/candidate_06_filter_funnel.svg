<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11998E"/>
      <stop offset="100%" stop-color="#38EF7D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Input log lines -->
  <rect x="56" y="80" width="400" height="14" rx="4" fill="#E74C3C" opacity="0.7"/>
  <rect x="56" y="104" width="350" height="14" rx="4" fill="#F39C12" opacity="0.7"/>
  <rect x="56" y="128" width="380" height="14" rx="4" fill="#3498DB" opacity="0.7"/>
  <rect x="56" y="152" width="320" height="14" rx="4" fill="#2ECC71" opacity="0.7"/>
  <rect x="56" y="176" width="360" height="14" rx="4" fill="#9B59B6" opacity="0.7"/>
  <rect x="56" y="200" width="390" height="14" rx="4" fill="#E74C3C" opacity="0.7"/>
  <!-- Funnel shape -->
  <polygon points="80,228 432,228 330,330 330,430 182,430 182,330" fill="url(#funnel)" opacity="0.85"/>
  <line x1="182" y1="330" x2="80" y2="228" stroke="url(#funnel)" stroke-width="3" opacity="0.4"/>
  <line x1="330" y1="330" x2="432" y2="228" stroke="url(#funnel)" stroke-width="3" opacity="0.4"/>
  <!-- Filtered output -->
  <rect x="182" y="438" width="148" height="14" rx="4" fill="#E74C3C" opacity="0.9"/>
  <rect x="182" y="458" width="148" height="14" rx="4" fill="#F39C12" opacity="0.9"/>
  <!-- Filter labels inside funnel -->
  <text x="256" y="295" text-anchor="middle" font-family="Segoe UI" font-size="22" font-weight="700" fill="#FFF">FILTER</text>
  <text x="256" y="320" text-anchor="middle" font-family="Segoe UI" font-size="16" fill="#FFF" opacity="0.7">ERR + WARN</text>
  <!-- Title -->
  <text x="256" y="500" text-anchor="middle" font-family="Segoe UI" font-size="20" fill="#38EF7D" opacity="0.7">EVENT FILTER</text>
</svg>
