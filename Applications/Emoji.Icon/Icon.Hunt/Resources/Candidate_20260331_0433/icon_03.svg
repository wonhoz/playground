<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 핑크 파스텔 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>
  <!-- Layer 2: SVG 파일 카드 (뒤) -->
  <rect x="180" y="240" width="480" height="580" rx="36" fill="#F48FB1"/>
  <rect x="220" y="280" width="480" height="580" rx="36" fill="#EC407A"/>
  <!-- 파일 상단 접힘 -->
  <polygon points="640,280 700,280 700,340" fill="#C2185B"/>
  <line x1="640" y1="280" x2="640" y2="340" stroke="#C2185B" stroke-width="6"/>
  <!-- SVG 텍스트 -->
  <text x="460" y="500" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="100" fill="white" text-anchor="middle">SVG</text>
  <!-- 파일 하단 정보 줄들 -->
  <rect x="280" y="580" width="280" height="24" rx="12" fill="white" opacity="0.5"/>
  <rect x="280" y="624" width="200" height="24" rx="12" fill="white" opacity="0.3"/>
  <!-- Layer 3: 즐겨찾기 별 -->
  <polygon points="800,200 826,280 912,280 846,328 870,408 800,360 730,408 754,328 688,280 774,280"
           fill="#FFD600" stroke="#FF8F00" stroke-width="8"/>
</svg>
