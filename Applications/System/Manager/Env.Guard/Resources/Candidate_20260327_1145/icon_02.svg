<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Lock body -->
  <rect x="312" y="440" width="400" height="360" rx="40" fill="#D97706"/>
  <rect x="332" y="460" width="360" height="320" rx="32" fill="#F59E0B"/>
  <!-- Lock shackle -->
  <path d="M380,460 L380,320 Q380,180 512,180 Q644,180 644,320 L644,460" fill="none" stroke="#D97706" stroke-width="64" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="512" cy="600" r="60" fill="#D97706"/>
  <rect x="490" y="600" width="44" height="80" rx="8" fill="#D97706"/>
  <!-- ENV label -->
  <text x="512" y="870" font-family="Arial,sans-serif" font-size="68" fill="#B45309" font-weight="bold" text-anchor="middle">ENV</text>
  <!-- Variable symbols -->
  <text x="230" y="350" font-family="Consolas,monospace" font-size="72" fill="#F59E0B" opacity="0.5">%</text>
  <text x="730" y="380" font-family="Consolas,monospace" font-size="72" fill="#F59E0B" opacity="0.5">%</text>
</svg>
