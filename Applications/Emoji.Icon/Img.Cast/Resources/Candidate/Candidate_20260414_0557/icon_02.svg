<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- White main card -->
  <rect x="70" y="130" width="884" height="640" rx="32" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>

  <!-- Row 1 format badges -->
  <!-- SVG badge -->
  <rect x="110" y="170" width="200" height="100" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="210" y="237" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">SVG</text>

  <!-- PNG badge -->
  <rect x="330" y="170" width="200" height="100" rx="28" fill="#FF6B9D" stroke="#880E4F" stroke-width="14"/>
  <text x="430" y="237" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PNG</text>

  <!-- JPG badge -->
  <rect x="550" y="170" width="200" height="100" rx="28" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <text x="650" y="237" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">JPG</text>

  <!-- BMP badge -->
  <rect x="770" y="170" width="174" height="100" rx="28" fill="#FF6B9D" stroke="#880E4F" stroke-width="14"/>
  <text x="857" y="237" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">BMP</text>

  <!-- Arrow row -->
  <!-- Down arrows between rows -->
  <rect x="190" y="305" width="20" height="60" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <polygon points="170,365 200,410 230,365" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <rect x="410" y="305" width="20" height="60" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <polygon points="390,365 420,410 450,365" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <rect x="630" y="305" width="20" height="60" rx="8" fill="#E91E63" stroke="#880E4F" stroke-width="6"/>
  <polygon points="610,365 640,410 670,365" fill="#E91E63" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>
  <rect x="844" y="305" width="20" height="60" rx="8" fill="#FF6B9D" stroke="#880E4F" stroke-width="6"/>
  <polygon points="824,365 854,410 884,365" fill="#FF6B9D" stroke="#880E4F" stroke-width="6" stroke-linejoin="round"/>

  <!-- Row 2: output badges -->
  <rect x="110" y="420" width="200" height="100" rx="28" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="210" y="487" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">ICO</text>

  <rect x="330" y="420" width="200" height="100" rx="28" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="430" y="487" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">PNG</text>

  <rect x="550" y="420" width="200" height="100" rx="28" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="650" y="487" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">WEBP</text>

  <rect x="770" y="420" width="174" height="100" rx="28" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="857" y="487" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">SVG</text>

  <!-- CAST badge center bottom of card -->
  <rect x="287" y="565" width="450" height="155" rx="36" fill="#E91E63" stroke="#880E4F" stroke-width="16"/>
  <text x="512" y="666" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">CAST</text>

  <!-- Title badge bottom -->
  <rect x="212" y="810" width="600" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="874" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" text-anchor="middle">IMG.CAST</text>
</svg>
