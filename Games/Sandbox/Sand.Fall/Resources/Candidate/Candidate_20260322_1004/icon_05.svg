<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_05 | hybrid | 원소 단면 큐브 -->
  <!-- 컨셉: 각 면에 다른 물질이 픽셀아트로 새겨진 등축투영(isometric) 큐브 -->
  <!-- 윗면=모래, 좌면=물, 우면=불/나무 — 하나의 샌드박스 세계를 큐브 단면으로 표현 -->

  <!-- 배경: 따뜻한 크림색 → 중앙 아이보리 -->
  <rect x="80" y="80" width="864" height="864" rx="160" fill="#FFF8E7"/>
  <defs>
    <radialGradient id="topGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFBF2"/>
      <stop offset="100%" stop-color="#F5E8C0"/>
    </radialGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="80" y="80" width="864" height="864" rx="160" fill="url(#topGrad)"/>

