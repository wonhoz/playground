<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg10bs" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: dark navy -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg10bs)"/>

  <!-- Center glow burst -->
  <circle cx="512" cy="480" r="300" fill="url(#starGlow)"/>

  <!-- Pixel grid (before) - corners -->
  <!-- Top-left pixels -->
  <rect x="130" y="160" width="200" height="200" rx="10" fill="#1E3A5F" opacity="0.8"/>
  <rect x="142" y="172" width="44" height="44" fill="#374151"/>
  <rect x="186" y="172" width="44" height="44" fill="#4B5563"/>
  <rect x="230" y="172" width="44" height="44" fill="#374151"/>
