  <circle cx="898" cy="476" r="6" fill="#22C55E"/>
  <circle cx="898" cy="516" r="6" fill="#F59E0B"/>
  <!-- 서버 라벨 -->
  <text x="824" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#60A5FA" text-anchor="middle" dominant-baseline="middle">Server</text>

  <!-- 화살표: 응답 수신 (아래로) -->
  <path d="M724,560 Q512,720 300,560" stroke="#22C55E" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="14,6"/>
  <polyline points="324,540 300,562 324,580" stroke="#22C55E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
