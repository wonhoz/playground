<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000A14"/>
  <!-- 태양 향해 상승: 태양 + 상승 화살표 -->
  <!-- 태양 광선 -->
  <g opacity="0.5">
    <line x1="512" y1="200" x2="512" y2="140" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="600" y1="224" x2="632" y2="180" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="660" y1="290" x2="710" y2="260" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="420" y1="224" x2="388" y2="180" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="360" y1="290" x2="310" y2="260" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="340" y1="370" x2="280" y2="360" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
    <line x1="680" y1="370" x2="740" y2="360" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- 태양 원 -->
  <circle cx="512" cy="310" r="100" fill="#0288D1" opacity="0.85"/>
  <circle cx="512" cy="310" r="72" fill="#4FC3F7"/>
  <!-- 상승 경로 (점선) -->
  <path d="M512,750 Q420,620 512,480" stroke="#4FC3F7" stroke-width="8" fill="none" stroke-dasharray="20,14" opacity="0.6"/>
  <!-- 비행기 상승 -->
  <g transform="translate(512,500) rotate(-60)">
    <ellipse cx="0" cy="0" rx="80" ry="22" fill="#0288D1"/>
    <polygon points="18,0 -22,-60 -56,-8 -22,8" fill="#4FC3F7"/>
    <polygon points="-48,-6 -60,-34 -78,-6" fill="#4FC3F7"/>
  </g>
</svg>
