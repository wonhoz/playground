<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2DD4BF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="xrayglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 두 이미지 프레임 -->
  <rect x="60" y="90" width="170" height="170" rx="8" fill="#060c10" stroke="#1a3a30" stroke-width="1.5" opacity="0.9"/>
  <rect x="282" y="90" width="170" height="170" rx="8" fill="#060c10" stroke="#1a3a30" stroke-width="1.5" opacity="0.9"/>
  <!-- 좌측 이미지 내용 (원본) -->
  <rect x="75" y="105" width="140" height="140" rx="5" fill="#080e14"/>
  <ellipse cx="145" cy="145" rx="35" ry="35" fill="#1a2a20" stroke="#2DD4BF" stroke-width="1" opacity="0.7"/>
  <ellipse cx="145" cy="145" rx="20" ry="20" fill="#2a3a2a" opacity="0.8"/>
  <rect x="95" y="190" width="100" height="40" rx="3" fill="#0d1a14" opacity="0.9"/>
  <line x1="95" y1="200" x2="195" y2="200" stroke="#2DD4BF" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="210" x2="175" y2="210" stroke="#2DD4BF" stroke-width="1" opacity="0.3"/>
  <line x1="95" y1="220" x2="185" y2="220" stroke="#2DD4BF" stroke-width="1" opacity="0.3"/>
  <!-- 우측 이미지 내용 (비교) -->
  <rect x="297" y="105" width="140" height="140" rx="5" fill="#080e14"/>
  <ellipse cx="367" cy="145" rx="35" ry="38" fill="#1a2a20" stroke="#F43F5E" stroke-width="1" opacity="0.7"/>
  <ellipse cx="367" cy="145" rx="20" ry="22" fill="#2a3a2a" opacity="0.8"/>
  <rect x="317" y="190" width="100" height="40" rx="3" fill="#0d1a14" opacity="0.9"/>
  <line x1="317" y1="200" x2="417" y2="200" stroke="#F43F5E" stroke-width="1" opacity="0.4"/>
  <line x1="317" y1="210" x2="397" y2="210" stroke="#F43F5E" stroke-width="1" opacity="0.3"/>
  <line x1="317" y1="220" x2="407" y2="220" stroke="#F43F5E" stroke-width="1" opacity="0.3"/>
  <!-- X선 스캔 라인 -->
  <rect x="60" y="155" width="170" height="50" fill="url(#scanline)" opacity="0.7" filter="url(#xrayglow)"/>
  <rect x="282" y="155" width="170" height="50" fill="url(#scanline)" opacity="0.7" filter="url(#xrayglow)"/>
  <line x1="60" y1="180" x2="230" y2="180" stroke="#2DD4BF" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <line x1="282" y1="180" x2="452" y2="180" stroke="#2DD4BF" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <!-- 중앙 연결 -->
  <path d="M234 175 L278 175" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="4,4" opacity="0.7"/>
  <circle cx="256" cy="175" r="6" fill="#2DD4BF" filter="url(#glow)" opacity="0.9"/>
  <!-- 차이 분석 패널 -->
  <rect x="80" y="290" width="352" height="160" rx="10" fill="#060c10" stroke="#2DD4BF" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="316" text-anchor="middle" font-size="13" fill="#2DD4BF" font-weight="bold" opacity="0.9">DIFFERENCE ANALYSIS</text>
  <!-- 차이 바 차트 -->
  <rect x="100" y="330" width="312" height="8" rx="3" fill="#1a3a30" opacity="0.6"/>
  <rect x="100" y="330" width="85" height="8" rx="3" fill="#2DD4BF" filter="url(#xrayglow)" opacity="0.9"/>
  <text x="100" y="353" font-size="10" fill="#888" opacity="0.8">Brightness</text>
  <text x="400" y="353" text-anchor="end" font-size="10" fill="#2DD4BF" opacity="0.8">27%</text>
  <rect x="100" y="362" width="312" height="8" rx="3" fill="#1a3a30" opacity="0.6"/>
  <rect x="100" y="362" width="45" height="8" rx="3" fill="#F43F5E" filter="url(#xrayglow)" opacity="0.9"/>
  <text x="100" y="385" font-size="10" fill="#888" opacity="0.8">Structure</text>
  <text x="400" y="385" text-anchor="end" font-size="10" fill="#F43F5E" opacity="0.8">14%</text>
  <rect x="100" y="394" width="312" height="8" rx="3" fill="#1a3a30" opacity="0.6"/>
  <rect x="100" y="394" width="120" height="8" rx="3" fill="#FDE047" filter="url(#xrayglow)" opacity="0.9"/>
  <text x="100" y="417" font-size="10" fill="#888" opacity="0.8">Color</text>
  <text x="400" y="417" text-anchor="end" font-size="10" fill="#FDE047" opacity="0.8">38%</text>
  <!-- X-RAY 라벨 -->
  <text x="60" y="80" font-size="11" fill="#2DD4BF" opacity="0.5" font-weight="bold" letter-spacing="3">X-RAY COMPARE</text>
</svg>
