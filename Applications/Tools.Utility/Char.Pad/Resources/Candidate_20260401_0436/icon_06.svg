<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <linearGradient id="box6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg6)"/>
  <!-- Layer 2: Open box -->
  <!-- Box body -->
  <rect x="232" y="540" width="560" height="340" rx="20" fill="#F57F17"/>
  <rect x="240" y="548" width="544" height="324" rx="16" fill="url(#box6)"/>
  <!-- Box shadow inner -->
  <rect x="256" y="560" width="512" height="40" rx="8" fill="#FF8F00" opacity="0.3"/>
  <!-- Box lid (open, tilted) -->
  <rect x="200" y="440" width="570" height="130" rx="20" fill="#FF8F00" transform="rotate(-18 485 505)"/>
  <rect x="210" y="450" width="550" height="110" rx="16" fill="#FFCA28" transform="rotate(-18 485 505)"/>
  <!-- Layer 3: Characters flying out -->
  <!-- © -->
  <circle cx="340" cy="380" r="70" fill="#E53935" opacity="0.95"/>
  <text x="340" y="380" text-anchor="middle" dominant-baseline="middle" font-size="88" font-family="Segoe UI,Arial,sans-serif" fill="white">©</text>
  <!-- → -->
  <circle cx="512" cy="280" r="62" fill="#7B1FA2" opacity="0.95"/>
  <text x="512" y="280" text-anchor="middle" dominant-baseline="middle" font-size="80" font-family="Segoe UI,Arial,sans-serif" fill="white">→</text>
  <!-- ★ -->
  <circle cx="690" cy="350" r="68" fill="#2E7D32" opacity="0.95"/>
  <text x="690" y="350" text-anchor="middle" dominant-baseline="middle" font-size="86" font-family="Segoe UI,Arial,sans-serif" fill="white">★</text>
  <!-- ∞ small -->
  <circle cx="270" cy="210" r="50" fill="#00897B" opacity="0.85"/>
  <text x="270" y="210" text-anchor="middle" dominant-baseline="middle" font-size="64" font-family="Segoe UI,Arial,sans-serif" fill="white">∞</text>
  <!-- ² small -->
  <circle cx="760" cy="210" r="46" fill="#F57C00" opacity="0.85"/>
  <text x="760" y="210" text-anchor="middle" dominant-baseline="middle" font-size="62" font-family="Segoe UI,Arial,sans-serif" fill="white">²</text>
  <!-- Motion lines -->
  <line x1="340" y1="450" x2="320" y2="560" stroke="#FF9800" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="342" x2="512" y2="560" stroke="#AB47BC" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="690" y1="418" x2="710" y2="560" stroke="#66BB6A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
</svg>
