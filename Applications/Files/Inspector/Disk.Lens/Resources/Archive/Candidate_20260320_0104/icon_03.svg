<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: 트리맵 폴더 (treemap rectangles) -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#001A00"/>
  <!-- 트리맵 큰 블록 (좌상) -->
  <rect x="180" y="180" width="360" height="300" rx="16" fill="#2E7D32"/>
  <!-- 트리맵 중간 블록 (우상) -->
  <rect x="560" y="180" width="284" height="300" rx="16" fill="#81C784" opacity="0.8"/>
  <!-- 트리맵 작은 블록들 (하단) -->
  <rect x="180" y="500" width="200" height="344" rx="16" fill="#81C784" opacity="0.6"/>
  <rect x="400" y="500" width="180" height="200" rx="16" fill="#2E7D32" opacity="0.7"/>
  <rect x="600" y="500" width="244" height="200" rx="16" fill="#81C784" opacity="0.5"/>
  <rect x="400" y="720" width="444" height="124" rx="16" fill="#2E7D32" opacity="0.4"/>
  <!-- 폴더 아이콘 내부 표시 -->
  <circle cx="360" cy="330" r="22" fill="#81C784" opacity="0.7"/>
  <circle cx="702" cy="330" r="16" fill="#2E7D32" opacity="0.7"/>
  <circle cx="280" cy="672" r="16" fill="#2E7D32" opacity="0.7"/>
</svg>
