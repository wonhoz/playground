<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 파랑 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 동일 파일 2개 나란히 -->
  <!-- 파일 카드 1 (왼쪽) -->
  <rect x="100" y="200" width="340" height="460" rx="28" fill="#1565C0"/>
  <polygon points="360,200 440,200 440,280" fill="#0D47A1"/>
  <line x1="360" y1="200" x2="360" y2="280" stroke="#0D47A1" stroke-width="6"/>
  <text x="270" y="420" font-family="'Segoe UI', sans-serif" font-size="52" fill="#90CAF9" text-anchor="middle">📄</text>
  <text x="270" y="510" font-family="'Consolas', monospace" font-size="40" fill="#BBDEFB" text-anchor="middle">photo.jpg</text>
  <text x="270" y="566" font-family="'Consolas', monospace" font-size="36" fill="#64B5F6" text-anchor="middle">4.2 MB</text>
  <!-- 등호 (=) 표시 -->
  <rect x="450" y="440" width="124" height="24" rx="8" fill="#FF6F00"/>
  <rect x="450" y="490" width="124" height="24" rx="8" fill="#FF6F00"/>
  <!-- 파일 카드 2 (오른쪽, 살짝 오프셋) -->
  <rect x="584" y="200" width="340" height="460" rx="28" fill="#1565C0"/>
  <polygon points="844,200 924,200 924,280" fill="#0D47A1"/>
  <line x1="844" y1="200" x2="844" y2="280" stroke="#0D47A1" stroke-width="6"/>
  <text x="754" y="420" font-family="'Segoe UI', sans-serif" font-size="52" fill="#90CAF9" text-anchor="middle">📄</text>
  <text x="754" y="510" font-family="'Consolas', monospace" font-size="40" fill="#BBDEFB" text-anchor="middle">photo.jpg</text>
  <text x="754" y="566" font-family="'Consolas', monospace" font-size="36" fill="#64B5F6" text-anchor="middle">4.2 MB</text>
  <!-- Layer 3: 중복 배지 -->
  <rect x="280" y="720" width="464" height="100" rx="24" fill="#FF6F00"/>
  <text x="512" y="784" font-family="'Segoe UI', sans-serif" font-weight="700" font-size="64" fill="white" text-anchor="middle">DUPLICATE</text>
</svg>
