<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="flaskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#0D9488"/>
  <!-- Glow behind flask -->
  <ellipse cx="512" cy="560" rx="280" ry="250" fill="url(#flaskGlow)"/>
  <!-- Layer 2: Flask body -->
  <!-- Flask neck -->
  <rect x="452" y="230" width="120" height="130" rx="12" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="12"/>
  <!-- Flask round body -->
  <ellipse cx="512" cy="630" rx="220" ry="210" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.85)" stroke-width="14"/>
  <!-- Liquid inside -->
  <ellipse cx="512" cy="710" rx="190" ry="120" fill="url(#liquidGrad)"/>
  <!-- Flask stopper -->
  <rect x="440" y="215" width="144" height="30" rx="8" fill="rgba(255,255,255,0.9)"/>
  <!-- Layer 3: Bubbles and sparkle -->
  <circle cx="450" cy="650" r="22" fill="#A78BFA" opacity="0.7"/>
  <circle cx="540" cy="590" r="16" fill="#60A5FA" opacity="0.65"/>
  <circle cx="590" cy="670" r="18" fill="#818CF8" opacity="0.7"/>
  <circle cx="475" cy="710" r="12" fill="#C4B5FD" opacity="0.55"/>
  <!-- Stars above flask -->
  <polygon points="512,165 520,188 545,188 525,203 532,226 512,212 492,226 499,203 479,188 504,188" fill="#FDE047" opacity="0.95"/>
  <polygon points="440,185 447,205 468,205 452,217 458,237 440,226 422,237 428,217 412,205 433,205" fill="#FDE047" opacity="0.6"/>
  <polygon points="584,185 591,205 612,205 596,217 602,237 584,226 566,237 572,217 556,205 577,205" fill="#FDE047" opacity="0.6"/>
</svg>