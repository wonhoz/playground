<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#4361EE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Minimal server layers -->
  <rect x="106" y="140" width="300" height="52" rx="12" fill="#1E1E1E" stroke="#333" stroke-width="2"/>
  <rect x="106" y="206" width="300" height="52" rx="12" fill="#1E1E1E" stroke="#333" stroke-width="2"/>
  <rect x="106" y="272" width="300" height="52" rx="12" fill="#1E1E1E" stroke="#333" stroke-width="2"/>
  <!-- Accent bars -->
  <rect x="106" y="140" width="6" height="52" rx="3" fill="url(#bar)"/>
  <rect x="106" y="206" width="6" height="52" rx="3" fill="url(#bar)"/>
  <rect x="106" y="272" width="6" height="52" rx="3" fill="url(#bar)"/>
  <!-- Labels -->
  <text x="128" y="172" font-family="monospace" font-size="16" fill="#888">Route 1</text>
  <text x="128" y="238" font-family="monospace" font-size="16" fill="#888">Route 2</text>
  <text x="128" y="304" font-family="monospace" font-size="16" fill="#888">Route 3</text>
  <!-- Status -->
  <circle cx="366" cy="166" r="8" fill="#4CC9F0"/>
  <circle cx="366" cy="232" r="8" fill="#4CC9F0"/>
  <circle cx="366" cy="298" r="8" fill="#4CC9F0"/>
  <!-- Title -->
  <text x="256" y="90" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#4CC9F0" letter-spacing="4">MOCK SERVER</text>
  <!-- Bottom divider -->
  <line x1="106" y1="360" x2="406" y2="360" stroke="#333" stroke-width="2"/>
  <text x="256" y="395" text-anchor="middle" font-family="monospace" font-size="14" fill="#4361EE">http://localhost</text>
</svg>