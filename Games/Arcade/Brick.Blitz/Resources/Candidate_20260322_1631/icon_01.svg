    <!-- Ball trajectory (dotted trail going up to the brick gap) -->
    <line x1="512" y1="860" x2="430" y2="380" stroke="white" stroke-width="5" stroke-dasharray="12,18" stroke-linecap="round" opacity="0.4"/>

    <!-- Ball -->
    <circle cx="480" cy="590" r="42" fill="url(#ballGlow01)"/>
    <ellipse cx="468" cy="578" rx="16" ry="11" fill="white" opacity="0.55"/>

    <!-- Layer 3: Paddle (bottom) -->
    <rect x="312" y="880" width="400" height="50" rx="25" fill="#5AC8FA"/>
    <rect x="312" y="880" width="400" height="20" rx="20" fill="white" opacity="0.2"/>
    <!-- Paddle reflection -->
    <rect x="340" y="895" width="340" height="8" rx="4" fill="white" opacity="0.12"/>
