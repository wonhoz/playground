    <rect x="80" y="716" width="864" height="128" rx="12" fill="#181420"/>
    <rect x="80" y="716" width="864" height="128" rx="12" fill="none" stroke="#333" stroke-width="2"/>

    <!-- Row 1: Sand, Water, Fire, Oil, Steam, Stone -->
    <!-- Sand (active) -->
    <rect x="96" y="728" width="130" height="50" rx="10" fill="#332200"/>
    <rect x="96" y="728" width="130" height="50" rx="10" fill="none" stroke="#ECC040" stroke-width="3"/>
    <text x="161" y="759" font-family="'Segoe UI',Arial" font-size="28" font-weight="700" fill="#ECC040" text-anchor="middle">🟡 모래</text>

    <rect x="238" y="728" width="130" height="50" rx="10" fill="#181828"/>
    <text x="303" y="759" font-family="'Segoe UI',Arial" font-size="28" fill="#4488EE" text-anchor="middle">💧 물</text>

    <rect x="380" y="728" width="130" height="50" rx="10" fill="#181828"/>
    <text x="445" y="759" font-family="'Segoe UI',Arial" font-size="28" fill="#FF6A00" text-anchor="middle">🔥 불</text>

    <rect x="522" y="728" width="130" height="50" rx="10" fill="#181828"/>
    <text x="587" y="759" font-family="'Segoe UI',Arial" font-size="28" fill="#8B5020" text-anchor="middle">🟤 기름</text>

    <rect x="664" y="728" width="130" height="50" rx="10" fill="#181828"/>
    <text x="729" y="759" font-family="'Segoe UI',Arial" font-size="28" fill="#AADDFF" text-anchor="middle">💨 증기</text>

    <rect x="806" y="728" width="128" height="50" rx="10" fill="#181828"/>
    <text x="870" y="759" font-family="'Segoe UI',Arial" font-size="28" fill="#888" text-anchor="middle">🪨 돌</text>

    <!-- Row 2: Wood, Ice, Seed, Plant, Acid, Ash -->
    <rect x="96" y="784" width="130" height="50" rx="10" fill="#181828"/>
    <text x="161" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#8B4010" text-anchor="middle">🪵 나무</text>

    <rect x="238" y="784" width="130" height="50" rx="10" fill="#181828"/>
    <text x="303" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#88DDFF" text-anchor="middle">🧊 얼음</text>

    <rect x="380" y="784" width="130" height="50" rx="10" fill="#181828"/>
    <text x="445" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#A8D860" text-anchor="middle">🌱 씨앗</text>

    <rect x="522" y="784" width="130" height="50" rx="10" fill="#181828"/>
    <text x="587" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#3A9030" text-anchor="middle">🌿 식물</text>

    <rect x="664" y="784" width="130" height="50" rx="10" fill="#181828"/>
    <text x="729" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#AAFF44" text-anchor="middle">🧪 산</text>

    <rect x="806" y="784" width="128" height="50" rx="10" fill="#181828"/>
    <text x="870" y="815" font-family="'Segoe UI',Arial" font-size="28" fill="#666" text-anchor="middle">⬛ 재</text>
