  <!-- Layer 3: 대각 소형 노드들 -->
  <circle cx="270" cy="270" r="48" fill="#F57C00"/>
  <text x="270" y="289" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="36" fill="white" text-anchor="middle">BMP</text>
