<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- Dot-dash trail path -->
  <circle cx="180" cy="512" r="40" fill="#F57F17"/>
  <rect x="260" y="476" width="140" height="72" rx="36" fill="#F57F17"/>
  <circle cx="450" cy="512" r="40" fill="#FFD54F"/>
  <rect x="530" y="476" width="200" height="72" rx="36" fill="#FFD54F"/>
  <circle cx="785" cy="512" r="40" fill="#F57F17"/>
  <!-- Ground line -->
  <line x1="180" y1="640" x2="844" y2="640" stroke="#F57F17" stroke-width="12" stroke-opacity="0.4"/>
  <!-- Dots falling as footsteps -->
  <circle cx="250" cy="670" r="16" fill="#F57F17" fill-opacity="0.7"/>
  <circle cx="380" cy="670" r="16" fill="#F57F17" fill-opacity="0.7"/>
  <circle cx="510" cy="670" r="16" fill="#FFD54F" fill-opacity="0.7"/>
  <circle cx="640" cy="670" r="16" fill="#FFD54F" fill-opacity="0.7"/>
  <circle cx="770" cy="670" r="16" fill="#F57F17" fill-opacity="0.7"/>
  <!-- Fading trail -->
  <circle cx="150" cy="740" r="10" fill="#F57F17" fill-opacity="0.4"/>
  <circle cx="200" cy="750" r="7" fill="#F57F17" fill-opacity="0.25"/>
</svg>