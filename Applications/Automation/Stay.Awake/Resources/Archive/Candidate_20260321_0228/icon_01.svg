<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep forest green -->
  <rect width="1024" height="1024" rx="200" fill="#071A0E"/>
  <!-- Eyelid outer glow -->
  <path d="M120 512 Q512 140 904 512 Q512 884 120 512 Z" fill="#0D3020" stroke="#1B6B3A" stroke-width="14"/>
  <!-- Iris large -->
  <circle cx="512" cy="512" r="210" fill="#145C2A" stroke="#2ECC71" stroke-width="22"/>
  <!-- Iris inner ring -->
  <circle cx="512" cy="512" r="140" fill="#0F3D1E" stroke="#27AE60" stroke-width="12"/>
  <!-- Pupil -->
  <circle cx="512" cy="512" r="78" fill="#040E08"/>
  <!-- Reflection highlight 1 -->
  <ellipse cx="458" cy="455" rx="44" ry="30" fill="#69F0AE" opacity="0.55" transform="rotate(-20 458 455)"/>
  <!-- Reflection highlight 2 small -->
  <circle cx="560" cy="480" r="14" fill="#B9F6CA" opacity="0.35"/>
  <!-- Active lime dot top-right -->
  <circle cx="790" cy="240" r="76" fill="#00E676" stroke="#B9F6CA" stroke-width="16"/>
  <circle cx="790" cy="240" r="34" fill="#CCFF90"/>
</svg>
