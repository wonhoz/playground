<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neon.Slice - Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { color: #e0e0e0; text-align: center; margin-bottom: 8px; font-size: 24px; letter-spacing: 2px; }
  p.sub { color: #888; text-align: center; margin-bottom: 32px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
  .card:hover { transform: scale(1.07); border-color: #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.2); }
  .card img { width: 160px; height: 160px; border-radius: 8px; }
  .card span { color: #aaa; font-size: 11px; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
<h1>Neon.Slice</h1>
<p class="sub">Neon Slicing Arcade Game — Icon Candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_neon_sword_slice.svg"><span>01. Neon Sword Slice</span></div>
  <div class="card"><img src="candidate_02_laser_slice_art.svg"><span>02. Laser Slice Art</span></div>
  <div class="card"><img src="candidate_03_cut_neon_blade.svg"><span>03. Cut Neon Blade</span></div>
  <div class="card"><img src="candidate_04_slice_glow_effect.svg"><span>04. Slice Glow Effect</span></div>
  <div class="card"><img src="candidate_05_neon_katana_cut.svg"><span>05. Neon Katana Cut</span></div>
  <div class="card"><img src="candidate_06_laser_cut_neon.svg"><span>06. Laser Cut Neon</span></div>
  <div class="card"><img src="candidate_07_slice_effect_art.svg"><span>07. Slice Effect Art</span></div>
  <div class="card"><img src="candidate_08_neon_blade_slice.svg"><span>08. Neon Blade Slice</span></div>
  <div class="card"><img src="candidate_09_cut_glow_trail.svg"><span>09. Cut Glow Trail</span></div>
  <div class="card"><img src="candidate_10_light_saber_slice.svg"><span>10. Light Saber Slice</span></div>
</div>
</body>
</html>
