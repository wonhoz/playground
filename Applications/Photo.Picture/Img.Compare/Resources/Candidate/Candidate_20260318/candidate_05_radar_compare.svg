<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <radialGradient id="radar1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="radar2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 레이더 동심원 -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="#1a3a30" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="240" r="120" fill="none" stroke="#1a3a30" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="240" r="80" fill="none" stroke="#1a3a30" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="240" r="40" fill="none" stroke="#1a3a30" stroke-width="1" opacity="0.6"/>
  <!-- 레이더 축선 (6축) -->
  <line x1="256" y1="80" x2="256" y2="400" stroke="#1a3a30" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="160" x2="416" y2="320" stroke="#1a3a30" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="320" x2="416" y2="160" stroke="#1a3a30" stroke-width="1" opacity="0.5"/>
  <!-- 이미지A 폴리곤 -->
  <polygon points="256,110 380,180 370,330 256,380 142,310 155,175" fill="url(#radar1)" stroke="#2DD4BF" stroke-width="2.5" filter="url(#glow)" opacity="0.85"/>
  <!-- 이미지B 폴리곤 (다름) -->
  <polygon points="256,130 365,195 355,315 256,365 160,300 168,192" fill="url(#radar2)" stroke="#F43F5E" stroke-width="2" stroke-dasharray="8,4" filter="url(#glow)" opacity="0.7"/>
  <!-- 중앙 포인트 -->
  <circle cx="256" cy="240" r="8" fill="#2DD4BF" filter="url(#glow)" opacity="0.9"/>
  <!-- 축 라벨 -->
  <text x="256" y="72" text-anchor="middle" font-size="11" fill="#2DD4BF" opacity="0.7">Brightness</text>
  <text x="430" y="155" font-size="11" fill="#2DD4BF" opacity="0.7">Contrast</text>
  <text x="430" y="330" font-size="11" fill="#2DD4BF" opacity="0.7">Saturation</text>
  <text x="240" y="415" font-size="11" fill="#2DD4BF" opacity="0.7">Sharpness</text>
  <text x="60" y="330" font-size="11" fill="#2DD4BF" opacity="0.7">Noise</text>
  <text x="60" y="155" font-size="11" fill="#2DD4BF" opacity="0.7">Color</text>
  <!-- 범례 -->
  <line x1="150" y1="455" x2="175" y2="455" stroke="#2DD4BF" stroke-width="2.5" opacity="0.9"/>
  <text x="180" y="459" font-size="11" fill="#2DD4BF" opacity="0.8">Image A</text>
  <line x1="260" y1="455" x2="285" y2="455" stroke="#F43F5E" stroke-width="2" stroke-dasharray="6,3" opacity="0.9"/>
  <text x="290" y="459" font-size="11" fill="#F43F5E" opacity="0.8">Image B</text>
</svg>
