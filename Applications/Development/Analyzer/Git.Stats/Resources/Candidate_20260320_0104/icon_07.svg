<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0A00"/>
  <!-- Growing line chart -->
  <!-- Axes -->
  <line x1="160" y1="820" x2="864" y2="820" stroke="#F9A825" stroke-width="12" stroke-linecap="round"/>
  <line x1="160" y1="820" x2="160" y2="180" stroke="#F9A825" stroke-width="12" stroke-linecap="round"/>
  <!-- Grid lines -->
  <line x1="160" y1="640" x2="864" y2="640" stroke="#F9A825" stroke-width="4" opacity="0.2"/>
  <line x1="160" y1="460" x2="864" y2="460" stroke="#F9A825" stroke-width="4" opacity="0.2"/>
  <line x1="160" y1="280" x2="864" y2="280" stroke="#F9A825" stroke-width="4" opacity="0.2"/>
  <!-- Growing line (upward trend) -->
  <polyline points="200,760 300,720 400,680 500,580 580,480 660,380 760,280 840,200"
    stroke="#FFD54F" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area fill -->
  <polygon points="200,760 300,720 400,680 500,580 580,480 660,380 760,280 840,200 840,820 200,820"
    fill="#F9A825" opacity="0.15"/>
  <!-- Data points -->
  <circle cx="200" cy="760" r="16" fill="#FFD54F"/>
  <circle cx="400" cy="680" r="16" fill="#FFD54F"/>
  <circle cx="580" cy="480" r="16" fill="#FFD54F"/>
  <circle cx="760" cy="280" r="16" fill="#FFD54F"/>
  <circle cx="840" cy="200" r="20" fill="#F9A825"/>
</svg>