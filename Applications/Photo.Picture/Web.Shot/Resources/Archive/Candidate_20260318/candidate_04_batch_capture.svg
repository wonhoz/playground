<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 일괄 URL 캡처 -->
  <!-- URL 목록 패널 (좌측) -->
  <rect x="60" y="80" width="200" height="280" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#38BDF8" opacity="0.9">URL LIST</text>
  <line x1="60" y1="110" x2="260" y2="110" stroke="#1a3a50" stroke-width="1" opacity="0.5"/>
  <!-- URL 항목들 -->
  <rect x="70" y="118" width="180" height="22" rx="4" fill="#0a2030" stroke="#38BDF8" stroke-width="1" filter="url(#glow)" opacity="0.9"/>
  <circle cx="80" cy="129" r="4" fill="#4ADE80" opacity="0.8"/>
  <text x="90" y="133" font-size="8" fill="#38BDF8" opacity="0.9">example.com</text>
  <rect x="70" y="144" width="180" height="22" rx="4" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.8"/>
  <circle cx="80" cy="155" r="4" fill="#38BDF8" opacity="0.6"/>
  <text x="90" y="159" font-size="8" fill="#38BDF8" opacity="0.8">google.com/maps</text>
  <rect x="70" y="170" width="180" height="22" rx="4" fill="#0a2030" stroke="#0EA5E9" stroke-width="1" opacity="0.7"/>
  <circle cx="80" cy="181" r="4" fill="#0EA5E9" opacity="0.5"/>
  <text x="90" y="185" font-size="8" fill="#0EA5E9" opacity="0.7">github.com/user</text>
  <rect x="70" y="196" width="180" height="22" rx="4" fill="#0a2030" opacity="0.6"/>
  <circle cx="80" cy="207" r="4" fill="#888" opacity="0.5"/>
  <text x="90" y="211" font-size="8" fill="#888" opacity="0.6">docs.site.io</text>
  <rect x="70" y="222" width="180" height="22" rx="4" fill="#0a2030" opacity="0.6"/>
  <circle cx="80" cy="233" r="4" fill="#888" opacity="0.5"/>
  <text x="90" y="237" font-size="8" fill="#888" opacity="0.6">shop.example.org</text>
  <!-- 진행 표시 -->
  <text x="70" y="268" font-size="9" fill="#888" opacity="0.7">Progress: 2/5</text>
  <rect x="70" y="272" width="180" height="8" rx="3" fill="#0d2030" opacity="0.6"/>
  <rect x="70" y="272" width="72" height="8" rx="3" fill="#38BDF8" filter="url(#glow)" opacity="0.8"/>
  <!-- 화살표 -->
  <path d="M268,220 L290,220" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="286,214 296,220 286,226" fill="#38BDF8" opacity="0.9" filter="url(#glow)"/>
  <!-- 결과 썸네일 그리드 (우측) -->
  <rect x="292" y="80" width="160" height="280" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="372" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#38BDF8" opacity="0.9">RESULTS</text>
  <line x1="292" y1="110" x2="452" y2="110" stroke="#1a3a50" stroke-width="1" opacity="0.5"/>
  <!-- 완료된 썸네일들 -->
  <rect x="302" y="118" width="64" height="44" rx="4" fill="#0a2030" stroke="#4ADE80" stroke-width="1.5" opacity="0.9"/>
  <circle cx="312" cy="128" r="4" fill="#4ADE80" opacity="0.7"/>
  <text x="334" y="150" text-anchor="middle" font-size="7" fill="#4ADE80" opacity="0.8">Done</text>
  <rect x="376" y="118" width="64" height="44" rx="4" fill="#0a2030" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <circle cx="386" cy="128" r="4" fill="#38BDF8" opacity="0.6"/>
  <text x="408" y="150" text-anchor="middle" font-size="7" fill="#38BDF8" opacity="0.8">Done</text>
  <!-- 진행 중 -->
  <rect x="302" y="170" width="64" height="44" rx="4" fill="#0a1a28" stroke="#FDE047" stroke-width="1.5" opacity="0.8"/>
  <text x="334" y="200" text-anchor="middle" font-size="7" fill="#FDE047" opacity="0.8">Capturing...</text>
  <!-- 대기 중 -->
  <rect x="376" y="170" width="64" height="44" rx="4" fill="#060d16" stroke="#333" stroke-width="1" opacity="0.6"/>
  <text x="408" y="200" text-anchor="middle" font-size="7" fill="#888" opacity="0.6">Queued</text>
  <rect x="302" y="222" width="64" height="44" rx="4" fill="#060d16" stroke="#333" stroke-width="1" opacity="0.5"/>
  <text x="334" y="252" text-anchor="middle" font-size="7" fill="#888" opacity="0.5">Queued</text>
  <rect x="376" y="222" width="64" height="44" rx="4" fill="#060d16" stroke="#333" stroke-width="1" opacity="0.5"/>
  <text x="408" y="252" text-anchor="middle" font-size="7" fill="#888" opacity="0.5">Queued</text>
  <!-- 하단 제어 패널 -->
  <rect x="60" y="378" width="392" height="96" rx="8" fill="#060d16" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="402" text-anchor="middle" font-size="13" font-weight="bold" fill="#38BDF8" filter="url(#glow)" opacity="0.9">BATCH URL CAPTURE</text>
  <rect x="80" y="415" width="96" height="28" rx="6" fill="#38BDF8" opacity="0.3" filter="url(#glow)"/>
  <text x="128" y="433" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.9">Start Batch</text>
  <rect x="188" y="415" width="80" height="28" rx="6" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.7"/>
  <text x="228" y="433" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.7">Pause</text>
  <rect x="280" y="415" width="80" height="28" rx="6" fill="#0a2030" stroke="#38BDF8" stroke-width="1" opacity="0.7"/>
  <text x="320" y="433" text-anchor="middle" font-size="10" fill="#38BDF8" opacity="0.7">Export All</text>
  <text x="380" y="433" font-size="10" fill="#38BDF8" opacity="0.6">2/5 done</text>
  <text x="256" y="460" text-anchor="middle" font-size="11" fill="#888" opacity="0.6">일괄 URL 스크린샷</text>
</svg>
