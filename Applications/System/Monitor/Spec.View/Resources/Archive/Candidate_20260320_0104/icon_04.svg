<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 레이더+하드웨어: radar sweep with hardware nodes -->
  <!-- Radar rings -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#2E7D32" stroke-width="6" opacity="0.5"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#2E7D32" stroke-width="6" opacity="0.6"/>
  <circle cx="512" cy="512" r="140" fill="none" stroke="#2E7D32" stroke-width="6" opacity="0.7"/>
  <circle cx="512" cy="512" r="60" fill="none" stroke="#2E7D32" stroke-width="6" opacity="0.8"/>
  <!-- Crosshairs -->
  <line x1="212" y1="512" x2="812" y2="512" stroke="#2E7D32" stroke-width="4" opacity="0.4"/>
  <line x1="512" y1="212" x2="512" y2="812" stroke="#2E7D32" stroke-width="4" opacity="0.4"/>
  <!-- Radar sweep sector -->
  <path d="M512 512 L812 512 A300 300 0 0 0 618 249 Z" fill="#81C784" opacity="0.12"/>
  <line x1="512" y1="512" x2="618" y2="249" stroke="#81C784" stroke-width="6" stroke-linecap="round"/>
  <!-- Hardware node blips -->
  <circle cx="650" cy="380" r="18" fill="#81C784"/>
  <circle cx="650" cy="380" r="32" fill="none" stroke="#81C784" stroke-width="4" opacity="0.5"/>
  <circle cx="740" cy="560" r="14" fill="#81C784" opacity="0.8"/>
  <circle cx="740" cy="560" r="26" fill="none" stroke="#81C784" stroke-width="3" opacity="0.4"/>
  <circle cx="400" cy="680" r="12" fill="#2E7D32"/>
  <circle cx="320" cy="420" r="10" fill="#2E7D32"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="20" fill="#81C784"/>
</svg>