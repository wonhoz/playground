<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0015"/>
      <stop offset="100%" stop-color="#3D0030"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Headphone arc -->
  <path d="M130 280 Q130 155 256 155 Q382 155 382 280" fill="none" stroke="url(#phone)" stroke-width="22" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <rect x="108" y="268" width="48" height="72" rx="16" fill="url(#phone)"/>
  <!-- Right ear cup -->
  <rect x="356" y="268" width="48" height="72" rx="16" fill="url(#phone)"/>
  <!-- Ear cushion -->
  <rect x="114" y="274" width="36" height="60" rx="12" fill="#880E4F" opacity="0.7"/>
  <rect x="362" y="274" width="36" height="60" rx="12" fill="#880E4F" opacity="0.7"/>
  <!-- Tag/label edit panel -->
  <rect x="165" y="310" width="182" height="90" rx="12" fill="#1A0015" stroke="#F48FB1" stroke-width="2.5"/>
  <!-- Edit lines -->
  <text x="183" y="335" font-family="Arial" font-size="11" fill="#F48FB1" opacity="0.7">Title</text>
  <rect x="218" y="325" width="110" height="8" rx="4" fill="#F48FB1" opacity="0.5"/>
  <text x="183" y="355" font-family="Arial" font-size="11" fill="#F48FB1" opacity="0.7">Artist</text>
  <rect x="220" y="345" width="90" height="8" rx="4" fill="#F48FB1" opacity="0.5"/>
  <text x="183" y="375" font-family="Arial" font-size="11" fill="#F48FB1" opacity="0.7">Album</text>
  <rect x="224" y="365" width="100" height="8" rx="4" fill="#F48FB1" opacity="0.5"/>
  <!-- Pencil icon -->
  <g transform="translate(342,310) rotate(-30)">
    <rect x="-5" y="-28" width="10" height="36" rx="3" fill="#FCE4EC"/>
    <polygon points="-5,8 5,8 0,18" fill="#F48FB1"/>
    <rect x="-5" y="-34" width="10" height="8" rx="2" fill="#BDBDBD"/>
  </g>
</svg>
