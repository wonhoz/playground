<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <clipPath id="clip05"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <g clip-path="url(#clip05)">
    <!-- 최대 단어 (중앙) -->
    <text x="512" y="430" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="145" fill="#22D3EE">LOVE</text>
    <!-- 큰 단어들 -->
    <text x="240" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="82" fill="#F472B6">WORLD</text>
    <text x="730" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="75" fill="#22D3EE" opacity="0.85">DATA</text>
    <!-- 중간 단어들 -->
    <text x="200" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="50" fill="#FFFFFF" opacity="0.9">life</text>
    <text x="430" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="46" fill="#F472B6" opacity="0.85">text</text>
    <text x="660" y="642" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="44" fill="#22D3EE" opacity="0.8">cloud</text>
    <text x="840" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="40" fill="#FFFFFF" opacity="0.75">font</text>
    <!-- 작은 단어들 -->
    <text x="300" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#BAE6FD" opacity="0.7">word</text>
    <text x="490" y="726" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#F472B6" opacity="0.65">art</text>
    <text x="660" y="718" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#FFFFFF" opacity="0.6">big</text>
    <text x="800" y="722" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#22D3EE" opacity="0.55">size</text>
    <!-- 최소 단어들 -->
    <text x="380" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#BAE6FD" opacity="0.5">color</text>
    <text x="560" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#F472B6" opacity="0.45">time</text>
    <text x="700" y="783" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.4">view</text>
  </g>
</svg>
