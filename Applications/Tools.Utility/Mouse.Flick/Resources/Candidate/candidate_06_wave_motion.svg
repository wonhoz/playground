<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001A33"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0084FF"/>
      <stop offset="50%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#0084FF"/>
    </linearGradient>
    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wave gesture paths - 5 sinusoidal lines representing gesture history -->
  <path d="M60,180 Q110,140 160,180 Q210,220 260,180 Q310,140 360,180 Q410,220 452,180" fill="none" stroke="#0084FF" stroke-width="5" stroke-linecap="round" opacity="0.3" filter="url(#waveGlow)"/>
  <path d="M60,210 Q110,170 160,210 Q210,250 260,210 Q310,170 360,210 Q410,250 452,210" fill="none" stroke="#0099FF" stroke-width="5" stroke-linecap="round" opacity="0.5" filter="url(#waveGlow)"/>
  <path d="M60,240 Q110,200 160,240 Q210,280 260,240 Q310,200 360,240 Q410,280 452,240" fill="none" stroke="#00BBFF" stroke-width="6" stroke-linecap="round" opacity="0.7" filter="url(#waveGlow)"/>
  <path d="M60,270 Q110,230 160,270 Q210,310 260,270 Q310,230 360,270 Q410,310 452,270" fill="none" stroke="#00CCFF" stroke-width="7" stroke-linecap="round" opacity="0.9" filter="url(#waveGlow)"/>
  <path d="M60,300 Q110,260 160,300 Q210,340 260,300 Q310,260 360,300 Q410,340 452,300" fill="none" stroke="url(#waveGrad)" stroke-width="8" stroke-linecap="round" filter="url(#waveGlow)"/>
  <!-- Directional arrow at right end -->
  <polygon points="452,300 432,286 432,314" fill="#00CFFF" filter="url(#waveGlow)"/>
  <!-- Mouse pointer at wave origin -->
  <polygon points="60,300 60,340 78,322 90,345 100,340 88,318 108,318" fill="#FFFFFF" opacity="0.8"/>
  <!-- Velocity indicator bar at bottom -->
  <rect x="80" y="400" width="352" height="16" rx="8" fill="#001A33"/>
  <rect x="80" y="400" width="260" height="16" rx="8" fill="url(#waveGrad)" opacity="0.8"/>
  <text x="256" y="450" font-family="sans-serif" font-size="16" fill="#00CFFF" text-anchor="middle" opacity="0.7">Velocity: 85%</text>
</svg>
