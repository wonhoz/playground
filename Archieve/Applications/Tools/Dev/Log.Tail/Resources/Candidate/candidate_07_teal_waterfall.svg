<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A1A"/>
      <stop offset="100%" stop-color="#002233"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5CC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00E5CC" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Waterfall bars (timestamp columns fading down) -->
  <!-- Column 1 -->
  <rect x="80" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.6"/>
  <!-- Column 2 -->
  <rect x="122" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.55"/>
  <!-- Column 3 (error - highlighted) -->
  <rect x="164" y="80" width="32" height="360" rx="4" fill="#FF4444" opacity="0.15"/>
  <rect x="164" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.2"/>
  <rect x="164" y="280" width="32" height="80" rx="4" fill="#FF4444" opacity="0.4" filter="url(#glow)"/>
  <!-- Column 4 -->
  <rect x="206" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.5"/>
  <!-- Column 5 -->
  <rect x="248" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.6"/>
  <!-- Column 6 (warn) -->
  <rect x="290" y="80" width="32" height="360" rx="4" fill="#FF8C00" opacity="0.1"/>
  <rect x="290" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.35"/>
  <rect x="290" y="200" width="32" height="60" rx="4" fill="#FF8C00" opacity="0.4" filter="url(#glow)"/>
  <!-- Column 7 -->
  <rect x="332" y="80" width="32" height="360" rx="4" fill="url(#waterGrad)" opacity="0.55"/>
  <!-- Column 8 (latest = brightest) -->
  <rect x="374" y="80" width="32" height="360" rx="4" fill="#00E5CC" opacity="0.7" filter="url(#glow)"/>
  <!-- Scanning line at bottom (tail position) -->
  <rect x="72" y="440" width="368" height="4" rx="2" fill="#00E5CC" filter="url(#glow)"/>
  <circle cx="406" cy="442" r="8" fill="#00E5CC" filter="url(#glow)"/>
  <!-- Column labels at bottom -->
  <text x="96" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00897B" opacity="0.6">00</text>
  <text x="138" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00897B" opacity="0.6">05</text>
  <text x="180" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#FF4444" opacity="0.8">10</text>
  <text x="222" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00897B" opacity="0.6">15</text>
  <text x="264" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00897B" opacity="0.6">20</text>
  <text x="306" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#FF8C00" opacity="0.8">25</text>
  <text x="348" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00897B" opacity="0.6">30</text>
  <text x="390" y="458" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#00E5CC" opacity="0.9">35</text>
  <!-- Title -->
  <text x="256" y="490" font-family="'Courier New', monospace" font-size="13" text-anchor="middle" fill="#00897B" opacity="0.8">LOG.TAIL WATERFALL</text>
</svg>
