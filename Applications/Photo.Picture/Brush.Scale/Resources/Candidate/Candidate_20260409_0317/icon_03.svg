<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c3"><rect width="1024" height="1024" rx="190"/></clipPath>
    <clipPath id="left"><rect x="0" y="0" width="512" height="1024"/></clipPath>
    <clipPath id="right"><rect x="512" y="0" width="512" height="1024"/></clipPath>
  </defs>
  <!-- Layer 1: Clean white background -->
  <rect width="1024" height="1024" rx="190" fill="#F8FAFC"/>
  <g clip-path="url(#c3)">
    <!-- Layer 2: Left half – blurry/pixelated (large gray blocks) -->
    <g clip-path="url(#left)">
      <rect x="112" y="272" width="400" height="400" rx="14" fill="#E2E8F0"/>
      <!-- Large pixel blocks simulating low resolution -->
      <rect x="112" y="272" width="100" height="100" fill="#CBD5E1"/>
      <rect x="212" y="272" width="100" height="100" fill="#94A3B8"/>
      <rect x="312" y="272" width="100" height="100" fill="#CBD5E1"/>
      <rect x="412" y="272" width="100" height="100" fill="#94A3B8"/>
      <rect x="112" y="372" width="100" height="100" fill="#94A3B8"/>
      <rect x="212" y="372" width="100" height="100" fill="#E2E8F0"/>
      <rect x="312" y="372" width="100" height="100" fill="#94A3B8"/>
      <rect x="412" y="372" width="100" height="100" fill="#CBD5E1"/>
      <rect x="112" y="472" width="100" height="100" fill="#CBD5E1"/>
      <rect x="212" y="472" width="100" height="100" fill="#94A3B8"/>
      <rect x="312" y="472" width="100" height="100" fill="#E2E8F0"/>
      <rect x="412" y="472" width="100" height="100" fill="#94A3B8"/>
      <rect x="112" y="572" width="100" height="100" fill="#94A3B8"/>
      <rect x="212" y="572" width="100" height="100" fill="#CBD5E1"/>
      <rect x="312" y="572" width="100" height="100" fill="#94A3B8"/>
      <rect x="412" y="572" width="100" height="100" fill="#E2E8F0"/>
    </g>
    <!-- Layer 2: Right half – sharp/vivid (multicolor pixel blocks) -->
    <g clip-path="url(#right)">
      <rect x="512" y="272" width="400" height="400" rx="14" fill="#FFF7ED"/>
      <!-- Sharp colorful pixel blocks -->
      <rect x="512" y="272" width="100" height="100" fill="#F97316"/>
      <rect x="612" y="272" width="100" height="100" fill="#2563EB"/>
      <rect x="712" y="272" width="100" height="100" fill="#059669"/>
      <rect x="812" y="272" width="100" height="100" fill="#7C3AED"/>
      <rect x="512" y="372" width="100" height="100" fill="#EC4899"/>
      <rect x="612" y="372" width="100" height="100" fill="#FBBF24"/>
      <rect x="712" y="372" width="100" height="100" fill="#0EA5E9"/>
      <rect x="812" y="372" width="100" height="100" fill="#22C55E"/>
      <rect x="512" y="472" width="100" height="100" fill="#EF4444"/>
      <rect x="612" y="472" width="100" height="100" fill="#8B5CF6"/>
      <rect x="712" y="472" width="100" height="100" fill="#F97316"/>
      <rect x="812" y="472" width="100" height="100" fill="#06B6D4"/>
      <rect x="512" y="572" width="100" height="100" fill="#10B981"/>
      <rect x="612" y="572" width="100" height="100" fill="#F43F5E"/>
      <rect x="712" y="572" width="100" height="100" fill="#FBBF24"/>
      <rect x="812" y="572" width="100" height="100" fill="#3B82F6"/>
    </g>
    <!-- Layer 3: Center divider + labels -->
    <line x1="512" y1="240" x2="512" y2="784" stroke="#1E293B" stroke-width="8"/>
    <!-- "Before" label (left) -->
    <text x="312" y="804" font-family="Arial,sans-serif" font-size="86" fill="#64748B" font-weight="bold" text-anchor="middle">Before</text>
    <!-- "After" label (right, colorful) -->
    <text x="712" y="804" font-family="Arial,sans-serif" font-size="86" fill="#F97316" font-weight="bold" text-anchor="middle">After</text>
    <!-- AI badge -->
    <rect x="428" y="856" width="168" height="66" rx="14" fill="#1E293B"/>
    <text x="512" y="905" font-family="Arial,sans-serif" font-size="80" fill="white" font-weight="bold" text-anchor="middle">AI</text>
  </g>
</svg>
