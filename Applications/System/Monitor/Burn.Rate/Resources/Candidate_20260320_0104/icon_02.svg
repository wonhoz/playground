<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0200"/>
<!-- 컨셉: 연료계 바늘 적색 -->
<!-- 연료계 원형 -->
<circle cx="512" cy="560" r="300" fill="#130400" stroke="#BF360C" stroke-width="36"/>
<!-- 눈금 호 (하단 반원) -->
<path d="M 212 560 A 300 300 0 0 1 812 560" fill="none" stroke="#1A0600" stroke-width="60"/>
<!-- 눈금 (녹색→노란→적) -->
<path d="M 212 560 A 300 300 0 0 1 332 322" fill="none" stroke="#2E7D32" stroke-width="56" stroke-dasharray="1 1"/>
<path d="M 332 322 A 300 300 0 0 1 692 322" fill="none" stroke="#F9A825" stroke-width="56"/>
<path d="M 692 322 A 300 300 0 0 1 812 560" fill="none" stroke="#BF360C" stroke-width="56"/>
<!-- 적색 영역 강조 -->
<path d="M 720 310 A 300 300 0 0 1 812 560" fill="none" stroke="#FF8A65" stroke-width="28" opacity="0.7"/>
<!-- 바늘 (적색 구역 가리킴) -->
<line x1="512" y1="560" x2="760" y2="360" stroke="#FF8A65" stroke-width="24" stroke-linecap="round"/>
<circle cx="512" cy="560" r="32" fill="#BF360C"/>
<circle cx="512" cy="560" r="18" fill="#0A0200"/>
<!-- 위험 표시 -->
<circle cx="760" cy="360" r="28" fill="#FF8A65" opacity="0.6"/>
</svg>
