<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (star field) -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg11)"/>
  <!-- Scattered stars (pixel dots) -->
  <circle cx="200" cy="250" r="8" fill="#9E9E9E" opacity="0.5"/>
  <circle cx="350" cy="180" r="6" fill="#757575" opacity="0.5"/>
  <circle cx="500" cy="220" r="10" fill="#BDBDBD" opacity="0.5"/>
  <circle cx="680" cy="160" r="7" fill="#9E9E9E" opacity="0.5"/>
  <circle cx="800" cy="240" r="9" fill="#BDBDBD" opacity="0.4"/>
  <circle cx="160" cy="420" r="7" fill="#757575" opacity="0.4"/>
  <circle cx="880" cy="380" r="8" fill="#9E9E9E" opacity="0.5"/>
  <!-- Layer 2: Pixels connecting to form bright image (constellation) -->
  <!-- Connecting lines (constellation wires) -->
  <line x1="240" y1="520" x2="380" y2="440" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="380" y1="440" x2="512" y2="400" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="512" y1="400" x2="640" y2="440" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="640" y1="440" x2="780" y2="520" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="240" y1="520" x2="290" y2="660" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="780" y1="520" x2="730" y2="660" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="290" y1="660" x2="512" y2="720" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="730" y1="660" x2="512" y2="720" stroke="#7C4DFF" stroke-width="6" opacity="0.7"/>
  <line x1="380" y1="440" x2="290" y2="660" stroke="#9575CD" stroke-width="5" opacity="0.5"/>
  <line x1="640" y1="440" x2="730" y2="660" stroke="#9575CD" stroke-width="5" opacity="0.5"/>
  <line x1="512" y1="400" x2="512" y2="720" stroke="#7C4DFF" stroke-width="5" opacity="0.6"/>
  <!-- Pixel star nodes (bright) -->
  <circle cx="240" cy="520" r="22" fill="#7C4DFF"/>
  <circle cx="380" cy="440" r="28" fill="#9575CD"/>
  <circle cx="512" cy="400" r="34" fill="#E040FB"/>
  <circle cx="640" cy="440" r="28" fill="#9575CD"/>
  <circle cx="780" cy="520" r="22" fill="#7C4DFF"/>
  <circle cx="290" cy="660" r="22" fill="#B39DDB"/>
  <circle cx="730" cy="660" r="22" fill="#B39DDB"/>
  <circle cx="512" cy="720" r="32" fill="#EA80FC"/>
  <!-- Center glow -->
  <circle cx="512" cy="560" r="80" fill="#7C4DFF" opacity="0.15"/>
  <!-- Layer 3: Image outline forming from constellation -->
  <rect x="240" y="400" width="544" height="340" rx="14" fill="none" stroke="#7C4DFF" stroke-width="8" opacity="0.4"/>
  <!-- AI label -->
  <text x="432" y="948" font-family="'Segoe UI',Arial,sans-serif" font-size="100" font-weight="900" fill="#E040FB">AI</text>
</svg>
