<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Compass circle -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#F57F17" stroke-width="44"/>
  <!-- Compass needle - N/S -->
  <polygon points="512,220 545,512 512,560 479,512" fill="#FFD54F"/>
  <polygon points="512,804 545,512 512,460 479,512" fill="#F57F17" opacity="0.5"/>
  <!-- Compass needle - E/W -->
  <polygon points="804,512 512,545 460,512 512,479" fill="#F57F17" opacity="0.4"/>
  <polygon points="220,512 512,545 564,512 512,479" fill="#F57F17" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="36" fill="#FFD54F"/>
  <!-- Small glyph marks at cardinal points -->
  <rect x="492" y="165" width="40" height="30" rx="6" fill="#FFD54F" opacity="0.7"/>
  <rect x="492" y="829" width="40" height="30" rx="6" fill="#F57F17" opacity="0.5"/>
  <rect x="829" y="497" width="30" height="30" rx="6" fill="#F57F17" opacity="0.5"/>
  <rect x="165" y="497" width="30" height="30" rx="6" fill="#F57F17" opacity="0.5"/>
</svg>