<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8c0ff"/>
      <stop offset="50%" stop-color="#7b8ef7"/>
      <stop offset="100%" stop-color="#3c1dff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Diamond shape -->
  <polygon points="256,80 400,230 256,440 112,230" fill="url(#diamond)" filter="url(#glow)"/>
  <!-- Diamond facets -->
  <polygon points="256,80 400,230 256,230" fill="white" opacity="0.12"/>
  <polygon points="256,80 112,230 256,230" fill="white" opacity="0.05"/>
  <polygon points="256,440 400,230 256,230" fill="white" opacity="0.08"/>
  <!-- Shine -->
  <polygon points="256,80 320,180 256,180 192,180" fill="url(#shine)" opacity="0.3"/>
  <!-- Facet lines -->
  <line x1="256" y1="80" x2="256" y2="440" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="256" y1="230" x2="400" y2="230" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="256" y1="230" x2="112" y2="230" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="256" y1="80" x2="400" y2="230" stroke="white" stroke-width="1" opacity="0.1"/>
  <line x1="256" y1="80" x2="112" y2="230" stroke="white" stroke-width="1" opacity="0.1"/>
  <!-- Vector tool pen overlay -->
  <circle cx="390" cy="130" r="22" fill="url(#diamond)" opacity="0.9" filter="url(#glow)"/>
  <path d="M383 137 L390 118 L397 137 L390 142 Z" fill="white" opacity="0.8"/>
</svg>