<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="stream1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#1F6FEB"/>
    </linearGradient>
    <linearGradient id="stream2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="stream3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7B72"/>
      <stop offset="100%" stop-color="#CF222E"/>
    </linearGradient>
    <linearGradient id="merged" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D2A8FF"/>
      <stop offset="100%" stop-color="#8957E5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Three input log streams flowing into merge point -->
  <!-- Stream 1 (blue, top) -->
  <path d="M80 120 Q160 120 200 220" stroke="url(#stream1)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- File icon 1 -->
  <rect x="48" y="96" width="56" height="48" rx="6" fill="#1F6FEB" opacity="0.8"/>
  <text x="76" y="126" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="white">LOG1</text>
  <!-- Stream 2 (green, middle) -->
  <path d="M80 256 Q160 256 200 256" stroke="url(#stream2)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- File icon 2 -->
  <rect x="48" y="232" width="56" height="48" rx="6" fill="#238636" opacity="0.8"/>
  <text x="76" y="262" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="white">LOG2</text>
  <!-- Stream 3 (red, bottom) -->
  <path d="M80 392 Q160 392 200 292" stroke="url(#stream3)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- File icon 3 -->
  <rect x="48" y="368" width="56" height="48" rx="6" fill="#CF222E" opacity="0.8"/>
  <text x="76" y="398" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="white">LOG3</text>
  <!-- Merge node -->
  <circle cx="220" cy="256" r="32" fill="#21262D" stroke="#D2A8FF" stroke-width="2.5" filter="url(#glow)"/>
  <text x="220" y="260" font-family="Arial Black, sans-serif" font-size="16" text-anchor="middle" fill="#D2A8FF" filter="url(#glow)">M</text>
  <!-- Output merged stream -->
  <path d="M252 256 Q320 256 380 256" stroke="url(#merged)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Output file icon -->
  <rect x="382" y="224" width="80" height="64" rx="8" fill="#8957E5" opacity="0.85" filter="url(#glow)"/>
  <text x="422" y="252" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="white">MERGED</text>
  <text x="422" y="268" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#D2A8FF">.LOG</text>
  <!-- Log lines on output -->
  <rect x="390" y="278" width="64" height="4" rx="2" fill="#D2A8FF" opacity="0.5"/>
  <!-- Stream data dots -->
  <circle cx="130" cy="185" r="4" fill="#58A6FF" filter="url(#glow)"/>
  <circle cx="155" cy="205" r="3" fill="#58A6FF" filter="url(#glow)" opacity="0.7"/>
  <circle cx="130" cy="256" r="4" fill="#3FB950" filter="url(#glow)"/>
  <circle cx="165" cy="256" r="3" fill="#3FB950" filter="url(#glow)" opacity="0.7"/>
  <circle cx="130" cy="330" r="4" fill="#FF7B72" filter="url(#glow)"/>
  <circle cx="155" cy="310" r="3" fill="#FF7B72" filter="url(#glow)" opacity="0.7"/>
</svg>
