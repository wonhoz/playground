<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 핑크 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg2)"/>

  <!-- Layer 2: 컬러풀 아이콘 컬렉션 (4x4 그리드) -->
  <!-- 행 1 -->
  <rect x="88" y="100" width="180" height="180" rx="22" fill="#EF5350"/>
  <text x="178" y="195" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🔴</text>
  <rect x="292" y="100" width="180" height="180" rx="22" fill="#FF9800"/>
  <text x="382" y="195" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">⭐</text>
  <rect x="496" y="100" width="180" height="180" rx="22" fill="#FFEE58"/>
  <text x="586" y="195" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">💛</text>
  <rect x="700" y="100" width="180" height="180" rx="22" fill="#66BB6A"/>
  <text x="790" y="195" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🟢</text>

  <!-- 행 2 -->
  <rect x="88" y="300" width="180" height="180" rx="22" fill="#26C6DA"/>
  <text x="178" y="395" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">💎</text>
  <rect x="292" y="300" width="180" height="180" rx="22" fill="#5C6BC0"/>
  <text x="382" y="395" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🌀</text>
  <!-- 선택 하이라이트 -->
  <rect x="492" y="296" width="188" height="188" rx="24" fill="none" stroke="#E91E63" stroke-width="10"/>
  <rect x="496" y="300" width="180" height="180" rx="22" fill="#AB47BC"/>
  <text x="586" y="395" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🔮</text>
  <rect x="700" y="300" width="180" height="180" rx="22" fill="#EC407A"/>
  <text x="790" y="395" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🌸</text>

  <!-- 행 3 -->
  <rect x="88" y="500" width="180" height="180" rx="22" fill="#FF7043"/>
  <text x="178" y="595" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🔥</text>
  <rect x="292" y="500" width="180" height="180" rx="22" fill="#26A69A"/>
  <text x="382" y="595" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">🌿</text>
  <rect x="496" y="500" width="180" height="180" rx="22" fill="#78909C"/>
  <text x="586" y="595" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">⚙️</text>
  <rect x="700" y="500" width="180" height="180" rx="22" fill="#FFA726"/>
  <text x="790" y="595" font-family="'Segoe UI Emoji',Arial,sans-serif" font-size="90" text-anchor="middle" dominant-baseline="middle">☀️</text>

  <!-- Layer 3: 검색 바 (하단) -->
  <rect x="88" y="730" width="792" height="100" rx="28" fill="white" opacity="0.85"/>
  <text x="200" y="783" font-family="'Segoe UI',Arial,sans-serif" font-size="52" fill="#888" dominant-baseline="middle">🔍 Search icons...</text>
</svg>
