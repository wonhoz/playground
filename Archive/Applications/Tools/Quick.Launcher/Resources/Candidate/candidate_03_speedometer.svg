<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A2A1A"/>
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4444"/>
      <stop offset="100%" style="stop-color:#FF0000"/>
    </linearGradient>
    <radialGradient id="dial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Dial background -->
  <circle cx="256" cy="270" r="180" fill="url(#dial)" stroke="#333" stroke-width="4"/>
  <!-- Speed arc segments -->
  <path d="M 90 270 A 166 166 0 0 1 422 270" fill="none" stroke="#1A3A1A" stroke-width="20"/>
  <path d="M 90 270 A 166 166 0 0 1 200 124" fill="none" stroke="#2A5A2A" stroke-width="20"/>
  <path d="M 200 124 A 166 166 0 0 1 312 124" fill="none" stroke="#44AA44" stroke-width="20"/>
  <path d="M 312 124 A 166 166 0 0 1 390 180" fill="none" stroke="#AADD44" stroke-width="20"/>
  <path d="M 390 180 A 166 166 0 0 1 422 270" fill="none" stroke="#FF4444" stroke-width="20"/>
  <!-- Tick marks -->
  <line x1="256" y1="104" x2="256" y2="120" stroke="#888" stroke-width="3"/>
  <line x1="166" y1="130" x2="174" y2="144" stroke="#888" stroke-width="3"/>
  <line x1="100" y1="200" x2="114" y2="208" stroke="#888" stroke-width="3"/>
  <line x1="346" y1="130" x2="338" y2="144" stroke="#888" stroke-width="3"/>
  <line x1="412" y1="200" x2="398" y2="208" stroke="#888" stroke-width="3"/>
  <!-- Needle -->
  <line x1="256" y1="270" x2="370" y2="160" stroke="url(#needle)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="14" fill="#444" stroke="#FF4444" stroke-width="3"/>
  <!-- Center -->
  <circle cx="256" cy="270" r="6" fill="#FF4444"/>
  <!-- Label -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial" font-size="22" fill="#888">LAUNCH</text>
</svg>
