<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A3800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE040;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFAA00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7700;stop-opacity:1" />
    </linearGradient>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05s)"/>
  <!-- 방사형 빛줄기 배경 -->
  <line x1="512" y1="512" x2="256" y2="100" stroke="#6A4800" stroke-width="80" opacity="0.3"/>
  <line x1="512" y1="512" x2="768" y2="100" stroke="#6A4800" stroke-width="80" opacity="0.3"/>
  <line x1="512" y1="512" x2="200" y2="512" stroke="#6A4800" stroke-width="60" opacity="0.2"/>
  <line x1="512" y1="512" x2="824" y2="512" stroke="#6A4800" stroke-width="60" opacity="0.2"/>
  <line x1="512" y1="512" x2="256" y2="900" stroke="#5A3800" stroke-width="70" opacity="0.25"/>
  <line x1="512" y1="512" x2="768" y2="900" stroke="#5A3800" stroke-width="70" opacity="0.25"/>
  <!-- Layer 2: 번개 볼트 (메인) -->
  <path d="M560 200 L380 520 L500 520 L440 824 L660 460 L540 460 Z"
    fill="url(#boltGrad)" stroke="#FFE040" stroke-width="6" stroke-linejoin="round" filter="url(#boltGlow)"/>
  <!-- 번개 코어 (밝은 하이라이트) -->
  <path d="M548 230 L390 520 L490 520 L450 780 L640 490 L530 490 Z"
    fill="#FFFAAA" opacity="0.35"/>
  <!-- Layer 3: 신호 파티클들 (번개 주변) -->
  <circle cx="340" cy="360" r="18" fill="#FFE040" filter="url(#boltGlow2)" opacity="0.8"/>
  <circle cx="700" cy="300" r="14" fill="#FFAA00" filter="url(#boltGlow2)" opacity="0.7"/>
  <circle cx="720" cy="600" r="16" fill="#FFE040" filter="url(#boltGlow2)" opacity="0.75"/>
  <circle cx="300" cy="650" r="12" fill="#FF8800" filter="url(#boltGlow2)" opacity="0.65"/>
  <circle cx="680" cy="750" r="10" fill="#FFCC00" filter="url(#boltGlow2)" opacity="0.6"/>
  <!-- 방사 스파크 라인들 -->
  <line x1="420" y1="340" x2="360" y2="280" stroke="#FFE040" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="590" y1="310" x2="660" y2="260" stroke="#FFE040" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <line x1="640" y1="520" x2="720" y2="490" stroke="#FFAA00" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <line x1="380" y1="620" x2="310" y2="670" stroke="#FF8800" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <!-- 신호 파형 장식 (번개 아래) -->
  <path d="M240 880 L300 880 L330 840 L360 920 L390 840 L420 920 L450 840 L480 920 L510 880 L784 880"
    fill="none" stroke="#FF8800" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>