<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="kb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Keyboard outline -->
  <rect x="40" y="130" width="432" height="220" rx="16" fill="url(#kb)"/>
  <rect x="40" y="130" width="432" height="220" rx="16" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Number row (tiny keys) -->
  <rect x="54" y="144" width="26" height="22" rx="4" fill="#1e293b"/><text x="67" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">1</text>
  <rect x="84" y="144" width="26" height="22" rx="4" fill="#1e293b"/><text x="97" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">2</text>
  <rect x="114" y="144" width="26" height="22" rx="4" fill="#1e293b"/><text x="127" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">3</text>
  <rect x="144" y="144" width="26" height="22" rx="4" fill="#1e293b"/><text x="157" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">4</text>
  <rect x="174" y="144" width="26" height="22" rx="4" fill="#1e293b"/><text x="187" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">5</text>
  <!-- QWERTY row -->
  <rect x="54" y="172" width="26" height="22" rx="4" fill="#1e293b"/><text x="67" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Q</text>
  <rect x="84" y="172" width="26" height="22" rx="4" fill="#1e293b"/><text x="97" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">W</text>
  <!-- Highlighted/remapped key -->
  <rect x="114" y="172" width="26" height="22" rx="4" fill="#7c3aed"/>
  <text x="127" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="white">E</text>
  <rect x="144" y="172" width="26" height="22" rx="4" fill="#1e293b"/><text x="157" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">R</text>
  <rect x="174" y="172" width="26" height="22" rx="4" fill="#1e293b"/><text x="187" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">T</text>
  <rect x="204" y="172" width="26" height="22" rx="4" fill="#1e293b"/><text x="217" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Y</text>
  <!-- ASDF row -->
  <rect x="64" y="200" width="26" height="22" rx="4" fill="#1e293b"/><text x="77" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">A</text>
  <rect x="94" y="200" width="26" height="22" rx="4" fill="#1e293b"/><text x="107" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">S</text>
  <rect x="124" y="200" width="26" height="22" rx="4" fill="#1e293b"/><text x="137" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">D</text>
  <rect x="154" y="200" width="26" height="22" rx="4" fill="#0ea5e9"/>
  <text x="167" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="white">F</text>
  <rect x="184" y="200" width="26" height="22" rx="4" fill="#1e293b"/><text x="197" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">G</text>
  <!-- Space row -->
  <rect x="104" y="228" width="200" height="22" rx="4" fill="#1e293b"/>
  <text x="204" y="244" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">SPACE</text>
  <!-- Remap indicator line: E → some action (right side) -->
  <line x1="127" y1="172" x2="290" y2="130" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Target action box -->
  <rect x="290" y="90" width="162" height="50" rx="8" fill="#1a0a3a"/>
  <rect x="290" y="90" width="162" height="50" rx="8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="371" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#a78bfa">E → Escape</text>
  <text x="371" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">when CapsLock held</text>
  <!-- F highlight line -->
  <line x1="167" y1="200" x2="330" y2="175" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <rect x="330" y="157" width="142" height="36" rx="8" fill="#0a1a2a"/>
  <rect x="330" y="157" width="142" height="36" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="401" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#38bdf8">F → Forward (mouse)</text>
  <!-- Title -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#94a3b8" opacity="0.7">LAYOUT MAP</text>
  <!-- Legend -->
  <rect x="54" y="375" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="74" y="386" font-family="Arial" font-size="11" fill="#a78bfa">Remapped Key</text>
  <rect x="180" y="375" width="12" height="12" rx="2" fill="#0ea5e9"/>
  <text x="200" y="386" font-family="Arial" font-size="11" fill="#38bdf8">Action Key</text>
</svg>
