<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 딥 인디고 배경 + 기하학 패턴 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg5)"/>
  <!-- 격자 기하학 패턴 -->
  <rect x="140" y="140" width="160" height="160" rx="8" fill="#1565C0" opacity="0.3"/>
  <rect x="320" y="140" width="80" height="80" rx="4" fill="#1565C0" opacity="0.2"/>
  <rect x="420" y="140" width="80" height="80" rx="4" fill="#1565C0" opacity="0.2"/>
  <rect x="140" y="320" width="80" height="80" rx="4" fill="#1565C0" opacity="0.2"/>
  <rect x="724" y="140" width="160" height="160" rx="8" fill="#1565C0" opacity="0.3"/>
  <rect x="140" y="724" width="160" height="160" rx="8" fill="#1565C0" opacity="0.3"/>

  <!-- Layer 2: 중앙 WiFi/URL/VCard 아이콘 삼각 배치 -->
  <!-- WiFi 원호 -->
  <circle cx="512" cy="380" r="180" fill="none" stroke="#42A5F5" stroke-width="30" stroke-dasharray="280 400"/>
  <circle cx="512" cy="380" r="120" fill="none" stroke="#42A5F5" stroke-width="22" stroke-dasharray="186 400" opacity="0.8"/>
  <circle cx="512" cy="380" r="60" fill="none" stroke="#42A5F5" stroke-width="18" stroke-dasharray="92 400" opacity="0.6"/>
  <circle cx="512" cy="380" r="18" fill="#42A5F5"/>

  <!-- 타입 배지들 -->
  <rect x="140" y="560" width="200" height="72" rx="18" fill="#FF8F00"/>
  <text x="240" y="598" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">🔗 URL</text>

  <rect x="412" y="560" width="200" height="72" rx="18" fill="#2E7D32"/>
  <text x="512" y="598" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">📶 WiFi</text>

  <rect x="684" y="560" width="200" height="72" rx="18" fill="#7B1FA2"/>
  <text x="784" y="598" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle">👤 VCard</text>

  <!-- Layer 3: QR 코드 결과 미니 프레임 -->
  <rect x="322" y="680" width="380" height="200" rx="18" fill="white" opacity="0.9"/>
  <!-- 미니 QR 파인더 -->
  <rect x="340" y="698" width="60" height="60" rx="4" fill="#1A1A1A"/>
  <rect x="352" y="710" width="36" height="36" rx="2" fill="white"/>
  <rect x="364" y="722" width="12" height="12" rx="1" fill="#1A1A1A"/>
  <rect x="562" y="698" width="60" height="60" rx="4" fill="#1A1A1A"/>
  <rect x="574" y="710" width="36" height="36" rx="2" fill="white"/>
  <rect x="586" y="722" width="12" height="12" rx="1" fill="#1A1A1A"/>
  <rect x="340" y="800" width="60" height="60" rx="4" fill="#1A1A1A"/>
  <rect x="352" y="812" width="36" height="36" rx="2" fill="white"/>
  <rect x="364" y="824" width="12" height="12" rx="1" fill="#1A1A1A"/>
  <!-- 데이터 도트 -->
  <rect x="420" y="698" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="444" y="698" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="468" y="698" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="420" y="718" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="492" y="718" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="420" y="738" width="14" height="14" rx="2" fill="#1A237E"/>
  <rect x="468" y="738" width="14" height="14" rx="2" fill="#1A237E"/>
