<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Speech / sound wave → clipboard (voice-to-text + AI) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#1A0010"/>
  <!-- Microphone -->
  <rect x="432" y="160" width="160" height="260" rx="80" fill="#2D0030" stroke="#F06292" stroke-width="22"/>
  <!-- Mic grille lines -->
  <line x1="432" y1="260" x2="592" y2="260" stroke="#F06292" stroke-width="12" opacity="0.5"/>
  <line x1="432" y1="300" x2="592" y2="300" stroke="#F06292" stroke-width="10" opacity="0.4"/>
  <line x1="432" y1="340" x2="592" y2="340" stroke="#F06292" stroke-width="10" opacity="0.4"/>
  <!-- Mic stand arc -->
  <path d="M340 400 Q340 540 512 540 Q684 540 684 400" fill="none" stroke="#F06292" stroke-width="28" stroke-linecap="round"/>
  <!-- Stand pole -->
  <rect x="498" y="540" width="28" height="100" rx="8" fill="#F06292"/>
  <rect x="420" y="636" width="184" height="24" rx="12" fill="#F06292"/>
  <!-- Sound waves (left) -->
  <path d="M290 340 Q250 400 290 460" fill="none" stroke="#F06292" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 300 Q170 400 230 500" fill="none" stroke="#F06292" stroke-width="16" stroke-linecap="round" opacity="0.35"/>
  <!-- Arrow to clipboard -->
  <path d="M700 440 L760 440 M740 410 L760 440 L740 470" fill="none" stroke="#FF80AB" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mini clipboard (right) -->
  <rect x="760" y="360" width="180" height="220" rx="14" fill="#2D0030" stroke="#F06292" stroke-width="16"/>
  <rect x="810" y="340" width="80" height="40" rx="8" fill="#F06292"/>
  <rect x="782" y="420" width="120" height="12" rx="6" fill="#F06292" opacity="0.7"/>
  <rect x="782" y="450" width="100" height="12" rx="6" fill="#F06292" opacity="0.5"/>
  <rect x="782" y="480" width="110" height="12" rx="6" fill="#F06292" opacity="0.5"/>
  <rect x="782" y="510" width="80" height="12" rx="6" fill="#F06292" opacity="0.4"/>
</svg>
