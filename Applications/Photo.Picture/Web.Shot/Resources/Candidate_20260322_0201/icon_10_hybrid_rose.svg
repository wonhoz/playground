<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 로즈 다크 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0510"/>

  <!-- 레이어드 패턴: 중앙 심볼 — 웹 페이지가 사진 프레임 안에 포착되는 순간 -->

  <!-- 사진 폴라로이드 프레임 (가장 뒤) -->
  <rect x="160" y="150" width="704" height="800" rx="20" fill="#2A0A18"/>
  <rect x="160" y="150" width="704" height="800" rx="20" fill="none" stroke="#FB7185" stroke-width="6"/>
  <rect x="180" y="170" width="664" height="620" rx="10" fill="#140308"/>
  <!-- 폴라로이드 하단 흰 부분 -->
  <rect x="160" y="790" width="704" height="160" rx="20" fill="#2A0A18"/>
  <rect x="160" y="790" width="704" height="8" fill="#2A0A18"/>
  <text x="512" y="858" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FB7185" text-anchor="middle">Web.Shot</text>
  <text x="512" y="888" font-family="monospace" font-size="15" fill="#FDA4AF" text-anchor="middle">Full Page Screenshot</text>
  <text x="512" y="914" font-family="monospace" font-size="13" fill="#F43F5E" text-anchor="middle">2026.03.22 02:01</text>

  <!-- 사진 안에 담긴 브라우저 창 -->
  <rect x="190" y="180" width="644" height="600" rx="8" fill="#1A0510"/>
  <!-- 브라우저 타이틀바 -->
  <rect x="190" y="180" width="644" height="54" rx="8" fill="#2A0A18"/>
  <rect x="190" y="210" width="644" height="24" fill="#2A0A18"/>
  <!-- 버튼 -->
  <circle cx="212" cy="207" r="9" fill="#FF5F57"/>
  <circle cx="234" cy="207" r="9" fill="#FEBC2E"/>
  <circle cx="256" cy="207" r="9" fill="#28C840"/>
  <!-- URL 바 -->
  <rect x="272" y="192" width="440" height="28" rx="14" fill="#140308"/>
  <rect x="272" y="192" width="440" height="28" rx="14" fill="none" stroke="#F43F5E" stroke-width="2"/>
  <text x="492" y="211" font-family="monospace" font-size="14" fill="#FB7185" text-anchor="middle">https://example.com/full-page</text>

  <!-- 브라우저 내용 (전체 페이지) -->
  <!-- 히어로 섹션 -->
  <rect x="200" y="244" width="624" height="140" rx="6" fill="#200810"/>
  <rect x="220" y="260" width="400" height="30" rx="8" fill="#2A0A18"/>
  <rect x="220" y="298" width="560" height="14" rx="4" fill="#2A0A18" opacity="0.7"/>
  <rect x="220" y="318" width="520" height="14" rx="4" fill="#2A0A18" opacity="0.7"/>
  <rect x="220" y="346" width="140" height="28" rx="14" fill="#F43F5E"/>
  <text x="290" y="366" font-family="sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Read More</text>

  <!-- 섹션 2 -->
  <rect x="200" y="400" width="300" height="160" rx="6" fill="#200810"/>
  <rect x="516" y="400" width="308" height="160" rx="6" fill="#200810"/>
  <rect x="215" y="416" width="260" height="16" rx="4" fill="#2A0A18"/>
  <rect x="215" y="440" width="270" height="10" rx="3" fill="#200810" opacity="0.9"/>
  <rect x="215" y="458" width="250" height="10" rx="3" fill="#200810" opacity="0.9"/>
  <rect x="215" y="476" width="260" height="10" rx="3" fill="#200810" opacity="0.9"/>
  <rect x="531" y="416" width="260" height="16" rx="4" fill="#2A0A18"/>
  <rect x="531" y="440" width="270" height="10" rx="3" fill="#200810" opacity="0.9"/>
  <rect x="531" y="458" width="250" height="10" rx="3" fill="#200810" opacity="0.9"/>

  <!-- 섹션 3 -->
  <rect x="200" y="576" width="624" height="80" rx="6" fill="#200810"/>
  <rect x="215" y="590" width="340" height="16" rx="4" fill="#2A0A18"/>
  <rect x="215" y="614" width="580" height="10" rx="3" fill="#2A0A18" opacity="0.6"/>
  <rect x="215" y="630" width="540" height="10" rx="3" fill="#2A0A18" opacity="0.6"/>

  <!-- 섹션 4 -->
  <rect x="200" y="672" width="624" height="80" rx="6" fill="#200810"/>
  <rect x="215" y="688" width="280" height="16" rx="4" fill="#2A0A18"/>
  <rect x="215" y="710" width="560" height="10" rx="3" fill="#2A0A18" opacity="0.6"/>
  <rect x="215" y="728" width="520" height="10" rx="3" fill="#2A0A18" opacity="0.6"/>

  <!-- 캡처 포커스 코너 (사진 프레임 효과) -->
  <path d="M186,176 L186,156 L206,156" fill="none" stroke="#F43F5E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M830,176 L830,156 L810,156" fill="none" stroke="#F43F5E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M186,784 L186,804 L206,804" fill="none" stroke="#F43F5E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M830,784 L830,804 L810,804" fill="none" stroke="#F43F5E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 스크롤바 (우측) -->
  <rect x="832" y="180" width="10" height="600" rx="5" fill="#2A0A18"/>
  <rect x="832" y="220" width="10" height="80" rx="5" fill="#F43F5E"/>
</svg>
