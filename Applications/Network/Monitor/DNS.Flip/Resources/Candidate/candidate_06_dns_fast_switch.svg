<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#150020"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b39ddb"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- speed circle -->
  <circle cx="256" cy="256" r="160" fill="url(#circle)" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#b39ddb" stroke-width="5" stroke-dasharray="30,20" opacity="0.5"/>
  <!-- fast lightning bolt for speed -->
  <path d="M280 90 L210 270 L260 270 L232 422 L340 232 L285 232 Z" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- switch arrows around circle -->
  <path d="M130 256 Q130 148 256 120" stroke="#b39ddb" stroke-width="7" fill="none" stroke-linecap="round"/>
  <polygon points="256,120 242,100 272,104" fill="#b39ddb"/>
  <path d="M382 256 Q382 364 256 392" stroke="#7e57c2" stroke-width="7" fill="none" stroke-linecap="round"/>
  <polygon points="256,392 270,412 240,408" fill="#7e57c2"/>
  <!-- speed lines -->
  <line x1="80" y1="230" x2="140" y2="230" stroke="#b39ddb" stroke-width="3" opacity="0.4"/>
  <line x1="70" y1="256" x2="130" y2="256" stroke="#b39ddb" stroke-width="3" opacity="0.3"/>
  <line x1="80" y1="282" x2="140" y2="282" stroke="#b39ddb" stroke-width="3" opacity="0.4"/>
</svg>
