<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#1E293B"/>
  <!-- Layer 2: Two folder icons side by side -->
  <!-- bin/ folder -->
  <rect x="150" y="400" width="280" height="200" rx="16" fill="#EA580C"/>
  <rect x="150" y="355" width="140" height="58" rx="12" fill="#EA580C"/>
  <text x="290" y="518" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="bold">bin</text>
  <!-- obj/ folder -->
  <rect x="480" y="400" width="280" height="200" rx="16" fill="#D97706"/>
  <rect x="480" y="355" width="140" height="58" rx="12" fill="#D97706"/>
  <text x="620" y="518" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="bold">obj</text>
  <!-- Layer 3: Big X across both folders -->
  <line x1="145" y1="360" x2="765" y2="750" stroke="#DC2626" stroke-width="60" stroke-linecap="round" opacity="0.85"/>
  <line x1="765" y1="360" x2="145" y2="750" stroke="#DC2626" stroke-width="60" stroke-linecap="round" opacity="0.85"/>
  <!-- VS logo hint at top -->
  <text x="512" y="280" font-family="Arial,sans-serif" font-size="24" fill="#94A3B8" text-anchor="middle" opacity="0.7">Visual Studio 아티팩트</text>
  <!-- Delete badge -->
  <rect x="680" y="230" width="200" height="50" rx="14" fill="#DC2626"/>
  <text x="780" y="262" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">삭제 대상</text>
</svg>