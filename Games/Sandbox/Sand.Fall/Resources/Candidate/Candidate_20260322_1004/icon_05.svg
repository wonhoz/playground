    <rect x="642" y="354" width="18" height="18" rx="2" fill="#F9C040"/>
    <rect x="668" y="350" width="18" height="18" rx="2" fill="#FFD740"/>
    <rect x="590" y="378" width="18" height="18" rx="2" fill="#FFD740"/>
    <rect x="616" y="374" width="18" height="18" rx="2" fill="#F9C040"/>
    <rect x="642" y="378" width="18" height="18" rx="2" fill="#FFD740"/>
    <rect x="668" y="374" width="18" height="18" rx="2" fill="#F9C040"/>
