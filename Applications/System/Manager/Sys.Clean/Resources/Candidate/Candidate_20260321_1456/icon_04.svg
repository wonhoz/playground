<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip04">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background – butter/cream -->
  <rect width="1024" height="1024" rx="190" fill="#FEF9C3"/>

  <g clip-path="url(#clip04)">
    <!-- Layer 2: Vacuum cleaner silhouette -->
    <!-- Vacuum body (main unit) -->
    <ellipse cx="480" cy="560" rx="220" ry="160" fill="#EC4899"/>
    <!-- Body detail stripe -->
    <ellipse cx="480" cy="560" rx="180" ry="120" fill="#DB2777"/>

    <!-- Vacuum top (handle) -->
    <rect x="580" y="350" width="50" height="220" rx="25" fill="#EC4899"/>
    <!-- Handle grip -->
    <rect x="580" y="390" width="50" height="80" rx="16" fill="#BE185D"/>

    <!-- Hose from vacuum -->
    <path d="M270,540 Q180,480 160,360 Q140,240 260,200 Q340,180 380,260" stroke="#F9A8D4" stroke-width="44" fill="none" stroke-linecap="round"/>
    <!-- Hose highlight -->
    <path d="M270,540 Q180,480 160,360 Q140,240 260,200 Q340,180 380,260" stroke="#FDE7F1" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Nozzle tip -->
    <ellipse cx="380" cy="275" rx="45" ry="32" fill="#BE185D"/>

    <!-- Layer 3: Dust/dirt particles being sucked in -->
    <!-- Particles flying toward nozzle -->
    <circle cx="310" cy="190" r="18" fill="#93C5FD" opacity="0.9"/>
    <circle cx="260" cy="240" r="14" fill="#60A5FA" opacity="0.8"/>
    <circle cx="220" cy="200" r="10" fill="#BFDBFE" opacity="0.7"/>
    <circle cx="350" cy="160" r="12" fill="#93C5FD" opacity="0.75"/>
    <circle cx="290" cy="150" r="8" fill="#DBEAFE" opacity="0.65"/>
    <circle cx="420" cy="200" r="9" fill="#60A5FA" opacity="0.6"/>

    <!-- Suction lines (motion lines toward nozzle) -->
    <path d="M240,200 L350,240" stroke="#BFDBFE" stroke-width="6" stroke-linecap="round" opacity="0.6" stroke-dasharray="10 6"/>
    <path d="M200,260 L320,268" stroke="#BFDBFE" stroke-width="5" stroke-linecap="round" opacity="0.5" stroke-dasharray="8 5"/>

    <!-- Small dirt specs -->
    <rect x="190" y="310" width="16" height="16" rx="4" fill="#FDBA74" opacity="0.6" transform="rotate(20 198 318)"/>
    <rect x="240" y="290" width="12" height="12" rx="3" fill="#FCA5A5" opacity="0.5" transform="rotate(-15 246 296)"/>

    <!-- Wheel at bottom -->
    <circle cx="360" cy="700" r="36" fill="#DB2777"/>
    <circle cx="360" cy="700" r="20" fill="#BE185D"/>
    <circle cx="580" cy="700" r="36" fill="#DB2777"/>
    <circle cx="580" cy="700" r="20" fill="#BE185D"/>
  </g>
</svg>
