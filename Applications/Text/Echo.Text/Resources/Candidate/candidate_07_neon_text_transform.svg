<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Text input block -->
  <rect x="50" y="120" width="190" height="100" rx="12" stroke="#00ffff" stroke-width="3" fill="none" filter="url(#glow)"/>
  <rect x="65" y="142" width="120" height="12" rx="6" fill="#00ffff" opacity="0.8"/>
  <rect x="65" y="164" width="150" height="12" rx="6" fill="#00ffff" opacity="0.6"/>
  <rect x="65" y="186" width="90" height="12" rx="6" fill="#00ffff" opacity="0.4"/>
  <!-- Transform arrow -->
  <line x1="255" y1="170" x2="310" y2="170" stroke="#ff00ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="305,155 330,170 305,185" fill="#ff00ff" filter="url(#glow)"/>
  <text x="280" y="155" font-family="monospace" font-size="16" text-anchor="middle" fill="#ff00ff" filter="url(#glow)">TTS</text>
  <!-- Output wave block -->
  <rect x="330" y="120" width="130" height="100" rx="12" stroke="#ff00ff" stroke-width="3" fill="none" filter="url(#glow)"/>
  <polyline points="348,170 362,148 374,192 386,152 398,178 410,162 422,175 434,158 446,170" stroke="#ff00ff" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Echo copies below -->
  <rect x="70" y="270" width="370" height="60" rx="10" stroke="#ffff00" stroke-width="2" fill="none" opacity="0.6" filter="url(#glow)"/>
  <rect x="70" y="270" width="340" height="12" rx="6" fill="#ffff00" opacity="0.5" filter="url(#glow)"/>
  <rect x="100" y="342" width="310" height="50" rx="10" stroke="#ffff00" stroke-width="2" fill="none" opacity="0.35" filter="url(#glow)"/>
  <rect x="100" y="342" width="280" height="10" rx="5" fill="#ffff00" opacity="0.3" filter="url(#glow)"/>
  <rect x="130" y="405" width="250" height="40" rx="10" stroke="#ffff00" stroke-width="1" fill="none" opacity="0.15" filter="url(#glow)"/>
  <!-- Label -->
  <text x="256" y="475" font-family="monospace" font-size="30" text-anchor="middle" fill="#00ffff" font-weight="bold" filter="url(#glow)">ECHO.TEXT</text>
</svg>
