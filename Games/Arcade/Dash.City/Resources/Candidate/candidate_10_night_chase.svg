  <rect x="188" y="186" width="12" height="14" fill="#44aaff" opacity="0.3"/>
  <rect x="144" y="212" width="12" height="14" fill="#ffcc44" opacity="0.4"/>
  <rect x="166" y="212" width="12" height="14" fill="#44aaff" opacity="0.7"/>
