  <line x1="138" y1="206" x2="390" y2="456" stroke="#D32F2F" stroke-width="20" stroke-linecap="round"/>
  <line x1="390" y1="206" x2="138" y2="456" stroke="#D32F2F" stroke-width="20" stroke-linecap="round"/>
  <!-- REG label -->
  <text x="220" y="450" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#D32F2F" text-anchor="middle" opacity="0.6">ERROR</text>
  <!-- Arrow -->
  <rect x="462" y="328" width="104" height="46" rx="22" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <path d="M 560,282 L 632,351 L 560,420 Z" fill="#E91E63" stroke="#880E4F" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right: fixed registry key (green) -->
  <rect x="602" y="180" width="310" height="302" rx="28" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <circle cx="710" cy="296" r="70" fill="#C8E6C9" stroke="#388E3C" stroke-width="14"/>
  <circle cx="710" cy="296" r="38" fill="#FFFFFF" stroke="#388E3C" stroke-width="10"/>
  <rect x="764" y="282" width="120" height="28" rx="14" fill="#388E3C" stroke="#1B5E20" stroke-width="10"/>
  <rect x="858" y="310" width="20" height="36" rx="8" fill="#388E3C"/>
  <rect x="832" y="310" width="20" height="28" rx="8" fill="#388E3C"/>
  <!-- Checkmark over fixed key -->
  <path d="M 638,316 L 688,388 L 778,244" fill="none" stroke="#388E3C" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- FIX badge -->
  <rect x="236" y="752" width="552" height="112" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="836" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">FIX REG</text>
