  <circle cx="624" cy="756" r="16" fill="#C62828" opacity="0.4"/>
  <circle cx="660" cy="730" r="10" fill="#C62828" opacity="0.3"/>
  <!-- Layer 3: 스탬프 찍히는 방향 화살표 -->
