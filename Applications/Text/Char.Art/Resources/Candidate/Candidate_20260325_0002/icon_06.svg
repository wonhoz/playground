<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: Dark matrix -->
  <rect width="1024" height="1024" rx="190" fill="#0D1421"/>

  <!-- Matrix rain columns of ASCII chars -->
  <!-- Column 1: x=230 -->
  <text x="230" y="265" font-family="'Courier New', monospace" font-size="95" font-weight="700"
        text-anchor="middle" fill="#00FF88">@</text>
  <text x="230" y="380" font-family="'Courier New', monospace" font-size="82" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.75)">#</text>
  <text x="230" y="485" font-family="'Courier New', monospace" font-size="75" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.50)">A</text>
  <text x="230" y="580" font-family="'Courier New', monospace" font-size="68" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.28)">$</text>

  <!-- Column 2: x=345 -->
  <text x="345" y="230" font-family="'Courier New', monospace" font-size="88" font-weight="700"
        text-anchor="middle" fill="#00FF88">$</text>
  <text x="345" y="345" font-family="'Courier New', monospace" font-size="78" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.70)">1</text>
  <text x="345" y="445" font-family="'Courier New', monospace" font-size="70" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.45)">%</text>
  <text x="345" y="540" font-family="'Courier New', monospace" font-size="62" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.22)">.</text>

  <!-- Column 3: x=460 -->
  <text x="460" y="250" font-family="'Courier New', monospace" font-size="108" font-weight="900"
        text-anchor="middle" fill="#00FF88">@</text>
  <text x="460" y="385" font-family="'Courier New', monospace" font-size="90" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.80)">#</text>
  <text x="460" y="500" font-family="'Courier New', monospace" font-size="78" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.55)">B</text>
  <text x="460" y="605" font-family="'Courier New', monospace" font-size="68" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.30)">2</text>
  <text x="460" y="695" font-family="'Courier New', monospace" font-size="58" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.14)">0</text>

  <!-- Column 4: x=575 -->
  <text x="575" y="270" font-family="'Courier New', monospace" font-size="92" font-weight="700"
        text-anchor="middle" fill="#00FF88">%</text>
  <text x="575" y="388" font-family="'Courier New', monospace" font-size="82" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.72)">@</text>
  <text x="575" y="490" font-family="'Courier New', monospace" font-size="72" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.48)">C</text>
  <text x="575" y="585" font-family="'Courier New', monospace" font-size="62" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.25)">1</text>

  <!-- Column 5: x=690 -->
  <text x="690" y="245" font-family="'Courier New', monospace" font-size="100" font-weight="900"
        text-anchor="middle" fill="#00FF88">#</text>
  <text x="690" y="368" font-family="'Courier New', monospace" font-size="86" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.78)">$</text>
  <text x="690" y="475" font-family="'Courier New', monospace" font-size="74" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.52)">A</text>
  <text x="690" y="565" font-family="'Courier New', monospace" font-size="64" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.28)">.</text>

  <!-- Column 6: x=800 -->
  <text x="800" y="260" font-family="'Courier New', monospace" font-size="88" font-weight="700"
        text-anchor="middle" fill="#00FF88">0</text>
  <text x="800" y="375" font-family="'Courier New', monospace" font-size="78" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.68)">2</text>
  <text x="800" y="470" font-family="'Courier New', monospace" font-size="68" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.42)">%</text>
  <text x="800" y="555" font-family="'Courier New', monospace" font-size="58" font-weight="700"
        text-anchor="middle" fill="rgba(0,255,136,0.20)">+</text>

  <!-- Bottom glow fade -->
  <rect x="190" y="680" width="644" height="150" rx="8"
        fill="url(#fadeGrad)"/>
  <defs>
    <linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1421" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1421" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
</svg>
