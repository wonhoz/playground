<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#222244"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Text blocks representing clipboard items -->
  <!-- Block 1 (top, active) -->
  <rect x="80" y="80" width="352" height="72" rx="10" fill="#2a3a6a" stroke="#4466cc" stroke-width="2"/>
  <circle cx="108" cy="116" r="16" fill="#4466cc"/>
  <text x="108" y="122" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff">1</text>
  <rect x="136" y="98" width="200" height="10" rx="4" fill="#88aaff"/>
  <rect x="136" y="116" width="160" height="8" rx="3" fill="#6688dd" opacity="0.7"/>
  <rect x="136" y="132" width="180" height="8" rx="3" fill="#6688dd" opacity="0.7"/>
  <!-- Keyboard shortcut -->
  <rect x="360" y="103" width="54" height="26" rx="6" fill="#1a2244" stroke="#4466cc" stroke-width="1.5"/>
  <text x="387" y="120" text-anchor="middle" font-family="monospace" font-size="12" fill="#88aaff">^+1</text>
  <!-- Block 2 -->
  <rect x="80" y="168" width="352" height="72" rx="10" fill="#2a4a3a" stroke="#44aa66" stroke-width="2"/>
  <circle cx="108" cy="204" r="16" fill="#44aa66"/>
  <text x="108" y="210" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff">2</text>
  <rect x="136" y="186" width="220" height="10" rx="4" fill="#66ff99"/>
  <rect x="136" y="204" width="140" height="8" rx="3" fill="#44cc77" opacity="0.7"/>
  <rect x="136" y="220" width="190" height="8" rx="3" fill="#44cc77" opacity="0.7"/>
  <rect x="360" y="191" width="54" height="26" rx="6" fill="#1a2a1a" stroke="#44aa66" stroke-width="1.5"/>
  <text x="387" y="208" text-anchor="middle" font-family="monospace" font-size="12" fill="#66ff99">^+2</text>
  <!-- Block 3 -->
  <rect x="80" y="256" width="352" height="72" rx="10" fill="#3a3a2a" stroke="#aaaa44" stroke-width="2"/>
  <circle cx="108" cy="292" r="16" fill="#aaaa44"/>
  <text x="108" y="298" text-anchor="middle" font-family="monospace" font-size="14" fill="#fff">3</text>
  <rect x="136" y="274" width="180" height="10" rx="4" fill="#ffff66"/>
  <rect x="136" y="292" width="200" height="8" rx="3" fill="#cccc44" opacity="0.7"/>
  <rect x="136" y="308" width="150" height="8" rx="3" fill="#cccc44" opacity="0.7"/>
  <rect x="360" y="279" width="54" height="26" rx="6" fill="#2a2a1a" stroke="#aaaa44" stroke-width="1.5"/>
  <text x="387" y="296" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffff66">^+3</text>
  <!-- Block 4 (empty slot) -->
  <rect x="80" y="344" width="352" height="72" rx="10" fill="#1a1a2e" stroke="#333355" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="108" cy="380" r="16" fill="none" stroke="#333355" stroke-width="2"/>
  <text x="108" y="386" text-anchor="middle" font-family="monospace" font-size="14" fill="#444466">4</text>
  <text x="250" y="386" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#444466" opacity="0.7">empty slot...</text>
  <!-- Ctrl+V hotkey bar -->
  <rect x="80" y="432" width="352" height="44" rx="10" fill="#2255ff" opacity="0.15"/>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="16" fill="#8899ff">Ctrl+Shift+V to cycle</text>
</svg>