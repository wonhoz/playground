<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020610"/>
      <stop offset="100%" stop-color="#030a18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 청사진 배경 격자 -->
  <g opacity="0.15" stroke="#2DD4BF" stroke-width="0.5">
    <line x1="60" y1="60" x2="60" y2="452"/>
    <line x1="100" y1="60" x2="100" y2="452"/>
    <line x1="140" y1="60" x2="140" y2="452"/>
    <line x1="180" y1="60" x2="180" y2="452"/>
    <line x1="220" y1="60" x2="220" y2="452"/>
    <line x1="260" y1="60" x2="260" y2="452"/>
    <line x1="300" y1="60" x2="300" y2="452"/>
    <line x1="340" y1="60" x2="340" y2="452"/>
    <line x1="380" y1="60" x2="380" y2="452"/>
    <line x1="420" y1="60" x2="420" y2="452"/>
    <line x1="60" y1="80" x2="452" y2="80"/>
    <line x1="60" y1="120" x2="452" y2="120"/>
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="200" x2="452" y2="200"/>
    <line x1="60" y1="240" x2="452" y2="240"/>
    <line x1="60" y1="280" x2="452" y2="280"/>
    <line x1="60" y1="320" x2="452" y2="320"/>
    <line x1="60" y1="360" x2="452" y2="360"/>
    <line x1="60" y1="400" x2="452" y2="400"/>
    <line x1="60" y1="440" x2="452" y2="440"/>
  </g>
  <!-- 이미지 A 외곽선 (청사진 스타일) -->
  <rect x="80" y="100" width="160" height="160" rx="6" fill="none" stroke="#2DD4BF" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <!-- A 내부 요소 -->
  <circle cx="140" cy="150" r="28" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.8"/>
  <rect x="106" y="188" width="108" height="50" rx="3" fill="none" stroke="#2DD4BF" stroke-width="1" opacity="0.7"/>
  <!-- 치수선 A -->
  <line x1="80" y1="90" x2="240" y2="90" stroke="#2DD4BF" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="87" x2="80" y2="93" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="87" x2="240" y2="93" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="86" text-anchor="middle" font-size="9" fill="#2DD4BF" opacity="0.7">160px</text>
  <!-- 이미지 B 외곽선 (변경사항 표시) -->
  <rect x="272" y="100" width="160" height="160" rx="6" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  <!-- B 내부 요소 (A와 다름) -->
  <circle cx="342" cy="150" r="32" fill="none" stroke="#F43F5E" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <rect x="290" y="190" width="112" height="48" rx="3" fill="none" stroke="#F43F5E" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <!-- CHANGED 마크 -->
  <circle cx="432" cy="100" r="14" fill="#F43F5E" opacity="0.3" filter="url(#glow)"/>
  <text x="432" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#F43F5E" opacity="0.9">!</text>
  <!-- 차이 연결선 -->
  <line x1="168" y1="150" x2="272" y2="150" stroke="#FDE047" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7" filter="url(#glow)"/>
  <text x="220" y="143" text-anchor="middle" font-size="9" fill="#FDE047" opacity="0.8">+4px</text>
  <!-- 차이 목록 패널 -->
  <rect x="80" y="290" width="352" height="170" rx="8" fill="#020810" stroke="#2DD4BF" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="314" font-size="12" font-weight="bold" fill="#2DD4BF" opacity="0.9">BLUEPRINT DIFF</text>
  <line x1="80" y1="322" x2="432" y2="322" stroke="#1a3a50" stroke-width="1" opacity="0.6"/>
  <!-- 변경 항목들 -->
  <circle cx="98" cy="340" r="4" fill="#F43F5E" opacity="0.8"/>
  <text x="108" y="344" font-size="11" fill="#E0E0E0" opacity="0.8">Circle radius: 28 → 32 (+4px)</text>
  <circle cx="98" cy="362" r="4" fill="#F43F5E" opacity="0.8"/>
  <text x="108" y="366" font-size="11" fill="#E0E0E0" opacity="0.8">Rect height: 50 → 48 (-2px)</text>
  <circle cx="98" cy="384" r="4" fill="#FDE047" opacity="0.8"/>
  <text x="108" y="388" font-size="11" fill="#E0E0E0" opacity="0.8">Rect width: 108 → 112 (+4px)</text>
  <circle cx="98" cy="406" r="4" fill="#4ADE80" opacity="0.8"/>
  <text x="108" y="410" font-size="11" fill="#E0E0E0" opacity="0.8">Border style: unchanged</text>
  <text x="390" y="450" text-anchor="end" font-size="10" fill="#2DD4BF" opacity="0.5">2 changes detected</text>
</svg>
