<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0F1629"/>
    </linearGradient>
    <!-- 파일 색상 -->
    <linearGradient id="fileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <!-- 불꽃 그라데이션 -->
    <radialGradient id="fireCore" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFF176"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="80%" stop-color="#FF5722"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fireOuter" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="40%" stop-color="#FF9500"/>
      <stop offset="70%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="fireInner" x1="0" y1="1" x2="0.2" y2="0">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="60%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Layer1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>

  <!-- 배경 글로우 (불꽃 반사) -->
  <ellipse cx="512" cy="620" rx="280" ry="180" fill="#FF6B35" opacity="0.12" filter="url(#softBlur)"/>
  <ellipse cx="512" cy="580" rx="160" ry="120" fill="#FF9500" opacity="0.18" filter="url(#softBlur)"/>

  <!-- Layer2: 파일 아이콘 메인 바디 -->
  <!-- 파일 본체 -->
  <rect x="320" y="360" width="280" height="360" rx="16" fill="url(#fileGrad)"/>
  <!-- 파일 접힌 모서리 -->
  <polygon points="520,360 600,360 600,440 520,440" fill="#475569"/>
  <polygon points="520,360 600,440 520,440" fill="#94A3B8"/>

  <!-- 파일 내 줄 (코드 라인) -->
  <line x1="356" y1="480" x2="500" y2="480" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
  <line x1="356" y1="510" x2="520" y2="510" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
  <line x1="356" y1="540" x2="480" y2="540" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
  <line x1="356" y1="570" x2="500" y2="570" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
  <line x1="356" y1="600" x2="460" y2="600" stroke="#334155" stroke-width="10" stroke-linecap="round"/>

  <!-- Layer3: 불꽃 효과 (파일 위) -->
  <!-- 외곽 불꽃 -->
  <path d="M 460 370 C 430 310 400 270 420 210 C 400 250 370 230 380 180 C 360 230 330 210 350 160 C 320 210 310 280 340 340 C 310 300 310 340 330 370 C 340 350 380 330 380 280 C 390 330 400 350 420 350 C 410 310 430 290 460 260 C 450 310 460 350 460 370 Z" fill="url(#fireOuter)" filter="url(#fireGlow)" opacity="0.9"/>

  <!-- 중간 불꽃 -->
  <path d="M 510 370 C 490 320 476 280 496 230 C 478 265 460 250 466 210 C 448 250 432 240 444 200 C 424 240 422 300 444 345 C 422 315 424 348 440 368 C 450 348 476 334 476 290 C 486 330 496 352 510 370 Z" fill="url(#fireOuter)" filter="url(#fireGlow)" opacity="0.8"/>

  <!-- 오른쪽 불꽃 -->
  <path d="M 570 370 C 545 315 535 270 550 220 C 535 255 520 245 524 205 C 508 244 500 255 512 300 C 498 274 498 312 514 348 C 524 328 544 318 544 278 C 554 318 566 348 570 370 Z" fill="url(#fireOuter)" filter="url(#fireGlow)" opacity="0.7"/>

  <!-- 핵심 불꽃 (밝은 중심) -->
  <path d="M 512 370 C 492 330 482 296 500 258 C 486 284 472 276 478 246 C 462 276 460 306 476 336 C 464 316 464 340 476 362 C 488 342 500 330 500 302 C 510 330 514 356 512 370 Z" fill="url(#fireInner)" filter="url(#fireGlow)"/>

  <!-- 파일 상단 글로우 오버레이 -->
  <rect x="320" y="340" width="280" height="60" rx="8" fill="url(#fireCore)" opacity="0.6"/>

  <!-- HOT 배지 -->
  <rect x="390" y="686" width="144" height="44" rx="22" fill="#FF6B35"/>
  <text x="462" y="714" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HOT FILE</text>
</svg>
