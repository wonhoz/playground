<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg3)"/>

  <!-- White main card -->
  <rect x="70" y="120" width="884" height="680" rx="32" fill="#FFFFFF" stroke="#1B5E20" stroke-width="16"/>

  <!-- Image preview at top of card -->
  <rect x="100" y="150" width="824" height="300" rx="20" fill="#E8F5E9" stroke="#1B5E20" stroke-width="12"/>
  <!-- Landscape scene -->
  <rect x="100" y="150" width="824" height="300" rx="20" fill="#C8E6C9"/>
  <polygon points="100,450 220,300 330,380 450,280 570,350 680,260 820,350 924,310 924,450" fill="#2E7D32" stroke="#1B5E20" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="100,450 220,380 330,420 450,360 570,410 680,330 820,400 924,370 924,450" fill="#388E3C" stroke="#1B5E20" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="820" cy="210" r="52" fill="#FFD93D" stroke="#1B5E20" stroke-width="10"/>
  <!-- Image quality indicator (pixel grid top-left area → smooth) -->
  <rect x="110" y="158" width="60" height="60" rx="4" fill="#A5D6A7" opacity="0.7"/>
  <rect x="174" y="158" width="30" height="30" rx="3" fill="#81C784" opacity="0.7"/>
  <rect x="208" y="158" width="20" height="20" rx="2" fill="#66BB6A" opacity="0.7"/>

  <!-- Scale factor selection row -->
  <!-- 2x badge -->
  <rect x="100" y="480" width="240" height="200" rx="28" fill="#06D6A0" stroke="#004D40" stroke-width="16"/>
  <text x="220" y="600" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">2x</text>
  <rect x="120" y="636" width="200" height="24" rx="10" fill="#004D40" opacity="0.4"/>

  <!-- 4x badge (highlighted/selected) -->
  <rect x="392" y="460" width="240" height="230" rx="32" fill="#00BFA5" stroke="#004D40" stroke-width="20"/>
  <!-- Selected indicator -->
  <circle cx="512" cy="472" r="18" fill="#FFD93D" stroke="#004D40" stroke-width="8"/>
  <text x="512" y="628" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">4x</text>
  <rect x="410" y="650" width="204" height="26" rx="10" fill="#FFFFFF" opacity="0.4"/>

  <!-- 8x badge -->
  <rect x="684" y="480" width="240" height="200" rx="28" fill="#06D6A0" stroke="#004D40" stroke-width="16"/>
  <text x="804" y="600" font-family="Arial Black, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" text-anchor="middle">8x</text>
  <rect x="704" y="636" width="200" height="24" rx="10" fill="#004D40" opacity="0.4"/>

  <!-- ENHANCE badge -->
  <rect x="242" y="718" width="540" height="70" rx="28" fill="#1B5E20" stroke="#0A3200" stroke-width="12"/>
  <text x="512" y="769" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">ENHANCE</text>

  <!-- Title -->
  <rect x="162" y="836" width="700" height="90" rx="36" fill="#2C3E50" stroke="#1A252F" stroke-width="14"/>
  <text x="512" y="900" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">BRUSH.SCALE</text>
</svg>
