<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 딥 산호/오렌지 계열 -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#1C0A00"/>

  <!-- Layer 1: 크로스워드 격자 (하단 절반, 배경으로) -->
  <!-- 막힌 칸들 -->
  <rect x="196" y="560" width="100" height="100" rx="6" fill="#3E1A00"/>
  <rect x="416" y="560" width="100" height="100" rx="6" fill="#3E1A00"/>
  <rect x="636" y="560" width="100" height="100" rx="6" fill="#3E1A00"/>
  <rect x="196" y="780" width="100" height="64" rx="6" fill="#3E1A00"/>
  <rect x="416" y="780" width="100" height="64" rx="6" fill="#3E1A00"/>
  <rect x="636" y="780" width="100" height="64" rx="6" fill="#3E1A00"/>
  <rect x="736" y="560" width="92" height="100" rx="6" fill="#3E1A00"/>

  <!-- 입력 가능 칸 -->
  <rect x="306" y="560" width="100" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>
  <rect x="526" y="560" width="100" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>

  <rect x="196" y="670" width="100" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>
  <rect x="306" y="670" width="100" height="100" rx="6" fill="#FF6B35" opacity="0.6"/>
  <rect x="416" y="670" width="100" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>
  <rect x="526" y="670" width="100" height="100" rx="6" fill="#FF6B35" opacity="0.6"/>
  <rect x="636" y="670" width="100" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>
  <rect x="736" y="670" width="92" height="100" rx="6" fill="#FF8C42" opacity="0.25"/>

  <rect x="306" y="780" width="100" height="64" rx="6" fill="#FF8C42" opacity="0.25"/>
  <rect x="526" y="780" width="100" height="64" rx="6" fill="#FF8C42" opacity="0.25"/>

  <!-- 격자 알파벳 힌트들 -->
  <text x="356" y="622" font-family="'Arial Black', Arial" font-weight="900" font-size="66" fill="#FF8C42" opacity="0.7" text-anchor="middle" dominant-baseline="middle">H</text>
  <text x="576" y="622" font-family="'Arial Black', Arial" font-weight="900" font-size="66" fill="#FF8C42" opacity="0.7" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="246" y="722" font-family="'Arial Black', Arial" font-weight="700" font-size="66" fill="#FFA559" text-anchor="middle" dominant-baseline="middle">N</text>
  <text x="356" y="722" font-family="'Arial Black', Arial" font-weight="900" font-size="66" fill="#FF6B35" text-anchor="middle" dominant-baseline="middle">T</text>
  <text x="466" y="722" font-family="'Arial Black', Arial" font-weight="700" font-size="66" fill="#FFA559" text-anchor="middle" dominant-baseline="middle">_</text>
  <text x="576" y="722" font-family="'Arial Black', Arial" font-weight="900" font-size="66" fill="#FF6B35" text-anchor="middle" dominant-baseline="middle">S</text>
  <text x="686" y="722" font-family="'Arial Black', Arial" font-weight="700" font-size="66" fill="#FFA559" text-anchor="middle" dominant-baseline="middle">!</text>
  <text x="782" y="722" font-family="'Arial Black', Arial" font-weight="700" font-size="66" fill="#FFA559" text-anchor="middle" dominant-baseline="middle">!</text>

  <!-- Layer 2: 전구 (힌트 메타포) — 상단 중앙 -->
  <!-- 전구 글로우 -->
  <circle cx="512" cy="330" r="195" fill="#FF6B35" opacity="0.08"/>
  <circle cx="512" cy="330" r="155" fill="#FF8C42" opacity="0.12"/>

  <!-- 전구 유리 -->
  <path d="M512,155 C420,155 358,210 350,295 Q344,345 370,385 Q390,415 400,440 L624,440 Q634,415 654,385 Q680,345 674,295 Q666,210 604,155 Z" fill="#FF8C42" opacity="0.3"/>
  <path d="M512,165 C425,165 368,217 360,298 Q354,344 378,381 Q396,409 408,432 L616,432 Q628,409 646,381 Q670,344 664,298 Q656,217 599,165 Z" fill="#FFD180" opacity="0.85"/>

  <!-- 전구 필라멘트 -->
  <path d="M460,340 Q480,290 512,310 Q544,330 564,280" fill="none" stroke="#FF6B35" stroke-width="10" stroke-linecap="round"/>
  <circle cx="512" cy="295" r="12" fill="#FF6B35"/>

  <!-- 전구 받침 -->
  <rect x="470" y="440" width="84" height="28" rx="4" fill="#CC5500" opacity="0.9"/>
  <rect x="478" y="468" width="68" height="24" rx="3" fill="#CC5500" opacity="0.8"/>
  <rect x="486" y="492" width="52" height="22" rx="3" fill="#994400" opacity="0.9"/>
  <rect x="492" y="514" width="40" height="14" rx="3" fill="#994400"/>

  <!-- 광선 효과 -->
  <line x1="512" y1="155" x2="512" y2="120" stroke="#FFD180" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="358" y1="220" x2="332" y2="200" stroke="#FFD180" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="666" y1="220" x2="692" y2="200" stroke="#FFD180" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="310" y1="340" x2="272" y2="340" stroke="#FFD180" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="714" y1="340" x2="752" y2="340" stroke="#FFD180" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Layer 3: 물음표 (힌트) -->
  <text x="512" y="340" font-family="'Arial Black', Arial" font-weight="900" font-size="140" fill="#FF6B35" text-anchor="middle" dominant-baseline="middle" opacity="0.9">?</text>
</svg>
