<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Furnace door with glowing prompt text inside -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#0D0500"/>
  <!-- Furnace body -->
  <rect x="200" y="240" width="624" height="540" rx="32" fill="#1A0900" stroke="#BF360C" stroke-width="28"/>
  <!-- Furnace door (arched) -->
  <path d="M320 460 L320 700 L704 700 L704 460 Q704 360 512 360 Q320 360 320 460 Z" fill="#0D0500" stroke="#FF6D00" stroke-width="20"/>
  <!-- Glowing inside fire glow -->
  <path d="M350 480 L350 680 L674 680 L674 480 Q674 400 512 400 Q350 400 350 480 Z" fill="#FF3D00" opacity="0.12"/>
  <!-- Prompt text lines glowing in furnace -->
  <rect x="380" y="480" width="264" height="20" rx="10" fill="#FF9100" opacity="0.8"/>
  <rect x="380" y="520" width="210" height="20" rx="10" fill="#FF9100" opacity="0.6"/>
  <rect x="380" y="560" width="240" height="20" rx="10" fill="#FF9100" opacity="0.6"/>
  <rect x="380" y="600" width="180" height="20" rx="10" fill="#FF9100" opacity="0.4"/>
  <!-- Forge glow emanating from door bottom -->
  <ellipse cx="512" cy="706" rx="240" ry="22" fill="#FF6D00" opacity="0.4"/>
  <!-- Chimney smoke top -->
  <rect x="460" y="180" width="40" height="64" rx="10" fill="#BF360C"/>
  <rect x="524" y="160" width="40" height="84" rx="10" fill="#BF360C"/>
  <!-- Handle bar -->
  <rect x="488" y="708" width="48" height="24" rx="8" fill="#FF6D00"/>
</svg>
