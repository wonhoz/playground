<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#102030"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#44AAFF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00AA44"/>
      <stop offset="100%" stop-color="#44FF88"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#CC6600"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Drive icon top -->
  <rect x="176" y="55" width="160" height="110" rx="12" fill="#1A2A3A" stroke="#2A4060" stroke-width="2"/>
  <rect x="192" y="70" width="128" height="80" rx="8" fill="#0D1E2E"/>
  <circle cx="256" cy="110" r="28" fill="none" stroke="#2A4060" stroke-width="2"/>
  <circle cx="256" cy="110" r="16" fill="none" stroke="#1E3050" stroke-width="1.5"/>
  <circle cx="256" cy="110" r="5" fill="#3A5070"/>
  <rect x="192" y="155" width="6" height="10" rx="1" fill="#5588AA"/>
  <rect x="204" y="155" width="6" height="10" rx="1" fill="#5588AA"/>
  <!-- Grid lines -->
  <line x1="60" y1="200" x2="452" y2="200" stroke="#1E3040" stroke-width="1"/>
  <line x1="60" y1="240" x2="452" y2="240" stroke="#1E3040" stroke-width="1"/>
  <line x1="60" y1="280" x2="452" y2="280" stroke="#1E3040" stroke-width="1"/>
  <line x1="60" y1="320" x2="452" y2="320" stroke="#1E3040" stroke-width="1"/>
  <line x1="60" y1="360" x2="452" y2="360" stroke="#253545" stroke-width="1.5"/>
  <!-- Bars: SEQ Read, SEQ Write, Random -->
  <rect x="90" y="215" width="80" height="145" rx="5" fill="url(#bar1)"/>
  <rect x="210" y="238" width="80" height="122" rx="5" fill="url(#bar2)"/>
  <rect x="330" y="272" width="80" height="88" rx="5" fill="url(#bar3)"/>
  <!-- Labels -->
  <text x="130" y="376" font-family="Arial" font-size="11" fill="#4488FF" text-anchor="middle">SEQ R</text>
  <text x="250" y="376" font-family="Arial" font-size="11" fill="#44FF88" text-anchor="middle">SEQ W</text>
  <text x="370" y="376" font-family="Arial" font-size="11" fill="#FFAA00" text-anchor="middle">RAND</text>
  <!-- Values -->
  <text x="130" y="210" font-family="Arial" font-size="12" fill="#88CCFF" text-anchor="middle">7200</text>
  <text x="250" y="233" font-family="Arial" font-size="12" fill="#88FFBB" text-anchor="middle">6800</text>
  <text x="370" y="267" font-family="Arial" font-size="12" fill="#FFCC66" text-anchor="middle">4200</text>
  <text x="256" y="455" font-family="Arial" font-size="24" font-weight="bold" fill="#44AAFF" text-anchor="middle">DRIVE·BENCH</text>
</svg>
