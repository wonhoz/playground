<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="n9-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <radialGradient id="n9-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFE600" stop-opacity="0.60"/>
      <stop offset="60%" stop-color="#FFE600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFE600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#n9-clip)">
    <!-- Background: dark near-black -->
    <rect width="1024" height="1024" fill="#080800"/>
    <!-- Grid (electric yellow tint) -->
    <g stroke="#FFE600" stroke-width="0.7" opacity="0.06">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="682" x2="1024" y2="682"/>
      <line x1="0" y1="852" x2="1024" y2="852"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="682" y1="0" x2="682" y2="1024"/>
      <line x1="852" y1="0" x2="852" y2="1024"/>
    </g>

    <!-- Lightning glow halo -->
    <circle cx="512" cy="512" r="420" fill="url(#n9-glow)"/>

    <!-- Central lightning bolt ⚡ (hand-drawn as path) -->
    <!-- Main bolt: top-center down to bottom-center, zigzag -->
    <polygon points="560,210 440,520 530,520 420,814 600,470 500,470"
             fill="#FFE600" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" opacity="0.98"/>
    <!-- Inner highlight -->
    <polygon points="548,260 460,510 528,510 440,760 576,490 500,490"
             fill="#FFFFFF" opacity="0.40"/>

    <!-- Shockwave rings (screen clear effect) -->
    <circle cx="512" cy="512" r="160" fill="none" stroke="#FFE600" stroke-width="6" opacity="0.55"/>
    <circle cx="512" cy="512" r="240" fill="none" stroke="#FFE600" stroke-width="4" opacity="0.35"/>
    <circle cx="512" cy="512" r="330" fill="none" stroke="#FFE600" stroke-width="3" opacity="0.20"/>

    <!-- Cleared shapes (fading outlines — screen cleared) -->
    <circle cx="260" cy="400" r="52" fill="none" stroke="#FFE600" stroke-width="4" opacity="0.25"/>
    <polygon points="764,340 804,414 724,414" fill="none" stroke="#FFE600" stroke-width="4" opacity="0.25"/>
    <rect x="226" y="620" width="88" height="88" rx="10" fill="none" stroke="#FFE600" stroke-width="4" opacity="0.20" transform="rotate(15 270 664)"/>
    <circle cx="780" cy="640" r="46" fill="none" stroke="#FFE600" stroke-width="4" opacity="0.22"/>

    <!-- Score popup: +20 (5 cleared × 5pts) -->
    <text x="780" y="440"
          font-family="Arial Black, Arial, sans-serif"
          font-weight="900"
          font-size="68"
          fill="#FFE600"
          text-anchor="middle"
          opacity="0.85">+20</text>
  </g>
</svg>
