<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FFFBEB"/>
  <!-- Layer 2: Cat face outline -->
  <!-- Cat head (circle) -->
  <circle cx="512" cy="520" r="290" fill="none" stroke="#374151" stroke-width="8"/>
  <!-- Cat ears -->
  <polygon points="300,310 260,180 390,280" fill="none" stroke="#374151" stroke-width="8"/>
  <polygon points="724,310 764,180 634,280" fill="none" stroke="#374151" stroke-width="8"/>
  <!-- Layer 3: ASCII art characters filling the face -->
  <!-- Top of head -->
  <text x="400" y="295" font-family="Consolas,monospace" font-size="20" fill="#374151">@@@@@@@@@</text>
  <!-- Eyes area -->
  <text x="340" y="455" font-family="Consolas,monospace" font-size="20" fill="#374151">##  #####  ##</text>
  <!-- Eyes highlighted -->
  <text x="348" y="455" font-family="Consolas,monospace" font-size="20" fill="#1E3A8A" font-weight="bold">##</text>
  <text x="564" y="455" font-family="Consolas,monospace" font-size="20" fill="#1E3A8A" font-weight="bold">##</text>
  <!-- Nose and mouth -->
  <text x="420" y="515" font-family="Consolas,monospace" font-size="20" fill="#374151">## *** ##</text>
  <text x="380" y="555" font-family="Consolas,monospace" font-size="20" fill="#374151">@@@  ~~~  @@@</text>
  <text x="360" y="595" font-family="Consolas,monospace" font-size="20" fill="#6B7280">#### . . . ####</text>
  <text x="340" y="635" font-family="Consolas,monospace" font-size="20" fill="#9CA3AF">######.....######</text>
  <!-- Whiskers (text dashes) -->
  <text x="170" y="510" font-family="Consolas,monospace" font-size="22" fill="#374151">---</text>
  <text x="170" y="540" font-family="Consolas,monospace" font-size="22" fill="#374151">---</text>
  <text x="736" y="510" font-family="Consolas,monospace" font-size="22" fill="#374151">---</text>
  <text x="736" y="540" font-family="Consolas,monospace" font-size="22" fill="#374151">---</text>
</svg>