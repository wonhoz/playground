    <rect x="546" y="370" width="106" height="48" rx="8" fill="#5AC8FA"/>
    <rect x="662" y="370" width="106" height="48" rx="8" fill="#44AAEE"/>
    <rect x="778" y="370" width="106" height="48" rx="8" fill="#5AC8FA"/>
    <rect x="82" y="370" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="314" y="370" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
    <rect x="546" y="370" width="106" height="14" rx="7" fill="white" opacity="0.13"/>
