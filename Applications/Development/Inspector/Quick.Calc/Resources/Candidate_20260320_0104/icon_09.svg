<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#050010"/>
  <!-- Circular dial calculator -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#4527A0" stroke-width="28"/>
  <circle cx="512" cy="512" r="280" fill="#4527A0" opacity="0.15"/>
  <!-- Dial marks (numbers around) -->
  <rect x="500" y="190" width="24" height="56" rx="8" fill="#9575CD"/>
  <rect x="500" y="778" width="24" height="56" rx="8" fill="#9575CD" opacity="0.6"/>
  <rect x="190" y="500" width="56" height="24" rx="8" fill="#9575CD" opacity="0.6"/>
  <rect x="778" y="500" width="56" height="24" rx="8" fill="#9575CD"/>
  <!-- Diagonal marks -->
  <rect x="698" y="218" width="24" height="46" rx="8" fill="#9575CD" opacity="0.5" transform="rotate(45 710 241)"/>
  <rect x="302" y="218" width="24" height="46" rx="8" fill="#9575CD" opacity="0.5" transform="rotate(-45 314 241)"/>
  <rect x="698" y="718" width="24" height="46" rx="8" fill="#9575CD" opacity="0.5" transform="rotate(-45 710 741)"/>
  <rect x="302" y="718" width="24" height="46" rx="8" fill="#9575CD" opacity="0.5" transform="rotate(45 314 741)"/>
  <!-- Pointer needle -->
  <line x1="512" y1="512" x2="680" y2="280" stroke="#9575CD" stroke-width="18" stroke-linecap="round"/>
  <circle cx="512" cy="512" r="30" fill="#9575CD"/>
  <circle cx="512" cy="512" r="16" fill="#050010"/>
  <!-- Center display -->
  <circle cx="512" cy="512" r="100" fill="none" stroke="#4527A0" stroke-width="12"/>
  <rect x="456" y="492" width="112" height="40" rx="10" fill="#9575CD" opacity="0.4"/>
</svg>
