<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background spring green -->
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg06)"/>
  <!-- Layer 2: Seed (small) on left, big tree on right -->
  <!-- Small seed/sprout left -->
  <circle cx="240" cy="760" r="44" fill="#8D6E63"/>
  <ellipse cx="240" cy="710" rx="22" ry="44" fill="#66BB6A"/>
  <path d="M216 740 Q180 690 160 650" stroke="#388E3C" stroke-width="14" stroke-linecap="round" fill="none"/>
  <ellipse cx="148" cy="638" rx="36" ry="22" fill="#A5D6A7" transform="rotate(-30 148 638)"/>
  <!-- Arrow up and right -->
  <path d="M310 700 Q480 600 600 400" stroke="#2E7D32" stroke-width="20" stroke-linecap="round" stroke-dasharray="20 12" fill="none"/>
  <polygon points="570,380 610,350 640,400" fill="#2E7D32"/>
  <!-- Big tree right -->
  <!-- Trunk -->
  <rect x="680" y="640" width="80" height="200" rx="20" fill="#795548"/>
  <!-- Canopy layers -->
  <ellipse cx="720" cy="600" rx="180" ry="120" fill="#43A047"/>
  <ellipse cx="720" cy="480" rx="150" ry="110" fill="#388E3C"/>
  <ellipse cx="720" cy="370" rx="110" ry="90" fill="#2E7D32"/>
  <!-- Layer 3: Photo frame hanging on big tree -->
  <rect x="640" y="500" width="110" height="90" rx="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="648" y="508" width="94" height="74" rx="6" fill="#90CAF9"/>
  <polygon points="695 530 666 560 724 560" fill="#1565C0" opacity="0.7"/>
  <circle cx="690" cy="522" r="10" fill="#FFD740"/>
  <!-- Scale label -->
  <rect x="130" y="820" width="220" height="80" rx="18" fill="#1B5E20" opacity="0.85"/>
  <text x="240" y="876" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FFFFFF" text-anchor="middle">Scale</text>
</svg>
