<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050808"/>
  <!-- 대포 + 포탄 발사: 대포 측면 -->
  <!-- cannon wheels -->
  <circle cx="340" cy="680" r="70" fill="none" stroke="#37474F" stroke-width="20"/>
  <circle cx="340" cy="680" r="20" fill="#37474F"/>
  <line x1="340" y1="610" x2="340" y2="750" stroke="#37474F" stroke-width="12"/>
  <line x1="270" y1="680" x2="410" y2="680" stroke="#37474F" stroke-width="12"/>
  <circle cx="520" cy="700" r="55" fill="none" stroke="#37474F" stroke-width="18"/>
  <circle cx="520" cy="700" r="16" fill="#37474F"/>
  <!-- cannon barrel -->
  <rect x="320" y="500" width="360" height="90" rx="45" fill="#37474F" transform="rotate(-20 500 545)"/>
  <!-- barrel reinforcement rings -->
  <rect x="360" y="508" width="18" height="74" rx="4" fill="#B0BEC5" opacity="0.4" transform="rotate(-20 369 545)"/>
  <rect x="420" y="504" width="18" height="78" rx="4" fill="#B0BEC5" opacity="0.4" transform="rotate(-20 429 543)"/>
  <!-- muzzle flash -->
  <ellipse cx="720" cy="418" rx="50" ry="30" fill="#B0BEC5" opacity="0.5" transform="rotate(-20 720 418)"/>
  <ellipse cx="748" cy="406" rx="30" ry="18" fill="#B0BEC5" opacity="0.7" transform="rotate(-20 748 406)"/>
  <!-- cannonball in flight -->
  <circle cx="820" cy="330" r="36" fill="#B0BEC5"/>
  <!-- cannonball trail -->
  <path d="M750 395 Q790 370 810 340" fill="none" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round" opacity="0.5" stroke-dasharray="10 6"/>
</svg>
