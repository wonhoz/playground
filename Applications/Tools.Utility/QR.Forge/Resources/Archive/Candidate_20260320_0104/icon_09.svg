<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- 퍼즐 QR: 3x3 QR + 한 조각 빠진 퍼즐 -->
  <rect x="212" y="212" width="600" height="600" rx="16" fill="#0A180A"/>
  <!-- QR 파인더 패턴 -->
  <rect x="228" y="228" width="152" height="152" rx="12" fill="none" stroke="#66BB6A" stroke-width="20"/>
  <rect x="260" y="260" width="88" height="88" rx="6" fill="#66BB6A"/>
  <rect x="644" y="228" width="152" height="152" rx="12" fill="none" stroke="#66BB6A" stroke-width="20"/>
  <rect x="676" y="260" width="88" height="88" rx="6" fill="#66BB6A"/>
  <rect x="228" y="644" width="152" height="152" rx="12" fill="none" stroke="#66BB6A" stroke-width="20"/>
  <rect x="260" y="676" width="88" height="88" rx="6" fill="#66BB6A"/>
  <!-- 데이터 모듈 -->
  <rect x="412" y="228" width="44" height="44" rx="5" fill="#1B5E20"/>
  <rect x="468" y="228" width="44" height="44" rx="5" fill="#66BB6A"/>
  <rect x="524" y="228" width="44" height="44" rx="5" fill="#1B5E20"/>
  <rect x="580" y="228" width="44" height="44" rx="5" fill="#66BB6A"/>
  <rect x="228" y="412" width="44" height="44" rx="5" fill="#66BB6A"/>
  <rect x="284" y="412" width="44" height="44" rx="5" fill="#1B5E20"/>
  <rect x="340" y="412" width="44" height="44" rx="5" fill="#66BB6A"/>
  <!-- 빠진 퍼즐 조각 (점선 윤곽) -->
  <rect x="412" y="500" width="200" height="200" rx="12" fill="none" stroke="#66BB6A" stroke-width="8" stroke-dasharray="16,8"/>
  <!-- 퍼즐 조각 (비어있는 곳 옆에 떠있는) -->
  <rect x="680" y="580" width="120" height="120" rx="12" fill="#1B5E20"/>
  <circle cx="680" cy="640" r="20" fill="#0A180A"/>
  <circle cx="740" cy="580" r="20" fill="#1B5E20"/>
  <rect x="680" y="580" width="120" height="120" rx="12" fill="none" stroke="#66BB6A" stroke-width="8"/>
  <rect x="700" y="600" width="80" height="80" rx="6" fill="#66BB6A" opacity="0.5"/>
</svg>