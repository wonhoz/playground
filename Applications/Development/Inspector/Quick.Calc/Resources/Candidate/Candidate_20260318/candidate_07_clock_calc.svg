<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030812"/>
      <stop offset="100%" stop-color="#050f20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="250" r="185" fill="#04091a" stroke="#3B82F6" stroke-width="3"/>
  <circle cx="256" cy="250" r="170" fill="none" stroke="#1D4ED8" stroke-width="1" opacity="0.3"/>
  <!-- Math operation markers instead of hours -->
  <text x="256" y="88" text-anchor="middle" font-family="monospace" font-size="18" fill="#60A5FA">÷</text>
  <text x="418" y="138" font-family="monospace" font-size="18" fill="#3B82F6">×</text>
  <text x="436" y="260" font-family="monospace" font-size="18" fill="#60A5FA">+</text>
  <text x="410" y="380" font-family="monospace" font-size="18" fill="#3B82F6">^</text>
  <text x="248" y="432" text-anchor="middle" font-family="monospace" font-size="18" fill="#60A5FA">-</text>
  <text x="74" y="380" font-family="monospace" font-size="18" fill="#3B82F6">%</text>
  <text x="60" y="260" font-family="monospace" font-size="18" fill="#60A5FA">√</text>
  <text x="84" y="140" font-family="monospace" font-size="18" fill="#3B82F6">∑</text>
  <text x="195" y="100" font-family="monospace" font-size="16" fill="#93C5FD" opacity="0.6">π</text>
  <text x="350" y="108" font-family="monospace" font-size="16" fill="#93C5FD" opacity="0.6">φ</text>
  <text x="400" y="334" font-family="monospace" font-size="16" fill="#93C5FD" opacity="0.6">∞</text>
  <text x="90" y="334" font-family="monospace" font-size="16" fill="#93C5FD" opacity="0.6">e</text>
  <!-- Clock hands (pointing to × at 2 and + at 3) -->
  <line x1="256" y1="250" x2="356" y2="160" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="250" x2="390" y2="250" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <!-- Result display at bottom of clock face -->
  <text x="256" y="300" text-anchor="middle" font-family="monospace" font-size="11" fill="#93C5FD" opacity="0.5">× = </text>
  <text x="300" y="300" font-family="monospace" font-size="14" fill="#60A5FA" font-weight="bold">12</text>
  <!-- Center cap -->
  <circle cx="256" cy="250" r="10" fill="#3B82F6"/>
</svg>
