<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 청록+파랑 -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006064"/>
      <stop offset="100%" style="stop-color:#26C6DA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: ICO 멀티사이즈 표현 (작은→큰 아이콘들) -->
  <!-- 중심 ICO 레이블 -->
  <text x="512" y="200" font-family="Segoe UI, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
  <!-- 16px 아이콘 (좌상단) -->
  <rect x="180" y="290" width="100" height="100" rx="12" fill="white" opacity="0.9" stroke="#26C6DA" stroke-width="6"/>
  <rect x="195" y="305" width="70" height="70" rx="8" fill="#00838F"/>
  <text x="230" y="350" font-family="Segoe UI, sans-serif" font-size="28" fill="white" text-anchor="middle">16</text>
  <!-- 32px 아이콘 -->
  <rect x="360" y="270" width="130" height="130" rx="16" fill="white" opacity="0.9" stroke="#26C6DA" stroke-width="6"/>
  <rect x="378" y="288" width="94" height="94" rx="10" fill="#00838F"/>
  <text x="425" y="344" font-family="Segoe UI, sans-serif" font-size="36" fill="white" text-anchor="middle">32</text>
  <!-- 48px 아이콘 -->
  <rect x="560" y="250" width="160" height="160" rx="20" fill="white" opacity="0.9" stroke="#26C6DA" stroke-width="6"/>
  <rect x="580" y="270" width="120" height="120" rx="14" fill="#00ACC1"/>
  <text x="640" y="340" font-family="Segoe UI, sans-serif" font-size="44" fill="white" text-anchor="middle">48</text>
  <!-- 128px 아이콘 (아래) -->
  <rect x="200" y="470" width="200" height="200" rx="24" fill="white" opacity="0.9" stroke="#26C6DA" stroke-width="8"/>
  <rect x="222" y="492" width="156" height="156" rx="16" fill="#0097A7"/>
  <text x="300" y="584" font-family="Segoe UI, sans-serif" font-size="54" fill="white" text-anchor="middle">128</text>
  <!-- 256px 아이콘 (우하단, 가장 크게) -->
  <rect x="480" y="440" width="340" height="340" rx="32" fill="white" opacity="0.95" stroke="#26C6DA" stroke-width="8"/>
  <rect x="506" y="466" width="288" height="288" rx="22" fill="#00838F"/>
  <text x="650" y="628" font-family="Segoe UI, sans-serif" font-size="84" font-weight="bold" fill="white" text-anchor="middle">256</text>
  <!-- Layer 3: 연결선 (크기 관계 표시) -->
  <line x1="285" y1="390" x2="365" y2="380" stroke="white" stroke-width="5" stroke-dasharray="10,8" opacity="0.5"/>
  <line x1="492" y1="380" x2="558" y2="370" stroke="white" stroke-width="5" stroke-dasharray="10,8" opacity="0.5"/>
</svg>
