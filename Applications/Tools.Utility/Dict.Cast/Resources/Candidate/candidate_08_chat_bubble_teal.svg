<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <linearGradient id="bubbleB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bubble 1 (English, left) -->
  <rect x="72" y="100" width="240" height="110" rx="18" fill="url(#bubbleA)" stroke="#00ACC1" stroke-width="3"/>
  <polygon points="104,210 82,245 136,210" fill="url(#bubbleA)" stroke="#00ACC1" stroke-width="2"/>
  <text x="192" y="143" text-anchor="middle" font-family="'Segoe UI Bold', sans-serif" font-size="18" font-weight="bold" fill="#006064">Thank you</text>
  <text x="192" y="165" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#00838F">for your kindness</text>
  <text x="192" y="194" text-anchor="middle" font-family="monospace" font-size="11" fill="#0097A7">[ English ]</text>
  <!-- Translate badge center -->
  <circle cx="256" cy="282" r="36" fill="#004D5C" stroke="#1DE9B6" stroke-width="4"/>
  <text x="256" y="289" text-anchor="middle" font-size="24" fill="#1DE9B6">⇄</text>
  <!-- Bubble 2 (Korean, right) -->
  <rect x="200" y="330" width="240" height="110" rx="18" fill="url(#bubbleB)" stroke="#1DE9B6" stroke-width="3"/>
  <polygon points="408,330 430,295 376,330" fill="url(#bubbleB)" stroke="#1DE9B6" stroke-width="2"/>
  <text x="320" y="373" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="18" font-weight="bold" fill="white">감사합니다</text>
  <text x="320" y="395" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="14" fill="#E0F7FA">친절에 감사드려요</text>
  <text x="320" y="422" text-anchor="middle" font-family="monospace" font-size="11" fill="#B2EBF2">[ Korean ]</text>
  <!-- Flag indicators -->
  <rect x="72" y="100" width="36" height="20" rx="4" fill="#B71C1C"/>
  <text x="90" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="white">EN</text>
  <rect x="200" y="330" width="36" height="20" rx="4" fill="#1A237E"/>
  <text x="218" y="344" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KO</text>
</svg>
