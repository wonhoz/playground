<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#100508"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 다이아몬드 모자이크 패턴 -->
  <!-- 행 1 -->
  <polygon points="90,80 130,120 90,160 50,120" fill="#F43F5E" opacity="0.9"/>
  <polygon points="170,80 210,120 170,160 130,120" fill="#9F1239" opacity="0.7"/>
  <polygon points="250,80 290,120 250,160 210,120" fill="#F43F5E" opacity="0.85"/>
  <polygon points="330,80 370,120 330,160 290,120" fill="#BE185D" opacity="0.8"/>
  <polygon points="410,80 450,120 410,160 370,120" fill="#F43F5E" opacity="0.9"/>
  <!-- 행 2 -->
  <polygon points="50,120 90,160 50,200 10,160" fill="#BE185D" opacity="0.7"/>
  <polygon points="130,120 170,160 130,200 90,160" fill="#F43F5E" opacity="0.95" filter="url(#glow)"/>
  <polygon points="210,120 250,160 210,200 170,160" fill="#9F1239" opacity="0.8"/>
  <polygon points="290,120 330,160 290,200 250,160" fill="#F43F5E" opacity="0.9"/>
  <polygon points="370,120 410,160 370,200 330,160" fill="#BE185D" opacity="0.75"/>
  <polygon points="450,120 490,160 450,200 410,160" fill="#F43F5E" opacity="0.85"/>
  <!-- 행 3 -->
  <polygon points="90,160 130,200 90,240 50,200" fill="#F43F5E" opacity="0.8"/>
  <polygon points="170,160 210,200 170,240 130,200" fill="#BE185D" opacity="0.9"/>
  <polygon points="250,160 290,200 250,240 210,200" fill="#F43F5E" opacity="0.95" filter="url(#glow)"/>
  <polygon points="330,160 370,200 330,240 290,200" fill="#9F1239" opacity="0.8"/>
  <polygon points="410,160 450,200 410,240 370,200" fill="#F43F5E" opacity="0.9"/>
  <!-- 행 4 -->
  <polygon points="50,200 90,240 50,280 10,240" fill="#9F1239" opacity="0.7"/>
  <polygon points="130,200 170,240 130,280 90,240" fill="#F43F5E" opacity="0.85"/>
  <polygon points="210,200 250,240 210,280 170,240" fill="#BE185D" opacity="0.8"/>
  <polygon points="290,200 330,240 290,280 250,240" fill="#F43F5E" opacity="0.9" filter="url(#glow)"/>
  <polygon points="370,200 410,240 370,280 330,240" fill="#9F1239" opacity="0.85"/>
  <polygon points="450,200 490,240 450,280 410,240" fill="#F43F5E" opacity="0.75"/>
  <!-- 행 5 -->
  <polygon points="90,240 130,280 90,320 50,280" fill="#F43F5E" opacity="0.9"/>
  <polygon points="170,240 210,280 170,320 130,280" fill="#9F1239" opacity="0.8"/>
  <polygon points="250,240 290,280 250,320 210,280" fill="#F43F5E" opacity="0.85"/>
  <polygon points="330,240 370,280 330,320 290,280" fill="#BE185D" opacity="0.9"/>
  <polygon points="410,240 450,280 410,320 370,280" fill="#F43F5E" opacity="0.8"/>
  <!-- 행 6 (페이드아웃) -->
  <polygon points="130,280 170,320 130,360 90,320" fill="#F43F5E" opacity="0.5"/>
  <polygon points="210,280 250,320 210,360 170,320" fill="#BE185D" opacity="0.45"/>
  <polygon points="290,280 330,320 290,360 250,320" fill="#F43F5E" opacity="0.5"/>
  <polygon points="370,280 410,320 370,360 330,320" fill="#9F1239" opacity="0.4"/>
  <!-- 하단 패널 -->
  <rect x="80" y="370" width="352" height="80" rx="10" fill="#0a0508" stroke="#F43F5E" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="402" text-anchor="middle" font-size="16" font-weight="bold" fill="#F43F5E" filter="url(#glow)" opacity="0.9">DIAMOND MOSAIC</text>
  <text x="256" y="425" text-anchor="middle" font-size="11" fill="#888" opacity="0.7">다이아몬드 격자 패턴</text>
  <!-- 중앙 강조 다이아몬드 -->
  <polygon points="256,295 276,315 256,335 236,315" fill="#F43F5E" filter="url(#glow)" opacity="0.95"/>
</svg>
