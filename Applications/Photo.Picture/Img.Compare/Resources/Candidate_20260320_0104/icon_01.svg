<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050010"/>
<!-- 컨셉: 좌우 분할 슬라이더 -->
<!-- 왼쪽 이미지 (어두운 톤) -->
<rect x="160" y="220" width="352" height="580" rx="16" fill="#1A0040"/>
<!-- 왼쪽 이미지 내용 (산 실루엣) -->
<path d="M 180 760 L 280 480 L 380 620 L 450 520 L 500 760 Z" fill="#4527A0" opacity="0.7"/>
<!-- 오른쪽 이미지 (밝은 톤) -->
<rect x="512" y="220" width="352" height="580" rx="16" fill="#200050"/>
<!-- 오른쪽 이미지 내용 (같은 산, 밝게) -->
<path d="M 524 760 L 624 480 L 724 620 L 794 520 L 864 760 Z" fill="#CE93D8" opacity="0.5"/>
<!-- 슬라이더 선 (중앙) -->
<line x1="512" y1="200" x2="512" y2="840" stroke="#CE93D8" stroke-width="8"/>
<!-- 슬라이더 핸들 -->
<circle cx="512" cy="512" r="40" fill="#4527A0" stroke="#CE93D8" stroke-width="16"/>
<!-- 핸들 좌우 화살표 -->
<path d="M 468 512 L 440 512 M 452 492 L 432 512 L 452 532" fill="none" stroke="#CE93D8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 556 512 L 584 512 M 572 492 L 592 512 L 572 532" fill="none" stroke="#CE93D8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
