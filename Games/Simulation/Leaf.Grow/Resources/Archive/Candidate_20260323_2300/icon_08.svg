<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="timeline08" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <clipPath id="clip08">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>

  <!-- 그리드 라인 미묘한 -->
  <line x1="200" y1="250" x2="200" y2="800" stroke="#374151" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="250" x2="400" y2="800" stroke="#374151" stroke-width="2" opacity="0.5"/>
  <line x1="600" y1="250" x2="600" y2="800" stroke="#374151" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="250" x2="800" y2="800" stroke="#374151" stroke-width="2" opacity="0.5"/>

  <!-- Layer 2: 타임라인 축 -->
  <line x1="140" y1="760" x2="900" y2="760" stroke="url(#timeline08)" stroke-width="8" stroke-linecap="round"/>
  <!-- 화살표 -->
  <polygon points="880,745 910,760 880,775" fill="#6EE7B7"/>

  <!-- 시간 눈금 -->
  <line x1="200" y1="750" x2="200" y2="775" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round"/>
  <line x1="400" y1="750" x2="400" y2="775" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round"/>
  <line x1="600" y1="750" x2="600" y2="775" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="750" x2="800" y2="775" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round"/>

  <!-- 시간 레이블 -->
  <text x="200" y="810" font-family="sans-serif" font-size="32" fill="#9CA3AF" text-anchor="middle">D1</text>
  <text x="400" y="810" font-family="sans-serif" font-size="32" fill="#9CA3AF" text-anchor="middle">D7</text>
  <text x="600" y="810" font-family="sans-serif" font-size="32" fill="#9CA3AF" text-anchor="middle">D30</text>
  <text x="800" y="810" font-family="sans-serif" font-size="32" fill="#9CA3AF" text-anchor="middle">D90</text>

  <!-- Layer 2: 성장 곡선 -->
  <path d="M 140 750 Q 250 740 400 680 Q 550 580 600 450 Q 650 330 800 220" stroke="#6EE7B7" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- 성장 단계 아이콘들 -->
  <!-- D1: 씨앗 -->
  <circle cx="200" cy="745" r="20" fill="#1F2937" stroke="#6EE7B7" stroke-width="6"/>
  <ellipse cx="200" cy="745" rx="10" ry="7" fill="#A7F3D0"/>

  <!-- D7: 새싹 -->
  <circle cx="400" cy="680" r="20" fill="#1F2937" stroke="#6EE7B7" stroke-width="6"/>
  <line x1="400" y1="692" x2="400" y2="672" stroke="#4ADE80" stroke-width="8" stroke-linecap="round"/>
  <path d="M 398 677 Q 386 668 383 660 Q 392 662 398 670" fill="#4ADE80"/>

  <!-- D30: 식물 -->
  <circle cx="600" cy="450" r="20" fill="#1F2937" stroke="#6EE7B7" stroke-width="6"/>
  <line x1="600" y1="462" x2="600" y2="440" stroke="#4ADE80" stroke-width="7" stroke-linecap="round"/>
  <path d="M 598 448 Q 587 440 584 432 Q 593 434 598 442" fill="#4ADE80"/>
  <path d="M 602 444 Q 613 436 616 428 Q 607 430 602 438" fill="#4ADE80"/>

  <!-- D90: 나무 -->
  <circle cx="800" cy="220" r="20" fill="#1F2937" stroke="#FDE68A" stroke-width="6"/>
  <line x1="800" y1="232" x2="800" y2="218" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="212" r="9" fill="#22C55E"/>

  <!-- FDE68A 포인트: 현재 진행 지표 -->
  <circle cx="530" cy="535" r="14" fill="#FDE68A" opacity="0.9"/>
  <line x1="530" y1="535" x2="530" y2="760" stroke="#FDE68A" stroke-width="4" stroke-dasharray="8 6" opacity="0.5"/>

  <!-- 제목 -->
  <text x="512" y="190" font-family="sans-serif" font-size="44" fill="#6EE7B7" text-anchor="middle" font-weight="bold" opacity="0.9">GROWTH</text>
  <text x="512" y="235" font-family="sans-serif" font-size="28" fill="#9CA3AF" text-anchor="middle">TIMELINE</text>
</svg>
