<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020A02"/>
  <!-- 새싹 돋는 씨앗: 씨앗 + 작은 새싹 -->
  <!-- seed body -->
  <ellipse cx="512" cy="620" rx="110" ry="80" fill="#2E7D32"/>
  <!-- seed crack line -->
  <line x1="512" y1="542" x2="512" y2="620" stroke="#66BB6A" stroke-width="6" stroke-linecap="round"/>
  <!-- left cotyledon -->
  <ellipse cx="470" cy="490" rx="52" ry="30" fill="#66BB6A" transform="rotate(-30 470 490)"/>
  <!-- right cotyledon -->
  <ellipse cx="554" cy="490" rx="52" ry="30" fill="#66BB6A" transform="rotate(30 554 490)"/>
  <!-- stem -->
  <line x1="512" y1="542" x2="512" y2="440" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
  <!-- tiny leaf tip -->
  <ellipse cx="512" cy="420" rx="20" ry="36" fill="#66BB6A" transform="rotate(-10 512 420)"/>
</svg>
