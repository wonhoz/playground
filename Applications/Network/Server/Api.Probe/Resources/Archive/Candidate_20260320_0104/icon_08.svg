<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0F"/>
  <!-- Syringe barrel -->
  <rect x="320" y="460" width="360" height="100" rx="20" fill="#0277BD"/>
  <!-- Syringe plunger rod -->
  <rect x="280" y="490" width="60" height="40" rx="8" fill="#4FC3F7"/>
  <rect x="240" y="500" width="50" height="20" rx="4" fill="#4FC3F7" opacity="0.7"/>
  <!-- Syringe tip/needle -->
  <path d="M680 490 L750 505 L680 520 Z" fill="#4FC3F7"/>
  <line x1="750" y1="505" x2="800" y2="505" stroke="#4FC3F7" stroke-width="10" stroke-linecap="round"/>
  <!-- Graduation marks on barrel -->
  <line x1="400" y1="455" x2="400" y2="465" stroke="#4FC3F7" stroke-width="5" opacity="0.7"/>
  <line x1="460" y1="455" x2="460" y2="465" stroke="#4FC3F7" stroke-width="5" opacity="0.7"/>
  <line x1="520" y1="455" x2="520" y2="465" stroke="#4FC3F7" stroke-width="5" opacity="0.7"/>
  <line x1="580" y1="455" x2="580" y2="465" stroke="#4FC3F7" stroke-width="5" opacity="0.7"/>
  <line x1="640" y1="455" x2="640" y2="465" stroke="#4FC3F7" stroke-width="5" opacity="0.7"/>
  <!-- Liquid in barrel -->
  <rect x="380" y="468" width="280" height="84" rx="14" fill="#4FC3F7" opacity="0.2"/>
  <!-- Injection target (server circle) -->
  <circle cx="820" cy="505" r="44" fill="#0277BD" opacity="0.0"/>
  <!-- Entry point glow -->
  <circle cx="800" cy="505" r="14" fill="#4FC3F7" opacity="0.6"/>
</svg>