<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_08: metaphor · 레이어드 · 해상도 게이지 (720p→4K) -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E8F5E9"/>
  <!-- 상단 라벨 -->
  <text x="512" y="180" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="#1B5E20" text-anchor="middle">4K</text>
  <!-- 게이지 바 (계단) -->
  <g>
    <!-- 720p -->
    <rect x="140" y="740" width="160" height="140" rx="18" fill="#FF6B9D" stroke="#880E4F" stroke-width="12"/>
    <text x="220" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">720p</text>
    <!-- 1080p -->
    <rect x="300" y="620" width="160" height="260" rx="18" fill="#FFB366" stroke="#E65100" stroke-width="12"/>
    <text x="380" y="770" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">1080p</text>
    <!-- 2K -->
    <rect x="460" y="500" width="160" height="380" rx="18" fill="#FFD93D" stroke="#B88A00" stroke-width="12"/>
    <text x="540" y="710" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#5C4000" text-anchor="middle">2K</text>
    <!-- 4K -->
    <rect x="620" y="340" width="160" height="540" rx="18" fill="#06D6A0" stroke="#056B4F" stroke-width="12"/>
    <text x="700" y="620" font-family="Arial Black, sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">4K</text>
    <!-- 8K -->
    <rect x="780" y="220" width="104" height="660" rx="18" fill="#3A86FF" stroke="#1A5CC9" stroke-width="12"/>
    <text x="832" y="570" font-family="Arial Black, sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">8K</text>
  </g>
  <!-- 상승 화살표 -->
  <path d="M 120 880 L 900 280" stroke="#E63946" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M 860 250 L 920 270 L 900 330 Z" fill="#E63946" stroke="#8B0000" stroke-width="8"/>
  <!-- 하단 라벨 -->
  <text x="512" y="970" font-family="Arial Black, sans-serif" font-weight="700" font-size="52" fill="#1B5E20" text-anchor="middle">UPSCALE</text>
</svg>
