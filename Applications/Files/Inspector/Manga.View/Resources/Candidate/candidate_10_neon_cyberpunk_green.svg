<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020c06"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#00FFAA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines background -->
  <g stroke="#00FF41" stroke-width="0.5" opacity="0.15">
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
  </g>
  <!-- Manga pages as neon frames -->
  <rect x="80" y="100" width="150" height="200" rx="6" fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <rect x="90" y="110" width="130" height="90" rx="3" fill="#00FF41" opacity="0.08"/>
  <rect x="90" y="210" width="130" height="80" rx="3" fill="#00FF41" opacity="0.06"/>
  <rect x="250" y="100" width="180" height="90" rx="6" fill="none" stroke="#00FFAA" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <rect x="250" y="200" width="180" height="100" rx="6" fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <!-- Scan line overlay effect -->
  <rect x="80" y="120" width="350" height="2" rx="1" fill="#00FF41" opacity="0.3"/>
  <rect x="80" y="160" width="350" height="2" rx="1" fill="#00FF41" opacity="0.2"/>
  <rect x="80" y="200" width="350" height="2" rx="1" fill="#00FF41" opacity="0.15"/>
  <rect x="80" y="240" width="350" height="2" rx="1" fill="#00FF41" opacity="0.2"/>
  <rect x="80" y="280" width="350" height="2" rx="1" fill="#00FF41" opacity="0.3"/>
  <!-- Neon character outline -->
  <circle cx="155" cy="145" r="20" fill="none" stroke="url(#neon)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M140 168 L140 200 M170 168 L170 200 M140 185 L170 185" stroke="url(#neon)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <!-- Glitch blocks -->
  <rect x="310" y="130" width="80" height="12" rx="2" fill="#00FF41" opacity="0.4"/>
  <rect x="280" y="148" width="120" height="8" rx="2" fill="#00FFAA" opacity="0.3"/>
  <rect x="310" y="162" width="90" height="12" rx="2" fill="#00FF41" opacity="0.35"/>
  <!-- Bottom scan line readout -->
  <rect x="80" y="340" width="352" height="2" rx="1" fill="#00FF41" opacity="0.8" filter="url(#glow)"/>
  <text x="256" y="380" font-family="Courier New, monospace" font-size="16" fill="#00FF41" text-anchor="middle" opacity="0.8" filter="url(#glow)">[ MANGA.VIEW ]</text>
  <text x="256" y="410" font-family="Courier New, monospace" font-size="12" fill="#00FFAA" text-anchor="middle" opacity="0.6">PAGE 001 / 847</text>
  <!-- Corner brackets -->
  <path d="M80 80 L80 100 L100 100" stroke="#00FF41" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M432 80 L432 100 L412 100" stroke="#00FF41" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M80 432 L80 412 L100 412" stroke="#00FF41" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M432 432 L432 412 L412 412" stroke="#00FF41" stroke-width="3" fill="none" filter="url(#glow)"/>
</svg>
