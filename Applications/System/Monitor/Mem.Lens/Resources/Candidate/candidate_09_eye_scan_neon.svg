<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#000a00"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Scan glow -->
  <circle cx="256" cy="220" r="140" fill="url(#glow)"/>
  <!-- Eye outline -->
  <path d="M60 220 Q256 60 452 220 Q256 380 60 220 Z" fill="none" stroke="#00FF41" stroke-width="3" filter="url(#neonGlow)"/>
  <!-- Iris ring -->
  <circle cx="256" cy="220" r="90" fill="none" stroke="#00FF41" stroke-width="3" filter="url(#neonGlow)"/>
  <circle cx="256" cy="220" r="70" fill="none" stroke="#00CC33" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="220" r="50" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4"/>
  <!-- Pupil -->
  <circle cx="256" cy="220" r="32" fill="#000a00"/>
  <circle cx="256" cy="220" r="30" fill="none" stroke="#00FF41" stroke-width="2" filter="url(#neonGlow)"/>
  <!-- Cross-hair in pupil -->
  <line x1="256" y1="195" x2="256" y2="245" stroke="#00FF41" stroke-width="1.5" opacity="0.8"/>
  <line x1="231" y1="220" x2="281" y2="220" stroke="#00FF41" stroke-width="1.5" opacity="0.8"/>
  <!-- Scan line -->
  <line x1="100" y1="170" x2="412" y2="170" stroke="#00FF41" stroke-width="1.5" opacity="0.5" filter="url(#neonGlow)"/>
  <!-- Corner brackets -->
  <path d="M100 160 L100 180 L120 180" stroke="#00FF41" stroke-width="2.5" fill="none" filter="url(#neonGlow)"/>
  <path d="M412 160 L412 180 L392 180" stroke="#00FF41" stroke-width="2.5" fill="none" filter="url(#neonGlow)"/>
  <!-- Memory readout box -->
  <rect x="100" y="355" width="312" height="80" rx="8" fill="#000a00" stroke="#00FF41" stroke-width="1.5" filter="url(#neonGlow)"/>
  <text x="256" y="380" font-family="Courier New" font-size="13" fill="#00FF41" text-anchor="middle" filter="url(#neonGlow)">MEMORY SCAN ACTIVE</text>
  <text x="256" y="400" font-family="Courier New" font-size="18" fill="#00FF41" text-anchor="middle" font-weight="bold" filter="url(#neonGlow)">22,528 / 32,768 MB</text>
  <text x="256" y="420" font-family="Courier New" font-size="11" fill="#00CC33" text-anchor="middle">USAGE: 68.7% ▓▓▓▓▓▓▓░░░</text>
  <!-- Iris data lines -->
  <line x1="160" y1="155" x2="140" y2="130" stroke="#00FF41" stroke-width="1" opacity="0.6"/>
  <text x="130" y="125" font-family="Courier New" font-size="9" fill="#00FF41" text-anchor="end">RSS:4.2G</text>
  <line x1="352" y1="155" x2="372" y2="130" stroke="#00FF41" stroke-width="1" opacity="0.6"/>
  <text x="382" y="125" font-family="Courier New" font-size="9" fill="#00FF41">VSZ:8.1G</text>
</svg>
