  <rect x="140" y="640" width="350" height="72" rx="14" fill="#440000" stroke="#FF4444" stroke-width="2"/>
  <text x="315" y="682" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" fill="#FF9999">IMG_0001.jpg</text>
  <!-- EXIF 태그 아이콘 -->
  <circle cx="315" cy="640" r="20" fill="#CC1111" stroke="#FF4444" stroke-width="2"/>
  <text x="315" y="648" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="white">i</text>

  <!-- 화살표 -->
  <path d="M 506 670 L 546 670 L 546 648 L 590 676 L 546 704 L 546 682 L 506 682 Z"
        fill="#FF6600" stroke="#CC4400" stroke-width="2" stroke-linejoin="round"/>

