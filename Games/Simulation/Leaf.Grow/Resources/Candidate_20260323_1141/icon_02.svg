<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 라이트 그린 -->
  <rect width="1024" height="1024" rx="180" fill="#E8F5E9"/>
  <!-- Layer 2: 큰 잎 (잎맥 패턴) -->
  <!-- 잎 몸체 (큰 타원) -->
  <ellipse cx="512" cy="460" rx="360" ry="260" fill="#4CAF50" transform="rotate(-15,512,460)"/>
  <!-- 잎맥 패턴 -->
  <!-- 중앙 잎맥 -->
  <line x1="220" y1="560" x2="820" y2="380" stroke="#2E7D32" stroke-width="10" stroke-linecap="round"/>
  <!-- 보조 잎맥들 (왼쪽) -->
  <line x1="340" y1="530" x2="280" y2="420" stroke="#388E3C" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="400" y1="510" x2="340" y2="380" stroke="#388E3C" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="460" y1="490" x2="420" y2="350" stroke="#388E3C" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- 보조 잎맥들 (오른쪽) -->
  <line x1="560" y1="460" x2="580" y2="570" stroke="#388E3C" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="620" y1="440" x2="660" y2="560" stroke="#388E3C" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="680" y1="418" x2="740" y2="540" stroke="#388E3C" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- 잎자루 -->
  <line x1="220" y1="560" x2="180" y2="680" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
  <!-- 물방울 (이슬) -->
  <circle cx="520" cy="360" r="14" fill="#90CAF9" opacity="0.9"/>
  <circle cx="660" cy="400" r="10" fill="#90CAF9" opacity="0.8"/>
  <circle cx="400" cy="430" r="12" fill="#90CAF9" opacity="0.7"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="820" font-family="Arial Black,Arial" font-size="90" font-weight="900" fill="#2E7D32" text-anchor="middle">LEAF.GROW</text>
</svg>
