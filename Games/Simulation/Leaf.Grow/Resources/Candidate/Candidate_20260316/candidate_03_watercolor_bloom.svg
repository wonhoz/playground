  <ellipse cx="256" cy="440" rx="180" ry="30" fill="#81C784" opacity="0.5"/>
  <path d="M140 440 Q136 400 144 375" stroke="#66BB6A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M158 440 Q162 405 155 380" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M360 440 Q358 408 366 382" stroke="#66BB6A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M378 440 Q382 410 374 388" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Main plant stem -->
  <path d="M256 440 Q250 380 256 320 Q262 260 254 200" stroke="#388E3C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Large leaves (watercolor style with blur) -->
  <path d="M256 340 Q310 290 360 270 Q330 310 270 345" fill="#66BB6A" opacity="0.75" filter="url(#blur)"/>
  <path d="M256 340 Q310 290 360 270 Q330 310 270 345" fill="#4CAF50" opacity="0.5"/>
  <path d="M256 300 Q196 265 150 250 Q180 282 248 308" fill="#66BB6A" opacity="0.75" filter="url(#blur)"/>
  <path d="M256 300 Q196 265 150 250 Q180 282 248 308" fill="#4CAF50" opacity="0.5"/>
  <!-- Flower 1 (pink) -->
  <circle cx="256" cy="200" r="44" fill="url(#flower1)" opacity="0.7" filter="url(#blur)"/>
  <circle cx="256" cy="200" r="28" fill="#FF80AB" opacity="0.9"/>
  <circle cx="256" cy="200" r="14" fill="#FFD740"/>
  <!-- Petals -->
  <ellipse cx="256" cy="160" rx="12" ry="22" fill="#FF80AB" opacity="0.7"/>
  <ellipse cx="256" cy="240" rx="12" ry="22" fill="#FF80AB" opacity="0.7"/>
  <ellipse cx="216" cy="200" rx="22" ry="12" fill="#FF80AB" opacity="0.7"/>
  <ellipse cx="296" cy="200" rx="22" ry="12" fill="#FF80AB" opacity="0.7"/>
  <ellipse cx="228" cy="172" rx="12" ry="22" fill="#FF80AB" opacity="0.6" transform="rotate(-45 228 172)"/>
  <ellipse cx="284" cy="172" rx="12" ry="22" fill="#FF80AB" opacity="0.6" transform="rotate(45 284 172)"/>
  <ellipse cx="228" cy="228" rx="12" ry="22" fill="#FF80AB" opacity="0.6" transform="rotate(45 228 228)"/>
  <ellipse cx="284" cy="228" rx="12" ry="22" fill="#FF80AB" opacity="0.6" transform="rotate(-45 284 228)"/>
  <!-- Small flower 2 (yellow) -->
  <circle cx="160" cy="260" r="24" fill="url(#flower2)" opacity="0.75"/>
  <circle cx="160" cy="260" r="10" fill="#FF8F00"/>
  <!-- Butterfly -->
  <path d="M380 140 Q396 120 410 140 Q396 160 380 140" fill="#FF80AB" opacity="0.6"/>
  <path d="M380 140 Q362 122 350 140 Q362 160 380 140" fill="#FF80AB" opacity="0.5"/>
