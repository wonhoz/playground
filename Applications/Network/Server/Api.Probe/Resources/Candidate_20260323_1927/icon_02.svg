<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16"/>
      <stop offset="100%" style="stop-color:#4ADE80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg02)"/>
  <!-- URL input bar -->
  <rect x="140" y="340" width="744" height="120" rx="18" fill="#FFFFFF"/>
  <!-- GET badge inside bar -->
  <rect x="158" y="358" width="130" height="84" rx="12" fill="#22C55E"/>
  <text x="223" y="402" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF">GET</text>
  <!-- URL path text -->
  <text x="490" y="402" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="40" fill="#374151">https://api.example.com</text>
  <!-- Send button -->
  <rect x="260" y="530" width="504" height="110" rx="55" fill="#3B82F6"/>
  <text x="512" y="587" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF">Send</text>
  <!-- Decorative response line -->
  <rect x="180" y="690" width="440" height="20" rx="10" fill="rgba(255,255,255,0.6)"/>
  <rect x="180" y="730" width="310" height="20" rx="10" fill="rgba(255,255,255,0.4)"/>
  <rect x="180" y="770" width="370" height="20" rx="10" fill="rgba(255,255,255,0.5)"/>
</svg>
