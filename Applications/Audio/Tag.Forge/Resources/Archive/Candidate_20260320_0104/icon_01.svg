  <rect x="260" y="680" width="504" height="80" rx="16" fill="#1a3530"/>
  <rect x="260" y="680" width="504" height="80" rx="16" fill="none" stroke="#26A69A" stroke-width="8"/>
  <!-- Stamp face with tag outline -->
  <rect x="310" y="360" width="404" height="240" rx="12" fill="#0d2420"/>
  <rect x="310" y="360" width="404" height="240" rx="12" fill="none" stroke="#26A69A" stroke-width="14"/>
  <!-- Tag shape stamped impression -->
  <path d="M390 420 L580 420 L640 512 L580 604 L390 604 Z" fill="none" stroke="#4DB6AC" stroke-width="16"/>
  <circle cx="418" cy="512" r="22" fill="#4DB6AC"/>
  <!-- Ink splash marks -->
  <circle cx="290" cy="660" r="8" fill="#4DB6AC" opacity="0.5"/>
  <circle cx="734" cy="655" r="6" fill="#4DB6AC" opacity="0.4"/>
  <circle cx="350" cy="670" r="5" fill="#26A69A" opacity="0.4"/>
