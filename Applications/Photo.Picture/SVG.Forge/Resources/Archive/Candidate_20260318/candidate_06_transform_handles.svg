<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 트랜스폼 핸들 (회전, 스케일, 기울이기) -->
  <!-- 원본 도형 (반투명) -->
  <rect x="180" y="300" width="152" height="100" rx="4" fill="#C084FC" opacity="0.1" stroke="#5a1a8a" stroke-width="1" stroke-dasharray="5,4"/>
  <!-- 변환된 도형 (회전+스케일) -->
  <g transform="translate(256,220) rotate(-15) scale(1.15,0.9)">
    <rect x="-76" y="-50" width="152" height="100" rx="4" fill="#C084FC" opacity="0.25" stroke="#C084FC" stroke-width="2" filter="url(#glow)"/>
    <!-- 내부 벡터 요소 -->
    <circle cx="-20" cy="0" r="22" fill="#A855F7" opacity="0.3" stroke="#A855F7" stroke-width="1.5"/>
    <path d="M10,-30 L40,0 L10,30 L-10,30 L20,0 L-10,-30 Z" fill="#C084FC" opacity="0.4"/>
  </g>
  <!-- 변환 핸들들 (8방향 + 회전) -->
  <!-- 코너 핸들 -->
  <rect x="155" y="158" width="12" height="12" rx="2" fill="#FDE047" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.95"/>
  <rect x="345" y="158" width="12" height="12" rx="2" fill="#FDE047" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.95"/>
  <rect x="155" y="280" width="12" height="12" rx="2" fill="#FDE047" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.95"/>
  <rect x="345" y="280" width="12" height="12" rx="2" fill="#FDE047" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.95"/>
  <!-- 중앙 핸들 -->
  <rect x="250" y="155" width="12" height="12" rx="2" fill="#C084FC" stroke="#fff" stroke-width="1" opacity="0.9"/>
  <rect x="250" y="283" width="12" height="12" rx="2" fill="#C084FC" stroke="#fff" stroke-width="1" opacity="0.9"/>
  <rect x="152" y="220" width="12" height="12" rx="2" fill="#C084FC" stroke="#fff" stroke-width="1" opacity="0.9"/>
  <rect x="348" y="220" width="12" height="12" rx="2" fill="#C084FC" stroke="#fff" stroke-width="1" opacity="0.9"/>
  <!-- 선택 박스 -->
  <rect x="161" y="164" width="190" height="124" rx="2" fill="none" stroke="#FDE047" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <!-- 회전 핸들 -->
  <line x1="256" y1="164" x2="256" y2="130" stroke="#C084FC" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <circle cx="256" cy="124" r="8" fill="none" stroke="#C084FC" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <path d="M250,118 A8,8 0 1,1 262,118" fill="none" stroke="#C084FC" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="248,122 252,116 256,122" fill="#C084FC" opacity="0.9" filter="url(#glow)"/>
  <!-- 변환 방향 화살표들 -->
  <!-- 스케일 화살표 -->
  <path d="M155,158 L135,138" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <polygon points="131,134 141,134 131,144" fill="#FDE047" opacity="0.8"/>
  <path d="M357,158 L377,138" stroke="#FDE047" stroke-width="1.5" opacity="0.7"/>
  <polygon points="373,134 383,134 383,144" fill="#FDE047" opacity="0.8"/>
  <!-- 중심점 -->
  <circle cx="256" cy="226" r="8" fill="#FDE047" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="226" r="4" fill="#030508" opacity="0.8"/>
  <!-- 변환 정보 패널 -->
  <rect x="60" y="410" width="180" height="72" rx="8" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="90" y="432" font-size="10" fill="#888" opacity="0.8">X: 163.5</text>
  <text x="90" y="448" font-size="10" fill="#888" opacity="0.8">Y: 186.2</text>
  <text x="90" y="464" font-size="10" fill="#888" opacity="0.8">Rot: -15.0°</text>
  <rect x="272" y="410" width="180" height="72" rx="8" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="302" y="432" font-size="10" fill="#888" opacity="0.8">W: 174.8</text>
  <text x="302" y="448" font-size="10" fill="#888" opacity="0.8">H: 90.0</text>
  <text x="302" y="464" font-size="10" fill="#C084FC" opacity="0.8">Scale: 1.15×</text>
</svg>
