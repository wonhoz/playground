<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>
  <!-- Broom handle (diagonal) -->
  <line x1="720" y1="178" x2="280" y2="580" stroke="#8D6E63" stroke-width="24" stroke-linecap="round"/>
  <!-- Broom head (bristles) -->
  <ellipse cx="258" cy="596" rx="92" ry="34" fill="#F9A825" stroke="#E65100" stroke-width="16" transform="rotate(-45 258 596)"/>
  <!-- Bristle lines -->
  <line x1="216" y1="556" x2="196" y2="610" stroke="#BF360C" stroke-width="8" stroke-linecap="round"/>
  <line x1="238" y1="572" x2="222" y2="628" stroke="#BF360C" stroke-width="8" stroke-linecap="round"/>
  <line x1="260" y1="584" x2="248" y2="640" stroke="#BF360C" stroke-width="8" stroke-linecap="round"/>
  <line x1="280" y1="592" x2="272" y2="648" stroke="#BF360C" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="596" x2="296" y2="652" stroke="#BF360C" stroke-width="8" stroke-linecap="round"/>
  <!-- Folder "dust" being swept (scattered, small folders) -->
  <path d="M 380,460 L 380,506 L 452,506 L 452,472 L 430,460 L 406,460 Z" fill="#FFCDD2" stroke="#E91E63" stroke-width="10" transform="rotate(-18 416 483)"/>
  <path d="M 480,420 L 480,462 L 548,462 L 548,430 L 528,420 L 504,420 Z" fill="#FCE4EC" stroke="#E91E63" stroke-width="10" transform="rotate(8 514 441)"/>
  <path d="M 558,370 L 558,410 L 622,410 L 622,380 L 604,370 L 578,370 Z" fill="#FFCDD2" stroke="#E91E63" stroke-width="10" transform="rotate(-10 590 390)"/>
  <!-- Motion lines (sweep direction) -->
  <line x1="160" y1="620" x2="110" y2="660" stroke="#F9A825" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="190" y1="640" x2="145" y2="680" stroke="#F9A825" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="218" y1="654" x2="175" y2="692" stroke="#F9A825" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <!-- SWEEP badge -->
  <rect x="214" y="744" width="596" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" text-anchor="middle">SWEEP</text>
</svg>
