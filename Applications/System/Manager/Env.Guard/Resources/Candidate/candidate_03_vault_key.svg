<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <linearGradient id="vault" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bdc3c7"/>
      <stop offset="100%" style="stop-color:#7f8c8d"/>
    </linearGradient>
    <linearGradient id="key_col" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="100%" style="stop-color:#fda085"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vault door -->
  <rect x="80" y="80" width="352" height="352" rx="20" fill="url(#vault)"/>
  <rect x="96" y="96" width="320" height="320" rx="14" fill="#2c3e50"/>
  <!-- Vault handle/wheel -->
  <circle cx="256" cy="256" r="80" stroke="url(#vault)" stroke-width="12" fill="none"/>
  <circle cx="256" cy="256" r="50" stroke="url(#vault)" stroke-width="8" fill="#2c3e50"/>
  <line x1="256" y1="176" x2="256" y2="206" stroke="url(#vault)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="306" x2="256" y2="336" stroke="url(#vault)" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="206" y2="256" stroke="url(#vault)" stroke-width="10" stroke-linecap="round"/>
  <line x1="306" y1="256" x2="336" y2="256" stroke="url(#vault)" stroke-width="10" stroke-linecap="round"/>
  <!-- ENV label on door -->
  <text x="256" y="265" font-family="monospace" font-size="26" text-anchor="middle" fill="url(#key_col)" font-weight="bold">ENV</text>
  <!-- Key sticking out -->
  <circle cx="390" cy="390" r="28" stroke="url(#key_col)" stroke-width="8" fill="none"/>
  <line x1="418" y1="390" x2="460" y2="390" stroke="url(#key_col)" stroke-width="8" stroke-linecap="round"/>
  <line x1="448" y1="390" x2="448" y2="408" stroke="url(#key_col)" stroke-width="7" stroke-linecap="round"/>
  <line x1="436" y1="390" x2="436" y2="405" stroke="url(#key_col)" stroke-width="7" stroke-linecap="round"/>
</svg>
