<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0F"/>
  <!-- Left node (client) -->
  <circle cx="260" cy="512" r="70" fill="#0277BD"/>
  <rect x="228" y="490" width="64" height="8" rx="4" fill="#4FC3F7"/>
  <rect x="236" y="508" width="48" height="8" rx="4" fill="#4FC3F7" opacity="0.6"/>
  <rect x="232" y="526" width="56" height="8" rx="4" fill="#4FC3F7" opacity="0.3"/>
  <!-- Right node (server) -->
  <circle cx="764" cy="512" r="70" fill="#0277BD"/>
  <rect x="732" y="490" width="64" height="8" rx="4" fill="#4FC3F7"/>
  <rect x="740" y="508" width="48" height="8" rx="4" fill="#4FC3F7" opacity="0.6"/>
  <rect x="736" y="526" width="56" height="8" rx="4" fill="#4FC3F7" opacity="0.3"/>
  <!-- Forward arrow (request) -->
