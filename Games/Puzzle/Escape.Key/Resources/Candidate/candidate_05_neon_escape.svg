<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111122"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon door frame -->
  <rect x="100" y="80" width="200" height="340" rx="10" stroke="#ff00ff" stroke-width="6" fill="none" filter="url(#glow)"/>
  <!-- Door ajar (open) -->
  <path d="M100 80 L100 420 L300 420 L300 80 Z" fill="#ff00ff" opacity="0.05"/>
  <!-- Light beam from door -->
  <path d="M300 80 L460 40 L460 460 L300 420 Z" fill="#ffff00" opacity="0.08"/>
  <line x1="300" y1="80" x2="460" y2="40" stroke="#ffff00" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <line x1="300" y1="420" x2="460" y2="460" stroke="#ffff00" stroke-width="3" filter="url(#glow)" opacity="0.6"/>
  <!-- Running figure (stick) -->
  <circle cx="370" cy="200" r="20" stroke="#00ffff" stroke-width="6" fill="none" filter="url(#glow)"/>
  <line x1="370" y1="220" x2="370" y2="290" stroke="#00ffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="370" y1="240" x2="345" y2="270" stroke="#00ffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="370" y1="240" x2="395" y2="270" stroke="#00ffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="370" y1="290" x2="345" y2="330" stroke="#00ffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="370" y1="290" x2="395" y2="320" stroke="#00ffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Key -->
  <circle cx="150" cy="250" r="28" stroke="#f7c548" stroke-width="7" fill="none" filter="url(#glow)"/>
  <line x1="173" y1="268" x2="205" y2="296" stroke="#f7c548" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="198" y1="290" x2="210" y2="275" stroke="#f7c548" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
</svg>
