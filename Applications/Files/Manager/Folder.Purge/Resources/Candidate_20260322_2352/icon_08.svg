<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#14532D"/>
  <!-- Layer 2: Checklist panel -->
  <rect x="160" y="220" width="700" height="530" rx="24" fill="#0F3D22"/>
  <!-- Panel header -->
  <rect x="160" y="220" width="700" height="64" rx="24" fill="#166534"/>
  <rect x="160" y="264" width="700" height="20" fill="#166534"/>
  <text x="512" y="260" font-family="Arial,sans-serif" font-size="22" fill="#BBFCD0" text-anchor="middle" font-weight="bold">스캔 옵션</text>
  <!-- Checklist item 1 -->
  <rect x="200" y="322" width="620" height="72" rx="12" fill="#166534" opacity="0.7"/>
  <!-- Checkbox checked -->
  <rect x="224" y="340" width="36" height="36" rx="6" fill="#22C55E"/>
  <text x="242" y="365" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">✓</text>
  <text x="290" y="364" font-family="Arial,sans-serif" font-size="22" fill="#BBF7D0" font-weight="bold">빈 폴더 스캔</text>
  <rect x="620" y="348" width="140" height="24" rx="8" fill="#14532D" opacity="0.7"/>
  <text x="690" y="364" font-family="Consolas,monospace" font-size="15" fill="#86EFAC" text-anchor="middle">Empty</text>
  <!-- Checklist item 2 -->
  <rect x="200" y="410" width="620" height="72" rx="12" fill="#166534" opacity="0.6"/>
  <rect x="224" y="428" width="36" height="36" rx="6" fill="#22C55E"/>
  <text x="242" y="453" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">✓</text>
  <text x="290" y="452" font-family="Arial,sans-serif" font-size="22" fill="#BBF7D0" font-weight="bold">빈 파일 스캔</text>
  <rect x="620" y="436" width="140" height="24" rx="8" fill="#14532D" opacity="0.7"/>
  <text x="690" y="452" font-family="Consolas,monospace" font-size="15" fill="#86EFAC" text-anchor="middle">0 bytes</text>
  <!-- Checklist item 3 -->
  <rect x="200" y="498" width="620" height="72" rx="12" fill="#166534" opacity="0.5"/>
  <rect x="224" y="516" width="36" height="36" rx="6" fill="#22C55E"/>
  <text x="242" y="541" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">✓</text>
  <text x="290" y="540" font-family="Arial,sans-serif" font-size="22" fill="#BBF7D0" font-weight="bold">VS 아티팩트 스캔</text>
  <rect x="620" y="524" width="140" height="24" rx="8" fill="#14532D" opacity="0.7"/>
  <text x="690" y="540" font-family="Consolas,monospace" font-size="14" fill="#86EFAC" text-anchor="middle">bin / obj</text>
  <!-- Layer 3: Scan button -->
  <rect x="200" y="618" width="620" height="80" rx="18" fill="#16A34A"/>
  <text x="512" y="666" font-family="Arial,sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">🔍 스캔 시작</text>
</svg>