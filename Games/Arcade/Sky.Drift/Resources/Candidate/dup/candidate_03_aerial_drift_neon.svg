<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000020"/>
      <stop offset="100%" style="stop-color:#200010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonPlane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00aa"/>
      <stop offset="100%" style="stop-color:#00aaff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Neon grid ground far below -->
  <line x1="40" y1="430" x2="472" y2="430" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="445" x2="472" y2="445" stroke="#ff00aa" stroke-width="1" opacity="0.2"/>
  <!-- Perspective vertical grid lines -->
  <line x1="256" y1="350" x2="100" y2="470" stroke="#00aaff" stroke-width="0.8" opacity="0.2"/>
  <line x1="256" y1="350" x2="412" y2="470" stroke="#00aaff" stroke-width="0.8" opacity="0.2"/>
  <line x1="256" y1="350" x2="180" y2="470" stroke="#00aaff" stroke-width="0.8" opacity="0.15"/>
  <line x1="256" y1="350" x2="330" y2="470" stroke="#00aaff" stroke-width="0.8" opacity="0.15"/>
  <!-- Neon aerial lanes -->
  <path d="M40 200 Q256 160 472 200" stroke="#ff00aa" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.5"/>
  <path d="M40 300 Q256 260 472 300" stroke="#00aaff" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.5"/>
  <!-- Neon plane -->
  <g transform="translate(256, 250) rotate(-10)" filter="url(#glow)">
    <path d="M-70 0 Q-50 -8 0 -8 Q55 -8 80 0 Q55 8 0 8 Q-50 8 -70 0 Z" fill="url(#neonPlane)" opacity="0.9"/>
    <path d="M-5 -8 L-35 -44 L22 -44 L30 -8 Z" fill="#ff00aa" opacity="0.8"/>
    <path d="M-5 8 L-35 44 L22 44 L30 8 Z" fill="#00aaff" opacity="0.8"/>
    <path d="M-58 0 L-78 -26 L-48 -8 Z" fill="#ff00aa" opacity="0.7"/>
    <path d="M-58 0 L-76 18 L-48 8 Z" fill="#00aaff" opacity="0.6"/>
    <ellipse cx="50" cy="0" rx="18" ry="7" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Neon drift trail -->
  <path d="M80 280 Q160 260 240 254" stroke="#ff00aa" stroke-width="5" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.8"/>
  <path d="M80 285 Q158 268 236 260" stroke="#00aaff" stroke-width="3" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.6"/>
  <path d="M90 275 Q162 256 234 248" stroke="#ff00aa" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" opacity="0.4"/>
  <!-- Neon stars -->
  <circle cx="150" cy="140" r="2" fill="#ff00aa" filter="url(#glow)"/>
  <circle cx="380" cy="160" r="2" fill="#00aaff" filter="url(#glow)"/>
  <circle cx="430" cy="130" r="1.5" fill="#ff00aa" filter="url(#glow)"/>
  <circle cx="100" cy="160" r="1.5" fill="#00aaff" filter="url(#glow)"/>
</svg>