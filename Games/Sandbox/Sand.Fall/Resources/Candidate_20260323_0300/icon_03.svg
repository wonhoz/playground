<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Sand.Fall | 물+불 반응 (증기 발생) | 기하학 | #0D0D1A -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0D0D1A"/>
  <!-- Layer 2: Water pool on left -->
  <rect x="120" y="580" width="340" height="240" rx="10" fill="#3468C8" opacity="0.8"/>
  <!-- Water waves -->
  <path d="M120 600 Q200 580 280 600 Q360 620 460 600" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.5"/>
  <!-- Fire on right -->
  <ellipse cx="760" cy="680" rx="100" ry="130" fill="#FF5500" opacity="0.85"/>
  <ellipse cx="760" cy="620" rx="70" ry="100" fill="#FF8800" opacity="0.75"/>
  <ellipse cx="760" cy="560" rx="45" ry="70" fill="#FFAA00" opacity="0.8"/>
  <ellipse cx="760" cy="510" rx="25" ry="40" fill="#FFDD00" opacity="0.7"/>
  <!-- Contact point sparks -->
  <circle cx="460" cy="620" r="12" fill="#FF5500" opacity="0.7"/>
  <circle cx="500" cy="600" r="10" fill="#FF8800" opacity="0.6"/>
  <circle cx="540" cy="615" r="8" fill="#FFAA00" opacity="0.5"/>
  <!-- Steam rising from contact -->
  <!-- Steam puffs going up -->
  <ellipse cx="480" cy="520" rx="40" ry="28" fill="#9AAAC0" opacity="0.5"/>
  <ellipse cx="510" cy="460" rx="50" ry="35" fill="#B0BDD0" opacity="0.45"/>
  <ellipse cx="490" cy="390" rx="60" ry="42" fill="#C0CDE0" opacity="0.35"/>
  <ellipse cx="520" cy="310" rx="72" ry="50" fill="#D0DEF0" opacity="0.25"/>
  <ellipse cx="505" cy="230" rx="86" ry="58" fill="#E0EEF8" opacity="0.15"/>
  <!-- Layer 3: Reaction arrows -->
  <text x="460" y="580" font-family="Arial,sans-serif" font-size="28" fill="#9AAAC0" text-anchor="middle">💨 증기</text>
  <!-- Labels -->
  <text x="290" y="554" font-family="Arial,sans-serif" font-size="22" fill="#60A5FA" text-anchor="middle">물</text>
  <text x="760" y="844" font-family="Arial,sans-serif" font-size="22" fill="#F97316" text-anchor="middle">불</text>
  <!-- "+" symbol between -->
  <text x="512" y="750" font-family="Arial,sans-serif" font-size="64" fill="#475569" text-anchor="middle" opacity="0.5">+</text>
  <text x="512" y="860" font-family="Arial,sans-serif" font-size="28" fill="#9AAAC0" text-anchor="middle">→ 증기(Steam)</text>
</svg>
