<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background sky blue gradient -->
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- Layer 2: Before card (blurry/pixelated) left -->
  <rect x="100" y="260" width="350" height="350" rx="20" fill="#FFFFFF" opacity="0.9"/>
  <!-- Pixelated pattern -->
  <rect x="120" y="280" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <rect x="180" y="280" width="60" height="60" rx="4" fill="#CFD8DC"/>
  <rect x="240" y="280" width="60" height="60" rx="4" fill="#90A4AE"/>
  <rect x="300" y="280" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <rect x="120" y="340" width="60" height="60" rx="4" fill="#CFD8DC"/>
  <rect x="180" y="340" width="60" height="60" rx="4" fill="#90A4AE"/>
  <rect x="240" y="340" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <rect x="300" y="340" width="60" height="60" rx="4" fill="#78909C"/>
  <rect x="120" y="400" width="60" height="60" rx="4" fill="#90A4AE"/>
  <rect x="180" y="400" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <rect x="240" y="400" width="60" height="60" rx="4" fill="#CFD8DC"/>
  <rect x="300" y="400" width="60" height="60" rx="4" fill="#90A4AE"/>
  <rect x="120" y="460" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <rect x="180" y="460" width="60" height="60" rx="4" fill="#78909C"/>
  <rect x="240" y="460" width="60" height="60" rx="4" fill="#90A4AE"/>
  <rect x="300" y="460" width="60" height="60" rx="4" fill="#B0BEC5"/>
  <text x="275" y="650" font-family="Arial, sans-serif" font-size="42" fill="#90A4AE" text-anchor="middle">Low</text>
  <!-- Arrow -->
  <path d="M470 435 L554 435" stroke="#1565C0" stroke-width="24" stroke-linecap="round"/>
  <polygon points="554,400 630,435 554,470" fill="#1565C0"/>
  <!-- After card (sharp) right -->
  <rect x="574" y="260" width="350" height="350" rx="20" fill="#FFFFFF" opacity="0.97"/>
  <!-- Sharp mountain/landscape illustration -->
  <polygon points="749 380 680 520 818 520" fill="#1E88E5" opacity="0.8"/>
  <polygon points="820 350 750 520 890 520" fill="#1565C0" opacity="0.9"/>
  <circle cx="680" cy="320" r="48" fill="#FFD740"/>
  <rect x="594" y="520" width="310" height="70" rx="10" fill="#A5D6A7"/>
  <text x="749" y="650" font-family="Arial, sans-serif" font-size="42" fill="#1565C0" text-anchor="middle">HD</text>
  <!-- Layer 3: Upscale badge -->
  <rect x="390" y="760" width="244" height="90" rx="18" fill="#1565C0"/>
  <text x="512" y="818" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">4x UP</text>
</svg>
