<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: fresh mint -->
  <rect width="1024" height="1024" rx="190" fill="#ECFDF5"/>

  <!-- Large mouse cursor (right-click focused) -->
  <!-- Cursor body -->
  <path d="M320,200 L320,620 L420,520 L460,650 L520,626 L480,496 L620,496 Z" fill="#1E293B"/>
  <path d="M338,228 L338,566 L426,482 L464,604 L504,588 L468,468 L602,468 Z" fill="#F0FDF4"/>

  <!-- Right-click visual: dotted border/glow on right side of cursor -->
  <path d="M460,250 L460,480 Q510,480 510,430 L510,250 Z" fill="#22C55E" opacity="0.25"/>
  <text x="340" y="690" font-family="Arial,sans-serif" font-size="22" fill="#374151">Right Click</text>

  <!-- Context menu appearing from cursor -->
  <rect x="550" y="360" width="350" height="360" rx="12" fill="#1E293B"/>
  <rect x="550" y="360" width="350" height="360" rx="12" fill="none" stroke="#22C55E" stroke-width="4"/>

  <!-- Menu items -->
  <rect x="562" y="372" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="396" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Open</text>
  <rect x="562" y="412" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="436" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Open in New Window</text>
  <line x1="568" y1="453" x2="890" y2="453" stroke="#374151" stroke-width="2"/>
  <!-- Claude highlighted -->
  <rect x="562" y="461" width="326" height="50" rx="8" fill="#22C55E"/>
  <circle cx="596" cy="486" r="18" fill="white"/>
  <text x="596" y="492" font-family="Arial Black,Arial" font-size="16" fill="#16A34A" text-anchor="middle" font-weight="900">C</text>
  <text x="628" y="492" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold">Open with Claude Code</text>
  <line x1="568" y1="513" x2="890" y2="513" stroke="#374155" stroke-width="2"/>
  <rect x="562" y="521" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="545" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Pin to Start</text>
  <rect x="562" y="561" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="585" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Rename</text>
  <rect x="562" y="601" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="625" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Delete</text>
  <rect x="562" y="641" width="326" height="38" rx="6" fill="transparent"/>
  <text x="582" y="665" font-family="Arial,sans-serif" font-size="18" fill="#94A3B8">Properties</text>

  <!-- DLL badge bottom right -->
  <rect x="740" y="800" width="170" height="60" rx="14" fill="#1D4ED8"/>
  <text x="825" y="839" font-family="Arial Black,Arial" font-size="30" fill="white" text-anchor="middle">.DLL</text>
</svg>
