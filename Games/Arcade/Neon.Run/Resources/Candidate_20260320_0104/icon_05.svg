<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 8-bit pixel art running character -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Pixel size: 52px grid, character centered ~512,400 -->
  <!-- Head (3x2 pixels) -->
  <rect x="408" y="200" width="52" height="52" rx="0" fill="#00E5FF"/>
  <rect x="460" y="200" width="52" height="52" rx="0" fill="#00E5FF"/>
  <rect x="512" y="200" width="52" height="52" rx="0" fill="#00E5FF"/>
  <rect x="408" y="252" width="52" height="52" rx="0" fill="#00E5FF"/>
  <rect x="460" y="252" width="52" height="52" rx="0" fill="#80D8FF"/>
  <rect x="512" y="252" width="52" height="52" rx="0" fill="#00E5FF"/>
  <!-- Eyes (pixel dots) -->
  <rect x="420" y="264" width="20" height="20" rx="0" fill="#000510"/>
  <rect x="524" y="264" width="20" height="20" rx="0" fill="#000510"/>
  <!-- Body (2x3 pixels) -->
  <rect x="434" y="304" width="52" height="52" rx="0" fill="#00B0FF"/>
  <rect x="486" y="304" width="52" height="52" rx="0" fill="#00B0FF"/>
  <rect x="434" y="356" width="52" height="52" rx="0" fill="#00B0FF"/>
  <rect x="486" y="356" width="52" height="52" rx="0" fill="#00B0FF"/>
  <rect x="434" y="408" width="52" height="52" rx="0" fill="#0091EA"/>
  <rect x="486" y="408" width="52" height="52" rx="0" fill="#0091EA"/>
  <!-- Arm forward (left) -->
  <rect x="356" y="304" width="52" height="52" rx="0" fill="#00B0FF" opacity="0.9"/>
  <rect x="304" y="356" width="52" height="52" rx="0" fill="#00B0FF" opacity="0.7"/>
  <!-- Arm back (right) -->
  <rect x="564" y="356" width="52" height="52" rx="0" fill="#00B0FF" opacity="0.8"/>
  <!-- Leg front (left) -->
  <rect x="434" y="460" width="52" height="52" rx="0" fill="#0091EA"/>
  <rect x="382" y="512" width="52" height="52" rx="0" fill="#0072C8"/>
  <rect x="330" y="564" width="52" height="52" rx="0" fill="#0072C8"/>
  <!-- Leg back (right) -->
  <rect x="486" y="460" width="52" height="52" rx="0" fill="#0091EA" opacity="0.8"/>
  <rect x="538" y="512" width="52" height="52" rx="0" fill="#0072C8" opacity="0.8"/>
  <!-- Ground line (neon) -->
  <line x1="140" y1="680" x2="884" y2="680" stroke="#00E5FF" stroke-width="6" opacity="0.8"/>
  <!-- Speed lines -->
  <line x1="140" y1="360" x2="320" y2="360" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="140" y1="410" x2="290" y2="410" stroke="#00B0FF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="140" y1="460" x2="310" y2="460" stroke="#00B0FF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
