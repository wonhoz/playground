  <text x="629" y="660" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#D97706">S</text>
  <text x="749" y="660" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#D97706">U</text>

  <!-- 행 4: B I T / 하단 -->
  <rect x="210" y="690" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <rect x="330" y="690" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="450" y="690" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="570" y="690" width="118" height="118" rx="8" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <rect x="690" y="690" width="118" height="118" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <text x="389" y="780" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#059669">I</text>
  <text x="509" y="780" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#D97706">N</text>
  <text x="629" y="780" font-family="Arial Black" font-size="88" font-weight="900" text-anchor="middle" fill="#D97706">N</text>

  <!-- 완성 체크 배지 -->
  <circle cx="830" cy="830" r="80" fill="#FDE047" stroke="white" stroke-width="8"/>
  <text x="830" y="870" font-family="Arial Black" font-size="90" font-weight="900" text-anchor="middle" fill="#166534">✓</text>
