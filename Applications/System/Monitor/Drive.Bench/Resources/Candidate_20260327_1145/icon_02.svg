<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E9ECEF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Racing checkered pattern (benchmark = race) -->
  <!-- Top checkered band -->
  <rect x="0" y="0" width="1024" height="200" rx="190" fill="none"/>
  <!-- Checkerboard squares -->
  <rect x="190" y="170" width="100" height="100" fill="#1C1917"/>
  <rect x="290" y="170" width="100" height="100" fill="#FFFFFF"/>
  <rect x="390" y="170" width="100" height="100" fill="#1C1917"/>
  <rect x="490" y="170" width="100" height="100" fill="#FFFFFF"/>
  <rect x="590" y="170" width="100" height="100" fill="#1C1917"/>
  <rect x="690" y="170" width="100" height="100" fill="#FFFFFF"/>
  <rect x="790" y="170" width="100" height="100" fill="#1C1917"/>
  <rect x="190" y="270" width="100" height="100" fill="#FFFFFF"/>
  <rect x="290" y="270" width="100" height="100" fill="#1C1917"/>
  <rect x="390" y="270" width="100" height="100" fill="#FFFFFF"/>
  <rect x="490" y="270" width="100" height="100" fill="#1C1917"/>
  <rect x="590" y="270" width="100" height="100" fill="#FFFFFF"/>
  <rect x="690" y="270" width="100" height="100" fill="#1C1917"/>
  <rect x="790" y="270" width="100" height="100" fill="#FFFFFF"/>
  <!-- Clip to circle-ish area at top -->
  <!-- SSD flying fast (motion blur) -->
  <rect x="160" y="440" width="340" height="240" rx="22" fill="#1E293B" transform="skewX(-8)"/>
  <rect x="185" y="465" width="290" height="190" rx="12" fill="#334155" transform="skewX(-8)"/>
  <!-- Speed streaks -->
  <line x1="520" y1="480" x2="860" y2="490" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
  <line x1="530" y1="530" x2="860" y2="538" stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <line x1="520" y1="580" x2="860" y2="586" stroke="#22C55E" stroke-width="14" stroke-linecap="round"/>
  <line x1="530" y1="625" x2="860" y2="630" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
  <!-- Score badge -->
  <circle cx="512" cy="800" r="140" fill="#EF4444"/>
  <text x="512" y="790" font-family="Arial,sans-serif" font-size="60" fill="#FFFFFF" font-weight="bold" text-anchor="middle">READ</text>
  <text x="512" y="854" font-family="Arial,sans-serif" font-size="56" fill="#FCD34D" font-weight="bold" text-anchor="middle">5.2 GB/s</text>
</svg>
