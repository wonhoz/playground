<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_07: metaphor · 레이어드 · EXIF 메타데이터 태그 + 사진 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#FFE0E6"/>
  <!-- 배경 사진 (큰) -->
  <g>
    <rect x="120" y="140" width="784" height="620" rx="28" fill="#FFFFFF" stroke="#AD1457" stroke-width="20"/>
    <rect x="150" y="170" width="724" height="500" fill="#81D4FA"/>
    <!-- 사진 내용: 산 + 해 -->
    <circle cx="780" cy="270" r="60" fill="#FFD93D" stroke="#F57F17" stroke-width="10"/>
    <path d="M 150 590 L 290 400 L 430 520 L 560 350 L 720 550 L 874 470 L 874 670 L 150 670 Z" fill="#4CAF50" stroke="#1B5E20" stroke-width="12"/>
  </g>
  <!-- EXIF 태그 (우측 상단 오버레이) -->
  <g>
    <rect x="540" y="180" width="330" height="240" rx="20" fill="#000000" opacity="0.78"/>
    <text x="570" y="240" font-family="Consolas, monospace" font-weight="900" font-size="44" fill="#06D6A0">EXIF</text>
    <text x="570" y="300" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFFFFF">2026:04:13</text>
    <text x="570" y="348" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFFFFF">14:22:08</text>
    <text x="570" y="396" font-family="Consolas, monospace" font-weight="700" font-size="34" fill="#FFD93D">→ /2026/04</text>
  </g>
  <!-- 하단 파일 아이콘 3개 (JPG/HEIC/MP4) -->
  <g>
    <rect x="120" y="800" width="240" height="140" rx="22" fill="#FF6B9D" stroke="#880E4F" stroke-width="12"/>
    <text x="240" y="892" font-family="Arial Black, sans-serif" font-weight="900" font-size="66" fill="#FFFFFF" text-anchor="middle">JPG</text>
    <rect x="392" y="800" width="240" height="140" rx="22" fill="#3A86FF" stroke="#0D47A1" stroke-width="12"/>
    <text x="512" y="892" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">HEIC</text>
    <rect x="664" y="800" width="240" height="140" rx="22" fill="#FFD93D" stroke="#B88A00" stroke-width="12"/>
    <text x="784" y="892" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#B88A00" text-anchor="middle">MP4</text>
  </g>
</svg>
