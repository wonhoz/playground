<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document page -->
  <rect x="90" y="70" width="280" height="370" rx="10" fill="url(#pageGrad)" stroke="#444" stroke-width="2"/>
  <!-- Page fold -->
  <polygon points="330,70 370,70 370,110" fill="#333"/>
  <polygon points="330,70 370,110 330,110" fill="#555"/>
  <!-- Document lines -->
  <rect x="115" y="105" width="210" height="10" rx="5" fill="#555"/>
  <rect x="115" y="128" width="190" height="10" rx="5" fill="#555"/>
  <!-- Strikethrough red line (deleted) -->
  <rect x="115" y="151" width="210" height="10" rx="5" fill="#9A3412" opacity="0.7"/>
  <line x1="113" y1="156" x2="330" y2="156" stroke="#EF4444" stroke-width="2.5"/>
  <rect x="115" y="174" width="170" height="10" rx="5" fill="#555"/>
  <!-- Green insertion underline -->
  <rect x="115" y="197" width="220" height="10" rx="5" fill="#14532D" opacity="0.7"/>
  <line x1="113" y1="210" x2="340" y2="210" stroke="#22C55E" stroke-width="2.5"/>
  <rect x="115" y="220" width="195" height="10" rx="5" fill="#555"/>
  <rect x="115" y="243" width="210" height="10" rx="5" fill="#555"/>
  <!-- Another strikethrough -->
  <rect x="115" y="266" width="185" height="10" rx="5" fill="#9A3412" opacity="0.7"/>
  <line x1="113" y1="271" x2="305" y2="271" stroke="#EF4444" stroke-width="2.5"/>
  <rect x="115" y="289" width="215" height="10" rx="5" fill="#555"/>
  <rect x="115" y="312" width="160" height="10" rx="5" fill="#555"/>
  <rect x="115" y="335" width="200" height="10" rx="5" fill="#14532D" opacity="0.7"/>
  <line x1="113" y1="348" x2="320" y2="348" stroke="#22C55E" stroke-width="2.5"/>
  <rect x="115" y="358" width="180" height="10" rx="5" fill="#555"/>
  <!-- Red pen -->
  <g transform="rotate(-35, 370, 310)">
    <rect x="355" y="250" width="30" height="120" rx="5" fill="url(#penGrad)"/>
    <polygon points="355,370 385,370 370,410" fill="#B91C1C"/>
    <rect x="355" y="250" width="30" height="20" rx="5" fill="#FCA5A5"/>
    <rect x="360" y="268" width="20" height="5" rx="2" fill="#DC2626"/>
  </g>
</svg>
