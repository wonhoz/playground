<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#76ff03" stop-opacity="0"/>
      <stop offset="50%" stop-color="#76ff03" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#76ff03" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document with log lines -->
  <rect x="80" y="80" width="352" height="352" rx="12" fill="#1e2a1e" stroke="#388e3c" stroke-width="3"/>
  <!-- Log lines -->
  <rect x="104" y="116" width="200" height="10" rx="5" fill="#4caf50" opacity="0.8"/>
  <text x="316" y="126" font-family="monospace" font-size="13" fill="#4caf50">INFO</text>
  <rect x="104" y="148" width="180" height="10" rx="5" fill="#ef5350" opacity="0.9"/>
  <text x="316" y="158" font-family="monospace" font-size="13" fill="#ef5350">ERROR</text>
  <rect x="104" y="180" width="220" height="10" rx="5" fill="#4caf50" opacity="0.8"/>
  <text x="316" y="190" font-family="monospace" font-size="13" fill="#4caf50">INFO</text>
  <rect x="104" y="212" width="160" height="10" rx="5" fill="#ffd740" opacity="0.9"/>
  <text x="316" y="222" font-family="monospace" font-size="13" fill="#ffd740">WARN</text>
  <rect x="104" y="244" width="200" height="10" rx="5" fill="#4caf50" opacity="0.8"/>
  <text x="316" y="254" font-family="monospace" font-size="13" fill="#4caf50">INFO</text>
  <rect x="104" y="276" width="190" height="10" rx="5" fill="#ef5350" opacity="0.9"/>
  <text x="316" y="286" font-family="monospace" font-size="13" fill="#ef5350">ERROR</text>
  <rect x="104" y="308" width="210" height="10" rx="5" fill="#4caf50" opacity="0.8"/>
  <text x="316" y="318" font-family="monospace" font-size="13" fill="#4caf50">INFO</text>
  <!-- Scan beam over ERROR line -->
  <rect x="80" y="138" width="352" height="30" fill="url(#beam)"/>
  <line x1="80" y1="153" x2="432" y2="153" stroke="#76ff03" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Lens circle at right -->
  <circle cx="380" cy="420" r="60" fill="none" stroke="#76ff03" stroke-width="6" opacity="0.7"/>
  <line x1="423" y1="463" x2="455" y2="495" stroke="#76ff03" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
</svg>
