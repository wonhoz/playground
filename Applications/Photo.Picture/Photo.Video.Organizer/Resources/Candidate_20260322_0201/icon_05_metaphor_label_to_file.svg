<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="bg-clip-05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="bg-grad-05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="tag-grad-05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFC200"/>
    </linearGradient>
    <linearGradient id="file-grad-05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#F5E8B0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg-grad-05)"/>

  <!-- 메인: 큰 가격표/라벨 태그 (중앙 왼쪽) -->
  <!-- 태그 몸체 -->
  <path d="M 120 260 L 120 680 Q 120 720 160 720 L 480 720 Q 520 720 540 680 L 640 512 L 540 344 Q 520 304 480 304 L 160 304 Q 120 304 120 260 Z"
        fill="url(#tag-grad-05)" stroke="#CC9900" stroke-width="4"/>
  <!-- 태그 구멍 -->
  <circle cx="180" cy="512" r="36" fill="#B8860B" stroke="#CC9900" stroke-width="4"/>
  <circle cx="180" cy="512" r="20" fill="#8B6914"/>
  <!-- 태그 실 -->
  <line x1="144" y1="512" x2="80" y2="460" stroke="#CC9900" stroke-width="6" stroke-linecap="round"/>

  <!-- 태그 안 텍스트 (EXIF 데이터) -->
  <text x="260" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#5C3D00">DATE</text>
  <text x="260" y="468" font-family="'Courier New', monospace" font-size="30" fill="#7A5000">2024-07-15</text>
  <line x1="240" y1="484" x2="590" y2="484" stroke="#CC9900" stroke-width="2" opacity="0.5"/>
  <text x="260" y="524" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#5C3D00">LOC</text>
  <text x="260" y="572" font-family="'Courier New', monospace" font-size="30" fill="#7A5000">도쿄 JP</text>
  <line x1="240" y1="588" x2="590" y2="588" stroke="#CC9900" stroke-width="2" opacity="0.5"/>
  <text x="260" y="628" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#5C3D00">TYPE</text>
  <text x="260" y="676" font-family="'Courier New', monospace" font-size="30" fill="#7A5000">.jpg</text>

  <!-- 변환 화살표 (오른쪽 방향) -->
  <path d="M 660 480 L 720 480 L 720 450 L 780 512 L 720 574 L 720 544 L 660 544 Z"
        fill="#FF8C00" stroke="#CC6600" stroke-width="3" stroke-linejoin="round"/>

  <!-- 결과 파일 카드 -->
  <rect x="800" y="340" width="160" height="200" rx="12" fill="url(#file-grad-05)" stroke="#CC9900" stroke-width="3"/>
  <!-- 파일 접힌 모서리 -->
  <path d="M 920 340 L 960 380 L 920 380 Z" fill="#E8D080" stroke="#CC9900" stroke-width="2"/>
  <!-- 파일 아이콘 (이미지) -->
  <rect x="818" y="380" width="100" height="70" rx="6" fill="#D4B840"/>
  <circle cx="842" cy="402" r="10" fill="#8B6914"/>
  <path d="M 818 430 L 848 410 L 878 440 L 908 420 L 918 450 L 818 450 Z" fill="#A08020"/>
  <!-- 파일명 -->
  <text x="880" y="476" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#5C3D00" font-weight="700">2024-07-15</text>
  <text x="880" y="500" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#7A5000">_도쿄.jpg</text>
  <text x="880" y="524" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#999966">IMG_0001</text>

  <!-- 하단 설명 바 -->
  <rect x="80" y="800" width="864" height="80" rx="16" fill="#5C3D00" opacity="0.7"/>
  <text x="512" y="850" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#FFD700">EXIF 태그 → 파일명 변환</text>
</svg>
