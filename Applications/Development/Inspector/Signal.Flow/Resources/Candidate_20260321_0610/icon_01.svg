<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050A1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1430;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow1s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#0088FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CCFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow2s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0044CC;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#0066EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow3s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AACC;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#00CCEE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFEE;stop-opacity:1" />
    </linearGradient>
    <filter id="flowglow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01s)"/>
  <!-- 파이프라인 배경 트랙 -->
  <rect x="240" y="326" width="544" height="56" rx="28" fill="#0A1428" opacity="0.8"/>
  <rect x="240" y="462" width="544" height="56" rx="28" fill="#0A1428" opacity="0.8"/>
  <rect x="240" y="598" width="544" height="56" rx="28" fill="#0A1428" opacity="0.8"/>
  <!-- Layer 2: 이벤트 흐름 화살표 스트림 (상단) -->
  <g filter="url(#flowglow)">
    <!-- 스트림 1 (밝은 파랑) -->
    <line x1="260" y1="354" x2="760" y2="354" stroke="url(#arrow1s)" stroke-width="18" stroke-linecap="round"/>
    <polygon points="760,334 800,354 760,374" fill="#00CCFF"/>
    <!-- 이벤트 파티클들 -->
    <circle cx="340" cy="354" r="12" fill="#0088FF" opacity="0.9"/>
    <circle cx="460" cy="354" r="12" fill="#0099FF" opacity="0.8"/>
    <circle cx="580" cy="354" r="10" fill="#00AAFF" opacity="0.7"/>
    <circle cx="680" cy="354" r="8" fill="#00BBFF" opacity="0.6"/>
    <!-- 스트림 2 (중간 파랑) -->
    <line x1="260" y1="490" x2="660" y2="490" stroke="url(#arrow2s)" stroke-width="16" stroke-linecap="round"/>
    <polygon points="660,470 700,490 660,510" fill="#0099FF"/>
    <circle cx="380" cy="490" r="10" fill="#0077EE" opacity="0.9"/>
    <circle cx="490" cy="490" r="10" fill="#0088EE" opacity="0.8"/>
    <circle cx="590" cy="490" r="8" fill="#0099EE" opacity="0.7"/>
    <!-- 스트림 3 (사이안) -->
    <line x1="260" y1="626" x2="540" y2="626" stroke="url(#arrow3s)" stroke-width="14" stroke-linecap="round"/>
    <polygon points="540,610 580,626 540,642" fill="#00FFEE"/>
    <circle cx="350" cy="626" r="9" fill="#00CCEE" opacity="0.9"/>
    <circle cx="450" cy="626" r="8" fill="#00DDEE" opacity="0.7"/>
  </g>
  <!-- Layer 3: 레이블 -->
  <rect x="240" y="248" width="180" height="40" rx="10" fill="#0A1428" stroke="#0088FF" stroke-width="3"/>
  <text x="330" y="274" font-family="sans-serif" font-size="24" fill="#00AAFF" text-anchor="middle" font-weight="bold">SOURCE</text>
  <rect x="680" y="248" width="144" height="40" rx="10" fill="#0A1428" stroke="#00CCFF" stroke-width="3"/>
  <text x="752" y="274" font-family="sans-serif" font-size="24" fill="#00CCFF" text-anchor="middle" font-weight="bold">SINK</text>
  <!-- 라인 번호 -->
  <text x="230" y="360" font-family="monospace" font-size="22" fill="#0055AA" text-anchor="end" opacity="0.8">E1</text>
  <text x="230" y="496" font-family="monospace" font-size="22" fill="#0055AA" text-anchor="end" opacity="0.8">E2</text>
  <text x="230" y="632" font-family="monospace" font-size="22" fill="#0055AA" text-anchor="end" opacity="0.8">E3</text>
  <!-- 하단 타임스탬프 바 -->
  <rect x="240" y="720" width="544" height="30" rx="8" fill="#0A1A2A" stroke="#0066AA" stroke-width="2"/>
  <rect x="244" y="724" width="100" height="22" rx="6" fill="#0088FF" opacity="0.7"/>
  <rect x="348" y="724" width="160" height="22" rx="6" fill="#0066CC" opacity="0.6"/>
  <rect x="512" y="724" width="70" height="22" rx="6" fill="#004499" opacity="0.5"/>
  <rect x="586" y="724" width="120" height="22" rx="6" fill="#0066CC" opacity="0.6"/>
</svg>