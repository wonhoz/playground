<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Plot area -->
  <rect x="70" y="70" width="372" height="320" rx="4" fill="#0d1117" stroke="#1e2a3a" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="70" y1="150" x2="442" y2="150" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="230" x2="442" y2="230" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="310" x2="442" y2="310" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="164" y1="70" x2="164" y2="390" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="256" y1="70" x2="256" y2="390" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="348" y1="70" x2="348" y2="390" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Trend line -->
  <line x1="80" y1="360" x2="432" y2="100" stroke="#4a9eff" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <!-- Scatter data points cluster 1 (blue) -->
  <circle cx="110" cy="320" r="7" fill="#2196f3" opacity="0.8"/>
  <circle cx="130" cy="300" r="6" fill="#2196f3" opacity="0.7"/>
  <circle cx="155" cy="285" r="8" fill="#2196f3" opacity="0.9"/>
  <circle cx="140" cy="340" r="5" fill="#2196f3" opacity="0.6"/>
  <circle cx="170" cy="270" r="7" fill="#2196f3" opacity="0.8"/>
  <circle cx="120" cy="355" r="6" fill="#2196f3" opacity="0.5"/>
  <circle cx="190" cy="260" r="9" fill="#2196f3" opacity="0.85"/>
  <circle cx="180" cy="305" r="5" fill="#2196f3" opacity="0.6"/>
  <!-- Scatter data points cluster 2 (green) -->
  <circle cx="240" cy="220" r="8" fill="#4caf50" opacity="0.8"/>
  <circle cx="265" cy="195" r="7" fill="#4caf50" opacity="0.9"/>
  <circle cx="255" cy="240" r="6" fill="#4caf50" opacity="0.7"/>
  <circle cx="290" cy="185" r="9" fill="#4caf50" opacity="0.85"/>
  <circle cx="275" cy="225" r="6" fill="#4caf50" opacity="0.6"/>
  <circle cx="310" cy="175" r="7" fill="#4caf50" opacity="0.8"/>
  <circle cx="300" cy="210" r="5" fill="#4caf50" opacity="0.6"/>
  <circle cx="320" cy="200" r="8" fill="#4caf50" opacity="0.7"/>
  <!-- Scatter data points cluster 3 (orange) -->
  <circle cx="360" cy="130" r="9" fill="#ff9800" opacity="0.9"/>
  <circle cx="380" cy="115" r="7" fill="#ff9800" opacity="0.8"/>
  <circle cx="400" cy="105" r="11" fill="#ff9800" opacity="0.85"/>
  <circle cx="370" cy="150" r="6" fill="#ff9800" opacity="0.7"/>
  <circle cx="420" cy="95" r="8" fill="#ff9800" opacity="0.9"/>
  <circle cx="390" cy="130" r="6" fill="#ff9800" opacity="0.65"/>
  <circle cx="410" cy="120" r="7" fill="#ff9800" opacity="0.75"/>
  <!-- Outlier points -->
  <circle cx="200" cy="130" r="6" fill="#e91e63" opacity="0.7"/>
  <circle cx="320" cy="320" r="5" fill="#e91e63" opacity="0.6"/>
  <circle cx="420" cy="250" r="7" fill="#e91e63" opacity="0.65"/>
  <!-- Axes -->
  <line x1="70" y1="390" x2="442" y2="390" stroke="#3a4a5a" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="390" stroke="#3a4a5a" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="256" y="415" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">X axis (dimension)</text>
  <text x="44" y="230" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle" transform="rotate(-90, 44, 230)">Y axis (value)</text>
  <!-- Legend -->
  <circle cx="300" cy="428" r="6" fill="#2196f3"/>
  <text x="312" y="433" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Group A</text>
  <circle cx="360" cy="428" r="6" fill="#4caf50"/>
  <text x="372" y="433" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Group B</text>
  <circle cx="420" cy="428" r="6" fill="#ff9800"/>
  <text x="432" y="433" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Group C</text>
  <!-- Title -->
  <text x="256" y="470" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#4a9eff" text-anchor="middle" letter-spacing="2">DATA MAP</text>
  <text x="256" y="494" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Scatter Analysis</text>
</svg>
