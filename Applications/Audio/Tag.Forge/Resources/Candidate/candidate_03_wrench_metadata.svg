<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050e1a"/>
      <stop offset="100%" stop-color="#0a1f35"/>
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="metaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="wrenchGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Metadata card / file -->
  <rect x="230" y="150" width="200" height="240" rx="12" fill="#050e1a" stroke="url(#metaGrad)" stroke-width="2.5"/>
  <!-- File notch top right -->
  <path d="M390 150 L430 190 L390 190Z" fill="#0a1f35"/>
  <path d="M390 150 L430 150 L430 190Z" fill="#060f1e"/>
  <!-- Metadata lines -->
  <rect x="248" y="185" width="60" height="10" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="318" y="185" width="88" height="10" rx="3" fill="#60a5fa" opacity="0.5"/>
  <rect x="248" y="210" width="50" height="10" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="308" y="210" width="100" height="10" rx="3" fill="#60a5fa" opacity="0.5"/>
  <rect x="248" y="235" width="65" height="10" rx="3" fill="#38bdf8" opacity="0.6"/>
  <rect x="323" y="235" width="85" height="10" rx="3" fill="#60a5fa" opacity="0.4"/>
  <rect x="248" y="260" width="80" height="10" rx="3" fill="#38bdf8" opacity="0.6"/>
  <rect x="338" y="260" width="70" height="10" rx="3" fill="#60a5fa" opacity="0.4"/>
  <rect x="248" y="285" width="40" height="10" rx="3" fill="#38bdf8" opacity="0.5"/>
  <rect x="298" y="285" width="110" height="10" rx="3" fill="#60a5fa" opacity="0.3"/>
  <!-- Music note in file -->
  <g transform="translate(330, 340)" filter="url(#wrenchGlow)">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#38bdf8" transform="rotate(-20)"/>
    <line x1="14" y1="-2" x2="14" y2="-50" stroke="#38bdf8" stroke-width="3.5"/>
    <line x1="14" y1="-50" x2="38" y2="-42" stroke="#38bdf8" stroke-width="3"/>
  </g>
  <!-- Wrench overlay -->
  <g transform="rotate(-45 180 310)">
    <!-- Wrench jaw top -->
    <path d="M148 210 C130 210 112 225 112 248 C112 270 130 285 148 285 L178 285 L178 260 L148 260 C142 260 138 255 138 248 C138 241 142 235 148 235 L178 235 L178 210Z" fill="url(#wrenchGrad)" filter="url(#wrenchGlow)"/>
    <!-- Wrench handle -->
    <rect x="166" y="270" width="30" height="165" rx="10" fill="url(#wrenchGrad)"/>
    <!-- Handle grip lines -->
    <line x1="170" y1="310" x2="192" y2="310" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
    <line x1="170" y1="328" x2="192" y2="328" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
    <line x1="170" y1="346" x2="192" y2="346" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
  </g>
</svg>