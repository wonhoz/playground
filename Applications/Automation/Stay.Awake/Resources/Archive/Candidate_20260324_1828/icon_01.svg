  <circle cx="512" cy="420" r="140" fill="url(#iris01)" clip-path="url(#eyeClip01)"/>
  <!-- 홍채 방사선 -->
  <circle cx="512" cy="420" r="140" fill="none" stroke="#0EA5E9" stroke-width="3" opacity="0.4" clip-path="url(#eyeClip01)"/>
  <!-- 동공 -->
  <circle cx="512" cy="420" r="74" fill="#061220"/>
  <!-- 눈 하이라이트 -->
  <circle cx="556" cy="383" r="38" fill="white" opacity="0.85"/>
  <circle cx="490" cy="452" r="20" fill="white" opacity="0.45"/>
  <!-- 눈 테두리 위쪽 -->
  <path d="M202 420 Q360 230 512 218 Q664 230 822 420" stroke="#1565A8" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- 눈 테두리 아래쪽 -->
  <path d="M202 420 Q360 600 512 612 Q664 600 822 420" stroke="#1565A8" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- 속눈썹 위쪽 5개 -->
  <line x1="340" y1="260" x2="322" y2="220" stroke="#1565A8" stroke-width="16" stroke-linecap="round"/>
  <line x1="418" y1="234" x2="408" y2="192" stroke="#1565A8" stroke-width="16" stroke-linecap="round"/>
  <line x1="512" y1="222" x2="512" y2="178" stroke="#1565A8" stroke-width="16" stroke-linecap="round"/>
  <line x1="606" y1="234" x2="616" y2="192" stroke="#1565A8" stroke-width="16" stroke-linecap="round"/>
  <line x1="684" y1="260" x2="702" y2="220" stroke="#1565A8" stroke-width="16" stroke-linecap="round"/>
  <!-- Active 초록 점 (3중 원 + 글로우) -->
  <circle cx="512" cy="760" r="110" fill="url(#glow01)"/>
  <circle cx="512" cy="760" r="80" fill="#16A34A"/>
  <circle cx="512" cy="760" r="58" fill="#22C55E"/>
  <circle cx="512" cy="760" r="36" fill="#86EFAC"/>
  <!-- Active 라벨 -->
  <text x="512" y="890" font-family="Arial Black, Arial" font-weight="900" font-size="46" fill="#0369A1" text-anchor="middle" opacity="0.8">ACTIVE</text>
