<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — bright sunshine yellow -->
  <rect width="1024" height="1024" rx="190" fill="#FFE135"/>

  <!-- Layer 2: "Ctrl + ?" composition -->
  <!-- "Ctrl" key pill -->
  <rect x="112" y="220" width="340" height="200" rx="40" fill="#3A3A8A" stroke="#FFFFFF" stroke-width="14"/>
  <text x="282" y="340" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="110" font-weight="900" fill="#FFFFFF">Ctrl</text>

  <!-- "+" symbol -->
  <text x="512" y="370" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="160" font-weight="900" fill="#3A3A8A">+</text>

  <!-- "?" in big magenta circle -->
  <circle cx="800" cy="320" r="164" fill="#E91E8C" stroke="#FFFFFF" stroke-width="16"/>
  <text x="800" y="380" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="200" font-weight="900" fill="#FFFFFF">?</text>

  <!-- Layer 3: Result scan badge at bottom -->
  <rect x="112" y="560" width="800" height="340" rx="36" fill="#FFFFFF" opacity="0.92"/>

  <text x="512" y="630" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" fill="#555">단축키 스캔 결과</text>

  <!-- Status bars -->
  <circle cx="172" cy="696" r="22" fill="#2ECC71"/>
  <text x="210" y="706" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#2ECC71">38</text>
  <text x="274" y="706" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#888">사용가능</text>

  <circle cx="502" cy="696" r="22" fill="#E74C3C"/>
  <text x="540" y="706" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#E74C3C">14</text>
  <text x="604" y="706" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#888">점유</text>

  <circle cx="172" cy="822" r="22" fill="#E67E22"/>
  <text x="210" y="832" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#E67E22">11</text>
  <text x="274" y="832" font-family="'Segoe UI',Arial,sans-serif" font-size="36" fill="#888">시스템 예약</text>
</svg>
