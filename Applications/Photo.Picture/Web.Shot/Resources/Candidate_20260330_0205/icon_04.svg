<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="50%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="screen4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 비비드 오렌지 배경 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg4)"/>

  <!-- Layer 2: 화면 (스크린샷 대상) — 대각선 동적 구성 -->
  <!-- 모니터/화면 -->
  <rect x="100" y="160" width="640" height="440" rx="20" fill="url(#screen4)" stroke="white" stroke-width="8"/>
  <!-- 화면 내 웹페이지 미리보기 -->
  <rect x="120" y="180" width="600" height="50" rx="8" fill="#1565C0" opacity="0.8"/>
  <text x="420" y="207" font-family="'Courier New',monospace" font-size="22" fill="#90CAF9" text-anchor="middle" dominant-baseline="middle">https://example.com</text>
  <rect x="120" y="244" width="460" height="22" rx="5" fill="#90CAF9" opacity="0.5"/>
  <rect x="120" y="278" width="380" height="22" rx="5" fill="#90CAF9" opacity="0.4"/>
  <rect x="120" y="312" width="420" height="22" rx="5" fill="#90CAF9" opacity="0.3"/>
  <rect x="120" y="380" width="280" height="160" rx="8" fill="#42A5F5" opacity="0.3"/>
  <text x="260" y="462" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#1565C0" text-anchor="middle" dominant-baseline="middle">[ image ]</text>

  <!-- Layer 3: 카메라 (대각선 방향 동적) — 오른쪽 하단 -->
  <!-- 카메라 몸체 -->
  <rect x="540" y="500" width="380" height="260" rx="30" fill="#212121" stroke="white" stroke-width="6"/>
  <!-- 렌즈 -->
  <circle cx="700" cy="630" r="90" fill="#37474F" stroke="white" stroke-width="6"/>
  <circle cx="700" cy="630" r="64" fill="#263238"/>
  <circle cx="700" cy="630" r="40" fill="#1A237E"/>
  <circle cx="700" cy="630" r="18" fill="#42A5F5"/>
  <!-- 셔터 버튼 -->
  <circle cx="860" cy="520" r="26" fill="#FF6F00"/>
  <!-- 플래시 효과 (빛줄기) -->
  <line x1="100" y1="600" x2="540" y2="600" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.8" stroke-dasharray="20 14"/>
  <!-- 캡처 순간 반짝임 -->
  <circle cx="420" cy="380" r="20" fill="white" opacity="0.7"/>
  <circle cx="420" cy="380" r="12" fill="#FFD740"/>
</svg>
