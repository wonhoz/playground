<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Playlist lines + play chevron -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#071207"/>
  <!-- Playlist lines -->
  <!-- Line 1 (active - with note icon) -->
  <rect x="160" y="280" width="520" height="60" rx="12" fill="#1B5E20" stroke="#4CAF50" stroke-width="4"/>
  <circle cx="200" cy="310" r="20" fill="#4CAF50"/>
  <rect x="240" y="298" width="200" height="16" rx="8" fill="#4CAF50" opacity="0.9"/>
  <rect x="240" y="320" width="140" height="12" rx="6" fill="#4CAF50" opacity="0.5"/>
  <!-- Play indicator on active -->
  <path d="M634 292 L634 328 L670 310 Z" fill="#4CAF50"/>
  <!-- Line 2 -->
  <rect x="160" y="364" width="520" height="56" rx="12" fill="#0D2B0D"/>
  <circle cx="200" cy="392" r="18" fill="#2E7D32" opacity="0.6"/>
  <rect x="240" y="380" width="180" height="14" rx="7" fill="#4CAF50" opacity="0.5"/>
  <rect x="240" y="400" width="120" height="12" rx="6" fill="#4CAF50" opacity="0.3"/>
  <!-- Line 3 -->
  <rect x="160" y="440" width="520" height="56" rx="12" fill="#0D2B0D"/>
  <circle cx="200" cy="468" r="18" fill="#2E7D32" opacity="0.6"/>
  <rect x="240" y="456" width="200" height="14" rx="7" fill="#4CAF50" opacity="0.5"/>
  <rect x="240" y="476" width="150" height="12" rx="6" fill="#4CAF50" opacity="0.3"/>
  <!-- Line 4 -->
  <rect x="160" y="516" width="520" height="56" rx="12" fill="#0D2B0D"/>
  <circle cx="200" cy="544" r="18" fill="#2E7D32" opacity="0.6"/>
  <rect x="240" y="532" width="160" height="14" rx="7" fill="#4CAF50" opacity="0.5"/>
  <rect x="240" y="552" width="100" height="12" rx="6" fill="#4CAF50" opacity="0.3"/>
  <!-- Playback controls bar at bottom -->
  <rect x="160" y="640" width="520" height="80" rx="20" fill="#1B5E20" opacity="0.5"/>
  <!-- Prev -->
  <path d="M230 680 L230 700 M210 680 L230 690 L210 700 Z" fill="none" stroke="#4CAF50" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Play -->
  <path d="M320 668 L320 712 L368 690 Z" fill="#4CAF50"/>
  <!-- Next -->
  <path d="M440 680 L440 700 M460 680 L440 690 L460 700 Z" fill="none" stroke="#4CAF50" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shuffle -->
  <path d="M530 675 Q570 675 590 690 Q570 705 530 705" fill="none" stroke="#4CAF50" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <path d="M530 690 Q560 685 580 675" fill="none" stroke="#4CAF50" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
</svg>
