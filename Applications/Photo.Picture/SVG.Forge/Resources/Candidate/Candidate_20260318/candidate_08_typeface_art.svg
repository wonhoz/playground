<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 텍스트를 벡터 패스로 변환 -->
  <!-- 메인 텍스트 SVG (아웃라인 변환됨) -->
  <text x="256" y="190" text-anchor="middle" font-size="100" font-weight="bold" fill="url(#textgrad)" filter="url(#glow)" opacity="0.9" font-family="serif">SVG</text>
  <!-- 아웃라인 효과 -->
  <text x="256" y="190" text-anchor="middle" font-size="100" font-weight="bold" fill="none" stroke="#C084FC" stroke-width="1" filter="url(#glow)" opacity="0.5" font-family="serif">SVG</text>
  <!-- 앵커 포인트 표시 (텍스트 패스 변환) -->
  <circle cx="88" cy="150" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="88" cy="200" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="140" cy="125" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="192" cy="125" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="192" cy="200" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="230" cy="165" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="282" cy="165" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="282" cy="200" r="4" fill="#FDE047" opacity="0.8"/>
  <circle cx="330" cy="125" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="424" cy="125" r="4" fill="#C084FC" opacity="0.7"/>
  <circle cx="375" cy="200" r="4" fill="#FDE047" opacity="0.8"/>
  <!-- 텍스트 → 패스 변환 화살표 -->
  <path d="M110,230 Q110,255 256,265 Q400,255 400,230" fill="none" stroke="#C084FC" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="256" y="258" text-anchor="middle" font-size="10" fill="#C084FC" opacity="0.6">Convert to Path</text>
  <!-- 변환된 패스 아웃라인 -->
  <text x="256" y="360" text-anchor="middle" font-size="60" font-weight="bold" fill="none" stroke="#C084FC" stroke-width="1.5" filter="url(#glow)" opacity="0.8" font-family="serif">SVG</text>
  <!-- 패스 변환 후 앵커 포인트들 (더 많음) -->
  <circle cx="100" cy="320" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="115" cy="330" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="140" cy="310" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="165" cy="325" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="185" cy="310" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="205" cy="340" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="230" cy="325" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="256" cy="310" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="280" cy="325" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="305" cy="340" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="330" cy="325" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="355" cy="310" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="380" cy="325" r="3" fill="#C084FC" opacity="0.6"/>
  <circle cx="405" cy="340" r="3" fill="#FDE047" opacity="0.7"/>
  <!-- 하단 -->
  <rect x="130" y="420" width="252" height="52" rx="10" fill="#0a0514" stroke="#C084FC" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#C084FC" filter="url(#glow)" opacity="0.9">TEXT TO PATH</text>
</svg>
