<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal · 레이어드 · 퀴즈 카드 스택 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#E8EAF6"/>
  <!-- 뒷 카드 -->
  <g transform="rotate(-8 512 500)">
    <rect x="180" y="170" width="664" height="160" rx="30" fill="#06D6A0" stroke="#056B4F" stroke-width="12"/>
    <text x="512" y="280" font-family="Arial Black, sans-serif" font-weight="900" font-size="94" fill="#FFFFFF" text-anchor="middle">HISTORY</text>
  </g>
  <!-- 중간 카드 -->
  <g transform="rotate(-2 512 520)">
    <rect x="160" y="320" width="704" height="160" rx="30" fill="#3A86FF" stroke="#0D47A1" stroke-width="12"/>
    <text x="512" y="430" font-family="Arial Black, sans-serif" font-weight="900" font-size="94" fill="#FFFFFF" text-anchor="middle">SCIENCE</text>
  </g>
  <!-- 앞 카드 (문제) -->
  <g transform="rotate(4 512 680)">
    <rect x="140" y="510" width="744" height="360" rx="30" fill="#FFFFFF" stroke="#4A148C" stroke-width="16"/>
    <rect x="160" y="530" width="704" height="90" rx="18" fill="#4A148C"/>
    <text x="512" y="596" font-family="Arial Black, sans-serif" font-weight="900" font-size="60" fill="#FFD93D" text-anchor="middle">Question 5 / 20</text>
    <text x="512" y="720" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#4A148C" text-anchor="middle">? ? ?</text>
    <!-- A B C D 도트 -->
    <g>
      <circle cx="250" cy="810" r="30" fill="#FF6B9D"/>
      <text x="250" y="825" font-family="Arial Black" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">A</text>
      <circle cx="420" cy="810" r="30" fill="#06D6A0"/>
      <text x="420" y="825" font-family="Arial Black" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">B</text>
      <circle cx="590" cy="810" r="30" fill="#FFD93D"/>
      <text x="590" y="825" font-family="Arial Black" font-weight="900" font-size="38" fill="#5C4000" text-anchor="middle">C</text>
      <circle cx="760" cy="810" r="30" fill="#3A86FF"/>
      <text x="760" y="825" font-family="Arial Black" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle">D</text>
    </g>
  </g>
  <!-- 상단 배지 -->
  <rect x="332" y="80" width="360" height="100" rx="38" fill="#FFD93D" stroke="#B88A00" stroke-width="12"/>
  <text x="512" y="156" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#4A148C" text-anchor="middle">QUIZ TIME</text>
</svg>
