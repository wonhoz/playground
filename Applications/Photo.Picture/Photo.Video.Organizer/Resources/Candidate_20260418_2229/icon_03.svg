  <text x="512" y="347" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">04-13</text>

  <rect x="674" y="130" width="240" height="220" rx="14" fill="#64B5F6"/>
