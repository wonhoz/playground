  <ellipse cx="326" cy="302" rx="14" ry="14" fill="#111111"/>
  <!-- Tape between spools -->
  <path d="M186,302 Q256,282 326,302" fill="none" stroke="#ff6600" stroke-width="6"/>
  <path d="M186,302 Q256,322 326,302" fill="none" stroke="#cc4400" stroke-width="4"/>
  <!-- Bottom metal bar -->
