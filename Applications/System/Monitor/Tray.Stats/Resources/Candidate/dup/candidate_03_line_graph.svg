<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#1a1a30"/>
    </linearGradient>
    <linearGradient id="cpu_fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4488ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mem_fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44ff88" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ff88" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Panel background -->
  <rect x="70" y="80" width="372" height="300" rx="12" fill="#111122"/>
  <rect x="70" y="80" width="372" height="300" rx="12" fill="none" stroke="#2a2a44" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="70" y1="155" x2="442" y2="155" stroke="#1a1a33" stroke-width="1"/>
  <line x1="70" y1="230" x2="442" y2="230" stroke="#1a1a33" stroke-width="1"/>
  <line x1="70" y1="305" x2="442" y2="305" stroke="#1a1a33" stroke-width="1"/>
  <!-- CPU line fill -->
  <path d="M70 305 L110 260 L150 280 L190 230 L230 250 L270 200 L310 240 L350 180 L390 220 L442 240 L442 380 L70 380Z" fill="url(#cpu_fill)"/>
  <!-- CPU line -->
  <polyline points="70,305 110,260 150,280 190,230 230,250 270,200 310,240 350,180 390,220 442,240" fill="none" stroke="#4488ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Memory line fill -->
  <path d="M70 320 L110 300 L150 310 L190 270 L230 280 L270 290 L310 260 L350 270 L390 250 L442 260 L442 380 L70 380Z" fill="url(#mem_fill)"/>
  <!-- Memory line -->
  <polyline points="70,320 110,300 150,310 190,270 230,280 270,290 310,260 350,270 390,250 442,260" fill="none" stroke="#44ff88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points on CPU line -->
  <circle cx="350" cy="180" r="5" fill="#4488ff"/>
  <circle cx="270" cy="200" r="5" fill="#4488ff"/>
  <!-- Legend -->
  <rect x="86" y="92" width="14" height="14" rx="3" fill="#4488ff"/>
  <text x="106" y="104" font-size="16" fill="#4488ff" font-family="monospace">CPU 48%</text>
  <rect x="200" y="92" width="14" height="14" rx="3" fill="#44ff88"/>
  <text x="220" y="104" font-size="16" fill="#44ff88" font-family="monospace">MEM 62%</text>
  <!-- Bottom status bar -->
  <rect x="70" y="400" width="372" height="72" rx="12" fill="#111122" stroke="#2a2a44" stroke-width="2"/>
  <!-- Mini stats -->
  <text x="100" y="428" font-size="13" fill="#4488ff" font-family="monospace">CPU</text>
  <rect x="88" y="434" width="80" height="8" rx="4" fill="#1a1a33"/>
  <rect x="88" y="434" width="38" height="8" rx="4" fill="#4488ff"/>
  <text x="200" y="428" font-size="13" fill="#44ff88" font-family="monospace">MEM</text>
  <rect x="188" y="434" width="80" height="8" rx="4" fill="#1a1a33"/>
  <rect x="188" y="434" width="50" height="8" rx="4" fill="#44ff88"/>
  <text x="300" y="428" font-size="13" fill="#ff9944" font-family="monospace">DISK</text>
  <rect x="288" y="434" width="80" height="8" rx="4" fill="#1a1a33"/>
  <rect x="288" y="434" width="22" height="8" rx="4" fill="#ff9944"/>
  <text x="96" y="460" font-size="13" fill="#666" font-family="monospace">48%</text>
  <text x="197" y="460" font-size="13" fill="#666" font-family="monospace">62%</text>
  <text x="297" y="460" font-size="13" fill="#666" font-family="monospace">28%</text>
</svg>