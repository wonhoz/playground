    <rect x="652" y="512" width="140" height="140" fill="#0C3344" opacity="0.7"/>
    <rect x="232" y="652" width="140" height="140" fill="#0C3344" opacity="0.7"/>
    <rect x="372" y="652" width="140" height="140" fill="#0E4A5E" opacity="0.7"/>
    <rect x="512" y="652" width="140" height="140" fill="#0C3344" opacity="0.7"/>
    <rect x="652" y="652" width="140" height="140" fill="#0E4A5E" opacity="0.7"/>
    <!-- 격자 테두리 -->
    <rect x="232" y="232" width="560" height="560" rx="12" fill="none" stroke="#22D3EE" stroke-width="10"/>
    <line x1="372" y1="232" x2="372" y2="792" stroke="#22D3EE" stroke-width="4" opacity="0.4"/>
    <line x1="512" y1="232" x2="512" y2="792" stroke="#22D3EE" stroke-width="4" opacity="0.4"/>
    <line x1="652" y1="232" x2="652" y2="792" stroke="#22D3EE" stroke-width="4" opacity="0.4"/>
