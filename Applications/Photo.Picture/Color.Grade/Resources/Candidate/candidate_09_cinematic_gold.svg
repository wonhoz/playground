<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1400"/>
      <stop offset="100%" stop-color="#3E2C00"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3800"/>
      <stop offset="40%" stop-color="#5D4600"/>
      <stop offset="100%" stop-color="#1C1400"/>
    </linearGradient>
    <linearGradient id="grade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8F00" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Cinematic black bars -->
  <rect x="96" y="130" width="320" height="260" rx="10" fill="url(#photo)"/>
  <rect x="96" y="130" width="320" height="46" rx="10" fill="#0A0800"/>
  <rect x="96" y="344" width="320" height="46" rx="10" fill="#0A0800"/>
  <rect x="96" y="376" width="320" height="14" rx="7" fill="#0A0800"/>
  <!-- Color grade overlay -->
  <rect x="96" y="176" width="320" height="168" rx="0" fill="url(#grade)"/>
  <!-- Scene elements -->
  <circle cx="256" cy="255" r="38" fill="#4A3800" stroke="#FFD54F" stroke-width="3" opacity="0.5"/>
  <polygon points="256,232 274,266 236,266" fill="#FFD54F" opacity="0.7"/>
  <!-- Waveform below -->
  <rect x="96" y="400" width="320" height="50" rx="8" fill="#1C1400"/>
  <path d="M100 425 Q130 408 160 425 Q190 442 220 425 Q250 408 280 425 Q310 442 340 425 Q370 408 400 425 Q416 433 412 435" fill="none" stroke="#FFB300" stroke-width="2.5" opacity="0.8"/>
  <!-- Temperature/tint badge -->
  <rect x="320" y="466" width="94" height="22" rx="11" fill="#E65100"/>
  <text x="367" y="481" text-anchor="middle" font-size="12" fill="#FFF9C4" font-family="Arial" font-weight="bold">3200K WARM</text>
</svg>
