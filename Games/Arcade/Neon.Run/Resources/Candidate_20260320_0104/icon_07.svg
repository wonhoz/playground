<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Laser grid floor (transparent perspective grid) -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#000510"/>
  <!-- Horizon line -->
  <line x1="140" y1="500" x2="884" y2="500" stroke="#00E5FF" stroke-width="3" opacity="0.5"/>
  <!-- Perspective horizontal lines (floor) -->
  <line x1="140" y1="580" x2="884" y2="580" stroke="#00E5FF" stroke-width="2.5" opacity="0.7"/>
  <line x1="140" y1="660" x2="884" y2="660" stroke="#00E5FF" stroke-width="3" opacity="0.8"/>
  <line x1="140" y1="740" x2="884" y2="740" stroke="#00E5FF" stroke-width="3.5" opacity="0.85"/>
  <line x1="140" y1="820" x2="884" y2="820" stroke="#00E5FF" stroke-width="4" opacity="0.9"/>
  <line x1="140" y1="880" x2="884" y2="880" stroke="#00E5FF" stroke-width="4.5" opacity="0.9"/>
  <!-- Perspective vertical lines converging to vanishing point 512,500 -->
  <line x1="140" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="232" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="324" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="418" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="512" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="606" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="700" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="792" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <line x1="884" y1="880" x2="512" y2="500" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  <!-- Grid node intersection glows (near rows) -->
  <circle cx="232" cy="820" r="6" fill="#00E5FF" opacity="0.6"/>
  <circle cx="418" cy="820" r="6" fill="#00E5FF" opacity="0.6"/>
  <circle cx="606" cy="820" r="6" fill="#00E5FF" opacity="0.6"/>
  <circle cx="792" cy="820" r="6" fill="#00E5FF" opacity="0.6"/>
  <circle cx="324" cy="740" r="5" fill="#00E5FF" opacity="0.5"/>
  <circle cx="700" cy="740" r="5" fill="#00E5FF" opacity="0.5"/>
  <!-- Overhead laser beams (vertical bright lines) -->
  <line x1="300" y1="140" x2="300" y2="500" stroke="#00E5FF" stroke-width="5" opacity="0.6"/>
  <line x1="512" y1="140" x2="512" y2="500" stroke="#00E5FF" stroke-width="5" opacity="0.8"/>
  <line x1="724" y1="140" x2="724" y2="500" stroke="#00E5FF" stroke-width="5" opacity="0.6"/>
  <!-- Laser source points at top -->
  <circle cx="300" cy="160" r="16" fill="#00E5FF" opacity="0.8"/>
  <circle cx="512" cy="160" r="20" fill="#80D8FF" opacity="0.9"/>
  <circle cx="724" cy="160" r="16" fill="#00E5FF" opacity="0.8"/>
</svg>
