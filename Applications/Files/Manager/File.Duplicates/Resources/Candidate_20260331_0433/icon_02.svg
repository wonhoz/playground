<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 황금 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>
  <!-- Layer 2: 복사기 몸통 -->
  <rect x="160" y="440" width="700" height="300" rx="32" fill="#546E7A"/>
  <rect x="160" y="440" width="700" height="80" rx="32" fill="#607D8B"/>
  <!-- 복사기 슬롯 -->
  <rect x="260" y="380" width="500" height="80" rx="8" fill="#37474F"/>
  <!-- 입력 파일 (넣는 중) -->
  <rect x="380" y="240" width="260" height="160" rx="16" fill="#1565C0"/>
  <text x="510" y="336" font-family="'Segoe UI', sans-serif" font-size="60" fill="white" text-anchor="middle">📄</text>
  <line x1="510" y1="400" x2="510" y2="460" stroke="#37474F" stroke-width="16" stroke-dasharray="20,12" stroke-linecap="round"/>
  <!-- Layer 3: 출력 파일들 (2개 나옴) -->
  <!-- 출력 슬롯 -->
  <rect x="260" y="740" width="500" height="60" rx="8" fill="#37474F"/>
  <!-- 파일 1 출력 -->
  <rect x="200" y="800" width="200" height="140" rx="16" fill="#FF6F00"/>
  <text x="300" y="884" font-family="'Segoe UI', sans-serif" font-size="52" fill="white" text-anchor="middle">📄</text>
  <!-- 파일 2 출력 -->
  <rect x="624" y="800" width="200" height="140" rx="16" fill="#FF6F00"/>
  <text x="724" y="884" font-family="'Segoe UI', sans-serif" font-size="52" fill="white" text-anchor="middle">📄</text>
  <!-- 복사 화살표들 -->
  <line x1="460" y1="800" x2="360" y2="800" stroke="#FF8F00" stroke-width="16" stroke-linecap="round"/>
  <line x1="564" y1="800" x2="664" y2="800" stroke="#FF8F00" stroke-width="16" stroke-linecap="round"/>
  <polygon points="360,778 332,800 360,822" fill="#FF8F00"/>
  <polygon points="664,778 692,800 664,822" fill="#FF8F00"/>
</svg>
