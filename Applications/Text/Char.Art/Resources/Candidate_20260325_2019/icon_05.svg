<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B09B"/>
      <stop offset="100%" stop-color="#96C93D"/>
    </linearGradient>
    <clipPath id="bgClip05">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: Large "A" -->
  <g clip-path="url(#bgClip05)">
    <!-- Shadow "A" (depth) -->
    <text x="512" y="500" font-size="700" fill="white" fill-opacity="0.09" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">A</text>
    <!-- Main "A" -->
    <text x="512" y="490" font-size="530" fill="white" fill-opacity="0.97" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif">A</text>
  </g>

  <!-- Layer 3: Floating "@#$%" + ART badge -->
  <g clip-path="url(#bgClip05)">
    <!-- Floating characters around the A -->
    <text x="208" y="405" font-size="82" fill="#FFD700" font-weight="700" font-family="Courier New, monospace">@</text>
    <text x="790" y="383" font-size="72" fill="white" fill-opacity="0.82" font-weight="700" font-family="Courier New, monospace">#</text>
    <text x="212" y="656" font-size="78" fill="white" fill-opacity="0.72" font-weight="700" font-family="Courier New, monospace">$</text>
    <text x="783" y="663" font-size="74" fill="#FFD700" font-weight="700" font-family="Courier New, monospace">%</text>

    <!-- Extra subtle characters -->
    <text x="220" y="530" font-size="52" fill="white" fill-opacity="0.35" font-weight="700" font-family="Courier New, monospace">&amp;</text>
    <text x="790" y="530" font-size="52" fill="white" fill-opacity="0.35" font-weight="700" font-family="Courier New, monospace">*</text>

    <!-- ART badge at bottom -->
    <rect x="332" y="748" width="360" height="98" rx="49" fill="white" fill-opacity="0.25"/>
    <text x="512" y="799" font-size="68" fill="white" font-weight="900" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Arial, sans-serif" letter-spacing="12">ART</text>
  </g>
</svg>
