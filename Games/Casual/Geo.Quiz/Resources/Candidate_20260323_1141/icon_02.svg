<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 크림 -->
  <rect width="1024" height="1024" rx="180" fill="#FFF8E1"/>
  <!-- Layer 2: 지구본 실루엣 -->
  <circle cx="512" cy="460" r="300" fill="#1565C0"/>
  <!-- 경도선 -->
  <ellipse cx="512" cy="460" rx="150" ry="300" fill="none" stroke="#1976D2" stroke-width="4" opacity="0.6"/>
  <ellipse cx="512" cy="460" rx="300" ry="120" fill="none" stroke="#1976D2" stroke-width="4" opacity="0.6"/>
  <line x1="512" y1="160" x2="512" y2="760" stroke="#1976D2" stroke-width="4" opacity="0.6"/>
  <!-- 대륙 단순 표현 -->
  <ellipse cx="420" cy="380" rx="80" ry="60" fill="#4CAF50" opacity="0.85"/>
  <ellipse cx="580" cy="380" rx="100" ry="70" fill="#388E3C" opacity="0.8"/>
  <ellipse cx="500" cy="530" rx="70" ry="50" fill="#4CAF50" opacity="0.8"/>
  <!-- 큰 ? 표시 -->
  <text x="512" y="530" font-family="Arial Black,Arial" font-size="200" font-weight="900" fill="white" text-anchor="middle" opacity="0.25">?</text>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="840" font-family="Arial Black,Arial" font-size="92" font-weight="900" fill="#1565C0" text-anchor="middle">GEO QUIZ</text>
</svg>
