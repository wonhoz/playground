<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 딥 퍼플 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#1A0A2E"/>
  <!-- Layer 2: 파일 카드 -->
  <rect x="120" y="140" width="560" height="700" rx="32" fill="#311B92"/>
  <!-- 파일 접힌 귀퉁이 -->
  <polygon points="600,140 680,140 680,220" fill="#1A0A2E"/>
  <line x1="600" y1="140" x2="600" y2="220" stroke="#4A148C" stroke-width="6"/>
  <!-- 파일 아이콘 심볼 -->
  <text x="400" y="320" font-family="'Segoe UI', sans-serif" font-size="80" fill="#CE93D8" text-anchor="middle">📄</text>
  <text x="400" y="420" font-family="'Segoe UI', sans-serif" font-size="64" fill="#9C27B0" text-anchor="middle">setup.exe</text>
  <!-- SHA256 해시값 (여러 줄) -->
  <text x="400" y="510" font-family="'Consolas', monospace" font-size="36" fill="#7E57C2" text-anchor="middle">a3f8b2c1d4e7</text>
  <text x="400" y="558" font-family="'Consolas', monospace" font-size="36" fill="#7E57C2" text-anchor="middle">0f9a2b5c8d3e</text>
  <text x="400" y="606" font-family="'Consolas', monospace" font-size="36" fill="#7E57C2" text-anchor="middle">1f4a7c9b6e2d</text>
  <!-- Layer 3: 체크마크 배지 (우하단) -->
  <circle cx="750" cy="760" r="180" fill="#1B5E20"/>
  <circle cx="750" cy="760" r="140" fill="#2E7D32"/>
  <!-- 체크 마크 -->
  <polyline points="660,760 720,820 840,700" fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 알고리즘 배지 -->
  <rect x="120" y="880" width="200" height="60" rx="16" fill="#E91E63"/>
  <text x="220" y="922" font-family="'Consolas', monospace" font-weight="700" font-size="40" fill="white" text-anchor="middle">SHA256</text>
  <rect x="334" y="880" width="140" height="60" rx="16" fill="#F57C00"/>
  <text x="404" y="922" font-family="'Consolas', monospace" font-weight="700" font-size="40" fill="white" text-anchor="middle">MD5</text>
</svg>
