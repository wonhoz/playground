<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="100" y="138" width="824" height="530" rx="48" fill="#FFFFFF" stroke="#E65100" stroke-width="16"/>
  <!-- .md file shape -->
  <!-- File body -->
  <path d="M 248,180 L 648,180 L 748,280 L 748,640 L 248,640 Z" fill="#FFF8E1" stroke="#E65100" stroke-width="16" stroke-linejoin="round"/>
  <!-- Folded corner -->
  <path d="M 648,180 L 648,280 L 748,280 Z" fill="#FFCC02" stroke="#E65100" stroke-width="14" stroke-linejoin="round"/>
  <!-- File extension badge on file -->
  <rect x="296" y="510" width="204" height="92" rx="24" fill="#E65100" stroke="#BF360C" stroke-width="12"/>
  <text x="398" y="578" font-family="Arial Black, sans-serif" font-weight="900" font-size="66" fill="#FFFFFF" text-anchor="middle">.md</text>
  <!-- Content lines on file -->
  <text x="310" y="296" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#F9A825" text-anchor="start">#</text>
  <rect x="376" y="254" width="200" height="20" rx="10" fill="#F9A825" opacity="0.6"/>
  <rect x="310" y="334" width="320" height="16" rx="8" fill="#FFB300" opacity="0.5"/>
  <rect x="310" y="368" width="260" height="16" rx="8" fill="#FFB300" opacity="0.4"/>
  <rect x="310" y="402" width="290" height="16" rx="8" fill="#FFB300" opacity="0.35"/>
  <!-- MARK.VIEW badge -->
  <rect x="156" y="744" width="712" height="116" rx="36" fill="#E65100" stroke="#BF360C" stroke-width="14"/>
  <text x="512" y="830" font-family="Arial Black, sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" text-anchor="middle">MARK.VIEW</text>
</svg>
