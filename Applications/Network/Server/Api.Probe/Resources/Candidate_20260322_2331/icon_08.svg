<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg08" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="rocketBody08" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="flame08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#FEF08A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow08">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Coral-orange gradient background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Subtle texture circles -->
  <circle cx="200" cy="200" r="300" fill="white" opacity="0.04"/>
  <circle cx="900" cy="800" r="250" fill="white" opacity="0.04"/>

  <!-- Layer 2: Rocket (vertical, centered upper half) -->
  <g transform="translate(512,480)">
    <!-- Flame -->
    <g filter="url(#glow08)">
      <ellipse cx="0" cy="230" rx="55" ry="110" fill="url(#flame08)"/>
      <ellipse cx="0" cy="230" rx="26" ry="60" fill="#FEF08A" opacity="0.9"/>
    </g>
    <!-- Fins -->
    <polygon points="-80,160 -130,240 -80,210" fill="#FED7AA"/>
    <polygon points="80,160 130,240 80,210" fill="#FED7AA"/>
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="78" ry="190" fill="url(#rocketBody08)"/>
    <!-- Nose -->
    <path d="M-78,-120 Q0,-310 78,-120 Z" fill="#F0F0F0"/>
    <!-- Window -->
    <circle cx="0" cy="20" r="38" fill="#FF6B35" opacity="0.6"/>
    <circle cx="0" cy="20" r="38" fill="none" stroke="white" stroke-width="7"/>
    <circle cx="-10" cy="10" r="10" fill="white" opacity="0.5"/>
  </g>

  <!-- Layer 3: HTTP method text badges (layered behind/over) -->
  <!-- POST badge (prominent, lower area) -->
  <rect x="140" y="750" width="250" height="80" rx="14" fill="rgba(0,0,0,0.25)"/>
  <text x="165" y="812" font-family="'Consolas','Courier New',monospace" font-size="56" font-weight="bold" fill="#FEF08A">POST</text>

  <!-- GET badge (smaller, upper-left) -->
  <rect x="130" y="200" width="200" height="66" rx="12" fill="rgba(0,0,0,0.2)"/>
  <text x="152" y="253" font-family="'Consolas','Courier New',monospace" font-size="46" font-weight="bold" fill="white" opacity="0.85">GET</text>

  <!-- PUT badge (upper-right) -->
  <rect x="700" y="200" width="190" height="66" rx="12" fill="rgba(0,0,0,0.2)"/>
  <text x="720" y="253" font-family="'Consolas','Courier New',monospace" font-size="46" font-weight="bold" fill="white" opacity="0.85">PUT</text>
</svg>
