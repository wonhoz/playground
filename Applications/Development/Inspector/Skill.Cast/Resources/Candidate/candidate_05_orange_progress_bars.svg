<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#2a1800"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffca28"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Skill rows -->
  <!-- Row 1 -->
  <text x="90" y="148" font-family="sans-serif" font-size="15" fill="#ffcc80">C# / .NET</text>
  <rect x="90" y="156" width="332" height="18" rx="9" fill="#2a1800"/>
  <rect x="90" y="156" width="298" height="18" rx="9" fill="url(#p1)"/>
  <text x="430" y="170" font-family="monospace" font-size="12" fill="#ffca28" text-anchor="end">90%</text>
  <!-- Row 2 -->
  <text x="90" y="204" font-family="sans-serif" font-size="15" fill="#ffcc80">WPF / XAML</text>
  <rect x="90" y="212" width="332" height="18" rx="9" fill="#2a1800"/>
  <rect x="90" y="212" width="266" height="18" rx="9" fill="url(#p2)"/>
  <text x="430" y="226" font-family="monospace" font-size="12" fill="#ff6d00" text-anchor="end">80%</text>
  <!-- Row 3 -->
  <text x="90" y="260" font-family="sans-serif" font-size="15" fill="#ffcc80">ASP.NET Core</text>
  <rect x="90" y="268" width="332" height="18" rx="9" fill="#2a1800"/>
  <rect x="90" y="268" width="233" height="18" rx="9" fill="url(#p1)" opacity="0.9"/>
  <text x="430" y="282" font-family="monospace" font-size="12" fill="#ffca28" text-anchor="end">70%</text>
  <!-- Row 4 -->
  <text x="90" y="316" font-family="sans-serif" font-size="15" fill="#ffcc80">TypeScript</text>
  <rect x="90" y="324" width="332" height="18" rx="9" fill="#2a1800"/>
  <rect x="90" y="324" width="200" height="18" rx="9" fill="url(#p3)"/>
  <text x="430" y="338" font-family="monospace" font-size="12" fill="#ff5722" text-anchor="end">60%</text>
  <!-- Row 5 -->
  <text x="90" y="372" font-family="sans-serif" font-size="15" fill="#ffcc80">Docker / K8s</text>
  <rect x="90" y="380" width="332" height="18" rx="9" fill="#2a1800"/>
  <rect x="90" y="380" width="133" height="18" rx="9" fill="url(#p2)" opacity="0.8"/>
  <text x="430" y="394" font-family="monospace" font-size="12" fill="#ff6d00" text-anchor="end">40%</text>
  <!-- Title -->
  <text x="256" y="100" font-family="monospace" font-size="20" fill="#ffb300" text-anchor="middle" letter-spacing="3">SKILL.CAST</text>
  <line x1="90" y1="112" x2="422" y2="112" stroke="#ff8f00" stroke-width="1.5" opacity="0.4"/>
  <!-- Cast icon -->
  <path d="M380 96 Q400 84 420 96" stroke="#ffca28" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M370 108 Q400 90 430 108" stroke="#ffca28" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="400" cy="115" r="6" fill="#ffb300"/>
</svg>
