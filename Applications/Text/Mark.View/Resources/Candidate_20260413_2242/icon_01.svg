<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FF8FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="76" y="138" width="872" height="538" rx="48" fill="#FFFFFF" stroke="#880E4F" stroke-width="16"/>
  <!-- Left sub-card: raw markdown -->
  <rect x="112" y="188" width="310" height="294" rx="28" fill="#F3E5F5" stroke="#880E4F" stroke-width="14"/>
  <text x="267" y="310" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#7B1FA2" text-anchor="middle">##</text>
  <text x="267" y="410" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#CE93D8" text-anchor="middle">Hello</text>
  <!-- Arrow -->
  <rect x="462" y="328" width="104" height="46" rx="22" fill="#E91E63" stroke="#880E4F" stroke-width="14"/>
  <path d="M 560,282 L 632,351 L 560,420 Z" fill="#E91E63" stroke="#880E4F" stroke-width="14" stroke-linejoin="round"/>
  <!-- Right sub-card: rendered heading -->
  <rect x="602" y="188" width="310" height="294" rx="28" fill="#E8F5E9" stroke="#388E3C" stroke-width="14"/>
  <!-- H2 rendered (large bold heading) -->
  <rect x="626" y="228" width="262" height="10" rx="5" fill="#43A047" opacity="0.5"/>
  <text x="757" y="348" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#2E7D32" text-anchor="middle">H2</text>
  <!-- RENDER badge -->
  <rect x="200" y="748" width="624" height="116" rx="36" fill="#880E4F" stroke="#4A0728" stroke-width="14"/>
  <text x="512" y="834" font-family="Arial Black, sans-serif" font-weight="900" font-size="86" fill="#FFFFFF" text-anchor="middle">RENDER</text>
</svg>
