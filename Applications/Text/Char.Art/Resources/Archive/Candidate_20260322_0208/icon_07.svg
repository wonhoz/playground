  <!-- 플래시 -->
  <rect x="210" y="362" width="50" height="36" rx="8" fill="#0A1A3A" stroke="#4A6ADA" stroke-width="3"/>
  <rect x="218" y="368" width="34" height="24" rx="4" fill="#6A8AEA" opacity="0.5"/>
</svg>
