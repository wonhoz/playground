<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000A00"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
    <linearGradient id="matrixGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#003B00"/>
    </linearGradient>
    <filter id="matrixGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Matrix rain columns (stylized) -->
  <text x="60" y="100" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.8" filter="url(#matrixGlow)">.</text>
  <text x="60" y="120" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.7">-</text>
  <text x="60" y="140" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.5">.</text>
  <text x="60" y="160" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.3">-</text>
  <text x="120" y="80" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.9" filter="url(#matrixGlow)">-</text>
  <text x="120" y="100" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.7">.</text>
  <text x="120" y="120" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.5">-</text>
  <text x="400" y="120" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.8">.</text>
  <text x="400" y="140" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.6">.</text>
  <text x="400" y="160" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.4">-</text>
  <text x="450" y="100" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.7">-</text>
  <text x="450" y="120" font-family="monospace" font-size="14" fill="#00FF41" opacity="0.5">.</text>
  <!-- Central runner made of matrix chars -->
  <text x="256" y="250" font-family="monospace" font-size="80" fill="url(#matrixGreen)" text-anchor="middle" filter="url(#matrixGlow)" font-weight="bold">♟</text>
  <!-- Morse display bar -->
  <rect x="80" y="390" width="352" height="60" rx="10" fill="#001A00" stroke="#00FF41" stroke-width="2"/>
  <text x="256" y="430" font-family="monospace" font-size="22" fill="#00FF41" text-anchor="middle" filter="url(#matrixGlow)">. - . . - - . .</text>
  <!-- Speed indicators -->
  <line x1="90" y1="300" x2="170" y2="300" stroke="#00FF41" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="80" y1="320" x2="155" y2="320" stroke="#00FF41" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="85" y1="340" x2="145" y2="340" stroke="#00FF41" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
