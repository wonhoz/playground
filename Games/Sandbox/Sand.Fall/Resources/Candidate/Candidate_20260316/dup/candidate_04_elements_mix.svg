<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#100505"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="100%" r="80%">
      <stop offset="0%" style="stop-color:#FF6600"/>
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="water" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#0088FF"/>
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Quadrant elements -->
  <!-- Sand (top-left) -->
  <circle cx="150" cy="150" r="100" fill="#FFCC44" opacity="0.15"/>
  <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="40" fill="#FFCC44" opacity="0.8">&#x1F3DC;</text>
  <text x="150" y="175" text-anchor="middle" font-family="Arial" font-size="14" fill="#FFAA22">SAND</text>
  <!-- Water (top-right) -->
  <circle cx="362" cy="150" r="100" fill="#0088FF" opacity="0.15"/>
  <text x="362" y="120" text-anchor="middle" font-family="Arial" font-size="40" fill="#44AAFF" opacity="0.8">&#x1F4A7;</text>
  <text x="362" y="175" text-anchor="middle" font-family="Arial" font-size="14" fill="#44AAFF">WATER</text>
  <!-- Fire (bottom-left) -->
  <circle cx="150" cy="362" r="100" fill="#FF4400" opacity="0.15"/>
  <text x="150" y="332" text-anchor="middle" font-family="Arial" font-size="40" fill="#FF6622" opacity="0.8">&#x1F525;</text>
  <text x="150" y="387" text-anchor="middle" font-family="Arial" font-size="14" fill="#FF6622">FIRE</text>
  <!-- Stone (bottom-right) -->
  <circle cx="362" cy="362" r="100" fill="#888888" opacity="0.15"/>
  <text x="362" y="332" text-anchor="middle" font-family="Arial" font-size="40" fill="#AAAAAA" opacity="0.8">&#x1FAA8;</text>
  <text x="362" y="387" text-anchor="middle" font-family="Arial" font-size="14" fill="#AAAAAA">STONE</text>
  <!-- Center interaction glow -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <text x="256" y="263" text-anchor="middle" font-family="Arial" font-size="14" fill="white" opacity="0.6">Mix</text>
  <!-- Divider cross -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#333344" stroke-width="2"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#333344" stroke-width="2"/>
</svg>
