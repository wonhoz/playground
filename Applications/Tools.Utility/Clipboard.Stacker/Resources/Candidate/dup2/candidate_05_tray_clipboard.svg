<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#150d25"/>
    </radialGradient>
    <linearGradient id="tray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9944ff"/>
      <stop offset="100%" stop-color="#6600cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main clipboard shape -->
  <rect x="136" y="140" width="240" height="300" rx="16" fill="#1a0d33" stroke="#9944ff" stroke-width="4" filter="url(#glow)"/>
  <!-- Clip at top -->
  <rect x="196" y="120" width="120" height="36" rx="10" fill="url(#tray)"/>
  <rect x="216" y="112" width="80" height="24" rx="8" fill="#7722cc"/>
  <!-- Stack items in clipboard -->
  <rect x="155" y="175" width="202" height="40" rx="8" fill="#2a1a4a" stroke="#9944ff" stroke-width="2"/>
  <rect x="163" y="183" width="140" height="8" rx="3" fill="#cc88ff" opacity="0.8"/>
  <rect x="163" y="198" width="100" height="6" rx="2" fill="#9966cc" opacity="0.6"/>
  <rect x="155" y="224" width="202" height="40" rx="8" fill="#221a44" stroke="#7733cc" stroke-width="1.5"/>
  <rect x="163" y="232" width="160" height="8" rx="3" fill="#aa77ee" opacity="0.7"/>
  <rect x="163" y="247" width="120" height="6" rx="2" fill="#8855bb" opacity="0.6"/>
  <rect x="155" y="273" width="202" height="40" rx="8" fill="#1a1a3a" stroke="#5522aa" stroke-width="1.5"/>
  <rect x="163" y="281" width="130" height="8" rx="3" fill="#8866cc" opacity="0.6"/>
  <rect x="163" y="296" width="90" height="6" rx="2" fill="#6644aa" opacity="0.5"/>
  <!-- Dividers -->
  <line x1="155" y1="222" x2="357" y2="222" stroke="#3a1a5a" stroke-width="1"/>
  <line x1="155" y1="271" x2="357" y2="271" stroke="#3a1a5a" stroke-width="1"/>
  <!-- Stack number badge -->
  <circle cx="357" cy="320" r="26" fill="url(#tray)" filter="url(#glow)"/>
  <text x="357" y="328" text-anchor="middle" font-family="Arial Black" font-size="22" fill="#fff">3</text>
  <!-- Arrow indicator top -->
  <polygon points="256,325 244,345 268,345" fill="#9944ff" filter="url(#glow)"/>
  <line x1="256" y1="345" x2="256" y2="390" stroke="#9944ff" stroke-width="3" filter="url(#glow)"/>
  <text x="256" y="410" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#cc88ff">STACK</text>
</svg>