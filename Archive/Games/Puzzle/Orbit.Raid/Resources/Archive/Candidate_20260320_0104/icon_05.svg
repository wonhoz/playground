<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Asteroid field explosion with debris -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#030005"/>
  <!-- Central explosion core -->
  <circle cx="512" cy="512" r="80" fill="#00695C" opacity="0.6"/>
  <circle cx="512" cy="512" r="50" fill="#26A69A" opacity="0.8"/>
  <circle cx="512" cy="512" r="28" fill="#80CBC4"/>
  <!-- Shockwave rings -->
  <circle cx="512" cy="512" r="150" fill="none" stroke="#00695C" stroke-width="12" opacity="0.5"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#004D40" stroke-width="8" opacity="0.4"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#004D40" stroke-width="5" opacity="0.3"/>
  <!-- Debris fragments scattered outward -->
  <polygon points="340,300 310,260 280,310" fill="#00897B" opacity="0.85"/>
  <polygon points="680,270 720,240 700,290" fill="#26A69A" opacity="0.8"/>
  <polygon points="760,440 810,410 800,470" fill="#00695C" opacity="0.75"/>
  <polygon points="760,680 800,720 740,730" fill="#00897B" opacity="0.8"/>
  <polygon points="300,700 260,740 280,680" fill="#26A69A" opacity="0.75"/>
  <polygon points="240,460 200,420 200,500" fill="#00695C" opacity="0.7"/>
  <!-- Smaller debris -->
  <polygon points="440,230 420,200 460,200" fill="#00897B" opacity="0.7"/>
  <polygon points="600,800 580,830 620,825" fill="#26A69A" opacity="0.65"/>
  <polygon points="810,570 840,550 835,590" fill="#00695C" opacity="0.6"/>
  <polygon points="180,570 150,590 165,550" fill="#00695C" opacity="0.6"/>
  <!-- Debris trails -->
  <line x1="512" y1="512" x2="318" y2="296" stroke="#004D40" stroke-width="4" stroke-dasharray="10,8" opacity="0.5"/>
  <line x1="512" y1="512" x2="710" y2="276" stroke="#004D40" stroke-width="4" stroke-dasharray="10,8" opacity="0.5"/>
  <line x1="512" y1="512" x2="790" y2="448" stroke="#004D40" stroke-width="4" stroke-dasharray="10,8" opacity="0.4"/>
  <line x1="512" y1="512" x2="770" y2="700" stroke="#004D40" stroke-width="4" stroke-dasharray="10,8" opacity="0.4"/>
  <line x1="512" y1="512" x2="280" y2="710" stroke="#004D40" stroke-width="4" stroke-dasharray="10,8" opacity="0.4"/>
</svg>
