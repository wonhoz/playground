<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 터미널+색상: terminal window with colored ANSI output -->
  <!-- Terminal window -->
  <rect x="200" y="280" width="624" height="460" rx="20" fill="#4A148C" opacity="0.5"/>
  <rect x="200" y="280" width="624" height="54" rx="20" fill="#4A148C"/>
  <!-- Window buttons -->
  <circle cx="250" cy="307" r="14" fill="#CE93D8"/>
  <circle cx="292" cy="307" r="14" fill="#CE93D8" opacity="0.6"/>
  <circle cx="334" cy="307" r="14" fill="#CE93D8" opacity="0.3"/>
  <!-- Terminal content rows with colored blocks -->
  <!-- Row 1: prompt + colored chars -->
  <rect x="240" y="365" width="16" height="28" rx="2" fill="#CE93D8"/>
  <rect x="268" y="365" width="40" height="28" rx="2" fill="#CE93D8" opacity="0.7"/>
  <rect x="320" y="365" width="60" height="28" rx="2" fill="#4A148C"/>
  <rect x="392" y="365" width="50" height="28" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="454" y="365" width="70" height="28" rx="2" fill="#CE93D8"/>
  <rect x="536" y="365" width="40" height="28" rx="2" fill="#4A148C"/>
  <!-- Row 2 -->
  <rect x="240" y="413" width="16" height="28" rx="2" fill="#CE93D8"/>
  <rect x="268" y="413" width="70" height="28" rx="2" fill="#4A148C"/>
  <rect x="350" y="413" width="40" height="28" rx="2" fill="#CE93D8" opacity="0.8"/>
  <rect x="402" y="413" width="80" height="28" rx="2" fill="#CE93D8" opacity="0.4"/>
  <rect x="494" y="413" width="50" height="28" rx="2" fill="#4A148C"/>
  <!-- Row 3 -->
  <rect x="240" y="461" width="16" height="28" rx="2" fill="#CE93D8"/>
  <rect x="268" y="461" width="50" height="28" rx="2" fill="#CE93D8"/>
  <rect x="330" y="461" width="90" height="28" rx="2" fill="#4A148C"/>
  <rect x="432" y="461" width="40" height="28" rx="2" fill="#CE93D8" opacity="0.6"/>
  <rect x="484" y="461" width="60" height="28" rx="2" fill="#CE93D8" opacity="0.9"/>
  <!-- Row 4 - cursor blink -->
  <rect x="240" y="509" width="16" height="28" rx="2" fill="#CE93D8"/>
  <rect x="268" y="509" width="30" height="28" rx="2" fill="#4A148C"/>
  <rect x="310" y="509" width="16" height="28" rx="2" fill="#CE93D8" opacity="0.9"/>
  <!-- Color band at bottom -->
  <rect x="220" y="650" width="90" height="50" rx="6" fill="#CE93D8"/>
  <rect x="320" y="650" width="90" height="50" rx="6" fill="#4A148C"/>
  <rect x="420" y="650" width="90" height="50" rx="6" fill="#CE93D8" opacity="0.6"/>
  <rect x="520" y="650" width="90" height="50" rx="6" fill="#4A148C" opacity="0.7"/>
  <rect x="620" y="650" width="80" height="50" rx="6" fill="#CE93D8" opacity="0.4"/>
</svg>