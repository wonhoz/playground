<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_ll02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <filter id="sh_ll02">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000028"/>
    </filter>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg_ll02)" rx="120"/>

  <!-- Layer 2: Tab bar -->
