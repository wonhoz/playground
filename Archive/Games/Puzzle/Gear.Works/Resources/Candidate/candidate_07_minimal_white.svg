<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="gearDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Main large gear outline -->
  <circle cx="230" cy="240" r="130" fill="none" stroke="url(#gearDark)" stroke-width="12"/>
  <circle cx="230" cy="240" r="90" fill="none" stroke="url(#gearDark)" stroke-width="4" stroke-dasharray="15,10"/>
  <circle cx="230" cy="240" r="30" fill="url(#gearDark)"/>
  <!-- Gear teeth (outline style) -->
  <rect x="218" y="98" width="24" height="28" rx="5" fill="url(#gearDark)"/>
  <rect x="218" y="354" width="24" height="28" rx="5" fill="url(#gearDark)"/>
  <rect x="90" y="228" width="28" height="24" rx="5" fill="url(#gearDark)"/>
  <rect x="342" y="228" width="28" height="24" rx="5" fill="url(#gearDark)"/>
  <rect x="133" y="133" width="22" height="22" rx="5" fill="url(#gearDark)" transform="rotate(45, 144, 144)"/>
  <rect x="313" y="133" width="22" height="22" rx="5" fill="url(#gearDark)" transform="rotate(45, 324, 144)"/>
  <rect x="133" y="325" width="22" height="22" rx="5" fill="url(#gearDark)" transform="rotate(45, 144, 336)"/>
  <rect x="313" y="325" width="22" height="22" rx="5" fill="url(#gearDark)" transform="rotate(45, 324, 336)"/>
  <!-- Small accent gear -->
  <circle cx="370" cy="340" r="70" fill="none" stroke="url(#accentGrad)" stroke-width="8"/>
  <circle cx="370" cy="340" r="20" fill="url(#accentGrad)"/>
  <rect x="362" y="264" width="16" height="18" rx="3" fill="url(#accentGrad)"/>
  <rect x="362" y="398" width="16" height="18" rx="3" fill="url(#accentGrad)"/>
  <rect x="294" y="332" width="18" height="16" rx="3" fill="url(#accentGrad)"/>
  <rect x="428" y="332" width="18" height="16" rx="3" fill="url(#accentGrad)"/>
  <rect x="317" y="286" width="16" height="16" rx="3" fill="url(#accentGrad)" transform="rotate(45, 325, 294)"/>
  <rect x="411" y="286" width="16" height="16" rx="3" fill="url(#accentGrad)" transform="rotate(45, 419, 294)"/>
  <!-- Gear spokes -->
  <line x1="230" y1="130" x2="230" y2="350" stroke="url(#gearDark)" stroke-width="5" opacity="0.3"/>
  <line x1="118" y1="240" x2="342" y2="240" stroke="url(#gearDark)" stroke-width="5" opacity="0.3"/>
  <line x1="148" y1="148" x2="312" y2="332" stroke="url(#gearDark)" stroke-width="4" opacity="0.25"/>
  <line x1="312" y1="148" x2="148" y2="332" stroke="url(#gearDark)" stroke-width="4" opacity="0.25"/>
  <!-- Title -->
  <text x="256" y="470" font-family="Arial" font-size="32" font-weight="900" fill="url(#gearDark)" text-anchor="middle">GEAR.WORKS</text>
</svg>
