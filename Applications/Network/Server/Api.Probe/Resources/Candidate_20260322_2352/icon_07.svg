<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#78350F"/>
  <!-- Layer 2: Large key icon -->
  <!-- Key head (ring) -->
  <circle cx="380" cy="400" r="190" fill="none" stroke="#FBBF24" stroke-width="70"/>
  <!-- Key hole -->
  <circle cx="380" cy="400" r="80" fill="#78350F"/>
  <!-- Key shaft -->
  <rect x="550" y="368" width="340" height="65" rx="10" fill="#FBBF24"/>
  <!-- Key teeth -->
  <rect x="620" y="433" width="40" height="60" rx="6" fill="#FBBF24"/>
  <rect x="700" y="433" width="40" height="80" rx="6" fill="#FBBF24"/>
  <rect x="780" y="433" width="40" height="50" rx="6" fill="#FBBF24"/>
  <!-- Layer 3: {env} text on key shaft -->
  <text x="685" y="412" font-family="Consolas,monospace" font-size="32" fill="#78350F" text-anchor="middle" font-weight="bold">{env}</text>
  <!-- Variable hints around key head -->
  <text x="382" y="368" font-family="Consolas,monospace" font-size="26" fill="#FDE68A" text-anchor="middle" opacity="0.7">HOST</text>
  <text x="382" y="418" font-family="Consolas,monospace" font-size="22" fill="#FDE68A" text-anchor="middle" opacity="0.5">PORT</text>
  <!-- Small label at bottom -->
  <rect x="270" y="650" width="440" height="50" rx="14" fill="#92400E"/>
  <text x="490" y="682" font-family="Arial,sans-serif" font-size="20" fill="#FDE68A" text-anchor="middle">환경변수 프리셋</text>
</svg>