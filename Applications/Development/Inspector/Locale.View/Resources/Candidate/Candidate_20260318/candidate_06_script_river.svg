<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000a14"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="r2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Multiple rivers of different scripts flowing left to right -->
  <!-- River 1: Latin -->
  <path d="M40,120 Q150,110 250,125 Q350,138 472,118" fill="none" stroke="#06B6D4" stroke-width="22" opacity="0.15"/>
  <text x="60" y="120" font-family="serif" font-size="12" fill="#22D3EE">A B C D E F G H I J K L M N</text>
  <!-- River 2: Hiragana -->
  <path d="M40,175 Q140,188 240,172 Q350,157 472,175" fill="none" stroke="#0891B2" stroke-width="22" opacity="0.15"/>
  <text x="55" y="178" font-family="serif" font-size="13" fill="#38BDF8">あ い う え お か き く け こ さ</text>
  <!-- River 3: Korean Hangul -->
  <path d="M40,232 Q160,218 260,235 Q370,250 472,232" fill="none" stroke="#06B6D4" stroke-width="22" opacity="0.15"/>
  <text x="52" y="236" font-family="serif" font-size="12" fill="#22D3EE">가 나 다 라 마 바 사 아 자 차</text>
  <!-- River 4: Arabic (RTL) -->
  <path d="M40,290 Q150,302 250,286 Q360,272 472,290" fill="none" stroke="#0891B2" stroke-width="22" opacity="0.15"/>
  <text x="58" y="294" font-family="serif" font-size="13" fill="#38BDF8" direction="rtl">ا ب ت ث ج ح خ د ذ ر ز</text>
  <!-- River 5: Cyrillic -->
  <path d="M40,348 Q155,335 255,352 Q365,368 472,348" fill="none" stroke="#06B6D4" stroke-width="22" opacity="0.15"/>
  <text x="54" y="352" font-family="serif" font-size="12" fill="#22D3EE">А Б В Г Д Е Ж З И К Л М</text>
  <!-- River 6: Devanagari -->
  <path d="M40,406 Q160,418 260,403 Q370,388 472,406" fill="none" stroke="#0891B2" stroke-width="22" opacity="0.15"/>
  <text x="52" y="408" font-family="serif" font-size="13" fill="#38BDF8">अ आ इ ई उ ऊ ए ऐ ओ औ</text>
  <!-- Language labels at left -->
  <text x="36" y="110" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">Latin</text>
  <text x="36" y="168" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">JA</text>
  <text x="36" y="226" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">KO</text>
  <text x="36" y="284" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">AR</text>
  <text x="36" y="342" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">RU</text>
  <text x="36" y="400" text-anchor="end" font-family="monospace" font-size="8" fill="#06B6D4" opacity="0.6">HI</text>
</svg>
