  <rect x="404" y="148" width="44" height="68" rx="14" fill="#C8956A"/>
  <rect x="410" y="154" width="32" height="56" rx="10" fill="#D4A078"/>
  <!-- 검지 끝 (손가락 마디) -->
  <rect x="410" y="148" width="32" height="14" rx="7" fill="#C07860"/>

  <!-- 중지 -->
