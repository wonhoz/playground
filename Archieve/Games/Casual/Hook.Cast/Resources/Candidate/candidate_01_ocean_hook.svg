<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="55%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#004488"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066aa"/>
      <stop offset="100%" stop-color="#003a66"/>
    </linearGradient>
    <linearGradient id="hook" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="white" opacity="0.6"/>
  <circle cx="160" cy="40" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="300" cy="55" r="2" fill="white" opacity="0.7"/>
  <circle cx="400" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="450" cy="70" r="2" fill="white" opacity="0.6"/>
  <!-- Rod -->
  <line x1="120" y1="130" x2="210" y2="95" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <line x1="210" y1="95" x2="270" y2="68" stroke="#8B4513" stroke-width="7" stroke-linecap="round"/>
  <!-- Reel -->
  <ellipse cx="145" cy="118" rx="22" ry="14" fill="#333" stroke="#888" stroke-width="2"/>
  <ellipse cx="145" cy="118" rx="10" ry="7" fill="#555"/>
  <!-- Water -->
  <path d="M0 270 Q64 258 128 270 Q192 282 256 270 Q320 258 384 270 Q448 282 512 270 L512 512 L0 512 Z" fill="url(#water)"/>
  <path d="M0 278 Q64 268 128 278 Q192 288 256 278 Q320 268 384 278 Q448 288 512 278" fill="none" stroke="#55aadd" stroke-width="2" opacity="0.5"/>
  <!-- Fishing line -->
  <line x1="270" y1="68" x2="300" y2="320" stroke="#e0e0e0" stroke-width="1.5" opacity="0.85"/>
  <!-- Hook -->
  <path d="M300 320 Q302 365 278 385 Q258 400 248 388 Q238 376 247 363 Q256 351 266 360" fill="none" stroke="url(#hook)" stroke-width="8" stroke-linecap="round"/>
  <line x1="266" y1="360" x2="258" y2="378" stroke="#c0c0c0" stroke-width="5" stroke-linecap="round"/>
  <!-- Splash -->
  <ellipse cx="300" cy="272" rx="22" ry="7" fill="none" stroke="#88ccff" stroke-width="2" opacity="0.7"/>
  <ellipse cx="300" cy="272" rx="40" ry="12" fill="none" stroke="#88ccff" stroke-width="1" opacity="0.35"/>
  <!-- Fish -->
  <ellipse cx="190" cy="370" rx="42" ry="19" fill="#ff8c00" opacity="0.85" transform="rotate(-10 190 370)"/>
  <path d="M228 360 L252 348 L246 368 Z" fill="#ff8c00" opacity="0.85"/>
  <circle cx="177" cy="365" r="5.5" fill="white"/>
  <circle cx="179" cy="365" r="3" fill="#222"/>
  <!-- Bubbles -->
  <circle cx="195" cy="340" r="4" fill="none" stroke="#88ccff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="208" cy="328" r="3" fill="none" stroke="#88ccff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="220" cy="318" r="2" fill="none" stroke="#88ccff" stroke-width="1.5" opacity="0.3"/>
  <!-- Second fish deeper -->
  <ellipse cx="380" cy="420" rx="32" ry="14" fill="#00aacc" opacity="0.55" transform="rotate(8 380 420)"/>
  <path d="M408 415 L424 408 L420 424 Z" fill="#00aacc" opacity="0.55"/>
</svg>
