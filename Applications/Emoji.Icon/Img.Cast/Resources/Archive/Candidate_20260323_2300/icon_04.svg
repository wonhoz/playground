<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
    <!-- 주조 틀 (큰 사각형 금형) -->
    <rect x="200" y="200" width="624" height="500" rx="24" fill="none" stroke="url(#metal)" stroke-width="30"/>
    <!-- 내부 형태 (이미지 모양) -->
    <rect x="260" y="260" width="504" height="380" rx="16" fill="#D97706" opacity="0.35"/>
    <!-- Cast 텍스트 (좌측 파일) -->
    <text x="512" y="480" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif" font-size="130" fill="url(#metal)">ICO</text>
    <!-- 불꽃 파티클들 (하단) -->
    <ellipse cx="400" cy="750" rx="30" ry="60" fill="url(#fire)" opacity="0.9"/>
    <ellipse cx="512" cy="730" rx="24" ry="80" fill="url(#fire)" opacity="0.85"/>
    <ellipse cx="624" cy="750" rx="30" ry="60" fill="url(#fire)" opacity="0.9"/>
    <ellipse cx="456" cy="760" rx="18" ry="50" fill="#FDE68A" opacity="0.6"/>
    <ellipse cx="568" cy="760" rx="18" ry="50" fill="#FDE68A" opacity="0.6"/>
    <!-- 주조 방울들 -->
    <circle cx="240" cy="720" r="14" fill="#FDE68A" opacity="0.7"/>
    <circle cx="784" cy="720" r="14" fill="#FDE68A" opacity="0.7"/>
    <circle cx="350" cy="740" r="10" fill="#F59E0B" opacity="0.6"/>
    <circle cx="674" cy="740" r="10" fill="#F59E0B" opacity="0.6"/>
    <!-- 상단 라벨 -->
    <rect x="312" y="140" width="400" height="64" rx="32" fill="#D97706" opacity="0.4"/>
    <text x="512" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" fill="#FDE68A" font-weight="bold">IMG CAST</text>
  </g>
</svg>
