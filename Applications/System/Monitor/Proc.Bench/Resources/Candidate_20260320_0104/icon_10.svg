  <line x1="488" y1="474" x2="488" y2="550" stroke="#AED581" stroke-width="3"/>
  <line x1="512" y1="474" x2="512" y2="550" stroke="#AED581" stroke-width="3"/>
  <line x1="536" y1="474" x2="536" y2="550" stroke="#AED581" stroke-width="3"/>
  <line x1="464" y1="496" x2="560" y2="496" stroke="#AED581" stroke-width="3"/>
  <line x1="464" y1="512" x2="560" y2="512" stroke="#AED581" stroke-width="3"/>
  <line x1="464" y1="528" x2="560" y2="528" stroke="#AED581" stroke-width="3"/>
