  <circle cx="580" cy="370" r="10" fill="#FF44AA" opacity="0.85"/>
  <circle cx="460" cy="400" r="12" fill="#CC00FF" opacity="0.9"/>
  <circle cx="620" cy="420" r="10" fill="#FF00CC" opacity="0.85"/>
