<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0D1A"/>
  <!-- Vacuum body (rounded rectangle) -->
  <ellipse cx="560" cy="600" rx="200" ry="130" fill="#1565C0"/>
  <!-- Vacuum nozzle -->
  <rect x="220" y="560" width="280" height="80" rx="20" fill="#1565C0"/>
  <rect x="190" y="575" width="60" height="50" rx="14" fill="#42A5F5"/>
  <!-- Suction tube curve -->
  <path d="M370 600 C420 520 500 500 560 500" fill="none" stroke="#42A5F5" stroke-width="28" stroke-linecap="round"/>
  <!-- Dust particles being sucked in -->
  <circle cx="300" cy="480" r="16" fill="#42A5F5" opacity="0.7"/>
  <circle cx="240" cy="440" r="11" fill="#42A5F5" opacity="0.5"/>
  <circle cx="350" cy="420" r="9" fill="#42A5F5" opacity="0.4"/>
  <circle cx="200" cy="510" r="13" fill="#42A5F5" opacity="0.35"/>
  <!-- Wheels -->
  <circle cx="460" cy="730" r="36" fill="#42A5F5"/>
  <circle cx="640" cy="730" r="36" fill="#42A5F5"/>
  <!-- Exhaust on top -->
  <rect x="580" y="470" width="50" height="100" rx="14" fill="#42A5F5"/>
  <rect x="570" y="455" width="70" height="25" rx="8" fill="#42A5F5"/>
</svg>