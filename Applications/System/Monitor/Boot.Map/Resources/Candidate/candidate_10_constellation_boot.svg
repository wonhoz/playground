  <text x="256" y="187" font-family="Arial" font-size="10" fill="white" text-anchor="middle">UEFI</text>
  <text x="160" y="121" font-family="Arial" font-size="9" fill="#93C5FD" text-anchor="middle">Loader</text>
  <text x="352" y="121" font-family="Arial" font-size="9" fill="#93C5FD" text-anchor="middle">Kernel</text>
