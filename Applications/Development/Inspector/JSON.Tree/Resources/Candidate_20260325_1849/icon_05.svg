<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05jt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <clipPath id="clip05jt">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05jt)"/>

  <!-- Layer 2: 큰 {} 괄호 (흰색) -->
  <!-- 왼쪽 중괄호 { -->
  <path d="
    M 300,200
    Q 240,200 230,250
    Q 220,300 240,350
    Q 260,400 220,440
    Q 260,480 240,530
    Q 220,580 230,630
    Q 240,680 300,680
  " fill="none" stroke="white" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 오른쪽 중괄호 } -->
  <path d="
    M 724,200
    Q 784,200 794,250
    Q 804,300 784,350
    Q 764,400 804,440
    Q 764,480 784,530
    Q 804,580 794,630
    Q 784,680 724,680
  " fill="none" stroke="white" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 3: 내부 노드 트리 -->
  <!-- 루트 -->
  <circle cx="512" cy="380" r="44" fill="white" opacity="0.95"/>
  <text x="512" y="396" text-anchor="middle" font-family="Consolas, monospace"
        font-size="32" font-weight="bold" fill="#F97316">$</text>

  <!-- 좌측 자식 -->
  <line x1="512" y1="380" x2="360" y2="280" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <circle cx="350" cy="272" r="36" fill="white" opacity="0.85"/>
  <text x="350" y="283" text-anchor="middle" font-family="Consolas, monospace"
        font-size="24" fill="#F97316">k1</text>

  <!-- 좌측 자식의 자식들 -->
  <line x1="350" y1="272" x2="270" y2="196" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <circle cx="262" cy="188" r="28" fill="white" opacity="0.75"/>
  <text x="262" y="196" text-anchor="middle" font-family="Consolas, monospace"
        font-size="18" fill="#F97316">""</text>

  <line x1="350" y1="272" x2="360" y2="190" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <circle cx="364" cy="182" r="28" fill="white" opacity="0.75"/>
  <text x="364" y="190" text-anchor="middle" font-family="Consolas, monospace"
        font-size="18" fill="#F97316">42</text>

  <!-- 우측 자식 -->
  <line x1="512" y1="380" x2="662" y2="280" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <circle cx="672" cy="272" r="36" fill="white" opacity="0.85"/>
  <text x="672" y="283" text-anchor="middle" font-family="Consolas, monospace"
        font-size="24" fill="#F97316">k2</text>

  <!-- 우측 자식의 자식들 -->
  <line x1="672" y1="272" x2="660" y2="190" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <circle cx="656" cy="182" r="28" fill="white" opacity="0.75"/>
  <text x="656" y="190" text-anchor="middle" font-family="Consolas, monospace"
        font-size="18" fill="#F97316">[]</text>

  <line x1="672" y1="272" x2="752" y2="196" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <circle cx="760" cy="188" r="28" fill="white" opacity="0.75"/>
  <text x="760" y="196" text-anchor="middle" font-family="Consolas, monospace"
        font-size="18" fill="#F97316">✓</text>

  <!-- 루트 아래 자식 -->
  <line x1="512" y1="380" x2="512" y2="476" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <circle cx="512" cy="488" r="36" fill="white" opacity="0.85"/>
  <text x="512" y="499" text-anchor="middle" font-family="Consolas, monospace"
        font-size="24" fill="#F97316">k3</text>

  <!-- 하단 텍스트 -->
  <text x="512" y="810" text-anchor="middle" font-family="Segoe UI, sans-serif"
        font-size="62" font-weight="bold" fill="white">JSON.Tree</text>
  <text x="512" y="876" text-anchor="middle" font-family="Consolas, monospace"
        font-size="38" fill="rgba(255,255,255,0.85)">{ } → 계층 탐색</text>
</svg>
