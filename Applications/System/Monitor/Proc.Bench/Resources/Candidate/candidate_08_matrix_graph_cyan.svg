<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001418"/>
      <stop offset="100%" stop-color="#00222A"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#84FFFF"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="line3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#FF8A80"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Monitor screen -->
  <rect x="60" y="80" width="392" height="300" rx="10" fill="#001820" stroke="#00BCD4" stroke-width="2"/>
  <!-- Grid -->
  <line x1="76" y1="150" x2="436" y2="150" stroke="#003A44" stroke-width="1"/>
  <line x1="76" y1="200" x2="436" y2="200" stroke="#003A44" stroke-width="1"/>
  <line x1="76" y1="250" x2="436" y2="250" stroke="#003A44" stroke-width="1"/>
  <line x1="76" y1="300" x2="436" y2="300" stroke="#003A44" stroke-width="1"/>
  <line x1="148" y1="96" x2="148" y2="364" stroke="#003A44" stroke-width="1"/>
  <line x1="220" y1="96" x2="220" y2="364" stroke="#003A44" stroke-width="1"/>
  <line x1="292" y1="96" x2="292" y2="364" stroke="#003A44" stroke-width="1"/>
  <line x1="364" y1="96" x2="364" y2="364" stroke="#003A44" stroke-width="1"/>
  <!-- CPU Line (cyan) -->
  <polyline points="76,280 108,260 140,240 172,200 204,180 236,160 268,140 300,155 332,130 364,150 396,120 428,110" fill="none" stroke="url(#line1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- MEM Line (blue) -->
  <polyline points="76,320 108,310 140,300 172,290 204,280 236,260 268,250 300,240 332,230 364,220 396,210 428,200" fill="none" stroke="url(#line2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alert spike (red) -->
  <polyline points="76,350 148,350 188,350 200,200 212,350 260,350 280,160 300,350 428,350" fill="none" stroke="url(#line3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Legend -->
  <rect x="76" y="100" width="12" height="4" fill="#00E5FF" rx="2"/>
  <text x="92" y="108" font-family="Consolas" font-size="10" fill="#00E5FF">CPU</text>
  <rect x="136" y="100" width="12" height="4" fill="#00BCD4" rx="2"/>
  <text x="152" y="108" font-family="Consolas" font-size="10" fill="#00BCD4">MEM</text>
  <rect x="196" y="100" width="12" height="4" fill="#FF5252" rx="2"/>
  <text x="212" y="108" font-family="Consolas" font-size="10" fill="#FF5252">ALERT</text>
  <!-- Process list below -->
  <rect x="60" y="394" width="392" height="80" rx="8" fill="#001820" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="76" y="416" font-family="Consolas" font-size="11" fill="#84FFFF">PID 1024  chrome.exe     CPU: 45%</text>
  <text x="76" y="434" font-family="Consolas" font-size="11" fill="#26C6DA">PID 2048  node.exe       CPU: 23%</text>
  <text x="76" y="452" font-family="Consolas" font-size="11" fill="#FF5252">PID 4096  bench.exe      CPU: 87%</text>
</svg>