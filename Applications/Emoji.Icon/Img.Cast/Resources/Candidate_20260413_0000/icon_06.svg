  <g>
    <rect x="330" y="440" width="364" height="320" rx="32" fill="#FFFFFF" stroke="#0D47A1" stroke-width="18"/>
    <rect x="360" y="472" width="304" height="256" rx="16" fill="#81D4FA"/>
    <circle cx="600" cy="540" r="50" fill="#FFD93D" stroke="#FF9500" stroke-width="8"/>
    <path d="M 360 680 Q 440 580 520 640 Q 580 590 664 660 L 664 728 L 360 728 Z" fill="#66BB6A" stroke="#1B5E20" stroke-width="10" stroke-linejoin="round"/>
  </g>
  <!-- 베이스 타워 -->
