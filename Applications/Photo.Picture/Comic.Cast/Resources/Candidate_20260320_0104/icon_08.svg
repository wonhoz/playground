<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A0010"/>
  <!-- 만화 프레임 창 4칸 -->
  <rect x="180" y="180" width="280" height="280" rx="16" fill="none" stroke="#6A1B9A" stroke-width="24"/>
  <rect x="564" y="180" width="280" height="280" rx="16" fill="none" stroke="#6A1B9A" stroke-width="24"/>
  <rect x="180" y="564" width="280" height="280" rx="16" fill="none" stroke="#CE93D8" stroke-width="24"/>
  <rect x="564" y="564" width="280" height="280" rx="16" fill="none" stroke="#CE93D8" stroke-width="24"/>
  <!-- 프레임 1: 사진 (사각형 = 원본) -->
  <rect x="200" y="200" width="240" height="240" rx="12" fill="#6A1B9A" opacity="0.25"/>
  <circle cx="270" cy="265" r="32" fill="#6A1B9A" opacity="0.5"/>
  <rect x="200" y="320" width="240" height="100" rx="0" fill="#6A1B9A" opacity="0.3"/>
  <!-- 프레임 2: 변환 중 -->
  <rect x="584" y="200" width="240" height="240" rx="12" fill="#6A1B9A" opacity="0.2"/>
  <line x1="584" y1="320" x2="824" y2="320" stroke="#CE93D8" stroke-width="16" opacity="0.5"/>
  <!-- 프레임 3: 만화 (선화) -->
  <rect x="200" y="584" width="240" height="240" rx="12" fill="#CE93D8" opacity="0.15"/>
  <line x1="220" y1="630" x2="400" y2="630" stroke="#CE93D8" stroke-width="14" opacity="0.7"/>
  <line x1="220" y1="666" x2="380" y2="666" stroke="#CE93D8" stroke-width="10" opacity="0.5"/>
  <!-- 프레임 4: 완성 만화 -->
  <rect x="584" y="584" width="240" height="240" rx="12" fill="#CE93D8" opacity="0.2"/>
  <circle cx="660" cy="640" r="20" fill="#CE93D8" opacity="0.7"/>
  <circle cx="710" cy="640" r="20" fill="#CE93D8" opacity="0.7"/>
  <!-- 화살표 (순서 표시) -->
  <polygon points="512,270 480,300 544,300" fill="#CE93D8" opacity="0.6"/>
  <polygon points="512,754 544,724 480,724" fill="#CE93D8" opacity="0.6"/>
</svg>
