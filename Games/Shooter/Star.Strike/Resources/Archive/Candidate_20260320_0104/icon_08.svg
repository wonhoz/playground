<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Constellation star network with dotted lines -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#020510"/>
  <!-- Constellation connection lines (dotted) -->
  <line x1="300" y1="280" x2="512" y2="200" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.6"/>
  <line x1="512" y1="200" x2="724" y2="280" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.6"/>
  <line x1="724" y1="280" x2="820" y2="512" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.55"/>
  <line x1="820" y1="512" x2="724" y2="744" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.5"/>
  <line x1="724" y1="744" x2="512" y2="820" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.55"/>
  <line x1="512" y1="820" x2="300" y2="744" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.5"/>
  <line x1="300" y1="744" x2="204" y2="512" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.55"/>
  <line x1="204" y1="512" x2="300" y2="280" stroke="#E65100" stroke-width="4" stroke-dasharray="12,10" opacity="0.6"/>
  <!-- Cross connections -->
  <line x1="300" y1="280" x2="724" y2="744" stroke="#BF360C" stroke-width="3" stroke-dasharray="8,14" opacity="0.35"/>
  <line x1="724" y1="280" x2="300" y2="744" stroke="#BF360C" stroke-width="3" stroke-dasharray="8,14" opacity="0.35"/>
  <line x1="512" y1="200" x2="512" y2="820" stroke="#BF360C" stroke-width="3" stroke-dasharray="8,14" opacity="0.3"/>
  <line x1="204" y1="512" x2="820" y2="512" stroke="#BF360C" stroke-width="3" stroke-dasharray="8,14" opacity="0.3"/>
  <!-- Star nodes -->
  <!-- Large stars (prominent corners) -->
  <circle cx="512" cy="200" r="28" fill="#E65100" opacity="0.8"/>
  <polygon points="512,172 520,194 544,194 524,208 532,230 512,216 492,230 500,208 480,194 504,194" fill="#FF6D00"/>
  <circle cx="300" cy="280" r="22" fill="#E65100" opacity="0.75"/>
  <polygon points="300,258 307,278 328,278 311,290 318,310 300,298 282,310 289,290 272,278 293,278" fill="#FF6D00"/>
  <circle cx="724" cy="280" r="22" fill="#E65100" opacity="0.75"/>
  <polygon points="724,258 731,278 752,278 735,290 742,310 724,298 706,310 713,290 696,278 717,278" fill="#FF6D00"/>
  <!-- Medium stars -->
  <circle cx="820" cy="512" r="18" fill="#E65100" opacity="0.7"/>
  <polygon points="820,494 826,510 844,510 830,520 836,536 820,526 804,536 810,520 796,510 814,510" fill="#FF6D00"/>
  <circle cx="204" cy="512" r="18" fill="#E65100" opacity="0.7"/>
  <polygon points="204,494 210,510 228,510 214,520 220,536 204,526 188,536 194,520 180,510 198,510" fill="#FF6D00"/>
  <!-- Bottom stars -->
  <circle cx="724" cy="744" r="20" fill="#E65100" opacity="0.7"/>
  <circle cx="300" cy="744" r="20" fill="#E65100" opacity="0.7"/>
  <circle cx="512" cy="820" r="24" fill="#E65100" opacity="0.75"/>
  <polygon points="512,796 519,818 542,818 523,832 530,854 512,840 494,854 501,832 482,818 505,818" fill="#FF6D00"/>
