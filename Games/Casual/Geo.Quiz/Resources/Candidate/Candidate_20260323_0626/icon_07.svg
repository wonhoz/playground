<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | 수도 표지판 모음 — 국가→수도 문제 | 기하학 | #1A1400 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#1A1400"/>
  <!-- Layer 2: Road sign style quiz cards -->
  <!-- Sign 1: France → Paris (green highway sign) -->
  <rect x="180" y="200" width="300" height="100" rx="8" fill="#1A5A1A" stroke="#FFFFFF" stroke-width="5"/>
  <text x="330" y="248" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">프랑스의 수도?</text>
  <text x="330" y="280" font-family="Arial,sans-serif" font-size="18" fill="#FFFF66" text-anchor="middle">→ 파리 (PARIS) ✓</text>
  <!-- Sign post 1 -->
  <rect x="322" y="300" width="16" height="60" rx="4" fill="#888888"/>
  <rect x="300" y="356" width="60" height="8" rx="4" fill="#666666"/>
  <!-- Sign 2: Japan → Tokyo (blue info sign) -->
  <rect x="544" y="200" width="300" height="100" rx="8" fill="#1A1A7A" stroke="#FFFFFF" stroke-width="5"/>
  <text x="694" y="248" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">일본의 수도?</text>
  <text x="694" y="280" font-family="Arial,sans-serif" font-size="18" fill="#FFFF66" text-anchor="middle">→ 도쿄 (TOKYO) ✓</text>
  <rect x="686" y="300" width="16" height="60" rx="4" fill="#888888"/>
  <rect x="664" y="356" width="60" height="8" rx="4" fill="#666666"/>
  <!-- Sign 3: Brazil → Brasília (orange warning-style) -->
  <rect x="180" y="450" width="300" height="100" rx="8" fill="#7A3A00" stroke="#FFAA00" stroke-width="5"/>
  <text x="330" y="498" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">브라질의 수도?</text>
  <text x="330" y="530" font-family="Arial,sans-serif" font-size="16" fill="#FFCC44" text-anchor="middle">→ 브라질리아 ✓</text>
  <rect x="322" y="550" width="16" height="60" rx="4" fill="#888888"/>
  <rect x="300" y="606" width="60" height="8" rx="4" fill="#666666"/>
  <!-- Sign 4: Australia (quiz - not answered yet) -->
  <rect x="544" y="450" width="300" height="100" rx="8" fill="#3A1A00" stroke="#FF8800" stroke-width="5" stroke-dasharray="10,5"/>
  <text x="694" y="498" font-family="Arial,sans-serif" font-size="20" fill="#FFAA66" text-anchor="middle" font-weight="bold">호주의 수도?</text>
  <!-- Multiple choice -->
  <text x="560" y="524" font-family="Arial,sans-serif" font-size="14" fill="#FFCC88">① 시드니  ② 캔버라</text>
  <rect x="686" y="550" width="16" height="60" rx="4" fill="#888888"/>
  <!-- Sign 5: USA (wrong answer marked) -->
  <rect x="180" y="700" width="300" height="100" rx="8" fill="#3A0A0A" stroke="#FF4444" stroke-width="5"/>
  <text x="330" y="748" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">미국의 수도?</text>
  <text x="330" y="780" font-family="Arial,sans-serif" font-size="16" fill="#FF6666" text-anchor="middle">뉴욕 ✗ → 워싱턴 D.C.</text>
  <!-- Sign 6: China (unanswered) -->
  <rect x="544" y="700" width="300" height="100" rx="8" fill="#2A1A00" stroke="#FFAA00" stroke-width="3" stroke-dasharray="8,6"/>
  <text x="694" y="748" font-family="Arial,sans-serif" font-size="20" fill="#FFAA66" text-anchor="middle" font-weight="bold">중국의 수도?</text>
  <text x="694" y="780" font-family="Arial,sans-serif" font-size="16" fill="#886644" text-anchor="middle">입력하세요...</text>
  <!-- Layer 3: Score summary -->
  <rect x="350" y="840" width="324" height="44" rx="8" fill="#0A1400" stroke="#4ADE80" stroke-width="2"/>
  <text x="512" y="868" font-family="monospace" font-size="16" fill="#4ADE80" text-anchor="middle">4/6 정답  (66%)</text>
</svg>
