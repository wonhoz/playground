<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 아이콘 그리드 -->
  <rect x="90" y="110" width="80" height="80" rx="8" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1.5"/>
  <rect x="186" y="110" width="80" height="80" rx="8" fill="#10B981" opacity="0.05" stroke="#34D399" stroke-width="1" opacity="0.4"/>
  <rect x="282" y="110" width="80" height="80" rx="8" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1.5"/>
  <rect x="378" y="110" width="80" height="80" rx="8" fill="#10B981" opacity="0.05" stroke="#34D399" stroke-width="1" opacity="0.4"/>
  <rect x="90" y="206" width="80" height="80" rx="8" fill="#10B981" opacity="0.05" stroke="#34D399" stroke-width="1" opacity="0.4"/>
  <rect x="186" y="206" width="80" height="80" rx="8" fill="#10B981" opacity="0.25" stroke="#10B981" stroke-width="3" filter="url(#glow)"/>
  <rect x="282" y="206" width="80" height="80" rx="8" fill="#10B981" opacity="0.05" stroke="#34D399" stroke-width="1" opacity="0.4"/>
  <rect x="378" y="206" width="80" height="80" rx="8" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1.5"/>
  <!-- 그리드 이모지 -->
  <text x="130" y="158" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🌟</text>
  <text x="226" y="158" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🔥</text>
  <text x="322" y="158" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">💎</text>
  <text x="418" y="158" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">⚡</text>
  <text x="130" y="254" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🎨</text>
  <!-- 선택된 아이콘 (강조) -->
  <text x="226" y="254" text-anchor="middle" font-size="30" font-family="Segoe UI Emoji">✅</text>
  <text x="322" y="254" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🚀</text>
  <text x="418" y="254" text-anchor="middle" font-size="26" font-family="Segoe UI Emoji">🌈</text>
  <!-- 레이블 -->
  <text x="256" y="440" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">GRID HUNTER</text>
</svg>
