<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: metaphor | 통화 기호 + 날짜 텍스트 조각들이 무지개 줄무늬 위에 | 기하학 추상 | 비비드 무지개 배경 -->
  <defs>
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>

  <!-- Layer 1: 무지개 스트라이프 배경 -->
  <rect width="1024" height="1024" rx="190" fill="#FF6B6B"/>
  <g clip-path="url(#roundClip)">
    <rect x="0" y="0" width="1024" height="175" fill="#FF6B6B"/>
    <rect x="0" y="175" width="1024" height="174" fill="#FF9F43"/>
    <rect x="0" y="349" width="1024" height="174" fill="#F7D060"/>
    <rect x="0" y="523" width="1024" height="174" fill="#48C774"/>
    <rect x="0" y="697" width="1024" height="327" fill="#3A9BDC"/>
  </g>

  <!-- Layer 2: 흰 카드 메인 -->
  <rect x="140" y="170" width="744" height="560" rx="32" fill="white" opacity="0.92"/>

  <!-- Layer 3: 통화 기호들 4개 큰 -->
  <text x="260" y="420" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="230" font-weight="bold" fill="#FF6B6B">$</text>
  <text x="512" y="420" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="230" font-weight="bold" fill="#FF9F43">€</text>
  <text x="764" y="420" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="230" font-weight="bold" fill="#48C774">¥</text>

  <!-- 하단 작은 날짜 포맷 힌트 -->
  <rect x="160" y="620" width="290" height="52" rx="10" fill="#F0F4FF"/>
  <text x="305" y="650" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="34" fill="#2A6AE8" font-weight="bold">03/25/26</text>

  <rect x="480" y="620" width="280" height="52" rx="10" fill="#FFF0F8"/>
  <text x="620" y="650" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="34" fill="#E83A8C" font-weight="bold">25.03.26</text>

  <!-- 상단 소제목 -->
  <text x="512" y="230" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#888888" letter-spacing="8">LOCALE</text>
</svg>
