<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 씨앗→나무 성장 단계 | 대각선/동적 | #FFF8EE 밝은배경 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#FFF8EE"/>
  <!-- Layer 2: Growth stages (left to right) -->
  <!-- Stage 1: Seed -->
  <ellipse cx="160" cy="800" rx="80" ry="28" fill="#D4A850" opacity="0.5"/>
  <ellipse cx="160" cy="768" rx="22" ry="26" fill="#8B5E3C"/>
  <!-- Small sprout -->
  <line x1="160" y1="768" x2="160" y2="730" stroke="#4ADE80" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="160" cy="726" rx="14" ry="10" fill="#22C55E" transform="rotate(-20 160 726)"/>
  <!-- Stage 2: Seedling -->
  <ellipse cx="310" cy="800" rx="80" ry="28" fill="#D4A850" opacity="0.5"/>
  <line x1="310" y1="800" x2="310" y2="680" stroke="#6B3A1F" stroke-width="10" stroke-linecap="round"/>
  <line x1="310" y1="740" x2="260" y2="700" stroke="#16A34A" stroke-width="6" stroke-linecap="round"/>
  <circle cx="254" cy="696" r="16" fill="#22C55E"/>
  <line x1="310" y1="740" x2="360" y2="700" stroke="#16A34A" stroke-width="6" stroke-linecap="round"/>
  <circle cx="366" cy="696" r="16" fill="#4ADE80"/>
  <circle cx="310" cy="675" r="20" fill="#22C55E"/>
  <!-- Stage 3: Young tree -->
  <ellipse cx="510" cy="800" rx="80" ry="28" fill="#D4A850" opacity="0.5"/>
  <line x1="510" y1="800" x2="510" y2="580" stroke="#7A3B14" stroke-width="16" stroke-linecap="round"/>
  <line x1="510" y1="680" x2="440" y2="620" stroke="#9B5A22" stroke-width="10" stroke-linecap="round"/>
  <circle cx="428" cy="610" r="28" fill="#16A34A"/>
  <line x1="510" y1="680" x2="578" y2="618" stroke="#9B5A22" stroke-width="10" stroke-linecap="round"/>
  <circle cx="590" cy="608" r="28" fill="#22C55E"/>
  <line x1="510" y1="626" x2="472" y2="564" stroke="#8B4820" stroke-width="8" stroke-linecap="round"/>
  <circle cx="460" cy="550" r="24" fill="#4ADE80"/>
  <line x1="510" y1="626" x2="550" y2="562" stroke="#8B4820" stroke-width="8" stroke-linecap="round"/>
  <circle cx="562" cy="548" r="24" fill="#15803D"/>
  <circle cx="510" cy="572" r="30" fill="#22C55E"/>
  <!-- Stage 4: Full tree (biggest) -->
  <ellipse cx="770" cy="800" rx="100" ry="30" fill="#D4A850" opacity="0.6"/>
  <line x1="770" y1="800" x2="770" y2="480" stroke="#6B3A1F" stroke-width="22" stroke-linecap="round"/>
  <line x1="770" y1="650" x2="650" y2="520" stroke="#8B4513" stroke-width="14" stroke-linecap="round"/>
  <circle cx="632" cy="504" r="44" fill="#15803D"/>
  <line x1="770" y1="650" x2="890" y2="524" stroke="#8B4513" stroke-width="14" stroke-linecap="round"/>
  <circle cx="908" cy="508" r="44" fill="#16A34A"/>
  <line x1="770" y1="550" x2="700" y2="430" stroke="#9B5A22" stroke-width="10" stroke-linecap="round"/>
  <circle cx="682" cy="412" r="38" fill="#22C55E"/>
  <line x1="770" y1="550" x2="844" y2="428" stroke="#9B5A22" stroke-width="10" stroke-linecap="round"/>
  <circle cx="862" cy="410" r="38" fill="#4ADE80"/>
  <circle cx="770" cy="466" r="52" fill="#16A34A"/>
  <!-- Flowers -->
  <circle cx="640" cy="490" r="10" fill="#FCA5A5"/>
  <circle cx="908" cy="494" r="10" fill="#F9A8D4"/>
  <circle cx="682" cy="396" r="8" fill="#FDA4AF"/>
  <!-- Layer 3: Arrows between stages -->
  <polygon points="196,754 224,768 196,782" fill="#D97706"/>
  <polygon points="356,754 384,768 356,782" fill="#D97706"/>
  <polygon points="606,754 634,768 606,782" fill="#D97706"/>
</svg>
