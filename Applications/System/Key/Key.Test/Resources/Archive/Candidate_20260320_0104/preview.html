<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Key.Test Icon Candidates</title>
<style>
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 32px; }
  h1 { font-size: 1.4rem; color: #AED581; margin-bottom: 8px; }
  p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img {
    width: 140px; height: 140px; border-radius: 28px;
    border: 1px solid #101508;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }
  .item img:hover { transform: scale(1.12); box-shadow: 0 8px 32px rgba(174,213,129,0.35); }
  .label { font-size: 0.78rem; color: #888; }
</style>
</head>
<body>
<h1>Key.Test — Icon Candidates</h1>
<p>bg=#080A00 · accent=#33691E · accentLight=#AED581 · 키보드 테스터 (키 입력 감지)</p>
<div class="grid">
  <div class="item"><img src="icon_01.svg" alt="01"><span class="label">01. 키+체크마크</span></div>
  <div class="item"><img src="icon_02.svg" alt="02"><span class="label">02. 청진기+키보드</span></div>
  <div class="item"><img src="icon_03.svg" alt="03"><span class="label">03. 진단화면</span></div>
  <div class="item"><img src="icon_04.svg" alt="04"><span class="label">04. 번개+키</span></div>
  <div class="item"><img src="icon_05.svg" alt="05"><span class="label">05. 오실로스코프</span></div>
  <div class="item"><img src="icon_06.svg" alt="06"><span class="label">06. 해머두드리기</span></div>
  <div class="item"><img src="icon_07.svg" alt="07"><span class="label">07. 방패+키</span></div>
  <div class="item"><img src="icon_08.svg" alt="08"><span class="label">08. 레이더+키</span></div>
  <div class="item"><img src="icon_09.svg" alt="09"><span class="label">09. 체크리스트키</span></div>
  <div class="item"><img src="icon_10.svg" alt="10"><span class="label">10. 돋보기+키</span></div>
</div>
</body>
</html>
