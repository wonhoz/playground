<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="100%" stop-color="#3D1500"/>
    </linearGradient>
    <linearGradient id="runner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFB703"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Morse path track -->
  <circle cx="90" cy="300" r="18" fill="#FF6B00" opacity="0.9"/>
  <rect x="126" y="282" width="50" height="36" rx="9" fill="#FF6B00" opacity="0.9"/>
  <circle cx="204" cy="300" r="18" fill="#FF6B00" opacity="0.9"/>
  <circle cx="242" cy="300" r="18" fill="#FF6B00" opacity="0.9"/>
  <rect x="278" y="282" width="50" height="36" rx="9" fill="#FF6B00" opacity="0.9"/>
  <circle cx="356" cy="300" r="18" fill="#FF6B00" opacity="0.9"/>
  <rect x="390" y="282" width="50" height="36" rx="9" fill="#FF6B00" opacity="0.9"/>
  <!-- Ground line -->
  <line x1="60" y1="332" x2="452" y2="332" stroke="#FF6B00" stroke-width="4" opacity="0.5"/>
  <!-- Runner jumping over dash -->
  <circle cx="310" cy="220" r="22" fill="url(#runner)"/>
  <line x1="310" y1="242" x2="310" y2="276" stroke="#FFB703" stroke-width="7" stroke-linecap="round"/>
  <line x1="310" y1="256" x2="288" y2="244" stroke="#FFB703" stroke-width="5" stroke-linecap="round"/>
  <line x1="310" y1="256" x2="332" y2="250" stroke="#FFB703" stroke-width="5" stroke-linecap="round"/>
  <line x1="310" y1="276" x2="292" y2="300" stroke="#FFB703" stroke-width="5" stroke-linecap="round"/>
  <line x1="310" y1="276" x2="328" y2="296" stroke="#FFB703" stroke-width="5" stroke-linecap="round"/>
  <!-- Jump arc -->
  <path d="M 255 300 Q 310 190 370 300" fill="none" stroke="#FFB703" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="130" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#FFB703">· · · ―――</text>
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#FF6B00">MORSE.RUN</text>
</svg>