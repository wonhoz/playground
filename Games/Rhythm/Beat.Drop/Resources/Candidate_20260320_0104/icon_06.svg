  <circle cx="840" cy="580" r="12" fill="#CE93D8" opacity="0.5"/>
  <circle cx="360" cy="160" r="9" fill="#CE93D8" opacity="0.4"/>
  <circle cx="660" cy="170" r="11" fill="#9C27B0" opacity="0.5"/>
