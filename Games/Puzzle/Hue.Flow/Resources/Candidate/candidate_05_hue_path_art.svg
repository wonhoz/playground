<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12001f"/>
      <stop offset="100%" style="stop-color:#001f3a"/>
    </linearGradient>
    <linearGradient id="path1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#48dbfb"/>
    </linearGradient>
    <linearGradient id="path2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9ff3"/>
      <stop offset="50%" style="stop-color:#54a0ff"/>
      <stop offset="100%" style="stop-color:#5f27cd"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flowing river-like color paths -->
  <path d="M80,100 C120,100 120,200 200,200 C280,200 280,300 360,300 C420,300 430,380 432,400" stroke="url(#path1)" stroke-width="24" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>
  <path d="M80,160 C130,160 150,280 220,280 C290,280 310,180 380,180 C420,180 430,130 432,120" stroke="url(#path2)" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.7"/>
  <!-- Branching sub-paths -->
  <path d="M256,256 C256,200 310,180 350,150" stroke="#ff9ff3" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M256,256 C256,310 200,330 170,360" stroke="#48dbfb" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Nodes along the paths -->
  <circle cx="80" cy="100" r="12" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="10" fill="#feca57" filter="url(#glow)"/>
  <circle cx="360" cy="300" r="10" fill="#48dbfb" filter="url(#glow)"/>
  <circle cx="432" cy="400" r="12" fill="#00d2d3" filter="url(#glow)"/>
  <circle cx="80" cy="160" r="12" fill="#ff9ff3" filter="url(#glow)"/>
  <circle cx="432" cy="120" r="12" fill="#5f27cd" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="8" fill="#ffffff80"/>
</svg>
