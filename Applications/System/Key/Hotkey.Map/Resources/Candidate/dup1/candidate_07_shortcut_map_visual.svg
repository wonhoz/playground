<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#003300"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
    <linearGradient id="action" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76ff03"/>
      <stop offset="100%" stop-color="#64dd17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Key nodes -->
  <rect x="80" y="100" width="60" height="50" rx="8" fill="url(#node)" filter="url(#glow)"/>
  <rect x="226" y="80" width="60" height="50" rx="8" fill="url(#node)" filter="url(#glow)"/>
  <rect x="372" y="100" width="60" height="50" rx="8" fill="url(#node)" filter="url(#glow)"/>
  <rect x="80" y="230" width="60" height="50" rx="8" fill="#00c853" opacity="0.7" filter="url(#glow)"/>
  <rect x="372" y="230" width="60" height="50" rx="8" fill="#00c853" opacity="0.7" filter="url(#glow)"/>
  <rect x="226" y="360" width="60" height="50" rx="8" fill="url(#action)" filter="url(#glow)"/>
  <!-- Connection lines -->
  <line x1="140" y1="125" x2="226" y2="105" stroke="url(#node)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="286" y1="105" x2="372" y2="125" stroke="url(#node)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="110" y1="150" x2="110" y2="230" stroke="url(#node)" stroke-width="2" opacity="0.5"/>
  <line x1="402" y1="150" x2="402" y2="230" stroke="url(#node)" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="255" x2="226" y2="385" stroke="url(#action)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="372" y1="255" x2="286" y2="385" stroke="url(#action)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="256" y1="130" x2="256" y2="360" stroke="url(#action)" stroke-width="2" opacity="0.3"/>
  <!-- Arrow arrowhead to result -->
  <polygon points="248,356 256,380 264,356" fill="url(#action)" filter="url(#glow)"/>
  <!-- Result icon at center -->
  <circle cx="256" cy="255" r="30" fill="url(#action)" filter="url(#glow)" opacity="0.8"/>
  <polygon points="245,245 269,255 245,265" fill="#001a00"/>
</svg>