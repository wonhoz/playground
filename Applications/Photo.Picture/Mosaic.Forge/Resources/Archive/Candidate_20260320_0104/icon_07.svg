<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="180" fill="#0A0005"/>
  <!-- Anvil shape -->
  <rect x="340" y="560" width="344" height="100" rx="16" fill="#880E4F"/>
  <rect x="290" y="640" width="444" height="60" rx="10" fill="#880E4F" opacity="0.8"/>
  <rect x="360" y="700" width="304" height="80" rx="8" fill="#F48FB1" opacity="0.5"/>
  <ellipse cx="512" cy="560" rx="172" ry="40" fill="#880E4F" opacity="0.9"/>
  <!-- Horn of anvil -->
  <path d="M340 590 Q240 600 200 570 Q220 540 340 560Z" fill="#880E4F"/>
  <!-- Tile on top of anvil being hammered -->
  <rect x="400" y="460" width="224" height="100" rx="12" fill="#F48FB1" opacity="0.9"/>
  <!-- Grid lines on tile -->
  <line x1="475" y1="460" x2="475" y2="560" stroke="#0A0005" stroke-width="5" opacity="0.5"/>
  <line x1="549" y1="460" x2="549" y2="560" stroke="#0A0005" stroke-width="5" opacity="0.5"/>
  <line x1="400" y1="510" x2="624" y2="510" stroke="#0A0005" stroke-width="5" opacity="0.5"/>
  <!-- Hammer -->
  <rect x="540" y="260" width="80" height="140" rx="10" fill="#880E4F" opacity="0.9" transform="rotate(15 580 330)"/>
  <rect x="480" y="380" width="20" height="120" rx="6" fill="#F48FB1" opacity="0.7" transform="rotate(15 490 440)"/>
  <!-- Sparks -->
  <circle cx="420" cy="450" r="8" fill="#F48FB1" opacity="0.9"/>
  <circle cx="630" cy="440" r="6" fill="#F48FB1" opacity="0.8"/>
  <circle cx="390" cy="420" r="5" fill="#F48FB1" opacity="0.7"/>
  <circle cx="655" cy="415" r="7" fill="#F48FB1" opacity="0.85"/>
</svg>
