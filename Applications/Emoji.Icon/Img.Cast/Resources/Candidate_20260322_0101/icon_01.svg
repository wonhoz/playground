<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    icon_01 [literal] — SVG → ICO 대각선 변환도
    컨셉: "SVG → ICO" 포맷명과 화살표로 변환 방향을 직접 표현
    연결고리: 가장 대표적인 입력(SVG)과 출력(ICO) 포맷을 큰 텍스트로 나타냄
    패턴: 중앙 심볼 (대각선 흐름)
    색상: 코랄-오렌지(#FF7043→#BF360C) + 흰 텍스트 + 노란 화살표
  -->
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
    <filter id="textShadow01">
      <feDropShadow dx="0" dy="4" stdDeviation="8"
                    flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Layer 1: 코랄 오렌지 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg01)"/>
  <!-- 오른쪽 하단 밝은 포인트 -->
  <circle cx="900" cy="900" r="340" fill="#FF5722" opacity="0.3"/>

  <!-- Layer 2: 메인 텍스트 (대각선 배치) -->
  <!-- "SVG" — 왼쪽 위 -->
  <text x="270" y="420"
        font-family="Arial Black, Arial, sans-serif"
        font-size="188" font-weight="900"
        fill="white" text-anchor="middle"
        filter="url(#textShadow01)">SVG</text>

  <!-- 화살표 → — 중앙 -->
  <text x="512" y="565"
        font-family="Arial Black, Arial, sans-serif"
        font-size="160" font-weight="900"
        fill="#FFE066" text-anchor="middle"
        filter="url(#textShadow01)">→</text>

  <!-- "ICO" — 오른쪽 아래 -->
  <text x="756" y="706"
        font-family="Arial Black, Arial, sans-serif"
        font-size="188" font-weight="900"
        fill="white" text-anchor="middle"
        filter="url(#textShadow01)">ICO</text>

  <!-- Layer 3: 서브 포맷 목록 -->
  <text x="512" y="822"
        font-family="Arial, sans-serif"
        font-size="58" font-weight="600"
        fill="white" text-anchor="middle"
        opacity="0.60">· PNG · JPG · BMP ·</text>
</svg>
