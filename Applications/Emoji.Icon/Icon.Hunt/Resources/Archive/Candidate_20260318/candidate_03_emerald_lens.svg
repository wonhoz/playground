<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#000d08"/>
    </linearGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 에메랄드 렌즈 -->
  <circle cx="230" cy="220" r="110" fill="url(#lens)"/>
  <circle cx="230" cy="220" r="110" fill="none" stroke="#10B981" stroke-width="4" filter="url(#glow)"/>
  <!-- 렌즈 내부 반사 -->
  <ellipse cx="195" cy="185" rx="30" ry="18" fill="white" opacity="0.06" transform="rotate(-30 195 185)"/>
  <!-- 십자 포커스 -->
  <line x1="230" y1="155" x2="230" y2="185" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <line x1="230" y1="255" x2="230" y2="285" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <line x1="165" y1="220" x2="195" y2="220" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <line x1="265" y1="220" x2="295" y2="220" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <!-- 손잡이 -->
  <rect x="310" y="290" width="80" height="22" rx="11" fill="#10B981" opacity="0.8" filter="url(#glow)" transform="rotate(45 350 301)"/>
  <!-- 이모지 타깃 -->
  <text x="230" y="230" text-anchor="middle" font-size="28" font-family="Segoe UI Emoji">🔍</text>
  <!-- 레이블 -->
  <text x="256" y="430" text-anchor="middle" fill="#10B981" font-size="13" font-family="monospace" font-weight="bold" filter="url(#glow)">EMERALD LENS</text>
</svg>
