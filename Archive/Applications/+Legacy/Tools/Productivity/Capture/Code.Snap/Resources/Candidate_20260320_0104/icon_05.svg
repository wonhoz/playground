<!-- Code.Snap icon_05: 스냅 셔터 + 터미널 (shutter + terminal window) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0A1A0A"/>
  <!-- Terminal window -->
  <rect x="180" y="280" width="660" height="460" rx="32" fill="#1B5E20"/>
  <!-- Title bar -->
  <rect x="180" y="280" width="660" height="64" rx="32" fill="#2E7D32"/>
  <!-- Traffic lights -->
  <circle cx="240" cy="312" r="18" fill="#388E3C"/>
  <circle cx="296" cy="312" r="18" fill="#388E3C"/>
  <circle cx="352" cy="312" r="18" fill="#388E3C"/>
  <!-- Prompt + code -->
  <rect x="218" y="390" width="400" height="26" rx="8" fill="#43A047"/>
  <rect x="218" y="438" width="520" height="26" rx="8" fill="#43A047"/>
  <rect x="218" y="486" width="320" height="26" rx="8" fill="#43A047"/>
  <!-- Shutter overlay (circular aperture) -->
  <circle cx="512" cy="512" r="220" fill="none" stroke="#66BB6A" stroke-width="32" stroke-dasharray="80,56"/>
  <!-- Center snap dot -->
  <circle cx="512" cy="512" r="36" fill="#66BB6A"/>
</svg>
