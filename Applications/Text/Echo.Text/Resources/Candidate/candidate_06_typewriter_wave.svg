  <rect x="387" y="245" width="44" height="38" rx="6" fill="#e8e8e8"/>
  <!-- Keys row 2 -->
  <rect x="95" y="294" width="44" height="38" rx="6" fill="#e8e8e8"/>
  <rect x="147" y="294" width="44" height="38" rx="6" fill="#e8e8e8"/>
