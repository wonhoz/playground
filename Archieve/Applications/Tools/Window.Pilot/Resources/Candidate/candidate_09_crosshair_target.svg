<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="targetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#targetGlow)"/>
  <!-- 동심원 타겟 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
  <circle cx="256" cy="256" r="36" fill="none" stroke="#22c55e" stroke-width="3" filter="url(#glow)"/>
  <!-- 크로스헤어 -->
  <line x1="76" y1="256" x2="200" y2="256" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="312" y1="256" x2="436" y2="256" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="256" y1="76" x2="256" y2="200" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="256" y1="312" x2="256" y2="436" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <!-- 창 아이콘 (중심에 배치) -->
  <rect x="226" y="226" width="60" height="60" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <rect x="226" y="226" width="60" height="16" rx="6" fill="#14532d"/>
  <!-- 코너 브래킷 -->
  <path d="M80,80 L80,120 M80,80 L120,80" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M432,80 L432,120 M432,80 L392,80" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M80,432 L80,392 M80,432 L120,432" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M432,432 L432,392 M432,432 L392,432" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- 좌표 표시 -->
  <text x="420" y="248" font-family="'Courier New',monospace" font-size="12" fill="#22c55e" text-anchor="end" opacity="0.8">X:256</text>
  <text x="420" y="265" font-family="'Courier New',monospace" font-size="12" fill="#22c55e" text-anchor="end" opacity="0.8">Y:256</text>
</svg>
