<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061220"/>
      <stop offset="100%" stop-color="#0a2040"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M256,80 L380,130 L380,260 Q380,360 256,420 Q132,360 132,260 L132,130 Z" fill="url(#shield)" stroke="#0088ff" stroke-width="3"/>
  <!-- Ping rings -->
  <circle cx="256" cy="250" r="30" fill="none" stroke="#00ccff" stroke-width="2.5" opacity="0.9"/>
  <circle cx="256" cy="250" r="60" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="250" r="90" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="256" cy="250" r="10" fill="#00ccff"/>
  <!-- Trace line -->
  <line x1="256" y1="250" x2="320" y2="190" stroke="#00ffcc" stroke-width="2.5" stroke-dasharray="8,4"/>
  <circle cx="320" cy="190" r="6" fill="#00ffcc"/>
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#0099ff">NET.TRACE</text>
</svg>
