<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A00"/>
  <!-- 속도계 + CPU: speedometer dial with CPU chip center -->
  <!-- Speedometer arc -->
  <path d="M512 580 m-260 0 a260 260 0 0 1 520 0" fill="none" stroke="#33691E" stroke-width="40" stroke-linecap="round"/>
  <!-- Speed zones -->
  <path d="M512 580 m-260 0 a260 260 0 0 1 130 -225" fill="none" stroke="#AED581" stroke-width="40" stroke-linecap="round" stroke-dasharray="204 612"/>
  <!-- Tick marks -->
  <line x1="252" y1="580" x2="292" y2="580" stroke="#AED581" stroke-width="8"/>
  <line x1="771" y1="580" x2="732" y2="580" stroke="#AED581" stroke-width="8"/>
  <line x1="512" y1="320" x2="512" y2="360" stroke="#AED581" stroke-width="8"/>
  <line x1="330" y1="390" x2="358" y2="411" stroke="#AED581" stroke-width="6"/>
  <line x1="693" y1="390" x2="665" y2="411" stroke="#AED581" stroke-width="6"/>
  <!-- Needle -->
  <line x1="512" y1="580" x2="390" y2="410" stroke="#AED581" stroke-width="14" stroke-linecap="round"/>
  <!-- CPU chip center -->
  <rect x="462" y="530" width="100" height="100" rx="10" fill="#33691E"/>
  <rect x="477" y="545" width="70" height="70" rx="6" fill="#050A00"/>
  <!-- CPU grid lines -->
  <line x1="499" y1="545" x2="499" y2="615" stroke="#33691E" stroke-width="3"/>
  <line x1="524" y1="545" x2="524" y2="615" stroke="#33691E" stroke-width="3"/>
  <line x1="477" y1="567" x2="547" y2="567" stroke="#33691E" stroke-width="3"/>
  <line x1="477" y1="592" x2="547" y2="592" stroke="#33691E" stroke-width="3"/>
  <!-- CPU pins -->
  <line x1="487" y1="530" x2="487" y2="520" stroke="#AED581" stroke-width="4"/>
  <line x1="512" y1="530" x2="512" y2="520" stroke="#AED581" stroke-width="4"/>
  <line x1="537" y1="530" x2="537" y2="520" stroke="#AED581" stroke-width="4"/>
  <line x1="487" y1="630" x2="487" y2="640" stroke="#AED581" stroke-width="4"/>
  <line x1="512" y1="630" x2="512" y2="640" stroke="#AED581" stroke-width="4"/>
  <line x1="537" y1="630" x2="537" y2="640" stroke="#AED581" stroke-width="4"/>
</svg>