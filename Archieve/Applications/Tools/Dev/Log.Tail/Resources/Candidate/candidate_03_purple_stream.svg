<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#2A0055"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AA44FF" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#AA44FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Vertical log stream lines fading in from top -->
  <!-- Line columns -->
  <rect x="72" y="60" width="368" height="8" rx="4" fill="#AA44FF" opacity="0.05"/>
  <rect x="72" y="78" width="320" height="7" rx="3" fill="#AA44FF" opacity="0.08"/>
  <rect x="72" y="95" width="340" height="7" rx="3" fill="#AA44FF" opacity="0.1"/>
  <rect x="72" y="112" width="290" height="7" rx="3" fill="#AA44FF" opacity="0.13"/>
  <rect x="72" y="129" width="350" height="7" rx="3" fill="#AA44FF" opacity="0.16"/>
  <rect x="72" y="146" width="300" height="7" rx="3" fill="#AA44FF" opacity="0.2"/>
  <rect x="72" y="163" width="330" height="7" rx="3" fill="#AA44FF" opacity="0.25"/>
  <rect x="72" y="180" width="280" height="7" rx="3" fill="#AA44FF" opacity="0.3"/>
  <rect x="72" y="197" width="360" height="7" rx="3" fill="#AA44FF" opacity="0.35"/>
  <rect x="72" y="214" width="310" height="7" rx="3" fill="#AA44FF" opacity="0.4"/>
  <rect x="72" y="231" width="340" height="7" rx="3" fill="#BB55FF" opacity="0.5"/>
  <rect x="72" y="248" width="295" height="7" rx="3" fill="#BB55FF" opacity="0.55"/>
  <rect x="72" y="265" width="350" height="7" rx="3" fill="#CC66FF" opacity="0.6"/>
  <rect x="72" y="282" width="315" height="7" rx="3" fill="#CC66FF" opacity="0.65"/>
  <rect x="72" y="299" width="340" height="7" rx="3" fill="#DD77FF" opacity="0.7"/>
  <!-- ERROR line highlighted -->
  <rect x="68" y="316" width="376" height="16" rx="4" fill="#FF00FF" opacity="0.15" filter="url(#glow)"/>
  <text x="76" y="328" font-family="'Courier New', monospace" font-size="12" fill="#FF44FF" filter="url(#glow)">[ERROR] NullReferenceException at line 847</text>
  <!-- Latest 2 lines very bright -->
  <rect x="72" y="342" width="360" height="9" rx="4" fill="#EE88FF" opacity="0.85" filter="url(#glow)"/>
  <rect x="72" y="361" width="340" height="9" rx="4" fill="#FF00FF" opacity="0.95" filter="url(#glow)"/>
  <!-- Blinking tail cursor -->
  <circle cx="440" cy="365" r="8" fill="#FF00FF" filter="url(#glow)"/>
  <!-- Tail arrow -->
  <path d="M72 400 L440 400 L440 388" stroke="#FF00FF" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
  <path d="M436 396 L440 400 L444 396" stroke="#FF00FF" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="456" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#AA44FF" font-weight="700" filter="url(#glow)">LOG.TAIL</text>
  <text x="256" y="476" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" fill="#660099" opacity="0.7">real-time viewer</text>
</svg>
