<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0500"/>
<!-- 컨셉: 자물쇠 열림 — 열린 자물쇠 + 열쇠 -->
<!-- 자물쇠 몸체 -->
<rect x="320" y="520" width="384" height="280" rx="32" ry="32" fill="#E65100"/>
<!-- 자물쇠 열린 고리 (우측으로 열림) -->
<path d="M 440 520 L 440 380 Q 440 260 560 260 Q 680 260 680 380 L 680 440" fill="none" stroke="#FFAB40" stroke-width="60" stroke-linecap="round"/>
<!-- 키홀 -->
<circle cx="512" cy="660" r="48" fill="#0A0500"/>
<rect x="492" y="700" width="40" height="60" rx="8" fill="#0A0500"/>
<!-- 열쇠 -->
<circle cx="720" cy="340" r="56" fill="none" stroke="#FFAB40" stroke-width="28"/>
<line x1="760" y1="374" x2="860" y2="474" stroke="#FFAB40" stroke-width="28" stroke-linecap="round"/>
<rect x="820" y="466" width="20" height="40" rx="4" fill="#FFAB40"/>
<rect x="848" y="490" width="20" height="32" rx="4" fill="#FFAB40"/>
</svg>
