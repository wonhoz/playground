  </g>
  <!-- 목표 마크 -->
  <circle cx="750" cy="550" r="18" fill="#22C55E" opacity="0.8"/>
  <!-- 발사 방향 화살표 -->
  <path d="M 260,720 Q 270,690 290,670" fill="none" stroke="#FF6666" stroke-width="10" stroke-linecap="round"/>
  <polygon points="290,670 278,695 305,688" fill="#FF6666"/>
