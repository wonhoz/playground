<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_03: metaphor | 대장간 망치 + 텍스트 모루 (Forge 은유) | 중앙 심볼 | 황금+빨강+파랑 -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <filter id="sh3" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#E65100" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg3)"/>

  <!-- Layer 2: Anvil (모루) with text on it -->
  <!-- Anvil body -->
  <ellipse cx="512" cy="690" rx="320" ry="60" fill="url(#anvil)" filter="url(#sh3)"/>
  <rect x="260" y="640" width="504" height="100" rx="16" fill="url(#anvil)" filter="url(#sh3)"/>
  <!-- Anvil horn (left) -->
  <path d="M260,660 Q180,650 160,680 Q180,700 260,700 Z" fill="#455A64"/>
  <!-- Anvil top surface -->
  <ellipse cx="512" cy="640" rx="280" ry="36" fill="#78909C"/>
  <!-- Base -->
  <rect x="360" y="740" width="304" height="80" rx="12" fill="#37474F"/>
  <rect x="320" y="810" width="384" height="40" rx="8" fill="#263238"/>

  <!-- "T{}" text on anvil -->
  <text x="512" y="660" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
        fill="#FFD740" text-anchor="middle" dominant-baseline="middle">T { }</text>

  <!-- Layer 3: Hammer (망치) swinging down -->
  <g transform="rotate(-35, 650, 380)" filter="url(#sh3)">
    <!-- Handle -->
    <rect x="620" y="340" width="36" height="260" rx="18" fill="#6D4C41"/>
    <!-- Head -->
    <rect x="560" y="280" width="160" height="90" rx="16" fill="#E53935"/>
    <!-- Head highlight -->
    <rect x="560" y="280" width="160" height="28" rx="14" fill="#EF9A9A" opacity="0.5"/>
  </g>

  <!-- Sparks from impact -->
  <circle cx="430" cy="590" r="22" fill="#FF6D00" filter="url(#sh3)"/>
  <circle cx="480" cy="555" r="14" fill="#FFD740"/>
  <circle cx="460" cy="570" r="10" fill="white" opacity="0.8"/>
  <line x1="380" y1="580" x2="340" y2="540" stroke="#FF6D00" stroke-width="8" stroke-linecap="round"/>
  <line x1="390" y1="560" x2="365" y2="510" stroke="#FFD740" stroke-width="6" stroke-linecap="round"/>
  <line x1="415" y1="540" x2="400" y2="490" stroke="#FF6D00" stroke-width="6" stroke-linecap="round"/>
</svg>
