<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prompt.Forge | 터미널 커서 "> |" | 중앙심볼 | #022C22 다크그린 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#022C22"/>
  <!-- Layer 2: Terminal window -->
  <rect x="140" y="220" width="744" height="540" rx="16" fill="#0D1A14"/>
  <!-- Title bar -->
  <rect x="140" y="220" width="744" height="46" rx="16" fill="#1A3A2A"/>
  <rect x="140" y="248" width="744" height="18" fill="#1A3A2A"/>
  <!-- Traffic lights -->
  <circle cx="186" cy="243" r="10" fill="#EF4444"/>
  <circle cx="218" cy="243" r="10" fill="#F59E0B"/>
  <circle cx="250" cy="243" r="10" fill="#22C55E"/>
  <text x="512" y="250" font-family="Consolas,monospace" font-size="16" fill="#6B7280" text-anchor="middle">prompt-forge</text>
  <!-- Terminal content -->
  <text x="180" y="320" font-family="Consolas,monospace" font-size="20" fill="#4ADE80">$ forge list --tags ai</text>
  <text x="180" y="356" font-family="Consolas,monospace" font-size="18" fill="#6B7280">  [1] GPT-4 시스템 프롬프트</text>
  <text x="180" y="386" font-family="Consolas,monospace" font-size="18" fill="#6B7280">  [2] 코드 리뷰 요청</text>
  <text x="180" y="416" font-family="Consolas,monospace" font-size="18" fill="#6B7280">  [3] 번역 전문가</text>
  <!-- Prompt line -->
  <text x="180" y="470" font-family="Consolas,monospace" font-size="24" fill="#22C55E" font-weight="bold">&gt;</text>
  <text x="216" y="470" font-family="Consolas,monospace" font-size="24" fill="#4ADE80"> forge run --id 2</text>
  <!-- Layer 3: Large prompt cursor (featured) -->
  <text x="180" y="560" font-family="Consolas,monospace" font-size="56" fill="#22C55E" font-weight="bold" opacity="0.9">&gt;</text>
  <!-- Blinking cursor bar -->
  <rect x="260" y="516" width="12" height="52" rx="3" fill="#4ADE80" opacity="0.9"/>
</svg>
