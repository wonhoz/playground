  <!-- 골든 — QR 코너 마커 강조 기하학 추상 -->
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1400"/>
      <stop offset="100%" stop-color="#2A1E00"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFED4A"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="qrBg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#FFF0A0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="150" fill="url(#bg7)"/>

  <!-- 배경 격자 힌트 (매우 은은하게) -->
  <line x1="0" y1="256" x2="1024" y2="256" stroke="#FFD700" stroke-width="1" opacity="0.08"/>
