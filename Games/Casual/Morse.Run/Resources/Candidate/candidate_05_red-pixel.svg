      <stop offset="0%" stop-color="#100000"/>
      <stop offset="100%" stop-color="#200000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel runner (16x16 style) -->
