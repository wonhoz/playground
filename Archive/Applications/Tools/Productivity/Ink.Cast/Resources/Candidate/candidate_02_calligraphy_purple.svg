  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 붓글씨 스트로크 -->
  <path d="M 100 140 C 140 100 200 130 220 180 C 240 230 200 280 160 300 C 120 320 80 300 100 260" fill="url(#ink)" opacity="0.8"/>
  <path d="M 260 120 C 310 90 380 110 400 160 C 420 210 390 270 340 290 C 290 310 240 280 260 230 C 280 180 340 190 360 230" fill="none" stroke="url(#ink)" stroke-width="18" stroke-linecap="round"/>
  <!-- 잉크 번짐 -->
  <ellipse cx="160" cy="180" rx="20" ry="28" fill="#CE93D8" opacity="0.4" transform="rotate(30 160 180)"/>
  <ellipse cx="340" cy="200" rx="16" ry="22" fill="#E040FB" opacity="0.3" transform="rotate(-20 340 200)"/>
  <!-- 붓 -->
