<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#1a1a35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Timeline axis -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#455a64" stroke-width="4"/>
  <polygon points="452,248 470,256 452,264" fill="#455a64"/>
  <!-- Upper log stream -->
  <line x1="80" y1="160" x2="380" y2="160" stroke="#2196f3" stroke-width="5" stroke-dasharray="12,6"/>
  <!-- Lower log stream -->
  <line x1="80" y1="350" x2="380" y2="350" stroke="#ff5722" stroke-width="5" stroke-dasharray="12,6"/>
  <!-- Events on upper -->
  <circle cx="130" cy="160" r="10" fill="#2196f3"/>
  <circle cx="210" cy="160" r="10" fill="#2196f3"/>
  <circle cx="310" cy="160" r="10" fill="#2196f3"/>
  <!-- Events on lower -->
  <circle cx="160" cy="350" r="10" fill="#ff5722"/>
  <circle cx="260" cy="350" r="10" fill="#ff5722"/>
  <circle cx="360" cy="350" r="10" fill="#ff5722"/>
  <!-- Merge lines to center axis -->
  <line x1="130" y1="160" x2="130" y2="256" stroke="#2196f3" stroke-width="3" opacity="0.7"/>
  <line x1="210" y1="160" x2="210" y2="256" stroke="#2196f3" stroke-width="3" opacity="0.7"/>
  <line x1="310" y1="160" x2="310" y2="256" stroke="#2196f3" stroke-width="3" opacity="0.7"/>
  <line x1="160" y1="350" x2="160" y2="256" stroke="#ff5722" stroke-width="3" opacity="0.7"/>
  <line x1="260" y1="350" x2="260" y2="256" stroke="#ff5722" stroke-width="3" opacity="0.7"/>
  <line x1="360" y1="350" x2="360" y2="256" stroke="#ff5722" stroke-width="3" opacity="0.7"/>
  <!-- Merged events on center -->
  <circle cx="130" cy="256" r="7" fill="#76ff03"/>
  <circle cx="160" cy="256" r="7" fill="#76ff03"/>
  <circle cx="210" cy="256" r="7" fill="#76ff03"/>
  <circle cx="260" cy="256" r="7" fill="#76ff03"/>
  <circle cx="310" cy="256" r="7" fill="#76ff03"/>
  <circle cx="360" cy="256" r="7" fill="#76ff03"/>
  <!-- Labels -->
  <text x="70" y="148" font-family="monospace" font-size="14" fill="#64b5f6">log-a</text>
  <text x="70" y="370" font-family="monospace" font-size="14" fill="#ff8a65">log-b</text>
  <text x="460" y="260" font-family="monospace" font-size="14" fill="#aaa">t</text>
</svg>
