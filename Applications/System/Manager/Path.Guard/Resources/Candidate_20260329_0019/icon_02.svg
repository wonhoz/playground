<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | 도로 표지판 형태의 PATH 항목 목록 — 상태 뱃지 포함 | 레이어드 | 민트+흰+빨강+초록 -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#006064" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg2)"/>

  <!-- Pole -->
  <rect x="490" y="180" width="44" height="700" rx="22" fill="#78909C" filter="url(#sh2)"/>
  <rect x="490" y="840" width="44" height="60" rx="0" fill="#546E7A"/>
  <ellipse cx="512" cy="880" rx="80" ry="20" fill="#455A64" opacity="0.5"/>

  <!-- Sign 1 (top) — OK: C:\Windows\System32 -->
  <rect x="120" y="160" width="640" height="90" rx="12" fill="#43A047" filter="url(#sh2)"/>
  <circle cx="168" cy="205" r="22" fill="white"/>
  <text x="168" y="205" font-family="Arial, sans-serif" font-size="24" fill="#43A047"
        text-anchor="middle" dominant-baseline="middle">✓</text>
  <text x="512" y="205" font-family="Consolas, monospace" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">C:\Windows\System32</text>

  <!-- Sign 2 — OK: C:\Program Files\Git\bin -->
  <rect x="120" y="270" width="640" height="90" rx="12" fill="#1E88E5" filter="url(#sh2)"/>
  <circle cx="168" cy="315" r="22" fill="white"/>
  <text x="168" y="315" font-family="Arial, sans-serif" font-size="24" fill="#1E88E5"
        text-anchor="middle" dominant-baseline="middle">✓</text>
  <text x="512" y="315" font-family="Consolas, monospace" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">C:\Program Files\Git\bin</text>

  <!-- Sign 3 — BROKEN: red sign -->
  <rect x="120" y="380" width="640" height="90" rx="12" fill="#E53935" filter="url(#sh2)"/>
  <circle cx="168" cy="425" r="22" fill="white"/>
  <text x="168" y="425" font-family="Arial, sans-serif" font-size="26" fill="#E53935"
        text-anchor="middle" dominant-baseline="middle">✕</text>
  <text x="512" y="418" font-family="Consolas, monospace" font-size="26" fill="white"
        text-anchor="middle" dominant-baseline="middle">C:\Tools\OldSDK\bin</text>
  <text x="512" y="448" font-family="Arial, sans-serif" font-size="18" fill="#FFCDD2"
        text-anchor="middle" dominant-baseline="middle">경로 없음 (Broken)</text>

  <!-- Sign 4 — DISABLED: gray sign -->
  <rect x="140" y="490" width="600" height="80" rx="12" fill="#90A4AE" filter="url(#sh2)" opacity="0.8"/>
  <circle cx="184" cy="530" r="20" fill="white" opacity="0.7"/>
  <text x="184" y="530" font-family="Arial, sans-serif" font-size="20" fill="#90A4AE"
        text-anchor="middle" dominant-baseline="middle">—</text>
  <text x="512" y="530" font-family="Consolas, monospace" font-size="22" fill="white"
        text-anchor="middle" dominant-baseline="middle">C:\Python312\Scripts (비활성)</text>

  <!-- Sign 5 — OK: User path -->
  <rect x="160" y="590" width="560" height="80" rx="12" fill="#00897B" filter="url(#sh2)"/>
  <circle cx="204" cy="630" r="20" fill="white"/>
  <text x="204" y="630" font-family="Arial, sans-serif" font-size="22" fill="#00897B"
        text-anchor="middle" dominant-baseline="middle">✓</text>
  <text x="512" y="630" font-family="Consolas, monospace" font-size="22" fill="white"
        text-anchor="middle" dominant-baseline="middle">%USERPROFILE%\AppData\Local</text>

  <!-- Bottom badge: PATH Guard branding -->
  <rect x="280" y="700" width="464" height="70" rx="35" fill="white" filter="url(#sh2)"/>
  <text x="512" y="735" font-family="Arial Black, sans-serif" font-size="36" fill="#006064"
        text-anchor="middle" dominant-baseline="middle">PATH Guard</text>
</svg>
