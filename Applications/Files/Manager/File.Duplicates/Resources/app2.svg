  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File 1 (shadow/duplicate) -->
  <rect x="145" y="155" width="160" height="210" rx="12" fill="url(#file2)" opacity="0.7" transform="translate(20,20)"/>
