<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ccf2"/>
      <stop offset="100%" style="stop-color:#2f80ed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File icon left -->
  <path d="M60 120 L60 380 C60 394 72 406 86 406 L200 406 C214 406 226 394 226 380 L226 170 L176 120 Z" fill="url(#link)" opacity="0.4"/>
  <path d="M60 120 L60 380 C60 394 72 406 86 406 L200 406 C214 406 226 394 226 380 L226 170 L176 120 Z" stroke="url(#link)" stroke-width="4" fill="none"/>
  <polygon points="176,120 226,170 176,170" fill="url(#link)" opacity="0.6"/>
  <!-- Extension label on file -->
  <rect x="70" y="310" width="146" height="36" rx="8" fill="url(#link)" opacity="0.3"/>
  <text x="143" y="333" font-family="monospace" font-size="18" text-anchor="middle" fill="white" font-weight="bold">.PDF</text>
  <!-- Link chain -->
  <path d="M226 263 C280 263 280 263 286 263" stroke="url(#link)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <ellipse cx="310" cy="263" rx="28" ry="18" stroke="url(#link)" stroke-width="8" fill="none"/>
  <ellipse cx="350" cy="263" rx="28" ry="18" stroke="url(#link)" stroke-width="8" fill="none"/>
  <line x1="376" y1="263" x2="390" y2="263" stroke="url(#link)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- App icon right -->
  <rect x="390" y="160" width="100" height="100" rx="20" fill="url(#link)" opacity="0.6"/>
  <text x="440" y="220" font-family="sans-serif" font-size="48" text-anchor="middle" fill="white">A</text>
  <!-- Arrow pointing to app -->
  <polygon points="380,255 400,263 380,271" fill="url(#link)"/>
</svg>
