<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080018"/>
      <stop offset="100%" stop-color="#150030"/>
    </linearGradient>
    <linearGradient id="speakerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312080"/>
      <stop offset="100%" stop-color="#1a1050"/>
    </linearGradient>
    <radialGradient id="coneGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </radialGradient>
    <filter id="speakerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Speaker cabinet -->
  <rect x="115" y="155" width="195" height="235" rx="15" fill="url(#speakerGrad)" stroke="#6d28d9" stroke-width="2.5"/>
  <!-- Speaker cloth grill -->
  <rect x="128" y="168" width="169" height="209" rx="8" fill="#1a1040"/>
  <!-- Speaker woofer -->
  <circle cx="212" cy="272" r="72" fill="url(#coneGrad)" stroke="#6d28d9" stroke-width="2.5" filter="url(#speakerGlow)"/>
  <circle cx="212" cy="272" r="58" fill="#1a0e3a"/>
  <circle cx="212" cy="272" r="40" fill="#2e1065"/>
  <circle cx="212" cy="272" r="25" fill="#1a0e3a"/>
  <circle cx="212" cy="272" r="12" fill="#6d28d9" filter="url(#speakerGlow)"/>
  <!-- Speaker tweeter (top) -->
  <circle cx="212" cy="190" r="18" fill="url(#coneGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="212" cy="190" r="10" fill="#1a0e3a"/>
  <circle cx="212" cy="190" r="5" fill="#a855f7" filter="url(#speakerGlow)"/>
  <!-- Sound rings emanating right -->
  <path d="M310 232 C332 242 342 262 342 272 C342 282 332 302 310 312" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round" opacity="0.9" filter="url(#speakerGlow)"/>
  <path d="M325 205 C365 225 382 252 382 272 C382 292 365 320 325 340" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.7" filter="url(#speakerGlow)"/>
  <path d="M340 180 C398 208 420 242 420 272 C420 302 398 338 340 365" fill="none" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" opacity="0.5" filter="url(#speakerGlow)"/>
  <path d="M355 155 C430 190 458 232 458 272 C458 312 430 355 355 390" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Speaker screw corners -->
  <circle cx="138" cy="178" r="7" fill="#2e1065" stroke="#6d28d9" stroke-width="1.5"/>
  <circle cx="286" cy="178" r="7" fill="#2e1065" stroke="#6d28d9" stroke-width="1.5"/>
  <circle cx="138" cy="366" r="7" fill="#2e1065" stroke="#6d28d9" stroke-width="1.5"/>
  <circle cx="286" cy="366" r="7" fill="#2e1065" stroke="#6d28d9" stroke-width="1.5"/>
</svg>