<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#F8FAFC"/>
  <!-- Layer 2: 문서 파일 아이콘 + .md 배지 -->
  <!-- 문서 본체 -->
  <rect x="160" y="80" width="620" height="780" rx="24" fill="white" stroke="#CBD5E1" stroke-width="8"/>
  <!-- 접힌 모서리 -->
  <polygon points="660,80 780,200 660,200" fill="#E2E8F0"/>
  <polygon points="660,80 780,80 780,200" fill="#CBD5E1"/>
  <!-- 문서 내용 라인들 -->
  <!-- # 헤딩 -->
  <rect x="200" y="240" width="28" height="52" rx="4" fill="#7C3AED"/>
  <rect x="244" y="250" width="340" height="32" rx="6" fill="#1E293B"/>
  <!-- ## 헤딩 -->
  <rect x="200" y="330" width="24" height="24" rx="3" fill="#94A3B8"/>
  <rect x="236" y="333" width="24" height="24" rx="3" fill="#94A3B8"/>
  <rect x="276" y="337" width="260" height="20" rx="4" fill="#475569"/>
  <!-- 텍스트 라인들 -->
  <rect x="200" y="390" width="480" height="14" rx="3" fill="#94A3B8"/>
  <rect x="200" y="418" width="420" height="14" rx="3" fill="#94A3B8"/>
  <rect x="200" y="446" width="360" height="14" rx="3" fill="#94A3B8"/>
  <!-- 코드 블록 -->
  <rect x="200" y="490" width="480" height="100" rx="8" fill="#F1F5F9"/>
  <rect x="200" y="490" width="6" height="100" rx="3" fill="#7C3AED"/>
  <rect x="220" y="510" width="200" height="12" rx="3" fill="#64748B"/>
  <rect x="220" y="538" width="280" height="12" rx="3" fill="#64748B"/>
  <rect x="220" y="566" width="160" height="12" rx="3" fill="#64748B"/>
  <!-- 더 많은 라인들 -->
  <rect x="200" y="620" width="460" height="14" rx="3" fill="#94A3B8"/>
  <rect x="200" y="648" width="340" height="14" rx="3" fill="#94A3B8"/>
  <!-- Layer 3: .md 배지 -->
  <rect x="700" y="700" width="220" height="110" rx="20" fill="#7C3AED"/>
  <text x="810" y="770" font-size="68" fill="white" text-anchor="middle" font-family="monospace" font-weight="bold">.md</text>
</svg>
