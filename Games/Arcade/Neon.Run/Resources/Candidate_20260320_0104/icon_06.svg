  <!-- Phosphor glow overlay (vertical gradient) -->
  <rect x="160" y="200" width="704" height="200" rx="0" fill="url(#topGlow)" opacity="0.3"/>
  <!-- Screen content glow (abstract runner shape) -->
  <ellipse cx="512" cy="480" rx="160" ry="60" fill="#00B0FF" opacity="0.08"/>
  <!-- Corner vignette dots (CRT bezel) -->
  <circle cx="200" cy="240" r="12" fill="#003050" opacity="0.8"/>
