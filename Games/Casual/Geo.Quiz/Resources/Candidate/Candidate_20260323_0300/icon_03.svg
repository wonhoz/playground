<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Geo.Quiz | A등급 메달 + 정답 결과화면 | 중앙심볼 | #7B2D00 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#7B2D00"/>
  <!-- Layer 2: Medal / Award -->
  <!-- Medal ribbon -->
  <polygon points="412,180 512,240 612,180 612,340 512,390 412,340" fill="#DC2626"/>
  <polygon points="462,180 512,210 562,180 562,340 512,360 462,340" fill="#EF4444"/>
  <!-- Medal circle -->
  <circle cx="512" cy="520" r="200" fill="#F59E0B" stroke="#D97706" stroke-width="8"/>
  <circle cx="512" cy="520" r="175" fill="#FBBF24" stroke="#F59E0B" stroke-width="4"/>
  <!-- A grade in medal -->
  <text x="512" y="590" font-family="Arial,sans-serif" font-size="180" fill="#7C2D12" text-anchor="middle" font-weight="bold">A</text>
  <!-- Stars around medal -->
  <text x="250" y="440" font-family="Arial,sans-serif" font-size="36" fill="#FDE68A">★</text>
  <text x="740" y="440" font-family="Arial,sans-serif" font-size="36" fill="#FDE68A">★</text>
  <text x="310" y="550" font-family="Arial,sans-serif" font-size="28" fill="#FDE68A" opacity="0.7">★</text>
  <text x="710" y="550" font-family="Arial,sans-serif" font-size="28" fill="#FDE68A" opacity="0.7">★</text>
  <!-- Layer 3: Score display below -->
  <rect x="280" y="760" width="464" height="72" rx="16" fill="#1A0800"/>
  <text x="512" y="806" font-family="Arial,sans-serif" font-size="26" fill="#FBBF24" text-anchor="middle" font-weight="bold">10/10 정답! 🎉</text>
</svg>
