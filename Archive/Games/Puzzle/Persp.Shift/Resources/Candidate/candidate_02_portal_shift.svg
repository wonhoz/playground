<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="100%" style="stop-color:#1B2838"/>
    </linearGradient>
    <radialGradient id="portal1" cx="35%" cy="50%" r="20%">
      <stop offset="0%" style="stop-color:#FF4081;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF4081;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="portal2" cx="65%" cy="50%" r="20%">
      <stop offset="0%" style="stop-color:#40C4FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#40C4FF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Left portal -->
  <ellipse cx="170" cy="256" rx="55" ry="100" fill="url(#portal1)" opacity="0.5"/>
  <ellipse cx="170" cy="256" rx="55" ry="100" fill="none" stroke="#FF4081" stroke-width="5"/>
  <!-- Right portal -->
  <ellipse cx="342" cy="256" rx="55" ry="100" fill="url(#portal2)" opacity="0.5"/>
  <ellipse cx="342" cy="256" rx="55" ry="100" fill="none" stroke="#40C4FF" stroke-width="5"/>
  <!-- Connecting arc -->
  <path d="M170 256 Q256 180 342 256" stroke="#E040FB" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.8"/>
  <path d="M170 256 Q256 332 342 256" stroke="#E040FB" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.8"/>
  <!-- Arrow through portals -->
  <line x1="100" y1="256" x2="400" y2="256" stroke="white" stroke-width="4" opacity="0.7"/>
  <polygon points="400,244 400,268 425,256" fill="white" opacity="0.9"/>
  <!-- Perspective lines -->
  <line x1="60" y1="140" x2="256" y2="256" stroke="#40C4FF" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="372" x2="256" y2="256" stroke="#40C4FF" stroke-width="1" opacity="0.3"/>
  <line x1="452" y1="140" x2="256" y2="256" stroke="#FF4081" stroke-width="1" opacity="0.3"/>
  <line x1="452" y1="372" x2="256" y2="256" stroke="#FF4081" stroke-width="1" opacity="0.3"/>
</svg>
