<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D2B"/>
      <stop offset="100%" stop-color="#1A0A3D"/>
    </linearGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="200" cy="100" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="420" cy="80" r="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="350" cy="150" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="130" cy="200" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="460" cy="200" r="2" fill="#FFFFFF" opacity="0.8"/>
  <!-- Obstacles -->
  <rect x="80" y="160" width="60" height="60" rx="8" fill="#FF4444" opacity="0.9" filter="url(#glow)"/>
  <rect x="370" y="200" width="50" height="50" rx="8" fill="#FF6600" opacity="0.9" filter="url(#glow)"/>
  <rect x="180" y="120" width="45" height="45" rx="8" fill="#FF2266" opacity="0.8" filter="url(#glow)"/>
  <!-- Ship body -->
  <polygon points="256,100 310,300 256,270 202,300" fill="url(#ship)" filter="url(#glow)"/>
  <!-- Ship cockpit -->
  <ellipse cx="256" cy="190" rx="22" ry="30" fill="#AAFFFF" opacity="0.9"/>
  <!-- Engine flames -->
  <polygon points="230,295 256,380 282,295" fill="#FF8800" opacity="0.9" filter="url(#glow)"/>
  <polygon points="240,295 256,350 272,295" fill="#FFFF00" opacity="0.8"/>
  <!-- Wing details -->
  <line x1="210" y1="240" x2="160" y2="280" stroke="#00F5FF" stroke-width="3" opacity="0.7"/>
  <line x1="302" y1="240" x2="352" y2="280" stroke="#00F5FF" stroke-width="3" opacity="0.7"/>
  <!-- Speed lines -->
  <line x1="60" y1="350" x2="180" y2="350" stroke="#00F5FF" stroke-width="2" opacity="0.4"/>
  <line x1="330" y1="370" x2="450" y2="370" stroke="#00F5FF" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="400" x2="140" y2="400" stroke="#00F5FF" stroke-width="1.5" opacity="0.3"/>
  <!-- Title text area hint -->
  <text x="256" y="440" font-family="Arial" font-size="28" font-weight="bold" fill="#00F5FF" text-anchor="middle" opacity="0.9" filter="url(#glow)">DODGE·CRAFT</text>
</svg>
