  <circle cx="256" cy="256" r="25" fill="#2d1b69" opacity="0.9"/>
  <circle cx="256" cy="256" r="18" fill="#FFD700" opacity="0.8" filter="url(#coreGlow)"/>
  <circle cx="256" cy="256" r="10" fill="#FFFFFF" filter="url(#coreGlow)"/>

  <!-- git 브랜치 심볼 (중앙) -->
  <circle cx="256" cy="246" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="248" cy="262" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="264" cy="262" r="4" fill="#FFFFFF" opacity="0.9"/>
  <line x1="256" y1="251" x2="256" y2="258" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="258" x2="249" y2="258" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  <line x1="256" y1="258" x2="263" y2="258" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
</svg>
