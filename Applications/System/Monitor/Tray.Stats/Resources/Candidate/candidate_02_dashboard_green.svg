<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041A0A"/>
      <stop offset="100%" stop-color="#082A12"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#0D3B18" stroke-width="1">
    <line x1="100" y1="180" x2="412" y2="180"/>
    <line x1="100" y1="220" x2="412" y2="220"/>
    <line x1="100" y1="260" x2="412" y2="260"/>
    <line x1="100" y1="300" x2="412" y2="300"/>
    <line x1="100" y1="340" x2="412" y2="340"/>
  </g>
  <!-- CPU bar -->
  <rect x="118" y="252" width="44" height="88" rx="5" fill="url(#bar1)"/>
  <!-- MEM bar -->
  <rect x="182" y="222" width="44" height="118" rx="5" fill="url(#bar2)"/>
  <!-- GPU bar -->
  <rect x="246" y="195" width="44" height="145" rx="5" fill="url(#bar1)"/>
  <!-- DISK bar -->
  <rect x="310" y="270" width="44" height="70" rx="5" fill="url(#bar2)"/>
  <!-- NET bar -->
  <rect x="374" y="235" width="44" height="105" rx="5" fill="url(#bar1)"/>
  <!-- Baseline -->
  <line x1="100" y1="340" x2="412" y2="340" stroke="#4CAF50" stroke-width="2"/>
  <!-- Labels -->
  <g font-family="Arial" font-size="13" fill="#4CAF50" text-anchor="middle" opacity="0.8">
    <text x="140" y="360">CPU</text>
    <text x="204" y="360">MEM</text>
    <text x="268" y="360">GPU</text>
    <text x="332" y="360">DSK</text>
    <text x="396" y="360">NET</text>
  </g>
  <!-- Tray icon hint -->
  <rect x="168" y="100" width="176" height="54" rx="12" fill="#0D3B18" stroke="#4CAF50" stroke-width="2"/>
  <text x="256" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#69F0AE">CPU 72% | MEM 58%</text>
  <text x="256" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#69F0AE">GPU 84% | DSK 22%</text>
</svg>
