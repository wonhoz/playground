    <rect x="380" y="670" width="264" height="28" fill="#B0B0B0" stroke="#3E2723" stroke-width="10"/>
    <rect x="390" y="702" width="244" height="28" fill="#9E9E9E" stroke="#3E2723" stroke-width="10"/>
    <!-- 접점 -->
