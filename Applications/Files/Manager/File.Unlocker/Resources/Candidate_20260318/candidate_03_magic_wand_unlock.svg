<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#100a00"/>
    </linearGradient>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="wandGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 마법 지팡이 -->
  <line x1="130" y1="380" x2="320" y2="190" stroke="url(#wandGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="130" y1="380" x2="320" y2="190" stroke="#FCD34D" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 지팡이 팁 별 -->
  <polygon points="320,162 328,183 350,183 333,196 340,217 320,204 300,217 307,196 290,183 312,183" fill="url(#starGrad)" opacity="1" filter="url(#wandGlow)"/>
  <!-- 마법 파티클들 -->
  <circle cx="370" cy="160" r="8" fill="#FCD34D" opacity="0.9" filter="url(#glow)"/>
  <circle cx="350" cy="130" r="6" fill="#FBBF24" opacity="0.8" filter="url(#glow)"/>
  <circle cx="390" cy="200" r="5" fill="#F59E0B" opacity="0.75" filter="url(#glow)"/>
  <circle cx="410" cy="155" r="7" fill="#FCD34D" opacity="0.7" filter="url(#glow)"/>
  <circle cx="430" cy="190" r="5" fill="#FBBF24" opacity="0.65"/>
  <!-- 작은 별 파티클들 -->
  <polygon points="380,140 383,150 393,150 385,156 388,167 380,161 372,167 375,156 367,150 377,150" fill="#FEF3C7" opacity="0.8" filter="url(#glow)"/>
  <polygon points="420,165 422,172 429,172 424,177 426,184 420,180 414,184 416,177 411,172 418,172" fill="#FCD34D" opacity="0.7"/>
  <!-- 마법 흔적 -->
  <path d="M 200,310 Q 250,260 300,220" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>
  <!-- 자물쇠 (열리는 중) -->
  <rect x="186" y="300" width="100" height="82" rx="10" fill="#92400E" opacity="0.85"/>
  <!-- 자물쇠 고리 (열린) -->
  <path d="M 210,300 L 210,264 Q 210,238 236,238 Q 262,238 262,264 L 262,280" fill="none" stroke="#B45309" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <!-- 마법 빛이 자물쇠에 닿음 -->
  <line x1="290" y1="210" x2="250" y2="295" stroke="#FCD34D" stroke-width="2" opacity="0.4" stroke-dasharray="5,4"/>
  <!-- 열린 자물쇠 표시 (빛) -->
  <circle cx="236" cy="325" r="14" fill="#92400E" opacity="0.9"/>
  <rect x="229" y="325" width="14" height="20" rx="3" fill="#7C2D12" opacity="0.9"/>
  <!-- 마법 별빛 효과 -->
  <circle cx="256" cy="260" r="30" fill="#F59E0B" opacity="0.06" filter="url(#wandGlow)"/>
  <!-- 파티클 추가 -->
  <circle cx="290" cy="130" r="3" fill="#FCD34D" opacity="0.6" filter="url(#glow)"/>
  <circle cx="440" cy="220" r="3" fill="#FBBF24" opacity="0.5"/>
  <circle cx="160" cy="160" r="2.5" fill="#F59E0B" opacity="0.4"/>
</svg>