<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Periscope tube -->
  <rect x="420" y="180" width="80" height="220" rx="20" fill="#0277BD"/>
  <!-- Top mirror housing -->
  <rect x="380" y="170" width="160" height="60" rx="16" fill="#0277BD"/>
  <!-- Periscope eye piece -->
  <rect x="350" y="560" width="260" height="220" rx="30" fill="#0277BD" opacity="0.8"/>
  <rect x="420" y="400" width="80" height="200" rx="20" fill="#0277BD"/>
  <!-- Bottom housing -->
  <rect x="340" y="550" width="344" height="80" rx="20" fill="#0277BD"/>
  <!-- Lens circles -->
  <circle cx="512" cy="630" r="70" fill="#000A10"/>
  <circle cx="512" cy="630" r="50" fill="#4FC3F7" opacity="0.3"/>
  <circle cx="512" cy="630" r="28" fill="#4FC3F7"/>
  <!-- Top eye -->
  <circle cx="460" cy="200" r="30" fill="#000A10"/>
  <circle cx="460" cy="200" r="20" fill="#4FC3F7" opacity="0.6"/>
  <!-- Web globe reflected -->
  <circle cx="580" cy="200" r="38" fill="none" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="542" y1="200" x2="618" y2="200" stroke="#4FC3F7" stroke-width="8"/>
  <ellipse cx="580" cy="200" rx="16" ry="38" fill="none" stroke="#4FC3F7" stroke-width="8"/>
</svg>
