<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 비비드 그라데이션 배경 -->
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: 큰 중괄호 쌍 -->
  <text x="170" y="660" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="560" fill="#3F51B5" opacity="0.9">{</text>
  <text x="660" y="660" font-family="'Consolas', 'Courier New', monospace" font-weight="900" font-size="560" fill="#00BCD4" opacity="0.9">}</text>
  <!-- Layer 3: 흐르는 16진수 해시값 -->
  <text x="512" y="300" font-family="'Consolas', monospace" font-size="52" fill="#1565C0" text-anchor="middle" opacity="0.8">a3f8 b2c1</text>
  <text x="512" y="390" font-family="'Consolas', monospace" font-size="52" fill="#E91E63" text-anchor="middle" opacity="0.7">d4e7 0f9a</text>
  <text x="512" y="480" font-family="'Consolas', monospace" font-size="52" fill="#388E3C" text-anchor="middle" opacity="0.6">2b5c 8d3e</text>
  <text x="512" y="570" font-family="'Consolas', monospace" font-size="52" fill="#FF6F00" text-anchor="middle" opacity="0.5">1f4a 7c9b</text>
  <!-- 중앙 밝은 텍스트 -->
  <text x="512" y="780" font-family="'Segoe UI', sans-serif" font-weight="900" font-size="100" fill="#283593" text-anchor="middle">FORGE</text>
</svg>
