  <!-- Data flow arrows above chain -->
  <path d="M200 360 L440 440" stroke="#00BCD4" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M824 360 L584 440" stroke="#00BCD4" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <polygon points="428,428 458,434 444,462" fill="#00BCD4" opacity="0.7"/>
  <polygon points="596,428 566,434 580,462" fill="#00BCD4" opacity="0.7"/>
