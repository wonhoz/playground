    <circle cx="450" cy="380" r="12" fill="#FDE68A" opacity="0.85"/>
    <circle cx="440" cy="480" r="14" fill="#FDE68A" opacity="0.75"/>
    <circle cx="490" cy="560" r="11" fill="#D97706" opacity="0.80"/>
    <circle cx="510" cy="660" r="13" fill="#FDE68A" opacity="0.70"/>
    <circle cx="620" cy="320" r="14" fill="#FDE68A" opacity="0.80"/>
    <circle cx="640" cy="420" r="11" fill="#D97706" opacity="0.75"/>
    <circle cx="630" cy="520" r="13" fill="#FDE68A" opacity="0.70"/>
