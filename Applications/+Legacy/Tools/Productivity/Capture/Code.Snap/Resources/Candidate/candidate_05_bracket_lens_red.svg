<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer lens ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#EF5350" stroke-width="8"/>
  <circle cx="256" cy="256" r="128" fill="#1A0000" stroke="#C62828" stroke-width="4"/>
  <!-- Lens rings -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="#B71C1C" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="88" fill="url(#lens)" opacity="0.1"/>
  <!-- Code brackets as the main subject -->
  <text x="200" y="290" font-size="90" fill="#EF9A9A" font-family="Courier New" font-weight="bold" opacity="0.9">&lt;</text>
  <text x="296" y="290" font-size="90" fill="#EF9A9A" font-family="Courier New" font-weight="bold" opacity="0.9">&gt;</text>
  <!-- Slash in center -->
  <line x1="236" y1="198" x2="276" y2="318" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Shutter indicator arc -->
  <path d="M158 256 A98 98 0 0 1 354 256" fill="none" stroke="#EF5350" stroke-width="5" opacity="0.4"/>
  <!-- Snap dots at edge -->
  <circle cx="256" cy="108" r="8" fill="#EF5350"/>
  <circle cx="404" cy="256" r="8" fill="#EF5350"/>
  <circle cx="256" cy="404" r="8" fill="#EF5350"/>
  <circle cx="108" cy="256" r="8" fill="#EF5350"/>
</svg>
