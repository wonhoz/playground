<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="160" fill="url(#nebula)"/>
  <circle cx="180" cy="200" r="80" fill="url(#nebula)" opacity="0.5"/>
  <!-- 서버 코어 -->
  <circle cx="256" cy="256" r="35" fill="#3B82F6" opacity="0.15"/>
  <circle cx="256" cy="256" r="25" fill="#3B82F6" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="15" fill="#60A5FA" opacity="0.9" filter="url(#glow)"/>
  <text x="256" y="260" text-anchor="middle" fill="white" font-size="8" font-family="monospace">HTTP</text>
  <!-- 빔들 (파일 서빙) -->
  <line x1="256" y1="231" x2="256" y2="100" stroke="#3B82F6" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="278" y1="242" x2="396" y2="168" stroke="#3B82F6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="281" y1="256" x2="420" y2="256" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
  <line x1="278" y1="270" x2="396" y2="344" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="281" x2="256" y2="412" stroke="#60A5FA" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="234" y1="270" x2="116" y2="344" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  <line x1="231" y1="256" x2="92" y2="256" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
  <line x1="234" y1="242" x2="116" y2="168" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>
  <!-- 클라이언트 점들 -->
  <circle cx="256" cy="100" r="10" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="396" cy="168" r="9" fill="#60A5FA" opacity="0.7"/>
  <circle cx="420" cy="256" r="9" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="396" cy="344" r="9" fill="#60A5FA" opacity="0.7"/>
  <circle cx="256" cy="412" r="10" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="116" cy="344" r="9" fill="#60A5FA" opacity="0.7"/>
  <circle cx="92" cy="256" r="9" fill="#3B82F6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="116" cy="168" r="9" fill="#60A5FA" opacity="0.7"/>
</svg>