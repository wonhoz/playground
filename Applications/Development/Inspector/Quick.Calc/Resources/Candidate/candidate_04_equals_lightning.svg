<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a00"/>
      <stop offset="100%" stop-color="#1a1500"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffd200"/>
      <stop offset="70%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ee0979"/>
    </linearGradient>
    <linearGradient id="equalsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56CCF2"/>
      <stop offset="100%" stop-color="#8E54E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Background lightning glow -->
  <polygon points="290,60 240,240 290,240 220,460 280,220 228,220" fill="url(#lightning)" opacity="0.08" filter="url(#strongglow)"/>

  <!-- Main lightning bolt -->
  <polygon points="292,60 238,248 292,248 218,462 284,224 226,224" fill="url(#lightning)" filter="url(#glow)"/>
  <!-- Lightning highlight -->
  <polygon points="268,88 255,240 272,240 248,400 266,248 249,248" fill="#ffffff" opacity="0.25"/>

  <!-- Equals sign overlay -->
  <rect x="95" y="215" width="130" height="22" rx="11" fill="url(#equalsGrad)" filter="url(#glow)"/>
  <rect x="95" y="248" width="130" height="22" rx="11" fill="url(#equalsGrad)" filter="url(#glow)"/>
  <!-- Right side equals -->
  <rect x="285" y="215" width="130" height="22" rx="11" fill="url(#equalsGrad)" filter="url(#glow)"/>
  <rect x="285" y="248" width="130" height="22" rx="11" fill="url(#equalsGrad)" filter="url(#glow)"/>

  <!-- Number sparkles around the bolt -->
  <text x="110" y="150" font-size="32" font-family="monospace" fill="#56CCF2" opacity="0.35" filter="url(#glow)">3</text>
  <text x="370" y="150" font-size="28" font-family="monospace" fill="#8E54E9" opacity="0.35" filter="url(#glow)">7</text>
  <text x="90" y="380" font-size="24" font-family="monospace" fill="#ffd200" opacity="0.3" filter="url(#glow)">+</text>
  <text x="395" y="380" font-size="24" font-family="monospace" fill="#ee0979" opacity="0.3" filter="url(#glow)">×</text>
  <text x="130" y="440" font-size="20" font-family="monospace" fill="#56ab2f" opacity="0.25" filter="url(#glow)">9</text>
  <text x="365" y="440" font-size="20" font-family="monospace" fill="#f7971e" opacity="0.25" filter="url(#glow)">4</text>

  <!-- Electric sparks -->
  <circle cx="225" cy="230" r="6" fill="#ffd200" filter="url(#glow)"/>
  <circle cx="290" cy="250" r="5" fill="#ffd200" filter="url(#glow)"/>
  <circle cx="218" cy="330" r="4" fill="#ff9900" filter="url(#glow)"/>
  <circle cx="285" cy="310" r="4" fill="#ff9900" filter="url(#glow)"/>
  <!-- Mini spark lines -->
  <line x1="215" y1="225" x2="200" y2="210" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="215" y1="225" x2="205" y2="215" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <line x1="290" y1="248" x2="305" y2="235" stroke="#fff" stroke-width="2" opacity="0.5"/>
</svg>
