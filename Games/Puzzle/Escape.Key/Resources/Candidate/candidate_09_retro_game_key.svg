<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#1a0a00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Pixel art key (8-bit style) -->
  <!-- Key bow (circle pixels) -->
  <rect x="100" y="120" width="40" height="40" fill="#ffcc00"/>
  <rect x="140" y="100" width="40" height="40" fill="#ffcc00"/>
  <rect x="180" y="80" width="40" height="40" fill="#ffcc00"/>
  <rect x="220" y="80" width="40" height="40" fill="#ffcc00"/>
  <rect x="260" y="100" width="40" height="40" fill="#ffcc00"/>
  <rect x="280" y="140" width="40" height="40" fill="#ffcc00"/>
  <rect x="260" y="180" width="40" height="40" fill="#ffcc00"/>
  <rect x="220" y="200" width="40" height="40" fill="#ffcc00"/>
  <rect x="180" y="200" width="40" height="40" fill="#ffcc00"/>
  <rect x="140" y="180" width="40" height="40" fill="#ffcc00"/>
  <rect x="100" y="160" width="40" height="40" fill="#ffcc00"/>
  <!-- Keyhole pixel -->
  <rect x="185" y="130" width="40" height="40" fill="#000"/>
  <rect x="185" y="170" width="40" height="20" fill="#000"/>
  <!-- Key shaft pixels -->
  <rect x="290" y="160" width="40" height="40" fill="#ffcc00"/>
  <rect x="330" y="160" width="40" height="40" fill="#ffcc00"/>
  <rect x="370" y="160" width="40" height="40" fill="#ffcc00"/>
  <rect x="410" y="160" width="40" height="40" fill="#ffcc00"/>
  <!-- Key teeth pixels -->
  <rect x="350" y="200" width="40" height="30" fill="#ffcc00"/>
  <rect x="410" y="200" width="40" height="40" fill="#ffcc00"/>
  <!-- Score display -->
  <text x="256" y="320" font-family="monospace" font-size="28" text-anchor="middle" fill="#00ff00">SCORE: 000</text>
  <text x="256" y="380" font-family="monospace" font-size="22" text-anchor="middle" fill="#ffcc00">INSERT COIN</text>
  <!-- Blinking ESC -->
  <rect x="156" y="400" width="200" height="50" rx="8" fill="#ffcc00" opacity="0.2"/>
  <text x="256" y="435" font-family="monospace" font-size="28" text-anchor="middle" fill="#ffcc00" font-weight="bold">[ ESC ]</text>
</svg>
