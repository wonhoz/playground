<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#60A5FA;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 서버 소스 -->
  <rect x="80" y="196" width="100" height="120" rx="8" fill="#3B82F6" opacity="0.12" filter="url(#glow)"/>
  <rect x="80" y="196" width="100" height="120" rx="8" fill="none" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="92" y="212" width="76" height="12" rx="6" fill="#3B82F6" opacity="0.6"/>
  <rect x="92" y="230" width="76" height="12" rx="6" fill="#60A5FA" opacity="0.5"/>
  <rect x="92" y="248" width="76" height="12" rx="6" fill="#3B82F6" opacity="0.4"/>
  <rect x="92" y="266" width="76" height="12" rx="6" fill="#60A5FA" opacity="0.3"/>
  <rect x="92" y="284" width="50" height="12" rx="6" fill="#3B82F6" opacity="0.2"/>
  <text x="130" y="334" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="monospace">SERVER</text>
  <!-- 스트림 파동들 -->
  <path d="M 180 216 Q 210 190 240 216 Q 270 240 300 216 Q 330 190 360 216" fill="none" stroke="url(#stream)" stroke-width="3.5" filter="url(#glow)"/>
  <path d="M 180 256 Q 210 230 240 256 Q 270 280 300 256 Q 330 230 360 256" fill="none" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
  <path d="M 180 296 Q 210 270 240 296 Q 270 320 300 296 Q 330 270 360 296" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.6"/>
  <!-- 클라이언트들 -->
  <circle cx="390" cy="200" r="18" fill="#3B82F6" opacity="0.15"/>
  <circle cx="390" cy="200" r="12" fill="#3B82F6" opacity="0.5" filter="url(#glow)"/>
  <text x="390" y="204" text-anchor="middle" fill="white" font-size="8" font-family="monospace">C1</text>
  <circle cx="400" cy="256" r="16" fill="#60A5FA" opacity="0.2"/>
  <circle cx="400" cy="256" r="10" fill="#3B82F6" opacity="0.5" filter="url(#glow)"/>
  <text x="400" y="260" text-anchor="middle" fill="white" font-size="8" font-family="monospace">C2</text>
  <circle cx="390" cy="312" r="18" fill="#3B82F6" opacity="0.15"/>
  <circle cx="390" cy="312" r="12" fill="#60A5FA" opacity="0.4"/>
  <text x="390" y="316" text-anchor="middle" fill="white" font-size="8" font-family="monospace">C3</text>
  <!-- 연결선 -->
  <line x1="360" y1="216" x2="378" y2="208" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="360" y1="256" x2="384" y2="256" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="360" y1="296" x2="378" y2="304" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
</svg>