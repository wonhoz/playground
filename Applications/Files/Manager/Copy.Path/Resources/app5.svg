<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 하늘-민트 그라데이션 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="clip1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- Layer 2: 클립보드 메인 오브젝트 -->
  <rect x="290" y="200" width="444" height="560" rx="36" fill="url(#clip1)" stroke="#0097A7" stroke-width="18"/>
  <!-- 클립 부분 -->
  <rect x="390" y="168" width="244" height="90" rx="30" fill="#0097A7"/>
  <rect x="430" y="185" width="164" height="54" rx="18" fill="#B2EBF2"/>

  <!-- Layer 3: 경로 텍스트 라인들 -->
  <rect x="330" y="330" width="364" height="32" rx="8" fill="#00BCD4" opacity="0.3"/>
  <text x="346" y="358" font-family="Consolas,monospace" font-size="88" font-weight="bold" fill="#006064">C:\</text>
  <rect x="330" y="400" width="280" height="26" rx="6" fill="#00BCD4" opacity="0.2"/>
  <rect x="330" y="450" width="320" height="26" rx="6" fill="#00BCD4" opacity="0.2"/>
  <rect x="330" y="500" width="200" height="26" rx="6" fill="#00BCD4" opacity="0.2"/>
  <!-- 복사 완료 체크 -->
  <circle cx="694" cy="680" r="70" fill="#00E5FF"/>
  <polyline points="660,680 685,706 732,652" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
