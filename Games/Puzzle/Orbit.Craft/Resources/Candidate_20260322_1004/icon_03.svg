<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- LAYER 1: 배경 (순수 블랙 + 네온 그린 - 추상 궤도 메타포) -->
  <defs>
    <radialGradient id="bg03" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0F0A"/>
      <stop offset="100%" stop-color="#020402"/>
    </radialGradient>
    <radialGradient id="centralPlanet03" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#90EE90"/>
      <stop offset="45%" stop-color="#228B22"/>
      <stop offset="100%" stop-color="#0A2A0A"/>
    </radialGradient>
    <radialGradient id="smallPlanet03" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ADFF2F"/>
      <stop offset="60%" stop-color="#7CFC00"/>
      <stop offset="100%" stop-color="#2E5A00"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orbitGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg03)"/>

  <!-- 희미한 별 격자 -->
  <circle cx="220" cy="210" r="1.5" fill="#33FF33" opacity="0.25"/>
  <circle cx="400" cy="165" r="1.2" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="760" cy="215" r="1.8" fill="#33FF33" opacity="0.2"/>
  <circle cx="880" cy="295" r="1.5" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="155" cy="430" r="1.5" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="895" cy="690" r="1.8" fill="#33FF33" opacity="0.2"/>
  <circle cx="820" cy="835" r="1.5" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="295" cy="855" r="1.8" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="175" cy="770" r="1.2" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="455" cy="895" r="1.5" fill="#33FF33" opacity="0.2"/>
  <circle cx="610" cy="180" r="1.5" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="940" cy="460" r="1.2" fill="#FFFFFF" opacity="0.12"/>

  <!-- LAYER 2: 추상 궤도 시스템 (메타포 — 동심 타원들) -->

  <!-- 중심 행성 (메인 중력원) -->
  <circle cx="512" cy="512" r="95" fill="url(#centralPlanet03)" filter="url(#greenGlow)"/>
  <!-- 중심 행성 디테일 -->
  <ellipse cx="495" cy="490" rx="50" ry="14" fill="#ADFF2F" opacity="0.3" transform="rotate(-15,495,490)"/>
  <ellipse cx="530" cy="540" rx="35" ry="10" fill="#0A2A0A" opacity="0.5" transform="rotate(8,530,540)"/>
  <!-- 행성 중앙 밝은 점 -->
  <circle cx="490" cy="490" r="18" fill="#CCFFCC" opacity="0.25"/>

  <!-- 궤도 타원들 (3개, 크기와 기울기 다양) -->
  <!-- 궤도 1 (내부) -->
  <ellipse cx="512" cy="512" rx="155" ry="90" fill="none"
           stroke="#00FF41" stroke-width="2.5" opacity="0.7" stroke-dasharray="0"
           transform="rotate(-20,512,512)" filter="url(#orbitGlow)"/>
  <!-- 궤도 2 (중간) -->
  <ellipse cx="512" cy="512" rx="240" ry="145" fill="none"
           stroke="#7FFF00" stroke-width="2" opacity="0.5" stroke-dasharray="14 8"
           transform="rotate(15,512,512)"/>
  <!-- 궤도 3 (외부) -->
  <ellipse cx="512" cy="512" rx="330" ry="200" fill="none"
           stroke="#ADFF2F" stroke-width="1.5" opacity="0.3" stroke-dasharray="10 14"
           transform="rotate(-35,512,512)"/>

  <!-- LAYER 3: 우주선들 (각 궤도 위에 배치) -->

  <!-- 우주선 1 — 내부 궤도 위 -->
  <!-- 궤도 1: rotate(-20), rx=155, ry=90, at angle ~310deg from center -->
  <!-- 위치 계산: (512+155*cos(310°-20°)*cos20° ...) 근사: 궤도 우상단 -->
  <g transform="translate(640, 432) rotate(60)">
    <ellipse cx="0" cy="0" rx="10" ry="20" fill="#CCFFCC"/>
    <path d="M -5 12 L 0 22 L 5 12 Z" fill="#88BB88"/>
    <path d="M -5 20 Q 0 32 5 20" fill="#00FF41" opacity="0.9" filter="url(#greenGlow)"/>
    <path d="M -10 3 L -20 14 L -7 10 Z" fill="#AADDAA"/>
    <path d="M 10 3 L 20 14 L 7 10 Z" fill="#AADDAA"/>
    <circle cx="0" cy="-6" r="5" fill="#00FF41" opacity="0.8"/>
  </g>

  <!-- 우주선 2 — 중간 궤도 위 (궤도 진행 방향 표시) -->
  <!-- 궤도 2: rotate(15), rx=240, ry=145, 좌하단 근처 -->
  <g transform="translate(310, 640) rotate(200)">
    <ellipse cx="0" cy="0" rx="10" ry="20" fill="#CCFFCC"/>
    <path d="M -5 12 L 0 22 L 5 12 Z" fill="#88BB88"/>
    <path d="M -5 20 Q 0 32 5 20" fill="#7FFF00" opacity="0.85" filter="url(#greenGlow)"/>
    <path d="M -10 3 L -20 14 L -7 10 Z" fill="#AADDAA"/>
    <path d="M 10 3 L 20 14 L 7 10 Z" fill="#AADDAA"/>
    <circle cx="0" cy="-6" r="5" fill="#7FFF00" opacity="0.8"/>
  </g>

  <!-- 우주선 3 — 외부 궤도 위 (목표 우주선, 밝게) -->
  <!-- 궤도 3: rotate(-35), rx=330, ry=200, 우하단 근처 -->
  <g transform="translate(740, 690) rotate(120)" filter="url(#greenGlow)">
    <ellipse cx="0" cy="0" rx="12" ry="24" fill="#FFFFFF"/>
    <path d="M -6 15 L 0 28 L 6 15 Z" fill="#AADDAA"/>
    <path d="M -6 26 Q 0 42 6 26" fill="#ADFF2F" opacity="0.95"/>
    <path d="M -12 4 L -24 18 L -8 13 Z" fill="#CCFFCC"/>
    <path d="M 12 4 L 24 18 L 8 13 Z" fill="#CCFFCC"/>
    <circle cx="0" cy="-8" r="6" fill="#00FF41" opacity="0.9"/>
  </g>

  <!-- 궤도 방향 화살표들 -->
  <!-- 궤도 1 방향 (상단) -->
  <path d="M 505 358 L 520 350 L 516 368" fill="none" stroke="#00FF41" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- 궤도 2 방향 (하단) -->
  <path d="M 528 658 L 512 666 L 508 648" fill="none" stroke="#7FFF00" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- 중심에서 방사되는 중력선 (희미) -->
  <line x1="512" y1="512" x2="640" y2="432" stroke="#00FF41" stroke-width="1" opacity="0.1"/>
  <line x1="512" y1="512" x2="310" y2="640" stroke="#7FFF00" stroke-width="1" opacity="0.1"/>
  <line x1="512" y1="512" x2="740" y2="690" stroke="#ADFF2F" stroke-width="1" opacity="0.1"/>

  <!-- 네온 별 포인트 -->
  <g transform="translate(210, 790)" opacity="0.5">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#00FF41"/>
  </g>
  <g transform="translate(820, 210)" opacity="0.4">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#ADFF2F"/>
  </g>
</svg>
