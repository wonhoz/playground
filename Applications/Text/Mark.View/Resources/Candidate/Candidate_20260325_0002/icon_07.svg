<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AD1457"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07m)"/>
  <!-- Layer 2: 마법봉 -->
  <!-- 지팡이 막대 -->
  <rect x="440" y="300" width="30" height="480" rx="15" fill="#FFD600" transform="rotate(-30,455,540)"/>
  <!-- 별 (지팡이 끝) -->
  <polygon points="340,250 360,310 420,310 375,348 390,408 340,370 290,408 305,348 260,310 320,310" fill="#FFD600"/>
  <!-- 왼쪽: "#" 기호 -->
  <rect x="210" y="390" width="200" height="140" rx="16" fill="#880E4F" opacity="0.8"/>
  <text x="310" y="482" text-anchor="middle" font-family="Arial Black" font-size="130" font-weight="900" fill="white">#</text>
  <!-- 오른쪽: 렌더링된 Title -->
  <rect x="620" y="380" width="230" height="156" rx="16" fill="white" opacity="0.95"/>
  <text x="735" y="445" text-anchor="middle" font-family="Arial Black" font-size="80" font-weight="900" fill="#1565C0">Title</text>
  <rect x="640" y="460" width="190" height="8" rx="4" fill="#E3F2FD"/>
  <rect x="640" y="478" width="150" height="8" rx="4" fill="#E3F2FD"/>
  <rect x="640" y="496" width="170" height="8" rx="4" fill="#E3F2FD"/>
  <!-- 화살표 방향 -->
  <path d="M420,475 L620,475" fill="none" stroke="#FFD600" stroke-width="20" stroke-linecap="round"/>
  <polygon points="625,475 600,455 600,495" fill="#FFD600"/>
  <!-- Layer 3: 스파크들 -->
  <text x="500" y="300" font-size="52" text-anchor="middle">✨</text>
  <text x="580" y="340" font-size="44" text-anchor="middle">⭐</text>
  <text x="440" y="370" font-size="40" text-anchor="middle">✦</text>
</svg>