<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: Code block / pre tag with glowing fire border (forge + code) -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#060C02"/>
  <!-- Code block container -->
  <rect x="140" y="280" width="744" height="480" rx="24" fill="#0A1A06" stroke="#66BB6A" stroke-width="22"/>
  <!-- Title bar of code block -->
  <rect x="140" y="280" width="744" height="56" rx="24" fill="#0D2B0D"/>
  <rect x="140" y="308" width="744" height="28" fill="#0D2B0D"/>
  <!-- Window dots -->
  <circle cx="192" cy="308" r="12" fill="#EF5350"/>
  <circle cx="232" cy="308" r="12" fill="#FFA726"/>
  <circle cx="272" cy="308" r="12" fill="#66BB6A"/>
  <!-- Prompt / code lines -->
  <!-- Line 1: prompt symbol + content -->
  <rect x="188" y="380" width="30" height="28" rx="6" fill="#66BB6A"/>
  <rect x="230" y="380" width="300" height="28" rx="8" fill="#A5D6A7" opacity="0.8"/>
  <!-- Line 2: variable (highlighted) -->
  <rect x="188" y="430" width="30" height="28" rx="6" fill="#66BB6A" opacity="0.5"/>
  <rect x="230" y="430" width="140" height="28" rx="8" fill="#66BB6A" opacity="0.4"/>
  <rect x="380" y="430" width="180" height="28" rx="8" fill="#FFA726" opacity="0.7"/>
  <!-- Line 3 -->
  <rect x="188" y="480" width="30" height="28" rx="6" fill="#66BB6A" opacity="0.5"/>
  <rect x="230" y="480" width="260" height="28" rx="8" fill="#A5D6A7" opacity="0.6"/>
  <!-- Line 4 -->
  <rect x="188" y="530" width="30" height="28" rx="6" fill="#66BB6A" opacity="0.4"/>
  <rect x="230" y="530" width="200" height="28" rx="8" fill="#A5D6A7" opacity="0.5"/>
  <!-- Cursor blink -->
  <rect x="444" y="530" width="16" height="28" rx="3" fill="#66BB6A"/>
  <!-- Fire frame (bottom) -->
  <path d="M280 756 C260 706 280 666 300 636 C320 666 340 656 320 600 C380 640 400 700 360 756 Z" fill="#FF6D00" opacity="0.8"/>
  <path d="M512 756 C492 706 512 666 532 636 C552 666 572 656 552 600 C612 640 632 700 592 756 Z" fill="#FF6D00" opacity="0.7"/>
  <path d="M744 756 C724 706 744 666 764 636 C784 666 804 656 784 600 C844 640 864 700 824 756 Z" fill="#FF6D00" opacity="0.6"/>
</svg>
