<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Metaphor: Blueprint + compass — designing prompts precisely -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#001233"/>
  <!-- Blueprint background grid -->
  <line x1="140" y1="200" x2="884" y2="200" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="280" x2="884" y2="280" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="360" x2="884" y2="360" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="440" x2="884" y2="440" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="520" x2="884" y2="520" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="600" x2="884" y2="600" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="680" x2="884" y2="680" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="760" x2="884" y2="760" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="200" y1="140" x2="200" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="280" y1="140" x2="280" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="360" y1="140" x2="360" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="440" y1="140" x2="440" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="520" y1="140" x2="520" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="600" y1="140" x2="600" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="680" y1="140" x2="680" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <line x1="760" y1="140" x2="760" y2="884" stroke="#1565C0" stroke-width="6" opacity="0.4"/>
  <!-- Prompt outline on blueprint -->
  <rect x="240" y="260" width="440" height="420" rx="16" fill="none" stroke="#42A5F5" stroke-width="18" stroke-dasharray="24 12"/>
  <!-- Compass -->
  <circle cx="680" cy="680" r="140" fill="#001A4A" stroke="#42A5F5" stroke-width="20"/>
  <circle cx="680" cy="680" r="14" fill="#42A5F5"/>
  <!-- Compass needle -->
  <path d="M680 560 L700 680 L680 800 L660 680 Z" fill="#E53935" opacity="0.9"/>
  <path d="M560 680 L680 700 L800 680 L680 660 Z" fill="#B0BEC5"/>
  <!-- Compass cardinal -->
  <circle cx="680" cy="548" r="10" fill="#42A5F5"/>
  <circle cx="792" cy="680" r="10" fill="#42A5F5"/>
</svg>
