<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: QR generator app scene - URL in → QR out -->
  <!-- App window -->
  <rect x="132" y="200" width="760" height="560" rx="20" fill="white" opacity="0.92"/>
  <rect x="132" y="200" width="760" height="52" rx="20" fill="#0284C7"/>
  <rect x="132" y="228" width="760" height="24" fill="#0284C7"/>
  <text x="512" y="230" font-family="Arial" font-size="22" fill="white" text-anchor="middle">QR.Forge — QR Code Generator</text>
  <!-- Input section left -->
  <text x="160" y="296" font-family="Arial" font-size="30" fill="#374151" font-weight="bold">Input:</text>
  <rect x="160" y="308" width="380" height="52" rx="10" fill="#F3F4F6"/>
  <text x="180" y="342" font-family="monospace" font-size="26" fill="#374151">https://example.com/</text>
  <!-- Output type radio buttons -->
  <text x="160" y="404" font-family="Arial" font-size="28" fill="#374151">Format:</text>
  <circle cx="180" cy="436" r="12" fill="#0EA5E9"/><text x="202" y="443" font-family="Arial" font-size="26" fill="#374151">PNG</text>
  <circle cx="280" cy="436" r="12" fill="white" stroke="#9CA3AF" stroke-width="4"/><text x="302" y="443" font-family="Arial" font-size="26" fill="#374151">SVG</text>
  <circle cx="380" cy="436" r="12" fill="white" stroke="#9CA3AF" stroke-width="4"/><text x="402" y="443" font-family="Arial" font-size="26" fill="#374151">PDF</text>
  <!-- Size slider -->
  <text x="160" y="488" font-family="Arial" font-size="28" fill="#374151">Size: 400px</text>
  <rect x="160" y="500" width="380" height="16" rx="8" fill="#E5E7EB"/>
  <rect x="160" y="500" width="240" height="16" rx="8" fill="#0EA5E9"/>
  <circle cx="400" cy="508" r="16" fill="#0EA5E9"/>
  <!-- Generate button -->
  <rect x="160" y="540" width="200" height="56" rx="14" fill="#0EA5E9"/>
  <text x="260" y="578" font-family="Arial" font-size="32" fill="white" text-anchor="middle" font-weight="bold">Generate</text>
  <!-- Output QR code right panel -->
  <rect x="600" y="268" width="272" height="272" rx="16" fill="white" stroke="#E5E7EB" stroke-width="6"/>
  <!-- QR corners -->
  <rect x="620" y="288" width="72" height="72" rx="8" fill="#1F2937"/>
  <rect x="632" y="300" width="48" height="48" rx="4" fill="white"/>
  <rect x="641" y="309" width="30" height="30" fill="#1F2937"/>
  <rect x="760" y="288" width="72" height="72" rx="8" fill="#1F2937"/>
  <rect x="772" y="300" width="48" height="48" rx="4" fill="white"/>
  <rect x="781" y="309" width="30" height="30" fill="#1F2937"/>
  <rect x="620" y="428" width="72" height="72" rx="8" fill="#1F2937"/>
  <rect x="632" y="440" width="48" height="48" rx="4" fill="white"/>
  <rect x="641" y="449" width="30" height="30" fill="#1F2937"/>
  <!-- QR data cells -->
  <rect x="712" y="288" width="18" height="18" fill="#1F2937"/>
  <rect x="712" y="316" width="18" height="18" fill="#1F2937"/>
  <rect x="712" y="344" width="18" height="18" fill="#1F2937"/>
  <rect x="712" y="428" width="18" height="18" fill="#1F2937"/>
  <rect x="712" y="456" width="18" height="18" fill="#1F2937"/>
  <!-- Layer 3: Arrow from button to QR -->
  <path d="M 362 568 Q 480 568 600 404" stroke="#0EA5E9" stroke-width="10" stroke-dasharray="16,8" fill="none" opacity="0.6"/>
</svg>
