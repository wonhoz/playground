<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <clipPath id="lens-clip">
      <circle cx="430" cy="420" r="280"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg04)" rx="120"/>

  <!-- Layer 2: Magnifying glass -->
  <!-- Lens outer ring -->
  <circle cx="430" cy="420" r="310" fill="white" opacity="0.25"/>
  <circle cx="430" cy="420" r="280" fill="white" opacity="0.95"/>
  <circle cx="430" cy="420" r="280" fill="none" stroke="white" stroke-width="60"/>

  <!-- Layer 3: Graph inside lens (blue line chart) -->
  <g clip-path="url(#lens-clip)">
    <!-- Grid lines inside lens -->
    <line x1="200" y1="350" x2="660" y2="350" stroke="#4A90D9" stroke-width="6" opacity="0.3"/>
    <line x1="200" y1="430" x2="660" y2="430" stroke="#4A90D9" stroke-width="6" opacity="0.3"/>
    <line x1="200" y1="510" x2="660" y2="510" stroke="#4A90D9" stroke-width="6" opacity="0.3"/>

    <!-- Bar chart inside lens -->
    <rect x="260" y="440" width="50" height="110" fill="#4A90D9" rx="6" opacity="0.9"/>
    <rect x="330" y="370" width="50" height="180" fill="#2563EB" rx="6" opacity="0.9"/>
    <rect x="400" y="310" width="50" height="240" fill="#4A90D9" rx="6" opacity="0.9"/>
    <rect x="470" y="390" width="50" height="160" fill="#2563EB" rx="6" opacity="0.9"/>
    <rect x="540" y="340" width="50" height="210" fill="#4A90D9" rx="6" opacity="0.9"/>

    <!-- Trend line -->
    <polyline points="285,490 355,420 425,340 495,400 565,355"
      fill="none" stroke="#FF6B35" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Trend dots -->
    <circle cx="285" cy="490" r="14" fill="#FF6B35"/>
    <circle cx="425" cy="340" r="14" fill="#FF6B35"/>
    <circle cx="565" cy="355" r="14" fill="#FF6B35"/>
  </g>

  <!-- Handle (bottom-right) -->
  <line x1="660" y1="660" x2="830" y2="840"
    stroke="white" stroke-width="72" stroke-linecap="round"/>
  <line x1="660" y1="660" x2="830" y2="840"
    stroke="#FF8C42" stroke-width="44" stroke-linecap="round"/>
</svg>
