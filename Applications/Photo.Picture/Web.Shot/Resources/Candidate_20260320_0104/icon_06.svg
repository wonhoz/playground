<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Gun/camera hybrid body -->
  <rect x="200" y="430" width="440" height="100" rx="22" fill="#0277BD"/>
  <!-- Handle grip -->
  <rect x="340" y="530" width="100" height="180" rx="22" fill="#0277BD"/>
  <!-- Barrel extension -->
  <rect x="640" y="448" width="160" height="64" rx="16" fill="#0277BD" opacity="0.7"/>
  <!-- Trigger -->
  <path d="M400 530 Q380 580 400 610" fill="none" stroke="#4FC3F7" stroke-width="16" stroke-linecap="round"/>
  <!-- Screen target -->
  <rect x="650" y="300" width="200" height="150" rx="14" fill="none" stroke="#4FC3F7" stroke-width="14"/>
  <!-- Crosshair on screen -->
  <line x1="750" y1="310" x2="750" y2="440" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="660" y1="375" x2="840" y2="375" stroke="#4FC3F7" stroke-width="10"/>
  <circle cx="750" cy="375" r="28" fill="none" stroke="#4FC3F7" stroke-width="10"/>
  <!-- Laser line -->
  <line x1="640" y1="480" x2="840" y2="375" stroke="#4FC3F7" stroke-width="6" stroke-dasharray="14,10" opacity="0.8"/>
  <!-- Camera lens on gun -->
  <circle cx="520" cy="480" r="42" fill="#000A10"/>
  <circle cx="520" cy="480" r="28" fill="#4FC3F7" opacity="0.4"/>
  <circle cx="520" cy="480" r="14" fill="#4FC3F7"/>
</svg>
