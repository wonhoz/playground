    <circle cx="270" cy="490" r="26" fill="#4ADE80"/>
    <rect x="320" y="464" width="420" height="52" rx="14" fill="#4ADE80" opacity="0.85"/>
    <rect x="332" y="476" width="240" height="28" rx="8" fill="rgba(255,255,255,0.25)"/>

