<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="scope14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (sky) -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg14)"/>
  <!-- Clouds -->
  <ellipse cx="250" cy="220" rx="120" ry="60" fill="white" opacity="0.7"/>
  <ellipse cx="350" cy="200" rx="100" ry="50" fill="white" opacity="0.6"/>
  <ellipse cx="750" cy="260" rx="130" ry="55" fill="white" opacity="0.5"/>
  <!-- Layer 2: Telescope pointing at distant image -->
  <!-- Telescope body -->
  <rect x="280" y="540" width="460" height="80" rx="20" fill="url(#scope14)"/>
  <!-- Telescope eyepiece end -->
  <rect x="700" y="550" width="100" height="60" rx="16" fill="#1976D2"/>
  <!-- Telescope objective (lens end) -->
  <ellipse cx="295" cy="580" rx="50" ry="50" fill="#42A5F5" stroke="#1565C0" stroke-width="10"/>
  <!-- Tripod leg left -->
  <line x1="380" y1="620" x2="260" y2="820" stroke="#1565C0" stroke-width="20" stroke-linecap="round"/>
  <!-- Tripod leg right -->
  <line x1="580" y1="620" x2="700" y2="820" stroke="#1565C0" stroke-width="20" stroke-linecap="round"/>
  <!-- Tripod center support -->
  <line x1="480" y1="620" x2="480" y2="820" stroke="#1565C0" stroke-width="18" stroke-linecap="round"/>
  <!-- View through scope: distant blurry image being zoomed in -->
  <!-- Distant blurry "subject" (left far away) -->
  <rect x="150" y="300" width="120" height="100" rx="8" fill="#90CAF9" opacity="0.7"/>
  <!-- What eye sees (sharp, zoomed in) — at right eyepiece -->
  <circle cx="750" cy="490" r="90" fill="#1565C0" opacity="0.9"/>
  <clipPath id="eye14">
    <circle cx="750" cy="490" r="80"/>
  </clipPath>
  <g clip-path="url(#eye14)">
    <rect x="670" y="410" width="160" height="160" fill="#E3F2FD"/>
    <rect x="670" y="410" width="80" height="80" fill="#42A5F5"/>
    <rect x="750" y="410" width="80" height="80" fill="#1976D2"/>
    <rect x="670" y="490" width="80" height="80" fill="#1976D2"/>
    <rect x="750" y="490" width="80" height="80" fill="#1565C0"/>
  </g>
  <!-- Layer 3: Sight line from telescope to subject -->
  <line x1="295" y1="555" x2="155" y2="330" stroke="#42A5F5" stroke-width="5" stroke-dasharray="16 8" opacity="0.6"/>
  <!-- x4 label -->
  <rect x="590" y="380" width="150" height="90" rx="16" fill="#1565C0"/>
  <text x="612" y="452" font-family="'Segoe UI',Arial,sans-serif" font-size="88" font-weight="900" fill="white">×4</text>
</svg>
