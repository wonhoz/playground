<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 좌측: 파일 카드들 (무질서하게) -->
    <!-- JPG 파일 -->
    <rect x="70" y="160" width="160" height="180" rx="16" fill="#1E88E5"/>
    <text x="150" y="248" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">JPG</text>
    <rect x="82" y="264" width="136" height="10" rx="4" fill="#90CAF9" opacity="0.7"/>
    <rect x="82" y="282" width="100" height="10" rx="4" fill="#90CAF9" opacity="0.5"/>

    <!-- MP4 파일 -->
    <rect x="100" y="370" width="160" height="180" rx="16" fill="#E91E63"/>
    <text x="180" y="458" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">MP4</text>
    <rect x="112" y="474" width="136" height="10" rx="4" fill="#F48FB1" opacity="0.7"/>
    <rect x="112" y="492" width="100" height="10" rx="4" fill="#F48FB1" opacity="0.5"/>

    <!-- HEIC 파일 -->
    <rect x="60" y="580" width="160" height="180" rx="16" fill="#FF8F00"/>
    <text x="140" y="664" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">HEIC</text>
    <rect x="72" y="680" width="136" height="10" rx="4" fill="#FFD54F" opacity="0.7"/>
    <rect x="72" y="698" width="100" height="10" rx="4" fill="#FFD54F" opacity="0.5"/>

    <!-- 대형 화살표 -->
    <path d="M 260 512 L 420 512" stroke="url(#arrow)" stroke-width="24" stroke-linecap="round"/>
    <polygon points="460,512 420,490 420,534" fill="#00BCD4"/>

    <!-- 우측: 날짜 폴더들 (정돈된) -->
    <!-- 2024/01 폴더 -->
    <rect x="480" y="140" width="460" height="100" rx="20" fill="#0277BD"/>
    <text x="600" y="176" font-family="'Segoe UI',Arial,sans-serif" font-size="30" fill="#90CAF9">📁</text>
    <text x="660" y="203" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF">2024/01</text>

    <!-- 2024/02 폴더 -->
    <rect x="480" y="264" width="460" height="100" rx="20" fill="#0288D1"/>
    <text x="660" y="327" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF">2024/02</text>

    <!-- 2024/03 폴더 -->
    <rect x="480" y="388" width="460" height="100" rx="20" fill="#0277BD"/>
    <text x="660" y="451" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF">2024/03</text>

    <!-- 2024/12 폴더 -->
    <rect x="480" y="512" width="460" height="100" rx="20" fill="#01579B"/>
    <text x="660" y="575" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF">2024/12</text>

    <!-- 작은 파일 아이콘들 (폴더 안) -->
    <rect x="860" y="152" width="60" height="72" rx="8" fill="#42A5F5" opacity="0.8"/>
    <rect x="860" y="276" width="60" height="72" rx="8" fill="#E91E63" opacity="0.8"/>
    <rect x="860" y="400" width="60" height="72" rx="8" fill="#FF8F00" opacity="0.8"/>
    <rect x="860" y="524" width="60" height="72" rx="8" fill="#42A5F5" opacity="0.8"/>

    <!-- 타이틀 -->
    <rect x="180" y="840" width="664" height="70" rx="24" fill="#01579B"/>
    <text x="512" y="887" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" text-anchor="middle">PHOTO·VIDEO ORGANIZER</text>
  </g>
</svg>
