<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0A0018"/>
  <!-- Layer 2: 도형들 (원/삼각/별) 위로 날아오름 -->
  <!-- 원 -->
  <circle cx="200" cy="700" r="100" fill="#3D0040" stroke="#FF00FF" stroke-width="16"/>
  <!-- 삼각형 -->
  <polygon points="512,600 612,800 412,800" fill="#3D3000" stroke="#FFD700" stroke-width="16"/>
  <!-- 별 -->
  <polygon points="820,650 848,730 932,730 868,778 892,860 820,810 748,860 772,778 708,730 792,730" fill="#003D00" stroke="#00FF88" stroke-width="12"/>
  <!-- Layer 3: 슬라이스 궤적 (칼질 경로) -->
  <path d="M100 900 Q300 400 512 200 Q720 400 900 700" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- 파티클 이펙트 -->
  <circle cx="512" cy="200" r="8" fill="#FFFFFF"/>
  <circle cx="400" cy="340" r="6" fill="#FF00FF"/>
  <circle cx="620" cy="360" r="5" fill="#00FFFF"/>
  <circle cx="250" cy="520" r="7" fill="#FFD700"/>
  <circle cx="750" cy="500" r="6" fill="#00FF88"/>
</svg>
