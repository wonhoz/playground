<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Circuit switch ON/OFF toggle -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#050A00"/>
  <!-- Left wire -->
  <line x1="160" y1="512" x2="340" y2="512" stroke="#558B2F" stroke-width="24" stroke-linecap="round"/>
  <!-- Switch body (pill track) -->
  <rect x="300" y="440" width="424" height="144" rx="72" fill="#1B5E20"/>
  <!-- Switch track highlight (ON = right side lit) -->
  <rect x="500" y="455" width="200" height="114" rx="57" fill="#33691E"/>
  <!-- Thumb (circle) - ON position (right) -->
  <circle cx="654" cy="512" r="60" fill="#558B2F"/>
  <circle cx="654" cy="512" r="44" fill="#76FF03"/>
  <!-- Signal flow active (right side glowing) -->
  <circle cx="654" cy="512" r="72" fill="none" stroke="#76FF03" stroke-width="8" opacity="0.3"/>
  <!-- Right wire -->
  <line x1="724" y1="512" x2="864" y2="512" stroke="#76FF03" stroke-width="24" stroke-linecap="round"/>
  <!-- Signal pulses on active wire -->
  <circle cx="780" cy="512" r="14" fill="#76FF03" opacity="0.8"/>
  <circle cx="830" cy="512" r="10" fill="#76FF03" opacity="0.5"/>
  <!-- Left wire signal faint -->
  <circle cx="240" cy="512" r="12" fill="#33691E" opacity="0.6"/>
  <!-- ON indicator -->
  <circle cx="580" cy="490" r="10" fill="#76FF03" opacity="0.5"/>
  <!-- Contact points -->
  <circle cx="340" cy="512" r="20" fill="#33691E"/>
  <circle cx="724" cy="512" r="20" fill="#558B2F"/>
</svg>
