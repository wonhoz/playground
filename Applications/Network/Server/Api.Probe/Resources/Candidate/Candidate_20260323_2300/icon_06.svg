    <rect x="468" y="820" width="88" height="52" rx="14" fill="#0E7490"/>
    <line x1="512" y1="520" x2="512" y2="820" stroke="#0E7490" stroke-width="28" stroke-linecap="round"/>
    <!-- Layer 3: 신호 점 (중심) -->
    <circle cx="512" cy="520" r="36" fill="#22D3EE"/>
    <circle cx="512" cy="520" r="18" fill="#FFFFFF"/>
    <!-- 방사선 수직/수평 보조선 -->
    <line x1="512" y1="200" x2="512" y2="240" stroke="#FFFFFF" stroke-width="8" opacity="0.3"/>
    <line x1="200" y1="520" x2="240" y2="520" stroke="#FFFFFF" stroke-width="8" opacity="0.3"/>
    <line x1="784" y1="520" x2="824" y2="520" stroke="#FFFFFF" stroke-width="8" opacity="0.3"/>
  </g>
