  <rect x="180" y="380" width="680" height="60" rx="28" fill="#004D5B"/>
  <rect x="180" y="416" width="680" height="24" fill="#004D5B"/>
  <circle cx="220" cy="410" r="12" fill="#FF5252"/>
  <circle cx="252" cy="410" r="12" fill="#FFD93D"/>
  <circle cx="284" cy="410" r="12" fill="#4CAF50"/>
  <!-- 큰 프롬프트 -->
