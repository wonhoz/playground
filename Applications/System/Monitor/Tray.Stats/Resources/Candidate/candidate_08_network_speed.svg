<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <linearGradient id="up_arrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff8888"/>
    </linearGradient>
    <linearGradient id="down_arrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#88bbff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network activity graph -->
  <rect x="70" y="100" width="372" height="200" rx="12" fill="#0d0d1a" stroke="#1a1a30" stroke-width="2"/>
  <!-- Up traffic (red) -->
  <polyline points="70,240 110,235 140,230 170,200 200,220 230,190 260,210 290,180 320,195 350,175 380,190 410,180 442,185" fill="none" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Down traffic (blue) -->
  <polyline points="70,260 110,255 140,270 170,240 200,260 230,230 260,250 290,220 320,240 350,210 380,230 410,215 442,220" fill="none" stroke="#4488ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Legend in graph -->
  <line x1="84" y1="120" x2="104" y2="120" stroke="#ff4444" stroke-width="3"/>
  <text x="110" y="125" font-size="15" fill="#ff4444" font-family="monospace">Upload</text>
  <line x1="84" y1="138" x2="104" y2="138" stroke="#4488ff" stroke-width="3"/>
  <text x="110" y="143" font-size="15" fill="#4488ff" font-family="monospace">Download</text>
  <!-- Speed display cards -->
  <rect x="70" y="325" width="172" height="90" rx="12" fill="#0d0d1a" stroke="#331122" stroke-width="2"/>
  <polygon points="110,345 140,345 125,325" fill="url(#up_arrow)"/>
  <text x="156" y="365" font-size="28" fill="#ff4444" font-family="monospace" text-anchor="middle" font-weight="bold">1.2</text>
  <text x="156" y="390" font-size="18" fill="#ff8888" font-family="monospace" text-anchor="middle">MB/s UP</text>
  <rect x="270" y="325" width="172" height="90" rx="12" fill="#0d0d1a" stroke="#112233" stroke-width="2"/>
  <polygon points="396,365 366,365 381,385" fill="url(#down_arrow)"/>
  <text x="336" y="365" font-size="28" fill="#4488ff" font-family="monospace" text-anchor="middle" font-weight="bold">8.4</text>
  <text x="336" y="390" font-size="18" fill="#88bbff" font-family="monospace" text-anchor="middle">MB/s DN</text>
  <!-- IP / Connection info -->
  <rect x="70" y="430" width="372" height="50" rx="10" fill="#0d0d1a" stroke="#1a1a30" stroke-width="1"/>
  <text x="90" y="455" font-size="14" fill="#4488ff" font-family="monospace">192.168.1.5</text>
  <text x="90" y="472" font-size="12" fill="#446688" font-family="monospace">Ethernet  1000Mbps</text>
  <text x="340" y="455" font-size="14" fill="#44ff88" font-family="monospace">Ping:4ms</text>
  <text x="340" y="472" font-size="12" fill="#446688" font-family="monospace">Connected</text>
</svg>