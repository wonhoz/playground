<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_04: metaphor | 저울 — 폴더 크기를 측정하는 은유 | 중앙 심볼 | 노랑+파랑+초록 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#F57F17" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>

  <!-- Layer 2: Scale (balance) -->
  <!-- Base / Pedestal -->
  <rect x="420" y="840" width="184" height="60" rx="18" fill="#546E7A" filter="url(#sh4)"/>
  <rect x="360" y="884" width="304" height="40" rx="12" fill="#455A64"/>
  <!-- Vertical pole -->
  <rect x="494" y="280" width="36" height="580" rx="18" fill="#546E7A" filter="url(#sh4)"/>
  <!-- Fulcrum triangle -->
  <polygon points="512,280 470,330 554,330" fill="#546E7A"/>
  <!-- Horizontal beam (tilted - left side heavier = more files) -->
  <rect x="160" y="295" width="704" height="30" rx="15" fill="#78909C" filter="url(#sh4)"
        transform="rotate(-8, 512, 310)"/>
  <!-- Chain left -->
  <line x1="246" y1="290" x2="246" y2="420" stroke="#90A4AE" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="20,10" transform="rotate(-8, 512, 310)"/>
  <!-- Chain right -->
  <line x1="778" y1="330" x2="778" y2="440" stroke="#90A4AE" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="20,10" transform="rotate(-8, 512, 310)"/>

  <!-- Left pan (heavy - lots of files) -->
  <ellipse cx="220" cy="490" rx="140" ry="36" fill="#1565C0" filter="url(#sh4)"
           transform="rotate(-4, 220, 490)"/>
  <!-- Stacked folders on left pan -->
  <g transform="rotate(-4, 220, 490)">
    <rect x="110" y="380" width="220" height="60" rx="10" fill="#FF7043"/>
    <rect x="120" y="330" width="200" height="60" rx="10" fill="#FF8A65"/>
    <rect x="130" y="280" width="180" height="60" rx="10" fill="#FFAB91"/>
    <text x="220" y="460" font-family="Arial Black, sans-serif" font-size="30" fill="white"
          text-anchor="middle">86 GB</text>
  </g>

  <!-- Right pan (lighter) -->
  <ellipse cx="800" cy="470" rx="120" ry="32" fill="#43A047" filter="url(#sh4)"
           transform="rotate(-4, 800, 470)"/>
  <!-- One folder on right -->
  <g transform="rotate(-4, 800, 470)">
    <rect x="720" y="385" width="160" height="56" rx="10" fill="#66BB6A"/>
    <text x="800" y="445" font-family="Arial Black, sans-serif" font-size="28" fill="white"
          text-anchor="middle">15 GB</text>
  </g>

  <!-- Layer 3: Scale indicator + title -->
  <text x="512" y="140" font-family="Arial Black, sans-serif" font-size="80" font-weight="900"
        fill="#F57F17" text-anchor="middle" filter="url(#sh4)">DISK</text>
  <text x="512" y="220" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="#E65100" text-anchor="middle" filter="url(#sh4)">LENS</text>
</svg>
