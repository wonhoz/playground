<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A0D"/>
  <!-- Zipper merging two sides -->
  <!-- Left side teeth -->
  <rect x="180" y="220" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="180" y="320" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="180" y="420" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="180" y="520" width="100" height="60" rx="10" fill="#006064"/>
  <!-- Right side teeth -->
  <rect x="744" y="260" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="744" y="360" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="744" y="460" width="100" height="60" rx="10" fill="#006064"/>
  <rect x="744" y="560" width="100" height="60" rx="10" fill="#006064"/>
  <!-- Left tape -->
  <line x1="230" y1="200" x2="230" y2="620" stroke="#00BCD4" stroke-width="16"/>
  <!-- Right tape -->
  <line x1="794" y1="240" x2="794" y2="640" stroke="#00BCD4" stroke-width="16"/>
  <!-- Interlocked teeth (merged zone) -->
  <rect x="300" y="600" width="100" height="60" rx="10" fill="#00BCD4"/>
  <rect x="624" y="600" width="100" height="60" rx="10" fill="#00BCD4"/>
  <rect x="380" y="660" width="100" height="60" rx="10" fill="#00BCD4"/>
  <rect x="544" y="660" width="100" height="60" rx="10" fill="#00BCD4"/>
  <rect x="462" y="700" width="100" height="60" rx="10" fill="#00BCD4"/>
  <!-- Zipper puller -->
  <ellipse cx="512" cy="580" rx="60" ry="40" fill="#006064"/>
  <circle cx="512" cy="580" r="22" fill="#00BCD4"/>
  <!-- Center merged track -->
  <line x1="512" y1="620" x2="512" y2="840" stroke="#00BCD4" stroke-width="20"/>
</svg>