<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg01" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </radialGradient>
    <radialGradient id="iris01" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="60%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <radialGradient id="glow01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg01)"/>
  <!-- 눈 흰자 -->
  <ellipse cx="512" cy="420" rx="310" ry="190" fill="white"/>
  <!-- 위 눈꺼풀 fill -->
  <path d="M202 420 Q360 230 512 218 Q664 230 822 420 Z" fill="#DBEAFE"/>
  <!-- 홍채 (클리핑 없이 자연스럽게) -->
