<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050520"/>
      <stop offset="100%" stop-color="#0A0A35"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88FFEE"/>
      <stop offset="50%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#AA44FF"/>
    </linearGradient>
    <linearGradient id="engine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF44FF"/>
      <stop offset="100%" stop-color="#4400FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Nebula background -->
  <ellipse cx="150" cy="200" rx="120" ry="80" fill="#220044" opacity="0.5"/>
  <ellipse cx="380" cy="300" rx="100" ry="70" fill="#002244" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="70" cy="90" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="180" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="400" cy="70" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="450" cy="140" r="1" fill="white" opacity="0.6"/>
  <circle cx="320" cy="90" r="2" fill="white" opacity="0.9"/>
  <circle cx="100" cy="300" r="1.5" fill="white" opacity="0.7"/>
  <!-- Crystal ship -->
  <polygon points="256,90 290,210 256,190 222,210" fill="url(#crystal)" opacity="0.95"/>
  <polygon points="256,90 275,180 256,165 237,180" fill="#CCFFFF" opacity="0.6"/>
  <!-- Wings crystal -->
  <polygon points="222,190 160,260 190,270 222,220" fill="url(#crystal)" opacity="0.8"/>
  <polygon points="290,190 352,260 322,270 290,220" fill="url(#crystal)" opacity="0.8"/>
  <!-- Engine glow -->
  <ellipse cx="256" cy="220" rx="20" ry="35" fill="url(#engine)" opacity="0.8"/>
  <ellipse cx="256" cy="240" rx="10" ry="20" fill="#FFFFFF" opacity="0.5"/>
  <!-- Crystal obstacles -->
  <polygon points="90,150 115,110 140,150 115,180" fill="#FF4488" opacity="0.9"/>
  <polygon points="100,158 115,128 130,158 115,172" fill="#FF88BB" opacity="0.7"/>
  <polygon points="370,130 400,90 430,130 400,165" fill="#FF8844" opacity="0.9"/>
  <polygon points="382,138 400,108 418,138 400,155" fill="#FFBB88" opacity="0.7"/>
  <!-- Energy trail -->
  <line x1="236" y1="220" x2="200" y2="350" stroke="#AA44FF" stroke-width="2" opacity="0.4"/>
  <line x1="276" y1="220" x2="312" y2="350" stroke="#AA44FF" stroke-width="2" opacity="0.4"/>
  <text x="256" y="450" font-family="Arial" font-size="26" font-weight="bold" fill="#88FFEE" text-anchor="middle">DODGE·CRAFT</text>
</svg>
