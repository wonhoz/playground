<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3443"/>
      <stop offset="100%" stop-color="#34e89e" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34e89e"/>
      <stop offset="100%" stop-color="#0f3443"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43c6ac"/>
      <stop offset="100%" stop-color="#191654"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Flow chart -->
  <!-- Start oval -->
  <ellipse cx="256" cy="90" rx="80" ry="32" fill="url(#box1)" rx="32"/>
  <text x="256" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f3443" text-anchor="middle">START</text>
  <!-- Arrow down -->
  <line x1="256" y1="122" x2="256" y2="154" stroke="#34e89e" stroke-width="3"/>
  <polygon points="248,148 256,166 264,148" fill="#34e89e"/>
  <!-- Process box 1 -->
  <rect x="176" y="166" width="160" height="44" rx="8" fill="url(#box2)"/>
  <text x="256" y="191" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle">Load Data</text>
  <!-- Arrow down -->
  <line x1="256" y1="210" x2="256" y2="240" stroke="#43c6ac" stroke-width="3"/>
  <polygon points="248,234 256,252 264,234" fill="#43c6ac"/>
  <!-- Decision diamond -->
  <polygon points="256,252 336,290 256,328 176,290" fill="none" stroke="#f7971e" stroke-width="3"/>
  <polygon points="256,258 328,290 256,322 184,290" fill="#2a1a00" opacity="0.6"/>
  <text x="256" y="286" font-family="Arial, sans-serif" font-size="12" fill="#f7971e" text-anchor="middle">Valid?</text>
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="11" fill="#f7971e" text-anchor="middle">Check</text>
  <!-- Yes arrow right -->
  <line x1="336" y1="290" x2="396" y2="290" stroke="#34e89e" stroke-width="3"/>
  <polygon points="390,282 408,290 390,298" fill="#34e89e"/>
  <text x="360" y="282" font-family="Arial, sans-serif" font-size="11" fill="#34e89e">Yes</text>
  <!-- Process right -->
  <rect x="408" y="266" width="64" height="48" rx="8" fill="url(#box2)"/>
  <text x="440" y="286" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Map</text>
  <text x="440" y="300" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Build</text>
  <!-- No arrow down -->
  <line x1="256" y1="328" x2="256" y2="358" stroke="#ff5252" stroke-width="3"/>
  <polygon points="248,352 256,370 264,352" fill="#ff5252"/>
  <text x="272" y="348" font-family="Arial, sans-serif" font-size="11" fill="#ff5252">No</text>
  <!-- Error box -->
  <rect x="186" y="370" width="140" height="40" rx="8" fill="#440000" stroke="#ff5252" stroke-width="2"/>
  <text x="256" y="394" font-family="Arial, sans-serif" font-size="12" fill="#ff5252" text-anchor="middle">Error Handler</text>
  <!-- End oval (right path) -->
  <line x1="440" y1="314" x2="440" y2="396" stroke="#34e89e" stroke-width="3"/>
  <ellipse cx="440" cy="420" rx="60" ry="26" fill="url(#box1)"/>
  <text x="440" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f3443" text-anchor="middle">RENDER</text>
  <!-- Title -->
  <text x="256" y="478" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#34e89e" text-anchor="middle" letter-spacing="2">DATA MAP</text>
</svg>
