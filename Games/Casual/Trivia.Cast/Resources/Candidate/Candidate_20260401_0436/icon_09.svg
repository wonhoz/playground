<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2D4E"/>
      <stop offset="100%" stop-color="#162244"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Scoreboard panel -->
  <rect x="120" y="160" width="784" height="640" rx="24" fill="url(#board)" stroke="#1976D2" stroke-width="6"/>
  <!-- Header bar -->
  <rect x="120" y="160" width="784" height="90" rx="24" fill="#FFD700"/>
  <!-- Header text -->
  <text x="512" y="207" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Segoe UI,Arial" font-weight="bold" fill="#0D47A1">TOP SCORES</text>
  <!-- Column headers -->
  <text x="192" y="300" dominant-baseline="middle" font-size="46" font-family="Segoe UI,Arial" fill="#90CAF9" font-weight="bold">RANK</text>
  <text x="360" y="300" dominant-baseline="middle" font-size="46" font-family="Segoe UI,Arial" fill="#90CAF9" font-weight="bold">NAME</text>
  <text x="760" y="300" text-anchor="end" dominant-baseline="middle" font-size="46" font-family="Segoe UI,Arial" fill="#90CAF9" font-weight="bold">PTS</text>
  <line x1="148" y1="322" x2="876" y2="322" stroke="#1976D2" stroke-width="4"/>
  <!-- Row 1 — gold (1st) -->
  <rect x="136" y="332" width="752" height="72" rx="10" fill="#FF8F00" opacity="0.25"/>
  <text x="192" y="369" dominant-baseline="middle" font-size="60" font-family="Segoe UI Emoji,Arial" fill="#FFD700">🥇</text>
  <text x="320" y="369" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#FFD700">Player 1</text>
  <text x="760" y="369" text-anchor="end" dominant-baseline="middle" font-size="60" font-family="Consolas,monospace" fill="#FFD700" font-weight="bold">1500</text>
  <!-- Row 2 — silver -->
  <text x="192" y="441" dominant-baseline="middle" font-size="60" font-family="Segoe UI Emoji,Arial" fill="#B0BEC5">🥈</text>
  <text x="320" y="441" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#E3F2FD">Player 2</text>
  <text x="760" y="441" text-anchor="end" dominant-baseline="middle" font-size="60" font-family="Consolas,monospace" fill="#E3F2FD">1200</text>
  <!-- Row 3 — bronze -->
  <text x="192" y="513" dominant-baseline="middle" font-size="60" font-family="Segoe UI Emoji,Arial" fill="#FF8A65">🥉</text>
  <text x="320" y="513" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#BBDEFB">Player 3</text>
  <text x="760" y="513" text-anchor="end" dominant-baseline="middle" font-size="60" font-family="Consolas,monospace" fill="#BBDEFB">980</text>
  <!-- Row 4 -->
  <text x="200" y="582" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#64B5F6">4</text>
  <text x="320" y="582" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#90CAF9" opacity="0.7">Player 4</text>
  <text x="760" y="582" text-anchor="end" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#90CAF9" opacity="0.7">750</text>
  <!-- Row 5 (faded) -->
  <text x="200" y="648" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#42A5F5" opacity="0.5">5</text>
  <text x="320" y="648" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#64B5F6" opacity="0.5">Player 5</text>
  <text x="760" y="648" text-anchor="end" dominant-baseline="middle" font-size="54" font-family="Consolas,monospace" fill="#64B5F6" opacity="0.5">600</text>
  <!-- Layer 3: Star decoration + TRIVIA label -->
  <text x="512" y="870" text-anchor="middle" dominant-baseline="middle" font-size="74" font-family="Segoe UI,Arial" font-weight="bold" fill="white" opacity="0.7">★ TRIVIA CAST ★</text>
</svg>
