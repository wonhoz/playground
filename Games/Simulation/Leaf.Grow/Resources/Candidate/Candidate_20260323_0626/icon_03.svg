<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf.Grow | 이끼 돌 — 돌 위에 식물이 자라는 | 공간/장면 | #0A1410 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#0A1410"/>
  <!-- Layer 2: Mossy rock scene -->
  <!-- Ground/soil -->
  <ellipse cx="512" cy="850" rx="340" ry="50" fill="#1A1000"/>
  <!-- Rock (large, central) -->
  <ellipse cx="512" cy="700" rx="260" ry="160" fill="#374151"/>
  <!-- Rock detail / cracks -->
  <path d="M400 660 Q430 700 420 740" fill="none" stroke="#1F2937" stroke-width="4"/>
  <path d="M580 620 Q560 660 580 700" fill="none" stroke="#1F2937" stroke-width="3"/>
  <path d="M460 620 Q490 650 480 680" fill="none" stroke="#4B5563" stroke-width="2"/>
  <!-- Moss growing on rock surface (green patches) -->
  <ellipse cx="390" cy="590" rx="80" ry="40" fill="#15803D" opacity="0.8"/>
  <ellipse cx="440" cy="574" rx="60" ry="30" fill="#16A34A" opacity="0.7"/>
  <ellipse cx="560" cy="570" rx="70" ry="36" fill="#15803D" opacity="0.8"/>
  <ellipse cx="620" cy="582" rx="55" ry="28" fill="#22C55E" opacity="0.6"/>
  <ellipse cx="512" cy="556" rx="90" ry="44" fill="#16A34A" opacity="0.75"/>
  <!-- Small plants sprouting from moss -->
  <line x1="400" y1="574" x2="380" y2="520" stroke="#4ADE80" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="372" cy="512" rx="18" ry="11" fill="#22C55E" transform="rotate(-20 372 512)"/>
  <line x1="450" y1="560" x2="440" y2="498" stroke="#4ADE80" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="434" cy="492" rx="16" ry="10" fill="#4ADE80" transform="rotate(10 434 492)"/>
  <line x1="566" y1="554" x2="570" y2="490" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="578" cy="484" rx="18" ry="11" fill="#4ADE80" transform="rotate(-10 578 484)"/>
  <line x1="626" y1="566" x2="650" y2="504" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="658" cy="498" rx="16" ry="10" fill="#22C55E" transform="rotate(15 658 498)"/>
  <!-- Small flower on top -->
  <line x1="512" y1="556" x2="512" y2="460" stroke="#15803D" stroke-width="7" stroke-linecap="round"/>
  <circle cx="512" cy="448" r="28" fill="#F9A8D4"/>
  <circle cx="512" cy="448" r="16" fill="#FCD34D"/>
  <!-- Dew drops on moss -->
  <ellipse cx="420" cy="602" rx="8" ry="5" fill="#7DD3FC" opacity="0.7"/>
  <ellipse cx="580" cy="596" rx="6" ry="4" fill="#7DD3FC" opacity="0.6"/>
  <!-- Layer 3: Ambient particles (spores) -->
  <circle cx="320" cy="480" r="4" fill="#86EFAC" opacity="0.5"/>
  <circle cx="700" cy="460" r="3" fill="#86EFAC" opacity="0.4"/>
  <circle cx="360" cy="400" r="3" fill="#BBF7D0" opacity="0.4"/>
  <circle cx="680" cy="400" r="4" fill="#86EFAC" opacity="0.5"/>
</svg>
