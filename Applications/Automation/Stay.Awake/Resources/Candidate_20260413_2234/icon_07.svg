<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="72" y="128" width="880" height="572" rx="48" fill="#FFFFFF" stroke="#01579B" stroke-width="16"/>
  <!-- Monitor outer bezel -->
  <rect x="188" y="168" width="648" height="392" rx="28" fill="#2C3E50" stroke="#1A252F" stroke-width="16"/>
  <!-- Monitor screen (active green-dark) -->
  <rect x="214" y="194" width="596" height="340" rx="14" fill="#1B2B1B"/>
  <!-- Screen glow overlay -->
  <rect x="214" y="194" width="596" height="340" rx="14" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.5"/>
  <!-- Screen: activity text lines -->
  <rect x="340" y="248" width="300" height="18" rx="9" fill="#66BB6A" opacity="0.75"/>
  <rect x="340" y="282" width="220" height="18" rx="9" fill="#66BB6A" opacity="0.55"/>
  <rect x="340" y="316" width="264" height="18" rx="9" fill="#66BB6A" opacity="0.65"/>
  <rect x="340" y="350" width="180" height="18" rx="9" fill="#66BB6A" opacity="0.45"/>
  <rect x="340" y="384" width="240" height="18" rx="9" fill="#66BB6A" opacity="0.60"/>
  <!-- Mouse cursor on screen -->
  <path d="M 246,248 L 246,380 L 280,350 L 308,402 L 334,390 L 306,338 L 348,338 Z"
        fill="#06D6A0" stroke="#004D40" stroke-width="8" stroke-linejoin="round"/>
  <!-- Active status dot (bright green, top-right of screen) -->
  <circle cx="790" cy="212" r="16" fill="#76FF03" stroke="#33691E" stroke-width="6"/>
  <!-- Monitor stand neck -->
  <rect x="476" y="560" width="72" height="64" rx="6" fill="#455A64" stroke="#1A252F" stroke-width="14"/>
  <!-- Monitor stand base -->
  <rect x="390" y="616" width="244" height="30" rx="15" fill="#455A64" stroke="#1A252F" stroke-width="14"/>
  <!-- STAY badge -->
  <rect x="110" y="770" width="318" height="108" rx="36" fill="#01579B" stroke="#003A72" stroke-width="14"/>
  <text x="269" y="843" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" text-anchor="middle">STAY</text>
  <!-- AWAKE badge -->
  <rect x="484" y="770" width="430" height="108" rx="36" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="699" y="843" font-family="Arial Black, sans-serif" font-weight="900" font-size="82" fill="#1A1A1A" text-anchor="middle">AWAKE</text>
</svg>
