<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#2d2200"/>
    </linearGradient>
    <linearGradient id="stamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEE44"/>
      <stop offset="100%" stop-color="#CCAA00"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stamp body -->
  <rect x="176" y="100" width="160" height="80" rx="10" fill="url(#stamp)"/>
  <rect x="216" y="76" width="80" height="40" rx="8" fill="url(#stamp)" opacity="0.85"/>
  <!-- Stamp head (ink part) -->
  <rect x="148" y="180" width="216" height="70" rx="8" fill="url(#ink)"/>
  <!-- Imprint on paper -->
  <rect x="90" y="300" width="332" height="160" rx="10" fill="#FFFBE8" opacity="0.12" stroke="#CCAA00" stroke-width="1.5"/>
  <!-- Stamped text effect -->
  <rect x="120" y="325" width="272" height="100" rx="6" fill="url(#ink)" opacity="0.18"/>
  <line x1="136" y1="347" x2="376" y2="347" stroke="#FF8800" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="136" y1="372" x2="376" y2="372" stroke="#FF8800" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="136" y1="397" x2="300" y2="397" stroke="#FF8800" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Files in a row (receiving stamps) -->
  <rect x="90" y="300" width="80" height="100" rx="8" fill="#CCAA00" opacity="0.15" stroke="#FFEE44" stroke-width="1.5"/>
  <rect x="216" y="300" width="80" height="100" rx="8" fill="#CCAA00" opacity="0.15" stroke="#FFEE44" stroke-width="1.5"/>
  <rect x="342" y="300" width="80" height="100" rx="8" fill="#CCAA00" opacity="0.15" stroke="#FFEE44" stroke-width="1.5"/>
</svg>