<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="explosion_bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#120005"/>
      <stop offset="100%" stop-color="#030308"/>
    </radialGradient>
    <radialGradient id="explosion_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#00FFCC" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#00FFCC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flash_outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3737" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF3737" stop-opacity="0"/>
    </radialGradient>
    <filter id="particle_glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="core_glow">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shard_glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Background — near black with red flash halo -->
  <rect width="1024" height="1024" rx="190" fill="url(#explosion_bg)"/>
  <circle cx="512" cy="512" r="420" fill="url(#flash_outer)"/>

  <!-- Stars (behind explosion) -->
  <circle cx="200" cy="200" r="2" fill="white" opacity="0.3"/>
  <circle cx="800" cy="180" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="160" cy="700" r="2" fill="white" opacity="0.3"/>
  <circle cx="850" cy="750" r="1.5" fill="white" opacity="0.25"/>

  <!-- Layer 2: Explosion particles radiating outward (24 particles, as in code) -->
  <g filter="url(#particle_glow)">
    <!-- Cyan particles (main player color) -->
    <circle cx="512" cy="310" r="16" fill="#00FFCC"/>
    <circle cx="612" cy="345" r="14" fill="#00FFCC" opacity="0.9"/>
    <circle cx="680" cy="420" r="15" fill="#00FFCC"/>
    <circle cx="700" cy="520" r="13" fill="#00FFCC" opacity="0.85"/>
    <circle cx="660" cy="620" r="14" fill="#00FFCC" opacity="0.9"/>
    <circle cx="590" cy="695" r="15" fill="#00FFCC"/>
    <circle cx="490" cy="720" r="13" fill="#00FFCC" opacity="0.85"/>
    <circle cx="390" cy="695" r="14" fill="#00FFCC" opacity="0.9"/>
    <circle cx="320" cy="625" r="15" fill="#00FFCC"/>
    <circle cx="285" cy="525" r="13" fill="#00FFCC" opacity="0.85"/>
    <circle cx="310" cy="425" r="14" fill="#00FFCC" opacity="0.9"/>
    <circle cx="390" cy="348" r="15" fill="#00FFCC"/>

    <!-- Gold sparks -->
    <circle cx="552" cy="298" r="10" fill="#FFD700" opacity="0.9"/>
    <circle cx="640" cy="375" r="9" fill="#FFD700" opacity="0.8"/>
    <circle cx="710" cy="475" r="10" fill="#FFD700" opacity="0.85"/>
    <circle cx="695" cy="580" r="9" fill="#FFD700" opacity="0.8"/>
    <circle cx="618" cy="660" r="10" fill="#FFD700" opacity="0.85"/>
    <circle cx="432" cy="720" r="9" fill="#FFD700" opacity="0.8"/>
    <circle cx="345" cy="648" r="10" fill="#FFD700" opacity="0.85"/>
    <circle cx="296" cy="564" r="9" fill="#FFD700" opacity="0.8"/>

    <!-- Red hit sparks -->
    <circle cx="460" cy="295" r="8" fill="#FF3737" opacity="0.85"/>
    <circle cx="720" cy="445" r="7" fill="#FF3737" opacity="0.8"/>
    <circle cx="718" cy="570" r="8" fill="#FF3737" opacity="0.8"/>
    <circle cx="278" cy="460" r="7" fill="#FF3737" opacity="0.8"/>
  </g>

  <!-- Particle trails (radial lines) -->
  <g opacity="0.35" stroke-linecap="round">
    <line x1="512" y1="512" x2="512" y2="310" stroke="#00FFCC" stroke-width="3"/>
    <line x1="512" y1="512" x2="680" y2="420" stroke="#00FFCC" stroke-width="3"/>
    <line x1="512" y1="512" x2="700" y2="520" stroke="#00FFCC" stroke-width="2.5"/>
    <line x1="512" y1="512" x2="590" y2="695" stroke="#00FFCC" stroke-width="3"/>
    <line x1="512" y1="512" x2="390" y2="695" stroke="#00FFCC" stroke-width="3"/>
    <line x1="512" y1="512" x2="285" y2="525" stroke="#00FFCC" stroke-width="2.5"/>
    <line x1="512" y1="512" x2="310" y2="425" stroke="#00FFCC" stroke-width="3"/>
    <line x1="512" y1="512" x2="710" y2="475" stroke="#FFD700" stroke-width="2"/>
    <line x1="512" y1="512" x2="296" y2="564" stroke="#FFD700" stroke-width="2"/>
  </g>

  <!-- Layer 3: Explosion core + shattered diamond fragments -->
  <!-- Shattered diamond pieces -->
  <g filter="url(#shard_glow)">
    <!-- Large shard top -->
    <polygon points="512,440 548,480 512,500 476,480" fill="#00FFCC" opacity="0.9"/>
    <!-- Large shard bottom -->
    <polygon points="512,580 548,545 512,524 476,545" fill="#00FFCC" opacity="0.85"/>
    <!-- Left shard -->
    <polygon points="440,512 480,548 460,512 480,476" fill="#00FFCC" opacity="0.8"/>
    <!-- Right shard -->
    <polygon points="584,512 544,548 564,512 544,476" fill="#00FFCC" opacity="0.8"/>
    <!-- Small center shards -->
    <polygon points="512,480 528,504 512,520 496,504" fill="white" opacity="0.7"/>
  </g>

  <!-- Core explosion flash -->
  <g filter="url(#core_glow)">
    <circle cx="512" cy="512" r="65" fill="url(#explosion_core)"/>
    <circle cx="512" cy="512" r="28" fill="white" opacity="0.85"/>
  </g>
</svg>
