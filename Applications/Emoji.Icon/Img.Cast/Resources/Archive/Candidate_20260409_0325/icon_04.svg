<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c4"><rect width="1024" height="1024" rx="190"/></clipPath>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Lavender gradient -->
  <rect width="1024" height="1024" rx="190" fill="url(#g4)"/>
  <g clip-path="url(#c4)">
    <!-- Layer 2: ICO multisizes — stacked squares (largest behind, smallest in front) -->
    <!-- 256px square (largest, back) -->
    <rect x="174" y="222" width="676" height="676" rx="28" fill="#A78BFA" stroke="#7C3AED" stroke-width="8"/>
    <text x="512" y="354" font-family="Arial,sans-serif" font-size="84" fill="white" font-weight="bold" text-anchor="middle" opacity="0.7">256</text>
    <!-- 128px square -->
    <rect x="254" y="302" width="516" height="516" rx="22" fill="#818CF8" stroke="#6D28D9" stroke-width="8"/>
    <text x="512" y="430" font-family="Arial,sans-serif" font-size="84" fill="white" font-weight="bold" text-anchor="middle" opacity="0.8">128</text>
    <!-- 64px square -->
    <rect x="334" y="382" width="356" height="356" rx="18" fill="#6366F1" stroke="#4338CA" stroke-width="8"/>
    <text x="512" y="506" font-family="Arial,sans-serif" font-size="84" fill="white" font-weight="bold" text-anchor="middle" opacity="0.85">64</text>
    <!-- 32px square -->
    <rect x="414" y="462" width="196" height="196" rx="14" fill="#4F46E5" stroke="#3730A3" stroke-width="8"/>
    <text x="512" y="578" font-family="Arial,sans-serif" font-size="84" fill="white" font-weight="bold" text-anchor="middle">32</text>
    <!-- 16px square (front, smallest) -->
    <rect x="456" y="504" width="112" height="112" rx="10" fill="#312E81"/>
    <text x="512" y="578" font-family="Arial,sans-serif" font-size="80" fill="#A5B4FC" font-weight="bold" text-anchor="middle">16</text>
    <!-- Layer 3: ".ico" label at bottom -->
    <text x="512" y="860" font-family="Arial Black,Arial,sans-serif" font-size="108" fill="#4C1D95" font-weight="900" text-anchor="middle">.ico</text>
  </g>
</svg>
