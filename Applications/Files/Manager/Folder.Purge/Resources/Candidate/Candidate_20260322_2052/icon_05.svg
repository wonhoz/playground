<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
    <linearGradient id="fld05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF59D"/>
    </linearGradient>
    <linearGradient id="badge05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>

  <!-- Layer 2: Central folder -->
  <!-- Folder body -->
  <rect x="132" y="314" width="760" height="388" rx="58" fill="url(#fld05)"/>
  <!-- Folder tab -->
  <rect x="132" y="220" width="274" height="114" rx="40" fill="white" opacity="0.88"/>
  <!-- Folder shadow stripe -->
  <rect x="132" y="314" width="760" height="38" fill="#7B6000" opacity="0.20"/>
  <!-- Folder inner lines (like a filled folder appearance) -->
  <line x1="200" y1="390" x2="864" y2="390"
        stroke="#E8CB00" stroke-width="5" opacity="0.4"/>
  <line x1="200" y1="430" x2="864" y2="430"
        stroke="#E8CB00" stroke-width="4" opacity="0.25"/>

  <!-- Layer 3: EMPTY badge (overlaid, lower half of folder) -->
  <!-- Badge backing shadow -->
  <rect x="196" y="498" width="632" height="160" rx="80" fill="#7F0000" opacity="0.30"/>
  <!-- Badge pill -->
  <rect x="188" y="486" width="648" height="160" rx="80" fill="url(#badge05)"/>
  <!-- Badge text -->
  <text x="512" y="604"
        font-family="Arial Black, Impact, sans-serif"
        font-size="110" font-weight="900"
        text-anchor="middle"
        fill="white" letter-spacing="6">EMPTY</text>

  <!-- Scan/magnifier hint: small magnifier in top-right corner of folder -->
  <!-- Magnifier circle -->
  <circle cx="796" cy="280" r="72" fill="none" stroke="white" stroke-width="22" opacity="0.82"/>
  <!-- Magnifier handle -->
  <line x1="849" y1="333" x2="898" y2="382"
        stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.82"/>
  <!-- Magnifier inner glint -->
  <circle cx="778" cy="262" r="18" fill="white" opacity="0.38"/>
</svg>
