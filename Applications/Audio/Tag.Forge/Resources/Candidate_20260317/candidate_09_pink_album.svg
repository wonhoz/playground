<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <linearGradient id="cover" x1="135deg" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F8BBD0"/>
      <stop offset="20%" stop-color="#880E4F"/>
      <stop offset="50%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Album cover -->
  <rect x="72" y="72" width="220" height="220" rx="16" fill="url(#cover)"/>
  <!-- Album art content -->
  <circle cx="182" cy="182" r="64" fill="#C2185B" opacity="0.7"/>
  <g fill="#FFDDE9" opacity="0.9">
    <rect x="168" y="148" width="12" height="56" rx="3"/>
    <ellipse cx="160" cy="206" rx="16" ry="11" transform="rotate(-12 160 206)"/>
    <rect x="182" y="148" width="12" height="44" rx="3"/>
    <ellipse cx="174" cy="194" rx="16" ry="11" transform="rotate(-12 174 194)"/>
    <rect x="168" y="148" width="26" height="10" rx="3"/>
  </g>
  <!-- Vinyl disc peeking out -->
  <circle cx="300" cy="182" r="100" fill="url(#disc)"/>
  <circle cx="300" cy="182" r="80"  fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="300" cy="182" r="60"  fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="300" cy="182" r="14"  fill="#880E4F"/>
  <!-- Tag below -->
  <path d="M 100,340 L 260,340 L 290,378 L 260,416 L 100,416 Z" fill="#F48FB1" opacity="0.9"/>
  <circle cx="124" cy="378" r="14" fill="#880E4F"/>
  <rect x="148" y="368" width="80" height="10" rx="5" fill="#FCE4EC" opacity="0.9"/>
  <rect x="148" y="382" width="64" height="8" rx="4" fill="#F8BBD0" opacity="0.7"/>
  <rect x="148" y="394" width="48" height="6" rx="3" fill="#F8BBD0" opacity="0.5"/>
</svg>
