<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 번트오렌지 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0800"/>
  <!-- Layer 2: 화산 분출 (불+돌+모래) -->
  <!-- 화산 산체 -->
  <polygon points="512,200 200,800 824,800" fill="#4E342E"/>
  <polygon points="512,200 240,800 784,800" fill="#5D4037"/>
  <!-- 분화구 -->
  <ellipse cx="512" cy="220" rx="100" ry="40" fill="#212121"/>
  <!-- 분출 불꽃 -->
  <polygon points="512,180 470,100 512,50 554,100" fill="#FF3D00" opacity="0.9"/>
  <polygon points="512,180 445,80 490,30 540,90" fill="#FF6D00" opacity="0.8"/>
  <polygon points="512,180 570,70 522,20 480,85" fill="#FFAB40" opacity="0.7"/>
  <!-- 날아가는 용암 입자들 -->
  <circle cx="400" cy="300" r="16" fill="#FF3D00"/>
  <circle cx="350" cy="250" r="12" fill="#FF6D00"/>
  <circle cx="620" cy="280" r="14" fill="#FF3D00"/>
  <circle cx="660" cy="220" r="10" fill="#FFAB40"/>
  <circle cx="440" cy="200" r="12" fill="#FF6D00"/>
  <circle cx="580" cy="160" r="8" fill="#FFCC02"/>
  <!-- 연기 (회색 원들) -->
  <circle cx="512" cy="120" r="40" fill="#444" opacity="0.6"/>
  <circle cx="540" cy="90" r="32" fill="#555" opacity="0.4"/>
  <circle cx="480" cy="80" r="28" fill="#444" opacity="0.35"/>
  <!-- 흘러내리는 용암 (산 측면) -->
  <path d="M470,400 Q420,550 380,700" stroke="#FF6D00" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M554,380 Q600,530 640,700" stroke="#FF3D00" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="72" font-weight="900" fill="#FF6D00" text-anchor="middle">SAND.FALL</text>
</svg>
