<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#051030"/>
    </linearGradient>
    <linearGradient id="trail02" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A6EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5AA0FF"/>
    </linearGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg02)"/>

  <!-- 제스처 궤적: L 자 (Left-Down) -->
  <path d="M 700 300 L 320 300 L 320 680" fill="none" stroke="url(#trail02)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow02)"/>

  <!-- 시작점 원 -->
  <circle cx="700" cy="300" r="28" fill="#5AA0FF" filter="url(#glow02)"/>

  <!-- 끝점 화살표 (아래) -->
  <polyline points="275,630 320,690 365,630" fill="none" stroke="#5AA0FF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow02)"/>

  <!-- 마우스 커서 (시작점 위에) -->
  <g transform="translate(660,240)" filter="url(#glow02)">
    <polygon points="0,0 0,60 16,44 30,72 42,66 28,38 50,32" fill="#5AA0FF" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- 동작 레이블: Alt+Left -->
  <rect x="340" y="730" width="340" height="58" rx="10" fill="#1A4AA0" opacity="0.9"/>
  <text x="510" y="770" font-family="monospace" font-size="28" font-weight="bold" fill="#A0C8FF" text-anchor="middle">Alt+Left</text>

  <!-- 연결선 -->
  <line x1="320" y1="690" x2="320" y2="730" stroke="#5AA0FF" stroke-width="4" stroke-dasharray="6,4"/>
</svg>
