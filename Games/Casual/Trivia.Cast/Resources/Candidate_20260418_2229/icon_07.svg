<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background rich gold -->
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: TV set with quiz host inside -->
  <!-- TV outer frame -->
  <rect x="120" y="180" width="784" height="560" rx="40" fill="#212121"/>
  <!-- TV screen -->
  <rect x="160" y="220" width="704" height="480" rx="20" fill="#1A237E"/>
  <!-- Screen content: host silhouette + question -->
  <!-- Stage background on screen -->
  <rect x="160" y="560" width="704" height="140" rx="0" fill="#311B92" opacity="0.8"/>
  <!-- Question text on screen -->
  <rect x="190" y="240" width="644" height="80" rx="12" fill="#FFFFFF" opacity="0.15"/>
  <text x="512" y="294" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">빛의 속도는?</text>
  <!-- Host circle avatar -->
  <circle cx="512" cy="440" r="100" fill="#FFD740" opacity="0.9"/>
  <!-- Correct answer badge -->
  <rect x="190" y="580" width="200" height="70" rx="12" fill="#43A047"/>
  <text x="290" y="626" font-family="Arial Black, sans-serif" font-size="34" fill="#FFFFFF" text-anchor="middle">30만km/s</text>
  <circle cx="390" cy="580" r="22" fill="#43A047"/>
  <path d="M375 580 L386 592 L408 566" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- TV stand -->
  <rect x="430" y="740" width="164" height="40" rx="8" fill="#424242"/>
  <rect x="370" y="780" width="284" height="30" rx="8" fill="#212121"/>
  <!-- Layer 3: TRIVIA CAST label below TV -->
  <rect x="240" y="836" width="544" height="90" rx="20" fill="#E65100"/>
  <text x="512" y="895" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="#FFFFFF" text-anchor="middle">TRIVIA CAST</text>
</svg>
