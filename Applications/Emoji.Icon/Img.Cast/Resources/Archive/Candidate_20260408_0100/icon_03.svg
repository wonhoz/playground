<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: soft teal/mint -->
  <rect width="1024" height="1024" rx="190" fill="#ECFDF5"/>

  <!-- App window -->
  <rect x="116" y="160" width="792" height="720" rx="20" fill="#1E293B" opacity="0.97"/>

  <!-- Title bar -->
  <rect x="116" y="160" width="792" height="52" rx="20" fill="#0F172A"/>
  <rect x="116" y="184" width="792" height="28" fill="#0F172A"/>
  <circle cx="158" cy="186" r="10" fill="#EF4444" opacity="0.8"/>
  <circle cx="192" cy="186" r="10" fill="#F59E0B" opacity="0.8"/>
  <circle cx="226" cy="186" r="10" fill="#22C55E" opacity="0.8"/>
  <text x="512" y="194" font-family="Arial,sans-serif" font-size="20" fill="#64748B" text-anchor="middle">Img.Cast — Image Format Converter</text>

  <!-- Drop zone -->
  <rect x="140" y="228" width="744" height="260" rx="16" fill="#0F172A" stroke="#334155" stroke-width="3" stroke-dasharray="14,8"/>
  <!-- Drop icon -->
  <path d="M512,268 L512,370" stroke="#60A5FA" stroke-width="10" stroke-linecap="round"/>
  <path d="M476,348 L512,390 L548,348" fill="none" stroke="#60A5FA" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="512" y="436" font-family="Arial,sans-serif" font-size="24" fill="#475569" text-anchor="middle">Drop images or folders here</text>
  <!-- Format badges in drop zone -->
  <rect x="194" y="456" width="76" height="32" rx="6" fill="#1E3A5F"/>
  <text x="232" y="477" font-family="Arial Black,Arial" font-size="18" fill="#93C5FD" text-anchor="middle">SVG</text>
  <rect x="286" y="456" width="76" height="32" rx="6" fill="#14532D"/>
  <text x="324" y="477" font-family="Arial Black,Arial" font-size="18" fill="#86EFAC" text-anchor="middle">PNG</text>
  <rect x="378" y="456" width="76" height="32" rx="6" fill="#7F1D1D"/>
  <text x="416" y="477" font-family="Arial Black,Arial" font-size="18" fill="#FCA5A5" text-anchor="middle">JPG</text>
  <rect x="470" y="456" width="76" height="32" rx="6" fill="#4C1D95"/>
  <text x="508" y="477" font-family="Arial Black,Arial" font-size="18" fill="#DDD6FE" text-anchor="middle">BMP</text>
  <rect x="562" y="456" width="76" height="32" rx="6" fill="#78350F"/>
  <text x="600" y="477" font-family="Arial Black,Arial" font-size="18" fill="#FDE68A" text-anchor="middle">ICO</text>

  <!-- Output format selector -->
  <text x="150" y="536" font-family="Arial,sans-serif" font-size="22" fill="#94A3B8">Output:</text>
  <rect x="248" y="514" width="280" height="44" rx="8" fill="#0F172A" stroke="#475569" stroke-width="2"/>
  <text x="268" y="542" font-family="Arial,sans-serif" font-size="24" fill="#E2E8F0">ICO (multi-size)</text>
  <text x="508" y="542" font-family="Arial,sans-serif" font-size="22" fill="#64748B">▼</text>

  <!-- ICO size checkboxes -->
  <text x="150" y="596" font-family="Arial,sans-serif" font-size="22" fill="#94A3B8">Sizes:</text>
  <rect x="236" y="576" width="60" height="32" rx="6" fill="#1D4ED8"/>
  <text x="266" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">16</text>
  <rect x="308" y="576" width="60" height="32" rx="6" fill="#1D4ED8"/>
  <text x="338" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">32</text>
  <rect x="380" y="576" width="60" height="32" rx="6" fill="#1D4ED8"/>
  <text x="410" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">48</text>
  <rect x="452" y="576" width="60" height="32" rx="6" fill="#1D4ED8"/>
  <text x="482" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">64</text>
  <rect x="524" y="576" width="72" height="32" rx="6" fill="#1D4ED8"/>
  <text x="560" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">128</text>
  <rect x="608" y="576" width="72" height="32" rx="6" fill="#1D4ED8"/>
  <text x="644" y="597" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">256</text>

  <!-- Convert button -->
  <rect x="140" y="626" width="744" height="66" rx="12" fill="#0EA5E9"/>
  <text x="512" y="669" font-family="Arial,sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">Convert 24 files</text>

  <!-- Results / Progress -->
  <rect x="140" y="710" width="744" height="44" rx="8" fill="#0F172A"/>
  <rect x="140" y="710" width="580" height="44" rx="8" fill="#059669"/>
  <text x="512" y="737" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">✓ 22 success  ✗ 2 failed</text>
</svg>
