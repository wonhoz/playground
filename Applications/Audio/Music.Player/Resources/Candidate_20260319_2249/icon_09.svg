<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Headphones with play button replacing left cup -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#0A0614"/>
  <!-- Headphone arc -->
  <path d="M220 520 C220 300 360 180 512 180 C664 180 804 300 804 520" fill="none" stroke="#673AB7" stroke-width="52" stroke-linecap="round"/>
  <!-- Right ear cup (normal) -->
  <rect x="730" y="490" width="110" height="170" rx="30" fill="#4527A0"/>
  <rect x="748" y="508" width="74" height="134" rx="20" fill="#311B92"/>
  <!-- Speaker dots in right cup -->
  <circle cx="785" cy="542" r="8" fill="#673AB7" opacity="0.7"/>
  <circle cx="785" cy="572" r="8" fill="#673AB7" opacity="0.7"/>
  <circle cx="785" cy="602" r="8" fill="#673AB7" opacity="0.7"/>
  <!-- Left ear cup (play button) -->
  <rect x="184" y="490" width="110" height="170" rx="30" fill="#4527A0"/>
  <!-- Play triangle inside left cup -->
  <path d="M214 524 L214 628 L298 576 Z" fill="#9C27B0"/>
  <!-- EQ glow lines on arc (center) -->
  <path d="M370 300 Q512 240 654 300" fill="none" stroke="#9C27B0" stroke-width="8" stroke-dasharray="20 16" opacity="0.4"/>
  <!-- Progress bar below -->
  <rect x="220" y="720" width="584" height="20" rx="10" fill="#1A1026"/>
  <rect x="220" y="720" width="350" height="20" rx="10" fill="#7C4DFF"/>
  <circle cx="570" cy="730" r="16" fill="#E040FB"/>
  <!-- Time indicators -->
  <rect x="220" y="760" width="50" height="12" rx="6" fill="#673AB7" opacity="0.5"/>
  <rect x="754" y="760" width="50" height="12" rx="6" fill="#673AB7" opacity="0.5"/>
</svg>
