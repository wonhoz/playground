  <rect x="220" y="240" width="40" height="40" rx="4" fill="#6A1B9A" opacity="0.7"/>
  <rect x="764" y="280" width="40" height="40" rx="4" fill="#6A1B9A" opacity="0.7"/>
  <rect x="200" y="560" width="56" height="56" rx="4" fill="#BA68C8" opacity="0.5"/>
  <rect x="768" y="520" width="56" height="56" rx="4" fill="#BA68C8" opacity="0.5"/>
  <rect x="260" y="680" width="40" height="40" rx="4" fill="#6A1B9A" opacity="0.4"/>
  <rect x="724" y="660" width="40" height="40" rx="4" fill="#6A1B9A" opacity="0.4"/>
  <!-- 픽셀 라인들 (하단 코드처럼) -->
  <rect x="160" y="780" width="704" height="18" rx="9" fill="#6A1B9A" opacity="0.8"/>
  <rect x="160" y="814" width="520" height="18" rx="9" fill="#6A1B9A" opacity="0.5"/>
  <rect x="160" y="848" width="610" height="18" rx="9" fill="#6A1B9A" opacity="0.3"/>
