<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Cannon barrel -->
  <rect x="260" y="460" width="380" height="100" rx="50" fill="#0277BD"/>
  <rect x="200" y="450" width="80" height="120" rx="20" fill="#0277BD"/>
  <!-- Cannon wheels -->
  <circle cx="340" cy="650" r="80" fill="none" stroke="#0277BD" stroke-width="20"/>
  <circle cx="340" cy="650" r="30" fill="#0277BD"/>
  <line x1="340" y1="570" x2="340" y2="730" stroke="#0277BD" stroke-width="14"/>
  <line x1="260" y1="650" x2="420" y2="650" stroke="#0277BD" stroke-width="14"/>
  <!-- Shot/projectile - browser globe -->
  <circle cx="780" cy="300" r="100" fill="none" stroke="#4FC3F7" stroke-width="16"/>
  <ellipse cx="780" cy="300" rx="42" ry="100" fill="none" stroke="#4FC3F7" stroke-width="12"/>
  <line x1="680" y1="300" x2="880" y2="300" stroke="#4FC3F7" stroke-width="12"/>
  <!-- Trajectory arc -->
  <path d="M640 510 Q780 320 680 200" fill="none" stroke="#4FC3F7" stroke-width="10" stroke-dasharray="20,14" opacity="0.7"/>
  <!-- Flash -->
  <circle cx="640" cy="510" r="30" fill="#4FC3F7" opacity="0.5"/>
</svg>
