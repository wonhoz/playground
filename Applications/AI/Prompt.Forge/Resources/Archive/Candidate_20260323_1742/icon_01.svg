<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#1E0A30"/>
  <!-- Layer 2: {{ name }} 변수 구문 -->
  <text x="100" y="580" font-size="300" fill="#C084FC" text-anchor="start" font-family="monospace" font-weight="bold">{{</text>
  <text x="924" y="580" font-size="300" fill="#C084FC" text-anchor="end" font-family="monospace" font-weight="bold">}}</text>
  <text x="512" y="560" font-size="200" fill="#F0ABFC" text-anchor="middle" font-family="monospace" font-weight="bold">name</text>
  <!-- Layer 3: 하단 태그 칩 3개 -->
  <rect x="110" y="720" width="220" height="72" rx="36" fill="#7C3AED"/>
  <text x="220" y="766" font-size="40" fill="#F0ABFC" text-anchor="middle" font-family="monospace">#coding</text>
  <rect x="402" y="720" width="220" height="72" rx="36" fill="#7C3AED"/>
  <text x="512" y="766" font-size="40" fill="#F0ABFC" text-anchor="middle" font-family="monospace">#gpt-4</text>
  <rect x="694" y="720" width="220" height="72" rx="36" fill="#7C3AED"/>
  <text x="804" y="766" font-size="40" fill="#F0ABFC" text-anchor="middle" font-family="monospace">#v2</text>
  <!-- 상단 밑줄 장식 -->
  <rect x="100" y="200" width="824" height="8" rx="4" fill="#7C3AED" opacity="0.5"/>
  <text x="512" y="175" font-size="52" fill="#7C3AED" text-anchor="middle" font-family="monospace">Prompt.Forge</text>
</svg>
