<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="#0D0D1A"/>
  <!-- Layer 2: 산 실루엣 (문자로 구성) -->
  <!-- 산 외곽선을 문자 텍스트로 채우기 -->
  <defs>
    <clipPath id="mountain">
      <polygon points="512,100 80,800 944,800"/>
    </clipPath>
  </defs>
  <!-- 산 배경 그라데이션 실루엣 -->
  <polygon points="512,100 80,800 944,800" fill="#1E2A4A"/>
  <!-- 문자들로 산 채우기 -->
  <text x="120" y="760" font-size="22" fill="#60A5FA" font-family="monospace" clip-path="url(#mountain)">##########################################################</text>
  <text x="140" y="720" font-size="22" fill="#60A5FA" font-family="monospace" clip-path="url(#mountain)">####################################################</text>
  <text x="160" y="680" font-size="22" fill="#7CB9FC" font-family="monospace" clip-path="url(#mountain)">##############################################</text>
  <text x="200" y="640" font-size="22" fill="#93C5FD" font-family="monospace" clip-path="url(#mountain)">########################################</text>
  <text x="240" y="600" font-size="22" fill="#BFDBFE" font-family="monospace" clip-path="url(#mountain)">##################################</text>
  <text x="280" y="560" font-size="22" fill="#DBEAFE" font-family="monospace" clip-path="url(#mountain)">############################</text>
  <text x="320" y="520" font-size="22" fill="#EFF6FF" font-family="monospace" clip-path="url(#mountain)">########################</text>
  <text x="360" y="480" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">####################</text>
  <text x="400" y="440" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">################</text>
  <text x="440" y="400" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">############</text>
  <text x="468" y="360" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">########</text>
  <text x="490" y="320" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">####</text>
  <text x="504" y="280" font-size="22" fill="#FFFFFF" font-family="monospace" clip-path="url(#mountain)">#</text>
  <!-- Layer 3: 하단 레이블 -->
  <rect x="80" y="840" width="860" height="100" rx="20" fill="#1E3A8A"/>
  <text x="512" y="906" font-size="56" fill="#BFDBFE" text-anchor="middle" font-weight="bold" font-family="monospace">ASCII ART</text>
</svg>
