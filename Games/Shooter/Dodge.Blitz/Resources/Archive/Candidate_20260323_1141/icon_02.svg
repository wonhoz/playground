<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 다크 레드 -->
  <rect width="1024" height="1024" rx="180" fill="#1A0000"/>
  <!-- Layer 2: 번개 + 탄알 비 -->
  <!-- 번개 (Blitz) -->
  <polygon points="560,160 440,520 530,520 400,864 680,420 560,420 680,160" fill="#FFFF00"/>
  <!-- 번개 글로우 -->
  <polygon points="560,160 440,520 530,520 400,864 680,420 560,420 680,160" fill="none" stroke="#FFFF00" stroke-width="8" opacity="0.4"/>
  <!-- 총알들 (배경에서 날아오는) -->
  <rect x="160" y="200" width="18" height="40" rx="6" fill="#FF4081" opacity="0.8"/>
  <rect x="200" y="350" width="18" height="40" rx="6" fill="#FF4081" opacity="0.7"/>
  <rect x="820" y="250" width="18" height="40" rx="6" fill="#FF4081" opacity="0.8"/>
  <rect x="860" y="400" width="18" height="40" rx="6" fill="#FF4081" opacity="0.7"/>
  <rect x="160" y="600" width="18" height="40" rx="6" fill="#FF4081" opacity="0.6"/>
  <rect x="820" y="650" width="18" height="40" rx="6" fill="#FF4081" opacity="0.6"/>
  <!-- 꼬리들 -->
  <line x1="169" y1="200" x2="169" y2="170" stroke="#FF4081" stroke-width="4" opacity="0.4"/>
  <line x1="829" y1="250" x2="829" y2="220" stroke="#FF4081" stroke-width="4" opacity="0.4"/>
  <!-- Layer 3: 타이틀 -->
  <text x="512" y="920" font-family="Arial Black,Arial" font-size="80" font-weight="900" fill="#FFFF00" text-anchor="middle">DODGE.BLITZ</text>
</svg>
