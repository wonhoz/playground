<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: Geometric duplicate pattern - pairs of identical shapes being crossed out -->
  <!-- Column 1: original + copy pair -->
  <rect x="180" y="280" width="140" height="180" rx="18" fill="white" opacity="0.9"/>
  <text x="250" y="390" font-size="88" text-anchor="middle">📄</text>
  <!-- Duplicate indicator -->
  <rect x="220" y="490" width="60" height="60" rx="14" fill="#BE185D"/>
  <text x="250" y="533" font-family="Arial" font-size="48" fill="white" text-anchor="middle" font-weight="bold">=</text>
  <rect x="180" y="580" width="140" height="180" rx="18" fill="white" opacity="0.7"/>
  <text x="250" y="690" font-size="88" text-anchor="middle" opacity="0.7">📄</text>
  <!-- Red X on copy -->
  <line x1="196" y1="596" x2="304" y2="744" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <line x1="304" y1="596" x2="196" y2="744" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <!-- Column 2: image pair -->
  <rect x="440" y="220" width="140" height="180" rx="18" fill="white" opacity="0.9"/>
  <text x="510" y="330" font-size="88" text-anchor="middle">🖼️</text>
  <rect x="480" y="430" width="60" height="60" rx="14" fill="#BE185D"/>
  <text x="510" y="473" font-family="Arial" font-size="48" fill="white" text-anchor="middle" font-weight="bold">=</text>
  <rect x="440" y="520" width="140" height="180" rx="18" fill="white" opacity="0.7"/>
  <text x="510" y="630" font-size="88" text-anchor="middle" opacity="0.7">🖼️</text>
  <line x1="456" y1="536" x2="564" y2="684" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <line x1="564" y1="536" x2="456" y2="684" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <!-- Column 3: zip pair -->
  <rect x="700" y="280" width="140" height="180" rx="18" fill="white" opacity="0.9"/>
  <text x="770" y="390" font-size="88" text-anchor="middle">📦</text>
  <rect x="740" y="490" width="60" height="60" rx="14" fill="#BE185D"/>
  <text x="770" y="533" font-family="Arial" font-size="48" fill="white" text-anchor="middle" font-weight="bold">=</text>
  <rect x="700" y="580" width="140" height="180" rx="18" fill="white" opacity="0.7"/>
  <text x="770" y="690" font-size="88" text-anchor="middle" opacity="0.7">📦</text>
  <line x1="716" y1="596" x2="824" y2="744" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <line x1="824" y1="596" x2="716" y2="744" stroke="#EF4444" stroke-width="20" stroke-linecap="round"/>
  <!-- Layer 3: Count badge -->
  <rect x="280" y="840" width="464" height="80" rx="20" fill="white" opacity="0.85"/>
  <text x="512" y="896" font-family="Arial" font-size="56" fill="#BE185D" text-anchor="middle" font-weight="bold">3 groups found</text>
</svg>
