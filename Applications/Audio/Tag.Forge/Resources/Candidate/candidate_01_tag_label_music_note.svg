<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#1a2a10"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="tagGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Price tag shape -->
  <path d="M120 160 L340 160 L400 256 L340 352 L120 352 Z" fill="#0a1a0a" stroke="url(#tagGrad)" stroke-width="3" filter="url(#tagGlow)"/>
  <!-- Tag hole -->
  <circle cx="148" cy="256" r="20" fill="#0a1a0a" stroke="url(#tagGrad)" stroke-width="3"/>
  <!-- Tag string -->
  <line x1="100" y1="256" x2="128" y2="256" stroke="#4ade80" stroke-width="3" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- Music note on tag -->
  <g transform="translate(270,230)" filter="url(#tagGlow)">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="url(#noteGrad)" transform="rotate(-20)"/>
    <line x1="22" y1="-4" x2="22" y2="-80" stroke="url(#noteGrad)" stroke-width="6"/>
    <line x1="22" y1="-80" x2="58" y2="-66" stroke="url(#noteGrad)" stroke-width="5"/>
  </g>
  <!-- ID3 tag lines on tag -->
  <line x1="170" y1="210" x2="330" y2="210" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="235" x2="310" y2="235" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="290" x2="305" y2="290" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="315" x2="315" y2="315" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <!-- Decorative corner star -->
  <circle cx="380" cy="140" r="5" fill="#ffd700" filter="url(#tagGlow)"/>
  <circle cx="395" cy="130" r="3" fill="#4ade80" filter="url(#tagGlow)"/>
  <circle cx="400" cy="150" r="4" fill="#ffd700" filter="url(#tagGlow)"/>
</svg>