<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1621"/>
      <stop offset="100%" stop-color="#1A2635"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8EDEA"/>
      <stop offset="100%" stop-color="#FED6E3"/>
    </linearGradient>
    <filter id="crystalGlow2">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Document shape with crystal/gem facets -->
  <polygon points="150,120 320,80 400,200 380,380 240,430 120,330" fill="#112233" stroke="url(#docGrad)" stroke-width="4" filter="url(#crystalGlow2)"/>
  <!-- Interior facet lines -->
  <line x1="150" y1="120" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="80" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="200" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="380" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="430" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="330" x2="256" y2="240" stroke="url(#docGrad)" stroke-width="2" opacity="0.5"/>
  <!-- PDF text in center -->
  <text x="256" y="262" font-family="sans-serif" font-size="52" fill="url(#docGrad)" text-anchor="middle" font-weight="bold" filter="url(#crystalGlow2)">PDF</text>
  <!-- Sparkle points at vertices -->
  <circle cx="150" cy="120" r="8" fill="#A8EDEA" filter="url(#crystalGlow2)"/>
  <circle cx="320" cy="80" r="8" fill="#FED6E3" filter="url(#crystalGlow2)"/>
  <circle cx="400" cy="200" r="8" fill="#A8EDEA" filter="url(#crystalGlow2)"/>
  <circle cx="380" cy="380" r="8" fill="#FED6E3" filter="url(#crystalGlow2)"/>
  <circle cx="240" cy="430" r="8" fill="#A8EDEA" filter="url(#crystalGlow2)"/>
  <circle cx="120" cy="330" r="8" fill="#FED6E3" filter="url(#crystalGlow2)"/>
</svg>
