<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#82B1FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- White card -->
  <rect x="80" y="80" width="352" height="352" rx="24" fill="#F5F5F5"/>
  <!-- QR on white -->
  <rect x="106" y="106" width="110" height="110" rx="10" fill="none" stroke="#212121" stroke-width="14"/>
  <rect x="124" y="124" width="74" height="74" rx="4" fill="#212121"/>
  <rect x="296" y="106" width="110" height="110" rx="10" fill="none" stroke="#212121" stroke-width="14"/>
  <rect x="314" y="124" width="74" height="74" rx="4" fill="#212121"/>
  <rect x="106" y="296" width="110" height="110" rx="10" fill="none" stroke="#212121" stroke-width="14"/>
  <rect x="124" y="314" width="74" height="74" rx="4" fill="#212121"/>
  <!-- Data dots black on white -->
  <g fill="#212121">
    <rect x="296" y="296" width="20" height="20" rx="3"/>
    <rect x="322" y="296" width="20" height="20" rx="3" opacity="0.4"/>
    <rect x="348" y="296" width="20" height="20" rx="3"/>
    <rect x="374" y="296" width="20" height="20" rx="3" opacity="0.6"/>
    <rect x="296" y="322" width="20" height="20" rx="3" opacity="0.4"/>
    <rect x="348" y="322" width="20" height="20" rx="3"/>
    <rect x="374" y="322" width="20" height="20" rx="3" opacity="0.4"/>
    <rect x="322" y="348" width="20" height="20" rx="3"/>
    <rect x="296" y="374" width="20" height="20" rx="3"/>
    <rect x="348" y="374" width="20" height="20" rx="3" opacity="0.6"/>
    <rect x="374" y="374" width="20" height="20" rx="3"/>
  </g>
  <!-- Blue accent dot -->
  <circle cx="256" cy="256" r="18" fill="url(#accent)"/>
</svg>
