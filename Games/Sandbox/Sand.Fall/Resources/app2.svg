  <ellipse cx="512" cy="790" rx="220" ry="50" fill="#D4B060"/>
  <!-- Falling sand stream -->
  <!-- Main stream particles -->
  <rect x="490" y="220" width="16" height="16" rx="2" fill="#E8C878"/>
  <rect x="498" y="252" width="14" height="14" rx="2" fill="#DEB858"/>
  <rect x="486" y="282" width="16" height="16" rx="2" fill="#E8C878"/>
  <rect x="502" y="314" width="12" height="12" rx="2" fill="#C9A040"/>
  <rect x="492" y="344" width="15" height="15" rx="2" fill="#E8C878"/>
  <rect x="504" y="376" width="14" height="14" rx="2" fill="#DEB858"/>
  <rect x="488" y="406" width="16" height="16" rx="2" fill="#E8C878"/>
  <rect x="498" y="438" width="13" height="13" rx="2" fill="#C9A040"/>
  <rect x="492" y="468" width="16" height="16" rx="2" fill="#E8C878"/>
  <rect x="505" y="500" width="14" height="14" rx="2" fill="#DEB858"/>
  <rect x="487" y="530" width="15" height="15" rx="2" fill="#E8C878"/>
