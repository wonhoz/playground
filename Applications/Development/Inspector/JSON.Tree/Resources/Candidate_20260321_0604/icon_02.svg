    <rect x="580" y="284" width="180" height="14" rx="7" fill="#6080A0" opacity="0.6"/>
    <!-- Shared line 2 -->
    <rect x="216" y="310" width="140" height="14" rx="7" fill="#6080A0" opacity="0.5"/>
    <rect x="580" y="310" width="140" height="14" rx="7" fill="#6080A0" opacity="0.5"/>

    <!-- Removed lines (red, left only) -->
    <rect x="200" y="336" width="260" height="32" rx="0" fill="#FF303020"/>
    <text x="212" y="358" font-family="monospace" font-size="20" fill="#FF5555" font-weight="bold">-</text>
    <rect x="228" y="346" width="180" height="14" rx="7" fill="#FF5555" opacity="0.7"/>

    <rect x="200" y="376" width="260" height="32" rx="0" fill="#FF303020"/>
    <text x="212" y="398" font-family="monospace" font-size="20" fill="#FF5555" font-weight="bold">-</text>
    <rect x="228" y="386" width="140" height="14" rx="7" fill="#FF5555" opacity="0.6"/>

