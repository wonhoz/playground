<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050F0A"/>
      <stop offset="100%" style="stop-color:#0A1F14"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#004422"/>
      <stop offset="100%" style="stop-color:#00CC66"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#664400"/>
      <stop offset="100%" style="stop-color:#FF8800"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#660000"/>
      <stop offset="100%" style="stop-color:#FF4444"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- SQL keyword at top -->
  <text x="256" y="100" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="40" fill="#00CC66">SQL</text>
  <text x="256" y="130" text-anchor="middle" font-family="monospace" font-size="16" fill="#006633">.Lens</text>
  <!-- Chart axes -->
  <line x1="80" y1="400" x2="440" y2="400" stroke="#224422" stroke-width="2"/>
  <line x1="80" y1="160" x2="80" y2="400" stroke="#224422" stroke-width="2"/>
  <!-- Bars -->
  <rect x="105" y="230" width="60" height="170" rx="6" fill="url(#bar1)"/>
  <rect x="185" y="200" width="60" height="200" rx="6" fill="url(#bar1)"/>
  <rect x="265" y="260" width="60" height="140" rx="6" fill="url(#bar2)"/>
  <rect x="345" y="180" width="60" height="220" rx="6" fill="url(#bar3)"/>
  <!-- Labels -->
  <text x="135" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#008844">IDX</text>
  <text x="215" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#008844">SEL</text>
  <text x="295" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#CC6600">JOIN</text>
  <text x="375" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#CC2222">FULL</text>
  <!-- Performance line -->
  <polyline points="135,230 215,200 295,260 375,180" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
</svg>
