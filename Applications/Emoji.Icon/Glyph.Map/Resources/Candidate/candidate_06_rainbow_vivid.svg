<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Rainbow glyph grid with colors -->
  <!-- Row 1 - warm colors -->
  <rect x="68" y="80" width="72" height="72" rx="10" fill="#E53935" opacity="0.85"/>
  <text x="104" y="133" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">A</text>
  <rect x="148" y="80" width="72" height="72" rx="10" fill="#E91E63" opacity="0.85"/>
  <text x="184" y="133" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">Ω</text>
  <rect x="228" y="80" width="72" height="72" rx="10" fill="#9C27B0" opacity="0.85"/>
  <text x="264" y="133" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">★</text>
  <rect x="308" y="80" width="72" height="72" rx="10" fill="#3F51B5" opacity="0.85"/>
  <text x="344" y="133" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">∞</text>
  <rect x="388" y="80" width="72" height="72" rx="10" fill="#2196F3" opacity="0.85"/>
  <text x="424" y="133" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">π</text>
  <!-- Row 2 - cool colors -->
  <rect x="68" y="160" width="72" height="72" rx="10" fill="#009688" opacity="0.85"/>
  <text x="104" y="213" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">♥</text>
  <rect x="148" y="160" width="72" height="72" rx="10" fill="#4CAF50" opacity="0.85"/>
  <text x="184" y="213" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">Σ</text>
  <rect x="228" y="160" width="72" height="72" rx="10" fill="#CDDC39" opacity="0.85"/>
  <text x="264" y="213" text-anchor="middle" font-family="serif" font-size="48" fill="#333">Δ</text>
  <rect x="308" y="160" width="72" height="72" rx="10" fill="#FFC107" opacity="0.85"/>
  <text x="344" y="213" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">α</text>
  <rect x="388" y="160" width="72" height="72" rx="10" fill="#FF5722" opacity="0.85"/>
  <text x="424" y="213" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">λ</text>
  <!-- Row 3 - mixed -->
  <rect x="68" y="240" width="72" height="72" rx="10" fill="#607D8B" opacity="0.85"/>
  <text x="104" y="293" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">©</text>
  <rect x="148" y="240" width="72" height="72" rx="10" fill="#795548" opacity="0.85"/>
  <text x="184" y="293" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">§</text>
  <rect x="228" y="240" width="72" height="72" rx="10" fill="#FF4081" opacity="0.85"/>
  <text x="264" y="293" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">♦</text>
  <rect x="308" y="240" width="72" height="72" rx="10" fill="#00BCD4" opacity="0.85"/>
  <text x="344" y="293" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">æ</text>
  <rect x="388" y="240" width="72" height="72" rx="10" fill="#8BC34A" opacity="0.85"/>
  <text x="424" y="293" text-anchor="middle" font-family="serif" font-size="48" fill="#FFF">μ</text>
  <!-- Search bar -->
  <rect x="80" y="340" width="352" height="48" rx="24" fill="#333" stroke="#555" stroke-width="2"/>
  <text x="256" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#888">Search unicode glyphs...</text>
  <!-- Bottom label -->
  <text x="256" y="468" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#E0E0E0">GLYPH MAP</text>
</svg>
