<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background yellow -->
  <rect width="1024" height="1024" rx="190" fill="#FFD600"/>
  <!-- Layer 2: 2x2 format label tiles -->
  <!-- SVG tile -->
  <rect x="116" y="116" width="356" height="356" rx="28" fill="#F06292"/>
  <text x="294" y="314" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">SVG</text>
  <!-- PNG tile -->
  <rect x="552" y="116" width="356" height="356" rx="28" fill="#42A5F5"/>
  <text x="730" y="314" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">PNG</text>
  <!-- ICO tile -->
  <rect x="116" y="552" width="356" height="356" rx="28" fill="#66BB6A"/>
  <text x="294" y="750" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">ICO</text>
  <!-- JPG tile -->
  <rect x="552" y="552" width="356" height="356" rx="28" fill="#FF7043"/>
  <text x="730" y="750" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">JPG</text>
  <!-- Layer 3: Center junction dot -->
  <circle cx="512" cy="512" r="38" fill="#FFD600"/>
  <circle cx="512" cy="512" r="24" fill="#212121"/>
</svg>
