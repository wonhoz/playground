<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A2744"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 문제 텍스트 영역 -->
    <rect x="80" y="90" width="864" height="96" rx="20" fill="#1565C0"/>
    <text x="512" y="142" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" text-anchor="middle">태양계 최대 행성은? ⚗️</text>
    <text x="512" y="170" font-family="'Segoe UI',Arial,sans-serif" font-size="32" fill="#90CAF9" text-anchor="middle">과학  •  20문항 중 7번째</text>

    <!-- 타이머 바 -->
    <rect x="80" y="200" width="864" height="24" rx="10" fill="#263238"/>
    <rect x="80" y="200" width="520" height="24" rx="10" fill="#FF6D00"/>
    <text x="900" y="220" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="34" fill="#FF8F00" text-anchor="end">9s</text>

    <!-- 4지선다 버튼 (2x2) -->
    <!-- A: 목성 (정답) -->
    <rect x="80" y="240" width="400" height="140" rx="20" fill="#1B5E20"/>
    <text x="160" y="310" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#A5D6A7">A.</text>
    <text x="290" y="315" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">목성</text>
    <circle cx="448" cy="310" r="34" fill="#A5D6A7" opacity="0.2"/>
    <text x="448" y="326" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#FFFFFF" text-anchor="middle">✓</text>

    <!-- B: 토성 -->
    <rect x="544" y="240" width="400" height="140" rx="20" fill="#1A237E"/>
    <text x="624" y="310" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#9FA8DA">B.</text>
    <text x="754" y="315" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">토성</text>

    <!-- C: 천왕성 -->
    <rect x="80" y="400" width="400" height="140" rx="20" fill="#1A237E"/>
    <text x="160" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#9FA8DA">C.</text>
    <text x="290" y="475" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">천왕성</text>

    <!-- D: 해왕성 -->
    <rect x="544" y="400" width="400" height="140" rx="20" fill="#1A237E"/>
    <text x="624" y="470" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="44" fill="#9FA8DA">D.</text>
    <text x="754" y="475" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">해왕성</text>

    <!-- 점수 / 스트릭 / 모드 바 -->
    <rect x="80" y="564" width="400" height="72" rx="20" fill="#FF8F00"/>
    <text x="280" y="610" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">🔥 3연속!</text>

    <rect x="544" y="564" width="400" height="72" rx="20" fill="#0277BD"/>
    <text x="744" y="610" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">점수: 140</text>

    <!-- 힌트 / 스킵 버튼 -->
    <rect x="80" y="656" width="192" height="60" rx="16" fill="#37474F"/>
    <text x="176" y="693" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#80CBC4" text-anchor="middle">💡 힌트</text>
    <rect x="288" y="656" width="192" height="60" rx="16" fill="#37474F"/>
    <text x="384" y="693" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="38" fill="#80CBC4" text-anchor="middle">⏭ 스킵</text>

    <!-- 타이틀 -->
    <rect x="140" y="790" width="744" height="70" rx="24" fill="#FFD600"/>
    <text x="512" y="837" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#0D1B2A" text-anchor="middle">TRIVIA.CAST</text>
  </g>
</svg>
