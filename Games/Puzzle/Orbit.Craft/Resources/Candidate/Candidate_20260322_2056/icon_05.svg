  <circle cx="512" cy="512" r="400" fill="none" stroke="rgba(125,211,252,0.10)" stroke-width="3"/>
  <circle cx="512" cy="512" r="322" fill="none" stroke="rgba(125,211,252,0.16)" stroke-width="3"/>
  <circle cx="512" cy="512" r="246" fill="none" stroke="rgba(125,211,252,0.24)" stroke-width="3"/>
  <circle cx="512" cy="512" r="172" fill="none" stroke="rgba(125,211,252,0.36)" stroke-width="4"/>
