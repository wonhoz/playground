  <rect x="460" y="540" width="10" height="10" rx="2" fill="#E8C878" opacity="0.6"/>
  <rect x="540" y="560" width="10" height="10" rx="2" fill="#DEB858" opacity="0.5"/>
  <rect x="450" y="600" width="12" height="12" rx="2" fill="#E8C878" opacity="0.4"/>
  <rect x="548" y="620" width="10" height="10" rx="2" fill="#C9A040" opacity="0.4"/>
