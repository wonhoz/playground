<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg4)"/>
  <!-- Layer 2: Audio file manager/tagger workspace scene -->
  <!-- App window frame -->
  <rect x="132" y="200" width="760" height="580" rx="20" fill="white" opacity="0.9"/>
  <rect x="132" y="200" width="760" height="52" rx="20" fill="#16A34A"/>
  <rect x="132" y="232" width="760" height="20" fill="#16A34A"/>
  <text x="512" y="234" font-family="Arial" font-size="22" fill="white" text-anchor="middle">Tag.Forge — audio tag editor</text>
  <!-- Track list left panel -->
  <rect x="148" y="268" width="260" height="488" rx="12" fill="#F3F4F6"/>
  <!-- Track items -->
  <rect x="160" y="278" width="236" height="54" rx="8" fill="#22C55E" opacity="0.8"/>
  <text x="185" y="313" font-family="Arial" font-size="32" fill="white">🎵 Track 01.mp3</text>
  <rect x="160" y="342" width="236" height="54" rx="8" fill="white"/>
  <text x="185" y="377" font-family="Arial" font-size="32" fill="#374151">🎵 Track 02.mp3</text>
  <rect x="160" y="406" width="236" height="54" rx="8" fill="white"/>
  <text x="185" y="441" font-family="Arial" font-size="32" fill="#374151">🎵 Track 03.flac</text>
  <rect x="160" y="470" width="236" height="54" rx="8" fill="white"/>
  <text x="185" y="505" font-family="Arial" font-size="32" fill="#374151">🎵 Track 04.mp3</text>
  <!-- Tag editor right panel -->
  <rect x="428" y="268" width="446" height="488" rx="12" fill="white"/>
  <text x="440" y="310" font-family="Arial" font-size="34" fill="#374151" font-weight="bold">Tag Editor</text>
  <!-- Tag fields -->
  <text x="440" y="360" font-family="Arial" font-size="28" fill="#6B7280">Title:</text>
  <rect x="508" y="337" width="348" height="40" rx="8" fill="#F3F4F6"/>
  <text x="520" y="363" font-family="Arial" font-size="28" fill="#374151">Summer Breeze</text>
  <text x="440" y="420" font-family="Arial" font-size="28" fill="#6B7280">Artist:</text>
  <rect x="508" y="397" width="348" height="40" rx="8" fill="#F3F4F6"/>
  <text x="520" y="423" font-family="Arial" font-size="28" fill="#374151">Music.Artist</text>
  <text x="440" y="480" font-family="Arial" font-size="28" fill="#6B7280">Album:</text>
  <rect x="508" y="457" width="348" height="40" rx="8" fill="#F3F4F6"/>
  <text x="520" y="483" font-family="Arial" font-size="28" fill="#374151">Best of 2026</text>
  <text x="440" y="540" font-family="Arial" font-size="28" fill="#6B7280">Genre:</text>
  <rect x="508" y="517" width="348" height="40" rx="8" fill="#F3F4F6"/>
  <text x="520" y="543" font-family="Arial" font-size="28" fill="#374151">Pop</text>
  <!-- Save button -->
  <rect x="680" y="680" width="170" height="52" rx="14" fill="#22C55E"/>
  <text x="765" y="715" font-family="Arial" font-size="34" fill="white" text-anchor="middle" font-weight="bold">Save</text>
  <!-- Layer 3: Musical note watermark -->
  <text x="190" y="630" font-size="110" opacity="0.15">♫</text>
</svg>
