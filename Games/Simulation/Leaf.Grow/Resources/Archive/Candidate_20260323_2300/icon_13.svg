<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <clipPath id="clip13">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <!-- 봄 -->
    <linearGradient id="spring13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BBF7D0"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <!-- 여름 -->
    <linearGradient id="summer13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <!-- 가을 -->
    <linearGradient id="autumn13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- 겨울 -->
    <linearGradient id="winter13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg13)"/>
  <!-- 십자 구분선 -->
  <line x1="512" y1="230" x2="512" y2="794" stroke="#4B5563" stroke-width="6"/>
  <line x1="228" y1="512" x2="796" y2="512" stroke="#4B5563" stroke-width="6"/>
  <!-- 둥근 테두리 사각형 -->
  <rect x="228" y="230" width="568" height="564" rx="30" fill="none" stroke="#374151" stroke-width="5"/>

  <!-- Layer 2: 4분할 계절 나무 -->

  <!-- 봄 (좌상단) -->
  <rect x="233" y="235" width="274" height="272" rx="25" fill="#0D2610" opacity="0.8"/>
  <!-- 봄 나무 줄기 -->
  <rect x="355" y="420" width="20" height="82" rx="5" fill="#7C3B1A"/>
  <!-- 봄 수관 — 연녹 + 꽃 -->
  <circle cx="365" cy="380" rx="55" ry="55" fill="url(#spring13)" opacity="0.9"/>
  <circle cx="325" cy="400" rx="40" ry="40" fill="#86EFAC" opacity="0.8"/>
  <circle cx="405" cy="400" rx="40" ry="40" fill="#86EFAC" opacity="0.8"/>
  <!-- 봄꽃 점점이 -->
  <circle cx="355" cy="348" r="8" fill="#F9A8D4"/>
  <circle cx="378" cy="360" r="6" fill="#FDE68A"/>
  <circle cx="340" cy="368" r="7" fill="#F9A8D4"/>
  <text x="365" y="498" font-family="sans-serif" font-size="26" fill="#6EE7B7" text-anchor="middle">봄</text>

  <!-- 여름 (우상단) -->
  <rect x="511" y="235" width="274" height="272" rx="25" fill="#0A1F0A" opacity="0.8"/>
  <!-- 여름 나무 -->
  <rect x="633" y="420" width="22" height="82" rx="5" fill="#7C3B1A"/>
  <circle cx="644" cy="365" rx="70" ry="70" fill="#16A34A" opacity="0.95"/>
  <circle cx="600" cy="390" rx="50" ry="50" fill="#22C55E" opacity="0.85"/>
  <circle cx="688" cy="390" rx="50" ry="50" fill="#22C55E" opacity="0.85"/>
  <!-- 태양 -->
  <circle cx="760" cy="270" r="25" fill="#FDE68A" opacity="0.9"/>
  <text x="644" y="498" font-family="sans-serif" font-size="26" fill="#4ADE80" text-anchor="middle">여름</text>

  <!-- 가을 (좌하단) -->
  <rect x="233" y="511" width="274" height="272" rx="25" fill="#1A0E00" opacity="0.8"/>
  <!-- 가을 나무 -->
  <rect x="355" y="700" width="20" height="78" rx="5" fill="#7C3B1A"/>
  <circle cx="365" cy="658" rx="60" ry="60" fill="#F97316" opacity="0.9"/>
  <circle cx="328" cy="678" rx="44" ry="44" fill="#EA580C" opacity="0.85"/>
  <circle cx="402" cy="675" rx="44" ry="44" fill="#D97706" opacity="0.85"/>
  <!-- 낙엽 -->
  <ellipse cx="295" cy="750" rx="12" ry="8" fill="#F97316" opacity="0.7" transform="rotate(-30 295 750)"/>
  <ellipse cx="440" cy="760" rx="11" ry="7" fill="#D97706" opacity="0.7" transform="rotate(20 440 760)"/>
  <text x="365" y="778" font-family="sans-serif" font-size="26" fill="#FDE68A" text-anchor="middle">가을</text>

  <!-- 겨울 (우하단) -->
  <rect x="511" y="511" width="274" height="272" rx="25" fill="#050C18" opacity="0.8"/>
  <!-- 겨울 나무 — 앙상한 가지 -->
  <rect x="633" y="698" width="20" height="80" rx="5" fill="#5C3010"/>
  <line x1="643" y1="698" x2="643" y2="590" stroke="#5C3010" stroke-width="16" stroke-linecap="round"/>
  <line x1="643" y1="630" x2="600" y2="600" stroke="#5C3010" stroke-width="10" stroke-linecap="round"/>
  <line x1="643" y1="630" x2="686" y2="600" stroke="#5C3010" stroke-width="10" stroke-linecap="round"/>
  <line x1="643" y1="600" x2="615" y2="572" stroke="#5C3010" stroke-width="8" stroke-linecap="round"/>
  <line x1="643" y1="600" x2="671" y2="572" stroke="#5C3010" stroke-width="8" stroke-linecap="round"/>
  <!-- 눈송이 -->
  <circle cx="598" cy="640" r="5" fill="#BAE6FD" opacity="0.8"/>
  <circle cx="690" cy="660" r="4" fill="#E0F2FE" opacity="0.8"/>
  <circle cx="620" cy="700" r="5" fill="#BAE6FD" opacity="0.7"/>
  <circle cx="670" cy="720" r="4" fill="#E0F2FE" opacity="0.7"/>
  <text x="644" y="778" font-family="sans-serif" font-size="26" fill="#BAE6FD" text-anchor="middle">겨울</text>

  <!-- Layer 3: 중앙 포인트 -->
  <circle cx="512" cy="512" r="22" fill="#FDE68A" opacity="0.9"/>
  <circle cx="512" cy="512" r="12" fill="#0F172A"/>
</svg>
