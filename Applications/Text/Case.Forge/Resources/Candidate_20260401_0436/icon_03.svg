<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Case name tiles (2×3 grid) -->
  <!-- Row 1 -->
  <rect x="112" y="130" width="370" height="200" rx="18" fill="white" opacity="0.15"/>
  <rect x="542" y="130" width="370" height="200" rx="18" fill="#FFD600" opacity="0.95"/>
  <!-- Row 2 -->
  <rect x="112" y="358" width="370" height="200" rx="18" fill="white" opacity="0.15"/>
  <rect x="542" y="358" width="370" height="200" rx="18" fill="#00E676" opacity="0.9"/>
  <!-- Row 3 -->
  <rect x="112" y="586" width="370" height="200" rx="18" fill="white" opacity="0.15"/>
  <rect x="542" y="586" width="370" height="200" rx="18" fill="#40C4FF" opacity="0.9"/>
  <!-- Bottom row spanning -->
  <rect x="112" y="814" width="800" height="88" rx="18" fill="white" opacity="0.12"/>
  <!-- Layer 3: Case name labels -->
  <text x="297" y="232" text-anchor="middle" dominant-baseline="middle" font-size="72" font-family="Consolas,monospace" fill="white">camelCase</text>
  <text x="727" y="232" text-anchor="middle" dominant-baseline="middle" font-size="64" font-family="Consolas,monospace" fill="#BF360C" font-weight="bold">PascalCase</text>
  <text x="297" y="460" text-anchor="middle" dominant-baseline="middle" font-size="64" font-family="Consolas,monospace" fill="white">snake_case</text>
  <text x="727" y="460" text-anchor="middle" dominant-baseline="middle" font-size="56" font-family="Consolas,monospace" fill="#1B5E20" font-weight="bold">SCREAMING</text>
  <text x="297" y="688" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Consolas,monospace" fill="white">kebab-case</text>
  <text x="727" y="688" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Consolas,monospace" fill="#006064">dot.case</text>
  <text x="512" y="858" text-anchor="middle" dominant-baseline="middle" font-size="64" font-family="Consolas,monospace" fill="white" opacity="0.7">Train-Case · Title Case</text>
</svg>
