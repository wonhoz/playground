<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0A00"/>
      <stop offset="100%" stop-color="#1A1500"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE000"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Lightning bolt -->
  <polygon points="290,80 200,270 260,270 220,430 330,230 265,230" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Speed lines -->
  <line x1="60" y1="200" x2="170" y2="200" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="230" x2="155" y2="230" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="60" y1="260" x2="160" y2="260" stroke="#FFE000" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="350" y1="250" x2="452" y2="250" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="360" y1="280" x2="452" y2="280" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Fast API label -->
  <text x="256" y="96" font-family="monospace" font-size="14" fill="#FFE000" text-anchor="middle" opacity="0.7">FAST REST</text>
  <text x="256" y="460" font-family="monospace" font-weight="bold" font-size="26" fill="#FF8C00" text-anchor="middle">Api.Probe</text>
</svg>