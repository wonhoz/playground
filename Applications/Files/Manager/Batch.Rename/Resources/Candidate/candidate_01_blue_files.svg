<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001833"/>
      <stop offset="100%" stop-color="#002d5c"/>
    </linearGradient>
    <linearGradient id="file" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4499FF"/>
      <stop offset="100%" stop-color="#1155CC"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BBFF"/>
      <stop offset="100%" stop-color="#AADDFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- File stack left -->
  <rect x="60" y="160" width="130" height="170" rx="10" fill="url(#file)" opacity="0.6"/>
  <rect x="72" y="148" width="130" height="170" rx="10" fill="url(#file)" opacity="0.75"/>
  <rect x="84" y="136" width="130" height="170" rx="10" fill="url(#file)"/>
  <!-- Fold corner -->
  <polygon points="184,136 214,136 214,166" fill="#001833" opacity="0.5"/>
  <polygon points="184,136 184,166 214,166" fill="#1155CC" opacity="0.8"/>
  <!-- Lines on file (text) -->
  <line x1="106" y1="175" x2="194" y2="175" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="106" y1="197" x2="194" y2="197" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="106" y1="219" x2="170" y2="219" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Arrow right (rename) -->
  <path d="M240,256 L280,256 L280,238 L320,262 L280,286 L280,268 L240,268 Z" fill="url(#arrow)"/>
  <!-- File stack right (renamed) -->
  <rect x="336" y="136" width="130" height="170" rx="10" fill="url(#file)" opacity="0.9"/>
  <polygon points="436,136 466,136 466,166" fill="#001833" opacity="0.5"/>
  <polygon points="436,136 436,166 466,166" fill="#1155CC" opacity="0.8"/>
  <!-- Changed name lines -->
  <line x1="358" y1="175" x2="446" y2="175" stroke="#AADDFF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="358" y1="197" x2="446" y2="197" stroke="#AADDFF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="358" y1="219" x2="422" y2="219" stroke="#AADDFF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Pencil/edit icon -->
  <rect x="160" y="360" width="192" height="44" rx="8" fill="#1155CC" opacity="0.4"/>
  <text x="256" y="390" font-family="monospace" font-size="20" fill="#66BBFF" text-anchor="middle" opacity="0.9">rename *.*</text>
</svg>