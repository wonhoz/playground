<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Hybrid: Bolt/lightning through a document (fast prompt execution) -->
  <rect x="80" y="80" width="864" height="864" rx="160" ry="160" fill="#07001A"/>
  <!-- Document pages (stacked) -->
  <rect x="260" y="260" width="380" height="480" rx="24" fill="#0D0032" stroke="#5E35B1" stroke-width="22"/>
  <rect x="290" y="230" width="380" height="480" rx="24" fill="#100040" stroke="#7E57C2" stroke-width="18"/>
  <rect x="320" y="200" width="380" height="480" rx="24" fill="#130050" stroke="#9575CD" stroke-width="16"/>
  <!-- Lines on top doc -->
  <rect x="370" y="300" width="240" height="18" rx="9" fill="#9575CD" opacity="0.8"/>
  <rect x="370" y="342" width="190" height="18" rx="9" fill="#9575CD" opacity="0.6"/>
  <rect x="370" y="384" width="210" height="18" rx="9" fill="#9575CD" opacity="0.6"/>
  <rect x="370" y="426" width="170" height="18" rx="9" fill="#9575CD" opacity="0.4"/>
  <!-- Lightning bolt through docs -->
  <path d="M580 180 L480 500 L540 500 L440 840 L640 460 L575 460 Z" fill="#FFD740" opacity="0.95"/>
  <path d="M580 180 L480 500 L540 500 L440 840 L640 460 L575 460 Z" fill="none" stroke="#FFF8E1" stroke-width="4" opacity="0.5"/>
</svg>
