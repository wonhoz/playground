<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#111827"/>
  <!-- Layer 2: Format extension chips in grid -->
  <!-- Row 1 -->
  <rect x="160" y="220" width="180" height="80" rx="18" fill="#EA580C"/>
  <text x="250" y="273" font-family="Consolas,monospace" font-size="38" fill="white" text-anchor="middle" font-weight="bold">.svg</text>
  <rect x="380" y="220" width="180" height="80" rx="18" fill="#059669"/>
  <text x="470" y="273" font-family="Consolas,monospace" font-size="38" fill="white" text-anchor="middle" font-weight="bold">.png</text>
  <rect x="600" y="220" width="180" height="80" rx="18" fill="#DC2626"/>
  <text x="690" y="273" font-family="Consolas,monospace" font-size="38" fill="white" text-anchor="middle" font-weight="bold">.jpg</text>
  <rect x="820" y="220" width="120" height="80" rx="18" fill="#7C3AED"/>
  <text x="880" y="273" font-family="Consolas,monospace" font-size="34" fill="white" text-anchor="middle" font-weight="bold">.bmp</text>
  <!-- Row 2: Arrow -->
  <text x="512" y="420" font-family="Arial,sans-serif" font-size="80" fill="#374151" text-anchor="middle">↓</text>
  <text x="512" y="490" font-family="Arial,sans-serif" font-size="26" fill="#6B7280" text-anchor="middle">변환</text>
  <!-- Row 3: Output formats -->
  <rect x="200" y="560" width="200" height="90" rx="20" fill="#1D4ED8"/>
  <text x="300" y="616" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="900">.ico</text>
  <rect x="440" y="560" width="200" height="90" rx="20" fill="#065F46"/>
  <text x="540" y="616" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="900">.png</text>
  <rect x="680" y="560" width="200" height="90" rx="20" fill="#7F1D1D"/>
  <text x="780" y="616" font-family="Consolas,monospace" font-size="44" fill="white" text-anchor="middle" font-weight="900">.jpg</text>
  <!-- Layer 3: "7 sizes" for ICO -->
  <text x="300" y="690" font-family="Consolas,monospace" font-size="18" fill="#60A5FA" text-anchor="middle">7 sizes</text>
  <!-- Decorative dots -->
  <circle cx="170" cy="760" r="8" fill="#374151"/>
  <circle cx="200" cy="760" r="8" fill="#374151"/>
  <circle cx="230" cy="760" r="8" fill="#374151"/>
</svg>