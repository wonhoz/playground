<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 파랑+하늘 -->
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- Layer 2: 여러 형식 파일들이 깔때기로 들어가 ICO로 나오는 모습 -->
  <!-- 상단 입력 파일들 -->
  <!-- SVG 파일 -->
  <rect x="120" y="150" width="160" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="200" y="208" font-family="Segoe UI, sans-serif" font-size="50" font-weight="bold" fill="#1565C0" text-anchor="middle">SVG</text>
  <!-- PNG 파일 -->
  <rect x="310" y="120" width="160" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="390" y="178" font-family="Segoe UI, sans-serif" font-size="50" font-weight="bold" fill="#0288D1" text-anchor="middle">PNG</text>
  <!-- JPG 파일 -->
  <rect x="500" y="150" width="160" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="580" y="208" font-family="Segoe UI, sans-serif" font-size="50" font-weight="bold" fill="#0277BD" text-anchor="middle">JPG</text>
  <!-- BMP 파일 -->
  <rect x="690" y="120" width="160" height="90" rx="14" fill="white" opacity="0.9"/>
  <text x="770" y="178" font-family="Segoe UI, sans-serif" font-size="50" font-weight="bold" fill="#01579B" text-anchor="middle">BMP</text>
  <!-- 깔때기 형태 -->
  <polygon points="100,260 924,260 680,520 344,520" fill="white" opacity="0.25"/>
  <polygon points="100,260 924,260 680,520 344,520" fill="none" stroke="white" stroke-width="10"/>
  <!-- 깔때기 아래 줄기 -->
  <rect x="420" y="520" width="184" height="180" rx="0" fill="white" opacity="0.25" stroke="white" stroke-width="10"/>
  <!-- 출력 화살표 -->
  <path d="M 512 700 L 512 780" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M 474 756 L 512 796 L 550 756" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: 출력 결과 ICO (크게) -->
  <rect x="380" y="800" width="264" height="150" rx="22" fill="white" opacity="0.95"/>
  <text x="512" y="900" font-family="Segoe UI, sans-serif" font-size="80" font-weight="bold" fill="#E91E63" text-anchor="middle">ICO</text>
</svg>
