  <line x1="784" y1="580" x2="720" y2="520" stroke="#78350F" stroke-width="22" stroke-linecap="round"/>
  <!-- 나무 가지 오른 -->
  <line x1="784" y1="560" x2="848" y2="490" stroke="#78350F" stroke-width="20" stroke-linecap="round"/>
  <!-- 나무 잎 크라운 -->
  <circle cx="784" cy="430" r="115" fill="#16A34A"/>
  <circle cx="730" cy="460" r="75" fill="#22C55E"/>
  <circle cx="840" cy="450" r="70" fill="#15803D"/>
