<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 — 딥 퍼플 -->
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <radialGradient id="glow04" cx="0.6" cy="0.55" r="0.4">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E040FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wand04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg04)"/>
  <!-- 마법 글로우 -->
  <rect width="1024" height="1024" rx="190" fill="url(#glow04)"/>

  <!-- Layer 2: 마법 지팡이 (대각선) -->
  <!-- 지팡이 막대 -->
  <line x1="200" y1="780" x2="700" y2="240" stroke="url(#wand04)" stroke-width="36" stroke-linecap="round"/>
  <!-- 지팡이 끝 별 -->
  <g transform="translate(700,240)">
    <circle r="40" fill="#FFD740"/>
    <!-- 별 빛살 -->
    <line x1="0" y1="-60" x2="0" y2="-90" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="0" y2="90" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
    <line x1="-60" y1="0" x2="-90" y2="0" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
    <line x1="60" y1="0" x2="90" y2="0" stroke="#FFD740" stroke-width="14" stroke-linecap="round"/>
    <line x1="-42" y1="-42" x2="-64" y2="-64" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
    <line x1="42" y1="-42" x2="64" y2="-64" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
    <line x1="-42" y1="42" x2="-64" y2="64" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
    <line x1="42" y1="42" x2="64" y2="64" stroke="#FFD740" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- 스파크 파티클들 -->
  <circle cx="580" cy="310" r="16" fill="#E040FB"/>
  <circle cx="620" cy="280" r="10" fill="#40C4FF"/>
  <circle cx="550" cy="260" r="12" fill="#FFEA00"/>
  <circle cx="650" cy="330" r="8" fill="#69F0AE"/>
  <circle cx="480" cy="360" r="14" fill="#FF6D00"/>
  <circle cx="430" cy="330" r="9" fill="#E040FB"/>
  <circle cx="500" cy="410" r="11" fill="#40C4FF"/>
  <circle cx="560" cy="380" r="7" fill="#FFEA00"/>

  <!-- Layer 3: 변환 대상 — 좌측 PNG 파일, 우측 ICO 파일 (지팡이로 변환) -->
  <!-- 왼쪽 파일 (PNG) -->
  <rect x="120" y="580" width="200" height="240" rx="20" fill="#1E88E5" opacity="0.85"/>
  <path d="M270,580 L320,630 L270,630 Z" fill="#0D47A1" opacity="0.85"/>
  <text x="220" y="720" font-family="Arial Black" font-size="60" fill="white" text-anchor="middle">PNG</text>

  <!-- 오른쪽 파일 (ICO — 빛남) -->
  <rect x="704" y="580" width="200" height="240" rx="20" fill="#E040FB" opacity="0.85"/>
  <path d="M854,580 L904,630 L854,630 Z" fill="#AA00FF" opacity="0.85"/>
  <text x="804" y="720" font-family="Arial Black" font-size="60" fill="white" text-anchor="middle">ICO</text>
  <!-- ICO 글로우 -->
  <rect x="704" y="580" width="200" height="240" rx="20" fill="none"
    stroke="#FFD740" stroke-width="6" opacity="0.8"/>
</svg>
