<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03q" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121218;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1C26;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyboard03q" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="popup03q" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFAA00;stop-opacity:1" />
    </linearGradient>
    <filter id="popupglow">
      <feDropShadow dx="0" dy="-6" stdDeviation="18" flood-color="#FFAA00" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03q)"/>
  <!-- Layer 2: 키보드 -->
  <rect x="220" y="560" width="584" height="240" rx="24" fill="url(#keyboard03q)" stroke="#3A3A4A" stroke-width="8"/>
  <!-- 키보드 키들 (작은 사각형들) -->
  <!-- 행 1 -->
  <rect x="244" y="584" width="54" height="42" rx="8" fill="#3A3A4A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="310" y="584" width="54" height="42" rx="8" fill="#3A3A4A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="376" y="584" width="54" height="42" rx="8" fill="#3A3A4A" stroke="#4A4A5A" stroke-width="2"/>
