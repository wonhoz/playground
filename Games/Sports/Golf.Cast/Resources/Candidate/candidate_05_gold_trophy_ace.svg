<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1400"/>
      <stop offset="100%" stop-color="#0A0A00"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#AA7700"/>
    </linearGradient>
    <radialGradient id="ball_gold" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trophy cup -->
  <path d="M190 140 L180 280 Q180 320 256 330 Q332 320 332 280 L322 140 Z" fill="url(#gold)"/>
  <!-- Trophy handles -->
  <path d="M190 180 Q148 180 148 220 Q148 260 190 260" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <path d="M322 180 Q364 180 364 220 Q364 260 322 260" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <!-- Trophy base -->
  <rect x="226" y="330" width="60" height="30" rx="4" fill="url(#gold)"/>
  <rect x="196" y="360" width="120" height="18" rx="6" fill="url(#gold)"/>
  <!-- Trophy shine -->
  <ellipse cx="225" cy="195" rx="18" ry="30" fill="white" opacity="0.15" transform="rotate(-15 225 195)"/>
  <!-- ACE text on trophy -->
  <text x="256" y="230" text-anchor="middle" fill="#AA7700" font-size="52" font-family="sans-serif" font-weight="bold">ACE</text>
  <!-- Stars around trophy -->
  <text x="100" y="220" fill="#FFB300" font-size="30" opacity="0.8">&#x2605;</text>
  <text x="395" y="220" fill="#FFB300" font-size="30" opacity="0.8">&#x2605;</text>
  <text x="148" y="140" fill="#FFD700" font-size="22" opacity="0.6">&#x2605;</text>
  <text x="355" y="140" fill="#FFD700" font-size="22" opacity="0.6">&#x2605;</text>
  <!-- Ball -->
  <circle cx="256" cy="430" r="26" fill="url(#ball_gold)" stroke="#FFB300" stroke-width="3"/>
  <text x="256" y="437" text-anchor="middle" fill="#AAAAAA" font-size="12" font-family="sans-serif">HOLE IN ONE</text>
</svg>
