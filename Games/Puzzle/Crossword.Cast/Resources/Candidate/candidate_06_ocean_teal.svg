<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="cell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#99f6e4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 5x5 grid cells -->
  <g fill="url(#cell)" stroke="#2dd4bf" stroke-width="2">
    <rect x="72" y="72" width="72" height="72" rx="4"/>
    <rect x="152" y="72" width="72" height="72" rx="4"/>
    <rect x="232" y="72" width="72" height="72" rx="4"/>
    <rect x="312" y="72" width="72" height="72" rx="4"/>
    <rect x="392" y="72" width="48" height="72" rx="4"/>
    <rect x="72" y="152" width="72" height="72" rx="4"/>
    <rect x="232" y="152" width="72" height="72" rx="4"/>
    <rect x="312" y="152" width="72" height="72" rx="4"/>
    <rect x="72" y="232" width="72" height="72" rx="4"/>
    <rect x="152" y="232" width="72" height="72" rx="4"/>
    <rect x="232" y="232" width="72" height="72" rx="4"/>
    <rect x="72" y="312" width="72" height="72" rx="4"/>
    <rect x="232" y="312" width="72" height="72" rx="4"/>
    <rect x="312" y="312" width="72" height="72" rx="4"/>
    <rect x="72" y="392" width="72" height="48" rx="4"/>
    <rect x="152" y="392" width="72" height="48" rx="4"/>
    <rect x="232" y="392" width="72" height="48" rx="4"/>
  </g>
  <!-- black cells -->
  <rect x="152" y="152" width="72" height="72" rx="4" fill="#021a19"/>
  <rect x="312" y="232" width="72" height="72" rx="4" fill="#021a19"/>
  <rect x="392" y="152" width="48" height="72" rx="4" fill="#021a19"/>
  <!-- letters -->
  <text x="108" y="108" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">W</text>
  <text x="188" y="108" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#2dd4bf" text-anchor="middle" dominant-baseline="central">O</text>
  <text x="268" y="108" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">R</text>
  <text x="348" y="108" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">D</text>
  <text x="108" y="268" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#2dd4bf" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="188" y="268" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="268" y="268" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="#ccfbf1" text-anchor="middle" dominant-baseline="central">E</text>
</svg>
