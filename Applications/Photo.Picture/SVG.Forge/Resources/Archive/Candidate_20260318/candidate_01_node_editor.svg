  <rect x="218" y="278" width="56" height="6" rx="3" fill="#C084FC" opacity="0.25"/>
  <circle cx="314" cy="260" r="6" fill="#C084FC" opacity="0.9"/>
  <circle cx="314" cy="275" r="6" fill="#C084FC" opacity="0.9"/>
  <!-- 출력 노드 1 -->
  <rect x="330" y="158" width="100" height="44" rx="8" fill="url(#nodeg)" stroke="#C084FC" stroke-width="1.5" opacity="0.85"/>
  <circle cx="330" cy="180" r="5" fill="#C084FC" opacity="0.9"/>
  <rect x="340" y="168" width="70" height="8" rx="3" fill="#C084FC" opacity="0.4"/>
  <rect x="340" y="180" width="55" height="6" rx="3" fill="#C084FC" opacity="0.3"/>
