<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000A10"/>
  <!-- Magic wand -->
  <rect x="200" y="600" width="420" height="36" rx="18" fill="#0277BD" transform="rotate(-45 410 618)"/>
  <!-- Wand tip star -->
  <polygon points="350,280 370,340 432,340 382,376 402,436 350,400 298,436 318,376 268,340 330,340" fill="#4FC3F7"/>
  <!-- URL chain links -->
  <rect x="500" y="240" width="100" height="54" rx="27" fill="none" stroke="#4FC3F7" stroke-width="16"/>
  <rect x="570" y="270" width="100" height="54" rx="27" fill="none" stroke="#4FC3F7" stroke-width="16"/>
  <rect x="640" y="300" width="100" height="54" rx="27" fill="none" stroke="#4FC3F7" stroke-width="16"/>
  <!-- Sparkles -->
  <circle cx="680" cy="220" r="12" fill="#4FC3F7"/>
  <circle cx="760" cy="280" r="8" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="720" cy="160" r="10" fill="#4FC3F7" opacity="0.8"/>
  <!-- Screenshot frame appearing -->
  <rect x="500" y="500" width="300" height="200" rx="16" fill="none" stroke="#0277BD" stroke-width="14" stroke-dasharray="24,14"/>
  <!-- Capture corners -->
  <path d="M510 510 L510 540 L540 540" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M790 510 L790 540 L760 540" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
