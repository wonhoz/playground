  <line x1="130" y1="128" x2="342" y2="128" stroke="#FFB3D9" stroke-width="1.5"/>
  <line x1="130" y1="148" x2="342" y2="148" stroke="#B3D9FF" stroke-width="1.5"/>
  <line x1="130" y1="168" x2="342" y2="168" stroke="#B3FFD9" stroke-width="1.5"/>
  <line x1="130" y1="188" x2="342" y2="188" stroke="#FFB3D9" stroke-width="1.5"/>
  <line x1="130" y1="208" x2="342" y2="208" stroke="#B3D9FF" stroke-width="1.5"/>
  <line x1="130" y1="228" x2="342" y2="228" stroke="#FFD9B3" stroke-width="1.5"/>
  <line x1="130" y1="248" x2="342" y2="248" stroke="#B3FFD9" stroke-width="1.5"/>
  <line x1="130" y1="268" x2="342" y2="268" stroke="#FFB3D9" stroke-width="1.5"/>
  <line x1="130" y1="288" x2="342" y2="288" stroke="#B3D9FF" stroke-width="1.5"/>
  <line x1="130" y1="308" x2="342" y2="308" stroke="#FFD9B3" stroke-width="1.5"/>
  <line x1="130" y1="328" x2="342" y2="328" stroke="#B3FFD9" stroke-width="1.5"/>
  <line x1="130" y1="348" x2="342" y2="348" stroke="#FFB3D9" stroke-width="1.5"/>
  <!-- Cute heart doodle -->
  <path d="M280,160 Q295,145 310,160 Q295,180 280,190 Q265,180 250,160 Q265,145 280,160 Z" fill="#FFB3D9"/>
