<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- RGB 원들 (색상 가산 혼합) -->
  <circle cx="220" cy="220" r="100" fill="#FF6B6B" opacity="0.25" filter="url(#glow)"/>
  <circle cx="292" cy="220" r="100" fill="#06D6A0" opacity="0.25" filter="url(#glow)"/>
  <circle cx="256" cy="292" r="100" fill="#118AB2" opacity="0.25" filter="url(#glow)"/>
  <!-- 경계선들 -->
  <circle cx="220" cy="220" r="100" fill="none" stroke="#FF6B6B" stroke-width="2" opacity="0.5"/>
  <circle cx="292" cy="220" r="100" fill="none" stroke="#06D6A0" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="292" r="100" fill="none" stroke="#118AB2" stroke-width="2" opacity="0.5"/>
  <!-- 중앙 (백색) -->
  <circle cx="256" cy="244" r="28" fill="white" opacity="0.3" filter="url(#glow)"/>
  <!-- 레이블 -->
  <text x="175" y="175" fill="#FF6B6B" font-size="13" font-family="monospace" font-weight="bold" opacity="0.8">R</text>
  <text x="320" y="175" fill="#06D6A0" font-size="13" font-family="monospace" font-weight="bold" opacity="0.8">G</text>
  <text x="246" y="370" fill="#118AB2" font-size="13" font-family="monospace" font-weight="bold" opacity="0.8">B</text>
  <!-- LUT 그리드 (배경) -->
  <g opacity="0.08">
    <line x1="80" y1="430" x2="432" y2="430" stroke="#A78BFA" stroke-width="1"/>
    <line x1="80" y1="450" x2="432" y2="450" stroke="#A78BFA" stroke-width="1"/>
  </g>
  <text x="256" y="458" text-anchor="middle" fill="#A78BFA" font-size="12" font-family="monospace" opacity="0.6">RGB NEBULA LUT</text>
</svg>