<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="icoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="sh1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>

  <!-- SVG 파일 카드 -->
  <rect x="88" y="300" width="270" height="360" rx="22" fill="white" filter="url(#sh1)"/>
  <!-- 카드 헤더 -->
  <rect x="88" y="300" width="270" height="96" rx="22" fill="#FF6D00"/>
  <rect x="88" y="360" width="270" height="36" fill="#FF6D00"/>
  <!-- SVG 텍스트 -->
  <text x="223" y="393" text-anchor="middle" fill="white" font-size="88" font-weight="bold" font-family="Arial, sans-serif">SVG</text>
  <!-- 파일 내용 라인 -->
  <rect x="120" y="424" width="206" height="20" rx="10" fill="#FFCC80"/>
  <rect x="120" y="460" width="170" height="20" rx="10" fill="#E0E0E0"/>
  <rect x="120" y="496" width="190" height="20" rx="10" fill="#E0E0E0"/>
  <rect x="120" y="532" width="140" height="20" rx="10" fill="#FFCC80"/>
  <rect x="120" y="568" width="160" height="20" rx="10" fill="#E0E0E0"/>

  <!-- 변환 화살표 -->
  <path d="M410,432 L585,432 L585,352 L665,512 L585,672 L585,592 L410,592 Z" fill="#0277BD"/>
  <!-- 화살표 광택 -->
  <path d="M410,432 L585,432 L585,390 L632,432 Z" fill="#29B6F6" opacity="0.5"/>

  <!-- ICO 스택 뒤 -->
  <rect x="700" y="330" width="245" height="360" rx="22" fill="#90CAF9"/>
  <!-- ICO 스택 중간 -->
  <rect x="678" y="315" width="245" height="360" rx="22" fill="#42A5F5"/>
  <!-- ICO 스택 앞 -->
  <rect x="656" y="300" width="245" height="360" rx="22" fill="url(#icoGrad)" filter="url(#sh1)"/>
  <!-- 앞 카드 헤더 -->
  <rect x="656" y="300" width="245" height="96" rx="22" fill="#01579B"/>
  <rect x="656" y="360" width="245" height="36" fill="#01579B"/>
  <!-- ICO 텍스트 -->
  <text x="778" y="393" text-anchor="middle" fill="white" font-size="88" font-weight="bold" font-family="Arial, sans-serif">ICO</text>
  <!-- 아이콘 격자 2x3 -->
  <rect x="684" y="428" width="50" height="50" rx="10" fill="#EF5350"/>
  <rect x="746" y="428" width="50" height="50" rx="10" fill="#66BB6A"/>
  <rect x="808" y="428" width="50" height="50" rx="10" fill="#FFA726"/>
  <rect x="684" y="492" width="50" height="50" rx="10" fill="#42A5F5"/>
  <rect x="746" y="492" width="50" height="50" rx="10" fill="#AB47BC"/>
  <rect x="808" y="492" width="50" height="50" rx="10" fill="#26C6DA"/>

  <!-- 하단 사이즈 레이블 -->
  <rect x="230" y="730" width="564" height="58" rx="29" fill="#0277BD" opacity="0.85"/>
  <text x="512" y="771" text-anchor="middle" fill="white" font-size="40" font-weight="bold" font-family="Arial, sans-serif">16 · 32 · 48 · 256 px</text>
</svg>
