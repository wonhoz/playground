<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ancient scroll -->
  <ellipse cx="256" cy="100" rx="200" ry="32" fill="#F9A825"/>
  <ellipse cx="256" cy="412" rx="200" ry="32" fill="#F9A825"/>
  <rect x="56" y="100" width="400" height="312" fill="url(#scroll)"/>
  <!-- Timeline arrow on scroll -->
  <line x1="256" y1="148" x2="256" y2="380" stroke="#BF360C" stroke-width="10" stroke-linecap="round"/>
  <polygon points="256,380 236,340 276,340" fill="#BF360C"/>
  <!-- Events on timeline -->
  <!-- Left events -->
  <line x1="256" y1="180" x2="176" y2="180" stroke="#E65100" stroke-width="4"/>
  <rect x="88" y="164" width="88" height="32" rx="8" fill="#FF6D00" opacity="0.9"/>
  <rect x="96" y="172" width="72" height="8" rx="4" fill="#FFF9C4" opacity="0.9"/>
  <rect x="96" y="184" width="56" height="6" rx="3" fill="#FFECB3" opacity="0.7"/>
  <!-- Right events -->
  <line x1="256" y1="240" x2="336" y2="240" stroke="#E65100" stroke-width="4"/>
  <rect x="336" y="224" width="88" height="32" rx="8" fill="#FF6D00" opacity="0.9"/>
  <rect x="344" y="232" width="72" height="8" rx="4" fill="#FFF9C4" opacity="0.9"/>
  <rect x="344" y="244" width="56" height="6" rx="3" fill="#FFECB3" opacity="0.7"/>
  <!-- Left events 2 -->
  <line x1="256" y1="300" x2="176" y2="300" stroke="#E65100" stroke-width="4"/>
  <rect x="88" y="284" width="88" height="32" rx="8" fill="#FF6D00" opacity="0.85"/>
  <rect x="96" y="292" width="72" height="8" rx="4" fill="#FFF9C4" opacity="0.9"/>
  <rect x="96" y="304" width="40" height="6" rx="3" fill="#FFECB3" opacity="0.7"/>
  <!-- Circle nodes -->
  <circle cx="256" cy="180" r="10" fill="#BF360C" stroke="#FF6D00" stroke-width="4"/>
  <circle cx="256" cy="240" r="10" fill="#BF360C" stroke="#FF6D00" stroke-width="4"/>
  <circle cx="256" cy="300" r="10" fill="#BF360C" stroke="#FF6D00" stroke-width="4"/>
</svg>
