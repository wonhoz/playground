<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg_mv5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1024" height="1024" rx="185" fill="url(#bg_mv5)"/>
  <!-- 버튼 B -->
  <rect x="210" y="370" width="180" height="180" rx="36" fill="white"/>
  <text x="300" y="496" font-family="'Georgia', serif" font-size="140" font-weight="900" fill="#1E293B" text-anchor="middle" dominant-baseline="middle">B</text>
  <!-- 버튼 I -->
  <rect x="422" y="370" width="180" height="180" rx="36" fill="white"/>
  <text x="512" y="496" font-family="'Georgia', serif" font-size="130" font-weight="400" font-style="italic" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">I</text>
  <!-- 버튼 S (취소선) -->
  <rect x="634" y="370" width="180" height="180" rx="36" fill="white"/>
  <text x="724" y="500" font-family="'Georgia', serif" font-size="120" font-weight="700" fill="#64748B" text-anchor="middle" dominant-baseline="middle">S</text>
  <line x1="664" y1="460" x2="784" y2="460" stroke="#EC4899" stroke-width="14" stroke-linecap="round"/>
  <!-- 아래 텍스트 힌트 -->
  <text x="300" y="630" font-family="Arial" font-size="36" fill="white" text-anchor="middle" opacity="0.9">Bold</text>
  <text x="512" y="630" font-family="Arial" font-size="36" font-style="italic" fill="white" text-anchor="middle" opacity="0.9">Italic</text>
  <text x="724" y="630" font-family="Arial" font-size="36" fill="white" text-anchor="middle" opacity="0.9">Strike</text>
