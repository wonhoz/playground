    <ellipse cx="280" cy="540" rx="60" ry="22"/>
    <ellipse cx="180" cy="640" rx="50" ry="20"/>
  </g>
  <g fill="#FFD24A" stroke="#FFE9A0" stroke-width="6">
    <ellipse cx="864" cy="380" rx="60" ry="22"/>
    <ellipse cx="744" cy="510" rx="60" ry="22"/>
    <ellipse cx="844" cy="620" rx="50" ry="20"/>
  </g>
  <!-- diamond player -->
  <polygon points="512,260 760,512 512,764 264,512" fill="url(#dia01)" stroke="#0FFFD0" stroke-width="14"/>
  <polygon points="512,360 660,512 512,664 364,512" fill="#E8FFFA" opacity="0.55"/>
