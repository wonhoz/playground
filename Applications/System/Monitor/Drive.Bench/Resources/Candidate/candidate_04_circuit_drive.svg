<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00050A"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F2037"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- PCB board background -->
  <rect x="60" y="60" width="392" height="392" rx="16" fill="#021428" stroke="#0EA5E9" stroke-width="2" opacity="0.6"/>
  <!-- Circuit traces -->
  <line x1="160" y1="256" x2="80" y2="256" stroke="#0EA5E9" stroke-width="2.5" opacity="0.7"/>
  <line x1="80" y1="256" x2="80" y2="160" stroke="#0EA5E9" stroke-width="2.5" opacity="0.7"/>
  <line x1="80" y1="160" x2="160" y2="160" stroke="#0EA5E9" stroke-width="2.5" opacity="0.7"/>
  <line x1="352" y1="256" x2="432" y2="256" stroke="#F97316" stroke-width="2.5" opacity="0.7"/>
  <line x1="432" y1="256" x2="432" y2="350" stroke="#F97316" stroke-width="2.5" opacity="0.7"/>
  <line x1="432" y1="350" x2="352" y2="350" stroke="#F97316" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="160" x2="256" y2="80" stroke="#22C55E" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="352" x2="256" y2="432" stroke="#A855F7" stroke-width="2" opacity="0.6"/>
  <!-- Solder pads -->
  <circle cx="80" cy="160" r="7" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="80" cy="256" r="7" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="432" cy="256" r="7" fill="#F97316" opacity="0.8"/>
  <circle cx="432" cy="350" r="7" fill="#F97316" opacity="0.8"/>
  <circle cx="256" cy="80" r="7" fill="#22C55E" opacity="0.8"/>
  <circle cx="256" cy="432" r="7" fill="#A855F7" opacity="0.8"/>
  <!-- Main NVMe chip -->
  <rect x="160" y="160" width="192" height="192" rx="10" fill="url(#chipGrad)" stroke="#0EA5E9" stroke-width="2.5"/>
  <!-- Chip internals -->
  <rect x="180" y="180" width="152" height="16" rx="4" fill="#0EA5E9" opacity="0.3"/>
  <rect x="180" y="204" width="100" height="8" rx="4" fill="#38BDF8" opacity="0.3"/>
  <rect x="180" y="220" width="120" height="8" rx="4" fill="#38BDF8" opacity="0.2"/>
  <!-- Speed indicator bars inside chip -->
  <rect x="180" y="250" width="152" height="8" rx="4" fill="#1E3A5F"/>
  <rect x="180" y="250" width="130" height="8" rx="4" fill="#0EA5E9" opacity="0.8"/>
  <rect x="180" y="266" width="152" height="8" rx="4" fill="#1E3A5F"/>
  <rect x="180" y="266" width="100" height="8" rx="4" fill="#F97316" opacity="0.8"/>
  <!-- Chip label -->
  <text x="256" y="310" font-family="monospace" font-size="13" fill="#38BDF8" text-anchor="middle">NVMe M.2</text>
  <text x="256" y="330" font-family="monospace" font-size="11" fill="#0EA5E9" text-anchor="middle">PCIe 4.0 x4</text>
  <!-- Corner mount holes -->
  <circle cx="80" cy="80" r="10" fill="none" stroke="#1E3A5F" stroke-width="2"/>
  <circle cx="432" cy="80" r="10" fill="none" stroke="#1E3A5F" stroke-width="2"/>
  <circle cx="80" cy="432" r="10" fill="none" stroke="#1E3A5F" stroke-width="2"/>
  <circle cx="432" cy="432" r="10" fill="none" stroke="#1E3A5F" stroke-width="2"/>
</svg>
