<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#050A05"/>
  <!-- Alarm bell body -->
  <path d="M512 200 Q512 200 512 200
    L348 480 Q320 540 320 600 L704 600 Q704 540 676 480 Z"
    fill="#2E7D32" opacity="0.85"/>
  <!-- Bell top knob -->
  <circle cx="512" cy="200" r="40" fill="#81C784" opacity="0.9"/>
  <!-- Bell bottom rim -->
  <rect x="310" y="600" width="404" height="40" rx="20" fill="#81C784" opacity="0.8"/>
  <!-- Bell clapper -->
  <line x1="512" y1="640" x2="512" y2="710" stroke="#81C784" stroke-width="24" stroke-linecap="round"/>
  <circle cx="512" cy="730" r="32" fill="#81C784" opacity="0.9"/>
  <!-- Alert exclamation mark inside bell -->
  <rect x="496" y="340" width="32" height="160" rx="14" fill="#81C784" opacity="0.9"/>
  <circle cx="512" cy="540" r="18" fill="#81C784" opacity="0.9"/>
  <!-- Alert rings radiating out -->
  <path d="M260 380 Q200 320 220 240" stroke="#2E7D32" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M220 460 Q140 380 170 270" stroke="#81C784" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M764 380 Q824 320 804 240" stroke="#2E7D32" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M804 460 Q884 380 854 270" stroke="#81C784" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- ENV change indicator sparks -->
  <circle cx="340" cy="280" r="12" fill="#81C784" opacity="0.5"/>
  <circle cx="684" cy="280" r="12" fill="#81C784" opacity="0.5"/>
</svg>
