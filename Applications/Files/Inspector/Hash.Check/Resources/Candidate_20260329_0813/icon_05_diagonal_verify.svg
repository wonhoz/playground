<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg5)"/>
  <!-- Layer 2: File → Hash → Checkmark flow diagonal -->
  <!-- File icon at top-left -->
  <rect x="155" y="210" width="180" height="220" rx="20" fill="white" opacity="0.9"/>
  <polygon points="275,210 335,210 335,270" fill="#059669" opacity="0.5"/>
  <line x1="185" y1="330" x2="305" y2="330" stroke="#059669" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="185" y1="375" x2="305" y2="375" stroke="#059669" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="185" y1="420" x2="270" y2="420" stroke="#059669" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <!-- Diagonal arrow 1 -->
  <path d="M 340 390 L 430 460" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <polygon points="430,460 400,442 418,470" fill="white"/>
  <!-- Hash block in center -->
  <rect x="440" y="390" width="220" height="140" rx="18" fill="white" opacity="0.92"/>
  <text x="550" y="445" font-family="monospace" font-size="52" fill="#059669" text-anchor="middle" font-weight="bold">SHA</text>
  <text x="550" y="505" font-family="monospace" font-size="50" fill="#6B7280" text-anchor="middle">256</text>
  <!-- Diagonal arrow 2 -->
  <path d="M 662 460 L 750 530" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <polygon points="750,530 720,512 738,540" fill="white"/>
  <!-- Checkmark result at bottom-right -->
  <circle cx="820" cy="630" r="110" fill="white" opacity="0.95"/>
  <polyline points="760,630 800,680 890,565" stroke="#059669" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Layer 3: Hash string diagonal decoration -->
  <text x="160" y="730" font-family="monospace" font-size="38" fill="white" opacity="0.4">a3f2e8d1b9c4...</text>
  <text x="200" y="790" font-family="monospace" font-size="38" fill="white" opacity="0.25">7c6a5b2d0e1f...</text>
</svg>
