<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Remote control + screen -->
  <!-- Screen -->
  <rect x="480" y="200" width="360" height="260" rx="20" fill="none" stroke="#FFB300" stroke-width="28"/>
  <rect x="480" y="200" width="360" height="48" rx="20" fill="#FFB300" opacity="0.4"/>
  <line x1="660" y1="460" x2="660" y2="510" stroke="#FFB300" stroke-width="22" stroke-linecap="round"/>
  <line x1="580" y1="510" x2="740" y2="510" stroke="#FFB300" stroke-width="22" stroke-linecap="round"/>
  <!-- Remote control body -->
  <rect x="180" y="300" width="200" height="460" rx="50" fill="none" stroke="#FF8F00" stroke-width="28"/>
  <!-- Directional buttons -->
  <circle cx="280" cy="520" r="70" fill="none" stroke="#FF8F00" stroke-width="24"/>
  <polygon points="280,468 296,496 264,496" fill="#FFB300"/>
  <polygon points="280,572 296,544 264,544" fill="#FFB300"/>
  <polygon points="228,520 256,504 256,536" fill="#FFB300"/>
  <polygon points="332,520 304,504 304,536" fill="#FFB300"/>
  <!-- Small buttons -->
  <circle cx="240" cy="660" r="22" fill="#FF8F00"/>
  <circle cx="320" cy="660" r="22" fill="#FFB300"/>
  <circle cx="240" cy="720" r="22" fill="#FFB300"/>
  <circle cx="320" cy="720" r="22" fill="#FF8F00"/>
  <!-- Power button -->
  <circle cx="280" cy="380" r="28" fill="none" stroke="#FFB300" stroke-width="22"/>
  <line x1="280" y1="354" x2="280" y2="370" stroke="#FFB300" stroke-width="22" stroke-linecap="round"/>
</svg>
