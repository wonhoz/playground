<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 하늘+흰색 -->
  <defs>
    <linearGradient id="bg05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg05)"/>
  <!-- Layer 2: 카테고리 격자 (2x3) -->
  <!-- 과학 (⚗️) -->
  <rect x="116" y="150" width="264" height="220" rx="22" fill="#E91E63" opacity="0.9"/>
  <text x="248" y="250" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">⚗️</text>
  <text x="248" y="340" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Science</text>
  <!-- 역사 (📜) -->
  <rect x="400" y="150" width="224" height="220" rx="22" fill="#FF9800" opacity="0.9"/>
  <text x="512" y="250" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">📜</text>
  <text x="512" y="340" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">History</text>
  <!-- IT (💻) -->
  <rect x="644" y="150" width="264" height="220" rx="22" fill="#2196F3" opacity="0.9"/>
  <text x="776" y="250" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">💻</text>
  <text x="776" y="340" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">IT</text>
  <!-- 스포츠 (⚽) -->
  <rect x="116" y="396" width="264" height="220" rx="22" fill="#4CAF50" opacity="0.9"/>
  <text x="248" y="496" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">⚽</text>
  <text x="248" y="586" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Sports</text>
  <!-- 음악 (🎵) -->
  <rect x="400" y="396" width="224" height="220" rx="22" fill="#9C27B0" opacity="0.9"/>
  <text x="512" y="496" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">🎵</text>
  <text x="512" y="586" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Music</text>
  <!-- 지리 (🌍) -->
  <rect x="644" y="396" width="264" height="220" rx="22" fill="#009688" opacity="0.9"/>
  <text x="776" y="496" font-family="Segoe UI Emoji, sans-serif" font-size="90" text-anchor="middle">🌍</text>
  <text x="776" y="586" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">Geo</text>
  <!-- Layer 3: 하단 타이틀 -->
  <text x="512" y="760" font-family="Segoe UI, sans-serif" font-size="78" font-weight="bold" fill="#1565C0" text-anchor="middle">Trivia.Cast</text>
  <text x="512" y="838" font-family="Segoe UI, sans-serif" font-size="52" fill="#1565C0" text-anchor="middle" opacity="0.7">12 Categories</text>
</svg>
