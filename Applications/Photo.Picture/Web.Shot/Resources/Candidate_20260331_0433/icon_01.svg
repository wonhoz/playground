<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 파랑 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg1)"/>
  <!-- Layer 2: 브라우저 창 -->
  <rect x="80" y="160" width="864" height="600" rx="24" fill="white" stroke="#1565C0" stroke-width="8"/>
  <!-- 브라우저 상단 바 -->
  <rect x="80" y="160" width="864" height="80" rx="24" fill="#1565C0"/>
  <rect x="80" y="200" width="864" height="40" fill="#1565C0"/>
  <!-- 닫기/최소화/최대화 버튼 -->
  <circle cx="140" cy="200" r="16" fill="#FF5252"/>
  <circle cx="188" cy="200" r="16" fill="#FFD600"/>
  <circle cx="236" cy="200" r="16" fill="#69F0AE"/>
  <!-- URL 주소창 -->
  <rect x="280" y="176" width="500" height="48" rx="24" fill="white"/>
  <text x="530" y="210" font-family="'Segoe UI', sans-serif" font-size="36" fill="#78909C" text-anchor="middle">https://example.com</text>
  <!-- 웹페이지 미리보기 콘텐츠 -->
  <rect x="100" y="260" width="824" height="480" rx="0" fill="#F5F5F5"/>
  <rect x="120" y="280" width="400" height="40" rx="8" fill="#E0E0E0"/>
  <rect x="120" y="336" width="600" height="24" rx="8" fill="#EEEEEE"/>
  <rect x="120" y="372" width="560" height="24" rx="8" fill="#EEEEEE"/>
  <rect x="120" y="408" width="580" height="24" rx="8" fill="#EEEEEE"/>
  <rect x="560" y="280" width="360" height="200" rx="12" fill="#BBDEFB"/>
  <!-- Layer 3: 카메라 셔터 배지 -->
  <circle cx="840" cy="760" r="160" fill="#FF6F00"/>
  <circle cx="840" cy="760" r="110" fill="white" opacity="0.2"/>
  <circle cx="840" cy="760" r="70" fill="#BF360C"/>
  <!-- 셔터 기호 (원 + 6각) -->
  <circle cx="840" cy="760" r="44" fill="white"/>
</svg>
