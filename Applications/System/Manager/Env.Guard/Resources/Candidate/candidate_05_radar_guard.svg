<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <linearGradient id="radar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Radar circles -->
  <circle cx="256" cy="256" r="180" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.2"/>
  <circle cx="256" cy="256" r="130" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="256" cy="256" r="80" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="256" cy="256" r="35" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Radar crosshair -->
  <line x1="76" y1="256" x2="436" y2="256" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="76" x2="256" y2="436" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <!-- Sweep beam -->
  <path d="M256 256 L400 130" stroke="url(#radar)" stroke-width="4" opacity="0.8"/>
  <path d="M256 256 L256 76 C300 76 360 110 400 130" fill="url(#radar)" opacity="0.15"/>
  <!-- ENV dots on radar -->
  <circle cx="330" cy="180" r="10" fill="#00ff88"/>
  <circle cx="180" cy="320" r="8" fill="#00ff88" opacity="0.7"/>
  <circle cx="300" cy="310" r="6" fill="#00ff88" opacity="0.5"/>
  <!-- ENV label -->
  <text x="256" y="265" font-family="monospace" font-size="20" text-anchor="middle" fill="url(#radar)" font-weight="bold">ENV</text>
  <!-- GUARD label below -->
  <text x="256" y="460" font-family="monospace" font-size="28" text-anchor="middle" fill="url(#radar)" opacity="0.8">GUARD</text>
</svg>
