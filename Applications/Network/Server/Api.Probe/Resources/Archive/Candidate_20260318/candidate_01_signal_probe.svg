<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0514"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 탐침 도구 -->
  <line x1="256" y1="100" x2="256" y2="340" stroke="#8B5CF6" stroke-width="4" filter="url(#glow)"/>
  <circle cx="256" cy="100" r="14" fill="#8B5CF6" opacity="0.9" filter="url(#glow)"/>
  <!-- 탐침 끝 -->
  <polygon points="248,340 264,340 256,370" fill="#A78BFA" filter="url(#glow)"/>
  <!-- 신호 파동들 -->
  <circle cx="256" cy="220" r="40" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <circle cx="256" cy="220" r="70" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <circle cx="256" cy="220" r="100" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.2" stroke-dasharray="5,6"/>
  <!-- HTTP 메서드 배지들 -->
  <rect x="80" y="140" width="65" height="24" rx="12" fill="#8B5CF6" opacity="0.3"/>
  <text x="112" y="156" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">GET</text>
  <rect x="80" y="176" width="65" height="24" rx="12" fill="#8B5CF6" opacity="0.25"/>
  <text x="112" y="192" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">POST</text>
  <rect x="80" y="212" width="65" height="24" rx="12" fill="#8B5CF6" opacity="0.2"/>
  <text x="112" y="228" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">PUT</text>
  <rect x="80" y="248" width="65" height="24" rx="12" fill="#8B5CF6" opacity="0.15"/>
  <text x="112" y="264" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">DELETE</text>
  <!-- 응답 배지들 -->
  <rect x="368" y="140" width="55" height="24" rx="12" fill="#10B981" opacity="0.3"/>
  <text x="395" y="156" text-anchor="middle" fill="#34D399" font-size="11" font-family="monospace" font-weight="bold">200</text>
  <rect x="368" y="176" width="55" height="24" rx="12" fill="#10B981" opacity="0.2"/>
  <text x="395" y="192" text-anchor="middle" fill="#34D399" font-size="11" font-family="monospace" font-weight="bold">201</text>
  <rect x="368" y="212" width="55" height="24" rx="12" fill="#EF4444" opacity="0.2"/>
  <text x="395" y="228" text-anchor="middle" fill="#FCA5A5" font-size="11" font-family="monospace" font-weight="bold">404</text>
  <rect x="368" y="248" width="55" height="24" rx="12" fill="#EF4444" opacity="0.15"/>
  <text x="395" y="264" text-anchor="middle" fill="#FCA5A5" font-size="11" font-family="monospace" font-weight="bold">500</text>
  <!-- 연결선 -->
  <line x1="145" y1="152" x2="216" y2="220" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="368" y1="152" x2="296" y2="220" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- 탐침 기반 -->
  <rect x="230" y="370" width="52" height="55" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <rect x="230" y="370" width="52" height="55" rx="6" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
</svg>