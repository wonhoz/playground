      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background (dark scanner) -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Layer 2: Barcode bars (path encoded) -->
  <!-- Barcode outer frame -->
  <rect x="120" y="280" width="780" height="380" rx="8" fill="#1A1A1A"/>
