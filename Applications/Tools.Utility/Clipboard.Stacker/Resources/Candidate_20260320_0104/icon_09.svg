<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030A10"/>
  <!-- Accordion panels expanding rightward -->
  <!-- Panel 1 (leftmost, most compressed) -->
  <rect x="140" y="280" width="80" height="464" rx="12" fill="#0277BD" opacity="0.85"/>
  <rect x="140" y="280" width="80" height="32" rx="10" fill="#4FC3F7" opacity="0.7"/>
  <rect x="148" y="326" width="64" height="14" rx="5" fill="#4FC3F7" opacity="0.35"/>
  <rect x="148" y="348" width="50" height="14" rx="5" fill="#4FC3F7" opacity="0.25"/>
  <!-- Panel 2 -->
  <rect x="234" y="280" width="100" height="464" rx="12" fill="#0277BD" opacity="0.75"/>
  <rect x="234" y="280" width="100" height="32" rx="10" fill="#4FC3F7" opacity="0.6"/>
  <rect x="242" y="326" width="84" height="14" rx="5" fill="#4FC3F7" opacity="0.3"/>
  <rect x="242" y="348" width="60" height="14" rx="5" fill="#4FC3F7" opacity="0.2"/>
  <!-- Panel 3 -->
  <rect x="348" y="280" width="130" height="464" rx="12" fill="#0277BD" opacity="0.65"/>
  <rect x="348" y="280" width="130" height="32" rx="10" fill="#4FC3F7" opacity="0.5"/>
  <rect x="356" y="326" width="114" height="14" rx="5" fill="#4FC3F7" opacity="0.25"/>
  <!-- Panel 4 (wider) -->
  <rect x="492" y="280" width="170" height="464" rx="12" fill="#0277BD" opacity="0.55"/>
  <rect x="492" y="280" width="170" height="32" rx="10" fill="#4FC3F7" opacity="0.4"/>
  <rect x="500" y="326" width="154" height="14" rx="5" fill="#4FC3F7" opacity="0.22"/>
  <rect x="500" y="348" width="100" height="14" rx="5" fill="#4FC3F7" opacity="0.15"/>
  <!-- Panel 5 (widest, expanding) -->
  <rect x="676" y="280" width="208" height="464" rx="12" fill="#0277BD" opacity="0.4"/>
  <rect x="676" y="280" width="208" height="32" rx="10" fill="#4FC3F7" opacity="0.3"/>
  <rect x="684" y="326" width="180" height="14" rx="5" fill="#4FC3F7" opacity="0.18"/>
  <!-- Expand arrow -->
  <polygon points="840,512 890,480 890,544" fill="#4FC3F7" opacity="0.7"/>
  <!-- Clipboard clip on top panels -->
  <rect x="164" y="256" width="32" height="44" rx="8" fill="#030A10"/>
  <rect x="168" y="248" width="24" height="20" rx="6" fill="#4FC3F7" opacity="0.6"/>
  <rect x="358" y="256" width="32" height="44" rx="8" fill="#030A10"/>
  <rect x="362" y="248" width="24" height="20" rx="6" fill="#4FC3F7" opacity="0.5"/>
</svg>
