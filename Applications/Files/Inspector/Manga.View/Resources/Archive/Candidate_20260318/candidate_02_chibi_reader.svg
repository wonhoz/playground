<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#12060e"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f8d0e0"/>
      <stop offset="100%" stop-color="#e8b0c8"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Manga/comic panel grid background -->
  <rect x="30" y="30" width="452" height="452" fill="none" stroke="#EC4899" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Panel dividers -->
  <line x1="280" y1="30" x2="280" y2="482" stroke="#EC4899" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="30" y1="280" x2="482" y2="280" stroke="#EC4899" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Manga book (held by chibi) -->
  <rect x="160" y="300" width="200" height="150" rx="8" fill="#1a0810" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.7" filter="url(#softglow)"/>
  <!-- Book pages -->
  <line x1="260" y1="300" x2="260" y2="450" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Book content lines -->
  <line x1="175" y1="325" x2="252" y2="325" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="175" y1="343" x2="248" y2="343" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="175" y1="361" x2="252" y2="361" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="175" y1="379" x2="240" y2="379" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="175" y1="397" x2="252" y2="397" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="268" y1="325" x2="340" y2="325" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="268" y1="343" x2="342" y2="343" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="268" y1="361" x2="340" y2="361" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="268" y1="379" x2="338" y2="379" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Small manga panel in book -->
  <rect x="270" y="400" width="70" height="40" rx="3" fill="#EC4899" fill-opacity="0.12" stroke="#EC4899" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Chibi character body -->
  <!-- Body -->
  <ellipse cx="256" cy="260" rx="50" ry="60" fill="#1a0810"/>
  <ellipse cx="256" cy="260" rx="50" ry="60" fill="#EC4899" fill-opacity="0.15"/>
  <!-- Outfit detail -->
  <rect x="226" y="240" width="60" height="50" rx="8" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Arms holding book -->
  <!-- Left arm -->
  <path d="M206,260 Q175,280 168,305" fill="none" stroke="#f8d0e0" stroke-width="12" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M306,260 Q337,280 344,305" fill="none" stroke="#f8d0e0" stroke-width="12" stroke-linecap="round"/>

  <!-- Chibi head (large, round - chibi style) -->
  <circle cx="256" cy="170" r="95" fill="url(#headGrad)" stroke="#EC4899" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Hair -->
  <path d="M161,150 Q170,80 256,75 Q342,80 351,150" fill="#2a0a1f" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Hair highlight -->
  <path d="M180,120 Q210,95 240,105" fill="none" stroke="#EC4899" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Hair bang strands -->
  <path d="M180,155 Q175,130 185,115" fill="none" stroke="#2a0a1f" stroke-width="8" stroke-linecap="round"/>
  <path d="M220,140 Q215,110 228,100" fill="none" stroke="#2a0a1f" stroke-width="7" stroke-linecap="round"/>
  <path d="M260,135 Q258,105 268,98" fill="none" stroke="#2a0a1f" stroke-width="7" stroke-linecap="round"/>

  <!-- Eyes (sparkly chibi eyes) -->
  <!-- Left eye -->
  <ellipse cx="218" cy="178" rx="20" ry="22" fill="#1a0810"/>
  <ellipse cx="218" cy="178" rx="16" ry="18" fill="#2a0a20"/>
  <circle cx="218" cy="178" r="10" fill="#EC4899"/>
  <circle cx="218" cy="178" r="6" fill="#0a0308"/>
  <circle cx="222" cy="173" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="215" cy="183" r="2" fill="white" fill-opacity="0.5"/>
  <!-- Right eye -->
  <ellipse cx="294" cy="178" rx="20" ry="22" fill="#1a0810"/>
  <ellipse cx="294" cy="178" rx="16" ry="18" fill="#2a0a20"/>
  <circle cx="294" cy="178" r="10" fill="#F472B6"/>
  <circle cx="294" cy="178" r="6" fill="#0a0308"/>
  <circle cx="298" cy="173" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="291" cy="183" r="2" fill="white" fill-opacity="0.5"/>

  <!-- Blush -->
  <ellipse cx="200" cy="198" rx="15" ry="9" fill="#FB7185" fill-opacity="0.5"/>
  <ellipse cx="312" cy="198" rx="15" ry="9" fill="#FB7185" fill-opacity="0.5"/>

  <!-- Mouth -->
  <path d="M238,215 Q256,228 274,215" fill="none" stroke="#2a0a1f" stroke-width="3" stroke-linecap="round"/>

  <!-- Heart/star sparkles around -->
  <text x="60" y="150" font-size="28" fill="#EC4899" fill-opacity="0.6" filter="url(#softglow)">♥</text>
  <text x="410" y="120" font-size="22" fill="#F472B6" fill-opacity="0.5">★</text>
  <text x="430" y="200" font-size="18" fill="#EC4899" fill-opacity="0.4">♥</text>
  <text x="55" y="240" font-size="20" fill="#FB7185" fill-opacity="0.45">★</text>

  <!-- Legs (small, chibi) -->
  <rect x="225" y="310" width="22" height="55" rx="11" fill="#f8d0e0"/>
  <rect x="265" y="310" width="22" height="55" rx="11" fill="#f8d0e0"/>
</svg>
