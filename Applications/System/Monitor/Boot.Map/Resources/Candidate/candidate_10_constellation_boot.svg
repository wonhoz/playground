  <circle cx="190" cy="75" r="1" fill="white" opacity="0.4"/>
  <circle cx="450" cy="170" r="1" fill="white" opacity="0.3"/>
  <!-- Constellation lines -->
  <line x1="160" y1="132" x2="256" y2="182" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
