<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="arrow02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow02">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip02">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg02)"/>
  <!-- 대각선 속도감 라인들 -->
  <g clip-path="url(#clip02)" opacity="0.15">
    <line x1="0" y1="200" x2="600" y2="800" stroke="#22D3EE" stroke-width="3"/>
    <line x1="100" y1="150" x2="700" y2="750" stroke="#22D3EE" stroke-width="2"/>
    <line x1="200" y1="100" x2="800" y2="700" stroke="#22D3EE" stroke-width="2"/>
    <line x1="300" y1="50" x2="900" y2="650" stroke="#22D3EE" stroke-width="2"/>
    <line x1="400" y1="0" x2="1000" y2="600" stroke="#22D3EE" stroke-width="2"/>
  </g>
  <g clip-path="url(#clip02)">
    <!-- Layer 2: 메인 큰 회피 화살표 (대각선 왼쪽 위) -->
    <!-- 화살표 몸통 -->
    <rect x="350" y="490" width="380" height="80" rx="40" fill="url(#arrow02)" transform="rotate(-40 512 530)"/>
    <!-- 화살표 머리 -->
    <polygon points="220,340 380,280 320,440" fill="url(#arrow02)"/>
    <!-- 화살표 강조 -->
    <polygon points="220,340 380,280 320,440" fill="#FFFFFF" opacity="0.2"/>

    <!-- Layer 3: 총알들 — 화살표 주변 위협 총알 -->
    <!-- 총알 그룹 우상단에서 쏟아짐 -->
    <g filter="url(#glow02)">
      <ellipse cx="680" cy="250" rx="14" ry="26" fill="#F472B6" transform="rotate(-40 680 250)"/>
      <ellipse cx="750" cy="300" rx="14" ry="26" fill="#F472B6" transform="rotate(-40 750 300)"/>
      <ellipse cx="720" cy="380" rx="14" ry="26" fill="#F472B6" transform="rotate(-40 720 380)"/>
      <ellipse cx="790" cy="430" rx="14" ry="26" fill="#F472B6" transform="rotate(-40 790 430)"/>
      <ellipse cx="820" cy="320" rx="14" ry="26" fill="#F472B6" transform="rotate(-40 820 320)"/>
      <ellipse cx="850" cy="480" rx="14" ry="26" fill="#F472B6" opacity="0.7" transform="rotate(-40 850 480)"/>
      <ellipse cx="650" cy="160" rx="14" ry="26" fill="#F472B6" opacity="0.7" transform="rotate(-40 650 160)"/>
      <ellipse cx="600" cy="320" rx="14" ry="26" fill="#F472B6" opacity="0.5" transform="rotate(-40 600 320)"/>
    </g>
    <!-- 회피 경로 잔상 -->
    <ellipse cx="400" cy="600" rx="30" ry="12" fill="#22D3EE" opacity="0.3"/>
    <ellipse cx="340" cy="560" rx="22" ry="9" fill="#22D3EE" opacity="0.2"/>
    <ellipse cx="280" cy="520" rx="15" ry="6" fill="#22D3EE" opacity="0.15"/>
    <!-- 플레이어 점 -->
    <circle cx="250" cy="490" r="28" fill="#22D3EE"/>
    <circle cx="250" cy="490" r="16" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="250" cy="490" r="8" fill="#22D3EE"/>
  </g>
</svg>
