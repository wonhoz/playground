<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100820"/>
      <stop offset="100%" style="stop-color:#200820"/>
    </linearGradient>
    <radialGradient id="circA" cx="40%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#4488FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4488FF;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="circB" cx="60%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#FF4488;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF4488;stop-opacity:0.1"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Venn circles -->
  <circle cx="210" cy="260" r="130" fill="url(#circA)" stroke="#4488FF" stroke-width="3"/>
  <circle cx="302" cy="260" r="130" fill="url(#circB)" stroke="#FF4488" stroke-width="3"/>
  <!-- Labels -->
  <text x="165" y="256" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#88BBFF">Table</text>
  <text x="165" y="276" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#88BBFF">A</text>
  <text x="347" y="256" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#FF88BB">Table</text>
  <text x="347" y="276" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#FF88BB">B</text>
  <!-- INNER JOIN highlight -->
  <text x="256" y="254" text-anchor="middle" font-family="monospace" font-size="11" fill="white" opacity="0.9">INNER</text>
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="white" opacity="0.9">JOIN</text>
  <!-- Title -->
  <text x="256" y="110" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="30" fill="#CCAAFF">SQL.Lens</text>
  <!-- Performance indicator -->
  <rect x="90" y="420" width="332" height="24" rx="5" fill="#1A1030"/>
