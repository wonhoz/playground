  <rect x="170" y="240" width="10" height="68" fill="url(#fatal02)"/>
  <rect x="200" y="252" width="60" height="18" rx="4" fill="#FF4747" opacity="0.9"/>
  <text x="272" y="267" font-family="Consolas, monospace" font-size="22" fill="#FF6B6B">FATAL</text>
