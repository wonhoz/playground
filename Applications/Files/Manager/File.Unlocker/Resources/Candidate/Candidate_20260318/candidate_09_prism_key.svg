<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0e0800"/>
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 입력 광선 (열쇠 형태) -->
  <rect x="55" y="248" width="115" height="6" rx="3" fill="#FBBF24" opacity="0.8" filter="url(#glow)"/>
  <!-- 프리즘 -->
  <polygon points="170,148 310,256 170,364" fill="url(#prismGrad)" stroke="#FCD34D" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <polygon points="170,148 310,256 170,202" fill="white" opacity="0.15"/>
  <!-- 굴절 출력들 (잠금 해제 키들) -->
  <!-- 키 1 -->
  <line x1="310" y1="226" x2="380" y2="175" stroke="#FEF3C7" stroke-width="3.5" opacity="0.85" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 키 2 -->
  <line x1="310" y1="244" x2="390" y2="220" stroke="#FBBF24" stroke-width="3.5" opacity="0.9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 키 3 (중앙) -->
  <line x1="310" y1="256" x2="400" y2="256" stroke="#FCD34D" stroke-width="4.5" opacity="0.95" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 키 4 -->
  <line x1="310" y1="268" x2="390" y2="292" stroke="#FBBF24" stroke-width="3.5" opacity="0.9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 키 5 -->
  <line x1="310" y1="286" x2="380" y2="337" stroke="#F59E0B" stroke-width="3" opacity="0.8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 열쇠 아이콘들 끝에 -->
  <!-- 키 1 끝 -->
  <circle cx="380" cy="175" r="10" fill="#FBBF24" opacity="0.9" filter="url(#glow)"/>
  <rect x="388" y="171" width="22" height="8" rx="4" fill="#F59E0B" opacity="0.85"/>
  <rect x="402" y="179" width="6" height="10" rx="2" fill="#D97706" opacity="0.8"/>
  <!-- 키 3 끝 (중앙, 가장 크게) -->
  <circle cx="400" cy="256" r="14" fill="#FCD34D" opacity="0.9" filter="url(#glow)"/>
  <rect x="412" y="250" width="30" height="11" rx="5" fill="#FBBF24" opacity="0.9"/>
  <rect x="430" y="261" width="8" height="14" rx="3" fill="#F59E0B" opacity="0.85"/>
  <rect x="440" y="261" width="6" height="10" rx="2" fill="#D97706" opacity="0.8"/>
  <!-- 키 5 끝 -->
  <circle cx="380" cy="337" r="10" fill="#F59E0B" opacity="0.85" filter="url(#glow)"/>
  <rect x="388" y="333" width="22" height="8" rx="4" fill="#D97706" opacity="0.8"/>
  <rect x="400" y="341" width="6" height="10" rx="2" fill="#92400E" opacity="0.8"/>
  <!-- 자물쇠들 (오른쪽, 키 수령) -->
  <rect x="388" y="160" width="18" height="13" rx="3" fill="#92400E" opacity="0.6"/>
  <rect x="422" y="248" width="22" height="16" rx="4" fill="#B45309" opacity="0.7"/>
  <rect x="388" y="322" width="18" height="13" rx="3" fill="#92400E" opacity="0.6"/>
  <!-- 잠금 해제 빛 효과 -->
  <circle cx="430" cy="256" r="45" fill="#F59E0B" opacity="0.04" filter="url(#glow)"/>
</svg>