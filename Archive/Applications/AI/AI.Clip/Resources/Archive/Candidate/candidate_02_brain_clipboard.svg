<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1e0533"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="40%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <ellipse cx="200" cy="240" rx="160" ry="150" fill="url(#brainGlow)"/>
  <!-- Brain shape (simplified) -->
  <path d="M160 200 C155 170 170 150 190 155 C195 140 215 135 228 148 C240 130 265 128 272 148 C290 140 308 155 300 175 C320 178 325 200 310 215 C318 232 308 255 290 255 C285 275 268 285 252 278 C242 295 218 295 208 278 C190 285 172 272 170 255 C152 248 148 225 160 200Z" fill="none" stroke="url(#brainGrad)" stroke-width="3" filter="url(#glow)"/>
  <!-- Brain fold lines -->
  <path d="M190 175 C200 165 215 170 210 185" fill="none" stroke="#ff6ec7" stroke-width="2" opacity="0.6"/>
  <path d="M240 160 C250 152 262 158 258 172" fill="none" stroke="#ff6ec7" stroke-width="2" opacity="0.6"/>
  <path d="M180 215 C195 205 215 212 210 228" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
  <path d="M255 195 C268 187 280 198 272 212" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
  <path d="M185 248 C198 240 215 248 208 262" fill="none" stroke="#ff6ec7" stroke-width="1.5" opacity="0.5"/>
  <!-- Glowing nodes on brain -->
  <circle cx="200" cy="190" r="5" fill="#ff6ec7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="250" cy="178" r="4" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="285" cy="215" r="5" fill="#ff6ec7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="215" cy="255" r="4" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <!-- Clipboard on right -->
  <rect x="295" y="220" width="145" height="190" rx="10" fill="none" stroke="url(#clipGrad)" stroke-width="2.5"/>
  <rect x="295" y="220" width="145" height="190" rx="10" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="344" y="210" width="48" height="24" rx="7" fill="none" stroke="url(#clipGrad)" stroke-width="2.5"/>
  <rect x="352" y="215" width="32" height="14" rx="4" fill="#60a5fa" fill-opacity="0.4"/>
  <!-- Lines on clipboard -->
  <line x1="315" y1="265" x2="422" y2="265" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
  <line x1="315" y1="290" x2="410" y2="290" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
  <line x1="315" y1="315" x2="415" y2="315" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <line x1="315" y1="340" x2="400" y2="340" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <line x1="315" y1="365" x2="390" y2="365" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <!-- Connection beam brain to clipboard -->
  <path d="M300 225 C280 220 285 255 295 255" fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <circle cx="300" cy="225" r="5" fill="#a855f7" filter="url(#glow)"/>
</svg>