<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Folder.Purge | 빈 폴더+X 금지 | 중앙심볼 | #F97316 오렌지 -->
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="160" fill="#431407"/>
  <!-- Layer 2: Large folder shape -->
  <!-- Folder tab -->
  <path d="M180 420 L180 420 L310 420 L355 370 L560 370 L560 420" fill="#C2410C" stroke="none"/>
  <rect x="180" y="420" width="664" height="360" rx="18" fill="#EA580C"/>
  <!-- Folder interior (empty) -->
  <rect x="210" y="450" width="604" height="300" rx="12" fill="#FED7AA" opacity="0.12"/>
  <!-- Empty indicator - dashed border -->
  <rect x="310" y="490" width="400" height="220" rx="10" fill="none" stroke="#FED7AA" stroke-width="4" stroke-dasharray="18,10"/>
  <!-- Layer 3: Large X mark -->
  <circle cx="780" cy="300" r="110" fill="#DC2626"/>
  <line x1="718" y1="238" x2="842" y2="362" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="842" y1="238" x2="718" y2="362" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Empty label in folder -->
  <text x="512" y="620" font-family="Arial,sans-serif" font-size="32" fill="#FED7AA" text-anchor="middle" opacity="0.6">비어있음</text>
</svg>
