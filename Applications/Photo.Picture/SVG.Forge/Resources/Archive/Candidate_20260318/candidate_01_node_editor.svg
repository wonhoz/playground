  <rect x="330" y="318" width="100" height="44" rx="8" fill="url(#nodeg)" stroke="#A855F7" stroke-width="1.5" opacity="0.8"/>
  <circle cx="330" cy="340" r="5" fill="#A855F7" opacity="0.9"/>
