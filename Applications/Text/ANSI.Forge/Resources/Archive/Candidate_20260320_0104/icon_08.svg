<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#030005"/>
  <!-- 격자칸채우기: grid cells being filled with colors -->
  <!-- Grid background -->
  <rect x="200" y="200" width="624" height="624" rx="12" fill="#4A148C" opacity="0.15"/>
  <!-- Grid lines -->
  <line x1="200" y1="356" x2="824" y2="356" stroke="#4A148C" stroke-width="4"/>
  <line x1="200" y1="512" x2="824" y2="512" stroke="#4A148C" stroke-width="4"/>
  <line x1="200" y1="668" x2="824" y2="668" stroke="#4A148C" stroke-width="4"/>
  <line x1="356" y1="200" x2="356" y2="824" stroke="#4A148C" stroke-width="4"/>
  <line x1="512" y1="200" x2="512" y2="824" stroke="#4A148C" stroke-width="4"/>
  <line x1="668" y1="200" x2="668" y2="824" stroke="#4A148C" stroke-width="4"/>
  <!-- Filled cells -->
  <rect x="204" y="204" width="148" height="148" rx="4" fill="#CE93D8"/>
  <rect x="360" y="204" width="148" height="148" rx="4" fill="#4A148C"/>
  <rect x="516" y="204" width="148" height="148" rx="4" fill="#CE93D8" opacity="0.7"/>
  <rect x="204" y="360" width="148" height="148" rx="4" fill="#4A148C"/>
  <rect x="360" y="360" width="148" height="148" rx="4" fill="#CE93D8" opacity="0.5"/>
  <rect x="516" y="360" width="148" height="148" rx="4" fill="#CE93D8"/>
  <rect x="672" y="360" width="148" height="148" rx="4" fill="#4A148C" opacity="0.7"/>
  <rect x="204" y="516" width="148" height="148" rx="4" fill="#CE93D8" opacity="0.8"/>
  <rect x="360" y="516" width="148" height="148" rx="4" fill="#CE93D8" opacity="0.3"/>
  <!-- Cursor/pencil on top right cell -->
  <rect x="672" y="204" width="148" height="148" rx="4" fill="#4A148C" opacity="0.2" stroke="#CE93D8" stroke-width="6"/>
  <!-- Pencil icon in that cell -->
  <line x1="720" y1="248" x2="790" y2="318" stroke="#CE93D8" stroke-width="12" stroke-linecap="round"/>
  <polygon points="790,318 772,330 778,310" fill="#CE93D8"/>
</svg>