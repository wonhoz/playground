<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: 따뜻한 오렌지 배경 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg3)"/>

  <!-- Layer 2: 열리는 자물쇠 -->
  <!-- 자물쇠 몸체 -->
  <rect x="312" y="460" width="400" height="360" rx="36" fill="url(#lockGrad)"/>
  <!-- 자물쇠 몸체 하이라이트 -->
  <rect x="312" y="460" width="400" height="80" rx="36" fill="#FFE082" opacity="0.4"/>
  <!-- 열쇠 구멍 -->
  <circle cx="512" cy="620" r="44" fill="#E65100"/>
  <rect x="492" y="620" width="40" height="80" rx="10" fill="#E65100"/>
  <!-- 열린 고리 (활) — 오른쪽으로 열려 있음 -->
  <path d="M370 460 Q370 200 512 200 Q654 200 654 360" stroke="#FF8F00" stroke-width="64" stroke-linecap="round" fill="none"/>
  <!-- 열린 고리 끝 부분 (오른쪽 빈 공간) -->
  <path d="M654 360 Q654 460 730 460" stroke="none" fill="none"/>
  <!-- 고리 하이라이트 -->
  <path d="M370 460 Q370 200 512 200 Q654 200 654 360" stroke="#FFD740" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- 자물쇠에서 나오는 반짝이 -->
  <circle cx="720" cy="340" r="20" fill="#FF8F00" opacity="0.8"/>
  <circle cx="780" cy="280" r="14" fill="#FFD740" opacity="0.7"/>
  <circle cx="750" cy="220" r="10" fill="#FFEE58" opacity="0.6"/>
  <line x1="720" y1="300" x2="760" y2="240" stroke="#FF8F00" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Layer 3: 열쇠 아이콘 (진입하는 모습) -->
  <g transform="translate(650 550) rotate(-45)">
    <!-- 열쇠 손잡이 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#4CAF50" stroke-width="22"/>
    <circle cx="0" cy="0" r="40" fill="#4CAF50" opacity="0.4"/>
    <!-- 열쇠 날 -->
    <rect x="52" y="-14" width="180" height="28" rx="10" fill="#4CAF50"/>
    <rect x="170" y="14" width="26" height="36" rx="6" fill="#388E3C"/>
    <rect x="200" y="14" width="20" height="26" rx="5" fill="#388E3C"/>
  </g>

  <!-- UNLOCKED 배지 -->
  <rect x="280" y="870" width="464" height="84" rx="22" fill="#2E7D32"/>
  <text x="512" y="914" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="50" fill="white" text-anchor="middle" dominant-baseline="middle">🔓 Unlocked!</text>
</svg>
