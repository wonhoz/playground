<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <clipPath id="cp"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#cp)">
    <!-- 레이어드 카드들 (뒤에서 앞으로) -->

    <!-- 맨 뒤: 게임 카드 (게임 컨트롤러) -->
    <rect x="60" y="100" width="380" height="480" rx="28" fill="#37474F" transform="rotate(-14 250 340)"/>
    <text x="250" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(-14 250 280)">🎮</text>
    <text x="250" y="400" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#B0BEC5" text-anchor="middle" transform="rotate(-14 250 400)">게임</text>

    <!-- 역사 카드 (두루마리) -->
    <rect x="140" y="120" width="380" height="480" rx="28" fill="#6D4C41" transform="rotate(-6 330 360)"/>
    <text x="330" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(-6 330 310)">📜</text>
    <text x="330" y="440" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#D7CCC8" text-anchor="middle" transform="rotate(-6 330 440)">역사</text>

    <!-- 음악 카드 (음표) -->
    <rect x="240" y="110" width="380" height="480" rx="28" fill="#880E4F" transform="rotate(5 430 350)"/>
    <text x="430" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="140" text-anchor="middle" transform="rotate(5 430 300)">🎵</text>
    <text x="430" y="440" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="52" fill="#F8BBD0" text-anchor="middle" transform="rotate(5 430 440)">음악</text>

    <!-- 앞 메인: 과학 카드 (플라스크) -->
    <rect x="380" y="90" width="580" height="560" rx="32" fill="#1565C0"/>
    <text x="670" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="200" text-anchor="middle">⚗️</text>
    <text x="670" y="490" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" text-anchor="middle">과학</text>
    <!-- 과학 카드 아래 카테고리 라벨 -->
    <rect x="400" y="520" width="540" height="60" rx="16" fill="#0D47A1"/>
    <text x="670" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="38" fill="#90CAF9" text-anchor="middle">12개 카테고리 퀴즈</text>

    <!-- 타이틀 -->
    <rect x="140" y="780" width="744" height="70" rx="24" fill="#0D47A1"/>
    <text x="512" y="827" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="#FFD600" text-anchor="middle">TRIVIA.CAST</text>
  </g>
</svg>
