  <rect x="380" y="287" width="530" height="46" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="287" width="238" height="46" rx="6" fill="#FF7043"/>
  <text x="599" y="310" font-family="Arial, sans-serif" font-size="30" fill="white"
        text-anchor="middle" dominant-baseline="middle">28.1 GB</text>

  <!-- Videos: 86.5 GB -->
  <text x="90" y="392" font-family="Arial, sans-serif" font-size="34" fill="#37474F"
        dominant-baseline="middle">📁 Videos</text>
  <rect x="380" y="369" width="530" height="46" rx="6" fill="#ECEFF1"/>
  <rect x="380" y="369" width="498" height="46" rx="6" fill="#7B1FA2"/>
