<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Literal: CD disc + play button center -->
  <circle cx="512" cy="512" r="460" fill="#141414"/>
  <!-- CD outer ring (rainbow-ish shimmer via gradient arcs) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#FF4081" stroke-width="6" opacity="0.5"/>
  <circle cx="512" cy="512" r="406" fill="none" stroke="#FF9100" stroke-width="5" opacity="0.4"/>
  <circle cx="512" cy="512" r="392" fill="none" stroke="#FFEA00" stroke-width="5" opacity="0.4"/>
  <circle cx="512" cy="512" r="378" fill="none" stroke="#00E676" stroke-width="5" opacity="0.4"/>
  <circle cx="512" cy="512" r="364" fill="none" stroke="#00B0FF" stroke-width="5" opacity="0.4"/>
  <!-- CD silver area -->
  <circle cx="512" cy="512" r="350" fill="#2A2A2A"/>
  <!-- Data spiral suggestion -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#3A3A3A" stroke-width="10"/>
  <circle cx="512" cy="512" r="250" fill="none" stroke="#3A3A3A" stroke-width="8"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#3A3A3A" stroke-width="7"/>
  <!-- Center hub -->
  <circle cx="512" cy="512" r="90" fill="#1DB954"/>
  <circle cx="512" cy="512" r="30" fill="#141414"/>
  <!-- Play arrow on hub -->
  <path d="M490 480 L490 544 L554 512 Z" fill="#141414"/>
</svg>
