<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#FF6B35"/>
  <!-- Flame glow -->
  <ellipse cx="512" cy="680" rx="220" ry="80" fill="#FF8C00" opacity="0.5"/>
  <!-- Layer 2: Anvil -->
  <rect x="330" y="630" width="360" height="60" rx="10" fill="#374151"/>
  <rect x="360" y="590" width="300" height="55" rx="8" fill="#4B5563"/>
  <rect x="380" y="575" width="260" height="28" rx="5" fill="#6B7280"/>
  <!-- "AI" text on anvil (glowing) -->
  <text x="512" y="623" font-family="Arial,sans-serif" font-size="52" fill="#FDE047" text-anchor="middle" font-weight="bold" opacity="0.95">AI</text>
  <!-- Layer 2: Hammer -->
  <g transform="rotate(-35 512 400)">
    <rect x="460" y="280" width="90" height="220" rx="12" fill="#C0C0C0"/>
    <rect x="430" y="270" width="150" height="80" rx="14" fill="#9CA3AF"/>
    <rect x="432" y="273" width="146" height="74" rx="12" fill="#D1D5DB"/>
  </g>
  <!-- Layer 3: Sparks -->
  <circle cx="430" cy="550" r="10" fill="#FDE047" opacity="0.9"/>
  <circle cx="475" cy="530" r="7" fill="#FDE047" opacity="0.75"/>
  <circle cx="560" cy="540" r="9" fill="#FFA500" opacity="0.85"/>
  <circle cx="610" cy="555" r="6" fill="#FDE047" opacity="0.7"/>
  <line x1="420" y1="545" x2="400" y2="520" stroke="#FDE047" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="600" y1="545" x2="625" y2="515" stroke="#FDE047" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>