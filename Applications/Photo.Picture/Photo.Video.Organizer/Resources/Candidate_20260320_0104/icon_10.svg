<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Calendar + Camera icon -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#080010"/>
  <!-- Calendar body -->
  <rect x="160" y="300" width="500" height="460" rx="28" fill="#4A148C"/>
  <!-- Calendar header bar -->
  <rect x="160" y="300" width="500" height="90" rx="28" fill="#7B1FA2"/>
  <rect x="160" y="356" width="500" height="34" fill="#7B1FA2"/>
  <!-- Calendar rings -->
  <circle cx="290" cy="290" r="26" fill="#CE93D8"/>
  <circle cx="460" cy="290" r="26" fill="#CE93D8"/>
  <!-- Calendar grid dots (days) -->
  <circle cx="220" cy="460" r="14" fill="#CE93D8" opacity="0.7"/>
  <circle cx="296" cy="460" r="14" fill="#CE93D8" opacity="0.7"/>
  <circle cx="372" cy="460" r="14" fill="#CE93D8" opacity="0.7"/>
  <circle cx="448" cy="460" r="14" fill="#CE93D8" opacity="0.7"/>
  <circle cx="524" cy="460" r="14" fill="#CE93D8" opacity="0.7"/>
  <circle cx="220" cy="540" r="14" fill="#CE93D8" opacity="0.5"/>
  <circle cx="296" cy="540" r="14" fill="#CE93D8" opacity="0.5"/>
  <circle cx="372" cy="540" r="14" fill="#CE93D8" opacity="0.9"/>
  <circle cx="448" cy="540" r="14" fill="#CE93D8" opacity="0.5"/>
  <circle cx="524" cy="540" r="14" fill="#CE93D8" opacity="0.5"/>
  <circle cx="220" cy="620" r="14" fill="#CE93D8" opacity="0.4"/>
  <circle cx="296" cy="620" r="14" fill="#CE93D8" opacity="0.4"/>
  <circle cx="372" cy="620" r="14" fill="#CE93D8" opacity="0.4"/>
  <!-- Camera (overlapping, bottom right) -->
  <rect x="520" y="560" width="300" height="220" rx="28" fill="#1A0030" stroke="#CE93D8" stroke-width="10"/>
  <!-- Camera top bump -->
  <rect x="580" y="540" width="90" height="34" rx="12" fill="#CE93D8"/>
  <!-- Camera lens -->
  <circle cx="670" cy="670" r="72" fill="#080010" stroke="#CE93D8" stroke-width="10"/>
  <circle cx="670" cy="670" r="48" fill="#CE93D8" opacity="0.3"/>
  <circle cx="670" cy="670" r="28" fill="#CE93D8" opacity="0.7"/>
  <!-- Camera shutter button -->
  <circle cx="770" cy="590" r="18" fill="#CE93D8"/>
</svg>
