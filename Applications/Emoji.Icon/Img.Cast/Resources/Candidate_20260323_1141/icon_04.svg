<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="180" fill="#263238"/>
  <!-- Layer 2: File icon -->
  <rect x="262" y="200" width="500" height="380" rx="20" fill="#37474F"/>
  <!-- File corner fold -->
  <polygon points="662,200 762,300 662,300" fill="#263238"/>
  <polygon points="662,200 762,300 762,200" fill="#546E7A"/>
  <!-- Layer 3: Progress ring -->
  <circle cx="512" cy="390" r="180" fill="none" stroke="#37474F" stroke-width="36"/>
  <circle cx="512" cy="390" r="180" fill="none" stroke="#00BCD4" stroke-width="36"
    stroke-dasharray="754" stroke-dashoffset="188" stroke-linecap="round"
    transform="rotate(-90 512 390)"/>
  <text x="512" y="410" font-family="Arial" font-size="80" font-weight="bold" fill="white" text-anchor="middle">75%</text>
  <!-- Output files below -->
  <rect x="230" y="700" width="130" height="120" rx="12" fill="#0D47A1"/>
  <rect x="380" y="720" width="130" height="100" rx="12" fill="#2E7D32"/>
  <rect x="530" y="710" width="130" height="110" rx="12" fill="#E65100"/>
  <text x="295" y="778" font-family="Arial" font-size="22" fill="white" text-anchor="middle">PNG</text>
  <text x="445" y="790" font-family="Arial" font-size="22" fill="white" text-anchor="middle">JPG</text>
  <text x="595" y="786" font-family="Arial" font-size="22" fill="white" text-anchor="middle">ICO</text>
</svg>