<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="70%">
      <stop offset="0%" stop-color="#3E0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </radialGradient>
    <linearGradient id="lava" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#DD2C00"/>
      <stop offset="50%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FFAB40"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DD2C00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="350" rx="200" ry="120" fill="url(#glow)"/>
  <!-- Lava pool -->
  <ellipse cx="256" cy="420" rx="180" ry="44" fill="#BF360C"/>
  <ellipse cx="256" cy="415" rx="150" ry="30" fill="#DD2C00"/>
  <!-- Lava bubbles -->
  <g fill="#FF6D00">
    <circle cx="200" cy="400" r="18" opacity="0.9"/>
    <circle cx="256" cy="395" r="22" opacity="0.95"/>
    <circle cx="320" cy="403" r="16" opacity="0.9"/>
    <circle cx="160" cy="410" r="12" opacity="0.7"/>
    <circle cx="360" cy="408" r="14" opacity="0.8"/>
  </g>
  <!-- Lava stream falling -->
  <path d="M 220 100 Q 230 180 240 260 Q 248 330 252 380" stroke="url(#lava)" stroke-width="36" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 292 100 Q 282 180 272 260 Q 264 330 260 380" stroke="url(#lava)" stroke-width="36" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Sparks -->
  <g fill="#FFD740">
    <circle cx="190" cy="180" r="5"/>
    <circle cx="330" cy="200" r="4"/>
    <circle cx="170" cy="280" r="6"/>
    <circle cx="350" cy="260" r="5"/>
    <circle cx="210" cy="150" r="4"/>
    <circle cx="305" cy="160" r="3"/>
  </g>
  <!-- Top vent -->
  <path d="M 196 80 Q 256 60 316 80 L 296 110 L 216 110 Z" fill="#DD2C00" opacity="0.8"/>
</svg>
