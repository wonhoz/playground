<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background — warm coral pink -->
  <rect width="1024" height="1024" rx="190" fill="#FD79A8"/>

  <!-- Layer 2: Gamepad silhouette (left) + Hammer (right) — Forge metaphor -->

  <!-- Gamepad (simplified silhouette, left side) -->
  <rect x="80" y="380" width="440" height="280" rx="80" fill="#FFFFFF" stroke="#C0392B" stroke-width="16"/>
  <!-- Left grip -->
  <ellipse cx="148" cy="616" rx="80" ry="64" fill="#FFFFFF" stroke="#C0392B" stroke-width="16"/>
  <!-- Right grip -->
  <ellipse cx="452" cy="616" rx="80" ry="64" fill="#FFFFFF" stroke="#C0392B" stroke-width="16"/>

  <!-- D-pad simple cross on pad -->
  <rect x="136" y="462" width="80" height="32" rx="8" fill="#B2BEC3"/>
  <rect x="156" y="442" width="40" height="72" rx="8" fill="#B2BEC3"/>

  <!-- ABXY on pad (2×2) -->
  <circle cx="420" cy="438" r="32" fill="#FFEAA7" stroke="#FFFFFF" stroke-width="6"/>
  <text x="420" y="452" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="900" fill="#2D3436">Y</text>
  <circle cx="370" cy="488" r="32" fill="#74B9FF" stroke="#FFFFFF" stroke-width="6"/>
  <text x="370" y="502" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="900" fill="#FFFFFF">X</text>
  <circle cx="468" cy="488" r="32" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="6"/>
  <text x="468" y="502" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="900" fill="#FFFFFF">B</text>
  <circle cx="420" cy="538" r="32" fill="#00B894" stroke="#FFFFFF" stroke-width="6"/>
  <text x="420" y="552" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="900" fill="#FFFFFF">A</text>

  <!-- Spark/impact lines (Forge impact) -->
  <line x1="560" y1="380" x2="600" y2="340" stroke="#FFEAA7" stroke-width="14" stroke-linecap="round"/>
  <line x1="580" y1="400" x2="628" y2="380" stroke="#FFEAA7" stroke-width="10" stroke-linecap="round"/>
  <line x1="556" y1="420" x2="590" y2="424" stroke="#FFEAA7" stroke-width="8" stroke-linecap="round"/>
  <line x1="572" y1="358" x2="596" y2="404" stroke="#FFEAA7" stroke-width="6" stroke-linecap="round"/>

  <!-- Layer 3: Hammer (right side, large) -->
  <!-- Hammer handle -->
  <rect x="680" y="480" width="60" height="340" rx="20" fill="#E67E22" stroke="#FFFFFF" stroke-width="12"
        transform="rotate(-30 710 650)"/>
  <!-- Hammer head -->
  <rect x="600" y="280" width="220" height="160" rx="24" fill="#F9CA24" stroke="#FFFFFF" stroke-width="16"
        transform="rotate(-30 710 360)"/>
  <!-- Hammer face highlight -->
  <rect x="610" y="290" width="200" height="60" rx="16" fill="#FFEAA7" opacity="0.6"
        transform="rotate(-30 710 320)"/>

  <!-- "FORGE" text with fire -->
  <text x="512" y="900" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">🔥 FORGE</text>
</svg>
