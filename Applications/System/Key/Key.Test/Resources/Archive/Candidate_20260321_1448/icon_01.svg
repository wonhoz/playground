    <rect x="620" y="404" width="34" height="34" rx="5"/>
    <rect x="660" y="404" width="34" height="34" rx="5"/>
    <rect x="700" y="404" width="34" height="34" rx="5"/>
  </g>

  <!-- ASDF 행 -->
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="235" y="446" width="34" height="34" rx="5"/>
    <rect x="275" y="446" width="34" height="34" rx="5"/>
    <rect x="315" y="446" width="34" height="34" rx="5"/>
    <rect x="355" y="446" width="34" height="34" rx="5"/>
    <rect x="395" y="446" width="34" height="34" rx="5"/>
    <rect x="435" y="446" width="34" height="34" rx="5"/>
    <rect x="475" y="446" width="34" height="34" rx="5"/>
    <rect x="515" y="446" width="34" height="34" rx="5"/>
    <rect x="555" y="446" width="34" height="34" rx="5"/>
  </g>
  <g fill="#222233" stroke="#2A2A40" stroke-width="1.5">
    <rect x="595" y="446" width="34" height="34" rx="5"/>
    <rect x="635" y="446" width="34" height="34" rx="5"/>
  </g>

  <!-- Space / 하단 -->
  <g fill="#1A3020" stroke="#2A4030" stroke-width="1.5">
    <rect x="168" y="488" width="56" height="34" rx="5"/><!-- L.Shift 일부 -->
    <rect x="168" y="530" width="48" height="34" rx="5"/><!-- L.Ctrl -->
    <rect x="222" y="530" width="38" height="34" rx="5"/><!-- L.Win -->
  </g>
  <!-- Space (크게, 초록 강조) -->
  <rect x="296" y="530" width="180" height="34" rx="5" fill="#1A3020" stroke="#2A4030" stroke-width="1.5"/>
