  <text x="279" y="537" font-family="Arial,sans-serif" font-size="14" fill="#FDE68A" text-anchor="middle">AI 프롬프트</text>
  <!-- Particles floating out -->
  <circle cx="810" cy="300" r="12" fill="#FDE68A" opacity="0.85"/>
  <circle cx="840" cy="360" r="8" fill="#60A5FA" opacity="0.75"/>
  <circle cx="800" cy="420" r="10" fill="#34D399" opacity="0.7"/>
  <circle cx="850" cy="470" r="7" fill="#F472B6" opacity="0.65"/>
