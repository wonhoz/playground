<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c3-clip">
      <rect width="1024" height="1024" rx="190"/>
    </clipPath>
    <linearGradient id="c3-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C03A10"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c3-clip)">
    <!-- Background: warm orange-red -->
    <rect width="1024" height="1024" fill="url(#c3-bg)"/>
    <circle cx="512" cy="512" r="450" fill="#E05520" opacity="0.25"/>

    <!-- Trash can body -->
    <rect x="310" y="380" width="404" height="460" rx="28" fill="#FFFFFF" opacity="0.95"/>
    <!-- Trash can lid (open, tilted) -->
    <rect x="280" y="300" width="464" height="68" rx="18" fill="#F0F0F0" transform="rotate(-12 512 334)"/>
    <!-- Lid handle -->
    <rect x="462" y="268" width="100" height="32" rx="12" fill="#E0E0E0" transform="rotate(-12 512 284)"/>

    <!-- Trash can lines -->
    <line x1="420" y1="420" x2="420" y2="800" stroke="#FFB8A0" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
    <line x1="512" y1="420" x2="512" y2="800" stroke="#FFB8A0" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
    <line x1="604" y1="420" x2="604" y2="800" stroke="#FFB8A0" stroke-width="18" stroke-linecap="round" opacity="0.7"/>

    <!-- Flies / dust leaving the trash (empty!) -->
    <circle cx="240" cy="350" r="14" fill="#FFD166" opacity="0.8"/>
    <circle cx="200" cy="290" r="9" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="780" cy="310" r="11" fill="#FFD166" opacity="0.7"/>
    <circle cx="810" cy="380" r="8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="760" cy="240" r="7" fill="#FFD166" opacity="0.6"/>

    <!-- Empty label inside can -->
    <rect x="380" y="560" width="264" height="60" rx="12" fill="#FF6B35" opacity="0.15"/>
    <rect x="415" y="576" width="100" height="14" rx="4" fill="#FF6B35" opacity="0.25"/>
    <rect x="415" y="598" width="140" height="14" rx="4" fill="#FF6B35" opacity="0.20"/>

    <!-- Checkmark at bottom of can -->
    <circle cx="512" cy="660" r="52" fill="#FF6B35" opacity="0.2"/>
    <polyline points="484,660 506,682 548,632"
              fill="none" stroke="#FF6B35" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
