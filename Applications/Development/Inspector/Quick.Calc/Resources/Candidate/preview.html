<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quick.Calc — Icon Candidates</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 32px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #ffffff; }
  p.desc { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: #252525; border: 1px solid #333; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: transform .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); border-color: #ffd200; box-shadow: 0 8px 24px rgba(255,210,0,0.18); }
  .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; background: #111; }
  .card span { font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
  .card .num { font-size: 10px; color: #555; }
</style>
</head>
<body>
<h1>Quick.Calc</h1>
<p class="desc">Quick calculator with expression evaluator — icon candidates</p>
<div class="grid">
  <div class="card"><img src="candidate_01_calculator_neon.svg"/><span>Calculator Neon</span><span class="num">01</span></div>
  <div class="card"><img src="candidate_02_abacus_modern.svg"/><span>Abacus Modern</span><span class="num">02</span></div>
  <div class="card"><img src="candidate_03_math_formula_glow.svg"/><span>Math Formula Glow</span><span class="num">03</span></div>
  <div class="card"><img src="candidate_04_equals_lightning.svg"/><span>Equals Lightning</span><span class="num">04</span></div>
  <div class="card"><img src="candidate_05_number_galaxy.svg"/><span>Number Galaxy</span><span class="num">05</span></div>
  <div class="card"><img src="candidate_06_calc_keypad_minimal.svg"/><span>Calc Keypad Minimal</span><span class="num">06</span></div>
  <div class="card"><img src="candidate_07_formula_fire.svg"/><span>Formula Fire</span><span class="num">07</span></div>
  <div class="card"><img src="candidate_08_math_compass.svg"/><span>Math Compass</span><span class="num">08</span></div>
  <div class="card"><img src="candidate_09_digit_stream.svg"/><span>Digit Stream</span><span class="num">09</span></div>
  <div class="card"><img src="candidate_10_calculator_crystal.svg"/><span>Calculator Crystal</span><span class="num">10</span></div>
</div>
</body>
</html>
