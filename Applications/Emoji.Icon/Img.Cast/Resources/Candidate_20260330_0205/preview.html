  .literal { background: #1565C0; color: #E3F2FD; }
  .metaphor { background: #6A1B9A; color: #F3E5F5; }
  .hybrid { background: #E65100; color: #FFF3E0; }
  .palette { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #3A5070; }
