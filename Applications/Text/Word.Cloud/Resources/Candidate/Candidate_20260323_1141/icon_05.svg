<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: Background - 산호색 -->
  <rect width="1024" height="1024" rx="180" fill="#FF5722"/>
  <!-- Layer 2: 문서 텍스트 → 워드 클라우드 변환 UI -->
  <!-- 상단: 문서 패널 -->
  <rect x="120" y="160" width="784" height="280" rx="20" fill="#BF360C"/>
  <text x="160" y="218" font-family="Arial" font-size="30" fill="#FFCCBC">Lorem ipsum dolor sit amet...</text>
  <text x="160" y="256" font-family="Arial" font-size="30" fill="#FFCCBC">consectetur adipiscing elit.</text>
  <text x="160" y="294" font-family="Arial" font-size="30" fill="#FFCCBC">Sed do eiusmod tempor incididunt</text>
  <text x="160" y="332" font-family="Arial" font-size="30" fill="#FFCCBC">ut labore et dolore magna aliqua.</text>
  <!-- 화살표 (아래 방향) -->
  <line x1="512" y1="460" x2="512" y2="540" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <polygon points="460,530 512,600 564,530" fill="white"/>
  <!-- 하단: 결과 워드 클라우드 -->
  <rect x="120" y="600" width="784" height="260" rx="20" fill="#E64A19"/>
  <text x="512" y="680" font-family="Arial Black,Arial" font-size="96" font-weight="900" fill="white" text-anchor="middle">Lorem</text>
  <text x="300" y="750" font-family="Arial" font-size="60" font-weight="700" fill="#FFCCBC" text-anchor="middle">ipsum</text>
  <text x="730" y="748" font-family="Arial" font-size="52" font-weight="700" fill="#FF8A65" text-anchor="middle">dolor</text>
  <text x="512" y="810" font-family="Arial" font-size="40" fill="#FFCCBC" text-anchor="middle">sed  ut  et</text>
  <!-- Layer 3: 변환 버튼 -->
  <rect x="380" y="442" width="264" height="72" rx="36" fill="white"/>
  <text x="512" y="490" font-family="Arial" font-size="34" fill="#FF5722" text-anchor="middle" font-weight="bold">Generate</text>
</svg>
