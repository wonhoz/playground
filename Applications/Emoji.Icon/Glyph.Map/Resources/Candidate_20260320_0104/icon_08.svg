<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#0F0A00"/>
  <!-- Layered font sheets - stacked pages offset -->
  <rect x="320" y="620" width="400" height="220" rx="24" fill="#F57F17" opacity="0.3" stroke="#F57F17" stroke-width="28"/>
  <rect x="280" y="520" width="400" height="220" rx="24" fill="#F57F17" opacity="0.5" stroke="#F57F17" stroke-width="28"/>
  <rect x="240" y="420" width="400" height="220" rx="24" fill="#F57F17" opacity="0.7" stroke="#F57F17" stroke-width="28"/>
  <rect x="200" y="320" width="400" height="220" rx="24" fill="#0F0A00" stroke="#FFD54F" stroke-width="32"/>
  <!-- Font lines on top sheet -->
  <rect x="240" y="370" width="160" height="26" rx="8" fill="#FFD54F"/>
  <rect x="240" y="420" width="120" height="26" rx="8" fill="#FFD54F" opacity="0.7"/>
  <rect x="240" y="470" width="140" height="26" rx="8" fill="#F57F17" opacity="0.8"/>
  <!-- Right-side stacked sheets hint -->
  <rect x="560" y="320" width="240" height="220" rx="24" fill="#F57F17" opacity="0.4" stroke="#F57F17" stroke-width="24"/>
  <rect x="600" y="300" width="240" height="220" rx="24" fill="#0F0A00" stroke="#F57F17" stroke-width="24"/>
  <rect x="624" y="344" width="100" height="22" rx="7" fill="#F57F17"/>
  <rect x="624" y="384" width="80" height="22" rx="7" fill="#F57F17" opacity="0.6"/>
</svg>