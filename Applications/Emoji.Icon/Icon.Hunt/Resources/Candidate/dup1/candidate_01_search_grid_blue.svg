<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a2d40"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Icon grid -->
  <rect x="60" y="80" width="64" height="64" rx="12" fill="#1e3a5a"/>
  <text x="82" y="122" font-family="serif" font-size="30">🏠</text>
  <rect x="140" y="80" width="64" height="64" rx="12" fill="#1e3a5a"/>
