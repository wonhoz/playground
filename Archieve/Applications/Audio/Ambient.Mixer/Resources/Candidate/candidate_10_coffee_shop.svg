<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0E00"/>
      <stop offset="100%" stop-color="#2D1A00"/>
    </linearGradient>
    <radialGradient id="steam" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#C4A882" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C4A882" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Coffee cup -->
  <path d="M170,280 L180,380 Q256,410 332,380 L342,280 Z" fill="#5C3A1E"/>
  <rect x="165" y="270" width="182" height="18" rx="9" fill="#7A4E2D"/>
  <!-- Cup handle -->
  <path d="M342,300 Q390,300 390,330 Q390,360 342,360" fill="none" stroke="#7A4E2D" stroke-width="16" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="256" cy="280" rx="91" ry="14" fill="#2C1A08"/>
  <!-- Steam waves with sound wave feel -->
  <path d="M200,250 Q210,220 200,190 Q190,160 200,130" fill="none" stroke="#C4A882" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M256,240 Q270,205 256,170 Q242,135 256,100" fill="none" stroke="#C4A882" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M312,250 Q322,218 312,186 Q302,154 312,122" fill="none" stroke="#C4A882" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Sound notes floating in steam -->
  <text x="175" y="175" font-family="serif" font-size="24" fill="#C4A882" opacity="0.6">♪</text>
  <text x="330" y="155" font-family="serif" font-size="20" fill="#C4A882" opacity="0.5">♫</text>
  <!-- Rain droplets on window suggestion -->
  <line x1="90" y1="100" x2="86" y2="130" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="110" y1="110" x2="106" y2="145" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="420" y1="105" x2="416" y2="138" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="440" y1="115" x2="436" y2="150" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Label -->
  <text x="256" y="455" font-family="sans-serif" font-weight="bold" font-size="20" fill="#C4A882" text-anchor="middle">Ambient Mixer</text>
</svg>