<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_02: literal | "0xFF" 크게 중앙 + 바이트 스트림 | 중앙 심볼 | 비비드 노랑 배경 + 딥 퍼플 텍스트 -->
  <defs>
    <linearGradient id="bgYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE629"/>
      <stop offset="100%" stop-color="#FFC800"/>
    </linearGradient>
    <linearGradient id="tagPurp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C1FBF"/>
      <stop offset="100%" stop-color="#3A0D8A"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: 노랑 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bgYellow)"/>

  <!-- 배경 장식 점들 -->
  <circle cx="160" cy="160" r="30" fill="#FFD000" opacity="0.5"/>
  <circle cx="864" cy="160" r="22" fill="#FFD000" opacity="0.4"/>
  <circle cx="160" cy="864" r="25" fill="#FFD000" opacity="0.4"/>
  <circle cx="864" cy="864" r="35" fill="#FFD000" opacity="0.5"/>

  <!-- Layer 2: 중앙 메인 텍스트 "0xFF" -->
  <!-- 그림자 효과 -->
  <text x="518" y="458" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="280" font-weight="bold" fill="#3A0D8A" opacity="0.2">0xFF</text>
  <text x="512" y="450" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas, monospace" font-size="280" font-weight="bold" fill="url(#tagPurp)">0xFF</text>

  <!-- Layer 3: 하단 바이트 스트림 -->
  <rect x="120" y="620" width="784" height="80" rx="16" fill="#5C1FBF" opacity="0.15"/>
  <!-- 바이트 값들 -->
  <text x="175" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">FF</text>
  <text x="275" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">D8</text>
  <text x="375" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">FF</text>
  <text x="475" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">E0</text>
  <text x="575" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">00</text>
  <text x="675" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">10</text>
  <text x="775" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0">4A</text>
  <text x="875" y="662" text-anchor="middle" dominant-baseline="middle" font-family="Consolas" font-size="44" font-weight="bold" fill="#4A0FA0" opacity="0.5">46</text>

  <!-- 구분선들 -->
  <line x1="225" y1="625" x2="225" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="325" y1="625" x2="325" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="425" y1="625" x2="425" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="525" y1="625" x2="525" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="625" y1="625" x2="625" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="725" y1="625" x2="725" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>
  <line x1="825" y1="625" x2="825" y2="697" stroke="#4A0FA0" stroke-width="2" opacity="0.3"/>

  <!-- 상단 "Hex.Peek" 작은 레이블 -->
  <rect x="320" y="200" width="384" height="66" rx="16" fill="#5C1FBF" opacity="0.18"/>
  <text x="512" y="235" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="44" font-weight="bold" fill="#3A0D8A">Hex.Peek</text>

  <!-- 하단 바이트 카운트 -->
  <text x="512" y="790" text-anchor="middle" dominant-baseline="middle"
        font-family="Consolas" font-size="38" fill="#5C1FBF" opacity="0.7">1,024 bytes  ·  64 rows</text>
</svg>
