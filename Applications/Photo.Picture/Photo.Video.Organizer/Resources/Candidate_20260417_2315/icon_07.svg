<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <radialGradient id="vortex" cx="60%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#880E4F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#880E4F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Layer 1: 배경 -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg07)"/>
  <!-- Layer 2: 폴더 (오른쪽 아래 — 수신처) -->
  <rect x="560" y="640" width="340" height="240" rx="28" fill="white" opacity="0.95"/>
  <rect x="560" y="616" width="170" height="48" rx="14" fill="#E91E63"/>
  <text x="645" y="650" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">2024</text>
  <!-- 빨려드는 사진들 (왼쪽 위 → 오른쪽 아래 방향) -->
  <!-- 사진 1 (큼) -->
  <rect x="120" y="160" width="200" height="150" rx="16" fill="white" opacity="0.9"/>
  <rect x="136" y="176" width="168" height="100" rx="8" fill="#F8BBD9"/>
  <circle cx="176" cy="196" r="18" fill="#FFD54F"/>
  <!-- 화살표 파티클 라인들 -->
  <line x1="330" y1="240" x2="580" y2="660" stroke="#E91E63" stroke-width="10" stroke-linecap="round" opacity="0.5" stroke-dasharray="20 12"/>
  <!-- 사진 2 (중간) -->
  <rect x="280" y="300" width="160" height="120" rx="14" fill="#FFF9C4" opacity="0.9"/>
  <line x1="450" y1="360" x2="600" y2="680" stroke="#E91E63" stroke-width="8" stroke-linecap="round" opacity="0.4" stroke-dasharray="18 10"/>
  <!-- 사진 3 (작음) -->
  <rect x="170" y="490" width="130" height="98" rx="12" fill="#E8F5E9" opacity="0.9"/>
  <line x1="310" y1="540" x2="570" y2="700" stroke="#E91E63" stroke-width="7" stroke-linecap="round" opacity="0.4" stroke-dasharray="16 10"/>
  <!-- Layer 3: 정렬 완료 체크 -->
  <circle cx="720" cy="760" r="52" fill="#E91E63" opacity="0.9"/>
  <text x="720" y="780" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle">✓</text>
</svg>
