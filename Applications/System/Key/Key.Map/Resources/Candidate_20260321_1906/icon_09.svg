<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- icon_09: 키보드 히트맵 - 자주 쓰는 키가 밝음 (hybrid) | 대각선/동적 | 레드→오렌지→옐로 -->
  <!-- Layer 1: 배경 - 짙은 다크 -->
  <defs>
    <linearGradient id="heat1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F1D1D"/>
      <stop offset="50%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#0A0808"/>

  <!-- Layer 2: 키보드 히트맵 전체 -->
  <rect x="90" y="250" width="844" height="460" rx="18" fill="#120A08" stroke="#2A1408" stroke-width="2"/>

  <!-- ====== 히트맵 키들 ====== -->
  <!-- 각 키는 사용 빈도에 따라 냉(어둠)~열(밝음) 색 -->

  <!-- 행 1: 숫자 행 (일반적으로 덜 사용) -->
  <rect x="110" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="136" y="299" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" fill="#3A1A08">`</text>

  <rect x="168" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="194" y="299" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#3A1A08">1</text>
  <rect x="226" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="252" y="299" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#3A1A08">2</text>
  <rect x="284" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="310" y="299" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#3A1A08">3</text>
  <rect x="342" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="400" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="458" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="516" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="574" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="632" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="690" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="748" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="806" y="270" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="864" y="270" width="60" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>

  <!-- 행 2: QWERTY - 중간 빈도 -->
  <rect x="110" y="322" width="72" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="146" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#3A1A08">Tab</text>

  <rect x="188" y="322" width="52" height="46" rx="5" fill="#200E08" stroke="#351208" stroke-width="1"/>
  <text x="214" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#4A200A">Q</text>
  <rect x="246" y="322" width="52" height="46" rx="5" fill="#2A1008" stroke="#451508" stroke-width="1"/>
  <text x="272" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#6A3010">W</text>
  <!-- E 키 - 자주 사용 -->
  <rect x="304" y="322" width="52" height="46" rx="5" fill="#7C2D12" stroke="#9A3910" stroke-width="1.5"/>
  <text x="330" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FED7AA">E</text>
  <rect x="362" y="322" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="388" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#8A4018">R</text>
  <rect x="420" y="322" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="446" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#6A3010">T</text>
  <rect x="478" y="322" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="504" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#5A2808">Y</text>
  <rect x="536" y="322" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="562" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#8A4018">U</text>
  <rect x="594" y="322" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="620" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#5A2808">I</text>
  <rect x="652" y="322" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="678" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#5A2808">O</text>
  <!-- P 키 - 자주 사용 (Ctrl+P) -->
  <rect x="710" y="322" width="52" height="46" rx="5" fill="#B45309" stroke="#D97706" stroke-width="1.5"/>
  <text x="736" y="351" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FEF3C7">P</text>
  <rect x="768" y="322" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="826" y="322" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="884" y="322" width="40" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>

  <!-- 행 3: ASDF - 높은 빈도 (중간 홈 포지션) -->
  <rect x="110" y="374" width="80" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="150" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#3A1A08">Caps</text>

  <!-- A 키 - 매우 자주 사용 -->
  <rect x="196" y="374" width="52" height="46" rx="5" fill="#DC2626" stroke="#EF4444" stroke-width="1.5"/>
  <text x="222" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">A</text>
  <!-- S 키 -->
  <rect x="254" y="374" width="52" height="46" rx="5" fill="#EA580C" stroke="#F97316" stroke-width="1.5"/>
  <text x="280" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">S</text>
  <!-- D 키 -->
  <rect x="312" y="374" width="52" height="46" rx="5" fill="#F59E0B" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="338" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">D</text>
  <!-- F 키 (홈) -->
  <rect x="370" y="374" width="52" height="46" rx="5" fill="#FDE68A" stroke="#FEF3C7" stroke-width="2"/>
  <text x="396" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#7C3A00">F</text>
  <rect x="428" y="374" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="454" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#8A4018">G</text>
  <!-- J 키 (홈) -->
  <rect x="544" y="374" width="52" height="46" rx="5" fill="#FDE68A" stroke="#FEF3C7" stroke-width="2"/>
  <text x="570" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#7C3A00">J</text>
  <rect x="602" y="374" width="52" height="46" rx="5" fill="#F59E0B" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="628" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">K</text>
  <rect x="660" y="374" width="52" height="46" rx="5" fill="#EA580C" stroke="#F97316" stroke-width="1.5"/>
  <text x="686" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">L</text>
  <rect x="718" y="374" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="744" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#8A4018">;</text>
  <rect x="776" y="374" width="148" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="850" y="403" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#3A1A08">Enter</text>

  <!-- 행 4: ZXCV - 중간 빈도 -->
  <rect x="110" y="426" width="100" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" fill="#EA580C">Shift</text>
  <rect x="216" y="426" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <text x="242" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#3A1A08">Z</text>
  <!-- X,C,V - 클립보드 -->
  <rect x="274" y="426" width="52" height="46" rx="5" fill="#B45309" stroke="#D97706" stroke-width="1.5"/>
  <text x="300" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FEF3C7">X</text>
  <rect x="332" y="426" width="52" height="46" rx="5" fill="#B45309" stroke="#D97706" stroke-width="1.5"/>
  <text x="358" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FEF3C7">C</text>
  <rect x="390" y="426" width="52" height="46" rx="5" fill="#EA580C" stroke="#F97316" stroke-width="1.5"/>
  <text x="416" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">V</text>
  <rect x="448" y="426" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="474" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#8A4018">B</text>
  <rect x="506" y="426" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="532" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#5A2808">N</text>
  <rect x="564" y="426" width="52" height="46" rx="5" fill="#2A1008" stroke="#3A1208" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" fill="#5A2808">M</text>
  <rect x="622" y="426" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="680" y="426" width="52" height="46" rx="5" fill="#1C0C08" stroke="#2A1408" stroke-width="1"/>
  <rect x="738" y="426" width="186" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="831" y="455" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" fill="#EA580C">Shift</text>

  <!-- 행 5: Ctrl (매우 뜨거움!) -->
  <!-- Ctrl 키 - 가장 자주 사용 -->
  <rect x="110" y="478" width="80" height="46" rx="5" fill="#DC2626" stroke="#EF4444" stroke-width="2"/>
  <text x="150" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">Ctrl</text>
  <rect x="196" y="478" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <text x="222" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#8A4018">Win</text>
  <rect x="254" y="478" width="52" height="46" rx="5" fill="#B45309" stroke="#D97706" stroke-width="1.5"/>
  <text x="280" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FEF3C7">Alt</text>
  <!-- Space - 최고 빈도 -->
  <rect x="312" y="478" width="260" height="46" rx="5" fill="#FDE68A" stroke="#FEF3C7" stroke-width="2"/>
  <text x="442" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#7C3A00">Space</text>
  <rect x="578" y="478" width="52" height="46" rx="5" fill="#B45309" stroke="#D97706" stroke-width="1.5"/>
  <text x="604" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#FEF3C7">Alt</text>
  <rect x="636" y="478" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <rect x="694" y="478" width="52" height="46" rx="5" fill="#431407" stroke="#5A1A08" stroke-width="1"/>
  <!-- 오른쪽 Ctrl -->
  <rect x="752" y="478" width="172" height="46" rx="5" fill="#DC2626" stroke="#EF4444" stroke-width="2"/>
  <text x="838" y="507" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="white">Ctrl</text>

  <!-- Layer 3: 히트맵 범례 바 -->
  <defs>
    <linearGradient id="heatbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1C0C08"/>
      <stop offset="33%" stop-color="#7C2D12"/>
      <stop offset="66%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <rect x="200" y="770" width="624" height="24" rx="12" fill="url(#heatbar)"/>
  <text x="200" y="818" font-family="Segoe UI,Arial" font-size="20" fill="#431407">사용 빈도 낮음</text>
  <text x="824" y="818" text-anchor="end" font-family="Segoe UI,Arial" font-size="20" fill="#F59E0B">사용 빈도 높음</text>

  <!-- 히트맵 제목 -->
  <text x="512" y="880" text-anchor="middle" font-family="Segoe UI,Arial" font-size="26" font-weight="bold" fill="#431407" letter-spacing="2">Key Heatmap</text>
</svg>
