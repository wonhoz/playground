<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#00695C" stroke-width="16"/>

  <!-- Header: WHICH CONTINENT? -->
  <rect x="112" y="152" width="800" height="72" rx="20" fill="#00695C" stroke="#004D40" stroke-width="12"/>
  <text x="512" y="203" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">WHICH CONTINENT?</text>

  <!-- 5 continent badges -->
  <rect x="112" y="248" width="372" height="80" rx="24" fill="#3A86FF" stroke="#1565C0" stroke-width="12"/>
  <text x="298" y="304" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">ASIA</text>

  <rect x="512" y="248" width="400" height="80" rx="24" fill="#E91E63" stroke="#880E4F" stroke-width="12"/>
  <text x="712" y="304" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">EUROPE</text>

  <rect x="112" y="352" width="372" height="80" rx="24" fill="#FFD93D" stroke="#F57F17" stroke-width="12"/>
  <text x="298" y="408" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#4E342E" text-anchor="middle">AFRICA</text>

  <rect x="512" y="352" width="400" height="80" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <text x="712" y="408" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF" text-anchor="middle">AMERICAS</text>

  <!-- Oceania centered + correct highlighted -->
  <rect x="252" y="456" width="520" height="80" rx="24" fill="#06D6A0" stroke="#004D40" stroke-width="14"/>
  <text x="512" y="512" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#003D2E" text-anchor="middle">OCEANIA</text>

  <!-- Country example strip -->
  <rect x="112" y="562" width="800" height="76" rx="20" fill="#E0F2F1" stroke="#00695C" stroke-width="12"/>
  <text x="512" y="614" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#00695C" text-anchor="middle">Australia → ?</text>

  <!-- CONTINENT badge -->
  <rect x="128" y="752" width="768" height="116" rx="36" fill="#004D40" stroke="#002B25" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="76" fill="#06D6A0" text-anchor="middle">CONTINENT</text>
</svg>
