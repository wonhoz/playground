<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#000D1A"/>
  <!-- DNA helix: two intertwined strands -->
  <!-- Strand 1 (sine wave left-leaning) -->
  <path d="M300 160 Q400 260 300 360 Q200 460 300 560 Q400 660 300 760 Q200 860 300 960" fill="none" stroke="#4DD0E1" stroke-width="28" stroke-linecap="round"/>
  <!-- Strand 2 (sine wave right-leaning) -->
  <path d="M724 160 Q624 260 724 360 Q824 460 724 560 Q624 660 724 760 Q824 860 724 960" fill="none" stroke="#0097A7" stroke-width="28" stroke-linecap="round"/>
  <!-- Cross-links (rungs) -->
  <line x1="300" y1="260" x2="724" y2="260" stroke="#4DD0E1" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <line x1="248" y1="410" x2="776" y2="410" stroke="#0097A7" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <line x1="300" y1="560" x2="724" y2="560" stroke="#4DD0E1" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <line x1="248" y1="710" x2="776" y2="710" stroke="#0097A7" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <line x1="300" y1="860" x2="724" y2="860" stroke="#4DD0E1" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
</svg>
