<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Sky.Drift — 아이콘 후보</title>
  <style>
    body { background:#1a1a1a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:32px; }
    h1 { font-size:22px; margin-bottom:8px; color:#90caf9; letter-spacing:2px; }
    p  { color:#888; font-size:13px; margin-bottom:28px; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
    .card { background:#242424; border-radius:12px; padding:20px; text-align:center; border:1px solid #333; }
    .card img { width:120px; height:120px; border-radius:12px; }
    .card span { display:block; margin-top:10px; font-size:11px; color:#888; word-break:break-all; }
  </style>
</head>
<body>
  <h1>Sky.Drift</h1>
  <p>하늘 비행 드리프트 아케이드 게임 — 아이콘 후보 10종</p>
  <div class="grid">
    <div class="card"><img src="candidate_01_blue_jet_clouds.svg"/><span>01 · blue jet clouds</span></div>
    <div class="card"><img src="candidate_02_sunset_biplane_silhouette.svg"/><span>02 · sunset biplane silhouette</span></div>
    <div class="card"><img src="candidate_03_neon_arcade_speedometer.svg"/><span>03 · neon arcade speedometer</span></div>
    <div class="card"><img src="candidate_04_purple_space_fighter.svg"/><span>04 · purple space fighter</span></div>
    <div class="card"><img src="candidate_05_teal_aerial_trail.svg"/><span>05 · teal aerial trail</span></div>
    <div class="card"><img src="candidate_06_orange_pixel_plane.svg"/><span>06 · orange pixel plane</span></div>
    <div class="card"><img src="candidate_07_green_top_score_hud.svg"/><span>07 · green top score HUD</span></div>
    <div class="card"><img src="candidate_08_pink_looping_ribbon.svg"/><span>08 · pink looping ribbon</span></div>
    <div class="card"><img src="candidate_09_gold_trophy_wings.svg"/><span>09 · gold trophy wings</span></div>
    <div class="card"><img src="candidate_10_red_stunt_smoke.svg"/><span>10 · red stunt smoke</span></div>
  </div>
</body>
</html>
