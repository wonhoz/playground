<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 멀티 디바이스 스크린샷 -->
  <!-- 데스크탑 모니터 (뒤) -->
  <rect x="80" y="120" width="230" height="160" rx="6" fill="#060d16" stroke="#38BDF8" stroke-width="2" opacity="0.85"/>
  <!-- 모니터 스탠드 -->
  <rect x="175" y="280" width="40" height="20" rx="0" fill="#0a1a28" opacity="0.6"/>
  <rect x="155" y="298" width="80" height="8" rx="4" fill="#0a1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.5"/>
  <!-- 데스크탑 내용 -->
  <rect x="80" y="120" width="230" height="18" rx="6" fill="#0d1a28" opacity="0.9"/>
  <circle cx="94" cy="129" r="3" fill="#EF4444" opacity="0.7"/>
  <circle cx="104" cy="129" r="3" fill="#FDE047" opacity="0.7"/>
  <circle cx="114" cy="129" r="3" fill="#4ADE80" opacity="0.7"/>
  <rect x="120" y="125" width="120" height="8" rx="4" fill="#0d2030" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <text x="180" y="132" text-anchor="middle" font-size="5.5" fill="#38BDF8" opacity="0.7">example.com</text>
  <!-- 페이지 내용 -->
  <rect x="90" y="144" width="210" height="28" rx="3" fill="#0a2030" opacity="0.7"/>
  <rect x="98" y="150" width="80" height="6" rx="2" fill="#38BDF8" opacity="0.5"/>
  <rect x="186" y="150" width="50" height="6" rx="2" fill="#38BDF8" opacity="0.3"/>
  <rect x="90" y="178" width="210" height="90" rx="3" fill="#06101c" opacity="0.8"/>
  <rect x="100" y="186" width="190" height="14" rx="3" fill="#38BDF8" opacity="0.3"/>
  <rect x="100" y="204" width="170" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="100" y="216" width="180" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="100" y="228" width="150" height="8" rx="2" fill="#38BDF8" opacity="0.15"/>
  <rect x="100" y="244" width="60" height="16" rx="4" fill="#38BDF8" opacity="0.4"/>
  <!-- 태블릿 (가운데) -->
  <rect x="200" y="200" width="150" height="200" rx="10" fill="#060d16" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.95"/>
  <!-- 카메라 -->
  <circle cx="275" cy="212" r="4" fill="#0d2030" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <!-- 홈버튼 -->
  <circle cx="275" cy="388" r="8" fill="#0d2030" stroke="#38BDF8" stroke-width="1" opacity="0.7"/>
  <!-- 태블릿 화면 -->
  <rect x="208" y="222" width="134" height="158" rx="4" fill="#06101c" opacity="0.9"/>
  <rect x="208" y="222" width="134" height="12" rx="4" fill="#0a1828" opacity="0.8"/>
  <text x="275" y="231" text-anchor="middle" font-size="5" fill="#38BDF8" opacity="0.7">example.com</text>
  <rect x="216" y="238" width="118" height="50" rx="3" fill="#0a2030" opacity="0.7"/>
  <rect x="216" y="295" width="55" height="76" rx="3" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <rect x="279" y="295" width="47" height="76" rx="3" fill="#0d1a28" stroke="#38BDF8" stroke-width="0.8" opacity="0.7"/>
  <!-- 스마트폰 (앞) -->
  <rect x="340" y="260" width="90" height="180" rx="14" fill="#060d16" stroke="#38BDF8" stroke-width="2.5" filter="url(#glow)" opacity="0.95"/>
  <!-- 노치 -->
  <rect x="370" y="268" width="30" height="8" rx="4" fill="#0d2030" opacity="0.9"/>
  <circle cx="385" cy="272" r="2.5" fill="#0a1a28" opacity="0.8"/>
  <!-- 홈 인디케이터 -->
  <rect x="365" y="428" width="40" height="4" rx="2" fill="#0d2030" opacity="0.7"/>
  <!-- 스마트폰 화면 -->
  <rect x="348" y="278" width="74" height="142" rx="6" fill="#06101c" opacity="0.9"/>
  <!-- 내용 -->
  <rect x="356" y="288" width="58" height="30" rx="3" fill="#0a2030" opacity="0.7"/>
  <rect x="356" y="325" width="58" height="16" rx="2" fill="#38BDF8" opacity="0.25"/>
  <rect x="356" y="344" width="58" height="16" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="356" y="365" width="58" height="16" rx="2" fill="#38BDF8" opacity="0.2"/>
  <rect x="356" y="384" width="58" height="16" rx="2" fill="#38BDF8" opacity="0.15"/>
  <!-- 촬영 버튼 -->
  <circle cx="256" cy="460" r="22" fill="#060d16" stroke="#38BDF8" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="460" r="14" fill="#38BDF8" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="460" r="8" fill="#38BDF8" opacity="0.7" filter="url(#glow)"/>
</svg>
