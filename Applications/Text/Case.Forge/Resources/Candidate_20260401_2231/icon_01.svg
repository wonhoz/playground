<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg01cf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="url(#bg01cf)"/>

  <!-- Layer 2: Case result list rows -->
  <!-- Input box at top -->
  <rect x="88" y="88" width="848" height="84" rx="18" fill="white" opacity="0.95"/>
  <text x="140" y="145" font-family="'Segoe UI',Arial,sans-serif" font-size="58" fill="#0277BD">hello world</text>

  <!-- Result rows -->
  <rect x="88" y="196" width="848" height="74" rx="14" fill="white" opacity="0.9"/>
  <text x="140" y="247" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#888" >camelCase</text>
  <text x="680" y="247" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#0277BD">helloWorld</text>

  <rect x="88" y="284" width="848" height="74" rx="14" fill="white" opacity="0.9"/>
  <text x="140" y="335" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#888">PascalCase</text>
  <text x="680" y="335" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#1565C0">HelloWorld</text>

  <rect x="88" y="372" width="848" height="74" rx="14" fill="white" opacity="0.9"/>
  <text x="140" y="423" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#888">snake_case</text>
  <text x="680" y="423" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#2E7D32">hello_world</text>

  <rect x="88" y="460" width="848" height="74" rx="14" fill="white" opacity="0.85"/>
  <text x="140" y="511" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#888">kebab-case</text>
  <text x="680" y="511" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#880E4F">hello-world</text>

  <rect x="88" y="548" width="848" height="74" rx="14" fill="white" opacity="0.8"/>
  <text x="140" y="599" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#888">SCREAMING</text>
  <text x="680" y="599" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="bold" fill="#E65100">HELLO_WORLD</text>

  <!-- Layer 3: Copy badge on last row -->
  <rect x="88" y="636" width="848" height="74" rx="14" fill="#FFF176" opacity="0.9"/>
  <text x="140" y="687" font-family="'Segoe UI',Arial,sans-serif" font-size="44" fill="#E65100">dot.case</text>
  <text x="680" y="687" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#E65100">hello.world</text>

  <!-- Title label -->
  <rect x="88" y="760" width="848" height="100" rx="20" fill="white" opacity="0.15"/>
  <text x="512" y="828" font-family="'Segoe UI',Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" text-anchor="middle" letter-spacing="6">CASE FORGE</text>
</svg>
