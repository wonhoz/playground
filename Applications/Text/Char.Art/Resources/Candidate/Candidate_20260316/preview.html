<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Char.Art - Icon Candidates</title>
<style>
  body { background: #1a1a1a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  h1 { text-align: center; color: #FFD700; margin-bottom: 8px; }
  p { text-align: center; color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .item { background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 14px; text-align: center; }
  .item img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .item span { display: block; margin-top: 8px; font-size: 12px; color: #888; word-break: break-all; }
</style>
</head>
<body>
<h1>Char.Art</h1>
<p>ASCII/문자 아트 생성기 - 아이콘 후보 10종</p>
<div class="grid">
  <div class="item"><img src="candidate_01_ascii_face.svg" alt="01"/><span>01 ascii_face</span></div>
  <div class="item"><img src="candidate_02_pixel_text.svg" alt="02"/><span>02 pixel_text</span></div>
  <div class="item"><img src="candidate_03_typewriter.svg" alt="03"/><span>03 typewriter</span></div>
  <div class="item"><img src="candidate_04_rainbow_text.svg" alt="04"/><span>04 rainbow_text</span></div>
  <div class="item"><img src="candidate_05_brush_stroke.svg" alt="05"/><span>05 brush_stroke</span></div>
  <div class="item"><img src="candidate_06_matrix_art.svg" alt="06"/><span>06 matrix_art</span></div>
  <div class="item"><img src="candidate_07_neon_canvas.svg" alt="07"/><span>07 neon_canvas</span></div>
  <div class="item"><img src="candidate_08_retro_terminal.svg" alt="08"/><span>08 retro_terminal</span></div>
  <div class="item"><img src="candidate_09_watercolor_chars.svg" alt="09"/><span>09 watercolor_chars</span></div>
  <div class="item"><img src="candidate_10_golden_scroll.svg" alt="10"/><span>10 golden_scroll</span></div>
</div>
</body>
</html>
