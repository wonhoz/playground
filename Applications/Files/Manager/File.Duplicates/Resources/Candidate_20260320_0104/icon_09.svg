<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect x="80" y="80" width="864" height="864" rx="180" fill="#100500"/>
  <!-- Scissors cutting a duplicate -->
  <!-- Scissors top blade -->
  <path d="M300 380 L620 560" stroke="#FF7043" stroke-width="38" stroke-linecap="round"/>
  <!-- Scissors bottom blade -->
  <path d="M300 640 L620 460" stroke="#FF7043" stroke-width="38" stroke-linecap="round"/>
  <!-- Scissors pivot -->
  <circle cx="460" cy="512" r="44" fill="#BF360C"/>
  <circle cx="460" cy="512" r="24" fill="#100500"/>
  <!-- Handle circles -->
  <circle cx="220" cy="360" r="76" fill="none" stroke="#BF360C" stroke-width="40"/>
  <circle cx="220" cy="660" r="76" fill="none" stroke="#BF360C" stroke-width="40"/>
  <!-- Files being cut (on the right) -->
  <rect x="660" y="360" width="160" height="180" rx="14" fill="#BF360C" opacity="0.8"/>
  <rect x="660" y="560" width="160" height="180" rx="14" fill="#BF360C" opacity="0.4"/>
  <!-- Cut line -->
  <path d="M660 512 L820 512" stroke="#FF7043" stroke-width="4" stroke-dasharray="16 8"/>
</svg>