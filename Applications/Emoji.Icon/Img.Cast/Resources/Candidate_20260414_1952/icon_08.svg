<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Layer 1: 배경 - 하늘+흰색 -->
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg08)"/>
  <!-- Layer 2: 파일 형식 격자 (2x2) + 드래그&드롭 화살표 -->
  <!-- 2x2 형식 격자 -->
  <!-- 좌상 SVG -->
  <rect x="150" y="200" width="308" height="240" rx="24" fill="#9C27B0" opacity="0.9"/>
  <text x="304" y="330" font-family="Segoe UI, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">SVG</text>
  <!-- 우상 PNG -->
  <rect x="566" y="200" width="308" height="240" rx="24" fill="#1976D2" opacity="0.9"/>
  <text x="720" y="330" font-family="Segoe UI, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">PNG</text>
  <!-- 좌하 JPG -->
  <rect x="150" y="560" width="308" height="240" rx="24" fill="#F57C00" opacity="0.9"/>
  <text x="304" y="690" font-family="Segoe UI, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">JPG</text>
  <!-- 우하 ICO -->
  <rect x="566" y="560" width="308" height="240" rx="24" fill="#E91E63" opacity="0.95"/>
  <text x="720" y="690" font-family="Segoe UI, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">ICO</text>
  <!-- 중앙 변환 심볼 -->
  <circle cx="512" cy="490" r="70" fill="white" opacity="0.95"/>
  <!-- Layer 3: 중앙 화살표 심볼 -->
  <path d="M 472 470 L 512 510 L 552 470" stroke="#1976D2" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 512 490 L 512 450 M 482 474 L 512 444 L 542 474" stroke="#9C27B0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
