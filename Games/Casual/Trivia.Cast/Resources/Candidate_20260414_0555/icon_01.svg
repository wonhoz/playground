<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <!-- White main card -->
  <rect x="88" y="120" width="848" height="558" rx="48" fill="#FFFFFF" stroke="#0D47A1" stroke-width="16"/>

  <!-- Tile 1: SCIENCE (teal) -->
  <rect x="108" y="148" width="380" height="228" rx="24" fill="#00BFA5" stroke="#00695C" stroke-width="12"/>
  <!-- Atom symbol -->
  <circle cx="298" cy="216" r="18" fill="#FFFFFF"/>
  <ellipse cx="298" cy="216" rx="52" ry="20" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.7"/>
  <ellipse cx="298" cy="216" rx="52" ry="20" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.7" transform="rotate(60 298 216)"/>
  <ellipse cx="298" cy="216" rx="52" ry="20" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.7" transform="rotate(120 298 216)"/>
  <text x="298" y="340" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SCIENCE</text>

  <!-- Tile 2: HISTORY (amber) -->
  <rect x="508" y="148" width="380" height="228" rx="24" fill="#FF6B35" stroke="#BF360C" stroke-width="12"/>
  <!-- Hourglass symbol -->
  <path d="M 638,180 L 778,180 L 698,248 L 778,316 L 638,316 L 718,248 Z" fill="#FFFFFF" fill-opacity="0.7"/>
  <text x="698" y="356" font-family="Arial Black, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle">HISTORY</text>

  <!-- Tile 3: IT (purple) -->
  <rect x="108" y="394" width="380" height="228" rx="24" fill="#7B1FA2" stroke="#4A148C" stroke-width="12"/>
  <!-- Code symbol: </> -->
  <text x="298" y="476" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" fill-opacity="0.75" text-anchor="middle">&lt;/&gt;</text>
  <text x="298" y="582" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle">IT</text>

  <!-- Tile 4: SPORTS (green) -->
  <rect x="508" y="394" width="380" height="228" rx="24" fill="#388E3C" stroke="#1B5E20" stroke-width="12"/>
  <!-- Trophy outline -->
  <rect x="674" y="420" width="48" height="56" rx="8" fill="#FFD93D" stroke="#F9A825" stroke-width="8"/>
  <rect x="658" y="474" width="80" height="16" rx="8" fill="#FFD93D" stroke="#F9A825" stroke-width="8"/>
  <path d="M 650,428 Q 630,450 650,476" fill="none" stroke="#FFD93D" stroke-width="10" stroke-linecap="round"/>
  <path d="M 746,428 Q 766,450 746,476" fill="none" stroke="#FFD93D" stroke-width="10" stroke-linecap="round"/>
  <text x="698" y="582" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" text-anchor="middle">SPORTS</text>

  <!-- TRIVIA badge -->
  <rect x="228" y="752" width="568" height="116" rx="36" fill="#0D47A1" stroke="#1A237E" stroke-width="14"/>
  <text x="512" y="838" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#FFD93D" text-anchor="middle">TRIVIA</text>
</svg>
