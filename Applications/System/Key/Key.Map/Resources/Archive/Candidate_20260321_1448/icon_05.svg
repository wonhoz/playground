<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5km" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E2000"/>
      <stop offset="100%" stop-color="#7C3500"/>
    </linearGradient>
    <clipPath id="c5km"><rect width="1024" height="1024" rx="190"/></clipPath>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="url(#bg5km)"/>
  <circle cx="820" cy="200" r="250" fill="#F57F17" opacity="0.12" clip-path="url(#c5km)"/>
  <circle cx="200" cy="820" r="280" fill="#E65100" opacity="0.1" clip-path="url(#c5km)"/>

  <!-- Layer 2: 개별 키들이 날아와 단축키 조합을 이룸 (대각선/동적, 앰버) -->
  <!-- 목적지: 중앙의 완성된 단축키 조합 -->
  <!-- 완성 조합 (중앙) -->
  <rect x="242" y="450" width="160" height="84" rx="16" fill="#F57F17" stroke="#FFCA28" stroke-width="4"/>
  <text x="322" y="500" text-anchor="middle" font-family="Consolas,monospace" font-size="36" font-weight="800" fill="#FFFFFF">Ctrl</text>

  <text x="422" y="500" font-family="Consolas,monospace" font-size="40" font-weight="700" fill="#FFCA28">+</text>

  <rect x="452" y="450" width="100" height="84" rx="16" fill="#FB8C00" stroke="#FFCA28" stroke-width="4"/>
  <text x="502" y="500" text-anchor="middle" font-family="Consolas,monospace" font-size="36" font-weight="800" fill="#FFFFFF">⇧</text>

  <text x="562" y="500" font-family="Consolas,monospace" font-size="40" font-weight="700" fill="#FFCA28">+</text>

  <rect x="594" y="450" width="100" height="84" rx="16" fill="#EF6C00" stroke="#FFCA28" stroke-width="4"/>
  <text x="644" y="500" text-anchor="middle" font-family="Consolas,monospace" font-size="36" font-weight="800" fill="#FFFFFF">K</text>

  <!-- 설명 레이블 -->
  <rect x="280" y="552" width="480" height="32" rx="10" fill="#3E2000" opacity="0.8"/>
  <text x="520" y="572" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" fill="#FFCA28">모든 주석 토글 · Toggle Line Comment</text>

  <!-- 날아오는 키들 (애니메이션 효과를 trail로 표현) -->
  <!-- Ctrl 키: 상단 좌에서 이동 -->
  <rect x="180" y="230" width="110" height="56" rx="12" fill="#F57F17" opacity="0.55"/>
  <text x="235" y="264" text-anchor="middle" font-family="Consolas,monospace" font-size="24" fill="#FFE0B2" opacity="0.7">Ctrl</text>
  <line x1="230" y1="286" x2="290" y2="450" stroke="#F57F17" stroke-width="4" stroke-linecap="round" opacity="0.3" stroke-dasharray="8,6"/>

  <rect x="208" y="330" width="100" height="52" rx="12" fill="#F57F17" opacity="0.7"/>
  <text x="258" y="362" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#FFE0B2" opacity="0.85">Ctrl</text>
  <line x1="258" y1="382" x2="300" y2="450" stroke="#F57F17" stroke-width="5" stroke-linecap="round" opacity="0.4" stroke-dasharray="6,5"/>

  <!-- ⇧ 키: 상단 중에서 이동 -->
  <rect x="450" y="220" width="80" height="56" rx="12" fill="#FB8C00" opacity="0.55"/>
  <text x="490" y="254" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#FFE0B2" opacity="0.7">⇧</text>
  <line x1="490" y1="276" x2="502" y2="450" stroke="#FB8C00" stroke-width="4" stroke-linecap="round" opacity="0.3" stroke-dasharray="8,6"/>

  <rect x="458" y="330" width="76" height="52" rx="12" fill="#FB8C00" opacity="0.7"/>
  <text x="496" y="362" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#FFE0B2" opacity="0.85">⇧</text>
  <line x1="496" y1="382" x2="502" y2="450" stroke="#FB8C00" stroke-width="5" stroke-linecap="round" opacity="0.4" stroke-dasharray="6,5"/>

  <!-- K 키: 우상에서 이동 -->
  <rect x="720" y="230" width="70" height="56" rx="12" fill="#EF6C00" opacity="0.55"/>
  <text x="755" y="264" text-anchor="middle" font-family="Consolas,monospace" font-size="28" fill="#FFE0B2" opacity="0.7">K</text>
  <line x1="755" y1="286" x2="680" y2="450" stroke="#EF6C00" stroke-width="4" stroke-linecap="round" opacity="0.3" stroke-dasharray="8,6"/>

  <rect x="710" y="330" width="66" height="52" rx="12" fill="#EF6C00" opacity="0.7"/>
  <text x="743" y="362" text-anchor="middle" font-family="Consolas,monospace" font-size="26" fill="#FFE0B2" opacity="0.85">K</text>
  <line x1="743" y1="382" x2="660" y2="450" stroke="#EF6C00" stroke-width="5" stroke-linecap="round" opacity="0.4" stroke-dasharray="6,5"/>

  <!-- Layer 3: 카테고리 배지 -->
  <rect x="740" y="640" width="100" height="34" rx="12" fill="#F57F17" opacity="0.9"/>
  <text x="790" y="661" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" fill="#FFFFFF">Edit</text>
</svg>
