<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg03)"/>
  <!-- Layer 2: Three scale buttons — ×2, ×4, ×8 (bigger left to right/top-bottom) -->
  <!-- ×2 button (top-left, small) -->
  <rect x="130" y="180" width="300" height="220" rx="28" fill="#9C27B0"/>
  <text x="176" y="336" font-family="'Segoe UI',Arial,sans-serif" font-size="130" font-weight="900" fill="white">×2</text>
  <!-- ×4 button (top-right, medium) -->
  <rect x="474" y="150" width="400" height="270" rx="28" fill="#7B1FA2"/>
  <text x="520" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="160" font-weight="900" fill="white">×4</text>
  <!-- ×8 button (bottom, large) -->
  <rect x="130" y="470" width="744" height="350" rx="32" fill="#4A148C"/>
  <text x="238" y="720" font-family="'Segoe UI',Arial,sans-serif" font-size="220" font-weight="900" fill="white">×8</text>
  <!-- Layer 3: Small "AI" badge on ×8 button -->
  <rect x="730" y="620" width="118" height="70" rx="14" fill="#EA80FC"/>
  <text x="752" y="674" font-family="'Segoe UI',Arial,sans-serif" font-size="62" font-weight="800" fill="#4A148C">AI</text>
</svg>
