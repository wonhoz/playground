<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" rx="150" fill="#F0F4F8"/>
  <!-- Layer 2: Document card -->
  <rect x="170" y="190" width="600" height="610" rx="24" fill="white" stroke="#E2E8F0" stroke-width="3"/>
  <!-- Top border accent -->
  <rect x="170" y="190" width="600" height="10" rx="5" fill="#1E3A8A"/>
  <!-- Layer 3: Markdown content -->
  <!-- # Heading line -->
  <text x="210" y="276" font-family="Consolas,monospace" font-size="38" fill="#2563EB" font-weight="bold">#</text>
  <rect x="265" y="254" width="380" height="26" rx="5" fill="#1E3A8A"/>
  <text x="265" y="273" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="bold">Markdown 제목</text>
  <!-- Divider under heading -->
  <line x1="210" y1="296" x2="730" y2="296" stroke="#BFDBFE" stroke-width="3"/>
  <!-- ## Heading 2 -->
  <text x="210" y="348" font-family="Consolas,monospace" font-size="26" fill="#3B82F6" font-weight="bold">##</text>
  <text x="268" y="348" font-family="Arial,sans-serif" font-size="22" fill="#1E40AF" font-weight="600">섹션 제목</text>
  <!-- Paragraph lines -->
  <rect x="210" y="368" width="490" height="14" rx="4" fill="#9CA3AF" opacity="0.6"/>
  <rect x="210" y="392" width="440" height="14" rx="4" fill="#9CA3AF" opacity="0.55"/>
  <rect x="210" y="416" width="360" height="14" rx="4" fill="#9CA3AF" opacity="0.45"/>
  <!-- Bold and italic -->
  <text x="210" y="466" font-family="Arial,sans-serif" font-size="20" fill="#374151" font-weight="bold">**굵게**</text>
  <text x="310" y="466" font-family="Arial,sans-serif" font-size="20" fill="#6B7280"> _기울임_ </text>
  <text x="440" y="466" font-family="Consolas,monospace" font-size="18" fill="#6B7280">`code`</text>
  <!-- Code block -->
  <rect x="210" y="490" width="490" height="70" rx="8" fill="#F1F5F9"/>
  <text x="230" y="515" font-family="Consolas,monospace" font-size="17" fill="#0EA5E9">```python</text>
  <text x="230" y="540" font-family="Consolas,monospace" font-size="17" fill="#374151">print("Hello")</text>
  <!-- Bullet list -->
  <circle cx="222" cy="592" r="6" fill="#1E3A8A"/>
  <rect x="242" y="582" width="300" height="14" rx="4" fill="#9CA3AF" opacity="0.5"/>
  <circle cx="222" cy="622" r="6" fill="#1E3A8A"/>
  <rect x="242" y="612" width="260" height="14" rx="4" fill="#9CA3AF" opacity="0.45"/>
  <!-- Checkbox -->
  <rect x="210" y="658" width="18" height="18" rx="3" fill="#1E3A8A"/>
  <text x="215" y="671" font-family="Arial,sans-serif" font-size="13" fill="white">✓</text>
  <rect x="242" y="660" width="220" height="14" rx="4" fill="#9CA3AF" opacity="0.4"/>
</svg>