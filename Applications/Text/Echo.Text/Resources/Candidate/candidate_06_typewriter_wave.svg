  <rect x="127" y="245" width="44" height="38" rx="6" fill="#e8e8e8"/>
  <rect x="179" y="245" width="44" height="38" rx="6" fill="#e8e8e8"/>
  <rect x="231" y="245" width="44" height="38" rx="6" fill="#e8e8e8"/>
  <rect x="283" y="245" width="44" height="38" rx="6" fill="#e8e8e8"/>
